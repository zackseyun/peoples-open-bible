translation:
  language: es
  text: La disciplina severa[a] es para el que abandona el camino[b]; el que odia la reprensión morirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'corrección severa'. El adjetivo hebreo también puede entenderse como 'mala' o 'malvada', pero aquí probablemente describe la dureza dolorosa de la disciplina.
    reason: lexical_alternative
  - marker: b
    text: O 'la senda'. En la sabiduría bíblica, el hebreo usa una metáfora común para el curso moral de la vida.
    reason: lexical_alternative
lexical_decisions:
- source_word: מוּסָר
  english_pob_choice: discipline
  chosen_spanish: castigo
  alternatives_spanish:
  - disciplina
  - corrección
  - amonestación
  lexicon: HALOT
  rationale: En este proverbio, el sustantivo se vincula con la idea de una consecuencia dolorosa para quien abandona el camino; por eso 'castigo' comunica mejor la fuerza correctiva y punitiva que el contexto destaca. 'Disciplina' habría sido posible, pero en español puede sonar más formativa que dolorosa.
- source_word: רָע
  english_pob_choice: harsh
  chosen_spanish: severo
  alternatives_spanish:
  - duro
  - malo
  - malvado
  lexicon: HALOT
  rationale: El adjetivo puede significar 'malo' o 'evil', pero aquí califica la intensidad o dureza del castigo. 'Severo' preserva esa fuerza sin introducir una valoración moral ajena en español.
- source_word: לְעֹזֵב
  english_pob_choice: for one who forsakes
  chosen_spanish: para el que abandona
  alternatives_spanish:
  - para el que deja
  - para el que deserta
  - para quien abandona
  lexicon: HALOT
  rationale: La preposición ל expresa relación o destino; en español, 'para el que abandona' refleja bien esa relación. 'Abandona' conserva el peso moral del acto de dejar el rumbo correcto.
- source_word: אֹרַח
  english_pob_choice: the path
  chosen_spanish: el camino
  alternatives_spanish:
  - la senda
  - la vía
  - el sendero
  lexicon: HALOT
  rationale: En la sabiduría bíblica, אֹרַח funciona como metáfora del curso moral de vida. 'Camino' es natural en español y mantiene la metáfora sin caer en una traducción rígida.
- source_word: שׂוֹנֵא
  english_pob_choice: whoever hates
  chosen_spanish: el que odia
  alternatives_spanish:
  - quien odia
  - el que aborrece
  - quien aborrece
  lexicon: HALOT
  rationale: El participio tiene valor genérico. 'El que odia' es claro y mantiene el sujeto proverbial sin forzar una construcción más abstracta.
- source_word: תוֹכַחַת
  english_pob_choice: reproof
  chosen_spanish: reprensión
  alternatives_spanish:
  - reproche
  - corrección
  - amonestación
  lexicon: HALOT
  rationale: תוֹכַחַת es corrección verbal o reprensión. 'Reprensión' funciona bien en registro sapiencial y preserva la relación con el primer hemistiquio sin fusionar ambos términos.
- source_word: יָמוּת
  english_pob_choice: will die
  chosen_spanish: morirá
  alternatives_spanish:
  - morirá ciertamente
  - morirá de verdad
  - perecerá
  lexicon: HALOT
  rationale: El imperfecto expresa en estilo proverbial un futuro general o resultado. 'Morirá' mantiene la advertencia abierta, sin resolver el alcance de la muerte en una paráfrasis interpretativa.
theological_decisions:
- issue: Alcance de la muerte amenazada en el proverbio
  english_pob_reading: Rendered simply as 'will die' without specifying physical, moral, or ultimate death.
  chosen_spanish_reading: Se traduce simplemente como 'morirá' sin especificar si se trata de muerte física, ruina moral o perdición final.
  alternative_spanish_readings:
  - perecerá
  - acabará en ruina
  - morirá físicamente
  rationale: El verbo hebreo מות es amplio y el proverbio no define el modo de la muerte. Para preservar la tensión interpretativa, el español conserva la formulación directa sin cerrar el sentido con una paráfrasis explicativa.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto inglés POB de referencia usa una filosofía de equivalencia óptima y no requirió revisiones posteriores; el presente borrador español sigue de cerca la estructura y las tensiones léxicas del hebreo, especialmente en מוּסָר רָע y תוֹכַחַת יָמוּת, sin suavizarlas ni resolverlas de antemano.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando corresponda; este versículo no contiene el nombre divino.
  - Se conserva el paralelismo sapiencial con dos hemistiquios y una advertencia final concisa.
  - '''Camino'' se usa como metáfora moral estable en español bíblico, con nota para la alternativa ''senda''.'
