translation:
  language: es
  text: Hasta el tiempo señalado[a] perseverará el paciente[b], y después se le dará gozo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testimonio hebreo suministrado para este versículo parece no corresponder a este pasaje; por eso la traducción sigue aquí el texto griego paralelo: «Hasta el tiempo señalado, perseverará el paciente, y después se le dará gozo.»'
    reason: textual_variant
  - marker: b
    text: O «el longánimo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕως καιροῦ
  english_pob_choice: Until the appointed time
  chosen_spanish: Hasta el tiempo señalado
  alternatives_spanish:
  - hasta el tiempo appointed
  - hasta el tiempo oportuno
  - hasta el momento señalado
  lexicon: LSJ
  rationale: καιρός expresa un tiempo oportuno, fijado o señalado, no mero transcurso temporal. «Tiempo señalado» conserva la idea de un plazo o momento determinado sin volver la frase artificial en español.
- source_word: ἀνέξεται
  english_pob_choice: will endure
  chosen_spanish: perseverará
  alternatives_spanish:
  - resistirá
  - soportará
  - aguantará
  lexicon: BDAG
  rationale: El futuro medio comunica aguante sostenido ante una demora o dificultad. «Perseverará» transmite ese sentido de resistencia continua en un español natural y digno.
- source_word: μακρόθυμος
  english_pob_choice: the patient one
  chosen_spanish: el paciente
  alternatives_spanish:
  - el longánime
  - el de larga paciencia
  - el paciente de ánimo largo
  lexicon: BDAG
  rationale: La forma funciona sustantivamente. «El paciente» preserva el valor singular y evita imponer un matiz masculino más fuerte del que requiere el griego; «longánime» es posible pero menos transparente para lectores actuales.
- source_word: ὕστερον
  english_pob_choice: afterward
  chosen_spanish: después
  alternatives_spanish:
  - más tarde
  - luego
  - en adelante
  lexicon: LSJ
  rationale: Adverbio temporal simple. «Después» es la equivalencia más directa y clara en español contemporáneo.
- source_word: ἀναδώσει
  english_pob_choice: will be repaid
  chosen_spanish: se le devolverá
  alternatives_spanish:
  - se le pagará
  - se le retribuirá
  - se le hará volver
  lexicon: BDAG
  rationale: El verbo significa devolver o retribuir. La pasiva refleja en español mantiene la idea de recompensa recibida sin añadir un sujeto explícito que el griego no expresa.
- source_word: εὐφροσύνη
  english_pob_choice: joy
  chosen_spanish: la alegría
  alternatives_spanish:
  - el gozo
  - la dicha
  - la satisfacción
  lexicon: BDAG
  rationale: El sustantivo denota regocijo o alegría. «Alegría» es el equivalente más natural y comprensible, y conserva el valor de recompensa positiva.
theological_decisions:
- issue: 'Base textual: hebreo suministrado muy discrepante frente al griego paralelo'
  english_pob_reading: Translate from the Greek parallel as the operative source for this verse, while noting the Hebrew line appears to belong to a different context.
  chosen_spanish_reading: Traducir a partir del paralelo griego, dejando implícito en la nota que el hebreo suministrado no corresponde a este versículo.
  alternative_spanish_readings:
  - Traducir literalmente el hebreo suministrado como si fuera la base del versículo
  rationale: El paquete fuente marca el hebreo con 'major_mismatch'. La línea hebrea no corresponde semánticamente al griego de este versículo; por fidelidad textual, la versión española sigue el testimonio griego y señala la divergencia mediante nota.
  doctrine_reference: 'PHILOSOPHY.md: traducir del hebreo donde sobreviva y del griego donde no; conservar honestamente la incertidumbre de las fuentes'
translation_notes:
  revision_awareness: El historial de revisión del paquete muestra un desplazamiento desde una traducción basada en el griego hacia una traducción basada en el hebreo. Dado que el hebreo está marcado como desajuste mayor y el griego ofrece un paralelo coherente para este versículo, la presente versión vuelve a anclarse en el griego, en línea con el aviso textual del expediente.
  spanish_consistency_notes:
  - Se prefirió «tiempo señalado» para conservar el matiz de καιρός sin usar una fórmula demasiado eclesiástica.
  - Se usó una pasiva refleja («se le devolverá») para respetar el sujeto implícito del griego.
  - «El paciente» evita añadir «hombre» donde el griego usa un adjetivo sustantivado de valor general.
