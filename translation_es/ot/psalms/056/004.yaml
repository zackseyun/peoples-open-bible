lexical_decisions:
- source_word: י֥וֹם
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - En el día
  - El día en que
  lexicon: HALOT
  rationale: El hebreo usa יוֹם en una expresión temporal que introduce la situación de temor. En español, «cuando» transmite con naturalidad esa relación temporal sin volver rígida la frase con un calco como «en el día».
- source_word: אִירָ֑א
  english_pob_choice: I am afraid
  chosen_spanish: tengo miedo
  alternatives_spanish:
  - temo
  - estoy temeroso
  lexicon: HALOT
  rationale: El verbo expresa la experiencia de miedo del salmista. «Tengo miedo» es idiomático en español y preserva el sentido experiencial mejor que una formulación más solemne o abstracta.
- source_word: אֲ֝נִ֗י
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  - —
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis. En español se puede reflejar con el sujeto explícito «yo», aunque en esta línea la naturalidad poética permite integrarlo en la conjugación sin perder el contraste principal.
- source_word: אֵלֶ֥י/ךָ
  english_pob_choice: in you
  chosen_spanish: en ti
  alternatives_spanish:
  - hacia ti
  - contigo
  lexicon: HALOT
  rationale: Siguiendo el valor idiomático de אֶל con בטח, el español «confiar en» exige la preposición «en». Esto conserva la relación de dependencia y apoyo implicada por el hebreo.
- source_word: אֶבְטָֽח
  english_pob_choice: I will trust
  chosen_spanish: confiaré
  alternatives_spanish:
  - seguiré confiando
  - pondré mi confianza
  lexicon: HALOT
  rationale: El imperfecto expresa resolución en contexto. «Confiaré» mantiene el matiz volitivo/futuro sin expandir el verbo, y es la forma más natural para el paralelismo poético en español.
theological_decisions:
- issue: La relación entre miedo y confianza
  english_pob_reading: El versículo afirma que el miedo es respondido por una confianza deliberada en Dios, no que el miedo desaparezca.
  chosen_spanish_reading: El texto conserva el contraste entre sentir miedo y decidir confiar en Yahvé.
  alternative_spanish_readings:
  - Cuando pierdo el miedo, confío en ti
  - Aunque tenga miedo, confiaré en ti
  rationale: El hebreo yuxtapone el miedo real con la respuesta de confianza. La traducción no suaviza esa tensión ni la convierte en ausencia de miedo; mantiene la respuesta de fe frente al temor.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El contexto auditado en inglés está en alto acuerdo y no muestra revisiones aplicadas; por eso la versión española sigue de cerca la decisión óptima-equivalente ya estabilizada, manteniendo la tensión entre temor y confianza.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del nombre divino en el proyecto, aunque en este versículo no aparece explícitamente en el hebreo.
  - Se eligió «confiaré en ti» para reflejar la construcción hebrea con בטח sin introducir un giro devocional añadido.
  - La nota al pie preserva la alternativa literal del hebreo para transparentar el matiz temporal y el énfasis pronominal.
