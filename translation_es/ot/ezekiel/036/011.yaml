translation:
  language: es
  text: Y multiplicaré sobre ustedes a hombres y animales[a], y se multiplicarán y serán fecundos; y los haré habitar como antes[b], y les haré más bien que al principio[c]. Entonces sabrán que yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hombre y bestia». El hebreo dice literalmente «hombre y bestia», una pareja profética común para la población humana y animal en conjunto.
    reason: lexical_alternative
  - marker: b
    text: O «los estableceré» / «los reasentaré». El hebreo también puede expresarse como «los haré habitar».
    reason: lexical_alternative
  - marker: c
    text: O «les haré bien más que en sus comienzos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִרְבֵּיתִי
  english_pob_choice: I will multiply
  chosen_spanish: multiplicaré
  alternatives_spanish:
  - haré crecer
  - aumentaré
  lexicon: HALOT
  rationale: El verbo causativo de רבה conserva la idea de incremento. «Multiplicaré» mantiene el paralelismo con «se multiplicarán» y suena natural en español sin perder la fuerza del aumento poblacional.
- source_word: עֲלֵיכֶם
  english_pob_choice: upon you
  chosen_spanish: sobre ustedes
  alternatives_spanish:
  - sobre vosotros
  - encima de ustedes
  lexicon: HALOT
  rationale: La preposición expresa literalmente extensión «sobre» el pueblo. En español, «sobre ustedes» conserva la imagen con registro claro y moderno.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - ser humano
  - humanidad
  lexicon: HALOT
  rationale: Aquí אָדָם aparece en pareja con «bestia» para contrastar población humana y animal. «Hombre» preserva esa pareja tradicional y la fuerza colectiva del hebreo, sin neutralizarla en exceso.
- source_word: וּבְהֵמָה
  english_pob_choice: beast
  chosen_spanish: bestia
  alternatives_spanish:
  - animales
  - ganado
  lexicon: HALOT
  rationale: En este contexto profético, el término abarca animales en general dentro de la restauración de la tierra. «Bestia» conserva el paralelismo breve con «hombre» que la POB inglesa retuvo.
- source_word: וְרָבוּ וּפָרוּ
  english_pob_choice: they will multiply and be fruitful
  chosen_spanish: se multiplicarán y darán fruto
  alternatives_spanish:
  - crecerán y serán fecundos
  - aumentarán y se reproducirán
  lexicon: HALOT
  rationale: Los dos verbos expresan crecimiento y fecundidad. «Dar fruto» reproduce bien פרה en un registro bíblico natural, y mantiene el eco de abundancia sin añadir explicación.
- source_word: וְהוֹשַׁבְתִּי אֶתְכֶם
  english_pob_choice: I will settle you
  chosen_spanish: los estableceré
  alternatives_spanish:
  - los haré habitar
  - los reubicaré
  lexicon: HALOT
  rationale: 'El hifil de ישב es causativo: hacer habitar o establecer. «Los estableceré» es más fluido en español y conserva la idea de restauración en un lugar y orden de vida.'
- source_word: כְּקַדְמֹתֵיכֶם
  english_pob_choice: as in your former times
  chosen_spanish: como en sus tiempos antiguos
  alternatives_spanish:
  - como antes
  - como en sus tiempos anteriores
  lexicon: HALOT
  rationale: La expresión señala el estado previo del pueblo. «Tiempos antiguos» comunica una condición anterior restaurada, sin forzar una identificación exacta con «al principio».
- source_word: וְהֵטִבֹתִי
  english_pob_choice: I will do better for you
  chosen_spanish: haré bien para ustedes
  alternatives_spanish:
  - les haré mejor
  - les haré bien más
  lexicon: HALOT
  rationale: El hifil de יטב significa hacer bien. «Haré bien para ustedes» conserva el valor benefactivo y evita interpretar demasiado libremente la comparación.
- source_word: מֵרִאשֹׁתֵיכֶם
  english_pob_choice: than at your beginnings
  chosen_spanish: más que en sus comienzos
  alternatives_spanish:
  - más que al principio
  - más que en sus primeras etapas
  lexicon: HALOT
  rationale: El comparativo מן + «principios/comienzos» expresa superioridad respecto del estado inicial. «Comienzos» es una forma idiomática clara en español y mantiene la comparación.
- source_word: וִידַעְתֶּם כִּי אֲנִי יְהוָה
  english_pob_choice: Then you will know that I am Yahweh
  chosen_spanish: Entonces sabrán que yo soy Yahvé.
  alternatives_spanish:
  - Y sabrán que yo soy Yahvé.
  - Entonces conocerán que yo soy Yahvé.
  lexicon: HALOT
  rationale: La fórmula conclusiva de reconocimiento se traduce de manera directa. Se conserva el nombre divino «Yahvé» según la directriz del proyecto para יהוה, en lugar de un título sustitutivo.
theological_decisions:
- issue: Renderización de יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton. La norma del proyecto pide preservar el nombre divino como «Yahvé», manteniendo transparencia textual y evitando el reemplazo litúrgico por un título.
  doctrine_reference: 'DOCTRINE.md: יהוה / YHWH → Yahvé'
- issue: Valor colectivo de אָדָם junto con בְהֵמָה
  english_pob_reading: man and beast
  chosen_spanish_reading: hombre y bestia
  alternative_spanish_readings:
  - humanidad y animales
  - ser humano y animales
  rationale: La pareja humana/animal es un rasgo retórico del pasaje. «Hombre y bestia» conserva la concisión y el contraste del hebreo, sin diluir la tensión léxica que la POB inglesa documentó.
  doctrine_reference: 'Contested terms: אָדָם adam → hombre / humanidad (según contexto)'
- issue: Verbo causativo de ישב
  english_pob_reading: I will settle you
  chosen_spanish_reading: los estableceré
  alternative_spanish_readings:
  - los haré habitar
  - los asentaré
  rationale: El hifil expresa hacer habitar/restaurar. «Los estableceré» comunica la reinstalación del pueblo en su condición restituida con español idiomático y sin perder el componente causativo.
  doctrine_reference: HALOT / hifil de ישב en contexto de restauración
translation_notes:
  revision_awareness: 'La redacción sigue la lectura revisada de la POB inglesa, que afinó «upon you» por una preposición más natural sin alterar el sentido. En español se preserva esa precisión con «sobre ustedes», y se mantiene la secuencia completa del hebreo: multiplicación, fecundidad, establecimiento, mejora y reconocimiento de Yahvé.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה, conforme al estándar del proyecto.
  - Se mantuvo la pareja «hombre y bestia» para conservar el paralelismo profético documentado en el original y en la auditoría inglesa.
  - «Dar fruto» se emplea como equivalente bíblico natural de פרה, sin convertirlo en una paráfrasis agrícola más específica.
  - Las notas alternativas distinguen entre opciones léxicas y de formulación, pero no introducen lecturas textuales no atestiguadas.
