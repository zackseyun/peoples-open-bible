translation:
  language: es
  text: La altura de la primera columna era de dieciocho codos, y había sobre ella un capitel de bronce. La altura del capitel era de tres codos, con enrejado[a] y granadas sobre el capitel, todo alrededor, todo de bronce. Y la segunda columna tenía lo mismo[b], con el enrejado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «red» o «rejilla» para «enrejado»; el hebreo שְׂבָכָה alude a una estructura ornamental de malla en el capitel.
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo final es elíptico: literalmente, «y como estas cosas para la segunda columna sobre el enrejado». El sentido es que la segunda columna tenía la misma ornamentación.'
    reason: alternative_reading
lexical_decisions:
- source_word: קוֹמַת
  english_pob_choice: height of
  chosen_spanish: la altura de
  alternatives_spanish:
  - medía
  - su altura era de
  lexicon: HALOT
  rationale: En la descripción arquitectónica, קוֹמָה expresa altura/medida. «La altura de» conserva el valor dimensional de la construcción sin volver la frase artificial en español.
- source_word: עַמּוּד
  english_pob_choice: pillar
  chosen_spanish: columna
  alternatives_spanish:
  - pilar
  lexicon: HALOT
  rationale: Aquí se trata de un elemento arquitectónico monumental. En español, «columna» suena natural y preciso; «pilar» también es posible, pero «columna» comunica mejor la función y la forma en este contexto.
- source_word: כֹתֶרֶת
  english_pob_choice: capital
  chosen_spanish: capitel
  alternatives_spanish:
  - cabeza
  - corona
  lexicon: HALOT
  rationale: El término designa la parte ornamental superior de la columna, no una corona real. «Capitel» es el equivalente arquitectónico técnico y claro en español.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  - latón
  lexicon: HALOT
  rationale: En material de templo, נְחֹשֶׁת suele referirse a un metal/cobre aleado; «bronce» es la opción estándar y más adecuada en español bíblico para estos objetos.
- source_word: שְׂבָכָה
  english_pob_choice: latticework
  chosen_spanish: enrejado
  alternatives_spanish:
  - red
  - trama
  - rejilla
  lexicon: HALOT
  rationale: La palabra alude a una estructura ornamental de tipo red o malla. «Enrejado» conserva la idea de trama decorativa visible y funciona bien en español sin perder el carácter técnico.
- source_word: רִמֹּנִים
  english_pob_choice: pomegranates
  chosen_spanish: granadas
  alternatives_spanish:
  - granadas de adorno
  - granados
  lexicon: HALOT
  rationale: Se refiere literalmente a adornos con forma de granada. «Granadas» mantiene la imagen concreta sin explicar de más.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - todo alrededor
  - en torno
  lexicon: HALOT
  rationale: Expresa disposición circular u окружante. «Alrededor» es idiomático y fiel.
- source_word: הַכֹּל נְחֹשֶׁת
  english_pob_choice: all of bronze
  chosen_spanish: todo de bronce
  alternatives_spanish:
  - todo era de bronce
  - el conjunto era de bronce
  lexicon: HALOT
  rationale: La frase resume la composición material de los adornos. «Todo de bronce» es breve y natural, y preserva la fuerza totalizadora del hebreo.
- source_word: וְכָאֵלֶּה
  english_pob_choice: had the same
  chosen_spanish: tenía lo mismo
  alternatives_spanish:
  - y así también
  - y como אלה
  lexicon: HALOT
  rationale: El hebreo es elíptico; el sentido es que la segunda columna llevaba los mismos adornos. «Tenía lo mismo» expone esa elipsis de modo claro sin añadir elementos ajenos.
- source_word: עַל הַשְּׂבָכָה
  english_pob_choice: with the latticework
  chosen_spanish: con el enrejado
  alternatives_spanish:
  - sobre el enrejado
  - junto al enrejado
  lexicon: HALOT
  rationale: La clausula final completa la referencia al ornamento común de la segunda columna. «Con el enrejado» expresa inclusión del elemento ornamental de forma fluida en español.
theological_decisions:
- issue: Término para el metal del mobiliario del templo
  english_pob_reading: bronze
  chosen_spanish_reading: bronce
  alternative_spanish_readings:
  - cobre
  - latón
  rationale: 'No hay una decisión doctrinal, pero sí una decisión de realia: se conserva el metal tradicionalmente usado para objetos del templo según el contexto material del pasaje.'
  doctrine_reference: No aplica; decisión de traducción material/cultural.
translation_notes:
  revision_awareness: Se siguió la lectura estable del texto hebreo y la equivalencia óptima ya validada en el contexto inglés. No se introdujeron cambios textuales ni reinterpretaciones; solo se ajustó la expresión al español natural preservando las decisiones léxicas y la elipsis final.
  spanish_consistency_notes:
  - Se mantiene «bronce» para נְחֹשֶׁת, en línea con el uso bíblico-material estándar.
  - Se usa «capitel» para כֹתֶרֶת en sentido arquitectónico, no «corona».
  - «Columna» se eligió por naturalidad en español, aunque «pilar» también sería defendible; el contexto monumental favorece «columna».
  - 'Se preserva la repetición estructural del verso: primera columna, capitel, adornos, y luego la segunda columna con la misma disposición.'
