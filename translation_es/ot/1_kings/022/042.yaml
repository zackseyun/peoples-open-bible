translation:
  language: es
  text: Josafat era de treinta y cinco años cuando comenzó a reinar, y reinó veinticinco años en Jerusalén. Y el nombre de su madre era Azuba, hija de Silhi.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: יְהוֹשָׁפָט
  english_pob_choice: Jehoshaphat
  chosen_spanish: Josafat
  alternatives_spanish:
  - Jehoshafat
  - Jehoshapat
  lexicon: HALOT
  rationale: Se translitera el nombre propio según la forma española habitual bíblica, evitando calco del inglés. 'Josafat' mantiene reconocimiento lector y corresponde al mismo personaje.
- source_word: בֶּן שְׁלֹשִׁים וְחָמֵשׁ שָׁנָה
  english_pob_choice: was thirty-five years old
  chosen_spanish: tenía treinta y cinco años
  alternatives_spanish:
  - era hijo de treinta y cinco años
  - tenía treinta y cinco años de edad
  lexicon: HALOT
  rationale: El hebreo usa una fórmula idiomática de edad. En español, 'tenía treinta y cinco años' comunica el sentido de forma natural sin perder precisión.
- source_word: בְּמָלְכ֔וֹ
  english_pob_choice: when he began to reign
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - cuando empezó a reinar
  - al comenzar a reinar
  - cuando fue hecho rey
  lexicon: HALOT
  rationale: La construcción marca el momento de la entronización o inicio del reinado. 'Comenzó a reinar' reproduce bien el valor temporal de la fórmula regnal.
- source_word: וְעֶשְׂרִים וְחָמֵשׁ שָׁנָה
  english_pob_choice: twenty-five years
  chosen_spanish: veinticinco años
  alternatives_spanish:
  - veinticinco años de reinado
  lexicon: HALOT
  rationale: Se conserva el número y el sustantivo 'años' como en la fórmula de duración del reinado; el contexto ya indica que se trata del reinado.
- source_word: מָלַךְ
  english_pob_choice: he reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  - gobernó
  lexicon: HALOT
  rationale: '''Reinó'' es el equivalente español directo y estándar para el verbo regnal hebreo, manteniendo la formalidad del registro histórico.'
- source_word: בִּירוּשָׁלָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: Topónimo traducido a su forma española habitual con preposición locativa simple.
- source_word: וְשֵׁם אִמּוֹ
  english_pob_choice: And his mother’s name was
  chosen_spanish: Y el nombre de su madre fue
  alternatives_spanish:
  - Y su madre se llamaba
  - Y el nombre de su madre era
  lexicon: HALOT
  rationale: Se conserva la fórmula genealógica/real del hebreo con sintaxis natural en español. 'Fue' reproduce bien la nota de identificación formal.
- source_word: עֲזוּבָה
  english_pob_choice: Azubah
  chosen_spanish: Azuba
  alternatives_spanish:
  - Azubá
  - Azubah
  lexicon: HALOT
  rationale: Nombre propio transliterado al español, ajustando la vocalización habitual para lectura hispana sin traducir el nombre.
- source_word: בַּת שִׁלְחִי
  english_pob_choice: daughter of Shilhi
  chosen_spanish: hija de Silhi
  alternatives_spanish:
  - hija de Shilhi
  - hija de Siljí
  lexicon: HALOT
  rationale: Se traduce 'daughter of' por 'hija de' y se translitera el nombre propio con adaptación gráfica hispana. Se evita añadir información no presente en el texto.
theological_decisions:
- issue: Fórmula regnal de acceso al trono y duración del reinado
  english_pob_reading: when he began to reign / he reigned
  chosen_spanish_reading: cuando comenzó a reinar / reinó
  alternative_spanish_readings:
  - cuando fue coronado / gobernó
  - cuando empezó a ser rey / fue rey
  rationale: El versículo es un aviso histórico-regnal, no una afirmación teológica interpretativa. Se conserva la distinción entre inicio del reinado y duración del reinado sin expandir el sentido.
  doctrine_reference: n/a
