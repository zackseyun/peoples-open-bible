translation:
  language: es
  text: Y te di la casa de tu señor, y las mujeres de tu señor en tu seno[a]; y te di la casa de Israel y de Judá; y si eso te hubiera parecido poco[b], te habría añadido tales y tales cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘en tu regazo’ o ‘en tu pecho’. El hebreo usa un modismo que expresa posesión o recepción íntima.
    reason: lexical_alternative
  - marker: b
    text: O ‘tales cosas y más’. La expresión hebrea es un modismo para añadir todavía más de la misma clase.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶתְּנָה
  english_pob_choice: I gave
  chosen_spanish: te di
  alternatives_spanish:
  - yo te di
  - te había dado
  lexicon: HALOT
  rationale: El wayyiqtol narra acción pasada sucesiva; en español, el pretérito simple transmite con naturalidad la acción divina de dar, sin introducir una anterioridad que el hebreo no exige.
- source_word: בֵּית אֲדֹנֶיךָ
  english_pob_choice: your master's house
  chosen_spanish: la casa de tu señor
  alternatives_spanish:
  - la casa de tu amo
  - el hogar de tu señor
  - la casa de tu soberano
  lexicon: HALOT
  rationale: ‘Casa’ conserva la transparencia del hebreo בַּיִת y su posible alcance de casa/linaje/ámbito real. ‘Señor’ evita la confusión que en español podría producir ‘amo’ y mantiene el tono de autoridad humana, no divina.
- source_word: נְשֵׁי אֲדֹנֶיךָ
  english_pob_choice: your master's wives
  chosen_spanish: las mujeres de tu señor
  alternatives_spanish:
  - las esposas de tu señor
  - las mujeres de tu amo
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘mujeres de tu señor’. En español, ‘esposas’ sería más específico pero más interpretivo; aquí se conserva la formulación amplia del texto, que en contexto real apunta al conjunto de mujeres vinculadas al ámbito real de Saúl.
- source_word: בְּחֵיקֶךָ
  english_pob_choice: into your bosom
  chosen_spanish: en tu seno
  alternatives_spanish:
  - en tu regazo
  - en tu pecho
  - en tu bosom
  lexicon: HALOT
  rationale: חֵיק designa el seno, regazo o pecho como lugar de cercanía y posesión íntima. ‘En tu seno’ es una opción formal y bíblica en español que mantiene el sentido idiomático sin perder precisión léxica.
- source_word: בֵּית יִשְׂרָאֵל וִיהוּדָה
  english_pob_choice: the house of Israel and Judah
  chosen_spanish: la casa de Israel y de Judá
  alternatives_spanish:
  - la casa de Israel y Judá
  - Israel y Judá
  - el reino de Israel y de Judá
  lexicon: HALOT
  rationale: Se conserva ‘casa’ para reflejar el paralelismo con el verso anterior y la expresión hebrea directa. ‘Reino’ sería una interpretación posible, pero el texto habla más literalmente de la ‘casa’ de Israel y de Judá.
- source_word: וְאִם מְעָט
  english_pob_choice: if that had been too little
  chosen_spanish: y si esto hubiera sido poco
  alternatives_spanish:
  - y si hubiera sido poco
  - y si aquello hubiera sido poco
  - y si eso era poco
  lexicon: HALOT
  rationale: La cláusula expresa una hipótesis de insuficiencia. ‘Hubiera sido poco’ reproduce el valor contrafactual del hebreo y mantiene el tono retórico del reclamo divino.
- source_word: וְאֹסִפָה לְּךָ
  english_pob_choice: I would have added to you
  chosen_spanish: te habría añadido
  alternatives_spanish:
  - te habría agregado
  - habría añadido para ti
  - te añadiría
  lexicon: HALOT
  rationale: El verbo יסף en hifil significa añadir o aumentar. ‘Te habría añadido’ conserva el verbo y la modalidad condicional concordante con la cláusula anterior.
- source_word: כָּהֵנָּה וְכָהֵנָּה
  english_pob_choice: such and such things
  chosen_spanish: tales y tales cosas
  alternatives_spanish:
  - cosas así y así
  - muchas otras cosas semejantes
  - cosas de esta clase y de aquella
  lexicon: HALOT
  rationale: La expresión es idiomática e indefinida, indicando aumento ulterior de cosas de ese tipo. ‘Tales y tales cosas’ preserva esa indefinición sin especificar más de lo que el hebreo dice.
theological_decisions:
- issue: Cómo reflejar el regalo de las mujeres de Saúl sin resolver la tensión moral o matrimonial del pasaje
  english_pob_reading: The translation states that God gave David 'your master's wives into your bosom' without expanding the statement into an endorsement or detailed marital claim.
  chosen_spanish_reading: La traducción mantiene la afirmación de don y posesión íntima, sin convertirla en una aprobación explícita ni en una explicación matrimonial detallada.
  alternative_spanish_readings:
  - y te entregué el harén de tu señor
  - y confié las mujeres de tu señor a tu cuidado
  - y puse las mujeres de tu señor bajo tu autoridad
  rationale: El hebreo presenta un lenguaje de transferencia asociado con la sucesión real. La versión española conserva la tensión del texto sin añadir una interpretación que el original no formula, evitando resolver de antemano la cuestión teológica.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del audit trail al preferir ‘en tu seno’ para בְּחֵיקֶךָ, manteniendo a la vez el registro formal y la correspondencia léxica. También conserva la estructura condicional hipotética y la conclusión idiomática ‘tales y tales cosas’ para reflejar la expresión acumulativa final.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ cuando el texto hebreo explícitamente usa el nombre divino; en este versículo, el hablante directo se expresa en primera persona y no requiere la forma nominal en la línea principal.
  - ‘Señor’ se usa aquí para el señor humano de David, no como sustituto del nombre divino.
  - ‘Casa’ se conserva en ambos casos para mantener el paralelismo hebreo.
  - La puntuación española separa la frase condicional con punto y coma para reflejar el ritmo argumentativo del versículo.
