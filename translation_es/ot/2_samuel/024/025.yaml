    text: O 'sacrificios de comunión'.
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente 'Yahvé respondió a la tierra'; la expresión puede entenderse también como 'Yahvé respondió favorablemente por la tierra' o 'Yahvé atendió la oración por la tierra'.
    reason: alternative_reading
  - marker: c
    text: '''Yahvé'' traduce el nombre divino YHWH.'
    reason: lexical_alternative
  revision_rationale: 'Se corrigieron dos problemas principales: (1) ''respondió a la tierra'' se ajustó a ''respondió favorablemente por la tierra'' para conservar el sentido de respuesta misericordiosa de וַיֵּעָתֵר sin introducir explícitamente ''súplica''; (2) ''lejos de Israel'' se reemplazó por ''de sobre Israel'' para reflejar con mayor fidelidad מֵעַל יִשְׂרָאֵל y evitar una idea de distancia física no presente en el hebreo. También se mejoró שְׁלָמִים a ''sacrificios de paz'' y se limpió la nota alternativa.'
