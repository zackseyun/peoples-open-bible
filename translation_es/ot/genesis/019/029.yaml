base_translation:
  language: en
  yaml_path: translation/ot/genesis/019/029.yaml
  text: So it happened[a], when God destroyed the cities of the plain, that God remembered Abraham and sent Lot out of the midst of the overthrow[d][c][b], when he overthrew the cities in which Lot had lived.
  footnotes:
  - marker: a
    text: Or 'out of the destruction.' The Hebrew uses a noun related to 'overthrow,' echoing the following verb 'when he overthrew.'
    reason: lexical_alternative
  - marker: b
    text: '''God remembered Abraham'' is a Hebrew idiom for God acting with faithful regard toward Abraham, not a suggestion that God had forgotten him.'
    reason: cultural_note
  - marker: c
    text: Or 'And it happened, when God destroyed the cities of the plain, that'.
    reason: previous_rendering
  - marker: d
    text: Or 'out from the midst of'.
    reason: previous_rendering
