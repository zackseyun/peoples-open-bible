translation:
  language: es
  text: 'Y dijo: «Esta es la Maldad», y la arrojó en medio del efa[a], y arrojó la pesa de plomo[b] sobre su abertura[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «efa», una medida seca estándar; aquí designa el recipiente visto en la visión.'
    reason: cultural_note
  - marker: b
    text: Lit. «piedra de plomo»; es decir, un objeto pesado de plomo usado para cerrar el recipiente.
    reason: lexical_alternative
  - marker: c
    text: Lit. «a su boca»; es decir, a la abertura del efa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Y él dijo
  - Entonces dijo
  lexicon: HALOT
  rationale: El verbo de habla se conserva de modo directo y natural en español; el sujeto está implícito en el contexto narrativo, como en el hebreo y en la versión inglesa auditada.
- source_word: הָרִשְׁעָה
  english_pob_choice: Wickedness
  chosen_spanish: la Maldad
  alternatives_spanish:
  - la maldad
  - la impiedad
  lexicon: HALOT
  rationale: El sustantivo abstracto femenino con artículo se entiende aquí como una personificación. «Maldad» con mayúscula permite reflejar esa personificación sin convertirla en una explicación adicional como «mujer malvada».
- source_word: וַיַּשְׁלֵךְ אֹתָהּ
  english_pob_choice: he threw her
  chosen_spanish: la arrojó
  alternatives_spanish:
  - la lanzó
  - la echó
  lexicon: HALOT
  rationale: שׁלך admite «arrojar/lanzar». «Arrojó» mantiene la fuerza del movimiento y suena digno en español bíblico moderno. El pronombre femenino se conserva porque el objeto remite a la figura personificada.
- source_word: תּוֹךְ
  english_pob_choice: the middle of
  chosen_spanish: en medio del
  alternatives_spanish:
  - en el interior de
  - dentro de
  lexicon: HALOT
  rationale: תּוֹךְ expresa interioridad o mitad/médula del espacio. «En medio del» reproduce bien la imagen espacial concreta y coincide con la elección inglesa de mantener la idea de centro/interior.
- source_word: הָאֵיפָה
  english_pob_choice: the ephah basket
  chosen_spanish: el efa
  alternatives_spanish:
  - la canasta efa
  - la vasija efa
  lexicon: HALOT
  rationale: Se conserva «efa» como medida/víscera de la visión, sin añadir «canasta» al texto principal porque el español puede dejar el término técnico y aclararlo en nota. Esto mantiene la conexión con el nombre hebreo y evita sobreinterpretar la forma del recipiente.
- source_word: אֶבֶן הָעֹפֶרֶת
  english_pob_choice: the lead weight
  chosen_spanish: la pesa de plomo
  alternatives_spanish:
  - la piedra de plomo
  - el peso de plomo
  lexicon: HALOT
  rationale: La expresión hebrea literalmente es «piedra de plomo», pero en contexto funciona como objeto pesado para cerrar el recipiente. «Pesa de plomo» comunica la función de peso y se ajusta a la revisión inglesa que prefirió «lead weight» por precisión contextual.
- source_word: פִּיהָ
  english_pob_choice: its opening
  chosen_spanish: su abertura
  alternatives_spanish:
  - su boca
  - su abertura
  lexicon: HALOT
  rationale: פֶּה aplicado a un recipiente puede decirse «boca» o «abertura». Aquí «abertura» resulta natural y claramente refiere al punto superior del efa; el posesivo femenino singular concuerda con el recipiente.
theological_decisions:
- issue: Personificación de la figura llamada «Wickedness/Maldad»
  english_pob_reading: Render the abstract noun as personified 'Wickedness' while retaining feminine pronouns for the figure.
  chosen_spanish_reading: Mantener el sustantivo abstracto personificado como «la Maldad» con pronombre femenino.
  alternative_spanish_readings:
  - «la maldad» sin mayúscula
  - «la mujer malvada»
  rationale: El hebreo identifica a la figura con un sustantivo abstracto, no con una descripción moral expandida. La mayúscula ayuda al lector español a captar la personificación, como lo hace la mayúscula inglesa, sin introducir contenido no explicitado por el texto.
  doctrine_reference: Principios de personificación y fidelidad semántica del proyecto POB
translation_notes:
  revision_awareness: La versión española sigue la lectura inglesa auditada y su revisión más reciente, especialmente en la interpretación contextual de אֶבֶן הָעֹפֶרֶת como «lead weight» y en la aclaración de que הָאֵיפָה es el recipiente de la visión. Se conserva la personificación del abstracto הָרִשְׁעָה sin convertirla en paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma predeterminada solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - «Maldad» se capitaliza únicamente como recurso para señalar personificación, no como cambio de sentido.
  - «Efa» se deja sin glosa en el cuerpo del texto para evitar sobrecarga; la nota explica el término.
  - «Pesa de plomo» refleja la función del objeto y la preferencia revisada en el audit trail inglés.
