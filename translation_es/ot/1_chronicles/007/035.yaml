  lexicon: HALOT
  rationale: Nombre propio en lista genealógica. Se translitera de forma breve y natural en español; la forma refleja la lectura consonántica sin añadir vocales no garantizadas por el hebreo.
- source_word: וְשֵׁלֶשׁ
  english_pob_choice: Shelesh
  chosen_spanish: Selec
  alternatives_spanish:
  - Seles
  - Shelesh
  lexicon: HALOT
  rationale: Nombre propio transliterado con adaptación ortográfica española. Se evita una grafía demasiado inglesa para mantener legibilidad en español.
- source_word: וְעָמָל
