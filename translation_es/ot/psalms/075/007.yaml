  text: כִּ֤י לֹ֣א מִ֭/מּוֹצָא וּ/מִֽ/מַּעֲרָ֑ב וְ֝/לֹ֗א מִ/מִּדְבַּ֥ר הָרִֽים׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/075/007.yaml
  text: For not from the east or from the west[c][b][a], and not from the wilderness comes lifting up.
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'promotion' or 'exaltation.' The Hebrew expression is elliptical and difficult; the sense is clarified by the next verse, where God 'lifts up' one and brings down another.
    reason: lexical_alternative
  - marker: b
    text: The final Hebrew word has also been understood as 'mountains,' giving a sense like 'and not from the wilderness of mountains.' The context, however, favors the meaning 'lifting up' or 'exaltation.'
    reason: alternative_reading
  - marker: c
    text: Or 'or from the west, and not from the wilderness,'.
    reason: previous_rendering
