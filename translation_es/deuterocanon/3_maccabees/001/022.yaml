translation:
  language: es
  text: Junto con esto[a], los que se habían atrevido respecto de los ciudadanos ya no podían soportarlo cuando él insistía del todo y se proponía llevar a cabo su propósito.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que se habían atrevido en favor de los ciudadanos». La frase griega περὶ τῶν πολιτῶν puede señalar el tema de su audacia o una defensa a favor de los ciudadanos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σύν τε τούτοις
  english_pob_choice: Along with these
  chosen_spanish: Junto con esto
  alternatives_spanish:
  - además de esto
  - junto con estas cosas
  lexicon: LSJ
  rationale: La construcción introduce un elemento añadido; en español, "Junto con esto" conserva el valor aditivo sin forzar una frase nominal poco natural.
- source_word: οἱ περὶ τῶν πολιτῶν θρασυνθέντες
  english_pob_choice: those who had become emboldened concerning the citizens
  chosen_spanish: los que se habían atrevido respecto de los ciudadanos
  alternatives_spanish:
  - los que se habían vuelto audaces en favor de los ciudadanos
  - los que habían cobrado ánimo acerca de los ciudadanos
  lexicon: LSJ
  rationale: θρασυνθέντες expresa el volverse audaz/atrevido. "Se habían atrevido" preserva el matiz de osadía; "respecto de los ciudadanos" mantiene la ambigüedad del genitivo con περὶ sin resolverla en una sola dirección.
- source_word: οὐκ ἠνείχοντο
  english_pob_choice: could no longer endure it
  chosen_spanish: ya no lo soportaban plenamente
  alternatives_spanish:
  - ya no lo toleraban
  - no podían seguir soportándolo
  lexicon: LSJ
  rationale: El imperfecto medio sugiere una incapacidad continua de soportarlo. "Ya no lo soportaban plenamente" refleja la duración y el alcance del rechazo con un español fluido.
- source_word: τέλεον
  english_pob_choice: fully
  chosen_spanish: plenamente
  alternatives_spanish:
  - completamente
  - del todo
  lexicon: LSJ
  rationale: El adverbio intensifica la presión o insistencia; "plenamente" reproduce esa intensificación sin sonar excesivamente mecánico.
- source_word: αὐτοῦ ἐπικειμένου
  english_pob_choice: when he persisted fully
  chosen_spanish: cuando él persistía con insistencia
  alternatives_spanish:
  - cuando él insistía
  - cuando él seguía presionando
  lexicon: LSJ
  rationale: ἐπίκειμαι puede expresar insistencia o presión sostenida. "Persistía con insistencia" conserva el sentido de continuidad y urgencia que la revisión inglesa destacó.
- source_word: τὸ τῆς προθέσεως ἐκπληροῦν
  english_pob_choice: to carry out his purpose
  chosen_spanish: llevar a cabo su propósito
  alternatives_spanish:
  - cumplir su intención
  - realizar su plan
  lexicon: LSJ
  rationale: πρόθεσις aquí es una intención o plan deliberado; "llevar a cabo su propósito" es una equivalencia natural y fiel para el español bíblico contemporáneo.
- source_word: διανοουμένου
  english_pob_choice: intended
  chosen_spanish: pensaba
  alternatives_spanish:
  - tenía la intención
  - se proponía
  lexicon: LSJ
  rationale: El participio indica intención deliberada. "Pensaba" suaviza el verbo auxiliar, pero en combinación con "llevar a cabo su propósito" sigue transmitiendo una resolución consciente y estable.
translation_notes:
  revision_awareness: Alineé el giro final con la revisión inglesa que prefirió reflejar mejor αὐτοῦ ἐπικειμένου con una idea de persistencia; en español opté por "persistía con insistencia" para mantener ese matiz sin volverlo técnico. También conservé la ambigüedad de περὶ τῶν πολιτῶν con una nota alternativa, y evité traducir mecánicamente el imperfecto y el infinitivo final para que la oración resulte natural.
  spanish_consistency_notes:
  - Usé "Dios"/"Yahvé" según no aplica en este verso; no hay términos divinos aquí.
  - Mantuve "propósito" para πρόθεσις por coherencia con el audit trail inglés y porque en este contexto no requiere un término técnico distinto.
  - Elegí una sintaxis continua en español para reflejar la progresión del griego sin añadir elementos interpretativos innecesarios.
