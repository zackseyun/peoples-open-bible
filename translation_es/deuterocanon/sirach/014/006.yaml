review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: una persona mala para sí misma no tiene a nadie peor que ella, y eso mismo es el pago de su mal. También preserva correctamente la nota de matiz griego sobre alguien mezquino aun consigo mismo. Sin embargo, la apertura con «Porque» no está sustentada por el texto fuente, y «su maldad» debilita la repetición léxica de רע que el inglés POB procuró conservar con «evil ... evil».'
  spanish_quality_summary: El texto es legible y digno, pero puede pulirse para mayor fidelidad y naturalidad sentenciosa. «El que es malo para sí mismo» funciona en español, aunque algo marcado; sigue bien la decisión del POB. Quitar «Porque» mejora la forma proverbial. En la última cláusula, «su mal» es más cercano al hebreo y preserva mejor la repetición que «su maldad».
  glossary_alignment: No hay términos del glosario principal en juego salvo la consistencia con la decisión léxica del POB de mantener רע como «evil». En español, «malo ... malo ... mal» conserva mejor esa red léxica que «malo ... malo ... maldad». La nota al pie es aceptable; «se envidia a sí mismo» suena menos probable que «se escatima a sí mismo», pero como alternativa griega secundaria no exige adjudicación mayor.
  issues:
  - severity: medium
    issue: «Porque» añade un vínculo causal no presente en el hebreo.
    rationale: El texto fuente es una sentencia nominal/proverbial, no una cláusula introducida por conjunción causal. En español conviene empezar directamente con «El que...».
  - severity: medium
    issue: «su maldad» no reproduce tan bien la repetición del término רע como «su mal».
    rationale: El inglés auditado preservó deliberadamente «evil ... evil». Aunque «maldad» es idiomática, «mal» mantiene mejor el eco léxico del hebreo y sigue siendo natural en esta construcción proverbial.
  revised_spanish_text: El que es malo para sí mismo[a], no hay ninguno más malo que él; y esta es la retribución de su mal.
  revised_footnotes:
  - marker: a
    text: 'Griego: «el que se envidia a sí mismo» o «el que es avaro consigo mismo», lo que hace explícito el sentido de una mezquindad dirigida a uno mismo.'
    reason: lexical_alternative
  revision_rationale: Se eliminó «Porque» porque no corresponde al texto fuente. Se cambió «su maldad» por «su mal» para conservar mejor la repetición de רע / «mal» presente en el hebreo y en la decisión léxica del POB. Se mantuvo la nota griega porque preserva adecuadamente el matiz alternativo de mezquindad hacia uno mismo.
