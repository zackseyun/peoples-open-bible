review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura condicional del hebreo y conserva la doble afirmación teológica clave: la persona es tomada por su propia culpa y, aun así, Dios exige responsabilidad al centinela. También preserva adecuadamente la imagen de la espada, la trompeta y la sangre. Sin embargo, hay dos desajustes importantes con el expediente POB: (1) el inglés auditado prefirió el sentido pasivo de וְהָעָם לֹא נִזְהָר, y en español eso se mantiene bien, pero conviene conservar en nota la alternativa ''no toma advertencia'' como en el POB; (2) בַּעֲוֺנוֹ fue auditado como ''in his iniquity'', y ''por su iniquidad'' inclina más a causalidad que a la expresión compacta hebrea que el POB quiso preservar.'
  spanish_quality_summary: El español es claro y legible. 'Centinela' funciona, pero en Ezequiel 'atalaya' es la opción más natural, bíblicamente establecida y mejor alineada con la metáfora profética recurrente del capítulo. Además, 'esa persona es tomada' suena algo rígido; 'ese' o 'esa persona' puede mantenerse, pero la combinación con 'en su iniquidad' mejora si se usa 'esa persona es tomada en su iniquidad'.
  glossary_alignment: 'No hay términos del glosario mayor en conflicto directo. La principal cuestión terminológica interna es הַצֹּפֶה: aunque ''centinela'' es posible, ''atalaya'' encaja mejor con el uso profético tradicional y con la red metafórica de Ezequiel 33. También conviene alinear la nota con la alternativa léxica documentada para נִזְהָר y conservar más de cerca ''en su iniquidad''.'
  issues:
  - severity: medium
    issue: '''centinela'' para הַצֹּפֶה'
    rationale: Es defendible, pero en Ezequiel 33 la metáfora profética de 'watchman' se expresa de manera más natural y reconocible en español bíblico como 'atalaya'. Esto mejora cohesión intratextual y tono eclesial sin perder claridad.
  - severity: medium
    issue: '''por su iniquidad'' para בַּעֲוֺנוֹ'
    rationale: La auditoría inglesa eligió 'in his iniquity' para conservar la expresión compacta moral-covenantal del hebreo. 'Por' desplaza el matiz hacia una explicación causal más explícita de lo que el texto exige. 'En su iniquidad' preserva mejor la tensión teológica documentada.
  - severity: low
    issue: Falta la alternativa de nota para לֹא נִזְהָר
    rationale: El POB inglés conserva explícitamente la posibilidad 'do not take warning'. El español debería reflejar esa alternativa en nota para no perder la ambigüedad léxica auditada.
  - severity: low
    issue: La nota b actual no refleja la nota cultural del POB sobre 'su sangre'
    rationale: La nota inglesa b explica el modismo jurídico 'his blood ... from the watchman's hand'. La nota española actual comenta más bien 'por su iniquidad', pero el expediente auditado preserva la aclaración legal sobre la sangre. Conviene trasladar esa nota al lugar correspondiente.
  revised_spanish_text: Pero si el atalaya ve venir la espada y no toca la trompeta, y el pueblo no es advertido[a], y viene la espada y quita una vida de entre ellos, esa persona es tomada en su iniquidad, pero yo exigiré su sangre[b] de la mano del atalaya.
  revised_footnotes:
