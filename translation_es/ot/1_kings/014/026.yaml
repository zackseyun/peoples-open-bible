translation:
  language: es
  text: Tomó los tesoros de la casa de Yahvé y los tesoros de la casa del rey; tomó todo[a]. También tomó todos los escudos de oro que había hecho Salomón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «la casa de Yahvé»; es decir, el templo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח / לָקָח
  english_pob_choice: he took
  chosen_spanish: tomó
  alternatives_spanish:
  - se llevó
  - arrebató
  lexicon: HALOT
  rationale: El verbo hebreo לקח es básico y reiterado; en este contexto narrativo, «tomó» reproduce bien la acción y mantiene el paralelismo con la repetición del original sin cargar una fuerza excesiva como «arrebató».
- source_word: אֹצְרוֹת
  english_pob_choice: treasures
  chosen_spanish: tesoros
  alternatives_spanish:
  - almacenes
  - tesorerías
  lexicon: HALOT
  rationale: Aquí el objeto tomado son los bienes valiosos, no el edificio. «Tesoros» es el equivalente natural en español y conserva el sentido inmediato del pasaje.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  lexicon: HALOT
  rationale: Se conserva la expresión literal «casa de Yahvé» para reflejar el hebreo בית יהוה y mantener la conexión con el nombre divino, sin sustituirlo por una paráfrasis eclesiástica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se translitera el Tetragrámaton como «Yahvé» conforme a la convención del proyecto, preservando el nombre propio divino en lugar de ocultarlo tras un título.
- source_word: בֵּית הַמֶּלֶךְ
  english_pob_choice: the king’s house
  chosen_spanish: la casa del rey
  alternatives_spanish:
  - el palacio del rey
  - la residencia real
  lexicon: HALOT
  rationale: «La casa del rey» sigue de cerca la forma hebrea y sigue siendo inteligible en español; en contexto se entiende como la residencia real.
- source_word: וְאֶת הַכֹּל לָקָח
  english_pob_choice: he took everything
  chosen_spanish: tomó todo
  alternatives_spanish:
  - y tomó todo
  - tomó todo cuanto había
  lexicon: HALOT
  rationale: La cláusula es totalizante y enfática. «Tomó todo» comunica la exhaustividad sin añadir matices ajenos al hebreo.
- source_word: מָגִנֵּי הַזָּהָב
  english_pob_choice: the gold shields
  chosen_spanish: los escudos de oro
  alternatives_spanish:
  - los escudos dorados
  - los escudos de oro fino
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «escudos de oro». En español, «escudos de oro» es fiel y natural; evita convertirlo en adjetivo estilístico («dorados») que podría suavizar la materialidad del objeto.
- source_word: אֲשֶׁר עָשָׂה שְׁלֹמֹה
  english_pob_choice: that Solomon had made
  chosen_spanish: que había hecho Salomón
  alternatives_spanish:
  - que Salomón hizo
  - que Salomón había fabricado
  lexicon: HALOT
  rationale: El pluscuamperfecto español «había hecho» refleja bien la anterioridad del acto de Salomón respecto a la acción de tomar, y «hecho» conserva la neutralidad del hebreo עשה.
theological_decisions:
- issue: Traducción del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se adopta «Yahvé» para conservar el nombre propio del pacto y evitar la sustitución por un título. Esta decisión sigue la línea auditada del POB inglés y la política terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El borrador coincide con el testimonio hebreo y con la decisión inglesa auditada: verbo repetido de toma, referencia doble a los tesoros, y correspondencia totalizante en הַכֹּל. No se introducen cambios textuales respecto del contexto de revisión más reciente, que no requirió correcciones.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se conserva el paralelismo verbal con «tomó ... tomó».
  - «Casa» se usa de manera literal para בית, con nota explicativa solo donde el español podría entenderlo como residencia y no como templo.
  - «Escudos de oro» reproduce la materialidad del hebreo sin embellecimiento interpretativo.
