translation:
  language: es
  text: Pero que nuestra fuerza sea ley de justicia[a], porque lo que es débil se muestra inútil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ley de rectitud». El griego δικαιοσύνη puede denotar tanto justicia como rectitud.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔστω
  english_pob_choice: let ... be
  chosen_spanish: sea
  alternatives_spanish:
  - que sea
  - sea de
  lexicon: LSJ
  rationale: El imperativo de tercera persona de εἰμί se expresa de forma natural en español con «sea», que conserva el tono exhortativo sin añadir matices innecesarios.
- source_word: ἰσχὺς
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - fortaleza
  - poder
  lexicon: LSJ
  rationale: ἰσχύς puede significar fuerza o vigor. «Fuerza» es claro, breve y abarca bien la idea general sin especificar dominio militar o político.
- source_word: νόμος
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - norma
  - regla
  lexicon: LSJ
  rationale: νόμος en este contexto funciona como principio rector o norma gobernante. «Ley» conserva la dureza y el carácter programático de la afirmación.
- source_word: δικαιοσύνης
  english_pob_choice: justice
  chosen_spanish: de la justicia
  alternatives_spanish:
  - de la rectitud
  - de la justicia recta
  lexicon: LSJ
  rationale: Aunque el proyecto suele favorecer «justicia» para δικαιοσύνη, aquí la construcción «ley de la justicia» suena natural y mantiene el valor social y normativo del término en el contexto.
- source_word: ἀσθενές
  english_pob_choice: what is weak
  chosen_spanish: lo que es débil
  alternatives_spanish:
  - la cosa débil
  - lo débil
  lexicon: LSJ
  rationale: El neutro sustantivado requiere una forma general. «Lo que es débil» conserva la abstracción del griego y su alcance proverbial.
- source_word: ἄχρηστον
  english_pob_choice: useless
  chosen_spanish: inútil
  alternatives_spanish:
  - sin provecho
  - de nada sirve
  lexicon: LSJ
  rationale: ἄχρηστος significa no útil, sin utilidad. «Inútil» es el equivalente más natural en español moderno y mantiene el juicio despectivo del enunciado.
- source_word: ἐλέγχεται
  english_pob_choice: is shown to be useless
  chosen_spanish: se muestra
  alternatives_spanish:
  - se demuestra
  - queda probado
  lexicon: LSJ
  rationale: ἐλέγχω puede expresar mostrar, refutar o poner de manifiesto. «Se muestra» sigue de cerca la revisión inglesa y evita imponer un matiz judicial que el contexto no exige.
theological_decisions:
- issue: Cómo traducir δικαιοσύνη en un dicho de los impíos
  english_pob_reading: justice
  chosen_spanish_reading: la justicia
  alternative_spanish_readings:
  - la rectitud
  - la justicia como norma
  rationale: La frase pretende sustituir el orden moral por la fuerza. En español, «ley de la justicia» comunica de modo directo esa perversión del orden justo sin ocultar la tensión lexical del término.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → justice/righteousness según contexto'
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que prefirió «justice» y «shown to be useless»; en español se reflejan esos ajustes con «ley de la justicia» y «se muestra inútil», manteniendo la equivalencia óptima sin perder el valor proverbial del griego.
  spanish_consistency_notes:
  - Se conserva el registro sapiencial y sentencioso del versículo.
  - «Fuerza» y «ley» mantienen la dureza del planteamiento de los impíos.
  - No se introdujo lenguaje eclesiástico ajeno al griego; se prefirió un español transparente y publicable.
