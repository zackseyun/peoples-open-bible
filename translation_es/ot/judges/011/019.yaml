base_translation:
  language: en
  yaml_path: translation/ot/judges/011/019.yaml
  text: Then Israel sent messengers to Sihon king of the Amorites[a], king of Heshbon, and Israel said to him[b], “Please let us pass through your land to our place.”
  footnotes:
  - marker: a
    text: Or “to my own place,” with Israel speaking as a collective singular. Compare the parallel request in Numbers 21:22, which reads “to my place” in the Hebrew tradition here reflected.
    reason: cross_reference
  - marker: b
    text: “Messengers” could also be rendered “envoys” in this diplomatic setting.
    reason: lexical_alternative
