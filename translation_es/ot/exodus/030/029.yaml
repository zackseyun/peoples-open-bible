translation:
  language: es
  text: Los consagrarás, y serán santísimos. Todo lo que los toque quedará santo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «será santo» o «será consagrado». El hebreo puede denotar llegar a ser santo por contacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקִדַּשְׁתָּ
  english_pob_choice: You shall consecrate
  chosen_spanish: Los consagrarás
  alternatives_spanish:
  - Los santificarás
  - Los harás santos
  lexicon: HALOT
  rationale: קִדַּשְׁתָּ en piel expresa poner aparte para uso sagrado; en español bíblico y contemporáneo, 'consagrar' comunica ese acto cultual con naturalidad y sin caer en un calco de 'santificar' que puede sonar menos preciso en este contexto ritual.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - los mismos
  - a ellos
  lexicon: Pronombre directo
  rationale: El pronombre retoma los objetos sagrados del contexto inmediato; 'los' conserva la referencia objetiva y la fluidez del español.
- source_word: וְהָיוּ
  english_pob_choice: and they shall be
  chosen_spanish: y serán
  alternatives_spanish:
  - y quedarán
  - y estarán
  lexicon: HALOT
  rationale: La forma copulativa/resultativa se expresa de modo natural con el futuro simple en español, manteniendo la secuencia instructiva del hebreo.
- source_word: קֹדֶשׁ קָדָשִׁים
  english_pob_choice: most holy
  chosen_spanish: cosa santísima
  alternatives_spanish:
  - santísimo
  - lo más santo
  - santidad de santidades
  lexicon: HALOT
  rationale: La construcción superlativa hebrea se vierte con un superlativo idiomático en español. 'Cosa santísima' preserva el carácter predicativo y evita una expresión más espacial como 'santo de santos'.
- source_word: כָּל
  english_pob_choice: Whatever
  chosen_spanish: Todo el que
  alternatives_spanish:
  - Cualquiera que
  - Todo lo que
  lexicon: HALOT
  rationale: Con el participio siguiente, el alcance es genérico. En español, 'Todo el que' permite incluir personas o, por extensión cultual, cualquier sujeto que entre en contacto, sin restringir prematuramente el referente.
- source_word: הַנֹּגֵעַ
  english_pob_choice: touches
  chosen_spanish: toque
  alternatives_spanish:
  - toca
  - entra en contacto con
  lexicon: HALOT
  rationale: El participio נֹגֵעַ funciona aquí como una cláusula genérica; 'toque' conserva ese matiz y suena natural tras 'Todo el que'.
- source_word: בָּהֶם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - en ellos
  - a ellos
  lexicon: Pronombre con preposición
  rationale: La preposición con sufijo remite a los objetos consagrados mencionados; en español se expresa con complemento directo en la cláusula verbal 'los toque', que absorbe el valor referencial del hebreo.
- source_word: יִקְדָּשׁ
  english_pob_choice: shall become holy
  chosen_spanish: quedará consagrado
  alternatives_spanish:
  - será santo
  - será consagrado
  lexicon: HALOT
  rationale: El imperfecto qal de קדשׁ aquí es resultativo/incoativo. 'Quedará consagrado' expresa el cambio de estado sin decidir más de la cuenta entre un valor benéfico o restrictivo, preservando la tensión teológica documentada en la POB inglesa.
theological_decisions:
- issue: Efecto de la santidad por contacto
  english_pob_reading: The clause states that contact with these consecrated items renders the toucher holy, without specifying whether this holiness is beneficial, dangerous, or restricted by later qualifications.
  chosen_spanish_reading: El contacto con estos objetos consagrados hace que quien los toque quede consagrado, sin precisar si esa consagración es benéfica, peligrosa o limitada por otras normas rituales.
  alternative_spanish_readings:
  - queda santo
  - queda santificado
  - entra en la esfera de la santidad
  rationale: La traducción evita resolver la tensión interpretativa. 'Quedará consagrado' mantiene el dato textual de un cambio de estado, a la vez que deja abierta la valoración teológica exacta, conforme al enfoque de la POB.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con la última revisión disponible: sin cambios necesarios y con alto grado de acuerdo en el control cruzado.'
  spanish_consistency_notes:
  - Se mantiene 'consagrar' para קדשׁ en sentido cultual, coherente con la preferencia del proyecto por preservar el valor técnico del término.
  - '''cosa santísima'' reproduce la superlación hebrea sin introducir una expresión litúrgica ajena al predicado del versículo.'
  - La nota textual conserva la tensión entre 'ser santo' y 'ser consagrado' sin imponer una interpretación teológica única.
  - Se usa un registro bíblico claro y moderno, evitando calcos innecesarios y evitando 'SEÑOR' o 'Cristo', que no aplican aquí.
