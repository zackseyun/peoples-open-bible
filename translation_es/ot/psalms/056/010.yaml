translation:
  language: es
  text: Entonces mis enemigos volverán atrás en el día en que yo clame. Esto lo sé[a], que Dios está a mi favor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por esto sé que Dios está a mi favor». El hebreo permite también una lectura instrumental de זֶה («por esto»).'
    reason: alternative_reading
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Marca la consecuencia temporal del clamor del salmista; «Entonces» conserva la secuencia lógica y suena natural en español.
- source_word: יָשׁוּבוּ
  english_pob_choice: will turn back
  chosen_spanish: volverán atrás
  alternatives_spanish:
  - se retirarán
  - volverán
  lexicon: HALOT
  rationale: Con אָחוֹר, el hebreo expresa retroceso o retirada; «volverán atrás» mantiene la idea de reversión y derrota.
- source_word: אוֹיְבַי
  english_pob_choice: my enemies
  chosen_spanish: mis enemigos
  alternatives_spanish:
  - los que me hostigan
  - mis adversarios
  lexicon: HALOT
  rationale: Es el equivalente directo y transparente del posesivo + sustantivo.
- source_word: אָחוֹר
  english_pob_choice: back
  chosen_spanish: atrás
  alternatives_spanish:
  - hacia atrás
  - en retirada
  lexicon: HALOT
  rationale: Funciona como complemento adverbial de movimiento; «atrás» es breve y fiel al giro idiomático.
- source_word: בְּיוֹם
  english_pob_choice: in the day
  chosen_spanish: en el día en que
  alternatives_spanish:
  - el día en que
  - cuando
  lexicon: HALOT
  rationale: El hebreo conserva una referencia temporal concreta; «en el día en que» refleja la preposición sin perder naturalidad.
- source_word: אֶקְרָא
  english_pob_choice: I call
  chosen_spanish: yo clame
  alternatives_spanish:
  - yo llame
  - yo clame a Dios
  lexicon: HALOT
  rationale: En contexto de oración, קרא puede implicar clamor; se eligió el subjuntivo en la subordinada temporal para expresar el momento de la invocación sin añadir objeto ausente en el hebreo.
- source_word: זֶה יָדַעְתִּי
  english_pob_choice: This I know
  chosen_spanish: Esto lo sé
  alternatives_spanish:
  - Esto sé
  - By this I know -> Por esto sé
  lexicon: HALOT
  rationale: El hebreo admite lectura deíctica e instrumental. Aquí se adopta la lectura deíctica, como en la línea principal inglesa, y el español la expresa con claridad y sencillez.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Introduce el contenido conocido; «que» es la subordinación más natural en español.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: HALOT
  rationale: Término estándar para אֱלֹהִים en este contexto singular y personal.
- source_word: לִי
  english_pob_choice: for me
  chosen_spanish: para mí
  alternatives_spanish:
  - de mi parte
  - a mi favor
  lexicon: HALOT
  rationale: La partícula ל con pronombre expresa apoyo o favor; «para mí» conserva el sentido de respaldo divino sin convertirlo en posesión.
theological_decisions:
- issue: Sentido de לִי en la afirmación final
  english_pob_reading: Divine support/favor toward the psalmist
  chosen_spanish_reading: Dios está para mí, es decir, a mi favor
  alternative_spanish_readings:
  - Dios me pertenece
  - Dios es mío
  rationale: El contexto de enemigos que retroceden por el clamor apunta a apoyo divino, no a posesión. El español «para mí» puede sonar abreviado; por eso se formuló como «está para mí» para preservar la relación de apoyo/favor.
  doctrine_reference: Salmo 118:6; Romanos 8:31
translation_notes:
  revision_awareness: 'Se siguió la lectura principal del audit trail inglés (deíctica: «This I know») pero se preservó en nota la alternativa instrumental documentada («By this I know»). También se alineó בְּיוֹם con una solución temporal más cercana al hebreo, sin traducir mecánicamente al español con una forma que sonara extraña.'
  spanish_consistency_notes:
  - Se usó «Yahvé» para el Tetragrámaton cuando no está presente; aquí el versículo habla de אֱלֹהִים, por lo que se tradujo «Dios».
  - Se evitó «SEÑOR» como sustituto teológico no presente en el hebreo.
  - Se mantuvo la distinción entre clamar/llamar como posible valor de קרא, optando por «clame» por el contexto de oración.
  - La construcción «Dios está para mí» preserva el valor de apoyo/favor señalado por el audit trail inglés, sin forzar una lectura posesiva.
