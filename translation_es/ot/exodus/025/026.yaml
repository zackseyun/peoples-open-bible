translation:
  language: es
  text: Y le harás cuatro anillos de oro, y pondrás los anillos sobre las cuatro esquinas[a] que están junto a sus cuatro patas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los cuatro lados» o «los cuatro bordes» para «las cuatro esquinas».
    reason: lexical_alternative
  - marker: b
    text: O «sus cuatro pies»; la palabra hebrea puede significar «pies» o «patas» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  english_pob_choice: And you shall make
  chosen_spanish: Y harás
  alternatives_spanish:
  - Y harás de
  - Y harás para
  lexicon: HALOT
  rationale: La forma verbal tiene fuerza de mandato en una instrucción artesanal. En español, «harás» conserva el valor directivo sin sonar mecánico; el prefijo conjuntivo se refleja con «Y».
- source_word: לּוֹ
  english_pob_choice: for it
  chosen_spanish: para él
  alternatives_spanish:
  - para ello
  - para él/ella
  lexicon: HALOT
  rationale: El sufijo pronominal es masculino singular y se refiere al mueble mencionado en el contexto. En español, tratarlo como «él» sigue la referencia gramatical tradicional del objeto singular; «para ello» sería posible, pero menos transparente respecto del antecedente.
- source_word: אַרְבַּע טַבְּעֹת זָהָב
  english_pob_choice: four gold rings
  chosen_spanish: cuatro anillos de oro
  alternatives_spanish:
  - cuatro aros de oro
  - cuatro anillos dorados
  lexicon: HALOT
  rationale: טַבְּעֹת designa anillos/aros; «anillos de oro» reproduce bien la relación material sin perder naturalidad en español. «Aros» es posible, pero «anillos» mantiene mejor la correspondencia léxica general.
- source_word: וְנָתַתָּ
  english_pob_choice: and you shall put
  chosen_spanish: y pondrás
  alternatives_spanish:
  - y colocarás
  - y ponerás
  lexicon: HALOT
  rationale: Para נתן en contexto de colocación física, «poner»/«ponerás» es la equivalencia más directa y natural; «pondrás» conserva el mandato en estilo bíblico sobrio.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  - encima de
  lexicon: HALOT
  rationale: «Sobre» expresa con claridad la colocación física de los anillos respecto de las esquinas, sin forzar una lectura espacial más precisa de la que da el hebreo.
- source_word: אַרְבַּע הַפֵּאֹת
  english_pob_choice: the four corners
  chosen_spanish: las cuatro esquinas
  alternatives_spanish:
  - los cuatro lados
  - los cuatro bordes
  lexicon: HALOT
  rationale: פֵּאָה puede ser lado, borde o esquina. En este pasaje de mobiliario, «esquinas» sigue la decisión inglesa y comunica bien el punto de fijación.
- source_word: אֲשֶׁר לְאַרְבַּע רַגְלָיו
  english_pob_choice: that are at its four feet
  chosen_spanish: que están junto a sus cuatro patas
  alternatives_spanish:
  - que están en sus cuatro pies
  - que pertenecen a sus cuatro patas
  lexicon: HALOT
  rationale: רֶגֶל puede significar pie o pata según contexto. Para un mueble, «patas» es lo más natural en español; «junto a» refleja la relación de ubicación sin imponer que las esquinas sean idénticas a las patas.
translation_notes:
  revision_awareness: La versión inglesa auditada mantiene el versículo sin revisiones de contenido; se conservan sus mismas decisiones léxicas principales (rings/corners/feet) en una formulación española natural y precisa.
  spanish_consistency_notes:
  - Se mantiene la traducción de referencia divina/teológica fuera de este versículo, sin necesidad de intervención.
  - Se evita «pies» porque en español mobiliario «patas» resulta más claro y acorde al contexto, aunque el hebreo permita ambos valores.
  - Se usa puntuación coordinada estándar del español para reproducir la secuencia de mandatos.
