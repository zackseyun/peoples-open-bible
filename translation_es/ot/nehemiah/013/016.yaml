review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la estructura básica del hebreo: los tirios residían en Jerusalén, traían pescado y mercancía, y las vendían en sábado a la población de Judá y en Jerusalén. Sin embargo, dos elecciones debilitan la fidelidad idiomática y semántica: «vendiéndolos» concuerda bien con «pescado» pero suena forzado respecto de «mercadería» singular colectivo; y «en sábado» resulta menos natural y menos definido que el hebreo בַּשַּׁבָּת, que aquí se expresa mejor como «en el sábado» o más naturalmente «el sábado».'
  spanish_quality_summary: El texto es generalmente claro y legible, pero requiere pulido menor para sonar natural en español eclesial contemporáneo. «Mercadería» es comprensible, aunque «mercancía» suele ser más ampliamente natural en español neutral. La secuencia «vendiéndolos en sábado» suena algo rígida; «vendiéndolo el sábado» mejora la concordancia colectiva, aunque la mejor solución es reformular sin pronombre explícito.
  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. El etnónimo «tirios» es correcto; «Judá» y «Jerusalén» están bien. La decisión de no explicitar el matiz enfático de «y en Jerusalén» en el texto principal y dejarlo en nota es coherente con el rastro de auditoría inglés.
  issues:
  - severity: medium
    issue: «vendiéndolos» suena discordante con «mercadería» como singular colectivo
    rationale: El pronombre plural remite con naturalidad a «pescado», pero menos a «mercadería». El hebreo simplemente continúa con un participio «vendiendo», y en español puede conservarse mejor sin pronombre explícito.
  - severity: medium
    issue: «en sábado» es menos natural que «el sábado» en este contexto
    rationale: Aunque comprensible, «en sábado» suena marcado. El hebreo definido בַּשַּׁבָּת se refleja más idiomáticamente como «el sábado» en español general.
  - severity: low
    issue: «mercadería» es aceptable pero menos neutral que «mercancía»
    rationale: Para un español latinoamericano amplio, «mercancía» suele ser la opción más extendida y natural; además preserva bien el singular colectivo.
  revised_spanish_text: También los tirios vivían en ella, trayendo pescado y toda clase de mercancía[a], y vendiendo el sábado a la gente de Judá y en Jerusalén[b].
