translation:
  language: es
  text: Pero toda ciudad o región en su totalidad que no obre conforme a estas órdenes será consumida con lanza y fuego, con ira[a]; no solo quedará intransitable para los hombres[b], sino que también será hecha sumamente detestable, aun para los animales salvajes y las aves, por todo tiempo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por lanza y fuego». El griego δόρατι significa literalmente «lanza»; algunas traducciones lo generalizan a «espada».
    reason: lexical_alternative
  - marker: b
    text: «Los hombres» traduce un plural masculino usado de modo genérico para los seres humanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶσα ... πόλις ἢ χώρα τὸ σύνολον
  english_pob_choice: every city or region as a whole
  chosen_spanish: toda ciudad o región, en su totalidad
  alternatives_spanish:
  - toda ciudad o distrito en su totalidad
  - toda ciudad o tierra en conjunto
  lexicon: LSJ
  rationale: πᾶσα con πόλις ἢ χώρα mantiene una distribución de «toda ciudad o región», y τὸ σύνολον intensifica la totalidad. «En su totalidad» conserva esa énfasis sin volver la frase artificial en español.
- source_word: κατὰ ταῦτα
  english_pob_choice: according to these orders
  chosen_spanish: conforme a estas órdenes
  alternatives_spanish:
  - según estas cosas
  - de acuerdo con este decreto
  lexicon: LSJ
  rationale: El contexto es un mandato real; «órdenes» hace explícito el referente del plural griego y suena natural en español jurídico.
- source_word: μὴ ποιήσῃ
  english_pob_choice: does not act
  chosen_spanish: no obre
  alternatives_spanish:
  - no haga
  - no cumpla
  lexicon: LSJ
  rationale: ποιέω expresa aquí hacer/cumplir lo mandado. «Obre» conserva el valor de conducta o ejecución de una orden y evita una repetición áspera de «hacer».
- source_word: δόρατι καὶ πυρὶ
  english_pob_choice: with spear and fire
  chosen_spanish: con lanza y fuego
  alternatives_spanish:
  - con spear y fuego
  - por lanza y fuego
  lexicon: LSJ
  rationale: δόρατι significa literalmente «lanza» o «asta»; se preserva el arma concreta en vez de suavizarla a «espada». «Con» mantiene el valor instrumental.
- source_word: καταναλωθήσεται μετʼ ὀργῆς
  english_pob_choice: will be consumed ... in wrath
  chosen_spanish: será consumida ... en ira
  alternatives_spanish:
  - será destruida ... con ira
  - será devorada ... en ira
  lexicon: LSJ
  rationale: καταναλίσκω comunica ser consumido o destruido; «consumida» conserva la imagen. μετʼ ὀργῆς se traduce «en ira» para expresar el estado o modo de la acción punitiva.
- source_word: ἄβατος
  english_pob_choice: impassable
  chosen_spanish: inaccesible
  alternatives_spanish:
  - impracticable
  - intransitable
  lexicon: LSJ
  rationale: ἄβατος significa que no puede ser transitado o recorrido. En español, «inaccesible» transmite bien la idea de un lugar vedado o imposible de entrar.
- source_word: ἀνθρώποις
  english_pob_choice: men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - la humanidad
  lexicon: LSJ
  rationale: El dativo plural masculino funciona genéricamente para seres humanos. Se conserva ese rasgo con «los hombres», siguiendo la distinción documental del texto fuente.
- source_word: θηρίοις καὶ πετεινοῖς
  english_pob_choice: wild animals and birds
  chosen_spanish: los animales salvajes y las aves
  alternatives_spanish:
  - las fieras y las aves
  - los animales y las aves
  lexicon: LSJ
  rationale: θηρία son bestias o animales salvajes; πετεινά son aves o criaturas voladoras. «Animales salvajes y aves» es claro y mantiene la oposición.
- source_word: εἰς τὸν ἅπαντα χρόνον
  english_pob_choice: for all time
  chosen_spanish: por todo el tiempo
  alternatives_spanish:
  - para siempre
  - por toda la duración
  lexicon: LSJ
  rationale: La expresión indica duración continua y solemne. «Por todo el tiempo» conserva la literalidad relativa sin sobreinterpretar el alcance.
- source_word: ἔχθιστος κατασταθήσεται
  english_pob_choice: will be made ... most hateful
  chosen_spanish: será hecha ... la más odiosa
  alternatives_spanish:
  - será hecha ... la más detestable
  - será establecida ... como la más odiosa
  lexicon: LSJ
  rationale: ἔχθιστος es superlativo de odio/repugnancia. «La más odiosa» mantiene esa intensidad; «será hecha» refleja el pasivo causativo de κατασταθήσεται.
theological_decisions:
- issue: Masculino genérico en ἀνθρώποις
  english_pob_reading: men
  chosen_spanish_reading: los hombres
  alternative_spanish_readings:
  - las personas
  - la humanidad
  rationale: La forma griega es masculina plural con valor genérico. En español, «los hombres» conserva ese dato formal sin perder el sentido inclusivo de humanidad en general.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Instrumento de destrucción en δόρατι
  english_pob_reading: spear
  chosen_spanish_reading: lanza
  alternative_spanish_readings:
  - asta
  - arma arrojadiza
  rationale: La primacía del texto original favorece el arma específica mencionada por el griego. Se evita sustituirla por «espada», que sería una generalización tradicional no apoyada por el término aquí usado.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
translation_notes:
  revision_awareness: El control cruzado indicó alta concordancia (1.0) y no registró cambios de revisión; por ello la redacción sigue de cerca el griego y conserva las decisiones léxicas ya validadas en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiera; en este versículo no aparece el nombre divino.
  - Se eligió «lanza» para δόρατι en vez de una generalización tradicional a «espada», siguiendo la prioridad del original griego.
  - Se preserva la intensidad de ἔχθιστος con «la más odiosa» y el pasivo causativo con «será hecha».
