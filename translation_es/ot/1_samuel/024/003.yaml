translation:
  language: es
  text: Entonces Saúl tomó tres mil hombres escogidos de todo Israel y fue a buscar a David y a sus hombres frente a las peñas de las cabras monteses[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las peñas de los íbices»; el animal puede ser específicamente el íbice.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - llevó consigo
  - reclutó
  lexicon: HALOT
  rationale: En este contexto narrativo, לקח expresa que Saúl reunió o llevó consigo a sus hombres para la expedición. «Tomó» conserva la relación verbal directa y es natural en español.
- source_word: שְׁלֹשֶׁת אֲלָפִים אִישׁ בָּחוּר
  english_pob_choice: three thousand chosen men
  chosen_spanish: tres mil hombres escogidos
  alternatives_spanish:
  - tres mil soldados escogidos
  - tres mil hombres seleccionados
  lexicon: HALOT
  rationale: La expresión hebrea combina el número con «hombres» y el adjetivo «escogidos»/«de élite»; en español «hombres escogidos» conserva el sentido militar sin añadir más que el texto exige.
- source_word: מִכָּל יִשְׂרָאֵל
  english_pob_choice: from all Israel
  chosen_spanish: de todo Israel
  alternatives_spanish:
  - de entre todo Israel
  - de todo el pueblo de Israel
  lexicon: HALOT
  rationale: La preposición marca selección desde el conjunto nacional. «De todo Israel» es fiel y natural.
- source_word: וַיֵּלֶךְ לְבַקֵּשׁ
  english_pob_choice: went to seek
  chosen_spanish: fue a buscar
  alternatives_spanish:
  - salió a buscar
  - se puso a buscar
  lexicon: HALOT
  rationale: El infinitivo de propósito indica la intención de perseguir o localizar a David. «Fue a buscar» mantiene la idea de movimiento con propósito en un español fluido.
- source_word: אֶת דָּוִד וַאֲנָשָׁיו
  english_pob_choice: David and his men
  chosen_spanish: a David y a sus hombres
  alternatives_spanish:
  - a David y a los hombres con él
  lexicon: HALOT
  rationale: Se conserva la referencia simple y clara al objeto de la búsqueda. La construcción con repetición de la a personal es la forma natural en español para objetos animados.
- source_word: עַל פְּנֵי
  english_pob_choice: in front of
  chosen_spanish: frente a
  alternatives_spanish:
  - delante de
  - ante
  lexicon: HALOT
  rationale: El audit trail inglés revisó el literalismo de «on the face of» hacia una relación espacial más natural. «Frente a» refleja esa decisión sin perder el marco topográfico del hebreo.
- source_word: צוּרֵי הַיְּעֵלִים
  english_pob_choice: the rocks of the wild goats
  chosen_spanish: las peñas de las cabras monteses
  alternatives_spanish:
  - los riscos de las cabras monteses
  - las peñas de los íbices
  lexicon: HALOT
  rationale: צוּרִים son peñas/rocas escarpadas; יְעֵלִים son cabras monteses, probablemente íbices. «Peñas de las cabras monteses» conserva cercanía al hebreo y resulta comprensible en español.
translation_notes:
  revision_awareness: 'El texto sigue la revisión auditada del inglés POB que prefirió una expresión espacial natural («in front of») en lugar de un calco demasiado literal. La versión española reproduce esa misma resolución con «frente a», manteniendo todos los elementos del hebreo: el desplazamiento de Saúl, el número de hombres escogidos, la búsqueda de David y la localización topográfica.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología por defecto del proyecto, pero este versículo no contiene el nombre divino.
  - «Cabras monteses» traduce יְעֵלִים de manera accesible; la nota preserva la alternativa zoológica más precisa («íbices»).
  - Se conserva el tono narrativo sobrio y militar del pasaje sin añadir explicaciones interpretativas.
