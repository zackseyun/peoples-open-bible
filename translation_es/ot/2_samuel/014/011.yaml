base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/014/011.yaml
  text: Then she said[a], “Please let the king remember Yahweh your God, so that the avenger of blood may not destroy any more, and they may not destroy my son.” And he said, “As Yahweh lives[b], not one hair of your son shall fall to the ground.”
  footnotes:
