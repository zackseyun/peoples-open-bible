translation:
  language: es
  text: 'Estas son las familias[a] de los hijos de Efraín, según los registrados en el censo[b]: treinta y dos mil quinientos. Estos son los hijos de José según sus familias.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Familias» traduce aquí la unidad tribal hebrea מִשְׁפָּחָה; en este contexto también puede entenderse como «clanes».
    reason: lexical_alternative
  - marker: b
    text: O «según su registro», «según su número» o, de forma más idiomática, «según los contados». El hebreo refleja lenguaje de inscripción censal.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁפְּחֹת
  english_pob_choice: clans
  chosen_spanish: familias
  alternatives_spanish:
  - clanes
  lexicon: HALOT
  rationale: En este contexto de censo tribal, el término hebreo designa subdivisiones de parentesco dentro de una tribu. En español, 'familias' comunica bien esa unidad social sin introducir 'clanes', que puede sonar más antropológico o menos natural en la lectura bíblica general.
- source_word: בְּנֵי אֶפְרַיִם
  english_pob_choice: the sons of Ephraim
  chosen_spanish: los hijos de Efraín
  alternatives_spanish:
  - los descendientes de Efraín
  - los efraimitas
  lexicon: HALOT
  rationale: Se conserva la fórmula genealógica literal del hebreo, como hizo el POB inglés con 'sons', para mantener el paralelismo interno del registro censal y la relación tribal con José.
- source_word: לִפְקֻדֵיהֶם
  english_pob_choice: according to those numbered of them
  chosen_spanish: según sus censados
  alternatives_spanish:
  - según los registrados de ellos
  - según su número
  - como contados
  lexicon: HALOT
  rationale: El sustantivo/participio de פקד en este contexto remite al grupo inscrito o contado en el censo. 'Según sus censados' intenta reflejar ese valor sin depender de una perífrasis larga; aunque es menos idiomático, conserva la noción de pertenencia al grupo registrado.
- source_word: שְׁנַיִם וּשְׁלֹשִׁים אֶלֶף וַחֲמֵשׁ מֵאוֹת
  english_pob_choice: thirty-two thousand and five hundred
  chosen_spanish: treinta y dos mil quinientos
  alternatives_spanish:
  - treinta y dos mil y quinientos
  lexicon: HALOT
  rationale: Se expresa el total en el orden numérico natural del español, sin alterar la cifra exacta.
- source_word: בְנֵי יוֹסֵף
  english_pob_choice: the sons of Joseph
  chosen_spanish: los hijos de José
  alternatives_spanish:
  - los descendientes de José
  lexicon: HALOT
  rationale: Se mantiene la misma fórmula genealógica para preservar la estructura del cierre y la conexión de Efraín con José.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: according to their clans
  chosen_spanish: según sus familias
  alternatives_spanish:
  - por sus familias
  - según sus clanes
  lexicon: HALOT
  rationale: Se repite 'familias' para dar cohesión con la primera cláusula y reflejar la repetición del hebreo sin forzar un cambio terminológico innecesario.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el audit trail inglés: conserva la fórmula genealógica ''hijos de'', el marco censal de פקד y la cifra exacta, pero adapta el orden numérico al español y evita la coma innecesaria tras ''Efraín'' para fluidez.'
  spanish_consistency_notes:
  - Se usa 'hijos de' de manera uniforme para בְּנֵי, siguiendo el patrón genealógico del pasaje.
  - Se evita 'SEÑOR' y cualquier equivalencia teológica ajena porque el versículo no contiene el Tetragrámaton ni referencias doctrinales explícitas.
  - '''Familias'' se usa de forma consistente para מִשְׁפְּחֹת; la nota aclara la alternativa ''clanes'' por si el lector espera una terminología más técnica.'
