review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo y del POB inglés: la protesta enfática de Job, el grito de «Violencia», la falta de respuesta y la ausencia de justicia. También preserva la tensión teológica sin suavizarla. Sin embargo, las notas al pie contienen varios anglicismos no traducidos y una opción inglesa impropia para el español, lo que rompe la fidelidad editorial al expediente auditado.'
  spanish_quality_summary: 'El texto principal es claro, natural y digno en español eclesial contemporáneo. «¡Mira!» funciona, aunque «Mira» sin signo también sería posible; «clamo» y «clamo por ayuda» son adecuados y mantienen el paralelismo. La mayor deficiencia está en las notas: incluyen «Outrage», «wrongdoing» y «redress legal», que deben estar en español. Además, conviene normalizar la formulación de la nota c para un español más natural.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «justicia» para מִשְׁפָּט está bien en contexto; «violencia» para חָמָס sigue la decisión del POB; no aparecen términos sensibles del glosario general como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: Notas con alternativas en inglés no traducidas
    rationale: Las notas a, c y el razonamiento léxico contienen «Outrage», «wrongdoing» y «redress legal». El producto final debe estar íntegramente en español.
  - severity: low
    issue: Nota a usa una alternativa menos natural en español
    rationale: «Outrage» debe reemplazarse por una opción española natural como «Ultraje» o mantenerse solo «Injusticia/Agravio». El inglés no debe aparecer como alternativa léxica.
  - severity: low
    issue: Nota c puede formularse con español jurídico más natural
    rationale: «redress legal» no solo está en inglés, sino que «reparación legal» o «amparo legal»/«vindicación legal» comunican mejor la idea para lectores hispanos.
  revised_spanish_text: '¡Mira![a] Clamo: «¡Violencia!», pero no se me responde; clamo por ayuda[b], pero no hay justicia[c].'
  revised_footnotes:
  - marker: a
    text: O «Injusticia», «Agravio» o «Ultraje». El término hebreo puede designar violencia, maldad o una querella legal indignada.
    reason: lexical_alternative
  - marker: b
    text: O «grito por ayuda». El verbo expresa una súplica urgente de auxilio.
    reason: lexical_alternative
  - marker: c
    text: O «no hay juicio» o «no hay vindicación legal». El hebreo conserva un matiz jurídico de justicia o de debida adjudicación.
    reason: lexical_alternative
  revision_rationale: El texto principal puede mantenerse. Se requieren solo reparaciones editoriales en las notas al pie para eliminar anglicismos, dar alternativas plenamente españolas y conservar con claridad el matiz jurídico documentado en el expediente inglés.
