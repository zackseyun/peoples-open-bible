review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue en gran medida la estructura del hebreo y refleja bien la lógica territorial del versículo, pero en varios puntos no preserva del todo la decisión auditada del POB ni la fuerza espacial más probable del texto. En particular, תְּרוּמַת הַקֹּדֶשׁ en este contexto se documentó como un distrito/tramo sagrado de tierra, por lo que «porción santa» queda menos precisa. Además, אֶל־פְּנֵי en este contexto catastral fue auditado como adyacencia, y «frente a» puede sugerir oposición visual más que contigüidad. También conviene explicitar que las «porciones» son las tribales, como hizo el POB inglés para evitar ambigüedad referencial.
  spanish_quality_summary: 'El español es legible y digno, pero algunos giros suenan menos naturales o menos exactos para una descripción de lindes: «frente a» y «límite del mar» introducen ambigüedad; «porción santa» no comunica tan claramente un distrito de tierra apartado. Una leve revisión mejora precisión y fluidez sin alejarse del hebreo.'
  glossary_alignment: No hay problemas con terminología divina o mesiánica. Sí hay un desajuste con la racionalidad léxica documentada para תְּרוּמַת הַקֹּדֶשׁ, que debería reflejar un tramo/distrito sagrado de tierra, no una «porción» genérica. También conviene seguir la decisión del POB de tratar יָם como oeste en la traducción principal, dejando «mar» para nota explicativa si se desea.
  issues:
  - severity: medium
    issue: «porción santa» para תְּרוּמַת הַקֹּדֶשׁ
    rationale: El expediente inglés documenta que aquí se refiere a un distrito o tramo de tierra apartado, no simplemente a una porción. «Distrito santo» o «distrito sagrado» comunica mejor la referencia catastral.
  - severity: medium
    issue: «frente a» para אֶל־פְּנֵי ... וְאֶל־פְּנֵי
    rationale: En esta descripción de lindes, la decisión auditada favorece adyacencia. «Frente a» en español puede sugerir estar enfrente, no necesariamente colindar. «Junto a» preserva mejor el sentido espacial.
  - severity: medium
    issue: Ambigüedad de «una de las porciones»
    rationale: Sin «tribales», el referente puede quedar difuso en español. El POB inglés añadió esa aclaración contextual de forma justificada.
  - severity: low
    issue: Uso mixto de «mar/occidente» en el texto principal
    rationale: El borrador conserva «mar» por cercanía formal al hebreo, pero la decisión auditada inglesa prefirió traducirlo como oeste en el cuerpo del texto por tratarse de lenguaje geográfico técnico en Ezequiel.
  - severity: low
    issue: Nota [b] no refleja exactamente la razón preservada en el POB inglés
    rationale: La nota actual habla de «según una de las porciones», pero la nota inglesa documenta sobre todo el valor direccional de «mar» como oeste.
  revised_spanish_text: Y para el príncipe habrá tierra a ambos lados del distrito santo[a] y de la posesión de la ciudad, junto al distrito santo y junto a la posesión de la ciudad, desde el lado occidental hacia el occidente y desde el lado oriental hacia el oriente; y en longitud, correspondiente a una de las porciones tribales, desde el límite occidental hasta el límite oriental[b].
  revised_footnotes:
