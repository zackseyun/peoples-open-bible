base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/026/019.yaml
  text: Then Uzziah became angry[a], with a censer in his hand to burn incense; and while he was angry with the priests, leprosy broke out on his forehead before the priests in the house of Yahweh, beside the altar of incense.
  footnotes:
  - marker: a
    text: Or 'leprosy.' The Hebrew term צָרַעַת can refer more broadly to a serious skin disease or defiling skin condition, not necessarily modern leprosy.
