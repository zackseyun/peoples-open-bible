translation:
  language: es
  text: Hombres de valor[a], firmes en fuerza, y tranquilos en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego tiene «hombres ricos, provistos de fuerza, viviendo en paz en sus asentamientos». Aquí se sigue principalmente el hebreo, y el griego se usa como control de coherencia.
    reason: alternative_reading
lexical_decisions:
- source_word: אנשי חיל
  english_pob_choice: men of valor
  chosen_spanish: hombres de valor
  alternatives_spanish:
  - hombres valerosos
  - hombres poderosos
  - hombres de mérito
  lexicon: HALOT
  rationale: La frase hebrea describe hombres caracterizados por capacidad, vigor o valer, no solo por riqueza. «Hombres de valor» conserva el tono encomiástico y amplio del hebreo, y encaja mejor que una opción centrada en estatus económico.
- source_word: וסמכי כח
  english_pob_choice: steadfast in strength
  chosen_spanish: firmes en fuerza
  alternatives_spanish:
  - sostenidos por fuerza
  - estables en poder
  - afianzados en fuerza
  lexicon: HALOT
  rationale: El hebreo es idiomático y sugiere estar firmemente apoyados o establecidos en כוח. «Firmes en fuerza» mantiene la idea de solidez y potencia sin sonar artificial en español.
- source_word: ושוקטים
  english_pob_choice: at ease
  chosen_spanish: en paz
  alternatives_spanish:
  - tranquilos
  - reposados
  - en calma
  lexicon: HALOT
  rationale: El participio apunta a quietud, descanso o paz. «En paz» expresa bien la serenidad estable del contexto y armoniza con el paralelo griego εἰρηνεύοντες.
- source_word: על מכונתם
  english_pob_choice: in their place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en su morada
  - en su puesto
  - en su asentamiento
  lexicon: HALOT
  rationale: מכונה puede referirse a un lugar fijado, establecimiento o situación asentada. «En su lugar» sigue de cerca la revisión inglesa más reciente y evita especificar indebidamente una morada física.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente que cambió «dwellings» por «place» para reflejar más de cerca מכונתם sin sobreespecificar. La traducción española sigue esa línea con «en su lugar», manteniendo la imagen de asentamiento estable. También se preserva la tensión textual entre el hebreo y el griego mediante nota.
  spanish_consistency_notes:
  - Se mantiene «valor» para אנשי חיל, en consonancia con la terminología de POB y con el sentido amplio de capacidad/valentía.
  - Se evita «señor» o lenguaje eclesiástico no sustentado por el texto.
  - «Fuerza» traduce כח de manera directa y neutral; no se introduce una interpretación doctrinal adicional.
  - La nota a pie conserva la alternativa griega sin desplazar el texto hebreo principal.
