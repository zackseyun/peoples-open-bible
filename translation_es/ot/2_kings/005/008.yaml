base_translation:
  language: en
  yaml_path: translation/ot/2_kings/005/008.yaml
  text: Now when Elisha[a], the man of God, heard that the king of Israel had torn his clothes, he sent to the king, saying, “Why have you torn your clothes? Please let him come to me[b], and he will know that there is a prophet in Israel.”
  footnotes:
  - marker: a
    text: Or 'tore his garments.' The Hebrew refers to the customary act of tearing one's clothing as a sign of distress or mourning.
    reason: lexical_alternative
  - marker: b
    text: '''Please let him come to me'' refers to Naaman, not the king of Israel.'
    reason: cross_reference
