translation:
  language: es
  text: Y se reunieron contra él hombres pestilentes[a] de Israel, hombres sin ley, para presentar acusación contra él[b]; pero el rey no les prestó atención.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La expresión griega es especialmente fuerte y figurada: también puede sugerir «hombres problemáticos» o «hombres como una plaga».'
    reason: lexical_alternative
  - marker: b
    text: La frase griega también puede traducirse «para acusarlo» o «para presentar una petición contra él»; aquí se conserva el matiz judicial.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήχθησαν
  english_pob_choice: gathered
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se juntaron
  - se congregaron
  lexicon: LSJ
  rationale: El griego indica que se agruparon como un conjunto hostil; en español, «se reunieron» comunica bien la acción colectiva sin añadir matices no sustentados.
- source_word: ἐπʼ αὐτόν
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - sobre él
  - hacia él
  lexicon: LSJ
  rationale: En este contexto judicial y hostil, la preposición es claramente adversativa, por lo que «contra él» preserva el sentido del ataque o la oposición.
- source_word: ἄνδρες λοιμοί
  english_pob_choice: pestilent men
  chosen_spanish: hombres pestilentes
  alternatives_spanish:
  - hombres problemáticos
  - hombres como plaga
  - hombres contagiosos
  lexicon: LSJ
  rationale: «λοιμοί» es un insulto fuerte, con imagen de plaga/peste. «Hombres pestilentes» conserva esa dureza metafórica mejor que un giro más suave como «problemáticos».
- source_word: ἐξ Ἰσραήλ
  english_pob_choice: from Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - de entre Israel
  - procedentes de Israel
  lexicon: LSJ
  rationale: «De Israel» expresa de manera natural el origen o la pertenencia del grupo, sin sobrecargar el verso.
- source_word: ἄνδρες παράνομοι
  english_pob_choice: lawless men
  chosen_spanish: hombres malvados
  alternatives_spanish:
  - hombres sin ley
  - hombres que obraban contra la ley
  lexicon: LSJ
  rationale: Aunque el sentido literal es «contrarios a la ley», en español «hombres malvados» comunica el carácter negativo del grupo con naturalidad. Se evita «sin ley» por sonar demasiado técnico o ambiguo en este contexto narrativo.
- source_word: ἐντυχεῖν κατʼ αὐτοῦ
  english_pob_choice: to bring charges against him
  chosen_spanish: para presentar acusación contra él
  alternatives_spanish:
  - para acusarlo
  - para interponer una acusación contra él
  - para pedir en su contra
  lexicon: LSJ
  rationale: La frase puede referirse a una petición o acusación formal. «Presentar acusación contra él» mantiene el matiz judicial y sigue de cerca la fuerza del griego sin cerrarlo solo a una denuncia informal.
- source_word: οὐ προσέσχεν αὐτοῖς
  english_pob_choice: paid no attention to them
  chosen_spanish: no les prestó atención
  alternatives_spanish:
  - no los escuchó
  - no les hizo caso
  - no se atendió a ellos
  lexicon: LSJ
  rationale: «προσέχω» aquí es atender o hacer caso. «No les prestó atención» es una equivalencia idiomática clara y natural en español.
- source_word: ὁ βασιλεύς
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: LSJ
  rationale: El título narrativo estándar en español es «el rey».
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego de Swete 1909 y coincide con la auditoría inglesa: mantiene el tono invectivo de λοιμοί, el valor adversativo de ἐπʼ αὐτόν, la ambigüedad judicial de ἐντυχεῖν κατʼ αὐτοῦ y la indiferencia expresada por προσέσχεν. No se registran revisiones aplicadas en el paquete de control.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por norma del proyecto solo cuando el texto lo exige; aquí no aparece el nombre divino.
  - Se evita «Cristo/Mesías» porque no hay término correspondiente en este versículo.
  - «Hombres malvados» se eligió para παράνομοι por claridad narrativa; se preserva en nota la alternativa más literal «sin ley»/«contra la ley».
  - La puntuación con dos puntos y punto y coma busca reflejar la estructura coordinada del original griego.
