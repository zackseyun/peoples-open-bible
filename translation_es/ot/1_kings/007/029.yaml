translation:
  language: es
  text: Y sobre los paneles que estaban entre los marcos había leones, bueyes y querubines; y sobre los marcos también, arriba, y debajo de los leones y de los bueyes había guirnaldas[a], una obra de relieve colgante[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «coronas vegetales»; el término hebreo es raro y su forma ornamental exacta es incierta.
    reason: lexical_alternative
  - marker: b
    text: La expresión traducida «relieve colgante» es difícil; puede referirse a una ornamentación pendiente o descendente debajo de los leones y los bueyes.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִּסְגְּרוֹת
  english_pob_choice: panels
  chosen_spanish: paneles
  alternatives_spanish:
  - bordes
  - marcos
  lexicon: HALOT
  rationale: En esta descripción arquitectónica de los soportes, el término alude a secciones decorativas incrustadas; «paneles» comunica bien la idea de superficies decoradas y distingue este elemento de שְׁלַבִּים, traducido aparte como «marcos».
- source_word: שְׁלַבִּים
  english_pob_choice: frames
  chosen_spanish: marcos
  alternatives_spanish:
  - travesaños
  - montantes
  lexicon: HALOT
  rationale: El término designa los miembros estructurales entre o alrededor de los cuales se disponían los paneles. «Marcos» conserva la relación estructural y es natural en español para una pieza que encuadra o sostiene.
- source_word: אֲרָיוֹת
  english_pob_choice: lions
  chosen_spanish: leones
  alternatives_spanish:
  - leones
  lexicon: HALOT
  rationale: Es el plural animal directo y no requiere mayor ajuste en español.
- source_word: בָּקָר
  english_pob_choice: oxen
  chosen_spanish: bueyes
  alternatives_spanish:
  - bueyes
  - toros
  - ganado
  lexicon: HALOT
  rationale: En una lista ornamental de figuras bovinas, «bueyes» es el equivalente más idiomático y suficientemente general; «toros» sería más específico de lo que exige el hebreo.
- source_word: כְרוּבִים
  english_pob_choice: cherubim
  chosen_spanish: querubines
  alternatives_spanish:
  - querubines
  lexicon: HALOT
  rationale: Se mantiene el término tradicional transliterado para esta clase de seres celestiales asociados al culto y al trono, sin convertirlo en un diminutivo coloquial.
- source_word: כֵּן
  english_pob_choice: likewise
  chosen_spanish: de igual modo
  alternatives_spanish:
  - igualmente
  - así
  lexicon: HALOT
  rationale: La partícula marca correspondencia entre la decoración de los paneles y la de los marcos; «de igual modo» preserva esa relación comparativa de forma clara.
- source_word: מִמָּעַל
  english_pob_choice: above
  chosen_spanish: arriba
  alternatives_spanish:
  - encima
  - por arriba
  lexicon: HALOT
  rationale: Se trata de una indicación espacial simple dentro de la secuencia decorativa. «Arriba» suena natural en español y mantiene el contraste con «debajo».
- source_word: מִתַּחַת
  english_pob_choice: beneath
  chosen_spanish: debajo
  alternatives_spanish:
  - bajo
  - por debajo
  lexicon: HALOT
  rationale: Se conserva el paralelismo con «arriba» para expresar la ubicación inferior de los adornos.
- source_word: לֹיוֹת
  english_pob_choice: wreaths
  chosen_spanish: guirnaldas
  alternatives_spanish:
  - guirnaldas
  - coronas vegetales
  - espirales
  lexicon: HALOT
  rationale: El sustantivo es raro y designa algún tipo de adorno festoneado o en forma de guirnalda. «Guirnaldas» es un equivalente natural en español y deja visible la incertidumbre del referente exacto.
- source_word: מַעֲשֵׂה מוֹרָד
  english_pob_choice: a work of hanging relief
  chosen_spanish: una obra de relieve colgante
  alternatives_spanish:
  - una obra de relieve colgante
  - una obra descendente
  - un trabajo colgante
  lexicon: HALOT
  rationale: La frase es difícil y probablemente describe ornamentación que cuelga o desciende debajo de las figuras. «Relieve colgante» conserva tanto el carácter artístico como la dirección espacial sin afirmar más precisión de la que permite el texto.
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del paquete fuente hebreo y del audit trail en inglés. No hubo cambios de revisión posteriores; la versión inglesa más reciente quedó marcada como sin cambios, y esta redacción española conserva las mismas decisiones léxicas esenciales (paneles/marcos, leones/bueyes/querubines, guirnaldas, relieve colgante) con adaptación natural al español.
  spanish_consistency_notes:
  - Se mantiene «querubines» como transliteración estable para כְרוּבִים.
  - Se usa «Yahvé» solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se evita «SEÑOR» porque no corresponde al contenido de este versículo.
  - La distinción entre «paneles» y «marcos» sigue la del audit trail en inglés.
  - La incertidumbre de לֹיוֹת y de מַעֲשֵׂה מוֹרָד se preserva mediante notas, sin sobreespecificar el adorno.
