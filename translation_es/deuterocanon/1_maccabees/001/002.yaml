- from: Y emprendió muchas guerras, y se apoderó de fortalezas, y masacró a reyes,
  to: Y libró muchas guerras, y se apoderó de fortalezas, y masacró a reyes,
  rationale: Se reemplaza 'emprendió' por 'libró' para ajustarse mejor al idiomatismo griego συνεστήσατο πολέμους y a la decisión auditada en inglés 'waged'. Se mantienen las demás elecciones porque preservan bien el sentido militar y la fuerza del original en un español natural.
