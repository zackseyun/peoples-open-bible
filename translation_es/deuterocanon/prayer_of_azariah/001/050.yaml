translation:
  language: es
  text: Bendigan al Señor, relámpagos y nubes; cántenle alabanzas y exáltenlo en gran manera para siempre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐλογεῖτε
  english_pob_choice: Bless
  chosen_spanish: Bendigan
  alternatives_spanish:
  - Bendecid
  - Alaben
  lexicon: BDAG
  rationale: El imperativo plural exhorta a la creación a hablar bien de Dios; en español, "bendigan" conserva mejor el paralelismo litúrgico y el valor de bendecir que un simple "alaben".
- source_word: ἀστραπαὶ
  english_pob_choice: lightning
  chosen_spanish: relámpagos
  alternatives_spanish:
  - rayos
  - fulgores de luz
  lexicon: LSJ
  rationale: El griego está en plural y describe destellos de luz en el cielo; "relámpagos" reproduce el plural poético de manera natural en español.
- source_word: νεφέλαι
  english_pob_choice: clouds
  chosen_spanish: nubes
  alternatives_spanish:
  - nubarrones
  - nubosidades
  lexicon: LSJ
  rationale: Es el equivalente directo y transparente del plural griego, sin necesidad de tecnicismo.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Dios
  - el Soberano
  lexicon: BDAG
  rationale: Aunque el proyecto normalmente reserva "Yahvé" para el nombre divino hebreo, aquí la fuente es griega κύριον en un himno de alabanza. "El Señor" refleja fielmente el título en español y mantiene la fórmula litúrgica del texto griego.
- source_word: ὑμνεῖτε
  english_pob_choice: sing praise
  chosen_spanish: cántenle alabanzas
  alternatives_spanish:
  - entónenle un himno
  - alábenlo cantando
  lexicon: BDAG
  rationale: El verbo implica cantar un himno de alabanza; "cántenle alabanzas" conserva el matiz musical sin sonar forzado.
- source_word: ὑπερυψοῦτε
  english_pob_choice: highly exalt
  chosen_spanish: ensálcenlo altamente
  alternatives_spanish:
  - exáltenlo grandemente
  - ensálcenlo en gran manera
  lexicon: BDAG
  rationale: La forma compuesta intensifica la exaltación; "ensálcenlo altamente" mantiene esa fuerza y corresponde al tono solemne del doxológico.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por los siglos
  - por siempre jamás
  lexicon: BDAG
  rationale: '"Para siempre" expresa de forma natural la duración perpetua de la doxología, equivalente funcional de la expresión griega.'
theological_decisions:
- issue: Tratamiento de κύριος en un himno griego dirigido a Dios
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Soberano
  - el Señor Dios
  rationale: La base griega no contiene el tetragrámaton, sino el título κύριος. Por eso se evita imponer "Yahvé" aquí; "el Señor" sigue la lectura auditada y evita introducir una convención que el texto fuente no exige.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; יְהוָה → Yahvé'
- issue: Valor poético del plural 'lightning' / 'lightnings'
  english_pob_reading: lightning
  chosen_spanish_reading: relámpagos
  alternative_spanish_readings:
  - relámpago
  - rayos
  rationale: El griego pluraliza el fenómeno natural; conservar el plural en español respeta la enumeración de criaturas de la alabanza y no borra el rasgo poético del original.
  doctrine_reference: Poetic catalog of creation in the Song of the Three
translation_notes:
  revision_awareness: La versión inglesa POB fue revisada de 'lightnings' a 'lightning' por naturalidad, pero el griego sigue siendo plural; por eso el español conserva el plural 'relámpagos' para mantener la señal poética y la concordancia con ἀστραπαί.
  spanish_consistency_notes:
  - Se mantiene 'el Señor' para κύριος en coherencia con el manejo estándar del proyecto para el griego deuterocanónico.
  - Se usa un registro litúrgico claro y moderno, evitando arcaísmos innecesarios.
  - No se introduce 'Yahvé' porque la fuente inmediata no contiene el nombre divino hebreo.
