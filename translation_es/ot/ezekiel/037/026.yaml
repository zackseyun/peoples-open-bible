  text: וְ/כָרַתִּ֤י לָ/הֶם֙ בְּרִ֣ית שָׁל֔וֹם בְּרִ֥ית עוֹלָ֖ם יִהְיֶ֣ה אוֹתָ֑/ם וּ/נְתַתִּי/ם֙ וְ/הִרְבֵּיתִ֣י אוֹתָ֔/ם וְ/נָתַתִּ֧י אֶת מִקְדָּשִׁ֛/י בְּ/תוֹכָ֖/ם לְ/עוֹלָֽם־׃
