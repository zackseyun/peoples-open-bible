  text: וַ/יֵּלְכ֣וּ אַחֲרֵי/הֶם֮ עַד הַ/יַּרְדֵּן֒ וְ/הִנֵּ֣ה כָל הַ/דֶּ֗רֶךְ מְלֵאָ֤ה בְגָדִים֙ וְ/כֵלִ֔ים אֲשֶׁר הִשְׁלִ֥יכוּ אֲרָ֖ם ב/החפז/ם וַ/יָּשֻׁ֨בוּ֙ הַ/מַּלְאָכִ֔ים וַ/יַּגִּ֖דוּ לַ/מֶּֽלֶךְ־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_kings/007/015.yaml
  text: So they went after them as far as the Jordan[a], and behold, the whole road was full of garments and equipment that Aram had thrown away in their haste[c][b]. Then the messengers returned and reported to the king.
  footnotes:
  - marker: a
    text: Or 'articles,' 'gear,' or 'supplies' for 'equipment' (Hebrew כֵלִים), a broad term for objects or implements.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Aram'; traditionally sometimes rendered 'the Arameans' or 'Syria' in English versions. The translation preserves the source name.
    reason: alternative_reading
  - marker: c
    text: Or 'the scouts returned.' Hebrew מַלְאָכִים more literally means 'messengers,' but in context these are the men sent out to investigate.
    reason: lexical_alternative
