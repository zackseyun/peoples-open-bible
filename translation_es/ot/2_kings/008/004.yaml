  - severity: medium
    issue: Expresión 'todas las cosas grandes'
    rationale: Aunque formalmente cercana al hebreo, suena torpe en español moderno. 'Todas las grandes cosas' preserva la amplitud semántica y mejora la naturalidad sin sobreinterpretar como 'hazañas' o 'maravillas'.
  - severity: low
    issue: Transliteración 'Guiezi'
    rationale: No es incorrecta, pero resulta menos reconocible para lectores bíblicos en español. 'Guejazí' es una forma más establecida y legible en contexto eclesial.
