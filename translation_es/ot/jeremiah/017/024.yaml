base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/017/024.yaml
  text: And it shall be[a], if you truly listen to me, declares Yahweh, not bringing a load through the gates of this city on the Sabbath day, but keeping the Sabbath day holy, not doing any work on it[b],
  footnotes:
  - marker: a
    text: Or 'if you diligently obey me.' The Hebrew idiom literally repeats 'listen' for emphasis and can carry the sense of obedient hearing.
    reason: lexical_alternative
  - marker: b
    text: Or 'a burden.' The Hebrew term can mean a carried load; here it refers to loads brought through the city gates on the Sabbath.
    reason: lexical_alternative
