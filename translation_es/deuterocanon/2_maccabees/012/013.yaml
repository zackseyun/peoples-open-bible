translation:
  language: es
  text: También avanzó contra cierta ciudad de puentes[a], fuertemente fortificada y cercada con murallas, habitada por gentes de diversos pueblos; su nombre era Caspín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una ciudad con puentes». La expresión griega es condensada y puede describir las obras de puente o pasarela características del lugar, más que funcionar como un título formal.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπέβαλεν
  english_pob_choice: advanced against
  chosen_spanish: avanzó contra
  alternatives_spanish:
  - atacó
  - se lanzó contra
  - hizo avanzar sus tropas contra
  lexicon: LSJ
  rationale: El verbo puede expresar el movimiento militar de lanzarse o ponerse en campaña contra una ciudad. «Avanzó contra» conserva el matiz de aproximación bélica sin decidir de más sobre el modo exacto del ataque.
- source_word: ἐπί τινα πόλιν
  english_pob_choice: against a certain city
  chosen_spanish: contra una cierta ciudad
  alternatives_spanish:
  - contra una ciudad determinada
  - contra una ciudad
  - sobre una cierta ciudad
  lexicon: LSJ
  rationale: Se mantiene la indefinición de τινα con «una cierta», siguiendo la presentación no específica del texto griego.
- source_word: γεφυρῶν
  english_pob_choice: of bridges
  chosen_spanish: de puentes
  alternatives_spanish:
  - con puentes
  - ciudad de puentes
  - de sus puentes
  lexicon: LSJ
  rationale: El genitivo es compacto en griego; «ciudad de puentes» en español suena natural y reproduce el rasgo descriptivo. Se evita añadir una interpretación más precisa de la que el texto garantiza.
- source_word: ὀχυρὰν
  english_pob_choice: strongly fortified
  chosen_spanish: fuertemente fortificada
  alternatives_spanish:
  - fortificada
  - muy fortificada
  - bien fortificada
  lexicon: LSJ
  rationale: El adjetivo apunta a fortaleza defensiva. «Fuertemente fortificada» preserva la intensidad militar del término sin exagerar.
- source_word: τείχεσιν περιτεφραγμένην
  english_pob_choice: enclosed with walls
  chosen_spanish: cercada con murallas
  alternatives_spanish:
  - rodeada de murallas
  - cerrada con murallas
  - circundada por murallas
  lexicon: LSJ
  rationale: La imagen es la de estar rodeada/encerrada por muros defensivos. «Cercada con murallas» es idiomática y mantiene la idea de perímetro fortificado.
- source_word: παμμιγέσιν ἔθνεσιν
  english_pob_choice: mixed peoples
  chosen_spanish: pueblos mezclados
  alternatives_spanish:
  - gentes mezcladas
  - pueblos de muy diversa mezcla
  - naciones mezcladas
  lexicon: LSJ
  rationale: El griego subraya mezcla intensa y pluralidad étnica. «Pueblos mezclados» conserva el plural y la fuerza de παμμιγής sin sonar artificial en español.
- source_word: κατοικουμένην
  english_pob_choice: inhabited
  chosen_spanish: habitada
  alternatives_spanish:
  - poblada
  - morada por
  - asentada
  lexicon: LSJ
  rationale: El participio simplemente describe que la ciudad estaba ocupada por población residente. «Habitada» es la equivalencia más directa y natural.
- source_word: ὄνομα δὲ Κασπείν
  english_pob_choice: its name was Caspin
  chosen_spanish: y su nombre era Caspín
  alternatives_spanish:
  - y se llamaba Caspín
  - llamada Caspín
  - de nombre Caspín
  lexicon: LSJ
  rationale: Se conserva la fórmula de nominación explícita. «Caspín» refleja la transliteración del topónimo en forma española naturalizada.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de Swete y la decisión auditada en inglés de tomar γεφυρῶν como un genitivo descriptivo comprimido; se adapta a un español fluido sin perder la ambigüedad lexical documentada sobre la ciudad “de puentes”.
  spanish_consistency_notes:
  - Se mantiene «Caspín» como forma castellana del topónimo Caspin, con acento gráfico por adaptación fonológica.
  - 'Se conserva el orden narrativo simple del griego: avance militar, descripción de la ciudad y nombramiento final.'
  - «Pueblos mezclados» traduce la pluralidad étnica de παμμιγέσιν ἔθνεσιν sin convertirla en un colectivo singular que borre el matiz del plural griego.
