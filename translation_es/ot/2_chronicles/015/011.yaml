    issue: «con el botín que habían traído» debilita el sentido de procedencia de מִן הַשָּׁלָל
    rationale: 'El hebreo expresa origen/fuente: sacrificaron a Yahvé de entre el botín que habían traído. «Con» puede sonar instrumental más que partitivo o de procedencia.'
  - severity: medium
    issue: Desalineación entre texto principal y nota en צֹאן
    rationale: El texto principal ya dice «animales de rebaño», pero la nota explica esa misma amplitud como si fuera una alternativa al sentido más restringido. Eso vuelve redundante y confusa la nota frente al modelo auditado.
  - severity: low
    issue: «animales de rebaño» es menos natural en registro bíblico corriente
    rationale: Aunque semánticamente amplio, en español eclesial general suena más técnico. «ovejas» con nota o «ganado menor» resultan más fluidos; el primero además refleja mejor la decisión del POB inglés.
  revised_spanish_text: 'Aquel día sacrificaron a Yahvé del botín[a] que habían traído: setecientos bovinos y siete mil ovejas[b].'
