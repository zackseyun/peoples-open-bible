translation:
  language: es
  text: Porque ahora pesaría más que la arena de los mares[a]; por tanto, mis palabras han sido precipitadas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mis palabras han sido salvajes/confusas». El verbo hebreo aquí es difícil y puede sugerir un habla descontrolada o desordenada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי עַתָּה
  english_pob_choice: For now
  chosen_spanish: Porque ahora
  alternatives_spanish:
  - Pues ahora
  - Porque en este momento
  - Ahora
  lexicon: HALOT
  rationale: Se mantiene el valor explicativo/consecutivo de כִּי con «porque», y el marcador temporal עַתָּה con «ahora». En español, esta combinación conserva el flujo argumentativo del lamento sin sonar forzada.
- source_word: מֵחוֹל יַמִּים
  english_pob_choice: than the sand of the seas
  chosen_spanish: que la arena de los mares
  alternatives_spanish:
  - que la arena del mar
  - que la arena de los mares
  - que la arena marina
  lexicon: HALOT
  rationale: El hebreo usa una comparación con pluralidad marcada («mares»). Se conserva esa pluralidad en español para no aplanar el eco poético del original. «Arena de los mares» es menos idiomático que el singular, pero más fiel al dato fuente.
- source_word: יִכְבָּד
  english_pob_choice: would be heavier
  chosen_spanish: sería más pesado
  alternatives_spanish:
  - sería más grave
  - pesaría más
  - sería más pesado todavía
  lexicon: HALOT
  rationale: כבד expresa peso/carga; en castellano «pesado» comunica bien la idea física y metafórica. Se opta por una comparación natural con «sería» para suplir la elipsis del hebreo y hacer la frase publicable.
- source_word: דְּבָרַי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mi խոսa
  - mi discurso
  - lo que digo
  lexicon: HALOT
  rationale: Se conserva el plural explícito del sustantivo hebreo con «palabras», que es la equivalencia más directa y clara en español.
- source_word: לָעוּ
  english_pob_choice: have been rash
  chosen_spanish: han sido precipitadas
  alternatives_spanish:
  - han sido desordenadas
  - han sido irreflexivas
  - han sido confusas
  lexicon: HALOT
  rationale: El verbo es difícil y admite un rango semántico de desorden, confusión o precipitación. «Precipitadas» preserva la idea de habla no gobernada, sin imponer una interpretación más fuerte de la que el hebreo garantiza. Además, evita sonar excesivamente coloquial frente al tono poético de Job.
theological_decisions:
- issue: Sentido de la comparación implícita y de la elipsis verbal
  english_pob_reading: 'The clause is made intelligible by supplying a comparative/conditional sense in English: ''would be heavier''.'
  chosen_spanish_reading: 'Se expresa con un comparativo claro: «sería más pesado».'
  alternative_spanish_readings:
  - «es más pesado»
  - «pesaría más»
  rationale: El hebreo presenta una construcción compacta y poética. En español, la lectura comparativa debe hacerse explícita para que la frase sea comprensible sin perder el tono de lamentación. «Sería más pesado» sigue fielmente la fuerza contextual sin convertir el enunciado en una afirmación absoluta.
  doctrine_reference: Poética sapiencial; no implica una afirmación doctrinal especial.
- issue: Traducción del verbo oscuro לָעוּ
  english_pob_reading: '''my words have been rash''; footnote preserves ''wild/confused'' as alternative.'
  chosen_spanish_reading: «mis palabras han sido precipitadas» con nota alternativa implícita en la formulación del verbo.
  alternative_spanish_readings:
  - «mis palabras han sido salvajes»
  - «mis palabras han sido confusas»
  - «mis palabras han sido desordenadas»
  rationale: La tradición de traducción admite varios matices. Se evita fijar una sola glosa extrema y se escoge una opción que comunica tanto falta de control como imprudencia. Esto conserva la tensión lexical del hebreo y el valor explicativo del contexto inmediato.
  doctrine_reference: No aplica; se trata de una decisión léxica sobre un verbo raro y debatido.
translation_notes:
  revision_awareness: La redacción sigue el estado más reciente del audit trail inglés, que corrigió «are rash» a «have been rash» para reflejar mejor el verbo hebreo. En español, eso se refleja con un perfecto compuesto («han sido precipitadas») que mantiene el matiz de resultado hasta el presente y encaja con el tono retrospectivo del lamento de Job.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conserva «mares» en plural para respetar la forma hebrea y la decisión inglesa auditada.
  - Se evita «señor» o fórmulas eclesiásticas tradicionales porque el texto fuente aquí no las exige.
  - «Precipitadas» se usa en sentido de habla impulsiva/descontrolada, no solo de rapidez temporal.
