revisions:
- from: Tú los plantaste; también echaron raíces. Crecen; también dan fruto. Tú estás cerca en su boca[a], pero lejos de sus entrañas.
  to: Tú los plantaste; también echaron raíces. Crecen; también dan fruto. Tú estás cerca en su boca[a], pero lejos de su ser más íntimo.
  rationale: Se conserva toda la estructura y el contenido del original, pero se reemplaza 'sus entrañas' por 'su ser más íntimo' para alinearse mejor con la decisión semántica auditada en inglés sobre כִּלְיוֹתֵיהֶם. Se mantiene la nota literal sobre 'riñones'. Aunque 'en su boca' sigue siendo algo literal, es aceptable y preserva la imagen hebrea; el cambio necesario es principalmente la cláusula final para precisión y legibilidad.
  reviewer_model: gpt-5.4
