translation:
  language: es
  text: Bela, hijo de Beor, reinó en Edom[a], y el nombre de su ciudad era Dinhabah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «reinó sobre Edom». El hebreo dice literalmente «reinó en Edom», con la preposición de ubicación; «sobre Edom» expresa el dominio real de manera interpretativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - reyesó
  - gobernó
  lexicon: HALOT
  rationale: En este registro de sucesión real, el hebreo expresa la entronización y ejercicio de la realeza. «Reinó» es el equivalente natural en español para una nota de reyes, y conserva el carácter formular sin añadir matices no presentes.
- source_word: בֶּאֱדוֹם
  english_pob_choice: in Edom
  chosen_spanish: en Edom
  alternatives_spanish:
  - sobre Edom
  lexicon: HALOT
  rationale: La preposición hebrea ב marca ubicación de manera directa. «En Edom» preserva esa relación espacial y sigue la decisión auditada del POB inglés de no imponer una expansión interpretativa con «sobre».
- source_word: בֶּלַע
  english_pob_choice: Bela
  chosen_spanish: Bela
  lexicon: transliteration
  rationale: Nombre propio; se translitera como forma estable en español bíblico.
- source_word: בֶּן בְּעוֹר
  english_pob_choice: son of Beor
  chosen_spanish: hijo de Beor
  lexicon: HALOT
  rationale: La construcción genealógica estándar se mantiene de forma literal y clara en español.
- source_word: וְשֵׁם
  english_pob_choice: and the name of
  chosen_spanish: y el nombre de
  alternatives_spanish:
  - y el nombre era
  lexicon: HALOT
  rationale: Se conserva la estructura hebrea de identificación nominal, que en español resulta natural con «y el nombre de».
- source_word: עִירוֹ
  english_pob_choice: his city
  chosen_spanish: su ciudad
  alternatives_spanish:
  - la ciudad de él
  lexicon: HALOT
  rationale: El sufijo posesivo de 3ms se representa con «su»; «su ciudad» comunica la relación sin recargar el estilo.
- source_word: דִּנְהָבָה
  english_pob_choice: Dinhabah
  chosen_spanish: Dinhaba
  alternatives_spanish:
  - Dinhabah
  lexicon: transliteration
  rationale: Nombre propio de lugar; se translitera de manera consistente al español. Se prefiere adaptar la terminación a la ortografía española como «Dinhaba», manteniendo la referencia sonora del hebreo.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y la auditoría inglesa del POB. Se preservó la formulación locativa «en Edom» y el paralelismo nominal de la cláusula final, sin introducir expansión explicativa.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en otros contextos según la norma del proyecto; este versículo no contiene el nombre divino.
  - Se usó «reinó» para una fórmula real breve y formularia, evitando un giro más explicativo.
  - «Dinhaba» se adopta como transliteración española del topónimo, con nota de variante en la tradición inglesa del POB.
