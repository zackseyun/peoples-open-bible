review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: denuncia profética, inversión moral, y el paralelismo de mal/bien, oscuridad/luz, amargo/dulce. También preserva correctamente las dos notas del rastro inglés. Sin embargo, en español la construcción «hacen de la oscuridad luz» / «hacen de lo amargo dulce» suena algo forzada y menos natural que una forma equivalente que mantenga la inversión valorativa.'
  spanish_quality_summary: El texto es claro y fiel, pero puede mejorarse en naturalidad y dignidad eclesial. «¡Ay de los que…!» está bien. «Llaman al mal bien y al bien mal» funciona. La parte media y final gana fluidez con «ponen la oscuridad por luz… ponen lo amargo por dulce…», que además se acerca mejor al valor de שָׂמִים + לְ en este verso sin paráfrasis innecesaria.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías, Espíritu, etc. La decisión entre «oscuridad» y «tinieblas» es estilística; «oscuridad» es aceptable, aunque «tinieblas» sería más tradicional. «Mal/bien», «luz», «amargo/dulce» están bien alineados con el sentido fuente.
  issues:
  - severity: medium
    issue: La expresión «hacen de la oscuridad luz y de la luz oscuridad» es poco idiomática en español bíblico moderno.
    rationale: Aunque comprensible, suena calcada. «Ponen la oscuridad por luz y la luz por oscuridad» mantiene la estructura de inversión, mejora la legibilidad y refleja mejor el intercambio valorativo del hebreo.
  - severity: medium
    issue: La cláusula «hacen de lo amargo dulce y de lo dulce amargo» también resulta algo rígida.
    rationale: La forma con «ponen … por …» produce un paralelismo más natural y uniforme con la línea anterior, sin perder concisión ni fuerza poética.
  - severity: low
    issue: La nota [a] lleva comillas simples externas innecesarias.
    rationale: En español editorial limpio conviene presentar la alternativa sin esas comillas de encapsulación.
