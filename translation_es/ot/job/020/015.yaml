translation:
  language: es
  text: Se tragó la riqueza[a], pero la vomitará; Dios la expulsará de su vientre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «riquezas» o «bienes» para חַיִל.
    reason: lexical_alternative
  - marker: b
    text: La imagen hebrea habla literalmente del «vientre», conservando el cuadro corporal de algo tragado y luego expulsado.
    reason: lexical_alternative
lexical_decisions:
- source_word: חַיִל
  english_pob_choice: wealth
  chosen_spanish: riquezas
  alternatives_spanish:
  - bienes
  - fortuna
  - riqueza
  lexicon: HALOT
  rationale: En este contexto poético de ganancia absorbida y luego expulsada, חַיִל se refiere a bienes o recursos acumulados, no a fuerza física. «Riquezas» comunica naturalmente la idea económica que el texto y la traducción inglesa quieren conservar.
- source_word: בָּלַע
  english_pob_choice: swallowed
  chosen_spanish: se tragó
  alternatives_spanish:
  - tragó
  - devoró
  - englutió
  lexicon: HALOT
  rationale: El verbo mantiene la imagen concreta de ingerir algo para luego perderlo. «Se tragó» suena idiomático en español y conserva la metáfora corporal.
- source_word: וַיְקִאֶנּוּ
  english_pob_choice: but he will vomit it up
  chosen_spanish: pero las vomitará
  alternatives_spanish:
  - y las vomitará
  - pero las echará fuera
  - pero las escupirá
  lexicon: HALOT
  rationale: El hebreo expresa el reverso violento de lo tragado mediante un verbo de vomitar. En español, «vomitará» conserva la fuerza gráfica; el complemento se ajusta al plural por concordancia con «riquezas».
- source_word: מִבִּטְנוֹ
  english_pob_choice: out of his belly
  chosen_spanish: de su vientre
  alternatives_spanish:
  - de su barriga
  - de su estómago
  - de sus entrañas
  lexicon: HALOT
  rationale: «Vientre» preserva el cuerpo-imagen del hebreo בלי volverlo clínico. «Estómago» sería más preciso anatómicamente, pero debilita la imaginería poética.
- source_word: יוֹרִשֶׁנּוּ
  english_pob_choice: will drive it out
  chosen_spanish: las expulsará
  alternatives_spanish:
  - la expulsará
  - las hará salir
  - las arrancará
  lexicon: HALOT
  rationale: El hifil de ירשׁ aquí se entiende causativamente como expulsión forzada del contenido tragado. «Expulsará» reproduce bien la acción divina y la violencia de la imagen sin sobreinterpretar.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios poderoso
  - Dios Todopoderoso
  lexicon: HALOT
  rationale: אֵל es el término común para Dios, no el nombre divino YHWH. «Dios» es la equivalencia directa y clara en español, manteniendo la agencia divina explícita.
theological_decisions:
- issue: Agencia divina en la expulsión del botín tragado
  english_pob_reading: God is explicitly the subject who causes the wealth to be expelled.
  chosen_spanish_reading: Dios es el sujeto explícito que expulsa las riquezas del vientre del impío.
  alternative_spanish_readings:
  - La pérdida ocurre por una consecuencia impersonal
  - El texto deja tácita la causa
  rationale: El hebreo nombra a אֵל como sujeto de יוֹרִשֶׁנּוּ; la traducción debe conservar esa acción directa de Dios, no diluirla en un resultado impersonal. Esto mantiene la tensión teológica del juicio divino presente en el verso.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el consenso alto del audit trail inglés y conserva las dos notas léxicas principales: el campo semántico económico de חַיִל y la imagen corporal de בִּטְנוֹ. No se requieren ajustes doctrinales adicionales respecto al paso de revisión más reciente.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֵל, sin usar «Yahvé», porque el hebreo aquí no usa el nombre divino.
  - Se evita «SEÑOR» para no enmascarar el término original.
  - Se preserva la metáfora corporal con «vientre» y el verbo fuerte «vomitará/expulsará».
  - La concordancia en plural de «riquezas» exige adaptar los pronombres y el verbo en español para una lectura natural.
