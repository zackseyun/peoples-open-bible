translation:
  language: es
  text: Llegó a ser para nosotros un reproche[a] para nuestros pensamientos; hasta verlo[b] nos resulta insoportable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una reprensión» o «una exposición de culpa». El griego ἔλεγχος puede señalar tanto censura como el acto de poner la culpa al descubierto.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «y aun siendo visto es pesado para nosotros». La idea es que incluso su sola presencia les resulta difícil de soportar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  english_pob_choice: became
  chosen_spanish: se nos hizo
  alternatives_spanish:
  - llegó a ser
  - se convirtió en
  lexicon: γίνομαι
  rationale: El aoristo de γίνομαι expresa aquí un estado resultante. En español, «se nos hizo» comunica bien el resultado y mantiene la relación con el grupo afectado («a nosotros»), sin forzar un pasado narrativo más pesado que el griego.
- source_word: εἰς ἔλεγχον
  english_pob_choice: a reproof
  chosen_spanish: un reproche
  alternatives_spanish:
  - una reprensión
  - una reprobación
  - una exposición de culpa
  lexicon: ἔλεγχος
  rationale: ἔλεγχος puede abarcar reprensión, reproche o exposición que revela culpa. «Reproche» conserva el carácter personal y acusatorio que el contexto requiere, sin cargar de más el matiz judicial.
- source_word: ἐννοιῶν
  english_pob_choice: thoughts
  chosen_spanish: de nuestros pensamientos
  alternatives_spanish:
  - de nuestras intenciones
  - de nuestros razonamientos internos
  - de nuestras ideas
  lexicon: ἔννοια
  rationale: ἔννοια designa pensamientos, nociones o razonamientos internos. «Pensamientos» es natural en español y permite mantener abierta la posible fuerza de examen interior que el término puede tener.
- source_word: βαρύς
  english_pob_choice: burdensome
  chosen_spanish: pesado
  alternatives_spanish:
  - gravoso
  - difícil de soportar
  - molesto
  lexicon: βαρύς
  rationale: 'Aquí el adjetivo es metafórico: la sola presencia del justo les resulta opresiva. «Pesado» es la traducción más directa y conserva la imagen física que subyace al sentido figurado.'
- source_word: βλεπόμενος
  english_pob_choice: being seen
  chosen_spanish: con verlo
  alternatives_spanish:
  - al ser visto
  - su sola vista
  - con solo ser visto
  lexicon: βλέπω
  rationale: El participio pasivo indica literalmente «siendo visto». En español, «con verlo» expresa de forma idiomática que incluso su mera visión les resulta gravosa, sin alejarse del valor literal.
theological_decisions:
- issue: Sujeto implícito del verso
  english_pob_reading: He
  chosen_spanish_reading: Se nos hizo
  alternative_spanish_readings:
  - Él se nos hizo
  - El justo se nos hizo
  rationale: El griego presenta un sujeto implícito ya conocido por el contexto. En español, una construcción impersonal/pronominal evita añadir un sujeto explícito que el verso no da y conserva la continuidad con la descripción precedente.
  doctrine_reference: Primacía del texto original y preservación de la tensión contextual sin sobre-explicación.
translation_notes:
  revision_awareness: 'Se siguió el encuadre auditado de la POB en inglés: ἐγένετο como estado resultante, ἔλεγχος con matiz de reprensión/reproche, ἐννοιῶν como pensamientos/razonamientos internos, βαρύς como peso figurado y βλεπόμενος como mera visión/presencia. No hubo revisiones aplicadas en el pase más reciente, así que el borrador refleja directamente esa lectura estable.'
  spanish_consistency_notes:
  - Se preservó el paralelismo del verso en dos miembros.
  - Se evitó «SEÑOR» u otra convención de ocultamiento no pertinente al pasaje.
  - «Pensamientos» mantiene el rango semántico abierto de ἐννοιῶν sin especificar más de lo que el contexto exige.
  - La puntuación reproduce la pausa fuerte del punto y coma del griego/inglés auditado.
