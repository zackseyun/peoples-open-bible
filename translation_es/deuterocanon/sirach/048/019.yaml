translation:
  language: es
  text: Entonces se derritieron[a] en el orgullo de su corazón, y se retorcieron como una mujer que da a luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Entonces su corazón y sus manos fueron sacudidos, y estuvieron con dolores como las que dan a luz». El testimonio hebreo se sigue en el texto principal, con el griego consultado como paralelo.'
    reason: alternative_reading
lexical_decisions:
- source_word: נמוגו
  english_pob_choice: melted
  chosen_spanish: se derritieron
  alternatives_spanish:
  - se desvanecieron
  - se desmoronaron
  - se derritieron en su ánimo
  lexicon: HALOT
  rationale: El hebreo expresa una pérdida de firmeza o disolución figurada; «se derritieron» conserva la imagen vívida elegida por la POB inglesa y sugiere colapso interior sin añadir interpretación ajena.
- source_word: בגאון לבם
  english_pob_choice: in the pride of their heart
  chosen_spanish: en la soberbia de su corazón
  alternatives_spanish:
  - en el orgullo de su corazón
  - por la altivez de su corazón
  - en la elevación de su corazón
  lexicon: HALOT
  rationale: גאון puede ser orgullo, altivez o exaltación; «soberbia» comunica bien el tono de autosuficiencia y mantiene el giro hebreo con el singular colectivo «corazón».
- source_word: ויחילו
  english_pob_choice: they writhed
  chosen_spanish: se retorcieron
  alternatives_spanish:
  - temblaron
  - sintieron angustia
  - estuvieron con dolor
  lexicon: HALOT
  rationale: El verbo admite la idea de temblor, retorcimiento o dolores de parto. «Se retorcieron» reproduce el movimiento corporal y evita repetir de modo redundante la imagen de parto que sigue.
- source_word: כיולדה
  english_pob_choice: like a woman giving birth
  chosen_spanish: como una mujer que da a luz
  alternatives_spanish:
  - como una mujer en parto
  - como una partera
  - como una mujer de parto
  lexicon: HALOT
  rationale: La forma participial apunta de manera natural a una mujer en labor de parto; «que da a luz» es una equivalencia clara y digna en español moderno.
- source_word: καρδία καὶ χεῖρες αὐτῶν
  english_pob_choice: their heart and hands were shaken
  chosen_spanish: '[a]'
  alternatives_spanish:
  - sus corazones y sus manos fueron sacudidos
  - se estremecieron sus corazones y manos
  lexicon: BDAG
  rationale: La tradición griega amplía la imagen a «corazón y manos», mientras que el hebreo habla del derrumbe interior en general. Por eso el texto principal sigue al hebreo, y la nota registra la lectura griega como paralelo.
theological_decisions:
- issue: Prioridad del hebreo frente al paralelo griego en una discrepancia menor de imagen
  english_pob_reading: The Hebrew witness is followed in the main text, with the Greek consulted as a parallel.
  chosen_spanish_reading: El texto principal sigue al testimonio hebreo; el griego se consigna como paralelo explicativo.
  alternative_spanish_readings:
  - 'Seguir directamente la ampliación griega: «se estremecieron sus corazones y sus manos»'
  - Fusionar ambos testigos en el texto principal
  rationale: No hay tensión doctrinal, pero sí una diferencia textual real. La POB inglesa eligió el hebreo para el texto principal y preservó el griego en nota; la versión española conserva esa misma decisión auditada para no borrar la variante.
  doctrine_reference: Crítica textual / testigos paralelos
translation_notes:
  revision_awareness: La versión española sigue la decisión revisada más reciente de la POB inglesa, que no requirió cambios tras el último pase; por tanto, se conserva la lectura hebrea principal con la nota al paralelo griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera explícitamente; aquí no aparece.
  - «Soberbia» traduce el matiz de גאון sin suavizarlo a un término moralmente neutro.
  - La nota usa una formulación sobria para el paralelo griego y evita mezclarla con el texto principal.
  - El marcador [a] se coloca en la frase del texto principal que corresponde a la variante textual registrada.
