translation:
  language: es
  text: Así también yo se lo he dado a Yahvé[a]; todos los días que viva, él está dado a Yahvé. Y allí adoró[a] a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se lo he prestado a Yahvé». El hebreo usa la misma raíz que «pedí» antes en el capítulo, creando un juego de palabras que en parte puede conservarse con «prestado». También puede entenderse al final: «Y allí adoraron a Yahvé». La forma hebrea se ha entendido de manera diferente en la tradición de traducción.'
    reason: lexical_alternative_and_alternative_reading
lexical_decisions:
- source_word: הִשְׁאִלְתִּהוּ
  english_pob_choice: have given him / have lent him
  chosen_spanish: se lo he dado
  alternatives_spanish:
  - se lo he dedicado
  - se lo he prestado
  lexicon: HALOT
  rationale: El verbo en hifil de שׁאל conserva el juego de palabras con el relato anterior, donde Hanna «pidió» al niño; en español, «dar» comunica con naturalidad la entrega efectiva, mientras que «prestar» preserva mejor el eco léxico pero suena menos natural en este contexto. Se evita «dedicar» como traducción principal porque atenúa el movimiento concreto de entrega que el hebreo sostiene aquí.
- source_word: לַֽיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a Yahweh
  lexicon: DOCTRINE.md Contested terms — יְהוָה YHWH → Yahvé
  rationale: Se mantiene «Yahvé» como forma principal para el Nombre divino, siguiendo la norma del proyecto. La preposición «a» expresa bien el movimiento de entrega/dedicación del hijo al destinatario divino.
- source_word: כָּל הַיָּמִים אֲשֶׁר הָיָה
  english_pob_choice: all the days that he lives
  chosen_spanish: todos los días que viva
  alternatives_spanish:
  - todos los días que vive
  - por todos los días de su vida
  - mientras viva
  lexicon: HALOT
  rationale: El hebreo expresa duración de vida de manera idiomática; en español, el subjuntivo «que viva» conserva ese valor prospectivo y de duración. «Todos los días» refleja con cercanía formal el total de la vida sin recargar la frase.
- source_word: שָׁאוּל
  english_pob_choice: is given / is lent
  chosen_spanish: será dado
  alternatives_spanish:
  - será prestado
  - será dedicado
  - está dado
  lexicon: HALOT
  rationale: La forma pasiva/particípial del mismo verbo שׁאל mantiene la repetición semántica con el verbo anterior. «Será dado» es la opción más natural en español, aunque no reproduce tan visiblemente el juego de palabras como «será prestado»; por eso se documenta la alternativa.
- source_word: וַיִּשְׁתַּחוּ
  english_pob_choice: he worshiped / they worshiped
  chosen_spanish: adoró
  alternatives_spanish:
  - se postró
  - adoraron
  - adoró allí
  lexicon: HALOT
  rationale: El verbo abarca postración reverente y acto de culto; «adoró» comunica el sentido religioso en español. Se conserva la ambigüedad del sujeto con una forma singular que corresponde a la morfología, sin excluir la lectura tradicional plural en la nota.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: Adverbio locativo simple; «allí» es la equivalencia natural y sobria en español.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton, y el proyecto español adopta «Yahvé» como forma principal. Se evita «el SEÑOR» porque funcionaría como sustitución de máscara y no como representación del nombre revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sujetos de וַיִּשְׁתַּחוּ
  english_pob_reading: he worshiped Yahweh there / they worshiped Yahweh there
  chosen_spanish_reading: Y allí adoró a Yahvé.
  alternative_spanish_readings:
  - Y allí adoraron a Yahvé.
  - Y allí se postró ante Yahvé.
  rationale: La morfología hebrea es singular, pero la tradición de traducción ha vacilado entre singular y plural según el sujeto implícito. Se mantiene el singular en el texto principal y se preserva la alternativa plural en nota para no resolver en exceso la ambigüedad.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción inglesa más reciente reemplazó «lent» por «given» para mayor naturalidad, pero mantuvo el reconocimiento del juego léxico con שׁאל. La versión española sigue esa revisión principal con «se lo he dado», sin perder de vista la alternativa «prestado» que preserva mejor la relación verbal con el contexto narrativo.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה, conforme al estándar del proyecto.
  - Se evita «Cristo» porque el pasaje no trata de la figura mesiánica ni del título χριστός.
  - Se mantiene «adoró» para וַיִּשְׁתַּחוּ por su valor cultual, con la alternativa física «se postró» documentada en la nota.
  - La frase «será dado» sigue la decisión inglesa reciente de priorizar claridad sin borrar la resonancia del verbo שׁאל.
  - La puntuación reproduce el cierre de cita y la coordinación narrativa del hebreo de forma fluida en español.
