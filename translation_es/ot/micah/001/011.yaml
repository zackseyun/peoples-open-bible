  text: עִבְרִ֥י לָ/כֶ֛ם יוֹשֶׁ֥בֶת שָׁפִ֖יר עֶרְיָה בֹ֑שֶׁת לֹ֤א יָֽצְאָה֙ יוֹשֶׁ֣בֶת צַֽאֲנָ֔ן מִסְפַּד֙ בֵּ֣ית הָאֵ֔צֶל יִקַּ֥ח מִ/כֶּ֖ם עֶמְדָּתֽ/וֹ־׃
base_translation:
  language: en
  yaml_path: translation/ot/micah/001/011.yaml
  text: Pass on[a], naked and in shame, inhabitant of Shaphir. The inhabitant of Zaanan has not come out[c][b]. The lamentation of Beth-ezel will take away from you its support.
  footnotes:
  - marker: a
    text: 'Shaphir, Zaanan, and Beth-ezel are place names. Micah likely uses wordplay on their sounds or meanings: Shaphir may suggest beauty, Zaanan sounds like ''come out,'' and Beth-ezel may suggest a nearby house or place at one''s side.'
    reason: cultural_note
  - marker: b
    text: Or 'Pass by' instead of 'Pass on.' The command may imply going away into exile.
    reason: lexical_alternative
  - marker: c
    text: Or 'The mourning of Beth-ezel takes away from you its standing place.' The final clause is difficult; the Hebrew may refer to the loss of nearby support or refuge.
    reason: lexical_alternative
