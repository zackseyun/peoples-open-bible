  text: When she rose to glean[a], Boaz commanded his young men, saying, “Let her glean even among the sheaves[b], and do not humiliate her.”
  footnotes:
  - marker: a
    text: Or “between the sheaves.” The Hebrew preposition is literally “between,” but “among” is more natural English in this setting.
    reason: lexical_alternative
  - marker: b
    text: Or “do not shame her.” The Hebrew verb can denote causing disgrace or public humiliation.
    reason: lexical_alternative
