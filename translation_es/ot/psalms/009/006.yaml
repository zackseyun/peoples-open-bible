translation:
  language: es
  text: Reprendiste a las naciones; destruiste a los malvados[a]; borraste su nombre[b] por siempre y para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'al malvado'; el singular hebreo puede entenderse de manera individual o colectiva.
    reason: alternative_reading
  - marker: b
    text: Literalmente 'su nombre'; en contexto implica la desaparición de su memoria o renombre.
    reason: lexical_alternative
lexical_decisions:
- source_word: גָּעַרְתָּ
  english_pob_choice: you rebuked
  chosen_spanish: reprendiste
  alternatives_spanish:
  - reprobaste
  - reprendiste con severidad
  lexicon: HALOT
  rationale: גער expresa una reprensión o amonestación enérgica con fuerza efectiva. 'Reprendiste' conserva la acción verbal directa en español sin convertirla en una paráfrasis más interpretativa.
- source_word: גּוֹיִם
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: En contexto de juicio, גוים se refiere a las naciones como colectivos. 'Las naciones' es la opción más natural y mantiene el sentido histórico-literario sin introducir una oposición religiosa ajena al verso.
- source_word: אִבַּדְתָּ
  english_pob_choice: you destroyed
  chosen_spanish: destruiste
  alternatives_spanish:
  - hiciste perecer
  - borraste
  lexicon: HALOT
  rationale: 'El piel de אבד tiene fuerza causativa/intensiva: hacer perecer, destruir. ''Destruiste'' comunica esa fuerza con naturalidad en español.'
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el malvado
  alternatives_spanish:
  - el impío
  - el malvado colectivo
  lexicon: HALOT
  rationale: Aunque la forma es singular, puede funcionar de manera colectiva o representativa. 'El malvado' preserva el singular del hebreo y permite esa amplitud semántica sin exigir una lectura exclusivamente individual o colectiva.
- source_word: שְׁמָם
  english_pob_choice: their name
  chosen_spanish: su nombre
  alternatives_spanish:
  - su memoria
  - su renombre
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'su nombre' (plural-sufijo). En español, 'su nombre' conserva la forma lexical y deja implícita la idea de memoria o reputación, como en el auditorio inglés.
- source_word: מָחִיתָ
  english_pob_choice: you blotted out
  chosen_spanish: borraste
  alternatives_spanish:
  - borraste por completo
  - raíste
  lexicon: HALOT
  rationale: '''מחה'' evoca borrar o eliminar un registro. ''Borraste'' es idiomático y suficientemente vívido en español; mantiene la imagen de eliminación escrita o memorial.'
- source_word: לְעוֹלָם וָעֶד
  english_pob_choice: forever and ever
  chosen_spanish: para siempre y para siempre
  alternatives_spanish:
  - por siempre y para siempre
  - eternamente
  lexicon: HALOT
  rationale: La fórmula hebrea intensifica la duración con un paralelismo enfático. 'Para siempre y para siempre' reproduce esa duplicación de modo claro y reverente en español.
theological_decisions:
- issue: Sentido singular o colectivo de רָשָׁע
  english_pob_reading: 'collective/generic: ''the wicked'''
  chosen_spanish_reading: 'singular genérico/representativo: ''el malvado'''
  alternative_spanish_readings:
  - 'colectivo: ''los malvados'''
  - 'individual: ''el malvado'''
  rationale: El hebreo singular puede ser genérico o representativo. Dado que el verso habla de naciones y de su nombre, el singular español mantiene la ambigüedad útil sin perder coherencia contextual.
  doctrine_reference: Salmo 9:6; uso genérico del singular en hebreo poético
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió 'name' a 'their name' para reflejar el sufijo plural del hebreo. La traducción española conserva ese plural implícito con 'su nombre', que en el discurso español puede referirse al conjunto mencionado en el verso.
  spanish_consistency_notes:
  - Se mantiene 'naciones' para גוים, en línea con el criterio POB y con el contexto de juicio.
  - Se evita 'SEÑOR' u otra sustitución litúrgica porque no aparece el tetragrámaton en este verso.
  - '''Borraste'' conserva la metáfora de eliminación ligada a ''nombre'', apoyada por la nota.'
  - La puntuación con punto y coma refleja correctamente la progresión de tres acciones poéticas del verso.
