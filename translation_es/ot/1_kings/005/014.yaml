    text: 'También: “de todas las naciones”. El hebreo עַמִּים está en plural y puede referirse a pueblos o naciones.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: “de todos los reyes de la tierra”; probablemente significa que tales visitantes venían de, o eran enviados por, reyes de toda la tierra que habían oído de la sabiduría de Salomón.'
    reason: cultural_note
  revision_rationale: Se corrige el tiempo verbal a pretérito simple para reflejar mejor el wayyiqtol narrativo; se reemplaza 'de parte de' por 'de' para no sobreinterpretar מֵאֵת; se añade la nota cultural presente en la auditoría inglesa; y se suaviza la última cláusula a un español más natural con 'habían oído hablar de su sabiduría'.
