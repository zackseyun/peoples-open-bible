translation:
  language: es
  text: ¿Quiénes son estos que vuelan como una nube[a], y como palomas a sus ventanas?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “sus palomares”; es decir, las aberturas o ventanas de un palomar.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quiénes
  alternatives_spanish:
  - ¿Quién
  lexicon: HALOT
  rationale: El hebreo introduce una pregunta exclamativa con pronombre interrogativo plural implícito por el contexto. En español, el plural "¿Quiénes" concuerda naturalmente con "estos" y conserva el impacto interrogativo.
- source_word: אֵלֶּה
  english_pob_choice: are these
  chosen_spanish: estos
  alternatives_spanish:
  - son estos
  - estas personas
  lexicon: HALOT
  rationale: El demostrativo plural se integra de forma natural en español con "estos". No es necesario añadir explícitamente la cópula en una pregunta breve de esta clase.
- source_word: כָּעָב
  english_pob_choice: like a cloud
  chosen_spanish: como nube
  alternatives_spanish:
  - como una nube
  - como nube de nube
  lexicon: HALOT
  rationale: Se conserva la comparación directa con עָב. En español, omitir el artículo en una comparación poética puede sonar más compacto y cercano al hebreo, sin perder el sentido de masa o formación nubosa.
- source_word: תְּעוּפֶינָה
  english_pob_choice: fly
  chosen_spanish: vuelan
  alternatives_spanish:
  - volarán
  - vuelen
  lexicon: HALOT
  rationale: El imperfecto femenino plural tiene valor vivencial y descriptivo en la imagen profética. "Vuelan" comunica el movimiento visual presente sin forzar un futuro en español.
- source_word: וְכַיּוֹנִים
  english_pob_choice: and like doves
  chosen_spanish: y como palomas
  alternatives_spanish:
  - y como tórtolas
  - y como palomas mensajeras
  lexicon: HALOT
  rationale: '"יונים" son palomas; se mantiene el paralelo con la primera comparación. "Palomas" es el equivalente más directo y transparente en español.'
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - a las
  lexicon: HALOT
  rationale: La preposición direccional se vierte con "a" en una construcción española natural con verbo de movimiento y destino implícito.
- source_word: אֲרֻבֹּתֵיהֶם
  english_pob_choice: their windows
  chosen_spanish: sus ventanas
  alternatives_spanish:
  - sus aberturas
  - sus palomares
  - sus oquedades
  lexicon: HALOT
  rationale: La base léxica permite "ventanas" u "aberturas". Se conserva "ventanas" como en la POB inglesa, porque es el equivalente más directo y legible, sin excluir la imagen contextual de aberturas de palomar.
translation_notes:
  revision_awareness: Se siguió la lectura estable del texto hebreo masorético sin necesidad de revisión textual; el paralelo poético se mantuvo intacto y la única decisión interpretativa notable es el alcance de אֲרֻבֹּתֵיהֶם, que puede ser “ventanas” o, por contexto, las aberturas de una palomaera.
  spanish_consistency_notes:
  - Se mantuvo un español bíblico contemporáneo, evitando arcaísmos innecesarios.
  - 'Se preservó la fuerza visual de las dos comparaciones paralelas: nube / palomas.'
  - La nota al pie conserva la ambigüedad léxica documentada por la POB inglesa sin imponer una sola solución interpretativa.
