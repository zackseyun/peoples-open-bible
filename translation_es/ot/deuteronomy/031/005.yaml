revisions:
- from: Y Yahvé los entregará delante de ustedes[a], y ustedes actuarán contra ellos conforme a toda la ordenanza[b] que yo les he mandado.
  to: Y Yahvé los entregará delante de ustedes[a], y ustedes harán con ellos conforme a todo el mandamiento[b] que yo les he mandado.
  rationale: Se sustituyó «actuarán contra ellos» por «harán con ellos» para evitar añadir un matiz no explicitado por עשה + ל y reflejar mejor la construcción hebrea. Se cambió «toda la ordenanza» por «todo el mandamiento» para alinearse con הַמִּצְוָה y con la nota auditada sobre el singular colectivo. Se ajustó la nota [a] para conservar la literalidad de «delante de ustedes» y una alternativa idiomática más cercana al expediente inglés.
