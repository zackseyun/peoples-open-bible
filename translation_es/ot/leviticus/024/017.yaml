  glossary_alignment: No hay conflictos con la terminología global del proyecto. «un hombre» respeta la decisión sobre אִישׁ; «ser humano» comunica bien אָדָם/נֶפֶשׁ en este contexto. La corrección principal es estilístico-legal para la fórmula de pena capital.
