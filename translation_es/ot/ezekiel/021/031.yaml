    reason: cultural_note
  - marker: b
    text: 'O: «Esto ya no será así», «Esto no será más» o «Esto no será como antes». El hebreo es breve y elíptico, y enfatiza que el orden presente está siendo trastornado.'
    reason: alternative_reading
  revision_rationale: 'Se corrige «toma la corona» a «quita la corona» para reflejar mejor el sentido de remoción del hebreo וְהָרִים en contexto. Se conservan el registro, la sintaxis principal y la inversión profética final. También se reubican las notas para alinearlas con las decisiones documentadas: nota cultural en «turbante» y nota de lectura alternativa en la frase elíptica.'
