    text: O, «está cuidando las ovejas». El hebreo dice literalmente «pastoreando el rebaño».
    reason: lexical_alternative
  - marker: b
    text: O, «no nos sentaremos alrededor / no tomaremos nuestro lugar», probablemente con el sentido de que no comenzarían la comida o la reunión formal hasta que él llegara.
    reason: lexical_alternative
  revision_rationale: Se corrige el mandato para reflejar con precisión שִׁלְחָה וְקָחֶנּוּ («Envía por él y tráelo»), se añaden las notas léxicas preservadas en el audit trail inglés, y se eleva ligeramente el registro de הִנֵּה con «y he aquí» para una lectura más digna y bíblica en español.
