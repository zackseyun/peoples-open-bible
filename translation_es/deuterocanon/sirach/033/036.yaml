translation:
  language: es
  text: No consultes con cualquiera,[a] sino ten un solo consejero entre mil.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No tomes consejo con cualquiera». El verbo griego puede significar «consultar» o «tomar consejo».'
    reason: lexical_alternative
  - marker: b
    text: La expresión «uno entre mil» es una hipérbole proverbial que exhorta a una selectividad extrema al escoger consejero.
    reason: cultural_note
lexical_decisions:
- source_word: μὴ
  english_pob_choice: Do not
  chosen_spanish: No consultes
  alternatives_spanish:
  - 'No'
  lexicon: BDAG
  rationale: La partícula negativa con imperativo prohibitivo se expresa naturalmente en español con «No»; se integra con el verbo para una orden directa y clara.
- source_word: ἐν παντὶ ἀνθρώπῳ
  english_pob_choice: with every person
  chosen_spanish: a todo hombre
  alternatives_spanish:
  - con toda persona
  - de toda persona
  - a cualquier persona
  lexicon: BDAG
  rationale: El griego singular ἀνθρώπῳ es masculino genérico en un dicho proverbial. Se conserva «hombre» para mantener esa forma proverbial y la correspondencia léxica, sin forzar una generalización que diluya el matiz del texto base.
- source_word: συμβούλευε
  english_pob_choice: take counsel with
  chosen_spanish: consultes
  alternatives_spanish:
  - tomes consejo con
  - busques consejo con
  - deliberes con
  lexicon: BDAG
  rationale: El verbo puede significar consultar o tomar consejo. «Consultes» es breve, idiomático en español y conserva la idea de acudir a otro para consejo sin añadir un matiz más fuerte que el griego.
- source_word: ἕνα ἐκ χιλίων
  english_pob_choice: one out of a thousand
  chosen_spanish: un consejero entre mil
  alternatives_spanish:
  - uno de mil
  - uno entre mil
  - un consejero de mil
  lexicon: BDAG
  rationale: La expresión proverbial se vierte de manera natural en español como «entre mil», preservando la hipérbole de extrema selectividad. Se explicita el sustantivo con «consejero» para conservar la relación con σύμβουλον.
- source_word: σύμβουλον
  english_pob_choice: counselor
  chosen_spanish: consejero
  alternatives_spanish:
  - asesor
  - dador de consejo
  lexicon: BDAG
  rationale: «Consejero» es el cognado directo y transparente en español para el campo semántico de consejo. Mantiene el vínculo lexical con συμβούλευε.
- source_word: ἔχε
  english_pob_choice: keep
  chosen_spanish: conserva
  alternatives_spanish:
  - ten
  - retén
  - guarda
  lexicon: BDAG
  rationale: El imperativo de posesión/retención no solo es tener, sino mantener como recurso confiable. «Conserva» comunica mejor la idea de retener y cuidar a ese consejero escogido.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de Swete (μὴ ἐν παντὶ ἀνθρώπῳ συμβούλευε, ἀλλὰ ἕνα ἐκ χιλίων σύμβουλον ἔχε) y toma como guía la decisión auditada del POB inglés de leer συμβούλευε como consejo/consulta, no como mera deliberación abstracta. Se preserva la hipérbole proverbial de «uno entre mil» y la correspondencia entre el verbo de consultar y el sustantivo consejero.
  spanish_consistency_notes:
  - Se mantuvo «hombre» como equivalente del singular masculino ἀνθρώπῳ, dado el tono proverbial y la política de no aplanar innecesariamente el género del original.
  - «Consejero» y «consultes» conservan la familia léxica del consejo, reforzando la cohesión del proverbio.
  - La frase «entre mil» se dejó en forma proverbial natural para español, sin añadir explicaciones al cuerpo del texto.
