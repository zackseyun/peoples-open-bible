revisions:
- from: Y sucederá que será un día[a], conocido para Yahvé, no día ni noche[c][b]; pero al tiempo de la tarde habrá luz.
  to: Y será un día[a], conocido por Yahvé[c], ni día ni noche[b]; pero al atardecer habrá luz.
  rationale: Se simplificó la apertura a «Y será» para evitar una duplicación verbal no natural; se cambió «conocido para Yahvé» por «conocido por Yahvé» en el texto principal para lograr español idiomático, preservando la forma hebrea en nota; se ajustó «no día ni noche» a «ni día ni noche» por claridad y dignidad estilística; y se sustituyó «al tiempo de la tarde» por «al atardecer» como equivalente natural y fiel de לְעֵת עֶרֶב.
