revisions:
- from: Entonces el sacerdote examinará[a] el neṭeq en el séptimo día, y he aquí, si el neṭeq no se ha extendido en la piel y su aspecto no está más profundo que la piel, el sacerdote lo declarará limpio[b][c]. Lavará sus vestiduras y quedará limpio.
  to: Entonces el sacerdote examinará[a] la afección escamosa el séptimo día, y si resulta que la afección escamosa no se ha extendido en la piel y su aspecto no es más profundo que la piel, el sacerdote lo declarará limpio[c][b]. Lavará sus vestiduras y quedará limpio.
  rationale: Se reemplaza la transliteración opaca 'neṭeq' por 'afección escamosa', que sigue la lógica descriptiva del expediente inglés y mejora mucho la legibilidad en español sin imponer un diagnóstico moderno preciso. Se ajusta 'y he aquí, si' a 'y si resulta que' para reflejar la función observacional de וְהִנֵּה con español natural. Se conserva 'lo declarará limpio' por su valor judicial-ritual correcto. Se mantienen las notas necesarias, corrigiendo su formulación para alinearlas mejor con el rastro POB y con una lectura eclesial amplia.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:03:35Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido básico del hebreo: examen en el séptimo día, no propagación en la piel, apariencia no más profunda que la piel, declaración sacerdotal de limpieza, lavado de ropa y resultado de limpieza. Sin embargo, introduce varias decisiones mejorables frente a la evidencia y al rastro POB: translitera נתק como ''neṭeq'' en el texto principal en vez de ofrecer una solución española legible; conserva un calco poco natural ''y he aquí, si''; y ''en el séptimo día'' suena menos natural que ''el séptimo día'' o ''en el séptimo día'' según contexto, siendo preferible aquí la forma sin artículo preposicional calcada del inglés.'
  spanish_quality_summary: El español es comprensible, pero tiene varios tropiezos de naturalidad y legibilidad eclesial amplia. 'Neṭeq' no es accesible para lectores generales; 'y he aquí, si' suena forzado; y la combinación de registro mezcla transliteración técnica con formulación bíblica tradicional. 'Lo declarará limpio' y 'Lavará sus vestiduras y quedará limpio' funcionan bien, aunque 'ropa' sería más natural; 'vestiduras' sigue siendo aceptable en registro bíblico digno.
  glossary_alignment: 'No hay conflicto con los términos troncales del proyecto como Yahvé, Mesías, etc. La principal desalineación es metodológica: donde la POB inglesa eligió un equivalente descriptivo legible para נתק (''scaly infection''), el español recurre a transliteración en el texto principal sin necesidad. Conviene usar una expresión española descriptiva y dejar alternativas en nota.'
  issues:
  - severity: high
    issue: Uso de 'neṭeq' transliterado en el texto principal
    rationale: La evidencia y la decisión léxica inglesa favorecen un equivalente descriptivo legible, no una transliteración opaca. En español eclesial amplio, 'neṭeq' entorpece la comprensión y no preserva mejor el sentido que una expresión como 'afección escamosa'.
  - severity: medium
    issue: Calco poco natural 'y he aquí, si'
    rationale: וְהִנֵּה en esta fórmula de inspección introduce la observación; en español natural basta 'y si resulta que' o simplemente 'y si'. Mantener 'he aquí' aquí suena rígido y poco idiomático.
  - severity: medium
    issue: Nota léxica con alternativas inestables ('tiña' / 'sarna')
    rationale: La nota actual cambia innecesariamente las alternativas del rastro inglés y 'sarna' puede desorientar al lector hacia otra afección. Conviene conservar alternativas más cercanas al expediente, como 'tiña' o la tradicional 'escalio', y explicar que se trata de una afección específica.
  - severity: low
    issue: '''en el séptimo día'' suena menos natural que ''el séptimo día'''
    rationale: Ambas pueden entenderse, pero en esta construcción procedimental española 'el séptimo día' es más fluido.
