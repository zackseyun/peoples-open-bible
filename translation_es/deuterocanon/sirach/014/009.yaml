translation:
  language: es
  text: A los ojos del codicioso[a], su porción es demasiado poca, y al tomar la porción de su prójimo destruye su propia porción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo de este pasaje es difícil; el paralelo griego dice literalmente «el ojo del codicioso no se llena con una porción», lo que apoya leer aquí a כּוֹשֵׁל como referencia a la avidez y no de manera literal como «el que tropieza».
    reason: alternative_reading
lexical_decisions:
- source_word: בְּעֵין / ὀφθαλμὸς
  english_pob_choice: In the eye of / the eye of
  chosen_spanish: A los ojos de
  alternatives_spanish:
  - En la opinión de
  - Ante los ojos de
  lexicon: HALOT; LXX parallel
  rationale: Mantiene la imagen idiomática de percepción/valoración sin volverlo una paráfrasis abstracta. En español, «a los ojos de» comunica naturalmente la misma idea proverbial.
- source_word: כּוֹשֵׁל
  english_pob_choice: the greedy
  chosen_spanish: el codicioso
  alternatives_spanish:
  - el avaro
  - el codicioso y ávido
  - el avaricioso
  lexicon: HALOT; Greek πλεονέκτου
  rationale: El hebreo es difícil y el paralelo griego apunta con claridad a la idea de avidez/codicia. «Codicioso» reproduce mejor ese campo semántico que una traducción literal de un posible sentido verbal.
- source_word: מְעַט
  english_pob_choice: too little
  chosen_spanish: demasiado poca
  alternatives_spanish:
  - poca
  - insuficiente
  - muy poca
  lexicon: HALOT
  rationale: Conserva el juicio evaluativo de insuficiencia, no solo la cantidad objetiva. En español concuerda con «porción» y expresa que le parece insuficiente.
- source_word: חֶלְקוֹ
  english_pob_choice: his portion
  chosen_spanish: su porción
  alternatives_spanish:
  - su parte
  - su herencia
  - su reparto
  lexicon: HALOT
  rationale: «Porción» preserva el tono sapiencial y la repetición del versículo. Es más cercano al hebreo que «parte» en la primera cláusula.
- source_word: וְלוֹקֵחַ
  english_pob_choice: by taking
  chosen_spanish: al tomar
  alternatives_spanish:
  - y al tomar
  - cuando toma
  - tomando
  lexicon: HALOT
  rationale: 'Expresa bien el valor participial: la segunda acción caracteriza al sujeto y funciona como medio o condición del resultado.'
- source_word: חֵלֶק רֵעֵהוּ
  english_pob_choice: his neighbor’s share
  chosen_spanish: la parte de su prójimo
  alternatives_spanish:
  - la porción de su vecino
  - la parte de su compañero
  - la porción de su semejante
  lexicon: HALOT
  rationale: «Prójimo» refleja la dimensión ética de רֵעַ y es más natural en español bíblico moderno que una traducción demasiado literal de «vecino» si se entiende como relación moral, no solo espacial.
- source_word: מְאַבֵּד
  english_pob_choice: he destroys
  chosen_spanish: destruye
  alternatives_spanish:
  - arruina
  - pierde
  - hace perecer
  lexicon: HALOT
  rationale: 'Recoge la fuerza causal del verbo: el acto de tomar la parte ajena conduce a la ruina de la propia porción o vida. «Destruye» es directo y sobrio.'
theological_decisions:
- issue: Resolución de la dificultad de כּוֹשֵׁל mediante el paralelo griego
  english_pob_reading: The greedy / the eye of the greedy is not filled with a portion
  chosen_spanish_reading: el codicioso / a los ojos del codicioso
  alternative_spanish_readings:
  - el que tropieza
  - el vacilante
  - el que falla
  rationale: El expediente de la POB en inglés toma el paralelo griego como guía interpretativa para aclarar el hebreo oscuro. En español se conserva esa decisión, porque el sentido proverbial depende de la avidez insaciable, no de la idea literal de tropezar.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo conservado, usando el paralelo griego como entrada real cuando Ben Sira lo requiere.'
- issue: Matiz de resultado moral en la segunda cláusula
  english_pob_reading: by taking his neighbor’s share he destroys his own portion
  chosen_spanish_reading: al tomar la parte de su prójimo destruye su propia porción
  alternative_spanish_readings:
  - al tomar la parte de su prójimo arruina su propia porción
  - al tomar la parte de su prójimo pierde su propia porción
  rationale: 'La formulación mantiene la relación moral de causa y consecuencia: la codicia que despoja al otro termina dañando al propio codicioso. «Destruye» conserva el peso ético del verbo y evita suavizar la advertencia.'
  doctrine_reference: 'Sabiduría bíblica: la injusticia humana trae ruina sobre quien la practica.'
translation_notes:
  revision_awareness: La redacción sigue la lectura de alta concordancia del expediente inglés y no introduce cambios respecto del sentido ya estabilizado; se mantiene la decisión de dejar visible la dificultad hebrea mediante nota, mientras el texto principal adopta una solución idiomática natural en español.
  spanish_consistency_notes:
  - Se conserva «porción» en ambas apariciones para reflejar la repetición sapiencial del hebreo y del paralelo griego.
  - Se usa «prójimo» para רֵעַ por su valor ético, en línea con el tono de advertencia moral del versículo.
  - No se emplea «SEÑOR» ni terminología cristianizada ajena al pasaje; la frase se mantiene en registro sapiencial judío.
  - La nota a pie de página está anclada solo en «codicioso» para señalar la decisión lexical disputada sin sobrecargar el texto principal.
