    rationale: El hebreo apunta a vegetación de marisma/reed grass; una formulación como «entre los juncos» o «en el carrizal» suena más idiomática sin perder el referente.
  - severity: low
    issue: La nota [a] está anclada en «he aquí» en vez de en «Nilo/el río».
    rationale: Aunque el contenido de la nota es correcto, el anclaje ideal debe ir sobre el término al que comenta para evitar ambigüedad editorial.
  revised_spanish_text: Y he aquí, siete vacas subían del Nilo[a], hermosas en apariencia[b] y gordas de carne, y pastaban entre los juncos[c].
