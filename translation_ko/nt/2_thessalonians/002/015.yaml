id: 2TH.2.15
reference: 2 Thessalonians 2:15
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἄρα οὖν, ἀδελφοί, στήκετε, καὶ κρατεῖτε τὰς παραδόσεις ἃς ἐδιδάχθητε εἴτε διὰ λόγου εἴτε δι’ ἐπιστολῆς ἡμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/002/015.yaml
  text: So then[a], brothers, stand firm and hold fast to the traditions that you were taught, whether by word or by our letter.
translation:
  language: ko
  text: 그러므로 형제[a] 여러분, 굳게 서서 우리의 말로든 편지로든 여러분이 배운 전통[b]을 굳게 붙드십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ἀδελφοί는 남성 복수 호격이며 회중 전체를 대표적으로 가리킨다.
    reason: cultural_note
  - marker: b
    text: 또는 「가르침」, 「전수된 것」. 헬라어 παράδοσις는 「전해 받은 것」을 가리키며, 본 문맥은 사도적 구두·서신 전수를 포함한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρα οὖν
  english_pob_choice: So then
  chosen_korean: 그러므로
  alternatives_korean:
  - 따라서 그렇다면
  - 그러니
  lexicon: BDAG
  rationale: 이중 추론 불변사의 결론 도입을 「그러므로」로 자연스럽게 옮긴다.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_korean: 형제
  alternatives_korean:
  - 형제자매
  lexicon: BDAG
  rationale: 성별 정확성 원칙.
- source_word: στήκετε
  english_pob_choice: stand firm
  chosen_korean: 굳게 서서
  alternatives_korean:
  - 굳건히 서서
  - 견고히 서서
  lexicon: BDAG
  rationale: 현재 명령의 지속적 굳건함을 「굳게 서다」로 자연스럽게 표현하며 한국어 명령 흐름에 맞춘다.
- source_word: κρατεῖτε
  english_pob_choice: hold fast
  chosen_korean: 굳게 붙드십시오
  alternatives_korean:
  - 견고히 붙드십시오
  - 꽉 붙드십시오
  lexicon: BDAG
  rationale: κρατέω의 견고한 유지를 「굳게 붙들다」로 자연스럽게 표현한다.
- source_word: παραδόσεις
  english_pob_choice: traditions
  chosen_korean: 전통
  alternatives_korean:
  - 가르침
  - 전수된 것
  lexicon: BDAG
  rationale: 「전해 받은 것」의 의미를 가장 직접적으로 담는 「전통」을 채택한다. 한국어 「전통」은 본문이 가리키는 사도적 구두/서신 전수를 후대 제도적 함의 없이 표현한다. 「가르침」은 약하다.
- source_word: ἐδιδάχθητε
  english_pob_choice: you were taught
  chosen_korean: 여러분이 배운
  alternatives_korean:
  - 여러분이 가르침 받은
  - 여러분에게 가르쳐진
  lexicon: BDAG
  rationale: 수동형의 자연스러운 한국어 표현.
- source_word: διὰ λόγου
  english_pob_choice: by word
  chosen_korean: 우리의 말로든
  alternatives_korean:
  - 말로든
  - 구두로든
  lexicon: BDAG
  rationale: 「우리의 편지」와 평행되도록 「우리의 말」을 한국어 흐름에 맞게 보충한다.
- source_word: δι’ ἐπιστολῆς ἡμῶν
  english_pob_choice: by our letter
  chosen_korean: 편지로든
  alternatives_korean:
  - 우리의 편지로든
  - 서신으로든
  lexicon: BDAG
  rationale: 구두/서신의 대비를 명확히.
theological_decisions:
- issue: παράδοσις의 한국어 번역(사도적 전통)
  chosen_reading: 전통
  alternative_readings:
  - 가르침
  - 전수된 것
  rationale: 「전해 받은 것」의 헬라어 의미를 가장 잘 담는 「전통」을 본문에 두며, 후대 교파적 「전통의 권위」 논쟁을 본문에 도입하지 않는다. 본 구절은 그 자체로 사도적 전수의 권위를 긍정할 뿐, 후대 정의에 대한 결정을 내리지 않는다.
  doctrine_reference: 'Affirmations; Translation philosophy §§1, 3, 5'
- issue: ἀδελφοί의 회중 호칭
  chosen_reading: 형제
  alternative_readings:
  - 형제자매
  rationale: 성별 정확성 원칙. 포용적 의미는 각주.
  doctrine_reference: 'DOCTRINE.md Gender-accurate over gender-neutral'
