translation:
  language: es
  text: Hasta que el día[a] sople y las sombras huyan, iré[b] al monte de mirra y al collado de franquincienso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Hasta que el día respire/sople» o «Hasta que el día se refresque y las sombras huyan». El verbo hebreo es literalmente «respirar/soplar» y puede evocar la brisa del atardecer o el romper del alba.'
    reason: lexical_alternative
  - marker: b
    text: 'O simplemente: «iré para mí» o «iré». El hebreo incluye un dativo ético («para mí»), que puede añadir énfasis más que una idea separada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד
  english_pob_choice: Until
  chosen_spanish: Hasta que
  alternatives_spanish:
  - Antes de que
  - Mientras
  lexicon: HALOT
  rationale: Marca temporal de límite o duración; en español, 'hasta que' reproduce con naturalidad ese valor de término esperado.
- source_word: שֶׁיָּפוּחַ
  english_pob_choice: breathes
  chosen_spanish: sople
  alternatives_spanish:
  - respire
  - sople el viento
  - se refresque
  lexicon: HALOT
  rationale: El hebreo literalmente significa 'soplar/respirar'. En español, 'sople' conserva mejor la imagen poética de un aliento o brisa que pasa por el día, sin interpretar en exceso el contexto.
- source_word: הַיּוֹם
  english_pob_choice: the day
  chosen_spanish: el día
  alternatives_spanish:
  - el tiempo del día
  - la luz del día
  lexicon: HALOT
  rationale: Sustantivo directo con artículo; mantiene la personificación poética del día.
- source_word: וְנָסוּ
  english_pob_choice: flee
  chosen_spanish: huyan
  alternatives_spanish:
  - se aparten
  - desaparezcan
  - escapen
  lexicon: HALOT
  rationale: נוס expresa huida; 'huyan' conserva el movimiento vívido de las sombras sin debilitarlo a un mero desaparecer.
- source_word: הַצְּלָלִים
  english_pob_choice: the shadows
  chosen_spanish: las sombras
  alternatives_spanish:
  - las sombras oscuras
  - las tinieblas
  lexicon: HALOT
  rationale: Traducción estándar y transparente de צללים; 'sombras' encaja con la escena poética y evita intensificar hacia 'tinieblas'.
- source_word: אֵלֶךְ לִי
  english_pob_choice: I will go to myself / I will go
  chosen_spanish: iré
  alternatives_spanish:
  - iré para mí
  - me iré
  - iré para mí mismo
  lexicon: HALOT
  rationale: El dativo ético לִי añade énfasis o matiz de interés propio, pero no exige una frase pesada en español. 'Iré' mantiene la fluidez y deja abierto el matiz sin sobreexplicarlo en el texto principal.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: al
  alternatives_spanish:
  - hacia el
  lexicon: HALOT
  rationale: Preposición direccional normal en español para indicar destino.
- source_word: הַר הַמּוֹר
  english_pob_choice: the mountain of myrrh
  chosen_spanish: el monte de mirra
  alternatives_spanish:
  - la montaña de mirra
  - el monte de myrrha
  lexicon: HALOT
  rationale: '''Monte'' es una opción natural y elevada en español para הַר en poesía; ''mirra'' preserva el sustantivo concreto del hebreo mor sin alegorizarlo.'
- source_word: גִּבְעַת הַלְּבוֹנָה
  english_pob_choice: the hill of frankincense
  chosen_spanish: el collado de incienso
  alternatives_spanish:
  - el monte de incienso
  - la colina de incienso
  - el collado de fragante resina
  lexicon: HALOT
  rationale: לבונה designa específicamente el incienso/frankincense. 'Collado' refleja bien גבעה y distingue el paralelo con 'monte'; 'incienso' es más natural en español, aunque más general que 'franquincienso', y aquí mantiene la imagen poética de forma inteligible.
theological_decisions:
- issue: Si la imagen debe interpretarse o mantenerse como poesía concreta
  english_pob_reading: Literal poetic imagery retained in the main text
  chosen_spanish_reading: Imagen poética literal conservada en el texto principal
  alternative_spanish_readings:
  - Metáfora erótica explícita del cuerpo de la amada
  - Referencia simbólica a retiro o adoración
  rationale: El hebreo presenta una imagen evocadora sin especificar su referente. Siguiendo la lectura auditable del POB inglés, conviene conservar la imaginería literal sin insertar una interpretación alegórica o erotizada en el cuerpo del versículo.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Cómo tratar el dativo ético לִי
  english_pob_reading: I will go to myself / I will go
  chosen_spanish_reading: Se deja implícito en 'iré'
  alternative_spanish_readings:
  - iré para mí
  - me iré
  - iré para mí mismo
  rationale: El hebreo permite un matiz enfático o de interés propio, pero no obliga a una expansión explícita. En español, añadirlo puede sonar artificial; dejarlo implícito respeta tanto la concisión como la tensión documental del original.
  doctrine_reference: HALOT; audit trail on ethical dative
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del POB inglés: se omitió cualquier equivalente de ''away'' después de ''go'' porque no está en el hebreo y no es necesario en español. La elección final también mantiene la alternancia poética entre ''monte'' y ''collado'' y evita sobrerrepresentar el dativo ético.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto, aunque este versículo no contiene el tetragrámaton.
  - '''Mirra'' e ''incienso'' conservan el campo aromático concreto del hebreo sin convertirlo en alegoría explícita.'
  - '''Monte'' y ''collado'' reflejan la distinción semántica entre הַר y גִּבְעָה.'
  - '''Huyan'' y ''sople'' preservan el dinamismo verbal del original, coherente con el estilo poético del Cantar.'
