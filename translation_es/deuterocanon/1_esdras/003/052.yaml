review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la mayor parte del griego: conserva a Apame, su filiación, el epíteto de Bartaco, el término ''concubina'' y la posición ''a la derecha del rey''. Sin embargo, el anclaje de la nota [a] está mal colocado: en el inglés auditado la nota alternativa ''Apama'' corresponde al nombre Ἀπάμην, no a ''lo''. Además, ''Yo lo veía a él'' suena forzado y menos natural que una forma simple de narración en español.'
  spanish_quality_summary: El español es mayormente claro, pero 'Yo lo veía a él[a]' resulta pesado y poco idiomático. En narrativa española, 'Vi[a] a él' sería incorrecto por énfasis, así que la mejor solución es 'Vi[a] a él y a Apame...' o, más naturalmente, 'Vi[a] a él y a Apame...' no fluye del todo; mejor 'Vi[a] a él, y a Apame...' manteniendo la nota en el nombre. El ajuste principal es mover la nota [a] a 'Apame[a]' y simplificar el verbo a 'Vi', en línea con la decisión inglesa de usar pasado simple narrativo.
  glossary_alignment: No hay términos teológicos del glosario principal en juego. 'Concubina' alinea bien con παλλακή. 'A la derecha del rey' es una buena opción idiomática para ἐν δεξιᾷ τοῦ βασιλέως. La transliteración 'Apame' es aceptable en español si se conserva la nota alternativa 'Apama'.
  issues:
  - severity: high
    issue: La nota [a] está anclada al pronombre 'él' en vez de al nombre 'Apame'.
    rationale: La nota explica una transliteración alternativa de Ἀπάμην ('Apama'), por lo que debe aparecer exactamente en el nombre correspondiente. Tal como está, induce a error y no cumple la disciplina de notas.
  - severity: medium
    issue: '''Yo lo veía a él'' suena forzado en español narrativo.'
    rationale: Aunque ἐθεώρουν es imperfecto formalmente, el inglés auditado justificó un pasado simple narrativo. En español, 'Vi' o 'Yo vi' comunica mejor el sentido sin rigidez. La duplicación 'lo ... a él' añade énfasis no exigido por el griego.
  revised_spanish_text: Vi a él y a Apame[a], hija de Bartaco el admirable[b], la concubina del rey, sentada a la derecha del rey.
  revised_footnotes:
  - marker: a
    text: O “Apama”. El nombre griego Ἀπάμην admite más de una transliteración estándar.
    reason: lexical_alternative
  - marker: b
    text: El epíteto de Bartaco significa literalmente “admirable”, “notable” o “renombrado”.
    reason: lexical_alternative
  revision_rationale: Se mueve la nota [a] a 'Apame' para que corresponda correctamente a la alternativa transliterativa documentada. Se cambia 'Yo lo veía a él' por 'Vi a él' para seguir mejor la decisión auditada de pasado simple narrativo y evitar la pesadez del imperfecto con duplicación pronominal. Se conservan las demás decisiones léxicas correctas del borrador.
