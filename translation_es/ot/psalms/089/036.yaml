translation:
  language: es
  text: Una vez he jurado por mi santidad[a][b]; no mentiré a David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «si miento a David», fórmula de juramento que significa «no mentiré a David» o «ciertamente no seré falso a David».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Una vez por todas he jurado por mi santidad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחַת
  english_pob_choice: Once
  chosen_spanish: Una vez
  alternatives_spanish:
  - Una vez por todas
  - Una sola vez
  lexicon: HALOT
  rationale: En contexto de juramento, אַחַת funciona adverbialmente con sentido de una acción única y decisiva. «Una vez» preserva ese valor y suena natural en español, sin convertirlo en una explicación más amplia de la que permite el hebreo.
- source_word: נִשְׁבַּעְתִּי
  english_pob_choice: I have sworn
  chosen_spanish: he jurado
  alternatives_spanish:
  - juré
  lexicon: HALOT
  rationale: El perfecto español «he jurado» transmite una acción ya realizada con vigencia actual en el contexto del juramento divino. Mantiene la fuerza vinculante que el inglés POB buscó con present perfect.
- source_word: בְּקָדְשִׁי
  english_pob_choice: by my holiness
  chosen_spanish: por mi santidad
  alternatives_spanish:
  - por mi santidad divina
  - por mi lo santo
  lexicon: HALOT
  rationale: 'La preposición con קֹדֶשׁ y sufijo de 1ª persona se entiende mejor aquí como la base invocada del juramento: la santidad propia de Yahvé. «Por mi santidad» conserva la referencia al carácter santo de Dios sin desplazarla hacia «santuario» o «el Santo».'
- source_word: אִם
  english_pob_choice: I will not
  chosen_spanish: 'no'
  alternatives_spanish:
  - ciertamente no
  - si
  lexicon: HALOT
  rationale: 'Después de un juramento, אִם introduce una negación elíptica. En español conviene expresar directamente la negación para que el sentido resulte completo y fiel a la fórmula: «no mentiré a David».'
- source_word: לְדָוִד
  english_pob_choice: to David
  chosen_spanish: a David
  alternatives_spanish:
  - para David
  - con respecto a David
  lexicon: HALOT
  rationale: El ל señala la persona afectada por la posible falsedad. En español, «a David» es la manera más natural de expresar ese destinatario personal en una promesa o juramento.
- source_word: אֲכַזֵּב
  english_pob_choice: lie
  chosen_spanish: mentiré
  alternatives_spanish:
  - seré falso
  - engañaré
  - resultaré falso
  lexicon: HALOT
  rationale: El piel de כזב denota hablar falsamente o resultar falso respecto de una promesa. «Mentiré» conserva la fuerza moral y personal de la negación, y en español suena más directo que «seré falso».
theological_decisions:
- issue: Forma del juramento divino y negación elíptica
  english_pob_reading: Once I have sworn by my holiness; I will not lie to David.
  chosen_spanish_reading: Una vez he jurado por mi santidad; no mentiré a David.
  alternative_spanish_readings:
  - 'Una vez he jurado por mi santidad: no mentiré a David.'
  - Una vez por todas he jurado por mi santidad; no seré falso a David.
  rationale: El hebreo usa una fórmula de juramento con אִם donde la negación está implícita. En español, explicitar la negación con «no mentiré» evita una cláusula incompleta y mantiene la fuerza del compromiso divino sin añadir contenido ajeno al verso.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Referencia de בְּקָדְשִׁי
  english_pob_reading: by my holiness
  chosen_spanish_reading: por mi santidad
  alternative_spanish_readings:
  - por mi santidad y pureza
  - por mi carácter santo
  rationale: La lectura toma קדשׁ como atributo divino invocado como garantía del juramento. «Por mi santidad» preserva la solemnidad teológica y evita introducir interpretaciones como «santuario» que no encajan tan bien en este contexto.
  doctrine_reference: HALOT; Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La versión española sigue de cerca la lectura final del POB en inglés, conservando el valor de juramento con negación implícita y la base del juramento en la santidad divina. Se adoptó «Una vez» en lugar de «Una vez por todas» como forma principal, porque reproduce con concisión la fuerza idiomática del hebreo y deja la alternativa en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como nombre divino principal en el proyecto, pero este versículo no contiene el Tetragrámaton explícito; por eso no aparece en el texto.
  - «santidad» se usa para קדשׁ en sentido atributivo, no como «santo» adjetival, porque el sustantivo expresa mejor la garantía del juramento.
  - La negación se formula de manera explícita en español para reflejar la estructura elíptica del hebreo sin dejar la frase gramaticalmente suspendida.
