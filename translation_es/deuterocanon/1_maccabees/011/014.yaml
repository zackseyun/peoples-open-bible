translation:
  language: es
  text: Pero el rey Alejandro estaba en Cilicia en aquellos días[a], porque los de aquellas regiones se rebelaban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los de aquellas regiones se rebelaban».'
