lexical_decisions:
- source_word: הֲנִסָּה
  english_pob_choice: tries
  chosen_spanish: intenta
  alternatives_spanish:
  - prueba
  - se atreve a
  - ensaya
  lexicon: HALOT
  rationale: El hebreo expresa el acto de emprender o intentar algo en una pregunta retórica. «Intenta» conserva la idea de iniciar una comunicación con cautela, sin volverlo más interpretativo de lo necesario.
- source_word: דָבָר
  english_pob_choice: a word
  chosen_spanish: una palabra
  alternatives_spanish:
  - un asunto
  - algo
  - un dicho
  lexicon: HALOT
  rationale: En este contexto de habla, el sustantivo funciona en sentido discursivo. «Una palabra» refleja bien el paralelo con «palabras» al final del versículo y suena natural en español.
- source_word: אֵלֶיךָ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - a ti
  - para contigo
  lexicon: HALOT
  rationale: Aunque literalmente significa «a ti», en español una construcción como «intenta una palabra contigo» es menos natural. «Contigo» comunica la dirección interpersonal del discurso sin perder el matiz de dirigirse a Job.
- source_word: תִּלְאֶה
  english_pob_choice: will you be weary
  chosen_spanish: ¿te cansarás?
  alternatives_spanish:
  - ¿te agotarás?
  - ¿te fatigarás?
  - ¿te impacientarás?
  lexicon: HALOT
  rationale: La raíz לאה denota cansarse o agotarse. En este marco retórico, la imagen es la de quedar sin ánimo o sin aguante ante lo dicho; «cansarás» preserva el valor básico y evita introducir una equivalencia psicológica más fuerte que el hebreo.
- source_word: וַעְצֹר
  english_pob_choice: hold back
  chosen_spanish: contener
  alternatives_spanish:
  - retener
  - reprimir
  - detener
  lexicon: HALOT
  rationale: La forma expresa la acción de frenar o retener. «Contener» es una forma natural en español para la idea de no dejar salir las palabras, manteniendo el tono retórico del hebreo.
- source_word: בְּמִלִּין
  english_pob_choice: words
  chosen_spanish: las palabras
  alternatives_spanish:
  - las palabras dichas
  - el hablar
  - el discurso
  lexicon: HALOT
  rationale: El plural debe conservarse. «Las palabras» reproduce de manera directa el referente y mantiene la repetición semántica con la primera mitad del versículo.
- source_word: מִי יוּכָל
  english_pob_choice: who can
  chosen_spanish: ¿quién podrá?
  alternatives_spanish:
  - ¿quién puede?
  - ¿quién es capaz de?
  lexicon: HALOT
  rationale: Es una pregunta retórica de capacidad. «Podrá» conserva la posibilidad/aptitud implícita y suena más idiomático en español que una perífrasis más larga.
translation_notes:
  revision_awareness: El contexto inglés revisado ajustó תִּלְאֶה desde «be impatient» a «be weary», por lo que la versión española evita «impacientarse» y sigue el valor más literal de cansancio/agotamiento. También se preservó la opción interpretativa secundaria de דָבָר mediante nota, como en el texto inglés.
  spanish_consistency_notes:
  - Se mantiene «palabra/palabras» para reflejar el paralelismo de דָבָר / בְּמִלִּין.
  - Se evita «SEÑOR» u otra sustitución reverencial porque no aparece ningún nombre divino en este versículo.
  - La traducción conserva el tono interrogativo retórico del hebreo, con dos preguntas breves en español.
