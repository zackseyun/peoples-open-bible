  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. Las decisiones «el bien / el mal», «carne» y la preservación de la metáfora corporal concuerdan con la filosofía y el razonamiento léxico documentados.
