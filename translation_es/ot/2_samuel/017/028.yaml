translation:
  language: es
  text: lechos[a], lebrillos[b], vasijas de cerámica[c], trigo, cebada, harina, grano tostado, habas[d], lentejas y grano tostado[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «camas» para «lechos».
    reason: lexical_alternative
  - marker: b
    text: O «cuencos» para «lebrillos».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «vasijas de alfarero»; es decir, vasijas de barro o de cerámica.
    reason: lexical_alternative
  - marker: d
    text: El hebreo probablemente se refiere más específicamente a habas (fava).
    reason: lexical_alternative
  - marker: e
    text: La repetición final de קָלִי se conserva en español con el mismo equivalente básico que en la primera aparición.
    reason: source_note
lexical_decisions:
- source_word: מִשְׁכָּב
  english_pob_choice: beds
  chosen_spanish: lechos
  alternatives_spanish:
  - camas
  - lechos de descanso
  lexicon: HALOT
  rationale: El hebreo puede referirse a un lugar o medio para acostarse. En esta lista de provisiones, un plural concreto en español comunica mejor el sentido de mobiliario o enseres para dormir; 'lechos' mantiene dignidad y evita una imagen demasiado moderna o técnica.
- source_word: סַפּוֹת
  english_pob_choice: basins
  chosen_spanish: cuencos
  alternatives_spanish:
  - basinas
  - tazones
  lexicon: HALOT
  rationale: El término parece designar recipientes de uso doméstico. 'Cuencos' es una equivalencia natural en español y preserva la posible oscilación entre recipiente amplio y vajilla simple; el inglés preservó 'basins' con nota alternativa 'bowls', y en español 'cuencos' cubre bien esa zona semántica.
- source_word: כְלִי יוֹצֵר
  english_pob_choice: pottery vessels
  chosen_spanish: vasijas de alfarero
  alternatives_spanish:
  - vasijas de barro
  - recipientes de alfarero
  - vasijas de cerámica
  lexicon: HALOT
  rationale: La expresión es literalmente 'vasija(s) de un alfarero/formador'. 'Vasijas de alfarero' conserva la relación semántica con el oficio y evita suavizar el detalle material; 'vasijas de barro' sería más idiomático, pero borra un poco el vínculo léxico con el origen artesanal.
- source_word: חִטִּים
  english_pob_choice: wheat
  chosen_spanish: trigo
  alternatives_spanish:
  - trigos
  lexicon: HALOT
  rationale: Equivalencia estándar para el cereal nombrado en la lista.
- source_word: שְׂעֹרִים
  english_pob_choice: barley
  chosen_spanish: cebada
  alternatives_spanish:
  - cebadas
  lexicon: HALOT
  rationale: Equivalencia estándar para el cereal nombrado en la lista.
- source_word: קֶמַח
  english_pob_choice: flour
  chosen_spanish: harina
  alternatives_spanish:
  - harina molida
  - harina de cereal
  lexicon: HALOT
  rationale: El término se refiere a grano molido. 'Harina' es la equivalencia natural y clara en español contemporáneo.
- source_word: קָלִי
  english_pob_choice: roasted grain
  chosen_spanish: grano tostado
  alternatives_spanish:
  - grano parchedo
  - grano parcido
  - grano seco tostado
  lexicon: HALOT
  rationale: El alimento preparado por tostado/parcheado se expresa con naturalidad como 'grano tostado'. Se conserva el sentido culinario básico sin introducir una especificación innecesaria en el texto principal.
- source_word: פּוֹל
  english_pob_choice: beans
  chosen_spanish: habas
  alternatives_spanish:
  - frijoles
  - judías
  - beans
  lexicon: HALOT
  rationale: El hebreo probablemente se refiere con mayor precisión a habas/favas. A diferencia del inglés, el español puede reflejar esa especificidad sin perder inteligibilidad; por eso se prefiere 'habas' en el texto principal, manteniendo abierta la nota de identificación más precisa.
- source_word: עֲדָשִׁים
  english_pob_choice: lentils
  chosen_spanish: lentejas
  alternatives_spanish:
  - lentejas secas
  lexicon: HALOT
  rationale: Equivalencia estándar para la legumbre nombrada en la lista.
- source_word: קָלִי
  english_pob_choice: parched grain
  chosen_spanish: grano tostado
  alternatives_spanish:
  - grano parchedo
  - grano parcido
  lexicon: HALOT
  rationale: Se conserva la repetición del mismo término hebreo al final del versículo. Aunque el inglés revisado distinguió la segunda ocurrencia con 'parched grain' por estilo, en español conviene mantener la misma traducción básica para no sugerir dos referentes distintos donde el hebreo repite la misma palabra.
translation_notes:
  revision_awareness: El inglés POB ha sido revisado en la última pasada para distinguir la segunda aparición de קָלִי como 'parched grain' en lugar de repetir 'roasted grain'. Para el español, se evalúa el valor de esa distinción frente a la repetición hebrea. Se opta por mantener una traducción uniforme de קָלִי en ambas apariciones, porque el texto fuente repite exactamente el mismo lexema y no señala un cambio semántico; la nota final documenta esta decisión frente al ajuste estilístico del inglés.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' fuera de este versículo porque no aparece el nombre divino.
  - Se usa un léxico de comida y utensilios con registro natural y no arcaizante.
  - Se conserva la polisemia útil de 'cuencos' / 'vasijas' sin imponerse una sola lectura más allá de lo que el hebreo garantiza.
  - Se evita traducir mecánicamente la segunda ocurrencia de קָלִי con un término diferente solo por seguir la variación del inglés revisado.
