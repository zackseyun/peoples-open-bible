translation:
  language: es
  text: 'Pero Dios dijo a Abraham: «No te parezca mal[a] por causa del muchacho y por causa de tu esclava[b]. Todo lo que Sara te diga, escucha su voz[c], porque en Isaac tu descendencia será llamada[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit., «no sea malo en tus ojos»; es decir, no te disgustes ni te aflijas por ello.
    reason: lexical_alternative
  - marker: b
    text: O «tu criada»; el término hebreo señala a Agar como mujer esclavizada o subordinada.
    reason: lexical_alternative
  - marker: c
    text: Lit., «escucha su voz»; es decir, atiende lo que Sara dice.
    reason: lexical_alternative
  - marker: d
    text: O «por medio de Isaac tu descendencia será llamada»; la idea es que la línea de promesa se identifica mediante Isaac.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר אֱלֹהִים
  english_pob_choice: But God said
  chosen_spanish: Pero Dios dijo
  alternatives_spanish:
  - Y Dios dijo
  lexicon: HALOT
  rationale: Se conserva el avance narrativo del waw-consecutivo y el matiz contrastivo de “Pero” reflejado en el audit trail inglés, con una sintaxis natural en español.
- source_word: יֵרַע בְּעֵינֶיךָ
  english_pob_choice: do not let it be grievous in your sight
  chosen_spanish: No te parezca mal en tus ojos
  alternatives_spanish:
  - No te sea grave
  - No te disgustes
  - No te parezca mal
  lexicon: HALOT
  rationale: La expresión hebrea usa el idiomático “ser malo en los ojos de alguien”; en español se preserva la imagen con una formulación inteligible. “No te parezca mal” comunica bien el valor afectivo sin perder la referencia ocular del hebreo.
- source_word: הַנַּעַר
  english_pob_choice: the boy
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el niño
  - el joven
  lexicon: HALOT
  rationale: נַעַר aquí designa a Ismael como muchacho o joven; “muchacho” es natural y no infantiliza de más, manteniendo el registro sobrio.
- source_word: אֲמָתֶךָ
  english_pob_choice: your slave woman
  chosen_spanish: tu esclava
  alternatives_spanish:
  - tu sierva
  - tu criada
  lexicon: HALOT
  rationale: Se preserva el valor de estado ligado y subordinación social que el audit trail inglés quiso mantener con “slave woman”; “esclava” es el equivalente más directo y auditable en español.
- source_word: שְׁמַע בְּקֹלָהּ
  english_pob_choice: listen to her voice
  chosen_spanish: escucha su voz
  alternatives_spanish:
  - haz caso de lo que ella dice
  - obedécela
  lexicon: HALOT
  rationale: Se conserva el hebraísmo literal “escucha su voz”, que en español sigue siendo claro y mantiene la fuerza idiomática sin sobreinterpretar a “obedécela”.
- source_word: בְיִצְחָק
  english_pob_choice: through Isaac
  chosen_spanish: en Isaac
  alternatives_spanish:
  - por Isaac
  - a través de Isaac
  lexicon: HALOT
  rationale: El hebreo permite una relación instrumental o de esfera/covenantal. En español, “en Isaac” mantiene mejor la ambigüedad del texto y además armoniza con la formulación tradicional de la cita bíblica, sin cerrar la tensión interpretativa que el audit trail inglés preservó.
- source_word: יִקָּרֵא לְךָ זָרַע
  english_pob_choice: your offspring will be called
  chosen_spanish: será llamada para ti la descendencia
  alternatives_spanish:
  - tu descendencia será llamada
  - será nombrada para ti la descendencia
  - tu descendencia llevará tu nombre
  lexicon: HALOT
  rationale: Se mantiene el valor pasivo de “llamar/nombrar” con una construcción española que conserva el sujeto colectivo “descendencia” y el dativo de relación “para ti”. La formulación evita resolver demasiado la frase, respetando la tensión entre designación y pertenencia covenantal.
- source_word: זָרַע
  english_pob_choice: offspring
  chosen_spanish: la descendencia
  alternatives_spanish:
  - la posteridad
  - los descendientes
  - la simiente
  lexicon: HALOT
  rationale: “Descendencia” expresa el singular colectivo de זֶרַע con naturalidad en español y evita el plural interpretativo de “descendientes”. Se descarta “simiente” por resultar menos transparente para un público amplio.
theological_decisions:
- issue: Tratamiento del linaje prometido y la tensión de pacto
  english_pob_reading: for through Isaac offspring will be called / named for you
  chosen_spanish_reading: porque en Isaac será llamada para ti la descendencia
  alternative_spanish_readings:
  - porque en Isaac será nombrada tu descendencia
  - porque por Isaac será llamada tu descendencia
  - porque en Isaac se reconocerá tu descendencia
  rationale: La cláusula no niega la paternidad biológica de Abraham respecto de Ismael, sino que identifica la línea de promesa mediante Isaac. La redacción española conserva esa designación covenantal sin convertirla en una paráfrasis doctrinal cerrada.
  doctrine_reference: Translation philosophy §3; Romanos 9:7 como eco interpretativo
- issue: No atenuar el estatus subordinado de Agar
  english_pob_reading: your slave woman
  chosen_spanish_reading: tu esclava
  alternative_spanish_readings:
  - tu sierva
  - tu criada
  - tu esclava mujer
  rationale: El texto marca la condición social de Agar, y la traducción debe preservar esa realidad. “Esclava” mantiene la fuerza lexical que el audit trail inglés defendió frente a suavizaciones más eclesiásticas o domésticas.
  doctrine_reference: Translation philosophy §1; contestable terms by analogy with bonded-status language
- issue: Conservar el hebraísmo ‘oír su voz’
  english_pob_reading: listen to her voice
  chosen_spanish_reading: escucha su voz
  alternative_spanish_readings:
  - oye su voz
  - haz caso de lo que ella dice
  - escúchala
  rationale: El hebreo literal enfatiza escuchar la voz como expresión de atender el contenido de lo dicho. En español, “escucha su voz” conserva la imagen y permite que el lector perciba el enlace con el original sin perder naturalidad.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail inglés, que aclaró la ambigüedad de 'named for you' frente a un posible sentido de nombrar en honor de alguien, y la preferencia consolidada por una lectura de designación del linaje a través de Isaac. También se respetó la decisión revisada de mantener el contraste narrativo de 'But God said'.
  spanish_consistency_notes:
  - Se usó 'Dios' para אֱלֹהִים, conforme al estándar del proyecto.
  - Se mantuvo 'esclava' para אָמָה, alineado con la preferencia del proyecto por preservar el estatus ligado cuando es relevante.
  - Se evitó 'Cristo' y terminología eclesiástica no presente en el versículo.
  - Se conservó la imagen idiomática hebrea de 'escuchar la voz' en lugar de convertirla directamente en 'obedecer', para no borrar la fuerza del original.
