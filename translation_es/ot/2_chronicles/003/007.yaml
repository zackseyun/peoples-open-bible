revisions:
- from: Cubrió la casa con oro[a]—las vigas, los umbrales, sus paredes y sus puertas—, y grabó querubines sobre las paredes.
  to: Revistió la casa con oro[a]—las vigas, los umbrales, sus muros y sus puertas— y grabó querubines sobre los muros.
  rationale: Se ajusta el verbo principal a «revistió» para reflejar mejor el matiz de recubrimiento arquitectónico con oro; se mejora la puntuación del inciso con rayas según el uso natural del español; y se sustituye «paredes» por «muros» para un registro más arquitectónico y literario sin alterar el sentido. No se requieren notas adicionales ni adjudicación especial.
