review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura del hebreo, conserva el modismo literal de ‘ver el rostro’, y mantiene la repetición narrativa. Sin embargo, para סבב el inglés auditado escogió ‘turn aside’, y ‘volver’ introduce con más fuerza la idea de regreso que la de apartarse o desviarse. Dado el contexto inmediato, el rey está redirigiendo a Absalón a su casa sin admitirlo a su presencia; ‘se vaya’/‘se aparte’ lo expresa mejor que ‘vuelva’.
  spanish_quality_summary: El español es claro y digno, pero ‘Que vuelva a su casa’ y ‘Absalón volvió a su casa’ pueden sonar algo redundantes y además desplazan el matiz de alejamiento. Una formulación con ‘que se vaya a su casa’ y ‘Absalón se fue a su casa’ suena natural en español y preserva mejor la fuerza del mandato y su cumplimiento. El resto del versículo está bien logrado, incluida la conservación de ‘rostro’.
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. ‘Absalón’, ‘rey’, y el idiomatismo ‘rostro’ están bien. La única desalineación relevante es léxica con סבב: el borrador usa ‘volver’, mientras que la evidencia y la decisión auditada favorecen un verbo de apartarse/desviarse más que de simple retorno.'
  issues:
  - severity: medium
    issue: ‘volver / volvió’ para יִסֹּב / וַיִּסֹּב
    rationale: Aunque posible en contexto, ‘volver’ enfatiza el regreso más que la redirección o apartamiento presente en סבב con אֶל בֵּיתוֹ. El audit trail inglés justificó ‘turn aside’ precisamente para preservar ese matiz. En español, ‘se fue a su casa’ o ‘se apartó a su casa’ es más fiel y natural.
  revised_spanish_text: 'Pero el rey dijo[a]: «Que se vaya a su casa, y no vea mi rostro». Entonces Absalón se fue a su casa y no vio el rostro del rey.'
  revised_footnotes:
  - marker: a
    text: 'Hebreo: ‘ver mi rostro’ / ‘el rostro del rey’, un modismo para estar en la presencia de alguien o recibir audiencia.'
    reason: lexical_alternative
  revision_rationale: 'Se revisa únicamente el verbo principal para reflejar mejor סבב según la evidencia fuente y la decisión léxica auditada: no solo regresar, sino apartarse y dirigirse a su propia casa en vez de comparecer ante el rey. Se mantiene ‘rostro’ literalmente con la nota, porque esa decisión sí preserva bien el modismo hebreo.'
