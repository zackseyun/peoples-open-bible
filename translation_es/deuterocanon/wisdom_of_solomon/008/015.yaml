translation:
  language: es
  text: Tiranos temibles me temerán al oír[a]; entre la multitud seré visto como bueno[b], y en la guerra, valiente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tiranos temibles». El adjetivo griego puede describir a los tiranos mismos como imponentes o sobrecogedores, no solo indicar que ellos sentirán miedo.
    reason: lexical_alternative
  - marker: b
    text: O «seré visto como noble/benéfico entre la multitud». El griego ἀγαθός puede sugerir bondad práctica en el liderazgo público, no solo bondad moral en sentido abstracto.
    reason: lexical_alternative
lexical_decisions:
- source_word: φοβηθήσονταί
  english_pob_choice: will fear
  chosen_spanish: me temerán
  alternatives_spanish:
  - temerán de mí
  - sentirán temor de mí
  - me tendrán miedo
  lexicon: BDAG
  rationale: El futuro con valor pasivo/deponente de φοβέω expresa que los tiranos llegarán a temer al hablante. «Me temerán» conserva la fuerza directa y suena natural en español.
- source_word: ἀκούσαντες
  english_pob_choice: when they hear
  chosen_spanish: al oír
  alternatives_spanish:
  - cuando oigan
  - habiendo oído
  - después de oír
  lexicon: BDAG
  rationale: El participio aoristo funciona temporalmente. «Al oír» reproduce ese valor de manera concisa y fluida en español.
- source_word: τύραννοι
  english_pob_choice: tyrants
  chosen_spanish: tiranos
  alternatives_spanish:
  - gobernantes
  - déspotas
  lexicon: LSJ
  rationale: τύραννοι designa gobernantes autocráticos con matiz negativo. «Tiranos» preserva mejor esa carga que un término más neutral como «gobernantes».
- source_word: φρικτοί
  english_pob_choice: fearsome
  chosen_spanish: temibles
  alternatives_spanish:
  - terribles
  - espantosos
  - aterradores
  lexicon: LSJ
  rationale: El adjetivo caracteriza a los tiranos como imponentes o sobrecogedores. «Temibles» mantiene ese matiz sin exagerar ni volverla una expresión demasiado dura para el español moderno.
- source_word: ἐν πλήθει
  english_pob_choice: among the multitude
  chosen_spanish: entre la multitud
  alternatives_spanish:
  - en medio de la multitud
  - ante la multitud
  - entre el pueblo
  lexicon: LSJ
  rationale: La frase señala una presencia pública en medio de muchos. «Entre la multitud» conserva el sentido amplio de πλήθος sin restringirlo a una asamblea formal.
- source_word: φανούμαι
  english_pob_choice: I will appear
  chosen_spanish: me mostraré
  alternatives_spanish:
  - apareceré
  - seré visto como
  - me presentaré
  lexicon: BDAG
  rationale: El futuro medio/pasivo aquí puede expresar aparición o manifestación. «Me mostraré» mantiene la idea de presentarse ante otros y encaja bien con el contexto público.
- source_word: ἀγαθὸς
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - benéfico
  - noble
  - bondadoso
  lexicon: BDAG
  rationale: ἀγαθός puede abarcar bondad moral y utilidad benéfica. «Bueno» conserva esa amplitud semántica sin cerrar el sentido a una sola cualidad.
- source_word: ἐν πολέμῳ
  english_pob_choice: in war
  chosen_spanish: en la guerra
  alternatives_spanish:
  - en batalla
  - durante la guerra
  lexicon: LSJ
  rationale: La expresión es directa. «En la guerra» reproduce el alcance general de πόλεμος con naturalidad en español.
- source_word: ἀνδρεῖος
  english_pob_choice: courageous
  chosen_spanish: valiente
  alternatives_spanish:
  - courageoso
  - bravo
  - esforzado
  lexicon: BDAG
  rationale: El adjetivo expresa valentía o coraje. «Valiente» es la opción más natural en español y evita introducir un matiz de género que hoy resultaría menos claro.
theological_decisions:
- issue: Virtudes públicas y militares atribuidas al hablante
  english_pob_reading: The verse presents the speaker as both publicly beneficent and militarily courageous, without expanding into a broader political theology.
  chosen_spanish_reading: El verso presenta al hablante como bueno en público y valiente en la guerra, sin ampliar el sentido hacia una teología política más amplia.
  alternative_spanish_readings:
  - El verso podría leerse como lenguaje idealizado de sabiduría real que enfatiza gobierno y pericia militar.
  rationale: El griego yuxtapone bondad entre la multitud y valentía en la guerra. La traducción conserva esa tensión y no interpreta más allá de lo que el verso afirma de manera inmediata.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del audit trail inglés, que afinó φρικτοί hacia un matiz más natural y preciso («fearsome»). Por eso se eligió «temibles» en vez de una opción más fuerte como «terribles», manteniendo el tono formal y la ambigüedad lexical. También se preservó la estructura paralela del verso: temor de los tiranos, bondad en público y valentía en guerra.'
  spanish_consistency_notes:
  - Se usa «multitud» para πλήθος en sentido público y colectivo, coherente con el registro del texto.
  - Se traduce ἀγαθός por «bueno» de forma amplia, dejando abierta la posibilidad de bondad moral o benéfica.
  - Se mantiene «valiente» para ἀνδρεῖος por ser natural en español y suficientemente preciso.
  - No se introduce «Cristo», «SEÑOR» ni otras equivalencias ajenas al texto griego.
  - La puntuación conserva el paralelismo del original con dos miembros finales coordinados.
