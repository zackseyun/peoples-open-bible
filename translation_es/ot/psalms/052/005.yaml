lexical_decisions:
- source_word: אָהַ֣בְתָּ
  english_pob_choice: you have loved
  chosen_spanish: has amado
  alternatives_spanish:
  - amaste
  lexicon: HALOT
  rationale: El perfecto qal 2ms expresa una disposición ya establecida con relevancia presente. El pretérito perfecto compuesto español comunica bien esa acusación vigente, y mantiene la dirección personal del original.
- source_word: רָּ֣ע
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - mal
  - maldad
  - lo malo
  lexicon: HALOT
  rationale: En contraste con 'el bien', el sustantivo abstracto 'el mal' suena natural en español y conserva la oposición moral amplia del hebreo.
- source_word: מִ/טּ֑וֹב
  english_pob_choice: more than good
  chosen_spanish: más que el bien
  alternatives_spanish:
  - más que el bueno
  - en lugar del bien
  - antes que el bien
  lexicon: HALOT
  rationale: La preposición מן marca comparación/preferencia. 'Más que el bien' conserva la fuerza comparativa y es idiomático en español.
- source_word: שֶׁ֓קֶר
  english_pob_choice: falsehood
  chosen_spanish: la falsedad
  alternatives_spanish:
  - la mentira
  - el engaño
  - la falsedad
  lexicon: HALOT
  rationale: '''Falsedad'' conserva el valor abstracto del sustantivo y se ajusta al paralelismo con la frase verbal siguiente; evita reducirlo solo a actos concretos de mentir.'
- source_word: מִ/דַּבֵּ֖ר
  english_pob_choice: more than speaking
  chosen_spanish: más que hablar
  alternatives_spanish:
  - más que hablar rectitud
  - más que decir
  lexicon: HALOT
  rationale: El patrón comparativo con מן se refleja de forma natural con 'más que'. El infinitivo/forma verbal se traduce con 'hablar', que mantiene la idea de discurso como actividad.
- source_word: צֶ֣דֶק
  english_pob_choice: righteousness
  chosen_spanish: rectitud
  alternatives_spanish:
  - justicia
  - lo recto
  - justicia/rectitud
  lexicon: HALOT
  rationale: En este contexto de habla falsa frente a habla verdadera, 'rectitud' expresa con precisión la cualidad de hablar correctamente. En español evita la posible carga jurídica de 'justicia' sin perder el tono moral.
- source_word: סֶֽלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  lexicon: HALOT
  rationale: Se conserva la transliteración porque es un término litúrgico/musical de sentido incierto y no debe sobretraducirse.
theological_decisions:
- issue: צֶדֶק en contraste con שֶׁקֶר
  english_pob_reading: righteousness
  chosen_spanish_reading: rectitud
  alternative_spanish_readings:
  - justicia
  - lo recto
  rationale: El audit trail inglés mantiene 'righteousness' frente a 'falsehood' para sostener el registro ético y no limitar el término a un sentido forense. En español, 'rectitud' reproduce bien la idea de hablar conforme a lo que es moralmente correcto.
  doctrine_reference: 'DOCTRINE.md: consistency of key terms; contested terms table notes righteousness/justice tension for this word family'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: el acuerdo entre el texto hebreo, el rastro léxico inglés y el control cruzado es alto; no se detectaron cambios necesarios. Se conservó la estructura comparativa doble y el término litúrgico Selah sin traducir.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo poético con dos comparaciones coordinadas.
  - Se evitó 'SEÑOR' u otras sustituciones no pertinentes, ya que el versículo no contiene el nombre divino.
  - '''Rectitud'' se eligió como equivalente funcional de ''righteousness'' en un contexto de habla, no como equivalente automático de ''justicia''.'
