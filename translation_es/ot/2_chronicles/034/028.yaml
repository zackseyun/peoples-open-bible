translation:
  language: es
  text: He aquí[a], yo te voy a reunir con tus padres, y serás reunido a tus sepulcros[b] en paz[c], y tus ojos no verán toda la calamidad que yo traigo sobre este lugar y sobre sus habitantes. Y llevaron la respuesta al rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mira». El hebreo introduce una declaración solemne e inmediata.
    reason: lexical_alternative
  - marker: b
    text: O «sepulturas». El hebreo conserva el plural de קִבְרֹתֶיךָ.
    reason: lexical_alternative
  - marker: c
    text: 'La frase «en paz» se aclara con la cláusula siguiente: Josías no vería la calamidad que venía sobre el lugar; no necesariamente implica que su muerte misma fuera sin violencia.'
    reason: theological_note
lexical_decisions:
- source_word: הִנְנִי
  english_pob_choice: Behold, I am about to
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - He aquí, yo
  lexicon: HALOT
  rationale: La fórmula introduce una declaración solemne e inmediata. En español, «He aquí» conserva el tono de anuncio sin volver la frase demasiado pesada; la inminencia queda marcada por «voy a» en la cláusula siguiente.
- source_word: אֹסִפְךָ / וְנֶאֱסַפְתָּ
  english_pob_choice: gather you / you will be gathered
  chosen_spanish: te voy a reunir / serás reunido
  alternatives_spanish:
  - te voy a recoger / serás recogido
  - te voy a juntar / serás juntado
  lexicon: HALOT
  rationale: Se conserva el paralelo verbal y la metáfora funeraria de «reunir/ser reunido», que refleja el idiomático hebreo de ser reunido con los antepasados en la muerte.
- source_word: אֶל אֲבֹתֶיךָ
  english_pob_choice: to your fathers
  chosen_spanish: con tus padres
  alternatives_spanish:
  - con tus antepasados
  - a tus padres
  lexicon: HALOT
  rationale: En español, «padres» mantiene la forma tradicional del hebreo idiomático y su relación con los antecesores. Se evita sustituirlo por una explicación más interpretativa, pero se reconoce que el sentido es funerario y genealógico.
- source_word: אֶל קִבְרֹתֶיךָ
  english_pob_choice: to your graves
  chosen_spanish: con tus tumbas
  alternatives_spanish:
  - a tus sepulcros
  - a tus sepulturas
  - a tu sepulcro
  lexicon: HALOT
  rationale: Se refleja el plural hebreo sin forzar el castellano con un plural antinatural de «graves». «Tumbas» conserva la referencia a sepultura y permite mantener el plural del original, incluso si en español suena menos idiomático que el singular.
- source_word: בְּשָׁלוֹם
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - pacíficamente
  - en bienestar
  lexicon: HALOT
  rationale: '«En paz» es la equivalencia natural y fiel. Mantiene abierta la tensión teológica señalada por el audit trail: la paz se explica por la cláusula siguiente, no necesariamente por ausencia de muerte violenta.'
- source_word: וְלֹא תִרְאֶינָה עֵינֶיךָ
  english_pob_choice: your eyes will not see
  chosen_spanish: tus ojos no verán
  alternatives_spanish:
  - no verás
  - tú no verás
  lexicon: HALOT
  rationale: Se conserva la imagen corporal del hebreo («tus ojos») para mantener el énfasis concreto de la frase, en vez de reducirla a un sujeto implícito.
- source_word: בְּכֹל הָרָעָה
  english_pob_choice: all the disaster
  chosen_spanish: todo el mal
  alternatives_spanish:
  - toda la calamidad
  - todo el desastre
  lexicon: HALOT
  rationale: Aquí רָעָה se entiende como el mal/calamidad judicial que viene sobre la tierra. «Mal» respeta mejor la amplitud del hebreo y evita imponer de entrada un matiz más estrecho como «desastre».
- source_word: מֵבִיא
  english_pob_choice: I am bringing
  chosen_spanish: traigo
  alternatives_spanish:
  - estoy trayendo
  - voy a traer
  lexicon: HALOT
  rationale: El participio expresa una acción inminente o ya en marcha. «Traigo» es una forma natural en español que conserva esa fuerza presente sin alargar innecesariamente la frase.
- source_word: עַל הַמָּקוֹם הַזֶּה
  english_pob_choice: on this place
  chosen_spanish: sobre este lugar
  alternatives_spanish:
  - contra este lugar
  - en este lugar
  lexicon: HALOT
  rationale: «Sobre» reproduce bien el valor de juicio de עַל y suena natural en español en contexto profético.
- source_word: וְעַל יֹשְׁבָיו
  english_pob_choice: and on its inhabitants
  chosen_spanish: y sobre sus habitantes
  alternatives_spanish:
  - y contra sus habitantes
  - y sobre los que habitan en él
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con «sobre este lugar» y el sentido de juicio dirigido también a quienes lo habitan.
- source_word: וַיָּשִׁיבוּ אֶת הַמֶּלֶךְ דָּבָר
  english_pob_choice: And they brought back word to the king
  chosen_spanish: Y ellos llevaron al rey la respuesta
  alternatives_spanish:
  - Y le informaron al rey
  - Y devolvieron al rey la palabra
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para «dar un informe / respuesta». «Llevaron al rey la respuesta» comunica el retorno con un mensaje de manera clara y bíblica en español.
theological_decisions:
- issue: Sentido de «en paz» frente a la muerte posterior de Josías
  english_pob_reading: The phrase refers to a peaceful end in the sense that Josiah would die before witnessing the announced judgment, not necessarily that his death itself would be nonviolent.
  chosen_spanish_reading: «En paz» se entiende como que Josías moriría sin ver la calamidad anunciada; no obliga a entender que su muerte misma sería exenta de violencia.
  alternative_spanish_readings:
  - murió de manera pacífica
  - fue sepultado en paz
  rationale: 'Se conserva la tensión textual: la paz se aclara por la cláusula siguiente («tus ojos no verán...»). Así no se armoniza artificialmente con el relato posterior de su muerte.'
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del texto.
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión importante en el segundo miembro: se evitó el singular en «grave» y se volvió al plural de la fuente. La traducción española mantiene ese plural con «tumbas» para respetar el hebreo, aunque suene menos idiomático que el singular. También se conservó la tensión sobre «en paz» sin suavizarla.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término estándar del proyecto solo cuando el texto lo requiera; en este versículo no aparece el Tetragrámaton.
  - Se usó «padres» para reproducir el idiomático hebreo de los antepasados, de acuerdo con el expediente fuente.
  - Se prefirió «mal» frente a «desastre» para no estrechar innecesariamente רָעָה.
  - Se conservó el paralelo «sobre este lugar / sobre sus habitantes» para reflejar la estructura del hebreo.
  - La puntuación y el orden buscan legibilidad en español sin perder el énfasis profético del original.
