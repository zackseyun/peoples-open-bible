revisions:
- from: Y el resto del aceite que está en la palma del sacerdote lo pondrá sobre la cabeza del que está siendo limpiado[a], para hacer expiación por él delante de Yahvé.
  to: Y el resto del aceite que está en la palma del sacerdote lo pondrá sobre la cabeza del que está siendo purificado[a], para hacer expiación por él delante de Yahvé.
  rationale: Se ajusta «limpiado» a «purificado» para reflejar mejor el sentido ritual de הַמִּטַּהֵר en Levítico 14 y mejorar la legibilidad eclesial en español. También se rehace la nota para que represente fielmente la alternativa documentada en inglés como una opción completa de la frase inicial, no como un fragmento nominal aislado. No se requieren cambios doctrinales ni estructurales adicionales.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:31:43Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro auditado en inglés: conserva bien «el resto del aceite», «en la palma del sacerdote», la acción ritual de ponerlo sobre la cabeza, y «delante de Yahvé». También mantiene correctamente el nombre divino «Yahvé». Sin embargo, «del que está siendo limpiado» suena menos adecuado en contexto levítico que «del que está siendo purificado», y la nota alternativa actual no refleja con precisión la alternativa inglesa completa, que abarca toda la secuencia «lo que queda... que está en/en la palma».'
  spanish_quality_summary: 'El español es claro y comprensible, pero hay dos ajustes menores que mejorarían fidelidad y naturalidad eclesial: 1) «purificado» encaja mejor que «limpiado» en un rito cultual; 2) la nota debe formularse como alternativa textual completa y no solo como sintagma fragmentario. El resto del versículo es idiomático y digno.'
  glossary_alignment: 'Alineación generalmente buena con la terminología del proyecto: יהוה -> «Yahvé» correctamente; כפר -> «hacer expiación» es aceptable en contexto cultual; el problema principal es הַמִּטַּהֵר, donde «purificado» expresa mejor la purificación ritual que «limpiado» en español bíblico moderno. No hay conflictos adicionales de glosario.'
  issues:
  - severity: medium
    issue: «del que está siendo limpiado» para הַמִּטַּהֵר
    rationale: Aunque es semánticamente posible, en Levítico 14 el campo es claramente ritual/cultual. «Purificado» transmite mejor el proceso de purificación ceremonial y suena más natural en español bíblico que «limpiado», que puede sonar demasiado físico o doméstico.
  - severity: low
    issue: La nota al pie no reproduce bien la alternativa auditada
    rationale: La alternativa inglesa es «what remains of the oil that is on the priest’s palm». La nota española actual «del aceite que queda en la palma del sacerdote» omite el arranque equivalente a «lo que queda/el resto» como alternativa de toda la frase y queda algo fragmentaria respecto al texto principal.
  revised_spanish_text: Y el resto del aceite que está en la palma del sacerdote lo pondrá sobre la cabeza del que está siendo purificado[a], para hacer expiación por él delante de Yahvé.
  revised_footnotes:
  - marker: a
    text: 'O: «Y lo que queda del aceite que está en la palma del sacerdote»'
    reason: lexical_alternative
  revision_rationale: Se ajusta «limpiado» a «purificado» para reflejar mejor el sentido ritual de הַמִּטַּהֵר en Levítico 14 y mejorar la legibilidad eclesial en español. También se rehace la nota para que represente fielmente la alternativa documentada en inglés como una opción completa de la frase inicial, no como un fragmento nominal aislado. No se requieren cambios doctrinales ni estructurales adicionales.
