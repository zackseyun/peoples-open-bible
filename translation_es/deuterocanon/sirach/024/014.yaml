translation:
  language: es
  text: Como una palmera fui levantada en alto[a] en las costas, y como plantas de rosas en Jericó; como un olivo espléndido en la llanura, y fui levantada en alto como un plátano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «en las costas». Algunos traductores prefieren una ribera, orilla o enclave de oasis por la imagen de la palmera, pero el testimonio griego transmitido sostiene «costas».
    reason: lexical_alternative
lexical_decisions:
- source_word: φοῖνιξ
  english_pob_choice: palm tree
  chosen_spanish: palmera
  alternatives_spanish:
  - palma
  - palmera datilera
  lexicon: LSJ
  rationale: φοῖνιξ designa una palmera en este símil botánico. «Palmera» es claro, natural y mantiene la imagen sin introducir una precisión no indicada por el griego.
- source_word: ἀνυψώθην
  english_pob_choice: was raised high
  chosen_spanish: fui levantado
  alternatives_spanish:
  - fui exaltado
  - fui levantado en alto
  - fui alzado
  lexicon: LSJ
  rationale: El griego expresa elevación; en español, «fui levantado» conserva el movimiento vertical y deja abierta la resonancia de exaltación sin forzar un giro más interpretativo.
- source_word: αἰγιαλοῖς
  english_pob_choice: shores
  chosen_spanish: las costas
  alternatives_spanish:
  - las orillas
  - las riberas
  - las costas del mar
  lexicon: LSJ
  rationale: αἰγιαλός se refiere a la franja de costa o ribera marina. «Costas» comunica bien el lugar costero en un español natural, aunque el contexto imaginativo permite también «orillas».
- source_word: φυτὰ ῥόδου
  english_pob_choice: rose plants
  chosen_spanish: plantas de rosas
  alternatives_spanish:
  - rosales
  - plantas de rosa
  lexicon: LSJ
  rationale: φυτά son plantas sembradas o plantadas; «plantas de rosas» conserva el plural y no especifica más de lo que el griego dice. «Rosales» sería más idiomático, pero introduce una forma arbustiva no explícita.
- source_word: Ἰερειχώ
  english_pob_choice: Jericho
  chosen_spanish: Jericó
  alternatives_spanish:
  - Jericó
  lexicon: standard proper name
  rationale: Nombre propio bíblico de uso estándar en español.
- source_word: ἐλαία εὐπρεπής
  english_pob_choice: splendid olive tree
  chosen_spanish: un olivo espléndido
  alternatives_spanish:
  - un olivo hermoso
  - un olivo noble
  - un árbol de oliva espléndido
  lexicon: LSJ
  rationale: εὐπρεπής puede sugerir belleza, nobleza o prestancia. «Espléndido» reproduce la dignidad visible del símil con buen registro literario.
- source_word: πεδίῳ
  english_pob_choice: the plain
  chosen_spanish: la llanura
  alternatives_spanish:
  - el llano
  - la planicie
  - el campo
  lexicon: LSJ
  rationale: πέδιον es una llanura o terreno llano. «La llanura» es una equivalencia directa y de estilo bíblico claro en español.
- source_word: πλάτανος
  english_pob_choice: plane tree
  chosen_spanish: un plátano
  alternatives_spanish:
  - un árbol plátano
  - un plane tree
  lexicon: LSJ
  rationale: πλάτανος es el plátano o árbol de sombra, no el «sicómoro». «Plátano» es la denominación española normal y evita una identificación incorrecta.
theological_decisions:
- issue: Mantenimiento de la imagen de exaltación junto con el símil vegetal
  english_pob_reading: was raised high
  chosen_spanish_reading: fui levantado
  alternative_spanish_readings:
  - fui exaltado
  - fui levantado en alto
  rationale: 'No se atenúa la doble fuerza del verbo: elevación física en el símil y posible exaltación figurada. «Fui levantado» es suficientemente abierto para dejar ambas capas visibles al lector.'
  doctrine_reference: Sabiduría personificada; imaginería poética de exaltación, sin expansión doctrinal adicional.
translation_notes:
  revision_awareness: 'La versión española sigue la última decisión revisada del texto inglés: mantener «on the shores» para αἰγιαλοῖς y «was raised high» para ἀνυψώθην. En español se conservó esa misma relación semántica con «en las costas» y «fui levantado», sin emendar el lugar ni suavizar la elevación.'
  spanish_consistency_notes:
  - Se usó «Jericó» como forma estándar en español.
  - Se evitó «señor/SEÑOR» u otras sustituciones teológicas porque no hay aquí nombre divino ni título cristológico.
  - «Plátano» traduce πλάτανος como árbol, no como fruta; el contexto botánico lo hace claro.
  - Se mantuvo el paralelismo de cuatro miembros y el tono poético del griego.
