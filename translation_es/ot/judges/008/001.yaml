translation:
  language: es
  text: 'Entonces los hombres de Efraín le dijeron[a]: «¿Qué es esta cosa que nos has hecho, al no llamarnos cuando fuiste a pelear contra Madián?». Y contendieron con él con fuerza[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los efraimitas». El hebreo literalmente dice «los hombres de Efraín», una expresión colectiva para la tribu.
    reason: lexical_alternative
  - marker: b
    text: O «disputaron con él con fuerza» o «vehementemente». El hebreo dice literalmente «contendieron con él con fuerza».
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ אֶפְרַיִם
  english_pob_choice: the men of Ephraim
  chosen_spanish: los hombres de Efraín
  alternatives_spanish:
  - los efraimitas
  - el hombre de Efraín
  - los hombres de la tribu de Efraín
  lexicon: HALOT
  rationale: El hebreo usa una expresión colectiva en singular que funciona como plural, confirmado por los verbos plurales posteriores. «Los hombres de Efraín» conserva esa transparencia sin recurrir de entrada a una etnónimo más interpretativo como «los efraimitas».
- source_word: מָה הַדָּבָר הַזֶּה
  english_pob_choice: What is this thing
  chosen_spanish: ¿Qué es esta cosa
  alternatives_spanish:
  - ¿Qué es este asunto
  - ¿Por qué hiciste esto
  lexicon: HALOT
  rationale: «דָּבָר» puede ser «cosa» o «asunto». En una queja directa, «¿Qué es esta cosa?» mantiene el tono retórico y la concreción del hebreo mejor que una paráfrasis causal como «¿Por qué hiciste esto?».
- source_word: עָשִׂיתָ לָּנוּ
  english_pob_choice: you have done to us
  chosen_spanish: has hecho con nosotros
  alternatives_spanish:
  - has hecho a nosotros
  - nos has hecho
  lexicon: HALOT
  rationale: El pronombre dativo hebreo expresa impacto sobre el grupo; en español, «con nosotros» suena natural en una queja y evita una literalidad incómoda. Mantiene la referencia al agravio sin añadir «contra», que sería una interpretación más fuerte.
- source_word: לְבִלְתִּי קְרֹאות לָנוּ
  english_pob_choice: not calling us
  chosen_spanish: al no llamarnos
  alternatives_spanish:
  - sin llamarnos
  - por no llamarnos
  - al no convocarnos
  lexicon: HALOT
  rationale: El infinitivo constructo con לְבִלְתִּי expresa la circunstancia negativa de la acción. «Al no llamarnos» reproduce bien la relación causal/explicativa y es idiomático en español. «Convocarnos» sería posible pero más fuerte que קרא en este contexto.
- source_word: כִּי הָלַכְתָּ לְהִלָּחֵם בְּמִדְיָן
  english_pob_choice: when you went to fight against Midian
  chosen_spanish: cuando fuiste a pelear contra Madián
  alternatives_spanish:
  - cuando fuiste a luchar contra Madián
  - porque fuiste a pelear contra Madián
  - cuando saliste a pelear contra Madián
  lexicon: HALOT
  rationale: Aquí כִּי funciona temporal/explanatoriamente dentro de la queja, y la preposición con הִלָּחֵם sugiere oposición. «Pelear contra Madián» conserva la sencillez del hebreo; «luchar» también sería posible, pero «pelear» se ajusta bien al registro narrativo.
- source_word: וַיְרִיבוּן אִתּוֹ
  english_pob_choice: they contended with him
  chosen_spanish: contendieron con él
  alternatives_spanish:
  - pelearon con él
  - discutieron con él
  - se enfrentaron con él
  lexicon: HALOT
  rationale: ריב puede abarcar disputa verbal o confrontación intensa. «Contendieron con él» preserva esa amplitud y evita reducirlo a una simple discusión o a un enfrentamiento físico que el texto no especifica.
- source_word: בְּחָזְקָה
  english_pob_choice: strongly
  chosen_spanish: con gran fuerza
  alternatives_spanish:
  - fuertemente
  - con vehemencia
  - con fuerza
  lexicon: HALOT
  rationale: La forma adverbial expresa intensidad. La base inglesa del POB optó por «strongly» para mantenerse más cerca del hebreo; en español, «con gran fuerza» comunica esa intensidad de manera natural, sin convertirla en una calificación puramente emocional como «vehementemente».
theological_decisions:
- issue: La fuerza de la expresión de conflicto final
  english_pob_reading: And they contended with him strongly.
  chosen_spanish_reading: Y contendieron con él con gran fuerza.
  alternative_spanish_readings:
  - Y discutieron con él fuertemente.
  - Y se enfrentaron con él con fuerza.
  rationale: No conviene suavizar el cierre del versículo. El hebreo indica una contienda intensa; «contendieron» conserva el conflicto sin decidir si fue solo verbal o también de presión social. «Con gran fuerza» mantiene la intensidad sin añadir un matiz doctrinal o narrativo ajeno al texto.
  doctrine_reference: No aplica; observación narrativa y semántica del conflicto.
translation_notes:
  revision_awareness: El inglés POB pasó por una revisión menor que cambió «fiercely» a «strongly» para reflejar más directamente el hebreo y mantener un registro formal. La versión española sigue esa línea, evitando un adverbio demasiado interpretativo y conservando la intensidad del conflicto con una formulación sobria.
  spanish_consistency_notes:
  - Se mantiene «Madián» para el nombre propio, con adaptación ortográfica española habitual.
  - Se usa el tiempo pasado narrativo simple en español para la secuencia histórica.
  - No se introduce terminología eclesiástica ajena al hebreo; el versículo permanece en registro narrativo y de queja.
  - La puntuación reproduce el discurso directo y el cierre narrativo de manera clara para lectura pública.
