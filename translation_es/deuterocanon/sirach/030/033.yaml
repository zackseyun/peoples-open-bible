translation:
  language: es
  text: Forraje y vara y cargas son para un asno[a][b][c]; pan y disciplina y trabajo son para un esclavo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cargas» para «burdens».
    reason: lexical_alternative
  - marker: b
    text: O «siervo» o «servidor doméstico» para «esclavo»; οἰκέτης suele referirse a un siervo doméstico vinculado a la casa.
    reason: alternative_reading
  - marker: c
    text: «Disciplina» también puede entenderse como «instrucción», «formación» o «corrección».
    reason: lexical_alternative
lexical_decisions:
- source_word: χορτάσματα
  english_pob_choice: fodder
  chosen_spanish: forraje
  alternatives_spanish:
  - pienso
  - pasto
  - alimento
  lexicon: LSJ
  rationale: El término se refiere a alimento para animales. «Forraje» conserva el valor concreto y natural para un asno, sin generalizar indebidamente a «alimento».
- source_word: ῥάβδος
  english_pob_choice: rod
  chosen_spanish: vara
  alternatives_spanish:
  - bastón
  - cayado
  - palo
  lexicon: LSJ
  rationale: En este proverbio de corrección, «vara» expresa mejor el instrumento de control o castigo que «bastón» o «cayado», que suenan más apoyativos.
- source_word: φορτία
  english_pob_choice: burdens
  chosen_spanish: cargas
  alternatives_spanish:
  - pesos
  - fardos
  - cargamentos
  lexicon: LSJ
  rationale: El sentido es de cosas que se llevan. «Cargas» mantiene la imagen proverbial y permite la alternativa semántica documentada de «loads».
- source_word: ὄνῳ
  english_pob_choice: donkey
  chosen_spanish: asno
  alternatives_spanish:
  - burro
  - burra
  lexicon: LSJ
  rationale: «Asno» es una forma clara y digna en español bíblico para el animal del proverbio; «burro» sería más coloquial.
- source_word: ἄρτος
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: LSJ
  rationale: El griego dice literalmente «pan». En español, «pan» puede funcionar igual que en la sabiduría bíblica como sustento básico, sin diluir la concreción del original.
- source_word: παιδεία
  english_pob_choice: discipline
  chosen_spanish: disciplina
  alternatives_spanish:
  - instrucción
  - formación
  - corrección
  lexicon: LSJ
  rationale: «Disciplina» conserva el campo de formación, corrección y control que el inglés POB quiso captar. En esta triada junto a pan y trabajo, la idea correctiva es importante.
- source_word: ἔργον
  english_pob_choice: work
  chosen_spanish: trabajo
  alternatives_spanish:
  - labor
  - tarea
  lexicon: LSJ
  rationale: «Trabajo» es directo, natural y adecuado al paralelo proverbial; mantiene la idea de actividad impuesta o asignada.
- source_word: οἰκέτῃ
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - servidor doméstico
  - criado
  lexicon: LSJ
  rationale: Siguiendo la decisión del POB en inglés, «esclavo» preserva la fuerza social del término y evita suavizar la condición servil que el proverbio presupone. «Siervo» sería una atenuación tradicional no justificada aquí.
theological_decisions:
- issue: Valor social de οἰκέτῃ en un proverbio sapiencial
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - servidor doméstico
  rationale: No es un punto doctrinal central, pero sí ético y social. El griego presenta una relación de subordinación real; traducir «esclavo» hace visible ese trasfondo sin eufemismo, coherente con la primacía del término original.
  doctrine_reference: 'DOCTRINE.md: primacía del original y términos de estatus social; tabla de δοῦλος y afines según contexto'
translation_notes:
  revision_awareness: 'Coincide con la última pasada: sin cambios necesarios; la traducción mantiene el paralelismo sapiencial y la fuerza social de οἰκέτῃ, con las mismas alternativas documentadas por el POB inglés.'
  spanish_consistency_notes:
  - Se prefirió «asno» en vez de «burro» por registro bíblico más neutral.
  - Se mantuvo «pan» literal para ἄρτος, sin generalizar a «alimento».
  - «Esclavo» se conserva por coherencia con la política del POB cuando la condición vinculada es socialmente saliente.
  - Las notas a pie preservan las alternativas relevantes sin añadir sentidos no atestiguados.
