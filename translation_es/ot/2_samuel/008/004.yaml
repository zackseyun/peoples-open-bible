review_pass:
  verdict: revise
  source_alignment_summary: El borrador acierta en los números principales y en el sentido general de captura y reserva, pero se desvía de una decisión fuente clave en la segunda mitad del versículo. El hebreo וַיְעַקֵּר describe desjarretar/inutilizar caballos, y אֶת כָּל הָרֶכֶב se entiende metonímicamente como los caballos del cuerpo de carros, no los vehículos mismos. La redacción española actual («dejó inútiles todos los carros de guerra») atribuye la acción a los carros, algo incompatible con el verbo y con la justificación léxica auditada. También falta la nota textual sobre la variante de 1 Crónicas 18:4 para «1.700 jinetes», que el POB inglés preserva.
  spanish_quality_summary: El español es generalmente legible, pero «capturó de él» suena poco natural en español bíblico corriente; «capturó de Hadadézer» o «le capturó» sería más idiomático. Además, «dejó inútiles todos los carros de guerra» produce una imagen errónea y torpe. Conviene explicitar «los caballos de los carros» o «todos los caballos de los carros de guerra» para mantener claridad y fidelidad. El resto del versículo puede quedar conciso y digno.
  glossary_alignment: 'No hay conflicto con términos teológicos de nivel proyecto. El problema principal es léxico-contextual: רכב en este contexto no debe quedar como «carros» cuando el verbo exige la referencia a los caballos. La nota sobre el singular «de él» es posible, pero no compensa la falta de la variante textual documentada por el POB inglés.'
  issues:
  - severity: high
    issue: La frase «dejó inútiles todos los carros de guerra» traduce erróneamente el objeto de וַיְעַקֵּר אֶת כָּל הָרֶכֶב.
    rationale: El verbo hebreo describe desjarretar/inutilizar animales, no vehículos. El POB inglés resolvió correctamente la metonimia como «all the chariot horses». En español, mantener «carros» como objeto directo cambia el sentido fuente.
  - severity: medium
    issue: Falta la nota textual sobre «1.700 jinetes» frente a «7.000 jinetes» en 1 Crónicas 18:4.
    rationale: El POB inglés conserva explícitamente esta variante textual. Dado que afecta un número importante, debe preservarse también en español.
  - severity: low
    issue: «David capturó de él» es poco idiomático en español.
    rationale: Aunque refleja literalmente מִמֶּנּוּ, el español suena más natural con «le capturó» o nombrando al referente. La fidelidad no exige un calco rígido aquí.
  revised_spanish_text: David le capturó[a] 1.700 jinetes[b] y 20.000 hombres de a pie. Entonces David desjarretó[c] todos los caballos de los carros[d], pero dejó suficientes para 100 carros[e].
  revised_footnotes:
