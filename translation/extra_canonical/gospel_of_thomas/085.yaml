translation:
  text: Jesus said[1], "Adam came into being from a great power and a great wealth,
    and he did not become worthy of you. For had he been worthy[2], he would not have
    tasted death."
  philosophy: formal
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T11:00:18Z'
  footnotes:
  - marker: '1'
    text: The manuscript contains lacunae at the words for 'worthy' (ⲉ̣[ϥⲙ]ⲡ̣ϣⲁ) and
      'he would have tasted' ([ⲛⲉϥⲛⲁϫⲓ] ϯ̣ⲡ̣[ⲉ). The restorations are standard and
      universally accepted based on context and available space.
    reason: textual_variant
  - marker: '2'
    text: The Coptic ⲛⲉⲩⲁⲝⲓⲟⲥ (ⲛⲉ ⲟⲩⲁⲝⲓⲟⲥ) functions here as the protasis of an unreal
      condition ('had he been worthy'), paired with the apodosis ⲛⲉϥⲛⲁϫⲓ ϯⲡⲉ ('he
      would have tasted').
    reason: register_note
lexical_decisions:
- source_word: ϣⲱⲡⲉ ⲉⲃⲟⲗ
  chosen: came into being
  rationale: The compound verb ϣⲱⲡⲉ ⲉⲃⲟⲗ means 'to come into existence' or 'originate'.
  lexicon: Crum 584a
  alternatives:
  - originated
  - was born
- source_word: ⲙⲛⲧⲣⲙⲙⲁⲟ
  chosen: wealth
  rationale: Abstract noun from ⲣⲙⲙⲁⲟ (rich person), meaning 'wealth' or 'riches'.
  lexicon: Crum 295b
  alternatives:
  - riches
- source_word: ⲙⲡϣⲁ
  chosen: worthy
  rationale: Standard verb for 'to be worthy'.
  lexicon: Crum 208b
  alternatives:
  - deserving
- source_word: ϫⲓ ϯⲡⲉ
  chosen: tasted
  rationale: Idiom meaning 'to taste', frequently used with 'death' in Thomas.
  lexicon: Crum 421a
  alternatives:
  - experienced
theological_decisions:
- issue: Translation of ⲙⲡⲉϥϣⲱⲡⲉ ⲉϥⲙⲡϣⲁ
  chosen_reading: he did not become worthy
  rationale: The combination of ϣⲱⲡⲉ ('become') and the circumstantial ⲉϥⲙⲡϣⲁ ('being
    worthy') is rendered smoothly as 'become worthy', reflecting the dynamic process
    implied by the Coptic.
  alternatives_noted:
  - he did not happen to be worthy
drafter_notes: The translation preserves the directness of the Coptic. The contrast
  between Adam's origin from 'great power and wealth' and his failure to be 'worthy'
  (resulting in death) highlights the Thomasine theme that origin alone does not guarantee
  life; one must become worthy to not taste death.
