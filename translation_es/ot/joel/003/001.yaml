review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: fórmula futura, derramamiento del Espíritu, alcance sobre «toda carne», profecía, sueños y visiones. Sin embargo, introduce varias desviaciones evitables respecto del texto fuente y del rastro POB en inglés: (1) cambia la segunda persona explícita («vuestros/sus») a una forma menos natural y menos coherente con la línea profética; (2) «sus ancianos» puede sugerir oficio más que edad, cuando el inglés auditado y el hebreo priorizan el contraste etario con «jóvenes»; (3) «sus jóvenes» neutraliza el masculino explícito de בַּחוּרֵיכֶם; (4) se añadió una nota b sobre «profetizarán» que no está motivada por el rastro inglés ni por una ambigüedad nueva real; y (5) la nota b del inglés sobre «mi Espíritu / mi espíritu» se perdió y además quedó desanclada temáticamente al marcarse en «derramaré».'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse para mayor naturalidad y precisión. «Después de eso» suena algo más pesado que «después» en este contexto. «Sus hijos... sus ancianos... sus jóvenes» resulta menos directo que una segunda persona consistente («sus hijos... sus hombres mayores... sus hombres jóvenes») y además crea cierta ambigüedad referencial. «Soñarán sueños» funciona bien y conserva el énfasis hebreo.
  glossary_alignment: Se alinea correctamente con los defaults del proyecto en «Espíritu», «toda carne» y el lenguaje profético. No hay términos problemáticos de Yahvé/Mesías/etc. La principal desalineación terminológica está en no preservar el masculino explícito de «your young men» y en usar «ancianos», que en español bíblico puede leerse como cargo/eclesiástico más que como simple edad.
  issues:
  - severity: medium
    issue: La nota del inglés sobre «my Spirit / my spirit» no se preservó adecuadamente.
    rationale: El rastro POB en inglés documenta una alternativa significativa para רוּחִי. En español debe mantenerse una nota equivalente, anclada a «Espíritu», no a «derramaré».
  - severity: medium
    issue: Se añadió una nota innecesaria para «profetizarán».
    rationale: «Hablarán proféticamente» no responde a una ambigüedad importante del hebreo ni está sustentada por el audit trail. Añade ruido donde el verbo español principal ya es claro.
  - severity: medium
    issue: «Sus ancianos» puede desplazar el sentido de edad hacia oficio o estatus.
    rationale: El hebreo זִקְנֵיכֶם está en paralelo con «sus hombres jóvenes»; el rastro inglés eligió «old men» precisamente para evitar la lectura de cargo. En español conviene una formulación que resalte la edad.
  - severity: high
    issue: «Sus jóvenes» neutraliza el masculino explícito de בַּחוּרֵיכֶם.
    rationale: El hebreo y el inglés auditado especifican varones jóvenes, en paralelo con hijos/hijas y hombres mayores. «Jóvenes» puede incluir ambos sexos y pierde ese dato semántico.
  - severity: low
    issue: «Después de eso» es aceptable pero menos fluido que «después»/«después de esto».
    rationale: No es error de fidelidad, pero en español bíblico contemporáneo «después» suena más natural aquí sin pérdida de sentido.
  revised_spanish_text: Y acontecerá después que derramaré mi Espíritu[a] sobre toda carne[b]; y sus hijos y sus hijas profetizarán, sus hombres mayores soñarán sueños, sus hombres jóvenes verán visiones.
  revised_footnotes:
  - marker: a
    text: «Mi Espíritu» también podría traducirse «mi espíritu», pero el contexto de empoderamiento profético favorece la referencia al Espíritu divino.
    reason: alternative_reading
  - marker: b
    text: O «sobre toda humanidad» / «sobre todas las personas»; el hebreo dice «sobre toda carne».
    reason: lexical_alternative
  revision_rationale: 'La revisión restaura mejor el rastro POB y el sentido del hebreo: conserva la nota importante sobre «mi Espíritu», mantiene «toda carne» con su alternativa léxica, elimina una nota innecesaria sobre «profetizarán», y hace explícito el contraste etario y masculino de «hombres mayores / hombres jóvenes». También aligera la secuencia temporal con «después».'
