id: 2CH.12.10
reference: 2 Chronicles 12:10
source:
  edition: WLC
  text: וַ/יַּ֨עַשׂ הַ/מֶּ֤לֶךְ רְחַבְעָם֙ תַּחְתֵּי/הֶ֔ם מָגִנֵּ֖י נְחֹ֑שֶׁת וְ/הִפְקִ֗יד עַל יַד֙ שָׂרֵ֣י הָ/רָצִ֔ים הַ/שֹּׁ֣מְרִ֔ים פֶּ֖תַח בֵּ֥ית הַ/מֶּֽלֶךְ־׃
translation:
  text: So King Rehoboam made bronze shields in their place and committed them to the care of the commanders of the guards[b][a], who kept watch at the entrance of the king’s house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'the runners,' likely referring to the royal guards or couriers who served as palace guards.
    reason: lexical_alternative
  - marker: b
    text: That is, bronze shields replacing the gold shields taken by Shishak (see the previous verse).
    reason: cross_reference
lexical_decisions:
- source_word: וַיַּעַשׂ
  chosen: made
  alternatives:
  - fashioned
  lexicon: HALOT
  rationale: Basic sense of עשה here is to make/produce. 'Made' is the most natural modern English rendering and fits the narrative style.
- source_word: תַּחְתֵּיהֶם
  chosen: in their place
  alternatives:
  - instead of them
  - as replacements for them
  lexicon: HALOT
  rationale: The preposition תחת with pronominal suffix indicates substitution/replacement. 'In their place' is idiomatic and clearly refers back to the gold shields taken away in the previous verse.
- source_word: מָגִנֵּי נְחֹשֶׁת
  chosen: bronze shields
  alternatives:
  - shields of bronze
  - copper shields
  lexicon: HALOT
  rationale: נְחֹשֶׁת can denote copper or bronze; in weaponry/armor contexts 'bronze' is the standard and most likely sense in English Bible usage. The construct phrase is naturally rendered 'bronze shields.'
- source_word: וְהִפְקִיד
  chosen: entrusted
  alternatives:
  - committed
  - put in the charge of
  - appointed
  lexicon: HALOT
  rationale: The hiphil of פקד here means to place under someone's charge or entrust to them. 'Entrusted' captures both the transfer and custodial nuance better than the more generic 'appointed.'
- source_word: עַל יַד
  chosen: to
  alternatives:
  - into the hand of
  - under the authority of
  lexicon: HALOT
  rationale: The idiom עַל יַד often means 'into the charge/hand of.' In smooth English, 'entrusted them to' best conveys the idiom without wooden literalism.
- source_word: שָׂרֵי
  chosen: commanders
  alternatives:
  - captains
  - chiefs
  - officers
  lexicon: HALOT
  rationale: שָׂרִים are leaders or officials. In this military/security context, 'commanders' best fits modern English and the rank relationship to the guards.
- source_word: הָרָצִים
  chosen: the guards
  alternatives:
  - the runners
  - the royal guard
  lexicon: HALOT
  rationale: Literally 'the runners,' but in royal contexts this term refers to a body of couriers/guards who served as royal guardsmen. 'The guards' communicates the function clearly in contemporary English; the more literal alternative is worth preserving in a footnote.
- source_word: הַשֹּׁמְרִים
  chosen: who kept watch
  alternatives:
  - who were guarding
  - the keepers of
  lexicon: HALOT
  rationale: The participle describes their ongoing duty. 'Who kept watch' is natural English and preserves the durative sense of guarding.
- source_word: פֶּתַח בֵּית הַמֶּלֶךְ
  chosen: the entrance of the king’s house
  alternatives:
  - the doorway of the king's house
  - the entrance of the royal palace
  lexicon: HALOT
  rationale: בית המלך literally means 'the house of the king,' i.e., the royal residence/palace. Rendering it as 'the king’s house' stays closer to the Hebrew while remaining clear; 'entrance' is a natural rendering of פתח.
