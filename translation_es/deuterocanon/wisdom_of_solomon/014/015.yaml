translation:
  language: es
  text: Porque un padre, consumido por el dolor de su niño[a] arrebatado demasiado pronto, hizo una imagen del que entonces estaba muerto, y ahora lo honró como a un dios, y transmitió misterios y ritos a los que estaban bajo su autoridad[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'quitado tan pronto' o 'arrebatado de repente'. El griego destaca que el niño fue removido antes de tiempo.
    reason: lexical_alternative
  - marker: b
    text: '''Misterios y ritos'' se refiere a observancias religiosas secretas o iniciáticas asociadas con prácticas de culto.'
    reason: cultural_note
lexical_decisions:
- source_word: ἀώρῳ
  english_pob_choice: untimely
  chosen_spanish: prematuro
  alternatives_spanish:
  - inoportuno
  - a destiempo
  - antes de tiempo
  lexicon: LSJ
  rationale: El adjetivo expresa algo ocurrido antes del tiempo debido. En español, 'prematuro' comunica bien la idea de una pérdida llegada demasiado pronto; 'antes de tiempo' sería más literal, pero menos fluido en este contexto.
- source_word: πένθει
  english_pob_choice: grief
  chosen_spanish: dolor
  alternatives_spanish:
  - duelo
  - pena
  - tristeza
  lexicon: LSJ
  rationale: El término puede referirse al luto o al pesar interior. Aquí el participio siguiente intensifica la carga afectiva; 'dolor' mantiene la fuerza emocional sin sonar forzado en español.
- source_word: τρυχόμενος
  english_pob_choice: worn down
  chosen_spanish: desgastado
  alternatives_spanish:
  - consumido
  - atormentado
  - abatido
  lexicon: LSJ
  rationale: El participio comunica ser consumido o desgastado por la aflicción. 'Desgastado' conserva la metáfora del agotamiento por dentro sin exagerar hacia un tormento físico no explícito.
- source_word: τοῦ ταχέως ἀφαιρεθέντος τέκνου
  english_pob_choice: for the child quickly taken away
  chosen_spanish: por el hijo rápidamente arrebatado
  alternatives_spanish:
  - por el hijo rápidamente quitado
  - por el hijo súbitamente quitado
  - por el hijo arrebatado con rapidez
  lexicon: LSJ
  rationale: τέκνον es genérico, pero en este contexto familiar 'hijo' es una opción natural y probable. 'Arrebatado' comunica la pérdida violenta o repentina sugerida por ἀφαιρεθέντος, sin añadir más de lo necesario.
- source_word: εἰκόνα
  english_pob_choice: an image
  chosen_spanish: una imagen
  alternatives_spanish:
  - una semejanza
  - un ídolo
  lexicon: LSJ
  rationale: La palabra básica es 'imagen' o 'semejanza'. Aunque el contexto es crítico de la idolatría, el griego describe primero el acto de hacer una imagen; 'ídolo' introduciría antes de tiempo la valoración interpretativa.
- source_word: τὸν τότε νεκρὸν ἄνθρωπον
  english_pob_choice: the man then dead
  chosen_spanish: del que entonces estaba muerto
  alternatives_spanish:
  - del hombre que entonces estaba muerto
  - del muerto de entonces
  lexicon: LSJ
  rationale: La expresión contrapone τότε y νῦν. 'Del que entonces estaba muerto' mantiene la referencia al difunto con naturalidad en español y conserva el contraste temporal.
- source_word: νῦν ὡς θεὸν ἐτίμησεν
  english_pob_choice: now honored him as a god
  chosen_spanish: y ahora lo honró como a un dios
  alternatives_spanish:
  - y ahora lo veneró como a un dios
  - y ahora lo honró como dios
  lexicon: LSJ
  rationale: ὡς θεόν indica trato en calidad de dios. 'Como a un dios' es claro y directo; el artículo indefinido en minúscula preserva que se trata de una deificación falsa dentro del argumento.
- source_word: παρέδωκεν
  english_pob_choice: handed down
  chosen_spanish: entregó
  alternatives_spanish:
  - transmitió
  - pasó a
  - dejó
  lexicon: LSJ
  rationale: En este contexto el verbo implica comunicar o ceder prácticas cultuales a otros. 'Entregó' funciona bien con el complemento siguiente y permite que 'misterios y ritos' queden como objeto directo de la transmisión.
- source_word: τοῖς ὑποχειρίοις
  english_pob_choice: to those under his authority
  chosen_spanish: a los que estaban bajo su autoridad
  alternatives_spanish:
  - a sus subordinados
  - a los que estaban bajo él
  - a sus dependientes
  lexicon: LSJ
  rationale: La expresión significa personas bajo la mano o control de otro. 'Bajo su autoridad' es neutral y comprensible, sin restringir indebidamente el ámbito doméstico o social.
- source_word: μυστήρια
  english_pob_choice: mysteries
  chosen_spanish: misterios
  alternatives_spanish:
  - ritos secretos
  - misterios cultuales
  lexicon: LSJ
  rationale: El término se refiere a observancias religiosas secretas o iniciáticas. 'Misterios' conserva el vocablo técnico y su resonancia histórica; 'misterios cultuales' sería más explícito pero menos ágil.
- source_word: τελετάς
  english_pob_choice: rites
  chosen_spanish: ritos
  alternatives_spanish:
  - ceremonias
  - iniciaciones
  lexicon: LSJ
  rationale: La palabra designa ritos o ceremonias religiosas, a menudo de tipo cultual. 'Ritos' acompaña de manera natural a 'misterios' y mantiene el sentido ritual conciso.
theological_decisions:
- issue: Honrar como dios a un humano muerto en un contexto de idolatría
  english_pob_reading: now honored him as a god
  chosen_spanish_reading: y ahora lo honró como a un dios
  alternative_spanish_readings:
  - y ahora lo veneró como a un dios
  - y ahora lo honró como dios
  rationale: El texto griego describe la atribución de honor divino a un difunto, como parte del origen de la idolatría. La minúscula en 'dios' evita sugerir divinidad verdadera y conserva la crítica implícita del pasaje.
  doctrine_reference: Respeto al valor polemizante del texto; distinción entre Dios verdadero y deificación idolátrica.
- issue: μυστήρια καὶ τελετάς como prácticas religiosas secretas o iniciáticas
  english_pob_reading: mysteries and rites
  chosen_spanish_reading: misterios y ritos
  alternative_spanish_readings:
  - ritos secretos y ceremonias
  - misterios y ceremonias
  rationale: La pareja griega alude a observancias cultuales secretas o iniciáticas. Traducirlas como 'misterios y ritos' preserva la terminología técnica sin suavizarla en exceso ni convertirla en una explicación interpretativa.
  doctrine_reference: Contexto de crítica a la idolatría y al culto falso.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión final del inglés POB, que ajustó la referencia al hijo fallecido, movió 'to those under his authority' para que modificara más naturalmente 'handed down', y añadió puntuación para claridad. La versión española refleja ese mismo encuadre sintáctico y mantiene el contraste temporal entre 'entonces' y 'ahora'.
  spanish_consistency_notes:
  - Se usó 'Dios' en minúscula cuando el contexto habla de una falsa deificación.
  - Se prefirió 'misterios y ritos' por ser el equivalente más transparente y fiel al registro cultual.
  - Se mantuvo un orden natural en español sin perder el paralelismo entre τότε y νῦν.
  - Se evitó 'SEÑOR' o eufemismos teológicos, porque no interviene el nombre divino en este versículo.
