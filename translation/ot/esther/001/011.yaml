id: EST.1.11
reference: Esther 1:11
source:
  edition: WLC
  text: לְ֠/הָבִיא אֶת וַשְׁתִּ֧י הַ/מַּלְכָּ֛ה לִ/פְנֵ֥י הַ/מֶּ֖לֶךְ בְּ/כֶ֣תֶר מַלְכ֑וּת לְ/הַרְא֨וֹת הָֽ/עַמִּ֤ים וְ/הַ/שָּׂרִים֙ אֶת יָפְיָ֔/הּ כִּֽי טוֹבַ֥ת מַרְאֶ֖ה הִֽיא־־־׃
translation:
  text: to bring Queen Vashti before the king with the royal crown[a], to show the peoples and the officials her beauty[c][b], for she was beautiful in appearance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with the royal crown.' The Hebrew preposition can be rendered more literally that way; 'wearing the royal crown' makes the sense explicit in English.
    reason: lexical_alternative
  - marker: b
    text: Or 'the people and the officials.' The Hebrew has a plural form, 'the peoples,' which may reflect the empire's many subject peoples.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'for she was good of appearance,' a Hebrew idiom meaning physically beautiful.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהָבִיא
  chosen: to bring
  alternatives:
  - to bring in
  - to present
  lexicon: HALOT
  rationale: 'Hiphil infinitive construct of בוא expresses causative movement: the eunuchs are commanded to cause Vashti to come before the king. ''To bring'' is the most direct and natural English rendering.'
- source_word: וַשְׁתִּי
  chosen: Vashti
  rationale: Personal name is transliterated per translation philosophy.
- source_word: הַמַּלְכָּה
  chosen: Queen
  alternatives:
  - the queen
  lexicon: HALOT
  rationale: Appositional title to Vashti. English idiom prefers 'Queen Vashti' rather than 'Vashti the queen,' while preserving her royal status.
- source_word: לִפְנֵי הַמֶּלֶךְ
  chosen: before the king
  alternatives:
  - into the presence of the king
  - before King Ahasuerus
  lexicon: HALOT
  rationale: לִפְנֵי commonly means 'before, in the presence of.' 'Before the king' is concise and accurate. The Hebrew says 'the king,' not his personal name here.
- source_word: בְּכֶתֶר מַלְכוּת
  chosen: wearing the royal crown
  alternatives:
  - with the royal crown
  - in the royal crown
  lexicon: HALOT
  rationale: The preposition ב can be rendered instrumentally or as accompanying circumstance. In English, 'wearing the royal crown' best conveys the sense that she was to appear adorned with it. 'Royal crown' reflects the construct phrase literally and naturally.
- source_word: לְהַרְאוֹת
  chosen: to show
  alternatives:
  - to display
  - to let see
  lexicon: HALOT
  rationale: Hiphil infinitive of ראה means 'to cause to see, show.' 'To show' is straightforward and fits the purpose clause.
- source_word: הָעַמִּים
  chosen: the peoples
  alternatives:
  - the people
  - the nations
  lexicon: HALOT
  rationale: Plural form should be preserved. In the Persian imperial setting, 'the peoples' better reflects multiple subject populations than the collective singular 'the people.'
- source_word: וְהַשָּׂרִים
  chosen: the officials
  alternatives:
  - the princes
  - the nobles
  lexicon: HALOT
  rationale: שָׂרִים denotes rulers or high officials. 'Officials' is readable modern English and broad enough for court dignitaries; 'princes' could misleadingly suggest royal sons.
- source_word: יָפְיָהּ
  chosen: her beauty
  alternatives:
  - her loveliness
  lexicon: HALOT
  rationale: Abstract noun with 3fs suffix. 'Her beauty' is the standard and most transparent rendering.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the king's desire to display her. 'For' preserves the explanatory force in a literary register.
- source_word: טוֹבַת מַרְאֶה
  chosen: beautiful in appearance
  alternatives:
  - fair to look at
  - good of appearance
  - beautiful to behold
  lexicon: HALOT
  rationale: The idiom literally means 'good of appearance,' a Hebrew expression for physical attractiveness. 'Beautiful in appearance' preserves the focus on visible beauty while using natural modern English.
