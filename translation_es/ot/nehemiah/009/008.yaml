review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el hebreo y el rastro POB en la mayor parte del versículo: conserva ''corazón'', ''fiel'', ''delante de ti'', el pacto, la lista de pueblos, la finalidad de dar la tierra a la descendencia, y el cumplimiento de las palabras divinas. Sin embargo, dos decisiones no reflejan bien el audit trail inglés: (1) la nota [a] quedó anclada al lugar equivocado; en el POB inglés la alternativa ''to his descendants'' corresponde a לְזַרְעוֹ, no a ''before you''. (2) La nota final en inglés preserva la alternativa ''just'', mientras que el español puso ''justo'' en el texto y relegó una alternativa distinta (''recto''). Dado el rationale documentado, conviene alinear el texto principal con ''righteous'' mediante ''recto'' o ''justo'' según el proyecto; aquí ''recto'' reproduce mejor la amplitud moral/covenantal frente a la alternativa ''justo''.'
  spanish_quality_summary: El español es claro y legible, pero presenta algunos detalles mejorables. 'Hallaste' suena bíblico pero algo más marcado; no es incorrecto. La coordinación 'del cananeo, del hitita...' es comprensible. La frase final queda más natural y mejor alineada teológicamente con 'porque tú eres recto'. Además, la puntuación puede mantener el guion largo para reflejar la repetición enfática del infinitivo en hebreo y del POB inglés.
  glossary_alignment: 'No hay términos del glosario principal en conflicto directo. La decisión relevante es צדיק: el proyecto prefiere preservar el campo de ''righteousness/justice'' con amplitud. ''Recto'' en el texto principal y ''justo'' como alternativa en nota reflejan mejor la decisión inglesa documentada que el borrador actual, que invierte esa prioridad. ''Descendencia'' para זרע es adecuado; ''simiente'' puede mantenerse como alternativa.'
  issues:
  - severity: high
    issue: La nota [a] está mal anclada y no corresponde al contenido de la nota inglesa preservada.
    rationale: En el POB inglés, la nota de alternativa sobre 'descendants' pertenece a לזרעו ('a su descendencia'), no a לְפָנֶיךָ ('delante de ti'). El español actual ancla [a] en 'delante de ti' con el contenido de otra nota y desplaza la nota de 'descendencia' a [b]. Esto rompe la trazabilidad de las decisiones y el orden lógico de notas.
  - severity: medium
    issue: La elección principal 'porque eres justo' no sigue la prioridad semántica documentada para צַדִּיק.
    rationale: El audit trail inglés eligió 'for you are righteous' y dejó 'just' como alternativa. En español, 'recto' comunica mejor ese valor amplio de rectitud moral/covenantal, mientras 'justo' puede sonar más estrechamente judicial. La nota actual además propone 'recto' como alternativa, invirtiendo la prioridad.
  - severity: low
    issue: Falta un equivalente de la nota inglesa sobre 'you established/confirmed your words' con una formulación más limpia en español.
    rationale: 'La nota actual mezcla ''has establecido'' con ''has confirmado tus palabras''; conviene uniformar la elipsis para que ambas alternativas sean paralelas: ''has establecido tus palabras'' o ''has confirmado tus palabras''.'
  revised_spanish_text: Hallaste su corazón fiel delante de ti, e hiciste un pacto con él para dar la tierra del cananeo, del hitita, del amorreo, del ferezeo, del jebuseo y del gergeseo, para dársela a su descendencia[a]. Y has cumplido tus palabras[b], porque tú eres recto[c].
  revised_footnotes:
