    issue: '''pone una trampa'' es menos idiomático y menos literario que una formulación como ''tiende un lazo'''
    rationale: El hebreo יִתֵּן מוֹקֵשׁ literalmente 'da un lazo/trampa' se expresa mejor en español proverbial con un verbo como 'tender', especialmente con 'lazo', que preserva más directamente la imagen de מוֹקֵשׁ.
  - severity: medium
    issue: La nota [b] está anclada en 'Yahvé' en lugar de la frase que traduce יְשֻׂגָּב
    rationale: La nota explica alternativas para 'será puesto en alto', por lo que el marcador debe aparecer junto al verbo o frase correspondiente, no junto al nombre divino.
  - severity: low
    issue: La combinación 'trampa' en el texto y 'lazo' en la nota [a] crea una pequeña inconsistencia interna de imaginería
    rationale: No es incorrecto, pero conviene que texto y nota mantengan la misma imagen principal cuando no hay razón para variar.
  revised_spanish_text: El temor del hombre[a] tiende un lazo; pero el que confía en Yahvé será puesto en alto[b].
