translation:
  language: es
  text: El sonido de tu trueno se oyó en el torbellino[a]; los relámpagos alumbraron el mundo; la tierra tembló y se estremeció.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “en la rueda”; el hebreo probablemente evoca una tormenta giratoria, por eso se traduce “en el torbellino”.
    reason: lexical_alternative
lexical_decisions:
- source_word: ק֤וֹל
  english_pob_choice: The sound of
  chosen_spanish: La voz de
  alternatives_spanish:
  - El sonido de
  lexicon: HALOT
  rationale: קול puede significar “voz” o “sonido”. En poesía teofánica, “la voz de tu trueno” conserva el paralelismo con el hebreo y suena natural en español; “el sonido de” sería más explicativo, pero menos personal en la dirección a Dios.
- source_word: רַעַמְךָ
  english_pob_choice: your thunder
  chosen_spanish: tu trueno
  alternatives_spanish:
  - tu trueno retumbante
  - tu trueno-clamor
  lexicon: HALOT
  rationale: El sustantivo designa el trueno, con sufijo de 2 ms que se mantiene con “tu”. No se amplía a “retumbante” porque el hebreo ya aporta la intensidad y el contexto poético la sostiene.
- source_word: בַּגַּלְגַּל
  english_pob_choice: in the whirlwind
  chosen_spanish: en el torbellino
  alternatives_spanish:
  - en la rueda
  - en el remolino
  - en el vendaval
  lexicon: HALOT
  rationale: גַּלְגַּל puede referir literalmente a una rueda, pero en contexto meteorológico y poético sugiere el movimiento giratorio de una tormenta. “Torbellino” preserva esa imagen dinámica y es claro en español.
- source_word: הֵאִירוּ
  english_pob_choice: lit up
  chosen_spanish: alumbraron
  alternatives_spanish:
  - dieron luz
  - iluminaron
  - brillaron
  lexicon: HALOT
  rationale: El hifil de אור expresa “dar luz” o “hacer brillar”. “Alumbraron” mantiene el sentido causativo y evita un tono demasiado técnico o redundante.
- source_word: בְרָקִים
  english_pob_choice: lightning
  chosen_spanish: los relámpagos
  alternatives_spanish:
  - los rayos
  - los centellos
  lexicon: HALOT
  rationale: El plural hebreo se vierte naturalmente en español con “relámpagos”, que conserva la imagen visual del destello en plural sin forzar un singular colectivo.
- source_word: תֵּבֵל
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - la tierra habitada
  - el orbe
  lexicon: HALOT
  rationale: תֵּבֵל suele designar el mundo habitado o la esfera terrenal. “El mundo” es la opción más natural y suficientemente amplia en este contexto cósmico.
- source_word: רָגְזָה
  english_pob_choice: trembled
  chosen_spanish: tembló
  alternatives_spanish:
  - se estremeció
  - se agitó
  lexicon: HALOT
  rationale: El verbo expresa temblor o agitación. “Tembló” es la forma más directa y poética en español, compatible con la siguiente intensificación verbal.
- source_word: וַתִּרְעַשׁ
  english_pob_choice: and quaked
  chosen_spanish: y se estremeció
  alternatives_spanish:
  - y tembló
  - y se sacudió
  lexicon: HALOT
  rationale: El verbo añade la idea de sacudida o quiebre vibratorio. “Se estremeció” distingue mejor este segundo movimiento del primero y reproduce la intensificación del hebreo.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el suelo
  lexicon: HALOT
  rationale: En este contexto cósmico, “la tierra” comunica bien el alcance universal del temblor. “La tierra” es más idiomática en español que “la tierra” repetida como calco de “the earth” y conserva la imagen del mundo físico.
theological_decisions:
- issue: Descripción teofánica del poder de Yahvé en la tormenta
  english_pob_reading: The sound of your thunder was in the whirlwind; lightning lit up the world; the earth trembled and quaked.
  chosen_spanish_reading: La voz de tu trueno estaba en el torbellino; los relámpagos alumbraron el mundo; la tierra tembló y se estremeció.
  alternative_spanish_readings:
  - La voz de tu trueno estaba en la rueda
  - El sonido de tu trueno estaba en el torbellino
  rationale: 'No se suaviza la fuerza teofánica del versículo: Yahvé aparece como el Dios cuya tormenta sacude la creación. Se conserva la tensión del término בַּגַּלְגַּל entre la imagen literal de “rueda” y el sentido meteorológico de “torbellino”; el cuerpo principal adopta la lectura contextual más natural, sin borrar la alternativa documentada.'
  doctrine_reference: Teofanía de Yahvé; poesía bíblica sobre el poder divino en la creación (cf. Sal 29; Ex 19)
translation_notes:
  revision_awareness: El texto fuente y el aparato inglés están en alta concordancia; no hay revisiones aplicadas en la auditoría inglesa y la presente propuesta sigue la lectura estable, manteniendo la alternativa “rueda/torbellino” donde el hebreo ofrece una ambigüedad real.
  spanish_consistency_notes:
  - Se mantuvo el tratamiento directo de segunda persona para Dios (“tu”) conforme al sufijo hebreo.
  - 'Se preservó la progresión poética de dos verbos de movimiento en la tierra: “tembló” / “se estremeció”.'
  - Se usó “torbellino” como opción principal por claridad contextual, dejando la lectura literal “rueda” en nota.
  - No se introdujo terminología eclesiástica ajena al versículo; el registro busca ser bíblico, claro y reverente.
