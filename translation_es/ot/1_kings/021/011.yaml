translation:
  language: es
  text: Los hombres de su ciudad —los ancianos y los nobles[a] que vivían en su ciudad— hicieron tal como Jezabel les había enviado, conforme a lo que estaba escrito en las cartas que les había enviado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los dignatarios'; el término hebreo para 'nobles' puede referirse a hombres socialmente prominentes o a oficiales de alto rango.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  english_pob_choice: did
  chosen_spanish: hicieron
  alternatives_spanish:
  - actuaron
  - cumplieron
  lexicon: HALOT
  rationale: El verbo עשה aquí expresa la acción concreta de obedecer las instrucciones de Jezabel. 'Hicieron' mantiene la sencillez narrativa del hebreo y la decisión inglesa de un verbo directo.
- source_word: אַנְשֵׁי עִירוֹ
  english_pob_choice: the men of his city
  chosen_spanish: los hombres de su ciudad
  alternatives_spanish:
  - la gente de su ciudad
  - los ciudadanos de su ciudad
  lexicon: HALOT
  rationale: אַנְשֵׁי es literalmente 'hombres de'. Como la apposición siguiente identifica varones con función cívica, conviene conservar el matiz masculino en español.
- source_word: הַזְּקֵנִים
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los mayores
  - los ancianos de la ciudad
  lexicon: HALOT
  rationale: En contexto cívico, זקנים designa a los dirigentes reconocidos de la comunidad, no solo a personas de edad avanzada. 'Ancianos' es el equivalente idiomático y tradicionalmente comprensible en español.
- source_word: הַחֹרִים
  english_pob_choice: the nobles
  chosen_spanish: los nobles
  alternatives_spanish:
  - los dignatarios
  - los principales
  lexicon: HALOT
  rationale: El término indica personas de alto rango o posición social. 'Nobles' sigue la lectura contextual del inglés POB y es natural en español para este entorno administrativo.
- source_word: הַיֹּשְׁבִים בְּעִירוֹ
  english_pob_choice: who lived in his city
  chosen_spanish: que habitaban en su ciudad
  alternatives_spanish:
  - que vivían en su ciudad
  - residentes en su ciudad
  lexicon: HALOT
  rationale: ישב puede significar 'habitar/vivir'. 'Habitaban' conserva la idea de residencia estable sin sonar forzado, y encaja bien con el tono formal del verso.
- source_word: כַּאֲשֶׁר שָׁלְחָה אֲלֵיהֶם אִיזָבֶל
  english_pob_choice: as Jezebel had sent to them
  chosen_spanish: tal como Jezabel les había enviado
  alternatives_spanish:
  - como Jezabel les había enviado
  - según lo que Jezabel les había enviado
  lexicon: HALOT
  rationale: El hebreo dice simplemente que ella 'envió a ellos'; no exige explicitar 'palabra' o 'mensaje'. 'Les había enviado' respeta la sobriedad del original y la revisión inglesa que eliminó 'word' por mayor precisión.
- source_word: כָּתוּב בַּסְּפָרִים
  english_pob_choice: as it was written in the letters
  chosen_spanish: conforme a lo escrito en las cartas
  alternatives_spanish:
  - tal como estaba escrito en las cartas
  - según lo escrito en las cartas
  lexicon: HALOT
  rationale: סְפָרִים aquí se refiere a las cartas enviadas por Jezabel; por eso 'cartas' es más preciso que 'documentos' o 'rollos'. 'Lo escrito' refleja bien el participio pasivo כָּתוּב.
- source_word: אֲשֶׁר שָׁלְחָה אֲלֵיהֶם
  english_pob_choice: that she had sent to them
  chosen_spanish: que les había enviado
  alternatives_spanish:
  - que les había mandado
  - que había enviado a ellos
  lexicon: HALOT
  rationale: El relativo identifica las cartas. 'Había enviado' reproduce la relación antecedente y evita sobredetallar el contenido, como en el ajuste final del inglés POB.
translation_notes:
  revision_awareness: El inglés POB revisó 'had sent word to them' a 'had sent to them' para ajustarse más al hebreo, que no explicita 'word'. La versión española sigue esa revisión y evita añadir 'mensaje' o 'palabra' en el texto principal.
  spanish_consistency_notes:
  - Se mantuvo 'Yezabel' como 'Jezabel' por convención castellana bíblica estándar y transparencia lectora.
  - Se preservó la estructura appositiva con guiones largos para reflejar 'los hombres de su ciudad—los ancianos y los nobles...' sin perder fluidez en español.
  - No se usó 'SEÑOR' ni terminología teológica especial porque el versículo no contiene el nombre divino ni una carga doctrinal explícita.
