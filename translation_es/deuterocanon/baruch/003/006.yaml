translation:
  language: es
  text: Porque tú eres Yahvé, nuestro Dios, y te alabaremos, oh Yahvé.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: En este contexto de oración, ὅτι introduce la base o fundamento de la afirmación; «Porque» conserva bien esa relación causal/explicativa en español sin volverlo exhortativo.
- source_word: Κύριος
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - el Señor
  lexicon: BDAG
  rationale: La guía del proyecto para יהוה / YHWH es «Yahvé» en el texto principal. Aquí el griego Κύριος funciona como título divino y refleja la tradición de sustitución del Nombre; por eso se explicita «Yahvé» para mantener la referencia al nombre divino y no enmascararla con un título genérico.
- source_word: ὁ θεὸς ἡμῶν
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - el Dios nuestro
  lexicon: BDAG
  rationale: «Nuestro Dios» es la forma natural e idiomática en español, y preserva el valor posesivo y relacional del griego.
- source_word: αἰνέσομέν
  english_pob_choice: we will praise
  chosen_spanish: te alabaremos
  alternatives_spanish:
  - te ensalzaremos
  - te loaremos
  lexicon: BDAG
  rationale: El futuro indicativo πρώτο plural se conserva con «alabaremos». El complemento directo se expresa con el clítico «te», exigido por el español.
- source_word: Κύριε
  english_pob_choice: O Lord
  chosen_spanish: oh Yahvé
  alternatives_spanish:
  - oh Señor
  - Yahvé
  lexicon: BDAG
  rationale: El vocativo final se mantiene como dirección directa mediante «oh». Dado que el texto ya ha identificado al destinatario como Yahvé, repetir el nombre en la invocación preserva el tono orante y la continuidad referencial del griego.
theological_decisions:
- issue: Tratamiento de κύριος en un contexto divino y vocativo
  english_pob_reading: Lord ... O Lord
  chosen_spanish_reading: Yahvé ... oh Yahvé
  alternative_spanish_readings:
  - Señor ... oh Señor
  - Señor ... oh Yahvé
  rationale: 'La política terminológica del proyecto favorece «Yahvé» para el Nombre divino. En este versículo, Κύριος aparece dos veces: primero como predicado de identidad divina y luego en vocativo. Traducir ambas instancias con el Nombre mantiene la referencia al Dios de Israel y evita la máscara litúrgica de «SEÑOR»; el vocativo se señala con «oh» para respetar la función directa de Κύριε.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה / YHWH → Yahvé; κύριος → Lord in divine contexts, with source-based exceptions where the Name is in view'
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió el final de «Lord» a «O Lord» para reflejar mejor el vocativo Κύριε. La versión española ya incorpora esa función vocativa con «oh Yahvé», manteniendo el mismo ajuste pragmático sin perder la preferencia terminológica del proyecto para el Nombre divino.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme a la terminología predeterminada del proyecto para el Nombre divino.
  - «Alabaremos» conserva el futuro plural del griego; no se suaviza a una exhortación como «alabemos».
  - No se introduce puntuación o léxico devocional ajeno al tono simple del original.
  - La invocación final usa «oh» para reflejar el vocativo sin cargar el español con formulación arcaizante innecesaria.
