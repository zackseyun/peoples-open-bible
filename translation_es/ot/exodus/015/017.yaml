  text: You will bring them in and plant them on the mountain of your inheritance— the place[a], Yahweh, that you made for your dwelling, the sanctuary, Lord[c][b], that your hands established.
  footnotes:
  - marker: a
    text: Or 'and establish them.' The Hebrew verb literally means 'plant them,' preserving the image of secure settlement.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the mountain of your inheritance' may refer broadly to the land God gives his people or more specifically to the mountain of God's sanctuary.
    reason: alternative_reading
  - marker: c
    text: Hebrew has both the divine name (rendered 'LORD') and the title 'Lord' in this verse.
    reason: cultural_note
