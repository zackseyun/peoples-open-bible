    text: 'O, siguiendo otra lectura: «con ustedes».'
    reason: textual_variant
  - marker: b
    text: 'El hebreo dice «los santos» o «los santos/consagrados»; puede referirse a asistentes celestiales. Algunos entienden: «los ángeles».'
    reason: lexical_alternative
  revision_rationale: 'Se hace una reparación menor para mejorar la fidelidad idiomática y léxica en español: «todos los seres santos» se reemplaza por «todos los santos», que es más natural y mantiene mejor el registro bíblico. La nota conserva explícitamente la amplitud interpretativa documentada por el POB inglés, de modo que no se resuelve indebidamente si se trata de santos, asistentes celestiales o ángeles.'
