translation:
  language: es
  text: 'Los levitas: los hijos de Jesúa, de Kadmiel, de los hijos[a] de Hodvá, setenta y cuatro.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los descendientes de Hodvá'. El hebreo literalmente dice 'los hijos de Hodvá', una expresión genealógica que puede denotar una línea familiar más amplia, no solo hijos inmediatos.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַלְוִיִּם
  english_pob_choice: The Levites
  chosen_spanish: Los levitas
  alternatives_spanish:
  - Los levitas eran
  lexicon: HALOT
  rationale: El hebreo presenta el grupo como encabezado nominal de la lista censal. En español, 'Los levitas' conserva ese valor de encabezado sin añadir un verbo innecesario.
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los miembros de
  lexicon: HALOT
  rationale: En listas genealógicas, בְּנֵי puede señalar linaje o pertenencia familiar amplia. 'Los hijos de' reproduce la forma del hebreo y mantiene la estructura genealógica.
- source_word: יֵשׁוּעַ
  english_pob_choice: Jeshua
  chosen_spanish: Jesúa
  alternatives_spanish:
  - Josué
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre postexílico como 'Jesúa', forma reconocible en español y distinguible de 'Josué', que puede confundirse con el personaje bíblico más antiguo.
- source_word: לְקַדְמִיאֵל
  english_pob_choice: of Kadmiel
  chosen_spanish: de Quadmiel
  alternatives_spanish:
  - de Kadmiel
  - pertenecientes a Quadmiel
  lexicon: HALOT
  rationale: La preposición relacional ל en este contexto se expresa naturalmente con 'de'. Se conserva el nombre propio con transliteración española 'Quadmiel', reflejando el valor nominal del hebreo sin sobreinterpretar la relación.
- source_word: לִבְנֵי לְהוֹדְוָה
  english_pob_choice: of the sons of Hodvah
  chosen_spanish: de los hijos de Hodvá
  alternatives_spanish:
  - de los descendientes de Hodvá
  - de la casa de Hodvá
  lexicon: HALOT
  rationale: El hebreo conserva la cadena genealógica 'hijos de'. En español, 'de los hijos de Hodvá' mantiene esa estructura y deja abierta la posibilidad de un linaje más amplio, no solo hijos inmediatos.
- source_word: שִׁבְעִים וְאַרְבָּעָה
  english_pob_choice: seventy-four
  chosen_spanish: setenta y cuatro
  alternatives_spanish:
  - setenta y cuatro personas
  lexicon: HALOT
  rationale: El número cardinal del censo se traduce de forma estándar en español. No se añade 'personas' porque el contexto censal ya lo implica y el hebreo no lo explicita.
translation_notes:
  revision_awareness: El texto base en inglés sigue de cerca la estructura del hebreo y usa una nota para la amplitud genealógica de 'sons of'. Para el español se preservó la misma tensión semántica con una nota equivalente, manteniendo el encabezado nominal y la lista censal sin introducir verbos ni explicaciones ajenas al versículo.
  spanish_consistency_notes:
  - Se usa 'levitas' como sustantivo colectivo en plural, coherente con la lista censal.
  - Se mantuvo la fórmula genealógica 'los hijos de' por su transparencia respecto del hebreo.
  - 'Se eligieron transliteraciones españolas consistentes: ''Jesúa'', ''Quadmiel'' y ''Hodvá''.'
  - El número se presenta en palabras, acorde con el registro bíblico en español.
