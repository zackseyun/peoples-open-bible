translation:
  language: es
  text: Pues el que pide cuentas por la sangre derramada los recuerda[a]; no olvida el clamor de los afligidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los pobres». El término hebreo puede referirse a los pobres, afligidos, humildes u oprimidos; aquí el sentido más amplio de personas que sufren encaja con el contexto de derramamiento de sangre y clamor por justicia.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación o fundamento de la afirmación anterior; «Porque» comunica bien esa relación causal/explicativa en español.
- source_word: דֹרֵשׁ דָּמִים
  english_pob_choice: the one who avenges bloodshed
  chosen_spanish: el que requiere sangre
  alternatives_spanish:
  - el vengador de la sangre
  - el que pide cuentas por la sangre
  - el que hace justicia por la sangre
  lexicon: HALOT
  rationale: «Requiere sangre» conserva con más cercanía la idea de demandar cuenta por derramamiento de sangre sin fijar de más el rol legal específico; evita suavizar el peso judicial del hebreo.
- source_word: אוֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - los afligidos
  lexicon: HALOT
  rationale: El plural se mantiene de forma implícita en el pronombre objeto; en español, «los» retoma naturalmente a los oprimidos/afligidos como grupo.
- source_word: זָכָר
  english_pob_choice: remembers
  chosen_spanish: los recuerda
  alternatives_spanish:
  - se acuerda de ellos
  - los tiene presentes
  lexicon: HALOT
  rationale: El perfecto hebreo en poesía expresa una acción característica y vigente; «los recuerda» preserva ese valor sin volverlo demasiado temporal.
- source_word: לֹא שָׁכַח
  english_pob_choice: does not forget
  chosen_spanish: no olvida
  alternatives_spanish:
  - no ha olvidado
  - no se olvida
  lexicon: HALOT
  rationale: «No olvida» reproduce la negación enfática con naturalidad y mantiene el paralelismo con «recuerda».
- source_word: צַעֲקַת
  english_pob_choice: the cry
  chosen_spanish: el clamor
  alternatives_spanish:
  - el grito
  - la súplica
  lexicon: HALOT
  rationale: «Clamor» es una forma digna y bíblica en español para un llamado intenso de angustia dirigido a Dios.
- source_word: עניים
  english_pob_choice: the afflicted
  chosen_spanish: los afligidos
  alternatives_spanish:
  - los pobres
  - los humildes
  - los oprimidos
  lexicon: HALOT
  rationale: Como en la nota inglesa, el término puede abarcar pobres, afligidos, humildes u oprimidos; aquí «afligidos» encaja mejor con el contexto de violencia y clamor por justicia.
theological_decisions:
- issue: Sentido judicial de דֹרֵשׁ דָּמִים
  english_pob_reading: God is portrayed as holding bloodshed accountable and acting as avenger of wrongful killing.
  chosen_spanish_reading: Dios es presentado como quien exige cuentas por la sangre derramada y responde con justicia.
  alternative_spanish_readings:
  - Dios actúa como vengador de la sangre
  - Dios simplemente nota el derramamiento de sangre
  rationale: La frase hebrea no sugiere solo observación pasiva ni una sed literal de sangre; expresa responsabilidad judicial y retribución justa por homicidio injusto.
  doctrine_reference: Justicia retributiva divina; responsabilidad por sangre inocente
- issue: Valor colectivo del objeto pronominal
  english_pob_reading: The plural is retained in English, referring to the afflicted/poor as a group.
  chosen_spanish_reading: El pronombre plural se conserva de manera natural en el español del verso.
  alternative_spanish_readings:
  - singularizar el objeto
  - explicitar «a ellos»
  rationale: El antecedente colectivo de los afligidos se entiende mejor en plural, preservando la fuerza comunitaria del texto.
  doctrine_reference: Lectura colectiva del sufrimiento humano en los Salmos
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior: el marcador [a] ahora aparece explícitamente en el texto español junto al término correspondiente, y la nota queda anclada a esa palabra.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y digno, evitando calcos innecesarios.
  - «Afligidos» se eligió para no reducir עניים solo a pobreza económica.
  - La correspondencia entre «recuerda» y «no olvida» conserva el paralelismo hebreo.
  - No se introdujo «SEÑOR»; el verso no contiene el nombre divino explícito.
  - La formulación «requiere sangre» conserva la tensión judicial del hebreo sin sobreespecificar un cargo legal técnico.
