translation:
  language: es
  text: No contiendas con una persona sin causa, si no te ha hecho daño.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No hagas
  - Jamás
  lexicon: HALOT
  rationale: אַל con imperfecto introduce una prohibición. En español, la negación simple «No» comunica bien el mandato sin añadir énfasis que el hebreo no expresa explícitamente.
- source_word: תרוב
  english_pob_choice: contend
  chosen_spanish: contiendas
  alternatives_spanish:
  - riñas
  - discutas
  - litigues
  lexicon: HALOT
  rationale: ריב abarca contender, disputar o entrar en pleito. «Contiendas» mantiene ese rango más amplio y suena natural en el registro sapiencial; evita restringir el sentido a una mera discusión informal o a un contexto legal exclusivo.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - contra
  lexicon: HALOT
  rationale: La preposición hebrea normalmente significa «con». En español, «contender con» reproduce bien la construcción y conserva la relación verbal del original.
- source_word: אָדָם
  english_pob_choice: a man
  chosen_spanish: un hombre[a]
  alternatives_spanish:
  - una persona
  - alguien
  - humanidad
  lexicon: HALOT
  rationale: אָדָם puede funcionar genéricamente para una persona cualquiera. Se mantiene «un hombre» para seguir de cerca la forma singular del hebreo y por la decisión auditada del POB inglés; la nota explica el valor genérico del término.
- source_word: חִנָּם
  english_pob_choice: without cause
  chosen_spanish: sin causa
  alternatives_spanish:
  - gratuitamente
  - sin motivo
  - en vano
  lexicon: HALOT
  rationale: חִנָּם significa «sin causa» o «sin motivo». «Sin causa» conserva el tono formal e idiomático del audit trail inglés y refleja bien la falta de justificación del conflicto.
- source_word: אִם לֹא
  english_pob_choice: if he has not
  chosen_spanish: si no
  alternatives_spanish:
  - a menos que
  - si no ha
  lexicon: HALOT
  rationale: La secuencia condicional introduce la cláusula de excepción. En español, «si no» reproduce de manera directa la relación condicional sin sobreexplicar el matiz.
- source_word: גְמָלְךָ
  english_pob_choice: has done you
  chosen_spanish: te ha hecho
  alternatives_spanish:
  - te ha pagado
  - te ha tratado
  lexicon: HALOT
  rationale: גמל puede implicar tratar con alguien o pagarle/retribuirle. En combinación con «daño», «te ha hecho» es la forma más natural en español y mantiene la acción dirigida al destinatario.
- source_word: רָעָה
  english_pob_choice: no harm
  chosen_spanish: daño
  alternatives_spanish:
  - mal
  - injuria
  - perjuicio
  lexicon: HALOT
  rationale: En este contexto interpersonal, רָעָה apunta a daño o mal concreto. «Daño» comunica con claridad el sentido de perjuicio sufrido sin cargar el verso con un término más abstracto o excesivamente moral.
translation_notes:
  revision_awareness: La base inglesa revisada cambió «for no reason» por «without cause» para ajustar mejor חִנָּם; la versión española sigue esa decisión con «sin causa». Mantiene también la cláusula condicional final como en el texto hebreo y el audit trail inglés.
  spanish_consistency_notes:
  - Se conserva «contiendas» para ריב, en línea con la amplitud semántica documentada por el POB inglés.
  - Se evita «SEÑOR» u otras sustituciones no presentes en el versículo, porque no hay referencia al nombre divino aquí.
  - La nota al pie marca el valor genérico de אָדָם sin neutralizar innecesariamente el sustantivo en el texto principal.
