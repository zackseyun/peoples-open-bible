revisions:
- from: 'y los que pasan no dirán[a]: «La bendición de Yahvé sea sobre ustedes; los bendecimos en el nombre de Yahvé».'
  to: 'y los que pasan por allí no dicen: «La bendición de Yahvé[a] sea sobre ustedes; los bendecimos en el nombre de Yahvé».'
  rationale: Se ajusta el verbo al presente gnómico («no dicen»), se explicita mejor el sentido de הָעֹבְרִים con «los que pasan por allí», y se reubica la nota para que ancle correctamente al nombre divino «Yahvé», que es el elemento explicado por la observación textual. El resto del verso se mantiene porque preserva bien el sentido y la terminología del proyecto.
