translation:
  language: es
  text: ¿Qué vamos a hacer por los que quedan, en cuanto a esposas? Pues hemos jurado por Yahvé no darles ninguna de nuestras hijas como esposas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: מַה נַּעֲשֶׂה
  english_pob_choice: What shall we do
  chosen_spanish: ¿Qué haremos?
  alternatives_spanish:
  - ¿Qué debemos hacer?
  - ¿Qué vamos a hacer?
  lexicon: HALOT
  rationale: La pregunta deliberativa pide decidir un curso de acción; en español, «¿Qué haremos?» conserva ese matiz sin añadir interpretación extra.
- source_word: לָהֶם
  english_pob_choice: for them
  chosen_spanish: por los
  alternatives_spanish:
  - para ellos
  - acerca de ellos
  lexicon: HALOT
  rationale: Aquí la preposición expresa referencia/beneficio en una deliberación práctica; «por los» se integra naturalmente con la pregunta en español.
- source_word: לַנּוֹתָרִים
  english_pob_choice: for those who remain
  chosen_spanish: los que quedan
  alternatives_spanish:
  - los sobrevivientes
  - el remanente
  lexicon: HALOT
  rationale: El participio sustantivado señala a los que han quedado con vida; «los que quedan» mantiene la forma relativa y evita cargar de tradición un término como «remanente».
- source_word: לְנָשִׁים
  english_pob_choice: for wives
  chosen_spanish: para esposas
  alternatives_spanish:
  - como esposas
  - para mujeres
  lexicon: HALOT
  rationale: El hebreo es elíptico, literalmente «para esposas». En español conviene conservar la brevedad del original sin explicar demasiado; «para esposas» deja visible la elipsis.
- source_word: וַאֲנַחְנוּ נִשְׁבַּעְנוּ
  english_pob_choice: For we have sworn
  chosen_spanish: Pues hemos jurado
  alternatives_spanish:
  - Y hemos jurado
  - Porque hemos jurado
  lexicon: HALOT
  rationale: La conjunción introduce la razón del problema; «Pues» transmite mejor la fuerza explicativa que un simple «y». El perfecto compuesto refleja un juramento pasado con vigencia presente.
- source_word: בַיהוָה
  english_pob_choice: by Yahweh
  chosen_spanish: por Yahvé
  alternatives_spanish:
  - por Yahweh
  - en Yahvé
  lexicon: HALOT
  rationale: El nombre divino se vierte según la norma del proyecto como «Yahvé». Con juramentos, «por» reproduce bien la fórmula juratoria del hebreo.
- source_word: לְבִלְתִּי תֵּת
  english_pob_choice: not to give
  chosen_spanish: no dar
  alternatives_spanish:
  - no entregar
  - abstenernos de dar
  lexicon: HALOT
  rationale: La construcción expresa la negativa vinculada al juramento; «no dar» es breve, fiel y natural en español.
- source_word: מִבְּנוֹתֵינוּ
  english_pob_choice: any of our daughters
  chosen_spanish: ninguna de nuestras hijas
  alternatives_spanish:
  - ninguna hija nuestra
  - ninguna de nuestras hijas
  lexicon: HALOT
  rationale: 'El מן es partitivo y distributivo: no dar ninguna de ellas. «Ninguna de nuestras hijas» comunica esa fuerza sin necesidad de una nota explicativa en el texto principal.'
- source_word: לְנָשִׁים
  english_pob_choice: as wives
  chosen_spanish: como esposas
  alternatives_spanish:
  - por esposas
  - para mujeres
  lexicon: HALOT
  rationale: En la segunda ocurrencia, la frase acompaña el acto de dar en matrimonio; «como esposas» expresa el resultado/estado marital de modo claro en español.
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton directamente. Conforme a la terminología del proyecto, se preserva el nombre propio divino como «Yahvé» y no se lo enmascara con «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La revisión en inglés eliminó una expansión interpretativa («to get») y dejó la apposición más cercana al hebreo («for those who remain, for wives»). La versión española sigue esa línea: conserva la brevedad del original, mantiene la duplicación de «para/como esposas» de forma inteligible y evita ampliar el sentido.'
  spanish_consistency_notes:
  - Se conservó «Yahvé» según el estándar del proyecto.
  - Se prefirió «los que quedan» antes que «remanente» para evitar una carga técnica no exigida por el contexto.
  - Se mantuvo la repetición de la idea de «esposas» en ambas cláusulas porque el hebreo la repite y la revisión inglesa la preserva.
  - Se usó un estilo bíblico moderno y claro, sin depender de fórmulas tradicionales que oculten el sentido del hebreo.
