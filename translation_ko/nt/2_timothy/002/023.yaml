  yaml_path: translation/nt/2_timothy/002/023.yaml
  text: But refuse foolish and ignorant controversies, knowing that they produce quarrels.
translation:
  language: ko
  text: 어리석고 무지한 논쟁은 거절하십시오. 그것이 다툼을 낳을 뿐임을 그대는 알기 때문입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὰς μωρὰς καὶ ἀπαιδεύτους ζητήσεις
  english_pob_choice: foolish and ignorant controversies
  chosen_korean: 어리석고 무지한 논쟁
  alternatives_korean:
  - 어리석고 배움이 없는 논쟁
  - 미련하고 무식한 변론
  lexicon: BDAG
  rationale: ζήτησις는 「탐문·논쟁」을 함께 가리키나, 본 절의 부정적 형용사 짝과 결합하면 「논쟁」이 자연스럽다. ἀπαίδευτος는 「가르침 받지 못한·무식한」.
- source_word: παραιτοῦ
  english_pob_choice: refuse
  chosen_korean: 거절하십시오
  alternatives_korean:
  - 멀리하십시오
  - 받아들이지 마십시오
  lexicon: BDAG
  rationale: παραιτέομαι는 「거절·물리침」을 뜻한다. 「거절하다」가 한국어로 자연스럽다.
- source_word: γεννῶσι μάχας
  english_pob_choice: they produce quarrels
  chosen_korean: 다툼을 낳을 뿐임을
  alternatives_korean:
  - 싸움을 일으킨다는 것을
  - 분쟁을 만들어 낸다는 것을
  lexicon: BDAG
  rationale: γεννάω의 「낳다」는 비유로 「만들어 냄」을 가리킨다. 「다툼을 낳다」가 비유의 이미지를 자연스럽게 보존한다.
