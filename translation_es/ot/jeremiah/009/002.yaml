revisions:
- from: Tensan su lengua como arco[a] de mentira, y no para la fidelidad se han fortalecido en la tierra; porque de mal en mal van[b], y a mí no me conocen, declara Yahvé.
  to: Tensan su lengua, su arco, para la mentira, y no para la fidelidad se han fortalecido en la tierra; porque de mal en mal van[a], y a mí no me conocen[b], declara Yahvé.
  rationale: Se restauró en el texto principal la aposición elíptica del hebreo («su lengua, su arco») en lugar de resolverla como comparación explícita, siguiendo la evidencia fuente y la revisión inglesa final. Se ajustó «de mentira» a «para la mentira» para reflejar mejor la finalidad moral expresada por שֶׁקֶר en paralelo con «para la fidelidad». Se conservaron las soluciones acertadas «de mal en mal», «no me conocen» y «Yahvé», y se añadió la nota sobre el matiz relacional/covenantal de ידע para mantener el razonamiento teológico documentado.
