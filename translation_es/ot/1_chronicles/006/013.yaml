translation:
  language: es
  text: 'Y los hijos de Samuel: el primogénito[a], Vashni, y Abías.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Vashni. La frase también puede entenderse como «y el segundo»; compárese 1 Samuel 8:2, donde los hijos de Samuel son llamados Joel y Abías.
    reason: textual_variant
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Ahora los hijos de
  - Los hijos de
  lexicon: HALOT
  rationale: Se conserva la función conjuntiva de ו como enlace genealógico con «Y», y בְנֵי en constructo con un nombre אישי se expresa naturalmente como «los hijos de» en español.
- source_word: שְׁמוּאֵל
  english_pob_choice: Samuel
  chosen_spanish: Samuel
  alternatives_spanish:
  - Samuél
  lexicon: HALOT
  rationale: Nombre propio tradicionalmente transliterado; «Samuel» es la forma natural y reconocible en español bíblico.
- source_word: הַבְּכֹר
  english_pob_choice: the firstborn
  chosen_spanish: el primogénito
  alternatives_spanish:
  - el primero
  - su primogénito
  lexicon: HALOT
  rationale: «Primogénito» conserva el valor de orden/rango familiar del sustantivo con artículo, de manera más idiomática que una calca literal en español.
- source_word: וַשְׁנִי
  english_pob_choice: Vashni
  chosen_spanish: Vashni
  alternatives_spanish:
  - y el segundo
  - Vashni (posiblemente “y el segundo”)
  lexicon: HALOT
  rationale: Se mantiene la forma masorética como nombre propio en el texto principal, siguiendo la primacía del hebreo recibido y evitando resolver en silencio la dificultad genealógica.
- source_word: וַאֲבִיָּה
  english_pob_choice: and Abijah
  chosen_spanish: y Abías
  alternatives_spanish:
  - y Abías
  - Abías
  lexicon: HALOT
  rationale: Se traduce el nombre propio con la forma española habitual «Abías», manteniendo la conjunción para reflejar la secuencia genealógica.
theological_decisions:
- issue: Dificultad genealógica y textual sobre los hijos de Samuel
  english_pob_reading: Retain the Masoretic form 'Vashni' in the main text, with a footnote noting the possible sense 'and the second' and the parallel in 1 Samuel 8:2
  chosen_spanish_reading: Mantener «Vashni» en el texto principal, con nota que indique que también puede entenderse «y el segundo» y que compare 1 Samuel 8:2
  alternative_spanish_readings:
  - «el primogénito y el segundo, Abías»
  - armonizar con 1 Samuel 8:2 introduciendo «Joel» como primogénito
  rationale: No es un asunto doctrinal, sino textual/genealógico. La traducción principal sigue la forma hebrea recibida, mientras que la nota preserva la tensión textual y la alternativa semántica sin armonizarla de forma oculta.
  doctrine_reference: 'Principios de traducción POB: primacía del texto fuente, transparencia textual, notas para variantes/dificultades'
translation_notes:
  revision_awareness: El último pase de revisión indicó alta concordancia y ningún cambio necesario; este borrador español sigue esa decisión, conservando la forma masorética en el texto principal y explicando la dificultad en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología predeterminada del proyecto cuando corresponda; este versículo no contiene el nombre divino.
  - «Abías» sigue la forma española usual para el nombre אישי.
  - La nota usa lenguaje transparente sobre la variante textual sin resolverla por armonización.
  - Se preserva la estructura genealógica breve y sobria del hebreo, con puntuación natural en español.
