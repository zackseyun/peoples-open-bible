translation:
  language: es
  text: 'Y había una puerta para el atrio interior, hacia el sur[a], y midió de puerta a puerta, hacia el sur: cien codos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘hacia el sur’ en la primera ocurrencia de la expresión; el hebreo dice literalmente ‘por el camino del sur’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׁעַר
  english_pob_choice: And there was a gate
  chosen_spanish: Y había una puerta
  alternatives_spanish:
  - Y había una entrada
  - Y había una puerta de acceso
  lexicon: HALOT
  rationale: El hebreo es una cláusula nominal; en español, ‘había’ expresa naturalmente la existencia de la puerta. ‘Puerta’ conserva el valor arquitectónico de שַׁעַר en este pasaje.
- source_word: לֶחָצֵר הַפְּנִימִי
  english_pob_choice: to the inner court
  chosen_spanish: para el atrio interior
  alternatives_spanish:
  - al atrio interior
  - del atrio interior
  lexicon: HALOT
  rationale: לְ marca relación o dirección. ‘Atrio interior’ conserva la designación arquitectónica de חָצֵר הַפְּנִימִי, y ‘para’ comunica bien la función de acceso de la puerta.
- source_word: דֶּרֶךְ הַדָּרוֹם
  english_pob_choice: toward the south
  chosen_spanish: hacia el sur
  alternatives_spanish:
  - al sur
  - en dirección al sur
  lexicon: HALOT
  rationale: דֶּרֶךְ expresa dirección; en español, ‘hacia el sur’ reproduce con naturalidad ese matiz direccional sin volverlo demasiado idiomático ni perder la orientación.
- source_word: וַיָּמָד
  english_pob_choice: and he measured
  chosen_spanish: y midió
  alternatives_spanish:
  - y él midió
  - entonces midió
  lexicon: HALOT
  rationale: El waw consecutivo avanza la escena, pero en español el sujeto implícito funciona con fluidez. ‘Midió’ conserva la acción técnica de medir dentro de la visión.
- source_word: מִשַּׁעַר אֶל הַשַּׁעַר
  english_pob_choice: from gate to gate
  chosen_spanish: de puerta a puerta
  alternatives_spanish:
  - desde la puerta hasta la puerta
  - de una puerta a la otra
  lexicon: HALOT
  rationale: La construcción indica la distancia entre dos accesos correspondientes. ‘De puerta a puerta’ es la forma más natural en español y conserva la relación medida-entre-dos.
- source_word: מֵאָה אַמּוֹת
  english_pob_choice: one hundred cubits
  chosen_spanish: cien codos
  alternatives_spanish:
  - ciento de codos
  - cien medidas de codo
  lexicon: HALOT
  rationale: ‘Codos’ preserva la unidad antigua sin convertirla. ‘Cien’ es la forma normal y clara en español para el número cardinal en este contexto.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail, que afinó la relación espacial de דֶּרֶךְ הַדָּרוֹם hacia una lectura direccional uniforme. El español conserva ese valor con ‘hacia el sur’ en ambas apariciones, manteniendo la medida entre las dos puertas y la orientación arquitectónica del pasaje.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ como convención del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usó ‘atrio interior’ para חָצֵר הַפְּנִימִי siguiendo el sentido arquitectónico estándar del contexto de Ezequiel 40.
  - Se evitó ‘SEÑOR’ o glosas litúrgicas, ya que no hay aquí sustitución del nombre divino ni necesidad doctrinal.
  - Se preservó la unidad ‘codos’ para no perder transparencia respecto del hebreo אַמּוֹת.
