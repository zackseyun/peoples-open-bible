translation:
  language: es
  text: 'Entonces dije[b][a]: «Esta es mi aflicción: los años de la diestra del Altísimo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Esta es mi debilidad», o «Esta es mi enfermedad». El hebreo es difícil y puede denotar aflicción, debilidad o enfermedad.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el cambio de la diestra del Altísimo». Algunos entienden aquí que la diestra del Altísimo ha cambiado, en vez de «los años de» su diestra.'
    reason: alternative_reading
lexical_decisions:
- source_word: וָאֹמַר
  english_pob_choice: Then I said
  chosen_spanish: Entonces dije
  alternatives_spanish:
  - Y dije
  - Así que dije
  lexicon: HALOT
  rationale: La forma narrativa introduce una declaración consecutiva; «Entonces» conserva el giro discursivo sin sonar forzado en español.
- source_word: חַלּוֹתִי
  english_pob_choice: my grief
  chosen_spanish: mi aflicción
  alternatives_spanish:
  - mi enfermedad
  - mi debilidad
  - mi dolor
  lexicon: HALOT
  rationale: El hebreo es difícil y puede indicar aflicción, debilidad o enfermedad. «Aflicción» funciona bien en el contexto del lamento y mantiene abierta la ambigüedad léxica sin cerrar indebidamente el sentido.
- source_word: הִיא
  english_pob_choice: This is
  chosen_spanish: Esta es
  alternatives_spanish:
  - Es esto
  - Esto es
  lexicon: HALOT
  rationale: El pronombre deíctico se expresa de modo natural con «Esta es», preservando la identificación directa del hablante con lo dicho.
- source_word: שְׁנוֹת
  english_pob_choice: the years of
  chosen_spanish: los años de
  alternatives_spanish:
  - los cambios de
  - las sucesiones de
  lexicon: HALOT
  rationale: El sustantivo se entiende de manera más natural como «años». Aunque algunos proponen el matiz de «cambios», el sentido básico de זמן/שנה debe mantenerse en el texto principal.
- source_word: יְמִין
  english_pob_choice: the right hand of
  chosen_spanish: la diestra de
  alternatives_spanish:
  - la mano derecha de
  - el lado derecho de
  lexicon: HALOT
  rationale: «Diestra» conserva el valor idiomático y poético de la mano derecha como imagen de poder y acción eficaz, sin perder claridad en español.
- source_word: עֶלְיוֹן
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Exaltado
  - el Supremo
  lexicon: HALOT
  rationale: Es el título divino habitual en español bíblico y reproduce bien el hebreo como designación reverente de Dios.
theological_decisions:
- issue: Interpretación de la cláusula difícil חַלּוֹתִי הִיא
  english_pob_reading: This is my grief / my weakness / my sickness
  chosen_spanish_reading: Esta es mi aflicción
  alternative_spanish_readings:
  - Esta es mi debilidad
  - Esta es mi enfermedad
  rationale: La frase es notoriamente ambigua. «Aflicción» comunica de forma amplia el sufrimiento del salmista sin resolver indebidamente si el matiz es dolor, debilidad o enfermedad.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Lectura alternativa de שְׁנוֹת יְמִין עֶלְיוֹן
  english_pob_reading: the years of the right hand of the Most High / the change of the right hand of the Most High
  chosen_spanish_reading: los años de la diestra del Altísimo
  alternative_spanish_readings:
  - el cambio de la diestra del Altísimo
  rationale: El texto principal sigue la lectura más directa del hebreo y del audit trail inglés. La lectura alternativa se preserva como posibilidad real sin incorporarla al cuerpo principal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se revisó la correspondencia entre el hebreo y el audit trail inglés, manteniendo la ambigüedad léxica de חַלּוֹתִי y la alternativa sintáctica de שְׁנוֹת יְמִין עֶלְיוֹן sin sobreinterpretarlas. No hubo revisiones previas aplicadas.
  spanish_consistency_notes:
  - Se usó «Altísimo» para עֶלְיוֹן, conforme al título divino estándar.
  - Se prefirió «diestra» para mantener la imagen poética de la mano derecha y su fuerza simbólica.
  - Se evitó «SEÑOR» como sustituto de Yahvé porque este verso usa el título «Altísimo», no el tetragrámaton.
