review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: la sujeción del pectoral a los anillos del efod mediante un cordón azul, con el propósito de mantenerlo en su lugar y evitar que se desprenda, y conserva correctamente «Yahvé». Sin embargo, la nota [a] no preserva una alternativa real, porque repite exactamente el texto principal en vez de reflejar la alternativa documentada entre «cordón azul» y «cordón de azul».'
  spanish_quality_summary: El español es claro, natural y digno. «Pectoral», «efod» y «Yahvé» están bien escogidos. «Sujetaron» y «no se desprendiera» son lecturas idiomáticas adecuadas. «Banda tejida» es comprensible, aunque algo menos específica que «banda hábilmente tejida» o «banda decorada/tejida». La reparación necesaria es menor y se limita principalmente a la coherencia de la nota textual.
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: יְהוָה → «Yahvé», הַחֹשֶׁן → «pectoral», הָאֵפֹד → «efod». No hay conflictos doctrinales. La única desalineación significativa con el rastro POB está en la nota [a], que debería reflejar una alternativa léxica real del inglés auditado.'
  issues:
  - severity: medium
    issue: La nota [a] repite exactamente «con un cordón azul» en lugar de ofrecer una alternativa real.
    rationale: El English POB documenta una alternativa léxica para בִּפְתִיל תְּכֵלֶת. En español, la nota actual no añade información y no preserva el propósito de la nota auditada.
  - severity: low
    issue: La nota [b] usa «O:» aunque no ofrece una alternativa distinta al texto principal en su primera frase.
    rationale: 'Tal como está redactada, «O: «la banda tejida del efod»» repite el texto principal. Conviene convertirla en nota explicativa o bien ofrecer una variante española genuina, como «la banda hábilmente tejida del efod».'
  revised_spanish_text: Sujetaron el pectoral por sus anillos a los anillos del efod con un cordón azul[a], para que estuviera sobre la banda tejida del efod, y para que el pectoral no se desprendiera del efod[b], tal como Yahvé había mandado a Moisés.
  revised_footnotes:
  - marker: a
    text: 'O: «con un cordón de azul».'
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse «la banda hábilmente tejida del efod»; el término hebreo se refiere a la banda decorada unida al efod.
    reason: lexical_alternative
  revision_rationale: El texto principal puede mantenerse. Se corrigen las notas para que preserven alternativas léxicas reales y no repitan sin cambio la redacción principal.
