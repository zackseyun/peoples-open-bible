  yaml_path: translation/deuterocanon/1_maccabees/013/014.yaml
  text: And Tryphon learned that Simon had arisen in place of Jonathan his brother[a], and that he was about to engage in war against him; and he sent envoys to him, saying[b],
  footnotes:
  - marker: a
    text: Or 'had taken Jonathan's place' / 'had risen up instead of Jonathan.' The Greek ἀνέστη with ἀντί can denote emergence as a successor, not merely physical rising.
    reason: lexical_alternative
  - marker: b
    text: Or 'to join battle with him' or 'to make war against him.' The Greek expression συνάπτειν αὐτῷ εἰς πόλεμον is an idiom for entering into armed conflict.
    reason: lexical_alternative
