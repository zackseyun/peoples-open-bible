  from: Yet I will make instruction shine like the dawn, and I will make these things clear far into the distance.
  to: I will again make instruction shine like the dawn, and I will make these things clear far into the distance.
  rationale: 'The Greek adverb ἔτι in this context denotes continuation or repetition (''further'', ''again''). Starting the English sentence with ''Yet'' strongly implies a contrast (''However'') to the modern reader, which disrupts the flow of Wisdom''s escalating self-disclosure. Translating it as ''I will again'' or ''Again, I will'' resolves this ambiguity. The rest of the Cartha draft is excellent: ''make instruction shine'' handles the causative force of φωτιῶ well, ''these things'' faithfully reflects the neuter plural αὐτά (resisting the urge to smooth it to ''it'' as NRSV does), and ''far into the distance'' perfectly captures the spatial extent of ἕως εἰς μακράν.'
