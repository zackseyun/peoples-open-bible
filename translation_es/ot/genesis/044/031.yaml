review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido del hebreo: conector resultativo, cláusula temporal, ausencia del muchacho, muerte del padre, y el modismo de hacer descender la canicie a Seol. También preserva correctamente ''Seol'' con nota alternativa. Sin embargo, hay un pequeño ajuste de naturalidad y fidelidad idiomática en español: la colocación ''con dolor a Seol'' suena menos natural que ''a Seol en dolor'' o mejor ''a Seol con dolor/profundo dolor''; además, conviene mantener la imagen concreta sin una coma innecesaria que fracture la aposición.'
  spanish_quality_summary: El texto es claro y digno, pero puede mejorarse ligeramente para sonar más natural en español bíblico contemporáneo. 'Harán bajar la canicie' es aceptable, pero 'harán descender' encaja mejor con el registro y el modismo. 'Con dolor a Seol' necesita reordenamiento para evitar aspereza. La puntuación puede simplificarse.
  glossary_alignment: 'Buena alineación general con las decisiones del proyecto: ''Seol'' preservado, ''siervos'' adecuado para עֲבָדֶיךָ en habla cortesana, ''muchacho'' razonable para הַנַּעַר. No hay conflicto con terminología doctrinal principal.'
  issues:
  - severity: medium
    issue: Orden poco natural de 'con dolor a Seol'
    rationale: 'Aunque semánticamente comprensible, en español suena más natural vincular el complemento locativo directamente con ''harán descender'' y dejar ''con dolor'' o ''en dolor'' como circunstancia final: ''harán descender ... a Seol con dolor''.'
  - severity: low
    issue: '''Harán bajar'' es correcto pero menos idiomático que ''harán descender'' en este registro'
    rationale: Ambas opciones son fieles al hifil de ירד, pero 'harán descender' conserva mejor el tono elevado del pasaje y evita una sensación ligeramente coloquial.
  - severity: low
    issue: Coma en 'tu siervo, nuestro padre' puede ser prescindible
    rationale: La aposición se entiende sin coma y fluye mejor en una línea ya cargada de complementos.
  revised_spanish_text: Entonces[a], cuando vea que el muchacho no está, morirá, y tus siervos harán descender la canicie de tu siervo nuestro padre a Seol con dolor.
  revised_footnotes:
  - marker: a
    text: 'O "al sepulcro" o "al reino de los muertos". Hebreo: "Seol".'
    reason: lexical_alternative
  revision_rationale: Se aplican ajustes menores de estilo y orden sintáctico para un español más natural y digno, sin cambiar el sentido fuente ni las decisiones léxicas principales. Se mantiene 'Seol' con la nota correspondiente, así como la imagen concreta de la canicie y el tono deferente de 'tus siervos'.
