id: PHP.2.12
reference: Philippians 2:12
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ὥστε, ἀγαπητοί μου, καθὼς πάντοτε ὑπηκούσατε, μὴ ὡς ἐν τῇ παρουσίᾳ μου μόνον ἀλλὰ νῦν πολλῷ μᾶλλον ἐν τῇ ἀπουσίᾳ μου, μετὰ φόβου καὶ τρόμου τὴν ἑαυτῶν σωτηρίαν κατεργάζεσθε,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/002/012.yaml
  text: 'So then, my beloved, just as you have always obeyed—not only in my presence, but now much more in my absence—work out your own salvation with fear and trembling,'
translation:
  language: ko
  text: 그러므로 나의 사랑하는 이들이여, 여러분이 언제나 순종해 왔듯이—내가 함께 있을 때뿐 아니라 내가 없는 지금은 더욱더—두려움과 떨림으로[a] 여러분 자신의 구원을 이루어 가십시오[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「두려움과 떨림」은 하나님 앞에서의 경외와 진지한 겸손을 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 「이루어 가다」는 구원을 「벌어들이는 것」이 아니라 이미 받은 구원을 삶에서 끝까지 이끌어 가는 것을 뜻한다.
    reason: alternative_reading
lexical_decisions:
- source_word: Ὥστε
  english_pob_choice: So then
  chosen_korean: 그러므로
  alternatives_korean:
  - 그렇기 때문에
  - 그러니
  lexicon: BDAG
  rationale: 메시아 찬가와 권면에서 이어지는 추론적 전환을 표시한다. 「그러므로」가 합쇼체에 자연스럽다.
- source_word: ἀγαπητοί μου
  english_pob_choice: my beloved
  chosen_korean: 나의 사랑하는 이들이여
  alternatives_korean:
  - 사랑하는 자들이여
  - 나의 사랑하는 형제자매들이여
  lexicon: BDAG
  rationale: 따뜻한 호격. 「나의 사랑하는 이들이여」가 바울의 목회적 어조를 자연스럽게 살린다.
- source_word: καθὼς πάντοτε ὑπηκούσατε
  english_pob_choice: just as you have always obeyed
  chosen_korean: 언제나 순종해 왔듯이
  alternatives_korean:
  - 늘 순종한 것처럼
  - 항상 순종해 온 그대로
  lexicon: BDAG
  rationale: 부정과거가 정착된 순종 패턴을 요약한다. 한국어 현재완료적 표현 「~해 왔듯이」가 그 의미를 자연스럽게 담는다.
- source_word: μὴ ὡς ... μόνον ἀλλὰ
  english_pob_choice: not only ... but
  chosen_korean: ~뿐 아니라 ~
  alternatives_korean:
  - 단지 ~만이 아니라
  lexicon: BDAG
  rationale: 한국어 대조 구문 「~뿐 아니라」가 자연스럽다.
- source_word: παρουσίᾳ / ἀπουσίᾳ
  english_pob_choice: presence / absence
  chosen_korean: 함께 있을 때 / 없는
  alternatives_korean:
  - 임재 / 부재
  - 있음 / 없음
  lexicon: BDAG
  rationale: 한국어로 자연스러운 동사적 표현으로 옮기되, 두 어휘의 대조를 분명히 보존한다.
- source_word: πολλῷ μᾶλλον
  english_pob_choice: much more
  chosen_korean: 더욱더
  alternatives_korean:
  - 한층 더
  - 훨씬 더
  lexicon: BDAG
  rationale: 표준적 비교 강조 표현. 「더욱더」가 한국어로 자연스럽고 직접적이다.
- source_word: μετὰ φόβου καὶ τρόμου
  english_pob_choice: with fear and trembling
  chosen_korean: 두려움과 떨림으로
  alternatives_korean:
  - 경외와 떨림으로
  - 외경과 떨림으로
  lexicon: BDAG
  rationale: 정착된 표현. 하나님 앞에서의 진지한 겸손을 살리기 위해 직역을 유지한다. 「두려움」을 「경외」로 약화시키지 않는다.
- source_word: τὴν ἑαυτῶν σωτηρίαν
  english_pob_choice: your own salvation
  chosen_korean: 여러분 자신의 구원
  alternatives_korean:
  - 여러분의 구원
  - 자기 자신의 구원
  lexicon: BDAG
  rationale: σωτηρία의 신학적 무게를 「구원」으로 보존하고, ἑαυτῶν의 강조를 「자신의」로 살린다.
- source_word: κατεργάζεσθε
  english_pob_choice: work out
  chosen_korean: 이루어 가다
  alternatives_korean:
  - 완수하다
  - 끝까지 이루다
  - 산출하다
  lexicon: BDAG
  rationale: 「이루어 가다」가 「벌어들이다」와의 구분을 자연스럽게 보존하면서, 행위에 끝까지 이끌어 표현해 내는 의미를 담는다.
theological_decisions:
- issue: '「자신의 구원을 이루어 가라」의 의미'
  chosen_reading: 이미 시야에 있는 구원을 삶에 끝까지 표현해 내라는 권면이지, 인간 노력으로 구원을 벌어들이라는 명령이 아니다
  alternative_readings:
  - 인간 노력만으로 구원을 성취하라는 명령
  rationale: κατεργάζεσθε는 어떤 것을 효력 있게 이루어 내는 것을 가리키며, 다음 절(13절)에서 하나님께서 친히 그들 안에서 일하심으로 이어진다. 번역은 본문의 표현을 보존하고 종파적 교리 해소를 피한다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
