translation:
  language: es
  text: Y Baruc hijo de Nerías hizo conforme a todo lo que le había mandado Jeremías el profeta, leyendo del rollo las palabras de Yahvé en la casa de Yahvé.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - actuó
  - cumplió
  lexicon: HALOT
  rationale: עשה aquí expresa la ejecución obediente de una orden previa. En español, «hizo» mantiene la simpleza e idiomaticidad del cumplimiento, sin añadir énfasis interpretativo.
- source_word: בָּרוּךְ בֶּן נֵרִיָּה
  english_pob_choice: Baruch son of Neriah
  chosen_spanish: Baruc hijo de Nerías
  alternatives_spanish:
  - Baruc, hijo de Nerías
  lexicon: HALOT
  rationale: Se translitera el nombre propio con la forma española común «Baruc» y se vierte el patronímico con «hijo de», conservando el constructo hebreo de manera natural en español.
- source_word: כְּכֹל אֲשֶׁר
  english_pob_choice: according to all that
  chosen_spanish: conforme a todo lo que
  alternatives_spanish:
  - según todo lo que
  - de acuerdo con todo lo que
  lexicon: HALOT
  rationale: La expresión hebrea enfatiza conformidad completa. «Conforme a todo lo que» preserva esa amplitud mejor que una simplificación como «según».
- source_word: צִוָּהוּ
  english_pob_choice: had commanded him
  chosen_spanish: le había mandado
  alternatives_spanish:
  - le había ordenado
  - le había comandado
  lexicon: HALOT
  rationale: צוה se vierte con «mandar/ordenar». «Le había mandado» expresa bien la anterioridad lógica de la orden de Jeremías respecto de la acción de Baruc.
- source_word: יִרְמְיָהוּ הַנָּבִיא
  english_pob_choice: Jeremiah the prophet
  chosen_spanish: Jeremías el profeta
  alternatives_spanish:
  - el profeta Jeremías
  lexicon: HALOT
  rationale: Se conserva la aposición directa del hebreo con el orden más cercano al texto base, sin alterar el registro.
- source_word: לִקְרֹא
  english_pob_choice: reading
  chosen_spanish: leyendo
  alternatives_spanish:
  - para leer
  - al leer
  lexicon: HALOT
  rationale: 'El infinitivo constructo funciona aquí como acción concomitante/explicativa del mandato: Baruc cumplió la orden leyendo. «Leyendo» reproduce la función verbal sin volverla demasiado final o mecánica.'
- source_word: בַסֵּפֶר
  english_pob_choice: from the scroll
  chosen_spanish: en el rollo
  alternatives_spanish:
  - del rollo
  - desde el rollo
  lexicon: HALOT
  rationale: סֵפֶר puede ser libro, documento o rollo; en este contexto profético-histórico, «rollo» es más preciso. Se mantiene la preposición local del hebreo con «en», evitando imponer una lectura interpretativa distinta.
- source_word: דִּבְרֵי יְהוָה
  english_pob_choice: the words of Yahweh
  chosen_spanish: las palabras de Yahvé
  alternatives_spanish:
  - las palabras de Yahveh
  - las palabras del Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» según la terminología del proyecto, y דִּבְרֵי se vierte literalmente como «las palabras», manteniendo el valor de contenido revelado.
- source_word: בֵּית יְהוָה
  english_pob_choice: in the house of Yahweh
  chosen_spanish: en la casa de Yahvé
  alternatives_spanish:
  - en el templo de Yahvé
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «casa de Yahvé». Se prefiere «casa» para respetar la formulación del original, aunque el referente sea el templo.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton dos veces. Conforme a la norma del proyecto, se traduce directamente como «Yahvé» y no se oculta tras una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La redacción sigue el sentido del hebreo y el audit trail inglés, incluyendo el valor de לִקְרֹא como gerundio/acción concomitante («leyendo») en vez de un infinitivo final («para leer»), y mantiene «casa de Yahvé» en lugar de «templo» para preservar la expresión hebrea.
  spanish_consistency_notes:
  - Se unificó la transliteración del nombre propio como «Baruc» y del patronímico como «Nerías».
  - Se mantuvo el paralelismo entre las dos ocurrencias de יְהוָה con la misma forma «Yahvé».
  - «Rollo» se usa consistentemente para סֵפֶר en este contexto narrativo-propético.
  - No se añadieron notas de pie porque no hay variantes textuales ni alternativas obligatorias que deban marcarse en el verso.
