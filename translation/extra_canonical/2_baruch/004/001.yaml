  verse: 1
translation:
  text: |-
    1 And the Lord said to me, “This city will be delivered up for a time, and the people will be led away into captivity, but the world will not be forgotten.
    
    2 Or do you think that this is the city of which I said, 'On my hands I have engraved you'?
    
    3 For it is not that which is by the hands of men; it is that which will be revealed, which was prepared beforehand from the time I resolved to make Paradise, and I showed it to Adam before he sinned.
    
    4 But when he transgressed the commandment, it was taken away from him, just as Paradise also was.
    
    5 And after these things I showed it to my servant Abraham by night, between the pieces of the sacrifice.
    
    6 And again I also showed it to Moses on Mount Sinai, when I showed him the pattern of the tabernacle and all its vessels.”
