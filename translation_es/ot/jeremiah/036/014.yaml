revisions:
- from: 'Entonces todos los oficiales enviaron a Jehudí[a], hijo de Netanías, hijo de Sélamías, hijo de Cusí, a Baruc, diciendo: «Toma en tu mano el rollo del que leíste en oídos del pueblo, y ven». Y Baruc, hijo de Nerías, tomó el rollo en su mano y vino a ellos.'
  to: 'Entonces todos los oficiales enviaron a Jehudí, hijo de Netanías, hijo de Sélamías, hijo de Cusí, a Baruc, diciendo: «Toma en tu mano el rollo del que leíste a oídos del pueblo, y ven[a]». Y Baruc, hijo de Nerías, tomó el rollo en su mano y vino a ellos.'
  rationale: Se corrige una expresión española poco idiomática («en oídos del pueblo» → «a oídos del pueblo») para preservar mejor el sentido auditivo del hebreo y la legibilidad. También se recoloca el marcador de nota al verbo «ven», que es el elemento al que realmente se refiere la nota lexical.
