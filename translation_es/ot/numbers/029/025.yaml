review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: un macho cabrío como ofrenda por el pecado, añadido al holocausto regular/continuo con su ofrenda de grano y su libación. Sin embargo, dos elecciones españolas rebajan la naturalidad y una nota al pie está mal anclada: ''macho de las cabras, uno'' es demasiado calcado para שׂעיר עזים אחד, y la nota sobre ''holocausto continuo'' aparece unida a ''ofrenda por el pecado'' en vez de a la frase relevante.'
  spanish_quality_summary: El texto es comprensible, pero suena algo forzado por el orden 'un macho de las cabras, uno'. 'Un macho cabrío' o 'un macho cabrío, como ofrenda por el pecado' es más natural y sigue siendo fiel. 'Holocausto continuo' es aceptable, aunque 'holocausto regular' también sería posible; no requiere cambio. 'Ofrenda vegetal' y 'libación' son legibles y dignas en contexto cultual.
  glossary_alignment: 'No hay conflicto con la terminología de proyecto. No aparece Yahvé ni Mesías/Cristo. Las decisiones cultuales están mayormente alineadas: חטאת = ''ofrenda por el pecado'', מנחה = ''ofrenda vegetal/de cereal'', נסך = ''libación''. La principal corrección es estilística y de anclaje de nota, no teológica.'
  issues:
  - severity: medium
    issue: Calco poco natural en 'un macho de las cabras, uno'
    rationale: Aunque intenta reflejar de cerca שׂעיר עזים אחד, en español resulta torpe. 'un macho cabrío' incorpora naturalmente la idea de macho caprino y el numeral ya queda expresado por 'un'.
  - severity: medium
    issue: Nota al pie mal ubicada
    rationale: La nota [a] explica una alternativa para עֹלַת הַתָּמִיד ('holocausto continuo/continuo'), pero en el borrador está colocada tras 'ofrenda por el pecado', lo cual induce a error y no cumple la disciplina de anclaje.
  - severity: low
    issue: Valor del numeral duplicado de forma innecesaria
    rationale: El hebreo incluye אֶחָד, pero en español el artículo indefinido ya expresa de modo natural 'uno' en esta lista sacrificial. Repetir 'uno' no aporta claridad y afecta la fluidez.
  revised_spanish_text: y un macho cabrío como ofrenda por el pecado, además del holocausto continuo[a], su ofrenda vegetal y su libación.
  revised_footnotes:
  - marker: a
    text: O "el holocausto continuo".
    reason: lexical_alternative
  revision_rationale: Se reemplaza el calco rígido por una formulación española natural y fiel ('un macho cabrío'), se elimina la duplicación innecesaria del numeral, y se mueve la nota al lugar correcto para que explique la alternativa de עֹלַת הַתָּמִיד. No se requieren cambios doctrinales ni de terminología mayor.
