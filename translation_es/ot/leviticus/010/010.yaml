translation:
  language: es
  text: para distinguir entre lo santo y lo común[a], y entre lo impuro y lo limpio[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo profano». El contraste hebreo es entre lo que está apartado como santo y lo que no es santo; «lo común» se usa aquí para no sugerir irreverencia activa.
    reason: lexical_alternative
  - marker: b
    text: Es decir, entre lo ritualmente impuro y lo ritualmente limpio.
    reason: cultural_note
lexical_decisions:
- source_word: וּלֲהַבְדִּיל
  english_pob_choice: to distinguish
  chosen_spanish: distinguir
  alternatives_spanish:
  - separar
  - hacer distinción
  lexicon: HALOT
  rationale: El infinitivo constructo expresa la capacidad o finalidad de discernir categorías cultuales. «Distinguir» es natural en español moderno y conserva la función de juicio/discernimiento mejor que un calco espacial como «separar».
- source_word: בֵּין
  english_pob_choice: between
  chosen_spanish: entre
  alternatives_spanish:
  - en medio de
  lexicon: HALOT
  rationale: La preposición marca contraste entre pares de categorías. «Entre» es la equivalencia directa y idiomática en esta construcción repetida.
- source_word: הַקֹּדֶשׁ
  english_pob_choice: the holy
  chosen_spanish: lo santo
  alternatives_spanish:
  - lo sagrado
  - la cosa santa
  lexicon: HALOT
  rationale: El sustantivo funciona como categoría de lo consagrado. «Lo santo» preserva el valor categorial sin obligar a concretar un objeto específico; mantiene la oposición cultual con lo común.
- source_word: הַחֹל
  english_pob_choice: the common
  chosen_spanish: lo común
  alternatives_spanish:
  - lo profano
  - lo ordinario
  lexicon: HALOT
  rationale: En lenguaje sacerdotal, el contraste es con lo no santo, no necesariamente con lo irreverente. «Lo común» reproduce bien esa categoría y evita que «profano» sugiera blasfemia o desprecio activo.
- source_word: הַטָּמֵא
  english_pob_choice: the unclean
  chosen_spanish: lo impuro
  alternatives_spanish:
  - lo inmundo
  - lo contaminado
  lexicon: HALOT
  rationale: En contextos levíticos, la noción es de impureza ritual. «Impuro» es claro y natural en español para esta categoría; se evita cargarlo de juicio moral. Aunque el inglés usa «unclean», en español «impuro» comunica mejor la categoría ritual.
- source_word: הַטָּהוֹר
  english_pob_choice: the clean
  chosen_spanish: lo limpio
  alternatives_spanish:
  - lo puro
  lexicon: HALOT
  rationale: Pareado con «impuro», «limpio» es el correlato más idiomático en español para pureza ritual. «Puro» puede sonar más moral o abstracto; «limpio» mantiene la simetría con la categoría levítica.
theological_decisions:
- issue: Contraste sacerdotal entre קֹדֶשׁ y חֹל
  english_pob_reading: the holy and the common
  chosen_spanish_reading: lo santo y lo común
  alternative_spanish_readings:
  - lo santo y lo profano
  - lo sagrado y lo secular
  rationale: El texto trata de discernimiento sacerdotal entre categorías cultuales. «Lo común» preserva la categoría de lo no santo sin introducir el matiz más fuerte de irreverencia que «profano» puede tener en español actual. «Secular» sería anacrónico.
  doctrine_reference: Translation philosophy §1, §6
- issue: Naturaleza de טָמֵא / טָהוֹר
  english_pob_reading: unclean / clean as ritual categories
  chosen_spanish_reading: impuro / limpio como categorías rituales
  alternative_spanish_readings:
  - inmundo / puro
  - contaminado / limpio
  rationale: En Levítico estos términos designan estado ritual, no necesariamente culpa moral. «Impuro / limpio» conserva esa lógica cultual en un español claro y no moralizante.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Coincide con el estado de alta concordancia del registro inglés; no se documentan revisiones aplicadas en el pase más reciente.
  spanish_consistency_notes:
  - Se mantuvo la distinción cultual entre «lo santo» y «lo común», siguiendo la decisión inglesa de evitar «profano» como término principal.
  - Se tradujeron las categorías de pureza ritual con «impuro / limpio» para conservar el valor levítico y la naturalidad del español.
  - La frase principal conserva la estructura repetida de contrastes entre pares, reflejando con precisión el hebreo.
