translation:
  language: es
  text: ¿De quién se burlan?[a] ¿Contra quién abren la boca de par en par y sacan la lengua?[b] ¿No son ustedes hijos de transgresión, descendencia de engaño?[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Más literalmente: «¿Sobre quién se deleitan?» o «¿de quién hacen mofa?». En este contexto, el hebreo probablemente comunica burla o regodeo desafiante.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «hacen larga la lengua»; es decir, «sacan la lengua» como gesto de burla.'
    reason: lexical_alternative
  - marker: c
    text: El hebreo «hijos de transgresión, descendencia de engaño» usa lenguaje familiar de manera metafórica para describir a personas caracterizadas por la rebelión y el engaño, no descendencia biológica.
    reason: cultural_note
lexical_decisions:
- source_word: תִּתְעַנָּגוּ
  english_pob_choice: At whom do you sport yourselves?
  chosen_spanish: ¿A quién se burlan?
  alternatives_spanish:
  - ¿A quién se complacen?
  - ¿De quién se mofan?
  - ¿A quién se regodean?
  lexicon: HALOT
  rationale: El hitpael de ענג aquí, según el contexto de burla y gesto insolente, expresa una actitud de mofa o regodeo desafiante. En español, «se burlan» comunica bien la ironía hostil sin perder el tono de provocación que el audit trail inglés preserva con «sport yourselves».
- source_word: תַּרְחִיבוּ פֶה
  english_pob_choice: do you open your mouth wide
  chosen_spanish: abren mucho la boca
  alternatives_spanish:
  - abren la boca de par en par
  - ensanchar la boca
  - abren ampliamente la boca
  lexicon: HALOT
  rationale: La imagen hebrea de «ensanchar la boca» describe una mueca o gesto insolente. En español, «abren mucho la boca» mantiene la fuerza idiomática y suena natural, sin perder el matiz visual de desafío.
- source_word: תַּאֲרִיכוּ לָשׁוֹן
  english_pob_choice: stick out your tongue
  chosen_spanish: sacan la lengua
  alternatives_spanish:
  - sacan hacia afuera la lengua
  - alargan la lengua
  - extienden la lengua
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hacer larga la lengua», un gesto burlón. «Sacan la lengua» es la equivalencia idiomática natural en español y conserva el valor de burla pública que el inglés POB explica con su nota.
- source_word: הֲלוֹא
  english_pob_choice: Are you not
  chosen_spanish: ¿No son ustedes
  alternatives_spanish:
  - ¿Acaso no son ustedes
  - ¿No son
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera asentimiento. «¿No son ustedes…?» reproduce bien el golpe acusatorio y el tono retórico del hebreo.
- source_word: יִלְדֵי פֶשַׁע
  english_pob_choice: children of transgression
  chosen_spanish: hijos de la rebelión
  alternatives_spanish:
  - hijos de transgresión
  - hijos de pecado
  - descendientes de rebelión
  lexicon: HALOT
  rationale: La expresión no describe filiación biológica sino carácter e identidad moral. «Hijos de la rebelión» conserva la metáfora familiar y hace explícita la fuerza activa de פשע; «transgresión» sería más literal, pero en español puede sonar más abstracto y menos incisivo en este contexto profético.
- source_word: זֶרַע שָׁקֶר
  english_pob_choice: offspring of deceit
  chosen_spanish: descendencia de mentira
  alternatives_spanish:
  - simiente de mentira
  - descendencia de engaño
  - offspring de engaño
  lexicon: HALOT
  rationale: זרע mantiene la metáfora de linaje o descendencia; en español, «descendencia» comunica ese campo semántico de modo claro y digno. שקר puede ser «mentira», «engaño» o «falsedad»; aquí «mentira» es directo, contundente y encaja con la denuncia profética.
theological_decisions:
- issue: Lenguaje de filiación moral en la acusación profética
  english_pob_reading: The verse describes the people's character metaphorically as deriving from transgression and deceit, not making a biological or metaphysical claim.
  chosen_spanish_reading: El versículo describe su carácter e identidad moral con lenguaje metafórico de filiación, no una afirmación biológica o metafísica.
  alternative_spanish_readings:
  - El versículo podría leerse como una acusación de descendencia literal, pero eso iría más allá del hebreo.
  - La expresión puede sonar a determinismo, aunque su función es retratar una conducta y pertenencia moral.
  rationale: La metáfora hebrea de «hijos de…» y «descendencia de…» es un recurso profético para caracterizar a la gente por su conducta y lealtad. La traducción debe mantener esa tensión sin convertirla en una tesis sobre genealogía física o esencia determinista.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: El audit trail inglés revisó la apertura desde una paráfrasis de «mocking» hacia «sport yourselves» para acercarse más a תִּתְעַנָּגוּ. La versión española sigue esa decisión al evitar un término meramente abstracto y optar por una expresión de burla/gloating contextual. También conserva la doble metáfora de filiación y el gesto corporal de la lengua, tal como las notas inglesas lo explicitan.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantiene «hijos/descendencia» para conservar el paralelismo metafórico y la tensión teológica.
  - «Mentira» traduce שקר en un registro directo y profético; no se sustituye por «falsedad» para no suavizar el tono.
  - El orden de las cláusulas sigue de cerca el hebreo para preservar el ritmo acusatorio del versículo.
