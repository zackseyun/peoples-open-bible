translation:
  language: es
  text: y que el tirano[a] fuera castigado y la patria[b] fuera limpiada[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Tirano» traduce el tono opresivo de τύραννος; no suaviza el juicio político y moral implícito en el término.
    reason: lexical_alternative
  - marker: b
    text: «Patria» refleja el valor de πατρίς como tierra o nación propia; evita un término más genérico que perdería el matiz ancestral y comunitario.
    reason: lexical_alternative
  - marker: c
    text: «Fuera limpiada» traduce καθαρισθῆναι con un sentido amplio de limpieza o purificación, que puede incluir dimensiones rituales, morales y comunitarias.
    reason: theological_clarification
lexical_decisions:
- source_word: τύραννον
  english_pob_choice: the tyrant
  chosen_spanish: el tirano
  alternatives_spanish:
  - el déspota
  - el rey
  lexicon: LSJ
  rationale: τύραννος designa aquí al gobernante opresor que persigue a los fieles; 'tirano' conserva esa fuerza moral y política en español mejor que opciones más suaves o ambiguas.
- source_word: τιμωρηθῆναι
  english_pob_choice: should be punished
  chosen_spanish: fuera castigado
  alternatives_spanish:
  - ser castigado
  - fuera vengado
  lexicon: BDAG/LSJ
  rationale: El infinitivo aoristo pasivo expresa el contenido de lo esperado o logrado en el contexto. 'Fuera castigado' comunica bien el pasivo en español y mantiene la idea de sanción sin introducir una lectura de venganza más fuerte que la del texto.
- source_word: πατρίδα
  english_pob_choice: the homeland
  chosen_spanish: la patria
  alternatives_spanish:
  - la tierra natal
  - el país
  - la patria ancestral
  lexicon: LSJ
  rationale: πατρίς apunta a la tierra ancestral o nación propia. 'Patria' es el equivalente natural y digno en español, y conserva el matiz comunitario y afectivo de pertenencia.
- source_word: καθαρισθῆναι
  english_pob_choice: cleansed
  chosen_spanish: purificada
  alternatives_spanish:
  - limpiada
  - depurada
  lexicon: BDAG/LSJ
  rationale: καθαρισθῆναι expresa limpieza/purificación en voz pasiva. 'Purificada' preserva mejor en español el alcance ritual, moral y comunitario que 'limpiada'.
- source_word: καὶ ... καὶ
  english_pob_choice: and ... and
  chosen_spanish: y ... y
  alternatives_spanish:
  - tanto ... como
  lexicon: Greek grammar
  rationale: Las dos cláusulas están coordinadas en paralelo; repetir 'y' conserva la estructura concisa del griego y la línea poética del pasaje.
theological_decisions:
- issue: Alcance de la purificación de la patria
  english_pob_reading: '''the homeland cleansed'' preserves a broad sense that can include ritual, moral, and communal cleansing'
  chosen_spanish_reading: '''la patria purificada'' mantiene un sentido amplio que puede incluir limpieza ritual, moral y comunitaria'
  alternative_spanish_readings:
  - '''la patria limpiada'', con énfasis en la remoción de impureza'
  - '''la nación purificada'', con énfasis en el pueblo más que en la tierra'
  rationale: El texto no especifica una sola dimensión de la purificación. 'Purificada' conserva esa amplitud teológica y evita restringir indebidamente el sentido.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
translation_notes:
  revision_awareness: El audio-tiraje en inglés pasó de 'purified' a 'cleansed' para καθαρισθῆναι, pero en español 'purificada' es la opción más natural y teológicamente amplia; se mantiene la coordinación simple de dos resultados con 'y'.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' u otras sustituciones no pertinentes; no hay nombre divino en este versículo.
  - Se mantuvo un registro digno y moderno, sin arcaísmos innecesarios.
  - La pasiva perifrástica 'fuera castigado' conserva el valor pasivo del infinitivo aoristo sin volver la frase pesada.
