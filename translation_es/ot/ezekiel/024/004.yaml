translation:
  language: es
  text: 'Reúne sus trozos dentro de ella[a], todo buen trozo: el muslo y el hombro[b]; llénala con huesos selectos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus cortes de carne» para «sus trozos»; el término hebreo se refiere a porciones troceadas.
    reason: lexical_alternative
  - marker: b
    text: O «todo trozo selecto»; «buen» aquí lleva la idea de porciones deseables o escogidas.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱסֹף
  english_pob_choice: Gather
  chosen_spanish: Reúne
  alternatives_spanish:
  - Junta
  - Recoge
  lexicon: HALOT
  rationale: El imperativo pide una acción de reunir los trozos para la imagen culinaria; «reúne» conserva bien la fuerza directiva y suena natural en español.
- source_word: נְתָחֶיהָ
  english_pob_choice: its pieces
  chosen_spanish: sus pedazos
  alternatives_spanish:
  - sus piezas
  - sus cortes de carne
  lexicon: HALOT
  rationale: נתח se refiere a porciones o cortes de carne ya troceados; «pedazos» comunica el sentido concreto sin perder la imaginería de carne troceada.
- source_word: אֵלֶיהָ
  english_pob_choice: into it
  chosen_spanish: en ella
  alternatives_spanish:
  - dentro de ella
  - a ella
  lexicon: HALOT
  rationale: El referente es la olla, femenina en hebreo; en español «en ella» transmite la idea locativa de colocar los trozos dentro del recipiente, con estilo más natural que una traducción excesivamente literal.
- source_word: כָּל נֵתַח טוֹב
  english_pob_choice: every good piece
  chosen_spanish: todo buen pedazo
  alternatives_spanish:
  - todo pedazo escogido
  - cada buen corte
  lexicon: HALOT
  rationale: Se conserva el distributivo «todo» y el valor cualitativo de טוֹב. «Buen» mantiene la ambigüedad entre bueno, conveniente o selecto, como en el inglés POB, sin forzar una superlación.
- source_word: יָרֵךְ וְכָתֵף
  english_pob_choice: the thigh and the shoulder
  chosen_spanish: el muslo y el hombro
  alternatives_spanish:
  - la pierna y el hombro
  - el anca y el hombro
  lexicon: HALOT
  rationale: Son partes específicas del animal. «Muslo» conserva mejor la precisión anatómica de יָרֵךְ; «hombro» es el equivalente claro de כתף.
- source_word: מִבְחַר עֲצָמִים
  english_pob_choice: choice bones
  chosen_spanish: huesos selectos
  alternatives_spanish:
  - huesos escogidos
  - huesos de mejor calidad
  lexicon: HALOT
  rationale: מבחר expresa selección o lo elegido, no necesariamente un superlativo. «Selectos» comunica la idea de huesos escogidos para el guiso, sin añadir «los más» ni otra intensificación no obligada.
- source_word: מַלֵּא
  english_pob_choice: fill it
  chosen_spanish: llénala
  alternatives_spanish:
  - llénalo
  - llena la olla
  lexicon: HALOT
  rationale: El objeto implícito es la olla; en español se expresa de forma natural con el clítico enclítico «llénala», manteniendo la referencia femenina del recipiente.
theological_decisions:
- issue: Imagen judicial/culinaria de violencia mediante lenguaje de cocina
  english_pob_reading: The verse uses butchered meat and bones imagery to portray judgment; the translation keeps the concrete culinary metaphor without softening it.
  chosen_spanish_reading: La traducción conserva la imaginería concreta de carne troceada, huesos y olla, sin atenuar la dureza de la metáfora.
  alternative_spanish_readings:
  - Reforzar el eufemismo con lenguaje menos corporal
  - Explicar la metáfora dentro del texto
  rationale: El hebreo presenta una escena de carnicería y cocción como figura del juicio; no conviene diluirla con expresiones más abstractas o piadosas. El español mantiene la contundencia del original.
  doctrine_reference: Tema profético de juicio simbólico en Ezequiel 24
- issue: Valor de טוֹב y מִבְחַר sin sobrerrelevancia superlativa
  english_pob_reading: '''Good'' means desirable or select portions; later revision removed ''choicest'' to reflect the construct more closely.'
  chosen_spanish_reading: «Buen» y «selectos» reflejan cualidad/selección sin imponer un superlativo no explícito.
  alternative_spanish_readings:
  - «Escogidos»
  - «Los mejores»
  rationale: El POB inglés ya corrigió una intensificación excesiva en 'choicest'. En español, «selectos» y «buen» preservan la selección y calidad sin añadir grado máximo.
  doctrine_reference: Precisión lexical y atención al paralelismo hebreo
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «the choicest bones» a «choice bones» para no añadir una superlación ausente en el hebreo. La redacción española sigue esa revisión y evita equivalentes máximos como «los más selectos».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma predeterminada cuando aparezca el nombre divino; en este versículo no ocurre.
  - Se usa vocabulario corporal concreto («muslo», «hombro», «huesos») para respetar la metáfora profética sin suavizarla.
  - Se evita traducir mecánicamente con calcos como «corta» o «piezas» si empobrecen la referencia a carne troceada.
