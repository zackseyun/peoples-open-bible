base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/105/005.yaml
  text: What will you have to do? You will not have to hide on the day of the great judgment[a], and you will not be found as sinners[c][b]; and everlasting judgment will be upon you for all the generations of the world.
  footnotes:
  - marker: a
    text: The clause 'you will not be found as sinners' is textually and syntactically difficult in context. Some interpreters understand the sense more adversatively, such as 'you will be found to be sinners' or similar, but the Ethiopic witness here is rendered conservatively.
    reason: textual_variant
  - marker: b
    text: Literally, the phrase behind 'will be upon you' may be read more woodenly as 'will be from you.' In context, the sense appears to be that everlasting judgment comes upon or against the addressees.
    reason: lexical_alternative
  - marker: c
    text: Or 'You will not be hidden on the day of the great judgment, and you will not be found as sinners; and everlasting judgment will be upon you'.
    reason: previous_rendering
