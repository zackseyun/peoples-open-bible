base_translation:
  language: en
  yaml_path: translation/ot/hosea/013/002.yaml
  text: And now they continue to sin and make for themselves cast images from their silver[a], idols according to their own skill, all of it the work of craftsmen. Of them they say[b], ‘Those who sacrifice men kiss calves!’
  footnotes:
  - marker: a
    text: Or, 'those who sacrifice humans kiss calves,' taking 'human' as the object of 'sacrifice' rather than as a generic reference to the sacrificers.
    reason: alternative_reading
  - marker: b
    text: That is, calf-idols, likely referring to the cult images associated with Bethel and Samaria.
    reason: cultural_note
