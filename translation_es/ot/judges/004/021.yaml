translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión reciente del inglés POB que reemplazó una formulación temporal por una secuencia narrativa más exacta: ''and it went down into the ground''. En español se optó por una solución igualmente secuencial (''y ésta cayó a tierra''), evitando implicar duración o propósito no presentes en el hebreo, y preservando el sujeto implícito más natural de la estaca.'
  spanish_consistency_notes:
  - Se mantiene 'Jael' como nombre propio bíblico ya asentado en español.
  - Se evita 'SEÑOR' u otras sustituciones no pertinentes porque el versículo no contiene referencia divina.
  - '''Estaca'' y ''martillo'' conservan la concreción material del texto hebreo.'
  - '''Sien'' se usa por ser el equivalente anatómico natural de רַקָּה.'
  - La puntuación reproduce la secuencia narrativa sin insertar aclaraciones interpretativas.
