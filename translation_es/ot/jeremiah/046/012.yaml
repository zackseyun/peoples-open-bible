revisions:
- from: Las naciones han oído tu vergüenza[a], y tu clamor ha llenado la tierra; porque guerrero ha tropezado contra guerrero; juntos han caído los dos.
  to: Las naciones han oído tu vergüenza[a], y tu clamor ha llenado la tierra; porque un guerrero ha tropezado contra otro guerrero; ambos han caído juntos.
  rationale: 'La revisión es pequeña y no doctrinal: mejora la naturalidad del español, preserva con más claridad el sentido distributivo de ''warrior against warrior'' y expresa de forma más idiomática la caída de ambos. También corrige la redacción de la nota al pie para dejarla plenamente en español y más alineada con la justificación del POB inglés.'
  reviewer_model: gpt-5.4
