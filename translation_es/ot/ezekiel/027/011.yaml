translation:
  language: es
  text: Los hijos de Arvad, junto con tu ejército, estaban sobre tus muros, por todo alrededor, y los gamaditas[a] estaban en tus torres. Colgaron sus escudos en tus muros, por todo alrededor; perfeccionaron tu hermosura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo גַמָּדִים es oscuro. Aquí se entiende como un nombre étnico, 'gamaditas'; alternativamente, algunos lo entienden más generalmente como 'guerreros' o conservan la grafía 'Gamaditas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי אַרְוַד
  english_pob_choice: The sons of Arvad
  chosen_spanish: Los hijos de Arvad
  alternatives_spanish:
  - Los hombres de Arvad
  - La gente de Arvad
  lexicon: HALOT
  rationale: Conservo la fórmula etnogeográfica literal de 'hijos de Arvad', que en español bíblico comunica pertenencia/ procedencia sin perder el vínculo con el texto hebreo. 'Hombres' o 'gente' explicitan el sentido, pero suavizan la forma fuente.
- source_word: חֵילֵךְ
  english_pob_choice: your army
  chosen_spanish: tu ejército
  alternatives_spanish:
  - tus fuerzas
  - tu tropa
  lexicon: HALOT
  rationale: El contexto es militar y defensivo; 'ejército' es la equivalencia natural y clara en español. 'Fuerzas' sería más general y 'tropa' más restringido o coloquial.
- source_word: חוֹמוֹתַיִךְ סָבִיב
  english_pob_choice: your walls all around
  chosen_spanish: tus muros alrededor
  alternatives_spanish:
  - tus muros todo alrededor
  - alrededor de tus muros
  lexicon: HALOT
  rationale: En español, 'alrededor' colocado después de 'muros' reproduce la idea de circunvalación con fluidez. 'Muros' mantiene la imagen urbana defensiva; 'todo alrededor' sería más explícito, pero menos sobrio.
- source_word: גַמָּדִים
  english_pob_choice: the Gammadites
  chosen_spanish: los gamaditas
  alternatives_spanish:
  - los Gammaditas
  - los Gamaditas
  - guerreros
  lexicon: HALOT
  rationale: Sigo la decisión inglesa de tratar el término como etnónimo incierto y lo translitero al castellano. 'Gamaditas' o 'Gammaditas' son variantes posibles; 'gamaditas' conserva la referencia sin fingir certeza léxica. No lo vierto como 'guerreros' para no borrar la oscuridad del hebreo.
- source_word: בְּמִגְדְּלוֹתַיִךְ
  english_pob_choice: in your towers
  chosen_spanish: en tus torres
  alternatives_spanish:
  - sobre tus torres
  - en tus torreones
  lexicon: HALOT
  rationale: La preposición hebrea con valor locativo se rinde naturalmente por 'en'. 'Torres' es el equivalente más directo y público; 'torreones' estrecha innecesariamente el término.
- source_word: שִׁלְטֵיהֶם
  english_pob_choice: their shields
  chosen_spanish: sus escudos
  alternatives_spanish:
  - sus broqueles
  lexicon: HALOT
  rationale: '''Escudos'' es el término estándar y claro para el objeto descrito. ''Broqueles'' es posible, pero más arcaizante y específico de forma que el hebreo no exige aquí.'
- source_word: תִּלּוּ
  english_pob_choice: They hung
  chosen_spanish: colgaron
  alternatives_spanish:
  - suspendieron
  - los colgaron
  lexicon: HALOT
  rationale: El verbo indica poner algo colgado o suspendido; 'colgaron' es el equivalente natural en español. Mantiene la escena visual sin recargarla.
- source_word: כָּלְלוּ
  english_pob_choice: they perfected
  chosen_spanish: perfeccionaron
  alternatives_spanish:
  - completaron
  - hicieron perfecto
  lexicon: HALOT
  rationale: Sigo la fuerza elevada del inglés POB, que conserva el valor de 'hacer completo/perfecto' y no lo reduce a simple 'completar'. 'Perfeccionaron' conserva esa tensión estilística y la aplica a la belleza de Tiro como culminación ornamental.
- source_word: יָפְיֵךְ
  english_pob_choice: your beauty
  chosen_spanish: tu hermosura
  alternatives_spanish:
  - tu belleza
  - tu esplendor
  lexicon: HALOT
  rationale: '''Hermosura'' mantiene el registro poético y expresa bien la idea de belleza visible y ornamental. ''Belleza'' es más directa; ''esplendor'' enfatiza magnificencia, pero desplaza ligeramente el foco del término hebreo.'
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada: no hay cambios sustanciales respecto del audit trail inglés; se preserva la ambigüedad de גַמָּדִים mediante transliteración en nota y se mantiene el tono poético de כָּלְלוּ.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo exija explícitamente; este versículo no contiene el nombre divino.
  - '''Hijos de'' reproduce la fórmula hebrea etnogeográfica sin forzar una interpretación biológica.'
  - '''Escudos'' y ''torres'' conservan el registro militar concreto del pasaje.'
  - La elección de 'perfeccionaron' mantiene la tensión lexical de la versión inglesa auditada, en lugar de rebajarla a un mero 'completaron'.
