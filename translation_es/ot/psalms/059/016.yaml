translation:
  language: es
  text: Ellos vagan en busca de comida; si no quedan satisfechos, pasan la noche[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se quedan a pasar la noche» o «se alojan». Algunas versiones interpretan la cláusula final como si aludiera a gruñir toda la noche por el contexto de perros hambrientos, pero el verbo hebreo aquí se entiende más directamente como «pasar la noche» o «alojarse».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵמָּה
  english_pob_choice: They
  chosen_spanish: Ellos
  alternatives_spanish:
  - Estos
  - Ellos mismos
  lexicon: HALOT
  rationale: El pronombre independiente de tercera persona plural cumple una función enfática o contrastiva. En español, "Ellos" conserva la referencia directa y el énfasis sin sonar forzado.
- source_word: ינועו/ן
  english_pob_choice: wander about
  chosen_spanish: andan errantes
  alternatives_spanish:
  - vagan
  - andan de un lado a otro
  - se mueven
  lexicon: HALOT
  rationale: La raíz נוּעַ expresa movimiento de aquí para allá. "Andan errantes" comunica ese ir y venir con un tono natural en español y sin introducir la idea de tambaleo.
- source_word: לֶאֱכֹל
  english_pob_choice: for food
  chosen_spanish: para hallar comida
  alternatives_spanish:
  - para comer
  - en busca de comida
  - buscando alimento
  lexicon: HALOT
  rationale: El infinitivo con לְ indica propósito. Aunque literalmente sería "para comer", en español "para hallar comida" expresa con más claridad la finalidad del vagar en este contexto de hambre.
- source_word: אִם לֹא
  english_pob_choice: if ... not
  chosen_spanish: si no
  alternatives_spanish:
  - a menos que no
  - cuando no
  lexicon: HALOT
  rationale: La secuencia introduce una condición simple. "Si no" reproduce esa estructura de forma clara y fiel.
- source_word: יִשְׂבְּעוּ
  english_pob_choice: are not satisfied
  chosen_spanish: quedan satisfechos
  alternatives_spanish:
  - se sacian
  - están saciados
  - quedan llenos
  lexicon: HALOT
  rationale: La raíz שָׂבַע refiere estar saciado o satisfecho con alimento. Aquí, la forma negativa se expresa naturalmente como "quedan satisfechos" para mantener la imagen de hambre y saciedad.
- source_word: וַיָּלִינוּ
  english_pob_choice: they spend the night
  chosen_spanish: pasan la noche
  alternatives_spanish:
  - se alojan
  - permanecen toda la noche
  - duermen allí
  lexicon: HALOT
  rationale: La lectura directa del verbo apunta a "pasar la noche" o "alojarse". En español, "pasan la noche" es fiel y fluido, y evita introducir una interpretación más fuerte que el hebreo base no exige en esta versificación.
theological_decisions:
- issue: La ambigüedad del último verbo entre "pasar la noche" y una lectura más interpretativa de tipo "gruñir".
  english_pob_reading: The published English draft reverted to 'they spend the night,' noting that the Hebrew most directly means 'spend the night' or 'lodge.'
  chosen_spanish_reading: pasan la noche
  alternative_spanish_readings:
  - gruñen
  - refunfuñan toda la noche
  - se quedan gruñendo
  rationale: Aunque el contexto poético de perros rabiosos puede sugerir una lectura más expresiva, el verbo hebreo en su sentido más directo favorece la idea de pasar la noche. Para una edición fuente-transparente, el español debe seguir esa lectura básica y no sobrecargar el verso con una inferencia contextual no obligatoria.
  doctrine_reference: Poética bíblica y criterio de cercanía semántica al texto fuente
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión importante en el último miembro verbal: se descartó una lectura más interpretativa como ''they growl'' y se restauró ''they spend the night'' por corresponder más directamente al hebreo. La traducción española sigue esa última decisión revisada, preservando además el matiz de hambre y vagar del resto del verso.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en el proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se evita 'Cristo/Mesías' porque no aparece ninguna referencia mesiánica en este versículo.
  - '''Ellos'' y ''pasan la noche'' mantienen un registro bíblico actual sin depender de calcos arcaizantes.'
