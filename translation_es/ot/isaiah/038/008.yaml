base_translation:
  language: en
  yaml_path: translation/ot/isaiah/038/008.yaml
  text: Behold[a], I will make the shadow go back ten steps, which had gone down on the steps of Ahaz by the sun[b]. And the sun went back ten steps on the steps on which it had gone down.
  footnotes:
  - marker: a
    text: Or 'ten degrees.' The Hebrew word literally means 'steps' or 'ascents'; some understand the phrase to refer to a stairway-like sundial.
    reason: lexical_alternative
  - marker: b
    text: Or 'the dial of Ahaz.' The Hebrew says 'the steps of Ahaz,' which may refer to a structure used to mark the sun's shadow.
    reason: alternative_reading
