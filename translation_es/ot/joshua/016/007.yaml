    issue: Uso de imperfectos narrativos en la línea de frontera
    rationale: «Descendía», «llegaba» y «salía» sugieren acción continua o habitual, mientras que el hebreo wayyiqtol en esta lista de linderos se vierte mejor en español con pretérito puntual o secuencial.
  - severity: medium
    issue: La nota b duplica el texto principal
    rationale: El texto dice «llegaba a Jericó[b]» y la nota b ofrece «O «llegaba a Jericó»», lo cual no aporta alternativa. Debe preservar la opción de «tocaba Jericó» o equivalente, según el rationale léxico.
  - severity: low
    issue: Transliteración «Naará» menos alineada con el rastro POB
    rationale: Aunque no es infiel, «Naarah» reproduce más directamente la forma señalada en la evidencia y evita una hispanización innecesaria que podría ocultar la relación con la nota sobre «Naarath».
  - severity: low
    issue: «Salía al Jordán» es posible, pero menos claro que una formulación terminal
    rationale: Dado que el inglés POB auditado eligió «ended at the Jordan», en español «terminaba en el Jordán» o «terminó en el Jordán» comunica mejor la función limítrofe del modismo.
