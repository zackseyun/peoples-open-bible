translation:
  language: es
  text: y con tu sabiduría formaste al hombre[a] para que gobernara las criaturas hechas por ti[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'a la humanidad' o 'a un ser humano'; el griego usa el singular 'hombre', probablemente con sentido representativo de la humanidad en lenguaje de creación.
    reason: lexical_alternative
  - marker: b
    text: O 'para tener dominio sobre', en eco del lenguaje del mandato de la creación en Génesis.
    reason: alternative_reading
lexical_decisions:
- source_word: σοφίᾳ
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - conocimiento
  lexicon: BDAG
  rationale: 'La forma dativa indica medio o instrumento: Dios actúa ''con tu sabiduría''. ''Sabiduría'' conserva el peso teológico y literario del libro y evita rebajar el término a una mera habilidad práctica.'
- source_word: κατεσκεύασας
  english_pob_choice: you formed
  chosen_spanish: formaste
  alternatives_spanish:
  - hiciste
  - moldeaste
  - construiste
  lexicon: BDAG
  rationale: '''Formaste'' refleja bien el sentido de preparar o modelar, y suena natural en español bíblico sin perder el matiz creador del verbo.'
- source_word: ἄνθρωπον
  english_pob_choice: man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a la humanidad
  - a un ser humano
  lexicon: BDAG
  rationale: Se conserva el singular representativo del griego, que alude a la humanidad en lenguaje de creación. 'Al hombre' mantiene esa forma singular sin neutralizarla colectivamente.
- source_word: ἵνα δεσπόζῃ
  english_pob_choice: to rule over
  chosen_spanish: para dominar sobre
  alternatives_spanish:
  - para reinar sobre
  - para tener dominio sobre
  - para gobernar sobre
  lexicon: BDAG
  rationale: '''Dominar sobre'' expresa con claridad la idea de autoridad sobre la creación y permite conservar la fuerza de δεσπόζῃ. En español, ''gobernar sobre'' podría sonar más político y menos ligado al mandato creador.'
- source_word: τῶν ... κτισμάτων
  english_pob_choice: the creatures
  chosen_spanish: las criaturas
  alternatives_spanish:
  - las cosas creadas
  - las obras de la creación
  lexicon: BDAG
  rationale: '''Criaturas'' transmite de modo natural κτισμάτων en este contexto de creación y dominio. ''Cosas creadas'' sería más literal, pero menos idiomático y más pesado.'
- source_word: ὑπὸ σοῦ γενομένων
  english_pob_choice: made by you
  chosen_spanish: hechas por ti
  alternatives_spanish:
  - hechas por ti mismo
  - producidas por ti
  lexicon: BDAG
  rationale: La expresión participial enfatiza el origen divino de las criaturas. 'Hechas por ti' es directa y clara en español, y mantiene la relación de agencia sin añadir una paráfrasis más fuerte.
theological_decisions:
- issue: Sentido representativo de ἄνθρωπον en lenguaje de creación
  english_pob_reading: man
  chosen_spanish_reading: al hombre
  alternative_spanish_readings:
  - a la humanidad
  - a un ser humano
  rationale: El texto presenta al ser humano en singular representativo, como vocación de la humanidad. Se conserva esa forma para no diluir el eco de Génesis ni perder la estructura del griego.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Fuerza de δεσπόζῃ en relación con el mandato sobre la creación
  english_pob_reading: to rule over
  chosen_spanish_reading: para dominar sobre
  alternative_spanish_readings:
  - para tener dominio sobre
  - para reinar sobre
  rationale: '''Dominar sobre'' comunica autoridad real sobre la creación sin cargar el texto con una formulación más técnica o más litúrgica de lo que el griego exige. Se preserva la resonancia con el mandato creacional.'
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 1 and 6
translation_notes:
  revision_awareness: 'La versión anterior fue corregida para anclar todas las notas al texto español: el marcador [a] está en ''al hombre'' y el marcador [b] está en ''hechas por ti''. También se mantuvo una solución española natural que respeta el ajuste del pasaje a ''formaste'' y evita añadir una paráfrasis no anclada.'
  spanish_consistency_notes:
  - Se mantiene 'sabiduría' para σοφίᾳ por coherencia con el peso teológico del libro.
  - '''Formaste'' suena natural en español bíblico y conserva el matiz creador de κατεσκεύασας.'
  - '''Criaturas'' es idiomático y respeta κτισμάτων en contexto de creación.'
  - No se usó 'SEÑOR' ni terminología eclesiástica no requerida por el griego.
