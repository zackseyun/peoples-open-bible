lexical_decisions:
- source_word: בִּקֵּשׁ
  english_pob_choice: sought
  chosen_spanish: buscó
  alternatives_spanish:
  - trató de buscar
  - procuró
  lexicon: HALOT
  rationale: Expresa búsqueda intencional y mantiene el matiz de esfuerzo deliberado sin volverlo demasiado interpretativo.
- source_word: קֹהֶלֶת
  english_pob_choice: Qoheleth
  chosen_spanish: Qohelet
  alternatives_spanish:
  - el Predicador
  - el Maestro
  lexicon: HALOT
  rationale: Se conserva la designación hebrea transliterada para respetar la decisión documental de no sustituir el título por una glosa interpretativa.
- source_word: לִמְצֹא
  english_pob_choice: to find
  chosen_spanish: hallar
  alternatives_spanish:
  - encontrar
  - descubrir
  lexicon: HALOT
  rationale: ‘Hallar’ reproduce el sentido directo de encontrar con un tono literario adecuado al hebreo.
- source_word: דִּבְרֵי חֵפֶץ
  english_pob_choice: delightful words
  chosen_spanish: palabras deleitosas
  alternatives_spanish:
  - palabras agradables
  - palabras de deleite
  lexicon: HALOT
  rationale: ‘Deleitosas’ conserva el valor de deseo/placer de חֵפֶץ y mantiene el paralelismo con ‘palabras de verdad’ sin perder naturalidad en español.
- source_word: וְכָתוּב
  english_pob_choice: and to write
  chosen_spanish: y escribir
  alternatives_spanish:
  - y escrito
  - y que fue escrito
  lexicon: HALOT
  rationale: La sintaxis hebrea admite una lectura verbal; ‘escribir’ sigue esa fuerza y evita imponer una pasiva impersonal no obligada por el texto.
- source_word: יֹשֶׁר
  english_pob_choice: uprightly
  chosen_spanish: rectamente
  alternatives_spanish:
  - con rectitud
  - upriatamente
  lexicon: HALOT
  rationale: ‘Rectamente’ comunica bien la idea de ישר como manera justa/recta de proceder y suena más natural que una calca menos idiomática.
- source_word: דִּבְרֵי אֱמֶת
  english_pob_choice: words of truth
  chosen_spanish: palabras de verdad
  alternatives_spanish:
  - palabras verdaderas
  - palabras veraces
  lexicon: HALOT
  rationale: La construcción se conserva de cerca y deja visible tanto el contenido verdadero como la cualidad de veracidad del decir.
theological_decisions:
- issue: Tratamiento de קֹהֶלֶת como título o nombre propio
  english_pob_reading: Qoheleth as a transliterated designation
  chosen_spanish_reading: Qohelet como designación transliterada
  alternative_spanish_readings:
  - el Maestro
  - el Predicador
  rationale: No se introduce una interpretación funcional que el hebreo no exige; la transliteración preserva la forma literaria del libro y la transparencia textual.
  doctrine_reference: 'Principio POB: transliterar designaciones distintivas cuando la glosa interpretativa puede empobrecer o sesgar el sentido.'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión que favorece una lectura verbal de וְכָתוּב y la equivalencia más natural de ‘words of delight’/‘delightful words’. En español, ‘palabras deleitosas’ y ‘escribir rectamente’ conservan esa fluidez sin perder la textura hebrea.
  spanish_consistency_notes:
  - Se mantuvo la transliteración Qohelet para coherencia con la política de títulos distintivos.
  - Se evitó ‘Señor’ o cualquier sustitución devocional ajena al texto.
  - ‘Palabras de verdad’ conserva el paralelismo con ‘palabras deleitosas’ y la estructura constructa del hebreo.
