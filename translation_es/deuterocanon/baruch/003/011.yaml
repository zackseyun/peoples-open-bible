lexical_decisions:
- source_word: προσελογίσθης
  english_pob_choice: you were counted
  chosen_spanish: fuiste contado
  alternatives_spanish:
  - fuiste reckoned
  - fuiste considerado
  - fuiste agregado al número de
  lexicon: BDAG
  rationale: El aoristo pasivo expresa que el sujeto fue incluido o computado dentro de un grupo. «Fuiste contado» conserva la pasiva y es natural en español, sin perder la fuerza de pertenencia al conjunto.
- source_word: μετὰ
  english_pob_choice: among
  chosen_spanish: entre
  alternatives_spanish:
  - con
  - entre los
  lexicon: BDAG
  rationale: Con un genitivo plural, la idea es de asociación o inclusión. En español, «entre» reproduce bien el valor de pertenencia al grupo y suena más idiomático que un calco como «con» en este contexto.
- source_word: τῶν εἰς ᾅδου
  english_pob_choice: those in Hades
  chosen_spanish: los que están en Hades
  alternatives_spanish:
  - los que están en el reino de los muertos
  - los muertos
  - los que han bajado a Hades
  lexicon: BDAG
  rationale: La construcción griega identifica literalmente a un grupo como los que están en Hades. «Los que están en Hades» mantiene el nombre propio griego y evita suavizarlo a «los muertos» o «el sepulcro».
- source_word: ᾅδου
  english_pob_choice: Hades
  chosen_spanish: Hades
  alternatives_spanish:
  - el reino de los muertos
  - Sheol
  - el sepulcro
  lexicon: BDAG
  rationale: Se conserva el término griego como nombre del ámbito de los muertos, porque la fuente usa ᾅδης explícitamente. Esto evita confundirlo con «infierno» y preserva la precisión léxica del original.
theological_decisions:
- issue: Conservación de Hades como término del mundo de los muertos
  english_pob_reading: Hades
  chosen_spanish_reading: Hades
  alternative_spanish_readings:
  - el reino de los muertos
  - el sepulcro
  - Sheol
  rationale: La lectura en español conserva el término técnico del griego para no borrar la distinción entre Hades y otros conceptos bíblicos de muerte o juicio final. Se añade nota para lectores que necesiten una equivalencia explicativa.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
