translation:
  language: es
  text: '¿Robará un hombre a Dios?[a] Sin embargo, ustedes me están robando. Pero ustedes dicen: «¿En qué te hemos robado?». En el diezmo y en la contribución[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿Robará una persona a Dios?». El hebreo אָדָם tiene sentido humano genérico.
    reason: lexical_alternative
  - marker: b
    text: O «ofrenda». El término hebreo puede designar una contribución apartada para uso sagrado.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִקְבַּע / קֹבְעִים / קְבַעֲנוּךָ
  english_pob_choice: rob / robbing / robbed
  chosen_spanish: robar / robando / robado
  alternatives_spanish:
  - defraudar
  - despojar
  - hurtar
  lexicon: HALOT
  rationale: El verbo en este contexto expresa quitar indebidamente lo que pertenece a Dios. «Robar» conserva la fuerza retórica y la acusación directa mejor que equivalentes más abstractos como «defraudar».
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - un ser humano
  lexicon: HALOT
  rationale: El hebreo usa אָדָם en singular con valor genérico y proverbial. «Un hombre» mantiene la brevedad y el impacto de la pregunta retórica, con sentido humano general y no exclusivo de varón.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: HALOT
  rationale: Aquí el referente es el Dios de Israel en una acusación directa; «Dios» es la equivalencia clara y estándar en español.
- source_word: כִּי
  english_pob_choice: Yet
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - Pero
  - No obstante
  lexicon: HALOT
  rationale: En esta transición, כִּי introduce la contradicción sorprendente entre la pregunta retórica y la realidad denunciada. «Sin embargo» conserva el giro adversativo sin sonar mecánico.
- source_word: בַּמֶּה
  english_pob_choice: How
  chosen_spanish: ¿En qué... ?
  alternatives_spanish:
  - ¿Cómo... ?
  - ¿De qué manera... ?
  lexicon: HALOT
  rationale: La pregunta de réplica pide el ámbito o aspecto en que han cometido la falta. «¿En qué... ?» funciona de manera natural en español y mantiene la amplitud de la expresión hebrea.
- source_word: הַמַּעֲשֵׂר
  english_pob_choice: the tithe
  chosen_spanish: el diezmo
  alternatives_spanish:
  - la décima parte
  lexicon: HALOT
  rationale: מַעֲשֵׂר designa la décima parte entregada a Dios. «El diezmo» es el término bíblico y eclesial más claro en español.
- source_word: הַתְּרוּמָה
  english_pob_choice: the contribution
  chosen_spanish: la contribución
  alternatives_spanish:
  - la ofrenda
  - la aportación
  lexicon: HALOT
  rationale: תְּרוּמָה es una ofrenda o contribución apartada para uso sagrado. «Contribución» reproduce bien la distinción con el diezmo sin recurrir a una expresión demasiado técnica.
theological_decisions:
- issue: Valor genérico de אָדָם
  english_pob_reading: Will a man rob God?
  chosen_spanish_reading: ¿Robará un hombre a Dios?
  alternative_spanish_readings:
  - ¿Robará una persona a Dios?
  - ¿Robará el ser humano a Dios?
  rationale: La forma española conserva el singular genérico y la contundencia proverbial del hebreo, mientras se entiende como referencia a la humanidad en general.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; Contested terms table for אָדָם
- issue: Tensión acusatoria del pronombre en primera persona
  english_pob_reading: Yet you are robbing me
  chosen_spanish_reading: Sin embargo, ustedes me están robando
  alternative_spanish_readings:
  - Sin embargo, ustedes me roban
  - Pero ustedes me roban
  rationale: El texto hebreo pasa de la mención de Dios a la primera persona directa. La traducción mantiene esa confrontación inmediata con «me», sin suavizar la acusación.
  doctrine_reference: Hebreo discursivo directo en Malaquías 3:8
- issue: Distinción entre ma‘aser y terumah
  english_pob_reading: the tithe and the contribution
  chosen_spanish_reading: el diezmo y la contribución
  alternative_spanish_readings:
  - el diezmo y la ofrenda
  - el diezmo y la aportación
  rationale: Se conserva la distinción entre dos categorías ofrendadas. «Contribución» mantiene el sentido de algo apartado para uso sagrado sin fusionarlo con el diezmo.
  doctrine_reference: HALOT; uso cultual de מַעֲשֵׂר y תְּרוּמָה
translation_notes:
  revision_awareness: 'El borrador sigue el cierre aprobado de la POB en inglés y mantiene sus decisiones léxicas principales: rob/robbing para קבע, sentido genérico de אָדָם, «diezmo» para מַעֲשֵׂר y una segunda designación cultual distinta para תְּרוּמָה. No se registraron revisiones posteriores en el paquete auditado.'
  spanish_consistency_notes:
  - Se usa «Dios» y no una máscara reverencial como «SEÑOR», conforme a la política del proyecto para אֱלֹהִים.
  - Se mantiene la distinción entre «diezmo» y «contribución» para reflejar dos términos hebreos diferentes.
  - El pronombre de primera persona «me» conserva la acusación directa del hebreo.
  - La puntuación reproduce la cadencia retórica del original con dos preguntas y una réplica.
