lexical_decisions:
- source_word: וּ/בְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Y los hijos de
  - Y los descendientes de
  - Ahora bien, los hijos de
  lexicon: HALOT
  rationale: בְּנֵי en listas genealógicas se refiere naturalmente a descendencia masculina, y en español 'hijos de' mantiene bien la forma genealógica. Se conserva la conjunción inicial para reflejar la continuidad de la lista.
- source_word: זְבוּלֻן
  english_pob_choice: Zebulun
  chosen_spanish: Zabulón
  alternatives_spanish:
  - Zebulún
  - Zabulún
  lexicon: HALOT
  rationale: Nombre propio; en español bíblico la forma establecida y más reconocible es 'Zabulón'. Se mantiene la transliteración tradicional adaptada al uso español.
- source_word: סֶרֶד
  english_pob_choice: Sered
  chosen_spanish: Sered
  alternatives_spanish:
  - Seredh
  lexicon: HALOT
  rationale: Nombre propio sin equivalente semántico en contexto; se translitera de manera simple y reconocible en español.
- source_word: וְ/אֵלוֹן
  english_pob_choice: and Elon
  chosen_spanish: Elón
  alternatives_spanish:
  - Elon
  lexicon: HALOT
  rationale: Aquí el hebreo lleva una conjunción, pero en español la lista fluye mejor sin repetir 'y' antes del segundo nombre propio, porque el encabezado ya introduce la serie. El nombre se translitera como 'Elón' para conservar la vocal final y evitar confusión con el nombre moderno sin tilde.
- source_word: וְ/יַחְלְאֵל
  english_pob_choice: and Jahleel
  chosen_spanish: Jahleel
  alternatives_spanish:
  - Yahleel
  - Jachleel
  lexicon: HALOT
  rationale: Nombre propio; se conserva una transliteración cercana a la convención inglesa para mantener identificación interlingüística. La forma inglesa auditada documenta variantes, pero en español se usa la forma más directa 'Jahleel'.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece explícitamente en el texto español junto a Sered, y la nota de pie queda anclada correctamente.'
  spanish_consistency_notes:
  - Se evitó calcar mecánicamente la sintaxis inglesa donde el español permite una lista más natural.
  - Se mantuvo el registro genealógico breve y sobrio acorde con el hebreo.
  - Se usaron formas españolas asentadas para nombres propios cuando existen, especialmente Zabulón.
  - No se añadió contenido interpretativo fuera del alcance del texto.
