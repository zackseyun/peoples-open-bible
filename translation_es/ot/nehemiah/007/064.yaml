translation:
  language: es
  text: Estos buscaron su registro entre los inscritos por genealogía[a], pero no se encontró su registro, así que fueron excluidos[b] del sacerdocio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su documento genealógico»; el hebreo se refiere a un escrito oficial que acreditaba el linaje.
    reason: lexical_alternative
  - marker: b
    text: O «fueron descalificados del sacerdocio». El verbo hebreo indica exclusión de la condición sacerdotal porque no pudo verificarse la ascendencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These
  chosen_spanish: Estos
  alternatives_spanish:
  - Estas personas
  - Estos hombres
  lexicon: HALOT
  rationale: El demostrativo plural retoma al grupo mencionado sin añadir un sustantivo ausente en el hebreo. «Estos» conserva la referencia directa y funciona naturalmente en español.
- source_word: בִּקְשׁוּ
  english_pob_choice: sought
  chosen_spanish: buscaron
  alternatives_spanish:
  - buscaron con empeño
  - siguieron buscando
  lexicon: HALOT
  rationale: בקשי expresa buscar/solicitar. En español, «buscaron» comunica bien la acción de intentar localizar el documento, con un tono natural y fiel al contexto administrativo.
- source_word: כְתָבָם
  english_pob_choice: their record
  chosen_spanish: su registro
  alternatives_spanish:
  - su documento
  - su escrito
  - su acta
  lexicon: HALOT
  rationale: כְתָב se refiere a un escrito o documento; en este contexto genealógico-administrativo, «registro» transmite mejor la idea de una inscripción oficial verificable sin precisar innecesariamente el formato.
- source_word: הַמִּתְיַחְשִׂים
  english_pob_choice: among those enrolled by genealogy
  chosen_spanish: entre los inscritos por genealogía
  alternatives_spanish:
  - en el registro genealógico
  - entre los registrados por ascendencia
  - entre los que se inscribían por genealogía
  lexicon: HALOT
  rationale: El participio hitpael de יחס apunta a establecer o registrar linaje. «Inscritos por genealogía» conserva el sentido genealógico y administrativo en español; «entre» refleja que el registro buscado pertenecía a ese grupo.
- source_word: וְלֹא נִמְצָא
  english_pob_choice: but it was not found
  chosen_spanish: pero no se encontró
  alternatives_spanish:
  - pero no apareció
  - pero no fue hallado
  lexicon: HALOT
  rationale: El verbo pasivo singular se refiere al registro implícito, no a las personas. «No se encontró» es la forma más natural y precisa en español para ese resultado documental.
- source_word: וַיְגֹאֲלוּ
  english_pob_choice: they were excluded
  chosen_spanish: fueron excluidos
  alternatives_spanish:
  - fueron descalificados
  - quedaron excluidos
  - fueron apartados
  lexicon: HALOT
  rationale: El valor contextual del verbo es quedar fuera del acceso sacerdotal por no poder verificar la genealogía. «Fueron excluidos» preserva el resultado práctico sin introducir una traducción demasiado técnica o ritualizada.
- source_word: מִן הַכְּהֻנָּה
  english_pob_choice: from the priesthood
  chosen_spanish: del sacerdocio
  alternatives_spanish:
  - de la función sacerdotal
  - del oficio sacerdotal
  - del ministerio sacerdotal
  lexicon: HALOT
  rationale: כְּהֻנָּה puede rendirse como «sacerdocio» u «oficio sacerdotal». Aquí «del sacerdocio» es claro, directo y suficientemente formal para el contexto bíblico español.
theological_decisions:
- issue: Exclusión sacerdotal por genealogía no verificable
  english_pob_reading: they were excluded from the priesthood
  chosen_spanish_reading: fueron excluidos del sacerdocio
  alternative_spanish_readings:
  - fueron descalificados para el sacerdocio
  - quedaron fuera del sacerdocio
  rationale: La traducción mantiene la consecuencia institucional del texto sin convertir el verbo en una afirmación ritual más fuerte de lo que el hebreo obliga. El énfasis está en la imposibilidad de verificar el linaje, que produce exclusión del cargo.
  doctrine_reference: Nm 3:10; Esd 2:62
translation_notes:
  revision_awareness: Se mantuvo el acuerdo alto del audit trail inglés y no se introdujeron cambios de sentido. La principal adaptación fue escoger un español más natural («se encontró», «sacerdocio») sin perder el matiz administrativo-genealógico del hebreo.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - «Inscritos por genealogía» mantiene la relación entre registro escrito y verificación de linaje, evitando una paráfrasis más libre.
  - «Fueron excluidos» sigue la decisión auditada del POB de expresar el resultado funcional del verbo en vez de forzar un término técnico ritual.
