base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/024/022.yaml
  text: But King Joash did not remember the kindness that Jehoiada his father had shown him[a], and he killed his son. As he was dying, he said[c][b], “May Yahweh see and require it.”
  footnotes:
  - marker: a
    text: Or 'the loyalty' or 'the covenant faithfulness' that Jehoiada had shown him.
    reason: lexical_alternative
  - marker: b
    text: '''His father'' likely reflects Jehoiada''s fatherly role toward Joash rather than biological paternity.'
    reason: cultural_note
  - marker: c
    text: Or 'May the LORD see and require it.' The Hebrew verb can carry the sense of seeking out wrongdoing in order to hold someone accountable.
    reason: lexical_alternative
