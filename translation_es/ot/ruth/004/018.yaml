  source_alignment_summary: 'El borrador refleja correctamente la estructura y el sentido básico del hebreo: una fórmula introductoria de genealogía seguida por la afirmación de que Pérez engendró a Hezrón. También conserva la alternativa léxica de תּוֹלְדוֹת en nota. Sin embargo, la forma verbal española elegida para הוֹלִיד puede ajustarse mejor al uso genealógico del original.'
