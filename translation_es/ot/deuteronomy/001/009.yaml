translation:
  language: es
  text: 'Y les dije en aquel tiempo[a]: «No puedo cargar con ustedes yo solo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «No puedo llevar la carga de ustedes yo solo» o «No puedo llevarlos yo solo». El verbo hebreo puede expresar llevar o cargar en sentido literal o figurado; aquí se refiere a que Moisés carga con la responsabilidad del pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  english_pob_choice: And I said
  chosen_spanish: Y les dije
  alternatives_spanish:
  - Entonces les dije
  - Así que les dije
  lexicon: HALOT
  rationale: La forma wayyiqtol introduce la siguiente acción narrativa; en español, «Y les dije» conserva el avance del relato sin añadir matiz temporal o causal que el hebreo no exige.
- source_word: אֲלֵכֶם
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: HALOT
  rationale: El destinatario es plural; en español, el clítico de objeto indirecto «les» comunica el plural de manera natural y sobria.
- source_word: בָּעֵת הַהִוא
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - en ese tiempo
  - entonces
  lexicon: HALOT
  rationale: La expresión idiomática hebrea se rinde bien con «en aquel tiempo», que mantiene la referencia temporal definida y el tono narrativo.
- source_word: לֹא אוּכַל
  english_pob_choice: I am not able
  chosen_spanish: No puedo
  alternatives_spanish:
  - No soy capaz
  - No me es posible
  lexicon: HALOT
  rationale: El hebreo expresa incapacidad; «No puedo» es la forma más natural en español y preserva la fuerza verbal directa.
- source_word: לְבַדִּי
  english_pob_choice: by myself
  chosen_spanish: yo solo
  alternatives_spanish:
  - por mí mismo
  - solo
  lexicon: HALOT
  rationale: La idea es que Moisés no puede hacerlo sin ayuda. «Yo solo» mantiene la autosuficiencia excluida y suena más natural que una repetición literal de «por mí mismo» en esta construcción.
- source_word: שְׂאֵת אֶתְכֶם
  english_pob_choice: to bear you
  chosen_spanish: llevarlos
  alternatives_spanish:
  - cargarlos
  - soportarlos
  lexicon: HALOT
  rationale: "נשא aquí es metafórico: no se trata de transporte físico, sino de llevar la carga/responsabilidad del pueblo. En español, «llevarlos» conserva la metáfora con suficiente amplitud; «soportarlos» desplazaría el sentido hacia tolerancia emocional, y «cargarlos» sonar\x12a más físico en exceso."
theological_decisions:
- issue: La metáfora de ‘llevar’ al pueblo implica responsabilidad de liderazgo, no solo capacidad física.
  english_pob_reading: The Hebrew verb can denote carrying in a literal or figurative sense; here it refers to Moses bearing responsibility for the people.
  chosen_spanish_reading: Aquí «llevarlos» se entiende como cargar con la responsabilidad del pueblo, no como traslado físico.
  alternative_spanish_readings:
  - cargarlos
  - soportarlos
  rationale: El contexto de Deuteronomio presenta la insuficiencia de Moisés para asumir por sí solo el peso del pueblo. La formulación española mantiene la metáfora sin explicarla en exceso en el texto principal.
  doctrine_reference: Responsabilidad pastoral/liderazgo representativo en el contexto del pacto; no es una declaración doctrinal sobre incapacidad moral sino sobre carga ministerial.
translation_notes:
  revision_awareness: La revisión inglesa eliminó el redundante ‘saying’ para mayor naturalidad, manteniendo intacta la afirmación central. La versión española omite cualquier equivalente explícito de ese marcador quotativo adicional y conserva el flujo narrativo directo. La opción final también preserva la metáfora de carga sin expandirla a una paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto cuando aparezca el tetragrámaton; en este versículo no aparece.
  - Se evita «señor» o fórmulas eclesiásticas innecesarias, dado que el texto trata de la carga de liderazgo de Moisés.
  - «Les dije» y «los» reflejan coherentemente el plural hebreo de la segunda persona y del objeto directo en español.
  - El tono es formal y bíblico, pero con sintaxis natural para lectura pública.
