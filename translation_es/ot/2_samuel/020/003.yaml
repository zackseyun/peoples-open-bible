base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/020/003.yaml
  text: When David came to his house at Jerusalem[a], the king took the ten women, the concubines whom he had left to keep the house, and put them in custody and provided for them, but he did not go in to them. So they were confined until the day of their death[c][b], living as widows.
  footnotes:
  - marker: a
    text: Or 'a house of custody' or 'confinement'; the Hebrew is literally 'house of custody/guard.'
    reason: lexical_alternative
  - marker: b
    text: '''He did not go in to them'' is a Hebrew euphemism for sexual relations.'
    reason: cultural_note
  - marker: c
    text: Literally 'widowhood of livingness'—that is, they lived like widows though David was still alive.
    reason: lexical_alternative
