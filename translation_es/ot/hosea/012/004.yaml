translation:
  language: es
  text: En el vientre agarró el talón de su hermano[a], y en su vigor contendió con Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tomó a su hermano por el talón». El verbo hebreo evoca el relato del nacimiento de Jacob y puede llevar el sentido ampliado de suplantar.
    reason: alternative_reading
  - marker: b
    text: O «contendió con un ser divino»; el versículo siguiente identifica a la figura como «el ángel», de modo que Oseas conserva la tensión en lugar de simplificarla.
    reason: alternative_reading
lexical_decisions:
- source_word: בַּבֶּטֶן
  english_pob_choice: In the womb
  chosen_spanish: En el vientre
  alternatives_spanish:
  - En el vientre materno
  - En el seno materno
  lexicon: HALOT
  rationale: בטן puede referirse al vientre/útero. En español, «vientre» conserva la imagen corporal y funciona naturalmente en un contexto prenatal sin volverlo más explicativo de lo que pide el hebreo.
- source_word: עָקַב
  english_pob_choice: grasped his brother’s heel
  chosen_spanish: agarró el talón de su hermano
  alternatives_spanish:
  - tomó el talón de su hermano
  - se aferró al talón de su hermano
  - suplantó a su hermano
  lexicon: HALOT
  rationale: El verbo se asocia al relato de Jacob y a la imagen concreta del talón. «Agarró el talón» preserva esa literalidad imagística en español; «suplantó» explicaría el sentido derivado, pero perdería la figura corporal que el texto evoca.
- source_word: אָחִיו
  english_pob_choice: his brother’s
  chosen_spanish: de su hermano
  alternatives_spanish:
  - a su hermano
  - de su hermano mayor
  lexicon: HALOT
  rationale: El posesivo español reproduce de manera natural la relación fraterna y mantiene la referencia a Esaú/Jacob sin añadir precisión no explícita en el verso.
- source_word: וּבְאוֹנוֹ
  english_pob_choice: in his strength
  chosen_spanish: en su vigor
  alternatives_spanish:
  - en su fuerza
  - con su vigor
  - en su poder
  lexicon: HALOT
  rationale: אוֹן puede significar fuerza, vigor o potencia. «Vigor» es una opción clara y digna en español; evita restringir innecesariamente el matiz a pura fuerza física o a una lectura sexualizada.
- source_word: שָׂרָה
  english_pob_choice: contended
  chosen_spanish: contendió
  alternatives_spanish:
  - luchó
  - se esforzó
  - peleó
  lexicon: HALOT
  rationale: «Contendió» conserva el tono formal del verbo de disputa/combate sin introducir la idea de victoria, que el hebreo no expresa aquí.
- source_word: אֶת אֱלֹהִים
  english_pob_choice: with God
  chosen_spanish: con Dios
  alternatives_spanish:
  - con un ser divino
  - contra Dios
  lexicon: HALOT
  rationale: La lectura principal mantiene «Dios» como referente del hebreo, tal como hace la tradición auditada. «Con» es la preposición idiomática en español para esta contienda y preserva la tensión del texto sin resolverla.
theological_decisions:
- issue: Referente de אֱלֹהִים en la lucha de Jacob
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - un ser divino
  - un ángel (a la luz del versículo siguiente)
  rationale: El texto hebreo dice אֱלֹהִים, y la traducción principal debe conservar ese referente. Como Oseas 12:5 identifica luego a la figura como «el ángel», la versión española mantiene la tensión teológica en vez de armonizarla en el cuerpo del verso.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete fuente; se siguió la lectura auditada de alta concordancia y se preservó la tensión léxica y teológica documentada.
  spanish_consistency_notes:
  - Se usó «Dios» para אֱלֹהִים en la lectura principal, conforme al paquete fuente, y «con» para la contienda por ser la construcción natural en español.
  - Se prefirió «vientre» sobre «útero» por ser más natural en un registro bíblico actual, sin perder el valor prenatal del hebreo.
  - Se evitó «siempre» o fórmulas explicativas como «suplantó» en el texto principal para no borrar la imagen concreta del talón.
  - El tono es formal y publicable, con vocabulario bíblico claro pero no arcaizante.
