translation:
  language: es
  text: Han edificado los lugares altos de Baal para quemar en el fuego a sus hijos varones, como holocaustos para Baal[a]—algo que yo no mandé ni hablé, ni surgió en mi corazón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Holocaustos’ refleja el término técnico de עֹלוֹת; también podría decirse ‘ofrendas quemadas’, pero el término tradicional mantiene mejor el valor sacrificial completo.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: ‘ni subió sobre mi corazón’. Se conserva ‘corazón’ para no sustituir la imagen hebrea por ‘mente’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָנוּ
  english_pob_choice: They have built
  chosen_spanish: Han edificado
  alternatives_spanish:
  - Edificaron
  - Han construido
  lexicon: HALOT
  rationale: El perfecto hebreo en denuncia profética expresa una acción ya realizada con vigencia presente; en español, el pretérito perfecto compuesto comunica bien ese efecto. Se prefiere 'edificado' para mantener el matiz cultual de levantar una instalación idolátrica y evitar una simplificación demasiado general.
- source_word: בָּמוֹת
  english_pob_choice: high places
  chosen_spanish: los lugares altos
  alternatives_spanish:
  - los altos
  - santuarios en las alturas
  lexicon: HALOT
  rationale: '''Lugares altos'' es una traducción transparente y ampliamente inteligible en español bíblico, conservando el sentido cultual de בָּמוֹת sin reemplazarlo por un término interpretativo excesivo.'
- source_word: הַבַּעַל / לַבָּעַל
  english_pob_choice: Baal
  chosen_spanish: Baal
  alternatives_spanish:
  - el Baal
  lexicon: HALOT
  rationale: Se conserva el nombre propio como en el contexto original. Aunque el hebreo usa artículo en una ocurrencia, en español resulta más natural y fiel al uso bíblico mantener 'Baal' sin artículo.
- source_word: לִשְׂרֹף
  english_pob_choice: to burn
  chosen_spanish: para quemar
  alternatives_spanish:
  - para hacer quemar
  - para incendiar
  lexicon: HALOT
  rationale: El infinitivo de propósito se traduce de forma natural con 'para', preservando la finalidad del acto. 'Quemar' es el verbo directo que mejor refleja el propósito sacrificial violento del texto.
- source_word: בְּנֵיהֶם
  english_pob_choice: their sons
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus hijos varones
  - a sus hijos/niños
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'sus hijos/varones', en español 'sus hijos' comunica la referencia filial sin forzar una distinción de género que aquí no añade claridad pastoral. Se evita 'niños' porque el texto apunta a descendencia filial en contexto de sacrificio.
- source_word: בָּאֵשׁ
  english_pob_choice: in the fire
  chosen_spanish: en el fuego
  alternatives_spanish:
  - con fuego
  - al fuego
  lexicon: HALOT
  rationale: La preposición con valor locativo se vierte naturalmente como 'en el fuego', manteniendo la imagen de la inmolación.
- source_word: עֹלוֹת
  english_pob_choice: as burnt offerings
  chosen_spanish: como holocaustos
  alternatives_spanish:
  - como ofrendas quemadas
  - como ofrendas completas
  lexicon: HALOT
  rationale: '''Holocaustos'' es el equivalente técnico tradicional en español para עֹלוֹת, y expresa la ofrenda completamente consumida por el fuego. Se mantiene el valor sacrificial formal del término.'
- source_word: אֲשֶׁר לֹא צִוִּיתִי
  english_pob_choice: something I did not command
  chosen_spanish: algo que yo no mandé
  alternatives_spanish:
  - algo que yo no ordené
  - algo que yo no he mandado
  lexicon: HALOT
  rationale: La cláusula relativa se vuelve de forma natural con 'algo que', porque en español el antecedente es toda la práctica recién descrita. 'Mandé' conserva el valor autoritativo del verbo hebreo.
- source_word: וְלֹא דִבַּרְתִּי
  english_pob_choice: nor did I speak
  chosen_spanish: ni hablé
  alternatives_spanish:
  - ni dije
  - ni hablé de ello
  lexicon: HALOT
  rationale: Se sigue de cerca la revisión del POB inglés, que ajustó la formulación a 'speak' sin añadir 'of'. En español, 'ni hablé' es breve, fiel y no introduce un complemento inexistente.
- source_word: וְלֹא עָלְתָה עַל לִבִּי
  english_pob_choice: nor did it arise in my heart
  chosen_spanish: ni subió a mi corazón
  alternatives_spanish:
  - ni vino a mi corazón
  - ni se me ocurrió
  lexicon: HALOT
  rationale: Se conserva la imaginería corporal del hebreo ('corazón') y el movimiento ascendente ('subió') para no resolver prematuramente la tensión antropomórfica. La formulación mantiene la fuerza del idiomático hebreo con español claro.
theological_decisions:
- issue: Tensión antropomórfica de לֵב / 'corazón' aplicado a Dios
  english_pob_reading: nor did it arise in my heart
  chosen_spanish_reading: ni subió a mi corazón
  alternative_spanish_readings:
  - ni vino a mi mente
  - ni se me ocurrió
  rationale: Se preserva el 'corazón' en vez de sustituirlo por 'mente', porque el hebreo conserva una imagen afectiva y antropomórfica que el POB quiere mantener audible. Esto evita suavizar la forma del texto y mantiene la afirmación divina de repudio total a ese culto.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Término sacrificial עֹלוֹת
  english_pob_reading: as burnt offerings
  chosen_spanish_reading: como holocaustos
  alternative_spanish_readings:
  - como ofrendas quemadas
  - como ofrendas totalmente quemadas
  rationale: '''Holocaustos'' es el término técnico bíblico-litúrgico que mejor comunica la ofrenda completamente consumida. Se evita diluir la dimensión sacrificial, que forma parte del reproche profético.'
  doctrine_reference: Lexical fidelity in cultic terminology
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: el POB ajustó ''speak of'' a ''speak'' y modernizó ''come up upon my heart'' hacia una forma más idiomática mientras preservaba el hebreo. La versión española sigue esa dirección al usar ''ni hablé'' y una expresión natural con ''corazón'' que mantiene la tensión del original sin recargarla.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma estándar del nombre divino en el proyecto, pero este versículo no contiene יהוה explícito.
  - Se mantiene la terminología cultual 'lugares altos' y 'holocaustos' para conservar el registro bíblico y el valor técnico de los términos.
  - No se traduce 'Baal' por un equivalente interpretativo; se conserva como nombre propio.
  - La secuencia negativa 'no... ni... ni...' reproduce el triple énfasis del hebreo en la negación total de autorización divina.
