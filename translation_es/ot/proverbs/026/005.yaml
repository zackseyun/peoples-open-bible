  yaml_path: translation/ot/proverbs/026/005.yaml
  text: Answer a fool according to his folly[b][a], lest he be wise in his own eyes.
  footnotes:
  - marker: a
    text: Or, 'Answer a fool as his folly deserves.' The Hebrew means to answer in a way fitting to his folly, not to imitate his foolishness.
    reason: lexical_alternative
  - marker: b
    text: This saying intentionally stands in tension with Proverbs 26:4; wisdom discerns when silence and when rebuttal are appropriate.
    reason: cross_reference
