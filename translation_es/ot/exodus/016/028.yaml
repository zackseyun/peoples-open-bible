review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: Yahvé habla a Moisés, la reprensión usa el modismo עַד אָנה = «¿Hasta cuándo?», y conserva «mis mandamientos y mis leyes» con nota para la alternativa de תורות como «instrucciones». Sin embargo, מֵאַנְתֶּם es 2ª persona plural perfecta en una pregunta retórica dirigida al pueblo por medio de Moisés; en español, «rehusarán» introduce un futuro menos natural y algo menos fiel que una forma de presente/perfecto de reproche continuo.'
  spanish_quality_summary: El español es claro y digno, pero «¿Hasta cuándo rehusarán guardar...?» suena algo rígido y menos idiomático en contexto. «¿Hasta cuándo se negarán a guardar...?» o «¿Hasta cuándo rehusarán obedecer...?» serían más naturales; además, la concordancia pragmática del reproche favorece presente perifrástico/futuro de reproche menos marcado. Conviene una leve reparación para mejorar naturalidad y fidelidad discursiva.
  glossary_alignment: 'Se alinea bien con la terminología del proyecto: יְהוָה → «Yahvé»; מִצְוֺתַי → «mis mandamientos»; וְתוֹרֹתָי → «mis leyes» con nota sobre «mis instrucciones». No hay conflicto doctrinal ni terminológico mayor.'
  issues:
  - severity: medium
    issue: «rehusarán» para מֵאַנְתֶּם
    rationale: Aunque el inglés auditado usó «will you refuse» por idiomaticidad inglesa, en español futuro simple aquí suena menos natural y desplaza el matiz de reproche por conducta ya persistente. Una forma como «se niegan a» expresa mejor la obstinación continuada en la pregunta retórica.
  - severity: low
    issue: Ubicación de la nota [a] en «Moisés[a]»
    rationale: La nota explica «torot / instrucciones», no «Moisés». El marcador debe anclarse en «leyes[a]» o frase equivalente para seguir la disciplina de notas del proyecto.
  revised_spanish_text: 'Entonces Yahvé dijo a Moisés: «¿Hasta cuándo se negarán a guardar mis mandamientos y mis leyes[a]?»'
  revised_footnotes:
  - marker: a
    text: O «mis instrucciones». El hebreo torot (plural de torah) puede denotar instrucción autorizada además de leyes.
    reason: lexical_alternative
  revision_rationale: Se corrige el verbo principal para un español más natural y más ajustado al reproche continuo del hebreo, y se mueve el marcador de nota al término que realmente comenta («leyes» / torot). No se requieren cambios doctrinales ni estructurales adicionales.
