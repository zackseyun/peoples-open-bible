revisions:
- from: Entonces Yahvé se aparecerá sobre ellos[a], y su flecha saldrá como relámpago[b]; y el Señor Yahvé hará sonar el cuerno y marchará en los torbellinos del sur.
  to: Entonces Yahvé aparecerá sobre ellos, y su flecha saldrá como relámpago; y el Señor Yahvé hará sonar el cuerno[a] y marchará en los torbellinos del sur[b].
  rationale: Se corrigió «se aparecerá» a «aparecerá» por naturalidad y fidelidad idiomática al nifal hebreo. También se reubicaron los marcadores de nota para que la nota cultural sobre shofar ancle a «cuerno» y la nota alternativa sobre Temán ancle a «del sur», conforme al contenido real de cada nota. El resto del texto se mantiene porque refleja adecuadamente el sentido del hebreo y la política terminológica del proyecto.
