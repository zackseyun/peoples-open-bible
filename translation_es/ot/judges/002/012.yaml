translation:
  language: es
  text: Y abandonaron a Yahvé[a], el Dios de sus padres, que los había sacado de la tierra de Egipto, y fueron tras otros dioses, de entre los dioses de los pueblos que estaban alrededor de ellos, y se postraron ante ellos, y provocaron a ira a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de los dioses de los pueblos circundantes». La frase hebrea también puede entenderse de manera más general como los dioses adorados por los pueblos que rodeaban a Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַזְבוּ
  english_pob_choice: abandoned
  chosen_spanish: abandonaron
  alternatives_spanish:
  - dejaron
  - abandonaron
  lexicon: HALOT
  rationale: עזב aquí expresa una deserción relacional y de alianza, no solo salida física. «Abandonaron» conserva esa fuerza mejor que un simple «dejaron» y suena natural en español actual.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio del texto hebreo. En español, «Yahvé» es la forma estándar adoptada para el Tetragrámaton en este proyecto, en vez de sustituirlo por un título.
- source_word: אֱלֹהֵי אֲבוֹתָם
  english_pob_choice: the God of their fathers
  chosen_spanish: el Dios de sus padres
  alternatives_spanish:
  - el Dios de sus antepasados
  - el Dios de sus padres
  lexicon: HALOT
  rationale: La fórmula patriarcal/covenantal se conserva de manera directa. «Padres» refleja el hebreo y mantiene la expresión bíblica tradicional sin volverla más genérica de lo necesario.
- source_word: הַמּוֹצִיא אוֹתָם מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: who had brought them out from the land of Egypt
  chosen_spanish: que los había sacado de la tierra de Egipto
  alternatives_spanish:
  - que los había sacado de la tierra de Egipto
  - que los había sacado de la tierra de Egipto
  lexicon: HALOT
  rationale: El participio atributivo identifica a Yahvé por el acto del éxodo. «Había sacado» comunica el hecho completo con naturalidad en español y conserva la referencia directa a Egipto.
- source_word: וַיֵּלְכ֞וּ אַחֲרֵ֣י
  english_pob_choice: went after
  chosen_spanish: fueron tras
  alternatives_spanish:
  - fueron tras
  - siguieron tras
  lexicon: HALOT
  rationale: La locución hebrea es idiomática y expresa adhesión/pursuita. «Fueron tras» preserva la imagen verbal sin sonar forzado en español.
- source_word: אֱלֹהִים אֲחֵרִים
  english_pob_choice: other gods
  chosen_spanish: otros dioses
  alternatives_spanish:
  - otros dioses
  - dioses ajenos
  lexicon: HALOT
  rationale: El adjetivo significa «otros». Se evita «ajenos» porque añade una interpretación que el hebreo no exige aquí.
- source_word: מֵאֱלֹהֵי הָעַמִּים אֲשֶׁר סְבִיבוֹתֵיהֶם
  english_pob_choice: from among the gods of the peoples who were around them
  chosen_spanish: de entre los dioses de los pueblos que estaban alrededor de ellos
  alternatives_spanish:
  - de entre los dioses de los pueblos que estaban alrededor de ellos
  - de los dioses de los pueblos que estaban alrededor de ellos
  - de entre los dioses de los pueblos que los rodeaban
  lexicon: HALOT
  rationale: El מִן partitivo queda explícito con «de entre», como en la lectura auditada del inglés. La frase conserva la relación con los pueblos circundantes sin expandirla más allá del hebreo.
- source_word: וַיִּשְׁתַּחֲו֖וּ לָהֶם
  english_pob_choice: they bowed down to them
  chosen_spanish: se postraron ante ellos
  alternatives_spanish:
  - se postraron ante ellos
  - se inclinaron ante ellos
  - se postraron ante ellos
  lexicon: HALOT
  rationale: El verbo expresa postración física y normalmente implica culto. «Se postraron ante ellos» conserva el gesto concreto y deja que el sentido idolátrico emerja del contexto.
- source_word: וַיַּכְעִ֖סוּ אֶת יְהוָה
  english_pob_choice: provoked Yahweh to anger
  chosen_spanish: provocaron a Yahvé a ira
  alternatives_spanish:
  - provocaron a Yahvé a ira
  - irritaron a Yahvé
  - provocaron la ira de Yahvé
  lexicon: HALOT
  rationale: 'El hifil de כעס tiene valor causativo: provocar a ira. «Provocaron a Yahvé a ira» conserva esa fuerza sin suavizarla a un simple «enojaron».'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se conserva el nombre propio en español con la forma «Yahvé», en continuidad con la política del proyecto de no ocultar el nombre divino detrás de una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Peso teológico de la apostasía de Israel
  english_pob_reading: Retain relational/covenantal language without adding interpretive expansion
  chosen_spanish_reading: Conservar lenguaje relacional y de alianza sin ampliar interpretativamente
  alternative_spanish_readings:
  - Explicitar «ruptura de alianza» en el texto principal
  - Usar una glosa doctrinal en el cuerpo del versículo
  rationale: El verso describe abandono, seguimiento de otros dioses, postración e irritación de Yahvé. La traducción mantiene ese peso con verbos concretos y no añade comentario doctrinal que el hebreo no formula explícitamente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión final del inglés auditado: se mantuvo la estructura «de entre los dioses de los pueblos» para reflejar el valor partitivo de מִן, y se evitó introducir una segunda aparición innecesaria del sujeto antes de «se postraron».'
  spanish_consistency_notes:
  - Se emplea «Yahvé» de manera consistente para יְהוָה.
  - Se conserva el contraste entre «Dios» y «otros dioses» sin nivelarlo.
  - «Se postraron» mantiene el matiz físico/cultual del hebreo.
  - La nota [a] está anclada en el nombre divino para permitir la alternativa de lectura sin alterar el cuerpo principal.
