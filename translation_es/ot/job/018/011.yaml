translation:
  language: es
  text: Terrores[a] lo espantan por todos lados, y lo ahuyentan a sus pies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "a sus talones". El hebreo dice literalmente "a sus pies"; puede describir terrores que lo acosan mientras camina, paso a paso.
    reason: lexical_alternative
lexical_decisions:
- source_word: סָבִיב
  english_pob_choice: on every side
  chosen_spanish: por todos lados
  alternatives_spanish:
  - alrededor
  - en derredor
  - por todas partes
  lexicon: HALOT
  rationale: El adverbio hebreo expresa cerco desde todas direcciones. "Por todos lados" conserva la idea de encierro y suena natural en español contemporáneo, como equivalente idiomático de la imagen inglesa.
- source_word: בִּעֲתֻהוּ
  english_pob_choice: frighten him
  chosen_spanish: lo espantan
  alternatives_spanish:
  - lo aterrorizan
  - lo asustan
  lexicon: HALOT
  rationale: El verbo transmite sobresalto/terror súbito. "Lo espantan" mantiene la fuerza poética y el efecto de alarma, sin recargar la línea con un término demasiado técnico o redundante.
- source_word: בַלָּהוֹת
  english_pob_choice: Terrors
  chosen_spanish: Terrores
  alternatives_spanish:
  - horrores
  - espantos
  - cosas espantosas
  lexicon: HALOT
  rationale: El sustantivo plural nombra terrores o espantos. Se mantiene "Terrores" por su correspondencia directa y por conservar el tono del poema sapiencial; la mayúscula inicial es solo de apertura de frase.
- source_word: וֶהֱפִיצֻהוּ
  english_pob_choice: and scatter him
  chosen_spanish: y lo dispersan
  alternatives_spanish:
  - y lo esparcen
  - y lo ahuyentan
  - y lo destierran
  lexicon: HALOT
  rationale: El causativo de פוץ expresa dispersar/esparcir. "Lo dispersan" reproduce la imagen sin introducir una localización o resultado adicional que el hebreo no explicita.
- source_word: לְרַגְלָיו
  english_pob_choice: at his feet
  chosen_spanish: a sus pies
  alternatives_spanish:
  - en sus pies
  - a sus talones
  - junto a sus pies
  lexicon: HALOT
  rationale: La frase es literalmente "a/para sus pies". En español, "a sus pies" conserva la literalidad y sigue siendo inteligible; además mantiene abierta la ambigüedad de que los terrores lo acompañan en cada paso.
translation_notes:
  revision_awareness: 'Se incorporó la observación del control de calidad: aunque hubo señalamiento de revisión mayor, el texto final preserva la imagen hebrea literal de לְרַגְלָיו sin convertirla en una paráfrasis interpretativa. La nota mantiene la alternativa semántica relevante en español.'
  spanish_consistency_notes:
  - Se preservó el paralelismo poético con dos miembros breves y simétricos.
  - Se evitó sustituir el plural intensivo "Terrores" por un singular abstracto.
  - '"A sus pies" mantiene la tensión entre literalidad e imagen de persecución continua.'
