translation:
  language: es
  text: Cuando nos informaron que no habían hallado fuego[a], sino agua espesa, les ordenó que sacaran un poco y lo llevaran. Y, cuando se habían traído los elementos para los sacrificios[b], Nehemías ordenó a los sacerdotes rociar el agua sobre la leña y sobre lo que estaba encima de ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «agua densa» o «líquido espeso». La expresión griega es inusual y se conserva de manera bastante literal porque el relato depende del carácter inesperado de la sustancia.
    reason: lexical_alternative
  - marker: b
    text: La expresión griega dice literalmente «las cosas de los sacrificios», un giro elíptico para los materiales u objetos relacionados con la ofrenda sacrificial.
    reason: lexical_alternative
lexical_decisions:
- source_word: διεσάφησαν
  english_pob_choice: reported clearly
  chosen_spanish: nos informaron
  alternatives_spanish:
  - explicaron
  - reportaron claramente
  - nos dieron cuenta
  lexicon: LSJ
  rationale: El verbo griego indica que hicieron una comunicación clara o detallada. En español, «nos informaron» conserva el valor de reporte sin volver torpe la frase; el matiz de claridad queda implícito en el contenido comunicado.
- source_word: μὴ εὑρηκέναι πῦρ ἀλλὰ ὕδωρ παχύ
  english_pob_choice: had found no fire, but thick water
  chosen_spanish: no habían hallado fuego, sino agua espesa
  alternatives_spanish:
  - no habían encontrado fuego, sino agua densa
  - no habían hallado fuego, sino líquido espeso
  - no habían encontrado fuego, sino agua gruesa
  lexicon: LSJ
  rationale: Se conserva la extrañeza del giro griego. «Agua espesa» mantiene la literalidad suficiente de ὕδωρ παχύ y deja visible la rareza narrativa que importa al relato. «No habían hallado» refleja bien el infinitivo perfecto con sujeto implícito en el reporte.
- source_word: ἀποβλίψαντας
  english_pob_choice: draw some out
  chosen_spanish: al tomarla, la llevaran
  alternatives_spanish:
  - la sacaran
  - la extrajeran
  - la sacaran con un recipiente
  lexicon: LSJ
  rationale: El participio sugiere tomar parte del líquido y transportarlo. En español, «al tomarla, la llevaran» evita especificar un instrumento no dado por el texto y conserva la idea de extraer y traer.
- source_word: ἀνηνέχθη τὰ τῶν θυσιῶν
  english_pob_choice: the things for the sacrifices had been brought forward
  chosen_spanish: fueron llevados los elementos de los sacrificios
  alternatives_spanish:
  - se habían traído los elementos del sacrificio
  - fueron presentados los elementos para los sacrificios
  - se habían llevado las cosas de los sacrificios
  lexicon: LSJ
  rationale: La expresión griega es elíptica. «Los elementos de los sacrificios» mantiene la amplitud semántica sin concretar más de lo que el texto dice. El pasivo español refleja la llegada o puesta en lugar de esos elementos.
- source_word: ἐπιρᾶναι
  english_pob_choice: to sprinkle
  chosen_spanish: rociar
  alternatives_spanish:
  - asperjar
  - echar
  - salpicar
  lexicon: LSJ
  rationale: En contexto ritual, el verbo designa aplicar agua sobre objetos. «Rociar» es natural en español y suficientemente cercano a la acción cultual, sin perder el carácter material del gesto.
- source_word: τά τε ξύλα καὶ τὰ ἐπικείμενα
  english_pob_choice: both the wood and what was laid on it
  chosen_spanish: sobre la leña y sobre lo que estaba encima de ella
  alternatives_spanish:
  - sobre la leña y sobre lo que había encima
  - sobre la madera y sobre lo puesto encima
  - sobre la leña y sobre lo colocado encima
  lexicon: LSJ
  rationale: «Leña» comunica mejor en español el uso de ξύλα como piezas para el fuego del altar. «Lo que estaba encima de ella» preserva la amplitud de τὰ ἐπικείμενα sin añadir detalles no explicitados.
- source_word: Νεεμίας
  english_pob_choice: Nehemiah
  chosen_spanish: Nehemías
  alternatives_spanish:
  - Nehemía
  lexicon: standard onomastics
  rationale: Se usa la forma usual en español para el nombre propio, manteniendo reconocimiento lector y consistencia bíblica.
theological_decisions:
- issue: Naturaleza de ὕδωρ παχύ
  english_pob_reading: thick water
  chosen_spanish_reading: agua espesa
  alternative_spanish_readings:
  - agua densa
  - líquido espeso
  rationale: La frase conserva la rareza del objeto encontrado, sin suavizarla hacia una explicación más normalizada. Esto respeta el efecto narrativo del texto griego, que enfatiza una sustancia insólita antes del milagro.
  doctrine_reference: Fidelidad al detalle narrativo; no armonizar ni normalizar el texto.
- issue: Expresión elíptica τὰ τῶν θυσιῶν
  english_pob_reading: the things for the sacrifices
  chosen_spanish_reading: los elementos de los sacrificios
  alternative_spanish_readings:
  - las cosas de los sacrificios
  - los materiales de los sacrificios
  rationale: La frase no identifica de manera explícita los objetos, así que la traducción debe preservar la indeterminación. «Elementos» funciona en español bíblico actual como equivalente amplio y evita convertir la elipsis en una especificación interpretativa.
  doctrine_reference: No añadir contenido no explicitado por el texto; mantener la elipsis.
- issue: Nombre propio Νεεμίας
  english_pob_reading: Nehemiah
  chosen_spanish_reading: Nehemías
  alternative_spanish_readings:
  - Nehemía
  rationale: Es una decisión de forma nominal, no doctrinal. Se adopta la forma española convencional para facilitar la lectura y la identificación del personaje.
  doctrine_reference: Transliteración y uso onomástico en la lengua meta.
