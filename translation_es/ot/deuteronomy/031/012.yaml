base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/031/012.yaml
  text: Assemble the people—the men[a], the women, the little children, and the sojourner within your gates—so that they may hear, and so that they may learn and fear Yahweh your God[d][c][b], and be careful to do all the words of this law.
  footnotes:
  - marker: a
    text: Or 'the resident foreigner' for 'the sojourner.' The Hebrew term refers to a non-native resident living among Israel.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'within your gates,' an idiom referring to those living within your towns or community.
    reason: cultural_note
  - marker: c
    text: Or 'revere the LORD your God.' The Hebrew verb includes the sense of reverent fear and obedient awe.
    reason: lexical_alternative
  - marker: d
    text: Or 'this instruction.' The Hebrew torah can mean 'instruction' as well as 'law'; here 'law' fits the covenantal setting.
    reason: lexical_alternative
