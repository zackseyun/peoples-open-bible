id: 2TI.3.3
reference: 2 Timothy 3:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἄστοργοι, ἄσπονδοι, διάβολοι, ἀκρατεῖς, ἀνήμεροι, ἀφιλάγαθοι,
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/003/003.yaml
  text: without natural affection, irreconcilable, slanderous, without self-control, savage, without love for what is good,
translation:
  language: ko
  text: 따뜻한 정이 없고, 화해할 줄 모르고, 헐뜯고[a], 자제하지 못하고, 사납고, 선한 것을 사랑하지 않고,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 διάβολοι는 여기서 마귀가 아니라 「헐뜯는 자·중상자」를 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄστοργοι
  english_pob_choice: without natural affection
  chosen_korean: 따뜻한 정이 없고
  alternatives_korean:
  - 가족애가 없고
  - 정 없고
  lexicon: BDAG
  rationale: στοργή는 가족·혈연의 자연스러운 정. 「따뜻한 정」이 그 친밀한 정서를 한국어로 자연스럽게 담는다.
- source_word: ἄσπονδοι
  english_pob_choice: irreconcilable
  chosen_korean: 화해할 줄 모르고
  alternatives_korean:
  - 휴전을 모르고
  - 무자비하고
  lexicon: BDAG
  rationale: ἄσπονδος는 「휴전·화해를 거부하는」을 직역하나, 한국어 「화해할 줄 모르다」가 그 의미를 자연스럽게 담는다.
- source_word: διάβολοι
  english_pob_choice: slanderous
  chosen_korean: 헐뜯고
  alternatives_korean:
  - 비방하고
  - 중상하고
  lexicon: BDAG
  rationale: 본 절의 διάβολος는 마귀가 아니라 「헐뜯는 자」를 가리킨다. 2절의 βλάσφημοι(비방하고)와 구별하기 위해 「헐뜯다」로 옮긴다.
- source_word: ἀκρατεῖς
  english_pob_choice: without self-control
  chosen_korean: 자제하지 못하고
  alternatives_korean:
  - 절제 없고
  - 자기를 다스리지 못하고
  lexicon: BDAG
  rationale: 1:7의 「절제」(σωφρονισμός)와 구별하여 「자제」로 옮긴다. ἀ-κρατής는 「자기 조절의 힘이 없음」.
- source_word: ἀνήμεροι
  english_pob_choice: savage
  chosen_korean: 사납고
  alternatives_korean:
  - 잔인하고
  - 야만적이고
  lexicon: BDAG
  rationale: ἀνήμερος는 「길들지 않은·사나운」. 「사납다」가 한국어로 자연스럽다.
- source_word: ἀφιλάγαθοι
  english_pob_choice: without love for what is good
  chosen_korean: 선한 것을 사랑하지 않고
  alternatives_korean:
  - 선을 미워하고
  - 선한 것을 좋아하지 않고
  lexicon: BDAG
  rationale: ἀ-φιλ-άγαθος를 풀어 「선한 것을 사랑하지 않다」로 옮긴다. 본 절의 「~없고/못하고/않고」 운율을 살린다.
