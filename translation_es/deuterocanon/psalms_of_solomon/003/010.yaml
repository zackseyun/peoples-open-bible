translation:
  language: es
  text: Y Yahvé purifica a todo hombre piadoso[a] y su casa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «devoto». «Piadoso» intenta reflejar el matiz de ὅσιος sin convertirlo en un tecnicismo eclesiástico.
    reason: lexical_alternative
  - marker: b
    text: O «su hogar» o «su casa como unidad doméstica». Se mantiene «casa» para preservar la repetición de οἶκος en el pasaje.
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: BDAG
  rationale: El texto griego con artículo remite al título divino; por la norma del proyecto para יהוה/YHWH, el equivalente español principal es «Yahvé». No se usa «el Señor» como ocultamiento, aunque puede sonar más idiomático en algunas tradiciones.
- source_word: καθαρίζει
  english_pob_choice: cleanses
  chosen_spanish: limpia
  alternatives_spanish:
  - purifica
  - lava
  lexicon: BDAG
  rationale: «Limpia» conserva el presente verbal y la acción de quitar impureza de manera natural en español. «Purifica» sería posible, pero suena más interpretativo y menos directo en este contexto.
- source_word: πᾶν ἄνδρα
  english_pob_choice: every devout man
  chosen_spanish: todo hombre
  alternatives_spanish:
  - cada hombre
  - todo varón
  lexicon: BDAG
  rationale: El griego es distributivo y masculino explícito; se mantiene «hombre». El adjetivo griego no obliga en español a añadir «devoto» como calificativo fijo si el rasgo se expresa por el adjetivo siguiente.
- source_word: ὅσιον
  english_pob_choice: devout
  chosen_spanish: piadoso
  alternatives_spanish:
  - devoto
  - santo
  - piadoso y fiel
  lexicon: BDAG
  rationale: «Piadoso» comunica mejor la piedad reverente/covenantal que «devoto» en español actual y evita una posible lectura meramente emocional. «Santo» podría sugerir consagración más que conducta piadosa.
- source_word: οἶκον
  english_pob_choice: household
  chosen_spanish: casa
  alternatives_spanish:
  - hogar
  - familia
  - hogar y casa
  lexicon: BDAG
  rationale: El expediente revisado favorece mantener la repetición de οἶκος/οἶκον en la cadena del pasaje. Por eso se prefiere «casa» aquí, aunque el sentido pueda abarcar más que el edificio físico.
translation_notes:
  revision_awareness: La revisión auditada corrigió una tendencia previa a traducir οἶκος como «household»; se ha seguido la adjudicación posterior que privilegia «house/casa» para sostener la cadena léxica entre 3:8 y 3:10. No se introducen enmiendas textuales al griego; la decisión es léxica y contextual.
  spanish_consistency_notes:
  - Se mantiene el nombre divino «Yahvé» según la política del proyecto.
  - Se preserva la repetición de «casa» para alinearse con la cadena de οἶκος en el contexto inmediato.
  - El tono es sobrio y publicable, evitando calcos innecesarios.
