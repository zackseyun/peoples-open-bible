translation:
  language: es
  text: ¿Por qué hay un precio en la mano del necio[a] para comprar sabiduría, si no tiene entendimiento?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «y no hay corazón». En hebreo, «corazón» puede referirse a la facultad interior de entendimiento, juicio o voluntad.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Para qué
  - ¿Por qué razón
  lexicon: HALOT
  rationale: Interrogativo natural para reproducir la pregunta retórica del hebreo sin forzar una estructura extraña en español.
- source_word: מְחִיר
  english_pob_choice: a price
  chosen_spanish: un precio
  alternatives_spanish:
  - un pago
  - el costo
  - precio
  lexicon: HALOT
  rationale: Conserva el valor comercial del sustantivo y mantiene la imagen de compra presente en el hebreo.
- source_word: בְּיַד
  english_pob_choice: in the hand of
  chosen_spanish: en la mano de
  alternatives_spanish:
  - a disposición de
  - en posesión de
  lexicon: HALOT
  rationale: Se mantiene la imagen hebrea de posesión o control mediante una expresión literal y clara en español.
- source_word: כְּסִיל
  english_pob_choice: a fool
  chosen_spanish: el necio
  alternatives_spanish:
  - el insensato
  - el tonto
  lexicon: HALOT
  rationale: En el lenguaje sapiencial, 'necio' comunica mejor la carga moral y cognitiva del término que 'tonto'.
- source_word: לִקְנוֹת
  english_pob_choice: to buy
  chosen_spanish: para comprar
  alternatives_spanish:
  - para adquirir
  - para obtener
  lexicon: HALOT
  rationale: Verbo comercial directo que corresponde al campo semántico de קנה y sostiene la metáfora del precio.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - sensatez
  lexicon: HALOT
  rationale: La palabra sapiencial básica del libro; 'sabiduría' es el equivalente más directo y reconocido.
- source_word: וְלֶב אָיִן
  english_pob_choice: when he has no sense
  chosen_spanish: si no tiene entendimiento
  alternatives_spanish:
  - si no tiene juicio
  - porque no tiene corazón
  lexicon: HALOT
  rationale: En español, 'entendimiento' expresa bien la función del 'corazón' hebreo como facultad interior de juicio y comprensión, sin introducir una formulación idiomática ajena al texto base.
theological_decisions:
- issue: Valor antropológico de 'corazón' (לֶב) como facultad interior
  english_pob_reading: Literally, 'and there is no heart.' In Hebrew, 'heart' can refer to the inner faculty of understanding, judgment, or will.
  chosen_spanish_reading: '''si no tiene entendimiento'' traduce la idea funcional del hebreo sin ocultar que el término apunta a la capacidad interna de juicio.'
  alternative_spanish_readings:
  - '''y no tiene corazón'''
  - '''si le falta corazón'''
  - '''si no tiene juicio'''
  rationale: El hebreo usa 'corazón' para una facultad interior más amplia que la emoción. En español, 'entendimiento' transmite esa función cognitiva de forma clara y publicable, evitando una literalidad que podría sonar equívoca.
  doctrine_reference: Antropología bíblica sapiencial; función del לב como sede de discernimiento
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que sustituyó 'no heart for it' por 'no sense' para acercarse más directamente al hebreo 'no heart'. La versión española opta por 'no tiene entendimiento' para conservar la misma precisión idiomática sin añadir un complemento ajeno al hebreo.
  spanish_consistency_notes:
  - Se mantuvo 'necio' para כְּסִיל, en línea con el registro sapiencial de Proverbios.
  - Se conservó la metáfora de 'la mano' para בְּיַד.
  - '''Sabiduría'' se usa como equivalente estándar de חָכְמָה en Proverbios.'
  - La nota al pie preserva la tensión entre el sentido literal de 'corazón' y su función antropológica hebrea.
