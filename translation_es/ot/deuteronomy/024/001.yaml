review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la sintaxis casuística del hebreo, la secuencia legal del acto y la ambigüedad de עֶרְוַת דָּבָר, preservada además en nota. Sin embargo, la apertura con «Cuando» debilita el valor condicional señalado por el POB inglés y puede sonar más temporal/generlizante que hipotético-legal. También «la despide de su casa» atenúa el matiz espacial explícito de מִבֵּיתוֹ («fuera de su casa»).
  spanish_quality_summary: 'El español es claro y digno, pero conviene un ajuste menor para mayor naturalidad jurídica y mayor cercanía al original: «Si un hombre toma esposa…» comunica mejor el supuesto legal, y «la envía fuera de su casa» mantiene el componente espacial concreto del hebreo. El resto del verso es legible y adecuado.'
  glossary_alignment: No hay términos del glosario maestro especialmente implicados aquí. La decisión «toma esposa» es aceptable como preservación idiomática. «Certificado de divorcio» se alinea bien con la función legal de סֵפֶר כְּרִיתֻת. La nota sobre «alguna indecencia» mantiene correctamente la ambigüedad léxica documentada.
  issues:
  - severity: medium
    issue: «Cuando» para כִּי al inicio del caso legal
    rationale: Aunque puede funcionar en español jurídico, aquí el POB documenta explícitamente un valor condicional de protasis. «Si» preserva mejor el carácter hipotético del caso y evita una lectura meramente temporal o habitual.
  - severity: low
    issue: «la despide de su casa» atenúa «fuera de su casa»
    rationale: El hebreo incluye el movimiento de salida desde la casa. «Despide» transmite liberación formal, pero pierde parte de la imaginería espacial concreta que el POB inglés conservó.
  revised_spanish_text: Si un hombre toma esposa y se casa con ella, y sucede que ella no halla favor en sus ojos porque ha hallado en ella alguna indecencia[a], y le escribe un certificado de divorcio, lo pone en su mano y la envía fuera de su casa,
  revised_footnotes:
