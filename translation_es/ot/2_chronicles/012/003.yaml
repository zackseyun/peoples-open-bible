revisions:
- from: 'con 1.200 carros[a] y 60.000 jinetes, y el pueblo que vino con él de Egipto estaba sin número: libios, sukitas[b], y cusitas[c].'
  to: 'con 1.200 carros y 60.000 jinetes, y el pueblo que vino con él de Egipto era innumerable[a]: libios, sukitas[b] y cusitas[c].'
  rationale: Se corrigió la ubicación de la nota [a] para que corresponda a וְאֵין מִסְפָּר, se mejoró la naturalidad de la expresión de innumerabilidad, y se mantuvieron los etnónimos documentados por la auditoría inglesa. La cláusula relativa se deja con «que vino» por concordancia natural con «el pueblo», mientras el sentido plural del hebreo queda absorbido por el sustantivo colectivo; el cambio realmente necesario era evitar la forma menos natural «estaba sin número».
