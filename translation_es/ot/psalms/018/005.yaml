translation:
  language: es
  text: Las cuerdas de la muerte me rodearon[a], y los torrentes[b] de destrucción me aterraron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me cercaron» o «me envolvieron»; el hebreo expresa ser rodeado o cercado.
    reason: alternative_reading
  - marker: b
    text: O «corrientes» o «avenidas»; el hebreo נַחֲלֵי puede evocar torrentes, arroyos estacionales o cauces desbordados. «Belial» también es posible si se toma בְלִיַּעַל como nombre propio, pero aquí es más probable que funcione como sustantivo común con sentido de ruina o destrucción.
    reason: alternative_reading
lexical_decisions:
- source_word: אֲפָפוּנִי
  english_pob_choice: surrounded me
  chosen_spanish: me rodearon
  alternatives_spanish:
  - me cercaron
  - me envolvieron
  lexicon: HALOT
  rationale: El verbo expresa ser rodeado o cercado. «Me rodearon» comunica con naturalidad la imagen sin perder la fuerza poética.
- source_word: חֶבְלֵי
  english_pob_choice: cords of
  chosen_spanish: lazos de
  alternatives_spanish:
  - cuerdas de
  - cordones de
  lexicon: HALOT
  rationale: חבל puede referirse a cuerdas/cables y, en poesía, a vínculos constriñentes. «Lazos» conserva la idea de algo que aprieta o aprisiona en español natural, sin alejarse del campo semántico de cuerda/vínculo.
- source_word: מָוֶת
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - muerte
  lexicon: HALOT
  rationale: Correspondencia directa y estándar.
- source_word: נַחֲלֵי
  english_pob_choice: torrents of
  chosen_spanish: las corrientes de
  alternatives_spanish:
  - los torrentes de
  - las avenidas de
  lexicon: HALOT
  rationale: נחל puede aludir a arroyo, torrente o cauce de corriente estacional. «Corrientes» mantiene el flujo amenazante sin sonar excesivamente técnico o arcaico en español.
- source_word: בְלִיַּעַל
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - maldad
  - Belial
  lexicon: HALOT
  rationale: Aquí el POB inglés opta por un valor común de ruina/destrucción en vez del nombre propio. «Destrucción» conserva ese efecto y evita introducir una personificación no requerida por el verso.
- source_word: יְבַעֲתוּנִי
  english_pob_choice: terrified me
  chosen_spanish: me aterraron
  alternatives_spanish:
  - me atemorizaron
  - me llenaron de terror
  lexicon: HALOT
  rationale: El verbo expresa terror súbito. «Me aterraron» es fuerte, claro y acorde con el paralelismo del poema.
theological_decisions:
- issue: Cómo renderizar בְלִיַּעַל sin imponer la figura posterior de 'Belial' como nombre propio
  english_pob_reading: 'common noun: ''worthlessness'' / later revised to ''destruction'' in context'
  chosen_spanish_reading: 'sustantivo común: ''destrucción'''
  alternative_spanish_readings:
  - Belial
  - maldad
  - ruina
  - indignidad
  rationale: En este contexto poético, el hebreo funciona mejor como una descripción de fuerzas destructivas que como nombre propio. «Destrucción» sigue la revisión del POB inglés y evita una carga doctrinal ajena al pasaje.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: He seguido el estado revisado más reciente del POB inglés, que cambió el valor de בְלִיַּעַל de una idea de 'worthlessness' a 'destruction' para expresar con más naturalidad la fuerza de ruina en el contexto. Mantengo el resto de las decisiones léxicas de manera coherente con el audit trail.
  spanish_consistency_notes:
  - He evitado 'SEÑOR' o equivalentes porque este versículo no contiene el nombre divino.
  - He usado un registro poético claro y actual, sin arcaísmos innecesarios.
  - 'He preservado la doble imagen paralela: cercamiento de la muerte y amenaza de corrientes destructivas.'
