revisions:
- from: El camino de los pecadores[a] está empedrado con piedras, y al final de él hay un pozo[b] de Hades.
  to: El camino de los pecadores[a] está allanado con piedras, y al final hay una fosa[b] del Hades.
  rationale: La revisión mantiene el sentido del griego y del POB en inglés, pero mejora la naturalidad y la precisión léxica en español. «Allanado con piedras» evita la redundancia de «empedrado con piedras» y refleja bien ὡμαλισμένη ἐκ λίθων. «Fosa del Hades» representa mejor βόθρος ᾅδου que «pozo de Hades» y suena más idiomático en español bíblico moderno.
