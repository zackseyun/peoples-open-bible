translation:
  language: es
  text: 'Cuando todo el pueblo lo vio, cayeron rostro en tierra y dijeron: «¡Yahvé es Dios! ¡Yahvé es Dios!»[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yahvé, él es el Dios; Yahvé, él es el Dios». El artículo en «el Dios» marca a Yahvé como el Dios verdadero en contraste con Baal; en español normalmente se expresa como «Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: saw it
  chosen_spanish: lo vio
  alternatives_spanish:
  - vio
  - lo contempló
  lexicon: HALOT
  rationale: El verbo פשוטamente significa 'ver'. En español, 'lo vio' conserva el objeto implícito del contexto inmediato (el fuego y la manifestación recién descritos) sin añadir interpretación.
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo allí
  - toda la gente
  lexicon: HALOT
  rationale: '''Pueblo'' es el equivalente natural de עָם en este contexto colectivo y narrativo; mantiene el registro bíblico sin volverlo artificial.'
- source_word: וַיִּפְּלוּ עַל פְּנֵיהֶם
  english_pob_choice: fell on their faces
  chosen_spanish: se postraron sobre su rostro
  alternatives_spanish:
  - cayeron sobre su rostro
  - se inclinaron rostro en tierra
  lexicon: HALOT
  rationale: La expresión hebrea describe una postración corporal concreta. 'Se postraron sobre su rostro' preserva la imagen física y la reverencia; el singular 'su rostro' es una solución idiomática española para el plural hebreo.
- source_word: וַיֹּאמְרוּ
  english_pob_choice: said
  chosen_spanish: dijeron
  alternatives_spanish:
  - clamaron
  - declararon
  lexicon: HALOT
  rationale: El verbo común de habla no obliga a intensificar la voz o la emoción; 'dijeron' es la opción más sobria y fiel.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración en español, conforme al criterio del proyecto. 'Yahvé' es la forma establecida para el texto principal, no la sustitución por 'SEÑOR'.
- source_word: הוּא
  english_pob_choice: he is
  chosen_spanish: es
  alternatives_spanish:
  - él es
  - él es el
  lexicon: HALOT
  rationale: Aunque el hebreo explicita el pronombre, en español la cópula ya puede cargar la misma fuerza predicativa. Se evita sobrecargar la frase con un pronombre innecesario en esta sintaxis.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: HALOT
  rationale: El artículo hebreo marca a Yahvé como el Dios verdadero en contraste con Baal. En español, 'Dios' comunica esa identificación de modo natural y reverente, sin el calco 'el Dios'.
- source_word: יְהוָה הוּא הָאֱלֹהִים
  english_pob_choice: The LORD, he is God!
  chosen_spanish: ¡Yahvé es Dios; Yahvé es Dios!
  alternatives_spanish:
  - ¡Yahvé es el Dios; Yahvé es el Dios!
  - ¡Yahvé, él es Dios; Yahvé, él es Dios!
  lexicon: HALOT
  rationale: La fórmula es una confesión climática y repetida. En español, la forma breve y exclamativa conserva el énfasis del hebreo y la lectura inglesa, sin forzar el calco 'el Dios' en el texto principal.
theological_decisions:
- issue: Nombre divino יְהוָה en un contexto de confesión pública
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: La afirmación del pueblo nombra directamente al Dios del pacto. Se mantiene el nombre propio divino en español para reflejar la decisión del POB de preservar el tetragrámaton como nombre, no como título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Valor del artículo en הָאֱלֹהִים
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - el Dios
  - el único Dios
  rationale: 'El artículo hebreo señala identificación y contraste: Yahvé es el Dios verdadero frente a Baal. En español, ''Dios'' mantiene la fuerza confesional sin introducir una formulación más interpretativa que ''el Dios''.'
  doctrine_reference: Notas léxicas del POB sobre הָאֱלֹהִים en contraste con Baal
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés: se mantuvo la equivalencia óptima, la confesión repetida y el nombre divino como Yahvé. No se detectaron revisiones posteriores que exigieran ajuste respecto del texto base.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se prefirió «Dios» en la predicación, reservando «el Dios» solo como alternativa de nota por su mayor literalidad.
  - El signo exclamativo duplica el énfasis confesional del hebreo.
  - La postración se expresa con un verbo reflexivo natural en español, preservando la imagen corporal del original.
