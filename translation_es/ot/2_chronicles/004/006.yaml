base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/004/006.yaml
  text: He made ten basins and set five on the right and five on the left[a], to wash in them; in them they rinsed what was for the burnt offering[c][b]. But the sea was for the priests to wash in.
  footnotes:
  - marker: a
    text: Or 'lavers' for 'basins.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'the work of the burnt offering'; the phrase likely refers to the items or materials associated with preparing the burnt offering.
    reason: lexical_alternative
  - marker: c
    text: That is, the large basin called 'the sea' was for the priests' washing.
    reason: cultural_note
