translation:
  language: es
  text: 'Oráculo acerca de Egipto: He aquí[a], Yahvé cabalga sobre una nube veloz y viene a Egipto; los ídolos de Egipto temblarán[b] delante de él, y el corazón de Egipto se derretirá[c] dentro de Egipto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «carga acerca de Egipto» o «pronunciamiento acerca de Egipto».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «de delante de él», es decir, ante su presencia.'
    reason: lexical_alternative
  - marker: c
    text: O «dentro de él»; el hebreo trata a Egipto como una entidad singular.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשָּׂא
  english_pob_choice: oracle
  chosen_spanish: oráculo
  alternatives_spanish:
  - carga
  - pronunciamiento
  lexicon: HALOT
  rationale: En encabezamientos proféticos, מַשָּׂא introduce una declaración profética solemne. 'Oráculo' conserva ese valor de anuncio profético sin caer en el calco 'carga', que en español suena demasiado físico o poco natural.
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  lexicon: HALOT
  rationale: Nombre geográfico estándar en español.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Miren
  - Vean
  lexicon: HALOT
  rationale: La partícula marca una invitación profética a prestar atención. 'He aquí' conserva el tono elevado y la inmediatez del hebreo en español bíblico contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio como 'Yahvé', conforme al criterio del proyecto para יהוה, evitando la sustitución por un título y manteniendo la distinción del nombre revelado.
- source_word: רֹכֵב עַל עָב קַל
  english_pob_choice: is riding on a swift cloud
  chosen_spanish: cabalga sobre una nube ligera
  alternatives_spanish:
  - va montado sobre una nube ligera
  - cabalga sobre una nube veloz
  lexicon: HALOT
  rationale: '''Cabalga'' reproduce el participio pictórico del hebreo. ''Nube ligera'' refleja קַל con la ambigüedad posible de ''ligera/rápida''; en español, ''ligera'' comunica bien la imagen sin forzar una paráfrasis excesiva.'
- source_word: וּבָא
  english_pob_choice: and is coming
  chosen_spanish: y viene
  alternatives_spanish:
  - y está viniendo
  - y llegará
  lexicon: HALOT
  rationale: '''Viene'' conserva la inmediatez profética del participio sin sobredeterminar el tiempo con un futuro explícito.'
- source_word: וְנָעוּ
  english_pob_choice: will tremble
  chosen_spanish: temblarán
  alternatives_spanish:
  - se estremecerán
  - vacilarán
  - serán sacudidos
  lexicon: HALOT
  rationale: El verbo expresa sacudida o reeling ante la presencia divina. 'Temblarán' es una forma natural en español que preserva la reacción física y emocional del texto.
- source_word: אֱלִילֵי
  english_pob_choice: the idols of
  chosen_spanish: los ídolos de
  alternatives_spanish:
  - los ídolos despreciables de
  lexicon: HALOT
  rationale: Se mantiene el referente básico sin intensificar innecesariamente el matiz peyorativo de אֱלִילִים, que ya queda implícito en 'ídolos'.
- source_word: מִפָּנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante su presencia
  - de su presencia
  lexicon: HALOT
  rationale: La preposición hebrea indica estar en la presencia de alguien. 'Delante de él' es natural en español y conserva la relación espacial/personal sin añadir interpretación.
- source_word: וּלְבַב מִצְרַיִם
  english_pob_choice: and the heart of Egypt
  chosen_spanish: y el corazón de Egipto
  alternatives_spanish:
  - y el ánimo de Egipto
  - y la valentía de Egipto
  lexicon: HALOT
  rationale: '''Corazón'' preserva la metáfora hebrea del centro interior, la disposición y el valor nacional personificado.'
- source_word: יִמַּס
  english_pob_choice: will melt
  chosen_spanish: se derretirá
  alternatives_spanish:
  - se deshará
  - se disolverá
  - se ablandará
  lexicon: HALOT
  rationale: '''Derretirá'' mantiene la imagen corporal del hebreo para la desintegración del valor o firmeza; en español, el pronombre refleja la voz media idiomática.'
- source_word: בְּקִרְבּוֹ
  english_pob_choice: within it
  chosen_spanish: dentro de él
  alternatives_spanish:
  - en medio de él
  - en su interior
  lexicon: HALOT
  rationale: El sufijo hebreo trata a Egipto como entidad singular masculina. 'Dentro de él' conserva esa referencia pronominal y la personificación nacional, aunque suene algo más literal que 'dentro de ella'.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene la política del proyecto de transliterar el Tetragrámaton como 'Yahvé' en lugar de sustituirlo por un título. Esto preserva el nombre propio del pacto y evita ocultarlo tras una convención litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Imaginería teofánica de Yahvé cabalgando sobre una nube
  english_pob_reading: Retained as direct theophanic language without demythologizing
  chosen_spanish_reading: Se conserva el lenguaje teofánico directo, sin despojarlo de su fuerza imagética
  alternative_spanish_readings:
  - paráfrasis atenuada como 'Yahvé se acerca rápidamente'
  rationale: El hebreo presenta una escena de teofanía real y vívida. La traducción mantiene la imagen de cabalgar sobre una nube para no suavizar ni reinterpretar el texto más allá de lo que el original permite.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Se revisó el pasaje contra el texto hebreo masorético y el audio de control inglés del POB; no se detectaron cambios necesarios respecto del sentido y las decisiones léxicas principales del registro auditado.
  spanish_consistency_notes:
  - Se usó 'Yahvé' conforme al estándar del proyecto para יהוה.
  - Se mantuvo 'oráculo' para מַשָּׂא, con nota de alternativas por la tensión semántica del encabezamiento profético.
  - Se preservó la personificación de Egipto mediante el pronombre singular 'él', siguiendo el tratamiento del inglés auditado y el hebreo.
  - La imagen de la nube se tradujo de forma directa, sin reducirla a una paráfrasis funcional.
