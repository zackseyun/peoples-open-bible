translation:
  language: es
  text: 'Si he hecho del oro mi confianza[a], y he dicho al oro puro[b]: «Tú eres mi seguridad[c]»,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi esperanza» para כִּסְלִי.
    reason: lexical_alternative
  - marker: b
    text: «Oro puro» traduce כֶּתֶם, que se refiere a oro refinado o puro.
    reason: lexical_alternative
  - marker: c
    text: O «mi confianza» para מִבְטַחִי.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si acaso
  - Si en verdad
  lexicon: HALOT
  rationale: Introduce la condición de manera directa, como en el hebreo, y funciona naturalmente en español en una afirmación juramentada o de inocencia.
- source_word: שַׂמְתִּי
  english_pob_choice: I have made
  chosen_spanish: he puesto
  alternatives_spanish:
  - he hecho
  - he colocado
  lexicon: HALOT
  rationale: שׂים expresa poner/colocar; en español, «he puesto» conserva la idea de asignar un lugar o función a algo. Evita forzar un calco como «he hecho» donde el español suena menos preciso, pero mantiene la relación predicativa con «oro» y «mi confianza».
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: el oro
  alternatives_spanish:
  - oro
  lexicon: HALOT
  rationale: Correspondencia léxica directa. El artículo definido es natural en español en esta construcción.
- source_word: כִּסְלִי
  english_pob_choice: my confidence
  chosen_spanish: mi confianza
  alternatives_spanish:
  - mi esperanza
  - mi seguridad
  - mi confianza interior
  lexicon: HALOT
  rationale: כֶּסֶל puede implicar confianza, seguridad o esperanza. «Mi confianza» preserva el valor relacional del término sin adelantar una interpretación más específica que el contexto no exige.
- source_word: וְלַכֶּתֶם
  english_pob_choice: and to fine gold
  chosen_spanish: al oro puro
  alternatives_spanish:
  - al oro fino
  - al oro refinado
  - y al oro puro
  lexicon: HALOT
  rationale: כֶּתֶם designa oro refinado o puro. «Oro puro» conserva la distinción respecto de זָהָב y expresa con claridad la cualidad del metal en español. La preposición con lamed se refleja naturalmente con «a/ al» al introducir la cita indirecta.
- source_word: אָמַרְתִּי
  english_pob_choice: said
  chosen_spanish: le he dicho
  alternatives_spanish:
  - he dicho
  - dije
  lexicon: HALOT
  rationale: El perfecto español sigue bien el hebreo en la secuencia condicional, y la inclusión de «le» refleja el destinatario explícito de la declaración.
- source_word: מִבְטַחִי
  english_pob_choice: my security
  chosen_spanish: mi seguridad
  alternatives_spanish:
  - mi confianza
  - mi refugio
  - mi amparo
  lexicon: HALOT
  rationale: מִבְטָח es aquello en lo que uno se apoya para estar seguro. «Mi seguridad» preserva la fuerza concreta del sustantivo y evita repetir exactamente «confianza», respetando la variación léxica del hebreo.
theological_decisions:
- issue: Denuncia de confiar en la riqueza en lugar de Dios
  english_pob_reading: 'Expressed as a conditional denial: ''If I have made gold my confidence...'''
  chosen_spanish_reading: 'Expresado como una negación condicional: «Si he puesto el oro como mi confianza...»'
  alternative_spanish_readings:
  - Si he puesto mi esperanza en el oro...
  - Si he hecho del oro mi confianza...
  rationale: El versículo forma parte de la defensa moral de Job y no requiere suavizar la tensión ética. La traducción conserva la autonegación condicional y el contraste entre riqueza y aquello en lo que uno se apoya.
  doctrine_reference: Mantener la fuerza del testimonio ético de Job y la prioridad del texto fuente sobre fórmulas tradicionales.
translation_notes:
  revision_awareness: 'La versión inglesa auditada usa ''confidence'' para כִּסְלִי, ''fine gold'' para כֶּתֶם y ''security'' para מִבְטַחִי, con notas alternativas. La propuesta española conserva esa diferenciación léxica: confianza / oro puro / seguridad, y mantiene la estructura condicional del hebreo.'
  spanish_consistency_notes:
  - Se mantiene 'oro' y no 'dorado' u otra paráfrasis, porque el contraste del verso depende del metal como objeto de confianza.
  - Se diferencia 'confianza' de 'seguridad' para reflejar la variación entre כִּסְלִי y מִבְטַחִי.
  - La cita directa se marca con comillas españolas y el orden de palabras sigue el sentido hebreo sin sonar forzado en español.
