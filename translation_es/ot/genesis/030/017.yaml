translation:
  language: es
  text: Y Dios escuchó a Lea[a], y ella concibió y le dio a Jacob un quinto hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y Dios oyó a Lea».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: listened
  chosen_spanish: escuchó
  alternatives_spanish:
  - oyó
  lexicon: HALOT
  rationale: En esta construcción con אֶל, el verbo expresa atención receptiva, no solo percepción auditiva. «Escuchó» conserva mejor esa respuesta favorable que «oyó», aunque ambas son posibles en español.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים se refiere al Dios único del relato. «Dios» es la forma natural y clara en español.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: Con שׁמע, la relación se expresa de manera idiomática en español con «escuchar a».
- source_word: לֵאָה
  english_pob_choice: Leah
  chosen_spanish: Lea
  alternatives_spanish:
  - Leah
  lexicon: Convención onomástica española
  rationale: Los nombres propios bíblicos se adaptan a la forma usual en español; «Lea» es la transliteración corriente.
- source_word: וַתַּהַר
  english_pob_choice: she conceived
  chosen_spanish: concibió
  alternatives_spanish:
  - quedó embarazada
  lexicon: HALOT
  rationale: «Concibió» es el equivalente narrativo breve y fiel al hebreo en contexto de nacimiento.
- source_word: וַתֵּלֶד
  english_pob_choice: and bore
  chosen_spanish: dio a luz
  alternatives_spanish:
  - parió
  lexicon: HALOT
  rationale: En español, «dio a luz» comunica de manera natural la acción de ילד en este contexto narrativo sin perder el sentido de parto.
- source_word: לְיַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: a Jacob
  alternatives_spanish:
  - para Jacob
  lexicon: HALOT
  rationale: El lamed marca el beneficiario/relación del nacimiento; en español se expresa con el complemento directo/indirecto idiomático «a Jacob».
- source_word: בֵּן
  english_pob_choice: son
  chosen_spanish: hijo
  alternatives_spanish:
  - varón
  lexicon: HALOT
  rationale: «Hijo» es la forma natural en español para el resultado del nacimiento en este pasaje.
- source_word: חֲמִישִׁי
  english_pob_choice: fifth
  chosen_spanish: quinto
  alternatives_spanish:
  - quinto en orden
  lexicon: HALOT
  rationale: 'El ordinal se conserva de manera directa: «quinto». En español, el orden se entiende naturalmente con «un quinto hijo».'
theological_decisions:
- issue: Respuesta divina implícita en שׁמע אֶל
  english_pob_reading: God listened to Leah in the sense of hearing favorably and responding to her.
  chosen_spanish_reading: Dios escuchó a Lea, con el matiz de atención favorable y respuesta.
  alternative_spanish_readings:
  - Dios oyó a Lea
  rationale: La construcción hebrea sugiere más que audición pasiva. «Escuchó» preserva el matiz relacional y receptivo que el audit trail inglés destacó, sin añadir interpretación extrabíblica.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La revisión auditada del texto base indica acuerdo alto y ningún cambio necesario respecto del último pase; esta versión sigue esa línea, ajustando solo la formulación española para mantener naturalidad y el matiz receptivo de שׁמע con אֶל.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים en sentido singular y narrativo.
  - Se usa «Lea» como forma española estándar del nombre.
  - Se evita «SEÑOR» porque el hebreo aquí dice אֱלֹהִים, no el tetragrámaton.
  - «Escuchó» se eligió por la relación idiomática con «a» y el matiz de respuesta favorable.
