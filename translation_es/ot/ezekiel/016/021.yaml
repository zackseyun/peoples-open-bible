translation:
  language: es
  text: Tú degollaste a mis hijos y los entregaste al hacerlos pasar por el fuego[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «al hacerlos pasar por ellos/a ellos». En este contexto, el giro idiomático se refiere a hacer pasar a los hijos por el fuego como acto de sacrificio a los ídolos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּשְׁחֲטִי
  english_pob_choice: you slaughtered
  chosen_spanish: mataste
  alternatives_spanish:
  - los degollaste
  - los sacrificaste
  lexicon: HALOT
  rationale: שָׁחַט expresa matar con violencia de forma ritual o sacrificial. En español, «mataste» comunica el acto homicida con naturalidad, mientras que «degollaste» sería más específico de la forma física y «sacrificaste» podría suavizar indebidamente la acusación.
- source_word: בָּנַי
  english_pob_choice: my sons
  chosen_spanish: mis hijos
  alternatives_spanish:
  - mis hijos varones
  - mis hijos, mis hijos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «mis hijos/mi hijos varones». En español, «mis hijos» conserva la relación posesiva y resulta más idiomático; el rasgo de género queda implícito en el contexto, aunque el hebreo sea más explícito.
- source_word: וַתִּתְּנִים
  english_pob_choice: gave them up
  chosen_spanish: los entregaste
  alternatives_spanish:
  - los diste
  - los abandonaste
  lexicon: HALOT
  rationale: נתן con sufijo aquí tiene el valor de poner a disposición de otro o entregar en manos ajenas. «Los entregaste» preserva mejor esa idea de ponerlos bajo poder de otros que «los diste», y evita cargar el texto con una interpretación que no está en el verbo.
- source_word: בְּהַעֲבִיר אוֹתָם
  english_pob_choice: by making them pass through the fire
  chosen_spanish: al hacerlos pasar por el fuego
  alternatives_spanish:
  - haciendo que pasaran por el fuego
  - al pasarlos por el fuego
  lexicon: HALOT
  rationale: El hebreo presenta el idiomático Hifil de עבר en contexto cultual. En español, la construcción «al hacerlos pasar por el fuego» reproduce con claridad la acción causal y mantiene el sentido histórico-religioso sin ampliar más allá del texto.
- source_word: לָהֶם
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - para ellos
  - a sus ídolos
  lexicon: HALOT
  rationale: El pronombre remite a los destinatarios idolátricos del contexto. «A ellos» es la forma más directa y conserva la referencia ambigua del original, sin explicitar «ídolos» en el texto principal.
theological_decisions:
- issue: Si explicitar en el texto principal el sentido sacrificial del idiomismo de «hacer pasar»
  english_pob_reading: 'Included ''the fire'' in the main text: ''by making them pass through the fire'''
  chosen_spanish_reading: Mantener «al hacerlos pasar por el fuego» en el texto principal
  alternative_spanish_readings:
  - al hacerlos pasar
  - al hacerlos pasar a ellos
  rationale: Como en el audit trail inglés, el sentido cultual del giro debe quedar explícito para el lector moderno. La versión española conserva esa explicitación, apoyada por el contexto profético, sin añadir una glosa doctrinal ajena al versículo.
  doctrine_reference: Principio de equivalencia óptima; primacía del hebreo sobre la tradición de traducción; preservar el sentido llano del texto original
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el último pase de revisión; no se requieren cambios adicionales respecto del sentido hebreo ni del auditorio moderno.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general de la serie, pero este versículo no contiene el nombre divino explícito en el texto hebreo.
  - Se prefirió un español directo y acusatorio para reflejar la fuerza verbal de שָׁחַט y נתן sin sobretraducir.
  - La nota al pie conserva la ambigüedad formal del hebreo en la cláusula idiomática y explica su sentido contextual sin desplazarlo del cuerpo principal.
