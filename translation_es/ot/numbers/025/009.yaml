translation:
  language: es
  text: Y los muertos en la plaga fueron veinticuatro mil.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: were
  chosen_spanish: fueron
  alternatives_spanish:
  - eran
  - resultaron ser
  lexicon: HALOT
  rationale: La forma verbal funciona aquí como copulativa/existencial para introducir el total de fallecidos. En español, «fueron» es la opción más natural y fiel en una afirmación numérica.
- source_word: הַמֵּתִים
  english_pob_choice: those who died
  chosen_spanish: los muertos
  alternatives_spanish:
  - los que murieron
  - los fallecidos
  lexicon: HALOT
  rationale: El participio de מות puede leerse literalmente como «los muertos». En español, esa forma conserva la referencia al grupo de personas fallecidas y mantiene la concisión del hebreo.
- source_word: בַּמַּגֵּפָה
  english_pob_choice: in the plague
  chosen_spanish: en la plaga
  alternatives_spanish:
  - durante la plaga
  - por la plaga
  lexicon: HALOT
  rationale: מַגֵּפָה designa una plaga o mortandad. Con la preposición ב, «en la plaga» reproduce de manera directa la construcción hebrea y su sentido situacional.
- source_word: אַרְבָּעָה וְעֶשְׂרִים אָלֶף
  english_pob_choice: twenty-four thousand
  chosen_spanish: veinticuatro mil
  alternatives_spanish:
  - cuatro y veinte mil
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «cuatro y veinte mil», pero en español moderno la forma idiomática y plenamente inteligible es «veinticuatro mil».
translation_notes:
  revision_awareness: El texto hebreo y el audit trail en inglés están en alta concordancia; no hay revisiones aplicadas ni variantes textuales relevantes en este versículo.
  spanish_consistency_notes:
  - Se conserva «plaga» para מַגֵּפָה, coherente con la decisión inglesa y con el valor de una mortandad enviada.
  - Se evita introducir un sujeto explícito adicional; el hebreo presenta una enumeración simple de los muertos y su total.
  - No se añadió nota porque no hay tensión léxica o textual que el español deba desambiguar en este caso.
