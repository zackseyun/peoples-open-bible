  text: אֵין כֵּהָ֣ה לְ/שִׁבְרֶ֔/ךָ נַחְלָ֖ה מַכָּתֶ֑/ךָ כֹּ֣ל שֹׁמְעֵ֣י שִׁמְעֲ/ךָ֗ תָּ֤קְעוּ כַף֙ עָלֶ֔י/ךָ כִּ֗י עַל מִ֛י לֹֽא עָבְרָ֥ה רָעָתְ/ךָ֖ תָּמִֽיד־׀־־׃
base_translation:
  language: en
  yaml_path: translation/ot/nahum/003/019.yaml
  text: There is no healing for your fracture[a]; your wound is grievous. All who hear the report about you clap their hands over you[b], for over whom has your evil not continually passed?
  footnotes:
  - marker: a
    text: Or 'There is no relief for your brokenness; your wound is severe.'
    reason: lexical_alternative
  - marker: b
    text: The rhetorical question means that Nineveh's evil had affected virtually everyone, which is why the nations rejoice at its fall.
    reason: cultural_note
