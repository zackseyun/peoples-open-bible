translation:
  language: es
  text: 'Allí la mano de Yahvé estuvo sobre mí, y me dijo: «Levántate, sal al valle[a], y allí hablaré contigo[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la llanura» para «el valle».
    reason: lexical_alternative
  - marker: b
    text: O «te hablaré».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּהִ֥י עָלַ֛י
  english_pob_choice: was upon me
  chosen_spanish: estuvo sobre mí
  alternatives_spanish:
  - estaba sobre mí
  - vino sobre mí
  lexicon: HALOT
  rationale: La expresión hebrea describe el estado de la mano/poder divino reposando sobre el profeta. «Estuvo sobre mí» conserva la imagen concreta y el valor de estado resultante, sin añadir un matiz ingresivo más fuerte que el del hebreo.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: Adverbio locativo simple. «Allí» mantiene la repetición espacial del versículo y suena natural en español bíblico contemporáneo.
- source_word: יַד יְהוָה
  english_pob_choice: the hand of Yahweh
  chosen_spanish: la mano de Yahvé
  alternatives_spanish:
  - la mano de Yahweh
  - el poder de Yahvé
  lexicon: HALOT
  rationale: Se conserva la metáfora corporal del hebreo en lugar de explicarla como «poder». «Mano» expresa la acción eficaz y la presión divina sobre el profeta.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La norma del proyecto para el Nombre divino es «Yahvé». Se usa la forma española habitual del transliterado, preservando el nombre propio del pacto y no sustituyéndolo por un título.
- source_word: ק֥וּם
  english_pob_choice: Rise
  chosen_spanish: Levántate
  alternatives_spanish:
  - Levantaos
  - Arise
  lexicon: HALOT
  rationale: Imperativo de ponerse en pie. «Levántate» es natural, claro y suficientemente elevado para una voz divina sin caer en arcaísmo.
- source_word: צֵא
  english_pob_choice: go out
  chosen_spanish: sal
  alternatives_spanish:
  - sal fuera
  - vete
  lexicon: HALOT
  rationale: El verbo significa salir o ir afuera. «Sal» es el equivalente directo y más conciso; el contexto ya indica el movimiento hacia el valle.
- source_word: הַבִּקְעָה
  english_pob_choice: the valley
  chosen_spanish: el valle
  alternatives_spanish:
  - la llanura
  - la planicie
  lexicon: HALOT
  rationale: בִּקְעָה puede referirse a valle, llanura o depresión amplia. En este contexto, «valle» es la opción más idiomática y fiel; se deja constancia de la alternativa «llanura» porque la POB inglesa la documenta como posibilidad lexical.
- source_word: אֲדַבֵּ֥ר אוֹתָֽךְ
  english_pob_choice: I will speak with you
  chosen_spanish: hablaré contigo
  alternatives_spanish:
  - hablaré con respecto a ti
  - te hablaré
  lexicon: HALOT
  rationale: El hebreo permite tanto «hablar contigo» como «hablarte». «Hablaré contigo» conserva la reciprocidad relacional y la fuerza del verbo sin reducirlo a una simple transmisión unilateral.
theological_decisions:
- issue: Renderización del Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo emplea directamente el Tetragrámaton. Conforme a la doctrina del proyecto, se traslada al español como «Yahvé» para preservar el nombre personal revelado a Israel, en lugar de sustituirlo por una designación como «el SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el control cruzado mostró alta concordancia (agreement 1.0). Se mantiene el sentido lexical y teológico ya auditado, con solo ajustes naturales al español y preservación de las alternativas documentadas.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה, conforme al estándar del proyecto.
  - Se conserva la metáfora «la mano de Yahvé» en lugar de explicarla como «poder».
  - «Allí» se repite para reflejar el énfasis locativo del hebreo.
  - «Hablaré contigo» preserva el valor relacional de דבר + את sin cargarlo de interpretación adicional.
  - Las alternativas en nota mantienen la ambigüedad lexical de בִּקְעָה entre «valle» y «llanura» sin borrar la preferencia contextual por «valle».
