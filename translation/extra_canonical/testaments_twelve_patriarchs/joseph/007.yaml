reference: Testament of Joseph 7
source:
  edition: Charles 1908 Greek Versions (pages 256-287, Joseph pilot)
  text: (VI:7-9 continued.) 7. *Ἵνα δὲ⁴⁵ μάθῃς⁴⁶, ὅτι⁴⁷ τῶν⁴⁸ ἐν σωφροσύνῃ θεοσεβούντων⁴⁹ οὐ κατισχύσει⁵⁰ κακία⁵¹ *τῶν ἀσεβούντων⁵². ⌈Ἰδοὺ⌉⁵³ λαβὼν⁵⁴ *ἐξ αὐτοῦ ἐνώπιόν σου ἐσθίων. Καὶ τοῦτο εἰπὼν εἶπον οὕτως⁵⁵. Ὁ Θεὸς τῶν πατέρων μου καὶ ὁ ἄγγελος Ἀβραὰμ⁵⁶ *ἔσται μετ᾽ ἐμοῦ⁵⁷. ⌈Ἔφαγον⌉⁵⁸. 8. Ἡ δὲ ⌈Ἰδοῦσα τοῦτο⌉⁵⁸ *ἔπεσεν⁵⁹ *ἐπὶ πρόσωπον αὐτῆς⁶⁰ *εἰς τοὺς πόδας μου⁶¹ κλαίουσα⁶², καὶ ἀναστήσας⁶³ αὐτὴν ἐνουθέτησα. 9. *ἡ δὲ⁶⁴ συνεθέτό μου⁶⁵ τοῦ⁶⁶ *μηκέτι ποιῆσαι⁶⁷ τὴν ἀσέβειαν ταύτην⁶⁸. VII. **Ἔτι δὲ¹ ἡ καρδία αὐτῆς *ἔκειτο εἰς τὸ κακὸν καὶ περιεβλέπετο ποίῳ τρόπῳ με παγιδεύσῃ· στενάζουσα δὲ †συντόμως συνεπίπτε μὴ ἀσθενοῦσα². 2. Ἰδὼν δὲ αὐτὴν ὁ *ἀνὴρ αὐτῆς⁴ λέγει⁶ πρὸς αὐτήν⁷· Τί συνέπεσε τὸ πρόσωπόν σου; ⌜πρὸς αὐτὸν⌝⁷ εἶπεν, ⌜ὅτι⌝⁷ *πόνον καρδίας ἐγὼ ἀλγῶ, καὶ οἱ τοῦ πνεύματος στεναγμοὶ συνέχουσί με⁸. *Ὁ δὲ⁹ ἐθεράπευσεν¹⁰ αὐτὴν *ἐν λόγοις¹¹. 3. *Τότε οὖν εὐκαιρίαν λαβοῦσα¹² εἰσεπήδησε πρός με, *ἔτι ἔξω ὄντος¹³ τοῦ ἀνδρὸς αὐτῆς, καὶ λέγει¹⁴ μοι· *Ἄγχομαι, ἢ εἰς κρημνὸν ῥίπτω ἐμαυτήν¹⁵, ἐὰν μὴ *συγγενῇ μετ᾿ ἐμοῦ¹⁶. 4. *Ἐγὼ δὲ¹⁷ νοήσας ὅτι *τὸ πνεῦμα¹⁸ τοῦ Βελίαρ *ἐνοχλεῖ αὐτήν¹⁹, προσευξάμενος τῷ²⁰ Κυρίῳ, εἶπον *πρὸς αὐτήν²¹. 5. Ἵνα τί, ⌜ἄθλια⌉²², τάρασσον²³ καὶ θορυβῇ²⁴ ἐν ἁμαρτίαις τυφλώττουσα²⁵; μνήσθητι²⁶ ὅτι ἐὰν ἀνέλῃς σεαυτήν²⁷, *ἡ Ἀστηθώ²⁸, ἡ παλλακὴ²⁹ τοῦ ἀνδρός σου, ἡ³⁰ ἀντίζηλός³¹ σου³² κονδυλίσει³³ *τὰ τέκνα σου³⁴, καὶ³⁵ ἀπολέσεις³⁶ τὸ μνημόσυνόν σου ἀπὸ τῆς γῆς.
