translation:
  language: es
  text: Como un manantial enturbiado y una fuente contaminada es el justo que cede ante el malvado.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "Como un manantial pisoteado y revuelto, y una fuente corrompida, es el justo que tambalea ante el malvado".'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַעְיָן
  english_pob_choice: spring
  chosen_spanish: manantial
  alternatives_spanish:
  - fuente
  - pozo
  - naciente
  lexicon: HALOT
  rationale: מַעְיָן nombra una fuente natural de agua. En español, 'manantial' expresa bien esa imagen y suena natural en el paralelismo con 'fuente' para el segundo miembro.
- source_word: נִרְפָּשׂ
  english_pob_choice: muddied
  chosen_spanish: enturbiado
  alternatives_spanish:
  - barroso
  - ensuciado
  - pisoteado
  lexicon: HALOT
  rationale: El participio pasivo comunica un agua alterada, revuelta o ensuciada. 'Enturbiado' conserva la idea de agua hecha turbia sin forzar una imagen demasiado literal en español.
- source_word: מָקוֹר
  english_pob_choice: fountain
  chosen_spanish: fuente
  alternatives_spanish:
  - manantial
  - origen
  - naciente
  lexicon: HALOT
  rationale: En paralelo con מַעְיָן, 'fuente' mantiene la distinción poética sin introducir una noción artificial. Además, en español el par 'manantial / fuente' resulta claro y fluido.
- source_word: מָשְׁחָת
  english_pob_choice: polluted
  chosen_spanish: corrompida
  alternatives_spanish:
  - contaminada
  - dañada
  - arruinada
  lexicon: HALOT
  rationale: El término apunta a corrupción o daño. 'Corrompida' preserva la fuerza semántica amplia y encaja con la metáfora de una fuente ya arruinada.
- source_word: צַדִּיק
  english_pob_choice: a righteous man
  chosen_spanish: el justo
  alternatives_spanish:
  - un hombre justo
  - una persona justa
  - el recto
  lexicon: HALOT
  rationale: El hebreo es un singular masculino sustantivado. En español, 'el justo' reproduce con naturalidad el valor proverbial y conserva el término tradicional sin perder la referencia personal.
- source_word: מָט
  english_pob_choice: gives way
  chosen_spanish: cede
  alternatives_spanish:
  - tambalea
  - vacila
  - se rinde
  lexicon: HALOT
  rationale: El verbo puede expresar inclinarse, tambalearse o ceder. Dado el contexto con 'ante el malvado', 'cede' comunica la idea de capitular o dar paso, que es la fuerza principal del pasaje.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: ante
  alternatives_spanish:
  - delante de
  - en presencia de
  lexicon: HALOT
  rationale: La preposición marca relación frontal o de enfrentamiento. 'Ante' es la opción más natural en español para indicar la posición del justo respecto del malvado.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el malvado
  alternatives_spanish:
  - el impío
  - el perverso
  - el inicuo
  lexicon: HALOT
  rationale: En español, 'malvado' transmite con claridad el valor moral del sustantivo adjetival. Se evita 'impío' por su color doctrinal más estrecho y 'inicuo' por su mayor arcaísmo.
theological_decisions:
- issue: Metáfora de deterioro moral del justo
  english_pob_reading: Like a muddied spring and a polluted fountain is a righteous man who gives way before the wicked.
  chosen_spanish_reading: Como un manantial enturbiado y una fuente corrompida es el justo que cede ante el malvado.
  alternative_spanish_readings:
  - Como un manantial pisoteado y una fuente corrompida es el justo que vacila ante el malvado.
  - Como un manantial enturbiado y una fuente contaminada es el justo que da paso al malvado.
  rationale: La imagen no afirma que el justo deje de ser justo en esencia, sino que su conducta se deteriora por ceder ante el mal. La traducción conserva esa tensión moral sin suavizarla ni convertirla en mera debilidad física.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Valor representativo de צַדִּיק en singular masculino
  english_pob_reading: a righteous man
  chosen_spanish_reading: el justo
  alternative_spanish_readings:
  - un hombre justo
  - una persona justa
  rationale: El hebreo usa singular masculino sustantivado con fuerza proverbial. 'El justo' mantiene la referencia individual representativa y el registro proverbial del texto, sin neutralizar innecesariamente el género gramatical.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: This draft corrects the prior validation issue by removing the unanchored footnote and keeping the translation text free of footnote markers, since no alternative reading is necessary to anchor in the verse line itself. The wording remains aligned with the Hebrew parallelism and the English audit trail.
  spanish_consistency_notes:
  - Se mantuvo un registro proverbial y sobrio, adecuado para literatura sapiencial.
  - 'Se preservó la doble imagen acuática con dos sustantivos distintos: ''manantial'' y ''fuente''.'
  - Se evitó 'SEÑOR' u otro masking convention, ya que el versículo no contiene el Tetragrámaton.
  - '''El justo'' se usó como sustantivo masculino singular, coherente con el hebreo y con el audit trail inglés.'
