translation:
  language: es
  text: Pero los sacerdotes estuvieron de acuerdo en no tomar dinero del pueblo y en no reparar el daño de la casa[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «no fortalecer el daño de la casa», una expresión idiomática que significa reparar el daño del templo.
    reason: lexical_alternative
  - marker: b
    text: «Casa» aquí se refiere a la casa de Yahvé, es decir, el templo.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּאֹתוּ
  english_pob_choice: agreed
  chosen_spanish: aceptaron
  alternatives_spanish:
  - accedieron
  - consintieron
  - estuvieron de acuerdo
  lexicon: HALOT
  rationale: El verbo expresa consentimiento o conformidad. «Aceptaron» comunica de forma natural que los sacerdotes dieron su aprobación a las condiciones que siguen, sin perder el valor de asentir.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes del templo
  - los ministros
  lexicon: HALOT
  rationale: En este contexto cultual y administrativo, el sustantivo se refiere de manera estándar a los sacerdotes del templo.
- source_word: לְבִלְתִּי קְחַת
  english_pob_choice: not to take
  chosen_spanish: no tomar
  alternatives_spanish:
  - no recibir
  - abstenerse de tomar
  - dejar de tomar
  lexicon: HALOT
  rationale: La construcción indica una negativa ligada al acuerdo. «No tomar» es fiel, breve y natural en español.
- source_word: כֶּסֶף
  english_pob_choice: money
  chosen_spanish: dinero
  alternatives_spanish:
  - plata
  - moneda
  lexicon: HALOT
  rationale: Aunque literalmente puede ser «plata», aquí el sentido administrativo es el de pago o recursos; «dinero» transmite mejor la función práctica del término.
- source_word: מֵאֵת הָעָם
  english_pob_choice: from the people
  chosen_spanish: del pueblo
  alternatives_spanish:
  - de la gente
  - de entre el pueblo
  lexicon: HALOT
  rationale: La frase מקור/procedencia se traduce de forma directa. «Pueblo» preserva el registro bíblico y el referente comunitario.
- source_word: וּלְבִלְתִּי חַזֵּק
  english_pob_choice: and not to repair
  chosen_spanish: y no reparar
  alternatives_spanish:
  - y no fortalecer
  - y no restaurar
  - y no hacer reparaciones a
  lexicon: HALOT
  rationale: El verbo literalmente significa «fortalecer», pero en la expresión fija con בדק הבית el sentido es de reparación/restauración. «Reparar» expresa el valor idiomático sin añadir demasiado.
- source_word: אֶת בֶּדֶק הַבָּיִת
  english_pob_choice: the damage of the house
  chosen_spanish: el daño de la casa
  alternatives_spanish:
  - las grietas de la casa
  - las reparaciones necesarias de la casa
  - el deterioro de la casa
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de «daño» o «deterioro» asociado a la casa. «Casa» mantiene la expresión original; el contexto bíblico permite entender que se trata del templo.
theological_decisions:
- issue: Referente de «la casa»
  english_pob_reading: '''House'' here refers to the house of the LORD, that is, the temple.'
  chosen_spanish_reading: «la casa» se entiende como la casa de Yahvé, es decir, el templo.
  alternative_spanish_readings:
  - la casa del Señor, es decir, el templo
  - el templo
  rationale: El texto hebreo dice literalmente «la casa». Para mantener la forma del original y la transparencia del POB, no se sustituye en el cuerpo por «templo»; se aclara su referente en nota.
  doctrine_reference: 2 Reyes 12:9; uso bíblico de בית para el santuario.
translation_notes:
  revision_awareness: Coincide con la última revisión indicada como sin cambios; el borrador conserva la lectura principal del POB inglés y únicamente la vierte al español con equivalencias transparentes.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en la nota explicativa conforme al estándar del proyecto para el nombre divino.
  - «Casa» se conserva en el texto principal para respetar la imagen hebrea y se aclara su referente en nota.
  - Se usa «reparar» en el cuerpo del verso y se preserva la opción más literal «fortalecer» en la nota, evitando borrar la tensión léxica del hebreo.
