revisions:
- from: 'Y él dijo[a]: «¿Por qué persigue mi señor a este su siervo así? Porque ¿qué he hecho[b], y qué maldad hay en mi mano?»'
  to: 'Y él dijo[a]: «¿Por qué persigue mi señor así a su siervo? Pues ¿qué he hecho, y qué mal hay en mi mano?[b]»'
  rationale: La revisión elimina la adición no atestiguada «este», mejora la fluidez española con el orden «así a su siervo» y usa «Pues» para reflejar mejor la función explicativa de כִּי en una pregunta retórica. Se conserva la decisión textual importante de mantener «su siervo» y la metáfora «en mi mano» con su nota.
