translation:
  language: es
  text: 'Y Sara dijo[a]: «Dios ha hecho risa para mí; todo el que oiga esto reirá conmigo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todo el que oiga esto se reirá de mí» o «reirá para mí». El hebreo admite varios matices, pero en el contexto el sentido más probable es la alegría compartida con Sara.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: And Sarah said
  chosen_spanish: Y Sarah dijo
  alternatives_spanish:
  - Entonces Sarah dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva se vierte naturalmente con «Y»; mantiene el avance del relato sin añadir una temporalidad más fuerte de la que exige el hebreo.
- source_word: שָׂרָה
  english_pob_choice: Sarah
  chosen_spanish: Sarah
  lexicon: nombre propio
  rationale: Se conserva el nombre propio transliterado de forma estándar en español.
- source_word: צְחֹק
  english_pob_choice: laughter
  chosen_spanish: risa
  alternatives_spanish:
  - laughter (anglicismo no apto)
  - una risa
  lexicon: HALOT
  rationale: El sustantivo designa risa/laughter; «risa» comunica bien el sustantivo y preserva el juego de palabras con יִצְחַק en la segunda mitad del versículo.
- source_word: עָשָׂה לִי
  english_pob_choice: has made ... for me
  chosen_spanish: ha hecho ... para mí
  alternatives_spanish:
  - me ha dado ...
  - ha producido ... para mí
  lexicon: HALOT
  rationale: «Ha hecho ... para mí» sigue de cerca la construcción concreta del hebreo sin volverla innecesariamente interpretativa. En español se completa con «risa» para que la frase sea natural.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים se refiere claramente al Dios único actuando a favor de Sara; «Dios» es la equivalencia normal y clara en español.
- source_word: כָּל הַשֹּׁמֵעַ
  english_pob_choice: everyone who hears
  chosen_spanish: cualquiera que lo oiga
  alternatives_spanish:
  - todo el que oiga
  - todos los que oigan
  lexicon: HALOT
  rationale: La forma hebrea es singular distributiva; «cualquiera que lo oiga» reproduce bien ese valor genérico. El pronombre «lo» retoma naturalmente la «risa».
- source_word: יִצְחַק
  english_pob_choice: will laugh
  chosen_spanish: reirá
  alternatives_spanish:
  - se reirá
  - reirá de alegría
  lexicon: HALOT
  rationale: Se conserva el verbo de risa para mantener el vínculo léxico con צְחֹק y el nombre de Isaac. «Reirá» es suficientemente amplio para la lectura de gozo compartido.
- source_word: לִי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - de mí
  - para mí
  - contra mí
  lexicon: HALOT
  rationale: La preposición/dativo permite varias lecturas. En contexto, la lectura más probable es participación en la alegría de Sara; «conmigo» expresa esa opción sin cerrar por completo la tensión léxica.
theological_decisions:
- issue: Ambigüedad de יִצְחַק לִי en el cierre del versículo
  english_pob_reading: 'shared joyful laughter: ''will laugh with me'''
  chosen_spanish_reading: 'alegría compartida: «reirá conmigo»'
  alternative_spanish_readings:
  - «se reirá de mí»
  - «reirá para mí»
  rationale: El contexto inmediato es el nacimiento de Isaac y la celebración de Sara, por lo que la lectura más probable es de participación gozosa, no de burla. Aun así, la posibilidad de burla existe en el hebreo y no debe borrarse del todo; por eso se conserva el verbo «reirá», y el pie de nota registra la alternativa.
  doctrine_reference: Principio POB de preservar tensiones interpretativas genuinas cuando el contexto no elimina por completo la ambigüedad
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la última revisión inglesa sin cambios sustanciales: mantiene el paralelismo léxico entre צְחֹק / יִצְחַק, conserva la construcción concreta de «hacer» + objeto, y preserva en nota la ambigüedad final documentada en el audit trail.'
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים según el valor singular contextual.
  - Se evita «SEÑOR» o «Yahvé» porque el versículo no contiene el nombre divino.
  - Se prefirió «risa» antes que una paráfrasis como «alegría» para no perder el juego de palabras.
  - «conmigo» traduce el dativo de manera idiomática y mantiene abierta la posibilidad de matiz relacional.
