translation:
  language: es
  text: Los ancianos han cesado de estar en la puerta; los jóvenes, de su música[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de su tocar' o 'de su canto'; el término hebreo puede referirse a la ejecución musical, a menudo instrumental.
    reason: lexical_alternative
lexical_decisions:
- source_word: זְקֵנִים
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los ancianos de edad
  - los líderes ancianos
  lexicon: HALOT
  rationale: זקנים puede referirse a hombres de edad avanzada y, en contexto cívico, también a los dirigentes. En español, 'ancianos' conserva ambas posibilidades sin añadir una función específica que el texto no explicita.
- source_word: מִשַּׁעַר
  english_pob_choice: from the gate
  chosen_spanish: en la puerta
  alternatives_spanish:
  - desde la puerta
  - de la puerta
  - en la puerta de la ciudad
  lexicon: HALOT
  rationale: El hebreo con מִן señala separación/alejamiento, pero en español 'han cesado en la puerta' transmite con naturalidad que ya no están presentes o activos allí. Se evita expandir a 'puerta de la ciudad' porque el hebreo no lo dice de forma explícita.
- source_word: שָׁבָתוּ
  english_pob_choice: have ceased
  chosen_spanish: han cesado
  alternatives_spanish:
  - han dejado de estar
  - han parado
  lexicon: HALOT
  rationale: '''Han cesado'' reproduce el valor de שׁבת y mantiene el tono solemne del lamento, más fiel que una forma coloquial como ''han parado''.'
- source_word: בַּחוּרִים
  english_pob_choice: the young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los mozos
  lexicon: HALOT
  rationale: בַּחוּרִים designa varones jóvenes en la flor de la vida. 'Los jóvenes' es claro y digno en español; 'muchachos' sería demasiado juvenil e informal.
- source_word: מִנְּגִינָתָם
  english_pob_choice: from their music
  chosen_spanish: de su música
  alternatives_spanish:
  - de su canto
  - de su tocar
  - de su interpretación musical
  lexicon: HALOT
  rationale: נְגִינָה puede referirse a música o ejecución musical, a menudo instrumental. 'De su música' conserva la amplitud del término sin imponer 'canto' ni 'instrumental' donde el hebreo permite ambas lecturas.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y el audita inglés: se conserva el paralelismo entre los ancianos y los jóvenes, y se mantiene la ambigüedad de נְגִינָה sin sobreespecificarla. Se optó por una formulación española natural (''han cesado en la puerta'') que comunica la idea de cese o retirada del ámbito público.'
  spanish_consistency_notes:
  - Se usa 'ancianos' para זְקֵנִים en sentido cívico-social, coherente con el contexto de la puerta como lugar público.
  - Se evita 'SEÑOR' o terminología doctrinal no pertinente; no hay contenido teológico explícito en este verso.
  - La nota al pie se ancla en 'música' para preservar la alternativa de lectura documentada por el POB inglés.
