translation:
  language: es
  text: No te dejes cautivar por la belleza de una mujer[a], ni codicies lo que le pertenece.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «y no desees a una mujer». El testimonio hebreo es más específico y advierte contra desearla a causa de lo que tiene.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תִּפּוֹל
  english_pob_choice: Do not fall for
  chosen_spanish: No te dejes cautivar
  alternatives_spanish:
  - No caigas
  - No te dejes vencer
  - No te dejes atrapar
  lexicon: HALOT
  rationale: El hebreo usa literalmente la idea de ‘caer’, pero en contexto expresa quedar captivado o vencido por la atracción. ‘No te dejes cautivar’ conserva la fuerza idiomática en un español natural y digno, sin perder la advertencia moral.
- source_word: בְּיֹפִי
  english_pob_choice: for ... beauty
  chosen_spanish: por la belleza de
  alternatives_spanish:
  - a causa de la belleza de
  - ante la belleza de
  - por la hermosura de
  lexicon: HALOT
  rationale: La preposición introduce la ocasión del ‘caer’; ‘por la belleza de’ reproduce bien la relación causal/ocasional. ‘Belleza’ mantiene registro claro y contemporáneo; ‘hermosura’ es posible, pero más marcado y menos neutral.
- source_word: אִשָּׁה
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una esposa
  - una mujer
  lexicon: HALOT
  rationale: No hay contexto marital explícito; por eso ‘mujer’ es la opción más amplia y fiel tanto al hebreo como al paralelo griego γυναικός.
- source_word: וְעַל יֵש לָהּ
  english_pob_choice: what belongs to her
  chosen_spanish: lo que le pertenece
  alternatives_spanish:
  - lo que tiene
  - sus bienes
  - lo que posee
  lexicon: HALOT
  rationale: La frase hebrea es compacta y apunta a lo que está bajo su posesión o pertenencia. ‘Lo que le pertenece’ conserva esa amplitud sin introducir un significado más estrecho como ‘bienes’ o ‘riquezas’.
- source_word: לֹא תַּחְמוֹד
  english_pob_choice: do not desire
  chosen_spanish: ni codicies
  alternatives_spanish:
  - ni desees
  - ni codicies
  - ni tengas deseos desordenados de
  lexicon: HALOT
  rationale: חמד suele tener el matiz de codiciar. En español, ‘codiciar’ preserva con más precisión la carga ética de la advertencia que un simple ‘desear’, y se ajusta bien a la estructura exhortativa.
theological_decisions:
- issue: Relación entre el hebreo completo y el paralelo griego más breve
  english_pob_reading: Retain the Hebrew's more specific second clause, 'do not desire what belongs to her,' while checking it against the Greek.
  chosen_spanish_reading: 'Mantener la cláusula hebrea más específica: ‘ni codicies lo que le pertenece’.'
  alternative_spanish_readings:
  - ni codicies a una mujer
  - ni la desees
  - ni codicies una mujer
  rationale: El testimonio hebreo conservado añade un matiz de codicia respecto de lo que ella posee, ausente en el griego breve. Dado el alto nivel de confianza del hebreo y el carácter de desajuste menor, la redacción principal sigue el hebreo y deja constancia de la alternativa griega en nota.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; usar el paralelo griego como control real'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del registro inglés: la segunda cláusula evita repetir ‘mujer’ y representa más directamente וְעַל יֵש לָהּ mediante una expresión natural en español. También se conserva la tensión fuente hebreo/griego en una nota, como pide el expediente auditado.'
  spanish_consistency_notes:
  - Se mantuvo ‘mujer’ y no ‘esposa’, porque no hay contexto marital explícito.
  - ‘Codicies’ preserva mejor el peso ético de חמד que un simple ‘desees’.
  - La nota al pie recoge la alternativa del griego sin desplazar la lectura principal basada en el hebreo.
  - Se evitó una traducción mecánica de ‘caer’ para que el español suene natural sin perder la imagen de ser arrastrado por la belleza.
