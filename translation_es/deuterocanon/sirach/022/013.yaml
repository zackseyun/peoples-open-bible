  yaml_path: translation/deuterocanon/sirach/022/013.yaml
  text: Do not multiply words with a fool[a], and do not go near an unintelligent man. Keep away from him, so that you may not have trouble and may not be defiled by his outburst. Turn aside from him, and you will find rest, and you will not be wearied by his madness.
