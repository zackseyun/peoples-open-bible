    text: 'O: «cursos», para las agrupaciones organizadas de sacerdotes y levitas.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ofrendas de paz» o «ofrendas de comunión» para שְׁלָמִים.'
    reason: lexical_alternative
