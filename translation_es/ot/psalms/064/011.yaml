translation:
  language: es
  text: El justo se alegrará en Yahvé y se refugiará en él; Todos los rectos de corazón se gloriarán[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se jactarán». El hebreo puede denotar tanto gloriarse como exultar; aquí el sentido es positivo, ligado al gozo en Dios y a su acción salvadora.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׂמַח
  english_pob_choice: will rejoice
  chosen_spanish: se alegrará
  alternatives_spanish:
  - se regocijará
  - se gozará
  lexicon: HALOT
  rationale: El imperfecto hebreo en poesía expresa una expectativa o resultado futuro; en español, 'se alegrará' comunica bien el gozo positivo y suena natural y digno.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el recto
  - el hombre justo
  lexicon: HALOT
  rationale: El adjetivo sustantivado se puede expresar con 'el justo' en singular, manteniendo la fuerza representativa del hebreo sin añadir 'hombre'.
- source_word: בַּיהוָה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en Yahweh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino 'Yahvé' según la terminología del proyecto; la preposición marca la esfera del gozo y confianza.
- source_word: וְחָסָה בּוֹ
  english_pob_choice: and take refuge in him
  chosen_spanish: y hallará refugio en él
  alternatives_spanish:
  - y se refugiará en él
  - y buscará refugio en él
  lexicon: HALOT
  rationale: חסה expresa buscar/procurar refugio protector; 'hallará refugio' conserva la imagen sin sonar forzado en español y evita reducirlo a simple 'confiar'.
- source_word: וְיִתְהַלְלוּ
  english_pob_choice: will glory
  chosen_spanish: se gloriarán
  alternatives_spanish:
  - se jactarán
  - exultarán
  lexicon: HALOT
  rationale: El hitpael de הלל puede significar gloriarse/boast en sentido positivo. 'Se gloriarán' conserva la idea de jactancia gozosa en Dios sin arrastrar una connotación necesariamente negativa.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno de
  lexicon: HALOT
  rationale: Quantificador distributivo/collectivo normal; 'todos' encaja naturalmente con la frase siguiente.
- source_word: יִשְׁרֵי לֵב
  english_pob_choice: the upright in heart
  chosen_spanish: los rectos de corazón
  alternatives_spanish:
  - los de corazón recto
  - los íntegros de corazón
  lexicon: HALOT
  rationale: La expresión hebrea idiomática se vierte de forma bastante literal para preservar la metáfora moral del corazón como sede de la rectitud.
theological_decisions:
- issue: Rendering of the divine name יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa directamente el Tetragrámaton; en español del proyecto se normaliza como 'Yahvé', preservando el nombre del pacto en lugar de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Sense of וְיִתְהַלְלוּ in a positive context
  english_pob_reading: will glory
  chosen_spanish_reading: se gloriarán
  alternative_spanish_readings:
  - se jactarán
  - se alegrarán
  rationale: El verbo puede abarcar 'gloriarse' o 'boast'. Aquí, por el paralelismo con la alegría y el refugio en Dios, la lectura positiva es la más adecuada; 'se gloriarán' preserva esa tensión semántica sin moralizarla.
  doctrine_reference: HALOT הלל / POB lexical note on positive boasting
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail al tratar צַדִּיק como sustantivo colectivo-singular sin añadir «hombre», y conserva la decisión del proyecto de traducir יהוה con «Yahvé» en lugar de un título ocultador.
  spanish_consistency_notes:
  - Se conserva el nombre divino «Yahvé» según el estándar español del proyecto.
  - «El justo» mantiene el singular sustantivado del hebreo sin expandirlo a una frase más interpretativa.
  - «Los rectos de corazón» reproduce la metáfora hebrea de manera transparente y comprensible para lectores de iglesia.
  - La puntuación con punto y coma refleja la coordinación poética de dos miembros y mantiene la estructura del versículo.
