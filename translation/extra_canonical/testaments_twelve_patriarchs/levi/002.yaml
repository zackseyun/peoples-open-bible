theological_decisions:
- issue: Nature of πνεῦμα συνέσεως
  chosen_reading: a divinely given spirit of understanding from the Lord, not explicitly identified as the Holy Spirit by title
  alternative_readings:
  - the Spirit of understanding as a more titular expression
  - the Holy Spirit of understanding
  rationale: The Greek lacks markers requiring a later doctrinally specific identification. The translation preserves divine agency while avoiding over-specification beyond the text.
  doctrine_reference: DOCTRINE.md § Preserve theological tension rather than resolve it
- issue: Force of σωθῶ in Levi's prayer
  chosen_reading: saved
  alternative_readings:
  - delivered
  - preserved
  rationale: The context includes moral corruption in humanity and Levi's plea for rescue. 'Saved' keeps both existential and theological breadth without narrowing the request to physical preservation alone.
  doctrine_reference: DOCTRINE.md § Original-language primacy over translation tradition
