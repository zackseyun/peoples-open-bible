translation:
  language: es
  text: Entonces todos fueron a la casa de Baal y la derribaron[a]; y rompieron en pedazos sus altares y sus imágenes[b], y mataron a Mattán, el sacerdote de Baal, delante de los altares.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el templo de Baal'. El hebreo dice literalmente 'la casa de Baal'.
    reason: lexical_alternative
  - marker: b
    text: O 'sus ídolos' o 'sus estatuas' para 'sus imágenes'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - fueron
  - se dirigió
  lexicon: HALOT
  rationale: El verbo hebreo בוא puede ser 'ir/venir/entrar' según el punto de vista narrativo. En español, 'fue' mantiene una narración natural con el complemento de destino 'a la casa de Baal'.
- source_word: כָל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo allí
  - la gente toda
  lexicon: HALOT
  rationale: '''Todo el pueblo'' conserva el sentido colectivo sin añadir precisión innecesaria sobre la composición del grupo.'
- source_word: בֵּית הַבַּעַל
  english_pob_choice: the house of Baal
  chosen_spanish: la casa de Baal
  alternatives_spanish:
  - el templo de Baal
  lexicon: HALOT
  rationale: בַּיִת significa literalmente 'casa'. 'Casa de Baal' sigue de cerca el hebreo; 'templo' es posible, pero suaviza la metáfora cultual que el texto preserva.
- source_word: וַיִּתְּצֻהוּ
  english_pob_choice: tore it down
  chosen_spanish: la derribó
  alternatives_spanish:
  - la demolió
  - la derribaron
  lexicon: HALOT
  rationale: נתץ expresa derribar o demoler una estructura. 'La derribó' es natural en español y fiel a la imagen de destrucción del edificio.
- source_word: מִזְבְּחֹתָיו
  english_pob_choice: his altars
  chosen_spanish: sus altares
  alternatives_spanish:
  - los altares de Baal
  - sus altares de Baal
  lexicon: HALOT
  rationale: El sufijo posesivo remite a Baal o al complejo de su culto. 'Sus altares' reproduce de manera directa esa relación posesiva.
- source_word: צְלָמָיו
  english_pob_choice: his images
  chosen_spanish: sus imágenes
  alternatives_spanish:
  - sus ídolos
  - sus estatuas
  - sus imágenes talladas
  lexicon: HALOT
  rationale: צֶלֶם puede referirse a imagen, estatua o ídolo. 'Imágenes' es la opción más cercana léxicamente y evita introducir una interpretación más fuerte de la que el hebreo exige.
- source_word: שִׁבֵּרוּ
  english_pob_choice: broke ... in pieces
  chosen_spanish: rompieron en pedazos
  alternatives_spanish:
  - quebraron
  - destrozaron
  lexicon: HALOT
  rationale: שבר indica partir o romper con fuerza. 'Rompieron en pedazos' conserva el énfasis del desmembramiento sin recurrir a un registro demasiado literario.
- source_word: מַתָּן
  english_pob_choice: Mattan
  chosen_spanish: Mattan
  alternatives_spanish:
  - Matán
  - Mattán
  lexicon: HALOT
  rationale: El nombre propio se translitera; se conserva la forma del nombre bíblico sin traducirlo.
- source_word: כֹּהֵן הַבַּעַל
  english_pob_choice: the priest of Baal
  chosen_spanish: el sacerdote de Baal
  alternatives_spanish:
  - el sacerdote de Baal
  lexicon: HALOT
  rationale: La construcción nominal se vierte de manera directa para preservar el oficio y su vínculo con la deidad.
- source_word: הָרְגוּ
  english_pob_choice: they killed
  chosen_spanish: mataron
  alternatives_spanish:
  - dieron muerte
  - asesinaron
  lexicon: HALOT
  rationale: הרג es el verbo ordinario de matar. 'Mataron' es claro y no añade matices ajenos al texto.
- source_word: לִפְנֵי הַמִּזְבְּחוֹת
  english_pob_choice: before the altars
  chosen_spanish: delante de los altares
  alternatives_spanish:
  - frente a los altares
  - ante los altares
  lexicon: HALOT
  rationale: לִפְנֵי significa 'delante de / en frente de'. 'Delante de los altares' es una formulación natural en español y mantiene la referencia espacial.
theological_decisions:
- issue: Terminología cultual de Baal
  english_pob_reading: Retain 'Baal,' 'house,' 'altars,' and 'images' in straightforward historical terms without polemical expansion.
  chosen_spanish_reading: Conservar 'Baal', 'casa', 'altares' e 'imágenes' en términos históricos y cultuales directos.
  alternative_spanish_readings:
  - '''templo de Baal'''
  - '''ídolos'' en lugar de ''imágenes'''
  rationale: El hebreo narra la destrucción de objetos y de un lugar de culto sin añadir glosas polémicas. La versión española sigue esa sobriedad y deja que el contexto determine la valoración idólatra.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: 'La redacción española sigue el estado revisado más reciente del POB en inglés: ''broke ... in pieces'' se refleja como ''rompieron en pedazos'', y ''house of Baal'' se mantiene como ''casa de Baal'' por fidelidad léxica. Se conserva también el carácter histórico y descriptivo del versículo sin ampliar la interpretación.'
  spanish_consistency_notes:
  - Se usa 'Baal' de manera uniforme como nombre propio cultual.
  - '''Casa de Baal'' conserva la imagen arquitectónica del hebreo, con nota alternativa para ''templo''.'
  - '''Sus imágenes'' preserva la ambigüedad léxica del hebreo צְלָמָיו sin forzar ''ídolos''.'
  - '''Delante de los altares'' mantiene el marco espacial del final del verso sin introducir posesivo que el hebreo no expresa explícitamente.'
