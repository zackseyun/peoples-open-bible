translation:
  language: es
  text: 'Y todo el pueblo respondió a una y dijo: «Todo lo que Yahvé ha hablado, haremos». Entonces Moisés devolvió las palabras del pueblo a Yahvé.[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «reportó las palabras del pueblo a Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲנוּ
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió en voz alta
  lexicon: HALOT
  rationale: ענה en este contexto narrativo expresa una respuesta verbal a una declaración previa. En español, “respondió” conserva la relación dialogal sin añadir contenido interpretativo.
- source_word: כָל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo de Israel
  - toda la gente
  lexicon: HALOT
  rationale: La combinación de כָל con el sustantivo colectivo preserva el sentido corporativo. “Todo el pueblo” es natural y mantiene el alcance colectivo.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: unido
  alternatives_spanish:
  - juntos
  - en unidad
  - a una
  lexicon: HALOT
  rationale: El adverbio enfatiza una respuesta corporativa e indivisa. “Unido” comunica la idea de una sola voz de manera clara y digna en español.
- source_word: כֹּל אֲשֶׁר דִּבֶּר
  english_pob_choice: All that ... has spoken
  chosen_spanish: Todo lo que ... ha hablado
  alternatives_spanish:
  - Todo lo que ... dijo
  - Todo cuanto ... ha hablado
  lexicon: HALOT
  rationale: La construcción hebrea se vierte de modo formal pero idiomático. “Ha hablado” preserva el valor verbal de דִּבֶּר y evita reducirlo a una simple mención de palabras.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: La directriz del proyecto pide “Yahvé” para el Tetragrama. Se conserva el nombre divino propio en vez de sustituirlo por un título.
- source_word: נַעֲשֶׂה
  english_pob_choice: we will do
  chosen_spanish: haremos
  alternatives_spanish:
  - lo haremos
  - obedeceremos
  lexicon: HALOT
  rationale: El verbo עשה pide una traducción directa de hacer/realizar. “Haremos” preserva la sobriedad del compromiso sin introducir la glosa interpretativa “obedeceremos”.
- source_word: וַיָּשֶׁב
  english_pob_choice: brought back
  chosen_spanish: llevó de regreso
  alternatives_spanish:
  - devolvió
  - volvió con
  lexicon: HALOT
  rationale: El Hifil de שוב comunica llevar de vuelta o retornar algo. “Llevó de regreso” mantiene la imagen del reporte devuelto a Yahvé y resulta natural en español.
- source_word: דִּבְרֵי הָעָם
  english_pob_choice: the words of the people
  chosen_spanish: las palabras del pueblo
  alternatives_spanish:
  - las palabras de la gente
  - la respuesta del pueblo
  lexicon: HALOT
  rationale: Se preserva el sustantivo concreto “palabras”, como en el hebreo, en lugar de reemplazarlo por una paráfrasis más abstracta.
- source_word: אֶל יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - ante Yahvé
  lexicon: HALOT
  rationale: אֶל expresa dirección hacia el destinatario del mensaje. “A Yahvé” conserva esa orientación directa.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se sigue la convención editorial del proyecto para el nombre divino, conservando el Tetragrama como nombre propio y no como sustituto titular. “Yahvé” es la forma española establecida en este encargo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Whether נַעֲשֶׂה should be rendered with obedience language
  english_pob_reading: we will do
  chosen_spanish_reading: haremos
  alternative_spanish_readings:
  - obedeceremos
  - lo haremos
  rationale: Aunque el contexto del pacto implica obediencia, el hebreo dice literalmente “hacer”. “Haremos” preserva la fuerza verbal sin añadir una explicación que el texto no formula explícitamente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy over translation tradition; preserve what the source text plainly says'
translation_notes:
  revision_awareness: El texto español sigue el estado más reciente del pasaje sin cambios de revisión pendientes; se mantiene alta concordancia con la auditoría inglesa y con el hebreo de WLC.
  spanish_consistency_notes:
  - Se usa “Yahvé” de manera consistente para יְהוָה.
  - Se conserva el lenguaje concreto de “palabras” y el verbo “hacer” para no desplazar la transparencia del hebreo.
  - La sintaxis busca ser publicable y natural en español, manteniendo el paralelismo de las dos declaraciones del versículo.
