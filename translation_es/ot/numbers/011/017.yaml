translation:
  language: es
  text: Y yo bajaré y hablaré contigo allí[a], y tomaré parte del Espíritu que está sobre ti y lo pondré sobre ellos, y ellos llevarán contigo la carga de este pueblo, para que tú no lleves esa carga tú solo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del espíritu que está sobre ti». La palabra hebrea רוּחַ puede significar espíritu, viento o aliento; aquí se refiere al Espíritu que capacita a Moisés para dirigir al pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָרַדְתִּי
  english_pob_choice: I will come down
  chosen_spanish: descenderé
  alternatives_spanish:
  - bajaré
  - vendré abajo
  lexicon: HALOT
  rationale: El verbo ירד conserva su sentido literal de movimiento hacia abajo. En español, «descenderé» mantiene la imagen teofánica sin sonar forzado; «bajaré» sería posible, pero «descender» da una tonalidad más solemne y precisa.
- source_word: וְדִבַּרְתִּי עִמְּךָ שָׁם
  english_pob_choice: speak with you there
  chosen_spanish: hablaré contigo allí
  alternatives_spanish:
  - hablaré con usted allí
  - hablaré allí contigo
  lexicon: HALOT
  rationale: דבר con עם expresa hablar con alguien, no solo hablar de manera general. «Contigo allí» conserva la referencia espacial del lugar indicado en el contexto y mantiene un registro bíblico natural en español.
- source_word: וְאָצַלְתִּי
  english_pob_choice: I will take some
  chosen_spanish: tomaré parte de
  alternatives_spanish:
  - retiraré parte de
  - tomaré un poco de
  - separaré parte de
  lexicon: HALOT
  rationale: El verbo raro אצל implica una extracción o derivación de algo que está sobre Moisés para transferirlo. «Tomaré parte de» comunica bien la partícula sin sugerir necesariamente pérdida cuantitativa, como en el audito inglés.
- source_word: מִן הָרוּחַ אֲשֶׁר עָלֶיךָ
  english_pob_choice: of the Spirit that is on you
  chosen_spanish: del Espíritu que está sobre ti
  alternatives_spanish:
  - del espíritu que está sobre ti
  - de parte del Espíritu que está sobre ti
  - del espíritu que está en ti
  lexicon: HALOT
  rationale: Aquí רוּחַ se refiere al poder/empoderamiento divino para el liderazgo, no a un mero ánimo humano. «Espíritu» con mayúscula refleja ese sentido contextual. «Está sobre ti» sigue de cerca el hebreo עָלֶיךָ y conserva la imagen de investidura.
- source_word: וְשַׂמְתִּי עֲלֵיהֶם
  english_pob_choice: and put it on them
  chosen_spanish: lo pondré sobre ellos
  alternatives_spanish:
  - lo colocaré sobre ellos
  - lo pondré en ellos
  lexicon: HALOT
  rationale: שׂים es un verbo general de poner/colocar. En español, «poner sobre» conserva la metáfora de una investidura que desciende o recae sobre las personas; el pronombre «lo» remite al Espíritu mencionado antes.
- source_word: וְנָשְׂאוּ אִתְּךָ
  english_pob_choice: they will bear ... with you
  chosen_spanish: llevarán contigo
  alternatives_spanish:
  - soportarán contigo
  - cargarán contigo
  - llevarán la carga contigo
  lexicon: HALOT
  rationale: נשא puede significar llevar, cargar o soportar. En este contexto de responsabilidad comunitaria, «llevarán contigo» preserva la idea de compartir la carga sin sobre-especificar una sola metáfora en español.
- source_word: בְּמַשָּׂא הָעָם
  english_pob_choice: the burden of the people
  chosen_spanish: la carga del pueblo
  alternatives_spanish:
  - el peso del pueblo
  - la carga del pueblo
  - el encargo del pueblo
  lexicon: HALOT
  rationale: מַשָּׂא denota carga o peso; aquí es la responsabilidad del liderazgo. «Carga» reproduce la metáfora de manera natural en español y permite mantener la relación con el verbo «llevar».
- source_word: וְלֹא תִשָּׂא אַתָּה לְבַדֶּךָ
  english_pob_choice: so that you will not bear it by yourself alone
  chosen_spanish: para que tú no la lleves solo
  alternatives_spanish:
  - para que no la lleves tú solo
  - y no la lleves tú solo
  - para que tú no la soportes solo
  lexicon: HALOT
  rationale: La finalidad/resultante del reparto del Espíritu es aliviar a Moisés de la carga. En español, «no la lleves solo» expresa con claridad la exclusividad enfatizada por לְבַדֶּךָ sin redundancia excesiva.
theological_decisions:
- issue: Cómo traducir רוּחַ en este contexto de investidura para el liderazgo
  english_pob_reading: Spirit
  chosen_spanish_reading: Espíritu
  alternative_spanish_readings:
  - espíritu
  - aliento
  - viento
  rationale: La referencia inmediata muestra un poder divino compartido con los setenta ancianos en el contexto de la conducción del pueblo. En español, mayúscula en «Espíritu» ayuda a señalar ese sentido sin introducir una precisión doctrinal ajena al pasaje.
  doctrine_reference: Conservar la tensión contextual entre don carismático y presencia divina; no resolverla más allá del texto.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo WLC y el audito inglés, manteniendo la imagen de descenso, habla directa, transferencia parcial del Espíritu y compartición de la carga. No hay revisiones previas aplicadas en el paquete, así que esta redacción refleja el estado más reciente de alta concordancia.
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto solo cuando el hebreo explícitamente exige el tetragrámaton; este versículo no lo contiene.
  - Se mantuvo «Espíritu» con mayúscula por el sentido contextual de investidura divina, coherente con el audito inglés.
  - «Carga» y «llevar» se conservaron juntos para reproducir la metáfora de responsabilidad compartida.
  - No se sustituyó por «siervo» ningún término de fuerza servil; no aplica en este versículo.
