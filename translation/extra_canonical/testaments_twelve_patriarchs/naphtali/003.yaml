theological_decisions:
- issue: Reference to Sodom changing "the order of its nature"
  chosen_reading: Translate straightforwardly as a moral warning about violating created order, without expanding the specific sin beyond the Greek wording.
  alternative_readings:
  - Interpret more specifically as sexual transgression
  - Generalize as social wickedness alone
  rationale: The Greek explicitly ties Sodom to changing natural order. The translation preserves that claim without importing later doctrinal elaboration into the main text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Identity of Beliar
  chosen_reading: Retain the proper name Beliar rather than paraphrasing as "the devil" or "wickedness."
  alternative_readings:
  - Belial
  - the evil one
  rationale: The testamentary literature often personifies evil under this name. Transliteration preserves the literary and theological texture of the source.
  doctrine_reference: Translate titles; transliterate names.
- issue: The Watchers and the flood
  chosen_reading: Translate the Greek witness as linking the Watchers' transgression with divine curse and the earth's desolation.
  alternative_readings:
  - Treat as a compressed allusion needing harmonization with Genesis 6
  - Soften the mythic element
  rationale: The text reflects Second Temple Jewish tradition. It should be rendered honestly as received, with explanation in a note rather than harmonized away.
  doctrine_reference: Original-language primacy over translation tradition.
