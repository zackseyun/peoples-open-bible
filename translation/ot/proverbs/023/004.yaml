id: PRO.23.4
reference: Proverbs 23:4
source:
  edition: WLC
  text: אַל תִּיגַ֥ע לְֽ/הַעֲשִׁ֑יר מִֽ/בִּינָתְ/ךָ֥ חֲדָֽל־׃
translation:
  text: Do not wear yourself out to get rich[a]; stop relying on your own understanding.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Do not toil to become rich; cease from your own wisdom.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  chosen: Do not
  alternatives:
  - Do not ever
  - Never
  lexicon: HALOT
  rationale: Standard negative particle used with the following imperfect/jussive-like verb to express prohibition.
- source_word: תִּיגַע
  chosen: wear yourself out
  alternatives:
  - toil
  - labor
  - exhaust yourself
  lexicon: HALOT
  rationale: From יגע, conveying wearying labor or exhausting effort. 'Wear yourself out' captures both the physical and figurative sense better than the flatter 'labor' in this warning context.
- source_word: לְהַעֲשִׁיר
  chosen: to get rich
  alternatives:
  - to become rich
  - to gain wealth
  lexicon: HALOT
  rationale: Hiphil infinitive of עשר, 'to become rich' or 'to make rich' depending on context. Here after the prohibition it denotes the aim of one's exhausting effort, so 'to get rich' is idiomatic and clear.
- source_word: מִבִּינָתְךָ
  chosen: relying on your own understanding
  alternatives:
  - from your understanding
  - according to your insight
  - by your own wisdom
  lexicon: HALOT
  rationale: בינה is 'understanding, insight.' The prefixed מִן with חדל idiomatically marks what one is to desist from. Rendering it as 'relying on your own understanding' makes explicit the sense in English without over-paraphrasing, since a bare 'cease from your understanding' is unnatural and obscure.
- source_word: חֲדָל
  chosen: stop relying on
  alternatives:
  - cease from
  - desist from
  - let it go
  lexicon: HALOT
  rationale: Imperative of חדל, 'stop, cease, desist.' In sequence with the prior prohibition it gives a second command. 'Stop relying on' fits the idiom with מִבִּינָתְךָ and communicates the practical force of the admonition.
