translation:
  language: es
  text: ¿Quién puede sacar algo limpio[a] de algo impuro? Nadie[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una cosa limpia» o «lo que es limpio». El hebreo usa aquí un adjetivo sustantivado.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Ni uno solo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién es el que
  - ¿Quién podría
  lexicon: HALOT
  rationale: Interrogativo directo que conserva el tono retórico del hebreo sin añadir más explicación de la necesaria.
- source_word: יִתֵּן
  english_pob_choice: can bring
  chosen_spanish: puede sacar
  alternatives_spanish:
  - puede producir
  - puede traer
  - puede hacer surgir
  lexicon: HALOT
  rationale: En este dicho, נתן no expresa simplemente 'dar', sino el acto de hacer salir o traer algo a partir de otra cosa. 'Sacar' reproduce bien la idea de procedencia y mantiene la imposibilidad retórica.
- source_word: טָהוֹר
  english_pob_choice: a clean thing
  chosen_spanish: un ser limpio
  alternatives_spanish:
  - algo limpio
  - una cosa limpia
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivado. 'Un ser limpio' comunica la sustantivación de manera natural en español y evita la frialdad de 'cosa' cuando el contraste de pureza/impureza se presenta de forma proverbial.
- source_word: מִטָּמֵא
  english_pob_choice: out of an unclean
  chosen_spanish: de uno impuro
  alternatives_spanish:
  - de algo impuro
  - de un ser impuro
  - de lo impuro
  lexicon: HALOT
  rationale: La preposición con el adjetivo sustantivado expresa origen. 'De uno impuro' conserva la concisión del hebreo y el contraste con 'un ser limpio', sin decidir innecesariamente entre lo ritual, moral o existencial.
- source_word: לֹא אֶחָד
  english_pob_choice: No one
  chosen_spanish: Nadie
  alternatives_spanish:
  - No uno
  - No hay ninguno
  lexicon: HALOT
  rationale: La expresión hebrea es una negación absoluta. 'Nadie' es la equivalencia más natural en español y mantiene el cierre enfático de la respuesta retórica.
theological_decisions:
- issue: Alcance de la impureza
  english_pob_reading: General statement of human inability to produce purity from impurity, in context applied to humanity's impure condition.
  chosen_spanish_reading: Afirmación general sobre la imposibilidad de sacar pureza de la impureza, sin especificar si la impureza es ritual, moral o existencial.
  alternative_spanish_readings:
  - Declaración sobre nacimiento de padres impuros
  - Proverbio sobre impureza moral y ritual
  rationale: El verso es deliberadamente breve y proverbial. La traducción conserva la tensión semántica y no resuelve prematuramente la naturaleza exacta de la impureza, dejando que el contexto inmediato de Job 14 la determine.
  doctrine_reference: Conservar la tensión teológica en vez de cerrarla interpretativamente.
translation_notes:
  revision_awareness: El texto base del POB en inglés no requirió cambios recientes; la presente versión sigue el estado más reciente del expediente auditado y preserva la lectura de alta concordancia sin introducir aclaraciones interpretativas adicionales.
  spanish_consistency_notes:
  - Se mantiene «impuro» para טָמֵא, en línea con el contraste léxico de pureza/impureza.
  - Se evita «SEÑOR» u otros sustitutos porque este versículo no contiene el nombre divino.
  - Se usa «Nadie» como equivalente idiomático de לֹא אֶחָד, con nota alternativa para la forma más literal.
