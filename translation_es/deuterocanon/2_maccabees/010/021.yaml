revisions:
- from: ¡Paz[a]! En el año ciento cuarenta y ocho[b], el día veinticuatro de Díos Corintio[c].
  to: ¡Adiós! En el año ciento cuarenta y ocho[a], el día veinticuatro de Dioscorintio[b].
  rationale: Se reemplaza «¡Paz!» por «¡Adiós!» para reflejar la función epistolar de despedida de ἔρρωσθε sin añadir un matiz ajeno. Se normaliza el mes a «Dioscorintio» como transliteración unitaria del nombre macedonio Διὸς Κορινθίου, de acuerdo con la auditoría inglesa. Se conservan la datación y el día veinticuatro en español claro y natural.
