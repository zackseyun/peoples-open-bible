review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo y sigue adecuadamente la línea del POB inglés: inversión de la arrogancia humana y exaltación exclusiva de Yahvé en aquel día. Conserva correctamente el paralelismo singular/plural («el hombre ... los hombres») y el nombre divino «Yahvé». Sin embargo, la nota al pie no preserva fielmente la alternativa auditada en inglés, porque sustituye «orgullo» por «exaltación» y así pierde el matiz explicativo de arrogancia humana que la nota pretende aclarar.'
  spanish_quality_summary: El español es claro, digno y ampliamente legible. «La altivez del hombre será abatida ... la exaltación de los hombres será humillada» suena natural y mantiene la imaginería vertical. El orden final «Yahvé será exaltado solo» es aceptable, pero «solo Yahvé será exaltado» expresa con más naturalidad y fuerza la exclusividad de לְבַדּוֹ en español bíblico actual.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; הָאָדָם / אֲנָשִׁים -> «el hombre / los hombres» conservando el paralelismo; רוּם y וְנִשְׂגַּב se reproducen bien con «exaltación / será exaltado». No hay conflicto doctrinal serio. La única corrección necesaria es ajustar la nota léxica para reflejar la alternativa documentada por el POB inglés.'
  issues:
  - severity: medium
    issue: La nota al pie no reproduce fielmente la alternativa léxica auditada.
    rationale: La nota inglesa ofrece «The haughtiness of man ... the pride of men ...». El borrador español dice «la exaltación de los hombres», que repite el texto principal en vez de ofrecer una alternativa aclaratoria como «el orgullo de los hombres». Esto debilita la justificación léxica sobre la imaginería de altura y arrogancia.
  - severity: low
    issue: La posición de «solo» puede mejorarse para resaltar la exclusividad.
    rationale: Aunque «Yahvé será exaltado solo» es comprensible, «solo Yahvé será exaltado» suena más natural y enfatiza mejor que únicamente Yahvé, y nadie más, quedará exaltado en ese día.
  revised_spanish_text: La altivez del hombre será abatida[a], y la exaltación de los hombres será humillada; y solo Yahvé será exaltado en aquel día.
  revised_footnotes:
  - marker: a
    text: 'O: «La altivez del hombre será humillada, y el orgullo de los hombres será abatido». El hebreo usa imágenes de altura para la arrogancia humana.'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal casi intacto porque es fiel al hebreo y al POB, pero se mejora la colocación de «solo» para expresar con más claridad la exclusividad de Yahvé. Además, se corrige la nota al pie para que refleje realmente la alternativa léxica documentada en el inglés POB, introduciendo «orgullo» como equivalente explicativo del matiz de arrogancia humana.
