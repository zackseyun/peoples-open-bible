    reason: cultural_note
  revision_rationale: 'La revisión corrige tres problemas principales: naturalidad española, claridad del sentido iterativo y precisión contextual del reclutamiento militar. «Intensa» comunica mejor חֲזָקָה en español, mientras la nota conserva el literal hebreo. «Cada vez que» refleja el valor habitual de וְרָאָה. «Hombre de valor» reemplaza el calco poco idiomático «hijo de valor», y «lo incorporaba a su servicio» expresa con más fidelidad el sentido de אסף אליו en este contexto. Se mantiene una nota cultural para conservar el matiz de reclutamiento documentado por el POB inglés.'
