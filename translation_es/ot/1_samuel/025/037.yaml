base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/025/037.yaml
  text: And in the morning[a], when the wine had gone out of Nabal, his wife told him these things, and his heart died within him[b], and he became like a stone.
  footnotes:
  - marker: a
    text: Literally, 'when the wine had gone out of Nabal,' that is, when he had sobered up or the effects of the wine had left him.
    reason: lexical_alternative
  - marker: b
    text: Or 'his heart failed within him.' The Hebrew uses vivid imagery rather than a technical medical description.
    reason: lexical_alternative
