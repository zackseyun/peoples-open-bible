  category: lexical
  tier: 3
  from: A man advanced in days will not hesitate, in his days, to ask
  to: An old man in his days will not be ashamed to ask
  rationale: 'Coptic ϫⲛⲁⲩ (Sahidic ϣⲓⲡⲉ) means ''to be ashamed'' (Crum 775a). Translating
    it as ''hesitate'' strips the saying of its crucial social dynamic: the honor/shame
    reversal of an elder seeking wisdom from a newborn. Furthermore, the draft awkwardly
    splits and double-translates ⲡⲣⲱⲙⲉ ⲛ̄ϩⲗⲗⲟ ϩⲛ̄ⲛⲉϥϩⲟⲟⲩ (''the old man in his days'')
    as ''advanced in days... in his days''. | Azure: The proposed change is closer
    to the Coptic. The verb in this saying is the Sahidic verb for being ashamed/shy,
    not a generic ''hesitate''; rendering it ''be ashamed'' preserves the honor-shame
    force of t'
- timestamp: '2026-04-22T09:04:54Z'
  adjudicator: azure_gpt54_tier3_adjudicator
  adjudicator_confidence: 0.96
  reviewer_model: gemini-3.1-pro-preview
  source_review: state/reviews/gemini/phase9_nag_hammadi/extra_canonical/gospel_of_thomas/001/004.job-72026.json
  category: theological_weight
  tier: 3
  from: one and the same
  to: a single one
  rationale: 'ⲟⲩⲁ ⲟⲩⲱⲧ is a key Thomasine technical term for ontological unity and
    indivisibility (often parallel to Greek μοναχός). The English idiom ''one and
    the same'' wrongly implies mere equivalence between the first and the last, rather
    than their transformation into a unified being (''a single one''). | Azure: The
    proposed change is closer to the Coptic. The closing phrase of Thomas 4 is ⲟⲩⲁ
    ⲟⲩⲱⲧ, literally ''one, single'' / ''a single one,'' a recurrent Thomasine expression
    for unity or singleness, not the Eng'
