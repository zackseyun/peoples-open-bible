lexical_decisions:
- source_word: ἀκριβῶς οἴδατε
  english_pob_choice: know very well
  chosen_korean: 잘 알고 있기
  alternatives_korean:
  - 정확히 알고 있기
  - 분명히 알고 있기
  lexicon: BDAG
  rationale: ἀκριβῶς의 「정확히·분명히」 의미. 「잘」이 한국어로 가장 자연스럽다.
- source_word: ἡμέρα κυρίου
  english_pob_choice: the day of the Lord
  chosen_korean: 주의 날
  alternatives_korean:
  - 주님의 날
  - 야훼의 날
  lexicon: BDAG
  rationale: 한국 교회 전통의 「주의 날」이 정형. 본 절은 신약 정황이므로 「야훼의 날」로 옮기지 않고 「주의 날」을 유지한다.
- source_word: ὡς κλέπτης ἐν νυκτὶ οὕτως ἔρχεται
  english_pob_choice: comes like a thief in the night
  chosen_korean: 밤에 도둑이 오듯 그렇게 온다
  alternatives_korean:
  - 밤에 도둑같이 임한다
  - 밤중에 도둑처럼 다가온다
  lexicon: BDAG
  rationale: 비유 「도둑같이」의 직관성을 한국어로 자연스럽게 「~듯 그렇게」로 옮긴다.
