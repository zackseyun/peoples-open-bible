translation:
  language: es
  text: Y cuando yo traiga nubes sobre la tierra[a], el arco será visto en la nube.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el arcoíris». El hebreo «el arco» usa la palabra ordinaria para un arco, aquí referida al arcoíris como señal del pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y sucederá que cuando
  - Y será que cuando
  lexicon: HALOT
  rationale: La construcción introduce una circunstancia temporal futura; «Y cuando» reproduce con naturalidad esa función sin perder el valor temporal del hebreo.
- source_word: בְּעַנְנִי
  english_pob_choice: I bring
  chosen_spanish: yo traiga
  alternatives_spanish:
  - yo cubra de nubes
  - yo haga nublar
  lexicon: HALOT
  rationale: El valor causativo/denominativo se expresa en español de forma natural con «traiga nubes», conservando la idea de producir nubes sobre la tierra.
- source_word: עָנָן
  english_pob_choice: clouds
  chosen_spanish: nubes
  alternatives_spanish:
  - una nube
  - nubarrones
  lexicon: HALOT
  rationale: Aunque el hebreo es singular, funciona colectivamente; en español, el plural «nubes» comunica mejor la idea sin forzar un singular colectivo poco natural.
- source_word: עַל הָאָרֶץ
  english_pob_choice: over the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra
  - sobre el mundo
  lexicon: HALOT
  rationale: «Sobre la tierra» preserva la amplitud cósmica del pasaje y es una equivalencia natural para עַל הָאָרֶץ.
- source_word: וְנִרְאֲתָה
  english_pob_choice: will be seen
  chosen_spanish: será visto
  alternatives_spanish:
  - aparecerá
  - será visible
  lexicon: HALOT
  rationale: Se mantiene la pasiva del nifal con «será visto», aunque en español la concordancia con un referente femenino se resolvería mejor con nota textual o ajuste sintáctico; se optó por conservar la estructura pasiva ligada al texto fuente.
- source_word: הַקֶּשֶׁת
  english_pob_choice: the bow
  chosen_spanish: el arco
  alternatives_spanish:
  - el arcoíris
  - el arco
  lexicon: HALOT
  rationale: El hebreo dice literalmente «el arco»; se conserva esa imagen léxica en español y se evita reemplazarla por «arcoíris» en el texto principal, siguiendo la transparencia del POB.
- source_word: בֶּעָנָן
  english_pob_choice: in the cloud
  chosen_spanish: en la nube
  alternatives_spanish:
  - en la nube
  - entre las nubes
  lexicon: HALOT
  rationale: El singular con artículo se vierte de manera directa como «en la nube», manteniendo la correspondencia estrecha con el hebreo.
theological_decisions:
- issue: קשת en el contexto del pacto con Noé
  english_pob_reading: the bow
  chosen_spanish_reading: el arco
  alternative_spanish_readings:
  - el arcoíris
  rationale: Se preserva la imagen lexical del hebreo y la decisión del POB de no sustituirla por el término interpretativo más familiar en el texto principal; el sentido contextual de arcoíris puede explicitarse en nota.
  doctrine_reference: Transparencia léxica y primacía del idioma original en la traducción.
translation_notes:
  revision_awareness: El audit trail inglés mantiene «the bow» y una nota para «the rainbow»; también conserva la pasiva «will be seen». En español, se siguió esa transparencia léxica, pero se documentó la tensión de concordancia gramatical creada por el sustantivo femenino hebreo קשת y la forma pasiva.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponda; aquí no aparece.
  - «Tierra» se usa para el alcance cósmico del diluvio.
  - Se evita «arcoíris» en el texto principal para conservar la imagen hebrea de «arco».
