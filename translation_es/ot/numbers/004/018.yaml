translation:
  language: es
  text: No destruyan la tribu de las familias de los coatitas[a] de entre los levitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «No corten de raíz a la tribu de las familias de los coatitas de entre los levitas». El verbo hebreo puede significar «destruir» o «cortar de raíz», y «familias» también puede traducirse «clanes».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No deben
  - No han de
  lexicon: HALOT
  rationale: La partícula negativa de prohibición se vierte naturalmente con un imperativo negativo en español; «No» conserva la fuerza directa del mandato.
- source_word: תַּכְרִיתוּ
  english_pob_choice: cut off
  chosen_spanish: extingan
  alternatives_spanish:
  - corten
  - destruyan
  - elimin(en)
  lexicon: HALOT
  rationale: El verbo hebreo puede expresar «cortar de raíz» o «destruir». «Extingan» preserva la idea de hacer desaparecer un grupo sin fijar en el texto principal una sola vía interpretativa, manteniendo la tensión léxica documentada por el POB.
- source_word: שֵׁבֶט
  english_pob_choice: tribe
  chosen_spanish: tribu
  alternatives_spanish:
  - vara
  - cetro
  lexicon: HALOT
  rationale: En este contexto genealógico, el término apunta a una subdivisión tribal; «tribu» es el equivalente claro y natural en español.
- source_word: מִשְׁפְּחֹת
  english_pob_choice: families
  chosen_spanish: familias
  alternatives_spanish:
  - clanes
  lexicon: HALOT
  rationale: El plural constructo se refiere a subgrupos dentro de la línea coatita. «Familias» es transparente; «clanes» es una alternativa válida que el inglés POB mantuvo como nota.
- source_word: הַקְּהָתִי
  english_pob_choice: the Kohathites
  chosen_spanish: coatitas
  alternatives_spanish:
  - los coatitas
  - la casa de Coat
  lexicon: HALOT
  rationale: El gentilicio hebreo se entiende colectivamente. «Coatitas» comunica el grupo de forma natural en español y mantiene la referencia a los descendientes de Coat.
- source_word: מִתּוֹךְ
  english_pob_choice: from among
  chosen_spanish: de entre
  alternatives_spanish:
  - del medio de
  - de en medio de
  lexicon: HALOT
  rationale: La expresión señala separación desde dentro de un grupo mayor. «De entre» reproduce bien ese valor relacional en español actual.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levíes
  lexicon: HALOT
  rationale: Es el nombre tribal estándar. «Levitas» es la forma usual y clara en español bíblico.
theological_decisions:
- issue: Alcance de la prohibición respecto al destino de los coatitas
  english_pob_reading: A warning not to cause the Kohathite family group to be cut off from among the Levites, likely by mishandling their sacred duties.
  chosen_spanish_reading: Una prohibición de no hacer desaparecer a la tribu/familia coatita de entre los levitas, sin especificar en el texto principal el medio exacto.
  alternative_spanish_readings:
  - No destruir a la familia coatita de entre los levitas
  - No cortar de raíz a los coatitas de entre los levitas
  rationale: El hebreo formula la prohibición de modo amplio. Conviene conservar esa amplitud en español y no introducir en el cuerpo del verso una explicación causal que pertenece al contexto más amplio.
  doctrine_reference: Preservar la tensión teológica y el alcance abierto del mandato.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el acuerdo de revisión fue alto y estable, por lo que se conserva la decisión léxica principal y la nota alternativa documentada.
  spanish_consistency_notes:
  - Se usa «Yahvé» en este proyecto cuando el texto lo requiera, pero este versículo no contiene el nombre divino.
  - «Levitas» y «coatitas» se mantienen como gentilicios tribales coherentes con el resto del proyecto.
  - La nota al pie conserva la alternativa léxica del POB sin expandir innecesariamente la interpretación.
