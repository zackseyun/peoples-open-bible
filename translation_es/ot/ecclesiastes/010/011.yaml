translation:
  language: es
  text: Si la serpiente muerde sin encantamiento[a], no hay provecho para el encantador[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «antes de que sea encantada»; el hebreo también puede entenderse como «sin un encantamiento».
    reason: alternative_reading
  - marker: b
    text: Literalmente, «el dueño/la persona de la lengua»; probablemente se refiere al encantador de serpientes, es decir, al que domina palabras o conjuros.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  - En caso de que
  lexicon: HALOT
  rationale: La partícula introduce una condición proverbial. «Si» es la forma española más natural y fiel para este caso hipotético.
- source_word: יִשֹּׁךְ
  english_pob_choice: bites
  chosen_spanish: muerde
  alternatives_spanish:
  - pica
  - ataca
  lexicon: HALOT
  rationale: El verbo hebreo se usa de una mordedura, especialmente de una serpiente. «Muerde» conserva la imagen directa del original.
- source_word: הַנָּחָשׁ
  english_pob_choice: the snake
  chosen_spanish: la serpiente
  alternatives_spanish:
  - la culebra
  - la víbora
  lexicon: HALOT
  rationale: En español, «serpiente» es la opción más amplia, digna y natural en un proverbio de tono sapiencial. Mantiene la referencia literal sin añadir connotaciones doctrinales.
- source_word: בְּלוֹא לָחַשׁ
  english_pob_choice: before it is charmed / without an incantation
  chosen_spanish: sin encantamiento
  alternatives_spanish:
  - antes de ser encantada
  - sin conjuro
  - sin incantación
  lexicon: HALOT
  rationale: La construcción admite la idea de ausencia de encantamiento o de acción de encantar. «Sin encantamiento» preserva esa ambigüedad y resulta idiomático en español, sin decidir en exceso entre la lectura temporal o instrumental.
- source_word: וְאֵין יִתְרוֹן
  english_pob_choice: there is no advantage
  chosen_spanish: no hay provecho
  alternatives_spanish:
  - no hay ventaja
  - no hay ganancia
  lexicon: HALOT
  rationale: יִתְרוֹן es un término clave de Eclesiastés con el sentido de provecho, ventaja o ganancia. «Provecho» funciona bien en español y mantiene el valor sapiencial del término.
- source_word: לְבַעַל הַלָּשׁוֹן
  english_pob_choice: for the charmer
  chosen_spanish: para el encantador
  alternatives_spanish:
  - para el dueño de la lengua
  - para el maestro de la lengua
  - para el que domina la lengua
  lexicon: HALOT
  rationale: Aunque literalmente dice «el dueño de la lengua», el contexto favorece la figura del que practica encantamiento verbal para serpientes. «Encantador» comunica el referente probable sin ocultar la base idiomática, que queda preservada en la nota.
translation_notes:
  revision_awareness: El auditorio inglés se mantuvo estable en la revisión más reciente y el cotejo cruzado mostró alta concordancia; por ello el borrador español sigue de cerca esa solución, conservando la ambigüedad de בְּלוֹא לָחַשׁ y explicando idiomáticamente לְבַעַל הַלָּשׁוֹן en nota.
  spanish_consistency_notes:
  - Se mantuvo «encantamiento/encantador» para reflejar el campo semántico de לָחַשׁ y de la expresión idiomática final.
  - Se evitó «SEÑOR» o equivalentes irrelevantes, ya que no aparecen términos divinos en este versículo.
  - «No hay provecho» conserva el vocabulario sapiencial de Eclesiastés sin forzar una traducción más interpretativa.
