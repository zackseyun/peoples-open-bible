review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca la secuencia hebrea y las decisiones del POB en la mayoría de los elementos: tomó al pueblo, lo dividió en tres grupos, observó la salida del pueblo de la ciudad y actuó contra ellos. También conserva bien el matiz progresivo de יֹצֵא con “salía”. Sin embargo, dos puntos necesitan ajuste: וַיֶּאֱרֹב בַּשָּׂדֶה no queda del todo natural ni preciso con “se puso en emboscada”, y וַיַּכֵּם queda demasiado débil con “los hirió” frente al inglés auditado “struck them down” y la fuerza narrativa de נכה en este contexto.'
  spanish_quality_summary: El texto es generalmente claro y legible, pero “se puso en emboscada” suena poco idiomático en español bíblico natural. “Se puso al acecho” o “tendió una emboscada” sería más claro; dado que el inglés auditado prefirió el matiz verbal de “lay in wait”, “se puso al acecho en el campo” preserva mejor la acción. Además, “los hirió” minimiza la contundencia del ataque; “los derribó” o “los abatió” suena más acorde al contexto sin sobreafirmar muerte. El resto del verso fluye bien.
  glossary_alignment: No hay términos del glosario mayor en disputa aquí. “Pueblo” para עָם respeta la decisión auditada de no sobreespecificar “sus hombres”. La nota sobre “tres cabezas” está bien y conserva la alternativa documentada. No hay conflicto teológico ni terminológico de proyecto.
  issues:
  - severity: medium
    issue: “se puso en emboscada en el campo” es poco idiomático y no refleja bien el valor verbal de אָרַב
    rationale: וַיֶּאֱרֹב describe ponerse al acecho / esperar en emboscada. La frase actual suena forzada en español. “Se puso al acecho en el campo” mantiene el aspecto verbal y mejora la naturalidad.
  - severity: medium
    issue: “los hirió” debilita demasiado וַיַּכֵּם
    rationale: Aunque נכה no exige “matar”, en este contexto de ataque sorpresivo el inglés auditado eligió “struck them down”. “Los hirió” puede sonar demasiado leve. “Los derribó” transmite violencia decisiva sin afirmar explícitamente que los mató.
  revised_spanish_text: Tomó al pueblo[a], lo dividió en tres grupos, y se puso al acecho en el campo. Cuando vio que el pueblo salía de la ciudad, se levantó contra ellos y los derribó.
  revised_footnotes:
  - marker: a
    text: O “lo dividió en tres bandas/compañías”; literalmente, “en tres cabezas”, un modismo hebreo para divisiones o compañías.
    reason: lexical_alternative
  revision_rationale: Se ajusta una expresión poco natural (“se puso en emboscada”) a un español más idiomático y fiel al hebreo (“se puso al acecho”), y se fortalece “los hirió” a “los derribó” para reflejar mejor la fuerza de נכה en el contexto narrativo sin sobretraducir a “mató”. La nota existente se conserva porque representa correctamente la alternativa idiomática de רָאשִׁים.
