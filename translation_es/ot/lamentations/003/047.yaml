translation:
  language: es
  text: Terror y la fosa han venido sobre nosotros[a], devastación y ruina[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «temor y la fosa». El hebreo hace eco de una fórmula conocida de juicio (compárese Isaías 24:17), preservando tanto la idea de espanto como la de quedar atrapados.
    reason: cross_reference
  - marker: b
    text: O «desolación y ruina».
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּחַד
  english_pob_choice: terror
  chosen_spanish: pavor
  alternatives_spanish:
  - terror
  - temor
  - dread
  lexicon: HALOT
  rationale: El hebreo puede expresar miedo intenso o terror. «Pavor» conserva la fuerza afectiva y suena natural en español bíblico actual, sin suavizar el impacto del lamento.
- source_word: וָפַחַת
  english_pob_choice: the pit
  chosen_spanish: la fosa
  alternatives_spanish:
  - el pozo
  - la fosa
  - el hoyo
  lexicon: HALOT
  rationale: La referencia apunta a la imagen de caída, trampa o sepultura asociada a la fosa. «La fosa» comunica bien la imagen lexical sin perder la resonancia de juicio; «el pozo» o «el hoyo» serían posibles, pero menos solemnes aquí.
- source_word: הָיָה לָנוּ
  english_pob_choice: have come upon us
  chosen_spanish: han venido sobre nosotros
  alternatives_spanish:
  - nos han sobrevenido
  - han caído sobre nosotros
  - nos han alcanzado
  lexicon: HALOT
  rationale: La expresión hebrea indica la llegada efectiva de estas calamidades a la experiencia del pueblo. «Han venido sobre nosotros» reproduce ese valor idiomático de manera clara y natural.
- source_word: הַשֵּׁאת
  english_pob_choice: devastation
  chosen_spanish: devastación
  alternatives_spanish:
  - desolación
  - destrucción
  - ruina
  lexicon: HALOT
  rationale: El sustantivo denota desolación/ruina. «Devastación» mantiene el peso del paralelismo y es una solución transparente en español.
- source_word: וְהַשָּׁבֶר
  english_pob_choice: destruction
  chosen_spanish: ruina
  alternatives_spanish:
  - quebrantamiento
  - destrucción
  - derrumbe
  lexicon: HALOT
  rationale: Derivado de la raíz de «romper», el término señala quebranto o colapso. «Ruina» conserva la idea del resultado devastador y equilibra bien el paralelismo con «devastación».
theological_decisions:
- issue: Imagen de juicio y entrapamiento en el paralelismo hebreo
  english_pob_reading: The Hebrew echoes a known judgment formula (compare Isa 24:17), preserving both dread and entrapment imagery.
  chosen_spanish_reading: 'El verso conserva una fórmula de juicio con doble imagen: temor intenso y caída en una fosa.'
  alternative_spanish_readings:
  - solo pavor y destrucción
  - miedo y pozo
  - terror y la trampa
  rationale: Aunque el texto no nombra explícitamente una trampa, la imagen de la fosa mantiene la resonancia de juicio y de peligro fatal. No conviene borrar esa tensión reduciéndola a un sinónimo abstracto.
  doctrine_reference: 'Jeremías/Isaías: imaginería de juicio divino; ver Isaías 24:17 como eco'
- issue: Rango semántico de the source nouns for ruin
  english_pob_reading: devastation and destruction
  chosen_spanish_reading: devastación y ruina
  alternative_spanish_readings:
  - desolación y destrucción
  - devastación y destrucción
  - destrucción y ruina
  rationale: La pareja española debe conservar el paralelismo y no volver idénticos dos sustantivos que en hebreo distinguen matices cercanos. «Ruina» evita sobretraducir al mismo registro de «destrucción» y mantiene la idea de colapso resultante.
  doctrine_reference: Poética hebrea; paralelismo semántico
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó «pitfall» por «the pit» para ajustarse más al hebreo. En español se siguió esa corrección con «la fosa», evitando una imagen de trampa más interpretativa que el texto base no exige. También se mantuvo un par léxico distinto para las dos últimas palabras, preservando el paralelismo sin borrar matices.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponde al nombre divino; aquí no aparece.
  - Se mantuvo un registro sobrio y poético, acorde con Lamentaciones.
  - «Fosa» respeta la revisión textual hacia una imagen más literal que «trampa» o «pitfall».
  - «Devastación y ruina» conserva el doblete de calamidad sin hacerlo redundante.
