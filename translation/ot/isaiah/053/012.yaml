theological_decisions:
- issue: Scope implied by רַבִּים ('many')
  chosen_reading: Render as 'many' without resolving whether it is rhetorically equivalent to 'all' or a more limited group.
  alternative_readings:
  - all
  - the multitude
  rationale: The Hebrew says 'many.' The translation preserves that wording and leaves broader theological inferences to interpretation rather than importing them into the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Atonement language in נָשָׂא חֵטְא
  chosen_reading: Render 'he bore the sin of many' with sacrificial/representative force preserved but not expanded.
  alternative_readings:
  - he took away the sin of many
  - he suffered punishment for many
  rationale: The phrase carries weight in Isaiah's servant song, but the translation should not flatten it into one later doctrinal formula. 'Bore the sin' is faithful and theologically transparent.
  doctrine_reference: Original-language primacy over translation tradition; preserve theological tension rather than resolve it.
- issue: Meaning of יַפְגִּיעַ in final clause
  chosen_reading: Use present-like English 'intercedes for transgressors' to express the verb's petitionary sense.
  alternative_readings:
  - made intercession for transgressors
  - pleads for transgressors
  rationale: The Hebrew imperfect can be rendered in English with a present sense in a gnomic/resultative summary. This avoids forcing a strictly past tense while preserving the servant's mediatorial action.
  doctrine_reference: Optimal equivalence; preserve theological tension rather than resolve it.
