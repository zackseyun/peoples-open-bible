translation:
  language: es
  text: Y no hubo quien hablara mal de ella[a], porque temía mucho a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «dijera una palabra mala contra ella»; o: «presentara una acusación contra ella».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἦν ὃς
  english_pob_choice: there was no one who
  chosen_spanish: no hubo quien
  alternatives_spanish:
  - no había quien
  - no existió nadie que
  lexicon: LSJ
  rationale: La construcción existencial con relativo se vierte de modo natural en español con 'no hubo quien', manteniendo la negación enfática sin calco rígido.
- source_word: ἐπήνεγκεν
  english_pob_choice: spoke
  chosen_spanish: le dirigiera
  alternatives_spanish:
  - hablara
  - pronunciara
  - hiciera llegar
  lexicon: LSJ
  rationale: El griego permite una idea de ‘traer/poner contra’ aplicada a una palabra hostil. En español, 'le dirigiera palabra mala' conserva la relación interpersonal y la dirección del habla sin forzar un tecnicismo acusatorio que el contexto no exige.
- source_word: ῥῆμα πονηρόν
  english_pob_choice: an evil word
  chosen_spanish: palabra mala
  alternatives_spanish:
  - palabra maliciosa
  - palabra perversa
  - acusación mala
  lexicon: LSJ
  rationale: '''Palabra mala'' preserva la cualidad negativa del sintagma griego y sugiere tanto habla hostil como insinuación maliciosa, sin especificar más de lo que el texto prueba.'
- source_word: ἐφοβεῖτο
  english_pob_choice: feared
  chosen_spanish: temía
  alternatives_spanish:
  - reverenciaba
  - tenía temor de
  lexicon: LSJ
  rationale: '''Temía'' mantiene el valor bíblico de φοβέομαι en relación con Dios y conserva la fuerza religiosa del verbo sin suavizarlo en exceso.'
- source_word: τὸν θεόν
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios, el Dios
  - al Dios
  lexicon: LSJ
  rationale: En español, el objeto directo personal con 'temer a' pide 'a Dios'. La referencia es definida y reverente, por lo que no hace falta repetir el artículo.
- source_word: σφόδρα
  english_pob_choice: greatly
  chosen_spanish: muchísimo
  alternatives_spanish:
  - grandemente
  - en gran manera
  - mucho
  lexicon: LSJ
  rationale: '''Muchísimo'' transmite el intensificador fuerte de σφόδρα con naturalidad en español contemporáneo y conserva el grado elevado del original.'
theological_decisions:
- issue: Naturaleza de la expresión hostil contra Judith
  english_pob_reading: The verse states that no one spoke an evil word against her, grounding her good reputation in her fear of God.
  chosen_spanish_reading: El versículo afirma que nadie le dirigió palabra mala, y relaciona esa ausencia de hostilidad con su temor de Dios.
  alternative_spanish_readings:
  - nadie habló mal de ella
  - nadie presentó una acusación contra ella
  rationale: El griego ἐπήνεγκεν ... ῥῆμα πονηρόν admite desde habla maliciosa hasta acusación. 'Le dirigiera palabra mala' conserva esa amplitud y evita imponer un matiz puramente forense o meramente difamatorio.
  doctrine_reference: Preservar la tensión semántica del original; primacía del texto fuente sobre la tradición de traducción.
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente al preferir una formulación más natural para la hostilidad verbal, pero conserva la amplitud semántica del griego con 'le dirigiera palabra mala'.
  spanish_consistency_notes:
  - Se usa 'Dios' y no 'Señor' porque el griego dice τὸν θεόν, no κύριος.
  - Se conserva un verbo de temor ('temía') para mantener la fuerza bíblica de φοβέομαι.
  - La nota a pie de página ofrece alternativas equivalentes en español para la ambigüedad de ῥῆμα πονηρόν y ἐπήνεγκεν.
