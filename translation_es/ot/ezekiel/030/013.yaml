translation:
  language: es
  text: 'Así dice Yahvé Dios: Yo destruiré los ídolos y pondré fin a las imágenes[a] de Nof, y ya no habrá más príncipe[b] de la tierra de Egipto; y pondré temor en la tierra de Egipto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Nof es el nombre hebreo de la ciudad egipcia que más tarde se conoció en griego como Menfis.
    reason: cross_reference
  - marker: b
    text: O 'ya no habrá más un gobernante de la tierra de Egipto'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor DIOS
  - el Señor Yahvé
  lexicon: HALOT
  rationale: El hebreo combina el título soberano אֲדֹנָי con el nombre divino יְהוִה. En español, 'Señor Yahvé' conserva ambos elementos sin ocultar el nombre de pacto y evita la convención de sustitución por 'SEÑOR'.
- source_word: וְהַאֲבַדְתִּי
  english_pob_choice: I will destroy
  chosen_spanish: Yo destruiré
  alternatives_spanish:
  - yo haré perecer
  - yo borraré
  lexicon: HALOT
  rationale: El hifil expresa eliminación decisiva en un contexto de juicio. 'Destruiré' es natural en español y mantiene la fuerza causal del hebreo.
- source_word: גִלּוּלִים
  english_pob_choice: idols
  chosen_spanish: los ídolos
  alternatives_spanish:
  - las imágenes idolátricas
  - los ídolos despreciables
  lexicon: HALOT
  rationale: '''Ídolos'' conserva el sentido básico y permite que el matiz despectivo del término hebreo quede implícito sin sobreinterpretar.'
- source_word: וְהִשְׁבַּתִּי
  english_pob_choice: put an end to
  chosen_spanish: pondré fin a
  alternatives_spanish:
  - haré cesar
  - terminaré con
  lexicon: HALOT
  rationale: El hifil de שׁבת significa hacer cesar. 'Pondré fin a' comunica bien esa causatividad con fluidez en español.
- source_word: אֱלִילִים
  english_pob_choice: images
  chosen_spanish: las imágenes
  alternatives_spanish:
  - los ídolos
  - las figurillas sin valor
  lexicon: HALOT
  rationale: Como 'gillulim' ya fue traducido por 'ídolos', 'imágenes' preserva la distinción entre ambos vocablos cercanos y refleja objetos cultuales o representaciones.
- source_word: מִנֹּף
  english_pob_choice: from Noph
  chosen_spanish: de Nof
  alternatives_spanish:
  - de Noph
  - de Menfis
  lexicon: HALOT
  rationale: Se conserva el topónimo hebreo en forma transliterada ('Nof'), siguiendo la práctica de la POB de no sustituir automáticamente por el nombre grecolatino.
- source_word: וְנָשִׂיא מֵאֶרֶץ מִצְרַיִם לֹא יִהְיֶה עוֹד
  english_pob_choice: there will no longer be a prince from the land of Egypt
  chosen_spanish: ya no habrá más un príncipe de la tierra de Egipto
  alternatives_spanish:
  - ya no habrá más un gobernante de la tierra de Egipto
  - ya no existirá más un príncipe de la tierra de Egipto
  lexicon: HALOT
  rationale: '''Nasi'' admite ''príncipe'' o ''gobernante''. Se mantiene ''príncipe'' por su cercanía formal al término y porque la POB en inglés lo eligió como lectura principal.'
- source_word: וְנָתַתִּי יִרְאָה
  english_pob_choice: I will put fear
  chosen_spanish: pondré temor
  alternatives_spanish:
  - pondré miedo
  - infundiré temor
  lexicon: HALOT
  rationale: La construcción hebrea literalmente es 'dar/poner temor'. 'Pondré temor' conserva la imagen verbal sin intensificar innecesariamente a 'terror'.
- source_word: בְּאֶרֶץ מִצְרָיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en el país de Egipto
  - en la tierra egipcia
  lexicon: HALOT
  rationale: '''Tierra de Egipto'' reproduce con naturalidad la expresión bíblica y mantiene el registro geográfico del hebreo.'
theological_decisions:
- issue: Renderización del nombre divino en el título compuesto אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor DIOS
  - el Señor Yahvé
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. En esta serie, el nombre divino se mantiene como 'Yahvé' en lugar de ocultarlo detrás de 'SEÑOR', preservando la transparencia textual exigida por el proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for יְהוָה YHWH; Translation philosophy #2'
- issue: Distinción semántica entre גִלּוּלִים y אֱלִילִים
  english_pob_reading: idols ... images
  chosen_spanish_reading: ídolos ... imágenes
  alternative_spanish_readings:
  - ídolos ... ídolos
  - imágenes idólatras ... ídolos
  rationale: La POB en inglés distingue ambos términos para no borrar la duplicación deliberada del hebreo. En español, 'ídolos' y 'imágenes' conservan esa diferencia sin perder el juicio contra la idolatría.
  doctrine_reference: Principio de conservación de tensiones léxicas y distinciones sinónimas del texto fuente
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el expediente inglés; el acuerdo de revisión indica alta concordancia y ninguna modificación posterior relevante. Esta propuesta sigue la lectura principal del POB inglés y conserva su distinción entre גִלּוּלִים y אֱלִילִים, ajustándola a un español natural y transparente.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוִה conforme al estándar del proyecto.
  - Se mantiene la pareja léxica 'ídolos / imágenes' para reflejar dos términos hebreos distintos en la misma cláusula.
  - '''Príncipe'' se conserva como lectura principal, con nota de alternativa para ''gobernante'' dada la ambigüedad de נָשִׂיא.'
  - '''Nof'' se translitera y se explica en nota, en vez de reemplazarse por ''Menfis'' en el texto principal.'
