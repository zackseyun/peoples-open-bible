base_translation:
  language: en
  yaml_path: translation/ot/isaiah/051/005.yaml
  text: My righteousness is near[a], my salvation has gone out, and my arms will judge the peoples; the coastlands will wait for me[c][b], and for my arm they will hope.
  footnotes:
  - marker: a
    text: Or 'My justice is near.' The Hebrew צדק can mean 'righteousness,' 'justice,' or 'vindication' depending on context.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'my arms' here, but 'my arm' later in the verse. The imagery refers to the LORD's active power.
    reason: lexical_alternative
  - marker: c
    text: Or 'the islands' or 'the distant shores.'
    reason: lexical_alternative
