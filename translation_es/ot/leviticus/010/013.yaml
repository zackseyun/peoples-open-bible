translation:
  language: es
  text: La comerán en un lugar santo[a], porque es tu porción y la porción de tus hijos, de las ofrendas de alimento de Yahvé, pues así me fue mandado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «de las ofrendas hechas por fuego a Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲכַלְתֶּם
  english_pob_choice: You shall eat
  chosen_spanish: Lo comerán
  alternatives_spanish:
  - Y comerán
  - Deberán comerlo
  lexicon: HALOT
  rationale: El hebreo usa un imperfecto con waw en un mandato dirigido al plural masculino. En español, el futuro con valor exhortativo transmite bien el mandato sin añadir una calca innecesaria del 'and' inicial.
- source_word: אֹתָהּ
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - la
  - eso
  lexicon: HALOT
  rationale: El referente es femenino en hebreo, pero en español el objeto directo se integra mejor como 'lo' al referirse a la porción/comestible sacrificial entendida globalmente en este contexto. Se mantiene la referencia sin sobrecargar el género en la superficie española.
- source_word: בְּמָקוֹם קָדֹשׁ
  english_pob_choice: in a holy place
  chosen_spanish: en un lugar santo
  alternatives_spanish:
  - en un lugar sagrado
  - en el lugar santo
  lexicon: HALOT
  rationale: '''Lugar santo'' conserva el registro cultual y evita especificar indebidamente una estancia concreta del santuario, ya que el hebreo no lleva artículo.'
- source_word: חָקְךָ ... וְחָק בָּנֶיךָ
  english_pob_choice: your portion and the portion of your sons
  chosen_spanish: tu porción y la porción de tus hijos
  alternatives_spanish:
  - tu porción y la porción de tus hijos varones
  - tu debido y el debido de tus hijos
  lexicon: HALOT
  rationale: En contexto sacerdotal, חֹק denota una porción asignada. 'Porción' comunica bien la idea de parte heredada/estipulada. 'Tus hijos' sigue el plural masculino hebreo y sugiere la descendencia sacerdotal sin forzar un tecnicismo jurídico.
- source_word: מֵאִשֵּׁי יְהוָה
  english_pob_choice: from the food offerings of Yahweh
  chosen_spanish: de las ofrendas encendidas de Yahvé
  alternatives_spanish:
  - de las ofrendas hechas por fuego a Yahvé
  - de las ofrendas por fuego de Yahvé
  lexicon: HALOT
  rationale: Se conserva el sentido cultual de אִשִּׁים como ofrendas consumidas por fuego. 'Ofrendas encendidas' es una solución española transparente y más literal que 'ofrendas de comida', a la vez que evita perder la imaginería del fuego presente en el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue la política del proyecto para el Tetragrámaton, usando la transliteración española 'Yahvé' en lugar de la sustitución 'SEÑOR'.
- source_word: כִּי כֵן צֻוֵּיתִי
  english_pob_choice: for so I have been commanded
  chosen_spanish: pues así me fue mandado
  alternatives_spanish:
  - porque así fui mandado
  - porque así se me mandó
  lexicon: HALOT
  rationale: La pasiva del hebreo se conserva naturalmente en español con 'me fue mandado'. 'Pues' mantiene el valor explicativo del כִּי final, y la formulación suena más idiomática que una calca rígida.
theological_decisions:
- issue: Tipo de término para חֹק en contexto sacerdotal
  english_pob_reading: portion
  chosen_spanish_reading: porción
  alternative_spanish_readings:
  - debido
  - asignación
  - estatuto
  rationale: El contexto habla de la parte que corresponde a los sacerdotes de las ofrendas, no de una norma abstracta. 'Porción' preserva la concreción cultual y evita desplazar el sentido hacia una mera disposición legal.
  doctrine_reference: Translation philosophy §5 (consistencia terminológica o excepción documentada)
- issue: Naturaleza de מֵאִשֵּׁי יְהוָה
  english_pob_reading: food offerings of Yahweh
  chosen_spanish_reading: ofrendas encendidas de Yahvé
  alternative_spanish_readings:
  - ofrendas hechas por fuego a Yahvé
  - ofrendas de Yahvé
  rationale: La expresión hebrea pertenece al ámbito sacrificial consumido por fuego. 'Ofrendas encendidas' mantiene la referencia al fuego sin introducir la paráfrasis 'comida', que en español podría sonar menos precisa en un contexto ritual.
  doctrine_reference: 'Translation philosophy: primacía de la fuente original y equivalencia óptima'
- issue: Referencia de 'tus hijos'
  english_pob_reading: your sons
  chosen_spanish_reading: tus hijos
  alternative_spanish_readings:
  - tus hijos varones
  - tus descendientes
  rationale: El hebreo dice explícitamente 'hijos' y en este marco se refiere a los descendientes sacerdotales masculinos. Se conserva esa precisión sin ampliar indebidamente a un término más genérico.
  doctrine_reference: Translation philosophy §4 (precisión de género según el original)
translation_notes:
  revision_awareness: El pasaje coincide en alto grado con el audit trail inglés y no muestra revisiones posteriores que obliguen a ajustar la solución española. Se ha mantenido la tensión léxica entre la concreción cultual de חֹק como 'porción' y la imagen sacrificial de אִשֵּׁי como 'ofrendas encendidas', dejando constancia de la alternativa literal en nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה.
  - '''Porción'' se reserva para חֹק en este contexto sacerdotal, siguiendo el criterio del POB inglés.'
  - '''Ofrendas encendidas'' conserva el matiz sacrificial del fuego sin ocultarlo tras una sustitución confesional.'
  - El mandato plural se expresa con futuro exhortativo español, natural y bíblicamente digno.
