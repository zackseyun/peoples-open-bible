    rationale: El audit trail inglés eligió «like crimson» en el texto y preservó «worm-scarlet» en nota. En español, «gusano escarlata» suena torpe y desplaza el foco de color a un referente zoológico, debilitando el paralelismo poético con «escarlata / nieve / lana». «Carmesí» o «escarlata» en el texto principal comunica mejor el sentido metonímico.
  - severity: low
