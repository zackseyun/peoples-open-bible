review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia del hebreo y la mayoría de las decisiones léxicas del POB: «partieron», «el monte Hor», «por el camino del mar Rojo», «para rodear la tierra de Edom» y «en el camino» reflejan fielmente el texto fuente. Sin embargo, la cláusula final no preserva bien el sujeto idiomático del hebreo/inglés POB: וַתִּקְצַר נֶפֶשׁ הָעָם se vierte mejor con el pueblo como sujeto («el pueblo se impacientó») que con «el ánimo del pueblo se impacientó», que suena forzado y desplaza el foco.'
  spanish_quality_summary: 'La legibilidad general es buena, pero hay dos problemas de calidad: 1) el anclaje de nota [a] está colocado erróneamente en «de [a]el monte Hor», aunque la nota trata de «yam suph»; 2) «el ánimo del pueblo se impacientó» es poco natural en español bíblico claro. Conviene simplificar la frase principal y conservar la alternativa semántica en nota.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Mar Rojo» con nota alternativa para yam suph es coherente con el rastro inglés. La mejor alineación con la decisión inglesa sobre קצר נפש es «el pueblo se impacientó», con nota que preserve «se desanimó / perdió el ánimo». La nota sobre נֶפֶשׁ no debe imponerse si el texto principal ya resuelve idiomáticamente el sentido.
  issues:
  - severity: high
    issue: Marcador [a] anclado en el lugar equivocado
    rationale: La nota [a] explica la alternativa de «yam suph», pero en el borrador aparece insertada antes de «el monte Hor». Esto rompe la correspondencia obligatoria entre ancla y nota.
  - severity: high
    issue: «el ánimo del pueblo se impacientó» no refleja bien el idiomático hebreo ni el POB inglés
    rationale: El hebreo usa una expresión idiomática cuyo sentido contextual es que el pueblo se impacientó/desanimó. En español, hacer sujeto a «el ánimo» produce una frase poco idiomática y menos fiel al enfoque del POB.
  - severity: medium
    issue: Exceso de nota sobre נֶפֶשׁ en un lugar donde el POB inglés no la conserva
    rationale: El inglés preserva alternativas de sentido para la cláusula completa («became discouraged» / «lost heart»), no una nota técnica separada sobre «nephesh». En español conviene una nota funcional equivalente, no una explicación léxica que opaque la lectura.
  revised_spanish_text: Entonces partieron del monte Hor por el camino del mar Rojo[a], para rodear la tierra de Edom, y el pueblo se impacientó[b] en el camino.
  revised_footnotes:
  - marker: a
    text: 'O «por el camino hacia el mar de Juncos». Hebreo: yam suph.'
    reason: lexical_alternative
  - marker: b
    text: O «el pueblo se desanimó» o «perdió el ánimo en el camino».
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota de yam suph para que aparezca en «mar Rojo». Se simplifica la última cláusula a «el pueblo se impacientó», que representa mejor el modismo hebreo y sigue la decisión del POB inglés, mientras la nota [b] conserva las alternativas «se desanimó / perdió el ánimo». También se elimina la construcción poco natural «el ánimo del pueblo se impacientó».
