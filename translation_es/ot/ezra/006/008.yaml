revisions:
- from: 'Y por mí se emite un decreto acerca de lo que habéis de hacer con estos ancianos de los judíos para la reconstrucción de la casa de Dios: el gasto total será pagado[a] con prontitud a estos hombres[b] con los bienes del rey, de la provincia del otro lado del Río[c], para que la obra no se detenga.'
  to: 'Y por mí se emite un decreto acerca de lo que han de hacer con estos ancianos de los judíos para la reconstrucción de la casa de Dios: el gasto total será pagado[a] con prontitud a estos hombres, de los bienes del rey, de la provincia Más allá del Río[b], para que la obra no se detenga.'
  rationale: Se ajustó el registro a un español más neutral («han de hacer»), se reforzó la fidelidad al título administrativo persa («Más allá del Río») con su nota cultural, se mejoró la expresión de procedencia de los fondos («de los bienes del rey») y se eliminó una nota innecesaria sobre «a estos hombres». El resto del versículo ya preservaba bien el sentido fuente y las decisiones léxicas del POB.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:00:38Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del arameo y sigue de cerca las decisiones léxicas del POB en casi todos los puntos: decreto oficial, ancianos de los judíos, reconstrucción, casa de Dios, bienes del rey, provisión pronta y propósito de que la obra no cese. Sin embargo, hay dos desajustes importantes con el expediente inglés y con la sintaxis fuente: (1) se añadió una nota [b] para «a estos hombres» cuando el inglés no lo trata como nota sino como traducción principal; y (2) el orden y la construcción «con los bienes del rey, de la provincia del otro lado del Río» suenan menos fieles que una formulación con doble origen explícito «de los bienes del rey, de la provincia Más allá del Río».'
  spanish_quality_summary: La redacción es clara y digna, pero mezcla registros peninsulares y panhispánicos en «habéis de hacer», lo que choca con la guía de español neutro latinoamericano. Además, «del otro lado del Río» pierde algo del carácter de título administrativo; «Más allá del Río» funciona mejor como designación oficial y conserva la nota cultural. También conviene eliminar la nota literalista sobre «hombres», porque ya está en el texto principal y la nota no añade información útil.
  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. «Dios» y «casa de Dios» están bien. Las decisiones léxicas administrativas son en general correctas, pero para alinearse mejor con el POB auditado conviene usar «han de hacer» en vez de «habéis de hacer» y «de los bienes del rey, de la provincia Más allá del Río[a]» para reflejar mejor el doble complemento de procedencia y el título administrativo persa. La nota de alternativa para נִפְקְתָא debe mantenerse, y la nota cultural debe conservarse con un único marcador correctamente anclado.
  issues:
  - severity: medium
    issue: Registro no plenamente neutro en «habéis de hacer».
    rationale: La instrucción del proyecto pide español neutral latinoamericano/broadly church-readable. «Habéis» es comprensible, pero marcadamente peninsular; «han de hacer» o «deben hacer» preserva el sentido directivo sin esa marca regional.
  - severity: medium
    issue: «del otro lado del Río» debilita el carácter de título administrativo de «Beyond the River».
    rationale: El expediente inglés preserva la designación persa como título técnico y la explica en nota. «Más allá del Río» suena más estable como nombre administrativo que «del otro lado del Río».
  - severity: low
    issue: La nota [b] sobre «a estos hombres» es innecesaria y no está motivada por una ambigüedad nueva en español.
    rationale: El original y el POB ya optan por incluir «to these men» en el cuerpo del texto. En español «a estos hombres» es claro; una nota «Literalmente...» no añade valor y recarga el versículo.
  - severity: low
    issue: La preposición «con los bienes del rey» puede mejorarse a «de los bienes del rey».
    rationale: El arameo expresa procedencia/origen de los fondos. «De los bienes del rey» refleja mejor el valor de מִן y encaja mejor con «de la provincia Más allá del Río».
  revised_spanish_text: 'Y por mí se emite un decreto acerca de lo que han de hacer con estos ancianos de los judíos para la reconstrucción de la casa de Dios: el gasto total será pagado[a] con prontitud a estos hombres, de los bienes del rey, de la provincia Más allá del Río[b], para que la obra no se detenga.'
  revised_footnotes:
  - marker: a
    text: O «el costo total» o «el desembolso total».
    reason: lexical_alternative
  - marker: b
    text: «Más allá del Río» era el nombre administrativo persa para la región al oeste del Éufrates.
    reason: cultural_note
  revision_rationale: Se ajustó el registro a un español más neutral («han de hacer»), se reforzó la fidelidad al título administrativo persa («Más allá del Río») con su nota cultural, se mejoró la expresión de procedencia de los fondos («de los bienes del rey») y se eliminó una nota innecesaria sobre «a estos hombres». El resto del versículo ya preservaba bien el sentido fuente y las decisiones léxicas del POB.
