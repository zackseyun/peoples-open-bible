review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia del hebreo: llamar a Dios, acercarse/venir, orar a él, y su promesa de oír. Sin embargo, la nota [a] no preserva correctamente la alternativa documentada en inglés: debe ofrecer «ir/andar» frente a la decisión principal, no repetir «vendrán». Además, la nota [b] pone como alternativa principal la misma lectura ya usada en el texto («los escucharé»), cuando el POB inglés documenta como principal «oír» y alternativas «escuchar/atender».'
  spanish_quality_summary: El español es natural y digno. «Me invocarán» y «orarán a mí» son comprensibles, aunque «orarán a mí» suena algo menos idiomático que «orarán a mí» documentado por la relación formal con el hebreo; aun así, es aceptable. El punto principal a corregir está en las notas, no en la legibilidad del texto principal.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. El verso no contiene nombres divinos ni términos especialmente sensibles del glosario. La decisión «invocarán» para קרא y «escucharé» para שׁמע es defendible, pero las notas deben alinearse mejor con las alternativas auditadas en inglés.
  issues:
  - severity: medium
    issue: La nota [a] no corresponde a la alternativa lexical auditada para וַהֲלַכְתֶּם.
    rationale: El inglés documenta «Or 'go and pray to me'» porque הלך es literalmente 'go/walk'. La nota española actual repite «vendrán y orarán a mí», que no aporta la alternativa fuente-relevante.
  - severity: medium
    issue: La nota [b] repite la lectura principal en vez de registrar adecuadamente las alternativas de שׁמע.
    rationale: Si el texto principal dice «yo los escucharé», la nota no debe decir como alternativa «los escucharé». Debe reflejar alternativas reales como «los oiré» o «les prestaré atención / les haré caso», según el rango semántico documentado.
  revised_spanish_text: Entonces me invocarán, vendrán y orarán a mí[a], y yo los escucharé[b].
  revised_footnotes:
  - marker: a
    text: O «irán y orarán a mí»; el verbo hebreo es literalmente «ir/andar», pero aquí probablemente significa acercarse para orar.
    reason: lexical_alternative
  - marker: b
    text: O «los oiré» o «les haré caso».
    reason: lexical_alternative
  revision_rationale: El texto principal puede mantenerse, pero las notas deben corregirse para reflejar con fidelidad las alternativas lexicales preservadas en la auditoría inglesa y evitar repetir la lectura ya adoptada en español.
