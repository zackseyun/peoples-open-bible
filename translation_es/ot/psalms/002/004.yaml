translation:
  language: es
  text: El que está entronizado en los cielos se ríe[a]; el Señor se burla de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El que está sentado en los cielos se ríe; el Señor se burla de ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹשֵׁב
  english_pob_choice: the one enthroned
  chosen_spanish: el que está entronizado
  alternatives_spanish:
  - el que se sienta
  - el que está sentado
  - el que está en su trono
  lexicon: HALOT
  rationale: El participio de ישׁב puede expresar 'sentarse' o 'habitar', pero en este contexto real y polémico conviene explicitar la idea de realeza que ya está implícita. 'Entronizado' conserva el matiz soberano sin abandonar el fundamento del texto.
- source_word: בַּשָּׁמַיִם
  english_pob_choice: in the heavens
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  - en el firmamento
  lexicon: HALOT
  rationale: שָׁמַיִם es plural en hebreo, y 'los cielos' mantiene esa forma y el registro poético elevado. 'En el cielo' sería posible, pero pierde el plural y sugiere menos claramente el tono bíblico del hebreo.
- source_word: יִשְׂחָק
  english_pob_choice: laughs
  chosen_spanish: se ríe
  alternatives_spanish:
  - ríe
  - se reirá
  - ríe con burla
  lexicon: HALOT
  rationale: El imperfecto hebreo aquí funciona con valor poético de presente. 'Se ríe' es natural en español y deja que el matiz de desprecio lo dé el contexto inmediato, sin añadir más de lo que el verbo por sí solo exige.
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Soberano
  - el Dueño
  lexicon: HALOT
  rationale: La forma es el título divino אֲדֹנָי, no el nombre YHWH. En español, 'el Señor' comunica bien ese título reverente y es el equivalente idiomático más transparente, sin sustituirlo por el nombre divino donde el hebreo no lo usa.
- source_word: יִלְעַג
  english_pob_choice: mocks
  chosen_spanish: se burla de
  alternatives_spanish:
  - se mofa de
  - ridiculiza a
  - se burla contra
  lexicon: HALOT
  rationale: לעג expresa burla y desprecio. 'Se burla de' conserva ese valor en español con un tono claro y natural; 'ridiculiza a' intensifica un poco más y 'se mofa de' suena más literario regionalmente.
- source_word: לָמוֹ
  english_pob_choice: them
  chosen_spanish: de ellos
  alternatives_spanish:
  - a ellos
  - contra ellos
  lexicon: HALOT
  rationale: El pronombre retoma a los reyes y naciones rebeldes del contexto previo. Con 'se burla de ellos' el complemento directo en español resulta idiomático y conserva la referencia plural sin forzar la sintaxis.
theological_decisions:
- issue: Imagen regia de Dios junto con lenguaje antropomórfico
  english_pob_reading: Render the participle with regal force ('the one enthroned') while preserving the anthropomorphic verbs 'laughs' and 'mocks' as stated.
  chosen_spanish_reading: Traducir el participio con fuerza regia ('el que está entronizado') y conservar los verbos humanos 'se ríe' y 'se burla de'.
  alternative_spanish_readings:
  - el que se sienta en los cielos se ríe; el Señor se burla de ellos
  - el que está sentado en los cielos se ríe; el Señor se mofa de ellos
  rationale: El versículo presenta a Dios no como una abstracción, sino como Rey soberano que responde con desprecio a la rebelión humana. 'Entronizado' hace visible la realeza sin borrar el verbo subyacente de 'sentarse'; al mismo tiempo, 'se ríe' y 'se burla de' preservan el lenguaje vívido del texto en vez de suavizarlo.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto coincide con el último pase revisado del inglés POB y no requiere cambios aplicados; se mantuvo la decisión de traducir el participio con fuerza regia y de conservar el lenguaje antropomórfico del versículo.
  spanish_consistency_notes:
  - Se usó 'los cielos' para reflejar el plural hebreo שָׁמַיִם.
  - Se mantuvo 'el Señor' para אֲדֹנָי, distinguiéndolo del nombre divino YHWH.
  - La nota alternativa conserva la opción más literal 'está sentado' para transparentar el hebreo sin perder la lectura principal.
  - La construcción 'se burla de ellos' reproduce de forma natural el objeto pronominal de לָמוֹ.
