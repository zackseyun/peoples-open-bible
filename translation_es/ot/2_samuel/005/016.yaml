lexical_decisions:
- source_word: וֶ/אֱלִישָׁמָע
  english_pob_choice: and Elishama
  chosen_spanish: y Elisama
  alternatives_spanish:
  - y Elishama
  lexicon: HALOT
  rationale: Se conserva la conjunción coordinante ו como «y». Para el nombre propio, se usa la forma castellana más natural y reconocible, «Elisama», manteniendo la transliteración del antropónimo sin traducir su sentido etimológico.
- source_word: וְ/אֶלְיָדָע
  english_pob_choice: and Eliada
  chosen_spanish: y Eliada
  alternatives_spanish:
  - y Elyada
  lexicon: HALOT
  rationale: La ו inicial se rinde con «y». El nombre propio se translitera como «Eliada», que coincide con la convención estándar en español y preserva el nombre hebreo sin explicitar su etimología.
- source_word: וֶ/אֱלִיפָלֶט
  english_pob_choice: and Eliphelet
  chosen_spanish: y Elifelet
  alternatives_spanish:
  - y Eliphelet
  - y Eliphalet
  lexicon: HALOT
  rationale: La conjunción se traduce con «y». Para el nombre, se adopta «Elifelet», una forma hispana transparente y fonéticamente natural; se mantiene la variación tradicional en la nota, porque la tradición inglesa documenta dos grafías para el mismo nombre.
translation_notes:
  revision_awareness: El pasaje presenta solo una lista de nombres propios; no hubo revisiones textuales o decisiones doctrinales adicionales en el audit trail, y la única tensión relevante es la variación ortográfica del tercer nombre.
  spanish_consistency_notes:
  - Se mantiene la coordinación simple con «y» para reproducir el valor de ו en la enumeración.
  - Los nombres propios se transliteran con ortografía española natural, evitando calcos innecesarios.
  - La nota se ancla explícitamente en el tercer nombre para reflejar la variación documentada sin añadir contenido nuevo.
