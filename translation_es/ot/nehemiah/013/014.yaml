translation:
  language: es
  text: Acuérdate de mí por esto, Dios mío, y no borres[a] mis obras de fidelidad al pacto, que he hecho para la casa de mi Dios y para sus servicios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'elimines', 'borres del registro' o 'borres de la memoria'. El verbo hebreo puede sugerir la imagen de borrar o suprimir de la memoria o del registro.
    reason: lexical_alternative
  - marker: b
    text: O 'sus deberes' o 'sus responsabilidades'. El hebreo מִשְׁמָר puede referirse a cargos, guardias u obligaciones vinculadas con la casa de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: זָכְרָה לִּי
  english_pob_choice: Remember me
  chosen_spanish: Acuérdate de mí
  alternatives_spanish:
  - Recuérdame
  - Ten presente a tu siervo
  lexicon: HALOT
  rationale: En una oración dirigida a Dios, el hebreo pide que Dios recuerde al orante; en español, el imperativo pronominal 'acuérdate de mí' conserva la naturalidad devocional y el sentido relacional del original.
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: Dios mío
  alternatives_spanish:
  - mi Dios
  lexicon: HALOT
  rationale: El sufijo de primera persona expresa posesión/apelación directa. 'Dios mío' es la forma más idiomática y reverente en español sin perder el valor vocativo.
- source_word: עַל זֹאת
  english_pob_choice: for this
  chosen_spanish: por esto
  alternatives_spanish:
  - por causa de esto
  - con respecto a esto
  lexicon: HALOT
  rationale: La preposición עַל con demostrativo puede tener sentido causal o referencial. 'Por esto' mantiene la referencia inmediata a lo recién descrito y sugiere la motivación de la súplica.
- source_word: וְאַל תֶּמַח
  english_pob_choice: and do not wipe out
  chosen_spanish: y no borres
  alternatives_spanish:
  - y no borres del registro
  - y no elimines
  - y no borres de tu memoria
  lexicon: HALOT
  rationale: מחה tiene la imagen de borrar o borrar del registro. 'No borres' conserva la metáfora de supresión sin sobrecargar el castellano; el contexto de memoria/divino registro queda implícito.
- source_word: חֲסָדַי
  english_pob_choice: my deeds of covenant faithfulness
  chosen_spanish: mis actos de fidelidad de pacto
  alternatives_spanish:
  - mis hechos de lealtad de pacto
  - mis actos de misericordia
  - mis gestos de fidelidad
  lexicon: HALOT
  rationale: חסד en este contexto no se reduce a 'bondad' genérica; puede implicar lealtad/fidelidad de pacto. 'Actos de fidelidad de pacto' preserva la tensión semántica entre acción concreta y lealtad pactal.
- source_word: אֲשֶׁר עָשִׂיתִי
  english_pob_choice: that I have done
  chosen_spanish: que he hecho
  alternatives_spanish:
  - que hice
  - que he realizado
  lexicon: HALOT
  rationale: La relativa simple se expresa de forma directa en español. El pretérito perfecto compuesto mantiene el tono de oración retrospectiva y el vínculo con la situación presente.
- source_word: בְּבֵית אֱלֹהַי
  english_pob_choice: for the house of my God
  chosen_spanish: en la casa de mi Dios
  alternatives_spanish:
  - para la casa de mi Dios
  - en el templo de mi Dios
  lexicon: HALOT
  rationale: Aunque el inglés opta por 'for' para expresar finalidad/relación, el hebreo usa בְּ. En español, 'en la casa de mi Dios' es la equivalencia más directa y natural; el contexto templario ya sugiere servicio y dedicación.
- source_word: וּבְמִשְׁמָרָיו
  english_pob_choice: and for its services
  chosen_spanish: y en sus encargos
  alternatives_spanish:
  - y en sus funciones
  - y en sus servicios
  - y en sus responsabilidades
  lexicon: HALOT
  rationale: מִשְׁמָר puede significar carga, guardia, encargo o responsabilidad. 'Encargos' preserva la idea de tareas asignadas y evita limitar indebidamente el término a un solo matiz litúrgico.
theological_decisions:
- issue: Cómo traducir חסד en una oración donde el hablante menciona sus propios actos
  english_pob_reading: my deeds of covenant faithfulness
  chosen_spanish_reading: mis actos de fidelidad de pacto
  alternative_spanish_readings:
  - mis actos de misericordia
  - mis buenas obras
  - mis actos de lealtad
  rationale: Se conserva la referencia a acciones concretas sin convertir el texto en una afirmación de mérito salvífico. 'Fidelidad de pacto' mantiene el peso teológico de חסד en el marco de reforma del templo y lealtad a Yahvé.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Tensión de una petición que pide a Dios recordar obras propias
  english_pob_reading: Retain the direct appeal for remembrance without softening it
  chosen_spanish_reading: Mantener la súplica directa sin suavizar la auto-referencia
  alternative_spanish_readings:
  - Reformular para evitar la auto-referencia
  - Añadir una explicación interpretativa en el cuerpo del texto
  rationale: El hebreo presenta sin eufemismo la oración de Nehemías. La traducción española conserva esa tensión, porque forma parte del sentido histórico y retórico del pasaje.
  doctrine_reference: Translation philosophy §3
- issue: Relación entre la casa de Dios y los servicios/encargos del templo
  english_pob_reading: house of my God ... its services
  chosen_spanish_reading: la casa de mi Dios ... sus encargos
  alternative_spanish_readings:
  - la casa de mi Dios ... sus servicios
  - la casa de mi Dios ... sus deberes
  rationale: '''Encargos'' deja abierta la referencia a responsabilidades cultuales y administrativas asociadas al templo, sin restringir el término a un solo tipo de oficio.'
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió 'acts' por 'deeds' para sonar más natural; en español se optó por 'actos' para resaltar la relación con fidelidad y encargo, manteniendo el mismo campo semántico de obras concretas realizadas en favor de la casa de Dios. Se respetó el paralelismo entre la súplica de recuerdo y la negativa a borrar esas acciones.
  spanish_consistency_notes:
  - Se usa 'Dios mío' como vocativo directo coherente con la oración del versículo.
  - Se evita 'SEÑOR' para reflejar el nombre divino conforme al criterio del proyecto y al contexto de primera persona.
  - '''Casa de mi Dios'' mantiene la referencia al templo sin introducir un tecnicismo no presente en el hebreo.'
  - '''Encargos'' intenta conservar la amplitud de מִשְׁמָר sin fijar una única lectura cultual.'
