id: 1JN.4.1
reference: 1 John 4:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἀγαπητοί, μὴ παντὶ πνεύματι πιστεύετε, ἀλλὰ δοκιμάζετε τὰ πνεύματα εἰ ἐκ τοῦ θεοῦ ἐστιν, ὅτι πολλοὶ ψευδοπροφῆται ἐξεληλύθασιν εἰς τὸν κόσμον.
base_translation:
  language: en
  yaml_path: translation/nt/1_john/004/001.yaml
  text: Beloved[a], do not believe every spirit, but test the spirits to see whether they are from God[b], because many false prophets have gone out into the world.
  footnotes:
  - marker: a
    text: Or 'Dear friends.' The Greek address literally means 'beloved ones.'
    reason: lexical_alternative
  - marker: b
    text: That is, test the spiritual source behind prophetic claims; the next clause speaks of 'false prophets' as the human agents.
    reason: cultural_note
translation:
  language: ko
  text: 사랑하는 자들이여, 모든 영을 믿지 말고, 그 영들이 하나님께로부터 났는지 시험해 보십시오. 많은 거짓 예언자들이 세상에 나갔기 때문입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δοκιμάζετε
  english_pob_choice: test
  chosen_korean: 시험해 보십시오
  alternatives_korean:
  - 분별하십시오
  - 검증하십시오
  lexicon: BDAG
  rationale: δοκιμάζω는 「검증하여 진위를 판별하다」. 「시험해 보다」가 한국어에서 그 검증의 함의를 담는다.
- source_word: ψευδοπροφῆται
  english_pob_choice: false prophets
  chosen_korean: 거짓 예언자들
  alternatives_korean:
  - 거짓 선지자들
  lexicon: BDAG
  rationale: 현대 한국어에서 「예언자」가 「선지자」보다 어휘적으로 명료하다. 본 번역은 「예언자」로 일관.
