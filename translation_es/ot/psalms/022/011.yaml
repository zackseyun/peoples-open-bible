translation:
  language: es
  text: Sobre ti fui echado desde el vientre[a][b]; desde las entrañas de mi madre tú has sido mi Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También podría entenderse: «desde las entrañas de mi madre, tú eres mi Dios». El hebreo final es literalmente una cláusula nominal («mi Dios, tú [eres]»), por lo que el español puede reflejar tanto una afirmación presente como una relación continua desde el nacimiento.'
    reason: alternative_reading
  - marker: b
    text: 'El hebreo usa dos términos corporales distintos: רֶחֶם («vientre»/«matriz») y בֶּטֶן. Aquí «entrañas de mi madre» procura conservar esa variación léxica sin recurrir a una expresión demasiado técnica o coloquial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלֶיךָ
  english_pob_choice: Upon you
  chosen_spanish: Sobre ti
  alternatives_spanish:
  - En ti
  - Sobre ti mismo
  lexicon: HALOT
  rationale: La preposición עַל con sufijo de 2.ª persona expresa aquí la idea de apoyo/deposición sobre alguien. «Sobre ti» conserva la imagen y el matiz de dependencia mejor que una paráfrasis más interpretativa.
- source_word: הָשְׁלַכְתִּי
  english_pob_choice: I was cast
  chosen_spanish: fui echado
  alternatives_spanish:
  - fui arrojado
  - fui puesto
  lexicon: HALOT
  rationale: El verbo comunica una acción pasiva e imagística de ser arrojado o colocado. «Fui echado» mantiene la fuerza verbal y la pasividad sin suavizar el verbo a un término más abstracto.
- source_word: מֵרָחֶם
  english_pob_choice: from the womb
  chosen_spanish: desde el vientre
  alternatives_spanish:
  - desde el seno materno
  - desde el vientre materno
  lexicon: HALOT
  rationale: רֶחֶם es literalmente «vientre»/«útero». En español, «vientre» comunica la imagen concreta; «seno materno» sería más interpretativo. Se evita duplicar la misma palabra con el siguiente miembro, donde el hebreo usa otra voz.
- source_word: מִבֶּטֶן אִמִּי
  english_pob_choice: from my mother's belly
  chosen_spanish: desde el vientre de mi madre
  alternatives_spanish:
  - desde el seno de mi madre
  - desde la panza de mi madre
  lexicon: HALOT
  rationale: בֶּטֶן puede ser «vientre» o «barriga». La opción «vientre de mi madre» es natural en español bíblico y mantiene el contraste léxico con רֶחֶם sin caer en un coloquialismo excesivo.
- source_word: אֵלִי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - Dios mío
  - mi Dios
  lexicon: HALOT
  rationale: La forma posesiva directa conserva la relación personal y de pacto. En español, «mi Dios» es claro y fiel; «Dios mío» puede sonar más exclamativo que relacional en este contexto poético.
- source_word: אָתָּה
  english_pob_choice: you have been
  chosen_spanish: has sido
  alternatives_spanish:
  - eres
  - has sido
  lexicon: HALOT
  rationale: 'El hebreo es una cláusula nominal: «mi Dios tú [eres]». Dado el contexto de continuidad desde el nacimiento, «has sido» expresa mejor la relación sostenida que un presente simple, sin añadir contenido doctrinal extraño.'
theological_decisions:
- issue: Cláusula final sin verbo explícito
  english_pob_reading: you have been my God
  chosen_spanish_reading: tú has sido mi Dios
  alternative_spanish_readings:
  - tú eres mi Dios
  - mi Dios eres tú
  rationale: La lectura inglesa opta por el perfecto para destacar continuidad desde el vientre hasta el presente. En español, «has sido» comunica esa continuidad de manera natural y sigue respetando la forma nominal hebrea.
  doctrine_reference: Poética hebrea; continuidad de la relación de Dios con el orante desde el nacimiento
- issue: Imagen corporal de 'womb/belly' en dos miembros
  english_pob_reading: from the womb / from my mother's belly
  chosen_spanish_reading: desde el vientre / desde el vientre de mi madre
  alternative_spanish_readings:
  - desde el seno / desde el seno de mi madre
  - desde el útero / desde el vientre de mi madre
  rationale: El texto hebreo distingue רֶחֶם y בֶּטֶן. En español, «vientre» en ambos miembros conserva la imagen, y la especificación «de mi madre» en el segundo evita perder el paralelismo. No se homogeneiza a un solo término técnico para no borrar la tensión léxica documentada.
  doctrine_reference: Poética hebrea; paralelismo y distinción lexical
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y toma como guía la decisión inglesa de preservar la imagen de ser 'echado/cast' y la continuidad relacional del último miembro. Se ha preferido una sintaxis española natural, evitando tanto el calco rígido como la paráfrasis interpretativa excesiva.
  spanish_consistency_notes:
  - Se mantiene «Dios» como traducción de אֵלִי, sin añadir artículo ni reformular a una exclamación.
  - Se preserva el paralelismo entre dos imágenes corporales distintas con «vientre» en ambos miembros, diferenciando por contexto y por la frase «de mi madre».
  - La puntuación conserva la cesura poética mediante punto y coma, acorde con el paralelismo del verso.
