revisions:
- from: Cuando los cielos estén cerrados y no haya lluvia, porque hayan pecado contra ti, y oren hacia este lugar, y confiesen tu nombre, y se vuelvan de su pecado, porque los humilles[a],
  to: Cuando los cielos estén cerrados y no haya lluvia, porque hayan pecado contra ti, y oren hacia este lugar, y confiesen tu nombre, y se aparten de su pecado, porque les respondes[a],
  rationale: Se revisa para alinear el texto español con la decisión principal actualmente auditada en inglés para תַעֲנֵם ('les respondes'), trasladando 'humillas/afliges' a nota como alternativa. Además, se mejora la naturalidad del español con 'se aparten de su pecado', que conserva el valor de שׁוּב מן sin sonar forzado. No se requiere adjudicación adicional porque el ajuste es claro a nivel de consistencia editorial, aunque la ambigüedad contextual quede documentada en la nota.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:47:15Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español acierta en la mayor parte de la sintaxis y del sentido: ''cielos'', ''hacia este lugar'', ''confiesen tu nombre'' y la idea de volverse del pecado reflejan bien el hebreo. Sin embargo, ''porque los humilles'' no preserva el texto inglés auditado vigente (''because you answer them'') y además introduce una nota donde el inglés conserva la alternativa inversa. También ''se vuelvan de su pecado'' suena menos natural en español que una formulación equivalente más idiomática.'
  spanish_quality_summary: El español es claro y digno, pero requiere un ajuste de naturalidad en 'se vuelvan de su pecado' y una alineación interna entre texto principal, decisiones léxicas y notas. La redacción revisada mantiene fidelidad y mejora la legibilidad eclesial en español neutral.
  glossary_alignment: No hay conflicto con los términos base del proyecto. No aparece el nombre divino en este versículo. 'Confiesen tu nombre' es defendible para הוֹדוּ en este contexto penitencial. La única desalineación importante es que el borrador español siguió una opción distinta de תַעֲנֵם que la auditoría inglesa actualmente lleva en texto principal.
  issues:
  - severity: high
    issue: El texto principal español traduce כִּי תַעֲנֵם como 'porque los humilles' en vez de reflejar la lectura auditada inglesa vigente 'porque les respondes'.
    rationale: La tarea pide revisar también contra la pista de auditoría POB en inglés. Aunque la evidencia contextual favorece 'afligir/humillar', la edición inglesa actual del texto principal usa 'answer them', dejando 'humble/afflict' como alternativa en nota. El español debe alinearse con esa decisión documentada salvo adjudicación mayor.
  - severity: medium
    issue: La nota al pie está invertida respecto del texto principal esperado.
    rationale: Si el texto principal dice 'les respondes', la nota debe presentar 'los humillas/afliges' como alternativa. El borrador actual hace lo contrario.
  - severity: low
    issue: '''Se vuelvan de su pecado'' es comprensible pero poco idiomático en español bíblico actual.'
    rationale: '''Se aparten de su pecado'' o ''se vuelvan de su pecado'' pueden representar שׁוּב + מן, pero ''se aparten de su pecado'' suena más natural sin perder el sentido de apartarse.'
  revised_spanish_text: Cuando los cielos estén cerrados y no haya lluvia, porque hayan pecado contra ti, y oren hacia este lugar, y confiesen tu nombre, y se aparten de su pecado, porque les respondes[a],
  revised_footnotes:
