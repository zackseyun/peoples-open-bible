- from: 'Entonces el rey de Israel dijo: «¡Ay! Yahvé ha llamado a estos tres reyes para entregarlos[a] en manos de Moab[b]».'
  to: 'Entonces el rey de Israel dijo: «¡Ay! Yahvé ha llamado a estos tres reyes para ponerlos en manos de Moab[a]».'
