translation:
  language: es
  text: Se llevaron las ollas[a], las palas, los cortadores de pabilos, los tazones[b], los platos, y todos los utensilios de bronce con los que ministraban[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las pailas» o «las ollas para cocinar» para el término hebreo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los cuencos» para «los tazones».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «con los que servían». El verbo hebreo suele referirse al servicio cultual o ministerial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַסִּרוֹת
  english_pob_choice: the pots
  chosen_spanish: las ollas
  alternatives_spanish:
  - los pucheros
  - las vasijas
  lexicon: HALOT
  rationale: סִירוֹת designa recipientes de cocina o fuego; en español, 'ollas' comunica de manera natural ese tipo de recipiente sin volverlo demasiado técnico. 'Pucheros' suena más regional y 'vasijas' es más general.
- source_word: הַיָּעִים
  english_pob_choice: the shovels
  chosen_spanish: las palas
  alternatives_spanish:
  - las azadas
  - los recogedores
  lexicon: HALOT
  rationale: El término se refiere a utensilios para retirar brasas o ceniza. 'Palas' conserva la función instrumental con naturalidad en español; 'azadas' sería demasiado agrícola y 'recogedores' demasiado moderno y específico.
- source_word: הַמְזַמְּרוֹת
  english_pob_choice: the snuffers
  chosen_spanish: los cortadores de pabilos
  alternatives_spanish:
  - los apagadores
  - las tenazas para lámparas
  lexicon: HALOT
  rationale: La evidencia léxica permite entenderlo como herramienta para recortar la mecha/pabilo de las lámparas. 'Cortadores de pabilos' explicita la función sin forzar una identificación más estrecha que la del contexto. Se evita 'apagadores' por perder la idea de recorte.
- source_word: הַמִּזְרָקֹת
  english_pob_choice: the basins
  chosen_spanish: las vasijas para aspersiones
  alternatives_spanish:
  - los cuencos
  - las jofainas
  lexicon: HALOT
  rationale: מִזְרָקֹת son vasos vinculados al rociado/aspersión ritual. 'Vasijas para aspersiones' conserva la función cultual mejor que un equivalente más genérico como 'cuencos'. 'Jofainas' sería demasiado arcaico o doméstico.
- source_word: הַכַּפּוֹת
  english_pob_choice: the dishes
  chosen_spanish: los platos
  alternatives_spanish:
  - las bandejas
  - las copas
  lexicon: HALOT
  rationale: כַּפּוֹת puede designar recipientes pequeños o tipo cuchara/plato. 'Platos' es la opción más transparente en español para el conjunto de utensilios, manteniendo el carácter de recipiente sin imponer una forma demasiado precisa.
- source_word: כָּל כְּלֵי הַנְּחֹשֶׁת
  english_pob_choice: all the bronze vessels
  chosen_spanish: todos los utensilios de bronce
  alternatives_spanish:
  - todos los vasos de bronce
  - todos los objetos de bronce
  lexicon: HALOT
  rationale: כְּלֵי abarca utensilios o implementos; en este inventario, 'utensilios' es amplio y claro. 'Vasos' restringiría indebidamente el alcance, y 'objetos' sería demasiado vago.
- source_word: אֲשֶׁר יְשָׁרְת֥וּ בָהֶם
  english_pob_choice: with which they ministered
  chosen_spanish: con los que ministraban
  alternatives_spanish:
  - con los que servían
  - para el servicio culto
  lexicon: HALOT
  rationale: שרת en contexto cultual tiene el peso de ministerio sagrado. 'Ministraban' preserva ese matiz litúrgico mejor que 'servían', que en español se vuelve más genérico. Se mantiene el vínculo instrumental con 'con los que'.
- source_word: לָקָחוּ
  english_pob_choice: They took away
  chosen_spanish: Se llevaron
  alternatives_spanish:
  - Tomaron
  - Llevaron
  lexicon: HALOT
  rationale: El verbo פשוט indica tomar, pero en este contexto narrativo implica despojo y traslado. 'Se llevaron' expresa con naturalidad la acción de retirar los objetos del templo sin añadir información ajena.
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requerían cambios sustantivos; se mantuvo el sentido del texto base con atención a la lista de utensilios y al matiz cultual de יְשָׁרְתוּ.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no porque aparezca aquí un tetragrámaton, sino por consistencia de proyecto cuando corresponda; en este versículo no hay nombre divino explícito.
  - Se preserva el matiz cultual de 'ministraban' para evitar diluir la terminología del templo.
  - Se traduce la lista con términos españoles transparentes y de registro bíblico sobrio, evitando tecnicismos innecesarios.
