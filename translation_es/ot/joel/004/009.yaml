translation:
  language: es
  text: 'Proclamen esto entre las naciones: consagren la guerra; despierten a los guerreros[a]. Que se acerquen, que suban, todos los hombres de guerra.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «prepárense para la guerra». El hebreo «consagren la guerra» emplea lenguaje cultual para apartar la batalla.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קִרְאוּ
  english_pob_choice: Proclaim
  chosen_spanish: Proclamen
  alternatives_spanish:
  - Llamen
  - Anuncien
  lexicon: HALOT
  rationale: El imperativo plural en contexto de proclamación pública se traduce mejor con un verbo formal de anuncio. «Proclamen» conserva el tono solemne y público del llamado.
- source_word: זֹאת
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - este mensaje
  lexicon: HALOT
  rationale: El demostrativo funciona como objeto directo de la proclamación. «Esto» es la forma más simple y fiel en español, dejando que el contenido se complete con la cláusula siguiente.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - en las naciones
  lexicon: HALOT
  rationale: La expresión refiere colectivamente a los pueblos extranjeros. «Entre las naciones» es idiomático en español y mantiene el alcance colectivo sin introducir la carga histórica específica de «gentiles».
- source_word: קַדְּשׁוּ מִלְחָמָה
  english_pob_choice: Consecrate war
  chosen_spanish: consagren la guerra
  alternatives_spanish:
  - preparen la guerra
  - santifiquen la guerra
  lexicon: HALOT
  rationale: קָדַשׁ conserva fuerza cultual de apartar algo para uso sagrado. «Consagren la guerra» retiene esa tensión sin perder inteligibilidad; «preparen» suavizaría demasiado el matiz religioso.
- source_word: הָעִירוּ
  english_pob_choice: stir up
  chosen_spanish: despierten
  alternatives_spanish:
  - inciten
  - susciten
  lexicon: HALOT
  rationale: 'El hiphil de עור es causativo: arremover, despertar, agitar. En español, «despierten» comunica la orden en secuencia de alistamiento bélico, manteniendo la energía del llamado.'
- source_word: הַגִּבּוֹרִים
  english_pob_choice: the warriors
  chosen_spanish: los guerreros
  alternatives_spanish:
  - los valientes
  - los héroes
  - los poderosos
  lexicon: HALOT
  rationale: En contexto militar, גִּבּוֹרִים denota combatientes fuertes. «Guerreros» expresa mejor el sentido bélico que «valientes» o «héroes», y evita una lectura meramente honorífica.
- source_word: יִגְּשׁוּ
  english_pob_choice: Let ... draw near
  chosen_spanish: Que se acerquen
  alternatives_spanish:
  - Que se aproximen
  - Que vengan cerca
  lexicon: HALOT
  rationale: El jussivo/imperfecto en una serie de convocación se vierte naturalmente con «Que se acerquen», que mantiene la solemnidad de la convocatoria militar.
- source_word: יַעֲלוּ
  english_pob_choice: let them come up
  chosen_spanish: que suban
  alternatives_spanish:
  - que asciendan
  - que vayan arriba
  lexicon: HALOT
  rationale: עלה conserva la imagen direccional de subir/venir arriba. «Que suban» es fiel y natural; en este contexto puede aludir al movimiento hacia el escenario de combate.
- source_word: כֹּל אַנְשֵׁי הַמִּלְחָמָה
  english_pob_choice: all the men of war
  chosen_spanish: todos los hombres de guerra
  alternatives_spanish:
  - todos los combatientes
  - todos los soldados
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula militar masculina explícita. «Hombres de guerra» preserva esa forma y su fuerza idiomática mejor que una neutralización interpretativa.
theological_decisions:
- issue: Conservar el matiz cultual de קדשׁ en un contexto bélico
  english_pob_reading: Consecrate war
  chosen_spanish_reading: consagren la guerra
  alternative_spanish_readings:
  - preparen la guerra
  - santifiquen la guerra
  rationale: El hebreo usa un verbo de santificación/apartamiento, no solo de organización militar. Mantener «consagren» deja visible la tensión profética entre guerra y lenguaje cultual; «preparen» la borraría parcialmente.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: El texto inglés auditado mantiene una decisión explícita de preservar el matiz cultual de קדשׁ y una nota alternativa para «Prepare for war». La versión española conserva esa misma tensión en el texto principal y refleja la alternativa en nota, sin introducir cambios de sentido respecto del paquete fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Guerreros» y «hombres de guerra» conservan el campo semántico militar explícito del hebreo.
  - La serie imperativa/jussiva se ha mantenido con ritmo exhortativo en español sin suavizar el mandato.
