revisions:
- from: Y para los hijos de Aarón[a], los sacerdotes, en los campos de pastoreo[b] de sus ciudades, en cada ciudad[c], había hombres designados por nombre[d] para dar porciones a todo varón entre los sacerdotes y a todo el que estaba registrado por genealogía entre los levitas[e].
  to: Y para los hijos de Aarón[a], los sacerdotes, en los pastizales[b] de sus ciudades, en cada ciudad[c], había hombres designados por sus nombres[d] para dar porciones a todo varón entre los sacerdotes y a todo el que estaba inscrito por genealogía entre los levitas[e].
  rationale: La revisión hace ajustes menores de naturalidad y precisión léxica en español. 'Pastizales' refleja mejor el terreno abierto de las ciudades levíticas que 'campos de pastoreo'. 'Designados por sus nombres' y la nota revisada transmiten mejor la identificación oficial por nombre sin caer en un giro poco idiomático. También se mejora levemente la nota distributiva y se armoniza 'inscrito por genealogía' con el matiz administrativo del hebreo.
