revisions:
- from: Yahvé es Dios[a], y él nos ha dado luz. Atad la víctima festiva[b] con cuerdas[c], hasta las cuernas del altar[d].
  to: Yahvé es Dios[a], y él nos ha dado luz. Aten el sacrificio festivo[b] con cuerdas[c], hasta los cuernos del altar[d].
  rationale: Se corrige «cuernas» a «cuernos» por fidelidad al uso español bíblico y claridad. Se reemplaza «Atad» por «Aten» para mayor neutralidad panhispánica. Se afina «víctima festiva» a «sacrificio festivo» para reflejar mejor el referente cultual de חַג según el expediente inglés. Se repara la nota d para que documente una alternativa real y útil.
