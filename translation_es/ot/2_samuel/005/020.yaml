- from: 'Entonces David llegó a Baal-perazim[a], y allí David los derrotó. Dijo[b]: «Yahvé ha abierto paso entre mis enemigos delante de mí, como una ruptura de aguas». Por eso llamó al lugar con el nombre de Baal-perazim.'
  to: 'Entonces David llegó a Baal-perazim[a], y allí David los derribó. Dijo[b]: «Yahvé irrumpió contra mis enemigos delante de mí, como una irrupción de aguas». Por eso llamó el nombre de aquel lugar Baal-perazim.'
  rationale: La revisión corrige la relación sintáctica de la acción de Yahvé respecto de los enemigos, refuerza el valor militar de וַיַּכֵּם, y hace más visible en español el juego léxico entre פָּרַץ, פֶּרֶץ y Baal-perazim. También mejora la naturalidad del cierre sin perder la cercanía al hebreo.
