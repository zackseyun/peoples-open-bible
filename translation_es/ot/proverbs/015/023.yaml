translation:
  language: es
  text: Un hombre tiene gozo en la respuesta de su boca[a], y una palabra en su tiempo[b], ¡qué buena es!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Para un hombre hay gozo en una respuesta de su boca». La construcción hebrea puede expresarse de manera más formal, pero el texto principal da el sentido en español natural.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «en el momento oportuno» o «a su debido tiempo». El hebreo literalmente dice «en su tiempo» y puede implicar oportunidad apropiada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׂמְחָה
  english_pob_choice: joy
  chosen_spanish: gozo
  alternatives_spanish:
  - alegría
  - gozo
  lexicon: HALOT
  rationale: שִׂמְחָה expresa alegría o gozo. «Gozo» mantiene un tono proverbial y digno, y encaja bien con la satisfacción que produce una respuesta oportuna.
- source_word: לָאִישׁ
  english_pob_choice: a man
  chosen_spanish: El hombre
  alternatives_spanish:
  - Un hombre
  - Una persona
  lexicon: HALOT
  rationale: La forma singular masculina conserva el paralelismo y el valor representativo del hebreo. En español, el sujeto nominal al inicio suena natural y refleja la idea de ventaja/posesión implicada por לָ.
- source_word: בְּמַעֲנֵה פִיו
  english_pob_choice: in the answer of his mouth
  chosen_spanish: en la respuesta de su boca
  alternatives_spanish:
  - en la respuesta de su boca
  - en la respuesta de sus labios
  - con la respuesta de su boca
  lexicon: HALOT
  rationale: מַעֲנֶה es «respuesta». Se conserva la imagen de «su boca» para no diluir el hebraísmo; «boca» resulta fiel y entendible en español bíblico actual.
- source_word: וְדָבָר
  english_pob_choice: and a word
  chosen_spanish: y una palabra
  alternatives_spanish:
  - y una palabra
  - y un dicho
  - y un decir
  lexicon: HALOT
  rationale: דָבָר aquí se refiere con naturalidad a una palabra o dicho pronunciado. «Palabra» mantiene el paralelismo con la respuesta anterior y funciona bien en español.
- source_word: בְּעִתּוֹ
  english_pob_choice: in its time
  chosen_spanish: a su tiempo
  alternatives_spanish:
  - en su tiempo
  - a su debido tiempo
  - en la ocasión precisa
  lexicon: HALOT
  rationale: La construcción hebrea literalmente significa «en su tiempo». «A su tiempo» conserva la brevedad proverbial y la idea de oportunidad sin sobreparafrasear.
- source_word: מַה־טּוֹב
  english_pob_choice: how good it is
  chosen_spanish: ¡qué buena es!
  alternatives_spanish:
  - ¡cuán buena es!
  - ¡qué buena es!
  - ¡cuán excelente es!
  lexicon: HALOT
  rationale: La exclamación hebrea valora la palabra oportuna. En español, «¡qué buena es!» reproduce la admiración de forma natural y directa.
translation_notes:
  revision_awareness: La versión inglesa auditada mantiene una equivalencia óptima y ofrece las alternativas «for a man there is joy in an answer from his mouth» y «a word at the right time / in season». La presente redacción española conserva la estructura proverbial, el paralelismo entre «respuesta» y «palabra», y la ambigüedad útil de בְּעִתּוֹ con una nota de alternativa para la oportunidad temporal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no contiene el tetragrámaton.
  - Se conserva el tono proverbial con léxico simple y elevado, evitando una paráfrasis explicativa.
  - No se sustituyó «boca» por una abstracción como «respuesta» solamente, porque el hebreo conserva el cuerpo como sede del habla.
