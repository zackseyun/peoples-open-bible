  - severity: medium
    issue: La nota [a] está anclada en 'roca desnuda' pero su contenido describe 'un lugar para tender redes de pesca'.
    rationale: La alternativa inglesa documentada ('a place to spread fishing nets') corresponde a מִשְׁטַח חֲרָמִים, no a לִצְחִיחַ סֶלַע. Tal como está, la nota induce a una relación léxica incorrecta con el hebreo.
  - severity: low
    issue: '''No serás reconstruida otra vez'' suena menos natural en español que ''No volverás a ser reconstruida''.'
    rationale: Ambas reflejan עוֹד, pero la segunda formulación es más idiomática y mantiene mejor el valor temporal de repetición sin rigidez.
  revised_spanish_text: Te haré una roca desnuda, un lugar para tender redes[a]. No volverás a ser reconstruida, porque yo, Yahvé, he hablado[b], declara el Señor Yahvé.
