review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura y el sentido general del hebreo: los carros de Faraón y su ejército son arrojados al mar, y sus oficiales selectos son hundidos en el Yam Suf. También preserva bien la nota tradicional sobre «Mar Rojo». Sin embargo, hay varios ajustes necesarios para mayor fidelidad y mejor español: «carros de guerra» sobretraduce מַרְכְּבֹת frente al más directo «carros»; «la élite de sus oficiales fue hundida» suena menos natural y algo abstracto para וּמִבְחַר שָׁלִשָׁיו, que se expresa mejor como «lo mejor de sus oficiales» o «sus oficiales más selectos fueron hundidos»; y «mar de Juncos» debe ir con minúscula en «juncos» y preferiblemente conservar la estructura del inglés auditado.'
  spanish_quality_summary: El texto es comprensible, pero «la élite de sus oficiales fue hundida» resulta rígido y menos idiomático en español bíblico contemporáneo. La coordinación mejora si se mantiene un estilo más directo y concreto. También conviene evitar la mayúscula innecesaria en «Juncos» y una ligera sobreespecificación militar en «carros de guerra».
  glossary_alignment: No hay términos del glosario principal en conflicto directo. La decisión «mar de juncos» sigue correctamente la política de original-language primacy para יַם סוּף, con nota para «Mar Rojo». No aparece Yahvé en este versículo. Las decisiones léxicas principales son compatibles con la filosofía POB, pero deben pulirse para reflejar mejor el hebreo y la naturalidad del español.
  issues:
  - severity: medium
    issue: «carros de guerra» sobretraduce מַרְכְּבֹת
    rationale: El hebreo dice simplemente «carros/chariots». El contexto ya es militar; añadir «de guerra» explicita más de lo que el texto dice.
  - severity: medium
    issue: «la élite de sus oficiales fue hundida» suena abstracto y poco natural
    rationale: וּמִבְחַר שָׁלִשָׁיו apunta a los mejores/escogidos de sus oficiales. En español, «la élite» introduce un registro sociológico moderno y la concordancia singular debilita la viveza del original.
  - severity: low
    issue: Mayúscula innecesaria en «Juncos»
    rationale: En español corresponde «mar de juncos» dentro del nombre traducido, salvo que se adopte como topónimo fijado, lo cual aquí no parece necesario ni preferible.
  revised_spanish_text: Los carros de Faraón y su ejército los arrojó al mar[a], y lo mejor de sus oficiales fue hundido en el mar de juncos.
  revised_footnotes:
  - marker: a
    text: Tradicionalmente se traduce «Mar Rojo». El hebreo dice «mar de juncos».
    reason: lexical_alternative
  revision_rationale: Se revisa para acercar מַרְכְּבֹת a «carros», evitar la sobretraducción «de guerra», mejorar la naturalidad de וּמִבְחַר שָׁלִשָׁיו con «lo mejor de sus oficiales», y normalizar la capitalización de «mar de juncos». Se mantiene la nota tradicional sobre «Mar Rojo» conforme al rastro auditado en inglés.
