translation:
  language: es
  text: Pero confiaste en tu hermosura[a], y te prostituiste a causa de tu fama, y derramaste tus prostituciones sobre todo transeúnte[b]; suyo era.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'a causa de tu renombre' / 'por tu reputación'; el hebreo 'nombre' suele llevar aquí el sentido de fama o renombre.
    reason: lexical_alternative
  - marker: b
    text: 'La cláusula final es muy breve en hebreo: ''suyo era'' o ''a él le pertenecía'', expresando que lo ofrecido se entregaba a cada transeúnte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּבְטְחִי / you trusted
  english_pob_choice: you trusted
  chosen_spanish: confiaste
  alternatives_spanish:
  - te apoyaste
  - pusiste tu confianza
  lexicon: HALOT
  rationale: בטח expresa confiar o apoyarse. 'Confiaste' conserva el sentido directo y el reproche de una confianza mal puesta, sin añadir matices que el hebreo no exige.
- source_word: בְיָפְיֵךְ / in your beauty
  english_pob_choice: in your beauty
  chosen_spanish: en tu hermosura
  alternatives_spanish:
  - en tu belleza
  - por tu hermosura
  - a causa de tu hermosura
  lexicon: HALOT
  rationale: ב con בטח se entiende como confiar en algo. 'Hermosura' es natural en español y mantiene el valor atractivo del término, sin perder la referencia a la apariencia externa.
- source_word: וַתִּזְנִי / you prostituted yourself
  english_pob_choice: you prostituted yourself
  chosen_spanish: te prostituiste
  alternatives_spanish:
  - fornicaste
  - te hiciste prostituta
  - fuiste infiel
  lexicon: HALOT
  rationale: זנה en el lenguaje profético conserva la imagen sexual de prostitución como metáfora de infidelidad. 'Te prostituiste' es claro, actual y no suaviza el golpe retórico.
- source_word: עַל שְׁמֵךְ / because of your fame
  english_pob_choice: because of your fame
  chosen_spanish: a causa de tu fama
  alternatives_spanish:
  - por tu nombre
  - a causa de tu reputación
  - por tu renombre
  lexicon: HALOT
  rationale: שֵׁם puede significar nombre, fama o reputación. Siguiendo la lectura contextual del auditorio y la revisión inglesa, 'fama' expresa mejor el sentido de renombre sin perder la conexión literal con 'nombre'.
- source_word: וַתִּשְׁפְּכִי / you poured out
  english_pob_choice: you poured out
  chosen_spanish: derramaste
  alternatives_spanish:
  - vertiste
  - esparciste
  - desbordaste
  lexicon: HALOT
  rationale: שׁפך es literalmente 'derramar'. 'Derramaste' preserva la imagen concreta y encaja bien con el verbo siguiente y con el estilo vívido de Ezequiel.
- source_word: אֶת תַּזְנוּתַיִךְ / your prostitutions
  english_pob_choice: your prostitutions
  chosen_spanish: tus prostituciones
  alternatives_spanish:
  - tus actos de prostitución
  - tus fornicaciones
  - tus adulterios
  lexicon: HALOT
  rationale: El plural intensifica la repetición de actos. 'Tus prostituciones' es la forma más literal y mantiene la dureza del hebreo profético.
- source_word: עַל כָּל עוֹבֵר / on every passerby
  english_pob_choice: on every passerby
  chosen_spanish: sobre todo pasajero
  alternatives_spanish:
  - sobre todo el que pasaba
  - ante todo transeúnte
  - con todo el que pasaba
  lexicon: HALOT
  rationale: עַל + עוֹבֵר conserva la imagen de exposición indiscriminada. 'Pasajero' suena algo más literal a la forma de participio hebrea y mantiene la amplitud del alcance.
- source_word: לוֹ יְהִי / his it was
  english_pob_choice: his it was
  chosen_spanish: suyo era
  alternatives_spanish:
  - le pertenecía
  - era de él
  - suyo fue
  lexicon: HALOT
  rationale: La cláusula final es breve y elíptica. 'Suyo era' reproduce la tersura del hebreo y conserva la idea de entrega a cada uno sin explicitar más de lo que el texto da.
theological_decisions:
- issue: Metáfora profética de prostitución para la infidelidad de Jerusalén
  english_pob_reading: Retain explicit prostitution imagery in the main text
  chosen_spanish_reading: Conservar la imaginería explícita de prostitución en el texto principal
  alternative_spanish_readings:
  - Suavizar a 'te mostraste infiel'
  - Cambiar a lenguaje puramente covenantal como 'quebrantaste la alianza'
  rationale: El hebreo usa deliberadamente lenguaje sexual para denunciar idolatría e infidelidad. La traducción española debe conservar ese filo retórico y no resolverlo en abstracción teológica.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente: se priorizó el sentido contextual de שֵׁם como ''fama/renombre'' y se mantuvo la clausula final corta y elíptica de לוֹ יְהִי como una fórmula mínima en español.'
  spanish_consistency_notes:
  - Se mantuvo 'prostituiste' y 'prostituciones' para conservar la fuerza léxica del profeta.
  - '''Hermosura'' se eligió por naturalidad en español, pero el sentido sigue siendo el de belleza física/atractiva.'
  - '''Pasajero'' refleja el participio hebreo עוֹבֵר y el alcance indiscriminado del verso.'
  - El cierre 'suyo era' evita sobreexplicar el hebreo breve y mantiene su dureza sintáctica.
