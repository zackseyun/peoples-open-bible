- from: Y las coronas serán para Helem, Tobías, Jedaías y Hen hijo de Sofonías, como memorial en el templo de Yahvé.[a]
  to: Y las coronas serán para Helem[a], Tobíah, Jedaías y Hen hijo de Sofonías, como memorial en el templo de Yahvé.
  rationale: Se mueve la nota al nombre pertinente («Helem») para cumplir la regla de anclaje y se ajusta «Tobías» a «Tobíah» para reflejar mejor טוֹבִיָּה y la decisión lexical auditada, manteniendo un español claro y eclesialmente legible.
