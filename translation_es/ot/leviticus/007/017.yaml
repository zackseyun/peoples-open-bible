review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: resto de la carne del sacrificio, referencia temporal al tercer día y mandato pasivo de quemarlo. También preserva correctamente el matiz de prescripción de יִשָּׂרֵף. La nota léxica sobre בָּשָׂר está bien motivada. Sin embargo, «en el tercer día» no es la mejor equivalencia española para בַּיּוֹם הַשְּׁלִישִׁי; en español bíblico y general suena forzado, y «al tercer día» o «en el tercer día» no son iguales semánticamente en todos los contextos. Aquí corresponde una forma idiomática como «al tercer día».'
  spanish_quality_summary: La frase es clara en general, pero «en el tercer día» suena poco natural en español moderno y menos legible que «al tercer día». El resto del versículo es digno y comprensible. «Será quemado en el fuego» funciona bien y mantiene el tono legal. La nota al pie necesita ajuste menor porque introduce «flesh» en inglés dentro de una nota española; conviene formular la alternativa solo en español.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Carne» para בָּשָׂר está bien justificado en español, incluso mejor que calcar la decisión inglesa «meat». «Sacrificio» para הַזָּבַח y «será quemado» para יִשָּׂרֵף se alinean con la evidencia y con el estilo POB.
  issues:
