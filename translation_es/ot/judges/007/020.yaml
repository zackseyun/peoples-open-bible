review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo y el rastro de auditoría inglés en los puntos principales: «las tres compañías», «trompetas», «antorchas», el uso de «Yahvé», y el grito elíptico «¡Espada para Yahvé y para Gedeón!». También preserva correctamente la nota alternativa tradicional. Sin embargo, «para tocarlas» después de «las trompetas» resulta algo ambiguo en español, porque puede leerse como ejecución musical más que como señal de guerra; el infinitivo de propósito se expresa con más claridad como «para tocarlas» o «para hacerlas sonar», pero aquí conviene una formulación menos ambigua. Además, «su mano izquierda ... su mano derecha» es comprensible, pero «sus manos» suena más natural en español para un distributivo plural sin pérdida de fidelidad.'
  spanish_quality_summary: El texto es legible y digno, pero necesita un ajuste menor de naturalidad y precisión idiomática. «Quebraron los cántaros» es aceptable, aunque «hicieron pedazos» o «rompieron» sería más contemporáneo; no es un error. El principal problema de estilo/claridad es «para tocarlas[a]», que en español moderno puede sugerir tocar trompeta como interpretación musical, no simplemente hacerla sonar como señal. «En sus manos izquierdas ... en sus manos derechas» mejora la fluidez natural del español respecto de «su mano ... su mano».
  glossary_alignment: 'Alinea bien con la terminología del proyecto: יהוה -> «Yahvé» correctamente; חֶרֶב לַיהוָה וּלְגִדְעוֹן conserva «para» según la decisión POB; no introduce «SEÑOR» ni «Jehová» en el texto principal. No hay conflictos teológicos relevantes.'
  issues:
  - severity: medium
    issue: «para tocarlas» puede ser ambiguo en español
    rationale: Aunque corresponde al inglés «to blow», en español «tocar la trompeta» es posible, pero en esta estructura pronominal puede leerse como ejecución musical. «Para hacerlas sonar» comunica mejor el propósito militar del infinitivo לִתְקֹעַ.
  - severity: low
    issue: «en su mano izquierda ... en su mano derecha» suena menos natural que el plural distributivo
    rationale: El hebreo usa singular distributivo, pero el español idiomático suele preferir «en sus manos izquierdas ... en sus manos derechas» o una reformulación equivalente. Esto mejora la lectura sin afectar el sentido.
  revised_spanish_text: 'Entonces las tres compañías tocaron las trompetas y quebraron los cántaros. Sostuvieron las antorchas en sus manos izquierdas y las trompetas en sus manos derechas para hacerlas sonar[a], y gritaron: «¡Espada para Yahvé y para Gedeón!»'
  revised_footnotes:
  - marker: a
    text: 'O: «La espada de Yahvé y de Gedeón».'
    reason: alternative_reading
  revision_rationale: 'Se hicieron dos ajustes menores: (1) «para hacerlas sonar» aclara mejor el infinitivo de propósito לִתְקֹעַ en contexto de señal de guerra; (2) «sus manos izquierdas / derechas» suena más natural en español para el distributivo plural. El resto del borrador preserva fielmente el sentido fuente, la decisión terminológica sobre «Yahvé» y la nota alternativa documentada.'
