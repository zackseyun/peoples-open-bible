translation:
  language: es
  text: Y la mitad[a], la porción de los que salieron a la guerra, fue, en número, 337.500 ovejas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más idiomática, «la parte de los que salieron a la guerra».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּהִי
  english_pob_choice: was
  chosen_spanish: fue
  alternatives_spanish:
  - llegó a ser
  - resultó ser
  - quedó
  lexicon: HALOT
  rationale: La forma narrativa introduce el resultado del cómputo; en español, 'fue' conserva el valor copulativo sin añadir interpretación.
- source_word: הַמֶּחֱצָה
  english_pob_choice: the half
  chosen_spanish: la mitad
  alternatives_spanish:
  - la media parte
  - la mitad porción
  lexicon: HALOT
  rationale: '''La mitad'' es el equivalente natural y claro en español, y mantiene la referencia a una parte ya dividida en el contexto.'
- source_word: חֵלֶק
  english_pob_choice: the portion of
  chosen_spanish: la porción de
  alternatives_spanish:
  - la parte de
  - la cuota de
  - la herencia de
  lexicon: HALOT
  rationale: '''Porción'' conserva el sentido distributivo de la frase hebrea y funciona bien en aposición con ''la mitad''.'
- source_word: הַיֹּצְאִים בַּצָּבָא
  english_pob_choice: those who went out to war
  chosen_spanish: los que salieron a la guerra
  alternatives_spanish:
  - los que salieron al combate
  - los combatientes
  - los que fueron a la guerra
  lexicon: HALOT
  rationale: '''Salir a la guerra'' refleja mejor el giro militar hebreo y coincide con la revisión inglesa que prefirió una expresión más natural y exacta.'
- source_word: מִסְפַּר
  english_pob_choice: in number
  chosen_spanish: en número de
  alternatives_spanish:
  - con un total de
  - sumando
  - siendo
  lexicon: HALOT
  rationale: '''En número de'' reproduce la función introductoria del hebreo y mantiene la estructura de cómputo.'
- source_word: הַצֹּאן
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - ganado menor
  - rebaño
  - ovejas y carneros
  lexicon: HALOT
  rationale: En este contexto el término designa el ganado ovino contado entre el botín; 'ovejas' es preciso y natural en español.
- source_word: שְׁלֹשׁ מֵאוֹת אֶלֶף וּשְׁלֹשִׁים אֶלֶף וְשִׁבְעַת אֲלָפִים וַחֲמֵשׁ מֵאוֹת
  english_pob_choice: 337,500
  chosen_spanish: '337.500'
  alternatives_spanish:
  - trescientas treinta y siete mil quinientas
  - trescientos treinta y siete mil quinientas
  lexicon: HALOT
  rationale: El total hebreo es aditivo y exacto; en español, la cifra arábiga mejora la legibilidad sin alterar la cantidad.
translation_notes:
  revision_awareness: 'Se siguió de cerca el texto hebreo y el audit trail inglés: se mantuvo la estructura de cómputo, se tradujo el giro militar con una expresión natural en español, y se preservó la alternativa idiomática del sustantivo ''porción'' mediante nota.'
  spanish_consistency_notes:
  - Se usó 'la guerra' para reflejar el hebreo בַּצָּבָא en un giro natural y fiel.
  - Se mantuvo la cifra exacta con separador español de millares.
  - La nota alternativa está anclada explícitamente en 'la mitad' para resolver la ambigüedad distributiva sin introducir otra lectura no atestiguada.
