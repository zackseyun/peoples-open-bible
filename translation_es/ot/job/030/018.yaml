translation:
  language: es
  text: Con gran fuerza mi prenda está deformada[a]; como el cuello[b] de mi túnica, me aprieta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi prenda está cambiada», «mi prenda está deformada», o posiblemente «él agarra mi prenda». El verbo hebreo es difícil, y la línea suele entenderse como una descripción de la aflicción de Job que lo deforma o lo oprime como si fuera una prenda.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «como la boca/abertura de mi túnica».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/רָב כֹּחַ
  english_pob_choice: By great force
  chosen_spanish: Con gran fuerza
  alternatives_spanish:
  - Por gran fuerza
  - Con mucha fuerza
  lexicon: HALOT
  rationale: La construcción expresa medio o intensidad; en español, «con gran fuerza» suena natural y conserva el valor instrumental/adverbial del hebreo sin volverlo demasiado literal.
- source_word: יִתְחַפֵּ֣שׂ
  english_pob_choice: is disfigured
  chosen_spanish: está deformada
  alternatives_spanish:
  - está cambiada
  - está disfrazada
  - es arrebatada
  lexicon: HALOT
  rationale: El verbo es difícil y el POB inglés opta por la idea de alteración visible por aflicción. «Está deformada» comunica mejor en español la imagen de algo alterado o torcido por la presión, sin perder la tensión léxica del hebreo.
- source_word: לְבוּשִׁ֑
  english_pob_choice: my garment
  chosen_spanish: mi ropa
  alternatives_spanish:
  - mi vestidura
  - mi prenda
  - mi vestido
  lexicon: HALOT
  rationale: En español, «ropa» funciona de forma amplia y natural para לְבוּשׁ. Mantiene el sentido general sin introducir un término demasiado técnico o eclesiástico.
- source_word: כְּ/פִ֖י
  english_pob_choice: like the collar of
  chosen_spanish: como la abertura de
  alternatives_spanish:
  - como la boca de
  - como el cuello de
  lexicon: HALOT
  rationale: El hebreo dice literalmente «como la boca/apertura de». El inglés POB explicó la imagen como el collar de una prenda; en español, «abertura» conserva mejor el dato léxico directo y permite entender la figura del cuello/collar sin añadir una equivalencia más interpretativa.
- source_word: כֻתָּנְתִּ֣/י
  english_pob_choice: my tunic
  chosen_spanish: mi túnica
  alternatives_spanish:
  - mi camisa
  - mi ropa interior
  - mi vestidura
  lexicon: HALOT
  rationale: «Túnica» es el equivalente más reconocido de כֻתָּנֶת y mantiene la imagen de una prenda ajustada que puede oprimir.
- source_word: יַֽאַזְרֵֽ/נִי
  english_pob_choice: it binds me
  chosen_spanish: me aprieta
  alternatives_spanish:
  - me ciñe
  - me ciñe fuertemente
  - me ata
  lexicon: HALOT
  rationale: El verbo significa ceñir o atar. En el contexto de la imagen de una prenda que oprime, «me aprieta» comunica de manera natural el efecto constrictivo que el POB inglés preserva con «it binds me».
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente y el análisis auditado en inglés. Donde el inglés interpretó una imagen de constricción («collar of my tunic», «it binds me»), el español mantiene esa metáfora con términos naturales y deja abierta la alternativa léxica en nota.
  spanish_consistency_notes:
  - Se mantiene un registro poético sobrio, acorde con Job.
  - No se sustituye la imagen corporal/textil por una paráfrasis explicativa excesiva.
  - «Túnica» conserva una equivalencia bíblica estable y comprensible en español.
  - La nota a evita fijar una sola traducción para לְבוּשׁ, ya que el hebreo admite varias opciones amplias.
