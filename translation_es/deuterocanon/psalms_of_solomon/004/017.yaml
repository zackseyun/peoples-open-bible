translation:
  language: es
  text: Que su vida esté en dolores y pobreza y necesidad[a], oh Yahvé; su sueño en penas[b], y su despertar en apremios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en angustia» / «en carencia» para ambas ocurrencias de ἀπορία; el griego puede denotar privación severa, desamparo o angustia según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «Que su vida está en dolores y pobreza y necesidad, oh Yahvé; su sueño en penas, y su despertar en apremios»; una versión anterior leía la cláusula de forma indicativa, pero el contexto favorece el valor imprecatorio/optativo.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐν ὀδύναις
  english_pob_choice: in pains
  chosen_spanish: en dolores
  alternatives_spanish:
  - en penas
  - en sufrimientos
  - en tormentos
  lexicon: BDAG
  rationale: La preposición ἐν con dativo marca esfera o condición. «Dolores» conserva el campo de sufrimiento sin cargar el texto con una intensidad mayor que la que exige el griego.
- source_word: πενίᾳ
  english_pob_choice: poverty
  chosen_spanish: pobreza
  alternatives_spanish:
  - necesidad
  - miseria
  - indigencia
  lexicon: LSJ
  rationale: El término expresa falta material. «Pobreza» es la equivalencia más clara y natural en español, y mantiene el paralelo con los demás términos de aflicción.
- source_word: ἀπορίᾳ / ἀπορίαις
  english_pob_choice: want / distresses
  chosen_spanish: carencia / angustias
  alternatives_spanish:
  - necesidad / aflicciones
  - angustia / angustias
  - desamparo / estrecheces
  lexicon: LSJ
  rationale: Aquí ἀπορία no apunta a perplejidad intelectual, sino a carencia severa, falta y situación apremiante. En la primera ocurrencia, «carencia» refleja bien la privación; en la segunda, «angustias» reproduce el plural y la carga opresiva del contexto, sin borrar la repetición del mismo lexema griego.
- source_word: ζωὴ
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - existencia
  - vivir
  lexicon: BDAG
  rationale: Es la traducción directa y estándar. En este verso resume la condición total de la persona.
- source_word: λύπαις
  english_pob_choice: griefs
  chosen_spanish: tristezas
  alternatives_spanish:
  - penas
  - dolores
  - aflicciones
  lexicon: BDAG
  rationale: El plural sugiere estados o episodios reiterados de pesar. «Tristezas» conserva el plural y suena natural en español, sin volver el término demasiado técnico.
- source_word: ἐξέγερσις
  english_pob_choice: waking
  chosen_spanish: despertar
  alternatives_spanish:
  - levantarse
  - despertarse
  - alzarse
  lexicon: LSJ
  rationale: El sustantivo designa la acción o estado de salir del sueño. «Despertar» es la solución más natural en español y equilibra «sueño» en la cláusula anterior.
- source_word: Κύριε
  english_pob_choice: O Lord
  chosen_spanish: oh Señor
  alternatives_spanish:
  - Señor
  - oh Yahvé
  lexicon: BDAG
  rationale: La vocación directa exige un tratamiento exclamativo en español. Aquí se conserva «Señor» porque el griego usa Κύριε como forma de invocación; no se reemplaza por Yahvé, ya que en esta línea la apelación es la del vocativo, no una cita explícita del Tetragrámaton.
theological_decisions:
- issue: Valor optativo/jussivo de la oración
  english_pob_reading: May his life be in pains and poverty and want, O Lord; his sleep in griefs, and his waking in distresses.
  chosen_spanish_reading: Que su vida esté en dolores y pobreza y carencia, oh Señor; su sueño en tristezas, y su despertar en angustias.
  alternative_spanish_readings:
  - Sea su vida en dolores y pobreza y carencia, oh Señor; su sueño en tristezas, y su despertar en angustias.
  - Que su vida quede en dolores y pobreza y carencia, oh Señor; su sueño en tristezas, y su despertar en angustias.
  rationale: El griego presenta cláusulas sin verbo finito expresando una imprecación continua; por eso el español debe sonar optativo y no meramente descriptivo. «Que... esté» preserva el valor desiderativo/cursivo sin introducir una formulación demasiado rígida.
  doctrine_reference: Salmo imprecatorio; cf. el uso de formas desiderativas en oraciones de juicio.
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió la cláusula a un valor optativo («May his life be...»), y también ajustó ἀπορίαις al plural «distresses». La versión española sigue ese valor optativo con «Que su vida esté...» y conserva el plural en «angustias», evitando una lectura indicativa o singularizada.
  spanish_consistency_notes:
  - Se mantiene el tono de imprecación continua, no narrativo.
  - Se conserva la repetición conceptual de ἀπορία mediante vocabulario cercano pero no idéntico en ambas cláusulas, para respetar el paralelismo sin sonar forzado en español.
  - «Oh Señor» refleja el vocativo Κύριε con registro litúrgico sobrio, sin sustituirlo por una traducción masking del nombre divino.
