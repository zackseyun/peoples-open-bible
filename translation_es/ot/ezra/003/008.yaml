  language: en
  yaml_path: translation/ot/ezra/003/008.yaml
  text: And in the second year after their coming to the house of God at Jerusalem[a], in the second month, Zerubbabel son of Shealtiel and Jeshua son of Jozadak, and the rest of their brothers the priests and the Levites, and all who had come from the captivity to Jerusalem, began and appointed the Levites from twenty years old and upward to oversee the work of the house of Yahweh.
  footnotes:
