translation:
  language: es
  text: Así que Hanún tomó a los siervos de David, les afeitó la mitad de la barba, les cortó las vestiduras por la mitad hasta sus nalgas[a], y los envió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘hasta su asiento’ o ‘hasta sus partes privadas’; el término hebreo es raro y el referente anatómico exacto se debate. El sentido es que Hanún los expuso vergonzosamente al cortarles las vestiduras muy cortas.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַבְדֵי דָוִד
  english_pob_choice: David’s servants
  chosen_spanish: los esclavos de David
  alternatives_spanish:
  - los siervos de David
  - los servidores de David
  - los oficiales de David
  lexicon: HALOT
  rationale: El hebreo עבד puede significar siervo, esclavo o funcionario según el contexto. Siguiendo la decisión léxica del POB inglés de mantener la fuerza de la palabra sin suavizarla, ‘esclavos’ conserva el valor básico de dependencia y evita la atenuación de ‘siervos’ o ‘servidores’. El contexto diplomático no obliga a restringirlo a ‘oficiales’.
- source_word: וַיְגַלַּח אֶת חֲצִי זְקָנָם
  english_pob_choice: shaved off half of their beards
  chosen_spanish: les afeitó la mitad de la barba
  alternatives_spanish:
  - afeitó la mitad de sus barbas
  - les rasuró media barba
  lexicon: HALOT
  rationale: 'גלח significa afeitar. En español, ‘les afeitó la mitad de la barba’ transmite con naturalidad la humillación deliberada sin forzar una formulación extraña. Se preserva el sentido distributivo: a cada uno se le quitó la mitad de su barba.'
- source_word: וַיִּכְרֹת
  english_pob_choice: cut off
  chosen_spanish: les cortó
  alternatives_spanish:
  - les cortó la ropa
  - les desgarró
  lexicon: HALOT
  rationale: כרת con prendas expresa cortar una parte de la ropa. En español, ‘les cortó’ es suficiente porque el complemento ‘las vestiduras’ ya señala el objeto; ‘cortó off’ no requiere duplicación idiomática.
- source_word: מַדְוֵי/הֶם
  english_pob_choice: their garments
  chosen_spanish: las vestiduras
  alternatives_spanish:
  - sus prendas
  - sus ropas
  - sus vestiduras
  lexicon: HALOT
  rationale: El término hebreo se refiere a una prenda o conjunto de prendas. ‘Vestiduras’ es una opción digna y precisa en español bíblico, y conserva mejor el registro que ‘ropa’ o ‘prendas’ en este contexto de humillación pública.
- source_word: בַּחֵצִי
  english_pob_choice: in the middle
  chosen_spanish: por la mitad
  alternatives_spanish:
  - en el medio
  - a la mitad
  lexicon: HALOT
  rationale: La expresión indica que la prenda fue cortada en el punto medio. ‘Por la mitad’ es natural en español y refleja bien el acto de partir la vestidura.
- source_word: עַד שְׁתוֹתֵיהֶם
  english_pob_choice: up to their buttocks
  chosen_spanish: hasta sus nalgas
  alternatives_spanish:
  - hasta sus glúteos
  - hasta sus posaderas
  - hasta su asiento
  lexicon: HALOT
  rationale: La voz hebrea es rara y el referente anatómico exacto se debate. El POB inglés tomó una lectura concreta (‘buttocks’) para expresar la humillación. En español, ‘nalgas’ comunica ese sentido de forma directa y clara sin volverlo más explícito de lo que exige el contexto. La alternativa ‘hasta su asiento’ se mantiene como posibilidad semántica implícita, pero no se adopta en el texto principal.
- source_word: וַֽ/יְשַׁלְּחֵֽ/ם
  english_pob_choice: sent them away
  chosen_spanish: los despidió
  alternatives_spanish:
  - los envió lejos
  - los mandó de vuelta
  - los despidió y los dejó ir
  lexicon: HALOT
  rationale: שלח aquí implica enviar fuera después de la humillación. ‘Los despidió’ es breve, natural y conserva el matiz de dejar ir a los hombres tras el ultraje.
- source_word: וַ/יִּקַּ֨ח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - se apoderó de
  - capturó
  lexicon: HALOT
  rationale: לקח en la secuencia narrativa básica se traduce de forma simple como ‘tomó’. 'Tomó' mantiene la neutralidad del verbo sin añadir violencia que el texto no explicita con ese término.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el WLC y coincide sustancialmente con la tradición auditada del POB en inglés: toma simple de los hombres, afeitado parcial de la barba, corte humillante de las vestiduras y envío final. Se mantiene la ambigüedad léxica documentada solo en la nota del término anatómico raro.'
  spanish_consistency_notes:
  - Se prefirió ‘esclavos’ para conservar la fuerza léxica de עבד, en coherencia con la instrucción POB de no suavizar sin base contextual suficiente.
  - ‘Vestiduras’ se usó como equivalente bíblico amplio para מַדְוֵי/הֶם, evitando especificar una prenda concreta no garantizada por el hebreo.
  - El versículo mantiene el tono de humillación pública sin añadir interpretaciones narrativas ajenas al texto.
