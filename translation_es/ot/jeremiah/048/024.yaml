lexical_decisions:
- source_word: וְעַל
  english_pob_choice: and against
  chosen_spanish: y contra
  alternatives_spanish:
  - y sobre
  - también contra
  lexicon: HALOT
  rationale: La preposición עַל en este contexto de juicio y amenaza dirigida se expresa mejor en español con «contra», manteniendo la fuerza hostil que ya reconoce la POB en inglés.
- source_word: קְרִיּוֹת
  english_pob_choice: Kerioth
  chosen_spanish: Keriot
  alternatives_spanish:
  - Keriot[a]
  - Kerioth
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; se translitera. En español se adapta la terminación a una forma más natural y legible («Keriot»), sin traducirlo como sustantivo común.
- source_word: בָּצְרָה
  english_pob_choice: Bozrah
  chosen_spanish: Bosra
  alternatives_spanish:
  - Bozra
  - Bosrah
  lexicon: HALOT
  rationale: Nombre propio de lugar; se translitera al uso español más natural. La forma española «Bosra» conserva la identificación toponímica sin introducir una traducción interpretativa.
- source_word: כָּל עָרֵי אֶרֶץ מוֹאָב
  english_pob_choice: all the cities of the land of Moab
  chosen_spanish: todas las ciudades de la tierra de Moab
  alternatives_spanish:
  - todas las ciudades en la tierra de Moab
  - cada ciudad de la tierra de Moab
  lexicon: HALOT
  rationale: La cadena constructa se mantiene de forma transparente en español. «Tierra de Moab» reproduce el alcance territorial y «todas las ciudades» conserva el carácter inclusivo del hebreo.
- source_word: הָרְחֹקוֹת וְהַקְּרֹבוֹת
  english_pob_choice: the far and the near
  chosen_spanish: las lejanas y las cercanas
  alternatives_spanish:
  - las distantes y las próximas
  - las lejanas y las cercanas, todas
  lexicon: HALOT
  rationale: El hebreo usa un par adjetival sustantivado para una merismo de totalidad. En español, «las lejanas y las cercanas» es natural y conserva la oposición inclusiva; se evita añadir explícitamente «ciudades» para no sobrecargar el texto.
theological_decisions:
- issue: Alcance total del juicio sobre Moab
  english_pob_reading: all the cities of the land of Moab, far and near
  chosen_spanish_reading: todas las ciudades de la tierra de Moab, las lejanas y las cercanas
  alternative_spanish_readings:
  - todas las ciudades de Moab, lejanas y cercanas
  - las distantes y las próximas
  rationale: 'La expresión final funciona como merismo: abarca a todas las ciudades sin excepción. La traducción conserva esa totalidad sin suavizarla ni convertirla en una paráfrasis explicativa dentro del cuerpo del texto.'
  doctrine_reference: Merismo y alcance total del juicio profético en Jeremías 48
translation_notes:
  revision_awareness: 'La POB inglesa revisó la cláusula final para eliminar artículos antes de «far and near», preservando un merismo natural. La versión española sigue esa misma orientación: mantiene la brevedad y la fuerza inclusiva del hebreo, con un adjetivo sustantivado natural en español.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige explícitamente; este versículo no lo contiene.
  - Los nombres propios se transliteran en forma española legible y consistente con el registro bíblico.
  - Se conserva el paralelismo repetitivo de juicio con «y contra», alineado con la estructura hebrea y la opción inglesa auditada.
  - «Las lejanas y las cercanas» corresponde a una expresión de totalidad; la nota aclara la equivalencia semántica sin alterar el texto principal.
