  text: ⸀τοὺς ἁμαρτάνοντας ἐνώπιον πάντων ἔλεγχε, ἵνα καὶ οἱ λοιποὶ φόβον ἔχωσιν.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/005/020.yaml
  text: Rebuke those who are sinning before everyone[b][a], so that the rest also may have fear.
  footnotes:
  - marker: a
    text: Or 'those who persist in sin'; the present participle may suggest ongoing sinful conduct.
    reason: lexical_alternative
  - marker: b
    text: The immediate context may indicate sinning elders in particular, though the verse itself says only 'those who are sinning.'
    reason: cross_reference
translation:
  language: ko
  text: 죄를 짓는 자들[a]은 모든 사람 앞에서 책망하십시오. 그리하면 나머지 사람들도 두려움을 가지게 될 것입니다[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「죄를 계속 짓는 자들」. 현재 분사는 진행 중인 죄된 행위를 시사할 수 있다.
    reason: lexical_alternative
  - marker: b
    text: 직접 문맥은 특히 죄를 짓는 장로들을 가리킬 수 있으나, 본 절 자체는 단지 「죄를 짓는 자들」이라고만 한다.
    reason: cross_reference
lexical_decisions:
- source_word: τοὺς ἁμαρτάνοντας
  english_pob_choice: those who are sinning
  chosen_korean: 죄를 짓는 자들
