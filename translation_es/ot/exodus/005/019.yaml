translation:
  language: es
  text: 'Entonces los oficiales de los hijos de Israel se vieron en apuros cuando se les dijo[a]: «No deben reducir el número de sus ladrillos, la cuota de cada día[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «al decir». El hebreo introduce así el momento en que se hizo evidente su apuro.'
    reason: source_note
  - marker: b
    text: 'Hebraísmo: «la cuota de cada día» traduce literalmente algo como «la cuestión de un día en su día», es decir, la cantidad exigida para cada jornada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְאוּ
  english_pob_choice: saw
  chosen_spanish: los vieron
  alternatives_spanish:
  - vieron
  - percibieron
  lexicon: HALOT
  rationale: El hebreo básico ראה es «ver». En español, «los vieron» conserva la concreción del verbo original y encaja de manera natural con el siguiente complemento de estado. "Percibieron" sería posible, pero desplaza demasiado el matiz visual/concreto.
- source_word: שֹׁטְרֵי
  english_pob_choice: officers
  chosen_spanish: oficiales
  alternatives_spanish:
  - capataces
  - supervisores
  lexicon: HALOT
  rationale: El término designa administradores subordinados bajo autoridad egipcia. «Oficiales» es amplio y neutral, y evita estrechar el oficio a una imagen moderna de capataz si el contexto no lo exige. "Supervisores" también sirve, pero suena más técnico.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la forma más transparente del hebreo. «Hijos de Israel» mantiene la estructura del original y la nota de literalidad; «israelitas» sería más idiomático, pero menos explícito respecto de la expresión fuente.
- source_word: בְּרָע
  english_pob_choice: in trouble
  chosen_spanish: en apuro
  alternatives_spanish:
  - en trouble
  - en desgracia
  - en aflicción
  lexicon: HALOT
  rationale: La expresión indica una situación adversa, no maldad moral. «En apuro» comunica bien el estado de dificultad de manera natural en español. «En aflicción» es más solemne, pero algo más interpretativo.
- source_word: לֵאמֹר
  english_pob_choice: when it was said
  chosen_spanish: cuando se les dijo
  alternatives_spanish:
  - al decir
  - cuando dijeron
  lexicon: HALOT
  rationale: La construcción funciona temporalmente y presenta el contenido que revela su problema. El pasivo impersonal en español conserva bien la función hebrea sin forzar la sintaxis.
- source_word: לֹא תִגְרְעוּ
  english_pob_choice: You must not reduce
  chosen_spanish: No deben reducir
  alternatives_spanish:
  - No reducirán
  - No disminuirán
  - No deben menguar
  lexicon: HALOT
  rationale: גרע significa disminuir, quitar o reducir. «No deben reducir» preserva la fuerza directiva del mandato y suena claro en español moderno. «Disminuir» también sería válido, pero «reducir» encaja mejor con la idea de cuota.
- source_word: מִלִּבְנֵיכֶם
  english_pob_choice: the number of your bricks
  chosen_spanish: el número de sus ladrillos
  alternatives_spanish:
  - la cantidad de sus ladrillos
  - su cuota de ladrillos
  lexicon: HALOT
  rationale: Se refleja el sentido de «bricks/ladrillos» y la cuantificación exigida. «El número de sus ladrillos» sigue de cerca el original y mantiene la referencia al conteo impuesto. «Cuota de ladrillos» es útil, pero más interpretativa.
- source_word: דְּבַר יוֹם בְּיוֹמוֹ
  english_pob_choice: the daily quota each day
  chosen_spanish: la cuota diaria, día tras día
  alternatives_spanish:
  - la obligación diaria, cada día
  - la cantidad debida cada día
  lexicon: HALOT
  rationale: El hebraísmo expresa la cantidad fijada para cada día. «Cuota diaria, día tras día» comunica el valor idiomático y además conserva la repetición enfática del original. «Cantidad debida cada día» sería más explicativa, pero menos cercana al ritmo del hebreo.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que volvió explícita la idea de «the number of your bricks» y la repetición idiomática «day in its day» como «the daily quota each day». La versión española conserva esa duplicación semítica con «cuota diaria, día tras día», evitando borrar la intensificación del original.
  spanish_consistency_notes:
  - Se mantuvo «hijos de Israel» para conservar la transparencia formal de בְנֵי יִשְׂרָאֵל.
  - Se eligió «ladrillos» en lugar de una paráfrasis más libre para respetar el sustantivo concreto del texto.
  - Se preservó una estructura con dos complementos finales para reflejar tanto la exigencia cuantitativa como la repetición idiomática del hebreo.
  - El pasivo impersonal «se les dijo» evita introducir un sujeto no expresado por el hebreo.
