translation:
  language: es
  text: 'Solo tengan mucho cuidado de cumplir el mandamiento y la ley[a] que Moisés, siervo de Yahvé, les mandó: amar a Yahvé, su Dios, caminar en todos sus caminos, guardar sus mandamientos, aferrarse a él y servirle con todo su corazón y con toda su alma.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la instrucción' para 'la ley' (hebreo torah).
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Únicamente
  - Solamente
  lexicon: HALOT
  rationale: Introduce la exhortación con fuerza restrictiva y enfática, de modo natural en español. 'Solo' conserva el matiz de limitación que abre el versículo.
- source_word: שִׁמְרוּ מְאֹד
  english_pob_choice: be very careful
  chosen_spanish: tengan mucho cuidado
  alternatives_spanish:
  - cuiden mucho
  - sean muy cuidadosos
  lexicon: HALOT
  rationale: La combinación verbal expresa vigilancia intensa, no solo 'guardar' en sentido mecánico. 'Tengan mucho cuidado' transmite bien la urgencia exhortativa en español actual.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to do
  chosen_spanish: de cumplir
  alternatives_spanish:
  - de hacer
  - de realizar
  lexicon: HALOT
  rationale: En este contexto, el infinitivo apunta a la ejecución concreta del mandamiento. 'Cumplir' suena natural en español bíblico y conserva el sentido de llevar a cabo fielmente.
- source_word: הַמִּצְוָה
  english_pob_choice: the commandment
  chosen_spanish: el mandamiento
  alternatives_spanish:
  - el precepto
  - la orden
  lexicon: HALOT
  rationale: Se conserva el singular, importante para el paralelismo con 'la ley'. 'Mandamiento' refleja bien el tono de pacto y obediencia.
- source_word: הַתּוֹרָה
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  - la enseñanza
  lexicon: HALOT
  rationale: En este contexto mosaico y jurídico-covenantal, 'la ley' es una equivalencia clara y reconocible. Mantiene el contraste con la nota lexical de la alternativa 'instrucción'.
- source_word: עֶבֶד יְהוָה
  english_pob_choice: the servant of Yahweh
  chosen_spanish: siervo de Yahvé
  alternatives_spanish:
  - esclavo de Yahvé
  - servidor de Yahvé
  lexicon: HALOT
  rationale: Aquí el título honorífico para Moisés se expresa mejor como 'siervo', porque en español eclesial es la forma más idiomática para un personaje de autoridad y fidelidad. La dureza de 'esclavo' no es la lectura más natural para este título, aunque el hebreo admite ese rango semántico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragramatón: ''Yahvé''. Preserva el nombre divino en vez de sustituirlo por un título.'
- source_word: לְאַהֲבָה
  english_pob_choice: to love
  chosen_spanish: amar
  alternatives_spanish:
  - amarlo
  - tener amor por
  lexicon: HALOT
  rationale: El infinitivo de propósito se traduce de manera directa y bíblica. 'Amar' expresa adecuadamente la lealtad de pacto exigida por el texto.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios de ustedes
  - su Dios
  lexicon: HALOT
  rationale: El sufijo de segunda persona plural se expresa con el posesivo de tratamiento formal/natural en español. 'Su Dios' evita una construcción demasiado pesada.
- source_word: וְלָלֶכֶת בְּכָל דְּרָכָיו
  english_pob_choice: to walk in all his ways
  chosen_spanish: caminar en todos sus caminos
  alternatives_spanish:
  - andar en todos sus caminos
  - vivir en todos sus caminos
  lexicon: HALOT
  rationale: Se preserva la metáfora ética hebrea de 'caminar', natural en español bíblico y claro en lectura contemporánea.
- source_word: וְלִשְׁמֹר מִצְוֺתָיו
  english_pob_choice: to keep his commandments
  chosen_spanish: guardar sus mandamientos
  alternatives_spanish:
  - observar sus mandamientos
  - cumplir sus mandamientos
  lexicon: HALOT
  rationale: '''Guardar'' mantiene el verbo covenantal estándar para שׁמר y encaja bien con la secuencia exhortativa.'
- source_word: וּלְדָבְקָה בּוֹ
  english_pob_choice: to cling to him
  chosen_spanish: aferrarse a él
  alternatives_spanish:
  - apegarse a él
  - adherirse a él
  lexicon: HALOT
  rationale: El hebreo expresa unión estrecha y continua. 'Aferrarse a él' conserva la fuerza relacional sin sonar arcaico.
- source_word: וּלְעָבְדוֹ
  english_pob_choice: to serve him
  chosen_spanish: servirle
  alternatives_spanish:
  - adorarlo y servirle
  - rendirle servicio
  lexicon: HALOT
  rationale: '''Servirle'' es la forma más directa en español y preserva el amplio sentido de servicio obediente y devocional.'
- source_word: בְּכָל לְבַבְכֶם
  english_pob_choice: with all your heart
  chosen_spanish: con todo su corazón
  alternatives_spanish:
  - con todo el corazón
  - con todo su ser interior
  lexicon: HALOT
  rationale: Se conserva la fórmula semita de totalidad interior. El posesivo plural de tratamiento mantiene la referencia colectiva.
- source_word: וּבְכָל נַפְשְׁכֶם
  english_pob_choice: with all your soul
  chosen_spanish: con toda su alma
  alternatives_spanish:
  - con toda su vida
  - con todo su ser
  lexicon: HALOT
  rationale: '''Alma'' preserva el paralelismo tradicional y la fuerza de נֶפֶשׁ en la fórmula de devoción total.'
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrama, y el proyecto pide transliterarlo. 'Yahvé' mantiene el nombre personal del Dios del pacto, sin reemplazarlo por un título litúrgico.
  doctrine_reference: 'DOCTRINE.md: יְהוָה YHWH → Yahvé'
- issue: 'Fidelidad a las metáforas del pacto: caminar, guardar, aferrarse, servir'
  english_pob_reading: to walk in all his ways ... to cling to him ... to serve him
  chosen_spanish_reading: caminar en todos sus caminos ... aferrarse a él ... servirle
  alternative_spanish_readings:
  - andar en todos sus caminos ... adherirse a él ... adorarlo
  rationale: Las metáforas éticas y relacionales tienen peso teológico en la exhortación de Josué. Se preservan en español para no diluir la llamada a obediencia, lealtad y dependencia total.
  doctrine_reference: 'DOCTRINE.md: preserve source-text plain sense; avoid paraphrase beyond what the source warrants'
- issue: ¿'siervo' o 'esclavo' para עֶבֶד en la expresión 'Moisés, siervo de Yahvé'?
  english_pob_reading: the servant of Yahweh
  chosen_spanish_reading: siervo de Yahvé
  alternative_spanish_readings:
  - esclavo de Yahvé
  rationale: Aunque 'esclavo' preserva la fuerza léxica de עֶבֶד, aquí la expresión funciona como título honorífico y consagrado de Moisés. 'Siervo' evita una asociación dura o degradante que el contexto no enfatiza.
  doctrine_reference: 'DOCTRINE.md: lexical choices must preserve context-sensitive nuance'
- issue: '''la ley'' para תּוֹרָה en un contexto mosaico'
  english_pob_reading: the law
  chosen_spanish_reading: la ley
  alternative_spanish_readings:
  - la instrucción
  - la enseñanza
  rationale: En este pasaje, torah se refiere al cuerpo normativo dado por Moisés. 'La ley' es inteligible y fiel, aunque la nota admite la alternativa 'instrucción' por su valor léxico.
  doctrine_reference: 'DOCTRINE.md: preserve lexical/theological tension where present'
translation_notes:
  revision_awareness: Coincide con la última pasada revisada, marcada como sin cambios necesarios y con acuerdo alto entre controles de revisión. Se conserva la misma estructura exhortativa y el mismo tratamiento del nombre divino y de los términos covenantales, sin introducir nuevas lecturas textuales.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' de forma consistente para יְהוָה.
  - 'Se mantuvo el paralelismo de infinitivos: amar / caminar / guardar / aferrarse / servir.'
  - Se evitó 'SEÑOR' para no ocultar el nombre divino, conforme al estándar del proyecto.
  - Se usó 'la ley' con nota para preservar la alternativa léxica de torah sin perder claridad.
  - El posesivo 'su' refleja el plural de segunda persona en un español natural y coherente en toda la cláusula.
