base_translation:
  language: en
  yaml_path: translation/ot/isaiah/014/025.yaml
  text: to break Assyria in my land[a], and on my mountains I will trample him; then his yoke will depart from upon them[b], and his burden from upon his shoulder will depart.
  footnotes:
  - marker: a
    text: Or 'the Assyrian' instead of 'Assyria'; the Hebrew noun can refer either to the nation or to its representative ruler/army.
    reason: alternative_reading
  - marker: b
    text: Hebrew shifts from 'upon them' to singular 'upon his shoulder.' The singular may personify the oppressed people or function distributively.
    reason: textual_variant
