revisions:
- from: entonces escucha desde los cielos, desde el lugar donde habitas, su oración y sus súplicas, y mantén su causa, y perdona a tu pueblo que ha pecado contra ti.
  to: entonces escucha desde el cielo, desde el lugar donde habitas, su oración y sus súplicas, y hazles justicia[a], y perdona a tu pueblo que han pecado contra ti.
  rationale: Se revisa para lograr un español más natural y fiel al valor judicial de מִשְׁפָּטָם. 'Hazles justicia' comunica bien la idea de actuar judicialmente a favor de ellos, y la nota conserva el matiz literal y una alternativa cercana. También se mejora el modismo locativo a 'desde el cielo'. La concordancia final se ajusta hacia el plural semántico del hebreo, aunque el revisor reconoce que esta construcción española sigue siendo algo tensa; aun así no requiere adjudicación compleja.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:55:46Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: petición a Dios de oír desde el cielo, recibir la oración y las súplicas, actuar judicialmente a favor del pueblo y perdonar su pecado. Sin embargo, dos puntos requieren ajuste para mayor fidelidad e idiomaticidad: (1) מִן הַשָּׁמַיִם se entiende mejor en español bíblico natural como ''desde el cielo'' en este modismo, aunque el hebreo sea formalmente plural; y (2) ''mantén su causa'' suena poco natural en español para la idea forense de וְעָשִׂיתָ מִשְׁפָּטָם. Una formulación como ''hazles justicia[a]'' conserva el sentido judicial y permite preservar la alternativa literal en nota. También conviene corregir la concordancia a ''han pecado'' para reflejar mejor el plural implícito del relativo hebreo.'
  spanish_quality_summary: 'El español es claro y digno, pero ''mantén su causa'' resulta algo calcado y menos comprensible que otras opciones forenses naturales. ''Desde los cielos'' es posible, pero aquí suena menos idiomático que ''desde el cielo''. Además, ''tu pueblo que ha pecado'' es gramaticalmente defendible por colectivo, pero en esta oración se lee más fluido y cercano al referente plural con ''tu pueblo, que ha[n] pecado contra ti'' o mejor sin coma: ''tu pueblo que ha[n] pecado contra ti''; la opción más natural es ''tu pueblo que ha pecado'' si se prioriza colectivo, pero dado el hebreo plural y la cadena ''su oración... sus súplicas'', ''han pecado'' comunica mejor el referente humano. La revisión propuesta equilibra fidelidad y legibilidad.'
  glossary_alignment: No hay conflicto con la terminología doctrinal principal del proyecto. No aparecen Yahvé, Mesías, Cristo, Espíritu, etc. La principal decisión léxica es משפט, donde el borrador necesita una solución española más natural y fiel al valor judicial documentado. La nota inglesa de alternativa léxica debe preservarse en español porque la nueva redacción 'hazles justicia' representa una de las alternativas documentadas, mientras el literal hebreo 'haz su juicio/caso' conviene quedar consignado.
  issues:
  - severity: medium
    issue: '''mantén su causa'' suena poco idiomático para וְעָשִׂיתָ מִשְׁפָּטָם'
    rationale: Aunque intenta seguir el inglés auditado, en español no es la forma más natural de expresar la acción judicial/vindicadora. 'Hazles justicia' comunica claramente el sentido forense y requiere nota para preservar el literal hebreo.
  - severity: low
    issue: '''desde los cielos'' es menos natural que ''desde el cielo'' en este contexto'
    rationale: El hebreo es formalmente plural, pero el modismo español bíblico usual y claro para la morada divina es singular. No se pierde sentido y mejora la fluidez.
  - severity: low
    issue: Concordancia 'que ha pecado' frente al plural del hebreo
    rationale: Con 'pueblo' puede usarse singular colectivo, pero el relativo hebreo refiere a los integrantes del pueblo ('han pecado'). En esta frase, el plural preserva mejor la referencia semántica.
  revised_spanish_text: entonces escucha desde el cielo, desde el lugar donde habitas, su oración y sus súplicas, y hazles justicia[a], y perdona a tu pueblo que han pecado contra ti.
  revised_footnotes:
