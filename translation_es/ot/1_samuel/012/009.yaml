translation:
  language: es
  text: Pero olvidaron a Yahvé su Dios[a], y él los vendió en manos de Sísara, comandante del ejército de Hazor, y en manos de los filisteos, y en manos del rey de Moab; y pelearon contra ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los entregó'. El hebreo dice literalmente 'los vendió', un modismo de juicio de pacto para indicar que los entregó al poder de sus enemigos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכְּחוּ
  english_pob_choice: they forgot
  chosen_spanish: olvidaron
  alternatives_spanish:
  - se olvidaron
  - descuidaron
  lexicon: HALOT
  rationale: El hebreo שׁכח puede traducirse literalmente como 'olvidar'; en contexto de pacto implica deslealtad o abandono, pero el texto base dice 'forget'. 'Olvidaron' preserva la forma verbal y deja que el peso teológico surja del contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre divino, conforme al criterio del proyecto para יְהוָה, en lugar de sustituirlo por un título.
- source_word: אֱלֹהֵיהֶם
  english_pob_choice: their God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su propio Dios
  - el Dios de ellos
  lexicon: HALOT
  rationale: El sufijo pronominal expresa una relación posesiva y de pacto; en español natural, 'su Dios' transmite esa relación sin perder claridad.
- source_word: וַיִּמְכֹּר
  english_pob_choice: he sold
  chosen_spanish: los vendió
  alternatives_spanish:
  - los entregó
  - los dio en poder de
  lexicon: HALOT
  rationale: מכר significa literalmente 'vender'. En este contexto judicial, 'los vendió' conserva la metáfora y la fuerza idiomática que la POB inglesa también preserva.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en poder de
  - a manos de
  lexicon: HALOT
  rationale: La expresión idiomática se mantiene con una forma española estable y comprensible; 'en manos de' conserva la imagen de sujeción y dominio.
- source_word: שַׂר צְבָא חָצוֹר
  english_pob_choice: commander of the army of Hazor
  chosen_spanish: comandante del ejército de Hazor
  alternatives_spanish:
  - capitán del ejército de Hazor
  - general del ejército de Hazor
  lexicon: HALOT
  rationale: שַׂר צְבָא designa un líder militar; 'comandante del ejército' es claro y fiel al sintagma constructo sin sobrecargarlo con matices no explicitados.
- source_word: פְּלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los pelisteos
  lexicon: HALOT
  rationale: Etnónimo estándar en español bíblico contemporáneo.
- source_word: מֶלֶךְ מוֹאָב
  english_pob_choice: the king of Moab
  chosen_spanish: el rey de Moab
  alternatives_spanish:
  - el monarca de Moab
  lexicon: HALOT
  rationale: La cadena constructa se traduce de forma directa y natural, sin expansión interpretativa.
- source_word: וַיִּלָּחֲמוּ בָּם
  english_pob_choice: they fought against them
  chosen_spanish: pelearon contra ellos
  alternatives_spanish:
  - hicieron guerra contra ellos
  - combatieron contra ellos
  lexicon: HALOT
  rationale: לחם con ב expresa hostilidad bélica. 'Pelearon contra ellos' es idiomático en español y conserva el sentido adversativo sin introducir solemnidad innecesaria.
theological_decisions:
- issue: Sujeto implícito de 'los vendió'
  english_pob_reading: The implied singular subject is the LORD.
  chosen_spanish_reading: El sujeto implícito sigue siendo Yahvé.
  alternative_spanish_readings:
  - se los entregó
  - fueron vendidos
  rationale: La cláusula anterior menciona a Yahvé, su Dios, y el verbo singular continúa esa referencia. Mantener 'los vendió' conserva el juicio de pacto sin resolver la tensión idiomática del hebreo.
  doctrine_reference: Principio de primacía del texto original; conservar el idiomatismo judicial de la Escritura.
- issue: Fuerza de 'olvidaron a Yahvé'
  english_pob_reading: Covenantal forgetfulness implying disloyalty, rendered literally as 'forgot.'
  chosen_spanish_reading: Olvidar se deja literal, pero con la fuerza relacional del contexto.
  alternative_spanish_readings:
  - abandonaron a Yahvé
  - desatendieron a Yahvé
  rationale: El verbo hebreo puede sugerir más que un fallo de memoria; sin embargo, la fuente dice 'olvidaron'. La redacción española conserva esa literalidad y permite que el contexto active la carga pactal.
  doctrine_reference: No suavizar ni ampliar el alcance semántico más allá de lo atestiguado.
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el contexto auditado en inglés: se preservan el nombre divino ''Yahvé'', la metáfora judicial ''los vendió'' y la frase idiomática ''en manos de''. No se detectaron revisiones aplicadas en el expediente inglés más reciente.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' según la terminología del proyecto, no 'SEÑOR'.
  - '''En manos de'' conserva la imagen hebrea de sujeción.'
  - Se evita introducir interpretaciones como 'abandonaron' en el texto principal, reservándolas solo como alternativa.
  - Los nombres propios y etnónimos siguen formas bíblicas estándar en español.
