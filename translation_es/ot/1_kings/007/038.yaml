review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y los datos del hebreo: diez recipientes de bronce, capacidad de cuarenta batos/baños cada uno, medida de cuatro codos sin especificación geométrica, y distribución de uno por cada soporte. Sin embargo, ''lavabos'' en español moderno suele evocar un lavabo doméstico fijo y no preserva bien el referente cultual de grandes vasijas móviles; además, la nota de unidad está anclada incorrectamente en ''cuarenta'' en vez de en la unidad misma.'
  spanish_quality_summary: La redacción es clara y natural, pero puede mejorarse con un término más bíblico y menos doméstico que 'lavabos'. 'Pilas' funciona mejor en español eclesial amplio para grandes recipientes de agua/lavado. También conviene mover la marca de nota cultural a la palabra de la unidad para mayor precisión y legibilidad.
  glossary_alignment: 'No hay conflicto con la terminología teológica principal del proyecto. La decisión clave aquí es léxica: para כִּיּוֹר, el inglés POB prefiere ''basins'' con alternativa ''lavers''; en español, ''pilas'' preserva mejor el objeto cultual que ''lavabos''. ''Bronce'', ''codos'' y la retención de la unidad hebrea son adecuadas. Para בַּת, ''batos'' evita la ambigüedad fuerte de ''baños'' en español moderno.'
  issues:
  - severity: medium
    issue: '''Lavabos'' para כִּיּוֹרוֹת'
    rationale: Aunque comunica la función de lavado, en español moderno sugiere principalmente un lavabo sanitario doméstico. En un contexto de mobiliario del templo, 'pilas' suena más natural, digno y cultualmente adecuado.
  - severity: medium
    issue: '''Baños'' como unidad de medida'
    rationale: Es defendible por tradición, pero en español contemporáneo es fuertemente ambiguo y puede sonar extraño o cómico fuera de contextos especializados. 'Batos' conserva mejor el carácter de unidad hebrea sin doble sentido moderno.
  - severity: low
    issue: La nota cultural está anclada en 'cuarenta' en lugar de en la unidad
    rationale: La explicación corresponde a la palabra de medida, no al número. El anclaje debe aparecer junto a 'batos' para precisión editorial.
  revised_spanish_text: Hizo diez pilas[a] de bronce. Cada pila tenía capacidad para cuarenta batos[b], y cada pila medía cuatro codos[c]. Una pila estaba sobre cada uno de los diez soportes.
  revised_footnotes:
  - marker: a
    text: '''Pilas'' traduce aquí el hebreo para grandes vasijas de lavado; en otras versiones se lee ''laveros''.'
    reason: lexical_alternative
  - marker: b
    text: Un 'bato' era una unidad hebrea de medida de líquidos.
    reason: cultural_note
  - marker: c
    text: El hebreo dice simplemente 'cuatro codos', sin precisar aquí si se trata del diámetro u otra dimensión.
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'lavabos' por 'pilas' para evitar una connotación doméstica moderna y reflejar mejor grandes recipientes cultuales. Se cambia 'baños' por 'batos' para conservar la unidad hebrea sin ambigüedad moderna, y se mueve la nota cultural al término de medida. El resto del versículo se mantiene por ser fiel al hebreo y a la auditoría inglesa.
