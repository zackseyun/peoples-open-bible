translation:
  language: es
  text: Porque he esperado en el Eterno la salvación de ustedes, y me ha venido gozo de parte del Santo por la misericordia[a] que pronto les llegará de parte de su eterno Salvador.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por el acto misericordioso». El término griego puede significar también «limosna» o «deed de caridad», pero aquí el contexto favorece la misericordia de Dios hacia su pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤλπισα
  english_pob_choice: have hoped
  chosen_spanish: he esperado
  alternatives_spanish:
  - esperé
  - he puesto mi esperanza
  lexicon: BDAG
  rationale: El aoristo griego expresa una acción asumida como completa con relevancia presente; el perfecto español 'he esperado' conserva esa continuidad mejor que un pretérito simple. 'He puesto mi esperanza' sería natural, pero añade un matiz más explicativo que el texto no exige.
- source_word: ἐπὶ τῷ αἰωνίῳ
  english_pob_choice: in the Eternal One
  chosen_spanish: en el Eterno
  alternatives_spanish:
  - en el Eterno Uno
  - en el Eterno
  lexicon: LSJ
  rationale: Se mantiene el título divino personal. En español, 'el Eterno' suena natural y reverente sin convertirlo en un título impersonal o en una paráfrasis excesiva. 'Eterno Uno' sería más literal al inglés, pero menos idiomático.
- source_word: σωτηρίαν
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  lexicon: BDAG
  rationale: '''Salvación'' reproduce bien el registro religioso del pasaje y el contexto de restauración de Israel. ''Liberación'' es posible, pero estrecha el alcance teológico.'
- source_word: χαρὰ
  english_pob_choice: joy
  chosen_spanish: gozo
  alternatives_spanish:
  - alegría
  - regocijo
  lexicon: BDAG
  rationale: '''Gozo'' es un equivalente bíblico claro y dignificado en español, adecuado para una afirmación litúrgica o profética. ''Alegría'' también es válida, pero ''gozo'' conserva mejor el tono elevado.'
- source_word: παρὰ τοῦ ἁγίου
  english_pob_choice: from the Holy One
  chosen_spanish: de parte del Santo
  alternatives_spanish:
  - del Santo
  - desde el Santo
  lexicon: LSJ
  rationale: La expresión funciona como un título divino. 'De parte del Santo' preserva la fuente personal del gozo y evita la ambigüedad de un simple adjetivo sustantivado sin relación explícita de procedencia.
- source_word: ἐπὶ τῇ ἐλεημοσύνῃ
  english_pob_choice: because of the mercy
  chosen_spanish: por la misericordia
  alternatives_spanish:
  - por el acto misericordioso
  - a causa de la misericordia
  lexicon: BDAG
  rationale: El contexto favorece la idea de la acción misericordiosa de Dios, no la limosna humana. 'Por la misericordia' es natural en español y conserva la base o motivo del gozo; la nota aclara la alternativa semántica de ἐλεημοσύνη.
- source_word: ἐν τάχει
  english_pob_choice: soon
  chosen_spanish: pronto
  alternatives_spanish:
  - en breve
  - rápidamente
  lexicon: BDAG
  rationale: '''Pronto'' expresa cercanía temporal y resulta más idiomático que ''rápidamente'' para una promesa futura. Conserva el matiz de inminencia del griego.'
- source_word: τοῦ αἰωνίου σωτῆρος ὑμῶν
  english_pob_choice: your eternal Savior
  chosen_spanish: su eterno Salvador
  alternatives_spanish:
  - su Salvador eterno
  - su Salvador, el Eterno
  lexicon: BDAG/LSJ
  rationale: La frase griega modifica a 'Salvador' con 'eterno'. En español, 'su eterno Salvador' reproduce esa relación de manera natural. Se conserva el posesivo de tercera persona plural por 'ustedes' en el resto de la línea, manteniendo la referencia al destinatario.
theological_decisions:
- issue: Título divino αἰώνιος aplicado a Dios y a su Salvador
  english_pob_reading: the Eternal One / your eternal Savior
  chosen_spanish_reading: el Eterno / su eterno Salvador
  alternative_spanish_readings:
  - el Eterno Uno / su Salvador eterno
  - el Eterno / su Salvador eterno
  rationale: El griego usa un adjetivo sustantivado como título divino y luego lo aplica al Salvador. En español, 'el Eterno' preserva la referencia personal a Dios; 'su eterno Salvador' mantiene la relación sintáctica del genitivo y evita oscurecer el título.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names'
- issue: Sentido de ἐλεημοσύνη en un contexto de intervención divina
  english_pob_reading: mercy
  chosen_spanish_reading: misericordia
  alternative_spanish_readings:
  - limosna
  - acto de misericordia
  - caridad
  rationale: Aunque ἐλεημοσύνη puede significar limosna o acto caritativo, aquí el texto habla de la salvación que viene de Dios. Por eso 'misericordia' es la lectura más fiel al contexto y al audit trail inglés, sin borrar la tensión semántica del término.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition'
translation_notes:
  revision_awareness: El inglés auditado retuvo 'the Eternal One', 'the Holy One' y finalmente cambió 'quickly' por 'soon' para mayor naturalidad. La versión española sigue esa revisión con 'el Eterno', 'el Santo' y 'pronto', manteniendo la cercanía temporal y el tono reverente. También conserva la tensión lexical de ἐλεημοσύνη mediante una nota alternativa, como en el audit trail inglés.
  spanish_consistency_notes:
  - Se usa 'ustedes' para el destinatario plural, en línea con el 'your' del original y con un registro bíblico claro en español.
  - '''Eterno'' se reserva para el título divino; no se sustituye por ''Señor'' para no ocultar la base original.'
  - '''Santo'' se escribe con artículo cuando funciona como título divino, siguiendo la función articular del griego.'
  - '''Gozo'' y ''misericordia'' mantienen el tono teológico del pasaje sin recurrir a paráfrasis extensas.'
