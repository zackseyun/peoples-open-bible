  rationale: Se reubicó la nota del modismo de muerte al lugar correcto en el texto, se corrigió la nota de referencia cruzada para reflejar fielmente la auditoría inglesa, y se cambió «traído de vuelta» por «llevado de vuelta» para una formulación más natural sin alterar el sentido pasivo del griego.
