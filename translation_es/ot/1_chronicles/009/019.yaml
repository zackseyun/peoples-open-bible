review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el hebreo y el rastro de auditoría inglés: conserva la genealogía formal, la afiliación clánica, la supervisión del servicio, la imagen concreta de ''umbrales'', ''tienda'', el sentido retrospectivo de ''sus padres habían estado'' y el nombre divino ''Yahvé''. La única desviación significativa está en el nombre propio הַקָּרְחִים / Korahites: el texto dice ''corahitas'' mientras los nombres propios del mismo versículo usan ''Coré'' y ''Corá''; en español debe armonizarse como ''coreítas'' o equivalente coherente con ''Coré/Corá''.'
  spanish_quality_summary: 'El español es claro y digno, pero presenta dos puntos mejorables: ''estaban sobre la obra del servicio'' suena algo calcado, aunque tolerable por filosofía de cercanía; y sobre todo ''corahitas'' es una forma poco natural e inconsistente con los nombres propios del contexto. La nota b también está mal planteada: no debe decir que el hebreo ''Yahvé'' representa YHWH, sino que ''Yahvé'' es la forma española que representa el nombre divino YHWH.'
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה = ''Yahvé''; אֹהֶל = ''tienda''; הַסִּפִּים = ''umbrales''; הַמָּבוֹא = ''entrada''. La principal corrección de glosario es הַקָּרְחִים, que no debe aparecer como ''corahitas''; en español conviene ''coreítas'' para reflejar el gentilicio derivado de Coré de manera legible y coherente.'
  issues:
  - severity: medium
    issue: 'Gentilicio clánico inconsistente: ''corahitas'''
    rationale: El hebreo הַקָּרְחִים significa 'los coreítas/Korahitas'. Dado que el mismo contexto usa 'Coré' en la genealogía, 'corahitas' mezcla transliteraciones y resulta poco natural en español. Debe armonizarse con el nombre propio en español.
  - severity: low
    issue: Nota b mal formulada
    rationale: 'La nota actual dice ''Hebreo: «Yahvé» representa el nombre divino YHWH'', pero ''Yahvé'' no es el hebreo sino la forma española elegida. La nota debe explicar que el hebreo YHWH se representa aquí como ''Yahvé''.'
  revised_spanish_text: Y Shallum, hijo de Coré, hijo de Ebiasaf, hijo de Corá, y sus hermanos de la casa de su padre, los coreítas, estaban sobre la obra del servicio, guardianes de los umbrales[a] de la tienda; y sus padres habían estado sobre el campamento de Yahvé[b], guardianes de la entrada.
  revised_footnotes:
  - marker: a
    text: O «guardianes de las entradas de la tienda». El hebreo dice literalmente «guardianes de los umbrales de la tienda».
    reason: lexical_alternative
  - marker: b
    text: El hebreo usa el nombre divino YHWH, representado aquí como «Yahvé».
    reason: alternative_reading
  revision_rationale: Se corrige el gentilicio a 'coreítas' para coherencia onomástica y mejor español, y se ajusta la nota sobre YHWH para que describa correctamente la decisión de traducción. El resto del versículo es fiel al hebreo y al razonamiento auditado del POB.
