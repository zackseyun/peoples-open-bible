translation:
  language: es
  text: 'Y dijo[a]: «Una mano está sobre el trono de Yah; Yahvé estará en guerra con Amalec de generación en generación».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo es difícil y elíptico: literalmente, «Una mano sobre el trono de Yah». También puede entenderse como «una mano contra el trono de Yah», o, menos probablemente, tomando כֵּס como «estandarte».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y él dijo
  alternatives_spanish:
  - Y dijo
  - Y él respondió
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol se vierte con continuidad natural en español. Se conserva el sujeto implícito como «él», porque el hebreo no repite el nombre en este versículo.
- source_word: יָד
  english_pob_choice: A hand
  chosen_spanish: Una mano
  alternatives_spanish:
  - La mano
  lexicon: HALOT
  rationale: El sustantivo carece de artículo en hebreo; por eso «una mano» refleja mejor la indefinición del original y mantiene el carácter elíptico de la cláusula.
- source_word: עַל
  english_pob_choice: upon
  chosen_spanish: sobre
  alternatives_spanish:
  - contra
  - en
  lexicon: HALOT
  rationale: «Sobre» reproduce de manera directa el valor básico de la preposición. «Contra» interpreta la relación como hostil, pero eso va más allá del valor léxico inmediato.
- source_word: כֵּס
  english_pob_choice: throne
  chosen_spanish: trono
  alternatives_spanish:
  - asiento
  - estandarte
  lexicon: HALOT
  rationale: La forma consonántica es rara, pero el contexto y la lectura auditada favorecen una relación con «trono». «Estandarte» es una posibilidad menos probable y más interpretativa.
- source_word: יָהּ
  english_pob_choice: Yah
  chosen_spanish: Yah
  alternatives_spanish:
  - Yahvé
  - el SEÑOR
  lexicon: HALOT
  rationale: Se distingue deliberadamente el nombre corto divino יָהּ de יהוה. Mantener «Yah» preserva la forma breve del texto fuente y evita fusionarlo con el tetragrámaton.
- source_word: מִלְחָמָה
  english_pob_choice: will have war
  chosen_spanish: tendrá guerra
  alternatives_spanish:
  - habrá guerra
  - hará guerra
  - peleará
  lexicon: HALOT
  rationale: El hebreo es nominal y expresa la realidad de guerra de manera tersa. «Tendrá guerra» conserva esa fuerza nominal mejor que una paráfrasis verbal más libre.
- source_word: לַיהוָה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: Siguiendo la directriz del proyecto, יהוה se rinde como «Yahvé». En este versículo se trata del nombre propio divino, distinto de יָהּ, y la traducción los conserva diferenciados.
- source_word: בַּעֲמָלֵק
  english_pob_choice: with Amalek
  chosen_spanish: con Amalec
  alternatives_spanish:
  - contra Amalec
  lexicon: HALOT
  rationale: En contexto bélico, ב puede marcar enfrentamiento. «Con Amalec» mantiene la forma más cercana al hebreo y evita resolver la relación como «contra» si el original permanece más abierto.
- source_word: מִדֹּר דֹּר
  english_pob_choice: from generation to generation
  chosen_spanish: de generación en generación
  alternatives_spanish:
  - de edad en edad
  - por todas las generaciones
  lexicon: HALOT
  rationale: Es el equivalente idiomático español más transparente para la continuidad sucesiva a través de las generaciones.
theological_decisions:
- issue: Diferenciación entre יָהּ y יהוה en la misma frase
  english_pob_reading: Render יָהּ as 'Yah' and יהוה as 'Yahweh'
  chosen_spanish_reading: «Yah» para יָהּ y «Yahvé» para יהוה
  alternative_spanish_readings:
  - «el SEÑOR» para ambos
  - «Yahvé» para ambos
  rationale: El texto hebreo distingue dos formas del nombre divino. La traducción española preserva esa distinción para no borrar un rasgo real del versículo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Tratamiento de la cláusula elíptica y difícil כִּי יָד עַל כֵּס יָהּ
  english_pob_reading: A hand is upon the throne of Yah
  chosen_spanish_reading: Una mano está sobre el trono de Yah, conservando la ambigüedad
  alternative_spanish_readings:
  - Una mano está contra el trono de Yah
  - Una mano está sobre el estandarte de Yah
  rationale: La expresión hebrea es comprimida y discutida. Se mantiene una traducción conservadora que deja visible la dificultad en lugar de resolverla con una paráfrasis más interpretativa.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se siguió el pasaje fuente hebreo con apoyo del audit trail inglés. No se introdujeron revisiones adicionales respecto del último pase auditado; se preservó la tensión textual de la cláusula oscura y la distinción entre יָהּ y יהוה.
  spanish_consistency_notes:
  - Se usó «Yahvé» para יהוה conforme al criterio del proyecto, y «Yah» para יָהּ para conservar la diferencia entre ambos nombres.
  - Se prefirió «de generación en generación» por ser la equivalencia idiomática más natural y fiel.
  - La puntuación de cita y la nota al pie conservan la ambigüedad del hebreo sin sobreexplicarla en el texto principal.
