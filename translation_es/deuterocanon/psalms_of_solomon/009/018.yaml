  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la primera cláusula: ἔθου τὸ ὄνομά σου ἐφʼ ἡμᾶς se conserva con una formulación literal y natural. Sin embargo, la segunda cláusula οὐ καταπαύσεις τὸν αἰῶνα no queda bien resuelta en español con «no cesará por siempre», porque suena ambigua y puede sugerir temporalidad limitada o una construcción poco idiomática. Conviene ajustar la expresión adverbial para comunicar mejor la negación durativa del griego sin sobreespecificar un objeto.'
  spanish_quality_summary: «Y has puesto tu nombre sobre nosotros» es claro y digno. «oh Yahvé» es aceptable dentro de la política del proyecto, aunque el griego dice Κύριε; la justificación dada es suficiente. El principal problema de legibilidad está en «no cesará por siempre», que en español bíblico actual suena menos natural que «no cesará para siempre» o «no cesará jamás». Para mantener la cercanía al inglés auditado y al griego, «para siempre» funciona mejor.
  glossary_alignment: El uso de «Yahvé» sigue la política del proyecto, aunque aquí el griego tenga Κύριε. «Nombre», «sobre nosotros» y «cesará» están alineados con las decisiones léxicas auditadas. La nota alternativa de [b] actualmente no mejora la lectura, porque ofrece «para siempre» como alternativa cuando esa forma debería ser la principal.
  issues:
  - severity: medium
    issue: La frase «no cesará por siempre» es poco idiomática en español y puede sonar ambigua.
    rationale: Aunque formalmente posible, en español amplio «por siempre» después de una negación futura aquí suena menos natural que «para siempre». Dado que τὸν αἰῶνα expresa duración indefinida, «para siempre» comunica mejor el sentido sin añadir interpretación.
  - severity: low
    issue: La nota [b] pone la mejor opción como alternativa en vez de usarla en el texto principal.
    rationale: Si la alternativa es más natural y más fiel al valor adverbial en español, debe pasar al cuerpo del texto y dejar la variante menos preferible como nota o eliminar la nota si no aporta valor real.
  revised_spanish_text: Y has puesto tu nombre sobre nosotros[a], oh Yahvé; y no cesará para siempre[b].
