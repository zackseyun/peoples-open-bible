  - marker: b
    text: La imagen es la del amanecer que toma la tierra y sacude de ella a los malvados, como se sacude el polvo de una prenda.
    reason: cultural_note
  revision_rationale: Se cambia 'orillas' por 'extremos' para reflejar mejor כַנְפוֹת en un contexto cósmico y evitar una connotación de costa o ribera. También se corrige la nota cultural para que la metáfora concuerde con 'tomar/asir' en vez de 'adherirse'.
