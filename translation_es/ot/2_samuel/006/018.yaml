translation:
  language: es
  text: Cuando David terminó de ofrecer el holocausto y los sacrificios de paz, bendijo al pueblo en nombre de Yahvé de los ejércitos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yahvé de los ejércitos»; alternativamente, «el SEÑOR de los ejércitos» o «el SEÑOR de los ejércitos armados».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְכַל
  english_pob_choice: had finished
  chosen_spanish: terminó
  alternatives_spanish:
  - había terminado
  - acabó
  lexicon: HALOT
  rationale: La forma verbal expresa la conclusión de la acción previa antes de la bendición. En español, «terminó» comunica con naturalidad ese cierre narrativo sin añadir más tiempo compuesto del necesario.
- source_word: מֵהַעֲלוֹת
  english_pob_choice: offering
  chosen_spanish: de ofrecer
  alternatives_spanish:
  - de presentar
  - de subir ofreciendo
  lexicon: HALOT
  rationale: El infinitivo en contexto sacrificial indica la acción de ofrecer; en español resulta más fiel y natural «de ofrecer» que una traducción literal de movimiento como «subir».
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - la ofrenda quemada
  - el sacrificio totalmente quemado
  lexicon: HALOT
  rationale: «עֹלָה» es el sacrificio de subida/quemado. En español bíblico, «holocausto» es el término técnico más reconocido y precisa la clase sacrificial sin perder el valor cultual.
- source_word: וְהַשְּׁלָמִים
  english_pob_choice: the peace offerings
  chosen_spanish: los sacrificios de paz
  alternatives_spanish:
  - las ofrendas de bienestar
  - los sacrificios de comunión
  lexicon: HALOT
  rationale: Se preserva la categoría sacrificial tradicional con una formulación clara. «Sacrificios de paz» mantiene la equivalencia bíblica usual y evita reducir el matiz comunitario del término.
- source_word: וַיְבָרֶךְ
  english_pob_choice: he blessed
  chosen_spanish: bendijo
  alternatives_spanish:
  - pronunció una bendición sobre
  - dijo una bendición sobre
  lexicon: HALOT
  rationale: El verbo ברך aquí expresa bendecir de manera directa. «Bendijo» es la correspondencia verbal más simple y fiel.
- source_word: אֶת־הָעָם
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  - a la asamblea
  lexicon: HALOT
  rationale: En este contexto, el colectivo reunido se expresa bien con «el pueblo». El acusativo con objeto personal se vuelve naturalmente «al pueblo» en español.
- source_word: בְּשֵׁם
  english_pob_choice: in the name of
  chosen_spanish: en nombre de
  alternatives_spanish:
  - por el nombre de
  - con el nombre de
  lexicon: HALOT
  rationale: La locución española estable «en nombre de» expresa autoridad/invocación y corresponde al valor funcional del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahweh'
  rationale: Según la terminología española del proyecto, el Tetragrámaton se vierte como «Yahvé». Se conserva el nombre propio divino en vez de sustituirlo por un título.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: «צבאות» puede referirse a huestes/ejércitos. En español, «de los ejércitos» es claro y mantiene el sentido del título divino sin cargarlo con un matiz litúrgico menos transparente.
theological_decisions:
- issue: Representación del nombre divino יְהוָה en el título final
  english_pob_reading: Yahweh of hosts
  chosen_spanish_reading: Yahvé de los ejércitos
  alternative_spanish_readings:
  - Yahvé de los ejércitos celestiales
  - Yahvé de las huestes
  rationale: 'El texto hebreo usa el nombre propio divino seguido del título צְבָאוֹת. La traducción conserva ambos elementos: el nombre revelado de Dios y la idea de soberanía sobre los ejércitos/huestes.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahweh'
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo entre el texto fuente, la traducción inglesa auditada y la revisión posterior; no se registraron cambios en la última pasada. La versión española sigue esa estabilidad y conserva la estructura narrativa y el título divino sin suavizar la terminología sacrificial.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma coherente con la política terminológica española del proyecto.
  - Se mantiene la distinción sacrificial con «holocausto» y «sacrificios de paz», evitando paráfrasis generales.
  - La preposición «en nombre de» reproduce la función de בְּשֵׁם con naturalidad española.
  - «De los ejércitos» refleja el título divino צְבָאוֹת sin sustituirlo por una glosa interpretativa.
