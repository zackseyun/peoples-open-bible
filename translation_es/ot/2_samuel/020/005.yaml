translation:
  language: es
  text: Así que Amasá fue a convocar a Judá[a], pero se demoró más allá del tiempo señalado que le había fijado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a reunir a Judá». El verbo hebreo puede referirse a una convocatoria urgente, y en este contexto probablemente incluye una movilización militar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - partió
  - se dirigió
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de הלך se expresa de forma natural en español con un verbo simple de movimiento. 'Fue' mantiene la fluidez narrativa sin cargar el texto con matices innecesarios.
- source_word: לְהַזְעִיק
  english_pob_choice: to summon
  chosen_spanish: convocar
  alternatives_spanish:
  - llamar a reunir
  - muster
  lexicon: HALOT
  rationale: El hifil de זעק aquí indica reunir o llamar urgentemente. 'Convocar' conserva la idea de llamada oficial y urgente, y en español puede abarcar una movilización organizada sin forzar exclusivamente el sentido militar.
- source_word: אֶת יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - la tribu de Judá
  - los de Judá
  lexicon: HALOT
  rationale: El hebreo trata a Judá como colectivo. En español, el nombre propio 'Judá' puede funcionar igualmente como sujeto colectivo sin explicitar una glosa que el texto no exige.
- source_word: וייחר
  english_pob_choice: he delayed
  chosen_spanish: se tardó
  alternatives_spanish:
  - se demoró
  - se retrasó
  lexicon: HALOT
  rationale: El verbo אחר en este contexto transmite llegar tarde o demorarse respecto del plazo fijado. 'Se tardó' es idiomático en español y preserva la idea de incumplimiento temporal.
- source_word: מִן הַמּוֹעֵד
  english_pob_choice: beyond the appointed time
  chosen_spanish: más allá del tiempo señalado
  alternatives_spanish:
  - pasado el tiempo señalado
  - más tarde que la cita fijada
  lexicon: HALOT
  rationale: מוֹעֵד es el tiempo señalado o fijado. La construcción con מן expresa exceder ese límite; 'más allá del tiempo señalado' reproduce bien esa relación sin sonar artificial.
- source_word: אֲשֶׁר יְעָדוֹ
  english_pob_choice: that he had set for him
  chosen_spanish: que le había fijado
  alternatives_spanish:
  - que le había señalado
  - que le había назначado
  lexicon: HALOT
  rationale: יעד aquí significa fijar o asignar un plazo. 'Le había fijado' comunica con precisión la relación personal del plazo entre el que lo asigna y Amasá, y evita una lectura demasiado abstracta.
translation_notes:
  revision_awareness: 'La fuente hebrea y la traducción inglesa coinciden ampliamente. Se preserva la secuencia narrativa y la tensión temporal del hebreo: Amasá recibe la tarea de reunir/convocar a Judá, pero llega tarde al plazo fijado. No se introducen elementos ausentes del texto ni se suaviza el fracaso implícito en la demora.'
  spanish_consistency_notes:
  - Se usa 'Judá' como colectivo, siguiendo el valor del hebreo y la práctica del proyecto.
  - '''Convocar'' se emplea como término principal para לְהַזְעִיק; la nota conserva la alternativa ''reunir'' por la posible lectura de movilización.'
  - '''Se tardó'' refleja el sentido de atraso del verbo hebreo en lugar de una simple demora neutral.'
  - Se mantiene un registro bíblico claro y actual, sin recurrir a formulaciones eclesiásticas innecesarias.
