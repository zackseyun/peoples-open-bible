translation:
  language: es
  text: De repente, un grito de guerra[a] fue acallado ante mí; él me oirá, porque estoy lleno de rectitud[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «clamor de guerra».'
    reason: lexical_alternative
  - marker: b
    text: 'También: «justicia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξάπινα
  english_pob_choice: Suddenly
  chosen_spanish: De repente
  alternatives_spanish:
  - Repentinamente
  - De pronto
  lexicon: LSJ
  rationale: Adverbio de irrupción súbita; «De repente» reproduce de forma natural el valor abrupto sin añadir matiz innecesario.
- source_word: κωφωθὴ
  english_pob_choice: silenced
  chosen_spanish: fue acallado
  alternatives_spanish:
  - fue silenciado
  - quedó acallado
  lexicon: LSJ
  rationale: El griego es problemático en el expediente, pero la lectura revisada del inglés auditado favorece una acción pasiva sobre el «grito». «Fue acallado» conserva la imagen de quedar sin voz/sonido y funciona bien en español bíblico contemporáneo.
- source_word: κραυγὴ πολέμου
  english_pob_choice: cry of war
  chosen_spanish: grito de guerra
  alternatives_spanish:
  - clamor de guerra
  - grito bélico
  lexicon: LSJ
  rationale: «Grito de guerra» es una equivalencia transparente y natural para κραυγὴ πολέμου. Mantiene la relación genitiva sin volverla excesivamente técnica.
- source_word: ἐνώπιόν μου
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - ante mí
  - en mi presencia
  lexicon: LSJ
  rationale: «Delante de mí» es idiomático y conserva la referencia espacial/personal de la expresión griega.
- source_word: ἐπακούσεταί μου
  english_pob_choice: he will hear me
  chosen_spanish: él me oirá
  alternatives_spanish:
  - me escuchará
  - me atenderá
  lexicon: LSJ
  rationale: El verbo puede implicar oír favorablemente. «Él me oirá» es fiel y evita sobreinterpretar como «responderá»; el sujeto queda implícito como en el griego y se apoya en el contexto de oración.
- source_word: ἐπλήσθην
  english_pob_choice: I am filled
  chosen_spanish: estoy lleno
  alternatives_spanish:
  - he sido llenado
  - he quedado lleno
  lexicon: LSJ
  rationale: En español, la copulación con adjetivo expresa mejor el estado resultante que una pasiva literal. La forma elegida conserva el sentido de plenitud del contexto poético.
- source_word: δικαιοσύνης
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justeza
  lexicon: LSJ
  rationale: Aunque el inglés POB prefirió «righteousness», en español «justicia» es la opción más natural y, en este contexto, puede abarcar tanto la rectitud moral como la fidelidad justa. Se preserva así la alternativa semántica documentada.
theological_decisions:
- issue: Sujeto implícito de «él me oirá»
  english_pob_reading: The English uses 'he' with God understood from the surrounding prayer context.
  chosen_spanish_reading: «Él» se mantiene como sujeto implícito, entendido a partir del contexto oracional.
  alternative_spanish_readings:
  - «Dios me oirá»
  - «se me oirá»
  rationale: El griego no nombra al sujeto. Para no introducir una explicitación no dicha, se conserva el pronombre en español; el contexto sugiere a Dios sin necesidad de nombrarlo en el texto principal.
  doctrine_reference: Preservar la tensión teológica sin resolverla de forma intrusiva.
translation_notes:
  revision_awareness: El expediente muestra una serie de revisiones por OCR y reconstrucción del griego subyacente, con especial atención a la frase central del primer hemistiquio. Esta versión sigue la lectura revisada que entiende un pasivo sobre el «grito de guerra» y mantiene la cláusula final sin forzar una explicación explícita del sujeto.
  spanish_consistency_notes:
  - Se usa «Dios» solo en las notas, no en el texto, porque el sujeto del verbo permanece implícito en el original.
  - Se eligió «justicia» como término principal por ser el equivalente español más natural y por conservar la alternativa moral/forense documentada en la auditoría.
  - El registro es bíblico contemporáneo, evitando arcaísmos como «será oído» salvo que el griego exigiera una pasiva más marcada.
