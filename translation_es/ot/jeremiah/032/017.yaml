base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/032/017.yaml
  text: Ah[a], Lord GOD! Behold, you yourself made the heavens and the earth by your great power and by your outstretched arm[b]. Nothing is too difficult for you.
  footnotes:
