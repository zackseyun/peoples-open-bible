translation:
  language: es
  text: 'Ve y reúne a los ancianos de Israel, y diles: «Yahvé, el Dios de sus padres —el Dios de Abraham, de Isaac y de Jacob— se me apareció, diciendo: “Ciertamente he atendido[a] a ustedes y a lo que se les ha hecho en Egipto”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «he visitado». El hebreo intensifica el verbo y puede indicar una atención divina decisiva que conduce a intervención, no simplemente una visita social.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Vete
  lexicon: HALOT
  rationale: El imperativo qal 2ms pide una orden directa y breve. «Ve» es natural en español, conserva el tono comisionado y no añade matices inexistentes en el hebreo.
- source_word: וְאָסַפְתָּ
  english_pob_choice: and gather
  chosen_spanish: y reúne
  alternatives_spanish:
  - y junta
  - y congrega
  lexicon: HALOT
  rationale: אָסף aquí significa recoger personas para convocarlas. «Reúne» comunica bien la acción de convocar a los líderes sin sonar mecánico ni demasiado eclesiástico.
- source_word: זִקְנֵי יִשְׂרָאֵל
  english_pob_choice: the elders of Israel
  chosen_spanish: los ancianos de Israel
  alternatives_spanish:
  - los ancianos israelitas
  - los líderes de Israel
  lexicon: HALOT
  rationale: «Ancianos» preserva el cargo social-político del texto. «De Israel» mantiene la referencia comunitaria del pueblo del pacto.
- source_word: וְאָמַרְתָּ אֲלֵהֶם
  english_pob_choice: and say to them
  chosen_spanish: y diles
  alternatives_spanish:
  - y les dirás
  - y les hablarás
  lexicon: HALOT
  rationale: La fórmula de introducción del discurso se vuelve más natural y directa con «diles», sin perder la dependencia del verbo hebreo אמר.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino según la norma del proyecto, en lugar de sustituirlo por un título. «Yahvé» es la forma española más estable y readable en este registro.
- source_word: אֱלֹהֵי אֲבֹתֵיכֶם
  english_pob_choice: the God of your fathers
  chosen_spanish: el Dios de sus padres
  alternatives_spanish:
  - el Dios de sus antepasados
  - el Dios de sus padres patriarcas
  lexicon: HALOT
  rationale: «Sus padres» refleja el poseedor plural de segunda persona y mantiene la formulación patriarcal del hebreo. La alternativa «antepasados» suaviza el género pero debilita el eco del pacto patriarcal.
- source_word: נִרְאָה אֵלַי
  english_pob_choice: has appeared to me
  chosen_spanish: se me apareció
  alternatives_spanish:
  - ha aparecido a mí
  - fue visto por mí
  lexicon: HALOT
  rationale: El niphal de ראה es la fórmula habitual para una aparición divina. En español, el pretérito perfecto simple «se me apareció» expresa mejor el evento revelador que el calco pasivo.
- source_word: אֱלֹהֵי אַבְרָהָם יִצְחָק וְיַעֲקֹב
  english_pob_choice: the God of Abraham, Isaac, and Jacob
  chosen_spanish: el Dios de Abraham, de Isaac y de Jacob
  alternatives_spanish:
  - el Dios de Abraham, Isaac y Jacob
  lexicon: HALOT
  rationale: Se preserva íntegra la identificación pactal con los patriarcas. La repetición de «de» favorece la claridad y la cadencia natural en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - con estas palabras
  lexicon: HALOT
  rationale: Introduce el contenido del mensaje divino con una equivalencia directa y sobria, sin expandir la estructura hebrea.
- source_word: פָּקֹד פָּקַדְתִּי
  english_pob_choice: I have surely attended to you
  chosen_spanish: Ciertamente he atendido[a] a ustedes
  alternatives_spanish:
  - Ciertamente los he visitado[a]
  - Sin duda he tomado nota de ustedes
  lexicon: HALOT
  rationale: La combinación infinitivo absoluto + verbo finito intensifica la acción. «He atendido» preserva la idea de atención divina eficaz, siguiendo la decisión auditada del POB, y evita que «visitar» suene meramente social en español.
- source_word: אֶתְכֶם
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - los
  - a ustedes mismos
  lexicon: HALOT
  rationale: El objeto pronominal se adapta al español por medio de la preposición requerida por «atender». «A ustedes» mantiene el plural explícito del hebreo.
- source_word: וְאֶת הֶעָשׂוּי לָכֶם
  english_pob_choice: and to what has been done to you
  chosen_spanish: y a lo que se les ha hecho
  alternatives_spanish:
  - y al trato que han recibido
  - y a lo que les han hecho
  lexicon: HALOT
  rationale: El participio pasivo sustantivado se vierte con una estructura pasiva natural en español. «Se les ha hecho» conserva el enfoque en la acción sufrida sin introducir un sujeto explícito ausente del hebreo.
- source_word: בְּמִצְרָיִם
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  alternatives_spanish:
  - en la tierra de Egipto
  lexicon: HALOT
  rationale: La localización geográfica es directa; «en Egipto» es fiel y suficiente en español.
theological_decisions:
- issue: Nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrama de forma explícita. Siguiendo la norma del proyecto, se traduce con el nombre propio divino, no con una sustitución titular. «Yahvé» es la forma española preferida para mantener la transparencia del nombre revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Alcance de פָּקֹד פָּקַדְתִּי
  english_pob_reading: I have surely attended to you
  chosen_spanish_reading: Ciertamente he atendido a ustedes
  alternative_spanish_readings:
  - Ciertamente he visitado a ustedes
  - Ciertamente he tomado nota de ustedes
  rationale: La expresión intensificada no debe reducirse a una visita social. «Atender» conserva la idea de atención decisiva de Dios que incluye intervención inminente, tal como lo refleja la nota auditada en inglés.
  doctrine_reference: DOCTRINE.md Translation philosophy §2 (Lexical transparency and theological tension)
- issue: Referente de אֲבֹתֵיכֶם
  english_pob_reading: your fathers
  chosen_spanish_reading: sus padres
  alternative_spanish_readings:
  - sus antepasados
  rationale: Se mantiene la formulación patriarcal del hebreo y el eco del pacto con Abraham, Isaac y Jacob. Aunque «antepasados» podría sonar más inclusivo, atenúa la referencia histórica específica del texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada y quedó sin cambios, con alta concordancia entre revisores. Se mantuvo la decisión estable de traducir יְהוָה como «Yahvé» y פָּקֹד פָּקַדְתִּי como una atención divina intensificada, evitando el calco de «visitar» salvo en la nota alternativa.
  spanish_consistency_notes:
  - Se mantuvo la segunda persona plural de «ustedes» para אֶתְכֶם, coherente con «sus padres».
  - Se usó «se me apareció» para una aparición divina idiomática en español, sin perder el valor revelatorio del niphal.
  - La puntuación con guiones largos preserva la aposición patriarcal sin quebrar la fluidez del período.
  - Se evitó «SEÑOR» para יְהוָה conforme a la terminología del proyecto.
