translation:
  language: es
  text: Y así como has soltado un pájaro de tu mano, así has dejado ir a tu prójimo, y no lo cazarás[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no lo perseguirás». El verbo griego tiene imaginería de caza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πετεινὸν
  english_pob_choice: bird
  chosen_spanish: pájaro
  alternatives_spanish:
  - ave
  - animal alado
  lexicon: LSJ
  rationale: πετεινόν designa de manera general un ave. «Pájaro» es natural en español moderno y conserva la imagen de algo vivo que vuela y es soltado de la mano.
- source_word: ἐκ χειρός σου
  english_pob_choice: from your hand
  chosen_spanish: de tu mano
  alternatives_spanish:
  - de tu mano hacia afuera
  - fuera de tu mano
  lexicon: LSJ
  rationale: La expresión concreta se mantiene en español con la preposición simple «de», que reproduce con claridad la imagen física de soltar algo que estaba sujetado.
- source_word: ἀπέλυσας
  english_pob_choice: you have let go
  chosen_spanish: soltaste
  alternatives_spanish:
  - has soltado
  - liberaste
  lexicon: LSJ
  rationale: El verbo aquí expresa liberar/soltar. «Soltaste» comunica de forma directa la acción de dejar libre al ave y encaja con el paralelismo del dicho.
- source_word: ἀφῆκας
  english_pob_choice: you have let ... go
  chosen_spanish: has dejado ir
  alternatives_spanish:
  - has soltado
  - has liberado
  - has abandonado
  lexicon: LSJ
  rationale: En el segundo miembro, el verbo puede significar dejar ir, abandonar o soltar; el paralelo con el ave favorece una traducción que conserve la idea de dejar partir, sin introducir una carga distinta como «abandonar».
- source_word: τὸν πλησίον
  english_pob_choice: your neighbor
  chosen_spanish: tu prójimo
  alternatives_spanish:
  - tu vecino
  - la persona cercana a ti
  lexicon: LSJ
  rationale: En literatura sapiencial, πλησίον designa al prójimo, la persona cercana en relación social y ética. «Prójimo» conserva esa resonancia moral mejor que «vecino».
- source_word: οὐ θηρεύσεις
  english_pob_choice: you will not catch
  chosen_spanish: no lo cazarás
  alternatives_spanish:
  - no lo buscarás para atraparlo
  - no lo capturarás
  - no lo perseguirás como presa
  lexicon: LSJ
  rationale: θηρεύω tiene imaginería de caza. «Cazarás» preserva esa fuerza metafórica en español, y el pronombre «lo» mantiene la referencia al prójimo sin suavizar el verbo.
theological_decisions:
- issue: Mantener la imagen de caza en el verbo final sin neutralizarla
  english_pob_reading: you will not catch him; footnote notes hunting imagery in the Greek verb
  chosen_spanish_reading: no lo cazarás
  alternative_spanish_readings:
  - no lo atraparás
  - no lo capturarás
  - no lo buscarás para atraparlo
  rationale: El griego no solo dice que no podrá recuperarse, sino que usa un verbo de caza. En español, «cazar» conserva esa tensión imagética y evita borrar el detalle lexical documentado por la nota inglesa.
  doctrine_reference: Translation philosophy §5 (documented exception/consistency) y §6 (readable modern Spanish)
- issue: Equilibrio entre literalidad y naturalidad en el paralelismo
  english_pob_reading: And as a bird from your hand you have let go, so you have let your neighbor go
  chosen_spanish_reading: Y así como soltaste un pájaro de tu mano, así has dejado ir a tu prójimo
  alternative_spanish_readings:
  - Y así como dejaste ir un pájaro de tu mano, así has dejado ir a tu prójimo
  - Y como un pájaro de tu mano soltaste, así has dejado ir a tu prójimo
  rationale: La estructura española mantiene el paralelismo sin forzar un orden poco natural. Se conserva la comparación entre el ave soltada y el prójimo dejado ir, que es el punto retórico del versículo.
  doctrine_reference: Translation philosophy §6 (readable modern Spanish)
- issue: Tiempo verbal y valor proverbial del enunciado
  english_pob_reading: you have let go ... you have let ... go, and you will not catch him
  chosen_spanish_reading: soltaste ... has dejado ir ... no lo cazarás
  alternative_spanish_readings:
  - has soltado ... has dejado ir ... no lo cazarás
  - soltaste ... soltaste ... no lo cazarás
  rationale: La alternancia entre pasado y futuro expresa el dicho como una acción ya realizada con una consecuencia futura segura. El español conserva ese valor proverbial sin necesidad de homogeneizar los tiempos.
  doctrine_reference: Translation philosophy §6
- issue: Uso de «prójimo» como término ético de sabiduría
  english_pob_reading: your neighbor
  chosen_spanish_reading: tu prójimo
  alternative_spanish_readings:
  - tu vecino
  - tu semejante
  rationale: «Prójimo» comunica mejor en español bíblico contemporáneo la cercanía relacional y ética del término, y evita restringirlo a proximidad geográfica.
  doctrine_reference: LSJ / uso sapiencial de πλησίον
translation_notes:
  revision_awareness: El borrador sigue de cerca el testimonio griego de Sirach 27:19 y el audit trail inglés. Se preserva el paralelismo imagen-acción con un ave soltada y un prójimo dejado ir, y se mantiene la fuerza de θηρεύσεις mediante una nota que explicita la imaginería de caza documentada en el inglés POB.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se prefiere «prójimo» para πλησίον por su valor sapiencial y ético.
  - Se preserva la metáfora de caza en el último miembro para no suavizar θηρεύσεις.
  - La puntuación y el orden buscan sonar naturales en español sin perder el paralelismo del griego.
