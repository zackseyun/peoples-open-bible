translation:
  language: es
  text: Podrá comer el alimento de su Dios[a], de las cosas santísimas y de las cosas santas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el pan de su Dios». Aquí «pan» funciona de manera idiomática para las porciones de alimento sacerdotal.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶחֶם
  english_pob_choice: food
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: HALOT
  rationale: En español, «pan» conserva mejor la fuerza idiomática del hebreo לֶחֶם, que puede abarcar alimento en sentido amplio. Dado que el texto ritual habla de porciones sacerdotales, «pan» suena más natural que una traducción explicativa como «alimento», y mantiene la relación con el término culto sin reducirlo a pan literal solamente.
- source_word: אֱלֹהָיו
  english_pob_choice: his God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios propio
  - el Dios de él
  lexicon: HALOT
  rationale: El sufijo posesivo singular masculino se conserva con «su Dios», que es natural en español y refleja la pertenencia/covención del sacerdote sin añadir explicaciones ajenas al verso.
- source_word: מִקָּדְשֵׁי הַקֳּדָשִׁים
  english_pob_choice: from the most holy things
  chosen_spanish: de las cosas santísimas
  alternatives_spanish:
  - de las cosas muy santas
  - de las ofrendas santísimas
  lexicon: HALOT
  rationale: La construcción hebrea expresa la categoría superlativa del culto. «Cosas santísimas» reproduce bien esa escala cultual en español, y evita atenuar el contraste con la segunda categoría.
- source_word: וּמִן הַקֳּדָשִׁים
  english_pob_choice: and from the holy things
  chosen_spanish: y de las cosas santas
  alternatives_spanish:
  - y de las cosas sagradas
  - y de las ofrendas santas
  lexicon: HALOT
  rationale: Se mantiene el vínculo léxico con קדש mediante «santas» y el contraste legal con la categoría anterior. «Cosas santas» es claro y consistente con el registro ritual del pasaje.
- source_word: יֹאכֵל
  english_pob_choice: he may eat
  chosen_spanish: Podrá comer
  alternatives_spanish:
  - Puede comer
  - Comerá
  lexicon: HALOT
  rationale: En este contexto legal, el imperfecto comunica permiso. «Podrá comer» expresa autorización, preserva el sentido normativo y evita convertirlo en simple futuro o mandato.
theological_decisions:
- issue: Fuerza permisiva del imperfecto legal יֹאכֵל
  english_pob_reading: permission ('he may eat')
  chosen_spanish_reading: permiso ('podrá comer')
  alternative_spanish_readings:
  - futuro simple ('comerá')
  - obligación ('deberá comer')
  rationale: El verso contrasta privilegios permitidos con otras restricciones sacerdotales. «Podrá comer» mantiene ese valor de autorización sin introducir obligación ni solo predicción.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Valor idiomático de לֶחֶם en contexto sacerdotal
  english_pob_reading: food / 'bread' idiomatically for priestly portions
  chosen_spanish_reading: «pan» con valor idiomático de porción alimenticia sacerdotal
  alternative_spanish_readings:
  - «alimento» como explicativo
  - «comida» como generalización
  rationale: Aunque el hebreo puede extenderse a alimento, «pan» conserva la metáfora lexical y permite que el lector perciba el carácter idiomático del término. No se debe borrar la tensión entre sentido literal y uso cultual.
  doctrine_reference: HALOT; lexical note in English POB
- issue: Clasificación cultual de las porciones
  english_pob_reading: most holy things / holy things
  chosen_spanish_reading: «cosas santísimas» / «cosas santas»
  alternative_spanish_readings:
  - «ofrendas santísimas» / «ofrendas santas»
  - «cosas muy santas» / «cosas sagradas»
  rationale: La traducción conserva el gradiente de santidad que el hebreo marca. «Santísimas» y «santas» reflejan la distinción legal sin imponer terminología eclesiástica posterior.
  doctrine_reference: Levítico 6–7; Distinciones cultuales de קדש
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el consenso alto del audit trail inglés: mantiene la lectura permisiva de יֹאכֵל, conserva la distinción entre las dos categorías de cosas consagradas, y traslada el valor idiomático de לֶחֶם sin perder la referencia cultual. No se registran revisiones posteriores que requieran ajuste.'
  spanish_consistency_notes:
  - Se usó «cosas santísimas» / «cosas santas» para preservar el contraste del hebreo y la consistencia terminológica dentro del versículo.
  - «Podrá comer» se eligió por el matiz de permiso legal; no se cambió a futuro simple ni a obligación.
  - Se mantuvo «su Dios» para reflejar el posesivo hebreo y la relación sacerdotal con Dios.
  - La nota de pie de página conserva la alternativa literal «pan» y explica su valor idiomático en este contexto.
