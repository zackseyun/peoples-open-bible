translation:
  language: es
  text: Ahora bien, Saúl había dado a Mical, su hija, la esposa de David, a Palti[a] hijo de Lais, que era de Gallim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Palti es una transliteración frecuente en algunas traducciones; la forma hebrea aquí la respalda.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/שָׁאוּל
  english_pob_choice: Now Saul
  chosen_spanish: Ahora bien, Saúl
  alternatives_spanish:
  - Y Saúl
  - Ahora Saúl
  lexicon: HALOT
  rationale: El hebreo וַ/וְ enlaza la oración al contexto narrativo; en español, «Ahora bien» conserva la continuidad y suena natural al abrir un nuevo dato retrospectivo.
- source_word: נָתַן
  english_pob_choice: had given
  chosen_spanish: había dado
  alternatives_spanish:
  - dio
  lexicon: HALOT
  rationale: El perfecto hebreo presenta una acción ya completada respecto de la narración; el pluscuamperfecto español expresa bien que el hecho de entregar a Mical ya había ocurrido.
- source_word: מִיכַל בִּתּוֹ
  english_pob_choice: Michal his daughter
  chosen_spanish: Mical, su hija
  alternatives_spanish:
  - Mical, la hija de él
  - Mical, hija de Saúl
  lexicon: HALOT
  rationale: La aposición identifica a Mical como hija de Saúl. En español, el posesivo «su» mantiene la referencia inmediata y fluida sin añadir palabras ajenas al hebreo.
- source_word: אֵשֶׁת דָּוִד
  english_pob_choice: David’s wife
  chosen_spanish: la esposa de David
  alternatives_spanish:
  - la mujer de David
  lexicon: HALOT
  rationale: El constructo indica relación marital. «Esposa» comunica de forma clara y digna la relación con David en español contemporáneo.
- source_word: לְפַלְטִי
  english_pob_choice: to Palti
  chosen_spanish: a Palti
  alternatives_spanish:
  - para Palti
  lexicon: HALOT
  rationale: La preposición marca el destinatario de la entrega. En español, «a» conserva la dirección de la acción sin sobretraducir.
- source_word: בֶן לַיִשׁ
  english_pob_choice: son of Laish
  chosen_spanish: hijo de Lais
  alternatives_spanish:
  - hijo de Laís
  lexicon: HALOT
  rationale: El patronímico se rinde de manera directa. Se conserva la forma usual castellana del nombre propio Lais para evitar una transliteración innecesariamente técnica.
- source_word: אֲשֶׁר מִגַּלִּים
  english_pob_choice: who was from Gallim
  chosen_spanish: que era de Gallim
  alternatives_spanish:
  - que provenía de Gallim
  - que era oriundo de Gallim
  lexicon: HALOT
  rationale: La frase relativa identifica el origen geográfico. «Era de» reproduce de modo natural y fiel la idea de procedencia sin introducir matices no necesarios.
translation_notes:
  revision_awareness: El texto base inglés presenta alta concordancia con el hebreo. La única decisión relevante de estilo fue expresar el enlace narrativo con «Ahora bien» y conservar el pluscuamperfecto español para el valor anterior al relato inmediato.
  spanish_consistency_notes:
  - Se mantuvo el nombre propio «Mical» en forma castellana habitual, coherente con el resto de la obra.
  - Se preservó el orden lógico del hebreo sin forzar una sintaxis demasiado literal.
  - No se introdujeron términos eclesiásticos ni interpretativos no sustentados por el texto.
