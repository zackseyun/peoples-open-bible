revisions:
- from: Ven conmigo desde el Líbano[a], mi novia; ven conmigo desde el Líbano. Mira[b] desde la cima de Amaná, desde la cima de Senir y Hermón, desde las guaridas de los leones, desde los montes de las leopardas.
  to: Ven conmigo desde el Líbano, mi novia; ven conmigo desde el Líbano. Mira[a] desde la cima de Amaná, desde la cima de Senir[b] y Hermón, desde las guaridas de los leones, desde los montes de los leopardos.
  rationale: 'Se corrigieron los anclajes de las notas para que coincidan con el contenido auditado: la alternativa léxica va en ‘Mira’ y la nota cultural en ‘Senir’. También se reemplazó ‘leopardas’ por ‘leopardos’ para reflejar fielmente el plural genérico hebreo y mejorar la naturalidad del español. No se requieren cambios doctrinales ni adjudicación adicional.'
