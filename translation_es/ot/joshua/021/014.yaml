translation:
  language: es
  text: Jattir con sus tierras de pastoreo[a], y Eshtemoa con sus tierras de pastoreo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'terreno común' para el terreno que rodeaba cada ciudad.
