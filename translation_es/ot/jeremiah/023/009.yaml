translation:
  language: es
  text: 'En cuanto a los profetas: mi corazón está quebrantado dentro de mí[a]; todos mis huesos tiemblan[b]. He llegado a ser como un hombre ebrio, como un hombre fuerte vencido por el vino[c], a causa de Yahvé y a causa de sus palabras santas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contra los profetas»; la preposición hebrea puede introducir el tema del oráculo o, de manera más interpretativa, su fuerza adversativa.
    reason: alternative_reading
  - marker: b
    text: O «se estremecen» o «se agitan».
    reason: lexical_alternative
  - marker: c
    text: O «delante de Yahvé y delante de sus palabras santas»; aquí se toma «a causa de» como expresión de la causa del estado abrumado del profeta.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַנְּבִאִים
  english_pob_choice: Concerning the prophets
  chosen_spanish: En cuanto a los profetas
  alternatives_spanish:
  - Contra los profetas
  - Acerca de los profetas
  lexicon: HALOT
  rationale: La preposición ל aquí funciona como encabezado temático del oráculo. «En cuanto a» reproduce bien esa función discursiva sin volver adversativa la frase; «contra» sería más interpretativo.
- source_word: נִשְׁבַּר לִבִּי בְקִרְבִּי
  english_pob_choice: my heart is broken within me
  chosen_spanish: mi corazón está quebrantado dentro de mí
  alternatives_spanish:
  - mi corazón ha sido quebrantado dentro de mí
  - mi corazón está roto dentro de mí
  lexicon: HALOT
  rationale: El nifal de שבר expresa un estado resultante de quebranto. «Está quebrantado» suena natural en español y conserva la imagen; «dentro de mí» preserva בְקִרְבִּי.
- source_word: רָחֲפוּ כָּל עַצְמוֹתַי
  english_pob_choice: all my bones tremble
  chosen_spanish: todos mis huesos tiemblan
  alternatives_spanish:
  - todos mis huesos se estremecen
  - todos mis huesos se agitan
  lexicon: HALOT
  rationale: רחף aquí apunta a sacudirse o temblar. «Tiemblan» comunica el movimiento corporal de manera idiomática y mantiene la fuerza de la imagen.
- source_word: הָיִיתִי כְּאִישׁ שִׁכּוֹר
  english_pob_choice: I have become like a drunken man
  chosen_spanish: He llegado a ser como un hombre ebrio
  alternatives_spanish:
  - He venido a ser como un hombre borracho
  - Me he vuelto como un hombre ebrio
  lexicon: HALOT
  rationale: El perfecto expresa un estado alcanzado. «He llegado a ser» conserva el matiz de cambio; «ebrio» es un equivalente digno y claro para שִׁכּוֹר.
- source_word: וּכְגֶבֶר עֲבָרוֹ יָיִן
  english_pob_choice: like a strong man overcome by wine
  chosen_spanish: como un varón vencido por el vino
  alternatives_spanish:
  - como un hombre fuerte vencido por el vino
  - como un varón a quien el vino ha vencido
  lexicon: HALOT
  rationale: גבר tiene el matiz de hombre vigoroso o fuerte; «varón» conserva el paralelismo y el tono solemne. «Vencido por el vino» expresa היטב el sentido de עבר con vino como ser sobrepasado u overpowered.
- source_word: מִפְּנֵי יְהוָה
  english_pob_choice: because of Yahweh
  chosen_spanish: a causa de Yahvé
  alternatives_spanish:
  - por Yahvé
  - delante de Yahvé
  lexicon: HALOT
  rationale: Aquí מִפְּנֵי expresa la causa del desbordamiento emocional, no solo ubicación espacial. «A causa de» recoge mejor el valor causal que el español necesita en este contexto.
- source_word: דִּבְרֵי קָדְשׁוֹ
  english_pob_choice: his holy words
  chosen_spanish: sus palabras santas
  alternatives_spanish:
  - las palabras de su santidad
  - sus palabras santísimas
  lexicon: HALOT
  rationale: La construcción posesiva se entiende naturalmente como palabras caracterizadas por santidad. «Sus palabras santas» es directo, fiel y evita una genitivación pesada.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton y la política del proyecto pide «Yahvé» en el texto principal. Esto preserva el nombre propio del pacto en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de la preposición לַנְּבִאִים
  english_pob_reading: Concerning the prophets / Against the prophets
  chosen_spanish_reading: En cuanto a los profetas
  alternative_spanish_readings:
  - Contra los profetas
  - Acerca de los profetas
  rationale: Se mantiene la tensión documentada entre valor temático y lectura adversativa. La opción elegida deja abierta la posibilidad de un tono de juicio sin imponerlo en la traducción base.
  doctrine_reference: English POB audit trail, footnote a
- issue: Valor de מִפְּנֵי en este contexto
  english_pob_reading: because of Yahweh
  chosen_spanish_reading: a causa de Yahvé
  alternative_spanish_readings:
  - delante de Yahvé
  - por Yahvé
  rationale: La lectura causal está respaldada por el audit trail. En español conviene explicitar la causa del quebranto de Jeremías, sin perder de vista que la idea surge de la presencia/realidad de Yahvé.
  doctrine_reference: English POB audit trail, footnote c
translation_notes:
  revision_awareness: 'Se revisó el pasaje conforme al audit trail inglés y al texto hebreo: se mantuvieron la lectura temática/adversativa de לַנְּבִאִים, el valor causal de מִפְּנֵי, y el nombre divino YHWH como «Yahvé». No hubo revisiones posteriores en el paquete fuente; la traducción sigue el estado más reciente aprobado.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, en coherencia con el estándar del proyecto.
  - Se usa «varón» para reflejar el paralelismo con גֶּבֶר y conservar el registro solemne.
  - Se traduce σ/שִׁכּוֹר como «ebrio», evitando un coloquialismo más fuerte como «borracho».
  - «Sus palabras santas» preserva el posesivo y la cualidad de santidad sin forzar una estructura genitiva extraña en español.
  - Los marcadores de nota a, b y c se anclan en el texto en los lugares correspondientes.
