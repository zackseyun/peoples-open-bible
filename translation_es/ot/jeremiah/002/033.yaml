translation:
  language: es
  text: ¡Cómo diriges tu camino para buscar amor! Por tanto, aun mujeres perversas has enseñado tus caminos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cosas perversas» o «maldades», tomando el plural femenino de manera más abstracta en vez de como «mujeres perversas».
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה תֵּיטִבִי
  english_pob_choice: How well you direct
  chosen_spanish: ¡Cómo enderezas!
  alternatives_spanish:
  - ¡Cómo bien diriges!
  - ¡Con qué habilidad enderezas!
  lexicon: HALOT
  rationale: La construcción exclamativa expresa ironía sobre el grado de cuidado o habilidad con que se orienta el camino. «Cómo enderezas» conserva el valor de dirigir/poner recto sin sonar forzado en español, y mantiene el tono retórico.
- source_word: דַּרְכֵּךְ
  english_pob_choice: your way
  chosen_spanish: tu camino
  alternatives_spanish:
  - tu senda
  - tu conducta
  - tu proceder
  lexicon: HALOT
  rationale: «Camino» preserva la metáfora hebrea y es natural en español bíblico contemporáneo. «Conducta» explicaría el sentido, pero suaviza la imagen del texto.
- source_word: לְבַקֵּשׁ אַהֲבָה
  english_pob_choice: to seek love
  chosen_spanish: para buscar amor
  alternatives_spanish:
  - para buscar amor
  - para buscar afecto
  - para buscar amantes
  lexicon: HALOT
  rationale: Se mantiene el sustantivo singular «amor», porque el hebreo dice literalmente «buscar amor». «Amantes» interpreta más explícitamente el contexto, pero va más allá de la forma léxica de la frase.
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  - Por consiguiente
  lexicon: HALOT
  rationale: Marca la consecuencia retórica del primer hemistiquio. «Por tanto» es formal y suficientemente directo en español.
- source_word: גַּם
  english_pob_choice: even
  chosen_spanish: aun
  alternatives_spanish:
  - incluso
  - también
  - hasta
  lexicon: HALOT
  rationale: Aquí el adverbio intensifica la acusación. «Aun» conserva la idea de sorprendente extensión sin volverse demasiado coloquial.
- source_word: הָרָעוֹת
  english_pob_choice: wicked women
  chosen_spanish: mujeres perversas
  alternatives_spanish:
  - mujeres impías
  - mujeres malvadas
  - cosas malas
  lexicon: HALOT
  rationale: La forma femenina plural con artículo puede referirse de modo personal o más abstracto. En el contexto metafórico de adulterio e instrucción en conductas corruptas, «mujeres perversas» conserva el referente personal que siguió la POB inglesa, sin perder la posibilidad léxica alternativa indicada en la nota.
- source_word: למדתי
  english_pob_choice: you have taught
  chosen_spanish: has enseñado
  alternatives_spanish:
  - has instruido
  - enseñaste
  - has mostrado
  lexicon: HALOT
  rationale: La lectura contextual es de segunda persona femenina singular. «Has enseñado» comunica la acción completada con efecto permanente y es más natural que un presente simple en español.
- source_word: דְּרָכָיִךְ
  english_pob_choice: your ways
  chosen_spanish: tus caminos
  alternatives_spanish:
  - tus sendas
  - tu conducta
  - tus prácticas
  lexicon: HALOT
  rationale: Se conserva la repetición del vocabulario de camino/camino(s), importante en la acusación profética. El plural «caminos» refleja el hebreo plural y la idea de patrones repetidos.
theological_decisions:
- issue: Sentido de הָרָעוֹת en el hemistiquio final
  english_pob_reading: 'personal referent: ''wicked women'''
  chosen_spanish_reading: 'referente personal: ''mujeres perversas'''
  alternative_spanish_readings:
  - 'referente abstracto: ''cosas malas'''
  - '''maldades'''
  rationale: La imagen amplia de Jeremías 2 presenta a Judá como mujer infiel. En ese marco, leer el plural femenino como personas encaja mejor con la metáfora sexualizada y con la acusación de que ha enseñado sus caminos a otras. Aun así, el hebreo permite una lectura más abstracta, que se conserva como alternativa.
  doctrine_reference: Jeremías 2:20-33; metáfora profética de infidelidad/corrupción
- issue: Tono retórico e irónico de la exclamación inicial
  english_pob_reading: How well you direct your way
  chosen_spanish_reading: ¡Cómo enderezas tu camino!
  alternative_spanish_readings:
  - ¡Qué bien diriges tu camino!
  - ¡Cómo de bien encaminas tu proceder!
  rationale: La frase no es elogio sino ironía profética. «Enderezas» deja sentir la aparente corrección o habilidad del camino, pero el contexto lo invierte en reproche. La puntuación exclamativa ayuda a preservar la fuerza retórica.
  doctrine_reference: Retórica profética en Jeremías 2
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB inglés al preferir un verbo de dirección más cercano a la idea de orientar/enderezar el camino, y al mantener la opción personal en el plural femenino final. Se ha preservado la tensión lexical del hebreo en la nota, sin neutralizarla.
  spanish_consistency_notes:
  - Se usó «Yahvé» implícitamente no aparece en este versículo.
  - Se mantuvo «camino(s)» para preservar la imaginería profética coherente en Jeremías.
  - «Aun» se eligió por su valor intensificador, evitando un simple «también».
  - La nota a pie conserva la alternativa abstracta que el hebreo permite, sin borrar la lectura personal preferida en el cuerpo del texto.
