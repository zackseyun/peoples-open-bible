translation:
  language: es
  text: Y Mical, la hija de Saúl, no tuvo hijos[a] hasta el día de su muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'descendencia'; el sustantivo hebreo puede referirse genéricamente a un hijo o niño, no necesariamente a un varón.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/מִיכַל
  english_pob_choice: And Michal
  chosen_spanish: Y Michal
  alternatives_spanish:
  - Ahora Michal
  - En cuanto a Michal
  lexicon: HALOT
  rationale: La partícula inicial introduce a Michal en la secuencia narrativa. En español, 'Y Michal' mantiene la continuidad del relato sin añadir matices más marcados que el hebreo no exige.
- source_word: בַּת שָׁאוּל
  english_pob_choice: the daughter of Saul
  chosen_spanish: la hija de Saúl
  alternatives_spanish:
  - hija de Saúl
  - la hija de Saúl
  lexicon: HALOT
  rationale: La construcción de parentesco se conserva de forma natural y fiel. 'La hija de Saúl' refleja el hebreo sin recurrir a una formulación posesiva menos cercana al texto.
- source_word: לֹא הָיָה לָהּ
  english_pob_choice: had no
  chosen_spanish: no tuvo
  alternatives_spanish:
  - no tenía
  - no le había
  lexicon: HALOT
  rationale: El hebreo expresa posesión de modo idiomático. 'No tuvo' es una solución breve y natural en español que conserva el sentido de carencia sin sobre-explicar la construcción.
- source_word: יָלֶד
  english_pob_choice: child
  chosen_spanish: hijo
  alternatives_spanish:
  - niño
  - descendencia
  - hijo(a)
  lexicon: HALOT
  rationale: Aunque el término hebreo puede funcionar de manera genérica, el contexto narrativo de esterilidad favorece en español una referencia concreta y natural. 'Hijo' mantiene la fuerza de la ausencia de descendencia sin introducir una abstracción más pesada; la alternativa genérica se preserva en la nota.
- source_word: עַד י֥וֹם מוֹתָֽ/הּ
  english_pob_choice: until the day of her death
  chosen_spanish: hasta el día de su muerte
  alternatives_spanish:
  - hasta el día de su muerte
  - hasta su muerte
  lexicon: HALOT
  rationale: La expresión temporal se traduce de manera directa y sobria, preservando la fórmula hebrea y su fuerza de duración total de la vida.
theological_decisions:
- issue: Alcance de la frase sobre la falta de descendencia
  english_pob_reading: Render the temporal phrase straightforwardly without implying that she bore children after death or using it to make a theological point beyond the text.
  chosen_spanish_reading: Traducir la frase de manera directa, sin insinuar que tuvo hijos después de morir ni convertir el versículo en una afirmación adicional no presente en el texto.
  alternative_spanish_readings:
  - interpretarla como simple énfasis en esterilidad de por vida
  - suavizarla como 'murió sin hijos'
  rationale: El hebreo afirma la ausencia de hijo hasta el día de su muerte; la traducción debe conservar esa tensión narrativa sin resolverla ni ampliarla. 'No tuvo hijo hasta el día de su muerte' comunica la persistencia de la falta de descendencia a lo largo de su vida.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto inglés revisado añadió el artículo definido antes de 'daughter' para mayor naturalidad. En español, esa naturalidad se logra con 'la hija de Saúl' sin alterar el contenido del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Y' para la continuidad narrativa breve del hebreo.
  - Se evita 'SEÑOR' u otra sustitución teológica, porque no aparece el nombre divino en este versículo.
  - '''Hijo'' se usa aquí por naturalidad narrativa; la nota preserva la alternativa genérica del hebreo.'
  - La puntuación conserva el tono bíblico sobrio y publicable en español.
