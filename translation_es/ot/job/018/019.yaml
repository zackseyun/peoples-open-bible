translation:
  language: es
  text: No tiene descendencia ni posteridad[a] entre su pueblo, y no hay sobreviviente en los lugares donde habitó[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «nieto» para «posteridad»; la pareja «descendencia y posteridad» traduce una expresión hebrea que subraya la extinción total de los descendientes.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en sus moradas» o «en sus asentamientos»; el hebreo puede referirse tanto a lugares de residencia como de estancia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִין
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - prole
  - hijos
  - linaje
  lexicon: HALOT
  rationale: נִין denota progenie o descendencia. «Descendencia» comunica bien la idea de una línea familiar que continúa y, junto con «posteridad», conserva el paralelismo de la expresión hebrea sin reducirla solo a «hijos».
- source_word: נֶכֶד
  english_pob_choice: posterity
  chosen_spanish: posteridad
  alternatives_spanish:
  - nieto
  - descendiente
  - linaje
  lexicon: HALOT
  rationale: En esta pareja con נִין, נֶכֶד amplía la idea a una línea posterior de descendientes. «Posteridad» mantiene el sentido de extinción total de la descendencia mejor que un término más específico como «nieto».
- source_word: בְּעַמּוֹ
  english_pob_choice: among his people
  chosen_spanish: entre su pueblo
  alternatives_spanish:
  - en su pueblo
  - entre sus parientes
  - en medio de su gente
  lexicon: HALOT
  rationale: Con בְּ, la frase expresa el ámbito comunitario al que pertenece. «Entre su pueblo» es natural en español y preserva la idea de pertenencia dentro del grupo, no solo ubicación física.
- source_word: שָׂרִיד
  english_pob_choice: survivor
  chosen_spanish: sobreviviente
  alternatives_spanish:
  - remanente
  - el que quedó
  - restante
  lexicon: HALOT
  rationale: שָׂרִיד designa a alguien que queda con vida tras la destrucción. «Sobreviviente» es claro y moderno, y evita cargas teológicas o colectivas que puede tener «remanente».
- source_word: בִּמְגוּרָיו
  english_pob_choice: in the places where he sojourned
  chosen_spanish: en los lugares donde habitó
  alternatives_spanish:
  - en sus moradas
  - en sus lugares de estancia
  - donde vivió como forastero
  lexicon: HALOT
  rationale: מָגוּר puede referirse a lugares de residencia o de sojourn. «En los lugares donde habitó» conserva la referencia espacial de la vida de residencia sin sonar forzado en español; la nota recoge la alternativa de «sojourned».
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético WLC de Job 18:19 y coincide sustancialmente con la solución auditada en inglés: dos términos de descendencia en paralelismo totalizador, la frase comunitaria בְּעַמּוֹ, y la referencia final a los lugares de residencia/sojourn de la persona. Se prefirió un español claro y publicable, manteniendo la tensión lexical entre descendencia/posteridad y el matiz de residencia/estancia en la última cola.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque no aparece el tetragrámaton en este versículo.
  - «Posteridad» se mantuvo como término más amplio que «nieto», siguiendo la fuerza idiomática del paralelismo hebreo.
  - «Habitó» funciona aquí como equivalente lector-amigable de la idea de morar/estancia; la nota preserva la alternativa más literal de «moradas» o «asentamientos».
