translation:
  language: es
  text: El nombre del primero es Pisón; es el que rodea toda la tierra de Havila[a], donde hay oro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el que rodea toda la tierra de Havila». El participio hebreo puede rendirse como «rodea» o «circunda»; «rodea» es la forma más natural en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׁם
  english_pob_choice: name
  chosen_spanish: nombre
  alternatives_spanish:
  - designación
  lexicon: HALOT
  rationale: «Nombre» es el equivalente natural y directo para la fórmula introductoria. «Designación» sería más abstracto y menos idiomático aquí.
- source_word: הָאֶחָד
  english_pob_choice: the first
  chosen_spanish: el primero
  alternatives_spanish:
  - el uno
  - el primero de ellos
  lexicon: HALOT
  rationale: En la serie de cuatro ríos, el valor es ordinal y referencial. «El primero» comunica mejor ese sentido en español que una simple repetición de «el uno».
- source_word: פִּישׁוֹן
  english_pob_choice: Pishon
  chosen_spanish: Pisón
  alternatives_spanish:
  - Pishón
  lexicon: nombre propio transliterado
  rationale: Se translitera el nombre propio. «Pisón» sigue la forma usual en español bíblico y conserva la identidad del río.
- source_word: הוּא
  english_pob_choice: it is
  chosen_spanish: es
  alternatives_spanish:
  - él es
  - es el
  lexicon: HALOT
  rationale: El hebreo usa un pronombre resumptivo para el río; en español basta una cópula impersonal y natural sin forzar género personal.
- source_word: הַסֹּבֵב
  english_pob_choice: goes around
  chosen_spanish: rodea
  alternatives_spanish:
  - da vuelta alrededor de
  - circunda
  - envuelve
  lexicon: HALOT
  rationale: El participio de סבב expresa ir alrededor/rodear. «Rodea» es natural en español y preserva la imagen espacial sin añadir la interpretación de «fluir».
- source_word: אֵת כָּל אֶרֶץ
  english_pob_choice: all the land
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - toda la región
  - toda la tierra de
  - todo el territorio
  lexicon: HALOT
  rationale: «אֶרֶץ» aquí designa una comarca o territorio, pero «tierra» mantiene la amplitud semántica del hebreo. «Toda la tierra» conserva גם el cuantificador כָּל y es idiomático en español bíblico.
- source_word: הַחֲוִילָה
  english_pob_choice: Havilah
  chosen_spanish: Havila
  alternatives_spanish:
  - Havilá
  lexicon: nombre propio transliterado
  rationale: Nombre propio de lugar; se adapta a la ortografía española habitual sin cambiar la referencia.
- source_word: אֲשֶׁר שָׁם
  english_pob_choice: where there is
  chosen_spanish: donde hay
  alternatives_spanish:
  - en donde hay
  - donde está
  lexicon: HALOT
  rationale: La cláusula relativa introduce una característica del territorio. «Donde hay» reproduce bien el valor locativo existencial de שָׁם y evita una construcción demasiado literal.
- source_word: הַזָּהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - el oro
  lexicon: HALOT
  rationale: En español, la presencia material se expresa naturalmente con «hay oro». Aunque el hebreo lleva artículo, el uso existencial en español normalmente lo omite.
theological_decisions:
- issue: Representación del topónimo y del referente geográfico sin sobreinterpretar la cosmología del texto
  english_pob_reading: 'The verse is a geographic identification statement: the river Pishon goes around all the land of Havilah, where there is gold.'
  chosen_spanish_reading: 'Es una identificación geográfica: el río Pisón rodea toda la tierra de Havila, donde hay oro.'
  alternative_spanish_readings:
  - el río Pisón fluye alrededor de toda la tierra de Havila
  - el río Pisón circunda toda la tierra de Havila
  rationale: No hay aquí una afirmación teológica explícita; por eso se evita cargar el verbo con implicaciones no presentes en el hebreo. «Rodea» mantiene la relación espacial sin añadir más de lo que el texto dice.
  doctrine_reference: Principio de fidelidad semántica y no amplificación
translation_notes:
  revision_awareness: La revisión inglesa cambió de «flows around» a «goes around» para reflejar con más precisión el participio hebreo sin introducir la idea interpretativa de «fluir». La versión española sigue esa revisión y evita «fluye»; opta por «rodea», que conserva el valor de γύiro/encircling del verbo.
  spanish_consistency_notes:
  - Se usa «tierra» para אֶרֶץ como territorio geográfico, no como planeta.
  - Se translitera el nombre propio como «Pisón» y «Havila» siguiendo uso bíblico en español.
  - Se conserva una sintaxis breve y sobria, acorde con un registro bíblico moderno y publicable.
  - La nota a pie de página mantiene la alternativa léxica documentada sin duplicar el sentido principal del texto.
