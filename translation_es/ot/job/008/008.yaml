translation:
  language: es
  text: Pues pregunta, por favor, a la generación anterior[a] y disponte[b] para la investigación[c] de sus antepasados[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la generación antigua» o «la generación de antes». El hebreo se refiere a una generación previa, no necesariamente a la primera en sentido absoluto.
    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo implica fijar la atención, orientarse o prepararse atentamente hacia algo; no solo pensar en ello de manera general.
    reason: lexical_alternative
  - marker: c
    text: O «lo investigado por». El sustantivo hebreo puede referirse tanto al acto de investigar como a lo descubierto por esa investigación.
    reason: lexical_alternative
  - marker: d
    text: Lit. «sus padres». En este contexto puede entenderse más ampliamente como «sus antepasados».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque, pues
  - Ya que
  lexicon: HALOT
  rationale: Aquí כִּי introduce una relación explicativa o de fundamento. En español, «Porque» preserva mejor ese valor discursivo que una mera continuación narrativa y suena natural en un registro bíblico moderno.
- source_word: שְׁאַל נָא
  english_pob_choice: please ask
  chosen_spanish: pregunta, por favor
  alternatives_spanish:
  - consulta, por favor
  - pregunta ahora
  - inquiere, por favor
  lexicon: HALOT
  rationale: El verbo expresa una exhortación directa, y נָא añade ruego/cortesía más que urgencia temporal. «Pregunta, por favor» conserva la súplica respetuosa sin volverlo mecánico.
- source_word: לְדֹר רִאשׁוֹן
  english_pob_choice: the former generation
  chosen_spanish: la generación anterior
  alternatives_spanish:
  - la generación antigua
  - la generación de antes
  - la primera generación
  lexicon: HALOT
  rationale: דּוֹר es «generación» y רִאשׁוֹן aquí señala prioridad temporal, no necesariamente la primera en sentido absoluto. «Anterior» mantiene la idea de antigüedad/precedencia con naturalidad en español.
- source_word: וְכוֹנֵן
  english_pob_choice: establish yourself
  chosen_spanish: disponte
  alternatives_spanish:
  - prepárate
  - fíjate
  - dirige tu atención
  lexicon: HALOT
  rationale: El verbo כון en este contexto tiene la idea de fijarse o colocarse uno mismo atentamente hacia algo. «Disponte» conserva el matiz de prepararse y encaminarse mentalmente sin forzar una expresión extraña.
- source_word: לְחֵקֶר
  english_pob_choice: the investigation
  chosen_spanish: la investigación
  alternatives_spanish:
  - la búsqueda
  - la indagación
  - lo investigado
  lexicon: HALOT
  rationale: חֵקֶר puede referirse al acto de investigar o al resultado de esa búsqueda. Como el contexto enfatiza el proceso de consulta a los antepasados, «la investigación» preserva esa amplitud sin cerrar indebidamente el sentido.
- source_word: אֲבוֹתָם
  english_pob_choice: their fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus antepasados
  - sus padres ancestrales
  - sus padres/antepasados
  lexicon: HALOT
  rationale: El hebreo usa el idiomático «padres» para referirse a los antepasados. En español, «sus padres» conserva el parentesco literal del texto; el sentido amplio de «antepasados» se deja implícito en el contexto de la generación anterior y se explica en nota.
theological_decisions:
- issue: Alcance de «sus padres»
  english_pob_reading: '''Their fathers'' may be understood more broadly as ''their ancestors.'''
  chosen_spanish_reading: «sus padres» puede entenderse más ampliamente como «sus antepasados»
  alternative_spanish_readings:
  - «sus padres» en sentido estrictamente literal
  - «sus antepasados» en el texto principal
  rationale: Se conserva la metáfora/idioma hebreo de «padres» en el texto principal, pero se aclara que el referente puede ampliarse a los antepasados, tal como reconoce el POB en inglés. Esto evita perder la imagen original y, al mismo tiempo, comunica correctamente el alcance semántico.
  doctrine_reference: Uso idiomático del lenguaje ancestral en el Antiguo Testamento; interpretación semántica de parentesco ampliado.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente corrigió la frase desde una lectura orientada a «considerar los hallazgos» hacia una más cercana a וְכוֹנֵן לְחֵקֶר: «establish yourself in the investigation». La versión española sigue esa revisión al usar «disponte a la investigación», manteniendo el paralelismo exhortativo con «pregunta» y el registro formal.'
  spanish_consistency_notes:
  - Se mantiene «generación» para דּוֹר y no se sustituye por un término más abstracto.
  - Se conserva el idiomatismo hebreo de «padres» con nota aclaratoria, en vez de reemplazarlo directamente por «antepasados» en el texto principal.
  - La formulación evita el tono arcaizante excesivo, pero conserva un registro bíblico digno.
  - La puntuación reproduce la pausa exhortativa y el flujo paralelo del verso.
