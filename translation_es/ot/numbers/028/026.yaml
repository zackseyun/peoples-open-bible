translation:
  language: es
  text: Y en el día de las primicias, cuando presenten a Yahvé una ofrenda nueva de grano en su Fiesta de las Semanas, tendrán una convocación santa[a]. No harán ningún trabajo ordinario[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una asamblea santa». La expresión hebrea es un término técnico para una reunión sagrada convocada para el culto.
    reason: lexical_alternative
  - marker: b
    text: O «ningún trabajo laborioso» o «ningún trabajo ocupacional». La expresión se refiere al trabajo ordinario asociado con la labor diaria.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְיוֹם
  english_pob_choice: And on the day
  chosen_spanish: Y en el día
  alternatives_spanish:
  - Y el día
  - Y el día de
  lexicon: HALOT
  rationale: La expresión temporal introduce la ocasión de manera directa. «En el día» conserva el valor adverbial y suena natural en español bíblico moderno.
- source_word: הַבִּכּוּרִים
  english_pob_choice: of the firstfruits
  chosen_spanish: de las primicias
  alternatives_spanish:
  - de los primeros frutos
  - de las primicias de la cosecha
  lexicon: HALOT
  rationale: «Primicias» es el término cultual más asentado en español para este festejo y mantiene la referencia a la ofrenda/producción primera.
- source_word: בְּהַקְרִיבְכֶם
  english_pob_choice: when you present
  chosen_spanish: cuando presenten
  alternatives_spanish:
  - cuando ofrezcan
  - al presentar ustedes
  lexicon: HALOT
  rationale: El infinitivo con prefijo marca simultaneidad temporal. En contexto sacrificial, «presenten» conserva la idea de ofrecer delante de Dios sin sonar arcaico.
- source_word: מִנְחָה חֲדָשָׁה
  english_pob_choice: a new grain offering
  chosen_spanish: una ofrenda nueva
  alternatives_spanish:
  - una ofrenda de cereal nueva
  - una ofrenda nueva de grano
  lexicon: HALOT
  rationale: מִנְחָה puede designar una ofrenda de cereal, pero en español «ofrenda nueva» evita una expresión pesada y deja abierta la cualificación del tipo de ofrenda; el contexto sacrificial ya la determina.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahveh
  - a Yahvéh
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se preserva el nombre divino de forma transparente en español, conforme a la convención del proyecto, evitando la sustitución por una convención de ocultamiento.
- source_word: בְּשָׁבֻעֹתֵיכֶם
  english_pob_choice: at your Feast of Weeks
  chosen_spanish: en sus semanas
  alternatives_spanish:
  - en su Fiesta de Semanas
  - en la fiesta de ustedes de las semanas
  lexicon: HALOT
  rationale: La forma hebrea puede leerse como referencia a la festividad de Semanas; sin embargo, el sintagma también conserva el valor literal de «semanas». Se opta por mantener la tensión del texto base con una traducción menos interpretativa, dejando la identificación festiva para la nota.
- source_word: מִקְרָא קֹדֶשׁ
  english_pob_choice: a holy convocation
  chosen_spanish: una convocación santa
  alternatives_spanish:
  - una asamblea santa
  - una santa convocación
  lexicon: HALOT
  rationale: «Convocación santa» conserva el carácter técnico de un llamamiento litúrgico. Se evita «asamblea» como preferencia tradicional, porque la POB documenta el matiz técnico de una reunión convocada.
- source_word: כָּל מְלֶאכֶת עֲבֹדָה
  english_pob_choice: ordinary work
  chosen_spanish: ningún trabajo ordinario
  alternatives_spanish:
  - ninguna labor ordinaria
  - ningún trabajo laboral
  - ningún trabajo de labor
  lexicon: HALOT
  rationale: La expresión priestly designa el trabajo cotidiano u ocupacional, no toda actividad. «Trabajo ordinario» reproduce ese contraste con el día santo y es idiomático en español.
- source_word: לֹא תַעֲשׂוּ
  english_pob_choice: You shall do no
  chosen_spanish: No harán
  alternatives_spanish:
  - No harán ustedes
  - No harán nada de
  lexicon: HALOT
  rationale: La prohibición legal en segunda persona plural se expresa con futuro exhortativo/jurídico en español, manteniendo la fuerza normativa del hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahveh
  rationale: El texto hebreo usa el Tetragrámaton directamente. La edición española debe conservar el nombre divino visible y no sustituirlo por una convención de máscara; «Yahvé» es la forma base del proyecto en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: בְּשָׁבֻעֹתֵיכֶם como referencia festiva
  english_pob_reading: at your Feast of Weeks
  chosen_spanish_reading: en sus semanas
  alternative_spanish_readings:
  - en su Fiesta de Semanas
  - en la Fiesta de las Semanas
  rationale: La lectura inglesa opta por identificar la festividad, pero el hebreo literal permite la referencia a «sus semanas». En español se conserva la forma más cercana al texto, sin borrar la posible alusión calendárica que la nota puede explicar.
  doctrine_reference: Principio de transparencia textual y no borrado de ambigüedad cultual
translation_notes:
  revision_awareness: El contexto inglés POB ya había resuelto el sintagma cultual como «firstfruits» y la cláusula final como «ordinary work», con revisión sin cambios. En español se mantiene la misma arquitectura del versículo, pero se reabre solo la tensión de בְּשָׁבֻעֹתֵיכֶם para no forzar una identificación interpretativa donde el hebreo permite una lectura más literal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estable para el Tetragrámaton.
  - Se usa «primicias» para el campo cultual de בִּכּוּרִים, en continuidad con el lenguaje bíblico español claro.
  - «Convocación santa» conserva el carácter técnico de מִקְרָא קֹדֶשׁ sin reemplazarlo por terminología más eclesiástica.
  - «Trabajo ordinario» refleja la restricción cultual, no una prohibición absoluta de toda actividad.
