  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios» y «rescató» están bien. La decisión de no especificar «ídolos» en el texto principal coincide con el expediente inglés. También se preserva razonablemente el juego léxico con «vanas / mente vana».
  issues:
