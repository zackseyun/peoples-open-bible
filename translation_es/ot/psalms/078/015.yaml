translation:
  language: es
  text: Partió las rocas en el desierto y les dio de beber abundantemente[a], como de las grandes profundidades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y les dio de beber de las grandes profundidades».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְבַקַּע
  english_pob_choice: split
  chosen_spanish: partió
  alternatives_spanish:
  - quebró
  - hizo pedazos
  lexicon: HALOT
  rationale: El piel de בקע expresa una acción fuerte de abrir o partir. En español, «partió» comunica bien esa ruptura física sin sonar tan mecánico como una traducción más literal de «split».
- source_word: צֻרִים
  english_pob_choice: rocks
  chosen_spanish: las rocas
  alternatives_spanish:
  - las piedras
  - los peñascos
  lexicon: HALOT
  rationale: El plural de צוּר denota masas rocosas grandes. «Rocas» conserva el plural y la imagen de bloques de piedra grandes y resistentes.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el páramo
  - en la estepa
  lexicon: HALOT
  rationale: Aunque «wilderness» suele corresponder a «desierto» en español bíblico, aquí se mantiene el sentido del lugar inhóspito de la travesía; «desierto» es claro y natural para lectores hispanos.
- source_word: וַיַּשְׁקְ
  english_pob_choice: gave them drink
  chosen_spanish: les dio de beber
  alternatives_spanish:
  - los hizo beber
  - les dio de tomar
  lexicon: HALOT
  rationale: El hifil de שׁקה significa causar a beber o dar de beber. «Les dio de beber» es la forma más natural y fiel en español, y permite suplir con claridad el objeto implícito.
- source_word: כִּתְהֹמוֹת
  english_pob_choice: as from the great depths
  chosen_spanish: como de los grandes abismos
  alternatives_spanish:
  - como de las profundidades
  - como del gran abismo
  lexicon: HALOT
  rationale: תְּהֹמוֹת remite a las «profundidades» o «abismos» acuosos. «Abismos» conserva mejor el tono poético y la referencia a aguas profundas que una expresión más general.
- source_word: רַבָּה
  english_pob_choice: great
  chosen_spanish: grandes
  alternatives_spanish:
  - vastos
  - abundantes
  lexicon: HALOT
  rationale: En el contexto, רַבָּה intensifica la magnitud de los abismos/aguas. «Grandes» mantiene la idea de amplitud sin introducir una paráfrasis excesiva.
theological_decisions:
- issue: Imágenes de aguas profundas y provisión milagrosa
  english_pob_reading: Retain simile language ('as from the great depths') rather than interpretively specifying subterranean reservoirs.
  chosen_spanish_reading: Mantener la comparación poética («como de los grandes abismos») sin explicar de manera interpretativa el mecanismo del milagro.
  alternative_spanish_readings:
  - y les dio de beber abundantemente
  - y les dio de beber de los grandes abismos
  rationale: El hebreo usa una comparación con las profundidades. La redacción española conserva la imagen sin convertirla en una explicación cosmológica ni reducirla a una simple afirmación de abundancia.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La versión inglesa revisada añadió «abundantly» para reflejar רַבָּה. La propuesta española integra ese matiz con «abundantemente» y mantiene la comparación poética del final con «como de los grandes abismos».
  spanish_consistency_notes:
  - Se usa «desierto» para מִדְבָּר por ser la equivalencia bíblica más clara y natural en español.
  - Se evita «SEÑOR» o sustituciones devocionales, porque el versículo no contiene el Tetragrámaton ni una cita directa del nombre divino.
  - «Abundantemente» se coloca antes de la comparación final para reflejar el matiz intensivo de רַבָּה sin romper el ritmo del verso.
