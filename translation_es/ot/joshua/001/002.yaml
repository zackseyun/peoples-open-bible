translation:
  language: es
  text: Moisés, mi siervo, ha muerto. Así que ahora, levántate, cruza este Jordán —tú y todo este pueblo— a la tierra que yo les estoy dando, a los hijos[a] de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los israelitas' o 'los hijos de Israel'. El hebreo dice 'los hijos de Israel'.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi esclavo
  alternatives_spanish:
  - mi siervo
  lexicon: HALOT
  rationale: El hebreo עֶבֶד puede significar 'siervo' o 'esclavo'. En este contexto, el texto fuente describe a Moisés en relación de pertenencia y servicio a Yahvé sin una atenuación honorífica obligatoria; por transparencia léxica, 'esclavo' conserva mejor la fuerza semántica que 'siervo', aunque 'siervo' sigue siendo una alternativa natural y reverente.
- source_word: מֵת
  english_pob_choice: is dead
  chosen_spanish: ha muerto
  alternatives_spanish:
  - está muerto
  lexicon: HALOT
  rationale: El perfecto hebreo presenta la muerte de Moisés como un hecho consumado relevante para la comisión. En español, 'ha muerto' comunica ese hecho con naturalidad y mantiene el énfasis del original.
- source_word: וְעַתָּה
  english_pob_choice: So now
  chosen_spanish: Así que ahora
  alternatives_spanish:
  - Y ahora
  - Ahora
  lexicon: HALOT
  rationale: La conjunción y el adverbio marcan transición e inferencia desde la muerte de Moisés hacia la orden dada a Josué. 'Así que ahora' conserva tanto la continuidad como la fuerza consecutiva que el inglés POB expresó con 'So now'.
- source_word: ק֨וּם
  english_pob_choice: arise
  chosen_spanish: levántate
  alternatives_spanish:
  - alza el ánimo
  - ponte en pie
  lexicon: HALOT
  rationale: El imperativo exige acción decisiva. En español, 'levántate' transmite el mandato con claridad y dignidad; aunque 'arise' podría corresponder a 'levántate' o 'alza(te)', esta forma es la más idiomática sin perder solemnidad.
- source_word: עֲבֹר
  english_pob_choice: cross
  chosen_spanish: cruza
  alternatives_spanish:
  - pasa
  - atraviesa
  lexicon: HALOT
  rationale: Con el Jordán como objeto directo, el verbo significa cruzar al otro lado. 'Cruza' es conciso, natural y fiel al movimiento indicado por el hebreo.
- source_word: הַיַּרְדֵּן הַזֶּה
  english_pob_choice: this Jordan
  chosen_spanish: este Jordán
  alternatives_spanish:
  - este río Jordán
  - el Jordán
  lexicon: HALOT
  rationale: El demostrativo debe conservarse. 'Este Jordán' refleja el hebreo sin añadir 'río', que no aparece en el texto base.
- source_word: אַתָּה וְכָל הָעָם הַזֶּה
  english_pob_choice: you and all this people
  chosen_spanish: tú y todo este pueblo
  alternatives_spanish:
  - tú y toda esta gente
  - tú y todo el pueblo
  lexicon: HALOT
  rationale: El sustantivo colectivo singular עם con demostrativo se rinde mejor con 'este pueblo', preservando el matiz colectivo y la deixis del original.
- source_word: אֶל הָאָרֶץ
  english_pob_choice: into the land
  chosen_spanish: hacia la tierra
  alternatives_spanish:
  - a la tierra
  - en la tierra
  lexicon: HALOT
  rationale: Aunque el inglés opta por 'into', el hebreo con אֶל marca movimiento hacia un destino. En español, 'hacia la tierra' expresa dirección sin forzar una preposición de ingreso que no siempre suena natural; se mantiene el impulso del mandato.
- source_word: אֲשֶׁר אָנֹכִי נֹתֵן לָהֶם
  english_pob_choice: that I am giving to them
  chosen_spanish: que yo les doy
  alternatives_spanish:
  - que yo les estoy dando
  - que yo les estoy dando ahora
  lexicon: HALOT
  rationale: El participio hebreo puede expresar una acción en curso o inminente. En este contexto, 'les doy' es un presente natural en español y mantiene la idea de donación divina vigente sin sobrecargar la frase.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: to the sons of Israel
  chosen_spanish: a los hijos de Israel
  alternatives_spanish:
  - a los israelitas
  - a los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la referencia formal del hebreo בנים/sons con 'hijos de Israel'. En español, esta forma es más idiomática y transparente que 'hijos' aislado, y mantiene la decisión del POB inglés de no neutralizar el rasgo masculino del sintagma.
theological_decisions:
- issue: Traducción del término עֶבֶד aplicado a Moisés
  english_pob_reading: my servant
  chosen_spanish_reading: mi esclavo
  alternative_spanish_readings:
  - mi siervo
  rationale: El texto hebreo usa el término de pertenencia עבד. Aunque en tradición bíblica Moisés es un 'siervo' de Dios, el registro fuente no obliga a suavizar la relación con una palabra más honorífica. Traducir 'esclavo' conserva la tensión léxica documentada por el POB y su principio de transparencia, aun cuando 'siervo' sigue siendo posible por contexto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Expresión de la colectividad masculina de Israel
  english_pob_reading: to the sons of Israel
  chosen_spanish_reading: a los hijos de Israel
  alternative_spanish_readings:
  - a los israelitas
  - a los hijos de Israel
  rationale: El hebreo es explícitamente masculino plural. Mantener 'hijos de Israel' preserva la forma de la fuente y la visibilidad del rasgo gramatical, sin negar que el referente sea el pueblo del pacto en su conjunto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el audit trail inglés: se conservan el tono de comisión divina, el demostrativo de ''este Jordán'' y la referencia masculina ''hijos de Israel''. La única tensión mayor es עַבְדִּי, donde el inglés optó por ''my servant'' por razón contextual; aquí se ha mantenido la transparencia semántica con ''mi esclavo'' y se documenta la alternativa tradicional ''mi siervo''.'
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como forma editorial general en el proyecto, pero en este versículo el nombre divino no aparece explícitamente en el hebreo recibido, así que no se introduce.
  - '''Este Jordán'' mantiene el demostrativo del hebreo sin añadir explicaciones interpretativas.'
  - '''Hijos de Israel'' sigue la decisión de género-precisión del POB y evita neutralizar el masculino plural del original.'
