    issue: «cuenta» para ἀριθμός es menos fiel y menos idiomático aquí que «número»
    rationale: Aunque «cuenta» puede denotar cómputo, en una formulación sapiencial sobre la duración de la vida «el número de los días» corresponde más directamente al griego y suena más natural en español bíblico formal.
  - severity: low
    issue: La construcción «es, a lo sumo, de cien años» suena algo pesada
    rationale: La preposición «de» después de «es» no es incorrecta, pero hace la frase menos fluida. Mantenerla puede tolerarse, aunque la oración pide una sintaxis más natural. Dado que la revisión debe ser pequeña, se conserva la estructura básica con mejora léxica principal.
  - severity: low
