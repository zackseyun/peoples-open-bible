id: PHP.1.11
reference: Philippians 1:11
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: πεπληρωμένοι ⸂καρπὸν δικαιοσύνης τὸν⸃ διὰ Ἰησοῦ Χριστοῦ εἰς δόξαν καὶ ἔπαινον θεοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/001/011.yaml
  text: filled with the fruit of righteousness that comes through Jesus Messiah, to the glory and praise of God.
translation:
  language: ko
  text: 예수 메시아를 통하여[a] 오는 의의 열매로 가득 채워져, 하나님의 영광과 찬송에 이르기를 구합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 「예수 그리스도」. Χριστός를 칭호로 옮기는 본 번역의 원칙에 따라 「메시아」로 번역한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: πεπληρωμένοι
  english_pob_choice: filled
  chosen_korean: 가득 채워져
  alternatives_korean:
  - 충만하여
  - 가득 차서
  lexicon: BDAG
  rationale: 완료 수동 분사로, 결과적 상태를 표현한다. 「가득 채워져」가 수동성과 결과 상태를 자연스럽게 담는다.
- source_word: καρπὸν
  english_pob_choice: fruit
  chosen_korean: 열매
  alternatives_korean:
  - 결실
  lexicon: BDAG
  rationale: 바울의 윤리·영적 결실을 가리키는 정형 비유 「열매」를 따른다.
- source_word: δικαιοσύνης
  english_pob_choice: righteousness
  chosen_korean: 의
  alternatives_korean:
  - 정의
  lexicon: BDAG
  rationale: 본 번역의 기본 등가어 「의」를 따른다. 바울의 구원·윤리 문맥에서 「의」가 자연스럽다.
- source_word: διὰ Ἰησοῦ Χριστοῦ
  english_pob_choice: that comes through Jesus Messiah
  chosen_korean: 예수 메시아를 통하여 오는
  alternatives_korean:
  - 예수 메시아로 말미암는
  - 예수 그리스도를 통한
  lexicon: BDAG
  rationale: διά + 속격은 수단·매개를 가리킨다. 「~를 통하여 오는」이 매개와 흐름을 자연스럽게 담는다.
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_korean: 메시아
  alternatives_korean:
  - 그리스도
  lexicon: BDAG
  rationale: 본 번역의 일관된 원칙에 따라 칭호 Χριστός를 「메시아」로 옮긴다.
- source_word: εἰς δόξαν καὶ ἔπαινον θεοῦ
  english_pob_choice: to the glory and praise of God
  chosen_korean: 하나님의 영광과 찬송에 이르기를
  alternatives_korean:
  - 하나님의 영광과 찬송을 위하여
  - 하나님께 영광과 찬송이 되도록
  lexicon: BDAG
  rationale: εἰς는 목표·결과를 가리킨다. 「~에 이르기를」이 목적론적 지향을 자연스럽게 담는다. 9절 「~기를 구합니다」와의 호응을 위해 「구합니다」를 살린다.
