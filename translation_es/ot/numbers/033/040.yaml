translation:
  language: es
  text: Y el cananeo, rey de Arad, que habitaba en el Neguev[a] en la tierra de Canaán, oyó cuando vinieron los hijos de Israel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Neguev» también puede traducirse «el sur» o «la región del sur».
    reason: lexical_alternative
  - marker: b
    text: O «los israelitas». El hebreo dice «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - se enteró
  lexicon: HALOT
  rationale: El wayyiqtol de שׁמע expresa recepción auditiva directa. En español, «oyó» reproduce con claridad ese valor sin añadir la idea de noticias explícitas que el hebreo no dice.
- source_word: הַכְּנַעֲנִי
  english_pob_choice: the Canaanite
  chosen_spanish: el cananeo
  alternatives_spanish:
  - un cananeo
  - el canaanita
  lexicon: HALOT
  rationale: El artículo está presente en hebreo; por eso se conserva con «el cananeo». «Canaanita» sería comprensible, pero «cananeo» mantiene mejor la forma usual del etnónimo en español bíblico y evita una calca más pesada.
- source_word: מֶלֶךְ עֲרָד
  english_pob_choice: the king of Arad
  chosen_spanish: rey de Arad
  alternatives_spanish:
  - el rey de Arad
  - monarca de Arad
  lexicon: HALOT
  rationale: La cadena constructa nombra al gobernante y su ciudad. En español, dentro de la frase nominal ya identificada por «el cananeo», la omisión del artículo ante «rey» mantiene naturalidad sin perder el referente.
- source_word: וְהוּא יֹשֵׁב
  english_pob_choice: who lived
  chosen_spanish: que habitaba
  alternatives_spanish:
  - que vivía
  - y habitaba
  lexicon: HALOT
  rationale: El pronombre más el participio funciona descriptivamente, no como acción principal. «Que habitaba» conserva ese trasfondo y evita la literalidad rígida de «y él estaba viviendo».
- source_word: בַּנֶּגֶב
  english_pob_choice: in the Negev
  chosen_spanish: en el Neguev
  alternatives_spanish:
  - en el Négueb
  - en el sur
  lexicon: HALOT
  rationale: Se preserva el topónimo/georreferencia reconocible. «Neguev» es una transliteración clara y extendida; se evita reemplazarlo por «el sur» para no perder la designación territorial concreta.
- source_word: בְּאֶרֶץ כְּנָעַן
  english_pob_choice: in the land of Canaan
  chosen_spanish: en la tierra de Canaán
  alternatives_spanish:
  - en Canaán
  - en el país de Canaán
  lexicon: HALOT
  rationale: El hebreo dice literalmente «en tierra de Canaán». «Tierra» conserva el sustantivo geográfico y el tono bíblico sin forzar un equivalente jurídico o político ajeno al texto.
- source_word: בְּבֹא
  english_pob_choice: when ... came
  chosen_spanish: cuando vinieron
  alternatives_spanish:
  - al venir
  - cuando llegó
  lexicon: HALOT
  rationale: La preposición con infinitivo marca tiempo. En español, «cuando vinieron» comunica con naturalidad el momento en que se produjo la acción sin introducir un objeto que el hebreo no explicita.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Jacob
  - los israelitas
  lexicon: HALOT
  rationale: Se mantiene la expresión literal «hijos de Israel», que es transparente y fiel al hebreo. «Israelitas» suavizaría el registro pero perdería la forma precisa de בני ישראל.
translation_notes:
  revision_awareness: La redacción sigue de cerca el sentido revisado del POB inglés, especialmente la cláusula relativa descriptiva («who lived») y la temporalidad de la llegada («when ... came»), evitando añadir información no presente en el hebreo.
  spanish_consistency_notes:
  - Se usó «cananeo» para el etnónimo con artículo definido, en paralelo con la identificación del gobernante.
  - Se conservó «Neguev» como designación geográfica concreta, no como mera dirección cardinal.
  - Se mantuvo «hijos de Israel» por transparencia formal con בְּנֵי יִשְׂרָאֵל.
  - No se añadieron notas al pie porque el español no creó una ambigüedad nueva ni fue necesario reflejar una alternativa textual adicional.
