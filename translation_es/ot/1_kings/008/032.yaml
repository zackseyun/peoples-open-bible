translation:
  language: es
  text: entonces oye en el cielo[a] y actúa, y juzga a tus siervos, condenando al malvado al hacer recaer su conducta sobre su propia cabeza[b], y justificando al justo[c] al darle conforme a su justicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'desde el cielo'. El hebreo dice literalmente 'oye el cielo/los cielos', una fórmula de oración que en español puede expresarse como que Dios oye en el cielo o desde el cielo.
    reason: lexical_alternative
  - marker: b
    text: '''Hacer recaer su conducta sobre su propia cabeza'' es un modismo hebreo que significa pagarle a una persona conforme a su conducta.'
    reason: cultural_note
  - marker: c
    text: O 'declarando inocente al justo' / 'vindicando al justo'.
    reason: alternative_reading
lexical_decisions:
- source_word: תִּשְׁמַע הַשָּׁמַיִם
  english_pob_choice: hear in heaven
  chosen_spanish: oye en los cielos
  alternatives_spanish:
  - oye desde los cielos
  - escucha en los cielos
  lexicon: HALOT
  rationale: El hebreo usa una fórmula de oración en la que el singular/plural de "cielos" funciona locativamente. "Oye en los cielos" conserva la imagen y el paralelismo con el contexto de petición judicial; "desde los cielos" sería una alternativa explicativa pero menos pegada a la construcción hebrea.
- source_word: וְעָשִׂיתָ
  english_pob_choice: and act
  chosen_spanish: y actúa
  alternatives_spanish:
  - y haz
  - y obra
  lexicon: HALOT
  rationale: עָשָׂה es amplio, pero aquí la secuencia de petición judicial pide una respuesta eficaz de Dios. "Actúa" comunica intervención concreta mejor que el genérico "haz", sin perder la amplitud del verbo.
- source_word: וְשָׁפַטְתָּ אֶת עֲבָדֶיךָ
  english_pob_choice: and judge your servants
  chosen_spanish: y juzga a tus siervos
  alternatives_spanish:
  - y juzga a tus esclavos
  - y haz justicia a tus siervos
  lexicon: HALOT
  rationale: שׁפט mantiene el marco forense. "Siervos" conserva la referencia de pertenencia y relación de pacto en español bíblico, aunque el valor léxico básico sea "esclavos"; en este contexto la frase se refiere a los suplicantes del pacto, no a esclavitud literal.
- source_word: לְהַרְשִׁיעַ רָשָׁע
  english_pob_choice: condemning the wicked
  chosen_spanish: condenando al malvado
  alternatives_spanish:
  - declarando culpable al malvado
  - reprochando al malvado
  lexicon: HALOT
  rationale: 'El causativo de רשע es judicial: declarar culpable/condenar. "Condenando" preserva la lectura forense y es natural en español; "malvado" traduce bien el sustantivo רָשָׁע sin suavizarlo.'
- source_word: לָתֵת דַּרְכּוֹ בְּרֹאשׁוֹ
  english_pob_choice: by bringing his way upon his own head
  chosen_spanish: al hacer recaer su conducta sobre su propia cabeza
  alternatives_spanish:
  - al traer su camino sobre su propia cabeza
  - al devolverle su camino sobre su cabeza
  lexicon: HALOT
  rationale: Se conserva la metáfora retributiva de la cabeza, pero "conducta" aclara en español que דֶּרֶךְ aquí es modo de vida o proceder. Esto mantiene la imagen idiomática y hace inteligible el sentido de retribución proporcional.
- source_word: וּלְהַצְדִּיק צַדִּיק
  english_pob_choice: and justifying the righteous
  chosen_spanish: y justificando al justo
  alternatives_spanish:
  - y vindicando al justo
  - y declarando inocente al justo
  lexicon: HALOT
  rationale: הִצְדִּיק en contexto legal significa declarar justo/justificar. "Justificando" conserva la correspondencia con el verbo anterior y mantiene el contraste forense con "condenando".
- source_word: לָתֶת לוֹ כְּצִדְקָתוֹ
  english_pob_choice: by giving to him according to his righteousness
  chosen_spanish: al darle conforme a su justicia
  alternatives_spanish:
  - al darle según su rectitud
  - al recompensarlo conforme a su justicia
  lexicon: HALOT
  rationale: צִדְקָה puede expresar justicia/rectitud en sentido de conducta conforme al pacto. "Conforme a su justicia" preserva la relación de medida sin convertir explícitamente el verbo en "recompensar", que sería más interpretivo.
theological_decisions:
- issue: Sentido forense de los verbos judiciales
  english_pob_reading: 'Render the pair as legal/judicial: ''condemning'' and ''justifying.'''
  chosen_spanish_reading: 'Mantener el par como jurídico: ''condenando'' y ''justificando''.'
  alternative_spanish_readings:
  - '''castigando'' y ''vindicando'''
  - '''declarando culpable'' y ''declarando justo'''
  rationale: El contexto es una oración de dedicación con lenguaje de tribunal. Preservar la simetría forense evita diluir el contraste teológico entre el culpable y el justo y sigue de cerca la fuerza de los causativos hebreos.
  doctrine_reference: Mantener la tensión exegética; no suavizar el lenguaje jurídico del texto.
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo con el mismo orden lógico que el audit trail inglés: escuchar en los cielos, actuar, juzgar, condenar al malvado por su propio proceder y justificar al justo por su justicia. Se evitó trasladar mecánicamente ''hear the heavens'' y se optó por una fórmula española natural que conserva la localización celestial. También se mantuvo el contraste forense sin resolverlo hacia una mera idea de castigo general.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' no aplica en este versículo.
  - '''Siervos'' se conserva por coherencia con el registro bíblico del pacto, aunque el valor léxico básico de עֲבָדִים puede ser ''esclavos''.'
  - '''Justicia'' traduce צְדָקָה en sentido de rectitud/justicia conductual, manteniendo la ambigüedad productiva del hebreo.'
