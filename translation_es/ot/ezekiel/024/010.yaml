translation:
  language: es
  text: Amontona la leña[a], enciende el fuego, cuece bien la carne[b], y hierve el caldo[c]; y que los huesos queden chamuscados[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «haz un montón de leña».
    reason: lexical_alternative
  - marker: b
    text: O «cuece completamente la carne». El hebreo dice literalmente «la carne».
    reason: lexical_alternative
  - marker: c
    text: O «prepara la mezcla» o «hierve el guiso».
    reason: lexical_alternative
  - marker: d
    text: O «se quemen» o «se carbonicen».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַרְבֵּה
  english_pob_choice: Pile up
  chosen_spanish: Apresta mucha leña
  alternatives_spanish:
  - Amontona la leña
  - Haz montón de leña
  lexicon: HALOT
  rationale: El imperativo causativo expresa aumentar la cantidad de madera disponible. En español, 'aprestar' o 'amontonar' comunica mejor la acción de preparar y reunir leña que una traducción literal rígida.
- source_word: הָעֵצִים
  english_pob_choice: the wood
  chosen_spanish: la leña
  alternatives_spanish:
  - la madera
  - los trozos de madera
  - los leños
  lexicon: HALOT
  rationale: En este contexto de fuego y cocción, 'leña' es el equivalente natural y conserva la imagen de material combustible más que la idea general de 'madera'.
- source_word: הַדְלֵק
  english_pob_choice: kindle
  chosen_spanish: enciende
  alternatives_spanish:
  - prende
  - haz arder
  - enciende el fuego
  lexicon: HALOT
  rationale: El causativo de דלק pide la acción de prender fuego. 'Enciende' es claro, natural y fiel al mandato.
- source_word: הָאֵשׁ
  english_pob_choice: the fire
  chosen_spanish: el fuego
  alternatives_spanish:
  - un fuego
  lexicon: HALOT
  rationale: Se conserva el artículo definido del hebreo porque la escena señala un fuego concreto dentro de la metáfora del caldero.
- source_word: הָתֵם
  english_pob_choice: cook ... thoroughly
  chosen_spanish: cuece bien
  alternatives_spanish:
  - cuece completamente
  - termina de cocer
  lexicon: HALOT
  rationale: El matiz es completar la cocción. 'Cuece bien' expresa naturalmente la idea de cocinar por completo sin sonar demasiado técnico.
- source_word: הַבָּשָׂר
  english_pob_choice: the flesh
  chosen_spanish: la carne
  alternatives_spanish:
  - la carne humana
  - la carne / la víscera
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'carne/flesh', en español 'carne' transmite la imagen culinaria y el tono crudo del símbolo sin perder fidelidad.
- source_word: וְהַרְקַח
  english_pob_choice: and boil
  chosen_spanish: y hierve
  alternatives_spanish:
  - y mezcla
  - y cocina
  lexicon: HALOT
  rationale: En este contexto con el sustantivo siguiente, la acción es la de hervir el contenido del caldero. 'Hierve' comunica la operación de forma directa.
- source_word: הַמֶּרְקָחָה
  english_pob_choice: the broth
  chosen_spanish: el caldo
  alternatives_spanish:
  - la mezcla
  - el guiso
  lexicon: HALOT
  rationale: El sustantivo apunta a una mezcla compuesta. En español, 'caldo' es la forma más natural para el líquido resultante en un caldero, sin exceder el sentido del hebreo.
- source_word: וְהָעֲצָמוֹת
  english_pob_choice: and the bones
  chosen_spanish: y los huesos
  alternatives_spanish:
  - y las osamentas
  lexicon: HALOT
  rationale: Traducción directa y transparente del sustantivo plural; conserva el cambio de foco hacia lo que queda en la olla.
- source_word: יֵחָרוּ
  english_pob_choice: let the bones be charred
  chosen_spanish: se quemen
  alternatives_spanish:
  - se carbonicen
  - se chamusquen
  - se abrasen
  lexicon: HALOT
  rationale: El nifal de חרר expresa quedar quemado o tostado por fuerte calor. 'Se quemen' es natural en español; no se fuerza 'charred' con un tecnicismo que podría sonar duro sin aportar claridad adicional.
translation_notes:
  revision_awareness: 'El texto inglés POB se mantuvo sin cambios en la última revisión (latest_revision_pass: unchanged). La versión española sigue la misma lectura óptima-equivalente, preservando el imperativo encadenado y las alternativas léxicas principales del aparato auditado.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' solo cuando corresponda a esta muestra; en este versículo no aparece el nombre divino.
  - Se prefirió 'leña' por fluidez contextual, aunque el hebreo pluraliza 'maderas/leños'.
  - '''Carne'' conserva el valor literal de בשר y evita suavizar el símbolo profético.'
  - '''Caldo'' funciona como equivalente idiomático de la mezcla líquida del caldero sin introducir una interpretación más fuerte que el hebreo.'
