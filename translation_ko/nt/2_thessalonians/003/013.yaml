  lexicon: BDAG
  rationale: 성별 정확성 원칙.
- source_word: μὴ ἐγκακήσητε
  english_pob_choice: do not grow weary
  chosen_korean: 낙심하지 마십시오
  alternatives_korean:
  - 지치지 마십시오
