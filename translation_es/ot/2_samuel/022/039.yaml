translation:
  language: es
  text: Los consumí y los quebranté[a]; no se levantaron; cayeron debajo de mis pies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los aplasté».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֲכַלֵּם
  english_pob_choice: I consumed them
  chosen_spanish: Los consumí
  alternatives_spanish:
  - Los destruí
  - Los acabé
  lexicon: HALOT
  rationale: El hebreo אכל en contexto bélico conserva la imagen de 'consumir/devorar' con sentido de destrucción. 'Consumí' mantiene la metáfora fuerte sin sustituirla por un verbo más abstracto como 'derroté'.
- source_word: וָאֶמְחָצֵם
  english_pob_choice: shattered them
  chosen_spanish: los quebranté
  alternatives_spanish:
  - los trituré
  - los aplasté
  - los machaqué
  lexicon: HALOT
  rationale: מחץ expresa golpear con fuerza, aplastar o destruir. 'Quebranté' comunica el golpe decisivo y funciona bien en registro poético en español, sin introducir una imagen demasiado coloquial.
- source_word: וְלֹא יְקוּמוּן
  english_pob_choice: and they did not rise
  chosen_spanish: no se levantaron
  alternatives_spanish:
  - no volvieron a levantarse
  - no pudieron levantarse
  lexicon: HALOT
  rationale: El hebreo dice simplemente que no se levantaron; no añade modalidad de incapacidad. 'No se levantaron' sigue de cerca el resultado expresado por el texto.
- source_word: וַיִּפְּל֖וּ
  english_pob_choice: they fell
  chosen_spanish: cayeron
  alternatives_spanish:
  - se desplomaron
  lexicon: HALOT
  rationale: נפל se traduce de forma directa por 'caer'. En español, 'cayeron' conserva la brevedad y el movimiento poético del verso.
- source_word: תַּחַת רַגְלָי
  english_pob_choice: under my feet
  chosen_spanish: debajo de mis pies
  alternatives_spanish:
  - bajo mis pies
  - a mis pies
  lexicon: HALOT
  rationale: La expresión es una imagen de sometimiento y derrota. 'Debajo de mis pies' refleja bien la preposición espacial y mantiene el paralelismo poético; 'bajo mis pies' sería igualmente posible, pero 'debajo' resalta más la colocación inferior.
theological_decisions:
- issue: Imágenes de violencia y sometimiento en el cántico de victoria
  english_pob_reading: Retain the first-person language of total defeat without softening it
  chosen_spanish_reading: Mantener el lenguaje en primera persona de destrucción y sometimiento sin atenuarlo
  alternative_spanish_readings:
  - Los vencí completamente
  - Los derroté sin remedio
  rationale: El hebreo usa verbos duros y concretos de destrucción. La versión española conserva esa fuerza poética sin parafrasear hacia un lenguaje más general o suavizado.
  doctrine_reference: 'Translation philosophy: original-language primacy; no paraphrase beyond what the source warrants.'
translation_notes:
  revision_awareness: 'El texto inglés auditado no recibió cambios en la última revisión; se conservan sus decisiones léxicas principales: אכל como ''consumir'' en sentido bélico, מחץ como ''shatter'', y la secuencia breve de derrota total sin añadir modalidad no explícita.'
  spanish_consistency_notes:
  - Se mantuvo el registro poético y directo del verso.
  - 'Se conservaron las dos imágenes de derrota: destrucción violenta y caída bajo los pies.'
  - Se usó puntuación que refleja la estructura compacta del hebreo y del inglés auditado.
