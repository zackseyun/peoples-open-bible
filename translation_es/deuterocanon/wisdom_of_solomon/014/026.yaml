translation:
  language: es
  text: olvido de los favores[a], contaminación de las almas, perversión del nacimiento[b], desorden en los matrimonios, adulterio y desenfreno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «olvido de la gracia». El griego χάρις puede significar favor, gracia o gratitud según el contexto.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «cambio/intercambio de nacimiento/generación»; la frase probablemente alude a una corrupción o inversión del orden natural/procreativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: χάριτος
  english_pob_choice: of favors
  chosen_spanish: de los favores
  alternatives_spanish:
  - de la gracia
  - del favor
  lexicon: LSJ
  rationale: χάρις abarca favor, gracia y gratitud. En este catálogo de vicios, «de los favores» conserva el matiz de beneficios recibidos sin cargar el término con una lectura doctrinal posterior de «gracia».
- source_word: ἀμνησία
  english_pob_choice: forgetfulness
  chosen_spanish: olvido
  alternatives_spanish:
  - olvido voluntario
  - ingratitud
  lexicon: LSJ
  rationale: El sustantivo expresa falta de memoria u olvido. «Olvido» es breve y natural en español; «ingratitud» sería una inferencia interpretativa más fuerte que el griego no obliga.
- source_word: ψυχῶν
  english_pob_choice: of souls
  chosen_spanish: de las almas
  alternatives_spanish:
  - de las vidas
  - de las personas
  lexicon: LSJ
  rationale: ψυχή puede significar alma, vida o persona. Aquí «almas» preserva el registro moral-espiritual de Sabiduría y la fuerza de la corrupción interior.
- source_word: μιασμός
  english_pob_choice: defilement
  chosen_spanish: profanación
  alternatives_spanish:
  - contaminación
  - impureza
  lexicon: LSJ
  rationale: μιασμός implica contaminación moral o ritual. «Profanación» comunica bien la gravedad de la mancha y su dimensión cultual sin sonar demasiado técnica.
- source_word: γενέσεως
  english_pob_choice: of birth
  chosen_spanish: del nacimiento
  alternatives_spanish:
  - de la generación
  - del origen
  - de la descendencia
  lexicon: LSJ
  rationale: γένεσις puede referirse a nacimiento, origen o generación. «Del nacimiento» es la forma más directa y comprensible en español dentro de una lista de desórdenes sociales y sexuales.
- source_word: ἐναλλαγή
  english_pob_choice: perversion
  chosen_spanish: perversión
  alternatives_spanish:
  - cambio
  - intercambio
  - alteración
  lexicon: LSJ
  rationale: Aunque literalmente puede denotar cambio o intercambio, en este contexto apunta a una inversión corrupta del orden natural/procreativo. «Perversión» recoge esa fuerza contextual mejor que un término neutral como «cambio».
- source_word: γάμων
  english_pob_choice: in marriages
  chosen_spanish: en los matrimonios
  alternatives_spanish:
  - de los matrimonios
  - en el matrimonio
  lexicon: LSJ
  rationale: El genitivo plural se refiere a matrimonios o vínculos conyugales. «En los matrimonios» resulta idiomático y mantiene la institución social en vista.
- source_word: ἀταξία
  english_pob_choice: disorder
  chosen_spanish: desorden
  alternatives_spanish:
  - desordenamiento
  - confusión
  - licencia
  lexicon: LSJ
  rationale: ἀταξία significa falta de orden o de arreglo debido. «Desorden» es el equivalente natural en español y se ajusta al tono de la lista de vicios.
- source_word: μοιχεία
  english_pob_choice: adultery
  chosen_spanish: adulterio
  alternatives_spanish:
  - infidelidad conyugal
  lexicon: LSJ
  rationale: Es el equivalente preciso y estándar para la violación sexual del vínculo matrimonial.
- source_word: ἀσέλγεια
  english_pob_choice: debauchery
  chosen_spanish: desenfreno
  alternatives_spanish:
  - sensualidad
  - licenciosidad
  - lascivia
  lexicon: LSJ
  rationale: ἀσέλγεια describe conducta sensual desvergonzada y sin freno. «Desenfreno» mantiene el peso moral y la idea de exceso de forma clara en español.
theological_decisions:
- issue: Cómo renderizar χάριτος sin imponer la carga doctrinal de «gracia»
  english_pob_reading: forgetfulness of favors
  chosen_spanish_reading: olvido de los favores
  alternative_spanish_readings:
  - olvido de la gracia
  rationale: El contexto es una lista de males morales derivados de la idolatría, no una exposición doctrinal sobre la gracia salvadora. «Favores» sigue el campo semántico de χάρις y evita importar asociaciones teológicas posteriores innecesarias.
  doctrine_reference: Translation philosophy §1, primacía de la lengua original sobre la tradición de traducción
- issue: Cómo conservar ψυχῶν sin volverlo antropológicamente plano
  english_pob_reading: defilement of souls
  chosen_spanish_reading: profanación de las almas
  alternative_spanish_readings:
  - profanación de las personas
  - profanación de las vidas
  rationale: Sabiduría usa un lenguaje moral-espiritual denso. «Almas» conserva ese registro y la gravedad de la corrupción interior; «personas» o «vidas» suavizarían indebidamente el efecto.
  doctrine_reference: Translation philosophy §3, preservar la tensión teológica en vez de resolverla
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail, que ajustó la comprensión de χάριτος para reflejar mejor un sentido genérico/plural de «favores». Por eso se prefirió «los favores» en español. El resto de la línea coincide sustancialmente con la evaluación adjudicada de alta concordancia.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» no aplicable aquí, ya que el versículo no contiene el nombre divino.
  - Se preservó el tono de lista nominal sin añadir verbos ni explicaciones fuera del alcance del griego.
  - «Almas» conserva la densidad moral del texto y evita una reducción a términos meramente sociológicos.
  - «Desenfreno» traduce el carácter vergonzoso y desmedido de ἀσέλγεια sin atenuarlo.
