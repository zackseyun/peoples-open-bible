review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: la súplica de Ana de no ser tenida por una mujer moralmente despreciable, seguida de la explicación causal de que ha hablado desde la abundancia de su queja y aflicción hasta ahora. Conserva adecuadamente el valor idiomático de אַל תִּתֵּן ... לִפְנֵי y de בַּת בְּלִיָּעַל.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero requiere una reparación menor de ortografía y naturalidad: «vexación» debe normalizarse a «vejación» o, mejor en este contexto semántico, a «aflicción». En español actual, «vejación» suele sugerir maltrato/humillación infligida por otros, por lo que no representa bien la angustia interior del contexto; «aflicción» suena natural y fiel. También conviene limpiar la puntuación de la nota b.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Tu sierva» es una buena decisión contextual para אֲמָתְךָ. «Mujer vil» funciona para בַּת בְּלִיָּעַל, y la nota literal preserva la alternativa. La única desalineación real es el uso de «vexación», que no es forma estándar en español; se recomienda «aflicción» como equivalente funcional al inglés auditado «vexation».
  issues:
  - severity: medium
    issue: Uso de «vexación» en el texto principal y en la nota.
    rationale: «Vexación» no es forma estándar en español contemporáneo; la forma normativa es «vejación», pero esa palabra desplaza el sentido hacia humillación o maltrato. El hebreo כַּעַס aquí apunta a angustia o aflicción interior. «Aflicción» preserva mejor el sentido y mejora la legibilidad.
  - severity: low
    issue: Formato poco natural de la nota b.
    rationale: 'La nota empieza con comilla y dos puntos de forma torpe: ''''O: «mi gran queja y vexación».'''' Conviene normalizarla a español editorial claro y ajustar también el término léxico revisado.'
  revised_spanish_text: No consideres a tu sierva como una mujer vil[a], porque por la abundancia de mi queja[b] y de mi aflicción he hablado hasta ahora.
  revised_footnotes:
  - marker: a
    text: Hebreo literalmente, «hija de Belial», un modismo para una mujer moralmente despreciable o de mala reputación.
    reason: lexical_alternative
  - marker: b
    text: 'O: «por mi gran queja y aflicción».'
    reason: lexical_alternative
  revision_rationale: Se conserva la estructura y las decisiones principales del borrador, pero se sustituye «vexación» por «aflicción» para reflejar con mayor fidelidad y naturalidad en español la angustia interior del contexto. También se normaliza la redacción de la nota b.
