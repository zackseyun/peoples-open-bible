review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el griego y el audit trail inglés en la secuencia de acciones y en casi todas las correspondencias léxicas: altar, saco/cilicio, clamor corporativo e intenso, niños pequeños, mujeres como botín, ciudades de la herencia, cosas santas, profanación/oprobio y gozo hostil de las naciones. Sin embargo, hay dos puntos mejorables para fidelidad y naturalidad: «para que no entregara» suena algo menos directo que «que no entregara» tras «clamaron», y «para saqueo» con «sus pequeños hijos» resulta menos natural en español que «al saqueo» o «a ser saqueados».'
  spanish_quality_summary: 'El texto es claro y digno, pero tiene leves giros no ideales en español bíblico moderno: «unánimemente y con insistencia» es correcto aunque algo rígido; «sus pequeños hijos» suena menos natural que «sus pequeños» o «sus niños pequeños»; y sobre todo «para saqueo» tras un complemento personal resulta áspero. «Saco» es defendible, con nota a «cilicio», aunque «cubrieron el altar con saco» suena un poco materialmente literal. La revisión propuesta hace ajustes mínimos sin apartarse del rationale documentado.'
  glossary_alignment: No hay conflictos con la terminología de proyecto. No aparece Yahvé, Mesías/Cristo ni otros términos sensibles del glosario principal. «Las cosas santas» respeta la decisión de no reducir τὰ ἅγια a «santuario». «Herencia» mantiene bien κληρονομία. «Botín» conserva el lenguaje bélico de προνομή.
  issues:
  - severity: medium
    issue: Construcción «para que no entregara» después de «clamaron»
    rationale: El griego expresa el contenido de la súplica; en español, tras «clamaron al Dios de Israel», la subordinada con «que no entregara» suena más natural y directa que «para que no entregara», que puede oírse más final que de contenido.
  - severity: medium
    issue: «para saqueo» con referente humano
    rationale: Aunque refleja εἰς διαρπαγὴν, en español es más idiomático «al saqueo» o «a ser saqueados». Así se preserva el sentido de entrega a la rapiña sin dureza sintáctica innecesaria.
  - severity: low
    issue: «sus pequeños hijos» suena algo pesado
    rationale: Es fiel a νήπια, pero en español moderno bíblico resulta más fluido «sus pequeños» o «sus niños pequeños». La primera opción conserva amplitud y pathos sin sobreespecificar.
  revised_spanish_text: Y cubrieron el altar con saco[a], y clamaron al Dios de Israel unánimemente y con insistencia, que no entregara a sus pequeños al saqueo, ni a sus mujeres como botín, ni las ciudades de su herencia a la destrucción, ni las cosas santas a profanación y oprobio[b], motivo de gozo para las naciones.
  revised_footnotes:
