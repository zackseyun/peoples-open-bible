translation:
  language: es
  text: Porque él completará lo que está destinado para mí[a], y muchas cosas semejantes están con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi decreto», «mi estatuto» o «mi porción asignada». El hebreo puede denotar algo prescrito, fijo o asignado para Job.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduces la relación explicativa/causal del verso con lo anterior. En español, «Porque» conserva esa fuerza de explicación de manera natural y sobria.
- source_word: יַשְׁלִים
  english_pob_choice: will complete
  chosen_spanish: completará
  alternatives_spanish:
  - cumplirá
  - terminará
  lexicon: HALOT
  rationale: El hifil de שׁלם expresa llevar algo a su consumación. «Completará» conserva la idea de llevar hasta el fin lo prescrito o dispuesto.
- source_word: חֻקִּי
  english_pob_choice: what is appointed for me
  chosen_spanish: lo que está destinado para mí
  alternatives_spanish:
  - mi decreto
  - mi estatuto
  - mi porción asignada
  lexicon: HALOT
  rationale: En este contexto de Job, el sustantivo no debe reducirse a «estatuto» en sentido legal. «Lo que está destinado para mí» preserva la noción de algo fijado o asignado por Dios sin imponer una lectura demasiado técnica.
- source_word: וְכָהֵנָּה רַבּוֹת
  english_pob_choice: and many such things
  chosen_spanish: y muchas cosas así
  alternatives_spanish:
  - y cosas como estas
  - y muchas de estas cosas
  lexicon: HALOT
  rationale: La expresión apunta a asuntos semejantes o del mismo tipo. «Muchas cosas así» reproduce la amplitud de la referencia sin especificarla de más.
- source_word: עִמּוֹ
  english_pob_choice: are with him
  chosen_spanish: están con él
  alternatives_spanish:
  - permanecen con él
  - están en su poder
  lexicon: HALOT
  rationale: La preposición con sufijo se traduce de forma simple. En contexto, mantiene la idea amplia de que tales cosas están presentes con Dios en su consejo y disposición.
theological_decisions:
- issue: Cómo traducir חֻקִּי sin forzar un sentido legalista o una noción meramente abstracta
  english_pob_reading: what is appointed for me
  chosen_spanish_reading: lo que está destinado para mí
  alternative_spanish_readings:
  - mi decreto
  - mi estatuto
  - mi porción asignada
  rationale: El contexto inmediato trata de la determinación divina del camino y destino de Job. La opción elegida conserva esa soberanía sin convertir el término en un tecnicismo jurídico que el verso no exige.
  doctrine_reference: 'Translation philosophy: prioridad del idioma original y preservación de la tensión teológica sin resolverla en exceso.'
translation_notes:
  revision_awareness: Se siguió el paquete fuente provisto (WLC y el texto auditado en inglés). La redacción española refleja la decisión léxica clave de חֻקִּי como algo asignado o destinado, no como un simple término legal. No se registraron revisiones previas aplicadas en el historial más reciente.
  spanish_consistency_notes:
  - Se usó «Dios» implícito por el referente de «él» en el contexto, sin añadirlo al texto para no sobreespecificar.
  - Se mantuvo un estilo bíblico actual y digno, evitando arcaísmos innecesarios.
  - La nota [a] queda anclada en «destinado» para preservar las alternativas léxicas documentadas.
