translation:
  language: es
  text: Sus huesos están llenos de su vigor juvenil[a], pero este yacerá con él en el polvo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su juventud»; el término hebreo puede denotar la juventud misma o la fuerza asociada con ella.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַצְמוֹתָיו
  english_pob_choice: his bones
  chosen_spanish: sus huesos
  alternatives_spanish:
  - su osamenta
  - su armazón
  lexicon: HALOT
  rationale: עֶצֶם/עַצְמוֹת normalmente significa 'hueso(s)'. 'Sus huesos' conserva la imagen concreta del hebreo y sigue la decisión auditada del POB inglés.
- source_word: מָלְאוּ
  english_pob_choice: are full of
  chosen_spanish: están llenos de
  alternatives_spanish:
  - están repletos de
  - se llenan de
  lexicon: HALOT
  rationale: El qal perfecto/plural funciona aquí como descripción poética del estado de los huesos; en español, 'están llenos de' expresa de manera natural la plenitud resultante sin forzar una temporalidad pasada.
- source_word: עֲלוּמָיו
  english_pob_choice: his youthful vigor
  chosen_spanish: su vigor juvenil
  alternatives_spanish:
  - su juventud
  - su fuerza juvenil
  lexicon: HALOT
  rationale: El término puede referirse a la juventud misma o a la fuerza propia de la juventud. 'Vigor juvenil' preserva esa tensión semántica documentada por el POB inglés y evita reducirlo solo a edad cronológica.
- source_word: וְעִמּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  - a su lado
  lexicon: HALOT
  rationale: La preposición עִם con sufijo se rinde con la expresión natural 'con él'. En el contexto funerario/poético, comunica acompañamiento sin añadir interpretación extra.
- source_word: עַל־עָפָר
  english_pob_choice: in the dust
  chosen_spanish: en el polvo
  alternatives_spanish:
  - sobre el polvo
  - en el polvo de la tumba
  lexicon: HALOT
  rationale: Aunque עַל es literalmente 'sobre', el POB inglés ya optó por una equivalencia idiomática que expresa la imagen de sepultura y muerte. 'En el polvo' es la forma natural en español y mantiene la metáfora del polvo.
- source_word: תִּשְׁכָּב
  english_pob_choice: it will lie down
  chosen_spanish: se acostará
  alternatives_spanish:
  - yacerá
  - se tenderá
  lexicon: HALOT
  rationale: El verbo שׁכב conserva la imagen de acostarse/yacer. En español, 'se acostará' reproduce la personificación del vigor juvenil como algo que termina en el polvo junto con el hombre.
translation_notes:
  revision_awareness: Se siguió el auditable cambio del POB inglés de 'were' a 'are' para reflejar mejor el aspecto del hebreo. También se mantuvo el sujeto singular implícito ('eso') para שׁכב, como en el registro inglés, evitando convertirlo en un plural o reformularlo como sujeto explícito diferente.
  spanish_consistency_notes:
  - Se mantuvo 'polvo' para עָפָר, en coherencia con el imaginario bíblico de muerte y sepultura.
  - '''Vigor juvenil'' conserva la ambigüedad entre juventud cronológica y fuerza de la juventud, como exige el audit trail.'
  - Se evitó 'SEÑOR' o cualquier sustitución teológica no presente en el versículo; el texto no contiene un tetragrámaton ni título divino.
  - La puntuación reproduce una sola cláusula adversativa clara, apta para lectura pública.
