translation:
  language: es
  text: Los sabios quedan avergonzados; quedan consternados y son capturados[a]. Miren, han rechazado la palabra de Yahvé; así que, ¿qué sabiduría tienen?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tomados», «apresados» o «atrapados». El verbo hebreo puede indicar ser capturados o quedar atrapados.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֹבִישׁוּ
  english_pob_choice: are put to shame
  chosen_spanish: quedan avergonzados
  alternatives_spanish:
  - son puestos en vergüenza
  - han sido avergonzados
  - quedan en vergüenza
  lexicon: HALOT
  rationale: El hifil de בוש expresa una vergüenza causada públicamente, no solo un sentimiento interno. "Quedan avergonzados" conserva el matiz de deshonra visible y suena natural en español.
- source_word: חֲכָמִים
  english_pob_choice: the wise men
  chosen_spanish: los sabios
  alternatives_spanish:
  - los hombres sabios
  - los sabios varones
  - los sabios de Judá
  lexicon: HALOT
  rationale: El sustantivo plural masculino designa a la clase de sabios o consejeros. En español, "los sabios" mantiene la referencia sin forzar una expresión más pesada; el contexto ya delimita el grupo.
- source_word: חַתּוּ
  english_pob_choice: are dismayed
  chosen_spanish: se espantan
  alternatives_spanish:
  - están consternados
  - quedan abatidos
  - se aterran
  lexicon: HALOT
  rationale: El verbo comunica desaliento, quebranto o consternación. "Se espantan" transmite bien la reacción de confusión y derrumbe emocional en un español bíblico contemporáneo.
- source_word: וַיִּלָּכֵדוּ
  english_pob_choice: and captured
  chosen_spanish: son capturados
  alternatives_spanish:
  - y son tomados
  - y son apresados
  - y quedan atrapados
  lexicon: HALOT
  rationale: לכד indica ser tomado, capturado o apresado. "Son capturados" conserva la fuerza de la acción y deja abierta la posible idea de ser atrapados por juicio; por eso se añadió la nota alternativa en el versículo.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Miren esto
  - Vean
  - He aquí
  lexicon: HALOT
  rationale: Como marcador discursivo, introduce la explicación que sigue. "Miren" es una llamada clara y natural en español moderno, equivalente a "Look".
- source_word: בִדְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la palabra del SEÑOR
  lexicon: HALOT
  rationale: דבר en este contexto profético es "palabra" revelada de Yahvé. Se mantiene el nombre divino como "Yahvé" por la norma del proyecto, no como "SEÑOR", para conservar la transparencia del texto fuente.
- source_word: מָאָסוּ
  english_pob_choice: have rejected
  chosen_spanish: han rechazado
  alternatives_spanish:
  - han desechado
  - han despreciado
  - han repudiado
  lexicon: HALOT
  rationale: מאס expresa rechazo o repudio culpable, no solo desagrado emocional. "Han rechazado" es preciso y claro en español, sin suavizar la acusación profética.
- source_word: וְחָכְמַת מֶה לָהֶם
  english_pob_choice: so what wisdom do they have?
  chosen_spanish: ¿qué sabiduría tienen, pues?
  alternatives_spanish:
  - ¿qué sabiduría les queda?
  - ¿y qué sabiduría tienen?
  - ¿qué sabiduría hay en ellos?
  lexicon: HALOT
  rationale: La pregunta retórica niega que posean verdadera sabiduría después de rechazar la palabra de Yahvé. "Pues" recoge el valor inferencial de וְ sin sonar mecánico, y el orden español conserva la fuerza de reproche.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme al estándar del proyecto en español, se traduce como "Yahvé" para mantener la transparencia del nombre del pacto y evitar la convención de ocultarlo tras "SEÑOR".
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La revisión más reciente del expediente inglés no introdujo cambios: el texto fue confirmado como estable (agreement alto, sin objeciones). Esta versión española sigue el mismo sentido auditado, con adaptación idiomática al español y preservando las tensiones léxicas relevantes.'
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" de forma consistente con la norma del proyecto para יְהוָה.
  - Se eligió un registro sobrio y bíblico, pero en español natural, evitando calcos como "he aquí" salvo cuando el discurso lo requiera.
  - '"Sabios" se deja en plural masculino como en el hebreo, sin convertirlo en término genérico ambiguo.'
  - 'La secuencia verbal conserva el paralelismo: vergüenza, consternación, captura, rechazo y la conclusión retórica sobre la sabiduría.'
