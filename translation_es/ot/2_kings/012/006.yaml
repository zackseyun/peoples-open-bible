translation:
  language: es
  text: Los sacerdotes tomarán para sí, cada uno de su donante[a], y ellos repararán el daño de la casa[b], todo daño que se encuentre allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "de su conocido". El término hebreo puede referirse más literalmente a alguien conocido por él, pero en este contexto de recaudación probablemente se refiere a quien le entregaba contribuciones.'
    reason: lexical_alternative
  - marker: b
    text: '"La casa" aquí se refiere al templo.'
    reason: cultural_note
lexical_decisions:
- source_word: יִקְחוּ
  english_pob_choice: Let ... take
  chosen_spanish: tomarán
  alternatives_spanish:
  - que tomen
  - tomen
  lexicon: HALOT
  rationale: El imperfecto/jusivo en este contexto expresa una instrucción. En español, el futuro exhortativo transmite bien la orden sin sonar mecánico.
- source_word: לָהֶם
  english_pob_choice: for themselves
  chosen_spanish: para sí
  alternatives_spanish:
  - para ellos
  - para sí mismos
  lexicon: HALOT
  rationale: La combinación preposición + pronombre indica beneficio o posesión para los sacerdotes mismos. 'Para sí' es natural y conserva el matiz reflexivo.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los presbíteros
  lexicon: HALOT
  rationale: Es el sustantivo estándar en este contexto administrativo del templo.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - uno por uno
  lexicon: HALOT
  rationale: Aquí funciona distributivamente con el sujeto plural; 'cada uno' suena natural en español y preserva la repartición individual.
- source_word: מֵאֵת מַכָּרוֹ
  english_pob_choice: from his donor
  chosen_spanish: de su donante
  alternatives_spanish:
  - de su conocido
  - de aquel que le conocía
  - de su aportante
  lexicon: HALOT
  rationale: El contexto es de recolección de dinero; aunque el hebreo puede significar 'conocido', la evidencia contextual favorece una relación de entrega/aporte. 'Donante' refleja ese sentido, sin negar la alternativa literal.
- source_word: יְחַזְּקוּ
  english_pob_choice: repair
  chosen_spanish: repararán
  alternatives_spanish:
  - restaurarán
  - fortalecerán
  - harán firme
  lexicon: HALOT
  rationale: El verbo literalmente es 'fortalecer', pero en un contexto de mantenimiento edilicio significa reparar/restaurar. 'Repararán' es la opción más clara en español.
- source_word: בֶּדֶק הַבַּיִת
  english_pob_choice: the damage of the house
  chosen_spanish: el daño de la casa
  alternatives_spanish:
  - las reparaciones de la casa
  - la brecha de la casa
  - el desperfecto de la casa
  lexicon: HALOT
  rationale: בֶּדֶק denota defecto, rotura o daño que requiere reparación. 'Daño' conserva la idea general y permite repetirla en la cláusula siguiente.
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  lexicon: HALOT
  rationale: Se mantiene la palabra fuente 'casa'; el sentido de templo queda dado por el contexto de Reyes, evitando introducir una glosa en el texto principal.
- source_word: לְכֹל אֲשֶׁר יִמָּצֵא שָׁם בָּדֶק
  english_pob_choice: wherever any damage is found there
  chosen_spanish: en todo lo que allí se encuentre dañado
  alternatives_spanish:
  - dondequiera que se halle allí algún daño
  - para todo lo que allí se encuentre con daño
  lexicon: HALOT
  rationale: La frase limita el alcance de las reparaciones a cualquier caso hallado en el lugar. 'En todo lo que allí se encuentre dañado' mantiene la amplitud indefinida y la referencia al daño sin forzar una paráfrasis más libre.
translation_notes:
  revision_awareness: La versión española sigue el texto hebreo de WLC y el criterio auditado de la POB en inglés. Se conserva la tensión léxica de מַכָּר como 'donante' en el cuerpo principal, pero se documenta la alternativa más literal 'conocido' en nota. También se mantiene 'la casa' en el texto principal, con aclaración contextual de que se trata del templo.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el nombre divino aparece explícitamente; aquí no aplica.
  - Se evitó sustituir términos del campo administrativo por lenguaje eclesiástico más tradicional.
  - '''Casa'' se conserva en el texto principal por fidelidad al hebreo, con nota contextual para evitar ambigüedad.'
