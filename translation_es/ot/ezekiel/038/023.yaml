translation:
  language: es
  text: Mostraré mi grandeza y me santificaré[a], y me daré a conocer a la vista de muchas naciones. Entonces sabrán que yo soy Yahvé[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me mostraré grande ... me santificaré ... y seré conocido». Los verbos hebreos están en forma reflexiva/pasiva y también pueden traducirse de manera más formal.'
    reason: lexical_alternative
  - marker: b
    text: Hebreo «YHWH»; tradicionalmente se ha traducido «el SEÑOR».
    reason: alternative_reading
lexical_decisions:
- source_word: וְהִתְגַּדִּלְתִּי
  english_pob_choice: I will magnify myself
  chosen_spanish: Me magnificaré
  alternatives_spanish:
  - Me haré grande
  - Me mostraré grande
  lexicon: HALOT
  rationale: El hitpael de גדל tiene fuerza reflexiva y, en este contexto, expresa la autoexaltación manifiesta de Yahvé ante las naciones. «Me magnificaré» conserva la correspondencia formal y la idea de manifestar su grandeza sin introducir una paráfrasis excesiva.
- source_word: וְהִתְקַדִּשְׁתִּי
  english_pob_choice: sanctify myself
  chosen_spanish: me santificaré
  alternatives_spanish:
  - me mostraré santo
  - vindicaré mi santidad
  lexicon: HALOT
  rationale: El hitpael de קדשׁ puede expresar que Dios se muestra o se vindica como santo. La traducción «me santificaré» sigue de cerca la forma verbal y preserva la tensión teológica; en español bíblico es comprensible, aunque algo más formal que «me mostraré santo».
- source_word: וְנֹדַעְתִּי
  english_pob_choice: I will make myself known
  chosen_spanish: me daré a conocer
  alternatives_spanish:
  - seré conocido
  - me revelaré
  lexicon: HALOT
  rationale: El nifal de ידע puede leerse como pasivo o como un resultado de auto-manifestación divina. «Me daré a conocer» expresa la agencia de Yahvé y mantiene el sentido público de la declaración sin volverla meramente estática.
- source_word: לְעֵינֵי
  english_pob_choice: in the sight of
  chosen_spanish: delante de
  alternatives_spanish:
  - a la vista de
  - ante
  lexicon: HALOT
  rationale: La expresión idiomática señala visibilidad pública. «Delante de» es natural en español y conserva el matiz de presencia visible ante testigos.
- source_word: גּוֹיִם רַבִּים
  english_pob_choice: many nations
  chosen_spanish: muchas naciones
  alternatives_spanish:
  - muchos pueblos
  - muchas gentes
  lexicon: HALOT
  rationale: En Ezequiel el término tiene un sentido geopolítico. «Naciones» evita reducirlo a un sentido étnico o religioso y coincide con el uso contextual del pasaje.
- source_word: וְיָדְעוּ
  english_pob_choice: they will know
  chosen_spanish: sabrán
  alternatives_spanish:
  - conocerán
  - llegarán a saber
  lexicon: HALOT
  rationale: El verbo ידע en fórmula profética suele expresar reconocimiento pleno. «Sabrán» es breve y natural en español, y mantiene la fuerza declarativa del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transcribir el nombre divino como «Yahvé» en lugar de sustituirlo por un título. Esto preserva el nombre personal revelado a Israel.'
theological_decisions:
- issue: Verbos reflexivos de auto-manifestación divina
  english_pob_reading: 'Use reflexive/public-manifestation language: ''magnify myself,'' ''sanctify myself,'' and ''make myself known'''
  chosen_spanish_reading: 'Usar lenguaje reflexivo de auto-manifestación: «me magnificaré», «me santificaré» y «me daré a conocer»'
  alternative_spanish_readings:
  - «me mostraré grande», «me mostraré santo» y «me revelaré»
  - «vindicaré mi grandeza/santidad»
  rationale: El versículo subraya que Yahvé se hace manifiesto ante las naciones mediante su propia acción. La traducción elegida conserva tanto la secuencia verbal como la tensión entre santidad, grandeza y conocimiento público, sin resolverla en una explicación interpretativa.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se mantiene el principio del proyecto de no enmascarar el nombre divino con un título. «Yahvé» es la forma española estable en este registro para representar el Tetragrámaton.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El audit trail inglés pasó por una revisión que cambió expresiones más libres por formas más cercanas al léxico hebreo («magnify myself» / «sanctify myself»). La versión española sigue esa orientación formal en los verbos principales, pero ajusta la sintaxis para que resulte natural y publicable en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera consistente para יְהוָה.
  - Se preserva el paralelismo verbal del hebreo con tres cláusulas coordinadas.
  - «Me santificaré» se conserva pese a su solemnidad porque refleja de manera directa el valor del hitpael y evita perder la tensión teológica del texto.
