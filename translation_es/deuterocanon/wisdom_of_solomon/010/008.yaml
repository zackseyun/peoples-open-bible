translation:
  language: es
  text: Porque al pasar de largo la sabiduría, no solo fueron dañados por no conocer lo que es bueno, sino que también dejaron para la vida[a] un memorial de su insensatez, para que, en las cosas en que se extraviaron, no pudieran ni siquiera pasar inadvertidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para el mundo de la vida humana»; el griego βίος puede referirse ampliamente a la vida entre los vivos, no solo a la vida de una persona individual.
    reason: lexical_alternative
lexical_decisions:
- source_word: σοφίαν ... παροδεύσαντες
  english_pob_choice: by passing wisdom by
  chosen_spanish: al pasar de largo la sabiduría
  alternatives_spanish:
  - pasando por alto la sabiduría
  - al pasar junto a la sabiduría
  - al despreciar la sabiduría
  lexicon: BDAG
  rationale: La imagen básica es de pasar de largo, no simplemente de ignorar. «Al pasar de largo la sabiduría» conserva la metáfora y su fuerza de negligencia o rechazo sin convertirla en una paráfrasis más abstracta.
- source_word: ἐβλάβησαν
  english_pob_choice: they were harmed
  chosen_spanish: fueron dañados
  alternatives_spanish:
  - sufrieron daño
  - fueron perjudicados
  - recibieron daño
  lexicon: BDAG
  rationale: El pasivo expresa daño recibido. «Fueron dañados» es claro en español y mantiene el sentido amplio de perjuicio moral y práctico.
- source_word: τοῦ μὴ γνῶναι τὰ καλά
  english_pob_choice: by not knowing what is good
  chosen_spanish: por no conocer lo que es bueno
  alternatives_spanish:
  - por no conocer el bien
  - por no saber lo que es bueno
  - por no conocer las cosas buenas
  lexicon: BDAG
  rationale: «τὰ καλά» puede abarcar lo bueno o noble, pero aquí la opción más directa y fiel para el lector español es «lo que es bueno». Mantiene el alcance moral sin estrecharlo demasiado.
- source_word: τῆς ἀφροσύνης
  english_pob_choice: their folly
  chosen_spanish: de su insensatez
  alternatives_spanish:
  - de su necedad
  - de su locura
  - de su falta de juicio
  lexicon: BDAG
  rationale: «ἀφροσύνη» expresa falta de sensatez o juicio. «Insensatez» comunica bien ese matiz y suena natural en registro bíblico sin perder la carga moral.
- source_word: ἀπέλιπον
  english_pob_choice: they left behind
  chosen_spanish: dejaron
  alternatives_spanish:
  - dejaron atrás
  - dejaron como herencia
  - dejaron tras de sí
  lexicon: BDAG
  rationale: El verbo indica dejar algo atrás de manera duradera. En español, «dejaron» funciona con «memorial» y permite captar la idea de un rastro permanente.
- source_word: τῷ βίῳ
  english_pob_choice: for life
  chosen_spanish: para la vida
  alternatives_spanish:
  - para la vida humana
  - para el mundo de la vida humana
  - entre los vivos
  lexicon: BDAG
  rationale: Se conserva la literalidad moderada de la POB. La expresión puede entenderse como el ámbito de la vida humana; la ambigüedad se explica en nota para no perder el alcance posible del griego βίος.
- source_word: μνημόσυνον
  english_pob_choice: a memorial
  chosen_spanish: un memorial
  alternatives_spanish:
  - un recuerdo
  - un recordatorio
  - una memoria
  lexicon: BDAG
  rationale: «Memorial» reproduce bien la idea de algo que queda como recuerdo visible o duradero. Es más fuerte que «recuerdo» y sigue la elección inglesa.
- source_word: ἔσφαλησαν
  english_pob_choice: they went astray
  chosen_spanish: se extraviaron
  alternatives_spanish:
  - se desviaron
  - yerros
  - erraron
  lexicon: BDAG
  rationale: El verbo comunica desviación o error de camino. «Se extraviaron» conserva la imagen de desviarse y encaja con el contexto moral.
- source_word: μηδὲ λαθεῖν δυνηθῶσιν
  english_pob_choice: they might not even be able to escape notice
  chosen_spanish: no pudieran ni siquiera quedar ocultos
  alternatives_spanish:
  - no pudieran ni siquiera pasar inadvertidos
  - no pudieran ni siquiera escapar a la vista
  - no pudieran ni siquiera ocultarse
  lexicon: BDAG
  rationale: La construcción con λανθάνω significa no escapar al conocimiento o quedar oculto. «Quedar ocultos» preserva la idea de no poder esconderse; «escapar notice» en inglés se vuelve natural en español como ausencia de ocultamiento.
theological_decisions:
- issue: Sentido moral de τὰ καλά
  english_pob_reading: what is good
  chosen_spanish_reading: lo que es bueno
  alternative_spanish_readings:
  - el bien
  - lo noble
  - las cosas buenas
  rationale: La expresión apunta a una evaluación ética, no solo a bienes materiales. «Lo que es bueno» mantiene esa amplitud moral sin imponer un matiz filosófico adicional.
  doctrine_reference: Sabiduría bíblica y discernimiento moral; traducción directa con claridad pastoral.
- issue: Valor del término βίος
  english_pob_reading: for life
  chosen_spanish_reading: para la vida
  alternative_spanish_readings:
  - para la vida humana
  - entre los vivos
  - para el mundo de la vida humana
  rationale: El griego puede referirse al curso de la vida humana o al ámbito de los vivos. «Para la vida» mantiene la ambigüedad documentada en la POB; se deja constancia de la alternativa más amplia.
  doctrine_reference: Nota lexical sobre βίος; preservación de ambigüedad semántica.
translation_notes:
  revision_awareness: El audit trail inglés no requiere cambios sustanciales; la versión española sigue la misma línea de equivalencia óptima, conservando la metáfora de «pasar de largo» y la ambigüedad documentada de βίος mediante nota.
  spanish_consistency_notes:
  - Se usa «sabiduría» para σοφίαν, en continuidad con la tradición bíblica y con el inglés POB.
  - Se mantiene el paralelismo de daño, memorial e invisibilidad con sintaxis española natural.
  - «Memorial» se conserva por consistencia terminológica y por su fuerza de recuerdo duradero.
  - La nota [a] se ancla en «sabiduría» para señalar el alcance semántico del sintagma inicial y la alternativa documentada sobre βίος.
