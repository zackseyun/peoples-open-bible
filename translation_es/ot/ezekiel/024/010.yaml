revisions:
- from: Apresta mucha leña[a], enciende el fuego, cuece bien la carne[b], y hierve el caldo[c]; y que los huesos se quemen[d].
  to: Amontona la leña[a], enciende el fuego, cuece bien la carne[b], y hierve el caldo[c]; y que los huesos queden chamuscados[d].
  rationale: Se ajusta el primer imperativo para reflejar mejor la idea de acumular la leña y se fortalece el último verbo para conservar la intensidad resultativa de 'be charred'. También se afina la nota c para que represente mejor las alternativas documentadas de la expresión hebrea en contexto.
  reviewer_model: gpt-5.4
