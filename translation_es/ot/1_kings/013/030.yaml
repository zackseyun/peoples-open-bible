translation:
  language: es
  text: 'Y puso su cadáver en su propia tumba[a], y lamentaron por él, diciendo: «¡Ay[b], hermano mío!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hicieron duelo por él». El verbo hebreo expresa duelo por los muertos, a menudo en un lamento formal.
    reason: lexical_alternative
  - marker: b
    text: «Hermano mío» probablemente funciona como fórmula de lamento que expresa solidaridad o parentesco afectivo, no necesariamente una relación biológica.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּנַּח
  english_pob_choice: laid
  chosen_spanish: puso
  alternatives_spanish:
  - depositó
  - colocó
  - lo puso
  lexicon: HALOT
  rationale: El verbo causa el sentido de poner o depositar un cuerpo en un lugar; «puso» es natural en español y conserva la acción sin añadir matices ajenos al contexto funerario.
- source_word: נִבְלָתוֹ
  english_pob_choice: his corpse
  chosen_spanish: su cadáver
  alternatives_spanish:
  - su cuerpo
  - su cuerpo muerto
  lexicon: HALOT
  rationale: «Cadáver» preserva la referencia a un cuerpo muerto con la fuerza suficiente del hebreo, sin cargar el registro de una manera más brusca que «cuerpo».
- source_word: בְּקִבְרוֹ
  english_pob_choice: in his own tomb
  chosen_spanish: en su propia tumba
  alternatives_spanish:
  - en su sepulcro
  - en su propia sepultura
  lexicon: HALOT
  rationale: קֶבֶר puede ser tumba o sepulcro; «tumba» es claro y natural. «Su propia» explicita el sufijo posesivo del hebreo.
- source_word: וַיִּסְפְּדוּ
  english_pob_choice: they mourned
  chosen_spanish: lloraron
  alternatives_spanish:
  - lo lloraron
  - lamentaron
  lexicon: HALOT
  rationale: El verbo abarca el duelo por los muertos, a menudo en lamentación formal. «Lloraron» comunica el duelo en español de manera directa; el contexto y la cita verbal completan la idea del lamento.
- source_word: עָלָיו
  english_pob_choice: over him
  chosen_spanish: sobre él
  alternatives_spanish:
  - por él
  - a causa de él
  lexicon: HALOT
  rationale: La preposición conserva bien la relación de duelo dirigida a la persona fallecida; «sobre él» sigue de cerca la construcción hebrea y es idiomática en español.
- source_word: הוֹי
  english_pob_choice: Alas
  chosen_spanish: ¡Ay!
  alternatives_spanish:
  - ¡Ah!
  - ¡Ay de mí!
  lexicon: HALOT
  rationale: Es una interjección de lamentación; «¡Ay!» transmite duelo y exclamación doliente sin introducir de por sí el matiz profético de «¡Ay de…!».
- source_word: אָחִי
  english_pob_choice: my brother
  chosen_spanish: hermano mío
  alternatives_spanish:
  - mi hermano
  - pariente mío
  lexicon: HALOT
  rationale: Se conserva el parentesco literal del hebreo. En este contexto funciona como fórmula de solidaridad y lamentación, por lo que el orden «hermano mío» resulta natural y emotivo en español.
theological_decisions:
- issue: El valor de duelo de וַיִּסְפְּדוּ frente a una simple acción física de llorar
  english_pob_reading: they mourned, with a footnote noting that the Hebrew verb refers to mourning for the dead, often in a formal lament
  chosen_spanish_reading: lloraron, con la idea de duelo por los muertos implícita en el contexto
  alternative_spanish_readings:
  - lamentaron
  - guardaron duelo
  rationale: El español «lloraron» comunica el gesto de duelo de modo natural y deja espacio para que la cita directa exprese el lamento. No se borra la solemnidad funeraria del verbo hebreo, que puede explicitarse en nota.
  doctrine_reference: No aplica; decisión léxico-funeraria.
- issue: El valor idiomático de אָחִי como fórmula de solidaridad y no necesariamente parentesco biológico
  english_pob_reading: my brother is likely a lament formula expressing kinship or solidarity, not necessarily a statement of biological relation
  chosen_spanish_reading: hermano mío como fórmula de duelo y solidaridad
  alternative_spanish_readings:
  - mi hermano
  - pariente mío
  rationale: «Hermano mío» conserva la literalidad y la carga afectiva del hebreo. La nota aclara que no debe leerse obligatoriamente como una afirmación de parentesco biológico.
  doctrine_reference: No aplica; observación cultural y pragmática del lamento.
translation_notes:
  revision_awareness: Se mantuvo la lectura de alta concordancia del audit trail inglés sin cambios sustanciales. La versión española conserva el orden narrativo, la imaginería funeraria y la interjección de duelo, ajustando solo la naturalidad sintáctica al español.
  spanish_consistency_notes:
  - Se conservó «cadáver» para נִבְלָה en continuidad con la fuerza léxica del audit trail.
  - Se prefirió «tumba» para קֶבֶר siguiendo el contexto funerario y la explicitación posesiva.
  - La interjección «¡Ay!» mantiene el tono de lamentación sin introducir un matiz de juicio.
  - «Sobre él» reproduce la relación semítica del duelo dirigido al difunto.
  - No se usó «Cristo», «SEÑOR» ni vocabulario eclesiástico ajeno al pasaje.
