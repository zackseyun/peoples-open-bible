review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo y del POB inglés: mantiene la vergüenza ligada a actos de rebelión pasados, la remoción de los arrogantes del seno de Sion, y el cese de la altivez en el monte santo. Sin embargo, en la cláusula final ''ya no volverás a ser altiva'' desplaza levemente el matiz del hebreo וְלֹא תוֹסִפִי לְגָבְהָה עוֹד, que expresa ''ya no seguirás/ya no serás más altiva'' o ''no volverás a enaltecerte'', no necesariamente un retorno a un estado previo. Además, la nota [a] debería reflejar con más precisión la alternativa documentada en inglés (''no quedarás avergonzada'' / ''serás avergonzada'') sin hablar de ''puesta en vergüenza'', que suena poco idiomático.'
  spanish_quality_summary: El español es claro, natural y de buen registro bíblico. 'En aquel día', 'de en medio de ti' y 'en mi santo monte' funcionan bien. 'A los que se regocijan en tu orgullo' es aceptable, aunque 'exultan' refleja mejor la intensidad del hebreo; no es indispensable cambiarlo. La reparación principal es suavizar la formulación final para evitar una inferencia temporal innecesaria ('volverás').
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparece Yahvé en este versículo. La elección de 'te rebelaste contra mí' concuerda bien con פשע. 'Orgullo' para גאוה en contexto negativo es defendible. 'Altiva' para גבה también encaja, pero conviene formularlo como estado continuo o conducta cesante, no como retorno.
  issues:
  - severity: medium
    issue: La frase 'ya no volverás a ser altiva' no refleja con precisión el aspecto idiomático de וְלֹא תוֹסִפִי לְגָבְהָה עוֹד.
    rationale: El hebreo expresa cesación ('no seguirás/no más') y no necesariamente un 'volver a ser'. En español, 'ya no serás altiva' o 'ya no volverás a enaltecerte' preserva mejor el sentido.
  - severity: low
    issue: La nota [a] usa una alternativa menos idiomática ('puesta en vergüenza') que la documentada por el POB inglés.
    rationale: El inglés preserva la alternativa 'you will not be ashamed'. En español conviene mantener 'no quedarás avergonzada' o 'no te avergonzarás' como opciones naturales y fieles.
