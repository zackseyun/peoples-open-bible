theological_decisions:
- issue: Divine self-reference in vv. 1-6 ('they were made through me ... the end also will be through me')
  chosen_reading: Retained the first-person divine speech without softening or explanatory expansion.
  alternative_readings:
  - Paraphrase as a general statement of divine sovereignty
  - Restructure to avoid the abrupt shift into first person
  rationale: The Latin presents a solemn divine monologue grounding both creation and consummation in the same speaker. Preserving the direct first person keeps the theological claim and apocalyptic cadence intact.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of 'From Abraham to Abraham' in v. 8
  chosen_reading: Kept the phrase literally in the main text and allowed the Jacob/Esau explanation to stand as the text's own interpretation.
  alternative_readings:
  - Emend to another patriarchal formula
  - Paraphrase as 'from one age-marker to another'
  rationale: The phrase is textually and interpretively difficult. Since the Latin witness is our base and no daughter-language reading is supplied here, the transparent choice is to preserve the crux rather than hide it.
  doctrine_reference: Transparency in contested readings; preserve ambiguity where genuine.
- issue: Identity of 'the men who have been taken up' in v. 26
  chosen_reading: Rendered recepti sunt as 'have been taken up' without specifying whether this means translated righteous persons, preserved end-time survivors, or another group.
  alternative_readings:
  - have been received
  - have been gathered in
  - have been preserved
  rationale: The passage gestures toward extraordinary preservation from death, but the Latin alone does not force a single doctrinally loaded interpretation. The translation leaves the category open.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Creation language in vv. 38-52 and its relation to Genesis
  chosen_reading: Used wording that echoes biblical creation diction where the Latin invites it, but did not harmonize details away.
  alternative_readings:
  - More aggressively align with Genesis 1 phrasing
  - Avoid all biblical echo to keep the chapter distinct
  rationale: Ezra's prayer intentionally rehearses creation in scriptural cadence while also presenting distinctive details (six dry parts, Behemoth and Leviathan, treasuries of light). The translation should sound scriptural without erasing those differences.
  doctrine_reference: Original-language primacy over translation tradition.
- issue: Honorifics for Israel in v. 58
  chosen_reading: Rendered the sequence as 'your firstborn, your only one, your zealous one, your beloved.'
  alternative_readings:
  - Interpret aemulatorem more loosely as 'favored one'
  - Collapse the titles into a smoother summary
  rationale: Ezra's protest depends on the cumulative force of these covenantal titles. Even where one term is difficult, the list should remain sharp and formal rather than generalized.
  doctrine_reference: Do not smooth away Ezra's protest.
