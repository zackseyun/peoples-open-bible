translation:
  language: es
  text: 'Y Samuel le dijo: «Yahvé ha arrancado hoy de ti el reino de Israel y se lo ha dado a tu semejante[a], que es mejor que tú[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «a tu compañero» o «a tu prójimo».
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice «mejor que tú», describiendo a la persona a quien se da el reino.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלָיו
  english_pob_choice: And Samuel said to him
  chosen_spanish: Y Samuel le dijo
  alternatives_spanish:
  - Entonces Samuel le dijo
  - Así que Samuel le dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; en español, ‘Y’ mantiene la secuencia de forma natural y fiel, sin añadir matiz interpretativo.
- source_word: קָרַע
  english_pob_choice: has torn ... away
  chosen_spanish: ha arrancado
  alternatives_spanish:
  - ha desgarrado
  - ha rasgado y quitado
  - ha roto y apartado
  lexicon: HALOT
  rationale: El verbo expresa una ruptura violenta y la imagen de despojo. ‘Arrancado’ comunica bien el acto de remover con fuerza y conserva el eco metafórico del contexto inmediato, sin perder la idea de separación.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del POB de transliterar el Nombre divino como ‘Yahvé’, en vez de sustituirlo por un título.
- source_word: מַמְלְכ֧וּת יִשְׂרָאֵל
  english_pob_choice: the kingdom of Israel
  chosen_spanish: el reino de Israel
  alternatives_spanish:
  - la realeza de Israel
  - el dominio real de Israel
  lexicon: HALOT
  rationale: ‘מַמְלְכוּת’ puede abarcar realeza o reino; aquí, por el objeto removido y entregado, ‘el reino de Israel’ es la opción más idiomática y clara en español.
- source_word: מֵעָלֶיךָ
  english_pob_choice: away from you
  chosen_spanish: de ti
  alternatives_spanish:
  - de sobre ti
  - lejos de ti
  lexicon: HALOT
  rationale: El hebreo marca remoción desde la esfera de Saul. En español, ‘de ti’ expresa la separación de forma natural; el complemento ‘ha arrancado’ ya aporta la fuerza de alejamiento.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: ‘Hoy’ es la equivalencia directa y natural, manteniendo la inmediatez del juicio.
- source_word: וּנְתָנָהּ
  english_pob_choice: and has given it
  chosen_spanish: y se lo ha dado
  alternatives_spanish:
  - y lo ha dado
  - y se lo dio
  lexicon: HALOT
  rationale: El pronombre enclítico evita repetir ‘el reino’ y refleja la referencia pronominal femenina del hebreo. El perfecto español transmite una acción decretada y ya fijada en el pronunciamiento profético.
- source_word: לְרֵעֲךָ
  english_pob_choice: to your neighbor
  chosen_spanish: a tu prójimo[a]
  alternatives_spanish:
  - a tu compañero
  - a tu semejante
  lexicon: HALOT
  rationale: רֵעַ puede ser vecino, compañero, amigo o prójimo. ‘Prójimo’ es amplio y respetuoso; en este contexto, como el POB inglés preserva la alternativa semántica, se anota la posibilidad de ‘compañero’ o ‘fellow’ en la nota.
- source_word: הַטּוֹב מִמֶּךָּ
  english_pob_choice: who is better than you
  chosen_spanish: que es mejor que tú[b]
  alternatives_spanish:
  - más bueno que tú
  - más digno que tú
  lexicon: HALOT
  rationale: El comparativo מן con טוב indica ‘mejor que’. Se conserva la relación explícita con el destinatario y se evita suavizar el juicio. ‘Que es’ aclara el referente del sintagma.
theological_decisions:
- issue: Tensión entre juicio ya decretado y su realización histórica
  english_pob_reading: 'completed/decretive: ''has torn ... has given'''
  chosen_spanish_reading: ‘ha arrancado ... se lo ha dado’
  alternative_spanish_readings:
  - ‘arrancará ... se lo dará’
  - ‘arranca ... se lo da’
  rationale: En la sentencia profética, los perfectos hebreos presentan como hecho consumado la pérdida del reino, aunque su realización narrativa continúe después. El español perfecto mantiene esa fuerza decretiva sin resolver la tensión temporal.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve it)
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del criterio auditado; se mantiene la lectura consumada/decretiva de los perfectos y la equivalencia sobria de los términos relacionales y comparativos.'
  spanish_consistency_notes:
  - Se conserva ‘Yahvé’ de forma consistente con el estándar del proyecto para יְהוָה.
  - ‘Prójimo’ se usa como opción amplia; la nota preserva la alternativa relacional documentada por el POB inglés.
  - El comparativo ‘mejor que tú’ mantiene la fuerza evaluativa del hebreo sin paraphrasear a una cualidad distinta.
  - El uso de ‘ha arrancado’ conserva la imagen verbal intensa y el eco de la acción simbólica inmediata del contexto.
