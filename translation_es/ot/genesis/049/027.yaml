  text: בִּנְיָמִין֙ זְאֵ֣ב יִטְרָ֔ף בַּ/בֹּ֖קֶר יֹ֣אכַל עַ֑ד וְ/לָ/עֶ֖רֶב יְחַלֵּ֥ק שָׁלָֽל׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/049/027.yaml
  text: Benjamin is a ravenous wolf[a]; in the morning he devours the prey[d][c][b], and in the evening he divides the spoil.
  footnotes:
