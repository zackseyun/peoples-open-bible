translation:
  language: es
  text: Y no escondas tu rostro[a] de tu siervo[b], porque estoy angustiado; respóndeme pronto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu presencia». El hebreo dice literalmente «tu rostro», un modismo común para favor o atención cercana.
    reason: lexical_alternative
  - marker: b
    text: O «de tu esclavo». El término hebreo puede significar «siervo» o «esclavo», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַל
  english_pob_choice: And do not
  chosen_spanish: Y no
  alternatives_spanish:
  - Y no hagas
  - Pero no
  lexicon: HALOT
  rationale: La partícula conjuntiva וְ se conserva con «Y», y אַל con valor prohibitivo se expresa naturalmente con «no» en español. «Y no» mantiene la continuidad del ruego sin forzar un matiz adversativo.
- source_word: תַּסְתֵּר
  english_pob_choice: hide
  chosen_spanish: escondas
  alternatives_spanish:
  - ocultes
  - apartes
  lexicon: HALOT
  rationale: El verbo סתר significa «ocultar/esconder». En el giro con «rostro», «escondas» comunica de manera clara y digna la imagen de retirar atención o favor divino.
- source_word: פָּנֶיךָ
  english_pob_choice: your face
  chosen_spanish: tu rostro
  alternatives_spanish:
  - tu presencia
  lexicon: HALOT
  rationale: Se conserva la imagen corporal de «rostro» para respetar el hebraísmo y su fuerza relacional. «Presencia» es posible, pero atenúa la metáfora que el texto mantiene.
- source_word: מֵעַבְדֶּךָ
  english_pob_choice: from your servant
  chosen_spanish: de tu siervo
  alternatives_spanish:
  - de tu esclavo
  lexicon: HALOT
  rationale: Aunque עבד puede abarcar «esclavo», en esta súplica dirigida a Dios la fórmula devocional en español se expresa mejor con «siervo», que conserva el tono reverente sin exagerar el matiz jurídico de esclavitud.
- source_word: צַר לִי
  english_pob_choice: I am in distress
  chosen_spanish: estoy angustiado
  alternatives_spanish:
  - estoy en angustia
  - estoy atribulado
  - estoy en apuro
  lexicon: HALOT
  rationale: La expresión breve צַר לִי describe una situación de opresión o angustia personal. «Estoy angustiado» es una equivalencia natural y fiel que mantiene el sentido de presión interna y externa.
- source_word: מַהֵר
  english_pob_choice: quickly
  chosen_spanish: pronto
  alternatives_spanish:
  - rápidamente
  - sin demora
  lexicon: HALOT
  rationale: Como modificador del mandato siguiente, «pronto» suena natural en español y conserva la urgencia del imperativo hebreo sin volverlo mecánico.
- source_word: עֲנֵנִי
  english_pob_choice: answer me
  chosen_spanish: respóndeme
  alternatives_spanish:
  - contéstame
  - escúchame y respóndeme
  lexicon: HALOT
  rationale: En contexto de oración, ענה se traduce de forma idiomática como «responder». «Respóndeme» es claro, reverente y adecuado para una súplica dirigida a Dios.
theological_decisions:
- issue: Metáfora de ‘rostro’ para la atención/favor divinos
  english_pob_reading: Retain 'your face' literally in the main text
  chosen_spanish_reading: Conservar «tu rostro» en el texto principal
  alternative_spanish_readings:
  - «tu presencia»
  rationale: La metáfora del rostro de Dios comunica cercanía, favor y atención. Mantenerla en español preserva la textura poética y evita resolver prematuramente una imagen teológicamente significativa.
  doctrine_reference: Translation philosophy §3, §6
- issue: Renderización de עבד ante Dios
  english_pob_reading: servant
  chosen_spanish_reading: siervo
  alternative_spanish_readings:
  - esclavo
  rationale: El contexto es una oración reverente a Yahvé; en español, «siervo» comunica adecuadamente pertenencia humilde y servicio sin perder claridad pastoral. Se conserva la tensión léxica al registrar la alternativa «esclavo».
  doctrine_reference: Translation philosophy §1; sensibilidad léxica para términos de servidumbre
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el texto hebreo y con el auditorio de revisión: no se registran cambios aplicados en el ciclo más reciente, y la concordancia general fue alta. La redacción española sigue esa lectura estable, preservando las imágenes y la urgencia del ruego sin añadir explicación interpretativa al cuerpo del verso.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» implícito en la dirección del ruego sin necesidad de nombrarlo en el verso, siguiendo el hebreo.
  - «Rostro» se usa de modo consistente con otros pasajes donde el hebreo emplea פָּנִים como metáfora de favor o atención.
  - «Siervo» se elige aquí por el contexto orante; en otros contextos de dependencia social o legal podría requerirse «esclavo».
  - «Angustiado» reproduce bien el valor emocional y situacional de צַר לִי en español contemporáneo culto.
