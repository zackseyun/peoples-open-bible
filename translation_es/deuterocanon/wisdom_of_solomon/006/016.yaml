translation:
  language: es
  text: Porque ella va buscando a los que son dignos de ella, y se les aparece favorablemente en los senderos, y les sale al encuentro en todo propósito.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en todo plan» o «en toda intención». El griego puede referirse tanto al pensamiento en general como a un propósito o intención ya formada.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοὺς ἀξίους αὐτῆς
  english_pob_choice: those worthy of her
  chosen_spanish: los que son dignos de ella
  alternatives_spanish:
  - los dignos de ella
  - los que merecen de ella
  lexicon: LSJ
  rationale: ἄξιος expresa la idea de ser digno, merecedor o apto. 'Los que son dignos de ella' conserva la relación personal y evita volverlo meramente meritocrático.
- source_word: περιέρχεται ζητοῦσα
  english_pob_choice: goes about seeking
  chosen_spanish: rodea buscando
  alternatives_spanish:
  - va de un lado a otro buscando
  - anda buscando
  lexicon: LSJ
  rationale: περιέρχομαι añade movimiento circular o itinerante; 'rodea buscando' conserva la imagen de movimiento activo con búsqueda continua, sin perder naturalidad en español.
- source_word: ἐν ταῖς τρίβοις
  english_pob_choice: on the paths
  chosen_spanish: en los senderos
  alternatives_spanish:
  - en los caminos
  - por los senderos
  lexicon: LSJ
  rationale: τρίβος designa camino, vereda o senda. 'Senderos' comunica la imagen concreta de caminos recorridos y mantiene el plural de la escena.
- source_word: φαντάζεται αὐτοῖς εὐμενῶς
  english_pob_choice: graciously appears to them
  chosen_spanish: se aparece con benevolencia
  alternatives_spanish:
  - se les muestra favorablemente
  - aparece benignamente ante ellos
  lexicon: LSJ
  rationale: φαντάζομαι aquí tiene el sentido de hacerse visible o aparecer; εὐμενῶς añade una disposición favorable. 'Se aparece con benevolencia' preserva la aparición personal y el tono benevolente.
- source_word: ἐν πάσῃ ἐπινοίᾳ
  english_pob_choice: in every purpose
  chosen_spanish: en todo propósito
  alternatives_spanish:
  - en toda intención
  - en todo plan
  lexicon: LSJ
  rationale: ἐπίνοια puede significar pensamiento, intención, plan o designio. Dado el ajuste revisado del inglés a 'purpose', 'propósito' comunica bien la idea de intención formada sin reducirla a simple pensamiento.
- source_word: ὑπαντᾷ αὐτοῖς
  english_pob_choice: meets them
  chosen_spanish: los encuentra
  alternatives_spanish:
  - sale a su encuentro
  - los sale a encontrar
  lexicon: LSJ
  rationale: ὑπαντάω implica encontrarse con alguien o ir a su encuentro. 'Los encuentra' es breve y natural; el contexto ya expresa la iniciativa de Sabiduría.
theological_decisions:
- issue: Personificación femenina de la Sabiduría
  english_pob_reading: Retain feminine personal language throughout ('she ... her')
  chosen_spanish_reading: Mantener el femenino personal ('ella ... de ella')
  alternative_spanish_readings:
  - volverlo impersonal con 'la sabiduría ... la'
  - neutrarlo con 'ello'
  rationale: El griego presenta a la Sabiduría con formas femeninas y acciones personales. En español, conservar 'ella' y 'de ella' preserva la personificación literaria y teológica del texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que sustituyó 'in every thought' por 'in every purpose' para reflejar mejor ἐν πάσῃ ἐπινοίᾳ como intención o designio. La traducción española sigue esa decisión con 'en todo propósito'.
  spanish_consistency_notes:
  - Se mantiene la personificación femenina de Sabiduría con 'ella' y 'de ella'.
  - '''Senderos'' conserva la imagen concreta de τρίβοις sin elevar el registro a una abstracción.'
  - '''Se aparece'' expresa la visibilidad personal del verbo griego sin añadir contenido doctrinal.'
  - La nota usa una alternativa léxica real en español para 'propósito', 'plan' e 'intención', paralela a la nota inglesa.
