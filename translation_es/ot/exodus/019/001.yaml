revisions:
- from: En el tercer mes, después que los hijos de Israel habían salido de la tierra de Egipto[ab], en este mismo día llegaron al desierto de Sinaí.
  to: En el tercer mes, después de que los hijos de Israel[a] salieron de la tierra de Egipto, en este mismo día[b] llegaron al desierto de Sinaí.
  rationale: Se corrige el incumplimiento formal de notas, se añaden las alternativas léxicas preservadas por la POB inglesa, y se pule ligeramente la sintaxis temporal para un español más natural sin cambiar el sentido fuente ni las decisiones léxicas principales.
