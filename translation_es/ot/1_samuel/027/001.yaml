base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/027/001.yaml
  text: Then David said in his heart[a], “Now I will one day perish by the hand of Saul. There is nothing better for me than that I should surely escape to the land of the Philistines. Then Saul will despair of seeking me any longer in all the territory of Israel[c][b], and I will escape from his hand.”
  footnotes:
  - marker: a
    text: Or 'I will perish one day by the hand of Saul.' The Hebrew verb can be rendered more generally as 'perish' or more vividly as 'be swept away.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'escaping I will escape,' an infinitive absolute with finite verb for emphasis.
    reason: lexical_alternative
  - marker: c
    text: Or 'Then Saul will give up seeking me any longer.'
    reason: lexical_alternative
