translation:
  text: |-
    4. For she wanted to see me in the desire of sin, but I was ignorant in all these things.
    
    5. And I said to her, “This is not the custom among the Egyptians, to take what belongs to another before proof is given.”
    
    6. So I said this concerning the exchange. But the boy ought to be kept shut up.
    
    1. And after twenty-four days the Ishmaelites came, for they had heard that Jacob my father was mourning greatly for me. And when they came they said to me,
    
    2. “Why did you say that you were a slave? For look, we have learned that you are the son of a great man in the land of Canaan, and that your father is still mourning for you in sackcloth and ashes.”
    
    3. When I heard these things, my inward parts were torn apart, and my heart melted, and I wanted very much to weep. But I restrained myself, so that I might not put my brothers to shame. And I said to them, “I do not know; I am a slave.”
    
    4. Then they took counsel to sell me, so that I might not be found in their hands.
    
    5. For they feared my father, lest he come against them and execute dangerous vengeance on them; for they had heard that he was great before God and men.
    
    6. Then the trader said to them, “Release me from the judgment of Potiphar.”
    
    7. So they came near and asked me, saying, “Say that you were bought by us for silver, and he will release us.”
