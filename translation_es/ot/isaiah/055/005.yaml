review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo: una nación desconocida será llamada, naciones antes no relacionadas acudirán al destinatario singular, y la causa es Yahvé, su Dios, el Santo de Israel, porque él lo/la ha glorificado. Sin embargo, hay errores concretos frente al texto fuente y al rastro de auditoría inglés: (1) la nota [a] está anclada a הֵן (''Mira'') pero su contenido pertenece a יָרוּצוּ (''correrán/se apresurarán''); (2) ''correrá'' está en singular aunque יָרוּצוּ es plural y el sujeto inmediato más natural en español es plural; (3) la nota [b] en inglés corresponde a לְמַעַן (''por causa de / por el bien de''), no a ''Santo de Israel''; (4) la secuencia ''y del Santo de Israel'' suena forzada y menos clara que una coordinación causal más natural en español.'
  spanish_quality_summary: El español es generalmente claro y digno, con buena elección de 'Yahvé' y mantenimiento del singular teológico del destinatario. No obstante, la distribución de notas y la concordancia verbal necesitan corrección. 'Mira' es posible, pero 'He aquí' encaja mejor con el registro profético y evita que la nota léxica mal ubicada genere confusión. La frase fluye mejor como 'correrán hacia ti' y con la nota causal anclada en 'por causa de'.
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto en ''Yahvé'', ''Dios'' y ''Santo de Israel''. No hay conflicto doctrinal relevante. La principal desviación no es terminológica sino de aparato: las notas léxicas están asignadas a los lugares equivocados. También conviene respetar mejor la decisión inglesa sobre la vividez de רוץ con plural explícito.'
  issues:
  - severity: high
    issue: La nota [a] está puesta en 'Mira' pero dice 'O «te apresurarás hacia ti»'.
    rationale: הֵן significa 'He aquí/Mira', mientras que la alternativa 'se apresurarán hacia ti' corresponde a אֵלֶיךָ יָרוּצוּ. La nota actual falsea el vínculo entre texto y alternativa.
  - severity: high
    issue: La nota [b] está anclada a 'Santo de Israel' pero su contenido ('por el bien de Yahvé tu Dios') corresponde a לְמַעַן.
    rationale: El aparato de notas debe reflejar el punto exacto de variación léxica. Aquí la alternativa inglesa documentada modifica la frase causal, no el título divino.
  - severity: medium
