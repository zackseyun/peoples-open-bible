theological_decisions:
- issue: Rendering the emphatic demonstrative ἐκεῖνος in reference to the Father
  chosen_reading: 'Retain explicit emphasis in the main text: ''that one has testified about me.'''
  alternative_readings:
  - '''he has testified about me'''
  - '''he himself has testified about me'''
  rationale: The verse stresses that the Father himself is Jesus' witness. Preserving the demonstrative emphasis reflects the Greek without importing additional doctrinal claims. This supports the text's Christological force while remaining translationally transparent.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Rendering εἶδος αὐτοῦ
  chosen_reading: Translate as 'his form' rather than a more interpretive phrase.
  alternative_readings:
  - '''his appearance'''
  rationale: The wording should not over-resolve whether Jesus means literal visible manifestation, perceptible appearance, or broader revelatory perception. 'Form' preserves the theological tension and remains close to the Greek.
  doctrine_reference: Translation philosophy §3
