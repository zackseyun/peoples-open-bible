translation:
  language: es
  text: La canicie[a] es una corona de gloria[b]; se halla en el camino de la rectitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "las canas". El hebreo presenta una imagen concreta de cabello gris asociado con la edad; "canicie" la expresa de forma natural en español.
    reason: lexical_alternative
  - marker: b
    text: Es decir, la canicie es honorable cuando acompaña una vida recta; el proverbio expresa un principio general de sabiduría, no una promesa absoluta de longevidad para toda persona justa.
    reason: cultural_note
lexical_decisions:
- source_word: עֲטֶרֶת
  english_pob_choice: crown
  chosen_spanish: corona
  alternatives_spanish:
  - diadema
  - guirnalda
  lexicon: HALOT
  rationale: עֲטֶרֶת designa una corona u ornamento que rodea la cabeza. "Corona" es el equivalente natural y digno en español para la imagen de honor del proverbio.
- source_word: תִּפְאֶרֶת
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - belleza
  - esplendor
  - honor
  lexicon: HALOT
  rationale: En la frase constructa, el término expresa honra y realce. "Gloria" conserva el matiz elevado y funciona bien en español como expresión fija sin banalizar el honor del anciano.
- source_word: שֵׂיבָה
  english_pob_choice: gray hair
  chosen_spanish: canas
  alternatives_spanish:
  - cabellos grises
  - vejez
  - cabellera cana
  lexicon: HALOT
  rationale: El hebreo es concreto y alude a las canas; "canas" preserva la imagen física y su asociación natural con la edad, sin volver la frase anticuada.
- source_word: בְּדֶרֶךְ
  english_pob_choice: in the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - en la senda
  - en la senda de
  - en el curso de
  lexicon: HALOT
  rationale: La construcción hebrea es idiomática y apunta a un curso de vida. "En el camino" mantiene la metáfora del proceder moral sin explicarla de más en el texto principal.
- source_word: צְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia recta
  - el proceder justo
  lexicon: HALOT
  rationale: En Proverbios, el término puede referirse a una vida moralmente recta. "Justicia" conserva la amplitud ética y la fuerza de pacto/legal del vocablo, mientras que "rectitud" queda como alternativa posible.
- source_word: תִּמָּצֵא
  english_pob_choice: it is found
  chosen_spanish: se encuentran
  alternatives_spanish:
  - se halla
  - se encuentra
  - aparecen
  lexicon: HALOT
  rationale: El nifal de מצא expresa pasivamente que algo "es hallado" o "se encuentra". En español, una formulación impersonal plural permite acomodar el sujeto colectivo implícito de "canas" y conserva la ambigüedad proverbial de ser halladas o caracterizarse por ese camino.
theological_decisions:
- issue: Alcance proverbial de la segunda mitad del verso
  english_pob_reading: The verse states a general wisdom principle that gray hair is an honorable adornment when associated with a life of righteousness, not an unconditional claim that every elderly person is righteous or that the righteous always reach old age.
  chosen_spanish_reading: 'El verso expresa un principio general de sabiduría: las canas son un adorno honorable cuando acompañan una vida justa, no una promesa absoluta de que toda persona anciana sea justa ni de que los justos necesariamente lleguen a la vejez.'
  alternative_spanish_readings:
  - La vejez misma es honorable.
  - La justicia garantiza longevidad.
  rationale: La sabiduría hebrea suele formular máximas generales, no promesas mecánicas. Mantener "se encuentran en el camino de la justicia" preserva la tensión proverbial sin convertirla en garantía universal.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registraron cambios requeridos y la concordancia con el control cruzado fue alta.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma del proyecto cuando corresponda, aunque este versículo no lo contiene.
  - '"Justicia" se usa aquí para צְדָקָה en su sentido ético de vida recta, consistente con Proverbios.'
  - Se conserva la imagen proverbial del "camino" sin expandirla en paráfrasis interpretativa dentro del texto principal.
