translation:
  language: es
  text: Como una puerta gira en su quicio[a], así el perezoso sobre su cama.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La puerta gira sobre su quicio, y el perezoso sobre su cama». El hebreo usa artículo en ambos sustantivos, pero en estilo proverbial el español puede expresarlo como una comparación genérica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַדֶּלֶת
  english_pob_choice: a door
  chosen_spanish: una puerta
  alternatives_spanish:
  - la puerta
  lexicon: HALOT
  rationale: El hebreo lleva artículo definido, pero en el paralelismo proverbial funciona como comparación genérica. En español, 'una puerta' transmite mejor ese valor general sin perder la imagen.
- source_word: תִּסּוֹב
  english_pob_choice: turns
  chosen_spanish: gira
  alternatives_spanish:
  - da vueltas
  - se mueve
  lexicon: HALOT
  rationale: El verbo describe el movimiento repetido de la puerta en su eje o quicio. 'Gira' es natural en español y conserva la imagen mecánica del hebreo.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  lexicon: HALOT
  rationale: '''Sobre'' mantiene la relación espacial del giro respecto del quicio y funciona bien en el símil.'
- source_word: צִירָהּ
  english_pob_choice: its hinge
  chosen_spanish: su quicio
  alternatives_spanish:
  - su bisagra
  - su eje
  lexicon: HALOT
  rationale: El término hebreo puede referirse al pivote o punto de giro de la puerta. 'Quicio' comunica bien en español la pieza o punto sobre el que gira una puerta, sin imponer una lectura demasiado técnica.
- source_word: וְעָצֵל
  english_pob_choice: and a sluggard
  chosen_spanish: el perezoso
  alternatives_spanish:
  - y un holgazán
  - y el perezoso
  lexicon: HALOT
  rationale: Para el término sapiencial עָצֵל, 'perezoso' es claro y fiel en español. Se conserva el valor proverbial del tipo humano descrito, más que una simple cualidad ocasional.
- source_word: מִטָּתוֹ
  english_pob_choice: his bed
  chosen_spanish: su cama
  alternatives_spanish:
  - su lecho
  lexicon: HALOT
  rationale: '''Cama'' es la equivalencia más directa y natural en español moderno. Mantiene la imagen doméstica y proverbial del texto.'
translation_notes:
  revision_awareness: El texto revisa la estructura comparativa hebrea explícitamente con 'Como ... así ...', siguiendo la revisión inglesa que restauró la relación símil/resultado del proverbio. Se evita traducir de manera plana 'y' para no perder la correspondencia retórica.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - '''Perezoso'' conserva el color sapiencial tradicional sin recurrir a ''holgazán'', que sería correcto pero algo menos idiomático en este proverbio.'
  - '''Quicio'' se eligió por su ajuste al campo semántico de un punto de giro de puerta en español; ''bisagra'' sería más técnico y puede sugerir una pieza moderna distinta del imaginario antiguo.'
