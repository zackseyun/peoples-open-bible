translation:
  language: es
  text: Así, todos los días de Enoc fueron trescientos sesenta y cinco años.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: So ... were
  chosen_spanish: Así ... fueron
  alternatives_spanish:
  - Y ... fueron
  - Entonces ... fueron
  lexicon: HALOT
  rationale: La forma narrativa de conclusión en la genealogía se expresa naturalmente en español con «Así», que conserva el valor consecutivo del waw sin forzar un calco sintáctico.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todo el
  - la totalidad de
  lexicon: HALOT
  rationale: Modifica «los días» para indicar la totalidad de la vida de Enoc; «todos» es el equivalente natural en español.
- source_word: יְמֵי
  english_pob_choice: the days of
  chosen_spanish: los días de
  alternatives_spanish:
  - la vida de
  - la duración de la vida de
  lexicon: HALOT
  rationale: Se mantiene la expresión literal de «días de» para preservar el giro hebreo usado en fórmulas genealógicas, sin perder claridad en español.
- source_word: חֲנוֹךְ
  english_pob_choice: Enoch
  chosen_spanish: Enoc
  lexicon: Nombres propios bíblicos
  rationale: Nombre propio transliterado al español estándar bíblico.
- source_word: חָמֵשׁ וְשִׁשִּׁים
  english_pob_choice: sixty-five
  chosen_spanish: sesenta y cinco
  alternatives_spanish:
  - cinco y sesenta
  lexicon: HALOT
  rationale: El hebreo presenta primero la unidad y luego la decena; en español moderno la forma natural y fiel es invertir el orden a «sesenta y cinco».
- source_word: וּשְׁלֹשׁ מֵאוֹת
  english_pob_choice: three hundred
  chosen_spanish: trescientos
  alternatives_spanish:
  - trescientas
  lexicon: HALOT
  rationale: Cardinal simple equivalente al hebreo «trescientos». Se usa la forma masculina porque concuerda con el sustantivo implícito «años».
- source_word: שָׁנָה ... שָׁנָה
  english_pob_choice: years
  chosen_spanish: años
  alternatives_spanish:
  - años de vida
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular con numerales en esta construcción, en español la forma idiomática es el plural «años». La expresión completa funciona como fórmula de duración de vida.
translation_notes:
  revision_awareness: El texto inglés POB y el control de revisión reciente coinciden sin cambios sustanciales; la versión española sigue esa lectura de alta concordancia y no introduce variantes textuales ni tensiones teológicas nuevas.
  spanish_consistency_notes:
  - Se mantiene el nombre bíblico en forma española «Enoc», consistente con el uso habitual en la Biblia en español.
  - Se conserva la fórmula genealógica breve y sobria del original, sin expandirla a una paráfrasis explicativa.
  - No se usa «SEÑOR» ni terminología teológica especial porque el versículo no contiene referencias al nombre divino ni a títulos teológicos sensibles.
