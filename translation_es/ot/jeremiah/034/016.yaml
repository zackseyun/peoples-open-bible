review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del hebreo: reversión de la acción previa, profanación del nombre divino, recuperación de los esclavos previamente liberados, y re-sometimiento a esclavitud. Sin embargo, varias formulaciones españolas no representan con suficiente naturalidad o precisión el sentido auditado: «tomó de vuelta» debería ir en plural y suena poco idiomático; «para su propia voluntad» no comunica bien el valor idiomático de לְנַפְשָׁם; y «para que fueran para ustedes» es torpe y menos fiel que una construcción posesiva más natural. También conviene simplificar «esclavo varón / esclavos varones» a «esclavo / esclavos», ya que en español el masculino ya marca el contraste con «esclava / esclavas».'
  spanish_quality_summary: 'La legibilidad general es aceptable, pero hay varios giros poco naturales o calcados del inglés/hebreo: «tomó de vuelta» con sujeto plural, «para su propia voluntad», y «fueran para ustedes». Además, la frase final mejora notablemente con «como esclavo y esclava de ustedes» o equivalente posesivo natural. El registro puede mantenerse digno y moderno con ajustes menores.'
  glossary_alignment: El borrador sí respeta la política central de traducir términos de servidumbre con «esclavo/esclava» y mantiene «profanaron mi nombre». No hay conflicto con Yahvé en este versículo. La distinción de género puede preservarse sin recurrir a «varón», que suena innecesariamente forzado en español. Las notas a y b son redundantes si el texto revisado usa «esclavo / esclava» de forma transparente; debe mantenerse la nota sobre לְנַפְשָׁם, ajustada al español revisado.
  issues:
  - severity: medium
    issue: «tomó de vuelta» no concuerda con «ustedes» y además suena poco idiomático
    rationale: וַתָּשִׁבוּ es 2mp; en español debe ser «tomaron de vuelta» o mejor «recobraron / tomaron de nuevo». La forma singular actual es incorrecta.
  - severity: medium
    issue: «para su propia voluntad» no expresa bien el sentido idiomático de לְנַפְשָׁם
    rationale: La evidencia y la nota inglesa indican ‘a su propia disposición / según su propio deseo’, no una construcción española extraña con «para su propia voluntad».
  - severity: medium
    issue: «para que fueran para ustedes» es un calco poco natural
    rationale: לִהְיוֹת לָכֶם expresa estado resultante y relación posesiva. En español natural conviene «para que fueran sus esclavos y esclavas» o «como esclavo y esclava de ustedes».
  - severity: low
    issue: «esclavo varón / esclavos varones» es innecesariamente pesado en español
    rationale: El contraste de género ya queda claro con «esclavo ... esclava» y «esclavos ... esclavas». Añadir «varón» aquí suena forzado sin aportar claridad real.
  - severity: low
    issue: Las notas a y b son prescindibles en la revisión
    rationale: No preservan una alternativa significativa del inglés ni resuelven una ambigüedad nueva en español; la única nota realmente útil es la de לְנַפְשָׁם.
