translation:
  language: es
  text: Y hubo contienda entre los cuidadores del ganado de Abram y los cuidadores del ganado de Lot. Y el cananeo y el ferezeo[a] habitaban entonces en la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los cananeos y los ferezeos». El hebreo usa etnónimos singulares de manera colectiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And there was
  chosen_spanish: Y hubo
  alternatives_spanish:
  - Y aconteció
  - Y había
  lexicon: HALOT
  rationale: El hebreo introduce el hecho narrativo con un verbo existencial simple. «Hubo» conserva bien ese valor y suena natural en español sin volverlo una paráfrasis.
- source_word: רִיב
  english_pob_choice: strife
  chosen_spanish: contienda
  alternatives_spanish:
  - disputa
  - pleito
  - riña
  lexicon: HALOT
  rationale: «Contienda» expresa conflicto o disputa interpersonal con un tono adecuado para la tensión entre los dos grupos. Mantiene más peso que «riña» y evita una lectura demasiado técnica de «pleito».
- source_word: רֹעֵי
  english_pob_choice: herdsmen
  chosen_spanish: pastores
  alternatives_spanish:
  - ganaderos
  - vaqueros
  - cuidadores
  lexicon: HALOT
  rationale: Aunque «pastores» puede sugerir ovejas, en español bíblico es el equivalente más reconocible para los cuidadores del ganado. Aquí se complementa con «del ganado» para evitar ambigüedad.
- source_word: מִקְנֵה
  english_pob_choice: livestock
  chosen_spanish: ganado
  alternatives_spanish:
  - hato
  - rebaño
  - bienes
  lexicon: HALOT
  rationale: «Ganado» comunica de forma natural el conjunto de animales domésticos al que alude מִקְנֶה. «Hato» sería más regional; «bienes» perdería el sentido animal.
- source_word: בֵּין ... וּבֵין
  english_pob_choice: between ... and
  chosen_spanish: entre ... y
  alternatives_spanish:
  - en medio de ... y
  - entre ... e
  lexicon: HALOT
  rationale: La correlación preposicional se refleja de manera directa con «entre ... y», que reproduce la estructura bilateral del conflicto.
- source_word: וְהַכְּנַעֲנִי וְהַפְּרִזִּי
  english_pob_choice: the Canaanite and the Perizzite
  chosen_spanish: el cananeo y el ferezeo
  alternatives_spanish:
  - los cananeos y los ferezeos
  - el canaanita y el perizita
  lexicon: HALOT
  rationale: Se conserva el singular colectivo de los etnónimos, como en el hebreo y en la decisión inglesa. «Ferezeo» es la forma tradicional en español bíblico para פְּרִזִּי; se prefiere aquí por fidelidad y reconocimiento eclesial.
- source_word: אָז
  english_pob_choice: at that time
  chosen_spanish: entonces
  alternatives_spanish:
  - en aquel tiempo
  - por entonces
  lexicon: HALOT
  rationale: «Entonces» traduce con concisión el marcador temporal y encaja bien al final de la cláusula, como en la revisión inglesa más idiomática.
- source_word: יֹשֵׁב
  english_pob_choice: were dwelling
  chosen_spanish: habitaban
  alternatives_spanish:
  - estaban habitando
  - moraban
  - vivían
  lexicon: HALOT
  rationale: El participio presenta una situación durativa. «Habitaban» conserva la continuidad de la acción y evita una perífrasis pesada en español.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la región
  lexicon: HALOT
  rationale: Se mantiene «la tierra» para respetar la resonancia geográfica y narrativa de Génesis, tal como la auditoría inglesa preserva «the land».
theological_decisions:
- issue: Alcance colectivo de los etnónimos con artículo singular
  english_pob_reading: the Canaanite and the Perizzite
  chosen_spanish_reading: el cananeo y el ferezeo
  alternative_spanish_readings:
  - los cananeos y los ferezeos
  rationale: El hebreo usa etnónimos singulares con artículo de valor colectivo. La traducción singular conserva esa forma y evita diluir la observación textual documentada por el POB en inglés.
  doctrine_reference: Translation philosophy §1, §5
- issue: Resonancia de הָאָרֶץ
  english_pob_reading: the land
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el país
  - la región
  rationale: En Génesis, «la tierra» puede llevar una resonancia narrativa y covenantal. Aunque aquí el sentido es descriptivo, mantener «tierra» evita aplanar ese posible trasfondo.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La redacción sigue de cerca el cierre revisado del inglés («were dwelling in the land at that time»), colocando el marcador temporal en español de forma natural con «entonces» al final de la cláusula. Se conserva además la lectura colectiva singular de los etnónimos, sin forzar el plural.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton en el proyecto, pero este versículo no lo contiene.
  - Se mantiene «la tierra» como término narrativo estándar de Génesis.
  - Se evita «SEÑOR» y también una traducción excesivamente literal de «herdsmen» que suene anglocéntrica.
  - «Contienda» y «habitaban» conservan un registro bíblico claro y moderno.
