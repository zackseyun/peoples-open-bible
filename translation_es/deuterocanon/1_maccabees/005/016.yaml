translation:
  language: es
  text: Cuando Judas y el pueblo oyeron[a] estas palabras, se reunió una gran asamblea para deliberar qué debían hacer por sus hermanos[b], que estaban en angustia y eran atacados por ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «escucharon estos informes» / «estas cosas»; el griego dice literalmente «estas palabras».
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» aquí se refiere a sus compañeros del pueblo judío que estaban bajo presión.
    reason: cultural_note
lexical_decisions:
- source_word: Ὡς δὲ ἤκουσεν
  english_pob_choice: When ... heard
  chosen_spanish: Cuando ... oyeron
  alternatives_spanish:
  - Ahora cuando ... oyeron
  - Y cuando ... oyeron
  - Tan pronto como ... oyeron
  lexicon: LSJ
  rationale: La cláusula temporal introductoria se expresa de manera natural con «Cuando». «Oyeron» conserva el aoristo narrativo sin forzar una reiteración estilística.
- source_word: Ἰούδας
  english_pob_choice: Judas
  chosen_spanish: Judas
  alternatives_spanish:
  - Judá
  lexicon: LSJ
  rationale: Como nombre propio en 1 Macabeos, corresponde la transliteración «Judas», no la traducción «Judá».
- source_word: ὁ λαός
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  - el pueblo reunido
  lexicon: LSJ
  rationale: En este contexto se refiere al conjunto del pueblo judío unido a Judas, no a una unidad militar técnica. «El pueblo» mantiene el sentido colectivo de forma clara en español.
- source_word: τοὺς λόγους τούτους
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estos informes
  - estas cosas
  lexicon: LSJ
  rationale: λόγοι puede significar «palabras», «mensaje» o «informe». Dado que el griego dice literalmente «estas palabras», se conserva esa forma en español, que además suena natural.
- source_word: ἐπισυνήχθη
  english_pob_choice: gathered
  chosen_spanish: se reunió
  alternatives_spanish:
  - se congregó
  - se juntó
  - se ensambló
  lexicon: LSJ
  rationale: La forma pasiva/deponente expresa que la asamblea llegó a reunirse. «Se reunió» es natural y fiel al movimiento del texto.
- source_word: ἐκκλησία μεγάλη
  english_pob_choice: a great assembly
  chosen_spanish: una gran asamblea
  alternatives_spanish:
  - una gran congregación
  - una gran reunión
  lexicon: LSJ
  rationale: En este contexto judío precristiano, ἐκκλησία significa asamblea reunida, no «iglesia». «Asamblea» preserva el sentido público y el matiz formal; «gran» mantiene μεγάλη.
- source_word: βουλεύσασθαι
  english_pob_choice: to consider
  chosen_spanish: para deliberar
  alternatives_spanish:
  - para considerar
  - para tomar consejo
  - para decidir
  lexicon: LSJ
  rationale: El infinitivo indica el propósito de la reunión. «Deliberar» recoge mejor la idea de consejo y examen conjunto que un simple «considerar».
- source_word: τί ποιήσωσιν
  english_pob_choice: what they should do
  chosen_spanish: qué debían hacer
  alternatives_spanish:
  - qué harían
  - qué hacer
  lexicon: LSJ
  rationale: El sentido deliberativo se expresa bien con «qué debían hacer», que en español comunica decisión práctica bajo consulta.
- source_word: τοῖς ἀδελφοῖς αὐτῶν
  english_pob_choice: for their brothers
  chosen_spanish: por sus hermanos
  alternatives_spanish:
  - por sus hermanos y hermanas
  - por sus parientes
  - por sus compatriotas
  lexicon: LSJ
  rationale: ἀδελφοῖς es el término de parentesco masculino usado por el texto. Se conserva «hermanos»; el alcance étnico/comunitario queda implícito por el contexto histórico, como en el audit trail inglés.
- source_word: τοῖς οὖσιν ἐν θλίψει
  english_pob_choice: who were in distress
  chosen_spanish: que estaban en angustia
  alternatives_spanish:
  - que estaban en aflicción
  - que estaban en tribulación
  - que estaban en apuro
  lexicon: LSJ
  rationale: θλίψις puede ser «presión», «aflicción» o «distress». «Angustia» es un equivalente claro en español contemporáneo y conserva la seriedad de la situación.
- source_word: πολεμουμένοις ὑπʼ αὐτῶν
  english_pob_choice: being attacked by them
  chosen_spanish: eran atacados por ellos
  alternatives_spanish:
  - eran combatidos por ellos
  - estaban siendo atacados por ellos
  - eran guerreado[s] por ellos
  lexicon: LSJ
  rationale: El participio pasivo indica hostilidad bélica real. «Eran atacados por ellos» transmite el sentido de forma idiomática y suficientemente fuerte sin perder la referencia militar.
theological_decisions:
- issue: Renderización de ἐκκλησία en contexto judío precristiano
  english_pob_reading: assembly
  chosen_spanish_reading: asamblea
  alternative_spanish_readings:
  - congregación
  - reunión
  rationale: Se evita toda connotación eclesial posterior de «iglesia». «Asamblea» refleja mejor el cuerpo público reunido para deliberar.
  doctrine_reference: DOCTRINE.md §Translation philosophy, original-language primacy and readable modern Spanish
- issue: Alcance de ἀδελφοῖς en una referencia comunitaria
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - compatriotas
  - correligionarios
  rationale: Se conserva la forma masculina del término fuente, siguiendo el criterio de fidelidad lexical. El sentido más amplio de miembros del mismo pueblo queda comunicado por el contexto.
  doctrine_reference: DOCTRINE.md §Translation philosophy, gender-accurate over gender-neutral
translation_notes:
  revision_awareness: El pasaje coincide con la lectura inglesa auditada y no requiere correcciones sustantivas; se mantiene la equivalencia óptima ya aprobada, con ajuste natural al español y sin introducir interpretaciones nuevas.
  spanish_consistency_notes:
  - Se usa «Yahvé» como terminología por defecto en este proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene «asamblea» para ἐκκλησία, evitando la carga eclesiástica de «iglesia».
  - Se conserva «hermanos» por fidelidad al término griego ἀδελφοῖς, con nota explicativa del alcance comunitario.
  - La puntuación y el orden responden al flujo narrativo del griego y a la legibilidad moderna en español.
