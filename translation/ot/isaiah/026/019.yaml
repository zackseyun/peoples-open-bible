id: ISA.26.19
reference: Isaiah 26:19
source:
  edition: WLC
  text: יִֽחְי֣וּ מֵתֶ֔י/ךָ נְבֵלָתִ֖/י יְקוּמ֑וּ/ן הָקִ֨יצוּ וְ/רַנְּנ֜וּ שֹׁכְנֵ֣י עָפָ֗ר כִּ֣י טַ֤ל אוֹרֹת֙ טַלֶּ֔/ךָ וָ/אָ֖רֶץ רְפָאִ֥ים תַּפִּֽיל׃ס
translation:
  text: Your dead will live[a]; my dead bodies will rise. Awake and shout for joy, you who dwell in the dust! For your dew is a dew of lights[c][b], and the earth will cast out the dead.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my dead body will rise'; the Hebrew reads 'my corpse' with a first-person suffix, but the plural verb suggests a collective sense, hence 'my corpses.'
    reason: lexical_alternative
  - marker: b
    text: Or 'your dew is a dew of light' or 'radiant dew.' The Hebrew expression is difficult and may evoke life-giving, light-filled dew.
    reason: lexical_alternative
  - marker: c
    text: Or 'the earth will cast out the shades.' The Hebrew רְפָאִים can denote the departed dead, often pictured as shadowy inhabitants of the underworld.
    reason: alternative_reading
lexical_decisions:
- source_word: מֵתֶיךָ
  chosen: your dead
  alternatives:
  - your dead ones
  lexicon: HALOT
  rationale: Construct plural of 'dead' with 2ms suffix. 'Your dead' is idiomatic and preserves the direct address to God or Zion without adding interpretation.
- source_word: נבלתי
  chosen: my corpses
  alternatives:
  - my dead body
  - my dead ones
  lexicon: HALOT
  rationale: נְבֵלָה commonly denotes a corpse/carcass. The plural verb יקומון favors understanding the singular form with 1cs suffix as a collective or textual singular with plural sense. 'My corpses' best reflects the consonantal text's sense in context while preserving the first-person suffix.
- source_word: יקומון
  chosen: will rise
  alternatives:
  - will arise
  - will stand up
  lexicon: HALOT
  rationale: Qal of קום in resurrection context is naturally 'rise.' This keeps the parallel with 'will live' and avoids over-literal stiffness.
- source_word: הקיצו
  chosen: Awake
  alternatives:
  - Wake up
  lexicon: HALOT
  rationale: Imperative calling the dust-dwellers to awaken from death-like sleep. 'Awake' fits prophetic and resurrection diction in readable modern English.
- source_word: ורננו
  chosen: shout for joy
  alternatives:
  - sing for joy
  - cry out joyfully
  lexicon: HALOT
  rationale: רן/רנן often conveys jubilant exultation. 'Shout for joy' is vivid and natural in English, though 'sing for joy' is possible.
- source_word: שכני עפר
  chosen: you who dwell in the dust
  alternatives:
  - dwellers in the dust
  - you who live in the dust
  lexicon: HALOT
  rationale: Participial phrase addressing the dead in the grave. 'Dwell in the dust' preserves the metaphor and direct address.
- source_word: טל אורות
  chosen: a dew of lights
  alternatives:
  - dew of light
  - radiant dew
  lexicon: HALOT
  rationale: The plural אוֹרוֹת is difficult. A relatively formal rendering preserves the Hebrew imagery without prematurely resolving whether the sense is 'light,' 'brightness,' or life-giving heavenly radiance.
- source_word: רפאים
  chosen: the dead
  alternatives:
  - the shades
  - the departed spirits
  - Rephaim
  lexicon: HALOT
  rationale: In this context רְפָאִים refers to the dead in Sheol, not the ethnic Rephaim. 'The dead' communicates the sense clearly in modern English; the more literal 'shades' is preserved in a footnote.
- source_word: תפיל
  chosen: will cast out
  alternatives:
  - will bring forth
  - will let fall
  lexicon: HALOT
  rationale: Hiphil of נפל here likely means the earth will cause the dead to fall out, i.e., expel or give them up. 'Cast out' preserves the forceful image better than the smoother but more interpretive 'give birth to' or 'bring forth'.
