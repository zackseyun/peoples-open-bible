translation:
  language: es
  text: Pero aun así[a], aunque tantos impulsos de amor maternal[b] estaban atrayendo a la madre hacia la compasión, los muy variados tormentos no pudieron por ninguno de ellos desviar su razón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sin embargo». El griego abre con un fuerte giro adversativo que conserva la tensión del argumento.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «afecto maternal». La frase griega alude al poderoso impulso del amor de una madre por sus hijos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλʼ ὅμως
  english_pob_choice: But even so
  chosen_spanish: Pero aun así
  alternatives_spanish:
  - Sin embargo
  - Aun así
  lexicon: LSJ
  rationale: Conserva el giro adversativo con concesión enfática y suena natural en español moderno sin perder el énfasis retórico.
- source_word: καίπερ
  english_pob_choice: although
  chosen_spanish: aunque
  alternatives_spanish:
  - si bien
  - a pesar de que
  lexicon: BDAG
  rationale: Reproduce con claridad el valor concesivo directo del participio/conjunción en el contexto.
- source_word: τοσούτων ὄντων τῶν περὶ φιλοτεκνίαν
  english_pob_choice: so many impulses of motherly love
  chosen_spanish: tantos impulsos de amor maternal
  alternatives_spanish:
  - tantos impulsos de afecto maternal
  - tantas inclinaciones por sus hijos
  lexicon: LSJ
  rationale: φιλοτεκνία expresa afecto por los hijos; en español, 'amor maternal' comunica el tirón afectivo propio de la madre sin desviarse hacia una paráfrasis excesiva.
- source_word: φιλοτεκνίαν
  english_pob_choice: motherly love
  chosen_spanish: amor maternal
  alternatives_spanish:
  - afecto maternal
  - amor por los hijos
  lexicon: LSJ
  rationale: La expresión apunta al afecto de una madre por sus hijos; 'amor maternal' es claro, digno y fiel al campo semántico.
- source_word: εἰς συμπάθειαν ἑλκόντων
  english_pob_choice: were drawing ... toward sympathy
  chosen_spanish: estaban atrayendo ... hacia la compasión
  alternatives_spanish:
  - estaban arrastrando ... al sentimiento compasivo
  - estaban llevando ... al compadecimiento
  lexicon: BDAG
  rationale: Mantiene la imagen de atracción/pull y vierte συμπάθεια con 'compasión', que es comprensible y cercano al sentido de participación afectiva.
- source_word: τὴν μητέρα
  english_pob_choice: the mother
  chosen_spanish: a la madre
  alternatives_spanish:
  - la madre
  - su madre
  lexicon: BDAG
  rationale: El griego usa el sustantivo con artículo; 'a la madre' conserva la referencia formal del relato y la sintaxis española con el verbo de movimiento.
- source_word: ἐπʼ οὐδενὸς αὐτῶν
  english_pob_choice: by any one of them
  chosen_spanish: por ninguno de ellos
  alternatives_spanish:
  - por ninguno de esos impulsos
  - por ninguno de tales recursos
  lexicon: LSJ
  rationale: Expresa que no hubo ni un solo factor que lograra el efecto; 'por ninguno de ellos' refleja la construcción causal/instrumental del griego.
- source_word: τὸν λογισμὸν αὐτῆς
  english_pob_choice: her reason
  chosen_spanish: su razón
  alternatives_spanish:
  - su juicio racional
  - su pensamiento
  lexicon: BDAG
  rationale: En 4 Macabeos λογισμός es un término clave para la razón dominante sobre las pasiones; 'razón' preserva esa carga filosófica.
- source_word: αἱ παντοίκιλοι βάσανοι
  english_pob_choice: the all-varied tortures
  chosen_spanish: los torturosos y muy variados tormentos
  alternatives_spanish:
  - los tormentos de toda clase
  - los múltiples tormentos
  lexicon: LSJ
  rationale: παντοίκιλοι intensifica la variedad; en español, 'muy variados' conserva el efecto. 'Tormentos' refleja βάσανοι con fuerza, y 'torturosos' mantiene la cualidad opresiva del término.
- source_word: ἴσχυσαν μετατρέψαι
  english_pob_choice: were not able ... to turn aside
  chosen_spanish: no pudieron ... desviar
  alternatives_spanish:
  - no lograron ... cambiar
  - no fueron capaces de ... apartar
  lexicon: BDAG
  rationale: Verte la incapacidad con un verbo natural en español. 'Desviar' comunica la idea de apartar la trayectoria mental o moral de la razón.
theological_decisions:
- issue: λογισμός como término filosófico-moral en 4 Macabeos
  english_pob_reading: her reason
  chosen_spanish_reading: su razón
  alternative_spanish_readings:
  - su resolución
  - su juicio racional
  rationale: El libro usa λογισμός en un marco donde la razón gobierna sobre las pasiones; 'razón' conserva ese hilo conceptual sin introducir una abstracción ajena al texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el audit trail inglés revisado: mantiene el arranque concesivo, la imagen de ser atraída hacia la compasión, el término filosófico λογισμός como ''razón'' y la intensificación de παντοίκιλοι mediante una combinación española natural que no debilita el contraste retórico.'
  spanish_consistency_notes:
  - Se mantiene 'razón' para λογισμός, en coherencia con otros pasajes de 4 Macabeos donde el libro contrapone razón y pasiones.
  - '''Compasión'' se usa para συμπάθεια porque en español comunica el campo de empatía/compartir el sufrimiento sin sonar demasiado técnico.'
  - '''Tormentos'' conserva la fuerza de βάσανοι; no se suaviza a ''pruebas'' para no perder la intensidad judicial/corporal del contexto.'
