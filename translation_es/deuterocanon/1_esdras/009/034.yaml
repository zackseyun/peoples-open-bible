    text: Varios nombres de este versículo se conservan como transliteraciones muy cercanas al griego, en vez de armonizarlos con formas hebreas más familiares de la tradición paralela, porque el griego de 1 Esdras es la fuente primaria aquí.
    reason: lexical_alternative
  - marker: b
    text: El paralelo del texto hebreo para esta sección es aproximado y no preserva esta misma secuencia completa de nombres en la misma forma; por eso la lista griega gobierna la traducción.
    reason: cross_reference
