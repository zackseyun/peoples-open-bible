revisions:
- from: Porque Dios guiará a Israel con alegría[a], por la luz de su gloria, con misericordia y justicia de parte de él.
  to: Porque Dios conducirá a Israel con alegría, por la luz de su gloria, con misericordia y rectitud[a] que proceden de él.
  rationale: Se revisa para alinear el texto principal con la decisión auditada de la POB sobre δικαιοσύνη como «righteousness», que en este contexto se vierte mejor como «rectitud», dejando «justicia» como alternativa en nota. También se ajusta la nota para preservar la alternativa significativa documentada en inglés, y se mejora levemente la naturalidad y precisión de la cláusula final con «que proceden de él». «Conducirá» refuerza la imagen de liderazgo restaurador de ἡγήσεται sin apartarse del sentido fuente.
