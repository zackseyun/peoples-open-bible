review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la estructura condicional, el nombre divino 'Yahvé', 'la voz', 'mandamientos' y la promesa de exaltación sobre las naciones. Sin embargo, el punto principal del hebreo intensificado אִם שָׁמֹעַ תִּשְׁמַע בְּקוֹל está subtraducido como 'si escuchas con diligencia', lo cual en español puede quedarse en recepción auditiva atenta y no expresa con suficiente claridad la obediencia pactual que el inglés auditado documenta. También conviene marcar más claramente la apódosis con 'entonces'.
  spanish_quality_summary: El español es claro y digno, pero 'escuchas con diligencia la voz' suena algo menos natural y menos preciso que una formulación que combine obediencia y el modismo de la voz. 'Cuidando de poner por obra' funciona bien. Añadir 'entonces' mejora la fluidez lógica. El resto del verso lee bien en español eclesial amplio.
  glossary_alignment: 'Buen alineamiento general con la terminología POB: יְהוָה -> ''Yahvé'', אֱלֹהֶיךָ -> ''tu Dios'', מִצְוֺתָיו -> ''sus mandamientos''. La excepción relevante es el tratamiento del idiomático שָׁמֹעַ תִּשְׁמַע, donde el proyecto favorece una solución que haga explícita la obediencia, no solo la escucha.'
  issues:
  - severity: high
    issue: Subtraducción de אִם שָׁמֹעַ תִּשְׁמַע como 'si escuchas con diligencia'
    rationale: El hebreo intensifica un modismo de escucha obediente; el registro auditado en inglés eligió 'if you diligently obey'. En español, 'escuchar con diligencia' no comunica necesariamente obediencia.
  - severity: medium
    issue: Falta de marcador explícito de la apódosis
    rationale: El hebreo permite inferir la consecuencia, pero el inglés POB añadió 'then' por claridad. En español, 'entonces' ayuda a reflejar mejor la lógica condicional del período.
  - severity: low
    issue: La nota al pie literal puede afinarse
    rationale: '''si al oír oyes'' es entendible, pero ''si de veras escuchas'' o mantener la explicación de ''escucha obediente'' ayuda a conectar mejor la literalidad con el sentido idiomático.'
  revised_spanish_text: Y sucederá[a] que, si obedeces diligentemente la voz de Yahvé tu Dios, cuidando de poner por obra todos sus mandamientos que yo te mando hoy, entonces Yahvé tu Dios te pondrá en alto sobre todas las naciones de la tierra.
  revised_footnotes:
