theological_decisions:
- issue: Evaluation of worship at the high places
  chosen_reading: Retain the historically descriptive term 'high places' without interpretive expansion in the main text.
  alternative_readings:
  - local shrines
  - unauthorized worship sites
  rationale: The verse itself reports that the sites remained and that the people continued sacrificial activity there. It implies disapproved worship in the Deuteronomistic context, but the translation should not import that evaluation by replacing the term with an interpretive gloss in the main text.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve what the text states without importing doctrinal claims.'
