revisions:
- from: Pero yo estableceré mi pacto con Isaac[a], a quien Sara te dará a luz a esta misma época el año que viene.
  to: Pero yo estableceré mi pacto con Isaac[a], a quien Sara te dará un hijo por este tiempo el año que viene.
