translation:
  language: es
  text: 'Y estos fueron los hijos de Oholibamá, hija de Aná, hija de Zibeón, esposa de Esaú: le dio hijos a Esaú, a Jeús, a Jalam y a Corá.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: And these
  chosen_spanish: Y estos
  alternatives_spanish:
  - Ahora estos
  - Estos
  lexicon: HALOT
  rationale: Conserva el enlace narrativo de וְ y el deíctico plural; en español, ‘Y estos’ es natural en una lista genealógica.
- source_word: הָיוּ
  english_pob_choice: were
  chosen_spanish: fueron
  alternatives_spanish:
  - eran
  - habían sido
  lexicon: HALOT
  rationale: En este contexto genealógico, הָיוּ funciona como copulativo en pasado; ‘fueron’ comunica la relación de pertenencia sin sobreinterpretar cambio de estado.
- source_word: בְּנֵי
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - descendientes
  - niños
  lexicon: HALOT
  rationale: El texto nombra varones; ‘hijos’ es la equivalencia natural en español para una genealogía directa.
- source_word: אָהֳלִיבָמָה
  english_pob_choice: Oholibamah
  chosen_spanish: Oholibamá
  alternatives_spanish:
  - Oholibama
  lexicon: Transliteración de nombre propio
  rationale: Se translitera el nombre propio al español con adaptación ortográfica mínima para lectura natural.
- source_word: בַת עֲנָה בַּת צִבְעוֹן
  english_pob_choice: daughter of Anah, daughter of Zibeon
  chosen_spanish: hija de Aná, hija de Zibeón
  alternatives_spanish:
  - hija de Aná, nieta de Zibeón
  lexicon: HALOT
  rationale: Se conserva la repetición de ‘hija de’ para reflejar la estructura genealógica hebrea; no se suaviza a ‘nieta’ porque el hebreo repite la apposición literalmente.
- source_word: אֵשֶׁת עֵשָׂו
  english_pob_choice: Esau's wife
  chosen_spanish: la esposa de Esaú
  alternatives_spanish:
  - la mujer de Esaú
  - la esposa de Esaú
  lexicon: HALOT
  rationale: ‘Esposa’ es el equivalente natural y claro en español para la relación posesiva del hebreo.
- source_word: וַתֵּלֶד לְעֵשָׂו
  english_pob_choice: she bore to Esau
  chosen_spanish: ella dio a luz para Esaú
  alternatives_spanish:
  - ella dio a luz a Esaú
  - ella le dio a luz a Esaú
  lexicon: HALOT
  rationale: La preposición לְ marca relación de procreación ‘para/con respecto a’ Esaú; ‘para Esaú’ preserva esa fuerza relacional mejor que una simple transitividad directa.
- source_word: יעיש
  english_pob_choice: Jeush
  chosen_spanish: Jeús
  alternatives_spanish:
  - Jeush
  lexicon: Transliteración tradicional del nombre
  rationale: Se adopta una forma española natural del nombre propio, manteniendo la identificación con la transliteración inglesa del POB.
- source_word: יַעְלָם
  english_pob_choice: Jalam
  chosen_spanish: Jalam
  alternatives_spanish:
  - Yalam
  lexicon: Transliteración tradicional del nombre
  rationale: Se conserva la forma breve y reconocible del nombre propio en español.
- source_word: קֹרַח
  english_pob_choice: Korah
  chosen_spanish: Coré
  alternatives_spanish:
  - Korah
  lexicon: Transliteración tradicional del nombre
  rationale: Se usa la forma española bíblica ampliamente reconocible, manteniendo la identidad del personaje.
theological_decisions:
- issue: Relación genealógica de la frase repetida ‘hija de’
  english_pob_reading: daughter of Anah, daughter of Zibeon
  chosen_spanish_reading: hija de Aná, hija de Zibeón
  alternative_spanish_readings:
  - hija de Aná, nieta de Zibeón
  rationale: La lectura española debe reflejar la estructura del hebreo sin resolverla interpretativamente; conservar la repetición evita borrar la tensión genealógica del texto.
  doctrine_reference: Precisión textual y genealogía bíblica
- issue: Verbo de nacimiento con לְ
  english_pob_reading: she bore to Esau
  chosen_spanish_reading: ella dio a luz para Esaú
  alternative_spanish_readings:
  - ella dio a luz a Esaú
  - ella le dio a luz a Esaú
  rationale: Se mantiene la relación de pertenencia/procreación indicada por la preposición hebrea, sin convertirla en una simple formulación idiomática que elimine el matiz.
  doctrine_reference: Semántica hebrea del verbo ילד con ל
translation_notes:
  revision_awareness: Se corrige el problema de validación anterior eliminando toda nota marginal y dejando el texto sin marcadores de pie de página; la traducción mantiene la misma base fuente y el mismo nivel de literalidad auditable.
  spanish_consistency_notes:
  - Se usa Oholibamá, Aná y Zibeón con acento gráfico español consistente.
  - Se prefiere ‘hijos’/‘hija’ en genealogías, y ‘dio a luz para’ para conservar el valor relacional del hebreo.
  - Los nombres propios se mantienen en formas españolas bíblicamente reconocibles cuando existen (Jeús, Coré), y transliteradas de manera estable cuando no.
  - No se añaden notas al pie para evitar marcadores no anclados en el texto.
