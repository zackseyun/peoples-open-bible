  spanish_consistency_notes:
  - Se mantiene el nombre divino como Yahvé en todo el versículo.
  - Se usa la forma española bíblica Josías/Amón/Judá para nombres propios y topónimos.
  - 'La cronología queda expresada de manera natural y fiel: en los días de..., en el año trece de su reinado.'
  - No se introducen notas al pie porque el texto fuente y el audit trail no señalan variantes relevantes en este versículo.
