translation:
  language: es
  text: Las almas de los hermanos son cariñosas en sus abrazos[a], y se fortalecen mucho más por la convivencia[b], por la familiaridad diaria y por el resto de su formación[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Las almas fraternas, cariñosas en sus abrazos». La frase griega es condensada y permite relacionar de otro modo «filádelphoi» con «almas».'
    reason: lexical_alternative
  - marker: b
    text: «Por la convivencia» también puede entenderse como «por la compañía» o «por haber sido criados juntos».
    reason: lexical_alternative
  - marker: c
    text: «El resto de su formación» también puede traducirse «su otra educación» o «su formación restante».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐναγκαλισμάτων
  english_pob_choice: in embraces
  chosen_spanish: en los abrazos
  alternatives_spanish:
  - con abrazos
  - en actos de abrazo
  - en el abrazo
  lexicon: LSJ
  rationale: El sustantivo griego designa el acto concreto de abrazar/rodear con los brazos. «En los abrazos» conserva la imagen corporal sin volverla abstracta ni añadir contenido ajeno.
- source_word: φιλάδελφοι
  english_pob_choice: of brothers
  chosen_spanish: de los hermanos
  alternatives_spanish:
  - fraternas
  - de hermanos
  lexicon: LSJ
  rationale: La expresión es literalmente compuesta por «amante de hermanos» y, en este contexto narrativo, se refiere a los hermanos varones. «De los hermanos» mantiene el vínculo familiar explícito sin forzar un adjetivo más interpretativo.
- source_word: ψυχαί
  english_pob_choice: souls
  chosen_spanish: almas
  alternatives_spanish:
  - vidas
  - personas
  - seres
  lexicon: LSJ
  rationale: «Almas» preserva el registro elevado y la carga antropológica del griego mejor que una equivalencia más plana. En esta unidad retórica, el sujeto no es solo el grupo externo, sino su vida interior.
- source_word: αὔξονται
  english_pob_choice: grow
  chosen_spanish: crecen
  alternatives_spanish:
  - aumentan
  - se fortalecen
  - se desarrollan
  lexicon: LSJ
  rationale: El verbo expresa incremento; en español «crecen» funciona bien para una afección o vínculo que se intensifica. Se evita una paráfrasis excesiva.
- source_word: σφοδρότερον
  english_pob_choice: much stronger
  chosen_spanish: mucho más fuertes
  alternatives_spanish:
  - más intensas
  - más vigorosas
  - con mayor fuerza
  lexicon: LSJ
  rationale: El comparativo indica mayor intensidad. Dado que el referente inmediato son las almas afectuosas, «mucho más fuertes» comunica el desarrollo del vínculo sin introducir una violencia semántica innecesaria.
- source_word: διὰ συντροφίας
  english_pob_choice: through living together
  chosen_spanish: por la convivencia
  alternatives_spanish:
  - por la compañía mutua
  - por vivir juntos
  - por la convivencia compartida
  lexicon: LSJ
  rationale: συντροφία puede abarcar convivencia, compañía y haber sido criados juntos. «Convivencia» es natural en español y conserva la idea de vida compartida.
- source_word: τῆς καθʼ ἡμέραν συνηθείας
  english_pob_choice: through daily familiarity
  chosen_spanish: por la familiaridad diaria
  alternatives_spanish:
  - por el trato diario
  - por el contacto cotidiano
  - por la costumbre diaria
  lexicon: LSJ
  rationale: La frase griega apunta a una relación habitual de día en día. «Familiaridad diaria» reproduce la cercanía repetida sin perder la textura relacional.
- source_word: τῆς ἄλλης παιδίας
  english_pob_choice: the rest of their upbringing
  chosen_spanish: el resto de su formación
  alternatives_spanish:
  - su otra educación
  - su formación restante
  - la demás instrucción
  lexicon: LSJ
  rationale: παιδεία puede ser educación, formación o crianza. «Formación» abarca el proceso formativo completo con buena naturalidad en español; «resto de su formación» refleja el artículo definido y la idea de lo adicional/no mencionado.
theological_decisions:
- issue: Marcación del parentesco masculino en un contexto de siete hermanos
  english_pob_reading: brothers
  chosen_spanish_reading: los hermanos
  alternative_spanish_readings:
  - los hermanos y hermanas
  - los hermanos/as
  - los siblings
  rationale: El contexto literario habla de los siete hermanos varones; mantener «los hermanos» evita neutralizar indebidamente una referencia específica del relato.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Mantener ψυχή con su peso antropológico
  english_pob_reading: souls
  chosen_spanish_reading: almas
  alternative_spanish_readings:
  - vidas
  - personas
  - seres interiores
  rationale: La elección conserva la dimensión interior y elevada del término, coherente con el griego y con el tono sapiencial de 4 Macabeos.
  doctrine_reference: DOCTRINE.md §Anthropology and register
translation_notes:
  revision_awareness: La revisión más reciente indicó que el texto permanece sin cambios respecto del pase anterior; aun así, se atendió el aviso de revisión con una formulación española más natural y con notas que preservan las alternativas lexicológicas relevantes del griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto solo cuando el texto lo requiera; este versículo no la requiere.
  - Se conserva el registro elevado con «almas» para ψυχαί, en coherencia con el audit trail en inglés.
  - Se usa «convivencia» para συντροφία y no «compañerismo» como base, dejando esta última como alternativa en nota.
  - Se evita una traducción mecánica del inglés en «the rest of their upbringing»; «el resto de su formación» recoge mejor παιδεία en español actual.
