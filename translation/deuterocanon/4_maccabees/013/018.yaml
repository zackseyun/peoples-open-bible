translation:
  text: And Jacob will welcome you[a], and all the fathers will praise you. And as each one of their brothers was being taken away, those who remained were saying, “Do not disgrace us, brother[b], nor prove false to those who died before us.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'receive you' or 'greet you' for 'welcome you.'
    reason: lexical_alternative
  - marker: b
    text: Or 'nor make false those who died before us,' i.e., do not betray the witness of the brothers who have already died.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑποδέξονται
  chosen: will welcome
  alternatives:
  - will receive
  - will greet
  lexicon: LSJ
  rationale: The future middle of ὑποδέχομαι commonly means to receive or welcome someone hospitably. 'Welcome' best conveys the warm, honorific reception envisioned from Jacob in the afterlife context.
- source_word: οἱ πατέρες
  chosen: the fathers
  alternatives:
  - the ancestors
  lexicon: LSJ
  rationale: Literally 'the fathers.' In this context it refers to the revered patriarchal forebears. 'The fathers' preserves the source wording and its honorific, ancestral force better than the more interpretive 'ancestors.'
- source_word: ἐπαινέσουσιν
  chosen: will praise
  alternatives:
  - will commend
  lexicon: LSJ
  rationale: The verb means to praise or commend. 'Will praise' is the more direct and natural English rendering in this exalted context.
- source_word: ἐνὶ ἑκάστῳ
  chosen: as each one
  alternatives:
  - to each one
  - with each one
  lexicon: LSJ
  rationale: The phrase introduces the repeated circumstance for each brother in turn. Rendering it idiomatically as 'as each one' fits the narrative flow in English while preserving distributive force.
- source_word: τῶν ἀποσπωμένων
  chosen: was being dragged away
  alternatives:
  - was being torn away
  - was being led away
  lexicon: LSJ
  rationale: ἀποσπάω can mean to pull or tear away forcibly. Given the martyrdom setting, 'being dragged away' best reflects the coercive violence implied.
- source_word: οἱ περιλειπόμενοι
  chosen: those who remained
  alternatives:
  - the survivors
  - those left behind
  lexicon: LSJ
  rationale: The participle denotes the brothers still remaining at that moment. 'Those who remained' is precise and avoids implying final survival beyond the immediate scene.
- source_word: Μὴ καταισχύνῃς ἡμᾶς
  chosen: Do not disgrace us
  alternatives:
  - Do not shame us
  lexicon: LSJ
  rationale: καταισχύνω means to put to shame or disgrace. 'Disgrace' carries the public-honor dimension strongly in this martyrdom exhortation.
- source_word: μηδὲ ψεύσῃ τοὺς προαποθανόντας
  chosen: nor prove false to those who have died before us
  alternatives:
  - nor betray those who died before us
  - nor make liars of those who died before us
  lexicon: LSJ
  rationale: The verb ψεύδω/ψεύδομαι can mean to lie, deceive, or prove false. Here the sense is not merely verbal lying but failing the example/testimony of the earlier martyrs. 'Prove false to' preserves that relational and testimonial nuance without overparaphrasing.
