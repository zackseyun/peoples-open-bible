translation:
  language: es
  text: Con él[a], los rubenitas y los gaditas recibieron su herencia, que Moisés les dio al otro lado del Jordán, hacia el oriente, tal como se la dio Moisés, siervo de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «al otro lado del Jordán, hacia el oriente», es decir, del lado oriental del Jordán.'
    reason: cultural_note
lexical_decisions:
- source_word: עִמּוֹ
  english_pob_choice: With him
  chosen_spanish: Con él
  alternatives_spanish:
  - Junto con él
  - Con eso
  lexicon: HALOT
  rationale: El sufijo de 3ms se entiende por el contexto como una referencia personal; en español, 'con él' es natural y conserva la referencia anafórica sin sobreexplicarla.
- source_word: הָרְאוּבֵנִי
  english_pob_choice: the Reubenites
  chosen_spanish: los rubenitas
  alternatives_spanish:
  - el rubenita
  - los de Rubén
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular gentilicia, funciona colectivamente para la tribu; el plural colectivo 'los rubenitas' es natural y preciso en español.
- source_word: וְהַגָּדִי
  english_pob_choice: and the Gadites
  chosen_spanish: y los gaditas
  alternatives_spanish:
  - y el gadita
  - y los de Gad
  lexicon: HALOT
  rationale: Como en el caso anterior, el gentilicio singular tiene sentido colectivo; 'los gaditas' mantiene el valor tribal sin introducir paráfrasis.
- source_word: לָקְחוּ נַחֲלָתָם
  english_pob_choice: received their inheritance
  chosen_spanish: recibieron su herencia
  alternatives_spanish:
  - tomaron su herencia
  - obtuvieron su herencia
  - recibieron su posesión
  lexicon: HALOT
  rationale: לקחו puede ser 'tomaron/recibieron'. En este contexto de reparto de tierra, 'recibieron' comunica bien la recepción de la herencia sin perder la idea de asignación; 'herencia' conserva la carga de נחלה como porción heredada.
- source_word: אֲשֶׁר נָתַן לָהֶם מֹשֶׁה
  english_pob_choice: which Moses gave them
  chosen_spanish: que Moisés les dio
  alternatives_spanish:
  - que Moisés había dado
  - que Moisés les había dado
  lexicon: HALOT
  rationale: El hebreo presenta una concesión ya realizada; el pretérito simple en español funciona bien en narrativa y se mantiene cercano al texto.
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  english_pob_choice: beyond the Jordan
  chosen_spanish: al otro lado del Jordán
  alternatives_spanish:
  - más allá del Jordán
  - en la otra ribera del Jordán
  lexicon: HALOT
  rationale: La expresión idiomática española 'al otro lado del Jordán' transmite la ubicación sin sonar calcada; conserva la referencia geográfica del hebreo.
- source_word: מִזְרָחָה
  english_pob_choice: eastward
  chosen_spanish: hacia el oriente
  alternatives_spanish:
  - al oriente
  - hacia el este
  lexicon: HALOT
  rationale: '''Hacia el oriente'' es claro y digno en español bíblico contemporáneo; mantiene el valor direccional de la forma adverbial.'
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - como
  - según como
  lexicon: HALOT
  rationale: '''Tal como'' expresa adecuadamente la conformidad o correspondencia con el acto previo de Moisés.'
- source_word: עֶבֶד יְהוָה
  english_pob_choice: the servant of Yahweh
  chosen_spanish: siervo de Yahvé
  alternatives_spanish:
  - siervo de Yahvé Dios
  - servidor de Yahvé
  lexicon: HALOT
  rationale: '''Siervo'' conserva el título honorífico tradicional del hebreo עֶבֶד en esta fórmula, sin forzar la idea de esclavitud en un contexto de designación ministerial. ''Yahvé'' sigue el criterio POB para el nombre divino.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre divino conforme al criterio doctrinal del proyecto; 'Yahvé' preserva el nombre personal del pacto sin sustitución por un título.
theological_decisions:
- issue: Renderización del nombre divino יהוה en la fórmula final
  english_pob_reading: the servant of Yahweh
  chosen_spanish_reading: siervo de Yahvé
  alternative_spanish_readings:
  - siervo del SEÑOR
  - siervo de Jehová
  rationale: El texto hebreo termina con יהוה; el proyecto POB distingue el nombre propio divino del título 'Señor'. En español, 'Yahvé' preserva esa distinción y sigue la política del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La redacción sigue el sentido revisado del inglés POB en el que לָקְחוּ se entiende como 'received' en este contexto de herencia, y conserva la aclaración geográfica añadida para בְּעֵבֶר הַיַּרְדֵּן / מִזְרָחָה. También respeta la decisión terminológica de usar 'Yahvé' para יהוה.
  spanish_consistency_notes:
  - Se mantuvo un español bíblico moderno y natural, evitando calcos innecesarios como 'más allá' si podían sonar menos idiomáticos.
  - '''Herencia'' se usó para נחלה por su valor técnico-covenantal en el reparto de la tierra.'
  - El inciso final 'siervo de Yahvé' conserva el paralelismo con el hebreo sin añadir matices de esclavitud ajenos al título honorífico.
