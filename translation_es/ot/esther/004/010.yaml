translation:
  language: es
  text: Entonces Ester habló a Hatac y le mandó que fuera a Mardoqueo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «Entonces Ester dijo a Hatac y le mandó a Mardoqueo». El hebreo implica que le dio a Hatac la instrucción de ir a Mardoqueo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: Then Esther spoke
  chosen_spanish: Entonces Ester habló
  alternatives_spanish:
  - Entonces Ester dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración y se refleja naturalmente con «Entonces». Para אמר, «habló» conserva el valor de acto de decir/comunicar y encaja con el complemento dativo «a Hatac» en español.
- source_word: אֶסְתֵּר
  english_pob_choice: Esther
  chosen_spanish: Ester
  alternatives_spanish:
  - Esther
  lexicon: Nombre propio transliterado
  rationale: Se translitera el nombre según uso español bíblico común, sin añadir una h muda que no corresponde a la grafía española usual.
- source_word: לַהֲתָךְ
  english_pob_choice: to Hathach
  chosen_spanish: a Hatac
  alternatives_spanish:
  - a Hathac
  - a Hatac
  lexicon: Nombre propio transliterado
  rationale: El hebreo marca el destinatario de la խոսة con ל; en español se expresa con «a». Se adapta el nombre propio a una forma castellana legible, manteniendo la identificación del personaje.
- source_word: וַתְּצַוֵּהוּ
  english_pob_choice: and commanded him
  chosen_spanish: y le mandó
  alternatives_spanish:
  - y le ordenó
  - y le dio la orden
  lexicon: HALOT
  rationale: צוה tiene fuerza de mandato/encargo. «Le mandó» preserva esa fuerza con naturalidad en español y mantiene el referente pronominal en Hatac.
- source_word: אֶל
  english_pob_choice: to go to
  chosen_spanish: que fuera a
  alternatives_spanish:
  - para que fuera a
  - a
  lexicon: HALOT
  rationale: 'El hebreo concentra la dirección de la comisión hacia Mardoqueo. En español, para conservar el sentido implícito del inglés auditado sin sobrerexpandirlo, se explicita con una subordinada final/completiva: «que fuera a».'
- source_word: מָרְדֳּכָי
  english_pob_choice: Mordecai
  chosen_spanish: Mardoqueo
  alternatives_spanish:
  - Mardoqueo
  - Mordecai
  lexicon: Nombre propio transliterado
  rationale: Se usa la forma tradicional y ampliamente reconocible en español bíblico, compatible con la transparencia del texto y la inteligibilidad para lectores de iglesia.
translation_notes:
  revision_awareness: El inglés auditado opta por una expansión mínima («commanded him to go to») para hacer explícita la dirección implícita en אֶל. La versión española sigue la misma solución interpretativa, pero la formula con una subordinada natural («que fuera a») en lugar de calcar la preposición. No hay revisiones posteriores que alteren el sentido.
  spanish_consistency_notes:
  - Se mantiene el avance narrativo con «Entonces».
  - Se conserva la fuerza directiva de צוה con «mandó», no con un término más débil como «pidió».
  - Se explicita en nota la implicación del hebreo sin convertirla en una paráfrasis más amplia dentro del texto principal.
  - Los nombres propios se adaptan a formas españolas bíblicas comunes para asegurar legibilidad y consistencia.
