  - severity: medium
    issue: El texto principal no marca la cláusula final para la nota alternativa necesaria.
    rationale: Si se conserva la nota lexical sobre la determinación del mal/calamidad, debe aparecer un marcador en la frase final correspondiente dentro de spanish_text.
  - severity: low
