translation:
  language: es
  text: Cuando Moisés terminó de hablar con ellos[a], puso un velo sobre su rostro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cesó de hablar con ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְכַל
  english_pob_choice: finished
  chosen_spanish: terminó
  alternatives_spanish:
  - acabó
  - cesó
  lexicon: HALOT
  rationale: El verbo כלה en este contexto marca la conclusión de la acción de hablar. «Terminó» conserva bien la idea de finalización y suena natural en español contemporáneo.
- source_word: מִדַּבֵּר
  english_pob_choice: speaking
  chosen_spanish: de hablar
  alternatives_spanish:
  - hablando
  - de hablar con
  lexicon: HALOT
  rationale: El infinitivo constructo con prefijo מ expresa el acto que quedó concluido; en español, «terminó de hablar» refleja con claridad esa estructura sin forzar un calco.
- source_word: אִתָּם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: La preposición con sufijo pronominal se representa de manera directa como «con ellos», que mantiene la relación personal del diálogo.
- source_word: וַיִּתֵּן
  english_pob_choice: put
  chosen_spanish: puso
  alternatives_spanish:
  - colocó
  - puso sobre
  lexicon: HALOT
  rationale: נתן con עַל introduce la acción de colocar algo sobre otra cosa. «Puso» es natural en español y conserva el sentido de ubicación.
- source_word: עַל פָּנָיו
  english_pob_choice: over his face
  chosen_spanish: sobre su rostro
  alternatives_spanish:
  - sobre su cara
  - en su rostro
  lexicon: HALOT
  rationale: Con el objeto «velo», la idea es de cobertura. «Sobre su rostro» mantiene esa función y conserva un tono bíblico digno sin sonar arcaico.
- source_word: מַסְוֶה
  english_pob_choice: veil
  chosen_spanish: velo
  alternatives_spanish:
  - cobertura
  - cubierta
  lexicon: HALOT
  rationale: El sustantivo designa aquí un cobertor para el rostro. «Velo» es el equivalente español más exacto y reconocido en este contexto narrativo.
translation_notes:
  revision_awareness: El texto hebreo y la auditoría inglesa están en alto acuerdo; no se requieren revisiones textuales ni decisiones doctrinales especiales para este versículo.
