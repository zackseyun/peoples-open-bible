    rationale: El marcador [a] está unido a ‘a vista de los ancianos’, pero el contenido de la nota trata la alternativa ‘escupir delante de él’ para בְּפָנָיו. Esto distorsiona el audit trail y crea confusión exegética.
  - severity: medium
    issue: ‘a vista de los ancianos’ suena menos natural que otras opciones españolas.
    rationale: Aunque es comprensible, en español bíblico natural ‘en presencia de los ancianos’ o ‘delante de los ancianos’ comunica mejor el acto público y presenciado.
  - severity: medium
    issue: ‘de sobre su pie’ es un calco poco idiomático.
    rationale: El hebreo מֵעַל no exige reproducirse tan literalmente. ‘de su pie’ preserva el sentido sin rigidez innecesaria.
  - severity: low
    issue: ‘edifique’ puede sonar innecesariamente arcaico en este contexto.
    rationale: ‘Construya’ o ‘levante’ sería más moderno; sin embargo, ‘edifique’ también puede defenderse por la metáfora legal/bíblica. No es error grave, pero se puede mejorar la legibilidad.
