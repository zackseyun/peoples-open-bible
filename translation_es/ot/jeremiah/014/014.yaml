translation:
  language: es
  text: 'Y Yahvé me dijo: «Los profetas profetizan mentiras en mi nombre. No los envié, ni les mandé, ni les hablé. Les profetizan una visión falsa, adivinación, vacío[a] y el engaño de su propio corazón».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «ídolo»; el término hebreo puede llevar ese sentido en otros contextos.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el término propio del proyecto para el nombre divino. En español, «Yahvé» conserva la referencia directa al tetragrama sin reemplazarla por un título funcional.
- source_word: שֶׁקֶר
  english_pob_choice: lies / false
  chosen_spanish: mentiras
  alternatives_spanish:
  - falsedad
  - engaño
  lexicon: HALOT
  rationale: En la cláusula verbal, el español natural pide un sustantivo plural que corresponda a la acción de profetizar falsamente; «mentiras» comunica bien el valor de falsedad activa sin perder el carácter denunciatorio.
- source_word: הַנְּבִאִים נִבְּאִים
  english_pob_choice: the prophets are prophesying
  chosen_spanish: Los profetas profetizan
  alternatives_spanish:
  - Los profetas están profetizando
  - Los profetas hablan como profetas
  lexicon: HALOT
  rationale: Se preserva la repetición semítica del verbo «profetizar» con un giro español fluido. Opto por el presente simple porque en español transmite el valor durativo/actual del participio sin sonar forzado.
- source_word: בִּשְׁמִי
  english_pob_choice: in my name
  chosen_spanish: en mi nombre
  alternatives_spanish:
  - bajo mi nombre
  - por mi autoridad
  lexicon: HALOT
  rationale: Es la equivalencia idiomática estándar y fiel para el reclamo de comisión divina.
- source_word: לֹא שְׁלַחְתִּים
  english_pob_choice: I did not send them
  chosen_spanish: No los envié
  alternatives_spanish:
  - No los he enviado
  - No los mandé
  lexicon: HALOT
  rationale: «Enviar» conserva mejor el lenguaje de comisión profética; el pretérito simple encadena bien con las negativas siguientes.
- source_word: וְלֹא צִוִּיתִים
  english_pob_choice: nor did I command them
  chosen_spanish: ni les mandé
  alternatives_spanish:
  - ni les ordené
  - ni les di mandato
  lexicon: HALOT
  rationale: «Mandar» funciona en español bíblico y contemporáneo para el acto de comisionar/ordenar. Evita una rigidez innecesaria y mantiene la tríada negativa.
- source_word: וְלֹא דִבַּרְתִּי אֲלֵיהֶם
  english_pob_choice: nor did I speak to them
  chosen_spanish: ni les hablé
  alternatives_spanish:
  - ni les hablé a ellos
  - ni les hablé con ellos
  lexicon: HALOT
  rationale: «Hablé» reproduce la denegación de comunicación directa de manera natural en español.
- source_word: חֲזוֹן שֶׁקֶר
  english_pob_choice: a false vision
  chosen_spanish: Visión falsa
  alternatives_spanish:
  - una visión falsa
  - visión de mentira
  lexicon: HALOT
  rationale: Se mantiene el mismo campo semántico que en la versión inglesa, con una construcción nominal concisa y transparente en español.
- source_word: קֶסֶם
  english_pob_choice: divination
  chosen_spanish: adivinación
  alternatives_spanish:
  - divinación
  - sortilegio
  lexicon: HALOT
  rationale: «Adivinación» es el equivalente más claro y ampliamente inteligible para la práctica mántica ilícita.
- source_word: אֱלִיל
  english_pob_choice: emptiness
  chosen_spanish: vacío
  alternatives_spanish:
  - vacuidad
  - nulidad
  - ídolo
  lexicon: HALOT
  rationale: El inglés POB registró una posible tensión lexical entre «emptiness» y «idol». En español, «vacío» conserva la lectura de inutilidad/vanidad y deja abierta la alternativa interpretativa documentada sin resolverla por adelantado.
- source_word: תַּרְמוּת לִבָּם
  english_pob_choice: the deceit of their own heart
  chosen_spanish: el engaño de su propio corazón
  alternatives_spanish:
  - la falsedad de su propio corazón
  - la ilusión de su propio corazón
  lexicon: HALOT
  rationale: «Engaño» expresa con claridad la procedencia interna y fraudulenta del mensaje, y «su propio corazón» mantiene la fuerza del posesivo reflexivo implícito en hebreo.
- source_word: הֵמָּה מִתְנַבְּאִים לָכֶם
  english_pob_choice: They are prophesying to you
  chosen_spanish: es lo que ellos profetizan para ustedes
  alternatives_spanish:
  - ellos profetizan para ustedes
  - ellos están profetizando para ustedes
  lexicon: HALOT
  rationale: Se conserva el resumptivo enfático «ellos» y se hace explícito el destinatario. «Para ustedes» reproduce con naturalidad el valor dirigido del discurso en español bíblico sin perder la segunda persona plural.
theological_decisions:
- issue: Origen de la palabra profética
  english_pob_reading: The verse denies divine authorization and presents the message as originating in deceptive human sources rather than from the LORD.
  chosen_spanish_reading: El versículo niega toda autorización divina y presenta el mensaje como originado en fuentes humanas engañosas, no en Yahvé.
  alternative_spanish_readings:
  - El versículo denuncia simplemente una falsedad profética sin precisar origen
  - El versículo enumera diversas clases de engaño profético
  rationale: 'La redacción española conserva el juicio teológico central del hebreo y del POB: el problema no es solo el contenido falso, sino su falsa atribución a Yahvé. No se colapsan los términos en una sola categoría, porque el texto acumula imágenes de engaño profético.'
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La versión inglesa auditada quedó sin cambios en la última revisión; la propuesta española sigue de cerca esa lectura y mantiene la nota léxica sobre el término final ambiguo, sin añadir reinterpretaciones doctrinales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se usa «profetizan» repetido para reproducir la intensificación hebrea.
  - «Vacío» deja abierta la alternativa lexical documentada por el POB inglés, sin convertirla en «ídolo» en el texto principal.
  - La segunda persona plural se expresa como «ustedes» para claridad moderna y amplitud panhispánica.
