base_translation:
  language: en
  yaml_path: translation/ot/psalms/039/006.yaml
  text: Behold[a], you have made my days a few handbreadths, and my lifetime is as nothing before you; surely every man, though standing firm, is altogether vapor[c][b]. Selah
  footnotes:
  - marker: a
    text: Or 'all humanity' / 'every human'; Hebrew 'every man' uses a generic singular for humankind.
    reason: lexical_alternative
  - marker: b
    text: Or 'mere breath' or 'vanity'; Hebrew הֶבֶל evokes something insubstantial and fleeting.
    reason: lexical_alternative
  - marker: c
    text: Or 'standing' or 'established'; the sense may be that even a person who seems secure is only vapor.
    reason: lexical_alternative
