translation:
  language: es
  text: Alaben su nombre con danza[a]; háganle música con pandereta y lira[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con el baile». El hebreo מָחוֹל puede denotar tanto la actividad de bailar como una forma o marco de danza.
    reason: lexical_alternative
  - marker: b
    text: O «canten alabanzas». El verbo זמר puede referirse también a canto de alabanza, no solo a hacer música instrumental.
    reason: lexical_alternative
  - marker: c
    text: Tradicionalmente «arpa»; el hebreo כִּנּוֹר designa más específicamente una lira o instrumento de cuerda semejante.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהַֽלְל֣וּ
  english_pob_choice: Let them praise
  chosen_spanish: Alaben
  alternatives_spanish:
  - Que alaben
  - Lodén
  lexicon: HALOT
  rationale: El piel imperfecto tiene fuerza exhortativa/jussiva en poesía; en español, el presente subjuntivo exhortativo "Alaben" transmite bien esa invitación sin sonar rígido.
- source_word: שְׁמ֣וֹ
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - a él
  - su fama
  lexicon: HALOT
  rationale: Se conserva explícitamente "nombre" porque el hebreo dice "su nombre"; esto mantiene el giro bíblico y la resonancia teológica del nombre como representación de la persona y su honor.
- source_word: בְמָחוֹל
  english_pob_choice: with dancing
  chosen_spanish: con danza
  alternatives_spanish:
  - con el baile
  - en danza
  lexicon: HALOT
  rationale: '"Danza" expresa de manera natural la actividad celebratoria; "con" refleja el בְ instrumental/acompañante en paralelo con los instrumentos mencionados.'
- source_word: בְּתֹף
  english_pob_choice: with tambourine
  chosen_spanish: con pandereta
  alternatives_spanish:
  - con tamborín
  - con timbal
  lexicon: HALOT
  rationale: תֹף designa un instrumento de percusión tipo pandero/pandereta. "Pandereta" es el equivalente español más claro y ampliamente inteligible, sin perder el valor instrumental.
- source_word: וְכִנּוֹר
  english_pob_choice: and lyre
  chosen_spanish: y lira
  alternatives_spanish:
  - y arpa
  lexicon: HALOT
  rationale: כִּנּוֹר se refiere más propiamente a una lira que a un arpa moderna; se prefiere "lira" por fidelidad al instrumento antiguo.
- source_word: יְזַמְּרוּ
  english_pob_choice: let them make music
  chosen_spanish: hagan música
  alternatives_spanish:
  - canten alabanzas
  - toquen música
  lexicon: HALOT
  rationale: El piel de זמר puede abarcar cantar alabanzas o hacer música. Dado que aquí se nombran instrumentos, "hagan música" preserva mejor el sentido amplio de la acción musical.
- source_word: לוֹ
  english_pob_choice: to him
  chosen_spanish: para él
  alternatives_spanish:
  - a él
  - por él
  lexicon: HALOT
  rationale: El ל marca al destinatario de la música; "para él" suena natural en español y conserva la orientación del acto hacia Yahvé.
theological_decisions:
- issue: Referencia del "nombre" de Dios
  english_pob_reading: his name
  chosen_spanish_reading: su nombre
  alternative_spanish_readings:
  - él
  - su presencia
  rationale: Se mantiene el sustantivo "nombre" porque el texto hebreo lo expresa así. En el lenguaje bíblico, el nombre de Dios concentra su honor, manifestación y memoria; eliminarlo empobrecería la imagen.
  doctrine_reference: teología del nombre divino
- issue: Estructura de alabanza con instrumentos
  english_pob_reading: make music to him with tambourine and lyre
  chosen_spanish_reading: hagan música para él con pandereta y lira
  alternative_spanish_readings:
  - canten para él con pandereta y arpa
  - toquen para él
  rationale: No se reduce la expresión a solo 'cantar', porque el hebreo nombra instrumentos y un verbo de hacer música. La formulación conserva la amplitud litúrgica del llamado a alabar con acción musical concreta.
  doctrine_reference: alabanza comunitaria
- issue: Divine name rendering
  english_pob_reading: his name
  chosen_spanish_reading: su nombre
  alternative_spanish_readings:
  - el nombre del Señor
  rationale: Aunque el verso no contiene יהוה explícito en esta forma, el referente implícito del salmo es Yahvé. No se sustituye por una máscara reverencial; se traduce lo que el hebreo dice.
  doctrine_reference: Yahvé / nombre divino
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto hebreo y el consenso del audit trail inglés: mantiene el paralelismo poético, la referencia explícita al nombre, y la amplitud semántica de זמר con una opción que no reduce indebidamente el carácter musical del verso.'
  spanish_consistency_notes:
  - Se prefiere «Yahvé» como término del proyecto para el nombre divino cuando el contexto lo requiera; en este verso el hebreo no lo escribe explícitamente, pero el referente del salmo es coherente con esa convención.
  - Se usa «lira» en lugar de «arpa» por fidelidad al instrumento antiguo y en continuidad con la decisión lexical inglesa.
  - Se mantiene un español litúrgico claro y moderno, evitando arcaísmos innecesarios como «tímbrel» o «cantad loores» sin perder solemnidad.
