    reason: lexical_alternative
  - marker: c
    text: O «nuestras casas» o «nuestras viviendas» para «nuestras moradas».
    reason: lexical_alternative
  revision_rationale: Se corrige la nota [a] para reflejar fielmente la alternativa léxica documentada en el POB inglés ('saqueados/plundered') y se mejora ligeramente el orden de la oración inicial para una lectura más natural en español sin cambiar el sentido.
