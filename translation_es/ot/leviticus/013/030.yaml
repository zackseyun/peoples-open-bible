review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador acierta en varios elementos básicos: ''el sacerdote'', ''la zona afectada'', ''lo declarará impuro'' y la presencia de ''he aquí'' para וְהִנֵּה. Sin embargo, falla en dos decisiones léxicas mayores frente al hebreo y al rastro auditado del POB: נֶתֶק no puede verterse como ''enredamiento'', que no refleja el sentido de una afección del cuero cabelludo/barba, y צָרַעַת aquí no debe traducirse ''lepra'' porque el proyecto documenta explícitamente ''enfermedad de la piel'' para evitar anacronismo. También ''del cabeza'' es gramaticalmente incorrecto en español, y ''su apariencia está más profunda que la piel'' suena poco natural; debe ajustarse manteniendo la idea diagnóstica de ''más profunda que la piel''.'
  spanish_quality_summary: 'La redacción actual tiene problemas de naturalidad y corrección: ''enredamiento'' es ininteligible en este contexto, ''del cabeza'' es incorrecto, y la nota [b] está mal anclada porque explica צָרַעַת pero el marcador aparece sobre ''enredamiento''. El resto es legible, pero requiere una reparación integral menor para lograr español eclesial claro y fiel.'
  glossary_alignment: No hay términos del glosario mayor como Yahvé/Mesías en juego. Sí hay desviación importante del criterio léxico del proyecto para צָרַעַת -> 'enfermedad de la piel' y de la justificación auditada para נֶתֶק, que debe conservarse como término específico con nota sobre la alternativa tradicional ('tiña'/'sarna' no son equivalentes seguros; puede usarse 'comezón' o 'afección' con nota). 'Impuro' está bien para טמא.
  issues:
  - severity: high
    issue: נֶתֶק se tradujo como 'enredamiento'
    rationale: '''Enredamiento'' no corresponde al sentido léxico ni al uso en Levítico 13; resulta opaco y engañoso. El POB inglés eligió ''itch'' con nota de incertidumbre y alternativa tradicional ''scall''.'
  - severity: high
    issue: צָרַעַת se tradujo como 'lepra'
    rationale: El expediente inglés documenta que debe evitarse 'lepra' por su especificidad médica anacrónica. Aquí corresponde 'enfermedad de la piel'.
  - severity: medium
    issue: La nota [b] está anclada al término equivocado
    rationale: La nota explica צָרַעַת, pero en el borrador el marcador [b] aparece en 'enredamiento', que corresponde a נֶתֶק.
  - severity: medium
    issue: '''del cabeza'' es español incorrecto'
    rationale: Debe ser 'de la cabeza'.
  - severity: low
    issue: '''su apariencia está más profunda que la piel'' suena forzado'
    rationale: En español natural y fiel conviene 'su apariencia es más profunda que la piel' o 'parece más profunda que la piel'.
  - severity: low
    issue: La nota [a] no preserva bien la alternativa auditada
    rationale: El inglés conserva la alternativa tradicional para נֶתֶק ('scall'). La nota española debería reflejar una alternativa tradicional equivalente y la incertidumbre del referente exacto, no 'llaga afectada', que pertenece más bien a נֶגַע.
  revised_spanish_text: Y el sacerdote examinará la zona afectada, y he aquí, su apariencia es más profunda que la piel, y en ella hay pelo amarillo fino; entonces el sacerdote lo declarará impuro; es una comezón[a], una enfermedad de la piel[b] de la cabeza o de la barba.
  revised_footnotes:
