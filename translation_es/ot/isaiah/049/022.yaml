review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: fórmula profética, gesto de alzar la mano, elevación del estandarte, y el traslado de hijos e hijas. También preserva la distinción naciones/pueblos y el pasivo en ''serán llevadas''. Sin embargo, hay dos desajustes relevantes: (1) אֲדֹנָי יְהוִה está mejor representado en español como ''el Señor Yahvé'', no ''Yahvé el Señor'', porque el orden hebreo es título + nombre; (2) בָנַיִךְ es específicamente ''tus hijos'' en sentido masculino/''tus hijos varones'' o, más naturalmente en español bíblico, ''tus hijos'', pero dado el paralelo explícito con ''tus hijas'', aquí conviene ''tus hijos'' puede pasar; aun así, el rationale del borrador lo justifica como genérico, lo cual debilita la precisión de género del hebreo. Además, la única nota al pie está mal anclada: la nota léxica sobre ''estandarte'' aparece en ''[a]'' colocado en ''seno''.'
  spanish_quality_summary: El español es legible y digno, con buen registro bíblico. 'He aquí', 'alzaré', 'estandarte' y 'en su seno' funcionan bien. No obstante, el orden 'Yahvé el Señor' suena menos natural y menos fiel al compuesto hebreo que 'el Señor Yahvé'. También conviene corregir el anclaje de la nota al pie para evitar confusión. Por lo demás, la sintaxis es clara y natural.
  glossary_alignment: 'Alineación parcial con el glosario del proyecto. Positivo: usa ''Yahvé'' para יְהוָה, distingue ''naciones'' y ''pueblos'', y mantiene ''estandarte''. Ajuste necesario: en el compuesto אֲדֹנָי יְהוִה debe conservarse mejor la relación título + nombre con ''el Señor Yahvé''. No hay conflicto doctrinal serio; es una corrección de fidelidad formal y naturalidad. La nota inglesa sobre alternativas de נֵס debe conservarse, pero en el lugar correcto. La nota inglesa sobre בְּחֹצֶן no fue trasladada; no es estrictamente obligatoria, pero sería útil en español para preservar la alternativa literal/documentada.'
  issues:
  - severity: medium
    issue: Orden de la fórmula divina 'Yahvé el Señor'
    rationale: El hebreo אֲדֹנָי יְהוִה presenta primero el título y luego el nombre divino. 'El Señor Yahvé' refleja mejor ese orden y suena más natural en español bíblico que 'Yahvé el Señor'.
  - severity: high
    issue: Nota al pie mal anclada
    rationale: La nota [a] explica alternativas para 'levantaré mi estandarte', pero en el texto está colocada sobre 'seno'. Esto rompe la trazabilidad y debe corregirse.
  - severity: low
    issue: Ausencia de nota léxica para 'en su seno'
    rationale: El inglés documenta la literalidad y alternativas de בְּחֹצֶן ('en el seno', 'en el pliegue del vestido'). En español no es indispensable, pero añadirla ayuda a preservar la evidencia léxica y evita que 'seno' se entienda de forma demasiado abstracta.
  revised_spanish_text: 'Así dice el Señor Yahvé: He aquí, alzaré mi mano a las naciones y levantaré mi estandarte[a] a los pueblos; y traerán a tus hijos en su seno[b], y tus hijas serán llevadas sobre el hombro.'
  revised_footnotes:
