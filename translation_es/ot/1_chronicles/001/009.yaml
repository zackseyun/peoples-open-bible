translation:
  language: es
  text: 'Los hijos de Cus: Seba[a], Havilá, Sabta[b], Raama[c] y Sabteca[d]. Y los hijos de Raama: Sheba[e] y Dedán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Seba» también se escribe tradicionalmente «Sebá» en algunas Biblias españolas.
    reason: lexical_alternative
  - marker: b
    text: «Sabta» se traduce tradicionalmente «Sabtah».
    reason: lexical_alternative
  - marker: c
    text: «Raama» se traduce tradicionalmente «Raamah»; algunos lectores también podrían confundirlo con el nombre distinto «Rama».
    reason: lexical_alternative
  - marker: d
    text: «Sabteca» se traduce tradicionalmente «Sabtechah».
    reason: lexical_alternative
  - marker: e
    text: «Sheba» se traduce tradicionalmente «Saba» en muchas Biblias españolas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  lexicon: HALOT
  rationale: En listas genealógicas, בְּנֵי conserva la fórmula de parentesco; en español, «los hijos de» reproduce con naturalidad la estructura enumerativa sin introducir una paráfrasis más amplia como «descendientes».
- source_word: כּוּשׁ
  english_pob_choice: Cush
  chosen_spanish: Cus
  alternatives_spanish:
  - Cush
  lexicon: HALOT
  rationale: Nombre propio; en español bíblico es más natural la forma «Cus», que mantiene la identificación del personaje sin forzar la grafía inglesa.
- source_word: סְבָא
  english_pob_choice: Seba
  chosen_spanish: Seba
  alternatives_spanish:
  - Seba
  lexicon: HALOT
  rationale: Nombre propio/topónimo; se mantiene la transliteración breve y estándar en español.
- source_word: חֲוִילָה
  english_pob_choice: Havilah
  chosen_spanish: Havilá
  alternatives_spanish:
  - Havila
  lexicon: HALOT
  rationale: Nombre propio; se usa una forma española con acento gráfico para reflejar la pronunciación final llana/oxítona según uso editorial, sin añadir significado no presente en el hebreo.
- source_word: סַבְתָּא
  english_pob_choice: Sabta
  chosen_spanish: Sabta
  alternatives_spanish:
  - Sabtá
  - Sabtah
  lexicon: HALOT
  rationale: Nombre propio; se conserva la forma corta del POB inglés, adaptada al español sin añadir una h final no presente en la base elegida.
- source_word: רַעְמָא
  english_pob_choice: Raama
  chosen_spanish: Raama
  alternatives_spanish:
  - Raamá
  - Rama
  - Raamah
  lexicon: HALOT
  rationale: Nombre propio; se preserva la transliteración cercana al hebreo y al audit trail inglés. En español no se introduce la confusión con el nombre distinto «Rama».
- source_word: סַבְתְּכָא
  english_pob_choice: Sabteca
  chosen_spanish: Sabteca
  alternatives_spanish:
  - Sabtecá
  - Sabtechah
  lexicon: HALOT
  rationale: Nombre propio; se conserva la forma breve del POB inglés, adecuada para lectura corriente en español.
- source_word: וּבְנֵי רַעְמָא
  english_pob_choice: And the sons of Raama
  chosen_spanish: Y los hijos de Raama
  alternatives_spanish:
  - Y los descendientes de Raama
  lexicon: HALOT
  rationale: Se mantiene el segundo encabezado genealógico con la misma fórmula, porque marca una subrama dentro de la lista y no debe diluirse en una paráfrasis más general.
- source_word: שְׁבָא
  english_pob_choice: Sheba
  chosen_spanish: Seba
  alternatives_spanish:
  - Sheba
  lexicon: HALOT
  rationale: Nombre propio; en español se prefiere «Seba» para consistencia con la primera ocurrencia del mismo nombre en la línea genealógica.
- source_word: דְדָן
  english_pob_choice: Dedan
  chosen_spanish: Dedán
  alternatives_spanish:
  - Dedan
  lexicon: HALOT
  rationale: Nombre propio; se ajusta a la acentuación gráfica española para facilitar la lectura, manteniendo la misma identidad del nombre.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el reparto genealógico del hebreo y conserva las dos cláusulas paralelas: hijos de Cus / hijos de Raama. Se adoptaron transliteraciones españolas breves para los nombres propios, en continuidad con la decisión inglesa de preferir formas simples frente a grafías tradicionales más largas.'
  spanish_consistency_notes:
  - Se mantiene «hijos de» para la fórmula genealógica en ambas apariciones.
  - Se usa «Cus» en vez de «Cush» para coherencia con el español bíblico.
  - Los nombres propios se han normalizado con acentuación solo donde ayuda a la lectura en español sin alterar la identidad textual.
  - Las notas preservan las alternativas tradicionales documentadas en el POB inglés.
