theological_decisions:
- issue: Identity of 'Israel'
  chosen_reading: Israel refers to the patriarch Jacob/Israel, the recipient of the blessing line.
  alternative_readings:
  - Israel as the people collectively
  rationale: In this ancestral praise context, the sequence Abraham–Isaac–Israel points most naturally to the patriarch Jacob, though the wording also resonates with the nation descending from him. The translation preserves the ambiguity by keeping the proper name 'Israel' without expansion.
