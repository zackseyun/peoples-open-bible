translation:
  language: es
  text: una tierra de lobreguez, como oscuridad profunda, de sombra de muerte[a] y sin orden, donde brilla como oscuridad profunda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sombra profunda’ para ‘sombra de muerte’ (צַלְמָוֶת); el término hebreo puede señalar tanto una sombra vinculada con la muerte como una oscuridad muy intensa en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶרֶץ
  english_pob_choice: land
  chosen_spanish: tierra
  alternatives_spanish:
  - país
  - región
  lexicon: HALOT
  rationale: En este contexto poético, ‘tierra’ comunica bien una esfera o ámbito. ‘País’ suena demasiado político, y ‘región’ es posible pero menos natural en el contraste imaginario del versículo.
- source_word: עֵיפָתָה
  english_pob_choice: of gloom
  chosen_spanish: de lobreguez
  alternatives_spanish:
  - de oscuridad
  - de penumbra
  - de tinieblas
  lexicon: HALOT
  rationale: La forma expresa oscuridad/gloominess. ‘Lobreguez’ conserva un matiz poético y denso sin repetir exactamente ‘oscuridad’ en cada miembro de la línea.
- source_word: כְּמוֹ אֹפֶל
  english_pob_choice: like deep darkness
  chosen_spanish: como oscuridad profunda
  alternatives_spanish:
  - como tinieblas profundas
  - como oscura negrura
  lexicon: HALOT
  rationale: ‘אֹפֶל’ es oscuridad densa o profunda; ‘oscuridad profunda’ mantiene esa intensidad de manera clara en español.
- source_word: צַלְמָוֶת
  english_pob_choice: the shadow of death
  chosen_spanish: sombra de muerte
  alternatives_spanish:
  - sombra mortal
  - tinieblas de muerte
  - profunda sombra
  lexicon: HALOT
  rationale: Se conserva la expresión tradicional semánticamente fuerte ‘sombra de muerte’, sin ocultar que el hebreo también puede referirse a una oscuridad muy densa. La elección mantiene la asociación grave/fúnebre del término.
- source_word: וְלֹא סְדָרִים
  english_pob_choice: and without order
  chosen_spanish: y sin orden
  alternatives_spanish:
  - y sin arreglo
  - y sin disposición
  lexicon: HALOT
  rationale: ‘סְדָרִים’ alude a orden o arreglo. ‘Sin orden’ es breve, natural y retiene la idea de caos o falta de disposición.
- source_word: וַתֹּפַע
  english_pob_choice: where it shines
  chosen_spanish: y brilla
  alternatives_spanish:
  - y resplandece
  - y aparece
  - y se ilumina
  lexicon: HALOT
  rationale: La raíz tiene el sentido de brillar/aparecer con brillo. En español, ‘y brilla’ es directo y preserva el giro paradójico sin sobreexplicar la relación sintáctica.
- source_word: כְּמוֹ אֹפֶל
  english_pob_choice: like deep darkness
  chosen_spanish: como oscuridad profunda
  alternatives_spanish:
  - como tinieblas densas
  - como noche cerrada
  lexicon: HALOT
  rationale: La repetición del final hebreo se mantiene con la misma equivalencia para reflejar el efecto poético y enfático del original.
theological_decisions:
- issue: צַלְמָוֶת puede leerse como ‘sombra de muerte’ o como una oscuridad muy profunda
  english_pob_reading: the shadow of death, with an alternative footnote noting 'deep shadow' / very deep darkness
  chosen_spanish_reading: sombra de muerte, con nota alternativa sobre ‘sombra profunda’ o ‘oscuridad muy profunda’
  alternative_spanish_readings:
  - sombra profunda
  - oscuridad muy profunda
  - tinieblas de muerte
  rationale: No se quiere aplanar la ambigüedad léxica del hebreo. La línea principal conserva la resonancia fúnebre tradicional, mientras la nota admite la posibilidad de una referencia más general a oscuridad extrema.
  doctrine_reference: No doctrinal; cuestión léxico-poética del hebreo צַלְמָוֶת
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; se conserva la lectura óptima estable del versículo. La versión española sigue la misma estructura imagística y mantiene la repetición final de ‘oscuridad profunda’ para reflejar el paralelismo hebreo.
  spanish_consistency_notes:
  - Se usó ‘tierra’ para אֶרֶץ, coherente con el valor espacial del pasaje poético.
  - Se evitó ‘SEÑOR’ u otros reemplazos no requeridos porque aquí no aparecen los nombres divinos.
  - Se mantuvo la tensión de צַלְמָוֶת con una nota, en vez de resolverla unilateralmente.
  - La repetición final de ‘oscuridad profunda’ conserva el cierre enfático del hebreo.
