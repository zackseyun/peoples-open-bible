translation:
  language: es
  text: Se ríe del bullicio de la ciudad[a]; no oye los gritos del arreador[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el ruido de la ciudad».
    reason: lexical_alternative
  - marker: b
    text: O «del capataz» o «del vigilante»; el término hebreo puede referirse más ampliamente a quien arrea o exige trabajo.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׂחַק
  english_pob_choice: he laughs
  chosen_spanish: se ríe
  alternatives_spanish:
  - se burla
  - se mofa
  lexicon: HALOT
  rationale: El verbo expresa una reacción despectiva o desdeñosa ante el ruido urbano. En español, «se ríe» conserva el gesto directo del hebreo sin cargar más de lo necesario con una intensificación interpretativa como «se burla».
- source_word: לַהֲמוֹן
  english_pob_choice: at the tumult of
  chosen_spanish: del bullicio de
  alternatives_spanish:
  - del tumulto de
  - del ruido de
  - del alboroto de
  lexicon: HALOT
  rationale: El sustantivo designa ruido, bullicio o conmoción. «Bullicio» transmite bien la mezcla de sonido y actividad propia de la ciudad, manteniendo la fuerza de la imagen.
- source_word: קִרְיָה
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - una ciudad
  - el poblado
  lexicon: HALOT
  rationale: «La ciudad» refleja naturalmente el sentido genérico del sustantivo en este contraste entre vida urbana y libertad del animal.
- source_word: תְּשֻׁאוֹת
  english_pob_choice: the shouts
  chosen_spanish: los gritos
  alternatives_spanish:
  - los clamores
  - las voces
  lexicon: HALOT
  rationale: El plural expresa alzamiento de voz fuerte. «Gritos» es claro en español y corresponde al sentido concreto del hebreo.
- source_word: נֹגֵשׂ
  english_pob_choice: the driver
  chosen_spanish: el conductor
  alternatives_spanish:
  - el arreador
  - el capataz
  - el opresor
  lexicon: HALOT
  rationale: En este contexto animal, el término no apunta principalmente a un oficial de trabajo, sino a quien guía o arrea. «Conductor» comunica esa función en español sin trasladar de inmediato la idea de esclavitud o labor forzada.
- source_word: לֹא יִשְׁמָע
  english_pob_choice: he does not hear
  chosen_spanish: no oye
  alternatives_spanish:
  - no escucha
  - no presta atención a
  lexicon: HALOT
  rationale: El hebreo dice literalmente que no oye. «No oye» conserva la precisión del original y mantiene la observación objetiva del verso.
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y sin cambios necesarios; se mantiene la lectura del inglés POB y se ajusta al español con equivalencia óptima, preservando las alternativas léxicas documentadas.
  spanish_consistency_notes:
  - Se mantuvo el contraste entre el bullicio urbano y la independencia del animal.
  - Se conservó la literalidad de «no oye» para no suavizar el hebreo a «no presta atención» en el texto principal.
  - El término para נֹגֵשׂ se decidió por su función inmediata en el contexto, con nota de alternativas más opresivas o administrativas.
