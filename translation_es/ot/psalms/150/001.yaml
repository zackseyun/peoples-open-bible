translation:
  language: es
  text: ¡Alaben a Yah![a] ¡Alaben a Dios en su santuario[b]! ¡Alábenlo en la expansión de su fuerza[c]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: Yah, la forma abreviada del nombre divino; muchas traducciones lo vierten «el SEÑOR».'
    reason: alternative_reading
  - marker: b
    text: O «en su santidad» / «en su lugar santo».
    reason: lexical_alternative
  - marker: c
    text: O «en el firmamento de su fuerza» o «en su poderosa expansión».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַ֥לְלוּ
  english_pob_choice: Praise
  chosen_spanish: ¡Alaben!
  alternatives_spanish:
  - ¡Alaben a Dios!
  - ¡Den alabanza!
  lexicon: HALOT
  rationale: El imperativo plural exhortativo de הלל se expresa de forma natural con «alaben», que conserva el llamado litúrgico breve y repetido del hebreo. El añadido de signos de exclamación ayuda a reflejar el tono de convocatoria.
- source_word: יָ֨הּ
  english_pob_choice: Yah
  chosen_spanish: Yah
  alternatives_spanish:
  - Yahvé
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene la forma breve del nombre divino como «Yah», porque el hebreo no usa aquí יהוה sino la contracción יָהּ. Así se conserva la distinción lexical y el eco de hallelu-yah.
- source_word: אֵ֥ל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios poderoso
  - el Poderoso
  lexicon: HALOT
  rationale: En este contexto de alabanza, אֵל funciona como designación común de Dios; «Dios» es la equivalencia más natural y no añade matices no explícitos en el texto.
- source_word: בְּ/קָדְשׁ֑/וֹ
  english_pob_choice: in his sanctuary
  chosen_spanish: en su santuario
  alternatives_spanish:
  - en su santidad
  - en su lugar santo
  lexicon: HALOT
  rationale: 'Sigo la lectura locativa preferida por la POB inglesa: קדשׁ aquí se entiende mejor como un lugar sagrado. «Santuario» comunica ese valor espacial sin perder el vínculo con la santidad.'
- source_word: הַֽ֝לְל֗וּ/הוּ
  english_pob_choice: praise him
  chosen_spanish: alábenlo
  alternatives_spanish:
  - alábenle
  - alaben a él
  lexicon: HALOT
  rationale: El sufijo pronominal de objeto se expresa de manera directa en español con «lo». Mantengo la simetría con la primera exhortación y el carácter formal del mandato.
- source_word: בִּ/רְקִ֥יעַ
  english_pob_choice: in the expanse
  chosen_spanish: en la expansión
  alternatives_spanish:
  - en el firmamento
  - en la bóveda
  lexicon: HALOT
  rationale: «Expansión» preserva la imagen de un espacio extendido sin la carga arcaica de «firmamento» y sin reducir indebidamente el término a «cielo». Se ajusta al valor imagístico del hebreo.
- source_word: עֻזּֽ/וֹ
  english_pob_choice: his strength
  chosen_spanish: de su poder
  alternatives_spanish:
  - de su fuerza
  - de su vigor
  lexicon: HALOT
  rationale: Aunque עז puede ser «fuerza» o «poder», aquí el paralelismo con «expansión» favorece una expresión más idiomática en español. «Poder» mantiene la idea de vigor eficaz sin sonar forzado.
theological_decisions:
- issue: Tratamiento de la forma abreviada del nombre divino יָהּ
  english_pob_reading: Yah
  chosen_spanish_reading: Yah
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: La POB inglesa distingue correctamente la forma corta יָהּ de יהוה. En español, «Yah» conserva esa distinción y el sabor litúrgico del hallelu-yah, mientras que «Yahvé» o «el SEÑOR» borrarían la señal lexical específica.
  doctrine_reference: 'DOCTRINE.md: el mandato para יהוה se traduce usualmente «Yahvé», pero la forma corta יָהּ se trata como una entidad lexical distinta.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés: conserva la distinción de יָהּ como «Yah», adopta la lectura locativa de בְּקָדְשׁוֹ como «santuario», y mantiene el paralelismo de la segunda línea con una opción idiomática que no borra la imagen de רקיע.'
  spanish_consistency_notes:
  - He mantenido «Yah» en vez de sustituirlo por «Yahvé» para no perder la diferencia entre יָהּ y el tetragrámaton.
  - «Santuario» refleja una lectura espacial coherente con el paralelismo del versículo.
  - «Expansión» conserva la imagen hebrea de רקיע mejor que «cielo».
  - «Poder» se eligió por fluidez y paralelismo con «expansión», sin negar el sentido básico de fuerza/might.
