  glossary_alignment: No hay términos del glosario de proyecto en conflicto en este versículo. «Libación» refleja bien נֶסֶךְ. «Pilar»/«pilar de piedra» concuerda con la rationale léxica documentada. Se preserva la neutralidad descriptiva de la acción ritual.
