revisions:
- from: ¿Dónde están los dioses de Hamat y de Arpad? ¿Dónde están los dioses de Sefarvaim? ¿Y acaso libraron a Samaria de mi mano?[a]
  to: ¿Dónde están los dioses de Hamat y de Arpad? ¿Dónde están los dioses de Sefarvaim? ¿Y han librado a Samaria de mi mano?[a]
