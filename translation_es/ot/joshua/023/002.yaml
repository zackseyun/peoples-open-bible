base_translation:
  language: en
  yaml_path: translation/ot/joshua/023/002.yaml
  text: Then Joshua called for all Israel—for its elders[a], its heads, its judges, and its officers—and said to them, “I am old[c][b]; I have advanced in years.”
  footnotes:
  - marker: a
    text: Or 'called' or 'summoned.' The Hebrew verb means to call or summon, here with the sense of calling the leaders together.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'its heads,' that is, its leading men or chiefs.
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew idiom: ''I have come into days,'' meaning ''I have advanced in years.'''
    reason: lexical_alternative
