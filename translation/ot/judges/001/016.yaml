id: JDG.1.16
reference: Judges 1:16
source:
  edition: WLC
  text: וּ/בְנֵ֣י קֵינִי֩ חֹתֵ֨ן מֹשֶׁ֜ה עָל֨וּ מֵ/עִ֤יר הַ/תְּמָרִים֙ אֶת בְּנֵ֣י יְהוּדָ֔ה מִדְבַּ֣ר יְהוּדָ֔ה אֲשֶׁ֖ר בְּ/נֶ֣גֶב עֲרָ֑ד וַ/יֵּ֖לֶךְ וַ/יֵּ֥שֶׁב אֶת הָ/עָֽם־־׃
translation:
  text: And the descendants of the Kenite[a], Moses’ father-in-law, went up from the City of Palms with the descendants of Judah into the wilderness of Judah, which is in the Negev of Arad[d][c][b]; then he went and settled with the people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Moses’ relative by marriage'; the Hebrew term can be broader than 'father-in-law,' though 'father-in-law' is the most common sense here.
    reason: lexical_alternative
  - marker: b
    text: '''City of Palms'' is commonly understood to refer to Jericho.'
    reason: cross_reference
  - marker: c
    text: 'The Hebrew shifts to singular: ''then he went and settled.'' This may refer to the Kenite clan as a collective singular, though some interpreters understand a plural sense.'
    reason: textual_variant
  - marker: d
    text: Or 'among the people.' Some ancient witnesses read 'with Amalek' instead of 'with the people.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the descendants of
  alternatives:
  - And the sons of
  - And the children of
  lexicon: HALOT
  rationale: בְּנֵי is literally 'sons of,' but in genealogical/tribal prose it commonly denotes descendants or members of a clan. 'Descendants of' preserves the lineage sense in natural English without implying only immediate male children.
- source_word: קֵינִי
  chosen: the Kenite
  alternatives:
  - Kainite
  lexicon: HALOT
  rationale: Gentilic referring to the Kenite clan/people. Standard English biblical form is 'Kenite.'
- source_word: חֹתֵן מֹשֶׁה
  chosen: Moses’ father-in-law
  alternatives:
  - Moses' relative by marriage
  lexicon: HALOT
  rationale: חֹתֵן most commonly means 'father-in-law,' though in some contexts it can denote a broader in-law relation. Here the traditional and most likely sense is retained, while the broader possibility is preserved in a footnote because the identity of Moses' Kenite relation is discussed elsewhere.
- source_word: עָלוּ
  chosen: went up
  alternatives:
  - came up
  - ascended
  lexicon: HALOT
  rationale: עלה is the standard verb 'go up.' 'Went up' preserves the Hebrew movement idiom and possible topographical nuance.
- source_word: מֵעִיר הַתְּמָרִים
  chosen: from the City of Palms
  alternatives:
  - from Jericho
  lexicon: HALOT
  rationale: The Hebrew expression is literally 'from the City of Palms.' Since the text itself uses the epithet rather than the place-name, the epithet is kept in the main text; the likely identification with Jericho is suitable for a footnote.
- source_word: אֶת בְּנֵי יְהוּדָה
  chosen: with the descendants of Judah
  alternatives:
  - with the sons of Judah
  - along with the people of Judah
  lexicon: HALOT
  rationale: Here אֶת is best taken in the associative sense, 'with,' not as a direct-object marker. 'Descendants of Judah' matches the tribal/genealogical sense of בְּנֵי.
- source_word: מִדְבַּר יְהוּדָה
  chosen: into the wilderness of Judah
  alternatives:
  - to the wilderness of Judah
  lexicon: HALOT
  rationale: The phrase names the destination region. 'Into' fits the movement from the previous verb and reads naturally in English.
- source_word: אֲשֶׁר בְּנֶגֶב עֲרָד
  chosen: which is in the Negev of Arad
  alternatives:
  - which is south of Arad
  - which is in the southern region near Arad
  lexicon: HALOT
  rationale: נֶגֶב can denote the Negev region or the south/southern area. Because this is a geographic notice, 'the Negev of Arad' preserves the place-name flavor while allowing that it refers to the southern area associated with Arad.
- source_word: וַיֵּלֶךְ
  chosen: then he went
  alternatives:
  - then they went
  lexicon: HALOT
  rationale: The verb is morphologically singular ('he went'), creating a shift after the earlier plural. The singular is retained in translation rather than harmonized away, since it is the Masoretic reading; the possibility of a collective singular or a text-critical/plural sense is noted in a footnote.
- source_word: וַיֵּשֶׁב
  chosen: and settled
  alternatives:
  - and dwelt
  - and lived
  lexicon: HALOT
  rationale: ישׁב in settlement contexts means to dwell/settle. 'Settled' fits the migration context and is idiomatic modern English.
- source_word: אֶת הָעָם
  chosen: with the people
  alternatives:
  - among the people
  - with Amalek
  - with his people
  lexicon: HALOT
  rationale: The Hebrew literally reads 'with the people' if אֶת is taken associatively. The referent of 'the people' is ambiguous in context; many understand it as Judah, while some ancient versions/traditions reflect 'Amalek.' The MT wording is preserved in the main text, with alternatives footnoted.
