translation:
  language: es
  text: Estábamos embarazados[a], nos retorcíamos con dolores de parto; por así decirlo, dimos a luz viento[b]. No logramos liberación en la tierra, y los habitantes del mundo no nacieron[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «concebimos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «dimos a luz aliento» o «dimos a luz espíritu»; la palabra hebrea puede significar «viento», «aliento» o «espíritu».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «los habitantes del mundo no cayeron». El verbo normalmente significa «caer», pero algunos lo entienden aquí siguiendo la imagen del parto, como «vinieron a nacer» o «nacieron».'
    reason: alternative_reading
lexical_decisions:
- source_word: הָרִינוּ
  english_pob_choice: we were pregnant
  chosen_spanish: estábamos embarazados
  alternatives_spanish:
  - concebimos
  - quedamos embarazados
  lexicon: HALOT
  rationale: El hebreo qal perfecto de הרה expresa quedar o estar embarazada. En español, «estábamos embarazados» conserva la imagen corporal y el paralelo con los dolores de parto; «concebimos» es posible, pero desplaza el foco hacia el momento de la concepción más que al estado de gravidez que desarrolla la línea poética.
- source_word: חַ֔לְנוּ
  english_pob_choice: we writhed in labor
  chosen_spanish: nos retorcíamos con dolores de parto
  alternatives_spanish:
  - estábamos con dolores de parto
  - teníamos dolores de parto
  - nos revolvíamos de parto
  lexicon: HALOT
  rationale: El verbo en este contexto apunta al retorcimiento o sufrimiento propio del parto. «Nos retorcíamos con dolores de parto» preserva la intensidad física y el tono poético sin sonar arcaico. «Estábamos con dolores de parto» es más llano, pero menos vívido.
- source_word: כְּמוֹ
  english_pob_choice: as it were
  chosen_spanish: como si
  alternatives_spanish:
  - cual si
  - por así decirlo
  - como que
  lexicon: HALOT
  rationale: La comparación introduce una cualificación figurada. «Como si» transmite en español la misma vacilación o ironía poética que el inglés «as it were», sin añadir interpretación.
- source_word: יָלַ֣דְנוּ
  english_pob_choice: we gave birth
  chosen_spanish: dimos a luz
  alternatives_spanish:
  - parimos
  - dimos nacimiento a
  lexicon: HALOT
  rationale: El verbo ילד es el verbo normal de dar a luz. «Dimos a luz» es claro, natural y suficientemente solemne; «parimos» sería más directo pero menos neutral en registro.
- source_word: רוּחַ
  english_pob_choice: wind
  chosen_spanish: viento
  alternatives_spanish:
  - aliento
  - espíritu
  lexicon: HALOT
  rationale: En esta metáfora de parto frustrado, «viento» comunica vacuidad y nulidad, que es la fuerza del contraste en el verso. «Espíritu» introduciría una lectura teológica no exigida por el contexto; «aliento» suaviza demasiado la imagen.
- source_word: יְשׁוּעֹת
  english_pob_choice: deliverance
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  - libertad
  - rescates
  lexicon: HALOT
  rationale: El plural de ישׁע puede referirse a actos de salvación o liberación. Aquí, en un lamento corporativo, «salvación» mantiene el alcance amplio y la resonancia bíblica sin forzar una especificación que el hebreo no impone.
- source_word: בַּל
  english_pob_choice: no / not
  chosen_spanish: 'no'
  alternatives_spanish:
  - nunca
  lexicon: HALOT
  rationale: La negación poética se expresa de manera directa con «no» en castellano, manteniendo la concisión del hebreo.
- source_word: נַ֣עֲשֶׂה אֶ֔רֶץ
  english_pob_choice: we accomplished no deliverance in the earth
  chosen_spanish: no logramos salvación en la tierra
  alternatives_spanish:
  - no hicimos salvación en la tierra
  - no llevamos a cabo salvación en la tierra
  - no obramos salvación en la tierra
  lexicon: HALOT
  rationale: עָשָׂה con objeto abstracto puede significar realizar o lograr. «No logramos salvación» suena natural en español y conserva la idea de un resultado no alcanzado. «Tierra» refleja אֶרֶץ; aquí se prefiere frente a «mundo» porque el verso distingue este término de תֵבֵל al final.
- source_word: יִפְּל֖וּ
  english_pob_choice: were not born
  chosen_spanish: no nacieron
  alternatives_spanish:
  - no cayeron
  - no vinieron a nacer
  - no llegaron a nacer
  lexicon: HALOT
  rationale: Aunque el sentido básico de נפל es «caer», en este contexto la imagen de parto hace plausible la lectura de nacer. La traducción principal sigue la revisión inglesa más reciente y evita una resolución demasiado literal que oscurecería el paralelismo.
- source_word: יֹשְׁבֵ֥י תֵבֵל
  english_pob_choice: the inhabitants of the world
  chosen_spanish: los habitantes del mundo
  alternatives_spanish:
  - los moradores del mundo
  - los que habitan el mundo
  lexicon: HALOT
  rationale: La expresión fija se traduce de forma transparente con «los habitantes del mundo». «Mundo» conserva la distinción poética frente a «tierra» en la cláusula anterior.
theological_decisions:
- issue: Sentido de רוּחַ en la metáfora del parto
  english_pob_reading: wind
  chosen_spanish_reading: viento
  alternative_spanish_readings:
  - espíritu
  - aliento
  rationale: 'El contexto es de fracaso y futilidad: embarazo, dolor y luego un resultado vacío. «Viento» conserva esa vaciedad sin sugerir una referencia pneumatológica positiva que el pasaje no exige.'
  doctrine_reference: Translation philosophy §1, §3
- issue: Interpretación de יִפְּלוּ en la cláusula final
  english_pob_reading: were not born
  chosen_spanish_reading: no nacieron
  alternative_spanish_readings:
  - no cayeron
  - no vinieron a nacer
  - no llegaron a nacer
  rationale: 'La revisión inglesa reciente favorece la lectura de nacimiento en lugar del sentido básico de «caer», probablemente por la continuidad de la metáfora del parto. En español se preserva esa opción sin borrar la tensión lexical: la nota mantiene la alternativa más literal implicada por el verbo hebreo.'
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente que ajusta el paralelismo final de «have not fallen» a «were not born», y se mantuvo la decisión léxica central de traducir רוּחַ como «viento» por el contexto de futilidad. También se preservó la tensión del verbo final mediante una nota de alternativa de lectura.
  spanish_consistency_notes:
  - Se mantuvo «tierra» para אֶרֶץ y «mundo» para תֵבֵל, conservando el contraste poético del hebreo.
  - Se evitó «SEÑOR» o formas litúrgicas, porque el versículo no contiene el Tetragrámaton ni una cita directa de κύριος.
  - La puntuación reproduce la secuencia poética con dos hemistiquios principales y una cláusula final coordinada.
  - Se usó un registro bíblico contemporáneo, evitando arcaísmos innecesarios como «travajamos» o «parimos» en el texto principal.
