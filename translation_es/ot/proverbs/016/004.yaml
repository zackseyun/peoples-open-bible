revisions:
- from: Yahvé ha hecho todo para su propósito[a], aun al malvado para el día de desastre[b].
  to: Yahvé ha hecho cada cosa para su propio fin[a], aun al malvado para el día de desastre[b].
  rationale: Se revisa la frase central para evitar que «su propósito» se entienda como el propósito de Yahvé, lo cual iría más allá de la decisión lexical auditada. «Cada cosa para su propio fin» conserva el alcance general de כֹּל, expresa con naturalidad en español el sentido teleológico de לַמַּעֲנֵהוּ y mantiene la cautela teológica del POB. También se ajusta la nota [a] para reflejar de forma más directa la alternativa «para sí mismo».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:22:03Z'
