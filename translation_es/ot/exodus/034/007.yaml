translation:
  language: es
  text: manteniendo el amor leal[a] para millares, perdonando la iniquidad, la transgresión y el pecado, pero de ninguna manera dejará sin castigo[b], haciendo recaer la iniquidad de los padres sobre los hijos y sobre los hijos de los hijos[c], hasta la tercera y hasta la cuarta generación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para mil generaciones»; el hebreo dice simplemente «para millares», probablemente en contraste con la justicia que llega «hasta la tercera y hasta la cuarta generación».
    reason: alternative_reading
  - marker: b
    text: O «ciertamente no absolverá» o «de ninguna manera tendrá por inocente».
    reason: lexical_alternative
  - marker: c
    text: El hebreo dice «padres»; se conserva porque el texto fuente es específicamente masculino aquí, aunque el sentido es de descendencia generacional.
    reason: cultural_note
lexical_decisions:
- source_word: נֹצֵר
  english_pob_choice: keeping
  chosen_spanish: manteniendo
  alternatives_spanish:
  - guardando
  - preservando
  lexicon: HALOT
  rationale: El participio qal expresa una acción continua de custodiar o sostener. «Manteniendo» comunica bien la continuidad y suena natural en español devocional sin perder la idea de acción constante.
- source_word: חֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: misericordia
  alternatives_spanish:
  - amor constante
  - amor leal
  - fidelidad amorosa
  lexicon: HALOT
  rationale: En este contexto, el término hebreo porta carga de lealtad de pacto y benevolencia. «Misericordia» es una opción amplia y reconocible en español; se conserva la nota de pacto en la documentación, aunque el término no la explicita por sí solo. El contexto de la fórmula divina ayuda a sostener esa amplitud semántica.
- source_word: לָאֲלָפִים
  english_pob_choice: for thousands
  chosen_spanish: para millares
  alternatives_spanish:
  - para miles
  - por millares
  lexicon: HALOT
  rationale: El hebreo dice literalmente «para miles» / «a miles». «Millares» preserva la idea de multitud sin introducir «generaciones» en el texto principal, siguiendo la cautela del POB en no sobreespecificar lo que el hebreo no expresa aquí.
- source_word: נֹשֵׂא
  english_pob_choice: forgiving
  chosen_spanish: perdonando
  alternatives_spanish:
  - llevando
  - cargando con
  - quitando
  lexicon: HALOT
  rationale: Aunque el verbo literalmente puede significar «llevar/cargar», en esta colación con términos de pecado funciona idiomáticamente como perdonar. «Perdonando» comunica el sentido de manera clara en español.
- source_word: עָוֺן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - culpa
  - maldad
  lexicon: HALOT
  rationale: «Iniquidad» mantiene la gravedad moral del término y permite conservar la recurrencia léxica en la cláusula siguiente.
- source_word: פֶשַׁע
  english_pob_choice: transgression
  chosen_spanish: transgresión
  alternatives_spanish:
  - rebelión
  - falta
  lexicon: HALOT
  rationale: «Transgresión» es el equivalente más estable para el quebrantamiento o violación de límite que sugiere el hebreo.
- source_word: חַטָּאָה
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - sin
  - ofensa
  lexicon: HALOT
  rationale: «Pecado» es natural y formal en español bíblico. Se eligió esta forma por fluidez, aunque «sin» también sería viable.
- source_word: וְנַקֵּה לֹא יְנַקֶּה
  english_pob_choice: but he will by no means leave unpunished
  chosen_spanish: pero de ninguna manera dejará sin castigo
  alternatives_spanish:
  - pero de ningún modo quedará impune
  - pero ciertamente no absolverá
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + verbo finito intensifica la negación. «De ninguna manera dejará sin castigo» reproduce la fuerza judicial sin imponer una frase inglesa de calco. No se explicita un objeto como «el culpable», porque el hebreo no lo hace.
- source_word: פֹּקֵד
  english_pob_choice: visiting
  chosen_spanish: visitando
  alternatives_spanish:
  - castigando
  - haciendo recaer
  - tomando en cuenta
  lexicon: HALOT
  rationale: «Visitando» conserva la amplitud semántica de פקד en un contexto de juicio, permitiendo que el texto mantenga su tensión entre atención divina y consecuencias.
- source_word: עֲוֺן אָבוֹת
  english_pob_choice: the iniquity of fathers
  chosen_spanish: la iniquidad de los padres
  alternatives_spanish:
  - la iniquidad de los padres varones
  - la culpa de los padres
  lexicon: HALOT
  rationale: El hebreo usa un plural masculino específico. «Padres» reproduce ese dato sin volver torpe el español, y deja visible la referencia generacional masculina del texto.
- source_word: עַל בָּנִים וְעַל בְּנֵי בָנִים
  english_pob_choice: on children and on children's children
  chosen_spanish: sobre los hijos y sobre los hijos de los hijos
  alternatives_spanish:
  - sobre los hijos y sobre los nietos
  - sobre los hijos y sobre los descendientes
  lexicon: HALOT
  rationale: La repetición hebrea subraya la descendencia generacional. «Hijos de los hijos» conserva la forma relacional y la progresión sin sustituirla por un término más interpretativo.
- source_word: עַל שִׁלֵּשִׁים וְעַל רִבֵּעִים
  english_pob_choice: to the third and to the fourth generation
  chosen_spanish: hasta la tercera y hasta la cuarta generación
  alternatives_spanish:
  - hasta la tercera y la cuarta
  - por tres y cuatro generaciones
  lexicon: HALOT
  rationale: «Generación» no aparece explícitamente en el hebreo, pero sí está implícita en la secuencia familiar. Se mantiene la aclaración tradicional porque el español la necesita para expresar con naturalidad el alcance ordinal.
theological_decisions:
- issue: Cómo conservar la tensión entre misericordia y juicio en וְנַקֵּה לֹא יְנַקֶּה
  english_pob_reading: Retain both full forgiveness language and the emphatic statement that God will not clear the guilty / leave unpunished.
  chosen_spanish_reading: Se mantiene el perdón amplio de la cláusula anterior y, a la vez, la afirmación enfática de que Yahvé no dejará sin castigo.
  alternative_spanish_readings:
  - perdonando... pero de ninguna manera absolverá
  - perdonando... pero no tendrá por inocente
  rationale: El versículo yuxtapone misericordia y justicia sin resolver la tensión. La traducción conserva ambas afirmaciones sin suavizar ninguna, y evita añadir un objeto explícito que no está en el hebreo.
  doctrine_reference: Translation philosophy §3
- issue: Si explicitar o no «generaciones» después de «millares / miles»
  english_pob_reading: Do not specify 'generations' in the main text for לָאֲלָפִים.
  chosen_spanish_reading: No se explicita «generaciones» en la frase de millares; se deja la amplitud del hebreo.
  alternative_spanish_readings:
  - para mil generaciones
  - para miles de generaciones
  rationale: El hebreo no dice literalmente «generaciones» en la primera cola. Mantener «millares» evita importar una formulación de pasajes paralelos y deja abierta la amplitud del término.
  doctrine_reference: Translation philosophy §1
- issue: Cómo reflejar el sustantivo masculino plural אָבוֹת
  english_pob_reading: The Hebrew says 'fathers'; this is retained because the source text is specifically masculine here, though the sense is generational descent.
  chosen_spanish_reading: Se conserva «padres» en lugar de neutralizarlo a «progenitores» o «ancestros».
  alternative_spanish_readings:
  - ancestros
  - progenitores
  - antepasados
  rationale: El hebreo es masculino específico y la traducción debe respetar ese dato. «Padres» es natural en español y permite que el lector perciba la forma del texto original sin perder inteligibilidad.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: El POB inglés revisó la cláusula final desde una formulación tipo «no clearing the guilty» hacia «leave unpunished» para reflejar con más precisión el hebreo, ya que «the guilty» no está explícito. La versión española sigue esa revisión y evita introducir un objeto directo no expresado. También conserva la cautela del POB al no expandir לָאֲלָפִים a «generaciones» en el cuerpo principal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como nombre divino según la convención del proyecto.
  - 'Se emplea vocabulario jurídico-ético estable: «iniquidad», «transgresión», «pecado», «castigo».'
  - La cláusula de juicio queda gramaticalmente equilibrada con la de misericordia, sin suavizar la antítesis.
  - «Padres» y «hijos de los hijos» conservan la estructura generacional del hebreo sin modernizarla en exceso.
  - La puntuación y el paralelismo buscan reproducir el ritmo formular del texto bíblico.
