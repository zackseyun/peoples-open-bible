translation:
  language: es
  text: Aunque su exaltación[a][b] se eleva hasta los cielos, y su cabeza alcanza las nubes,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si su exaltación se eleva hasta los cielos». El hebreo אִם puede leerse como condicional simple («si») o, en contexto, como concesivo («aunque»).'
    reason: lexical_alternative
  - marker: b
    text: «Su exaltación» también puede entenderse como «su altura» o «su elevación», extendiendo la imagen de altura física al estatus o al orgullo.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: Though
  chosen_spanish: Aunque
  alternatives_spanish:
  - Si
  lexicon: HALOT
  rationale: En este contexto poético, el hebreo admite un valor concesivo; «Aunque» comunica mejor esa lectura que un condicional simple, y sigue la decisión auditada del POB en inglés.
- source_word: יַעֲלֶה
  english_pob_choice: rises
  chosen_spanish: suba
  alternatives_spanish:
  - sube
  - ascienda
  lexicon: HALOT
  rationale: El verbo expresa movimiento ascendente. En español, «suba» conserva el sentido y encaja bien en la subordinada concesiva sin sonar forzado.
- source_word: לַשָּׁמַיִם
  english_pob_choice: to the heavens
  chosen_spanish: hasta los cielos
  alternatives_spanish:
  - a los cielos
  - hasta el cielo
  lexicon: HALOT
  rationale: «Los cielos» refleja bien el plural hebreo שָׁמַיִם y mantiene el tono elevado del paralelismo poético.
- source_word: שִׂיאוֹ
  english_pob_choice: his exaltation
  chosen_spanish: su exaltación
  alternatives_spanish:
  - su altura
  - su elevación
  - su loftitud
  lexicon: HALOT
  rationale: Sigo la revisión del POB que prefirió el matiz de exaltación/loftiness sobre una mera altura física. «Exaltación» conserva la posible carga de estatus y soberbia sin eliminar la imagen vertical.
- source_word: וְרֹאשׁוֹ
  english_pob_choice: and his head
  chosen_spanish: y su cabeza
  alternatives_spanish:
  - y su cabeza
  - y su cima
  lexicon: HALOT
  rationale: «Cabeza» es la equivalencia directa y mantiene la imagen corpórea y poética del versículo.
- source_word: לָעָב
  english_pob_choice: to the clouds
  chosen_spanish: hasta las nubes
  alternatives_spanish:
  - a las nubes
  - hasta la nube espesa
  lexicon: HALOT
  rationale: «Nubes» es la forma natural en español y preserva la imagen paralela con «los cielos».
- source_word: יַגִּיעַ
  english_pob_choice: reaches
  chosen_spanish: llegue
  alternatives_spanish:
  - alcance
  - toque
  lexicon: HALOT
  rationale: En español, «llegue» comunica bien la idea de alcanzar un límite espacial; conserva la metáfora de la línea elevada del verso.
theological_decisions:
- issue: Lectura concesiva de אִם en poesía
  english_pob_reading: Though his exaltation rises...
  chosen_spanish_reading: Aunque su exaltación suba...
  alternative_spanish_readings:
  - Si su exaltación sube...
  rationale: No se trata de un condicional meramente hipotético, sino de una concesión retórica que el contexto favorece. La traducción conserva esa tensión sin resolverla hacia un simple «si».
  doctrine_reference: Poética hebrea; uso concesivo de אִם en contexto
- issue: Posible matiz de estatus en שִׂיאוֹ
  english_pob_reading: his exaltation
  chosen_spanish_reading: su exaltación
  alternative_spanish_readings:
  - su altura
  - su elevación
  rationale: La revisión inglesa decidió que el término no debe limitarse a estatura física. «Exaltación» deja abierta la referencia a elevación social, orgullo o prominencia, conforme al alcance semántico señalado por el audit trail.
  doctrine_reference: Semántica léxica hebrea; imaginería de orgullo/encumbramiento
translation_notes:
  revision_awareness: La revisión auditada del POB cambió «height» por «exaltation» para reflejar mejor שִׂיאוֹ como loftiness/exaltation. Esta versión española sigue esa revisión y evita reducir el verso a mera estatura corporal. También conserva la lectura concesiva de אִם y el paralelismo ascendente hasta cielos/nubes.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige explícitamente; aquí no aparece el nombre divino.
  - Se mantiene un registro poético sobrio y readable, sin arcaísmos innecesarios.
  - Se conserva la ambigüedad entre altura física y exaltación social/moral mediante la elección «exaltación» y la nota.
  - El paralelismo semántico entre «cielos» y «nubes» se mantiene con vocabulario natural en español.
