translation:
  language: es
  text: porque Yahvé tu Dios, en medio de ti, es un Dios celoso[a]; no sea que la ira de Yahvé tu Dios se encienda contra ti y te destruya de la faz de la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un Dios celoso por la exclusividad del pacto». El hebreo expresa el celo exclusivo de Yahvé sobre su pueblo, no envidia pecaminosa.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «de sobre la faz del suelo/la tierra», un idiomatismo para ser removido por completo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la advertencia anterior. «Porque» es natural en español y conserva la relación causal sin volverla explicativa en exceso.
- source_word: אֵל קַנָּא
  english_pob_choice: a jealous God
  chosen_spanish: un Dios celoso
  alternatives_spanish:
  - un Dios zéloso
  - un Dios en celo
  lexicon: HALOT
  rationale: La POB en inglés retiene «jealous» para conservar la exclusividad de pacto; en español, «celoso» es el equivalente directo y preserva esa tensión covenantal sin diluirla en «zeloso», que puede sonar menos natural.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: La política del proyecto pide transliterar el nombre divino como «Yahvé» en el texto principal. Se mantiene el nombre personal, no el sustituto tradicional.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - su Dios
  - Dios tuyo
  lexicon: HALOT
  rationale: Con segunda persona singular, «tu Dios» es la equivalencia directa y clara.
- source_word: בְּקִרְבֶּךָ
  english_pob_choice: in your midst
  chosen_spanish: en medio de ti
  alternatives_spanish:
  - en tu medio
  - entre ustedes
  lexicon: HALOT
  rationale: La POB inglesa eligió «in your midst» para conservar el valor espacial y comunitario. En español, «en medio de ti» expresa de manera idiomática esa misma presencia en el seno del pueblo.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - de modo que no
  lexicon: HALOT
  rationale: Marca advertencia de posible consecuencia. «No sea que» conserva el tono solemne y preventivo del hebreo.
- source_word: יֶחֱרֶה אַף
  english_pob_choice: the anger ... burn
  chosen_spanish: la ira ... se encienda
  alternatives_spanish:
  - la ira ... arda
  - el enojo ... se prenda
  lexicon: HALOT
  rationale: El hebreo usa la imagen de ira que se enciende/arde. «Se encienda» reproduce bien la metáfora en español sin perder legibilidad.
- source_word: בָּךְ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - en ti
  - sobre ti
  lexicon: HALOT
  rationale: Con verbos de ira, la oposición se expresa naturalmente con «contra ti» en español.
- source_word: וְהִשְׁמִידְךָ
  english_pob_choice: and he destroy you
  chosen_spanish: y te destruya
  alternatives_spanish:
  - y te extermine
  - y te arrase
  lexicon: HALOT
  rationale: El hiphil de שׁמד denota destrucción/remoción total. «Destruya» conserva la fuerza sin volverse demasiado técnico o crudo.
- source_word: מֵעַל פְּנֵי הָאֲדָמָה
  english_pob_choice: from the face of the earth
  chosen_spanish: de sobre la faz de la tierra
  alternatives_spanish:
  - de la faz de la tierra
  - de sobre la superficie de la tierra
  lexicon: HALOT
  rationale: Se mantiene el idiomatismo de remoción total. «De sobre la faz de la tierra» reproduce con fidelidad el hebraísmo que la POB inglesa también preservó en forma idiomática.
theological_decisions:
- issue: Jealousy as covenant exclusivity, not sinful envy
  english_pob_reading: a jealous God
  chosen_spanish_reading: un Dios celoso
  alternative_spanish_readings:
  - un Dios en celo
  - un Dios celoso e iracundo
  rationale: 'Se conserva la tensión teológica del hebreo: no se trata de envidia pecaminosa, sino de la reclamación exclusiva de pacto. «Celoso» es la forma más establecida y precisa en español bíblico para este caso.'
  doctrine_reference: Translation philosophy §3; preserve theological tension rather than resolve it
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El nombre divino aparece explícitamente en el hebreo y se traduce conforme a la terminología del proyecto como «Yahvé», manteniendo el nombre personal del pacto en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el audit trail inglés sin calcar mecánicamente el inglés. Se preservan las imágenes verbales clave: celo divino, ira que se enciende y destrucción total. No se introdujeron revisiones posteriores; el pasaje coincide con el estado más reciente de alta concordancia.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme a la política del proyecto.
  - «Dios» conserva mayúscula cuando funciona como título divino.
  - «Celoso» se emplea en sentido pactal y se aclara en nota para evitar malentendidos.
  - La preposición hebrea con ira se vierte idiomáticamente como «contra ti», no de manera literalista.
  - La expresión final mantiene el hebraísmo espacial con un español natural y publicación-readable.
