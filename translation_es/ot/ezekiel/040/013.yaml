    text: Or 'from the roof of the side room to its roof.' The Hebrew term תָּא refers to a chamber within the gate structure, often understood here as a guardroom.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'doorway opposite doorway,' describing entrances facing each other across the gateway.
    reason: lexical_alternative
