base_translation:
  language: en
  yaml_path: translation/ot/zephaniah/002/009.yaml
  text: Therefore[a], as I live, declares Yahweh of hosts, the God of Israel, Moab will surely become like Sodom, and the sons of Ammon like Gomorrah—a place of nettles and salt pits, and a perpetual desolation. The remnant of my people will plunder them[b], and the remainder of my nation will inherit them.
  footnotes:
