translation:
  language: es
  text: Después de él[a], Baruc hijo de Zabay reparó con ardor[b] una segunda sección, desde el ángulo hasta la entrada de la casa de Eliasib, el sumo sacerdote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «Baruc hijo de Zaccai», siguiendo una tradición nominal alternativa reflejada en algunas versiones.'
    reason: alternative_reading
  - marker: b
    text: La expresión hebrea detrás de «reparó con ardor» es inusual y probablemente subraya el celo o la diligencia excepcional de Baruc en la obra.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחֲרָיו
  english_pob_choice: After him
  chosen_spanish: Después de él
  alternatives_spanish:
  - Tras él
  - Detrás de él
  lexicon: HALOT
  rationale: La expresión marca sucesión en la lista de obreros y también continuidad espacial en la muralla. «Después de él» conserva esa relación sin sonar mecánico en español.
- source_word: הֶחֱרָה הֶחֱזִיק
  english_pob_choice: zealously repaired
  chosen_spanish: reparó con ardor
  alternatives_spanish:
  - reparó con celo
  - reparó fervorosamente
  - fortaleció con ardor
  lexicon: HALOT
  rationale: La combinación hebrea es inusual y refuerza la acción de reparar. En español, «con ardor» transmite bien la intensidad sin añadir una glosa excesiva ni perder el matiz de diligencia ferviente.
- source_word: בָּרוּךְ בֶּן זבי
  english_pob_choice: Baruch son of Zabbai
  chosen_spanish: Baruc hijo de Zabay
  alternatives_spanish:
  - Baruc hijo de Zaccai
  lexicon: HALOT
  rationale: Se conserva la transliteración del nombre propio conforme al hebreo consonántico. «Zabay» refleja mejor la forma hebrea del texto base; la tradición alternativa queda documentada aparte.
- source_word: מִדָּה שֵׁנִית
  english_pob_choice: a second section
  chosen_spanish: una segunda sección
  alternatives_spanish:
  - otra sección
  - una segunda porción
  lexicon: HALOT
  rationale: En Nehemías 3 la expresión se refiere a un tramo asignado de la muralla, no a una medida literal. «Sección» comunica con claridad el sentido del reparto del trabajo.
- source_word: מִן הַמִּקְצוֹעַ
  english_pob_choice: from the angle
  chosen_spanish: desde el ángulo
  alternatives_spanish:
  - desde la esquina
  - desde el rincón
  lexicon: HALOT
  rationale: El sustantivo designa un ángulo o esquina de la muralla. «Ángulo» es fiel al valor arquitectónico del término y mantiene el tono técnico del pasaje.
- source_word: עַד פֶּתַח בֵּית
  english_pob_choice: to the entrance of the house of
  chosen_spanish: hasta la entrada de la casa de
  alternatives_spanish:
  - hasta la puerta de la casa de
  - hasta la entrada del hogar de
  lexicon: HALOT
  rationale: «Entrada» reproduce el sentido de פֶּתַח como apertura o acceso. «Casa de» conserva la referencia al lugar asociado con Eliasib sin ampliar indebidamente a una noción más abstracta de «hogar».
- source_word: אֶלְיָשִׁיב הַכֹּהֵן הַגָּדוֹל
  english_pob_choice: Eliashib the high priest
  chosen_spanish: Eliasib, el sumo sacerdote
  alternatives_spanish:
  - Eliasib, el gran sacerdote
  lexicon: HALOT
  rationale: «Sumo sacerdote» es la forma española estable y exacta para el título hebreo. Se mantiene el nombre propio transliterado y se evita una traducción litúrgica menos precisa.
theological_decisions:
- issue: Título sacerdotal en hebreo
  english_pob_reading: the high priest
  chosen_spanish_reading: el sumo sacerdote
  alternative_spanish_readings:
  - el gran sacerdote
  rationale: El texto identifica un cargo del culto israelita; «sumo sacerdote» es la equivalencia asentada y más clara en español. No hay razón contextual para introducir una lectura doctrinal adicional.
  doctrine_reference: Éxodo 28; Levítico 16; Hebreos 4:14
- issue: Nombre propio con tradición variante
  english_pob_reading: 'Baruch son of Zabbai / note: son of Zaccai'
  chosen_spanish_reading: Baruc hijo de Zabay
  alternative_spanish_readings:
  - Baruc hijo de Zaccai
  rationale: El hebreo consonántico del versículo favorece una transliteración cercana a Zabay. La variante tradicional se preserva como posibilidad textual, pero no se incorpora al texto principal sin apoyo suficiente del testimonio base.
  doctrine_reference: Nota textual onomástica; no doctrinal
translation_notes:
  revision_awareness: 'El borrador sigue el estado de revisión más reciente: no se registran cambios aplicados y el pass final mantiene alto acuerdo. La formulación española conserva la estructura del pasaje y documenta la única variante nominal relevante junto con la rareza léxica de la frase verbal.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto base lo exige; en este versículo no aparece.
  - Se mantiene «sumo sacerdote» como término técnico estable en español.
  - Se translitera el nombre propio conforme al hebreo del versículo y se documenta la variante textual en nota.
  - «Ángulo» y «entrada» conservan el tono arquitectónico de la lista de reconstrucción.
  - «Con ardor» intenta reflejar la intensidad del hebreo sin convertir la frase en una paráfrasis libre.
