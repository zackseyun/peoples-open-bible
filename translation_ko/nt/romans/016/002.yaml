id: ROM.16.2
reference: Romans 16:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἵνα ⸂αὐτὴν προσδέξησθε⸃ ἐν κυρίῳ ἀξίως τῶν ἁγίων, καὶ παραστῆτε αὐτῇ ἐν ᾧ ἂν ὑμῶν χρῄζῃ πράγματι, καὶ γὰρ αὐτὴ προστάτις πολλῶν ἐγενήθη καὶ ⸂ἐμοῦ αὐτοῦ⸃.
base_translation:
  language: en
  yaml_path: translation/nt/romans/016/002.yaml
  text: so that you may welcome her in the Lord in a manner worthy of the saints, and assist her in whatever matter she may need from you, for she herself has become a patron of many, and of myself as well.
translation:
  language: ko
  text: 여러분이 그를 주 안에서 성도들에게 합당한 방식으로 받아들이고, 그가 여러분에게서 필요로 하는 어떤 일에도 도와주시기 바랍니다. 그는 많은 사람의 후원자[a]가 되었고, 나 자신의 후원자이기도 합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 προστάτις는 후원·보호·지원을 베푸는 여성을 가리킨다. 단순한 「돕는 자」보다 사회적·재정적 후원자의 무게를 살린다.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσδέξησθε
  english_pob_choice: welcome
  chosen_korean: 받아들이다
  lexicon: BDAG
  rationale: 14:1, 15:7 「προσλαμβάνεσθαι(받아들이다)」와 동일 어휘군으로 옮긴다. 일관성.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_korean: 주 안에서
  lexicon: BDAG
  rationale: 정형.
- source_word: ἀξίως τῶν ἁγίων
  english_pob_choice: in a manner worthy of the saints
  chosen_korean: 성도들에게 합당한 방식으로
  alternatives_korean:
  - 성도다운 방식으로
  lexicon: BDAG
  rationale: ἀξίως + 속격 「~에 합당하게」.
- source_word: παραστῆτε αὐτῇ
  english_pob_choice: assist her
  chosen_korean: 그를 도와주다
  alternatives_korean:
  - 그를 곁에서 도와주다
  lexicon: BDAG
  rationale: παρίστημι의 「곁에 서서 돕다」.
- source_word: προστάτις
  english_pob_choice: patron
  chosen_korean: 후원자
  alternatives_korean:
  - 보호자
  - 돕는 자
  lexicon: BDAG
  rationale: 여성형 명사. 로마 사회의 「후원자/보호자」 함의. 「돕는 자」로 약화시키지 않는다.
