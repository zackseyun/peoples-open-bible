revisions:
- from: Entonces el ángel de Dios[a], que había ido delante del campamento de Israel, se movió y pasó detrás de ellos; y la columna de nube se movió desde delante de ellos y se puso detrás de ellos.
  to: Entonces el ángel de Dios[a], que iba delante del campamento de Israel, se movió y fue detrás de ellos; y la columna de nube se movió de delante de ellos y se quedó detrás de ellos.
  rationale: 'La revisión conserva plenamente el sentido del texto y la nota léxica, pero mejora la correspondencia con el hebreo en tres puntos: ''iba delante'' refleja mejor el participio durativo; ''fue detrás de ellos'' sigue más de cerca el movimiento narrado; y ''se quedó detrás de ellos'' expresa mejor el valor de עמד como adopción de una posición fija.'
  reviewer_model: gpt-5.4
