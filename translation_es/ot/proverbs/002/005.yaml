translation:
  language: es
  text: Entonces entenderás el temor de Yahvé[a] y hallarás el conocimiento de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el temor de Yahvé».
    reason: alternative_reading
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Al entonces
  - Así
  lexicon: HALOT
  rationale: El adverbio temporal marca la consecuencia lógica de las condiciones anteriores. «Entonces» conserva esa fuerza resultativa con naturalidad en español.
- source_word: תָּבִין
  english_pob_choice: you will understand
  chosen_spanish: entenderás
  alternatives_spanish:
  - comprenderás
  - discernirás
  lexicon: HALOT
  rationale: El verbo en qal imperfecto de בין expresa llegar a entender o discernir. «Entenderás» es claro, natural y suficientemente amplio para el contexto sapiencial.
- source_word: יִרְאַת יְהוָה
  english_pob_choice: the fear of Yahweh
  chosen_spanish: el temor de Yahvé
  alternatives_spanish:
  - el temor de Yahweh
  - la reverencia por Yahvé
  lexicon: HALOT
  rationale: La construcción nominal conserva la noción sapiencial de temor reverente y no la reduce a mera admiración. Se mantiene «Yahvé» según el criterio terminológico del proyecto para יְהוָה.
- source_word: וְדַעַת
  english_pob_choice: and ... knowledge
  chosen_spanish: y ... el conocimiento
  alternatives_spanish:
  - y ... la sabiduría
  - y ... el saber
  lexicon: HALOT
  rationale: דעת denota conocimiento; «el conocimiento» preserva el sustantivo y el paralelismo con «entenderás» y «hallarás».
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios mismo
  - divino
  lexicon: HALOT
  rationale: En este contexto אֱלֹהִים se refiere al Dios verdadero. La construcción «conocimiento de Dios» mantiene el genitivo objetivo y el sentido relacional.
- source_word: תִּמְצָא
  english_pob_choice: find
  chosen_spanish: hallarás
  alternatives_spanish:
  - encontrarás
  - descubrirás
  lexicon: HALOT
  rationale: מצא significa «hallar/encontrar». «Hallarás» conserva el valor lexical y suena sobrio y bíblico sin caer en una fraseología arcaizante.
theological_decisions:
- issue: Rendering of the divine name יְהוָה (YHWH)
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: El texto hebreo contiene el Tetragrámaton directamente. Conforme al criterio terminológico del proyecto, se vierte «Yahvé» en el texto principal para no enmascarar el nombre propio divino.
  doctrine_reference: 'DOCTRINE.md: contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto de Proverbios 2:1–4 presenta condiciones de búsqueda; este versículo expresa el resultado. La revisión inglesa está estable y sin cambios, y la traducción española sigue esa lectura sin introducir variantes no sustentadas.
  spanish_consistency_notes:
  - 'Se mantiene la terminología del proyecto para el nombre divino: Yahvé.'
  - «Temor» conserva la fuerza sapiencial de יִרְאָה; no se reduce a «reverencia» en el texto principal.
  - «Conocimiento de Dios» preserva la relación objetiva del sustantivo en paralelo con «entenderás» y «hallarás».
