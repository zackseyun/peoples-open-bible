translation:
  language: es
  text: Pero el príncipe del reino de Persia se me opuso durante veintiún días, y he aquí, Miguel, uno de los príncipes principales[a], vino a ayudarme, y yo quedé allí junto a los reyes de Persia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «uno de los primeros príncipes» o «uno de los príncipes más destacados».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los reyes de Persia»; algunas traducciones suavizan esto a «el rey de Persia», pero el texto hebreo está en plural.'
    reason: alternative_reading
lexical_decisions:
- source_word: שַׂר
  english_pob_choice: prince
  chosen_spanish: príncipe
  alternatives_spanish:
  - ruler
  - comandante
  lexicon: HALOT
  rationale: En el contexto de Daniel, שַׂר designa una figura de alto rango; «príncipe» conserva mejor que «comandante» la ambigüedad entre autoridad política y rango celestial. En español también mantiene el paralelo con Miguel.
- source_word: מַלְכוּת פָּרַס
  english_pob_choice: the kingdom of Persia
  chosen_spanish: el reino de Persia
  alternatives_spanish:
  - el dominio de Persia
  - Persia
  lexicon: HALOT
  rationale: מַלְכוּת expresa «reino» o «dominio». «El reino de Persia» conserva la relación formal del hebreo y evita reducir la expresión a un simple nombre geográfico.
- source_word: עֹמֵד לְנֶגְדִּי
  english_pob_choice: stood against me
  chosen_spanish: se me opuso
  alternatives_spanish:
  - estuvo de pie frente a mí
  - estaba opuesto a mí
  lexicon: HALOT
  rationale: El participio con לְנֶגֶד comunica oposición. En español, «se me opuso» transmite con naturalidad la fuerza adversativa sin perder el matiz del enfrentamiento.
- source_word: עֶשְׂרִים וְאֶחָד יוֹם
  english_pob_choice: for twenty-one days
  chosen_spanish: durante veintiún días
  alternatives_spanish:
  - por veintiún días
  - veintiún días
  lexicon: HALOT
  rationale: El hebreo expresa una duración. «Durante veintiún días» es la forma natural en español para preservar ese valor temporal.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - entonces
  lexicon: HALOT
  rationale: «Y he aquí» conserva el golpe discursivo de atención súbita y el tono solemne del hebreo mejor que una simple transición narrativa.
- source_word: מִיכָאֵל
  english_pob_choice: Michael
  chosen_spanish: Miguel
  alternatives_spanish:
  - Micael
  lexicon: Standard transliteration convention
  rationale: El nombre propio se adapta a la forma española asentada, «Miguel», que es la convención natural y reconocible en español bíblico.
- source_word: אַחַד הַשָּׂרִים הָרִאשֹׁנִים
  english_pob_choice: one of the chief princes
  chosen_spanish: uno de los príncipes principales
  alternatives_spanish:
  - uno de los primeros príncipes
  - uno de los príncipes más importantes
  lexicon: HALOT
  rationale: El hebreo puede expresar prioridad en rango o prominencia. «Príncipes principales» mantiene la idea jerárquica sin resolver por completo el matiz entre «first», «foremost» y «chief».
- source_word: בָּא לְעָזְרֵנִי
  english_pob_choice: came to help me
  chosen_spanish: vino para ayudarme
  alternatives_spanish:
  - vino a ayudarme
  - vino para socorrerme
  lexicon: HALOT
  rationale: La combinación de movimiento + infinitivo se traduce de forma directa y natural. «Ayudarme» conserva la simplicidad del original sin añadir intensidad no explícita.
- source_word: נוֹתַרְתִּי
  english_pob_choice: I was left
  chosen_spanish: yo quedé
  alternatives_spanish:
  - me quedé
  - fui dejado
  lexicon: HALOT
  rationale: El nifal de יתר puede significar «quedar/ser dejado». «Yo quedé» reproduce bien el resultado pasivo en español y suena más natural que una perífrasis más literal.
- source_word: אֵצֶל
  english_pob_choice: beside
  chosen_spanish: junto a
  alternatives_spanish:
  - al lado de
  - con
  lexicon: HALOT
  rationale: אֵצֶל denota cercanía espacial o compañía. «Junto a» preserva esa proximidad sin forzar una lectura relacional más específica.
- source_word: מַלְכֵי פָרָס
  english_pob_choice: the kings of Persia
  chosen_spanish: los reyes de Persia
  alternatives_spanish:
  - el rey de Persia
  - los monarcas de Persia
  lexicon: HALOT
  rationale: Se conserva el plural del hebreo. «Los reyes de Persia» evita armonizar la forma original al singular y mantiene la tensión textual señalada en el aparato inglés.
theological_decisions:
- issue: Identidad del «príncipe del reino de Persia» y de los «príncipes principales»
  english_pob_reading: Retain 'prince' language without specifying in the main text whether these are angelic beings, human rulers, or both in a layered sense.
  chosen_spanish_reading: Conservar «príncipe» y «príncipes principales» sin identificar explícitamente en el texto principal si se trata de seres celestiales, gobernantes humanos o una correspondencia entre ambos.
  alternative_spanish_readings:
  - ángel/príncipe territorial
  - gobernante humano
  - una representación mixta celestial-terrenal
  rationale: El contexto sugiere conflicto sobrenatural, pero el hebreo dice שַׂר. Mantener «príncipe» preserva la tensión teológica y evita introducir una glosa interpretativa que el texto no da.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla en la traducción.
- issue: El plural «los reyes de Persia»
  english_pob_reading: Translate literally as 'the kings of Persia.'
  chosen_spanish_reading: Traducir literalmente «los reyes de Persia».
  alternative_spanish_readings:
  - el rey de Persia
  - los reyes persas como plural dinástico
  rationale: El hebreo es plural, y la traducción debe conservar esa forma aunque resulte menos fluida. Así se respeta la primacía del texto original sobre la nivelación traductora.
  doctrine_reference: Primacía del idioma original sobre la tradición traductora.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último estado revisado del texto base en inglés: se mantiene la oposición temporal de veintiún días, se conserva el valor enfático de וְהִנֵּה con «y he aquí», se traduce מִיכָאֵל por la forma española habitual «Miguel», y se preserva el plural de מַלְכֵי פָרָס. También se reflejó la elección revisada de אֵצֶל con «junto a» para expresar proximidad sin suavizar el plural hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el nombre divino aparece explícitamente; aquí no aparece.
  - Se mantiene «príncipe» para שַׂר por coherencia con Daniel y con el paralelismo con Miguel.
  - Se conserva el plural «reyes» para מַלְכֵי פָרָס, aunque el español pueda sonar menos esperado.
  - Se opta por un español bíblico moderno y claro, sin arcaísmos innecesarios.
