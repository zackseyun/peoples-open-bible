    reason: lexical_alternative
  revision_rationale: Se reemplazó la nota sobre 'Asuero' por la nota léxica necesaria según el audit trail inglés. También se ajustó 'en el nombre' a 'en nombre' para una mejor naturalidad en español, y se refinó la frase ecuestre para conservar la cercanía al hebreo con mejor legibilidad, manteniendo la extrañeza en el texto principal y explicándola en nota.
