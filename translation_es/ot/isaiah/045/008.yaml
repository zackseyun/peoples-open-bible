revisions:
- from: Destilen, cielos, desde lo alto; y las nubes derramen justicia[a]; ábrase la tierra, y brote salvación, y haga brotar justicia[b] juntamente. Yo, Yahvé, la he creado.
  to: Destilen, cielos, desde lo alto[a]; y las nubes derramen rectitud; ábrase la tierra, y brote salvación, y haga brotar rectitud juntamente. Yo, Yahvé, lo he creado.
  rationale: Se ajusta צדק / צדקה a la decisión léxica principal documentada por el POB, usando «rectitud» en el texto y preservando «justicia» como alternativa en nota. También se corrige el pronombre final a «lo he creado» para no fijar indebidamente el antecedente como «tierra». Se mantiene la imaginería poética y el uso de «Yahvé».
  reviewer_model: gpt-5.4
