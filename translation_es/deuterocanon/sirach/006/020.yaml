review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del hebreo y del paralelo griego: la sabiduría es difícil para el necio, y la persona falta de entendimiento no permanece en ella. Sin embargo, hay una desalineación con la decisión inglesa auditada sobre el pronombre-objeto: el inglés optó por un referente no personificado (''it''), mientras que el español introduce una personificación más marcada con ''ella''. Dado que el referente no aparece explícito en el versículo, conviene evitar esa sobreespecificación.'
  spanish_quality_summary: El español es claro y digno. 'Difícil es para el necio' suena bíblico-natural, aunque algo invertido; es aceptable. El principal ajuste es reemplazar 'no perseverará en ella' por una formulación más fiel al expediente POB y más natural sin personificar innecesariamente. 'No lo soportará' sería demasiado físico; 'no permanecerá en ello' suena poco idiomático. 'No podrá mantenerse en eso' sería más interpretativo. La solución más equilibrada es 'no lo soportará', pero pierde la idea de permanencia; mejor 'no lo resistirá' tampoco. En contexto, 'no perseverará en ello' funciona suficientemente bien en español formal y mantiene el matiz de continuidad.
  glossary_alignment: No hay términos del glosario mayor en juego. 'Necio' para אֱוִיל y 'carece de entendimiento' para חֲסַר לֵב están bien alineados con las decisiones documentadas. La nota sobre 'falto de corazón' preserva correctamente el hebraísmo. La nota sobre עֲקֻבָּה también refleja bien las alternativas léxicas.
  issues:
  - severity: medium
    issue: El pronombre 'ella' sobrepersonifica el referente implícito.
    rationale: El expediente inglés documenta una decisión explícita de evitar personificar en exceso la referencia a la sabiduría en este versículo. Como el objeto no se expresa en la cláusula, 'ella' añade un grado de explicitación que el POB quiso evitar.
  - severity: low
