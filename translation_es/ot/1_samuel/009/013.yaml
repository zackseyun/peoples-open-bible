translation:
  language: es
  text: Tan pronto como entren en la ciudad, lo encontrarán, antes de que suba al lugar alto[a] para comer. Porque el pueblo no comerá hasta que él llegue, ya que él es quien bendice el sacrificio[b]; después comerán los invitados. Así que suban ahora, porque hoy[c] lo encontrarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Lugar alto» designa un sitio de culto elevado donde se realizaban comidas sacrificiales.
    reason: cultural_note
  - marker: b
    text: Es decir, pronuncia la bendición ritual vinculada al sacrificio antes de que coman los invitados.
    reason: cultural_note
  - marker: c
    text: 'O: «en este tiempo»; el hebreo כְהַיּוֹם puede enfatizar la inmediatez más que el día del calendario.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּבֹאֲכֶם הָעִיר
  english_pob_choice: As soon as you enter the city
  chosen_spanish: Tan pronto como entren en la ciudad
  alternatives_spanish:
  - Cuando entren en la ciudad
  - Al entrar en la ciudad
  lexicon: HALOT
  rationale: El hebreo expresa inmediatez temporal; "tan pronto como" comunica mejor la relación de rapidez que el contexto exige. Se usa tercera persona plural genérica para un destino plural implícito en el diálogo.
- source_word: כֵּן תִּמְצְאוּן אֹתוֹ
  english_pob_choice: you will find him
  chosen_spanish: lo encontrarán
  alternatives_spanish:
  - entonces lo encontrarán
  - así lo encontrarán
  lexicon: HALOT
  rationale: כֵּן aquí refuerza la certeza o inmediatez del hallazgo. En español, omitir el adverbio evita aspereza y mantiene el sentido ya expresado por el contexto.
- source_word: בְּטֶרֶם יַעֲלֶה
  english_pob_choice: before he goes up
  chosen_spanish: antes de que suba
  alternatives_spanish:
  - antes de que vaya
  - antes de que ascienda
  lexicon: HALOT
  rationale: '"Suba" conserva el movimiento ascendente del verbo עלה, importante por la referencia inmediata al lugar alto.'
- source_word: הַבָּמָתָה
  english_pob_choice: to the high place
  chosen_spanish: al lugar alto
  alternatives_spanish:
  - al alto lugar
  - al santuario de altura
  lexicon: HALOT
  rationale: Se conserva el término descriptivo básico del hebreo sin imponer una identificación más específica que el texto no exige. "Lugar alto" es transparente en español y mantiene la referencia cultual.
- source_word: לֶאֱכֹל
  english_pob_choice: to eat
  chosen_spanish: para comer
  alternatives_spanish:
  - a comer
  - para participar del banquete
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad; "para comer" suena natural y mantiene la sencillez verbal del hebreo.
- source_word: לֹא יֹאכַל הָעָם
  english_pob_choice: the people will not eat
  chosen_spanish: el pueblo no comerá
  alternatives_spanish:
  - la gente no comerá
  - el pueblo no empezará a comer
  lexicon: HALOT
  rationale: '"Pueblo" reproduce el colectivo hebreo הָעָם de forma directa y digna. El futuro encaja con el anuncio narrativo.'
- source_word: עַד בֹּאוֹ
  english_pob_choice: until he comes
  chosen_spanish: hasta que él llegue
  alternatives_spanish:
  - hasta su llegada
  - hasta que venga
  lexicon: HALOT
  rationale: '"Llegue" comunica la llegada efectiva sin perder naturalidad en español. El antecedente masculino queda explícito para claridad.'
- source_word: יְבָרֵךְ הַזֶּבַח
  english_pob_choice: he is the one who blesses the sacrifice
  chosen_spanish: él es quien bendice el sacrificio
  alternatives_spanish:
  - él bendice el sacrificio
  - él pronuncia la bendición sobre el sacrificio
  lexicon: HALOT
  rationale: Se conserva la idea de bendecir asociada al rito sacrificial. La estructura enfática "él es quien" refleja el hebreo con sujeto resaltado.
- source_word: הַזֶּבַח
  english_pob_choice: the sacrifice
  chosen_spanish: el sacrificio
  alternatives_spanish:
  - la ofrenda
  - el sacrificio ritual
  lexicon: HALOT
  rationale: '"Sacrificio" es el valor léxico más directo de זבח. Aunque el contexto implica comida sacrificial, el texto primero nombra el sacrificio.'
- source_word: אַחֲרֵי כֵן יֹאכְלוּ הַקְּרֻאִים
  english_pob_choice: afterward those who are invited eat
  chosen_spanish: después de eso comerán los invitados
  alternatives_spanish:
  - después comerán los invitados
  - luego comerán los invitados
  lexicon: HALOT
  rationale: La secuencia temporal se expresa con naturalidad. "Los invitados" resume הַקְּרֻאִים como participio pasivo sustantivado, en un español claro.
- source_word: וְעַתָּה עֲלוּ
  english_pob_choice: So go up now
  chosen_spanish: Así que suban ahora
  alternatives_spanish:
  - Y ahora, suban
  - Suban ahora
  lexicon: HALOT
  rationale: '"Así que" transmite la inferencia práctica del contexto. Se conserva el verbo de movimiento ascendente por la referencia al lugar alto.'
- source_word: כִּי אֹתוֹ כְהַיּוֹם תִּמְצְאוּן אֹתוֹ
  english_pob_choice: for today you will find him
  chosen_spanish: porque hoy lo encontrarán
  alternatives_spanish:
  - porque en este momento lo encontrarán
  - porque ahora mismo lo encontrarán
  lexicon: HALOT
  rationale: כְהַיּוֹם puede significar "hoy" o "en este tiempo"; aquí la urgencia narrativa permite "hoy" como equivalente natural. Se evita repetir el pronombre por estilo español, aunque el hebreo lo haga para énfasis.
theological_decisions:
- issue: הַבָּמָתָה como sitio cultual elevado
  english_pob_reading: '''High place'' refers to an elevated worship site where sacrificial meals were held.'
  chosen_spanish_reading: '''lugar alto'' refiere a un sitio de culto elevado donde se celebraban comidas sacrificiales.'
  alternative_spanish_readings:
  - '''santuario'''
  - '''altar'''
  rationale: No conviene sustituir el término por una palabra más interpretativa que pudiera ocultar la especificidad del hebreo. "Lugar alto" mantiene la referencia cultural y cultual sin cerrarla más de lo debido.
  doctrine_reference: 1 Sm 9:12-14; cf. 1 R 3:2
- issue: יְבָרֵךְ הַזֶּבַח como bendición ritual previa a comer
  english_pob_reading: '''Blesses the sacrifice'' likely means pronouncing the blessing associated with the sacrificial meal before the invited participants eat.'
  chosen_spanish_reading: '''bendice el sacrificio'' se entiende como pronunciar la bendición asociada al rito antes de que coman los invitados.'
  alternative_spanish_readings:
  - '''pronuncia la bendición sobre el sacrificio'''
  - '''da la bendición al sacrificio'''
  rationale: Se conserva la tensión semántica del verbo ברך sin explicarlo en exceso en el texto principal. La nota aclara la función ritual, evitando una lectura demasiado general de "bendecir".
  doctrine_reference: Deuteronomio 12:7; 1 Samuel 9:13
translation_notes:
  revision_awareness: 'El inglés POB mantiene un enfoque de equivalencia óptima con tres decisiones clave: ''as soon as'' para la inmediatez de כְּבֹאֲכֶם, omisión del ''then/so'' explícito en כֵּן, y la nota cultural sobre el ''high place'' y la bendición ritual. La versión española conserva esas decisiones, pero adapta el orden y la puntuación a un español fluido, manteniendo la tensión entre el valor léxico de ''sacrificio'' y la comida cultual implícita.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' según el criterio del proyecto, aunque este versículo no lo contenga explícitamente.
  - Se mantiene 'lugar alto' en vez de 'shrine' o 'altar' para no cerrar indebidamente el término במה.
  - Se conserva 'sacrificio' y no 'ofrenda' para mantener la fuerza léxica de זבח.
  - Se traduce הָעָם como 'el pueblo' y הַקְּרֻאִים como 'los invitados', distinguiendo el colectivo general del grupo específico convocado.
