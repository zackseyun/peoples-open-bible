  text: tú alegraste[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El testimonio griego aquí es fragmentario y conserva solo el verbo, con variante ortográfica entre ηυφρανας y ευφρανας. No se expresa ningún objeto en el texto conservado, por eso la traducción permanece breve.
