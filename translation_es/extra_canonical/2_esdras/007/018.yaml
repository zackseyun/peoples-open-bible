base_translation:
  language: en
  yaml_path: translation/extra_canonical/2_esdras/007/018.yaml
  text: But the righteous will endure narrow things[a], hoping for broad things[b]; for those who have acted ungodly have both suffered narrowness and not seen the broad things.
  footnotes:
  - marker: a
    text: Or 'have also endured distress, and have not seen the broad things'.
    reason: previous_rendering
  - marker: b
    text: Or 'hoping for broad ones'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T11:42:02Z'
    unchanged: false
    changes_summary: Replaced 'Yet' with 'But' for a more natural adversative connection, and removed the closing quotation mark. Kept the core wording, which accurately reflects the Latin contrast between present straits and hoped-for spaciousness.
translation:
  language: es
  text: Pero los justos soportarán cosas estrechas, esperando cosas amplias; porque los que han obrado impíamente tanto han padecido estrechez como no han visto las cosas amplias.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: iusti
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos de corazón
  lexicon: iusti
  rationale: «Justos» preserva la correspondencia más directa con el latín y mantiene el contraste moral-jurídico con «impíamente». «Rectos» sería posible, pero atenúa el valor forense y comunitario del término.
- source_word: ferent
  english_pob_choice: will endure
  chosen_spanish: soportarán
  alternatives_spanish:
  - endurarán
  - llevarán
  lexicon: ferent
  rationale: El latín expresa una acción futura de soportar/cargar. «Soportarán» comunica bien la perseverancia bajo presión sin sonar demasiado literal como «llevarán»; «endurarán» también es viable, pero algo más duro de estilo.
- source_word: angusta
  english_pob_choice: narrow things
  chosen_spanish: cosas estrechas
  alternatives_spanish:
  - cosas angostas
  - estrecheces
  lexicon: angusta
  rationale: Se conserva la imagen espacial de cosas «estrechas» para mantener el paralelismo con «amplias». «Estrecheces» sería más idiomático en español, pero borra en parte la metáfora concreta del latín.
- source_word: spatiosa
  english_pob_choice: broad things
  chosen_spanish: cosas amplias
  alternatives_spanish:
  - cosas espaciosas
  - cosas anchas
  lexicon: spatiosa
  rationale: «Amplias» transmite la idea de amplitud espacial y preserva la oposición con «estrechas». «Espaciosas» es posible, pero suena más a cualidad física de un lugar que a la oposición retórica del pasaje.
- source_word: impie gesserunt
  english_pob_choice: have acted ungodly
  chosen_spanish: han obrado impíamente
  alternatives_spanish:
  - han actuado impíamente
  - han obrado sin Dios
  lexicon: impie gesserunt
  rationale: «Obrado impíamente» refleja el adverbio latino y mantiene la gravedad religiosa del término. «Actuado impíamente» es correcto, pero menos natural en registro bíblico; «sin Dios» sería demasiado interpretativo.
- source_word: angustiam passi sunt
  english_pob_choice: have both suffered narrowness
  chosen_spanish: han padecido estrechez
  alternatives_spanish:
  - han sufrido estrechez
  - han sufrido angustia
  lexicon: angustiam passi sunt
  rationale: «Padecido estrechez» conserva el vínculo léxico con «estrechas» y evita introducir «distress» o «angustia» como única solución, ya que el pasaje insiste en la metáfora espacial. La forma verbal simple en español no requiere repetir «ambos» dentro del texto porque el correlative pair del latín ya está reflejado en la sintaxis coordinada.
- source_word: spatiosa non viderunt
  english_pob_choice: have not seen the broad things
  chosen_spanish: no han visto las cosas amplias
  alternatives_spanish:
  - no han visto lo amplio
  - no han visto las amplitudes
  lexicon: spatiosa non viderunt
  rationale: «No han visto las cosas amplias» mantiene la misma substantivación plural que el latín y la coherencia con «cosas estrechas / cosas amplias». «Lo amplio» suavizaría la imagen; «las amplitudes» sería demasiado abstracto para el registro del versículo.
theological_decisions:
- issue: Contraste entre destino de justos e impíos, con lenguaje espacial de estrechez/amplitud
  english_pob_reading: The righteous will endure narrow things, hoping for broad things; for those who have acted ungodly have both suffered narrowness and not seen the broad things.
  chosen_spanish_reading: Los justos soportarán cosas estrechas, esperando cosas amplias; porque los que han obrado impíamente han padecido estrechez y no han visto las cosas amplias.
  alternative_spanish_readings:
  - Los justos soportarán angustias, esperando bendiciones amplias
  - Los justos atravesarán estrecheces esperando espacios amplios
  rationale: 'El texto latino desarrolla una antítesis espacial deliberada: estrechez frente a amplitud. La traducción conserva esa figura sin reemplazarla por términos más explicativos como «angustias» o «bendiciones», para no borrar la imaginería del pasaje ni suavizar el juicio contra los impíos.'
  doctrine_reference: No doctrinal conflict; preserves apocalyptic moral contrast and the rhetorical spatial metaphor of 4 Ezra.
translation_notes:
  revision_awareness: 'La versión inglesa revisada corrigió «Yet» por «But», reforzó la adversativa simple y mantuvo «broad things»/«narrowness» para reflejar mejor la oposición espacial del latín. La propuesta española sigue esa revisión: usa «Pero», conserva el paralelismo estrechez/amplitud y evita suavizar «han padecido estrechez y no han visto las cosas amplias».'
  spanish_consistency_notes:
  - Se mantiene «justos» para iusti y «impíamente» para impie, evitando mezclar registros morales distintos.
  - Se conserva la metáfora espacial con «estrechas» / «amplias» en todo el versículo.
  - No se introduce «Cristo», «SEÑOR» ni otros términos no presentes en el latín.
  - Las notas al pie están ancladas solo en palabras con alternativas reales de traducción.
