translation:
  language: es
  text: Al oír estas cosas, Antíoco, sanguinario, asesino y sumamente salvaje[a], ordenó que le cortaran la lengua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego emplea un superlativo raro, que intensifica la brutalidad de Antíoco; también podría verterse «sumamente cruel» o «sumamente feroz».
    reason: lexical_alternative
lexical_decisions:
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas palabras
  - esto
  lexicon: LSJ
  rationale: El demostrativo neutro plural remite de manera amplia a lo que precede. «Estas cosas» preserva esa referencia general sin limitarla solo a palabras pronunciadas.
- source_word: ἀκούσας
  english_pob_choice: heard
  chosen_spanish: al oír
  alternatives_spanish:
  - habiendo oído
  - cuando oyó
  lexicon: LSJ
  rationale: El participio aoristo expresa acción anterior; en español narrativo, «al oír» comunica bien la anterioridad con naturalidad.
- source_word: αἱμοβόρος
  english_pob_choice: bloodthirsty
  chosen_spanish: sanguinario
  alternatives_spanish:
  - sediento de sangre
  - devorador de sangre
  lexicon: LSJ
  rationale: El compuesto pinta a alguien inclinado a la sangre y a la violencia. «Sanguinario» es natural en español, fuerte y fiel al matiz moral.
- source_word: φονώδης
  english_pob_choice: murderous
  chosen_spanish: asesino
  alternatives_spanish:
  - homicida
  - criminal
  lexicon: LSJ
  rationale: El adjetivo señala una disposición homicida. «Asesino» mantiene el tono condenatorio directo y conciso.
- source_word: πανμμερώτατος
  english_pob_choice: most savage
  chosen_spanish: sumamente salvaje
  alternatives_spanish:
  - sumamente cruel
  - sumamente feroz
  - absolutamente salvaje
  lexicon: LSJ
  rationale: La forma superlativa intensifica la brutalidad extrema. «Sumamente salvaje» conserva la fuerza absoluta del término; se prefiere este giro para que el español resulte idiomático sin perder intensidad.
- source_word: ἐκέλευσεν
  english_pob_choice: he ordered
  chosen_spanish: ordenó
  alternatives_spanish:
  - mandó
  - dio la orden de
  lexicon: LSJ
  rationale: Verbo estándar para emitir una orden; «ordenó» es directo y acorde con el registro narrativo.
- source_word: τὴν γλῶτταν αὐτοῦ
  english_pob_choice: his tongue
  chosen_spanish: la lengua
  alternatives_spanish:
  - su lengua
  - la lengua de él
  lexicon: LSJ
  rationale: En la orden española, el referente del posesivo se entiende por el contexto inmediato. «La lengua» evita pesadez y mantiene la referencia al miembro castigado; el pronombre dativo en la cláusula verbal expresa el afectado.
- source_word: ἐκτεμεῖν
  english_pob_choice: to be cut out
  chosen_spanish: que le cortaran
  alternatives_spanish:
  - que le sacaran
  - que le extirparan
  - que le cortasen
  lexicon: LSJ
  rationale: El infinitivo implica la ejecución del acto por otros bajo la orden de Antíoco. «Que le cortaran» reproduce naturalmente la pasiva implícita en español y conserva el sentido violento de excisión.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail, que ajustó el orden para reflejar mejor la aposición descriptiva de Antióco sin cambiar el sentido. En español, esa aposición se integró como una serie de epítetos antes de la acción principal.
  spanish_consistency_notes:
  - Se mantuvo «Antíoco» como forma española estándar del nombre propio.
  - Se evitó «Señor» u otro recurso de máscara porque el pasaje no contiene el tetragrámaton ni una cita del nombre divino.
  - La referencia al castigo se expresó con pasiva perifrástica en español («que le cortaran») para reflejar el infinitivo griego con agente implícito.
  - «Lengua» se usó en sentido corporal literal, sin eufemizarlo, por la violencia explícita del contexto.
