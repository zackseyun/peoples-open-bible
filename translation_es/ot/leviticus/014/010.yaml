    rationale: El hebreo וּבַיּוֹם הַשְּׁמִינִי expresa tiempo secuencial; en español natural y bíblicamente digno suena mejor «al octavo día» o «en el día octavo». El sentido no cambia, pero mejora la legibilidad.
  - severity: high
    issue: La nota [a] está colocada en «sin defecto» aunque explica «log».
    rationale: Las instrucciones requieren que el marcador aparezca exactamente en la palabra o frase pertinente. Actualmente induce a error y debe trasladarse a «log[a]».
