    issue: El marcador de nota [a] está colocado en 'leones' pero la nota explica 'hijos de hombre'.
    rationale: Esto rompe la correspondencia exigida entre texto y nota y puede confundir al lector sobre qué término se está aclarando.
  - severity: medium
    issue: '''Hijos de hombre'' es una formulación poco natural en español actual.'
    rationale: Aunque refleja literalmente el hebreo, en español eclesial general suena torpe. 'Hijos de Adán' preserva mejor el carácter marcado de בְּנֵי אָדָם sin neutralizarlo.
