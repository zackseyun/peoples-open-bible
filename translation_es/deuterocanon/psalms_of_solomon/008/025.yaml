translation:
  language: es
  text: Obraron conforme a sus inmundicias[a], tal como lo hicieron sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus impurezas».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησαν
  english_pob_choice: acted
  chosen_spanish: obraron
  alternatives_spanish:
  - hicieron
  - actuaron
  lexicon: BDAG
  rationale: El griego tiene un sentido amplio de hacer/obrar. En español, «obraron» conserva el matiz de conducta moral y encaja naturalmente con la frase que sigue, sin volverla más abstracta de lo que permite el texto.
- source_word: κατὰ
  english_pob_choice: according to
  chosen_spanish: conforme a
  alternatives_spanish:
  - según
  - de acuerdo con
  lexicon: BDAG
  rationale: «Conforme a» expresa bien la idea de acción medida por una norma o patrón, y mantiene en español la relación de correspondencia del griego sin sonar forzada.
- source_word: τὰς ἀκαθαρσίας αὐτῶν
  english_pob_choice: their uncleannesses
  chosen_spanish: sus inmundicias
  alternatives_spanish:
  - sus impurezas
  - sus actos inmundos
  lexicon: BDAG
  rationale: Se conserva el plural y la carga moral-ritual del sustantivo griego. «Inmundicias» comunica con fuerza el carácter de defilement/impureza, más cerca del tono marcado del inglés POB que una paráfrasis suavizada.
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - así como
  - como
  lexicon: BDAG
  rationale: «Tal como» marca comparación directa y continuidad ejemplar con el comportamiento de los padres, reproduciendo con claridad el valor comparativo del griego.
- source_word: οἱ πατέρες αὐτῶν
  english_pob_choice: their fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus antepasados
  - sus mayores
  lexicon: BDAG
  rationale: «Padres» es la equivalencia más directa y conserva la referencia genealógica/ancestral del griego. No se amplía interpretativamente a «antepasados» porque el texto no lo exige.
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa muestran acuerdo alto y no registran revisiones aplicadas; por ello la versión española sigue de cerca la sintaxis y las decisiones léxicas ya confirmadas, sin introducir matices doctrinales adicionales.
  spanish_consistency_notes:
  - Se mantuvo la correspondencia de número en el sustantivo plural «inmundicias».
  - Se evitó el calco rígido de «según» en favor de «conforme a», que suena natural en español y conserva el valor de medida o norma.
  - No se sustituyó «padres» por «antepasados», para no diluir la lexicalidad directa del griego.
  - La nota a pie preserva la alternativa léxica documentada en la auditoría inglesa.
