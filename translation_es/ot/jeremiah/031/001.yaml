translation:
  language: es
  text: En aquel tiempo[a], declara Yahvé, yo seré Dios para todas las familias de Israel, y ellos serán mi pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'clanes' en vez de 'familias'. El término hebreo puede designar grupos familiares extensos dentro de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּעֵת הַהִיא
  english_pob_choice: At that time
  chosen_spanish: En aquel tiempo
  alternatives_spanish:
  - En ese tiempo
  - Para aquel tiempo
  lexicon: HALOT
  rationale: La expresión temporal señala un momento futuro o una época determinada. 'En aquel tiempo' es natural en español, conserva el valor profético y evita un calco rígido.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: נְאֻם funciona como fórmula profética de enunciación. 'Dice Yahvé' es fluido en español bíblico moderno y mantiene la fuerza de presentación del dicho divino; se conserva 'Yahvé' por la norma terminológica del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se translitera el nombre divino como 'Yahvé', siguiendo el criterio del proyecto y evitando la sustitución por un título.
- source_word: אֶהְיֶה לֵאלֹהִים
  english_pob_choice: I will be God
  chosen_spanish: yo seré Dios
  alternatives_spanish:
  - seré un Dios
  - seré Dios para
  lexicon: HALOT
  rationale: La fórmula de pacto en español se expresa con 'ser Dios para', pero aquí se mantiene la relación implícita con 'yo seré Dios' para no añadir más que lo que el hebreo dice explícitamente; el complemento relacional aparece en el contexto mediante 'para todas las familias de Israel'.
- source_word: לְכֹל מִשְׁפְּחוֹת יִשְׂרָאֵל
  english_pob_choice: to all the families of Israel
  chosen_spanish: para todas las familias de Israel
  alternatives_spanish:
  - a todas las familias de Israel
  - para todos los clanes de Israel
  lexicon: HALOT
  rationale: מִשְׁפָּחוֹת puede significar 'familias' o 'clanes'. Se conserva 'familias' como la opción más transparente en español; 'clanes' queda como alternativa posible pero menos usual.
- source_word: וְהֵמָּה יִהְיוּ לִי לְעָם
  english_pob_choice: and they will be my people
  chosen_spanish: y ellas serán mi pueblo
  alternatives_spanish:
  - y serán pueblo para mí
  - y serán mi pueblo
  lexicon: HALOT
  rationale: La fórmula recíproca del pacto se traduce de manera natural como 'mi pueblo'. Se elige 'ellas' para concordar con 'familias' y conservar la referencia colectiva del sujeto plural en español.
theological_decisions:
- issue: Fórmula de pacto recíproca
  english_pob_reading: I will be God to all the families of Israel, and they will be my people
  chosen_spanish_reading: yo seré Dios para todas las familias de Israel, y ellas serán mi pueblo
  alternative_spanish_readings:
  - yo seré Dios a todas las familias de Israel, y ellas serán mi pueblo
  - seré Dios para todas las familias de Israel, y ellas serán mi pueblo
  rationale: El hebreo expresa una relación de pertenencia y compromiso del pacto. En español, 'seré Dios para' comunica esa relación con claridad sin forzar una paráfrasis doctrinal. Se mantiene también 'mi pueblo' como fórmula bíblica reconocible.
  doctrine_reference: Translation philosophy §§1, 3, 6; terminología del pacto
- issue: Referencia del nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La elección preserva el nombre propio divino y evita la sustitución por un título, en coherencia con la política terminológica del proyecto.
  doctrine_reference: Guía terminológica del proyecto para יהוה / YHWH
translation_notes:
  revision_awareness: Coincide con el texto inglés auditado en la formulación principal; no se documentan revisiones aplicadas en el paquete fuente, y el control de calidad reporta alta concordancia sin cambios necesarios.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente con la directriz del proyecto para יהוה.
  - '''Familias'' conserva la amplitud semántica de מִשְׁפְּחוֹת sin introducir un tecnicismo innecesario; la nota permite la alternativa ''clanes''.'
  - Se usa concordancia femenina plural en 'ellas' para evitar ambigüedad referencial y reflejar el antecedente plural 'familias'.
  - La construcción 'seré Dios para' expresa la relación de pacto en español de manera natural y fiel al hebreo.
