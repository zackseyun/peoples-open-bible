translation:
  language: es
  text: Y ahora[a], cuando tú y tu esposa Sara estaban orando, yo llevé el memorial[b] de la oración de ustedes ante el Santo[c]. Y cuando estabas enterrando a los muertos, igualmente estuve contigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tu novia Sara'; νύμφη puede significar 'novia' o 'joven esposa'.
    reason: lexical_alternative
  - marker: b
    text: O 'el recuerdo de la oración de ustedes'; quizá con sentido cultual de una ofrenda memorial presentada delante de Dios.
    reason: lexical_alternative
  - marker: c
    text: Aquí 'el Santo' se refiere a Dios en el contexto.
    reason: theological_note
lexical_decisions:
- source_word: νῦν
  english_pob_choice: now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - ahora
  - y ahora bien
  lexicon: LSJ
  rationale: Se conserva el valor temporal y de transición discursiva de νῦν con una forma natural en español.
- source_word: προσηύξω
  english_pob_choice: were praying
  chosen_spanish: estaban orando
  alternatives_spanish:
  - oraban
  - estaban rezando
  lexicon: LSJ
  rationale: El imperfecto y el contexto de acción en curso se expresan bien con 'estaban orando', manteniendo el matiz aspectual.
- source_word: νύμφη
  english_pob_choice: bride
  chosen_spanish: novia
  alternatives_spanish:
  - esposa
  - bride / novia
  lexicon: LSJ
  rationale: '''νύμφη'' puede significar ''novia'' o ''bride/young wife''. ''Novia'' preserva la cercanía con el griego y suena natural en español; ''esposa'' sería más interpretativo.'
- source_word: προσήγαγον
  english_pob_choice: I brought
  chosen_spanish: yo llevé
  alternatives_spanish:
  - yo presenté
  - yo ofrecí
  lexicon: LSJ
  rationale: '''Llevé'' reproduce el acto de traer/presentar sin forzar todavía el matiz cultual, que queda sugerido por el contexto.'
- source_word: μνημόσυνον
  english_pob_choice: the memorial
  chosen_spanish: el memorial
  alternatives_spanish:
  - el recuerdo
  - la memoria
  - el memorial ofrenda
  lexicon: LSJ
  rationale: '''Memorial'' conserva la posible resonancia cultual/religiosa del término sin añadir ''ofrenda'' de forma más fuerte que el texto.'
- source_word: τῆς προσευχῆς ὑμῶν
  english_pob_choice: of your prayer
  chosen_spanish: de su oración
  alternatives_spanish:
  - de su plegaria
  - de sus oraciones
  lexicon: LSJ
  rationale: El griego está en singular; en español, el posesivo 'su' puede abarcar el par tú y Sara sin perder el referente dual del contexto.
- source_word: ἐνώπιον τοῦ ἁγίου
  english_pob_choice: before the Holy One
  chosen_spanish: del Santo
  alternatives_spanish:
  - del Santo Uno
  - ante el Santo
  lexicon: LSJ
  rationale: '''Santo'' funciona como sustantivo reverente en español y refleja el título del griego. Se evita ''SEÑOR'' para no borrar la forma del original. La referencia es divina en contexto.'
- source_word: ἐθάπτες
  english_pob_choice: were burying
  chosen_spanish: estaban enterrando
  alternatives_spanish:
  - enterraban
  - sepultaban
  lexicon: LSJ
  rationale: El imperfecto exige una acción en curso; 'estaban enterrando' lo expresa con claridad en español.
- source_word: τοὺς νεκρούς
  english_pob_choice: the dead
  chosen_spanish: a los muertos
  alternatives_spanish:
  - los muertos
  - a los difuntos
  lexicon: LSJ
  rationale: El acusativo con objeto directo se refleja naturalmente en español con 'a los muertos'.
- source_word: ὡσαύτως
  english_pob_choice: likewise
  chosen_spanish: también
  alternatives_spanish:
  - igualmente
  - de igual modo
  lexicon: LSJ
  rationale: '''También'' comunica la correspondencia de presencia sin sonar rígido; en este contexto funciona de modo natural junto con la cláusula anterior.'
- source_word: συμπαρήμην σοι
  english_pob_choice: I was with you
  chosen_spanish: estuve contigo
  alternatives_spanish:
  - estaba contigo
  - te acompañé
  lexicon: LSJ
  rationale: '''Estuve contigo'' conserva la presencia acompañante del verbo compuesto y suena idiomático en español.'
theological_decisions:
- issue: Referente de τοῦ ἁγίου / 'the Holy One'
  english_pob_reading: A reference to God
  chosen_spanish_reading: '''del Santo'' entendido como referencia a Dios'
  alternative_spanish_readings:
  - '''del Santo Uno'''
  - '''ante Dios'''
  - '''del Santo'' entendido como un ser celestial'
  rationale: 'La formulación española mantiene la tensión del griego y el audit trail inglés: un título reverente que, por el contexto de la oración, se refiere a Dios. No se sustituye por una interpretación más explícita en el cuerpo del texto.'
  doctrine_reference: Primacía del texto fuente y preservación de la referencia teológica contextual sin borrar la ambigüedad reverente del original.
translation_notes:
  revision_awareness: Se siguió el audit trail inglés sin cambios sustanciales respecto de la última pasada revisada; no se detectaron revisiones aplicadas. La versión española conserva las alternativas léxicas clave (νύμφη, μνημόσυνον, ἐνώπιον τοῦ ἁγίου) y el valor aspectual de los imperfectos.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general cuando el texto fuente lo exija; en este versículo no aparece el tetragrámaton ni κύριος como sustituto directo.
  - Se mantiene 'Santo' como título reverente y no se sustituye por 'Señor' para no borrar la forma del griego.
  - '''Memorial'' se conserva por su posible resonancia cultual; no se amplía a ''ofrenda'' en el texto principal.'
  - Se mantiene el aspecto imperfectivo con 'estaban orando' y 'estaban enterrando'.
