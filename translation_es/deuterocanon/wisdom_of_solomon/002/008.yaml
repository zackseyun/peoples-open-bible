translation:
  language: es
  text: Coro­némonos con capullos de rosa antes de que se marchiten[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Coro­némonos con rosas, en capullo, antes de que se marchiten». El griego une «rosas» con un término que puede expresar capullo o cáliz floral; por eso la imagen puede entenderse como flores de rosa aún frescas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: στεψώμεθα
  english_pob_choice: Let us crown ourselves
  chosen_spanish: Coronémonos
  alternatives_spanish:
  - Cinjámonos
  - Adornémonos con guirnaldas
  lexicon: LSJ
  rationale: El verbo griego es hortatorio en primera persona plural y expresa auto-ornamentación festiva con una corona o guirnalda. «Coronémonos» conserva bien la fuerza exhortativa y la imagen de adorno ceremonial en español natural.
- source_word: ῥόδων
  english_pob_choice: with rosebuds
  chosen_spanish: con capullos de rosa
  alternatives_spanish:
  - con rosas
  - con flores de rosa
  lexicon: LSJ
  rationale: El genitivo de ῥόδον es «rosa», pero en esta combinación con κάλυξιν el sentido apunta a la flor aún no abierta. «Capullos de rosa» mantiene la imagen de juventud floral que el contexto exige.
- source_word: κάλυξιν
  english_pob_choice: rosebuds
  chosen_spanish: capullos
  alternatives_spanish:
  - cálices
  - yemas
  - flores
  lexicon: LSJ
  rationale: κάλυξ puede significar yema, capullo, envoltura floral o cáliz. En este contexto, junto a ῥόδων y con el contraste de «antes de que se marchiten», «capullos» es la opción más clara y menos técnica para español.
- source_word: πρὶν ἢ
  english_pob_choice: before
  chosen_spanish: antes de que
  alternatives_spanish:
  - antes de
  - antes que
  lexicon: LSJ
  rationale: La construcción temporal introduce el límite previo al marchitamiento. «Antes de que» suena natural en español y marca con claridad la subordinación temporal.
- source_word: μαρανθῆναι
  english_pob_choice: they wither
  chosen_spanish: se marchiten
  alternatives_spanish:
  - se ajen
  - se mustien
  - se desvanezcan
  lexicon: LSJ
  rationale: El verbo μαραίνω se refiere al marchitarse de lo vegetal. «Se marchiten» conserva de modo directo la imagen botánica sin debilitarla como mero desvanecimiento visual.
