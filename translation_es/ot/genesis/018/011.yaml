translation:
  language: es
  text: Ahora bien, Abraham y Sara eran ancianos, avanzados en días; había cesado para Sara el camino[a] de las mujeres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo, «el camino de las mujeres», un modismo pudoroso que significa que Sara ya no menstruaba.
    reason: lexical_alternative
lexical_decisions:
- source_word: זְקֵנִים
  english_pob_choice: old
  chosen_spanish: viejos
  alternatives_spanish:
  - ancianos
  - de edad avanzada
  lexicon: HALOT
  rationale: El hebreo describe edad avanzada. «Viejos» es la equivalencia más directa y natural para esta línea, y mantiene el paralelismo con la siguiente expresión idiomática sin suavizarla demasiado.
- source_word: בָּאִים בַּיָּמִים
  english_pob_choice: advanced in days
  chosen_spanish: avanzados en días
  alternatives_spanish:
  - bien entrados en años
  - de muchos años
  - muy avanzados en edad
  lexicon: HALOT
  rationale: La imagen hebrea literalmente es «entrando en días» y apunta a vejez avanzada. «Avanzados en días» conserva el giro idiomático de forma auditable y cercana al texto fuente.
- source_word: חָדַל לִהְיוֹת
  english_pob_choice: had ceased to be
  chosen_spanish: había cesado
  alternatives_spanish:
  - había dejado de ser
  - ya no era
  - había dejado de estar
  lexicon: HALOT
  rationale: El verbo expresa cese o interrupción. En español, «había cesado» comunica bien el valor verbal y permite enlazar con la expresión idiomática siguiente sin sobrecargarla.
- source_word: אֹרַח
  english_pob_choice: the way
  chosen_spanish: la costumbre
  alternatives_spanish:
  - el camino
  - la manera
  - el curso
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «camino», en este contexto el modismo alude al ciclo menstrual. Para español, «la costumbre» comunica el hecho recurrente y evita una fórmula extraña; la nota preserva el sentido figurado de base.
- source_word: כַּנָּשִׁים
  english_pob_choice: of women
  chosen_spanish: de las mujeres
  alternatives_spanish:
  - de mujer
  - propia de las mujeres
  lexicon: HALOT
  rationale: La frase pertenece al modismo «el camino/la costumbre de las mujeres». «De las mujeres» mantiene el referente literal del hebreo y su modestia idiomática.
- source_word: לְשָׂרָה
  english_pob_choice: with Sarah
  chosen_spanish: en Sara
  alternatives_spanish:
  - para Sara
  - respecto de Sara
  - con Sara
  lexicon: HALOT
  rationale: El ל aquí marca relación o referencia dentro del modismo. «En Sara» expresa de manera natural en español que esa condición ya no estaba presente en su caso.
theological_decisions:
- issue: Eufemismo hebreo sobre la menstruación
  english_pob_reading: Hebrew 'the way of women,' a modest idiom meaning that Sarah no longer menstruated.
  chosen_spanish_reading: «la costumbre de las mujeres» como modismo modesto que indica que Sara ya no menstruaba.
  alternative_spanish_readings:
  - «el camino de las mujeres» con nota explicativa
  - «el ciclo de las mujeres»
  - «la regla de las mujeres»
  rationale: El texto fuente usa un giro pudoroso y no conviene aplastarlo con una expresión demasiado explícita en el cuerpo principal. «La costumbre de las mujeres» preserva la modestia del hebreo y deja la explicación médica/idiomática para la nota.
  doctrine_reference: Transparencia lexical; modestia idiomática del hebreo.
translation_notes:
  revision_awareness: 'Se siguió el mismo sentido auditado de la versión inglesa: edad avanzada de Abraham y Sara, y el modismo hebreo para la menstruación, sin cambios textuales relevantes respecto del último pase de revisión.'
  spanish_consistency_notes:
  - Se mantuvo «Sara» y «Abraham» como formas estándar en español bíblico.
  - Se preservó la tensión entre literalidad e inteligibilidad mediante una nota explicativa del modismo.
  - Se evitó «SEÑOR» u այլ terminología no presente en el versículo.
  - El tono es formal y publicable, con sintaxis natural en español latinoamericano.
