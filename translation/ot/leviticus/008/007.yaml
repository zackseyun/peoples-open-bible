id: LEV.8.7
reference: Leviticus 8:7
source:
  edition: WLC
  text: וַ/יִּתֵּ֨ן עָלָ֜י/ו אֶת הַ/כֻּתֹּ֗נֶת וַ/יַּחְגֹּ֤ר אֹת/וֹ֙ בָּֽ/אַבְנֵ֔ט וַ/יַּלְבֵּ֤שׁ אֹת/וֹ֙ אֶֽת הַ/מְּעִ֔יל וַ/יִּתֵּ֥ן עָלָ֖י/ו אֶת הָ/אֵפֹ֑ד וַ/יַּחְגֹּ֣ר אֹת֗/וֹ בְּ/חֵ֨שֶׁב֙ הָֽ/אֵפֹ֔ד וַ/יֶּאְפֹּ֥ד ל֖/וֹ בּֽ/וֹ־־־׃
translation:
  text: And he put the tunic on him[a], and fastened him with the sash, and clothed him with the robe, and put the ephod on him, and fastened it on him with the skillfully woven band of the ephod[b], and tied the ephod to him with it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the decorated band of the ephod' or 'the waistband of the ephod.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb here likely means that the ephod was secured to Aaron by means of its woven band.
    reason: cultural_note
lexical_decisions:
- source_word: כֻּתֹּנֶת
  chosen: tunic
  alternatives:
  - coat
  - undergarment
  lexicon: HALOT
  rationale: Refers to the basic priestly garment worn next to the body. 'Tunic' is standard modern English and more precise than 'coat.'
- source_word: אַבְנֵט
  chosen: sash
  alternatives:
  - belt
  - girding band
  lexicon: HALOT
  rationale: A cloth band wrapped around the waist. 'Sash' fits priestly vestments better than the more generic 'belt.'
- source_word: מְעִיל
  chosen: robe
  alternatives:
  - mantle
  lexicon: HALOT
  rationale: Denotes the outer garment worn over the tunic. 'Robe' is clear, natural English in this ceremonial context.
- source_word: אֵפֹד
  chosen: ephod
  lexicon: HALOT
  rationale: A specialized priestly vestment with no precise English equivalent; transliteration preserves the technical cultic term.
- source_word: חֵשֶׁב
  chosen: skillfully woven band
  alternatives:
  - decorated band
  - waistband
  lexicon: HALOT
  rationale: In priestly garment contexts this term refers to the woven band or waistband associated with the ephod. 'Skillfully woven band' captures both its function and crafted character, reflecting usage in tabernacle vestment descriptions.
- source_word: וַיַּחְגֹּר אֹתוֹ
  chosen: fastened him with the sash
  alternatives:
  - girded him with the sash
  - wrapped the sash around him
  lexicon: HALOT
  rationale: The verb חגר means to gird or fasten around the waist. 'Fastened him with the sash' is readable modern English while preserving the dressing action.
- source_word: וַיֶּאְפֹּד לוֹ בּוֹ
  chosen: tied the ephod to him with it
  alternatives:
  - bound it to him with it
  - girded him with it
  lexicon: HALOT
  rationale: The rare denominative verb from אֵפֹד here describes securing the ephod by means of its band. The final בו refers back to the band. 'Tied the ephod to him with it' makes the relationship explicit in natural English.
- source_word: וַיִּתֵּן עָלָיו
  chosen: put ... on him
  alternatives:
  - placed ... on him
  lexicon: HALOT
  rationale: Idiomatic Hebrew for clothing someone with a garment. 'Put ... on him' is the most natural English equivalent and fits the repeated vesting sequence.
