  to: Entonces Joiada el sacerdote dio a los jefes de cientos[a] las lanzas, los escudos y los escudos grandes[b] que pertenecían al rey David, que estaban en la casa de Dios[c].
  rationale: Se corrige la transliteración del nombre propio a «Joiada», se mueve la nota [a] al sintagma correcto («jefes de cientos»), y se alisa ligeramente la sintaxis para que el español sea más natural sin alterar el sentido ni las decisiones léxicas de la POB.
