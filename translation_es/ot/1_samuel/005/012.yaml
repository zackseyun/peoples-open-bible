  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Tumores' concuerda con la decisión POB para בָּעֳפָלִים y la nota preserva 'hinchazones' y la opción tradicional 'hemorroides'. No aparecen términos sensibles del glosario general (Yahvé, Mesías, etc.).
