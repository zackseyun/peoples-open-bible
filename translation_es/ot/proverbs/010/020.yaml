- from: La lengua del justo es plata escogida[a]; el corazón de los impíos vale poco.
  to: La lengua del justo es plata fina[a]; el corazón de los impíos es de poco valor.
  rationale: 'Se revisa para lograr un español más idiomático y digno sin alterar el sentido fuente: «plata fina» expresa mejor la calidad selecta de נִבְחָר en este contexto, y «es de poco valor» refleja con mayor naturalidad formal el valor escaso de כִּמְעָט. Se conserva la nota léxica con alternativas pertinentes documentadas por la auditoría inglesa.'
