base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/047/002.yaml
  text: Then he brought me out by way of the north gate[a], and led me around by the outside way to the outer gate, the one facing east; and behold[b], water was trickling from the right side.
  footnotes:
  - marker: a
    text: Or 'water was bubbling out' or 'water was flowing out'; the Hebrew verb suggests a small emerging flow rather than a large current.
    reason: lexical_alternative
  - marker: b
    text: Literally 'from the right shoulder'; here 'shoulder' refers to the side or flank of the structure.
    reason: lexical_alternative
