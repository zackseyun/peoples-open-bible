base_translation:
  language: en
  yaml_path: translation/ot/leviticus/003/015.yaml
  text: and the two kidneys[a], and the fat that is on them, which is on the loins, and the appendage on the liver, with the kidneys[b], he shall remove.
  footnotes:
  - marker: a
    text: Or 'the lobe on the liver.' The Hebrew term for this anatomical part (יֹתֶרֶת) is uncertain, so 'appendage' is used in the main text to avoid overstating precision.
    reason: lexical_alternative
  - marker: b
    text: Literally 'on the kidneys.' Here it likely means that this part is removed together with the kidneys.
    reason: lexical_alternative
