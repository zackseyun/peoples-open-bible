translation:
  language: es
  text: y lo que hizo a Datán y a Abiram, hijos de Eliab hijo de Rubén—cómo la tierra abrió su boca y los tragó, a ellos, a sus hogares[a], a sus tiendas y a todo lo que estaba a sus pies[b], en medio de todo Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «sus casas». El hebreo puede referirse a las viviendas físicas o, más ampliamente, a sus hogares o familias.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «todo el yĕqûm que estaba a sus pies». La expresión probablemente alude a todo lo que les pertenecía o los acompañaba.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָשָׂה
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - actuó
  - obró
  lexicon: HALOT
  rationale: El verbo hebreo es amplio y, en este contexto retrospectivo, «hizo» comunica de manera natural la acción realizada por Yahvé sin añadir explicación interpretativa.
- source_word: בְּנֵי אֱלִיאָב בֶּן רְאוּבֵן
  english_pob_choice: sons of Eliab son of Reuben
  chosen_spanish: hijos de Eliab, hijo de Rubén
  alternatives_spanish:
  - los hijos de Eliab, el rubenita
  - hijos de Eliab, descendiente de Rubén
  lexicon: HALOT
  rationale: Se mantiene la formulación genealógica del hebreo, preservando la secuencia de descendencia en lugar de suavizarla a un adjetivo étnico.
- source_word: פָּצְתָה הָאָרֶץ אֶת־פִּיהָ
  english_pob_choice: the earth opened its mouth
  chosen_spanish: la tierra abrió su boca
  alternatives_spanish:
  - el suelo abrió su boca
  - la tierra se abrió
  lexicon: HALOT
  rationale: «La tierra» corresponde directamente a אָרֶץ y «abrió su boca» conserva la imagen personificada del hebreo.
- source_word: וַתִּבְלָעֵם
  english_pob_choice: swallowed them
  chosen_spanish: los tragó
  alternatives_spanish:
  - los devoró
  - los engulló
  lexicon: HALOT
  rationale: «Tragó» reproduce bien el valor concreto de בלע y mantiene la imagen vívida del texto.
- source_word: בָּתֵּיהֶם
  english_pob_choice: their households
  chosen_spanish: a sus casas
  alternatives_spanish:
  - a sus hogares
  - a sus familias
  lexicon: HALOT
  rationale: El hebreo literalmente dice «sus casas», y aquí puede referirse al ámbito doméstico o al conjunto del hogar. En español, «casas» conserva la ambigüedad material; la nota explica la posible lectura de «hogares/households».
- source_word: אָהֳלֵיהֶם
  english_pob_choice: their tents
  chosen_spanish: a sus tiendas
  alternatives_spanish:
  - a sus toldos
  - a sus viviendas
  lexicon: HALOT
  rationale: «Tiendas» es la traducción literal y adecuada para el contexto del desierto.
- source_word: כָּל־הַיְקוּם
  english_pob_choice: every living thing
  chosen_spanish: todo lo que estaba a sus pies
  alternatives_spanish:
  - todo lo que poseían
  - toda su hacienda
  lexicon: HALOT
  rationale: 'La expresión hebrea es idiomática y difícil de trasladar con un solo equivalente. Se opta por una forma cercana al hebreo que preserve la relación espacial de pertenencia/acompañamiento; la nota aclara el sentido posible de «todo lo que pertenecía o acompañaba». '
- source_word: אֲשֶׁר בְּרַגְלֵיהֶם
  english_pob_choice: at their feet
  chosen_spanish: a sus pies
  alternatives_spanish:
  - junto a ellos
  - que los acompañaba
  lexicon: HALOT
  rationale: «A sus pies» sigue de cerca el hebreo y mantiene la imagen idiomática del entorno inmediato de las personas y sus pertenencias.
- source_word: בְּקֶרֶב כָּל־יִשְׂרָאֵל
  english_pob_choice: in the midst of all Israel
  chosen_spanish: en medio de todo Israel
  alternatives_spanish:
  - entre todo Israel
  - ante todo Israel
  lexicon: HALOT
  rationale: «En medio de» conserva el sentido espacial y público del juicio ocurrido delante de la comunidad entera.
theological_decisions:
- issue: Referencia implícita al juicio divino sobre Coré, Datán y Abiram mediante el recuerdo de la destrucción de Datán y Abiram
  english_pob_reading: retains the historical warning without explicit theological expansion
  chosen_spanish_reading: retiene la advertencia histórica sin expandirla teológicamente
  alternative_spanish_readings:
  - explicitar que fue un juicio de Yahvé
  - añadir una glosa sobre rebelión y castigo
  rationale: El versículo funciona como recordatorio narrativo dentro del discurso de Moisés. No se añade interpretación doctrinal que no esté verbalizada en el texto hebreo inmediato.
  doctrine_reference: Deuteronomio 11:2-7; Números 16
- issue: Terminología para el agente divino implícito en «lo que hizo»
  english_pob_reading: what he did
  chosen_spanish_reading: y lo que hizo
  alternative_spanish_readings:
  - y lo que Yahvé hizo
  - y lo que él hizo
  rationale: El antecedente inmediato en el contexto es Yahvé; la forma breve «hizo» respeta la elipsis del hebreo y evita redundancia, manteniendo la referencia contextual.
  doctrine_reference: Deuteronomio 11:2-6
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió una equivalencia más cercana para la expresión idiomática correspondiente a «at their feet». En español se optó por mantener la proximidad literal con «a sus pies» y explicarla en nota, preservando además la ambigüedad semántica del hebreo donde el contexto lo requiere.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino según la política del proyecto; aquí el sujeto queda implícito por el contexto del discurso de Moisés.
  - Se mantiene la secuencia genealógica «Datán y Abiram, hijos de Eliab, hijo de Rubén» para respetar la estructura hebrea.
  - 'Se conserva el paralelismo de objetos: casas, tiendas y todo lo que estaba a sus pies, sin convertirlo en una paráfrasis más interpretativa.'
