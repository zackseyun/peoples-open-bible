translation:
  language: es
  text: En la soberbia del impío, el pobre es perseguido encarnizadamente[a]; sean atrapados[b] en las maquinaciones que han ideado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el impío persigue al pobre». El hebreo es sintácticamente compacto y puede entenderse con «el impío» como sujeto y «el pobre» como objeto, o con «el pobre» como sujeto de una forma pasiva.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «quedan atrapados en las maquinaciones que han ideado». El hebreo también puede leerse como una afirmación descriptiva, no solo como un deseo o ruego.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּ/גַאֲוַת
  english_pob_choice: in the pride of
  chosen_spanish: en la soberbia de
  alternatives_spanish:
  - por la soberbia de
  - a causa de la soberbia de
  lexicon: HALOT
  rationale: La preposición ב con גַּאֲוָה admite un matiz locativo/instrumental. «En la soberbia de» conserva la compactación hebrea y funciona bien en español como marco o ámbito de la acción.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el impío
  alternatives_spanish:
  - el malvado
  - el inicuo
  lexicon: HALOT
  rationale: El sustantivo/adjetivo sustantivado es singular genérico. «Impío» mantiene el valor moral y religioso del término sin forzar una paráfrasis más larga.
- source_word: יִדְלַק
  english_pob_choice: is hotly pursued
  chosen_spanish: es perseguido con vehemencia
  alternatives_spanish:
  - es acosado
  - es perseguido encarnizadamente
  - persigue
  lexicon: HALOT
  rationale: El verbo דלק puede significar perseguir de cerca o arder. Aquí, por el contexto del pobre como objeto, se refleja la persecución hostil. «Con vehemencia» intenta preservar la intensidad del verbo sin sonar demasiado artificial.
- source_word: עָנִי
  english_pob_choice: the poor man
  chosen_spanish: el pobre
  alternatives_spanish:
  - el pobre hombre
  - el afligido
  lexicon: HALOT
  rationale: En español, «el pobre» expresa de manera natural el singular representativo y conserva la amplitud semántica de עָנִי (pobre, oprimido, afligido).
- source_word: יִתָּפְשׂוּ
  english_pob_choice: let them be caught
  chosen_spanish: caigan atrapados
  alternatives_spanish:
  - sean atrapados
  - queden atrapados
  - que sean atrapados
  lexicon: HALOT
  rationale: La forma nifal puede leerse como jussiva/de deseo. «Caigan atrapados» comunica bien el matiz imprecatorio y el reverso moral del salmo, sin volver la cláusula una simple descripción.
- source_word: בִּ/מְזִמּוֹת
  english_pob_choice: in the schemes
  chosen_spanish: en las maquinaciones
  alternatives_spanish:
  - en los esquemas
  - en los planes
  - en las trampas
  lexicon: HALOT
  rationale: מְזִמּוֹת puede ser planes, dispositivos o complots. En este contexto hostil, «maquinaciones» transmite mejor la intención engañosa y conserva el sentido de entramado malicioso.
- source_word: זוּ
  english_pob_choice: they have
  chosen_spanish: que han
  alternatives_spanish:
  - las cuales han
  - que ellos han
  lexicon: HALOT
  rationale: זוּ funciona como relativo. En español, «que han ideado» suena natural y conserva la relación entre las maquinaciones y el acto de idearlas.
- source_word: חָשָׁבוּ
  english_pob_choice: devised
  chosen_spanish: ideado
  alternatives_spanish:
  - planeado
  - concebido
  - trazado
  lexicon: HALOT
  rationale: חשב aquí refiere a planear deliberadamente. «Ideado» mantiene el carácter intencional y puede abarcar el sentido de un plan astuto.
theological_decisions:
- issue: Fuerza sintáctica de la segunda colon
  english_pob_reading: 'An imprecatory/jussive wish: ''let them be caught in the schemes they have devised.'''
  chosen_spanish_reading: 'Un deseo imprecatorio: ''caigan atrapados en las maquinaciones que han ideado.'''
  alternative_spanish_readings:
  - 'Una afirmación descriptiva: ''quedan atrapados en las maquinaciones que han ideado'''
  - 'Una lectura referida al pobre: ''el pobre queda atrapado en las maquinaciones que han ideado'''
  rationale: El hebreo permite ambigüedad, pero la lectura exhortativa/imprecatoria encaja mejor con el tono del salmo y con el patrón bíblico de retribución donde el mal cae en su propia trampa. La traducción conserva la tensión sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión hermenéutica donde el hebreo es ambiguo; no cerrar prematuramente la sintaxis en una sola interpretación si el texto admite más de una.
translation_notes:
  revision_awareness: El pasaje fue revisado previamente y quedó sin cambios sustanciales en el control más reciente; se mantiene la solución óptima-equivalente con una nota para la ambigüedad sintáctica del segundo colon.
  spanish_consistency_notes:
  - Se usa «Yahvé» sólo cuando el texto lo requiera explícitamente; este versículo no lo contiene.
  - Se conserva «impío» para רָשָׁע por coherencia con el registro bíblico y la carga moral del término.
  - Se evita una paráfrasis excesiva para no suavizar el paralelismo hebreo ni la tonalidad imprecatoria del salmo.
