translation:
  language: es
  text: Su límite iba desde Aroer[a], que está en el borde del valle del Arnón, y la ciudad que está en medio del valle, y toda la meseta[b] hasta Medeba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «borde del wadi del Arnón»; el hebreo נַחַל puede referirse a cauce, wadi o quebrada-valle.
    reason: lexical_alternative
  - marker: b
    text: O «meseta» o «llanura» para «tableland».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי לָהֶם הַגְּבוּל
  english_pob_choice: Their border was
  chosen_spanish: Su límite iba
  alternatives_spanish:
  - Y su límite era
  - Su territorio iba
  lexicon: HALOT
  rationale: El hebreo presenta una fórmula de delimitación territorial. En español, «iba» comunica mejor la extensión del límite que una copula más rígida, sin perder el sentido posesivo de «para ellos».
- source_word: מֵעֲרוֹעֵר
  english_pob_choice: from Aroer
  chosen_spanish: desde Aroer
  alternatives_spanish:
  - de Aroer
  - a partir de Aroer
  lexicon: HALOT
  rationale: La preposición marca el punto de inicio del límite. «Desde» es natural en español para una descripción fronteriza y conserva la dirección inicial.
- source_word: אֲשֶׁר עַל שְׂפַת נַחַל אַרְנוֹן
  english_pob_choice: which is on the edge of the Valley of the Arnon
  chosen_spanish: que está en el borde del valle del Arnón
  alternatives_spanish:
  - que está sobre la orilla del valle del Arnón
  - que está en el borde del cauce del Arnón
  lexicon: HALOT
  rationale: שָׂפָה puede ser «borde/orilla/banqueta». En este contexto geográfico, «borde» mantiene claridad. נַחַל admite varias posibilidades; aquí se siguió la decisión inglesa de «valle», porque el contexto topográfico lo permite y la expresión resulta inteligible en español.
- source_word: וְהָעִיר אֲשֶׁר בְּתוֹךְ הַנַּחַל
  english_pob_choice: and the city that is in the middle of the valley
  chosen_spanish: y la ciudad que está en medio del valle
  alternatives_spanish:
  - y la ciudad que está dentro del valle
  - y la ciudad que está en el centro del valle
  lexicon: HALOT
  rationale: בְּתוֹךְ significa estar dentro o en medio. «En medio» reproduce bien la idea espacial y sigue el matiz elegido en la traducción inglesa.
- source_word: וְכָל הַמִּישֹׁר
  english_pob_choice: and all the tableland
  chosen_spanish: y toda la meseta
  alternatives_spanish:
  - y toda la meseta elevada
  - y todo el llano
  lexicon: HALOT
  rationale: מִישׁוֹר puede referirse a terreno llano elevado. «Meseta» conserva mejor la idea de altiplanicie que «llano» o «plano» en español contemporáneo.
- source_word: עַל מֵידְבָא
  english_pob_choice: as far as Medeba
  chosen_spanish: hasta Medeba
  alternatives_spanish:
  - así como Medeba
  - al llegar a Medeba
  lexicon: HALOT
  rationale: En descripciones de fronteras, עַל puede expresar alcance/extensión. «Hasta» es la forma natural en español para indicar el término del límite territorial.
theological_decisions:
- issue: Tratamiento del nombre divino
  english_pob_reading: No aparece el nombre divino en este versículo.
  chosen_spanish_reading: No se requiere ninguna decisión especial sobre Yahvé en el texto principal.
  alternative_spanish_readings:
  - usar «SEÑOR»
  - introducir una nota sobre el tetragrámaton
  rationale: El versículo es puramente geográfico y no contiene ninguna forma del nombre divino; por eso no se añade ninguna convención especial.
  doctrine_reference: No aplica
- issue: Valor de נַחַל en contexto geográfico
  english_pob_reading: The Valley of the Arnon; note that נַחַל can refer to a streambed, wadi, or valley ravine.
  chosen_spanish_reading: «valle del Arnón» en el texto principal, con nota sobre las alternativas semánticas.
  alternative_spanish_readings:
  - cauce del Arnón
  - wadi del Arnón
  - quebrada del Arnón
  rationale: La decisión inglesa prioriza claridad geográfica sin cerrar el abanico semántico de נַחַל. En español, «valle» es la opción más publicable, mientras que la nota preserva el resto de posibilidades.
  doctrine_reference: HALOT; decisión léxica-geográfica
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, que ajustó la expresión a «the Valley of the Arnon» para una correspondencia más formal con el hebreo. En español se mantuvo esa preferencia por «valle del Arnón» y se conservó la extensión territorial con «hasta Medeba».
  spanish_consistency_notes:
  - Se usó «Arnón» para el nombre propio, coherente con la transliteración habitual en español y con el tratamiento del topónimo en la fuente inglesa.
  - Se prefirió «límite» y no «frontera» para reflejar el valor territorial concreto de הַגְּבוּל.
  - «Meseta» se emplea como equivalente de «tableland», evitando «plano», que en español podría sonar demasiado genérico.
