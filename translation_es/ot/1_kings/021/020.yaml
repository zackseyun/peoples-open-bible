    issue: Vocativo «oh mi enemigo» poco natural en español
    rationale: Aunque la revisión inglesa añadió «O» para el matiz vocativo, trasladarlo mecánicamente como «oh» produce una frase rígida. En español, «¿Me has hallado, enemigo mío?» o «¿Me has hallado, mi enemigo?» comunica mejor la hostilidad sin calco innecesario.
  - severity: low
