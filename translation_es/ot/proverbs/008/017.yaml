- from: Yo amo a los que me aman[a], y los que me buscan con diligencia me hallan.
  to: Yo amo a los que me aman[a], y los que me buscan con diligencia me encuentran.
  rationale: 'Se hace un ajuste menor de estilo y naturalidad: «me encuentran» comunica mejor el valor de ‘find me’ en español neutral contemporáneo que «me hallan», y la nota se reformula para sonar más idiomática sin cambiar el contenido léxico documentado.'
