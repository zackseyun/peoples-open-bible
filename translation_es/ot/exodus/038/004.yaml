translation:
  language: es
  text: Él hizo para el altar una rejilla[a], un entramado de bronce, debajo de su saliente[b], desde abajo[c] hasta la mitad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'una parrilla, la obra de una red, de bronce'.
    reason: lexical_alternative
  - marker: b
    text: El término hebreo de esta parte estructural del altar también puede traducirse como 'borde', 'moldura' o 'alrededor'.
    reason: lexical_alternative
  - marker: c
    text: O 'por debajo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He made
  chosen_spanish: Él hizo
  alternatives_spanish:
  - Y él hizo
  - Luego hizo
  lexicon: HALOT
  rationale: El wayyiqtol narra una acción consecutiva; en español bíblico claro, 'Él hizo' transmite la acción sin recargar con una conjunción inicial que no añade contenido.
- source_word: לַמִּזְבֵּחַ
  english_pob_choice: for the altar
  chosen_spanish: para el altar
  alternatives_spanish:
  - para el altar mismo
  - sobre el altar
  lexicon: HALOT
  rationale: La lamed aquí marca finalidad/destinación del objeto fabricado. 'Para el altar' refleja mejor el propósito que una ubicación física.
- source_word: מִכְבָּר
  english_pob_choice: a grating
  chosen_spanish: una rejilla
  alternatives_spanish:
  - una reja
  - un enrejado
  - una parrilla
  lexicon: HALOT
  rationale: '''Rejilla'' comunica bien una pieza perforada o calada y resulta natural en español; mantiene la idea de una estructura de paso o soporte sin imponer una forma demasiado específica.'
- source_word: מַעֲשֵׂה רֶשֶׁת
  english_pob_choice: a network
  chosen_spanish: un entramado
  alternatives_spanish:
  - una malla
  - una red
  - una obra de red
  lexicon: HALOT
  rationale: La expresión literal es 'obra de red'. 'Entramado' conserva el valor constructivo y el aspecto entretejido sin sonar forzado en español. Se evita 'red' sola para no perder la idea de fabricación.
- source_word: נְחֹשֶׁת
  english_pob_choice: of bronze
  chosen_spanish: de bronce
  alternatives_spanish:
  - de cobre
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, 'bronce' es la equivalencia tradicional y más probable para el metal de los utensilios cultuales; 'cobre' es posible, pero menos adecuado aquí.
- source_word: תַּחַת
  english_pob_choice: under
  chosen_spanish: debajo de
  alternatives_spanish:
  - bajo
  - bajo de
  lexicon: HALOT
  rationale: La preposición espacial se traduce de forma directa. 'Debajo de' es natural en español y preserva la relación inferior respecto del resalte.
- source_word: כַּרְכֻּבּוֹ
  english_pob_choice: its ledge
  chosen_spanish: su resalte
  alternatives_spanish:
  - su borde
  - su moldura
  - su ribete
  - su borde saliente
  lexicon: HALOT
  rationale: El término describe una saliente estructural del altar. 'Resalte' permite conservar la idea de una parte que sobresale sin fijar indebidamente una forma específica como 'borde' o 'moldura'.
- source_word: מִלְּמַטָּה
  english_pob_choice: beneath
  chosen_spanish: por debajo
  alternatives_spanish:
  - desde abajo
  - debajo
  lexicon: HALOT
  rationale: El compuesto aclara el punto de partida inferior. 'Por debajo' mantiene el matiz espacial y evita confundirlo con una mera repetición estilística.
- source_word: עַד חֶצְיוֹ
  english_pob_choice: up to its halfway point
  chosen_spanish: hasta la mitad de él
  alternatives_spanish:
  - hasta su mitad
  - hasta la mitad de éste
  - hasta su punto medio
  lexicon: HALOT
  rationale: La frase marca extensión hasta el punto medio del altar. 'Hasta la mitad de él' conserva la referencia al objeto y sigue de cerca el hebreo sin volverse oscura.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que prefirió una formulación más literal para el tramo final ('up to its halfway point'), por lo que la versión española conserva la extensión espacial sin interpretarla como 'llegando a' ni expandirla más de lo que el hebreo permite.
  spanish_consistency_notes:
  - Se mantuvo 'bronce' para נְחֹשֶׁת, coherente con la terminología POB en utensilios del tabernáculo.
  - Se evitó traducir כַּרְכֻּבּוֹ como 'borde' por defecto para no borrar la tensión léxica documentada entre 'rim/molding/surround'; se eligió 'resalte' como opción estructuralmente más abierta.
  - La secuencia 'debajo de... por debajo... hasta la mitad de él' reproduce la doble indicación espacial del hebreo y del POB sin redundancia innecesaria.
