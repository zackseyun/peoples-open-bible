translation:
  language: es
  text: Pero si el sacrificio de su ofrenda es un voto o una ofrenda voluntaria[a], se comerá el día en que presenta su sacrificio; y al día siguiente podrá comerse lo que quede de la ofrenda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrenda por voto» para נֶדֶר. El hebreo distingue un sacrificio relacionado con un voto de una ofrenda voluntaria.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶדֶר
  english_pob_choice: a vow
  chosen_spanish: un voto
  alternatives_spanish:
  - un voto votivo
  - un ofrecimiento por voto
  lexicon: HALOT
  rationale: נֶדֶר puede referirse al voto mismo o a lo dado en cumplimiento del voto. En español, «voto» conserva la categoría semántica básica y mantiene la distinción frente a la ofrenda voluntaria sin añadir una perífrasis innecesaria.
- source_word: נְדָבָה
  english_pob_choice: a freewill offering
  chosen_spanish: una ofrenda voluntaria
  alternatives_spanish:
  - una ofrenda de libre voluntad
  - una ofrenda espontánea
  lexicon: HALOT
  rationale: La idea central es la de una ofrenda dada voluntariamente, no por obligación. «Ofrenda voluntaria» es natural en español y conserva bien el contraste cultual del hebreo.
- source_word: זֶבַח קָרְבָּנוֹ
  english_pob_choice: the sacrifice of his offering
  chosen_spanish: el sacrificio de su ofrenda
  alternatives_spanish:
  - su ofrenda sacrificial
  - el sacrificio de su don
  lexicon: HALOT
  rationale: 'Se preservan ambos elementos del hebreo: זֶבַח («sacrificio») y קָרְבָּן («ofrenda»). «De su ofrenda» reproduce la relación posesiva sin perder la especificidad del término ritual.'
- source_word: בְּיוֹם הַקְרִיבוֹ
  english_pob_choice: on the day he presents
  chosen_spanish: el día que presenta
  alternatives_spanish:
  - el día en que lo ofrece
  - el día de presentarlo
  lexicon: HALOT
  rationale: El causativo de קרב en este contexto es sacrificial y puede expresarse en español con «presenta» u «ofrece». Se eligió una forma más natural que conserva el acto de acercar/ofrecer sin forzar un calco.
- source_word: יֵאָכֵל
  english_pob_choice: it shall be eaten
  chosen_spanish: se comerá
  alternatives_spanish:
  - debe comerse
  - será comido
  lexicon: HALOT
  rationale: En español, la pasiva refleja expresa bien la instrucción legal y evita la dureza de «será comido». Mantiene el tono prescriptivo del hebreo.
- source_word: וּמִמָּחֳרָת
  english_pob_choice: and on the next day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - y al día siguiente
  - y el día después
  lexicon: HALOT
  rationale: מָחֳרָת indica el día siguiente. «Al día siguiente» es claro y idiomático, y conserva la secuencia temporal del precepto.
- source_word: וְהַנּוֹתָר מִמֶּנּוּ
  english_pob_choice: what remains of it
  chosen_spanish: lo que quede de él
  alternatives_spanish:
  - lo que reste de él
  - el resto de él
  lexicon: HALOT
  rationale: El participio נוֹתָר comunica lo que queda sobrante. «Lo que quede de él» suena natural en español y conserva la referencia al resto de la carne sacrificial.
- source_word: יֵאָכֵל
  english_pob_choice: may be eaten
  chosen_spanish: podrá comerse
  alternatives_spanish:
  - se podrá comer
  - puede comerse
  lexicon: HALOT
  rationale: Aquí el contexto cambia del mandato general a la permisión para el remanente en el segundo día. «Podrá comerse» refleja esa fuerza permisiva sin perder el carácter legal.
theological_decisions:
- issue: Distinción entre un voto y una ofrenda voluntaria
  english_pob_reading: The Hebrew distinguishes a sacrifice connected to a vow from a voluntary freewill offering.
  chosen_spanish_reading: El hebreo distingue entre un sacrificio ligado a un voto y una ofrenda dada voluntariamente.
  alternative_spanish_readings:
  - El hebreo distingue entre una ofrenda por voto y una ofrenda voluntaria.
  - El hebreo distingue entre un voto y una ofrenda libre.
  rationale: La distinción es parte del sentido del versículo y no debe nivelarse. «Voto» frente a «ofrenda voluntaria» conserva el contraste sin añadir lenguaje interpretativo.
  doctrine_reference: Levítico 7:16; nota léxica sobre נֶדֶר y נְדָבָה
translation_notes:
  revision_awareness: Se siguió el pasaje inglés auditado con acuerdo alto y sin revisiones aplicadas; la versión española conserva la distinción léxica señalada en la nota inglesa, ajustándola a un español natural y cultual.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton.
  - Se mantiene «ofrenda» para קָרְבָּן y «sacrificio» para זֶבַח, preservando la doble capa del hebreo.
  - La pasiva refleja («se comerá», «podrá comerse») comunica la norma legal de manera natural en español.
  - Se evitó «Cristo» o terminología cristológica porque el versículo no la contiene.
  - La nota al pie conserva la alternativa documental del inglés POB sin duplicar markers ni crear ambigüedad nueva.
