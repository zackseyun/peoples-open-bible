id: PHP.4.22
reference: Philippians 4:22
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀσπάζονται ὑμᾶς πάντες οἱ ἅγιοι, μάλιστα δὲ οἱ ἐκ τῆς Καίσαρος οἰκίας.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/004/022.yaml
  text: All the saints greet you, especially those of Caesar’s household.
translation:
  language: ko
  text: 모든 성도가 여러분에게 안부를 전합니다. 특별히 카이사르[a]의 집[b]에 속한 자들이 그러합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「가이사」(개역개정·새번역의 정착 표기). 본 번역은 외래어 표기법에 따른 「카이사르」를 채택한다. 본문은 특정 황제의 이름이 아니라 제국의 황실 자체를 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 「카이사르의 집」은 황제의 친족만이 아니라 황실에 속한 종·해방노예·관리 등 광범위한 집안 사람들을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσπάζονται
  english_pob_choice: greet
  chosen_korean: 안부를 전합니다
  lexicon: BDAG
  rationale: 21절과 어휘 일관성.
- source_word: πάντες οἱ ἅγιοι
  english_pob_choice: All the saints
  chosen_korean: 모든 성도
  lexicon: BDAG
  rationale: 본 번역의 ἅγιοι 기본 옮김. 21절의 「성도」와 일관성을 유지한다.
- source_word: μάλιστα δὲ
  english_pob_choice: especially
  chosen_korean: 특별히
  alternatives_korean:
  - 그 중에서도 특히
  - 무엇보다도
  lexicon: BDAG
  rationale: 큰 집단 안의 특별한 일부를 가리키는 한국어 자연어. 「특별히」가 합쇼체에 자연스럽다.
- source_word: οἱ ἐκ τῆς Καίσαρος οἰκίας
  english_pob_choice: those of Caesar’s household
  chosen_korean: 카이사르의 집에 속한 자들
  alternatives_korean:
  - 황제의 집안 사람들
  - 가이사의 집안에 속한 자들
  lexicon: BDAG
  rationale: ἐκ의 「~에 속한」 함의를 「~에 속한 자들」로 자연스럽게 옮긴다. 황제 친족만이 아닌 광범위한 황실 종속자를 가리킴은 각주로 보존한다.
- source_word: Καίσαρος
  english_pob_choice: Caesar’s
  chosen_korean: 카이사르의
  alternatives_korean:
  - 가이사의
  - 황제의
  lexicon: BDAG
  rationale: 외래어 표기법 표준에 따른 「카이사르」를 채택하고, 한국 교회 전통 표기 「가이사」(개역개정·새번역)는 각주에 보존한다. 본 번역의 현대 합쇼체 일관성과 외래어 표기법 원칙(KOREAN_PIPELINE.md)에 부합한다. 「황제」로 의역하면 본문의 고유 호칭이 사라진다.
theological_decisions:
- issue: 「성도」의 의미 범위
  chosen_reading: 「성도」는 특별히 거룩한 일부가 아니라 그리스도인 공동체 일반을 가리킨다.
  alternative_readings:
  - 거룩한 자들
  - 하나님의 백성
  rationale: 「성도」는 한국 교회의 표준 정형어로 바울 서신의 ἅγιοι 의미를 그대로 담는다. 의역(「하나님의 백성」)은 본문 어휘를 더 가공한다.
  doctrine_reference: 'Consistency of key terms; KOREAN_PIPELINE.md glossary: ἅγιοι → 성도'
