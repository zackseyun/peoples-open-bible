translation:
  language: es
  text: Pero tú estás lleno del juicio del impío[a]; juicio y justicia te sujetan[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "Y estás lleno del juicio del impío"; el hebreo es muy comprimido y puede referirse tanto a compartir el juicio del impío como a estar ocupado con el tipo de juicio asociado al impío.'
    reason: alternative_reading
  - marker: b
    text: 'O: "te sostienen" o "se apoderan de ti"; el verbo hebreo puede expresar sostener, mantener o tomar firmemente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְדִין
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: HALOT
  rationale: La conjunción inicial funciona de manera adversativa en el contexto, contrastando con la posibilidad previa de arrepentimiento y restauración. En español, 'Pero' comunica mejor ese giro que una simple coordinación.
- source_word: דִּין
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - juicio legal
  - decisión judicial
  - justicia
  lexicon: HALOT
  rationale: '''Juicio'' conserva el campo forense de דִּין y suena natural en español. Aquí se mantiene distinto de מִשְׁפָּט para no borrar la repetición paralela del hebreo.'
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: del impío
  alternatives_spanish:
  - del malvado
  - del perverso
  - del culpable
  lexicon: HALOT
  rationale: El adjetivo sustantivado se traduce de modo genérico. 'Impío' es una equivalencia bíblica clara y natural en español para un sustantivo singular genérico.
- source_word: מָלֵאתָ
  english_pob_choice: you are full of
  chosen_spanish: estás lleno de
  alternatives_spanish:
  - has sido llenado de
  - estás colmado de
  lexicon: HALOT
  rationale: El perfecto de 2ms expresa un estado presente resultante; 'estás lleno de' preserva la metáfora de estar colmado sin sonar forzado en español.
- source_word: דִּין
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - caso
  - justicia
  lexicon: HALOT
  rationale: Se mantiene 'juicio' por consistencia léxica y para conservar la repetición retórica del hebreo, que refuerza el tono acusatorio del verso.
- source_word: וּמִשְׁפָּט
  english_pob_choice: and justice
  chosen_spanish: y justicia
  alternatives_spanish:
  - y juicio
  - y derecho judicial
  - y rectitud
  lexicon: HALOT
  rationale: מִשְׁפָּט puede abarcar justicia, derecho o decisión judicial. 'Justicia' permite distinguirlo de דִּין y conservar el paralelismo sin volver idénticos los dos sustantivos.
- source_word: יִתְמֹכוּ
  english_pob_choice: seize you
  chosen_spanish: te alcanzan
  alternatives_spanish:
  - te sostienen
  - te sujetan
  - te toman
  lexicon: HALOT
  rationale: El verbo tiene un rango que incluye sostener, apoyar o tomar/agarrar. Dado el contexto negativo y la lectura revisada en el POB inglés, 'te alcanzan' refleja la idea de que juicio y justicia te toman o te sobrevienen, sin decidir en exceso entre apoyo y captura.
theological_decisions:
- issue: Ambigüedad de יִתְמֹכוּ en la clausula final
  english_pob_reading: judgment and justice seize you
  chosen_spanish_reading: juicio y justicia te alcanzan
  alternative_spanish_readings:
  - juicio y justicia te sostienen
  - juicio y justicia te toman
  rationale: El hebreo es comprimido y admite una gama semántica amplia. 'Te alcanzan' preserva esa ambigüedad relativa, suena natural en español y puede sugerir tanto un sostén como una aprehensión, sin resolver indebidamente la tensión del texto.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica y no cerrar la ambigüedad donde el original no lo hace.'
translation_notes:
  revision_awareness: Se incorporó la revisión más reciente del audit trail inglés, que pasó de 'hold fast' a 'seize you'. Para el español se evitó forzar una imagen exclusivamente de apoyo o de captura; 'te alcanzan' deja abierta la ambivalencia del verbo en el contexto poético y mantiene el tono acusatorio del verso.
  spanish_consistency_notes:
  - Se mantuvo 'juicio' para דִּין en ambas ocurrencias, conservando la repetición del hebreo.
  - '''Justicia'' se reservó para מִשְׁפָּט para evitar colapso léxico entre los dos sustantivos paralelos.'
  - La nota [a] está anclada exactamente en 'del impío[a]' y no se añadieron notas sin anclaje.
  - El registro es formal y bíblico, pero con sintaxis española natural.
