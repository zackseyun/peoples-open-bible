revisions:
- from: No apartes de mí tu misericordia, oh Dios, ni la memoria de ti de mi corazón hasta la muerte.
  to: No apartes de mí tu misericordia[a], ¡oh Dios!, ni el recuerdo de ti[b] en mi corazón hasta la muerte.
  rationale: 'Se conserva la fidelidad al griego y al POB inglés: un solo verbo («apartes») gobierna ambas cláusulas, por lo que se mantiene «ni» sin introducir un segundo verbo. Se cambia «la memoria de ti de mi corazón» por «el recuerdo de ti en mi corazón» para lograr español natural y claro sin perder el sentido de μνήμην περὶ σοῦ ... ἀπὸ καρδίας. Se añaden notas para preservar las alternativas léxicas relevantes del registro inglés.'
