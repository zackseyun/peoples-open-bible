translation:
  language: es
  text: La longitud del vestíbulo[a] era de veinte codos, y el ancho, de once codos; se subía a él por gradas, y había pilares junto a los muros laterales[b], uno de este lado y uno de aquel lado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pórtico» o «porche» para «vestíbulo» (hebreo אֻלָם).
    reason: lexical_alternative
  - marker: b
    text: El término hebreo traducido aquí «muros laterales» (אֵילִים) es arquitectónicamente difícil; también puede referirse a jambas, pilastras u otros elementos estructurales salientes.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹרֶךְ
  english_pob_choice: length
  chosen_spanish: longitud
  alternatives_spanish:
  - largo
  - medida de largo
  lexicon: HALOT
  rationale: En un contexto arquitectónico de medidas, «longitud» conserva el valor dimensional de forma clara y natural en español, equivalente al inglés «length».
- source_word: הָאֻלָם
  english_pob_choice: vestibule
  chosen_spanish: vestíbulo
  alternatives_spanish:
  - pórtico
  - porche
  lexicon: HALOT
  rationale: «Vestíbulo» comunica bien una estancia de entrada o antesala en registro arquitectónico y mantiene la opción inglesa escogida por la POB.
- source_word: אַמָּה
  english_pob_choice: cubits
  chosen_spanish: codos
  alternatives_spanish:
  - codos (aprox. 45 cm)
  lexicon: HALOT
  rationale: La unidad antigua se conserva como «codos», evitando una conversión moderna que el texto base no hace y preservando el dato métrico antiguo.
- source_word: רֹחַב
  english_pob_choice: width
  chosen_spanish: ancho
  alternatives_spanish:
  - anchura
  - amplitud
  lexicon: HALOT
  rationale: «Ancho» es la contraparte natural de «longitud» en español y refleja la medida horizontal del espacio.
- source_word: עַשְׁתֵּי עֶשְׂרֵה
  english_pob_choice: twelve
  chosen_spanish: once
  alternatives_spanish:
  - once cubitos
  lexicon: HALOT
  rationale: El hebreo aquí requiere once, no doce, y el español lo expresa de manera directa sin perder fluidez.
- source_word: וּבַמַּעֲלוֹת
  english_pob_choice: by the steps
  chosen_spanish: junto a las gradas
  alternatives_spanish:
  - por las gradas
  - en las gradas
  lexicon: HALOT
  rationale: «Junto a las gradas» reproduce la relación espacial del hebreo y evita forzar una lectura causal o instrumental que el contexto no exige.
- source_word: אֲשֶׁר יַעֲלוּ אֵלָיו
  english_pob_choice: by which one went up to it
  chosen_spanish: por las cuales se subía a él
  alternatives_spanish:
  - por las cuales se ascendía a él
  - que conducían a él
  lexicon: HALOT
  rationale: Se conserva el sentido genérico e impersonal del hebreo con una pasiva refleja natural en español; «se subía» preserva la acción de ascenso sin introducir sujetos no explicitados.
- source_word: וְעַמֻּדִים
  english_pob_choice: and pillars
  chosen_spanish: y había pilares
  alternatives_spanish:
  - y pilares
  - y columnas
  lexicon: HALOT
  rationale: «Pilares» es fiel y más natural en español arquitectónico; se añade «había» para integrar la construcción existencial que el hebreo presenta de forma elíptica.
- source_word: אֶל הָאֵילִים
  english_pob_choice: beside the sidewalls
  chosen_spanish: junto a los lados
  alternatives_spanish:
  - junto a los pilares laterales
  - junto a los jambajes
  lexicon: HALOT
  rationale: El término hebreo es arquitectónicamente difícil. «Junto a los lados» conserva la relación espacial sin decidir demasiado cerradamente entre jambas, pilastras o elementos laterales, manteniendo la tensión documentada por la POB.
- source_word: אֶחָד מִפֹּה וְאֶחָד מִפֹּה
  english_pob_choice: one on this side and one on that side
  chosen_spanish: uno de este lado y uno de aquel lado
  alternatives_spanish:
  - uno a cada lado
  - uno por un lado y otro por el otro
  lexicon: HALOT
  rationale: La expresión distributiva hebrea se vierte con simetría idiomática en español, preservando el paralelismo de ambos lados.
theological_decisions:
- issue: 'Medida de la anchura: once codos, no doce'
  english_pob_reading: The width was eleven cubits
  chosen_spanish_reading: el ancho de once codos
  alternative_spanish_readings:
  - el ancho de doce codos
  rationale: Se sigue la corrección de la revisión auditada que ajusta el número al hebreo. No se suaviza la diferencia, porque el dato numérico forma parte del contenido inspirado y de la trazabilidad textual.
  doctrine_reference: Fidelidad textual y precisión numérica en la transmisión bíblica
translation_notes:
  revision_awareness: La revisión auditada corrigió la anchura de doce a once codos para ajustarla al hebreo; esta versión española sigue esa corrección y conserva el resto del trazado inglés-POB, manteniendo además la tensión lexical de אֵילִים con una nota explicativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto base lo requiera; aquí no aparece el Tetragrámaton.
  - Se conserva el tono arquitectónico con vocabulario sobrio y medible.
  - «Vestíbulo» y «codos» mantienen consistencia con el registro técnico de la sección.
  - La pasiva refleja «se subía» evita introducir sujetos ajenos al hebreo.
  - Se deja explícita la dificultad de אֵילִים en nota para no borrar la ambigüedad documentada.
