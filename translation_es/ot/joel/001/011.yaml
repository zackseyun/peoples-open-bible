translation:
  language: es
  text: Avergüéncense[a], labradores; giman[b], viñadores, por el trigo y por la cebada, porque se ha perdido la cosecha del campo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Queden avergonzados» o «Queden confundidos». El verbo hebreo puede expresar vergüenza pública o consternación; el texto principal conserva la fuerza imperativa directa.
    reason: lexical_alternative
  - marker: b
    text: O «aúllen» o «laméntense». El verbo hebreo denota un clamor fuerte de dolor o duelo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֹבִישׁוּ
  english_pob_choice: Be ashamed
  chosen_spanish: Avergüéncense
  alternatives_spanish:
  - Sean avergonzados
  - Entrén en vergüenza
  - Desmayen
  lexicon: HALOT
  rationale: El hebreo es un imperativo plural en הִפְעִיל de בושׁ con fuerza de llamado profético. En español, «Avergüéncense» conserva el imperativo y el registro emocional/social de vergüenza pública mejor que una paráfrasis débil como «desmayen».
- source_word: אִכָּרִים
  english_pob_choice: farmers
  chosen_spanish: labradores
  alternatives_spanish:
  - agricultores
  - campesinos
  - aradores
  lexicon: HALOT
  rationale: El término designa trabajadores de la tierra en general. «Labradores» es claro, bíblico y natural en español, y evita restringirlo demasiado a una profesión moderna específica.
- source_word: הֵילִילוּ
  english_pob_choice: wail
  chosen_spanish: aúllen
  alternatives_spanish:
  - lamenten
  - giman
  - lloren a gritos
  lexicon: HALOT
  rationale: El verbo expresa un clamor fuerte de duelo. «Aúllen» reproduce bien la intensidad sonora; aunque es una palabra marcada, corresponde al tono de lamento profético del pasaje.
- source_word: כֹּרְמִים
  english_pob_choice: vinedressers
  chosen_spanish: viñadores
  alternatives_spanish:
  - viticultores
  - encargados de las viñas
  - vendimiadores
  lexicon: HALOT
  rationale: El término se refiere a quienes cultivan o cuidan viñas. «Viñadores» es una equivalencia española tradicional y precisa, y mantiene el paralelismo con «labradores».
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - sobre
  - por causa de
  lexicon: HALOT
  rationale: En este contexto de lamentación, la preposición introduce el motivo del duelo. «Por» suena natural en español y comunica adecuadamente la causa o motivo de la queja.
- source_word: חִטָּה
  english_pob_choice: wheat
  chosen_spanish: trigo
  alternatives_spanish:
  - trigo candeal
  - grano de trigo
  lexicon: HALOT
  rationale: Es el cereal común designado por el término hebreo. «Trigo» es la equivalencia estándar y suficientemente precisa.
- source_word: שְׂעֹרָה
  english_pob_choice: barley
  chosen_spanish: cebada
  alternatives_spanish:
  - cebada negra
  - grano de cebada
  lexicon: HALOT
  rationale: Es la equivalencia estándar del cereal hebreo. Mantiene el paralelismo agrícola del versículo.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: Introduce la razón de los imperativos. «Porque» expresa con claridad la relación causal en español moderno.
- source_word: אָבַד
  english_pob_choice: has perished
  chosen_spanish: se ha perdido
  alternatives_spanish:
  - ha perecido
  - se ha arruinado
  - se ha destruido
  lexicon: HALOT
  rationale: El perfecto qal comunica pérdida consumada. «Se ha perdido» conserva el resultado final sin forzar una imagen de destrucción física más explícita de la que el hebreo exige.
- source_word: קְצִיר שָׂדֶה
  english_pob_choice: the harvest of the field
  chosen_spanish: la cosecha del campo
  alternatives_spanish:
  - la siega del campo
  - la cosecha de la tierra
  - la recolección del campo
  lexicon: HALOT
  rationale: La construcción posesiva alude a la cosecha perteneciente al campo. «Cosecha del campo» es transparente en español y conserva la imagen agrícola inmediata.
theological_decisions:
- issue: Tono profético de vergüenza y duelo
  english_pob_reading: 'The verse is a prophetic summons: shame and lament because the grain harvest has failed.'
  chosen_spanish_reading: El versículo se entiende como un llamado profético a la vergüenza y al lamento por el fracaso de la cosecha.
  alternative_spanish_readings:
  - Una simple descripción emocional sin valor imperativo
  - Una exhortación moralizante desligada del desastre agrícola
  rationale: El texto hebreo usa imperativos plurales dirigidos a grupos concretos. La versión española mantiene ese carácter de anuncio y llamado, sin convertirlo en una moraleja general.
  doctrine_reference: Lectura literaria y profética del juicio en Joel 1
- issue: Valor de עַל en contexto de lamento
  english_pob_reading: over the wheat and over the barley
  chosen_spanish_reading: por el trigo y por la cebada
  alternative_spanish_readings:
  - sobre el trigo y sobre la cebada
  - a causa del trigo y de la cebada
  rationale: El contexto no pide una lectura espacial literal sino causal/lamentativa. «Por» mantiene la relación de motivo del duelo sin perder naturalidad en español.
  doctrine_reference: Semántica contextual de preposiciones hebreas en poesía profética
translation_notes:
  revision_awareness: Se revisó el equilibrio entre literalidad y naturalidad en español. Se decidió conservar el imperativo plural y el paralelismo agrícola del hebreo, con una solución idiomática para עַל en contexto de lamento. No se detectaron cambios textuales recientes que requirieran ajustar el verso base.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantuvo «trigo» y «cebada» como equivalencias estándar para los cereales hebreos.
  - Se prefirió «labradores» y «viñadores» por su claridad y por conservar el paralelismo poético del texto.
  - Los marcadores de nota [a] y [b] aparecen exactamente en las palabras con ambigüedad léxica correspondiente.
