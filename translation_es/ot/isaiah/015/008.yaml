translation:
  language: es
  text: Porque el clamor[a] ha rodeado la frontera de Moab; su lamento llega hasta Eglaim, y su lamento hasta Beer-elim[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ha circundado la frontera de Moab». El hebreo conserva la imagen del clamor que va alrededor de Moab.'
    reason: lexical_alternative
  - marker: b
    text: Beer-elim es un nombre de lugar, posiblemente con el sentido de «pozo de Elim» o «pozo de los poderosos».
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Ciertamente
  lexicon: HALOT
  rationale: Introduce la explicación del lamento anterior y mantiene una relación causal/discursiva natural en español. ‘Porque’ conserva mejor el valor explicativo de כִּי que una simple transición estilística.
- source_word: הִקִּיפָה
  english_pob_choice: has gone around
  chosen_spanish: ha rodeado
  alternatives_spanish:
  - ha encircled
  - ha circundado
  - ha rodeado por completo
  lexicon: HALOT
  rationale: El hebreo conserva la imagen espacial de un clamor que va alrededor del territorio. ‘Ha rodeado’ es una forma natural en español y mantiene la idea de envolvimiento sin perder el movimiento del verbo.
- source_word: הַזְּעָקָה
  english_pob_choice: the outcry
  chosen_spanish: el clamor
  alternatives_spanish:
  - el grito
  - la voz de angustia
  - el alarido
  lexicon: HALOT
  rationale: זְעָקָה es un grito de angustia o socorro. ‘Clamor’ comunica bien el carácter público y doliente del término en español, sin hacerlo demasiado coloquial.
- source_word: גְּבוּל מוֹאָב
  english_pob_choice: the border of Moab
  chosen_spanish: el límite de Moab
  alternatives_spanish:
  - la frontera de Moab
  - el borde de Moab
  - la región de Moab
  lexicon: HALOT
  rationale: גְּבוּל puede ser frontera, límite o borde. ‘Límite’ preserva el sentido geográfico y funciona con fluidez en español; además, evita restringir innecesariamente el alcance a una línea política moderna.
- source_word: עַד אֶגְלַיִם
  english_pob_choice: as far as Eglaim
  chosen_spanish: hasta Eglaim
  alternatives_spanish:
  - así como hasta Eglaim
  - a Eglaim
  - hasta la región de Eglaim
  lexicon: HALOT
  rationale: עַד marca extensión. ‘Hasta’ es la correspondencia más directa y mantiene la progresión geográfica del versículo. Se translitera el topónimo por tratarse de un nombre de lugar.
- source_word: יִלְלָתָהּ
  english_pob_choice: its wailing
  chosen_spanish: su aullido
  alternatives_spanish:
  - su lamento
  - su gemido
  - su clamor
  lexicon: HALOT
  rationale: El término procede de יללה, ‘aullar / gemir / lanzar alaridos’. ‘Aullido’ conserva la intensidad sonora y la fuerza imagética del original mejor que un término más suave como ‘lamento’. El posesivo femenino se mantiene como en el hebreo, referido al clamor/la voz personificada.
- source_word: וּבְאֵר אֵילִים
  english_pob_choice: to Beer-elim
  chosen_spanish: y hasta Beer-elim
  alternatives_spanish:
  - y a Beer-elim
  - y hacia Beer-elim
  - y hasta la fuente de Elim
  lexicon: HALOT
  rationale: La conjunción prefijada וּ sugiere continuación del recorrido del clamor. Se conserva el topónimo transliterado y se añade ‘hasta’ para reflejar la extensión paralela del verso. No se desarrolla el posible sentido etimológico del nombre en el texto principal para no ir más allá de lo que el hebreo exige.
theological_decisions:
- issue: Tratamiento del nombre divino y del contenido oracular
  english_pob_reading: The verse is part of a lament oracle with no explicit divine-name masking in the line itself.
  chosen_spanish_reading: Se traduce el enunciado como parte de un oráculo de lamento sin introducir terminología devocional adicional.
  alternative_spanish_readings:
  - Porque el Señor...
  - Pues Yahvé...
  rationale: El versículo no contiene יהוה ni un título divino explícito; por tanto, no corresponde introducir ‘Yahvé’ o ‘Señor’ en el texto. La sintaxis se mantiene como una declaración profética de juicio/lamento, fiel al flujo del pasaje.
  doctrine_reference: Consistencia con el texto hebreo y con la política POB sobre el tetragrámaton
translation_notes:
  revision_awareness: Se siguió de cerca el apunte auditado en inglés y no hubo revisiones posteriores que alteraran el sentido. La versión española conserva la imagen espacial de un clamor que rodea el territorio y mantiene la progresión geográfica hasta dos topónimos transliterados.
  spanish_consistency_notes:
  - Se mantiene ‘Moab’, ‘Eglaim’ y ‘Beer-elim’ como nombres propios transliterados de forma uniforme.
  - '‘Clamor’ y ‘aullido’ se distinguen para reflejar dos matices del original: זְעָקָה como grito de angustia y יִלְלָה como lamento/aullido.'
  - La cláusula inicial ‘Porque’ refleja el valor explicativo de כִּי sin forzar una causalidad ajena al contexto.
  - Se evita ‘SEÑOR’ porque no aparece el tetragrámaton en este versículo.
