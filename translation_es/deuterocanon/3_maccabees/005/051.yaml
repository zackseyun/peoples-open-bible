revisions:
- from: Clamaron[a] con voz muy grande, implorando al Soberano de todo[b] que les tuviera misericordia con una manifestación[c], cuando ya estaban junto a las puertas del Hades.
  to: Clamaron con voz muy fuerte[a], implorando al Soberano de todo[b] que tuviera misericordia de ellos con una manifestación[c], cuando ya estaban a las puertas del Hades.
  rationale: 'Se ajustó el español para que sea más natural y a la vez más fiel al valor del griego: «con voz muy fuerte» evita un calco poco idiomático; «de ellos» mejora la colocación española; y «a las puertas del Hades» refleja mejor la imagen de inminencia mortal presente en πρὸς πύλας ᾅδου. Se conservaron «Soberano», «manifestación» y «Hades» por su buena alineación con el rastro lexical y teológico de la POB.'
