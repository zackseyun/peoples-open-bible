review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del arameo y del POB en inglés: identifica correctamente el documento como una copia de una carta, mantiene a Tatenai como gobernador, conserva la lista de remitentes y refleja la función administrativa de אֲפַרְסְכָיֵא como «funcionarios» con nota alternativa. Sin embargo, la expresión «Más Allá del Río» suena poco idiomática en español y resulta demasiado calcada; además, la transliteración «Setar-bosnai» se aparta innecesariamente de la forma auditada «Shethar-bozenai / Setar-bozenai».'
  spanish_quality_summary: El texto es generalmente claro, pero «gobernador del Más Allá del Río» y «estaban en el Más Allá del Río» no suenan naturales en español bíblico moderno. «la región de Más Allá del Río» preserva la designación administrativa y mejora mucho la legibilidad. También conviene ajustar el nombre compuesto a «Setar-bozenai» para mayor consistencia y evitar una forma menos sustentada. El resto del versículo es fluido y de registro adecuado.
  glossary_alignment: 'No hay conflictos con la terminología teológica principal del proyecto. La decisión funcional «los funcionarios» para אֲפַרְסְכָיֵא está bien alineada con la auditoría inglesa y la nota alternativa se conserva correctamente. La única desalineación relevante es estilística/terminológica en la representación de עֲבַר נַהֲרָה: debe preservarse como región administrativa, pero en español conviene evitar el calco nominal desnudo «el Más Allá del Río».'
  issues:
  - severity: medium
    issue: Calco poco natural de עֲבַר נַהֲרָה como «el Más Allá del Río»
    rationale: Aunque busca conservar el valor administrativo del término, en español esta formulación suena forzada y poco idiomática. «la región de Más Allá del Río» mantiene la capitalización y la fuerza de nombre oficial sin sacrificar naturalidad.
  - severity: low
    issue: Transliteración inconsistente del nombre propio «Setar-bosnai»
    rationale: La forma propuesta no sigue de cerca la evidencia auditada ni la transliteración más estable del compuesto. «Setar-bozenai» conserva mejor la identificación del nombre y suena bien en español.
  revised_spanish_text: Esta es una copia de la carta que Tatenai[a], gobernador de la región de Más Allá del Río, y Setar-bozenai y sus asociados, los funcionarios que estaban en Más Allá del Río, enviaron al rey Darío.
  revised_footnotes:
  - marker: a
    text: O «los afarsaquitas», si el término se toma como el nombre de un pueblo o grupo administrativo y no como un título funcional.
    reason: alternative_reading
  revision_rationale: Se revisa la designación territorial para conservar su carácter administrativo de manera más natural en español, evitando un calco rígido. También se ajusta la transliteración del nombre compuesto para mayor fidelidad y consistencia con la auditoría. La nota alternativa se mantiene, con su marcador correctamente anclado en el nombre al que modifica, igual que en el POB en inglés.
