translation:
  language: es
  text: Porque son hostiles a ustedes mediante sus maquinaciones, con las cuales los engañaron en el asunto de Peor[a] y en el asunto de Cozbí, la hija de un líder de Madián, su hermana[c][b], la que fue abatida el día de la plaga a causa del asunto de Peor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Peor se refiere al incidente anterior de Baal-peor narrado en este capítulo.
    reason: cross_reference
  - marker: b
    text: 'O: «por sus maquinaciones» / «mediante sus tretas».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «su hermana»; probablemente significa una mujer de su propio pueblo o grupo de parentesco.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צֹרְרִים
  english_pob_choice: are hostile
  chosen_spanish: son hostiles
  alternatives_spanish:
  - son enemigos
  - los hostigan
  - muestran hostilidad
  lexicon: HALOT
  rationale: El participio expresa enemistad/hostilidad continua; «son hostiles» conserva bien el valor predicativo y es natural en español.
- source_word: בְּנִכְלֵיהֶם
  english_pob_choice: through their schemes
  chosen_spanish: mediante sus maquinaciones
  alternatives_spanish:
  - por medio de sus astucias
  - a través de sus engaños
  - mediante sus tretas
  lexicon: HALOT
  rationale: נכלים apunta a planes astutos y engañosos; «maquinaciones» mantiene el sentido de acción tramada y el matiz negativo sin sonar coloquial.
- source_word: נִכְּלוּ
  english_pob_choice: they deceived
  chosen_spanish: los engañaron
  alternatives_spanish:
  - obraron engañosamente contra ustedes
  - los sedujeron con engaño
  - tramaron contra ustedes
  lexicon: HALOT
  rationale: El verbo cognado refuerza la idea de engaño activo. «Los engañaron» es claro y reproduce la relación verbal con «maquinaciones».
- source_word: עַל דְּבַר פְּעוֹר
  english_pob_choice: in the matter of Peor
  chosen_spanish: en el asunto de Peor
  alternatives_spanish:
  - en cuanto a Peor
  - respecto de Peor
  - en el caso de Peor
  lexicon: HALOT
  rationale: La locución idiomática se vierte con «en el asunto de» para conservar el valor de referencia a un episodio concreto sin forzar una causalidad en esta primera mención.
- source_word: כָּזְבִּי
  english_pob_choice: Cozbi
  chosen_spanish: Cozbí
  alternatives_spanish:
  - Cozbi
  lexicon: Transliteración
  rationale: Se translitera el nombre propio con ortografía española; se mantiene la forma breve y reconocible del hebreo.
- source_word: בַת נְשִׂיא מִדְיָן
  english_pob_choice: the daughter of a leader of Midian
  chosen_spanish: la hija de un líder de Madián
  alternatives_spanish:
  - la hija de un príncipe de Madián
  - la hija de un jefe de Madián
  lexicon: HALOT
  rationale: נשיא designa a un dirigente elevado; «líder» evita el posible exceso de «príncipe» y sugiere correctamente autoridad tribal o política.
- source_word: אֲחֹתָם
  english_pob_choice: their sister
  chosen_spanish: su hermana
  alternatives_spanish:
  - la hermana de ellos
  - su parienta
  lexicon: HALOT
  rationale: Se conserva la literalidad de «hermana», que en este contexto puede expresar vínculo de grupo o parentesco tribal; el español permite la misma ambigüedad que el hebreo.
- source_word: הַמֻּכָּה
  english_pob_choice: who was struck down
  chosen_spanish: la que fue herida
  alternatives_spanish:
  - la que fue derribada
  - la que fue muerta
  - la herida
  lexicon: HALOT
  rationale: El participio pasivo de נכה conserva la imagen de ser golpeada/herida; «fue herida» mantiene esa fuerza verbal sin afirmar más de lo que el término dice por sí mismo.
- source_word: בְיוֹם הַמַּגֵּפָה
  english_pob_choice: on the day of the plague
  chosen_spanish: el día de la plaga
  alternatives_spanish:
  - en el día de la plaga
  - cuando vino la plaga
  lexicon: HALOT
  rationale: La expresión temporal se mantiene directa; en español, el artículo basta para expresar el marco temporal con naturalidad.
- source_word: עַל דְּבַר פְּעוֹר
  english_pob_choice: because of the matter of Peor
  chosen_spanish: a causa del asunto de Peor
  alternatives_spanish:
  - por el asunto de Peor
  - a raíz del asunto de Peor
  - por causa de Peor
  lexicon: HALOT
  rationale: En la cláusula final la locución adquiere matiz causal; «a causa de» refleja bien esa relación sin perder el vínculo con el episodio de Peor.
theological_decisions:
- issue: Referente de Peor
  english_pob_reading: Transliterated 'Peor' in the main text, with a note identifying the earlier Baal-peor incident.
  chosen_spanish_reading: Peor transliterado en el texto principal, con nota que lo identifica como el episodio de Baal-peor.
  alternative_spanish_readings:
  - Baal-peor en el texto principal
  - explicitar 'el ídolo de Peor'
  rationale: El hebreo dice simplemente «Peor». Mantener el nombre evita interpretar en exceso el texto principal, mientras que la nota puede aclarar el referente histórico.
  doctrine_reference: Translation philosophy §1, §2
- issue: Valor de la repetición de דְּבַר פְּעוֹר
  english_pob_reading: First occurrence rendered situationally ('in the matter of Peor'); final occurrence causally ('because of the matter of Peor').
  chosen_spanish_reading: 'Primera ocurrencia: «en el asunto de Peor»; última ocurrencia: «a causa del asunto de Peor».'
  alternative_spanish_readings:
  - usar la misma redacción en ambas ocurrencias
  - usar dos construcciones causales
  rationale: La misma locución hebrea funciona de manera ligeramente distinta según el contexto sintáctico. Diferenciarla en español preserva el sentido sin ocultar la cohesión del hebreo.
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: Se siguió el ajuste de revisión que eliminó una coma innecesaria en la coordinación de las dos menciones de Peor/Cozbí; la redacción española conserva esa fluidez sintáctica. También se mantuvo la decisión auditada de diferenciar el primer y el último «דְּבַר פְּעוֹר» según su función contextual.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; aquí no se presenta.
  - «Madián» se translitera de forma consistente.
  - «Cozbí» se adapta a la ortografía española, pero se mantiene reconocible.
  - Se conserva la literalidad de «hermana» para no borrar la ambigüedad kinship/tribal del hebreo.
  - «Plaga» y «herido» preservan la imaginería del texto sin sobrerinterpretar.
