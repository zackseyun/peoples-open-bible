review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el audit trail inglés en la estructura general: David y los jefes militares apartan para el servicio a los hijos de Asaf, Hemán y Jedutún; se menciona la actividad profética vinculada con instrumentos; y la cláusula final introduce una enumeración. Sin embargo, la elección española «los profetas» se aparta de la decisión principal documentada por el POB inglés, que prefirió una cláusula verbal (''who prophesied'') como lectura principal, dejando la aposición nominal como alternativa en nota. Además, el orden instrumental en el texto español invierte los equivalentes asignados en las decisiones léxicas internas del propio registro y no refleja la secuencia del inglés auditado.'
  spanish_quality_summary: El español es claro y digno, pero «los profetas» suena más rígido en esta sintaxis y deja la frase menos natural que «que profetizaban». También conviene alinear la serie instrumental con el orden hebreo y con las decisiones léxicas declaradas para evitar inconsistencia interna. El resto del versículo lee bien, y «apartaron», «comandantes del ejército» y «para el servicio» son adecuados.
  glossary_alignment: 'No hay conflictos con la terminología global del proyecto (no aparecen Yahvé, Mesías, etc.). Sí hay una desalineación con la racionalidad léxica/audit trail del POB para הַנְּבִיאִים: debería preferirse una forma verbal en el texto principal y reservar la aposición nominal para nota. También debe corregirse la correspondencia de כִּנֹּרוֹת / נְבָלִים en el texto español para que coincida con las decisiones registradas.'
  issues:
  - severity: medium
    issue: La traducción principal de הַנְּבִיאִים como «los profetas» no sigue la decisión principal del POB inglés.
    rationale: El audit trail inglés documenta como lectura elegida «who prophesied», dejando «the prophets» como alternativa en nota. En español, «que profetizaban» preserva mejor esa decisión y además suena más natural en la frase.
  - severity: medium
    issue: La serie instrumental del texto español está invertida respecto de las decisiones léxicas registradas y del orden fuente.
    rationale: El borrador dice «con arpas, liras y címbalos», pero las decisiones internas asignan כִּנֹּרוֹת -> «liras» y נְבָלִים -> «arpas». Debe decir «con liras, arpas y címbalos» para mantener consistencia y fidelidad al orden hebreo.
  - severity: low
    issue: La nota a conserva bien la alternativa, pero el texto principal no refleja que esa sea precisamente una alternativa.
    rationale: Al corregir el cuerpo a «que profetizaban», la nota a queda mejor ubicada como opción secundaria formal/apposicional, tal como en el audit trail inglés.
