base_translation:
  language: en
  yaml_path: translation/nt/john/007/045.yaml
  text: So the officers came to the chief priests and Pharisees[a], and they said to them[b], “Why did you not bring him?”
  footnotes:
  - marker: a
    text: Or “they said to them.” The Greek explicitly uses a demonstrative (“those men”), likely for emphasis, referring to the chief priests and Pharisees.
    reason: lexical_alternative
  - marker: b
    text: Or “Why did you not lead him here?” The verb can mean “lead” or “bring”; here “bring” best fits the context of officers sent to arrest Jesus.
    reason: lexical_alternative
