base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/030/017.yaml
  text: 'For I will restore health to you[a], and I will heal you from your wounds, declares Yahweh, because they have called you an outcast: ‘It is Zion[c][b]; no one cares for her.’'
  footnotes:
  - marker: a
    text: Or 'I will restore health to you.' The Hebrew idiom is literally 'I will cause healing to come up for you.'
    reason: lexical_alternative
  - marker: b
    text: Or 'because they called you “Outcast.”' The Hebrew participle can mean 'driven away' or 'cast off.'
    reason: lexical_alternative
  - marker: c
    text: Literally, 'Zion—there is no one seeking her,' that is, no one cares for or comes to her aid.
    reason: lexical_alternative
