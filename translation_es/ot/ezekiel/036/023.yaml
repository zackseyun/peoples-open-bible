revisions:
- from: Yo santificaré mi gran nombre[a], que ha sido profanado entre las naciones, el cual vosotros profanasteis en medio de ellas. Entonces las naciones sabrán que yo soy Yahvé, declara el Señor Yahvé[b], cuando me muestre santo por medio de vosotros delante de sus ojos.
  to: Yo santificaré mi gran nombre[a], que ha sido profanado entre las naciones, el cual ustedes han profanado entre ellas. Entonces las naciones sabrán que yo soy Yahvé, declara el Señor Dios[b], cuando me muestre santo por medio de ustedes ante sus ojos.
  rationale: Se ajustó el registro al español neutral latinoamericano reemplazando «vosotros» por «ustedes». También se mejoró el valor aspectual con «han profanado», más natural y más cercano al sentido auditado. Se cambió «Señor Yahvé» por «Señor Dios» como resolución idiomática de אֲדֹנָי יְהוִה en español, sin dejar de conservar «Yahvé» donde el texto declara explícitamente el nombre divino. Además, se pulió «delante de sus ojos» a «ante sus ojos» por fluidez, y se mantuvieron las notas alternativas relevantes.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:43:40Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: santificar el gran nombre, profanado entre las naciones, resultado de conocimiento de Yahvé, y la cláusula final con manifestación pública de santidad. Sin embargo, hay dos desajustes de fidelidad/estilo: (1) en el texto principal aparece «vosotros profanasteis», que pierde el matiz perfecto del inglés auditado («you have profaned») y además introduce un registro peninsular no acorde con el objetivo neutral latinoamericano; (2) «Señor Yahvé» para אֲדֹנָי יְהוִה es defendible, pero en español eclesial más claro y natural, y más cercano al inglés auditado «Lord GOD», conviene «Señor Dios», manteniendo «Yahvé» para el tetragrámaton previo de la frase.'
  spanish_quality_summary: 'El español es generalmente claro, pero «vosotros» rompe la neutralidad LATAM/church-readable pedida por el proyecto. También «delante de sus ojos» es correcto, aunque «ante sus ojos» suena algo más natural y digno. La frase completa mejora con una sintaxis menos marcada: «que ustedes han profanado entre ellas» y «declara el Señor Dios».'
  glossary_alignment: Alinea bien con «Yahvé» para יהוה en la declaración central. No obstante, para נְאֻם אֲדֹנָי יְהוִה la mejor alineación contextual en español es «declara el Señor Dios», ya que aquí el hebreo combina título + nombre divino y el inglés auditado resolvió la evitación de duplicación como «Lord GOD». Esto no contradice la política de usar «Yahvé» para יהוה en general; es una excepción contextual explicable por la combinación fija אֲדֹנָי יְהוִה.
  issues:
  - severity: medium
    issue: Uso de «vosotros» en el texto principal
    rationale: El proyecto pide español neutral latinoamericano / ampliamente legible en iglesia. «Vosotros profanasteis» suena marcadamente peninsular y menos natural para el público meta.
  - severity: medium
    issue: Aspecto verbal de «profanasteis»
    rationale: El inglés auditado tiene «you have profaned», y el hebreo perfectivo en contexto sigue describiendo la profanación vigente entre las naciones. «Han profanado» comunica mejor el estado/resultante en español actual.
  - severity: low
    issue: «Señor Yahvé» menos natural que «Señor Dios» en esta fórmula
    rationale: Aunque defendible, «Señor Dios» suena más idiomático en español bíblico moderno para אֲדֹנָי יְהוִה y evita una secuencia menos habitual, preservando la distinción ya expresada por «Yahvé» en la cláusula anterior.
  revised_spanish_text: Yo santificaré mi gran nombre[a], que ha sido profanado entre las naciones, el cual ustedes han profanado entre ellas. Entonces las naciones sabrán que yo soy Yahvé, declara el Señor Dios[b], cuando me muestre santo por medio de ustedes ante sus ojos.
  revised_footnotes:
  - marker: a
    text: 'O, más formalmente: «Yo santificaré mi gran nombre»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cuando sea santificado en ustedes ante sus ojos»'
    reason: lexical_alternative
  revision_rationale: Se ajustó el registro al español neutral latinoamericano reemplazando «vosotros» por «ustedes». También se mejoró el valor aspectual con «han profanado», más natural y más cercano al sentido auditado. Se cambió «Señor Yahvé» por «Señor Dios» como resolución idiomática de אֲדֹנָי יְהוִה en español, sin dejar de conservar «Yahvé» donde el texto declara explícitamente el nombre divino. Además, se pulió «delante de sus ojos» a «ante sus ojos» por fluidez, y se mantuvieron las notas alternativas relevantes.
