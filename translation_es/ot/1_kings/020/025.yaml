base_translation:
  language: en
  yaml_path: translation/ot/1_kings/020/025.yaml
  text: And you[a], number for yourself an army like the army that fell from you, and horse for horse and chariot for chariot; then let us fight against them on the plain[c][b]. Surely we will be stronger than they are.” So he listened to their voice and did so.
  footnotes:
  - marker: a
    text: Hebrew 'that fell from you' likely means 'that you lost'—that is, troops lost in battle.
    reason: lexical_alternative
  - marker: b
    text: Or 'on level ground.' The advisers assume Aram will fare better in the plain than in the hills.
    reason: cultural_note
  - marker: c
    text: The expression 'Surely' renders a Hebrew idiom (literally, 'if not') used for strong assertion.
    reason: lexical_alternative
