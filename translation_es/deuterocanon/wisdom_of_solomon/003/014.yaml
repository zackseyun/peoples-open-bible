    rationale: Las notas deben preservar alternativas significativas o aclaraciones reales. «O «eunuco»» es circular e innecesario.
  - severity: medium
    issue: Faltan notas para las alternativas léxicas documentadas en el POB inglés sobre τῆς πίστεως χάρις ἐκλεκτὴ y sobre κλῆρος/θυμηρέστερος.
    rationale: El audit trail inglés preserva explícitamente ambigüedad y matices en esas expresiones. La revisión española debe reflejar esas alternativas, especialmente donde el griego es compacto.
  - severity: low
    issue: «Gracia elegida de la fe» suena menos idiomático que «gracia escogida de la fe».
    rationale: Ambas son fieles, pero «escogida» es más natural en español general y mantiene el valor de ἐκλεκτή.
  - severity: low
    issue: «Más deleitosa» es algo poco natural en español actual.
    rationale: Aunque fiel al comparativo de θυμηρέστερος, «más agradable» funciona mejor en lectura continua; las alternativas «más deseable» o «porción más agradable» pueden ir en nota.
