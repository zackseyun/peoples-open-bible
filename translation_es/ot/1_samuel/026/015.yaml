revisions:
- from: 'David dijo a Abner[a][b]: «¿No eres un hombre? ¿Y quién es como tú en Israel? ¿Por qué entonces no has vigilado a tu señor, el rey? Porque uno del pueblo vino a destruir al rey, tu señor».'
  to: 'David dijo a Abner: «¿No eres un hombre? ¿Y quién es como tú[a] en Israel? ¿Por qué entonces no has montado guardia sobre tu señor el rey? Porque uno del pueblo[b] vino a destruir al rey, tu señor».'
  rationale: Se reubicaron las notas al pie para que coincidan con las frases a las que realmente pertenecen. Además, se ajustó «no has vigilado a» a «no has montado guardia sobre», que comunica mejor el sentido militar de שׁמר en este contexto y suena más natural en español bíblico moderno. Se mantuvo «señor» para אֲדֹן y la repetición retórica «al rey, tu señor».
