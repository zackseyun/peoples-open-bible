translation:
  language: es
  text: Todos estos reyes se reunieron de común acuerdo,[a] y vinieron y acamparon juntos en las aguas de Merom para pelear contra Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se congregaron por acuerdo» o «se reunieron juntos»; el verbo hebreo sugiere una reunión coordinada, no un encuentro casual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּוָּעֲדוּ
  english_pob_choice: met by agreement / agreed together
  chosen_spanish: se juntaron por acuerdo
  alternatives_spanish:
  - se reunieron por acuerdo
  - se congregaron por acuerdo
  - se encontraron por acuerdo
  lexicon: HALOT
  rationale: El nifal de יעד expresa una reunión concertada, no un mero encuentro casual. 'Se juntaron por acuerdo' conserva la idea de reunión coordinada que subyace al audit trail inglés, con un español natural y transparente.
- source_word: כֹּל הַמְּלָכִים הָאֵלֶּה
  english_pob_choice: all these kings
  chosen_spanish: Todos estos reyes
  alternatives_spanish:
  - Todos aquellos reyes
  - Todos los reyes estos
  lexicon: HALOT
  rationale: '''Estos'' refleja mejor la referencia inmediata del relato. Se mantiene el demostrativo para conservar la deixis del hebreo.'
- source_word: וַיָּבֹאוּ
  english_pob_choice: they came
  chosen_spanish: vinieron
  alternatives_spanish:
  - vinieron allí
  - llegaron
  lexicon: HALOT
  rationale: En secuencia narrativa, 'vinieron' es un equivalente natural de בוא y evita sobrecargar el verso con repeticiones rígidas.
- source_word: וַיַּחֲנוּ
  english_pob_choice: encamped
  chosen_spanish: acamparon
  alternatives_spanish:
  - levantaron el campamento
  - acamparon militarmente
  lexicon: HALOT
  rationale: חנה tiene sentido militar de acampar/establecer campamento. 'Acamparon' es claro en español; el contexto bélico sostiene la fuerza militar sin necesidad de añadirla explícitamente.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - en conjunto
  - de consuno
  lexicon: HALOT
  rationale: El adverbio enfatiza acción unificada. 'Juntos' es la opción más natural en español y mantiene el énfasis en la coalición.
- source_word: אֶל מֵי מֵרֹם
  english_pob_choice: at the waters of Merom
  chosen_spanish: junto a las aguas de Merom
  alternatives_spanish:
  - a las aguas de Merom
  - en las aguas de Merom
  lexicon: HALOT
  rationale: Aunque אֶל puede ser direccional, el contexto de acampar favorece una ubicación. 'Junto a' comunica bien la cercanía al lugar de campamento y evita un calco duro. Se conserva 'aguas' porque el hebreo usa el plural de מים.
- source_word: לְהִלָּחֵם עִם יִשְׂרָאֵל
  english_pob_choice: to fight against Israel
  chosen_spanish: para pelear contra Israel
  alternatives_spanish:
  - para combatir contra Israel
  - para guerrear contra Israel
  lexicon: HALOT
  rationale: לָחַם con עִם en contexto militar expresa hostilidad bélica. 'Pelear contra' es idiomático y claro en español; 'combatir' es posible, pero 'pelear' sigue de cerca el sentido del inglés POB sin sonar artificial.
theological_decisions:
- issue: 'La preposición y dirección de la alianza militar: reunión concertada versus simple encuentro'
  english_pob_reading: met by agreement / coordinated gathering, not merely a chance meeting
  chosen_spanish_reading: se juntaron por acuerdo
  alternative_spanish_readings:
  - se reunieron por acuerdo
  - se encontraron por acuerdo
  rationale: El texto no presenta una reunión fortuita, sino una coalición concertada contra Israel. La redacción española debe conservar esa tensión lexical de coordinación intencional.
  doctrine_reference: Lectura histórica y lexical del hebreo; coherencia narrativa de la guerra en Josué.
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó 'agreed together' a 'met by agreement' para reflejar con más precisión la idea de reunión concertada. La línea española adopta esa misma precisión con 'se juntaron por acuerdo', manteniendo el valor de coordinación intencional y el flujo narrativo.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma general del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantiene 'aguas de Merom' en plural por el hebreo מֵי.
  - Se evita 'SEÑOR' y no hay necesidad de resolución teológica adicional en este versículo.
  - '''Pelear contra'' expresa hostilidad bélica de forma natural en español sin desplazar el sentido del hebreo.'
