translation:
  language: es
  text: El ardor de la ira de Yahvé no se volverá atrás hasta que lo haya hecho y hasta que haya establecido los propósitos de su corazón. En los últimos días[a] lo entenderán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «En los días postreros» o «En los días venideros». La expresión hebrea puede señalar el futuro culminante de los propósitos de Dios sin precisar el momento exacto.
    reason: alternative_reading
lexical_decisions:
- source_word: חֲרוֹן אַף
  english_pob_choice: burning anger
  chosen_spanish: el ardor de la ira
  alternatives_spanish:
  - el fuego de la ira
  - la ira ardiente
  - la ira encendida
  lexicon: HALOT
  rationale: La expresión hebrea combina la idea de calor/ardor con ira intensa. «Ardor de la ira» conserva esa imagen sin sonar forzado en español, y evita reducirlo a un simple «enojo» o a «ira» sin matiz.
- source_word: יָשׁוּב
  english_pob_choice: will not turn back
  chosen_spanish: no volverá
  alternatives_spanish:
  - no se retirará
  - no se apartará
  - no se volverá atrás
  lexicon: HALOT
  rationale: El verbo שׁוּב aquí expresa reversión o retirada. «No volverá» reproduce bien el valor de no retroceder ni cesar antes de cumplir el propósito divino, con una forma natural en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se usa «Yahvé» como forma española estable para el nombre divino, manteniendo la decisión del POB de no ocultar el Tetragrámaton detrás de un sustituto como «SEÑOR».
- source_word: עַד עֲשֹׂתוֹ
  english_pob_choice: until he has done it
  chosen_spanish: hasta que haya hecho esto
  alternatives_spanish:
  - hasta que lo haya hecho
  - hasta que haya actuado
  lexicon: HALOT
  rationale: El sufijo pronominal queda implícito en español. «Esto» es una referencia natural al juicio/acción anunciada en el contexto y evita una traducción más vaga que pierda la relación con lo dicho.
- source_word: הֲקִימוֹ
  english_pob_choice: he has established
  chosen_spanish: haya establecido
  alternatives_spanish:
  - haya afirmado
  - haya puesto en efecto
  - haya cumplido
  lexicon: HALOT
  rationale: Hiphil de קום suele expresar establecer o hacer firme. «Haya establecido» conserva la idea de dar firmeza/efectividad a lo decidido.
- source_word: מְזִמּוֹת לִבּוֹ
  english_pob_choice: the purposes of his heart
  chosen_spanish: los propósitos de su corazón
  alternatives_spanish:
  - los planes de su corazón
  - las intenciones de su corazón
  lexicon: HALOT
  rationale: «Propósitos» comunica bien la deliberación y resolución de מְזִמּוֹת, y «de su corazón» conserva la imagen semítica del centro de la voluntad y el pensamiento.
- source_word: בְּאַחֲרִית הַיָּמִים
  english_pob_choice: In the latter days
  chosen_spanish: En los últimos días
  alternatives_spanish:
  - En los días postreros
  - En los días venideros
  lexicon: HALOT
  rationale: «Últimos días» es la equivalencia más natural y reverberante en español para la expresión profética, sin forzar un esquema escatológico más estrecho que el hebreo.
- source_word: תִּתְבּוֹנְנוּ בָהּ
  english_pob_choice: you will understand it
  chosen_spanish: lo entenderán
  alternatives_spanish:
  - lo comprenderán
  - lo percibirán
  - ustedes lo entenderán
  lexicon: HALOT
  rationale: El verbo connota comprensión atenta o discernimiento. «Lo entenderán» es idiomático y suficientemente abierto para reflejar el resultado cognitivo del mirar/reflexionar sobre lo ocurrido.
theological_decisions:
- issue: Nombre divino en יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: Se mantiene el nombre propio divino en lugar de sustituirlo por un título. Esto sigue la línea auditada del POB y conserva la transparencia del texto hebreo.
  doctrine_reference: POB doctrinal policy on the divine name (YHWH rendered as Yahweh/Yahvé).
- issue: Expresión profética בְּאַחֲרִית הַיָּמִים
  english_pob_reading: In the latter days
  chosen_spanish_reading: En los últimos días
  alternative_spanish_readings:
  - En los días postreros
  - En los días venideros
  rationale: Se preserva la amplitud profética de la expresión sin resolverla en una cronología precisa. En español, «últimos días» comunica esa carga escatológica abierta.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El pasaje mantiene la lectura auditada del POB: imagen vívida de la ira divina, nombre propio Yahvé, y expresión profética abierta para «בְּאַחֲרִית הַיָּמִים». No se aplicaron revisiones posteriores al texto base.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el Tetragrámaton.
  - Se prefiere «últimos días» para la fórmula profética, manteniendo su amplitud.
  - Se mantiene el valor imagético de «ardor de la ira» sin suavizarlo a un término más abstracto.
  - «Lo entenderán» conserva la referencia pronominal implícita del hebreo de forma natural en español.
