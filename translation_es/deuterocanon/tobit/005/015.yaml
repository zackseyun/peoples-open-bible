revisions:
- from: Pero dime[a], ¿qué salario te daré? Un dracma al día, y lo que necesites, como también a mi hijo.
  to: Pero dime[a], ¿qué salario te daré? Una dracma al día, y lo que necesites, igual que a mi hijo.
  rationale: 'Se corrige «Un dracma» a «Una dracma» por concordancia estándar en español. Se reemplaza «como también a mi hijo» por «igual que a mi hijo» para expresar de manera natural y fiel la comparación de ὡς καὶ τῷ υἱῷ μου: Tobit promete darle provisión del mismo modo que a su hijo. Se mantiene «salario» y «lo que necesites», que representan adecuadamente μισθὸν y τὰ δέοντά σοι.'
