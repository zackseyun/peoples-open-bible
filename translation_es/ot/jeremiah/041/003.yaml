translation:
  language: es
  text: Y Ismael abatió a todos los judeanos[a] que estaban con Gedalías en Mizpa, y a los caldeos[b] que se hallaban allí —los hombres de guerra[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «judíos». El término hebreo puede designar al pueblo de Judá/Judea; en este contexto, «judeanos» destaca el sentido histórico-geográfico.
    reason: lexical_alternative
  - marker: b
    text: O «babilonios». El hebreo dice «caldeos».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «los hombres de guerra»; es decir, los combatientes o soldados.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַיְּהוּדִים
  english_pob_choice: the Judeans
  chosen_spanish: los judeanos
  alternatives_spanish:
  - los judíos
  lexicon: HALOT
  rationale: En este contexto histórico-geográfico, el hebreo designa a la población de Judá/Judea más que a una identidad religiosa amplia. "Judeanos" conserva esa referencia sin perder claridad en español.
- source_word: אִתּוֹ אֶת־גְּדַלְיָהוּ
  english_pob_choice: who were with Gedaliah
  chosen_spanish: que estaban con Gedalías
  alternatives_spanish:
  - que estaban con él, con Gedalías
  lexicon: HALOT
  rationale: El sufijo pronominal se refiere a Gedalías, aclarado por el nombre propio siguiente. En español resulta más natural expresar directamente la relación con Gedalías.
- source_word: בַּמִּצְפָּה
  english_pob_choice: at Mizpah
  chosen_spanish: en Mizpa
  alternatives_spanish:
  - en Mizpá
  lexicon: HALOT
  rationale: Para un topónimo, "en" conserva la ubicación narrativa. Se mantiene la forma breve y reconocible del nombre propio en español bíblico.
- source_word: הַכַּשְׂדִּים
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los babilonios
  lexicon: HALOT
  rationale: El hebreo dice específicamente "caldeos". Aunque puede aludir a fuerzas babilónicas, se conserva el término del original para mantener la textura histórica y no nivelar la designación.
- source_word: נִמְצְאוּ שָׁם
  english_pob_choice: were found there
  chosen_spanish: se hallaban allí
  alternatives_spanish:
  - fueron hallados allí
  - estaban allí
  lexicon: HALOT
  rationale: El nifal de מצא implica más que mera ubicación; "se hallaban allí" reproduce el valor resultativo/pasivo sin sonar rígido en español. "Fueron hallados" sería demasiado literal y menos natural en esta narración.
- source_word: אַנְשֵׁי הַמִּלְחָמָה
  english_pob_choice: the men of war
  chosen_spanish: los hombres de guerra
  alternatives_spanish:
  - los combatientes
  - los soldados
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente "hombres de guerra". Se conserva esa fórmula para reflejar el giro idiomático del original, sin sustituirla por un término más interpretativo.
- source_word: הִכָּה
  english_pob_choice: struck down
  chosen_spanish: derribó
  alternatives_spanish:
  - hirió de muerte
  - abatió
  lexicon: HALOT
  rationale: El verbo en contexto narrativo indica un golpe letal. "Derribó" comunica la acción violenta y el desenlace implícito sin introducir una paráfrasis excesiva; "abatió" sería también posible, pero "derribó" es más directo en español.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios sustanciales; por tanto, esta versión conserva la alta coincidencia con el texto fuente y con la traducción inglesa auditada, ajustando solo la naturalidad del español y manteniendo las decisiones léxicas documentadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente directo.
  - Se conserva la distinción histórica «judeanos»/«judíos» mediante nota, siguiendo la intención del audit trail inglés.
  - «Caldeos» se retiene por fidelidad al hebreo, con alternativa «babilonios» en nota.
  - La frase verbal se formula en pasado narrativo simple y con orden natural en español, sin perder el paralelo de los dos objetos directos del hebreo.
