translation:
  language: es
  text: 'Y él dijo[a]: «Yo soy Dios, el Dios de tu padre. No tengas miedo de bajar a Egipto, porque allí haré de ti una gran nación».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No tengas miedo de bajar a Egipto». El hebreo usa el verbo «temer» con un infinitivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - El
  lexicon: HALOT
  rationale: Con el artículo, הָאֵל identifica al hablante como el Dios verdadero. En español, «Yo soy Dios» funciona de manera natural en discurso directo y conserva la fuerza identificatoria del hebreo; «el Dios» suena menos idiomático, y «El» trasladaría el título sin traducirlo.
- source_word: אֱלֹהֵי אָבִיךָ
  english_pob_choice: the God of your father
  chosen_spanish: el Dios de tu padre
  alternatives_spanish:
  - el Dios de tu padre, Jacob
  - el Dios de tus padres
  lexicon: HALOT
  rationale: La cadena constructa se refleja con claridad en «el Dios de tu padre». Mantiene el vínculo pactual inmediato con la línea ancestral de Jacob y evita ampliar el singular a «tus padres», algo que el hebreo no dice aquí.
- source_word: אַל תִּירָא
  english_pob_choice: Do not be afraid
  chosen_spanish: No tengas miedo
  alternatives_spanish:
  - No temas
  - No tengas temor
  lexicon: HALOT
  rationale: El hebreo es una prohibición contra el miedo. «No tengas miedo» expresa el sentido de forma natural en español moderno y preserva la carga afectiva de la exhortación; «No temas» sería más tradicional, pero algo más solemne.
- source_word: מֵרְדָה
  english_pob_choice: to go down
  chosen_spanish: bajar
  alternatives_spanish:
  - descender
  - ir a
  lexicon: HALOT
  rationale: En este contexto, el infinitivo con מִן tras una expresión de temor significa «temer hacer algo». Conservé el verbo direccional «bajar» porque refleja el hebreo y la idiomática bíblica de ir a Egipto como un movimiento hacia abajo.
- source_word: מִצְרַיְמָה
  english_pob_choice: to Egypt
  chosen_spanish: a Egipto
  alternatives_spanish:
  - hacia Egipto
  lexicon: HALOT
  rationale: El sufijo direccional indica movimiento hacia el destino. En español, «a Egipto» comunica con claridad la meta del movimiento sin sobrecargar la frase.
- source_word: לְגוֹי גָּדוֹל
  english_pob_choice: into a great nation
  chosen_spanish: en una nación grande
  alternatives_spanish:
  - en un gran pueblo
  - para una nación grande
  lexicon: HALOT
  rationale: 'Con שׂים + ל, el hebreo expresa resultado: Dios constituirá a Jacob como nación. En español, «te convertiré en una nación grande» transmite mejor ese cambio de estado que una traducción más literal como «te pondré para una gran nación».'
- source_word: אֲשִׂימְךָ
  english_pob_choice: I will make you
  chosen_spanish: te convertiré
  alternatives_spanish:
  - te haré
  - te pondré
  lexicon: HALOT
  rationale: Aunque שׂים suele ser «poner» o «colocar», aquí con לְגוֹי גָּדוֹל tiene valor resultativo. «Te convertiré» comunica bien la constitución de Jacob en una nación, respetando la función del verbo en esta construcción.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: El adverbio se refiere al lugar de cumplimiento de la promesa, Egipto. «Allí» es breve, natural y suficientemente preciso en español.
theological_decisions:
- issue: Autodesignación divina con artículo en הָאֵל
  english_pob_reading: I am God
  chosen_spanish_reading: Yo soy Dios
  alternative_spanish_readings:
  - Yo soy el Dios
  - Yo soy El
  rationale: La forma hebrea con artículo enfatiza la identidad del hablante como el Dios verdadero. «Yo soy Dios» reproduce bien esa autodeclaración sin introducir una ambigüedad innecesaria.
  doctrine_reference: Translation philosophy §1, §5
- issue: Promesa resultativa de hacer de Jacob una nación
  english_pob_reading: I will make you into a great nation
  chosen_spanish_reading: te convertiré en una nación grande
  alternative_spanish_readings:
  - te haré una nación grande
  - te pondré como una nación grande
  rationale: La combinación de שׂים con לְגוֹי expresa constitución/resulto, no mero traslado espacial. «Te convertiré en una nación grande» preserva esa tensión entre hacer y llegar a ser, sin perder naturalidad en español.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Coincide con el texto inglés POB de alta concordancia; no se aplicaron revisiones posteriores y no hay cambios pendientes según el historial de auditoría.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para הָאֵל según el criterio proyectual y la lectura auditada.
  - Se conservó el singular «tu padre» para reflejar el hebreo y el énfasis pactual inmediato.
  - Se usó «bajar» para preservar la idiomática bíblica del movimiento a Egipto.
  - Se eligió «te convertiré en una nación grande» como equivalente resultativo de שׂים + לְגוֹי גָּדוֹל.
  - La nota al pie se ancló en la frase de temor para reflejar la alternativa lexical documentada.
