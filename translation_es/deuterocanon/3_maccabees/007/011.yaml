translation:
  language: es
  text: declarando que nunca favorecerían ni a los que[a], por causa de su vientre, habían transgredido los mandamientos divinos[b], ni a los decretos del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «por apetito» o «por comida». El griego dice literalmente «por causa del vientre», un modismo para ceder al apetito corporal.
    reason: lexical_alternative
  - marker: b
    text: La redacción griega de la cláusula final es comprimida y también podría entenderse como referencia a quienes se alineaban con los decretos del rey, no solo a los decretos mismos.
    reason: alternative_reading
lexical_decisions:
- source_word: προφερόμενοι
  english_pob_choice: declaring
  chosen_spanish: declarando
  alternatives_spanish:
  - afirmando
  - exponiendo públicamente
  - manifestando
  lexicon: LSJ
  rationale: El participio introduce el contenido de lo que se estaba diciendo o proponiendo de manera pública y formal. «Declarando» conserva ese tono sin añadir una paráfrasis innecesaria.
- source_word: τοὺς γαστρὸς ἕνεκεν
  english_pob_choice: for the sake of their belly
  chosen_spanish: por causa de su vientre
  alternatives_spanish:
  - por apetito
  - por causa del apetito
  - por comida
  lexicon: LSJ
  rationale: La imagen concreta de «vientre» preserva el modismo griego y su carga moral. Se evita suavizarlo a «apetito» en el texto principal para no perder la metáfora corporal; la alternativa se reserva en nota.
- source_word: τὰ θεῖα παραβεβηκότας προστάγματα
  english_pob_choice: those who ... had transgressed the divine commandments
  chosen_spanish: habían transgredido los mandamientos divinos
  alternatives_spanish:
  - habían violado los mandamientos de Dios
  - habían sobrepasado los mandamientos divinos
  - habían quebrantado los mandamientos divinos
  lexicon: LSJ
  rationale: «Transgredido» refleja bien παραβεβηκότας como violación de un límite normativo. «Mandamientos divinos» traduce θεῖα προστάγματα con solemnidad y sin forzar una denominación eclesiástica ajena al griego.
- source_word: μηδέποτε εὐνοήσειν
  english_pob_choice: should never show favor
  chosen_spanish: nunca mostrarían favor
  alternatives_spanish:
  - nunca serían benevolentes
  - nunca dispensarían favor
  - nunca tendrían favor
  lexicon: LSJ
  rationale: «Mostrar favor» conserva el matiz de benevolencia/disposición favorable de εὐνοέω de forma natural en español. «Nunca» reproduce la fuerza absoluta de μηδέποτε.
- source_word: μηδὲ τοῖς τοῦ βασιλέως προστάγμασιν
  english_pob_choice: or to the king’s decrees
  chosen_spanish: ni a los decretos del rey
  alternatives_spanish:
  - ni a los mandatos del rey
  - ni a las ordenanzas del rey
  - ni a las disposiciones del rey
  lexicon: LSJ
  rationale: «Decretos» comunica bien el valor de προστάγματα en contexto real/legislativo y evita reducirlo a un simple mandato. Se mantiene la construcción paralela con el dativo, como en el griego y en el audit trail inglés.
theological_decisions:
- issue: Alcance del segundo dativo en μηδὲ τοῖς τοῦ βασιλέως προστάγμασιν
  english_pob_reading: 'The line is rendered as a second object of ''show favor'': they were to show favor neither to apostates nor to the king''s decrees.'
  chosen_spanish_reading: 'La frase se mantiene como segundo objeto paralelo de «mostrar favor»: no mostrarían favor ni a los transgresores de los mandamientos divinos ni a los decretos del rey.'
  alternative_spanish_readings:
  - ni a los que seguían los decretos del rey
  - ni a quienes apoyaban los decretos del rey
  - ni a obedecer los decretos del rey
  rationale: El griego transmitido es comprimido y algo forzado; el audit trail inglés ya señala esa tensión. En español conviene conservar la estructura paralela sin inventar un sujeto adicional. La traducción deja visible la rareza del texto antes que resolverla especulativamente.
  doctrine_reference: Preservar honestamente la incertidumbre textual y no añadir contenido no garantizado por el texto base.
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente, que indica que no hubo cambios adicionales necesarios. Se mantuvo la solución inglesa auditada, pero se ajustó a un español natural y a la vez transparente respecto de la tensión del griego transmitido.
  spanish_consistency_notes:
  - Se usa «mandamientos divinos» para θεῖα προστάγματα, coherente con el valor normativo de προστάγματα y sin sustituirlo por lenguaje eclesiástico no atestiguado.
  - Se conserva «vientre» en el texto principal para reflejar el modismo corporal del griego; la nota ofrece el equivalente funcional «apetito».
  - «Mostrar favor» traduce εὐνοήσειν con un giro idiomático claro en español y mantiene el paralelismo sintáctico del original.
