    text: Or 'the devious' or 'the crooked' for 'the twisted.'
    reason: lexical_alternative
  - marker: c
    text: Or 'is hastened' or 'is hurried away.' The sense is that their counsel is driven into premature, headlong failure.
    reason: lexical_alternative
