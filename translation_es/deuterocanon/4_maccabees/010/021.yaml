revisions:
- from: Pero Dios te perseguirá[a] pronto, porque estás cortando la lengua que entona los himnos divinos.
  to: Pero Dios te perseguirá[a] rápidamente, porque estás cortando la lengua que canta las melodías de himnos divinos.
  rationale: Se ajusta ταχέως a 'rápidamente' para reflejar mejor la rapidez de la acción divina, no solo su inmediatez temporal. Se amplía μελῳδόν a 'que canta las melodías' para conservar el matiz musical que el borrador había simplificado. La nota se armoniza con esos mismos ajustes, manteniendo la lógica del POB inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:38:46Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del griego: amenaza de retribución divina, adverbio de rapidez, y la mutilación de la lengua. Sin embargo, omite parte importante de μελῳδὸν al traducir solo ''entona los himnos divinos'', cuando el inglés auditado preserva ''that sings the melodies of divine hymns''. Además, ''pronto'' inclina más a tiempo que a modo, mientras ταχέως se refleja mejor como ''rápidamente'' o ''con rapidez''.'
  spanish_quality_summary: El español es claro y natural, pero puede afinarse para conservar mejor la viveza de la escena y el matiz musical. 'Estás cortando la lengua' suena algo incompleto para ἐκτέμνεις con objeto 'lengua'; 'le estás cortando la lengua' o 'le estás arrancando la lengua' sería más idiomático si se explicitara el poseedor, pero el sujeto implícito en contexto permite una solución directa. La principal mejora es hacer explícita la idea de melodía/canto de μελῳδόν.
  glossary_alignment: No hay conflictos relevantes con la terminología base del proyecto. 'Dios' es correcto para ὁ θεός. No intervienen términos sensibles como Yahvé, Mesías, esclavo, etc. La nota alternativa refleja adecuadamente la decisión inglesa, aunque conviene ajustar 'pronto' a 'rápidamente' también allí.
  issues:
  - severity: medium
    issue: ταχέως traducido como 'pronto'
    rationale: El adverbio en contexto modifica la manera/rapidez de la acción divina. 'Pronto' en español puede leerse primariamente como temporal ('dentro de poco'), mientras la auditoría inglesa prefirió 'swiftly' precisamente para no reducirlo a temporalidad.
  - severity: medium
    issue: μελῳδὸν reducido a 'que entona los himnos divinos'
    rationale: El griego añade matiz musical/melódico a 'lengua'. El inglés preserva 'sings the melodies of divine hymns'. El borrador español pierde 'melodías' y por tanto parte de la fuerza poética del original.
  - severity: low
    issue: La nota al pie repite 'pronto' en alternativas
    rationale: Para coherencia con la mejora de ταχέως, las alternativas también deberían usar 'rápidamente' o una formulación equivalente.
  revised_spanish_text: Pero Dios te perseguirá[a] rápidamente, porque estás cortando la lengua que canta las melodías de himnos divinos.
  revised_footnotes:
  - marker: a
    text: 'O: «Dios te castigará rápidamente» / «Dios vendrá tras de ti rápidamente». El verbo griego puede expresar perseguir o ir tras alguien; en este contexto, implica juicio divino.'
    reason: alternative_reading
  revision_rationale: Se ajusta ταχέως a 'rápidamente' para reflejar mejor la rapidez de la acción divina, no solo su inmediatez temporal. Se amplía μελῳδόν a 'que canta las melodías' para conservar el matiz musical que el borrador había simplificado. La nota se armoniza con esos mismos ajustes, manteniendo la lógica del POB inglés.
