revisions:
- from: 'Y los hijos de Mica: Pitón[a], Melec, Tarea y Ahaz.'
  to: 'Y los hijos de Mica: Pitón[a], Melec, Tarea y Acaz.'
  rationale: Se mantiene la estructura y casi toda la onomástica del borrador, pero se corrige 'Ahaz' a 'Acaz' para ajustarlo al uso bíblico español natural y evitar una transliteración innecesariamente inglesa. Se conserva la nota sobre 'Tahrea' porque refleja una alternativa documentada en la auditoría inglesa. No se requieren cambios doctrinales ni notas adicionales.
