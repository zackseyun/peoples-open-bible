base_translation:
  language: en
  yaml_path: translation/ot/esther/005/002.yaml
  text: And when the king saw Esther the queen standing in the court[a], she found favor in his sight, and the king extended to Esther the golden scepter that was in his hand[c][b]. Then Esther came near and touched the top of the scepter.
  footnotes:
  - marker: a
    text: Or 'courtyard' for 'court.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'she bore/carried favor in his eyes,' an idiom meaning she received his favorable regard.
    reason: lexical_alternative
  - marker: c
    text: 'Or ''touched the tip of the scepter.'' Hebrew: ''the head of the scepter.'''
    reason: lexical_alternative
