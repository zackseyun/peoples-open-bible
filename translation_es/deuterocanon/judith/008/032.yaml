revisions:
- from: 'Y Judit les dijo[a]: «Escúchenme[b][c], y yo haré una obra[d] que llegará hasta generaciones de generaciones entre los hijos de nuestro pueblo».'
  to: 'Y Judit les dijo: «Escúchenme[a], y yo haré una acción[b] que llegará hasta generaciones de generaciones entre los hijos de nuestro pueblo[c]».'
  rationale: Se corrigen las notas para que reflejen fielmente el griego y no repitan información; se elimina la nota errónea sobre 'les dijo'; se sustituye 'obra' por 'acción' para representar mejor πρᾶγμα en español natural; y se conserva la literalidad significativa de 'generaciones de generaciones' y 'los hijos de nuestro pueblo' con una nota donde aporta claridad.
