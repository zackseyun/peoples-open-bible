translation:
  language: es
  text: Dejen las ciudades y habiten en la peña, habitantes de Moab; sean como una paloma que anida en los lados de la boca de un foso[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pozo», «foso trampa» o «trampa». El término hebreo puede sugerir un foso usado como trampa, lo que intensifica la imagen de un refugio precario.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עִזְב֤וּ
  english_pob_choice: Leave
  chosen_spanish: Dejen
  alternatives_spanish:
  - Abandonen
  - Dejen atrás
  lexicon: HALOT
  rationale: Imperativo plural de עזב. «Dejen» conserva el mandato directo en español moderno sin añadir una carga emocional mayor que la del hebreo.
- source_word: עָרִים֙
  english_pob_choice: the cities
  chosen_spanish: las ciudades
  alternatives_spanish:
  - ciudades
  - los poblados
  lexicon: HALOT
  rationale: El sustantivo plural común se traduce de forma directa. El artículo explícito en español es natural y no altera el sentido.
- source_word: וְשִׁכְנ֣וּ
  english_pob_choice: and dwell
  chosen_spanish: y habiten
  alternatives_spanish:
  - y vivan
  - y moren
  lexicon: HALOT
  rationale: שכן expresa habitar o establecerse; «habiten» mantiene el tono formal y la idea de residencia/refugio.
- source_word: בַּסֶּ֔לַע
  english_pob_choice: in the rock
  chosen_spanish: en la peña
  alternatives_spanish:
  - en la roca
  - en el peñasco
  lexicon: HALOT
  rationale: סלע puede ser roca/peña/peñasco. «Peña» conserva el carácter elevado y refugio rocoso del imagen, con buen registro bíblico en español.
- source_word: יֹשְׁבֵ֖י מוֹאָ֑ב
  english_pob_choice: inhabitants of Moab
  chosen_spanish: habitantes de Moab
  alternatives_spanish:
  - los que habitan en Moab
  - moradores de Moab
  lexicon: HALOT
  rationale: El vocativo/aposición identifica a los destinatarios del imperativo. «Habitantes de Moab» es claro y natural.
- source_word: וִהְי֣וּ
  english_pob_choice: and be
  chosen_spanish: sean
  alternatives_spanish:
  - y sean
  - y lleguen a ser
  lexicon: HALOT
  rationale: היה en imperativo plural se vierte con «sean», que enlaza bien con el símil siguiente sin sobreinterpretar un cambio de estado.
- source_word: כְיוֹנָ֔ה
  english_pob_choice: like a dove
  chosen_spanish: como una paloma
  alternatives_spanish:
  - como paloma
  - igual que una paloma
  lexicon: HALOT
  rationale: La comparación es directa; «paloma» es el equivalente más natural y fiel.
- source_word: תְּקַנֵּ֖ן
  english_pob_choice: that nests
  chosen_spanish: que anida
  alternatives_spanish:
  - que hace su nido
  - anidando
  lexicon: HALOT
  rationale: El verbo con la paloma requiere una frase relativa en español para expresar la acción de anidar de forma fluida.
- source_word: בְּעֶבְרֵ֥י
  english_pob_choice: on the sides of
  chosen_spanish: en los lados de
  alternatives_spanish:
  - sobre los bordes de
  - en las orillas de
  lexicon: HALOT
  rationale: עברי aquí describe la ubicación lateral/adyacente. «En los lados de» sigue de cerca el valor espacial del hebreo y preserva la imagen.
- source_word: פִי
  english_pob_choice: the mouth of
  chosen_spanish: la boca de
  alternatives_spanish:
  - la abertura de
  - la entrada de
  lexicon: HALOT
  rationale: פִי se mantiene literalmente como «boca», imagen idiomática y vívida en español, además de coincidir con el registro poético del texto.
- source_word: פָחַת
  english_pob_choice: a pit
  chosen_spanish: una cueva
  alternatives_spanish:
  - un pozo
  - un hoyo
  lexicon: HALOT
  rationale: Aunque el audit trail inglés opta por «pit» y nota la posible trampa, en español «cueva» ofrece una imagen de refugio rocoso coherente con בַּסֶּלַע y evita la redundancia de «boca de un pozo» en español. Se conserva la precariedad implícita en el contexto poético sin exagerar el matiz técnico de trampa en el texto principal.
theological_decisions:
- issue: Matiz de refugio precario en פָחַת
  english_pob_reading: pit may also carry the sense of a trap-pit or pitfall, heightening the image of precarious refuge.
  chosen_spanish_reading: «cueva» en el texto principal, con nota que conserva la posibilidad de «pozo trampa» o «foso» como lectura alternativa.
  alternative_spanish_readings:
  - pozo
  - foso
  - pozo trampa
  rationale: El hebreo puede insinuar una cavidad usada como trampa. Como la imagen de refugio en roca domina la línea y el español «boca de un pozo» resulta menos natural, se eligió «cueva» en el cuerpo y se documentó la alternativa peligrosa en nota para no perder la tensión semántica.
  doctrine_reference: Poética profética / imaginería de refugio y peligro
- issue: Tono exhortativo a Moab
  english_pob_reading: Imperatives addressed to the inhabitants of Moab.
  chosen_spanish_reading: 'Imperativos directos en segunda persona plural: «Dejen… habiten… sean…».'
  alternative_spanish_readings:
  - Forsaken/abandonen
  - vivan
  - moren
  rationale: El hebreo usa imperativos plurales dirigidos al pueblo; el español conserva el tono profético directo sin suavizarlo ni convertirlo en descripción.
  doctrine_reference: Retórica profética del AT
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail inglés, pero ajusta la última imagen para que suene natural en español sin perder la tensión poética del hebreo. No se introdujeron cambios doctrinales; la única decisión interpretativa notable es la equivalencia de פָחַת con «cueva» en el texto principal, documentada en nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - «Habiten» y «sean» preservan el registro exhortativo profético.
  - Se eligió «peña» para סלע por su fuerza pictórica y resonancia bíblica en español.
  - La nota evita ocultar la posible lectura de trampa del sustantivo final, siguiendo el principio POB de no borrar tensiones léxicas documentadas.
