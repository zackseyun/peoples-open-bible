translation:
  language: es
  text: Yo era intachable delante de él[a][b][c], y me guardé de mi iniquidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Intachable’ aquí significa íntegro o irreprensible en conducta, no necesariamente sin pecado en sentido absoluto.
    reason: lexical_alternative
  - marker: b
    text: El pronombre ‘él’ se refiere a Yahvé en el contexto inmediato.
    reason: cross_reference
  - marker: c
    text: También puede entenderse como ‘de mi culpa’ o ‘de mi pecado’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֱהִי
  english_pob_choice: I was
  chosen_spanish: Yo era
  alternatives_spanish:
  - yo fui
  - yo llegué a ser
  lexicon: HALOT
  rationale: El imperfecto narrativo se expresa naturalmente en español con un pretérito imperfecto aquí. 'Yo era' conserva el estado continuo o habitual sin forzar una lectura de cambio de estado.
- source_word: תָמִים
  english_pob_choice: blameless
  chosen_spanish: intachable
  alternatives_spanish:
  - íntegro
  - irreprensible
  - sin mancha
  lexicon: HALOT
  rationale: '''תָמִים'' en contexto moral apunta a integridad o rectitud de conducta, no a perfección sin pecado. ''Intachable'' comunica bien esa integridad moral en español moderno y mantiene la fuerza evaluativa.'
- source_word: עִמּוֹ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - en su presencia
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'con él', el contexto favorece una relación de comparecencia o posición ante Yahvé. 'Delante de él' refleja la decisión inglesa final 'before him' sin ocultar el referente pronominal.
- source_word: וָאֶשְׁתַּמֵּר
  english_pob_choice: I kept myself
  chosen_spanish: me guardé
  alternatives_spanish:
  - me vigilé
  - me preservé
  - me mantuve alerta
  lexicon: HALOT
  rationale: El hitpael de שמר es reflexivo. 'Me guardé' conserva la idea de autocuidado o autocustodia de manera idiomática en español y evita suavizar el verbo a un mero estado interior.
- source_word: מֵעֲוֺנִי
  english_pob_choice: from my iniquity
  chosen_spanish: de mi iniquidad
  alternatives_spanish:
  - de mi culpa
  - de mi pecado
  lexicon: HALOT
  rationale: '''עָוֹן'' puede abarcar iniquidad, culpa o pecado. Se mantiene ''iniquidad'' por su peso moral tradicional y por la correspondencia con la elección inglesa, preservando la amplitud semántica del término.'
theological_decisions:
- issue: Alcance de 'intachable' en relación con la condición moral humana
  english_pob_reading: '''Blameless'' denotes integrity/covenant faithfulness, not absolute sinlessness.'
  chosen_spanish_reading: '''Intachable'' denota integridad y fidelidad moral, no impecabilidad absoluta.'
  alternative_spanish_readings:
  - sin pecado
  - perfecto moralmente
  rationale: La línea poética afirma integridad ante Dios, no una tesis de perfección sin pecado. La traducción conserva esa tensión teológica en vez de resolverla hacia una impecabilidad que el hebreo no exige.
  doctrine_reference: Preservar la tensión teológica; no importar una doctrina de perfeccionismo que el texto no declara.
- issue: Referencia del pronombre 'él'
  english_pob_reading: The pronoun 'him' refers to the LORD in the surrounding context.
  chosen_spanish_reading: El pronombre 'él' se refiere a Yahvé en el contexto inmediato.
  alternative_spanish_readings:
  - a él
  - ante ti
  rationale: Se mantiene el pronombre porque el hebreo lo hace y porque el contexto identifica claramente al referente divino. Nombrar a Yahvé explícitamente en una nota evita oscurecer la referencia sin alterar la forma del verso.
  doctrine_reference: Referente contextual del nombre divino; coherencia con la política de traducir יהוה como Yahvé.
translation_notes:
  revision_awareness: La versión inglesa pasó de 'with him' a 'before him' para ajustar עִמּוֹ al valor contextual de comparecencia ante el Señor. La redacción española adopta esa misma lectura con 'delante de él', manteniendo el paralelismo poético y la referencia pronominal. Se conserva además la amplitud semántica de תָמִים y עָוֹן, sin suavizar la tensión moral del versículo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo en la nota de referencia contextual, no en el cuerpo del versículo, porque el hebreo aquí conserva el pronombre.
  - '''Intachable'' se emplea como equivalente contextual de ''blameless'', no como sinónimo de perfección sin pecado.'
  - '''Me guardé'' reproduce el matiz reflexivo de auto-vigilancia del hitpael.'
  - '''Iniquidad'' mantiene el peso moral de עון y enlaza con la terminología auditada del proyecto.'
