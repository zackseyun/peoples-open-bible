translation:
  language: es
  text: 'Dije: «Guardaré mis caminos para no pecar con mi lengua; pondré un bozal a mi boca mientras el malvado[a] está delante de mí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el impío» o «un malvado». El hebreo está en masculino singular.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָמַרְתִּי
  english_pob_choice: I said
  chosen_spanish: Dije
  alternatives_spanish:
  - Pensé
  - Resolvía
  lexicon: HALOT
  rationale: El perfecto qal en 1cs introduce una resolución ya formulada del salmista. «Dije» sigue de cerca la forma verbal y mantiene la sencillez del planteamiento; «resolví» explicita más la intención, pero es más interpretativo.
- source_word: אֶשְׁמְרָה
  english_pob_choice: I will guard
  chosen_spanish: Guardaré
  alternatives_spanish:
  - Velaré
  - Guardaré cuidadosamente
  lexicon: HALOT
  rationale: La forma cohortativa/imperfectiva expresa determinación. «Guardaré» conserva el valor de vigilancia y disciplina interior sin añadir demasiado.
- source_word: דְרָכַי
  english_pob_choice: my ways
  chosen_spanish: mis caminos
  alternatives_spanish:
  - mi conducta
  - mi proceder
  lexicon: HALOT
  rationale: El plural de דרך suele referirse al modo de vivir o conducta. «Mis caminos» reproduce el hebraísmo de manera natural en español y mantiene la imagen.
- source_word: מֵחֲטוֹא
  english_pob_choice: from sinning
  chosen_spanish: para no pecar
  alternatives_spanish:
  - de pecar
  - a fin de no pecar
  lexicon: HALOT
  rationale: La construcción con מן + infinitivo expresa evitación/preventivo. En español, «para no pecar» comunica con naturalidad la finalidad de la vigilancia sin perder el sentido de prevención.
- source_word: בִּלְשׁוֹנִי
  english_pob_choice: with my tongue
  chosen_spanish: con mi lengua
  alternatives_spanish:
  - con mi lengua
  - por mi lengua
  lexicon: HALOT
  rationale: El valor instrumental de ב apunta al medio por el que se podría pecar. «Con mi lengua» es literal y claro en español; se prefiere «lengua» porque mantiene el paralelismo habitual con el habla.
- source_word: לְפִי
  english_pob_choice: for my mouth
  chosen_spanish: a mi boca
  alternatives_spanish:
  - sobre mi boca
  - para mi boca
  lexicon: HALOT
  rationale: La preposición con boca/mouth introduce el elemento sobre el que actúa la restricción. En español, «a mi boca» funciona mejor con la imagen concreta del bozal que «para mi boca».
- source_word: מַחְסוֹם
  english_pob_choice: a muzzle
  chosen_spanish: un bozal
  alternatives_spanish:
  - una mordaza
  - un freno
  lexicon: HALOT
  rationale: El sustantivo designa un dispositivo de restricción concreto. «Bozal» reproduce la imagen física del original con claridad; «mordaza» o «freno» tienden a desplazar la metáfora hacia otro campo.
- source_word: בְּעוֹד
  english_pob_choice: while
  chosen_spanish: mientras
  alternatives_spanish:
  - cuando
  - en tanto que
  lexicon: HALOT
  rationale: La partícula marca simultaneidad. «Mientras» es la correspondencia más natural y precisa en español.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el malvado
  alternatives_spanish:
  - el impío
  - el perverso
  lexicon: HALOT
  rationale: El adjetivo sustantivado masculino singular puede referirse a «el malvado». Se evita introducir «hombre» porque el ajuste inglés revisado también retiró esa palabra; «el malvado» preserva el singular y la carga moral.
- source_word: לְנֶגְדִּי
  english_pob_choice: is before me
  chosen_spanish: está delante de mí
  alternatives_spanish:
  - está frente a mí
  - está en mi presencia
  lexicon: HALOT
  rationale: La expresión indica presencia o posición frontal. «Está delante de mí» es transparente en español y conserva la idea de alguien puesto ante el hablante.
theological_decisions:
- issue: Tratamiento de רָשָׁע como singular sustantivado
  english_pob_reading: the wicked
  chosen_spanish_reading: el malvado
  alternative_spanish_readings:
  - el impío
  - los malvados
  rationale: El hebreo usa un singular masculino sustantivado. En español, mantener el singular evita diluir la forma del texto; no se añade pluralización ni una lectura genérica no requerida por el hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Imagen concreta de restricción en la boca
  english_pob_reading: I will keep a muzzle for my mouth
  chosen_spanish_reading: pondré un bozal a mi boca
  alternative_spanish_readings:
  - pondré una mordaza a mi boca
  - pondré un freno a mi boca
  rationale: El hebreo usa un objeto concreto de contención. «Bozal» preserva la materialidad de la metáfora y evita suavizarla con un término más abstracto.
  doctrine_reference: DOCTRINE.md Translation philosophy §2 (Concrete imagery retained where warranted)
- issue: Relación de לְפִי con el objeto de restricción
  english_pob_reading: for my mouth
  chosen_spanish_reading: a mi boca
  alternative_spanish_readings:
  - sobre mi boca
  - para mi boca
  rationale: La construcción hebrea describe el destino o aplicación del bozal. «A mi boca» mantiene la imagen de colocación sin forzar una equivalencia idiomática menos natural.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 (Source-driven equivalence)
translation_notes:
  revision_awareness: La versión inglesa fue revisada para cambiar «the wicked man» por «the wicked», sin añadir «man». La redacción española sigue esa revisión con un singular sustantivado («el malvado») y evita introducir un equivalente de «hombre».
  spanish_consistency_notes:
  - 'Se mantiene la imagen corporal y concreta del original: lengua, boca y bozal.'
  - Se usa «Yahvé» por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - «Guardaré» y «pondré» reflejan resoluciones voluntarias en primera persona singular.
  - La puntuación reproduce el discurso directo con dos miembros coordinados por punto y coma.
