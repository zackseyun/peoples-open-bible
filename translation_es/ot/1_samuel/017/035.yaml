- from: Salí tras él, lo golpeé y lo rescaté de su boca[a]; y cuando se levantó contra mí[b], lo sujeté por la barba, lo golpeé y lo maté.
  to: Salí tras él, lo golpeé y la rescaté de su boca[a]; y cuando se levantó contra mí, lo sujeté por la barba[b], lo golpeé y lo maté.
  rationale: Se ajusta el pronombre de «rescaté» para reflejar el objeto implícito contextual (la oveja/cordero) y evitar una lectura errónea en español. Se recoloca la nota sobre «barba» en el sintagma pertinente. El resto del versículo se mantiene porque representa bien la secuencia y las decisiones léxicas del texto fuente y de la auditoría inglesa.
