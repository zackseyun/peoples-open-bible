    issue: Falta la nota léxica sobre 'tu hijo' / 'el hijo de tu hijo'
    rationale: 'El POB inglés conserva una nota significativa: el hebreo nombra explícitamente generaciones sucesivas. Al usar español principal sin nota, se pierde una decisión auditada relevante.'
  - severity: low
    issue: '''también el hijo de tu hijo'' resulta poco natural en español principal'
    rationale: Aunque es muy literal, en español general suena forzado. 'Tu nieto' comunica mejor el sentido, y la literalidad explícita puede mantenerse en nota sin pérdida de información.
