translation:
  language: es
  text: Isaac había venido de Beer-lahai-roi[a][b], y habitaba en la tierra del Neguev.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Isaac vino de Beer-lahai-roi». La construcción hebrea también puede traducirse más simplemente con pasado simple en vez de pluscuamperfecto.'
    reason: lexical_alternative
  - marker: b
    text: Beer-lahai-roi es un nombre de lugar previamente asociado con Agar (véase Gn 16:14).
    reason: cross_reference
lexical_decisions:
- source_word: בָּא
  english_pob_choice: had come
  chosen_spanish: había venido
  alternatives_spanish:
  - vino
  - había llegado
  lexicon: HALOT
  rationale: El perfecto qal de בוא expresa una acción completada; en español, el pretérito pluscuamperfecto (“había venido”) reproduce bien el valor discursivo que el POB inglés marca con past perfect.
- source_word: מִ/בּוֹא
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - desde
  - procedente de
  lexicon: HALOT
  rationale: La construcción preposicional indica origen o procedencia. En español, “de” es la forma más natural y fiel para expresar ese movimiento de procedencia sin sobrecargar el texto.
- source_word: בְּאֵר לַחַי רֹאִי
  english_pob_choice: Beer-lahai-roi
  chosen_spanish: Beer-lajai-roí
  alternatives_spanish:
  - Beer-lahai-roí
  - Beer Lahai Roi
  lexicon: HALOT
  rationale: Es un nombre propio de lugar y debe transliterarse, no traducirse. Se conserva la forma compuesta con guiones para reflejar la unidad del topónimo hebreo y se adapta la transliteración al español.
- source_word: יוֹשֵׁב
  english_pob_choice: was dwelling
  chosen_spanish: estaba habitando
  alternatives_spanish:
  - habitaba
  - vivía
  - moraba
  lexicon: HALOT
  rationale: El participio expresa una acción o estado durativo. “Estaba habitando” conserva ese aspecto progresivo sin perder claridad en español; “habitaba” también sería posible, pero aquí se mantiene el paralelismo con el inglés auditado.
- source_word: בְּאֶרֶץ הַנֶּגֶב
  english_pob_choice: in the land of the Negev
  chosen_spanish: en la tierra del Neguev
  alternatives_spanish:
  - en la región del Neguev
  - en la tierra del Négueb
  - en el Neguev
  lexicon: HALOT
  rationale: נֶגֶב funciona aquí como designación geográfica. “Tierra del Neguev” conserva tanto el sustantivo הארץ como el nombre regional, siguiendo la decisión del POB de mantener la referencia geográfica explícita.
- source_word: וְהוּא
  english_pob_choice: and he
  chosen_spanish: y
  alternatives_spanish:
  - y él
  - ahora él
  lexicon: HALOT
  rationale: El pronombre explícito en hebreo enlaza la cláusula con la anterior, pero en español puede quedar implícito sin pérdida de sentido. Se evita la repetición innecesaria de “él” para lograr una lectura más natural.
translation_notes:
  revision_awareness: El texto inglés auditado ya había resuelto la ambigüedad del verbo בָּא con pluscuamperfecto y había marcado una nota alternativa para un pasado simple; mantengo esa decisión en español. También preservo el topónimo como nombre propio transliterado y la progresión durativa de יוֹשֵׁב, sin introducir cambios respecto del acuerdo alto del control cruzado.
  spanish_consistency_notes:
  - Se mantiene el nombre divino fuera de este versículo, por lo que no hay decisión adicional sobre Yahvé.
  - Se translitera Beer-lahai-roi con adaptación gráfica al español y se conserva la función de topónimo.
  - La cadencia narrativa en español sigue la relación temporal del inglés auditado sin añadir conectores no presentes en el hebreo.
