translation:
  language: es
  text: No busques hacerte gobernante si no tienes fuerza para poner fin a la insolencia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice: «No te justifiques delante del Señor, y delante de un rey no te hagas sabio», una forma sustancialmente distinta del verso.'
    reason: textual_variant
lexical_decisions:
- source_word: אַל תְּבַקֵּשׁ
  english_pob_choice: Do not seek
  chosen_spanish: No busques
  alternatives_spanish:
  - No desees
  - No te esfuerces por
  lexicon: HALOT
  rationale: בקשה con prohibición expresa una idea de buscar o aspirar; «no busques» es natural en español y conserva el matiz de aspiración sin intensificarlo indebidamente.
- source_word: לִהְיוֹת מוֹשֵׁל
  english_pob_choice: to become a ruler
  chosen_spanish: hacerte gobernante
  alternatives_spanish:
  - ser gobernante
  - llegar a gobernar
  - ser un gobernante
  lexicon: HALOT
  rationale: La construcción con infinitivo de להיות más מושל expresa aspiración a asumir esa posición; «hacerte gobernante» reproduce bien el componente de llegar a ocupar el cargo, evitando un verbo demasiado abstracto.
- source_word: חַיִל
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - capacidad
  - recursos
  - poder
  lexicon: HALOT
  rationale: En este contexto sapiencial el término apunta a capacidad práctica para gobernar y contener el desorden; «fuerza» mantiene amplitud semántica y funciona de manera clara en español.
- source_word: לְהַשְׁבִּית
  english_pob_choice: to put an end to
  chosen_spanish: poner fin a
  alternatives_spanish:
  - hacer cesar
  - terminar con
  - acabar con
  lexicon: HALOT
  rationale: El hifil de שבת indica causar que algo cese; «poner fin a» es una equivalencia idiomática fiel y comprensible.
- source_word: זָדוֹן
  english_pob_choice: insolence
  chosen_spanish: la insolencia
  alternatives_spanish:
  - la arrogancia
  - la presunción
  - la maldad
  lexicon: HALOT
  rationale: זדון puede abarcar soberbia presuntuosa y conducta insolente; «insolencia» conserva el matiz social de arrogancia ofensiva y la fuerza moral del término.
theological_decisions:
- issue: Divergencia textual entre hebreo y griego en Sirácides 7:5
  english_pob_reading: Main text follows Hebrew; Greek is preserved in a footnote as a substantially different form.
  chosen_spanish_reading: El texto principal sigue el hebreo transmitido; la lectura griega se registra en nota como forma sustancialmente distinta.
  alternative_spanish_readings:
  - «No te justifiques delante del Señor, y delante de un rey no te hagas sabio»
  - «No busques hacerte gobernante…» con la forma griega como texto base
  rationale: En Sirácides, el proyecto prioriza el hebreo donde se conserva, y la tradición griega se documenta para transparencia. Dado que el griego refleja una formulación muy distinta, se mantiene como nota textual y no como base del texto principal.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirácides desde el hebreo donde sobrevive; usar el paralelo griego como control y nota textual'
translation_notes:
  revision_awareness: Se tuvo en cuenta el último pase de revisión, que indicó que no hacía falta cambiar nada; por eso se conservó el sentido del hebreo y solo se explicitó en nota la divergencia griega.
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando el nombre divino aparece explícitamente; aquí el hebreo carece del Tetragrámaton y la lectura griega con Κυρίου se documenta solo en la nota textual.
  - Se prefirió «gobernante» frente a «rey» porque מוֹשֵׁל es un término más general de gobierno; la nota recoge la alternativa griega con «rey».
  - «Ira»/«maldad» no se introdujeron porque el hebreo concreto habla de זָדוֹן, es decir, insolencia o arrogancia presuntuosa.
