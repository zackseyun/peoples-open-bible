    issue: Sintaxis poco natural en 'Tú lo sabes, oh Dios, que aunque me es posible ser salvo'
    rationale: 'Tras ''Tú lo sabes, oh Dios'', el español fluye mejor con una subordinada infinitiva más natural: ''aunque me es posible salvarme''. Esto preserva la concesión de παρὸν μοι σῴζεσθαι sin rigidez innecesaria.'
  - severity: medium
    issue: La nota [b] altera la alternativa documentada
    rationale: El inglés auditado ofrece como alternativa 'for the sake of the law', no 'por fidelidad a la ley' como primera alternativa. 'Por fidelidad a la ley' es interpretación explicativa válida en la razón, pero no debería reemplazar la alternativa formal más cercana en la nota.
  - severity: low
    issue: '''Muero'' atenúa la inmediatez aspectual de ἀποθνῄσκω'
    rationale: El presente simple español es posible, pero 'estoy muriendo' reproduce mejor el valor vívido y progresivo que el POB inglés explicitó con 'I am dying'.
