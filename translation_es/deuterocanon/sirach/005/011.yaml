translation:
  language: es
  text: Porque de repente saldrá su ira, y en el tiempo de la venganza serás arrastrado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego de este versículo dice de manera muy distinta: «Sé pronto para oír, y con paciencia expresa una respuesta». La línea principal sigue el testimonio hebreo conservado, donde la formulación difiere considerablemente de la tradición griega.'
    reason: textual_variant
lexical_decisions:
- source_word: פִתְאֹם / γίνου ταχὺς
  english_pob_choice: suddenly / be swift
  chosen_spanish: de repente
  alternatives_spanish:
  - repentinamente
  - súbitamente
  lexicon: HALOT; LXX parallel
  rationale: El hebreo de Kahana exige el adverbio de sorpresa e inmediatez; el paralelo griego va en otra dirección, pero aquí la elección española sigue el hebreo atestiguado en el texto principal, con un adverbio natural en español que conserva la abrupta irrupción del juicio.
- source_word: יֵצֵא
  english_pob_choice: will come forth
  chosen_spanish: saldrá
  alternatives_spanish:
  - saldrá afuera
  - vendrá a salir
  lexicon: HALOT
  rationale: '''Salir'' reproduce el movimiento literal del verbo sin sobrecargarlo. ''Saldrá'' mantiene la imagen de algo que emerge o se desencadena.'
- source_word: זַעְמוֹ
  english_pob_choice: his wrath
  chosen_spanish: su ira
  alternatives_spanish:
  - su furor
  - su enojo
  lexicon: HALOT
  rationale: '''Ira'' es el equivalente más natural y fuerte en español para זעם. ''Furor'' sería más intenso, pero menos estable en registro bíblico; ''enojo'' es demasiado débil.'
- source_word: וּבְעֵת / נָקָם
  english_pob_choice: and at the time of vengeance
  chosen_spanish: y en el tiempo de la venganza
  alternatives_spanish:
  - y al tiempo de la venganza
  - y cuando llegue la venganza
  lexicon: HALOT
  rationale: La frase conserva la construcción temporal formal del hebreo. 'Venganza' preserva el peso retributivo del término sin suavizarlo hacia 'castigo'.
- source_word: תִּסָּפֶה
  english_pob_choice: you will be swept away
  chosen_spanish: serás barrido
  alternatives_spanish:
  - serás arrebatado
  - perecerás
  - serás destruido
  lexicon: HALOT
  rationale: '''Serás barrido'' conserva la imagen pasiva de arrastre/eliminación del verbo hebreo, sin explicitar más de lo que el texto dice. En español suena natural y mantiene la violencia imagística.'
theological_decisions:
- issue: Referente implícito de 'su ira'
  english_pob_reading: The referent is God/the Lord implied by the surrounding warning context, but the translation keeps the pronoun rather than inserting an explicit divine name.
  chosen_spanish_reading: La traducción mantiene 'su ira' sin añadir 'de Dios' ni 'del Señor'.
  alternative_spanish_readings:
  - la ira de Dios
  - la ira del Señor
  rationale: El texto hebreo no nombra explícitamente al referente del sufijo; añadirlo resolvería una tensión que el POB inglés conserva. Mantener el pronombre respeta la economía del original y deja que el contexto sapiencial determine el referente.
  doctrine_reference: Preserve theological tension rather than resolve it; avoid over-explicit doctrinal additions not present in the source.
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo principal de Kahana, que difiere de forma importante del paralelo griego; el texto español refleja esa elección y conserva la diferencia textual señalada en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico sobrio y claro, evitando el calco del griego donde el hebreo ofrece otra lectura.
  - '''Ira'' y ''venganza'' conservan la fuerza semántica del hebreo sin suavizar el juicio.'
  - La nota al pie señala la variante textual griega con una formulación equivalente a la nota auditada en inglés.
