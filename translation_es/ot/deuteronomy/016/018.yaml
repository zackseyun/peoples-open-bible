    text: O ‘dentro de todas tus ciudades’; literalmente, ‘en todas tus puertas’, refiriéndose a las áreas de la puerta que funcionaban como centros cívicos y judiciales.
    reason: cultural_note
  - marker: b
    text: O ‘con un juicio de justicia’ o ‘con juicio recto’.
    reason: lexical_alternative
  revision_rationale: 'Se revisa el texto para mejorar la fidelidad idiomática al hebreo y la legibilidad en español: ''nombrarás'' expresa mejor la designación oficial; ''funcionarios'' representa de manera más natural el papel administrativo de שֹׁטְרִים; y ''con juicio justo'' traduce מִשְׁפַּט צֶדֶק de forma clara y fiel, mientras la nota conserva alternativas más literales. Se mantiene ''Yahvé'' conforme a la política terminológica del proyecto y se conserva la imagen literal de ''puertas'' con nota cultural.'
