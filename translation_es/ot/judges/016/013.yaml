translation:
  language: es
  text: 'Entonces Dalila dijo a Sansón: «Hasta ahora te has burlado de mí y me has dicho mentiras. Dime con qué podrías ser atado». Y él le dijo: «Si tejieras las siete trenzas de mi cabello con el tejido[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con el telar», o «en la trama tejida». El término hebreo es algo especializado en el contexto del tejido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵתַ֤לְתָּ בִּי
  english_pob_choice: you have mocked me
  chosen_spanish: me has estado burlando
  alternatives_spanish:
  - me has estado mofando
  - me has estado engañando
  lexicon: HALOT
  rationale: El verbo expresa tratar a alguien con burla o juego engañoso; «burlando» comunica bien esa fuerza en español y mantiene el matiz relacional del contexto.
- source_word: כְּזָבִים
  english_pob_choice: lies
  chosen_spanish: mentiras
  alternatives_spanish:
  - falsedades
  - engaños
  lexicon: HALOT
  rationale: Es el plural directo para afirmaciones falsas; «mentiras» es la equivalencia natural y clara en español moderno.
- source_word: הַגִּידָה לִּי
  english_pob_choice: Tell me
  chosen_spanish: Dime
  alternatives_spanish:
  - Declárame
  - Hazme saber
  lexicon: HALOT
  rationale: El imperativo de נגד suele significar decir o declarar; «Dime» conserva la sencillez y la naturalidad del hebreo.
- source_word: בַּמֶּה תֵּאָסֵר
  english_pob_choice: what you may be bound with
  chosen_spanish: con qué podrías ser atado
  alternatives_spanish:
  - cómo podrías ser atado
  - por qué medio podrías ser atado
  lexicon: HALOT
  rationale: La preposición instrumental se refleja mejor con «con qué». «Podrías» conserva el valor no realizativo del imperfecto/pasivo sin volverlo rígidamente literal.
- source_word: תַּאַרְגִי
  english_pob_choice: you weave
  chosen_spanish: tejieras
  alternatives_spanish:
  - trenzaras
  - entrelazaras
  lexicon: HALOT
  rationale: Aunque el verbo básico es «tejer», en español el acto de incorporar cabello a una labor de hilos puede expresarse con «tejieras»; aquí se mantiene la imagen de trabajo textil sin sobreexplicar.
- source_word: שֶׁבַע מַחְלְפוֹת רֹאשִׁי
  english_pob_choice: the seven locks of my head
  chosen_spanish: las siete trenzas de mi cabeza
  alternatives_spanish:
  - los siete mechones de mi cabeza
  - las siete guedejas de mi cabello
  lexicon: HALOT
  rationale: מַחְלְפוֹת puede referirse a trenzas o mechones; «trenzas» es la opción más natural en un contexto de tejido, y «mi cabeza» sigue de cerca el hebreo.
- source_word: עִם הַמַּסָּכֶת
  english_pob_choice: with the web
  chosen_spanish: con la tela
  alternatives_spanish:
  - con el telar
  - con el tejido
  lexicon: HALOT
  rationale: El término tiene un campo especializado de tejido; el contexto favorece un referente textil general. «Tela» es comprensible y evita precisar indebidamente «telar» o «red».
translation_notes:
  revision_awareness: La versión inglesa POB revisó «into the web» por «with the web» para ajustarse más estrechamente al hebreo y evitar una sobreespecificación. La redacción española sigue esa cautela con «con la tela», manteniendo la referencia textil sin imponer un movimiento que el hebreo no exige.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto cuando el Tetragrámaton aparece; aquí no aplica.
  - Se usa «Sansón» y «Dalila» de forma estándar y transparente.
  - Se prefirió un español natural y publicable sin borrar el paralelismo entre la burla, las mentiras y la pregunta instrumental del versículo.
