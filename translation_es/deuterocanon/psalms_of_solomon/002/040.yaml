- from: Porque el Señor es bondadoso con los que lo invocan con perseverancia[a], para obrar conforme a su misericordia para con sus piadosos[b], para estar continuamente delante de él en fortaleza.
  to: Porque el Señor es bondadoso con los que lo invocan con perseverancia[a]; él obra conforme a su misericordia para con sus piadosos[b], para que permanezcan continuamente delante de él en fortaleza.
  rationale: 'Se desempaquetó la sintaxis comprimida del griego para producir un español claro y fiel al sentido documentado en el expediente inglés: la bondad del Señor se expresa en que actúa misericordiosamente hacia sus piadosos, con el resultado de que ellos permanezcan delante de él. Se mantuvo ''sus piadosos'' por la justificación contextual de ὅσιοι en los Salmos de Salomón. También se sustituyó ''estar'' por ''permanezcan'' para reflejar mejor la idea de presencia estable ante Dios.'
