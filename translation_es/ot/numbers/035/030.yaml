  text: כָּל מַ֨כֵּה נֶ֔פֶשׁ לְ/פִ֣י עֵדִ֔ים יִרְצַ֖ח אֶת הָ/רֹצֵ֑חַ וְ/עֵ֣ד אֶחָ֔ד לֹא יַעֲנֶ֥ה בְ/נֶ֖פֶשׁ לָ/מֽוּת־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/035/030.yaml
  text: Whoever strikes down a person[a], the murderer shall be put to death on the testimony of witnesses[b]; but one witness shall not testify against a person for death.
  footnotes:
  - marker: a
    text: Literally, 'by the mouth of witnesses.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew uses the same root for 'murderer' and the verb of putting him to death; the English avoids suggesting unlawful killing by the court.
    reason: lexical_alternative
