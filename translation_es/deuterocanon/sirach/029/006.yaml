translation:
  language: es
  text: Si puede[a], apenas recuperará la mitad, y la tendrá por un hallazgo; pero si no, ha sido privado de su dinero, y se ha ganado un enemigo por nada[b]. Le devolverá maldiciones e insultos, y en vez de honra le devolverá deshonra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si prevalece»; el griego dice literalmente «si es fuerte/capaz», es decir, si logra recuperar algo de lo prestado.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se ha ganado un enemigo sin provecho»; el giro griego expresa la ironía de que el prestamista pierde dinero y recibe hostilidad a cambio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν ἰσχύσῃ
  english_pob_choice: If he is able
  chosen_spanish: Si tiene medios
  alternatives_spanish:
  - Si puede
  - Si es capaz
  lexicon: BDAG
  rationale: ἰσχύω puede significar tener fuerza, poder o capacidad. En este contexto de préstamo, «si tiene medios» comunica con naturalidad que puede recuperar algo, sin forzar una idea más técnica o física que el griego no exige.
- source_word: μόλις κομίσεται
  english_pob_choice: he will scarcely recover
  chosen_spanish: apenas recuperará
  alternatives_spanish:
  - difícilmente recuperará
  - recobrará con dificultad
  lexicon: BDAG
  rationale: κομίζω aquí es recibir o recuperar lo debido; con μόλις, la idea es escasa o difícil recuperación. «Apenas recuperará» mantiene esa limitación de forma idiomática en español.
- source_word: τὸ ἥμισυ
  english_pob_choice: half
  chosen_spanish: la mitad
  alternatives_spanish:
  - medio
  - la parte mitad
  lexicon: BDAG
  rationale: La expresión es cuantitativa y directa. «La mitad» es la forma natural en español y conserva el valor exacto del griego.
- source_word: λογιεῖται αὐτὸ ὡς εὕρεμα
  english_pob_choice: will count it as a find
  chosen_spanish: la tendrá por un hallazgo
  alternatives_spanish:
  - la considerará un hallazgo
  - la contará como un hallazgo
  - la tendrá por una ganancia inesperada
  lexicon: BDAG
  rationale: λογίζομαι significa contar o considerar, y εὕρεμα es algo hallado. «La tendrá por un hallazgo» preserva la imagen de algo encontrado inesperadamente; «hallazgo» evita perder el matiz de descubrimiento/ganancia imprevista.
- source_word: ἀπεστέρησεν αὐτὸν τῶν χρημάτων αὐτοῦ
  english_pob_choice: he has been deprived of his money
  chosen_spanish: lo ha privado de su dinero
  alternatives_spanish:
  - lo ha despojado de su dinero
  - lo ha defraudado de su dinero
  - lo ha robado de su dinero
  lexicon: BDAG
  rationale: ἀποστερέω puede ser privar, despojar o defraudar. «Lo ha privado de su dinero» conserva el resultado sin añadir una escena de violencia o una acusación legal más fuerte de la que el contexto obliga.
- source_word: ἐκτήσατο αὐτὸν ἐχθρὸν οὐ δωρεάν
  english_pob_choice: has gained an enemy for nothing
  chosen_spanish: se ha ganado un enemigo por nada
  alternatives_spanish:
  - ha adquirido un enemigo sin causa
  - ha hecho de él un enemigo sin provecho
  - ha ganado un enemigo gratuitamente
  lexicon: BDAG
  rationale: 'κτάομαι es adquirir o ganar, y οὐ δωρεάν transmite que no fue sin costo/beneficio en el contexto. «Se ha ganado un enemigo por nada» comunica bien la ironía: pierde dinero y además obtiene hostilidad.'
- source_word: κατάρας καὶ λοιδορίας
  english_pob_choice: curses and insults
  chosen_spanish: maldiciones e insultos
  alternatives_spanish:
  - maldiciones y ultrajes
  - imprecaciones e injurias
  - maldiciones y reproches
  lexicon: BDAG
  rationale: La pareja designa habla hostil. «Maldiciones e insultos» es claro y natural, y mantiene la doble forma de abuso verbal.
- source_word: ἀποδώσει αὐτῷ
  english_pob_choice: he will repay him
  chosen_spanish: le devolverá
  alternatives_spanish:
  - le retribuirá
  - le pagará
  - le rendirá
  lexicon: BDAG
  rationale: 'ἀποδίδωμι es dar de vuelta, pagar o retribuir. «Le devolverá» sostiene la ironía del pasaje: en vez de devolver el préstamo, devuelve abuso y deshonra.'
- source_word: ἀντὶ δόξης ... ἀτιμίαν
  english_pob_choice: instead of honor ... dishonor
  chosen_spanish: en vez de honra ... deshonra
  alternatives_spanish:
  - en lugar de honor ... deshonra
  - en vez de gloria ... deshonra
  - en lugar de estima ... deshonra
  lexicon: BDAG
  rationale: δόξα y ἀτιμία aquí se refieren a estima social. «Honra» y «deshonra» suenan bien en español bíblico y conservan el contraste sin elevar innecesariamente el tono a «gloria».
theological_decisions:
- issue: Marco moral del préstamo fallido
  english_pob_reading: The verse is rendered as practical wisdom about the lender's loss and the borrower's hostile response, without importing a broader doctrinal claim about usury or divine judgment.
  chosen_spanish_reading: El versículo se vierte como sabiduría práctica sobre la pérdida del prestamista y la respuesta hostil del deudor, sin añadir una doctrina más amplia sobre la usura o el juicio divino.
  alternative_spanish_readings:
  - Una versión más moralizada que insinúe fraude deliberado del deudor
  - Una lectura generalizada sobre la ingratitud humana
  rationale: 'El griego presenta consecuencias concretas: recuperación parcial o nula, pérdida económica, enemistad y abuso verbal. La traducción española mantiene ese alcance y no amplía el texto a una afirmación doctrinal que no expresa explícitamente.'
  doctrine_reference: 'Principio de traducción: no importar al texto afirmaciones doctrinales que el texto no hace.'
translation_notes:
  revision_awareness: Sin revisiones aplicadas; se sigue el último pase aprobado sin cambios sustanciales. Se preserva la ironía del texto griego y el límite pragmático del contexto de préstamo.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto cuando corresponda; este versículo no la contiene.
  - Se mantiene «honra/deshonra» para δόξα/ἀτιμία por tratarse de estima social en contexto sapiencial.
  - Se evita «siervo» o lenguaje doctrinal ajeno, porque el versículo trata de un préstamo y su fracaso, no de estatus religioso.
