translation:
  language: es
  text: 'Entonces Marta dijo a Jesús[a]: «Señor, si hubieras estado aquí, mi hermano no habría muerto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «señor» en sentido de tratamiento respetuoso; el griego κύριε puede funcionar como una forma de cortesía, pero «Señor» es la traducción por defecto del proyecto y también preserva su posible peso teológico en el Evangelio de Juan.
    reason: alternative_reading
lexical_decisions:
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  lexicon: BDAG
  rationale: οὖν marca continuidad narrativa; «Entonces» conserva ese enlace de manera natural en español sin imponer una conclusión demasiado fuerte.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - respondió
  lexicon: BDAG
  rationale: En este contexto narrativo, λέγω se traduce de forma directa como «dijo», que es el verbo de habla más natural y preciso.
- source_word: πρὸς τὸν Ἰησοῦν
  english_pob_choice: to Jesus
  chosen_spanish: a Jesús
  alternatives_spanish:
  - hacia Jesús
  - para Jesús
  lexicon: BDAG
  rationale: Con verbo de decir, πρός + acusativo indica al destinatario; «a Jesús» expresa esa dirección de forma idiomática en español.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor mío
  - Maestro
  - Sir
  lexicon: BDAG
  rationale: Se conserva el valor de tratamiento respetuoso y la posible carga cristológica del término en Juan. «Señor» es la equivalencia española estable para κύριος en este tipo de contexto.
- source_word: εἰ ἦς ὧδε
  english_pob_choice: if you had been here
  chosen_spanish: si hubieras estado aquí
  alternatives_spanish:
  - si estuvieras aquí
  - si hubieras estado en este lugar
  lexicon: BDAG
  rationale: La condición contraria a los hechos se expresa naturalmente en español con pluscuamperfecto de subjuntivo; «hubieras estado aquí» preserva tanto la irrealidad como la deixis de ὧδε.
- source_word: οὐκ ἂν ἀπέθανεν
  english_pob_choice: would not have died
  chosen_spanish: no habría muerto
  alternatives_spanish:
  - no hubiera muerto
  - no habría fallecido
  lexicon: BDAG
  rationale: La apódosis contrafactual se vierte con condicional compuesto; «no habría muerto» mantiene la fuerza del aoristo indicativo con ἄν sin suavizar el hecho narrado.
- source_word: ὁ ἀδελφός μου
  english_pob_choice: my brother
  chosen_spanish: mi hermano
  alternatives_spanish:
  - mi hermano varón
  - mi hermano de sangre
  lexicon: BDAG
  rationale: ἀδελφός aquí alude al hermano de Marta, Lázaro. «Mi hermano» es el equivalente directo y natural en español.
theological_decisions:
- issue: Tratamiento de κύριε al dirigirse Marta a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Señor mío
  - Maestro
  - Sir
  rationale: Se mantiene la lectura reverente y potencialmente teológica del término, sin diluirlo en un simple «Maestro» ni rebajarlo a un tratamiento secular. Esto sigue el criterio POB de conservar el peso posible de κύριος en Juan.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: 'El pasaje coincide con el texto base auditado y con la revisión más reciente: no se requieren cambios. La traducción respeta la continuidad narrativa, la condición contrafactual y el valor lexical de κύριε según el registro POB.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» como nombre propio sin variación.
  - Se usa «Señor» para κύριε de manera consistente con la política POB.
  - La estructura condicional en español refleja claramente la irrealidad del evento pasado.
  - No se introduce una paráfrasis explicativa que exceda el alcance del griego.
