id: 1SA.9.9
reference: 1 Samuel 9:9
source:
  edition: WLC
  text: לְ/פָנִ֣ים בְּ/יִשְׂרָאֵ֗ל כֹּֽה אָמַ֤ר הָ/אִישׁ֙ בְּ/לֶכְתּ/וֹ֙ לִ/דְר֣וֹשׁ אֱלֹהִ֔ים לְכ֥וּ וְ/נֵלְכָ֖ה עַד הָ/רֹאֶ֑ה כִּ֤י לַ/נָּבִיא֙ הַ/יּ֔וֹם יִקָּרֵ֥א לְ/פָנִ֖ים הָ/רֹאֶֽה׀־־׃
translation:
  text: Formerly in Israel[a], when a man went to inquire of God, he would say, “Come, and let us go to the seer,” for the prophet of today was formerly called the seer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “In former times in Israel, when a man went to seek God, he would say, ‘Come, let us go to the seer.’”
    reason: lexical_alternative
lexical_decisions:
- source_word: לְפָנִים
  chosen: Formerly
  alternatives:
  - In former times
  - Previously
  lexicon: HALOT
  rationale: Temporal adverb meaning 'formerly' or 'in earlier times.' Chosen for clear modern English and to match both occurrences in the verse.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  lexicon: HALOT
  rationale: Straightforward locative phrase indicating the custom's setting.
- source_word: כֹּה אָמַר
  chosen: he would say
  alternatives:
  - thus he said
  - this is what he said
  lexicon: HALOT
  rationale: Although literally 'thus said,' the clause introduces customary speech in a past setting. 'He would say' best conveys habitual action in idiomatic English.
- source_word: הָאִישׁ
  chosen: a man
  alternatives:
  - the man
  - someone
  lexicon: HALOT
  rationale: The singular is generic rather than referring to a specific individual. Per gender-accurate philosophy, 'a man' preserves the masculine generic form better than a neutral paraphrase.
- source_word: בְּלֶכְתּוֹ
  chosen: when a man went
  alternatives:
  - in his going
  - as he went
  lexicon: HALOT
  rationale: Infinitive construct with pronominal suffix functioning temporally. Rendered smoothly with 'when ... went' in English.
- source_word: לִדְרֹשׁ אֱלֹהִים
  chosen: to inquire of God
  alternatives:
  - to seek God
  - to consult God
  lexicon: HALOT
  rationale: דרש with God in this context refers to seeking divine guidance, often through a prophetic intermediary. 'Inquire of God' captures that nuance better than the broader 'seek God.'
- source_word: לְכוּ וְנֵלְכָה
  chosen: Come, and let us go
  alternatives:
  - Come, let us go
  - Come on, let us go
  lexicon: HALOT
  rationale: 'Preserves the two-part exhortation: imperative plus cohortative. ''Come, and let us go'' reflects the Hebrew rhythm without sounding archaic.'
- source_word: עַד הָרֹאֶה
  chosen: to the seer
  alternatives:
  - as far as the seer
  - to the one who sees
  lexicon: HALOT
  rationale: In this idiom עַד marks movement toward a person. 'Seer' is the established and accurate rendering of the participial title רֹאֶה in prophetic context.
- source_word: לַנָּבִיא
  chosen: the prophet
  lexicon: HALOT
  rationale: Standard rendering of נביא. The article is retained.
- source_word: הַיּוֹם
  chosen: of today
  alternatives:
  - today
  - now
  lexicon: HALOT
  rationale: Used contrastively with 'formerly' to explain older terminology from the narrator's later perspective. 'Of today' keeps the explanatory contrast explicit.
- source_word: יִקָּרֵא
  chosen: was called
  alternatives:
  - used to be called
  - is called
  lexicon: HALOT
  rationale: Although morphologically imperfect/passive, the clause is retrospective from the narrator's standpoint. English past passive best communicates the historical explanation.
- source_word: הָרֹאֶה
  chosen: the seer
  alternatives:
  - the one who sees
  lexicon: HALOT
  rationale: Technical older title for a prophetic figure; 'seer' is concise and conventional without obscuring meaning.
