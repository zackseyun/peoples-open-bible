translation:
  language: es
  text: y también algunos pertenecían a Hircano, hijo de Tobías, un hombre de muy alta posición. El impío Simón no estaba calumniando hasta ese punto. En total eran cuatrocientos talentos de plata y doscientos de oro[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «doscientos de oro»; se entiende «talentos» por la frase anterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: τινὰ
  english_pob_choice: some
  chosen_spanish: algunas
  alternatives_spanish:
  - algunas cantidades
  - una parte
  lexicon: LSJ
  rationale: En este contexto el indefinido se refiere a una porción de dinero o bienes depositados; en español, 'algunas' mantiene la indeterminación y la brevedad sin precisar más de lo que el griego dice.
- source_word: Ὑρκανοῦ τοῦ Τωβίου
  english_pob_choice: Hyrcanus son of Tobias
  chosen_spanish: Hircano, hijo de Tobías
  alternatives_spanish:
  - Hircano de Tobías
  - Hircano, hijo de Tobit
  lexicon: LSJ
  rationale: El griego presenta un nombre propio con genitivo patronímico. 'Hijo de Tobías' expresa la relación de manera idiomática en español y conserva el sentido genealógico.
- source_word: σφόδρα
  english_pob_choice: very
  chosen_spanish: de muy
  alternatives_spanish:
  - sumamente
  - en extremo
  lexicon: LSJ
  rationale: La intensidad recae sobre la posición social; 'de muy alta posición' reproduce ese énfasis de forma natural en español.
- source_word: ἀνδρὸς ἐν ὑπεροχῇ κειμένου
  english_pob_choice: a man of very high position
  chosen_spanish: un hombre de muy alta posición
  alternatives_spanish:
  - un hombre de muy alto rango
  - un hombre de gran prominencia
  lexicon: LSJ
  rationale: La frase describe estatus social, no postura física. 'De muy alta posición' conserva el valor de ὑπεροχή como prominencia o rango sin introducir una imagen ajena al contexto.
- source_word: οὐχ οὕτως διαβάλλων
  english_pob_choice: was not slandering to that extent
  chosen_spanish: no estaba calumniando hasta ese punto
  alternatives_spanish:
  - no estaba difamando tanto
  - no estaba haciendo acusaciones tan falsas
  lexicon: LSJ
  rationale: διαβάλλω puede significar calumniar o acusar falsamente. 'Calumniando' preserva el carácter hostil del verbo, y 'hasta ese punto' refleja la comparación negativa de οὐχ οὕτως.
- source_word: ὁ δυσσεβὴς Σίμων
  english_pob_choice: the ungodly Simon
  chosen_spanish: el impío Simón
  alternatives_spanish:
  - el irreligioso Simón
  - el malvado Simón
  lexicon: LSJ
  rationale: δυσσεβής expresa irreverencia o impiedad religiosa. 'Impío' es la equivalencia española más directa y mantiene el juicio moral-religioso del texto.
- source_word: τὰ δὲ πάντα
  english_pob_choice: Altogether
  chosen_spanish: En total
  alternatives_spanish:
  - Sumando todo
  - En conjunto
  lexicon: LSJ
  rationale: La expresión introduce el total. 'En total' es claro, conciso y adecuado para el registro contable del pasaje.
- source_word: ἀργυρίου τετρακόσια τάλαντα
  english_pob_choice: four hundred talents of silver
  chosen_spanish: cuatrocientos talentos de plata
  alternatives_spanish:
  - cuatrocientos talentos de plata fina
  lexicon: LSJ
  rationale: Se mantiene la unidad monetaria/pesos 'talentos' y el material 'plata' en el orden más natural para el español.
- source_word: χρυσίου δὲ διακόσια
  english_pob_choice: two hundred of gold
  chosen_spanish: doscientos de oro
  alternatives_spanish:
  - doscientos talentos de oro
  lexicon: LSJ
  rationale: El griego omite explícitamente 'talentos' en la segunda cola; en español se conserva la elipsis con 'de oro', mientras que el sustantivo se entiende por el contexto inmediato. Esto mantiene visible la tensión textual que el audit trail ya señaló.
theological_decisions:
- issue: Caracterización moral de Simón en δυσσεβής
  english_pob_reading: the ungodly Simon
  chosen_spanish_reading: el impío Simón
  alternative_spanish_readings:
  - el malvado Simón
  - el irreligioso Simón
  rationale: No hay un cruce doctrinal mayor, pero sí un calificativo valorativo. 'Impío' conserva la fuerza religiosa y moral del término sin añadir matices ajenos.
  doctrine_reference: Tono moral del narrador en 2 Macabeos; fidelidad léxica al juicio del texto.
translation_notes:
  revision_awareness: El borrador sigue el texto griego de Swete y el audit trail inglés. Se conserva la elipsis de χρυσίου δὲ διακόσια en la nota, como en la POB inglesa, en vez de armonizarla silenciosamente. También se evita traducir mecánicamente desde el inglés cuando el español requiere una formulación más natural, especialmente en ἐν ὑπεροχῇ κειμένου y οὐχ οὕτως διαβάλλων.
  spanish_consistency_notes:
  - Se usa 'Talentos' de forma consistente como unidad monetaria/pesos en el pasaje.
  - '''Impío'' mantiene el valor religioso de δυσσεβής con un registro bíblico comprensible en español.'
  - '''Hijo de Tobías'' conserva el patronímico explícito del griego.'
  - La nota [a] marca la elipsis del segundo miembro monetario, siguiendo el audit trail inglés.
