translation:
  language: es
  text: Pero nosotros mismos nos armaremos con rapidez delante de los hijos de Israel[a], hasta que los hayamos llevado a su lugar; y nuestros pequeños[b] quedarán en las ciudades fortificadas a causa de los habitantes de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la cabeza de los hijos de Israel»; la expresión hebrea literalmente dice «delante de los hijos de Israel» y probablemente alude a ir al frente en la batalla.
    reason: lexical_alternative
  - marker: b
    text: «Nuestros pequeños» abarca en sentido amplio a niños y dependientes.
    reason: cultural_note
lexical_decisions:
- source_word: נֵחָלֵץ
  english_pob_choice: will arm ourselves
  chosen_spanish: nos alistaremos
  alternatives_spanish:
  - nos armaremos
  - nos prepararemos para la batalla
  lexicon: HALOT
  rationale: 'El nifal de חלץ en este contexto es reflexivo: expresa prepararse/equiparse para la guerra. En español, «alistarnos» comunica la idea de ponerse en orden para salir al combate sin forzar una imagen de armas que ya queda implícita por el contexto militar.'
- source_word: חֻשִׁים
  english_pob_choice: quickly
  chosen_spanish: con rapidez
  alternatives_spanish:
  - de prisa
  - apresuradamente
  lexicon: HALOT
  rationale: El término indica premura o prontitud. «Con rapidez» mantiene el valor adverbial y suena natural en español, evitando redundancia con el verbo de preparación.
- source_word: לִפְנֵי בְּנֵי יִשְׂרָאֵל
  english_pob_choice: before the sons of Israel
  chosen_spanish: delante de los hijos de Israel
  alternatives_spanish:
  - antes que los hijos de Israel
  - a la cabeza de los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión concreta «hijos de Israel» como reflejo del hebreo. «Delante de» deja abierta la matiz militar de ir al frente sin imponer una interpretación más específica que el texto admite.
- source_word: הֲבִיאֹנֻם אֶל מְקוֹמָם
  english_pob_choice: we have brought them to their place
  chosen_spanish: los hayamos llevado a su lugar
  alternatives_spanish:
  - los hayamos traído a su lugar
  - los hayamos conducido a su lugar
  lexicon: HALOT
  rationale: El verbo hebreo es causativo de «venir» y puede expresarse como llevar/traer/conducir. «Llevar» funciona bien en español para el movimiento de un grupo hacia su destino y evita una duplicación poco natural de «traer» desde la perspectiva del narrador.
- source_word: טַפֵּנוּ
  english_pob_choice: our little ones
  chosen_spanish: nuestros pequeños
  alternatives_spanish:
  - nuestros hijos pequeños
  - nuestros dependientes
  lexicon: HALOT
  rationale: טף abarca niños y dependientes. «Nuestros pequeños» mantiene la amplitud del término y la naturalidad en español, sin restringirlo solo a hijos biológicos ni convertirlo en una explicación demasiado extensa en el texto principal.
- source_word: בְּעָרֵי הַמִּבְצָר
  english_pob_choice: in the fortified cities
  chosen_spanish: en las ciudades fortificadas
  alternatives_spanish:
  - en las ciudades amuralladas
  - en las plazas fuertes
  lexicon: HALOT
  rationale: «Ciudades fortificadas» es la correspondencia más clara y estable para el constructo hebreo. Mantiene el carácter defensivo sin introducir un matiz más técnico o arcaizante.
- source_word: מִפְּנֵי יֹשְׁבֵי הָאָרֶץ
  english_pob_choice: because of the inhabitants of the land
  chosen_spanish: por causa de los habitantes de la tierra
  alternatives_spanish:
  - a causa de los habitantes de la tierra
  - a fin de protegerse de los habitantes de la tierra
  lexicon: HALOT
  rationale: La preposición puede expresar causa o referencia a una amenaza. «Por causa de» conserva la relación causal y deja visible el trasfondo de peligro sin sobreexplicarlo en el versículo principal.
translation_notes:
  revision_awareness: El texto inglés auditado sigue sin cambios en la revisión más reciente (pass de 2026-04-23; sin modificaciones). La presente redacción española conserva esa línea interpretativa, ajustando solo la formulación para mayor naturalidad idiomática sin alterar las decisiones lexicográficas documentadas.
  spanish_consistency_notes:
  - Se mantiene «hijos de Israel» para reflejar la fórmula del hebreo y la política de traducir con precisión, no con un genérico nacional sin apoyo contextual.
  - Se evita «Señor» o terminología teológica no presente; el versículo no contiene un nombre divino explícito.
  - «Pequeños» reproduce la amplitud de טף mejor que «niños» exclusivamente, aunque la nota aclara el alcance.
  - «Por causa de» preserva la ambigüedad funcional del hebreo entre causalidad y protección frente a un peligro.
