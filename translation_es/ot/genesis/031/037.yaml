translation:
  language: es
  text: Porque has registrado[a] todos mis bienes, ¿qué has hallado de todos los bienes de tu casa? Ponlo aquí delante de mis hermanos y de tus hermanos, y que ellos juzguen entre nosotros dos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «has palpado». El hebreo puede implicar el acto concreto de tocar o examinar al buscar objetos perdidos o robados.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשַּׁשְׁתָּ
  english_pob_choice: have searched through
  chosen_spanish: has registrado
  alternatives_spanish:
  - has buscado
  - has revisado
  - has palpado
  lexicon: HALOT
  rationale: El hebreo conserva la idea concreta de tocar/examinar, pero en este contexto forense de revisión de pertenencias el sentido idiomático es investigar cuidadosamente. «Has registrado» comunica inspección minuciosa sin sonar demasiado coloquial ni perder la fuerza concreta.
- source_word: כָּל כֵּלַי
  english_pob_choice: all my goods
  chosen_spanish: todos mis bienes
  alternatives_spanish:
  - todas mis pertenencias
  - todas mis cosas
  - todos mis objetos
  lexicon: HALOT
  rationale: כְּלִי puede abarcar bienes muebles, enseres u objetos. «Bienes» funciona bien en español para propiedad material amplia y mantiene el sentido doméstico-patrimonial del pasaje.
- source_word: מַה מָּצָאתָ
  english_pob_choice: what have you found
  chosen_spanish: ¿qué has hallado?
  alternatives_spanish:
  - ¿qué has encontrado?
  - ¿qué hallaste?
  lexicon: HALOT
  rationale: «Hallar» conserva un registro bíblico y formal, pero sigue siendo natural en español. Mantiene el valor interrogativo inmediato del hebreo y encaja con la escena judicial.
- source_word: מִכֹּל כְּלֵי בֵיתֶךָ
  english_pob_choice: of all the goods of your house
  chosen_spanish: de todos los bienes de tu casa
  alternatives_spanish:
  - de todos los bienes de tu hogar
  - de todos los enseres de tu casa
  - de todos los bienes de tu casa
  lexicon: HALOT
  rationale: El partitivo מִן se refleja mejor con «de». «Casa» conserva la referencia al ámbito doméstico/patrimonial; «bienes» permite repetir el campo léxico de propiedad sin estrecharlo a utensilios.
- source_word: שִׂים כֹּה
  english_pob_choice: Set it here
  chosen_spanish: Ponlo aquí
  alternatives_spanish:
  - Colócalo aquí
  - Déjalo aquí
  lexicon: HALOT
  rationale: El imperativo pide presentar públicamente el objeto supuesto. «Ponlo aquí» es directo, natural y suficientemente cercano al hebreo sin sobreinterpretar.
- source_word: נֶגֶד
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: «Delante de» reproduce bien la presentación pública del objeto ante testigos. «Ante» también sería posible, pero «delante de» suena un poco más concreto aquí.
- source_word: אַחַי וְאַחֶיךָ
  english_pob_choice: my brothers and your brothers
  chosen_spanish: mis hermanos y tus hermanos
  alternatives_spanish:
  - mis parientes y tus parientes
  - mis hermanos y los tuyos
  lexicon: HALOT
  rationale: Se conserva el término familiar literal del hebreo. Aunque puede incluir parientes del clan, el texto usa «hermanos», y en español no hay necesidad de neutralizarlo sin una razón contextual más fuerte.
- source_word: וְיוֹכִיחוּ
  english_pob_choice: let them judge
  chosen_spanish: que ellos juzguen
  alternatives_spanish:
  - que ellos arbitren
  - que ellos decidan
  - que ellos diriman
  lexicon: HALOT
  rationale: 'El verbo tiene una fuerza forense: decidir/juzgar una disputa. «Juzguen» refleja mejor la elección final del POB inglés y conserva el matiz judicial del hebreo.'
- source_word: בֵּין שְׁנֵינוּ
  english_pob_choice: between the two of us
  chosen_spanish: entre los dos de nosotros
  alternatives_spanish:
  - entre nosotros dos
  - entre ambos
  lexicon: HALOT
  rationale: Se preserva explícitamente la dualidad del hebreo. La redacción «entre los dos de nosotros» suena algo más formal, pero refleja con claridad la construcción inclusiva y bilateral.
theological_decisions:
- issue: Posible sentido judicial o arbitral de וְיוֹכִיחוּ
  english_pob_reading: let them judge between the two of us
  chosen_spanish_reading: que ellos juzguen entre los dos de nosotros
  alternative_spanish_readings:
  - que ellos decidan entre los dos de nosotros
  - que ellos arbitren entre los dos de nosotros
  rationale: No hay una disputa doctrinal, pero sí una decisión lexical con carga jurídica. Se conserva el valor forense del verbo para no aplanar el juicio público implícito en el hebreo.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto español sigue el ajuste final del POB inglés que optó por «judge» en lugar de «decide», y refleja el cambio partitivo de «from» a «of» en la segunda cláusula mediante «de». También conserva la tensión semántica de מִשַּׁשְׁתָּ con un verbo español que puede abarcar inspección minuciosa sin borrar la imagen física.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se usa «bienes» de manera consistente para כְּלִי en este contexto patrimonial, evitando «vasijas» o «utensilios» que estrecharían indebidamente el campo semántico.
  - Se conserva el registro formal «juzguen» para la función forense del verbo hebreo.
  - La frase «entre los dos de nosotros» preserva la bilateralidad explícita del hebreo; aunque suena más marcada que «entre nosotros dos», evita perder el matiz numérico.
