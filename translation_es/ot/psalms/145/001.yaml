revisions:
- from: Un salmo de David[a]. Yo te exaltaré, mi Dios, el Rey[b][c], y bendeciré tu nombre por siempre y para siempre.
  to: Una alabanza de David[a]. Te exaltaré, mi Dios el Rey[b][c], y bendeciré tu nombre por siempre jamás.
  rationale: Se cambia «Un salmo» por «Una alabanza» para reflejar mejor תְּהִלָּה según la decisión léxica auditada. Se elimina la coma en «mi Dios el Rey» para alinearse con la apposición directa del hebreo y con la revisión inglesa final. Se mejora la naturalidad con «Te exaltaré» y «por siempre jamás», manteniendo el sentido de perpetuidad enfática. La nota c se ajusta para aportar una alternativa real y conservar la literalidad hebrea.
