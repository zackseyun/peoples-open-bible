translation:
  language: es
  text: y que gobernaba sobre el monte Hermón[a], sobre Salecá, sobre todo Basán, hasta la frontera de los gesureos y los maacateos, y la mitad de Galaad, hasta la frontera de Sihón, rey de Hesbón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y él gobernaba sobre el monte Hermón, Salecá y todo Basán». El hebreo usa un participio que continúa la descripción iniciada en el versículo anterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמֹשֵׁל
  english_pob_choice: and ruling over
  chosen_spanish: y gobernando sobre
  alternatives_spanish:
  - y gobernó sobre
  - y estaba gobernando sobre
  - y gobernante sobre
  lexicon: HALOT
  rationale: El participio hebreo continúa la descripción territorial del rey Og; en español, el gerundio «gobernando» conserva esa continuidad mejor que un verbo finito y refleja la dominación en curso.
- source_word: בְּהַר חֶרְמוֹן
  english_pob_choice: over Mount Hermon
  chosen_spanish: sobre el monte Hermón
  alternatives_spanish:
  - en el monte Hermón
  - en monte Hermón
  lexicon: HALOT
  rationale: La preposición ב con משל marca ámbito de dominio; «sobre» expresa con naturalidad la esfera regida. «Hermón» mantiene el nombre propio bíblico habitual en español.
- source_word: וּבְסַלְכָה
  english_pob_choice: and Salecah
  chosen_spanish: y sobre Salca
  alternatives_spanish:
  - y Saleca
  - y Salcá
  lexicon: HALOT
  rationale: Es un topónimo. «Salca» conserva la identificación del lugar en forma breve y legible en español, sin introducir una transliteración excesiva.
- source_word: וּבְכָל הַבָּשָׁן
  english_pob_choice: and all Bashan
  chosen_spanish: y sobre todo Basán
  alternatives_spanish:
  - y en todo Basán
  - y sobre todo el Basán
  lexicon: HALOT
  rationale: El hebreo nombra la totalidad de la región bajo su dominio. «Sobre todo Basán» integra el matiz territorial de gobierno ya implícito en el participio y mantiene el valor distributivo de כָל.
- source_word: עַד גְּבוּל
  english_pob_choice: as far as the border of
  chosen_spanish: hasta el límite de
  alternatives_spanish:
  - hasta la frontera de
  - hasta el borde de
  lexicon: HALOT
  rationale: «גְּבוּל» puede ser «límite» o «frontera»; aquí, «límite» suena más natural en una enumeración geográfica y preserva la idea de extensión territorial.
- source_word: הַגְּשׁוּרִי
  english_pob_choice: the Geshurites
  chosen_spanish: los gesureos
  alternatives_spanish:
  - los gesuritas
  - los de Guesur
  lexicon: HALOT
  rationale: El gentilicio hebreo se expresa mejor como pueblo en plural. «Gesureos» sigue la forma castellana bíblica más clara sin perder la referencia étnica.
- source_word: וְהַמַּעֲכָתִי
  english_pob_choice: and the Maacathites
  chosen_spanish: y los maacateos
  alternatives_spanish:
  - y los maacatitas
  - y los de Maacá
  lexicon: HALOT
  rationale: Como con el término anterior, se trata de un grupo étnico. «Maacateos» comunica de manera fluida el plural gentilicio en español.
- source_word: וַחֲצִי הַגִּלְעָד
  english_pob_choice: and half of Gilead
  chosen_spanish: y la mitad de Galaad
  alternatives_spanish:
  - y la media Galaad
  - y la mitad del Galaad
  lexicon: HALOT
  rationale: «Galaad» es la forma usual en español bíblico. «La mitad de Galaad» reproduce fielmente la designación territorial sin añadir interpretaciones.
- source_word: גְּבוּל סִיחוֹן מֶלֶךְ חֶשְׁבּוֹן
  english_pob_choice: to the border of Sihon king of Heshbon
  chosen_spanish: hasta el límite de Sihón, rey de Hesbón
  alternatives_spanish:
  - hasta la frontera de Sihón, rey de Hesbón
  - hasta el límite de Sihón, rey de Heshbón
  lexicon: HALOT
  rationale: El cierre del versículo delimita la extensión territorial. «Sihón» y «Hesbón» siguen las formas bíblicas españolas habituales y el apposición «rey de Hesbón» se conserva sin alterar el orden de sentido.
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo de manera directa y conserva la continuación participial destacada en el audit trail inglés. No se registran revisiones posteriores que alteren el sentido, y el consenso de cotejo fue alto.
  spanish_consistency_notes:
  - Se preservó el patrón territorial repetido con «sobre» para reflejar el campo de dominio del verbo משל.
  - 'Se mantuvieron formas bíblicas españolas reconocibles: Hermón, Basán, Galaad, Sihón, Hesbón.'
  - Los nombres de pueblos se tradujeron como plurales étnicos en español para corresponder al gentilicio hebreo.
