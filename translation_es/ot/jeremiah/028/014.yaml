translation:
  language: es
  text: 'Porque así dice Yahvé de los ejércitos, el Dios de Israel: he puesto un yugo de hierro[b] sobre el cuello de todas estas naciones, para servir a Nabucodonosor[a], rey de Babilonia, y le servirán. También le he dado las bestias del campo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Nabucodonosor»; en Jeremías aparece a menudo otra grafía reflejada en inglés como «Nebuchadrezzar».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «un yugo de hierro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre propio divino con una transliteración reverente y readable en español, conforme al principio POB de no enmascarar el Tetragrámaton con un título sustitutivo.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: ‘Ejércitos’ comunica el valor tradicional del título divino sin perder la amplitud de huestes celestiales y terrenales; en español suena más natural que un calco directo de ‘hosts’.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  - el Dios de Israel
  lexicon: HALOT
  rationale: Se mantiene el constructo de identificación pactual de manera directa y transparente.
- source_word: עֹל בַּרְזֶל
  english_pob_choice: an iron yoke
  chosen_spanish: un yugo de hierro
  alternatives_spanish:
  - un yugo de hierro
  - un yugo férreo
  lexicon: HALOT
  rationale: ‘Yugo de hierro’ conserva la imagen bíblica y la fuerza de opresión; en español es idiomático y fiel al sustantivo metálico del hebreo.
- source_word: נָתַתִּי
  english_pob_choice: I have put
  chosen_spanish: he puesto
  alternatives_spanish:
  - he colocado
  - he puesto
  lexicon: HALOT
  rationale: Se usa el perfecto con valor de decreto ya establecido y vigente; ‘puesto’ funciona bien con la construcción ‘sobre el cuello’.
- source_word: עַל צַוַּאר
  english_pob_choice: on the neck
  chosen_spanish: sobre el cuello
  alternatives_spanish:
  - sobre el cuello
  - en el cuello
  lexicon: HALOT
  rationale: ‘Cuello’ reproduce con claridad la imagen corporal del hebreo; ‘sobre’ mantiene la relación espacial del yugo con la persona dominada.
- source_word: כָּל הַגּוֹיִם הָאֵלֶּה
  english_pob_choice: all these nations
  chosen_spanish: todas estas naciones
  alternatives_spanish:
  - todos estos pueblos
  - todas estas naciones
  lexicon: HALOT
  rationale: ‘Naciones’ es el equivalente político más preciso para גּוֹיִם en este contexto de dominación imperial.
- source_word: לַעֲבֹד
  english_pob_choice: to serve
  chosen_spanish: para servir
  alternatives_spanish:
  - para servir
  - para estar sujetos a
  lexicon: HALOT
  rationale: Se conserva la correlación léxica con el verbo siguiente y la idea de vasallaje político.
- source_word: נְבֻכַדְנֶאצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nabucodonosor
  - Nebucodonosor
  lexicon: HALOT
  rationale: Se adopta la forma española establecida por tradición bíblica y pronunciación eclesial; la nota preserva la observación textual sobre la grafía hebrea distinta reflejada en inglés.
- source_word: וַעֲבָדֻהוּ
  english_pob_choice: and they will serve him
  chosen_spanish: y le servirán
  alternatives_spanish:
  - y le servirán
  - y lo servirán
  lexicon: HALOT
  rationale: Se traduce el valor resultativo/futuro del verbo con un futuro simple natural en español; ‘le’ preserva el dativo de interés/beneficiario del hebreo.
- source_word: וְגַם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - también
  - además
  lexicon: HALOT
  rationale: ‘También’ comunica adición de forma clara y sobria, sin intensificar de más.
- source_word: חַיַּת הַשָּׂדֶה
  english_pob_choice: the beasts of the field
  chosen_spanish: las bestias del campo
  alternatives_spanish:
  - las bestias del campo
  - los animales del campo
  - las fieras del campo
  lexicon: HALOT
  rationale: Se conserva la expresión bíblica tradicional y su amplitud referencial; ‘bestias’ mantiene la imagen idiomática del hebreo con más fuerza que una generalización a ‘animales’.
- source_word: נָתַתִּי לוֹ
  english_pob_choice: I have given him
  chosen_spanish: le he dado
  alternatives_spanish:
  - le he dado
  - se las he dado
  lexicon: HALOT
  rationale: Se mantiene la consistencia con נתן como ‘dar’, aquí con sentido de conceder/entregar bajo dominio; el dativo ‘le’ refleja el destinatario indirecto.
theological_decisions:
- issue: Nombre divino y título soberano
  english_pob_reading: Yahweh of hosts, the God of Israel
  chosen_spanish_reading: Yahvé de los ejércitos, el Dios de Israel
  alternative_spanish_readings:
  - Yahvé de los ejércitos
  - el SEÑOR de los ejércitos
  rationale: Se conserva el nombre propio divino y el título soberano sin sustituirlo por una convención de ocultamiento. ‘De los ejércitos’ mantiene la amplitud de la autoridad divina sobre huestes visibles e invisibles.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Soberanía divina sobre las naciones y sobre la creación
  english_pob_reading: I have put an iron yoke on the necks of all these nations... I have also given him the beasts of the field.
  chosen_spanish_reading: he puesto un yugo de hierro... También le he dado las bestias del campo.
  alternative_spanish_readings:
  - he impuesto un yugo de hierro
  - también le he entregado las bestias del campo
  rationale: La doble forma de נתן se conserva para mostrar que el dominio de Babilonia y el acceso a la creación están bajo decreto divino, no como mera casualidad política.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Fuerza temporal de los verbos proféticos
  english_pob_reading: I have put... and they shall serve him... I have also given him
  chosen_spanish_reading: he puesto... y le servirán... le he dado
  alternative_spanish_readings:
  - puse... y le servirán... di
  - he puesto... y le servirán... he dado
  rationale: El perfecto profético se vierte con perfecto español para el acto decretado ya vigente, y el futuro para la consecuencia anunciada; así se conserva el flujo discursivo y la certeza profética.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió ‘neck’ a ‘necks’ para concordar con ‘all these nations’ y ajustó ‘will serve’ a ‘shall serve’ por registro más formal. En español se optó por ‘sobre el cuello’ como imagen singular colectiva natural, manteniendo la pluralidad de ‘todas estas naciones’ en el sujeto, y por ‘le servirán’ en futuro simple formal.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה conforme al estándar POB en español.
  - Se usa ‘yugo de hierro’ y no una paráfrasis explicativa para conservar la metáfora profética.
  - ‘Nabucodonosor’ sigue la forma castellana tradicional; la nota registra la variación hebrea/inglesa.
  - ‘las bestias del campo’ preserva la expresión bíblica idiomática y el paralelismo con la cláusula de dominio.
  - El dativo ‘le’ se usa de manera consistente para el objeto indirecto singular masculino.
