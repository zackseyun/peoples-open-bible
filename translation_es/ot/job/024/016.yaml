  spanish_quality_summary: El español es natural y claro, pero «se meten en las casas» suena algo coloquial y menos preciso para un registro bíblico digno. Una formulación como «irrumpen en las casas» o «se abren paso a las casas» transmite mejor el contexto delictivo. También conviene evitar «en ellas» por innecesario y potencialmente sobreespecificador.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. «La luz» está bien conservada. Las decisiones léxicas principales siguen el expediente inglés, salvo que el equivalente español de חָתַר debe acercarse más a «break into» que «se meten en».
  issues:
  - severity: medium
    issue: «se meten en las casas» debilita el valor de חָתַר
    rationale: El verbo hebreo y la decisión inglesa apuntan a irrumpir/forzar entrada, incluso con matiz de horadar pared. «Meterse en» puede significar simplemente entrar, sin la fuerza criminal del original.
  - severity: medium
    issue: «en ellas» añade una referencia no explícita en חִתְּמוּ לָמוֹ
    rationale: El hebreo dice que se encierran/se sellan para sí, no necesariamente «en ellas» = en las casas mencionadas. La adición no destruye el sentido, pero estrecha indebidamente la referencia.
  - severity: low
    issue: Registro algo coloquial en la primera cláusula
    rationale: Para una Biblia de estilo moderno pero digno, «se meten en» resulta menos literario y menos exacto que «irrumpen en».
