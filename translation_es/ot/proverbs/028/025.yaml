  text: רְחַב נֶ֭פֶשׁ יְגָרֶ֣ה מָד֑וֹן וּ/בוֹטֵ֖חַ עַל יְהוָ֣ה יְדֻשָּֽׁן־־׃
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/028/025.yaml
  text: A greedy person stirs up strife[b][a], but the one who trusts in Yahweh will be enriched.
  footnotes:
  - marker: a
    text: Literally, 'broad of soul,' an idiom for a grasping or insatiable appetite; alternatively, 'the proud person' or 'the one of large appetite.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'will be made fat,' a Hebrew image for flourishing or abundance.
    reason: lexical_alternative
