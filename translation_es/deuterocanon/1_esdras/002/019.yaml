  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido global del griego: consulta de registros oficiales, acusación de rebeldía política de la ciudad y de los judíos, actividad hostil antigua y consecuencia de devastación. Sin embargo, «sitios» en español moderno es ambiguo y puede sonar poco natural para πολιορκίας; además, la nota alternativa queda invertida respecto del término principal preferible en español. Un ajuste menor mejora la fidelidad y la legibilidad.'
  spanish_quality_summary: El texto es claro, digno y mayormente natural. «Registros», «rebelde/rebeldes», «desde antiguo» y «fue asolada» funcionan bien. «Perturbando a reyes y ciudades» es aceptable aunque algo rígido; no exige cambio. El principal problema de calidad es «habían organizado sitios», que en español bíblico general se entiende peor que «asedios».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones políticas para ἀποστάτις/ἀποστᾶται están bien alineadas con el expediente inglés. La corrección propuesta mantiene la alternativa léxica documentada para πολιορκίας sin introducir carga teológica.
  issues:
  - severity: medium
    issue: «Sitios» para πολιορκίας suena ambiguo y menos natural que «asedios» en español contemporáneo.
    rationale: Aunque «sitio» puede significar asedio, en el uso actual panhispánico suele requerir contexto militar más explícito y puede leerse simplemente como ‘lugares’. «Asedios» comunica con mayor claridad la actividad de cerco militar/hostil preservada por el griego y por la revisión inglesa final («sieges»).
  - severity: low
    issue: La nota de alternativa léxica para πολιορκίας conviene invertirse si el texto principal pasa a «asedios».
    rationale: El expediente inglés dejó «sieges» en el texto y preservó la amplitud semántica en nota. En español, lo más paralelo es usar «asedios» en el texto y dejar «sitios» o «bloqueos» como alternativa explicativa.
