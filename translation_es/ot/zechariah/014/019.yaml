  language: en
  yaml_path: translation/ot/zechariah/014/019.yaml
  text: This will be the punishment of Egypt[b][a], and the punishment of all the nations that do not go up to celebrate the Festival of Booths.
  footnotes:
  - marker: a
    text: Or 'penalty'; the Hebrew word can also mean 'sin' in other contexts, but here it refers to the judgment incurred by refusing to go up for the feast.
    reason: lexical_alternative
  - marker: b
    text: Traditionally 'the Feast of Tabernacles.'
    reason: lexical_alternative
