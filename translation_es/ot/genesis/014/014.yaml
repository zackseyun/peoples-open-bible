  text: וַ/יִּשְׁמַ֣ע אַבְרָ֔ם כִּ֥י נִשְׁבָּ֖ה אָחִ֑י/ו וַ/יָּ֨רֶק אֶת חֲנִיכָ֜י/ו יְלִידֵ֣י בֵית֗/וֹ שְׁמֹנָ֤ה עָשָׂר֙ וּ/שְׁלֹ֣שׁ מֵא֔וֹת וַ/יִּרְדֹּ֖ף עַד דָּֽן־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/014/014.yaml
  text: When Abram heard that his kinsman had been taken captive[a], he led out his trained men, born in his household, three hundred and eighteen[b], and pursued them as far as Dan.
  footnotes:
  - marker: a
    text: Or 'his kinsman'; Hebrew 'his brother' can refer to a close male relative such as a nephew.
    reason: lexical_alternative
  - marker: b
    text: The verb rendered 'mustered' may also be understood as 'led out,' 'drew out,' or possibly 'armed.'
    reason: lexical_alternative
