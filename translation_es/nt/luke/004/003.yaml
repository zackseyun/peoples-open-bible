translation:
  language: es
  text: 'Entonces el diablo le dijo: «Si[a] eres el Hijo de Dios, dile a esta piedra que se convierta en pan».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ya que eres el Hijo de Dios». La condición griega puede entenderse como si asumiera la premisa para los fines del desafío, pero el texto principal conserva la forma condicional.'
    reason: alternative_reading
lexical_decisions:
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ funciona como conector discursivo suave. «Entonces» expresa mejor la progresión narrativa en español que un simple «Y», sin cargar el texto con una explicación añadida.
- source_word: διάβολος
  english_pob_choice: the devil
  chosen_spanish: el diablo
  alternatives_spanish:
  - el acusador
  - el calumniador
  lexicon: BDAG
  rationale: En este contexto narrativo, διάβολος es el designado personal conocido como Satanás. «El diablo» es la forma española clara y natural, y conserva el sentido reconocido del término.
- source_word: Εἰ
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Como
  - Ya que
  lexicon: BDAG
  rationale: La condición se mantiene como condición en español. «Si» preserva la fuerza de la tentación sin resolverla como un hecho asumido.
- source_word: υἱὸς ... τοῦ θεοῦ
  english_pob_choice: the Son of God
  chosen_spanish: el Hijo de Dios
  alternatives_spanish:
  - un hijo de Dios
  lexicon: BDAG
  rationale: En este contexto cristológico, el sintagma tiene valor titular y definido. «El Hijo de Dios» reproduce mejor esa referencia que una lectura indefinida.
- source_word: εἰπὲ
  english_pob_choice: tell
  chosen_spanish: dile
  alternatives_spanish:
  - di
  - ordénale
  lexicon: BDAG
  rationale: El imperativo aquí introduce un acto de habla dirigido a la piedra. «Dile» suena natural en español y conserva el valor de decir/hablar sin intensificarlo indebidamente como «ordénale».
- source_word: τῷ λίθῳ τούτῳ
  english_pob_choice: this stone
  chosen_spanish: a esta piedra
  alternatives_spanish:
  - a esta roca
  lexicon: BDAG
  rationale: 'λίθος normalmente es «piedra» en español. Se conserva el demostrativo y el destinatario del mandato con la preposición exigida por el español: «a esta piedra».'
- source_word: ἵνα γένηται
  english_pob_choice: to become
  chosen_spanish: que se convierta en
  alternatives_spanish:
  - para que se haga
  - que llegue a ser
  lexicon: BDAG
  rationale: La construcción final con ἵνα más subjuntivo puede expresarse naturalmente en español con «que se convierta en». Esta opción mantiene el resultado buscado sin volverla más interpretativa que el griego.
- source_word: ἄρτος
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - hogaza
  lexicon: BDAG
  rationale: ἄρτος corresponde de manera directa a «pan». «Pan» es la opción idiomática y precisa; «alimento» sería demasiado general y «hogaza» demasiado específica.
theological_decisions:
- issue: Fuerza de la condición en la tentación
  english_pob_reading: If you are the Son of God
  chosen_spanish_reading: Si eres el Hijo de Dios
  alternative_spanish_readings:
  - Como eres el Hijo de Dios
  rationale: Se conserva la forma condicional en lugar de convertirla en una premisa asumida. Así se mantiene la tensión narrativa y teológica del pasaje, tal como el auditorio en inglés fue preservado.
  doctrine_reference: Preservar la tensión cristológica sin resolverla interpretativamente.
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje griego de SBLGNT y es coherente con el audit trail inglés: mantiene δὲ como conector narrativo, διάβολος como designación personal clara, εἰ como condición y ἵνα γένηται como resultado expresado naturalmente en español. No se requieren notas textuales adicionales, porque el inglés POB documentó la alternativa ''Since you are the Son of God'', pero el español puede conservar la misma tensión sin ambigüedad extra.'
  spanish_consistency_notes:
  - Se usa «el Hijo de Dios» con artículo definido, en paralelo al valor titular del griego y al criterio auditado en inglés.
  - «Piedra» se prefiere aquí a «roca» porque λίθος denota una piedra concreta, no un peñasco grande.
  - «Pan» mantiene la equivalencia léxica directa de ἄρτος sin ampliar el sentido a 'alimento'.
  - El registro es moderno y reverente, evitando calcos innecesarios y manteniendo la claridad pública del texto.
