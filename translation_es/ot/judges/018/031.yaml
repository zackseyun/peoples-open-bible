translation:
  language: es
  text: Así pues, erigieron para sí la imagen tallada de Mica[a], la que él había hecho, todo el tiempo que estuvo la casa de Dios en Silo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ídolo». El término hebreo se refiere a una imagen cultual tallada; «imagen tallada» conserva el sentido concreto, mientras que «ídolo» hace más explícita su función.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשִׂימוּ לָהֶם
  english_pob_choice: they set up for themselves
  chosen_spanish: se pusieron para sí
  alternatives_spanish:
  - la colocaron para sí
  - la instalaron para sí
  lexicon: HALOT
  rationale: El hebreo expresa acción de poner/colocar con matiz reflexivo de beneficio propio. En español, "se pusieron para sí" conserva ese valor reflexivo y, en el contexto cultual, comunica que la imagen quedó establecida para su uso, sin forzar una paráfrasis más interpretativa.
- source_word: פֶּסֶל
  english_pob_choice: carved image
  chosen_spanish: imagen tallada
  alternatives_spanish:
  - ídolo
  - imagen esculpida
  lexicon: HALOT
  rationale: פֶּסֶל nombra una imagen cultual hecha por mano humana. "Imagen tallada" preserva la concreción material de la forma y evita tanto el tecnicismo arcaico como la interpretación más explícita de "ídolo". Mantiene la tensión entre objeto físico y función religiosa impropia.
- source_word: מִיכָה
  english_pob_choice: Micah
  chosen_spanish: Micaía
  alternatives_spanish:
  - Miqueas
  - Micá
  lexicon: transliteración bíblica estándar en español
  rationale: El nombre propio se vierte con una forma bíblica reconocible en español. "Micaía" es la transliteración más cercana y evita confusión con el profeta Miqueas.
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: that he had made
  chosen_spanish: la que él había hecho
  alternatives_spanish:
  - que él hizo
  - la cual había hecho
  lexicon: HALOT
  rationale: La relativa modifica a "imagen tallada". El pretérito pluscuamperfecto en español reproduce bien la anterioridad respecto de "se pusieron" y conserva el flujo narrativo del hebreo.
- source_word: כָּל יְמֵי הֱיוֹת
  english_pob_choice: all the days that ... was
  chosen_spanish: todo el tiempo que estuvo
  alternatives_spanish:
  - todos los días que estuvo
  - mientras estuvo
  lexicon: HALOT
  rationale: La expresión hebrea es durativa. "Todo el tiempo que estuvo" suena natural en español y preserva el sentido de duración continua sin añadir matices ajenos.
- source_word: בֵּית הָאֱלֹהִים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - la casa de Dios verdadero
  - el santuario de Dios
  lexicon: HALOT
  rationale: Se sigue de cerca la construcción hebrea sin sustituirla por un equivalente más interpretativo. "Casa de Dios" conserva el término del audit trail inglés y mantiene la tensión teológica del contraste con el culto ilícito.
- source_word: בְּשִׁלֹה
  english_pob_choice: in Shiloh
  chosen_spanish: en Silo
  alternatives_spanish:
  - en Siló
  lexicon: topónimo bíblico español
  rationale: Se usa la forma tradicional española "Silo" para el lugar, ampliamente reconocible y fiel al topónimo bíblico.
theological_decisions:
- issue: Conservar la tensión entre la imagen cultual de Micaía y la ubicación legítima de la casa de Dios en Silo
  english_pob_reading: the house of God
  chosen_spanish_reading: la casa de Dios
  alternative_spanish_readings:
  - el santuario de Dios
  - la casa del verdadero Dios
  rationale: El hebreo no añade una glosa polémica; simplemente contrasta la permanencia del objeto cultual con la permanencia del centro legítimo de adoración en Silo. "La casa de Dios" mantiene esa tensión narrativa sin resolverla ni suavizarla.
  doctrine_reference: Preservar la tensión teológica del texto narrativo.
translation_notes:
  revision_awareness: Se ha seguido de cerca el texto hebreo WLC y el audit trail inglés. No se han aplicado revisiones posteriores; el estado de concordancia del control cruzado es alto y no requiere cambios adicionales.
  spanish_consistency_notes:
  - Se mantiene el nombre divino y los términos cultuales con una equivalencia transparente y no eufemística.
  - '"Casa de Dios" se conserva por fidelidad al hebreo y por coherencia con la decisión inglesa auditada.'
  - La puntuación y el orden de los miembros de la oración siguen de cerca la sintaxis hebrea, pero con español natural y publicable.
