translation:
  language: es
  text: ¿Por qué se nos ha infundido tal contienda[a], y por qué nos agrada una resistencia mortal, cuando es posible vivir en tranquilidad obedeciendo al rey, después de haber llegado a temer los tormentos que llevan a la muerte?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La apertura griega es sintácticamente difícil en el testimonio de Swete; el sentido es que se ofrecía una vida tranquila si cedían por temor a los tormentos mortíferos.
    reason: textual_variant
lexical_decisions:
- source_word: πόθεν
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿De dónde
  - ¿Cómo es que
  lexicon: LSJ
  rationale: Introduce una pregunta retórica de causa o motivo. «¿Por qué» conserva la fuerza causal de la expresión griega en un español natural.
- source_word: ἡ τοσαύτη ἐντέτηκεν φιλονεικία
  english_pob_choice: has such contentiousness been instilled in us
  chosen_spanish: se nos ha infundido tal contienda
  alternatives_spanish:
  - se nos ha implantado tanta contentiousness
  - se nos ha incorporado tal amor por la disputa
  lexicon: LSJ
  rationale: φιλονεικία expresa contienda, amor por la disputa o actitud contenciosa; «contienda» mantiene el matiz de conflicto verbal y de oposición. ἐντέτηκεν sugiere algo injertado o infusionado interiormente; «se nos ha infundido» conserva esa imagen sin sonar artificial.
- source_word: ἡ θανατηφόρος ... καρτερία
  english_pob_choice: deadly endurance
  chosen_spanish: una resistencia mortal
  alternatives_spanish:
  - una firmeza que da muerte
  - una perseverancia letal
  - una resistencia hasta la muerte
  lexicon: LSJ
  rationale: καρτερία es resistencia, constancia o perseverancia; θανατηφόρος añade la cualidad de mortal o mortífera. «Resistencia mortal» mantiene el carácter hostil con el que habla el tirano sin suavizarlo en virtud martirial.
- source_word: ἀρέσκει
  english_pob_choice: please us
  chosen_spanish: nos agrada
  alternatives_spanish:
  - nos gusta
  - nos parece agradable
  lexicon: LSJ
  rationale: El verbo indica que esa resistencia resulta atractiva o agradable al sujeto; «nos agrada» es idiomático y conserva la relación personal del verbo.
- source_word: μετὰ ἀταραξίας ζῆν
  english_pob_choice: to live in tranquility
  chosen_spanish: vivir en tranquilidad
  alternatives_spanish:
  - vivir en paz
  - vivir sin perturbación
  - vivir sin sobresaltos
  lexicon: LSJ
  rationale: ἀταραξία denota calma, ausencia de perturbación. «Tranquilidad» comunica bien ese estado y conserva el tono moral y reflexivo del pasaje.
- source_word: τῷ βασιλεῖ πεισθέντας
  english_pob_choice: by obeying the king
  chosen_spanish: obedeciendo al rey
  alternatives_spanish:
  - habiendo sido persuadidos por el rey
  - cediendo al rey
  lexicon: LSJ
  rationale: πεισθέντας puede significar «ser persuadidos» o, en contexto político, «ceder/obedecer». Con un rey en este contexto, «obedeciendo al rey» comunica de forma clara la idea de conformidad.
- source_word: θανατοῖ φοβηθέντας τὰ βασανιστήρια
  english_pob_choice: after becoming afraid of the tortures that lead to death
  chosen_spanish: después de habernos atemorizado con los tormentos que llevan a la muerte
  alternatives_spanish:
  - temiendo los tormentos mortales
  - habiéndonos aterrorizado los tormentos mortales
  - después de temer los tormentos de muerte
  lexicon: LSJ
  rationale: La secuencia griega es sintácticamente difícil, y el texto apunta a la idea de ceder por temor a tormentos mortíferos. «Después de habernos atemorizado con los tormentos que llevan a la muerte» mantiene la relación con el temor y la fuerza mortífera sin añadir una reconstrucción demasiado específica.
theological_decisions:
- issue: Tono hostil del discurso del rey frente a la valoración positiva posterior del martirio
  english_pob_reading: Render the language as hostile rhetoric ('contentiousness,' 'deadly endurance') rather than as narrator-approved virtue terms.
  chosen_spanish_reading: Traducir con léxico negativo o acusatorio («contienda», «resistencia mortal») y no con términos que suenen a elogio («celo», «valor», «fortaleza»).
  alternative_spanish_readings:
  - Traducir más positivamente como «celo» o «coraje»
  - Suavizar «resistencia mortal» a «constancia»
  rationale: En este versículo habla el tirano tratando de avergonzar y presionar a los hermanos. La traducción debe conservar su marco retórico hostil y no borrar la tensión teológica con el aprecio posterior del libro por la perseverancia martirial.
  doctrine_reference: Mantener la tensión interpretativa del texto; primacía del griego y del contexto narrativo sobre la tradición devocional.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que sustituyó una expresión más fuerte y menos precisa por «contentiousness»; por eso se eligió «contienda» y se mantuvo el paralelismo retórico con la pregunta sobre la «resistencia mortal».
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «rey» en singular porque el griego usa τῷ βασιλεῖ en sentido concreto y narrativo.
  - Se evitó «siervo» u otro vocabulario litúrgico porque no hay base léxica en el pasaje.
  - «Tormentos» conserva el matiz de βασανιστήρια y el plural del griego; «muerte» se expresa con «la muerte» para reflejar la construcción final del verso.
