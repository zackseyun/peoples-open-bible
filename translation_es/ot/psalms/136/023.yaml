translation:
  language: es
  text: que se acordó de nosotros en nuestra humillación[b], porque su amor leal es para siempre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «porque para siempre perdura su amor leal».'
    reason: lexical_alternative
  - marker: b
    text: «Humillación» también puede entenderse como «estado abatido» o «bajo estado».
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׁבְּשִׁפְלֵנוּ
  english_pob_choice: in our low estate
  chosen_spanish: en nuestro bajo estado
  alternatives_spanish:
  - en nuestra humillación
  - cuando estábamos abatidos
  - en nuestra condición baja
  lexicon: HALOT
  rationale: La frase hebrea introduce la circunstancia de humillación o bajeza en la que Dios recordó a su pueblo. 'Bajo estado' conserva la idea de abatimiento sin decidir demasiado entre humillación social, aflicción o debilidad, y sigue de cerca la decisión inglesa auditada.
- source_word: זָכַר
  english_pob_choice: remembered
  chosen_spanish: se acordó de
  alternatives_spanish:
  - recordó
  - tuvo presente
  - se hizo cargo de
  lexicon: HALOT
  rationale: En español, 'se acordó de nosotros' expresa con naturalidad el verbo hebreo 'recordar' sin perder la referencia relacional/covenantal. 'Recordó' sería más literal, pero menos idiomático en esta construcción.
- source_word: לָנוּ
  english_pob_choice: us
  chosen_spanish: de nosotros
  alternatives_spanish:
  - nos
  - para nosotros
  lexicon: HALOT
  rationale: El hebreo usa el objeto con זכר de manera idiomática; en español, la forma natural con 'acordarse' exige la preposición 'de'. Esto evita una traducción torpe y mantiene la relación gramatical correcta.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque en efecto
  lexicon: HALOT
  rationale: En el refrán del Salmo 136, la partícula introduce la razón o fundamento de la acción divina. 'Porque' comunica esa relación causal de forma clara en español.
- source_word: לְעוֹלָם
  english_pob_choice: is forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  - para siempre dura
  lexicon: HALOT
  rationale: El hebreo expresa duración sin verbo explícito; en español, 'para siempre' reproduce con naturalidad la permanencia del amor leal de Yahvé sin añadir una paráfrasis excesiva.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor leal
  alternatives_spanish:
  - su amor constante
  - su misericordia leal
  - su bondad fiel
  lexicon: HALOT
  rationale: חֶסֶד denota lealtad amorosa de pacto. 'Amor leal' mantiene la fuerza relacional y covenantal que 'misericordia' podría suavizar y que 'amor' solo podría diluir.
theological_decisions:
- issue: 'Cómo rendir el refrán del Salmo 136: כִּי לְעוֹלָם חַסְדּוֹ'
  english_pob_reading: for his steadfast love is forever
  chosen_spanish_reading: porque para siempre es su amor leal
  alternative_spanish_readings:
  - porque su amor leal es para siempre
  - porque para siempre perdura su amor leal
  - porque su misericordia es para siempre
  rationale: Se conserva el tono refránico y la duración permanente del חסד divino. 'Amor leal' evita reducir חסד a mero sentimiento y mantiene la dimensión fiel de pacto que la POB inglesa documenta como 'steadfast love'.
  doctrine_reference: Teología bíblica del חסד y fidelidad de Yahvé en el Salterio; filosofía de equivalencia óptima y primacía de la fuente.
translation_notes:
  revision_awareness: La revisión inglesa auditada prefirió 'low estate' sobre 'low condition' por mayor naturalidad y formalidad. La versión española refleja esa preferencia con 'bajo estado', manteniendo abierta la posibilidad semántica de humillación o abatimiento sin cerrarla en una sola interpretación.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino conforme al criterio del proyecto, aunque este verso no lo contiene explícitamente.
  - '''Amor leal'' se mantiene como equivalente estable de חֶסֶד para conservar coherencia con otros salmos y pasajes del proyecto.'
  - La construcción reflexiva 'se acordó de' es la opción española idiomática para זָכַר con objeto humano.
  - Se evita 'misericordia' como opción principal porque puede estrechar el campo semántico de חֶסֶד y debilitar su matiz de fidelidad de pacto.
