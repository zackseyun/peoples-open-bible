translation:
  language: es
  text: Los arcos de los valientes[a] son quebrados[b], pero los que tropiezan son ceñidos con fuerza[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los poderosos’.
    reason: lexical_alternative
  - marker: b
    text: O ‘son rotos’.
    reason: lexical_alternative
  - marker: c
    text: O ‘han ceñido fuerza’.
    reason: lexical_alternative
lexical_decisions:
- source_word: קֶשֶׁת
  english_pob_choice: bows
  chosen_spanish: los arcos
  alternatives_spanish:
  - el arco
  lexicon: HALOT
  rationale: Aunque el sustantivo hebreo está en singular, el contexto poético lo usa de manera colectiva, como en inglés POB. En español, el plural 'los arcos' comunica mejor el valor colectivo y mantiene la imagen militar concreta.
- source_word: גִּבֹּרִים
  english_pob_choice: the mighty
  chosen_spanish: los valientes
  alternatives_spanish:
  - los poderosos
  - los guerreros
  - los héroes
  lexicon: HALOT
  rationale: '''גִּבֹּרִים'' denota personas fuertes o valerosas, a menudo guerreros. ''Los valientes'' conserva la amplitud semántica y la resonancia poética sin reducir el término solo a soldados.'
- source_word: חַתִּים
  english_pob_choice: are shattered
  chosen_spanish: son quebrados
  alternatives_spanish:
  - son rotos
  - son quebrantados
  - están quebrados
  lexicon: HALOT
  rationale: En el contexto con 'arcos', la idea principal es que quedan destrozados o vencidos, no solo desanimados. 'Son quebrados' preserva la fuerza concreta del paralelismo y permite la alternativa lexical documentada.
- source_word: נִכְשָׁלִים
  english_pob_choice: those who stumble
  chosen_spanish: los que tropiezan
  alternatives_spanish:
  - los que vacilan
  - los que flaquean
  - los que caen
  lexicon: HALOT
  rationale: El participio alude literalmente a quienes tropiezan o tambalean. 'Los que tropiezan' mantiene la metáfora corporal y el contraste de reversión con claridad natural en español.
- source_word: אָזְרוּ
  english_pob_choice: are girded
  chosen_spanish: son ceñidos
  alternatives_spanish:
  - han ceñido
  - se ciñen
  - son revestidos
  lexicon: HALOT
  rationale: El verbo significa ceñir o ajustar con algo alrededor del cuerpo, a menudo para prepararse o equiparse. 'Son ceñidos' reproduce la pasiva poética del inglés y no fuerza un matiz reflexivo que el hebreo no exige aquí.
- source_word: חָיִל
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - valor
  - poder
  - fuerza militar
  lexicon: HALOT
  rationale: El sustantivo puede significar fuerza, valor o poder militar. 'Fuerza' encaja bien con el paralelismo y mantiene la amplitud del campo semántico sin estrecharlo solo a lo bélico.
theological_decisions:
- issue: Imagen poética de reversión de fuerzas
  english_pob_reading: Retain the concrete martial and bodily metaphors ('bows,' 'stumble,' 'girded') rather than flattening them into abstract statements about social reversal.
  chosen_spanish_reading: Conservar las metáforas concretas de guerra y del cuerpo ('arcos,' 'tropiezan,' 'ceñidos') en lugar de convertir el verso en una afirmación abstracta sobre la inversión social.
  alternative_spanish_readings:
  - Los instrumentos de guerra de los fuertes son destruidos, pero los débiles se vuelven fuertes.
  - Los poderosos son vencidos, pero los débiles son fortalecidos.
  rationale: El verso pertenece al cántico poético de Ana y transmite teológicamente la inversión de la fuerza humana bajo la acción de Yahvé. Mantener las imágenes concretas preserva la carga literaria y teológica sin añadir interpretación.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo total y no introdujo cambios; esta redacción sigue de cerca el análisis hebreo y el audit trail inglés, conservando el paralelismo poético y las alternativas léxicas documentadas.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' solo cuando el contexto lo requiera; este versículo no contiene el nombre divino.
  - Se preservó el plural colectivo de 'קֶשֶׁת' como 'los arcos', coherente con el uso colectivo señalado en el audit trail.
  - Se eligió 'son ceñidos' para reflejar la pasiva poética de 'are girded' sin introducir una lectura reflexiva obligatoria.
  - La puntuación y el orden siguen la estructura antitética del hebreo y del texto inglés auditado.
