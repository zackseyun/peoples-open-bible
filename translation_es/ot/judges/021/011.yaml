translation:
  language: es
  text: 'Y esto es lo que harán: todo varón, y toda mujer[a] que haya conocido el lecho de un varón, los dedicarán a la destrucción[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «toda mujer que haya tenido relaciones sexuales con un hombre».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo «dedicar a la destrucción» se refiere a poner a alguien bajo el ban para su destrucción, no meramente a matarlo de manera ordinaria.
    reason: cultural_note
lexical_decisions:
- source_word: וְזֶה הַדָּבָר אֲשֶׁר תַּעֲשׂוּ
  english_pob_choice: And this is what you shall do
  chosen_spanish: Y esto es lo que harán
  alternatives_spanish:
  - Y esta es la cosa que harán
  - Y esto es lo que ustedes harán
  lexicon: HALOT
  rationale: La construcción hebrea introduce una instrucción concreta; en español, 'esto es lo que harán' conserva la fluidez y el valor imperativo sin volverla artificial. Se mantiene el enlace narrativo con 'Y'.
- source_word: כָּל זָכָר
  english_pob_choice: every male
  chosen_spanish: todo varón
  alternatives_spanish:
  - todo macho
  - todo hombre
  - todo varón
  lexicon: HALOT
  rationale: זָכָר denota sexo masculino, pero en español 'varón' comunica mejor el referente humano y evita la aspereza de 'macho'. Se preserva la precisión de sexo más que estatus social.
- source_word: וְכָל אִשָּׁה
  english_pob_choice: and every woman
  chosen_spanish: toda mujer
  alternatives_spanish:
  - toda hembra
  - toda esposa
  lexicon: HALOT
  rationale: אִשָּׁה aquí contrasta naturalmente con זָכָר; 'mujer' es el equivalente español más claro y fiel. 'Esposa' sería demasiado específico.
- source_word: יֹדַעַת
  english_pob_choice: has known
  chosen_spanish: haya conocido
  alternatives_spanish:
  - ha conocido
  - haya tenido relaciones con
  lexicon: HALOT
  rationale: El participio ידע funciona como eufemismo sexual. 'Haya conocido' conserva el giro hebreo y el matiz eufemístico; el subjuntivo relativo encaja con la subordinada descriptiva en español.
- source_word: מִשְׁכַּב זָכָר
  english_pob_choice: the bed of a male
  chosen_spanish: la cama de varón
  alternatives_spanish:
  - el lecho de varón
  - relaciones sexuales con un hombre
  lexicon: HALOT
  rationale: Se mantiene la imagen hebrea del 'lecho/cama de varón' para no borrar el eufemismo original. Dado que en español puede sonar menos natural, la explicación más explícita queda reflejada en la nota de pie.
- source_word: תַּחֲרִימוּ
  english_pob_choice: you shall devote to destruction
  chosen_spanish: la dedicarán a la destrucción
  alternatives_spanish:
  - la destruirán por completo
  - la pondrán bajo anatema
  lexicon: HALOT
  rationale: 'חרם implica más que matar: es consagrar algo/persona a destrucción bajo una prohibición sacra. ''Dedicarán a la destrucción'' conserva esa fuerza técnica mejor que un simple ''matarán'' o ''destruirán''.'
theological_decisions:
- issue: Sentido técnico de חרם en contexto de guerra/juicio
  english_pob_reading: devote to destruction
  chosen_spanish_reading: dedicarán a la destrucción
  alternative_spanish_readings:
  - destruirán por completo
  - pondrán bajo anatema
  rationale: El hebreo describe una acción de ban/consagración a destrucción, no solo violencia ordinaria. La solución elegida mantiene la tensión teológica y legal sin recurrir a un término eclesiástico opaco.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
- issue: Eufemismo sexual en יֹדַעַת מִשְׁכַּב זָכָר
  english_pob_reading: woman who has known the bed of a male
  chosen_spanish_reading: mujer que haya conocido la cama de varón
  alternative_spanish_readings:
  - mujer que haya tenido relaciones con un hombre
  - mujer que haya yacido con un varón
  rationale: Se preserva el eufemismo hebreo en el texto principal para respetar la forma del original. La nota provee la equivalencia explícita para evitar ambigüedad en español.
  doctrine_reference: Translation philosophy §2 (preservar la evidencia léxica del original)
translation_notes:
  revision_awareness: 'El pasaje muestra alta concordancia con la revisión auditada reciente: no se registraron cambios aplicados y la redacción inglesa establecida ya reflejaba la decisión técnica sobre חרם y el eufemismo sexual. Esta versión española sigue esas decisiones sin introducir una paráfrasis más amplia ni suavizar la fuerza del mandato.'
  spanish_consistency_notes:
  - Se mantuvo 'varón' para זָכָר y 'mujer' para אִשָּׁה, conservando el contraste sexual del hebreo.
  - Se preservó el paralelismo con 'todo... y toda...' y el tono jurídico-instructivo del inicio.
  - '''Dedicarán a la destrucción'' conserva el valor técnico de חרם y evita sustituirlo por el más débil ''matarán''.'
  - La nota del marcador a explicita el eufemismo sexual sin borrar la imagen hebrea en el texto principal.
