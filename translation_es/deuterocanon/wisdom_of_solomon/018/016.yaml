revisions:
- from: llevando tu espada aguda —tu mandato sin fingimiento— y, estando en pie, llenó todas las cosas de muerte; y mientras tocaba el cielo[a], había puesto el pie sobre la tierra.
  to: llevando tu espada afilada —tu mandato sin fingimiento— y, de pie, llenó todas las cosas de muerte; y mientras tocaba el cielo[a], había pisado la tierra.
  rationale: 'La revisión hace ajustes estilísticos menores para mejorar la naturalidad y la fuerza idiomática del español sin apartarse del griego ni de las decisiones documentadas del POB inglés: «afilada» por «aguda», «de pie» por «estando en pie», y «había pisado la tierra» por una formulación más pesada.'
