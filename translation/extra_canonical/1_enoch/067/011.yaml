translation:
  text: And the waters themselves will be changed in those days[a], for when those angels are judged in those waters, these springs of water will change, and when the angels ascend[c][b], that water of the springs will change and grow cold.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Ge'ez wording is difficult in the middle of the verse. The phrase rendered 'the heat of those springs of water' may more literally refer to the hot condition of the water-springs; the sense is inferred from the closing statement that they 'grow cold.'
    reason: lexical_alternative
  - marker: b
    text: The clause 'when the angels ascend' is retained literally. In context it may refer to the judged angels coming up in relation to the springs or fiery waters, but the exact picture is uncertain in the Ethiopic witness.
    reason: alternative_reading
  - marker: c
    text: Or 'for when those angels are judged, the heat of those springs of water will be changed'.
    reason: previous_rendering
lexical_decisions:
- source_word: ኪያሁ
  chosen: themselves
  alternatives:
  - also
  - even
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'Used as an emphatic particle/pronoun, giving stress to ''the waters'' as the subject: not merely the angels, but the waters themselves undergo alteration.'
- source_word: ማያት
  chosen: waters
  alternatives:
  - water
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The plural form is retained because the verse speaks of multiple springs and their changing condition, preserving the concrete apocalyptic imagery.
- source_word: ተውላጠ
  chosen: will undergo change
  alternatives:
  - will be altered
  - will be transformed
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: A change-state verb; 'undergo change' preserves the passive/inchoative sense without overstating it as total transformation.
- source_word: ይትኴነኑ
  chosen: are judged
  alternatives:
  - are condemned
  - are brought to judgment
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Judicial language is central in this context. 'Are judged' preserves the formal apocalyptic judgment scene without prematurely specifying the verdict.
- source_word: ይትዌለጡ ዐያኖሙ
  chosen: the heat ... will be changed
  alternatives:
  - their hotness will be altered
  - their warmth will change
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The phrase appears to refer to the hot condition or heat of the waters/springs. Because the verse contrasts this with becoming cold, 'heat' best captures the sense.
- source_word: አንቅዐተ ማያት
  chosen: springs of water
  alternatives:
  - fountains of water
  - water-sources
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Rendered concretely as 'springs of water' to preserve the image of geothermal or eruptive water sources in the visionary landscape.
- source_word: የዐርጉ
  chosen: ascend
  alternatives:
  - go up
  - rise up
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The basic upward-motion verb is kept. In context it likely refers to the angels coming up/out in relation to the springs, but 'ascend' preserves the vivid motion without over-interpreting.
- source_word: ይትዌለጥ
  chosen: will change
  alternatives:
  - will be altered
  - will turn
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Same semantic field as the earlier change verb; a simple rendering keeps the repeated motif of alteration in the waters.
- source_word: ይቈርሩ
  chosen: grow cold
  alternatives:
  - become cold
  - cool down
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: The final verb marks the result of the change in the springs. 'Grow cold' is natural English and preserves the contrast with prior heat.
