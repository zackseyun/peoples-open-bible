review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura del hebreo y mantiene el matiz volitivo de oración. Conserva correctamente 'los que se refugian en ti', 'Extiende tu protección sobre ellos' y 'los que aman tu nombre'. Sin embargo, en יְרַנֵּנוּ el hebreo/POB prioriza el matiz de clamor jubiloso más que el de canto, y 'canten con júbilo' desplaza indebidamente el sentido principal hacia cantar. Además, וְיַעְלְצוּ בְךָ expresa exultación/regocijo en Dios; 'se llenen de gozo en ti' es aceptable pero menos directo y menos equivalente que 'se regocijen/exulten en ti'.
  spanish_quality_summary: El español es claro y digno, pero puede afinarse para mayor naturalidad poética y fidelidad léxica. 'Para siempre griten de alegría' suena bien y conserva mejor la fuerza vocal del hebreo. 'Para que se regocijen en ti' es más directo y elegante que 'para que se llenen de gozo en ti'. Las notas deben corregirse para que el marcador [a] ancle la alternativa del verbo de clamor jubiloso, no la frase equivocada.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparece el nombre divino. 'Tu nombre' se preserva correctamente. La decisión sobre חסה como 'refugiarse' está alineada con la filosofía del proyecto.
  issues:
  - severity: medium
    issue: יְרַנֵּנוּ se tradujo como 'canten con júbilo'
    rationale: El POB inglés documenta como principal 'shout for joy', con 'sing for joy' solo como alternativa. El hebreo רנן en este contexto enfatiza clamor jubiloso; 'canten' estrecha demasiado el sentido.
  - severity: medium
    issue: La nota [a] está mal orientada respecto al anclaje semántico
    rationale: La nota actual ofrece como alternativa precisamente la frase principal inglesa, pero el texto español principal ya eligió 'canten con júbilo'. La nota debería reflejar la alternativa real en español desde un texto principal que preserve mejor el sentido básico.
  - severity: low
    issue: וְיַעְלְצוּ בְךָ quedó como 'se llenen de gozo en ti'
    rationale: No es incorrecto, pero es menos preciso y menos cercano al valor verbal de exultar/regocijarse. 'Se regocijen en ti' o 'exulten en ti' preserva mejor la acción verbal y la relación 'en ti'.
  revised_spanish_text: Pero alégrense todos los que se refugian en ti; para siempre griten de alegría[a]. Extiende tu protección sobre ellos[b], para que se regocijen en ti los que aman tu nombre.
