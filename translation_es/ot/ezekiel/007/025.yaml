translation:
  language: es
  text: La angustia[a] ha venido, y buscarán la paz, pero no la hay.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Terror ha venido», «Calamidad ha venido» o «Horror ha venido». El sustantivo hebreo es poco común y puede subrayar tanto el espanto mismo como la condición desastrosa producida por el juicio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קְפָדָה
  english_pob_choice: anguish
  chosen_spanish: angustia
  alternatives_spanish:
  - terror
  - horror
  - calamidad
  - destrucción
  lexicon: HALOT
  rationale: El sustantivo es raro y el contexto de juicio permite más de una matización. «Angustia» conserva el valor de aflicción intensa y experiencia de calamidad sin fijar de más si el énfasis recae en el pavor o en el desastre producido.
- source_word: בָא
  english_pob_choice: has come
  chosen_spanish: ha venido
  alternatives_spanish:
  - ha llegado
  - viene
  - está viniendo
  lexicon: HALOT
  rationale: El perfecto expresa un hecho presentado como ya ocurrido en el anuncio profético. «Ha venido» transmite esa llegada consumada de modo natural en español, sin forzar un giro demasiado literal.
- source_word: וּבִקְשׁוּ
  english_pob_choice: they will seek
  chosen_spanish: buscarán
  alternatives_spanish:
  - buscarán con empeño
  - procurarán
  - buscan
  lexicon: HALOT
  rationale: En la secuencia profética, la forma verbal mira al resultado posterior al juicio. «Buscarán» conserva la referencia futura y el sentido de procurar algo deseado.
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: la paz
  alternatives_spanish:
  - bienestar
  - plenitud
  - seguridad
  lexicon: HALOT
  rationale: «Paz» es la equivalencia más directa y reconocible; aquí abarca más que tranquilidad interior, incluyendo seguridad y bienestar, como en el hebreo.
- source_word: וָאָיִן
  english_pob_choice: but there is none
  chosen_spanish: pero no la habrá
  alternatives_spanish:
  - y no habrá
  - pero no existe
  - y no hay
  lexicon: HALOT
  rationale: El hebreo niega la existencia de la paz buscada. «Pero no la habrá» recoge la fuerza adversativa y evita una expresión menos idiomática, manteniendo la negación absoluta.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registran cambios necesarios en el sentido general del versículo ni en su lectura profética.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto solo cuando el texto lo requiera; en este versículo no aparece el nombre divino.
  - Se preserva el paralelismo breve del hebreo con dos miembros principales y una clausula final de negación.
  - La nota alternativa se coloca en el sustantivo raro para conservar la tensión semántica documentada por el audit trail inglés.
