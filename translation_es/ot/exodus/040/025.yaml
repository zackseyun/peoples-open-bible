translation:
  language: es
  text: Y él colocó las lámparas[a] delante de Yahvé, tal como Yahvé había ordenado a Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hizo subir las lámparas»; la expresión puede referirse tanto a colocarlas/instalarlas como a encenderlas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: set up
  chosen_spanish: colocó
  alternatives_spanish:
  - puso
  - dispuso
  - encendió
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'hizo subir' (עלה en hifil), pero en este contexto cultual puede referirse al arreglo/instalación de las lámparas o a su encendido. 'Colocó' mantiene la amplitud del verbo sin decidir más de lo que el hebreo exige, y funciona con naturalidad en español.
- source_word: הַנֵּרֹת
  english_pob_choice: the lamps
  chosen_spanish: las lámparas
  alternatives_spanish:
  - las luces
  lexicon: HALOT
  rationale: נֵרֹת designa unidades concretas de lámpara, no la luz en abstracto. 'Lámparas' conserva esa concreción y el registro ritual del pasaje.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: לִפְנֵי expresa una ubicación cultual/relacional, bien rendida por 'delante de'. 'En presencia de' también es posible, pero 'delante de' preserva mejor la formulación bíblica sin sonar arcaica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se conserva el nombre divino propio, no una sustitución por título. En español, la forma establecida en este proyecto es 'Yahvé', que refleja la transliteración del Tetragrámaton y mantiene la continuidad doctrinal del texto base.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - como
  - justamente como
  lexicon: HALOT
  rationale: La conjunción introduce conformidad exacta con una orden previa. 'Tal como' expresa esa correspondencia sin añadir énfasis innecesario.
- source_word: צִוָּה
  english_pob_choice: had commanded
  chosen_spanish: había ordenado
  alternatives_spanish:
  - había mandado
  - había comandado
  lexicon: HALOT
  rationale: El perfecto indica una orden previa a la acción narrada. 'Había ordenado' transmite bien esa anterioridad y mantiene el tono formal del mandato.
- source_word: אֶת מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: El marcador de objeto directo אֶת señala a Moisés como receptor de la orden; en español, la preposición 'a' expresa naturalmente ese destinatario del mandato.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. La traducción mantiene el nombre propio divino en lugar de sustituirlo por un título, de acuerdo con la política del proyecto y con la lectura auditada del inglés POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La revisión auditada del inglés POB no introdujo cambios; el punto sensible ya señalado es el valor de עלה en este contexto, que se preserva mediante una solución española igualmente abierta.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como forma estándar del nombre divino en todo el texto.
  - '''Tal como'' reproduce la idea de conformidad exacta sin perder naturalidad.'
  - '''Colocó'' evita fijar innecesariamente si la acción fue instalar, disponer o encender las lámparas.'
