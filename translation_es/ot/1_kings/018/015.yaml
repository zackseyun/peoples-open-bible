revisions:
- from: 'Y Elías dijo[a]: «¡Vive Yahvé de los ejércitos, ante quien estoy de pie, que hoy me presentaré ante él!»'
  to: 'Y Elías dijo[a]: «Tan cierto como que vive Yahvé de los Ejércitos, delante de quien estoy, hoy me presentaré ante él».'
  rationale: Se ajusta la fórmula juratoria a un español más natural y solemne, se suaviza una literalidad rígida en «estoy de pie», se elimina la exclamación innecesaria y se conserva la nota léxica sobre אֵרָאֶה.
