translation:
  language: es
  text: Y las formas de la sabiduría son la prudencia, la justicia[a], el valor y el dominio propio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rectitud» para «justicia» (δικαιοσύνη). Aquí el contexto es una lista de virtudes, por lo que se prefiere «justicia».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴδεα
  english_pob_choice: forms
  chosen_spanish: modos
  alternatives_spanish:
  - formas
  - aspectos
  - clases
  lexicon: LSJ
  rationale: En la lista de virtudes, εἴδεα señala las manifestaciones o modos en que la sabiduría se expresa. «Modos» conserva el valor de diversidad interna sin sonar tan técnico como «formas» en español, y evita sugerir especies filosóficas demasiado rígidas.
- source_word: καθεστᾶσιν
  english_pob_choice: are
  chosen_spanish: son
  alternatives_spanish:
  - consisten en
  - están constituidos por
  - se establecen como
  lexicon: LSJ
  rationale: El verbo presenta una relación de constitución o identificación. En español, «son» transmite con naturalidad esa fuerza copulativa en una enumeración de virtudes.
- source_word: φρόνησις
  english_pob_choice: prudence
  chosen_spanish: prudencia
  alternatives_spanish:
  - sabiduría práctica
  - entendimiento
  - buen juicio
  lexicon: LSJ
  rationale: En un catálogo de virtudes, φρόνησις corresponde bien a la virtud clásica de la prudencia. «Prudencia» mantiene el registro ético-filosófico del griego y coincide con la opción auditada en inglés.
- source_word: δικαιοσύνη
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justificación
  lexicon: LSJ
  rationale: Aquí δικαιοσύνη aparece en una lista de virtudes filosóficas, no en un marco covenantal o paulino. Por eso «justicia» es la equivalencia más adecuada; «rectitud» queda como alternativa semántica cercana, pero menos precisa en este contexto.
- source_word: ἀνδρία
  english_pob_choice: courage
  chosen_spanish: valor
  alternatives_spanish:
  - coraje
  - fortaleza
  - bravura
  lexicon: LSJ
  rationale: ἀνδρία es la virtud del valor o la fortaleza moral. «Valor» comunica esa idea de forma clara y digna en español moderno, sin cargar la etimología masculina del término griego.
- source_word: σωφροσύνη
  english_pob_choice: self-control
  chosen_spanish: dominio propio
  alternatives_spanish:
  - templanza
  - autocontrol
  - moderación
  lexicon: LSJ
  rationale: En discurso de virtudes, σωφροσύνη implica contención disciplinada y gobierno de uno mismo. «Dominio propio» conserva el sentido moral de la expresión y suena natural para lectores contemporáneos.
theological_decisions:
- issue: δικαιοσύνη en una lista de virtudes filosóficas
  english_pob_reading: justice
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  rationale: El contexto inmediato es un catálogo de virtudes cardinales. En ese marco, «justicia» refleja mejor la categoría ética del griego que una traducción más teológica como «rectitud».
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δικαιοσύνη; Translation philosophy #5'
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando la nota al pie sin ancla. Esta versión no incluye notas de pie porque la redacción española ya integra la decisión léxica de δικαιοσύνη sin necesitar una alternativa explícita en el texto.
  spanish_consistency_notes:
  - Se mantuvo un registro elevado y publicable, acorde con una lista de virtudes.
  - Se evitó traducir mecánicamente desde el inglés; el español se ajusta directamente al griego y a la terminología POB.
  - Se conservó la secuencia enumerativa de cuatro virtudes, sin añadir conectores interpretativos más allá de la copulativa necesaria.
