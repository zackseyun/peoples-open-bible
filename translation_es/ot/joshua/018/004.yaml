revisions:
- from: Provean[a] para ustedes tres hombres por tribu, y yo los enviaré; ellos se levantarán y recorrerán la tierra, y la escribirán[b] conforme a su heredad, y vendrán a mí.
  to: Provean[a] para ustedes tres hombres de cada tribu, y yo los enviaré; ellos se levantarán y recorrerán la tierra, y la pondrán por escrito[b] conforme a su heredad, y vendrán a mí.
  rationale: Se ajusta «por tribu» a «de cada tribu» para expresar con más claridad el distributivo del hebreo, y se reemplaza «la escribirán» por «la pondrán por escrito» para conservar el sentido de registrar la tierra de manera idiomática en español. Se mantiene «conforme a su heredad» por su sobriedad bíblica y su cercanía al texto fuente, apoyado por la nota explicativa.
  reviewer_model: gpt-5.4
