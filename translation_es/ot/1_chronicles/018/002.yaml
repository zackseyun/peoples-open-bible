translation:
  language: es
  text: Y golpeó a Moab, y los moabitas se hicieron esclavos[a] de David, trayendo tributo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervos de David, llevando presentes». Los términos hebreos pueden traducirse de manera más general, pero en este contexto de conquista «esclavos» y «tributo» reflejan mejor el sentido de sometimiento y pago de un pueblo vasallo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּךְ
  english_pob_choice: struck
  chosen_spanish: golpeó
  alternatives_spanish:
  - hirió
  - atacó
  - smitió
  lexicon: HALOT
  rationale: נכה expresa la acción concreta de golpear o herir; «golpeó» conserva esa fuerza verbal sin convertirla en una traducción más interpretativa como «derrotó».
- source_word: מוֹאָב
  english_pob_choice: Moab / the Moabites
  chosen_spanish: Moab / los moabitas
  alternatives_spanish:
  - Moab / el pueblo de Moab
  - Moab / los habitantes de Moab
  lexicon: HALOT
  rationale: La primera mención puede conservar el nombre nacional como objeto de la acción; la segunda se hace plural e idiomática en español porque el predicado posterior se refiere al pueblo sometido.
- source_word: וַיִּהְיוּ
  english_pob_choice: became
  chosen_spanish: se hicieron
  alternatives_spanish:
  - llegaron a ser
  - fueron
  lexicon: HALOT
  rationale: היה en narración con predicado expresa un cambio de estado; «se hicieron» mantiene el sentido ingrésivo mejor que el simple «eran/fueron».
- source_word: עֲבָדִים
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - subditos
  lexicon: HALOT
  rationale: En un contexto de conquista y sometimiento político, el sentido de servidumbre forzada es el más fuerte. «Esclavos» preserva mejor esa fuerza que «siervos».
- source_word: לְדָוִיד
  english_pob_choice: to David
  chosen_spanish: de David
  alternatives_spanish:
  - para David
  - a David
  lexicon: HALOT
  rationale: En español, con «se hicieron esclavos», la relación de subordinación se expresa naturalmente con «de David», sin perder la idea de dependencia respecto de él.
- source_word: נֹשְׂאֵי
  english_pob_choice: bringing
  chosen_spanish: trayendo
  alternatives_spanish:
  - llevando
  - portando
  lexicon: HALOT
  rationale: El participio de נשׂא literalmente significa llevar o portar; en este contexto tributario, «trayendo» expresa de modo natural la acción de presentar tributo a un superior.
- source_word: מִנְחָה
  english_pob_choice: tribute
  chosen_spanish: tributo
  alternatives_spanish:
  - regalo
  - ofrenda
  - presente
  lexicon: HALOT
  rationale: Aquí מִנְחָה no es una ofrenda cultual sino un pago debido por un pueblo sometido. «Tributo» conserva el matiz político y de vasallaje.
translation_notes:
  revision_awareness: 'Se tomó en cuenta el historial de revisión: la tradición auditada mantuvo «slaves/esclavos» como lectura adecuada para עֲבָדִים en un contexto de conquista, y se preservó esa decisión en español. También se evitó trasladar la lectura suavizada de «servants/siervos».'
  spanish_consistency_notes:
  - Se mantuvo «Moab» para la entidad nacional y «moabitas» para el pueblo en la segunda mitad, por claridad idiomática.
  - «Tributo» se usó de manera consistente con el contexto político-militar, no cultual.
  - No se añadió puntuación o glosas que alteren la secuencia narrativa breve del hebreo.
