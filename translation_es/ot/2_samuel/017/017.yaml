base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/017/017.yaml
  text: Now Jonathan and Ahimaaz were standing at En-rogel[a], and a female servant would go and tell them, and they would go and tell King David[b], for they could not be seen entering the city.
  footnotes:
  - marker: a
    text: Or 'were standing at En-rogel.' The Hebrew participle literally says 'standing,' but in context it likely means they were stationed there.
    reason: lexical_alternative
  - marker: b
    text: Or 'the maidservant' / 'the servant girl.' The Hebrew שִׁפְחָה refers specifically to a female servant.
    reason: lexical_alternative
