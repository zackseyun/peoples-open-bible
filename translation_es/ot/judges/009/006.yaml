  yaml_path: translation/ot/judges/009/006.yaml
  text: Then all the leaders of Shechem and all Beth-millo gathered together[b][a], and they went and made Abimelech king beside the oak pillar that was in Shechem.
  footnotes:
  - marker: a
    text: Or "by the oak of the pillar/standing stone"; the Hebrew phrase is difficult, and the exact sense of מֻצָּב is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Beth-millo may mean "the house of Millo," but the expression likely functions here as a place or clan name.
    reason: cultural_note
