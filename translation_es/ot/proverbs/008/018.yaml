translation:
  language: es
  text: Riquezas y honor están conmigo, riqueza duradera[a] y rectitud[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «riqueza perdurable»; el adjetivo también puede sugerir riqueza sustancial o duradera.
    reason: lexical_alternative
  - marker: b
    text: O «justicia».
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹשֶׁר
  english_pob_choice: riches
  chosen_spanish: riquezas
  alternatives_spanish:
  - riqueza
  - bienes
  lexicon: HALOT
  rationale: En Proverbios, el término designa abundancia material o bienes ricos; «riquezas» conserva ese campo semántico y mantiene el paralelismo con «honor» sin reducirlo a una formulación genérica.
- source_word: כָבוֹד
  english_pob_choice: honor
  chosen_spanish: honor
  alternatives_spanish:
  - gloria
  lexicon: HALOT
  rationale: En este contexto sapiencial apunta a estima o prestigio social. «Honor» es el equivalente natural en español y evita cargar el término con una noción más teológica de «gloria».
- source_word: אִתִּי
  english_pob_choice: are with me
  chosen_spanish: están conmigo
  alternatives_spanish:
  - está conmigo
  lexicon: HALOT
  rationale: El hebreo usa una construcción sin cópula explícita; en español se necesita verbo. El plural concuerda con el sujeto compuesto «riquezas y honor», y «conmigo» conserva la cercanía posesiva-relacional de אִתִּי.
- source_word: הוֹן
  english_pob_choice: wealth
  chosen_spanish: riqueza
  alternatives_spanish:
  - bienes
  - fortuna
  lexicon: HALOT
  rationale: Se refiere a posesiones o riqueza. Traducirlo aquí como «riqueza» permite diferenciarlo de עֹשֶׁר en el primer hemistiquio, aunque el campo semántico se solapa.
- source_word: עָתֵק
  english_pob_choice: enduring
  chosen_spanish: duradera
  alternatives_spanish:
  - durable
  - perdurable
  - antigua
  lexicon: HALOT
  rationale: El adjetivo modifica la riqueza y sugiere algo duradero, sólido o permanente más que simplemente antiguo. «Duradera» expresa esa cualidad de modo natural en español.
- source_word: צְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justificación
  lexicon: HALOT
  rationale: Aunque el inglés POB prefirió «righteousness» con nota para «justice», en español «justicia» comunica mejor el doble alcance moral y relacional del término en la poesía sapiencial, y preserva la alternativa documentada sin forzar un tecnicismo menos idiomático.
theological_decisions:
- issue: Rango semántico de צְדָקָה en un dicho sapiencial
  english_pob_reading: righteousness, with 'justice' preserved as an alternative
  chosen_spanish_reading: justicia, con «rectitud» como posible matiz secundario
  alternative_spanish_readings:
  - rectitud
  - justicia
  rationale: El versículo enumera dones asociados con la Sabiduría sin un marco jurídico estricto. En español, «justicia» es la opción más transparente y abarcaría tanto conformidad moral como rectitud práctica; se conserva la tensión semántica mediante una alternativa en nota.
  doctrine_reference: DOCTRINE.md Translation philosophy §3; guidance on preserving semantic range for terms like δικαιοσύνη/צְדָקָה
- issue: Relación entre abundancia material y cualidad moral
  english_pob_reading: riches and honor ... enduring wealth and righteousness
  chosen_spanish_reading: Riquezas y honor ... riqueza duradera y justicia
  alternative_spanish_readings:
  - bienes y honor ... bienes perdurables y rectitud
  rationale: La línea hebrea presenta una acumulación poética de bienes materiales y cualidad moral. La traducción evita fusionarlos, manteniendo la tensión entre prosperidad y justicia/rectitud sin moralizar la riqueza ni materializar la justicia.
  doctrine_reference: POB translation philosophy on preserving lexical and theological distinctions in parallel poetry
translation_notes:
  revision_awareness: Coincide con el pasaje revisado más reciente sin cambios sustanciales; se mantiene la decisión auditada de distinguir עֹשֶׁר / הוֹן mediante dos sustantivos distintos en español y de conservar la alternativa semántica de צְדָקָה en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término predeterminado cuando corresponda; no aparece en este versículo.
  - Se evita «Cristo» y cualquier terminología cristológica no pertinente al texto sapiencial.
  - «Riquezas» y «riqueza» se diferencian deliberadamente para reflejar la variación hebrea entre עֹשֶׁר y הוֹן.
  - Las notas a y b están ancladas en el texto exactamente donde corresponden y siguen el orden solicitado.
