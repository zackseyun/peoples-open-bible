base_translation:
  language: en
  yaml_path: translation/ot/malachi/001/009.yaml
  text: And now[a], entreat God for favor, that he may be gracious to us. From your hand has this come[b]; will he show favor to any of you? says Yahweh of hosts.
  footnotes:
  - marker: a
    text: Hebrew literally, 'implore the face of God.' The expression means to seek God's favor.
    reason: lexical_alternative
  - marker: b
    text: Or, 'This has come from your hand; will he accept any of you?'
    reason: alternative_reading
