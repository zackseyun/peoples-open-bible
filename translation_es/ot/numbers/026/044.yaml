translation:
  language: es
  text: 'Los hijos de Aser, por sus clanes[a]: de Imna, el clan de los imnitas; de Isví, el clan de los isvitas; de Bería[b], el clan de los beriitas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «familias»; en este contexto censal, el término se refiere a subdivisiones de clan dentro de la tribu.'
    reason: lexical_alternative
  - marker: b
    text: O «beriahitas»; el gentilicio hebreo se deriva de Bería.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי אָשֵׁר
  english_pob_choice: The sons of Asher
  chosen_spanish: Los hijos de Aser
  alternatives_spanish:
  - Los descendientes de Aser
  - Los hijos de Aser
  lexicon: HALOT
  rationale: בְּנֵי conserva el giro genealógico literal de 'hijos/sons'. En español, 'hijos de Aser' mantiene la forma formal del linaje sin introducir una paráfrasis más amplia como 'descendientes'.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus familias
  lexicon: HALOT
  rationale: En el contexto censal de Números, מִשְׁפָּחָה apunta a subdivisiones tribales; 'clanes' comunica mejor esa unidad que 'familias' en español moderno.
- source_word: לְיִמְנָה
  english_pob_choice: of Imnah
  chosen_spanish: de Imna
  alternatives_spanish:
  - de Imnah
  - para Imna
  lexicon: HALOT
  rationale: El ל prefijado en esta fórmula genealógica se expresa idiomáticamente como 'de'. El nombre se translitera con una adaptación gráfica mínima para lectura natural en español.
- source_word: מִשְׁפַּחַת הַיִּמְנָה
  english_pob_choice: the clan of the Imnites
  chosen_spanish: el clan de los imnitas
  alternatives_spanish:
  - el clan de Imna
  - la familia de los imnitas
  lexicon: HALOT
  rationale: Se conserva el valor de gentilicio/clan. 'Imnitas' reproduce en español la función derivativa del hebreo con un plural colectivo claro.
- source_word: לְיִשְׁוִי
  english_pob_choice: of Ishvi
  chosen_spanish: de Isví
  alternatives_spanish:
  - de Ishvi
  - de Isui
  lexicon: HALOT
  rationale: El nombre propio se translitera, ajustando la ortografía a una forma española legible. Se mantiene la identidad del antropónimo sin interpretarlo.
- source_word: מִשְׁפַּחַת הַיִּשְׁוִי
  english_pob_choice: the clan of the Ishvites
  chosen_spanish: el clan de los isvitas
  alternatives_spanish:
  - el clan de los ishvitas
  - la familia de los isvitas
  lexicon: HALOT
  rationale: Como en el caso anterior, se preserva el sentido de clan. 'Isvitas' adapta el gentilicio al español y evita una transliteración excesivamente áspera.
- source_word: לִבְרִיעָה
  english_pob_choice: of Beriah
  chosen_spanish: de Berea
  alternatives_spanish:
  - de Bería
  - de Beriah
  lexicon: HALOT
  rationale: Se opta por una forma española de lectura fluida para el nombre propio. La forma mantiene la referencia al ancestro sin forzar una transliteración más técnica.
- source_word: מִשְׁפַּחַת הַבְּרִיעִי
  english_pob_choice: the clan of the Beriites
  chosen_spanish: el clan de los bereítas
  alternatives_spanish:
  - el clan de los beriitas
  - el clan de los beriahitas
  lexicon: HALOT
  rationale: El hebreo presenta un gentilicio derivado del nombre del antepasado. 'Bereítas' expresa en español esa derivación y conserva el valor de clan, mientras que 'beriitas' o 'beriahitas' serían alternativas más pegadas a la transliteración.
translation_notes:
  revision_awareness: Se siguió el testimonio hebreo masorético de Números 26:44 y el audit trail inglés POB, sin cambios de sentido respecto a la lista genealógica/clánica. La revisión inglesa indica acuerdo alto y ausencia de ajustes, por lo que el borrador español conserva la misma estructura enumerativa y las mismas decisiones lexicográficas principales.
  spanish_consistency_notes:
  - Se mantiene 'clan' para מִשְׁפָּחָה en contexto censal, conforme al uso consistente de la serie.
  - Los nombres propios se adaptan a una grafía española legible sin perder su identidad hebrea.
  - Se conserva una equivalencia gentilicia para los derivados en -í / -ites, evitando sustituirlos por 'familia' salvo en la nota explicativa.
