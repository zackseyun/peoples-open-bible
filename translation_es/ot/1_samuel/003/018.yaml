translation:
  language: es
  text: 'Así Samuel le contó todas las palabras y no le ocultó nada. Y dijo: «Él es Yahvé; que haga lo que es bueno a sus ojos[a]»[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «a sus ojos», un modismo que significa según su propio juicio o lo que le parece bueno.
    reason: lexical_alternative
  - marker: b
    text: 'O: «hará lo que es bueno a sus ojos». El hebreo imperfecto puede entenderse como un deseo sumiso («que haga») o como un simple futuro.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּגֶּד
  english_pob_choice: told
  chosen_spanish: le contó
  alternatives_spanish:
  - le dijo
  - le informó
  - le relató
  lexicon: HALOT
  rationale: נגד en hifil expresa comunicar o hacer saber. «Le contó» conserva la comunicación personal y suena natural en español sin perder el matiz de relato completo.
- source_word: אֶת כָּל הַדְּבָרִים
  english_pob_choice: all the words
  chosen_spanish: todas las palabras
  alternatives_spanish:
  - todas las cosas
  - todo lo dicho
  - todo
  lexicon: HALOT
  rationale: La POB en inglés volvió a «all the words» para ajustarse más de cerca a la expresión hebrea. En español, «todas las palabras» mantiene esa cercanía y la totalidad de lo comunicado.
- source_word: וְלֹא כִחֵד מִמֶּנּוּ
  english_pob_choice: and hid nothing from him
  chosen_spanish: y no le ocultó nada
  alternatives_spanish:
  - y no le escondió nada
  - y no le retuvo nada
  - y no le disimuló nada
  lexicon: HALOT
  rationale: כחד significa encubrir o ocultar. «No le ocultó nada» preserva la fuerza totalizadora y es idiomático en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el nombre divino: transliteración «Yahvé», no sustitución por «SEÑOR». Mantiene el nombre propio del pacto.'
- source_word: הוּא
  english_pob_choice: He is
  chosen_spanish: es él
  alternatives_spanish:
  - él es
  - él mismo es
  lexicon: HALOT
  rationale: El pronombre es enfático e identifica al sujeto divino. «Es él» conserva la identificación con sobriedad natural en español.
- source_word: הַטּוֹב
  english_pob_choice: what is good
  chosen_spanish: lo que es bueno
  alternatives_spanish:
  - lo bueno
  - lo que parece bueno
  - el bien
  lexicon: HALOT
  rationale: En combinación con el siguiente modismo, el sentido es aquello que resulta bueno o adecuado. «Lo que es bueno» mantiene la estructura y el valor evaluativo.
- source_word: בְּעֵינָיו
  english_pob_choice: in his eyes
  chosen_spanish: a sus ojos
  alternatives_spanish:
  - a su juicio
  - según su parecer
  - ante sus ojos
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo de evaluación. «A sus ojos» reproduce la imagen y la carga semántica de juicio o aprobación personal.
- source_word: יַעֲשֶׂה
  english_pob_choice: let him do
  chosen_spanish: hará
  alternatives_spanish:
  - que haga
  - hágalo
  - puede hacer
  lexicon: HALOT
  rationale: El imperfecto puede entenderse como deseo resignado o como futuro simple. En español, «hará» preserva la ambigüedad entre declaración y aceptación, y no fuerza una lectura jussiva que el hebreo no exige de manera inequívoca.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto usa el Tetragrámaton directamente; se mantiene el nombre propio divino conforme a la política del proyecto, evitando la sustitución litúrgica por «Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of Eli's final statement
  english_pob_reading: 'A submissive/jussive expression: ''let him do what is good in his eyes'' / possible future reading'
  chosen_spanish_reading: «hará lo que es bueno a sus ojos»
  alternative_spanish_readings:
  - «que haga lo que es bueno a sus ojos»
  - «haga lo que es bueno a sus ojos»
  - «que hará lo que es bueno a sus ojos»
  rationale: Se preserva la tensión documentada entre una lectura de resignación/submisión y una lectura simple de futuro. El español con futuro mantiene abierta la posibilidad sin resolverla de modo excesivo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el cierre revisado del inglés POB: «all the words» se refleja como «todas las palabras», no como un resumen generalizante; también se conserva la tensión del imperfecto final, sin cerrarla indebidamente. El nombre divino se translitera según la norma del proyecto.'
  spanish_consistency_notes:
  - Se emplea «Yahvé» para יְהוָה, en coherencia con las directrices del proyecto.
  - Se conserva el modismo de evaluación «a sus ojos», útil para mantener el color semítico del texto.
  - «No le ocultó nada» y la nota alternativa preservan la fuerza plena de כחד sin suavizarla.
  - La puntuación y las comillas siguen uso español estándar, con cierre de cita directo final.
