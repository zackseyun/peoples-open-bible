translation:
  language: es
  text: Pero si no me dan a conocer el sueño[a], hay una sola sentencia para ustedes, porque se han puesto de acuerdo[b] para decir palabras falsas y corruptas delante de mí hasta que cambie el tiempo[c]. Por tanto, díganme el sueño, y sabré que pueden darme a conocer su interpretación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «si no me hacen saber el sueño». El arameo usa un causativo de ידע, por lo que la idea básica es «hacer conocido», no solo «decir».
    reason: lexical_alternative
  - marker: b
    text: O «han preparado» o «han arreglado». El verbo sugiere una disposición deliberada; la traducción principal lo toma como acuerdo colectivo en el contexto acusatorio.
    reason: lexical_alternative
  - marker: c
    text: O «hasta que cambien los tiempos». Se conserva el singular de la forma aramea, aunque el plural también sería posible en español según el sentido.
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּי הֵן
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Si
  - Mas si
  lexicon: HALOT
  rationale: La construcción introduce una condición con matiz adversativo respecto del verso anterior. «Pero si» conserva ese enlace y suena natural en español.
- source_word: חֶלְמָא
  english_pob_choice: the dream
  chosen_spanish: el sueño
  alternatives_spanish:
  - un sueño
  lexicon: HALOT
  rationale: Se refiere al sueño ya mencionado en el contexto; el artículo definido mantiene esa especificidad.
- source_word: לָא תְהוֹדְעֻנַּנִי
  english_pob_choice: you do not make the dream known to me
  chosen_spanish: no me dan a conocer el sueño
  alternatives_spanish:
  - no me dicen el sueño
  - no me informan del sueño
  lexicon: HALOT
  rationale: El causativo de ידע pide una idea de «hacer conocer» más que solo «decir». En español, «dar a conocer» conserva mejor esa fuerza causativa.
- source_word: חֲדָה הִיא דָתְכוֹן
  english_pob_choice: there is only one decree for you
  chosen_spanish: hay una sola sentencia para ustedes
  alternatives_spanish:
  - hay un solo decreto para ustedes
  - hay una sola ley para ustedes
  - hay una sola condena para ustedes
  lexicon: HALOT
  rationale: En contexto de corte real, דָּת puede ser decreto, ley o sentencia judicial. Aquí «sentencia» expresa bien la decisión judicial única que recae sobre todos, sin perder el tono forense.
- source_word: וּמִלָּה כִדְבָה וּשְׁחִיתָה
  english_pob_choice: lying and corrupt words
  chosen_spanish: palabras falsas y corruptas
  alternatives_spanish:
  - palabras mentirosas y corruptas
  - habla falsa y corrupta
  - palabras engañosas y perversas
  lexicon: HALOT
  rationale: מִלָּה puede ser «palabra» o «asunto»; aquí el plural en español fluye mejor por el sentido colectivo. «Falsas» y «corruptas» preservan la doble acusación de engaño y perversión/ruina.
- source_word: הזמנתון
  english_pob_choice: you have agreed
  chosen_spanish: se han puesto de acuerdo
  alternatives_spanish:
  - se han preparado
  - han arreglado
  - han acordado
  lexicon: HALOT
  rationale: El verbo sugiere una preparación deliberada. En el contexto acusatorio del rey, «se han puesto de acuerdo» expresa claramente una coordinación intencional entre varios hablantes.
- source_word: לְמֵאמַר קָדָמַי
  english_pob_choice: to speak before me
  chosen_spanish: para decir delante de mí
  alternatives_spanish:
  - para hablar delante de mí
  - para decir en mi presencia
  lexicon: HALOT
  rationale: La frase indica hablar en presencia del rey. «Delante de mí» es idiomático en español y reproduce bien la relación de autoridad del contexto.
- source_word: עַד דִּי עִדָּנָא יִשְׁתַּנֵּא
  english_pob_choice: until the time changes
  chosen_spanish: hasta que cambie el tiempo
  alternatives_spanish:
  - hasta que cambien los tiempos
  - hasta que cambien las circunstancias
  lexicon: HALOT
  rationale: Se mantiene el singular de עִדָּנָא, como en la lectura inglesa auditada. «Cambie el tiempo» conserva el carácter literal sin volverlo rebuscado.
- source_word: לָהֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Introduce la conclusión lógica de la acusación previa. «Por tanto» es formal y adecuado al registro narrativo.
- source_word: אֱמַרוּ לִי
  english_pob_choice: tell me
  chosen_spanish: díganme
  alternatives_spanish:
  - háblenme
  - díganmelo
  lexicon: HALOT
  rationale: El imperativo plural de אמר se expresa de forma natural con «díganme».
- source_word: וְאִנְדַּע
  english_pob_choice: and I will know
  chosen_spanish: y sabré
  alternatives_spanish:
  - y sabré entonces
  - y conoceré
  lexicon: HALOT
  rationale: La consecuencia directa se expresa con futuro simple, natural en español y fiel al valor resultativo.
- source_word: פִשְׁרֵהּ
  english_pob_choice: its interpretation
  chosen_spanish: su interpretación
  alternatives_spanish:
  - su sentido
  - su explicación
  lexicon: HALOT
  rationale: En Daniel, פשר funciona como término técnico para la interpretación de un sueño o misterio; «interpretación» conserva ese uso estable.
- source_word: תְּהַחֲוֻנַּנִי
  english_pob_choice: you can make known to me
  chosen_spanish: pueden darme a conocer
  alternatives_spanish:
  - pueden hacerme saber
  - pueden informarme
  lexicon: HALOT
  rationale: El causativo de ידע vuelve a aparecer. En español, «darme a conocer» mantiene la idea de hacer conocer algo a otro, con un registro natural y fiel a la capacidad puesta a prueba.
translation_notes:
  revision_awareness: Se siguió el audit trail inglés para mantener la fuerza causativa de ידע, el matiz forense de דָּת, la acusación de preparación deliberada, y el singular de עִדָּן. No se detectaron revisiones aplicadas en el texto fuente inglés; se preservó la lectura de alta concordancia con una formulación española idiomática.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se prefirió «interpretación» para פשר por consistencia con Daniel en la POB.
  - Se mantuvo el registro forense con «sentencia» en lugar de un término eclesiástico.
  - Se evitó traducir mecánicamente el causativo de ידע como mero «decir», optando por «dar a conocer».
