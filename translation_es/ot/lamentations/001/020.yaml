translation:
  language: es
  text: Mira, Yahvé, porque estoy en angustia; mis entrañas[a] se agitan, mi corazón se ha trastornado dentro de mí, porque me he rebelado gravemente[b]. Afuera, la espada deja sin hijos; dentro de la casa, es como muerte[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ‘mis entrañas’, una expresión corporal para una angustia interior profunda.'
    reason: cultural_note
  - marker: b
    text: 'O: ‘porque he sido muy rebelde’ o ‘porque me he rebelado amargamente’. El hebreo intensifica el verbo ‘rebelar(se)’ mediante una forma cognada repetida.'
    reason: lexical_alternative
  - marker: c
    text: 'O: ‘dentro de la casa, hay muerte’. El hebreo es breve y elíptico.'
    reason: alternative_reading
lexical_decisions:
- source_word: רְאֵה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, por favor
  - Mira con atención
  - Ve
  lexicon: HALOT
  rationale: El imperativo es una súplica directa a Yahvé. ‘Mira’ suena natural en español y conserva el carácter apelativo mejor que un calco más solemne como ‘Ve’ o un arcaísmo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del Tetragrámaton con la forma de uso estable del proyecto en español, evitando la sustitución por un título genérico.
- source_word: צַר לִי
  english_pob_choice: I am in distress
  chosen_spanish: estoy en angustia
  alternatives_spanish:
  - estoy en aflicción
  - estoy angustiado
  lexicon: HALOT
  rationale: La expresión comunica un estado personal de opresión/angustia. ‘Estoy en angustia’ transmite el sentido de manera clara y digna en español.
- source_word: מֵעַי
  english_pob_choice: my inward parts
  chosen_spanish: mis entrañas
  alternatives_spanish:
  - mis partes internas
  - mis interioridades
  lexicon: HALOT
  rationale: En español bíblico, ‘entrañas’ conserva el lenguaje corporal para la sede de la emoción intensa. Se evita ‘bowels’ literal en inglés por ser poco natural, pero en español ‘entrañas’ es idiomático y auditable.
- source_word: חֳמַרְמָרוּ
  english_pob_choice: are churning
  chosen_spanish: se agitan
  alternatives_spanish:
  - turbuléntanse
  - están revueltas
  - se estremecen
  lexicon: HALOT
  rationale: La imagen es de agitación visceral intensa. ‘Se agitan’ mantiene el movimiento interno sin sobreinterpretar el matiz fisiológico exacto.
- source_word: נֶהְפַּךְ לִבִּי בְּקִרְבִּי
  english_pob_choice: my heart is overturned within me
  chosen_spanish: mi corazón se ha trastornado dentro de mí
  alternatives_spanish:
  - mi corazón se ha volcado dentro de mí
  - mi corazón está trastornado dentro de mí
  - mi corazón se ha volteado dentro de mí
  lexicon: HALOT
  rationale: Se conserva la metáfora de inversión/alteración interna. ‘Se ha trastornado’ comunica el efecto del verbo con naturalidad, mientras ‘dentro de mí’ refleja el hebreo sin perder fluidez.
- source_word: כִּי מָרוֹ מָרִיתִי
  english_pob_choice: because I have been very rebellious
  chosen_spanish: porque me he rebelado muy amargamente
  alternatives_spanish:
  - porque me he rebelado gravemente
  - porque me he rebelado con amargura
  - porque me he rebelado muchísimo
  lexicon: HALOT
  rationale: Se preserva la intensificación del hebreo por repetición cognada. ‘Muy amargamente’ mantiene la tensión entre rebeldía moral y amargura afectiva, sin diluir el doble valor del original.
- source_word: מִחוּץ
  english_pob_choice: Outside
  chosen_spanish: Afuera
  alternatives_spanish:
  - Fuera
  - Por fuera
  lexicon: HALOT
  rationale: Equivale al contraste espacial con ‘dentro de la casa’. ‘Afuera’ es directo y mantiene el paralelismo poético.
- source_word: שִׁכְּלָה חֶרֶב
  english_pob_choice: the sword bereaves
  chosen_spanish: la espada deja sin hijos
  alternatives_spanish:
  - la espada priva de hijos
  - la espada despoja
  - la espada enlutaa
  lexicon: HALOT
  rationale: ‘Deja sin hijos’ explicita en español la fuerza de berrear/privar de descendencia que POB conserva en inglés con ‘bereaves’, sin perder la concisión poética.
- source_word: בַּבַּיִת
  english_pob_choice: inside the house
  chosen_spanish: dentro de la casa
  alternatives_spanish:
  - en la casa
  - adentro de la casa
  lexicon: HALOT
  rationale: Se mantiene la antítesis con ‘Afuera’. ‘Dentro de la casa’ conserva el movimiento espacial y la estructura del verso.
- source_word: כַּמָּוֶת
  english_pob_choice: it is like death
  chosen_spanish: como muerte
  alternatives_spanish:
  - es como muerte
  - cual muerte
  - como si fuera muerte
  lexicon: HALOT
  rationale: El hebreo es elíptico y comparativo. En español, ‘como muerte’ preserva la tersura y la ambigüedad, dejando implícito el verbo como en el original.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se conserva la decisión doctrinal del proyecto de no sustituir el Nombre por un título genérico. La forma española preferida es ‘Yahvé’, coherente con el texto objetivo y con el uso editorial del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Intensificación de ‘מָרוֹ מָרִיתִי’
  english_pob_reading: I have been very rebellious
  chosen_spanish_reading: me he rebelado muy amargamente
  alternative_spanish_readings:
  - me he rebelado gravemente
  - me he rebelado con amargura
  rationale: El hebreo repite la raíz para intensificar la idea. La opción elegida intenta conservar simultáneamente la rebeldía y el tono de amargura que el texto sugiere, evitando suavizarlo a una mera falta genérica.
  doctrine_reference: Poética hebrea; intensificación por cognados
- issue: Expresión corporal ‘מֵעַי’
  english_pob_reading: my inward parts
  chosen_spanish_reading: mis entrañas
  alternative_spanish_readings:
  - mis interioridades
  - mis partes internas
  rationale: La antropología corporal bíblica se conserva mediante un término español natural y reverente. ‘Entrañas’ mantiene la concreción emocional del hebreo sin forzar una explicación interpretativa.
  doctrine_reference: Antropología bíblica poética
translation_notes:
  revision_awareness: 'El pasaje revisado por el audit trail no muestra cambios recientes sustantivos (latest_revision_pass: unchanged=true). La versión española sigue la lectura estable del texto base y conserva las tensiones semánticas señaladas por el equipo inglés, especialmente la intensificación de ‘rebelar’ y la elipsis final.'
  spanish_consistency_notes:
  - Se conserva ‘Yahvé’ como forma normalizada del Nombre divino en español, en línea con la política del proyecto.
  - Se traduce la imaginería corporal con términos españoles naturales (‘entrañas’) para mantener el tono poético sin caer en eufemismos.
  - La clausula final mantiene la elipsis del hebreo; no se expande innecesariamente con verbos interpretativos.
  - ‘Afuera / dentro de la casa’ preserva el paralelismo espacial del original.
