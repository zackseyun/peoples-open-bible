translation:
  language: es
  text: Y el Espíritu de Dios vino poderosamente sobre Saúl[a] cuando oyó estas palabras, y su ira se encendió mucho[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «vino con poder sobre Saúl». El verbo hebreo puede expresar una venida enérgica o poderosa del Espíritu sobre alguien.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «su nariz se encendió mucho», un modismo hebreo que significa ira intensa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּצְלַח
  english_pob_choice: rushed upon
  chosen_spanish: vino poderosamente sobre
  alternatives_spanish:
  - se apoderó de
  - irrumpió sobre
  - descendió con poder sobre
  lexicon: HALOT
  rationale: El verbo expresa una acción súbita y enérgica del Espíritu sobre Saúl. En español, «vino poderosamente sobre» conserva el impulso y la fuerza sin sonar forzado; evita reducirlo a una simple llegada.
- source_word: רוּחַ אֱלֹהִים
  english_pob_choice: the Spirit of God
  chosen_spanish: el Espíritu de Dios
  alternatives_spanish:
  - el espíritu de Dios
  - un espíritu de Dios
  lexicon: HALOT
  rationale: 'La construcción nombra de forma directa al Espíritu divino. La mayúscula en «Espíritu» preserva la lectura teológica adoptada por el POB inglés: no un impulso impersonal, sino la presencia activa de Dios.'
- source_word: עַל
  english_pob_choice: upon
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - contra
  lexicon: HALOT
  rationale: «Sobre» reproduce de manera natural el valor direccional del hebreo en este contexto de investidura/impulso espiritual, y suena más idiomático que un calco como «sobre» en un sentido meramente espacial.
- source_word: בְּשָׁמְעוֹ
  english_pob_choice: when he heard
  chosen_spanish: cuando oyó
  alternatives_spanish:
  - al oír
  - mientras oía
  lexicon: HALOT
  rationale: La forma temporal indica simultaneidad o inmediatez al escuchar. «Cuando oyó» es claro y mantiene la secuencia narrativa sin añadir matices no presentes en el hebreo.
- source_word: הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas cosas
  - este informe
  - estos dichos
  lexicon: HALOT
  rationale: Aunque דְּבָרִים puede significar «cosas» o «asuntos», aquí se refiere al contenido escuchado por Saúl. «Palabras» sigue de cerca el contexto discursivo y la elección inglesa del POB.
- source_word: וַיִּחַר אַפּוֹ
  english_pob_choice: his anger burned
  chosen_spanish: su ira se encendió
  alternatives_spanish:
  - ardió su ira
  - su enojo se encendió
  - se inflamó de ira
  lexicon: HALOT
  rationale: La expresión hebrea usa una imagen idiomática de ardor ligado a la ira. «Su ira se encendió» preserva el tropos con naturalidad en español; «ira» mantiene el tono más formal y bíblico que «enojo».
- source_word: מְאֹד
  english_pob_choice: greatly
  chosen_spanish: grandemente
  alternatives_spanish:
  - muchísimo
  - en gran manera
  - muy
  lexicon: HALOT
  rationale: El adverbio intensifica la cláusula anterior. «Grandemente» es elevado y comprensible en registro bíblico; mantiene la intensificación sin volverla coloquial.
theological_decisions:
- issue: Naturaleza de רוּחַ אֱלֹהִים en el relato
  english_pob_reading: the phrase refers to the divine Spirit empowering Saul
  chosen_spanish_reading: el Espíritu de Dios que capacita y mueve a Saúl para la acción
  alternative_spanish_readings:
  - un espíritu de Dios
  - un impulso de Dios
  rationale: El contexto narrativo favorece leer la frase como la acción eficaz del Espíritu divino sobre Saúl, no como una mera emoción humana ni como un ser espiritual indefinido. El español mantiene esa lectura sin añadir explicaciones extratextuales.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no hacía falta ningún cambio adicional, y la concordancia cruzada informó acuerdo alto (veredicto: agree). Esta propuesta sigue esa línea estable, sin introducir innovaciones innecesarias.'
  spanish_consistency_notes:
  - Se mantiene «Espíritu» con mayúscula para reflejar la lectura teológica del POB.
  - Se usa «Y el» para conservar el enlace narrativo natural del hebreo inicial.
  - «Ira» se eligió por registro bíblico; «enojo» queda como alternativa contextual, pero no como forma principal.
  - Las notas preservan la tensión idiomática de אַפּוֹ sin eliminarla del todo del trasfondo de traducción.
