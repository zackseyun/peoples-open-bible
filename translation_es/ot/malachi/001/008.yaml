translation:
  language: es
  text: Cuando ustedes presentan un animal ciego para el sacrificio[a], ¿no es malo? Y cuando presentan uno cojo o enfermo, ¿no es malo? Preséntenselo, por favor, a su gobernador. ¿Los aceptará,[b] o los favorecerá?[c] —dice Yahvé de los ejércitos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «no hay mal» ... «no hay mal»; aquí se traduce como pregunta retórica para reflejar la fuerza de reproche en el contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿Estará complacido con ustedes?»'
    reason: alternative_reading
  - marker: c
    text: 'Hebreo idiomático: «levantar su rostro», es decir, mostrar favor o conceder aceptación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַגִּשׁוּן / תַגִּישׁוּ
  english_pob_choice: present
  chosen_spanish: presentáis / presentad
  alternatives_spanish:
  - traéis
  - ofrecéis
  - lleváis
  lexicon: HALOT
  rationale: El hebreo הִפְעִיל de נגשׁ aquí expresa llevar algo adelante para ser presentado. «Presentar» mantiene bien la escena cultual y el golpe retórico, y funciona de manera natural en español.
- source_word: עִוֵּר
  english_pob_choice: a blind animal
  chosen_spanish: un animal ciego
  alternatives_spanish:
  - el ciego
  - algo ciego
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivado para un animal defectuoso en el contexto sacrificial. «Animal» hace explícito el referente sin añadir una interpretación ajena al pasaje.
- source_word: לִזְבֹּחַ
  english_pob_choice: for sacrifice
  chosen_spanish: para el sacrificio
  alternatives_spanish:
  - como sacrificio
  - para sacrificar
  lexicon: HALOT
  rationale: La frase infinitiva marca propósito sacrificial. «Para el sacrificio» reproduce con claridad esa relación en español.
- source_word: אֵין רָע
  english_pob_choice: is that not evil?
  chosen_spanish: ¿no es malo?
  alternatives_spanish:
  - ¿no es perverso?
  - ¿no hay mal?
  - ¿no está mal?
  lexicon: HALOT
  rationale: El hebreo literalmente dice «no hay mal», pero en el contexto funciona como desafío irónico. «¿No es malo?» conserva la fuerza reprochadora sin volver opaca la frase.
- source_word: פִּסֵּחַ
  english_pob_choice: lame
  chosen_spanish: cojo
  alternatives_spanish:
  - lisiado
  - manco
  lexicon: HALOT
  rationale: El término describe un animal con impedimento para caminar. «Cojo» es claro y natural en español; no suaviza el defecto ni introduce una lectura médica más fuerte de la necesaria.
- source_word: חֹלֶה
  english_pob_choice: sick
  chosen_spanish: enfermo
  alternatives_spanish:
  - diseñado
  - débil
  - lleno de enfermedad
  lexicon: HALOT
  rationale: «Enfermo» comunica el sentido básico sin tecnicismo excesivo. En este contexto sacrificial, basta para indicar un animal no apto por dolencia.
- source_word: הַקְרִיבֵהוּ נָא
  english_pob_choice: Present it, please
  chosen_spanish: Presentadlo, por favor
  alternatives_spanish:
  - Ofrecedlo, por favor
  - Traedlo, por favor
  lexicon: HALOT
  rationale: El imperativo con נָא añade tono insistente e irónico. «Por favor» reproduce esa partícula de manera idiomática, y el singular objeto pronominal queda bien marcado con «lo».
- source_word: פֶחָה
  english_pob_choice: governor
  chosen_spanish: gobernador
  alternatives_spanish:
  - gobernador provincial
  - funcionario
  - autoridad
  lexicon: HALOT
  rationale: Se refiere a una autoridad civil del período persa. «Gobernador» es el equivalente breve y reconocido en español, sin perder el trasfondo histórico.
- source_word: הֲיִרְצְךָ
  english_pob_choice: Will he accept you
  chosen_spanish: ¿te recibirá con agrado?
  alternatives_spanish:
  - ¿te aceptará?
  - ¿estará complacido contigo?
  - ¿te recibirá favorablemente?
  lexicon: HALOT
  rationale: El verbo רצה expresa agrado, aceptación o beneplácito. Dado que el objeto es la persona, no solo la ofrenda, «recibirte con agrado» comunica bien la aceptación personal implícita.
- source_word: הֲיִשָּׂא פָנֶיךָ
  english_pob_choice: show you favor
  chosen_spanish: te mostrará favor
  alternatives_spanish:
  - levantará tu rostro
  - te mirará con favor
  - te favorecerá
  lexicon: HALOT
  rationale: 'La expresión hebrea es idiomática: literalmente «levantar el rostro». En español, «mostrar favor» transmite ese sentido de aceptación favorable sin perder naturalidad.'
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: the LORD of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé Sebaot
  - Yahvé de los ejércitos celestiales
  lexicon: HALOT
  rationale: Se preserva el nombre divino como «Yahvé» según la convención del proyecto. צְבָאוֹת se traduce con su valor tradicional y transparente, «los ejércitos», sin enmascarar el nombre propio.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: La pauta del proyecto pide YHWH → «Yahvé» en el texto principal. Eso conserva el nombre pactal y evita la sustitución litúrgica por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Force of אֵין רָע in the priestly challenge
  english_pob_reading: 'Render as rhetorical question: ''is that not evil?'''
  chosen_spanish_reading: 'Renderizarlo como pregunta retórica: «¿no es malo?»'
  alternative_spanish_readings:
  - «no es malo» como afirmación
  - «¿no hay mal?»
  rationale: El hebreo, en boca del reproche divino, tiene sentido de acusación irónica. La forma interrogativa en español preserva esa fuerza retórica mejor que una afirmación desnuda.
  doctrine_reference: 'Translation philosophy: optimal-equivalence; preserve source sense over tradition'
- issue: Idiomatic reading of הֲיִשָּׂא פָנֶיךָ
  english_pob_reading: show you favor
  chosen_spanish_reading: te mostrará favor
  alternative_spanish_readings:
  - levantará tu rostro
  - te aceptará con favor
  rationale: La imagen literal «levantar el rostro» es comprensible, pero en español la equivalencia idiomática expresa mejor la aceptación favorable del gobernador.
  doctrine_reference: HALOT on Hebrew idiom; preserve semantic force while avoiding obscurity
translation_notes:
  revision_awareness: 'La redacción sigue el último pase del texto inglés sin cambios sustantivos y conserva sus decisiones clave: el valor retórico de אֵין רָע, la lectura idiomática de הֲיִשָּׂא פָנֶיךָ y la referencia histórica a un gobernador persa. Se ajustó el español para que suene publicable y mantenga el contraste entre el animal defectuoso y la prueba ante la autoridad civil.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera uniforme para יְהוָה.
  - «Presentar» se mantiene para תַגִּשׁוּ / הַקְרִיבֵהוּ, evitando alternar con «ofrecer» salvo donde el contexto lo pidiera.
  - Se conserva el paralelismo retórico con dos preguntas seguidas.
  - 'Los defectos del animal se expresan con español común y directo: «ciego», «cojo», «enfermo».'
  - La nota del nombre divino no se añadió porque la forma principal ya sigue la convención del proyecto.
