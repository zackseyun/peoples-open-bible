translation:
  language: es
  text: y a mantener a Antíoco, su hijo, hasta que él regrese[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «a nutrir/sostener a Antíoco, su hijo, hasta su regreso».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τρέφειν
  english_pob_choice: to provide for
  chosen_spanish: a mantener
  alternatives_spanish:
  - a nutrir
  - a sustentar
  - a proveer para
  lexicon: LSJ
  rationale: En este contexto cortesano-político, τρέφειν no se limita a alimentar; implica sostener o cuidar a alguien durante una ausencia. «Mantener» comunica bien ese apoyo continuo en español sin reducir el sentido a comida física.
- source_word: Ἀντίοχον
  english_pob_choice: Antiochus
  chosen_spanish: Antíoco
  alternatives_spanish:
  - Antioco
  lexicon: convención onomástica
  rationale: Se translitera el nombre propio con la forma usual en español bíblico y de lectura eclesial, conservando la identificación histórica.
- source_word: τὸν υἱὸν αὐτοῦ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - el hijo de él
  lexicon: gramática del posesivo
  rationale: El posesivo español expresa de modo natural la relación filial marcada por el griego y mantiene la referencia explícita.
- source_word: ἕως τοῦ ἐπιστρέψαι αὐτόν
  english_pob_choice: until he returns
  chosen_spanish: hasta que él regrese
  alternatives_spanish:
  - hasta su regreso
  - hasta que vuelva
  lexicon: LSJ
  rationale: El infinitivo articular temporal se vierte con una subordinada temporal idiomática en español. «Él» reproduce la referencia más natural del pronombre al sujeto ausente en el contexto, y «regrese» preserva el valor de retorno.
translation_notes:
  revision_awareness: La versión anterior falló porque incluía la nota [a] sin anclarla en el texto. Se corrigió insertando el marcador [a] junto a la expresión traducida y manteniendo la nota como alternativa léxica coherente con el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene el tono sobrio y bíblico, evitando paráfrasis excesivas.
  - «Mantener» se eligió por el valor de apoyo/sostenimiento de τρέφειν en este contexto, no como mero equivalente alimentario.
  - La nota [a] está ahora anclada exactamente en el punto pertinente del texto.
