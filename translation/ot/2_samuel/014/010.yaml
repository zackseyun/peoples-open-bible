id: 2SA.14.10
reference: 2 Samuel 14:10
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר הַ/מֶּ֑לֶךְ הַֽ/מְדַבֵּ֤ר אֵלַ֨יִ/ךְ֙ וַֽ/הֲבֵאת֣/וֹ אֵלַ֔/י וְ/לֹֽא יֹסִ֥יף ע֖וֹד לָ/גַ֥עַת בָּֽ/ךְ־׃
translation:
  text: And the king said[a], “Whoever speaks to you, bring him to me, and he will never touch you again.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he will no longer touch you'; the Hebrew idiom may imply hostile contact or harm, not merely physical touch.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמֶּלֶךְ
  chosen: the king
  lexicon: HALOT
  rationale: Standard rendering of מֶלֶךְ with the article preserved.
- source_word: הַמְדַבֵּר אֵלַיִךְ
  chosen: whoever speaks to you
  alternatives:
  - the one speaking to you
  - he who speaks to you
  lexicon: HALOT
  rationale: 'The participle with article functions substantivally: ''the one who speaks to you.'' In idiomatic English, ''whoever speaks to you'' best conveys the king''s open-ended instruction regarding any such person.'
- source_word: וַהֲבֵאתוֹ אֵלַי
  chosen: bring him to me
  alternatives:
  - and bring him to me
  lexicon: HALOT
  rationale: Hiphil of בוא here is causative, 'cause him to come,' naturally rendered 'bring him.' The prefixed waw is retained in the sentence flow.
- source_word: לֹא יֹסִיף עוֹד
  chosen: he will not continue ... anymore
  alternatives:
  - he will not again
  - he will no longer
  lexicon: HALOT
  rationale: יסף with עוד expresses continuation or repetition being stopped. 'Will not continue ... anymore' captures the force, though 'will no longer' is also possible.
- source_word: לָגַעַת בָּךְ
  chosen: to touch you
  alternatives:
  - to strike you
  - to harm you
  lexicon: HALOT
  rationale: נגע literally means 'touch.' In this judicial/protective context it likely implies hostile contact or harm, but the main text preserves the literal verb while allowing the contextual sense to remain implicit.
