revisions:
- from: El sacerdote hará expiación por toda la congregación de los hijos de Israel[a], y les será perdonado, porque es una falta involuntaria, y ellos han traído su ofrenda, una ofrenda encendida para Yahvé, y su ofrenda por el pecado delante de Yahvé[b], por su falta involuntaria.
  to: El sacerdote hará expiación por toda la congregación de los hijos de Israel, y serán perdonados, porque fue una falta involuntaria, y ellos han traído su ofrenda, una ofrenda hecha por fuego[a] para Yahvé, y su ofrenda por el pecado delante de Yahvé[b], por su falta involuntaria.
  rationale: 'Se hicieron ajustes puntuales para mejorar fidelidad y español natural: se cambió «les será perdonado» por «serán perdonados», «es» por «fue», y «ofrenda encendida» por «ofrenda hecha por fuego». Además, se sustituyó la nota impropia sobre «hijos de Israel» por una nota léxica sobre אִשֶּׁה, en línea con el expediente inglés, y se conservó la nota sobre «ofrenda de purificación».'
