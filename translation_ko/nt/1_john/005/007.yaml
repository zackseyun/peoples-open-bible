    text: 'Later manuscripts add a longer reading often known as the Comma Johanneum: ''in heaven: the Father, the Word, and the Holy Spirit, and these three are one. And there are three that bear witness on earth ...'' This wording is absent from the earliest Greek manuscript evidence and is not included in the SBLGNT text.'
    reason: textual_variant
translation:
  language: ko
  text: 증언하는 셋이 있기 때문입니다[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 후대 라틴어 사본 전통은 본 절과 8절 사이에 「하늘에서 — 아버지, 말씀, 성령, 그리고 이 셋은 하나이다. 그리고 땅에서 증언하는 셋이 있으니」라는 삼위일체적 구절(이른바 「요한의 콤마」, Comma Johanneum)을 삽입한다. 그러나 이 추가는 4세기 이전의 헬라어 사본에 전혀 나타나지 않으며, SBLGNT를 포함한 현대의 비평 본문은 본 추가를 정통 본문에서 배제한다. 본 번역은 SBLGNT를 따른다. 현대 학계의 압도적 다수는 이 콤마가 삼위일체 교리를 변증하기 위해 후대에 라틴 전통에서 추가된 보충으로 본다.
    reason: textual_variant
theological_decisions:
- issue: 요한의 콤마(5:7-8) 본문 처리
  chosen_reading: SBLGNT 본문을 따라 콤마를 본문에서 배제하고 각주로만 명시
  alternative_readings:
  - 전통적 흠정역(KJV) 본문을 따라 콤마를 본문에 포함
  rationale: 이른바 「요한의 콤마」(Comma Johanneum)는 4세기 이전의 헬라어 사본 어디에도 나타나지 않으며, 16세기 이전에는 라틴어 전통에서만 산발적으로 발견된다. SBLGNT를 비롯한 현대의 모든 주요 비평 본문(NA28, UBS5 등)은 이 추가를 정통 본문에서 배제한다. 본 번역은 SBLGNT를 본문 기반으로 삼는다는 프로젝트 원칙에 따라 콤마를 본문에서 배제하고, 그 역사적·교리적 무게를 인정하여 각주로만 명시한다. 본 결정은 삼위일체 교리에 대한 부정이 아니라 본문 비평의 정직성을 따른 것이다.
  doctrine_reference: DOCTRINE.md §3 — textual integrity over later interpolation
