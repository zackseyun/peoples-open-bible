translation:
  language: es
  text: Y que nadie maquine mal contra su prójimo en su corazón[a], ni ame un juramento falso, porque todas estas cosas aborrezco, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y cada uno, no maquinen el mal de su prójimo en sus corazones». El hebreo se dirige a la comunidad en plural, aunque habla distributivamente de cada individuo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ
  english_pob_choice: let no man
  chosen_spanish: Y no piense nadie
  alternatives_spanish:
  - Y no haga nadie
  - Y no piense cada uno
  lexicon: HALOT
  rationale: אִישׁ es singular y representativo, pero el hebreo sigue con verbos en plural dirigido a la comunidad. En español, 'nadie' comunica bien la prohibición general sin forzar una construcción poco natural como 'todo hombre'.
- source_word: רָעַת רֵעֵהוּ
  english_pob_choice: evil ... against his neighbor
  chosen_spanish: mal contra su prójimo
  alternatives_spanish:
  - daño contra su prójimo
  - mal de su prójimo
  lexicon: HALOT
  rationale: רָעָה aquí expresa maldad o daño intencional hacia otro; 'mal contra su prójimo' conserva la fuerza ética y la dirección interpersonal. 'Prójimo' refleja bien רֵעַ en este contexto profético.
- source_word: תַּחְשְׁבוּ בִּלְבַבְכֶם
  english_pob_choice: devise ... in his heart
  chosen_spanish: piense ... en su corazón
  alternatives_spanish:
  - maquine ... en su corazón
  - planee ... en su corazón
  - proyecte ... en su corazón
  lexicon: HALOT
  rationale: חשב puede ser pensar, planear o maquinar. Dado el paralelismo con el mal hacia el prójimo, 'piense' junto con 'mal contra su prójimo' mantiene la idea de intención interna sin sonar demasiado idiomática o excesivamente criminalizada en español. 'En su corazón' sigue el hebreo de forma natural.
- source_word: שְׁבֻעַת שֶׁקֶר
  english_pob_choice: a false oath
  chosen_spanish: un juramento falso
  alternatives_spanish:
  - un juramento de mentira
  - un falso juramento
  - perjurio
  lexicon: HALOT
  rationale: La expresión constructa significa literalmente 'juramento de falsedad'. 'Juramento falso' es natural en español y conserva el sentido jurídico-moral sin reducirlo necesariamente al tecnicismo 'perjurio'.
- source_word: תֶּאֱהָבוּ
  english_pob_choice: do not love
  chosen_spanish: amen
  alternatives_spanish:
  - quieran
  - aprecien
  - se deleiten en
  lexicon: HALOT
  rationale: אהב conserva su valor de 'amar'. En una prohibición dirigida a la comunidad, 'amen' en plural mantiene el peso moral de no abrazar ni valorar el juramento falso.
- source_word: כִּי אֶת כָּל אֵלֶּה אֲשֶׁר שָׂנֵאתִי
  english_pob_choice: for all these are what I hate
  chosen_spanish: porque todas estas cosas yo las aborrezco
  alternatives_spanish:
  - porque todas estas cosas las odio
  - pues todo esto es lo que aborrezco
  lexicon: HALOT
  rationale: שָׂנֵאתִי expresa odio/aborrecimiento divino fuerte; 'aborrezco' comunica bien la aversión moral sin sonar tan coloquial como 'odio'. 'Todas estas cosas' mantiene la referencia resumida al conjunto de prácticas prohibidas.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: El Tetragrámaton יְהוָה se rinde según el estándar del proyecto como 'Yahvé'. 'Declara' reproduce la fórmula profética נְאֻם con dignidad y claridad en español.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El hebreo usa explícitamente יְהוָה. Siguiendo el estándar del proyecto y la lectura teológica auditada, se translitera el nombre pactual como 'Yahvé', en lugar de ocultarlo con 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Dirección del imperativo y sujeto distributivo
  english_pob_reading: And let no man ... and do not love ...
  chosen_spanish_reading: Y no piense nadie ... ni amen ...
  alternative_spanish_readings:
  - Y que nadie piense ... ni ame ...
  - Y no piense cada uno ... ni amen ...
  rationale: El hebreo habla a la comunidad en plural y a la vez distribuye la exhortación a cada individuo. En español, 'nadie' permite conservar el valor comunitario sin perder la fuerza de una prohibición dirigida a todos; el plural en 'amen' mantiene el destinatario colectivo del segundo mandato.
  doctrine_reference: 'DOCTRINE.md: Addressing plural communal imperatives distributively'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que movió 'in his heart' para que modificara naturalmente a 'devise evil'; por eso en español se colocó 'en su corazón' junto con 'piense/maquine mal contra su prójimo', preservando la relación interna más natural del hebreo. También se mantuvo la fórmula profética auditada para el cierre y el nombre divino según el estándar actualizado del proyecto.
  spanish_consistency_notes:
  - Se mantuvo 'prójimo' para רֵעַ, coherente con el contexto ético de comunidad.
  - Se prefirió 'aborrezco' para שָׂנֵאתִי por su registro bíblico y fuerza moral.
  - Se evitó 'SEÑOR' para יְהוָה conforme al estándar del proyecto.
  - La nota al pie marca la tensión entre sujeto distributivo singular y destinatario plural en el hebreo.
