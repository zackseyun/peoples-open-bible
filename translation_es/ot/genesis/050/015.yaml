base_translation:
  language: en
  yaml_path: translation/ot/genesis/050/015.yaml
  text: When Joseph’s brothers saw that their father was dead[a], they said[b], “Perhaps Joseph will hate us and surely repay us for all the evil that we did to him.”
  footnotes:
  - marker: a
    text: Or “bears a grudge against us.” The Hebrew verb can denote sustained hostility, not only an immediate emotional reaction.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew has an emphatic form: “repaying he will repay,” meaning “he will surely/fully repay.”'
    reason: lexical_alternative
