translation:
  language: es
  text: Muéstrame tu favor[a], Señor, porque a ti clamo todo el día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ten compasión de mí». El verbo hebreo puede expresar una súplica por favor o por misericordia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָנֵּנִי
  english_pob_choice: Be gracious to me
  chosen_spanish: Sé gracioso conmigo
  alternatives_spanish:
  - Ten misericordia de mí
  - Mírame con favor
  lexicon: HALOT
  rationale: El verbo חנן pide favor/gracia. En español, «sé gracioso conmigo» conserva el matiz de gracia/favor sin convertirlo de forma obligatoria en misericordia, aunque esa alternativa sigue siendo válida según el contexto de oración.
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - mi Señor
  - Maestro
  lexicon: HALOT
  rationale: אֲדֹנָי es el título divino usado en oración. «Señor» es el equivalente natural y reverente en español; «mi Señor» sobrerrepresentaría el valor posesivo ya incluido en la forma, y «Maestro» no encaja tan bien en este contexto devocional.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí כִּי introduce la razón de la petición. «Porque» expresa con claridad la relación causal en español moderno.
- source_word: אֵלֶיךָ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - hacia ti
  lexicon: HALOT
  rationale: La preposición אֶל con sufijo de segunda persona marca dirección hacia el destinatario. «A ti» es la forma más natural con el verbo clamar.
- source_word: אֶקְרָא
  english_pob_choice: I call
  chosen_spanish: clamo
  alternatives_spanish:
  - llamo
  - grito
  lexicon: HALOT
  rationale: קרא puede significar «llamar» o «clamar» según el contexto. En una súplica a Dios, «clamo» transmite mejor el carácter orante sin añadir más intensidad de la que permite el verbo por sí solo.
- source_word: כָּל הַיּוֹם
  english_pob_choice: all day long
  chosen_spanish: todo el día
  alternatives_spanish:
  - todo el día largo
  - constantemente
  lexicon: HALOT
  rationale: La frase significa literalmente «todo el día». «Todo el día» mantiene la duración sostenida de la súplica en español natural; «constantemente» sería más interpretativo.
theological_decisions:
- issue: Petición de gracia frente a misericordia
  english_pob_reading: Be gracious to me; footnote allows 'Have mercy on me.'
  chosen_spanish_reading: 'Sé gracioso conmigo; nota alternativa: «Ten misericordia de mí».'
  alternative_spanish_readings:
  - Ten misericordia de mí
  - Concédeme tu favor
  rationale: El hebreo חנן puede abarcar gracia/favor y también misericordia en contexto. La redacción principal conserva el valor de gracia/favor; la nota preserva la alternativa tradicional de misericordia sin borrar la tensión lexical.
  doctrine_reference: 'DOCTRINE.md: conservar alternativas cuando el hebreo permite más de una equivalencia válida'
translation_notes:
  revision_awareness: El borrador sigue la lectura revisada sin cambios del control más reciente (agree, alta concordancia), y mantiene la única variación léxica documentada en torno a חנן mediante nota alternativa en español.
  spanish_consistency_notes:
  - Se usó «Señor» para אֲדֹנָי, coherente con el título divino y con la práctica del proyecto.
  - Se prefirió «clamo» para אֶקְרָא por su fuerza orante y su naturalidad en español bíblico contemporáneo.
  - La alternancia gracia/misericordia se preserva en la nota, sin eliminar la tensión semántica del hebreo.
