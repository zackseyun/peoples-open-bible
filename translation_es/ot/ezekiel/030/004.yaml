review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo y del rastro POB en casi todos los segmentos: «vendrá una espada», «habrá angustia en Cus», la cláusula temporal de la caída de los muertos, la ambigüedad de הֲמוֹנָהּ y la imagen de los cimientos/fundamentos derribados. Sin embargo, «se lleven su multitud» suena poco natural en español y debilita la fuerza de וְלָקְחוּ como acción de llevarse/capturar/saquear. Además, «sean derribados» en una secuencia futura narrativa es menos natural que un futuro simple pasivo perifrástico o una pasiva refleja.'
  spanish_quality_summary: El español es generalmente claro y digno, pero necesita un ajuste menor de naturalidad y fluidez. «Y se lleven su multitud» resulta extraño para lectores hispanos; «se lleven a su multitud» inclinaría demasiado hacia población cautiva, mientras que «se lleven su abundancia/riquezas» resolvería una ambigüedad que el POB decidió conservar. Una formulación mejor es «se lleven su multitud[a]» solo si se aclara en nota, pero sigue sonando forzada; más natural es «le quiten su multitud[a]» o «se lleven su multitud[a]», con mejor soporte en nota. También conviene cambiar «sus cimientos sean derribados» por «sus cimientos serán derribados» para una sintaxis española más natural en contexto profético.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Cus» preserva correctamente Cush; no hay nombres divinos ni títulos mesiánicos involucrados. La decisión de mantener «multitud» para הֲמוֹנָהּ es defendible por fidelidad al rastro inglés, pero requiere una redacción española más idiomática.
  issues:
  - severity: medium
    issue: «y se lleven su multitud» es poco idiomático en español
    rationale: Aunque refleja literalmente la estructura inglesa revisada, en español suena torpe y ambiguo de manera no intencional. Debe mejorarse sin perder la amplitud semántica de הֲמוֹנָהּ.
  - severity: low
    issue: «sus cimientos sean derribados» suena menos natural que futuro simple
    rationale: Después de «vendrá», «habrá» y «caigan», la forma «serán derribados» encaja mejor como continuación de la profecía de juicio.
  - severity: low
    issue: La nota c está bien orientada, pero puede expresar con más claridad el sentido de saqueo/captura
    rationale: El hebreo permite población, abundancia o riquezas; la nota debe mantener esa amplitud y explicar por qué el español principal conserva «multitud».
