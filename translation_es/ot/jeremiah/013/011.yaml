translation:
  language: es
  text: Porque, así como el cinturón se adhiere a la cintura de un hombre[a], así hice que toda la casa de Israel y toda la casa de Judá se adhirieran a mí, declara Yahvé, para ser para mí un pueblo, un nombre, una alabanza y una gloria, pero no escucharon[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «faja» o «banda»; el término hebreo designa una prenda ceñida a la cintura.
    reason: lexical_alternative
  - marker: c
    text: «No escucharon» también puede implicar «no obedecieron».
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֵזוֹר
  english_pob_choice: the waistband
  chosen_spanish: el cinturón
  alternatives_spanish:
  - la faja
  - el cinturón
  - la banda
  lexicon: HALOT
  rationale: El hebreo nombra una prenda ceñida a la cintura. En español, «cinturón» es la opción más natural y comprensible para el lector moderno; mantiene la imagen concreta sin introducir una especificidad excesiva como «taparrabos» o una ornamentación como «faja».
- source_word: יִדְבַּק / הִדְבַּקְתִּי
  english_pob_choice: clings / made ... cling
  chosen_spanish: se pega / hice que ... se pegaran
  alternatives_spanish:
  - se adhiere / hice que ... se adhirieran
  - se ciñe / hice que ... se ciñeran
  - se une / hice que ... se unieran
  lexicon: HALOT
  rationale: El verbo דבק expresa adhesión estrecha y continua. «Se pega» conserva esa cercanía física y, en el causativo, «hice que ... se pegaran» mantiene la fuerza de la acción divina sin suavizarla hacia una mera asociación.
- source_word: מָתְנֵי אִישׁ
  english_pob_choice: a man's waist
  chosen_spanish: la cintura de un hombre
  alternatives_spanish:
  - los lomos de un hombre
  - la cintura de un hombre
  - los costados de un hombre
  lexicon: HALOT
  rationale: מָתְנַיִם puede referirse a la región de los lomos o la cintura. «Cintura» resulta más natural en español contemporáneo y preserva el paralelismo corporal del símil. Se mantiene el singular masculino representativo de אִישׁ.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - hacia mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona es relacional y direccional. «A mí» es la forma más directa y natural en español, manteniendo la idea de adhesión al destinatario divino.
- source_word: כָּל בֵּית יִשְׂרָאֵל וְאֶת כָּל בֵּית יְהוּדָה
  english_pob_choice: the whole house of Israel and the whole house of Judah
  chosen_spanish: toda la casa de Israel y toda la casa de Judá
  alternatives_spanish:
  - toda la casa de Israel y toda la casa de Judá
  - todo Israel y todo Judá
  - todo el pueblo de Israel y todo el pueblo de Judá
  lexicon: HALOT
  rationale: Se conserva «casa» para reflejar el lenguaje corporativo y familiar del hebreo. «Toda» comunica el alcance de כָּל sin borrar la imagen de casa/linaje.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  - afirma Yahvé
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para יְהוָה: «Yahvé». «Declara» conserva la solemnidad profética de נְאֻם mejor que un simple «dice».'
- source_word: לִהְיוֹת לִי לְעָם
  english_pob_choice: to be for me a people
  chosen_spanish: para que fueran para mí un pueblo
  alternatives_spanish:
  - para ser para mí un pueblo
  - para ser mi pueblo
  - para que fueran mi pueblo
  lexicon: HALOT
  rationale: El hebreo presenta un propósito en infinitivo. «Para que fueran para mí un pueblo» conserva la estructura final y el matiz de pertenencia sin forzar una simplificación posesiva excesiva.
- source_word: לְשֵׁם
  english_pob_choice: a name
  chosen_spanish: un nombre
  alternatives_spanish:
  - renombre
  - fama
  - un nombre
  lexicon: HALOT
  rationale: «Nombre» mantiene la secuencia nominal breve del hebreo. Aunque el sentido apunta a reputación o renombre, la literalidad aquí conserva mejor el paralelismo con los sustantivos siguientes.
- source_word: לִתְהִלָּה
  english_pob_choice: a praise
  chosen_spanish: una alabanza
  alternatives_spanish:
  - alabanza
  - un motivo de alabanza
  - elogio
  lexicon: HALOT
  rationale: תְהִלָּה significa alabanza. «Una alabanza» preserva el ritmo nominal del hebreo y es completamente transparente en español.
- source_word: לְתִפְאָרֶת
  english_pob_choice: a glory
  chosen_spanish: una gloria
  alternatives_spanish:
  - un adorno
  - un esplendor
  - un honor
  lexicon: HALOT
  rationale: «Gloria» recoge bien el valor elevado y honorífico de תִפְאָרֶת en este contexto de propósito pactal. Mantiene la cadencia del listado final.
- source_word: וְלֹא שָׁמֵעוּ
  english_pob_choice: but they did not listen
  chosen_spanish: pero no escucharon
  alternatives_spanish:
  - pero no obedecieron
  - pero no oyeron
  - pero no hicieron caso
  lexicon: HALOT
  rationale: שׁמע puede abarcar escuchar y obedecer. «No escucharon» conserva la rebeldía profética sin decidir de manera demasiado fuerte una sola equivalencia, aunque el contexto implica desobediencia.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: declares Yahweh
  chosen_spanish_reading: declara Yahvé
  alternative_spanish_readings:
  - declara el SEÑOR
  - declara Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrama. Se preserva el nombre propio «Yahvé» conforme al criterio del proyecto, evitando la sustitución por un título ocultador.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Lenguaje masculino representativo en אִישׁ
  english_pob_reading: a man's waist
  chosen_spanish_reading: la cintura de un hombre
  alternative_spanish_readings:
  - la cintura de una persona
  - la cintura humana
  rationale: El masculino singular del hebreo se conserva como comparativo representativo, sin neutralizarlo innecesariamente, porque la imagen corporal funciona de modo general y la marca masculina está presente en el original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Clímax del propósito pactal
  english_pob_reading: to be for me a people, a name, a praise, and a glory
  chosen_spanish_reading: para que fueran para mí un pueblo, un nombre, una alabanza y una gloria
  alternative_spanish_readings:
  - para ser mi pueblo, mi nombre, mi alabanza y mi gloria
  - para que fueran mi pueblo, un nombre, una alabanza y una gloria
  rationale: Se conserva la secuencia nominal y el valor de pertenencia («para mí») sin convertirla en una posesión más explícita que la del hebreo. Así se mantiene el tono de vocación y honor pactal.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que eliminó el guion largo antes de «but they did not listen» en favor de una coma. En español se adopta una puntuación equivalente con coma antes de «pero no escucharon». También se mantiene la lectura auditada de Yahweh como nombre divino y la estructura final nominal del hebreo.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene «casa de Israel / casa de Judá» para reflejar el lenguaje corporativo hebreo.
  - La serie final de sustantivos se traduce de modo paralelo y no se expande con paráfrasis interpretativas.
  - La nota sobre שׁמע preserva la tensión entre escuchar y obedecer sin resolverla unívocamente.
  - La puntuación busca un registro solemne y publicable, alineado con la revisión inglesa más reciente.
