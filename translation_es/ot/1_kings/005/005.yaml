translation:
  language: es
  text: Y Judá e Israel vivieron seguros[a], cada hombre debajo de su vid y debajo de su higuera, desde Dan hasta Beer-sheba[b], todos los días de Salomón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cada uno debajo de su vid y debajo de su higuera». El hebreo dice «cada hombre», usando el singular masculino de modo distributivo.'
    reason: lexical_alternative
  - marker: b
    text: «Debajo de su vid y debajo de su higuera» es una imagen convencional de paz, seguridad y prosperidad en la tierra.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּשֶׁב
  english_pob_choice: lived
  chosen_spanish: habitaron
  alternatives_spanish:
  - vivieron
  - se establecieron
  lexicon: HALOT
  rationale: El verbo puede expresar asentarse o habitar de manera estable. En español, "habitaron" conserva el valor durativo y comunitario sin sonar tan coloquial como "vivieron" ni introducir la idea de un asentamiento nuevo con "se establecieron".
- source_word: יְהוּדָה וְיִשְׂרָאֵל
  english_pob_choice: Judah and Israel
  chosen_spanish: Judá e Israel
  alternatives_spanish:
  - Judá y Israel
  - la casa de Judá e Israel
  lexicon: HALOT
  rationale: Se conservan los dos entes político-covenantales nombrados en el hebreo. La forma con "e" es la unión natural en español ante "Israel".
- source_word: לָבֶטַח
  english_pob_choice: in safety
  chosen_spanish: en seguridad
  alternatives_spanish:
  - con seguridad
  - seguramente
  lexicon: HALOT
  rationale: El sustantivo denota seguridad o confianza. "En seguridad" mantiene la cualidad del estado descrito y resulta transparente en español bíblico moderno.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada uno
  - cada persona
  lexicon: HALOT
  rationale: El hebreo usa el singular masculino de manera distributiva. "Cada hombre" preserva esa forma y fuerza referencial, como en la decisión inglesa, sin perder naturalidad en español.
- source_word: תַּחַת גַּפְנוֹ וְתַחַת תְּאֵנָתוֹ
  english_pob_choice: under his vine and under his fig tree
  chosen_spanish: debajo de su vid y debajo de su higuera
  alternatives_spanish:
  - bajo su vid y bajo su higuera
  - bajo su parra y bajo su higuera
  lexicon: HALOT
  rationale: Se retiene la imagen literal, que funciona como fórmula de paz, prosperidad y posesión no amenazada. "Debajo de" reproduce con claridad el paralelo hebreo תַּחַת y evita borrar el simbolismo cultural.
- source_word: מִדָּן וְעַד בְּאֵר שָׁבַע
  english_pob_choice: from Dan to Beer-sheba
  chosen_spanish: desde Dan hasta Beer-sheba
  alternatives_spanish:
  - de Dan hasta Beer-sheba
  - desde Dan hasta Beerseba
  lexicon: HALOT
  rationale: Se conserva el merismo geográfico y la transliteración de los topónimos, siguiendo la tradición auditada de la POB inglesa. Se prefiere "Beer-sheba" por transparencia del compuesto hebreo.
- source_word: כֹּל יְמֵי שְׁלֹמֹה
  english_pob_choice: all the days of Solomon
  chosen_spanish: todos los días de Salomón
  alternatives_spanish:
  - durante todos los días de Salomón
  - a lo largo de los días de Salomón
  lexicon: HALOT
  rationale: Es una traducción formal y clara del marco temporal hebreo, indicando toda la duración del reinado de Salomón sin añadir matices ajenos.
theological_decisions:
- issue: Valor distributivo de אִישׁ sin neutralizar el género gramatical
  english_pob_reading: each man
  chosen_spanish_reading: cada hombre
  alternative_spanish_readings:
  - cada uno
  - cada persona
  rationale: La POB inglesa preserva el singular masculino distributivo. En español, "cada hombre" mantiene esa correspondencia formal y no oculta la forma del original, aunque el referente sea colectivo.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Imagen convencional de paz y prosperidad en "debajo de su vid y debajo de su higuera"
  english_pob_reading: Retain the literal image in the main text
  chosen_spanish_reading: Retener la imagen literal en el texto principal
  alternative_spanish_readings:
  - parafrasear como "viviendo en paz y prosperidad"
  - explicitar como "en seguridad y sin amenaza"
  rationale: La metáfora es tradicional, intertextual y teológicamente cargada; conservarla evita reducirla a una glosa y mantiene su fuerza como señal de paz nacional bajo la bendición divina.
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 1 and 6
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del pasaje auditado en inglés; se conserva la misma lectura óptima-equivalente, con español natural y sin atenuar la imagen poética ni el merismo geográfico.'
  spanish_consistency_notes:
  - Se mantiene "Judá e Israel" como entidades distintas y coordinadas.
  - Se conserva "Yahvé" como norma general del proyecto, pero aquí el versículo no contiene el nombre divino.
  - '"Beer-sheba" se deja transliterado de forma consistente con el merismo geográfico, sin traducir el topónimo.'
  - La construcción "debajo de su..." reproduce el paralelismo hebreo de forma uniforme en ambas mitades de la frase.
