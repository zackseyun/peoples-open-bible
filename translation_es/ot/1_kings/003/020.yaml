translation:
  language: es
  text: Ella se levantó a medianoche, tomó a mi hijo de junto a mí mientras tu sierva estaba durmiendo, y lo acostó en sus brazos[a], y acostó a su hijo muerto en mis brazos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en su regazo ... en mi regazo'. El hebreo חֵיק puede referirse al regazo, pecho o seno; 'brazos' se eligió por naturalidad en español contemporáneo, manteniendo el sentido de cercanía maternal.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/ת֨וֹךְ הַ/לַּ֜יְלָה
  english_pob_choice: in the middle of the night
  chosen_spanish: a media noche
  alternatives_spanish:
  - en medio de la noche
  - a medianoche
  lexicon: HALOT
  rationale: El hebreo expresa el centro o interior de la noche, no solo una referencia general al horario nocturno. 'A media noche' conserva esa fuerza temporal con español natural y sobrio; 'a medianoche' puede sonar más idiomático, pero aquí prefiero mantener explícita la idea de la mitad/interior de la noche.
- source_word: מֵֽ/אֶצְלִ֗/י
  english_pob_choice: from beside me
  chosen_spanish: de junto a mí
  alternatives_spanish:
  - de mi lado
  - de al lado mío
  lexicon: HALOT
  rationale: אֵצֶל denota cercanía o posición junto a alguien. 'De junto a mí' reproduce bien la ubicación física en contexto de dormir, sin perder naturalidad en español.
- source_word: וַ/אֲמָֽתְ/ךָ֙
  english_pob_choice: your servant
  chosen_spanish: tu sierva
  alternatives_spanish:
  - tu servidora
  - tu esclava
  lexicon: HALOT
  rationale: En este contexto cortesano, la mujer habla con fórmula de humillación ante el rey. 'Sierva' es la forma más clara y tradicional en español para este registro; 'esclava' sería demasiado fuerte para la fórmula convencional, y 'servidora' suaviza demasiado el matiz.
- source_word: יְשֵׁנָ֔ה
  english_pob_choice: was sleeping
  chosen_spanish: estaba durmiendo
  alternatives_spanish:
  - dormía
  - estaba dormida
  lexicon: HALOT
  rationale: La forma describe una acción o estado en curso al momento del hecho. 'Estaba durmiendo' comunica bien la acción de fondo en español contemporáneo, con claridad narrativa.
- source_word: וַ/תַּשְׁכִּיבֵ֖/הוּ
  english_pob_choice: she laid him
  chosen_spanish: lo acostó
  alternatives_spanish:
  - lo puso
  - lo recostó
  lexicon: HALOT
  rationale: 'El hifil de שׁכב es causativo: ''hacer acostar/recostar''. ''Lo acostó'' conserva esa causatividad y suena natural en español, especialmente en una escena doméstica.'
- source_word: בְּ/חֵיקָ֑/הּ
  english_pob_choice: in her arms
  chosen_spanish: en sus brazos
  alternatives_spanish:
  - en su regazo
  - en su pecho
  lexicon: HALOT
  rationale: El hebreo חֵיק puede referirse al pecho, regazo o espacio íntimo del cuerpo. Dado que el audit trail inglés actualiza 'bosom' a 'arms' por naturalidad, 'en sus brazos' reproduce el sentido sin forzar una imagen más específica de la que el español necesitaría aquí.
- source_word: וְ/אֶת בְּנָ֥/הּ הַ/מֵּ֖ת
  english_pob_choice: her dead son
  chosen_spanish: a su hijo muerto
  alternatives_spanish:
  - a su hijo fallecido
  - a su hijo que había muerto
  lexicon: HALOT
  rationale: El participio sustantivado/adjetival funciona aquí como modificador de 'hijo'. 'A su hijo muerto' es directo y fiel, preservando la cualidad resultante del hijo sin añadir explicaciones.
- source_word: בְ/חֵיקִֽ/י
  english_pob_choice: in my arms
  chosen_spanish: en mis brazos
  alternatives_spanish:
  - en mi regazo
  - en mi pecho
  lexicon: HALOT
  rationale: Para mantener coherencia con la primera mitad del versículo y con la revisión inglesa hacia un español/inglés más natural, 'en mis brazos' conserva el movimiento de la escena y evita un calco demasiado anatómico.
translation_notes:
  revision_awareness: El inglés auditado pasó de 'bosom' a 'arms' para mayor naturalidad, manteniendo el sentido de חֵיק. La versión española sigue esa actualización con 'brazos' en ambos hemistiquios, y conserva el contraste narrativo entre el hijo vivo y el hijo muerto sin añadir elementos no presentes en el hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - '''Sierva'' reproduce la fórmula cortesana del hebreo sin convertirla en un equivalente doctrinal o litúrgico más cargado.'
  - '''Brazos'' se usa de forma consistente para חֵיק en ambos miembros para reflejar la decisión revisada del audit trail inglés y la misma escena doméstica.'
  - La puntuación coordina dos acciones principales unidas por 'y', como en el hebreo, sin suavizar la repetición narrativa.
