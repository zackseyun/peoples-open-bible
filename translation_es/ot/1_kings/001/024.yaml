translation:
  language: es
  text: 'Entonces Natán dijo[a]: «Mi señor, el rey, ¿has dicho: “Adonías reinará después de mí, y se sentará en mi trono”?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿dijiste?». El perfecto hebreo en esta pregunta puede reflejarse en español tanto con perfecto compuesto como con pretérito simple.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; «Entonces» transmite bien ese avance en español moderno y conserva la secuencia narrativa sin sonar tan literal como «Y».
- source_word: נָתָן
  english_pob_choice: Nathan
  chosen_spanish: Natán
  alternatives_spanish:
  - Natan
  lexicon: Convención onomástica bíblica
  rationale: Se usa la forma española establecida del nombre propio, manteniendo reconocimiento lector y coherencia bíblica.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: My lord the king
  chosen_spanish: Mi señor, el rey
  alternatives_spanish:
  - Mi señor el rey
  - Mi señor, oh rey
  lexicon: HALOT
  rationale: La fórmula hebrea combina deferencia y título real. En español, la coma ayuda a reproducir el vocativo natural sin perder la relación honorífica.
- source_word: אַתָּה אָמַרְתָּ
  english_pob_choice: have you said
  chosen_spanish: ¿has dicho
  alternatives_spanish:
  - ¿dijiste?
  - ¿has dicho tú?
  lexicon: HALOT
  rationale: En esta pregunta, el perfecto hebreo funciona como una consulta sobre una declaración efectivamente hecha. «¿Has dicho» mantiene la fuerza interrogativa y el valor temporal sin forzar un calco.
- source_word: אֲדֹנִיָּהוּ
  english_pob_choice: Adonijah
  chosen_spanish: Adonías
  alternatives_spanish:
  - Adonijah
  lexicon: Convención onomástica bíblica
  rationale: Se adopta la forma española tradicional del nombre propio para fluidez y reconocimiento, sin alterar la referencia al personaje.
- source_word: יִמְלֹךְ
  english_pob_choice: will reign
  chosen_spanish: reinará
  alternatives_spanish:
  - será rey
  - gobernará
  lexicon: HALOT
  rationale: El verbo expresa sucesión real; «reinará» conserva el sentido directo de mandato/monarquía sin desplazarlo hacia una paráfrasis más amplia.
- source_word: אַחֲרַי
  english_pob_choice: after me
  chosen_spanish: después de mí
  alternatives_spanish:
  - tras de mí
  - cuando yo falte
  lexicon: HALOT
  rationale: La preposición indica sucesión temporal y dinástica. «Después de mí» es la correspondencia natural y no añade interpretación adicional.
- source_word: יֵשֵׁב עַל כִּסְאִי
  english_pob_choice: he will sit on my throne
  chosen_spanish: se sentará en mi trono
  alternatives_spanish:
  - se sentará sobre mi trono
  - ocupará mi trono
  lexicon: HALOT
  rationale: La imagen de sentarse en el trono es una expresión real de sucesión. «Se sentará en mi trono» conserva la metáfora y su sentido político; «ocupará» sería más interpretativo.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el audit trail en inglés: waw consecutiva como avance narrativo, vocativo real conservado, pregunta con perfecto hebreo rendida de modo natural en español, y lenguaje dinástico mantenido sin suavizarlo. No se registran revisiones sustantivas en el paquete auditado, y el control cruzado indicó alto acuerdo.'
  spanish_consistency_notes:
  - Se mantiene «Natán» y «Adonías» como formas españolas estándar de nombres propios bíblicos.
  - Se conserva «reinará» y «se sentará en mi trono» para preservar el registro monárquico del texto.
  - La puntuación con comillas angulares y coma vocativa busca claridad sin alterar el contenido fuente.
