translation:
  language: es
  text: No pasará por ella pie humano[a], ni pie de animal pasará por ella; y no será habitada por cuarenta años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «No pasará pie de hombre ... ni pie de animal».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַעֲבָר בָּהּ
  english_pob_choice: will pass through it
  chosen_spanish: pasará por ella
  alternatives_spanish:
  - pasará a través de ella
  - cruzará por ella
  lexicon: HALOT
  rationale: עבר con ב indica movimiento a través de una región; en español, «pasar por ella» conserva la idea de tránsito por el territorio sin volverlo artificial.
- source_word: רֶגֶל אָדָם
  english_pob_choice: human foot
  chosen_spanish: pie de hombre
  alternatives_spanish:
  - pie humano
  - pie de ser humano
  lexicon: HALOT
  rationale: El hebreo dice literalmente «pie de hombre». En español, «pie de hombre» mantiene la forma idiomática y la imagen colectiva de tráfico humano; aquí אָדָם es genérico, no un varón particular.
- source_word: רֶגֶל בְּהֵמָה
  english_pob_choice: animal foot
  chosen_spanish: pie de animal
  alternatives_spanish:
  - pie de bestia
  - pie de ganado
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con «pie de hombre». «Animal» comunica con más claridad el sentido genérico de בְּהֵמָה que «bestia» en español actual.
- source_word: לֹא תֵשֵׁב
  english_pob_choice: it will not be inhabited
  chosen_spanish: no será habitada
  alternatives_spanish:
  - no se habitará
  - no estará poblada
  lexicon: HALOT
  rationale: ישב aplicado a tierra o región suele significar habitar o estar poblada. En español, la pasiva «no será habitada» expresa bien la desolación del país en contexto.
- source_word: אַרְבָּעִים שָׁנָה
  english_pob_choice: for forty years
  chosen_spanish: por cuarenta años
  alternatives_spanish:
  - durante cuarenta años
  - por cuarenta años
  lexicon: HALOT
  rationale: La expresión temporal es directa; «por cuarenta años» conserva la duración anunciada con naturalidad en español.
theological_decisions:
- issue: Valor genérico de אָדָם en una prohibición sobre el tránsito por la tierra
  english_pob_reading: human in the sense of humankind, rendered 'human foot'
  chosen_spanish_reading: «pie de hombre» con valor genérico de humanidad
  alternative_spanish_readings:
  - pie humano
  - pie de ser humano
  rationale: Aunque «hombre» puede sonar masculino en español moderno, el hebreo aquí designa al ser humano en general. Se preserva la literalidad idiomática de la frase y se deja claro en la decisión léxica que el referente es colectivo y genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for אָדָם; Translation philosophy §4'
translation_notes:
  revision_awareness: El auditorio en inglés concluyó alta concordancia y no propuso revisiones; se conserva el sentido, la estructura paralela y la duración de cuarenta años, con ajuste natural al español.
  spanish_consistency_notes:
  - Se mantiene la paralelismo entre «pie de hombre» y «pie de animal».
  - Se evita «SEÑOR» y no aparece aquí ningún término divino que requiera decisión adicional.
  - «Habitada» conserva la pasiva natural del hebreo en el contexto de una tierra desolada.
