  to: Y aconteció en el año cuatrocientos ochenta desde que los hijos[a] de Israel salieron de la tierra de Egipto, en el cuarto año, en el mes de Ziv[b], que es el segundo mes, del reinado de Salomón sobre Israel, fue cuando él edificó la casa para Yahvé[c].
