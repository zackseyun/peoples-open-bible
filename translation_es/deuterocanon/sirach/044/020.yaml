translation:
  language: es
  text: el que guardó los mandamientos del Altísimo y entró en pacto con él[a]. En su carne estableció para él un estatuto[b], y en la prueba fue hallado fiel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «y en su carne estableció un pacto con él». El testimonio hebreo lee aquí «un estatuto».'
    reason: alternative_reading
  - marker: b
    text: La expresión «en su carne» probablemente alude a la circuncisión como señal corporal del pacto con Abraham.
    reason: cross_reference
lexical_decisions:
- source_word: שמר / συνετήρησεν
  english_pob_choice: kept
  chosen_spanish: guardó
  alternatives_spanish:
  - observó
  - custodió
  lexicon: HALOT; LXX usage
  rationale: En la combinación con מצות, la idea es de obediencia fiel y continua. 'Guardó' suena natural en español y conserva la noción covenantal de mantener/obedecer sin debilitarla.
- source_word: מצות / νόμον
  english_pob_choice: the commandments / law
  chosen_spanish: los mandamientos
  alternatives_spanish:
  - la ley
  - los preceptos
  lexicon: HALOT; LSJ
  rationale: El hebreo tiene מצות y el griego νόμον; en este contexto sapiencial-covenantal, 'mandamientos' refleja bien la obediencia concreta que exige el texto.
- source_word: עליון / Ὑψίστου
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Dios Altísimo
  - el Altísimo Dios
  lexicon: HALOT; LSJ
  rationale: '''Altísimo'' es el título reverente más natural en español bíblico y conserva el registro elevado del original.'
- source_word: ובא בברית עמו / ἐγένετο ἐν διαθήκῃ μετʼ αὐτοῦ
  english_pob_choice: entered into covenant with him
  chosen_spanish: entró en pacto con él
  alternatives_spanish:
  - entró en alianza con él
  - llegó a estar en pacto con él
  lexicon: HALOT; LSJ
  rationale: '''Pacto'' es un equivalente bíblico claro en español; ''entró en'' expresa la iniciación de la relación pactal. ''Alianza'' sería posible, pero ''pacto'' mantiene mejor la terminología bíblica auditable del proyecto.'
- source_word: בבשרו / ἐν σαρκὶ αὐτοῦ
  english_pob_choice: In his flesh
  chosen_spanish: En su carne
  alternatives_spanish:
  - En su cuerpo
  - En su carne misma
  lexicon: HALOT; LSJ
  rationale: '''Carne'' respeta la formulación concreta del hebreo y del griego y preserva la posible alusión a la circuncisión sin explicitarla en exceso.'
- source_word: כרת לו חק / ἔστησεν διαθήκην
  english_pob_choice: he cut for him a statute / he established a covenant
  chosen_spanish: cortó para él un estatuto
  alternatives_spanish:
  - estableció para él un estatuto
  - hizo para él un decreto
  - estableció para él un pacto
  lexicon: HALOT; LSJ
  rationale: El hebreo ofrece חק ('estatuto') y כרת ('cortar'). Mantener 'cortó' preserva la literalidad del verbo y su posible conexión con el rito corporal; 'estatuto' sigue el testimonio hebreo primario, mientras que el griego divergente queda reflejado en la nota.
- source_word: בניסוי / ἐν πειρασμῷ
  english_pob_choice: in testing
  chosen_spanish: en la prueba
  alternatives_spanish:
  - en el examen
  - en la tentación
  - en la prueba de fidelidad
  lexicon: HALOT; LSJ
  rationale: '''Prueba'' comunica bien el sentido de comprobación/probación y evita reducir el término a ''tentación'', que en español sugiere sobre todo incitación al mal.'
- source_word: נמצא נאמן / εὑρέθη πιστός
  english_pob_choice: was found faithful
  chosen_spanish: fue hallado fiel
  alternatives_spanish:
  - fue encontrado fiel
  - se demostró fiel
  - resultó fiel
  lexicon: HALOT; LSJ
  rationale: '''Hallado fiel'' conserva el matiz judicial/relacional de ser encontrado y reconocido como tal, además de sonar bíblico sin ser arcaizante.'
theological_decisions:
- issue: Relación entre el texto hebreo y el paralelo griego en la cláusula media
  english_pob_reading: Main text follows the Hebrew 'statute' while preserving the Greek 'covenant' in a footnote.
  chosen_spanish_reading: El texto principal sigue el hebreo con 'estatuto'; la nota conserva la variante griega 'pacto'.
  alternative_spanish_readings:
  - En su carne, estableció para él un pacto
  - En su carne, hizo para él un pacto
  rationale: La evidencia hebrea es la base textual primaria del archivo, pero el paralelo griego introduce una diferencia real y significativa. La traducción principal debe seguir el hebreo sin borrar la divergencia, y la nota la mantiene visible para auditoría.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve source uncertainty honestly'
- issue: Alusión a la circuncisión por medio de 'En su carne'
  english_pob_reading: The phrase 'In his flesh' likely refers to circumcision as the bodily sign of the covenant with Abraham.
  chosen_spanish_reading: Conservar 'En su carne' sin explicitar la circuncisión en el cuerpo del versículo.
  alternative_spanish_readings:
  - En su carne, es decir, por la circuncisión
  - Mediante la circuncisión, en su carne
  rationale: El contexto inmediato ya apunta a Abraham, pero el texto es conciso y alusivo. En español conviene mantener esa sobriedad, dejando que la referencia implícita permanezca en el lector sin sobreexplicarla.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Matiz de 'fiel' al final
  english_pob_reading: he was found faithful
  chosen_spanish_reading: fue hallado fiel
  alternative_spanish_readings:
  - fue encontrado fiel
  - probado fiel
  rationale: '''Fiel'' preserva la lealtad pactal y la confiabilidad personal. En un contexto de pacto, no conviene sustituirlo por un término más psicológico o moralizante.'
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión auditada: se prefirió ''cortó'' para reflejar más literalmente כרת, se conservó el sustantivo hebreo ''estatuto'' en la cláusula media, y se mantuvo visible la divergencia griega mediante nota. La traducción española evita expandir la alusión a Abraham más allá de lo que el verso dice.'
  spanish_consistency_notes:
  - Se usa 'Altísimo' para el título divino, en línea con el estándar del proyecto.
  - '''Pacto'' se emplea como término bíblico estable; no se cambia a ''alianza'' en el texto principal para mantener coherencia terminológica.'
  - '''Carne'' se conserva para respetar la imagen corporal y la posible alusión a la circuncisión.'
  - '''Prueba'' traduce el ámbito de comprobación, no ''tentación'' en sentido moral estrecho.'
  - Los marcadores [a] y [b] aparecen en el texto exactamente donde corresponden a las notas.
