review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del hebreo y del POB inglés: mantiene la formulación casuística, la distinción entre אִישׁ y זָכָר, el modismo sexual, la gravedad de תּוֹעֵבָה y la responsabilidad final de דְּמֵיהֶם בָּם. Sin embargo, dos giros no preservan de la mejor manera el valor jurídico e idiomático del original: «ciertamente serán muertos» suena poco natural en español y no expresa tan bien la pasiva penal como «ciertamente se les dará muerte»; y «su sangre cae sobre ellos» introduce una imagen no presente en el hebreo, que más bien asigna responsabilidad o culpa de sangre.'
  spanish_quality_summary: 'La redacción es en general clara y digna, pero presenta calcos o formulaciones menos naturales para el español bíblico contemporáneo. «Como quien se acuesta con una mujer» puede simplificarse a «como se hace con una mujer» para evitar repetición pesada y conservar el valor idiomático. «Ciertamente serán muertos» es torpe en español moderno, y «su sangre cae sobre ellos» resulta menos idiomático que «su sangre será sobre ellos» o una formulación equivalente. La nota [a] también necesita corregirse: «las acostadas» es demasiado artificial; conviene una explicación más natural del hebreo.'
  glossary_alignment: No hay conflicto con los términos de proyecto principales. La distinción «hombre/varón» está bien justificada y alineada con la evidencia fuente. «Abominación» también está bien alineado. No aparecen términos de glosario mayor como Yahvé, Mesías o esclavo. La principal mejora necesaria es idiomática y jurídica, no de glosario.
  issues:
  - severity: medium
    issue: «Ciertamente serán muertos» es poco natural y jurídicamente débil en español.
    rationale: 'מוֹת יוּמָתוּ expresa una pena pasiva intensificada: ‘serán ciertamente puestos a muerte’. En español bíblico natural, «se les dará muerte» o «serán ciertamente ejecutados» comunica mejor la construcción sin sonar como calco áspero.'
  - severity: medium
    issue: «Su sangre cae sobre ellos» no refleja con precisión el modismo hebreo.
    rationale: דְּמֵיהֶם בָּם no describe algo que ‘cae’ sobre ellos; asigna responsabilidad por su propia sangre o culpa de sangre. El verbo «cae» añade una imagen ajena al texto.
  - severity: low
    issue: 'La nota [a] usa una explicación demasiado literal y poco natural: «las acostadas de una mujer».'
    rationale: Aunque intenta reflejar el plural hebreo, la formulación española resulta opaca. Es mejor explicar el hebreo como «los lechos de una mujer» o indicar directamente que es un modismo para relaciones sexuales con una mujer.
  revised_spanish_text: Si un hombre se acuesta con un varón[a] como se hace con una mujer, ambos han cometido una abominación; ciertamente se les dará muerte[b]; su sangre será sobre ellos.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «los lechos de una mujer», un modismo para la relación sexual con una mujer.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «su culpabilidad de sangre recaerá sobre ellos».'
    reason: lexical_alternative
  revision_rationale: Se ajusta la pena legal a un español más natural y fiel al pasivo intensificado del hebreo, y se corrige el modismo final para no introducir la imagen de ‘caer’ que no está en el texto. También se mejora la nota del modismo hebreo para que sea comprensible en español sin perder el dato lexical preservado por el POB inglés.
