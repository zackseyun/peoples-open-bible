revisions:
- from: Así, el hombre se acuesta y no se levanta[a]; hasta que los cielos no sean[b], no despertarán ni serán removidos de su sueño.
  to: Así, el hombre se acuesta y no se levanta; hasta que los cielos dejen de existir[a], no despertarán ni serán despertados de su sueño[b].
  rationale: La revisión corrige la colocación de la nota para que corresponda al segmento fuente documentado, mejora la naturalidad del idiomatismo hebreo en español, y sustituye «serán removidos» por «serán despertados», que refleja mejor el sentido del verbo hebreo y preserva la metáfora del sueño en un español claro y eclesialmente legible.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:12:53Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y la metáfora de muerte como sueño del hebreo: «el hombre», «se acuesta», «no se levanta», y el cambio al plural en «no despertarán». Sin embargo, dos decisiones no reflejan bien el sentido ni la calidad del audit trail: la nota [a] está anclada en la frase equivocada, pues la alternativa documentada corresponde a «hasta que los cielos no sean», no a «no se levanta»; y «serán removidos» no representa con fidelidad natural el nifal de עור aquí, que significa ser despertados/ser sacudidos del sueño, no simplemente removidos.'
  spanish_quality_summary: 'El texto es mayormente legible y digno, pero «hasta que los cielos no sean» suena demasiado calcado e impropio en español corriente, y «serán removidos» resulta poco idiomático y semánticamente impreciso. Una reparación menor produce un español más natural sin perder la tensión poética: «hasta que los cielos dejen de existir» y «ni serán despertados». También conviene ajustar «de su sueño» a «de su sueño» o mejor «de su sueño»; el singular posesivo es aceptable como colectivo, aunque «de su sueño» con plural verbal mantiene la cohesión suficiente. La principal corrección estructural es reubicar la nota [a].'
  glossary_alignment: No hay términos del glosario mayor implicados como Yahvé/Mesías. «El hombre» está bien alineado con la política de género representativo. La imagen de sueño y levantarse se preserva correctamente. La revisión propuesta mejora la fidelidad léxica de עור y la naturalidad del idiomatismo hebreo sin apartarse de la justificación teológica del POB.
  issues:
  - severity: high
    issue: La nota [a] está colocada en «no se levanta» en vez de en la frase sobre los cielos.
    rationale: El audit trail inglés deja claro que la alternativa «until the heavens cease to be» corresponde a עַד בִּלְתִּי שָׁמַיִם, no a וְלֹא יָקוּם. Tal como está, la nota española documenta el lugar equivocado y puede confundir al lector.
  - severity: medium
    issue: «Hasta que los cielos no sean» es demasiado literal y poco natural en español.
    rationale: Aunque intenta preservar el hebraísmo, en español moderno suena forzado y ambiguo. «Hasta que los cielos dejen de existir» o «hasta que los cielos dejen de ser» comunica mejor el mismo horizonte idiomático sin paráfrasis excesiva.
  - severity: medium
    issue: «Ni serán removidos» no es una buena representación de וְלֹא יֵעֹרוּ.
    rationale: El verbo hebreo aquí intensifica la imagen de despertar/ser despertado. «Removidos» en español no activa con claridad el campo semántico del sueño y debilita la metáfora. «Ni serán despertados» conserva mejor el paralelo poético y el valor pasivo.
  revised_spanish_text: Así, el hombre se acuesta y no se levanta; hasta que los cielos dejen de existir[a], no despertarán ni serán despertados de su sueño[b].
  revised_footnotes:
  - marker: a
    text: 'O: «hasta que los cielos dejen de ser». El giro hebreo es idiomático y señala un límite prácticamente inalcanzable.'
    reason: lexical_alternative
  - marker: b
    text: 'La imagen del sueño continúa la metáfora de la muerte: «no despertarán ni serán despertados de su sueño».'
    reason: cultural_note
  revision_rationale: La revisión corrige la colocación de la nota para que corresponda al segmento fuente documentado, mejora la naturalidad del idiomatismo hebreo en español, y sustituye «serán removidos» por «serán despertados», que refleja mejor el sentido del verbo hebreo y preserva la metáfora del sueño en un español claro y eclesialmente legible.
