id: 1TI.1.18
reference: 1 Timothy 1:18
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ταύτην τὴν παραγγελίαν παρατίθεμαί σοι, τέκνον Τιμόθεε, κατὰ τὰς προαγούσας ἐπὶ σὲ προφητείας, ἵνα ⸀στρατεύῃ ἐν αὐταῖς τὴν καλὴν στρατείαν,
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/001/018.yaml
  text: This charge I entrust to you[a], child Timothy, in accordance with the prophecies previously made about you, so that by them you may wage the good warfare[c][b],
  footnotes:
  - marker: a
    text: Or 'concerning you'; possibly 'over you' in the sense of prophecies spoken over Timothy.
    reason: lexical_alternative
  - marker: b
    text: Or 'through them' or 'in them'; the Greek may express means or sphere.
    reason: lexical_alternative
  - marker: c
    text: 'Traditional rendering: ''fight the good fight.'' The Greek more literally says ''wage the good warfare.'''
    reason: lexical_alternative
translation:
  language: ko
  text: 내 자녀 디모데여, 이 명령을 그대에게 맡깁니다. 전에 그대를 두고[a] 한 예언들에 따라, 그대가 그것들로[b] 선한 싸움을 싸우게[c] 하기 위함입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그대에 관하여」 「그대 위에」. 디모데에게 선포된 예언들을 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「그것들을 통해」 「그것들 가운데서」.
    reason: lexical_alternative
  - marker: c
    text: 전통적 번역은 「선한 싸움을 싸우라」. 헬라어 στρατεύω는 보다 직접적으로 「군대로 싸움하다·전투를 치르다」의 의미.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταύτην τὴν παραγγελίαν
  english_pob_choice: This charge
  chosen_korean: 이 명령
  alternatives_korean:
  - 이 분부
  - 이 가르침
  lexicon: BDAG
  rationale: 3절·5절의 παραγγελία/παραγγέλλω와 일관되게 「명령」으로 옮긴다.
- source_word: παρατίθεμαί
  english_pob_choice: I entrust
  chosen_korean: 맡깁니다
  alternatives_korean:
  - 위임합니다
  - 부탁합니다
  lexicon: BDAG
  rationale: παρατίθημι는 위탁의 어감. 「맡깁니다」가 자연스럽다.
- source_word: τέκνον Τιμόθεε
  english_pob_choice: child Timothy
  chosen_korean: 내 자녀 디모데여
  alternatives_korean:
  - 자녀 디모데여
  - 디모데 자녀야
  lexicon: BDAG
  rationale: 호격 + 영적 자녀 관계. 「내 자녀 디모데여」가 친밀과 권위를 함께 담는다. 「디모데」는 한국 교회 정립 표기.
- source_word: κατὰ τὰς προαγούσας ἐπὶ σὲ προφητείας
  english_pob_choice: in accordance with the prophecies previously made about you
  chosen_korean: 전에 그대를 두고 한 예언들에 따라
  alternatives_korean:
  - 그대에 관해 전에 주어진 예언들을 따라
  - 그대 위에 앞서 행한 예언들에 따라
  lexicon: BDAG
  rationale: προάγω의 「앞서·전에」와 ἐπί + 대격의 「~을 두고/위에」 어감을 자연스럽게 결합한다.
- source_word: στρατεύῃ τὴν καλὴν στρατείαν
  english_pob_choice: you may wage the good warfare
  chosen_korean: 선한 싸움을 싸우게
  alternatives_korean:
  - 좋은 전투를 치르게
  - 그 선한 군무를 수행하게
  lexicon: BDAG
  rationale: 동족어 어휘 결합(στρατεύω + στρατεία)을 한국어로 「싸움을 싸우다」 동족어 결합으로 보존하되, 「선한」으로 καλός의 도덕적 어감을 살린다.
