review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo y la línea del POB en los elementos principales: «Yahvé» por יְהוָה, «mi porción» por חֶלְקִי, «dice mi alma» por אָמְרָה נַפְשִׁי, y la inferencia «por eso». Sin embargo, la nota b no preserva con fidelidad la alternativa inglesa principal «I will wait for him», porque «aguardaré por él» suena menos natural y además desplaza innecesariamente la preposición frente al texto principal «en él».'
  spanish_quality_summary: 'El español base es claro y digno. No obstante, en la nota b «aguardaré por él» y sobre todo «aguardaré expectantemente por él» resultan poco naturales en español eclesial general. Conviene expresar la alternativa con español más idiomático: «esperaré por él» o «lo esperaré», y «esperaré con expectativa».'
  glossary_alignment: 'La terminología del proyecto está bien alineada: «Yahvé» se mantiene correctamente; no hay conflicto con otros términos doctrinales. «Mi porción» es una buena equivalencia devocional para חֵלֶק. «Mi alma» conserva el registro poético. La única corrección necesaria es estilístico-lexical en la nota alternativa del verbo יחל.'
  issues:
  - severity: medium
    issue: 'La nota b usa formulaciones poco naturales: «aguardaré por él» y «aguardaré expectantemente por él».'
    rationale: El inglés auditado preserva alternativas léxicas de espera/espera expectante. En español, «aguardar por» no es imposible, pero aquí suena forzado, y «expectantemente» es demasiado rígido. Debe conservarse la alternativa semántica con español más natural y legible.
  revised_spanish_text: «Yahvé es mi porción», dice mi alma[a]; «por eso esperaré en él[b]».
  revised_footnotes:
  - marker: a
    text: O «mi parte» o «mi herencia».
    reason: lexical_alternative
  - marker: b
    text: O «esperaré por él» o «esperaré con expectativa por él».
    reason: lexical_alternative
  revision_rationale: 'Se mantiene el texto principal, que es fiel al hebreo y al POB, pero se reparan las alternativas de la nota b para que el español suene natural y siga reflejando la gama semántica de יחל: esperanza y espera expectante.'
