revisions:
- from: Guardarás la fiesta de los panes sin levadura[a]. Durante siete días comerás panes sin levadura, como te he mandado, en el tiempo señalado, en el mes de Abib[b]; porque en el mes de Abib saliste de Egipto[c].
  to: Guardarás la fiesta de los panes sin levadura[a]. Durante siete días comerás panes sin levadura, como te mandé, en el tiempo señalado, en el mes de Abib[b]; porque en el mes de Abib saliste de Egipto[c].
  rationale: Se ajusta el tiempo verbal a «como te mandé» para reflejar mejor el perfecto hebreo y el audit trail inglés. También se corrige la nota [c] para que preserve una alternativa española real en vez de repetir el texto principal. El resto del borrador es fiel, claro y compatible con el estilo del proyecto.
