translation:
  language: es
  text: 'Entonces el enojo de Saúl se encendió contra Jonatán[a], y le dijo: «¡Hijo de una mujer perversa y rebelde! ¿Acaso no sé yo que tú has escogido al hijo de Isaí[c][b], para tu propia vergüenza y para la vergüenza de la desnudez de tu madre?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¡Hijo de perversidad y rebelión!». El insulto hebreo es difícil y muy idiomático.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «tú te estás poniendo del lado del hijo de Isaí».'
    reason: lexical_alternative
  - marker: c
    text: La expresión «la vergüenza de la desnudez de tu madre» es una forma hebrea severa de deshonra familiar.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּחַר אַף
  english_pob_choice: Saul’s anger burned
  chosen_spanish: el enojo de Saúl se encendió
  alternatives_spanish:
  - Saúl se enojó
  - la ira de Saúl ardió
  lexicon: HALOT
  rationale: Conserva la imagen idiomática del fuego/ardor asociada a חרה אַף, pero en español suena más natural decir que el enojo “se encendió” que calcar “ardió” sin matiz.
- source_word: בִּיהוֹנָתָן
  english_pob_choice: against Jonathan
  chosen_spanish: contra Jonatán
  alternatives_spanish:
  - a Jonatán
  - con Jonatán
  lexicon: HALOT
  rationale: La preposición con חרה אַף señala el objeto de la ira; “contra” expresa mejor la dirección hostil en español.
- source_word: בֶּן נַעֲוַת הַמַּרְדּוּת
  english_pob_choice: You son of a perverse, rebellious woman
  chosen_spanish: ¡Hijo de una mujer perversa y rebelde!
  alternatives_spanish:
  - ¡Hijo de perversidad y rebelión!
  - ¡Hijo de una perversidad rebelde!
  lexicon: HALOT
  rationale: Sigo la decisión inglesa de hacer explícita la referencia materna implícita en el insulto hebreo para que el lector español perciba la agresión idiomática; “perversa y rebelde” conserva el par semántico de desviación y rebelión.
- source_word: הֲלוֹא יָדַעְתִּי
  english_pob_choice: Do I not know
  chosen_spanish: ¿No sé acaso
  alternatives_spanish:
  - ¿Acaso no sé?
  - ¿No lo sé yo?
  lexicon: HALOT
  rationale: La forma interrogativa negativa se mantiene como reproche retórico; “acaso” ayuda a reproducir la fuerza enfática sin convertirla en mera afirmación.
- source_word: בֹחֵר אַתָּה לְבֶן יִשַׁי
  english_pob_choice: you have chosen the son of Jesse
  chosen_spanish: tú has escogido al hijo de Isaí
  alternatives_spanish:
  - tú estás eligiendo al hijo de Isaí
  - tú has tomado el partido del hijo de Isaí
  lexicon: HALOT
  rationale: “Escogido” conserva el núcleo léxico de בחר; aunque el contexto sugiere tomar partido, aquí se preserva primero el verbo de elección, como en la POB inglesa.
- source_word: לְבָשְׁתְּךָ
  english_pob_choice: to your own shame
  chosen_spanish: para tu propia vergüenza
  alternatives_spanish:
  - para tu vergüenza
  - en tu propia vergüenza
  lexicon: HALOT
  rationale: “Vergüenza” comunica el valor de בֹשֶׁת/בָּשָׁה en un registro claro y bíblico; “para” refleja el valor de resultado de la preposición לְ.
- source_word: וּלְבֹשֶׁת עֶרְוַת אִמֶּךָ
  english_pob_choice: and to the shame of your mother’s nakedness
  chosen_spanish: y para la vergüenza de la desnudez de tu madre
  alternatives_spanish:
  - y para la vergüenza de la desnudez de tu madre
  - y para la vergüenza del desnudo de tu madre
  - y para la vergüenza de la desnudez materna
  lexicon: HALOT
  rationale: Mantengo “desnudez” para עֶרְוָה por su fuerza cruda y su carga de deshonra familiar; “de tu madre” sigue el hebreo sin suavizarlo, y “vergüenza” conserva la repetición con לְבָשְׁתְּךָ.
translation_notes:
  revision_awareness: La redacción española sigue de cerca el texto hebreo y la decisión POB inglesa de preservar el insulto idiomático, la dirección hostil de la ira y la dureza de la expresión final; no se observaron revisiones posteriores que exijan ajuste.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para el nombre divino en este proyecto, pero este versículo no lo contiene.
  - Se mantiene ‘Jonatán’ e ‘Isaí’ con formas españolas usuales y sin normalización a formas tradicionales arcaizantes.
  - Se conserva el tono ofensivo del insulto sin eufemismos para no debilitar la fuerza del hebreo.
