translation:
  language: es
  text: Y tomó a su padre y aplicó la hiel sobre los ojos de su padre, diciendo,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπελάβετο
  english_pob_choice: took hold of
  chosen_spanish: tomó de la mano
  alternatives_spanish:
  - tomó
  - se agarró de
  - sujetó a
  lexicon: BDAG
  rationale: El griego indica un acto físico de sujetar o tomar a alguien. En español, «tomó de la mano» expresa con naturalidad el gesto concreto de guiar o sostener al padre antes de aplicar el remedio, sin añadir una interpretación afectiva que el contexto no exige.
- source_word: προσέπασεν
  english_pob_choice: applied
  chosen_spanish: aplicó
  alternatives_spanish:
  - extendió
  - untó
  - puso
  lexicon: LSJ
  rationale: El verbo describe poner o untar una sustancia sobre una superficie. «Aplicó» conserva el sentido medicinal y es idiomático en español moderno.
- source_word: χολὴν
  english_pob_choice: gall
  chosen_spanish: hiel
  alternatives_spanish:
  - bilis
  - gallina
  lexicon: LSJ
  rationale: «Hiel» transmite de forma literal y bíblica el sentido de χολή, y mantiene el tono narrativo del relato. «Bilis» sería más técnico, pero menos natural en este contexto literario.
- source_word: ὀφθαλμούς
  english_pob_choice: eyes
  chosen_spanish: ojos
  alternatives_spanish:
  - vista
  - globos oculares
  lexicon: BDAG
  rationale: La palabra común y exacta en español es «ojos». No hay motivo para una formulación anatómica más técnica.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: El participio presenta la acción de hablar en continuidad con la acción anterior y prepara la cita del siguiente versículo. «Diciendo» reproduce esa apertura sintáctica.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego de Swete con la misma secuencia narrativa que el audit trail inglés: acción física de sujetar, aplicación de la hiel, y participio final abierto que enlaza con el discurso siguiente. No se documentan revisiones textuales ni alternativas teológicas relevantes en el paquete recibido.'
  spanish_consistency_notes:
  - Se mantiene «hiel» para χολή, en continuidad con el registro bíblico y el valor literal del remedio.
  - Se evita «SEÑOR» u այլ sustitución reverencial porque el versículo no contiene el nombre divino.
  - La estructura conserva el gerundio final «diciendo» para reflejar la subordinación participial del griego.
