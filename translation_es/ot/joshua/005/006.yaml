translation:
  language: es
  text: Porque los hijos de Israel habían andado en el desierto cuarenta años[a], hasta que toda la nación —los hombres de guerra que salieron de Egipto— llegó a su fin, porque no habían escuchado la voz de Yahvé. Yahvé les había jurado que no les dejaría ver la tierra que Yahvé había jurado a sus padres darnos, una tierra que mana leche y miel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: "darnos"; algunas versiones antiguas y traducciones leen "darles".'
    reason: textual_variant
lexical_decisions:
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Conservo la construcción filial del hebreo, que es más transparente que 'israelitas' y no borra el valor formal del constructo. 'Hijos' es el equivalente natural y digno en español bíblico contemporáneo.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto árido
  - en la estepa
  lexicon: HALOT
  rationale: En español, 'desierto' comunica adecuadamente el ámbito del éxodo; 'wilderness' no requiere una calca extranjera. Aunque 'desierto' puede sonar más seco que el trasfondo hebreo, aquí la referencia geográfica es clara y natural.
- source_word: הָלְכוּ
  english_pob_choice: had walked
  chosen_spanish: habían andado
  alternatives_spanish:
  - habían caminado
  - habían ido
  lexicon: HALOT
  rationale: '''Andar'' conserva mejor el movimiento continuo y retrospectivo de la narración que ''caminar'', que suena más moderno pero menos idiomático en este registro. El pluscuamperfecto mantiene el valor de antecedencia del contexto.'
- source_word: עַד תֹּם
  english_pob_choice: until ... had come to an end
  chosen_spanish: hasta que ... llegó a su fin
  alternatives_spanish:
  - hasta que ... terminó
  - hasta que ... se acabó
  lexicon: HALOT
  rationale: La idea de consumación/completamiento se expresa de manera natural con 'llegó a su fin', sin introducir más contenido que el hebreo. 'Terminó' es posible, pero menos enfático en el agotamiento total del grupo.
- source_word: כָּל הַגּוֹי
  english_pob_choice: all the nation
  chosen_spanish: toda la nación
  alternatives_spanish:
  - todo el pueblo
  - toda la generación
  lexicon: HALOT
  rationale: '''Nación'' reproduce el valor léxico de גוי y respeta la formulación del texto fuente. ''Pueblo'' sería más idiomático, pero suaviza el término; ''generación'' interpreta más que traduce.'
- source_word: אַנְשֵׁי הַמִּלְחָמָה
  english_pob_choice: the men of war
  chosen_spanish: los hombres de guerra
  alternatives_spanish:
  - los guerreros
  - los hombres de batalla
  lexicon: HALOT
  rationale: Mantengo la construcción nominal masculina y militar del hebreo. 'Guerreros' suena natural, pero pierde la forma literal y el eco bíblico de 'hombres de guerra'.
- source_word: הַיֹּצְאִים מִמִּצְרַיִם
  english_pob_choice: who came out of Egypt
  chosen_spanish: que salieron de Egipto
  alternatives_spanish:
  - que habían salido de Egipto
  lexicon: HALOT
  rationale: '''Salir de Egipto'' es el equivalente más directo y bíblicamente reconocible para el éxodo. El participio se integra bien como relativo sin forzar una perífrasis más pesada.'
- source_word: לֹא שָׁמְעוּ בְּקוֹל יְהוָה
  english_pob_choice: they had not listened to the voice of Yahweh
  chosen_spanish: no habían escuchado la voz de Yahvé
  alternatives_spanish:
  - no habían obedecido a Yahvé
  - no habían escuchado la voz de Yahvé
  lexicon: HALOT
  rationale: Conservo la metáfora hebrea de 'escuchar la voz', que incluye la idea de obediencia sin reducirla a una paráfrasis. 'Escuchar' aquí reproduce la relación auditiva y de sumisión implícita en el original.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Sigo el estándar del proyecto para el nombre divino, manteniendo la transparencia frente al texto hebreo. 'SEÑOR' ocultaría el tetragrámaton; 'Jehová' no corresponde al criterio textual adoptado.
- source_word: לְבִלְתִּי הַרְאוֹתָם
  english_pob_choice: that he would not let them see
  chosen_spanish: que no les dejaría ver
  alternatives_spanish:
  - que no les mostraría
  - que no haría que vieran
  lexicon: HALOT
  rationale: '''Dejaría ver'' conserva la fuerza causativa de הראה en una forma española natural. Evita tanto la rigidez de ''hacer ver'' como la posible ambigüedad de ''mostraría''.'
- source_word: אֶת הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra prometida
  - el país
  lexicon: HALOT
  rationale: '''Tierra'' mantiene el término covenantal básico del pasaje sin añadir el adjetivo ''prometida'', que no aparece aquí. ''País'' sería menos bíblico en este contexto.'
- source_word: לַאֲבוֹתָם
  english_pob_choice: to their fathers
  chosen_spanish: a sus padres
  alternatives_spanish:
  - a sus antepasados
  - a sus padres
  lexicon: HALOT
  rationale: '''Padres'' refleja de manera directa el hebreo y conserva el lenguaje de alianza y linaje. ''Antepasados'' explica, pero no reproduce con la misma precisión el término del texto.'
- source_word: לָתֵת לָנוּ
  english_pob_choice: to give to us
  chosen_spanish: dar a nosotros
  alternatives_spanish:
  - darnos
  - dar a nosotros
  lexicon: HALOT
  rationale: Conservo la primera persona plural del texto masorético, que es la lectura difícil y debe quedar visible. En español, 'dar a nosotros' es menos idiomático que 'darnos', pero mantiene mejor la transparencia textual y permite notar la tensión del manuscrito.
- source_word: אֶרֶץ זָבַת חָלָב וּדְבָשׁ
  english_pob_choice: a land flowing with milk and honey
  chosen_spanish: una tierra que fluye leche y miel
  alternatives_spanish:
  - una tierra que mana leche y miel
  - una tierra de leche y miel
  lexicon: HALOT
  rationale: '''Que fluye leche y miel'' sigue de cerca la imagen participial del hebreo. Aunque ''mana'' es muy natural en español bíblico, ''fluye'' conserva mejor el vínculo con el patrón lexical de la fuente.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio del pacto en vez de una sustitución reverencial. Esto mantiene la visibilidad del tetragrámaton y la continuidad con el criterio editorial del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Tensión textual en לָנוּ ('a nosotros')
  english_pob_reading: to us
  chosen_spanish_reading: a nosotros
  alternative_spanish_readings:
  - a ellos
  - a sus padres
  rationale: Se conserva la lectura masorética de primera persona plural, aun cuando suene inesperada en la frase. Esto deja visible la tensión textual en lugar de normalizarla sin señalización.
  doctrine_reference: DOCTRINE.md Translation philosophy 1, 3, 5
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el audit trail inglés: conserva el nombre divino como Yahvé, mantiene la metáfora de escuchar la voz, y deja visible la variante textual en לָנוּ mediante nota. No se requieren revisiones adicionales según el resumen de revisión más reciente.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, sin sustituirlo por 'SEÑOR'.
  - '''Hijos de Israel'' mantiene el mismo referente colectivo que el inglés ''sons of Israel''.'
  - '''Tierra'' y no ''país'' preserva el campo semántico pactal del pasaje.'
  - La nota al pie marca explícitamente la variante textual del verbo final para no ocultar la tensión entre la lectura masorética y otras tradiciones.
