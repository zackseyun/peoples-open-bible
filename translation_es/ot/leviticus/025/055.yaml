translation:
  language: es
  text: Porque los hijos de Israel son mis siervos[a]; ellos son mis siervos, a quienes saqué de la tierra de Egipto. Yo soy Yahvé, vuestro Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O "los israelitas" o "los hijos de Israel". Hebreo: "los hijos de Israel".'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: La expresión hebrea es un giro corporativo filial masculino plural. En español, 'hijos de Israel' conserva mejor la forma y el paralelo con el hebreo que 'israelitas', aunque este último sería más idiomático como colectivo.
- source_word: עֲבָדִים / עֲבָדַי
  english_pob_choice: my servants
  chosen_spanish: mis siervos
  alternatives_spanish:
  - mis esclavos
  - mis servidores
  lexicon: HALOT
  rationale: Aquí el audit trail inglés revisó la opción desde 'slaves' a 'servants' para adecuarse al registro pactal de la frase. En español, 'siervos' mantiene esa lectura covenantal y evita una sobrecarga anacrónica de 'esclavos', sin borrar la idea de pertenencia total a Yahvé.
- source_word: הוֹצֵאתִי אוֹתָם
  english_pob_choice: whom I brought out
  chosen_spanish: a quienes saqué
  alternatives_spanish:
  - a quienes saqué
  - a quienes hice salir
  - que saqué
  lexicon: HALOT
  rationale: '''Sacar'' refleja de manera natural el verbo de éxodo y preserva la fórmula histórica ''sacar de la tierra de Egipto'' mejor que una paráfrasis más libre.'
- source_word: מֵאֶרֶץ מִצְרָיִם
  english_pob_choice: out of the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de la tierra de Egipto
  - fuera de la tierra de Egipto
  lexicon: HALOT
  rationale: '''De la tierra de Egipto'' conserva la fórmula estable del éxodo en español bíblico y se integra bien con ''saqué''.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el default del proyecto para el nombre divino: ''Yahvé'', no el reemplazo por ''SEÑOR''.'
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios
  - vuestro Dios
  lexicon: HALOT
  rationale: En español bíblico contemporáneo, 'su Dios' es más natural y ampliamente readable para un registro neutral latinoamericano. El posesivo mantiene la fórmula de alianza sin forzar un voseo o un plural arcaizante.
theological_decisions:
- issue: How to render bonded-status language in Levítico 25:55
  english_pob_reading: my servants
  chosen_spanish_reading: mis siervos
  alternative_spanish_readings:
  - mis esclavos
  - mis servidores
  rationale: El contexto subraya que Israel pertenece a Yahvé y no debe ser reducido permanentemente a otra posesión humana. 'Siervos' conserva el vínculo de pertenencia y el registro pactal que el inglés POB quiso resaltar con la revisión desde 'slaves' a 'servants'.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; treatment of contested bonded-status terms
- issue: Corporate masculine expression בְנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel
  rationale: Se preserva la forma masculina plural del hebreo, evitando neutralizarla en el texto principal. La opción mantiene la transparencia formal sin impedir comprensión.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión importante: se cambió ''slaves'' por ''servants'' para עֲבָדִים/עֲבָדַי. La redacción española sigue esa revisión y la integra como ''siervos'', manteniendo la tensión semántica de pertenencia sin volver al término más duro ''esclavos''. También se conserva la estructura del versículo y la fórmula del éxodo, con el nombre divino en la forma proyectada ''Yahvé''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino, conforme al criterio general del proyecto.
  - Se usa 'siervos' para reflejar el registro pactal adoptado en la revisión inglesa, evitando tanto 'esclavos' como un tono excesivamente blando.
  - '''Su Dios'' se eligió por naturalidad en español latinoamericano neutral y para conservar la relación de pacto sin introducir formas arcaicas.'
