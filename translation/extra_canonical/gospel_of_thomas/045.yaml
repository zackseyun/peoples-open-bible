translation:
  text: 'Jesus said, “They do not pick grapes from thorns, nor do they gather figs[b] from thistles—for they do not give fruit. A good person[a] brings out a good thing from his storehouse; an evil person brings out an evil thing from his storehouse that is in his heart[c], and he speaks evil[d], for from the overflow of the heart he brings out evil.”'
