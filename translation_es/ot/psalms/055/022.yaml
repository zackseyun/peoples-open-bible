translation:
  language: es
  text: Las palabras de su boca son suaves[a], pero su corazón es guerra; sus palabras son más suaves que el aceite, y sin embargo son espadas desenvainadas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «palabras halagüeñas». La expresión hebrea es rara y puede enfatizar un habla aduladora o untuosa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «espadas sacadas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָלְקוּ
  english_pob_choice: are smooth
  chosen_spanish: son suaves
  alternatives_spanish:
  - son lisas
  - son resbaladizas
  - son halagüeñas
  lexicon: HALOT
  rationale: En este contexto, חלק expresa la cualidad de habla suave o seductora, no la acción de dividir. «Son suaves» comunica esa cualidad en español sin perder la imagen de habla pulida.
- source_word: מַחְמָאֹת פִּיו
  english_pob_choice: the words of his mouth
  chosen_spanish: las palabras de su boca
  alternatives_spanish:
  - las cosas suaves de su boca
  - las halagos de su boca
  - las palabras halagüeñas de su boca
  lexicon: HALOT
  rationale: La construcción es rara y apunta a discurso agradable o adulador. «Las palabras de su boca» mantiene el referente al habla y funciona en español, mientras la suavidad se expresa con el adjetivo anterior.
- source_word: וּקֲרָב לִבּוֹ
  english_pob_choice: but his heart is war
  chosen_spanish: pero su corazón es guerra
  alternatives_spanish:
  - y su corazón es guerra
  - pero dentro de él hay guerra
  - pero en su corazón hay batalla
  lexicon: HALOT
  rationale: קרב aquí es un sustantivo con sentido de guerra/batalla. La forma breve «su corazón es guerra» conserva la metáfora tajante del hebreo y la antítesis con el habla suave.
- source_word: רַכּוּ דְבָרָיו
  english_pob_choice: his words are softer
  chosen_spanish: sus palabras son más blandas
  alternatives_spanish:
  - sus palabras son más suaves
  - sus palabras son tiernas
  - sus palabras son más dulces
  lexicon: HALOT
  rationale: רכך expresa blandura o suavidad física por comparación. «Más blandas» conserva el comparativo y la resonancia sensorial frente al aceite, evitando sustituirla por una interpretación más abstracta.
- source_word: מִשֶּׁמֶן
  english_pob_choice: than oil
  chosen_spanish: que el aceite
  alternatives_spanish:
  - que el óleo
  - que el aceite de oliva
  lexicon: HALOT
  rationale: שמן significa «aceite» de manera directa. En español bíblico moderno, «aceite» es claro y mantiene la comparación sin agregar especificación no requerida por el hebreo.
- source_word: פְתִחוֹת
  english_pob_choice: drawn swords
  chosen_spanish: espadas desenvainadas
  alternatives_spanish:
  - espadas sacadas
  - sables desenvainados
  - armas desenvainadas
  lexicon: HALOT
  rationale: El término se entiende idiomáticamente como armas abiertas o desenvainadas. «Espadas desenvainadas» refleja bien la imagen de violencia ya lista para herir.
- source_word: וְהֵמָּה
  english_pob_choice: yet they are
  chosen_spanish: y sin embargo son
  alternatives_spanish:
  - pero son
  - y son
  - sin embargo, son
  lexicon: HALOT
  rationale: La conjunción con pronombre marca contraste fuerte con la comparación anterior. «Y sin embargo» reproduce ese giro adversativo de manera natural en español.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y la lectura ya auditada por la versión inglesa POB. Se conserva la tensión entre habla aparentemente suave y violencia interna, sin suavizarla ni convertirla en una paráfrasis explicativa.
  spanish_consistency_notes:
  - Se mantiene «aceite» como equivalente directo de שמן.
  - Se usa «espadas desenvainadas» para reflejar la lectura idiomática de פְתִחוֹת, en continuidad con la nota alternativa del POB en inglés.
  - Se preserva la antítesis retórica mediante «pero» / «y sin embargo» sin añadir contenido interpretativo.
