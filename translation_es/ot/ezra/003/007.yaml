translation:
  language: es
  text: Así que dieron dinero[a] a los canteros y a los artesanos, y comida, bebida y aceite a los sidonios y a los tirios, para traer maderos de cedro desde el Líbano hasta el mar en Jope[b], según la autorización[c] de Ciro, rey de Persia, para ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘plata’. El hebreo puede designar el metal o el dinero en un contexto de pago.
    reason: lexical_alternative
  - marker: b
    text: O ‘al puerto de Jope’. Literalmente, ‘al mar de Jope’.
    reason: lexical_alternative
  - marker: c
    text: O ‘según el permiso’ o ‘según la concesión de Ciro, rey de Persia, para ellos’.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֶסֶף
  english_pob_choice: money
  chosen_spanish: dinero
  alternatives_spanish:
  - plata
  lexicon: HALOT
  rationale: En contexto de pago, כֶסֶף puede referirse al metal o al medio de pago; ‘dinero’ expresa mejor la función económica aquí. Se conserva la alternativa ‘plata’ porque el término hebreo la permite.
- source_word: לַחֹצְבִים
  english_pob_choice: to the stonecutters
  chosen_spanish: a los canteros
  alternatives_spanish:
  - a los cortadores de piedra
  - a los canteros de piedra
  lexicon: HALOT
  rationale: El participio de חצב designa a quienes cortan o extraen piedra. ‘Canteros’ es natural en español y mantiene el oficio de construcción.
- source_word: וְלֶחָרָשִׁים
  english_pob_choice: and to the craftsmen
  chosen_spanish: y a los artesanos
  alternatives_spanish:
  - y a los obreros
  - y a los oficiantes
  lexicon: HALOT
  rationale: חָרָשׁ puede abarcar artesano u obrero especializado. ‘Artesanos’ comunica bien la destreza del trabajo sin limitarlo innecesariamente a una sola materia.
- source_word: וּמַאֲכָל
  english_pob_choice: food
  chosen_spanish: comida
  alternatives_spanish:
  - provisiones
  - alimento
  lexicon: HALOT
  rationale: Aquí se trata de suministros concretos; ‘comida’ es claro y directo. ‘Provisiones’ también sería posible, pero algo más interpretativo.
- source_word: וּמִשְׁתֶּה
  english_pob_choice: drink
  chosen_spanish: bebida
  alternatives_spanish:
  - licor
  - para beber
  lexicon: HALOT
  rationale: En esta lista de suministros, el sustantivo funciona concretamente como bebida, no como banquete. ‘Bebida’ preserva esa concreción.
- source_word: וָשֶׁמֶן
  english_pob_choice: and oil
  chosen_spanish: aceite
  alternatives_spanish:
  - y aceite de oliva
  - y aceite
  lexicon: HALOT
  rationale: El hebreo dice simplemente ‘aceite’; no obliga a especificar ‘de oliva’. En español, ‘aceite’ mantiene la generalidad del término.
- source_word: לַצִּדֹנִים וְלַצֹּרִים
  english_pob_choice: to the Sidonians and the Tyrians
  chosen_spanish: a los sidonios y a los tirios
  alternatives_spanish:
  - a los habitantes de Sidón y de Tiro
  lexicon: HALOT
  rationale: Los gentilicios corresponden a Sidón y Tiro, proveedores fenicios de madera. El español acepta bien los gentilicios tradicionales ‘sidonios’ y ‘tirios’.
- source_word: לְהָבִיא
  english_pob_choice: to bring
  chosen_spanish: para traer
  alternatives_spanish:
  - para llevar
  - a fin de traer
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad. ‘Para traer’ es natural en español y conserva la relación con el verbo principal de dar.
- source_word: עֲצֵי אֲרָזִים
  english_pob_choice: cedar logs
  chosen_spanish: maderas de cedro
  alternatives_spanish:
  - troncos de cedro
  - madera de cedro
  - maderos de cedro
  lexicon: HALOT
  rationale: La construcción literal es ‘árboles/maderas de cedros’, y en contexto de transporte para construcción se refiere al material de cedro. ‘Maderas de cedro’ conserva el material sin añadir una precisión no explicitada por el hebreo. Se evita ‘troncos’ por ser más específico que el texto.
- source_word: מִן הַלְּבָנוֹן
  english_pob_choice: from Lebanon
  chosen_spanish: desde el Líbano
  alternatives_spanish:
  - de Líbano
  - desde el monte Líbano
  lexicon: HALOT
  rationale: La preposición con movimiento desde un lugar de procedencia se rinde naturalmente con ‘desde’. 'Líbano' es la referencia geográfica del suministro.
- source_word: אֶל יָם יָפוֹא
  english_pob_choice: to the sea at Joppa
  chosen_spanish: hasta el mar en Jope
  alternatives_spanish:
  - hasta el mar de Jope
  - al puerto de Jope
  - a Jope por mar
  lexicon: HALOT
  rationale: Literalmente es ‘al mar de Jope’. ‘Hasta el mar en Jope’ conserva cercanía al hebreo y resulta inteligible en español. Se mantiene ‘Jope’ como forma española tradicional del topónimo.
- source_word: כְּרִשְׁיוֹן
  english_pob_choice: according to the authorization
  chosen_spanish: según la autorización
  alternatives_spanish:
  - conforme a la licencia
  - de acuerdo con el permiso
  - según el permiso
  lexicon: HALOT
  rationale: El sustantivo denota permiso o autorización oficial. ‘Autorización’ refleja bien el tono administrativo sin cargarlo hacia un decreto más técnico de lo que exige el término.
- source_word: כּוֹרֶשׁ מֶלֶךְ פָּרַס
  english_pob_choice: of Cyrus king of Persia
  chosen_spanish: de Ciro, rey de Persia
  alternatives_spanish:
  - del rey persa Ciro
  lexicon: HALOT
  rationale: Se conserva la construcción de pertenencia/ procedencia ligada a la autorización. El orden español natural nombra primero a Ciro y luego su título.
- source_word: עֲלֵיהֶם
  english_pob_choice: for them
  chosen_spanish: para ellos
  alternatives_spanish:
  - sobre ellos
  - a favor de ellos
  lexicon: HALOT
  rationale: El hebreo literalmente dice ‘sobre ellos’, pero el audit trail inglés ya aclaró el sentido idiomático como ‘for them’. En español, ‘para ellos’ comunica la aplicación de la autorización sin perder la base textual.
theological_decisions:
- issue: sentido de עֲלֵיהֶם al final del versículo
  english_pob_reading: for them
  chosen_spanish_reading: para ellos
  alternative_spanish_readings:
  - sobre ellos
  - a ellos
  rationale: 'Se mantiene el sentido funcional de la autorización: estaba concedida/aplicada a los destinatarios. ‘Para ellos’ evita una calca extraña y conserva la idea de beneficio o alcance legal.'
  doctrine_reference: none
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de ‘cedar timber’ a ‘cedar logs’ y de ‘upon them’ a ‘for them’. En español, la primera se resolvió con ‘maderas de cedro’ para no sobredeterminar la forma del material, y la segunda con ‘para ellos’ siguiendo el sentido idiomático ya aclarado por la revisión más reciente.
  spanish_consistency_notes:
  - Se conservó ‘Yahvé’ solo cuando el texto lo exige explícitamente; este versículo no contiene el nombre divino.
  - Se usaron gentilicios (‘sidonios’, ‘tirios’) en lugar de perífrasis, siguiendo el valor étnico del hebreo.
  - No se añadió ‘oliva’ a ‘aceite’, porque el hebreo no lo especifica.
  - ‘Jope’ se mantuvo como topónimo español tradicional y coherente con el registro bíblico.
  - Las notas de pie distinguen entre alternativas léxicas reales y una aclaración de valor idiomático final.
