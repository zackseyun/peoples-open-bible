  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. La elección plural «los» para el sufijo singular colectivo está bien justificada y además sigue la revisión aplicada en el inglés POB. La nota sobre el sufijo singular debe clasificarse mejor como alternativa léxica/traduccional, no como variante textual. La nota sobre נחל debe quedar como alternativa para «heredar», no al revés.
