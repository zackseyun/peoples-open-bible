translation:
  language: es
  text: ¿Qué tiene en común una olla de barro con un caldero?[a] La una golpea, y la otra queda destrozada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Testigo hebreo de Cairo Geniza: «Si un hombre rico hace mal, actúa con arrogancia; pero si un hombre pobre hace mal, tiene que pedir misericordia». Los testigos hebreo y griego difieren sustancialmente aquí.'
    reason: textual_variant
lexical_decisions:
- source_word: τί κοινωνήσει
  english_pob_choice: share with
  chosen_spanish: comparte con
  alternatives_spanish:
  - tiene en común con
  - participa con
  lexicon: BDAG
  rationale: La pregunta expresa si existe algo en común entre dos recipientes desiguales; en español, «comparte con» conserva la idea de comunión o participación sin volverla técnica ni demasiado abstracta.
- source_word: χύτρα
  english_pob_choice: earthen pot
  chosen_spanish: olla de barro
  alternatives_spanish:
  - vasija de barro
  - cántaro de barro
  lexicon: contextual comparison with Greek parallel
  rationale: La imagen apunta a un recipiente frágil y quebradizo; «olla de barro» comunica con naturalidad el material y la vulnerabilidad del objeto en español.
- source_word: λέβητα
  english_pob_choice: cauldron
  chosen_spanish: caldero
  alternatives_spanish:
  - caldera
  - olla grande
  lexicon: BDAG
  rationale: «Caldero» preserva la idea de un recipiente pesado de metal y contrasta bien con la fragilidad de la olla de barro.
- source_word: προσκρούσει
  english_pob_choice: strikes
  chosen_spanish: choca
  alternatives_spanish:
  - golpea
  - se estrella contra
  lexicon: BDAG
  rationale: El verbo describe un impacto entre objetos; «choca» suena idiomático en español y mantiene la fuerza del encuentro violento.
- source_word: συντριβήσεται
  english_pob_choice: is shattered
  chosen_spanish: se quiebra
  alternatives_spanish:
  - se hace pedazos
  - se rompe
  lexicon: BDAG
  rationale: El resultado del choque es ruptura decisiva. «Se quiebra» conserva claridad y sobriedad, aunque «se hace pedazos» expresa mayor intensidad.
theological_decisions:
- issue: Divergencia fuerte entre el hebreo conservado y el paralelo griego
  english_pob_reading: Translate the Greek vessel proverb in the main text, while preserving the Hebrew rich/poor saying in a footnote.
  chosen_spanish_reading: Traducir en el cuerpo principal el proverbio griego de los recipientes, y dejar constancia del dicho hebreo alternativo en una nota.
  alternative_spanish_readings:
  - «Si un hombre rico hace mal, él mismo es arrogante; pero si un hombre pobre hace mal, él mismo ruega misericordia.»
  rationale: El paquete de fuentes marca una discrepancia mayor entre testigos. Para esta sección, la redacción principal debe reflejar el sentido recuperable del paralelo griego, mientras la lectura hebrea se preserva como testimonio alternativo de peso.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva, pero usar el paralelo griego como entrada real de traducción cuando corresponda; preservar honestamente la incertidumbre textual.'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: ahora el marcador [a] aparece explícitamente en el texto principal y la nota correspondiente queda anclada. La redacción principal sigue el paralelo griego de los recipientes, conforme al expediente de fuentes, y la lectura hebrea alternativa se preserva en la nota.'
  spanish_consistency_notes:
  - Se mantuvo «barro» para la fragilidad del recipiente y «caldero» para el vaso metálico pesado.
  - Se evitó convertir la imagen en una paráfrasis moralizante; la frase sigue siendo proverbial y concreta.
  - El sistema de puntuación español se ajustó con signos de interrogación de apertura y cierre.
