translation:
  language: es
  text: Porque serán como una encina[a] cuya hoja se marchita, y como un jardín que no tiene agua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «terebinto». El hebreo אֵלָה puede referirse a un terebinto o a una encina/roble; la identificación exacta del árbol es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la relación explicativa o resultativa del juicio anterior; «Porque» conserva bien ese valor en español natural y digno.
- source_word: תִהְיוּ
  english_pob_choice: you will be
  chosen_spanish: serán
  alternatives_spanish:
  - seréis
  - van a ser
  lexicon: HALOT
  rationale: El imperfecto plural en contexto profético expresa futuro/resultativo; «serán» comunica ese valor con claridad y tono bíblico adecuado.
- source_word: כְאֵלָה
  english_pob_choice: like an oak
  chosen_spanish: como una encina
  alternatives_spanish:
  - como un terebinto
  - como un roble
  lexicon: HALOT
  rationale: אֵלָה puede referirse a encina, roble o terebinto según el contexto y la identificación botánica es incierta. «Encina» ofrece una imagen natural en español y mantiene el árbol de follaje denso; se preserva la alternativa textual en nota.
- source_word: נֹבֶלֶת
  english_pob_choice: withers
  chosen_spanish: marchita
  alternatives_spanish:
  - se seca
  - se desvanece
  - se agosta
  lexicon: HALOT
  rationale: El participio describe el proceso de marchitarse o secarse; «marchita» funciona bien en una cláusula relativa y conserva la imagen de decadencia del follaje.
- source_word: עָלֶהָ
  english_pob_choice: whose leaf
  chosen_spanish: en su hoja
  alternatives_spanish:
  - cuyo follaje
  - sus hojas
  lexicon: HALOT
  rationale: El singular con sufijo femenino puede traducirse literalmente como «su hoja»; se evita pluralizar sin necesidad. «En su hoja» refleja el estado afectado del árbol y fluye de manera natural en español.
- source_word: וּכְגַנָּה
  english_pob_choice: and like a garden
  chosen_spanish: y como un jardín
  alternatives_spanish:
  - y como una huerta
  - y como un huerto
  lexicon: HALOT
  rationale: גַּנָּה denota un jardín o espacio cultivado y cercado; «jardín» es el equivalente más directo y comprensible.
- source_word: אֲשֶׁר מַיִם אֵין לָהּ
  english_pob_choice: that has no water
  chosen_spanish: que no tiene agua
  alternatives_spanish:
  - sin agua
  - a la que le falta agua
  lexicon: HALOT
  rationale: La cláusula expresa carencia total de agua; «que no tiene agua» preserva la sencillez y la fuerza de la imagen. «A la que le falta agua» sería más interpretativo.
- source_word: מַיִם
  english_pob_choice: water
  chosen_spanish: agua
  alternatives_spanish:
  - aguas
  lexicon: HALOT
  rationale: Aunque el sustantivo hebreo es formalmente plural, en español el equivalente natural y estándar es el singular colectivo «agua».
translation_notes:
  revision_awareness: El texto inglés auditado quedó sin cambios en la revisión más reciente; esta propuesta sigue esa lectura y conserva la misma incertidumbre lexical sobre אֵלָה mediante nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo exija; en este versículo no aparece el nombre divino.
  - Se conserva la imagen singular de «hoja» para reflejar el hebreo עָלֶהָ con sufijo singular femenino.
  - La nota sobre אֵלָה preserva la ambigüedad botánica documentada en el aparato inglés, sin imponer una identificación cerrada.
