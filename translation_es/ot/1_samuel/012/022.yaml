translation:
  language: es
  text: Porque Yahvé no abandonará a su pueblo[a], por amor de su gran nombre[b], porque Yahvé se ha complacido en hacerlos su pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no desechará» o «no dejará».
    reason: lexical_alternative
  - marker: b
    text: O «por causa de su gran nombre».
    reason: lexical_alternative
lexical_decisions:
- source_word: יִטֹּשׁ
  english_pob_choice: will not forsake
  chosen_spanish: no abandonará
  alternatives_spanish:
  - no dejará
  - no desechará
  - no apartará
  lexicon: HALOT
  rationale: נטש en este contexto expresa la idea de dejar o abandonar a un pueblo en relación de pacto. En español, «abandonar» comunica bien ese peso covenantal sin sonar forzado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragrama directamente. El proyecto pide «Yahvé» como forma principal en español para preservar el nombre divino personal, en vez de sustituirlo por un título.
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: su pueblo
  alternatives_spanish:
  - su nación
  - su gente
  lexicon: HALOT
  rationale: עַם aquí designa al pueblo en relación de pertenencia y pacto. «Su pueblo» conserva esa relación de manera natural en español.
- source_word: בַּעֲבוּר
  english_pob_choice: for the sake of
  chosen_spanish: por amor de
  alternatives_spanish:
  - a causa de
  - por causa de
  - por respeto a
  lexicon: HALOT
  rationale: La expresión introduce la base o motivo de la acción divina. «Por amor de» funciona en español bíblico y comunica la idea de consideración por el nombre de Yahvé sin reducirla a mera causalidad mecánica.
- source_word: שְׁמוֹ הַגָּדוֹל
  english_pob_choice: his great name
  chosen_spanish: su gran nombre
  alternatives_spanish:
  - su nombre glorioso
  - su gran fama
  lexicon: HALOT
  rationale: La construcción hebrea mantiene el sustantivo «nombre» como portador de reputación, honor y revelación. «Su gran nombre» es fiel y transparente.
- source_word: הוֹאִיל
  english_pob_choice: has been pleased
  chosen_spanish: se ha complacido
  alternatives_spanish:
  - ha querido
  - ha decidido
  - ha consentido
  lexicon: HALOT
  rationale: הואל expresa disposición favorable o voluntad benevolente. «Se ha complacido» preserva esa nota de agrado o beneplácito divino mejor que una simple decisión técnica.
- source_word: לַעֲשׂוֹת אֶתְכֶם לוֹ לְעָם
  english_pob_choice: to make you his people
  chosen_spanish: en haceros para sí un pueblo
  alternatives_spanish:
  - en haceros su pueblo
  - en constituiros como su pueblo
  - en haceros un pueblo para sí
  lexicon: HALOT
  rationale: La construcción infinitiva expresa la acción por la cual Yahvé constituye a Israel como su pueblo propio. «Para sí» refleja bien לוֹ y evita perder la referencia reflexiva del original.
theological_decisions:
- issue: Nombre divino en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa יְהוָה de forma explícita; el proyecto pide no enmascararlo con un sustituto litúrgico. «Yahvé» preserva el nombre del pacto en español y mantiene la coherencia terminológica del POB.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Motivación divina en הוֹאִיל
  english_pob_reading: has been pleased
  chosen_spanish_reading: se ha complacido
  alternative_spanish_readings:
  - ha querido
  - ha decidido
  - ha consentido
  rationale: La frase no solo indica una determinación fría, sino una voluntad benevolente ligada al nombre de Dios y a su compromiso previo con Israel. «Se ha complacido» conserva ese matiz sin introducir doctrina ajena al versículo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto hebreo de 1 Samuel 12:22 y concuerda con el audit trail inglés: mantiene la negación enfática de יִטֹּשׁ, el motivo honorífico de בַּעֲבוּר שְׁמוֹ הַגָּדוֹל, y el matiz de beneplácito en הוֹאִיל. No se aplicaron revisiones posteriores en el paquete fuente, y el pasaje muestra alto acuerdo en la revisión cruzada.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» de manera consistente para יְהוָה.
  - «Su pueblo» y «para sí un pueblo» preservan la relación de pertenencia del hebreo.
  - Se usa «pueblo» en singular colectivo, conforme al valor de עַם.
  - La puntuación reproduce una sola oración con tres cláusulas causales coordinadas, como en el hebreo y en la versión inglesa auditada.
