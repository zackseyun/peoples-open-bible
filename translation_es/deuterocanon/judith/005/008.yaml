base_translation:
  language: en
  yaml_path: translation/deuterocanon/judith/005/008.yaml
  text: They departed from the way of their fathers and worshiped the God of heaven[a], the God whom they had come to know. And they were driven out from before their gods, and fled to Mesopotamia[b], and lived there as foreigners for many days.
  footnotes:
  - marker: a
    text: Or 'the God whom they recognized.' The Greek may emphasize decisive recognition as well as knowledge.
    reason: lexical_alternative
  - marker: b
    text: The clause 'they drove them out from before their gods' is syntactically compressed in Greek; the sense is that they were expelled in connection with their former gods and then fled to Mesopotamia.
    reason: alternative_reading
