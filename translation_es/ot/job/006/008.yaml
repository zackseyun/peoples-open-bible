translation:
  language: es
  text: ¡Ojalá[a] viniera mi petición, y Dios concediera mi esperanza!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si tan solo viniera mi petición, y Dios diera mi esperanza».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי יִתֵּן
  english_pob_choice: Oh, that
  chosen_spanish: ¡Ojalá!
  alternatives_spanish:
  - ¡Quién diera!
  - Si tan solo
  lexicon: HALOT
  rationale: La expresión hebrea funciona como exclamación optativa, no como pregunta literal. En español, «¡Ojalá!» comunica de manera natural el deseo intenso y el tono de lamento implícito.
- source_word: תָּב֣וֹא
  english_pob_choice: would come
  chosen_spanish: viniera
  alternatives_spanish:
  - viniese
  - llegara
  lexicon: HALOT
  rationale: El imperfecto en este contexto expresa un deseo no realizado. «Viniera» mantiene esa fuerza optativa en un español fluido y solemne.
- source_word: שֶׁאֱלָתִי
  english_pob_choice: my request
  chosen_spanish: mi petición
  alternatives_spanish:
  - mi ruego
  - mi solicitud
  lexicon: HALOT
  rationale: El sustantivo denota una petición o requerimiento. «Petición» preserva el registro formal de la súplica de Job y evita suavizar el matiz de ruego.
- source_word: וְתִקְוָתִי
  english_pob_choice: and that my hope
  chosen_spanish: y ... mi esperanza
  alternatives_spanish:
  - y mi anhelo
  - y mi expectación
  lexicon: HALOT
  rationale: תִּקְוָה suele significar «esperanza» o «expectativa». Se conserva «esperanza» por ser la correspondencia más directa y transparente en español.
- source_word: יִתֵּן
  english_pob_choice: would grant
  chosen_spanish: concediera
  alternatives_spanish:
  - diera
  - otorgara
  lexicon: HALOT
  rationale: Aunque el verbo básico es «dar», en español con objetos abstractos como «esperanza» suena más natural «conceder». Mantiene la idea de responder a una súplica.
- source_word: אֱלֹהַּ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: אֱלֹהַּ es un término singular común para «Dios». No hay base léxica aquí para añadir un calificativo como «Todopoderoso».
translation_notes:
  revision_awareness: La versión inglesa auditada mantiene una lectura optativa y no introduce cambios textuales. El español conserva esa misma estructura de deseo, sin añadir elementos explicativos fuera del alcance del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהַּ, en línea con la política española del proyecto y con el valor léxico del término en Job.
  - Se traduce la construcción optativa con una exclamación idiomática española para preservar el tono de súplica.
  - «Petición» y «esperanza» conservan el paralelismo nominal del hebreo sin volverlo más interpretativo de lo necesario.
