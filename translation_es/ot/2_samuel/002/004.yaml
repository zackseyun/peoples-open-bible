translation:
  language: es
  text: 'Entonces vinieron los hombres de Judá, y allí ungieron a David como rey sobre la casa de Judá. Y le dijeron a David: «Fueron los hombres de Jabés-galaad quienes sepultaron a Saúl».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - llegaron
  - vinieron y llegaron
  lexicon: HALOT
  rationale: El hebreo narra la llegada con wayyiqtol; en español, «vinieron» conserva el movimiento narrativo de forma natural y digna.
- source_word: אַנְשֵׁי יְהוּדָה
  english_pob_choice: the men of Judah
  chosen_spanish: los hombres de Judá
  alternatives_spanish:
  - la gente de Judá
  - los varones de Judá
  lexicon: HALOT
  rationale: אַנְשֵׁי es literalmente «hombres de»; se mantiene el valor masculino y representativo que el POB inglés preserva con «men».
- source_word: וַיִּמְשְׁחוּ
  english_pob_choice: anointed
  chosen_spanish: ungieron
  alternatives_spanish:
  - consagraron
  - ungieron como rey
  lexicon: HALOT
  rationale: En contexto real, משׁח se refiere a la unción de un rey; «ungieron» conserva el verbo histórico-teológico sin explicitar de más.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - en ese lugar
  - ahí
  lexicon: HALOT
  rationale: Adverbio locativo directo; «allí» es claro y formal.
- source_word: לְמֶלֶךְ
  english_pob_choice: king
  chosen_spanish: como rey
  alternatives_spanish:
  - rey
  - para rey
  lexicon: HALOT
  rationale: En español, tras «ungieron» la construcción más natural y precisa es «como rey», manteniendo el sentido predicativo del hebreo.
- source_word: עַל בֵּית יְהוּדָה
  english_pob_choice: over the house of Judah
  chosen_spanish: sobre la casa de Judá
  alternatives_spanish:
  - sobre Judá
  - sobre la tribu de Judá
  lexicon: HALOT
  rationale: Se conserva «casa» para reflejar la unidad dinástica/tribal del hebreo y evitar reducirlo a un simple territorio.
- source_word: וַיַּגִּדוּ לְדָוִד לֵאמֹר
  english_pob_choice: And they told David, saying
  chosen_spanish: Y avisaron a David, diciendo
  alternatives_spanish:
  - Y contaron a David, diciendo
  - Y le informaron a David, diciendo
  lexicon: HALOT
  rationale: נגד en hifil es comunicar/reportar; «avisaron» funciona bien en español bíblico moderno y conserva la introducción de habla directa.
- source_word: אַנְשֵׁי יָבֵישׁ גִּלְעָד
  english_pob_choice: The men of Jabesh-gilead
  chosen_spanish: Los hombres de Jabés de Galaad
  alternatives_spanish:
  - Los hombres de Jabes-galaad
  - La gente de Jabés de Galaad
  lexicon: HALOT
  rationale: Se traduce el topónimo de forma clara y readable en español; «de Galaad» refleja mejor la construcción hebrea que una sola transliteración compacta.
- source_word: אֲשֶׁר קָבְרוּ אֶת שָׁאוּל
  english_pob_choice: It was the men of Jabesh-gilead who buried Saul
  chosen_spanish: fueron los que enterraron a Saúl
  alternatives_spanish:
  - sepultaron a Saúl
  - fueron quienes sepultaron a Saúl
  lexicon: HALOT
  rationale: El relativo identificador del hebreo se expresa bien con «fueron los que...», manteniendo la fuerza de identificación sin sonar forzado.
theological_decisions:
- issue: Lenguaje de género en אַנְשֵׁי
  english_pob_reading: Render as 'men' in both occurrences
  chosen_spanish_reading: Mantener «hombres» en ambos casos
  alternative_spanish_readings:
  - personas
  - gente
  - líderes
  rationale: El sustantivo hebreo es masculino y el contexto narrativo apunta a representantes varones; se preserva la precisión léxica sin neutralizar el término.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Conservar «casa» en «casa de Judá»
  english_pob_reading: Keep 'house of Judah' in the main text
  chosen_spanish_reading: Mantener «casa de Judá»
  alternative_spanish_readings:
  - Judá
  - tribu de Judá
  rationale: La expresión tiene fuerza corporativa/dinástica en el texto fuente; «casa» evita reducir la referencia a una mera zona geográfica.
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 1 and 5
- issue: Verbo de la ejecución de la unción real
  english_pob_reading: anointed David king
  chosen_spanish_reading: ungieron a David como rey
  alternative_spanish_readings:
  - consagraron a David como rey
  - ungieron a David rey
  rationale: «Ungir» es el verbo histórico-teológico normal para la investidura real en el AT y conserva la resonancia del acto.
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 1 and 5
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó la cláusula final a una identificación más natural («It was the men of Jabesh-gilead who buried Saul»). La versión española adopta una construcción equivalente y fluida («fueron los que enterraron a Saúl») sin añadir una nota textual porque no hay variante crítica distinta en el hebreo base.
  spanish_consistency_notes:
  - Se conservó el valor masculino de אַנְשֵׁי con «hombres».
  - Se mantuvo «casa de Judá» para reflejar el hebreo בֵּית יְהוּדָה.
  - Se evitó «SEÑOR» porque el versículo no contiene el tetragrámaton; el nombre propio de David y Saúl se translitera de forma estándar.
  - «Jabés de Galaad» sigue el topónimo bíblico en forma clara para español, sin fusionarlo en un calco rígido.
