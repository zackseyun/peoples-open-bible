translation:
  language: es
  text: El comandante de la tercera división para el tercer mes fue Benaía hijo de Joiada, el principal[a], y en su división había veinticuatro mil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Benaía hijo de Joiada el sacerdote, principal»; el hebreo puede leerse más literalmente así, pero el sentido probable es que Joiada fuera un sacerdote destacado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׂר הַצָּבָא
  english_pob_choice: the commander
  chosen_spanish: el comandante
  alternatives_spanish:
  - el jefe
  - el capitán
  - el líder del ejército
  lexicon: HALOT
  rationale: שַׂר denota un oficial o comandante; con הַצָּבָא, el sentido es militar. «Comandante» es natural en español y conserva la fuerza de cargo militar sin volverlo genérico.
- source_word: הַשְּׁלִישִׁי לַחֹדֶשׁ הַשְּׁלִישִׁי
  english_pob_choice: of the third division for the third month
  chosen_spanish: de la tercera división para el tercer mes
  alternatives_spanish:
  - para el tercer mes, la tercera
  - la tercera, para el tercer mes
  lexicon: HALOT
  rationale: El primer «tercera» califica la división militar y el segundo el mes. En español conviene explicitar «división» para que la elipsis hebrea no oscurezca la estructura repetida del pasaje.
- source_word: בְּנָיָהוּ בֶן יְהוֹיָדָע
  english_pob_choice: Benaiah son of Jehoiada
  chosen_spanish: Benaía hijo de Joiada
  alternatives_spanish:
  - Benaías hijo de Joiada
  lexicon: convención onomástica
  rationale: Los nombres propios se transliteran según la convención española del proyecto. «Hijo de» reproduce directamente בֶן sin añadir interpretación.
- source_word: הַכֹּהֵן רֹאשׁ
  english_pob_choice: the chief
  chosen_spanish: el principal
  alternatives_spanish:
  - el jefe
  - el cabeza
  - el sumo sacerdote
  lexicon: HALOT
  rationale: El hebreo permite leer literalmente «el sacerdote, cabeza», pero en este contexto la idea más probable es que Joiada fuera una figura sacerdotal prominente. «El principal» conserva la tensión entre rango y oficio sin imponer «sumo sacerdote», que iría más allá del texto.
- source_word: וְעַל מַחֲלֻקְתּוֹ
  english_pob_choice: and in his division were
  chosen_spanish: y en su división había
  alternatives_spanish:
  - y sobre su división estaba
  - y su división contaba con
  lexicon: HALOT
  rationale: מַחֲלֻקָה aquí designa una división militar. Aunque עַל puede sugerir responsabilidad «sobre», la fórmula del versículo funciona idiomáticamente como una indicación del número de efectivos; por eso «en su división había» suena natural y fiel.
- source_word: עֶשְׂרִים וְאַרְבָּעָה אָלֶף
  english_pob_choice: twenty-four thousand
  chosen_spanish: veinticuatro mil
  alternatives_spanish:
  - 24 mil
  lexicon: numerales hebreos
  rationale: Equivale directamente al cardinal del hebreo y mantiene el registro bíblico estándar en español.
theological_decisions:
- issue: 'Título asociado a Joiada: precisión entre oficio y rango'
  english_pob_reading: the chief; the Hebrew can be read more literally this way, but the sense is likely that Jehoiada was a leading priest.
  chosen_spanish_reading: el principal
  alternative_spanish_readings:
  - el sacerdote principal
  - el jefe sacerdote
  - el sumo sacerdote
  rationale: La hebrea permite una apposición compacta y ambigua entre oficio y rango. En español se preserva esa ambigüedad con «el principal», evitando fijar sin necesidad una categoría eclesiástica más definida que la del texto.
  doctrine_reference: Principio de cautela exegética; no forzar una identificación sacerdotal más precisa de la que garantiza el hebreo.
translation_notes:
  revision_awareness: La revisión inglesa más reciente suavizó la frase hacia una lectura más cercana al hebreo («the chief») y eliminó la identificación explícita «the chief priest». La versión española sigue esa orientación, conservando una solución ambigua y sobria («el principal») que refleja mejor el original y evita una especificación eclesiástica no segura.
  spanish_consistency_notes:
  - Se mantiene «división» para מַחֲלֻקָה, en coherencia con pasajes paralelos del mismo capítulo.
  - Se usa «Yahvé» solo cuando el hebreo contiene el nombre divino; aquí no aparece.
  - «Principal» se emplea como solución de cautela para רֹאשׁ en aposición, no como título técnico fijo.
