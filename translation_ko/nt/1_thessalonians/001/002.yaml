id: 1TH.1.2
reference: 1 Thessalonians 1:2
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Εὐχαριστοῦμεν τῷ θεῷ πάντοτε περὶ πάντων ὑμῶν ⸀μνείαν ποιούμενοι ἐπὶ τῶν προσευχῶν ἡμῶν, ἀδιαλείπτως
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/001/002.yaml
  text: We always give thanks to God for all of you[a], making mention of you in our prayers unceasingly,
  footnotes:
  - marker: a
    text: Or 'without ceasing.' The adverb may modify either 'making mention of you in our prayers' specifically or the broader thanksgiving statement as a whole.
    reason: lexical_alternative
translation:
  language: ko
  text: 우리는 여러분 모두를 위하여 언제나 하나님께 감사드리며, 우리의 기도 가운데 여러분을 쉬지 않고 기억하고 있습니다[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「쉬지 않고」가 「기억함」만이 아니라 감사 전체를 수식할 수도 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐχαριστοῦμεν
  english_pob_choice: We ... give thanks
  chosen_korean: 감사드립니다
  alternatives_korean:
  - 감사합니다
  - 감사를 드립니다
  lexicon: BDAG
  rationale: 현재 능동 직설법 1인칭 복수. 하나님을 대상으로 한 경어 어감과 합쇼체 격식을 함께 살리기 위해 「감사드립니다」를 택한다.
- source_word: πάντοτε
  english_pob_choice: always
  chosen_korean: 언제나
  alternatives_korean:
  - 항상
  lexicon: BDAG
  rationale: 합쇼체 산문에서 가장 자연스러운 시간 부사.
- source_word: περὶ πάντων ὑμῶν
  english_pob_choice: for all of you
  chosen_korean: 여러분 모두를 위하여
  alternatives_korean:
  - 여러분 모두에 관하여
  - 여러분 모두를 두고
  lexicon: BDAG
  rationale: 여격 περί는 감사의 대상·관심 영역을 가리킨다. 한국어 감사 표현에서는 「~을 위하여」가 가장 자연스럽다.
- source_word: μνείαν ποιούμενοι
  english_pob_choice: making mention of you
  chosen_korean: 여러분을 기억하고 있습니다
  alternatives_korean:
  - 여러분을 언급하면서
  - 여러분을 떠올리며
  lexicon: BDAG
  rationale: 바울의 정형 표현(「언급함을 만듦」)을 한국어 기도 어휘 「기억」으로 옮긴다. 「언급」은 한국어에서 사적·일상 어감이 강해 기도 정황에 어울리지 않는다.
- source_word: ἐπὶ τῶν προσευχῶν ἡμῶν
  english_pob_choice: in our prayers
  chosen_korean: 우리의 기도 가운데
  alternatives_korean:
  - 우리의 기도 중에
  - 우리의 기도에서
  lexicon: BDAG
  rationale: ἐπί + 속격 관용 표현. 「~가운데」가 기도 정황을 자연스럽게 표현한다.
- source_word: ἀδιαλείπτως
  english_pob_choice: unceasingly
  chosen_korean: 쉬지 않고
  alternatives_korean:
  - 끊임없이
  - 그치지 않고
  lexicon: BDAG
  rationale: 「쉬지 않고」는 한국 교회 전통에서도 이 단어의 표준 등가어로 굳어졌으며 본문의 지속성을 강하게 담는다.
