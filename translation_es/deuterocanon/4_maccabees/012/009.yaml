  text: Entonces, alegrándose sobre todo por la promesa del joven, lo desataron rápidamente.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπιχαρέντες
  english_pob_choice: rejoicing
  chosen_spanish: alegrándose
  alternatives_spanish:
  - regocijándose
  - mostrándose gozosos
  lexicon: BDAG
  rationale: El participio expresa gozo ante algo ocurrido; «alegrándose» conserva el valor participial y suena natural en español actual sin perder la relación con el verbo principal.
- source_word: μάλιστα
  english_pob_choice: especially
  chosen_spanish: sobre todo
  alternatives_spanish:
  - especialmente
  - particularmente
  lexicon: LSJ
  rationale: La partícula intensifica la causa del gozo. «Sobre todo» mantiene la fuerza enfática y es idiomático en español.
- source_word: ἐπαγγελίᾳ
  english_pob_choice: promise
  chosen_spanish: promesa
  alternatives_spanish:
  - promesa dada
  - seguridad
  - compromiso
  lexicon: BDAG
  rationale: En este contexto la palabra apunta a la promesa o compromiso expresado por el joven; «promesa» es la equivalencia más directa y clara.
- source_word: τοῦ παιδός
  english_pob_choice: the young man's
  chosen_spanish: del joven
  alternatives_spanish:
  - del muchacho
  - del muchacho joven
  - del hijo
  lexicon: BDAG
  rationale: παῖς puede significar niño, siervo, muchacho o joven. Aquí el contexto narrativo exige un referendo masculino joven, no un niño pequeño; «el joven» evita la ambigüedad y sigue la decisión auditada en inglés.
- source_word: ταχέως
  english_pob_choice: quickly
  chosen_spanish: rápidamente
  alternatives_spanish:
  - de inmediato
  - pronto
  - velozmente
  lexicon: LSJ
  rationale: El adverbio marca prontitud de acción. «Rápidamente» es claro, moderno y suficientemente preciso.
- source_word: ἔλυσαν
  english_pob_choice: untied
  chosen_spanish: lo desataron
  alternatives_spanish:
  - lo soltaron
  - lo liberaron
  - lo desataron de sus ataduras
  lexicon: BDAG
  rationale: λύω puede significar aflojar, desatar o liberar. En un contexto de tortura, «lo desataron» conserva la concreción material de quitar ataduras y evita una generalización excesiva.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alto acuerdo; no se documentan variantes textuales ni decisiones teológicas adicionales. La versión española sigue de cerca el sentido original, con ajuste idiomático mínimo para fluidez.
