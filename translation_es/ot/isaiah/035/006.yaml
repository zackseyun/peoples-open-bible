translation:
  language: es
  text: Entonces el cojo[a] saltará como un ciervo, y la lengua del mudo cantará de alegría; porque aguas han brotado en el desierto, y corrientes en la llanura desértica[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los cojos»; el hebreo usa un singular con valor genérico.
    reason: lexical_alternative
  - marker: b
    text: O «en el Arabá», tomando el término como nombre geográfico en lugar del sustantivo común «llanura desértica».
    reason: alternative_reading
lexical_decisions:
- source_word: יְדַלֵּג
  english_pob_choice: will leap
  chosen_spanish: saltará
  alternatives_spanish:
  - brincará
  - dará un salto
  lexicon: HALOT
  rationale: El piel imperfecto expresa un salto vigoroso y lleno de vida. «Saltará» comunica bien la imagen de restauración corporal sin sonar forzado en español.
- source_word: כָּאַיָּל
  english_pob_choice: like a deer
  chosen_spanish: como un ciervo
  alternatives_spanish:
  - como un venado
  - como un ciervo macho
  lexicon: HALOT
  rationale: «Ciervo» preserva la comparación zoológica del hebreo y es comprensible en español general. Mantiene el tono poético sin arcaísmo.
- source_word: פִּסֵּחַ
  english_pob_choice: the lame
  chosen_spanish: el cojo
  alternatives_spanish:
  - el lisiado
  - el que cojea
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivamente para una persona con discapacidad para caminar. «El cojo» refleja esa fuerza lexical con naturalidad en español.
- source_word: וְתָרֹן
  english_pob_choice: will sing for joy
  chosen_spanish: cantará de alegría
  alternatives_spanish:
  - gritará de alegría
  - cantará jubilosamente
  lexicon: HALOT
  rationale: רנן suele implicar exclamación jubilosa, a menudo con matiz de canto. «Cantará de alegría» conserva el paralelismo con la lengua y la dimensión celebrativa.
- source_word: לְשׁוֹן אִלֵּם
  english_pob_choice: the tongue of the mute
  chosen_spanish: la lengua del mudo
  alternatives_spanish:
  - la lengua del que no habla
  - la lengua del callado
  lexicon: HALOT
  rationale: 'La frase hebrea es literal: la «lengua» de quien no puede hablar. «Mudo» mantiene la concisión y el contraste con la recuperación del habla.'
- source_word: נִבְקְעוּ
  english_pob_choice: have burst forth
  chosen_spanish: han brotado
  alternatives_spanish:
  - se han abierto
  - han estallado
  lexicon: HALOT
  rationale: El nifal de בקע comunica apertura súbita. Con «aguas» como sujeto, «han brotado» transmite en español el surgimiento repentino del agua de manera natural y fiel.
- source_word: בַמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el páramo
  - en la tierra desierta
  lexicon: HALOT
  rationale: «Desierto» es la equivalencia más directa y clara en español aquí. Aunque «wilderness» puede abarcar un sentido más amplio, el contexto poético de sequedad favorece este término.
- source_word: מַיִם
  english_pob_choice: waters
  chosen_spanish: aguas
  alternatives_spanish:
  - agua
  - caudales
  lexicon: HALOT
  rationale: El plural hebreo se refleja mejor con «aguas», que suena bíblico y conserva la pluralidad y abundancia del original.
- source_word: וּנְחָלִים
  english_pob_choice: streams
  chosen_spanish: corrientes
  alternatives_spanish:
  - arroyos
  - torrentes
  lexicon: HALOT
  rationale: נְחָלִים puede referirse a corrientes estacionales o lechos de torrente. «Corrientes» es amplio y sobrio, apto para el paralelismo poético con «aguas».
- source_word: בָּעֲרָבָה
  english_pob_choice: in the desert plain
  chosen_spanish: en la Arabá
  alternatives_spanish:
  - en la llanura desértica
  - en el Arabá
  lexicon: HALOT
  rationale: Aquí se conserva la posible lectura geográfica del término como nombre propio, tal como la POB inglesa la deja abierta. «Arabá» mantiene esa tensión sin decidirla prematuramente.
theological_decisions:
- issue: Restauración física y renovación del entorno
  english_pob_reading: Render the verse as describing concrete bodily healing and environmental renewal without narrowing it to either purely literal or purely metaphorical fulfillment.
  chosen_spanish_reading: Traducir el versículo de modo que conserve tanto la sanidad corporal concreta como la renovación del entorno, sin reducirlo a una sola clase de cumplimiento.
  alternative_spanish_readings:
  - Reducirlo a una restauración solo espiritual o simbólica
  - Leerlo únicamente como una promesa literal futura de sanidad
  rationale: El hebreo presenta la reversión de una discapacidad corporal y la aparición de agua en un lugar seco. La traducción debe mantener esa doble imagen profética y dejar abierta la tensión interpretativa.
  doctrine_reference: Preservar la tensión teológica sin resolverla de antemano.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió «the lame» frente a «the lame man» para reflejar mejor el singular genérico hebreo. En español se optó por «el cojo» con el mismo valor genérico y naturalidad idiomática.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se preservó la simetría poética entre sanidad corporal y renovación de la tierra.
  - «Arabá» se dejó en el texto principal para conservar la ambigüedad entre topónimo y sustantivo común.
