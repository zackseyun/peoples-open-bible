translation:
  language: es
  text: 'diciendo[a][b]: «¡Bendito sea el Rey que viene en el nombre del Señor! Paz en el cielo y gloria en las alturas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunas traducciones siguen la formulación más familiar: «Bendito el que viene en el nombre del Señor», pero Lucas incluye explícitamente «el Rey».'
    reason: alternative_reading
  - marker: b
    text: 'Esta aclamación hace eco de Lucas 2:14, pero invierte el lugar: allí, «paz en la tierra»; aquí, «paz en el cielo».'
    reason: cross_reference
lexical_decisions:
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - mientras decían
  lexicon: BDAG
  rationale: El participio presente introduce la aclamación de la multitud y enlaza con el contexto anterior; «diciendo» conserva esa relación sin añadir tiempo verbal innecesario.
- source_word: Εὐλογημένος
  english_pob_choice: Blessed
  chosen_spanish: Bendito
  alternatives_spanish:
  - Bienaventurado
  - Alabado
  lexicon: BDAG
  rationale: Para una aclamación bíblica de tipo benedictorio, «Bendito» es natural en español y mantiene el tono litúrgico y celebrativo sin desplazar el sentido.
- source_word: ὁ ἐρχόμενος
  english_pob_choice: who comes
  chosen_spanish: que viene
  alternatives_spanish:
  - el que viene
  - el que ha de venir
  lexicon: BDAG
  rationale: El participio con artículo funciona de modo sustantivo; «que viene» conserva el presente participial y suena más fluido en español dentro de la frase nominal.
- source_word: βασιλεὺς
  english_pob_choice: the King
  chosen_spanish: el Rey
  alternatives_spanish:
  - Rey
  - rey
  lexicon: BDAG
  rationale: Lucas incluye explícitamente βασιλεὺς; por eso se mantiene «el Rey» y no se suaviza a una fórmula genérica de bendición. En español el artículo ayuda a marcar la identificación real y mesiánica.
- source_word: ἐν ὀνόματι κυρίου
  english_pob_choice: in the name of the Lord
  chosen_spanish: en el nombre del Señor
  alternatives_spanish:
  - por autoridad del Señor
  - con el nombre del Señor
  lexicon: BDAG
  rationale: Se conserva el modismo semítico y su fuerza teológica. «Señor» refleja κύριος en esta expresión idiomática estable en español bíblico, sin perder la idea de representación/autoridad.
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Dueño
  - el Maestro
  lexicon: BDAG
  rationale: En este contexto doxológico e idiomático, κύριος corresponde a «el Señor»; otras opciones debilitarían la resonancia bíblica y la referencia reverente al título divino.
- source_word: ἐν οὐρανῷ εἰρήνη
  english_pob_choice: Peace in heaven
  chosen_spanish: Paz en el cielo
  alternatives_spanish:
  - Paz en el cielo hay
  - En el cielo, paz
  lexicon: BDAG
  rationale: Se preserva la inversión respecto de Lucas 2:14 sin armonizarla. «Cielo» comunica de forma natural οὐρανῷ en español y mantiene la brevedad exclamativa del griego.
- source_word: δόξα ἐν ὑψίστοις
  english_pob_choice: glory in the highest
  chosen_spanish: y gloria en las alturas
  alternatives_spanish:
  - y gloria en lo más alto
  - y gloria en las alturas del cielo
  lexicon: BDAG
  rationale: «En las alturas» reproduce el giro idiomático de ἐν ὑψίστοις y mantiene el paralelismo con la fórmula lucana conocida, sin expandir el texto más allá de lo que el griego expresa.
theological_decisions:
- issue: Aclamación real y mesiánica explícita
  english_pob_reading: Render βασιλεὺς explicitly as 'the King' rather than smoothing to a generic blessing formula.
  chosen_spanish_reading: 'Mantener «el Rey» en la aclamación: «¡Bendito el Rey que viene en el nombre del Señor!»'
  alternative_spanish_readings:
  - ¡Bendito el que viene en el nombre del Señor!
  - ¡Bendito sea quien viene en el nombre del Señor!
  rationale: El texto griego incluye βασιλεὺς; omitirlo borraría un énfasis lucano real y mesiánico. La traducción conserva esa tensión y no la resuelve hacia una fórmula más conocida pero menos precisa.
  doctrine_reference: Translation philosophy §1, §5
- issue: Relación con la aclamación de Lucas 2:14
  english_pob_reading: Translate the second clause as 'Peace in heaven and glory in the highest' without harmonizing it to 'on earth peace.'
  chosen_spanish_reading: Traducir «Paz en el cielo y gloria en las alturas» sin armonizarlo con «paz en la tierra».
  alternative_spanish_readings:
  - Paz en la tierra y gloria en las alturas
  - Paz en el cielo y gloria en lo más alto
  rationale: El contraste con Lucas 2:14 es intencional en el griego y debe preservarse. La versión española mantiene la tensión intertextual en lugar de normalizarla.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y la decisión inglesa de conservar βασιλεὺς, además de mantener la inversión lucana respecto de Lucas 2:14 sin armonización. No se observan revisiones recientes que alteren el contenido base.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος en la expresión fija «en el nombre del Señor», coherente con el tratamiento doctrinal del nombre divino/título reverente en contexto idiomático.
  - Se elige «cielo» para οὐρανῷ y «alturas» para ὑψίστοις, preservando la estructura breve y la resonancia bíblica.
  - Se mantiene «Rey» con mayúscula por tratarse de una aclamación titulativa dentro del discurso directo.
