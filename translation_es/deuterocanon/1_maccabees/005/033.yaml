translation:
  language: es
  text: Y salió contra ellos en tres divisiones desde afuera[a]; y tocaron las trompetas, y clamaron en oración.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego de Swete tiene el verbo "tocó las trompetas" en singular; luego continúa en plural: "clamaron en oración". El español sigue aquí el sentido colectivo, como la versión inglesa auditada.'
    reason: textual_variant
lexical_decisions:
- source_word: ἐξῆλθεν
  english_pob_choice: went out against
  chosen_spanish: salió contra
  alternatives_spanish:
  - salió
  - marchó contra
  lexicon: LSJ
  rationale: En contexto militar, ἐξῆλθεν no solo indica “salió”, sino una salida hostil o de combate. “Salió contra” conserva ese valor adversarial sin añadir más de lo que el griego exige.
- source_word: ἐν τρισὶν ἀρχαῖς
  english_pob_choice: in three divisions
  chosen_spanish: en tres divisiones
  alternatives_spanish:
  - en tres compañías
  - en tres destacamentos
  - bajo tres jefes
  lexicon: LSJ
  rationale: ἀρχαῖς puede referirse a unidades organizadas bajo mando. “Divisiones” comunica la organización táctica y evita reducir indebidamente el sentido a personas concretas o a un calco opaco.
- source_word: ἔξωθεν αὐτῶν
  english_pob_choice: from outside them
  chosen_spanish: desde fuera de ellos
  alternatives_spanish:
  - desde fuera de su posición
  - desde fuera del campamento
  - contra ellos desde fuera
  lexicon: LSJ
  rationale: 'La frase griega marca el lugar de procedencia: “desde fuera”. Mantengo esa estructura de forma cercana al original, dejando que el contexto militar aporte la dirección hostil.'
- source_word: ἐσάλπισεν ταῖς σάλπιγξιν
  english_pob_choice: they sounded the trumpets
  chosen_spanish: tocaron las trompetas
  alternatives_spanish:
  - sonaron las trompetas
  - tocó las trompetas
  - hizo sonar las trompetas
  lexicon: LSJ
  rationale: Aunque el griego de Swete tiene singular, el contexto inmediato y la audit trail inglesa entienden un sentido colectivo. En español, “tocaron las trompetas” es natural para una señal bélica y preserva la acción conjunta señalada por el resto de la cláusula.
- source_word: ἐβόησαν
  english_pob_choice: cried out
  chosen_spanish: clamaron
  alternatives_spanish:
  - gritaron
  - alzaron un clamor
  - exclamaron
  lexicon: LSJ
  rationale: ἐβόησαν expresa un clamor fuerte. “Clamaron” mantiene la intensidad y encaja mejor con la siguiente frase “en oración” que un simple “gritaron”.
- source_word: ἐν προσευχῇ
  english_pob_choice: in prayer
  chosen_spanish: en oración
  alternatives_spanish:
  - con oración
  - en súplica
  - orando
  lexicon: LSJ
  rationale: La preposición indica el marco o modo de su clamor. “En oración” conserva la esfera religiosa del acto sin sobreinterpretarla como una fórmula devocional más específica.
theological_decisions:
- issue: Aproximación militar de ἐξῆλθεν en un relato de combate
  english_pob_reading: went out against them
  chosen_spanish_reading: salió contra ellos
  alternative_spanish_readings:
  - salió
  - marchó contra ellos
  rationale: La traducción debe hacer visible la hostilidad del movimiento. “Salió contra ellos” mantiene la implicación bélica que el contexto y la lectura inglesa documentan, sin expandir el contenido narrativo.
  doctrine_reference: Translation philosophy §1, primacía del texto fuente
- issue: Desajuste de número entre ἐσάλπισεν (singular) y ἐβόησαν (plural)
  english_pob_reading: they sounded the trumpets
  chosen_spanish_reading: tocaron las trompetas
  alternative_spanish_readings:
  - tocó las trompetas
  - hizo sonar las trompetas
  rationale: La secuencia griega presenta una forma verbal singular seguida de una plural. La versión española adopta el sentido colectivo, como hace la auditable English POB, porque en español resulta más natural y probablemente refleja la acción conjunta del grupo.
  doctrine_reference: Translation philosophy §5, coherencia gramatical con excepción documentada
translation_notes:
  revision_awareness: 'Se revisó el ajuste de número en la cláusula de las trompetas: se mantuvo la lectura colectiva en español por claridad y por concordar con la decisión inglesa auditada, dejando constancia del singular griego en una nota.'
  spanish_consistency_notes:
  - Se usa “Dios” y no aparece vocabulario teológico especial adicional en este versículo.
  - Se mantiene “en oración” para conservar la estructura breve y la tonalidad litúrgico-militar del pasaje.
  - Se evita “SEÑOR” o lenguaje de sustitución porque el versículo no contiene el nombre divino.
