id: ROM.16.23
reference: Romans 16:23
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀσπάζεται ὑμᾶς Γάϊος ὁ ξένος μου καὶ ⸂ὅλης τῆς ἐκκλησίας⸃. ἀσπάζεται ὑμᾶς Ἔραστος ὁ οἰκονόμος τῆς πόλεως καὶ Κούαρτος ὁ ἀδελφός.
base_translation:
  language: en
  yaml_path: translation/nt/romans/016/023.yaml
  text: Gaius, my host and the host of the whole church, greets you. Erastus, the city treasurer, greets you, and Quartus, the brother.
translation:
  language: ko
  text: 나와 또 회중 전체를 손님으로 맞아 준 가이오가 여러분에게 문안합니다. 도시의 재무관 에라스도와 형제 구아도가 여러분에게 문안합니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Γάϊος
  english_pob_choice: Gaius
  chosen_korean: 가이오
  lexicon: BDAG
  rationale: 정책 지시 음역.
- source_word: ὁ ξένος μου καὶ ὅλης τῆς ἐκκλησίας
  english_pob_choice: my host and the host of the whole church
  chosen_korean: 나와 또 회중 전체를 손님으로 맞아 준
  alternatives_korean:
  - 나의 손님 접대자이며 온 회중의 손님 접대자
  lexicon: BDAG
  rationale: ξένος는 「손님」 또는 「손님 접대자」(맥락 의존). 환대를 베푸는 자임을 자연스럽게 표현. 「회중」 정책 일관.
- source_word: Ἔραστος ὁ οἰκονόμος τῆς πόλεως
  english_pob_choice: Erastus, the city treasurer
  chosen_korean: 도시의 재무관 에라스도
  alternatives_korean:
  - 그 성의 재무관
  lexicon: BDAG
  rationale: οἰκονόμος는 가산 관리자, 도시 단위에서는 「재무관」.
- source_word: Κούαρτος ὁ ἀδελφός
  english_pob_choice: Quartus, the brother
  chosen_korean: 형제 구아도
  lexicon: BDAG
  rationale: 정책 지시 음역.
