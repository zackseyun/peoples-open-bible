revisions:
- from: Busquen el bienestar[a] de la ciudad adonde los he llevado en exilio, y oren a Yahvé por ella, porque en su bienestar tendrán bienestar.
  to: Busquen el bienestar[a] de la ciudad donde los he enviado al exilio, y oren a Yahvé por ella, porque en su bienestar tendrán bienestar.
  rationale: Se reemplaza 'los he llevado en exilio' por 'los he enviado al exilio' para reflejar mejor הִגְלֵיתִי y sonar natural en español. Se simplifica 'adonde' a 'donde' por fluidez. Se mantiene 'bienestar ... bienestar' para preservar la repetición de shalom, y 'Yahvé' conforme a la política del proyecto.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:28:07Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: imperativos dobles (''busquen'', ''oren''), el objeto ''la ciudad'', la referencia a Yahvé, y la repetición deliberada de shalom mediante ''bienestar''. Sin embargo, ''los he llevado en exilio'' no representa de manera idiomática ni plenamente fiel הִגְלֵיתִי אֶתְכֶם שָׁמָּה, que expresa ''los he enviado/he hecho ir al exilio allí''. También hay una inconsistencia entre el texto y la decisión léxica sobre יְהוָה: el texto usa ''Yahvé'', pero el encabezado del borrador muestra ''Yahvé'' solo en decisiones, mientras la línea inglesa auditada usa ''Yahweh''; esto en español está bien según la política del proyecto. El resto está bien alineado.'
  spanish_quality_summary: El español es claro y legible, pero 'adonde los he llevado en exilio' suena poco natural en español bíblico moderno neutral. 'Adonde' es defendible, pero junto con 'llevado en exilio' produce una construcción forzada. 'A la cual los he enviado al exilio' o 'donde los he enviado al exilio' suena mejor y conserva el sentido. La repetición de 'bienestar' está bien lograda. La puntuación y el registro son adecuados.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → ''Yahvé''; שָׁלוֹם → ''bienestar'' conservando la repetición; הִתְפַּלְלוּ → ''oren''. La principal corrección necesaria es ajustar הִגְלֵיתִי a una formulación española idiomática que exprese causalidad de exilio (''los he enviado al exilio'').'
  issues:
  - severity: medium
    issue: '''los he llevado en exilio'' es poco idiomático y no refleja bien el valor causativo de הִגְלֵיתִי'
    rationale: El hiphil de גלה significa causar que alguien vaya al exilio. En español, 'llevar en exilio' suena antinatural; 'enviar al exilio' o 'exiliar' expresa mejor el sentido y la agencia divina.
  - severity: low
    issue: La construcción con 'adonde' puede sonar pesada en esta oración
    rationale: Aunque 'adonde' no es incorrecto, combinado con la frase verbal actual vuelve la línea menos fluida. 'donde' o una relativa con 'a la cual' mejora la legibilidad sin perder sentido.
  revised_spanish_text: Busquen el bienestar[a] de la ciudad donde los he enviado al exilio, y oren a Yahvé por ella, porque en su bienestar tendrán bienestar.
  revised_footnotes:
  - marker: a
    text: O ‘paz’ / ‘bienestar integral’ en todo el versículo; el hebreo shalom se repite tanto para la ciudad como para los exiliados.
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'los he llevado en exilio' por 'los he enviado al exilio' para reflejar mejor הִגְלֵיתִי y sonar natural en español. Se simplifica 'adonde' a 'donde' por fluidez. Se mantiene 'bienestar ... bienestar' para preservar la repetición de shalom, y 'Yahvé' conforme a la política del proyecto.
