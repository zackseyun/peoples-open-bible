translation:
  language: es
  text: Hizo lo recto a los ojos de Yahvé, conforme a todo lo que había hecho David, su padre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su antepasado» o «su antecesor»; aquí «padre» refleja la descendencia dinástica, no la paternidad inmediata.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He did
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  - Él hizo
  lexicon: HALOT
  rationale: El wayyiqtol de עשה introduce la acción narrativa principal; en español natural puede omitirse la conjunción inicial sin perder el valor verbal. «Hizo» conserva la acción directa y evita una literalidad excesiva.
- source_word: הַיָּשָׁר
  english_pob_choice: what was right
  chosen_spanish: lo recto
  alternatives_spanish:
  - lo justo
  - lo correcto
  - lo upright
  lexicon: HALOT
  rationale: El sustantivado con artículo en esta fórmula evaluativa expresa «lo recto/upright». «Lo recto» mantiene la idea de conducta conforme al bien delante de Dios, con registro bíblico claro y natural en español.
- source_word: בְּעֵינֵי
  english_pob_choice: in the eyes of
  chosen_spanish: ante los ojos de
  alternatives_spanish:
  - a los ojos de
  - en la vista de
  - delante de
  lexicon: HALOT
  rationale: La imagen idiomática de evaluación desde la perspectiva de alguien se conserva bien en español con «ante los ojos de». Es una solución idiomática y suficientemente literal para el valor metafórico del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se preserva el nombre divino del Tetragrámaton según la terminología POB en español: «Yahvé». No se sustituye por un título, para mantener el nombre personal del pacto.'
- source_word: כְּכֹל אֲשֶׁר
  english_pob_choice: according to all that
  chosen_spanish: conforme a todo lo que
  alternatives_spanish:
  - según todo lo que
  - de acuerdo con todo lo que
  - tal como todo lo que
  lexicon: HALOT
  rationale: La construcción expresa conformidad con el total del modelo anterior. «Conforme a todo lo que» reproduce la idea de correspondencia amplia sin volverla rígida en español.
- source_word: עָשָׂה
  english_pob_choice: had done
  chosen_spanish: había hecho
  alternatives_spanish:
  - hizo
  - había realizado
  lexicon: HALOT
  rationale: El pluscuamperfecto español hace explícita la anterioridad de la acción de David respecto de la evaluación de Ezequías, igual que la solución inglesa.
- source_word: דָּוִיד
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - Davíd
  lexicon: HALOT
  rationale: Se mantiene la transliteración bíblica usual en español para el nombre propio.
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - su antepasado
  - su ancestro
  - su progenitor
  lexicon: HALOT
  rationale: La fórmula dinástica hebrea usa lenguaje de parentesco para un antecesor real. En el texto principal se conserva «su padre» por fidelidad formal; el contexto del linaje de David permite entender la relación dinástica, y la alternativa ancestral puede documentarse si se requiere mayor precisión.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La decisión POB es no ocultar el nombre propio de Dios bajo un título. En español, «Yahvé» preserva el referente del Tetragrámaton de forma reverente y reconocible.
  doctrine_reference: 'DOCTRINE.md: contested terms — יְהוָה / YHWH → Yahvé'
- issue: Valor dinástico de «su padre» en referencia a David
  english_pob_reading: Retain the dynastic formula as 'David his father' in the main text
  chosen_spanish_reading: Conservar «su padre» en el texto principal
  alternative_spanish_readings:
  - su antepasado
  - su ancestro
  - su forefather
  rationale: El hebreo de contextos reales usa lenguaje filial para la línea dinástica. En español, «su padre» mantiene la formulación fuente sin forzar una paráfrasis; la lectura dinástica queda implícita por el contexto histórico y puede explicitarse en nota.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El pasaje muestra alta concordancia con la auditoría inglesa: sin revisiones aplicadas en el paso más reciente, y con acuerdo completo en la evaluación cruzada. Se mantiene la misma estructura evaluativa y la misma solución para el nombre divino, con ajuste natural al español.'
  spanish_consistency_notes:
  - Se conserva el paralelismo evaluativo típico de las fórmulas regias del AT.
  - «Yahvé» se usa de manera consistente para el Tetragrámaton, conforme al estándar del proyecto.
  - «Lo recto» y «ante los ojos de» mantienen el tono bíblico sin calco rígido.
  - La nota sobre «su padre» preserva la tensión entre literalidad y sentido dinástico sin eliminar ninguna de las dos lecturas.
