  glossary_alignment: 'Buena alineación general con el glosario: יְהוָה → «Yahvé» correctamente; no hay conflicto con otros términos doctrinales. La principal desviación está en la decisión pronominal para el sufijo 2mp, donde el borrador no preserva el plural del original.'
