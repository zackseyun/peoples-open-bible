    issue: La fórmula divina «declara Yahvé Dios» no refleja de manera óptima אֲדֹנָי יְהוִה.
    rationale: Aunque preserva ambos títulos, el orden «Yahvé Dios» suena poco idiomático y difumina que אֲדֹנָי precede a יְהוָה. En español del proyecto, «el Señor Yahvé» mantiene el nombre divino explícito y reproduce mejor el compuesto hebreo.
  revised_spanish_text: Y quemen una ofrenda de acción de gracias de pan con levadura[a], y proclamen ofrendas voluntarias; anúncienlas. Porque así lo han amado, hijos de Israel[b], declara el Señor Yahvé.
  revised_footnotes:
