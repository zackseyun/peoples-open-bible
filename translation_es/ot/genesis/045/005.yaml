    rationale: La nota dice 'O “para preservación de la vida”', pero esa ya es exactamente la lectura del texto principal. La nota debe reflejar la alternativa real si se revisa el texto principal, o eliminarse si no hay contraste.
  - severity: low
    issue: Ligera pesadez estilística en 'para preservación de la vida'.
    rationale: En español bíblico contemporáneo y natural, 'para preservar la vida' comunica mejor el propósito de לְמִחְיָה sin pérdida de contenido.
