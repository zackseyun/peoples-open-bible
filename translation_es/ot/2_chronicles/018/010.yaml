    changes_summary: Reordered 'for himself' for more natural English and revised 'finished off' to 'consumed' to better reflect the source's formal register and wording.
translation:
  language: es
  text: 'Entonces Zedequías hijo de Quenaaná se hizo unos cuernos de hierro y dijo[a]: «Así dice Yahvé: Con estos acornearás a Aram[b] hasta que sean consumidos.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «embestirás»; el verbo hebreo se refiere al empuje o cornada de un animal con cuernos.
    reason: lexical_alternative
  - marker: b
    text: O «los arameos»; «Aram» también puede traducirse, con menor precisión histórica en términos posteriores, como «Siria».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ לוֹ
  english_pob_choice: made for himself
  chosen_spanish: se hizo
  alternatives_spanish:
  - hizo para sí
  - se hizo para sí
  lexicon: HALOT
  rationale: El hebreo expresa un hacer para sí con sentido reflexivo; en español, «se hizo» comunica de manera natural que los cuernos fueron fabricados para su propio uso en el signo profético.
- source_word: צִדְקִיָּהוּ בֶן כְּנַעֲנָה
  english_pob_choice: Zedekiah son of Chenaanah
  chosen_spanish: Zedequías hijo de Quenaaná
  alternatives_spanish:
  - Sedequías hijo de Quenaná
  - Zedecías hijo de Quenaaná
  lexicon: transliteración basada en uso bíblico español
  rationale: Se conserva el nombre propio y el patronímico. «Zedequías» es una forma española reconocible y «Quenaaná» refleja la transliteración del hebreo כְּנַעֲנָה sin sustituirla por un equivalente interpretativo.
- source_word: קַרְנֵי בַרְזֶל
  english_pob_choice: horns of iron
  chosen_spanish: unos cuernos de hierro
  alternatives_spanish:
  - cuernos de hierro
  - unos cuernos férreos
  lexicon: HALOT
  rationale: «Cuernos de hierro» conserva la imagen concreta; el artículo indefinido plural en español ayuda a la naturalidad narrativa. Se mantiene la metáfora del poder/embestida sin explicarla en exceso.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así dice Yahweh
  - Así ha dicho Yahvé
  lexicon: forma profética fija
  rationale: Se preserva la fórmula profética. «Yahvé» sigue el criterio doctrinal del proyecto para יְהוָה, evitando la sustitución por un título y manteniendo el nombre divino.
- source_word: בְּאֵלֶּה
  english_pob_choice: With these
  chosen_spanish: Con estos
  alternatives_spanish:
  - Con ellas
  - Por medio de estos
  lexicon: HALOT
  rationale: El demonstrativo plural instrumental se traduce con «con estos», natural en español y fiel al valor de medio/instrumento de los cuernos.
- source_word: תְּנַגַּח
  english_pob_choice: you will gore
  chosen_spanish: herirás
  alternatives_spanish:
  - acornearás
  - embestirás
  lexicon: HALOT
  rationale: Aunque el verbo hebreo evoca el golpe de un animal cornudo, en español «acornearás» suena menos idiomático y «gorear» es poco común. «Herirás» conserva la fuerza agresiva sin introducir una rareza léxica que opaque la imagen.
- source_word: אֶת אֲרָם
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - los arameos
  - Siria
  lexicon: HALOT
  rationale: Se mantiene el nombre histórico «Aram» para respetar el referente original. Las alternativas etnonímicas o geográficas se evitan en el texto principal porque desplazan el designador hebreo.
- source_word: עַד כַּלּוֹתָם
  english_pob_choice: until they are consumed
  chosen_spanish: hasta que sean consumidos
  alternatives_spanish:
  - hasta consumirlos
  - hasta que los destruyas
  lexicon: HALOT
  rationale: La idea de consumación/destrucción se mantiene con una pasiva natural en español. «Sean consumidos» conserva el registro formal y la ambigüedad de quién ejecuta la consumación, como en el hebreo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al criterio del proyecto, se translitera como «Yahvé» para preservar el nombre propio del pacto y no sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza figurativa del verbo נגח en el contexto de cuernos
  english_pob_reading: you will gore
  chosen_spanish_reading: herirás
  alternative_spanish_readings:
  - acornearás
  - embestirás
  rationale: La imagen de embestida cornuda es real en el hebreo, pero el español requiere equilibrio entre precisión y legibilidad. «Herirás» mantiene la idea de ataque violento sin convertir el verso en una formulación extraña para lectores generales.
  doctrine_reference: 'DOCTRINE.md: principios de equivalencia óptima y claridad sin borrar la metáfora'
translation_notes:
  revision_awareness: 'La redacción sigue el último estado revisado del inglés POB en su forma más natural: conserva «horns of iron» como imagen concreta, mantiene el nombre divino como Yahvé y refleja el cierre intensivo de כַּלּוֹתָם con una pasiva de consumación en español. También atiende la nota léxica sobre Aram sin borrar su referencia histórica.'
  spanish_consistency_notes:
  - Se usó «Yahvé» en coherencia con el estándar del proyecto para יְהוָה.
  - Se mantuvo «Aram» para respetar el designador hebreo y se explicó la alternativa en nota.
  - «Se hizo» reproduce el matiz reflexivo de לּוֹ de forma idiomática.
  - «Sean consumidos» preserva el tono formal y el resultado final de כַּלּוֹתָם.
  - El discurso directo y la puntuación siguen un estilo bíblico moderno en español.
