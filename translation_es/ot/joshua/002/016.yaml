translation:
  language: es
  text: 'Y ella les dijo: «Vayan a la región montañosa[a], para que no los encuentren los perseguidores; y escóndanse allí tres días, hasta que los perseguidores regresen[b]. Después podrán seguir su camino».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al monte»; el hebreo puede referirse tanto a un monte específico como a la región montañosa circundante.
    reason: lexical_alternative
  - marker: b
    text: O «los topen» o «vengan sobre ustedes»; el verbo puede denotar un encuentro, aquí con intención hostil por el contexto de persecución.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָהָרָה
  english_pob_choice: to the hill country
  chosen_spanish: a la región montañosa
  alternatives_spanish:
  - al monte
  - a la montaña
  - a los montes
  lexicon: HALOT
  rationale: הַר puede referirse a un monte concreto o a la zona montañosa. En este contexto de ocultamiento, 'región montañosa' comunica el sentido regional sin imponer una sola elevación puntual.
- source_word: לֵּכוּ
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Vayan allá
  - Salgan
  - Suban
  lexicon: HALOT
  rationale: El imperativo plural de הלך se expresa naturalmente con 'vayan'. Mantiene la urgencia y la instrucción directa de Rahab.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - no vaya a ser que
  - lest
  lexicon: HALOT
  rationale: פֶּן introduce una prevención o advertencia. En español, 'para que no' transmite de forma clara y digna esa finalidad negativa.
- source_word: יִפְגְּעוּ בָכֶם
  english_pob_choice: encounter you
  chosen_spanish: los alcancen
  alternatives_spanish:
  - los encuentren
  - los topen
  - los den alcance
  lexicon: HALOT
  rationale: פגע con ב puede significar 'encontrar/encounter', pero aquí el contexto de persecución hace que 'alcancen' exprese bien el posible encuentro hostil sin volverlo más fuerte de lo que permite el hebreo.
- source_word: הָרֹדְפִים
  english_pob_choice: the pursuers
  chosen_spanish: los perseguidores
  alternatives_spanish:
  - los que los persiguen
  - los que van persiguiéndolos
  lexicon: HALOT
  rationale: El participio sustantivado de רדף se vierte con 'los perseguidores', una forma natural en español que conserva el matiz activo de la persecución.
- source_word: וְנַחְבֵּתֶם
  english_pob_choice: hide yourselves
  chosen_spanish: escóndanse
  alternatives_spanish:
  - ocúltense
  - guárdense ocultos
  - escondan sus cuerpos
  lexicon: HALOT
  rationale: 'La forma con sentido reflexivo/medio se traduce mejor con una orden directa: ''escóndanse''. En español, el pronombre reflexivo ya carga la idea de hacerse ocultos.'
- source_word: שָׁמָּה
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: El adverbio locativo se rinde con 'allí', que es natural y conserva la referencia espacial indicada por el texto.
- source_word: שְׁלֹשֶׁת יָמִים
  english_pob_choice: three days
  chosen_spanish: por tres días
  alternatives_spanish:
  - tres días
  - durante tres días
  lexicon: HALOT
  rationale: Aunque la construcción hebrea expresa duración, en español la preposición 'por' comunica bien el período de ocultamiento y suena más fluida en este contexto.
- source_word: עַד שׁוֹב
  english_pob_choice: until ... return
  chosen_spanish: hasta que ... regresen
  alternatives_spanish:
  - hasta que vuelvan
  - hasta el regreso de
  lexicon: HALOT
  rationale: שוב aquí marca el regreso de los perseguidores. 'Regresen' es una equivalencia natural y precisa; evita la rigidez de una nominalización.
- source_word: וְאַחַר
  english_pob_choice: Afterward
  chosen_spanish: Después
  alternatives_spanish:
  - Luego
  - Más tarde
  - Y después
  lexicon: HALOT
  rationale: El adverbio de secuencia se traduce de modo breve con 'Después', que mantiene el orden narrativo sin añadir tono interpretativo.
- source_word: תֵּלְכוּ לְדַרְכְּכֶם
  english_pob_choice: you may go on your way
  chosen_spanish: podrán seguir su camino
  alternatives_spanish:
  - seguirán su camino
  - podrán ir por su camino
  - irán por su camino
  lexicon: HALOT
  rationale: לְדַרְכְּכֶם es literalmente 'a/para su camino'. En español, 'seguir su camino' reproduce el sentido idiomático de continuar el viaje tras la espera, y el modal 'podrán' refleja la secuencia permisiva del contexto.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del audit trail que eliminó un 'there' añadido indebidamente después de 'encounter you'; por eso el español no introduce un equivalente locativo extra junto a 'alcancen'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no aplicable en este versículo.
  - Se evita 'SEÑOR' y otras sustituciones no requeridas por el texto.
  - '''Los perseguidores'' conserva el participio sustantivado del hebreo sin suavizarlo a un término más genérico.'
  - La temporalidad ('por tres días' / 'hasta que regresen') sigue la función de duración y límite del hebreo sin sobreexplicar.
