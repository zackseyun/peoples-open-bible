translation:
  language: es
  text: Y David y toda la casa de Israel estaban celebrando[b] delante de Yahvé con toda clase de instrumentos de madera de ciprés[a], con liras, arpas, panderos, sonajas[c] y címbalos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «con todos los maderos de cipreses»; la frase probablemente se refiere a diversos instrumentos musicales hechos de madera de ciprés.
    reason: lexical_alternative
  - marker: b
    text: O «estaban jugando/regocijándose delante de Yahvé». El verbo hebreo puede denotar una celebración festiva y juguetona.
    reason: lexical_alternative
  - marker: c
    text: La identificación exacta de «sonajas» es incierta; posiblemente se refiere a «sistros» u otro instrumento de percusión que se sacudía.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְשַׂחֲקִים
  english_pob_choice: were celebrating
  chosen_spanish: estaban celebrando
  alternatives_spanish:
  - estaban jugando
  - estaban regocijándose
  - estaban haciendo fiesta
  lexicon: HALOT
  rationale: El verbo puede abarcar acción festiva y jubilosa, no solo “jugar”. En español, “estaban celebrando” comunica bien el carácter procesional y culto de la acción sin perder el sentido festivo.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: La locución hebrea expresa acción realizada en la presencia de Dios. Se mantiene el nombre divino “Yahvé” según el estándar del proyecto, y “delante de” conserva el giro bíblico natural en español.
- source_word: בְּכֹל עֲצֵי בְרוֹשִׁים
  english_pob_choice: with all kinds of cypress wood instruments
  chosen_spanish: con toda clase de instrumentos de madera de ciprés
  alternatives_spanish:
  - con toda clase de maderas de ciprés
  - con instrumentos de madera de ciprés
  - con toda clase de instrumentos de ciprés
  lexicon: HALOT
  rationale: 'El hebreo es elíptico: literalmente dice algo como “con todos los maderos de cipreses”. La versión española explicita la idea más probable —instrumentos hechos de esa madera— sin alejarse del texto.'
- source_word: בְרוֹשִׁים
  english_pob_choice: cypress
  chosen_spanish: ciprés
  alternatives_spanish:
  - abeto
  - enebro
  lexicon: HALOT
  rationale: La especie exacta es discutida, pero “ciprés” es una equivalencia moderna amplia y natural en español, acorde con la decisión inglesa de usar “cypress”.
- source_word: כִנֹּרוֹת
  english_pob_choice: lyres
  chosen_spanish: liras
  alternatives_spanish:
  - arpas
  lexicon: HALOT
  rationale: כִּנּוֹר designa un instrumento de cuerda tipo lira. “Liras” es más preciso que “arpas” y funciona bien en español bíblico.
- source_word: נְבָלִים
  english_pob_choice: harps
  chosen_spanish: arpas
  alternatives_spanish:
  - laúdes
  - salterios
  lexicon: HALOT
  rationale: נֵבֶל nombra otro instrumento de cuerda distinto del כִּנּוֹר. “Arpas” es una traducción tradicional y comprensible, aunque la identificación exacta no es totalmente segura.
- source_word: תֻפִּים
  english_pob_choice: tambourines
  chosen_spanish: tamboriles
  alternatives_spanish:
  - panderos
  - tambores de mano
  lexicon: HALOT
  rationale: El término alude a un tambor de marco usado en celebraciones. “Tamboriles” conserva un registro bíblico claro en español y evita una modernización excesiva.
- source_word: מְנַעַנְעִים
  english_pob_choice: rattles
  chosen_spanish: sonajas
  alternatives_spanish:
  - cascabeles
  - instrumentos de sonaja
  - sistra
  lexicon: HALOT
  rationale: El término es raro y parece referirse a instrumentos que se sacuden para producir sonido. “Sonajas” es una solución clara y natural en español para un objeto sonoro de sacudida.
- source_word: צֶלְצֶלִים
  english_pob_choice: cymbals
  chosen_spanish: címbalos
  alternatives_spanish:
  - cimbalillos
  - cymbales
  lexicon: HALOT
  rationale: Es la equivalencia estándar para instrumentos metálicos de percusión. “Címbalos” es fiel y plenamente idiomático en español.
- source_word: כָל בֵּית יִשְׂרָאֵל
  english_pob_choice: all the house of Israel
  chosen_spanish: toda la casa de Israel
  alternatives_spanish:
  - todo Israel
  lexicon: HALOT
  rationale: Se conserva la expresión corporativa hebrea “casa de Israel” en vez de reducirla a “todo Israel”, porque el original enfatiza la comunidad nacional como un todo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme al estándar del proyecto, se preserva el nombre del pacto como “Yahvé” y no se lo oculta con un título sustitutivo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: ahora cada nota de pie aparece anclada explícitamente en el texto español mediante [a] y [b]. También se alineó el nombre divino con el estándar español del proyecto (“Yahvé”).'
  spanish_consistency_notes:
  - Se mantuvo la distinción entre liras (כִּנּוֹר) y arpas (נֵבֶל) como en la auditoría inglesa.
  - Se eligió un registro bíblico moderno y claro, sin sustituir términos técnicos por equivalentes demasiado coloquiales.
  - Se preservó la expresión corporativa “toda la casa de Israel” por fidelidad al hebreo.
  - Las notas de pie están ancladas solo donde hay ambigüedad lexical real en español.
