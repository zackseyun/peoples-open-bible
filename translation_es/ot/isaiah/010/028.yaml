translation:
  language: es
  text: Él ha llegado a Aiat; ha pasado por Migrón[a]. En Micmas deja su equipaje.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «En Micmas deja su equipo», con «equipo» posiblemente incluyendo pertrechos militares o armas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּא
  english_pob_choice: has come
  chosen_spanish: ha llegado
  alternatives_spanish:
  - ha venido
  - llegó
  lexicon: HALOT
  rationale: El perfecto hebreo presenta la acción como consumada en la narración profética. En español, 'ha llegado' conserva ese valor de avance ya cumplido y suena natural en un registro bíblico moderno.
- source_word: עַיַּת
  english_pob_choice: Aiath
  chosen_spanish: Aiat
  alternatives_spanish:
  - Aiat
  - Haiat
  lexicon: HALOT
  rationale: Se translitera el nombre propio de forma cercana al hebreo עַיַּת. 'Aiat' evita forzar la forma breve 'Ai' y mantiene la referencia geográfica del texto.
- source_word: עָבַר
  english_pob_choice: has passed through
  chosen_spanish: ha pasado por
  alternatives_spanish:
  - ha atravesado
  - ha cruzado
  lexicon: HALOT
  rationale: El movimiento por localidades en una marcha militar se expresa de manera natural en español con 'pasar por'. Conserva la secuencia de avance sin sobreespecificar el tipo de cruce.
- source_word: בְּמִגְרֹן
  english_pob_choice: through Migron
  chosen_spanish: por Migrón
  alternatives_spanish:
  - en Migrón
  - a Migrón
  lexicon: HALOT
  rationale: El hebreo con ב en este contexto de recorrido se entiende como paso por el lugar. 'Por Migrón' reproduce ese trayecto de manera idiomática en español.
- source_word: לְמִכְמָשׂ
  english_pob_choice: At Michmash
  chosen_spanish: En Micmas
  alternatives_spanish:
  - A Micmas
  - Hacia Micmas
  lexicon: HALOT
  rationale: La cláusula introduce el siguiente punto del recorrido y funciona de modo elíptico. 'En Micmas' ofrece una equivalencia natural para el lugar de estación del relato.
- source_word: יַפְקִיד
  english_pob_choice: stores
  chosen_spanish: pone en depósito
  alternatives_spanish:
  - deposita
  - guarda
  - deja
  lexicon: HALOT
  rationale: El hiphil de פקד admite la idea de poner/entregar en custodia o depósito. 'Pone en depósito' preserva la acción de dejar algo guardado sin reducirla solo a 'guardar'.
- source_word: כֵּלָיו
  english_pob_choice: his baggage
  chosen_spanish: sus pertenencias
  alternatives_spanish:
  - su equipaje
  - su equipo
  - sus armas
  lexicon: HALOT
  rationale: כְּלִי puede abarcar utensilios, equipo o bienes de carga. 'Sus pertenencias' mantiene la amplitud del término en español y evita restringirlo innecesariamente a armas o equipaje.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail: en el tramo equivalente a עַל se prefirió un valor direccional/locativo de avance y no una lectura hostil; por eso la versión española usa ''a'' / ''por'' en un contexto de marcha. También se conservó la secuencia breve de movimientos y la clausula final sobre el depósito de bienes/equipo en Micmas.'
  spanish_consistency_notes:
  - Se emplea 'Yahvé' solo cuando el texto fuente lo exija explícitamente; aquí no aparece el nombre divino.
  - Se mantuvo la transliteración de topónimos para Aiat, Migrón y Micmas, siguiendo la práctica POB de conservar los nombres propios del hebreo.
  - '''Pone en depósito'' traduce la acción sin introducir un tecnicismo innecesario ni fijar de forma exclusiva la naturaleza del objeto depositado.'
  - El marcador [a] se ancla en 'sus pertenencias' porque esa es la expresión con mayor amplitud semántica donde cabe la alternativa lexical.
  - La puntuación en dos miembros reproduce la cadencia breve del hebreo y del inglés auditado.
