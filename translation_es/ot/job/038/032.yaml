translation:
  language: es
  text: ¿Puedes hacer salir a Mazzarot[a] en su tiempo, o guiar a Ayish[b] con sus hijos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Mazzarot es un término hebreo astronómico raro; puede referirse a las constelaciones o al zodíaco.
    reason: lexical_alternative
  - marker: b
    text: Ayish es un nombre hebreo de estrella o constelación; en algunas versiones se traduce «Arcturo», y muchos entienden «el Oso».
