id: GEN.31.43
reference: Genesis 31:43
source:
  edition: WLC
  text: וַ/יַּ֨עַן לָבָ֜ן וַ/יֹּ֣אמֶר אֶֽל יַעֲקֹ֗ב הַ/בָּנ֨וֹת בְּנֹתַ֜/י וְ/הַ/בָּנִ֤ים בָּנַ/י֙ וְ/הַ/צֹּ֣אן צֹאנִ֔/י וְ/כֹ֛ל אֲשֶׁר אַתָּ֥ה רֹאֶ֖ה לִ/י ה֑וּא וְ/לִ/בְנֹתַ֞/י מָֽה אֶֽעֱשֶׂ֤ה לָ/אֵ֨לֶּה֙ הַ/יּ֔וֹם א֥וֹ לִ/בְנֵי/הֶ֖ן אֲשֶׁ֥ר יָלָֽדוּ־־־־׃
translation:
  text: Then Laban answered and said to Jacob[a], “The daughters are my daughters, and the sons are my sons, and the flock is my flock, and all that you see is mine. But what can I do this day for these my daughters, or for their children whom they have borne?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'or for their sons whom they have borne,' if בְּנֵיהֶן is taken more narrowly as male offspring rather than children generally.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  chosen: answered
  alternatives:
  - responded
  lexicon: HALOT
  rationale: Common narrative verb introducing a reply; 'answered' preserves the Hebrew discourse pattern in a natural but still formal way.
- source_word: וַיֹּאמֶר
  chosen: said
  alternatives:
  - spoke
  lexicon: HALOT
  rationale: Standard rendering of אמר in narrative. Keeping both 'answered and said' reflects the Hebrew pair without unnecessary paraphrase.
- source_word: הַבָּנוֹת בְּנֹתַי
  chosen: The daughters are my daughters
  alternatives:
  - These daughters are my daughters
  lexicon: HALOT
  rationale: The repetition is emphatic and possessive. Rendering both noun and pronominal suffix preserves Laban's claim of ownership/familial right.
- source_word: וְהַבָּנִים בָּנַי
  chosen: and the sons are my sons
  alternatives:
  - and the children are my children
  lexicon: HALOT
  rationale: בנים here is masculine plural and contextually refers to male descendants in parallel with 'daughters'; 'sons' is more gender-accurate than the broader 'children' in this clause.
- source_word: וְהַצֹּאן צֹאנִי
  chosen: and the flock is my flock
  alternatives:
  - and the sheep are my sheep
  lexicon: HALOT
  rationale: צאן is a collective noun for small livestock; 'flock' best preserves the collective sense in idiomatic English.
- source_word: וְכֹל אֲשֶׁר אַתָּה רֹאֶה לִי הוּא
  chosen: and all that you see is mine
  alternatives:
  - and everything that you see belongs to me
  lexicon: HALOT
  rationale: This is a straightforward possessive claim. 'Is mine' is concise and preserves the emphatic personal claim without over-expansion.
- source_word: וְלִבְנֹתַי
  chosen: But what can I do today for these my daughters
  alternatives:
  - And for my daughters, what can I do today for these?
  - Yet what can I do today to these my daughters?
  lexicon: HALOT
  rationale: The prefixed conjunction plus dative/benefactive sense is best brought out idiomatically as concern 'for' his daughters. English word order is adjusted for readability while preserving the rhetorical force.
- source_word: מָה אֶעֱשֶׂה
  chosen: what can I do
  alternatives:
  - what shall I do
  - what am I to do
  lexicon: HALOT
  rationale: The imperfect here expresses practical possibility/intent in context. 'Can' captures Laban's rhetorical claim of inability to act at this point.
- source_word: הַיּוֹם
  chosen: today
  alternatives:
  - this day
  lexicon: HALOT
  rationale: '''Today'' is natural modern English and adequately represents the temporal adverbial force.'
- source_word: אוֹ לִבְנֵיהֶן
  chosen: or for their children
  alternatives:
  - or for their sons
  lexicon: HALOT
  rationale: Although בני can formally mean 'sons,' in many contexts it denotes children/offspring more generally. Since the referent is the offspring of his daughters, 'children' is the more natural and likely intended sense here.
- source_word: אֲשֶׁר יָלָדוּ
  chosen: whom they have borne
  alternatives:
  - to whom they gave birth
  - whom they bore
  lexicon: HALOT
  rationale: The relative clause refers back to the daughters as the subject of bearing children. 'Whom they have borne' is faithful and readable, preserving the maternal emphasis of ילד in this stem/context.
