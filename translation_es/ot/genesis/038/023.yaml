revisions:
- from: 'Y Judá dijo[a]: «Que la conserve; no sea que lleguemos a ser objeto de burla. Mira, yo envié este cabrito, y tú no la hallaste».'
  to: 'Y Judá dijo[a]: «Que se las quede; no sea que lleguemos a ser objeto de burla. Mira, yo envié este cabrito, pero tú no la encontraste».'
  rationale: Se corrigió «Que la conserve» a «Que se las quede» para reflejar correctamente las prendas en plural implícitas en el contexto y en la auditoría inglesa revisada. Se cambió «y tú no la hallaste» por «pero tú no la encontraste» para expresar mejor el contraste discursivo y mejorar la naturalidad del español contemporáneo. Se conservó la nota léxica sobre «objeto de burla» porque está bien fundamentada y útil.
