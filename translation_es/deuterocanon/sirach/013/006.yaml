review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la progresión manipuladora del verso: necesidad interesada, engaño, sonrisa y falsa seguridad. Sin embargo, introduce un condicional inicial («Si tiene necesidad de ti») que no refleja la elección principal auditada por la POB inglesa, la cual sigue el hebreo como afirmación directa: «He has need of you». Además, la nota al pie está anclada en el lugar equivocado: el marcador aparece tras «ti», pero la alternativa griega («te vaciará / te despojará») corresponde al verbo problemático «te engañará».'
  spanish_quality_summary: El español es natural y legible. «Te sonreirá» y «te tranquilizará» funcionan bien en registro bíblico moderno. No obstante, «Si tiene necesidad de ti» debilita el tono sentencioso del proverbio y añade una condición no preferida en la traducción base. También conviene corregir la nota para evitar el cambio accidental de persona («lo dejará sin recursos» debería referirse a «te»).
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. Las decisiones léxicas principales son razonables: «te engañará», «te sonreirá», «te tranquilizará». La excepción necesaria es ajustar la sintaxis inicial para alinearla con la decisión auditada sobre צֹרֶךְ לוֹ עִמְּךָ como afirmación directa, no condicional.'
  issues:
  - severity: medium
    issue: Se añadió un condicional inicial no preferido por la POB auditada.
    rationale: El hebreo base fue interpretado por la POB como «He has need of you», y el griego condicional solo se conserva como trasfondo contextual. «Si tiene necesidad de ti» desplaza el foco desde una observación directa a una hipótesis.
  - severity: medium
    issue: El marcador de nota está ubicado en una frase que no corresponde a la variante documentada.
    rationale: La nota sobre el griego «he will empty you out» explica el verbo difícil וְהָשִׁיעַ לָךְ / «te engañará», no la frase «tiene necesidad de ti».
  - severity: low
    issue: La nota contiene un desliz pronominal.
    rationale: Dice «lo dejará sin recursos» cuando el referente correcto en segunda persona es «te dejará sin recursos».
  revised_spanish_text: Tiene necesidad de ti, y te engañará[a]; te sonreirá y te tranquilizará.
  revised_footnotes:
  - marker: a
    text: Otra posible lectura, apoyada por el griego paralelo, es «te vaciará» / «te despojará», es decir, que no solo te engañará sino que te dejará sin recursos.
