id: COL.2.12
reference: Colossians 2:12
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: συνταφέντες αὐτῷ ἐν τῷ ⸀βαπτισμῷ, ἐν ᾧ καὶ συνηγέρθητε διὰ τῆς πίστεως τῆς ἐνεργείας τοῦ θεοῦ τοῦ ἐγείραντος αὐτὸν ⸀ἐκ νεκρῶν·
base_translation:
  language: en
  yaml_path: translation/nt/colossians/002/012.yaml
  text: having been buried with him in baptism, in which you also were raised with him through faith in the working of God, who raised him from the dead.
translation:
  language: ko
  text: 여러분은 세례[a] 안에서 그분과 함께 장사되었고, 그 세례 안에서 또한 그분을 죽은 자들 가운데서 살리신 하나님의 역사하심을 믿음으로[b] 그분과 함께 살아났습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「누구 안에서」, 곧 메시아 안에서. 헬라어 관계대명사는 세례를 가리키는 것이 가장 자연스럽다.
    reason: alternative_reading
  - marker: b
    text: 또는 「신뢰로」, 「믿음으로 말미암아」. 헬라어 πίστις는 「믿음·신실함·신뢰」를 함께 담을 수 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνταφέντες αὐτῷ
  english_pob_choice: having been buried with him
  chosen_korean: 그분과 함께 장사되었고
  alternatives_korean:
  - 그분과 함께 무덤에 묻혔으며
  - 그분과 함께 매장되었으며
  lexicon: BDAG
  rationale: συν- 접두사의 「함께」를 「그분과 함께」로 보존한다. 「장사되다」는 한국 교회의 정립된 표현.
- source_word: ἐν τῷ βαπτισμῷ
  english_pob_choice: in baptism
  chosen_korean: 세례 안에서
  alternatives_korean:
  - 세례를 통하여
  - 세례에서
  lexicon: BDAG
  rationale: 처소·수단의 ἐν.
- source_word: ἐν ᾧ
  english_pob_choice: in which
  chosen_korean: 그 세례 안에서
  alternatives_korean:
  - 그것 안에서
  - 그분 안에서
  lexicon: BDAG
  rationale: 가장 가까운 선행사인 「세례」를 따른다. 모호성은 각주로 보존.
- source_word: συνηγέρθητε
  english_pob_choice: you also were raised with him
  chosen_korean: 그분과 함께 살아났습니다
  alternatives_korean:
  - 함께 일으킴을 받았습니다
  - 함께 부활하였습니다
  lexicon: BDAG
  rationale: συν- 접두사로 「함께」를 명시. 「살아났습니다」는 부활 사건의 명료한 한국어.
- source_word: διὰ τῆς πίστεως τῆς ἐνεργείας τοῦ θεοῦ
  english_pob_choice: through faith in the working of God
  chosen_korean: 하나님의 역사하심을 믿음으로
  alternatives_korean:
  - 하나님의 능력을 향한 믿음으로
  - 하나님의 역사를 신뢰함으로
  lexicon: BDAG
  rationale: 속격 τῆς ἐνεργείας τοῦ θεοῦ는 믿음의 대상. 「하나님의 역사하심을 믿음으로」로 자연스러운 한국어로 옮긴다.
- source_word: τοῦ ἐγείραντος αὐτὸν ἐκ νεκρῶν
  english_pob_choice: who raised him from the dead
  chosen_korean: 그분을 죽은 자들 가운데서 살리신
  alternatives_korean:
  - 그분을 죽은 자 가운데서 일으키신
  lexicon: BDAG
  rationale: 부정과거 분사. 「죽은 자들 가운데서 살리신」은 한국 교회의 정립된 부활 표현.
