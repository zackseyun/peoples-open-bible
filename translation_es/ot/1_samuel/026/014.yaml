translation:
  language: es
  text: 'Entonces David llamó al pueblo[a] y a Abner hijo de Ner, diciendo: «¿No responderás, Abner?» Abner respondió y dijo: «¿Quién eres tú[b], que llamas al rey?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''el pueblo''; en este contexto se refiere al campamento o a las fuerzas de Saúl.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿Quién eres tú que llamas al rey?»'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - clamó
  - gritó
  lexicon: HALOT
  rationale: קרא puede significar 'llamar' o 'clamar'. Aquí David se dirige a distancia dentro del campamento; 'llamó' conserva el sentido básico sin exagerar el volumen.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - los soldados
  lexicon: HALOT
  rationale: La forma hebrea dice literalmente 'el pueblo'. En este contexto militar, el referente es el grupo reunido en el campamento de Saúl; 'el pueblo' mantiene la cercanía léxica, y la nota puede aclarar el matiz contextual.
- source_word: אַבְנֵר בֶּן נֵר
  english_pob_choice: Abner son of Ner
  chosen_spanish: Abner hijo de Ner
  alternatives_spanish:
  - Abner, hijo de Ner
  lexicon: HALOT
  rationale: Los nombres propios se transliteran y el patronímico se expresa de manera directa y natural en español como 'hijo de Ner'.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: La partícula introduce discurso directo. 'Diciendo' reproduce la estructura narrativa hebrea con naturalidad en español.
- source_word: הֲלוֹא
  english_pob_choice: Will you not
  chosen_spanish: ¿No ...?
  alternatives_spanish:
  - ¿Acaso no ...?
  - ¿No vas a ...?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica de reproche que espera respuesta. En español, '¿No ...?' comunica bien ese tono sin añadir elementos ajenos.
- source_word: תַעֲנֶה
  english_pob_choice: answer
  chosen_spanish: responderás
  alternatives_spanish:
  - contestarás
  - responderás, Abner
  lexicon: HALOT
  rationale: ענה aquí significa responder verbalmente. 'Responderás' es idiomático en español y mantiene el sentido de réplica esperada.
- source_word: וַיַּעַן ... וַיֹּאמֶר
  english_pob_choice: answered and said
  chosen_spanish: respondió y dijo
  alternatives_spanish:
  - replicó y dijo
  - respondió
  lexicon: HALOT
  rationale: El hebreo conserva la pareja narrativa 'respondió y dijo'. Mantener ambos verbos refleja mejor el estilo del original.
- source_word: מִי אַתָּה
  english_pob_choice: Who are you
  chosen_spanish: ¿Quién eres tú?
  alternatives_spanish:
  - ¿Quién eres?
  - ¿Quién eres tú, que ...?
  lexicon: HALOT
  rationale: Interrogativo + pronombre en forma directa. En español, '¿Quién eres tú?' es claro y mantiene el tono enfático del original.
- source_word: קָרָאתָ אֶל הַמֶּלֶךְ
  english_pob_choice: that you call to the king
  chosen_spanish: que llamas al rey
  alternatives_spanish:
  - que llamas al rey
  - que llamaste al rey
  - llamando al rey
  lexicon: HALOT
  rationale: 'El perfecto hebreo después de la pregunta se expresa de forma natural como una cláusula relativa en presente en español: ''que llamas al rey''. ''Al rey'' refleja אֶל. Se conserva la acusación directa sin suavizarla.'
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el rey Saúl
  lexicon: HALOT
  rationale: El sustantivo definido refiere a Saúl por título desde la perspectiva de Abner. 'El rey' conserva la designación formal del hebreo.
theological_decisions:
- issue: Referencia a la autoridad real de Saúl en el discurso
  english_pob_reading: the king
  chosen_spanish_reading: el rey
  alternative_spanish_readings:
  - el rey Saúl
  rationale: El hebreo usa el título definido sin nombrar a Saúl. Mantener 'el rey' preserva la forma del texto y el punto de vista de Abner; agregar 'Saúl' sería interpretativo.
  doctrine_reference: No doctrinal; fidelidad discursiva y narrativa al referente del texto.
translation_notes:
  revision_awareness: La revisión inglesa reciente favoreció 'the people' frente a 'the troops' por mayor cercanía léxica al hebreo, y ajustó la frase final a una lectura más directa del verbo finito. La propuesta española sigue esa decisión de cercanía léxica con 'el pueblo', sin perder el matiz militar contextual, y conserva la cláusula final como relativa natural en español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - Se usa 'rey' para הַמֶּלֶךְ conforme al título definido del hebreo.
  - Se conserva la duplicación narrativa 'respondió y dijo' porque refleja la estructura hebrea y no crea redundancia innecesaria en español.
  - La nota sobre 'el pueblo' explica el sentido contextual militar sin reemplazar la traducción principal por una paráfrasis.
