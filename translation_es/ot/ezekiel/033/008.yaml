translation:
  language: es
  text: 'Cuando yo diga al malvado[a]: «Malvado, ciertamente morirás», y tú no hables para advertir al malvado de su camino, ese malvado morirá en su iniquidad; pero demandaré su sangre de tu mano.[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Impío».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Te pediré cuentas por su sangre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּאָמְרִי
  english_pob_choice: When I say
  chosen_spanish: Cuando yo diga
  alternatives_spanish:
  - Cuando yo hable
  - Al decir yo
  lexicon: HALOT
  rationale: El hebreo introduce una cláusula temporal con valor de eventualidad. «Cuando yo diga» conserva ese marco natural en español y mantiene la voz divina en primera persona.
- source_word: לָרָשָׁע / רָשָׁע
  english_pob_choice: to the wicked / Wicked one
  chosen_spanish: al malvado / «Malvado»
  alternatives_spanish:
  - al impío / «Impío»
  - al perverso / «Perverso»
  lexicon: HALOT
  rationale: רָשָׁע designa a una persona moralmente perversa. «Malvado» es claro y bíblicamente reconocible en español, sin perder el tono acusatorio del vocativo.
- source_word: מוֹת תָּמוּת
  english_pob_choice: you shall surely die
  chosen_spanish: de cierto morirás
  alternatives_spanish:
  - morirás seguramente
  - ciertamente morirás
  lexicon: HALOT
  rationale: La construcción de infinitivo absoluto + imperfecto intensifica la certeza. «De cierto morirás» comunica bien esa solemnidad en español y evita sonar excesivamente mecánico.
- source_word: וְלֹא דִבַּרְתָּ
  english_pob_choice: and you do not speak
  chosen_spanish: y tú no le hables
  alternatives_spanish:
  - y no hablas
  - y no le hablaste
  lexicon: HALOT
  rationale: En este marco condicional, el hebreo expresa la falta de acción de advertir. El subjuntivo exhortativo/prohibitivo en español («no le hables») comunica el no realizar la advertencia con naturalidad, sin romper la estructura de la advertencia divina.
- source_word: לְהַזְהִיר
  english_pob_choice: to warn
  chosen_spanish: advertir
  alternatives_spanish:
  - amonestar
  - dar aviso a
  lexicon: HALOT
  rationale: El hifil de זהר tiene el sentido de advertir o poner sobre aviso. «Advertir» es conciso y ajustado al contexto profético; en español suena más directo que «amonestar».
- source_word: מִדַּרְכּוֹ
  english_pob_choice: from his way
  chosen_spanish: de su camino
  alternatives_spanish:
  - de su senda
  - de su manera de vivir
  lexicon: HALOT
  rationale: «Camino» conserva la metáfora bíblica de conducta o modo de vida. Es el equivalente más natural para lectores hispanos y mantiene la imagen moral del texto.
- source_word: הוּא רָשָׁע
  english_pob_choice: that wicked man
  chosen_spanish: ese malvado
  alternatives_spanish:
  - aquel malvado
  - ese perverso
  lexicon: HALOT
  rationale: El pronombre resumptivo más el sustantivo refuerzan la referencia. «Ese malvado» reproduce la fuerza enfática sin añadir innecesariamente «hombre».
- source_word: בַּעֲוֺנוֹ
  english_pob_choice: in his iniquity
  chosen_spanish: por su iniquidad
  alternatives_spanish:
  - en su iniquidad
  - a causa de su iniquidad
  lexicon: HALOT
  rationale: עָוֹן puede expresar culpa/iniquidad y también la consecuencia de esa culpa. Aquí «por su iniquidad» deja visible la causalidad del juicio sin borrar el peso moral del término.
- source_word: וְדָמוֹ
  english_pob_choice: his blood
  chosen_spanish: su sangre
  alternatives_spanish:
  - la sangre de él
  - su vida
  lexicon: HALOT
  rationale: Se conserva el idiomatismo bíblico de «sangre» como vida derramada y responsabilidad por muerte. En español, el sustantivo es claro y no requiere paráfrasis.
- source_word: מִיָּדְךָ אֲבַקֵּשׁ
  english_pob_choice: I will require his blood from your hand
  chosen_spanish: demandaré de tu mano
  alternatives_spanish:
  - te pediré cuentas de su sangre
  - requeriré de tu mano su sangre
  lexicon: HALOT
  rationale: El hebreo usa el idiomatismo forense de «requerir de la mano». «Demandaré de tu mano» mantiene la imagen jurídica y la responsabilidad personal. La mención explícita de «su sangre» queda en el contexto inmediato y evita redundancia pesada.
theological_decisions:
- issue: Responsabilidad del centinela y del malvado
  english_pob_reading: The wicked dies for his own iniquity, while the watchman is also held accountable for failing to warn him.
  chosen_spanish_reading: El malvado muere por su propia iniquidad, y el centinela sigue siendo responsable por no advertirle.
  alternative_spanish_readings:
  - El centinela carga con la culpa del malvado en su lugar
  - La frase solo es retórica y no implica responsabilidad real
  rationale: 'El hebreo mantiene ambas afirmaciones sin resolver la tensión: muerte por la iniquidad propia y exigencia de sangre al vigilante. La redacción española conserva esa doble afirmación sin fusionarlas ni suavizarlas.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con el pasaje base y con la revisión más reciente: no se requieren cambios respecto del audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el tetragrámaton en toda la obra; aquí el versículo usa primera persona divina, por lo que no aparece explícitamente.
  - Se conserva el registro jurídico-profético con verbos como «advertir» y «demandar», coherente con la terminología POB.
  - No se suaviza la tensión entre culpa personal y responsabilidad del centinela; ambas quedan expresadas en el texto español.
