translation:
  language: es
  text: cuyas flechas están afiladas, y todos sus arcos están tensos[a]; los cascos de sus caballos son considerados como pedernal[b], y sus ruedas como la tempestad[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «están tendidos»; el hebreo presenta los arcos como preparados para usarse.
    reason: lexical_alternative
  - marker: b
    text: O «como sílex» o «como una piedra de pedernal»; la comparación subraya la dureza de los cascos de los caballos.
    reason: lexical_alternative
  - marker: c
    text: O «como un torbellino» o «como una tormenta violenta»; la imagen resalta velocidad y fuerza destructiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: חִצָּיו
  english_pob_choice: his arrows
  chosen_spanish: sus flechas
  alternatives_spanish:
  - sus saetas
  - sus flechas de guerra
  lexicon: HALOT
  rationale: El posesivo singular del hebreo se conserva en español con «sus». «Flechas» es el equivalente natural y claro para חִצִּים en este contexto bélico; «saetas» es posible, pero menos usual en español moderno.
- source_word: שְׁנוּנִים
  english_pob_choice: are sharpened
  chosen_spanish: están afiladas
  alternatives_spanish:
  - están aguzadas
  - son puntiagudas
  lexicon: HALOT
  rationale: El participio pasivo describe flechas preparadas para la guerra. «Están afiladas» comunica bien el estado resultante en español natural. «Aguzadas» sería más literal, pero menos común.
- source_word: קַשְּׁתֹתָיו
  english_pob_choice: his bows
  chosen_spanish: sus arcos
  alternatives_spanish:
  - sus arcos de guerra
  - sus arcos tensados
  lexicon: HALOT
  rationale: «Arcos» es el equivalente directo de קשת. Se mantiene el plural y el posesivo singular del hebreo mediante «sus».
- source_word: דְּרֻכוֹת
  english_pob_choice: are bent
  chosen_spanish: están tensos
  alternatives_spanish:
  - están doblados
  - están preparados
  lexicon: HALOT
  rationale: El hebreo expresa arcos preparados para disparar, literalmente «pisados/tendidos». En español, «están tensos» reproduce mejor la imagen funcional que «están doblados», que podría sonar físico pero menos bélico. La alternativa inglesa «are drawn» se refleja de forma idiomática.
- source_word: פַּרְסוֹת
  english_pob_choice: the hooves
  chosen_spanish: los cascos
  alternatives_spanish:
  - las pezuñas
  - los cascos de los caballos
  lexicon: HALOT
  rationale: «Cascos» es el término normal para la pezuña del caballo en español. Como el hebreo ya dice «de sus caballos», no hace falta repetir «de los caballos».
- source_word: סוּסָיו
  english_pob_choice: of his horses
  chosen_spanish: de sus caballos
  alternatives_spanish:
  - de sus corceles
  lexicon: HALOT
  rationale: Se mantiene el valor posesivo del sufijo hebreo con «sus caballos». «Corceles» sería más literario, pero menos neutro.
- source_word: כַּצַּר
  english_pob_choice: like flint
  chosen_spanish: como pedernal
  alternatives_spanish:
  - como sílex
  - como una piedra dura
  lexicon: HALOT
  rationale: El contexto exige una comparación de dureza. «Pedernal» transmite bien la dureza y la imagen de golpe/impacto; «sílex» es correcto, pero menos transparente para la lectura general.
- source_word: נֶחְשָׁבוּ
  english_pob_choice: are considered
  chosen_spanish: son considerados
  alternatives_spanish:
  - se consideran
  - son tenidos por
  lexicon: HALOT
  rationale: El nifal de חשׁב expresa evaluación o estimación. «Son considerados» conserva el juicio comparativo del hebreo. «Son tenidos por» sería más tradicional, pero menos natural.
- source_word: וְגַלְגִּלָּיו
  english_pob_choice: and his wheels
  chosen_spanish: y sus ruedas
  alternatives_spanish:
  - y sus ruedas de carro
  - y sus ruedas de guerra
  lexicon: HALOT
  rationale: «Ruedas» sigue de cerca el hebreo. El contexto militar hace evidente que se trata de la maquinaria de guerra, sin necesidad de añadir «de carro» en el texto principal.
- source_word: כַּסּוּפָה
  english_pob_choice: like the whirlwind
  chosen_spanish: como un torbellino
  alternatives_spanish:
  - como la tempestad
  - como un viento huracanado
  lexicon: HALOT
  rationale: סוּפָה designa una tormenta violenta o remolino de viento. «Torbellino» reproduce la fuerza y velocidad de la imagen con buen español.
theological_decisions:
- issue: Metáfora militar acumulativa en el juicio divino implícito del contexto inmediato
  english_pob_reading: The verse describes weaponry, horses, and wheels in vivid martial imagery without softening the force.
  chosen_spanish_reading: 'El versículo conserva la imaginería bélica sin atenuarla: flechas afiladas, arcos tensos, cascos duros y ruedas como torbellino.'
  alternative_spanish_readings:
  - El versículo describe recursos militares de manera más neutral.
  - El pasaje suaviza la imagen bélica.
  rationale: No se debe diluir la violencia imagética del hebreo ni del inglés POB. La formulación española mantiene la acumulación de comparaciones con su peso retórico y teológico, útil para el oráculo de juicio en el contexto de Isaías 5.
  doctrine_reference: Isaías 5:27-30; juicio divino en el oráculo contra la nación invasora.
translation_notes:
  revision_awareness: 'Coincide sustancialmente con el texto inglés auditado: se conservan las tres imágenes principales y las opciones alternativas relevantes (arcos preparados; dureza de los cascos; violencia del viento) sin añadir material ajeno al hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el Tetragrámaton aparece explícitamente; aquí no aparece.
  - Se mantiene el posesivo singular del hebreo con «sus» en toda la línea.
  - Se evita «Cristo» y terminología eclesial no presente en el texto.
  - «Pedernal» y «torbellino» son términos bíblicamente transparentes en español y conservan la fuerza imagética del original.
