revisions:
- from: Pero Yahvé los tomó y los sacó del horno de hierro[a], de Egipto, para que fueran para él un pueblo de herencia, como en este día.
  to: Pero Yahvé los tomó y los sacó del horno de hierro[a], de Egipto, para ser para él un pueblo de herencia, como sucede hoy.
  rationale: Se ajusta la construcción de propósito a 'para ser' para reflejar mejor לִהְיוֹת y mejorar la fluidez del español. Se cambia 'como en este día' por 'como sucede hoy' para representar con fidelidad el modismo כַּיּוֹם הַזֶּה como una realidad presente. La nota se actualiza para coincidir exactamente con el texto revisado.
