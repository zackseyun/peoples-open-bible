- from: 'Y los egipcios urgían al pueblo[a], apresurándose a echarlos de la tierra, porque decían: «Todos nosotros somos hombres muertos».'
  to: 'Y los egipcios apremiaban al pueblo[a], apresurándose a hacerlos salir de la tierra, porque dijeron: «Todos somos hombres muertos».'
  rationale: Se ajusta el verbo principal a un español más natural para presión urgente («apremiaban»), se reemplaza «echarlos» por «hacerlos salir» para alinearlo mejor con שׁלח y con la rationale del POB, se cambia «decían» por «dijeron» para reflejar mejor el hebreo narrativo, y se aligera la frase final a «Todos somos hombres muertos» sin perder el giro idiomático.
