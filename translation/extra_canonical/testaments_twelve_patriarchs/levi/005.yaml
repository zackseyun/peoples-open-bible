id: T12P.LEV.05
reference: Testament of Levi 5
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: V. Καὶ †ἐν τούτῳ¹ ἤνοιξέ μοι² *ὁ ἄγγελος³ τὰς πύλας τοῦ οὐρανοῦ· καὶ εἶδον τὸν *ἅγιον ὕψιστον ἐπὶ θρόνου καθήμενον⁴. 2. Καὶ εἰπέ μοι⁵· Λευί, σοὶ⁶ ἔδωκα⁷ *τὰς εὐλογίας τῆς ἱερατείας⁸ ἕως⁹ ἐλθὼν¹⁰ κατοικήσω¹¹ *ἐν μέσῳ¹² τοῦ Ἰσραήλ. 3. Τότε¹³ ὁ ἄγγελος¹⁴ κατήγαγέν¹⁵ με ἐπὶ τὴν γῆν, καὶ ἔδωκέ¹⁶ μοι *ὅπλον καὶ ῥομφαίαν¹⁷, καὶ εἰπέ μοι¹⁸· Ποίησον ἐκδίκησιν ἐν Συχὲμ¹⁹ ὑπὲρ Δείνας²⁰ *τῆς ἀδελφῆς σου²¹, κἀγὼ²² ἔσομαι μετά σου²³, ὅτι Κύριος *ἀπέστειλέν †με²⁴. 4. Καὶ συνετέλεσα†²⁵ τῷ καιρῷ ἐκείνῳ *τοὺς υἱοὺς²⁶ Ἐμμώρ²⁷, καθὼς γέγραπται ἐν πλαξὶ²⁸ τῶν πατέρων²⁹. 5. Εἶπον δὲ αὐτῷ³⁰· Δέομαί σου³¹, Κύριε³², *δίδαξόν με³³ τὸ ὄνομά σου ἵνα³⁴ ἐπικαλέσομαί³⁵ σε³⁶ ἐν ἡμέρᾳ θλίψεως³⁷. 6. Καὶ εἶπεν³⁸· Ἐγώ εἰμι ὁ ἄγγελος ὁ *παραιτούμενος τὸ γένος³⁹ Ἰσραήλ, τοῦ μὴ πατάξαι⁴⁰ αὐτούς⁴¹. 7. Καὶ⁴² μετὰ ταῦτα⁴³ ἔξυπνος γενόμενος εὐλόγησα τὸν ὕψιστον⁴⁴.
