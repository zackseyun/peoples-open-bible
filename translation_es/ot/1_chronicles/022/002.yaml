translation:
  language: es
  text: Y David mandó reunir a los extranjeros[a] que estaban en la tierra de Israel, y puso a canteros para cortar piedras labradas[b] con el fin de edificar la casa de Dios[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los sojourners» o «los residentes extranjeros». El hebreo se refiere a no israelitas que vivían en la tierra.
    reason: lexical_alternative
  - marker: b
    text: O «piedras cortadas» o «piedras labradas».
    reason: lexical_alternative
  - marker: c
    text: Es decir, el templo.
    reason: cross_reference
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: ordered
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dijo
  lexicon: HALOT
  rationale: En este contexto, el verbo introduce una instrucción con valor directivo, no solo un acto de habla. «Mandó» conserva la fuerza de una orden en español natural y algo más directa que «ordenó».
- source_word: לִכְנוֹס
  english_pob_choice: to be gathered
  chosen_spanish: reunir
  alternatives_spanish:
  - juntar
  - convocar
  lexicon: HALOT
  rationale: El infinitivo expresa el contenido de la orden de David. «Reunir» comunica bien la acción de traer juntos a esos habitantes sin volverla innecesariamente pasiva en español.
- source_word: הַגֵּרִים
  english_pob_choice: the foreigners
  chosen_spanish: los extranjeros
  alternatives_spanish:
  - los forasteros
  - los residentes foráneos
  - los sojourners
  lexicon: HALOT
  rationale: «גֵּרִים» designa a personas no israelitas que vivían en la tierra; en español, «extranjeros» es claro y respeta el sentido social del término sin imponer una terminología eclesiástica o burocrática.
- source_word: בְּאֶרֶץ יִשְׂרָאֵל
  english_pob_choice: in the land of Israel
  chosen_spanish: en la tierra de Israel
  alternatives_spanish:
  - en Israel
  - en el país de Israel
  lexicon: HALOT
  rationale: Se conserva explícitamente «tierra» para reflejar אֶרֶץ y el matiz territorial del texto hebreo.
- source_word: וַיַּעֲמֵד
  english_pob_choice: he appointed
  chosen_spanish: puso a
  alternatives_spanish:
  - nombró a
  - designó a
  - estableció a
  lexicon: HALOT
  rationale: El verbo indica la instalación o asignación de trabajadores para una tarea. «Puso a» suena menos administrativo que «nombró» y permite expresar la función de manera breve y fiel al contexto.
- source_word: חֹצְבִים
  english_pob_choice: stonecutters
  chosen_spanish: canteros
  alternatives_spanish:
  - picapedreros
  - talladores de piedra
  - canteros de piedra
  lexicon: HALOT
  rationale: «חֹצְבִים» son los que trabajan la piedra. «Canteros» es un término español preciso y suficientemente natural; mantiene la idea de oficio sin recargar la frase.
- source_word: לַחְצוֹב
  english_pob_choice: to cut
  chosen_spanish: cortar
  alternatives_spanish:
  - labrar
  - tallar
  - cantear
  lexicon: HALOT
  rationale: El infinitivo repite la raíz del oficio. «Cortar» es la forma más transparente en español; «labrar» podría sugerir el resultado, pero aquí el verbo subraya la acción de dar forma a la piedra.
- source_word: אַבְנֵי גָזִית
  english_pob_choice: dressed stones
  chosen_spanish: piedras labradas
  alternatives_spanish:
  - piedras cortadas
  - piedras cinceladas
  - piedras de cantería
  lexicon: HALOT
  rationale: La expresión describe piedras preparadas para la construcción. «Piedras labradas» transmite mejor el acabado intencional que «piedras cortadas» y evita sonar demasiado técnico.
- source_word: לִבְנוֹת
  english_pob_choice: for building
  chosen_spanish: con el fin de edificar
  alternatives_spanish:
  - para construir
  - para edificar
  lexicon: HALOT
  rationale: Se conserva la idea de propósito. «Edificar» mantiene el tono elevado del texto bíblico y encaja con la construcción de la casa de Dios.
- source_word: בֵּית הָאֱלֹהִים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  - la casa divina
  lexicon: HALOT
  rationale: La frase hebrea dice literalmente «casa de Dios». Se preserva esa forma en español, dejando al lector percibir la referencia al templo sin sustituirla por un término interpretativo en el texto principal.
theological_decisions:
- issue: Nombrar el lugar de culto futuro como "casa de Dios" en vez de "templo"
  english_pob_reading: the house of God
  chosen_spanish_reading: la casa de Dios
  alternative_spanish_readings:
  - el templo de Dios
  rationale: El contexto claramente apunta al templo, pero la formulación hebrea es «casa de Dios». La traducción principal conserva la expresión del original; la identificación con el templo queda implícita y no se adelanta en el cuerpo del texto.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La revisión final del expediente inglés no introdujo cambios: el borrador quedó estable tras la verificación cruzada de alta concordancia. La versión española mantiene esa misma línea interpretativa, sin ampliar el sentido más allá del hebreo y reflejando las mismas decisiones léxicas clave.'
  spanish_consistency_notes:
  - Se mantuvo «la tierra de Israel» para conservar la dimensión territorial de אֶרֶץ.
  - Se evitó «SEÑOR» o una sustitución litúrgica para הָאֱלֹהִים, ya que aquí el hebreo dice literalmente «Dios».
  - Se eligió «canteros» por naturalidad y precisión; no se usó «siervos» ni otro término ajeno al oficio.
  - Se preservó la distinción entre el edificio futuro («casa de Dios») y su identificación contextual como el templo mediante nota, no en el texto principal.
