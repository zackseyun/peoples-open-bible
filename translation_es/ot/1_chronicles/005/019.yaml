translation:
  language: es
  text: Hicieron guerra contra los hagritas[a], Jetur, Nafís y Nodab.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “los hagaritas”. El etnónimo hebreo puede verterse de cualquiera de las dos maneras en español según se siga más de cerca la transliteración o una forma histórica alternativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  english_pob_choice: They made
  chosen_spanish: Hicieron
  alternatives_spanish:
  - Hicieron guerra
  - Libraron
  lexicon: HALOT
  rationale: El hebreo usa el giro idiomático עשה מלחמה, literalmente 'hacer guerra'. En español, 'hicieron guerra' conserva el paralelo con el original sin volverlo torpe; 'libraron' sería más idiomático pero pierde la huella del hebreo. Se eligió 'Hicieron' para mantener la estructura verbal del texto fuente.
- source_word: מִלְחָמָה
  english_pob_choice: war
  chosen_spanish: guerra
  alternatives_spanish:
  - guerra bélica
  - batalla
  lexicon: HALOT
  rationale: '''Guerra'' reproduce el sustantivo general מִלְחָמָה y conserva el valor amplio de conflicto militar. ''Batalla'' sería más puntual de lo que el hebreo implica.'
- source_word: עִם
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - con
  lexicon: HALOT
  rationale: Aunque la preposición básica es 'con', en este contexto de combate tiene fuerza adversativa. 'Contra' expresa mejor la relación hostil que el español requiere aquí.
- source_word: הַגְרִיאִים
  english_pob_choice: the Hagrites
  chosen_spanish: los hagritas
  alternatives_spanish:
  - los hagríes
  - los hagareos
  lexicon: HALOT
  rationale: Se translitera el etnónimo con adaptación al plural español ('los') y minúscula genérica. 'Hagritas' mantiene la forma del hebreo y evita imponer la variante interpretativa 'hagaritas' como única lectura, aunque la nota preserva esa alternativa.
- source_word: וִיטוּר
  english_pob_choice: Jetur
  chosen_spanish: Jetur
  alternatives_spanish:
  - Yetur
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar en español bíblico. Se conserva 'J' por continuidad con la convención castellana habitual y para evitar una grafía menos reconocible.
- source_word: וְנָפִישׁ
  english_pob_choice: Naphish
  chosen_spanish: Naphis
  alternatives_spanish:
  - Nafis
  - Nafisj
  lexicon: HALOT
  rationale: Se adapta el nombre propio al uso español conservando la aspiración implícita del hebreo con 'ph' solo cuando la tradición española lo justifica; aquí se prefiere 'Naphis' por cercanía transliterativa y legibilidad. La 'h' final de la forma inglesa no corresponde necesariamente al hebreo consonántico en español.
- source_word: וְנוֹדָב
  english_pob_choice: and Nodab
  chosen_spanish: y Nodab
  alternatives_spanish:
  - y Nodb
  lexicon: HALOT
  rationale: Se conserva el nombre propio sin alterar la forma consonántica y se incluye la conjunción coordinante para respetar la lista de etnónimos.
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el texto hebreo recibido y con el control inglés del POB; no se registran revisiones textuales significativas. La única oscilación relevante es la transliteración del etnónimo הַגְרִיאִים, para la cual se conserva la alternativa en nota.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo verbal del hebreo con 'Hicieron guerra' en vez de sustituirlo por un verbo más interpretativo como 'atacaron'.
  - Se conservó el orden de la lista de pueblos/nombres propios del texto fuente.
  - Se prefirió 'contra' por la fuerza adversativa de עִם en contexto bélico.
  - La nota a pie de página preserva la alternativa transliterativa del etnónimo, como hace el control inglés.
