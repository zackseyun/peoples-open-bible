translation:
  language: es
  text: Y yo también les di limpieza de dientes[a] en todas sus ciudades, y falta de pan en todos sus lugares; pero no volvieron a mí, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, “limpieza de dientes”, un modismo para no tener nada que comer.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם אֲנִי
  english_pob_choice: And I also
  chosen_spanish: Y yo también
  alternatives_spanish:
  - Y también yo
  - Además, yo
  lexicon: HALOT
  rationale: Conserva el énfasis aditivo de וְגַם y el pronombre explícito אֲנִי, con un orden natural en español.
- source_word: נָתַתִּי לָכֶם
  english_pob_choice: gave you
  chosen_spanish: les di
  alternatives_spanish:
  - les he dado
  - les había dado
  - les asigné
  lexicon: HALOT
  rationale: El pasado simple comunica bien la acción divina ya ejercida en el juicio profético. Se evita introducir una lectura aspectual más fuerte que el hebreo no exige aquí.
- source_word: נִקְיוֹן שִׁנַּיִם
  english_pob_choice: cleanness of teeth
  chosen_spanish: limpieza de dientes
  alternatives_spanish:
  - dientes limpios
  - vaciedad de dientes
  - nada que comer
  lexicon: HALOT
  rationale: Se mantiene la imagen literal del modismo hebreo para preservar su fuerza retórica, con español natural y claro. El sentido idiomático queda sostenido por el paralelismo con la falta de pan.
- source_word: בְּכָל עָרֵיכֶם
  english_pob_choice: in all your cities
  chosen_spanish: en todas sus ciudades
  alternatives_spanish:
  - en todas sus urbes
  - por todas sus ciudades
  lexicon: HALOT
  rationale: ‘Ciudades’ es el valor normal de עָרִים; el posesivo plural en español refleja correctamente el destinatario colectivo del discurso profético.
- source_word: וְחֹסֶר לֶחֶם
  english_pob_choice: and lack of bread
  chosen_spanish: y falta de pan
  alternatives_spanish:
  - y escasez de pan
  - y hambre
  lexicon: HALOT
  rationale: ‘Falta de pan’ conserva los componentes concretos del hebreo sin volverlo demasiado interpretativo. ‘Hambre’ sería más dinámico, pero perdería la correspondencia léxica.
- source_word: בְּכֹל מְקוֹמֹתֵיכֶם
  english_pob_choice: in all your places
  chosen_spanish: en todos sus lugares
  alternatives_spanish:
  - en todos sus asentamientos
  - en cada uno de sus lugares
  lexicon: HALOT
  rationale: ‘Lugares’ preserva la amplitud de מְקוֹמוֹת y evita restringir el alcance a poblaciones o asentamientos concretos.
- source_word: וְלֹא שַׁבְתֶּם עָדַי
  english_pob_choice: yet you did not return to me
  chosen_spanish: pero no se volvieron a mí
  alternatives_spanish:
  - pero no regresaron a mí
  - pero no se arrepintieron y volvieron a mí
  lexicon: HALOT
  rationale: '‘Volverse’ comunica bien שׁוּב en contexto de pacto: retorno relacional y obediencial a Dios. Se evita ‘arrepentirse’ como única opción, porque el hebreo conserva un matiz más amplio de volver a Yahvé.'
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se sigue la terminología del proyecto para el nombre divino, manteniendo la fórmula profética en español contemporáneo y digna.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahweh
  rationale: La política del proyecto pide traducir YHWH como ‘Yahvé’ en el texto principal. Se conserva así el nombre del pacto sin el enmascaramiento convencional de ‘SEÑOR’.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Whether to keep the idiom נִקְיוֹן שִׁנַּיִם literal in the main text
  english_pob_reading: Retain the literal image 'cleanness of teeth' in the main text
  chosen_spanish_reading: limpieza de dientes
  alternative_spanish_readings:
  - hambre
  - estómagos vacíos
  - nada que comer
  rationale: Se conserva la metáfora profética para no perder la fuerza imagética del hebreo. La frase paralela ‘falta de pan’ permite que el lector entienda el sentido sin reemplazar la imagen por una paráfrasis.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; original-language primacy'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; la presente versión mantiene la lectura aprobada y ajusta solo la formulación española para hacerla publicable y alineada con la terminología del proyecto.
  spanish_consistency_notes:
  - Se mantiene el paralelismo hebreo entre ‘limpieza de dientes’ y ‘falta de pan’.
  - ‘Volvieron a mí’ expresa el sentido pactal de שׁוּב sin reducirlo solo a una emoción interna.
  - Se usa ‘Yahvé’ conforme a la convención terminológica del proyecto para YHWH.
