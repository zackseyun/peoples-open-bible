translation:
  language: es
  text: Entonces el Dios grandemente glorioso, todopoderoso y verdadero, al revelar[a] su santo rostro, abrió las puertas celestiales, de las cuales descendieron dos ángeles glorificados de aspecto temible, visibles para todos excepto para los judíos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su santa presencia» o «su santo semblante» para «su santo rostro».
    reason: lexical_alternative
lexical_decisions:
- source_word: μεγαλοδόξος
  english_pob_choice: greatly glorious
  chosen_spanish: de gran gloria
  alternatives_spanish:
  - grandemente glorioso
  - de gloria inmensa
  lexicon: LSJ
  rationale: El compuesto intensifica la gloria divina; en español, «de gran gloria» conserva la fuerza enfática sin sonar forzado. Mantiene el valor descriptivo del griego mejor que convertirlo en un título fijo.
- source_word: παντοκράτωρ
  english_pob_choice: almighty
  chosen_spanish: Todopoderoso
  alternatives_spanish:
  - omnipotente
  - que todo lo puede
  lexicon: LSJ
  rationale: Para Dios, «Todopoderoso» es la equivalencia natural y reverente en español bíblico actual. Conserva el alcance absoluto de παντοκράτωρ sin perder solemnidad.
- source_word: ἀληθινὸς θεός
  english_pob_choice: true God
  chosen_spanish: verdadero
  alternatives_spanish:
  - real
  - genuino
  lexicon: LSJ
  rationale: En español, «el Dios verdadero» es la forma idiomática plena; aquí se integra como «y verdadero» dentro del sintagma ya encabezado por «el Dios», preservando la fuerza contrastiva del adjetivo ἀληθινός.
- source_word: ἐπιφάνας
  english_pob_choice: revealing
  chosen_spanish: al revelar
  alternatives_spanish:
  - manifestando
  - al mostrarse
  lexicon: LSJ
  rationale: El participio expresa la manifestación divina. «Al revelar» comunica esa acción sin suavizar el carácter intencional del acto, y se ajusta bien al gerundio/participial español.
- source_word: τὸ ἅγιον αὐτοῦ πρόσωπον
  english_pob_choice: his holy face
  chosen_spanish: su santo rostro
  alternatives_spanish:
  - su santa presencia
  - su santo semblante
  lexicon: LSJ
  rationale: Se conserva la imagen concreta de πρόσωπον como «rostro», siguiendo la decisión inglesa de no suavizarla a «presencia». «Santo rostro» es natural en español y mantiene la tensión antropomórfica.
- source_word: ἠνέῳξε τὰς οὐρανίους πύλας
  english_pob_choice: opened the heavenly gates
  chosen_spanish: abrió las puertas celestiales
  alternatives_spanish:
  - abrió las puertas del cielo
  - abrió las puertas de los cielos
  lexicon: LSJ
  rationale: «Celestiales» refleja mejor el adjetivo οὐρανίους que una frase más interpretativa como «del cielo». «Puertas celestiales» mantiene el registro elevado y la correspondencia lexical.
- source_word: δεδοξασμένοι
  english_pob_choice: glorified
  chosen_spanish: glorificados
  alternatives_spanish:
  - gloriosos
  - honrados
  lexicon: LSJ
  rationale: La forma pasiva/perfectiva pide una solución como «glorificados», más cercana al valor verbal del participio que el adjetivo «gloriosos». Así se conserva la relación con la gloria recibida.
- source_word: φοβεροειδεῖς
  english_pob_choice: of fearful appearance
  chosen_spanish: de aspecto temible
  alternatives_spanish:
  - de apariencia aterradora
  - de presencia temible
  lexicon: LSJ
  rationale: El compuesto describe una apariencia que inspira temor. «De aspecto temible» es claro, digno y conserva la función descriptiva sin exagerar más allá del griego.
- source_word: φανεροὶ πᾶσιν πλὴν τοῖς Ἰουδαίοις
  english_pob_choice: visible to everyone except the Jews
  chosen_spanish: visibles para todos excepto para los judíos
  alternatives_spanish:
  - manifiestos para todos excepto para los judíos
  - patentes para todos excepto para los judíos
  lexicon: LSJ
  rationale: «Visibles» expresa la percepción narrativa de φανεροί con claridad. Se mantiene sin atenuación la exclusión explícita «excepto para los judíos», como en el texto fuente y en el audit trail inglés.
theological_decisions:
- issue: Antropomorfismo divino en τὸ ἅγιον αὐτοῦ πρόσωπον
  english_pob_reading: his holy face
  chosen_spanish_reading: su santo rostro
  alternative_spanish_readings:
  - su santa presencia
  - su santo semblante
  rationale: Se preserva la imagen concreta del original en lugar de espiritualizarla. Esto mantiene la tensión teológica y literaria del texto, coherente con la filosofía de traducción auditada.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Exclusión explícita de los judíos en la cláusula de visibilidad
  english_pob_reading: visible to everyone except the Jews
  chosen_spanish_reading: visibles para todos excepto para los judíos
  alternative_spanish_readings:
  - manifiestos para todos excepto para los judíos
  rationale: La redacción conserva la afirmación narrativa tal como aparece en el griego, sin explicar ni suavizar la excepción. La transparencia del texto exige mantener la cláusula de exclusión.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail, manteniendo la correspondencia más cercana con οὐρανίους πύλας mediante «puertas celestiales» y con δεδοξασμένοι mediante «glorificados», mientras conserva el lenguaje antropomórfico de πρόσωπον en «rostro».
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención del proyecto cuando corresponda al Tetragrámaton; aquí el texto griego dice θεός, por lo que se traduce «Dios».
  - Se evita «SEÑOR» porque no aparece κύριος ni una cita directa del nombre divino en esta cláusula.
  - «Todopoderoso» mantiene el registro bíblico y la fuerza de παντοκράτωρ.
  - Se conserva la sintaxis elevada y la enumeración acumulativa del original.
  - La cláusula final respeta la visibilidad universal con la excepción explícita de los judíos, sin reinterpretación apologética.
