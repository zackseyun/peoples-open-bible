    rationale: La formulación 'Más allá del Río' suena más natural en español bíblico moderno y refleja mejor la etiqueta regional persa sin volverse interpretativa.
  revised_spanish_text: Entonces Tatenai, gobernador de Más allá del Río[a], Setar-Bozenai, y sus asociados hicieron exactamente así[b], conforme a lo que el rey Darío había enviado.
