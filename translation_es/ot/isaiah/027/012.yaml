translation:
  language: es
  text: Y en aquel día Yahvé trillará desde el cauce del Río hasta el Wadi de Egipto[a][b], y ustedes serán reunidos uno por uno[c], oh hijos de Israel[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el Éufrates»; «el Río» es una designación habitual del Éufrates.
    reason: cross_reference
  - marker: b
    text: O, «arroyo de Egipto». El hebreo se refiere a un wadi o curso estacional, no necesariamente al Nilo.
    reason: lexical_alternative
  - marker: c
    text: El verbo evoca la recolección o espigueo individual después de trillar.
    reason: cultural_note
  - marker: d
    text: O, «hijos de Israel». El hebreo es literalmente «hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה בַּיּוֹם הַהוּא
  english_pob_choice: And in that day
  chosen_spanish: Y en aquel día
  alternatives_spanish:
  - Y sucederá en aquel día
  - Y será en aquel día
  lexicon: HALOT
  rationale: La fórmula profética temporal se mantiene de manera idiomática y solemne en español. «En aquel día» conserva el valor escatológico o de intervención divina especial sin volver la frase rígida o artificial.
- source_word: יַחְבֹּט
  english_pob_choice: will thresh
  chosen_spanish: trillará
  alternatives_spanish:
  - golpeará
  - desgranará
  lexicon: HALOT
  rationale: El verbo hebreo evoca el acto agrícola de golpear/separar el grano u otros frutos. «Trillar» preserva bien la metáfora de separación y recogida sin perder naturalidad en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», conforme a la terminología POB indicada para יְהוָה, evitando la sustitución por un título.
- source_word: מִשִּׁבֹּלֶת הַנָּהָר
  english_pob_choice: from the channel of the River
  chosen_spanish: desde el cauce del Río
  alternatives_spanish:
  - desde el canal del Río
  - desde la corriente del Río
  lexicon: HALOT
  rationale: «שִׁבֹּלֶת» aquí apunta al cauce/corriente de un gran río. «Cauce» comunica bien el ámbito geográfico y la idea de extensión desde el límite fluvial.
- source_word: הַנָּהָר
  english_pob_choice: the River
  chosen_spanish: el Río
  alternatives_spanish:
  - el Éufrates
  lexicon: HALOT
  rationale: Se mantiene la designación geográfica titulada «el Río», siguiendo la forma del hebreo y dejando abierta la identificación contextual con el Éufrates, como hace el audit trail en inglés.
- source_word: עַד נַחַל מִצְרָיִם
  english_pob_choice: to the Wadi of Egypt
  chosen_spanish: hasta el Wadi de Egipto
  alternatives_spanish:
  - hasta el arroyo de Egipto
  - hasta el torrente de Egipto
  lexicon: HALOT
  rationale: «נחל» denota un wadi o curso estacional, por lo que se conserva «Wadi» en el texto principal para reflejar con precisión la realidad geográfica y evitar la idea de un río permanente.
- source_word: תְּלֻקְּטוּ
  english_pob_choice: will be gathered
  chosen_spanish: serán reunidos
  alternatives_spanish:
  - serán recogidos
  - serán espigados
  lexicon: HALOT
  rationale: El pasivo de לקט puede sugerir recoger por partes o espigar. En español, «serán reunidos» expresa claramente el resultado y mantiene el énfasis en la restauración del pueblo.
- source_word: לְאַחַד אֶחָד
  english_pob_choice: one by one
  chosen_spanish: uno por uno
  alternatives_spanish:
  - uno a uno
  - cada uno
  lexicon: HALOT
  rationale: La expresión distributiva se traduce con una locución natural y precisa en español. «Uno por uno» preserva el carácter individual de la reunión.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: O sons of Israel
  chosen_spanish: oh hijos de Israel
  alternatives_spanish:
  - hijos de Israel
  - oh hijos de Israel
  lexicon: HALOT
  rationale: Se conserva el masculino plural literal del hebreo. «Oh» marca el valor vocativo del llamado profético sin introducir una paráfrasis ajena al texto.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el Señor
  rationale: La línea POB usa la transliteración del nombre del pacto en lugar de sustituirlo por un título. «Yahvé» es la forma española adoptada en este proyecto para preservar esa decisión teológica y textual.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Conservar la designación geográfica «el Río»
  english_pob_reading: the River
  chosen_spanish_reading: el Río
  alternative_spanish_readings:
  - el Éufrates
  rationale: El texto hebreo usa una designación titulada que en contexto suele referirse al Éufrates. Mantener «el Río» en el cuerpo principal respeta la forma del original y deja la identificación implícita, como en el audit trail inglés.
  doctrine_reference: HALOT / cross-reference note in English audit
- issue: Renderizar בְּנֵי יִשְׂרָאֵל de forma masculina
  english_pob_reading: sons of Israel
  chosen_spanish_reading: hijos de Israel
  alternative_spanish_readings:
  - niños de Israel
  - pueblo de Israel
  rationale: El hebreo es masculino plural y funciona como designación de alianza étnica. Se conserva el rasgo masculino en la traducción principal, siguiendo la política de precisión de género del proyecto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'Coincide con la última revisión del paquete fuente: no se requieren cambios respecto del análisis auditado; se han mantenido las mismas decisiones de sentido y de terminología, con adaptación idiomática al español y conservación de las tensiones léxicas relevantes.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva «el Río» como designación geográfica titulada, con aclaración en nota.
  - Se conserva el valor masculino plural de «hijos de Israel».
  - «Wadi» se mantiene como término geográfico preciso; no se sustituye por «arroyo» o «torrente» en el texto principal.
  - La metáfora agrícola de לקט/חבט se refleja con «trillar» y «serán reunidos» sin convertirla en una paráfrasis interpretativa.
