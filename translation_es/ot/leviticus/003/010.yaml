translation:
  language: es
  text: y los dos riñones, y la grasa que está sobre ellos, que está sobre los lomos, y el apéndice sobre el hígado[b], que quitará con los riñones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: O ‘el lóbulo sobre el hígado’. El término hebreo (יֹתֶרֶת) para esta parte anatómica es incierto; ‘apéndice’ en el texto principal evita afirmar más precisión de la que ofrece el hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁתֵּי הַכְּלָיֹת
  english_pob_choice: the two kidneys
  chosen_spanish: los dos riñones
  alternatives_spanish:
  - los dos riñones
  lexicon: HALOT
  rationale: כְּלָיֹת nombra anatómicamente los riñones. En español, ‘riñones’ es claro y preciso en el contexto sacrificial.
- source_word: הַחֵלֶב
  english_pob_choice: the fat
  chosen_spanish: la grasa
  alternatives_spanish:
  - el sebo
  - la grasa
  lexicon: HALOT
  rationale: En el contexto levítico, חֵלֶב designa la grasa selecta reservada para el rito. ‘Grasa’ comunica bien la función ritual y evita una tecnicidad opaca; ‘sebo’ sería posible, pero menos natural para lectores amplios.
- source_word: אֲשֶׁר עֲלֵהֶן
  english_pob_choice: that is on them
  chosen_spanish: que está sobre ellos
  alternatives_spanish:
  - que está sobre ellos
  - que está encima de ellos
  lexicon: HALOT
  rationale: La relativa especifica la ubicación de la grasa respecto de los riñones. ‘Está sobre ellos’ conserva la relación espacial de manera natural en español.
- source_word: הַכְּסָלִים
  english_pob_choice: the loins
  chosen_spanish: los lomos
  alternatives_spanish:
  - los lomos
  - los flancos
  lexicon: HALOT
  rationale: כְּסָלִים designa la zona de los lomos/flancos. ‘Lomos’ es una solución bíblica y anatómica comprensible en español, equivalente al rango semántico usado en inglés.
- source_word: הַיֹּתֶרֶת
  english_pob_choice: the appendage
  chosen_spanish: la porción adherida
  alternatives_spanish:
  - la porción adherida
  - el apéndice
  - el lóbulo
  lexicon: HALOT
  rationale: יֹתֶרֶת es un término anatómico incierto. La POB inglesa optó por ‘appendage’ para no fingir precisión; en español, ‘porción adherida’ preserva esa prudencia y sigue siendo publicable y transparente.
- source_word: עַל הַכָּבֵד
  english_pob_choice: on the liver
  chosen_spanish: al hígado
  alternatives_spanish:
  - sobre el hígado
  - al hígado
  lexicon: HALOT
  rationale: El hebreo marca relación espacial/adhesión con עַל. En español, ‘adherida al hígado’ comunica la misma relación sin forzar una imagen anatómica rígida.
- source_word: יְסִירֶנָּה
  english_pob_choice: he shall remove
  chosen_spanish: quitará
  alternatives_spanish:
  - quitará
  - deberá quitar
  lexicon: HALOT
  rationale: El verbo הִסִיר en este contexto ritual significa retirar/quitar. ‘Quitará’ mantiene el sentido procedural y suena más natural en español que una perífrasis legalista.
translation_notes:
  revision_awareness: El texto español sigue de cerca la revisión más reciente del POB inglés, especialmente la sintaxis final ‘que quitará con los riñones’. Se mantuvo la cautela semántica respecto de יֹתֶרֶת, pero en español se optó por ‘porción adherida’ para hacer explícita la relación física sin sobreinterpretar la anatomía.
  spanish_consistency_notes:
  - Se preservó ‘Yahvé’ como norma del proyecto solo cuando aparece el Tetragrámaton; este versículo no lo contiene.
  - ‘grasa’ se eligió como equivalente funcional del uso sacrificial de חֵלֶב.
  - ‘lomos’ se mantuvo por coherencia con el registro bíblico y porque cubre el campo semántico de כְּסָלִים.
  - La cláusula final ‘que quitará con los riñones’ refleja el valor procedimental del hebreo y la revisión inglesa final, evitando separar indebidamente el objeto del verbo.
