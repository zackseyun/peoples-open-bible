- from: 'Entonces Moisés subió desde las llanuras de Moab al monte Nebo[a], a la cumbre del Pisgá, que está frente a Jericó. Y Yahvé le mostró toda la tierra: Galaad hasta Dan.'
  to: 'Entonces Moisés subió de las llanuras de Moab al monte Nebo, a la cima de Pisgá, que está frente a Jericó. Y Yahvé le mostró[a] toda la tierra: Galaad hasta Dan.'
  rationale: 'Se corrige la nota al pie para que preserve la alternativa léxica real del hebreo y del expediente POB en וַיַּרְאֵהוּ. Además, se hacen dos ajustes menores de naturalidad en español: «de las llanuras» y «la cima de Pisgá». No se requiere adjudicación adicional porque los cambios son claros, de bajo riesgo y plenamente sustentados por el fuente y la política del proyecto.'
