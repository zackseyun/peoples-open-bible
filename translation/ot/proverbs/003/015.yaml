id: PRO.3.15
reference: Proverbs 3:15
source:
  edition: WLC
  text: יְקָ֣רָה הִ֭יא מ/פניים וְ/כָל חֲ֝פָצֶ֗י/ךָ לֹ֣א יִֽשְׁווּ בָֽ/הּ־־׃
translation:
  text: She is more precious than jewels[a], and none of your delights can compare with her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'rubies'; the Hebrew term likely refers more generally to precious gems or jewels, and its exact identification is uncertain.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְקָרָה
  chosen: more precious
  alternatives:
  - precious
  - costly
  - valuable
  lexicon: HALOT
  rationale: The adjective denotes high value or preciousness. Because it is followed by the comparative preposition מִן ('than/from'), English idiom is best expressed as 'more precious' rather than simply 'precious.'
- source_word: הִיא
  chosen: she
  alternatives:
  - it
  lexicon: HALOT
  rationale: The pronoun is feminine singular, referring back to wisdom in the surrounding context. 'She' preserves the Hebrew personification of wisdom.
- source_word: מִפְּנִינִים
  chosen: than jewels
  alternatives:
  - than rubies
  - than pearls
  - than corals
  lexicon: HALOT
  rationale: The noun פְּנִינִים refers to precious gems/jewels, though the exact species is uncertain. Traditional 'rubies' is possible, but 'jewels' better reflects the lexical uncertainty while preserving the sense of exceptional value.
- source_word: וְכָל
  chosen: and none of
  alternatives:
  - and all
  - and none
  lexicon: HALOT
  rationale: Literally 'and all,' but in combination with the following negated verb ('all your delights do not equal...') idiomatic English is 'and none of your...' to convey the distributive negative sense.
- source_word: חֲפָצֶיךָ
  chosen: your delights
  alternatives:
  - your desires
  - your precious things
  - your pleasures
  lexicon: HALOT
  rationale: From חֵפֶץ, denoting that which is desired or delighted in. 'Delights' fits the wisdom context and pairs naturally with comparison language; 'desires' could suggest subjective longing rather than the desirable things themselves.
- source_word: לֹא יִשְׁווּ
  chosen: can compare
  alternatives:
  - do not equal
  - are not equal
  - cannot match
  lexicon: HALOT
  rationale: The verb שוה in this context means to be equal to or comparable with. 'Can compare' is a natural English rendering that communicates inability to equal her worth.
- source_word: בָּהּ
  chosen: with her
  alternatives:
  - to her
  - against her
  lexicon: HALOT
  rationale: The preposition marks the object of comparison. 'With her' is the most idiomatic English expression after 'compare.'
