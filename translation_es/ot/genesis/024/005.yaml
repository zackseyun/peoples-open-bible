revisions:
- from: 'Y dijo el siervo a él[a]: «Quizá la mujer no esté dispuesta[b] a seguirme a esta tierra. ¿Haré entonces volver a tu hijo a la tierra de donde saliste?»'
  to: 'Y el siervo le dijo: «Quizá la mujer no esté dispuesta a seguirme[a] a esta tierra. ¿Deberé entonces llevar de vuelta a tu hijo a la tierra de donde saliste?»'
  rationale: Se mejora la naturalidad del español con «le dijo» y «¿Deberé entonces llevar de vuelta...?» sin apartarse del sentido hebreo ni del audit trail inglés. Se elimina una nota innecesaria y se corrige el anclaje de la nota restante para que explique el segmento correcto.
