translation:
  language: es
  text: ¡Ay de mí, en verdad[a], miserable y muchas veces triplemente desgraciada,[b] que, aunque di a luz a siete hijos,[c] he venido a ser madre de ninguno!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¡Oh, miserable mujer!» o «¡Oh, desgraciada!». La exclamación griega es un lamento dirigido a sí misma.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «muchas veces tres veces desgraciada», una expresión intensificada de dolor.
    reason: lexical_alternative
  - marker: c
    text: 'O: «siete hijos varones». El término griego puede significar «hijos» o «varones», aunque el contexto apunta a descendencia masculina.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὦ μελέα
  english_pob_choice: Alas for me
  chosen_spanish: ¡Ay de mí!
  alternatives_spanish:
  - ¡Ay, pobre de mí!
  - ¡Desdichada de mí!
  lexicon: LSJ
  rationale: Es una exclamación de lamento personal; «¡Ay de mí!» reproduce con naturalidad el clamor afectivo sin añadir contenido ajeno al griego.
- source_word: ἔγωγε
  english_pob_choice: indeed
  chosen_spanish: en verdad
  alternatives_spanish:
  - por mi parte
  - ciertamente
  lexicon: LSJ
  rationale: Refuerza la auto-referencia con énfasis. «En verdad» conserva esa intensificación de modo claro y digno en español.
- source_word: πολλάκις τρισαθλία
  english_pob_choice: thrice-wretched many times over
  chosen_spanish: muchas veces tristemente desgraciada
  alternatives_spanish:
  - muchas veces tres veces desdichada
  - muchas veces sumamente miserable
  lexicon: LSJ
  rationale: Se conserva el valor intensivo de πολλάκις, pero «tristemente desgraciada» evita una literalidad áspera en español; el griego acumula lamento y la traducción debe sonar como lamento real, no como calco forzado.
- source_word: ἥτις
  english_pob_choice: Though I
  chosen_spanish: que, aunque
  alternatives_spanish:
  - yo que
  - la que
  lexicon: LSJ
  rationale: Introduce la cláusula relativa con matiz concesivo, como en el inglés POB; en español, «que, aunque» mantiene la relación sintáctica y el contraste implícito.
- source_word: ἑπτὰ παῖδας
  english_pob_choice: seven children
  chosen_spanish: siete hijos
  alternatives_spanish:
  - siete niños
  - siete hijos varones
  lexicon: LSJ
  rationale: Aunque παῖδας puede ser «hijos/niños» o «hijos varones», aquí el contexto de una madre en duelo hace natural «hijos» en español y preserva la ambigüedad relativa sin forzar «varones» en el cuerpo del texto.
- source_word: τεκοῦσα
  english_pob_choice: bore
  chosen_spanish: di a luz a
  alternatives_spanish:
  - habiendo dado a luz a
  - parí
  lexicon: LSJ
  rationale: Expresa el acto maternal de dar vida con solemnidad y claridad; evita una dureza innecesaria de «parí» y mantiene la referencia biológica del aoristo participial.
- source_word: οὐδενὸς μήτηρ γεγένημαι
  english_pob_choice: I have become the mother of none
  chosen_spanish: he llegado a no ser madre de ninguno
  alternatives_spanish:
  - soy madre de ninguno
  - no soy madre de ninguno
  lexicon: LSJ
  rationale: El perfecto γεγένημαι señala un estado resultante. «He llegado a no ser madre de ninguno» conserva el contraste paradójico entre haber dado a luz y quedar sin hijos vivos, sin borrar la fuerza del resultado presente.
theological_decisions:
- issue: Lamento por la pérdida de los hijos y el uso del perfecto resultativo
  english_pob_reading: 'The line is rendered as a bereavement paradox: despite bearing seven children, she now counts herself mother of none.'
  chosen_spanish_reading: 'La traducción mantiene el paradoxo de duelo: aunque los dio a luz, ahora se expresa como madre de ninguno.'
  alternative_spanish_readings:
  - Se podría suavizar a «no soy madre de ninguno»
  - 'o volverlo más directo: «he quedado sin hijos»'
  rationale: El griego no solo informa una ausencia; expresa el dolor de una identidad maternal vaciada por la pérdida. Conviene preservar esa tensión sin resolverla en una paráfrasis más plana.
  doctrine_reference: Preservar la tensión retórica y afectiva del texto; lectura literaria y teológicamente sobria, sin añadir interpretación doctrinal externa.
translation_notes:
  revision_awareness: Se siguió de cerca el ajuste del POB inglés más reciente, que integra el valor de μελέα junto con la intensidad de πολλάκις τρισαθλία y conserva el perfecto resultativo de γεγένημαι. La versión española procura reflejar esa misma combinación de lamento, intensificación y paradoja de pérdida, evitando resolver la tensión del original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa «hijos» en el texto principal, con nota para la alternativa «hijos varones», porque el griego παῖδας admite ambas posibilidades.
  - La salida conserva un tono bíblico sobrio y actual, evitando fórmulas eclesiásticas rígidas que no están motivadas por el griego.
  - La estructura concesiva «que, aunque...» intenta reflejar el relativo griego sin perder legibilidad en español.
