  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: el sujeto es quien habla en secreto, μολύνει se aplica a su propia ψυχή, y ἐν παροικήσει μισηθήσεται se refleja adecuadamente como rechazo en el ámbito donde vive. Sin embargo, «anda murmurando» desplaza un poco la imagen específica de ψιθυρίζων desde el susurro/maledicencia encubierta hacia una murmuración más general, y «mancha» queda algo más débil que «defiles/μολύνει».'
