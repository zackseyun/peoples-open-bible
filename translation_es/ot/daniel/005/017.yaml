translation:
  language: es
  text: 'Entonces Daniel respondió y dijo delante del rey: «Que tus dones sean para ti mismo, y da tus recompensas a otro. Sin embargo, leeré el escrito para el rey y le daré a conocer la interpretación».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בֵּאדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  - Entonces, pues
  lexicon: HALOT
  rationale: Marca secuencia narrativa inmediata; «Entonces» es natural en español y conserva el avance del relato sin añadir énfasis indebido.
- source_word: עָנֵה ... וְאָמַר
  english_pob_choice: answered and said
  chosen_spanish: respondió y dijo
  alternatives_spanish:
  - respondió
  - contestó y dijo
  lexicon: HALOT
  rationale: Conserva el par verbal semítico presente en el original. «Respondió y dijo» suena natural en español bíblico moderno y no reduce la doble acción a una sola.
- source_word: קֳדָם מַלְכָּא
  english_pob_choice: before the king
  chosen_spanish: delante del rey
  alternatives_spanish:
  - en presencia del rey
  - ante el rey
  lexicon: HALOT
  rationale: «Delante de» conserva la idea espacial/cortés de presencia; evita simplificarlo a «al rey», que perdería el matiz de comparecencia ante la corte.
- source_word: מַתְּנָתָךְ
  english_pob_choice: your gifts
  chosen_spanish: tus dones
  alternatives_spanish:
  - tus regalos
  - tus presentes
  lexicon: HALOT
  rationale: En contexto son recompensas prometidas por el rey; «dones» es un equivalente digno y suficientemente amplio para el plural colectivo.
- source_word: לָךְ לֶהֶוְיָן
  english_pob_choice: be for yourself
  chosen_spanish: sean para ti mismo
  alternatives_spanish:
  - quédate con ellos
  - permanezcan tuyos
  lexicon: HALOT
  rationale: La construcción expresa que Daniel rechaza los dones para sí y los deja al rey. «Sean para ti mismo» sigue de cerca la fuerza idiomática del arameo sin sonar rígido.
- source_word: וּנְבָזְבְּיָתָךְ
  english_pob_choice: your rewards
  chosen_spanish: tus regalos
  alternatives_spanish:
  - tus recompensas
  - tus obsequios
  lexicon: HALOT
  rationale: El término se refiere a los presentes/recompensas ofrecidos por el monarca. Aquí se mantiene la paralelidad con «dones»; «recompensas» es posible, pero «regalos» preserva el tono del intercambio cortesano.
- source_word: לְאָחֳרָן הַב
  english_pob_choice: give ... to another
  chosen_spanish: da ... a otro
  alternatives_spanish:
  - dáselos a otro
  - entrégalos a otro
  lexicon: HALOT
  rationale: «Otro» refleja el singular substantivado del arameo; no se amplía a plural sin necesidad textual.
- source_word: בְּרַם
  english_pob_choice: Nevertheless
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - Pero
  - No obstante
  lexicon: HALOT
  rationale: 'Introduce contraste concesivo: Daniel rechaza el pago, pero acepta interpretar. «Sin embargo» conserva la transición sin exceso de solemnidad.'
- source_word: כְּתָבָא
  english_pob_choice: the writing
  chosen_spanish: la escritura
  alternatives_spanish:
  - la inscripción
  - el escrito
  lexicon: HALOT
  rationale: En Daniel 5 la referencia es al texto misterioso sobre la pared. «Escritura» mantiene el campo semántico y funciona bien en español bíblico contemporáneo.
- source_word: אֶקְרֵא לְמַלְכָּא
  english_pob_choice: I will read the writing for the king
  chosen_spanish: leeré la escritura para el rey
  alternatives_spanish:
  - leeré la escritura al rey
  - leeré el escrito para el rey
  lexicon: HALOT
  rationale: Mantiene el objeto explícito y el destinatario. «Para el rey» refleja el lamed y conserva el uso cortesano del original.
- source_word: פִשְׁרָא
  english_pob_choice: the interpretation
  chosen_spanish: la interpretación
  alternatives_spanish:
  - su interpretación
  - el sentido
  lexicon: HALOT
  rationale: Es el término técnico de Daniel para descifrar un mensaje enigmático. «La interpretación» preserva el valor técnico sin interpretarlo libremente.
- source_word: אֲהוֹדְעִנֵּהּ
  english_pob_choice: make the interpretation known to him
  chosen_spanish: le daré a conocer
  alternatives_spanish:
  - haré saber
  - se la daré a conocer
  lexicon: HALOT
  rationale: El causativo de «saber» expresa que Daniel hará conocida la interpretación al rey. En español, el objeto ya queda claro por el contexto inmediato y el pronombre dativo mantiene la referencia al rey.
translation_notes:
  revision_awareness: La formulación sigue de cerca el texto arameo y el ajuste final del POB inglés, especialmente la decisión de mantener el contraste concesivo de בְּרַם y la explicitud de «la interpretación» en lugar de un posesivo menos directo. No se introdujeron notas porque el verso no presenta una variante textual relevante ni una tensión lexical que requiera alternativa publicada en este registro.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija; aquí no aparece.
  - «Interpretación» se mantiene como término técnico estable en Daniel.
  - Se evitó «SEÑOR» y otras sustituciones no presentes en el original.
  - Se prefirió un registro bíblico moderno y claro, sin arcaísmos innecesarios.
