    text: 'O: «en la unión» o «en el primer conjunto unido»; el término hebreo se refiere al conjunto o acoplamiento de las cortinas.'
    reason: lexical_alternative
  revision_rationale: La revisión mantiene el sentido del hebreo y del English POB, pero mejora precisión y naturalidad en español. 'Primer conjunto' refleja mejor מַחְבָּרֶת que 'primera sección', y 'del segundo conjunto' aclara la relación de la segunda cortina sin sobreinterpretar el participio hebreo. La nota se conserva y se pule estilísticamente.
