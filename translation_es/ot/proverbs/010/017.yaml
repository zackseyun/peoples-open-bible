translation:
  language: es
  text: Quien guarda la disciplina está en el camino[a] a la vida, pero el que abandona la reprensión extravía a otros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «es un camino a la vida». El hebreo puede leerse de forma más breve, donde «camino a la vida» funciona como expresión predicativa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹרַח
  english_pob_choice: path
  chosen_spanish: camino
  alternatives_spanish:
  - senda
  - ruta
  lexicon: HALOT
  rationale: אֹרַח designa un camino o curso de vida; en Proverbios funciona de modo metafórico. «Camino» es natural en español y conserva bien la imagen moral.
- source_word: לְחַיִּים
  english_pob_choice: to life
  chosen_spanish: de la vida
  alternatives_spanish:
  - hacia la vida
  - para la vida
  lexicon: HALOT
  rationale: La preposición לְ puede expresar dirección o relación. En español, «camino de la vida» suena natural y permite reflejar la lectura breve del hebreo sin forzar la sintaxis.
- source_word: שׁוֹמֵר
  english_pob_choice: keeps
  chosen_spanish: guarda
  alternatives_spanish:
  - observa
  - cumple
  - mantiene
  lexicon: HALOT
  rationale: El participio expresa una acción continua de guardar, observar o atender. «Guarda» preserva la idea de mantener fielmente la disciplina y funciona bien con «disciplina».
- source_word: מוּסָר
  english_pob_choice: discipline
  chosen_spanish: disciplina
  alternatives_spanish:
  - instrucción
  - corrección
  - formación
  lexicon: HALOT
  rationale: En Proverbios, מוּסָר suele abarcar disciplina formativa con corrección. «Disciplina» transmite ese campo semántico de manera concisa y reconocible.
- source_word: וְעוֹזֵב
  english_pob_choice: but whoever forsakes
  chosen_spanish: pero el que abandona
  alternatives_spanish:
  - y el que deja
  - pero quien deja
  lexicon: HALOT
  rationale: La conjunción contrasta las dos mitades del proverbio. «Abandona» conserva la seriedad moral de עזב mejor que un simple «deja».
- source_word: תּוֹכַחַת
  english_pob_choice: reproof
  chosen_spanish: reprensión
  alternatives_spanish:
  - corrección
  - reproche
  - reprendido
  lexicon: HALOT
  rationale: תּוֹכַחַת es corrección verbal o reprensión. «Reprensión» es una opción sobria y fiel para el español bíblico contemporáneo.
- source_word: מַתְעֶה
  english_pob_choice: leads others astray
  chosen_spanish: extravía a otros
  alternatives_spanish:
  - hace errar a otros
  - los hace andar errados
  - desvía a otros
  lexicon: HALOT
  rationale: 'El hifil es causativo: no solo errar, sino hacer errar o desviar. «Extravía a otros» conserva el sentido causativo y la gravedad del acto sin añadir un objeto explícito no presente en el hebreo.'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente sin cambios sustanciales; el texto mantiene el sentido ya auditado y solo ajusta el español para naturalidad y precisión semántica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» no aplicable en este versículo.
  - Se usa «disciplina» para מוּסָר, coherente con el estándar POB en Proverbios.
  - Se usa un verbo causativo en la segunda cola para reflejar el hifil de מַתְעֶה.
  - Se evitó una paráfrasis expansiva; la nota conserva la alternativa sintáctica del hebreo.
