translation:
  language: es
  text: y un macho cabrío para sacrificio por el pecado, además del holocausto regular[a], con su ofrenda de cereal y sus libaciones[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «holocausto continuo».'
    reason: lexical_alternative
  - marker: b
    text: «Libaciones» también puede traducirse «ofrendas de bebida».
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂעִיר
  english_pob_choice: goat
  chosen_spanish: macho cabrío
  alternatives_spanish:
  - cabrito
  - chivo
  lexicon: HALOT
  rationale: El hebreo puede designar un macho de las cabras, y en contexto sacrificial el matiz masculino es relevante. En español, 'macho cabrío' conserva esa fuerza léxica sin perder claridad cultual.
- source_word: חַטָּאת
  english_pob_choice: sin offering
  chosen_spanish: sacrificio por el pecado
  alternatives_spanish:
  - ofrenda por el pecado
  - sacrificio por el pecado
  lexicon: HALOT
  rationale: Aquí el sustantivo es cultual y denota la ofrenda prescrita para el pecado, no el pecado abstracto. 'Sacrificio por el pecado' expresa bien la función ritual y evita una frase demasiado técnica o ambigua.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: un
  alternatives_spanish:
  - uno
  lexicon: HALOT
  rationale: Es el artículo numeral natural en español antes de un sustantivo masculino singular.
- source_word: מִלְּבַד
  english_pob_choice: besides
  chosen_spanish: además de
  alternatives_spanish:
  - aparte de
  - junto con
  lexicon: HALOT
  rationale: La expresión marca adición a una ofrenda ya establecida. 'Además de' comunica con claridad esa relación sin forzar el español.
- source_word: עֹלַת הַתָּמִיד
  english_pob_choice: the regular burnt offering
  chosen_spanish: el holocausto regular
  alternatives_spanish:
  - el holocausto continuo
  - el holocausto diario
  lexicon: HALOT
  rationale: '''עֹלָה'' en este contexto sacrificial se traduce mejor por ''holocausto'' dentro de la terminología bíblica en español. ''הַתָּמִיד'' señala su carácter permanente/recurrente; ''regular'' reproduce la opción inglesa de forma comprensible y sin perder el sentido de prescripción continua.'
- source_word: מִנְחָתָהּ
  english_pob_choice: its grain offering
  chosen_spanish: su ofrenda de cereal
  alternatives_spanish:
  - su ofrenda vegetal
  - su oblación
  lexicon: HALOT
  rationale: '''מִנְחָה'' en listas sacrificiales alude a la ofrenda de cereal o grano; ''cereal'' es más natural en español bíblico contemporáneo que ''vegetal'', y evita la ambigüedad de ''oblación''.'
- source_word: וּנְסָכֶיהָ
  english_pob_choice: and its drink offerings
  chosen_spanish: y sus libaciones
  alternatives_spanish:
  - y sus ofrendas de bebida
  - y sus derramamientos
  lexicon: HALOT
  rationale: '''נֶסֶךְ'' designa una ofrenda líquida derramada. ''Libaciones'' es el equivalente más preciso y culto en español; preserva el sentido técnico del rito.'
translation_notes:
  revision_awareness: El texto coincide con el testimonio hebreo masorético presentado y con la traducción inglesa auditada; no se registran revisiones aplicadas en el flujo de trabajo más reciente.
  spanish_consistency_notes:
  - 'Se mantuvo la enumeración cultual en el mismo orden que el hebreo: animal, función sacrificial, cantidad, relación de adición, holocausto base, ofrenda vegetal y libaciones.'
  - Se eligió 'libaciones' para conservar el valor técnico del plural hebreo וּנְסָכֶיהָ, que puede perder precisión si se expande demasiado.
  - Se evitó 'SEÑOR' u otra sustitución teológica porque este versículo no contiene el nombre divino.
