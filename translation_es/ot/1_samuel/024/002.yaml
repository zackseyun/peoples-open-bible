review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura temporal y narrativa del hebreo: «Cuando» para וַיְהִי כַּאֲשֶׁר, «volvió» para שָׁב, y «de perseguir a los filisteos» comunica correctamente מֵאַחֲרֵי פְּלִשְׁתִּים. También preserva el discurso directo. Sin embargo, hay tres desajustes importantes con la evidencia fuente y el rastro POB: (1) וַיַּגִּדוּ לוֹ se acerca mejor a «le dijeron» o «le informaron» que a «le avisaron»; (2) בְּמִדְבַּר es mejor «desierto» o «región desierta», pero dado el POB auditado y el valor habitual del término, «desierto» aquí es aceptable aunque «desierto de» puede sonar más físico que territorial; (3) el topónimo עֵין גֶּדִי no debe alterarse a «En-gadi» sin base en la evidencia presentada; debe mantenerse como «En-gadi» solo si hubiera política española documentada, la cual aquí no existe. Además, הִנֵּה en registro bíblico digno se representa mejor con «He aquí» que con «Mira».'
  spanish_quality_summary: El español es claro y legible, pero «Mira» rebaja demasiado el registro para esta narrativa bíblica, y «le avisaron» introduce un matiz de advertencia/notificación que no es el más neutral. «En-gadi» resulta inconsistente con la forma auditada y con la transliteración esperable del topónimo. Una redacción más fiel y más digna sería natural en español eclesial amplio.
  glossary_alignment: 'No hay términos teológicos mayores en juego. El principal problema terminológico es el topónimo: la evidencia auditada usa «En-gedi», y no hay justificación suficiente para cambiarlo a «En-gadi». En cuanto a הִנֵּה, el cambio inglés final a «Behold» favorece en español una opción de registro alto como «He aquí», no «Mira».'
  issues:
  - severity: medium
    issue: «le avisaron» para וַיַּגִּדוּ לוֹ
    rationale: נגד en hifil aquí significa «decir/informar/reportar». «Avisar» puede sugerir advertencia o aviso práctico, más estrecho que el hebreo y que el inglés auditado «they told him / they reported to him».
  - severity: medium
    issue: «Mira» para הִנֵּה
    rationale: Aunque deícticamente posible, su registro es demasiado coloquial frente al ajuste auditado del inglés a «Behold». En español bíblico digno, «He aquí» preserva mejor la fuerza y el tono.
  - severity: high
    issue: «En-gadi» para עֵין גֶּדִי
    rationale: La evidencia y el audit trail sostienen «En-gedi». No se documenta una política de adaptación al español que justifique cambiar la vocalización del topónimo, y hacerlo reduce la trazabilidad con la fuente y el POB inglés.
  revised_spanish_text: 'Cuando Saúl volvió de perseguir a los filisteos, le dijeron, diciendo: «He aquí, David está en el desierto de En-gedi».

    '
