translation:
  language: es
  text: Y si una persona del pueblo de la tierra[a] peca inadvertidamente al hacer uno de los mandamientos de Yahvé que no deben hacerse, y se hace culpable[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'del pueblo de la tierra'. Aquí la expresión se refiere a un miembro ordinario de la comunidad, en contraste con un sacerdote o un líder en las leyes circundantes.
    reason: lexical_alternative
  - marker: b
    text: O 'e incurre en culpa' o 'y es culpable'. El verbo hebreo puede expresar entrar en un estado de culpa o cargar con culpa.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶפֶשׁ אַחַת
  english_pob_choice: one person
  chosen_spanish: una persona
  alternatives_spanish:
  - un alma
  - alguien
  lexicon: HALOT
  rationale: נֶפֶשׁ puede designar aquí a un individuo en sentido jurídico. 'Una persona' conserva el sujeto singular sin sonar forzado en español.
- source_word: בִּשְׁגָגָה
  english_pob_choice: unintentionally
  chosen_spanish: inadvertidamente
  alternatives_spanish:
  - por error
  - sin intención
  lexicon: HALOT
  rationale: En legislación sacrificial, el término expresa una falta cometida sin intención. 'Inadvertidamente' mantiene ese matiz legal con español natural.
- source_word: מֵעַם הָאָרֶץ
  english_pob_choice: from the people of the land
  chosen_spanish: del pueblo de la tierra
  alternatives_spanish:
  - de la gente del país
  - de los comunes
  lexicon: HALOT
  rationale: Se conserva la estructura más cercana al hebreo, ya que el contexto legal distingue a un miembro ordinario de la comunidad de sacerdote o jefe. En nota se puede precisar el matiz social.
- source_word: בַּעֲשֹׂתָהּ
  english_pob_choice: by doing
  chosen_spanish: al hacer
  alternatives_spanish:
  - por hacer
  - cuando hace
  lexicon: HALOT
  rationale: El infinitivo con ב funciona circunstancialmente; 'al hacer' transmite la relación temporal/circunstancial de forma clara y fluida.
- source_word: אַחַת מִמִּצְוֺת יְהוָה
  english_pob_choice: one of Yahweh’s commandments
  chosen_spanish: uno de los mandamientos de Yahvé
  alternatives_spanish:
  - uno de los mandatos de Yahvé
  - uno de los preceptos de Yahvé
  lexicon: HALOT
  rationale: '''Mandamientos'' es la manera más transparente de rendir מִצְוֺת en este contexto. Se conserva ''Yahvé'' según la convención del proyecto.'
- source_word: אֲשֶׁר לֹא תֵעָשֶׂינָה
  english_pob_choice: that must not be done
  chosen_spanish: que no deben hacerse
  alternatives_spanish:
  - que no han de hacerse
  - que no deben ser hechas
  lexicon: HALOT
  rationale: La cláusula relativa expresa prohibición normativa. 'No deben hacerse' comunica bien la pasiva impersonal del hebreo en español moderno.
- source_word: וְאָשֵׁם
  english_pob_choice: and becomes guilty
  chosen_spanish: y queda culpable
  alternatives_spanish:
  - y se hace culpable
  - y incurre en culpa
  lexicon: HALOT
  rationale: El verbo puede señalar el estado resultante de culpa. 'Queda culpable' preserva el efecto legal del acto sin añadir un matiz teológico posterior.
theological_decisions:
- issue: Categorización de מֵעַם הָאָרֶץ
  english_pob_reading: from the people of the land
  chosen_spanish_reading: del pueblo de la tierra
  alternative_spanish_readings:
  - de la gente del país
  - de los comunes
  rationale: Se mantiene una traducción más literal porque el hebreo usa una categoría social/legal en contraste con las figuras tratadas en el contexto inmediato. La aclaración interpretativa puede ir en nota, pero no se sustituye por una paráfrasis que borre el término.
  doctrine_reference: Translation philosophy §1, §6
- issue: Valor de וְאָשֵׁם
  english_pob_reading: and becomes guilty
  chosen_spanish_reading: y queda culpable
  alternative_spanish_readings:
  - y es culpable
  - y incurre en culpa
  rationale: La secuencia describe el resultado jurídico del acto prohibido. 'Queda culpable' conserva la transición de la acción al estado de culpabilidad sin introducir categorías ajenas al pasaje.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión reciente entre ‘from the common people’ y ‘from the people of the land’, con decisión final por una forma más cercana al hebreo. En español se siguió esa misma dirección: se prefirió una traducción más literal de מֵעַם הָאָרֶץ, pero se añadió nota para conservar el contraste social/legal que el contexto exige. También se mantuvo el valor legal de וְאָשֵׁם como estado resultante de culpa.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ según la convención del proyecto para יְהוָה.
  - ‘persona’ se eligió para נֶפֶשׁ en sentido jurídico individual.
  - Se mantuvo un registro sobrio y legislativo, sin suavizar la fuerza de culpa ni la prohibición.
  - La puntuación refleja una sola cláusula condicional con sus consecuencias, como en el hebreo.
