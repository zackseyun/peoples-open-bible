translation:
  language: es
  text: Y el rey nombró a Cendebeo comandante de la región costera, y le dio tropas de infantería y de caballería.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κατέστησεν
  english_pob_choice: appointed
  chosen_spanish: nombró
  alternatives_spanish:
  - designó
  - appointó
  lexicon: BDAG
  rationale: En contexto administrativo-militar, el verbo expresa la asignación oficial de un cargo. «Nombró» comunica esa acción de manera natural en español sin añadir matices innecesarios de instalación o investidura.
- source_word: Κενδεβαῖον
  english_pob_choice: Cendebaeus
  chosen_spanish: Cendebeo
  alternatives_spanish:
  - Kendebaio
  lexicon: convención onomástica
  rationale: Se sigue la transliteración convencional al español de un nombre griego propio, adaptándolo a una forma publicable y reconocible en español.
- source_word: ἐπιστράτηγον
  english_pob_choice: commander
  chosen_spanish: comandante
  alternatives_spanish:
  - general
  - gobernador militar
  lexicon: LSJ
  rationale: El término señala una autoridad militar sobre una región. «Comandante» conserva el sentido militar y la relación con una jurisdicción territorial sin sobredeterminar el cargo.
- source_word: τῆς παραλίας
  english_pob_choice: of the coastal region
  chosen_spanish: de la región costera
  alternatives_spanish:
  - de la costa
  - del litoral
  lexicon: LSJ
  rationale: La expresión griega denota una zona costera como ámbito de mando. «Región costera» transmite con claridad el territorio asignado y evita la ambigüedad de un simple «de la costa».
- source_word: δυνάμεις
  english_pob_choice: forces
  chosen_spanish: tropas
  alternatives_spanish:
  - fuerzas militares
  - contingentes
  lexicon: BDAG
  rationale: Aunque el griego es amplio, aquí se concreta en unidades militares. «Tropas» es natural en español y mantiene el sentido bélico sin perder la generalidad del término.
- source_word: πεζικὰς
  english_pob_choice: infantry
  chosen_spanish: de infantería
  alternatives_spanish:
  - de a pie
  - infantería
  lexicon: LSJ
  rationale: El adjetivo contrasta con la caballería; en español, la formulación «tropas de infantería» expresa bien la clase de fuerzas sin sonar mecánica.
- source_word: ἱππικὰς
  english_pob_choice: cavalry
  chosen_spanish: de caballería
  alternatives_spanish:
  - montadas
  - de jinetes
  lexicon: LSJ
  rationale: Se mantiene el contraste militar estándar con «infantería». «Caballería» es la equivalencia precisa y natural en español.
- source_word: ἔδωκεν αὐτῷ
  english_pob_choice: gave him
  chosen_spanish: le dio
  alternatives_spanish:
  - le asignó
  - le proporcionó
  lexicon: BDAG
  rationale: El verbo simple de dar está plenamente justificado por el griego. En español, «le dio» conserva la sobriedad del original y permite que el objeto militar explique qué fue entregado.
translation_notes:
  revision_awareness: La versión inglesa auditada no presenta notas ni revisiones; el griego y la traducción inglesa concuerdan plenamente, por lo que no se introducen variantes textuales ni aclaraciones doctrinales.
  spanish_consistency_notes:
  - Se mantiene un registro narrativo sobrio y administrativo acorde con el contexto histórico del libro.
  - Se prefirió «región costera» sobre una traducción más literal pero menos clara del genitivo territorial.
  - No se usó puntuación o léxico eclesiástico que pudiera desviar el sentido militar del pasaje.
