review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del griego y del POB inglés: consumo total, presentación de la comida ante Bel, mandato de Daniel a sus asistentes jóvenes, esparcir ceniza por todo el templo, y sellar la puerta con el anillo real. Sin embargo, hay varios puntos de forma y matiz que conviene ajustar para una fidelidad y naturalidad mejores en español.'
  spanish_quality_summary: 'El texto es legible, pero contiene giros algo calcados o poco naturales: «se habían ido» en una secuencia narrativa simple, «jóvenes servidores», «ceniza» singular con referencia distributiva, y sobre todo «anillo de sello del rey», que suena torpe. También «en presencia del rey solamente» puede mejorarse en fluidez sin perder el matiz, manteniendo la nota alternativa.'
  glossary_alignment: No hay conflictos teológicos o terminológicos mayores del proyecto en este versículo. «Bel» y «templo» están bien. Se recomienda «jóvenes sirvientes» o «jóvenes asistentes» en lugar de «jóvenes servidores» por mejor español e igual fuerza contextual, y «anillo de sello del rey» debe cambiarse por «anillo de sellar del rey» o mejor «anillo del rey» si se explicita en nota; aquí la mejor solución es «anillo de sellar del rey».
  issues:
  - severity: medium
    issue: «cuando aquellos hombres se habían ido» suena innecesariamente pluscuamperfecto y pesado
    rationale: 'El griego ὡς ἐξῆλθον ἐκεῖνοι se representa mejor con una forma simple narrativa: «cuando aquellos hombres salieron» o «cuando se fueron».'
  - severity: low
    issue: «jóvenes servidores» es entendible pero poco idiomático
    rationale: Para παιδαρίοις, el español eclesial/general suena más natural con «jóvenes sirvientes» o «jóvenes asistentes», manteniendo edad y función.
  - severity: medium
    issue: «trajeron ceniza y la esparcieron» puede sonar menos natural que el plural
    rationale: Aunque «ceniza» como colectivo es posible, en este contexto de material esparcido para dejar huellas «cenizas» suena más idiomático en español bíblico moderno.
  - severity: medium
    issue: «en presencia del rey solamente» es comprensible pero algo rígido
    rationale: «Solo en presencia del rey[a]» conserva mejor la fluidez en español y permite mantener la nota sobre el matiz de exclusividad.
  - severity: high
    issue: «anillo de sello del rey» es una expresión poco natural en español
    rationale: Aunque intenta reflejar signet ring, en español estándar resulta forzada. «Anillo de sellar del rey» comunica la función del anillo con claridad y dignidad.
