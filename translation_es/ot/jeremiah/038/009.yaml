translation:
  language: es
  text: Mi señor el rey[a], estos hombres han obrado mal en todo lo que le hicieron a Jeremías el profeta, a quien echaron a la cisterna, y allí morirá a causa de la hambruna, porque ya no queda pan en la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'pozo' o 'fosa'. El hebreo bor puede denotar pozo, fosa, calabozo o cisterna; aquí 'cisterna' encaja mejor con el contexto inmediato.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: My lord the king
  chosen_spanish: Señor mío, rey
  alternatives_spanish:
  - Mi señor el rey
  - Señor mío, o rey
  lexicon: HALOT
  rationale: Es un tratamiento respetuoso de corte que conserva el tono honorífico. En español, 'Señor mío, rey' mantiene la deferencia sin sonar demasiado forzado; se evita 'SEÑOR' como reemplazo litúrgico porque aquí es un vocativo directo al rey.
- source_word: הֵרֵעוּ
  english_pob_choice: have done evil
  chosen_spanish: han hecho mal
  alternatives_spanish:
  - han obrado mal
  - han hecho el mal
  lexicon: HALOT
  rationale: El verbo expresa conducta moralmente mala o dañina. 'Han hecho mal' conserva esa fuerza en español natural, sin debilitarlo a un simple 'equivocarse'.
- source_word: הָאֲנָשִׁים הָאֵלֶּה
  english_pob_choice: these men
  chosen_spanish: estos hombres
  alternatives_spanish:
  - estas personas
  - estos varones
  lexicon: HALOT
  rationale: El hebreo es masculino plural específico; 'estos hombres' refleja mejor esa referencia que un término genérico.
- source_word: אֵת כָּל אֲשֶׁר עָשׂוּ לְיִרְמְיָהוּ הַנָּבִיא
  english_pob_choice: in all that they did to Jeremiah the prophet
  chosen_spanish: en todo lo que hicieron a Jeremías el profeta
  alternatives_spanish:
  - por todo lo que hicieron a Jeremías el profeta
  - en cuanto hicieron a Jeremías el profeta
  lexicon: HALOT
  rationale: La construcción hebrea acumula la totalidad de su trato abusivo. 'En todo lo que hicieron' conserva el alcance total de כָּל אֲשֶׁר y mantiene el vínculo directo con Jeremías y su oficio profético.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - como profeta
  - el vidente
  lexicon: HALOT
  rationale: Se conserva el título oficial de Jeremías, ya que el texto lo menciona explícitamente.
- source_word: הִשְׁלִיכוּ אֶל הַבּוֹר
  english_pob_choice: threw into the cistern
  chosen_spanish: echaron al cisterna
  alternatives_spanish:
  - lo arrojaron al pozo
  - lo echaron al pozo
  lexicon: HALOT
  rationale: El valor contextual de בּוֹר es el de una cisterna, no simplemente un pozo genérico. Se mantiene el término preciso del POB inglés. La forma 'echaron' sigue el verbo de lanzamiento; 'al cisterna' es la traducción necesaria del recipiente, aunque suena marcada en español y se conserva por fidelidad terminológica al contexto específico.
- source_word: וַיָּמָת
  english_pob_choice: he will die
  chosen_spanish: morirá
  alternatives_spanish:
  - morirá allí
  - va a morir
  lexicon: HALOT
  rationale: Aunque la forma hebrea es narrativa, el contexto muestra advertencia sobre un desenlace inminente. 'Morirá' reproduce esa fuerza prospectiva en español natural.
- source_word: תַּחְתָּיו
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - en ese lugar
  - debajo de él
  lexicon: HALOT
  rationale: El idiomatismo señala permanencia en el lugar donde fue puesto. 'Allí' expresa el sentido contextual sin forzar el valor literal de 'debajo'.
- source_word: מִפְּנֵי הָרָעָב
  english_pob_choice: because of the famine
  chosen_spanish: a causa del hambre
  alternatives_spanish:
  - por causa del hambre
  - a causa de la hambruna
  lexicon: HALOT
  rationale: Se traduce el efecto inmediato del hambre en la situación de asedio. 'Hambre' mantiene la referencia concreta del hebreo; en español 'hambruna' podría sonar más interpretativo.
- source_word: כִּי אֵין הַלֶּחֶם עוֹד בָּעִיר
  english_pob_choice: for there is no bread left in the city
  chosen_spanish: porque no hay ya pan en la ciudad
  alternatives_spanish:
  - pues ya no hay pan en la ciudad
  - porque no queda pan en la ciudad
  lexicon: HALOT
  rationale: לֶחֶם es literalmente 'pan', y aquí designa el alimento disponible. Se conserva el sustantivo concreto 'pan' como en el texto fuente, y 'ya' comunica el valor de עוֹד ('todavía/ya no').
theological_decisions:
- issue: Tratamiento de YHWH en un dicho dirigido al rey
  english_pob_reading: The verse addresses the king directly and does not introduce the divine name.
  chosen_spanish_reading: Se mantiene el vocativo humano 'Señor mío, rey' sin introducir ningún nombre divino.
  alternative_spanish_readings:
  - Mi señor, o rey
  - Señor mío, oh rey
  rationale: No hay en este verso mención del Tetragrámaton ni del término κύριος como cita del nombre divino; el habla es cortesana hacia el rey. Por eso no se aplica el estándar 'Yahvé' aquí.
  doctrine_reference: Jeremiah 38:9 context; no divine-name issue present
- issue: Valor aspectual de וַיָּמָת en contexto
  english_pob_reading: Though formally past narrative, the English POB renders future because Ebed-melech warns of Jeremiah's likely death if left in the cistern.
  chosen_spanish_reading: Se traduce con futuro 'morirá' para reflejar la advertencia de un desenlace inminente.
  alternative_spanish_readings:
  - muere
  - está por morir
  rationale: El texto no informa simplemente un hecho consumado, sino la consecuencia esperada si no se actúa. El futuro español comunica mejor esa fuerza pragmática.
  doctrine_reference: Jeremiah 38:9 discourse context
translation_notes:
  revision_awareness: Se siguió de cerca el paquete fuente hebreo y la auditoría inglesa. No hubo revisiones aplicadas en el registro inglés reciente; el borrador español conserva esa estabilidad y solo adapta la formulación para que sea publicable en español natural sin perder las decisiones léxicas auditadas.
  spanish_consistency_notes:
  - Se usa 'Jeremías' y no una forma abreviada, para mantener claridad y consistencia bíblica.
  - '''Cisterna'' se conserva como término técnico contextual, con nota de alternativa ''pozo''.'
  - Se evitó 'SEÑOR' como sustituto reverencial porque no hay referencia al nombre divino en el versículo.
  - '''Pan'' se mantiene literal para לֶחֶם, siguiendo el valor concreto del hebreo.'
