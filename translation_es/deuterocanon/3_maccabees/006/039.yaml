translation:
  language: es
  text: En estas cosas también[a], después de manifestar gloriosamente su misericordia, el Soberano de todo[b] los rescató sin tropezar[c], todos juntos[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habiendo manifestado su misericordia». El participio griego ἐπιφάνας puede destacar la manifestación más que la simple aparición.
    reason: lexical_alternative
  - marker: b
    text: O «el soberano de todas las cosas». El título griego ὁ τῶν πάντων δυνάστης expresa soberanía sobre todo lo existente.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «sin tropezar». La expresión probablemente comunica que fueron librados sin daño.
    reason: lexical_alternative
  - marker: d
    text: O «con un mismo sentir» o «como uno solo». ὁμοθυμαδόν puede denotar unidad compartida además de acción colectiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν αἷς
  english_pob_choice: In these things
  chosen_spanish: En estas cosas
  alternatives_spanish:
  - En las cuales
  - Entre ellas
  lexicon: LSJ
  rationale: La frase relativa remite a las circunstancias anteriores. «En estas cosas» mantiene la referencia sin volverla demasiado pesada ni introducir un antecedente más específico de lo que el griego exige.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - y
  - incluso
  lexicon: LSJ
  rationale: Aquí καὶ añade continuidad y énfasis. «También» reproduce esa relación de manera natural en español.
- source_word: μεγαλοδόξως
  english_pob_choice: gloriously
  chosen_spanish: gloriosamente
  alternatives_spanish:
  - magníficamente
  - con gran gloria
  lexicon: LSJ
  rationale: El adverbio intensifica la manifestación de la misericordia. «Gloriosamente» conserva el tono elevado del texto y sigue de cerca el valor adverbial.
- source_word: ἐπιφάνας
  english_pob_choice: after ... revealing
  chosen_spanish: después de manifestar
  alternatives_spanish:
  - después de revelar
  - habiendo manifestado
  lexicon: LSJ
  rationale: El participio aoristo expresa una manifestación de algo ya presente como objeto directo («su misericordia»). «Manifestar» comunica esa idea mejor que «aparecer» y evita forzar una lectura más literal pero menos clara en español.
- source_word: τὸ ἔλεος αὐτοῦ
  english_pob_choice: his mercy
  chosen_spanish: su misericordia
  alternatives_spanish:
  - su piedad
  - su compasión
  lexicon: LSJ
  rationale: ἔλεος en este contexto de liberación divina se traduce de forma natural y bíblica como «misericordia». Mantiene el sentido de favor compasivo sin suavizarlo.
- source_word: ὁ τῶν πάντων δυνάστης
  english_pob_choice: the Sovereign of all
  chosen_spanish: el Soberano de todo
  alternatives_spanish:
  - el soberano de todas las cosas
  - el gobernante de todo
  lexicon: LSJ
  rationale: δυνάστης es un título de gobierno y autoridad, no el término habitual παντοκράτωρ. «Soberano de todo» preserva el título propio del griego sin sustituirlo por una fórmula tradicional distinta.
- source_word: ἀπταίστους
  english_pob_choice: without stumbling
  chosen_spanish: sin tropiezo
  alternatives_spanish:
  - sin caer
  - sin vacilar
  - sin daño
  lexicon: LSJ
  rationale: El griego significa literalmente «sin tropezar / sin caer». En español, «sin tropiezo» conserva la imagen y sigue siendo inteligible; evita interpretar de antemano como «ilesos».
- source_word: ἐρρύσατο
  english_pob_choice: rescued
  chosen_spanish: los rescató
  alternatives_spanish:
  - los libró
  - los salvó
  lexicon: LSJ
  rationale: El verbo expresa rescate o liberación de peligro. «Rescató» es natural en español y conserva la fuerza de intervención salvadora.
- source_word: ὁμοθυμαδόν
  english_pob_choice: all together
  chosen_spanish: todos a una
  alternatives_spanish:
  - con una sola mente
  - con un mismo sentir
  lexicon: LSJ
  rationale: La palabra puede denotar unidad de acción o de ánimo. En este contexto con el verbo de rescate, «todos a una» expresa bien la acción colectiva y conserva la posibilidad de lectura unificada sin imponer una sola interpretación.
theological_decisions:
- issue: Título divino ὁ τῶν πάντων δυνάστης
  english_pob_reading: the Sovereign of all
  chosen_spanish_reading: el Soberano de todo
  alternative_spanish_readings:
  - el soberano de todas las cosas
  - el gobernante de todo
  rationale: El griego emplea un título de soberanía y gobierno; no usa un equivalente directo de «Todopoderoso» ni una sustitución devocional. La traducción mantiene la autoridad divina con un título sobrio y fuente-dependiente.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: El pasaje fue revisado previamente y el estado de la última pasada indica que no se requerían cambios sustanciales. Esta propuesta conserva ese acuerdo alto con el original griego y solo afina la formulación española para mayor naturalidad y audibilidad lexical.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino sino un título griego de soberanía.
  - Se conserva «misericordia» para ἔλεος, en línea con el uso bíblico establecido.
  - «Soberano» se usa aquí como título de gobierno, no como sustituto doctrinal de otros nombres divinos.
  - «Sin tropiezo» preserva la imagen literal de ἀπταίστους sin convertirla de inmediato en una paráfrasis de seguridad o integridad física.
