translation:
  language: es
  text: Respóndeme[a], Yahvé, respóndeme, para que este pueblo conozca que tú, Yahvé, eres Dios[b], y que tú has hecho volver su corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «contéstame». La petición hebrea puede expresar una respuesta mediante intervención, no solo una contestación verbal.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «el Dios»; el hebreo usa una forma con artículo que puede funcionar aquí de modo definitivo o genérico en esta confesión.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲנֵנִי
  english_pob_choice: Answer me
  chosen_spanish: Respóndeme
  alternatives_spanish:
  - Contéstame
  - Respóndeme
  lexicon: HALOT
  rationale: En esta súplica, ענה pide una respuesta divina manifestada por acción; 'Respóndeme' conserva el valor oracional y la repetición enfática del hebreo, con un español natural y digno.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino personal del Tetragrámaton según la convención del proyecto, en lugar de sustituirlo por un título.
- source_word: וְיֵדְעוּ
  english_pob_choice: so that ... may know
  chosen_spanish: para que ... conozca
  alternatives_spanish:
  - y conozca
  - a fin de que ... conozca
  lexicon: HALOT
  rationale: La forma verbal expresa propósito o resultado en la petición de Elías; 'para que' da en español el valor final de modo claro e idiomático.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - este pueblo
  - esta gente
  lexicon: HALOT
  rationale: Se conserva el sustantivo colectivo singular del hebreo, más cercano al original que una pluralización o una paráfrasis.
- source_word: כִּי אַתָּה יְהוָה הָאֱלֹהִים
  english_pob_choice: that you, O Yahweh, are God
  chosen_spanish: que tú, Yahvé, eres Dios
  alternatives_spanish:
  - que tú, Yahvé, eres el Dios
  - que tú, Yahvé, eres Dios
  lexicon: HALOT
  rationale: El hebreo identifica a Yahvé como Dios verdadero en contraste con Baal; 'eres Dios' es breve, natural y fiel al sentido confesional sin forzar una construcción menos idiomática.
- source_word: הֲסִבֹּתָ
  english_pob_choice: have turned back
  chosen_spanish: has vuelto
  alternatives_spanish:
  - has vuelto
  - has hecho volver
  - has traído de vuelta
  lexicon: HALOT
  rationale: El hifil de סבב tiene fuerza causativa; 'has vuelto' comunica esa acción de retorno producida por Dios sin recargar el castellano con una construcción excesivamente técnica.
- source_word: אֶת לִבָּם
  english_pob_choice: their heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su corazón
  - sus corazones
  lexicon: HALOT
  rationale: El hebreo usa un singular colectivo con sufijo plural; en español 'su corazón' conserva mejor la unidad corporativa del pueblo que una pluralización innecesaria.
- source_word: אֲחֹרַנִּית
  english_pob_choice: back
  chosen_spanish: atrás
  alternatives_spanish:
  - atrás
  - de vuelta
  - hacia atrás
  lexicon: HALOT
  rationale: El adverbio indica reversión/retorno; 'atrás' mantiene la dirección figurada sin añadir matices no explícitos en el hebreo.
theological_decisions:
- issue: Agencia divina en el retorno del pueblo
  english_pob_reading: and that you have turned their heart back
  chosen_spanish_reading: y que tú has vuelto su corazón atrás
  alternative_spanish_readings:
  - y que tú has vuelto sus corazones atrás
  - y que tú estás volviendo su corazón atrás
  rationale: Se preserva el perfecto como acción completada atribuida a Dios, sin suavizar la afirmación fuerte de que Yahvé ha obrado en el retorno del pueblo. Se mantiene la tensión teológica del texto en vez de resolverla con una formulación más débil.
  doctrine_reference: Primacía del texto original y preservación de la tensión teológica; no se introduce un sistema doctrinal ajeno al versículo.
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se detectaron cambios necesarios. La redacción mantiene el nombre divino Yahvé, el valor final de וְיֵדְעוּ, el sustantivo colectivo singular y la afirmación causal de que Dios ha vuelto el corazón del pueblo.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה.
  - '''Pueblo'' conserva el singular colectivo del hebreo.'
  - '''Corazón'' permanece en singular para reflejar el colectivo hebreo, aunque el referente sea plural.'
  - La puntuación y la repetición inicial de la súplica siguen el énfasis del hebreo.
