translation:
  language: es
  text: Porque durante muchos días los hijos de Israel vivirán sin rey ni príncipe, sin sacrificio ni pilar[a], y sin efod[b] ni terafines[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «piedra erigida» o «pilar sagrado»; el término hebreo se refiere a un monumento de piedra de uso cultual.
    reason: lexical_alternative
  - marker: b
    text: «Efod» es un término cultual hebreo, que a menudo se refiere a una vestidura sacerdotal o a un objeto ritual asociado.
    reason: cultural_note
  - marker: c
    text: O «ídolos domésticos»; es decir, objetos o ídolos de culto del hogar.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: En este contexto, כִּי introduce la explicación del estado anunciado; «Porque» reproduce bien ese valor explicativo sin sonar demasiado causal o conclusivo.
- source_word: יָמִים רַבִּים
  english_pob_choice: many days
  chosen_spanish: por muchos días
  alternatives_spanish:
  - mucho tiempo
  - durante muchos días
  lexicon: HALOT
  rationale: «Por muchos días» conserva el orden natural del español y mantiene la idea de una duración prolongada e indefinida, alineada con el hebreo.
- source_word: יֵשְׁבוּ
  english_pob_choice: will dwell
  chosen_spanish: vivirán
  alternatives_spanish:
  - permanecerán
  - morarán
  lexicon: HALOT
  rationale: Aquí el verbo expresa una condición continuada más que el acto literal de sentarse. «Vivirán» comunica bien la permanencia de su situación en español, sin perder el sentido de residencia/estado duradero.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Jacob
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión genealógico-corporativa del hebreo. «Los hijos de Israel» es transparente y fiel al texto fuente.
- source_word: אֵין מֶלֶךְ
  english_pob_choice: without king
  chosen_spanish: sin rey
  alternatives_spanish:
  - sin un rey
  - careciendo de rey
  lexicon: HALOT
  rationale: «Sin rey» reproduce de forma concisa la serie privativa del hebreo, manteniendo el paralelismo con las demás cláusulas.
- source_word: שָׂר
  english_pob_choice: prince
  chosen_spanish: príncipe
  alternatives_spanish:
  - jefe
  - gobernante
  - oficial
  lexicon: HALOT
  rationale: En la pareja política «rey / príncipe», «príncipe» es el equivalente más natural y tradicional en español, y preserva la relación jerárquica del original.
- source_word: זֶבַח
  english_pob_choice: sacrifice
  chosen_spanish: sacrificio
  alternatives_spanish:
  - ofrenda
  - sacrificio sacrificial
  lexicon: HALOT
  rationale: «Sacrificio» es el término estándar y claro para זֶבַח, y conserva el campo cultual del hebreo.
- source_word: מַצֵּבָה
  english_pob_choice: pillar
  chosen_spanish: columna
  alternatives_spanish:
  - pilar
  - piedra levantada
  - columna sagrada
  lexicon: HALOT
  rationale: «Columna» comunica en español la idea de un monumento pétreo vertical. Aunque «pilar» también es posible, «columna» resulta más natural y aún deja abierta la referencia cultual; la nota preserva la alternativa más técnica.
- source_word: אֵפוֹד
  english_pob_choice: ephod
  chosen_spanish: efod
  alternatives_spanish:
  - éfod
  - efod sacerdotal
  - vestidura sacerdotal
  lexicon: HALOT
  rationale: Se mantiene el término técnico transliterado. No hay un equivalente único en español que abarque con precisión su uso cultual y sacerdotal en todos los contextos.
- source_word: תְרָפִים
  english_pob_choice: household idols
  chosen_spanish: terafines
  alternatives_spanish:
  - terafim
  - ídolos domésticos
  - objetos de culto doméstico
  lexicon: HALOT
  rationale: Se conserva la transliteración para no aplanar el término a una categoría interpretativa demasiado amplia. En español, «terafines» permite mantener la tensión del hebreo y su carga cultual particular.
theological_decisions:
- issue: La lista cultual mezcla elementos asociados tanto con culto legítimo como con culto ilegítimo
  english_pob_reading: 'Render the terms straightforwardly without resolving the interpretive tension: Israel is depicted as deprived of political leadership and of cultic apparatus, including items associated with both approved and condemned worship.'
  chosen_spanish_reading: 'Traducir los términos sin resolver la tensión interpretativa: Israel aparece privado de liderazgo político y también de aparatos cultuales, incluidos elementos asociados tanto con culto aprobado como con culto condenado.'
  alternative_spanish_readings:
  - Interpretar toda la lista cultual como culto ilegítimo
  - Interpretar toda la lista cultual como culto legítimo
  rationale: El versículo yuxtapone vocablos que en otros lugares pueden referirse a prácticas distintas, algunas aprobadas y otras reprobadas. La traducción española debe conservar esa ambigüedad histórica y teológica en vez de armonizarla.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: 'El inglés POB fue revisado para mover «many days» al inicio de la cláusula: «For many days the sons of Israel will dwell...». El español sigue esa organización más natural con «Por muchos días...», sin añadir elementos no atestiguados y conservando la serie privativa final intacta.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto solo cuando aparezca el nombre divino; en este versículo no ocurre.
  - Se evita «SEÑOR» y también se evita sustituir términos cultuales por glosas explicativas en el cuerpo principal.
  - Se conserva el paralelismo privativo de אֵין con una cadena de «sin...», en correspondencia con el hebreo.
  - «Terafines» se usa como transliteración estable y no como «ídolos domésticos», para no resolver de antemano la categoría del término.
