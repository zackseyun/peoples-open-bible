translation:
  language: es
  text: 'Entonces Absalón mandó a sus hombres,[a] diciendo: “Por favor, fíjense: cuando el corazón de Amnón esté alegre por el vino, y yo les diga: ‘Golpeen a Amnón’, entonces mátenlo. No teman. ¿No les he dado yo mismo la orden? Sean fuertes y sean hombres de valor.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando Amnón esté de buen ánimo por el vino». El hebreo dice literalmente que su corazón está ‘bueno’ con el vino.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נְעָרָיו
  english_pob_choice: his young men
  chosen_spanish: sus jóvenes
  alternatives_spanish:
  - sus siervos
  - sus sirvientes
  - sus asistentes
  lexicon: HALOT
  rationale: נַעַר puede referirse a joven, siervo o asistente según el contexto. Aquí se trata de agentes personales de Absalón que recibirán una orden violenta; ‘sus jóvenes’ conserva la referencia literal sin volverlo más doméstico de lo necesario.
- source_word: רְאוּ נָא
  english_pob_choice: Please watch
  chosen_spanish: Por favor, observen
  alternatives_spanish:
  - Miren, por favor
  - Vean, por favor
  - Presten atención
  lexicon: HALOT
  rationale: El imperativo con נָא pide atención urgente. ‘Observen’ mantiene el valor directivo y suena natural en español moderno; ‘por favor’ reproduce el matiz de cortesía/insistencia de נָא.
- source_word: כְּטוֹב לֵב אַמְנוֹן בַּיַּיִן
  english_pob_choice: when Amnon’s heart is merry with wine
  chosen_spanish: cuando el corazón de Amnón esté alegre por el vino
  alternatives_spanish:
  - cuando Amnón esté de buen ánimo por el vino
  - cuando Amnón esté alegre con el vino
  - cuando Amnón esté animado por el vino
  lexicon: HALOT
  rationale: 'El hebreo usa un modismo: ‘ser bueno el corazón con vino’. En español conviene conservar ‘corazón’ y expresar el estado como alegría producida por el vino, sin afirmar más específicamente que embriaguez plena.'
- source_word: הַכּוּ אֶת אַמְנוֹן
  english_pob_choice: Strike Amnon
  chosen_spanish: Golpeen a Amnón
  alternatives_spanish:
  - Háganle frente a Amnón
  - Ataquen a Amnón
  - Híran a Amnón
  lexicon: HALOT
  rationale: נכה es un verbo amplio para golpear/smitir. ‘Golpeen’ preserva la fuerza básica del imperativo y deja que la siguiente cláusula aclare el desenlace letal.
- source_word: וַהֲמִתֶּם אֹתוֹ
  english_pob_choice: then kill him
  chosen_spanish: entonces mátenlo
  alternatives_spanish:
  - y después mátenlo
  - y pónganlo a muerte
  - y ustedes lo matarán
  lexicon: HALOT
  rationale: La forma causativa de מות indica dar muerte. ‘Mátenlo’ es idiomático y sigue la secuencia del mandato; ‘entonces’ reproduce bien la relación temporal.
- source_word: אַל תִּירָאוּ
  english_pob_choice: Do not fear
  chosen_spanish: No teman
  alternatives_spanish:
  - No tengan miedo
  - No se asusten
  lexicon: HALOT
  rationale: Es una prohibición directa. ‘No teman’ conserva el tono breve, firme y militar del hebreo.
- source_word: הֲלוֹא כִּי אָנֹכִי צִוִּיתִי אֶתְכֶם
  english_pob_choice: Have I not myself commanded you?
  chosen_spanish: ¿No les he dado yo mismo la orden?
  alternatives_spanish:
  - ¿Acaso no fui yo quien les dio la orden?
  - ¿No les he mandado yo mismo?
  - ¿No se los he ordenado yo mismo?
  lexicon: HALOT
  rationale: El hebreo usa una pregunta retórica con énfasis en אָנֹכִי. ‘Yo mismo’ recoge ese énfasis; ‘dar la orden’ es natural en español y mantiene el valor autoritativo de צוה.
- source_word: חִזְקוּ
  english_pob_choice: Be strong
  chosen_spanish: Sean fuertes
  alternatives_spanish:
  - Cobren ánimo
  - Manténganse firmes
  - Sean valientes
  lexicon: HALOT
  rationale: חזק en imperativo llama a fortaleza o resolución. ‘Sean fuertes’ es directo y equilibra bien el tono exhortativo con el contexto de acción violenta.
- source_word: וִהְיוּ לִבְנֵי חָיִל
  english_pob_choice: be men of valor
  chosen_spanish: y sean hombres de valor
  alternatives_spanish:
  - y muéstrense valientes
  - y sean hombres valientes
  - y sean guerreros valientes
  lexicon: HALOT
  rationale: בני חיל es una expresión masculina e idiomática para hombres valerosos/capaces, con matiz marcial. ‘Hombres de valor’ conserva la forma y el peso idiomático sin suavizar el masculino.
theological_decisions:
- issue: Matiz del modismo ‘el corazón ... con el vino’
  english_pob_reading: when Amnon’s heart is merry with wine
  chosen_spanish_reading: cuando el corazón de Amnón esté alegre por el vino
  alternative_spanish_readings:
  - cuando el corazón de Amnón esté de buen ánimo por el vino
  - cuando Amnón esté alegre con el vino
  rationale: No conviene convertir el modismo en una interpretación más fuerte de lo necesario. La redacción conserva la imagen del ‘corazón’ y el efecto del vino, dejando abierta la intensidad exacta del estado anímico/físico.
  doctrine_reference: Principio de fidelidad lexical y preservación de tensiones semánticas del original
- issue: Valor masculino de בני חיל
  english_pob_reading: be men of valor
  chosen_spanish_reading: y sean hombres de valor
  alternative_spanish_readings:
  - y sean valientes
  - y sean hombres valientes
  - y sean varones de valor
  rationale: El hebreo se dirige a varones en un contexto militar/violento y la forma masculina es parte del texto. En español conviene conservar ese rasgo sin neutralizarlo, porque afecta la imagen social y retórica del mandato.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La versión inglesa auditada se mantiene sin cambios sustanciales en la revisión más reciente; el acuerdo general es alto y solo se reportaron observaciones menores. La presente propuesta sigue de cerca esa lectura, trasladando al español el modismo de ‘corazón’ y el cierre idiomático ‘hombres de valor’ con el mismo sentido contextual.
  spanish_consistency_notes:
  - Se usa ‘Amnón’ para el nombre propio, de forma consistente con la transliteración española esperable.
  - Se conserva el masculino plural ‘hombres de valor’ por fidelidad al hebreo y al contexto narrativo.
  - Se evita ‘SEÑOR’ o equivalentes no pertinentes, ya que aquí no aparece el nombre divino.
  - ‘Golpeen’ y ‘mátenlo’ distinguen el golpe inicial del acto letal final, como en la secuencia hebrea.
