translation:
  language: es
  text: ¡Oh[a], que mi cabeza fuera agua, y mis ojos una fuente de lágrimas, para llorar día y noche por los caídos de la hija de mi pueblo!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si tan solo mi cabeza fuera agua, y mi ojo una fuente de lágrimas». El hebreo abre con un modismo de deseo («¿Quién dará...?» / «¡Oh, si...!») y usa una forma singular para «ojo», aunque en español suele expresarse naturalmente en plural.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִי יִתֵּן
  english_pob_choice: Oh, that ... were
  chosen_spanish: ¡Oh, que ... fuera
  alternatives_spanish:
  - ¡Si tan solo ... fuera
  - ¿Quién me diera que ...?
  lexicon: HALOT
  rationale: El hebreo expresa un deseo doliente, no una pregunta literal. En español, '¡Oh, que...' conserva el tono de lamento y la fuerza volitiva del original sin volverlo mecánico ni demasiado moderno.
- source_word: רֹאשִׁי
  english_pob_choice: my head
  chosen_spanish: mi cabeza
  alternatives_spanish:
  - mi cabeza
  - mi cabeza
  lexicon: HALOT
  rationale: La imagen corporal es directa y poética; 'mi cabeza' comunica con naturalidad el mismo referente en español.
- source_word: מַיִם
  english_pob_choice: water
  chosen_spanish: agua
  alternatives_spanish:
  - agua
  lexicon: HALOT
  rationale: '''Agua'' es el equivalente normal y claro en español para el sustantivo hebreo, manteniendo la metáfora sin sobreinterpretarla.'
- source_word: וְעֵינִי
  english_pob_choice: and my eyes
  chosen_spanish: y mis ojos
  alternatives_spanish:
  - y mi ojo
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular con sufijo, el español idiomático exige el plural 'ojos' para esta imagen corporal. Se conserva la tensión señalada por la POB entre literalidad y fluidez.
- source_word: מְקוֹר
  english_pob_choice: a fountain
  chosen_spanish: una fuente
  alternatives_spanish:
  - un manantial
  - una fuente
  lexicon: HALOT
  rationale: '''Fuente'' funciona bien en español poético y reproduce la imagen de origen continuo; ''manantial'' sería posible, pero ''fuente de lágrimas'' suena más natural y solemne.'
- source_word: דִּמְעָה
  english_pob_choice: of tears
  chosen_spanish: de lágrimas
  alternatives_spanish:
  - de lágrimas
  lexicon: HALOT
  rationale: La construcción genitiva se expresa de modo natural como 'fuente de lágrimas', preservando el paralelismo con el inglés auditado.
- source_word: וְאֶבְכֶּה
  english_pob_choice: so that I might weep
  chosen_spanish: para que pudiera llorar
  alternatives_spanish:
  - y lloraría
  - para llorar
  lexicon: HALOT
  rationale: El cohortativo expresa finalidad o resultado deseado dentro del lamento; 'para que pudiera llorar' comunica esa intención sin forzar un subjuntivo arcaizante.
- source_word: יוֹמָם וָלַיְלָה
  english_pob_choice: day and night
  chosen_spanish: día y noche
  alternatives_spanish:
  - día y noche
  - de día y de noche
  lexicon: HALOT
  rationale: Merismo temporal estándar; 'día y noche' es la formulación más natural y fiel al sentido de continuidad.
- source_word: חַלְלֵי
  english_pob_choice: the slain
  chosen_spanish: los muertos
  alternatives_spanish:
  - los muertos
  - los caídos
  - los muertos en combate
  lexicon: HALOT
  rationale: Aunque 'los muertos' es más general que 'los slain', aquí conserva la referencia al resultado letal sin añadir una especificación bélica que el verso no explicita en español. La opción 'caídos' puede sonar menos directa.
- source_word: בַת עַמִּי
  english_pob_choice: the daughter of my people
  chosen_spanish: la hija de mi pueblo
  alternatives_spanish:
  - la hija de mi pueblo
  - mi pueblo
  lexicon: HALOT
  rationale: Se preserva la personificación profética literal. No se reduce a 'mi pueblo' para no borrar el matiz poético que la POB decidió conservar en inglés.
theological_decisions:
- issue: Preservación de la personificación 'daughter of my people'
  english_pob_reading: Preserve the metaphor as 'the daughter of my people'
  chosen_spanish_reading: Conservar la metáfora como 'la hija de mi pueblo'
  alternative_spanish_readings:
  - mi pueblo
  - mi querida gente
  rationale: La frase es una figura profética y afectiva; traducirla literalmente mantiene la textura literaria y evita una paráfrasis que atenúe el duelo de Jeremías. No introduce un contenido doctrinal adicional, pero sí protege la imagen retórica del texto.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado inglés auditado, que mantuvo la lectura de lamento con 'Oh, that...' y conservó la personificación 'daughter of my people'. No se registraron revisiones posteriores que alteren esas decisiones, por lo que la versión española refleja ese mismo equilibrio entre literalidad e idiomaticidad.
  spanish_consistency_notes:
  - Se mantiene 'agua'/'lágrimas' con paralelismo poético claro y registro bíblico digno.
  - Se preserva la metáfora final sin suavizarla a una expresión genérica.
  - La nota al pie recoge la alternativa de singular 'ojo' por coherencia con la observación gramatical del hebreo.
  - No se usa 'SEÑOR' ni terminología de sustitución, porque no aparece el nombre divino en este verso.
