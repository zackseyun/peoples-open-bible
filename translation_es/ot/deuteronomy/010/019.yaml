translation:
  language: es
  text: Así que amen al extranjero[a], porque ustedes fueron extranjeros en la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «forastero» o «peregrino». El hebreo ger se refiere a una persona no nativa que vive entre Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַ/אֲהַבְתֶּם
  english_pob_choice: So love
  chosen_spanish: Así que amen
  alternatives_spanish:
  - Y amen
  - Por tanto, amen
  lexicon: HALOT
  rationale: El hebreo combina la exhortación con la conexión causal con el versículo anterior. «Así que» conserva bien el valor inferencial sin volver el español pesado; «amen» refleja el imperativo plural dirigido al pueblo.
- source_word: הַ/גֵּר
  english_pob_choice: the foreigner
  chosen_spanish: el forastero
  alternatives_spanish:
  - el extranjero
  - el residente foráneo
  - el sojourner
  lexicon: HALOT
  rationale: 'גֵּר designa a una persona no nativa que vive entre Israel y está en posición vulnerable. «Forastero» comunica esa condición de alguien venido de fuera mejor que «extranjero» en este contexto comunitario, y evita el tecnicismo de «residente foráneo». '
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del mandamiento. «Porque» es la forma causal más clara y natural en español contemporáneo.
- source_word: גֵרִים
  english_pob_choice: foreigners
  chosen_spanish: forasteros
  alternatives_spanish:
  - extranjeros
  - residentes foráneos
  - sojourners
  lexicon: HALOT
  rationale: Se mantiene la cohesión léxica con הַגֵּר al traducir el plural con la misma raíz semántica en español. «Forasteros» conserva la idea de personas que han vivido como no nativas en una tierra ajena.
- source_word: הֱיִיתֶם
  english_pob_choice: you were
  chosen_spanish: ustedes fueron
  alternatives_spanish:
  - ustedes eran
  - ustedes han sido
  lexicon: HALOT
  rationale: El verbo hebreo aquí tiene sentido existencial simple en pasado. «Fueron» expresa con claridad la condición histórica de Israel en Egipto.
- source_word: בְּ/אֶרֶץ מִצְרָיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  - en el país de Egipto
  lexicon: HALOT
  rationale: Se conserva «tierra» para reflejar אֶרֶץ y su resonancia histórico-pactual, como en el texto fuente, sin perder naturalidad en español.
theological_decisions:
- issue: Cómo rendir גֵּר en un mandamiento ético de Israel
  english_pob_reading: foreigners
  chosen_spanish_reading: forastero / forasteros
  alternative_spanish_readings:
  - extranjero / extranjeros
  - sojourner
  - residente foráneo
  rationale: La base ética del mandamiento es la memoria de Israel como pueblo que vivió como ajeno y vulnerable en Egipto. «Forastero» comunica esa condición social sin importar categorías legales posteriores ni sonar meramente a viajero ocasional.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: 'Se siguió el estado de revisión más reciente: el archivo inglés indica que no hubo cambios necesarios y el cruce de control muestra alta concordancia; por eso no se introdujeron ajustes de contenido más allá de la adaptación española directa del sentido auditado.'
  spanish_consistency_notes:
  - Se mantuvo la secuencia causal del hebreo con «Así que ... porque ...».
  - Se preservó la distinción entre «tierra» y el nombre propio «Egipto».
  - 'Se usó un término español consistente para גֵּר a lo largo del versículo: «forastero/forasteros».'
