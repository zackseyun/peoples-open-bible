translation:
  language: es
  text: Saúl vio y supo que Yahvé estaba con David[a], y que Mical la hija de Saúl lo amaba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Mical hija de Saúl»; también puede entenderse «Mical, la hija de Saúl».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - percibió
  - se dio cuenta de
  lexicon: HALOT
  rationale: ראה es el verbo ordinario 'ver'. En la secuencia narrativa con וַיֵּדַע, 'vio y supo' conserva el progreso desde la observación hasta el reconocimiento, sin fusionar ambos verbos en uno solo.
- source_word: וַיֵּדַע
  english_pob_choice: knew
  chosen_spanish: supo
  alternatives_spanish:
  - conoció
  - reconoció
  - entendió
  lexicon: HALOT
  rationale: ידע puede significar 'saber/conocer'. Aquí expresa la comprensión asentada de Saúl a partir de lo que observó. 'Supo' mantiene fuerza formal y la pareja natural con 'vio'.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - pues
  - porque
  lexicon: HALOT
  rationale: Aquí כִּי introduce el contenido de lo que Saúl supo. En español, 'que' representa bien esa oración completiva.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton יְהוָה se vierte como 'Yahvé' para preservar el nombre propio del Dios del pacto, siguiendo la norma del proyecto y evitando la sustitución por un título.
- source_word: עִם
  english_pob_choice: was with
  chosen_spanish: estaba con
  alternatives_spanish:
  - estaba al lado de
  - apoyaba a
  lexicon: HALOT
  rationale: עִם con una persona suele indicar presencia o asociación. 'Estaba con David' es natural en español y conserva el sentido teológico de presencia/favor sin añadir interpretación excesiva.
- source_word: וּמִיכַל בַּת שָׁאוּל
  english_pob_choice: and that Michal daughter of Saul
  chosen_spanish: y que Mical, la hija de Saúl
  alternatives_spanish:
  - y que Mical, hija de Saúl
  - y Mical, la hija de Saúl
  lexicon: HALOT
  rationale: La construcción hebrea es un sintagma de filiación sin posesivo explícito en español. 'La hija de Saúl' suena natural y permanece cercano al hebreo. La segunda 'que' clarifica el paralelismo sintáctico del contenido conocido por Saúl.
- source_word: אֲהֵבַתְהוּ
  english_pob_choice: loved him
  chosen_spanish: lo amaba
  alternatives_spanish:
  - lo amó
  - lo estaba amando
  lexicon: HALOT
  rationale: La forma participial con sufijo pronominal puede expresar acción continua o estado. 'Lo amaba' conserva ese matiz mejor que un pasado perfecto simple, sin sobreinterpretar el lexema.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El versículo usa directamente el Tetragrámaton. En español, 'Yahvé' mantiene el nombre divino como nombre propio y evita la sustitución tradicional por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La base inglesa fue revisada para hacer más natural 'the daughter of Saul' sin alterar el sentido. En español, se optó por 'la hija de Saúl' como equivalente natural y fiel al hebreo constructo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de acuerdo con la terminología proyectual para יְהוָה.
  - Se conserva 'Saúl' y 'David' con grafía española estándar.
  - 'El orden del verso sigue la progresión narrativa hebrea: vio → supo → estaba con → amaba.'
  - El pie de nota marca la alternativa de construcción nominal en hebreo sin alterar el texto principal.
