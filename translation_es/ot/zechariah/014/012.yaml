translation:
  language: es
  text: 'Y esta será la plaga con que Yahvé herirá a todos los pueblos[a] que hacen guerra contra Jerusalén: mientras aún está de pie, su carne se pudrirá; sus ojos se pudrirán en sus cuencas, y su lengua se pudrirá en su boca.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «naciones». El hebreo עַמִּים puede designar pueblos o naciones según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּגֵּפָה
  english_pob_choice: the plague
  chosen_spanish: la plaga
  alternatives_spanish:
  - el golpe
  - la aflicción
  - la pestilencia
  lexicon: HALOT
  rationale: מַגֵּפָה puede denotar una plaga, un golpe o una aflicción causada por un golpe. «Plaga» es el equivalente más natural en español y conserva la idea de juicio divino sin limitar indebidamente el mecanismo.
- source_word: יִגֹּף
  english_pob_choice: will strike
  chosen_spanish: herirá
  alternatives_spanish:
  - golpeará
  - afligirá
  - herirá con plaga
  lexicon: HALOT
  rationale: El verbo נגף expresa golpear, herir o afligir. «Herirá» transmite la acción divina con claridad y mantiene la fuerza del juicio; evita una repetición demasiado mecánica de «plaga».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto según la política del proyecto. «Yahvé» expresa el Tetragrama sin sustituirlo por un título genérico.
- source_word: כָּל־הָעַמִּים
  english_pob_choice: all the peoples
  chosen_spanish: a todos los pueblos
  alternatives_spanish:
  - a todas las naciones
  - a todos los pueblos
  lexicon: HALOT
  rationale: עַמִּים puede significar «pueblos» o «naciones». «Pueblos» preserva mejor el plural del hebreo; en español bíblico también es claro como colectivo humano.
- source_word: צָבְאוּ עַל
  english_pob_choice: that wage war against
  chosen_spanish: que hicieron guerra contra
  alternatives_spanish:
  - que guerrearon contra
  - que se levantaron contra
  - que combatieron contra
  lexicon: HALOT
  rationale: El verbo צבא aquí tiene sentido militar. «Hicieron guerra contra» comunica el conflicto armado de forma idiomática en español y evita reducir la acción a una mera reunión o presencia hostil.
- source_word: הָמֵק
  english_pob_choice: will rot away
  chosen_spanish: se pudrirá
  alternatives_spanish:
  - se deshará
  - se corromperá
  - se marchitará
  lexicon: HALOT
  rationale: La repetición de מקק intensifica la descomposición corporal. «Se pudrirá» conserva la crudeza visual y la fuerza de deterioro físico sin suavizarla.
- source_word: בְּשָׂרוֹ
  english_pob_choice: his flesh
  chosen_spanish: su carne
  alternatives_spanish:
  - su cuerpo
  - su carne
  lexicon: HALOT
  rationale: «Carne» es la equivalencia directa de בשר y mantiene la imaginería corporal concreta. «Cuerpo» sería más suave y menos preciso.
- source_word: וְהוּא עֹמֵד עַל־רַגְלָיו
  english_pob_choice: while he is standing on his feet
  chosen_spanish: mientras está de pie sobre sus pies
  alternatives_spanish:
  - mientras permanece de pie
  - mientras está sobre sus pies
  - estando aún de pie
  lexicon: HALOT
  rationale: La frase describe la irrupción del juicio mientras la persona sigue erguida. «Mientras está de pie sobre sus pies» conserva el valor durativo, aunque repite «de pie/sus pies» para reflejar la concreción del hebreo.
- source_word: וְעֵינָיו תִּמַּקְנָה בְחֹרֵיהֶן
  english_pob_choice: his eyes will rot away in their sockets
  chosen_spanish: sus ojos se pudrirán en sus cuencas
  alternatives_spanish:
  - sus ojos se pudrirán en sus órbitas
  - sus ojos se desharán en sus cuencas
  - sus ojos se pudrirán en sus huecos
  lexicon: HALOT
  rationale: חֹרִים refiere a las cavidades de los ojos. «Cuencas» es el término anatómico natural en español y conserva el impacto grotesco del hebreo.
- source_word: וּלְשׁוֹנוֹ תִּמַּק בְּפִיהֶם
  english_pob_choice: and his tongue will rot away in his mouth
  chosen_spanish: y su lengua se pudrirá en su boca
  alternatives_spanish:
  - y su lengua se pudrirá en la boca
  - y su lengua se deshará en su boca
  lexicon: HALOT
  rationale: Se mantiene la misma raíz semántica que en los miembros anteriores para preservar la cohesión del pasaje. El singular «su boca» refleja el sujeto singular y comunica claramente el sentido distributivo.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente. La política del proyecto pide transliterarlo como «Yahvé», preservando el nombre propio y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh (aplicado en español como Yahvé)'
- issue: Naturaleza del juicio descrito
  english_pob_reading: Retain the graphic bodily dissolution as stated, without softening or naturalizing it
  chosen_spanish_reading: Conservar la imagen corporal gráfica tal como está, sin suavizarla ni convertirla en una explicación médica o metafórica
  alternative_spanish_readings:
  - interpretarlo como derrota simbólica
  - entenderlo como una plaga específicamente infecciosa
  rationale: El hebreo presenta descomposición corporal concreta en tres miembros. La traducción mantiene esa dureza sin resolver si el juicio es militar, sobrenatural o epidemiológico más allá de lo que el texto dice.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La versión inglesa auditada permanece sin cambios en la última revisión; se mantuvo el sentido principal y solo se ajustó la formulación española para naturalidad, precisión léxica y conservación de la imaginería del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme a la terminología del proyecto.
  - Se usa «pueblos» para עַמִּים, dejando la alternativa «naciones» en nota.
  - Se conserva la repetición de «pudrirá» para reflejar el hebreo repetitivo de מקק.
  - Se traduce בְחֹרֵיהֶן como «sus cuencas», el equivalente anatómico natural en español.
