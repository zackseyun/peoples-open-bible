translation:
  language: es
  text: Y el hombre Moisés era muy humilde[a], más que cualquier hombre que había sobre la faz de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «más que cualquier persona»; aquí el hebreo «hombre» se usa en sentido genérico para referirse a seres humanos en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הָ/אִישׁ
  english_pob_choice: Now the man
  chosen_spanish: Y el hombre
  alternatives_spanish:
  - Ahora el hombre
  - Y el varón
  lexicon: HALOT
  rationale: Se conserva la coordinación narrativa de waw con «Y», que en español funciona naturalmente al inicio de una cláusula. «El hombre» refleja הָאִישׁ sin omitir el artículo ni diluir la formulación hebrea; «ahora» sería posible como intensificador discursivo, pero no es necesario en español y añade interpretación.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: convención onomástica
  rationale: Nombre propio tradicional en español, equivalente estándar de la transliteración inglesa.
- source_word: ענו
  english_pob_choice: humble
  chosen_spanish: humilde
  alternatives_spanish:
  - manso
  - sumiso
  - afligido
  lexicon: HALOT
  rationale: «Humilde» comunica bien la cualidad de disposición personal del contexto. «Manso» puede sugerir suavidad o docilidad, pero en español bíblico a veces se asocia demasiado con una virtud distinta; «afligido» no encaja aquí como predicado del carácter.
- source_word: מְאֹד
  english_pob_choice: very
  chosen_spanish: muy
  alternatives_spanish:
  - en gran manera
  - sumamente
  lexicon: HALOT
  rationale: Intensificador adverbial normal; «muy» es natural y fiel. «Sumamente» o «en gran manera» son posibles, pero más marcados.
- source_word: מִ/כֹּל
  english_pob_choice: more than any
  chosen_spanish: más que cualquier
  alternatives_spanish:
  - más que todo
  - más que ningún
  lexicon: HALOT
  rationale: La comparación con מן + כֹּל se expresa de forma idiomática en español con «más que cualquier». Mantiene el sentido comparativo y el alcance general del hebreo.
- source_word: הָֽ/אָדָ֔ם
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  - ser humano
  lexicon: HALOT
  rationale: Se mantiene la fuerza genérica y singular de אָדָם con «hombre», en paralelo con la decisión inglesa. «Persona» o «ser humano» aplanan algo la formulación comparativa y cambian el registro.
- source_word: אֲשֶׁ֖ר
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - quien
  lexicon: HALOT
  rationale: Pronombre relativo natural en español para introducir la cláusula descriptiva. «Que» es más fluido que «quien» en esta estructura.
- source_word: עַל פְּנֵ֥י הָ/אֲדָמָֽה
  english_pob_choice: on the face of the earth
  chosen_spanish: sobre la faz de la tierra
  alternatives_spanish:
  - sobre la superficie de la tierra
  - en la faz de la tierra
  lexicon: HALOT
  rationale: Se conserva el idiomatismo hebreo con una expresión muy estable en español bíblico y plenamente comprensible. «Tierra» comunica el equivalente contextual de הָאֲדָמָה aquí, sin introducir una diferencia innecesaria entre suelo y planeta.
theological_decisions:
- issue: Alcance genérico de אָדָם
  english_pob_reading: man
  chosen_spanish_reading: hombre
  alternative_spanish_readings:
  - persona
  - ser humano
  rationale: Se preserva la lectura genérica y masculina del sustantivo singular, como en el POB inglés. Esto mantiene la correspondencia con la forma hebrea y evita neutralizar innecesariamente el texto; la inclusividad implícita queda en el valor genérico del término.
  doctrine_reference: 'DOCTRINE.md: gender-accurate over gender-neutral; contested terms for אָדָם'
translation_notes:
  revision_awareness: 'El pasaje coincide con el texto fuente y con el control de revisión más reciente: no se reportaron cambios necesarios. La redacción española sigue de cerca la sintaxis hebrea y la decisión léxica inglesa documentada, manteniendo el valor genérico de אָדָם y la imagen idiomática de «la faz de la tierra».'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo subyacente es el nombre divino; este versículo no lo contiene.
  - Se mantiene «Moisés» como nombre propio tradicional en español.
  - «Humilde» conserva el matiz moral/disposicional del hebreo sin añadir una interpretación doctrinal extra.
  - La nota al pie preserva la alternativa inclusiva documentada por el POB inglés para אָדָם.
