translation:
  language: es
  text: Llegó un viajero[a] al hombre rico, y él se abstuvo de tomar de su propio rebaño y de su propio ganado para preparar algo para el viajero que había llegado a su casa. Entonces tomó la cordera del hombre pobre y la preparó para el hombre que había llegado a su casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «huésped» para ambos casos de «viajero». El hebreo usa términos relacionados pero distintos para una persona en camino y para una persona recibida en hospitalidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵלֶךְ
  english_pob_choice: traveler
  chosen_spanish: viajero
  alternatives_spanish:
  - forastero
  - huésped
  lexicon: HALOT
  rationale: El sustantivo designa a una persona en camino, no simplemente a un invitado social. «Viajero» mantiene la imagen narrativa y el contraste con la hospitalidad debida.
- source_word: וַיַּחְמֹל
  english_pob_choice: he spared taking
  chosen_spanish: se abstuvo de tomar
  alternatives_spanish:
  - se ahorró tomar
  - rehusó tomar
  - perdonó tomar
  lexicon: HALOT
  rationale: El verbo expresa que evitó tomar de sus animales. «Se abstuvo de tomar» comunica la acción negativa sin forzar un matiz afectivo que el contexto no exige.
- source_word: מִצֹּאנֹו וּמִבְּקָרוֹ
  english_pob_choice: from his own flock and from his own herd
  chosen_spanish: de su propio rebaño y de su propia vacada
  alternatives_spanish:
  - de sus propias ovejas y de su propio ganado
  - de su propio rebaño y de su propio hato
  lexicon: HALOT
  rationale: Se conservan los colectivos hebreos. «Vacada» refleja בָּקָר con un término natural en español bíblico amplio; el posesivo «propio» explícita el contraste moral.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to prepare
  chosen_spanish: para preparar
  alternatives_spanish:
  - para hacer
  - para disponer
  lexicon: HALOT
  rationale: En este contexto de comida/hospitalidad, «preparar» es más natural y evita el calco «hacer», que sería demasiado vago.
- source_word: לָאֹרֵחַ
  english_pob_choice: for the traveler
  chosen_spanish: al viajero
  alternatives_spanish:
  - para el huésped
  - para el forastero
  lexicon: HALOT
  rationale: אָמַרֵחַ puede significar huésped o viajero; aquí se mantiene la conexión léxica con הֵלֶךְ mediante «viajero», y el dativo se expresa de modo idiomático con «al».
- source_word: כִּבְשַׂת
  english_pob_choice: the ewe lamb
  chosen_spanish: la cordera
  alternatives_spanish:
  - la corderita
  - la oveja joven
  - la hembra de la oveja
  lexicon: HALOT
  rationale: El hebreo especifica una hembra joven. «Cordera» es natural, claro y preserva la especificidad sin sobreexplicar.
- source_word: הָאִישׁ הָרָאשׁ
  english_pob_choice: the poor man
  chosen_spanish: el hombre pobre
  alternatives_spanish:
  - el pobre hombre
  - el hombre necesitado
  lexicon: HALOT
  rationale: רָאשׁ indica pobreza o necesidad. «Hombre pobre» es directo y mantiene el contraste con «hombre rico».
- source_word: וַיַּעֲשֶׂהָ
  english_pob_choice: prepared it
  chosen_spanish: la preparó
  alternatives_spanish:
  - la hizo
  - la dispuso
  lexicon: HALOT
  rationale: Se mantiene el verbo de preparación en español para reflejar la repetición de עשה en el contexto culinario/hospitalario, sin especificar indebidamente el proceso.
- source_word: הַבָּא אֵלָיו
  english_pob_choice: who had come to him
  chosen_spanish: que había llegado a él
  alternatives_spanish:
  - que vino a él
  - que había venido a él
  lexicon: HALOT
  rationale: El participio sustantivado se vierte con una relativa pasada fluida. «Había llegado» comunica bien la secuencia narrativa y conserva la idea de llegada.
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo y el cierre de la auditoría inglesa. En particular, la revisión inglesa que prefirió «spared taking» frente a «was unwilling to take» se reflejó en español con «se abstuvo de tomar», para conservar el sentido idiomático de וַיַּחְמֹל sin perder registro formal. También se mantuvo la distinción entre הֵלֶךְ y לָאֹרֵחַ mediante «viajero» en ambos puntos, con nota de alternativa para «huésped».
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se preserva el paralelismo de «hombre rico» / «hombre pobre» para reflejar el contraste social central de la parábola.
  - «Cordera» se eligió por fidelidad y naturalidad; no se convirtió en «oveja» para no perder la especificidad femenina del hebreo.
  - La puntuación refleja el arranque narrativo con «Y he aquí» como equivalente bíblico sobrio de וַיָּבֹא en contexto discursivo.
