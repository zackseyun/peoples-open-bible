    issue: El nombre tribal «Zabulón» debería revisarse a «Zebulón».
    rationale: El hebreo זְבוּלֻן corresponde al inglés auditado «Zebulun». En español bíblico y por cercanía formal, «Zebulón» preserva mejor la forma del nombre que «Zabulón», que introduce un cambio vocálico no motivado por el source packet.
  revised_spanish_text: 'Para Zebulón: Eliab, hijo de Helón.'
