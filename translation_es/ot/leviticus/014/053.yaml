review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la secuencia ritual general: soltar el ave viva, llevarla fuera de la ciudad, realizar כפר por la casa, y el resultado de limpieza. Sin embargo, hay dos desajustes importantes con el hebreo y con la auditoría inglesa: «la ave viva» es gramaticalmente incorrecto en español estándar, y «hacia la llanura abierta» no representa bien אֶל פְּנֵי הַשָּׂדֶה, que apunta a campo abierto, no específicamente a una llanura. Además, «enviará» es aceptable, pero «soltará» o «dejará ir» refleja mejor la acción ritual de release.'
  spanish_quality_summary: El texto es legible, pero requiere pulido para sonar natural y preciso en español eclesial moderno. «la ave viva» debe corregirse; «campo abierto» es más natural y más fiel que «llanura abierta». El resto del registro es digno y claro. La estructura «Así hará expiación por la casa…, y quedará limpia» funciona bien.
  glossary_alignment: No hay conflicto con la terminología global del proyecto. La decisión de usar «expiación» para כפר en contexto sacerdotal es defendible y está bien documentada. Se debe ajustar la nota al pie para reflejar una alternativa realmente distinta del texto principal; actualmente repite «hará expiación por la casa» como alternativa idéntica.
  issues:
  - severity: medium
    issue: «la ave viva»
    rationale: En español estándar se usa «el ave» por razones fonéticas, aunque el sustantivo sea femenino. La forma actual perjudica la calidad del texto.
  - severity: medium
    issue: «hacia la llanura abierta» para אֶל פְּנֵי הַשָּׂדֶה
    rationale: «Llanura» introduce una especificación geográfica no presente en el hebreo. La auditoría inglesa documenta «open field»; «al campo abierto» o «hacia el campo abierto» preserva mejor el sentido idiomático.
  - severity: low
    issue: «enviará» para וְשִׁלַּח
    rationale: No es incorrecto, pero en este rito «soltará» o «dejará ir» comunica mejor la liberación del ave viva, en línea con «release» de la POB inglesa.
  - severity: low
    issue: Nota al pie con alternativa duplicada
    rationale: La nota dice «O “hará purificación de la casa” o “hará expiación por la casa”», pero la segunda opción repite exactamente el texto principal. Conviene ofrecer alternativas genuinas como «purgará la casa» o «hará expiación por la casa» si el texto principal cambia.
  revised_spanish_text: Entonces soltará el ave viva fuera de la ciudad, al campo abierto. Así hará expiación por la casa[a], y quedará limpia.
  revised_footnotes:
  - marker: a
    text: O «purgará la casa» o «hará expiación por la casa». El hebreo usa aquí lenguaje sacerdotal de expiación en un contexto de limpieza ritual.
    reason: lexical_alternative
  revision_rationale: Se corrigió la gramática española («el ave»), se ajustó la imagen espacial a «campo abierto» para reflejar mejor אֶל פְּנֵי הַשָּׂדֶה y la decisión inglesa «open field», y se afinó el verbo ritual a «soltará» para representar mejor la liberación del ave. También se reparó la nota al pie para que presente alternativas léxicas reales. No se requiere adjudicación adicional porque los cambios son claros, locales y bien sustentados por la evidencia fuente y la auditoría inglesa.
