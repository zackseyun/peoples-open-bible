review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: imperativos de adoración y temblor reverente ante Yahvé, con alcance universal. También preserva adecuadamente la ambigüedad de בְּהַדְרַת קֹדֶשׁ mediante nota. Sin embargo, el texto visible no sigue plenamente la mejor forma española del proyecto porque el marcador de nota está mal colocado y hay una discordancia entre ''Adoren a Yahvé'' y la formulación fuente más directa ''Adoren a Yahvé''/''Adoren a Yahvé...'' con mejor fluidez si se mantiene sin interrupción. La frase principal es fiel, pero requiere reparación menor de formato y estilo.'
  spanish_quality_summary: 'La redacción es mayormente natural y digna. ''Adoren a Yahvé'' y ''tiemblen delante de él'' son claros. ''La hermosura de la santidad'' es comprensible, pero ''el esplendor de la santidad'' se alinea mejor con el audit trail inglés (''splendor'') y con הדר, evitando un giro demasiado tradicionalizante. El problema principal es técnico: el marcador [a] no puede ir separado al inicio de ''tiemblen'' porque la nota explica la frase anterior. Debe anclarse en ''santidad[a]'' o en toda la frase pertinente.'
  glossary_alignment: Se usa correctamente 'Yahvé' para יהוה, en conformidad con la política del proyecto. No hay conflicto terminológico mayor. La elección 'santidad' para קֹדֶשׁ y 'tiemblen' para חִילוּ es sólida. Recomiendo 'esplendor' en vez de 'hermosura' para reflejar con más precisión הדר y la justificación léxica documentada.
  issues:
  - severity: medium
    issue: Marcador de nota mal ubicado
    rationale: La nota [a] comenta בְּהַדְרַת קֹדֶשׁ ('en la ... de la santidad'), pero el marcador aparece antes de 'tiemblen', creando una asociación errónea y rompiendo la lectura.
  - severity: low
    issue: '''Hermosura'' es menos preciso que ''esplendor'''
    rationale: Aunque 'hermosura' puede funcionar, el audit trail privilegia 'splendor' para הדר. En español, 'esplendor de la santidad' preserva mejor la fuerza majestuosa y la base léxica documentada.
  revised_spanish_text: Adoren a Yahvé en el esplendor de la santidad[a]; tiemblen delante de él, toda la tierra.
  revised_footnotes:
  - marker: a
    text: 'O: «en vestiduras santas» o «en santa hermosura». La frase hebrea puede referirse tanto al esplendor propio de la santidad como a un adorno o atuendo sagrado para la adoración.'
    reason: alternative_reading
  revision_rationale: Se corrige la ubicación del marcador de nota para que ancle la frase ambigua que la nota explica, y se ajusta 'hermosura' a 'esplendor' para alinearse mejor con הדר y con el razonamiento léxico-teológico ya documentado, sin cambiar el sentido general del versículo.
