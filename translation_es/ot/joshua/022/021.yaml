translation:
  language: es
  text: 'Entonces los hijos de Rubén, los hijos de Gad y la media tribu de Manasés respondieron y hablaron a los jefes de los clanes[a] de Israel:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «los jefes de los millares de Israel», probablemente refiriéndose a jefes de clan o de subdivisiones tribales.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲנוּ
  english_pob_choice: answered
  chosen_spanish: respondieron
  alternatives_spanish:
  - contestaron
  - respondieron en respuesta
  lexicon: HALOT
  rationale: ענה en la narrativa con waw consecutiva introduce una réplica a lo anterior. En español, «respondieron» conserva esa relación de respuesta y suena natural sin debilitar la conexión dialógica.
- source_word: בְּנֵי רְאוּבֵן
  english_pob_choice: the sons of Reuben
  chosen_spanish: los hijos de Rubén
  alternatives_spanish:
  - los rubenitas
  lexicon: HALOT
  rationale: Se mantiene la formulación genealógica literal del hebreo, como en la POB inglesa, para transparencia fuente a fuente.
- source_word: וּבְנֵי גָד
  english_pob_choice: the sons of Gad
  chosen_spanish: los hijos de Gad
  alternatives_spanish:
  - los gaditas
  lexicon: HALOT
  rationale: Se conserva el paralelismo con «los hijos de Rubén» y la expresión genealógica explícita del hebreo.
- source_word: וַחֲצִי שֵׁבֶט הַמְנַשֶּׁה
  english_pob_choice: the half-tribe of Manasseh
  chosen_spanish: la media tribu de Manasés
  alternatives_spanish:
  - la mitad de la tribu de Manasés
  lexicon: HALOT
  rationale: «Media tribu» es el equivalente natural y fiel de la construcción hebrea, manteniendo la división tribal reconocible en español.
- source_word: וַיְדַבְּרוּ
  english_pob_choice: and spoke
  chosen_spanish: y hablaron
  alternatives_spanish:
  - y dijeron
  - y conversaron
  lexicon: HALOT
  rationale: דבר significa propiamente «hablar»; se evita reducirlo a «decir», para conservar el paralelismo verbal con «respondieron».
- source_word: אֶת רָאשֵׁי אַלְפֵי יִשְׂרָאֵל
  english_pob_choice: to the heads of the clans of Israel
  chosen_spanish: a los jefes de los clanes de Israel
  alternatives_spanish:
  - a los jefes de los millares de Israel
  - a los jefes de las divisiones de Israel
  lexicon: HALOT
  rationale: רָאשֵׁי se traduce «jefes» y אַלְפֵי, aunque literalmente es «millares», en contexto administrativo/tribal alude a agrupaciones o clanes; «clanes» sigue la decisión auditada de la POB inglesa y evita la literalidad opaca de «millares».
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] en el texto español y manteniendo la misma decisión léxica auditada para רָאשֵׁי אַלְפֵי יִשְׂרָאֵל.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo verbal «respondieron y hablaron» para reflejar la doble formulación hebrea.
  - Se prefirió «hijos de» por transparencia y consistencia con la POB inglesa.
  - «Clanes» funciona aquí como equivalente contextual de אַלְפֵי sin perder la nota literal en el pie.
  - La nota [a] aparece exactamente junto a «Rubén», donde el referente del grupo queda claro y el pie puede explicar la frase completa.
