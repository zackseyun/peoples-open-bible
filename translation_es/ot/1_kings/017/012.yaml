review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español preserva en general la secuencia y el sentido del hebreo: juramento con el nombre divino, negación enfática de tener alimento, excepción con la escasa harina y aceite, acción presente de recoger madera y finalidad de preparar una última comida antes de morir. Sin embargo, varias elecciones no reflejan bien el valor léxico documentado o suenan impropias en español: «pan-cake» es un anglicismo innecesario, «dos leños» exagera el tamaño frente a שְׁנַיִם עֵצִים ‘dos palitos/palos’, y la construcción «para entrar, prepararlo… y morir» queda gramaticalmente áspera y menos natural que una finalidad coordinada clara.'
  spanish_quality_summary: 'La legibilidad es mixta: «Yahvé» y la mayor parte de la sintaxis funcionan bien, pero «pan-cake» rompe el registro bíblico en español, «jarro/vasija» puede afinarse con mejores equivalentes domésticos, y la cadena de infinitivos finales necesita mejor flujo. El tono debe ser moderno y digno; aquí conviene evitar anglicismos y escoger formas más idiomáticas como «torta de pan», «dos palos» o «dos ramitas», y «voy a entrar para prepararlo…».'
  glossary_alignment: 'Se alinea correctamente con la pauta del proyecto al usar «Yahvé» para יְהוָה. No hay otros términos doctrinales conflictivos. La principal desalineación es léxica/estilística: la decisión inglesa «bread-cake» no exige calcar un anglicismo en español; «torta de pan» preserva mejor la especificidad documentada de מָעוֹג. También conviene reflejar mejor el valor diminuto/escaso de שְׁנַיִם עֵצִים evitando «leños».'
  issues:
  - severity: high
    issue: «pan-cake» es un anglicismo impropio y poco inteligible en español bíblico.
    rationale: מָעוֹג se refiere a una pequeña torta o panecillo cocido. El inglés «bread-cake» fue una solución propia del inglés; en español «pan-cake» no es natural ni digno, y puede confundirse con un préstamo moderno ajeno al contexto.
  - severity: medium
    issue: «dos leños» no refleja bien la pequeñez de שְׁנַיִם עֵצִים.
    rationale: La documentación inglesa subraya que se trata de una cantidad mínima de combustible, ‘two sticks’, no troncos o leños. «Leños» sugiere piezas mayores y reduce el pathos de escasez.
  - severity: medium
    issue: La secuencia «para entrar, prepararlo para mí y para mi hijo, y comerlo, y morir» suena torpe en español.
    rationale: El hebreo expresa finalidad/intención sucesiva. En español conviene explicitar la progresión con una formulación más natural, por ejemplo «voy a entrar para prepararlo…; lo comeremos y moriremos» o equivalente.
  - severity: low
    issue: La nota al pie necesita ajustarse al nuevo término principal.
    rationale: Si el texto principal cambia a «torta de pan», la nota debe conservar alternativas coherentes y explicar el hebreo sin depender del anglicismo actual.
