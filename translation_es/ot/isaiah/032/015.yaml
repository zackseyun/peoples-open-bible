translation:
  language: es
  text: hasta que un espíritu desde lo alto[a] sea derramado sobre nosotros, y el desierto se vuelva campo fértil[b], y el campo fértil sea considerado bosque.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Espíritu desde lo alto»; el hebreo רוּחַ puede significar «espíritu», y en este contexto puede aludir específicamente al Espíritu de Dios.
    reason: alternative_reading
  - marker: b
    text: «Campo fértil» traduce el hebreo karmel, que significa tierra fértil o cultivada; aquí probablemente no se trata del nombre propio Carmel.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta
  - hasta el punto en que
  lexicon: HALOT
  rationale: Expresa con naturalidad el límite temporal o de resultado introducido por עַד en español bíblico moderno.
- source_word: יֵעָרֶה
  english_pob_choice: is poured out
  chosen_spanish: sea derramado
  alternatives_spanish:
  - sea vertido
  - sea vaciado
  lexicon: HALOT
  rationale: El niphal de ערה comunica una acción de derramamiento; en español, «sea derramado» mantiene la imagen pasiva y el matiz de efusión.
- source_word: עָלֵינוּ
  english_pob_choice: on us
  chosen_spanish: sobre nosotros
  alternatives_spanish:
  - en nosotros
  - encima de nosotros
  lexicon: HALOT
  rationale: «Sobre nosotros» reproduce bien la preposición עַל con el verbo de derramamiento y sugiere la acción descendente.
- source_word: רוּחַ
  english_pob_choice: a spirit
  chosen_spanish: un espíritu
  alternatives_spanish:
  - el Espíritu
  - el viento
  - el aliento
  lexicon: HALOT
  rationale: La ausencia de artículo en hebreo favorece una traducción no especificada en el texto principal. «Espíritu» conserva la amplitud semántica y la resonancia teológica sin resolverla explícitamente.
- source_word: מִמָּרוֹם
  english_pob_choice: from on high
  chosen_spanish: desde lo alto
  alternatives_spanish:
  - desde arriba
  - desde la altura
  lexicon: HALOT
  rationale: «Desde lo alto» es una equivalencia española natural para מָרוֹם y conserva el sentido elevado/celestial.
- source_word: מִדְבָּר
  english_pob_choice: the wilderness
  chosen_spanish: el desierto
  alternatives_spanish:
  - el desierto agreste
  - la soledad
  lexicon: HALOT
  rationale: Aquí el contraste agrario con כַּרְמֶל se comunica bien en español con «desierto»; es una opción inteligible y amplia, aunque el término hebreo también puede abarcar zona inculta o estéril.
- source_word: לַכַּרְמֶל / כַּרְמֶל
  english_pob_choice: a fruitful field / the fruitful field
  chosen_spanish: campo fértil / el campo fértil
  alternatives_spanish:
  - tierra fértil
  - campo cultivado
  - Carmel
  lexicon: HALOT
  rationale: כַּרְמֶל funciona aquí como sustantivo común de tierra fértil o cultivada, no necesariamente como topónimo. «Campo fértil» reproduce el contraste agrícola y la redundancia retórica del hebreo.
- source_word: לַיַּעַר
  english_pob_choice: as a forest
  chosen_spanish: por bosque
  alternatives_spanish:
  - como bosque
  - para bosque
  lexicon: HALOT
  rationale: Con יֵחָשֵׁב, el hebreo expresa valoración/consideración; «por bosque» en español puede sonar abrupto, pero en combinación con «sea tenido» refleja el juicio comparativo del texto.
- source_word: יֵחָשֵׁב
  english_pob_choice: is regarded
  chosen_spanish: sea tenido
  alternatives_spanish:
  - sea considerado
  - sea contado
  - sea reputado
  lexicon: HALOT
  rationale: La pasiva en español con «ser tenido por» reproduce bien el niphal de חשב en sentido de ser considerado o estimado como algo.
theological_decisions:
- issue: Si רוּחַ debe explicitarse como el Espíritu Santo o mantenerse indeterminado
  english_pob_reading: a spirit from on high
  chosen_spanish_reading: un espíritu desde lo alto
  alternative_spanish_readings:
  - el Espíritu desde lo alto
  - el Espíritu Santo desde lo alto
  rationale: La escena sugiere una obra divina de renovación, pero el hebreo no añade artículo ni calificación explícita. Mantener «un espíritu» preserva la tensión lexical y evita imponer una identificación doctrinal que el verso no formula de modo directo.
  doctrine_reference: Transparencia textual; preservar la ambigüedad productiva del original
- issue: Cómo reflejar el valor de כַּרְמֶל sin forzar el topónimo Carmel
  english_pob_reading: fruitful field
  chosen_spanish_reading: campo fértil
  alternative_spanish_readings:
  - Carmel
  - tierra fértil
  - campo cultivado
  rationale: El contexto contrasta desierto con tierra productiva; en español, «campo fértil» comunica con claridad la lectura común-nominal y evita convertir el término en nombre propio sin fundamento suficiente.
  doctrine_reference: Primacía del sentido contextual frente a la asociación tradicional
translation_notes:
  revision_awareness: Se revisó el equilibrio entre la imagen hebrea y la naturalidad del español. La traducción mantiene la secuencia resultativa del verso y conserva la ambigüedad de רוּחַ y de כַּרְמֶל, con notas breves para las lecturas alternativas.
  spanish_consistency_notes:
  - Se mantuvo «espíritu» en minúscula en el texto principal para respetar el hebreo anartro y no cerrar la referencia.
  - Se prefirió «campo fértil» en lugar de «Carmel» por el contexto agrícola y por la nota lexical ya documentada en el expediente inglés.
  - «Sea tenido por bosque» conserva el matiz de ser considerado/estimado como algo, sin añadir interpretaciones ajenas al verso.
