translation:
  language: es
  text: No ha hecho así con ninguna nación; y sus juicios no los han conocido. ¡Alaben a Yah![a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¡Alaben al SEÑOR!». El hebreo es halelú-yah, literalmente «¡Alaben a Yah!», usando la forma corta del nombre divino.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  english_pob_choice: not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No ha
  - No había
  lexicon: HALOT
  rationale: La negación inicial en español se expresa naturalmente con «No», manteniendo el valor frontal y enfático de la negación hebrea.
- source_word: עָשָׂה
  english_pob_choice: has done
  chosen_spanish: ha hecho
  alternatives_spanish:
  - hizo
  - ha obrado
  lexicon: HALOT
  rationale: El perfecto hebreo se vierte con presente perfecto en español para conservar la acción completada con relevancia actual, como en la auditoría inglesa.
- source_word: כֵן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de esta manera
  - de ese modo
  lexicon: HALOT
  rationale: «Así» reproduce bien la referencia anafórica al trato privilegiado del contexto inmediato, con español natural y conciso.
- source_word: לְכָל גּוֹי
  english_pob_choice: for any nation
  chosen_spanish: con ninguna nación
  alternatives_spanish:
  - para ninguna nación
  - con toda nación
  lexicon: HALOT
  rationale: Con la negación, español idiomático prefiere una construcción negativa como «con ninguna nación»; se mantiene la fuerza colectiva de גּוֹי sin sobrerrepresentar un universal absoluto que el contexto no exige.
- source_word: וּמִשְׁפָּטִים
  english_pob_choice: his judgments
  chosen_spanish: sus juicios
  alternatives_spanish:
  - sus decretos
  - sus ordenanzas
  - sus sentencias
  lexicon: HALOT
  rationale: «Juicios» conserva la conexión léxica con מִשְׁפָּטִים y permite abarcar el sentido de disposiciones/decisiones judiciales de Dios sin estrecharlo demasiado. Se evita imponer «leyes» porque el hebreo y la auditoría inglesa favorecen el campo judicial.
- source_word: בַּל
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - nunca
  lexicon: HALOT
  rationale: 'La partícula poética negativa se integra con la negación española estándar en la segunda cláusula: «no los conocieron».'
- source_word: יְדָעוּם
  english_pob_choice: have not known
  chosen_spanish: los conocieron
  alternatives_spanish:
  - no los conocieron
  - no han conocido
  lexicon: HALOT
  rationale: Aunque la auditoría inglesa usa perfecto compuesto por naturalidad inglesa, en español la simple «los conocieron» con negación expresa bien el perfecto hebreo en un enunciado poético paralelo; el objeto pronominal se mantiene con «los».
- source_word: הַלְלוּ יָהּ
  english_pob_choice: Praise Yah!
  chosen_spanish: ¡Alabad a Yah!
  alternatives_spanish:
  - ¡Alaben a Yah!
  - ¡Aleluya!
  lexicon: HALOT
  rationale: Se conserva el imperativo plural con una forma litúrgica clara y bíblica en español. «Yah» traduce la forma corta del nombre divino יָהּ, siguiendo la preferencia del proyecto por transliterar nombres y no sustituirlos por una convención eclesial.
theological_decisions:
- issue: Forma corta del nombre divino en la doxología final
  english_pob_reading: Praise Yah!
  chosen_spanish_reading: ¡Alabad a Yah!
  alternative_spanish_readings:
  - ¡Aleluya!
  - ¡Alabad al SEÑOR!
  rationale: El hebreo no usa aquí יהוה sino la forma breve יָהּ. Por eso se preserva «Yah» para reflejar el texto fuente de manera transparente. «Aleluya» ocultaría el imperativo y la forma nominal subyacente; «SEÑOR» introduciría una convención de sustitución que no corresponde al formulario hebreo aquí.
  doctrine_reference: 'DOCTRINE.md: traducir títulos y transliterar nombres; la convención de «SEÑOR» aplica específicamente a YHWH, no a יָהּ'
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en la auditoría inglesa; la versión española sigue de cerca esa lectura alta en acuerdo, respetando la paralelismo poético y la forma corta del nombre divino.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de la negación de forma natural en español, sin forzar calcos del orden hebreo.
  - «Juicios» se usa de manera consistente con el campo semántico jurídico de מִשְׁפָּטִים y con la elección auditada en inglés.
  - La cláusula final preserva el tono de alabanza con imperativo plural y el nombre abreviado «Yah» para mantener transparencia textual.
