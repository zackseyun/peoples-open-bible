base_translation:
  language: en
  yaml_path: translation/ot/zechariah/009/015.yaml
  text: Yahweh of Armies will shield them[a], and they will devour and tread down the sling stones; they will drink and roar as if with wine, and they will be filled like a bowl[c][b], like the corners of the altar.
  footnotes:
  - marker: a
    text: Or 'The LORD of hosts.'
    reason: alternative_reading
  - marker: b
    text: The Hebrew term for 'bowl' refers to a vessel used in sacrificial rites.
    reason: cultural_note
  - marker: c
    text: The imagery likely evokes blood applied or splashed at the altar, but the Hebrew text says simply 'like the corners of the altar.'
    reason: cross_reference
