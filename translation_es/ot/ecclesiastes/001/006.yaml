translation:
  language: es
  text: Hacia el sur va y gira hacia el norte; gira y gira, va el viento[a], y en sus circuitos[b] vuelve el viento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo רוּחַ también puede significar «espíritu» o «aliento»; aquí el contexto de ciclos naturales favorece «viento».
    reason: lexical_alternative
  - marker: b
    text: O «sus vueltas» para «sus circuitos».
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹלֵךְ
  english_pob_choice: going / goes
  chosen_spanish: va
  alternatives_spanish:
  - camina
  - se dirige
  - anda
  lexicon: HALOT
  rationale: El participio hebreo expresa movimiento continuo. En español, «va» transmite ese avance en curso con naturalidad y sin perder la fuerza aspectual del original.
- source_word: דָּרוֹם
  english_pob_choice: south
  chosen_spanish: el sur
  alternatives_spanish:
  - hacia el sur
  - sur
  - la región del sur
  lexicon: HALOT
  rationale: Con אֶל, la idea es direccional. «Hacia el sur» queda bien en la primera cola; en la redacción continua del verso, «el sur» se integra de manera fluida sin añadir contenido.
- source_word: וְסוֹבֵב / סוֹבֵב סֹבֵב
  english_pob_choice: and turning / turning and turning
  chosen_spanish: gira y gira
  alternatives_spanish:
  - va girando
  - da vueltas y vueltas
  - vuelve y vuelve
  lexicon: HALOT
  rationale: La repetición enfatiza el giro continuo. «Gira y gira» conserva esa insistencia rítmica en español sin forzar una imagen meteorológica específica.
- source_word: צָפוֹן
  english_pob_choice: north
  chosen_spanish: el norte
  alternatives_spanish:
  - hacia el norte
  - norte
  - la región del norte
  lexicon: HALOT
  rationale: Es un sustantivo direccional. La forma «hacia el norte» está explícita en la primera cláusula; luego «el norte» se sobreentiende por el paralelismo.
- source_word: הָרוּחַ
  english_pob_choice: the wind
  chosen_spanish: el viento
  alternatives_spanish:
  - el espíritu
  - el aliento
  lexicon: HALOT
  rationale: En el contexto inmediato de 1:5–7 se describen ciclos naturales observables. «Viento» preserva ese referente meteorológico y evita una lectura teológica no marcada por el pasaje.
- source_word: וְעַל
  english_pob_choice: and on
  chosen_spanish: y sobre
  alternatives_spanish:
  - y en
  - y a lo largo de
  - y por
  lexicon: HALOT
  rationale: «Sobre» traduce de forma cercana על y mantiene la imagen de desplazamiento siguiendo recorridos o trayectorias.
- source_word: סְבִיבֹתָיו
  english_pob_choice: its circuits
  chosen_spanish: sus circuitos
  alternatives_spanish:
  - sus vueltas
  - sus rondas
  - sus recorridos
  lexicon: HALOT
  rationale: El sustantivo deriva del mismo campo semántico de סבב («rodear, dar vueltas»). «Circuitos» conserva el carácter cíclico y el paralelismo con los verbos de giro.
- source_word: שָׁב
  english_pob_choice: returns
  chosen_spanish: vuelve
  alternatives_spanish:
  - retorna
  - regresa
  - da la vuelta
  lexicon: HALOT
  rationale: El verbo שוב expresa retorno. «Vuelve» es breve, natural y conserva la repetición circular del verso.
theological_decisions:
- issue: Sentido de רוּחַ en el verso
  english_pob_reading: meteorological 'wind'
  chosen_spanish_reading: «viento» como fenómeno natural
  alternative_spanish_readings:
  - «espíritu»
  - «aliento»
  rationale: La sección compara ciclos de la creación (sol, viento, ríos). El contexto favorece la lectura meteorológica y no exige un sentido espiritual aquí.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El inglés audita una revisión menor: se prefirió «turning and turning» por naturalidad sin perder la repetición. En español, «gira y gira» mantiene esa insistencia rítmica con un equivalente natural y breve.'
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma general, pero este versículo no contiene el nombre divino.
  - «Viento» se usa de manera consistente con el contexto de fenómenos naturales en Eclesiastés 1:5–7.
  - Se evita «Espíritu» para רוּחַ porque aquí la referencia contextual es meteorológica.
  - «Circuitos» reproduce el campo semántico de circularidad del hebreo y conserva la relación con «gira».
