translation:
  language: es
  text: Pero este pueblo tiene un corazón obstinado y rebelde[a]; se han desviado y se han ido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se han apartado y han seguido adelante». El hebreo usa dos verbos en secuencia para enfatizar tanto la desviación como la continuación del alejamiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָעָם הַזֶּה
  english_pob_choice: But this people
  chosen_spanish: Pero a este pueblo
  alternatives_spanish:
  - Y a este pueblo
  - Pero este pueblo
  lexicon: HALOT
  rationale: La conjunción con ל introduce contraste con el verso anterior; en español, «Pero» expresa bien la oposición. «A este pueblo» conserva el énfasis demostrativo del hebreo sin sonar forzado.
- source_word: הָיָה
  english_pob_choice: has
  chosen_spanish: le ha tocado
  alternatives_spanish:
  - tiene
  - ha sido
  lexicon: HALOT
  rationale: El qatal describe un estado establecido. «Le ha tocado» comunica la idea de una condición poseída por el pueblo en el presente, con tono natural en español y sin perder el matiz de estado resultante.
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - corazón interior
  - mente
  - ser interior
  lexicon: HALOT
  rationale: En español bíblico moderno, «corazón» conserva la función antropológica de centro de voluntad y disposición; es la equivalencia más transparente y natural para לֵב.
- source_word: סוֹרֵר
  english_pob_choice: stubborn
  chosen_spanish: obstinado
  alternatives_spanish:
  - terco
  - rebelde
  - recalcitrante
  lexicon: HALOT
  rationale: El término describe resistencia pertinaz y desviación obstinada. «Obstinado» comunica bien esa rigidez de actitud sin exagerar el componente de rebelión que ya aporta el segundo adjetivo.
- source_word: וּמוֹרֶה
  english_pob_choice: rebellious
  chosen_spanish: rebelde
  alternatives_spanish:
  - desobediente
  - indócil
  - defiante
  lexicon: HALOT
  rationale: מורה expresa oposición activa. «Rebelde» mantiene la fuerza de resistencia contra la autoridad divina y funciona naturalmente con «corazón» en español.
- source_word: סָרוּ
  english_pob_choice: have turned aside
  chosen_spanish: se han desviado
  alternatives_spanish:
  - se han apartado
  - han vuelto aparte
  - han torcido el camino
  lexicon: HALOT
  rationale: סור implica apartarse del camino recto. «Se han desviado» conserva la metáfora de desviación con claridad y sin añadir un objeto explícito que el hebreo no da.
- source_word: וַיֵּלֵכוּ
  english_pob_choice: and gone away
  chosen_spanish: y se han ido
  alternatives_spanish:
  - y han seguido adelante
  - y han continuado
  - y se han marchado
  lexicon: HALOT
  rationale: 'El segundo verbo intensifica la idea: no solo se apartaron, sino que siguieron su marcha. «Se han ido» es natural en español y preserva ese movimiento continuo.'
theological_decisions:
- issue: El hebreo describe una disposición moral interna seguida de dos verbos de apartarse.
  english_pob_reading: a stubborn and rebellious heart; they have turned aside and gone away.
  chosen_spanish_reading: un corazón obstinado y rebelde; se han desviado y se han ido.
  alternative_spanish_readings:
  - un corazón terco y rebelde; se han apartado y han seguido adelante
  - un corazón obstinado y desobediente; se han desviado y han salido
  rationale: 'Se conserva la tensión entre el estado interior y la conducta exterior. La formulación española mantiene los dos niveles: disposición del corazón y acción de apartarse/proseguir lejos.'
  doctrine_reference: Anthropology / moral responsibility in prophetic indictment
translation_notes:
  revision_awareness: La redacción inglesa auditada pasó de una forma más pesada («has had») a la más natural («has»); el español sigue esa misma lógica de estado presente resultante, evitando una construcción demasiado literal del perfecto hebreo. También se preserva el énfasis dual del cierre verbal, como en la nota inglesa.
  spanish_consistency_notes:
  - Se mantiene «corazón» para לֵב, conforme al patrón POB y al uso bíblico natural en español.
  - Se usa «obstinado y rebelde» para distinguir resistencia pasiva y oposición activa, reflejando la doble adjetivación hebrea.
  - 'La secuencia verbal en español conserva la progresión del hebreo: desviación seguida de alejamiento continuado.'
  - No se introduce léxico eclesiástico tradicional ajeno al hebreo; la frase permanece sobria y directamente auditada.
