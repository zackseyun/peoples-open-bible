  text: Ἡ δὲ τοῦ θανάτου ὁδός ἐστιν αὕτη· πρῶτον πάντων πονηρά ἐστι καὶ κατάρας μεστή·
    φόνοι, μοιχεῖαι, ἐπιθυμίαι, πορνεῖαι, κλοπαί, εἰδωλολατρεῖαι, μαγεῖαι, φαρμακεῖαι,
    ἁρπαγαί, ψευδομαρτυρίαι, ὑποκρίσεις, διπλοκαρδία, δόλος, ὑπερηφανία, κακία, αὐθάδεια,
    πλεονεξία, αἰσχρολογία, ζηλοτυπία, θρασύτης, ὕψος, ἀλαζονεία· διῶκται ἀγαθῶν,
    μισοῦντες ἀλήθειαν, ἀγαπῶντες ψεῦδος, οὐ γινώσκοντες μισθὸν δικαιοσύνης, οὐ κολλώμενοι
    ἀγαθῷ οὐδὲ κρίσει δικαίᾳ, ἀγρυπνοῦντες οὐκ εἰς τὸ ἀγαθὸν, ἀλλ’ εἰς τὸ πονηρόν·
    ὧν μακρὰν πραΰτης καὶ ὑπομονή, μάταια ἀγαπῶντες, διώκοντες ἀνταπόδομα, οὐκ ἐλεοῦντες
    πτωχόν, οὐ πονοῦντες ἐπὶ καταπονουμένῳ, οὐ γινώσκοντες τὸν ποιήσαντα αὐτούς, φονεῖς
    τέκνων, φθορεῖς πλάσματος Θεοῦ, ἀποστρεφόμενοι τὸν δεόμενον, καταπονοῦντες τὸν
    θλιβόμενον, πλουσίων παράκλητοι, πενήτων ἄνομοι κριταί, πανθαμάρτητοι· ῥυσθείητε,
    τέκνα, ἀπὸ τούτων ἁπάντων.
