translation:
  language: es
  text: Pero no quisieron escuchar; endurecieron su cuello como el cuello de sus padres, que no creyeron[a] en Yahvé, su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no confiaron en Yahvé, su Dios». El verbo hebreo puede expresar creer o confiar en sentido de pacto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמֵעוּ
  english_pob_choice: would not listen
  chosen_spanish: no quisieron escuchar
  alternatives_spanish:
  - no escucharon
  - no obedecieron
  lexicon: HALOT
  rationale: שׁמע significa oír/escuchar y, en contextos de pacto, puede incluir la idea de obedecer. En español, «no quisieron escuchar» conserva la resistencia volitiva que señala el POB inglés con «would not listen», sin volverlo demasiado interpretativo como «no obedecieron».
- source_word: וַיַּקְשׁוּ
  english_pob_choice: they stiffened
  chosen_spanish: endurecieron
  alternatives_spanish:
  - se endurecieron
  - se pusieron tercos
  lexicon: HALOT
  rationale: La forma causativa de קשׁה expresa volver duro o rígido. «Endurecieron su cuello» mantiene la imagen corporal del hebreo y evita perder la metáfora idiomática en una paráfrasis moral más abstracta.
- source_word: עָרְפָּם
  english_pob_choice: their neck
  chosen_spanish: su cuello
  alternatives_spanish:
  - su cerviz
  - su nuca
  lexicon: HALOT
  rationale: עֹרֶף se refiere al cuello o la nuca. «Cuello» es natural y claro en español bíblico moderno; conserva la idiomática de «endurecer el cuello» sin recurrir a un término más arcaico que podría sonar menos transparente.
- source_word: כְּעֹרֶף אֲבוֹתָם
  english_pob_choice: like the neck of their fathers
  chosen_spanish: como el cuello de sus padres
  alternatives_spanish:
  - como el cuello de sus antepasados
  - como sus padres
  lexicon: HALOT
  rationale: El hebreo compara explícitamente con «el cuello de sus padres», no solo con su conducta. Por eso se conserva la imagen concreta, como en el POB inglés, para mantener el paralelismo y la fuerza retórica.
- source_word: הֶאֱמִינוּ
  english_pob_choice: did not believe
  chosen_spanish: no creyeron
  alternatives_spanish:
  - no confiaron
  - no tuvieron fe
  lexicon: HALOT
  rationale: En el hiphil de אמן con ב, el sentido es creer/poner confianza en. «No creyeron» es la equivalencia más directa en español y mantiene la tensión lexical entre creer y confiar que el POB inglés preserva con su nota alternativa.
- source_word: בַּיהוָה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en Yahveh
  - en el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: Siguiendo la norma del proyecto para el Tetragrámaton, se usa «Yahvé» en el texto principal. Se evita «SEÑOR» porque en este proyecto se prefiere la transparencia del nombre divino.
- source_word: אֱלֹהֵיהֶם
  english_pob_choice: their God
  chosen_spanish: su Dios
  alternatives_spanish:
  - el Dios de ellos
  - su Dios propio
  lexicon: HALOT
  rationale: La construcción posesiva identifica a Yahvé como el Dios de ellos. «Su Dios» es idiomático en español y suficientemente explícito para mantener el matiz de alianza.
theological_decisions:
- issue: Cómo renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. El español del proyecto adopta «Yahvé» como forma principal por consistencia doctrinal y por transparencia con el nombre de pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Si אמן debe leerse como creer o confiar
  english_pob_reading: did not believe in the LORD their God
  chosen_spanish_reading: no creyeron en Yahvé, su Dios
  alternative_spanish_readings:
  - no confiaron en Yahvé, su Dios
  - no tuvieron fe en Yahvé, su Dios
  rationale: Ambas lecturas son posibles, pero «creyeron en» reproduce con más precisión la construcción hebrea y deja abierta la dimensión relacional de confianza sin añadir una glosa doctrinal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y coincide con la lectura auditada del POB inglés: contraste adversativo, metáfora del cuello endurecido, y la alternativa lexical entre creer y confiar en אמן. No se observan revisiones pendientes en el paquete de fuente.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se conservó la metáfora corporal «endurecieron su cuello» por fidelidad al hebreo.
  - 'Se evitó traducir mecánicamente desde el inglés cuando el español exigía un orden más natural: «Pero no quisieron escuchar».'
  - «Creyeron» conserva la tensión con «confiaron» que el audit trail documenta.
