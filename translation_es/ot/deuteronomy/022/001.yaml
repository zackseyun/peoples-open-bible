revisions:
- from: No verás el buey de tu hermano o su oveja[a] extraviados, ni te harás el desentendido[b] respecto de ellos; seguramente los devolverás a tu hermano.
  to: Si ves el buey de tu hermano o su oveja[a] extraviados, no te desentenderás[b] de ellos; debes devolverlos sin falta a tu hermano.
  rationale: La revisión conserva las decisiones léxicas correctas del borrador, pero mejora la naturalidad jurídica en español y, sobre todo, expresa con más precisión la fuerza obligativa del hebreo. «Si ves… no te desentenderás» comunica mejor la prohibición que «No verás… ni te harás el desentendido», y «debes devolverlos sin falta» representa de manera más clara el énfasis de הָשֵׁב תְּשִׁיבֵם que «seguramente los devolverás».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:00:55Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: prohibición de desentenderse ante el buey o la oveja de tu hermano extraviados y mandato enfático de devolverlos. Conserva correctamente «tu hermano», «buey», «oveja» con nota de amplitud léxica, y la nota sobre el modismo «ocultarte de ellos».'
  spanish_quality_summary: 'El texto es claro y natural, pero tiene dos puntos mejorables: «No verás…» suena menos idiomático que un mandato prohibitivo en español bíblico-jurídico, y «seguramente los devolverás» puede leerse como predicción más que como obligación enfática. «Ni te harás el desentendido» es comprensible, pero tras «no verás» conviene coordinar mejor la prohibición con «ni te desentenderás».'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Tu hermano» preserva la fuerza de אָחִיךָ. «Buey» y «oveja» son adecuados; la nota de «oveja» mantiene la amplitud de שֵׂה. La nota literal para וְהִתְעַלַּמְתָּ מֵהֶם está bien orientada. El único ajuste importante es expresar mejor en español la fuerza obligativa de הָשֵׁב תְּשִׁיבֵם.
  issues:
  - severity: medium
    issue: «No verás» suena poco natural como formulación prohibitiva principal en español
    rationale: Aunque formalmente cercano al hebreo, en español legal/bíblico moderno funciona mejor «Si ves… no te desentenderás» o «No debes pasar por alto…». La redacción actual puede sonar rígida y menos idiomática.
  - severity: medium
    issue: «Seguramente los devolverás» no comunica con suficiente claridad el mandato enfático
    rationale: '«Seguramente» en español suele expresar probabilidad o expectativa, no obligación. El hebreo intensifica el deber: conviene una forma como «debes devolverlos sin falta» o «ciertamente se los devolverás».'
  - severity: low
    issue: «Ni te harás el desentendido respecto de ellos» es algo pesado
    rationale: La idea es buena, pero «respecto de ellos» añade rigidez innecesaria. Puede expresarse con más fluidez manteniendo el valor ético del modismo.
  revised_spanish_text: Si ves el buey de tu hermano o su oveja[a] extraviados, no te desentenderás[b] de ellos; debes devolverlos sin falta a tu hermano.
  revised_footnotes:
  - marker: a
    text: El hebreo «su oveja» puede designar de manera más amplia el ganado menor, incluso una cabra; se mantiene «oveja» en el texto principal por naturalidad en la pareja legal con «buey».
    reason: lexical_alternative
  - marker: b
    text: Lit. «ocultarte de ellos»; es decir, evitar deliberadamente intervenir.
    reason: lexical_alternative
  revision_rationale: La revisión conserva las decisiones léxicas correctas del borrador, pero mejora la naturalidad jurídica en español y, sobre todo, expresa con más precisión la fuerza obligativa del hebreo. «Si ves… no te desentenderás» comunica mejor la prohibición que «No verás… ni te harás el desentendido», y «debes devolverlos sin falta» representa de manera más clara el énfasis de הָשֵׁב תְּשִׁיבֵם que «seguramente los devolverás».
