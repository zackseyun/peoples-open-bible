translation:
  language: es
  text: 'Entonces Rubén les respondió[a], diciendo: «¿No les dije yo, diciendo: “No pequen contra el muchacho”? Pero ustedes no escucharon. Y ahora, he aquí, su sangre está siendo requerida».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «su sangre está siendo demandada», es decir, ahora se está exigiendo rendición de cuentas por su derramamiento de sangre.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: En español, «respondió» comunica la respuesta en diálogo con naturalidad y conserva el valor narrativo de la acción verbal sin añadir matices ajenos.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - diciendo
  lexicon: HALOT
  rationale: Se conserva la fórmula introductoria del discurso para reflejar el doble לֵאמֹר del hebreo, como hizo la POB en inglés con el segundo «saying».
- source_word: הֲלוֹא
  english_pob_choice: Did I not
  chosen_spanish: ¿No les dije yo?
  alternatives_spanish:
  - ¿Acaso no les dije yo?
  - ¿No les advertí yo?
  lexicon: HALOT
  rationale: La pregunta retórica exige asentimiento y funciona mejor en español con una formulación natural que mantenga la reprensión de Rubén.
- source_word: אָמַרְתִּי
  english_pob_choice: I tell
  chosen_spanish: les dije
  alternatives_spanish:
  - les había dicho
  - les advertí
  lexicon: HALOT
  rationale: El perfecto hebreo se refleja con pasado simple en español, suficiente para el reproche retrospectivo del contexto.
- source_word: אַל תֶּחֶטְאוּ
  english_pob_choice: Do not sin
  chosen_spanish: No pequen
  alternatives_spanish:
  - No cometan pecado
  - No hagan mal
  lexicon: HALOT
  rationale: «Pecar» preserva el peso moral y teológico de חטא mejor que una paráfrasis general como «hacer mal».
- source_word: בַיֶּלֶד
  english_pob_choice: against the boy
  chosen_spanish: contra el muchacho
  alternatives_spanish:
  - contra el niño
  - con respecto al muchacho
  lexicon: HALOT
  rationale: Con חטא más ב, la idea es actuar en contra de alguien; «muchacho» reproduce el tono de referencia familiar y contextual sin sonar rígido.
- source_word: וְלֹא שְׁמַעְתֶּם
  english_pob_choice: But you did not listen
  chosen_spanish: Pero ustedes no escucharon
  alternatives_spanish:
  - Y no escucharon
  - Pero no obedecieron
  lexicon: HALOT
  rationale: «Escuchar» conserva el sentido básico de שׁמע; el contraste adversativo queda claro con «Pero».
- source_word: וְגַם
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Y además
  - Entonces ahora
  lexicon: HALOT
  rationale: La expresión marca el paso a la consecuencia presente; «Y ahora» es la equivalencia más directa y natural en español.
- source_word: דָּמוֹ
  english_pob_choice: his blood
  chosen_spanish: su sangre
  alternatives_spanish:
  - su sangre derramada
  - la sangre de él
  lexicon: HALOT
  rationale: Se mantiene la imagen hebrea de sangre como metonimia de muerte violenta o responsabilidad por ella.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: miren
  alternatives_spanish:
  - he aquí
  - vean
  lexicon: HALOT
  rationale: «Miren» conserva la deíxis y es más idiomático que «he aquí» en español moderno, sin perder solemnidad.
- source_word: נִדְרָשׁ
  english_pob_choice: is being required
  chosen_spanish: está siendo requerida
  alternatives_spanish:
  - está siendo demandada
  - se está requiriendo
  lexicon: HALOT
  rationale: 'El pasivo refleja el hebreo y conserva la tensión judicial: la sangre es tratada como asunto que reclama rendición de cuentas, sin explicitar el agente.'
theological_decisions:
- issue: Agente implícito en la fórmula pasiva de retribución
  english_pob_reading: Kept the passive without naming God
  chosen_spanish_reading: 'Se mantiene el pasivo sin nombrar a Dios: «está siendo requerida»'
  alternative_spanish_readings:
  - está siendo requerida por Dios
  - se les está pidiendo cuenta por su sangre
  rationale: El hebreo deja el agente sin expresar. En el contexto se sobreentiende la dimensión de justicia divina, pero la traducción no debe resolver explícitamente esa implicación.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla'
- issue: Valor moral de חטא en la amonestación de Rubén
  english_pob_reading: Do not sin against the boy
  chosen_spanish_reading: «No pequen contra el muchacho»
  alternative_spanish_readings:
  - No cometan mal contra el muchacho
  - No ofendan al muchacho
  rationale: «Pecar» conserva el peso moral y evita rebajar la advertencia a una mera incorrección social.
  doctrine_reference: Lexical/theological force of חטא in narrative admonition
translation_notes:
  revision_awareness: 'La redacción sigue el último estado revisado del audit trail: se conservó el segundo לֵאמֹר mediante «diciendo», y se prefirió un equivalente más formal para la deíxis de הִנֵּה sin perder legibilidad en español.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando no aplica a este versículo; aquí no aparece el nombre divino.
  - Se mantuvo «muchacho» para בַיֶּלֶד por coherencia con el registro narrativo y la referencia contextual a José.
  - Se conservó el pasivo en «está siendo requerida» para no añadir un agente ausente en el hebreo.
  - Se evitó «obedecer» para שׁמע, porque el verbo básico del hebreo aquí es «escuchar», aunque el contexto implique desobediencia.
