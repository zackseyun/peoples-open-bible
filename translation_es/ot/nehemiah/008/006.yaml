translation:
  language: es
  text: 'Y bendijo Esdras a Yahvé, el gran Dios; y todo el pueblo respondió: «Amén, amén[a]», mientras alzaban sus manos. Entonces se inclinaron y adoraron a Yahvé con el rostro en tierra.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Amén, amén», una respuesta litúrgica repetida de asentimiento.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיְבָרֶךְ
  english_pob_choice: blessed
  chosen_spanish: bendijo
  alternatives_spanish:
  - alabó
  - bendijo en alabanza
  lexicon: HALOT
  rationale: En בנ״ר en piel, con Dios como objeto, el valor puede ser ‘bendecir’ en dirección a Dios, no solo ‘bendecir’ a alguien que recibe beneficio. ‘Bendijo’ conserva el giro bíblico y la forma verbal del texto sin forzar una paráfrasis.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio del pacto, no un título. La traducción española conserva ese nombre como ‘Yahvé’, según el criterio del proyecto, en lugar de sustituirlo por ‘SEÑOR’.
- source_word: הָאֱלֹהִים הַגָּדוֹל
  english_pob_choice: the great God
  chosen_spanish: el gran Dios
  alternatives_spanish:
  - el Dios grande
  - Dios, el grande
  lexicon: HALOT
  rationale: La construcción apposicional subraya la grandeza de Dios. ‘El gran Dios’ reproduce de manera natural y fiel la frase nominal, manteniendo el énfasis del hebreo sin añadir matices no presentes.
- source_word: וַיַּעֲנוּ
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondieron
  lexicon: HALOT
  rationale: Aunque el hebreo está en plural, en español se ajusta al sujeto colectivo ‘todo el pueblo’ con un verbo singular natural en la frase introductoria de cita. La idea central es la respuesta coral del pueblo; el contenido litúrgico se expresa en la cita siguiente.
- source_word: אָמֵן אָמֵן
  english_pob_choice: Amen, Amen
  chosen_spanish: Amén, amén
  alternatives_spanish:
  - Así sea, así sea
  - Verdaderamente, verdaderamente
  lexicon: HALOT
  rationale: Se conserva la transliteración litúrgica tradicional, tal como lo hizo el POB en inglés. La repetición mantiene el valor enfático de asentimiento y aprobación comunitaria.
- source_word: בְּמֹעַל יְדֵיהֶם
  english_pob_choice: while lifting up their hands
  chosen_spanish: mientras alzaban sus manos
  alternatives_spanish:
  - mientras levantaban las manos
  - con el levantamiento de sus manos
  lexicon: HALOT
  rationale: La frase hebrea indica acción concomitante y gesto ritual. ‘Alzaban sus manos’ es natural en español y preserva el movimiento de elevación sin introducir una construcción demasiado literal o técnica.
- source_word: וַיִּקְּדוּ
  english_pob_choice: bowed down
  chosen_spanish: se inclinaron
  alternatives_spanish:
  - se postraron
  - se encorvaron
  lexicon: HALOT
  rationale: קדד expresa doblarse o inclinarse profundamente. ‘Se inclinaron’ mantiene la acción corporal sin duplicar de manera pesada el gesto del verbo siguiente.
- source_word: וַיִּשְׁתַּחֲוֻּ
  english_pob_choice: worshiped
  chosen_spanish: adoraron
  alternatives_spanish:
  - se postraron en adoración
  - rindieron culto
  lexicon: HALOT
  rationale: El verbo implica postración como acto de adoración. En español, ‘adoraron’ conserva el sentido devocional y permite distinguirlo del verbo anterior de inclinación corporal.
- source_word: אַפַּיִם אָרְצָה
  english_pob_choice: with their faces to the ground
  chosen_spanish: con el rostro en tierra
  alternatives_spanish:
  - con la cara en tierra
  - boca abajo
  lexicon: HALOT
  rationale: El hebreo describe una postración completa, literalmente ‘narices/cara hacia la tierra’. ‘Con el rostro en tierra’ comunica esa postura de manera fiel, digna y idiomática en español.
theological_decisions:
- issue: Forma de traducir יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Se conserva el nombre divino en español como ‘Yahvé’ para reflejar el nombre personal del pacto, en línea con la política del proyecto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Relación entre la inclinación y la adoración
  english_pob_reading: bowed down and worshiped
  chosen_spanish_reading: se inclinaron y adoraron
  alternative_spanish_readings:
  - se postraron y adoraron
  - se inclinaron y se postraron
  rationale: 'El hebreo distingue dos verbos sucesivos: uno para inclinarse y otro para rendir adoración. La traducción los mantiene diferenciados para no perder la acumulación de gestos reverentes del pasaje.'
  doctrine_reference: Énfasis narrativo-litúrgico del texto masorético
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se registran cambios posteriores en el audit trail inglés, y la versión española sigue de cerca la decisión óptima ya aprobada, preservando el nombre divino, la respuesta litúrgica repetida y la distinción entre inclinarse y adorar.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ de forma consistente con el criterio del proyecto para el Tetragrámaton.
  - Se preservó ‘Amén, amén’ como fórmula litúrgica transliterada, no traducida.
  - Se distinguieron los dos verbos finales (‘se inclinaron’ / ‘adoraron’) para reflejar la doble acción del hebreo.
  - El registro busca ser bíblico y actual, evitando arcaísmos innecesarios sin perder solemnidad.
