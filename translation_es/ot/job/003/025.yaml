translation:
  language: es
  text: Porque el pavor que temí[a] me ha sobrevenido,[b] y lo que temía me ha venido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «la cosa que temía me ha sobrevenido». El hebreo usa un sustantivo y un verbo de la misma raíz («pavor» / «temí») para dar énfasis.'
    reason: lexical_alternative
  - marker: b
    text: La primera cláusula probablemente significa «me ha sobrevenido» o «me ha alcanzado», mientras que la segunda dice más literalmente «me ha venido», preservando una leve variación en el paralelismo hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque es que
  lexicon: HALOT
  rationale: Aquí כִּי introduce la explicación de la queja anterior; «Porque» conserva bien el valor causal/explanatorio en español natural.
- source_word: פַחַד / פָּחַדְתִּי
  english_pob_choice: the dread I dreaded
  chosen_spanish: el pavor que temí
  alternatives_spanish:
  - el temor que temí
  - el miedo que sentí
  - lo que temía
  lexicon: HALOT
  rationale: La construcción sustantivo + verbo cognado intensifica la idea. «Pavor» mantiene la fuerza de פחד y «que temí» conserva la repetición enfática sin volver la frase demasiado rígida.
- source_word: וַיֶּאֱתָיֵנִי
  english_pob_choice: has come upon me
  chosen_spanish: me ha sobrevenido
  alternatives_spanish:
  - me ha sobrecogido
  - ha caído sobre mí
  - me ha venido
  lexicon: HALOT
  rationale: El verbo expresa que una calamidad llega y recae sobre la persona. «Sobrevenido» transmite mejor la irrupción de algo adverso que un simple «llegado», y mantiene la diferencia con la segunda cláusula.
- source_word: וַאֲשֶׁר
  english_pob_choice: and what
  chosen_spanish: y lo que
  alternatives_spanish:
  - y aquello que
  - y lo que era que
  lexicon: HALOT
  rationale: «Y lo que» es la forma más natural en español para introducir el paralelo relativo sin perder la relación con la primera cláusula.
- source_word: יָגֹרְתִּי
  english_pob_choice: I feared
  chosen_spanish: me daba miedo
  alternatives_spanish:
  - temía
  - lo temía
  - me aterraba
  lexicon: HALOT
  rationale: גור comunica miedo/dread. «Me daba miedo» suena idiomático y mantiene el matiz de temor sostenido; además ayuda a distinguir esta cláusula de la anterior, que es más intensa.
- source_word: יָבֹא לִי
  english_pob_choice: has come to me
  chosen_spanish: me ha venido
  alternatives_spanish:
  - me ha llegado
  - ha venido a mí
  - me ha acontecido
  lexicon: HALOT
  rationale: La imagen básica es de algo que «viene» hacia el sujeto. «Me ha venido» conserva esa sencillez y la variación paralela respecto de «me ha sobrevenido».
translation_notes:
  revision_awareness: 'Se mantuvo la lectura ya aprobada en inglés: paralelismo con leve variación semántica entre el verbo fuerte de la primera cláusula y el más simple de la segunda, y la intensificación por sustantivo + verbo cognado en la primera mitad del verso.'
  spanish_consistency_notes:
  - Se prefirió «pavor» para reflejar la intensidad de פַחַד sin convertirlo en una paráfrasis.
  - Se evitó uniformar ambas cláusulas con el mismo verbo español para conservar la variación del hebreo.
  - Se mantuvo un español sobrio y publicable, evitando arcaismos innecesarios.
