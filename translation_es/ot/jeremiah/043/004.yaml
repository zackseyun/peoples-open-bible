translation:
  language: es
  text: Pero Johanán hijo de Carea[a], y todos los comandantes de las fuerzas, y todo el pueblo, no escucharon la voz de Yahvé, para permanecer en la tierra de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «a la voz de Yahvé»; la expresión también puede implicar «obedecer a Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא
  english_pob_choice: But ... did not
  chosen_spanish: Pero ... no
  alternatives_spanish:
  - Y ... no
  - Y entonces ... no
  lexicon: HALOT
  rationale: El valor conjuntivo con negación introduce contraste narrativo; 'Pero' conserva ese matiz adversativo de forma natural en español.
- source_word: שָׁמַע
  english_pob_choice: listen to
  chosen_spanish: escuchar
  alternatives_spanish:
  - obedecer
  - oír
  lexicon: HALOT
  rationale: Con בְּקוֹל, el verbo conserva la imagen concreta de atender a una voz. 'Escuchar' mantiene esa fuerza y deja inferida la desobediencia por el contexto.
- source_word: יוֹחָנָן בֶּן־קָרֵחַ
  english_pob_choice: Johanan son of Kareah
  chosen_spanish: Jonatán hijo de Carea
  alternatives_spanish:
  - Johanan hijo de Carea
  - Jonatán, hijo de Carea
  lexicon: conventional Spanish transliteration
  rationale: Se adapta el nombre propio a la forma española habitual de transliteración. 'Hijo de' refleja de manera natural el patronímico hebreo.
- source_word: שָׂרֵי הַחֲיָלִים
  english_pob_choice: the commanders of the forces
  chosen_spanish: los comandantes de las fuerzas
  alternatives_spanish:
  - los capitanes de las fuerzas
  - los oficiales del ejército
  - los comandantes de las tropas
  lexicon: HALOT
  rationale: '''Comandantes'' reproduce bien el rango de liderazgo militar; ''fuerzas'' conserva el plural del hebreo sin reducirlo a una sola entidad militar.'
- source_word: כָל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la gente
  - toda la población
  lexicon: HALOT
  rationale: '''Pueblo'' es la forma más natural y abarcadora en español para el colectivo hebreo, sin perder la referencia comunitaria.'
- source_word: בְּקוֹל יְהוָה
  english_pob_choice: to the voice of Yahweh
  chosen_spanish: la voz de Yahvé
  alternatives_spanish:
  - la voz de Yahweh
  - la voz del SEÑOR
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea literal de 'voz'. No se sustituye por 'palabra' porque el hebreo usa explícitamente 'voz' y la audit trail inglesa también preserva esa concreción.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: 'DOCTRINE.md contested terms: יְהוָה YHWH'
  rationale: 'Se sigue el estándar del POB en español para el nombre divino: ''Yahvé'', transliterando el Tetragrámaton en lugar de ocultarlo con un título.'
- source_word: לָשֶׁבֶת
  english_pob_choice: to remain
  chosen_spanish: para quedarse
  alternatives_spanish:
  - para permanecer
  - para morar
  lexicon: HALOT
  rationale: En este contexto la idea es seguir residiendo en la tierra, no simplemente habitar en abstracto. 'Quedarse' es claro y natural en español.
- source_word: בְּאֶרֶץ יְהוּדָה
  english_pob_choice: in the land of Judah
  chosen_spanish: en la tierra de Judá
  alternatives_spanish:
  - en la tierra de Judah
  - en Judá
  lexicon: HALOT
  rationale: '''Tierra de Judá'' mantiene el sentido territorial de אֶרֶץ y evita modernizarlo indebidamente a ''Judea''.'
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. La forma española 'Yahvé' preserva el nombre del pacto sin sustituirlo por un título como 'Señor'.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación entre 'oír/escuchar' y 'obedecer' en שׁמע
  english_pob_reading: listen to
  chosen_spanish_reading: escuchar
  alternative_spanish_readings:
  - obedecer
  - oír
  rationale: La frase hebrea 'escuchar la voz de Yahvé' conserva la metáfora auditiva. 'Escuchar' mantiene la tensión lexical; 'obedecer' sería una interpretación válida en contexto, pero más explícita de lo que el hebreo dice literalmente.
  doctrine_reference: HALOT / uso idiomático de שׁמע con בְּקוֹל
translation_notes:
  revision_awareness: La revisión inglesa reciente añadió una coma antes de la frase infinitiva para claridad, sin cambiar el contenido. En español se refleja naturalmente con la pausa antes de 'para quedarse'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יְהוָה.
  - Se conserva la imagen literal de 'voz' en vez de reemplazarla por 'palabra'.
  - '''Comandantes de las fuerzas'' sigue el registro militar del original sin forzar una equivalencia más técnica que el hebreo no exige.'
  - El patronímico se adapta a español natural, sin perder el vínculo genealógico.
