translation:
  language: es
  text: ¿Quién me llevará a la ciudad fortificada? ¿Quién me conducirá hasta Edom?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Quién me conducirá a la ciudad fortificada? ¿Quién me ha conducido hasta Edom?». El hebreo permite matices aspectuales ligeramente distintos; el texto principal conserva el paralelismo poético como dos preguntas orientadas al futuro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién es el que
  - ¿Quién será el que
  lexicon: HALOT
  rationale: El interrogativo introduce dos preguntas retóricas seguidas; en español, «¿Quién» es la forma más natural y directa para conservar el tono poético.
- source_word: יֹבִלֵנִי
  english_pob_choice: will bring me
  chosen_spanish: me llevará
  alternatives_spanish:
  - me traerá
  - me conducirá
  lexicon: HALOT
  rationale: La forma hiphil de יבל puede expresar llevar/traer/conducir. «Me llevará» conserva el sentido direccional hacia un destino y mantiene el paralelismo con la segunda pregunta. «Me conducirá» queda disponible en la nota como alternativa semántica cercana.
- source_word: עִיר מָצוֹר
  english_pob_choice: the fortified city
  chosen_spanish: la ciudad fortificada
  alternatives_spanish:
  - la ciudad fuerte
  - la ciudad de fortificación
  - la ciudad sitiada
  lexicon: HALOT
  rationale: La construcción nominal describe una ciudad caracterizada por fortificación. «Ciudad fortificada» refleja bien esa cualidad de defensa sin añadir la idea de asedio que no está explicitada por el hebreo.
- source_word: נָחַנִי
  english_pob_choice: will lead me
  chosen_spanish: me conducirá
  alternatives_spanish:
  - me llevará
  - me guiará
  - me ha conducido
  lexicon: HALOT
  rationale: נחה significa llevar/guíar/conducir. Dado el paralelismo poético y la lectura prospectiva preservada por la POB inglesa, «me conducirá» funciona naturalmente en español y deja abierta la leve tensión aspectual del hebreo, sin convertirla en un pretérito cerrado.
- source_word: עַד אֱדוֹם
  english_pob_choice: as far as Edom
  chosen_spanish: hasta Edom
  alternatives_spanish:
  - a Edom
  - hasta el límite de Edom
  - tan lejos como Edom
  lexicon: HALOT
  rationale: עַד indica alcance o punto de llegada. «Hasta Edom» es idiomático en español y comunica bien el límite espacial del recorrido; la POB inglesa opta por «as far as» para reflejar ese matiz de extensión.
- source_word: אֱדוֹם
  english_pob_choice: Edom
  chosen_spanish: Edom
  alternatives_spanish:
  - Idumea
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado de forma estándar. «Idumea» sería una forma tradicional, pero no es la opción más directa para una traducción transparente desde el hebreo.
translation_notes:
  revision_awareness: El texto inglés auditado preserva el paralelismo poético con dos preguntas de orientación prospectiva y añade una nota que admite una posible lectura alternativa del segundo verbo como perfecto («has led me»). La versión española sigue esa decisión principal, usando futuro simple en ambas preguntas para mantener la simetría y la fuerza retórica, sin borrar la tensión aspectual indicada en la nota.
  spanish_consistency_notes:
  - Se mantuvo «Edom» como nombre propio uniforme.
  - Se evitó «SEÑOR» porque no aparece el tetragrámaton en este versículo.
  - «ciudad fortificada» conserva mejor el valor descriptivo de עִיר מָצוֹר que una paráfrasis más libre.
  - La nota reproduce la alternativa aspectual documentada por la POB inglesa para no perder la ambigüedad hebrea.
