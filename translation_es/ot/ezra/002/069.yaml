translation:
  language: es
  text: 'Según su capacidad, dieron al tesoro para la obra: 61.000 dáricos de oro[a], 5.000 minas de plata[b] y 100 túnicas sacerdotales.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «monedas de oro»; el término hebreo se refiere específicamente a los dáricos persas.
    reason: lexical_alternative
  - marker: b
    text: La mina era una antigua unidad de peso y de dinero.
    reason: cultural_note
lexical_decisions:
- source_word: כְּכֹחָם
  english_pob_choice: According to their ability
  chosen_spanish: Según su capacidad
  alternatives_spanish:
  - conforme a su fuerza
  - de acuerdo con sus recursos
  - según lo que podían
  lexicon: HALOT
  rationale: El valor de כְ con כֹּחַ expresa medida o proporción. «Según su capacidad» conserva esa relación de medida de modo natural en español y evita restringir indebidamente el sentido a fuerza física.
- source_word: נָתְנוּ
  english_pob_choice: they gave
  chosen_spanish: dieron
  alternatives_spanish:
  - aportaron
  - entregaron
  lexicon: HALOT
  rationale: El verbo básico es פשוט 'dar'. «Dieron» reproduce el valor simple del hebreo sin añadir la idea de contribución organizada que implicarían «aportaron» o «contribuyeron».
- source_word: לְאוֹצַר הַמְּלָאכָה
  english_pob_choice: to the treasury for the work
  chosen_spanish: al tesoro para la obra
  alternatives_spanish:
  - al tesoro de la obra
  - al almacén de la obra
  - al fondo para la obra
  lexicon: HALOT
  rationale: אוצר puede ser tesoro o depósito; מְלָאכָה aquí se refiere al proyecto de reconstrucción. «Tesoro para la obra» comunica la destinación de los fondos sin volver el hebreo demasiado rígido.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro fino
  - de oro
  lexicon: HALOT
  rationale: El sustantivo denota el metal precioso. En español, «de oro» funciona mejor con «dáricos», mientras que el valor de material queda claro sin añadir matiz no presente en el hebreo.
- source_word: דַּרְכְּמוֹנִים
  english_pob_choice: darics
  chosen_spanish: dáricos
  alternatives_spanish:
  - dracmas
  - monedas de oro
  lexicon: HALOT
  rationale: El término hebreo alude específicamente a la moneda persa conocida como dárico. «Dáricos» preserva la referencia histórica más exactamente que un genérico como «monedas de oro».
- source_word: שֵׁשׁ רִבֹּאות וָאֶלֶף
  english_pob_choice: 61,000
  chosen_spanish: '61.000'
  alternatives_spanish:
  - sesenta y un mil
  lexicon: HALOT
  rationale: La expresión hebrea equivale literalmente a seis miríadas y mil; el número moderno 61.000 es exacto y más legible en español en una lista de ofrendas.
- source_word: וְכֶסֶף
  english_pob_choice: and ... of silver
  chosen_spanish: de plata
  alternatives_spanish:
  - y plata
  - de dinero
  lexicon: HALOT
  rationale: En español, «5.000 minas de plata» expresa con claridad que la unidad de peso/valor está calificada por el metal. Se evita dejar «plata» suelto, que podría sonar incompleto.
- source_word: מָנִים
  english_pob_choice: minas
  chosen_spanish: minas
  alternatives_spanish:
  - manas
  - manehes
  lexicon: HALOT
  rationale: «Mina» es la equivalencia histórica estándar para esta unidad de peso y valor. Se mantiene el término antiguo para respetar la precisión cultural del texto.
- source_word: חֲמֵשֶׁת אֲלָפִים
  english_pob_choice: 5,000
  chosen_spanish: '5.000'
  alternatives_spanish:
  - cinco mil
  lexicon: HALOT
  rationale: El cardinal es simple; el formato numérico favorece la claridad en una enumeración de donativos, en línea con el tratamiento del inglés POB.
- source_word: וְכָתְנֹת כֹּהֲנִים
  english_pob_choice: and 100 priests’ tunics
  chosen_spanish: y 100 túnicas para los sacerdotes
  alternatives_spanish:
  - y 100 túnicas sacerdotales
  - y 100 vestidos de los sacerdotes
  - y 100 prendas para los sacerdotes
  lexicon: HALOT
  rationale: כֻּתֹּנֶת refiere a una túnica o prenda larga. «Túnicas para los sacerdotes» conserva el tipo de prenda y evita ampliar indebidamente a «vestiduras» o «prendas» más generales.
- source_word: מֵאָה
  english_pob_choice: '100'
  chosen_spanish: '100'
  alternatives_spanish:
  - cien
  lexicon: HALOT
  rationale: Se conserva el formato numérico del resto del versículo por consistencia y legibilidad.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto final permanece en alta concordancia con el audit trail inglés y no requiere ajustes por variantes documentadas.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conservaron unidades antiguas («dáricos», «minas») para no perder la especificidad histórica del hebreo.
  - Se usaron cifras arábigas para alineación visual con el estilo del POB inglés y mejorar la lectura en una lista de ofrendas.
  - No se introdujeron glosas interpretativas sobre la naturaleza del «tesoro» o de la «obra» más allá de lo que permite el hebreo.
