translation:
  language: es
  text: Así pues[a], para que no se cayera, tomó medidas por la imagen, sabiendo que no puede ayudarse a sí misma; pues es una imagen y necesita ayuda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ídolo» para εἰκών («imagen»); el griego dice literalmente «imagen» o «semejanza», aunque el contexto se refiere a un objeto de culto fabricado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα μὲν οὖν μὴ καταπέσῃ
  english_pob_choice: lest it fall
  chosen_spanish: para que no cayera
  alternatives_spanish:
  - a fin de que no cayera
  - para que no se desplomara
  - no sea que cayera
  lexicon: LSJ
  rationale: La construcción con ἵνα + μή expresa finalidad preventiva. En español, 'para que no cayera' comunica de forma natural el mismo valor de prevención, manteniendo el tono formal sin sonar forzado.
- source_word: προενόησεν
  english_pob_choice: he made provision for it
  chosen_spanish: tomó precauciones para él
  alternatives_spanish:
  - proveyó de antemano para él
  - hizo provisión para él
  - previó y aseguró su sostén
  lexicon: LSJ
  rationale: El verbo implica previsión práctica y acción anticipada. 'Tomó precauciones' conserva la idea de medidas preventivas concretas, que en este contexto alude a asegurar el soporte del objeto.
- source_word: αὐτοῦ
  english_pob_choice: for it
  chosen_spanish: para él
  alternatives_spanish:
  - para ello
  - para él mismo
  - respecto de él
  lexicon: Greek grammar
  rationale: El referente gramatical es masculino, aunque en español el objeto fabricado suele referirse naturalmente como masculino. Se mantiene 'él' para respetar la forma gramatical del pronombre griego, sin perder la referencia al objeto.
- source_word: εἰδὼς
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - porque sabía
  - pues sabía
  - ya que sabía
  lexicon: LSJ
  rationale: El participio expresa una causa concomitante. 'Sabiendo' conserva la relación participial y el encadenamiento lógico del argumento.
- source_word: ἀδυνατεῖ ἑαυτῷ βοηθῆσαι
  english_pob_choice: it is unable to help itself
  chosen_spanish: no puede ayudarse a sí mismo
  alternatives_spanish:
  - es incapaz de ayudarse a sí mismo
  - no tiene poder para socorrerse a sí mismo
  - no puede venir en su propia ayuda
  lexicon: LSJ
  rationale: '''No puede ayudarse a sí mismo'' reproduce la imposibilidad expresada por ἀδυνατεῖ y la idea de ayuda/auxilio de βοηθέω, con una formulación natural en español.'
- source_word: εἰκὼν
  english_pob_choice: image
  chosen_spanish: imagen
  alternatives_spanish:
  - ídolo
  - figura
  - representación
  lexicon: LSJ
  rationale: Se conserva 'imagen' para reflejar el léxico griego εἰκών, como en el inglés POB. Aunque el contexto es idolátrico, el término explícito es 'imagen', y esa literalidad sostiene la ironía del pasaje.
- source_word: χρείαν ἔχει βοηθείας
  english_pob_choice: has need of help
  chosen_spanish: necesita ayuda
  alternatives_spanish:
  - tiene necesidad de ayuda
  - requiere ayuda
  - tiene necesidad de auxilio
  lexicon: LSJ
  rationale: 'El giro idiomático significa literalmente ''tener necesidad de ayuda''. En español, ''necesita ayuda'' comunica con claridad la misma ironía: la imagen, en vez de ayudar, requiere ser ayudada.'
theological_decisions:
- issue: 'εἰκών en contexto antiidolátrico: ''imagen'' vs. ''ídolo'''
  english_pob_reading: Rendered as 'image' rather than 'idol' in the main text
  chosen_spanish_reading: '''imagen'' en el texto principal'
  alternative_spanish_readings:
  - '''ídolo'''
  - '''imagen/ídolo'' con nota'
  rationale: El contexto deja claro que se trata de un objeto idolátrico, pero la palabra griega es εἰκών ('imagen'). Mantener 'imagen' preserva la precisión lexical y la ironía del pasaje; 'ídolo' sería una interpretación contextual válida, pero no estrictamente necesaria en la línea principal.
  doctrine_reference: Primacía del texto fuente sobre la tradición de traducción; preservación de tensiones léxicas cuando el contexto las sostiene.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail inglés: se prefirió una formulación más literal para la prevención (''para que no cayera'' en lugar de una paráfrasis más libre) y se omitió cualquier intensificador no explícito como ''solo''. También se preservó ''imagen'' en lugar de ''ídolo'' en el texto principal, tal como exige la decisión lexical documentada.'
  spanish_consistency_notes:
  - Se emplea 'imagen' de manera consistente para εἰκών, con nota alternativa para 'ídolo'.
  - '''Ayuda'' se usa para βοηθείας/βοηθῆσαι, manteniendo el paralelo irónico entre necesitar ayuda y pretender sostener la imagen.'
  - Se evita un calco excesivo; la sintaxis española busca ser natural sin perder el valor preventivo del griego.
