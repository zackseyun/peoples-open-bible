translation:
  language: es
  text: Entonces David y sus hombres subieron e hicieron incursiones contra los gesureos[a], los girzitas y los amalecitas, porque estos eran los habitantes de la tierra desde tiempos antiguos, camino a Shur[b], hasta la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “los gezritas”. El etnónimo hebreo aquí es textualmente incierto en la tradición de transliteración; esta versión sigue la forma consonántica representada en el texto dado como “girzitas”.
    reason: lexical_alternative
  - marker: b
    text: O “al ir a Shur”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - fueron hacia arriba
  - ascendieron
  - subieron de allí
  lexicon: HALOT
  rationale: עלה en este relato conserva el movimiento direccional de 'went up'; en español, 'subieron' reproduce de forma natural esa subida o avance geográfico sin borrar el matiz verbal.
- source_word: וַיִּפְשְׁטוּ
  english_pob_choice: made raids
  chosen_spanish: hicieron incursiones
  alternatives_spanish:
  - incursionaron
  - hicieron correrías
  - saquearon
  lexicon: HALOT
  rationale: פָּשַׁט en contexto militar describe una acción de incursión/razzia más que un mero 'atacar'; 'hicieron incursiones' conserva el sentido de operación militar iterativa y no lo reduce a una sola embestida.
- source_word: אֶל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - a
  - hacia
  lexicon: HALOT
  rationale: Aunque אֶל normalmente significa 'a/hacia', con פָּשַׁט introduce el objetivo hostil; 'contra' expresa en español ese valor contextual de agresión de forma clara.
- source_word: הַגְּשׁוּרִי
  english_pob_choice: the Geshurites
  chosen_spanish: los gesureos
  alternatives_spanish:
  - los guesureos
  - los gesuritas
  lexicon: HALOT
  rationale: Para un etnónimo, 'gesureos' mantiene la referencia al grupo étnico y sigue la forma castellana natural; se evita una calca inglesa innecesaria.
- source_word: הגרזי
  english_pob_choice: the Girzites
  chosen_spanish: los girzitas
  alternatives_spanish:
  - los girzeos
  - los gerzitas
  - los gezritas
  lexicon: HALOT
  rationale: El hebreo consonántico es textualmente incierto en la tradición de transliteración, pero el POB inglés opta por una forma cercana al texto consonántico representado. 'Girzitas' conserva esa cautela y mantiene el carácter de nombre de pueblo.
- source_word: הָעֲמָלֵקִי
  english_pob_choice: the Amalekites
  chosen_spanish: los amalecitas
  alternatives_spanish:
  - el pueblo amalecita
  - los amalequitas
  lexicon: HALOT
  rationale: '''Amalecitas'' es el etnónimo estándar en español y refleja adecuadamente el grupo étnico mencionado en hebreo.'
- source_word: כִּי הֵנָּה יֹשְׁבוֹת הָאָרֶץ
  english_pob_choice: for these were the inhabitants of the land
  chosen_spanish: porque estos eran los habitantes de la tierra
  alternatives_spanish:
  - porque ellas eran las habitantes de la tierra
  - pues estos habitaban la tierra
  lexicon: HALOT
  rationale: El demostrativo plural femenino y el participio femenino plural se reflejan mejor con 'estos eran', siguiendo la decisión del POB inglés de mantener el demostrativo explícito; en español 'estos' puede referirse colectivamente a pueblos/tribus sin forzar género masculino personal.
- source_word: מֵעוֹלָם
  english_pob_choice: from ancient times
  chosen_spanish: desde tiempos antiguos
  alternatives_spanish:
  - desde antiguo
  - desde hace mucho tiempo
  - desde la antigüedad
  lexicon: HALOT
  rationale: עוֹלָם aquí señala antigüedad, no eternidad metafísica; 'desde tiempos antiguos' expresa bien la duración pasada y suena natural en español bíblico contemporáneo.
- source_word: בּוֹאֲךָ שׁוּרָה
  english_pob_choice: as you go to Shur
  chosen_spanish: al ir tú a Shur
  alternatives_spanish:
  - cuando vas a Shur
  - en tu camino a Shur
  - al llegar a Shur
  lexicon: HALOT
  rationale: La construcción infinitiva con sufijo de segunda persona tiene valor geográfico convencional. 'Al ir tú a Shur' conserva la dirección y el matiz de referencia espacial; se mantiene 'tú' por la forma pronominal del hebreo, aunque en español sea estilísticamente marcado.
- source_word: וְעַד אֶרֶץ מִצְרָיִם
  english_pob_choice: even to the land of Egypt
  chosen_spanish: hasta la tierra de Egipto
  alternatives_spanish:
  - y hasta la tierra de Egipto
  - así como hasta la tierra de Egipto
  - incluso hasta la tierra de Egipto
  lexicon: HALOT
  rationale: El hebreo marca extensión de límite; 'hasta la tierra de Egipto' comunica el alcance geográfico con claridad, mientras que 'even to' del inglés se resuelve naturalmente como 'hasta' en español.
theological_decisions:
- issue: Referencia territorial y etnónimos como pueblos concretos
  english_pob_reading: The verse names specific ethnic groups and geographic limits without doctrinal expansion.
  chosen_spanish_reading: El versículo nombra pueblos concretos y límites geográficos sin ampliación doctrinal.
  alternative_spanish_readings:
  - El versículo podría leerse de forma más general como una simple lista de territorios.
  - Podría suavizarse la concreción étnica con términos más vagos.
  rationale: No hay aquí una afirmación teológica debatible; se preserva la concreción histórica y geográfica del texto, evitando generalizaciones que borren el dato narrativo.
  doctrine_reference: Historia narrativa / geografía bíblica
translation_notes:
  revision_awareness: La versión inglesa POB fue revisada para cambiar 'they were' por 'these were' a fin de reflejar más directamente el demostrativo hebreo. La redacción española conserva ese mismo énfasis con 'estos eran'. También se mantiene el valor militar de פשט como 'hacer incursiones' y la extensión geográfica final 'hasta la tierra de Egipto'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como término por defecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se mantienen etnónimos en plural castellano y se evita sustituirlos por términos eclesiásticos o interpretativos.
  - '''Incursiones'' preserva el matiz militar de פשט sin reducirlo a un ataque genérico.'
  - '''Desde tiempos antiguos'' traduce el valor temporal de מֵעוֹלָם, no una noción de eternidad.'
  - La nota del marcador b preserva la alternativa espacial que el inglés POB documenta para el límite geográfico.
