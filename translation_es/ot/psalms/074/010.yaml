revisions:
- from: ¿Hasta cuándo[a], oh Dios, reprochará el enemigo? ¿Hasta cuándo revile el adversario tu nombre para siempre?
  to: ¿Hasta cuándo[a], oh Dios, reprochará el adversario? ¿Despreciará el enemigo tu nombre para siempre?
