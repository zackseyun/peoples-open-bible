translation:
  language: es
  text: No destruyeron a los pueblos que Yahvé les había dicho[a] que destruyeran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «No destruyeron a los pueblos que Yahvé les había dicho». El contenido de lo dicho queda elíptico en el hebreo y se entiende por el contexto; por eso aquí se explicita «que destruyeran».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  english_pob_choice: did not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No...
  - No llegaron a...
  lexicon: HALOT
  rationale: La negación simple del hebreo se expresa con la negación verbal española estándar. No se añade matiz aspectual que el hebreo no exige.
- source_word: הִשְׁמִידוּ
  english_pob_choice: destroy
  chosen_spanish: destruyeron
  alternatives_spanish:
  - aniquilaron
  - exterminaron
  - arrasaron
  lexicon: HALOT
  rationale: El hiphil de שׁמד expresa causar destrucción o eliminación. «Destruyeron» mantiene la fuerza semántica sin cargar el texto con una opción más extrema de lo que el hebreo documenta.
- source_word: אֶת הָעַמִּים
  english_pob_choice: the peoples
  chosen_spanish: a los pueblos
  alternatives_spanish:
  - a las naciones
  - a los pueblos de la tierra
  lexicon: HALOT
  rationale: עוֹמִים/עַמִּים en plural conserva la idea de grupos étnicos o colectivos humanos; en español «pueblos» refleja mejor ese plural que «naciones», que puede sonar más político-moderno.
- source_word: אֲשֶׁר
  english_pob_choice: whom
  chosen_spanish: que
  alternatives_spanish:
  - a quienes
  - los cuales
  lexicon: HALOT
  rationale: En español, la relativa con antecedente de persona/colectivo suele resolverse naturalmente con «que». La referencia a objeto directo queda clara por el contexto y por la presencia de la preposición de dependencia sobre el verbo principal.
- source_word: אָמַר
  english_pob_choice: had told
  chosen_spanish: les había dicho
  alternatives_spanish:
  - les había hablado
  - les había ordenado
  lexicon: HALOT
  rationale: אָמַר significa literalmente «decir». En contexto, el inglés POB opta por «had told» para reflejar la elipsis del contenido. En español, «les había dicho» conserva esa literalidad relativa sin convertir el verbo en «mandar/ordenar», que sería más interpretativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé», preservando el nombre divino en lugar de sustituirlo por un título.'
- source_word: לָהֶם
  english_pob_choice: them / to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - para ellos
  lexicon: HALOT
  rationale: El dativo pronominal hebreo se expresa de forma natural con «les» en español, manteniendo la relación indirecta sin sobrecargar la frase.
theological_decisions:
- issue: Contenido implícito del mandato divino
  english_pob_reading: English supplies 'to destroy' because the command's content is implicit in the Hebrew and clear from the context.
  chosen_spanish_reading: Se deja implícito en «les había dicho que destruyeran» sin añadir un objeto verbal distinto.
  alternative_spanish_readings:
  - No destruyeron a los pueblos que Yahvé les había dicho que debían destruir.
  - No destruyeron a los pueblos que Yahvé les había mandado destruir.
  rationale: El hebreo termina con «les había dicho», dejando el contenido elíptico; el contexto del salmo lo hace transparente. El español puede sostener esa elipsis de manera natural con una cláusula de completiva que conserva la tensión textual sin introducir una formulación más fuerte que el original.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve documented ellipsis and infer only what context warrants.'
translation_notes:
  revision_awareness: 'Se mantiene la lectura revisada del inglés POB: no se fuerza «mandó/ordenó» en el verbo אָמַר, pero sí se deja claro en español que el mandato es implícito por el contexto. La traducción conserva la elipsis sin oscurecerla.'
  spanish_consistency_notes:
  - «Yahvé» se usa conforme al estándar del proyecto para el Tetragrámaton.
  - «Pueblos» conserva el plural colectivo de עַמִּים mejor que «naciones» en este contexto.
  - Se evita «siempre» o cualquier intensificación no presente en el hebreo.
  - La nota al pie marca la elipsis del contenido verbal sin convertirla en una paráfrasis interpretativa.
