lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y vino
  alternatives_spanish:
  - Y sucedió
  - Y aconteció
  lexicon: HALOT
  rationale: El hebreo וַיְהִי introduce aquí la fórmula profética/secuencial. En español, «Y vino» conserva el movimiento idiomático de llegada de la palabra sin volver la frase pesada con un calco como «y aconteció».
- source_word: דְּבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la comunicación
  lexicon: HALOT
  rationale: En la fórmula profética דְּבַר יְהוָה, «la palabra» mantiene el giro establecido y deja abierto que se trata de una comunicación divina específica, no de una palabra cualquiera.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», conforme al criterio del proyecto, en lugar de sustituirlo por un título como «el SEÑOR».
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: En español, «de los ejércitos» transmite con claridad el título יְהוָה צְבָאוֹת y conserva mejor el valor imagístico que una paráfrasis como «Todopoderoso».
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  lexicon: HALOT
  rationale: La preposición indica al receptor del mensaje profético. «A mí» es la forma natural y precisa en español.
- source_word: לֵאמֹר
  english_pob_choice: '''saying:'''
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'y dijo:'
  - 'para decir:'
  lexicon: HALOT
  rationale: «Diciendo:» reproduce la fórmula introductoria del discurso en español formal y señala que el contenido continúa en el versículo siguiente.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה en la fórmula profética
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el nombre divino y no un sustituto. Por coherencia con el criterio del POB, se traduce con el nombre propio «Yahvé» para preservar la referencia al pacto y evitar la ocultación del Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del contexto inglés: no se requieren cambios respecto del sentido básico, y la fórmula profética se mantiene con el nombre divino explícito y la introducción del discurso en español natural.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar para יהוה.
  - «De los ejércitos» conserva el título צְבָאוֹת sin sustituirlo por un equivalente interpretativo.
  - La estructura sigue el orden profético del hebreo sin volverse un calco rígido.
