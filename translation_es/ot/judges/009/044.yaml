translation:
  language: es
  text: Y Abimélec y los jefes[a] que estaban con él avanzaron y se situaron a la entrada de la puerta de la ciudad; mientras tanto, los otros dos jefes[b] avanzaron contra todos los que estaban en el campo y los derribaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: “los jefes”. En este contexto militar, se refiere a los comandantes o responsables de las divisiones.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: “los dos jefes”. En contexto, probablemente se refiere a los dos grupos o divisiones restantes de las tres mencionadas en el versículo anterior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲבִימֶלֶךְ
  english_pob_choice: Abimelech
  chosen_spanish: Abimélec
  alternatives_spanish:
  - Abimelec
  - Abiméleq
  lexicon: WLC / onomastic correspondence
  rationale: Se conserva el nombre propio con una forma española transparente y de uso bíblico, sin cambiar el referente.
- source_word: הָרָאשִׁים
  english_pob_choice: the leaders
  chosen_spanish: los jefes
  alternatives_spanish:
  - los líderes
  - los jefes militares
  - los capitanes
  lexicon: HALOT
  rationale: רָאשִׁים significa literalmente 'cabezas', pero en este contexto militar designa a los comandantes o responsables del grupo. 'Jefes' mantiene la fuerza organizativa sin imponer un término eclesiástico.
- source_word: פָּשְׁטוּ
  english_pob_choice: rushed forward
  chosen_spanish: avanzaron
  alternatives_spanish:
  - irrumpieron
  - arremetieron
  - se lanzaron
  lexicon: HALOT
  rationale: El verbo expresa un movimiento rápido en contexto bélico. 'Avanzaron' es natural en español y no añade una connotación que el hebreo no exige aquí.
- source_word: וַיַּעַמְדוּ
  english_pob_choice: stood
  chosen_spanish: se apostaron
  alternatives_spanish:
  - se detuvieron
  - tomaron posición
  - se pararon
  lexicon: HALOT
  rationale: El hebreo puede ser simplemente 'estuvieron / se quedaron de pie', pero en escena militar implica colocarse deliberadamente en posición. 'Se apostaron' transmite esa disposición táctica sin exagerar.
- source_word: פֶּתַח שַׁעַר הָעִיר
  english_pob_choice: the entrance of the city gate
  chosen_spanish: a la entrada de la puerta de la ciudad
  alternatives_spanish:
  - en la entrada de la puerta de la ciudad
  - a la entrada del portón de la ciudad
  - al acceso de la puerta de la ciudad
  lexicon: HALOT
  rationale: La construcción apunta al acceso/umbral de la puerta urbana. 'Puerta de la ciudad' conserva el referente bíblico concreto; 'a la entrada' refleja פֶּתַח de modo idiomático.
- source_word: וּשְׁנֵי הָרָאשִׁים
  english_pob_choice: the two other leaders
  chosen_spanish: los otros dos jefes
  alternatives_spanish:
  - los dos otros jefes
  - los dos líderes restantes
  - las dos otras compañías
  lexicon: HALOT
  rationale: El hebreo repite literalmente 'las dos cabezas/jefes', pero el contexto previo habla de tres grupos. En español, 'los otros dos jefes' mantiene la repetición léxica sin introducir 'compañías' como si fuera el término principal del texto.
- source_word: עַל כָּל אֲשֶׁר בַּשָּׂדֶה
  english_pob_choice: against all who were in the field
  chosen_spanish: contra todos los que estaban en el campo
  alternatives_spanish:
  - sobre todos los que estaban en el campo
  - contra todo lo que estaba en el campo
  - contra cuantos estaban en el campo
  lexicon: HALOT
  rationale: El objeto es humano por el contexto del ataque posterior. 'Los que estaban en el campo' evita ambigüedad y conserva el sentido espacial del hebreo.
- source_word: וַיַּכּוּם
  english_pob_choice: struck them down
  chosen_spanish: los hirieron
  alternatives_spanish:
  - los golpearon
  - los derribaron
  - los mataron
  lexicon: HALOT
  rationale: נכה puede significar golpear, derrotar o matar según el contexto. Aquí el hebreo no especifica directamente el resultado final, así que 'los hirieron' mantiene la violencia sin cerrar de más la interpretación.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y toma en cuenta la revisión inglesa más reciente: conserva el movimiento rápido de פָּשְׁטוּ con un verbo natural en español, mantiene ''stood'' como una colocación táctica expresada por ''se apostaron'', y respeta la repetición de הָרָאשִׁים sin traducirla como ''compañías'' en el texto principal, aunque se explica la posibilidad contextual en nota.'
  spanish_consistency_notes:
  - Se usa 'Abimélec' como forma española estable del nombre propio.
  - Se evita 'SEÑOR' porque no hay aquí el tetragrámaton ni un sustituto divino.
  - '''Jefes'' se mantiene para רָאשִׁים por consistencia con su valor militar-organizativo en este pasaje.'
  - '''Hirieron'' preserva la apertura semántica de וַיַּכּוּם sin imponer una muerte explícita que el hebreo no formula directamente.'
