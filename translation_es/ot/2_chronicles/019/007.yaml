revisions:
- from: Ahora, que el temor de Yahvé esté sobre ustedes. Sean cuidadosos y actúen, porque con Yahvé nuestro Dios no hay injusticia, ni parcialidad[a], ni aceptación de soborno.
  to: Ahora bien, que el temor de Yahvé esté sobre ustedes. Tengan cuidado y actúen, porque con Yahvé nuestro Dios no hay injusticia, ni parcialidad[a], ni aceptar soborno.
  rationale: Se ajusta la transición inicial para reflejar mejor el valor exhortativo de וְעַתָּה; se mejora la naturalidad de la exhortación con «tengan cuidado»; se sustituye la expresión rígida «aceptación de soborno» por «aceptar soborno»; y se corrige la nota para representar con más precisión el idiomatismo hebreo detrás de «parcialidad».
