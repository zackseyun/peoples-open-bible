  yaml_path: translation/deuterocanon/1_maccabees/003/029.yaml
  text: And he saw that the silver had run out from the treasuries[a], and that the revenues of the land were few because of the dissension and the calamity that he had brought upon the land[b], by removing the ordinances that had existed from former days.
  footnotes:
