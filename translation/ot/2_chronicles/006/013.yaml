id: 2CH.6.13
reference: 2 Chronicles 6:13
source:
  edition: WLC
  text: כִּֽי עָשָׂ֨ה שְׁלֹמֹ֜ה כִּיּ֣וֹר נְחֹ֗שֶׁת וַֽ/יִּתְּנֵ/הוּ֮ בְּ/ת֣וֹךְ הָ/עֲזָרָה֒ חָמֵ֨שׁ אַמּ֜וֹת אָרְכּ֗/וֹ וְ/חָמֵ֤שׁ אַמּוֹת֙ רָחְבּ֔/וֹ וְ/אַמּ֥וֹת שָׁל֖וֹשׁ קוֹמָת֑/וֹ וַ/יַּעֲמֹ֣ד עָלָ֗י/ו וַ/יִּבְרַ֤ךְ עַל בִּרְכָּי/ו֙ נֶ֚גֶד כָּל קְהַ֣ל יִשְׂרָאֵ֔ל וַ/יִּפְרֹ֥שׂ כַּפָּ֖י/ו הַ/שָּׁמָֽיְמָ/ה־־־׃
translation:
  text: For Solomon had made a bronze platform and set it in the midst of the court; it was five cubits long[a], five cubits wide, and three cubits high. He stood on it, then knelt on his knees before all the assembly of Israel and spread out his hands toward heaven.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew כִּיּוֹר usually means 'basin' or 'laver,' but here the context indicates a raised bronze structure Solomon could stand on; hence 'platform.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Now
  - Indeed
  lexicon: HALOT
  rationale: Introduces an explanatory note giving background for Solomon's posture and location. 'For' best preserves the causal/explanatory force in readable English.
- source_word: כִּיּוֹר נְחֹשֶׁת
  chosen: a bronze platform
  alternatives:
  - a bronze basin
  - a bronze stand
  lexicon: HALOT
  rationale: Although כִּיּוֹר often means 'basin/laver' elsewhere, the immediately following dimensions and Solomon's standing on it require a raised structure here, not a washbasin. 'Platform' best fits the contextual sense; 'stand' is possible but less clear in modern English. The lexical anomaly is worth preserving in a footnote.
- source_word: בְּתוֹךְ הָעֲזָרָה
  chosen: in the middle of the court
  alternatives:
  - in the midst of the courtyard
  - within the court
  lexicon: HALOT
  rationale: עֲזָרָה refers to the temple court/courtyard. 'In the middle of the court' is natural English and preserves the spatial sense of בְּתוֹךְ.
- source_word: חָמֵשׁ אַמּוֹת ... וְאַמּוֹת שָׁלֹשׁ
  chosen: five cubits long, five cubits wide, and three cubits high
  alternatives:
  - five cubits in length, five cubits in width, and three cubits in height
  lexicon: HALOT
  rationale: Retains the ancient unit 'cubits' for formal accuracy while expressing the dimensions in idiomatic English.
- source_word: קוֹמָתוֹ
  chosen: high
  alternatives:
  - in height
  - its height
  lexicon: HALOT
  rationale: The noun means height/stature. Rendering the whole phrase as 'three cubits high' is concise and natural.
- source_word: וַיַּעֲמֹד עָלָיו
  chosen: He stood on it
  alternatives:
  - He took his stand on it
  lexicon: HALOT
  rationale: Simple narrative wayyiqtol; 'stood on it' is direct and sufficient.
- source_word: וַיִּבְרַךְ עַל בִּרְכָּיו
  chosen: then knelt on his knees
  alternatives:
  - and kneeled on his knees
  - and blessed on his knees
  lexicon: HALOT
  rationale: In this stem and context, ברך means 'kneel,' not 'bless.' The phrase is idiomatic for kneeling. 'Then knelt on his knees' reflects the sequence and preserves the bodily posture.
- source_word: נֶגֶד כָּל קְהַל יִשְׂרָאֵל
  chosen: before all the assembly of Israel
  alternatives:
  - in front of all the congregation of Israel
  - before the whole assembly of Israel
  lexicon: HALOT
  rationale: קָהָל is well rendered 'assembly' in this public worship setting. 'Before' captures נֶגֶד naturally.
- source_word: וַיִּפְרֹשׂ כַּפָּיו
  chosen: and spread out his hands
  alternatives:
  - and spread forth his palms
  - and stretched out his hands
  lexicon: HALOT
  rationale: A conventional prayer gesture. 'Spread out his hands' is both literal and natural.
- source_word: הַשָּׁמָיְמָה
  chosen: toward heaven
  alternatives:
  - to heaven
  - heavenward
  lexicon: HALOT
  rationale: The directional ending indicates motion/orientation toward heaven. 'Toward heaven' preserves that nuance clearly.
