translation:
  language: es
  text: Con sus rebaños[a] y con sus vacadas irán a buscar a Yahvé, pero no lo hallarán; se ha apartado de ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La mención de rebaños y vacadas probablemente implica que vienen con animales de sacrificio para buscar a Yahvé.
    reason: cultural_note
  - marker: b
    text: O 'se ha retirado de ellos' o 'se ha alejado de ellos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּצֹאנָם
  english_pob_choice: with their flocks
  chosen_spanish: con sus rebaños
  alternatives_spanish:
  - con sus flocks
  - con sus ovejas
  - con sus ganados menores
  lexicon: HALOT
  rationale: צֹאן designa el ganado menor, especialmente ovejas y cabras; en español, 'rebaños' comunica de forma natural ese colectivo pastoril. La preposición ב con valor de acompañamiento/instrumental se refleja bien con 'con'.
- source_word: וּבִבְקָרָם
  english_pob_choice: with their herds
  chosen_spanish: y con sus vacadas
  alternatives_spanish:
  - y con sus ganados
  - y con sus reses
  - y con sus manadas
  lexicon: HALOT
  rationale: בָּקָר se refiere al ganado bovino. 'Vacadas' preserva la distinción con צֹאן y mantiene el paralelismo con 'rebaños' sin perder el matiz de ganado mayor.
- source_word: יֵלְכוּ
  english_pob_choice: they will go
  chosen_spanish: irán
  alternatives_spanish:
  - van a ir
  - irán adelante
  - se encaminarán
  lexicon: HALOT
  rationale: El imperfecto qal en contexto profético se vierte naturalmente en futuro español. 'Irán' es breve y fiel al valor prospectivo.
- source_word: לְבַקֵּשׁ
  english_pob_choice: to seek
  chosen_spanish: a buscar
  alternatives_spanish:
  - a buscar
  - a procurar
  - para buscar
  lexicon: HALOT
  rationale: בקש en contextos religiosos suele significar 'buscar/seek'. En español, 'buscar' comunica bien la acción de intentar hallar acceso a Dios sin sobretraducir. El giro 'a buscar' mantiene la finalidad del verbo de movimiento.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino revelado en el texto hebreo con la forma española establecida por el proyecto, 'Yahvé', en lugar de sustituirlo por un título.
- source_word: וְלֹא יִמְצָאוּ
  english_pob_choice: but they will not find him
  chosen_spanish: pero no lo hallarán
  alternatives_spanish:
  - pero no lo encontrarán
  - y no lo hallarán
  - pero no encontrarán a Yahvé
  lexicon: HALOT
  rationale: מצא con Dios como objeto implica hallarlo en sentido favorable/accesible. 'Hallar' suena más natural y solemne en español bíblico que 'encontrar', y el pronombre 'lo' expresa el objeto implícito del hebreo.
- source_word: חָלַץ מֵהֶם
  english_pob_choice: he has withdrawn from them
  chosen_spanish: se ha apartado de ellos
  alternatives_spanish:
  - se ha retirado de ellos
  - se ha retirado de entre ellos
  - se ha alejado de ellos
  lexicon: HALOT
  rationale: En este contexto, חָלַץ expresa apartarse o retirarse, con fuerza relacional y judicial. 'Se ha apartado de ellos' preserva esa distancia ya consumada y su efecto presente.
theological_decisions:
- issue: Nombre divino en el texto principal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: El hebreo usa el Tetragrámaton directamente. La traducción mantiene el nombre propio de Dios para no ocultarlo tras un título, siguiendo la decisión terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de la búsqueda con ganado
  english_pob_reading: The mention of flocks and herds likely implies coming with sacrificial animals to seek the LORD.
  chosen_spanish_reading: La mención de rebaños y vacadas sugiere que vienen con animales de sacrificio para buscar a Yahvé.
  alternative_spanish_readings:
  - La mención de ganado solo describe abundancia pastoral.
  - Vienen a buscar a Dios con sus animales.
  rationale: La frase no debe volver explícito en exceso lo que el hebreo deja implícito, pero sí conviene conservar la implicación cultual que explica por qué van con ganado a buscar a Yahvé.
  doctrine_reference: Comentario contextual del POB sobre el trasfondo sacrificial
- issue: Objeto implícito de 'hallar'
  english_pob_reading: but they will not find him
  chosen_spanish_reading: pero no lo hallarán
  alternative_spanish_readings:
  - pero no hallarán a Yahvé
  - pero no lo encontrarán
  rationale: El objeto es Dios mismo, implícito en hebreo. El pronombre átono mantiene la referencia personal sin recargar la frase con una repetición innecesaria.
  doctrine_reference: HALOT, מצא con objeto divino
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente sin cambios sustantivos: el texto hebreo y la auditoría inglesa coinciden en alto grado, por lo que la versión española conserva la estructura, el paralelismo pastoril y la ambigüedad relacional de חָלַץ sin añadir explicación interpretativa al cuerpo principal.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - '''Rebaños'' y ''vacadas'' preservan la distinción entre צֹאן y בָּקָר.'
  - '''Hallarán''/''hallar'' se mantiene como equivalente natural de מצא en sentido religioso.'
  - Se evita 'SEÑOR' como sustituto del nombre divino.
  - El tono es bíblico y sobrio, pero en español contemporáneo claro.
