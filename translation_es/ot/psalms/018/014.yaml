    text: O «granizo y brasas de fuego».
    reason: lexical_alternative
  revision_rationale: Se corrige el aparato de notas para preservar las alternativas documentadas en la auditoría inglesa y se ajusta «granizo» a «piedras de granizo» para reflejar mejor la elección léxica principal «hailstones». Se mantiene la sintaxis poética con raya y el modismo «dio su voz».
