  text: If you were from the world[a], the world would love its own. But because you are not from the world, but I chose you out of the world, for this reason the world hates you.
  footnotes:
  - marker: a
    text: Or 'of the world' for 'from the world' (ἐκ τοῦ κόσμου); the Greek preposition can express source or belonging. The main text keeps the repeated preposition visible.
    reason: lexical_alternative
translation:
  language: ko
  text: 여러분이 세상에 속해 있었다면, 세상은 자기 것을 사랑했을 것입니다. 그러나 여러분이 세상에 속해 있지 않고, 도리어 내가 여러분을 세상에서 택해 내었기 때문에, 그 때문에 세상이 여러분을 미워합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「세상에 속해」는 헬라어 ἐκ τοῦ κόσμου의 번역으로, 본문은 출처·소속을 함께 표현한다.
    reason: lexical_alternative
