revisions:
- from: 'Y el profeta[a], el sacerdote y el pueblo, que digan: «La carga[b] de Yahvé», yo castigaré a aquel hombre y a su casa.'
  to: 'Y el profeta, el sacerdote o el pueblo, quien diga: «La carga[a] de Yahvé», yo castigaré a aquel hombre y a los de su casa.'
  rationale: Se elimina la nota innecesaria sobre «profeta», se mantiene la nota léxica importante sobre «carga», se ajusta la cláusula relativa a una formulación distributiva más natural en español («quien diga») y se cambia «su casa» por «los de su casa» para reflejar mejor el sentido de «household» documentado en el expediente inglés, sin perder legibilidad bíblica.
