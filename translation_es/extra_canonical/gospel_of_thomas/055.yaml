translation:
  language: es
  text: 'Jesús dijo: «Quien no odia[a] a su padre y a su madre no puede ser mi discípulo; y quien no odia a sus hermanos y a sus hermanas, y no lleva su cruz como yo[b], no será digno de mí»[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El copto usa un verbo fuerte. Aquí se conserva «odiar» para no atenuar la tensión del dicho.
    reason: lexical_alternative
  - marker: b
    text: El copto compara la manera de Jesús; no dice explícitamente «seguir». Por eso se traduce «como yo».
    reason: source_note
  - marker: c
    text: Compárese Lucas 14:26–27 y Mateo 10:37–38 para motivos relacionados, aunque la dicción de Tomás es distinta.
    reason: cross_reference
lexical_decisions:
- source_word: ⲙⲟⲥⲧⲉ
  english_pob_choice: hate
  chosen_spanish: odiar
  alternatives_spanish:
  - detestar
  - rechazar
  lexicon: Crum; Lambdin
  rationale: El verbo copto es fuerte y la traducción debe conservar su aspereza sin suavizarla a «amar menos». «Odiar» mantiene la fuerza léxica que el texto exige.
- source_word: ϣⲣⲙⲁⲑⲏⲧⲏⲥ
  english_pob_choice: cannot be my disciple
  chosen_spanish: no puede ser mi discípulo
  alternatives_spanish:
  - no llegará a ser mi discípulo
  - no será mi discípulo
  lexicon: Layton
  rationale: La construcción potencial señala incapacidad, no solo futuro. En español, «no puede ser mi discípulo» refleja mejor esa fuerza que una simple negación futura.
- source_word: ⲉⲓⲱⲧ / ⲙⲁⲁⲩ
  english_pob_choice: father / mother
  chosen_spanish: padre / madre
  lexicon: Crum
  rationale: Son los términos básicos de parentesco y deben conservarse de forma literal.
- source_word: ⲥⲛⲏⲩ
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos varones
  - parientes
  lexicon: Crum
  rationale: El testimonio manuscrito leído por la edición impresa dice «hermanos», y el paralelo con ⲥⲱⲛⲉ favorece la pareja «hermanos y hermanas». Se evita armonizar con la forma normalizada que sugiere «hijo / hija».
- source_word: ⲥⲱⲛⲉ
  english_pob_choice: sisters
  chosen_spanish: hermanas
  alternatives_spanish:
  - parientas
  - mujeres de la familia
  lexicon: Crum
  rationale: Es el correlato natural de ⲥⲛⲏⲩ en el testimonio manuscrito seguido aquí.
- source_word: ϥⲓ
  english_pob_choice: carry
  chosen_spanish: lleva
  alternatives_spanish:
  - carga
  - porta
  - toma
  lexicon: Crum
  rationale: «Llevar» reproduce bien la acción continuada de portar la cruz sin introducir la noción más específica de «tomar» que la advertencia copta no requiere.
- source_word: ⲥⲧⲁⲩⲣⲟⲥ
  english_pob_choice: cross
  chosen_spanish: cruz
  alternatives_spanish:
  - madero
  - patíbulo
  lexicon: Loanword (Greek)
  rationale: El préstamo griego designa aquí la cruz; «cruz» es la equivalencia directa y clara en español.
- source_word: ϩⲉ (ⲛⲡⲁϩⲉ)
  english_pob_choice: in my way
  chosen_spanish: como yo
  alternatives_spanish:
  - a mi manera
  - en mi camino
  - como yo lo hago
  lexicon: Crum
  rationale: El copto expresa comparación o conformidad con la manera de Jesús, no una orden de seguimiento literal. «Como yo» es breve y preserva la relación comparativa sin imponer una paráfrasis más amplia.
- source_word: ⲉⲓⲣⲉ ⲛⲁⲝⲓⲟⲥ
  english_pob_choice: be worthy
  chosen_spanish: ser digno
  alternatives_spanish:
  - ser merecedor
  - ser digno de valor
  lexicon: Layton; Greek loan ⲁⲝⲓⲟⲥ
  rationale: La idiomática copta apunta a un estado de dignidad/valía; en español, «ser digno» es natural y fiel.
- source_word: ⲡⲉⲧⲉⲣⲉ…
  english_pob_choice: whoever
  chosen_spanish: Quien
  alternatives_spanish:
  - El que
  - Todo el que
  lexicon: Layton
  rationale: La relativa indefinida tiene fuerza gnómica. «Quien» mantiene el tono proverbial y compacto.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrige la primera cláusula a una negación de capacidad («no puede ser mi discípulo») y la nota que advierte que el giro equivalente no debe convertirse en «seguir»; por eso el español mantiene la distinción entre incapacidad y estado, y traduce la cláusula final de modo comparativo, no como llamada explícita a seguir.
  spanish_consistency_notes:
  - Se mantiene «Jesús» como sujeto explícito, siguiendo el encabezado narrativo de la edición inglesa.
  - Se conserva la aspereza de «odiar» para no diluir la fuerza léxica documentada.
  - Se evita «SEÑOR» o terminología eclesiástica no presente en el original.
  - «Discípulo» se usa como equivalente estable de ϣⲣⲙⲁⲑⲏⲧⲏⲥ.
  - La cláusula final se vierte con comparación («como yo») para reflejar la lectura auditada del copto.
