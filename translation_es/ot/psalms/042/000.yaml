translation:
  language: es
  text: Para el director de música[a]. Maskil[b] de los hijos de Coré[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Al director de música». La preposición hebrea en los títulos de salmos puede traducirse de ambas maneras.'
    reason: alternative_reading
  - marker: b
    text: «Maskil» es un término técnico en los títulos de salmos; su sentido exacto es incierto, con propuestas como «composición contemplativa» o «composición instructiva».
    reason: lexical_alternative
  - marker: c
    text: 'O: «para los hijos de Coré». El encabezado puede indicar autoría, asociación o destino para la interpretación musical.'
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Al director del coro
  alternatives_spanish:
  - Para el director del coro
  - Al choirmaster
  - Para el maestro de música
  lexicon: HALOT
  rationale: En los encabezados de salmos, el término apunta al responsable musical/litúrgico. «Al director del coro» conserva bien la función y permite el valor de destinatario/encargo que la preposición puede tener en estas superscripciones. Se evita «SEÑOR» u otra máscara porque aquí no hay el Tetragrámaton.
- source_word: מַשְׂכִּיל
  english_pob_choice: A Maskil
  chosen_spanish: Un Maskil
  alternatives_spanish:
  - Un salmo contemplativo
  - Una composición instructiva
  - Un canto sapiencial
  lexicon: HALOT
  rationale: Es un término técnico del título del salmo cuyo sentido exacto es incierto. Se translitera para no imponer una interpretación discutida; el artículo indefinido refleja su función clasificatoria.
- source_word: לִבְנֵי
  english_pob_choice: of the sons of
  chosen_spanish: de los hijos de
  alternatives_spanish:
  - para los hijos de
  - perteneciente a los hijos de
  lexicon: HALOT
  rationale: La preposición ל en estas superscripciones puede indicar autoría, asociación o destino. «De los hijos de» preserva esa amplitud sin decidir indebidamente entre esas opciones.
- source_word: קֹרַח
  english_pob_choice: Korah
  chosen_spanish: Coré
  alternatives_spanish:
  - Korah
  lexicon: HALOT
  rationale: En español bíblico, «Coré» es la forma tradicional y clara del nombre propio; mantiene la referencia personal sin alterar el dato fuente.
translation_notes:
  revision_awareness: 'He seguido la corrección auditada de los marcadores: [a] queda en el equivalente de לַמְנַצֵּחַ, [b] en «Maskil» y [c] en «los hijos de Coré», evitando agruparlos indebidamente en una sola palabra.'
  spanish_consistency_notes:
  - «Dios», «Jesús», «Mesías» y otras terminologías estándar no aparecen en este versículo; por eso no hay decisiones doctrinales adicionales.
  - Se mantiene el orden y la brevedad del encabezado hebreo sin añadir palabras explicativas al texto principal.
  - La puntuación con punto medio del título se resuelve en español con frases separadas por punto, en estilo publicable y sobrio.
