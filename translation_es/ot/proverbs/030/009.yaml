translation:
  language: es
  text: 'no sea que llegue a estar saciado y te niegue, y diga: «¿Quién es Yahvé?», o no sea que llegue a ser pobre y robe, y profane el nombre de mi Dios.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - lest
  lexicon: HALOT
  rationale: Expresa la idea de una consecuencia temida en español natural y mantiene el valor preventivo de la partícula.
- source_word: אֶשְׂבַּע
  english_pob_choice: I become full
  chosen_spanish: me sacie
  alternatives_spanish:
  - llegue a estar lleno
  - tenga abundancia
  lexicon: HALOT
  rationale: El contexto apunta a saciedad por prosperidad; 'me sacie' conserva la imagen concreta de quedar lleno y funciona bien con la oración condicional.
- source_word: כִחַשְׁתִּי
  english_pob_choice: deny you
  chosen_spanish: te niegue
  alternatives_spanish:
  - te desconozca
  - te reniegue
  lexicon: HALOT
  rationale: Con Dios como objeto implícito, 'negar' expresa rechazo o repudio, no simple mentira. Mantiene la fuerza relacional del verbo.
- source_word: מִי יְהוָה
  english_pob_choice: Who is the LORD?
  chosen_spanish: ¿Quién es Yahvé?
  alternatives_spanish:
  - ¿Quién es el Señor?
  - ¿Qué es Yahvé para mí?
  lexicon: HALOT
  rationale: Se preserva el nombre divino según la norma del proyecto, y la pregunta retórica conserva el tono de insolencia y desprecio del hebreo.
- source_word: אִוָּרֵשׁ
  english_pob_choice: I become poor
  chosen_spanish: me empobrezca
  alternatives_spanish:
  - llegue a ser pobre
  - quede en la pobreza
  lexicon: HALOT
  rationale: En el paralelismo con 'me sacie', 'empobrecer' suena natural en español y comunica la reducción a necesidad que anticipa el versículo.
- source_word: גָנַבְתִּי
  english_pob_choice: steal
  chosen_spanish: robe
  alternatives_spanish:
  - hurte
  - cometa robo
  lexicon: HALOT
  rationale: '''Robar'' es el equivalente directo y claro en español, apropiado para la secuencia narrativa del peligro moral.'
- source_word: תָפַשְׂתִּי שֵׁם אֱלֹהָי
  english_pob_choice: profane the name of my God
  chosen_spanish: profane el nombre de mi Dios
  alternatives_spanish:
  - use indebidamente el nombre de mi Dios
  - tome el nombre de mi Dios
  lexicon: HALOT
  rationale: El hebreo es idiomático y el contexto vincula el robo con deshonrar a Dios. 'Profanar' comunica mejor la gravedad teológica que un calco literal de 'asir/tomar'. For English POB's lexical tension, Spanish should not collapse the idiom into mera manipulación verbal.
- source_word: אֱלֹהָי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - Dios mío
  lexicon: HALOT
  rationale: Se mantiene la relación posesiva personal del hebreo con una forma natural y reverente en español.
theological_decisions:
- issue: Renderización del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El proyecto define יְהוָה como 'Yahvé' en el texto principal. La pregunta retórica del versículo conserva así el nombre propio del Dios del pacto, sin ocultarlo bajo un sustituto.
  doctrine_reference: 'DOCTRINE.md: יְהוָה YHWH → Yahvé'
- issue: Sentido de ותפשתי שם אלהי
  english_pob_reading: profane the name of my God
  chosen_spanish_reading: profane el nombre de mi Dios
  alternative_spanish_readings:
  - use indebidamente el nombre de mi Dios
  - tome el nombre de mi Dios
  rationale: La expresión hebrea es idiomática y, en contexto, alude a traer deshonra sobre Dios por medio del robo. 'Profanar' conserva la gravedad moral y evita reducir el pasaje a un problema meramente verbal.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el acuerdo de revisión fue alto y estable. La versión española sigue ese perfil de estabilidad, conservando las dos cláusulas paralelas y la lectura teológica de 'profane the name of my God' sin suavizarla.
  spanish_consistency_notes:
  - Se usó 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - Se prefirió 'Dios'/'mi Dios' para אֱלֹהִים, manteniendo la posesión personal del hebreo.
  - '''Profanar'' conserva la fuerza del hebreo idiomático en vez de un calco literal poco natural en español.'
  - La estructura condicional doble ('para que no... o para que no...') refleja el paralelismo y la alternativa moral del original.
