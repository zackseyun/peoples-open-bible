base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/020/006.yaml
  text: And who is the man who has planted a vineyard and has not yet made use of it? Let him go and return to his house[a], lest he die in the battle and another man make use of it.
  footnotes:
