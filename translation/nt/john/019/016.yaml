theological_decisions:
- issue: Referent of 'them' (αὐτοῖς / implied subject of Παρέλαβον)
  chosen_reading: Retain the generic 'them' / 'they' in the main text without specifying 'the Jews,' 'the chief priests,' or 'the soldiers.'
  alternative_readings:
  - Interpret 'them' as the chief priests and their officers
  - Interpret 'they took Jesus' as the Roman soldiers based on the broader passion context
  rationale: The Greek text itself uses pronouns without explicit identification in this verse. Supplying a more specific group in translation would resolve an ambiguity the text leaves implicit. The main text therefore preserves the narrative tension and referential openness.
  doctrine_reference: Preserve theological tension rather than resolve it.
