review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura narrativa hebrea, la pregunta del rey y la respuesta elíptica final. Sin embargo, se aparta del rastro auditado del POB en dos puntos importantes: traduce עֶבֶד / עַבְדֶּךָ como «esclavo» donde la decisión inglesa documentada para este contexto es «servant/servant» por tratarse de un retenedor doméstico, y añade una nota [a] en el lugar equivocado, anclada a «esclavo» inicial aunque la elipsis anotada pertenece a la respuesta final «Tu siervo». También «a David» suena menos natural en español que «ante David».'
  spanish_quality_summary: 'El texto es generalmente claro, pero tiene problemas de naturalidad y de aparato crítico: «lo llamaron a David» es comprensible pero tosco; «ante David» o «a la presencia de David» es mejor español. La duplicación de notas sobre la misma elipsis crea ruido y la primera está mal anclada. «Siba» es posible, pero «Ziba» preserva mejor el nombre auditado y la forma más reconocible internacionalmente; no es obligatorio, pero conviene por consistencia con el POB base.'
  glossary_alignment: 'No hay términos teológicos mayores en juego. La principal desalineación terminológica es עֶבֶד: aquí debe ir como «siervo» en vez de «esclavo», porque el propio audit trail justificó una excepción contextual a la preferencia general por «esclavo». La elipsis de עַבְדֶּךָ debe conservarse en español y puede explicarse con una sola nota.'
  issues:
  - severity: high
    issue: Se tradujo עֶבֶד / עַבְדֶּךָ como «esclavo» en vez de «siervo».
    rationale: El audit trail inglés documenta explícitamente «servant» por contexto doméstico/cortesano, no «slave». En esta revisión debe preservarse esa decisión contextual, no aplicar ciegamente la preferencia general por «esclavo».
  - severity: high
    issue: La nota [a] está anclada a «esclavo» inicial, pero su contenido explica la respuesta elíptica final.
    rationale: Las notas deben anclarse exactamente donde corresponde el fenómeno textual. Aquí la elipsis pertenece a «Tu siervo», no a la mención inicial del siervo de la casa de Saúl.
  - severity: medium
    issue: Hay dos notas redundantes sobre la misma elipsis.
    rationale: Una sola nota basta para explicar que la respuesta hebrea es elíptica y que puede entenderse como «Soy tu siervo».
  - severity: medium
    issue: «Lo llamaron a David» es poco natural en español.
    rationale: Aunque es cercano al hebreo, en español eclesial y narrativo suena más idiomático «lo llamaron ante David» o «lo convocaron ante David», sin perder el sentido de comparecencia.
  - severity: low
    issue: «Siba» es menos consistente con el nombre auditado «Ziba».
    rationale: No es error de sentido, pero «Ziba» mantiene mejor la continuidad con el inglés POB y la transliteración más reconocible.
