base_translation:
  language: en
  yaml_path: translation/ot/leviticus/005/008.yaml
  text: And he shall bring them to the priest[a], and he shall present first the one for the sin offering, and he shall pinch off its head from the front of its neck[c][b], but he shall not sever it.
  footnotes:
  - marker: a
    text: Or, 'sin offering'; the Hebrew term חַטָּאת can also be understood more specifically as a 'purification offering' in Levitical sacrificial contexts.
    reason: lexical_alternative
  - marker: b
    text: The verb describes the priest's ritual handling of a bird sacrifice; traditional English versions often render it 'wring off' the head.
    reason: lexical_alternative
  - marker: c
    text: That is, the head was not to be fully detached from the body.
    reason: cultural_note
