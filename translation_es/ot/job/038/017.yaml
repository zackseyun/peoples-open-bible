translation:
  language: es
  text: ¿Te han sido reveladas las puertas de la muerte, o has visto las puertas de la profunda oscuridad[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «la sombra de muerte». El hebreo צַלְמָוֶת se traduce tradicionalmente así, pero también puede denotar oscuridad profunda o penumbra en sentido más general.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲ/נִגְלוּ
  english_pob_choice: Have ... been revealed
  chosen_spanish: ¿Te han sido reveladas?
  alternatives_spanish:
  - ¿Han sido reveladas para ti?
  - ¿Te han sido descubiertas?
  lexicon: HALOT
  rationale: El nifal perfecto en pregunta retórica pide una pasiva natural en español. «Te han sido reveladas» conserva la voz pasiva y la dirección del acto hacia Job sin volverla más explicativa de lo que permite el hebreo.
- source_word: לְךָ
  english_pob_choice: to you
  chosen_spanish: te / para ti
  alternatives_spanish:
  - a ti
  - para ti
  lexicon: HALOT
  rationale: El sufijo de 2ms marca a Job como destinatario directo. En español, el dativo clítico «te» suena natural en la pasiva perifrástica, y «para ti» puede explicitar la relación si se evita la ambigüedad.
- source_word: שַׁעֲרֵי מָוֶת
  english_pob_choice: the gates of death
  chosen_spanish: las puertas de la muerte
  alternatives_spanish:
  - las puertas de la muerte
  - las puertas del morir
  lexicon: HALOT
  rationale: La cadena constructa se conserva de forma directa. «Puertas» mantiene la imagen concreta del acceso al reino de la muerte, sin abstraerla ni suavizarla.
- source_word: וְ/שַׁעֲרֵי
  english_pob_choice: or have you seen the gates of
  chosen_spanish: o has visto las puertas de
  alternatives_spanish:
  - y has visto las puertas de
  lexicon: HALOT
  rationale: Aunque ו normalmente es «y», en esta pregunta paralela funciona mejor en español como disyuntiva retórica. «O» reproduce la alternativa interrogativa del hebreo y la lectura auditada del POB inglés.
- source_word: צַלְמָוֶת
  english_pob_choice: deep darkness
  chosen_spanish: la densa oscuridad
  alternatives_spanish:
  - la profunda oscuridad
  - la sombra de muerte
  - la oscuridad tenebrosa
  lexicon: HALOT
  rationale: Se sigue la decisión del POB inglés de no fijar de manera exclusiva la tradición «sombra de muerte», porque el término puede denotar oscuridad/gloom más ampliamente. «Densa oscuridad» comunica esa gravedad y mantiene la ambigüedad léxica documentada.
- source_word: תִּרְאֶה
  english_pob_choice: have you seen
  chosen_spanish: has visto
  alternatives_spanish:
  - ves
  - has contemplado
  lexicon: HALOT
  rationale: 'En este paralelismo poético, el imperfecto interrogativo se vierte con un perfecto español para sostener la secuencia retórica: «¿Te han sido reveladas...? ¿has visto...?».'
translation_notes:
  revision_awareness: El texto sigue de cerca el último pase inglés, que mantuvo alta concordancia con la base hebrea y no introdujo revisiones sustantivas. Se conserva la decisión de traducir צַלְמָוֶת con un término que refleje oscuridad intensa, no solo la fórmula tradicional.
  spanish_consistency_notes:
  - Se usó «muerte» y no un eufemismo para mantener la imagen concreta del hebreo.
  - Se prefirió «densa oscuridad» para צַלְמָוֶת siguiendo la nota léxica inglesa sobre su amplitud semántica.
  - La pregunta retórica se ajustó a un español natural sin perder el paralelismo del original.
