translation:
  language: es
  text: Y sus hijos[a], que no han conocido, oirán y aprenderán a temer a Yahvé[b] su Dios, todos los días que vivan en la tierra que ustedes están cruzando el Jordán para tomar posesión de ella[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sus hijos varones’. El hebreo puede referirse específicamente a hijos varones o, más ampliamente, a hijos/descendencia.
    reason: lexical_alternative
  - marker: b
    text: Hebreo ‘YHWH’; tradicionalmente se traduce ‘el SEÑOR’.
    reason: alternative_reading
  - marker: c
    text: O ‘para heredarla’ o ‘para poseerla’. El verbo hebreo puede abarcar la idea de tomar posesión de la tierra prometida.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵיהֶם
  english_pob_choice: And their children
  chosen_spanish: Y sus hijos[a]
  alternatives_spanish:
  - Y sus hijos e hijas
  - Y sus descendientes
  lexicon: HALOT
  rationale: בנים puede referirse específicamente a hijos varones o, en sentido más amplio, a la descendencia/los hijos en general. En este contexto de formación del pacto, 'sus hijos' conserva la referencia generacional sin restringirla innecesariamente ni volverla demasiado interpretativa.
- source_word: אֲשֶׁר לֹא יָדְעוּ
  english_pob_choice: who have not known
  chosen_spanish: que no han conocido[b]
  alternatives_spanish:
  - que no conocen
  - que no han llegado a conocer
  lexicon: HALOT
  rationale: El perfecto de ידע comunica falta de conocimiento previo o experiencia previa. 'No han conocido' mantiene ese valor y suena natural en español bíblico contemporáneo.
- source_word: יִשְׁמְעוּ
  english_pob_choice: shall hear
  chosen_spanish: oirán
  alternatives_spanish:
  - escucharán
  - oirán y obedecerán
  lexicon: HALOT
  rationale: El verbo expresa la acción de oír como inicio del proceso educativo. 'Oirán' es directo y mantiene la secuencia con 'aprenderán' sin añadir obediencia que el verbo no dice explícitamente.
- source_word: וְלָמְדוּ
  english_pob_choice: and learn
  chosen_spanish: y aprenderán
  alternatives_spanish:
  - y aprenderán a
  - y serán enseñados
  lexicon: HALOT
  rationale: למד aquí señala aprendizaje resultante de oír. 'Aprenderán' preserva el paralelismo sin forzar una pasiva que el hebreo no exige.
- source_word: לְיִרְאָה
  english_pob_choice: to fear
  chosen_spanish: a temer
  alternatives_spanish:
  - a reverenciar
  - a respetar
  lexicon: HALOT
  rationale: En Deuteronomio, ירא suele expresar temor reverente de pacto. 'Temer' conserva esa fuerza teológica; 'reverenciar' suaviza demasiado el matiz de temor.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio POB de rendir el Tetragrama como 'Yahvé' en español, preservando el nombre propio del pacto y evitando la sustitución por un título.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios de ustedes
  - el Dios de ustedes
  lexicon: HALOT
  rationale: El sufijo plural de segunda persona se refleja naturalmente con 'su' en español dirigido a un plural. El contexto ya hace claro que se trata de Israel como comunidad, por lo que no hace falta repetir 'de ustedes'.
- source_word: כָּל הַיָּמִים אֲשֶׁר אַתֶּם חַיִּים
  english_pob_choice: all the days that you live
  chosen_spanish: todos los días que vivan
  alternatives_spanish:
  - todos los días que ustedes vivan
  - mientras vivan
  lexicon: HALOT
  rationale: La frase marca duración continua de la obligación del pacto. 'Todos los días que vivan' conserva la temporalidad completa y suena más natural que una calca más rígida.
- source_word: עַל הָאֲדָמָה
  english_pob_choice: on the land
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre el suelo
  lexicon: HALOT
  rationale: אדמה en este pasaje designa la tierra prometida como territorio habitable. 'Sobre la tierra' preserva el על hebreo y funciona bien en español sin perder el sentido territorial.
- source_word: אֲשֶׁר אַתֶּם עֹבְרִים אֶת הַיַּרְדֵּן שָׁמָּה
  english_pob_choice: that you are crossing the Jordan to
  chosen_spanish: que ustedes están cruzando el Jordán
  alternatives_spanish:
  - que están cruzando el Jordán hacia allí
  - por la que están cruzando el Jordán
  lexicon: HALOT
  rationale: La cláusula modifica 'la tierra' e incluye la idea direccional de שמה. En español, la orientación al destino queda mejor expresada por el contexto inmediato y por 'para tomar posesión de ella'.
- source_word: לְרִשְׁתָּהּ
  english_pob_choice: to possess
  chosen_spanish: para tomar posesión de ella[c]
  alternatives_spanish:
  - para poseerla
  - para heredarlo
  lexicon: HALOT
  rationale: ירש en Deuteronomio puede implicar poseer, tomar posesión o heredar. 'Tomar posesión de ella' conserva la idea activa de entrada y ocupación de la tierra, que en español comunica mejor el matiz que un simple 'poseer'.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La política doctrinal POB pide transliterar el Tetragrama como nombre propio. 'Yahvé' es la forma establecida en el proyecto para español y preserva la identidad covenantal del nombre divino frente a una sustitución titulary.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de ירא en contexto de pacto
  english_pob_reading: to fear
  chosen_spanish_reading: a temer
  alternative_spanish_readings:
  - a reverenciar
  - a respetar con reverencia
  rationale: En Deuteronomio, el 'temor de Yahvé' tiene contenido pactual y no solo emocional. 'Temer' mantiene esa densidad bíblica; 'reverenciar' sería más suave y perdería parte del peso teológico.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #2 and lexical fidelity for covenant terms'
- issue: Alcance de בנים
  english_pob_reading: children
  chosen_spanish_reading: sus hijos[a]
  alternative_spanish_readings:
  - sus niños
  - sus descendientes
  rationale: En este contexto, el referente es la generación siguiente en general. 'Hijos' es una solución válida en español bíblico para la descendencia inmediata y respeta el paralelismo familiar del texto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4'
translation_notes:
  revision_awareness: El borrador inglés fue revisado para preferir 'you live' en lugar de una forma más progresiva. En español se optó por 'vivan', que conserva la duración habitual del hebreo y resulta natural y formal en castellano bíblico.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el Tetragrama, conforme al estándar del proyecto.
  - Se evita 'SEÑOR' como sustituto del nombre divino.
  - '''Temer'' se conserva por su valor pactual; no se suaviza a ''reverenciar''.'
  - '''Tomar posesión'' evita una traducción demasiado abstracta de ירש y conserva el matiz de entrada en la tierra.'
