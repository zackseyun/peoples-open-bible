source:
  edition: SBLGNT
  text: τίς στρατεύεται ἰδίοις ὀψωνίοις ποτέ; τίς φυτεύει ἀμπελῶνα καὶ ⸂τὸν καρπὸν⸃ αὐτοῦ οὐκ ἐσθίει; ⸀τίς ποιμαίνει ποίμνην καὶ ἐκ τοῦ γάλακτος τῆς ποίμνης οὐκ ἐσθίει;
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/009/007.yaml
  text: Who ever serves as a soldier at his own expense? Who plants a vineyard and does not eat its fruit? Or who shepherds a flock and does not drink from the milk of the flock?[a][b]
  footnotes:
  - marker: a
    text: Or 'with his own wages/pay.' The Greek refers to a soldier's pay or rations; the sense is that a soldier does not bear the cost of his own service.
    reason: lexical_alternative
  - marker: b
    text: Literally 'does not eat from the milk of the flock.' English normally says 'drink' with milk.
    reason: lexical_alternative
translation:
  language: ko
  text: 자기 비용으로 군 복무를 하는 사람이 누가 있습니까? 포도원을 가꾸고도 그 열매를 먹지 않는 사람이 누가 있습니까? 양 떼를 치고도 그 양 떼의 젖을 먹지 않는 사람이 누가 있습니까?
  philosophy: optimal-equivalence
