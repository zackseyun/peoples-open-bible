translation:
  language: es
  text: 'Entonces Absalón decía[a]: «¡Si yo fuera nombrado juez en la tierra! Entonces todo hombre que tuviera un pleito o una causa podría venir a mí[b], y yo le haría justicia[c]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¿Quién me pondrá/nombrará juez en la tierra?». El hebreo expresa un deseo retórico, no una pregunta para pedir información.'
    reason: lexical_alternative
  - marker: b
    text: «Todo hombre» traduce una forma masculina singular usada genéricamente para cualquier persona con un asunto legal.
    reason: lexical_alternative
  - marker: c
    text: 'O: «lo vindicaría» / «lo declararía justo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... would say
  chosen_spanish: Entonces ... decía
  alternatives_spanish:
  - Y dijo
  - Y Absalón dijo
  lexicon: HALOT
  rationale: El waw consecutivo con אמר expresa habla repetida o habitual en el contexto narrativo. En español, el imperfecto 'decía' comunica mejor esa iteración que un simple pretérito.
- source_word: מִי יְשִׂמֵנִי
  english_pob_choice: If only I were appointed judge in the land!
  chosen_spanish: ¡Quién me nombrara juez en la tierra!
  alternatives_spanish:
  - ¡Ojalá me nombraran juez en la tierra!
  - ¿Quién me pondrá juez en la tierra?
  lexicon: HALOT
  rationale: La expresión hebrea es un deseo retórico, no una consulta real. 'Quién me nombrara' conserva la forma interrogativa retórica y el anhelo implícito, sin convertirlo en una petición ordinaria.
- source_word: שֹׁפֵט
  english_pob_choice: judge
  chosen_spanish: juez
  alternatives_spanish:
  - gobernante
  - magistrado
  lexicon: HALOT
  rationale: El participio se refiere a quien resuelve asuntos legales. 'Juez' es la equivalencia más directa y adecuada al contexto de pleitos y causas.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la tierra prometida
  lexicon: HALOT
  rationale: '''Tierra'' preserva el alcance territorial amplio del hebreo sin precisar indebidamente ''país''.'
- source_word: וְעָלַי יָבוֹא
  english_pob_choice: could come to me
  chosen_spanish: podría venir a mí
  alternatives_spanish:
  - vendría a mí
  - podría acudir a mí
  lexicon: HALOT
  rationale: 'La construcción expresa el resultado hipotético deseado: acceso a Absalón como juez. ''Podría venir a mí'' mantiene esa posibilidad abierta y natural en español.'
- source_word: כָּל אִישׁ
  english_pob_choice: every man
  chosen_spanish: todo hombre
  alternatives_spanish:
  - toda persona
  - todo individuo
  lexicon: HALOT
  rationale: El hebreo usa masculino singular con valor genérico. 'Todo hombre' conserva ese rasgo gramatical y su fuerza inclusiva en el contexto legal.
- source_word: רִיב
  english_pob_choice: dispute
  chosen_spanish: pleito
  alternatives_spanish:
  - disputa
  - litigio
  lexicon: HALOT
  rationale: En un contexto judicial, ריב puede referirse a un pleito o litigio. 'Pleito' comunica bien la controversia legal en español común sin perder el matiz de conflicto.
- source_word: וּמִשְׁפָּט
  english_pob_choice: a case
  chosen_spanish: una causa
  alternatives_spanish:
  - un caso
  - un litigio
  lexicon: HALOT
  rationale: Junto a ריב, משפט puede aludir a un asunto jurídico pendiente. 'Causa' es una forma natural y jurídica en español para 'a case'.
- source_word: וְהִצְדַּקְתִּיו
  english_pob_choice: I would give him justice
  chosen_spanish: le haría justicia
  alternatives_spanish:
  - lo vindicaría
  - lo declararía justo
  lexicon: HALOT
  rationale: El hifil de צדק puede significar declarar justo, vindicar o dar justicia. En este marco judicial, 'le haría justicia' conserva la fuerza de una decisión favorable y es idiomático en español.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que ajustó la frase a una voz impersonal/condicional más fiel al hebreo ('I were appointed'). La versión española evita añadir un sujeto explícito no presente y mantiene el valor retórico del deseo. También se respetó el marco legal de ריב/משפט y la ambigüedad judicial de הִצְדַּקְתִּיו.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se prefirió 'juez' sobre alternativas más amplias por el contexto jurídico inmediato.
  - '''Le haría justicia'' conserva la tensión entre justicia declarativa y vindicación sin resolverla de manera excesiva.'
