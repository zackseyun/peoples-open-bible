translation:
  language: es
  text: Miren[a] a las naciones y vean; asómbrense, asómbrense[b]. Porque en sus días estoy haciendo una obra que no creerían si se les contara[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Miren entre las naciones y vean». El hebreo permite tanto «a» como «entre» con el sentido de dirigir la mirada hacia las naciones.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo repite el verbo de asombro para dar énfasis; literalmente, «asómbrense, asómbrense».
    reason: lexical_alternative
  - marker: c
    text: 'O: «Porque una obra está siendo hecha en sus días, una que no creerían si se les contara». El hebreo puede expresarse de forma más literal con una construcción pasiva e impersonal.'
    reason: alternative_reading
lexical_decisions:
- source_word: רְאוּ
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - Observen
  lexicon: HALOT
  rationale: El imperativo plural llama a prestar atención; «miren» conserva el valor de observación dirigida y funciona naturalmente con la frase siguiente.
- source_word: בַגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - entre las naciones gentiles
  lexicon: HALOT
  rationale: «Naciones» refleja bien גּוֹיִם en un contexto profético-político; «entre» reproduce con naturalidad la preposición del hebreo y mantiene la escena de observación.
- source_word: וְהַבִּיטוּ
  english_pob_choice: and see
  chosen_spanish: y vean
  alternatives_spanish:
  - y miren
  - y observen
  lexicon: HALOT
  rationale: La repetición intensiva entre ראה y הביט se conserva con un segundo imperativo de percepción. «Vean» evita una repetición innecesaria en español y sigue la fuerza de «and see».
- source_word: וְהִתַּמְּהוּ תְּמָהוּ
  english_pob_choice: be astonished, be astounded
  chosen_spanish: asómbrense, asómbrense
  alternatives_spanish:
  - queden asombrados, queden asombrados
  - asómbrense y maravíllense
  lexicon: HALOT
  rationale: El hebreo duplica la raíz para intensificar el mandato. Mantener la repetición en español preserva esa carga retórica, como también lo refleja la nota inglesa sobre la repetición por énfasis.
- source_word: פֹעַל פֹּעֵל
  english_pob_choice: I am doing a work
  chosen_spanish: estoy haciendo una obra
  alternatives_spanish:
  - estoy realizando una obra
  - hago una obra
  lexicon: HALOT
  rationale: La construcción nominal-verbal enfática se vierte de forma natural con un presente progresivo. «Obra» comunica mejor que «trabajo» el sentido de una acción poderosa y singular en este contexto profético.
- source_word: בִּימֵיכֶם
  english_pob_choice: in your days
  chosen_spanish: en sus días
  alternatives_spanish:
  - en vuestros días
  - en el tiempo de ustedes
  lexicon: HALOT
  rationale: «Sus días» mantiene la referencia temporal inmediata. Se prefiere un tratamiento respetuoso y amplio, acorde con un registro bíblico moderno.
- source_word: לֹא תַאֲמִינוּ כִּי יְסֻפָּר
  english_pob_choice: you would not believe if it were told
  chosen_spanish: que no creerían si se les contara
  alternatives_spanish:
  - que no creerían aunque se les contara
  - que no lo creerían si alguien lo contara
  lexicon: HALOT
  rationale: 'La lógica condicional del hebreo se reproduce con naturalidad en español: la noticia sería increíble aun si se narrara. «Se les contara» conserva el pasivo impersonal del original.'
theological_decisions:
- issue: Sujeto implícito de la acción divina
  english_pob_reading: For I am doing a work
  chosen_spanish_reading: Porque ... estoy haciendo una obra
  alternative_spanish_readings:
  - Porque ... Dios está haciendo una obra
  - Porque ... una obra está siendo hecha
  rationale: El hebreo no explicita el sujeto en la cláusula, pero el contexto profético lo atribuye a Yahvé. En español, la primera persona queda explícita dentro del discurso divino implícito del versículo, sin añadir una reinterpretación ajena al contexto.
  doctrine_reference: Contexto profético inmediato de Habacuc 1:5; principio de claridad del discurso
- issue: Repetición enfática del mandato de asombro
  english_pob_reading: be astonished, be astounded
  chosen_spanish_reading: asómbrense, asómbrense
  alternative_spanish_readings:
  - asómbrense, queden atónitos
  - asómbrense, queden maravillados
  rationale: La duplicación en hebreo es un recurso retórico importante. Se conserva en español para no borrar la intensidad del mandato ni suavizar la reacción exigida al oyente.
  doctrine_reference: Énfasis poético-semítico y preservación de la forma retórica
translation_notes:
  revision_awareness: Se siguió la última revisión inglesa, que prefirió «be astonished, be astounded» para reflejar mejor la duplicación enfática del hebreo. En español se mantuvo esa duplicación con «asómbrense, asómbrense» y se evitó añadir matices no presentes en el texto fuente.
  spanish_consistency_notes:
  - Se usó «Yahvé» como nombre divino en el sistema POB, pero aquí el versículo no lo expresa de forma explícita en el hebreo citado.
  - Se prefirió «naciones» para גּוֹיִם por ser el término más natural y fiel en este contexto profético.
  - «Obra» conserva el carácter singular, extraordinario y activo de פֹעַל פֹּעֵל sin convertirlo en una explicación interpretativa.
