translation:
  language: es
  text: Y les devolveremos cosas buenas por lo que hacen con nosotros[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en retorno por lo que hacen con nosotros» o «hacia nosotros». El griego dice literalmente «con nosotros», lo que puede implicar cooperación o un trato favorable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνταποδώσομεν
  english_pob_choice: we will repay
  chosen_spanish: os devolveremos
  alternatives_spanish:
  - os pagaremos en retorno
  - os recompensaremos
  - os retribuiremos
  lexicon: BDAG
  rationale: El futuro de ἀνταποδώσομεν expresa devolver en correspondencia. En español, «devolveremos» conserva bien la idea de respuesta recíproca sin sobrecargar el verso con un término demasiado abstracto o marcadamente jurídico.
- source_word: ὑμῖν
  english_pob_choice: you
  chosen_spanish: os
  alternatives_spanish:
  - a vosotros
  - a ustedes
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa de forma natural con pronombre átono en español. «Os» mantiene la relación directa del verbo con el destinatario.
- source_word: ἀγαθὰ
  english_pob_choice: good things
  chosen_spanish: bienes
  alternatives_spanish:
  - cosas buenas
  - beneficios
  - bondades
  lexicon: BDAG
  rationale: El plural neutro sustantivado apunta a algo concreto y favorable, no a una abstracción. «Bienes» conserva el plural y el valor positivo general con mayor naturalidad que «cosas buenas».
- source_word: ἀνθʼ ὧν
  english_pob_choice: for what
  chosen_spanish: por lo que
  alternatives_spanish:
  - en retorno por lo que
  - a causa de lo que
  lexicon: BDAG
  rationale: 'La expresión introduce reciprocidad: respuesta en compensación por lo hecho. «Por lo que» es conciso y fiel, sin fijar de antemano si el matiz es causal o retributivo.'
- source_word: ποιεῖτε
  english_pob_choice: you do
  chosen_spanish: hacéis
  alternatives_spanish:
  - estáis haciendo
  - habéis hecho
  lexicon: BDAG
  rationale: El presente griego se refleja mejor con presente simple. «Hacéis» evita una progresiva menos natural aquí y conserva la acción en curso o habitual.
- source_word: μεθʼ ἡμῶν
  english_pob_choice: with us
  chosen_spanish: con nosotros
  alternatives_spanish:
  - para nosotros
  - hacia nosotros
  lexicon: BDAG
  rationale: μετά con genitivo significa normalmente «con». Mantener «con nosotros» preserva la posible idea de trato cooperativo o favorable sin interpretarla como «para nosotros».
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail, que prefirió reflejar el presente griego con un presente simple en lugar de una perífrasis progresiva. También conserva la ambigüedad de μεθʼ ἡμῶν mediante una nota textual/lexical, como en el inglés POB.
  spanish_consistency_notes:
  - Se mantuvo el tono sobrio y directo del original, sin amplificar la promesa de retribución.
  - «Bienes» reproduce el plural neutro sustantivado de ἀγαθὰ mejor que un abstracto singular.
  - La nota al pie conserva la tensión entre «con nosotros» y posibles matices relacionales de la preposición griega.
  - No se introdujo terminología teológica específica porque el verso es diplomático y no doctrinal.
