translation:
  language: es
  text: El hombre se reconoce por su apariencia[a], y el hombre de entendimiento se reconoce por la expresión de su rostro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Del griego literalmente: "por el encuentro del rostro". La frase probablemente alude a lo que el rostro muestra en un encuentro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ ὁράσεως
  english_pob_choice: by his appearance
  chosen_spanish: por la apariencia
  alternatives_spanish:
  - por lo que se ve
  - por su aspecto
  - por lo visible
  lexicon: LSJ
  rationale: ἀπό con ὅρασις indica la base visible desde la cual se reconoce a alguien. "Por la apariencia" conserva la idea de rasgo externo perceptible y suena natural en español, sin perder el valor de observación visual.
- source_word: ἐπιγνωσθήσεται
  english_pob_choice: is recognized
  chosen_spanish: se conoce / se reconoce
  alternatives_spanish:
  - será reconocido
  - se identifica
  lexicon: BDAG
  rationale: El futuro pasivo funciona como una verdad general en la literatura sapiencial. En español, "se conoce" y "se reconoce" expresan mejor ese valor gnómico que un futuro estrictamente temporal.
- source_word: ἀνήρ
  english_pob_choice: a man
  chosen_spanish: el hombre
  alternatives_spanish:
  - una persona
  - un varón
  lexicon: LSJ
  rationale: El griego es singular masculino y el dicho conserva esa forma. En español, "el hombre" mantiene el paralelismo y el tono proverbial; no se neutraliza sin necesidad.
- source_word: ἀπὸ ἀπαντήσεως προσώπου
  english_pob_choice: by the expression of his face
  chosen_spanish: por la expresión de su rostro
  alternatives_spanish:
  - por el encuentro de su rostro
  - por el semblante de su rostro
  - por la mirada de su rostro
  lexicon: LSJ
  rationale: La expresión griega es idiomática y literalmente alude al "encuentro del rostro". "La expresión de su rostro" conserva la imagen facial y comunica con claridad el sentido de la frase en español, como equivalente natural del giro griego.
- source_word: νοήμων
  english_pob_choice: a man of understanding
  chosen_spanish: el hombre entendido
  alternatives_spanish:
  - el hombre de entendimiento
  - el hombre prudente
  - el hombre inteligente
  lexicon: LSJ
  rationale: νοήμων denota comprensión, discernimiento y entendimiento. "Entendido" mantiene el matiz sapiencial y suena idiomático en español; "prudente" o "inteligente" estrechan o desplazan el campo semántico.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB en inglés, que eliminó "when he meets you" por no estar en el griego y mantuvo la estructura paralela. La redacción española conserva ese paralelismo y evita añadir un complemento inexistente en el original.
  spanish_consistency_notes:
  - Se mantuvo "hombre" para reflejar el masculino singular del griego y el tono proverbial.
  - '"Reconoce/se reconoce" reproduce el valor gnómico del pasivo futuro sin forzar una temporalidad futura.'
  - '"Rostro" traduce προσώπου con registro más natural que "cara" en este contexto sapiencial.'
  - Se evitó "Cristo", "Yahvé" u otra terminología no pertinente en este versículo.
