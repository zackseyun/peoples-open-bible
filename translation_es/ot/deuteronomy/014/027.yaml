review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: mandato de no desatender al levita local, con la razón de que no tiene porción/herencia con Israel. También conserva adecuadamente el trasfondo de apoyo comunitario al levita. Sin embargo, la formulación «dentro de tus ciudades» no preserva tan bien como debería el modismo hebreo ni la lógica de la nota, y la puntuación puede mejorarse para mayor naturalidad.'
  spanish_quality_summary: El español es claro y legible, pero «que está dentro de tus ciudades» suena algo forzado; en español bíblico-natural es mejor «que está en tus ciudades» o, si se quiere preservar más la imagen, «que está dentro de tus puertas» con nota. Además, la coma tras el segmento relativo no es necesaria. El resto del versículo suena bien y mantiene un registro moderno y digno.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Levita», «herencia» y «contigo» están bien. «Descuides» es una buena elección contextual para לֹא תַעַזְבֶנּוּ, con alternativas correctamente señaladas en nota. La nota cultural debe corresponder mejor al anclaje textual revisado.
  issues:
  - severity: medium
    issue: «dentro de tus ciudades» resulta poco natural y no corresponde idealmente al modismo hebreo
    rationale: El hebreo dice literalmente «en/dentro de tus puertas», un modismo para las localidades propias. En español, «dentro de tus ciudades» suena extraño; «en tus ciudades» comunica mejor el sentido idiomático, mientras la nota puede preservar la imagen literal.
  - severity: low
    issue: La nota a dice «Hebreo:» de forma algo torpe y con comillas innecesarias
    rationale: 'Puede formularse con más naturalidad en español: «Lit. hebreo, “dentro de tus puertas”; modismo para tus ciudades o comunidades locales.»'
  - severity: low
    issue: La coma antes de «no lo descuides» entorpece el flujo
    rationale: En español, el relativo especificativo no suele separarse con coma del predicado principal en esta estructura.
  revised_spanish_text: Y al levita que está en tus ciudades[a][b][c] no lo descuides, porque no tiene parte ni herencia contigo.
  revised_footnotes:
