translation:
  language: es
  text: Así pondré fin a la lascivia en la tierra[a], y todas las mujeres serán advertidas y no actuarán conforme a su lascivia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «serán disciplinadas» o «serán corregidas». El verbo hebreo puede indicar corrección mediante castigo, así como advertencia por medio del ejemplo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִשְׁבַּתִּי
  english_pob_choice: I will put an end
  chosen_spanish: pondré fin
  alternatives_spanish:
  - haré cesar
  - detendré
  lexicon: HALOT
  rationale: El hiphil de שׁבת expresa causar que algo cese. «Pondré fin» conserva esa fuerza causativa en un español natural y digno, sin debilitarla a un simple «parar».
- source_word: זִמָּה
  english_pob_choice: lewdness
  chosen_spanish: lascivia
  alternatives_spanish:
  - maldad
  - obscenidad
  - depravación
  lexicon: HALOT
  rationale: En Ezequiel 23 el término tiene un matiz sexual y vergonzoso ligado a adulterio/prostitución. «Lascivia» transmite mejor ese campo semántico en español que un término más general como «maldad».
- source_word: מִן הָאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - de la tierra
  - fuera de la tierra
  lexicon: HALOT
  rationale: Aunque מִן suele significar «de / desde», con este objeto abstracto la idea es la eliminación dentro de la esfera de la tierra. «En la tierra» comunica bien ese ámbito de acción, como en la decisión inglesa auditable.
- source_word: וְנִוַּסְּרוּ
  english_pob_choice: will be warned
  chosen_spanish: serán advertidas
  alternatives_spanish:
  - serán disciplinadas
  - serán corregidas
  - serán castigadas
  lexicon: HALOT
  rationale: El pual de יסר puede implicar disciplina, corrección o instrucción correctiva. Aquí el efecto ejemplar del juicio encaja mejor con «serán advertidas», sin borrar la dimensión de corrección.
- source_word: כָּל הַנָּשִׁים
  english_pob_choice: all women
  chosen_spanish: todas las mujeres
  alternatives_spanish:
  - todas las mujeres de la tierra
  - todas
  lexicon: HALOT
  rationale: La expresión es marcadamente femenina y debe mantenerse así. «Todas las mujeres» es natural en español y preserva el alcance general del texto sin neutralizarlo.
- source_word: וְלֹא תַעֲשֶׂינָה
  english_pob_choice: and will not act
  chosen_spanish: y no actuarán
  alternatives_spanish:
  - y no harán
  - y no obrarán
  lexicon: HALOT
  rationale: עָשָׂה es amplio, pero en este contexto moral «actuar» suena más idiomático que un «hacer» más mecánico. Mantiene el valor conductual de la cláusula final.
- source_word: כְּזִמַּתְכֶנָה
  english_pob_choice: according to your lewdness
  chosen_spanish: conforme a vuestra lascivia
  alternatives_spanish:
  - según vuestra lascivia
  - como vuestra lascivia
  lexicon: HALOT
  rationale: La כ comparativa expresa el modo o patrón de conducta. «Conforme a» conserva esa comparación normativa. «Vuestra» refleja que el poseedor del hebreo está en segunda persona plural femenina; se eligió una forma reverente y bíblica, aunque el español moderno podría usar «su» para neutralizar el número.
theological_decisions:
- issue: Alcance de «todas las mujeres» en un oráculo de juicio con imaginería femenina
  english_pob_reading: Render the phrase straightforwardly as 'all women' within the prophetic rhetoric, without expanding it to 'all people' or restricting it to only the two symbolic sisters.
  chosen_spanish_reading: Traducir de manera directa «todas las mujeres» dentro de la retórica profética, sin ampliarlo a «todas las personas» ni restringirlo solo a las dos hermanas simbólicas.
  alternative_spanish_readings:
  - todas las mujeres de la tierra
  - todas las personas representadas por mujeres
  rationale: El hebreo dice explícitamente «todas las mujeres». El capítulo usa imaginería femenina para Samaria y Jerusalén, pero también las presenta como ejemplo para otras. La traducción conserva esa retórica sin resolver interpretativamente más de lo que el texto afirma.
  doctrine_reference: Precisión semántica y retórica; preservar la tensión interpretativa sin neutralizar el género.
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo con acuerdo alto con el control inglés de POB. Se mantuvo la secuencia causativa de «poner fin», el valor moral-sexual de זִמָּה, y el matiz de advertencia/corrección de וְנִוַּסְּרוּ. Se evitó suavizar el plural femenino de «todas las mujeres» y se preservó la comparación de כ en la cláusula final.
  spanish_consistency_notes:
  - Se usa «Yahvé» por norma del proyecto cuando aparezca el Nombre divino; en este versículo no aparece.
  - Se conserva una sintaxis cercana al hebreo, pero con ajuste idiomático en «pondré fin» y «serán advertidas».
  - «Lascivia» mantiene el sesgo sexual-moral que el contexto exige, evitando una traducción demasiado general como «maldad».
  - La nota al pie preserva la alternativa semántica importante de יסר sin duplicar marcadores.
