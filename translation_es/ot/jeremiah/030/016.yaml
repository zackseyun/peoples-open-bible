translation:
  language: es
  text: Por tanto, todos los que te devoran serán devorados[a], y todos tus adversarios, todos ellos, irán al cautiverio; los que te saquean serán despojo, y a todos los que te despojan los entregaré al despojo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todos los que te saquean serán saqueados». El hebreo usa términos estrechamente relacionados para el expolio en la última cláusula.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Expresa de manera natural la relación inferencial o consecuencial del hebreo, con un registro sobrio y bíblico en español.
- source_word: אֹכְלַיִךְ / יֵאָכֵלוּ
  english_pob_choice: all who devour you will be devoured
  chosen_spanish: todos los que te devoran serán devorados
  alternatives_spanish:
  - todos los que te comen serán comidos
  - todos los que te consumen serán consumidos
  lexicon: HALOT
  rationale: En español, 'devorar' conserva mejor la fuerza metafórica de אכל en lenguaje profético que un 'comer' literal o demasiado plano.
- source_word: צָרַיִךְ
  english_pob_choice: your adversaries
  chosen_spanish: tus adversarios
  alternatives_spanish:
  - tus enemigos
  - tus foes
  lexicon: HALOT
  rationale: '''Adversarios'' mantiene el registro formal y el sentido de hostilidad del término sin reducirlo necesariamente a una enemistad meramente personal.'
- source_word: כֻּלָּם
  english_pob_choice: every one of them
  chosen_spanish: todos ellos
  alternatives_spanish:
  - cada uno de ellos
  - todos
  lexicon: HALOT
  rationale: La repetición enfática del hebreo queda bien reflejada en español con 'todos ellos', sin volver la frase pesada.
- source_word: בַּשְּׁבִי יֵלֵכוּ
  english_pob_choice: will go into captivity
  chosen_spanish: irán en cautiverio
  alternatives_spanish:
  - irán al cautiverio
  - irán en exilio
  - irán como cautivos
  lexicon: HALOT
  rationale: '''Cautiverio'' es una forma natural y fiel para שׁבי; preserva la reversión de fortuna y evita confundirlo con exilio en un sentido más amplio.'
- source_word: שֹׁאסַיִךְ
  english_pob_choice: those who plunder you
  chosen_spanish: los que te saquean
  alternatives_spanish:
  - los que te despojan
  - los que te plagan
  lexicon: HALOT
  rationale: '''Saquean'' comunica con claridad el verbo de expolio violento y se enlaza bien con la clausula paralela siguiente.'
- source_word: לִמְשִׁסָּה
  english_pob_choice: will become plunder
  chosen_spanish: serán saqueados
  alternatives_spanish:
  - serán despojo
  - serán botín
  lexicon: HALOT
  rationale: Aunque el sustantivo apunta a 'despojo/botín', en español la construcción verbal 'serán saqueados' reproduce el giro resultante de forma idiomática y simétrica con la primera mitad del verso.
- source_word: בֹּזְזַיִךְ
  english_pob_choice: all who spoil you
  chosen_spanish: los que te despojan
  alternatives_spanish:
  - los que te saquean
  - los que te roban
  lexicon: HALOT
  rationale: '''Despojan'' conserva la cercanía léxica con בזז y evita repetir exactamente ''saquean'' de la cláusula anterior, manteniendo el paralelismo con variedad controlada.'
- source_word: אֶתֵּן לָבַז
  english_pob_choice: I will give up to spoil
  chosen_spanish: los entregaré al despojo
  alternatives_spanish:
  - los daré por botín
  - los entregaré para saqueo
  - los daré al saqueo
  lexicon: HALOT
  rationale: La expresión hebrea de entregar 'a despojo/botín' se vierte con un giro natural en español que conserva la idea judicial de poner a disposición del saqueo.
theological_decisions:
- issue: Imágenes de inversión retributiva en guerra
  english_pob_reading: Retain the imagery of devouring, plundering, and captivity as covenantal/judicial reversal against Zion's enemies.
  chosen_spanish_reading: Mantener la imagen de devorar, cautiverio y despojo como inversión retributiva contra los enemigos de Sion.
  alternative_spanish_readings:
  - Suavizar la imagen a un castigo general
  - Parafrasear sin conservar la reciprocidad del verbo
  rationale: 'El verso expresa la justicia retributiva por medio de una inversión exacta: quienes devoran, saquean y despojan terminan sufriendo la misma suerte. La traducción debe preservar esa lógica sin moralizarla ni diluirla.'
  doctrine_reference: Principio de equivalencia óptima y fidelidad al sentido llano del texto fuente; no paraphrase beyond what the source warrants.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que prefirió en la última cláusula un equivalente de mayor consistencia léxica con בזז/בז. En español se reflejó esa consistencia con 'despojan' / 'despojo', manteniendo a la vez una redacción publicable y natural. También se respetó la tensión léxica entre 'devorar' y 'saquear' en las cláusulas paralelas, sin homogenizarlas.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general del proyecto cuando corresponda, pero este versículo no contiene el Tetragrámaton.
  - Se prefirió 'cautiverio' para שבי por ser claro y bíblicamente reconocible en español contemporáneo.
  - 'Se mantuvo el paralelismo verbal con variación controlada: ''saquean'' / ''despojan'' / ''despojo''.'
  - La nota al pie conserva la alternativa lexical que el audit trail inglés documenta para la última cláusula.
