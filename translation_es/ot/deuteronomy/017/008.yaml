  rationale: La revisión corrige el punto principal de fidelidad semántica al hacer explícito en español el valor idiomático forense de בֵּין דָּם לְדָם, mejora ligeramente la naturalidad de 'asunto' a 'caso', y rehace las notas para que correspondan a alternativas reales y a sus anclajes correctos en el texto. Se conserva 'Yahvé' conforme a la política del proyecto y se mantiene la cadencia formal del original.
