translation:
  language: es
  text: 'Porque se dijeron entre sí, razonando equivocadamente: «Nuestra vida es corta y dolorosa, y no hay remedio al final de la vida de un hombre[a], y no se ha conocido a nadie que haya regresado de Hades[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «al final de un hombre», expresión singular genérica para la mortalidad humana.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no se ha conocido a nadie que haya salido/liberado de Hades», preservando más literalmente la fuerza del participio griego ὁ ἀναλύσας.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπον γὰρ ἐν ἑαυτοῖς
  english_pob_choice: For they said among themselves
  chosen_spanish: Porque se dijeron entre sí
  alternatives_spanish:
  - Pues se dijeron entre sí
  - Porque hablaron entre sí
  lexicon: LSJ
  rationale: La construcción presenta un dicho interno; «se dijeron entre sí» comunica de forma natural la deliberación mutua. «Porque» conserva el valor causal del γάρ.
- source_word: λογισάμενοι οὐκ ὀρθῶς
  english_pob_choice: reasoning wrongly
  chosen_spanish: razonando equivocadamente
  alternatives_spanish:
  - pensando incorrectamente
  - razonando no rectamente
  - con razonamiento insano
  lexicon: LSJ
  rationale: El participio expresa la manera o causa de lo dicho; «razonando equivocadamente» mantiene el juicio sobre su proceso mental sin endurecerlo más allá del griego.
- source_word: ὀλίγος ἐστὶν
  english_pob_choice: Our life is short
  chosen_spanish: Nuestra vida es corta
  alternatives_spanish:
  - Nuestra vida es breve
  - Nuestra vida es poca
  lexicon: LSJ
  rationale: Con βίος, ὀλίγος se refiere a duración. «Corta» es la opción más idiomática y fiel en español actual.
- source_word: λυπηρὸς ὁ βίος ἡμῶν
  english_pob_choice: Our life is ... sorrowful
  chosen_spanish: y dolorosa
  alternatives_spanish:
  - y triste
  - y afligida
  - y penosa
  lexicon: LSJ
  rationale: λυπηρός denota lo que causa dolor o pena. «Dolorosa» conserva el peso afectivo del término sin reducirlo solo a tristeza emocional.
- source_word: ἴασις
  english_pob_choice: remedy
  chosen_spanish: remedio
  alternatives_spanish:
  - curación
  - sanación
  - medicina
  lexicon: LSJ
  rationale: Sigo la revisión inglesa más reciente y el campo semántico de ἴασις como recurso/restauración. «Remedio» suena natural en español y evita estrechar el término a una curación clínica.
- source_word: ἐν τελευτῇ ἀνθρώπου
  english_pob_choice: at the end of a man's life
  chosen_spanish: al final de la vida de un hombre
  alternatives_spanish:
  - en la muerte de un hombre
  - al final de la vida humana
  - al fin del ser humano
  lexicon: LSJ
  rationale: La expresión griega usa singular genérico. «De un hombre» refleja ese singular representativo y mantiene la lectura antropológica del texto.
- source_word: ὁ ἀναλύσας
  english_pob_choice: no one has been known to return
  chosen_spanish: nadie ha sido conocido que haya regresado
  alternatives_spanish:
  - nadie ha sido conocido que haya vuelto
  - nadie ha sido conocido que haya salido
  - nadie ha sido hallado que haya regresado
  lexicon: LSJ
  rationale: El participio sugiere a alguien que se desata/parte; en contexto con ᾅδου el sentido es volver desde allí. «Haya regresado» conserva esa dirección sin añadir una imagen ajena.
- source_word: ἐξ ᾅδου
  english_pob_choice: from Hades
  chosen_spanish: de Hades
  alternatives_spanish:
  - del Hades
  - del reino de los muertos
  - de la tumba
  lexicon: LSJ
  rationale: Se mantiene el nombre propio «Hades» para preservar el término griego explícito y evitar sustituirlo por una paráfrasis teológica más interpretativa.
theological_decisions:
- issue: Tratamiento de ᾅδης como nombre propio
  english_pob_reading: Hades
  chosen_spanish_reading: Hades
  alternative_spanish_readings:
  - el sepulcro
  - la tumba
  - el reino de los muertos
  rationale: El texto griego nombra ᾅδης directamente. Mantener «Hades» conserva el mundo conceptual del original y evita igualarlo prematuramente con una sola noción española de sepultura o inframundo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Singular genérico en ἀνθρώπου
  english_pob_reading: a man's life
  chosen_spanish_reading: la vida de un hombre
  alternative_spanish_readings:
  - la vida humana
  - la vida de una persona
  rationale: El singular masculino funciona como representativo universal. En español, «de un hombre» refleja ese genérico sin convertirlo en exclusión sexual.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La redacción sigue el texto griego de Swete y toma en cuenta la revisión inglesa más reciente, especialmente el cambio de «healing» a «remedy» para ἴασις. También preserva la imagen de ᾅδης como «Hades» y el singular genérico de ἀνθρώπου, conforme al audit trail.
  spanish_consistency_notes:
  - Se mantiene «Hades» como préstamo transliterado en lugar de «sepulcro» o «reino de los muertos» para conservar la terminología del original.
  - Se usa «remedio» para ἴασις en coherencia con la revisión inglesa y con un español natural.
  - El marcador [a] se vincula a la deliberación interior; el marcador [b] al singular genérico de ἀνθρώπου.
  - La puntuación busca reproducir la cadencia de una sola oración compleja con discurso directo final.
