translation:
  language: es
  text: 'Pero si digo esto al joven[a]: «Mira, las flechas están más allá de ti», entonces ve, porque Yahvé te ha enviado lejos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las flechas están más lejos que tú». La expresión hebrea indica que las flechas han pasado al joven, señal de que David debe irse.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: En este contexto de contraste entre señales, «Pero si» conserva el valor adversativo que el audit trail inglés destacó con «But if» y suena natural en español.
- source_word: כֹה
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - así
  - de este modo
  lexicon: HALOT
  rationale: El demostrativo funciona en la introducción de la cita directa. «Esto» reproduce el valor deíctico de manera clara y natural en español.
- source_word: אֹמַר
  english_pob_choice: I say
  chosen_spanish: digo
  alternatives_spanish:
  - les digo
  - hablo
  lexicon: HALOT
  rationale: En discurso directo, «digo» comunica con naturalidad la introducción de la señal verbal, manteniendo el sentido básico de אמר.
- source_word: לָעֶלֶם
  english_pob_choice: to the young man
  chosen_spanish: al joven
  alternatives_spanish:
  - al muchacho
  - al muchacho servidor
  lexicon: HALOT
  rationale: עֶלֶם designa un joven. «Al joven» conserva el valor léxico sin introducir explícitamente la función de siervo, que no está en el sustantivo mismo.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Miren
  - Ve
  lexicon: HALOT
  rationale: La partícula deíctica pide una llamada de atención. «Mira» es el equivalente natural en español, equivalente al «Look» del POB inglés.
- source_word: הַחִצִּים
  english_pob_choice: the arrows
  chosen_spanish: las flechas
  alternatives_spanish:
  - las saetas
  - los dardos
  lexicon: HALOT
  rationale: En español bíblico, «flechas» comunica claramente חִצִּים y evita un arcaísmo innecesario.
- source_word: מִמְּךָ וָהָלְאָה
  english_pob_choice: are beyond you
  chosen_spanish: están más allá de ti
  alternatives_spanish:
  - están más lejos que tú
  - quedan más allá de ti
  lexicon: HALOT
  rationale: La expresión indica que las flechas han pasado al joven. «Más allá de ti» refleja bien la relación espacial y preserva la señal implícita que David debe salir.
- source_word: לֵךְ
  english_pob_choice: go
  chosen_spanish: vete
  alternatives_spanish:
  - ve
  - sal
  lexicon: HALOT
  rationale: En este contexto, el imperativo implica retirarse/departir. «Vete» explicita el valor pragmático sin añadir más de lo que el hebreo comunica en contexto.
- source_word: שִׁלַּחֲךָ
  english_pob_choice: has sent you away
  chosen_spanish: te ha despedido
  alternatives_spanish:
  - te ha enviado
  - te ha dejado ir
  lexicon: HALOT
  rationale: El audit trail inglés optó por «has sent you away». En español, «despedir» expresa bien el acto de enviar a alguien fuera o dejarlo partir, conservando la idea de partida obligada.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se mantiene la convención del proyecto para el Nombre divino: «Yahvé», en lugar de una sustitución por título.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. La pauta del proyecto pide transliterarlo como «Yahvé» para preservar el nombre personal del Dios de Israel y no sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del texto hebreo y del audit trail inglés. No se detectaron cambios requeridos en la última pasada; se mantuvo la lectura óptima equivalente y la decisión estable sobre el nombre divino.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme a la terminología del proyecto.
  - Se prefirió «flechas» por claridad y naturalidad en español, sin perder el valor de חִצִּים.
  - El imperativo «vete» refleja la fuerza contextual de לֵךְ como salida/departida.
  - La nota al pie conserva la alternativa espacial documentada en el POB inglés sin sobreinterpretar el hebreo.
