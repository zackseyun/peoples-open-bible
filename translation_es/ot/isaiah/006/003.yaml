    text: O «de las huestes». La expresión hebrea צְבָאוֹת se refiere al conjunto de fuerzas bajo el mando de Yahvé, tanto celestiales como terrenales.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: YHWH, tradicionalmente traducido «el SEÑOR».'
    reason: alternative_reading
  revision_rationale: 'La revisión corrige dos puntos principales: (1) ajusta los verbos al valor narrativo más natural y fiel del hebreo con «llamó… dijo»; (2) mueve la nota sobre YHWH al lugar correcto, anclándola en «Yahvé». Se conserva «de los ejércitos» por claridad en español, respaldado por la nota alternativa «de las huestes».'
