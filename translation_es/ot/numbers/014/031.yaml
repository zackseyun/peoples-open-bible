translation:
  language: es
  text: 'Pero sus pequeñitos, de los cuales ustedes dijeron: “Serán presa[a]”, yo los haré entrar, y ellos conocerán[b] la tierra que ustedes rechazaron[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “serán botín” o “llegarán a ser despojo”. El hebreo puede expresar la idea de ser tomados como botín de guerra.
    reason: lexical_alternative
  - marker: b
    text: O “experimentarán la tierra”. El hebreo “conocer” puede tener aquí un sentido experiencial.
    reason: lexical_alternative
  - marker: c
    text: O “despreciaron”.
    reason: lexical_alternative
lexical_decisions:
- source_word: טַפְּכֶם
  english_pob_choice: your little ones
  chosen_spanish: sus pequeñitos
  alternatives_spanish:
  - sus niños
  - sus hijos pequeños
  - sus dependientes
  lexicon: HALOT
  rationale: טַף se refiere a niños pequeños o a los más vulnerables del grupo. “Pequeñitos” conserva esa idea de fragilidad mejor que “hijos” a secas, y “sus” refleja el sufijo de segunda persona plural.
- source_word: לָבַז
  english_pob_choice: would become plunder
  chosen_spanish: Serán presa
  alternatives_spanish:
  - Serán botín
  - Serán despojo
  - Serán presa de guerra
  lexicon: HALOT
  rationale: בַּז expresa la idea de botín o saqueo capturado por un enemigo. “Presa” comunica bien la amenaza militar en español natural; “botín” también es posible, pero puede sonar más a objetos que a personas. Se mantiene la fuerza de la advertencia sin suavizarla.
- source_word: וְהֵבֵיאתִי אֹתָם
  english_pob_choice: I will bring in
  chosen_spanish: yo los introduciré
  alternatives_spanish:
  - yo los traeré adentro
  - yo los llevaré a la tierra
  - yo los haré entrar
  lexicon: HALOT
  rationale: El hiphil de בוא aquí significa hacer entrar. “Introduciré” conserva el movimiento de entrada y evita repetir innecesariamente “a la tierra”, que ya queda implícita en el contexto inmediato. También mantiene el matiz de acción divina soberana.
- source_word: וְיָדְעוּ
  english_pob_choice: they will know
  chosen_spanish: ellos conocerán
  alternatives_spanish:
  - ellos sabrán
  - ellos experimentarán
  - ellos llegarán a conocer
  lexicon: HALOT
  rationale: יָדַע puede incluir conocimiento experiencial. “Conocerán” preserva el verbo básico hebreo sin cerrar la posibilidad de esa experiencia, y en español suena natural junto con “la tierra”.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra prometida
  - el país
  - la región
  lexicon: HALOT
  rationale: Aunque “land” suele traducirse como “la tierra”, aquí el referente es claro por el contexto. Se evita añadir “prometida” o “de Canaán”, porque el hebreo dice simplemente “la tierra”.
- source_word: מְאַסְתֶּם בָּהּ
  english_pob_choice: that you rejected
  chosen_spanish: que ustedes rechazaron
  alternatives_spanish:
  - que ustedes despreciaron
  - que ustedes desecharon
  - que ustedes repudiaron
  lexicon: HALOT
  rationale: מָאַס puede significar rechazar, despreciar o desairar. “Rechazaron” refleja la negativa del pueblo hacia la tierra sin cargar más de lo que el contexto exige. El pronombre femenino queda absorbido naturalmente en “la tierra”.
theological_decisions:
- issue: Si explicitar o no que “la tierra” es la tierra prometida de Canaán
  english_pob_reading: Retain 'the land' in the main text without adding 'promised' or 'Canaan.'
  chosen_spanish_reading: Mantener “la tierra” sin añadir “prometida” ni “de Canaán”.
  alternative_spanish_readings:
  - la tierra prometida
  - la tierra de Canaán
  rationale: El hebreo solo dice “la tierra”. El contexto narrativo ya identifica el referente, así que añadir precisión geográfica o teológica iría más allá del verso. La traducción conserva la sobriedad del original.
  doctrine_reference: Principios de traducción POB §1, §6
- issue: Cómo reflejar el valor experiencial de “conocer”
  english_pob_reading: Or 'they will experience the land.' The Hebrew 'know' can carry an experiential sense here.
  chosen_spanish_reading: Conservar “conocerán” en el texto principal, dejando abierta la lectura experiencial.
  alternative_spanish_readings:
  - ellos experimentarán la tierra
  - ellos conocerán por experiencia la tierra
  rationale: “Conocerán” es la forma más directa de traducir יָדְעוּ y deja espacio para el matiz experiencial señalado en la auditoría inglesa. No hace falta forzar una paráfrasis en el cuerpo del texto.
  doctrine_reference: Principios de traducción POB §1, §6
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el texto fuente y la lectura inglesa muestran alta concordancia, con observaciones menores sobre matiz léxico. La versión española sigue esa misma línea y solo explicita en notas las alternativas relevantes donde el hebreo lo permite.'
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como forma estándar del proyecto cuando aparezca el nombre divino; en este versículo no ocurre.
  - Se evita “Señor” como sustituto, porque el verso no contiene el tetragrámaton ni un κύριος citado.
  - “La tierra” se conserva sin adiciones interpretativas, en paralelo con el inglés auditado.
  - “Conocerán” se deja con apertura experiencial, coherente con la nota inglesa sobre יָדַע.
  - El tono es sobrio y bíblico, sin arcaísmos innecesarios ni calcos duros.
