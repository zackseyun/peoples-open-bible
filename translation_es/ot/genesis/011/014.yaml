translation:
  language: es
  text: Selaj vivió treinta años y engendró a Éber[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Salah» para el nombre de Selaj; el hebreo aquí refleja «Selaj».
    reason: lexical_alternative
  - marker: b
    text: O «Heber» para Éber; «Éber» refleja más directamente el hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/שֶׁ֥לַח
  english_pob_choice: Shelah
  chosen_spanish: Selaj
  alternatives_spanish:
  - Sala
  - Salah
  lexicon: HALOT
  rationale: El hebreo וְשֶׁלַח corresponde al nombre propio שֶׁלַח. Para el español, 'Selaj' mantiene más de cerca las consonantes y la forma hebrea que una adaptación tradicional como 'Salah'. 'Sala' sería una transliteración demasiado simplificada y menos reconocible como nombre bíblico.
- source_word: חַ֖י
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - estuvo vivo
  - estaba vivo
  lexicon: HALOT
  rationale: En fórmulas genealógicas, el qal de חיה expresa la edad alcanzada antes del siguiente evento. 'Vivió' reproduce de manera natural y fiel ese valor en español.
- source_word: שְׁלֹשִׁ֣ים שָׁנָ֑ה
  english_pob_choice: thirty years
  chosen_spanish: treinta años
  alternatives_spanish:
  - treinta años de edad
  lexicon: HALOT
  rationale: La expresión hebrea marca la edad en una fórmula genealógica. En español, 'treinta años' es claro, idiomático y suficientemente preciso sin añadir palabras no exigidas por el hebreo.
- source_word: וַ/יּ֖וֹלֶד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - engendró a
  - fue padre de
  - engendró
  lexicon: HALOT
  rationale: En genealogías, ילד en hifil se refiere a 'fathered/became the father of'. En español bíblico, 'engendró' conserva la fuerza genealógica y el registro formal. Se mantiene la relación de paternidad del texto original sin recurrir a una paráfrasis amplia.
- source_word: אֶת
  english_pob_choice: '[not translated]'
  chosen_spanish: '[no traducido]'
  lexicon: HALOT
  rationale: El marcador de objeto directo hebreo no tiene equivalente independiente en español; su función queda expresada por el orden sintáctico y la preposición 'a' antes del complemento personal.
- source_word: עֵבֶר
  english_pob_choice: Eber
  chosen_spanish: Éber
  alternatives_spanish:
  - Éber
  - Heber
  lexicon: HALOT
  rationale: El nombre propio עֵבֶר se translitera como 'Éber' para reflejar más directamente el hebreo. 'Heber' es una forma tradicional en castellano, pero es menos transparente respecto de la forma consonántica del original.
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés en la estructura genealógica: nombre propio + edad + verbo de engendrar + nombre del descendiente. No se documentan revisiones textuales o cambios de traducción, y el control cruzado reporta alta concordancia.'
  spanish_consistency_notes:
  - Se conserva un registro bíblico sobrio y genealógico, sin añadir elementos explicativos ausentes del hebreo.
  - Se mantiene la transliteración directa de los nombres propios para mayor auditabilidad frente al hebreo.
  - La fórmula 'vivió treinta años y engendró a Éber' sigue de cerca la sintaxis del original y el valor genealógico documentado en el POB inglés.
