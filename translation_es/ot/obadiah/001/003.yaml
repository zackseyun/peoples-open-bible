translation:
  language: es
  text: 'La soberbia de tu corazón te ha engañado[a], tú que habitas en las hendiduras de la peña[b], cuya morada está en lo alto, que dices en tu corazón: «¿Quién me hará descender a tierra[c]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'arrogancia' o 'presunción' para 'soberbia'.
    reason: lexical_alternative
  - marker: b
    text: O 'en las fisuras de la peña'. La frase evoca fortalezas rocosas y viviendas de acantilado defensables.
    reason: cultural_note
  - marker: c
    text: O 'a la tierra'.
    reason: lexical_alternative
lexical_decisions:
- source_word: זְד֤וֹן
  english_pob_choice: pride
  chosen_spanish: soberbia
  alternatives_spanish:
  - orgullo
  - arrogancia
  - presunción
  lexicon: HALOT
  rationale: El hebreo designa insolencia orgullosa o autoexaltación presuntuosa. En español, 'soberbia' expresa bien ese matiz moral y conserva el tono profético de reprensión. 'Orgullo' también es posible, pero puede sonar más amplio y menos acusatorio.
- source_word: לִבְּךָ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu interior
  - tu mente
  - tu ser
  lexicon: HALOT
  rationale: '''Corazón'' conserva el hebraísmo del asiento interior de la voluntad, el pensamiento y la actitud. Es la equivalencia más natural y fiel al idioma bíblico.'
- source_word: הִשִּׁיאֶךָ
  english_pob_choice: has deceived you
  chosen_spanish: te ha engañado
  alternatives_spanish:
  - te ha seducido
  - te ha extraviado
  - te ha desviado
  lexicon: HALOT
  rationale: El hifil de נשׁא aquí tiene fuerza de engañar o hacer errar. 'Te ha engañado' es claro, idiomático y mantiene la acción consumada del verbo.
- source_word: שֹׁכְנִ֥י
  english_pob_choice: you who dwell
  chosen_spanish: tú que habitas
  alternatives_spanish:
  - habitante
  - el que habita
  - tú que moras
  lexicon: HALOT
  rationale: Aunque formalmente es un participio, en el contexto funciona como descripción directa del destinatario. 'Tú que habitas' hace explícito el vocativo en español sin perder la fuerza descriptiva.
- source_word: בְחַגְוֵי סֶּלַע
  english_pob_choice: in the clefts of the rock
  chosen_spanish: en las hendiduras de la peña
  alternatives_spanish:
  - en las grietas de la roca
  - en los peñascos hendidos
  - en las fisuras de la roca
  lexicon: HALOT
  rationale: חַגְוֵי alude a hendiduras, recovecos o refugios. 'Hendiduras de la peña' es una imagen natural en español y conserva la idea de lugares rocosos defensivos.
- source_word: מְר֣וֹם שִׁבְתּ֑וֹ
  english_pob_choice: whose dwelling is on high
  chosen_spanish: cuya morada está en lo alto
  alternatives_spanish:
  - cuya habitación está en las alturas
  - cuyo asiento está en lo alto
  - cuya residencia es elevada
  lexicon: HALOT
  rationale: La frase describe la elevación de la vivienda. 'Morada' y 'en lo alto' preservan la imagen de altura e inaccesibilidad con un español natural y solemne.
- source_word: אֹמֵ֣ר בְּלִבּ֔וֹ
  english_pob_choice: who say in your heart
  chosen_spanish: que dices en tu corazón
  alternatives_spanish:
  - diciendo en tu corazón
  - que dice en su corazón
  - que piensas en tu corazón
  lexicon: HALOT
  rationale: El hebreo cambia a una forma de tercera persona, pero dentro del discurso directo al destinatario. En español conviene mantener la dirección en segunda persona para que la acusación profética suene coherente y viva, como en el audit trail inglés.
- source_word: מִ֥י יוֹרִדֵ֖נִי
  english_pob_choice: Who will bring me down
  chosen_spanish: ¿Quién me hará descender?
  alternatives_spanish:
  - ¿Quién me derribará?
  - ¿Quién me bajará?
  - ¿Quién me hará caer?
  lexicon: HALOT
  rationale: '''Hacer descender'' reproduce bien el valor causativo del hifil de ירד y mantiene el contraste vertical del verso. ''Derribar'' o ''hacer caer'' intensifican la imagen, pero alteran más el matiz básico del verbo.'
- source_word: אָֽרֶץ
  english_pob_choice: to the ground
  chosen_spanish: a tierra
  alternatives_spanish:
  - al suelo
  - a la tierra
  - al polvo
  lexicon: HALOT
  rationale: Aquí אֶרֶץ contrasta con la altura de la morada y expresa ser abatido a un nivel inferior. 'A tierra' conserva la concisión del hebreo y la oposición vertical sin sobreinterpretarla.
theological_decisions:
- issue: Cambio entre formas de segunda y tercera persona en la misma línea
  english_pob_reading: 'Render the descriptive clauses in direct address to Edom: ''you who dwell ... whose dwelling ... who say in your heart'''
  chosen_spanish_reading: 'Mantener todo el tramo en segunda persona: ''tú que habitas ... cuya morada ... que dices en tu corazón'''
  alternative_spanish_readings:
  - 'Conservar la tercera persona: ''el que habita ... cuya morada ... que dice en su corazón'''
  rationale: El hebreo alterna formas descriptivas, pero la unidad retórica sigue dirigida a Edom. En español, la segunda persona conserva mejor el filo profético y evita una oscilación innecesaria entre interlocución y descripción.
  doctrine_reference: No aplica una doctrina específica; es una decisión retórico-discursiva sobre el адресado del oráculo.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el WLC y se alinea con el consenso del audit trail inglés: mantiene el sentido de orgullo engañoso, la imagen de refugio rocoso elevado y la pregunta desafiante final. No se registran revisiones adicionales en la fuente auditada.'
  spanish_consistency_notes:
  - Se preservó 'Yahvé' como norma de proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usó 'corazón' para mantener el hebraísmo antropológico del centro interior de pensamiento y voluntad.
  - Se eligió segunda persona en la descripción para conservar la fuerza del discurso profético, coherente con el contexto del libro.
  - La imagen topográfica se mantuvo concreta ('hendiduras de la peña', 'en lo alto', 'a tierra') para respetar la metáfora vertical del verso.
