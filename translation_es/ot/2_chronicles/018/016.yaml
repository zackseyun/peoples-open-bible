translation:
  language: es
  text: 'Y dijo[a]: «Vi a todo Israel disperso sobre los montes, como ovejas que no tienen pastor. Y Yahvé dijo: “Estos no tienen señores[b]; que cada hombre vuelva a su casa en paz”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «como ovejas sin pastor».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «estos no tienen señores». Algunas traducciones suavizan el plural a «no tienen amo» o «no tienen señor».
    reason: lexical_alternative
lexical_decisions:
- source_word: נְפוֹצִים
  english_pob_choice: scattered
  chosen_spanish: disperso
  alternatives_spanish:
  - esparcido
  - dispersado
  lexicon: HALOT
  rationale: El participio pasivo expresa a Israel deshecho y repartido por el terreno después de la derrota. «Disperso» conserva la imagen y suena natural en español sin añadir una idea no presente.
- source_word: עַל הֶהָרִים
  english_pob_choice: on the mountains
  chosen_spanish: sobre los montes
  alternatives_spanish:
  - en los montes
  - sobre las montañas
  lexicon: HALOT
  rationale: La preposición y el plural se reflejan con una locución directa. «Montes» es una opción bíblica clara y evita una paráfrasis innecesaria.
- source_word: כַּצֹּאן אֲשֶׁר אֵין לָהֶן רֹעֶה
  english_pob_choice: like sheep that have no shepherd
  chosen_spanish: como ovejas que no tienen pastor
  alternatives_spanish:
  - como ovejas sin pastor
  - como rebaño sin pastor
  lexicon: HALOT
  rationale: Se mantiene la comparación pastoral tradicional y el sentido relacional de la cláusula relativa. «Pastor» es el equivalente más natural y fiel de רֹעֶה en este contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El proyecto usa «Yahvé» para el Tetragrámaton. En español bíblico es la forma establecida del nombre divino y preserva el nombre propio en lugar de sustituirlo por un título.
- source_word: לֹא אֲדֹנִים לָאֵלֶּה
  english_pob_choice: These have no master
  chosen_spanish: estos no tienen un solo amo
  alternatives_spanish:
  - estos no tienen amo
  - estos no tienen señores
  lexicon: HALOT
  rationale: El hebreo plural אֲדֹנִים señala ausencia de dirección/autoridad sobre el pueblo. «Amo» conserva el valor de dominio o señorío político sin convertirlo en un título teológico; «un solo» recoge el matiz colectivo que la revisión inglesa decidió enfatizar.
- source_word: יָשׁוּבוּ אִישׁ לְבֵיתוֹ
  english_pob_choice: let each man return to his house
  chosen_spanish: que cada hombre vuelva a su casa
  alternatives_spanish:
  - que cada uno vuelva a su casa
  - que cada hombre regrese a su casa
  lexicon: HALOT
  rationale: El imperfecto funciona como exhortación/jussivo en el discurso citado, por lo que «que» reproduce bien la fuerza directiva. «Cada hombre» refleja el distributivo אִישׁ.
- source_word: בְּשָׁלוֹם
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - con paz
  - pacíficamente
  lexicon: HALOT
  rationale: La frase idiomática se traduce con la equivalencia natural «en paz», que conserva tanto el sentido de regreso seguro como la solemnidad de la despedida.
theological_decisions:
- issue: Renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo contiene explícitamente el nombre propio divino. En la tradición española del proyecto, la forma estable y reconocible es «Yahvé», que mantiene la distinción entre el nombre y un título como «Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de אֲדֹנִים en la cláusula negativa
  english_pob_reading: These have no master
  chosen_spanish_reading: Estos no tienen un solo amo
  alternative_spanish_readings:
  - Estos no tienen amo
  - Estos no tienen señores
  rationale: El plural hebreo permite notar la ausencia de autoridad gobernante sobre Israel. «Amo» conserva el campo semántico de dominio sin trasladarlo a una fórmula litúrgica; «un solo» refleja la elección revisada del inglés, que suaviza el plural sin borrarlo del todo.
  doctrine_reference: HALOT; contexto político-militar del pasaje
- issue: Relación de la imagen pastoral con el juicio o la guía divina
  english_pob_reading: like sheep that have no shepherd
  chosen_spanish_reading: como ovejas que no tienen pastor
  alternative_spanish_readings:
  - como ovejas sin pastor
  rationale: No se introduce una lectura alegórica adicional; la imagen describe desamparo y falta de conducción tras la batalla. Se conserva el tono de la comparación sin convertirla en comentario doctrinal.
  doctrine_reference: Uso figurado explícito en el hebreo
translation_notes:
  revision_awareness: 'He seguido el audit trail inglés en dos puntos sensibles: la imagen pastoral se mantuvo sin expandirse, y la cláusula de liderazgo se ajustó para respetar el plural hebreo y la revisión que prefirió una formulación más natural en singular/collective sense. También preservé la decisión doctrinal del proyecto de traducir יְהוָה con el nombre divino en español.'
  spanish_consistency_notes:
  - He usado «Yahvé» en lugar de «SEÑOR» para mantener la consistencia con el proyecto y la fuente hebrea.
  - He preferido «amo» para אֲדֹנִים porque aquí el referente es liderazgo/autoridad sobre el pueblo, no un título divino.
  - «Pastor» se mantiene para רֹעֶה por ser el equivalente español más natural y establecido en el contexto bíblico.
  - 'El estilo general busca una equivalencia óptima: formal, legible y fiel al orden y a las imágenes del hebreo sin sonar calcado.'
