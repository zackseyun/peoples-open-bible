  text: וְ/אוּלָ֗ם אָנֹכִ֞י מָלֵ֤אתִי כֹ֨חַ֙ אֶת ר֣וּחַ יְהוָ֔ה וּ/מִשְׁפָּ֖ט וּ/גְבוּרָ֑ה לְ/הַגִּ֤יד לְ/יַֽעֲקֹב֙ פִּשְׁע֔/וֹ וּ/לְ/יִשְׂרָאֵ֖ל חַטָּאתֽ/וֹ־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/micah/003/008.yaml
  text: But as for me[a], I am filled with power, with the Spirit of Yahweh, and with justice and might[b], to declare to Jacob his transgression and to Israel his sin.
  footnotes:
  - marker: a
    text: Or, 'I am filled with power by the Spirit of the LORD, and with justice and might.' The Hebrew sequence may be understood either as a list of what fills the prophet or as identifying the Spirit of the LORD as the source of that power.
    reason: alternative_reading
  - marker: b
    text: '''Transgression'' can also be rendered ''rebellion,'' highlighting defiance against God.'
    reason: lexical_alternative
