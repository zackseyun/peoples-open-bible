- from: 'Entonces Jonatán dijo a David[a]: «¿Qué dice tu alma? Yo haré eso por ti».'
  to: 'Entonces Jonatán dijo a David[a]: «¿Qué dice tu alma? Yo lo haré por ti».'
  rationale: Se mantiene la fidelidad al hebreo con «¿Qué dice tu alma?», pero se mejora la naturalidad española sustituyendo «eso» por el clítico «lo». También se simplifica la nota para que preserve la alternativa idiomática sin repetir literalmente el texto principal.
