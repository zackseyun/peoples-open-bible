translation:
  language: es
  text: Pues la ley también prevalece sobre el afecto hacia los padres[a], sin traicionar la virtud por causa de ellos[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «buena disposición hacia los padres» o «devoción hacia los padres».
    reason: lexical_alternative
  - marker: b
    text: O «por ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: νόμος
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  - la ley divina
  - la Torá
  lexicon: LSJ
  rationale: En 4 Macabeos, νόμος designa la norma judía que rige la vida moral; «la ley» comunica bien la autoridad normativa sin introducir una glosa innecesaria. Se evita «SEÑOR» o una paráfrasis más explicativa porque el griego no la exige.
- source_word: εὐνοίας
  english_pob_choice: affection
  chosen_spanish: afecto
  alternatives_spanish:
  - buena disposición
  - benevolencia
  - devoción
  lexicon: LSJ
  rationale: εὔνοια puede abarcar buena disposición o benevolencia, pero en la construcción πρὸς γονεῖς la idea relacional y afectiva es natural en español como «afecto hacia los padres». Conserva la tensión del texto sin volverlo obediencia explícita.
- source_word: κρατεῖ
  english_pob_choice: prevails over
  chosen_spanish: prevalece sobre
  alternatives_spanish:
  - tiene dominio sobre
  - es más fuerte que
  - se impone sobre
  lexicon: LSJ
  rationale: «Prevalece sobre» reproduce la idea de superioridad o dominio moral de κρατέω en un registro natural y formal. Mantiene la prioridad ética sin exagerar a un gobierno coercitivo.
- source_word: μὴ καταπροδιδοὺς
  english_pob_choice: not betraying
  chosen_spanish: sin traicionar
  alternatives_spanish:
  - no traicionando
  - sin entregar
  - sin abandonar
  lexicon: LSJ
  rationale: El participio con κατά intensifica la idea de entrega o traición completa. «Sin traicionar» es idiomático en español y conserva la fuerza negativa sin endurecer la sintaxis de modo artificial.
- source_word: ἀρετήν
  english_pob_choice: virtue
  chosen_spanish: la virtud
  alternatives_spanish:
  - la excelencia
  - la rectitud moral
  lexicon: LSJ
  rationale: ἀρετή en 4 Macabeos conserva su valor de excelencia moral. «La virtud» mantiene el registro ético-filosófico del libro y su consistencia terminológica en español.
- source_word: δι᾽ αὐτούς
  english_pob_choice: on account of them
  chosen_spanish: por causa de ellos
  alternatives_spanish:
  - a causa de ellos
  - por ellos
  - en razón de ellos
  lexicon: LSJ
  rationale: διά con acusativo expresa motivo o causa. «Por causa de ellos» es claro y formal en español, y preserva la relación causal sin reducirla a mera afectividad.
theological_decisions:
- issue: Prioridad moral de la ley frente al afecto filial
  english_pob_reading: The verse states that the law takes precedence over affection toward parents when the two come into conflict.
  chosen_spanish_reading: El versículo afirma que la ley tiene prioridad sobre el afecto hacia los padres cuando ese afecto pudiera llevar a comprometer la virtud.
  alternative_spanish_readings:
  - La ley domina el afecto filial sin implicar necesariamente un conflicto concreto en todos los casos.
  - La ley disciplina el afecto hacia los padres.
  rationale: 'κρατεῖ combinado con el participio negativo indica una jerarquía moral real: la ley permanece por encima para que no se traicione la virtud. La redacción española conserva esa tensión sin suavizarla ni convertirla en una mera orientación general.'
  doctrine_reference: 'DOCTRINE.md: Preservar la tensión teológica en vez de resolverla; primacía del original sobre la tradición de traducción.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail al reflejar δι᾽ αὐτούς con una expresión formal de causa («por causa de ellos») y mantiene la estructura de prioridad moral presente en el inglés POB. Se evitó trasladar mecánicamente «because of them»; se tomó en cuenta la preferencia revisada por un registro más formal y cercano al griego.
  spanish_consistency_notes:
  - Se mantiene «ley» como término normativo principal para νόμος en vez de una glosa más interpretativa.
  - Se preserva «virtud» para ἀρετή, coherente con el registro ético-filosófico de 4 Macabeos.
  - El sujeto implícito del participio se integra con una construcción española natural («sin traicionar») para evitar calco excesivo.
  - El marcado de notas a y b aparece exactamente en los lugares pertinentes del texto principal.
