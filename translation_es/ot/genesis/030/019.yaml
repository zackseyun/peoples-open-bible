  text: Lea concibió otra vez y dio a luz un sexto hijo de Jacob.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַתַּהַר
  english_pob_choice: conceived
  chosen_spanish: concibió
  alternatives_spanish:
  - quedó embarazada
  lexicon: HALOT
  rationale: רהה en forma narrativa con ו consecutiva expresa el inicio del embarazo; «concibió» es breve, natural y fiel al evento biológico descrito. «Quedó embarazada» es posible, pero menos directo en este contexto narrativo.
- source_word: עוֹד
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - todavía
  lexicon: HALOT
  rationale: Aquí עוֹד marca repetición en la secuencia narrativa. «Otra vez» reproduce bien ese valor de reiteración en español y mantiene el ritmo simple del hebreo.
- source_word: וַתֵּלֶד
  english_pob_choice: bore
  chosen_spanish: dio a luz
  alternatives_spanish:
  - parió
  - engendró
  lexicon: HALOT
  rationale: ילד en esta forma significa dar a luz. «Dio a luz» es claro y digno en español moderno; «parió» es más crudo y «engendró» desplaza el sentido hacia el padre.
- source_word: בֵּן
  english_pob_choice: son
  chosen_spanish: hijo
  alternatives_spanish:
  - varón
  - niño
  lexicon: HALOT
  rationale: בֵּן puede ser «hijo» o «son»; en español bíblico contemporáneo «hijo» es el equivalente más natural y fiel en una nota de nacimiento.
- source_word: שִׁשִּׁי
  english_pob_choice: sixth
  chosen_spanish: sexto
  alternatives_spanish:
  - el sexto
  lexicon: HALOT
  rationale: El ordinal modifica a «hijo» y señala el orden de nacimiento. «Sexto» conserva el valor ordinal sin sobrecargar la frase.
- source_word: לְיַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: para Jacob
  alternatives_spanish:
  - a Jacob
  - de Jacob
  lexicon: HALOT
  rationale: El prefijo ל expresa relación/beneficio en la fórmula de nacimiento. En español, «para Jacob» conserva esa relación sin forzar una construcción poco natural como «dio a luz Jacob un hijo».
translation_notes:
  revision_awareness: El texto inglés auditado no introduce notas ni variantes textuales; la concordancia con el hebreo es alta. Se preserva el carácter narrativo simple y directo del hebreo sin añadir explicaciones ajenas al versículo.
  spanish_consistency_notes:
  - Se mantiene «Jacob» como nombre propio sin transliteración adicional.
  - Se evita «Cristo», «SEÑOR» u այլ terminología no pertinente al versículo.
  - La frase «dio a luz un sexto hijo para Jacob» conserva la relación del hebreo לְיַעֲקֹב sin volverla artificiosamente literal.
