translation:
  language: es
  text: el que rescata y libra[a], y hace señales y maravillas en el cielo y en la tierra, el que rescató a Daniel del poder de los leones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «de la mano de los leones».
    reason: lexical_alternative
lexical_decisions:
- source_word: מְשֵׁיזִב
  english_pob_choice: rescues
  chosen_spanish: rescata
  alternatives_spanish:
  - libra
  - salva
  lexicon: HALOT
  rationale: El participio arameo expresa la acción de sacar a alguien del peligro. «Rescata» conserva esa fuerza activa y resulta natural en español; «salva» sería posible, pero puede sonar más general o teológica.
- source_word: וּמַצִּל
  english_pob_choice: delivers
  chosen_spanish: libra
  alternatives_spanish:
  - rescata
  - salva
  lexicon: HALOT
  rationale: La pareja verbal pide dos matices próximos pero no idénticos. «Libra» mantiene el paralelismo con «rescata» sin repetir exactamente la misma palabra.
- source_word: וְעָבֵד
  english_pob_choice: works
  chosen_spanish: hace
  alternatives_spanish:
  - obra
  - realiza
  - efectúa
  lexicon: HALOT
  rationale: El sentido básico es «hacer». «Hace señales y maravillas» sigue de cerca la estructura del arameo y suena natural en español bíblico contemporáneo.
- source_word: אָתִין
  english_pob_choice: signs
  chosen_spanish: señales
  alternatives_spanish:
  - signos
  - prodigios
  lexicon: HALOT
  rationale: «Señales» es la correspondencia habitual para este término en la expresión fija «señales y maravillas», preservando el valor milagroso y revelador.
- source_word: וְתִמְהִין
  english_pob_choice: wonders
  chosen_spanish: maravillas
  alternatives_spanish:
  - prodigios
  - portentos
  lexicon: HALOT
  rationale: «Maravillas» conserva el carácter extraordinario del binomio fijo y es idiomático en español bíblico sin perder claridad.
- source_word: בִּשְׁמַיָּא וּבְאַרְעָא
  english_pob_choice: in heaven and on earth
  chosen_spanish: en el cielo y en la tierra
  alternatives_spanish:
  - en los cielos y en la tierra
  - en el cielo y sobre la tierra
  lexicon: HALOT
  rationale: La merismia se expresa de forma natural con singulars colectivos en español. «Cielo» y «tierra» reflejan bien el alcance total del enunciado.
- source_word: דִּי
  english_pob_choice: who
  chosen_spanish: el que
  alternatives_spanish:
  - quien
  - que
  lexicon: HALOT
  rationale: La partícula relativa introduce una descripción de Dios. «El que» hace explícito el valor identificador y fluye bien en español tras la enumeración.
- source_word: שֵׁיזִיב
  english_pob_choice: rescued
  chosen_spanish: rescató
  alternatives_spanish:
  - libró
  - salvó
  lexicon: HALOT
  rationale: El perfecto narra un hecho puntual respecto de Daniel. «Rescató» conserva la conexión léxica con el participio inicial y mantiene la concreción histórica.
- source_word: מִן יַד
  english_pob_choice: from the power of
  chosen_spanish: del poder de
  alternatives_spanish:
  - de la mano de
  - del control de
  lexicon: HALOT
  rationale: Aunque la expresión es literalmente «de la mano de», en español «del poder de» comunica con claridad la idea de dominio o amenaza mortal, siguiendo el criterio auditado del inglés POB.
- source_word: אַרְיָוָתָא
  english_pob_choice: the lions
  chosen_spanish: los leones
  alternatives_spanish:
  - los leones esos
  - los leones del foso
  lexicon: HALOT
  rationale: El sustantivo es plural definido; «los leones» conserva la referencia específica a los animales del relato sin añadir información no presente en el verso.
theological_decisions:
- issue: Descripción doxológica de Dios con participios y cláusula relativa
  english_pob_reading: 'Render as a doxological description of God: ''who rescues and delivers, and works signs and wonders in heaven and on earth, who rescued Daniel...'''
  chosen_spanish_reading: 'Traducir como una descripción doxológica: «el que rescata y libra, y hace señales y maravillas en el cielo y en la tierra, el que rescató a Daniel...»'
  alternative_spanish_readings:
  - «el que rescata y salva...», con menos diferenciación léxica
  - una versión más literal y repetitiva
  rationale: El texto presenta a Dios mediante una acumulación laudatoria de acciones. La redacción española conserva el tono de proclamación y el paralelismo, sin introducir contenido doctrinal ajeno al pasaje.
  doctrine_reference: Traducción de sentido llano y reverente; preservación del paralelismo y del valor doxológico del texto.
translation_notes:
  revision_awareness: La revisión inglesa más reciente eliminó el guion largo y dejó la cláusula final como relativa directa. La versión española sigue esa fluidez con «el que rescató a Daniel...», sin guion ni ruptura sintáctica, y mantiene el par «rescata y libra» para reflejar la duplicación aramea.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo exija explícitamente; aquí el referente es Dios de forma general, así que no aparece.
  - Se conserva el par léxico «rescata / libra» para reflejar el doble valor verbal del arameo, evitando colapsarlo en un solo verbo.
  - «Señales y maravillas» reproduce la expresión fija y evita sustituirla por formulaciones menos transparentes.
  - La nota al pie está anclada en el texto mediante [a] y corresponde únicamente a la alternativa literal de «de la mano de».
