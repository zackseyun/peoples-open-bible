translation:
  language: es
  text: Debes dejar ir sin falta a la madre[a], pero puedes tomar las crías para ti[b], para que te vaya bien y prolongues tus días[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «dejarás ir sin falta a la madre».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los hijos»; en el contexto de un nido de aves, se refiere a las crías.'
    reason: lexical_alternative
  - marker: c
    text: O, más literalmente, «y prolongues días».
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁלֵּחַ תְּשַׁלַּח
  english_pob_choice: must surely let ... go
  chosen_spanish: Debes dejar ir sin falta
  alternatives_spanish:
  - ciertamente debes dejar ir
  - debes soltar por completo
  lexicon: HALOT
  rationale: El infinitivo absoluto más el verbo finito intensifica el mandato. En español, 'debes dejar ir sin falta' conserva el énfasis sin sonar arcaico ni mecánico.
- source_word: הָאֵם
  english_pob_choice: the mother
  chosen_spanish: la madre
  alternatives_spanish:
  - la madre ave
  - la madre pájaro
  lexicon: HALOT
  rationale: El contexto inmediato es un nido de aves; 'la madre' refleja directamente el hebreo, y el referente aviario queda claro por el contexto sin añadirlo en el texto principal.
- source_word: הַבָּנִים
  english_pob_choice: the young
  chosen_spanish: los polluelos
  alternatives_spanish:
  - las crías
  - los jóvenes
  lexicon: HALOT
  rationale: Aunque literalmente dice 'los hijos/los hijos varones', en este contexto se trata de crías de ave. 'Polluelos' hace explícita esa referencia natural en español y evita la ambigüedad de 'hijos'.
- source_word: תִּקַּח לָךְ
  english_pob_choice: you may take ... for yourself
  chosen_spanish: puedes tomar para ti
  alternatives_spanish:
  - puedes tomar
  - puedes llevarte para ti
  lexicon: HALOT
  rationale: 'El imperfecto funciona de modo permisivo en el contexto: después de soltar a la madre, tomar las crías está permitido. ''Para ti'' conserva לָךְ.'
- source_word: לְמַעַן יִיטַב לָךְ
  english_pob_choice: so that it may go well for you
  chosen_spanish: para que te vaya bien
  alternatives_spanish:
  - a fin de que te vaya bien
  - para que sea bueno para ti
  lexicon: HALOT
  rationale: La fórmula expresa resultado/propósito de bendición pactal. 'Te vaya bien' reproduce el sentido idiomático de manera natural en español.
- source_word: וְהַאֲרַכְתָּ יָמִים
  english_pob_choice: and you may prolong your days
  chosen_spanish: y prolongues tus días
  alternatives_spanish:
  - y alargues tus días
  - y vivas largo tiempo
  lexicon: HALOT
  rationale: 'Se mantiene la cercanía formal al hebreo y la revisión inglesa más reciente: ''prolongues tus días'' reproduce la imagen verbal sin convertirla en una paráfrasis más libre.'
theological_decisions:
- issue: Tipo de promesa asociada a la obediencia
  english_pob_reading: The verse states a covenantal blessing/result without specifying a mechanistic guarantee for every individual case.
  chosen_spanish_reading: El versículo presenta una bendición o resultado de pacto, sin convertirlo en una garantía mecánica para cada caso individual.
  alternative_spanish_readings:
  - Una promesa absoluta e incondicional de longevidad individual
  - Una fórmula meramente retórica sin contenido de bendición
  rationale: La forma hebrea de propósito/resultado debe conservar su fuerza teológica sin exagerarla. La traducción mantiene la bendición prometida, pero evita sobreafirmar una garantía individual simple.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: La redacción sigue el ajuste más reciente del audit trail inglés al preferir una forma más cercana al hebreo para וְהַאֲרַכְתָּ יָמִים, manteniendo al mismo tiempo un español natural y publicable. También conserva la lectura permisiva de תִּקַּח y la tensión de bendición/resultad​o sin convertirla en promesa mecánica.
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene 'días' en lugar de 'vida larga' para reflejar más de cerca el hebreo.
  - '''Polluelos'' se eligió por claridad contextual; si se prefiere mayor literalidad, ''las crías'' seguiría siendo una alternativa válida.'
  - La puntuación reproduce una estructura de mandato seguido de permiso y propósito/resultad​o, en línea con el hebreo.
