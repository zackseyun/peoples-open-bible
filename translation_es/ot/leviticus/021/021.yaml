  to: Ningún hombre de la descendencia de Aarón el sacerdote que tenga un defecto se acercará para ofrecer las ofrendas de alimento de Yahvé[a]. Un defecto hay en él[b]; no se acercará para ofrecer el pan de su Dios.
  rationale: 'Se revisa únicamente אִשֵּׁי יְהוָה para alinearlo con la decisión léxica y semántica documentada por el POB inglés: la idea principal en este contexto es la ofrenda como alimento presentado a Dios, en paralelo con ''el pan de su Dios''. Se conserva en nota la alternativa tradicional ''por fuego''. El resto del versículo puede mantenerse por fidelidad y buena legibilidad.'
  reviewer_model: gpt-5.4
