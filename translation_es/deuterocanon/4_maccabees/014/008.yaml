translation:
  language: es
  text: Así, los jóvenes, danzando alrededor de los siete[a], los rodeaban, destruyendo el miedo a las torturas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ἑβδομάδα significa literalmente «un grupo de siete» o «hebdómada»; aquí se refiere a los siete hermanos, no a una semana.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - Entonces
  lexicon: BDAG
  rationale: Mantiene la relación de modo/resultado con el contexto anterior de manera breve y natural en español.
- source_word: περὶ τὴν ἑβδομάδα
  english_pob_choice: around the seven
  chosen_spanish: alrededor de los siete
  alternatives_spanish:
  - alrededor del grupo de siete
  - en torno a los siete
  lexicon: LSJ
  rationale: ἑβδομάδα aquí no es una semana, sino el colectivo de siete hermanos; 'los siete' conserva esa referencia sin forzar una perífrasis.
- source_word: χορεύοντες
  english_pob_choice: dancing around the seven
  chosen_spanish: danzando alrededor
  alternatives_spanish:
  - bailando alrededor
  - danzando en círculo
  lexicon: LSJ
  rationale: '''Danzando'' conserva el matiz de danza ritual o coral sin rigidizarse; el contexto de movimiento circular ya está reforzado por ''alrededor'' y ''rodeaban''.'
- source_word: οἱ μεῖρακες
  english_pob_choice: the young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los jóvenes varones
  lexicon: BDAG
  rationale: '''Jóvenes'' es natural en español y suficientemente preciso para los hermanos masculinos en este contexto.'
- source_word: ἐκύκλουν
  english_pob_choice: encircled them
  chosen_spanish: los rodeaban
  alternatives_spanish:
  - los encircaban
  - daban vueltas alrededor de ellos
  lexicon: LSJ
  rationale: El imperfecto sugiere acción continua; 'rodeaban' expresa el movimiento circular sin sonar demasiado técnico.
- source_word: τὸν βασάνων φόβον
  english_pob_choice: the fear of tortures
  chosen_spanish: el miedo a los tormentos
  alternatives_spanish:
  - el temor a los tormentos
  - el miedo de las torturas
  lexicon: BDAG
  rationale: '''Tormentos'' comunica bien el sentido de βάσανοι como sufrimientos infligidos; ''miedo a'' es una construcción natural en español.'
- source_word: καταλύοντες
  english_pob_choice: abolishing
  chosen_spanish: aboliendo
  alternatives_spanish:
  - destruyendo
  - anulando
  lexicon: BDAG
  rationale: '''Aboliendo'' reproduce la idea de hacer cesar o dejar sin efecto el miedo, en línea con el efecto decisivo del participio.'
theological_decisions:
- issue: Referencia de ἑβδομάδα
  english_pob_reading: collective reference to the seven brothers
  chosen_spanish_reading: referencia colectiva a los siete hermanos
  alternative_spanish_readings:
  - una semana
  - el séptimo día
  rationale: En este pasaje martirial, el número designa a los siete hermanos; traducirlo como una semana introduciría un sentido ajeno al contexto narrativo.
  doctrine_reference: 'Translation philosophy: primacía del sentido original sobre la tradición de traducción.'
- issue: Intensidad de βασάνων
  english_pob_reading: tortures
  chosen_spanish_reading: tormentos
  alternative_spanish_readings:
  - torturas
  - penas
  rationale: '''Tormentos'' conserva la fuerza de βάσανοι como sufrimientos infligidos, y en español puede abarcar la dimensión de tortura sin sonar excesivamente técnica.'
  doctrine_reference: Lexical precision with contextual dignity.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que prefirió una imagen más natural de movimiento circular ('encircled them') en vez de una secuencia más rígida. En español se reflejó con 'rodeaban' junto con 'alrededor', preservando el paralelismo de danza y circunvalación sin añadir información no sustentada.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' y otros sustitutos no pertinentes porque el versículo no contiene el nombre divino.
  - Se usa 'jóvenes' para οἱ μεῖρακες por claridad y neutralidad; 'muchachos' podría sonar demasiado juvenil.
  - '''Danzando'' mantiene el tono literario sin convertir el participio en una simple indicación de desplazamiento.'
  - '''Tormentos'' se prefiere a ''torturas'' en el texto principal por eufonía y amplitud semántica, aunque la nota deja abierta la equivalencia lexical.'
