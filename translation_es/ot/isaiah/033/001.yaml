base_translation:
  language: en
  yaml_path: translation/ot/isaiah/033/001.yaml
  text: Woe to you[a], destroyer, though you yourself have not been destroyed, and betrayer, though they have not betrayed you. When you finish destroying, you will be destroyed; when you cease betraying[c][b], they will betray you.
  footnotes:
  - marker: a
    text: 'Hebrew: ''and they have not betrayed him.'' The main text follows the sense of the direct address and parallelism; the more literal third-person reading may also be understood.'
    reason: alternative_reading
  - marker: b
    text: Or 'plunderer ... you will be plundered.' The Hebrew root can emphasize violent despoiling as well as broader devastation.
    reason: lexical_alternative
  - marker: c
    text: Or 'when you finish betraying' / 'when you cease dealing treacherously.'
    reason: lexical_alternative
