translation:
  language: es
  text: 'y las grasas del toro[a] y del carnero: la cola grasa, la grasa que cubre, los riñones y el lóbulo del hígado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'del buey'. El hebreo שׁוֹר puede referirse ampliamente al ganado vacuno; en contexto sacrificial puede traducirse 'toro' o 'buey' según el grado de especificidad que se quiera marcar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y también
  - además
  lexicon: WLC/función sintáctica
  rationale: El hebreo une la continuación del listado; en español basta con 'y' para conservar la coordinación sin introducir elementos ajenos.
- source_word: הַחֲלָבִים
  english_pob_choice: the fat pieces
  chosen_spanish: las grasas
  alternatives_spanish:
  - los pedazos de grasa
  - las porciones grasas
  lexicon: HALOT
  rationale: En una lista sacrificial, חֲלָבִים designa las porciones grasas consagradas. 'Las grasas' mantiene la referencia cultual sin sobreexplicar; en español suena más natural que calcar 'pedazos de grasa'.
- source_word: מִן הַשּׁוֹר
  english_pob_choice: from the ox
  chosen_spanish: del toro
  alternatives_spanish:
  - del buey
  - del toro
  lexicon: HALOT
  rationale: El término שׁוֹר puede abarcar ganado vacuno; aquí se opta por 'toro' como equivalente natural y suficientemente amplio en español, sin fijar innecesariamente la especie sexualizada del animal. Se conserva la alternativa lexical admitida por el POB inglés con una opción idiomática española.
- source_word: וּמִן הָאַיִל
  english_pob_choice: and from the ram
  chosen_spanish: y del carnero
  alternatives_spanish:
  - y del macho carnero
  - y del cordero adulto
  lexicon: HALOT
  rationale: אַיִל corresponde a 'carnero' en contexto sacrificial. Es el término más natural y preciso en español.
- source_word: הָאַלְיָה
  english_pob_choice: the fat tail
  chosen_spanish: la cola grasa
  alternatives_spanish:
  - la grasa de la cola
  - la cola de grasa
  lexicon: HALOT
  rationale: El hebreo nombra una parte anatómica con valor cultual específico; 'cola grasa' mantiene la imagen y evita una paráfrasis que borre la terminología sacrificial.
- source_word: הַמְכַסֶּה
  english_pob_choice: the covering fat
  chosen_spanish: la grasa que cubre
  alternatives_spanish:
  - la grasa de cobertura
  - el tejido graso que cubre
  lexicon: HALOT
  rationale: El participio sustantivado de כסה expresa lo que cubre. 'La grasa que cubre' preserva la relación descriptiva y es más claro que un calco nominal rígido.
- source_word: הַכְּלָיֹת
  english_pob_choice: the kidneys
  chosen_spanish: los riñones
  alternatives_spanish:
  - las vísceras renales
  lexicon: HALOT
  rationale: Término anatómico estándar y transparente en español.
- source_word: יֹתֶרֶת הַכָּבֵד
  english_pob_choice: the lobe of the liver
  chosen_spanish: el lóbulo del hígado
  alternatives_spanish:
  - el lóbulo del hígado
  - la porción del hígado
  lexicon: HALOT
  rationale: La expresión idiomática apunta a una parte específica del hígado. 'Lóbulo' reproduce bien el valor anatómico y resulta natural en español contemporáneo.
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el texto hebreo y con el POB inglés: no se requieren correcciones textuales. Se preservó la secuencia sacrificial y la terminología anatómica/cultual sin suavizarla.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se evitó 'SEÑOR' y 'Cristo' por no corresponder al contenido del pasaje.
  - 'La lista conserva el orden del hebreo: grasas del animal vacuno, del carnero, cola grasa, grasa que cubre, riñones y lóbulo del hígado.'
