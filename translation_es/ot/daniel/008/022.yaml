translation:
  language: es
  text: 'Y en cuanto al cuerno quebrado[a], en cuyo lugar surgieron cuatro: cuatro reinos se levantarán de esa nación, pero no con su poder.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''pero no con su poder'', refiriéndose al poder del primer rey representado por el cuerno quebrado.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהַנִּשְׁבֶּרֶת
  english_pob_choice: as for the broken horn
  chosen_spanish: en cuanto al cuerno quebrado
  alternatives_spanish:
  - el quebrado
  - el que fue quebrado
  lexicon: HALOT
  rationale: El participio femenino singular remite al sustantivo femenino implícito y previo, 'cuerno'. En español, 'en cuanto al' conserva el valor introductorio explicativo del hebreo y del POB inglés, sin volver la frase rígidamente literal.
- source_word: וַתַּעֲמֹדְנָה אַרְבַּע תַּחְתֶּיהָ
  english_pob_choice: in whose place four arose
  chosen_spanish: en cuyo lugar surgieron cuatro
  alternatives_spanish:
  - y cuatro se levantaron en su lugar
  - y en su lugar se alzaron cuatro
  lexicon: HALOT
  rationale: עָמַד aquí expresa surgir/levantarse en el sentido de asumir poder. 'Surgieron' comunica ese valor en español con naturalidad. 'En cuyo lugar' preserva el antecedente implícito del cuerno.
- source_word: אַרְבַּע מַלְכֻיּוֹת
  english_pob_choice: four kingdoms
  chosen_spanish: cuatro reinos
  alternatives_spanish:
  - cuatro reyes
  - cuatro dominios reales
  lexicon: HALOT
  rationale: En este contexto apocalíptico-político, 'reinos' es la forma más natural en español y refleja la sucesión de poderes más que solo individuos.
- source_word: מִגּוֹי
  english_pob_choice: from that nation
  chosen_spanish: de esa nación
  alternatives_spanish:
  - de la nación
  - de su nación
  lexicon: HALOT
  rationale: גוֹי significa 'nación/people'. 'Esa nación' mantiene la referencia retrospectiva al reino/grupo previo sin añadir especificación histórica que el texto no explicita aquí.
- source_word: יַעֲמֹדְנָה
  english_pob_choice: will arise
  chosen_spanish: se levantarán
  alternatives_spanish:
  - surgirán
  - aparecerán
  lexicon: HALOT
  rationale: El verbo עמד, en este marco, denota emerger o entrar en función de poder. 'Se levantarán' conserva fuerza verbal y fluidez profética en español.
- source_word: וְלֹא בְכֹחוֹ
  english_pob_choice: but not with its power
  chosen_spanish: pero no con su poder
  alternatives_spanish:
  - pero no con el poder de él
  - pero no con su fuerza
  lexicon: HALOT
  rationale: כֹּחַ es 'poder/fuerza'. El posesivo 'su' mantiene la ambigüedad del sufijo hebreo, que puede referirse al cuerno/rey o al complejo simbólico previo.
theological_decisions:
- issue: Referente del sufijo final en וְלֹא בְכֹחוֹ
  english_pob_reading: The successor kingdoms do not come with the power of the original horn/kingdom; the English footnote preserves a personal alternative, 'his power.'
  chosen_spanish_reading: Los reinos sucesores no surgen con el poder del cuerno/rey representado; el texto principal usa 'su poder' para conservar la ambigüedad simbólica.
  alternative_spanish_readings:
  - pero no con el poder de él
  - pero no con su fuerza
  rationale: La visión de Daniel entrelaza cuernos, reyes y reinos. 'Su poder' no obliga a decidir entre una referencia personal ('él') y una corporativa/simbólica ('ello'), y mantiene la tensión documentada en el POB inglés.
  doctrine_reference: Daniel 8:22; nota de traducción del POB sobre el sufijo pronominal final
translation_notes:
  revision_awareness: El borrador sigue el sentido del texto hebreo y la auditoría inglesa sin cambios sustanciales respecto al último pase revisado; conserva la ambigüedad del sufijo final y la relación explicativa del miembro quebrado con los cuatro reinos sucesores.
  spanish_consistency_notes:
  - Se mantiene 'cuerno' para la imagen simbólica y no se reemplaza por 'rey' en el texto principal.
  - '''Reinos'' se usa en sentido político-apocalíptico, coherente con la lectura inglesa auditada.'
  - La nota conserva la alternativa personal ('su poder') para reflejar la ambigüedad del hebreo.
