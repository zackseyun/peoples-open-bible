base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/012/009.yaml
  text: But they forgot Yahweh their God[a], and he sold them into the hand of Sisera, commander of the army of Hazor, and into the hand of the Philistines, and into the hand of the king of Moab; and they fought against them.
  footnotes:
