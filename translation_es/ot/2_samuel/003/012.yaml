translation:
  language: es
  text: 'Entonces Abner envió mensajeros de su parte a David, diciendo: «¿A quién pertenece la tierra?», diciendo: «Haz tu pacto conmigo, y he aquí[a], mi mano está contigo para poner de tu lado a todo Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «mi mano está contigo», un modismo que expresa apoyo o poder del lado de David.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח ... מַלְאָכִים
  english_pob_choice: sent messengers
  chosen_spanish: envió mensajeros
  alternatives_spanish:
  - envió enviados
  - envió emisarios
  lexicon: HALOT
  rationale: מַלְאָכִים en este contexto es político y humano, no angelical; «mensajeros» es claro y fiel. «Enviados» o «emisarios» son posibles, pero menos directos como equivalentes base.
- source_word: תחתו
  english_pob_choice: on his behalf
  chosen_spanish: a David[a]
  alternatives_spanish:
  - en su lugar
  - en representación de él
  lexicon: HALOT
  rationale: La frase hebrea expresa agencia/representación. En español, la idea se integra naturalmente en la cláusula con la nota a pie para mantener la función sin forzar una perífrasis pesada.
- source_word: לְמִי אָרֶץ
  english_pob_choice: To whom does the land belong?
  chosen_spanish: ¿A quién pertenece la tierra?
  alternatives_spanish:
  - ¿De quién es la tierra?
  - ¿A quién corresponde la tierra?
  lexicon: HALOT
  rationale: La pregunta hebrea es breve y algo elíptica; «¿A quién pertenece la tierra?» conserva su fuerza retórica y su posible carga sobre el derecho al gobierno/posesión.
- source_word: כָּרְתָה בְרִיתְךָ אִתִּי
  english_pob_choice: Make your covenant with me
  chosen_spanish: Haz tu pacto conmigo
  alternatives_spanish:
  - Haz tu alianza conmigo
  - Corta tu pacto conmigo
  lexicon: HALOT
  rationale: כרת ברית es la expresión idiomática estándar para establecer un pacto. «Haz tu pacto conmigo» comunica bien el sentido y conserva el posesivo de segunda persona, como en el hebreo.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y mira[b]
  alternatives_spanish:
  - y he aquí
  - y observa
  lexicon: HALOT
  rationale: «Mira» reproduce de manera natural la función discursiva de atención del hebreo. La nota explica el valor enfático sin recurrir a un arcaísmo innecesario.
- source_word: יָדִי עִמָּךְ
  english_pob_choice: my hand is with you
  chosen_spanish: mi mano está contigo
  alternatives_spanish:
  - estoy de tu lado
  - mi poder está contigo
  lexicon: HALOT
  rationale: Se preserva la metáfora de «mano» como apoyo/poder. Traducirla como «estoy de tu lado» aclararía la idea, pero perdería el forcejo imagístico documentado.
- source_word: לְהָסֵב אֵלֶיךָ
  english_pob_choice: to bring ... over to you
  chosen_spanish: para traer ... a tu lado
  alternatives_spanish:
  - para hacer pasar ... a ti
  - para transferir ... a ti
  lexicon: HALOT
  rationale: En contexto político, הסב expresa cambiar la lealtad hacia otro. «Traer ... a tu lado» mantiene el movimiento de afiliación sin sobretraducirlo como mera logística.
- source_word: אֶת כָּל יִשְׂרָאֵל
  english_pob_choice: all Israel
  chosen_spanish: a todo Israel
  alternatives_spanish:
  - a todo el Israel
  - a la totalidad de Israel
  lexicon: HALOT
  rationale: La referencia es al conjunto nacional/tribal. «Todo Israel» es natural en español bíblico contemporáneo y conserva la amplitud colectiva.
theological_decisions:
- issue: Función retórica de לְמִי אָרֶץ
  english_pob_reading: Retained as a direct rhetorical question about rightful possession/rule.
  chosen_spanish_reading: Se conserva como pregunta directa sobre a quién pertenece la tierra, sin resolverla más allá de lo que el hebreo exige.
  alternative_spanish_readings:
  - La tierra es mía
  - ¿Quién debe gobernar la tierra?
  rationale: El hebreo es conciso y algo elíptico. Mantener la pregunta deja intacta la tensión política sobre dominio y derecho, en lugar de convertirla en una afirmación o en una explicación interpretativa.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se siguió el tramo más reciente del control de revisiones: se adoptó la formulación más natural «¿A quién pertenece la tierra?» como base de la pregunta, manteniendo intacta la repetición de «diciendo» y el resto de la cláusula según el último pasaje auditado en inglés.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «pacto» para בְּרִית en coherencia con el uso del proyecto y la frase idiomática hebrea.
  - Se conservó la metáfora de «mano» en vez de sustituirla por una paráfrasis explicativa, para respetar el lenguaje político del texto.
  - El tono general es bíblico contemporáneo, no arcaizante, pero se mantiene «he aquí/mira» sólo donde el discurso hebreo lo justifica.
