    text: 'Hebreo: «cada hombre a su compañero».'
    reason: lexical_alternative
  revision_rationale: La revisión corrige el anclaje de la nota al pie para que corresponda a אִישׁ אֶל־רֵעֵהוּ y suaviza levemente la expresión recíproca para un español más natural, sin alterar el sentido ni las decisiones lexicográficas del audit trail.
