revisions:
- from: Mira[a], vienen días en que todo lo que hay en tu casa, y lo que tus padres[b] han acumulado hasta hoy, será llevado a Babilonia; no quedará nada, dice Yahvé.
  to: Mira[a], vienen días en que todo lo que hay en tu casa, y lo que tus padres[b] han guardado hasta este día, será llevado a Babilonia; no quedará nada, dice Yahvé.
  rationale: Se mantiene la estructura y el tono del borrador, pero se ajusta אָצְרוּ a «han guardado» para reflejar mejor el sentido de bienes almacenados/atesorados, y se afina עַד הַיּוֹם הַזֶּה con «hasta este día». También se simplifica la nota [a] para que funcione como verdadera alternativa léxica y quede más alineada con el patrón del audit trail inglés.
