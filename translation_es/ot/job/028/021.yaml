translation:
  language: es
  text: Está oculta a los ojos de todo ser viviente[a], y escondida de las aves de los cielos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de las aves del cielo». El hebreo dice literalmente «las aves de los cielos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנֶעֶלְמָה
  english_pob_choice: It is hidden
  chosen_spanish: Está escondida
  alternatives_spanish:
  - Ha sido escondida
  - Está oculta
  lexicon: HALOT
  rationale: El nifal perfecto femenino singular funciona predicativamente con el sustantivo femenino implícito del contexto. «Está escondida» conserva el valor pasivo/resultativo y suena natural en español sin cargar el aspecto con una perífrasis más pesada.
- source_word: מֵעֵינֵי
  english_pob_choice: from the eyes of
  chosen_spanish: de los ojos de
  alternatives_spanish:
  - del mirar de
  - a la vista de
  lexicon: HALOT
  rationale: La imagen hebrea usa literalmente «ojos» con מן. En español, «de los ojos de» preserva esa metáfora perceptiva y sigue siendo comprensible.
- source_word: כָל חָי
  english_pob_choice: every living thing
  chosen_spanish: todo ser viviente
  alternatives_spanish:
  - toda criatura viviente
  - todo lo viviente
  lexicon: HALOT
  rationale: La expresión abarca de forma general a todo lo vivo. «Todo ser viviente» mantiene el alcance universal y resulta más fluido y digno que una traducción demasiado literal o redundante.
- source_word: וּמֵעוֹף הַשָּׁמַיִם
  english_pob_choice: and from the birds of the heavens
  chosen_spanish: y de las aves de los cielos
  alternatives_spanish:
  - y de las aves del cielo
  - y de los pájaros del cielo
  lexicon: HALOT
  rationale: עוֹף refiere a aves o criaturas voladoras; «aves» es la opción natural en español bíblico contemporáneo. Se conserva «de los cielos» para reflejar el genitivo hebreo y el registro poético elevado del texto.
- source_word: נִסְתָּרָה
  english_pob_choice: concealed
  chosen_spanish: encubierta
  alternatives_spanish:
  - oculta
  - escondida
  lexicon: HALOT
  rationale: Para evitar repetir «escondida» y reflejar el paralelismo poético, «encubierta» conserva el sentido de estar oculto sin perder el matiz de cobertura/ocultamiento del nifal de סתר.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y el audit trail en inglés: mantiene la imagen de los «ojos» y la estructura paralela «de... y de...», con una leve variación léxica («encubierta») para preservar la repetición poética sin sonar redundante en español.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» u այլ máscara porque no aparece el nombre divino aquí.
  - «Cielos» mantiene el plural poético del hebreo; en nota se ofrece la alternativa singular «cielo».
  - La alternancia «escondida/encubierta» reproduce la duplicación semántica del hebreo sin mecanicismo.
  - «Todo ser viviente» conserva el alcance universal no restringido a humanos.
