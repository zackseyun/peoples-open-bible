translation:
  language: es
  text: Y Dios te llamará hijo[a], te mostrará su favor y te librará de la fosa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «y serás como hijo del Altísimo, y te amará más que tu madre». El testimonio hebreo, en cambio, dice: «Y Dios te llamará hijo, te mostrará su favor y te librará de la fosa».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְאֵל
  english_pob_choice: And God
  chosen_spanish: Y Dios
  alternatives_spanish:
  - Y el Poderoso
  - Y el Dios
  lexicon: HALOT
  rationale: El hebreo אֵל se entiende aquí mejor como la designación común de Dios, en paralelo con la referencia griega al Altísimo. «Dios» es natural en español y conserva la fuerza personal de la promesa.
- source_word: יִקְרָאֲךָ בֵּן
  english_pob_choice: will call you son
  chosen_spanish: te llamará hijo
  alternatives_spanish:
  - te llamará un hijo
  - te llamará su hijo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «te llamará hijo». En español, el orden natural requiere anteponer el pronombre objeto y mantener el sustantivo predicativo sin artículo para conservar la brevedad y la fuerza del enunciado. No se añade «su» porque no está en el hebreo.
- source_word: וְיָחְנְךָ
  english_pob_choice: he will show you favor
  chosen_spanish: te mostrará favor
  alternatives_spanish:
  - te será gracioso
  - tendrá misericordia de ti
  lexicon: HALOT
  rationale: El verbo חנן expresa conceder favor o gracia. «Mostrar favor» mantiene ese valor de benevolencia activa sin desplazarse hacia «misericordia», que en español puede sugerir un matiz distinto.
- source_word: וְיַצִּילְךָ
  english_pob_choice: and deliver you
  chosen_spanish: y te librará
  alternatives_spanish:
  - y te rescatará
  - y te salvará
  lexicon: HALOT
  rationale: נצל suele significar librar, rescatar o salvar. «Librará» funciona bien en español bíblico y conserva el sentido de liberación activa sin cerrar demasiado el ámbito de rescate.
- source_word: מִשָׁחַת
  english_pob_choice: from the Pit
  chosen_spanish: del Pozo
  alternatives_spanish:
  - de la fosa
  - de la sepultura
  - del abismo
  lexicon: HALOT
  rationale: שחת puede referirse a un pozo/fosa o al ámbito de la corrupción/muerte. «Pozo» conserva el valor imagístico de la tradición hebrea y la capitalización ayuda a leerlo como esfera de muerte, sin forzar una interpretación más específica que el hebreo no exige.
theological_decisions:
- issue: Tensión entre el hebreo y el paralelo griego sobre la filiación
  english_pob_reading: 'And God will call you son... [Greek footnote: you will be like a son of the Most High]'
  chosen_spanish_reading: Y Dios te llamará hijo
  alternative_spanish_readings:
  - serás como hijo del Altísimo
  - serás como un hijo del Altísimo
  rationale: Se sigue como texto principal el testimonio hebreo conservado, que afirma directamente la filiación declarativa por parte de Dios. La alternativa griega se preserva en nota para no borrar la tensión textual ni armonizar prematuramente las dos tradiciones.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El control de revisión más reciente indica que no hubo cambios necesarios; se mantiene el acuerdo principal entre el hebreo y el paralelo griego, preservando la divergencia textual en la nota sin suavizarla.
  spanish_consistency_notes:
  - Se usa «Dios» para אֵל, coherente con el valor divino del término en este contexto.
  - Se conserva «hijo» sin artículo para reflejar la forma predicativa breve del hebreo.
  - «Pozo» mantiene la imagen concreta del hebreo שחת y deja abierta su posible referencia al ámbito de la muerte.
  - La nota identifica explícitamente el paralelo griego para que la variante no quede oculta en el texto principal.
