translation:
  language: es
  text: Así también su ira despojará a las naciones[a], y convertirá sus aguas[b] en salmuera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «su ira heredará a las naciones». El hebreo probablemente significa «despojará a las naciones», lo cual encaja mejor en el contexto de juicio.'
    reason: alternative_reading
  - marker: b
    text: El griego especifica «aguas»; el hebreo tiene un término más amplio que puede significar «bebida» o «lo que se bebe».
    reason: lexical_alternative
lexical_decisions:
- source_word: כן
  english_pob_choice: So also
  chosen_spanish: Así también
  alternatives_spanish:
  - De igual modo
  - De la misma manera
  lexicon: HALOT
  rationale: Conserva la fuerza comparativa y enlaza la acción con el contexto precedente sin sonar artificial en español.
- source_word: זעמו
  english_pob_choice: his wrath
  chosen_spanish: su ira
  alternatives_spanish:
  - su furor
  - su enojo
  lexicon: HALOT
  rationale: «Ira» comunica bien la gravedad del juicio divino en español y corresponde al valor semántico de ὀργή.
- source_word: גוים
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: «Naciones» es el equivalente más directo y sobrio en un contexto de juicio; evita importar una oposición técnica ajena al texto.
- source_word: יוריש
  english_pob_choice: will dispossess
  chosen_spanish: despojará
  alternatives_spanish:
  - expulsará
  - hará perder su posesión
  - desposeerá
  lexicon: HALOT
  rationale: En este contexto de castigo, el valor causativo de ירש se expresa mejor como despojar/disponer de la posesión; «despojará» suena natural y conserva el sentido de privación. La alternativa griega «heredará» queda reflejada en nota.
- source_word: ויהפך
  english_pob_choice: and he will turn
  chosen_spanish: y volverá
  alternatives_spanish:
  - y transformará
  - y cambiará
  lexicon: HALOT
  rationale: «Volverá» reproduce el movimiento verbal de cambio de estado de manera idiomática en español.
- source_word: למלח
  english_pob_choice: into brine
  chosen_spanish: en salmuera
  alternatives_spanish:
  - en sal
  - en agua salada
  lexicon: HALOT
  rationale: «Salmuera» comunica con precisión agua vuelta salada, manteniendo la imagen concreta del hebreo y del griego ἅλμην.
- source_word: משקה
  english_pob_choice: their waters
  chosen_spanish: sus aguas
  alternatives_spanish:
  - su bebida
  - lo que beben
  - sus aguas de beber
  lexicon: HALOT
  rationale: Sigo la revisión más reciente y la correspondencia con el griego «waters». En español, «sus aguas» conserva el plural y la imagen del líquido afectado.
theological_decisions:
- issue: Elegir entre la lectura hebrea causativa de ירש y la lectura griega κληρονομήσει
  english_pob_reading: will dispossess nations
  chosen_spanish_reading: despojará a las naciones
  alternative_spanish_readings:
  - heredará a las naciones
  - hará heredar a las naciones
  rationale: El hebreo conservado en la tradición de Sirácida encaja mejor con el contexto de juicio; por eso se traduce con una acción de privación. La lectura griega se preserva como alternativa textual en nota para no borrar la tensión documental.
  doctrine_reference: Translation philosophy §1, primacía de la fuente original; §3, preservar tensiones documentadas
- issue: Determinar si משקה debe reflejarse como bebida genérica o como aguas
  english_pob_reading: their waters
  chosen_spanish_reading: sus aguas
  alternative_spanish_readings:
  - su bebida
  - lo que beben
  - sus bebidas
  rationale: La revisión inglesa más reciente favorece «waters», y el paralelo griego también especifica «aguas». En español, «sus aguas» mantiene la referencia líquida concreta sin estrecharla innecesariamente.
  doctrine_reference: Translation philosophy §5, consistencia con la evidencia documental y revisión auditada
translation_notes:
  revision_awareness: He seguido la revisión más reciente del expediente inglés para el segundo hemistiquio («sus aguas»), en coherencia con el paralelo griego. También he conservado la tensión textual del primer hemistiquio mediante nota, sin ocultar la lectura griega alternativa.
  spanish_consistency_notes:
  - Mantengo «ira» como término de juicio fuerte y natural en español.
  - Uso «naciones» en lugar de «gentiles» para evitar una carga interpretativa posterior no presente en el texto.
  - «Salmuera» es preferible a «sal» sola porque expresa el cambio del agua en un líquido salado.
  - Las notas están ancladas exactamente en el texto con [a] y [b], sin marcadores sueltos.
