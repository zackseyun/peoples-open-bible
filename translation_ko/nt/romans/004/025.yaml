translation:
  language: ko
  text: 그분은 우리의 범죄 때문에 넘겨지셨고, 우리의 의롭게 되심을 위하여 일으킴을 받으셨습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παρεδόθη
  english_pob_choice: was handed over
  chosen_korean: 넘겨지셨고
  alternatives_korean:
  - 내어주심을 받으셨고
  - 넘김을 받으셨고
  lexicon: BDAG
  rationale: 수난 전승의 정형 표현 παραδίδωμι를 「넘겨지다」로 옮긴다.
- source_word: παραπτώματα
  english_pob_choice: trespasses
  chosen_korean: 범죄
  alternatives_korean:
  - 허물
  - 과실
  lexicon: BDAG
  rationale: 바울 신학의 「떨어짐·옆길로 빠짐」 함의를 「범죄」로 옮긴다.
- source_word: δικαίωσιν
  english_pob_choice: justification
  chosen_korean: 의롭게 되심
  alternatives_korean:
  - 칭의
  - 의로 선언됨
  lexicon: BDAG
  rationale: 명사 δικαίωσις를 자연스러운 한국어 「의롭게 되심」으로 풀어 옮긴다.
theological_decisions:
- issue: 4:25 παρεδόθη ... ἠγέρθη — 십자가-부활의 평행 정식
  chosen_reading: 우리의 범죄 때문에 넘겨지셨고, 우리의 의롭게 되심을 위하여 일으킴을 받으셨습니다
  alternative_readings:
  - 우리 범죄로 인하여 죽으셨고, 우리 의로움으로 인하여 살리심을 받으셨습니다
  rationale: 본 절은 초기 그리스도교의 가장 오래된 신앙고백적 정식 중 하나로 추정된다. 두 διά + 대격(범죄 때문에 / 의롭게 되심을 위하여)의 평행 구조를 한국어로 균형 있게 보존한다. 두 διά의 의미를 동일하게 「때문에」로 옮기면 부활이 칭의의 결과처럼 읽힐 위험이 있으므로, 두 번째는 「~을 위하여」로 옮겨 바울의 구원사적 흐름(부활이 우리의 칭의를 가져옴)을 살린다.
  doctrine_reference: DOCTRINE.md §1+§5 — preserve creedal structure and powerful meaning
