    rationale: El expediente inglés y la decisión teológica prefieren ‘righteousness’ como lectura principal por su fuerza ética-teológica; en español ‘rectitud’ es el equivalente más cercano aquí, mientras ‘justicia’ debe quedar como alternativa en nota.
  - severity: low
    issue: La nota [c] invierte la relación principal/alternativa del expediente inglés.
    rationale: 'Actualmente la nota dice ‘O: aprenden rectitud’, pero el inglés hace lo contrario: texto principal ‘righteousness’ con alternativa ‘justice’. La nota debe ajustarse para no alterar la decisión auditada.'
