translation:
  language: es
  text: Hay un amigo, compañero de mesa[a], pero no se encontrará[b] en un día de angustia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «amigo de mesa»; el griego paralelo dice «el que comparte mesas», aclarando que se trata de alguien que comparte comidas contigo pero resulta poco fiable en la adversidad.
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice «no se encontrará»; el griego paralelo dice «no permanecerá». Ambas lecturas comunican que ese amigo desaparece cuando llega la aflicción.
    reason: alternative_reading
lexical_decisions:
- source_word: אוֹהֵב / φίλος
  english_pob_choice: friend
  chosen_spanish: amigo
  alternatives_spanish:
  - amigo cercano
  - amigo
  lexicon: HALOT; BDAG
  rationale: El hebreo y el griego presentan a una persona en relación amistosa, no solo a un socio casual. «Amigo» comunica naturalmente la relación en español y conserva el marco sapiencial sin introducir una carga más intensa que el contexto no exige.
- source_word: חָבֵר / κοινωνὸς
  english_pob_choice: friend; table-companion
  chosen_spanish: compañero de mesa
  alternatives_spanish:
  - compañero
  - comensal
  - compañero de banquete
  lexicon: HALOT; BDAG
  rationale: La imagen central es la de alguien que comparte la mesa. «Compañero de mesa» conserva esa metáfora de comunión de comidas que el hebreo comprime y que el griego explicita con κοινωνὸς τραπεζῶν.
- source_word: שֻׁלְחָן / τραπεζῶν
  english_pob_choice: table-companion
  chosen_spanish: mesa
  alternatives_spanish:
  - mesa
  - banquete
  - comida
  lexicon: HALOT; BDAG
  rationale: En español, «mesa» permite mantener la imagen concreta sin sonar forzado. No se sustituye por una idea más interpretativa como «banquete», porque el texto solo dice participación de mesa/comidas.
- source_word: וְלֹא יִמָּצֵא / οὐ μὴ παραμείνῃ
  english_pob_choice: he will not be found
  chosen_spanish: no se encontrará
  alternatives_spanish:
  - no permanecerá
  - no estará
  - no se hará presente
  lexicon: HALOT; BDAG
  rationale: La lectura hebrea primaria dice literalmente «no será hallado», mientras que el griego aporta el matiz de «no permanecerá». «No se encontrará» preserva la formulación hebrea y deja ver la desaparición del falso amigo en la aflicción.
- source_word: בְּיוֹם רָעָה / ἐν ἡμέρᾳ θλίψεώς σου
  english_pob_choice: in a day of trouble
  chosen_spanish: en el día de tu angustia
  alternatives_spanish:
  - en el día de tu tribulación
  - en el día de tu aflicción
  - en un día de angustia
  lexicon: HALOT; BDAG
  rationale: El hebreo habla de un «día de calamidad/trabajo duro» y el griego de «aflicción». «Angustia» transmite bien la adversidad personal y encaja con el pronombre de segunda persona del griego («tu»), sin perder el sentido de prueba o tribulación.
theological_decisions:
- issue: Cómo reflejar la relación superficial de amistad sin intensificarla interpretativamente
  english_pob_reading: The verse warns of a friend who shares meals but fails in trouble.
  chosen_spanish_reading: El versículo describe una amistad aparente, marcada por la convivencia en la mesa pero no por la lealtad en la aflicción.
  alternative_spanish_readings:
  - una amistad falsa
  - un amigo interesado
  - un compañero de banquetes infiel
  rationale: No se introduce una doctrina específica; se conserva la advertencia sapiencial sobre la fidelidad auténtica frente a la amistad utilitaria, en línea con el hebreo y el griego.
  doctrine_reference: Sabiduría bíblica sobre amistad y fidelidad; cf. Prov 17:17; 18:24
translation_notes:
  revision_awareness: El hebreo de base y el paralelo griego concuerdan en el sentido general, pero difieren en el matiz verbal final («no se encontrará» / «no permanecerá») y en la formulación de la relación de mesa. La versión española mantiene la lectura hebrea principal en el verbo y explicita la imagen de mesa con una nota, como en el auditorial inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se mantiene «angustia» para θλίψις/רָעָה como término amplio de adversidad, coherente con otros libros sapienciales.
  - «Compañero de mesa» preserva la imagen concreta y evita una paráfrasis excesiva como «amigo oportunista».
