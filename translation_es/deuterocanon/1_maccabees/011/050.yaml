review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura y el sentido general del griego: una petición de pacto/garantía seguida de la orden de que los judíos cesen de combatir contra ellos y contra la ciudad. Sin embargo, «manos derechas» suena poco idiomático en español y no refleja bien el valor fijo de δεξιάς como «diestras / manos derechas» dentro de una fórmula de alianza. Además, el uso de «vuestras» y «dadnos» introduce voseo/vosotros peninsular, fuera del estilo neutral latinoamericano solicitado.'
  spanish_quality_summary: La frase es comprensible, pero «Dadnos vuestras manos derechas» resulta forzada y regionalmente marcada. Para un español neutral y eclesialmente legible, «Dennos sus diestras» conserva mejor la imagen cultural con mayor naturalidad. El resto de la oración («y que los judíos dejen de combatir contra nosotros y la ciudad») es claro y fiel.
  glossary_alignment: 'No hay términos teológicos mayores en disputa. La principal cuestión léxica es δεξιάς: conviene mantener la imagen concreta del gesto de alianza, pero en español «diestras» funciona mejor que «manos derechas». También conviene ajustar la segunda persona al registro neutral latinoamericano con «dennos sus...».'
  issues:
  - severity: medium
    issue: 'Registro pronominal no neutral: «Dadnos vuestras...»'
    rationale: El proyecto pide español neutral latinoamericano / ampliamente legible. «Dadnos / vuestras» marca español peninsular de vosotros y reduce la adecuación estilística.
  - severity: medium
    issue: «manos derechas» es una literalidad poco natural en español
    rationale: Aunque intenta preservar el griego, en español la expresión suena extraña. «Diestras» conserva el referente concreto de la mano derecha y el matiz idiomático de pacto con mejor legibilidad.
  revised_spanish_text: Dennos sus diestras[a], y que los judíos dejen de combatir contra nosotros y la ciudad.
