translation:
  language: es
  text: 'Supongamos[a] que un hombre lleva carne santa[b] en el doblez de su vestido[c], y con su doblez toca pan, guiso, vino, aceite o cualquier alimento; ¿queda santo? Y los sacerdotes respondieron y dijeron: «No».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Si». La partícula hebrea introduce un caso hipotético planteado a los sacerdotes.
    reason: alternative_reading
  - marker: b
    text: O «carne consagrada». El hebreo dice literalmente «carne santa».
    reason: lexical_alternative
  - marker: c
    text: O «borde» o «esquina» de su vestido. El hebreo puede referirse al extremo de la prenda usado para llevar la carne.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Suppose
  chosen_spanish: Suponga
  alternatives_spanish:
  - Si
  - Mire
  lexicon: HALOT
  rationale: La partícula introduce un caso hipotético planteado a los sacerdotes. «Suponga» conserva bien el valor condicional e ilustrativo en español actual sin endurecerlo como una condición lógica seca.
- source_word: יִשָּׂא אִישׁ
  english_pob_choice: a man carries
  chosen_spanish: un hombre lleva
  alternatives_spanish:
  - un hombre carga
  - alguien lleva
  lexicon: HALOT
  rationale: «Lleva» expresa de manera natural el acto de transportar algo en el contexto. Mantiene el sujeto genérico masculino singular sin sonar artificial.
- source_word: בְּשַׂר קֹדֶשׁ
  english_pob_choice: holy meat
  chosen_spanish: carne santa
  alternatives_spanish:
  - carne consagrada
  - carne sagrada
  - carne santa
  lexicon: HALOT
  rationale: El hebreo dice literalmente «carne santa»; en español esa forma es fiel y transparente. «Consagrada» sería posible, pero desplaza el matiz cultual a una abstracción menos directa.
- source_word: בִּכְנַף בִּגְדוֹ
  english_pob_choice: in the fold of his garment
  chosen_spanish: en el doblez de su vestido
  alternatives_spanish:
  - en el borde de su vestido
  - en la esquina de su vestido
  - en la falda de su vestido
  lexicon: HALOT
  rationale: כָּנָף puede referirse a borde, esquina o ala de la prenda. Aquí el contexto pide la parte recogida o doblada que transporta la carne; «doblez» comunica esa función con claridad en español.
- source_word: וְנָגַע בִּכְנָפוֹ
  english_pob_choice: and with his fold touches
  chosen_spanish: y con su doblez toca
  alternatives_spanish:
  - y con él toca
  - y su doblez toca
  lexicon: HALOT
  rationale: 'Se conserva el sentido instrumental: el contacto ocurre mediante el doblez del vestido. La formulación evita ambigüedad y mantiene el referente de la prenda.'
- source_word: לֶחֶם
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - pan
  - alimento
  lexicon: HALOT
  rationale: «Pan» es la equivalencia directa y natural en español.
- source_word: נָזִיד
  english_pob_choice: stew
  chosen_spanish: guiso
  alternatives_spanish:
  - potaje
  - estofado
  - guiso
  lexicon: HALOT
  rationale: El término designa un plato cocido, espeso. «Guiso» es claro y no arcaizante, y conserva la referencia a comida preparada en olla.
- source_word: יַיִן
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - vino
  lexicon: HALOT
  rationale: Equivalencia estándar y directa.
- source_word: שֶׁמֶן
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - aceite de oliva
  - aceite
  lexicon: HALOT
  rationale: En español, «aceite» comunica de forma natural el sentido probable del hebreo sin añadir precisión no explícita en el texto.
- source_word: כָּל מַאֲכָל
  english_pob_choice: any food
  chosen_spanish: cualquier alimento
  alternatives_spanish:
  - cualquier comida
  - todo alimento
  - cualquier clase de alimento
  lexicon: HALOT
  rationale: La expresión amplía la lista a cualquier cosa comestible. «Alimento» funciona bien en registro bíblico contemporáneo y evita la restricción a una sola comida.
- source_word: הֲיִקְדָּשׁ
  english_pob_choice: does it become holy?
  chosen_spanish: ¿se vuelve santo?
  alternatives_spanish:
  - ¿queda consagrado?
  - ¿se hace santo?
  - ¿se consagra?
  lexicon: HALOT
  rationale: La pregunta trata de si la santidad se transmite por contacto. «Se vuelve santo» preserva la idea de resultado/estado sin cargarla con formulación técnica moderna o eclesiástica.
- source_word: וַיַּעֲנוּ הַכֹּהֲנִים וַיֹּאמְרוּ לֹא
  english_pob_choice: And the priests answered and said, “No.”
  chosen_spanish: 'Y los sacerdotes respondieron y dijeron: «No».'
  alternatives_spanish:
  - 'Entonces los sacerdotes respondieron: «No».'
  - 'Y los sacerdotes contestaron y dijeron: «No».'
  lexicon: HALOT
  rationale: Se conserva la cadencia narrativa hebrea con ambos verbos. La respuesta breve mantiene el diálogo directo y la sobriedad del original.
theological_decisions:
- issue: Transmisión ritual de santidad por contacto
  english_pob_reading: The verse asks whether contact via a garment carrying holy meat makes other food holy, and the priests' answer is negative.
  chosen_spanish_reading: El versículo pregunta si la santidad ritual se transmite por contacto indirecto mediante el doblez del vestido, y la respuesta de los sacerdotes es negativa.
  alternative_spanish_readings:
  - El contacto podría entenderse como directo desde la carne santa al alimento.
  - La pregunta podría leerse como una reflexión moral sobre la santidad.
  rationale: Se conserva el sentido cultual/legal del pasaje. No se moraliza ni se traslada a santificación interior; el texto plantea una cuestión de pureza ritual y la respuesta sacerdotal niega esa transmisión automática.
  doctrine_reference: Mantener la tensión ritual del texto sin resolverla teológicamente más allá de la respuesta dada.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés, sin depender mecánicamente de él: se revisó la partícula condicional, el valor funcional de כָּנָף como parte de la prenda, el sustantivo cultual בשר קדש y la pregunta sobre santidad transmitida por contacto. No hubo revisiones aplicadas en el paquete inglés; esta versión conserva esa lectura de alta concordancia.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda a Tetragrámaton; este versículo no lo contiene.
  - «Santo» se emplea para קדש en sentido cultual, no como sinónimo de pureza moral.
  - «Sacerdotes» se mantiene como término estándar para הכהנים.
  - La puntuación reproduce el cambio a pregunta directa y la respuesta breve final sin añadir explicaciones al cuerpo del texto.
