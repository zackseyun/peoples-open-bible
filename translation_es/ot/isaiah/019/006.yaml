  text: The rivers will stink[a]; the canals of Egypt will dwindle and dry up[c][b]; reed and rush will wither.
  footnotes:
  - marker: a
    text: Or 'The rivers will become foul.' The Hebrew verb is rare, and the sense is that the waterways become putrid or stink.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the canals of Matzor'; here 'Matzor' is best understood as a poetic name for Egypt.
    reason: lexical_alternative
  - marker: c
    text: Or 'papyrus' for 'rush.' The Hebrew term refers to marsh vegetation associated with riverbanks.
    reason: lexical_alternative
