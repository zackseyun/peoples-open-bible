translation:
  language: es
  text: y el peso para los candelabros de oro y sus lámparas de oro[a], según el peso de cada candelabro y sus lámparas; y para los candelabros de plata, según el peso de cada candelabro y sus lámparas, conforme al servicio de cada candelabro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «según el peso de candelabro y candelabro» y «conforme al servicio de candelabro y candelabro», una expresión distributiva que significa cada candelabro individualmente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשְׁקָל
  english_pob_choice: weight
  chosen_spanish: peso
  alternatives_spanish:
  - peso establecido
  - medida de peso
  lexicon: HALOT
  rationale: En este contexto de inventario del templo, el término alude a una cantidad determinada por peso. «Peso» es natural en español y conserva la idea de medida precisa sin sobreexplicar.
- source_word: מְנֹרוֹת
  english_pob_choice: lampstands
  chosen_spanish: candelabros
  alternatives_spanish:
  - lampadarios
  - menorás
  lexicon: HALOT
  rationale: El objeto es un soporte para lámparas del santuario. «Candelabros» comunica bien la función y es más claro para lectores actuales que una transliteración; «menorás» podría sonar demasiado técnico o restringido.
- source_word: נֵרֹתֵיהֶם / נֵרֹתֶיהָ
  english_pob_choice: lamps
  chosen_spanish: lámparas
  alternatives_spanish:
  - luces
  - candiles
  lexicon: HALOT
  rationale: La palabra designa las lámparas individuales asociadas con el candelabro. «Lámparas» conserva la distinción con el candelabro mismo y evita confundirlas con la luz producida.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - dorados
  - de oro fino
  lexicon: HALOT
  rationale: Término material directo. «De oro» mantiene la repetición del hebreo y el paralelismo con «plata».
- source_word: בְּמִשְׁקַל מְנוֹרָה וּמְנוֹרָה
  english_pob_choice: by the weight of each lampstand
  chosen_spanish: según el peso de cada candelabro
  alternatives_spanish:
  - por el peso de candelabro y candelabro
  - según el peso de candelabro y candelabro
  lexicon: HALOT
  rationale: La repetición distributiva hebrea («candelabro y candelabro») expresa individualidad item por item. En español, «cada candelabro» comunica fielmente ese sentido y evita una repetición forzada.
- source_word: וְלִמְנֹרוֹת הַכֶּסֶף
  english_pob_choice: and for the lampstands of silver
  chosen_spanish: y para los candelabros de plata
  alternatives_spanish:
  - y para los candelabros plateados
  - y para los candelabros de la plata
  lexicon: HALOT
  rationale: Se conserva el paralelismo con «de oro» y se mantiene el genitivo material natural en español.
- source_word: כַּעֲבוֹדַת מְנוֹרָה וּמְנוֹרָה
  english_pob_choice: according to the service of each lampstand
  chosen_spanish: conforme al servicio de cada candelabro
  alternatives_spanish:
  - según la función de cada candelabro
  - según el servicio de candelabro y candelabro
  lexicon: HALOT
  rationale: En contexto cultual, עֲבוֹדָה puede referirse al servicio o función litúrgica. «Servicio» preserva ese campo semántico; la construcción distributiva vuelve a quedar expresada por «cada candelabro».
theological_decisions:
- issue: Expresión distributiva reiterada en hebreo
  english_pob_reading: Hebrew literally, 'by the weight of lampstand and lampstand' and 'according to the service of lampstand and lampstand,' a distributive expression meaning each lampstand individually.
  chosen_spanish_reading: La repetición se vierte con «cada candelabro» para indicar que la medida y el servicio se asignan individualmente a cada pieza.
  alternative_spanish_readings:
  - por el peso de candelabro y candelabro
  - según el servicio de candelabro y candelabro
  rationale: 'La teología del versículo no cambia, pero sí la claridad exegética: la forma hebrea es distributiva y no meramente estilística. El español debe mostrar esa individualización sin perder el paralelismo del inventario del templo.'
  doctrine_reference: Exégesis gramatical del hebreo bíblico; no implica doctrina controvertida.
translation_notes:
  revision_awareness: El texto en inglés fue revisado para corregir la cláusula de plata de modo que dijera «each lampstand» y no «a lampstand», reafirmando el sentido distributivo paralelo al hebreo. La versión española refleja esa misma decisión con «cada candelabro» en ambas cláusulas relevantes.
  spanish_consistency_notes:
  - Se mantiene «candelabro» de forma consistente para מְנוֹרָה, por claridad cultual en español.
  - Se conserva la repetición de «de oro» y «de plata» para reflejar la estructura paralela del hebreo.
  - «Servicio» se usa en sentido cultual, no como simple tarea cotidiana.
