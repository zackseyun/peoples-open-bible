translation:
  language: es
  text: Todavía hoy se detendrá en Nob; sacudirá[a] su mano contra el monte de la casa de Sión[b], la colina de Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «agitará» o «blandirá» su mano. El verbo hebreo puede describir un gesto amenazante.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el monte de la casa de Sión». Algunas traducciones suavizan o entienden la frase de otra manera.'
    reason: alternative_reading
lexical_decisions:
- source_word: ע֥וֹד
  english_pob_choice: Still
  chosen_spanish: Todavía
  alternatives_spanish:
  - Aún
  - Todavía más
  - Aún hoy
  lexicon: HALOT
  rationale: El adverbio marca continuidad e inmediatez en la escena profética. «Todavía» comunica que la acción sigue en curso hasta ese punto sin sonar artificial en español.
- source_word: הַיּוֹם
  english_pob_choice: this very day
  chosen_spanish: hoy
  alternatives_spanish:
  - este mismo día
  - en este día
  lexicon: HALOT
  rationale: El artículo con el sustantivo tiene fuerza deíctica; en español, «hoy» ya transmite la referencia inmediata con naturalidad. Se evita una amplificación innecesaria en el texto principal.
- source_word: בְּנֹב
  english_pob_choice: at Nob
  chosen_spanish: en Nob
  alternatives_spanish:
  - en Nob
  - a Nob
  lexicon: HALOT
  rationale: Nob es un topónimo transliterado. «En» conserva el valor locativo básico del hebreo y es idiomático en español; la forma «a Nob» sonaría más dinámica pero menos directa.
- source_word: לַעֲמֹד
  english_pob_choice: will halt
  chosen_spanish: se detendrá
  alternatives_spanish:
  - se parará
  - hará alto
  - tomará posición
  lexicon: HALOT
  rationale: En el contexto de avance militar, el infinitivo de עמד expresa detenerse o hacer alto. «Se detendrá» reproduce ese movimiento con naturalidad y sin perder la imagen de pausa estratégica.
- source_word: יְנֹפֵף
  english_pob_choice: he will shake
  chosen_spanish: sacudirá
  alternatives_spanish:
  - agitará
  - blandirá
  - hará ademán
  lexicon: HALOT
  rationale: El verbo puede implicar un gesto amenazante, no solo un saludo. «Sacudirá» conserva el gesto visible sin forzar una precisión que el hebreo no especifica, y permite mantener la tensión interpretativa.
- source_word: יָדוֹ
  english_pob_choice: his hand
  chosen_spanish: su mano
  alternatives_spanish:
  - su mano
  - la mano de él
  lexicon: HALOT
  rationale: La posesión es straightforward. En español, «su mano» es la forma natural y mantiene el referente singular sin añadir especificación interpretativa.
- source_word: הַר בֵּית צִיּוֹן
  english_pob_choice: the mountain of the house of Zion
  chosen_spanish: el monte de la hija de Sión
  alternatives_spanish:
  - el monte de la casa de Sión
  - el monte de Sión
  - el monte de la casa de Sion
  lexicon: HALOT
  rationale: Aunque el consonántico hebreo permite leer «casa de Sión», el expediente auditado de la POB registra la revisión hacia «hija de Sión» por la tradición y el ajuste lexicográfico señalado. En español, «hija de Sión» es la forma más reconocible y fiel a esa decisión documentada.
- source_word: גִּבְעַת יְרוּשָׁלִָם
  english_pob_choice: the hill of Jerusalem
  chosen_spanish: la colina de Jerusalén
  alternatives_spanish:
  - la colina de Jerusalén
  - el collado de Jerusalén
  lexicon: HALOT
  rationale: La construcción se vierte de manera transparente con un topónimo en genitivo. «Colina» mantiene el paralelismo topográfico y suena natural en español contemporáneo.
theological_decisions:
- issue: Sujeto singular implícito ('he') sin identificación explícita
  english_pob_reading: Retain the singular 'he' without identifying him in the translation.
  chosen_spanish_reading: Mantener el sujeto singular implícito en los verbos, sin identificarlo en el texto principal.
  alternative_spanish_readings:
  - el rey de Asiria
  - el ejército asirio personificado
  rationale: El contexto inmediato sugiere al invasor asirio, probablemente personificado en singular, pero el texto hebreo no lo nombra aquí. La traducción conserva esa tensión y evita resolverla interpretativamente en el cuerpo principal.
  doctrine_reference: Preservar la tensión exegética sin sobreinterpretar el referente.
translation_notes:
  revision_awareness: Se tuvo en cuenta que el expediente inglés muestra una revisión reciente desde «house of Zion» hacia «daughter of Zion» por precisión léxica, junto con la nota textual del propio dossier. La redacción española sigue esa decisión revisionada y evita reintroducir «casa» en el texto principal.
  spanish_consistency_notes:
  - Se mantuvo Yahvé no aplicable en este versículo; no aparece ningún nombre divino en el texto.
  - Se conservó la personificación singular implícita sin nombrar al agresor en el texto principal.
  - 'Se respetó el paralelismo de lugar con dos miembros topográficos: Nob / monte de la hija de Sión / colina de Jerusalén.'
  - Se evitó traducir mecánicamente desde el inglés al preservar la sintaxis natural del español en la primera cláusula.
