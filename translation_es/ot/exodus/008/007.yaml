translation:
  language: es
  text: Y las ranas se irán de ti[a], y de tus casas, y de tus siervos, y de tu pueblo; solo en el Nilo quedarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «en el río». El hebreo יְאֹר puede significar «río», pero en Éxodo normalmente se refiere específicamente al Nilo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְסָרוּ
  english_pob_choice: will depart
  chosen_spanish: se apartarán
  alternatives_spanish:
  - se irán
  - se retirarán
  - se alejarán
  lexicon: HALOT
  rationale: סוּר expresa apartarse, retirarse o desaparecer de un lugar. En español, «se apartarán» comunica bien el movimiento de salida sin añadir la idea de destrucción, en línea con la lectura inglesa de que las ranas se van.
- source_word: הַצְפַרְדְּעִים
  english_pob_choice: the frogs
  chosen_spanish: las ranas
  alternatives_spanish:
  - las ranas del Nilo
  - las ranas
  lexicon: HALOT
  rationale: El sustantivo designa las ranas de la plaga. «Ranas» es el equivalente natural y directo en español.
- source_word: מִמְּךָ
  english_pob_choice: from you
  chosen_spanish: de ti
  alternatives_spanish:
  - de tu lado
  - alejadas de ti
  lexicon: HALOT
  rationale: La preposición מן con sufijo de segunda persona masculina singular se traduce de forma directa por «de ti». Mantiene la cercanía del hebreo sin recargar el estilo.
- source_word: וּמִבָּתֶּיךָ
  english_pob_choice: and from your houses
  chosen_spanish: y de tus casas
  alternatives_spanish:
  - y de tu casa
  - y de tus hogares
  lexicon: HALOT
  rationale: El plural hebreo debe conservarse. «Casas» refleja mejor el plural de בָּתֶּיךָ que una singularización idiomática.
- source_word: וּמֵעֲבָדֶיךָ
  english_pob_choice: and from your servants
  chosen_spanish: y de tus siervos
  alternatives_spanish:
  - y de tus servidores
  - y de tus esclavos
  - y de tus oficiales
  lexicon: HALOT
  rationale: עֲבָדִים puede abarcar sirvientes, esclavos u কর্মকর্তas; el contexto del entorno de Faraón permite un término amplio. «Siervos» evita forzar la idea de esclavitud y conserva un registro bíblico digno, aunque no se impone como lectura técnica de estatus.
- source_word: וּמֵעַמֶּךָ
  english_pob_choice: and from your people
  chosen_spanish: y de tu pueblo
  alternatives_spanish:
  - y de tu gente
  - y de tus súbditos
  lexicon: HALOT
  rationale: עַם se refiere al colectivo bajo Faraón. «Pueblo» es la correspondencia más natural y amplia en español.
- source_word: רַק
  english_pob_choice: only
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - excepto
  lexicon: HALOT
  rationale: רַק introduce la excepción. «Solo» expresa de manera clara y concisa la limitación del enunciado.
- source_word: בַּיְאֹר
  english_pob_choice: in the Nile
  chosen_spanish: en el Nilo
  alternatives_spanish:
  - en el río
  - en el Nilo
  lexicon: HALOT
  rationale: En Éxodo, יְאֹר normalmente designa el Nilo específicamente. «En el Nilo» sigue la decisión contextual del texto base inglés y evita una generalización innecesaria.
- source_word: תִּשָּׁאַרְנָה
  english_pob_choice: will remain
  chosen_spanish: quedarán
  alternatives_spanish:
  - permanecerán
  - serán dejadas
  lexicon: HALOT
  rationale: El nifal de שׁאר expresa permanecer o quedar. «Quedarán» es natural en español y conserva la idea de permanencia residual en el río.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés y no requiere revisiones sustantivas: conserva el plural de «casas», mantiene la excepción con «solo» y traduce יְאֹר como «Nilo» por el uso contextual en Éxodo. No se documentan cambios respecto al pase más reciente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se preserva el plural de «casas» para reflejar el hebreo y evitar una singularización interpretativa.
  - Se usa «siervos» como equivalente español de amplio alcance para עֲבָדֶיךָ, sin convertirlo en «esclavos» porque el contexto no exige especificar ese matiz.
  - La nota a pie de página marca la alternativa lexical «río» para יְאֹר, siguiendo el contexto textual de Éxodo.
