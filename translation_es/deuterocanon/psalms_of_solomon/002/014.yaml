- from: Así como ellos mismos solían hacerlo[a], exhibieron sus iniquidades[b] delante del sol, y las hijas de Jerusalén eran profanas[c] conforme a tu juicio[d].
  to: Así como ellos mismos solían hacerlo, exhibieron sus iniquidades[a] delante del sol[b], y las hijas de Jerusalén quedaron profanas[c] conforme a tu juicio.
  rationale: Se corrigieron las notas para que estén en español, con marcadores únicos y anclajes correctos en el texto. Se trasladó la nota sobre 'delante del sol' al lugar correspondiente, se mantuvo 'iniquidades' con su alternativa auditada, y se simplificó la nota final para reflejar la alternativa léxica de βέβηλοι sin duplicar toda la cláusula. Además, se ajustó 'eran profanas' a 'quedaron profanas' para una lectura española más natural y más acorde con la condición resultante vinculada al juicio divino.
