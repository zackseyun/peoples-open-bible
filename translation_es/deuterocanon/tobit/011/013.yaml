  - severity: medium
    issue: «se echó sobre su cuello»
    rationale: Para ἐπέπεσεν ἐπὶ τὸν τράχηλον αὐτοῦ, el español idiomático equivalente del abrazo emotivo es «se echó al cuello» o «se le echó al cuello». «Sobre su cuello» suena más físico que idiomático.
  - severity: low
