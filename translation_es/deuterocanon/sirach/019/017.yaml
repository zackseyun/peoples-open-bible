review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del griego: Πᾶσα σοφία → «Toda sabiduría»; φόβος Κυρίου → «temor del Señor»; ἐν πάσῃ σοφίᾳ → «en toda sabiduría»; ποίησις νόμου → «la práctica de la ley». Sin embargo, la nota a [a] usa una alternativa española poco natural y semánticamente imprecisa: «reverencia del Señor» suena como la reverencia que el Señor tiene, no la reverencia dirigida al Señor. Debe decir «reverencia al Señor».'
  spanish_quality_summary: El texto principal es claro, digno y fiel. «Está la práctica de la ley» es comprensible, aunque algo literal; no requiere cambio porque mantiene bien la relación con ποίησις. La única reparación necesaria es de legibilidad y corrección idiomática en la nota [a].
  glossary_alignment: 'La terminología concuerda con el proyecto y con las decisiones auditadas: «sabiduría», «temor del Señor», «ley». El uso de «Señor» para Κυρίου está justificado por tratarse de fuente griega κύριος, no del tetragrámaton explícito en la línea fuente. No hay conflicto relevante con el glosario principal.'
  issues:
  - severity: medium
    issue: La nota [a] dice «reverencia del Señor»
    rationale: En español, esa construcción se interpreta naturalmente como un genitivo subjetivo («la reverencia que pertenece al Señor») y no como la reverencia dirigida a él. Para expresar la alternativa de φόβος Κυρίου con naturalidad y fidelidad, debe ser «reverencia al Señor».
  revised_spanish_text: Toda sabiduría es temor del Señor[a], y en toda sabiduría está la práctica de la ley[b].
  revised_footnotes:
  - marker: a
    text: O «reverencia al Señor». El griego tradicionalmente vertido «temor del Señor» incluye asombro reverente, pero el texto principal mantiene la expresión más fuerte del original.
    reason: lexical_alternative
  - marker: b
    text: O «observancia de la ley». El griego puede expresarse de forma más formal con «hacer» u «observancia» en lugar de «práctica».
    reason: alternative_reading
  revision_rationale: Se conserva intacto el texto principal por su fidelidad al griego y al rastro de auditoría inglés. Se corrige únicamente la nota [a] para que la alternativa léxica sea español idiomático y no introduzca ambigüedad sintáctica.
