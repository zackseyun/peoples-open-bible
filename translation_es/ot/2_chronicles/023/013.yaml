translation:
  language: es
  text: 'Y ella miró, y he aquí el rey estaba de pie junto a su columna en la entrada, y los oficiales y las trompetas[a] estaban junto al rey; y todo el pueblo de la tierra se regocijaba y tocaba las trompetas, y los cantores con los instrumentos musicales dirigían la alabanza[b]. Entonces Atalía rasgó sus vestidos y dijo: «¡Conspiración! ¡Conspiración!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los oficiales y las trompetas junto al rey». Algunas traducciones ponen «trompeteros» en lugar de «trompetas», entendiendo los instrumentos metonímicamente por quienes los tocaban.'
    reason: lexical_alternative
  - marker: b
    text: O «guiaban la alabanza» o «dirigían la alabanza». La expresión hebrea es algo idiomática en este contexto musical.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּרֶא
  english_pob_choice: And she looked
  chosen_spanish: Y ella miró
  alternatives_spanish:
  - Y ella vio
  lexicon: HALOT
  rationale: En secuencia narrativa, 'miró' conserva el acto perceptivo y suena natural en español antes de 'he aquí', sin perder el valor básico de ראה.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y he aquí que
  lexicon: HALOT
  rationale: '''He aquí'' preserva el efecto deíctico e inesperado del hebreo, más que suavizarlo como una mera coordinación.'
- source_word: הַמֶּלֶךְ עוֹמֵד
  english_pob_choice: the king was standing
  chosen_spanish: el rey estaba de pie
  alternatives_spanish:
  - el rey se hallaba de pie
  - el rey estaba parado
  lexicon: HALOT
  rationale: El participio עוֹמֵד expresa una escena en curso; 'estaba de pie' refleja mejor ese valor durativo que un pretérito simple.
- source_word: עַל עַמּוּדוֹ
  english_pob_choice: by his pillar
  chosen_spanish: junto a su columna
  alternatives_spanish:
  - sobre su columna
  - al lado de su columna
  lexicon: HALOT
  rationale: Se sigue el contexto ceremonial de entronización; 'junto a' comunica la ubicación sin forzar el sentido literal de 'sobre' en español.
- source_word: בַּמָּבוֹא
  english_pob_choice: at the entrance
  chosen_spanish: en la entrada
  alternatives_spanish:
  - a la entrada
  - en el acceso
  lexicon: HALOT
  rationale: מָבוֹא designa un acceso o entrada; 'en la entrada' es claro y fiel en español contemporáneo.
- source_word: וְהַשָּׂרִים וְהַחֲצֹצְרוֹת עַל הַמֶּלֶךְ
  english_pob_choice: and the officials and the trumpets were beside the king
  chosen_spanish: y los oficiales y las trompetas estaban junto al rey
  alternatives_spanish:
  - y los oficiales y los trompeteros estaban junto al rey
  - y los oficiales y las trompetas estaban al lado del rey
  lexicon: HALOT
  rationale: Se conserva el hebreo masorético con 'las trompetas', como en el audit trail inglés, sin convertirlo automáticamente en 'trompeteros'. 'Estaban junto al rey' mantiene la relación locativa.
- source_word: וְכָל עַם הָאָרֶץ
  english_pob_choice: and all the people of the land
  chosen_spanish: y todo el pueblo de la tierra
  alternatives_spanish:
  - y toda la gente de la tierra
  - y toda la población del país
  lexicon: HALOT
  rationale: La frase fija de Crónicas se vierte de manera literal y reconocible; 'pueblo de la tierra' conserva el matiz colectivo-político del hebreo.
- source_word: שָׂמֵחַ
  english_pob_choice: were rejoicing
  chosen_spanish: se alegraba
  alternatives_spanish:
  - estaba gozoso
  - se regocijaba
  lexicon: HALOT
  rationale: El predicativo expresa un estado de celebración; 'se alegraba' es natural y suficientemente fuerte en español.
- source_word: וְתוֹקֵעַ בַּחֲצֹצְרוֹת
  english_pob_choice: and blowing trumpets
  chosen_spanish: y tocaba las trompetas
  alternatives_spanish:
  - y hacía sonar las trompetas
  - y soplaba las trompetas
  lexicon: HALOT
  rationale: תקע con חצוצרות es el modismo normal para tocar/hacer sonar trompetas; 'tocaba' evita una traducción demasiado literal y extraña.
- source_word: וְהַמְשׁוֹרֲרִים
  english_pob_choice: and the singers
  chosen_spanish: y los cantores
  alternatives_spanish:
  - y los cantantes
  - y los cantores/los músicos
  lexicon: HALOT
  rationale: שׁוֹרְרִים son cantores en contexto cultual; 'cantores' conserva el registro bíblico sin caer en 'músicos' demasiado general.
- source_word: בִּכְלֵי הַשִּׁיר
  english_pob_choice: with the instruments of song
  chosen_spanish: con los instrumentos de canto
  alternatives_spanish:
  - con los instrumentos de la canción
  - con instrumentos musicales
  lexicon: HALOT
  rationale: Se preserva la construcción hebrea de forma transparente; 'de canto' mantiene la referencia a instrumentos asociados con el canto litúrgico.
- source_word: וּמוֹדִיעִים לְהַלֵּל
  english_pob_choice: were leading the praise
  chosen_spanish: dirigían la alabanza
  alternatives_spanish:
  - guiaban la alabanza
  - daban la señal para alabar
  lexicon: HALOT
  rationale: El Hifil de ידע aquí tiene un valor funcional de dirigir/coordinar en un contexto musical. 'Dirigían la alabanza' comunica bien esa función sin inventar contenido.
- source_word: וַתִּקְרַע ... אֶת בְּגָדֶיהָ
  english_pob_choice: Then Athaliah tore her clothes
  chosen_spanish: Entonces Atalía rasgó sus vestidos
  alternatives_spanish:
  - Entonces Atalía desgarró sus vestidos
  - Entonces Atalía rompió sus vestidos
  lexicon: HALOT
  rationale: '''Rasgó sus vestidos'' reproduce el gesto idiomático de duelo/ira con un verbo común y bíblicamente comprensible en español.'
- source_word: קֶשֶׁר קָשֶׁר
  english_pob_choice: Conspiracy! Conspiracy!
  chosen_spanish: ¡Conspiración! ¡Conspiración!
  alternatives_spanish:
  - ¡Traición! ¡Traición!
  - ¡Complot! ¡Complot!
  lexicon: HALOT
  rationale: '''Conspiración'' es el equivalente más directo de קֶשֶׁר y evita la especificidad política de ''traición'' que el hebreo no exige.'
theological_decisions:
- issue: Lectura de עַל עַמּוּדוֹ en el contexto de coronación
  english_pob_reading: by his pillar
  chosen_spanish_reading: junto a su columna
  alternative_spanish_readings:
  - sobre su columna
  - al lado de su columna
  rationale: No hay una decisión doctrinal en juego, pero sí una tensión de imagen. Se mantiene la ubicación ceremonial sin domesticarla en exceso ni volverla extraña en español.
  doctrine_reference: none
- issue: Conservación del hebreo masorético 'las trompetas' en lugar de inferir 'trompeteros'
  english_pob_reading: the officials and the trumpets were beside the king
  chosen_spanish_reading: los oficiales y las trompetas estaban junto al rey
  alternative_spanish_readings:
  - los oficiales y los trompeteros estaban junto al rey
  - los oficiales y las trompetas estaban al lado del rey
  rationale: Se preserva la tensión textual del hebreo, que nombra los instrumentos y no explícitamente a los instrumentistas, tal como refleja el audit trail inglés.
  doctrine_reference: none
- issue: Sentido de וּמוֹדִיעִים לְהַלֵּל en contexto litúrgico
  english_pob_reading: were leading the praise
  chosen_spanish_reading: dirigían la alabanza
  alternative_spanish_readings:
  - guiaban la alabanza
  - daban la señal para alabar
  rationale: El verbo puede implicar dirigir o anunciar en una escena musical. 'Dirigían la alabanza' conserva esa ambigüedad funcional sin cerrarla injustificadamente.
  doctrine_reference: none
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail inglés, que añadió ''were'' antes de ''beside the king'' para completar la cláusula: en español se reflejó con ''estaban junto al rey''. También se respetó la preferencia del POB por conservar el hebreo masorético ''the trumpets'' en lugar de convertirlo automáticamente en ''trumpeters''.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando corresponda; este versículo no contiene el nombre divino.
  - Se mantuvo 'Atalía' para el nombre propio, conforme al uso español habitual.
  - Se preservó el paralelismo narrativo y la repetición final '¡Conspiración! ¡Conspiración!' para reflejar la intensificación del hebreo.
  - Se evitó 'SEÑOR' o 'Cristo' porque no aparecen en el texto base.
  - Se eligió un registro bíblico claro y contemporáneo, sin arcaísmos innecesarios.
