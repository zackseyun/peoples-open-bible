translation:
  language: es
  text: O si lo golpeó con una piedra en la mano[a], con la que se puede causar la muerte, y murió, él es homicida; ciertamente se le dará muerte al homicida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «piedra de mano», es decir, una piedra llevada en la mano o apta para usarse así como arma.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: Or if
  chosen_spanish: O si
  alternatives_spanish:
  - Y si
  - Pero si
  lexicon: HALOT
  rationale: En una serie casuística legal, «O si» reproduce en español la fuerza disyuntiva de la cláusula sin perder el encadenamiento del contexto.
- source_word: בְּאֶבֶן יָד
  english_pob_choice: with a stone in the hand
  chosen_spanish: con una piedra de mano
  alternatives_spanish:
  - con una piedra en la mano
  - con una piedra sostenida en la mano
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente muy compacta («piedra de mano»). En español, «piedra de mano» conserva la imagen concreta y la posibilidad de un objeto apto para usarse como arma, sin forzar una paráfrasis explicativa en el texto principal.
- source_word: אֲשֶׁר יָמוּת בָּהּ
  english_pob_choice: by which one could die
  chosen_spanish: con la que se puede morir
  alternatives_spanish:
  - por la cual se podría morir
  - con la que un hombre puede morir
  lexicon: HALOT
  rationale: El hebreo describe la capacidad letal del objeto. «Se puede morir» mantiene la referencia a la posibilidad de muerte sin limitarla innecesariamente a un sujeto particular ni añadir interpretación técnica.
- source_word: הִכָּהוּ
  english_pob_choice: he struck him
  chosen_spanish: lo golpeó
  alternatives_spanish:
  - lo hirió
  - lo golpeó con fuerza
  lexicon: HALOT
  rationale: «Golpear» expresa bien נכה en español moderno y mantiene abierta la secuencia legal sin adelantar el resultado mortal, que se afirma después.
- source_word: וַיָּמֹת
  english_pob_choice: and he died
  chosen_spanish: y murió
  alternatives_spanish:
  - y falleció
  - y entonces murió
  lexicon: HALOT
  rationale: La coordinación simple reproduce el avance narrativo del hebreo sin añadir énfasis innecesario.
- source_word: רֹצֵחַ הוּא
  english_pob_choice: he is a murderer
  chosen_spanish: homicida es
  alternatives_spanish:
  - asesino es
  - es un homicida
  lexicon: HALOT
  rationale: En el registro legal español, «homicida» comunica culpabilidad por muerte causada y evita la posible carga más coloquial de «asesino». Se invierte el orden para reflejar el hebreo enfático («homicida es»).
- source_word: מוֹת יוּמַת
  english_pob_choice: must surely be put to death
  chosen_spanish: ciertamente el homicida será muerto
  alternatives_spanish:
  - de seguro se le dará muerte
  - el homicida debe morir
  lexicon: HALOT
  rationale: La construcción intensiva hebrea se conserva con un futuro pasivo solemne. «Será muerto» refleja mejor la forma verbal y su tono jurídico que una reexpresión menos literal.
- source_word: הָרֹצֵחַ
  english_pob_choice: the murderer
  chosen_spanish: el homicida
  alternatives_spanish:
  - el asesino
  - ese homicida
  lexicon: HALOT
  rationale: La repetición final retoma al sujeto legal para énfasis. «El homicida» mantiene la referencia jurídica y la cohesión terminológica con la frase anterior.
theological_decisions:
- issue: Clasificación jurídica del causante de la muerte
  english_pob_reading: Render רצח as 'murderer' rather than a more neutral 'killer' or 'manslayer.'
  chosen_spanish_reading: Traducir רצח como «homicida» y no como un término más neutro como «matador» o «asesino» en registros no jurídicos.
  alternative_spanish_readings:
  - asesino
  - matador
  - matador de hombres
  rationale: El contexto de la legislación sobre ciudades de refugio distingue entre muerte accidental e intencional. «Homicida» preserva el juicio legal y moral sin introducir un matiz coloquial excesivo ni suavizar la culpa.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La revisión más reciente del texto inglés no introdujo cambios, y el consenso de revisión fue alto. Esta propuesta sigue esa lectura estable sin mover el sentido legal ni las decisiones léxicas ya auditadas.
  spanish_consistency_notes:
  - Se mantiene «homicida» de forma consistente para רצח, evitando alternar con «asesino» o «matador».
  - Se conserva la relación causal y legal del hebreo con una cláusula principal breve y solemne.
  - La nota al pie explica la expresión compacta «piedra de mano» sin saturar el texto principal.
  - Se evita usar «SEÑOR» u այլ terminología de sustitución, ya que el versículo no contiene el nombre divino.
