  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ ἔτεκεν τὸν υἱὸν αὐτῆς τὸν πρωτότοκον, καὶ ἐσπαργάνωσεν αὐτὸν καὶ ἀνέκλινεν αὐτὸν ⸀ἐν φάτνῃ, διότι οὐκ ἦν αὐτοῖς τόπος ἐν τῷ καταλύματι.
base_translation:
  language: en
  yaml_path: translation/nt/luke/002/007.yaml
  text: And she gave birth to her firstborn son[a], and wrapped him in cloths and laid him in a feeding trough[c][b], because there was no place for them in the guest room.
  footnotes:
  - marker: a
    text: Or 'wrapped him in swaddling cloths.'
    reason: lexical_alternative
  - marker: b
    text: Or 'manger.' The Greek term refers to a feeding place or feeding trough for animals.
    reason: lexical_alternative
  - marker: c
    text: Traditionally 'inn.' The Greek κατάλυμα can mean a guest room or lodging place; Luke uses a different word for a commercial inn in Luke 10:34.
    reason: alternative_reading
translation:
  language: ko
  text: 그녀는 자기 맏아들을 낳아 강보로 싸서 구유[a]에 뉘었으니, 손님방에 그들을 위한 자리가 없었기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「여물통」. 가축에게 먹이를 주는 그릇이며, 마구간이 아니라 본문은 단순히 「자리가 없었다」고 진술한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: τῷ καταλύματι
  english_pob_choice: the guest room
  chosen_korean: 손님방
  alternatives_korean:
  - 여관
  - 객실
  lexicon: BDAG
  rationale: 누가가 10:34에서 「πανδοχεῖον(여관)」을 따로 사용하므로, 본문의 κατάλυμα는 친족 집의 「손님방」을 가리킬 가능성이 더 크다.
