theological_decisions:
- issue: Divine grant of Edomite territory
  chosen_reading: The verse is rendered to emphasize that Israel must not attack Edom because God himself assigned Seir to Esau.
  alternative_readings:
  - A purely political prohibition without emphasis on divine allotment
  rationale: The two כִּי clauses ground the prohibition in God's sovereign distribution of land. The translation preserves that theological rationale without expanding beyond the text.
