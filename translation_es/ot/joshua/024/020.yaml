translation:
  language: es
  text: Si abandonan a Yahvé y sirven a dioses extranjeros[a], entonces él se volverá, les hará daño y los consumirá[b], después de haberles hecho bien.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dioses ajenos». La expresión hebrea subraya que son deidades no pertenecientes al pacto de Israel.
    reason: lexical_alternative
  - marker: b
    text: O «los destruirá». El verbo hebreo puede expresar llevar a su fin mediante destrucción.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Porque
  - Cuando
  - Ciertamente
  lexicon: HALOT
  rationale: En esta advertencia, כִּי introduce una condición. «Si» reproduce mejor la estructura condicional del hebreo que una causal o temporal.
- source_word: תַֽעַזְבוּ
  english_pob_choice: you forsake
  chosen_spanish: abandonan
  alternatives_spanish:
  - dejan
  - desamparan
  - se apartan de
  lexicon: HALOT
  rationale: El verbo expresa abandono de alianza; «abandonan» comunica la ruptura relacional con Yahvé sin sonar excesivamente arcaico. En nota se preserva la fuerza covenantal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como forma transliterada, conforme al criterio del proyecto, en vez de sustituirlo por un título.
- source_word: וַעֲבַדְתֶּם
  english_pob_choice: and serve
  chosen_spanish: sirven
  alternatives_spanish:
  - adoran
  - rinden culto a
  - se hacen esclavos de
  lexicon: HALOT
  rationale: עבד aquí denota servicio religioso y lealtad cultual. «Sirven» es el equivalente directo y mantiene la relación de dependencia y culto implícita.
- source_word: אֱלֹהֵי נֵכָר
  english_pob_choice: foreign gods
  chosen_spanish: dioses extranjeros
  alternatives_spanish:
  - dioses ajenos
  - dioses extraños
  - dioses de otras tierras
  lexicon: HALOT
  rationale: La expresión contrasta con Yahvé y designa deidades ajenas a Israel; «extranjeros» conserva el valor de alteridad cultural y religiosa.
- source_word: וְשָׁב
  english_pob_choice: then he will turn
  chosen_spanish: entonces él se volverá
  alternatives_spanish:
  - y volverá
  - y se volverá atrás
  - entonces volverá
  lexicon: HALOT
  rationale: שוב expresa un giro en el proceder divino. «Se volverá» conserva la metáfora del cambio de dirección sin explicarla de más.
- source_word: וְהֵרַע לָכֶם
  english_pob_choice: and do you harm
  chosen_spanish: les hará daño
  alternatives_spanish:
  - les traerá mal
  - les causará calamidad
  - les hará mal
  lexicon: HALOT
  rationale: רעה en este contexto apunta a daño/calamidad; «les hará daño» es natural en español y evita reducirlo a una noción meramente moral de «mal».
- source_word: וְכִלָּה אֶתְכֶם
  english_pob_choice: and consume you
  chosen_spanish: los consumirá
  alternatives_spanish:
  - los destruirá
  - los aniquilará
  - los acabará
  lexicon: HALOT
  rationale: כלה comunica llevar a un final por destrucción. «Consumirá» mantiene la imagen intensa del texto fuente y su gravedad judicial.
- source_word: אַחֲרֵי אֲשֶׁר הֵיטִיב לָכֶם
  english_pob_choice: after he has done good to you
  chosen_spanish: después de haberles hecho bien
  alternatives_spanish:
  - después de haberles hecho el bien
  - después de haberles sido bueno
  - tras haberles favorecido
  lexicon: HALOT
  rationale: היטיב significa hacer el bien/beneficiar. «Haberles hecho bien» conserva la beneficencia previa y su contraste con el juicio posterior.
theological_decisions:
- issue: Agencia divina en el juicio tras la infidelidad del pacto
  english_pob_reading: The LORD himself will reverse his favorable dealings and bring harm and destruction as covenant judgment.
  chosen_spanish_reading: Él mismo se volverá y les hará daño/los consumirá como respuesta judicial a su abandono de Yahvé.
  alternative_spanish_readings:
  - El daño sería solo una consecuencia natural de la idolatría.
  - Dios simplemente retiraría su protección, sin acción judicial directa.
  rationale: El hebreo atribuye la acción a Yahvé; la traducción conserva esa tensión teológica sin suavizarla ni convertirla en mera consecuencia impersonal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado revisado del inglés POB, especialmente en la clausula final «después de haberles hecho bien», manteniendo la tensión entre beneficencia previa y juicio posterior. Se ha preferido un español natural pero formal, sin borrar la agencia directa de Yahvé ni la fuerza de los verbos de daño y consumación.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se eligió «dioses extranjeros» para אֱלֹהֵי נֵכָר, manteniendo la alteridad religiosa sin recurrir a una paráfrasis doctrinal.
  - «Servir» conserva el valor cultual de עבד sin convertirlo en mera obediencia civil.
  - «Consumirá» y la nota alternativa «destruirá» preservan el rango semántico de כלה.
