  text: εἶπεν πρὸς αὐτούς· Προσηνέγκατέ μοι τὸν ἄνθρωπον τοῦτον ὡς ἀποστρέφοντα τὸν λαόν, καὶ ἰδοὺ ἐγὼ ἐνώπιον ὑμῶν ἀνακρίνας ⸀οὐθὲν εὗρον ἐν τῷ ἀνθρώπῳ τούτῳ αἴτιον ὧν κατηγορεῖτε κατ’ αὐτοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/luke/023/014.yaml
  text: He said to them[a], “You brought this man to me as one who was misleading the people, and behold, after examining him before you[b], I found no basis in this man for the charges you bring against him.”
  footnotes:
