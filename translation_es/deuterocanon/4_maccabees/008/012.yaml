translation:
  language: es
  text: Y mientras decía estas cosas[a], ordenó que se trajeran al frente los instrumentos de tortura, para que incluso mediante el miedo los persuadiera a comer alimento contaminado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «participar de alimento impuro». El verbo griego indica comer lo que contamina o está ritualmente profanado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ταῦτα δὲ λέγων
  english_pob_choice: And as he said these things
  chosen_spanish: Y mientras decía estas cosas
  alternatives_spanish:
  - Y al decir estas cosas
  - Y cuando decía estas cosas
  lexicon: LSJ
  rationale: La construcción participial expresa simultaneidad con la acción principal; en español, «mientras decía estas cosas» conserva esa relación temporal de manera natural y fiel.
- source_word: ἐκέλευσεν
  english_pob_choice: he ordered
  chosen_spanish: ordenó
  alternatives_spanish:
  - mandó
  - dio orden de
  lexicon: LSJ
  rationale: «Ordenó» reproduce el valor imperativo fuerte del verbo sin añadir matices innecesarios.
- source_word: εἰς τὸ ἔμπροσθεν προτεθῆναι
  english_pob_choice: to be brought forward
  chosen_spanish: que se presentaran delante
  alternatives_spanish:
  - que se pusieran delante
  - que se colocaran ante él
  lexicon: LSJ
  rationale: La expresión comunica que los instrumentos fueron puestos al frente, en exhibición. «Se presentaran delante» conserva el sentido de colocación pública sin forzar una traducción mecánica.
- source_word: τὰ βασανιστήρια
  english_pob_choice: the instruments of torture
  chosen_spanish: los instrumentos de tortura
  alternatives_spanish:
  - las torturas
  - los aparatos de tortura
  lexicon: LSJ
  rationale: El sustantivo puede referirse a medios o implementos de tortura; «instrumentos de tortura» mantiene esa concreción material que el contexto requiere.
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: LSJ
  rationale: Introduce finalidad; «para que» es la forma más natural y precisa en español.
- source_word: καὶ διὰ τοῦ φόβου
  english_pob_choice: even through fear
  chosen_spanish: incluso por miedo
  alternatives_spanish:
  - aun mediante el miedo
  - hasta por miedo
  lexicon: LSJ
  rationale: «Incluso» refleja la fuerza enfática de καὶ, y «por miedo» expresa el medio sin sobreinterpretar como intimidación técnica.
- source_word: πείσειεν
  english_pob_choice: he might persuade
  chosen_spanish: los persuadiera
  alternatives_spanish:
  - los convenciera
  - los indujera
  lexicon: LSJ
  rationale: El verbo significa persuadir o convencer; se conserva ese valor, aun cuando el contexto muestre una presión coercitiva.
- source_word: μιεροφαγῆσαι
  english_pob_choice: to eat defiled food
  chosen_spanish: a comer alimento contaminado
  alternatives_spanish:
  - a comer comida impura
  - a comer alimento profanado
  lexicon: LSJ
  rationale: El compuesto refiere a comer lo ritualmente contaminado o profanado. «Alimento contaminado» preserva la idea de impureza sin importar una terminología litúrgica posterior.
theological_decisions:
- issue: Valor del verbo πείσειεν en un contexto de persecución
  english_pob_reading: he might persuade
  chosen_spanish_reading: los persuadiera
  alternative_spanish_readings:
  - los convenciera
  - los obligara
  rationale: Se mantiene «persuadir» porque es el valor léxico del griego; el contexto violento no autoriza sustituirlo por «obligar», que borraría la tensión entre persuasión y coerción.
  doctrine_reference: Principio de primacía del texto original y preservación de tensiones léxicas.
- issue: Naturaleza de μιεροφαγῆσαι en relación con la ley judía
  english_pob_reading: eat defiled food
  chosen_spanish_reading: comer alimento contaminado
  alternative_spanish_readings:
  - comer alimento impuro
  - comer comida profanada
  rationale: La referencia es a comida considerada ritualmente contaminada por la ley; «contaminado» comunica la idea de mancha/impureza sin cerrarla a un solo tecnicismo español.
  doctrine_reference: Respeto del trasfondo judaico y del lenguaje de pureza ritual.
translation_notes:
  revision_awareness: Se corrigió el error anterior asegurando que el marcador de nota [a] aparece explícitamente en el texto español junto a la frase correspondiente.
  spanish_consistency_notes:
  - 'Se conserva el orden de eventos del griego: decir, ordenar, presentar los instrumentos, y el propósito de persuadir por miedo.'
  - Se evita sustituir «persuadir» por un verbo más fuerte que borre la elección léxica del original.
  - «Instrumentos de tortura» mantiene la concreción material de τὰ βασανιστήρια.
  - El registro es sobrio y publicable, con terminología bíblica moderna pero fiel al texto fuente.
