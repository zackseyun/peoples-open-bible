review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente el hebreo: contraste proverbial entre el sabio que guarda silencio hasta el tiempo apropiado y el necio que no atiende al tiempo adecuado. También conserva la divergencia importante del paralelo griego en nota. Sin embargo, la nota actual no refleja con precisión la nota inglesa auditada: desplaza el literal relevante desde «no guarda/observa tiempo» hacia la primera cláusula («hasta tiempo»), lo que desajusta la evidencia fuente y la rationale documentada.'
  spanish_quality_summary: El texto principal suena natural, claro y digno en español. «El sabio calla» y «el momento oportuno» son buenas opciones idiomáticas. La segunda cláusula también es legible. La única reparación necesaria es en la nota, para que la explicación literal corresponda a la segunda mitad del versículo y no introduzca una observación menos pertinente sobre «hasta tiempo».
  glossary_alignment: No hay términos del glosario teológico principal en juego. «Sabio», «necio», «calla» y «momento oportuno» son adecuados al registro sapiencial. La decisión de no calcar «guardar tiempo» en el texto principal es correcta para la legibilidad española, siempre que la nota preserve el literal hebreo en la segunda cláusula.
  issues:
  - severity: medium
    issue: La nota al pie ancla bien en [a], pero explica el literal hebreo de la primera frase en vez del de la segunda.
    rationale: 'La nota inglesa dice explícitamente: «The Hebrew literally says ''does not keep time.''» El borrador español dice: «El hebreo literalmente dice ‘hasta tiempo’ / ‘hasta un tiempo’», lo cual no corresponde a la decisión lexical auditada ni al motivo de la nota.'
  - severity: low
    issue: La nota usa una alternativa para la primera cláusula («hasta el tiempo debido») que no es la alternativa principal documentada en inglés.
    rationale: La audit trail inglesa da «until the right time» con alternativa «until the proper time», pero la nota se centra sobre todo en la segunda cláusula y la divergencia griega. Conviene alinear la nota española con ese enfoque para evitar confusión.
  revised_spanish_text: El sabio calla hasta el momento oportuno[a], pero el necio no observa el momento oportuno.
  revised_footnotes:
  - marker: a
    text: 'O: «hasta el tiempo debido». El hebreo, en la segunda cláusula, literalmente dice «no guarda el tiempo» o «no observa el tiempo». El paralelo griego para este versículo dice de manera bastante diferente: «El que abunda en palabras será detestado, y el que actúa con altivez será odiado».'
    reason: alternative_reading
  revision_rationale: 'Se mantiene el texto principal, que es fiel y natural, pero se corrige la nota para que refleje con precisión la evidencia hebrea y la audit trail inglesa: el literal relevante pertenece a «no guarda/observa el tiempo» en la segunda cláusula, no a «hasta tiempo» en la primera. No se requiere adjudicación adicional.'
