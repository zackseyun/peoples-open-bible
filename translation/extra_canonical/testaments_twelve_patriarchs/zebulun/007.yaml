translation:
  text: 1[a]. Therefore, my children, have compassion in mercy toward every person, so that the Lord also may have compassion in mercy toward you. 2. Because in the last days you also will send forth your compassion upon the earth, and wherever the Most High finds a heart of compassion, there he dwells. 3. For in the measure that a man has compassion on his neighbors, so also the Lord has compassion on him. 4. And when we came down into Egypt, Joseph my brother tested us, and he learned that I was compassionate. 5. For when I sat by him, I did not grieve him with envy, and I did not speak bitterly against him. 6. And after these things, my children, I urge you not to hold malice in your hearts against one another[b], and to love one another in deed and in word. 7. For in the presence of my father I spoke peaceably to Joseph; and when I had gone out, Dan told us that the prince of the eunuchs was seeking to destroy him, because he had become attached to him as a pure and good young man. 8. But I wept over Joseph, and I prayed for him, that the Lord would deliver him from every evil intention. 9. And afterward the Ishmaelites came and took him away, and they persuaded him to go with them, and they sold him to Potiphar in Egypt. 10. But because of the compassion that I had shown to my brother, the Lord did not let me fall into the same testing. 11. And when all my brothers were sick, and our father was grieving because of them, I had compassion on every poor man and every sick man, and I gave to all in simplicity of heart. 12. And if I had nothing to give to the needy, I walked with him for seven stadia, weeping with him in mercy. 13. Therefore, my children, have compassion in mercy toward every person with a good heart, so that God also may give you compassion and mercy. 14. For if a man does not have compassion on his neighbor, he provokes the Lord. 15. And if he hardens his heart, and does not have compassion on his neighbor, and does not help the poor, the Lord will judge him. 16. For throughout all my life I did not walk in crookedness, but in all simplicity. 17. I did not set my mind on silver or gold, or on any glory of men. 18. I did not wear a double face. 19. I did not devise evil against my neighbor. 20. I did not corrupt my speech with many-colored words. 21. I walked with all men in simplicity of heart. 22. Therefore, my children, do you also have these things, and every spirit of Beliar will flee from you, and no deed of wicked men will rule over you; and every wild beast you will master, since you have with you the God of heaven and earth and walk with men in simplicity of heart. 23. And after he had said these things, he commanded them to carry his body to Hebron and to bury it with his fathers. 24. And when he had fallen asleep at a good old age, his sons laid him in a coffin. 25[c][d]. And afterward they carried him up to Hebron and buried him with his fathers.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Seven stadia is roughly 1.3 kilometers or 0.8 miles.
    reason: cultural_note
    anchor_ref: '7:12'
  - marker: b
    text: Beliar is the Greek testament form of the name also known as Belial, a personified power of wickedness.
    reason: lexical_alternative
    anchor_ref: '7:22'
  - marker: d
    text: The expression rendered 'double face' refers to duplicity or two-faced behavior.
    reason: lexical_alternative
    anchor_ref: '7:18'
  - marker: c
    text: The phrase 'many-colored words' likely refers to crafty, deceptive, or manipulative speech.
    reason: lexical_alternative
    anchor_ref: '7:20'
lexical_decisions:
- source_word: σπλαγχνίζομαι / σπλάγχνα
  chosen: have compassion / compassion
  alternatives:
  - be moved with pity
  - show mercy from the heart
  - bowels of mercy
  lexicon: BDAG
  rationale: This virtue is the thematic center of the chapter. 'Have compassion' preserves the active ethical force, while 'compassion' for the noun keeps the repeated exhortation stable without archaic bodily imagery.
- source_word: ἔλεος
  chosen: mercy
  alternatives:
  - kindness
  - pity
  lexicon: BDAG
  rationale: Used alongside compassion, 'mercy' preserves the covenantal and moral weight of the appeal better than the softer 'kindness'.
- source_word: οἰκτίρω / οἰκτιρμός
  chosen: have compassion
  alternatives:
  - show pity
  - have mercy
  lexicon: LSJ
  rationale: Where the sense overlaps with σπλαγχνίζομαι, 'have compassion' keeps the rhetoric smooth in English while preserving the reciprocal divine-human pattern.
- source_word: πλησίον
  chosen: neighbor
  alternatives:
  - fellow
  - near one
  lexicon: BDAG
  rationale: '''Neighbor'' is the standard ethical term in biblical English and fits the paraenetic tone of the testament.'
- source_word: ἁπλότης
  chosen: simplicity
  alternatives:
  - single-heartedness
  - generosity
  - integrity
  lexicon: BDAG
  rationale: In Zebulun this term denotes undivided, guileless moral character. 'Simplicity' preserves the testament's recurring self-presentation, though the sense includes integrity and singleness of heart.
- source_word: καρδία ἁπλῆ / ἁπλότης καρδίας
  chosen: simplicity of heart
  alternatives:
  - single heart
  - undivided heart
  - sincere heart
  lexicon: BDAG
  rationale: This phrase is central to Zebulun's ethical voice. 'Simplicity of heart' keeps the repeated formula visible rather than paraphrasing it away.
- source_word: φθόνος
  chosen: envy
  alternatives:
  - jealousy
  lexicon: BDAG
  rationale: The chapter contrasts Zebulun's compassion with the brothers' destructive envy toward Joseph. 'Envy' is the sharper vice term here.
- source_word: μνησικακέω / μνησικακία
  chosen: hold malice
  alternatives:
  - bear a grudge
  - remember wrongs
  lexicon: BDAG
  rationale: '''Hold malice'' preserves the testamentary warning against inward hostility while sounding elevated and direct.'
- source_word: ποικίλος λόγος / δισσοπροσωπία (conceptual cluster)
  chosen: many-colored words / double face
  alternatives:
  - deceitful speech
  - duplicity
  - double-heartedness
  lexicon: LSJ
  rationale: The Greek imagery stresses guile and mixed motives. 'Double face' and 'many-colored words' preserve the vivid moral texture instead of flattening to generic 'dishonesty.'
- source_word: Βελιάρ
  chosen: Beliar
  alternatives:
  - Belial
  lexicon: LSJ
  rationale: The Greek testament tradition commonly uses the form 'Beliar.' Retaining it reflects the witness text rather than normalizing to the more familiar Hebrew-derived 'Belial'.
- source_word: στάδιον
  chosen: stadia
  alternatives:
  - furlongs
  - about an eighth of a mile each
  lexicon: BDAG
  rationale: A transliterated ancient measure keeps the historical texture. The exact distance can be clarified in a note rather than absorbed into the main text.
- source_word: ἐκοιμήθη
  chosen: fell asleep
  alternatives:
  - died
  - was laid to rest
  lexicon: BDAG
  rationale: The testamentary closing formula often uses sleep as a death euphemism. 'Fell asleep' preserves the literary register of the source.
