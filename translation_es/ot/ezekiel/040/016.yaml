translation:
  language: es
  text: Y había ventanas[a] empotradas hacia las cámaras de guardia y hacia sus pilares laterales[b], hacia adentro, todo alrededor del portal; y lo mismo para los pórticos[c]. También había ventanas todo alrededor por dentro, y en cada pilar[b] había adornos de palmeras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: ‘cerradas’, ‘estrechas’ o ‘con marcos empotrados’. El hebreo probablemente describe una forma arquitectónica particular, no ventanas que estuvieran completamente cerradas a la luz.'
    reason: lexical_alternative
  - marker: b
    text: Los términos hebreos para estos elementos estructurales del portal, aquí traducidos ‘pilares laterales’ y ‘pilar’, son vocabulario arquitectónico difícil; también pueden entenderse como ‘jambas’ o ‘pilastras’.
    reason: lexical_alternative
  - marker: c
    text: 'También: ‘vestíbulos’ o ‘porches’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַלֹּנוֹת
  english_pob_choice: windows
  chosen_spanish: ventanas
  alternatives_spanish:
  - aberturas
  lexicon: HALOT
  rationale: El sentido básico es ‘ventanas’; en este contexto arquitectónico, ‘ventanas’ comunica con naturalidad la imagen sin perder especificidad.
- source_word: אֲטֻמוֹת
  english_pob_choice: recessed
  chosen_spanish: empotradas
  alternatives_spanish:
  - cerradas
  - estrechas
  - bloqueadas
  lexicon: HALOT
  rationale: ‘Empotradas’ expresa mejor en español la idea arquitectónica de una ventana encajada o retraída en el muro, evitando el sentido engañosamente absoluto de ‘cerradas’.
- source_word: הַתָּאִים
  english_pob_choice: the guardrooms
  chosen_spanish: las cámaras de guardia
  alternatives_spanish:
  - las salas laterales
  - las cámaras
  lexicon: HALOT
  rationale: En Ezequiel 40 el término designa habitaciones del portal para guardia; ‘cámaras de guardia’ mantiene la función contextual y suena más literal que una generalización como ‘salas’.
- source_word: אֵלֵיהֶמָה
  english_pob_choice: their side pillars
  chosen_spanish: sus pilares laterales
  alternatives_spanish:
  - sus jambas
  - sus pilastras
  lexicon: HALOT
  rationale: La expresión apunta a elementos estructurales del portal. ‘Pilares laterales’ conserva la referencia arquitectónica y es inteligible en español moderno; se evita imponer una sola identificación técnica cuando el hebreo es difícil.
- source_word: לִפְנִימָה
  english_pob_choice: inward / on the inside
  chosen_spanish: hacia adentro / por dentro
  alternatives_spanish:
  - hacia el interior
  - interiormente
  lexicon: HALOT
  rationale: La partícula indica orientación al interior. Se ha repartido de modo natural en dos apariciones para que el español fluya sin perder la repetición del hebreo.
- source_word: לַשַּׁעַר
  english_pob_choice: the gate
  chosen_spanish: la puerta
  alternatives_spanish:
  - la puerta de acceso
  - la entrada
  lexicon: HALOT
  rationale: Aunque el hebreo puede abarcar ‘gate/gateway’, en español ‘puerta’ resulta más natural en este pasaje descriptivo y mantiene la referencia al acceso principal sin sobrecargar con un tecnicismo.
- source_word: סָבִיב סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - todo alrededor
  - en derredor
  lexicon: HALOT
  rationale: La duplicación intensifica la idea circunferencial; ‘alrededor’ es una solución idiomática breve que conserva el valor distributivo y repetitivo.
- source_word: וְכֵן
  english_pob_choice: likewise
  chosen_spanish: y lo mismo
  alternatives_spanish:
  - asimismo
  - igualmente
  lexicon: HALOT
  rationale: La frase conecta el mismo rasgo con el siguiente elemento arquitectónico; ‘y lo mismo’ reproduce esa equivalencia de forma clara y sobria.
- source_word: אֵלַמּוֹת
  english_pob_choice: the porticos
  chosen_spanish: los pórticos
  alternatives_spanish:
  - los vestíbulos
  - los porches
  lexicon: HALOT
  rationale: ‘Pórticos’ es el equivalente arquitectónico más natural y digno en español para esta estructura de acceso.
- source_word: אַיִל
  english_pob_choice: pillar
  chosen_spanish: pilar
  alternatives_spanish:
  - jamba
  - pilastra
  lexicon: HALOT
  rationale: Aquí el singular tiene sentido distributivo y se refiere a un elemento estructural del portal. ‘Pilar’ es claro para el lector moderno y mantiene la imagen constructiva.
- source_word: תִּמֹרִים
  english_pob_choice: palm-tree decorations
  chosen_spanish: adornos de palmeras
  alternatives_spanish:
  - motivos de palmera
  - adornos con palmeras
  lexicon: HALOT
  rationale: El contexto es ornamental, no botánico. ‘Adornos de palmeras’ comunica mejor que ‘palmeras’ a secas la función decorativa de la talla o relieve.
translation_notes:
  revision_awareness: El texto español sigue de cerca el paquete fuente hebreo y el rastro auditado en inglés. Se preserva la tensión léxica de אֲטֻמוֹת como una forma arquitectónica especial mediante ‘empotradas’, sin resolverla de manera excesiva; se mantiene la ambigüedad arquitectónica de איל con ‘pilares laterales’ y ‘pilar’; y se conserva la distribución repetida de סָבִיב סָבִיב con ‘alrededor’.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ en otros contextos del proyecto, pero este versículo no lo contiene.
  - Se mantiene ‘pórticos’ como término arquitectónico consistente con el registro del pasaje.
  - Se evita la terminología eclesiástica tradicional no exigida por el hebreo.
  - La colocación de los corchetes de notas sigue el orden requerido y cada marcador aparece en el punto del texto correspondiente.
