  text: וַ/יְהִ֗י בְּ/צַוֺּת/וֹ֙ אֶת הָ/אִ֤ישׁ לְבֻֽשׁ הַ/בַּדִּים֙ לֵ/אמֹ֔ר קַ֥ח אֵשׁ֙ מִ/בֵּינ֣וֹת לַ/גַּלְגַּ֔ל מִ/בֵּינ֖וֹת לַ/כְּרוּבִ֑ים וַ/יָּבֹא֙ וַֽ/יַּעֲמֹ֔ד אֵ֖צֶל הָ/אוֹפָֽן־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/010/006.yaml
  text: And it happened[a], when he commanded the man clothed in linen, saying, “Take fire from between the wheelwork, from between the cherubim,” that he went in and stood beside the wheel.
  footnotes:
  - marker: a
    text: Or “from among the wheelwork”; the Hebrew גַּלְגַּל can refer to a wheel or a whirling wheel structure in this vision.
    reason: lexical_alternative
