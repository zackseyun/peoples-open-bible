translation:
  language: es
  text: Mejor es la muerte[a] que una vida de vanidad, y el descanso eterno que el dolor continuo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Mejor es la muerte que una vida amarga». El hebreo dice «una vida de vanidad».'
    reason: alternative_reading
  - marker: b
    text: El griego dice una «afección/enfermedad persistente», mientras el hebreo habla de «dolor» duradero; ambos coinciden en la idea de continuidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוב / κρείσσων
  english_pob_choice: better
  chosen_spanish: Mejor es
  alternatives_spanish:
  - Es bueno
  - Más vale
  lexicon: HALOT; LXX κρείσσων
  rationale: El proverbio es comparativo; en español natural, «Mejor es» conserva el valor sapiencial sin volverse mecánico. «Más vale» también sería posible, pero «Mejor es» se acerca más al paralelismo formal del original.
- source_word: למות / θάνατος
  english_pob_choice: Death
  chosen_spanish: la muerte
  alternatives_spanish:
  - morir
  - el morir
  lexicon: HALOT; LXX θάνατος
  rationale: Aunque el hebreo usa un infinitivo y el griego un sustantivo, la construcción proverbial en español admite el sustantivo abstracto «la muerte», que preserva el tono gnómico y la concisión del paralelo griego.
- source_word: מחיי שוא
  english_pob_choice: than a life of vanity
  chosen_spanish: que una vida de vanidad
  alternatives_spanish:
  - que una vida vacía
  - que una vida de vacío
  - que una vida vana
  lexicon: HALOT
  rationale: שוא abarca vacío, vanidad y futilidad. «Vanidad» reproduce mejor el campo semántico tradicional y la revisión inglesa más reciente, mientras que «vida vacía» sería más explicativa pero menos ceñida al sustantivo hebreo.
- source_word: ונוחת עולם
  english_pob_choice: everlasting rest
  chosen_spanish: descanso eterno
  alternatives_spanish:
  - reposo eterno
  - descanso perpetuo
  - reposo perpetuo
  lexicon: HALOT
  rationale: נוחת indica descanso o reposo; עולם expresa duración continua. «Descanso eterno» es claro, solemne y natural en español. «Reposo eterno» es posible, pero «descanso» resulta más transparente para lectores amplios.
- source_word: מכאב נאמן
  english_pob_choice: continual pain
  chosen_spanish: dolor continuo
  alternatives_spanish:
  - dolor constante
  - dolor persistente
  - aflicción continua
  lexicon: HALOT
  rationale: כאב es «dolor». נאמן, literalmente «firme/fiable», funciona aquí como duradero o persistente; «continuo» comunica bien esa idea sin introducir una interpretación más fuerte que el texto. Mantiene la tensión con el griego, que habla de una aflicción duradera.
theological_decisions:
- issue: Divergencia hebreo-griega en la primera cola del proverbio
  english_pob_reading: The main text follows the Hebrew 'life of vanity,' with the Greek 'bitter life' preserved in a footnote.
  chosen_spanish_reading: El texto principal sigue «una vida de vanidad», dejando la lectura griega «una vida amarga» en nota.
  alternative_spanish_readings:
  - una vida amarga
  - una vida vacía
  - una vida fútil
  rationale: El hebreo es el testimonio principal de Sirácides cuando está disponible y aquí coincide en sentido general con la estructura comparativa. La versión griega aporta una variante lexical relevante; por eso se conserva en nota, sin reemplazar la base hebrea del texto principal.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; usar el paralelo griego como apoyo transparente'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente en la cola final: ''everlasting rest'' y ''continual pain''. También mantiene la decisión de privilegiar el hebreo para שוא, a la vez que preserva la alternativa griega en nota para transparencia auditiva.'
  spanish_consistency_notes:
  - Se usó «vanidad» para שוא, coherente con la revisión inglesa y con un registro sapiencial tradicional pero comprensible.
  - Se eligió «descanso eterno» para עולם, evitando soluciones más interpretativas como 'reposo celestial' que no están en el texto.
  - «Dolor continuo» refleja נאמן como persistencia, sin convertirlo en diagnóstico médico.
  - Se mantuvo el paralelismo proverbial con dos miembros comparativos de longitud similar.
