translation:
  language: es
  text: 'Por tanto, así dice el Señor Yahvé: ¡Ay de la ciudad sanguinaria![a] Yo también haré grande la pila de leña[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “ciudad de sangres”, un modismo para una ciudad marcada por derramamiento de sangre o culpa de sangre.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “Yo también agrandaré la pira”.'
    reason: alternative_reading
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Conserva el valor inferencial del hebreo y suena natural en español profético sin añadir énfasis extra.
- source_word: כֹּה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - así ha dicho
  - esto dice
  lexicon: HALOT
  rationale: Mantiene la fórmula profética convencional con un equivalente directo y natural en español.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor Yahveh
  lexicon: HALOT
  rationale: El texto hebreo presenta el título compuesto con el nombre divino; en la norma del proyecto, יְהוָה se vierte como 'Yahvé'. En español, repetir 'Señor Yahvé' sería más pesado y menos natural, pero se preserva el nombre propio divino sin enmascararlo.
- source_word: א֖וֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de
  alternatives_spanish:
  - ¡Ay
  - ¡Ay, de
  lexicon: HALOT
  rationale: Transmite el grito de lamento y juicio con una forma idiomática bíblica y comprensible en español.
- source_word: עִיר הַדָּמִים
  english_pob_choice: the city of bloodshed
  chosen_spanish: la ciudad de sangre
  alternatives_spanish:
  - la ciudad de derramamiento de sangre
  - la ciudad sanguinaria
  lexicon: HALOT
  rationale: El hebreo literal dice 'ciudad de sangres', una expresión idiomática para culpa de sangre o derramamiento de sangre. 'Ciudad de sangre' conserva la concisión del hebreo y permite anclar la nota explicativa sin suavizar la acusación.
- source_word: גַּם אֲנִי
  english_pob_choice: I also
  chosen_spanish: Yo también
  alternatives_spanish:
  - También yo
  - Incluso yo
  lexicon: HALOT
  rationale: Preserva el énfasis del hebreo sobre la participación divina en la acción anunciada.
- source_word: אַגְדִּיל
  english_pob_choice: will make ... great
  chosen_spanish: haré grande
  alternatives_spanish:
  - agrandaré
  - haré mayor
  lexicon: HALOT
  rationale: 'Refleja el causativo del verbo: no solo aumenta, sino que hace más grande la acumulación o pila.'
- source_word: הַמְּדוּרָה
  english_pob_choice: the woodpile
  chosen_spanish: la pila de leña
  alternatives_spanish:
  - el montón de leña
  - la pira
  lexicon: HALOT
  rationale: La imagen concreta es la de una pila de combustible para el fuego; 'pila de leña' comunica bien el sentido sin forzar un término más técnico como 'pira'.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה en un vocativo profético compuesto
  english_pob_reading: the Lord Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor Yahvé
  - Señor Yahvé
  rationale: La pauta del proyecto pide 'Yahvé' para יְהוָה. Dado que el compuesto אֲדֹנָי יְהוִה ya expresa solemnidad y autoridad, en español se evita duplicar títulos y se conserva el nombre divino con claridad.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de 'ciudad de sangre' como acusación de sangre derramada o culpa de sangre
  english_pob_reading: the city of bloodshed
  chosen_spanish_reading: la ciudad de sangre
  alternative_spanish_readings:
  - la ciudad de derramamiento de sangre
  - la ciudad culpable de sangre
  rationale: Se conserva la expresión breve del hebreo y se deja la explicación idiomática para la nota, evitando perder la fuerza retórica del original.
  doctrine_reference: HALOT על דמים / sangre como metonimia de violencia y culpa
- issue: Traducción de הַמְּדוּרָה como objeto de la ampliación
  english_pob_reading: the woodpile
  chosen_spanish_reading: la pila de leña
  alternative_spanish_readings:
  - el montón de leña
  - la pira
  rationale: El contexto apunta a una acumulación de combustible para el fuego de juicio. 'Pila de leña' mantiene la imagen concreta y evita cargar el término con matices funerarios que 'pira' puede sugerir.
  doctrine_reference: Contexto de Ez 24:9-10, imagen de cocción/jucio por fuego
translation_notes:
  revision_awareness: La revisión más reciente sustituyó en inglés 'the Lord GOD' por 'the Lord Yahweh' para hacer explícito el nombre divino, y cambió 'firewood pile' por 'woodpile' por naturalidad. En español se refleja esa actualización con 'Yahvé' y con 'pila de leña', manteniendo el sentido de una acumulación de combustible sin introducir un tecnicismo innecesario.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה, conforme a la norma del proyecto.
  - Se evita 'SEÑOR' como máscara tipográfica del nombre divino.
  - '''Sangre'' conserva la fuerza idiomática de דָּמִים; la explicación se reserva para la nota.'
  - '''Pila de leña'' mantiene el objeto físico sin desviar el sentido hacia una pira funeraria en el texto principal.'
