translation:
  language: es
  text: Cuando se oyeron las palabras que David había hablado, las refirieron ante Saúl, y él lo mandó llamar[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «y lo tomó». Aquí el hebreo probablemente quiere decir que Saúl hizo que David fuera llevado ante él.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְּשָּׁמְעוּ
  english_pob_choice: were heard
  chosen_spanish: se oyeron
  alternatives_spanish:
  - oyeron
  - fueron oídas
  lexicon: HALOT
  rationale: El hebreo permite una lectura impersonal/pasiva del verbo de oír. En español, «se oyeron» mantiene ese valor sin introducir un sujeto no expresado y suena natural en narrativa.
- source_word: הַדְּבָרִים
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - las cosas
  - los dichos
  lexicon: HALOT
  rationale: Aquí דְּבָרִים se refiere a lo que David dijo; «las palabras» conserva el sentido de discurso hablado y es idiomático en español.
- source_word: אֲשֶׁר דִּבֶּר דָּוִד
  english_pob_choice: that David had spoken
  chosen_spanish: que David había hablado
  alternatives_spanish:
  - que David dijo
  - que David pronunció
  lexicon: HALOT
  rationale: «Había hablado» reproduce el verbo de hablar con una relación temporal natural en español y evita suavizar el matiz de discurso ya emitido.
- source_word: וַיַּגִּדוּ
  english_pob_choice: they reported
  chosen_spanish: las refirieron
  alternatives_spanish:
  - las contaron
  - las informaron
  lexicon: HALOT
  rationale: נגד tiene el valor de hacer saber o reportar. «Refirieron» comunica bien el acto de transmitir el contenido a una autoridad sin perder la idea de informe.
- source_word: לִפְנֵי שָׁאוּל
  english_pob_choice: before Saul
  chosen_spanish: ante Saúl
  alternatives_spanish:
  - delante de Saúl
  - en presencia de Saúl
  lexicon: HALOT
  rationale: La expresión hebrea literalmente significa «delante de». «Ante Saúl» preserva la fórmula espacial y su fuerza de comparecencia ante una figura de autoridad.
- source_word: וַיִּקָּחֵהוּ
  english_pob_choice: he sent for him
  chosen_spanish: envió por él
  alternatives_spanish:
  - lo mandó llamar
  - hizo que lo trajeran
  lexicon: HALOT
  rationale: En este contexto cortesano, לקח probablemente expresa que Saúl hizo traer a David, no que simplemente lo tomó. «Envió por él» conserva el valor idiomático que señaló la revisión inglesa reciente.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada desde «he had him brought» a «he sent for him» para reflejar mejor el hebreo idiomático de לקח; la redacción española sigue esa decisión con «envió por él».
  spanish_consistency_notes:
  - Se mantuvo «Saúl» como nombre propio, sin sustituirlo por títulos.
  - Se evitó «SEÑOR» u այլ masking conventions porque no hay tetragrámaton en este versículo.
  - La solución verbal final evita una traducción mecánica de «tomó» y conserva el matiz de mandarlo traer al contexto palaciego.
