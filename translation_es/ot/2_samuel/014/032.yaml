    issue: «te he enviado a decir» no representa con precisión שָׁלַחְתִּי אֵלֶיךָ
    rationale: El hebreo aquí significa enviar recado a Joab o mandarlo llamar. La redacción actual en español puede entenderse como 'te envié para decir', cambiando la relación entre emisor, receptor y mensaje.
  - severity: medium
    issue: Las notas [a][b] están colocadas al final en vez de junto a sus frases ancla
    rationale: La instrucción del proyecto exige que cada marcador aparezca exactamente en la palabra o frase relevante dentro de spanish_text.
  - severity: low
