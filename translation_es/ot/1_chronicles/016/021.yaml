translation:
  language: es
  text: No permitió que nadie los oprimiera[a], y reprendió a reyes por causa de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «por su causa» o «porque de ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנִּיחַ
  english_pob_choice: allowed
  chosen_spanish: permitió
  alternatives_spanish:
  - dejó
  - consintió en
  lexicon: HALOT
  rationale: En esta construcción causal con negación, el verbo expresa impedir o no dar permiso. «Permitió» conserva el valor de autorización/permiso y suena natural en español.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: nadie
  alternatives_spanish:
  - ningún hombre
  - ninguna persona
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «hombre» en singular genérico, en español «nadie» comunica mejor el valor inclusivo y evita una expresión innecesariamente marcada.
- source_word: לְעָשְׁקָם
  english_pob_choice: to oppress them
  chosen_spanish: los oprimiera
  alternatives_spanish:
  - los maltratara
  - los explotara
  lexicon: HALOT
  rationale: «Oprimir» reproduce bien el campo semántico de עָשַׁק y mantiene la fuerza del verbo en un contexto de aflicción histórica.
- source_word: וַיּוֹכַח
  english_pob_choice: rebuked
  chosen_spanish: reprendió
  alternatives_spanish:
  - reprochó
  - corrigió
  lexicon: HALOT
  rationale: «Reprendió» expresa la idea de reprobación o reprensión con la fuerza adecuada para el contexto de reyes.
- source_word: עֲלֵיהֶם
  english_pob_choice: on their account
  chosen_spanish: por causa de ellos
  alternatives_spanish:
  - por ellos
  - a favor de ellos
  lexicon: HALOT
  rationale: La preposición עַל con sufijo pronominal aquí puede indicar referencia, beneficio o causa. «Por causa de ellos» preserva la relación causal/protectora sin fijarla excesivamente en una sola paráfrasis.
- source_word: מְלָכִים
  english_pob_choice: kings
  chosen_spanish: reyes
  alternatives_spanish:
  - monarcas
  - soberanos
  lexicon: HALOT
  rationale: «Reyes» es la equivalencia directa y natural en español; no hay motivo contextual para generalizar a un término más amplio.
theological_decisions:
- issue: Sujeto implícito de los verbos
  english_pob_reading: The subject is God, carried over from the surrounding context.
  chosen_spanish_reading: El sujeto queda implícito en español, pero el contexto lo identifica como Dios.
  alternative_spanish_readings:
  - Él no permitió...
  - Yahvé no permitió...
  rationale: El hebreo no nombra el sujeto en esta cláusula porque continúa el contexto. En español puede mantenerse la misma economía verbal sin añadir el nombre divino, aunque el referente contextual sea claro.
  doctrine_reference: Principio de primacía del texto fuente y continuidad contextual.
translation_notes:
  revision_awareness: El contexto editorial inglés muestra alta concordancia y sin revisiones sustantivas; por eso se mantiene una solución breve y directa, con una nota para la ambigüedad de עֲלֵיהֶם.
  spanish_consistency_notes:
  - 'Se preserva el paralelismo de dos miembros: prohibición de opresión y reprensión a reyes.'
  - Se evita «SEÑOR» como convención de ocultamiento; aquí el versículo no nombra explícitamente a Yahvé, pero el contexto lo presupone.
  - «Nadie» traduce el valor genérico de אִישׁ con naturalidad en español sin perder la referencia humana general.
