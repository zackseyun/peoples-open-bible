translation:
  language: es
  text: Puedes exigir pago al extranjero[a], pero lo que sea tuyo que esté con tu hermano, tu mano soltará[c][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «exigir pago a un extranjero». El verbo hebreo expresa presión o demanda de pago en un contexto de deuda.
    reason: lexical_alternative
  - marker: b
    text: «Tu hermano» aquí se refiere a un miembro de la comunidad del pacto de Israel.
    reason: cultural_note
  - marker: c
    text: Literalmente, «tu mano soltará»; el modismo significa dejar ir o remitir la reclamación en el año de remisión.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנָּכְרִי
  english_pob_choice: a foreigner
  chosen_spanish: el extranjero
  alternatives_spanish:
  - un extranjero
  - el forastero
  lexicon: HALOT
  rationale: נָכְרִי designa a una persona de fuera del pueblo del pacto en este contexto legal. «Extranjero» es natural en español moderno y conserva la distinción social y jurídica mejor que opciones más vagas como «forastero».
- source_word: תִּגֹּשׂ
  english_pob_choice: you may press ... for payment
  chosen_spanish: puedes exigir pago
  alternatives_spanish:
  - puedes apremiar para pago
  - puedes reclamar pago
  - puedes cobrar
  lexicon: HALOT
  rationale: El verbo נגשׂ aquí pertenece al ámbito de cobro o presión por una deuda. «Exigir pago» transmite la fuerza jurídica sin sonar demasiado arcaico; «cobrar» sería más breve pero menos preciso respecto al matiz de presión.
- source_word: וַאֲשֶׁר יִהְיֶה לְךָ
  english_pob_choice: whatever of yours is
  chosen_spanish: de lo que sea tuyo
  alternatives_spanish:
  - lo que sea tuyo
  - cualquier cosa que te pertenezca
  - lo que tengas
  lexicon: HALOT
  rationale: La cláusula hebrea es amplia y abierta. «De lo que sea tuyo» conserva la indeterminación y encaja con la relación legal implícita, sin convertirla en una formulación más interpretativa.
- source_word: אָחִיךָ
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  alternatives_spanish:
  - tu compatriota
  - tu hermano de pacto
  - tu correligionario israelita
  lexicon: HALOT
  rationale: Se mantiene la imagen literal de parentesco/covenio. En Deuteronomio suele referirse a un miembro del pueblo del pacto; esa delimitación se explica en la nota, no en el cuerpo principal.
- source_word: תַּשְׁמֵט יָדֶךָ
  english_pob_choice: your hand shall release
  chosen_spanish: tu mano lo soltará
  alternatives_spanish:
  - tu mano se soltará
  - tu mano lo dejará libre
  - remitirás tu derecho
  lexicon: HALOT
  rationale: El hebreo usa un modismo con שׁמט y «mano» que expresa dejar caer o soltar una reclamación. «Tu mano lo soltará» preserva la imagen concreta y sugiere la remisión de la pretensión de cobro; una equivalencia más explicativa sería menos transparente.
theological_decisions:
- issue: Alcance de «tu hermano» en la ley deuteronómica
  english_pob_reading: Retain the literal covenantal term 'your brother' in the main text rather than specifying 'fellow Israelite'.
  chosen_spanish_reading: Conservar «tu hermano» en el texto principal, entendiendo su alcance como miembro del pueblo del pacto.
  alternative_spanish_readings:
  - tu compatriota
  - tu hermano de Israel
  - tu correligionario israelita
  rationale: El pasaje contrapone al extranjero con el hermano dentro de la comunidad del pacto. Mantener la forma literal evita sobreinterpretar en el texto principal y conserva la tensión social/legal del hebreo; la aclaración va en nota.
  doctrine_reference: Translation philosophy §§1, 3, 4, 5
- issue: Sentido jurídico de la remisión al final del versículo
  english_pob_reading: Literally 'your hand shall release'; the idiom means to let go of or remit your claim in the year of release.
  chosen_spanish_reading: «Tu mano lo soltará» como modismo que apunta a soltar la reclamación o derecho de cobro.
  alternative_spanish_readings:
  - remitirás tu derecho
  - dejarás libre tu reclamación
  - cancelarás la deuda
  rationale: El hebreo conserva una imagen corporal concreta; en español, una glosa demasiado abstracta perdería esa transparencia. La frase elegida mantiene la metáfora y deja espacio al sentido legal implícito de remisión.
  doctrine_reference: Translation philosophy §§1, 4
translation_notes:
  revision_awareness: 'La redacción sigue el patrón revisado del audit trail inglés: primero la exigencia de pago al extranjero, y luego la cláusula final reordenada de modo que «de lo que sea tuyo que esté con tu hermano» anteceda a «tu mano lo soltará», preservando el énfasis hebreo y el paralelismo jurídico.'
  spanish_consistency_notes:
  - Se mantiene «extranjero» para נָכְרִי, coherente con el contraste legal del pasaje.
  - Se usa «exigir pago» para נגשׂ, evitando suavizar el matiz de presión de cobro.
  - «Tu hermano» conserva la terminología de pacto sin sustituirla por una paráfrasis interpretativa en el texto principal.
  - «Soltará» reproduce el modismo de שׁמט con imagen concreta, en vez de ocultarlo con una abstracción legal.
  - 'Los corchetes de nota siguen el orden de los marcadores presentes en el texto: a, c, b.'
