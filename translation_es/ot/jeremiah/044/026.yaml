translation:
  language: es
  text: 'Por tanto, oigan la palabra de Yahvé, todo Judá, los que habitan en la tierra de Egipto: He aquí, he jurado por mi gran nombre, dice Yahvé, que mi nombre ya no será invocado[a] por la boca de ningún hombre de Judá en toda la tierra de Egipto, diciendo: «Vive el Señor Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi nombre ya no será llamado por la boca de ningún hombre de Judá»; o bien, «mi nombre ya no estará en los labios de ningún hombre de Judá». El hebreo dice literalmente que el nombre de Dios es «llamado en la boca» de alguien, un modismo que aquí se refiere a invocarlo en un juramento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: HALOT
  rationale: Introduce la conclusión profética con un conector formal y natural en español, manteniendo la relación inferencial del hebreo.
- source_word: שִׁמְעוּ
  english_pob_choice: hear
  chosen_spanish: oíd
  alternatives_spanish:
  - escuchad
  - oigan
  lexicon: HALOT
  rationale: El imperativo plural conserva el tono exhortativo y solemne del anuncio profético.
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la palabra de Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética de 'palabra' y el nombre divino 'Yahvé' según el estándar del proyecto.
- source_word: כָּל יְהוּדָה
  english_pob_choice: all Judah
  chosen_spanish: todo Judá
  alternatives_spanish:
  - toda Judá
  - todos los de Judá
  lexicon: HALOT
  rationale: La colectividad se expresa de forma natural en español como un destinatario corporativo.
- source_word: הַיֹּשְׁבִים בְּאֶרֶץ מִצְרַיִם
  english_pob_choice: who dwell in the land of Egypt
  chosen_spanish: que habitáis en la tierra de Egipto
  alternatives_spanish:
  - que vivís en la tierra de Egipto
  - que residís en la tierra de Egipto
  lexicon: HALOT
  rationale: ‘Habitar’ preserva el sentido de residencia estable y el registro bíblico sin sonar arcaico en exceso.
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mirad
  - ved
  lexicon: HALOT
  rationale: Equivale al marcador solemne de atención que introduce la declaración divina.
- source_word: נִשְׁבַּעְתִּי בִּשְׁמִי הַגָּדוֹל
  english_pob_choice: I have sworn by my great name
  chosen_spanish: he jurado por mi gran nombre
  alternatives_spanish:
  - he jurado por mi nombre grande
  - he hecho juramento por mi gran nombre
  lexicon: HALOT
  rationale: ‘Jurar’ transmite correctamente el acto de solemnizar con juramento; ‘gran nombre’ conserva la carga de honor y autoridad del hebreo.
- source_word: אִם יִהְיֶה עוֹד
  english_pob_choice: shall no longer be
  chosen_spanish: ya no será
  alternatives_spanish:
  - no volverá a ser
  - ya no habrá
  lexicon: HALOT
  rationale: La fuerza idiomática del juramento exige explicitar la negación en español; ‘ya no será’ conserva la contundencia.
- source_word: שְׁמִי נִקְרָא בְּפִי
  english_pob_choice: my name shall no longer be called upon by the mouth of
  chosen_spanish: será invocado mi nombre por la boca de
  alternatives_spanish:
  - será llamado mi nombre por la boca de
  - estará en los labios de
  lexicon: HALOT
  rationale: Se mantiene la metáfora oral del hebreo y el valor cultual/jurídico de invocar el nombre en juramento.
- source_word: כָּל אִישׁ יְהוּדָה
  english_pob_choice: any man of Judah
  chosen_spanish: ningún hombre de Judá
  alternatives_spanish:
  - ninguna persona de Judá
  - ningún judío
  lexicon: HALOT
  rationale: El hebreo distributivo dentro del juramento se vierte como una negación universal en español, manteniendo el matiz masculino singular del original.
- source_word: אֹמֵר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - que diga
  lexicon: HALOT
  rationale: Introduce la fórmula citada de juramento de forma directa y fluida.
- source_word: חַי אֲדֹנָי יְהוִה
  english_pob_choice: As the Lord GOD lives
  chosen_spanish: ¡Vive el Señor Yahvé!
  alternatives_spanish:
  - ¡Vive el Señor, Yahvé!
  - ¡Vive el Señor Dios!
  lexicon: HALOT
  rationale: Se conserva la fórmula juramentaria hebrea con ‘vive’ en español; ‘Señor Yahvé’ refleja el título adonai unido al nombre divino sin ocultarlo.
- source_word: בְּכָל אֶרֶץ מִצְרָיִם
  english_pob_choice: in all the land of Egypt
  chosen_spanish: en toda la tierra de Egipto
  alternatives_spanish:
  - por toda la tierra de Egipto
  - en toda la región de Egipto
  lexicon: HALOT
  rationale: Preserva la totalidad geográfica del hebreo con una expresión natural y reverente en español.
theological_decisions:
- issue: Representación del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El proyecto exige usar ‘Yahvé’ en el texto principal para el nombre pactal divino, manteniendo transparencia textual y evitando el ocultamiento convencional.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Frase juramentaria final חַי אֲדֹנָי יְהוִה
  english_pob_reading: As the Lord GOD lives
  chosen_spanish_reading: ¡Vive el Señor Yahvé!
  alternative_spanish_readings:
  - ¡Vive el Señor Dios!
  - ¡Vive el Señor, Yahvé!
  rationale: La fórmula de juramento debe sonar natural en español sin perder la referencia doble a título y nombre divino. ‘Señor Yahvé’ reproduce la combinación de אֲדֹנָי + יְהוִה con transparencia.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Explicitar la negación idiomática de אִם יִהְיֶה עוֹד
  english_pob_reading: shall no longer be
  chosen_spanish_reading: ya no será
  alternative_spanish_readings:
  - no volverá a ser
  - ya no habrá
  rationale: El hebreo del juramento usa una construcción que en contexto significa negación enfática; el español necesita explicitarla para no oscurecer el sentido.
  doctrine_reference: HALOT / Hebrew oath construction
translation_notes:
  revision_awareness: Se incorporó la revisión auditada del inglés POB que prefirió ‘called upon’ frente a ‘invoked’ para reflejar más directamente el modismo hebreo de ‘mi nombre en la boca de’. En español, la redacción principal mantiene esa imagen con ‘será invocado mi nombre por la boca de’, mientras la nota a ofrece la alternativa más idiomática ‘será invocado por la boca de ningún hombre de Judá’ y explica el modismo.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para יְהוָה conforme al estándar del proyecto.
  - Se preserva ‘tierra de Egipto’ para אֶרֶץ מִצְרַיִם.
  - Se mantiene el registro profético-formal con ‘he aquí’, ‘he jurado’ y la fórmula juramentaria final.
  - La nota [a] explica el modismo hebreo sin sustituirlo en el texto principal.
  - La nota [b] aclara la imagen verbal de ‘la boca’ para sostener la transparencia textual.
