- from: '⟨Vieron⟩ a un samaritano que llevaba un cordero[a] y entraba en Judea. Él dijo a sus discípulos: «¿Ese, alrededor del cordero?». Ellos le dijeron: «Para que lo mate y lo coma». Él les dijo: «Mientras esté vivo, no lo comerá; pero si lo mata y llega a ser un cadáver[b], entonces no podrá hacerlo». Ellos dijeron: «De otro modo no podrá hacerlo». Él les dijo: «Ustedes mismos, busquen para ustedes un lugar de descanso[c], para que no lleguen a ser un cadáver y los coman».'
  to: '⟨Vieron⟩ a un samaritano que llevaba un cordero y entraba en Judea. Él dijo a sus discípulos: «¿Ese, en torno al cordero?[a]». Ellos le dijeron: «Para que lo mate y lo coma». Él les dijo: «Mientras esté vivo, no lo comerá; pero si lo mata y llega a ser un cadáver[b], lo comerá». Ellos dijeron: «De otro modo no podrá hacerlo». Él les dijo: «Ustedes mismos busquen para ustedes un lugar de descanso[c], para que no lleguen a ser un cadáver y los coman[d]».'
  rationale: 'Se corrige un error sustancial de sentido en la cláusula sobre comer el cordero después de matarlo, se mejora levemente la naturalidad de la pregunta elíptica sin perder su rareza, y se añaden las notas que documentan dos decisiones auditadas por la POB inglesa: la elipsis de la pregunta y el plural activo «los coman».'
