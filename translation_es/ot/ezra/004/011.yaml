translation:
  language: es
  text: 'Esta es una copia de la carta que enviaron al rey Artajerjes: «Tus siervos, los hombres de Más Allá del Río[a], y ahora[b]—»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde Más Allá del Río»; la frase es la designación provincial persa que a menudo se traduce como «Trans-Éufrates».
    reason: lexical_alternative
  - marker: b
    text: La expresión aramea al final es una fórmula epistolar formal, tradicionalmente traducida «y en tal tiempo» o entendida como «y así sucesivamente». El texto continúa en el siguiente versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּנָה
  english_pob_choice: This is
  chosen_spanish: Esta es
  alternatives_spanish:
  - Esto es
  - He aquí
  lexicon: HALOT
  rationale: El demostrativo arameo introduce la cita documental. ‘Esta es’ conserva la función presentadora de manera natural en español y es fiel al valor deíctico del original.
- source_word: פַּרְשֶׁגֶן
  english_pob_choice: copy
  chosen_spanish: copia
  alternatives_spanish:
  - transcripción
  - texto
  lexicon: HALOT
  rationale: Designa una reproducción de un documento oficial. ‘Copia’ comunica con claridad el sentido administrativo sin añadir matices no presentes en el arameo.
- source_word: אִגַּרְתָּא
  english_pob_choice: of the letter
  chosen_spanish: de la carta
  alternatives_spanish:
  - del documento
  - de la epístola
  lexicon: HALOT
  rationale: Se trata de una comunicación escrita formal; ‘carta’ es la equivalencia española más natural y fiel en este contexto.
- source_word: שְׁלַחוּ
  english_pob_choice: they sent
  chosen_spanish: enviaron
  alternatives_spanish:
  - mandaron
  - despacharon
  lexicon: HALOT
  rationale: El verbo de envío de un documento se expresa de forma idiomática con ‘enviaron’, sin perder el sentido de transmisión escrita.
- source_word: עֲלוֹהִי / עַל
  english_pob_choice: to him / to
  chosen_spanish: al
  alternatives_spanish:
  - a
  - contra
  lexicon: HALOT
  rationale: En la fórmula epistolar, la preposición introduce al destinatario. ‘Al rey Artajerjes’ refleja el valor direccional; ‘contra’ desplazaría indebidamente el sentido.
- source_word: אַרְתַּחְשַׁשְׂתְּא
  english_pob_choice: Artaxerxes
  chosen_spanish: Artajerjes
  alternatives_spanish:
  - Artajerjes I
  lexicon: HALOT
  rationale: Se sigue la transliteración española estándar del nombre real, conforme a la política del proyecto de transliterar nombres propios.
- source_word: מַלְכָּא
  english_pob_choice: King
  chosen_spanish: rey
  alternatives_spanish:
  - el rey
  lexicon: HALOT
  rationale: El título real va en aposición al nombre propio. En español, ‘rey Artajerjes’ suena natural y conserva la dignidad del cargo.
- source_word: עַבְדָיךְ
  english_pob_choice: Your servants
  chosen_spanish: Tus siervos[a]
  alternatives_spanish:
  - Tus servidores
  - Tus esclavos
  lexicon: HALOT
  rationale: Se mantiene ‘siervos’ por la deferencia cortesana del autoapuntamiento de subordinación ante el rey. ‘Servidores’ suaviza el valor léxico; ‘esclavos’ sería demasiado fuerte para esta fórmula epistolar, aunque sigue siendo una posibilidad semántica general en Arameo.
- source_word: אֱנָשׁ
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - la gente
  lexicon: HALOT
  rationale: El sustantivo masculino colectivo se traduce de manera concordante con su forma léxica. ‘Los hombres’ preserva la correspondencia formal del texto fuente.
- source_word: עֲבַר נַהֲרָה
  english_pob_choice: of Beyond the River
  chosen_spanish: de Más Allá del Río
  alternatives_spanish:
  - de Trans-Eufrates
  - de la región al otro lado del río
  lexicon: HALOT
  rationale: Se conserva la designación administrativa persa de manera literal. ‘Más Allá del Río’ mantiene la forma tradicional fuente-cercana del topónimo sin sustituirla por una glosa interpretativa.
- source_word: וּכְעֶנֶת
  english_pob_choice: and now—
  chosen_spanish: y ahora—
  alternatives_spanish:
  - y en este momento—
  - y así—
  lexicon: HALOT
  rationale: La fórmula epistolar aramea queda abierta porque el versículo corta la carta en este punto. ‘Y ahora—’ reproduce el carácter suspensivo e incompleto del original.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés: se mantuvo la estructura documental introductoria, se preservó la fórmula epistolar incompleta al final del versículo y se evitó normalizar la designación persa de la provincia con una paráfrasis que borrara su valor terminológico. No se introdujeron cambios textuales respecto del sentido del original; solo se adaptó la sintaxis al español natural.'
  spanish_consistency_notes:
  - Se usa ‘Artajerjes’ de modo consistente como transliteración española estándar.
  - Se traduce la designación administrativa עֲבַר נַהֲרָה de manera literal, sin reemplazarla por un equivalente eclesiástico o interpretativo.
  - Se conserva el guion largo final para reflejar la suspensión del original y la continuidad en el siguiente versículo.
  - Se eligió ‘siervos’ como término de deferencia cortesana; no se sustituyó por ‘servidores’ para no borrar la tensión léxica documentada.
