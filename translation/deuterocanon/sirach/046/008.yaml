theological_decisions:
- issue: Use of Greek parallel to complete a shorter/difficult Hebrew witness
  chosen_reading: Main text follows the Hebrew as primary but incorporates the Greek continuation about entering the inheritance and the land flowing with milk and honey.
  alternative_readings:
  - 'Translate only the extant Hebrew: ''Therefore those two also were delivered ... out of six hundred thousand foot soldiers.'''
  rationale: Project philosophy gives Hebrew primacy in Sirach where it survives, but requires actual use of the Greek parallel when present. Here the Hebrew line appears shorter and contains a difficult phrase ('among the years'), while the Greek preserves a fuller sense that fits the context of Joshua and Caleb surviving to bring Israel into the promised land.
  doctrine_reference: 'PHILOSOPHY.md: Sirach translated from Hebrew where it survives, with Greek parallel used alongside it'
