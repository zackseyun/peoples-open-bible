translation:
  language: ko
  text: 바울은 변론하며 말했습니다. 「저는 유대인들의 율법에 대해서나, 성전에 대해서나, 카이사르에 대해서나 아무런 죄도 짓지 않았습니다.」
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καίσαρά
  english_pob_choice: Caesar
  chosen_korean: 카이사르
  alternatives_korean:
  - 가이사
  - 시저
  lexicon: BDAG
  rationale: '본 번역은 현대 외래어 표기법에 따라 「카이사르」를 채택. 한국 성서 전통의 「가이사」는 빌립보서 4:22 처리 등 본 프로젝트 선례에 따라 각주 또는 대안으로만 둔다.'
theological_decisions:
- issue: 'Καίσαρ의 한국어 표기: 현대 「카이사르」 vs. 전통 「가이사」'
  chosen_reading: 카이사르
  alternative_readings:
  - 가이사
  - 시저
  rationale: '글로사리 정책에 따라 모든 사도행전 25-28장에서 일관되게 「카이사르」를 채택. 한국 성서 전통의 「가이사」는 음역의 음운 변화가 큰 옛 형태이며, 외래어 표기법의 현대 형태가 비기독교 한국어 화자에게도 즉시 이해 가능하다. 빌립보서 4:22 처리 선례를 따른다.'
  doctrine_reference: 'KOREAN_PIPELINE.md: 외래어 표기법 우선; PHP 4:22 precedent'
