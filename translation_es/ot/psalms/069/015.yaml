translation:
  language: es
  text: Rescátame del lodo, y no me dejes hundirme[a]. Que yo sea librado de los que me odian y de las profundidades de las aguas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «Permíteme escapar de mis enemigos y de aguas profundas». El hebreo repite la súplica de liberación con paralelismo poético.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצִּילֵנִי
  english_pob_choice: Rescue me
  chosen_spanish: Sácame
  alternatives_spanish:
  - Rescátame
  - Líbrame
  lexicon: HALOT
  rationale: נצל en esta forma expresa una petición de liberación activa. En español, «sácame» comunica con naturalidad la imagen de ser extraído de un peligro, sin perder el forcejeo implícito del verbo.
- source_word: מִטִּיט
  english_pob_choice: from the mire
  chosen_spanish: del lodo
  alternatives_spanish:
  - del fango
  - del barro
  lexicon: HALOT
  rationale: טיט puede abarcar lodo, barro o fango. «Lodo» es claro en español y conserva la idea de una masa viscosa que atrapa, coherente con el verbo siguiente.
- source_word: וְאַל אֶטְבָּעָה
  english_pob_choice: do not let me sink
  chosen_spanish: no me dejes hundirme
  alternatives_spanish:
  - no permitas que me hunda
  - y no me dejes sumergirme
  lexicon: HALOT
  rationale: La forma negativa expresa una súplica volitiva. «No me dejes hundirme» transmite bien la imagen y la fuerza de la petición sin volverla más literal de lo que el español natural requiere.
- source_word: אִנָּצְלָה
  english_pob_choice: Let me be delivered
  chosen_spanish: Líbrame
  alternatives_spanish:
  - déjame ser librado
  - permíteme escapar
  lexicon: HALOT
  rationale: El niphal cohortativo de נצל retoma la petición de auxilio con matiz volitivo. En español, repetir «Líbrame» conserva la paralelismo poético y evita una construcción más pesada.
- source_word: מִשֹּׂנְאַי
  english_pob_choice: from those who hate me
  chosen_spanish: de los que me odian
  alternatives_spanish:
  - de mis enemigos
  - de los que me aborrecen
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «los que me odian». «De los que me odian» preserva la fuerza relacional y evita suavizarla en «enemigos».
- source_word: וּמִמַּעֲמַקֵּי מָיִם
  english_pob_choice: and from the depths of the waters
  chosen_spanish: y de las profundidades de las aguas
  alternatives_spanish:
  - y de las aguas profundas
  - y de los abismos de las aguas
  lexicon: HALOT
  rationale: La construcción conserva el paralelismo poético y la forma hebrea de «profundidades» + «aguas». «Profundidades de las aguas» suena formal y fiel a la estructura del original.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y coincide con la lectura auditada en inglés: dos peticiones paralelas de rescate/libración, sin introducir interpretaciones adicionales. Se conservó la imagen física de hundirse y la duplicación poética de la súplica.'
  spanish_consistency_notes:
  - Se prefirió «lodo» para טיט por claridad y naturalidad, sin perder el matiz de barro viscoso.
  - 'Se mantuvo el paralelismo con dos verbos imperativos/supletivos en español: «Sácame» / «Líbrame».'
  - La nota al pie conserva la alternativa de «mis enemigos» porque el hebreo literalmente dice «los que me odian» y la POB inglesa la documenta como opción.
  - «Profundidades de las aguas» mantiene la estructura constructa del hebreo y evita normalizarla demasiado a «aguas profundas».
