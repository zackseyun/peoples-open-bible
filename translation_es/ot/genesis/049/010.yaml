    text: Or 'until he comes whose right it is'; the Hebrew שילה is difficult and has also been understood as a title, a place name, or a reference to tribute.
    reason: alternative_reading
  - marker: b
    text: Or 'and to him will be the gathering of the peoples,' or 'the submission of the peoples.'
    reason: lexical_alternative
