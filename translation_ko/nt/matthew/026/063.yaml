  yaml_path: translation/nt/matthew/026/063.yaml
  text: 'But Jesus kept silent[a]. And the high priest said to him, “I put you under oath by the living God: tell us if you are the Messiah[b], the Son of God.”'
  footnotes:
  - marker: a
    text: Or “Christ.” The Greek title is Christos, here rendered “Messiah” because it functions as a title rather than a name.
    reason: alternative_reading
  - marker: b
    text: Or “I adjure you by the living God.” The Greek is a solemn oath formula.
    reason: lexical_alternative
