    issue: La transliteración «Guitit» para הַגִּתִּית es poco recomendable.
    rationale: Aunque el término debe transliterarse por su significado incierto, «Guitit» introduce una castellanización no respaldada por el rastro inglés y puede sugerir falsamente una relación con «guitarra» o sonar impropia. «Gitit» preserva mejor la opacidad del hebreo y es más limpia en español.
  - severity: low
