translation:
  language: es
  text: Entonces Moisés descendió al pueblo y les dijo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֵּרֶד
  english_pob_choice: went down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - fue hacia abajo
  lexicon: HALOT
  rationale: El hebreo expresa movimiento descendente desde el monte; en español, 'descendió' conserva con claridad esa dirección. 'Bajó' también sería natural, pero 'descendió' mantiene un tono más sobrio y bíblico sin perder precisión.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: Nombre propio bíblico
  rationale: Nombre propio estándar en español, transparente y reconocible para la lectura eclesial.
- source_word: אֶל הָעָם
  english_pob_choice: to the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo de Israel
  - a la gente
  lexicon: HALOT
  rationale: En este contexto de Sinaí, 'העם' refiere al colectivo de Israel reunido. 'Pueblo' es natural en español y conserva mejor el matiz de comunidad pactal que 'gente'.
- source_word: וַיֹּאמֶר אֲלֵהֶם
  english_pob_choice: said to them
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - les habló diciendo
  lexicon: HALOT
  rationale: El hebreo usa literalmente 'dijo a ellos'. En español, 'les dijo' reproduce con fidelidad el valor verbal sin añadir matices ajenos. Se evita 'habló' porque el texto no enfatiza el acto de hablar en general sino la declaración concreta.
translation_notes:
  revision_awareness: El inglés POB fue revisado desde 'spoke to them' a 'said to them' para ajustarse más de cerca a ויאמר. La presente versión sigue esa misma cercanía léxica con 'les dijo', manteniendo naturalidad en español.
  spanish_consistency_notes:
  - Se conserva 'Moisés' como nombre propio tradicional en español.
  - '''Pueblo'' se usa para העם en sentido colectivo e histórico, no como simple plural genérico.'
  - No se introduce nota textual ni alternativa en nota al pie porque el verso no presenta ambigüedad relevante en el español resultante.
