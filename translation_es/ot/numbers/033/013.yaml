lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Partieron
  alternatives_spanish:
  - Salieron
  - Se pusieron en marcha
  lexicon: HALOT
  rationale: En el contexto de la lista itineraria del desierto, נסע indica salir de un campamento para continuar el recorrido. «Partieron» comunica con naturalidad la acción de salir y avanzar, sin perder el valor de movimiento del hebreo.
- source_word: מִדָּפְקָה
  english_pob_choice: from Dophkah
  chosen_spanish: de Dofca
  alternatives_spanish:
  - de Dophkah
  - desde Dofca
  lexicon: HALOT
  rationale: El prefijo מִן expresa procedencia, por lo que en español se rinde con «de». Se mantiene el nombre propio transliterado de forma cercana al hebreo, con adaptación ortográfica al uso español («Dofca»).
- source_word: וַיַּחֲנוּ
  english_pob_choice: camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - acamparon allí
  - hicieron campamento
  lexicon: HALOT
  rationale: En fórmulas de itinerario, חנה significa establecer campamento. «Acamparon» es claro, natural y conserva el sentido físico de detenerse para pasar la noche o permanecer en el lugar.
- source_word: בְּאָלוּשׁ
  english_pob_choice: at Alush
  chosen_spanish: en Alús
  alternatives_spanish:
  - en Alush
  - a Alús
  lexicon: HALOT
  rationale: La preposición ב marca ubicación, y en español la relación locativa se expresa de manera natural con «en». El nombre propio se translitera como «Alús», con acento gráfico para la pronunciación española.
