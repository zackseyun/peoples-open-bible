base_translation:
  language: en
  yaml_path: translation/deuterocanon/wisdom_of_solomon/001/014.yaml
  text: For he created all things that they might exist[a], and the creatures of the world are wholesome, and in them there is no poison of destruction, nor the dominion of Hades on earth[b];
  footnotes:
  - marker: a
    text: Or 'the creatures/products of the world are wholesome' or 'the origins of the world are beneficial.' The Greek phrase 'the generations of the world' is somewhat broad and may refer to the things brought forth within creation.
    reason: lexical_alternative
  - marker: b
    text: Or 'the kingdom of Hades.' The Greek can denote either a realm or a ruling power.
    reason: lexical_alternative
