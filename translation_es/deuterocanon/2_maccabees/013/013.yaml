translation:
  language: es
  text: Pero él mismo, después de reunirse con los ancianos, decidió, antes de que el ejército del rey invadiera Judea y llegara a dominar la ciudad, salir y resolver[a] el asunto con la ayuda de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «decidir el asunto», «juzgar la situación» o «resolver los asuntos». La frase griega es amplia y puede referirse a la solución de la crisis presente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθʼ ἑαυτόν
  english_pob_choice: himself / privately
  chosen_spanish: él mismo
  alternatives_spanish:
  - por su cuenta
  - en privado
  lexicon: LSJ
  rationale: La expresión indica una acción aparte o en esfera propia, pero en español el contexto inmediato con 'los ancianos' hace innecesario forzar 'en privado'. 'Él mismo' conserva el énfasis sin añadir una idea no explicitada por el griego.
- source_word: σὺν τοῖς πρεσβυτέροις γενόμενος
  english_pob_choice: after meeting with the elders
  chosen_spanish: después de reunirse con los ancianos
  alternatives_spanish:
  - después de entrevistarse con los ancianos
  - habiéndose reunido con los ancianos
  lexicon: LSJ
  rationale: El participio expresa la reunión para deliberación; 'reunirse con los ancianos' es natural y mantiene el valor consultivo señalado por el audit trail inglés.
- source_word: ἐβουλεύσατο
  english_pob_choice: decided
  chosen_spanish: decidió
  alternatives_spanish:
  - tomó consejo
  - resolvió
  - deliberó
  lexicon: BDAG
  rationale: El verbo implica deliberación que culmina en una resolución. 'Decidió' comunica ese resultado de manera clara y concisa en español moderno.
- source_word: πρὶν εἰσβαλεῖν
  english_pob_choice: before ... could invade
  chosen_spanish: antes de que el ejército del rey invadiera Judea
  alternatives_spanish:
  - antes de entrar
  - antes de atacar
  lexicon: LSJ
  rationale: Con sujeto militar y objeto geográfico, el sentido es incursión hostil. 'Invadiera' conserva la fuerza bélica del griego mejor que un simple 'entrara'.
- source_word: τὸ στράτευμα τοῦ βασιλέως
  english_pob_choice: the king’s army
  chosen_spanish: el ejército del rey
  alternatives_spanish:
  - el ejército real
  - la tropa del rey
  lexicon: LSJ
  rationale: Es la equivalencia más directa y natural para el término militar griego.
- source_word: γενέσθαι τῆς πόλεως ἐγκρατεῖς
  english_pob_choice: gain control of the city
  chosen_spanish: llegara a dominar la ciudad
  alternatives_spanish:
  - llegara a ser dueño de la ciudad
  - tomara posesión de la ciudad
  lexicon: LSJ
  rationale: ἐγκρατής expresa dominio o control; 'dominar' comunica esa idea sin sugerir necesariamente propiedad legal. Se mantiene el matiz de poder efectivo sobre la ciudad.
- source_word: ἐξελόντας
  english_pob_choice: to go out
  chosen_spanish: salir
  alternatives_spanish:
  - salir a luchar
  - ir fuera
  lexicon: LSJ
  rationale: La revisión inglesa corrigió el sujeto a singular en la construcción final, pero el verbo sigue siendo una acción de salida. En español, 'salir' reproduce la acción básica sin sobreespecificarla.
- source_word: κρῖναι τὰ πράγματα
  english_pob_choice: decide the matter
  chosen_spanish: resolver el asunto
  alternatives_spanish:
  - decidir el asunto
  - juzgar la situación
  - arreglar la situación
  lexicon: BDAG
  rationale: La frase griega es amplia y puede abarcar la resolución de una crisis. 'Resolver el asunto' preserva esa amplitud y suena natural en español.
- source_word: τῇ τοῦ θεοῦ βοηθείᾳ
  english_pob_choice: with the help of God
  chosen_spanish: con la ayuda de Dios
  alternatives_spanish:
  - con la ayuda de Yahvé
  - por la ayuda de Dios
  lexicon: BDAG
  rationale: La dativa expresa medio o asistencia. Se conserva 'Dios' porque el griego dice θεοῦ y no nombra explícitamente el tetragrámaton en esta frase.
theological_decisions:
- issue: Referencia de la acción final y sujeto implícito
  english_pob_reading: The subject is Judas and his associates/elders, rendered as 'they should go out and decide the matter.'
  chosen_spanish_reading: 'Se deja la acción final en infinitivo singular dependiente de ''decidió'': ''salir y resolver el asunto''.'
  alternative_spanish_readings:
  - salieran y resolvieran el asunto
  - saliera y resolviera el asunto
  rationale: La revisión inglesa señala que el sujeto de la construcción final debe permanecer singular y corresponder al verbo principal. El español adopta la misma sintaxis para no introducir un plural no garantizado por la evidencia griega.
  doctrine_reference: Gramática del participio y del infinitivo en griego koiné; concordancia sintáctica con el sujeto del verbo rector
- issue: Alcance de κρῖναι τὰ πράγματα
  english_pob_reading: '''decide the matter'' or ''settle affairs'' or ''judge the situation'''
  chosen_spanish_reading: '''resolver el asunto'' mantiene el campo semántico amplio sin cerrar la frase a un juicio formal.'
  alternative_spanish_readings:
  - juzgar la situación
  - arreglar los asuntos
  - sentenciar el caso
  rationale: El contexto es una crisis militar-política, no un tribunal formal. 'Resolver el asunto' conserva el tenor deliberativo y práctico que el audit trail inglés resalta.
  doctrine_reference: 2 Macabeos 13:13; uso contextual de κρίνω y πράγματα
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: sustituyó una formulación de ''conferenciar en privado'' por ''reunirse'' para reflejar con más neutralidad καθʼ ἑαυτόν ... γενόμενος, y corrigió el sujeto final al singular. La redacción española sigue esa revisión, evitando un plural no sustentado y manteniendo el valor consultivo de la reunión con los ancianos.'
  spanish_consistency_notes:
  - Se usa 'ancianos' para πρεσβύτεροι, conforme al registro bíblico habitual y al sentido de consejo.
  - Se mantiene 'Dios' para θεοῦ, en coherencia con el texto griego y la terminología POB.
  - Se traduce el orden narrativo con una sola oración fluida, sin introducir interpretaciones adicionales.
