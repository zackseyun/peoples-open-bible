id: JOS.10.13
reference: Joshua 10:13
source:
  edition: WLC
  text: וַ/יִּדֹּ֨ם הַ/שֶּׁ֜מֶשׁ וְ/יָרֵ֣חַ עָמָ֗ד עַד יִקֹּ֥ם גּוֹי֙ אֹֽיְבָ֔י/ו הֲ/לֹא הִ֥יא כְתוּבָ֖ה עַל סֵ֣פֶר הַ/יָּשָׁ֑ר וַ/יַּעֲמֹ֤ד הַ/שֶּׁ֨מֶשׁ֙ בַּ/חֲצִ֣י הַ/שָּׁמַ֔יִם וְ/לֹא אָ֥ץ לָ/ב֖וֹא כְּ/י֥וֹם תָּמִֽים־־־־׃
translation:
  text: So the sun stood still[a], and the moon stopped, until the nation took vengeance on its enemies[d][c][b]. Is this not written in the Book of Jashar? The sun stood still in the middle of the sky and did not hurry to set for about a full day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'until the nation avenged itself on its enemies.' The Hebrew idiom can carry the sense of vindication or vengeance.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''the Book of Jashar''; possibly ''the Book of the Upright.'''
    reason: alternative_reading
  - marker: c
    text: Or, 'did not hurry to go down,' that is, to set.
    reason: lexical_alternative
  - marker: d
    text: Or, 'like a whole day' or 'nearly a whole day.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּדֹּם
  chosen: stood still
  alternatives:
  - was silent
  - stopped
  lexicon: HALOT
  rationale: From דמם, which can denote being still or silent. In parallel with the moon 'stopped' and in this astronomical context, 'stood still' best captures cessation of motion in idiomatic English while preserving the extraordinary event.
- source_word: וְיָרֵחַ עָמָד
  chosen: and the moon stopped
  alternatives:
  - and the moon stood
  - and the moon stood still
  lexicon: HALOT
  rationale: עמד literally means 'stood,' but with a celestial body in context it naturally conveys stopping. Using 'stopped' avoids awkward repetition while matching the sense.
- source_word: עַד יִקֹּם גּוֹי אֹיְבָיו
  chosen: until the nation took vengeance on its enemies
  alternatives:
  - until the nation avenged itself on its enemies
  - until the people took revenge on their enemies
  lexicon: HALOT
  rationale: קום in the Qal can mean 'arise,' but in this idiom with enemies it carries the sense of taking action in vindication or vengeance. 'The nation' reflects גוי straightforwardly; 'its enemies' follows the 3ms suffix as a collective singular.
- source_word: גּוֹי
  chosen: the nation
  alternatives:
  - the people
  lexicon: HALOT
  rationale: גוי commonly means 'nation.' Here it refers to Israel as a corporate entity. 'Nation' preserves the lexical value better than the more generic 'people'.
- source_word: הֲלֹא הִיא כְתוּבָה
  chosen: Is this not written
  alternatives:
  - Is it not written
  - Surely this is written
  lexicon: HALOT
  rationale: The feminine pronoun likely refers to the preceding account or saying. English idiom prefers 'this' rather than a wooden 'it/she' here.
- source_word: סֵפֶר הַיָּשָׁר
  chosen: the Book of Jashar
  alternatives:
  - the Book of the Upright
  - the Book of the Just
  lexicon: HALOT
  rationale: Because this is the title of a source work, transliteration of יָשָׁר as 'Jashar' is preferable to translating the adjective, in keeping with translating titles descriptively only when meaning is clearly intended rather than titular.
- source_word: וַיַּעֲמֹד הַשֶּׁמֶשׁ
  chosen: The sun stopped
  alternatives:
  - The sun stood
  - The sun stood still
  lexicon: HALOT
  rationale: A second statement restates and expands the miracle. 'Stopped' is clear modern English and corresponds to עמד in context.
- source_word: בַּחֲצִי הַשָּׁמַיִם
  chosen: in the middle of the sky
  alternatives:
  - at mid-heaven
  - in the half of the heavens
  lexicon: HALOT
  rationale: Literally 'in the half/middle of the heavens.' 'In the middle of the sky' is natural English and preserves the spatial sense without archaic phrasing.
- source_word: וְלֹא אָץ לָבוֹא
  chosen: and did not hurry to set
  alternatives:
  - and did not hasten to go down
  - and was not quick to come
  lexicon: HALOT
  rationale: 'אוץ means to hurry or hasten; בוא with the sun is an idiom for going/coming toward setting. English idiom requires making the implied destination explicit: ''to set.'''
- source_word: כְּיוֹם תָּמִים
  chosen: for about a full day
  alternatives:
  - like a whole day
  - as on a complete day
  - for nearly a whole day
  lexicon: HALOT
  rationale: The phrase is somewhat idiomatic. 'A full day' captures תמים as complete/whole. 'About' reflects the comparative כ and avoids overstating mathematical precision.
