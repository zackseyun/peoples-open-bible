translation:
  language: es
  text: Toma su prenda, porque ha salido fiador por un extraño[a]; y tómalo como garantía por los extranjeros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Toma una garantía de él por los extranjeros». El hebreo de la cláusula final es conciso y puede enfocarse ya sea en la prenda como garantía, o en tomar garantía de la persona misma.'
    reason: alternative_reading
lexical_decisions:
- source_word: לְקַח
  english_pob_choice: Take
  chosen_spanish: Toma
  alternatives_spanish:
  - Toma para ti
  - Lleva
  lexicon: HALOT
  rationale: El imperativo qal de לקח pide una orden directa. «Toma» es natural en español y conserva el valor exhortativo sin intensificar innecesariamente.
- source_word: בִּגְדוֹ
  english_pob_choice: his garment
  chosen_spanish: su prenda
  alternatives_spanish:
  - su ropa
  - su manto
  lexicon: HALOT
  rationale: בגד puede referirse a una prenda de vestir en general. «Prenda» mantiene la amplitud semántica mejor que un término más específico como «manto».
- source_word: עָרַב
  english_pob_choice: has put up security
  chosen_spanish: ha salido fiador
  alternatives_spanish:
  - ha dado garantía
  - se ha hecho responsable como garante
  lexicon: HALOT
  rationale: El contexto jurídico-económico de ערב es el de garantizar la deuda de otro. «Ha salido fiador» comunica bien esa obligación personal y conserva la tensión legal del término.
- source_word: זָר
  english_pob_choice: for a stranger
  chosen_spanish: por un extraño
  alternatives_spanish:
  - por un forastero
  - por un desconocido
  lexicon: HALOT
  rationale: זָר señala a alguien externo o ajeno. «Extraño» es fiel y claro en español, sin cargarlo con connotaciones más técnicas que el hebreo no exige aquí.
- source_word: וּבְעַד
  english_pob_choice: and ... for
  chosen_spanish: por
  alternatives_spanish:
  - a favor de
  - en nombre de
  lexicon: HALOT
  rationale: La preposición marca representación o responsabilidad por otros. En español, «por» transmite esa relación de manera concisa y permite mantener el paralelismo proverbial.
- source_word: נכרים
  english_pob_choice: foreigners
  chosen_spanish: los extranjeros
  alternatives_spanish:
  - forasteros
  - ajenos
  lexicon: HALOT
  rationale: נכרי suele designar a quienes están fuera del grupo propio. «Los extranjeros» conserva esa distancia social y distingue este término de זָר en la primera mitad del versículo.
- source_word: חַבְלֵהוּ
  english_pob_choice: hold him in pledge
  chosen_spanish: mantenlo en prenda
  alternatives_spanish:
  - tómalo en prenda
  - reténlo como prenda
  lexicon: HALOT
  rationale: El verbo חבל aquí se usa en el ámbito de tomar o retener una prenda/garantía. Dado el sufijo pronominal, «mantenlo» refleja la referencia personal más cercana al texto revisado en inglés, y «en prenda» preserva el trasfondo jurídico del acto.
theological_decisions:
- issue: Referencia a la práctica de la fianza/garantía y su implicación moral
  english_pob_reading: '''Has put up security'' refers to guaranteeing another person''s debt or obligation.'
  chosen_spanish_reading: «Ha salido fiador» se entiende como asumir legalmente la deuda u obligación de otro.
  alternative_spanish_readings:
  - ha dado garantía
  - se ha comprometido por otro
  rationale: No es una afirmación doctrinal sino una precisión ética y legal del proverbio. Conviene explicitar que la acción es hacerse responsable de la obligación ajena, porque eso determina el sentido de la advertencia sapiencial.
  doctrine_reference: Proverbios 6:1-5; 11:15
translation_notes:
  revision_awareness: El texto inglés revisado cambió de «hold it in pledge» a «hold him in pledge» para reflejar con más precisión el sufijo hebreo de חַבְלֵהוּ. En español, esa distinción se conserva con «mantenlo en prenda», que puede referirse al hombre bajo la obligación/retención legal, mientras «su prenda» en la primera cola mantiene abierta la posibilidad de que el objeto retenido sea la vestidura.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no hay tetragrámaton en este versículo.
  - Se mantiene la diferencia entre זָר («un extraño») y נכרים («los extranjeros») para no nivelar dos términos distintos.
  - «En prenda» conserva el marco jurídico de garantía sin sustituirlo por un giro menos preciso como «como garantía».
