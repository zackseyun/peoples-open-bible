  to: Y se acercaron al rey, pidiendo que los dejaran ir a sus propios hogares[a].
  rationale: Se ajusta ἀπόλυσις a una expresión verbal más natural y más precisa en contexto («que los dejaran ir») y se ancla la nota léxica directamente en «sus propios hogares», que es donde surge la alternativa de εἰς τὰ ἴδια. No se requiere adjudicación adicional.
