translation:
  language: es
  text: 'Sin embargo, Yahvé amonestó a Israel y a Judá por medio de todo profeta y todo vidente[a], diciendo: «Vuélvanse de sus malos caminos y guarden mis mandamientos y mis estatutos[c][b], conforme a toda la ley que yo ordené a sus padres y que les envié por medio de mis siervos, los profetas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «testificó contra Israel y Judá». El verbo hebreo puede implicar una advertencia solemne o un testimonio forense.
    reason: lexical_alternative
  - marker: b
    text: «Sus padres» también puede entenderse como «sus antepasados».
    reason: lexical_alternative
  - marker: c
    text: O «por medio de mis siervos, los profetas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּעַד / warned
  english_pob_choice: warned
  chosen_spanish: amonestó
  alternatives_spanish:
  - advirtió
  - testificó contra
  - amonestó solemnemente
  lexicon: HALOT
  rationale: עוּד en esta forma puede expresar advertencia solemne o testimonio contra. «Amonestó» conserva el valor de advertencia seria sin sonar tan jurídico como «testificó contra», y funciona bien en español bíblico actual.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la política del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé» en lugar de sustituirlo por un título.'
- source_word: בְּיִשְׂרָאֵל וּבִיהוּדָה
  english_pob_choice: Israel and Judah
  chosen_spanish: a Israel y a Judá
  alternatives_spanish:
  - contra Israel y Judá
  - para Israel y Judá
  lexicon: HALOT
  rationale: La construcción con ב aquí señala el destinatario del acto de amonestación. En español, «a Israel y a Judá» expresa claramente ese objeto sin forzar «contra».
- source_word: בְּיַד כָּל־נְבִיאוֹ כָּל־חֹזֶה
  english_pob_choice: by every prophet and every seer
  chosen_spanish: por medio de todo profeta y todo vidente
  alternatives_spanish:
  - por medio de cada profeta y cada vidente
  - por la mano de todo profeta y todo vidente
  lexicon: HALOT
  rationale: ביד es un instrumental idiomático; «por medio de» es natural en español. Se conserva la distinción entre «profeta» y «vidente» para no nivelar dos términos proféticos relacionados pero no idénticos.
- source_word: חֹזֶה
  english_pob_choice: seer
  chosen_spanish: vidente
  alternatives_spanish:
  - seer
  - visionario
  lexicon: HALOT
  rationale: «Vidente» es el equivalente español habitual para חֹזֶה en contexto profético y mantiene la idea de alguien que ve visiones.
- source_word: שֻׁבוּ
  english_pob_choice: Turn
  chosen_spanish: Vuélvanse
  alternatives_spanish:
  - Vuelvan
  - Arrepiéntanse
  lexicon: HALOT
  rationale: שׁוּב literalmente es «volver/volverse». En contexto moral con «de sus malos caminos», «Vuélvanse» expresa el giro requerido sin perder el sentido de retorno.
- source_word: מִדַּרְכֵיכֶם הָרָעִים
  english_pob_choice: from your evil ways
  chosen_spanish: de sus malos caminos
  alternatives_spanish:
  - de sus caminos malos
  - de sus caminos perversos
  lexicon: HALOT
  rationale: «Caminos» conserva la metáfora de conducta. «Malos» corresponde directamente a רָעִים y es más sobrio y transparente que una ampliación como «perversos».
- source_word: וְשִׁמְרוּ
  english_pob_choice: and keep
  chosen_spanish: y guarden
  alternatives_spanish:
  - y observen
  - y custodien
  lexicon: HALOT
  rationale: שׁמר en contexto covenantal/legal suele ser «guardar/observar». «Guarden» mantiene la fuerza de obediencia y es idiomático en español bíblico contemporáneo.
- source_word: מִצְוֺתַי חֻקּוֹתַי
  english_pob_choice: my commandments and my statutes
  chosen_spanish: mis mandamientos y mis estatutos
  alternatives_spanish:
  - mis mandatos y mis estatutos
  - mis mandamientos y mis decretos
  lexicon: HALOT
  rationale: 'Se conserva la pareja legal distintiva: מִצְוֺת = «mandamientos» y חֻקּוֹת = «estatutos». La equivalencia tradicional aquí es clara y precisa.'
- source_word: כְּכָל הַתּוֹרָה
  english_pob_choice: according to all the law
  chosen_spanish: conforme a toda la ley
  alternatives_spanish:
  - según toda la ley
  - de acuerdo con toda la instrucción
  lexicon: HALOT
  rationale: תּוֹרָה puede significar instrucción o ley; en este marco de mandamientos y estatutos, «ley» comunica bien el conjunto normativo. «Conforme a» reproduce el valor de acuerdo con.
- source_word: אֲשֶׁר צִוִּיתִי אֶת־אֲבֹתֵיכֶם
  english_pob_choice: that I commanded your fathers
  chosen_spanish: que yo ordené a sus padres
  alternatives_spanish:
  - que yo mandé a sus padres
  - que yo ordené a sus antepasados
  lexicon: HALOT
  rationale: אבות es literalmente «padres» y así se mantiene la referencia histórica-covenantal. «Ordené» refleja bien la fuerza de צִוִּיתִי, y «sus padres» conserva la relación generacional del texto.
- source_word: וַאֲשֶׁר שָׁלַחְתִּי אֲלֵיכֶם בְּיַד עֲבָדַי הַנְּבִיאִים
  english_pob_choice: and that I sent to you by my servants the prophets
  chosen_spanish: y que les envié por medio de mis siervos, los profetas
  alternatives_spanish:
  - y que les envié por medio de mis esclavos, los profetas
  - y que les envié por medio de mis servidores, los profetas
  lexicon: HALOT
  rationale: עבדי aquí funciona con el sentido de agentes al servicio de Dios; «siervos» preserva ese registro reverente en español. «Los profetas» queda en aposición, como en el hebreo.
theological_decisions:
- issue: Valor de וַיָּעַד en el contexto de advertencia profética
  english_pob_reading: warned / testified against
  chosen_spanish_reading: amonestó
  alternative_spanish_readings:
  - advirtió
  - testificó contra
  rationale: El hebreo permite una idea de advertencia solemne o testimonio contra. «Amonestó» mantiene esa seriedad sin cerrar la tensión entre advertencia y testimonio forense, que el texto deja abierta.
  doctrine_reference: 'Translation philosophy: preserve lexical tension rather than over-resolving it'
- issue: Alcance de ‘that I sent to you’
  english_pob_reading: The clause refers to the covenantal instruction/law being sent through the prophets.
  chosen_spanish_reading: que les envié por medio de mis siervos, los profetas
  alternative_spanish_readings:
  - que les envié, por medio de mis siervos los profetas, la instrucción
  - que les envié por medio de los profetas como mensaje
  rationale: La sintaxis permite que el relativo retome la ley/instrucción que Dios mandó a los padres y también enviada a Israel por medio de los profetas. La redacción española conserva esa conexión sin explicitarla en exceso.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it'
- issue: Relación entre ‘profeta’ y ‘vidente’
  english_pob_reading: every prophet and every seer
  chosen_spanish_reading: todo profeta y todo vidente
  alternative_spanish_readings:
  - cada profeta y cada vidente
  - todo profeta y todo visionario
  rationale: Conviene mantener ambos términos distintos, porque el hebreo los yuxtapone para abarcar la mediación profética de modo amplio sin fusionar categorías.
  doctrine_reference: Lexical distinction in historical narrative
- issue: Traducción de יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue el estándar del proyecto para el Nombre divino. Esto mantiene la transparencia frente al texto hebreo y evita la sustitución por un título.
  doctrine_reference: 'Project terminology: יהוה -> Yahvé'
translation_notes:
  revision_awareness: La redacción sigue el ajuste final del audit trail inglés que eliminó «one of his» y conservó «by every prophet and every seer» sin posesivo añadido. El español evita agregar posesivos no explícitos y mantiene la doble designación profética. También conserva la posible ambigüedad sintáctica de la cláusula final sobre lo enviado a los destinatarios.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה conforme al estándar del proyecto.
  - Se mantiene la distinción «profeta / vidente» para נביא / חֹזֶה.
  - Se conserva la pareja legal «mandamientos / estatutos» para מִצְוֺת / חֻקּוֹת.
  - Se usa «siervos» para עֲבָדַי en sentido ministerial y no como «esclavos», por el contexto reverente.
  - La puntuación sigue el estilo bíblico contemporáneo en español con comillas angulares no obligatorias evitadas para mayor legibilidad.
