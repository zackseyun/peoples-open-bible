translation:
  language: es
  text: De David[a]. Te daré gracias con todo mi corazón; delante de los dioses te cantaré alabanzas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «delante de los seres celestiales» o «delante de los ángeles». La palabra hebrea puede referirse, según el contexto, a dioses, a Dios o a seres celestiales.
    reason: alternative_reading
lexical_decisions:
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Para David
  - Por David
  lexicon: HALOT
  rationale: El ל del superscrito puede expresar pertenencia, asociación o dedicación. «De David» conserva esa ambigüedad en español y funciona de modo natural como encabezado de salmo.
- source_word: אוֹדְךָ
  english_pob_choice: I will give thanks to you
  chosen_spanish: Te daré gracias
  alternatives_spanish:
  - Te alabaré
  - Te confesaré
  lexicon: HALOT
  rationale: El verbo ידה en esta forma puede abarcar agradecer, alabar o confesar. En este contexto de adoración, «te daré gracias» mantiene el matiz de agradecimiento dirigido a Dios sin reducir indebidamente la amplitud del verbo.
- source_word: בְּכָל לִבִּי
  english_pob_choice: with my whole heart
  chosen_spanish: con todo mi corazón
  alternatives_spanish:
  - con mi corazón entero
  - con todo el corazón
  lexicon: HALOT
  rationale: La frase hebrea expresa integridad y devoción sin reservas. «Con todo mi corazón» es la equivalencia española más natural y fiel.
- source_word: נֶגֶד
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: נגד indica estar enfrente o en presencia de. «Delante de» conserva el registro poético y la idea espacial/relacional del original.
- source_word: אֱלֹהִים
  english_pob_choice: the gods
  chosen_spanish: los dioses
  alternatives_spanish:
  - seres celestiales
  - ángeles
  - Dios
  lexicon: HALOT
  rationale: La forma hebrea es plural y, en este contexto, el sentido directo es plural. «Los dioses» preserva la tensión textual y la fuerza retórica del versículo; las alternativas interpretativas quedan registradas en nota.
- source_word: אֲזַמְּרֶךָּ
  english_pob_choice: I will sing praises to you
  chosen_spanish: cantaré alabanzas a ti
  alternatives_spanish:
  - te cantaré alabanzas
  - te cantaré
  - haré música para ti
  lexicon: HALOT
  rationale: זמר en piel puede significar cantar alabanzas o hacer música. «Cantaré alabanzas a ti» mantiene ambos valores; el orden final «a ti» refleja explícitamente el sufijo pronominal y la dirección del acto de alabanza.
theological_decisions:
- issue: Referente de אֱלֹהִים en «delante de los dioses»
  english_pob_reading: the gods, with footnoted alternatives for heavenly beings/angels
  chosen_spanish_reading: los dioses, con nota de alternativas interpretativas
  alternative_spanish_readings:
  - seres celestiales
  - ángeles
  - Dios
  rationale: Se preserva el plural morfológico del hebreo y no se resuelve de antemano la ambigüedad teológica. En español, «los dioses» mantiene la lectura más directa; la nota recoge las opciones secundarias que el hebreo puede permitir en otros contextos.
  doctrine_reference: Primacía del hebreo original y preservación de tensión teológica/textual sin armonización prematura.
translation_notes:
  revision_awareness: El texto sigue de cerca la decisión auditada del POB inglés para mantener el superscrito de David, la gratitud dirigida a Dios, la totalidad del corazón y la ambigüedad de אֱלֹהִים sin resolverla artificialmente.
  spanish_consistency_notes:
  - Se mantiene un registro poético y bíblico sin arcaísmos innecesarios.
  - Se conserva la distinción entre traducción principal y nota alternativa para la ambigüedad de אֱלֹהִים.
  - «A ti» se mantiene al final para reflejar el objeto pronominal enfático del hebreo y la cadencia poética del versículo.
