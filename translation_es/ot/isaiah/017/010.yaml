    reason: cultural_note
  revision_rationale: Se reubicaron las notas al pie para que correspondan a las palabras hebreas correctas, se añadió la nota cultural omitida del expediente inglés, y se ajustó la frase final a un español más natural para la imagen de plantar una vid. También se suavizó «plantíos deleitosos» a «plantas deleitosas» para mejorar la legibilidad sin perder el sentido.
