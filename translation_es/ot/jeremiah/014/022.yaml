translation:
  language: es
  text: ¿Hay entre los ídolos de las naciones que hagan llover[a]? ¿O pueden los cielos dar lluvias[b]? ¿No eres tú, Yahvé, nuestro Dios? Y esperamos en ti[c], porque tú has hecho todas estas cosas[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «las vanidades de las naciones»; es decir, los ídolos o dioses inútiles de las naciones.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «dar aguaceros» / «dar lluvias abundantes». El hebreo alude a lluvias o aguaceros.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «ponemos nuestra esperanza en ti». El verbo hebreo puede expresar espera confiada con esperanza.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «has hecho todo esto». El hebreo también puede entenderse como una referencia más directa a «todo esto».'
    reason: alternative_reading
lexical_decisions:
- source_word: הֲיֵשׁ
  english_pob_choice: Are there any
  chosen_spanish: ¿Hay entre... quienes... ?
  alternatives_spanish:
  - ¿Hay alguno?
  - ¿Existen acaso?
  lexicon: HALOT
  rationale: La pregunta es retórica y busca existencia/capacidad. En español, «¿Hay entre... quienes...?» suena natural y mantiene la fuerza interrogativa sin perder el sentido plural del contexto.
- source_word: הַבְלֵי הַגּוֹיִם
  english_pob_choice: the idols of the nations
  chosen_spanish: los ídolos de las naciones
  alternatives_spanish:
  - las vanidades de las naciones
  - las cosas inútiles de las naciones
  lexicon: HALOT
  rationale: הֶבֶל puede significar vapor/vanidad y, por extensión, falsos dioses. En este contexto profético, el referente son ídolos; «ídolos» explicita el sentido sin sobretraducción.
- source_word: מַגְשִׁמִים
  english_pob_choice: that bring rain
  chosen_spanish: quienes hagan llover
  alternatives_spanish:
  - que traigan lluvia
  - que causen lluvia
  lexicon: HALOT
  rationale: El verbo causativo expresa producir lluvia. «Hagan llover» conserva la acción causal en un español idiomático y directo.
- source_word: וְאִם
  english_pob_choice: Or
  chosen_spanish: ¿O
  alternatives_spanish:
  - Y si
  - o si
  lexicon: HALOT
  rationale: Introduce la segunda rama de una alternativa retórica; en español, «¿O» reproduce bien el paralelismo sin añadir una condición ajena al hebreo.
- source_word: הַשָּׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos
  lexicon: HALOT
  rationale: El plural hebreo suele referirse al ámbito celeste. «Los cielos» mantiene el registro elevado y el paralelismo poético.
- source_word: יִתְּנוּ רְבִבִים
  english_pob_choice: give showers
  chosen_spanish: dar lluvias
  alternatives_spanish:
  - dar chaparrones
  - dar aguaceros
  lexicon: HALOT
  rationale: רְבִבִים son lluvias o chaparrones. «Dar lluvias» refleja la construcción verbal de נתן con un sustantivo natural en español, sin forzar un tecnicismo.
- source_word: הֲלֹא אַתָּה הוּא
  english_pob_choice: Is it not you
  chosen_spanish: ¿No eres tú
  alternatives_spanish:
  - ¿Acaso no eres tú
  - ¿No eres tú mismo
  lexicon: HALOT
  rationale: La construcción enfática identifica a Yahvé como la única fuente real de la lluvia. «¿No eres tú» preserva la fuerza retórica de la pregunta.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: «Yahvé», preservando el nombre divino en vez de sustituirlo por un título.'
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - Dios nuestro
  lexicon: HALOT
  rationale: Construcción posesiva directa y transparente; «nuestro Dios» es la forma natural en español.
- source_word: וּנְקַוֶּה לָּךְ
  english_pob_choice: And we wait for you
  chosen_spanish: Y esperamos en ti
  alternatives_spanish:
  - Y aguardamos en ti
  - Y ponemos nuestra esperanza en ti
  lexicon: HALOT
  rationale: קוה expresa esperar con esperanza expectante. «Esperamos en ti» conserva la espera confiada; «en ti» explicita la dependencia implícita en el verbo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: 'Introduce la razón de la espera/confianza: la acción creadora y soberana de Yahvé. «Porque» transmite claramente esa causalidad.'
- source_word: עָשִׂיתָ אֶת כָּל אֵלֶּה
  english_pob_choice: you have made all these things
  chosen_spanish: tú has hecho todas estas cosas
  alternatives_spanish:
  - tú has hecho todo esto
  - tú has hecho todas estas
  lexicon: HALOT
  rationale: עשה puede significar hacer o hacer/crear. «Has hecho» preserva la amplitud semántica sin imponer una lectura más específica que el texto no exige.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: Se mantiene la política del proyecto de transliterar el nombre personal de Dios en lugar de ocultarlo con un sustituto litúrgico. «Yahvé» es la forma habitual de POB en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de וּנְקַוֶּה לָּךְ
  english_pob_reading: And we wait for you / Or 'And we hope in you'
  chosen_spanish_reading: Y esperamos en ti
  alternative_spanish_readings:
  - Y aguardamos en ti
  - Y ponemos nuestra esperanza en ti
  rationale: El verbo admite la gama esperar/esperanza. En esta súplica por lluvia, «esperamos en ti» conserva la dependencia confiada sin perder la dimensión de expectativa que el contexto demanda.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
- issue: Sentido de עָשִׂיתָ אֶת כָּל אֵלֶּה
  english_pob_reading: you have made all these things
  chosen_spanish_reading: tú has hecho todas estas cosas
  alternative_spanish_readings:
  - tú has hecho todo esto
  - tú has hecho todas estas
  rationale: La cláusula fundamenta la confianza en la soberanía de Yahvé sobre los fenómenos mencionados. «Has hecho» deja abierta la relación entre hacer y crear, como en el inglés auditado.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'La redacción sigue el último ajuste del audit trail inglés: se refleja la coordinación simple de וּ en «Y esperamos» en vez de introducir un matiz causal tipo «por eso». También se conserva la ambigüedad legítima de קוה con una nota alternativa, y la posible lectura de «todo esto» en vez de «todas estas cosas».'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה, conforme al estándar del proyecto.
  - Se usa «Dios» para אֱלֹהים y «los cielos» para הַשָּׁמַיִם en registro poético.
  - «Esperamos en ti» mantiene el sentido de confianza/expectativa sin reemplazarlo por una paráfrasis doctrinal.
  - 'No se suaviza la polémica contra los ídolos: se conserva «ídolos de las naciones» como equivalente interpretativo de הֶבֶל en este contexto.'
