translation:
  language: es
  text: A ti clamaron y fueron librados[a]; en ti confiaron y no fueron avergonzados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Fueron librados» también puede entenderse como «escaparon» o «fueron rescatados». El hebreo admite el matiz de escape o de liberación; aquí se elige el sentido de rescate divino en respuesta al clamor.
    reason: lexical_alternative
  - marker: b
    text: «No fueron avergonzados» también puede expresarse como «no fueron puestos en vergüenza» o «no fueron defraudados». El hebreo suele incluir la idea de no resultar deshonrados ni decepcionados en la confianza puesta en Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶיךָ
  english_pob_choice: To you
  chosen_spanish: A ti
  alternatives_spanish:
  - A usted
  - Hacia ti
  lexicon: HALOT
  rationale: אֶל con sufijo de segunda persona expresa dirección hacia la persona invocada. En español, «a ti» es natural, directo y conserva el movimiento de la súplica hacia Dios.
- source_word: זָעֲקוּ
  english_pob_choice: they cried out
  chosen_spanish: clamaron
  alternatives_spanish:
  - gritaron
  - alzaron su clamor
  lexicon: HALOT
  rationale: זעק denota un clamor intenso de auxilio. «Clamaron» mantiene esa fuerza de petición urgente mejor que «gritaron», que puede sonar más físico que orante.
- source_word: וְנִמְלָטוּ
  english_pob_choice: and were delivered
  chosen_spanish: y fueron librados
  alternatives_spanish:
  - y escaparon
  - y fueron rescatados
  lexicon: HALOT
  rationale: El nifal de מלט puede significar escapar o ser librado. Aquí, por el contexto de clamor a Dios y la respuesta implícita, «fueron librados» comunica rescate divino sin reducirlo a una mera auto-evitación.
- source_word: בְּךָ
  english_pob_choice: in you
  chosen_spanish: en ti
  alternatives_spanish:
  - sobre ti
  - en tu ayuda
  lexicon: HALOT
  rationale: Con בטח, ב marca el objeto de confianza. «En ti» es la equivalencia española más natural y conserva la relación de dependencia y reposo en Dios.
- source_word: בָטְחוּ
  english_pob_choice: they trusted
  chosen_spanish: confiaron
  alternatives_spanish:
  - pusieron su confianza
  - se apoyaron
  lexicon: HALOT
  rationale: בטח significa confiar o apoyarse en. «Confiaron» es conciso, bíblicamente claro y suficientemente cercano al verbo hebreo.
- source_word: וְלֹא בֹשׁוּ
  english_pob_choice: and were not put to shame
  chosen_spanish: y no fueron avergonzados
  alternatives_spanish:
  - y no quedaron avergonzados
  - y no fueron defraudados
  lexicon: HALOT
  rationale: בוש en este contexto puede llevar la idea de quedar avergonzado, deshonrado o frustrado. «No fueron avergonzados» preserva bien el campo de honor-vergüenza y la pasividad/resultatividad del hebreo.
theological_decisions:
- issue: Sentido de נִמְלָטוּ en una respuesta a Dios
  english_pob_reading: divine deliverance in response to prayer
  chosen_spanish_reading: liberación por intervención de Dios en respuesta al clamor
  alternative_spanish_readings:
  - simple escape
  - rescate
  rationale: El verso une clamor y resultado; por eso «fueron librados» conserva la idea de salvación recibida, no solo de escape humano. Mantiene la lógica teológica del salmo sin añadir elementos ajenos al texto.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor honor-vergüenza de בֹשׁוּ
  english_pob_reading: not put to shame
  chosen_spanish_reading: no fueron avergonzados
  alternative_spanish_readings:
  - no quedaron avergonzados
  - no fueron defraudados
  rationale: La expresión hebrea no describe solo un sentimiento interior, sino quedar públicamente deshonrado o frustrado en la confianza depositada en Yahvé. «No fueron avergonzados» mantiene ese peso conceptual.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'El pasaje muestra alto acuerdo en el análisis y no requiere revisiones sustantivas; se mantiene la línea del informe auditado: clamor, liberación y confianza no frustrada.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como término estándar del proyecto cuando el contexto lo requiera; en este versículo no aparece explícitamente en la forma hebrea dada, por lo que no se introduce en el texto.
  - «A ti» / «en ti» siguen la sintaxis natural del español y mantienen la relación direccional y de confianza del hebreo.
  - La elección de «clamaron» y «fueron librados» evita suavizar el tono intenso del verso y conserva su paralelismo.
  - Se usa «avergonzados» para preservar el campo honor-vergüenza del hebreo בוש, sin reemplazarlo por una paráfrasis psicológica.
