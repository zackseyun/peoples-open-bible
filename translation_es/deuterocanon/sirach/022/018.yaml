  to: Estacas colocadas en un lugar alto, frente al viento, nunca resistirán[a]; así, un corazón tímido, apoyado en un pensamiento necio, nunca resistirá[b] ante cualquier temor.
  rationale: Se conserva casi todo el borrador, pero se corrige la ubicación de la nota [b] para que comente la negación enfática donde corresponde, y se suaviza «ante ningún temor» a «ante cualquier temor» para reflejar mejor el sentido distributivo de παντὸς φόβου en español natural.
