translation:
  language: es
  text: De buen grado, por causa de Dios[a], se nos mutilan los miembros del cuerpo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por Dios»; la expresión griega puede entenderse como motivo o causa del sufrimiento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡδέως
  english_pob_choice: gladly
  chosen_spanish: con gusto
  alternatives_spanish:
  - gustosamente
  - alegremente
  - de buen grado
  lexicon: LSJ
  rationale: El adverbio expresa aceptación voluntaria y disposición positiva. «Con gusto» conserva ese matiz natural en español sin sonar frívolo en un contexto de martirio.
- source_word: ὑπὲρ τοῦ θεοῦ
  english_pob_choice: for the sake of God
  chosen_spanish: por causa de Dios
  alternatives_spanish:
  - por Dios
  - por causa de Yahvé
  - en favor de Dios
  lexicon: LSJ
  rationale: ὑπέρ con genitivo puede expresar causa o motivo. «Por causa de Dios» comunica bien la idea de sufrimiento asumido por lealtad a Dios, sin introducir una formulación doctrinal ajena. Se evita «SEÑOR» porque el griego aquí dice θεοῦ, no κύριος.
- source_word: τὰ τοῦ σώματος μέλη
  english_pob_choice: the limbs of our body
  chosen_spanish: los miembros de nuestro cuerpo
  alternatives_spanish:
  - las extremidades de nuestro cuerpo
  - los miembros del cuerpo
  - nuestros miembros corporales
  lexicon: LSJ
  rationale: μέλη significa «miembros» o «limbos» del cuerpo; en español, «miembros de nuestro cuerpo» mantiene la referencia corporal amplia y suena más natural que «limbos». Se conserva el posesivo implícito del texto griego mediante «nuestro cuerpo».
- source_word: ἀκρωτηριαζόμεθα
  english_pob_choice: have ... mutilated
  chosen_spanish: nos mutilan
  alternatives_spanish:
  - somos mutilados
  - nos amputan
  - nos cercenan
  lexicon: LSJ
  rationale: El verbo denota mutilación o amputación. «Nos mutilan» refleja la pasiva griega de manera idiomática en español y preserva la violencia concreta del término. «Amputan» sería demasiado técnico y «cercenan» podría sonar más literario que el griego.
theological_decisions:
- issue: Martirio sufrido por fidelidad a Dios
  english_pob_reading: for the sake of God
  chosen_spanish_reading: por causa de Dios
  alternative_spanish_readings:
  - por Dios
  - en favor de Dios
  rationale: 'La frase expresa el motivo del sufrimiento: lealtad y entrega a Dios. «Por causa de Dios» mantiene ese sentido de causa o finalidad sin sugerir representación vicaria ni atonimiento.'
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El texto griego es breve y de alta concordancia con el control de la fuente. Se conservó la fuerza martirial del verbo ἀκρωτηριαζόμεθα y la relación causal de ὑπέρ sin suavizar el sufrimiento ni desplazar el foco hacia formulaciones eclesiásticas posteriores.
  spanish_consistency_notes:
  - Se mantiene «Dios» porque el texto griego usa θεοῦ.
  - Se evita «Cristo» o «SEÑOR» porque no aparecen en el versículo.
  - «Mutilan» conserva la crudeza del pasivo griego y el contexto de desmembramiento.
  - La nota a ofrece una alternativa breve y fuente-apta sin duplicar el sentido principal.
