translation:
  language: es
  text: Envíala desde los santos cielos[a], y desde el trono de tu gloria envíala; para que, estando conmigo, trabaje conmigo[b], y yo conozca lo que te es agradable[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde los cielos santos». El griego dice literalmente «desde los santos cielos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se afane conmigo» / «labore conmigo». El griego presenta a Sabiduría como una figura personificada femenina que comparte la labor del hablante.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «lo que es agradable a ti» / «lo que es aceptable ante ti».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξαπόστειλον
  english_pob_choice: Send ... out
  chosen_spanish: Envíala
  alternatives_spanish:
  - Envíala afuera
  - Envía fuera de allí
  lexicon: LSJ
  rationale: El compuesto griego añade la idea de envío desde un lugar. En español, el prefijo verbal no siempre suena natural; el clítico 'la' conserva el objeto personal femenino de Sabiduría y el contexto de procedencia se expresa con 'desde'.
- source_word: ἐξ ἁγίων οὐρανῶν
  english_pob_choice: from the holy heavens
  chosen_spanish: desde los cielos santos
  alternatives_spanish:
  - desde los santos cielos
  - desde el cielo santo
  lexicon: LSJ
  rationale: Se mantiene el plural 'cielos' para reflejar οὐρανῶν. 'Santos' traduce ἁγίων de forma directa, y 'desde' comunica con claridad el movimiento de procedencia.
- source_word: ἀπὸ θρόνου δόξης σου
  english_pob_choice: from the throne of your glory
  chosen_spanish: desde el trono de tu gloria
  alternatives_spanish:
  - desde tu trono glorioso
  - desde el trono glorioso tuyo
  lexicon: LSJ
  rationale: La estructura posesiva se conserva sin convertirla en adjetivo interpretativo. 'Trono de tu gloria' sigue de cerca el genitivo griego y mantiene el tono elevado de la oración.
- source_word: πέμψον
  english_pob_choice: send
  chosen_spanish: envíala
  alternatives_spanish:
  - mándala
  - despáchala
  lexicon: LSJ
  rationale: Se evita duplicar mecánicamente 'envía' en dos imperativos consecutivos; en español, la repetición se vuelve más natural con una primera orden explícita y una segunda repetida por énfasis, pero aquí se conserva el sentido general de petición de envío.
- source_word: ἵνα συνπαροῦσά μοι κοπιάσῃ
  english_pob_choice: so that, being present with me, she may labor with me
  chosen_spanish: para que, estando conmigo, trabaje conmigo
  alternatives_spanish:
  - para que, estando conmigo, se afane conmigo
  - para que, presente conmigo, labore conmigo
  lexicon: LSJ
  rationale: El participio expresa presencia compartida; 'estando conmigo' reproduce esa relación sin añadir dirección o guía que el griego no explicita. 'Trabaje conmigo' conserva el matiz de cooperación activa, aunque 'se afane' también es posible para reforzar el tono de esfuerzo.
- source_word: γνῶ
  english_pob_choice: I may know
  chosen_spanish: yo conozca
  alternatives_spanish:
  - yo sepa
  - llegue yo a conocer
  lexicon: LSJ
  rationale: El subjuntivo final se expresa con 'conozca', que en español comunica bien el propósito de adquirir conocimiento. Se antepone 'yo' para mantener el sujeto explícito de la primera persona sin cargar la línea.
- source_word: τί εὐάρεστόν ἐστιν παρὰ σοί
  english_pob_choice: what is pleasing to you
  chosen_spanish: lo que te es agradable
  alternatives_spanish:
  - lo que te agrada
  - lo que es aceptable ante ti
  lexicon: LSJ
  rationale: '''Te es agradable'' conserva el valor predicativo de εὐάρεστόν ἐστιν y reproduce de forma natural la relación con παρὰ σοί. ''Lo que te agrada'' sería más fluido, pero algo menos transparente respecto de la estructura griega.'
theological_decisions:
- issue: Personificación femenina de Sabiduría
  english_pob_reading: Retain feminine pronouns ('her,' 'she') for Wisdom
  chosen_spanish_reading: Conservar el femenino ('la', 'estando conmigo', 'trabaje conmigo') para Sabiduría
  alternative_spanish_readings:
  - usar 'la Sabiduría' en cada referencia para evitar pronombres
  - neutralizar con 'ello' o forma impersonal
  rationale: El griego presenta a Sabiduría como figura personificada femenina; el español puede reproducirlo con pronombres y concordancias femeninas sin resolver la tensión literaria. Esto preserva el retrato teológico-literario del texto.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y la primacía del original; no aplanar la personificación'
- issue: Relación de procedencia divina y trono glorioso
  english_pob_reading: from the throne of your glory
  chosen_spanish_reading: desde el trono de tu gloria
  alternative_spanish_readings:
  - desde tu trono glorioso
  - desde el trono glorioso
  rationale: La traducción mantiene la imagen de procedencia celestial y la majestad del trono sin sustituirla por una formulación más interpretativa. Así se respeta la fuerza reverencial del pasaje.
  doctrine_reference: 'DOCTRINE.md: conservar imágenes y estructuras cuando sean teológicamente relevantes'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión final del inglés POB que ajustó 'before you' a 'to you' para reflejar mejor παρὰ σοί. Por eso el español usa 'te es agradable' / 'lo que te es agradable', evitando una preposición espacial artificial. También se conserva la preferencia del audit trail por un estilo optimally equivalent y por mantener la personificación femenina de Sabiduría.
  spanish_consistency_notes:
  - Se mantiene 'Sabiduría' implícita mediante femenino gramatical, coherente con el original griego y con el audit trail en inglés.
  - Se conserva el plural 'cielos' para reflejar οὐρανῶν.
  - '''Trono de tu gloria'' sigue la estructura nominal del griego sin convertirla en una paráfrasis adjetival.'
  - '''Te es agradable'' preserva la relación semántica de παρὰ σοί sin forzar un calco de ''ante ti''.'
