review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: exclusión de acercarse a Yahvé para función sacerdotal, exclusión de acercarse a las cosas santas, y carga de vergüenza y abominaciones por acciones pasadas. También preserva correctamente la lectura contextual de קָדְשֵׁי הַקְּדָשִׁים como referencia a ''las cosas santísimas'' con nota alternativa al ''Lugar Santísimo''.'
  spanish_quality_summary: 'La redacción es mayormente clara, pero tiene dos problemas de naturalidad y precisión: 1) ''ejercer el sacerdocio para mí'' suena algo forzado en español bíblico natural; ''servir como sacerdotes para mí'' o ''ministrar como sacerdotes para mí'' comunica mejor el valor verbal de לְכַהֵן לִי. 2) La secuencia ''ni se acercarán a ninguna de mis cosas santas, a las cosas santísimas'' resulta torpe por la repetición de ''a''; el inglés auditado ya corrigió ese mismo problema. Además, ''cosas santas'' es aceptable, pero ''cosas sagradas'' suena más idiomático en español general sin perder el referente cultual.'
  glossary_alignment: No hay conflicto con la terminología troncal del proyecto. No aparece Yahvé ni otros términos sensibles del glosario principal. La elección 'abominaciones' está bien alineada con la fuerza profética de תועבות. La nota alternativa sobre 'Lugar Santísimo' está bien documentada y correctamente anclada.
  issues:
  - severity: medium
    issue: '''para ejercer el sacerdocio para mí'' es poco idiomático'
    rationale: Aunque semánticamente posible, suena pesado y menos natural que una formulación verbal sacerdotal más directa en español. לְכַהֵן expresa funcionar/servir como sacerdote, no tanto el concepto abstracto 'ejercer el sacerdocio'.
  - severity: medium
    issue: Repetición torpe de la preposición en 'a ninguna de mis cosas santas, a las cosas santísimas'
    rationale: 'El hebreo encadena el complemento de modo más fluido, y el rastro inglés auditado ya eliminó la repetición análoga. En español conviene suavizarlo a una aposición: ''ninguna de mis cosas sagradas, las cosas santísimas''.'
  - severity: low
    issue: '''cosas santas'' suena menos natural que ''cosas sagradas'' en español eclesial amplio'
    rationale: '''Cosas santas'' no es incorrecto, pero ''cosas sagradas'' suele leerse con más naturalidad para objetos o elementos consagrados, manteniendo la distinción de ''santísimas'' para el superlativo técnico siguiente.'
  revised_spanish_text: No se acercarán a mí para servir como sacerdotes para mí[a], ni para acercarse a ninguna de mis cosas sagradas, las cosas santísimas; sino que cargarán con su vergüenza y con las abominaciones que han cometido.
