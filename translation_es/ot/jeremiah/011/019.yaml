translation:
  language: es
  text: 'Pero yo era como un cordero manso[a] llevado al matadero, y no sabía que habían tramado planes contra mí: «Destruyamos el árbol con su alimento[b], y cortémoslo de entre los vivientes, para que su nombre no sea recordado más».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como un cordero domesticado», o «como un cordero familiarizado con la gente»; el adjetivo hebreo es difícil.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo oscuro: «el árbol con su pan/alimento». Muchos entienden la idea como destrucción total del árbol junto con lo que produce o sostiene.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּכֶבֶשׂ אַלּוּף
  english_pob_choice: like a gentle lamb
  chosen_spanish: como un cordero manso[a]
  alternatives_spanish:
  - como un cordero domesticado
  - como un cordero acostumbrado a la gente
  - como un cordero dócil
  lexicon: HALOT
  rationale: כֶּבֶשׂ es «cordero». אַלּוּף es difícil; puede sugerir domesticado, habituado o dócil. «Manso» comunica bien la vulnerabilidad y la falta de sospecha en español, y se deja abierta la alternativa léxica en la nota.
- source_word: יוּבַל לִטְבוֹחַ
  english_pob_choice: led to the slaughter
  chosen_spanish: llevado al matadero
  alternatives_spanish:
  - llevado al sacrificio
  - conducido al matadero
  - traído para ser sacrificado
  lexicon: HALOT
  rationale: La forma pasiva/causal expresa que el cordero es conducido a la muerte. «Al matadero» es natural en español y conserva la imagen de sacrificio o degüello.
- source_word: וְלֹא יָדַעְתִּי
  english_pob_choice: and I did not know
  chosen_spanish: y no sabía
  alternatives_spanish:
  - y no lo sabía
  - y yo no sabía
  - y no había sabido
  lexicon: HALOT
  rationale: Es una rendición directa del perfecto en primera persona. En español, el imperfecto «no sabía» mantiene bien la continuidad narrativa y la ignorancia no reconocida.
- source_word: חָשְׁבוּ מַחֲשָׁבוֹת
  english_pob_choice: they had devised plans
  chosen_spanish: habían tramado planes
  alternatives_spanish:
  - habían planeado planes
  - habían ideado planes
  - habían maquinado
  lexicon: HALOT
  rationale: El verbo-nombre cognado expresa deliberación hostil. «Tramar» conserva la idea de conspiración sin sonar forzado como «pensar pensamientos».
- source_word: נַשְׁחִיתָה
  english_pob_choice: Let us destroy
  chosen_spanish: Destruyamos
  alternatives_spanish:
  - Arruinemos
  - Corrompamos
  lexicon: HALOT
  rationale: El cohortativo plural introduce la voz de los conspiradores. «Destruyamos» es natural y fuerte en el contexto de muerte violenta.
- source_word: עֵץ בְּלַחְמוֹ
  english_pob_choice: the tree with its food
  chosen_spanish: el árbol con su alimento
  alternatives_spanish:
  - el árbol con su pan
  - el árbol con su comida
  - el árbol con su fruto
  lexicon: HALOT
  rationale: El hebreo es oscuro; לֶחֶם significa literalmente «pan», pero aquí puede funcionar como «alimento» o lo que sostiene al árbol. «Alimento» evita expandir el sentido a «fruto» sin base segura, y mantiene la ambigüedad del texto.
- source_word: וְנִכְרְתֶנּוּ
  english_pob_choice: and let us cut him off
  chosen_spanish: y cortémoslo
  alternatives_spanish:
  - y cortémosle
  - y destruyámoslo
  - y arranquémoslo
  lexicon: HALOT
  rationale: De כרת, «cortar». En español el objeto directo queda implícito por el contexto; el sujeto sigue siendo el blanco humano del complot, no solo el árbol como objeto botánico.
- source_word: מֵאֶרֶץ חַיִּים
  english_pob_choice: from the land of the living
  chosen_spanish: de la tierra de los vivientes
  alternatives_spanish:
  - de la tierra de los vivos
  - de la tierra de vida
  lexicon: HALOT
  rationale: Es un modismo hebreo para el ámbito de los vivos. «Vivientes» suena bíblico y conserva con claridad el valor idiomático.
- source_word: וּשְׁמוֹ לֹא יִזָּכֵר עוֹד
  english_pob_choice: so that his name will be remembered no more
  chosen_spanish: para que su nombre no sea recordado más
  alternatives_spanish:
  - para que su nombre no vuelva a recordarse
  - y que su nombre no sea recordado nunca más
  lexicon: HALOT
  rationale: El niphal de זכר puede ser «ser recordado» o «ser mencionado». «No sea recordado más» comunica la intención de borrar su memoria pública.
theological_decisions:
- issue: Violent metaphor and possible typological reading
  english_pob_reading: Translate the imagery as a plot against Jeremiah's life without allegorizing it messianically in the main text.
  chosen_spanish_reading: Traducir la imagen como un complot contra la vida de Jeremías, sin convertirla en una alusión mesiánica en el texto principal.
  alternative_spanish_readings:
  - Leer el versículo primariamente como profecía tipológica de la pasión de Cristo
  - Explicitar una lectura cristológica en la traducción
  rationale: El contexto inmediato es el testimonio de Jeremías acerca de un intento de asesinato. La traducción debe respetar esa referencia histórica y literaria sin añadir una capa teológica que el hebreo no exige.
  doctrine_reference: Primacía del texto original; conservar la tensión teológica sin resolverla en la traducción.
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión del audit trail, que corrigió «fruit» por «food» para reflejar más de cerca el hebreo לֶחֶם («pan/alimento»), evitando una expansión interpretativa. La versión española mantiene esa cautela con «alimento» y conserva el resto del sentido del texto revisado.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» implícito solo cuando no aparece en este versículo; no se introdujo ningún sustituto divino innecesario.
  - Se prefirió «cordero» y «matadero» por claridad bíblica y correspondencia semántica.
  - «Vivientes» se usó como equivalente idiomático estable de ארץ חיים.
  - Los corchetes de nota aparecen exactamente en el texto donde se anclan las decisiones léxicas.
