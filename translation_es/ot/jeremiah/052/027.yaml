translation:
  language: es
  text: Y el rey de Babilonia los hirió y les dio muerte en Ribla, en la tierra de Hamat. Así, Judá fue llevado al destierro de su tierra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּכֶּה
  english_pob_choice: struck them down
  chosen_spanish: los hirió de muerte
  alternatives_spanish:
  - los golpeó
  - los hirió
  - los derribó
  lexicon: HALOT
  rationale: El verbo puede expresar un golpe violento, pero aquí va seguido de 'y los hizo morir'; por eso el español debe reflejar una acción letal sin duplicar de manera mecánica el segundo verbo. 'Los hirió de muerte' conserva la violencia y la secuencia narrativa.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: the king of Babylon
  chosen_spanish: el rey de Babilonia
  alternatives_spanish:
  - el rey babilonio
  - el rey de Babilonia
  lexicon: HALOT
  rationale: La construcción genitiva se vierte de forma natural en español con 'de Babilonia', manteniendo claridad y fidelidad al hebreo.
- source_word: וַיְמִתֵם
  english_pob_choice: put them to death
  chosen_spanish: los hizo morir
  alternatives_spanish:
  - los mató
  - los ejecutó
  - los hizo ejecutar
  lexicon: HALOT
  rationale: El causativo de מות conserva mejor su fuerza con una expresión causativa en español. 'Los hizo morir' evita añadir una formalidad legal que el hebreo no explicita, aunque 'los mató' sería una opción más breve.
- source_word: בְּרִבְלָה
  english_pob_choice: at Riblah
  chosen_spanish: en Ribla
  alternatives_spanish:
  - en Riblah
  - en la Ribla
  lexicon: HALOT
  rationale: Para topónimos, el español bíblico natural usa 'en' con el nombre propio. 'Ribla' sigue la forma tradicional del topónimo en español.
- source_word: בְּאֶרֶץ חֲמָת
  english_pob_choice: in the land of Hamath
  chosen_spanish: en la tierra de Hamat
  alternatives_spanish:
  - en el país de Hamat
  - en el territorio de Hamat
  lexicon: HALOT
  rationale: '''Tierra de Hamat'' preserva el giro geográfico bíblico sin sobreinterpretarlo como entidad política moderna.'
- source_word: וַיִּגֶל
  english_pob_choice: was taken into exile
  chosen_spanish: fue llevada al destierro
  alternatives_spanish:
  - fue exiliada
  - fue deportada
  - salió al destierro
  lexicon: HALOT
  rationale: El verbo גלה en este contexto describe deportación/exilio forzado. 'Fue llevada al destierro' expresa bien el carácter pasivo e impuesto del traslado, con un español claro y reverente.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - la nación de Judá
  - el pueblo de Judá
  lexicon: HALOT
  rationale: El nombre propio se conserva como sujeto metonímico, tal como en el hebreo, sin expandirlo innecesariamente.
- source_word: מֵעַל אַדְמָתוֹ
  english_pob_choice: from its land
  chosen_spanish: lejos de su tierra
  alternatives_spanish:
  - de sobre su tierra
  - de su tierra
  - fuera de su tierra
  lexicon: HALOT
  rationale: La locución hebrea literalmente dice 'de sobre su tierra', con una imagen espacial que en español suena forzada. 'Lejos de su tierra' comunica el resultado del destierro con fidelidad funcional, aunque pierde el matiz preposicional literal; por eso se consigna como decisión lexical sensible al estilo español.
theological_decisions:
- issue: Valor del sujeto colectivo 'Judá' con sufijo masculino singular en אַדְמָתוֹ
  english_pob_reading: its land
  chosen_spanish_reading: su tierra
  alternative_spanish_readings:
  - la tierra de Judá
  - su tierra
  rationale: El hebreo usa un sufijo masculino singular concordando con el nombre propio Judá. En español, 'su tierra' respeta el referente colectivo sin forzar un posesivo marcado por género que el idioma no necesita explicitar aquí. La alternativa 'la tierra de Judá' sería más explícita pero menos cercana a la forma hebrea.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
translation_notes:
  revision_awareness: La redacción sigue el mismo contenido del último estado inglés, pero reexpresa con mayor naturalidad el cierre del versículo ('fue llevada al destierro lejos de su tierra') para evitar un calco espacial duro sobre 'from upon his land'. No se introducen elementos interpretativos ajenos al texto ni se atenúan la violencia ni el sentido de deportación.
  spanish_consistency_notes:
  - Se mantiene 'Babilonia' y no 'Babilón' para armonía con el uso bíblico estándar en español.
  - Se usa 'Judá' como sujeto metonímico, preservando la brevedad del hebreo.
  - No se introduce 'SEÑOR' ni equivalente, ya que este versículo no contiene el nombre divino.
  - '''Destierro'' se prefiere aquí por su tono bíblico y por expresar el exilio forzado sin tecnicismos modernos.'
