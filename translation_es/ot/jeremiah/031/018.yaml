base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/031/018.yaml
  text: 'I have surely heard Ephraim bemoaning himself: ‘You disciplined me[a], and I was disciplined, like an untrained calf. Turn me back, and I will return[b], for you are Yahweh my God.’'
  footnotes:
