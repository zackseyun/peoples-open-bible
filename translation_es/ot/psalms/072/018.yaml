revisions:
- from: ¡Bendito sea Yahvé Dios,[a] el Dios de Israel, que solo[b] hace cosas maravillosas!
  to: Bendito sea Yahvé Dios,[a] el Dios de Israel, que solo hace maravillas.
  rationale: Se elimina la exclamación añadida, se sustituye «cosas maravillosas» por «maravillas» para una correspondencia más directa y más idiomática, y se consolida la documentación alternativa en una sola nota, como en el rastro auditado en inglés.
