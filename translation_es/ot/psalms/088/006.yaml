  text: בַּ/מֵּתִ֗ים חָ֫פְשִׁ֥י כְּמ֤וֹ חֲלָלִ֨ים שֹׁ֥כְבֵי קֶ֗בֶר אֲשֶׁ֤ר לֹ֣א זְכַרְתָּ֣/ם ע֑וֹד וְ֝/הֵ֗מָּה מִ/יָּדְ/ךָ֥ נִגְזָֽרוּ׀׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/088/006.yaml
  text: I am set free among the dead[a], like the slain who lie in the grave, whom you remember no more[c][b], and they are cut off from your hand.
  footnotes:
  - marker: a
    text: 'Or ''free among the dead.'' The Hebrew uses the language of being free or released, likely ironically: the psalmist is as good as dead, removed from the sphere of the living.'
    reason: lexical_alternative
  - marker: b
    text: '''Remember'' here likely means more than mental recollection; it carries the sense of attending to or acting for someone.'
    reason: lexical_alternative
  - marker: c
    text: Or 'severed from your hand.' 'Hand' is a Hebrew image for power, control, or care.
    reason: lexical_alternative
