translation:
  language: es
  text: Corrige a tu hijo, y te dará descanso; dará delicias[a] a tu alma[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cosas agradables» o «gozos» para «delicias». El término hebreo puede referirse a cosas placenteras o deleitosas.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «a tu alma»; la expresión también puede significar «a tu vida» o «a tu ser interior».
    reason: lexical_alternative
lexical_decisions:
- source_word: יַסֵּר
  english_pob_choice: Discipline
  chosen_spanish: Corrige
  alternatives_spanish:
  - Disciplina
  - Educa con corrección
  - Castiga
  lexicon: HALOT
  rationale: El piel imperativo de יסר implica corrección formativa y disciplinaria. En español, 'corrige' comunica bien la acción correctiva de manera natural y digna, sin el matiz duro de 'castiga' ni la formalidad menos idiomática de 'disciplina' como imperativo.
- source_word: בִּנְךָ
  english_pob_choice: your son
  chosen_spanish: tu hijo
  alternatives_spanish:
  - tu hijo varón
  - tu hijo(a)
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'tu hijo', masculino singular. En español, 'hijo' es la forma natural y fiel; 'hijo varón' sería redundante y más explícito de lo que exige el hebreo.
- source_word: וִינִיחֶךָ
  english_pob_choice: he will give you rest
  chosen_spanish: te dará descanso
  alternatives_spanish:
  - te dará reposo
  - te aliviará
  - te dará alivio
  lexicon: HALOT
  rationale: La forma causativa expresa que el hijo, al ser corregido, hará que el padre descanse o esté tranquilo. 'Te dará descanso' preserva la idea causal y suena idiomática en español contemporáneo.
- source_word: וְיִתֵּן
  english_pob_choice: he will give
  chosen_spanish: dará
  alternatives_spanish:
  - te dará
  - y dará
  - te traerá
  lexicon: HALOT
  rationale: נתן mantiene su sentido básico de 'dar'. Se conserva el paralelismo poético con una forma breve y directa en español.
- source_word: מַעֲדַנִּים
  english_pob_choice: delights
  chosen_spanish: delicias
  alternatives_spanish:
  - cosas agradables
  - deleites
  - placeres
  lexicon: HALOT
  rationale: El término hebreo puede referirse a cosas agradables, delicadas o deleitosas. 'Delicias' transmite bien el valor poético y agradable del sustantivo sin volverse demasiado interpretativo.
- source_word: לְנַפְשֶׁךָ
  english_pob_choice: to your soul
  chosen_spanish: a tu alma
  alternatives_spanish:
  - a tu vida
  - a tu ser interior
  - a tu propia vida
  lexicon: HALOT
  rationale: נפש puede significar alma, vida o ser interior. 'Alma' conserva la profundidad antropológica y es perfectamente comprensible en español bíblico contemporáneo.
translation_notes:
  revision_awareness: 'El texto coincide con el sentido del hebreo y con el auditoría inglesa: imperative corrective action toward ''your son,'' followed by causal rest and inward delight. No se detectan revisiones aplicadas en el expediente inglés, y la concordancia general es alta.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo verbal con dos futuros simples en la segunda mitad del versículo.
  - Se conservó el registro sapiencial breve y proverbial.
  - '''Alma'' se usa para נֶפֶשׁ siguiendo el uso bíblico amplio, sin reducirlo a una mera emoción.'
  - Las notas alternativas preservan la tensión lexical de מַעֲדַנִּים y נֶפֶשׁ sin expandir indebidamente el verso.
