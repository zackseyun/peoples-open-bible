translation:
  language: ko
  text: 그분의 영광스러운 은혜를 찬송하게 하려 하심이며, 이 은혜는 그분이 사랑하시는 자[a] 안에서 우리에게 베푸신 것입니다.
  philosophy: optimal-equivalence
  footnotes:
