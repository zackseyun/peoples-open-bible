id: 2TH.2.3
reference: 2 Thessalonians 2:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: μή τις ὑμᾶς ἐξαπατήσῃ κατὰ μηδένα τρόπον· ὅτι ἐὰν μὴ ἔλθῃ ἡ ἀποστασία πρῶτον καὶ ἀποκαλυφθῇ ὁ ἄνθρωπος τῆς ⸀ἀνομίας, ὁ υἱὸς τῆς ἀπωλείας,
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/002/003.yaml
  text: Let no one deceive you in any way[a], because that day will not come unless the rebellion comes first and the man of lawlessness is revealed[b], the son of destruction.
translation:
  language: ko
  text: 누구도 어떤 방식으로든 여러분을 속이지 못하게 하십시오. 왜냐하면 먼저 배교[a]가 일어나고 멸망의 아들인 불법의 사람[b]이 나타나기 전에는 그날이 오지 않을 것이기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「반역」. 헬라어 ἀποστασία는 결정적 반역을 뜻하며, 종교적 배교로 자주 이해된다.
    reason: alternative_reading
  - marker: b
    text: 일부 사본은 「죄의 사람」으로 읽는다(τῆς ἁμαρτίας). SBLGNT는 「불법의 사람」(τῆς ἀνομίας)으로 읽는다.
    reason: textual_variant
lexical_decisions:
- source_word: ἐξαπατήσῃ
  english_pob_choice: deceive
  chosen_korean: 속이지
  alternatives_korean:
  - 미혹하지
  - 기만하지
  lexicon: BDAG
  rationale: 「속이다」가 가장 자연스럽고 직접적인 한국어 표현이다.
- source_word: κατὰ μηδένα τρόπον
  english_pob_choice: in any way
  chosen_korean: 어떤 방식으로든
  alternatives_korean:
  - 어떠한 수단으로도
  - 그 어떤 방법으로도
  lexicon: BDAG
  rationale: 전적 금지를 강조하는 한국어 표현.
- source_word: ἀποστασία
  english_pob_choice: the rebellion
  chosen_korean: 배교
  alternatives_korean:
  - 반역
  - 떨어져 나감
  lexicon: BDAG
  rationale: KOREAN_PIPELINE 글로서리에 따라 「배교」를 우선 채택한다. 한국 교회사적·신학적 정착어이며 결정적 「떨어져 나감」의 의미를 잘 담는다. 「반역」(정치·일반적 의미)은 각주.
- source_word: ἀποκαλυφθῇ
  english_pob_choice: is revealed
  chosen_korean: 나타나기
  alternatives_korean:
  - 드러나기
  - 계시되기
  lexicon: BDAG
  rationale: 종말론적 등장의 어조를 「나타나기」로 자연스럽게 옮긴다.
- source_word: ὁ ἄνθρωπος τῆς ἀνομίας
  english_pob_choice: the man of lawlessness
  chosen_korean: 불법의 사람
  alternatives_korean:
  - 무법의 사람
  - 죄의 사람
  lexicon: BDAG
  rationale: KOREAN_PIPELINE 글로서리 + 사용자 지시에 따라 「불법의 사람」으로 옮긴다. ἀνομία는 「불법」으로 정착된 한국어 신학 어휘이다.
- source_word: ὁ υἱὸς τῆς ἀπωλείας
  english_pob_choice: the son of destruction
  chosen_korean: 멸망의 아들
  alternatives_korean:
  - 멸망에 처할 자
  - 파멸의 아들
  lexicon: BDAG
  rationale: 셈어식 표현을 본문 형식대로 보존한다. 「멸망의 아들」은 한국 성경 전통의 표현이며 본문의 무게를 잘 담는다.
- source_word: ἐὰν μὴ ἔλθῃ
  english_pob_choice: will not come unless ... comes
  chosen_korean: ~기 전에는 그날이 오지 않을 것이기
  alternatives_korean:
  - ~지 않고서는 그날이 임하지 않을 것이기
  lexicon: BDAG
  rationale: 헬라어의 생략된 주어(앞 2절의 「주의 날」)를 「그날」로 보충하여 한국어 흐름을 자연스럽게 한다.
theological_decisions:
- issue: ἀποστασία의 한국어 번역
  chosen_reading: 배교
  alternative_readings:
  - 반역
  - 떨어져 나감
  rationale: 한국 신학 전통에서 「배교」는 결정적인 신앙 이탈의 의미로 정착되어 본문의 종말론적 무게를 잘 담는다. KOREAN_PIPELINE 글로서리의 명시적 권고를 따른다. 다른 해석은 각주로 보존.
  doctrine_reference: 'KOREAN_PIPELINE Glossary: ἀποστασία → 배교'
- issue: ὁ ἄνθρωπος τῆς ἀνομίας의 번역
  chosen_reading: 불법의 사람
  alternative_readings:
  - 무법의 사람
  - 죄의 사람(사본 변형)
  rationale: KOREAN_PIPELINE 글로서리에 따라 「불법의 사람」으로 옮긴다. ἀνομία는 단순 「무질서」가 아니라 신적 율법에 대한 반대를 가리키는 어휘이므로 「불법」이 그 무게를 가장 잘 담는다. 사본 변형 「죄의 사람」은 각주.
  doctrine_reference: 'KOREAN_PIPELINE Glossary: ἀνομία → 불법; ὁ ἄνθρωπος τῆς ἀνομίας → 불법의 사람'
- issue: SBLGNT 사본 선택
  chosen_reading: τῆς ἀνομίας (불법의)
  alternative_readings:
  - τῆς ἁμαρτίας (죄의)
  rationale: 본 번역은 SBLGNT를 따른다. 「죄의 사람」 사본 전통은 각주로 보존.
  doctrine_reference: 'Source-grounded fidelity to SBLGNT'
