translation:
  language: es
  text: Si un hombre seduce a una virgen que no está desposada[a], y se acuesta con ella, deberá pagar sin falta el precio de la novia[b] para que ella sea su esposa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que no está prometida en matrimonio». El hebreo se refiere a una mujer no formalmente comprometida en matrimonio.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «deberá pagar el precio matrimonial por ella». El hebreo alude al mohar, el pago asociado con el matrimonio; en este contexto, «precio de la novia» es más preciso que «dote».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְפַתֶּה
  english_pob_choice: seduces
  chosen_spanish: seduce
  alternatives_spanish:
  - atrae
  - persuade
  lexicon: HALOT
  rationale: El piel de פתה aquí indica persuadir o atraer en un contexto sexual. «Seduce» expresa bien esa fuerza sin añadir coerción que el texto no menciona.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - alguien
  lexicon: HALOT
  rationale: El hebreo es masculino singular y nombra a un varón adulto; «un hombre» conserva esa precisión.
- source_word: בְּתוּלָה
  english_pob_choice: a virgin
  chosen_spanish: una virgen
  alternatives_spanish:
  - una joven
  lexicon: HALOT
  rationale: En este contexto legal, בְּתוּלָה señala el estado sexual/matrimonial, por lo que «virgen» preserva la referencia relevante.
- source_word: אֲשֶׁר לֹא אֹרָשָׂה
  english_pob_choice: who is not betrothed
  chosen_spanish: que no está desposada
  alternatives_spanish:
  - que no está comprometida
  - que no está prometida en matrimonio
  lexicon: HALOT
  rationale: La forma pasiva indica que no ha entrado en un compromiso matrimonial formal. «Desposada» es el equivalente más cercano y digno en español para el sentido de betrothal.
- source_word: וְשָׁכַב עִמָּהּ
  english_pob_choice: and lies with her
  chosen_spanish: y se acuesta con ella
  alternatives_spanish:
  - y yace con ella
  - y tiene relaciones sexuales con ella
  lexicon: HALOT
  rationale: La expresión hebrea es un eufemismo estándar para el acto sexual. «Se acuesta con ella» mantiene la sobriedad del hebreo sin volverlo técnico en exceso.
- source_word: מָהֹר יִמְהָרֶנָּה
  english_pob_choice: he must surely pay the bride-price
  chosen_spanish: deberá pagar sin falta el precio de la novia
  alternatives_spanish:
  - deberá pagar el precio matrimonial
  - deberá pagar el mohar
  lexicon: HALOT
  rationale: La construcción intensiva exige una obligación reforzada; por eso «deberá pagar sin falta». «Precio de la novia» refleja mejor mohar que «dote», que en español suele ser lo que aporta la novia o su familia.
- source_word: לּוֹ לְאִשָּׁה
  english_pob_choice: for her to be his wife
  chosen_spanish: para que ella sea su esposa
  alternatives_spanish:
  - para que le sea esposa
  - como su esposa
  lexicon: HALOT
  rationale: La frase expresa el resultado jurídico del pago. «Para que ella sea su esposa» suena natural en español y conserva la relación legal del hebreo.
theological_decisions:
- issue: Naturaleza del acto sexual descrito por פתה
  english_pob_reading: consensual seduction rather than forcible rape
  chosen_spanish_reading: seducción consensual y no violación forzada
  alternative_spanish_readings:
  - violación
  - rapto sexual
  rationale: La elección léxica «seduce» sigue el valor del piel de פתה y evita introducir coerción no expresada en este versículo. Se conserva así la distinción con otras leyes sobre agresión sexual forzada.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolving it'
- issue: Sentido legal de אֹרָשָׂה
  english_pob_reading: who is not betrothed
  chosen_spanish_reading: que no está desposada
  alternative_spanish_readings:
  - que no está comprometida
  - que no está prometida en matrimonio
  rationale: El texto habla de una situación jurídica formal, no de una mera relación informal. «Desposada» preserva esa especificidad sin recurrir a un tecnicismo opaco.
  doctrine_reference: Lexical precision in covenant/marital law
- issue: Naturaleza del pago מָהֹר
  english_pob_reading: bride-price rather than dowry
  chosen_spanish_reading: precio de la novia y no dote
  alternative_spanish_readings:
  - dote
  - precio matrimonial
  rationale: «Dote» en español suele referirse a bienes aportados por la novia o su familia, lo cual invierte el movimiento económico del hebreo. «Precio de la novia» mantiene la dirección del pago y su función matrimonial.
  doctrine_reference: Lexical distinction between mohar and dowry
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió «engaged» por «betrothed» para ajustarse mejor al hebreo. En español se reflejó esa decisión con «desposada», que expresa un compromiso matrimonial formal y evita la ambigüedad de «comprometida».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el pasaje lo requiera; en este versículo no aparece el nombre divino.
  - Se conserva «virgen» para בְּתוּלָה por su peso legal, no «joven», porque el contexto regula estado sexual/matrimonial.
  - «Precio de la novia» se usa con sentido técnico; no se reemplaza por «dote» para no invertir la dirección del pago.
  - El tono legal se mantiene con «deberá pagar sin falta», que reproduce la intensidad del hebreo sin añadir dramatización.
