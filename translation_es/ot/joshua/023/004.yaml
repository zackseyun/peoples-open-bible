review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: llamado de atención, reparto territorial como herencia, naciones restantes, y extensión desde el Jordán hasta el Mar Grande hacia el occidente. Sin embargo, no preserva adecuadamente el imperativo plural רְאוּ, y «he exterminado» intensifica innecesariamente הִכְרַתִּי frente al matiz más literal y teológicamente documentado de «he eliminado/cortado».'
  spanish_quality_summary: El español es claro y legible, pero «Mira» rompe la concordancia con el plural del original y suena menos natural en un discurso dirigido al pueblo. «Miren» o «Vean» funciona mejor. El resto fluye bien; «estas naciones que quedan» y «como herencia para sus tribus» son naturales. «Hacia donde se pone el sol» es comprensible, aunque conviene mantener la nota ya presente para explicitar «occidente».
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé/Mesías. En decisiones léxicas clave, conviene alinear mejor con el rastro POB: רְאוּ → «Miren»; הִפַּלְתִּי → «he repartido» es aceptable; הִכְרַתִּי debería evitar «exterminado» y preferir «he eliminado» o «he extirpado» para conservar mejor el valor de «cut off».'
  issues:
  - severity: medium
    issue: «Mira» traduce un imperativo plural como singular.
    rationale: רְאוּ es 2mp. En español público y fiel al discurso de Josué al colectivo, «Miren» o «Vean» preserva mejor la concordancia y el tono exhortativo.
  - severity: medium
    issue: «he exterminado» sobretraduce הִכְרַתִּי.
    rationale: El inglés auditado eligió «cut off» precisamente para mantener el hebraísmo y el tono de juicio sin forzar una intensificación. «Exterminado» añade una carga más fuerte que no es necesaria; «he eliminado» comunica mejor el sentido contextual.
  - severity: low
    issue: La nota [a] está bien anclada, pero el anclaje en «Mira[a]» no corresponde al sintagma explicado.
    rationale: La nota explica «hacia donde se pone el sol», por lo que el marcador debe ir en esa frase, no en el imperativo inicial.
  revised_spanish_text: Miren, yo les he repartido estas naciones que quedan como herencia para sus tribus, desde el Jordán, junto con todas las naciones que he eliminado, hasta el Mar Grande, hacia donde se pone el sol[a].
  revised_footnotes:
