translation:
  language: es
  text: Porque se les apareció un caballo con un jinete temible, adornado con una hermosísima gualdrapa[a]; y, lanzándose con furia, golpeó[b] a Heliodoro con sus cascos delanteros; y el que iba montado en él parecía llevar una armadura de oro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «adornado con arreos espléndidos»; el término griego se refiere al adorno o equipo ornamental del caballo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «sacudió» o «golpeó» a Heliodoro con sus cascos delanteros. El verbo puede sugerir un embate violento.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὤφθη
  english_pob_choice: appeared
  chosen_spanish: se les apareció
  alternatives_spanish:
  - fue visto por ellos
  - se hizo visible para ellos
  lexicon: LSJ
  rationale: 'El aoristo pasivo aquí funciona en sentido intransitivo: algo llegó a ser visible para ellos. «Se les apareció» conserva el carácter repentino de la manifestación y suena natural en español.'
- source_word: τις ἵππος
  english_pob_choice: a horse
  chosen_spanish: un caballo
  alternatives_spanish:
  - un cierto caballo
  lexicon: LSJ
  rationale: τις es indefinido, no enfatiza particularidad. En español, «un caballo» reproduce bien esa indefinición narrativa.
- source_word: φοβερὸν ἔχων τὸν ἐπιβάτην
  english_pob_choice: with a fearsome rider
  chosen_spanish: con un jinete terrible
  alternatives_spanish:
  - con un jinete temible
  - con un jinete espantoso
  lexicon: LSJ
  rationale: El participio describe al caballo por el carácter de su ocupante. «Terrible» mantiene el valor de φοβερός como algo que inspira temor, sin suavizarlo excesivamente.
- source_word: καλλίστῃ σαγῇ διακεκοσμημένος
  english_pob_choice: adorned with a most beautiful saddlecloth
  chosen_spanish: adornado con el más hermoso manto
  alternatives_spanish:
  - adornado con un muy hermoso caparazón
  - adornado con espléndidos arreos
  lexicon: LSJ
  rationale: El término σαγή se refiere a un adorno/trapaje del caballo; el auditable inglés corrigió «harness» a «saddlecloth». En español, «manto» ofrece una cobertura natural y digna para el equipo ornamental del caballo sin perder el sentido de adorno visible.
- source_word: φερόμενος δὲ ῥύδην
  english_pob_choice: rushing headlong
  chosen_spanish: lanzándose con furia
  alternatives_spanish:
  - avanzando a todo correr
  - embistiendo con ímpetu
  lexicon: LSJ
  rationale: La frase expresa movimiento rápido y violento. «Lanzándose con furia» conserva la fuerza dinámica y el tono narrativo.
- source_word: ἔσεισεν
  english_pob_choice: struck
  chosen_spanish: golpeó
  alternatives_spanish:
  - sacudió
  - azotó
  lexicon: LSJ
  rationale: Aunque σείω significa literalmente «sacudir», en este contexto con los cascos como instrumento implica un golpe violento. «Golpeó» comunica mejor el efecto narrativo en español.
- source_word: τὰς ἐμπροσθίους ὁπλάς
  english_pob_choice: its front hoofs
  chosen_spanish: sus cascos delanteros
  alternatives_spanish:
  - sus pezuñas delanteras
  - sus cascos de adelante
  lexicon: LSJ
  rationale: ὁπλή es «casco/pezuña»; «cascos delanteros» es claro, concreto y fiel a la imagen corporal.
- source_word: ὁ δὲ ἐπικαθήμενος
  english_pob_choice: the one seated on it
  chosen_spanish: el que iba montado en él
  alternatives_spanish:
  - el que estaba sentado sobre él
  - el jinete
  lexicon: LSJ
  rationale: El participio articular designa al ocupante del caballo. «El que iba montado en él» sigue de cerca la construcción sin imponer una simplificación innecesaria.
- source_word: χρυσῆν πανοπλίαν
  english_pob_choice: golden armor
  chosen_spanish: una armadura de oro
  alternatives_spanish:
  - una panoplia de oro
  - una armadura dorada
  lexicon: LSJ
  rationale: πανοπλία es armadura completa. «Armadura de oro» mantiene el sentido material más directo que «dorada», y reproduce la imagen extraordinaria del texto.
theological_decisions:
- issue: Naturaleza de la aparición del caballo y el jinete
  english_pob_reading: Render the description straightforwardly as a visible horse and rider without softening it into metaphor or vision-language beyond what the Greek states.
  chosen_spanish_reading: Traducir la escena como una aparición visible de un caballo y su jinete, sin introducir por cuenta propia lenguaje de visión, símbolo o metáfora.
  alternative_spanish_readings:
  - una visión de un caballo y un jinete
  - una representación simbólica del caballo y el jinete
  rationale: El griego narra la escena con términos concretos de aparición y acción. La traducción debe preservar esa fuerza narrativa y dejar abierta la cuestión interpretativa sobre la naturaleza exacta del evento.
  doctrine_reference: Preservar la tensión teológica sin resolverla
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que cambió «harness» por «saddlecloth» para mayor precisión léxica de σαγή. La versión española refleja esa corrección con «manto» y conserva el valor ornamental del pasaje. También se respetó la observación auditada de que ἔσεισεν puede implicar un golpe violento más que una simple sacudida.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - «Jinete» se usa para ἐπιβάτης con naturalidad narrativa; no se sustituye por «rider» o un calco extraño.
  - «Armadura de oro» conserva la imagen extraordinaria sin atenuarla a «dorada».
  - Se conserva un tono bíblico claro y moderno, evitando arcaísmos innecesarios.
