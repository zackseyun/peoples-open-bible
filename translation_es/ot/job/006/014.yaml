translation:
  language: es
  text: Al que desfallece le corresponde la bondad[a][b] de su amigo, aun si abandona el temor del Todopoderoso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El amigo que retiene la bondad hacia el que desfallece abandona el temor del Todopoderoso». El hebreo tiene una sintaxis comprimida que también puede entenderse así.'
    reason: alternative_reading
  - marker: b
    text: «Bondad» traduce חֶסֶד, que también puede llevar el sentido de amor leal, misericordia o fidelidad de pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמָּס
  english_pob_choice: to the one who is despairing
  chosen_spanish: a quien se derrite
  alternatives_spanish:
  - al que desfallece
  - al que está desesperado
  - a quien se derrumba
  lexicon: HALOT
  rationale: El hebreo usa una imagen de alguien que ‘se derrite’ o se deshace interiormente por el sufrimiento. En español, ‘a quien se derrite’ conserva la metáfora corporal sin volverla artificial, y mantiene la idea de colapso emocional que el inglés POB interpretó como ‘despairing’.
- source_word: מֵרֵעֵהוּ
  english_pob_choice: from his friend
  chosen_spanish: de su amigo
  alternatives_spanish:
  - de su compañero
  - por parte de su amigo
  - de su prójimo
  lexicon: HALOT
  rationale: 'La preposición indica procedencia o expectativa desde la relación amistosa: el apoyo debe venir de esa fuente. ‘De su amigo’ comunica bien la fuerza relacional y la posesión de tercera persona.'
- source_word: חָסֶד
  english_pob_choice: kindness
  chosen_spanish: lealtad
  alternatives_spanish:
  - bondad
  - misericordia
  - amor leal
  lexicon: HALOT
  rationale: En este contexto humano, חֶסֶד no es solo amabilidad general sino fidelidad solidaria expresada en ayuda concreta. ‘Lealtad’ captura esa obligación relacional de forma clara en español; la nota preserva que también puede incluir bondad, misericordia o amor leal.
- source_word: וְיִרְאַת שַׁדַּי
  english_pob_choice: the fear of the Almighty
  chosen_spanish: el temor del Todopoderoso
  alternatives_spanish:
  - la reverencia al Todopoderoso
  lexicon: HALOT
  rationale: ‘Temor’ preserva el idiomático temor reverente hacia Dios y mantiene la fuerza bíblica de יִרְאָה. ‘Todopoderoso’ reproduce el título divino usado por el POB inglés para שַׁדַּי.
- source_word: יַעֲזֹב
  english_pob_choice: he forsakes
  chosen_spanish: abandona
  alternatives_spanish:
  - deja
  - abandona del todo
  - renuncia a
  lexicon: HALOT
  rationale: עָזַב significa dejar, abandonar o forsake. ‘Abandona’ es natural y fuerte en español, y conserva el peso moral del verbo en la cláusula concesiva.
- source_word: שַׁדַּי
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  lexicon: HALOT
  rationale: Se traduce el título divino, no se translitera, siguiendo la práctica del proyecto y la solución del POB inglés.
theological_decisions:
- issue: 'Relación sintáctica final: el verso puede leerse como exigencia de lealtad al desvalido o como reproche a quien retiene esa lealtad'
  english_pob_reading: Kindness from his friend is due to one who is despairing, even if he forsakes the fear of the Almighty.
  chosen_spanish_reading: A quien se derrite le corresponde la lealtad de su amigo, aun si abandona el temor del Todopoderoso.
  alternative_spanish_readings:
  - El amigo que retiene la lealtad abandona el temor del Todopoderoso.
  - La lealtad debe venir de su amigo, y él abandona el temor del Todopoderoso.
  rationale: 'El hebreo es muy comprimido y admite más de una relación sintáctica. La lectura elegida sigue la línea principal del POB inglés: el sufriente recibe la lealtad debida de su amigo, incluso en el caso de que parezca haber dejado el temor de Dios. La alternativa se conserva porque el texto permite también entender que negar esa lealtad equivale a abandonar el temor divino.'
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés al evitar artículos innecesarios y al mantener la cláusula final en forma concesiva natural. También conserva la ambigüedad sintáctica documentada, sin endurecerla en una sola lectura.
  spanish_consistency_notes:
  - Se usa ‘Todopoderoso’ para שַׁדַּי, en consonancia con la práctica del POB inglés y la terminología del proyecto.
  - Se mantiene ‘lealtad’ para חֶסֶד en el texto principal por claridad contextual, pero la nota explica la amplitud semántica.
  - Se evita ‘SEÑOR’ para el título divino porque el hebreo aquí es שַׁדַּי, no יהוה.
  - La metáfora de ‘derretirse’ conserva la imagen hebrea de colapso interior sin convertirla en paráfrasis explicativa.
