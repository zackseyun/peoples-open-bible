translation:
  language: es
  text: Dios de los padres y Señor de tu misericordia, que hizo todas las cosas por tu palabra[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por tu mandato». Griego: «por tu palabra».'
