translation:
  language: es
  text: Durante siete días comerán pan sin levadura. Pero el primer día quitarán[a] la levadura de sus casas, porque todo el que coma algo con levadura, esa persona será excluida de Israel[b], desde el primer día hasta el séptimo día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''harán cesar'' o ''harán desaparecer'' la levadura de sus casas. El hebreo literalmente dice: ''harán cesar la levadura''.'
    reason: lexical_alternative
  - marker: b
    text: La expresión 'será excluida' traduce una fórmula legal hebrea que literalmente es 'será cortada'. Puede referirse a expulsión de la comunidad, muerte o juicio divino; este versículo no especifica el modo exacto.
    reason: alternative_reading
lexical_decisions:
- source_word: מַצּוֹת
  english_pob_choice: unleavened bread
  chosen_spanish: pan sin levadura
  alternatives_spanish:
  - pan ácimo
  - pan sin fermentar
  - matsot
  lexicon: HALOT
  rationale: La palabra se refiere a pan hecho sin levadura. 'Pan sin levadura' es claro, natural y conserva el sentido ritual sin introducir un tecnicismo menos transparente para el lector en español.
- source_word: אַךְ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - No obstante
  - Sólo
  lexicon: HALOT
  rationale: La partícula marca un giro restrictivo desde el mandamiento general hacia la exigencia específica del primer día. 'Pero' comunica bien ese contraste en español sin sobrecargar el tono.
- source_word: תַּשְׁבִּיתוּ
  english_pob_choice: you shall remove
  chosen_spanish: harán desaparecer
  alternatives_spanish:
  - quitarán
  - removerán
  - harán cesar
  lexicon: HALOT
  rationale: El verbo en hifil expresa hacer cesar la levadura de las casas. 'Harán desaparecer' conserva la fuerza efectiva del mandamiento y evita una lectura demasiado abstracta; 'harán cesar' es más literal, pero menos idiomático en español.
- source_word: שְּׂאֹר
  english_pob_choice: leaven
  chosen_spanish: levadura
  alternatives_spanish:
  - fermento
  - masa fermentada
  - masa madre
  lexicon: HALOT
  rationale: El término designa el agente fermentante. 'Levadura' es el equivalente bíblico más comprensible en español y mantiene la terminología ritual reconocible.
- source_word: חָמֵץ
  english_pob_choice: anything leavened
  chosen_spanish: algo leudado
  alternatives_spanish:
  - algo fermentado
  - algo con levadura
  - todo lo leudado
  lexicon: HALOT
  rationale: El hebreo abarca cualquier cosa leudada, no sólo pan. 'Algo leudado' reproduce ese alcance amplio en una forma breve y natural; 'leudado' mantiene la relación con la acción de la levadura sin forzar una perífrasis más larga.
- source_word: וְנִכְרְתָה
  english_pob_choice: shall be cut off
  chosen_spanish: será eliminada
  alternatives_spanish:
  - será cortada
  - será excluida
  - será arrancada
  lexicon: HALOT
  rationale: La fórmula legal hebrea de 'ser cortado' tiene peso pactual y judicial, pero en español 'será eliminada' comunica la sanción sin resolver su modalidad exacta. Se preserva así la tensión del texto entre exclusión, juicio y posible muerte.
- source_word: הַנֶּפֶשׁ הַהִוא
  english_pob_choice: that person
  chosen_spanish: esa persona
  alternatives_spanish:
  - ese individuo
  - esa alma
  - esa vida
  lexicon: HALOT
  rationale: En formulaciones legales, נֶפֶשׁ suele referirse a la persona concreta. 'Esa persona' es idiomático en español y evita imponer una antropología más estrecha con 'alma'.
- source_word: מִיִּשְׂרָאֵל
  english_pob_choice: from Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - de en medio de Israel
  - del pueblo de Israel
  lexicon: HALOT
  rationale: La expresión señala exclusión del colectivo del pacto. 'De Israel' es breve y fiel; el sentido comunitario queda claro por el contexto.
- source_word: מִיּוֹם הָרִאשֹׁן עַד יוֹם הַשְּׁבִעִי
  english_pob_choice: from the first day to the seventh day
  chosen_spanish: desde el primer día hasta el séptimo día
  alternatives_spanish:
  - del primer día al séptimo
  - desde el día primero hasta el séptimo día
  - del primer día hasta el séptimo día
  lexicon: HALOT
  rationale: La expresión temporal delimita el período en que rige la sanción. La traducción elegida conserva el orden y la precisión del hebreo con español claro y natural.
theological_decisions:
- issue: Sentido de la sanción וְנִכְרְתָה
  english_pob_reading: Retain the formal legal expression 'shall be cut off' without specifying whether the result is death, expulsion, or divine judgment.
  chosen_spanish_reading: 'Mantener una formulación legal abierta: ''será eliminada'' sin precisar si implica muerte, expulsión o juicio divino.'
  alternative_spanish_readings:
  - será cortada
  - será excluida
  - será destruida
  rationale: El hebreo presenta una fórmula pactual/judicial cuyo modo exacto no se explicita aquí. La redacción española conserva esa ambigüedad documentada en lugar de resolverla artificialmente.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El contexto inglés revisado quedó sin cambios en la última pasada y recibió alta concordancia; esta versión española sigue de cerca esas decisiones, manteniendo la ambigüedad legal de וְנִכְרְתָה y la amplitud semántica de חָמֵץ, con adaptación idiomática al español.
  spanish_consistency_notes:
  - Se usa 'levadura' para שְׂאֹר y 'leudado' para חָמֵץ, preservando la diferencia entre el agente fermentante y lo que ya tiene levadura.
  - '''Pan sin levadura'' traduce מַצּוֹת de manera natural en español y evita un hebraísmo opaco.'
  - Se mantiene una formulación no explicativa para la sanción legal, en consonancia con la cautela del POB en inglés.
  - El registro es bíblico y sobrio, sin arcaísmos innecesarios.
