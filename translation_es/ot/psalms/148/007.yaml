    issue: «abismos» para תְּהֹמוֹת puede sonar demasiado abstracto o cosmológico y menos claramente acuático
    rationale: Aunque «abismos» es defendible, el hebreo aquí evoca las aguas profundas; el inglés POB mantuvo «deeps» con nota «all depths». En español, «profundidades» comunica mejor ese campo semántico sin sobreinterpretar.
  - severity: low
    issue: La nota actual queda menos bien integrada con el término principal elegido
    rationale: Si el texto principal dice «abismos» y la nota ofrece «profundidades», la alternativa termina sonando más natural que la lectura principal. Conviene invertir esa relación para claridad estilística.
  revised_spanish_text: ¡Alaben a Yahvé desde la tierra, criaturas marinas y todas las profundidades[a]!
  revised_footnotes:
  - marker: a
    text: O «abismos». El hebreo evoca las aguas profundas.
    reason: lexical_alternative
  revision_rationale: Se cambia «todos los abismos» por «todas las profundidades» para reflejar mejor תְּהֹמוֹת en este contexto de aguas profundas y para sonar más natural en español contemporáneo, manteniendo «abismos» como alternativa poética válida en nota. El resto del versículo está bien alineado con el hebreo y con la auditoría inglesa.
