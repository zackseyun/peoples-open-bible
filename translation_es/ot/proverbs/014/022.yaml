review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura y el contraste del hebreo: pregunta retórica inicial, participio repetido para ''los que traman/planean'', y segunda cola con verbo suplido de manera razonable. Sin embargo, en la pareja חֶסֶד וֶאֱמֶת el español elegido (''misericordia y verdad'') no sigue de cerca la decisión auditada de la POB inglesa (''steadfast love and faithfulness'') ni su rationale relacional. ''Verdad'' desplaza el sentido hacia lo abstracto, cuando aquí אֱמֶת probablemente significa ''fidelidad'' o ''fiabilidad''.'
  spanish_quality_summary: El español es claro y legible. 'Se extravían' y 'el mal/el bien' funcionan bien. No obstante, 'maquinan el bien' suena algo marcado en español, porque 'maquinar' suele tener connotación negativa; en este paralelismo puede tolerarse, pero 'planean' o 'traman' sería más natural. Dado que la POB inglesa enfatiza la repetición del mismo verbo, conviene conservar paralelismo en español con un verbo neutral. La reparación principal sigue siendo léxica en la segunda cola.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé/Mesías. Sí hay una decisión importante de proyecto respecto a חֶסֶד/אֱמֶת: el borrador se aparta innecesariamente de la rationale documentada al usar ''misericordia y verdad''. Mejor ''amor leal[a] y fidelidad'' o, si se quiere algo menos técnico, ''amor firme[a] y fidelidad''. Esto respeta mejor la justificación lexical y teológica inglesa, manteniendo la nota con alternativas como ''bondad y verdad'' o ''misericordia y fidelidad''.'
  issues:
  - severity: high
    issue: '''misericordia y verdad'' no preserva adecuadamente חֶסֶד וֶאֱמֶת según la auditoría inglesa'
    rationale: La POB inglesa eligió 'steadfast love and faithfulness' y explicó que la pareja denota amor leal junto con fiabilidad. 'Verdad' en español puede leerse como veracidad abstracta, perdiendo la fuerza relacional de אֱמֶת; 'misericordia' también reduce חֶסֶד frente a la noción de amor leal.
  - severity: medium
    issue: '''maquinan el bien'' suena menos natural por la carga negativa habitual de ''maquinar'''
    rationale: Aunque refleja la repetición del participio hebreo, en español 'maquinar' suele asociarse con intriga o malicia. Un verbo neutral como 'planean' mantiene el paralelismo y la intención deliberada sin introducir una connotación impropia en la segunda cola.
  revised_spanish_text: ¿No se extravían los que planean el mal? Pero el amor leal[a] y la fidelidad pertenecen a los que planean el bien.
  revised_footnotes:
