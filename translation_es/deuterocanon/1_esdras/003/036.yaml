translation:
  language: es
  text: Pero el tercero[a], el que habló acerca de las mujeres y de la verdad —este era Zorobabel— comenzó a hablar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Zorobabel» sigue la forma griega Ζοροβαβέλ; la forma más conocida en español es «Zerubabel».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὁ δὲ τρίτος
  english_pob_choice: But the third
  chosen_spanish: Pero el tercero
  alternatives_spanish:
  - Y el tercero
  - Ahora bien, el tercero
  lexicon: LSJ
  rationale: δέ marca contraste discursivo; en español, «pero» transmite bien ese giro. «El tercero» conserva el ordinal sin añadir «hombre» u otro sustantivo que el griego no expresa.
- source_word: ὁ εἴπας
  english_pob_choice: the one who spoke
  chosen_spanish: el que habló
  alternatives_spanish:
  - el que dijo
  - el que había hablado
  lexicon: BDAG
  rationale: El participio articular identifica al personaje por su discurso previo. «El que habló» es natural en español y preserva la referencia sin volver la frase demasiado pesada.
- source_word: περὶ τῶν γυναικῶν καὶ τῆς ἀληθείας
  english_pob_choice: about women and about the truth
  chosen_spanish: acerca de las mujeres y de la verdad
  alternatives_spanish:
  - sobre las mujeres y sobre la verdad
  - respecto de las mujeres y de la verdad
  lexicon: BDAG
  rationale: περί con genitivo se traduce aquí con valor de tema o asunto. Repetir la preposición en español no es necesario; «acerca de» y «de» mantienen la coordinación y distinguen ambos temas con claridad.
- source_word: οὗτός ἐστιν Ζοροβαβέλ
  english_pob_choice: this was Zorobabel
  chosen_spanish: este era Zorobabel
  alternatives_spanish:
  - este es Zorobabel
  - él era Zorobabel
  lexicon: BDAG
  rationale: Aunque el griego usa presente, en un relato pasado el español suele preferir el imperfecto para identificación parentética. «Este era» conserva la fuerza identificadora y suena natural.
- source_word: Ζοροβαβέλ
  english_pob_choice: Zorobabel
  chosen_spanish: Zorobabel
  alternatives_spanish:
  - Zerubabel
  lexicon: LSJ
  rationale: Se mantiene la transliteración directa desde la forma griega Ζοροβαβέλ, coherente con el criterio POB de reflejar la forma del testimonio fuente; «Zerubabel» es la forma más familiar en español bíblico tradicional.
- source_word: ἤρξατο λαλεῖν
  english_pob_choice: began to speak
  chosen_spanish: comenzó a hablar
  alternatives_spanish:
  - empezó a hablar
  - comenzó a decir
  lexicon: BDAG
  rationale: La construcción inceptiva ἄρχομαι + infinitivo pide un verbo de inicio más el infinitivo. «Comenzó a hablar» mantiene el sentido de inicio verbal y evita una traducción demasiado literal o forzada.
translation_notes:
  revision_awareness: Se revisó el orden y la puntuación para reflejar el contraste de δέ y la identificación parentética del personaje, sin cambios sustantivos respecto del sentido griego ni del audit trail inglés. La forma verbal final se ajustó a un español más natural («comenzó a hablar») manteniendo el valor inceptivo de ἤρξατο λαλεῖν.
  spanish_consistency_notes:
  - Se mantiene «Zorobabel» como transliteración del griego, con nota para la forma tradicional «Zerubabel».
  - Se conserva «verdad» para ἀλήθεια, sin cargarla de matices doctrinales que el contexto no exige.
  - El contraste inicial con «Pero» refleja el δέ del griego y enlaza con la secuencia narrativa anterior.
