translation:
  language: es
  text: 'Habla a Aarón y a sus hijos[a], diciendo: «Así bendecirán a los hijos de Israel. Les dirán:»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «los israelitas» o «el pueblo de Israel». El hebreo dice «los hijos de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Dirige tu palabra a
  lexicon: HALOT
  rationale: El imperativo piel de דבר pide una orden directa. “Habla” conserva la instrucción inmediata y suena natural en español sin perder fuerza.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: Marca al destinatario del mandato; en español, la preposición natural y directa es “a”.
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  alternatives_spanish:
  - Aaron
  lexicon: HALOT
  rationale: Nombre propio transliterado al español con acentuación habitual para facilitar lectura y pronunciación.
- source_word: וְאֶל בָּנָיו
  english_pob_choice: and to his sons
  chosen_spanish: y a sus hijos
  alternatives_spanish:
  - y a sus hijos varones
  - y a sus descendientes
  lexicon: HALOT
  rationale: בָּנִים aquí se refiere a los descendientes masculinos de Aarón en contexto sacerdotal. “Hijos” es la opción más natural en español y mantiene la relación familiar; “hijos varones” sería más explícito pero menos fluido.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciéndoles
  - para decir
  lexicon: HALOT
  rationale: El infinitivo quotativo introduce la cita siguiente. “Diciendo” preserva la estructura discursiva del hebreo.
- source_word: כֹּה
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - De esta manera
  - De este modo
  lexicon: HALOT
  rationale: Introduce la fórmula prescrita. “Así” conserva la concisión y el tono normativo.
- source_word: תְבָרֲכ֖וּ
  english_pob_choice: you shall bless
  chosen_spanish: bendecirán
  alternatives_spanish:
  - bendeciréis
  - deberán bendecir
  lexicon: HALOT
  rationale: 'La forma imperfecta en contexto instructivo expresa mandato/fórmula. En español, la tercera persona plural funciona bien en una instrucción litúrgica impersonal: “bendecirán”. Se evita un futuro puramente temporal en favor de un valor prescriptivo claro.'
- source_word: אֶת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: a los hijos de Israel
  alternatives_spanish:
  - a los israelitas
  - al pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la forma más literal del hebreo, como en la POB inglesa, para no borrar la textura del texto y su matiz de designación pactal familiar.
- source_word: אָמֹר לָהֶם
  english_pob_choice: say to them
  chosen_spanish: Diles
  alternatives_spanish:
  - diciéndoles
  - háblales
  lexicon: HALOT
  rationale: La repetición imperativa introduce de inmediato la fórmula de bendición del versículo siguiente. “Diles” expresa de forma natural la segunda instrucción directa en español.
theological_decisions:
- issue: Conservación de la expresión pactal “sons of Israel”
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se mantiene la forma más cercana al hebreo para dejar visible la designación de pacto y la estructura familiar del término, en línea con la decisión POB de no suavizarla automáticamente.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Mandato litúrgico de bendecir
  english_pob_reading: Thus you shall bless
  chosen_spanish_reading: Así bendecirán
  alternative_spanish_readings:
  - Así bendeciréis
  - De esta manera bendecirán
  rationale: El hebreo presenta una fórmula normativa para el rito aarónico. En español, el futuro con valor prescriptivo comunica bien la instrucción sin añadir explicaciones ni cambiar el tono ritual.
  doctrine_reference: DOCTRINE.md §Translation philosophy, optimal equivalence
translation_notes:
  revision_awareness: 'El inglés POB había puntualizado la segunda cláusula con punto antes de la orden repetida: “Thus you shall bless the sons of Israel. Say to them,”. En español se conserva esa segmentación con dos oraciones separadas por punto para reflejar la repetición imperativa y la transición natural hacia la cita del versículo siguiente.'
  spanish_consistency_notes:
  - Se mantuvo el nombre divino fuera del versículo porque el hebreo aquí no lo contiene.
  - Se preservó el registro litúrgico y prescriptivo sin recurrir a formulaciones eclesiásticas más tradicionales que el hebreo no exige.
  - Se usó una nota para marcar la alternativa idiomática de בְּנֵי יִשְׂרָאֵל, siguiendo la POB inglesa y dejando visible la tensión entre literalidad y naturalidad.
