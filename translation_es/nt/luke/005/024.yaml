translation:
  language: es
  text: 'Pero para que sepan que el Hijo del Hombre tiene autoridad en la tierra para perdonar pecados—le dijo al paralítico[a]: «Te digo: levántate, toma tu estera[b] y vete a tu casa».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Ser Humano». Se conserva «el Hijo del Hombre» porque es la autodenominación de Jesús y lleva resonancias bíblicas importantes, especialmente de Daniel 7.
    reason: alternative_reading
  - marker: b
    text: O «tu lecho». El griego κλινίδιον se refiere a una pequeña cama, lecho o estera portátil.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα δὲ
  english_pob_choice: But so that
  chosen_spanish: Pero para que
  alternatives_spanish:
  - Y para que
  - Mas para que
  lexicon: BDAG
  rationale: ἵνα introduce finalidad, y δέ marca una transición leve. En español, «Pero para que» conserva la relación de propósito con un giro natural al contexto narrativo.
- source_word: εἰδῆτε
  english_pob_choice: you may know
  chosen_spanish: sepan
  alternatives_spanish:
  - conozcan
  - lleguen a saber
  lexicon: BDAG
  rationale: El verbo expresa conocimiento/certidumbre. «Sepan» es natural en plural y mantiene el valor directo de la declaración pública.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo de Hombre
  - el Ser Humano
  lexicon: BDAG
  rationale: Se conserva el título cristológico tradicional porque en el contexto funciona como autodenominación de Jesús y porta resonancias de Daniel 7; no se paraphrasea.
- source_word: ἐξουσίαν ἔχει
  english_pob_choice: has authority
  chosen_spanish: tiene autoridad
  alternatives_spanish:
  - tiene poder
  - posee autoridad
  lexicon: BDAG
  rationale: ἐξουσία apunta a autoridad legítima o prerrogativa, no solo a fuerza. «Tiene autoridad» reproduce bien esa fuerza jurídica y teológica.
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: on earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - en la tierra aquí
  lexicon: BDAG
  rationale: La preposición con artículo genitivo se traduce de forma locativa directa. «En la tierra» mantiene el contraste con la autoridad divina ejercida en el ámbito terrenal.
- source_word: ἀφιέναι ἁμαρτίας
  english_pob_choice: to forgive sins
  chosen_spanish: para perdonar pecados
  alternatives_spanish:
  - para remitir pecados
  - para absolver pecados
  lexicon: BDAG
  rationale: En este pasaje ἀφίημι significa perdonar/remitir. «Perdonar pecados» es la equivalencia más clara y fiel al conflicto narrativo.
- source_word: τῷ παραλελυμένῳ
  english_pob_choice: to the paralyzed man
  chosen_spanish: al paralítico
  alternatives_spanish:
  - al hombre paralizado
  - al hombre que estaba paralizado
  lexicon: BDAG
  rationale: El participio perfecto funciona sustantivado. «Al paralítico» es breve, natural y fiel al valor nominal del griego; en nota se puede conservar la alternativa más descriptiva si se desea.
- source_word: Σοὶ λέγω
  english_pob_choice: I say to you
  chosen_spanish: Te digo
  alternatives_spanish:
  - Yo te digo
  - Les digo
  lexicon: BDAG
  rationale: El griego es una fórmula directa y enfática. En español, «Te digo» suena inmediato y solemne sin sobrecargar la frase.
- source_word: ἔγειρε
  english_pob_choice: rise
  chosen_spanish: levántate
  alternatives_spanish:
  - levántate y ponte en pie
  - incorpórate
  lexicon: BDAG
  rationale: El imperativo ordena ponerse de pie de inmediato. «Levántate» es idiomático y claro en español, manteniendo la urgencia del mandato.
- source_word: ἄρας
  english_pob_choice: pick up
  chosen_spanish: toma
  alternatives_spanish:
  - recoge
  - levanta
  lexicon: BDAG
  rationale: El participio de αἴρω expresa la acción de alzar/recoger el objeto para llevárselo. En español, «toma» funciona de manera natural junto con el sustantivo concreto «camilla».
- source_word: κλινίδιόν σου
  english_pob_choice: your mat
  chosen_spanish: tu camilla
  alternatives_spanish:
  - tu camilla pequeña
  - tu estera
  lexicon: BDAG
  rationale: κλινίδιον refiere a una pequeña cama/pallet; en este contexto narrativo, «camilla» comunica bien el objeto portátil usado por el enfermo sin perder la imagen de carga y traslado. Se evita «cama» por sonar demasiado doméstico y «estera» por ser menos preciso aquí.
- source_word: πορεύου
  english_pob_choice: go
  chosen_spanish: vete
  alternatives_spanish:
  - ve
  - ponte en camino
  lexicon: BDAG
  rationale: El imperativo medio de movimiento se expresa naturalmente con «vete», que conserva el sentido de partir/irse de allí con el matiz de salida inmediata.
- source_word: εἰς τὸν οἶκόν σου
  english_pob_choice: to your house
  chosen_spanish: a tu casa
  alternatives_spanish:
  - a tu hogar
  - a tu casa propia
  lexicon: BDAG
  rationale: οἶκος puede ser casa u hogar. Aquí el movimiento concreto favorece «a tu casa», que es claro y directo en español.
theological_decisions:
- issue: Título cristológico ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_reading: the Son of Man
  chosen_spanish_reading: el Hijo del Hombre
  alternative_spanish_readings:
  - el Ser Humano
  - el Humano
  rationale: Se conserva el título tradicional para no diluir su peso bíblico e intertextual. El contexto de Lucas presenta a Jesús reivindicando una autoridad que apunta a su identidad mesiánica y a la resonancia daniélica del término.
  doctrine_reference: Affirmations; Translation philosophy §§2–3
- issue: Ἐξουσίαν ἔχει en relación con el perdón de pecados
  english_pob_reading: has authority
  chosen_spanish_reading: tiene autoridad
  alternative_spanish_readings:
  - tiene poder
  - posee autoridad
  rationale: La declaración no subraya mera capacidad milagrosa sino el derecho/competencia legítima de Jesús para perdonar pecados. «Autoridad» preserva mejor esa afirmación teológica.
  doctrine_reference: Translation philosophy §1
- issue: ἐπὶ τῆς γῆς
  english_pob_reading: on earth
  chosen_spanish_reading: en la tierra
  alternative_spanish_readings:
  - sobre la tierra
  - en el mundo
  rationale: Se mantiene una lectura local simple sin expandirla interpretativamente. Así se conserva la afirmación de que la autoridad del Hijo del Hombre se ejerce en el ámbito terrenal.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el análisis auditado en inglés: se mantiene el valor final de propósito de ἵνα, el título cristológico «el Hijo del Hombre», la autoridad como ἐξουσία, y κλινίδιον como objeto portátil. La única adaptación principal es la elección de «camilla» en lugar de «mat» para un español más natural, con nota alternativa que preserva la tensión lexical del término.'
  spanish_consistency_notes:
  - Se mantiene la terminología POB para «Yahvé» cuando no aplica aquí, sin introducir sustituciones innecesarias.
  - Se conserva el título cristológico de forma fija como «el Hijo del Hombre», evitando la paráfrasis interpretativa.
  - «Autoridad» se usa consistentemente para ἐξουσία, no «poder», para no perder el matiz de prerrogativa legítima.
  - «Perdonar pecados» reproduce la función de ἀφιέναι ἁμαρτίας sin suavizarla.
  - «Al paralítico»/«camilla» se sostienen como soluciones españolas naturales, con notas que preservan las alternativas léxicas del griego.
