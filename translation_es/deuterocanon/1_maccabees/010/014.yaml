translation:
  language: es
  text: Pero en Betsura[a] quedaron algunos de los que habían abandonado la ley y los mandamientos, porque les servía de refugio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Betsura es la transliteración del griego Βεθσούροις, nombre de lugar conservado sin traducir.
    reason: source_note
lexical_decisions:
- source_word: πλὴν
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - No obstante
  lexicon: LSJ
  rationale: La partícula introduce contraste con el contexto previo; «pero» reproduce bien la fuerza adversativa en español natural y digno.
- source_word: ἐν Βεθσούροις
  english_pob_choice: in Bethsura
  chosen_spanish: en Bet-sur[a]
  alternatives_spanish:
  - en Betsura
  - en Betzura
  lexicon: LSJ
  rationale: Se conserva el nombre propio transliterado. Uso «Bet-sur» para unificar la forma castellana del topónimo con una grafía sobria y legible; la nota explica la transliteración del nombre.
- source_word: ὑπελείφθησάν
  english_pob_choice: remained
  chosen_spanish: quedaron
  alternatives_spanish:
  - permanecieron
  - fueron dejados
  lexicon: LSJ
  rationale: El pasivo expresa que algunos seguían allí o quedaron allí. «Quedaron» mantiene esa idea de permanencia resultante sin forzar una pasiva más pesada en español.
- source_word: τινες
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - unos cuantos
  - ciertos
  lexicon: LSJ
  rationale: Equivalente natural del indefinido plural; conserva la indefinición sin añadir precisión no presente en el griego.
- source_word: τῶν καταλειπόντων
  english_pob_choice: of those who had forsaken
  chosen_spanish: de los que habían abandonado
  alternatives_spanish:
  - de los que habían dejado
  - de los que habían forsado
  lexicon: LSJ
  rationale: «Abandonado» expresa con claridad la idea de apartarse o desertar de la ley y los mandamientos. Se evita «forsado», demasiado marcado y menos idiomático en español.
- source_word: τὸν νόμον
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  - la norma
  lexicon: LSJ
  rationale: En este contexto judío-covenantal, «la ley» conserva el referente religioso-jurídico sin necesidad de mayúscula interpretativa.
- source_word: τὰ προστάγματα
  english_pob_choice: the commandments
  chosen_spanish: los mandamientos
  alternatives_spanish:
  - los decretos
  - las ordenanzas
  - las prescripciones
  lexicon: LSJ
  rationale: «Mandamientos» empareja de forma natural con «la ley» y mantiene el sentido de preceptos obligatorios prescritos.
- source_word: φυγαδευτήριον
  english_pob_choice: a refuge
  chosen_spanish: un refugio
  alternatives_spanish:
  - un asilo
  - un lugar de escape
  - un escondite
  lexicon: LSJ
  rationale: El sustantivo indica un lugar de refugio o huida. «Refugio» es breve, claro y fiel al valor semántico sin sobreinterpretar el matiz militar.
theological_decisions:
- issue: Caracterización moral y covenantal del grupo que había dejado la ley y los mandamientos
  english_pob_reading: those who had forsaken the law and the commandments
  chosen_spanish_reading: los que habían abandonado la ley y los mandamientos
  alternative_spanish_readings:
  - los que habían dejado la ley y los mandamientos
  - los que habían forsado la ley y los mandamientos
  rationale: El participio griego presenta a este grupo como personas que se apartaron de la fidelidad a la ley. «Abandonado» comunica esa fuerza negativa sin añadir una acusación doctrinal extra; preserva la tensión moral del texto.
  doctrine_reference: Principio de primacía del texto original; consistencia terminológica en contexto judío-covenantal
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «were left behind» a «remained» para reflejar mejor ὑπελείφθησάν. En español se optó por «quedaron», que conserva la idea de permanencia resultante y suena natural. También se mantuvo el carácter negativo de καταλειπόντων con «habían abandonado», en línea con el juicio moral del contexto.
  spanish_consistency_notes:
  - Se usó «la ley» y «los mandamientos» de forma coherente con el contexto judío del libro.
  - Se evitó «Cristo» u այլ terminología cristológica, ya que el pasaje no la contiene.
  - «Refugio» se mantiene como sustantivo concreto para φυγαδευτήριον, sin ampliarlo a «asilo» o «escondite».
