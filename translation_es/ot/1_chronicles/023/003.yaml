translation:
  language: es
  text: Los levitas fueron contados de treinta años para arriba, y su número, por cabezas[a], varón por varón, fue de treinta y ocho mil.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «por sus cabezas, como varones»; la expresión indica un conteo individual de varones adultos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסָּפְרוּ
  english_pob_choice: were counted
  chosen_spanish: fueron contados
  alternatives_spanish:
  - fueron enumerados
  - fueron registrados
  lexicon: HALOT
  rationale: El niphal de ספר expresa una acción pasiva de censo o conteo. «Fueron contados» reproduce bien ese valor sin añadir matices administrativos que el hebreo no exige aquí.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levítas
  lexicon: HALOT
  rationale: Se conserva el nombre del grupo tribal/clánico en la forma asentada en español bíblico, con minúscula por tratarse de una designación étnico-religiosa común en el texto.
- source_word: מִבֶּן שְׁלֹשִׁים שָׁנָה וָמָעְלָה
  english_pob_choice: from thirty years old and upward
  chosen_spanish: desde los treinta años y más arriba
  alternatives_spanish:
  - a partir de los treinta años
  - desde los treinta años en adelante
  lexicon: HALOT
  rationale: La expresión hebrea marca un umbral mínimo de edad. «Desde los treinta años y más arriba» conserva la imagen direccional del original y su sentido de inclusión hacia arriba.
- source_word: וַיְהִי מִסְפָּרָם
  english_pob_choice: and their number ... was
  chosen_spanish: y su número ... fue
  alternatives_spanish:
  - y el número de ellos fue
  - y su cuenta fue
  lexicon: HALOT
  rationale: Se mantiene la estructura introductoria del total. «Su número» es natural en español y fiel al sustantivo מִסְפָּר.
- source_word: לְגֻלְגְּלֹתָם
  english_pob_choice: by heads
  chosen_spanish: por cabezas
  alternatives_spanish:
  - cabeza por cabeza
  - por personas
  lexicon: HALOT
  rationale: El hebreo usa literalmente «por sus cabezas», un modismo de conteo individual. «Por cabezas» preserva la imagen concreta sin oscurecer el sentido.
- source_word: לִגְבָרִים
  english_pob_choice: man by man
  chosen_spanish: varón por varón
  alternatives_spanish:
  - hombre por hombre
  - como varones
  lexicon: HALOT
  rationale: La frase especifica que el conteo es de individuos masculinos. «Varón por varón» conserva la marcación de sexo con un registro bíblico claro y preciso.
- source_word: שְׁלֹשִׁים וּשְׁמוֹנָה אָלֶף
  english_pob_choice: thirty-eight thousand
  chosen_spanish: treinta y ocho mil
  alternatives_spanish:
  - treinta y ocho mil hombres
  lexicon: HALOT
  rationale: El total numérico se vierte de manera directa. Se omite «hombres» porque ya está implicado por el contexto inmediato y por לִגְבָרִים.
translation_notes:
  revision_awareness: La versión inglesa POB se mantuvo sin cambios en la revisión más reciente y fue validada con alto grado de acuerdo; por eso el español sigue de cerca sus decisiones léxicas, especialmente en el modismo de conteo individual y en el límite de edad.
  spanish_consistency_notes:
  - Se conserva «levitas» como término técnico estable del corpus bíblico.
  - Se evita «SEÑOR» u այլ sustitución innecesaria porque el versículo no contiene el nombre divino.
  - «Varón por varón» y la nota explican el modismo hebreo sin perder la literalidad útil.
  - El número total se expresa con la forma natural en español latinoamericano, sin añadir unidades implícitas.
