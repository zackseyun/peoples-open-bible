review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del hebreo y del POB inglés: conserva la intensificación de צנף, el símil «como una pelota», la repetición de «allí», y el vocativo final de denuncia. Sin embargo, «hacia una tierra ancha» no refleja bien אֶל en este contexto, donde el movimiento culmina dentro de un destino («a/en una tierra espaciosa»), y suena menos natural que la opción documentada. También conviene ajustar ligeramente la nota alternativa de «arrollará», que en español puede sugerir atropellar más que envolver/enrollar.'
  spanish_quality_summary: El español es claro y legible, con registro digno. No obstante, «hacia una tierra ancha» resulta algo forzado y direccionalmente impreciso; «a una tierra espaciosa» o «a una tierra ancha» suena mejor. El resto del verso funciona bien, aunque «pelota» es muy coloquial; aquí sigue siendo aceptable por fidelidad a «ball», pero «bola» también sería viable. «¡oh vergüenza de la casa de tu señor!» preserva bien el tono profético.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Señor» aquí corresponde correctamente a un superior humano (אֲדֹן), no al nombre divino. «Carros» para מַרְכְּבוֹת y «gloria» para כָּבוֹד son consistentes con el rastro léxico. El único ajuste recomendado es de naturalidad y precisión sintáctica en «a/hacia una tierra…».
  issues:
  - severity: medium
    issue: «hacia una tierra ancha» es menos fiel y menos natural que «a una tierra ancha/espaciosa»
    rationale: El hebreo אֶל aquí introduce el destino al que será llevado/envuelto, no solo una dirección aproximada. El POB inglés usa «into a broad land». En español bíblico natural, «a una tierra espaciosa» o «a una tierra ancha» transmite mejor la llegada al lugar.
  - severity: low
    issue: La alternativa «te arrollará con fuerza» puede inducir un sentido erróneo
    rationale: «Arrollar» en español suele evocar atropellar o derribar violentamente, no envolver o enrollar. Dado el razonamiento léxico documentado, conviene conservar alternativas más cercanas como «te enrollará» o «te hará rodar» solo si se explica bien.
  revised_spanish_text: Él te envolverá[a] con fuerza, como una pelota, a una tierra espaciosa[b]. Allí morirás, y allí estarán los carros de tu gloria[c], ¡oh vergüenza de la casa de tu señor!
  revised_footnotes:
