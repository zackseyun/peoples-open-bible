revisions:
- from: Hombres[a], ¿no es grande el rey, y no son muchos los hombres, y no tiene fuerza el vino? ¿Quién, pues, es el que domina sobre ellos[b], o quién es el que ejerce dominio sobre ellos? ¿No son las mujeres?
