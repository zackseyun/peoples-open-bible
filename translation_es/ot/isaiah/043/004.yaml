revisions:
- from: Porque eres precioso[a] a mis ojos, eres honrado, y yo te amo; doy hombres en trueque por ti[b], y pueblos en lugar de tu vida.
  to: Porque eres precioso[a] a mis ojos, eres estimado, y yo te amo; doy hombres a cambio de ti[b], y pueblos en lugar de tu vida.
  rationale: Se ajusta «honrado» a «estimado» para reflejar mejor el sentido de ser tenido en honor en español natural, y «en trueque por ti» a «a cambio de ti» para expresar la sustitución de manera más idiomática y clara, manteniendo la decisión léxica documentada por la POB inglesa.
