translation:
  language: es
  text: 'Calumnia en una ciudad[a], y asamblea de una turba, y una falsa acusación: todo esto es más grave que la muerte.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego presenta una lista comprimida con genitivos elípticos («calumnia de/en una ciudad», «asamblea de una turba/multitud»). La traducción explicita el sentido en español idiomático.
    reason: lexical_alternative
lexical_decisions:
- source_word: διαβολὴν
  english_pob_choice: Slander
  chosen_spanish: calumnia
  alternatives_spanish:
  - difamación
  - slander
  lexicon: LSJ
  rationale: El griego señala una acusación dañina y maliciosa contra alguien. «Calumnia» conserva bien esa fuerza en español y encaja en la lista de males del verso; «difamación» es más técnico y menos incisivo en este contexto.
- source_word: πόλεως
  english_pob_choice: in a city
  chosen_spanish: en una ciudad
  alternatives_spanish:
  - de una ciudad
  - contra una ciudad
  lexicon: LSJ
  rationale: La construcción genitiva es elíptica. «En una ciudad» sigue la decisión inglesa de explicitar el ámbito social sin forzar una relación posesiva o hostil que el griego no exige.
- source_word: ἐκκλησίαν
  english_pob_choice: assembly
  chosen_spanish: asamblea
  alternatives_spanish:
  - reunión
  - congregación
  lexicon: LSJ
  rationale: En este contexto sapiencial ἐκκλησία no apunta a una «iglesia» en sentido eclesial, sino a un grupo reunido. «Asamblea» mantiene ese sentido formal y neutral.
- source_word: ὄχλου
  english_pob_choice: of a mob
  chosen_spanish: de una multitud
  alternatives_spanish:
  - de una muchedumbre
  - de una turba
  lexicon: LSJ
  rationale: Aunque el inglés POB escogió «mob» para resaltar el matiz negativo, en español «multitud» resulta más natural como complemento de «asamblea» y evita una carga más fuerte de la que el sustantivo por sí solo necesariamente exige. El tono peyorativo queda en el conjunto del verso y en la acumulación de males.
- source_word: καταψευσμόν
  english_pob_choice: a false accusation
  chosen_spanish: una falsa acusación
  alternatives_spanish:
  - una mentira
  - un testimonio falso
  - calumnia
  lexicon: LSJ
  rationale: El término apunta a hablar falsamente contra alguien. «Falsa acusación» conserva el matiz forense/interpersonal y diferencia este elemento de διαβολή.
- source_word: ὑπὲρ θάνατον
  english_pob_choice: more grievous than death
  chosen_spanish: más grave que la muerte
  alternatives_spanish:
  - peor que la muerte
  - más allá de la muerte
  lexicon: LSJ
  rationale: La comparación griega expresa superioridad en maldad o gravedad. «Más grave que la muerte» sigue el revision pass del inglés y suena natural y solemne en español.
- source_word: πάντα
  english_pob_choice: all these
  chosen_spanish: todo esto
  alternatives_spanish:
  - todas estas cosas
  - todo ello
  lexicon: LSJ
  rationale: El neutro plural resume los elementos anteriores. «Todo esto» lo hace explícito y fluido en español.
- source_word: μοχθηρά
  english_pob_choice: more grievous
  chosen_spanish: es más grave
  alternatives_spanish:
  - es peor
  - es maligno
  - es inicuo
  lexicon: LSJ
  rationale: El adjetivo puede significar malo, perverso o gravoso. En esta construcción comparativa, «más grave» reproduce bien la idea de algo que excede en peso dañino a la muerte.
theological_decisions:
- issue: Naturaleza de ἐκκλησία en un contexto sapiencial
  english_pob_reading: assembly without later church sense
  chosen_spanish_reading: asamblea sin sentido eclesial posterior
  alternative_spanish_readings:
  - iglesia
  - congregación
  rationale: No conviene importar el sentido técnico de «iglesia» al texto. La escena describe una reunión humana, no una institución religiosa cristiana.
  doctrine_reference: semantic_historical_context
- issue: Valor de la comparación final
  english_pob_reading: more grievous than death
  chosen_spanish_reading: más grave que la muerte
  alternative_spanish_readings:
  - peor que la muerte
  - más que la muerte
  rationale: La cláusula final no sólo compara, sino que intensifica la gravedad de los males enumerados. «Más grave» conserva la fuerza evaluativa sin vulgarizar el registro.
  doctrine_reference: wisdom_literature_lexical_force
translation_notes:
  revision_awareness: La redacción sigue el último ajuste del inglés POB, que pasó de «worse than death» a «more grievous than death» para reflejar con más formalidad y naturalidad πάντα μοχθηρά. También conserva la resolución explicativa de los genitivos elípticos y mantiene distinta la segunda acusación falsa respecto de la primera.
  spanish_consistency_notes:
  - Se mantiene «asamblea» para ἐκκλησία, evitando «iglesia» por el contexto sapiencial.
  - Se usa «calumnia» para διαβολή y «falsa acusación» para καταψευσμόν para conservar la distinción léxica.
  - La comparación final se vierte con «más grave que la muerte» para reproducir la intensidad del griego y del inglés revisado.
