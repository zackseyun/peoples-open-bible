translation:
  language: es
  text: Porque nuestras transgresiones son muchas delante de ti[a], y nuestros pecados testifican contra nosotros; porque nuestras transgresiones están con nosotros, y conocemos nuestras iniquidades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dan testimonio contra nosotros»; más literalmente, «responden contra nosotros».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: HALOT
  rationale: Introducción causal/explanatoria del lamento. «Porque» conserva con naturalidad el valor explicativo del hebreo y del inglés POB.
- source_word: רַבּוּ
  english_pob_choice: are many
  chosen_spanish: son muchas
  alternatives_spanish:
  - se han multiplicado
  - son numerosas
  lexicon: HALOT
  rationale: El hebreo expresa abundancia/resultativo; «son muchas» suena natural en español y preserva la idea de multiplicación sin añadir matiz temporal innecesario.
- source_word: פְשָׁעֵינוּ
  english_pob_choice: our transgressions
  chosen_spanish: nuestras transgresiones
  alternatives_spanish:
  - nuestras rebeliones
  - nuestras ofensas
  lexicon: HALOT
  rationale: «Transgresiones» mantiene el peso legal y moral de פשע, y conserva la distinción frente a «pecados» e «iniquidades» en el mismo versículo.
- source_word: נֶגְדֶּךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - frente a ti
  - contra ti
  lexicon: HALOT
  rationale: «Delante de ti» reproduce el valor espacial-forense de נגד en este contexto confesional. «Contra ti» intensificaría de más el sentido y mezclaría la imagen con la cláusula siguiente.
- source_word: וְחַטֹּאותֵינוּ
  english_pob_choice: and our sins
  chosen_spanish: y nuestros pecados
  alternatives_spanish:
  - y nuestras faltas
  - y nuestros pecados
  lexicon: HALOT
  rationale: «Pecados» es el equivalente más natural para חטאות en español; mantiene la categoría general sin borrar el contraste con «transgresiones» e «iniquidades».
- source_word: עָנְתָה בָּנוּ
  english_pob_choice: testify against us
  chosen_spanish: testifican contra nosotros
  alternatives_spanish:
  - dan testimonio contra nosotros
  - responden contra nosotros
  lexicon: HALOT
  rationale: La POB inglesa toma la expresión en sentido forense. En español, el plural verbal se ajusta al sujeto colectivo («nuestros pecados») y «testifican contra nosotros» comunica la carga jurídica sin perder la imagen de testimonio. La variante «responden contra nosotros» conserva la ambigüedad de ענה, pero es menos clara para la lectura pública.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - porque
  lexicon: HALOT
  rationale: La segunda partícula introduce una nueva explicación del estado de culpa consciente; «porque» mantiene el enlace causal de forma sencilla.
- source_word: פְשָׁעֵינוּ אִתָּנוּ
  english_pob_choice: our transgressions are with us
  chosen_spanish: nuestras transgresiones están con nosotros
  alternatives_spanish:
  - nuestras transgresiones permanecen con nosotros
  - nuestras transgresiones nos acompañan
  lexicon: HALOT
  rationale: La expresión indica presencia persistente y no mera localización física. «Están con nosotros» conserva la cercanía textual y la fuerza de permanencia.
- source_word: וַעֲוֺנֹתֵינוּ
  english_pob_choice: and our iniquities
  chosen_spanish: y nuestras iniquidades
  alternatives_spanish:
  - y nuestras culpas
  - y nuestras perversidades
  lexicon: HALOT
  rationale: «Iniquidades» conserva la gravedad moral de עון y mantiene la tercera capa léxica distinta de culpa en la serie del versículo.
- source_word: יְדַעֲנוּם
  english_pob_choice: we know
  chosen_spanish: conocemos
  alternatives_spanish:
  - sabemos
  - reconocemos
  lexicon: HALOT
  rationale: El verbo ידע es sencillamente «saber/conocer». «Conocemos» preserva la afirmación directa de conciencia de culpa; «reconocemos» sería más interpretativo.
theological_decisions:
- issue: Permanencia de la triple serie de términos de culpa
  english_pob_reading: 'Different English terms are preserved: ''transgressions,'' ''sins,'' and ''iniquities.'''
  chosen_spanish_reading: 'Se preserva la triple serie: «transgresiones», «pecados» e «iniquidades».'
  alternative_spanish_readings:
  - Reducir todo a «pecados»
  - usar solo «faltas»
  rationale: El hebreo acumula פשע, חטא y עון para intensificar la confesión. Mantener tres términos distintos en español evita borrar la textura retórica y la diferenciación lexical visible en la fuente.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
- issue: Valor forense de «testify against us»
  english_pob_reading: sins testify against us
  chosen_spanish_reading: «nuestros pecados testifican contra nosotros»
  alternative_spanish_readings:
  - «nuestros pecados dan testimonio contra nosotros»
  - «nuestros pecados responden contra nosotros»
  rationale: La cláusula presenta los pecados como testigos en un marco judicial/confesional. «Testifican contra nosotros» transmite esa función sin diluirla; «responden contra nosotros» preserva la literalidad de ענה pero resulta menos idiomático en español.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: Se siguió el pasaje fuente hebreo y el audit trail inglés POB sin cambios relevantes de revisión en la versión más reciente; la formulación española conserva la serie lexical y la lectura forense de la cláusula central.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino explícito.
  - Se preservó la progresión léxica «transgresiones / pecados / iniquidades» para reflejar la acumulación del hebreo.
  - Se evitó traducir mecánicamente desde el inglés cuando la sintaxis española exigía un ajuste natural («testifican» con sujeto plural).
