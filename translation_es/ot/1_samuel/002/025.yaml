base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/002/025.yaml
  text: If a man sins against another man[a], God will judge him; but if a man sins against Yahweh, who will intercede for him? But they would not listen to the voice of their father[b], because Yahweh desired to put them to death.
  footnotes:
  - marker: a
    text: Or 'the judges will judge him.' The Hebrew אֱלֹהִים can sometimes refer to human judges; here the main text reads 'God' because the contrast with 'the LORD' favors a divine referent.
    reason: alternative_reading
  - marker: b
    text: Or 'who will intercede for him?' The Hebrew verb can carry the sense of praying or interceding.
    reason: lexical_alternative
