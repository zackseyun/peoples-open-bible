    issue: La nota [a] combina dos asuntos distintos con un solo anclaje inadecuado.
    rationale: El marcador está en 'ofrenda de cereal', pero la nota también explica la distinción entre los dos utensilios hebreos, lo cual debería anclarse a 'sartén'/'plancha' o separarse en otra nota. Tal como está, la documentación auditada no queda bien preservada en español.
  - severity: low
    issue: La frase 'sobre plancha' puede sonar algo elíptica.
    rationale: En español general, 'sobre una plancha' resulta un poco más natural sin alterar el sentido ni sobredeterminar el referente.
  revised_spanish_text: Y toda ofrenda de cereal[a] que se hornee en el horno, y todo lo preparado en sartén o sobre una plancha[b], pertenecerá al sacerdote que la presente.
  revised_footnotes:
