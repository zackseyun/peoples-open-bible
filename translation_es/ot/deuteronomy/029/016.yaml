translation:
  language: es
  text: y ustedes vieron sus cosas detestables y sus ídolos[a], madera y piedra, plata y oro[c][b], que estaban entre ellos—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus abominaciones'. El hebreo שִׁקּוּצִים es un término fuerte de repulsión, usado a menudo para objetos idolátricos.
    reason: lexical_alternative
  - marker: b
    text: El hebreo גִּלּוּלִים es una palabra despectiva para ídolos, quizá con un matiz grosero semejante a 'ídolos de estiércol'.
    reason: lexical_alternative
  - marker: c
    text: O 'que estaban con ellos', refiriéndose a las naciones circundantes por cuyas tierras pasó Israel.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּרְאוּ
  english_pob_choice: and you saw
  chosen_spanish: y vieron
  alternatives_spanish:
  - y ustedes vieron
  - y habéis visto
  lexicon: HALOT
  rationale: El verbo es un wayyiqtol 2mp que continúa la exhortación/recuerdo de Moisés al pueblo. En español, el pretérito simple mantiene el avance narrativo y evita un calco innecesario de la segunda persona explícita, ya implícita en el contexto.
- source_word: שִׁקּוּצֵיהֶם
  english_pob_choice: their detestable things
  chosen_spanish: sus cosas detestables
  alternatives_spanish:
  - sus abominaciones
  - sus cosas abominables
  lexicon: HALOT
  rationale: El término hebreo expresa algo fuertemente repulsivo, especialmente en contexto idolátrico. 'Cosas detestables' conserva el valor de rechazo sin recurrir a una fórmula más tradicional que puede sonar más técnica o menos transparente al lector moderno.
- source_word: גִּלֻּלֵיהֶם
  english_pob_choice: their idols
  chosen_spanish: sus ídolos
  alternatives_spanish:
  - sus imágenes
  - sus ídolos de estiércol
  lexicon: HALOT
  rationale: El hebreo usa un término despectivo para ídolos. 'Ídolos' comunica con claridad el referente; el matiz insultante más fuerte se preserva solo parcialmente en el texto principal, y la nota aclara la tensión léxica.
- source_word: עֵץ וָאֶבֶן
  english_pob_choice: wood and stone
  chosen_spanish: madera y piedra
  alternatives_spanish:
  - de madera y piedra
  - hechos de madera y piedra
  lexicon: HALOT
  rationale: 'Los sustantivos de material funcionan en español de modo natural como una lista appositiva: ''madera y piedra''. Esta solución sigue el orden y la concisión del hebreo, como en la revisión inglesa que separa la enumeración material del sustantivo ''ídolos''.'
- source_word: כֶּסֶף וְזָהָב
  english_pob_choice: silver and gold
  chosen_spanish: plata y oro
  alternatives_spanish:
  - de plata y oro
  lexicon: HALOT
  rationale: Se mantiene la enumeración de materiales en forma breve y natural. La ausencia de preposición en español reproduce mejor la sucesión nominal del original que una construcción más explicativa.
- source_word: אֲשֶׁר עִמָּהֶם
  english_pob_choice: that were among them
  chosen_spanish: que estaban entre ellos
  alternatives_spanish:
  - que estaban con ellos
  - que se hallaban entre ellos
  lexicon: HALOT
  rationale: La cláusula relativa probablemente se refiere a las naciones del contexto inmediato y a los objetos hallados en medio de ellas. 'Entre ellos' conserva esa localización relacional sin sugerir propiedad de Israel sobre los ídolos.
theological_decisions:
- issue: Cómo reflejar la doble carga peyorativa de los términos idolátricos
  english_pob_reading: Use 'detestable things' and 'idols' in the main text, with a note preserving the sharper nuance of גִּלּוּלִים
  chosen_spanish_reading: '''cosas detestables'' y ''ídolos'' en el texto principal, con nota sobre el matiz despectivo más fuerte de גִּלּוּלִים'
  alternative_spanish_readings:
  - '''abominaciones'' y ''ídolos'''
  - '''cosas detestables'' y ''ídolos de estiércol'''
  rationale: El hebreo usa dos términos distintos para objetos idolátricos, uno de disgusto intenso y otro de burla despectiva. El texto principal conserva ambos campos semánticos de manera legible, mientras la nota mantiene visible la aspereza del segundo término sin imponer un lenguaje innecesariamente crudo.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Alcance de la cláusula relativa final
  english_pob_reading: 'Attach to the nations'' possession/presence: ''that were among them'''
  chosen_spanish_reading: '''que estaban entre ellos'' referido al entorno de las naciones del contexto'
  alternative_spanish_readings:
  - '''que estaban con ellos'''
  - '''que les pertenecían'''
  rationale: La cláusula describe la ubicación/presencia de esos objetos en medio de los pueblos mencionados, no una posesión de Israel. 'Entre ellos' conserva el valor contextual y evita una lectura que trasladaría indebidamente la referencia al pueblo de Israel.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión inglesa más reciente que separa la serie material (''wood and stone, silver and gold'') como una enumeración en aposición a ''idols'', no como una sola expresión que modifique solo al primer sustantivo. Por eso el español conserva la pausa con coma: ''sus ídolos, madera y piedra, plata y oro''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar del proyecto solo cuando aparezca el nombre divino; en este versículo no ocurre.
  - No se usa 'SEÑOR' ni se introduce terminología eclesiástica ajena al hebreo.
  - '''cosas detestables'' conserva el tono evaluativo sin traducir mecánicamente como ''abominaciones'', aunque esa opción queda documentada en nota.'
  - La lista de materiales se deja en apposición, con puntuación que refleja la estructura del hebreo y la revisión auditada en inglés.
  - La cláusula final se traduce de forma relacional ('entre ellos') para evitar una lectura posesiva incorrecta.
