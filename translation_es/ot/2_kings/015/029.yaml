    text: 'También puede entenderse: “los llevó al exilio en Asiria” o “los deportó a Asiria”.'
    reason: lexical_alternative
  revision_rationale: Se conserva el sentido del original y la decisión léxica principal sobre וַיַּגְלֵם, pero se corrigen detalles menores de español y de normalización onomástica para una lectura más natural y consistente con el proyecto. No se requiere adjudicación adicional.
