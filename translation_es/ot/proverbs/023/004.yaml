review_pass:
  verdict: revise
  source_alignment_summary: 'El primer hemistiquio está bien encaminado: אַל תִּיגַע לְהַעֲשִׁיר se refleja fielmente como una prohibición contra agotarse para enriquecerse. Sin embargo, el segundo hemistiquio hebreo מִבִּינָתְךָ חֲדָל y la revisión inglesa auditada prefieren una formulación más literal (''cease from your own understanding'') y no la explicitación interpretativa ''deja de depender de''. El borrador español añade una idea no expresada directamente en el texto fuente.'
  spanish_quality_summary: El español es claro y natural, pero 'hacerte rico' suena algo coloquial frente al tono sapiencial; 'llegar a ser rico' encaja mejor con la alternativa documentada y con registro más digno. Además, para respetar la compresión del hebreo y el cambio de la auditoría inglesa, conviene evitar 'depender de', que resuelve demasiado la tensión interpretativa. 'Desiste de tu propio entendimiento' mantiene claridad razonable y mayor fidelidad.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La decisión clave es בינה: ''prudencia'' es posible, pero ''entendimiento'' se alinea mejor con la auditoría inglesa (''understanding'') y evita desplazar el matiz léxico. חדל se expresa mejor como ''desiste de'' o ''cesa de'' que como ''deja de depender de'', porque esto último introduce interpretación adicional.'
  issues:
  - severity: medium
    issue: El segundo hemistiquio añade 'depender de', ausente en el hebreo.
    rationale: Aunque esa interpretación es defendible en notas, la auditoría inglesa revisada volvió a una formulación más literal. El español debe preservar esa tensión en el texto principal, no resolverla.
  - severity: low
    issue: '''Prudencia'' estrecha el campo semántico de בינה.'
    rationale: בינה suele corresponder mejor a 'entendimiento' o 'comprensión'. 'Prudencia' puede sonar más aplicado o moralizante de lo que el hebreo exige aquí.
  - severity: low
    issue: '''Hacerte rico'' es entendible pero menos digno/idiomático en este contexto sapiencial.'
    rationale: Una opción como 'llegar a ser rico' conserva bien la finalidad del infinitivo y suena más natural en registro bíblico contemporáneo.
  revised_spanish_text: No te fatigues para llegar a ser rico[a]; desiste de tu propio entendimiento.
  revised_footnotes:
  - marker: a
    text: 'O: «No te fatigues para hacerte rico; desiste de tu propia sabiduría».'
    reason: lexical_alternative
  revision_rationale: Se ajusta el segundo hemistiquio para reflejar con más literalidad חֲדָל מִבִּינָתְךָ, evitando la adición interpretativa 'depender de'. También se cambia 'prudencia' por 'entendimiento' para alinearse mejor con בינה y con la auditoría inglesa. En el primer hemistiquio, 'llegar a ser rico' ofrece un registro más natural y digno, mientras la alternativa 'hacerte rico' se conserva en nota.
