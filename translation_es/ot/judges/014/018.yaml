translation:
  language: es
  text: 'Y los hombres de la ciudad le dijeron el séptimo día[a], antes de que se pusiera el sol: «¿Qué es más dulce que la miel, y qué es más fuerte que un león?». Y él les dijo: «Si no hubieran arado con mi novilla[b], no habrían descubierto mi acertijo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «antes de que entrara el sol», un modismo hebreo que significa antes de la puesta del sol.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «Si no hubieran arado con mi novilla». Sansón usa una metáfora insultante para referirse a su esposa, acusándolos de haberla usado para resolver el acertijo.
    reason: cultural_note
lexical_decisions:
- source_word: אַנְשֵׁי הָעִיר
  english_pob_choice: the men of the city
  chosen_spanish: los hombres de la ciudad
  alternatives_spanish:
  - los varones de la ciudad
  - los habitantes de la ciudad
  lexicon: HALOT
  rationale: Mantiene el plural masculino explícito del hebreo, como en la traducción inglesa auditada, sin neutralizarlo a un genérico más amplio. 'Hombres' es natural en español y transparente.
- source_word: בַּיּוֹם הַשְּׁבִיעִי
  english_pob_choice: on the seventh day
  chosen_spanish: al séptimo día
  alternatives_spanish:
  - en el séptimo día
  - el séptimo día
  lexicon: HALOT
  rationale: Expresa con naturalidad el marco temporal del hebreo y conserva la referencia ordinal directa del inglés POB.
- source_word: בְּטֶרֶם יָבֹא הַחַרְסָה
  english_pob_choice: before the sun went down
  chosen_spanish: antes de que se pusiera el sol
  alternatives_spanish:
  - antes de que el sol se metiera
  - antes de la puesta del sol
  lexicon: HALOT
  rationale: 'Reproduce el sentido idiomático del hebreo documentado por el POB: no es una referencia literal al movimiento del sol como agente, sino al momento previo al atardecer. ''Se pusiera el sol'' es idiomático y claro en español.'
- source_word: מַה מָּתוֹק מִדְּבַשׁ
  english_pob_choice: What is sweeter than honey
  chosen_spanish: ¿Qué cosa es más dulce que la miel?
  alternatives_spanish:
  - ¿Qué es más dulce que la miel?
  - ¿Qué cosa es dulce de la miel?
  lexicon: HALOT
  rationale: La comparación exigida por el hebreo se preserva con 'más dulce que la miel'. Se mantiene la estructura interrogativa enfática del inglés.
- source_word: וּמֶה עַז מֵאֲרִי
  english_pob_choice: and what is stronger than a lion
  chosen_spanish: y qué cosa es más fuerte que un león
  alternatives_spanish:
  - y qué es más fuerte que un león
  - y qué cosa es más poderoso que un león
  lexicon: HALOT
  rationale: '''Más fuerte'' sigue la decisión inglesa y comunica bien el comparativo. ''Fuerte'' conserva la amplitud semántica de עַז sin forzar a ''manso/fiero''.'
- source_word: לוּלֵא
  english_pob_choice: If ... not
  chosen_spanish: Si no
  alternatives_spanish:
  - De no haber
  - Si ustedes no hubieran
  lexicon: HALOT
  rationale: Expresa la condición contrafactual del hebreo con una forma natural en español, equivalente al inglés 'If you had not...'.
- source_word: חֲרַשְׁתֶּם
  english_pob_choice: had plowed
  chosen_spanish: hubieran arado
  alternatives_spanish:
  - hubieran labrado
  - hubieran trabajado
  lexicon: HALOT
  rationale: Se conserva la metáfora agrícola literal del hebreo, tal como el POB inglés. 'Arado' es el verbo más directo y auditable en español.
- source_word: בְּעֶגְלָתִי
  english_pob_choice: with my heifer
  chosen_spanish: con mi heifer
  alternatives_spanish:
  - con mi novilla
  - con mi vaquilla
  - con mi esposa
  lexicon: HALOT
  rationale: Se preserva el tropo insultante del hebreo de manera transparente. Se deja 'heifer' como préstamo solo en este borrador para no borrar el matiz cultural y metafórico; puede revisarse en edición estilística si se decide una equivalencia española más fluida.
- source_word: מְצָאתֶם
  english_pob_choice: would not have found out
  chosen_spanish: habrían encontrado
  alternatives_spanish:
  - habrían descubierto
  - habrían resuelto
  lexicon: HALOT
  rationale: En contexto de acertijo, el verbo no es meramente localizativo; 'encontrado' mantiene la cercanía al hebreo y al inglés POB, aunque 'descubierto' o 'resuelto' explicitan mejor el valor contextual.
- source_word: חִידָתִי
  english_pob_choice: my riddle
  chosen_spanish: mi enigma
  alternatives_spanish:
  - mi acertijo
  - mi adivinanza
  lexicon: HALOT
  rationale: '''Enigma'' traduce bien חִידָה en un registro digno y literario, y evita una banalización excesivamente coloquial.'
translation_notes:
  revision_awareness: 'El texto se ajusta al inglés POB auditado y al hebreo masorético. Se mantiene la equivalencia óptima del POB: comparación proverbial, idiomática temporal y metáfora agrícola literal. No se detectaron revisiones aplicadas en el historial inmediato; el borrador sigue el estado estable de la traducción auditada.'
  spanish_consistency_notes:
  - Se usa 'Dios' solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se mantiene el paralelismo interrogativo de las dos preguntas retóricas.
  - Se conserva la metáfora de 'arar' y el tropo de 'mi heifer' para no diluir la acusación de Sansón.
  - Se eligió 'enigma' como término literario y transparente para חִידָה en este contexto narrativo.
