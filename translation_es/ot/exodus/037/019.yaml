translation:
  language: es
  text: Tres copas en forma de flor de almendro[a] había en una rama, con bulbo[b] y flor; y tres copas en forma de flor de almendro había en una rama, con bulbo[b] y flor. Así era en las seis ramas que salían del candelabro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tres copas hechas como flores de almendro… y tres copas hechas como flores de almendro»'
    reason: lexical_alternative
  - marker: b
    text: «Bulbo» también puede traducirse «botón», refiriéndose a un adorno ornamental redondeado del candelabro.
    reason: lexical_alternative
lexical_decisions:
- source_word: גְבִעִים
  english_pob_choice: cups
  chosen_spanish: copas
  alternatives_spanish:
  - vasos
  - cáliz
  lexicon: HALOT
  rationale: El hebreo designa recipientes o formas ornamentales semejantes a copas; «copas» mantiene la imagen concreta y es natural en español. «Cáliz» podría sugerir una forma más litúrgica o técnica, pero no es necesario aquí.
- source_word: מְשֻׁקָּדִים
  english_pob_choice: almond-blossom-shaped
  chosen_spanish: con forma de flor de almendro
  alternatives_spanish:
  - con forma de almendra
  - como flores de almendro
  - almendrado
  lexicon: HALOT
  rationale: La idea no es solo la almendra como fruto, sino el adorno modelado según la flor del almendro. «Con forma de flor de almendro» conserva el carácter floral que el inglés POB explicitó y evita una ambigüedad meramente frutal.
- source_word: קָנֶה
  english_pob_choice: branch
  chosen_spanish: rama
  alternatives_spanish:
  - brazo
  - vara
  lexicon: HALOT
  rationale: En el contexto de la menorá, el término se refiere a una de las partes laterales que salen del soporte central. «Rama» es claro y transmite la imagen orgánica del texto; «brazo» también sería posible, pero suena más mecánico.
- source_word: כַּפְתֹּר
  english_pob_choice: bulb
  chosen_spanish: cáliz
  alternatives_spanish:
  - nudo
  - botón
  - nudo redondeado
  lexicon: HALOT
  rationale: El POB inglés optó por «bulb», entendido como un ornamento redondeado. En español, «cáliz» comunica mejor la forma ornamental asociada al conjunto floral del versículo, aunque sigue habiendo cierta tensión lexical porque el término podría aludir también a un abultamiento o nudo decorativo.
- source_word: פֶרַח
  english_pob_choice: flower
  chosen_spanish: flor
  alternatives_spanish:
  - floración
  - flor abierta
  lexicon: HALOT
  rationale: La correspondencia directa es «flor», que mantiene la simetría con la descripción precedente y con el motivo de almendro.
- source_word: כֵּן
  english_pob_choice: So it was
  chosen_spanish: Así era
  alternatives_spanish:
  - Así fue
  - De igual manera
  lexicon: HALOT
  rationale: La partícula resume el patrón repetido en las seis ramas. «Así era» suena fluido en español y conserva el carácter resumitivo del hebreo.
- source_word: הַיֹּצְאִים מִן הַמְּנֹרָה
  english_pob_choice: coming out from the lampstand
  chosen_spanish: que salían del candelabro
  alternatives_spanish:
  - que salían de la menorá
  - que brotaban del candelabro
  lexicon: HALOT
  rationale: El verbo describe las ramas como si ‘salieran’ del cuerpo central. «Candelabro» traduce el objeto de forma inteligible en español; se evita transliterar «menorá» porque el POB inglés también priorizó un término común.
translation_notes:
  revision_awareness: 'La redacción sigue el último estado sin cambios del inglés POB y conserva sus decisiones principales: «cups» → «copas», «almond-blossom-shaped» → una expresión floral explícita, «branch» → «rama», y el resumen final del patrón repetido para las seis ramas. Se ajustó el elemento ornamental de כַּפְתֹּר a una opción española legible sin perder la tensión de forma redondeada.'
  spanish_consistency_notes:
  - Se mantiene «candelabro» para מְנֹרָה, en línea con la opción inglesa de «lampstand» y para evitar una transliteración innecesaria.
  - Se conserva «flor de almendro» para hacer visible el componente floral del adorno, que en español quedaría demasiado comprimido si se dijera solo «almendrado».
  - No se usa «SEÑOR» ni terminología doctrinal ajena al versículo.
  - 'La colocación de las notas sigue los puntos de mayor ambigüedad léxica: la comparación floral, la posible lectura de קָנֶה, y el resumen final del patrón.'
