translation:
  language: es
  text: 'Te lo declaré desde hace mucho; antes de que sucediera[a], te lo hice oír, no sea que dijeras: «Mi ídolo las hizo, y mi imagen tallada y mi imagen fundida[b] las mandaron».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «antes de que viniera». El hebreo dice literalmente «antes de que viniera / llegara».'
    reason: lexical_alternative
  - marker: b
    text: «Imagen fundida» también puede traducirse «imagen de fundición».
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאַגִּיד
  english_pob_choice: I declared
  chosen_spanish: te lo declaré
  alternatives_spanish:
  - te lo dije
  - te lo anuncié
  lexicon: HALOT
  rationale: El verbo hebreo en hifil comunica hacer saber o declarar formalmente. «Te lo declaré» conserva el tono profético y solemne mejor que un simple «te lo dije».
- source_word: מֵאָז
  english_pob_choice: long ago
  chosen_spanish: desde hace mucho
  alternatives_spanish:
  - desde entonces
  - desde antiguo
  - hace ya mucho
  lexicon: HALOT
  rationale: La expresión señala una anticipación remota anterior al cumplimiento. «Desde hace mucho» es natural en español y mantiene la idea de distancia temporal.
- source_word: בְּטֶרֶם תָּבוֹא
  english_pob_choice: before it came to pass
  chosen_spanish: antes de que sucediera
  alternatives_spanish:
  - antes de que llegara
  - antes de que ocurriera
  lexicon: HALOT
  rationale: El hebreo apunta a la llegada/ocurrencia del hecho anunciado. En español, «antes de que sucediera» expresa con claridad ese valor eventivo sin perder fidelidad.
- source_word: הִשְׁמַעְתִּיךָ
  english_pob_choice: I made you hear it
  chosen_spanish: te lo hice oír
  alternatives_spanish:
  - te lo hice escuchar
  - te lo hice saber
  lexicon: HALOT
  rationale: El hifil de שמע es causativo. «Te lo hice oír» preserva esa fuerza mejor que una traducción más libre como «te lo anuncié».
- source_word: עָצְבִּי
  english_pob_choice: my idol
  chosen_spanish: mi ídolo
  alternatives_spanish:
  - mi imagen
  - mi ídolo fabricado
  lexicon: HALOT
  rationale: Aquí el sustantivo se refiere a un ídolo. «Ídolo» es la equivalencia española más directa y clara, y mantiene el contraste polémico con los otros términos.
- source_word: עָשָׂם
  english_pob_choice: did them
  chosen_spanish: las hizo
  alternatives_spanish:
  - las produjo
  - las hizo acontecer
  lexicon: HALOT
  rationale: El sufijo plural remite a las cosas o sucesos previamente anunciados. «Las hizo» conserva el valor de causar/realizar esos hechos y suena natural en español.
- source_word: פִסְלִי
  english_pob_choice: my carved image
  chosen_spanish: mi imagen tallada
  alternatives_spanish:
  - mi imagen esculpida
  - mi imagen grabada
  lexicon: HALOT
  rationale: פסל designa una imagen trabajada por talla o escultura. «Imagen tallada» comunica bien el proceso artesanal sin caer en un arcaísmo.
- source_word: וְנִסְכִּי
  english_pob_choice: my cast image
  chosen_spanish: mi imagen fundida
  alternatives_spanish:
  - mi imagen vaciada
  - mi imagen moldeada
  - mi imagen de fundición
  lexicon: HALOT
  rationale: נסך alude a una imagen hecha por fundición o vaciado. «Imagen fundida» mantiene la distinción con la imagen tallada y refleja el sentido material del término.
- source_word: צִוָּם
  english_pob_choice: commanded them
  chosen_spanish: las mandaron
  alternatives_spanish:
  - las ordenaron
  - las dieron orden
  lexicon: HALOT
  rationale: El verbo צוה significa mandar/ordenar. En el contexto irónico, las imágenes son tratadas como si hubieran dado órdenes a los acontecimientos; «las mandaron» reproduce ese matiz con un sujeto plural implícito en español.
theological_decisions:
- issue: Mantener la triple diferencia entre idol, carved image y cast image
  english_pob_reading: 'Use three differentiated expressions: ''idol,'' ''carved image,'' and ''cast image.'''
  chosen_spanish_reading: 'Usar tres expresiones diferenciadas: «ídolo», «imagen tallada» e «imagen fundida».'
  alternative_spanish_readings:
  - repetir simplemente «ídolo» en los tres casos
  - usar la pareja tradicional «imagen esculpida» y «imagen de fundición»
  rationale: El hebreo acumula tres términos emparentados pero no idénticos para intensificar la burla contra los falsos dioses. La traducción española conserva esa gradación léxica para no aplanar la retórica del texto.
  doctrine_reference: 'Translation philosophy #5 (consistencia de términos clave, o excepción documentada)'
- issue: Valor de la causalidad divina en 'I made you hear it'
  english_pob_reading: I made you hear it
  chosen_spanish_reading: te lo hice oír
  alternative_spanish_readings:
  - te lo anuncié
  - te lo dejé oír
  rationale: La forma causativa hebrea subraya que el mensaje fue hecho llegar al oyente. «Te lo hice oír» preserva mejor esa causalidad que una simple formulación declarativa.
  doctrine_reference: Consistencia con el valor verbal del hifil en el texto fuente
translation_notes:
  revision_awareness: 'Coincido con la revisión más reciente: no se requieren cambios adicionales; la versión española mantiene el tono profético, la causalidad del hifil y la distinción entre los tres términos idolátricos del versículo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma predeterminada del nombre divino, aunque este versículo no lo contiene.
  - Se preserva el paralelismo y la ironía final del hebreo sin introducir explicaciones extra.
  - Se usa el pretérito perfecto simple/compuesto de manera idiomática en español para reflejar la anterioridad profética del texto.
