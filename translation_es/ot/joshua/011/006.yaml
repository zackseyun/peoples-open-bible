    reason: lexical_alternative
  revision_rationale: Se corrige la prohibición para un español más natural y fiel al sentido idiomático («No les tengas miedo»), se fortalece חֲלָלִים con «como caídos» en vez de «como muertos», se elimina una nota irrelevante, y se ajusta «con fuego» para una mejor correspondencia y legibilidad.
