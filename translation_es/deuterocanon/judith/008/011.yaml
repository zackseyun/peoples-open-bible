  to: 'Y ellos vinieron a ella, y ella les dijo: «Escúchenme, gobernantes de los habitantes de Betulia, porque no es correcta la palabra que hablaron contra el pueblo en este día, y han establecido el juramento que pronunciaron entre Dios y ustedes mismos, y dijeron que entregarían la ciudad a nuestros enemigos, si en estos días[a] Yahvé no vuelve para ayudarlos».'
