translation:
  language: es
  text: Y había ceniza sobre sus turbantes, y clamaban al Señor con todas sus fuerzas, para que mirara[a] con favor a toda la casa de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “mirara a toda la casa de Israel para bien”. El griego combina la idea de visitar o atender a Israel con intención favorable.
    reason: lexical_alternative
lexical_decisions:
- source_word: σποδός
  english_pob_choice: ash
  chosen_spanish: ceniza
  alternatives_spanish:
  - ceniza
  - polvo de ceniza
  lexicon: LSJ
  rationale: σποδός denota ceniza. En español, 'ceniza' funciona de manera natural como sustantivo de materia y evita una construcción forzada. Mantiene la imagen de duelo o humillación ritual sin añadir interpretación.
- source_word: κιδάρεις
  english_pob_choice: turbans
  chosen_spanish: turbantes
  alternatives_spanish:
  - tocados
  - cubrecabezas
  - mitras
  lexicon: LSJ
  rationale: El término alude a un tocado enrollado para la cabeza. 'Turbantes' es el equivalente más claro y fiel en español moderno; 'mitras' introduciría un matiz eclesiástico ajeno al contexto, y 'tocados' o 'cubrecabezas' serían demasiado genéricos.
- source_word: ἐβόων
  english_pob_choice: were crying out
  chosen_spanish: gritaban
  alternatives_spanish:
  - clamaban
  - seguían clamando
  - alzaban la voz
  lexicon: LSJ
  rationale: El imperfecto expresa acción continua o reiterada. 'Gritaban' conserva esa intensidad de súplica pública; 'clamaban' también sería posible, pero 'gritar' refleja mejor la vehemencia del verbo en este contexto de oración urgente.
- source_word: πρὸς Κύριον
  english_pob_choice: to the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor
  - a Yahvé
  - al Señor Dios
  lexicon: LSJ
  rationale: Aunque el proyecto usa 'Yahvé' para יהוה, aquí el texto griego dice Κύριον y la audita inglesa mantiene 'the Lord'. En español, 'al Señor' reproduce naturalmente el título divino sin forzar una identificación que el griego no explicita con el nombre propio.
- source_word: ἐκ πάσης δυνάμεως
  english_pob_choice: with all their strength
  chosen_spanish: con todas sus fuerzas
  alternatives_spanish:
  - con toda su fuerza
  - con todas sus fuerzas
  - con toda su energía
  lexicon: LSJ
  rationale: La expresión es idiomática para indicar intensidad plena. 'Con todas sus fuerzas' es la equivalencia española más natural y transmite bien la totalidad del empeño.
- source_word: εἰς ἀγαθόν
  english_pob_choice: with favor
  chosen_spanish: con favor
  alternatives_spanish:
  - para bien
  - para su bien
  - benignamente
  lexicon: LSJ
  rationale: Con ἐπισκέψασθαι, la frase expresa una mirada o atención benéfica. 'Con favor' comunica esa idea de beneplácito de manera breve y fiel, sin reducirla a un simple beneficio abstracto.
- source_word: ἐπισκέψασθαι
  english_pob_choice: look
  chosen_spanish: mirara
  alternatives_spanish:
  - visitara
  - mirara
  - atendiera
  lexicon: LSJ
  rationale: El verbo puede significar visitar o mirar con intención de atender. En este contexto de súplica, 'mirara con favor' preserva tanto la idea de atención como la intención benéfica que la nota inglesa documenta.
- source_word: πᾶν οἶκον Ἰσραήλ
  english_pob_choice: the whole house of Israel
  chosen_spanish: toda la casa de Israel
  alternatives_spanish:
  - toda la casa de Israel
  - la casa entera de Israel
  - todo el pueblo de Israel
  lexicon: LSJ
  rationale: La frase es una designación colectiva del pueblo, no de viviendas individuales. 'Toda la casa de Israel' conserva esa carga bíblica corporativa y sigue de cerca la estructura original.
theological_decisions:
- issue: Titulación divina de Κύριος en una oración deuterocanónica griega
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Señor
  - Yahvé
  rationale: El griego presenta Κύριον, no el tetragrama. En español, 'el Señor' es la forma más natural y reverente para un destinatario divino en oración. No se reemplaza por 'Yahvé' porque no hay aquí una cita directa del nombre hebreo en el texto base griego.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, κύριος → Lord'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail inglés, que corrigió 'ashes' a la forma más natural 'ash' para σποδός. En español se optó por 'ceniza', que funciona como equivalente natural de materia y evita una pluralización innecesaria.
  spanish_consistency_notes:
  - Se mantuvo 'Señor' para Κύριος, conforme al audit trail en inglés y al hecho de que el griego no usa el tetragrama.
  - Se evitó 'Cristo' o terminología litúrgica no sustentada por el texto.
  - Se conservó la imagen colectiva 'casa de Israel' por su fuerza bíblica y corporativa.
  - La nota de pie de página se ancló en 'con favor' / 'mirara con favor' porque ahí se concentra la ambigüedad lexical documentada.
