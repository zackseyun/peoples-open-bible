    changes_summary: Revised the opening to reflect the Hebrew more directly ('there will no longer be for the house of Israel' rather than 'the house of Israel will no longer have'). Kept both plant images and participles explicit with 'causing bitterness' and 'causing pain,' and clarified מִכֹּל סביבותם as 'from among all those around them.'
translation:
  language: es
  text: Y no habrá ya para la casa de Israel un espino que cause amargura[a] ni una espina que cause dolor, de entre todos los que están alrededor de ellos y los desprecian. Y sabrán que yo soy el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «zarza que cause amargura»; la imagen hebrea es la de una planta espinosa e injuriosa usada metafóricamente para vecinos hostiles.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלֹא יִהְיֶה עוֹד
  english_pob_choice: there will no longer be
  chosen_spanish: Y no habrá ya
  alternatives_spanish:
  - Y no existirá más
  - Ya no habrá
  lexicon: HALOT / uso del hebreo existencial
  rationale: El hebreo expresa negación existencial con continuidad temporal; «no habrá ya» comunica bien la cesación futura sin añadir matices ajenos.
- source_word: לְבֵית יִשְׂרָאֵל
  english_pob_choice: for the house of Israel
  chosen_spanish: para la casa de Israel
  alternatives_spanish:
  - para Israel
  - en la casa de Israel
  lexicon: HALOT
  rationale: Se conserva la fórmula pactual «la casa de Israel», y la preposición «para» mantiene la relación de beneficio/protección del giro hebreo.
- source_word: סִלּוֹן
  english_pob_choice: brier
  chosen_spanish: zarzal
  alternatives_spanish:
  - espino
  - zarza
  lexicon: HALOT
  rationale: El término apunta a una planta espinosa e injuriosa; «zarzal» funciona en español bíblico sin perder la imagen vegetal hostil. Se evita reducirlo solo a «espina», porque aquí hay una figura vegetal completa.
- source_word: מַמְאִיר
  english_pob_choice: causing bitterness
  chosen_spanish: que amargue
  alternatives_spanish:
  - que cause amargura
  - amargante
  lexicon: HALOT
  rationale: El participio transmite efecto dañino/embargante. «Que amargue» conserva la fuerza verbal y el vínculo semántico con amargura, sin sonar rígido en español.
- source_word: וְקֹץ
  english_pob_choice: thorn
  chosen_spanish: ni una espina
  alternatives_spanish:
  - ni un espino
  - ni un aguijón
  lexicon: HALOT
  rationale: «Espina» es la equivalencia más natural y clara en español para el segundo miembro paralelo, manteniendo la pareja de imágenes punzantes.
- source_word: מַכְאִב
  english_pob_choice: that causes pain
  chosen_spanish: que duela
  alternatives_spanish:
  - que cause dolor
  - dolorosa
  lexicon: HALOT
  rationale: El participio es causativo; «que duela» reproduce de forma idiomática la idea de producir dolor, con un paralelismo verbal similar al hebreo.
- source_word: מִכֹּל סְבִיבֹתָם
  english_pob_choice: from among all those around them
  chosen_spanish: de entre todos los que están alrededor de ellos
  alternatives_spanish:
  - de entre todos sus alrededores
  - de todos los pueblos que los rodean
  lexicon: HALOT
  rationale: La frase no habla solo de espacio, sino del conjunto de vecinos/enemigos circundantes. «Los que están alrededor de ellos» mantiene la amplitud referencial y la preposición de extracción «de entre».
- source_word: הַשָּׁאטִים אוֹתָם
  english_pob_choice: who despise them
  chosen_spanish: y los desprecian
  alternatives_spanish:
  - y los menosprecian
  - y los desoyen con desprecio
  lexicon: HALOT
  rationale: El participio denota trato desdeñoso/hostil. «Desprecian» es directo, fuerte y ampliamente inteligible en español bíblico contemporáneo.
- source_word: וְיָדְעוּ כִּי אֲנִי
  english_pob_choice: Then they will know that I am
  chosen_spanish: Y sabrán que yo soy
  alternatives_spanish:
  - Entonces sabrán que yo soy
  - Y conocerán que yo soy
  lexicon: HALOT
  rationale: «Sabrán» recoge el verbo ידע en su sentido de reconocer/percibir con certeza. El conector «Y» deja que el resultado se derive del contexto sin forzar una paráfrasis temporal excesiva.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: Yahvé, el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor Dios
  lexicon: HALOT
  rationale: Se mantiene «Yahvé» para el Tetragrámaton conforme al marco del proyecto, y «el Señor» para אֲדֹנָי. La combinación evita la redundancia «Señor SEÑOR» y preserva ambos títulos divinos.
theological_decisions:
- issue: Tratamiento del Tetragrámaton en la fórmula final
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Yahvé, el Señor
  alternative_spanish_readings:
  - el Señor Yahvé
  - Yahvé, el Dios
  rationale: El hebreo distingue אֲדֹנָי de יְהוִה. En español, «Yahvé, el Señor» conserva ambos elementos sin perder el nombre pactal divino ni confundirlos en una sola forma de tratamiento.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail al reflejar la estructura existencial inicial («no habrá ya para la casa de Israel»), conservar los dos miembros paralelos de plantas punzantes, y explicitar el origen entre los pueblos/vecinos circundantes. También ajusta la clausula divina final para respetar la distinción entre אֲדֹנָי y יְהוִה con la terminología del proyecto en español.
  spanish_consistency_notes:
  - Se usa «casa de Israel» como fórmula estable del texto.
  - Se mantiene «Yahvé» para יְהוִה en coherencia con el estándar del proyecto.
  - Se conserva el paralelismo de los dos sustantivos botánicos y sus participios causativos.
  - «Sabrán» traduce ידע con valor de reconocimiento cierto, no mera información.
  - La nota al pie se ancla en «zarzal» porque ahí aparece la primera imagen vegetal con mayor carga metafórica.
