    reason: alternative_reading
  revision_rationale: 'La revisión hace un ajuste pequeño pero importante de naturalidad en español: reemplaza la perífrasis progresiva por un presente simple más idiomático en una pregunta retórica poética. También fortalece la nota [a] para reflejar mejor la dureza deshumanizante explicitada en el rastro auditado. El resto del texto se conserva porque ya sigue bien el hebreo y las decisiones del POB inglés.'
