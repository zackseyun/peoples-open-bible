translation:
  language: es
  text: Entonces David llegó a Saúl y estuvo ante él[a]; y Saúl lo amó mucho, y llegó a ser su escudero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su portador de armas» o «portador de equipo militar». El hebreo se refiere literalmente a uno que lleva el equipo militar de otro.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - fue
  lexicon: HALOT
  rationale: En este contexto narrativo, בוא expresa movimiento hacia Saúl. «Llegó a Saúl» conserva la dirección del verbo y suena natural en español.
- source_word: וַיַּעֲמֹד לְפָנָיו
  english_pob_choice: stood before him
  chosen_spanish: se puso delante de él
  alternatives_spanish:
  - estuvo delante de él
  - se mantuvo ante él
  lexicon: HALOT
  rationale: La locución hebrea mantiene la imagen de estar en presencia de un superior. «Se puso delante de él» comunica la postura y deja abierta la idea de servicio cortesano.
- source_word: וַיֶּאֱהָבֵהוּ מְאֹד
  english_pob_choice: Saul loved him greatly
  chosen_spanish: Saúl lo amó mucho
  alternatives_spanish:
  - Saúl lo amó grandemente
  - Saúl lo quiso mucho
  lexicon: HALOT
  rationale: Se conserva el sujeto implícito del contexto y el verbo directo de amor. «Lo amó mucho» reproduce היטב la intensidad de מְאֹד sin suavizarla.
- source_word: וַיְהִי לוֹ
  english_pob_choice: he became his
  chosen_spanish: llegó a ser su
  alternatives_spanish:
  - fue su
  - quedó siendo su
  lexicon: HALOT
  rationale: La construcción marca un cambio de estado o nombramiento. En español, «llegó a ser su» expresa mejor ese resultado que una simple copulativa.
- source_word: נֹשֵׂא כֵלִים
  english_pob_choice: armor-bearer
  chosen_spanish: escudero
  alternatives_spanish:
  - portador de armas
  - portador de la armadura
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «el que lleva los objetos/equipo», en español «escudero» es un equivalente funcional y reconocible para una función militar-cortesana, sin perder el sentido de asistencia armada.
theological_decisions:
- issue: Título/función militar de נֹשֵׂא כֵלִים
  english_pob_reading: armor-bearer; the Hebrew literally refers to one who carries military equipment.
  chosen_spanish_reading: escudero; entendido como servidor militar que porta el equipo de su superior.
  alternative_spanish_readings:
  - portador de armas
  - portador del equipo militar
  rationale: No hay una carga doctrinal especial, pero sí una decisión terminológica. «Escudero» es la forma más idiomática en español para la función descrita y preserva la relación de servicio armando, aunque el hebreo sea más literal.
  doctrine_reference: Uso léxico; sin referencia doctrinal específica
translation_notes:
  revision_awareness: 'Se mantiene el sentido del texto hebreo y la solución inglesa establecida: llegada a Saúl, postura de servicio, afecto intenso de Saúl y función militar de asistencia. La única adaptación relevante es «escudero» como equivalente funcional español para נֹשֵׂא כֵלִים.'
  spanish_consistency_notes:
  - Se conserva «Saúl» y «David» como nombres propios estándar.
  - «Se puso delante de él» mantiene la imagen hebrea de presencia/servicio sin convertirla en una paráfrasis interpretativa.
  - La nota al pie preserva la alternativa literal ya documentada por la POB en inglés.
  - No se introdujo terminología eclesiástica; el registro es cortesano-militar, acorde al contexto.
