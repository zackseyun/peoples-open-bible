base_translation:
  language: en
  yaml_path: translation/ot/1_kings/019/011.yaml
  text: And he said[a], “Go out and stand on the mountain before Yahweh.” And behold, Yahweh was passing by, and a great and strong wind was tearing apart the mountains and shattering rocks before Yahweh, but Yahweh was not in the wind. And after the wind, an earthquake[b], but Yahweh was not in the earthquake.
  footnotes:
  - marker: a
    text: Hebrew 'the LORD was not in the wind.' This may imply not being revealed in it, but the translation keeps the more literal wording.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the LORD was not in the earthquake.' The text does not deny the LORD's sovereignty over the event; it states that he was not in it in the sense expressed by the narrative.
    reason: lexical_alternative
