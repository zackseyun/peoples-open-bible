  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: encabezado de colección, dirección de la oración, gesto de alzar los ojos y referencia al Dios celestial con matiz regio. Sin embargo, «Ascensos» no es la mejor preservación del título tradicional ni del valor semántico de הַמַּעֲלוֹת; en español bíblico y eclesial se entiende mejor «ascensiones» o, más naturalmente, «subidas». Además, la nota a está anclada al lugar equivocado: la alternativa explicada corresponde a la segunda palabra del encabezado, no a «Cántico».'
