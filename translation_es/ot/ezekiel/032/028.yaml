translation:
  language: es
  text: Pero tú, en medio de los incircuncisos, serás quebrantado y yacerás con los que murieron a espada[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «con los muertos de espada».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַתָּה
  english_pob_choice: But you
  chosen_spanish: Pero tú
  alternatives_spanish:
  - Y tú
  - Pero tú mismo
  - Y tú mismo
  lexicon: HALOT
  rationale: La conjunción más el pronombre independiente introducen un giro enfático y adversativo en el lamento. «Pero tú» conserva ese contraste mejor que un simple «y», y mantiene el señalamiento directo del destinatario.
- source_word: בְּ/ת֧וֹךְ
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - entre
  - en el centro de
  lexicon: HALOT
  rationale: La expresión indica ubicación dentro de un grupo. «En medio de» es natural en español y preserva el tono solemne del hebreo y de la traducción inglesa auditada.
- source_word: עֲרֵלִים
  english_pob_choice: the uncircumcised
  chosen_spanish: los incircuncisos
  alternatives_spanish:
  - los no circuncidados
  - los foreskinados
  lexicon: HALOT
  rationale: Se mantiene el término literal y culturalmente marcado. «Incircuncisos» conserva la carga covenantal y de vergüenza funeraria del hebreo sin neutralizarla como «impíos» o «impuros».
- source_word: תִּשָּׁבַר
  english_pob_choice: will be broken
  chosen_spanish: serás quebrantado
  alternatives_spanish:
  - serás roto
  - serás destrozado
  - serás quebrado
  lexicon: HALOT
  rationale: El nifal expresa pasividad de juicio/ruina. «Quebrantado» comunica el daño y la derrota con un registro digno en español bíblico, evitando un calco demasiado materialista como «roto».
- source_word: וְ/תִשְׁכַּב
  english_pob_choice: and will lie
  chosen_spanish: y yacerás
  alternatives_spanish:
  - y te acostarás
  - y descansarás
  lexicon: HALOT
  rationale: En contexto mortuorio, שׁכב funciona como eufemismo de yacer en la muerte o en la sepultura. «Yacerás» preserva ese matiz funerario mejor que «estarás acostado» o «te acostarás».
- source_word: אֶת חַלְלֵי חָרֶב
  english_pob_choice: with those slain by the sword
  chosen_spanish: con los muertos heridos a espada
  alternatives_spanish:
  - con los caídos por espada
  - con los heridos de espada
  - con los muertos de espada
  lexicon: HALOT
  rationale: La construcción puede entenderse como compañía con los muertos. «Muertos heridos a espada» conserva el doble componente de muerte violenta y la referencia literal a la espada. Se evita suavizar el hebreo con una paráfrasis genérica.
theological_decisions:
- issue: Valor covenantal y de vergüenza de «los incircuncisos» en un oráculo fúnebre
  english_pob_reading: Retain the literal covenantal/cultural term 'the uncircumcised' rather than interpret it as a generalized label such as 'the godless' or 'the unclean.'
  chosen_spanish_reading: Conservar «los incircuncisos» en lugar de reemplazarlo por categorías interpretativas como «los impíos» o «los inmundos».
  alternative_spanish_readings:
  - los impíos
  - los inmundos
  - los paganos
  rationale: El hebreo usa un término corporal y socialmente cargado. En Ezequiel 32 funciona como marcador de deshonra en la muerte entre las naciones; traducirlo literalmente preserva la textura teológica y cultural sin introducir una categoría doctrinal no expresada en el versículo.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se necesitaban cambios; el borrador español sigue de cerca la lectura inglesa auditada y el hebreo, manteniendo la ambigüedad de compañía funeraria en la frase final.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Incircuncisos» se conserva como término técnico/cultural consistente con el léxico del libro de Ezequiel.
  - Se eligió un registro solemne y bíblico, pero con sintaxis natural en español moderno.
