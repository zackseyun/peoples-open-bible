revisions:
- from: Además[a], Josías quitó a los médiums, a los espiritistas, a los dioses domésticos, a los ídolos y a todas las abominaciones que se veían en la tierra de Judá y en Jerusalén, para establecer las palabras de la ley escritas en el libro[b] que halló Hilcías, el sacerdote, en la casa de Yahvé.
  to: Además[a], Josías quitó a los médiums, a los espiritistas, a los dioses domésticos, a los ídolos y a todas las abominaciones que se veían en la tierra de Judá y en Jerusalén, para establecer las palabras de la ley escritas en el libro[b] que el sacerdote Hilcías encontró en la casa de Yahvé.
