  rationale: Se cambia «esto» por «estas cosas» para reflejar mejor el plural hebreo אֵלֶּה y sostener un tono más formal. Se reubica el marcador de la nota al pie junto a la fórmula repetida que la nota realmente comenta, cumpliendo además la disciplina de anclaje exigida. El resto del texto se mantiene porque preserva bien el sentido fuente, la decisión teológica sobre «iniquidad» y la fórmula día-año.
