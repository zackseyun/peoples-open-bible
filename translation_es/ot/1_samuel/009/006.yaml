base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/009/006.yaml
  text: He said to him[a], “Look now, there is a man of God in this city, and the man is held in honor; all that he says surely comes to pass. Now let us go there[b]. Perhaps he will tell us the way on which we have gone.”
  footnotes:
