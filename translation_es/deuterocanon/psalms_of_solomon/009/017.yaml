translation:
  language: es
  text: Porque tú escogiste la descendencia de Abraham sobre todas las naciones[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la simiente de Abraham» o «los descendientes de Abraham».
    reason: lexical_alternative
  - marker: b
    text: O «más allá de todas las naciones» o «más que todas las naciones».
    reason: alternative_reading
lexical_decisions:
- source_word: ἡρέτισω
  english_pob_choice: chose
  chosen_spanish: escogiste
  alternatives_spanish:
  - elegiste
  - seleccionaste
  lexicon: LSJ
  rationale: El verbo griego expresa elección deliberada. «Escogiste» comunica esa acción de manera natural en español y conserva la fuerza electiva sin añadir matices ajenos.
- source_word: σπέρμα
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - simiente
  - semilla
  - descendientes
  lexicon: LSJ
  rationale: En español, «descendencia» preserva el sentido colectivo y genealógico de forma clara y digna. «Simiente» sería más literal pero menos natural; «descendientes» es posible, pero «descendencia» mantiene mejor la unidad colectiva del término.
- source_word: παρὰ
  english_pob_choice: above
  chosen_spanish: sobre
  alternatives_spanish:
  - por encima de
  - más que
  - al margen de
  lexicon: LSJ
  rationale: Con valor comparativo, la preposición indica preferencia o elevación frente a otros. «Sobre» reproduce esa comparación de modo directo y transparente en español.
- source_word: ἔθνη
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - pueblos
  - gentiles
  lexicon: LSJ
  rationale: «Naciones» es la opción menos interpretativa y la más fiel al contraste amplio del griego. «Gentiles» introduciría una oposición técnico-religiosa que el texto griego no exige aquí.
theological_decisions:
- issue: Lenguaje de elección/covenio respecto de Abraham y las naciones
  english_pob_reading: Render the statement straightforwardly as God's choosing of Abraham's offspring over the nations.
  chosen_spanish_reading: Presentar sin atenuación que Dios escogió a la descendencia de Abraham sobre las naciones.
  alternative_spanish_readings:
  - Dios apartó a la descendencia de Abraham de entre todas las naciones
  - Dios prefirió a la descendencia de Abraham por encima de todos los pueblos
  rationale: El texto afirma una elección divina real y comparativa. La redacción española conserva ese peso teológico sin convertirlo en una paráfrasis ni diluir la comparación original.
  doctrine_reference: Elección/covenio en la línea de Abraham; no se introduce una categoría doctrinal posterior que el verso no formule explícitamente.
translation_notes:
  revision_awareness: El texto griego fue revisado y confirmado como de alta concordancia; no se detectaron cambios necesarios en la última pasada. La versión española sigue de cerca la lectura auditada del POB inglés, manteniendo las alternativas léxicas y comparativas relevantes.
  spanish_consistency_notes:
  - Se mantiene «naciones» para ἔθνη, evitando «gentiles» por ser más interpretativo.
  - Se usa «descendencia» para σπέρμα, preservando el colectivo genealógico sin forzar un calco de «simiente».
  - La comparación de παρὰ se refleja con «sobre», connota preferencia sin sobreexplicar el griego.
  - El orden y la sintaxis permanecen sobrios y publicables, con puntuación española estándar.
