  rationale: Se corrige el nombre propio 'Quet' a 'Cohat' para ajustarlo fielmente al hebreo קהת y al uso bíblico estándar en español. Se reubica la nota textual al nombre 'Bileam', que es el elemento al que realmente se refiere la variante con 'Ibleam'. No se requieren otros cambios sustanciales.
