translation:
  language: es
  text: Porque aun si alguien es perfecto entre los hijos de los hombres[a], aparte de la sabiduría que procede de ti, será tenido por nada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre los seres humanos». El griego dice literalmente «entre los hijos de los hombres», una expresión tradicional para la humanidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: κἂν γάρ τις ᾖ
  english_pob_choice: For even if someone is
  chosen_spanish: Porque aun si alguien es
  alternatives_spanish:
  - Pues aun si alguien fuera
  - Porque incluso si alguien es
  lexicon: LSJ
  rationale: El griego expresa una concesión con fuerza explicativa. «Porque aun si» conserva el enlace de γάρ y la concesión de κἂν de manera natural en español.
- source_word: τέλειος
  english_pob_choice: perfect
  chosen_spanish: perfecto
  alternatives_spanish:
  - completo
  - maduro
  - acabado
  lexicon: LSJ
  rationale: En este contexto sapiencial, τέλειος tiene un valor evaluativo pleno. «Perfecto» mantiene esa fuerza sin diluirla en una paráfrasis más interpretativa.
- source_word: ἐν υἱοῖς ἀνθρώπων
  english_pob_choice: among the sons of men
  chosen_spanish: entre los hijos de los hombres
  alternatives_spanish:
  - entre los seres humanos
  - entre la humanidad
  lexicon: LSJ
  rationale: La expresión conserva el giro semítico del original. Se mantiene la formulación masculina representativa, como reflejo directo de la frase griega, con el sentido inclusivo explicado en nota.
- source_word: τῆς ἀπὸ σοῦ σοφίας
  english_pob_choice: the wisdom that comes from you
  chosen_spanish: la sabiduría que procede de ti
  alternatives_spanish:
  - la sabiduría de ti
  - tu sabiduría
  lexicon: LSJ
  rationale: El ἀπό señala origen. «Que procede de ti» hace explícita esa procedencia sin convertirlo en mera posesión, preservando el énfasis en el origen divino de la sabiduría.
- source_word: ἀπούσης
  english_pob_choice: is absent
  chosen_spanish: aparte de
  alternatives_spanish:
  - si falta
  - estando ausente
  lexicon: LSJ
  rationale: La revisión inglesa prefirió la construcción natural «apart from» para expresar la ausencia de la sabiduría. En español, «aparte de» comunica esa dependencia negativa de forma idiomática y breve, sin perder el valor de ausencia implícita del participio.
- source_word: εἰς οὐδὲν λογισθήσεται
  english_pob_choice: he will be regarded as nothing
  chosen_spanish: será tenido por nada
  alternatives_spanish:
  - será contado como nada
  - será considerado como nada
  lexicon: LSJ
  rationale: λογίζομαι pasivo puede ser «contar, considerar, tener por». «Será tenido por nada» mantiene el juicio valorativo del texto y suena más próximo a la cadencia bíblica en español.
theological_decisions:
- issue: Expresión antropológica masculina con alcance general
  english_pob_reading: Retain 'sons of men' in the main text
  chosen_spanish_reading: Conservar «los hijos de los hombres» en el texto principal
  alternative_spanish_readings:
  - los seres humanos
  - la humanidad
  rationale: El original usa una expresión masculina representativa para referirse a la humanidad. Se conserva la forma del texto fuente en lugar de neutralizarla, y se aclara su alcance universal en nota.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que prefirió expresar τῆς ἀπὸ σοῦ σοφίας ἀπούσης como «apart from the wisdom that comes from you» en vez de una condición más literal. La versión española refleja esa solución natural con «aparte de la sabiduría que procede de ti», manteniendo la relación de dependencia negativa sin añadir contenido no sustentado por el griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conservó la imagen semítica «hijos de los hombres» en el texto base y se ofreció una alternativa inclusiva en nota, siguiendo el criterio de precisión formal del proyecto.
  - «Sabiduría» traduce σοφία en sentido teológico, no como simple habilidad humana.
