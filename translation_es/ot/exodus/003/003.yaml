translation:
  language: es
  text: 'Entonces Moisés dijo: «Voy a desviarme y ver este gran espectáculo, por qué la zarza no se quema[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por qué la zarza no arde» o «por qué la zarza no se consume».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La forma verbal narrativa avanza la acción. «Entonces» conserva la secuencia con naturalidad en español y mantiene el valor discursivo del waw consecutivo sin volver la frase rígida.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moshe
  lexicon: Nombre propio bíblico
  rationale: Se sigue la forma habitual en español para el nombre propio, clara y reconocible para la lectura eclesial.
- source_word: אָסֻרָה נָּא
  english_pob_choice: Let me turn aside
  chosen_spanish: Déjame apartarme
  alternatives_spanish:
  - Permíteme apartarme
  - Déjame desviarme
  lexicon: HALOT
  rationale: El cohorteo con נָא expresa intención/petición suave. «Apartarme» comunica el movimiento lateral o de desviación con español natural; «desviarme» puede sonar menos idiomático aquí. Se evita forzar un calco.
- source_word: וְאֶרְאֶה
  english_pob_choice: and see
  chosen_spanish: y ver
  alternatives_spanish:
  - y mirar
  - y observar
  lexicon: HALOT
  rationale: ראייה denota ver con atención. «Ver» es suficiente y más natural; el contexto ya implica examen atento sin necesidad de añadir matiz interpretativo.
- source_word: הַמַּרְאֶה הַגָּדֹל הַזֶּה
  english_pob_choice: this great sight
  chosen_spanish: esta gran visión
  alternatives_spanish:
  - este gran espectáculo
  - esta gran escena
  - esta gran apariencia
  lexicon: HALOT
  rationale: מַרְאֶה puede ser «visión», «apariencia» o «algo visto». «Visión» mantiene el carácter extraordinario del fenómeno y permite un español digno. Se conserva el demostrativo y el énfasis en su grandeza.
- source_word: מַדּוּעַ
  english_pob_choice: why
  chosen_spanish: por qué
  alternatives_spanish:
  - por qué razón
  - a qué se debe que
  lexicon: HALOT
  rationale: Interrogativo causal directo. «Por qué» reproduce bien la pregunta de Moisés sin sobreexplicación.
- source_word: לֹא יִבְעַר
  english_pob_choice: is not burned up
  chosen_spanish: no se quema
  alternatives_spanish:
  - no arde
  - no se consume
  lexicon: HALOT
  rationale: בער en qal significa «arder/quemarse». En español, «no se quema» expresa el fenómeno de modo natural y deja abierta la tensión lexical entre arder y ser consumido. «No se consume» es posible, pero introduce un matiz más interpretativo que el verbo hebreo por sí solo.
- source_word: הַסְּנֶה
  english_pob_choice: the bush
  chosen_spanish: la zarza
  alternatives_spanish:
  - el arbusto
  - el espino
  lexicon: HALOT
  rationale: סנה suele referirse a una zarza o arbusto espinoso. «Zarza» es la opción más tradicional y precisa en español bíblico, sin recurrir a un eufemismo genérico.
theological_decisions:
- issue: Fenómeno de la zarza que arde sin consumirse
  english_pob_reading: why the bush is not burned up
  chosen_spanish_reading: por qué la zarza no se quema
  alternative_spanish_readings:
  - por qué la zarza no arde
  - por qué la zarza no se consume
  rationale: La POB inglesa opta por una formulación que refleja el verbo hebreo «arder/burn» sin imponer «consume» como si fuera explícito. En español, «no se quema» conserva esa tensión y el carácter maravilloso del signo, mientras que «no se consume» añade un resultado contextual legítimo pero no directamente expresado por el verbo.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Valor de מַרְאֶה en el contexto
  english_pob_reading: this great sight
  chosen_spanish_reading: esta gran visión
  alternative_spanish_readings:
  - esta gran apariencia
  - este gran espectáculo
  rationale: El término hebreo puede referir a algo visible de naturaleza extraordinaria. «Visión» en español mantiene el asombro del hecho y no fuerza una interpretación doctrinal adicional. Se evita traducirlo como «apariencia» si eso suena demasiado abstracto o técnico para la lectura pública.
  doctrine_reference: Translation philosophy §2, §5
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste final del inglés auditado: puntuación más sobria y una formulación más directa del estado continuo/resultativo del fuego. En español se preserva esa sobriedad con una coma antes de la cláusula causal y con «no se quema» como equivalente natural y fiel.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantuvo «Moisés» como nombre propio estándar en español.
  - Se prefirió «zarza» por claridad bíblica y consistencia con el campo léxico del arbusto espinoso.
  - La estructura conserva la pregunta causal sin convertirla en explicación narrativa.
