translation:
  language: es
  text: Delante de él, el fuego devora; detrás de él, una llama abrasa. La tierra delante de él es como el jardín de Edén, pero detrás de él es un desierto desolado; en verdad, nada escapa de él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no queda superviviente tras él» / «no hay escape de él». El sustantivo hebreo puede enfatizar tanto la idea de escape como la de superviviente o remanente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְפָנָיו
  english_pob_choice: before it
  chosen_spanish: antes de él
  alternatives_spanish:
  - delante de él
  - en su presencia
  lexicon: HALOT
  rationale: La preposición espacial con el sufijo singular se conserva en español con una formulación natural. ‘Antes de él’ mantiene la idea de delante/frente en la secuencia poética, aunque ‘delante de él’ también sería posible.
- source_word: אָכְלָה אֵשׁ
  english_pob_choice: fire devours
  chosen_spanish: el fuego devora
  alternatives_spanish:
  - el fuego consume
  - fuego consume
  lexicon: HALOT
  rationale: El verbo qal perfecto femenino se vierte con presente vívido en español, como descripción profética intensa. ‘Devora’ conserva mejor la fuerza consumidora que un simple ‘consume’.
- source_word: וְאַחֲרָיו
  english_pob_choice: behind it
  chosen_spanish: detrás de él
  alternatives_spanish:
  - después de él
  - tras él
  lexicon: HALOT
  rationale: Se preserva el paralelo espacial con ‘antes de él’. ‘Detrás de él’ es idiomático en español y refleja el contraste del pasaje.
- source_word: תְּלַהֵט לֶהָבָה
  english_pob_choice: a flame blazes
  chosen_spanish: una llama arde
  alternatives_spanish:
  - una llama flamea
  - una llama se inflama
  lexicon: HALOT
  rationale: El piel expresa ardor intenso; ‘arde’ es claro y natural en español. ‘Flamea’ o ‘se inflama’ podrían sonar más marcados, pero ‘arde’ mantiene dignidad y fluidez.
- source_word: כְּגַן עֵדֶן
  english_pob_choice: like the garden of Eden
  chosen_spanish: como el jardín de Edén
  alternatives_spanish:
  - como el huerto del Edén
  lexicon: HALOT
  rationale: Se conserva la alusión transparente a Génesis con la forma más reconocible en español bíblico. ‘Jardín de Edén’ es la equivalencia directa y clara.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el suelo
  lexicon: HALOT
  rationale: En este contexto de devastación agrícola, ‘tierra’ funciona de modo amplio y natural en español. ‘La tierra delante de él’ mantiene el ámbito local sin sobredeterminarlo como ‘mundo’.
- source_word: מִדְבַּר שְׁמָמָה
  english_pob_choice: a desolate wilderness
  chosen_spanish: un desierto desolado
  alternatives_spanish:
  - un páramo desolado
  - una estepa de desolación
  lexicon: HALOT
  rationale: La construcción nominal intensifica la idea de ruina total. ‘Desierto desolado’ reproduce el doble matiz de yermo/baldío de forma comprensible, aunque ‘páramo desolado’ también sería viable.
- source_word: וְגַם
  english_pob_choice: indeed
  chosen_spanish: y, en verdad
  alternatives_spanish:
  - sí, y
  - además
  lexicon: HALOT
  rationale: Se conserva el énfasis conclusivo de la partícula. ‘Y, en verdad’ comunica bien la fuerza enfática sin caer en un giro demasiado pesado.
- source_word: פְּלֵיטָה
  english_pob_choice: nothing escapes
  chosen_spanish: no le queda escapatoria
  alternatives_spanish:
  - no queda quien escape
  - no hay superviviente
  lexicon: HALOT
  rationale: La raíz admite la idea de escape o de remanente/superviviente. En español, una formulación verbal como ‘no le queda escapatoria’ expresa la total imposibilidad de salir ileso, sin fijar indebidamente solo el sentido de ‘superviviente’.
- source_word: לֹא הָיְתָה לוֹ
  english_pob_choice: nothing escapes it
  chosen_spanish: no le queda
  alternatives_spanish:
  - no hubo para él
  - no tuvo
  lexicon: HALOT
  rationale: El hebreo literalmente expresa que ‘no hubo escape/salvación para él’. La redacción española integra esa idea en una locución natural que conserva la totalidad de la destrucción.
theological_decisions:
- issue: Referente de los sufijos singulares en la imagen del invasor
  english_pob_reading: Render with impersonal singular 'it' for the invading force
  chosen_spanish_reading: Usar ‘él’ en el paralelismo poético, sin convertir la figura en una persona masculina individual
  alternative_spanish_readings:
  - usarlo como ‘ello’
  - pluralizar a ‘ellos’
  rationale: El hebreo usa sufijos singulares para una fuerza colectiva. En español, el uso de ‘él’ en una personificación poética resulta más natural que ‘ello’, pero el contexto debe seguir entendiendo una entidad colectiva/invasora, no un individuo masculino concreto.
  doctrine_reference: Ninguna; decisión de referencia y estilo poético
- issue: Sentido final de פְּלֵיטָה y la cláusula de ausencia de escape
  english_pob_reading: Or 'no survivor remains for it' / 'there is no escape from it.' The Hebrew noun can emphasize either escape or survivor/remnant.
  chosen_spanish_reading: ‘No le queda escapatoria’ con posible matiz de que nada ni nadie logra escapar
  alternative_spanish_readings:
  - ‘no queda superviviente’
  - ‘no hay escape de él’
  rationale: La ambigüedad hebrea entre escape y remanente se mantiene en una expresión española que favorece la idea de imposibilidad de huida. Las alternativas se conservan para lectura más literal o más centrada en supervivientes/remanente.
  doctrine_reference: Ninguna; tensión léxica del hebreo preservada
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el inglés POB en la estructura imagística, pero ajusta el español para evitar calcos duros. No se introducen revisiones textuales: se mantiene la lectura unitaria del versículo y la ambigüedad final de פְּלֵיטָה con una nota alternativa.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se mantiene ‘jardín de Edén’ por transparencia bíblica y consistencia terminológica.
  - Se preserva el contraste espacial ‘antes/detrás’ y el tono profético vívido del original.
  - La nota final conserva la tensión léxica entre ‘escape’ y ‘superviviente/remanente’ sin resolverla de manera excesiva.
