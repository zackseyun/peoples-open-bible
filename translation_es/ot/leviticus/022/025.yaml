revisions:
- from: Y del mano de un extranjero[a] no presentarán ninguna de estas como el alimento de su Dios; porque su corrupción está en ellas; hay en ellas un defecto[b]. No serán aceptadas para ustedes.
  to: Y de la mano de un extranjero no presentarán ninguno de estos como el alimento de su Dios[a], porque su corrupción está en ellos; hay en ellos un defecto[b]. No les serán aceptados.
  rationale: Se corrige el modismo inicial a «de la mano de», que es la forma española natural y fiel al hebreo. Se ajusta «ninguna de estas» a «ninguno de estos» para concordar de manera más estable con el referente implícito masculino/general. Se cambia la clausula final a «No les serán aceptados» para reflejar de manera más idiomática la aceptación cultual en relación con los oferentes. Se conservan las notas léxicas del POB con anclajes correctos en el texto.
