translation:
  language: es
  text: Pero nosotros hallamos que los judíos[a], que han sido entregados a la destrucción por aquel hombre tres veces maldito, no son criminales, sino que viven[b] conforme a leyes justísimas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por aquel tres veces maldito». El griego usa un insulto inusualmente fuerte (τρισαλιτήριος) para el responsable.
    reason: lexical_alternative
  - marker: b
    text: O «se conducen conforme a». El verbo griego puede significar «llevar la vida ciudadana» según tales leyes.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμεῖς δὲ
  english_pob_choice: But we
  chosen_spanish: Pero nosotros
  alternatives_spanish:
  - Y nosotros
  - Mas nosotros
  lexicon: LSJ
  rationale: δέ marca contraste; «Pero nosotros» conserva el giro adversativo de forma natural en español.
- source_word: τοὺς ... Ἰουδαίους
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeos
  - los judaítas
  lexicon: LSJ
  rationale: En el contexto persa de Ester, Ἰουδαῖοι designa al pueblo judío como grupo étnico-religioso; «judíos» es la forma clara y estándar en español.
- source_word: ὑπὸ τοῦ τρισαλιτηρίου
  english_pob_choice: by that thrice-accursed man
  chosen_spanish: por aquel hombre tres veces maldito
  alternatives_spanish:
  - por aquel tres veces maldito
  - por aquel hombre triplemente maldito
  lexicon: LSJ
  rationale: τρισαλιτήριος es un insulto intensivo. «Tres veces maldito» preserva la fuerza del pejorativo sin sonar artificial; se explicita «hombre» para hacer claro el referente, como en el POB inglés.
- source_word: παραδεδομένους εἰς ἀφανισμόν
  english_pob_choice: have been handed over to destruction
  chosen_spanish: han sido entregados a destrucción
  alternatives_spanish:
  - han sido entregados para destrucción
  - han sido entregados a aniquilación
  lexicon: LSJ
  rationale: La pasiva conserva la idea de ser puestos en manos ajenas para un fin letal; «a destrucción» refleja bien εἰς ἀφανισμόν sin añadir un matiz no garantizado.
- source_word: οὐ κακούργους ὄντας
  english_pob_choice: are not criminals
  chosen_spanish: no son criminales
  alternatives_spanish:
  - no son malhechores
  - no son delincuentes
  lexicon: LSJ
  rationale: κακοῦργος en este marco forense puede equivaler a «criminal». «Criminales» mantiene el peso jurídico del cargo.
- source_word: δικαιοτάτοις ... νόμοις
  english_pob_choice: most righteous laws
  chosen_spanish: leyes muy justas
  alternatives_spanish:
  - leyes justísimas
  - leyes más justas
  lexicon: LSJ
  rationale: δικαιότατος es superlativo; en español, «muy justas» comunica la intensidad de manera natural y evita una rigidez excesiva. Se mantiene el valor ético-jurídico del término.
- source_word: πολιτευομένους
  english_pob_choice: live by
  chosen_spanish: viven conforme a
  alternatives_spanish:
  - se conducen conforme a
  - llevan su vida conforme a
  lexicon: LSJ
  rationale: El verbo puede aludir a la manera de vivir/ciudadanía. «Viven conforme a» recoge la idea de ordenar la conducta según leyes, como en la revisión inglesa reciente.
theological_decisions:
- issue: Tensión entre «justas» y «rectas/righteous» en νόμοις
  english_pob_reading: most righteous laws
  chosen_spanish_reading: leyes muy justas
  alternative_spanish_readings:
  - leyes justísimas
  - leyes rectísimas
  rationale: El griego combina fuerza moral y legal. «Muy justas» preserva la intensidad superlativa y la dimensión ética-jurídica sin forzar una terminología eclesiástica ajena al contexto.
  doctrine_reference: 'DOCTRINE.md: consistencia terminológica; δικαιοσύνη y derivados se rinden según fuerza legal y ética en contexto'
- issue: Insulto intensivo aplicado al perseguidor
  english_pob_reading: that thrice-accursed man
  chosen_spanish_reading: aquel hombre tres veces maldito
  alternative_spanish_readings:
  - aquel tres veces maldito
  - aquel hombre triplemente maldito
  rationale: No se atenúa el agravio del griego τρισαλιτήριος. Se conserva la dureza retórica del texto, relevante para el contraste moral del pasaje.
  doctrine_reference: 'DOCTRINE.md: no suavizar tensiones léxicas documentadas'
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB inglés, que pasó de una equivalencia pasiva («are governed by») a una formulación más natural para πολιτευομένους («live by»). Por eso se eligió «viven conforme a» en vez de una pasiva más rígida. También se mantuvo la fuerza intensiva de τρισαλιτήριος sin suavizarla.
  spanish_consistency_notes:
  - Se mantiene «judíos» para Ἰουδαίους, conforme al uso establecido en el proyecto para este contexto.
  - Se usa «Dios»/«Yahvé» solo cuando el texto lo exige; aquí no aparecen.
  - «Leyes muy justas» conserva el superlativo y la carga moral-jurídica de δικαιοτάτοις.
  - La estructura española evita calcos como «son gobernados por» y refleja mejor el valor de πολιτευομένους.
