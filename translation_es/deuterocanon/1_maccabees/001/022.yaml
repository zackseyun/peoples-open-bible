  rationale: Se ajusta φιάλας a «cuencos» para corresponder mejor al griego y al inglés auditado («bowls»), se hace más natural καταπέτασμα con «cortina», y se reubica la nota del verbo al cierre donde realmente pertenece. «Lo despojó de todo» comunica mejor el sentido global de expolio y la posibilidad de remover revestimiento decorativo adherido.
