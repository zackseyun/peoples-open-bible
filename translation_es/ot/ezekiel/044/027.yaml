translation:
  language: es
  text: Y el día que entre en el santuario[a], en el atrio interior, para ministrar en el santuario, presentará su ofrenda por el pecado[b], declara el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el lugar santo». El hebreo קֹדֶשׁ en este contexto puede referirse al ámbito sagrado del templo.
    reason: lexical_alternative
  - marker: b
    text: O «su ofrenda de purificación». חַטָּאת en contextos sacrificiales puede designar la ofrenda asociada con el pecado o con la purificación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְיוֹם
  english_pob_choice: And on the day
  chosen_spanish: Y en el día
  alternatives_spanish:
  - Y el día en que
  - Y cuando
  lexicon: HALOT
  rationale: La expresión temporal con בְּיוֹם se vierte de manera natural en español con «en el día»; el inicial «Y» conserva la conexión con la regulación anterior, como en el audit trail inglés.
- source_word: בֹּאוֹ
  english_pob_choice: he enters
  chosen_spanish: en que entre
  alternatives_spanish:
  - cuando entra
  - al entrar
  lexicon: HALOT
  rationale: El infinitivo constructo con sufijo funciona temporalmente; «en que entre» comunica la acción en español sin volverlo demasiado literal ni perder la referencia al sujeto.
- source_word: הַקֹּדֶשׁ
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el lugar santo
  - el recinto sagrado
  lexicon: HALOT
  rationale: Aquí קֹדֶשׁ señala el ámbito sagrado del culto; «santuario» es el equivalente español más natural y coherente con el contexto sacerdotal.
- source_word: הֶחָצֵר הַפְּנִימִית
  english_pob_choice: the inner court
  chosen_spanish: el atrio interior
  alternatives_spanish:
  - el patio interior
  - el patio más interno
  lexicon: HALOT
  rationale: «Atrio» reproduce bien el lenguaje cultual tradicional en español y «interior» mantiene el valor de פנימית sin forzar una paráfrasis.
- source_word: לְשָׁרֵת
  english_pob_choice: to minister
  chosen_spanish: para ministrar
  alternatives_spanish:
  - para servir
  - para ejercer su ministerio
  lexicon: HALOT
  rationale: En contexto sacerdotal, שׁרת expresa servicio litúrgico; «ministrar» conserva ese matiz de servicio sagrado mejor que el más general «servir».
- source_word: בַּקֹּדֶשׁ
  english_pob_choice: in the sanctuary
  chosen_spanish: en el santuario
  alternatives_spanish:
  - en el lugar santo
  - en lo santo
  lexicon: HALOT
  rationale: La repetición de קֹדֶשׁ se mantiene con el mismo término para preservar el paralelismo del hebreo y la coherencia cultual.
- source_word: יַקְרִיב
  english_pob_choice: he shall present
  chosen_spanish: presentará
  alternatives_spanish:
  - ofrecerá
  - hará traer
  lexicon: HALOT
  rationale: El hifil de קרב en contexto sacrificial puede expresarse como «presentará» o «ofrecerá»; «presentará» sigue de cerca la causalidad del verbo y evita sobretraducir.
- source_word: חַטָּאתוֹ
  english_pob_choice: his sin offering
  chosen_spanish: su ofrenda por el pecado
  alternatives_spanish:
  - su sacrificio por el pecado
  - su ofrenda de purificación
  lexicon: HALOT
  rationale: 'Se conserva la tensión léxica documentada: חַטָּאת puede denotar tanto pecado como la ofrenda relacionada. «Ofrenda por el pecado» es claro en español y permite mantener abierta la alternativa de purificación.'
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara Yahvé, el Señor
  alternatives_spanish:
  - declara el Señor Yahvé
  - oráculo del Señor Yahvé
  lexicon: HALOT
  rationale: 'Se sigue la directriz del proyecto para יְהוָה: «Yahvé». Con אֲדֹנָי + יְהוִה, «el Señor» representa la lectura reverente y evita una forma chocante en español, manteniendo la distinción entre el título y el nombre divino.'
theological_decisions:
- issue: Representación del nombre divino יְהוִה en la fórmula final
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Yahvé, el Señor
  alternative_spanish_readings:
  - el Señor Yahvé
  - Yahvé el Señor
  rationale: El proyecto manda traducir יהוה como «Yahvé». Dado que el hebreo combina אֲדֹנָי con יהוה, en español se preserva el título reverencial «el Señor» junto al nombre propio divino, evitando perder ambos elementos del original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El audit trail inglés califica la equivalencia como de alta concordancia y no registra revisiones aplicadas; esta versión española sigue esa lectura estable, manteniendo el paralelismo cultual y la ambigüedad léxica documentada en חַטָּאת.
  spanish_consistency_notes:
  - Se mantiene «santuario» para קֹדֶשׁ en ambas ocurrencias, por coherencia terminológica.
  - Se usa «Yahvé» según la directriz del proyecto para el Tetragrámaton, y «el Señor» para reflejar אֲדֹנָי.
  - «Ministrar» se reserva para servicio litúrgico, no para el sentido general de servir.
  - Se conserva la tensión semántica de חַטָּאת mediante nota de alternativa.
  - La puntuación sigue el ritmo solemne de una declaración oracular final.
