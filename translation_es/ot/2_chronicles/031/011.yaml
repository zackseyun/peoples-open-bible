translation:
  language: es
  text: Entonces Ezequías ordenó preparar[a] aposentos[b] en la casa de Yahvé, y los prepararon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mandó». El hebreo dice literalmente «dijo», pero aquí introduce una instrucción real.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «habitaciones» o «depósitos». El hebreo se refiere a estancias del complejo del templo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: commanded
  chosen_spanish: ordenó
  alternatives_spanish:
  - dijo
  - mandó
  lexicon: HALOT
  rationale: Aunque el verbo hebreo significa literalmente «dijo», el contexto con el infinitivo לְהָכִין muestra una instrucción real. «Ordenó» conserva ese sentido directivo en español sin sobrerreformularlo.
- source_word: יְחִזְקִיָּהוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Ezequías
  lexicon: Nombre propio bíblico estándar
  rationale: Se usa la forma española tradicional y transparente del nombre personal, adecuada para lectura eclesial en español.
- source_word: לְהָכִין
  english_pob_choice: to prepare
  chosen_spanish: preparar
  alternatives_spanish:
  - dejar listas
  - disponer
  lexicon: HALOT
  rationale: El hifil de כון aquí expresa poner algo listo o preparar. En español, «preparar» es la opción directa y natural para este contexto de acondicionar espacios.
- source_word: לְשָׁכוֹת
  english_pob_choice: chambers
  chosen_spanish: cámaras
  alternatives_spanish:
  - habitaciones
  - salas
  - aposentos
  lexicon: HALOT
  rationale: El término designa cuartos o estancias del complejo del templo. «Cámaras» conserva mejor el matiz arquitectónico específico que «habitaciones» o «salas», aunque suena más técnico.
- source_word: בְּבֵית יְהוָה
  english_pob_choice: in the house of Yahweh
  chosen_spanish: en la casa de Yahvé
  alternatives_spanish:
  - en la casa del SEÑOR
  - en el templo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la fórmula «casa de Yahvé» para reflejar directamente la expresión hebrea בֵּית יְהוָה y la política del proyecto para el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El Tetragrámaton se vierte como «Yahvé» según el criterio del proyecto, preservando el nombre propio del Dios del pacto en vez de sustituirlo por un título.
- source_word: וַיָּכִינוּ
  english_pob_choice: and they prepared them
  chosen_spanish: y las prepararon
  alternatives_spanish:
  - y las dejaron listas
  - y las dispusieron
  lexicon: HALOT
  rationale: El verbo plural retoma las cámaras como objeto implícito. En español, el pronombre femenino plural «las» concuerda con «cámaras» y evita repetir el sustantivo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La lectura del texto fuente es el nombre propio de Dios, no un título genérico. «Yahvé» comunica esa decisión de forma fiel y legible en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La revisión más reciente informó que no hubo cambios necesarios y el juicio agregado fue de alta concordancia; por eso la redacción española sigue de cerca la decisión auditada del inglés, especialmente en el valor directivo de וַיֹּאמֶר y en el nombre divino.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con la política del proyecto para יְהוָה.
  - Se conserva la correspondencia de género en «las prepararon» por referencia a «cámaras».
  - «Cámaras» se usa en sentido arquitectónico-templario, no en el sentido moderno de equipos o dispositivos.
