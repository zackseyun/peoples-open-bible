translation:
  language: es
  text: Y aconteció[a] que, cuando todos los reyes[b] que estaban al otro lado del Jordán —en la región montañosa, en la llanura[c] y por toda la costa del mar Grande, hacia el Líbano—, el hitita, el amorreo, el cananeo, el perizita, el heveo y el jebuseo, oyeron esto,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «y sucedió cuando todos los reyes ... oyeron». El objeto de «oyeron» queda implícito en el hebreo y se expresa en español como «esto» a partir del contexto cercano.'
    reason: lexical_alternative
  - marker: b
    text: O «más allá del Jordán». La expresión hebrea puede traducirse de una u otra manera según la perspectiva geográfica que se adopte.
    reason: lexical_alternative
  - marker: c
    text: O «en la Sefela», el nombre técnico de la región occidental de piedemonte.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: HALOT
  rationale: La forma wayyiqtol introduce una nueva escena narrativa; «aconteció» conserva el valor discursivo hebreo con un tono natural y digno en español.
- source_word: כִשְׁמֹעַ
  english_pob_choice: when ... heard of it
  chosen_spanish: cuando ... oyeron de ello
  alternatives_spanish:
  - al oír
  - cuando ... oyeron
  lexicon: HALOT
  rationale: El infinitivo con כ marca circunstancia temporal. En español, una cláusula finita es más clara; «de ello» refleja el objeto implícito que el contexto inmediato completa.
- source_word: כָּל הַמְּלָכִים
  english_pob_choice: all the kings
  chosen_spanish: todos los reyes
  alternatives_spanish:
  - todos los monarcas
  lexicon: HALOT
  rationale: Corresponde de manera directa al cuantificador y al sustantivo hebreo; «reyes» es la forma más natural y precisa en este contexto.
- source_word: אֲשֶׁר בְּעֵבֶר הַיַּרְדֵּן
  english_pob_choice: who were beyond the Jordan
  chosen_spanish: que estaban al otro lado del Jordán
  alternatives_spanish:
  - que estaban más allá del Jordán
  - que estaban al otro lado del río Jordán
  lexicon: HALOT
  rationale: «Al otro lado» conserva la perspectiva relacional del hebreo sin fijar innecesariamente la orientación geográfica en el texto principal.
- source_word: בָּהָר
  english_pob_choice: in the hill country
  chosen_spanish: en la región montañosa
  alternatives_spanish:
  - en la montaña
  - en la zona montañosa
  lexicon: HALOT
  rationale: El hebreo designa una región geográfica; «región montañosa» comunica esa referencia con claridad en español contemporáneo.
- source_word: וּבַשְּׁפֵלָה
  english_pob_choice: in the lowland
  chosen_spanish: en la llanura
  alternatives_spanish:
  - en la Sefela
  - en la tierra baja
  lexicon: HALOT
  rationale: El POB inglés opta por una equivalencia transparente («lowland») en el texto principal; «llanura» funciona de modo inteligible en español, aunque el término técnico sería «Sefela».
- source_word: וּבְכֹל חוֹף הַיָּם הַגָּדוֹל
  english_pob_choice: and along the whole coast of the Great Sea
  chosen_spanish: y por toda la costa del mar grande
  alternatives_spanish:
  - y a lo largo de toda la costa del mar grande
  - y por toda la orilla del mar grande
  lexicon: HALOT
  rationale: «חוֹף» es costa/orilla; «por toda la costa» preserva el sentido distributivo. «Mar grande» reproduce la designación hebrea sin sustituirla por un nombre moderno.
- source_word: אֶל מוּל הַלְּבָנוֹן
  english_pob_choice: toward Lebanon
  chosen_spanish: hacia el Líbano
  alternatives_spanish:
  - frente al Líbano
  - en dirección al Líbano
  lexicon: HALOT
  rationale: La expresión marca orientación respecto de Líbano; «hacia» es la equivalencia española más natural y suficientemente precisa.
- source_word: הַחִתִּי וְהָאֱמֹרִי הַכְּנַעֲנִי הַפְּרִזִּי הַחִוִּי וְהַיְבוּסִי
  english_pob_choice: the Hittite, the Amorite, the Canaanite, the Perizzite, the Hivite, and the Jebusite
  chosen_spanish: el hitita, el amorreo, el cananeo, el perizita, el heveo y el jebuseo
  alternatives_spanish:
  - el hitita, el amorreo, el cananeo, el ferezeo, el heveo y el jebuseo
  - los hititas, los amorreos, los cananeos, los perizitas, los heveos y los jebuseos
  lexicon: HALOT
  rationale: Se conservan los etnónimos en singular colectivo, siguiendo la forma hebrea y la decisión del POB inglés. «Perizita» mantiene la correspondencia formal con פְּרִזִּי.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el trazo del texto hebreo y mantiene las decisiones del audit trail inglés: cláusula temporal explícita para כִשְׁמֹעַ, conservación de la perspectiva relacional de בְּעֵבֶר הַיַּרְדֵּן, y traducción transparente de שְׁפֵלָה sin imponer un término técnico en el cuerpo principal. No se registran revisiones posteriores con cambios sustantivos.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma en el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene el orden y la serie de etnónimos singular-colectivos para respetar la forma hebrea y la pauta del POB inglés.
  - «Mar grande» conserva la designación hebrea del Mediterráneo sin sustituirla por un nombre interpretativo moderno.
