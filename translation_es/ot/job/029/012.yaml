  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: כִּי como explicación, אֲמַלֵּט como rescate activo, עָנִי מְשַׁוֵּעַ como el pobre que clama, y la cláusula final como modificando a יָתוֹם. Sin embargo, la nota al pie está mal anclada: la nota léxica sobre יָתוֹם/fatherless aparece colocada sobre «ayuda», cuando debe anclarse en «huérfano». Además, aunque «huérfano» es aceptable en español con nota aclaratoria, conviene que la nota esté exactamente en el término relevante.'
  spanish_quality_summary: El español es claro, natural y digno. «Porque yo libraba al pobre que clamaba por ayuda» suena bien en contexto poético. «Que no tenía quien le ayudara» es idiomático. El único problema de calidad editorial importante es la ubicación incorrecta de la nota, que puede confundir al lector.
  glossary_alignment: No hay términos del glosario principal en conflicto. La decisión de usar «huérfano» en vez de una forma más literal para יָתוֹם es defendible en español, siempre que se preserve la precisión mediante nota. La nota debe acompañar a «huérfano[a]», no a «ayuda[a]».
  issues:
  - severity: medium
    issue: La nota al pie está anclada a «ayuda» en lugar de a «huérfano».
    rationale: La nota explica la alternativa léxica para יָתוֹם («fatherless/orphan»), no para «ayuda». Tal como está, el aparato crítico queda desalineado con la evidencia fuente y con la decisión léxica documentada.
  - severity: low
    issue: La formulación de la nota podría leerse como si «el huérfano» fuera la alternativa al español principal, cuando en realidad aclara la especificidad de «huérfano» frente a «sin padre».
    rationale: No es un error grave, pero la nota funciona mejor si queda claramente asociada al término «huérfano» en el texto.
  revised_spanish_text: Porque yo libraba al pobre que clamaba por ayuda, y al huérfano[a] que no tenía quien le ayudara.
