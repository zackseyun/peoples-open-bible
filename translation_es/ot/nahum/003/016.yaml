translation:
  language: es
  text: Has multiplicado[a] tus mercaderes más que las estrellas de los cielos; la langosta[b] deja todo pelado[c] y se va volando.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Has aumentado» o «Has hecho numerosos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la langosta joven» o «el saltón»; el término hebreo puede referirse a una clase o etapa específica de langosta.'
    reason: lexical_alternative
  - marker: c
    text: El verbo hebreo también puede significar «se extiende» o «despoja»; aquí probablemente describe a la langosta dejando la tierra desnuda antes de irse.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִרְבֵּית
  english_pob_choice: You multiplied
  chosen_spanish: Has multiplicado
  alternatives_spanish:
  - Has aumentado
  - Has hecho numerosos
  lexicon: HALOT
  rationale: El perfecto hifil de רבה expresa acción causativa de aumento. «Has multiplicado» conserva bien la fuerza verbal y el tono de reproche dirigido a Nínive en segunda persona femenina singular.
- source_word: רֹכְלַיִךְ
  english_pob_choice: your merchants
  chosen_spanish: tus mercaderes
  alternatives_spanish:
  - tus comerciantes
  - tus tratantes
  lexicon: HALOT
  rationale: רכל designa a comerciantes o mercaderes. «Mercaderes» es claro, natural y mantiene el matiz económico del pasaje.
- source_word: מִכּוֹכְבֵי הַשָּׁמָיִם
  english_pob_choice: more than the stars of the heavens
  chosen_spanish: más que las estrellas de los cielos
  alternatives_spanish:
  - más que las estrellas del cielo
  - más allá de las estrellas de los cielos
  lexicon: HALOT
  rationale: La partícula comparativa מן con רבה pide una comparación de cantidad. «Más que» comunica ese valor. «Cielos» conserva el plural hebreo y su registro elevado.
- source_word: יֶלֶק
  english_pob_choice: the locust
  chosen_spanish: el saltón
  alternatives_spanish:
  - la langosta joven
  - el hopper
  lexicon: HALOT
  rationale: El término puede referirse a una clase o etapa de langosta. Se prefirió «saltón» para preservar la posible especificidad léxica sin perder intelligibilidad; la alternativa más común, «langosta», puede sugerirse por tradición pero no captura tan bien la posible precisión del hebreo.
- source_word: פָּשַׁט
  english_pob_choice: strips bare
  chosen_spanish: se despliega
  alternatives_spanish:
  - despoja
  - arrastra todo
  lexicon: HALOT
  rationale: En este contexto el verbo admite tanto la idea de extenderse como la de despojar/saquear. Se conserva la tensión semántica con «se despliega», que refleja el valor más literal de «se extiende/se desborda» y puede entenderse en paralelo con la devastación implícita del saltón; el inglés POB optó por una interpretación más explícita con nota.
- source_word: וַיָּעֹף
  english_pob_choice: and flies away
  chosen_spanish: y vuela
  alternatives_spanish:
  - y vuela away
  - y se va volando
  lexicon: HALOT
  rationale: El wayyiqtol de עוּף significa volar. En español, «y vuela» es directo y suficientemente final, dejando que el contexto complete la imagen de desaparición súbita.
translation_notes:
  revision_awareness: 'La revisión más reciente del paquete inglés no introdujo cambios (unchanged: true). Se mantuvo la línea auditada con una adaptación española que intenta respetar la ambigüedad de פָּשַׁט, aunque el inglés la resolvió como «strips bare».'
  spanish_consistency_notes:
  - Se mantuvo «cielos» en plural para reflejar הַשָּׁמָיִם.
  - Se eligió «mercaderes» como equivalente principal de רֹכְלַיִךְ por su tono bíblico y económico.
  - La traducción de פָּשַׁט deja una ambigüedad controlada en español; se documenta en nota.
  - No se añadió mayúscula a «saltón» porque no funciona aquí como nombre propio ni como título divino.
