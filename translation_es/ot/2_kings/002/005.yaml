  yaml_path: translation/ot/2_kings/002/005.yaml
  text: Then the sons of the prophets who were at Jericho came near to Elisha and said to him[a], “Do you know that today Yahweh is taking your master from over your head?” And he said, “I also know; be silent.”
  footnotes:
