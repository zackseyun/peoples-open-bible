base_translation:
  language: en
  yaml_path: translation/deuterocanon/tobit/002/001.yaml
  text: Now when I had come down to my house[a], and Anna my wife and Tobiah my son were restored to me, on the feast of Pentecost, which is the holy feast of seven weeks, a fine meal was prepared for me[c][b], and I reclined to eat.
  footnotes:
  - marker: a
    text: Or 'the Feast of Weeks.' The Greek says 'Pentecost' and immediately explains it as 'the holy feast of seven weeks.'
    reason: alternative_reading
  - marker: b
    text: The Greek literally says 'I reclined to eat,' reflecting the ancient custom of reclining at table.
    reason: cultural_note
  - marker: c
    text: The parallel Semitic tradition for this verse is fuller, adding Tobiah's being sent to invite a poor kinsman to the meal; that material is not present in the shorter Greek wording translated here.
    reason: textual_variant
