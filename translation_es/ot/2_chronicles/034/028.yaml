revisions:
- from: He aquí[a], yo te voy a reunir con tus padres, y serás reunido con tus tumbas[b] en paz[c]; tus ojos no verán todo el mal que yo traigo sobre este lugar y sobre sus habitantes. Y ellos llevaron al rey la respuesta.
  to: He aquí[a], yo te voy a reunir con tus padres, y serás reunido a tus sepulcros[b] en paz[c], y tus ojos no verán toda la calamidad que yo traigo sobre este lugar y sobre sus habitantes. Y llevaron la respuesta al rey.
  rationale: Se corrigió el error principal de sentido y gramática cambiando «con tus tumbas» por «a tus sepulcros», que refleja la dirección de אֶל y produce un español digno y natural. También se ajustó «todo el mal» a «toda la calamidad» para expresar mejor רָעָה en contexto de juicio, y se pulió la cláusula final a una formulación narrativa más natural en español.
