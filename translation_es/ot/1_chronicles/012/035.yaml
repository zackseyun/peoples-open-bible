translation:
  language: es
  text: 'De Neftalí: 1.000 comandantes[a], y con ellos 37.000 con escudo[b] y lanza.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «jefes» o «capitanes» para «comandantes».
    reason: lexical_alternative
  - marker: b
    text: El término hebreo para «escudo» puede referirse específicamente a un escudo grande.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִנַּפְתָּלִי
  english_pob_choice: From Naphtali
  chosen_spanish: De Neftalí
  alternatives_spanish:
  - Y de Neftalí
  - Desde Neftalí
  lexicon: HALOT
  rationale: La forma hebrea expresa procedencia tribal. En español, la lista militar suena natural con «De Neftalí» y mantiene la procedencia sin añadir matiz innecesario de movimiento.
- source_word: שָׂרִים
  english_pob_choice: commanders
  chosen_spanish: comandantes
  alternatives_spanish:
  - jefes
  - capitanes
  - líderes
  lexicon: HALOT
  rationale: El término designa oficiales o jefes militares. «Comandantes» preserva el rango militar en un contexto de registro de tropas y evita un término demasiado general.
- source_word: אָ֑לֶף
  english_pob_choice: 1,000
  chosen_spanish: '1.000'
  alternatives_spanish:
  - mil
  - a thousand
  lexicon: HALOT
  rationale: Se conserva la cifra numérica para claridad en una enumeración militar y para corresponder al estilo del POB en inglés.
- source_word: וְעִמָּהֶם
  english_pob_choice: and with them
  chosen_spanish: y con ellos
  alternatives_spanish:
  - con ellos
  lexicon: HALOT
  rationale: Se retiene la coordinación explícita con «y» porque el hebreo también la expresa y separa a los comandantes del grupo que los acompañaba.
- source_word: בְּצִנָּה
  english_pob_choice: with shield
  chosen_spanish: con escudo
  alternatives_spanish:
  - con escudo grande
  - portando escudo
  lexicon: HALOT
  rationale: צִנָּה es un escudo, a menudo de gran tamaño; en español, «con escudo» reproduce la frase breve del inventario sin sobredeterminar el tipo. La nota conserva la posibilidad léxica de «escudo grande».
- source_word: וַחֲנִית
  english_pob_choice: and spear
  chosen_spanish: y lanza
  alternatives_spanish:
  - y spear
  - y lanza arrojadiza
  lexicon: HALOT
  rationale: Aunque el inglés POB usa «spear», en español «lanza» es el equivalente más natural y estándar para חֲנִית en este registro militar.
- source_word: שְׁלֹשִׁים וְשִׁבְעָה אָלֶף
  english_pob_choice: 37,000
  chosen_spanish: '37.000'
  alternatives_spanish:
  - treinta y siete mil
  lexicon: HALOT
  rationale: Se mantiene la cifra numérica por claridad y paralelismo con el primer número del versículo.
translation_notes:
  revision_awareness: El texto sigue de cerca el WLC y coincide sustancialmente con el audit trail inglés; el único ajuste relevante es el español idiomático «lanza» para חֲנִית, manteniendo el valor militar del inventario sin alterar el sentido.
  spanish_consistency_notes:
  - Se usa el formato numérico con punto de miles en español (1.000, 37.000).
  - Se preserva el estilo de lista militar breve y telegráfico del hebreo y del POB inglés.
  - No se introduce terminología eclesiástica ajena al contexto militar del versículo.
