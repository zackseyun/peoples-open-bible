review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del griego: mantiene la pregunta retórica, el valor de τί como «qué», el infinitivo de propósito «a ver», la afirmación «Sí» y la comparación restringida «más que un profeta» sin expandirla indebidamente. También preserva correctamente la alternativa en nota para περισσότερον προφήτου.'
  spanish_quality_summary: 'La redacción es clara y natural, pero «les digo» suena algo menos directo que el formulismo bíblico esperado para λέγω ὑμῖν en este contexto. «Les digo a ustedes» sería pesado; «les digo» es aceptable, pero «yo les digo» o «les digo» depende del estilo. El ajuste principal recomendado es de puntuación y ritmo: en español queda mejor mantener la secuencia con coma tras «Sí» y conservar la forma actual, pero conviene revisar la nota para mayor naturalidad. El texto principal puede mantenerse casi intacto.'
  glossary_alignment: No hay términos del glosario de proyecto especialmente controvertidos en este versículo. «Profeta» y «más que un profeta» se alinean con las decisiones léxicas y teológicas auditadas. La nota alternativa «uno mayor que un profeta» conserva la opción inglesa de forma fiel.
  issues:
  - severity: low
    issue: La nota al pie puede sonar algo calcada con «dice más literalmente».
    rationale: En español bíblico natural suele leerse mejor «más literalmente, el griego dice...» o simplemente «Lit.». No afecta fidelidad, pero sí fluidez editorial.
  - severity: low
    issue: La fórmula «les digo» es aceptable, pero roza una leve pérdida del tono formular de λέγω ὑμῖν.
    rationale: No es un error de sentido; sin embargo, en registro bíblico-legible «yo les digo» puede reflejar un poco mejor la fuerza discursiva sin volverse arcaico. Aun así, el cambio no es estrictamente necesario.
  revised_spanish_text: Pero ¿qué salieron a ver? ¿Un profeta? Sí[a], les digo, y más que un profeta.
  revised_footnotes:
  - marker: a
    text: O «uno mayor que un profeta». Más literalmente, el griego dice «más que un profeta».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel al griego y al rastro de auditoría inglés. Solo se pule la redacción de la nota al pie para mayor naturalidad editorial en español sin cambiar su contenido.
