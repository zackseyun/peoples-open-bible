  - marker: b
    text: O ‘deleites’, ‘finuras’ o ‘adornos’ para la expresión traducida aquí como ‘lujos’.
    reason: lexical_alternative
  revision_rationale: La revisión conserva todas las decisiones léxicas principales del expediente, pero corrige la ambigüedad de ‘su ropa’ usando ‘sus vestidos’, que refleja mejor la referencia al grupo femenino interpelado. También mejora la fluidez poética quitando la coma entre ‘escarlata’ y ‘con lujos’.
