translation:
  language: es
  text: Y si el sacerdote lo examina, y he aquí, la infección escamosa se ha extendido en la piel, el sacerdote no necesita buscar si hay cabello amarillo[a]; es inmundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “la comezón” para el término hebreo que se refiere a una afección escamosa de la piel, especialmente en la cabeza o la barba.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאָהוּ
  english_pob_choice: and the priest examines him
  chosen_spanish: el sacerdote lo examina
  alternatives_spanish:
  - el sacerdote lo mira
  - el sacerdote lo observa
  lexicon: HALOT
  rationale: En contexto de inspección sacerdotal, ראה no es solo “ver”, sino realizar un examen evaluativo. El presente en español comunica mejor la acción procedimental sin añadir interpretación ajena al texto.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y resulta que
  lexicon: HALOT
  rationale: Conserva la fuerza deíctica de presentar el hallazgo observado. “He aquí” es natural en español bíblico y sigue el valor de observación inmediata del hebreo.
- source_word: פָּשָׂה
  english_pob_choice: has spread
  chosen_spanish: se ha extendido
  alternatives_spanish:
  - ha avanzado
  - ha crecido
  lexicon: HALOT
  rationale: Describe adecuadamente la expansión de la afección en un registro claro y fiel. “Se ha extendido” corresponde bien al uso médico-diagnóstico del verbo.
- source_word: הַנֶּתֶק
  english_pob_choice: the scaly infection
  chosen_spanish: la infección escamosa
  alternatives_spanish:
  - la afección escamosa
  - el brote escamoso
  - la llaga escamosa
  lexicon: HALOT
  rationale: El término denota una afección específica de cuero cabelludo/barba con descamación y alteración del cabello. “Infección escamosa” mantiene la precisión descriptiva del POB inglés sin depender del tradicional “tiña” ni del más vago “comezón”.
- source_word: בָּעוֹר
  english_pob_choice: in the skin
  chosen_spanish: en la piel
  alternatives_spanish:
  - sobre la piel
  - dentro de la piel
  lexicon: HALOT
  rationale: “En la piel” es la forma española más natural y corresponde al valor locativo del hebreo en este contexto diagnóstico.
- source_word: לֹא יְבַקֵּר
  english_pob_choice: need not look for
  chosen_spanish: no necesita inspeccionar
  alternatives_spanish:
  - no debe buscar
  - no tiene que examinar
  lexicon: HALOT
  rationale: בקר aquí significa examinar o investigar una señal diagnóstica. La negación expresa que no hace falta una revisión adicional una vez que la extensión ya es evidente.
- source_word: לַשֵּׂעָר הַצָּהֹב
  english_pob_choice: the yellow hair
  chosen_spanish: el cabello amarillo
  alternatives_spanish:
  - el pelo amarillo
  - el cabello amarillento
  lexicon: HALOT
  rationale: Sigo la lectura diagnóstica del POB inglés. “Cabello amarillo” conserva la referencia al signo externo sin introducir un suavizado interpretativo como “amarillento”.
- source_word: טָמֵא הוּא
  english_pob_choice: he is unclean
  chosen_spanish: es inmundo
  alternatives_spanish:
  - está inmundo
  - es impuro
  lexicon: HALOT
  rationale: En Levítico 13 el término denota impureza ritual, no culpa moral. “Inmundo” preserva el lenguaje tradicional y la categoría legal del pasaje, aunque en español moderno suene fuerte; se mantiene por fidelidad al campo semántico del texto.
theological_decisions:
- issue: Estado ritual de טָמֵא en la legislación de pureza
  english_pob_reading: unclean
  chosen_spanish_reading: inmundo
  alternative_spanish_readings:
  - impuro
  - ritualmente impuro
  rationale: El contexto es jurídico-ritual y no moral. “Inmundo” es la forma más heredada y directa para conservar la categoría levítica, aunque se reconoce que “ritualmente impuro” explicita mejor el valor técnico.
  doctrine_reference: Levítico 13; cf. pureza ritual levítica
- issue: Valor inspectivo de ראה y בקר en un procedimiento sacerdotal
  english_pob_reading: examines / need not look for
  chosen_spanish_reading: examina / no necesita inspeccionar
  alternative_spanish_readings:
  - observa / no hace falta revisar
  - inspecciona / no debe buscar
  rationale: La escena no es mera percepción visual; es una revisión oficial del sacerdote. “Inspeccionar” y “examinar” comunican el procedimiento sin perder la tensión textual de que el criterio se establece por observación autorizada.
  doctrine_reference: Levítico 13:1–8, 13:36
translation_notes:
  revision_awareness: 'La versión inglesa más reciente corrigió el arranque a “And if” para reflejar mejor el contexto condicional del hebreo. La redacción española adopta esa misma lectura condicional con “Y si”, y mantiene el orden de observación diagnóstica: examen del sacerdote, hallazgo de extensión, omisión de una revisión adicional del cabello, y veredicto ritual.'
  spanish_consistency_notes:
  - Se mantiene “sacerdote” para כֹּהֵן, siguiendo el uso estándar del POB en textos levíticos.
  - Se preserva el campo léxico de pureza ritual con “inmundo”, sin sustituirlo por un eufemismo que debilite la categoría legal.
  - La nota [a] recoge la alternativa léxica histórica de “comezón”/“picazón” para נתק, porque el español moderno podría no percibir de inmediato la afección específica descrita.
