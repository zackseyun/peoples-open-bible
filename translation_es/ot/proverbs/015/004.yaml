  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Espíritu» está bien en minúscula por referirse al espíritu humano. «Perversidad» es una opción válida para סֶלֶף, aunque la nota debe preservar la alternativa de «torcedura/corrupción» más explícitamente que la redacción actual de b.
