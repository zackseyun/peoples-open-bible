    rationale: 'Aunque no es imposible, el hebreo aquí presenta la explicación histórica con perfectos simples. En español bíblico y narrativo suena más natural y más cercano al valor del original: «Salomón edificó… y cerró…». El pluscuamperfecto introduce una capa temporal innecesaria.'
  - severity: low
