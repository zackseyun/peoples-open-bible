translation:
  language: es
  text: Yo[a], Qohelet, fui rey de Israel en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Qohelet también puede traducirse como «el Maestro» o «el Predicador».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲנִי
  english_pob_choice: I
  chosen_spanish: Yo
  alternatives_spanish:
  - Yo mismo
  - Yo soy
  lexicon: HALOT
  rationale: El pronombre de primera persona conserva la autoidentificación enfática del hebreo y encaja bien al inicio de la cláusula en español.
- source_word: קֹהֶלֶת
  english_pob_choice: Qoheleth
  chosen_spanish: Qohelet
  alternatives_spanish:
  - el Maestro
  - el Predicador
  - el Asamblador
  lexicon: HALOT
  rationale: Se mantiene la transliteración para no resolver de manera excesiva el sentido debatido del título/nombre. En español, 'Qohelet' preserva la forma hebrea y la ambigüedad interpretativa, como hace el POB en inglés.
- source_word: הָיִיתִי
  english_pob_choice: was
  chosen_spanish: fui
  alternatives_spanish:
  - era
  - he sido
  lexicon: HALOT
  rationale: El perfecto qal de היה refiere aquí a una condición pasada; 'fui' expresa con naturalidad en español ese estado anterior, mejor que un presente perfecto menos directo.
- source_word: מֶלֶךְ
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - un rey
  lexicon: HALOT
  rationale: Es un predicado nominal; en español 'fui rey' reproduce mejor la función del hebreo que añadir artículo indefinido.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - de
  - en
  lexicon: HALOT
  rationale: '''Sobre'' refleja con claridad la relación de autoridad/gobierno indicada por la preposición hebrea.'
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: HALOT
  rationale: Nombre propio conservado sin adaptación.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: La locución locativa normal en español transmite con precisión el marco geográfico del reinado.
theological_decisions:
- issue: Cómo verter קֹהֶלֶת sin cerrar su sentido
  english_pob_reading: 'Transliteration: Qoheleth; alternatives ''the Teacher'' or ''the Preacher.'''
  chosen_spanish_reading: 'Transliteración: Qohelet; alternativas ''el Maestro'' o ''el Predicador.'''
  alternative_spanish_readings:
  - el Maestro
  - el Predicador
  - el Asamblador
  rationale: Se conserva la designación distintiva del libro sin imponer una interpretación semántica única. Esto mantiene la tensión lexical documentada por el POB y evita convertir un título debatido en una explicación interpretativa.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia entre fuente hebrea y auditoría inglesa; no se registran revisiones aplicadas en el expediente más reciente.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma del proyecto cuando corresponda; este versículo no contiene el tetragrámaton.
  - Se evitó 'Cristo', 'SEÑOR' y otras sustituciones no presentes en la fuente.
  - La transliteración 'Qohelet' mantiene coherencia con el criterio del POB inglés de no resolver el término semánticamente.
  - '''Fui rey'' conserva el valor pasado del estado descrito por הָיִיתִי.'
