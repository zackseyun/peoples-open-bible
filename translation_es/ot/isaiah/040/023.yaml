translation:
  language: es
  text: el que reduce a los príncipes a la nada, y hace que los jueces de la tierra[b] sean como vacío[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «como caos», «como nada» o «como vacuidad»; el hebreo תֹהוּ denota vaciedad, desolación o irrealidad.
    reason: lexical_alternative
  - marker: b
    text: O «los jueces del país»; el hebreo אֶרֶץ puede significar «tierra» o «país», pero el contexto amplio favorece el sentido universal de «tierra».
    reason: alternative_reading
lexical_decisions:
- source_word: הַנּוֹתֵן
  english_pob_choice: who brings
  chosen_spanish: el que reduce
  alternatives_spanish:
  - el que da
  - el que hace
  lexicon: HALOT
  rationale: El participio hebreo funciona aquí como una descripción relativa de Yahvé. En español, «el que reduce» expresa con naturalidad la acción de llevar a una condición de insignificancia, que corresponde al valor de «to nothing» en el contexto.
- source_word: רוֹזְנִים
  english_pob_choice: princes
  chosen_spanish: príncipes
  alternatives_spanish:
  - gobernantes
  - dignatarios
  lexicon: HALOT
  rationale: רוֹזְנִים designa figuras de alto rango político o nobles. «Príncipes» conserva el registro elevado y la fuerza de autoridad sin volver la frase demasiado técnica.
- source_word: לְאָיִן
  english_pob_choice: to nothing
  chosen_spanish: a la nada
  alternatives_spanish:
  - a la no existencia
  - a la nada absoluta
  lexicon: HALOT
  rationale: אָיִן expresa nada, inexistencia o nulidad. «A la nada» es la equivalencia española más idiomática y preserva la idea de reducción total a insignificancia.
- source_word: שֹׁפְטֵי אֶרֶץ
  english_pob_choice: the judges of the earth
  chosen_spanish: los jueces de la tierra
  alternatives_spanish:
  - los jueces del país
  - los gobernantes de la tierra
  lexicon: HALOT
  rationale: La construcción nominal admite «tierra» o «país». Conservé «tierra» porque el contexto de Isaías 40 es universal y cósmico, no local.
- source_word: כַּתֹּהוּ
  english_pob_choice: like emptiness
  chosen_spanish: como vacuidad
  alternatives_spanish:
  - como vacío
  - como caos
  - como nada
  lexicon: HALOT
  rationale: תֹהוּ puede significar vaciedad, desolación o irrealidad; también admite «caos» en ciertos contextos. «Vacuidad» mantiene el matiz de vaciedad/substancia nula sin importar un sentido más específico que el texto no exige.
- source_word: עָשָׂה
  english_pob_choice: makes
  chosen_spanish: hace
  alternatives_spanish:
  - ha hecho
  - reduce
  lexicon: HALOT
  rationale: Aunque el verbo está en perfecto, en poesía puede tener fuerza descriptiva o gnómica. «Hace» suena natural en español y conserva la relación con el predicativo «como vacuidad».
theological_decisions:
- issue: Alcance de אֶרֶץ en שֹׁפְטֵי אֶרֶץ
  english_pob_reading: earth
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - país
  - territorio
  rationale: Siguiendo la evaluación inglesa, «tierra» preserva el alcance universal del pasaje en Isaías 40. Evita restringir el dicho a una región concreta.
  doctrine_reference: Soberanía universal de Dios sobre las naciones
- issue: Preservación de la tensión léxica en תֹהוּ
  english_pob_reading: emptiness / chaos / nothingness
  chosen_spanish_reading: vacuidad
  alternative_spanish_readings:
  - caos
  - vacío
  - nada
  rationale: El inglés POB dejó abierta la serie de matices de תֹהוּ. En español, «vacuidad» intenta sostener esa tensión entre vacío, nulidad e insustancialidad sin resolverla prematuramente en una sola opción.
  doctrine_reference: Inestabilidad e insignificancia de los poderes humanos ante Yahvé
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios y que hay alto acuerdo con el auditorio de control. La redacción española mantiene esa línea, conservando la opción universal de אֶרֶץ y la ambigüedad controlada de תֹהוּ.
  spanish_consistency_notes:
  - Se conservó «Yahvé» como nombre divino conforme a la política del proyecto.
  - Se prefirió «príncipes» por su registro elevado y su correspondencia con el valor político de רוֹזְנִים.
  - «Tierra» se mantuvo por coherencia con la lectura universal ya documentada en el texto base.
  - Se usó «vacuidad» para no perder el campo semántico de תֹהוּ y evitar una paráfrasis excesiva.
