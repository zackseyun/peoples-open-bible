translation:
  language: es
  text: Hicieron tus remos de encinas de Basán[c][b]; hicieron tu tablazón[a] de marfil, de las costas de Kittim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "tus tablas" o "tu cubierta". El término hebreo puede referirse más específicamente al entablado o a las tablas del barco.
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo es difícil: "marfil, hija de Ashurim". Muchos entienden que alude a marfil trabajado con alguna madera fina, pero el sentido exacto es incierto.'
    reason: alternative_reading
  - marker: c
    text: '"Kittim" probablemente se refiere a Chipre o a regiones marítimas occidentales cercanas.'
    reason: cultural_note
lexical_decisions:
- source_word: אַלּוֹנִים
  english_pob_choice: oaks
  chosen_spanish: encinas
  alternatives_spanish:
  - robles
  - encinos
  lexicon: HALOT
  rationale: El término designa árboles fuertes de madera dura. 'Encinas' comunica bien en español la idea de maderas robustas y naturales en un contexto de construcción naval, sin desviarse del valor arbóreo del hebreo.
- source_word: מִבָּשָׁן
  english_pob_choice: from Bashan
  chosen_spanish: de Basán
  alternatives_spanish:
  - de Bashán
  lexicon: HALOT
  rationale: Es un topónimo. 'Basán' es la forma más natural y reconocible en español bíblico, manteniendo la referencia geográfica al territorio famoso por su madera.
- source_word: מִשּׁוֹטָיִךְ
  english_pob_choice: your oars
  chosen_spanish: tus remos
  alternatives_spanish:
  - tus palas
  - tus remos de remar
  lexicon: HALOT
  rationale: En la metáfora náutica de Ezequiel 27, el sentido es el de implementos para remar. 'Remos' es claro, natural y fiel al contexto.
- source_word: קַרְשֵׁךְ
  english_pob_choice: your deck
  chosen_spanish: tu tablazón
  alternatives_spanish:
  - tus tablas
  - tu cubierta
  - tu entablado
  lexicon: HALOT
  rationale: El hebreo puede referirse a tablas o entablado del barco, y la POB inglesa preserva la idea de una pieza estructural discutida. 'Tablazón' permite mantener esa ambigüedad lexical sin forzar 'cubierta', que puede sonar más interpretativo.
- source_word: שֵׁן
  english_pob_choice: ivory
  chosen_spanish: marfil
  alternatives_spanish:
  - diente
  - colmillo
  lexicon: HALOT
  rationale: Aunque literalmente significa 'diente', aquí el valor material es el de marfil. 'Marfil' es el equivalente español normal y exacto para este uso.
- source_word: בַּת אֲשֻׁרִים
  english_pob_choice: from the coasts of Kittim
  chosen_spanish: de las costas de Kittim
  alternatives_spanish:
  - de Kittim
  - de las islas de Kittim
  lexicon: HALOT
  rationale: 'La tradición textual y léxica es difícil, y la revisión inglesa eliminó una expansión no sustentada. En español conviene conservar solo lo que el contexto y el audit trail sostienen: el origen marítimo/comercial ligado a Kittim, sin añadir una identificación especulativa del material.'
- source_word: מֵאִיֵּי כתים
  english_pob_choice: from the coasts of Kittim
  chosen_spanish: de las costas de Kittim
  alternatives_spanish:
  - de las islas de Kittim
  - de Kittim
  lexicon: HALOT
  rationale: '''איים'' puede significar islas o costas marítimas. ''Costas'' es una opción idiomática en español que conserva el matiz marítimo y comercial del hebreo y sigue la decisión inglesa auditada.'
theological_decisions:
- issue: Tratamiento del topónimo Kittim y del lenguaje marítimo-comercial
  english_pob_reading: '''Kittim'' likely refers to Cyprus or nearby western maritime regions.'
  chosen_spanish_reading: '''Kittim'' se deja transliterado como nombre propio, con ''costas'' para mantener el matiz marítimo.'
  alternative_spanish_readings:
  - '''Chipre'''
  - '''las costas occidentales'''
  rationale: No hay base suficiente en el verso para reemplazar Kittim por una identificación interpretativa. La forma transliterada conserva la referencia histórica y respeta la cautela del audit trail.
  doctrine_reference: Principio de fidelidad textual y prudencia exegética
- issue: Ambigüedad de קַרְשֵׁךְ (tablazón/cubierta/tablas)
  english_pob_reading: The noun can denote boards/planking; 'deck' communicates the function naturally, while alternatives are preserved in a footnote.
  chosen_spanish_reading: '''tablazón'' mantiene la referencia estructural sin cerrar indebidamente la ambigüedad.'
  alternative_spanish_readings:
  - '''cubierta'''
  - '''tablas'''
  - '''entablado'''
  rationale: La meta es no borrar una tensión lexical documentada. 'Tablazón' es suficientemente natural en español y permite al lector percibir que el hebreo puede abarcar el entablado del barco, no solo una 'cubierta' moderna.
  doctrine_reference: Principio de preservación de ambigüedad lexical documentada
translation_notes:
  revision_awareness: 'La revisión inglesa reciente eliminó una expansión no sustentada (''inlaid in cypress'') y conservó ''deck'' para קַרְשֵׁךְ. Esta versión española sigue esa revisión: evita añadir material no atestiguado, mantiene el orden breve del verso y conserva la referencia marítima y comercial de Kittim sin especulación.'
  spanish_consistency_notes:
  - Se usa 'Basán' para el topónimo y no se traduce como apelativo.
  - '''Marfil'' representa el material, no una glosa literal de ''diente''.'
  - '''Kittim'' se translitera por consistencia con la POB inglesa y por prudencia histórica.'
  - La puntuación con dos miembros paralelos reproduce la estructura hebrea del verso.
