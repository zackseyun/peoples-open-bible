translation:
  language: es
  text: Y los porteros estaban en cada puerta; nadie podía abandonar su servicio asignado[a], porque sus hermanos los levitas habían preparado para ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «los levitas habían preparado para sí mismos». En este contexto de servicio, el sentido probable es que prepararon lo necesario en beneficio de los porteros, para que cada uno pudiera permanecer en su servicio asignado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θυρωροὶ
  english_pob_choice: gatekeepers
  chosen_spanish: porteros
  alternatives_spanish:
  - guardianes de la puerta
  - guardianes
  lexicon: LSJ
  rationale: θυρωρός designa a quien guarda una puerta o acceso. En español, «porteros» conserva la función de vigilancia/guardia de la entrada y suena natural en un contexto del templo. «Doorkeepers» no tiene equivalente idiomático tan claro en español.
- source_word: ἐφʼ ἑκάστου πυλῶνος
  english_pob_choice: at each gate
  chosen_spanish: en cada puerta
  alternatives_spanish:
  - junto a cada puerta
  - en cada portal
  lexicon: LSJ
  rationale: La expresión distribuye a los porteros por cada acceso. «En cada puerta» es la forma más idiomática y conserva el sentido distributivo de ἑκάστου.
- source_word: οὐκ ἔστιν παραβῆναι
  english_pob_choice: could not leave
  chosen_spanish: nadie podía dejar
  alternatives_spanish:
  - no les era posible apartarse
  - no podían salir
  lexicon: LSJ
  rationale: El griego dice literalmente que no era posible «pasar al lado» o «salirse». En contexto cultual, el sentido práctico es que no podían abandonar su puesto; «nadie podía dejar» comunica esa fuerza sin calcar de forma pesada.
- source_word: ἕκαστον τὴν ἑαυτοῦ ἐφημερίαν
  english_pob_choice: his own appointed duty
  chosen_spanish: su propia función asignada
  alternatives_spanish:
  - su propio servicio asignado
  - su turno de servicio
  lexicon: LSJ
  rationale: ἐφημερία denota un período o curso fijo de servicio, especialmente en función sacerdotal/levítica. «Función asignada» preserva el carácter oficial y el sentido de servicio establecido, evitando una traducción demasiado coloquial.
- source_word: οἱ γὰρ ἀδελφοὶ αὐτῶν οἱ Λευεῖται
  english_pob_choice: for their brothers the Levites
  chosen_spanish: porque sus hermanos los levitas
  alternatives_spanish:
  - pues sus hermanos, los levitas
  - ya que sus hermanos, los levitas
  lexicon: LSJ
  rationale: La frase apposicional identifica a los hermanos como levitas. La traducción mantiene la relación familiar/corporativa y el flujo causal del griego con «porque».
- source_word: ἡτοίμασαν ἑαυτοῖς
  english_pob_choice: had prepared for them
  chosen_spanish: habían preparado para ellos
  alternatives_spanish:
  - se habían preparado para sí mismos
  - habían hecho los preparativos para ellos
  lexicon: LSJ
  rationale: El reflexivo ἑαυτοῖς es difícil. Siguiendo el contexto de servicio y la solución auditable de la POB en inglés, se entiende contextualmente que los levitas hicieron los preparativos en beneficio de los porteros; por eso se traduce «para ellos» y no de forma estrictamente reflexiva.
theological_decisions:
- issue: Sentido del reflexivo ἑαυτοῖς en un contexto litúrgico de servicio
  english_pob_reading: The Levites had prepared for them, meaning they prepared what was needed on the gatekeepers' behalf so the gatekeepers could remain at their assigned service.
  chosen_spanish_reading: Los levitas habían preparado lo necesario para los porteros, de modo que estos pudieran permanecer en su puesto asignado.
  alternative_spanish_readings:
  - los levitas se habían preparado para sí mismos
  - los levitas habían preparado para sí
  rationale: 'La lectura estrictamente reflexiva es gramaticalmente posible, pero oscurece la lógica del pasaje: los porteros permanecen en su servicio porque los levitas hicieron la preparación correspondiente. La traducción adopta el sentido contextual, manteniendo documentada la posibilidad literal.'
  doctrine_reference: Translation philosophy §§1, 5, 6; preservar el sentido de la fuente por encima de la aspereza heredada, documentando la excepción.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail inglés: se prefiere una forma natural y directa («nadie podía dejar») sin perder el valor de «función asignada» ni la resolución contextual de «habían preparado para ellos».'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda a יהוה; aquí no aparece, así que no se introduce ningún equivalente divino.
  - Se mantiene «levitas» como gentilicio/sustantivo eclesial estándar en español.
  - «Porteros» se elige por naturalidad y por su correspondencia funcional con θυρωροί en un ámbito cultual.
  - La nota al pie conserva la tensión del reflexivo griego y evita borrar la alternativa literal.
