translation:
  language: es
  text: 'Estás fatigada por la multitud de tus consejos. Que se levanten ahora y te salven: los que dividen los cielos[a], los que observan las estrellas, los que hacen saber, mes por mes[b], lo que vendrá sobre ti.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que parcelan los cielos». La expresión hebrea es difícil y probablemente alude a astrólogos que dividen el firmamento en sectores para interpretar presagios.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los que anuncian en los novilunios». El hebreo puede referirse específicamente a predicciones ligadas al ciclo mensual o a las lunas nuevas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִלְאֵית
  english_pob_choice: you are wearied
  chosen_spanish: estás fatigada
  alternatives_spanish:
  - estás cansada
  - te has agotado
  lexicon: HALOT
  rationale: El perfecto nifal femenino singular expresa un estado resultante de cansancio/exhaustión dirigido a Babilonia personificada. «Estás fatigada» mantiene ese valor y suena natural en español formal.
- source_word: בְּרֹב עֲצָתָיִךְ
  english_pob_choice: by your many counsels
  chosen_spanish: por la multitud de tus consejos
  alternatives_spanish:
  - con la multitud de tus consejos
  - por tus muchos planes
  lexicon: HALOT
  rationale: עֵצָה puede ser consejo, plan o consejo consultivo; en el contexto de prácticas adivinatorias y asesoría fallida, «consejos» conserva la amplitud semántica sin reducirlo a una sola esfera. «Por la multitud de» refleja el valor instrumental/circunstancial de בְּ.
- source_word: יַעַמְדוּ נָא
  english_pob_choice: Let them stand now
  chosen_spanish: Que se levanten ahora
  alternatives_spanish:
  - Que se pongan en pie ahora
  - Que se presenten ahora
  lexicon: HALOT
  rationale: El jussivo con נָא es una invitación irónica o desafiante. En español, «Que se levanten ahora» comunica el gesto de presentarse/ponerse en pie con tono de reto, sin sonar arcaico.
- source_word: וְיוֹשִׁיעֻךְ
  english_pob_choice: and save you
  chosen_spanish: y te salven
  alternatives_spanish:
  - y te libren
  - y te rescaten
  lexicon: HALOT
  rationale: יׁשַע en hiphil significa salvar/liberar/rescatar. «Salvar» conserva la amplitud del verbo, y en este contexto la incapacidad de sus expertos para protegerla ante el juicio venidero.
- source_word: הברו שמים
  english_pob_choice: those who divide the heavens
  chosen_spanish: los que dividen los cielos
  alternatives_spanish:
  - los que parcelan los cielos
  - los que reparten los cielos
  lexicon: HALOT
  rationale: La forma hebrea es difícil; la lectura contextual apunta a astrólogos que segmentan el firmamento para interpretación. «Dividen los cielos» preserva la imagen concreta sin añadir explicaciones al texto principal.
- source_word: החוזים בכוכבים
  english_pob_choice: who gaze at the stars
  chosen_spanish: los que observan las estrellas
  alternatives_spanish:
  - los que contemplan las estrellas
  - los que miran las estrellas
  lexicon: HALOT
  rationale: חזים designa videntes, y con בַּכּוֹכָבִים el sentido es claramente astral. «Observan las estrellas» es sobrio y natural, manteniendo la referencia a astrología sin exagerar el matiz.
- source_word: מֹודִיעִם לֶחֳדָשִׁים
  english_pob_choice: who make known month by month
  chosen_spanish: los que hacen saber, mes por mes
  alternatives_spanish:
  - los que anuncian, mes por mes
  - los que dan a conocer por los meses
  lexicon: HALOT
  rationale: La construcción puede referirse a anuncios ligados al ciclo mensual o a los novilunios. «Mes por mes» reproduce la iteración temporal del hebreo y deja abierta la ambigüedad que el inglés POB también preserva.
- source_word: מֵאֲשֶׁר יָבֹאוּ עָלָיִךְ
  english_pob_choice: what will come upon you
  chosen_spanish: lo que vendrá sobre ti
  alternatives_spanish:
  - lo que habrá de venir sobre ti
  - lo que te sobrevendrá
  lexicon: HALOT
  rationale: 'El relativo introduce el contenido de sus predicciones: acontecimientos futuros que caerán sobre Babilonia. «Vendrá sobre ti» mantiene el movimiento de amenaza y la direccionalidad del hebreo.'
theological_decisions:
- issue: Sentido polémico de la astrología babilónica
  english_pob_reading: The verse is translated as an ironic challenge to astrologers who cannot save Babylon.
  chosen_spanish_reading: El verso se vierte como un desafío irónico a astrólogos que no pueden salvar a Babilonia.
  alternative_spanish_readings:
  - El verso se entiende de consejeros generales que no pueden ayudar a Babilonia
  - El verso alude solo a sabios sin matiz astrológico explícito
  rationale: El contexto inmediato de Isaías 47 critica hechicerías y prácticas de adivinación. Por eso se mantiene la referencia astrológica implícita en «los que dividen los cielos» y «los que observan las estrellas», sin sobreexplicar más allá del hebreo.
  doctrine_reference: Isaías 47; principio de equivalencia óptima; contexto de juicio contra Babilonia
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que prefirió «wearied» sobre «worn out» por un registro más formal. En español se optó por «fatigada» para conservar formalidad y naturalidad, sin perder el valor resultativo del verbo hebreo. También se mantuvo la estructura irónica y la secuencia de especialistas astrales del POB inglés.
  spanish_consistency_notes:
  - Se conserva el tratamiento femenino singular para Babilonia, en coherencia con la personificación del texto hebreo.
  - «Cielos» se usa en plural como imagen del firmamento/los cielos astrales, evitando una paráfrasis que diluya la figura.
  - «Mes por mes» deja abierta la posibilidad de referencia a novilunios, como en la nota textual del POB inglés.
  - No se sustituyó el lenguaje astrológico por términos más genéricos, para no perder el filo polémico del pasaje.
