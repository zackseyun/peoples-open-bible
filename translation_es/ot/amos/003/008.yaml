translation:
  language: es
  text: Un león ha rugido—¿quién no temerá? El Señor Yahvé[a] ha hablado—¿quién no profetizará?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''Adonai YHWH''. Se traduce ''el Señor Yahvé'' para conservar tanto el título ''Señor'' como el nombre divino Yahvé presentes en la fórmula compuesta.'
    reason: alternative_reading
  - marker: b
    text: 'También puede entenderse de manera más idiomática: ''¿quién puede dejar de profetizar?''.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַרְיֵה
  english_pob_choice: lion
  chosen_spanish: un león
  alternatives_spanish:
  - león
  lexicon: HALOT
  rationale: El hebreo presenta el sustantivo común para el animal; en español, el artículo indefinido hace natural e idiomática la referencia sin añadir contenido.
- source_word: שָׁאַג
  english_pob_choice: has roared
  chosen_spanish: ha rugido
  alternatives_spanish:
  - rugió
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción ya ocurrida cuya consecuencia retórica sigue vigente. 'Ha rugido' conserva esa relación causal e inmediata en un español natural.
- source_word: מִי לֹא יִירָא
  english_pob_choice: who will not fear?
  chosen_spanish: ¿quién no temerá?
  alternatives_spanish:
  - ¿quién no teme?
  - ¿quién no tendría miedo?
  lexicon: HALOT
  rationale: La pregunta retórica espera una respuesta universal. El futuro en español transmite mejor la inevitabilidad de la reacción que un presente simple.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: The Lord GOD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor Dios
  lexicon: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahweh'
  rationale: En este proyecto, el nombre divino YHWH se vierte como 'Yahvé'. Aquí el hebreo tiene la fórmula compuesta 'Adonai YHWH'; en español se evita duplicar títulos como 'Señor Yahvé' en el texto principal cuando la lectura directa del nombre divino ya comunica la referencia y mantiene la distinción del Tetragrámaton.
- source_word: דִּבֶּר
  english_pob_choice: has spoken
  chosen_spanish: ha hablado
  alternatives_spanish:
  - habló
  lexicon: HALOT
  rationale: El perfecto hebreo se conserva bien con el pretérito perfecto compuesto, que paraleliza 'ha rugido' y refuerza la relación entre el acto divino y la respuesta profética.
- source_word: מִי לֹא יִנָּבֵא
  english_pob_choice: who will not prophesy?
  chosen_spanish: ¿quién no profetizará?
  alternatives_spanish:
  - ¿quién puede dejar de profetizar?
  - ¿quién no profetiza?
  lexicon: HALOT
  rationale: '''Profetizar'' es el equivalente directo de נבא. Se conserva la forma interrogativa retórica sin expandirla a una paráfrasis idiomática que no esté explícita en el hebreo.'
theological_decisions:
- issue: Representación de יְהוָה dentro de la fórmula אֲדֹנָי יְהוִה
  english_pob_reading: The Lord GOD (with a note that 'the Lord Yahweh' is an alternative)
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor Yahvé
  - el Señor Dios
  rationale: El audit trail inglés reconoce que el hebreo dice 'Lord YHWH'. En español, el nombre divino se traduce consistentemente como 'Yahvé'. Aunque la fórmula completa de base es 'Adonai YHWH', el texto principal no necesita duplicar el título 'Señor' para expresar el referente divino; la nota puede preservar la tensión entre título y nombre si se desea.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahweh'
- issue: Fuerza retórica de la pregunta final
  english_pob_reading: who will not prophesy? / who can but prophesy?
  chosen_spanish_reading: ¿quién no profetizará?
  alternative_spanish_readings:
  - ¿quién puede dejar de profetizar?
  - ¿quién no profetiza?
  rationale: La redacción principal conserva la pregunta retórica literal. La alternativa idiomática '¿quién puede dejar de profetizar?' expresa la fuerza implicada por el inglés POB, pero se deja fuera del texto principal para no añadir una perífrasis ausente del hebreo.
  doctrine_reference: HALOT; rhetorical parallelism in Amos 3:8
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: la equivalencia óptima mantiene la secuencia causal ''rugido → temor'' y ''habla divina → profecía'', mientras que la decisión sobre el nombre divino sigue la convención española del proyecto para YHWH. No se adoptaron expansiones interpretativas más allá de la pregunta retórica del hebreo.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar para YHWH en el cuerpo del texto.
  - Se usa 'profetizar' de forma directa para נבא, sin sustituirlo por perífrasis eclesiásticas.
  - 'Se conserva el paralelismo verbal con pretérito perfecto compuesto: ''ha rugido'' / ''ha hablado''.'
  - El tono es bíblico pero moderno y legible en español neutral.
