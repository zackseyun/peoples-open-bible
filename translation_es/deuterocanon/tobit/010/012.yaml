  yaml_path: translation/deuterocanon/tobit/010/012.yaml
  text: And he said to his daughter[a], “Honor your parents-in-law; they are now your parents. May I hear a good report of you.” And he kissed her. And Edna said to Tobiah, “Beloved brother, may the Lord of heaven restore you, and may he grant me to see children by you and by Sarah my daughter, so that I may rejoice before the Lord. And behold, I entrust my daughter to you as a trust[b]; do not grieve her.”
  footnotes:
