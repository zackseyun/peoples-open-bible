base_translation:
  language: en
  yaml_path: translation/ot/psalms/084/004.yaml
  text: Even the sparrow has found a home[a], and the swallow a nest for herself, where she may lay her young—at your altars, O Yahweh of Armies[c][b], my King and my God.
  footnotes:
  - marker: a
    text: Or, 'where she has laid her young.' The Hebrew verb can be understood as a completed action rather than a general description of the nest's purpose.
    reason: lexical_alternative
  - marker: b
    text: Or, 'near your altars' or 'beside your altars.' The Hebrew construction is compact and may express proximity rather than literal placement on the altars.
    reason: lexical_alternative
  - marker: c
    text: 'Traditional: ''LORD of hosts.'''
    reason: lexical_alternative
