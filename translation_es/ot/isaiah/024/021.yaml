translation:
  language: es
  text: Y aquel día Yahvé castigará a la hueste del cielo en el cielo[a][b], y a los reyes de la tierra en la tierra[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «visitará»; el hebreo puede significar «castigará», «llamará a cuentas» o, más literalmente, «visitará» en juicio.
    reason: lexical_alternative
  - marker: b
    text: O «la hueste de la altura en la altura». El hebreo dice más literalmente «la hueste de la altura en la altura», lo que puede referirse a poderes celestiales o a poderes exaltados de arriba.
    reason: alternative_reading
  - marker: c
    text: O «los reyes del país en el país». Aquí «tierra» encaja mejor con el contraste cósmico con «el cielo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And ...
  chosen_spanish: Y ...
  alternatives_spanish:
  - Y sucederá
  - Y acontecerá
  lexicon: HALOT
  rationale: La forma funciona como introducción discursiva al marco temporal profético. En español, «Y» al inicio conserva la continuidad narrativa sin sobrecargar la frase con un verbo auxiliar innecesario.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: HALOT
  rationale: Es el giro temporal profético habitual. «En aquel día» es natural en español bíblico contemporáneo y mantiene el valor escatológico/judicial.
- source_word: יִפְקֹד
  english_pob_choice: will punish
  chosen_spanish: castigará
  alternatives_spanish:
  - visitará
  - llamará a cuentas
  lexicon: HALOT
  rationale: Con עַל en contexto de juicio, פקד expresa visita judicial/punitiva. «Castigará» comunica con claridad la fuerza judicial sin ocultar la idea de intervención activa. La alternativa «visitará» preserva la idiomática hebrea pero es menos transparente en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre divino según la norma del proyecto, evitando sustituirlo por un título. «Yahvé» es la forma base en español POB para יהוה.
- source_word: צְבָא הַמָּרוֹם בַּמָּרוֹם
  english_pob_choice: the host of heaven in heaven
  chosen_spanish: el ejército del cielo en el cielo
  alternatives_spanish:
  - el ejército de lo alto en lo alto
  - el host del cielo en el cielo
  lexicon: HALOT
  rationale: El hebreo admite una referencia a poderes celestiales y mantiene paralelismo espacial. «Ejército» comunica el sentido colectivo de צבא en español; «cielo» hace natural la expresión y refleja la decisión revisada del audit trail, sin resolver de manera excesiva la identidad exacta del grupo.
- source_word: מַלְכֵי הָאֲדָמָה
  english_pob_choice: the kings of the earth
  chosen_spanish: los reyes de la tierra
  alternatives_spanish:
  - los reyes del país
  - los reyes del suelo
  lexicon: HALOT
  rationale: En este contexto de contraste cósmico, «tierra» es la mejor correspondencia para הָאֲדָמָה y preserva el paralelo con «cielo».
- source_word: עַל הָאֲדָמָה
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre el país
  lexicon: HALOT
  rationale: «Sobre la tierra» conserva la preposición de dominio o alcance de עַל y mantiene el paralelismo con la esfera celestial mencionada antes.
theological_decisions:
- issue: Identidad del "ejército del cielo"
  english_pob_reading: Render the phrase literally without specifying whether it refers to angelic/heavenly powers or exalted rulers.
  chosen_spanish_reading: Se traduce literalmente como «el ejército del cielo en el cielo», sin precisar si se trata de huestes angélicas, poderes celestiales o una formulación de realeza/exaltación.
  alternative_spanish_readings:
  - el ejército celestial
  - la hueste de los cielos
  - las potestades de lo alto
  rationale: El hebreo permite más de una identificación y el contexto conserva la tensión entre esfera celeste y terrena. La traducción mantiene esa ambigüedad productiva en lugar de decidirla por adelantado.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail en inglés, que pasó de una traducción más literal de «the height in the height» a «the host of heaven in heaven». La redacción española sigue esa revisión, preservando la estructura paralela con «los reyes de la tierra sobre la tierra» y evitando resolver en exceso la identidad del grupo celestial.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה, conforme al estándar del proyecto.
  - Se eligió «ejército» para צבא por naturalidad en español y por su valor colectivo, manteniendo abierta la referencia.
  - Se conservó el paralelismo espacial cielo/tierra que estructura el versículo.
  - Las notas al pie reproducen la tensión léxica entre castigo judicial y visita, y entre lectura literal y lectura interpretativa del grupo celestial.
