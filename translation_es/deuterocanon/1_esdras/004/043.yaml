translation:
  language: es
  text: 'Entonces le dijo al rey[a]: «Recuerda el voto que prometiste de reconstruir Jerusalén el día en que recibiste tu reino».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la oración que hiciste»; el sustantivo griego puede significar «oración», pero aquí el verbo cognado y el contexto favorecen «voto».
    reason: lexical_alternative
lexical_decisions:
- source_word: Μνήσθητι
  english_pob_choice: Remember
  chosen_spanish: Recuerda
  alternatives_spanish:
  - Acuérdate
  - Ten presente
  lexicon: BDAG
  rationale: El imperativo aoristo funciona como una exhortación directa al rey. «Recuerda» es natural, solemne y fiel al valor de apelación directa del griego.
- source_word: εὐχήν
  english_pob_choice: vow
  chosen_spanish: voto
  alternatives_spanish:
  - oración
  - promesa
  lexicon: BDAG
  rationale: En este contexto, el verbo cognado ηὔξω muestra que no se trata de una oración general sino de un compromiso asumido. «Voto» conserva esa fuerza obligativa en español.
- source_word: ἣν ηὔξω
  english_pob_choice: that you vowed
  chosen_spanish: que hiciste
  alternatives_spanish:
  - que votaste
  - que prometiste
  lexicon: BDAG
  rationale: La relación cognada entre sustantivo y verbo ya queda expresada en «voto»; por eso en español basta con explicitar la acción con «hiciste» sin sobrecargar la frase. La idea completa es «el voto que hiciste».
- source_word: οἰκοδομῆσαι
  english_pob_choice: to rebuild
  chosen_spanish: reconstruir
  alternatives_spanish:
  - reedificar
  - edificar de nuevo
  lexicon: BDAG
  rationale: Jerusalén no se construye por primera vez, sino que se restaura. «Reconstruir» comunica bien esa restauración histórica en español moderno.
- source_word: τὴν Ἰερουσαλήμ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  lexicon: LSJ
  rationale: Nombre propio estándar en español bíblico y de uso general.
- source_word: ἐν τῇ ἡμέρᾳ ᾗ
  english_pob_choice: on the day when
  chosen_spanish: el día en que
  alternatives_spanish:
  - el día cuando
  - cuando
  lexicon: BDAG
  rationale: La expresión temporal griega se vierte de forma natural y precisa como «el día en que», manteniendo el marco explícito del original.
- source_word: τὸ βασίλειόν σου παρέλαβες
  english_pob_choice: you received your kingdom
  chosen_spanish: recibiste tu reino
  alternatives_spanish:
  - recibiste tu realeza
  - tomaste posesión de tu reino
  lexicon: BDAG
  rationale: παραλαμβάνω aquí indica recibir una autoridad ya entregada. «Recibiste tu reino» sigue de cerca el griego y suena claro en español.
theological_decisions:
- issue: εὐχή como compromiso u oración
  english_pob_reading: vow
  chosen_spanish_reading: voto
  alternative_spanish_readings:
  - oración
  - petición
  rationale: El contexto y el verbo cognado favorecen una lectura de compromiso formal, no de súplica. Traducir «voto» preserva la tensión lexical sin diluirla en lenguaje devocional más general.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El texto griego presenta una alta coincidencia con el audit trail inglés; no se requieren revisiones sustantivas. Se conservó la decisión central de εὐχή como «voto» por el apoyo inmediato de ηὔξω y el contexto retórico.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - «Jerusalén» y «reino» conservan el registro bíblico natural en español.
  - Se evitó «SEÑOR» porque no hay aquí un tetragrámaton a disimular ni una cita directa de κύριος sobre el nombre divino.
