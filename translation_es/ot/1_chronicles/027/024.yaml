base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/027/024.yaml
  text: Joab son of Zeruiah began to count[a], but he did not finish; and because of this wrath came upon Israel[b]. And the number was not entered in the account of the chronicles of King David.
  footnotes:
  - marker: a
    text: Or 'was not included' or 'was not recorded.' The Hebrew literally says 'did not go up,' an idiom for being entered into an official record.
    reason: lexical_alternative
  - marker: b
    text: '''the chronicles'' refers to the royal annals or official record associated with King David.'
    reason: cultural_note
