translation:
  language: es
  text: 'Y el vigilante estaba de pie sobre la torre en Jezreel, y vio el grupo de Jehú cuando venía, y dijo: «Veo un grupo». Y Joram dijo: «Toma un jinete y envíalo a encontrarse con ellos, y que diga: “¿Hay paz?[a]”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más idiomáticamente, «¿Está todo bien?»
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצֹּפֶה
  english_pob_choice: the watchman
  chosen_spanish: el vigilante
  alternatives_spanish:
  - el centinela
  - el guardia
  lexicon: HALOT
  rationale: El sustantivo designa a quien vela o hace guardia. En español, «vigilante» comunica bien esa función narrativa sin introducir un matiz técnico eclesiástico o profético que el contexto no exige.
- source_word: עֹמֵד
  english_pob_choice: was standing
  chosen_spanish: estaba de pie
  alternatives_spanish:
  - estaba parado
  - se hallaba de pie
  lexicon: HALOT
  rationale: El participio tiene valor de estado continuo en el trasfondo de la escena. «Estaba de pie» conserva ese aspecto durativo de manera natural en español.
- source_word: הַמִּגְדָּל
  english_pob_choice: the tower
  chosen_spanish: la torre
  alternatives_spanish:
  - la torre de vigilancia
  - el torreón
  lexicon: HALOT
  rationale: La raíz básica significa «torre». «La torre» sigue de cerca el hebreo; el contexto de vigilancia permite esa referencia sin necesidad de ampliar el término.
- source_word: בְּיִזְרְעֶאל
  english_pob_choice: in Jezreel
  chosen_spanish: en Jezreel
  alternatives_spanish:
  - en Yizreel
  lexicon: HALOT
  rationale: Se conserva el nombre propio en transliteración estándar para mantener la continuidad geográfica y textual.
- source_word: שִׁפְעַת
  english_pob_choice: the company
  chosen_spanish: la multitud
  alternatives_spanish:
  - la compañía
  - la tropa
  - la muchedumbre
  lexicon: HALOT
  rationale: El término puede indicar una masa o abundancia visible. En español, «multitud» refleja mejor el valor colectivo sin forzar una lectura militar más específica de la que el hebreo garantiza aquí.
- source_word: יֵהוּא
  english_pob_choice: Jehu
  chosen_spanish: Jehu
  alternatives_spanish:
  - Jehú
  lexicon: HALOT
  rationale: Se conserva la forma transliterada habitual del nombre propio; la adaptación acentuada «Jehú» es posible en español, pero la forma sin tilde mantiene mejor la uniformidad con la práctica de transliteración del proyecto.
- source_word: בְּבֹאוֹ
  english_pob_choice: as he came
  chosen_spanish: cuando venía
  alternatives_spanish:
  - al venir
  - cuando llegaba
  - mientras venía
  lexicon: HALOT
  rationale: La construcción temporal marca la llegada en curso. «Cuando venía» preserva el sentido aspectual y resulta idiomático en español narrativo.
- source_word: שִׁפְעַת אֲנִי רֹאֶה
  english_pob_choice: I see a company
  chosen_spanish: Veo una multitud
  alternatives_spanish:
  - Veo una compañía
  - Veo una tropa
  lexicon: HALOT
  rationale: Se conserva la repetición del sustantivo para reflejar el énfasis del hebreo. «Multitud» mantiene el valor colectivo y evita restringir indebidamente el grupo a una unidad militar definida.
- source_word: קַח רַכָּב
  english_pob_choice: Take a horseman
  chosen_spanish: Toma un jinete
  alternatives_spanish:
  - Toma un caballero
  - Toma un montado
  lexicon: HALOT
  rationale: El singular y el contexto apuntan a un mensajero montado individual. «Jinete» es claro y natural en español; «caballero» podría sugerir estatus social y «montado» suena menos idiomático.
- source_word: וּשְׁלַח לִקְרָאתָם
  english_pob_choice: and send him to meet them
  chosen_spanish: y envíalo a su encuentro
  alternatives_spanish:
  - y envíalo a encontrarlos
  - y mándalo al encuentro de ellos
  lexicon: HALOT
  rationale: El sufijo plural hebreo se mantiene implícito en «su encuentro», que en español puede abarcar un grupo ya mencionado. Se evita una formulación demasiado pesada, pero se conserva la referencia al conjunto.
- source_word: וְיֹאמַר
  english_pob_choice: and let him say
  chosen_spanish: y que diga
  alternatives_spanish:
  - y dirá
  - y diga
  lexicon: HALOT
  rationale: Tras el imperativo, el imperfecto con valor jussivo se vierte naturalmente como mandato indirecto. «Que diga» transmite la instrucción de forma clara y fluida.
- source_word: הֲשָׁלוֹם
  english_pob_choice: Is it peace?
  chosen_spanish: ¿Hay paz?
  alternatives_spanish:
  - ¿Está todo bien?
  - ¿Vienes en paz?
  - ¿Hay bienestar?
  lexicon: HALOT
  rationale: La expresión hebrea es breve y formularia; pregunta por paz/bienestar/ausencia de hostilidad. «¿Hay paz?» conserva la concisión y la fuerza del motivo recurrente, mientras que otras opciones se reservan como equivalentes idiomáticos posibles.
theological_decisions:
- issue: Sentido de הֲשָׁלוֹם como fórmula de interrogación
  english_pob_reading: Is it peace? with a note that more idiomatically it may mean “Is all well?”
  chosen_spanish_reading: ¿Hay paz?
  alternative_spanish_readings:
  - ¿Está todo bien?
  - ¿Vienes en paz?
  rationale: Se conserva la literalidad formularia del hebreo para no suavizar el motivo narrativo repetido en el capítulo. La nota permite la lectura idiomática de bienestar o ausencia de hostilidad sin perder la tensión del texto.
  doctrine_reference: Narrative formula; no special doctrinal point
- issue: Valor de שִׁפְעַת como grupo visible
  english_pob_reading: the company of Jehu
  chosen_spanish_reading: la multitud de Jehu
  alternative_spanish_readings:
  - la compañía de Jehu
  - la tropa de Jehu
  rationale: El hebreo no especifica la naturaleza militar exacta del grupo; puede verse simplemente como una masa o conjunto. «Multitud» evita imponer una precisión no garantizada por la forma del sustantivo.
  doctrine_reference: Lexical-semantic precision
translation_notes:
  revision_awareness: Se ha seguido el texto hebreo masorético y el audit trail inglés sin cambios de revisión adicionales; la versión española mantiene la misma estructura narrativa y la misma tensión semántica en הֲשָׁלוֹם, con una nota que preserva la alternativa idiomática documentada.
  spanish_consistency_notes:
  - Se mantuvo la transliteración «Jezreel» y «Jehu» para coherencia con la práctica del proyecto.
  - Se evitó «SEÑOR» porque el versículo no contiene el nombre divino.
  - Se conservó la repetición de «multitud» para reflejar el hebreo שִׁפְעַת en ambas ocurrencias.
  - La puntuación reproduce la secuencia narrativa y el discurso directo de forma clara para lectura pública.
