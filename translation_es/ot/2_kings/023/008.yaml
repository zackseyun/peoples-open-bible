translation:
  language: es
  text: Hizo venir a todos los sacerdotes de las ciudades de Judá y profanó los lugares altos donde los sacerdotes habían quemado incienso allí, desde Guibeá hasta Beerseba. También derribó los lugares altos de las puertas[a] que estaban a la entrada de la puerta de Josué, el gobernador de la ciudad[b], que quedaban a la izquierda de un hombre en la puerta de la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más interpretativa: «los santuarios de las puertas». El hebreo dice literalmente «los lugares altos de las puertas».'
    reason: lexical_alternative
  - marker: b
    text: La frase hebrea «que quedaban a la izquierda de un hombre en la puerta de la ciudad» es difícil. Probablemente se refiere al lado izquierdo al entrar por la puerta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֵא
  english_pob_choice: He brought
  chosen_spanish: Hizo venir
  alternatives_spanish:
  - Trajo
  - Hizo llegar
  lexicon: HALOT
  rationale: El hebreo hifil de בוא expresa causar que alguien venga. En español, 'hizo venir' conserva mejor esa idea causal que un simple 'trajo', y encaja con el movimiento de los sacerdotes desde Judá hacia el lugar de la reforma.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes cultuales
  - el clero
  lexicon: HALOT
  rationale: '''Sacerdotes'' es el equivalente natural y fiel de כֹּהֲנִים. ''Clero'' o una expansión similar añadirían un matiz eclesiástico ajeno al contexto.'
- source_word: מֵעָרֵי יְהוּדָה
  english_pob_choice: from the cities of Judah
  chosen_spanish: de las ciudades de Judá
  alternatives_spanish:
  - de las poblaciones de Judá
  - de los pueblos de Judá
  lexicon: HALOT
  rationale: '''Ciudades'' reproduce bien עָרִים y mantiene la amplitud geográfica del texto, sin restringir innecesariamente a aldeas o poblaciones menores.'
- source_word: וַיְטַמֵּא
  english_pob_choice: defiled
  chosen_spanish: profanó
  alternatives_spanish:
  - contaminó
  - volvió impuros
  lexicon: HALOT
  rationale: En español, 'profanó' comunica bien la acción cultual de hacer impuro o desacralizar un lugar. Conserva el peso religioso del verbo sin sonar técnico o forzado.
- source_word: הַבָּמוֹת
  english_pob_choice: the high places
  chosen_spanish: los lugares altos
  alternatives_spanish:
  - los altos lugares
  - los santuarios de altura
  lexicon: HALOT
  rationale: '''Lugares altos'' es el equivalente español más claro y reconocido para בָּמוֹת, y evita una paráfrasis excesiva.'
- source_word: קִטְּרוּ שָׁמָּה
  english_pob_choice: had burned incense there
  chosen_spanish: habían quemado incienso
  alternatives_spanish:
  - habían ofrecido incienso allí
  - habían quemado allí incienso
  lexicon: HALOT
  rationale: '''Quemar incienso'' expresa de forma idiomática la práctica cultual. Se omite ''allí'' en el cuerpo porque el referente ya queda claro por el contexto; la localización no se pierde.'
- source_word: מִגֶּבַע עַד בְּאֵר שָׁבַע
  english_pob_choice: from Geba to Beer-sheba
  chosen_spanish: desde Guibea hasta Beerseba
  alternatives_spanish:
  - de Guibea hasta Beerseba
  - desde Geba hasta Beerseba
  lexicon: HALOT
  rationale: Se conserva la merisma geográfica. 'Guibea' sigue mejor la transliteración hebrea גֶּבַע que 'Geba', y 'Beerseba' es la forma tradicional y clara en español.
- source_word: וְנָתַץ
  english_pob_choice: He also tore down
  chosen_spanish: También derribó
  alternatives_spanish:
  - Y demolió
  - También destruyó
  lexicon: HALOT
  rationale: '''Derribó'' comunica bien la demolición física de estructuras cultuales y suena natural en español. ''También'' refleja el valor aditivo de וְ.'
- source_word: בָּמוֹת הַשְּׁעָרִים
  english_pob_choice: the high places of the gates
  chosen_spanish: los lugares altos de las puertas
  alternatives_spanish:
  - los santuarios de las puertas
  - los lugares altos junto a las puertas
  lexicon: HALOT
  rationale: Se mantiene la forma compacta del hebreo. Aunque es una expresión difícil, 'lugares altos de las puertas' conserva la tensión y evita resolverla demasiado pronto con una interpretación cerrada.
- source_word: פֶּתַח שַׁעַר יְהוֹשֻׁעַ
  english_pob_choice: the entrance of the gate of Joshua
  chosen_spanish: a la entrada de la puerta de Josué
  alternatives_spanish:
  - en la entrada de la puerta de Josué
  - junto a la entrada de la puerta de Josué
  lexicon: HALOT
  rationale: '''A la entrada de la puerta'' reproduce פֶּתַח שַׁעַר de modo natural en español, sin perder la estructura de entrada/puerta del hebreo.'
- source_word: שַׂר הָעִיר
  english_pob_choice: the governor of the city
  chosen_spanish: el gobernador de la ciudad
  alternatives_spanish:
  - el oficial de la ciudad
  - el príncipe de la ciudad
  lexicon: HALOT
  rationale: '''Gobernador'' es la opción más clara en español para un cargo administrativo local, y evita el arcaísmo o ambigüedad de ''príncipe''.'
- source_word: אֲשֶׁר עַל שְׂמֹאול אִישׁ
  english_pob_choice: which were on the left of a man
  chosen_spanish: que quedaban a la izquierda de un hombre
  alternatives_spanish:
  - que estaban a la izquierda de un hombre
  - que quedaban a mano izquierda
  lexicon: HALOT
  rationale: La frase es difícil y el hebreo es elíptico. 'Quedaban a la izquierda de un hombre' conserva la imagen direccional sin forzar una explicación más interpretativa que el texto no da explícitamente.
- source_word: בְּשַׁעַר הָעִיר
  english_pob_choice: at the city gate
  chosen_spanish: en la puerta de la ciudad
  alternatives_spanish:
  - a la puerta de la ciudad
  - junto a la puerta de la ciudad
  lexicon: HALOT
  rationale: '''Puerta de la ciudad'' es la expresión española natural para בְּשַׁעַר הָעִיר y mantiene el marco arquitectónico del pasaje.'
theological_decisions:
- issue: Impureza/profanación cultual de los lugares altos
  english_pob_reading: defiled the high places
  chosen_spanish_reading: profanó los lugares altos
  alternative_spanish_readings:
  - contaminó los lugares altos
  - los volvió impuros
  rationale: El gesto de Josías no es solo higiénico o administrativo; es una desacralización cultual. 'Profanó' preserva ese peso teológico y ritual mejor que una formulación meramente física.
  doctrine_reference: Pureza/impureza ritual en el culto de Israel; 2 Reyes 23 en el contexto de la reforma de Josías.
- issue: La expresión difícil sobre la ubicación de los altares de las puertas
  english_pob_reading: which were on the left of a man at the city gate
  chosen_spanish_reading: que quedaban a la izquierda de un hombre en la puerta de la ciudad
  alternative_spanish_readings:
  - que estaban a la izquierda de un hombre en la puerta de la ciudad
  - que quedaban a mano izquierda al entrar por la puerta de la ciudad
  rationale: Se mantiene la ambigüedad del hebreo, porque el texto no define con precisión la orientación más allá de la imagen espacial. No se la resuelve de manera excesiva en el cuerpo del verso.
  doctrine_reference: Principios de fidelidad textual y cautela exegética frente a pasajes topográficamente difíciles.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó por una revisión menor en la cláusula final, cambiando de una formulación más rígida ('on a man's left') a otra más literal y natural ('on the left of a man'). La redacción española sigue esa decisión revisada y conserva la cautela interpretativa sobre la ubicación exacta.
  spanish_consistency_notes:
  - Se usó 'Yahvé' cuando no aparece el Tetragrámaton en este versículo, por lo que no fue necesario en el texto principal.
  - Se mantuvo la terminología cultual 'lugares altos' para בָּמוֹת, en coherencia con el vocabulario POB.
  - '''Quemar incienso'' se prefirió a una paráfrasis más amplia porque el verbo hebreo קטר tiene fuerza cultual específica.'
  - La topografía del cierre se dejó en una forma ligeramente abierta para respetar la dificultad del hebreo y la decisión auditada en inglés.
