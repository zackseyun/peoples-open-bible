  source_alignment_summary: 'El borrador español refleja bien la secuencia narrativa hebrea: Josué los envía, ellos van al lugar/emboscada, permanecen entre Betel y Hai al oeste de Hai, y Josué pasa esa noche entre el pueblo. Sin embargo, el marcador de nota en «los envió[a]» no corresponde al punto léxico discutido en la nota inglesa y en las decisiones léxicas, que pertenece a הַמַּאְרָב. Conviene anclar la nota en «lugar de la emboscada[a]».'
  spanish_quality_summary: El español es claro, natural y digno. «Así Josué» suena un poco formulístico; «Entonces Josué» fluye mejor en narrativa bíblica contemporánea. El resto es legible y fiel. «Entre el pueblo» funciona, aunque «en medio del pueblo» también sería posible; no es necesario cambiarlo.
  glossary_alignment: No hay términos teológicos de glosario mayor en este versículo. Los topónimos «Betel» y «Hai» son aceptables y consistentes. La elección «lugar de la emboscada» concuerda con la racionalidad auditada, pero la nota debe anclarse allí, no en «envió».
