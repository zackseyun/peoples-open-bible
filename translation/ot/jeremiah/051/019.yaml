id: JER.51.19
reference: Jeremiah 51:19
source:
  edition: WLC
  text: לֹֽא כְ/אֵ֜לֶּה חֵ֣לֶק יַעֲק֗וֹב כִּֽי יוֹצֵ֤ר הַ/כֹּל֙ ה֔וּא וְ/שֵׁ֖בֶט נַחֲלָת֑/וֹ יְהוָ֥ה צְבָא֖וֹת שְׁמֽ/וֹ־־׃ס
translation:
  text: Not like these is the Portion of Jacob[a], for he is the one who formed everything, and Israel is the tribe of his inheritance[c][b]; Yahweh of Armies is his name.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'Jacob’s portion.' The Hebrew may mean either that the LORD is Jacob’s allotted share or, less likely in context, that Jacob possesses this portion.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'and the tribe of his inheritance.' The referent is Jacob/Israel as the people belonging to the LORD; some translations supply 'Israel' from the parallel in Jeremiah 10:16 for clarity.
    reason: alternative_reading
  - marker: c
    text: 'Traditional rendering: ''the LORD of hosts.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא כְאֵלֶּה
  chosen: Not like these
  alternatives:
  - Not like them
  lexicon: HALOT
  rationale: A direct comparison with the idols described in the surrounding context. 'These' closely reflects the demonstrative plural and preserves the immediacy of the Hebrew.
- source_word: חֵלֶק יַעֲקֹב
  chosen: the Portion of Jacob
  alternatives:
  - Jacob's portion
  - the portion of Jacob
  lexicon: HALOT
  rationale: The construct phrase can mean either 'Jacob's portion' or 'the Portion of Jacob.' In context, it refers to the LORD as Jacob's allotted share, contrasting him with idols. Capitalizing 'Portion' signals that it functions as a divine designation here without over-paraphrasing.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: '''For'' naturally introduces the ground for the preceding assertion in English and preserves the causal force.'
- source_word: יוֹצֵר הַכֹּל
  chosen: the one who formed everything
  alternatives:
  - the former of all things
  - the maker of all
  lexicon: HALOT
  rationale: יוֹצֵר denotes one who forms or fashions. 'Formed everything' is clear modern English and preserves the creator contrast with handmade idols.
- source_word: הוּא
  chosen: he is
  alternatives:
  - he
  - it is he who is
  lexicon: HALOT
  rationale: The pronoun is emphatic; 'he is' keeps the clause natural in English while retaining the personal emphasis on the LORD.
- source_word: וְשֵׁבֶט נַחֲלָתוֹ
  chosen: and Israel is the tribe of his inheritance
  alternatives:
  - and the tribe of his inheritance
  - and the scepter of his inheritance
  lexicon: HALOT
  rationale: The parallel in Jer 10:16 includes 'Israel,' which is implied here by sense and ancient versions, but the MT as given reads only 'and the tribe of his inheritance.' To avoid importing text not present in the source, the main translation keeps the phrase while making the referent explicit for English coherence. 'Tribe' is preferred over 'scepter' because in this collocation with 'inheritance' it refers to the people allotted to him, not a royal emblem.
- source_word: יְהוָה צְבָאוֹת
  chosen: the LORD of Armies
  alternatives:
  - the LORD of hosts
  lexicon: HALOT
  rationale: Per doctrine, יְהוָה is rendered 'the LORD.' צְבָאוֹת is translated rather than transliterated; 'of Armies' is more transparent to modern readers than 'of hosts' while preserving the martial/cosmic sense.
- source_word: שְׁמוֹ
  chosen: is his name
  alternatives:
  - his name
  lexicon: HALOT
  rationale: This completes the verbless clause idiomatically in English.
