    issue: Nota al pie incorrecta y poco natural
    rationale: La nota «de los Hosts» introduce un anglicismo ajeno al proyecto y no refleja fielmente la alternativa tradicional documentada. Debe ofrecer una alternativa española real, como «de las Huestes».
  - severity: low
    issue: «todo lo que está levantado» es poco idiomático
    rationale: Aunque semánticamente defendible para נִשָּׂא, la frase resulta pesada en español. «todo lo enaltecido» o «todo lo que es alzado» suena más natural y mantiene la imagen de elevación.
  - severity: low
    issue: Puntuación mejorable antes de la cláusula final
    rationale: El punto y coma funciona, pero una raya refleja mejor la fuerza resultativa de וְשָׁפֵל en esta línea profética.
  revised_spanish_text: Porque Yahvé de los Ejércitos[a] tiene un día contra todo lo orgulloso y elevado, y contra todo lo enaltecido; y será abatido.
  revised_footnotes:
