revisions:
- from: Por tanto, tengan compasión de ustedes mismos[a], de quienes aun yo, su enemigo, tengo compasión por causa de su edad.
  to: Por tanto, apiádense de ustedes mismos, de quienes aun yo, su enemigo, tengo compasión por causa de su edad[a].
  rationale: Se hizo una reparación menor para mejorar la naturalidad del español y corregir el anclaje de la nota léxica. «Apiádense de ustedes mismos» expresa bien el imperativo de κατελεήσατε y fluye mejor que «tengan compasión de ustedes mismos» en esta construcción. La nota [a] se movió a «edad», que es el punto donde realmente aplica la alternativa «juventud». No se requieren cambios doctrinales ni adjudicación adicional.
