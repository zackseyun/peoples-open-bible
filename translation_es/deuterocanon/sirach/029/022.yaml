translation:
  language: es
  text: Mejor es la vida de un pobre bajo techo[a] que los manjares espléndidos en casa ajena[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La palabra griega traducida de manera más literal como “pareciendo” o “siendo tenido por” es difícil en este proverbio. Se mantiene la lectura del sentido general: una vida modesta con protección es preferible.'
    reason: textual_variant
  - marker: b
    text: También puede entenderse “entre extraños” o “en casas ajenas”. El griego ἐν ἀλλοτρίοις puede aludir más ampliamente a lo que pertenece a otros.
    reason: lexical_alternative
lexical_decisions:
- source_word: κρείσσων
  english_pob_choice: Better is
  chosen_spanish: Mejor es
  alternatives_spanish:
  - Más excelente es
  - Es mejor
  lexicon: LSJ
  rationale: El comparativo proverbial se expresa de modo natural en español con 'Mejor es', manteniendo el valor evaluativo directo de κρείσσων sin añadir énfasis innecesario.
- source_word: βίος
  english_pob_choice: the life
  chosen_spanish: la vida
  alternatives_spanish:
  - el sustento
  - el modo de vida
  lexicon: LSJ
  rationale: βίος aquí apunta a la vida o forma de vivir en sentido amplio; 'la vida' conserva esa amplitud mejor que reducirlo a 'sustento'.
- source_word: πτωχοῦ
  english_pob_choice: of a poor man
  chosen_spanish: de un pobre
  alternatives_spanish:
  - de un hombre pobre
  - del pobre
  lexicon: LSJ
  rationale: El genitivo masculino singular se refleja de forma natural en español con 'de un pobre', manteniendo la referencia representativa del proverbio sin forzar una construcción más pesada.
- source_word: ὑπὸ σκέπην
  english_pob_choice: under shelter
  chosen_spanish: bajo techo
  alternatives_spanish:
  - bajo refugio
  - bajo cobijo
  - con techo
  lexicon: LSJ
  rationale: La imagen de protección/lodging se vierte de forma idiomática como 'bajo techo', que comunica cobertura y alojamiento sin sobreexplicar la relación exacta del griego.
- source_word: δοκῶν
  english_pob_choice: under shelter
  chosen_spanish: bajo techo[a]
  alternatives_spanish:
  - pareciendo
  - siendo tenido por
  lexicon: LSJ
  rationale: Se conserva la solución de la POB inglesa al tratar δοκῶν como una dificultad textual/lexical. En español no se traduce literalmente el participio porque produciría oscuridad; se integra en la frase proverbial y se documenta la dificultad en nota.
- source_word: ἐδέσματα
  english_pob_choice: food
  chosen_spanish: manjares
  alternatives_spanish:
  - alimentos
  - platos
  - comidas
  lexicon: LSJ
  rationale: ἐδέσματα son alimentos preparados o platos; 'manjares' transmite adecuadamente el carácter de comida elaborada y lujosa que exige el contexto.
- source_word: λαμπρά
  english_pob_choice: splendid
  chosen_spanish: espléndidos
  alternatives_spanish:
  - suntuosos
  - lujosos
  - finos
  lexicon: LSJ
  rationale: '''Espléndidos'' conserva el matiz de brillo/magnificencia de λαμπρά y armoniza con el registro proverbial sin exagerar el tono.'
- source_word: ἐν ἀλλοτρίοις
  english_pob_choice: in another's house
  chosen_spanish: en casa ajena[b]
  alternatives_spanish:
  - entre extraños
  - en casas ajenas
  - en lo ajeno
  lexicon: LSJ
  rationale: La forma griega puede referirse a lo que pertenece a otros o al ámbito de otros; 'en casa ajena' expresa naturalmente la dependencia de comer bajo techo de otros, y evita la genderización innecesaria del inglés previo.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente en cuanto al sentido de ἐν ἀλλοτρίοις como posesión ajena/‘another's house’, evitando una traducción masculinizada o demasiado específica. También se preservó la resolución audaz de δοκῶν como cláusula proverbial difícil, documentándola en nota.
  spanish_consistency_notes:
  - Se usó 'Yahvé' por defecto no aplicable en este versículo.
  - Se evitó 'Cristo/Mesías' por no aparecer en el texto.
  - '''bajo techo'' se mantuvo como imagen idiomática de protección, coherente con el registro sapiencial.'
  - '''casa ajena'' conserva la idea de dependencia de otros sin añadir interpretación doctrinal.'
