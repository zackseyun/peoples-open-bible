translation:
  language: es
  text: Sus raíces son para siempre[a], y sus ramas son largos días[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice: «Un hombre iracundo no puede ser justificado». Los testigos hebreo y griego divergen sustancialmente en este versículo.'
    reason: textual_variant
  - marker: b
    text: 'O: «larga vida».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁרְשֶׁיהָ / ρίζαι
  english_pob_choice: its roots
  chosen_spanish: sus raíces
  alternatives_spanish:
  - sus raíces
  - sus raíces, para siempre
  lexicon: HALOT
  rationale: Raíces conserva la imagen botánica del hebreo y del paralelo inglés. En español, el posesivo de tercera persona fem. se expresa de forma natural con 'sus', sin necesidad de marcar género del antecedente implícito.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - para siempre
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: '''Para siempre'' es la equivalencia natural y transparente en español para permanencia duradera. Mantiene el valor temporal sin sonar rígido.'
- source_word: וַעֲנָפֶיהָ
  english_pob_choice: and its branches
  chosen_spanish: y sus ramas
  alternatives_spanish:
  - y sus ramas
  - y sus renuevos
  - y sus boughs
  lexicon: HALOT
  rationale: '''Ramas'' reproduce el paralelismo vegetal con ''raíces'' de forma clara y común en español. ''Renuevos'' sería más interpretativo y menos directo.'
- source_word: אֹרֶךְ יָמִים
  english_pob_choice: length of days
  chosen_spanish: largura de días
  alternatives_spanish:
  - largura de días
  - larga vida
  - muchos días
  lexicon: HALOT
  rationale: Conservé la expresión más literal para preservar el giro poético y el eco bíblico. 'Largura de días' suena algo más marcado, pero refleja mejor la estructura idiomática del hebreo que una paráfrasis como 'larga vida'.
theological_decisions:
- issue: Desajuste textual mayor entre el hebreo conservado y el paralelo griego en Sirácides 1:20
  english_pob_reading: 'The Hebrew and Greek witnesses diverge substantially at this verse; the main text follows the surviving Hebrew, while a footnote preserves the Greek alternative: ''An angry man cannot be justified.'''
  chosen_spanish_reading: 'El texto principal sigue el hebreo conservado; una nota preserva la lectura griega alternativa: ''Un hombre iracundo no puede ser justificado.'''
  alternative_spanish_readings:
  - '''Un hombre enojado no puede ser justificado.'''
  - '''Un hombre de ira no puede ser declarado justo.'''
  rationale: El expediente auditado marca un 'major_mismatch'. Dado que el hebreo superviviente ofrece una sentencia poética distinta, se traduce ese texto en el cuerpo principal y se conserva honestamente la lectura griega como variante textual sustancial, sin fundir ambas tradiciones.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirácides desde el hebreo donde sobreviva; presentar con transparencia la incertidumbre textual.'
translation_notes:
  revision_awareness: El último pase de revisión no introdujo cambios; se mantiene la decisión de traducir el hebreo preservado y señalar explícitamente la divergencia con el griego.
  spanish_consistency_notes:
  - Se usa 'sus' para mantener naturalidad en español, aunque el antecedente implícito sea femenino en el hebreo.
  - Se conserva el registro poético y breve del verso, sin expandirlo más allá del testimonio fuente.
  - La nota textual distingue claramente la variante griega para no borrar el desajuste documentado.
