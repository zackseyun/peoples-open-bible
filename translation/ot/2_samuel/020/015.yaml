id: 2SA.20.15
reference: 2 Samuel 20:15
source:
  edition: WLC
  text: וַ/יָּבֹ֜אוּ וַ/יָּצֻ֣רוּ עָלָ֗י/ו בְּ/אָבֵ֨לָ/ה֙ בֵּ֣ית הַֽמַּעֲכָ֔ה וַ/יִּשְׁפְּכ֤וּ סֹֽלְלָה֙ אֶל הָ/עִ֔יר וַֽ/תַּעֲמֹ֖ד בַּ/חֵ֑ל וְ/כָל הָ/עָם֙ אֲשֶׁ֣ר אֶת יוֹאָ֔ב מַשְׁחִיתִ֖ם לְ/הַפִּ֥יל הַ/חוֹמָֽה־־־׃
translation:
  text: They came and besieged him in Abel-beth-maacah[a], and they cast up a siege ramp against the city, and it stood against the rampart[c][b]; and all the people who were with Joab were destroying it to bring down the wall.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'laid siege against it'; the Hebrew says 'against him,' likely focusing on Sheba as the target even though the city is under siege.
    reason: alternative_reading
  - marker: b
    text: Or 'embankment' or 'mound' for 'siege ramp.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew term rendered 'rampart' can refer to an outer defensive work or fortification.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  chosen: They came
  alternatives:
  - They arrived
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative verb from בוא, introducing the army's arrival. 'Came' is the natural narrative rendering.
- source_word: וַיָּצֻרוּ עָלָיו
  chosen: besieged him
  alternatives:
  - laid siege against him
  - besieged it
  lexicon: HALOT
  rationale: צור with עַל commonly means 'besiege.' The pronominal suffix is masculine singular and refers to Sheba, who had fled into the city (v. 14), so 'him' is retained rather than smoothing to 'it,' preserving the text's focus on the pursued man within the city.
- source_word: בְּאָבֵלָה בֵּית הַמַּעֲכָה
  chosen: in Abel-beth-maacah
  alternatives:
  - in Abel of Beth-maacah
  lexicon: HALOT
  rationale: Place name rendered by standard English transliteration and hyphenation. This reflects the conventional identification of the city name.
- source_word: וַיִּשְׁפְּכוּ סֹלְלָה
  chosen: they cast up a siege ramp
  alternatives:
  - they poured out an embankment
  - they built a mound
  lexicon: HALOT
  rationale: שׁפך literally 'pour out' is idiomatic in siege contexts for heaping up earthworks. סֹלְלָה denotes a siege mound/ramp. 'Cast up a siege ramp' is idiomatic modern English that preserves the military image.
- source_word: אֶל הָעִיר
  chosen: against the city
  alternatives:
  - to the city
  lexicon: HALOT
  rationale: Although אֶל is literally 'to/toward,' in this military context English idiom prefers 'against the city' for the direction and hostile purpose of the siege ramp.
- source_word: וַתַּעֲמֹד בַּחֵל
  chosen: it stood against the rampart
  alternatives:
  - it stood in the outer fortification
  - it stood by the wall
  lexicon: HALOT
  rationale: The feminine verb most naturally refers back to the feminine noun סֹלְלָה ('siege ramp'). חֵל can denote a defensive structure such as a rampart/outer wall. The clause likely means the siege ramp was set against the city's fortification. 'Stood against the rampart' preserves the imagery without overinterpreting.
- source_word: וְכָל הָעָם אֲשֶׁר אֶת יוֹאָב
  chosen: and all the people who were with Joab
  alternatives:
  - and all the troops with Joab
  - and all the people who belonged to Joab
  lexicon: HALOT
  rationale: The phrase is elliptical; אֶת with a personal name here marks association. In context it refers to Joab's forces. 'Who were with Joab' is a clear, minimally interpretive rendering.
- source_word: מַשְׁחִיתִם
  chosen: were destroying it
  alternatives:
  - were battering it down
  - were trying to destroy it
  lexicon: HALOT
  rationale: From שׁחת in a participial form, describing ongoing destructive action. The masculine plural subject is Joab's people; the object is best understood as the city/fortification. 'Were destroying it' keeps the participial progressive sense.
- source_word: לְהַפִּיל הַחוֹמָה
  chosen: to bring down the wall
  alternatives:
  - to make the wall fall
  - to topple the wall
  lexicon: HALOT
  rationale: נפל in the Hiphil means 'cause to fall.' 'Bring down the wall' is natural English and fits siege terminology.
