translation:
  language: es
  text: 'A causa de las palabras del rey y de sus nobles, la reina entró en la sala del banquete. La reina habló y dijo: «¡Rey, vive para siempre! No dejes que tus pensamientos te aterroricen, ni que cambie tu semblante[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «tus resplandores no cambien», un modismo que se refiere a la apariencia del rostro; compárese la expresión semejante en este capítulo para un rostro cuyo color cambia por miedo.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָ/קֳבֵל
  english_pob_choice: Because of
  chosen_spanish: A causa de
  alternatives_spanish:
  - Por
  - Debido a
  lexicon: HALOT
  rationale: La preposición aramea aquí expresa causa u ocasión. «A causa de» conserva de manera natural el valor causal del pasaje sin volverlo demasiado interpretativo.
- source_word: מִלֵּי
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - asuntos
  - dichos
  lexicon: HALOT
  rationale: El plural constructo se refiere a lo dicho por el rey y sus nobles. «Palabras» es directo y claro en español.
- source_word: רַבְרְבָנ֔וֹ/הִי
  english_pob_choice: his nobles
  chosen_spanish: sus nobles
  alternatives_spanish:
  - sus grandes
  - sus señores
  lexicon: HALOT
  rationale: El término denota altos dignatarios o grandes del reino. «Nobles» preserva el rango y suena natural en español contemporáneo.
- source_word: לְ/בֵית מִשְׁתְּיָא
  english_pob_choice: the banquet hall
  chosen_spanish: la sala del banquete
  alternatives_spanish:
  - la casa del banquete
  - el salón del banquete
  lexicon: HALOT
  rationale: La expresión es literalmente una «casa de banquete/bebida». «Sala del banquete» comunica el escenario cortesano con buena naturalidad y sin perder el carácter formal.
- source_word: עללת
  english_pob_choice: entered
  chosen_spanish: entró
  alternatives_spanish:
  - entró en
  - se presentó
  lexicon: HALOT
  rationale: El verbo significa entrar. «Entró» es fiel y evita sobrecargar el movimiento con matices no presentes en el arameo.
- source_word: וַ/אֲמֶ֗רֶת
  english_pob_choice: spoke and said
  chosen_spanish: habló y dijo
  alternatives_spanish:
  - respondió y dijo
  - contestó y dijo
  lexicon: HALOT
  rationale: Se conserva el giro semítico de dos verbos. En español, «habló y dijo» mantiene la secuencia sin implicar necesariamente una respuesta formal previa.
- source_word: לְ/עָלְמִ֣ין חֱיִ֔י
  english_pob_choice: O king, live forever!
  chosen_spanish: ¡Rey, vive para siempre!
  alternatives_spanish:
  - ¡Oh rey, vive para siempre!
  - ¡Que el rey viva para siempre!
  lexicon: HALOT
  rationale: Es la fórmula cortesana estándar. «Rey, vive para siempre» conserva el vocativo y la solemnidad, y resulta natural en español bíblico actual.
- source_word: רַעְיוֹנָ֔/ךְ
  english_pob_choice: your thoughts
  chosen_spanish: tus pensamientos
  alternatives_spanish:
  - tus reflexiones
  - tus preocupaciones
  lexicon: HALOT
  rationale: El sustantivo se refiere a pensamientos o meditaciones de la mente. «Pensamientos» mantiene el valor léxico sin anticipar demasiado el efecto emocional.
- source_word: יְבַהֲלוּ/ךְ
  english_pob_choice: terrify you
  chosen_spanish: te aterroricen
  alternatives_spanish:
  - te alarmen
  - te turben
  lexicon: HALOT
  rationale: El verbo expresa perturbar intensamente, hasta causar temor. «Aterroricen» reproduce bien la fuerza del arameo en este contexto de angustia real.
- source_word: וְ/זִיוָ֖י/ךְ
  english_pob_choice: your countenance
  chosen_spanish: tu semblante
  alternatives_spanish:
  - tu rostro
  - tu apariencia
  lexicon: HALOT
  rationale: El término puede aludir al brillo, apariencia o aspecto facial. «Semblante» conserva la referencia visible sin limitarla solo a la cara física.
- source_word: יִשְׁתַּנּֽוֹ
  english_pob_choice: change
  chosen_spanish: cambie
  alternatives_spanish:
  - se altere
  - se transforme
  lexicon: HALOT
  rationale: La revisión inglesa prefirió no estrechar el sentido a «palidez». «Cambie» refleja el verbo arameo con suficiente amplitud y deja abierta la referencia a la apariencia/semblante.
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del POB inglés, que sustituyó una interpretación más concreta de la palidez del rostro por una formulación más amplia: «countenance change». Por eso se eligió «tu semblante» y «cambie», evitando reducir el hebreo/arameo a un solo matiz fisiológico.'
  spanish_consistency_notes:
  - Se mantuvo «rey» sin artículo en la fórmula cortesana para reflejar el vocativo del original.
  - Se eligió «nobles» para el grupo de altos oficiales, coherente con el registro ya usado en el audit trail inglés.
  - No se empleó «SEÑOR» ni «Cristo», pues no aparecen en este versículo.
  - La traducción conserva el paralelismo semítico «habló y dijo» sin forzar un equivalente idiomático más libre.
