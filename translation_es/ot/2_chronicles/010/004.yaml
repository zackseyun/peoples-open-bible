  text: אָבִ֖י/ךָ הִקְשָׁ֣ה אֶת עֻלֵּ֑/נוּ וְ/עַתָּ֡ה הָקֵל֩ מֵ/עֲבֹדַ֨ת אָבִ֜י/ךָ הַ/קָּשָׁ֗ה וּ/מֵ/עֻלּ֧/וֹ הַ/כָּבֵ֛ד אֲשֶׁר נָתַ֥ן עָלֵ֖י/נוּ וְ/נַֽעַבְדֶֽ/ךָּ־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/010/004.yaml
  text: Your father made our yoke heavy[a]. So now lighten the hard service of your father and his heavy yoke that he put on us[b], and we will serve you.
  footnotes:
  - marker: a
    text: Or 'made our yoke hard' or 'made our yoke severe.'
    reason: lexical_alternative
  - marker: b
    text: '''Service'' here refers to imposed labor or obligation under royal rule; alternatively, ''labor.'''
    reason: cultural_note
