translation:
  language: es
  text: Así, la ira de Yahvé ardió[a] contra su pueblo, y aborreció su heredad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “la ira de Yahvé se encendió contra su pueblo”.
    reason: lexical_alternative
  - marker: b
    text: O “su herencia”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר אַף
  english_pob_choice: burned / anger burned
  chosen_spanish: ardió la ira
  alternatives_spanish:
  - se encendió la ira
  - se inflamó la ira
  lexicon: HALOT
  rationale: La expresión hebrea usa el verbo de calor/ardor con אַף (“ira”). En español, “ardió la ira” conserva la metáfora de calor sin volverse demasiado arcaica y mantiene el tono solemne del salmo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton como “Yahvé”, de acuerdo con la terminología del proyecto y sin sustituirlo por un título.
- source_word: בְּעַמּוֹ
  english_pob_choice: against his people
  chosen_spanish: contra su pueblo
  alternatives_spanish:
  - con su pueblo
  - hacia su pueblo
  lexicon: HALOT
  rationale: Aunque la preposición ב puede ser más amplia, en este contexto con ira tiene fuerza direccional o adversativa. “Contra su pueblo” reproduce esa relación natural en español.
- source_word: וַיְתָעֵב
  english_pob_choice: he abhorred
  chosen_spanish: aborreció
  alternatives_spanish:
  - detestó
  - tuvo en abominación
  lexicon: HALOT
  rationale: תעב expresa rechazo fuerte, repulsión moral. “Aborreció” comunica bien esa intensidad en español bíblico actual sin perder el peso del verbo.
- source_word: נַחֲלָתוֹ
  english_pob_choice: his inheritance
  chosen_spanish: su heredad
  alternatives_spanish:
  - su herencia
  - su posesión
  lexicon: HALOT
  rationale: “Heredad” preserva el valor covenantal y colectivo del sustantivo para Israel, y resulta más natural en español bíblico que una mera “posesión”.
theological_decisions:
- issue: Metáfora antropopática de la ira divina
  english_pob_reading: the LORD’s anger burned against his people
  chosen_spanish_reading: la ira de Yahvé ardió contra su pueblo
  alternative_spanish_readings:
  - Yahvé se enojó contra su pueblo
  - la ira de Yahvé se encendió contra su pueblo
  rationale: Se conserva la imagen de calor/ardor del hebreo y la lectura inglesa, en vez de suavizarla. Esto mantiene la fuerza del juicio pactual expresado por el texto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: Nombre divino en el hebreo
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton. En español se traduce como “Yahvé” para conservar el nombre propio revelado, conforme al criterio del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El pasaje coincide con el patrón ya auditado en inglés: la ira de Yahvé se expresa con la metáfora de ardor, y el paralelo semántico entre “abhorred” y “he detested” se refleja en un verbo fuerte español. No hubo revisiones posteriores que alteraran el sentido base.'
  spanish_consistency_notes:
  - Se mantiene “Yahvé” de forma consistente para יְהוָה.
  - Se conserva el registro solemne y la metáfora del calor en “ardió la ira”.
  - “Heredad” se usa para sostener el matiz pactual de נַחֲלָתוֹ.
  - La nota a pie de página ofrece una alternativa verbal legítima sin desplazar la lectura principal.
