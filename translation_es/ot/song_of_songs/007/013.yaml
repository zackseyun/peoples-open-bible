translation:
  language: es
  text: Levantémonos temprano para las viñas[a]; veamos si la vid ha brotado, si la flor se ha abierto, si los granados están en flor[b]. Allí te daré mi amor[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a las viñas». La preposición hebrea permite tanto dirección como finalidad.
    reason: lexical_alternative
  - marker: b
    text: O «los granados han florecido». El hebreo puede entenderse como una referencia general al florecer, y no solo al estado de floración visible.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «mis amores», probablemente una expresión intensiva o colectiva con el sentido de «mi amor» o «mis caricias».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נַשְׁכִּימָה
  english_pob_choice: Let us rise early
  chosen_spanish: Levántemonos temprano
  alternatives_spanish:
  - Levantémonos de madrugada
  - Levantémonos temprano
  lexicon: HALOT
  rationale: El cohortativo de שׁכם expresa una invitación a levantarse o salir temprano. «Levantémonos temprano» conserva el matiz volitivo y el rasgo temporal sin sonar forzado en español.
- source_word: לַכְּרָמִים
  english_pob_choice: for the vineyards
  chosen_spanish: para las viñas
  alternatives_spanish:
  - a las viñas
  - hacia las viñas
  lexicon: HALOT
  rationale: La preposición ל puede indicar dirección o finalidad. Aquí «para las viñas» funciona naturalmente con la invitación a levantarse temprano y mantiene la referencia al destino del recorrido.
- source_word: נִרְאֶה
  english_pob_choice: let us see
  chosen_spanish: veamos
  alternatives_spanish:
  - miremos
  - veamos e inspeccionemos
  lexicon: HALOT
  rationale: El cohortativo de ראה pide una acción conjunta de observación. «Veamos» es la forma más natural y suficientemente amplia en español.
- source_word: אִם
  english_pob_choice: whether
  chosen_spanish: si
  alternatives_spanish:
  - si acaso
  - si es que
  lexicon: HALOT
  rationale: En esta serie de cláusulas observacionales, אִם introduce preguntas indirectas. En español, repetido varias veces, «si» comunica bien esa secuencia de comprobación.
- source_word: פָּרְחָה הַגֶּפֶן
  english_pob_choice: the vine has budded
  chosen_spanish: la vid ha brotado
  alternatives_spanish:
  - la vid ha florecido
  - la vid ha echado flor
  lexicon: HALOT
  rationale: פָּרַח puede abarcar brotar o florecer. Dado que la cláusula siguiente habla de la flor abierta, «ha brotado» conserva mejor la progresión de crecimiento sin cerrar la posibilidad botánica amplia del hebreo.
- source_word: פִּתַּח הַסְּמָדַר
  english_pob_choice: the blossom has opened
  chosen_spanish: la flor se ha abierto
  alternatives_spanish:
  - el capullo se ha abierto
  - la flor del racimo se ha abierto
  lexicon: HALOT
  rationale: סְמָדַר designa la flor temprana de la vid. «La flor se ha abierto» expresa con claridad la imagen y evita tecnicismos innecesarios.
- source_word: הֵנֵצוּ הָרִמּוֹנִים
  english_pob_choice: the pomegranates are in bloom
  chosen_spanish: los granados están en flor
  alternatives_spanish:
  - los granados han florecido
  - los granados están floreciendo
  lexicon: HALOT
  rationale: נוץ en este contexto señala la aparición de flores. «Están en flor» es una expresión idiomática natural en español y mantiene la escena de madurez de la huerta.
- source_word: שָׁם
  english_pob_choice: There
  chosen_spanish: Allí
  alternatives_spanish:
  - Entonces allí
  - En ese lugar
  lexicon: HALOT
  rationale: 'El adverbio marca localización. «Allí» preserva el sentido espacial: en ese lugar concreto será entregado el amor.'
- source_word: אֶתֵּן
  english_pob_choice: I will give
  chosen_spanish: te daré
  alternatives_spanish:
  - te ofreceré
  - te entregaré
  lexicon: HALOT
  rationale: נתן es el verbo común «dar». Aquí el objeto directo siguiente es relacional e íntimo, por lo que «te daré» comunica con naturalidad la acción sin añadir nada ajeno al hebreo.
- source_word: דֹּדַי
  english_pob_choice: my love
  chosen_spanish: mi amor
  alternatives_spanish:
  - mis amores
  - mis caricias
  lexicon: HALOT
  rationale: La forma plural puede funcionar como un plural intensivo o colectivo en Cantar. «Mi amor» resume fielmente el valor afectivo/intimista que la POB inglesa preserva, sin convertirlo en una frase más explícita de lo que exige el texto.
translation_notes:
  revision_awareness: El texto inglés auditado está en estado estable y sin revisiones aplicadas; se mantuvo la progresión botánica (brotar → flor abierta → estar en flor) y la lectura relacional de דֹּדַי sin añadir interpretaciones no documentadas.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usó «vid/viñas/granados» con vocabulario natural en español, sin forzar tecnicismos agrícolas.
  - Se preservó la referencia espacial de שָׁם con «allí», evitando una mera secuencia temporal.
