review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del griego: sujeto moral genérico (ἁμαρτωλός), objeto en genitivo dependiente de ἐγγύου, y verbo de daño/inversión (ἀνατρέψει). También preserva adecuadamente la nota léxica sobre ἀγαθὰ. Sin embargo, «trastornará» suena poco natural con «los bienes» en español y no comunica con suficiente claridad el efecto de arruinar o echar por tierra el patrimonio/bienestar del fiador que el contexto sugiere y que la nota inglesa ya reconoce como alternativa válida.'
  spanish_quality_summary: El español es mayormente claro y digno, pero «trastornará los bienes» resulta extraño y algo calcado; en español actual, «trastornar» se usa más con personas, orden o mente que con bienes materiales. «Un pecador» también refleja mejor el singular anartro genérico del griego y del inglés auditado que «El pecador», evitando un tono sentencioso más marcado de lo necesario.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Fiador» es una buena elección para ἐγγύου. «Pecador» preserva ἁμαρτωλός. Para ἀγαθὰ, «los bienes» es aceptable si se mantiene la nota con alternativas. El ajuste principal es verbal: conviene una forma más idiomática y fiel al efecto de ἀνατρέψει en este contexto, como «arruinará».'
  issues:
  - severity: medium
    issue: «trastornará los bienes» es poco idiomático en español
    rationale: Aunque ἀνατρέψει literalmente puede ser ‘volcar/derribar’, en esta combinación con «los bienes» la expresión española suena forzada y puede dificultar la comprensión. «Arruinará» comunica mejor el resultado de daño patrimonial implícito en contexto.
  - severity: low
    issue: «El pecador» frente a «Un pecador»
    rationale: El griego anartro y el inglés auditado favorecen una formulación genérica indefinida. «El pecador» no es imposible, pero añade un tono proverbial más marcado que no hace falta para ser fiel al original.
  revised_spanish_text: Un pecador arruinará los bienes de un fiador.[a]
  revised_footnotes:
  - marker: a
    text: O «echará a perder las cosas buenas de un fiador». El griego ἀγαθὰ puede referirse ampliamente a bienes, beneficios o posesiones.
    reason: lexical_alternative
