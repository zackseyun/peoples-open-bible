translation:
  language: es
  text: Pero Nicanor[a], queriendo hacer patente la hostilidad que tenía contra los judíos, envió más de quinientos soldados para arrestarlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Esto es, más de quinientos soldados; el griego dice literalmente «más allá de los quinientos».
    reason: lexical_alternative
lexical_decisions:
- source_word: βουλόμενος
  english_pob_choice: wanting
  chosen_spanish: queriendo
  alternatives_spanish:
  - deseando
  - intentando
  - teniendo la intención de
  lexicon: BDAG
  rationale: El participio expresa la intención o propósito de Nicanor antes de la acción principal. «Queriendo» conserva ese matiz volitivo de manera natural en español, sin forzar una formulación más abstracta.
- source_word: πρόδηλον ποιῆσαι
  english_pob_choice: to make plain
  chosen_spanish: hacer patente
  alternatives_spanish:
  - hacer evidente
  - manifestar
  - dejar claro
  lexicon: LSJ
  rationale: La expresión indica volver algo evidente o públicamente manifiesto. «Hacer patente» transmite bien la fuerza causativa y mantiene un registro sobrio y bíblico sin depender de un calco rígido.
- source_word: δυσμένειαν
  english_pob_choice: hostility
  chosen_spanish: hostilidad
  alternatives_spanish:
  - enemistad
  - mala voluntad
  - odio
  lexicon: LSJ
  rationale: El sustantivo apunta a una disposición hostil en un contexto político y militar. «Hostilidad» preserva esa fuerza sin reducirla al sentimiento más estrecho de «odio».
- source_word: ὑπὲρ τοὺς πεντακοσίους
  english_pob_choice: more than five hundred
  chosen_spanish: a más de quinientos
  alternatives_spanish:
  - más de quinientos
  - por encima de quinientos
  lexicon: LSJ
  rationale: Ἡ preposición con acusativo indica exceso sobre un número. «A más de quinientos» es una solución natural en español y mantiene la lectura del POB de que el texto dice literalmente «más allá de los quinientos».
- source_word: συλλαβεῖν
  english_pob_choice: to arrest
  chosen_spanish: para arrestarlo
  alternatives_spanish:
  - para apresarlo
  - para prenderlo
  - para capturarlo
  lexicon: BDAG
  rationale: En este contexto se trata de prender a una persona, no de un simple «agarrar». «Arrestarlo» comunica con precisión la intención de captura en custodia, como en la traducción inglesa auditada.
translation_notes:
  revision_awareness: El pasaje griego y la traducción inglesa auditada coinciden sustancialmente; no se documentan revisiones materiales. Se mantiene la lectura de que Nicanor actúa intencionalmente y que la cifra expresa exceso sobre quinientos, no una cantidad aproximada vaga.
  spanish_consistency_notes:
  - Se mantiene «Nicanor» como nombre propio conforme al uso español estándar del libro.
  - Se evita «Señor» o fórmulas de sustitución no pertinentes, ya que no aparece vocabulario divino en el versículo.
  - El pronombre de objeto directo en «arrestarlo» es masculino singular, coherente con el referente contextual mencionado en el pasaje anterior.
