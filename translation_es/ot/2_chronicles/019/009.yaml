translation:
  language: es
  text: 'Y les ordenó, diciendo: «Así actuarán en el temor de Yahvé[b], en fidelidad[c] y con un corazón entero[d]».[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Así harán».
    reason: lexical_alternative
  - marker: b
    text: «Temor de Yahvé» también puede expresarse como «reverencia por Yahvé».
    reason: lexical_alternative
  - marker: c
    text: O «con integridad» o «fielmente».
    reason: lexical_alternative
  - marker: d
    text: O «con un corazón indiviso».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: he commanded
  chosen_spanish: les dio esta orden
  alternatives_spanish:
  - les mandó
  - les ordenó
  - les encargó
  lexicon: HALOT
  rationale: צוה expresa dar una orden o encargo. En español, «dio esta orden» conserva el valor directivo con un tono natural y digno; evita un calco demasiado rígido y sigue bien el contexto judicial.
- source_word: עֲלֵיהֶם
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - sobre ellos
  - a ellos
  lexicon: HALOT
  rationale: Con צוה, על introduce el objeto indirecto del mandato. En español se expresa de manera idiomática con «les».
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y les dijo
  - 'así:'
  - 'de esta manera:'
  lexicon: HALOT
  rationale: Es la fórmula quotativa estándar; «diciendo» preserva la relación directa con el discurso citado sin añadir contenido.
- source_word: כֹּה תַעֲשׂוּן
  english_pob_choice: Thus you shall act
  chosen_spanish: Así actuarán
  alternatives_spanish:
  - Así harán
  - Esto es lo que harán
  - Así harán ustedes
  lexicon: HALOT
  rationale: עָשָׂה abarca «hacer» y «actuar». «Actuarán» comunica mejor la instrucción ética/judicial que el simple «harán». «Así» conserva כֹּה.
- source_word: בְּיִרְאַת יְהוָה
  english_pob_choice: in the fear of Yahweh
  chosen_spanish: en el temor de Yahvé
  alternatives_spanish:
  - con reverencia por Yahvé
  - en reverencia a Yahvé
  - en el temor reverente de Yahvé
  lexicon: HALOT
  rationale: יִרְאָה aquí expresa temor reverente ante Dios. «Temor de Yahvé» conserva la expresión bíblica establecida; «en» sigue la preposición repetida del hebreo y mantiene el enlace con el modo de actuar.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: El Tetragrámaton se traduce con el nombre propio divino «Yahvé», conforme al criterio doctrinal del proyecto y no con la sustitución litúrgica «el SEÑOR».
- source_word: בֶּאֱמוּנָה
  english_pob_choice: with faithfulness
  chosen_spanish: en fidelidad
  alternatives_spanish:
  - con fidelidad
  - fielmente
  - en fe
  lexicon: HALOT
  rationale: אֱמוּנָה en este contexto judicial apunta a confiabilidad, lealtad y rectitud en el ejercicio del cargo. «En fidelidad» conserva el sustantivo y la correspondencia preposicional del hebreo.
- source_word: וּבְלֵבָב שָׁלֵם
  english_pob_choice: with a whole heart
  chosen_spanish: con un corazón íntegro
  alternatives_spanish:
  - con corazón entero
  - con un corazón completo
  - con un corazón indiviso
  lexicon: HALOT
  rationale: לֵבָב שָׁלֵם expresa integridad y totalidad interior. «Corazón íntegro» es natural en español y preserva la idea de totalidad moral sin estrecharla solo a emociones o sinceridad.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo usa directamente el Tetragrámaton. El proyecto pide verterlo como «Yahvé», preservando el nombre personal del pacto en vez de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sense of אֱמוּנָה in a judicial exhortation
  english_pob_reading: faithfulness
  chosen_spanish_reading: fidelidad
  alternative_spanish_readings:
  - integridad
  - fidelidad práctica
  - lealtad
  rationale: En este contexto de instrucción a jueces, אֱמוּנָה señala fiabilidad y conducta digna de confianza, no la noción doctrinal abstracta de «fe». «Fidelidad» mantiene el valor ético del término.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Sense of לֵבָב שָׁלֵם
  english_pob_reading: with a whole heart
  chosen_spanish_reading: con un corazón íntegro
  alternative_spanish_readings:
  - con corazón entero
  - con un corazón indiviso
  - con un corazón completo
  rationale: La frase comunica integridad interior y totalidad de intención. «Íntegro» preserva esa fuerza ética sin reducirla a mera sinceridad subjetiva.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «with faithfulness» a «in faithfulness» para reflejar mejor la preposición hebrea repetida y conservar un estilo formal. La redacción española sigue esa línea al usar «en fidelidad».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de manera uniforme para יְהוָה.
  - Se evitó «SEÑOR» como sustitución del nombre divino.
  - «Fidelidad» y «corazón íntegro» conservan el tono ético-jurídico del pasaje.
  - Se prefirió una estructura directa y pública, apta para lectura eclesial, sin perder la correspondencia con el hebreo.
