theological_decisions:
- issue: Rendering the divine name in אֲדֹנָי יְהוִה
  chosen_reading: the Lord GOD
  alternative_readings:
  - the Lord Yahweh
  - Lord YHWH
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering עֲבָדִים-related language
  chosen_reading: servants
  alternative_readings:
  - slaves
  rationale: The doctrine excerpt allows 'servant / slave' context-dependently. Here the contrast is between the judged and those belonging to God who receive a new name; the bonded nature is not foregrounded, so 'servants' is the better contextual rendering.
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος servant / slave (context-dependent)'
