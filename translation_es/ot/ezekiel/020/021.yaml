review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el audit trail inglés en la secuencia y el sentido principal: rebelión contra Dios, no andar en sus estatutos, no guardar sus juicios para hacerlos, profanar sus sábados y la intención divina de derramar su ira en el desierto. Sin embargo, hay dos desajustes importantes: (1) la nota [b] está anclada a ''sobre ellos'' cuando la cláusula que recuerda Levítico 18:5 es la de ''vivirá por ellos''; (2) ''mis decretos'' debilita la distinción frente a חֻקּוֹתַי ya traducido como ''mis estatutos'', porque מִשְׁפָּטַי aquí conviene diferenciarlo como ''mis juicios'' u ''ordenanzas''.'
  spanish_quality_summary: El español es legible y digno, pero puede afinarse para mayor fidelidad y naturalidad bíblica. 'Los hijos' funciona, aunque 'los hijos' con nota está bien. 'No anduvieron en mis estatutos' y 'Profanaron mis sábados' son adecuados. 'Para ponerlos por obra' suena natural, pero 'para practicarlos' o 'para hacerlos' refleja mejor la concisión del hebreo. 'Consumir mi ira contra ellos' es menos natural que 'agotar mi ira contra ellos' en este contexto y además se alinea mejor con la revisión inglesa 'exhaust my anger'.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé o Mesías. Sí importa la consistencia interna de términos legales: חֻקִּים debe seguir como ''estatutos'' y מִשְׁפָּטִים conviene diferenciarse como ''juicios'' para preservar el matiz jurídico documentado. ''Sábados'' es aceptable para שַׁבְּתוֹתַי. ''Un hombre'' conserva el singular genérico del hebreo, en línea con el audit trail; la alternativa inclusiva debe ir en nota al lugar correcto.'
  issues:
  - severity: high
    issue: La nota [b] está colocada en la frase equivocada.
    rationale: La nota inglesa 'This clause echoes Leviticus 18:5' corresponde a 'si un hombre los hace, por ellos vivirá', no a 'sobre ellos'. El anclaje actual altera la referencia exegética documentada.
  - severity: medium
    issue: '''Mis decretos'' para מִשְׁפָּטַי borra la distinción con חֻקּוֹתַי.'
    rationale: El verso usa dos términos legales distintos. Ya que חֻקּוֹתַי se traduce como 'mis estatutos', conviene traducir מִשְׁפָּטַי como 'mis juicios' para mantener la diferenciación jurídica reflejada en el audit trail.
  - severity: medium
    issue: '''Consumir mi ira contra ellos'' es menos preciso y natural que ''agotar mi ira contra ellos''.'
    rationale: לְכַלּוֹת אַפִּי בָּם expresa llevar la ira a su pleno agotamiento/consumación. 'Agotar mi ira' reproduce mejor el matiz y se alinea con la revisión inglesa final.
  revised_spanish_text: 'Pero los hijos[a] se rebelaron contra mí. No anduvieron en mis estatutos, ni guardaron mis juicios para practicarlos: los juicios que, si un hombre[b] los hace, vivirá por ellos. Profanaron mis sábados. Entonces dije que derramaría mi furor sobre ellos, para agotar mi ira contra ellos en el desierto.'
  revised_footnotes:
