translation:
  language: es
  text: Y también he enviado a Menelao para exhortarlos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para animarlos»; o: «para apelar a ustedes». El griego παρακαλέω puede incluir aliento, exhortación o apelación según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πέπομφα
  english_pob_choice: I have sent
  chosen_spanish: he enviado
  alternatives_spanish:
  - envié
  lexicon: LSJ
  rationale: El perfecto griego expresa una acción ya realizada con relevancia presente; en español, el pretérito perfecto compuesto comunica bien esa relación temporal y mantiene la naturalidad.
- source_word: δὲ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - pero
  - ahora
  lexicon: LSJ
  rationale: Aquí δέ enlaza suavemente con lo anterior sin contraste fuerte; «y» conserva la continuidad del discurso.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - incluso
  lexicon: LSJ
  rationale: La partícula añade a Menelao como un envío adicional; «también» reproduce con claridad ese valor aditivo.
- source_word: τὸν Μενέλαον
  english_pob_choice: Menelaus
  chosen_spanish: Menelao
  lexicon: Nombres propios
  rationale: Se translitera el nombre propio al uso español bíblico estándar.
- source_word: παρακαλέσοντα
  english_pob_choice: to encourage
  chosen_spanish: para que los anime
  alternatives_spanish:
  - para exhortarlos
  - para rogarles
  - para persuadirlos
  lexicon: LSJ
  rationale: El participio futuro expresa finalidad; en este contexto diplomático puede abarcar exhortación, aliento y apelación. «Animar» es un equivalente natural en español que conserva el tono de apoyo persuasivo sin reducir indebidamente el alcance semántico.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - ustedes
  lexicon: Pronombre de segunda persona plural
  rationale: En español, el objeto directo se integra mejor como «los» para evitar una repetición pesada; el destinatario plural queda claro por el contexto. En una lectura más explícita podría ser «a ustedes».
theological_decisions:
- issue: Matiz de παρακαλέω en contexto diplomático
  english_pob_reading: 'to encourage you (with note: exhort/appeal possible)'
  chosen_spanish_reading: para que los anime
  alternative_spanish_readings:
  - para que los exhorte
  - para que les haga un ruego
  - para que los apremie
  rationale: 'El griego admite varias fuerzas: consolar, animar, exhortar o apelar. El español «animar» preserva la amplitud del campo semántico sin imponer un matiz más duro de lo que el contexto exige; la nota conserva las alternativas.'
  doctrine_reference: LSJ; uso contextual de παρακαλέω en lenguaje epistolar y diplomático
translation_notes:
  revision_awareness: El texto griego coincide con el audit trail inglés de alta concordancia. Se mantuvo el valor perfecto de πέπομφα, el enlace suave de δέ, el añadido de καὶ y el matiz amplio de παρακαλέω, sin introducir cambios textuales ni interpretativos ajenos al expediente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera de este versículo porque no aparece ningún tetragrámaton ni κύριος con valor de nombre divino en el texto base.
  - Se evitó «Cristo»/«Mesías» por no ser pertinentes aquí.
  - Se eligió un español directo y publicable, con una nota para preservar la amplitud semántica de παρακαλέω.
