translation:
  language: es
  text: 'Y él respondió: «Amarás a Yahvé tu Dios con todo tu corazón[a], y con toda tu alma, y con toda tu fuerza, y con toda tu mente, y a tu prójimo como a ti mismo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego usa ἐξ ὅλης τῆς καρδίας σου («de/desde todo tu corazón»), mientras que las frases siguientes usan ἐν («con/en»). En español se prefiere «con todo tu corazón» por naturalidad idiomática, aunque la diferencia preposicional del griego queda reflejada aquí en la nota.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς εἶπεν
  english_pob_choice: he answered
  chosen_spanish: respondió
  alternatives_spanish:
  - replicó
  - contestó
  lexicon: BDAG
  rationale: La construcción participio + verbo se expresa de forma idiomática en español con 'respondió'. Mantiene la narrativa directa sin añadir matices ausentes en el griego.
- source_word: Ἀγαπήσεις
  english_pob_choice: You shall love
  chosen_spanish: Amarás
  alternatives_spanish:
  - Debes amar
  - Ama
  lexicon: BDAG
  rationale: El futuro funciona como fórmula de mandato escritural. 'Amarás' conserva el tono formal y la resonancia bíblica del texto, sin volverlo una orden más interpretativa.
- source_word: κύριον
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Maestro
  lexicon: BDAG
  rationale: Aunque el proyecto prefiere 'Yahvé' para יהוה, aquí el texto griego cita κύριον dentro de una formulación bíblica establecida. En español, 'Señor' reproduce esa carga escritural y el audit trail inglés también conserva 'Lord'.
- source_word: θεόν
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: '''Dios'' es la traducción directa y normal de θεόν. En esta construcción posesiva, ''tu Dios'' comunica de modo natural la relación de pacto del pasaje.'
- source_word: ἐξ ὅλης τῆς καρδίας σου
  english_pob_choice: with all your heart
  chosen_spanish: con todo tu corazón
  alternatives_spanish:
  - desde todo tu corazón
  - de todo tu corazón
  lexicon: BDAG
  rationale: El inglés POB notó la literalidad de ἐξ ('from/out of'), pero revisó a una forma más natural y exacta en contexto. En español, 'con todo tu corazón' es la equivalencia idiomática más clara y no borra el sentido de totalidad del original.
- source_word: ἐν ὅλῃ τῇ ψυχῇ σου
  english_pob_choice: with all your soul
  chosen_spanish: con toda tu alma
  alternatives_spanish:
  - con toda tu vida
  - con todo tu ser
  lexicon: BDAG
  rationale: ψυχή aquí conserva su valor antropológico amplio. 'Alma' es la correspondencia más estable y fiel en este mandato, manteniendo el paralelismo con las demás facultades.
- source_word: ἐν ὅλῃ τῇ ἰσχύϊ σου
  english_pob_choice: with all your strength
  chosen_spanish: con toda tu fuerza
  alternatives_spanish:
  - con todo tu poder
  - con toda tu energía
  lexicon: BDAG
  rationale: ἰσχύς denota fuerza o capacidad vigorosa. 'Fuerza' es clara, natural y conserva el alcance físico o vital de la palabra.
- source_word: ἐν ὅλῃ τῇ διανοίᾳ σου
  english_pob_choice: with all your mind
  chosen_spanish: con toda tu mente
  alternatives_spanish:
  - con todo tu entendimiento
  - con todo tu pensamiento
  lexicon: BDAG
  rationale: διάνοια se refiere a la facultad mental, entendimiento o pensamiento. 'Mente' es la opción más directa y común en español para esta serie de facultades.
- source_word: πλησίον
  english_pob_choice: neighbor
  chosen_spanish: prójimo
  alternatives_spanish:
  - vecino
  - el que está cerca
  lexicon: BDAG
  rationale: En este contexto ético-bíblico, 'prójimo' es la equivalencia tradicional y precisa de πλησίον, más cargada de sentido relacional que 'vecino'.
- source_word: ὡς σεαυτόν
  english_pob_choice: as yourself
  chosen_spanish: como a ti mismo
  alternatives_spanish:
  - como tú mismo
  - igual que a ti
  lexicon: BDAG
  rationale: La expresión comparativa queda más natural en español con 'como a ti mismo'. Mantiene la fuerza normativa y la referencia reflexiva del griego.
theological_decisions:
- issue: Tratamiento de κύριος en una cita del mandamiento principal
  english_pob_reading: Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Maestro
  rationale: El audit trail inglés mantiene 'Lord' por su peso teológico y por la cita bíblica. En español, 'Señor' conserva esa solemnidad y la referencia escritural sin sustituirla por una glosa menos apropiada.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Conservación del conjunto antropológico καρδία, ψυχή, ἰσχύς, διάνοια
  english_pob_reading: Retain the fourfold expression as heart, soul, strength, and mind without collapsing terms
  chosen_spanish_reading: Conservar corazón, alma, fuerza y mente sin fusionar los términos
  alternative_spanish_readings:
  - amor total / entrega total
  - todo tu ser
  rationale: El versículo acumula facultades distintas para expresar devoción total. La traducción preserva esa tensión retórica y no la reduce a una sola frase abstracta.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve theological tension rather than resolve it'
- issue: Relación entre ἐξ y la naturalidad española en la primera cláusula
  english_pob_reading: The Greek uses 'from all your heart' ... while the following phrases use 'with/in'
  chosen_spanish_reading: Usar una equivalencia idiomática natural en español para la primera cláusula
  alternative_spanish_readings:
  - de todo tu corazón
  - desde todo tu corazón
  rationale: Aunque el griego distingue ἐξ de ἐν, el español no gana claridad al copiar esa diferencia con un giro rígido. La equivalencia elegida comunica totalidad y sonoridad bíblica sin falsear el sentido.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence with source-sensitive distinctions'
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión importante: se pasó de ''from all your heart'' a ''with all your heart'' por precisión y naturalidad. La versión española sigue esa decisión revisada, manteniendo la distinción de los demás miembros de la serie y evitando un calco rígido de ἐξ.'
  spanish_consistency_notes:
  - Se mantiene 'Señor' para κύριος en concordancia con el valor teológico del pasaje y con el tratamiento inglés documentado.
  - '''Prójimo'' conserva el registro bíblico y evita la neutralización semántica de πλησίον.'
  - La serie 'corazón, alma, fuerza, mente' preserva el paralelismo y evita resolver la antropología del texto en una sola expresión.
  - La nota al pie marca solo la diferencia textual relevante entre ἐξ y ἐν; no se añaden otras notas porque el resto de opciones no requieren aclaración adicional.
