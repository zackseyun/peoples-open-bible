review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: envío de Rebeca, su hermana/ellos, su nodriza, el siervo de Abraham y sus hombres. También preserva correctamente la nota léxica sobre מֵנִקְתָּהּ. Sin embargo, se aparta del rastro auditado del POB en עֶבֶד אַבְרָהָם: aquí el inglés documentó explícitamente que, en este contexto narrativo, la mejor equivalencia es ''servant'', no ''slave''.'
  spanish_quality_summary: El español es claro y legible, pero 'despidieron' puede sonar a terminación laboral o rechazo más que a despacho de viaje; 'enviaron' o 'dejaron partir' encaja mejor. Además, la coma antes de la nota tras 'hermana' no es ideal; la nota debe anclarse directamente al sustantivo. 'Nodriza' está bien y es digno/preciso. 'Siervo de Abraham' suena más natural y fiel aquí que 'esclavo de Abraham'.
  glossary_alignment: 'Buen uso de ''Rebeca'', ''nodriza'' y ''hombres''. La principal desalineación con la política contextual del proyecto es עֶבֶד: aunque el valor por defecto favorece ''esclavo'' cuando el inglés eligió ''slave'', en este versículo el POB inglés documentó una excepción contextual a favor de ''servant''; por tanto, en español debe seguirse ''siervo'' o ''servidor'', preferiblemente ''siervo'' por registro bíblico natural. No hay términos teológicos sensibles adicionales.'
  issues:
  - severity: high
    issue: '''el esclavo de Abraham'' contradice la decisión léxica contextual auditada para עֶבֶד אַבְרָהָם'
    rationale: El expediente inglés justificó 'servant' específicamente porque la condición servil no es el foco en este pasaje narrativo. La revisión española no debe reintroducir 'esclavo' contra esa decisión documentada.
  - severity: medium
    issue: '''despidieron'' no expresa de la mejor manera ''sent away'' en este contexto'
    rationale: Aunque posible, en español actual puede sugerir cesar a alguien o quitarlo de su cargo. 'Enviaron' o 'dejaron partir' comunica mejor el acto de despacho para el viaje.
  - severity: low
    issue: Ubicación de la nota tras 'hermana' con coma innecesaria
    rationale: 'La marca debe ir pegada al término relevante: ''su hermana[a], y ...'' evita una puntuación algo torpe y sigue mejor la convención de anclaje.'
  revised_spanish_text: Entonces enviaron a Rebeca, su hermana[a], y a su nodriza, y al siervo de Abraham, y a sus hombres.
  revised_footnotes:
  - marker: a
    text: O más específicamente, «su ama de cría».
    reason: lexical_alternative
  revision_rationale: Se ajusta עֶבֶד al valor contextual documentado por el POB ('siervo', no 'esclavo'), se mejora וַיְשַׁלְּחוּ con 'enviaron' para reflejar mejor 'sent away' en español natural, y se corrige el anclaje de la nota al sustantivo pertinente sin coma extra.
