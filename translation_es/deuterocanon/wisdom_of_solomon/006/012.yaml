translation:
  language: es
  text: La sabiduría es resplandeciente e imperecedera,[a] y se deja ver fácilmente por los que la aman;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fácilmente percibida» o «prontamente vista». El verbo griego puede expresar tanto sentido visual como perceptivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Λαμπρὰ
  english_pob_choice: radiant
  chosen_spanish: resplandeciente
  alternatives_spanish:
  - brillante
  - radiante
  - esplendorosa
  lexicon: LSJ
  rationale: El griego expresa brillo visible o esplendor. 'Resplandeciente' conserva esa imagen luminosa con naturalidad en español y evita un tono excesivamente técnico o litúrgico.
- source_word: ἀμάραντός
  english_pob_choice: unfading
  chosen_spanish: imperecedera
  alternatives_spanish:
  - que no se marchita
  - incorruptible
  - siempre fresca
  lexicon: LSJ
  rationale: El adjetivo apunta a lo que no se marchita ni pierde su frescura. 'Imperecedera' mantiene la idea de permanencia sin forzar una metáfora vegetal demasiado marcada en español.
- source_word: σοφία
  english_pob_choice: Wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - Sabiduría
  - la Sabiduría
  lexicon: LSJ
  rationale: En este contexto la sabiduría está personificada, pero el español permite mantener esa personificación mediante el artículo y los pronombres posteriores sin necesidad de capitalizar el sustantivo.
- source_word: εὐχερῶς
  english_pob_choice: readily
  chosen_spanish: fácilmente
  alternatives_spanish:
  - con facilidad
  - sin dificultad
  - prontamente
  lexicon: LSJ
  rationale: El adverbio expresa facilidad o disponibilidad de percepción. 'Fácilmente' es la correspondencia más directa y natural aquí.
- source_word: θεωρεῖται
  english_pob_choice: is readily seen
  chosen_spanish: es fácilmente contemplada
  alternatives_spanish:
  - es fácilmente vista
  - es percibida con facilidad
  - es fácilmente observada
  lexicon: LSJ
  rationale: El verbo puede abarcar ver, percibir o contemplar. 'Contemplada' conserva cierta amplitud perceptiva y un tono digno; 'vista' sonaría más plano, aunque sigue siendo posible.
- source_word: ὑπὸ τῶν ἀγαπώντων αὐτήν
  english_pob_choice: by those who love her
  chosen_spanish: por los que la aman
  alternatives_spanish:
  - por quienes la aman
  - por los que la aprecian
  - por sus amantes
  lexicon: LSJ
  rationale: La frase participial se rinde de forma directa y clara. Se conserva el femenino 'la' para reflejar la personificación de σοφία y la relación afectiva del griego.
theological_decisions:
- issue: Personificación femenina de la sabiduría
  english_pob_reading: Wisdom is radiant and unfading, and is readily seen by those who love her;
  chosen_spanish_reading: La sabiduría es resplandeciente e imperecedera, y es fácilmente contemplada por los que la aman;
  alternative_spanish_readings:
  - La Sabiduría es resplandeciente e imperecedera, y es fácilmente contemplada por los que la aman;
  - La sabiduría es brillante y no se marchita, y es fácilmente percibida por los que la aman;
  rationale: El griego presenta σοφία como figura personificada y femenina. El español conserva esa personificación mediante 'la' y 'la aman', sin resolverla en una abstracción despersonalizada. No se capitaliza por norma estilística, pero se preserva la referencia femenina.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
- issue: Amplitud semántica de θεωρεῖται
  english_pob_reading: is readily seen
  chosen_spanish_reading: es fácilmente contemplada
  alternative_spanish_readings:
  - es fácilmente vista
  - es fácilmente percibida
  - es fácilmente observada
  rationale: El verbo griego puede implicar ver, percibir o contemplar. En español, 'contemplada' deja espacio para la percepción intelectual y visual que el contexto sugiere, sin reducir el término a mera visión física.
  doctrine_reference: Lexical choice preserving semantic range
translation_notes:
  revision_awareness: El contexto auditado inglés no muestra revisiones aplicadas; el último pase indica que no hubo cambios necesarios y el cotejo externo fue de alta concordancia.
  spanish_consistency_notes:
  - Se mantiene 'sabiduría' en minúscula, conservando la personificación por el contexto y los pronombres femeninos.
  - Se evita 'Cristo' u otra terminología no pertinente; el verso pertenece a Sabiduría de Salomón y el término central es σοφία.
  - '''Imperecedera'' y ''contemplada'' buscan un español natural sin perder la amplitud semántica indicada por el audit trail inglés.'
  - El pronombre femenino 'la' en 'la aman' preserva la referencia a la sabiduría personificada.
