translation:
  language: es
  text: Porque nos has puesto a prueba[a], oh Dios[b]; nos has refinado como se refina la plata.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nos has probado»; el verbo hebreo puede enfatizar la prueba con miras a demostrar la autenticidad.
    reason: lexical_alternative
  - marker: b
    text: 'La imagen es metalúrgica: la prueba de Dios se compara con el refinamiento de la plata en el fuego.'
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La conjunción introduce la explicación del contexto previo; en español, «Porque» conserva bien el valor causal/explanatorio que la POB inglesa rindió con «For».
- source_word: בְחַנְתָּנוּ
  english_pob_choice: you have tested us
  chosen_spanish: nos has probado
  alternatives_spanish:
  - nos has examinado
  - nos has puesto a prueba
  lexicon: HALOT
  rationale: בָּחַן puede expresar probar con miras a mostrar la genuinidad. «Probar» mantiene esa fuerza y resulta natural en español; «puesto a prueba» es posible, pero más perifrástico.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - ¡oh Dios!
  lexicon: HALOT
  rationale: El hebreo está en vocativo. «Oh Dios» preserva la invocación directa en un tono poético y reverente, equivalente al inglés «O God».
- source_word: צְרַפְתָּנוּ
  english_pob_choice: you have refined us
  chosen_spanish: nos has refinado
  alternatives_spanish:
  - nos has purificado
  - nos has fundido
  lexicon: HALOT
  rationale: צָרַף pertenece al campo metalúrgico del refinamiento por fuego. «Refinado» conserva la metáfora del metal y evita desdibujarla con una paráfrasis moralizada.
- source_word: כִּצְרָף כָּסֶף
  english_pob_choice: as silver is refined
  chosen_spanish: como se refina la plata
  alternatives_spanish:
  - como la plata es refinada
  - como al refinar la plata
  lexicon: HALOT
  rationale: El comparativo con כ expresa la imagen del proceso de refinación. «Como se refina la plata» mantiene la metáfora metalúrgica y suena idiomático en español.
theological_decisions:
- issue: Imagen de prueba/refinamiento divino
  english_pob_reading: God’s testing is compared to the refining of silver in fire.
  chosen_spanish_reading: La prueba divina se presenta como refinamiento metalúrgico de la plata.
  alternative_spanish_readings:
  - La prueba divina se presenta como purificación espiritual
  - Dios nos examina para demostrar nuestra autenticidad
  rationale: 'Conviene preservar la tensión concreta de la imagen: no sólo una evaluación abstracta, sino un proceso de prueba que revela y purifica como el fuego refina el metal. «Refinó» y «se refina la plata» conservan esa densidad.'
  doctrine_reference: Salmo 66:10; cf. Malaquías 3:2-3; 1 Pedro 1:7
translation_notes:
  revision_awareness: El pasaje está en alto acuerdo con el audit trail inglés y no requiere revisión sustantiva; se mantiene la metáfora metalúrgica y la fuerza vocativa del hebreo.
  spanish_consistency_notes:
  - Se usó «Dios» en vocativo, no «Señor», porque el hebreo tiene אֱלֹהִים.
  - Se conservó «refinado» y «plata» para mantener el campo semántico metalúrgico.
  - La puntuación sigue el paralelismo poético y la cadencia natural del español bíblico moderno.
