  alternatives_spanish:
  - Johanan
  - Jehohanán
  lexicon: HALOT
  rationale: Nombre propio; en español se prefiere 'Johanán' para reflejar la forma breve y una acentuación natural en lectura castellana.
- source_word: וּדְלָיָה
  english_pob_choice: Delaiah
  chosen_spanish: Delaías
  alternatives_spanish:
