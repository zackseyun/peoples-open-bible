lexical_decisions:
- source_word: ϭⲓⲛⲉ (as read in ⲥⲉⲛⲁϭⲓⲛⲉ)
  chosen: obey
  alternatives:
  - be prudent
  - be disciplined
  lexicon: Crum; Layton
  rationale: Sahidic ϭⲓⲛⲉ commonly carries the sense of obey/heed as a hearing-response;
    in vocative address, “you who obey/obedient ones” best fits the imperative context.
- source_word: ⲙⲟⲉⲓ
  chosen: come
  alternatives:
  - approach
  - go
  lexicon: Crum; W. E. Crum, A Coptic Dictionary
  rationale: ⲙⲟⲉⲓ standardly means come (motion toward speaker/place).
- source_word: ⲙⲡⲙⲁ ⲉⲧⲙⲙⲁⲩ
  chosen: the place that is there
  alternatives:
  - the place yonder
  - the place over there
  lexicon: Crum
  rationale: Literal rendering preserves deictic force of ⲉⲧⲙⲙⲁⲩ (which is there).
- source_word: ⲱⲛϩ
  chosen: live
  alternatives:
  - be alive
  - have life
  lexicon: Crum
  rationale: Baseline verb for life; concise and natural in English while remaining
    literal.
- source_word: ⲙⲡⲣⲣⲁⲧⲥⲱⲧⲙ ⲛⲥⲱⲓ
  chosen: do not hold back from hearing me
  alternatives:
  - do not hesitate to listen to me
  - do not delay to hear me
  lexicon: Layton Syntax; Crum (ⲣⲁⲧ- + infinitive)
  rationale: ⲙⲡⲣ (neg. jussive) + ⲣⲁⲧ- (to delay/reluct) + ⲥⲱⲧⲙ (hear) conveys reluctance/hesitation;
    “hold back from hearing” keeps the idiom’s force.
parallelism_check: This block maintains the triple address pattern (you who obey;
  angels sent; spirits raised), followed by an imperative to come and a concluding
  admonition not to hesitate to hear—mirroring Thunder’s litany-like cadence.
voice_check: Imperatives and direct address are preserved, with the speaker’s authoritative
  first-person presence explicit in “hear me.” The oracular, summoning voice remains
  intact without smoothing the urgency.
