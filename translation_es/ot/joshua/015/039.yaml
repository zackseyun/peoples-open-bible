lexical_decisions:
- source_word: לָכִ֥ישׁ
  english_pob_choice: Lachish
  chosen_spanish: Lacis
  alternatives_spanish:
  - Lákis
  - Lachish
  lexicon: HALOT
  rationale: Nombre propio de lugar. En español conviene una transliteración estable y naturalizada; «Lacis» conserva la forma consonántica tradicional sin introducir una traducción.
- source_word: בָצְקַ֖ת
  english_pob_choice: Bozkath
  chosen_spanish: Bozcat
  alternatives_spanish:
  - Boskath
  - Bozkat
  lexicon: HALOT
  rationale: Topónimo en una lista de ciudades. Se mantiene el nombre propio con adaptación ortográfica mínima al español; la variación tradicional inglesa «Boskath» se refleja como alternativa, pero no se adopta como forma principal.
- source_word: עֶגְלֽוֹן
  english_pob_choice: Eglon
  chosen_spanish: Eglón
  alternatives_spanish:
  - Eglon
  lexicon: HALOT
  rationale: Nombre propio de lugar; se translitera con acento gráfico español para facilitar la lectura. En este contexto se trata de la ciudad, no del rey moabita del mismo nombre.
- source_word: וּ / וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: HALOT
  rationale: La conjunción simple encadena una lista de localidades; en español normal se traduce con «y». No se usa «e» porque los nombres siguientes no comienzan con /i/ sonora.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece explícitamente en el texto base, anclado en «Lacis[a]». No hubo cambios en el contenido fuente; solo se ajustó la forma española y la ubicación del pie de nota para cumplir la disciplina de marcado.'
  spanish_consistency_notes:
  - Se mantuvo una lista simple de tres topónimos, como en el hebreo.
  - Se preservó la distinción entre el topónimo Eglón y el personaje homónimo mediante una nota explicativa implícita en la decisión léxica.
  - Se evitó introducir título, glosa o ampliación no presentes en la fuente.
