translation:
  language: es
  text: Callen ante mí, costas[a]; que los pueblos renueven su fuerza[b]. Que se acerquen; entonces hablen. Juntos acerquémonos para juicio[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «islas» o «tierras lejanas»; el término hebreo suele referirse en sentido amplio a tierras marítimas o costas distantes.
    reason: lexical_alternative
  - marker: b
    text: O «cobren nueva fuerza»; el hebreo expresa un giro idiomático de renovación o reemplazo de fuerza.
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo tiene una formulación de llamado jurídico: «acerquémonos para juicio».'
    reason: cultural_note
lexical_decisions:
- source_word: הַחֲרִישׁוּ
  english_pob_choice: Be silent
  chosen_spanish: Callen
  alternatives_spanish:
  - Guarden silencio
  - Callen en silencio
  lexicon: HALOT
  rationale: El imperativo plural exige una orden directa; en español, «Callen» comunica con naturalidad la misma fuerza exhortativa que «Be silent», sin caer en un calco rígido.
- source_word: אֵלַי
  english_pob_choice: before me
  chosen_spanish: ante mí
  alternatives_spanish:
  - para mí
  - a mí
  lexicon: HALOT
  rationale: Aunque literalmente es «a mí», el contexto de una convocatoria solemne y judicial se expresa mejor en español con «ante mí», que conserva la idea de comparecer en presencia del hablante sin añadir un verbo de oír que no está en el hebreo.
- source_word: אִיִּים
  english_pob_choice: coastlands
  chosen_spanish: costas
  alternatives_spanish:
  - islas
  - tierras lejanas
  lexicon: HALOT
  rationale: El inglés POB opta por «coastlands» para el alcance geográfico amplio de אִיִּים. En español, «costas» comunica de forma breve y natural esa extensión marítima/lejana; «islas» sería demasiado estrecho y «tierras lejanas» pierde la imagen costera.
- source_word: וּלְאֻמִּים
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  - los pueblos y naciones
  lexicon: HALOT
  rationale: «Los pueblos» mantiene el paralelo con «costas» y preserva el plural colectivo del hebreo. «Las naciones» también sería posible, pero «pueblos» evita uniformar el verso con un término más político que étnico-social.
- source_word: יַחֲלִיפוּ כֹחַ
  english_pob_choice: renew their strength
  chosen_spanish: renueven su fuerza
  alternatives_spanish:
  - cambien su fuerza
  - tomen nueva fuerza
  lexicon: HALOT
  rationale: El hebreo expresa el giro idiomático de חלף + כח; el POB documenta «renew their strength». En español, «renueven su fuerza» reproduce bien el sentido idiomático y mantiene la fuerza exhortativa del jussivo.
- source_word: יִגְּשׁוּ
  english_pob_choice: Let them come near
  chosen_spanish: Que se acerquen
  alternatives_spanish:
  - Que vengan cerca
  - Que se aproximen
  lexicon: HALOT
  rationale: El valor jussivo de la secuencia se conserva con «Que se acerquen», un español natural y solemne que corresponde a «Let them come near».
- source_word: אָז
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - después
  - luego
  lexicon: HALOT
  rationale: 'Marca la secuencia argumental del llamado: primero acercarse, luego hablar. «Entonces» es la correspondencia más clara y neutra.'
- source_word: יְדַבֵּרוּ
  english_pob_choice: let them speak
  chosen_spanish: hablen
  alternatives_spanish:
  - digan su caso
  - hablen ellos
  lexicon: HALOT
  rationale: El verbo hebreo significa simplemente «hablar». Dado que el contexto forense ya está sugerido por el verso, «hablen» evita añadir en la línea principal una paráfrasis como «expongan su caso».
- source_word: יַחְדָּו
  english_pob_choice: Together
  chosen_spanish: Juntos
  alternatives_spanish:
  - en conjunto
  - a una
  lexicon: HALOT
  rationale: «Juntos» reproduce el adverbio de acción conjunta de manera natural y puede iniciar la cláusula con claridad en español.
- source_word: לַמִּשְׁפָּט
  english_pob_choice: for judgment
  chosen_spanish: para juicio
  alternatives_spanish:
  - para el juicio
  - para el litigio
  - para justicia
  lexicon: HALOT
  rationale: El campo semántico de מִשְׁפָּט aquí es forense. «Para juicio» preserva la brevedad y la dimensión legal sin forzar «en la corte», y deja abierta la tensión entre juicio-veredicto y proceso judicial.
- source_word: נִקְרָבָה
  english_pob_choice: let us draw near
  chosen_spanish: acerquémonos
  alternatives_spanish:
  - acercuémonos
  - vamos a acercarnos
  lexicon: HALOT
  rationale: La forma cohortativa de primera persona plural incluye al hablante. «Acerquémonos» conserva esa invitación compartida mejor que una simple forma futura.
theological_decisions:
- issue: Escena jurídica implícita
  english_pob_reading: Render the verse as a divine legal summons without expanding it into explicit courtroom paraphrase beyond the Hebrew wording.
  chosen_spanish_reading: Presentar el verso como una convocación solemne con trasfondo judicial, sin añadir una explicación más explícita que el hebreo.
  alternative_spanish_readings:
  - Ponerlo directamente como un juicio en corte
  - Reducirlo a una simple llamada a escuchar
  rationale: La secuencia de silencio, acercamiento, habla y juicio apunta claramente a un marco forense. La redacción española conserva ese marco sin sobreexplicarlo ni rebajarlo a una mera invitación auditiva.
  doctrine_reference: 'Principio de traducción POB: preservar lo que dice el texto fuente y su tensión retórica sin introducir interpretaciones ajenas.'
translation_notes:
  revision_awareness: 'Coincide sustancialmente con el audit trail inglés: se mantiene el tono de summons legal, la equivalencia idiomática de יַחֲלִיפוּ כֹחַ como renovación de fuerza, y el cohortativo plural de la clausula final. No se aplicaron revisiones posteriores al último pase auditado.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» en otros contextos cuando corresponde; este verso no contiene el tetragrámaton.
  - «Pueblos» se mantuvo para וּלְאֻמִּים para evitar mezclarlo con otras posibles traducciones de גוים en el proyecto.
  - «Juicio» se usó en sentido forense, coherente con el audit trail inglés y con el orden de los verbos del verso.
  - Los corchetes de notas se colocan solo donde la alternativa léxica o el trasfondo cultural aporta valor de auditoría.
