id: TIT.1.5
reference: Titus 1:5
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Τούτου χάριν ⸀ἀπέλιπόν σε ἐν Κρήτῃ ἵνα τὰ λείποντα ἐπιδιορθώσῃ, καὶ καταστήσῃς κατὰ πόλιν πρεσβυτέρους, ὡς ἐγώ σοι διεταξάμην,
base_translation:
  language: en
  yaml_path: translation/nt/titus/001/005.yaml
  text: For this reason I left you in Crete[a], so that you might set in order what remained and appoint elders in every city[c][b], as I directed you.
  footnotes:
  - marker: a
    text: Or 'what was lacking.'
    reason: lexical_alternative
  - marker: b
    text: Or 'city by city.'
    reason: lexical_alternative
  - marker: c
    text: Or 'as I commanded you.'
    reason: alternative_reading
translation:
  language: ko
  text: 이런 까닭에 내가 그대를 크레타에 남겨 둔 것은, 남아 있는[a] 일들을 그대가 바로잡고, 내가 그대에게 지시한[c] 대로 성읍마다[b] 장로들을 세우게 하려는 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「부족한 일들」. 분사 λείποντα는 「남겨진·미진한·부족한」 일들을 모두 함의한다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「성읍을 따라」. 분배의 κατά는 각 성읍마다 빠짐없이 세우라는 의미를 담는다.
    reason: lexical_alternative
  - marker: c
    text: 또는 「명령한」. 헬라어 διετάξατο는 권위 있는 지시를 가리킨다.
    reason: alternative_reading
lexical_decisions:
- source_word: Τούτου χάριν
  english_pob_choice: For this reason
  chosen_korean: 이런 까닭에
  alternatives_korean:
  - 이러므로
  - 이 때문에
  lexicon: BDAG
  rationale: 인과적 도입구. 합쇼체 산문에서 「이런 까닭에」가 자연스럽다.
- source_word: ἀπέλιπόν σε
  english_pob_choice: I left you
  chosen_korean: 내가 그대를 남겨 둔 것은
  alternatives_korean:
  - 내가 그대를 두고 떠난 것은
  lexicon: BDAG
  rationale: 다음 절의 목적절(ἵνα)을 받아내기 위해 「~한 것은 ~하려는 것입니다」 구조로 옮긴다. 「그대」는 합쇼체 2인칭으로 디도를 친근하면서도 격을 갖춰 부르는 어감.
- source_word: ἐν Κρήτῃ
  english_pob_choice: in Crete
  chosen_korean: 크레타에
  alternatives_korean:
  - 그레데에
  lexicon: BDAG
  rationale: 현대 외래어 표기법에 따라 「크레타」. 한국 전통 번역의 「그레데」는 음역 관습이나 본 번역은 현대 표준 표기를 따른다.
- source_word: τὰ λείποντα ἐπιδιορθώσῃ
  english_pob_choice: set in order what remained
  chosen_korean: 남아 있는 일들을 바로잡고
  alternatives_korean:
  - 미진한 일들을 정돈하고
  - 부족한 것들을 바로잡고
  lexicon: BDAG
  rationale: ἐπιδιορθόω는 「추가로 바로잡다·완전히 정돈하다」를 의미한다. 자연스러운 한국어 「바로잡다」를 택한다.
- source_word: καταστήσῃς ... πρεσβυτέρους
  english_pob_choice: appoint elders
  chosen_korean: 장로들을 세우게
  alternatives_korean:
  - 장로들을 임명하게
  lexicon: BDAG
  rationale: καθίστημι는 공적 직무로 「세우다·임명하다」. 한국 교회에서 정립된 「세우다」를 택한다. πρεσβύτερος는 글로서리에 따라 「장로」.
- source_word: κατὰ πόλιν
  english_pob_choice: in every city
  chosen_korean: 성읍마다
  alternatives_korean:
  - 도시마다
  - 성읍을 따라
  lexicon: BDAG
  rationale: 분배의 κατά를 「~마다」로 자연스럽게 옮긴다. 「성읍」은 고대 도시국가적 어감을 살린다.
- source_word: ὡς ἐγώ σοι διεταξάμην
  english_pob_choice: as I directed you
  chosen_korean: 내가 그대에게 지시한 대로
  alternatives_korean:
  - 내가 그대에게 명령한 대로
  - 내가 그대에게 분부한 대로
  lexicon: BDAG
  rationale: διατάσσομαι는 권위 있는 지시·명령. 「지시」가 사도와 동역자 간 위임 관계에 자연스럽다.
