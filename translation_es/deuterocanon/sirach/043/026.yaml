translation:
  language: es
  text: Por él, el mensajero[a] tiene éxito, y por su palabra realiza su voluntad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “el ángel”. El hebreo מַלְאָךְ puede significar tanto “mensajero” como “ángel”.
    reason: lexical_alternative
lexical_decisions:
- source_word: למענו
  english_pob_choice: For his sake
  chosen_spanish: Por causa de él
  alternatives_spanish:
  - Por él
  - Por su causa
  lexicon: HALOT
  rationale: La expresión hebrea con ל + מַעַן comunica referencia o finalidad, y la idea de “for his sake” se adapta en español como “por causa de él” sin perder el matiz relacional ni volver la frase demasiado causal.
- source_word: יצלח
  english_pob_choice: succeeds
  chosen_spanish: tiene éxito
  alternatives_spanish:
  - prospera
  - sale adelante
  - logra su cometido
  lexicon: HALOT
  rationale: El verbo צלח expresa éxito o prosperidad en la acción. “Tiene éxito” comunica bien ese valor en español moderno y sigue la revisión inglesa que prefirió ‘succeeds’ sobre ‘prospers’.
- source_word: מלאך
  english_pob_choice: the messenger
  chosen_spanish: el mensajero
  alternatives_spanish:
  - el ángel
  - un mensajero
  lexicon: HALOT
  rationale: El hebreo admite tanto “mensajero” humano como “ángel”. En este contexto cósmico la referencia no queda fijada del todo, así que “mensajero” preserva la ambigüedad documentada sin imponer una especificación angelológica.
- source_word: ובדבריו
  english_pob_choice: by his word
  chosen_spanish: por su palabra
  alternatives_spanish:
  - mediante su palabra
  - con su palabra
  lexicon: HALOT
  rationale: La preposición ב aquí es instrumental. En español, “por su palabra” es natural y conserva la idea de medio eficaz mediante el cual actúa la voluntad divina.
- source_word: יפעל
  english_pob_choice: he accomplishes
  chosen_spanish: realiza
  alternatives_spanish:
  - obra
  - lleva a cabo
  - efectúa
  lexicon: HALOT
  rationale: פעל denota hacer, obrar o efectuar. “Realiza” suena natural en español para expresar que la acción divina se lleva a cabo efectivamente.
- source_word: רצון
  english_pob_choice: his will
  chosen_spanish: su voluntad
  alternatives_spanish:
  - su deseo
  - su beneplácito
  - lo que quiere
  lexicon: HALOT
  rationale: רצון puede significar voluntad, deseo o beneplácito. “Su voluntad” es la forma más clara y fiel para expresar la intención divina en este contexto.
- source_word: ἐν λόγῳ αὐτοῦ σύγκειται πάντα
  english_pob_choice: kept in view as a parallel supporting divine word as effective ordering power
  chosen_spanish: se mantiene en vista como paralelo que apoya la eficacia ordenadora de la palabra divina
  alternatives_spanish:
  - y en su palabra todas las cosas están ordenadas
  - y en su palabra todas las cosas subsisten
  lexicon: BDAG
  rationale: 'La versión griega sugiere un alcance más amplio: ‘en su palabra todas las cosas se ordenan/juntan’. No se traslada al texto principal porque el hebreo es la base primaria, pero sí se conserva como trasfondo que refuerza el valor eficaz de ‘por su palabra’.'
theological_decisions:
- issue: Cómo traducir מלאך sin resolver si es un ángel o un mensajero humano
  english_pob_reading: the messenger
  chosen_spanish_reading: el mensajero
  alternative_spanish_readings:
  - el ángel
  - un mensajero
  rationale: La POB inglesa retiene la ambigüedad léxica. En español, ‘el mensajero’ mantiene esa tensión y evita una decisión interpretativa que el versículo no exige de manera explícita.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que cambió ‘prospers’ por ‘succeeds’ para hacer más natural יצלח. También conserva el valor del paralelo griego sin incorporarlo de forma plena en el texto principal, porque el hebreo es la fuente primaria para esta línea.
  spanish_consistency_notes:
  - Se mantiene ‘mensajero’ para conservar la ambigüedad léxica documentada.
  - Se usa ‘su palabra’ en vez de una fórmula más litúrgica como ‘su mandato’, para respetar la base hebrea ובדבריו.
  - No se emplea ‘Mesías’, ‘Cristo’ ni terminología no presente en el versículo.
  - ‘Dios’ queda implícito en el referente del contexto, sin añadirlo al texto de este versículo.
  - La puntuación separa claramente los dos miembros del paralelismo semítico.
