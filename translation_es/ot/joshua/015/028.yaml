translation:
  language: es
  text: Hazar-sual, Beerseba[a], y Bizyotía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Beerseba» puede reflejar el hebreo de ‘pozo de siete’ y, por juego de palabras, ‘pozo del juramento’.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲצַר שׁוּעָל
  english_pob_choice: Hazar-shual
  chosen_spanish: Hazar-sual
  alternatives_spanish:
  - Hazar-shual
  - Villa del Zorro
  lexicon: HALOT
  rationale: El hebreo forma un nombre de lugar compuesto por חצר ('recinto, aldea') y שועל ('zorro/chacal'). En una lista de ciudades y límites, la transparencia del topónimo es preferible; por eso se translitera, adaptando solo la ortografía al español. No se traduce como 'Villa del Zorro' porque el POB inglés documenta que, aunque la etimología existe, el nombre funciona aquí como topónimo fijo.
- source_word: בְּאֵר שֶׁבַע
  english_pob_choice: Beersheba
  chosen_spanish: Beerseba
  alternatives_spanish:
  - Beerseba
  - Pozo de siete
  - Pozo del juramento
  lexicon: HALOT
  rationale: Se conserva el nombre propio tradicionalmente reconocible en español, con grafía hispana 'Beerseba'. La nota mantiene la tensión etimológica de שֶׁבַע, que puede relacionarse con 'siete' y, por juego de palabras, con 'juramento'; por eso el topónimo no se reemplaza en el texto principal por una glosa interpretativa.
- source_word: בִּזְיוֹתְיָה
  english_pob_choice: Bizjothjah
  chosen_spanish: Bizyotía
  alternatives_spanish:
  - Bizjotía
  - Biziothía
  - Biziotía
  lexicon: HALOT
  rationale: Es un topónimo de derivación incierta; la mejor opción es una transliteración que conserve su carácter de nombre propio. Se adapta la forma al español ('Bizyotía') para una lectura más natural, sin pretender resolver la etimología o estandarizar una sola ortografía inglesa.
- source_word: וַ / וּ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: HALOT
  rationale: La conjunción hebrea coordina los elementos de una lista. En español se rinde normalmente con 'y'; no se usa 'e' porque la palabra siguiente no comienza con el sonido /i/.
translation_notes:
  revision_awareness: 'El inglés POB mantiene un listado toponímico transliterado y añade una nota etimológica para Beersheba. Esta versión española sigue la misma estrategia: translitera los nombres propios en el cuerpo principal y preserva la alternativa etimológica en una nota.'
  spanish_consistency_notes:
  - Se mantiene un estilo de lista geográfica con nombres propios transliterados.
  - Se evitó sustituir topónimos por glosas interpretativas en el texto principal.
  - La puntuación reproduce una enumeración breve y natural en español.
