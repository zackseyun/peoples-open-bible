translation:
  language: es
  text: Destruirás su fruto de la tierra, y su descendencia de entre los hijos de los hombres[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «de entre la humanidad» o «de entre los seres humanos». Hebreo: «de entre los hijos de los hombres».'
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּרְיָמוֹ
  english_pob_choice: their fruit
  chosen_spanish: su fruto
  alternatives_spanish:
  - su produce
  - su progenie
  lexicon: HALOT
  rationale: פְּרִי significa literalmente «fruto» o «producción». En este contexto de juicio, puede funcionar metafóricamente como descendencia; sin embargo, mantener «fruto» conserva la imagen poética que el texto hebreo presenta, igual que la versión inglesa POB.
- source_word: מֵאֶרֶץ
  english_pob_choice: from the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - del país
  - de la región
  lexicon: HALOT
  rationale: אֶרֶץ puede significar «tierra» o «país». Aquí, por el alcance general del juicio, «tierra» preserva mejor el sentido amplio que una referencia territorial más restringida.
- source_word: תְּאַבֵּד
  english_pob_choice: you will destroy
  chosen_spanish: destruirás
  alternatives_spanish:
  - harás perecer
  - aniquilarás
  lexicon: HALOT
  rationale: 'El verbo en piel tiene fuerza causativa: destruir, hacer perecer. «Destruirás» es natural en español moderno y conserva la acción directa dirigida a Dios.'
- source_word: וְזַרְעָם
  english_pob_choice: their offspring
  chosen_spanish: su descendencia
  alternatives_spanish:
  - su simiente
  - sus hijos
  lexicon: HALOT
  rationale: זֶרַע puede ser «semilla» literalmente o «descendencia» en sentido figurado. Aquí, por el paralelismo con «fruto» y el referente humano, «descendencia» comunica con claridad el sentido figurado sin perder la conexión léxica.
- source_word: מִבְּנֵי אָדָם
  english_pob_choice: from among the sons of man
  chosen_spanish: de entre los hijos del hombre
  alternatives_spanish:
  - de entre la humanidad
  - de entre los seres humanos
  lexicon: HALOT
  rationale: La expresión hebrea בְּנֵי אָדָם es una forma poética para seres humanos. Se conserva la estructura masculina y marcada del hebreo con «hijos del hombre», siguiendo la decisión inglesa de mantener la forma fuente; se deja como alternativa una formulación inclusiva más idiomática.
theological_decisions:
- issue: Tratamiento de אָדָם en בְּנֵי אָדָם
  english_pob_reading: sons of man
  chosen_spanish_reading: hijos del hombre
  alternative_spanish_readings:
  - humanidad
  - seres humanos
  rationale: Aunque el sentido es genérico y colectivo, la forma hebrea es masculina y poéticamente marcada. Se conserva esa forma en el texto principal para no aplanar la tensión entre literalidad y naturalidad, dejando opciones inclusivas en segundo plano.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4; Contested terms table for אָדָם'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; este borrador sigue esa línea y mantiene las mismas decisiones clave que el audit trail inglés, adaptadas al español.
  spanish_consistency_notes:
  - Se preserva el paralelismo poético entre «fruto» y «descendencia».
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino explícito.
  - «Hijos del hombre» mantiene la huella formal del hebreo, aunque en español suene menos idiomático que «humanidad».
