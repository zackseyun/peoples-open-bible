revisions:
- from: Un buen día hace olvidar el mal, y un mal día hace olvidar la prosperidad; y el fin de un hombre estará sobre él[a].
  to: Un buen día hace olvidar la desgracia, y un mal día hace olvidar la prosperidad; y el fin de una persona estará sobre ella[a].
  rationale: Se cambia 'el mal' por 'la desgracia' para reflejar el valor experiencial de רָעָה en paralelo con la prosperidad. Se cambia 'un hombre' por 'una persona' para expresar con más naturalidad el genérico de אָדָם en español actual y alinearse con la revisión del POB inglés. Se conserva 'estará sobre' por fidelidad a עָלָיו y la ambigüedad del hebreo. La nota se actualiza para coincidir con el texto revisado.
