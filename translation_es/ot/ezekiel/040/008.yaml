translation:
  language: es
  text: 'Entonces midió el vestíbulo del portal por el lado interior: una vara[a][b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una caña». El hebreo puede referirse a una caña usada como instrumento de medir.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «de la casa». En la visión del templo de Ezequiel, «la casa» suele referirse al edificio del templo; el matiz espacial exacto de la preposición aquí es difícil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָד
  english_pob_choice: Then he measured
  chosen_spanish: Entonces midió
  alternatives_spanish:
  - Y midió
  - Luego midió
  lexicon: HALOT
  rationale: El wayyiqtol introduce la acción siguiente en la secuencia; «Entonces» conserva ese avance narrativo en español con naturalidad y sin añadir contenido.
- source_word: אֻלָם
  english_pob_choice: vestibule
  chosen_spanish: vestíbulo
  alternatives_spanish:
  - pórtico
  - portal
  lexicon: HALOT
  rationale: El término designa un espacio arquitectónico de acceso. «Vestíbulo» es preciso y claro en español moderno, y mantiene mejor el matiz espacial que «pórtico» o «portal».
- source_word: הַשַּׁעַר
  english_pob_choice: the gate
  chosen_spanish: de la puerta
  alternatives_spanish:
  - de la puerta de entrada
  - de la entrada
  lexicon: HALOT
  rationale: En este contexto arquitectónico, «puerta» comunica el complejo de acceso de manera natural en español. «Puerta» puede abarcar el conjunto, y el contexto del templo evita ambigüedad excesiva.
- source_word: מֵהַבַּיִת
  english_pob_choice: on the inside
  chosen_spanish: por dentro
  alternatives_spanish:
  - desde la casa
  - desde el edificio del templo
  - en el interior
  lexicon: HALOT
  rationale: La preposición hebrea es difícil en contexto. La revisión inglesa la resolvió idiomáticamente como «on the inside». En español, «por dentro» reproduce esa orientación interna sin forzar «desde» ni perder la referencia espacial.
- source_word: קָנֶה אֶחָד
  english_pob_choice: one rod
  chosen_spanish: una caña
  alternatives_spanish:
  - una vara
  - un junco
  lexicon: HALOT
  rationale: El hebreo puede significar «caña» o, por extensión, un instrumento de medida hecho con caña/reed. Dado que el texto hebreo conserva el término vegetal y la nota inglesa preserva la alternativa, se eligió «caña» como forma más cercana al lexema; en este pasaje de medición, el sentido funcional sigue implícito.
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo WLC y toma en cuenta la decisión inglesa revisada de resolver מֵהַבַּיִת de manera idiomática como una referencia al interior. También conserva la alternativa lexical de קָנֶה como «reed/caña» mediante nota, sin imponer una glosa interpretativa excesiva.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al tetragrámaton; aquí no aparece.
  - Se prefiere «caña» para conservar el valor léxico de קָנֶה, con nota alternativa «vara» por la función de medición.
  - La fórmula «por dentro» mantiene la orientación interna sin sobreexplicar la relación sintáctica de מֵהַבַּיִת.
  - «Puerta» se usa como término arquitectónico amplio y natural para הַשַּׁעַר en este contexto.
