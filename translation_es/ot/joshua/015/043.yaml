lexical_decisions:
- source_word: יִפְתָּח
  english_pob_choice: Iphtah
  chosen_spanish: Iphtah
  alternatives_spanish:
  - Jiphtah
  - Jefté
  lexicon: HALOT
  rationale: Se trata de un nombre propio de lugar en una lista de ciudades; por eso se translitera, no se traduce. Se conserva la forma breve y cercana al hebreo que sigue la decisión inglesa. "Jiphtah" es una alternativa posible más cercana a la vocalización, pero "Iphtah" mantiene mejor la continuidad con el texto base de auditoría. "Jefté" se evita porque en español remite al juez bíblico y podría borrar el valor toponímico del pasaje.
- source_word: אַשְׁנָה
  english_pob_choice: Ashnah
  chosen_spanish: Ashnah
  alternatives_spanish:
  - Asnah
  - Azná
  lexicon: HALOT
  rationale: Nombre propio de lugar; se conserva la transliteración. "Ashnah" reproduce de manera reconocible el topónimo y evita una castellanización sin respaldo en el texto fuente.
- source_word: נְצִיב
  english_pob_choice: Nezib
  chosen_spanish: Nezib
  alternatives_spanish:
  - Netsib
  - Necib
  lexicon: HALOT
  rationale: Nombre propio de lugar. Se mantiene la forma inglesa de auditoría para consistencia con el POB, con transliteración directa del hebreo. "Netsib" es una opción más fonética; "Necib" sería una adaptación española menos controlable y no preferida aquí.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: HALOT
  rationale: La conjunción enlaza los elementos de la lista. En español se usa la coordinación simple "y" para reproducir la estructura serial del hebreo. No se usa "e" porque no hace falta ante la secuencia fonética presente.
translation_notes:
  revision_awareness: El cotejo de revisión indica alta concordancia y sin cambios requeridos respecto al texto fuente; por ello se mantiene una solución sobria y estable, centrada en la transliteración de los topónimos y en la coordinación simple de la lista.
  spanish_consistency_notes:
  - Se preserva el carácter de lista de ciudades con repetición de «y».
  - Se mantiene transliteración de nombres propios para no homogeneizar indebidamente topónimos distintos.
  - Se evita introducir equivalentes tradicionales españoles que confundan lugar con persona.
