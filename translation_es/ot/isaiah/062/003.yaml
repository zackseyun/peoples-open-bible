translation:
  language: es
  text: Serás una corona de hermosura[a] en la mano de Yahvé, y un turbante real en la palma de tu Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una diadema real» / «un tocado real». El sustantivo hebreo se refiere a un tocado enrollado o turbante.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיִיתְ
  english_pob_choice: You will be
  chosen_spanish: Serás
  alternatives_spanish:
  - Y serás
  - Y llegarás a ser
  lexicon: HALOT
  rationale: El verbo en discurso profético se entiende con sentido futuro; en español, 'serás' comunica de forma natural la predicación directa sobre Sion/Jerusalén sin añadir matiz de transformación no explicitado.
- source_word: עֲטֶרֶת תִּפְאֶרֶת
  english_pob_choice: a crown of beauty
  chosen_spanish: una corona de hermosura
  alternatives_spanish:
  - una corona de belleza
  - una corona de esplendor
  - una corona gloriosa
  lexicon: HALOT
  rationale: La cadena constructa se conserva como sustantivo + sustantivo. 'Hermosura' reproduce el valor estético de תִּפְאֶרֶת y mantiene el tono poético; 'belleza' sería igualmente posible, pero 'hermosura' suena más elevado en español bíblico sin volverse arcaico.
- source_word: בְּיַד
  english_pob_choice: in the hand of
  chosen_spanish: en la mano de
  alternatives_spanish:
  - en poder de
  - en la mano de
  lexicon: HALOT
  rationale: La imagen concreta de posesión/tenencia se preserva mejor con 'en la mano de' que con una paráfrasis abstracta. 'Mano' mantiene el paralelismo con 'palma' en la segunda cola.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo contiene el Tetragrámaton. Siguiendo el estándar español del proyecto, se usa 'Yahvé' como forma principal del nombre divino, manteniendo la referencia personal del pacto y evitando la sustitución por un título.
- source_word: וְצָנִיף
  english_pob_choice: and a royal turban
  chosen_spanish: y un turbante real
  alternatives_spanish:
  - y un tocado real
  - y una diadema real
  - y un birrete real
  lexicon: HALOT
  rationale: צָנִיף designa un tocado enrollado o turbante. 'Turbante' es la opción más concreta y fiel al objeto; 'real' traduce מְלוּכָה como cualidad regia.
- source_word: מְלוּכָה
  english_pob_choice: royal
  chosen_spanish: real
  alternatives_spanish:
  - de realeza
  - regio
  - de monarquía
  lexicon: HALOT
  rationale: En español, 'real' es la forma más natural y sobria para el adjetivo de realeza, preservando la relación atributiva con el sustantivo anterior.
- source_word: בְּכַף
  english_pob_choice: in the palm of
  chosen_spanish: en la palma de
  alternatives_spanish:
  - en la mano de
  - sobre la palma de
  lexicon: HALOT
  rationale: כַּף especifica la palma o concavidad de la mano. 'Palma' conserva la variación poética respecto de יָד y reproduce la concreción espacial del hebreo.
- source_word: אֱלֹהָיִךְ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios
  - vuestro Dios
  lexicon: HALOT
  rationale: La terminación femenina singular y el contexto de Sion/Jerusalén apuntan a una segunda persona singular. 'Tu Dios' respeta el valor relacional y el tono de pacto del pasaje.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: La decisión doctrinal del POB en inglés es transliterar el nombre propio divino en lugar de sustituirlo por 'Señor'. En español, 'Yahvé' es la forma principal adoptada por el proyecto para el Tetragrámaton, preservando el nombre del pacto de manera reconocible y consistente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Spanish project default: Yahvé'
- issue: Metáfora regia aplicada a Sion/Jerusalén
  english_pob_reading: You will be a crown of beauty ... and a royal turban
  chosen_spanish_reading: Serás una corona de hermosura ... y un turbante real
  alternative_spanish_readings:
  - Serás una corona de belleza ... y un tocado real
  - Serás una diadema de gloria ... y un turbante real
  rationale: El verso presenta dos imágenes paralelas de honor y distinción concedidos por Dios. Se mantiene la metáfora sin convertirla en explicación abstracta, porque el hebreo conserva objetos concretos asociados con dignidad regia.
  doctrine_reference: Isaiah 62:3 literary-theological imagery of restored Zion
translation_notes:
  revision_awareness: 'El borrador coincide sustancialmente con el audit trail inglés: conserva el futuro profético, la metáfora doble de corona/turbante, la distinción entre יָד y כַּף, y la decisión de traducir el Nombre divino. Se adoptó ''Yahvé'' como forma española del Tetragrámaton según el estándar del proyecto; se eligió ''hermosura'' para תִּפְאֶרֶת por fluidez poética y fidelidad semántica.'
  spanish_consistency_notes:
  - Se mantuvo la segunda persona singular ('serás', 'tu Dios') para reflejar el sufijo femenino singular del hebreo y el tratamiento de Sion como interlocutora.
  - Se conservó la imagen concreta de posesión ('en la mano') y de contacto/soporte ('en la palma') para reproducir el paralelismo hebreo.
  - El pie de nota usa una alternativa léxica real sin desplazar el texto principal.
  - No se introdujo 'Señor' como sustituto del Tetragrámaton, en coherencia con la política del proyecto.
