revisions:
- from: Pero ellos no eran de la descendencia de aquellos hombres por cuya mano había sido dada la liberación a Israel[a].
  to: Pero ellos no eran de entre la descendencia de aquellos hombres por cuya mano había sido dada la salvación a Israel[a].
  rationale: Se ajusta levemente la expresión de procedencia genealógica para mayor naturalidad en español («de entre la descendencia») y se sustituye «liberación» por «salvación», que en este contexto histórico sigue siendo fiel a σωτηρία y suena más bíblico y natural en español. Se conserva la imagen de agencia «por cuya mano» y la nota alternativa del inglés POB.
