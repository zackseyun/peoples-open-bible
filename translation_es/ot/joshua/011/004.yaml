translation:
  language: es
  text: Salieron ellos, y todos sus campamentos con ellos, un pueblo grande[a], tan numeroso como la arena que está a la orilla del mar, y con muchísimos caballos y carros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «un pueblo grande»; la expresión se refiere a una multitud muy grande.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצְאוּ
  english_pob_choice: They came out
  chosen_spanish: Salieron
  alternatives_spanish:
  - Salieron afuera
  - Came out
  lexicon: HALOT
  rationale: El verbo יצא en forma narrativa expresa movimiento de salida. «Salieron» conserva esa acción de manera natural en español sin añadir un matiz militar que el hebreo no exige en sí mismo.
- source_word: מַחֲנֵיהֶם
  english_pob_choice: their camps
  chosen_spanish: sus campamentos
  alternatives_spanish:
  - sus ejércitos
  - sus campamentos militares
  - sus encampamentos
  lexicon: HALOT
  rationale: מַחֲנֶה puede referirse a campamento, campamento militar o, por extensión, al grupo armado reunido allí. «Campamentos» mantiene la imagen concreta del hebreo y permite el sentido colectivo de fuerzas reunidas.
- source_word: עַם רָב
  english_pob_choice: a great people
  chosen_spanish: un pueblo grande
  alternatives_spanish:
  - una gran multitud
  - un pueblo muy numeroso
  lexicon: HALOT
  rationale: עַם significa «pueblo» y רָב añade la idea de grandeza o abundancia. «Un pueblo grande» conserva el sustantivo colectivo del original; el simile siguiente aclara que la referencia es al número.
- source_word: כַּחוֹל אֲשֶׁר עַל שְׂפַת הַיָּם לָרֹב
  english_pob_choice: as numerous as the sand that is on the seashore
  chosen_spanish: como la arena que está a la orilla del mar, en gran número
  alternatives_spanish:
  - como la arena de la orilla del mar
  - como la arena que está en la orilla del mar, por su abundancia
  lexicon: HALOT
  rationale: La comparación hebrea es un modismo para innumerabilidad. En español, «como la arena que está a la orilla del mar, en gran número» conserva la imagen concreta y explicita la idea de cantidad sin forzar una paráfrasis más amplia.
- source_word: סוּס
  english_pob_choice: horses
  chosen_spanish: caballos
  alternatives_spanish:
  - caballería
  - caballos de guerra
  lexicon: HALOT
  rationale: סוּס es «caballo»; aunque puede funcionar colectivamente, «caballos» suena natural en español dentro de un inventario militar y conserva el referente básico.
- source_word: רֶכֶב
  english_pob_choice: chariots
  chosen_spanish: carros
  alternatives_spanish:
  - carros de guerra
  - carros de combate
  - carros guerreros
  lexicon: HALOT
  rationale: רֶכֶב suele denotar carros o fuerzas de carros. «Carros» es la forma más directa y tradicionalmente inteligible en español; el contexto bélico ya comunica que son carros de guerra.
- source_word: רַב מְאֹד
  english_pob_choice: very many
  chosen_spanish: muy numerosos
  alternatives_spanish:
  - en gran abundancia
  - excesivamente numerosos
  lexicon: HALOT
  rationale: La intensificación final recalca la abundancia de caballos y carros. «Muy numerosos» conserva la fuerza cuantitativa en un español claro y digno.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo WLC y toma como guía el audit trail inglés de la POB. Se conserva la imagen de los «campamentos» y la comparación con la arena del mar, sin suavizar la referencia militar ni sustituirla por un término más interpretativo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino según la política general, aunque este versículo no lo contiene.
  - Se prefirió «caballos» y «carros» por claridad y fidelidad al inventario militar del hebreo.
  - «Un pueblo grande» conserva la tensión entre colectivo y multitud que el hebreo y el inglés POB también preservan.
