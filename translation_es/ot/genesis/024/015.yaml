  yaml_path: translation/ot/genesis/024/015.yaml
  text: And it happened[a], before he had finished speaking, that behold, Rebekah was coming out—she who had been born to Bethuel son of Milcah, the wife of Nahor[b], Abraham’s brother—with her jar on her shoulder.
