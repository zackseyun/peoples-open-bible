    rationale: La documentación inglesa privilegia 'stand upright' por su imagen física restaurativa; en español 'nos mantenemos erguidos' conserva mejor ese matiz, mientras que 'estamos firmes' se desplaza más hacia estabilidad abstracta.
  revised_spanish_text: Ellos se inclinaron y cayeron, pero nosotros nos hemos levantado y nos mantenemos erguidos[a].
