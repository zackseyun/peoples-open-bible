review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: distributivo (''Todo varón''), pertenencia al grupo sacerdotal (''entre los sacerdotes''), permiso regulado (''podrá comer''), y el predicado superlativo de santidad. Sin embargo, hay dos ajustes de fidelidad/idiomaticidad: el pronombre objeto debe concordar mejor con el referente femenino implícito en español (''comerla'' más que ''comerlo''), y la cláusula final suena más natural y precisa como ''es santísima'' en vez de la inversión más arcaizante ''cosa santísima es''.'
  spanish_quality_summary: El texto es comprensible y digno, pero 'comerlo' choca con el femenino hebreo y con el antecedente sacrificial implícito que en español se entiende naturalmente como femenino. 'Cosa santísima es' es inteligible, pero algo rígido; 'es santísima' mantiene la fuerza cultual con mejor fluidez. También conviene ajustar la nota para que refleje la redacción revisada.
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé/Mesías. 'Varón' para זָכָר y 'santísima' para קֹדֶשׁ קָדָשִׁים son compatibles con la política del proyecto. La principal corrección léxica es preferir 'la' para אֹתָהּ, ya que el pronombre hebreo es femenino y en español el referente implícito de la ofrenda/porción se expresa mejor en femenino que en masculino neutro.
  issues:
  - severity: medium
    issue: Pronombre de objeto 'comerlo'
    rationale: El hebreo tiene אֹתָהּ, pronombre femenino singular. Aunque el español puede a veces neutralizar referentes implícitos, aquí 'comerla' preserva mejor la concordancia con la porción/ofrenda entendida y suena más natural en contexto cultual.
  - severity: low
    issue: Orden y formulación 'cosa santísima es'
    rationale: Es fiel en contenido, pero menos natural en español moderno. 'Es santísima' o 'es una cosa santísima' comunica mejor el predicado de categoría ritual sin rigidez innecesaria.
  - severity: low
    issue: Nota al pie desalineada con la redacción óptima
    rationale: Si el texto principal ya dice 'santísima', la nota debe explicar el modismo hebreo sin imponer una forma menos natural como 'cosa santísima'.
  revised_spanish_text: Todo varón entre los sacerdotes podrá comerla[a]; es santísima.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «una santidad de santidades», un modismo que significa «santísima».'
    reason: lexical_alternative
