translation:
  language: es
  text: Porque he aquí, se han ido de la destrucción; Egipto los recogerá, Menfis los enterrará. Las ortigas[a] poseerán las cosas preciosas de su plata; espinos habrá en sus tiendas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las ortigas poseerán sus tesoros de plata». El término hebreo para esta planta es incierto y puede referirse a ortigas u otra maleza semejante.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִ/שֹּׁד
  english_pob_choice: from destruction
  chosen_spanish: de la destrucción
  alternatives_spanish:
  - de la devastación
  - a causa de la devastación
  lexicon: HALOT
  rationale: שֹׁד expresa ruina violenta, devastación o destrucción. La construcción con מִן después de הָלְכוּ indica alejamiento respecto de esa calamidad, y en español «de la destrucción» conserva bien ese valor sin forzar una paráfrasis.
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - la tierra de Egipto
  lexicon: HALOT
  rationale: Es el nombre propio estándar y claro en español.
- source_word: תְּקַבְּצֵם
  english_pob_choice: will gather them
  chosen_spanish: los recogerá
  alternatives_spanish:
  - los reunirá
  - los juntará
  lexicon: HALOT
  rationale: 'קבץ en piel puede ser reunir o juntar. Aquí el matiz es irónico: Egipto «recoge» a los fugitivos para el exilio. «Los recogerá» mantiene esa ironía y suena natural en español.'
- source_word: מֹף
  english_pob_choice: Memphis
  chosen_spanish: Mof
  alternatives_spanish:
  - Menfis
  - Memfis
  lexicon: HALOT
  rationale: El hebreo nombra la ciudad egipcia מֹף. En español se puede identificar como Menfis, pero «Mof» respeta más de cerca la forma del texto fuente y evita introducir una equivalencia no usada en el POB inglés.
- source_word: תְּקַבְּרֵם
  english_pob_choice: will bury them
  chosen_spanish: los enterrará
  alternatives_spanish:
  - los sepultará
  lexicon: HALOT
  rationale: קבר significa enterrar. «Los enterrará» mantiene la fuerza directa del juicio anunciado.
- source_word: מַחְמַד לְ/כַסְפָּם
  english_pob_choice: the precious things of their silver
  chosen_spanish: las cosas preciosas de su plata
  alternatives_spanish:
  - sus tesoros de plata
  - lo precioso de su plata
  lexicon: HALOT
  rationale: מַחְמַד denota lo deseable o precioso, y el sintagma con לְכַסְפָּם apunta a posesiones valiosas relacionadas con su plata. «Las cosas preciosas de su plata» es cercano al hebreo y suficientemente claro en español.
- source_word: קִמּוֹשׂ
  english_pob_choice: Nettles
  chosen_spanish: las ortigas
  alternatives_spanish:
  - las ortigas o plantas semejantes
  - los abrojos
  lexicon: HALOT
  rationale: El término vegetal es incierto y puede referirse a maleza punzante o de ruina. El POB inglés prefirió «nettles» con nota; en español, «ortigas» comunica bien la idea de vegetación invasiva y se puede matizar mediante nota que el hebreo puede referirse a plantas semejantes.
- source_word: יִירָשֵׁם
  english_pob_choice: will possess
  chosen_spanish: poseerán
  alternatives_spanish:
  - heredarán
  - tomarán posesión de
  lexicon: HALOT
  rationale: ירשׁ puede significar poseer, heredar o tomar posesión. Aquí el sujeto es la maleza que ocupa lo abandonado; «poseerán» conserva el giro irónico sin sonar forzado en español.
- source_word: חוֹחַ
  english_pob_choice: thorns
  chosen_spanish: espinos
  alternatives_spanish:
  - espinas
  - zarzas
  lexicon: HALOT
  rationale: Es un término general para vegetación espinosa. «Espinos» es claro y poético en español, y encaja bien con la imagen de desolación.
- source_word: בְּ/אָהֳלֵי/הֶם
  english_pob_choice: in their tents
  chosen_spanish: en sus tiendas
  alternatives_spanish:
  - en sus moradas
  - en sus viviendas
  lexicon: HALOT
  rationale: אֹהֶל significa literalmente tienda. «Tiendas» preserva la imagen hebrea y el paralelismo poético del abandono.
theological_decisions:
- issue: Sentido de הָלְכוּ מִשֹּׁד
  english_pob_reading: They have gone away in flight from destruction/devastation.
  chosen_spanish_reading: Se han ido lejos de la destrucción, en huida de la devastación.
  alternative_spanish_readings:
  - Se han ido por causa de la destrucción.
  - Han escapado de la destrucción.
  rationale: El contexto inmediato es juicio, exilio y muerte; no se trata de una salvación lograda sino de una retirada desesperada. Por eso la frase debe comunicar alejamiento provocado por la calamidad, no escape triunfal.
  doctrine_reference: Lectura contextual del juicio profético en Oseas 9; coherencia con el paralelismo del versículo.
translation_notes:
  revision_awareness: El borrador inglés más reciente cambió 'Weeds' por 'Nettles' para קִמּוֹשׂ; la versión española sigue esa revisión y adopta «ortigas», manteniendo la nota sobre la incertidumbre botánica. También se conserva la lectura del primer hemistiquio como huida ante la destrucción, conforme al audit trail.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología por defecto, pero este versículo no contiene el nombre divino.
  - Se evitó reemplazar la imagen hebrea de אֹהֶל por una generalización como «viviendas» para conservar el paralelismo poético.
  - Se optó por «Mof» en vez de «Menfis» para reflejar con más cercanía la forma del texto fuente; el contexto histórico sigue siendo la ciudad egipcia de Memphis.
  - Se usó «ortigas» con nota porque el POB inglés ya documenta la incertidumbre del término vegetal y el español requiere una identificación tentativa pero clara.
