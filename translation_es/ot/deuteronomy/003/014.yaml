revisions:
- from: Jair hijo de Manasés tomó todo el territorio de Argob[a], hasta la frontera de los guesureos y de los maacateos, y los llamó, es decir, Basán, Havot-jair[b], hasta hoy.
  to: Jair hijo de Manasés tomó todo el territorio de Argob[a], hasta la frontera de los guesureos y de los maacateos, y los llamó por su propio nombre, es decir, Basán, Havot-jair[b], hasta hoy.
  rationale: Se corrige la omisión del sentido de עַל שְׁמוֹ («por su propio nombre») y se conserva la aclaración interpretativa «es decir, Basán» para reflejar la auditoría inglesa sobre la sintaxis comprimida de אֶת הַבָּשָׁן. También se pule la nota alternativa para que suene natural en español sin perder la observación textual.
