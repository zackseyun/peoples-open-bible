review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: préstamo de dinero a ''mi pueblo'', al pobre, y prohibición de cobrar interés. Sin embargo, ''no le harás de acreedor'' no corresponde fielmente a לֹא תִהְיֶה לוֹ כְּנֹשֶׁה, que expresa ''no serás para él como un acreedor'', no ''hacer de''. Además, ''que está contigo'' suena demasiado literal para עִמָּךְ en este contexto legal-comunitario; ''entre ustedes'' o ''entre tu pueblo'' comunica mejor la pertenencia comunitaria preservada por el inglés auditado.'
  spanish_quality_summary: El español es generalmente claro, pero 'no le harás de acreedor' resulta poco natural e impropio en registro bíblico-jurídico; la construcción idiomática esperable sería 'no serás como un acreedor para él' o 'no te portarás como acreedor con él'. 'Al pobre que está contigo' es comprensible, pero algo rígido; 'al pobre que está entre ustedes' mejora la legibilidad neutral latinoamericana.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. 'Dinero', 'mi pueblo' e 'interés' están bien elegidos. La revisión propuesta mantiene la forma casuística con 'Si' y conserva el referente singular 'al pobre'.
  issues:
  - severity: medium
    issue: Construcción 'no le harás de acreedor'
    rationale: No reproduce bien el verbo 'ser' del hebreo ni su comparación con כְּנֹשֶׁה; además suena antinatural en español. 'No serás para él como un acreedor' es más fiel y más claro.
  - severity: low
    issue: '''que está contigo'' para עִמָּךְ'
    rationale: Es posible, pero en español legal/comunitario suena demasiado literal y menos natural que 'que está entre ustedes', que refleja mejor el valor contextual de pertenencia dentro de la comunidad.
  - severity: low
    issue: Nota b no coincide con la mejor solución textual
    rationale: La nota actual ofrece 'no le tratarás como acreedor', pero la principal debe alinearse más estrechamente con el hebreo. Conviene ajustar la nota para preservar la alternativa idiomática.
  revised_spanish_text: Si prestas dinero[a] a mi pueblo, al pobre que está entre ustedes, no serás para él como un acreedor[c]; no le impondrás interés.
  revised_footnotes:
  - marker: a
    text: 'O: «Cuando prestes dinero a mi pueblo». El hebreo usa una forma condicional frecuente en el lenguaje legal. Hebreo literal: «plata»; aquí con el sentido de dinero.'
    reason: alternative_reading
  - marker: c
    text: 'O: «no le cobrarás interés» o «no te portarás con él como acreedor». El hebreo literalmente dice: «no serás para él como un acreedor».'
    reason: lexical_alternative
  revision_rationale: Se corrige la cláusula central para reflejar con mayor fidelidad לֹא תִהְיֶה לוֹ כְּנֹשֶׁה y mejorar la naturalidad del español. También se ajusta la expresión de עִמָּךְ a una formulación comunitaria más clara. Se consolidan las notas para conservar las alternativas relevantes del inglés auditado y del hebreo, evitando una nota separada innecesaria para 'dinero/plata'.
