translation:
  language: es
  text: Vendrán y aclamarán de alegría en lo alto de Sion, y fluirán[a] hacia la bondad[b] de Yahvé, hacia el grano, el vino nuevo y el aceite fresco, y hacia las crías del rebaño y del ganado. Su alma[c] será como un jardín bien regado, y no volverán a languidecer[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acudirán»; el hebreo también puede evocar la imagen de «fluir» hacia las bendiciones de Sion.
    reason: lexical_alternative
  - marker: b
    text: O «hacia los bienes de Yahvé». El hebreo «bondad» aquí incluye los bienes que él provee, como muestra la lista siguiente.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «su alma». Aquí se refiere a su vida o a su ser entero, no solo al aspecto inmaterial de la persona.'
    reason: lexical_alternative
  - marker: d
    text: O «no volverán a afligirse» / «no volverán a desfallecer». La expresión hebrea puede denotar una pena que hace languidecer.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאוּ
  english_pob_choice: They will come
  chosen_spanish: Vendrán
  alternatives_spanish:
  - Y vendrán
  - Vienen
  lexicon: HALOT
  rationale: En el discurso profético, el perfecto con valor futuro expresa una acción venidera; «vendrán» es natural en español y mantiene el sentido de promesa.
- source_word: וְרִנְּנוּ
  english_pob_choice: shout for joy
  chosen_spanish: cantarán de alegría
  alternatives_spanish:
  - gritarán de alegría
  - entonarán cánticos de júbilo
  lexicon: HALOT
  rationale: רנן comunica júbilo vocal; «cantarán de alegría» conserva la idea de expresión gozosa sin sonar forzado en español.
- source_word: בִמְרוֹם צִיּוֹן
  english_pob_choice: on the height of Zion
  chosen_spanish: en lo alto de Sion
  alternatives_spanish:
  - en la altura de Sion
  - sobre la altura de Sion
  lexicon: HALOT
  rationale: «מְרוֹם» es singular y señala la elevación de Sion; «en lo alto de Sion» es fiel y fluido.
- source_word: וְנָהֲרוּ
  english_pob_choice: they will stream
  chosen_spanish: fluirán
  alternatives_spanish:
  - acudirán
  - se derramarán
  lexicon: HALOT
  rationale: El verbo puede expresar movimiento de fluir hacia algo; «fluirán» preserva la imagen verbal central y la concordancia con el contexto de abundancia.
- source_word: אֶל טוּב יְהוָה
  english_pob_choice: to the goodness of Yahweh
  chosen_spanish: hacia la bondad de Yahvé
  alternatives_spanish:
  - hacia la bondad de Yahvé
  - hacia la bondad de Yahvé, es decir, sus bienes
  lexicon: HALOT
  rationale: טוּב puede referirse a bondad y también a los bienes/bondades concretas que Dios concede. «Bondad» mantiene la base semántica; el contexto enumerativo deja ver que incluye provisiones concretas.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino revelado en el texto hebreo. «Yahvé» es la forma estándar adoptada en el proyecto, en lugar de una sustitución como «Señor».
- source_word: עַל דָּגָן וְעַל תִּירֹשׁ וְעַל יִצְהָר
  english_pob_choice: to the grain, the new wine, and the fresh oil
  chosen_spanish: hacia el grano, el vino nuevo y el aceite fresco
  alternatives_spanish:
  - hacia el grano, el vino nuevo y el aceite fresco
  - hacia el grano, el mosto y el aceite
  lexicon: HALOT
  rationale: La lista nombra productos agrícolas concretos. «Grano», «vino nuevo» y «aceite fresco» reproducen bien el triángulo de provisión; «hacia» refleja el movimiento idiomático del hebreo sin sobretraducir עַל.
- source_word: בְּנֵי צֹאן וּבָקָר
  english_pob_choice: the young of the flock and the herd
  chosen_spanish: los hijos del rebaño y del ganado
  alternatives_spanish:
  - las crías del rebaño y del ganado
  - los corderos y los terneros
  lexicon: HALOT
  rationale: בְּנֵי con sustantivos de ganado apunta a la descendencia/los jóvenes. «Hijos» conserva la literalidad de «bené» y deja la imagen de abundancia reproductiva.
- source_word: וְהָיְתָה נַפְשָׁם
  english_pob_choice: Their soul will be
  chosen_spanish: Su alma será
  alternatives_spanish:
  - Su vida será
  - Ellos mismos serán
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí conserva su referencia al ser interior o a la vida-persona; «alma» mantiene la correspondencia léxica directa que la revisión inglesa prefirió frente a una paráfrasis como «vida».
- source_word: כְּגַן רָוֶה
  english_pob_choice: like a well-watered garden
  chosen_spanish: como un jardín bien regado
  alternatives_spanish:
  - como un jardín muy regado
  - como un jardín abundantemente regado
  lexicon: HALOT
  rationale: La imagen de un jardín saturado de agua expresa plenitud y florecimiento; «bien regado» es idiomático y preciso.
- source_word: וְלֹא יוֹסִיפוּ לְדַאֲבָה עוֹד
  english_pob_choice: they will never again languish
  chosen_spanish: y no volverán a languidecer
  alternatives_spanish:
  - y no volverán a desfallecer
  - y no volverán a afligirse
  lexicon: HALOT
  rationale: La construcción indica cese duradero de un estado de pena/abatimiento; «languidecer» conserva la debilidad o aflicción prolongada que el contexto sugiere.
theological_decisions:
- issue: Rendering of the divine name YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Señor
  rationale: El texto hebreo emplea el Tetragrámaton directamente. Se mantiene el nombre propio divino en vez de sustituirlo por un título, siguiendo la política del proyecto y la lectura auditada del inglés.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Scope of טוּב יְהוָה
  english_pob_reading: goodness of Yahweh, with the following list showing the concrete provisions included
  chosen_spanish_reading: bondad de Yahvé, con la lista siguiente mostrando los bienes concretos incluidos
  alternative_spanish_readings:
  - bondad de Yahvé
  - bienes de Yahvé
  rationale: El hebreo admite tanto «bondad» en sentido abstracto como las bondades/bienes que Dios da. Se conserva «bondad» en el texto principal y se deja que la enumeración explicite el contenido material, como en la auditoría inglesa.
  doctrine_reference: Jer 31:12 lexical note on טוּב
- issue: Rendering of נֶפֶשׁ
  english_pob_reading: their soul / their life or whole self, not only the immaterial aspect of a person
  chosen_spanish_reading: su alma
  alternative_spanish_readings:
  - su vida
  - su ser entero
  rationale: Aunque el hebreo puede abarcar la persona entera, la revisión inglesa retornó a «soul» por precisión léxica. En español, «alma» conserva la correspondencia formal y admite la explicación semántica implícita de persona completa.
  doctrine_reference: Jer 31:12 lexical note on נֶפֶשׁ
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: conserva «Yahvé» para el Tetragrámaton, ajusta la coordinación con comas naturales, mantiene la enumeración de provisiones con artículos implícitos en español, usa «alma» para נֶפֶשׁ según la decisión léxica auditada, y vierte el cierre con «languidecer» para reflejar el matiz de pena prolongada.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se usa «Sion» sin artículo, conforme al uso bíblico estándar en español.
  - La lista agrícola conserva paralelismo y claridad en español.
  - El marcador [c] está anclado a «alma» y el [d] al cierre verbal, siguiendo el orden de las notas auditadas.
