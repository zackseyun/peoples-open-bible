review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del hebreo: llegada de Húsai, presentación de la propuesta de Ahitofel, pregunta deliberativa y mandato enfático a Húsai. Sin embargo, hay dos ajustes importantes para reflejar mejor la fuerza del original y la auditoría inglesa: (1) הֲנַעֲשֶׂה se expresa mejor como pregunta deliberativa de obligación/conveniencia (''¿Debemos hacer...?'') que como simple futuro (''¿Haremos...?''); (2) אֶת דְּבָרוֹ en este contexto se entiende idiomáticamente como seguir su consejo/propuesta, y en español queda más natural y fiel ''como él dice'' o ''según su consejo'' que ''según lo que él dice''.'
  spanish_quality_summary: El texto es claro y legible, pero '¿Haremos según lo que él dice?' suena algo forzado en español bíblico moderno, y 'tú habla' es comprensible pero menos natural que 'habla tú' para un registro digno y fluido. La nota [a] sobre 'llegó' no corresponde a una variante preservada en la auditoría inglesa y no hace falta para la comprensión.
  glossary_alignment: No hay términos teológicos de glosario mayor en este versículo. Los nombres propios están bien adaptados al español. La transliteración 'Húsai' y 'Absalón' es publicable. No hay conflicto con las políticas de Yahvé/Mesías/etc.
  issues:
  - severity: medium
    issue: Pregunta deliberativa traducida como futuro simple
    rationale: הֲנַעֲשֶׂה expresa deliberación consultiva ('¿debemos/habríamos de hacer...?'), no meramente futuro predictivo. '¿Haremos...?' es posible, pero menos preciso y menos natural aquí.
  - severity: medium
    issue: '''según lo que él dice'' suena pesado y no refleja óptimamente el idiomatismo'
    rationale: אֶת דְּבָרוֹ es literalmente 'su palabra', pero en contexto significa seguir el consejo de Ahitofel. La auditoría inglesa optó por 'as he says'. En español, 'como él dice' comunica mejor esa fuerza sin rigidez.
  - severity: low
    issue: Orden final algo menos natural
    rationale: '''tú habla'' preserva el énfasis, pero ''habla tú'' suena más natural y mantiene el contraste enfático del pronombre independiente.'
  - severity: low
    issue: Nota al pie innecesaria sobre 'llegó'
    rationale: La auditoría inglesa solo conserva la nota sobre 'his word'/'what he says'. Añadir una nota sobre 'llegó/entró' aquí introduce aparato innecesario sin beneficio claro.
  revised_spanish_text: 'Cuando Húsai vino a Absalón, Absalón le dijo: «Ahitofel ha hablado de esta manera. ¿Debemos hacer como él dice?[a] Si no, habla tú»'
  revised_footnotes:
