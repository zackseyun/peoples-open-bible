revisions:
- from: 'Entonces Eleazar el sacerdote dijo a los hombres del ejército que habían venido a la batalla[a]: «Esta es la estatuta de la ley que Yahvé mandó a Moisés».'
  to: 'Entonces Eleazar el sacerdote dijo a los hombres del ejército que habían venido a la batalla[a]: «Este es el estatuto de la ley que Yahvé mandó a Moisés».'
  rationale: Se corrige «estatuta» a «estatuto», que es la forma idiomática y fiel en español para preservar la fuerza jurídica de חֻקָּה. En consecuencia, se ajusta la concordancia a «Este es el estatuto...». Se conserva «Yahvé», la nota léxica alternativa y el resto de la redacción, que refleja adecuadamente el hebreo y el audit trail inglés.
