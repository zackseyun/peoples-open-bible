translation:
  language: es
  text: No tengas miedo de ellos[a], porque yo estoy contigo para librarte[b] —declara Yahvé—.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «de delante de ellos»; aquí es un giro idiomático que significa «de ellos» o «por causa de ellos».
    reason: lexical_alternative
  - marker: b
    text: 'O: «para rescatarte».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל / תִּירָא
  english_pob_choice: Do not be afraid
  chosen_spanish: No tengas miedo
  alternatives_spanish:
  - No temas
  - No tengas temor
  lexicon: HALOT
  rationale: La prohibición en hebreo usa אַל + imperfecto/jussivo; en español moderno, «No tengas miedo» comunica con naturalidad la prohibición contra el temor. «No temas» es más tradicional, pero menos idiomático para un registro contemporáneo.
- source_word: מִפְּנֵיהֶם
  english_pob_choice: of them
  chosen_spanish: de ellos
  alternatives_spanish:
  - por ellos
  - ante ellos
  - a causa de ellos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «de delante de su presencia», pero el sentido idiomático en este contexto es el objeto del miedo. «De ellos» mantiene la relación semántica sin forzar un calco en español.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque, en efecto
  lexicon: HALOT
  rationale: Aquí introduce la base de la prohibición. «Porque» expresa bien la relación causal y es natural en español.
- source_word: אִתְּךָ אֲנִי
  english_pob_choice: I am with you
  chosen_spanish: yo estoy contigo
  alternatives_spanish:
  - estoy contigo
  - yo estoy a tu lado
  lexicon: HALOT
  rationale: La construcción hebrea pone énfasis en la compañía divina. «Yo estoy contigo» conserva ese énfasis y suena natural en español.
- source_word: לְהַצִּלְךָ
  english_pob_choice: to deliver you
  chosen_spanish: para librarte
  alternatives_spanish:
  - para rescatarte
  - para salvarte
  lexicon: HALOT
  rationale: El hiphil de נצל denota rescatar/liberar de peligro. «Librarte» transmite bien la idea de liberación o rescate sin estrecharla a una salvación exclusivamente espiritual. Se mantiene la amplitud del POB inglés «deliver».
- source_word: נְאֻם
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - dice
  - afirma
  - oráculo de
  lexicon: HALOT
  rationale: Es la fórmula profética solemne. «Declara» conserva el tono formal y evita debilitar la marcación oracular.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el nombre divino: transliterar el Tetragrámaton como «Yahvé», preservando el nombre personal de Dios en lugar de sustituirlo por un título.'
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton, y la línea editorial del proyecto pide verterlo como el nombre propio divino. En español, «Yahvé» mantiene esa decisión con lectura pública clara.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de לְהַצִּלְךָ
  english_pob_reading: to deliver you
  chosen_spanish_reading: para librarte
  alternative_spanish_readings:
  - para rescatarte
  - para salvarte
  rationale: En este contexto profético, el verbo promete intervención protectora de Yahvé para Jeremías. «Librarte» conserva el sentido amplio de rescate/deliverance sin introducir de modo prematuro un matiz soteriológico técnico.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Alineado con la revisión más reciente: no se requieren cambios respecto al texto base auditado; se conserva el acuerdo alto entre controles y la lectura directa del hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme a la convención del proyecto para יְהוָה.
  - «Librarte» refleja el valor amplio de לְהַצִּיל sin reducirlo a una salvación doctrinal específica.
  - El estilo es sobrio y publicable, con puntuación española y fórmula profética marcada por raya.
