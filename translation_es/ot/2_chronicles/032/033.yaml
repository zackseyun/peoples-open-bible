base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/032/033.yaml
  text: And Hezekiah slept with his fathers[a], and they buried him in the upper part of the tombs of the sons of David. And all Judah and the inhabitants of Jerusalem honored him at his death, and Manasseh his son reigned in his place.
  footnotes:
  - marker: a
    text: Or 'the tombs of the descendants of David'; 'sons of David' here refers to the Davidic royal line.
    reason: lexical_alternative
