translation:
  language: es
  text: Antes de la destrucción el corazón del hombre se enaltece[a], y antes del honor viene la humildad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el corazón de una persona». El hebreo dice literalmente «el corazón de un hombre», con un singular masculino de sentido genérico en un refrán sapiencial.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְנֵי
  english_pob_choice: Before
  chosen_spanish: Antes de
  alternatives_spanish:
  - Delante de
  - En presencia de
  lexicon: HALOT
  rationale: La relación temporal del hebreo marca lo que precede a un evento; «Antes de» conserva la estructura paralela del proverbio y su sentido cronológico.
- source_word: שֶׁבֶר
  english_pob_choice: destruction
  chosen_spanish: la destrucción
  alternatives_spanish:
  - la ruina
  - el quebranto
  - el derrumbe
  lexicon: HALOT
  rationale: En sabiduría, el sustantivo apunta a colapso o ruina moral/material. «Destrucción» expresa bien el aviso proverbial y contrasta naturalmente con «honor».
- source_word: יִגְבַּהּ
  english_pob_choice: is haughty
  chosen_spanish: se enaltece
  alternatives_spanish:
  - se vuelve altivo
  - se engríe
  - se levanta en orgullo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «ser alto», pero con «corazón» comunica elevación arrogante. «Se enaltece» mantiene la imagen de elevación sin convertirla en una paráfrasis excesiva; la nota inglesa señala la idea de orgullo/arrogancia.
- source_word: לֵב אִישׁ
  english_pob_choice: a man's heart
  chosen_spanish: el corazón del hombre
  alternatives_spanish:
  - el corazón de un hombre
  - el corazón de una persona
  lexicon: HALOT
  rationale: El hebreo usa singular masculino genérico. En español, «el corazón del hombre» preserva esa forma representativa y suena natural en un proverbio; evita neutralizar el género sin perder el valor genérico.
- source_word: כָבוֹד
  english_pob_choice: honor
  chosen_spanish: honor
  alternatives_spanish:
  - gloria
  - estima
  - dignidad
  lexicon: HALOT
  rationale: Aquí el término designa estatus o reconocimiento, no la gloria divina. «Honor» conserva el contraste directo con la humillación implícita del primer miembro.
- source_word: עֲנָוָה
  english_pob_choice: humility
  chosen_spanish: la humildad
  alternatives_spanish:
  - la mansedumbre
  - la modestia
  - la bajeza
  lexicon: HALOT
  rationale: El sustantivo denota disposición humilde. «Humildad» es la equivalencia más clara y estándar en español, y preserva la antítesis ética con el corazón elevado.
theological_decisions:
- issue: Masculino genérico en אִישׁ
  english_pob_reading: a man's heart
  chosen_spanish_reading: el corazón del hombre
  alternative_spanish_readings:
  - el corazón de una persona
  - el corazón humano
  rationale: Se conserva el valor proverbial y la forma masculina representativa del hebreo sin forzar una neutralización moderna que diluya la huella lexical del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'Coincide con el estado revisado más reciente: el inglés POB no introdujo cambios en la última pasada y el control cruzado reportó alta concordancia; por tanto, no se incorporan revisiones adicionales al español.'
  spanish_consistency_notes:
  - Se mantiene la estructura paralela «Antes de... y antes de...» para reflejar el hebreo.
  - «Humildad» se usa de manera consistente para עֲנָוָה, como en el contraste proverbial con la elevación del corazón.
  - «Honor» se conserva para כָבוֹד por tratarse de estatus social/proverbial, no de gloria divina.
  - La nota de pie aclara la alternativa de género genérico sin alterar el texto principal.
