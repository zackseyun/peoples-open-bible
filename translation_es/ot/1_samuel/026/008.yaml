translation:
  language: es
  text: 'Entonces Abisay dijo a David[a]: «Dios ha entregado hoy a tu enemigo en tu mano. Así que ahora, por favor, déjame clavarlo al suelo con la lanza de un solo golpe[b], y no le daré un segundo golpe.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ha puesto a tu enemigo en tu poder hoy».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «con la lanza y a tierra, una vez»; la expresión describe el acto de fijarlo al suelo con un solo lance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֲבִישַׁי אֶל דָּוִד
  english_pob_choice: Then Abishai said to David
  chosen_spanish: Entonces Abisay dijo a David
  alternatives_spanish:
  - Y Abisay dijo a David
  lexicon: HALOT
  rationale: El waw narrativo avanza la escena; «Entonces» conserva la secuencia natural en español. «Abisay» sigue la forma castellana habitual del nombre propio, y se mantiene el destinatario directo «a David».
- source_word: סִגַּר
  english_pob_choice: has delivered
  chosen_spanish: ha entregado
  alternatives_spanish:
  - ha puesto en manos de
  - ha puesto en poder de
  - ha entregado
  lexicon: HALOT
  rationale: El verbo expresa la idea de entregar a alguien al poder de otro. «Ha entregado» comunica bien esa acción en español sin perder la agencia divina. Se evita «ha cerrado» o «ha encerrado» por ser demasiado opacos en este contexto.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: El sujeto singular y el contexto narrativo indican al Dios de Israel actuando providencialmente. «Dios» es la forma natural y fiel en español.
- source_word: אוֹיִבְךָ
  english_pob_choice: your enemy
  chosen_spanish: a tu enemigo
  alternatives_spanish:
  - a tu adversario
  - al que te es enemigo
  lexicon: HALOT
  rationale: El sustantivo con sufijo de segunda persona singular se rinde de modo directo como «tu enemigo». Se conserva el matiz personal y hostil del hebreo.
- source_word: בְּיָדֶךָ
  english_pob_choice: into your hand
  chosen_spanish: en tu mano
  alternatives_spanish:
  - en tu poder
  - en tus manos
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de la mano como símbolo de poder o dominio. En español, «en tu mano» reproduce la metáfora sin forzar una paráfrasis excesiva; el sentido de control está implícito por el contexto.
- source_word: אַכֶּנּוּ נָא
  english_pob_choice: please let me strike him
  chosen_spanish: atraviésalo, por favor
  alternatives_spanish:
  - déjame herirlo, por favor
  - permíteme atravesarlo, por favor
  lexicon: HALOT
  rationale: El verbo de herir/golpear aquí se concreta, por el complemento instrumental y la imagen inmediata, como una acción de ensartar o atravesar con la lanza. Se prefiere un verbo fuerte y visible en español que preserve la intención del hablante, evitando el genérico «golpear», que no refleja bien el contexto.
- source_word: בַּחֲנִית
  english_pob_choice: with the spear
  chosen_spanish: con la lanza
  alternatives_spanish:
  - con la jabalina
  - con la lanza que tiene a mano
  lexicon: HALOT
  rationale: Aunque la POB inglesa usa «spear», en español «lanza» es el término más natural y transparente para este contexto bélico. Se mantiene el artículo implícito en el sentido, sin sobrecargar la frase.
- source_word: וּבָאָרֶץ
  english_pob_choice: into the earth / into the ground
  chosen_spanish: a tierra
  alternatives_spanish:
  - al suelo
  - contra el suelo
  - en tierra
  lexicon: HALOT
  rationale: La expresión describe el efecto de fijarlo en el suelo con la lanza. «A tierra» mantiene la dirección del movimiento y la imagen hebrea con una forma breve y natural en español.
- source_word: פַּעַם אַחַת
  english_pob_choice: in one blow
  chosen_spanish: de un solo golpe
  alternatives_spanish:
  - una sola vez
  - de una vez
  lexicon: HALOT
  rationale: La frase modifica el modo del golpe, no solo la cantidad de intentos. «De un solo golpe» comunica la idea de un único asalto eficaz y preserva el énfasis en la contundencia.
- source_word: וְלֹא אֶשְׁנֶה לוֹ
  english_pob_choice: and I will not strike him a second time
  chosen_spanish: y no le daré un segundo golpe
  alternatives_spanish:
  - y no lo golpearé dos veces
  - y no repetiré el golpe sobre él
  lexicon: HALOT
  rationale: El verbo hebreo es el de repetir/hacer otra vez, con el golpe implícito. En español, «dar un segundo golpe» hace explícita la elipsis sin perder la fuerza del enunciado ni añadir más de lo necesario.
theological_decisions:
- issue: Providencia divina en la vulnerabilidad de Saúl
  english_pob_reading: God has delivered your enemy into your hand today
  chosen_spanish_reading: Dios ha entregado hoy a tu enemigo en tu mano
  alternative_spanish_readings:
  - Dios ha puesto hoy a tu enemigo en tu poder
  - Dios te ha entregado hoy a tu enemigo
  rationale: 'La traducción preserva la afirmación de Abisay sobre la acción providencial de Dios, sin convertirla en aprobación divina del plan de matar a Saúl. Se mantiene la tensión teológica del pasaje: Dios ha permitido la situación, pero el lector no debe inferir legitimación moral de la propuesta de Abisay.'
  doctrine_reference: Preservar la tensión entre providencia divina y responsabilidad humana.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail inglés, que optó por «pin him to the earth with the spear» para reflejar de manera más natural la imagen de fijar a alguien al suelo con la lanza. En español se resolvió con «atraviésalo... con la lanza» para conservar la contundencia del verbo de herir y, al mismo tiempo, hacer clara la imagen de un solo golpe eficaz. También se respetó la tensión providencial sin suavizarla ni resolverla.
  spanish_consistency_notes:
  - Se conserva «Dios» y no se introduce «SEÑOR», en línea con la decisión auditada para אֱלֹהִים.
  - Se usa «lanza» como equivalente más natural de בַּחֲנִית en español bíblico contemporáneo.
  - Se evita «siervo» u այլ vocabulario tradicional no presente en el hebreo; el texto mantiene el tono narrativo directo.
  - La frase «en tu mano» conserva la metáfora semítica de dominio/poder sin neutralizarla demasiado.
