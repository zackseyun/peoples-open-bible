review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: destinatario exclusivo, tierra dada, y ausencia de ajenos en medio del pueblo. Sin embargo, la nota [a] no preserva la alternativa documentada en el audit trail inglés para הָאָרֶץ, y el anclaje de notas no sigue bien la evidencia inglesa: la alternativa de «pasó entre ellos / pasó por en medio de ellos» corresponde al segundo hemistiquio, no a «solos».'
  spanish_quality_summary: El español es claro y digno. «A ellos solos fue dada la tierra» es comprensible, aunque algo más natural y enfático en español bíblico legible sería «Solo a ellos les fue dada la tierra». «Ningún extranjero pasó entre ellos» es bueno. La revisión propuesta mejora la naturalidad sin apartarse del hebreo.
  glossary_alignment: No hay términos teológicos sensibles del glosario principal en este versículo. «Extranjero» para זָר y «tierra» para הָאָרֶץ son aceptables; conviene conservar en nota la alternativa «la tierra/el mundo» o mejor «la tierra» en sentido amplio, y para el segundo hemistiquio la alternativa «forastero... por en medio de ellos».
  issues:
  - severity: medium
    issue: La nota [a] se asigna a «solos» pero el audit trail inglés conserva las notas para הָאָרֶץ y para el segundo hemistiquio, no para לְבַדָּם.
    rationale: La revisión debe preservar las alternativas significativas documentadas. Aquí se perdió la nota sobre «no foreigner passed through their midst» y se sustituyó por una nota nueva no necesaria sobre «solos/solamente».
  - severity: medium
    issue: Falta una nota para el segundo hemistiquio.
    rationale: El inglés POB documenta la alternativa «no foreigner passed through their midst». En español conviene reflejarla como alternativa léxica relevante.
  - severity: low
    issue: «A ellos solos fue dada» es correcto pero menos natural que «Solo a ellos les fue dada».
    rationale: La opción revisada mantiene la pasiva y la exclusividad del hebreo con mejor fluidez en español general.
  revised_spanish_text: Solo a ellos les fue dada la tierra[a], y ningún extranjero pasó entre ellos[b].
  revised_footnotes:
  - marker: a
    text: O «la tierra» en sentido amplio, es decir, «la tierra» o «el mundo»; el hebreo אֶרֶץ puede tener cualquiera de esos sentidos, pero aquí el contexto favorece «tierra» como territorio dado a un pueblo en particular.
    reason: lexical_alternative
  - marker: b
    text: O «ningún forastero pasó por en medio de ellos».
    reason: lexical_alternative
