translation:
  language: es
  text: Por tanto, él los entregará[a] hasta el tiempo en que la que está de parto haya dado a luz[b]; entonces el resto de sus hermanos volverán a los hijos de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los entregará en manos de otros' o 'los abandonará'.
    reason: lexical_alternative
  - marker: b
    text: '''La que está de parto'' no se identifica explícitamente en el hebreo; los intérpretes la entienden de diversas maneras, como Sion/Judá personificada, la madre del gobernante prometido o alguna otra figura.'
    reason: alternative_reading
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  - Entonces
  lexicon: HALOT
  rationale: Expresa la conclusión lógica del contexto inmediato con un giro natural en español; mantiene el valor inferencial de la partícula sin volverla demasiado coloquial.
- source_word: יִתְּנֵם
  english_pob_choice: he will give them up
  chosen_spanish: los entregará
  alternatives_spanish:
  - los dará
  - los abandonará
  - los pondrá en manos de otros
  lexicon: HALOT
  rationale: נתן con sufijo pronominal aquí tiene sentido de entregar o dejar en manos de otros bajo juicio. 'Entregará' conserva la fuerza de cesión/abandono sin añadir una interpretación más fuerte que la del texto.
- source_word: עַד עֵת
  english_pob_choice: until the time
  chosen_spanish: hasta el tiempo
  alternatives_spanish:
  - hasta que llegue el tiempo
  - hasta el momento
  lexicon: HALOT
  rationale: Reproduce la construcción temporal de forma clara y sobria. 'Hasta el tiempo' conserva la estructura hebrea sin sonar artificioso.
- source_word: יוֹלֵדָה
  english_pob_choice: she who is in labor
  chosen_spanish: la que está de parto
  alternatives_spanish:
  - la mujer que está de parto
  - la que da a luz
  - la parturienta
  lexicon: HALOT
  rationale: El participio femenino señala a una mujer en proceso de parto. 'La que está de parto' mantiene la imagen y deja sin identificar explícitamente a la persona, como en el hebreo y en la lectura auditada en inglés.
- source_word: יָלָדָה
  english_pob_choice: has given birth
  chosen_spanish: haya dado a luz
  alternatives_spanish:
  - haya parido
  - haya tenido un hijo
  - haya dado nacimiento
  lexicon: HALOT
  rationale: El perfecto verbal en la cláusula temporal se refleja bien con el subjuntivo perfecto español tras 'hasta que'. 'Dar a luz' es idiomático y fiel al evento de nacimiento.
- source_word: וְיֶתֶר
  english_pob_choice: then the rest
  chosen_spanish: entonces el resto
  alternatives_spanish:
  - y el resto
  - y lo restante
  - y el remanente
  lexicon: HALOT
  rationale: '''Resto'' es una manera natural de expresar el sustantivo de los que quedan. Se evita ''remanente'' porque introduce una carga técnico-teológica no obligatoria en el sustantivo aislado.'
- source_word: אֶחָיו
  english_pob_choice: of his brothers
  chosen_spanish: de sus hermanos
  alternatives_spanish:
  - de sus parientes
  - de sus hermanos varones
  lexicon: HALOT
  rationale: Se conserva el plural masculino 'hermanos' como equivalente directo del hebreo. El posesivo 'sus' sigue el referente masculino singular implícito en el contexto auditado.
- source_word: יְשׁוּבוּן
  english_pob_choice: will return
  chosen_spanish: volverá
  alternatives_spanish:
  - volverán
  - regresará
  - regresarán
  lexicon: HALOT
  rationale: El verbo שוב se traduce con 'volver'/'regresar'. Se eligió singular en concordancia con 'el resto' como sujeto colectivo en español, sin perder el sentido de retorno.
- source_word: עַל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - sobre
  - contra
  lexicon: HALOT
  rationale: En esta construcción, la preposición funciona idiomáticamente como dirección/relación de movimiento. 'A' es la solución española más natural y fiel.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los hijos de Israel, el pueblo de Israel
  lexicon: HALOT
  rationale: En español bíblico, 'hijos de Israel' reproduce de manera reconocible la fórmula hebrea בְּנֵי יִשְׂרָאֵל y evita forzar una traducción literal 'hijos varones' que sonaría extraña. Conserva el enlace tradicional con el grupo de Israel.
theological_decisions:
- issue: Identidad de 'la que está de parto'
  english_pob_reading: Left unspecified in the main text
  chosen_spanish_reading: Se deja sin identificar en el texto principal
  alternative_spanish_readings:
  - Sion/Judá personificada
  - la madre del gobernante prometido
  - una referencia histórica inmediata más precisa
  rationale: El hebreo no identifica explícitamente a la mujer. Mantener la indeterminación evita resolver una tensión interpretativa que el texto no resuelve por sí mismo y respeta la cautela del POB en inglés.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Alcance de 'sus hermanos'
  english_pob_reading: Retained as 'his brothers' without interpretive expansion
  chosen_spanish_reading: Se conserva 'sus hermanos' sin ampliación interpretativa
  alternative_spanish_readings:
  - sus parientes
  - los israelitas relacionados con él
  - los miembros reunidos del pueblo
  rationale: La expresión puede apuntar a un vínculo con el gobernante anunciado en el contexto, pero el versículo por sí solo no define el alcance con precisión. La traducción mantiene el parentesco lexical y deja la interpretación más amplia para las notas o el comentario.
  doctrine_reference: Translation philosophy §§1, 3, 4.
translation_notes:
  revision_awareness: 'Revisión auditada: el último pase indicó que no se necesitaban cambios y que hubo alto acuerdo entre revisores. Esta versión española sigue de cerca la decisión inglesa final, preservando la indeterminación de la mujer de parto y la relación de ''sus hermanos'' con el grupo de Israel.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' para el nombre divino cuando corresponda; este versículo no lo contiene.
  - Se mantuvo 'hijos de Israel' para reflejar la fórmula hebrea בְּנֵי יִשְׂרָאֵל y su resonancia bíblica.
  - Se eligió 'entregará' para נתן en sentido judicial/disciplinario, evitando 'abandonará' como lectura más fuerte que la sostenida por el contexto inmediato.
