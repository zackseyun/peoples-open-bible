translation:
  language: es
  text: Tus brotes son un huerto[a] de granadas con frutos escogidos, alheña[b] con plantas de nardo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «jardín» o «parque»; el término hebreo puede denotar un huerto o parque cerrado.
    reason: lexical_alternative
  - marker: b
    text: La planta probablemente es alheña, también conocida como henna (Lawsonia inermis).
    reason: lexical_alternative
  - marker: c
    text: El hebreo está en plural; por eso se traduce «plantas de nardo» en vez de un singular genérico.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁלָחַיִךְ
  english_pob_choice: your shoots
  chosen_spanish: tus brotes
  alternatives_spanish:
  - tus ramas
  - tus canales
  - tus plantas
  lexicon: HALOT
  rationale: El término hebreo es raro y debatido. En el contexto de imagen de jardín y fructificación, «brotes» comunica mejor la idea de crecimiento vegetal joven y fecundo que las alternativas menos naturales en español.
- source_word: פַּרְדֵּס
  english_pob_choice: orchard
  chosen_spanish: huerto
  alternatives_spanish:
  - jardín
  - parque
  - huerto frutal
  lexicon: HALOT
  rationale: El hebreo puede denotar un recinto arbolado u huerto. «Huerto» es natural en español bíblico moderno y encaja con la imaginería frutal inmediata sin arrastrar el matiz teológico ajeno de «paraíso».
- source_word: רִמּוֹנִים
  english_pob_choice: pomegranates
  chosen_spanish: granados
  alternatives_spanish:
  - granadas
  lexicon: HALOT
  rationale: El audit trail inglés privilegia el árbol/frutal dentro del huerto; en español, «granados» preserva el valor botánico y poético del conjunto del verso, aunque el fruto en sí sería «granadas».
- source_word: פְּרִי מְגָדִים
  english_pob_choice: choice fruits
  chosen_spanish: frutos escogidos
  alternatives_spanish:
  - frutos selectos
  - frutos preciosos
  - frutos excelentes
  lexicon: HALOT
  rationale: La construcción expresa producción especialmente fina o valiosa. «Frutos escogidos» mantiene la naturalidad del español y la idea de selección/calidad superior.
- source_word: כְּפָרִים
  english_pob_choice: henna
  chosen_spanish: henna
  alternatives_spanish:
  - camforio
  - alheña
  lexicon: HALOT
  rationale: El referente botánico más probable es henna (Lawsonia inermis). «Henna» es transparente y evita el arcaísmo engañoso de «camphire/camforio».
- source_word: נְרָדִים
  english_pob_choice: nard plants
  chosen_spanish: plantas de nardo
  alternatives_spanish:
  - nardos
  - nardo
  - plantas aromáticas de nardo
  lexicon: HALOT
  rationale: El plural hebreo favorece una referencia a plantas o variedades de nardo. «Plantas de nardo» conserva el plural y la precisión botánica del texto revisado en inglés.
translation_notes:
  revision_awareness: Se siguió el marco revisado del inglés POB que mantiene «choice fruits» y ajusta נְרָדִים a una forma más natural y precisa como «nard plants». En español se conservó la imagen botánica completa y se evitó la paráfrasis teológica.
  spanish_consistency_notes:
  - Se usó «huerto» para פַּרְדֵּס por ser natural y suficientemente preciso en español bíblico moderno.
  - Se prefirió «brotes» para שְׁלָחַיִךְ por coherencia con la imaginería vegetal del versículo.
  - Se evitó «paraíso» para no introducir connotaciones posteriores ajenas al contexto inmediato.
  - Se mantuvo «henna» como préstamo ya reconocible en español.
  - Se respetó el plural de נְרָדִים con «plantas de nardo».
