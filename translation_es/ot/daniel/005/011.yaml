translation:
  language: es
  text: 'Hay un hombre en tu reino en quien hay un espíritu de los santos dioses, y en los días de tu padre[a] se hallaron en él luz, perspicacia y sabiduría, como la sabiduría de los dioses. Y el rey Nabucodonosor, tu padre, lo constituyó jefe de los magos, encantadores, caldeos y adivinos: tu padre[b], el rey.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘Tu padre’ también puede significar ‘tu antepasado’ o ‘tu predecesor’ en este contexto dinástico de la corte.
    reason: cultural_note
  - marker: b
    text: ‘Tu padre’ puede referirse no solo al padre inmediato, sino también a un antepasado o predecesor real en este contexto cortesano.
    reason: cultural_note
lexical_decisions:
- source_word: אִיתַי
  english_pob_choice: There is
  chosen_spanish: Hay
  alternatives_spanish:
  - Existe
  lexicon: HALOT
  rationale: La partícula existencial se expresa de forma natural con 'Hay' en español, manteniendo la afirmación simple y directa del original.
- source_word: גְּבַר
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un cierto hombre
  - una persona
  lexicon: HALOT
  rationale: El sustantivo básico designa a un varón adulto o persona masculina; 'un hombre' es la equivalencia más directa y natural.
- source_word: בְּמַלְכוּתָךְ
  english_pob_choice: in your kingdom
  chosen_spanish: en tu reino
  alternatives_spanish:
  - en tu reino y dominio
  - en tu reino
  lexicon: HALOT
  rationale: '''Reino'' comunica bien el dominio real del contexto narrativo. Es una opción natural en español y suficientemente fiel.'
- source_word: רוּחַ אֱלָהִין קַדִּישִׁין
  english_pob_choice: a spirit of the holy gods
  chosen_spanish: un espíritu de los santos dioses
  alternatives_spanish:
  - el Espíritu del Dios santo
  - un espíritu de los dioses santos
  lexicon: HALOT
  rationale: Conserva el plural arameo y el lenguaje cortesano/pagano de la voz que habla. 'Santos' refleja קַדִּישִׁין sin introducir una interpretación monoteísta en el texto principal.
- source_word: בֵּהּ
  english_pob_choice: in him
  chosen_spanish: en quien / en él
  alternatives_spanish:
  - dentro de él
  - en él
  lexicon: HALOT
  rationale: La cláusula relativa española fluye mejor con 'en quien' al retomar al hombre mencionado; luego 'en él' preserva el referente interno del pasaje.
- source_word: נַהִירוּ
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - claridad
  - iluminación
  lexicon: HALOT
  rationale: El sustantivo conserva la metáfora de iluminación intelectual; 'luz' es la forma más transparente y bíblica en español.
- source_word: וְשָׂכְלְתָנוּ
  english_pob_choice: insight
  chosen_spanish: inteligencia
  alternatives_spanish:
  - perspicacia
  - entendimiento
  lexicon: HALOT
  rationale: Dado el valor de discernimiento/claridad mental, 'inteligencia' comunica bien la capacidad intelectual sin perder el matiz de perspicacia; se evita 'entendimiento' por sonar más genérico en este contexto.
- source_word: וְחָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - sapiencia
  lexicon: HALOT
  rationale: Renderiza el sustantivo estándar con el equivalente usual y claro en español.
- source_word: כְּחָכְמַת אֱלָהִין
  english_pob_choice: like the wisdom of the gods
  chosen_spanish: como la sabiduría de los dioses
  alternatives_spanish:
  - como sabiduría divina
  - como la sabiduría de Dios
  lexicon: HALOT
  rationale: Mantiene el plural de la forma aramea y la comparación explícita, sin suavizarla a una paráfrasis teológica.
- source_word: הִשְׁתְּכַחַת
  english_pob_choice: were found
  chosen_spanish: se hallaron
  alternatives_spanish:
  - fueron hallados
  - se encontraron
  lexicon: HALOT
  rationale: El pasivo/reflexivo plural en español es natural con la serie 'luz, inteligencia y sabiduría'; 'se hallaron' preserva el sentido de descubrimiento/constatación.
- source_word: וּמַלְכָּא נְבֻכַדְנֶצַּר
  english_pob_choice: And King Nebuchadnezzar
  chosen_spanish: Y el rey Nabucodonosor
  alternatives_spanish:
  - Y el rey Nabucodonosor
  - Y Nabucodonosor, el rey
  lexicon: HALOT
  rationale: Se mantiene la identificación real y el nombre propio en español estándar. El orden es natural y claro.
- source_word: אֲבוּךְ
  english_pob_choice: your father
  chosen_spanish: tu padre
  alternatives_spanish:
  - tu antepasado
  - tu predecesor
  lexicon: HALOT
  rationale: Se conserva la forma literal en el cuerpo del texto, tal como lo hace el POB en inglés, dejando la amplitud dinástica para nota.
- source_word: רַב
  english_pob_choice: chief
  chosen_spanish: jefe
  alternatives_spanish:
  - principal
  - líder
  lexicon: HALOT
  rationale: Indica el rango o cargo de autoridad sobre un grupo de oficiales; 'jefe' es breve y fiel.
- source_word: חַרְטֻמִּין
  english_pob_choice: magicians
  chosen_spanish: magos
  alternatives_spanish:
  - magos rituales
  - hechiceros
  lexicon: HALOT
  rationale: En el contexto de Daniel, designa una clase de especialistas cortesanos; 'magos' es la correspondencia tradicional y clara en español.
- source_word: אָשְׁפִין
  english_pob_choice: enchanters
  chosen_spanish: encantadores
  alternatives_spanish:
  - encantadores
  - adivinos rituales
  lexicon: HALOT
  rationale: Mantiene la distinción entre categorías de sabios/cortesanos del original y del POB inglés.
- source_word: כַּשְׂדָּאִין
  english_pob_choice: Chaldeans
  chosen_spanish: caldeos
  alternatives_spanish:
  - caldeos
  - chaldeos
  lexicon: HALOT
  rationale: '''Caldeos'' es el equivalente usual en español y conserva el término etnopolítico/cortesano del libro de Daniel.'
- source_word: גָּזְרִין
  english_pob_choice: diviners
  chosen_spanish: adivinos
  alternatives_spanish:
  - adivinos
  - pronosticadores
  lexicon: HALOT
  rationale: Describe adecuadamente a los intérpretes/augures del entorno cortesano; 'adivinos' mantiene la distinción de oficio.
- source_word: הֲקִימֵהּ
  english_pob_choice: appointed him
  chosen_spanish: lo constituyó
  alternatives_spanish:
  - lo nombró
  - lo estableció
  lexicon: HALOT
  rationale: El causativo de 'establecer/poner en cargo' se expresa bien con 'constituyó', que suena administrativo y solemne en español bíblico.
theological_decisions:
- issue: Pluralidad de אֱלָהִין קַדִּישִׁין en la voz de la reina
  english_pob_reading: a spirit of the holy gods
  chosen_spanish_reading: un espíritu de los santos dioses
  alternative_spanish_readings:
  - el Espíritu del Dios santo
  - un espíritu del Dios santo
  rationale: El arameo es plural y la escena pertenece al discurso de una corte babilónica. El texto principal conserva esa perspectiva sin armonizarla con una formulación monoteísta; la lectura singular queda solo como alternativa interpretativa.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido de 'tu padre' respecto de Nabucodonosor
  english_pob_reading: your father
  chosen_spanish_reading: tu padre
  alternative_spanish_readings:
  - tu antepasado
  - tu predecesor
  rationale: El original dice literalmente 'tu padre'. Aunque el contexto dinástico puede extender el sentido a antepasado o predecesor, el texto principal mantiene la forma directa por transparencia; la amplitud histórica queda para nota.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La redacción refleja la revisión más reciente del POB en inglés, que prefirió ''insight'' para שָׂכְלְתָנוּ. En español se optó por ''inteligencia'' para conservar el matiz de capacidad mental/penetración y mantener la trilogía ''luz, inteligencia y sabiduría'' fluida y diferenciada. Se conservan además las decisiones revisadas: pluralidad de ''dioses'', y el orden estructural del versículo con la apposición final ''tu padre, el rey''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo exija explícitamente; este versículo no lo contiene.
  - Se mantiene 'Mesías/Cristo' fuera de este pasaje porque no aparece la terminología correspondiente.
  - Se usa vocabulario sobrio y bíblico ('reino', 'sabiduría', 'constituyó') sin arcaísmos innecesarios.
  - Se preserva la distinción entre 'magos', 'encantadores', 'caldeos' y 'adivinos' para reflejar la lista aramea de oficios/cargos.
