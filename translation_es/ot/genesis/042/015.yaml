  - severity: medium
    issue: La fórmula juramentaria “¡vive Faraón!” suena poco idiomática en español.
    rationale: Aunque es defendible literalmente, en español actual y digno “por vida de Faraón” transmite mejor una fórmula de juramento equivalente a “as Pharaoh lives” sin sonar brusca o extraña.
  - severity: low
    issue: “Su hermano menor” no expresa tan claramente el sentido contextual de ‘el más joven’.
    rationale: En el contexto de varios hermanos, הַקָּטֹן apunta al menor de todos; “su hermano más joven” evita una posible lectura comparativa limitada o ambigua.
  revised_spanish_text: 'Por esto serán puestos a prueba: por vida de Faraón, no saldrán de este lugar[a] a menos que venga aquí su hermano más joven.'
