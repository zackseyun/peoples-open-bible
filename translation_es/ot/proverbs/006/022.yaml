translation:
  language: es
  text: Cuando camines[a], te guiará; cuando te acuestes, velará sobre ti; y cuando despiertes, hablará contigo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando andes». El hebreo presenta un verbo con matiz de ir de un lado a otro o conducirse; aquí la lectura temporal de «cuando camines» es la más natural.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ella hablará contigo». El hebreo usa un pronombre femenino, que se refiere al mandamiento o la enseñanza en el contexto inmediato y hace eco de la personificación más amplia de la sabiduría en Proverbios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּהִתְהַלֶּכְךָ
  english_pob_choice: when you walk
  chosen_spanish: cuando camines
  alternatives_spanish:
  - cuando andes
  - cuando vayas de aquí para allá
  lexicon: HALOT
  rationale: El valor temporal de ב + infinitivo con sufijo se conserva naturalmente con 'cuando'. El hitpael de הלך puede sugerir conducta o desplazamiento; aquí, por el paralelismo con acostarse y despertar, la lectura temporal/life-context es la más probable. 'Camines' mantiene un español fluido y digno.
- source_word: תַּנְחֶה
  english_pob_choice: it will guide
  chosen_spanish: te guiará
  alternatives_spanish:
  - te conducirá
  - te dirigirá
  lexicon: HALOT
  rationale: La forma hifil de נחה expresa guiar o conducir. 'Guiar' es el equivalente más natural en español contemporáneo y conserva el matiz de dirección protectora del contexto sapiencial.
- source_word: בְּשָׁכְבְּךָ
  english_pob_choice: when you lie down
  chosen_spanish: cuando te acuestes
  alternatives_spanish:
  - cuando te recuestes
  - cuando te eches a dormir
  lexicon: HALOT
  rationale: El hebreo señala el acto de acostarse/reclinarse, no necesariamente dormir. 'Te acuestes' mantiene esa precisión y el mismo valor temporal.
- source_word: תִּשְׁמֹר עָלֶיךָ
  english_pob_choice: it will watch over you
  chosen_spanish: velará sobre ti
  alternatives_spanish:
  - te guardará
  - te vigilará
  lexicon: HALOT
  rationale: שׁמר + על puede significar guardar, vigilar o velar sobre alguien. 'Velará sobre ti' reproduce bien la idea protectora y queda más idiomático que un calco rígido.
- source_word: וַהֲקִיצוֹתָ
  english_pob_choice: when you awake
  chosen_spanish: cuando despiertes
  alternatives_spanish:
  - cuando te despiertes
  - al despertar
  lexicon: HALOT
  rationale: La forma funciona temporalmente en secuencia. 'Despiertes' es la opción más natural y fiel al acto de despertar, sin añadir matices no presentes.
- source_word: הִיא
  english_pob_choice: it
  chosen_spanish: te
  alternatives_spanish:
  - ella
  - eso
  lexicon: HALOT
  rationale: El pronombre femenino singular remite al antecedente femenino del contexto inmediato, la instrucción/mandamiento. En español, la referencia se expresa mejor retomando el objeto directo implícito en la última cláusula ('te hablará contigo'), evitando una sobre-personificación en la línea principal.
- source_word: תְשִׂיחֶךָ
  english_pob_choice: it will speak with you
  chosen_spanish: hablará contigo
  alternatives_spanish:
  - conversará contigo
  - te hablará
  lexicon: HALOT
  rationale: שׂיח puede abarcar hablar, conversar o meditar. 'Hablar contigo' conserva el matiz interactivo sin forzar una interpretación más técnica como 'instruirte'. La forma reflexiva 'te hablará' es posible, pero 'hablará contigo' suena más natural en español bíblico moderno.
theological_decisions:
- issue: Pronombre femenino del antecedente y personificación de la enseñanza
  english_pob_reading: Render the feminine antecedent with English 'it' rather than 'she' in the main text
  chosen_spanish_reading: La línea principal evita explicitar 'ella' y mantiene un referente neutro implícito en 'te hablará contigo'
  alternative_spanish_readings:
  - te hablará
  - ella hablará contigo
  rationale: El hebreo usa un pronombre femenino porque el antecedente inmediato es femenino, pero en español la referencia abstracta se expresa con mayor naturalidad sin introducir un sujeto explícito femenino en la línea principal. Aun así, se conserva la posibilidad de leer una personificación de la instrucción, coherente con Proverbios.
  doctrine_reference: Translation philosophy §6 (lenguaje moderno y claro) y §5 (consistencia documentada con personificación de la sabiduría)
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente inglés; el pasaje fue confirmado como de alta concordancia y sin cambios en la última pasada de revisión.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino en este proyecto, pero en este versículo no aparece.
  - Se conserva 'guiar/velar/hablar' como triada verbal coherente con el paralelismo hebreo.
  - La elección de 'te hablará contigo' en la primera versión fue evaluada; se optó por una forma más natural y menos redundante en español, sin perder el valor conversacional de שׂיח.
