  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la sintaxis y el sentido general del griego: adversativo/additivo, motivo causal (''por cuanto eran seres humanos''), acción de perdonar/ahorrar, envío de insectos por delante, imagen militar, y destrucción gradual. Sin embargo, σφῆκας se alinea mejor con ''avispones'' que con ''avispas'', especialmente porque el rastro inglés preserva deliberadamente el motivo bíblico de ''hornets''. Además, ἐφείσω significa más precisamente ''perdonaste/escatimaste/ahorraste'' en sentido de ''los dejaste con vida / te contuviste de destruirlos'' que ''los perdonaste'' en un sentido potencialmente moral-forense.'
  spanish_quality_summary: El español es claro, natural y digno. La estructura fluye bien. Aun así, 'los perdonaste' puede sonar a absolución moral más que a contención en juicio; 'los dejaste con vida' o 'los trataste con indulgencia' sería más interpretativo, mientras que 'los perdonaste' es comprensible pero menos exacto. El cambio realmente necesario es 'avispas' -> 'avispones' para preservar mejor el referente y el eco intertextual. También conviene ajustar la nota correspondiente.
  glossary_alignment: 'No hay conflictos con la terminología teológica principal del proyecto. La decisión relevante es léxica: σφῆκας debe reflejar el motivo bíblico de los ''hornets''; en español general e interconfesional ''avispones'' lo preserva mejor que ''avispas''. ''Tu ejército'' para στρατόπεδον es aceptable con nota alternativa ''campamento''.'
  issues:
