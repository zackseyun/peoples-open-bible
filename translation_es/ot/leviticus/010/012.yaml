revisions:
- from: 'Entonces Moisés habló a Aarón, a Eleazar y a Itamar, sus hijos que habían quedado: “Tomen la ofrenda de cereal que queda de las ofrendas encendidas para Yahvé, y cómanla sin levadura junto al altar, porque es cosa santísima.”'
  to: 'Entonces Moisés habló a Aarón, a Eleazar y a Itamar[a], sus hijos restantes: «Tomen la ofrenda de cereal que queda de las ofrendas por fuego de Yahvé, y cómanla sin levadura junto al altar, porque es santísima».


    [a] O, más formalmente, «sus hijos que habían quedado».'
  rationale: 'Se ajusta la redacción para mejorar fidelidad léxica e idiomaticidad: ''ofrendas por fuego'' representa mejor אִשֵּׁי; ''sus hijos restantes'' fluye mejor que ''sus hijos que habían quedado''; y ''es santísima'' expresa naturalmente el superlativo de קֹדֶשׁ קָדָשִׁים. Se añade una nota menor para preservar la alternativa más formal del participio, ya que el inglés auditado también conserva alternativas léxicas relevantes. No se requiere adjudicación adicional.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:18:13Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: Moisés se dirige a Aarón, Eleazar e Itamar; manda tomar la porción restante de la מִנְחָה, comerla sin levadura junto al altar, y da la razón de su santidad suprema. Sin embargo, מֵאִשֵּׁי יְהוָה queda mejor como ''de las ofrendas por fuego de Yahvé'' o con nota alternativa, ya que ''ofrendas encendidas'' suena menos idiomático y menos exacto cultualmente. Además, הַנּוֹתָרִים se puede expresar de forma más directa como ''sus hijos restantes'', y קֹדֶשׁ קָדָשִׁים se vierte más naturalmente como ''es santísima'' sin perder el valor superlativo.'
  spanish_quality_summary: 'El español es claro y digno, pero hay dos giros mejorables por naturalidad e idiomaticidad bíblica: ''ofrendas encendidas'' resulta extraño en español eclesial general, y ''sus hijos que habían quedado'' es algo pesado donde ''sus hijos restantes'' o ''sus hijos que quedaban'' sería más fluido. El resto está bien construido y es legible.'
  glossary_alignment: Se mantiene correctamente 'Yahvé' para יְהוָה. 'ofrenda de cereal' alinea bien con מִנְחָה. 'sin levadura', 'junto al altar' y el sentido superlativo de קֹדֶשׁ קָדָשִׁים están bien preservados. La principal desalineación terminológica está en אִשֵּׁי, donde el proyecto inglés documenta 'food offerings' con nota formal 'offerings by fire'; en español conviene reflejar explícitamente la dimensión sacrificial por fuego, idealmente con nota de alternativa si se desea preservar el matiz del inglés auditado.
  issues:
  - severity: medium
    issue: '"ofrendas encendidas" para מֵאִשֵּׁי יְהוָה'
    rationale: Aunque intenta conservar la imagen del fuego, no es la formulación más natural ni más precisa en español bíblico. 'Ofrendas por fuego' reproduce mejor el tecnicismo cultual hebreo y mantiene la trazabilidad léxica.
  - severity: low
    issue: '"sus hijos que habían quedado" suena algo pesado'
    rationale: El participio הַנּוֹתָרִים puede expresarse con más naturalidad como 'sus hijos restantes', sin perder la alusión contextual a los hijos que quedaron con vida.
  - severity: low
    issue: '"porque es cosa santísima" es correcto pero algo más rígido de lo necesario'
    rationale: El hebreo puede verterse más naturalmente en español como 'porque es santísima', refiriéndose a la ofrenda, sin sacrificar el valor superlativo.
  revised_spanish_text: 'Entonces Moisés habló a Aarón, a Eleazar y a Itamar[a], sus hijos restantes: «Tomen la ofrenda de cereal que queda de las ofrendas por fuego de Yahvé, y cómanla sin levadura junto al altar, porque es santísima».


    [a] O, más formalmente, «sus hijos que habían quedado».'
  revised_footnotes:
  - marker: a
    text: O, más formalmente, «sus hijos que habían quedado».
    reason: lexical_alternative
  revision_rationale: 'Se ajusta la redacción para mejorar fidelidad léxica e idiomaticidad: ''ofrendas por fuego'' representa mejor אִשֵּׁי; ''sus hijos restantes'' fluye mejor que ''sus hijos que habían quedado''; y ''es santísima'' expresa naturalmente el superlativo de קֹדֶשׁ קָדָשִׁים. Se añade una nota menor para preservar la alternativa más formal del participio, ya que el inglés auditado también conserva alternativas léxicas relevantes. No se requiere adjudicación adicional.'
