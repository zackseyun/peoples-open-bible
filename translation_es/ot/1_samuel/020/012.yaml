    text: 'Hebreo literalmente: «haya buscado/averiguado a mi padre»; aquí el sentido es sondear su disposición.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo temporal está condensado; también puede entenderse: «mañana a esta hora, en/al tercer día».'
    reason: alternative_reading
  - marker: c
    text: 'Hebreo literalmente: «te descubriré el oído»; es un modismo que significa «te lo revelaré» o «te lo comunicaré» confidencialmente.'
    reason: lexical_alternative
  revision_rationale: Se revisa para mejorar la naturalidad del juramento elíptico, hacer más idiomática la expresión temporal, completar en español los verbos finales («avisarte», «te lo revelaré») y alinear mejor las notas con la evidencia y el rastro de auditoría inglés.
