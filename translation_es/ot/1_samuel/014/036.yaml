translation:
  language: es
  text: 'Entonces Saúl dijo: «Descendamos tras los filisteos de noche y los despojemos[a] hasta la luz de la mañana, y no dejemos entre ellos a ningún hombre». Y ellos dijeron: «Haz todo lo que bien te parezca». Pero el sacerdote dijo: «Acercuémonos aquí a Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «saqueémoslos»; el hebreo usa un verbo de despojar o saquear.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֵרְדָה
  english_pob_choice: Let us go down
  chosen_spanish: Descendamos
  alternatives_spanish:
  - Bajemos
  - Vayamos hacia abajo
  lexicon: HALOT
  rationale: La forma cohortativa expresa una propuesta exhortativa en plural. En español, «descendamos» conserva el movimiento hacia abajo que el hebreo marca mejor que un simple «vayamos».
- source_word: אַחֲרֵי פְלִשְׁתִּים
  english_pob_choice: after the Philistines
  chosen_spanish: tras los filisteos
  alternatives_spanish:
  - detrás de los filisteos
  - en persecución de los filisteos
  lexicon: HALOT
  rationale: אַחֲרֵי significa literalmente «después de / tras». En contexto militar implica persecución; «tras» mantiene la cercanía al hebreo sin forzar una interpretación más explícita.
- source_word: לַיְלָה
  english_pob_choice: by night
  chosen_spanish: de noche
  alternatives_spanish:
  - por la noche
  - en la noche
  lexicon: HALOT
  rationale: La expresión adverbial temporal se vierte de forma natural en español como «de noche», sin añadir la idea de «esta noche» que el hebreo no especifica.
- source_word: וְנָבֹזָה בָהֶם
  english_pob_choice: and plunder them
  chosen_spanish: y los saquemos
  alternatives_spanish:
  - y los despojemos
  - y los saquemos de sus bienes
  lexicon: HALOT
  rationale: El verbo בזז implica saquear o despojar. «Los saquemos» comunica el saqueo con naturalidad en español y evita un calco torpe, aunque el matiz de despojo se mantiene por el contexto.
- source_word: עַד אוֹר הַבֹּקֶר
  english_pob_choice: until the light of the morning
  chosen_spanish: hasta la luz de la mañana
  alternatives_spanish:
  - hasta el amanecer
  - hasta que amanezca
  lexicon: HALOT
  rationale: Se conserva la imagen de la «luz» en vez de reducirla directamente a «amanecer», siguiendo la concreción poética del hebreo.
- source_word: וְלֹא נַשְׁאֵר בָּהֶם אִישׁ
  english_pob_choice: and let us not leave a man among them
  chosen_spanish: y no dejemos entre ellos a ningún hombre
  alternatives_spanish:
  - y no dejemos a un hombre entre ellos
  - y no dejemos con vida a ninguno de ellos
  lexicon: HALOT
  rationale: «A ningún hombre» refleja el distributivo singular אִישׁ y evita añadir «con vida», que es inferido pero no dicho explícitamente. «Entre ellos» mantiene la preposición בָּהֶם de modo idiomático.
- source_word: כָּל הַטּוֹב בְּעֵינֶיךָ עֲשֵׂה
  english_pob_choice: Do whatever seems good in your eyes
  chosen_spanish: Haz todo lo que bien te parezca
  alternatives_spanish:
  - Haz lo que te parezca bien
  - Haz todo lo que te parezca mejor
  lexicon: HALOT
  rationale: La fórmula hebrea expresa juicio/aprobación personal. «Bien te parezca» conserva el sentido idiomático de «parecer bueno» y suena natural en español bíblico contemporáneo.
- source_word: נִקְרְבָה הֲלֹם אֶל הָאֱלֹהִים
  english_pob_choice: Let us draw near here to God
  chosen_spanish: Acercuémonos aquí a Dios
  alternatives_spanish:
  - Lleguemos aquí ante Dios
  - Acérquémonos aquí a Dios
  lexicon: HALOT
  rationale: קרב se traduce normalmente como acercarse. «Acercuémonos» comunica la forma cohortativa y «a Dios» respeta el plural del sustantivo hebreo en esta construcción, sin convertirlo en una fórmula litúrgica más interpretativa.
theological_decisions:
- issue: Sentido de la propuesta del sacerdote al acercarse a Dios
  english_pob_reading: Render the priest's words as an invitation to approach God without specifying the exact ritual act.
  chosen_spanish_reading: Se mantiene una invitación a acercarse a Dios, sin precisar si se trata de consulta, oración u otro acto ritual.
  alternative_spanish_readings:
  - Acercámonos a Dios para consultarle aquí
  - Vayamos a consultar a Dios aquí
  rationale: El hebreo dice literalmente «acerquémonos aquí a Dios» y no usa el verbo específico para «consultar» o «inquirir». La traducción conserva esa reserva para no resolver por adelantado una tensión interpretativa que el texto no explicita.
  doctrine_reference: Preservar la tensión teológica y narrativa del texto sin sobreespecificar el medio de orientación divina.
translation_notes:
  revision_awareness: 'El texto inglés auditado pasó de «plunder among them» a «plunder them» por naturalidad; la versión española adopta una solución igualmente natural («los saquemos») sin perder el matiz de saqueo. También se conserva la cautela teológica del cierre: acercarse a Dios, no una formulación más específica como «consultar», ya que el hebreo no lo dice explícitamente.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים, conforme al estándar del proyecto.
  - Se usa «filisteos» en minúscula como nombre común étnico en español.
  - Se conserva el paralelismo con el hebreo sin introducir «SEÑOR» ni otras sustituciones no respaldadas por el texto fuente.
