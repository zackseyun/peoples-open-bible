base_translation:
  language: en
  yaml_path: translation/ot/leviticus/005/015.yaml
  text: 'If a person acts unfaithfully and sins unintentionally in regard to the holy things of Yahweh[a], he shall bring his guilt offering to Yahweh: an unblemished ram from the flock, according to your valuation in silver shekels, by the sanctuary shekel[b], for a guilt offering.'
  footnotes:
  - marker: a
    text: Or 'guilt offering' or 'reparation offering' for both occurrences of 'compensation offering.' The Hebrew term אָשָׁם can denote both the offense's liability and the sacrifice that makes restitution.
    reason: lexical_alternative
  - marker: b
    text: The 'sanctuary shekel' refers to the standard weight used for sacred valuations.
    reason: cultural_note
