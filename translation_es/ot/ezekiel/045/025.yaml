base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/045/025.yaml
  text: 'In the seventh month[a], on the fifteenth day of the month, at the feast, he shall do the same for seven days: as the sin offering, so the burnt offering, and the grain offering[b], and the oil.'
  footnotes:
