translation:
  language: es
  text: Ciertamente los justos darán gracias a tu nombre[a]; los rectos habitarán delante de tu rostro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «en tu presencia». Hebreo: «delante de tu rostro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Seguro
  - Sin duda
  - Ciertamente
  lexicon: HALOT
  rationale: La partícula tiene fuerza asseverativa en este cierre salmódico; «Ciertamente» comunica bien la seguridad enfática sin volverlo rígido ni exclusivista.
- source_word: צַדִּיקִים
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos
  - los justos hombres
  lexicon: HALOT
  rationale: En español bíblico «justos» es natural y conserva el valor moral/covenantal del plural sustantivado. «Rectos» quedaría mejor reservado para יְשָׁרִים, para no aplanar la distinción léxica.
- source_word: יוֹדוּ
  english_pob_choice: will give thanks
  chosen_spanish: darán gracias
  alternatives_spanish:
  - alabarán
  - confesarán
  - darán gracias
  lexicon: HALOT
  rationale: En contextos de salmo, ידה en hifil expresa agradecimiento. «Dar gracias» reproduce esa función en español con claridad y sin perder la dirección del acto verbal.
- source_word: לִשְׁמֶךָ
  english_pob_choice: to your name
  chosen_spanish: a tu nombre
  alternatives_spanish:
  - a tu nombre
  - por tu nombre
  - para tu nombre
  lexicon: HALOT
  rationale: El hebreo conserva la orientación hacia el nombre divino; «a tu nombre» mantiene esa dirección de gratitud mejor que una reformulación más libre.
- source_word: יֵשְׁבוּ
  english_pob_choice: will dwell
  chosen_spanish: habitarán
  alternatives_spanish:
  - morarán
  - vivirán
  - habitarán
  lexicon: HALOT
  rationale: «Habitarán» expresa permanencia estable y encaja con el tono poético mejor que «se sentarán». Mantiene el matiz de residencia/abiding.
- source_word: יְשָׁרִים
  english_pob_choice: the upright
  chosen_spanish: los rectos
  alternatives_spanish:
  - los rectos
  - los íntegros
  - los rectos de corazón
  lexicon: HALOT
  rationale: «Rectos» conserva el paralelismo con «justos» y refleja con transparencia el adjetivo plural sustantivado יְשָׁרִים.
- source_word: אֶת פָּנֶיךָ
  english_pob_choice: before your face
  chosen_spanish: delante de tu rostro
  alternatives_spanish:
  - en tu presencia
  - delante de tu rostro
  - ante ti
  lexicon: HALOT
  rationale: Se preserva la imagen concreta de «tu rostro» que el POB inglés retuvo con «your face». «Delante de» reproduce la relación espacial y mantiene la textura antropomórfica del hebreo.
theological_decisions:
- issue: Lenguaje antropomórfico para la presencia divina
  english_pob_reading: before your face
  chosen_spanish_reading: delante de tu rostro
  alternative_spanish_readings:
  - en tu presencia
  - ante ti
  rationale: El hebreo habla literalmente del «rostro» de Dios. Mantener esa imagen conserva la poesía y la teología de cercanía sin suavizarla prematuramente con una equivalencia abstracta.
  doctrine_reference: Principio de primacía del texto original; preservar la imaginería bíblica y la tensión teológica
translation_notes:
  revision_awareness: El contexto inglés muestra alta concordancia y ninguna revisión aplicada; esta versión sigue la lectura estable del POB inglés, preservando la imagen antropomórfica y la equivalencia dinámica moderada en español.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» para el nombre divino porque este versículo habla de «tu nombre» y no del tetragrámaton explícito.
  - Se mantuvo la distinción entre «justos» y «rectos» para reflejar שני adjetivos distintos en el hebreo.
  - «Delante de tu rostro» conserva la metáfora corporal hebrea; la nota ofrece la alternativa idiomática «en tu presencia».
