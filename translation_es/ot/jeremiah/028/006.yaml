translation:
  language: es
  text: 'Entonces Jeremías el profeta dijo[a]: «¡Amén! Que Yahvé haga así; que Yahvé cumpla tus palabras que has profetizado, para traer de vuelta los utensilios de la casa de Yahvé y a todos los exiliados de Babilonia a este lugar».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «confirme» o «establezca tus palabras». El verbo hebreo puede significar hacer que las palabras ‘se mantengan’, es decir, llevarlas a cabo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָמֵן
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Así sea
  - En verdad
  lexicon: HALOT
  rationale: Se conserva la forma interjectiva/litúrgica reconocible en español. Aquí expresa asentimiento y deseo, no una simple traducción explicativa.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - de la misma manera
  lexicon: HALOT
  rationale: 'Después de ‘Amén’, ‘así’ reproduce con naturalidad el valor correlativo: ‘Que Yahvé haga así.’'
- source_word: יַעֲשֶׂה
  english_pob_choice: may ... do
  chosen_spanish: haga
  alternatives_spanish:
  - hará
  - hace
  lexicon: HALOT
  rationale: El imperfecto hebreo funciona aquí con sentido volitivo/jusivo tras la exclamación inicial; en español el subjuntivo expresa mejor ese deseo o ruego.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrama: ‘Yahvé’, preservando el nombre divino del texto hebreo.'
- source_word: יָקֵם
  english_pob_choice: fulfill
  chosen_spanish: cumpla
  alternatives_spanish:
  - confirme
  - establezca
  - haga realidad
  lexicon: HALOT
  rationale: La forma causativa de קום expresa hacer que las palabras ‘se mantengan’ o se realicen. ‘Cumpla’ comunica de modo natural ese sentido idiomático en español.
- source_word: דְּבָרֶיךָ
  english_pob_choice: your words
  chosen_spanish: tus palabras
  alternatives_spanish:
  - tu mensaje
  - tus dichos
  lexicon: HALOT
  rationale: ‘Palabras’ conserva el plural concreto del hebreo y encaja con la referencia a la profecía pronunciada por Hananías.
- source_word: נִבֵּאתָ
  english_pob_choice: you have prophesied
  chosen_spanish: has profetizado
  alternatives_spanish:
  - profetizaste
  - has dicho profecía
  lexicon: HALOT
  rationale: El perfecto hebreo se refiere a una profecía ya emitida; el presente perfecto español vincula esa acción pasada con el momento del discurso de Jeremías.
- source_word: לְהָשִׁיב
  english_pob_choice: to bring back
  chosen_spanish: para traer de vuelta
  alternatives_spanish:
  - para restaurar
  - para devolver
  lexicon: HALOT
  rationale: '‘Traer de vuelta’ sirve para ambos objetos del infinitivo: los utensilios y los desterrados. Conserva el movimiento de retorno sin sobrecargar el texto con una explicación.'
- source_word: כְּלֵי בֵית יְהוָה
  english_pob_choice: the vessels of the house of Yahweh
  chosen_spanish: los utensilios de la casa de Yahvé
  alternatives_spanish:
  - los vasos de la casa de Yahvé
  - los objetos de la casa de Yahvé
  - los utensilios del templo
  lexicon: HALOT
  rationale: ‘Utensilios’ es una forma clara y amplia para כלי en este contexto de objetos del santuario. ‘Casa de Yahvé’ mantiene la designación hebrea y evita sustituirla por ‘templo’ sin necesidad.
- source_word: כָל־הַגּוֹלָה
  english_pob_choice: all the exiles
  chosen_spanish: todo el exilio
  alternatives_spanish:
  - todos los exiliados
  - toda la deportación
  - toda la comunidad desterrada
  lexicon: HALOT
  rationale: El singular colectivo hebreo puede expresarse en español con ‘todo el exilio’, que mantiene la idea corporativa y el matiz de conjunto desplazado.
- source_word: מִבָּבֶל
  english_pob_choice: from Babylon
  chosen_spanish: desde Babilonia
  alternatives_spanish:
  - de Babilonia
  - fuera de Babilonia
  lexicon: HALOT
  rationale: ‘Desde’ refleja bien el punto de origen del retorno y suena natural con ‘traer de vuelta’.
- source_word: אֶל־הַמָּקוֹם הַזֶּה
  english_pob_choice: to this place
  chosen_spanish: a este lugar
  alternatives_spanish:
  - a este sitio
  - hasta este lugar aquí
  lexicon: HALOT
  rationale: ‘Este lugar’ conserva la deixis del hebreo sin precisar más en la línea principal; el contexto narrativo identifica el sitio como Jerusalén.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se mantiene la política del proyecto de traducir el Tetragrama con el nombre propio divino, no con una sustitución reverencial. Eso preserva la transparencia textual y la identidad del nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: YHWH → Yahweh / Yahvé'
- issue: Fuerza verbal de la respuesta de Jeremías
  english_pob_reading: A sincere wish/prayer ('May the LORD do so ... may the LORD fulfill ...')
  chosen_spanish_reading: Un deseo/oración sincera ('Que Yahvé haga así ... que Yahvé cumpla ...')
  alternative_spanish_readings:
  - Una afirmación de futuro ('Yahvé hará así ... Yahvé cumplirá ...')
  - Una confirmación neutral del oráculo ajeno
  rationale: 'La secuencia ‘Amén’ + verbos en subjuntivo expresa mejor una respuesta volitiva. En español esto conserva la tensión narrativa: Jeremías desea que la profecía favorable se cumpla, sin convertirla en una certeza afirmada por él.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El texto sigue la revisión más reciente sin cambios sustantivos; se alineó con la lectura inglesa auditada que entiende la respuesta de Jeremías como un ruego volitivo, y se mantuvo la equivalencia óptima para ‘fulfill’ con ‘cumpla’.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ de forma consistente para יְהוָה.
  - Se conservó la diferencia entre ‘casa de Yahvé’ y ‘este lugar’ para no sobreespecificar el referente en la línea principal.
  - ‘Amén’ se mantuvo como interjección reconocible, coherente con el tono orante del versículo.
  - Se eligió ‘todo el exilio’ para reflejar el singular colectivo hebreo sin perder naturalidad en español.
