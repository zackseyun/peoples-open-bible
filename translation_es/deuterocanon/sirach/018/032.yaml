translation:
  language: es
  text: No te deleites ni en un poco[a] de placer[b], porque su fin es pobreza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en un mero fragmento de placer». El hebreo שֶׁמֶץ puede significar algo pequeño, un fragmento o un resto.'
    reason: lexical_alternative
  - marker: b
    text: 'La cláusula final hebrea es incierta. El texto de la Geniza de El Cairo se entiende literalmente de una manera difícil. El paralelo griego dice: «No te deleites en mucho lujo, ni te aferres a su gasto», lo cual apoya la idea de que la indulgencia termina en pérdida económica.'
    reason: textual_variant
lexical_decisions:
- source_word: אַל תִּשְׂמַח
  english_pob_choice: Do not delight
  chosen_spanish: No te deleites
  alternatives_spanish:
  - No te regocijes
  - No te alegres
  lexicon: HALOT
  rationale: El hebreo expresa aquí una prohibición de complacerse en algo; en español, «deleitarse» comunica mejor esa idea de placer buscado que «alegrarse», que suena más general y menos ajustado al contexto sapiencial.
- source_word: שֶׁמֶץ
  english_pob_choice: a mere scrap
  chosen_spanish: un simple[a]
  alternatives_spanish:
  - un poco
  - un fragmento
  - un resto
  lexicon: HALOT
  rationale: El término hebreo indica algo mínimo o apenas perceptible. En español, «un simple» conserva la pequeñez y la minimización del objeto del deleite, aunque requiere el apoyo de nota para reflejar la posibilidad de «un poco» o «un fragmento».
- source_word: תַּעֲנוּג
  english_pob_choice: pleasure
  chosen_spanish: placer
  alternatives_spanish:
  - deleite
  - gusto
  - indulgencia
  lexicon: HALOT
  rationale: «Placer» es una equivalencia natural y amplia para el sustantivo hebreo, sin estrecharlo indebidamente hacia lujo o indulgencia.
- source_word: אֲשֶׁר
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: La partícula relativa aquí introduce la razón de la advertencia. «Porque» hace explícita la relación causal en español de forma idiomática.
- source_word: פִּי
  english_pob_choice: end
  chosen_spanish: fin
  alternatives_spanish:
  - extremo
  - resultado
  - boca
  lexicon: HALOT
  rationale: En el hebreo difícil de esta línea, פִּי funciona idiomáticamente con sentido de desenlace o resultado. «Fin» transmite bien el valor sapiencial y mantiene una formulación clara en español.
- source_word: שְׂנַיִם
  english_pob_choice: poverty
  chosen_spanish: pobreza
  alternatives_spanish:
  - doble
  - dos
  - desamparo
  lexicon: HALOT
  rationale: La forma transmitida es difícil y la tradición textual es incierta. Dado el cierre del proverbio y el apoyo del paralelo griego sobre el costo de la indulgencia, «pobreza» expresa el desenlace negativo que el texto sugiere.
- source_word: רֵישׁוֹ
  english_pob_choice: poverty
  chosen_spanish: pobreza
  alternatives_spanish:
  - indigencia
  - miseria
  - necesidad
  lexicon: HALOT
  rationale: רֵישׁ sí designa pobreza o carencia. Mantener «pobreza» conserva la lectura del hebreo y también armoniza con el sentido general del griego, que advierte sobre el costo de la vida lujosa.
theological_decisions:
- issue: Tensión textual entre el hebreo transmitido y el paralelo griego sobre el objeto de la advertencia
  english_pob_reading: The Hebrew is difficult; the Greek reads 'Do not rejoice in much luxury, nor be bound to its expense,' which supports the sense that indulgence leads to financial loss.
  chosen_spanish_reading: No te deleites en un simple placer, porque su fin es pobreza.
  alternative_spanish_readings:
  - No te regocijes en mucho lujo, ni te aficiones a su gasto.
  - No te deleites en un poco de placer, porque acaba en pobreza.
  rationale: La forma hebrea conservada en la base del texto apunta a un placer mínimo, mientras que el griego paralelo amplía la advertencia hacia el lujo y el gasto. La traducción principal conserva el hebreo disponible y deja visible la dificultad con nota, sin borrar el testimonio griego.
  doctrine_reference: Crítica textual y teoría de la traducción bíblica; prudencia ante lecturas divergentes de testigos antiguos.
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés, incluida la nota de incertidumbre textual y la alternativa lexical para שֶׁמֶץ. No se introdujeron cambios de sentido doctrinal; la principal decisión fue mantener visible la tensión entre el hebreo difícil y el paralelo griego, con una redacción española natural y publicable.
  spanish_consistency_notes:
  - Se prefirió «pobreza» para mantener la fuerza sapiencial del final y alinear el verso con la advertencia económica del paralelo griego.
  - Se evitó «lujo» en el texto principal porque el hebreo base apunta más claramente a la pequeñez del placer, aunque la nota deja constancia del griego.
  - La estructura «No te deleites en...» sigue el valor prohibitivo del hebreo sin sonar arcaizante.
  - Los marcadores de nota están anclados en el texto principal para señalar tanto la posible lectura de pequeñez como la incertidumbre textual del cierre.
