review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura retórica del griego: τίς como pregunta retórica, διέβη πέραν τῆς θαλάσσης como cruce al otro lado del mar, εὗρεν αὐτήν / οἴσει αὐτὴν con pronombres femeninos por la sabiduría personificada, y χρυσίου ἐκλεκτοῦ como oro selecto/escogido. Sin embargo, la nota al pie actual no preserva correctamente la alternativa documentada en inglés, porque repite el femenino en vez de ofrecer la alternativa impersonal.'
  spanish_quality_summary: El texto es claro, digno y natural en español. «Ha cruzado más allá del mar» y «la ha hallado» son legibles y fieles. «Por oro escogido» es aceptable, aunque suena algo literal; aun así, mantiene bien la idea de precio/intercambio y no exige cambio. La corrección necesaria es menor y se limita a la nota al pie.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Se preserva correctamente la personificación femenina de la sabiduría con «la». El registro bíblico en español es adecuado.
  issues:
  - severity: medium
    issue: La nota al pie no expresa la alternativa léxica correcta
    rationale: La nota inglesa dice «Or 'found it ... bring it'» para señalar la alternativa impersonal frente al femenino personificado. La nota española actual («O ‘la ha hallado ... la traerá’») no ofrece ninguna alternativa real, porque repite la misma forma del texto principal.
  revised_spanish_text: ¿Quién ha cruzado más allá del mar y la ha hallado[a], y la traerá por oro escogido?
  revised_footnotes:
  - marker: a
    text: O ‘lo ha hallado ... lo traerá’; el griego usa pronombres femeninos porque la sabiduría es femenina gramaticalmente y está personificada en el contexto.
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal porque es fiel y natural. Solo se corrige la nota al pie para que preserve la alternativa impersonal documentada en el English POB y explique adecuadamente por qué el texto principal usa el femenino.
