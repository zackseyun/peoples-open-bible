translation:
  language: es
  text: Y todo el pueblo de la tierra se alegró, y la ciudad quedó en calma. Y mataron a Atalía con la espada en la casa del rey[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la mataron a espada en la casa del rey»; también puede entenderse «junto al palacio real». La frase hebrea es compacta, y la expresión final puede indicar la ubicación con un matiz ligeramente distinto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂמַח
  english_pob_choice: rejoiced
  chosen_spanish: se alegró
  alternatives_spanish:
  - se regocijó
  - se llenó de alegría
  lexicon: HALOT
  rationale: El verbo expresa alegría o gozo. «Se alegró» es natural en español y conserva el sentido celebrativo del hebreo sin endurecerlo con una formulación demasiado solemne.
- source_word: כָּל עַם הָאָרֶץ
  english_pob_choice: all the people of the land
  chosen_spanish: todo el pueblo de la tierra
  alternatives_spanish:
  - todo el pueblo del país
  - toda la población de la tierra
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula fija para la población; «pueblo de la tierra» conserva la estructura y el posible matiz sociopolítico mejor que una normalización interpretativa.
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  lexicon: HALOT
  rationale: Correspondencia directa y clara del sustantivo עיר.
- source_word: שָׁקָטָה
  english_pob_choice: was quiet
  chosen_spanish: quedó en calma
  alternatives_spanish:
  - estuvo quieta
  - quedó tranquila
  - descansó
  lexicon: HALOT
  rationale: El verbo comunica cese de disturbio y quietud. «Quedó en calma» expresa bien el resultado narrativo en español y evita una posible ambigüedad de «callada», que sería menos natural aquí.
- source_word: וְאֶת עֲתַלְיָהוּ
  english_pob_choice: And they put Athaliah to death
  chosen_spanish: Y mataron a Atalía
  alternatives_spanish:
  - Y dieron muerte a Atalía
  - Y la mataron
  lexicon: HALOT
  rationale: El hebreo presenta a Atalía como objeto directo con énfasis tópico leve. El español fluye de manera más natural con «Y mataron a Atalía», manteniendo el acto sin añadir una formalidad judicial que el contexto inmediato no exige explícitamente.
- source_word: הֵמִיתוּ
  english_pob_choice: they put her to death
  chosen_spanish: mataron
  alternatives_spanish:
  - dieron muerte
  - pusieron a muerte
  lexicon: HALOT
  rationale: El hiphil de מות implica causar la muerte. «Mataron» es la forma más directa y transparente en español; «dieron muerte» preserva más abiertamente el matiz causativo, pero suena algo más literaria.
- source_word: בַחֶרֶב
  english_pob_choice: with the sword
  chosen_spanish: con la espada
  alternatives_spanish:
  - por la espada
  - mediante la espada
  lexicon: HALOT
  rationale: La preposición instrumental se expresa con naturalidad en español con «con». «Espada» mantiene la imagen literal del hebreo.
- source_word: בֵּית מלך
  english_pob_choice: at the king’s house
  chosen_spanish: en la casa del rey
  alternatives_spanish:
  - en el palacio real
  - en la casa real
  lexicon: HALOT
  rationale: La expresión literal «casa del rey» respeta el hebreo sin imponer «palacio», que sería una equivalencia contextual posible pero más interpretativa. El valor locativo se expresa con «en».
theological_decisions:
- issue: El sintagma final puede leerse como ubicación ('en la casa del rey') o como una referencia más amplia al entorno del palacio ('at the king’s house').
  english_pob_reading: at the king’s house / at the royal palace
  chosen_spanish_reading: en la casa del rey
  alternative_spanish_readings:
  - en el palacio real
  - en la casa real
  rationale: El hebreo es compacto y permite una localización más literal. Se conserva «casa del rey» para no cerrar la ambigüedad espacial y porque la frase no obliga a expandirla a «palacio».
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés al evitar una topicalización marcada del nombre de Atalía y al mantener una formulación directa: «Y mataron a Atalía...». También conserva la alternativa locativa final como posibilidad de lectura en nota, dado el carácter compacto de la expresión hebrea.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general en el proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa «Atalía» con acentuación española habitual para el nombre propio.
  - Se prefiere el pretérito narrativo simple para toda la secuencia, en consonancia con el hebreo narrativo.
  - Se conserva el tono sobrio y directo del relato sin introducir explicaciones históricas ajenas al texto.
