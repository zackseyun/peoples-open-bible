translation:
  language: es
  text: Ahora bien, el resto de los hechos de Zacarías están escritos en el Libro de las Crónicas[a] de los reyes de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los anales de los reyes de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest of
  chosen_spanish: Ahora bien, el resto de
  alternatives_spanish:
  - Y el resto de
  - El resto de
  lexicon: HALOT
  rationale: יֶתֶר introduce la fórmula historiográfica de los resúmenes reales. «El resto de» comunica con fidelidad el remanente de la vida/reinado, y «Ahora bien» representa con naturalidad el valor discursivo de la conjunción inicial sin forzar un calco.
- source_word: דִּבְרֵי
  english_pob_choice: acts
  chosen_spanish: hechos
  alternatives_spanish:
  - actos
  - cosas
  - asuntos
  lexicon: HALOT
  rationale: En este contexto, דִּבְרֵי no se refiere a palabras literales sino a la trayectoria histórica del reinado. «Hechos» conserva ese sentido amplio de acciones o sucesos documentados, más natural en español que «palabras» o «asuntos».
- source_word: זְכַרְיָה
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zekarías
  lexicon: Conventional Spanish proper-name usage
  rationale: El nombre propio se adapta a la forma española usual «Zacarías», manteniendo identificación clara para la lectura eclesial.
- source_word: הִנָּם
  english_pob_choice: behold, they are
  chosen_spanish: está[n]
  alternatives_spanish:
  - he aquí, están
  - mira, están
  lexicon: HALOT
  rationale: La partícula deíctica hebrea expresa énfasis documental. En español, la fuerza se puede conservar sin un «he aquí» rígido; la referencia puede leerse como plural implícito («los hechos») y por eso se marca el plural en el verbo entre corchetes para reflejar el sujeto semántico.
- source_word: כְּתוּבִים
  english_pob_choice: written
  chosen_spanish: escritos
  alternatives_spanish:
  - registrados
  - anotados
  lexicon: HALOT
  rationale: El participio pasivo pide una forma pasiva/adjetival en español. «Escritos» es directo y transparente; «registrados» sería posible, pero desplaza un poco la imagen textual de estar escrito.
- source_word: עַל סֵפֶר
  english_pob_choice: in the Book
  chosen_spanish: en el Libro
  alternatives_spanish:
  - en el rollo
  - sobre el libro
  lexicon: HALOT
  rationale: Aunque el hebreo usa literalmente «sobre», la fórmula idiomática en español exige «en». Se conserva la referencia al soporte escrito sin introducir una imagen extraña.
- source_word: דִּבְרֵי הַיָּמִים
  english_pob_choice: the Chronicles
  chosen_spanish: las Crónicas
  alternatives_spanish:
  - los Anales
  - el libro de los hechos
  lexicon: HALOT
  rationale: Es un título convencional de fuente historiográfica. «Crónicas» reproduce bien el valor de una obra de registro histórico; «Anales» sería una alternativa válida, pero menos inmediata para lectores bíblicos en español.
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  english_pob_choice: of the Kings of Israel
  chosen_spanish: de los reyes de Israel
  alternatives_spanish:
  - para los reyes de Israel
  - perteneciente a los reyes de Israel
  lexicon: HALOT
  rationale: La relación constructa del título se expresa naturalmente con «de los reyes de Israel». Se evita sobretraducir la preposición לְ, que aquí forma parte de la designación del documento.
translation_notes:
  revision_awareness: 'El texto sigue de cerca la fórmula histórica del hebreo y la solución inglesa auditada: mantener el énfasis documental de הִנָּם, conservar el título de la fuente histórica y evitar una paráfrasis que borre la referencia archivística. La opción española se ajusta al orden natural del español sin perder el registro solemne.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparece el tetragrámaton; aquí no aplica.
  - Se usa «Crónicas» como título historiográfico, coherente con la decisión auditada en inglés.
  - No se introduce «Mesías» ni terminología cristológica, porque el versículo no lo requiere.
  - 'Se prioriza una equivalencia formal-optimal: fidelidad a la fórmula hebrea con español publicable.'
