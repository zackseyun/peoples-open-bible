  text: Then thirty of the thirty chief men went down and came at harvest time to David[a], to the cave of Adullam[c][b], while a band of the Philistines was camped in the Valley of Rephaim.
  footnotes:
  - marker: a
    text: Hebrew 'thirty from the thirty, chief'; the expression is difficult. It may mean 'thirty of the chief men' or refer more specifically to members of 'the Thirty,' David's elite warriors.
    reason: alternative_reading
