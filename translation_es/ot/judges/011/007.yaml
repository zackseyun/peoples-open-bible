  rationale: Se ajusta el tiempo verbal a «han venido» para reflejar mejor el hebreo en el contexto acusatorio, se reemplaza «en apuro» por «en angustia» para un registro más digno y neutral, y se afina el conector a «Entonces, ¿por qué...?» para expresar mejor la relación inferencial del original.
