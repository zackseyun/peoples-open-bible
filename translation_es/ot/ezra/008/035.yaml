translation:
  language: es
  text: 'Los que habían venido del cautiverio[a], los hijos del destierro, ofrecieron holocaustos al Dios de Israel: doce toros por todo Israel, noventa y seis carneros, setenta y siete corderos y doce machos cabríos como sacrificio por el pecado[c][b]. Todo ello fue ofrecido como holocausto a Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del destierro».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los hijos del destierro», un giro idiomático que se refiere a los exiliados retornados.'
    reason: cultural_note
  - marker: c
    text: 'Hebreo: «Todo ello fue holocausto para Yahvé». La redacción se conserva tal como está en la fuente, aunque el versículo también menciona machos cabríos como sacrificio por el pecado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבָּאִים
  english_pob_choice: Those who had come
  chosen_spanish: Los que habían venido
  alternatives_spanish:
  - los que venían
  - los que habían llegado
  lexicon: HALOT
  rationale: El participio sustantivado se refiere a un grupo ya arribado en el contexto narrativo; «habían venido» conserva bien el sentido de llegada anterior sin sonar forzado en español.
- source_word: מֵהַשְּׁבִי
  english_pob_choice: from the captivity
  chosen_spanish: del cautiverio
  alternatives_spanish:
  - del destierro
  - de la cautividad
  lexicon: HALOT
  rationale: שְׁבִי expresa la condición de estar bajo cautiverio. «Cautiverio» es claro y concreto en español, y permite distinguirlo de גּוֹלָה, que sigue como «destierro».
- source_word: בְנֵי הַגּוֹלָה
  english_pob_choice: the sons of the exile
  chosen_spanish: los hijos del destierro
  alternatives_spanish:
  - los hijos del exilio
  - los exiliados
  - los retornados del destierro
  lexicon: HALOT
  rationale: Se conserva el giro idiomático hebreo con «hijos de», y se traduce גּוֹלָה por «destierro» para mantener el matiz histórico de los retornados.
- source_word: הִקְרִיבוּ
  english_pob_choice: offered
  chosen_spanish: ofrecieron
  alternatives_spanish:
  - presentaron
  - trajeron
  lexicon: HALOT
  rationale: En contexto sacrificial, «ofrecieron» es el equivalente natural de הקריבו y comunica bien la acción cultual.
- source_word: עֹלוֹת
  english_pob_choice: burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas quemadas
  - ofrendas holocausto
  lexicon: HALOT
  rationale: Se opta por «holocaustos» como término sacrificial tradicional y preciso para עֹלוֹת. En español eclesial es comprensible y preserva el valor técnico del término.
- source_word: לֵאלֹהֵי יִשְׂרָאֵל
  english_pob_choice: to the God of Israel
  chosen_spanish: al Dios de Israel
  alternatives_spanish:
  - para el Dios de Israel
  lexicon: HALOT
  rationale: La preposición de dirección/recipiente en lenguaje sacrificial se expresa naturalmente con «al». «Dios» refleja fielmente אֱלֹהֵי.
- source_word: פָּרִים שְׁנֵים עָשָׂר עַל כָּל יִשְׂרָאֵל
  english_pob_choice: twelve bulls for all Israel
  chosen_spanish: doce becerros por todo Israel
  alternatives_spanish:
  - doce toros por todo Israel
  - doce becerros en representación de todo Israel
  lexicon: HALOT
  rationale: פָּרִים puede ser «toros» o «becerros» según el contexto; aquí, en una lista sacrificial, «becerros» evita sobreactualizar el tamaño. «Por todo Israel» conserva la fuerza representativa de עַל.
- source_word: אֵילִים תִּשְׁעִים וְשִׁשָּׁה
  english_pob_choice: ninety-six rams
  chosen_spanish: noventa y seis carneros
  alternatives_spanish:
  - noventa y seis machos oveja
  lexicon: HALOT
  rationale: «Carneros» es el equivalente español natural de אֵילִים en listas sacrificiales.
- source_word: כְּבָשִׂים שִׁבְעִים וְשִׁבְעָה
  english_pob_choice: seventy-seven lambs
  chosen_spanish: setenta y siete corderos
  alternatives_spanish:
  - setenta y siete ovejas
  lexicon: HALOT
  rationale: כְּבָשִׂים en este contexto sacrificial se expresa de manera natural como «corderos».
- source_word: צְפִירֵי חַטָּאת
  english_pob_choice: male goats as a sin offering
  chosen_spanish: doce machos cabríos como sacrificio por el pecado
  alternatives_spanish:
  - doce cabritos como sacrificio por el pecado
  - doce machos cabríos para ofrenda por el pecado
  lexicon: HALOT
  rationale: צְפִירִים son machos cabríos; se conserva la especificidad sexual del animal. חַטָּאת se vierte como «sacrificio por el pecado» para expresar claramente la categoría sacrificial en español.
- source_word: הַכֹּל עוֹלָה לַיהוָה
  english_pob_choice: All of it was a burnt offering to Yahweh
  chosen_spanish: Todo ello fue holocausto para Yahvé
  alternatives_spanish:
  - Todo ello fue holocausto para Yahvé.
  - Todo era holocausto para Yahvé
  lexicon: HALOT
  rationale: Se mantiene la fórmula resumidora sin suavizar la tensión textual entre la mención del sacrificio por el pecado y la afirmación final de holocausto. «Yahvé» sigue el criterio del proyecto para יהוה.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El texto hebreo usa directamente el Tetragrámaton; el proyecto pide «Yahvé» como forma principal en español para no ocultar el nombre propio del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Tensión entre los machos cabríos como sacrificio por el pecado y la afirmación final de que todo fue holocausto
  english_pob_reading: Preserve the Hebrew summary statement without smoothing it
  chosen_spanish_reading: Conservar la afirmación final sin armonizarla
  alternative_spanish_readings:
  - Interpretar la última cláusula solo de los animales anteriores de holocausto
  - Reescribir para evitar la tensión
  rationale: Se respeta la tensión del hebreo y no se corrige por paráfrasis. La versión española deja visible la formulación final tal como está en la fuente.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el paquete de auditoría; la concordancia del control cruzado es alta y la redacción se mantiene alineada con la fuente hebrea y la pauta inglesa auditada.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה, conforme al estándar del proyecto.
  - Se conserva el matiz sacrificial de עֹלה como «holocausto» y no se sustituye por un término más general.
  - Se mantiene la distinción entre «cautiverio» y «destierro» para reflejar שְׁבִי y גּוֹלָה.
  - Se preserva la tensión textual final sin resolverla en la traducción.
  - La lista numérica se presenta con equivalentes naturales en español, sin alterar las cantidades ni el orden.
