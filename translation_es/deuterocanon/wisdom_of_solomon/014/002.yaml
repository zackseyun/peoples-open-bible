translation:
  language: es
  text: Porque el deseo de ganancia[a] ideó eso, y la sabiduría habilidosa lo construyó;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el deseo de provecho lo ideó». El demostrativo griego probablemente se refiere al barco mencionado en el versículo anterior; por eso también puede traducirse «lo» en lugar de «eso».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκείνο
  english_pob_choice: that one
  chosen_spanish: lo
  alternatives_spanish:
  - eso
  - aquello
  - ese
  lexicon: LSJ
  rationale: El demostrativo neutro remite al objeto mencionado antes; en español, el clítico 'lo' permite referirlo sin forzar un sustantivo explícito que el griego no repite en este versículo.
- source_word: ὄρεξις
  english_pob_choice: desire
  chosen_spanish: deseo
  alternatives_spanish:
  - apetito
  - ansia
  - anhelo
  lexicon: LSJ
  rationale: '''Deseo'' conserva el sentido general de impulso o inclinación interior sin reducirlo a una sensación corporal más estrecha.'
- source_word: πορισμῶν
  english_pob_choice: for profit
  chosen_spanish: de ganancia
  alternatives_spanish:
  - de provecho
  - de lucro
  - de ganancia
  lexicon: LSJ
  rationale: El genitivo expresa la meta económica; 'ganancia' reproduce bien la idea de beneficio material y mantiene abierta la alternativa 'for gain' documentada en el audit trail.
- source_word: ἐπενόησεν
  english_pob_choice: devised
  chosen_spanish: lo ideó
  alternatives_spanish:
  - lo concibió
  - lo planeó
  - lo inventó
  lexicon: LSJ
  rationale: '''Ideó'' transmite el acto mental de concebir o tramar algo, en continuidad con ''devised'', sin añadir una tonalidad demasiado negativa o demasiado técnica.'
- source_word: τεχνῖτις
  english_pob_choice: skillful
  chosen_spanish: habilidosa
  alternatives_spanish:
  - artesana
  - técnica
  - perita
  lexicon: LSJ
  rationale: Aquí el adjetivo modifica a 'sabiduría' y aporta la idea de pericia artesanal; 'habilidosa' comunica esa cualidad de destreza de modo natural en español.
- source_word: σοφία
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - pericia
  - habilidad
  - entendimiento
  lexicon: LSJ
  rationale: Se conserva 'sabiduría' para mantener la identidad léxica de σοφία y su peso temático en el libro, mientras 'habilidosa' traslada la nota artesanal de τεχνῖτις.
- source_word: κατεσκεύασεν
  english_pob_choice: constructed
  chosen_spanish: lo construyó
  alternatives_spanish:
  - lo edificó
  - lo fabricó
  - lo hizo
  lexicon: LSJ
  rationale: '''Construyó'' es el equivalente más natural para el paso de concebir a realizar una obra; además empareja bien con el objeto retomado por ''lo''.'
theological_decisions:
- issue: Conservar la tensión entre 'sabiduría' teológica y pericia práctica en τεχνῖτις σοφία
  english_pob_reading: skillful wisdom
  chosen_spanish_reading: sabiduría habilidosa
  alternative_spanish_readings:
  - sabiduría perita
  - sabiduría artesanal
  - sabiduría experta
  rationale: El griego une σοφία con una cualidad técnica; 'sabiduría habilidosa' conserva la unión sin sustituir 'sabiduría' por un término meramente técnico. Así se mantiene tanto la resonancia sapiencial del libro como la aptitud artesanal del contexto.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'El texto sigue la lectura auditada que conserva el referente neutro del demostrativo y el matiz económico de πορισμῶν. Se ha evitado traducir de manera mecánica desde el inglés: el español reorganiza la oración para sonar natural, pero mantiene la relación entre deseo, concepción y construcción, así como la tensión entre sabiduría y habilidad técnica.'
  spanish_consistency_notes:
  - Se mantuvo 'sabiduría' para σοφία, en línea con el peso temático del libro.
  - Se evitó 'Señor' u այլ lenguaje de sustitución no presente en el griego.
  - '''Ganancia'' se eligió para preservar el sentido económico de πορισμῶν sin estrecharlo a ''lucro''.'
  - El clítico 'lo' en ambos verbos ayuda a reflejar el demostrativo neutro ἐκείνο sin sobretraducir el referente.
