    text: 'O: «si afilo mi espada relampagueante». El hebreo puede traducirse de forma más literal o más idiomática en varios puntos de la primera cláusula.'
    reason: lexical_alternative
  - marker: b
    text: «Juicio» también puede traducirse «justicia» aquí.
    reason: lexical_alternative
  - marker: c
    text: 'O: «tomaré venganza sobre mis adversarios». Literalmente: «devolveré venganza».'
    reason: lexical_alternative
  revision_rationale: Se mantiene la estructura y la imaginería del original, pero se corrige «recompensaré» por «les pagaré» para evitar una connotación positiva impropia y se añade la nota léxica que el POB inglés preserva para «devolveré venganza». También se simplifica la nota de «juicio/justicia» para mayor claridad en español.
