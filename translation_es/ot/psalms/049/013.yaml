base_translation:
  language: en
  yaml_path: translation/ot/psalms/049/013.yaml
  text: But man in honor does not remain[c][b][a]; he is like the beasts that perish.
  footnotes:
  - marker: a
    text: Or 'But humankind in honor does not remain.' The Hebrew אָדָם can denote 'man' or 'humankind'; the singular here is representative.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'does not lodge/spend the night.' The expression conveys not continuing or enduring in an honored state.
    reason: lexical_alternative
  - marker: c
    text: Or 'the beasts that are destroyed.' The final verb is traditionally understood here as referring to perishing.
    reason: alternative_reading
