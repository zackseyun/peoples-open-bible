translation:
  language: es
  text: Yo fortaleceré los brazos del rey de Babilonia[a], pero los brazos de Faraón caerán. Entonces sabrán que yo soy Yahvé[b], cuando ponga mi espada en la mano del rey de Babilonia y él la extenderá contra la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "y los brazos de Faraón fallarán". El hebreo dice literalmente "caerán", conservando la imagen de colapso militar.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo "el SEÑOR" representa el nombre divino YHWH.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַחֲזַקְתִּי
  english_pob_choice: I will strengthen
  chosen_spanish: fortaleceré
  alternatives_spanish:
  - haré fuerte
  - daré fuerza a
  lexicon: HALOT
  rationale: 'El hifil expresa acción causativa: YHWH hace fuertes los brazos del rey de Babilonia. ''Fortaleceré'' es natural en español y conserva la idea de dar vigor para la acción militar.'
- source_word: זְרֹעוֹת
  english_pob_choice: arms
  chosen_spanish: brazos
  alternatives_spanish:
  - brazos
  - fuerzas
  - poder
  lexicon: HALOT
  rationale: Se preserva la imagen corporal concreta del hebreo. 'Brazos' mantiene el paralelismo con el versículo y puede entenderse metafóricamente como poder militar.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: the king of Babylon
  chosen_spanish: el rey de Babilonia
  alternatives_spanish:
  - el rey de Babilonia
  lexicon: HALOT
  rationale: Corresponde de manera directa a la construcción nominal hebrea y conserva el referente histórico sin ampliación interpretativa.
- source_word: וּזְרֹעוֹת פַּרְעֹה תִּפֹּלְנָה
  english_pob_choice: but Pharaoh’s arms will fall
  chosen_spanish: pero los brazos de Faraón caerán
  alternatives_spanish:
  - y los brazos de Faraón caerán
  - pero los brazos de Faraón fallarán
  lexicon: HALOT
  rationale: '''Caerán'' reproduce el verbo נפל y preserva la imagen de colapso militar. Se usa ''pero'' por el contraste evidente con el fortalecimiento previo.'
- source_word: וְיָדְעוּ
  english_pob_choice: Then they will know
  chosen_spanish: Entonces sabrán
  alternatives_spanish:
  - y sabrán
  - así sabrán
  lexicon: HALOT
  rationale: La secuencia narrativa/resultativa se expresa naturalmente con 'Entonces'. 'Sabrán' mantiene el valor cognitivo y conclusivo del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino revelado en el texto hebreo, conforme al criterio del proyecto, en vez de sustituirlo por un título como 'el SEÑOR'.
- source_word: בְּתִתִּי חַרְבִּי בְּיַד מֶלֶךְ בָּבֶל
  english_pob_choice: when I put my sword into the hand of the king of Babylon
  chosen_spanish: cuando ponga mi espada en la mano del rey de Babilonia
  alternatives_spanish:
  - cuando entregue mi espada en la mano del rey de Babilonia
  - cuando ponga mi espada en manos del rey de Babilonia
  lexicon: HALOT
  rationale: '''Ponga'' reproduce de forma idiomática el valor de נתן (''dar/poner''). ''En la mano'' conserva la imagen de investidura e instrumentación divina.'
- source_word: חַרְבִּי
  english_pob_choice: my sword
  chosen_spanish: mi espada
  alternatives_spanish:
  - mi espada
  lexicon: HALOT
  rationale: Se mantiene el sustantivo literal, con su valor de instrumento de juicio en manos del rey de Babilonia.
- source_word: וְנָטָה אוֹתָהּ
  english_pob_choice: and he stretches it out
  chosen_spanish: y él la extienda
  alternatives_spanish:
  - y la extienda
  - y la alargue
  - y la empuñe
  lexicon: HALOT
  rationale: נטה sugiere extender/estirar. En español, 'extienda' conserva el gesto concreto sin perder fluidez. El pronombre retoma 'mi espada'.
- source_word: אֶל אֶרֶץ מִצְרָיִם
  english_pob_choice: against the land of Egypt
  chosen_spanish: contra la tierra de Egipto
  alternatives_spanish:
  - contra la tierra de Egipto
  - hacia la tierra de Egipto
  - sobre la tierra de Egipto
  lexicon: HALOT
  rationale: Aunque אֶל puede ser simplemente 'a/hacia', el contexto bélico demanda una dirección hostil. 'Contra' hace explícita esa fuerza sin alterar el sentido.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: Se conserva el nombre propio del Dios de Israel en lugar de un sustituto litúrgico, siguiendo la línea del POB y la evidencia hebrea directa.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Agencia divina y humana en el juicio
  english_pob_reading: YHWH's sword is placed in Babylon's hand, with Babylon acting as the instrument of divine judgment
  chosen_spanish_reading: YHWH entrega su espada al rey de Babilonia para que la extienda contra Egipto
  alternative_spanish_readings:
  - una formulación más general que solo diga que Babilonia vence a Egipto
  - una formulación que diluya la acción divina directa
  rationale: La redacción mantiene explícita la soberanía de Yahvé y, al mismo tiempo, la instrumentalidad del rey de Babilonia como agente histórico del juicio.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: 'Revisado contra el texto hebreo WLC y el audit trail inglés: no hubo cambios aplicados en la última pasada y el cotejo cruzado reporta acuerdo alto. La versión española conserva la imagen corporal de ''brazos'', el verbo ''caerán'' para נפל, el nombre divino Yahvé, y la estructura instrumental de la espada puesta en la mano del rey de Babilonia.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יְהוָה.
  - Se conserva la imagen concreta 'brazos' en vez de abstraer a 'poder', siguiendo el paralelo del versículo.
  - '''Contra la tierra de Egipto'' expresa la orientación hostil implícita en el contexto bélico.'
  - La puntuación y el orden de cláusulas buscan fluidez española sin borrar la secuencia resultativa del hebreo.
