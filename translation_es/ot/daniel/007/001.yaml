translation:
  language: es
  text: En el primer año de Belsasar, rey de Babilonia, Daniel vio un sueño y visiones en su cabeza[a], estando en su cama. Entonces escribió el sueño y expuso la suma del asunto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «visiones de su cabeza». El arameo emplea un giro idiomático para referirse a visiones interiores asociadas con el sueño.
    reason: lexical_alternative
  - marker: b
    text: O, más literalmente, «Entonces escribió el sueño; dijo la cabeza de las palabras». El modismo arameo probablemente significa que registró los puntos principales o el resumen del asunto.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּשְׁנַת חֲדָה
  english_pob_choice: In the first year
  chosen_spanish: En el primer año
  alternatives_spanish:
  - En año uno
  - En el año primero
  lexicon: HALOT
  rationale: La fórmula aramea de datación funciona idiomáticamente como ordinal; en español, «en el primer año» es natural y fiel.
- source_word: לְבֵלְאשַׁצַּר
  english_pob_choice: of Belshazzar
  chosen_spanish: de Belsasar
  alternatives_spanish:
  - perteneciente a Belsasar
  lexicon: HALOT
  rationale: La preposición marca la referencia de reinado; «de Belsasar» expresa la datación sin forzar una glosa.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: king of Babylon
  chosen_spanish: rey de Babilonia
  alternatives_spanish:
  - el rey de Babilonia
  lexicon: HALOT
  rationale: La cadena constructa identifica el oficio real; la forma española estándar es clara y precisa.
- source_word: חֵלֶם חֲזָה
  english_pob_choice: saw a dream
  chosen_spanish: vio un sueño
  alternatives_spanish:
  - tuvo un sueño
  - contempló un sueño
  lexicon: HALOT
  rationale: «Vio» conserva la fuerza visionaria del arameo; «tuvo» suaviza demasiado el matiz y pierde la imagen perceptiva.
- source_word: וְחֶזְוֵי רֵאשֵׁהּ
  english_pob_choice: visions of his head
  chosen_spanish: visiones de su cabeza
  alternatives_spanish:
  - visiones de su mente
  - visiones en su cabeza
  lexicon: HALOT
  rationale: El giro es idiomático y algo duro en español; se conserva la literalidad básica con «de su cabeza», sin reinterpretarlo prematuramente como «mente».
- source_word: עַל מִשְׁכְּבֵהּ
  english_pob_choice: while on his bed
  chosen_spanish: mientras estaba en su cama
  alternatives_spanish:
  - sobre su cama
  - mientras yacía en su cama
  lexicon: HALOT
  rationale: Se expresa la ubicación de manera natural en español, manteniendo el marco del sueño sin añadir elementos no explícitos.
- source_word: בֵּאדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - En ese momento
  - Luego
  lexicon: HALOT
  rationale: Marcador narrativo temporal estándar, fiel y natural.
- source_word: חֶלְמָא כְתַב
  english_pob_choice: he wrote down the dream
  chosen_spanish: escribió el sueño
  alternatives_spanish:
  - anotó el sueño
  - escribió el sueño en un registro
  lexicon: HALOT
  rationale: El verbo arameo es simplemente «escribió»; en español, el complemento directo basta sin añadir «abajo» de forma innecesaria.
- source_word: רֵאשׁ מִלִּין
  english_pob_choice: the sum of the matter
  chosen_spanish: el resumen de las palabras
  alternatives_spanish:
  - la cabeza de las palabras
  - la sustancia del asunto
  lexicon: HALOT
  rationale: Se mantiene la idiomática semítica subyacente sin traducirla mecánicamente como «cabeza»; «resumen» comunica el sentido de principal contenido o sumario.
- source_word: אֲמַר
  english_pob_choice: he told
  chosen_spanish: dijo
  alternatives_spanish:
  - contó
  - habló
  lexicon: HALOT
  rationale: El verbo básico «decir» es el más directo aquí; en español, «dijo el resumen» conserva mejor el paralelismo con el hebreo/arameo que «contó».
theological_decisions:
- issue: La expresión idiomática final רֵאשׁ מִלִּין
  english_pob_reading: the sum of the matter
  chosen_spanish_reading: el resumen de las palabras
  alternative_spanish_readings:
  - la cabeza de las palabras
  - la sustancia del asunto
  rationale: No se normaliza la frase a una versión tradicional que borre la tensión semítica. Se conserva la idea de sumario o contenido principal, que es la lectura reflejada por la revisión inglesa más reciente.
  doctrine_reference: Ninguna; decisión lexical/idiomática.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente afinó dos puntos: cambió una formulación más interpretativa por «visions of his head» y sustituyó una paráfrasis de «head of the words» por «the sum of the matter». Esta versión española sigue esa revisión: conserva la literalidad base en la primera expresión y traduce el final como resumen/suma del contenido, sin borrar el giro idiomático.'
  spanish_consistency_notes:
  - Se usa «Belsasar» como forma española estándar del nombre propio, consistente con la tradición bíblica en español y con la transliteración del source.
  - Se preserva «Dios»/«Yahvé» no aplica aquí; no hay términos teológicos que requieran normalización doctrinal.
  - «Sueño» y «visiones» se mantienen separados para respetar la duplicidad del arameo.
  - La frase final queda suficientemente literal para el texto base, pero legible para publicación en español contemporáneo.
