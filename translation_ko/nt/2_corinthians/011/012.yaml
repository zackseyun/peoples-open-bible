  text: Ὃ δὲ ποιῶ καὶ ποιήσω, ἵνα ἐκκόψω τὴν ἀφορμὴν τῶν θελόντων ἀφορμήν, ἵνα ἐν ᾧ καυχῶνται εὑρεθῶσιν καθὼς καὶ ἡμεῖς.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/011/012.yaml
  text: But what I am doing[a], I will continue to do, in order to cut off the opportunity from those who want an opportunity, so that in what they boast about they may be found to be just as we are.
translation:
  language: ko
  text: 그러나 내가 하는 일은 계속할 것입니다. 이는 기회를 노리는 자들의 기회를 끊어 버리고, 그들이 자랑하는 그 일에서도 우리와 같이 평가받게 하려는 것입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀφορμήν
  english_pob_choice: opportunity
  chosen_korean: 기회
  lexicon: BDAG
  rationale: 군사·법정 어휘로 「출발점, 빌미」. 「기회」가 한국어에서 자연스럽다.
  alternatives_korean:
  - 빌미
  - 계기
- source_word: ἐκκόψω
  english_pob_choice: cut off
  chosen_korean: 끊어 버리고
  lexicon: BDAG
  rationale: 강조형 「잘라내다」. 분명한 어조 유지.
- source_word: εὑρεθῶσιν
  english_pob_choice: be found
  chosen_korean: 평가받게
  lexicon: BDAG
  rationale: 수동 가정법. 「평가받다」가 본문 의도를 살린다.
  alternatives_korean:
  - 발견되도록
