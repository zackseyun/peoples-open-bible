translation:
  language: es
  text: Entonces entraron los magos, encantadores, caldeos[a] y adivinos, y yo conté el sueño delante de ellos, pero no me dieron a conocer su interpretación[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Caldeos» puede referirse aquí no solo a un grupo étnico, sino también a una clase de expertos de la corte babilónica.
    reason: cultural_note
  - marker: b
    text: 'O: «no podían darme a conocer su interpretación». El arameo dice directamente que no me la dieron a conocer; la incapacidad es una inferencia contextual reflejada en algunas traducciones.'
    reason: alternative_reading
lexical_decisions:
- source_word: בֵּאדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  - Al punto
  lexicon: HALOT
  rationale: Marca discursiva narrativa que introduce la acción siguiente. «Entonces» es natural en español y conserva la secuencia temporal sin añadir matiz no presente en el arameo.
- source_word: עללין
  english_pob_choice: came in
  chosen_spanish: entraron
  alternatives_spanish:
  - vinieron
  - ingresaron
  - se presentaron
  lexicon: HALOT
  rationale: El verbo plural indica entrada/presentación ante el rey. «Entraron» reproduce bien el movimiento y suena natural en un contexto cortesano.
- source_word: חַרְטֻמַיָּא
  english_pob_choice: magicians
  chosen_spanish: magos
  alternatives_spanish:
  - magos sabios
  - hechiceros
  - magos de la corte
  lexicon: HALOT
  rationale: En español, «magos» comunica el grupo de expertos en artes ocultas sin introducir una connotación moderna de espectáculo. Mantiene la fuerza léxica tradicional del término en este listado técnico.
- source_word: אָשְׁפַיָּא
  english_pob_choice: enchanters
  chosen_spanish: encantadores
  alternatives_spanish:
  - hechiceros
  - conjuradores
  - adivinos
  lexicon: HALOT
  rationale: Distingue este grupo del anterior y conserva el matiz de práctica manticia/oculta. «Encantadores» es claro en español y evita fusionar indebidamente dos categorías del texto.
- source_word: כַּשְׂדָּיָא
  english_pob_choice: Chaldeans
  chosen_spanish: caldeos
  alternatives_spanish:
  - caldeos de la corte
  - chaldeos
  - sabios caldeos
  lexicon: HALOT
  rationale: Se conserva el etnónimo/denominación técnica del texto. «Caldeos» es la forma natural en español y permite que el lector perciba el término como grupo especializado dentro de la lista.
- source_word: גָזְרַיָּא
  english_pob_choice: diviners
  chosen_spanish: adivinos
  alternatives_spanish:
  - adivinadores
  - soñadores
  - pronosticadores
  lexicon: HALOT
  rationale: Refleja el grupo de intérpretes por medios adivinatorios. «Adivinos» es breve, establecido y suficientemente preciso para la función del término en la enumeración.
- source_word: חֶלְמָא
  english_pob_choice: the dream
  chosen_spanish: el sueño
  alternatives_spanish:
  - el sueño aquel
  - un sueño
  lexicon: HALOT
  rationale: El estado enfático lo hace específico en contexto; en español, «el sueño» transmite esa referencia concreta al sueño ya introducido en la narración.
- source_word: אָמַר אֲנָה קֳדָמֵיהוֹן
  english_pob_choice: I told the dream before them
  chosen_spanish: yo conté el sueño delante de ellos
  alternatives_spanish:
  - relaté el sueño en su presencia
  - les conté el sueño
  - hablé del sueño delante de ellos
  lexicon: HALOT
  rationale: «Conté» conserva el valor de narrar/relatar y se ajusta a un relato de visión onírica. «Delante de ellos» mantiene la escena pública y refleja mejor el arameo que reducirlo a «les».
- source_word: וּפִשְׁרֵהּ
  english_pob_choice: its interpretation
  chosen_spanish: su interpretación
  alternatives_spanish:
  - su significado
  - la interpretación de él
  lexicon: HALOT
  rationale: En Daniel, פשר remite técnicamente a la interpretación de sueños o enigmas. «Interpretación» preserva ese sentido especializado mejor que una paráfrasis más amplia.
- source_word: לָא מְהוֹדְעִין לִי
  english_pob_choice: they did not make its interpretation known to me
  chosen_spanish: no me dieron a conocer su interpretación
  alternatives_spanish:
  - no me hicieron saber su interpretación
  - no me comunicaron su interpretación
  - no pudieron darme a conocer su interpretación
  lexicon: HALOT
  rationale: La construcción causativa expresa hacer saber/informar. «No me dieron a conocer» refleja el carácter directo de la negación sin añadir la idea de incapacidad, que en el arameo queda solo como inferencia contextual.
theological_decisions:
- issue: Si traducir el final como incapacidad o como simple falta de comunicación
  english_pob_reading: simple non-disclosure/failure to make known
  chosen_spanish_reading: 'simple falta de comunicación: no me dieron a conocer su interpretación'
  alternative_spanish_readings:
  - no pudieron darme a conocer su interpretación
  - no eran capaces de darme a conocer su interpretación
  rationale: El arameo niega la acción de hacer saber; no afirma explícitamente incapacidad. Por eso se conserva la restricción del texto y se deja la incapacidad solo como implicación posible del contexto narrativo.
  doctrine_reference: Primacía del texto original; no resolver una tensión léxica con una inferencia que el verso no formula explícitamente.
translation_notes:
  revision_awareness: La revisión más reciente no requirió cambios; el cotejo indicó alto acuerdo y la lectura se mantiene estable respecto del audit trail en inglés.
  spanish_consistency_notes:
  - Se conservó la secuencia de cuatro grupos profesionales del texto arameo sin fusionarlos.
  - Se mantuvo «interpretación» para פשר, en línea con el uso técnico de Daniel.
  - Se evitó introducir «no pudieron», porque el arameo no expresa incapacidad de manera explícita.
  - La nota sobre los caldeos se integró implícitamente en la elección «caldeos», suficiente para un texto de publicación breve.
