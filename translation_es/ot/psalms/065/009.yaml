    reason: lexical_alternative
  revision_rationale: Se cambió «tiemblan» por «temen» para conservar mejor el rango semántico de ירא sin añadir una imagen corporal no exigida por el texto. Se corrigió la nota [b] para reflejar fielmente que el literal corresponde a מוֹצָאֵי בֹקֶר וָעֶרֶב, no a «tus salidas». Se mantuvo el resto porque transmite bien el sentido poético y es natural en español.
