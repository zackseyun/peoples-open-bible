revisions:
- from: El sacerdote saldrá[a] a un lugar fuera del campamento, y el sacerdote lo examinará; y he aquí, la llaga[b] de la lepra ha sanado en el que tenía la afección de la piel[c].
  to: El sacerdote saldrá a un lugar fuera del campamento, y el sacerdote lo examinará; y he aquí, la afección[a] de lepra ha sanado en la persona con la enfermedad de la piel[b].
  rationale: Se reemplazó 'llaga' por 'afección' para no estrechar indebidamente el sentido de נֶגַע, se eliminó la nota innecesaria sobre 'saldrá', y se revisó 'el que tenía la afección de la piel' a 'la persona con la enfermedad de la piel' para evitar un pasado interpretativo no expresado en el hebreo y alinear mejor la terminología con la rationale documentada del POB.
  reviewer_model: gpt-5.4
