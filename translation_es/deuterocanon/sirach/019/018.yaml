translation:
  language: es
  text: Y el conocimiento del mal no es sabiduría[a], y donde está el consejo de los pecadores, no hay entendimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no hay sabiduría en la pericia para hacer el mal». El griego contrapone σοφία («sabiduría»), ἐπιστήμη («conocimiento») y φρόνησις («entendimiento/prudencia»).'
    reason: lexical_alternative
lexical_decisions:
- source_word: σοφία
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - conocimiento
  - destreza
  - perspicacia
  lexicon: LSJ
  rationale: En literatura sapiencial, σοφία conserva su valor moral e intelectual general; 'sabiduría' es el equivalente natural en español y mantiene el contraste con ἐπιστήμη y φρόνησις.
- source_word: πονηρίας
  english_pob_choice: of evil
  chosen_spanish: del mal
  alternatives_spanish:
  - de maldad
  - de perversidad
  - de la malicia
  lexicon: LSJ
  rationale: El genitivo modifica a ἐπιστήμη y expresa la esfera moral del saber; 'del mal' es amplio, natural y fiel al contraste ético del verso.
- source_word: ἐπιστήμη
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - saber
  - pericia
  - experticia
  lexicon: LSJ
  rationale: '''Conocimiento'' preserva la distinción léxica frente a σοφία y φρόνησις, y evita cargar la frase con una idea de mera habilidad técnica que el contexto no exige.'
- source_word: βουλή
  english_pob_choice: counsel
  chosen_spanish: consejo
  alternatives_spanish:
  - plan
  - propósito
  - deliberación
  lexicon: LSJ
  rationale: En un contexto sapiencial, βουλή remite a una orientación deliberada o consejo; 'consejo' comunica bien esa idea sin perder el matiz moral del pasaje.
- source_word: ἁμαρτωλῶν
  english_pob_choice: sinners’
  chosen_spanish: de los pecadores
  alternatives_spanish:
  - de los pecadores
  - de los impíos
  - de los culpables
  lexicon: LSJ
  rationale: '''Pecadores'' reproduce la categoría moral bíblica habitual y mantiene el genitivo posesivo del griego en un español claro.'
- source_word: φρόνησις
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - prudencia
  - discernimiento
  - buen juicio
  lexicon: LSJ
  rationale: Aquí φρόνησις designa juicio práctico o sensatez moral; 'entendimiento' es la opción más natural y evita sobrecargar el verso con un tecnicismo.
- source_word: οὐκ ἔστιν ὅπου
  english_pob_choice: where ... is, there is no
  chosen_spanish: donde está ... , no hay
  alternatives_spanish:
  - donde ... hay, no existe
  - en donde ... , no hay
  - no hay lugar donde
  lexicon: LSJ
  rationale: 'La construcción locativa se conserva de manera idiomática en español: ''donde está ... , no hay ...'', reflejando el paralelismo enfático del griego.'
theological_decisions:
- issue: Fuerza de la negación sobre el saber moralmente desviado
  english_pob_reading: The verse denies that knowledge directed toward evil counts as wisdom, and denies that sinners' counsel constitutes true understanding.
  chosen_spanish_reading: El verso niega que el conocimiento orientado al mal sea sabiduría, y niega que el consejo de los pecadores constituya verdadero entendimiento.
  alternative_spanish_readings:
  - El verso solo distinguiría entre saber malo y sabiduría, sin negarlos totalmente.
  - El verso podría sonar como si el problema fuera solo la falta de prudencia, no una negación moral más fuerte.
  rationale: El doble οὐκ ἔστιν expresa una negación fuerte en ambos miembros. La formulación española mantiene esa fuerza sin suavizarla ni introducir categorías doctrinales ajenas al texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente que reordenó el primer miembro para reflejar más directamente el griego: ''el conocimiento de mal no es sabiduría''. En español se conserva ese orden lógico como ''el conocimiento del mal no es sabiduría'', y se mantiene la estructura locativa explícita del segundo miembro.'
  spanish_consistency_notes:
  - Se mantiene 'sabiduría' para σοφία y 'entendimiento' para φρόνησις, evitando colapsar ambas ideas.
  - '''Conocimiento'' traduce ἐπιστήμη y conserva la distinción léxica frente a σοφία.'
  - '''Consejo'' reproduce βουλή con el tono deliberativo del pasaje.'
  - La negación doble se preserva sin intensificarla artificialmente ni suavizarla.
  - Se usa una puntuación fluida y publicable en español moderno, respetando el paralelismo del verso.
