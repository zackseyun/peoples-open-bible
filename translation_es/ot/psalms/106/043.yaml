translation:
  language: es
  text: Muchas veces los libró, pero se rebelaron en sus planes[a] y fueron abatidos[b] por su iniquidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en su consejo» o «en su propósito». El hebreo puede enfatizar tanto su acción rebelde como su disposición rebelde, y עֵצָה puede significar «consejo», «plan» o «propósito».
    reason: lexical_alternative
  - marker: b
    text: O «se hundieron» o «se consumieron por su iniquidad». El verbo hebreo puede denotar ser abatidos, derrumbarse o consumirse.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּעָמִים רַבּוֹת
  english_pob_choice: Many times
  chosen_spanish: Muchas veces
  alternatives_spanish:
  - A menudo
  - Repetidas veces
  lexicon: HALOT
  rationale: La expresión hebrea indica numerosas ocasiones. «Muchas veces» es natural en español y conserva la idea de repetición frecuente sin añadir matices ajenos.
- source_word: יַצִּילֵם
  english_pob_choice: he delivered them
  chosen_spanish: los libró
  alternatives_spanish:
  - los rescató
  - los salvó
  lexicon: HALOT
  rationale: נצל en hiphil expresa sacar de peligro, rescatar o librar. «Libró» comunica bien la acción repetida de liberación divina y evita cargar el verbo con matices soteriológicos más amplios que «salvó».
- source_word: וְהֵמָּה
  english_pob_choice: but they
  chosen_spanish: pero
  alternatives_spanish:
  - y
  - sin embargo
  lexicon: HALOT
  rationale: El pronombre independiente introduce contraste enfático. En español, «pero» transmite con naturalidad la oposición entre la acción de Yahvé y la respuesta del pueblo.
- source_word: יַמְרוּ
  english_pob_choice: rebelled
  chosen_spanish: se rebelaron
  alternatives_spanish:
  - fueron rebeldes
  - se mostraron rebeldes
  lexicon: HALOT
  rationale: מָרָה expresa rebeldía activa. «Se rebelaron» refleja mejor el valor verbal que una forma adjetival, y mantiene el paralelismo poético.
- source_word: בַעֲצָתָם
  english_pob_choice: in their counsel
  chosen_spanish: en su consejo
  alternatives_spanish:
  - en su plan
  - según su consejo
  - en su propósito
  lexicon: HALOT
  rationale: 'עֵצָה puede significar consejo, plan o propósito. «En su consejo» conserva la ambigüedad del hebreo: puede referirse tanto a su decisión como a su deliberación o designio.'
- source_word: וַיָּמֹכּוּ
  english_pob_choice: were brought low
  chosen_spanish: fueron humillados
  alternatives_spanish:
  - se abatieron
  - cayeron
  - fueron rebajados
  lexicon: HALOT
  rationale: מוך denota volverse bajo, hundirse o quedar reducido. «Fueron humillados» expresa el resultado de su caída en un español fluido, aunque también deja abierta la idea de abatimiento o hundimiento, como en la nota inglesa.
- source_word: בַּעֲוֺנָם
  english_pob_choice: by their iniquity
  chosen_spanish: por su iniquidad
  alternatives_spanish:
  - en su iniquidad
  - a causa de su culpa
  - por su pecado
  lexicon: HALOT
  rationale: עָוֹן puede significar iniquidad, culpa o la carga del pecado. «Iniquidad» conserva el peso moral del término bíblico, y «por» expresa bien la relación causal o instrumental del hebreo.
theological_decisions:
- issue: Sujeto implícito de la liberación
  english_pob_reading: The subject 'he' is left implicit and understood from context as God/the LORD.
  chosen_spanish_reading: El sujeto queda implícito en «los libró», entendido por el contexto como Yahvé.
  alternative_spanish_readings:
  - Yahvé los libró
  - Él los libró
  rationale: El hebreo no repite el nombre divino en este verso. El español puede mantener esa economía verbal sin perder claridad, porque el contexto del salmo identifica al agente como Yahvé.
  doctrine_reference: Primacía del original; economía textual
- issue: Conservar la gravedad de עָוֹן
  english_pob_reading: Rendered 'iniquity' rather than a softer term.
  chosen_spanish_reading: «Iniquidad» se mantiene como término moral fuerte.
  alternative_spanish_readings:
  - culpa
  - maldad
  - pecado
  rationale: «Iniquidad» preserva la densidad ética y teológica del hebreo sin suavizarla. Otras opciones serían más generales o perderían el matiz de perversidad/carga moral.
  doctrine_reference: Preservar la tensión lexical y teológica
translation_notes:
  revision_awareness: 'La redacción sigue el consenso alto del auditorio inglés: se conserva la secuencia de tres miembros, el contraste adversativo, y la ambigüedad controlada de עֵצָה y עָוֹן. Se adopta una equivalencia óptima para español, evitando calcos rígidos y manteniendo la fuerza verbal de «rebelaron».'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el sujeto divino conforme al estándar del proyecto.
  - «Libró» se mantiene como verbo de rescate/deliverance, evitando «salvó» por su posible carga soteriológica ampliada.
  - «Consejo» conserva la polisemia de עֵצָה sin fijarla solo en «plan».
  - «Iniquidad» se conserva como término técnico-moral fuerte y no se sustituye por «pecado» en el cuerpo principal.
