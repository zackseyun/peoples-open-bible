  - severity: medium
    issue: La nota [a] en español documenta una alternativa para בְּהִנָּבְאֹתוֹ que no es la alternativa principal preservada por el audit trail inglés.
    rationale: El rastro inglés ancla notas en 'when he prophesies' y 'in order to deceive', pero la nota realmente sustantiva es la de כַּחֵשׁ ('in order to lie'). La nota española actual sobre 'mientras profetice' desplaza la atención a una variación menor no preservada como nota en el inglés.
  - severity: medium
    issue: Falta una nota para 'para engañar' que preserve la alternativa 'para mentir'.
    rationale: El inglés documenta explícitamente que כחש puede significar falsedad/mentira o engaño. Esa alternativa significativa debe mantenerse también en español.
  - severity: low
    issue: La distribución de marcadores no coincide con los puntos léxicos más importantes del texto.
    rationale: 'Conviene reubicar [a] en ''profetice'' para la alternativa temporal/idiomática de ''al profetizar'' si se desea conservarla, y [b] en ''manto de pelo'' o en ''engañar'' según el contenido; mejor aún, usar dos notas: una para el manto y otra para ''engañar''.'
