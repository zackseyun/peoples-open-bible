  to: entonces yo mismo pondré mi rostro contra ese hombre y contra su familia, y lo cortaré a él y a todos los que se prostituyen tras él[a], prostituyéndose tras Moloc, de entre su gente[b].
  rationale: Se corrige la ubicación de la nota léxica para que ancle en la cláusula de זנה, donde corresponde según la evidencia y el POB inglés. Se ajusta la frase final a 'de entre su gente' para reflejar mejor el plural hebreo sin forzar un español torpe. Se conserva 'lo cortaré' en el texto principal para mantener el tecnicismo de כרת, mientras la nota aclara su fuerza sin sobreinterpretar el mecanismo. No se requiere adjudicación adicional.
