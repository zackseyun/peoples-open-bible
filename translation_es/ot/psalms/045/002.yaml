  text: רָ֘חַ֤שׁ לִבִּ֨/י דָּ֘בָ֤ר ט֗וֹב אֹמֵ֣ר אָ֭נִי מַעֲשַׂ֣/י לְ/מֶ֑לֶךְ לְ֝שׁוֹנִ֗/י עֵ֤ט סוֹפֵ֬ר מָהִֽיר׀׀׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/045/002.yaml
  text: My heart overflows with a good word[a]; I say[c][b], “My work is for the king.” My tongue is the pen of a skillful scribe.
  footnotes:
  - marker: a
    text: Or “a pleasing theme” or “a noble matter.” The Hebrew phrase can refer either to the words themselves or to the subject matter being expressed.
    reason: lexical_alternative
  - marker: b
    text: Or “concerning the king” or “to the king.” The preposition may indicate dedication, subject matter, or address.
    reason: lexical_alternative
  - marker: c
    text: Or “the pen of a ready scribe.” The Hebrew adjective may emphasize quickness/readiness as well as practiced skill.
    reason: lexical_alternative
