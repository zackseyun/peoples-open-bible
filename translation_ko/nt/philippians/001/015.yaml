id: PHP.1.15
reference: Philippians 1:15
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Τινὲς μὲν καὶ διὰ φθόνον καὶ ἔριν, τινὲς δὲ καὶ δι’ εὐδοκίαν τὸν Χριστὸν κηρύσσουσιν·
base_translation:
  language: en
  yaml_path: translation/nt/philippians/001/015.yaml
  text: Some indeed proclaim the Messiah because of envy and rivalry, but others because of goodwill.
translation:
  language: ko
  text: 어떤 이들은 시기와 경쟁심 때문에 메시아[a]를 전파하고, 또 어떤 이들은 선한 뜻으로 전파합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그리스도」. 헬라어 칭호 Χριστός를 칭호로 옮기는 본 번역의 원칙에 따라 「메시아」로 번역한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τινὲς … τινὲς
  english_pob_choice: Some … others
  chosen_korean: 어떤 이들 ~ 또 어떤 이들
  alternatives_korean:
  - 어떤 사람들 ~ 다른 사람들
  - 일부 ~ 다른 일부
  lexicon: BDAG
  rationale: 부정 대명사로 두 대조 집단을 표시한다. μέν ... δέ 대조를 「~ ~ 또 ~ ~」로 자연스럽게 살린다.
- source_word: διὰ φθόνον
  english_pob_choice: because of envy
  chosen_korean: 시기 때문에
  alternatives_korean:
  - 시기로 인하여
  - 질투에서
  lexicon: BDAG
  rationale: διά + 대격은 원인을 표현한다. 「시기 때문에」가 동기를 분명히 한다.
- source_word: ἔριν
  english_pob_choice: rivalry
  chosen_korean: 경쟁심
  alternatives_korean:
  - 다툼
  - 분쟁
  lexicon: BDAG
  rationale: 불순한 동기 문맥에서 ἔρις는 인간 간 경쟁의 의미가 강하다. 「경쟁심」이 옛 「분쟁」보다 본문의 의도를 더 잘 담는다.
- source_word: δι’ εὐδοκίαν
  english_pob_choice: because of goodwill
  chosen_korean: 선한 뜻으로
  alternatives_korean:
  - 선의로
  - 좋은 의도로
  lexicon: BDAG
  rationale: 시기·경쟁심과 대조되는 동기로서 「선한 뜻」이 도덕적 긍정성을 자연스럽게 담는다.
- source_word: τὸν Χριστόν
  english_pob_choice: the Messiah
  chosen_korean: 메시아
  alternatives_korean:
  - 그리스도
  lexicon: BDAG
  rationale: 정관사가 있는 칭호 용법이므로 「메시아」로 옮긴다. 한국어 어법상 「그 메시아」보다 단순 「메시아」가 자연스럽다.
- source_word: κηρύσσουσιν
  english_pob_choice: proclaim
  chosen_korean: 전파하고/전파합니다
  alternatives_korean:
  - 선포하다
  - 알리다
  lexicon: BDAG
  rationale: κηρύσσω는 사자(使者)의 공적 선포를 가리킨다. 「전파하다」가 그 공적 선포의 함의를 자연스럽게 담는다.
