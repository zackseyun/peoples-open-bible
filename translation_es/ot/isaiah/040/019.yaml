translation:
  language: es
  text: En cuanto al ídolo[a], un artesano lo funde, y un orfebre lo recubre de oro y refina cadenas de plata para él[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la imagen tallada». El sustantivo hebreo puede referirse más específicamente a una imagen hecha por talla, aunque aquí el sentido más amplio de «ídolo» encaja mejor con el contexto de objetos de culto fabricados.
    reason: lexical_alternative
  - marker: b
    text: O «fijaciones de plata» o «sujetadores de plata». El término hebreo es raro y su referencia precisa es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַפֶּסֶל
  english_pob_choice: the idol
  chosen_spanish: el ídolo
  alternatives_spanish:
  - la imagen tallada
  - la imagen
  lexicon: HALOT
  rationale: פֶּסֶל puede referirse específicamente a una imagen tallada, pero en este contexto la crítica profética apunta al objeto cultual fabricado. 'Ídolo' comunica mejor la fuerza polémica del pasaje en español.
- source_word: נָסַךְ
  english_pob_choice: casts
  chosen_spanish: funde
  alternatives_spanish:
  - castea
  - vacía
  - moldea
  lexicon: HALOT
  rationale: En el marco del trabajo artesanal y metalúrgico, el verbo sugiere fundir metal para formar la figura. 'Funde' expresa bien el proceso de manufactura sin perder el sentido material del hebreo.
- source_word: חָרָשׁ
  english_pob_choice: a craftsman
  chosen_spanish: un artesano
  alternatives_spanish:
  - un obrero
  - un trabajador experto
  - un artesano hábil
  lexicon: HALOT
  rationale: חָרָשׁ designa a un trabajador experto. 'Artesano' es natural en español y conserva la idea de habilidad manual sin especificar un oficio concreto.
- source_word: וְצֹרֵף
  english_pob_choice: and a goldsmith
  chosen_spanish: y un orfebre
  alternatives_spanish:
  - y un metalista
  - y un platero
  - y un refinador
  lexicon: HALOT
  rationale: Con 'oro' inmediatamente después, el término apunta a un trabajador de metales preciosos. 'Orfebre' es el equivalente más idiomático y preciso en español.
- source_word: בַּזָּהָב
  english_pob_choice: with gold
  chosen_spanish: de oro
  alternatives_spanish:
  - con oro
  - en oro
  lexicon: HALOT
  rationale: El hebreo expresa el material con que se reviste la imagen. En español, 'recubre de oro' suena natural y conserva la relación material del texto.
- source_word: יְרַקְּעֶנּוּ
  english_pob_choice: overlays it
  chosen_spanish: lo recubre
  alternatives_spanish:
  - lo platea
  - lo cubre
  - lo bate sobre él
  lexicon: HALOT
  rationale: El verbo implica batir y extender metal sobre el objeto. 'Lo recubre' comunica el resultado de manera clara y fiel al contexto metalúrgico.
- source_word: וּרְתֻקוֹת כֶּסֶף
  english_pob_choice: silver chains
  chosen_spanish: cadenas de plata
  alternatives_spanish:
  - fijaciones de plata
  - sujetadores de plata
  - eslabones de plata
  lexicon: HALOT
  rationale: El sustantivo es raro y su referente exacto es incierto; la tradición interpretativa del contexto favorece cadenas o sujeciones. 'Cadenas de plata' mantiene la imagen y deja abierta la precisión léxica.
- source_word: צוֹרֵף
  english_pob_choice: refines
  chosen_spanish: hace
  alternatives_spanish:
  - refina
  - forja
  - trabaja
  lexicon: HALOT
  rationale: El mismo radical puede aludir al trabajo del metal por refinación o fundición. Dado que el objeto inmediato son 'cadenas de plata', 'hace' es la solución más natural en español y evita forzar una técnica metalúrgica demasiado específica.
theological_decisions:
- issue: Término polémico para un objeto de culto fabricado
  english_pob_reading: the idol
  chosen_spanish_reading: el ídolo
  alternative_spanish_readings:
  - la imagen tallada
  - la imagen
  rationale: El contexto satiriza la manufactura de un objeto de culto. 'Ídolo' conserva la carga teológica y polémica que el pasaje requiere en español, sin añadir más contenido que el hebreo.
  doctrine_reference: Isaías 40:18-20; anti-idolatría profética
- issue: Tratamiento de la expresión rara וּרְתֻקוֹת כֶּסֶף
  english_pob_reading: silver chains
  chosen_spanish_reading: cadenas de plata
  alternative_spanish_readings:
  - fijaciones de plata
  - sujetadores de plata
  rationale: El término hebreo es incierto, y la POB en inglés también preserva esa decisión léxica mediante una opción plausible. 'Cadenas de plata' conserva la imagen ornamental/de sujeción y es plenamente inteligible para el lector español.
  doctrine_reference: Principio de cautela ante términos raros; cf. lexicografía hebrea
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que prefirió una formulación equivalente a 'refines silver chains' sobre una traducción más libre. En español, se mantuvo la cautela léxica ante el sustantivo raro y se optó por una solución natural ('cadenas de plata') con nota alternativa.
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma estándar del proyecto cuando el versículo nombra implícitamente la polémica contra la idolatría en el contexto inmediato, pero aquí el texto mismo no contiene el Tetragrámaton; por eso no aparece en el versículo.
  - Se mantuvo un registro moderno y reverente, evitando la calca excesiva y sin sustituir la fuerza antiidólatra por vocabulario eclesiástico tradicional que debilitaría el contraste del pasaje.
  - Se preservó la ambigüedad razonable de וּרְתֻקוֹת כֶּסֶף con una nota de alternativa, conforme al audit trail inglés.
