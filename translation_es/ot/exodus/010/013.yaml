review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia y el sentido general del hebreo: Moisés extiende su vara, Yahvé impulsa un viento oriental durante todo el día y toda la noche, y por la mañana ese viento trae las langostas. También preserva correctamente el nombre divino «Yahvé». Sin embargo, la nota al pie no funciona como alternativa léxica real porque repite exactamente la misma expresión ya usada en el texto principal.'
  spanish_quality_summary: El español es claro, natural y digno. «Extendió su vara», «sobre la tierra de Egipto» y «trajo las langostas» son buenas opciones. «Condujo un viento del oriente» es comprensible, pero «hizo soplar» o «impulsó» suena más idiomático con «viento». Aun así, el problema principal que exige revisión es la nota duplicada, no la redacción base.
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: יְהוָה se vierte como «Yahvé» y no como «SEÑOR»; רוּחַ קָדִים se mantiene como viento procedente del oriente; הָאַרְבֶּה se traduce naturalmente como «las langostas». No hay conflictos teológicos relevantes. La excepción necesaria es corregir la nota para que ofrezca una alternativa española genuina, por ejemplo «un viento de oriente».'
  issues:
  - severity: medium
    issue: La nota [a] repite exactamente la misma expresión del texto principal.
    rationale: El texto dice «un viento del oriente» y la nota ofrece «O «un viento del oriente»». Eso no preserva la alternativa léxica documentada en el expediente inglés y deja una nota vacía de contenido. Debe cambiarse a una alternativa real, como «un viento de oriente» o similar.
  - severity: low
    issue: «Condujo un viento del oriente» es menos idiomático que otras opciones en español.
    rationale: Aunque fiel al campo semántico de נהג, en español «conducir un viento» suena algo rígido. «Hizo soplar» o «impulsó» serían más naturales. Como la opción actual sigue siendo inteligible y no falsea el sentido, esto no exige rechazo.
  revised_spanish_text: Así que Moisés extendió su vara sobre la tierra de Egipto, y Yahvé condujo un viento del oriente[a] sobre la tierra todo aquel día y toda aquella noche. Cuando llegó la mañana, el viento del oriente trajo las langostas.
  revised_footnotes:
  - marker: a
    text: O «un viento de oriente».
    reason: lexical_alternative
  revision_rationale: Se conserva la traducción principal porque es sustancialmente fiel y legible, pero se corrige la nota al pie para que exprese una alternativa léxica real en español, en vez de duplicar la misma frase del texto principal.
