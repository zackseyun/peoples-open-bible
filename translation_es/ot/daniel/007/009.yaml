translation:
  language: es
  text: Seguí mirando hasta que fueron colocados tronos[a], y el Anciano de Días[b] se sentó. Su vestido era blanco como nieve, y el cabello de su cabeza era como lana pura. Su trono era llamas de fuego; sus ruedas, fuego ardiente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fueron puestos». La lectura tradicional «fueron derribados» es menos probable aquí, porque la escena presenta inmediatamente la instalación de la corte celestial.'
    reason: alternative_reading
  - marker: b
    text: Arameo «Anciano de Días», un título que enfatiza gran antigüedad y majestad eterna.
    reason: cultural_note
lexical_decisions:
- source_word: חָזֵה הֲוֵית
  english_pob_choice: I kept watching
  chosen_spanish: Seguí mirando
  alternatives_spanish:
  - Estuve mirando
  - Continué mirando
  lexicon: HALOT
  rationale: La forma verbal expresa acción continuada en la visión; en español, «seguí mirando» transmite bien el valor durativo sin sonar forzado.
- source_word: עַד דִּי
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta
  - mientras
  lexicon: HALOT
  rationale: Introduce el punto temporal hasta el cual Daniel continuó observando; «hasta que» funciona de manera natural con la cláusula siguiente.
- source_word: כָרְסָוָן
  english_pob_choice: thrones
  chosen_spanish: tronos
  alternatives_spanish:
  - asientos
  lexicon: HALOT
  rationale: El término plural conserva la imaginería real y judicial del contexto celestial; «tronos» es el equivalente más preciso.
- source_word: רְמִיו
  english_pob_choice: were set in place
  chosen_spanish: se colocaron
  alternatives_spanish:
  - fueron puestos
  - fueron dispuestos
  lexicon: HALOT
  rationale: En este contexto de sala celestial, el verbo apunta a la disposición de los tronos; «se colocaron» evita la lectura tradicional menos probable de «fueron derribados».
- source_word: וְעַתִּיק יוֹמִין
  english_pob_choice: and the Ancient of Days
  chosen_spanish: el Anciano de Días
  alternatives_spanish:
  - el Antiguo de los días
  - el Anciano Eterno
  lexicon: HALOT
  rationale: Se preserva el título reverente ya asentado; «Anciano de Días» mantiene la solemnidad y la transparencia del hebreo/arameo.
- source_word: יְתִב
  english_pob_choice: took his seat
  chosen_spanish: se sentó
  alternatives_spanish:
  - tomó su asiento
  - quedó sentado
  lexicon: HALOT
  rationale: El verbo describe la acción de sentarse en un marco entronizado. «Se sentó» es breve y fiel; el contexto judicial/reales sostiene el matiz de entronización.
- source_word: לְבוּשֵׁהּ כִּתְלַג חִוָּר
  english_pob_choice: His clothing was white as snow
  chosen_spanish: Su vestido era blanco como nieve
  alternatives_spanish:
  - Su ropa era blanca como la nieve
  - Su vestidura era blanca como nieve
  lexicon: HALOT
  rationale: «Vestido»/«vestidura» comunica bien el singular colectivo del arameo; «blanco como nieve» reproduce la comparación sin añadir más colorido del necesario.
- source_word: וּשְׂעַר רֵאשֵׁהּ כַּעֲמַר נְקֵא
  english_pob_choice: and the hair of his head was like pure wool
  chosen_spanish: y el cabello de su cabeza como lana pura
  alternatives_spanish:
  - y el pelo de su cabeza como lana limpia
  - y el cabello de su cabeza como lana blanca y pura
  lexicon: HALOT
  rationale: «Cabello» es natural y digno en español; «lana pura» conserva el valor de נְקֵא como pureza/limpieza, sin forzar explícitamente el matiz de blancura que el paralelo ya sugiere.
- source_word: כָּרְסְיֵהּ שְׁבִיבִין דִּי נוּר
  english_pob_choice: His throne was flames of fire
  chosen_spanish: Su trono era llamas de fuego
  alternatives_spanish:
  - Su trono era llamas ígneas
  - Su trono era fuego en llamas
  lexicon: HALOT
  rationale: שְׁבִיבִין puede referir llamas o chispas ígneas; «llamas de fuego» conserva la fuerza visual y el registro elevado.
- source_word: גַּלְגִּלּוֹהִי נוּר דָּלִק
  english_pob_choice: its wheels were a burning fire
  chosen_spanish: sus ruedas, fuego ardiente
  alternatives_spanish:
  - sus ruedas eran fuego ardiente
  - sus ruedas, un fuego ardiente
  lexicon: HALOT
  rationale: Se mantiene la imagen del carro-trono y la construcción nominal del original. «Fuego ardiente» recoge el participio intensivo sin necesidad de expandir la frase.
theological_decisions:
- issue: Lectura de וְעַתִּיק יוֹמִין como título divino
  english_pob_reading: the Ancient of Days
  chosen_spanish_reading: el Anciano de Días
  alternative_spanish_readings:
  - el Antiguo de los días
  - el Anciano Eterno
  rationale: Se conserva el título tradicional en español por ser el equivalente más claro y reverente, sin diluir su carácter teofánico en la visión de juicio celestial.
  doctrine_reference: Mantener la tensión teológica del título visionario sin explicarlo de más; lectura sobria y transparente.
- issue: Posible sentido de רְמִיו en el escenario celestial
  english_pob_reading: were set in place
  chosen_spanish_reading: se colocaron
  alternative_spanish_readings:
  - fueron puestos
  - fueron derribados
  rationale: El contexto inmediato muestra una escena de corte celestial que se convoca; por eso se adopta la disposición de los tronos y se evita la lectura de derribo, menos probable aquí.
  doctrine_reference: Coherencia contextual y lectura del género apocalíptico; evitar una traducción que contradiga la escena.
translation_notes:
  revision_awareness: 'Alineado con el audit trail inglés: se conservó la lectura de acción continua en el primer verbo, la instalación de los tronos, el título «Anciano de Días», y las imágenes de vestidura, cabello, trono y ruedas sin introducir interpretaciones ajenas. No hubo revisiones previas en el paquete fuente.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece el tetragrámaton.
  - Se mantuvo «Anciano de Días» como título reverente y reconocible en español.
  - «Llama(s) de fuego» y «fuego ardiente» preservan la imaginería poética sin sobrerresolverla.
  - La puntuación separa con claridad los miembros paralelos para reflejar el ritmo del arameo.
