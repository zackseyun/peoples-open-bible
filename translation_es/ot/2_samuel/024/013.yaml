base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/024/013.yaml
  text: So Gad came to David and told him[a], and said to him[c][b], “Shall seven years of famine come to you in your land? Or will you flee three months before your adversaries while they pursue you? Or shall there be three days of pestilence in your land? Now know and see what answer I should return to the one who sent me.”
  footnotes:
  - marker: a
    text: The parallel in 1 Chronicles 21:12 reads 'three years of famine' instead of 'seven years.'
    reason: textual_variant
  - marker: b
    text: Or 'your enemies' for 'your adversaries.'
    reason: lexical_alternative
  - marker: c
    text: '''Pestilence'' may also be rendered ''plague.'''
    reason: lexical_alternative
