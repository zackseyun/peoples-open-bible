base_translation:
  language: en
  yaml_path: translation/ot/genesis/047/018.yaml
  text: 'When that year ended[a], they came to him in the second year and said to him, “We will not hide it from my lord: the money is gone, and the livestock of the herds belongs to my lord[b]. Nothing is left before my lord except our bodies and our land.”'
  footnotes:
  - marker: a
    text: Or 'the silver is exhausted.' Hebrew often uses 'silver' for money.
    reason: lexical_alternative
  - marker: b
    text: Or 'our persons and our land.' The Hebrew says literally 'our bodies and our land.'
    reason: lexical_alternative
