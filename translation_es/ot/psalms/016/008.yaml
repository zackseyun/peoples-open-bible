review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del hebreo: acción deliberada de poner a Yahvé delante de sí, constancia temporal, razón causal, presencia protectora a la derecha y resultado de estabilidad. Sin embargo, «no seré sacudido» no representa tan naturalmente en español bíblico el valor de מוט como estabilidad/no tambaleo; suena más a una fuerza externa que sacude. «No vacilaré» o «no seré movido» reflejan mejor el campo semántico documentado.'
  spanish_quality_summary: El español es claro y digno. «He puesto... siempre delante de mí» es natural, aunque «continuamente» también sería posible. La principal debilidad estilística y semántica es «no seré sacudido», que resulta menos idiomático y menos preciso que alternativas como «no vacilaré». La nota a sobre Yahvé no funciona bien como nota de alternativa, porque repite exactamente la forma ya usada en el texto.
  glossary_alignment: Se respeta correctamente la política del proyecto al usar «Yahvé» para יְהוָה. No hay conflicto relevante con otros términos del glosario. Conviene ajustar la nota de alternativa del nombre divino para que ofrezca una alternativa real («Yahweh») o eliminarla; dado que el inglés la conserva, puede mantenerse adaptada al español.
  issues:
  - severity: medium
    issue: «No seré sacudido» para בַּל אֶמּוֹט
    rationale: Aunque posible, en español sugiere más ser zarandeado que perder firmeza. El hebreo מוט en este contexto poético apunta naturalmente a vacilar, tambalearse o ser movido de una posición segura. «No vacilaré» comunica mejor la imagen y suena más idiomático.
  - severity: low
    issue: Nota [a] repite la forma principal «Yahvé» como supuesta alternativa
    rationale: La nota actual dice «alternativamente transliterado “Yahvé”», pero «Yahvé» ya está en el texto. Si se conserva la nota por fidelidad al rastro inglés, la alternativa real debería ser «Yahweh».
  - severity: low
    issue: «Porque» tras punto y coma es aceptable pero algo pesado
    rationale: No es incorrecto, pero el flujo mejora manteniendo la causalidad sin rigidez excesiva. Puede conservarse; no requiere cambio obligatorio.
  revised_spanish_text: He puesto a Yahvé[a] siempre delante de mí; porque él está a mi derecha, no vacilaré[b].
  revised_footnotes:
  - marker: a
    text: Hebreo YHWH; alternativamente transliterado «Yahweh».
    reason: alternative_reading
  - marker: b
    text: 'O: «no seré movido». El hebreo puede expresar no tambalearse ni ser desplazado de una posición segura.'
    reason: lexical_alternative
  revision_rationale: 'Se revisa la cláusula final para reflejar mejor el sentido de מוט en español natural y fiel: estabilidad firme más que ser físicamente sacudido. También se corrige la nota sobre el nombre divino para que presente una alternativa real y no repita la forma del texto principal.'
