review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: mantiene Yahvé, el título divino, la fórmula de juramento y el sentido principal de אֵרָאֶה אֵלָיו con nota alternativa. Sin embargo, hay dos puntos de ajuste para mayor fidelidad y naturalidad: la fórmula juratoria חַי יְהוָה צְבָאוֹת se expresa mejor en español como «Tan cierto como que vive Yahvé de los Ejércitos» o equivalente, y אֲשֶׁר עָמַדְתִּי לְפָנָיו se oye más natural como «delante de quien estoy» que «ante quien estoy de pie», sin perder la imaginería de servicio.'
  spanish_quality_summary: El español es claro, pero el uso de signos de exclamación en toda la cita hace que la solemne fórmula de juramento suene algo enfática de más. «Estoy de pie» es comprensible pero algo rígido y poco idiomático en este contexto bíblico; «delante de quien estoy» conserva dignidad y fluidez. También conviene capitalizar «Ejércitos» si se trata como parte fija del título divino.
  glossary_alignment: 'Alineado en lo esencial con la terminología del proyecto: יהוה -> «Yahvé» correctamente; צְבָאוֹת aceptablemente como «Ejércitos»; no hay conflicto con otros términos doctrinales. La revisión propuesta preserva el nombre divino y mejora la forma española del juramento sin apartarse del audit trail inglés.'
  issues:
  - severity: medium
    issue: Fórmula de juramento algo poco idiomática en español
    rationale: «¡Vive Yahvé de los ejércitos!» transmite el sentido, pero en español bíblico moderno suena más natural y solemne una fórmula como «Tan cierto como que vive Yahvé de los Ejércitos». Esto preserva mejor el valor de חַי יְהוָה como fórmula de juramento, no solo como exclamación.
  - severity: medium
    issue: «ante quien estoy de pie» suena rígido
    rationale: Aunque literal, «estoy de pie» resulta pesado en español en esta construcción. «Delante de quien estoy» conserva la imagen de presencia y servicio sin sonar acartonado.
  - severity: low
    issue: Puntuación enfática excesiva
    rationale: Los signos de exclamación alrededor de toda la declaración no son necesarios y pueden sobrecargar el tono. El hebreo presenta una fórmula solemne, no necesariamente exclamativa.
  - severity: low
    issue: Capitalización del título divino
    rationale: En títulos divinos fijos, «Yahvé de los Ejércitos» mejora la presentación reverencial y la coherencia editorial.
  revised_spanish_text: 'Y Elías dijo[a]: «Tan cierto como que vive Yahvé de los Ejércitos, delante de quien estoy, hoy me presentaré ante él».

    '
