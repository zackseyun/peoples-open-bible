  language: en
  yaml_path: translation/ot/2_samuel/016/003.yaml
  text: Then the king said[a], “And where is your master's son?” Ziba said to the king, “Look, he is staying in Jerusalem, for he said, ‘Today the house of Israel will restore to me the kingdom of my father.’”
  footnotes:
  - marker: a
    text: Or 'is remaining in Jerusalem.' The Hebrew participle can denote continued residence or staying in place, not only literal sitting.
    reason: lexical_alternative
