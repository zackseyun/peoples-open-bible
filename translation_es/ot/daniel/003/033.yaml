translation:
  language: es
  text: ¡Cuán grandes son sus señales[a], y cuán poderosas son sus maravillas! Su reino es un reino eterno[b], y su dominio es de generación en generación[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus maravillas».
    reason: lexical_alternative
  - marker: b
    text: O «un reino perdurable».
    reason: lexical_alternative
  - marker: c
    text: 'Arameo: «con generación y generación», un modismo que significa que perdura a través de todas las generaciones.'
    reason: cultural_note
lexical_decisions:
- source_word: אָתוֹהִי
  english_pob_choice: his signs
  chosen_spanish: sus señales
  alternatives_spanish:
  - sus signos
  - sus prodigios
  lexicon: HALOT
  rationale: En arameo bíblico el término designa señales milagrosas; «señales» conserva el valor de acto portentoso y suena natural en español, manteniendo la pareja tradicional con «maravillas».
- source_word: כְּמָה
  english_pob_choice: how
  chosen_spanish: ¡cuán!
  alternatives_spanish:
  - ¡cómo de!
  - qué de
  lexicon: HALOT
  rationale: La partícula es exclamativa y de admiración; «¡cuán!» expresa mejor la intensidad retórica que un simple «cómo».
- source_word: רַבְרְבִין
  english_pob_choice: great
  chosen_spanish: grandes
  alternatives_spanish:
  - magníficas
  - enormes
  lexicon: HALOT
  rationale: En este contexto doxológico señala magnitud cualitativa; «grandes» es la equivalencia más natural y fiel en español.
- source_word: תִמְהוֹהִי
  english_pob_choice: his wonders
  chosen_spanish: sus maravillas
  alternatives_spanish:
  - sus prodigios
  - sus portentos
  lexicon: HALOT
  rationale: «Maravillas» preserva la colocación bíblica «señales y maravillas» y expresa actos que provocan asombro, como en la lectura inglesa.
- source_word: תַקִּיפִין
  english_pob_choice: mighty
  chosen_spanish: poderosas
  alternatives_spanish:
  - fuertes
  - muy poderosas
  lexicon: HALOT
  rationale: Describe la fuerza o potencia de las maravillas; «poderosas» comunica bien esa fuerza en español sin perder el tono solemne.
- source_word: מַלְכוּתֵהּ
  english_pob_choice: his kingdom
  chosen_spanish: su reino
  alternatives_spanish:
  - su realeza
  - su soberanía
  lexicon: HALOT
  rationale: El posesivo remite al reinado de Dios. «Reino» es la opción más transparente y mantiene el paralelismo con la siguiente cláusula.
- source_word: מַלְכוּת עָלַם
  english_pob_choice: an everlasting kingdom
  chosen_spanish: un reino eterno
  alternatives_spanish:
  - un reino para siempre
  - un reino perdurable
  lexicon: HALOT
  rationale: La construcción denota perpetuidad; «reino eterno» reproduce con claridad la idea de duración sin añadir matices ajenos.
- source_word: שָׁלְטָנֵהּ
  english_pob_choice: his dominion
  chosen_spanish: su dominio
  alternatives_spanish:
  - su gobierno
  - su soberanía
  lexicon: HALOT
  rationale: Término de autoridad regia; «dominio» preserva el paralelismo con «reino» y el matiz de autoridad gobernante.
- source_word: עִם דָּר וְדָר
  english_pob_choice: from generation to generation
  chosen_spanish: de generación en generación
  alternatives_spanish:
  - por todas las generaciones
  - a través de generación y generación
  lexicon: HALOT
  rationale: Es el equivalente idiomático normal en español para continuidad sucesiva entre generaciones, sin perder el alcance duradero de la expresión aramea.
theological_decisions:
- issue: Referente divino de los pronombres posesivos
  english_pob_reading: Render the pronouns straightforwardly as referring to the Most High God without adding interpretive expansion.
  chosen_spanish_reading: Los posesivos «sus» remiten directamente a Dios sin aclaración interpretativa en el cuerpo del texto.
  alternative_spanish_readings:
  - su [de Dios] reino
  - el reino de Dios
  rationale: El contexto doxológico identifica con claridad al referente; mantener «sus» conserva la fluidez del versículo y evita sobreexplicación no requerida por el texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El audit trail inglés no registra revisiones sustantivas; el veredicto de revisión más reciente fue de alta concordancia y sin cambios. La propuesta española sigue esa lectura estable, conservando el paralelismo y la doxología sin expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca, pero en este versículo el referente se expresa por posesivos contextuales, por lo que no se introduce el nombre explícito.
  - Se usa «señales» y «maravillas» para preservar la colocación bíblica tradicional sin caer en calcos extraños.
  - «Reino eterno» y «de generación en generación» reproducen de forma idiomática la duración absoluta del reino y del dominio.
  - No se ha usado «Cristo», «SEÑOR» ni terminología eclesiástica ajena al arameo del pasaje.
