translation:
  language: es
  text: ¡Oigan, todos los pueblos![a] ¡Presta atención, tierra, y todo lo que la llena! Y que el Señor Yahvé[b][c] sea testigo contra ustedes, el Señor desde su santo templo[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'pueblos todos'.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''el Señor Yahvé''; se conserva el nombre divino en vez de la convención tradicional ''SEÑOR'' o ''el Señor Dios''.'
    reason: lexical_alternative
  - marker: c
    text: También puede leerse 'el Señor Yahvé sea testigo entre ustedes'; en el contexto, sin embargo, el sentido judicial probable es 'contra ustedes'.
    reason: alternative_reading
  - marker: d
    text: O 'desde su santo palacio' o 'desde su santo santuario'.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁמְעוּ
  english_pob_choice: Hear
  chosen_spanish: ¡Oigan!
  alternatives_spanish:
  - ¡Escuchen!
  - ¡Oíd!
  lexicon: HALOT
  rationale: El imperativo plural convoca a una audiencia pública y profética. 'Oigan' conserva el tono solemne y directo mejor que una forma demasiado coloquial; también evita el arcaísmo de 'oíd'.
- source_word: עַמִּים כֻּלָּם
  english_pob_choice: all you peoples
  chosen_spanish: pueblos todos
  alternatives_spanish:
  - todos los pueblos
  - todas las naciones
  lexicon: HALOT
  rationale: '''Pueblos todos'' reproduce la invocación plural sin forzar un matiz político de ''naciones''. En español permite una dirección inclusiva y solemne, equivalente al valor colectivo del hebreo.'
- source_word: הַקְשִׁיבִי
  english_pob_choice: pay attention
  chosen_spanish: Presta atención
  alternatives_spanish:
  - Escucha atentamente
  - Haz caso
  lexicon: HALOT
  rationale: El imperativo femenino singular dirigido a 'tierra' pide una forma natural en español. 'Presta atención' conserva la solemnidad y la fuerza exhortativa sin sonar arcaico.
- source_word: אֶרֶץ וּמְלֹאָהּ
  english_pob_choice: O earth, and all that fills it
  chosen_spanish: oh tierra, y todo lo que la llena
  alternatives_spanish:
  - oh tierra, y todo lo que hay en ella
  - oh tierra, y su plenitud
  lexicon: HALOT
  rationale: '''Tierra'' sigue la amplitud cósmica del contexto, y ''todo lo que la llena'' refleja el sentido de מְלֹאָהּ como totalidad contenida. Se evita reducirlo a ''país'' o ''tierra de Israel''.'
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Soberano Yahvé
  lexicon: HALOT
  rationale: Se preserva el nombre divino יְהוָה como 'Yahvé' según el criterio del proyecto, y אֲדֹנָי como 'Señor'. La combinación mantiene el valor del título compuesto sin sustituir el nombre propio por una convención de ocultamiento.
- source_word: בָּכֶם
  english_pob_choice: against you
  chosen_spanish: contra ustedes
  alternatives_spanish:
  - entre ustedes
  - con ustedes
  lexicon: HALOT
  rationale: El contexto judicial profético favorece el valor adversativo. 'Contra ustedes' expresa la función forense del testimonio con claridad en español.
- source_word: לְעֵד
  english_pob_choice: a witness
  chosen_spanish: testigo
  alternatives_spanish:
  - como testigo
  - para testimonio
  lexicon: HALOT
  rationale: '''Testigo'' conserva el campo legal del sustantivo עֵד y sugiere la escena de juicio sin añadir elementos ajenos al texto.'
- source_word: אֲדֹנָי מֵהֵיכַל קָדְשׁוֹ
  english_pob_choice: the Lord from his holy temple
  chosen_spanish: el Señor desde su santo templo
  alternatives_spanish:
  - el Señor desde su templo santo
  - el Señor desde su santo palacio
  lexicon: HALOT
  rationale: '''Templo'' es la opción más clara y reconocible para הֵיכָל en este contexto divino. ''Santo templo'' reproduce bien la relación genitiva del hebreo y mantiene la imagen de la procedencia del testimonio.'
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה dentro del título compuesto אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Soberano Yahvé
  rationale: La base hebrea distingue el título אֲדֹנָי del nombre propio יְהוָה. La traducción usa 'Señor' para אֲדֹנָי y 'Yahvé' para el Tetragrámaton, siguiendo la convención del proyecto y evitando la sustitución tradicional por 'SEÑOR' o 'Dios'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de אֶרֶץ en paralelo con 'pueblos todos'
  english_pob_reading: earth
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - la tierra
  - el mundo
  rationale: El paralelismo con 'pueblos todos' y la amplitud del llamado favorecen un alcance global/cósmico. 'Tierra' conserva esa amplitud sin restringirlo al territorio de Israel.
  doctrine_reference: Micah 1:2 source-contextual scope
translation_notes:
  revision_awareness: Coincide con la revisión más reciente sin cambios sustanciales; se mantuvo el juicio contextual de alcance universal para אֶרֶץ y la lectura forense de בָּכֶם / לְעֵד, además de aplicar el criterio del proyecto para YHWH como 'Yahvé'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para יְהוָה, en consonancia con el criterio del proyecto.
  - '''Señor'' se usó para אֲדֹנָי, distinguiéndolo del nombre propio divino.'
  - '''Pueblos'' y ''tierra'' conservan el paralelismo universal del hebreo.'
  - '''Testigo'' y ''contra ustedes'' mantienen el marco judicial sin suavizarlo.'
  - Se evitó 'Cristo', 'SEÑOR' en mayúsculas y otras formas de ocultamiento que no corresponden al criterio auditado.
