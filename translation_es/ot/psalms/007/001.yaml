translation:
  language: es
  text: Un Shiggaión de David[a], que cantó a Yahvé, acerca de las palabras de Cus, un benjaminita.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente un término técnico musical o poético, como «lamento» o «canto vehemente»; el hebreo Shiggaión es raro e incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁגָּיוֹן
  english_pob_choice: Shiggaion
  chosen_spanish: Shiggaión
  alternatives_spanish:
  - meditación
  - lamento
  - canto vehemente
  lexicon: HALOT
  rationale: La palabra es rara y su sentido exacto es incierto. Mantenerla transliterada en español preserva el carácter técnico/literario del encabezado y evita imponer un significado debatido. Se adapta la grafía al español con acento para facilitar la lectura sin perder la forma propia.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - para David
  - por David
  - perteneciente a David
  lexicon: HALOT
  rationale: En los sobrescritos de los salmos, ל puede señalar autoría, dedicación o asociación. 'De David' conserva esa amplitud y es natural en español, sin cerrar indebidamente la relación exacta.
- source_word: שָׁר
  english_pob_choice: which he sang
  chosen_spanish: que cantó
  alternatives_spanish:
  - que entonó
  - que había cantado
  lexicon: HALOT
  rationale: El verbo hebreo expresa cantar; 'cantó' reproduce el acto verbal de manera directa y sobria. 'Que cantó' funciona bien en español y mantiene el referente relativo del encabezado.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahweh
  - para Yahvé
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de traducir יהוה por 'Yahvé' en el texto principal. La preposición 'a' refleja con naturalidad el complemento verbal del canto dirigido a Dios.
- source_word: עַל
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - por causa de
  - en relación con
  lexicon: HALOT
  rationale: '''Acerca de'' expresa bien el tópico u ocasión del encabezado sin decidir más de lo que exige el hebreo. Evita una causalidad excesiva y suena fluido en español.'
- source_word: דִּבְרֵי
  english_pob_choice: the words of
  chosen_spanish: las palabras de
  alternatives_spanish:
  - el asunto de
  - los hechos de
  - la acusación de
  lexicon: HALOT
  rationale: El constructo plural de דָּבָר puede significar 'palabras', 'asuntos' o 'hechos'. 'Las palabras de' es la opción más transparente y menos interpretativa, coherente con el audit trail inglés.
- source_word: כּוּשׁ
  english_pob_choice: Cush
  chosen_spanish: Cus
  alternatives_spanish:
  - Cush
  lexicon: HALOT
  rationale: Se trata de un nombre propio. Se adapta la transliteración al uso español ('Cus') para mayor naturalidad, conservando la identidad del nombre sin traducirlo.
- source_word: בֶּן יְמִינִי
  english_pob_choice: a Benjaminite
  chosen_spanish: benjaminita
  alternatives_spanish:
  - de Benjamín
  - hijo de Benjamín
  - benjaminí
  lexicon: HALOT
  rationale: La expresión es idiomática para alguien perteneciente a la tribu de Benjamín. 'Benjaminita' comunica ese sentido de forma clara y concisa, mejor que una versión literal más pesada.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se mantiene la decisión doctrinal del proyecto de usar el nombre divino en forma audible en vez de ocultarlo con una sustitución reverencial. 'Yahvé' es la forma española establecida en el proyecto y responde al Tetragrama del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El texto sigue el audit trail inglés de alta concordancia: transliteración de שִׁגָּיוֹן, lectura amplia de לְדָוִד como pertenencia/autoria, complemento direccional a Yahvé, y el encabezado tópico de עַל דִּבְרֵי sin sobrerinterpretarlo. Se ajustó la redacción al español natural manteniendo las mismas tensiones léxicas documentadas.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente con el criterio del proyecto para יהוה.
  - '''Shiggaión'' conserva el carácter técnico del término raro y la nota preserva la alternativa interpretativa.'
  - '''benjaminita'' evita una paráfrasis excesiva y mantiene la referencia tribal.'
  - El encabezado se formula con estilo sobrio y publicable, sin añadir contenido no exigido por el hebreo.
