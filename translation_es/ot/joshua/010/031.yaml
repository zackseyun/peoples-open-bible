translation:
  language: es
  text: Entonces Josué y todo Israel con él pasaron[a] de Libna a Laquis, y acamparon[b] contra ella y pelearon contra ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cruzaron de Libna a Laquis». El verbo hebreo puede significar más literalmente «pasar» o «pasar por», pero aquí describe un movimiento militar de una ciudad a otra.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «acamparon contra ella». El hebreo también puede traducirse «se asentaron en campamento contra ella», con sentido de posición militar hostil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבֹר
  english_pob_choice: passed on
  chosen_spanish: siguió
  alternatives_spanish:
  - pasó
  - pasó adelante
  - continuó
  lexicon: HALOT
  rationale: El hebreo עבר aquí expresa avance/movimiento en contexto militar. «Siguió» comunica el desplazamiento de una ciudad a otra sin sugerir necesariamente cruce de río, y mantiene la naturalidad del español.
- source_word: וְכָל יִשְׂרָאֵל עִמּוֹ
  english_pob_choice: and all Israel with him
  chosen_spanish: y todo Israel con él
  alternatives_spanish:
  - y todo Israel junto con él
  - y todo Israel iba con él
  lexicon: HALOT
  rationale: La frase colectiva se rinde de forma directa. «Todo Israel» conserva el valor corporativo del hebreo y la relación de acompañamiento con Josué.
- source_word: מִלִּבְנָה לָכִישָׁה
  english_pob_choice: from Libnah to Lachish
  chosen_spanish: de Libna a Laquis
  alternatives_spanish:
  - desde Libna hasta Laquis
  - de Libna hacia Laquis
  lexicon: HALOT
  rationale: 'Se mantiene la dirección del movimiento con una preposición natural en español. El nombre se adapta a la forma usual en castellano bíblico: «Laquis».'
- source_word: וַיִּחַן עָלֶיהָ
  english_pob_choice: and camped against it
  chosen_spanish: y acampó contra ella
  alternatives_spanish:
  - y acampó frente a ella
  - y acampó junto a ella
  lexicon: HALOT
  rationale: En contexto de sitio militar, עַל no indica mera cercanía sino posición hostil. «Contra ella» preserva esa carga adversativa sin perder claridad.
- source_word: וַיִּלָּחֶם בָּהּ
  english_pob_choice: and fought against it
  chosen_spanish: y peleó contra ella
  alternatives_spanish:
  - y combatió contra ella
  - y hizo guerra contra ella
  lexicon: HALOT
  rationale: לחם en este contexto significa combatir/pelear en guerra. «Peleó contra ella» es claro y fiel; conserva la acción bélica sin sobretraducir con una expresión más técnica.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail en inglés: en particular, la decisión óptima de no traducir עבר mecánicamente como «cruzó» y de conservar el matiz militar de חנה + עַל y לחם + בְּ. No se detectaron revisiones posteriores que alteraran el sentido del versículo.'
  spanish_consistency_notes:
  - Se mantiene «Josué» como nombre propio estándar.
  - Se usa «contra ella» para ambos verbos militares, preservando la orientación hostil del hebreo.
  - La puntuación sigue el ritmo sintáctico del original y de la traducción auditada en inglés.
