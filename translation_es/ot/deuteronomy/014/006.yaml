translation:
  language: es
  text: Pueden comer cualquier animal que tenga la pezuña partida[a], dividida en dos pezuñas, y que rumie entre los animales.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «todo animal que parte la pezuña y hende la hendidura en dos pezuñas, que hace subir el bolo entre los animales; ese pueden comer»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל
  english_pob_choice: any
  chosen_spanish: cualquier
  alternatives_spanish:
  - todo
  - cada
  lexicon: HALOT
  rationale: En una norma permisiva con sentido distributivo, «cualquier» comunica mejor el alcance de «todo/every» sin volver la frase rígida o poco natural en español.
- source_word: בְּהֵמָה
  english_pob_choice: animal
  chosen_spanish: animal
  alternatives_spanish:
  - bestia
  - ganado
  lexicon: HALOT
  rationale: Aquí el término abarca a los animales terrestres dentro de la categoría dietética; «animal» es claro y no restringe indebidamente a ganado doméstico.
- source_word: מַפְרֶסֶת פַּרְסָה
  english_pob_choice: has a split hoof
  chosen_spanish: tenga la pezuña partida
  alternatives_spanish:
  - tenga la pezuña dividida
  - parta la pezuña
  lexicon: HALOT
  rationale: La imagen es concreta y zoológica. «Pezuña partida» preserva el rasgo físico de la señal de pureza alimentaria con un español natural.
- source_word: וְשֹׁסַעַת שֶׁסַע שְׁתֵּי פְרָסוֹת
  english_pob_choice: divided into two hoof-parts
  chosen_spanish: dividida en dos partes
  alternatives_spanish:
  - hendida en dos
  - separada en dos pezuñas
  lexicon: HALOT
  rationale: El hebreo intensifica la separación en dos divisiones. «Dividida en dos partes» conserva el énfasis sin introducir terminología extraña o demasiado técnica.
- source_word: מַעֲלַת גֵּרָה
  english_pob_choice: chews the cud
  chosen_spanish: que rumie
  alternatives_spanish:
  - que mastique el bolo
  - que checa el cud
  lexicon: HALOT
  rationale: «Rumiar» es el equivalente natural y preciso del idiomático hebreo para el proceso de volver a masticar el alimento. Mantiene el sentido sin calcar la metáfora inglesa.
- source_word: בַּבְּהֵמָה
  english_pob_choice: among the animals
  chosen_spanish: entre los animales
  alternatives_spanish:
  - entre las bestias
  - dentro de los animales
  lexicon: HALOT
  rationale: La frase ubica el criterio dentro del conjunto de animales tratados. «Entre» es la opción más idiomática para expresar esa inclusión de clase.
- source_word: אֹתָהּ תֹּאכֵלוּ
  english_pob_choice: You may eat
  chosen_spanish: Podrán comer
  alternatives_spanish:
  - podéis comer
  - la podrán comer
  lexicon: HALOT
  rationale: En este contexto legal, el imperfecto expresa permiso. «Podrán comer» comunica la autorización de forma natural en español y deja implícito el objeto femenino, como en el hebreo dentro de esta clase nominal.
translation_notes:
  revision_awareness: 'Se conservó el sentido del hebreo masorético con el mismo criterio de equivalencia óptima reflejado en la POB inglesa: una formulación natural en español para una ley dietética, sin perder los rasgos concretos de la pezuña partida, la división en dos partes y el rumiar. No se adoptó un calco del inglés; se priorizó el valor semántico del original hebreo.'
  spanish_consistency_notes:
  - Se mantuvo «animal» para בְּהֵמָה, coherente con un registro claro y no restrictivo.
  - Se tradujo el permiso legal con «podrán comer», evitando convertir la norma en mandato.
  - «Rumiar» se conserva como equivalente idiomático preciso de מַעֲלַת גֵּרָה.
  - La nota alternativa refleja la formulación más formal preservada en el aparato inglés, adaptada al español y anclada al criterio lexical del verso.
