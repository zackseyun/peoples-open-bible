lexical_decisions:
- source_word: מִ/בְּנֵי
  english_pob_choice: From the sons of
  chosen_spanish: De los hijos de
  alternatives_spanish:
  - De entre los hijos de
  - De los descendientes de
  lexicon: HALOT
  rationale: La preposición מִן con בְּנֵי introduce un subconjunto dentro del listado, no una relación posesiva simple. En español, 'De los hijos de' conserva bien esa función genealógica/listaria con naturalidad.
- source_word: נְבוֹ
  english_pob_choice: Nebo
  chosen_spanish: Nebo
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma directa, sin traducirlo.
- source_word: יְעִיאֵל
  english_pob_choice: Jeiel
  chosen_spanish: Jeiel
  alternatives_spanish:
  - Yeiel
  lexicon: HALOT
  rationale: Se mantiene la transliteración convencional del nombre personal.
- source_word: מַתִּתְיָה
  english_pob_choice: Mattithiah
  chosen_spanish: Matitías
  alternatives_spanish:
  - Matitía
  lexicon: HALOT
  rationale: Se adapta el nombre a una forma española legible y reconocible, preservando la base hebrea del nombre sin forzar la grafía inglesa.
- source_word: זָבָד
  english_pob_choice: Zabad
  chosen_spanish: Zabad
  lexicon: HALOT
  rationale: Nombre propio transliterado directamente.
- source_word: זְבִינָא
  english_pob_choice: Zebina
  chosen_spanish: Zebina
  alternatives_spanish:
  - Zebinah
  lexicon: HALOT
  rationale: Se conserva la transliteración convencional del nombre.
- source_word: ידו
  english_pob_choice: Jaddai
  chosen_spanish: Jadai
  alternatives_spanish:
  - Iddo
  - Jedo
  lexicon: HALOT
  rationale: La identificación del nombre es incierta en el texto consonántico; en español se adopta una forma transparente y legible, manteniendo en nota las alternativas principales documentadas por la tradición textual/transliterativa.
- source_word: וְ/יוֹאֵל
  english_pob_choice: and Joel
  chosen_spanish: Joel
  lexicon: HALOT
  rationale: Se traduce el nombre propio con su forma española normal, integrando la conjunción en el listado natural del español.
- source_word: בְּנָיָה
  english_pob_choice: Benaiah
  chosen_spanish: Benaía
  alternatives_spanish:
  - Benayah
  lexicon: HALOT
  rationale: Se prefiere una forma española clara del nombre personal, preservando su sonoridad y reconocimiento.
translation_notes:
  revision_awareness: La redacción sigue el cierre revisado del texto inglés de referencia, donde los nombres finales quedan claramente separados como individuos distintos. Por eso se mantiene una enumeración española con comas y la conjunción final antes de Benaía.
  spanish_consistency_notes:
  - Se usa 'hijos de' para mantener el sentido genealógico/listario de בְּנֵי sin volverlo posesivo rígido.
  - Los nombres propios se conservan mayormente en transliteración, con adaptación mínima a la ortografía española cuando mejora la legibilidad.
  - Se evita 'SEÑOR' u otras sustituciones teológicas porque este versículo no contiene lenguaje divino, sólo una lista nominal.
  - La nota sobre ידו se mantiene porque la incertidumbre del nombre es real y el español hereda esa misma ambigüedad.
