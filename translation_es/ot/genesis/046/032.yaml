translation:
  language: es
  text: Los hombres son pastores[a], porque han sido ganaderos, y han traído sus rebaños y su ganado y todo lo que tienen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘eran pastores ... trajeron’. Los perfectos hebreos pueden verterse con pasado simple en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָאֲנָשִׁים
  english_pob_choice: The men
  chosen_spanish: Los hombres
  alternatives_spanish:
  - Y los hombres
  lexicon: HALOT
  rationale: El sustantivo definido plural se conserva naturalmente en español con artículo explícito. Se omite la conjunción inicial por fluidez, como en el audit trail inglés.
- source_word: רֹעֵי צֹאן
  english_pob_choice: shepherds
  chosen_spanish: pastores
  alternatives_spanish:
  - pastores de ovejas
  - pastores de rebaños
  lexicon: HALOT
  rationale: La expresión constructa significa literalmente ‘pastores de ovejas/rebaños’. ‘Pastores’ es el equivalente idiomático y fiel en español; ‘pastores de rebaños’ sería redundante.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la explicación de por qué son llamados pastores. En español, ‘porque’ expresa mejor la relación explicativa/causal que ‘for’ en inglés.
- source_word: אַנְשֵׁי מִקְנֶה
  english_pob_choice: keepers of livestock
  chosen_spanish: ganaderos
  alternatives_spanish:
  - criadores de ganado
  - encargados del ganado
  - hombres de ganado
  lexicon: HALOT
  rationale: La frase denota ocupación con ganado/livestock. ‘Ganaderos’ comunica bien la función profesional sin restringir indebidamente a solo ‘vacas’; es más natural que una calca.
- source_word: הָיוּ
  english_pob_choice: have been
  chosen_spanish: han sido
  alternatives_spanish:
  - eran
  - fueron
  lexicon: HALOT
  rationale: El perfecto hebreo describe una ocupación estable reconocible en el contexto actual. ‘Han sido’ conserva ese valor de estado/experiencia continua mejor que un pasado simple.
- source_word: וְצֹאנָם
  english_pob_choice: their flocks
  chosen_spanish: sus rebaños
  alternatives_spanish:
  - sus ovejas
  - sus ganados menores
  lexicon: HALOT
  rationale: צֹאן puede abarcar ganado menor en conjunto. ‘Rebaños’ mantiene el valor colectivo y el paralelismo con ‘sus hatos’.
- source_word: וּבְקָרָם
  english_pob_choice: their herds
  chosen_spanish: sus hatos
  alternatives_spanish:
  - sus ganados
  - sus reses
  lexicon: HALOT
  rationale: בקר se refiere al ganado vacuno/cattle. ‘Hatos’ es un término bíblico y amplio para ganado en español, útil aquí para reproducir la pareja ‘rebaños y hatos’ sin perder la distinción colectiva.
- source_word: וְכָל אֲשֶׁר לָהֶם
  english_pob_choice: all that they have
  chosen_spanish: todo lo que tienen
  alternatives_spanish:
  - todo cuanto poseen
  - todas sus posesiones
  lexicon: HALOT
  rationale: La expresión abarca de modo total sus bienes/posesiones. ‘Todo lo que tienen’ es cercano, natural y suficientemente comprensivo.
- source_word: הֵבִיאוּ
  english_pob_choice: they have brought
  chosen_spanish: han traído
  alternatives_spanish:
  - trajeron
  lexicon: HALOT
  rationale: El perfecto hebreo se refleja mejor con el pretérito perfecto compuesto en español para indicar acción completada con relevancia en el presente del relato.
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés y el hebreo subyacente. No hubo necesidad de revisar una decisión previa, porque la versión inglesa final ya fue marcada como sin cambios en la última pasada.
  spanish_consistency_notes:
  - Se mantuvo ‘pastores’ para רֹעֵי צֹאן, que es el equivalente idiomático y consistente con el uso bíblico en español.
  - Se eligió ‘ganaderos’ para אַנְשֵׁי מִקְנֶה por ser más natural que ‘criadores de ganado’ y por no reducir el alcance de מִקְנֶה.
  - ‘Rebaños’ y ‘hatos’ preservan la distinción colectiva de צֹאן y בקר sin introducir tecnicismos innecesarios.
  - Se usó el pretérito perfecto compuesto (‘han sido’, ‘han traído’) para respetar el valor aspectual de los perfectos hebreos en el contexto narrativo.
