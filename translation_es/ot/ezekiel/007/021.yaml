translation:
  language: es
  text: Y lo entregaré en manos de extranjeros para saqueo, y a los malvados de la tierra[a] para botín; y lo profanarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'del país'. El hebreo puede significar 'tierra' o 'país' según el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: וּנְתַתִּיו
  english_pob_choice: And I will give it
  chosen_spanish: Y lo pondré
  alternatives_spanish:
  - Y lo entregaré
  - Y lo daré
  lexicon: HALOT
  rationale: נתן con sufijo de objeto y sujeto en primera persona expresa una entrega/dejar en manos de otros en discurso profético. En español, 'poner en mano de' comunica bien la transferencia de control sin sonar mecánico; 'dar' queda como opción más literal, pero aquí 'poner' se ajusta mejor a la colocación idiomática con 'en mano de'.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en mano de
  alternatives_spanish:
  - en la mano de
  - en poder de
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para dominio o control. 'En mano de' conserva la imagen bíblica tradicional y sigue siendo natural en español. 'En poder de' aclara el sentido, pero pierde la imagen corporal del original.
- source_word: הַזָּרִים
  english_pob_choice: foreigners
  chosen_spanish: extranjeros
  alternatives_spanish:
  - forasteros
  - extraños
  lexicon: HALOT
  rationale: זָרִים aquí designa a los de fuera, en contexto de invasión y despojo. 'Extranjeros' es claro en español moderno y corresponde mejor al valor contextual que 'extraños'.
- source_word: לָבַז
  english_pob_choice: for plunder
  chosen_spanish: para saqueo
  alternatives_spanish:
  - como saqueo
  - para despojo
  lexicon: HALOT
  rationale: בַז significa botín/plunder tomado por la fuerza. 'Saqueo' expresa bien el resultado de ser despojado y mantiene el paralelismo con 'botín' en la cola siguiente.
- source_word: וּלְרִשְׁעֵי הָאָרֶץ
  english_pob_choice: and to the wicked of the earth
  chosen_spanish: y a los perversos de la tierra
  alternatives_spanish:
  - y a los malvados de la tierra
  - y a los perversos de la tierra
  lexicon: HALOT
  rationale: רִשְׁעֵי = 'los impíos/perversos/malvados'. 'Perversos' conserva el matiz moral fuerte y la cadencia bíblica sin recurrir automáticamente a una formulación eclesiástica fija. הָאָרֶץ puede ser 'tierra' o 'país'; se mantiene 'tierra' para no estrechar indebidamente el alcance del hebreo.
- source_word: לְשָׁלָל
  english_pob_choice: for spoil
  chosen_spanish: para botín
  alternatives_spanish:
  - como botín
  - para despojo
  lexicon: HALOT
  rationale: שָׁלָל es el término paralelo a בַּז. 'Botín' es el equivalente más natural en español y preserva el paralelismo con 'saqueo' sin eliminar la duplicación semántica del hebreo.
- source_word: וְחִלְּלוּהָ
  english_pob_choice: and they will profane it
  chosen_spanish: y lo profanarán
  alternatives_spanish:
  - y lo profanarán
  - y lo contaminarán
  - y lo deshonrarán
  lexicon: HALOT
  rationale: חלל en el piel tiene el sentido de profanar/desecrar lo santo. 'Profanarán' conserva la fuerza sacrílega y el peso teológico de violar lo consagrado, que es central en Ezequiel.
theological_decisions:
- issue: Sentido de חלל en un contexto de santidad
  english_pob_reading: profane
  chosen_spanish_reading: profanarán
  alternative_spanish_readings:
  - contaminarán
  - desacralizarán
  - desecrarán
  rationale: En Ezequiel el juicio se describe a menudo como violación de lo santo. 'Profanarán' comunica mejor que el objeto no solo queda dañado, sino tratado como común o inviolado en su santidad.
  doctrine_reference: Preservar la carga teológica de santidad/profanación sin suavizarla.
- issue: Ambigüedad de הָאָרֶץ
  english_pob_reading: earth
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el país
  - la región
  rationale: El hebreo puede significar 'tierra' o 'país'. Se conserva 'tierra' en el texto principal para reflejar la amplitud del original y mantener la ambigüedad donde el contexto no obliga a restringirla.
  doctrine_reference: Preservar ambigüedad real del original sin sobreespecificar.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés y no introduce revisiones sustanciales: mantiene la doble pareja semántica ''saqueo/botín'', conserva la ambigüedad de הָאָרֶץ y traduce חלל con el peso teológico de ''profanar''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto lo exija; aquí no aparece el nombre divino explícito en el versículo.
  - '''Extranjeros'' y ''perversos'' reflejan el registro judicial de juicio y despojo sin modernizar en exceso.'
  - '''Profanarán'' conserva el matiz de santidad violada que el audit trail inglés prioriza.'
