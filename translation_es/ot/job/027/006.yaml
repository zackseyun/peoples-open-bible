revisions:
- from: Me aferro[a] a mi justicia y no la soltaré[b]; mi corazón no me reprende en todos mis días.
  to: Me aferro[a] a mi justicia y no la soltaré; mi corazón no me reprende[b] en ninguno de mis días.
  rationale: Se ajusta la expresión temporal final para reflejar con precisión el alcance negativo de מִיָּמָי en español natural, y se corrige la ubicación de la nota [b] para que ancle la cláusula que realmente comenta. También se afina la nota [a] para conservar más explícitamente la alternativa contextual ‘integridad’ documentada en la auditoría inglesa.
