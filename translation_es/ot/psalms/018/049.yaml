translation:
  language: es
  text: el que me rescata de mis enemigos[a]; sí, me elevas[b] por encima de los que se levantan contra mí; me libras del hombre violento[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi rescatador de mis enemigos». El hebreo abre con un participio usado como título para Dios.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «me exaltas por encima de los que se levantan contra mí».'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «de un hombre de violencia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְפַלְּטִי
  english_pob_choice: the one who rescues me
  chosen_spanish: el que me rescata
  alternatives_spanish:
  - mi rescatador
  - el que me libra
  lexicon: HALOT
  rationale: El participio hebreo funciona de manera sustantiva como designación de Dios. En español, "el que me rescata" conserva ese valor titular y suena natural sin convertirlo prematuramente en una forma verbal finita.
- source_word: מֵאֹיְבַי
  english_pob_choice: from my enemies
  chosen_spanish: de mis enemigos
  alternatives_spanish:
  - de mis adversarios
  - de quienes me odian
  lexicon: HALOT
  rationale: '"Enemigos" expresa con precisión el sentido básico de אֹיֵב en este contexto hostil. La preposición hebrea con מִן se vierte de forma idiomática como "de" en español.'
- source_word: אַף
  english_pob_choice: indeed
  chosen_spanish: sí
  alternatives_spanish:
  - también
  - incluso
  lexicon: HALOT
  rationale: Aquí אַף introduce intensificación y progresión. "Sí" funciona en español como refuerzo enfático breve, evitando que el lector oiga solo una suma coordinante.
- source_word: מִן קָמַי
  english_pob_choice: above those who rise against me
  chosen_spanish: por encima de los que se levantan contra mí
  alternatives_spanish:
  - sobre los que se levantan contra mí
  - más alto que los que se levantan contra mí
  lexicon: HALOT
  rationale: El verbo רום y la construcción con מִן favorecen una imagen de elevación/comparación. "Por encima de" conserva el matiz espacial y comparativo mejor que un simple "de".
- source_word: תְּרוֹמְמֵנִי
  english_pob_choice: you lift me up
  chosen_spanish: me exaltas
  alternatives_spanish:
  - me levantas
  - me elevas
  lexicon: HALOT
  rationale: El causativo de רום puede expresarse por elevación o exaltación. "Me exaltas" mantiene la relación semántica con lo alto y combina bien con la cláusula comparativa anterior.
- source_word: מֵאִישׁ חָמָס
  english_pob_choice: from the violent man
  chosen_spanish: del hombre violento
  alternatives_spanish:
  - de un hombre de violencia
  - del hombre de violencia
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente "de un hombre de violencia". En español, "hombre violento" preserva el singular masculino y la cualidad moral sin sonar artificioso; se mantiene la fuerza lexical de אִישׁ + חָמָס.
- source_word: תַּצִּילֵנִי
  english_pob_choice: you deliver me
  chosen_spanish: me libras
  alternatives_spanish:
  - me rescatas
  - me salvas
  lexicon: HALOT
  rationale: נצל suele significar librar o rescatar de peligro. "Me libras" distingue este verbo del primero (פלט) y es una fórmula natural en español bíblico contemporáneo.
theological_decisions:
- issue: Referencia a Dios en el participio inicial
  english_pob_reading: 'The verse addresses God directly, with the opening participle functioning as a divine epithet: ''the one who rescues me ... you lift me up ... you deliver me.'''
  chosen_spanish_reading: 'El verso se dirige directamente a Dios, con el participio inicial funcionando como un epíteto: "el que me rescata... me exaltas... me libras".'
  alternative_spanish_readings:
  - '"mi rescatador" como giro nominal'
  - subordinar el participio a una cláusula relativa más extensa
  rationale: La alternancia entre un participio sustantivado y verbos en segunda persona se conserva en español para respetar la estructura poética del hebreo y su cambio de foco hacia Dios como interlocutor.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Matiz de violencia en אִישׁ חָמָס
  english_pob_reading: Literally 'from a man of violence.'
  chosen_spanish_reading: Se conserva la imagen de un "hombre violento" como referencia a un opresor concreto y no se neutraliza a "persona".
  alternative_spanish_readings:
  - '"persona violenta"'
  - '"hombre de violencia"'
  rationale: El hebreo masculino singular es específico y la imagen refuerza la concreción del peligro. Mantener "hombre" evita perder ese dato gramatical y retórico.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
translation_notes:
  revision_awareness: Se revisó el rastro inglés y no se requieren cambios adicionales; la traducción sigue de cerca las decisiones léxicas y la alternancia poética del hebreo, manteniendo la lectura aprobada de alta concordancia.
  spanish_consistency_notes:
  - Se usa "rescata/libras" para distinguir פלט y נצל, en línea con la distinción léxica del POB inglés.
  - Se mantiene "hombre" para אִישׁ por consistencia con el criterio de precisión de género del proyecto.
  - '"Por encima de" conserva el componente comparativo/espacial de מִן con רום, sin convertirlo solo en un "de" literal.'
