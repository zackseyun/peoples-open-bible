translation:
  language: es
  text: Tú eres justo[a], Yahvé, y todas tus obras y todos tus caminos son misericordia y verdad, y tú juzgas un juicio verdadero y justo para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'justo'. El griego Δίκαιος puede traducirse como 'justo' o 'recto'; aquí se usa 'justo' por ser la forma más natural en esta oración de alabanza.
    reason: lexical_alternative
lexical_decisions:
- source_word: Δίκαιος
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - justo ante Dios
  lexicon: BDAG
  rationale: El adjetivo predicativo describe el carácter de Dios. En español, 'justo' comunica de manera natural la rectitud moral y judicial sin añadir una paráfrasis.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - Soberano
  lexicon: BDAG
  rationale: El destinatario es el nombre divino en oración; conforme al criterio del proyecto, se usa 'Yahvé' en el texto principal para no ocultar el nombre con una convención de sustitución.
- source_word: ἔργα
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - hechos
  - acciones
  lexicon: BDAG
  rationale: '''Obras'' es el equivalente bíblico más directo y mantiene el alcance amplio de todo lo que Dios hace.'
- source_word: ὁδοί
  english_pob_choice: ways
  chosen_spanish: caminos
  alternatives_spanish:
  - sendas
  - maneras de obrar
  lexicon: BDAG
  rationale: '''Caminos'' conserva el paralelismo bíblico y el sentido de la manera habitual de actuar de Dios.'
- source_word: ἐλεημοσύναι
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - misericordias
  - actos de misericordia
  - compasión
  lexicon: BDAG
  rationale: La POB inglesa opta por un valor amplio de misericordia; en español, 'misericordia' mantiene el plural semítico implícito en la construcción y evita restringirlo a limosnas o a una paráfrasis explicativa.
- source_word: ἀλήθεια
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - fidelidad
  lexicon: BDAG
  rationale: '''Verdad'' es la correspondencia más directa con el griego y preserva la pareja clásica ''misericordia y verdad''. ''Fidelidad'' queda como matiz alternativo, no como sustitución principal.'
- source_word: κρίσιν ἀληθινὴν καὶ δικαίαν
  english_pob_choice: true and righteous judgment
  chosen_spanish: un juicio verdadero y justo
  alternatives_spanish:
  - un juicio verdadero y recto
  - juicio auténtico y justo
  lexicon: BDAG
  rationale: Se conservan ambos adjetivos que modifican 'juicio'. 'Verdadero' y 'justo' reproducen de manera sobria la doble cualidad sin suavizarla ni expandirla interpretativamente.
- source_word: κρίνεις
  english_pob_choice: you judge
  chosen_spanish: tú juzgas
  alternatives_spanish:
  - tú dictas juicio
  - tú pronuncias sentencia
  lexicon: BDAG
  rationale: Verbo directo y transparente, adecuado para una alabanza orante dirigida a Dios.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por los siglos
  - eternamente
  lexicon: BDAG
  rationale: Expresa duración indefinida de forma natural en español y mantiene el valor idiomático del griego.
theological_decisions:
- issue: Si Κύριε debe aparecer como 'Señor' o como el nombre divino
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Señor Yahvé
  rationale: Aunque la POB inglesa traduce 'Lord' por convención, el proyecto español pide no enmascarar el nombre divino. Aquí la oración se dirige directamente a Yahvé, por lo que 'Yahvé' es la opción más transparente y coherente con la política terminológica.
  doctrine_reference: 'DOCTRINE.md: divine name transparency; preserve source-grounded naming.'
- issue: Cómo renderizar la pareja ἐλεημοσύναι καὶ ἀλήθεια
  english_pob_reading: mercy and truth
  chosen_spanish_reading: misericordia y verdad
  alternative_spanish_readings:
  - misericordias y verdad
  - misericordia y fidelidad
  rationale: La POB revisada acercó la redacción al griego sin expansión interpretativa. En español, 'misericordia y verdad' conserva la fórmula bíblica y el paralelo semántico sin convertir ἐλεημοσύναι en 'actos de misericordia' dentro del texto principal.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension; do not over-specify if the source remains broad.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que redujo la frase inglesa de 'acts of mercy and truth' a 'mercy and truth' para ceñirse más al griego. La versión española sigue esa línea y evita expandir la cláusula con explicaciones no presentes en el texto fuente.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para el nombre divino, conforme al criterio del proyecto.
  - '''Misericordia y verdad'' preserva la pareja del griego sin traducir ἐλεημοσύναι con un término más estrecho como ''limosnas''.'
  - '''Juicio verdadero y justo'' conserva los dos adjetivos del original y la solemnidad del cierre ''para siempre''.'
