base_translation:
  language: en
  yaml_path: translation/ot/numbers/007/061.yaml
  text: His offering was one silver plate[a], its weight one hundred thirty shekels, one silver basin of seventy shekels, according to the shekel of the sanctuary[c][b]; both of them full of fine flour mixed with oil for a grain offering.
  footnotes:
  - marker: a
    text: Or 'dish' for 'plate' (קַעֲרָה).
    reason: lexical_alternative
  - marker: b
    text: Or 'bowl' for 'basin' (מִזְרָק), a vessel used in sanctuary service.
    reason: lexical_alternative
  - marker: c
    text: '''By the shekel of the sanctuary'' means according to the sanctuary''s standard weight.'
    reason: cultural_note
