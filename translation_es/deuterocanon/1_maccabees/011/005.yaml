translation:
  language: es
  text: Y ellos informaron al rey de lo que Jonathan había hecho[a], para acusarlo; pero el rey guardó silencio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «para reprocharlo» o «para desacreditarlo». El verbo griego admite tanto censura o denigración como acusación formal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διηγήσαντο
  english_pob_choice: reported
  chosen_spanish: informaron
  alternatives_spanish:
  - relataron
  - contaron
  - dieron parte
  lexicon: LSJ
  rationale: El verbo griego implica referir o narrar algo; en este contexto de corte, «informaron» comunica bien que llevaron noticias al rey sin volver la frase demasiado literaria. Conserva el valor de comunicación dirigida a una autoridad.
- source_word: ἃ ἐποίησεν
  english_pob_choice: what Jonathan had done
  chosen_spanish: de lo que Jonathan había hecho
  alternatives_spanish:
  - de las cosas que Jonathan hizo
  - de lo que Jonathan hizo
  lexicon: LSJ
  rationale: La construcción relativa se refiere a las acciones de Jonathan. El pluscuamperfecto español refleja bien la secuencia narrativa y la referencia a hechos ya realizados antes del reporte al rey.
- source_word: εἰς τὸ ψογίσαι
  english_pob_choice: in order to accuse
  chosen_spanish: para acusarlo
  alternatives_spanish:
  - para reprocharle
  - para desacreditarlo
  - para echarle en cara
  lexicon: LSJ
  rationale: ψογίζω puede significar censurar, reprochar o desacreditar, además de acusar formalmente. En este contexto político ante un rey, «para acusarlo» expresa la intención hostil del informe y sigue de cerca la opción inglesa documentada.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a Jonathan
  lexicon: Greek grammar
  rationale: El pronombre remite naturalmente a Jonathan, ya nombrado de inmediato antes. En español, el clítico «lo» mantiene la fluidez y la referencia directa sin sobrecargar el texto.
- source_word: ἐσίγησεν
  english_pob_choice: kept silent
  chosen_spanish: guardó silencio
  alternatives_spanish:
  - calló
  - se quedó callado
  lexicon: LSJ
  rationale: El aoristo presenta la respuesta del rey como una no-respuesta concreta. «Guardó silencio» conserva esa fuerza narrativa y suena natural en español moderno y digno.
- source_word: ὁ βασιλεύς
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el soberano
  lexicon: LSJ
  rationale: Es la designación normal del personaje en este relato histórico. «El rey» es la traducción más directa y transparente.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto español sigue de cerca el griego y el trazado auditado en inglés, especialmente en la ambigüedad de ψογίζω y en el cierre narrativo con el silencio del rey.
  spanish_consistency_notes:
  - Se preserva el nombre «Jonathan» conforme al contexto canónico del libro.
  - Se mantiene un español sobrio y narrativo, sin introducir terminología eclesiástica ajena al pasaje.
  - El marcador de nota [a] aparece en el punto exacto donde se concentra la alternativa léxica de ψογίζω.
