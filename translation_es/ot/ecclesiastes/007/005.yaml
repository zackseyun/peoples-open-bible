translation:
  language: es
  text: Es mejor escuchar la reprensión[a] de un sabio que escuchar la canción de los necios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Escuchar» traduce aquí tanto לִשְׁמֹעַ como el participio שֹׁמֵעַ, para conservar en español el paralelismo verbal del hebreo. Otras posibilidades serían «oír» o «oír la canción de los necios», pero «escuchar» hace más explícita la idea de atender.
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: It is better
  chosen_spanish: Mejor es
  alternatives_spanish:
  - Es mejor
  lexicon: HALOT
  rationale: La construcción hebrea es comparativa y predicativa; en español, «Mejor es» conserva la concisión sapiencial sin volverla áspera.
- source_word: לִשְׁמֹעַ
  english_pob_choice: to hear
  chosen_spanish: escuchar
  alternatives_spanish:
  - oír
  - escuchar
  lexicon: HALOT
  rationale: El infinitivo expresa la acción preferible. «Escuchar» funciona bien con la idea de atender a una reprensión, y mantiene el paralelismo con el segundo miembro.
- source_word: גַּעֲרַת
  english_pob_choice: the rebuke
  chosen_spanish: la reprensión
  alternatives_spanish:
  - el reproche
  - la reprensión
  - el regaño
  lexicon: HALOT
  rationale: El sustantivo denota una corrección verbal severa. «Reprensión» conserva el tono de corrección sabia sin sonar demasiado coloquial.
- source_word: חָכָם
  english_pob_choice: a wise man
  chosen_spanish: del sabio
  alternatives_spanish:
  - de un hombre sabio
  - del hombre sabio
  lexicon: HALOT
  rationale: El hebreo es masculino singular; en español, «del sabio» suena natural y mantiene el contraste sapiencial sin perder la referencia masculina del original.
- source_word: שֹׁמֵעַ
  english_pob_choice: to hear
  chosen_spanish: escuchar
  alternatives_spanish:
  - oyendo
  - que oye
  - escuchar
  lexicon: HALOT
  rationale: Aunque la forma hebrea es participio («oyendo»), el español gana claridad y equilibrio comparativo repitiendo el infinitivo «escuchar», como hace el POB inglés.
- source_word: שִׁיר
  english_pob_choice: the song
  chosen_spanish: la canción
  alternatives_spanish:
  - el canto
  - la música
  lexicon: HALOT
  rationale: Aquí el sustantivo señala la expresión entretenida de los necios. «Canción» es directa y mantiene el contraste con «reprensión».
- source_word: כְּסִילִים
  english_pob_choice: of fools
  chosen_spanish: de los necios
  alternatives_spanish:
  - de los tontos
  - de los insensatos
  lexicon: HALOT
  rationale: «Necios» es una opción bíblica y clara para el rasgo moral e intelectual del término, más sobria que «tontos» y más natural en español de sabiduría.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «than for a man to hear» a «than to hear», eliminando un giro innecesario. La traducción española refleja ese ajuste y evita introducir un sujeto o complemento extra en el segundo miembro.
  spanish_consistency_notes:
  - Se mantiene un registro sapiencial sobrio y publicable.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes, ya que no aparece el Tetragrámaton ni lenguaje divino en el verso.
  - Se preserva el paralelismo comparativo sin añadir elementos interpretativos ajenos al hebreo.
