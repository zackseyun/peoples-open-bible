id: SNG.3.5
reference: Song of Songs 3:5
source:
  edition: WLC
  text: הִשְׁבַּ֨עְתִּי אֶתְ/כֶ֜ם בְּנ֤וֹת יְרוּשָׁלִַ֨ם֙ בִּ/צְבָא֔וֹת א֖וֹ בְּ/אַיְל֣וֹת הַ/שָּׂדֶ֑ה אִם תָּעִ֧ירוּ וְֽ/אִם תְּעֽוֹרְר֛וּ אֶת הָ/אַהֲבָ֖ה עַ֥ד שֶׁ/תֶּחְפָּֽץ־׀־־׃ס
translation:
  text: I adjure you[a], daughters of Jerusalem, by the gazelles or by the does of the field[b], that you not stir up or awaken love until it desires.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more traditionally, 'until it pleases.' The Hebrew literally has a feminine singular verb, agreeing with 'love'; some take the line more personally as 'until she pleases' or 'until he pleases.'
    reason: alternative_reading
  - marker: b
    text: The Hebrew likely refers literally to gazelles and does of the field; the wording may also echo 'hosts,' creating a poetic wordplay in the oath formula.
    reason: cultural_note
lexical_decisions:
- source_word: הִשְׁבַּעְתִּי
  chosen: I adjure you
  alternatives:
  - I put you under oath
  - I charge you
  lexicon: HALOT
  rationale: The Hiphil of שׁבע here means to place someone under oath or solemn charge. 'Adjure' preserves the formal, oath-like force better than the flatter 'charge,' while remaining idiomatic in this recurring refrain.
- source_word: בְּנוֹת יְרוּשָׁלִַם
  chosen: daughters of Jerusalem
  alternatives:
  - young women of Jerusalem
  - women of Jerusalem
  lexicon: HALOT
  rationale: A literal rendering preserves the poetic address and personified/corporate nuance. 'Daughters of Jerusalem' is established and fits the Song's style better than flattening to 'women' or 'young women'.
- source_word: בִּצְבָאוֹת אֹו בְּאַיְלוֹת הַשָּׂדֶה
  chosen: by the gazelles or by the does of the field
  alternatives:
  - by the gazelles and by the hinds of the field
  - by the wild gazelles or the female deer of the field
  lexicon: HALOT
  rationale: The phrase is best taken literally as an oath formula invoking animals, likely with poetic resonance. צְבָאוֹת here is not 'hosts' but a wordplay sounding like 'hosts'; the animal sense fits the parallel with אַיְלוֹת. 'Does' is clearer modern English than 'hinds.'
- source_word: אִם ... וְאִם
  chosen: do not
  alternatives:
  - that you not
  - lest you
  lexicon: HALOT
  rationale: In this oath context, אִם introducing the warning is idiomatically rendered as a prohibition in English rather than a wooden 'if.' This captures the force of the adjuration.
- source_word: תָּעִירוּ
  chosen: stir up
  alternatives:
  - rouse
  - awaken
  lexicon: HALOT
  rationale: Using 'stir up' for the first verb preserves the poetic pairing with the second verb and avoids redundant English when two cognate awakening verbs occur together.
- source_word: תְּעוֹרְרוּ
  chosen: awaken
  alternatives:
  - rouse
  - arouse
  lexicon: HALOT
  rationale: 'The Polel/intensive form is rendered with a second near-synonym to reflect the Hebrew''s emphatic parallelism: ''stir up or awaken.'''
- source_word: הָאַהֲבָה
  chosen: love
  lexicon: HALOT
  rationale: The noun is the ordinary Hebrew term for love. The context leaves open whether this is love as an experience, desire, or the beloved personified; 'love' best preserves that poetic ambiguity.
- source_word: עַד שֶׁתֶּחְפָּץ
  chosen: until it desires to do so
  alternatives:
  - until it pleases
  - until she pleases
  - until he pleases
  lexicon: HALOT
  rationale: The 3fs verb agrees grammatically with 'love' (a feminine noun). English cannot naturally preserve the feminine grammatical agreement without over-interpreting the referent, so 'it desires to do so' keeps the subject as 'love' and conveys volition more clearly than the traditional but potentially impersonal 'until it pleases.'
