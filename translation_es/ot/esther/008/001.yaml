translation:
  language: es
  text: En aquel día, el rey Asuero dio a la reina Ester la casa de Amán, el enemigo de los judíos, y Mardoqueo se presentó ante el rey, porque Ester había dado a conocer quién era él para ella[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «qué relación tenía con ella». El hebreo no especifica el vínculo en esta cláusula, aunque el contexto anterior identifica a Mardoqueo como pariente y tutor de Ester.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: On that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - Ese mismo día
  - En ese día
  lexicon: HALOT
  rationale: La expresión temporal hebrea introduce una escena puntual con valor deíctico. «En aquel día» mantiene ese valor y suena natural en español bíblico actual sin sobrecargarlo.
- source_word: נָתַן
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - entregó
  - concedió
  lexicon: HALOT
  rationale: El verbo básico נתן es «dar». Aquí describe la transferencia de la casa/propiedad de Amán a Ester; «dio» es la opción más directa y fiel.
- source_word: בֵּית הָמָן
  english_pob_choice: the house of Haman
  chosen_spanish: la casa de Amán
  alternatives_spanish:
  - la casa de Amán
  - la hacienda de Amán
  lexicon: HALOT
  rationale: En hebreo «casa» puede significar también casa-hogar, casa-dinastía o bienes/propiedad. Se conserva «casa» por fidelidad formal, dejando que el contexto amplíe el sentido sin adelantar una paráfrasis interpretativa.
- source_word: צֹרֵר הַיְּהוּדִים
  english_pob_choice: the enemy of the Jews
  chosen_spanish: el enemigo de los judíos
  alternatives_spanish:
  - el adversario de los judíos
  - el opresor de los judíos
  lexicon: HALOT
  rationale: צֹרֵר expresa hostilidad activa. «Enemigo» es el equivalente idiomático más claro en español y refleja bien la caracterización narrativa de Amán.
- source_word: וּמָרְדֳּכַי בָּא לִפְנֵי הַמֶּלֶךְ
  english_pob_choice: and Mordecai came before the king
  chosen_spanish: y Mardoqueo vino a la presencia del rey
  alternatives_spanish:
  - y Mardoqueo compareció ante el rey
  - y Mardoqueo entró en la presencia del rey
  lexicon: HALOT
  rationale: La construcción idiomática se conserva con «vino a la presencia del rey», que mantiene el acceso a la corte sin expandir innecesariamente el texto.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque
  lexicon: HALOT
  rationale: El conector causal introduce la razón de la presencia de Mardoqueo ante el rey. «Porque» es transparente en español y conserva la relación lógica del hebreo.
- source_word: הִגִּידָה
  english_pob_choice: had told
  chosen_spanish: había dado a conocer
  alternatives_spanish:
  - había contado
  - había informado
  - había hecho saber
  lexicon: HALOT
  rationale: El hifil de נגד tiene el sentido de declarar o hacer saber. «Había dado a conocer» conserva el matiz de revelación/información y mantiene el antecedente temporal respecto a la venida de Mardoqueo.
- source_word: מַה הוּא לָהּ
  english_pob_choice: what he was to her
  chosen_spanish: lo que él era para ella
  alternatives_spanish:
  - qué relación tenía con ella
  - quién era él para ella
  lexicon: HALOT
  rationale: El hebreo es elíptico y no especifica explícitamente el parentesco en esta cláusula. «Lo que él era para ella» preserva la ambigüedad del original y evita definir más de lo que el texto dice aquí.
theological_decisions:
- issue: Relación de Mardoqueo con Ester en la cláusula final
  english_pob_reading: what he was to her
  chosen_spanish_reading: lo que él era para ella
  alternative_spanish_readings:
  - qué relación tenía con ella
  - quién era él para ella
  rationale: La frase hebrea no nombra el vínculo exacto en este versículo; solo indica que Ester lo había dado a conocer. Se conserva esa indeterminación para no borrar la tensión lexical del texto ni imponer una precisión que el versículo no formula.
  doctrine_reference: Éxodo 3:14; principio de fidelidad semántica al texto base
translation_notes:
  revision_awareness: 'Se siguió el estado revisado más reciente del inglés POB: se mantuvo la estructura de dos cláusulas con «for» causal en la base auditada, trasladada al español con «porque». También se conservó la opción formal de «la casa de Amán» en vez de interpretar como «hacienda» o «patrimonio», siguiendo la cautela del texto inglés y el hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto solo cuando el hebreo contiene el nombre divino; este versículo no lo contiene.
  - Se mantiene «judíos» para הַיְּהוּדִים, conforme al patrón editorial del pasaje.
  - «Mardoqueo» y «Ester» siguen la forma española tradicional ampliamente reconocida y consistente con el registro bíblico.
  - La puntuación con coma antes de la cláusula causal refleja el enlace discursivo del hebreo y la cadencia del español bíblico contemporáneo.
