translation:
  language: es
  text: Allí están las maravillas de sus obras[a], todo género de ser viviente, y los grandes seres marinos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «y grandes/muy poderosos ...», con una frase final difícil; el paralelo griego dice «creación de seres marinos», que probablemente preserva el sentido buscado.'
    reason: alternative_reading
lexical_decisions:
- source_word: שם
  english_pob_choice: There are
  chosen_spanish: Allí están
  alternatives_spanish:
  - Allí hay
  - Allí se ven
  lexicon: HALOT
  rationale: El hebreo usa un adverbio locativo con fuerza existencial. En español, «Allí están» conserva el sentido de ubicación y presencia de manera natural y solemne.
- source_word: פלאות
  english_pob_choice: wonders
  chosen_spanish: maravillas
  alternatives_spanish:
  - prodigios
  - asombros
  lexicon: HALOT
  rationale: El sustantivo denota cosas extraordinarias o maravillosas. «Maravillas» reproduce bien ese valor y encaja con el paralelismo poético del verso.
- source_word: תמהי
  english_pob_choice: marvelous
  chosen_spanish: maravillosas
  alternatives_spanish:
  - asombrosas
  - admirables
  lexicon: HALOT
  rationale: La forma intensifica la idea de asombro. En español, «maravillosas» mantiene la repetición semántica sin sonar forzado.
- source_word: מעשהו
  english_pob_choice: his works
  chosen_spanish: sus obras
  alternatives_spanish:
  - su obra
  - sus hechos
  lexicon: HALOT
  rationale: El sufijo posesivo remite a Dios en el contexto de la alabanza a la creación. El plural «obras» sigue la revisión del inglés y refleja mejor el sentido colectivo del hebreo.
- source_word: מין כל חי
  english_pob_choice: every kind of living thing
  chosen_spanish: todo género de ser viviente
  alternatives_spanish:
  - toda clase de criatura viviente
  - toda especie de ser vivo
  lexicon: HALOT
  rationale: מין expresa clasificación o especie. «Todo género de ser viviente» conserva el valor categorial y suena digno en español bíblico moderno.
- source_word: וגבורות רבה
  english_pob_choice: the great sea-creatures
  chosen_spanish: la creación de los grandes seres marinos
  alternatives_spanish:
  - los grandes monstruos del mar
  - los grandes seres del mar
  lexicon: HALOT
  rationale: El hebreo transmitido es difícil; la tradición griega aclara que se trata de la creación de seres marinos/monstruos del mar. «Creación» mantiene el sustantivo griego κτίσις, y «grandes seres marinos» evita una elección demasiado interpretativa en el texto principal.
theological_decisions:
- issue: Uso de la versión griega para aclarar la clausula final hebrea difícil
  english_pob_reading: the great sea-creatures
  chosen_spanish_reading: la creación de los grandes seres marinos
  alternative_spanish_readings:
  - los grandes monstruos del mar
  - los grandes seres marinos
  rationale: El hebreo final es compacto y ambiguo, mientras que el paralelo griego dice explícitamente κτίσις κητῶν. La traducción española conserva esa ayuda textual sin ocultar que la frase es una reconstrucción contextual de la idea.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando se conserva, usando el paralelo griego como entrada real para Ben Sira cuando esté presente; preservar honestamente la incertidumbre textual.'
translation_notes:
  revision_awareness: La redacción sigue el acuerdo alto entre hebreo y griego y recoge la revisión inglesa que cambió "work" por "works" para reflejar mejor el plural del hebreo. En español se optó por «obras» en plural y por una clausula final que hace visible la ayuda del griego sin borrar la dificultad del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito mediante los posesivos y el contexto, sin introducir «Yahvé» porque el verso no contiene el nombre divino.
  - «Maravillas» y «maravillosas» conservan el paralelismo léxico del hebreo.
  - La expresión «ser viviente» evita reducir el hebreo a solo animales y preserva la amplitud clasificatoria.
  - La nota al pie indica la tensión textual sin duplicar la traducción principal.
