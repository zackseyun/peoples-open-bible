translation:
  language: es
  text: 'Y Yahvé me dijo: «Esta puerta permanecerá cerrada; no se abrirá, y nadie[a] entrará por ella, porque Yahvé, el Dios de Israel, ha entrado por ella. Por tanto, permanecerá cerrada».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice «ningún hombre», usando un sustantivo masculino singular con valor genérico.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: usar el nombre divino transliterado en español como «Yahvé», en lugar de sustituirlo por un título. Así se conserva el nombre personal del pacto.'
- source_word: הַשַּׁעַר הַזֶּה
  english_pob_choice: this gate
  chosen_spanish: esta puerta
  alternatives_spanish:
  - esta entrada
  - este portón
  lexicon: HALOT
  rationale: El referente es la puerta/portal del templo-visionario. «Puerta» es natural en español y comunica el mismo objeto arquitectónico que el inglés «gate».
- source_word: סָגוּר יִהְיֶה
  english_pob_choice: shall remain shut
  chosen_spanish: permanecerá cerrada
  alternatives_spanish:
  - estará cerrada
  - seguirá cerrada
  lexicon: HALOT
  rationale: La combinación adjetivo + יהיה expresa un estado continuado. «Permanecerá cerrada» reproduce bien la duratividad y evita una simple futura estática menos precisa en español.
- source_word: לֹא יִפָּתֵחַ
  english_pob_choice: it shall not be opened
  chosen_spanish: no será abierta
  alternatives_spanish:
  - no se abrirá
  lexicon: HALOT
  rationale: El nifal de פתח tiene sentido pasivo; en español, la pasiva perifrástica comunica con claridad que la puerta no recibirá la acción de abrirse.
- source_word: וְאִישׁ לֹא יָבֹא ב֔וֹ
  english_pob_choice: and no one shall enter through it
  chosen_spanish: y nadie entrará por ella
  alternatives_spanish:
  - y ningún hombre entrará por ella
  - y no entrará nadie por ella
  lexicon: HALOT
  rationale: אִישׁ tiene forma masculina singular pero aquí funciona con fuerza genérica. En español, «nadie» transmite con naturalidad la exclusión total sin perder el alcance general del hebreo; «por ella» mantiene el valor espacial de בּוֹ con una puerta.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: La conjunción introduce la razón de la clausura. «Porque» expresa de forma directa y transparente la causalidad del hebreo.
- source_word: יְהוָה אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: Yahweh, the God of Israel
  chosen_spanish: Yahvé, el Dios de Israel
  alternatives_spanish:
  - Yahvé, Dios de Israel
  - Yahvé, el Dios de Israel
  lexicon: HALOT
  rationale: 'Se preserva la aposición nominal con artículo para claridad en español: el nombre divino seguido del título pactal y nacional «el Dios de Israel». No se suaviza ni se sustituye por una fórmula tradicional que oculte el nombre.'
- source_word: בָּא ב֑וֹ
  english_pob_choice: has entered through it
  chosen_spanish: ha entrado por ella
  alternatives_spanish:
  - ha pasado por ella
  - ha entrado por ella
  lexicon: HALOT
  rationale: El perfecto hebreo presenta una acción completada con relevancia presente. «Ha entrado» conserva ese valor; «por ella» mantiene el complemento locativo de la puerta.
- source_word: וְהָיָה סָגֽוּר
  english_pob_choice: Therefore it shall remain shut
  chosen_spanish: Por tanto, permanecerá cerrada
  alternatives_spanish:
  - Y permanecerá cerrada
  - Así que permanecerá cerrada
  lexicon: HALOT
  rationale: El cierre final reitera el estado resultante. «Por tanto» hace explícita la relación lógica con la cláusula causal anterior, y «permanecerá cerrada» mantiene la repetición enfática de clausura.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se conserva el nombre propio de Dios según el criterio doctrinal del proyecto, evitando la sustitución por un título impersonal. Esto mantiene visible la identidad del pacto en el texto español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance genérico de אִישׁ
  english_pob_reading: no one
  chosen_spanish_reading: nadie
  alternative_spanish_readings:
  - ningún hombre
  - ninguna persona
  rationale: Aunque la forma hebrea es masculina singular, aquí funciona de manera genérica. En español, «nadie» comunica con naturalidad la exclusión universal sin introducir una restricción de género que el contexto no pretende enfatizar.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
- issue: Reiteración final de clausura
  english_pob_reading: Therefore it shall remain shut
  chosen_spanish_reading: Por tanto, permanecerá cerrada
  alternative_spanish_readings:
  - Y permanecerá cerrada
  - Así permanecerá cerrada
  rationale: La frase final no añade un contenido nuevo, sino que recalca el estado decretado. Se mantiene esa fuerza conclusiva sin volverla más interpretativa de lo que exige el hebreo.
  doctrine_reference: Ezequiel 44:2 — clausura permanente del acceso por la entrada por la que entró Yahvé
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el flujo del texto hebreo y el criterio auditado del POB inglés: estado durativo de la puerta, pasiva de «abrir», complemento espacial con la puerta y conclusión reiterativa. Se adapta a un español natural, pero conserva el nombre divino y la exclusión general del acceso sin neutralizar indebidamente el hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se traduce הַשַּׁעַר por «esta puerta» para un español más natural en el contexto del templo.
  - 'Se mantiene la progresión causal-conclusiva: «porque» / «Por tanto».'
  - La pasiva «no será abierta» preserva el valor del nifal.
  - El complemento «por ella» refleja el valor espacial de בוֹ con referencia a la puerta.
