translation:
  language: es
  text: 'David consultó a Dios[a], diciendo: «¿Debo subir contra los filisteos, y los entregarás en mis manos?». Y Yahvé le dijo: «Sube, y yo los entregaré en tus manos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, «¿los entregarás en mi poder?». El hebreo dice literalmente: «¿los darás en mi mano?».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁאַל
  english_pob_choice: inquired
  chosen_spanish: consultó
  alternatives_spanish:
  - preguntó
  - inquirió
  lexicon: HALOT
  rationale: El verbo aquí no expresa una simple pregunta casual, sino una búsqueda de dirección divina. En español, «consultó» comunica bien esa acción formal de buscar consejo de Dios sin sonar demasiado arcaico.
- source_word: בֵּאלֹהִים
  english_pob_choice: of God
  chosen_spanish: a Dios
  alternatives_spanish:
  - de Dios
  - con Dios
  lexicon: HALOT
  rationale: La construcción hebrea con שׁאל indica que la consulta se dirige a Dios. En español, «consultó a Dios» suena natural y conserva el sentido relacional del giro idiomático.
- source_word: הַאֶעֱלֶה
  english_pob_choice: Shall I go up
  chosen_spanish: ¿Debo subir?
  alternatives_spanish:
  - ¿Subiré?
  - ¿He de subir?
  lexicon: HALOT
  rationale: El hebreo usa el verbo עלה en contexto militar. «Subir» preserva la imagen verbal; «¿Debo subir?» expresa la pregunta de decisión con un español claro y solemne.
- source_word: עַל פלשתיים
  english_pob_choice: against the Philistines
  chosen_spanish: contra los filisteos
  alternatives_spanish:
  - a los filisteos
  - sobre los filisteos
  lexicon: HALOT
  rationale: El contexto bélico exige explicitar la oposición. «Contra los filisteos» transmite la fuerza del עַל militar sin perder naturalidad en español.
- source_word: וּנְתַתָּם בְּיָדִי
  english_pob_choice: will you give them into my hand
  chosen_spanish: los entregarás en mi mano
  alternatives_spanish:
  - los darás en mi mano
  - los pondrás en mi mano
  lexicon: HALOT
  rationale: El hebreo usa una imagen idiomática de dominio o victoria. «Entregar» comunica esa victoria de forma natural en español y mantiene la fuerza idiomática; «en mi mano» conserva la metáfora bíblica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio, siguiendo la política del proyecto de no sustituirlo por un título. «Yahvé» es la forma española estándar adoptada para el Tetragrámaton.
- source_word: עֲלֵה
  english_pob_choice: Go up
  chosen_spanish: Sube
  alternatives_spanish:
  - Ve
  - Asciende
  lexicon: HALOT
  rationale: El imperativo retoma el mismo verbo del ruego de David. «Sube» preserva la correspondencia verbal y funciona de manera natural en español.
- source_word: וּנְתַתִּים בְּיָדֶךָ
  english_pob_choice: I will give them into your hand
  chosen_spanish: yo los entregaré en tu mano
  alternatives_spanish:
  - yo los daré en tu mano
  - los pondré en tu mano
  lexicon: HALOT
  rationale: La respuesta divina repite la misma imagen de dominio. «Entregaré en tu mano» mantiene la simetría con la primera mitad del versículo y la metáfora hebrea.
theological_decisions:
- issue: Renderización del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo usa explícitamente el nombre del pacto. Se preserva como nombre propio, no como título, para mantener la transparencia textual y la política del POB.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Imagen idiomática de victoria «dar/entregar en la mano»
  english_pob_reading: give them into my/your hand
  chosen_spanish_reading: entregar los en mi/tu mano
  alternative_spanish_readings:
  - dar los en mi/tu mano
  - poner los en mi/tu mano
  rationale: La metáfora bíblica de dominio no se aplana a una explicación abstracta. Se conserva la imagen de la mano, con «entregar» para expresar el sometimiento implícito.
  doctrine_reference: Lexical idiom preserved; no separate doctrine issue
translation_notes:
  revision_awareness: El audit trail inglés revisó la pregunta a «Shall I go up», reforzando un registro más formal; por eso se eligió «¿Debo subir?» en vez de una forma más coloquial. También se mantuvo la simetría del giro idiomático «en mi mano / en tu mano» y la traducción del nombre divino como Yahvé, conforme a la política del proyecto.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo entre la petición de David y la respuesta de Yahvé.
  - Se evitó «SEÑOR» para יְהוָה conforme al estándar del proyecto.
  - «Filisteos» se escribió en minúscula por norma ortográfica española para etnónimos comunes.
  - La nota al pie se ancla en «mano» para preservar la alternativa idiomática sin perder la metáfora original.
