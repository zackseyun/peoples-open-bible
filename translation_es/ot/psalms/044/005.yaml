translation:
  language: es
  text: Tú eres mi Rey[a], Dios; ordena victorias para Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ordena liberaciones para Jacob» o «ordena salvaciones para Jacob».
