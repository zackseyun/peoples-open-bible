  - severity: low
    issue: '''conocía de antemano'' suena menos idiomático que ''sabía de antemano'' en este contexto'
    rationale: Ambas son posibles, pero con un objeto proposicional ('tanto a ellos como lo que estaba por venir') 'sabía de antemano' fluye mejor en español bíblico moderno sin alterar el sentido.
  - severity: low
