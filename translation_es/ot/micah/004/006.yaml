translation:
  language: es
  text: En aquel día[a], declara Yahvé, yo reuniré a la coja[b], y agruparé a la desterrada[c], incluso a la que he afligido[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en aquel tiempo». La fórmula hebrea es temporal y profética; «día» conserva el giro tradicional sin perder el sentido de tiempo señalado.
    reason: lexical_alternative
  - marker: b
    text: O «la que cojea». El hebreo usa un participio femenino singular con fuerza colectiva.
    reason: lexical_alternative
  - marker: c
    text: O «la expulsada» o «la arrojada fuera» para «la desterrada».
    reason: lexical_alternative
  - marker: d
    text: O «la que he hecho sufrir». El hebreo atribuye expresamente a Yahvé la aflicción previa.
    reason: theological_note
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: In that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - En aquel tiempo
  lexicon: HALOT
  rationale: Conserva la fórmula profética temporal fija sin volverla explicativa. «Aquel» mantiene el tono escatológico/profético que el inglés POB preserva con «In that day».
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: «נְאֻם» es fórmula de proclamación profética; «declara» conserva solemnidad y fuerza oracular en español. «Yahvé» sigue el criterio del proyecto para el nombre divino, en lugar de ocultarlo con una sustitución tradicional.
- source_word: אֹסְפָה
  english_pob_choice: I will gather
  chosen_spanish: yo reuniré
  alternatives_spanish:
  - yo juntaré
  - yo recogeré
  lexicon: HALOT
  rationale: «אָסַף» puede ser reunir/recoger/gather. «Reuniré» comunica bien la restauración de personas dispersas y evita una sonoridad demasiado material de «recogeré».
- source_word: הַצֹּלֵעָה
  english_pob_choice: the lame
  chosen_spanish: la coja
  alternatives_spanish:
  - la lisiada
  - la que cojea
  lexicon: HALOT
  rationale: El participio femenino singular tiene fuerza colectiva en contexto. «La coja» mantiene la imagen corporal directa; en español moderno puede sonar dura, pero es fiel y breve. Se conserva el matiz de debilidad/marcha dañada sin suavizarlo a una paráfrasis abstracta.
- source_word: וְהַנִּדָּחָה
  english_pob_choice: the outcast
  chosen_spanish: la desterrada
  alternatives_spanish:
  - la expulsada
  - la arrojada fuera
  lexicon: HALOT
  rationale: נִדָּח denota ser echado fuera/alejado. «Desterrada» expresa bien la condición de haber sido expulsada o apartada y es natural en español bíblico contemporáneo.
- source_word: אֲקַבֵּצָה
  english_pob_choice: I will assemble
  chosen_spanish: juntaré
  alternatives_spanish:
  - reuniré
  - agruparé
  lexicon: HALOT
  rationale: Se distingue de אֹסְפָה con un segundo verbo español cercano pero no idéntico. «Juntar» conserva el paralelismo intensivo de la acumulación de los dispersos sin volver mecánica la duplicación.
- source_word: וַאֲשֶׁר הֲרֵעֹתִי
  english_pob_choice: even those whom I have afflicted
  chosen_spanish: y a las que he afligido
  alternatives_spanish:
  - e incluso a las que he hecho sufrir
  - y a las que he causado dolor
  lexicon: HALOT
  rationale: «הֲרֵעֹתִי» en hifil de רעע atribuye directamente la aflicción al hablante divino. «Afligido» preserva esa agencia sin diluirla en un pasivo impersonal. Se mantiene el plural femenino por concordancia con la referencia colectiva femenina del hebreo.
theological_decisions:
- issue: Agencia divina explícita en «las que he afligido»
  english_pob_reading: 'Retain explicit first-person divine agency: ''those whom I have afflicted'''
  chosen_spanish_reading: 'Mantener la agencia divina explícita: «a las que he afligido»'
  alternative_spanish_readings:
  - a las que he dejado afligidas
  - a las que he permitido ser afligidas
  rationale: El hebreo atribuye directamente la aflicción a Yahvé; el español debe conservar esa tensión entre juicio y restauración, no suavizarla. «He afligido» refleja la forma verbal activa y mantiene la responsabilidad divina tal como la transmite el texto.
  doctrine_reference: Translation philosophy §3
- issue: Valor colectivo del femenino singular en «la coja» y «la desterrada»
  english_pob_reading: The Hebrew uses a feminine singular participle with collective force.
  chosen_spanish_reading: 'Usar femenino singular con valor colectivo: «la coja» y «la desterrada»'
  alternative_spanish_readings:
  - las cojas y las desterradas
  - el pueblo cojo y desterrado
  rationale: El hebreo presenta participios femeninos singulares con fuerza colectiva; el español singular también puede funcionar de manera colectiva y mantiene mejor la forma breve y la textura del original. Traducir directamente al plural o a un sustantivo colectivo explicaría en exceso.
  doctrine_reference: Source-based syntax note
translation_notes:
  revision_awareness: 'Pasaje revisado y concordante con el cierre de auditoría: no se requerían cambios tras la última pasada; se mantuvo la solución que preserva la fórmula profética, el paralelismo verbal y la agencia divina explícita.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se usa «afligido»/«afligidas» en sentido activo de juicio divino, no como mera permisión.
  - Se conservan participios femeninos singulares con valor colectivo, como reflejo de la sintaxis hebrea.
  - Se distingue entre «reuniré» y «juntaré» para reflejar los dos verbos hebreos próximos sin borrar su paralelismo.
