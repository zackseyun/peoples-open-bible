review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia básica del hebreo: Jonatán sube, su escudero va detrás, los enemigos caen delante de Jonatán, y el escudero los mata detrás/tras él. Sin embargo, «sobre sus manos y sus pies» suena poco natural en español y no expresa bien la postura corporal; «apoyándose en sus manos y sus pies» o similar preserva mejor el sentido. Además, «tras él» al final es algo ambiguo en español; conviene mantener la relación espacial/secuencial con una formulación más clara.'
  spanish_quality_summary: 'El texto es mayormente fiel y digno, pero presenta dos problemas de legibilidad: 1) «sobre sus manos y sus pies» es un calco poco idiomático; 2) «los mató tras él» suena rígido y puede resultar oscuro. Una pequeña revisión mejora la naturalidad sin perder literalidad.'
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. «Jonatán» y «escudero» están bien. La nota con «a cuatro patas» como alternativa es apropiada, pero el texto principal debe evitar el calco innecesario.
  issues:
  - severity: medium
    issue: «sobre sus manos y sus pies» es un calco poco natural
    rationale: El hebreo עַל יָדָיו וְעַל רַגְלָיו describe la postura física al subir, pero en español «sobre sus manos y sus pies» suena forzado. «Apoyándose en sus manos y sus pies» conserva la imagen corporal y lee mejor.
  - severity: medium
    issue: «los mató tras él» es ambiguo y rígido
    rationale: Aunque busca reflejar el segundo אַחֲרָיו, en español «tras él» no deja claro con suficiente naturalidad que el escudero iba detrás de Jonatán matando a los caídos. «los mataba detrás de él» preserva mejor la escena; además recoge bien la fuerza participial señalada en la nota inglesa.
  - severity: low
    issue: «Ellos cayeron» suena algo innecesariamente enfático
    rationale: El pronombre explícito no es incorrecto, pero «cayeron» es más natural en narrativa española y sigue siendo fiel al verbo hebreo.
