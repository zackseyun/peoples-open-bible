lexical_decisions:
- source_word: וְ/אַתָּה
  english_pob_choice: But you
  chosen_spanish: Pero tú
  alternatives_spanish:
  - Y tú
  - Mas tú
  lexicon: HALOT
  rationale: La conjunción al inicio introduce un contraste fuerte con lo anterior; en español, «Pero tú» comunica de forma natural ese giro adversativo sin perder el énfasis del pronombre independiente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», conforme al criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: תִּשְׂחַק
  english_pob_choice: laugh
  chosen_spanish: te ríes
  alternatives_spanish:
  - ríes
  - te burlas
  lexicon: HALOT
  rationale: El verbo básico es «reír». En español, «te ríes de ellos» mantiene la imagen concreta del texto hebreo y suena natural en la construcción con complemento de persona.
- source_word: לָ/מוֹ
  english_pob_choice: at them
  chosen_spanish: de ellos
  alternatives_spanish:
  - contra ellos
  - de ellos todos
  lexicon: HALOT
  rationale: El complemento con ל más sufijo se expresa de manera idiomática en español con «de ellos» cuando el verbo es «reírse de».
- source_word: תִּלְעַג
  english_pob_choice: mock
  chosen_spanish: te burlas
  alternatives_spanish:
  - te mofás
  - te escarneces
  lexicon: HALOT
  rationale: El verbo denota burla o escarnio; «te burlas» conserva el tono despectivo de manera clara y contemporánea.
- source_word: לְ/כָל גּוֹיִם
  english_pob_choice: all the nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todas las naciones de la tierra
  - todos los pueblos
  lexicon: HALOT
  rationale: גּוֹיִם se traduce aquí por «naciones», el sentido más directo en este contexto poético; se mantiene la universalidad con «todas».
