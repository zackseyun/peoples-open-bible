translation:
  language: es
  text: 'Y yo dije[a]: «¡Cómo te pondría entre los hijos y te daría una tierra deseable, una hermosa herencia[b] entre las huestes de las naciones!». Y dije: «Me llamarán: “Padre mío”, y no se apartarán de seguirme».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más ampliamente, «entre los descendientes»; el hebreo dice literalmente «entre los hijos».
    reason: lexical_alternative
  - marker: b
    text: El hebreo de esta frase es difícil; también puede entenderse como «una herencia gloriosa entre las naciones» o «la herencia espléndida de las naciones».
    reason: alternative_reading
lexical_decisions:
- source_word: אֵיךְ
  english_pob_choice: How I would
  chosen_spanish: ¡Cómo te pondría
  alternatives_spanish:
  - ¡Cómo podría ponerte
  - ¡Cómo te colocaría
  lexicon: HALOT
  rationale: La forma exclamativa deliberativa de אֵיךְ en este contexto expresa intención/aspiración divina recordada. «Cómo te pondría» conserva ese matiz reflexivo sin convertirlo en una mera pregunta ni en una formulación demasiado interpretativa.
- source_word: אֲשִׁיתֵךְ בַּבָּנִים
  english_pob_choice: set you among the children
  chosen_spanish: te pondría entre los hijos
  alternatives_spanish:
  - te pondría entre los niños
  - te pondría entre los hijos míos
  lexicon: HALOT
  rationale: «שׁית» es 'poner/colocar'. «Entre los hijos» conserva la imagen hebrea de בנים y la relación filial implícita. Se evita «niños» porque en español aquí no comunica con precisión la dimensión de filiación/adopción; «hijos» mantiene mejor la fuerza del término bíblico.
- source_word: אֶרֶץ חֶמְדָּה
  english_pob_choice: a desirable land
  chosen_spanish: una tierra deseable
  alternatives_spanish:
  - una tierra agradable
  - una tierra deleitosa
  - una tierra preciosa
  lexicon: HALOT
  rationale: חמדה denota algo deseable, preciado o deleitoso. «Deseable» es suficientemente directo y conserva el valor semántico sin cargarlo de una interpretación estética exclusiva.
- source_word: נַחֲלַת צְבִי צִבְאוֹת גּוֹיִם
  english_pob_choice: a beautiful inheritance of the hosts of nations
  chosen_spanish: una herencia hermosa entre las naciones
  alternatives_spanish:
  - una gloriosa herencia entre las naciones
  - la herencia hermosa de los ejércitos de las naciones
  - una herencia espléndida entre las naciones
  lexicon: HALOT
  rationale: La frase hebrea es difícil y comprimida. La revisión inglesa evitó «armies» y prefirió una lectura menos engañosa. En español, «herencia hermosa entre las naciones» mantiene la idea de valor/splendor de צבי y el marco de גויים sin forzar una reconstrucción excesivamente técnica del sintagma.
- source_word: אָבִי תקראו לי
  english_pob_choice: You will call me, “My Father,”
  chosen_spanish: 'Me llamarás: “Padre mío”'
  alternatives_spanish:
  - 'Me llamaréis: “Padre mío”'
  - Me llamarás “Padre mío”
  - 'Me invocarás: “Padre mío”'
  lexicon: HALOT
  rationale: קרא con ל puede expresar llamar a/alguien o dirigirse a él. En este contexto filial, «Me llamarás» transmite bien el acto de dirigirse a Dios con esa confesión. «Padre mío» preserva la relación personal y la formula tradicionalmente reconocible sin suavizar el contenido.
- source_word: וּמֵאַחֲרַי לֹא תשובו
  english_pob_choice: you will not turn away from following me
  chosen_spanish: y no te apartarás de seguirme
  alternatives_spanish:
  - y no volverás de ir en pos de mí
  - y no te volverás atrás de mí
  - y no dejarás de seguirme
  lexicon: HALOT
  rationale: La expresión idiomática «de después de/desde detrás de» comunica dejar de seguir. «No te apartarás de seguirme» conserva la metáfora de seguimiento y su fuerza de fidelidad covenantal en un español natural.
theological_decisions:
- issue: Valor filial de בַּבָּנִים en el contexto de restauración
  english_pob_reading: among the children
  chosen_spanish_reading: entre los hijos
  alternative_spanish_readings:
  - entre los niños
  - entre los hijos míos
  rationale: Se mantiene el sustantivo masculino plural para reflejar la forma hebrea y la imagen de adopción/restauración. En español, «hijos» comunica filiación de manera clara y evita diluir la precisión del texto fuente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sintagma difícil de נַחֲלַת צְבִי צִבְאוֹת גּוֹיִם
  english_pob_reading: a beautiful inheritance of the hosts of nations
  chosen_spanish_reading: una herencia hermosa entre las naciones
  alternative_spanish_readings:
  - una gloriosa herencia entre las naciones
  - una herencia espléndida entre las naciones
  rationale: La frase hebrea admite más de una lectura y la revisión inglesa ya señala el problema. En vez de resolver la ambigüedad con una reconstrucción demasiado específica, el español sigue una formulación amplia y natural que preserva el sentido de valor/splendor y el marco entre las naciones.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: La redacción española sigue de cerca la revisión inglesa más reciente, que prefirió «children» frente a «sons» y evitó la imagen potencialmente engañosa de «armies» en el sintagma final. A la vez, se reabre la tensión del hebreo en la nota sobre נַחֲלַת צְבִי צִבְאוֹת גּוֹיִם, manteniendo una traducción publicable sin borrar la dificultad textual/lexical documentada.
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando el texto requiere el nombre divino; en este versículo no aparece explícitamente.
  - Se mantiene «hijos» para בנים por fidelidad al género gramatical hebreo y por naturalidad bíblica en español.
  - «Seguirme» conserva el valor relacional de ir en pos de alguien, más que una mera obediencia abstracta.
  - Se evita «Cristo» y otros términos no presentes en el original.
  - La puntuación española usa comillas angulares solo como estilo editorial interno; la cita bíblica puede ajustarse al formato de serie del proyecto.
