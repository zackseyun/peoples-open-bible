lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos de
  lexicon: HALOT
  rationale: En un registro genealógico y de listas como Esdras 2, בְּנֵי introduce un grupo de linaje o clan. En español, «los hijos de» conserva la estructura formal del hebreo y refleja adecuadamente la pertenencia genealógica sin sobreinterpretar el término.
- source_word: בִגְוָי
  english_pob_choice: Bigvai
  chosen_spanish: Bigvai
  alternatives_spanish:
  - Bigvay
  lexicon: HALOT
  rationale: Es nombre propio de persona/clan; se translitera para mantener la correspondencia con el original y con el audit trail en inglés.
- source_word: אַלְפַּיִם
  english_pob_choice: two thousand
  chosen_spanish: dos mil
  alternatives_spanish:
  - dos mil exactamente
  lexicon: HALOT
  rationale: El numeral hebreo indica «dos mil»; en español se expresa de forma directa y natural en una lista censal.
- source_word: חֲמִשִּׁים
  english_pob_choice: fifty
  chosen_spanish: cincuenta
  alternatives_spanish:
  - '50'
  lexicon: HALOT
  rationale: Se traduce el cardinal con el equivalente normal en español, manteniendo el valor numérico del texto fuente.
- source_word: וְשִׁשָּׁה
  english_pob_choice: and six
  chosen_spanish: y seis
  alternatives_spanish:
  - más seis
  lexicon: HALOT
  rationale: Conserva la secuencia aditiva del hebreo. En español, la suma implícita queda clara como parte de la cifra total, sin perder la forma numérica del original.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alto acuerdo; no se registran revisiones aplicadas. Se preserva la suma hebrea en nota, mientras el texto principal presenta la cifra total idiomática en español.
  spanish_consistency_notes:
  - Se usa «hijos de» para mantener el patrón genealógico frecuente en Esdras-Nehemías.
  - Se conserva el nombre propio «Bigvai» sin adaptación fonética adicional para uniformidad con el corpus.
  - La cifra principal se expresa como total («dos mil cincuenta y seis»), y la nota deja visible la forma aditiva del hebreo.
