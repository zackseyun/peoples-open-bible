review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general y el sentido del hebreo: protección frente al "azote de la lengua" y ausencia de temor ante la destrucción cuando llegue. Sin embargo, la preposición inicial בְּ/ en esta construcción idiomática no se vierte bien con "En el azote"; el inglés auditado entiende correctamente el sentido protector como "from the lash," y en español debe expresarse como "Del azote... serás escondido" o equivalente. Además, תֵּחָבֵא es mejor como pasiva/reflexiva de estado protegido que como acción media "te esconderás", que sugiere que la persona se oculta por sí misma.'
  spanish_quality_summary: El español es claro, pero "En el azote de la lengua" suena poco natural y semánticamente desorienta. "Te esconderás" también introduce una agencia no presente en el nifal. Una revisión menor mejora fidelidad y legibilidad sin perder dignidad bíblica.
  glossary_alignment: No hay conflictos con la terminología global del proyecto. "La lengua", "destrucción" y "cuando venga" encajan bien. La metáfora hebrea debe conservarse, pero con una preposición y voz verbal más naturales en español.
  issues:
  - severity: medium
    issue: '"En el azote de la lengua" no expresa bien el valor contextual de la frase preposicional inicial.'
    rationale: Aunque בְּ literalmente es "en", aquí con תֵּחָבֵא y el contexto de protección el sentido es 'del/contra el azote de la lengua', como reconoce el POB inglés con "from the lash".
  - severity: medium
    issue: '"Te esconderás" introduce agencia reflexiva no marcada por el nifal.'
    rationale: תֵּחָבֵא significa 'serás escondido/estarás oculto', no primariamente 'te esconderás'. La forma actual puede sugerir auto-ocultamiento en vez de protección recibida.
  - severity: low
    issue: La nota a necesita pequeño ajuste de redacción.
    rationale: 'Conviene español más natural: "Habla abusiva o difamatoria" en vez de "discurso abusivo o difamatorio".'
  revised_spanish_text: Del azote de la lengua[a] serás escondido, y no temerás la destrucción[b] cuando venga.
