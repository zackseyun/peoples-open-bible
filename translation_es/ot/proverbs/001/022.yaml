translation:
  language: es
  text: ¿Hasta cuándo, oh simples[a], amarán la ingenuidad[b]? ¿Hasta cuándo los burladores se deleitarán en la burla y los necios aborrecerán el conocimiento?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ingenuos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿Hasta cuándo, oh ingenuos, amarán su simpleza?». El hebreo hace un juego de palabras entre «simples» y «la ingenuidad»; también puede expresarse con términos afines como «simpleza».'
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּתָיִם
  english_pob_choice: simple ones
  chosen_spanish: simples
  alternatives_spanish:
  - personas simples
  - ingenuos
  lexicon: HALOT
  rationale: En Proverbios, el término designa a los inexpertos o moralmente sin formación; «simples» conserva la categoría sapiencial y permite el vocativo directo sin volverlo demasiado explicativo.
- source_word: תְּאֵהֲבוּ
  english_pob_choice: will you love
  chosen_spanish: amarán
  alternatives_spanish:
  - amarán ustedes
  - seguirán amando
  lexicon: HALOT
  rationale: 'El imperfecto en esta reprensión expresa una disposición continua; en español, el futuro mantiene bien el valor de amonestación: «¿Hasta cuándo... amarán...?».'
- source_word: פֶתִי
  english_pob_choice: simplicity
  chosen_spanish: la simpleza
  alternatives_spanish:
  - la simplicidad
  - la ingenuidad
  lexicon: HALOT
  rationale: «Simpleza» conserva el eco léxico con «simples» mejor que «ingenuidad», y en español suena natural en un contexto de sabiduría. Mantiene el juego de palabras del hebreo entre el plural vocativo y el sustantivo abstracto.
- source_word: לֵצִים
  english_pob_choice: scoffers
  chosen_spanish: burladores
  alternatives_spanish:
  - escarnecedores
  - mofadores
  lexicon: HALOT
  rationale: «Burladores» comunica la actitud de desprecio altivo propia de este tipo sapiencial. Aunque «escarnecedores» es posible, «burladores» resulta más claro y fluido para lectores contemporáneos.
- source_word: לָצוֹן
  english_pob_choice: scoffing
  chosen_spanish: la burla
  alternatives_spanish:
  - el escarnio
  - la mofa
  lexicon: HALOT
  rationale: Se preserva la relación cognada con «burladores» mediante «burla». En español, este sustantivo expresa bien la conducta de burla provocadora que el texto condena.
- source_word: חָמְדוּ
  english_pob_choice: delight in
  chosen_spanish: se deleitarán en
  alternatives_spanish:
  - tomarán placer en
  - desearán
  lexicon: HALOT
  rationale: El verbo aquí implica gusto o complacencia en una conducta, no solo deseo abstracto. «Se deleitarán en» conserva esa fuerza volitiva y el paralelismo del verso.
- source_word: לָהֶם
  english_pob_choice: for themselves
  chosen_spanish: —
  alternatives_spanish:
  - para sí
  lexicon: HALOT
  rationale: El inglés auditado omitió la expresión por ser idiomática y redundante en el paralelismo. En español también se omite para evitar pesadez, sin perder el sentido del verso.
- source_word: כְסִילִים
  english_pob_choice: fools
  chosen_spanish: necios
  alternatives_spanish:
  - insensatos
  - torpes
  lexicon: HALOT
  rationale: En literatura sapiencial, «necios» es la categoría moral establecida y no solo una etiqueta intelectual. Mantiene la serie tradicional del libro con un registro natural en español.
- source_word: יִשְׂנְאוּ
  english_pob_choice: hate
  chosen_spanish: aborrecerán
  alternatives_spanish:
  - odiarán
  - rechazarán
  lexicon: HALOT
  rationale: «Aborrecer» conserva la fuerza fuerte de la oposición moral y suena apropiado en español bíblico moderno. «Odiarán» también sería posible, pero «aborrecerán» ofrece un tono más literario sin debilitar el sentido.
- source_word: דָעַת
  english_pob_choice: knowledge
  chosen_spanish: el conocimiento
  alternatives_spanish:
  - el saber
  - la ciencia
  lexicon: HALOT
  rationale: «Conocimiento» es la equivalencia más directa y mantiene el sentido sapiencial de la palabra en Proverbios. «Saber» sería posible, pero aquí suena menos preciso en una admonición ética.
theological_decisions:
- issue: Categorías sapienciales morales
  english_pob_reading: Retain the traditional moral categories 'simple ones,' 'scoffers,' and 'fools' rather than flattening them into generic psychological descriptions.
  chosen_spanish_reading: Conservar las categorías morales «simples», «burladores» y «necios» sin reducirlas a meras descripciones psicológicas.
  alternative_spanish_readings:
  - personas ingenuas, burlones y personas necias
  - gente inexperta, mofadores y torpes
  rationale: El verso forma parte del lenguaje recurrente de Proverbios para tipos morales, no de una tipología psicológica técnica. Mantener esas etiquetas favorece la coherencia del libro y preserva el peso admonitorio del texto.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
- issue: Repetición retórica de «¿Hasta cuándo?»
  english_pob_reading: The English revised the second clause to reflect the implied repeated 'how long.'
  chosen_spanish_reading: Repetir «¿Hasta cuándo?» en la segunda cola para reflejar mejor la estructura retórica hebrea.
  alternative_spanish_readings:
  - ¿Hasta cuándo los burladores se deleitarán en la burla y los necios aborrecerán el conocimiento?
  - ¿Hasta cuándo... y hasta cuándo...?
  rationale: El hebreo presenta una serie de preguntas retóricas. La repetición en español hace visible el paralelismo y evita que la segunda mitad parezca una continuación meramente descriptiva.
  doctrine_reference: Translation philosophy §4 (Poetic parallelism and rhetorical force)
translation_notes:
  revision_awareness: 'La revisión inglesa reciente recastó la segunda cláusula para reflejar el «hasta cuándo» implícito, eliminó una expresión demasiado literal y reforzó el paralelismo. Esta versión española sigue esa lectura revisada: repite la pregunta retórica, omite el dativo idiomático redundante y conserva la serie sapiencial de vocativos y verbos fuertes.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma de la serie española, aunque este verso no lo contiene.
  - Se conserva «simples / simpleza» para reproducir el juego de palabras del hebreo.
  - Se eligió un español digno y contemporáneo, evitando calcos innecesarios y sin suavizar la reprensión del texto.
  - «Burladores» y «necios» se usan como categorías sapienciales fijas para mantener consistencia con Proverbios.
