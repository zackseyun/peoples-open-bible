  yaml_path: translation/ot/exodus/010/015.yaml
  text: And it covered the face of the whole land[a], so that the land was darkened; and it ate every plant of the land and all the fruit of the trees that the hail had left. No green thing remained on the trees or on the plants of the field in all the land of Egypt.
  footnotes:
