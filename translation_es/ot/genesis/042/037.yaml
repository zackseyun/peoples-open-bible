translation:
  language: es
  text: 'Entonces Rubén dijo a su padre: «Harás morir a mis dos hijos si no te lo traigo de vuelta. Ponlo en mi mano[a], y yo mismo te lo devolveré».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Confíaselo a mí»; literalmente, «Ponlo en mi mano».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» conserva la secuencia de manera natural en español sin perder el valor discursivo.
- source_word: רְאוּבֵן
  english_pob_choice: Reuben
  chosen_spanish: Rubén
  alternatives_spanish:
  - Reubén
  lexicon: nombre propio bíblico
  rationale: Se usa la forma asentada en español bíblico amplio, manteniendo la identificación clara del personaje.
- source_word: אֶל אָבִיו
  english_pob_choice: to his father
  chosen_spanish: a su padre
  alternatives_spanish:
  - a su propio padre
  lexicon: HALOT
  rationale: La relación posesiva está suficientemente expresada con «su padre»; «propio» sería posible, pero no necesario.
- source_word: אֶת שְׁנֵי בָנַי תָּמִית
  english_pob_choice: You may put my two sons to death
  chosen_spanish: A mis dos hijos harás morir
  alternatives_spanish:
  - Harás morir a mis dos hijos
  - Matarás a mis dos hijos
  lexicon: HALOT
  rationale: El causativo de מות pide una construcción causativa en español. «Harás morir» conserva con mayor fidelidad el valor verbal que una simple traducción directa con «matarás».
- source_word: אִם לֹא אֲבִיאֶנּוּ אֵלֶיךָ
  english_pob_choice: if I do not bring him back to you
  chosen_spanish: si no lo traigo de vuelta a ti
  alternatives_spanish:
  - si no lo llevo de vuelta a ti
  - si no lo devuelvo a ti
  lexicon: HALOT
  rationale: El contexto exige la idea de regreso seguro, no solo de traslado. «Traigo de vuelta» conserva el matiz de retorno del verbo causativo.
- source_word: תְּנָה אֹתוֹ עַל יָדִי
  english_pob_choice: Put him in my hand
  chosen_spanish: Entrégalo en mi mano
  alternatives_spanish:
  - Ponlo en mi mano
  - Entrúgalo a mí
  lexicon: HALOT
  rationale: La imagen concreta de la mano se mantiene, pero en español «entrégalo en mi mano» resulta más natural y conserva la fuerza idiomática del hebreo. La alternativa más interpretativa «Entrégalo a mí» quedaría menos precisa para el audito léxico.
- source_word: וַאֲנִי
  english_pob_choice: and I myself
  chosen_spanish: y yo mismo
  alternatives_spanish:
  - y yo
  lexicon: HALOT
  rationale: El pronombre explícito es enfático; «yo mismo» reproduce esa intensificación de manera natural.
- source_word: אֲשִׁיבֶנּוּ אֵלֶיךָ
  english_pob_choice: will bring him back to you
  chosen_spanish: lo devolveré a ti
  alternatives_spanish:
  - lo traeré de vuelta a ti
  - lo haré volver a ti
  lexicon: HALOT
  rationale: El Hiphil de שוב expresa hacer volver/traer de vuelta. «Devolveré» condensa bien la promesa de retorno al destinatario, aunque las otras opciones también reflejan el valor causativo.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés de la POB: se preservó la secuencia narrativa, el énfasis del pronombre, la fuerza causativa de los verbos hebreos y el modismo de la mano. Se ajustó el español para que suene publicable sin perder las tensiones léxicas documentadas.'
  spanish_consistency_notes:
  - Se mantuvo «Rubén» como forma española estándar del nombre.
  - Se evitó «SEÑOR» u otras convenciones no pertinentes; no hay teonimia en este versículo.
  - «A mis dos hijos harás morir» conserva la fuerza causativa del hebreo mejor que una simple paráfrasis.
  - La nota al pie acompaña la expresión idiomática de la mano, que es el punto léxico principal de alternativa documentada.
