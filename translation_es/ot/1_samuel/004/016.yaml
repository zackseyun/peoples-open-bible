translation:
  language: es
  text: 'El hombre dijo a Elí[a]: «Yo soy el que vino del frente de batalla, y hoy huí del frente de batalla». Y él dijo: «¿Qué pasó, hijo mío?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse “de la batalla”, “de las filas” o “del campamento”; el término hebreo se refiere a una disposición o formación militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאִישׁ
  english_pob_choice: The man
  chosen_spanish: El hombre
  alternatives_spanish:
  - el mensajero
  lexicon: HALOT
  rationale: El sustantivo hebreo es el término común para “hombre”. Aunque el contexto lo identifica como un mensajero que viene del frente, el texto no usa aquí un término técnico para “mensajero”; por eso se conserva “el hombre”.
- source_word: הַבָּא
  english_pob_choice: the one who came
  chosen_spanish: el que ha venido
  alternatives_spanish:
  - el que viene
  - el que vino
  lexicon: HALOT
  rationale: El participio con אָנֹכִי funciona de manera sustantiva para identificar al hablante. En español, “el que ha venido” expresa bien la llegada ya realizada y suena natural en el contexto.
- source_word: מִן הַמַּעֲרָכָה
  english_pob_choice: from the battle line
  chosen_spanish: de la línea de batalla
  alternatives_spanish:
  - de la batalla
  - de las filas
  - del campamento
  lexicon: HALOT
  rationale: מַעֲרָכָה puede referirse a una formación o disposición militar. “Línea de batalla” conserva mejor esa idea de orden de combate que el más general “batalla”.
- source_word: נַסְתִּי
  english_pob_choice: I fled
  chosen_spanish: huí
  alternatives_spanish:
  - escapé
  - salí corriendo
  lexicon: HALOT
  rationale: El verbo נוּס significa huir. “Huí” es la correspondencia más directa y conserva la fuerza del movimiento de fuga.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: La referencia temporal se expresa de forma natural y exacta con “hoy”.
- source_word: מֶה הָיָה הַדָּבָר
  english_pob_choice: What happened
  chosen_spanish: ¿Qué ha pasado?
  alternatives_spanish:
  - ¿Qué sucedió?
  - ¿Qué fue el asunto?
  - ¿Qué ocurrió?
  lexicon: HALOT
  rationale: Literalmente, la expresión pregunta qué fue el “asunto” o “hecho”. En contexto, Eli pide el informe de lo ocurrido; “¿Qué ha pasado?” transmite esa fuerza de manera idiomática sin perder el sentido.
- source_word: בְּנִי
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  - hijo
  lexicon: HALOT
  rationale: El sufijo posesivo es explícito. “Hijo mío” conserva el matiz afectivo y de trato cercano que tiene la fórmula de dirección.
theological_decisions:
- issue: Alcance de מַעֲרָכָה en un contexto militar
  english_pob_reading: from the battle line
  chosen_spanish_reading: de la línea de batalla
  alternative_spanish_readings:
  - de la batalla
  - de los rangos
  - del campamento
  rationale: No se suaviza la imagen militar. “Línea de batalla” mantiene la referencia a una formación concreta, evitando reducir el término a un simple evento de guerra.
  doctrine_reference: No doctrinal issue; lexical/semantic fidelity to the Hebrew military term.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el sentido del hebreo y la solución auditada en inglés: conserva el sustantivo común “el hombre”, el valor participial de “el que ha venido”, el matiz militar de מַעֲרָכָה y la pregunta idiomática de Eli. No se detectan revisiones posteriores que obliguen a cambiar la lectura base.'
  spanish_consistency_notes:
  - Se usa “Eli” sin adaptación para el nombre propio.
  - Se mantiene el discurso directo con puntuación española.
  - Se preserva el tono narrativo sobrio y bíblico sin arcaísmos innecesarios.
  - La nota [a] se ancla en “línea de batalla” para reflejar la alternativa léxica del término hebreo.
