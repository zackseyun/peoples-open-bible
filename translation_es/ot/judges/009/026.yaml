  yaml_path: translation/ot/judges/009/026.yaml
  text: Then Gaal son of Ebed came with his brothers and crossed into Shechem[c][b][a], and the leaders of Shechem put their trust in him.
  footnotes:
  - marker: a
    text: Or 'and his brothers'; the Hebrew conjunction is simply 'and,' though English idiom may express accompaniment as 'with his brothers.'
    reason: lexical_alternative
  - marker: b
    text: Or 'passed through Shechem' or 'went over into Shechem'; the Hebrew verb can denote crossing or passing over, and the exact nuance in context is debated.
    reason: lexical_alternative
  - marker: c
    text: Or 'the lords of Shechem'; the Hebrew literally reads 'the בעלי of Shechem,' referring to the city's leading men or power-holders.
    reason: lexical_alternative
