translation:
  language: es
  text: 'Y les dije a sus hijos en el desierto: «No anden según los estatutos de sus padres, ni guarden sus juicios, ni se contaminen con sus ídolos[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo גִּלּוּלִים es un término muy despectivo para los ídolos; también podría traducirse «ídolos inmundos» o incluso «ídolos de estiércol».
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֹמַר
  english_pob_choice: And I said
  chosen_spanish: Y les dije
  alternatives_spanish:
  - Entonces les dije
  - Y yo dije
  lexicon: HALOT
  rationale: El wayyiqtol narra una acción pasada consecutiva. En español, «Y les dije» conserva la progresión narrativa natural sin sobreinterpretar el matiz discursivo.
- source_word: בְּנֵיהֶם
  english_pob_choice: their children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus niños
  - sus descendientes
  lexicon: HALOT
  rationale: בנים puede significar «hijos» o, de manera más amplia, la siguiente generación. «Sus hijos» mantiene la relación generacional y suena natural en español bíblico contemporáneo.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el yermo
  - en la tierra árida
  lexicon: HALOT
  rationale: En español bíblico, «desierto» comunica bien el entorno del éxodo y corresponde de forma idiomática a מִדְבָּר. No se pierde el sentido de lugar despoblado y de prueba.
- source_word: בְּחֻקֵּי
  english_pob_choice: in the statutes
  chosen_spanish: según los estatutos
  alternatives_spanish:
  - en los estatutos
  - conforme a los estatutos
  lexicon: HALOT
  rationale: El hebreo usa la imagen de «andar» dentro de estatutos. En español, «andar según» comunica con claridad la idea de conducta regulada por normas, sin forzar una calca poco natural.
- source_word: אֲבוֹתֵיכֶם
  english_pob_choice: your fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus antepasados
  - sus padres varones
  lexicon: HALOT
  rationale: El hebreo es masculino plural y alude a la generación anterior. «Padres» conserva esa forma y evita neutralizar el término; además encaja con el paralelismo de la sección.
- source_word: אַל תֵּלֵכוּ
  english_pob_choice: do not walk
  chosen_spanish: No anden
  alternatives_spanish:
  - No caminen
  - No sigan
  lexicon: HALOT
  rationale: הלך en este giro expresa conducta o manera de vivir. En español, «andar» conserva la metáfora verbal sin sonar forzado, y evita una paráfrasis excesiva como «seguir».
- source_word: מִשְׁפְּטֵיהֶם
  english_pob_choice: their judgments
  chosen_spanish: sus juicios
  alternatives_spanish:
  - sus decretos
  - sus normas
  lexicon: HALOT
  rationale: מִשְׁפָּטִים conserva fuerza legal/jurídica. «Juicios» mantiene la distinción con «estatutos» y refleja el valor de ordenamientos o decisiones normativas sin diluir el término.
- source_word: תִּשְׁמֹרוּ
  english_pob_choice: keep
  chosen_spanish: guarden
  alternatives_spanish:
  - observen
  - cumplan
  lexicon: HALOT
  rationale: שׁמר aplicado a mandatos significa guardar/observar. «Guarden» es breve, claro y reproduce la fidelidad requerida por el texto.
- source_word: גִּלּוּלֵיהֶם
  english_pob_choice: their idols
  chosen_spanish: sus ídolos
  alternatives_spanish:
  - sus ídolos inmundos
  - sus ídolos abominables
  lexicon: HALOT
  rationale: El término es despectivo, pero la forma básica «ídolos» evita un giro interpretativo demasiado libre en el cuerpo del texto. La carga peyorativa se preserva en nota.
- source_word: תִּטַּמָּאוּ
  english_pob_choice: do not defile yourselves
  chosen_spanish: se contaminen
  alternatives_spanish:
  - se manchen
  - se hagan impuros
  lexicon: HALOT
  rationale: El hitpael expresa contaminarse/volverse impuro por asociación. «Se contaminen» comunica bien la idea moral y ritual en español, manteniendo el sentido reflexivo.
theological_decisions:
- issue: Uso de «padres» para אֲבוֹתֵיכֶם
  english_pob_reading: your fathers
  chosen_spanish_reading: sus padres
  alternative_spanish_readings:
  - sus antepasados
  rationale: Se preserva la forma masculina plural del hebreo y el contraste generacional del pasaje. «Antepasados» sería más neutral, pero diluye el eco textual que el audit trail inglés retuvo.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Fuerza despectiva de גִּלּוּלִים
  english_pob_reading: their idols
  chosen_spanish_reading: sus ídolos
  alternative_spanish_readings:
  - sus ídolos inmundos
  - sus ídolos detestables
  rationale: El hebreo contiene una burla fuerte, pero el texto base en español debe seguir siendo legible y sobrio. Se mantiene «ídolos» en la línea principal y la nota recoge el matiz despectivo.
  doctrine_reference: DOCTRINE.md § Translation philosophy 1, 5
translation_notes:
  revision_awareness: El pasaje coincide con la revisión más reciente del texto fuente inglés; no se documentan cambios aplicados en la pasada de revisión, y el consenso cruzado fue de alta concordancia.
  spanish_consistency_notes:
  - Se conservó la distinción entre «estatutos» y «juicios» para reflejar dos términos hebreos diferentes.
  - Se mantuvo «sus padres» por fidelidad al masculino plural del hebreo y a la política de precisión de género.
  - Se eligió «desierto» como equivalente idiomático de מִדְבָּר en contexto de éxodo.
  - La nota al pie marca el matiz peyorativo de גִּלּוּלִים sin recargar el texto principal.
