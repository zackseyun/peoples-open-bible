translation:
  language: es
  text: Otoniel, hijo de Quenaz, hermano menor de Caleb[a], la capturó, y él le dio a su hija Aksá como esposa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «Otoniel, hijo de Quenaz, el hermano menor de Caleb», o «el pariente menor de Caleb». El hebreo se lee más naturalmente como «hermano de Caleb, menor que él», pero algunos entienden el parentesco en sentido más amplio.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּלְכְּדָהּ
  english_pob_choice: captured it
  chosen_spanish: la capturó
  alternatives_spanish:
  - la tomó
  - la tomó por fuerza
  lexicon: HALOT
  rationale: El verbo לכד en este contexto militar significa tomar o capturar una ciudad; el sufijo femenino singular remite a la ciudad del versículo anterior. "La capturó" conserva el sentido bélico de forma natural en español.
- source_word: עָתְנִיאֵל
  english_pob_choice: Othniel
  chosen_spanish: Otoniel
  alternatives_spanish:
  - Otniel
  lexicon: Convención onomástica bíblica
  rationale: Se translitera el nombre propio con una forma reconocible en español bíblico. "Otoniel" es clara, digna y ampliamente inteligible.
- source_word: בֶּן קְנַז
  english_pob_choice: son of Kenaz
  chosen_spanish: hijo de Quenaz
  alternatives_spanish:
  - hijo de Cenaz
  lexicon: Convención onomástica bíblica
  rationale: Se conserva la construcción genealógica directa del hebreo. "Quenaz" mantiene una transliteración uniforme en español.
- source_word: אֲחִי כָלֵב הַקָּטֹן מִמֶּנּוּ
  english_pob_choice: Caleb’s younger brother
  chosen_spanish: hermano menor de Caleb
  alternatives_spanish:
  - el hermano de Caleb, menor que él
  - el menor hermano de Caleb
  - pariente menor de Caleb
  lexicon: HALOT
  rationale: El hebreo más naturalmente se lee como "hermano de Caleb, menor que él". En español, "hermano menor de Caleb" comunica de manera clara el mismo valor comparativo y preserva la lectura principal del POB, sin resolver de antemano la discusión sobre si la relación es literal o ampliada.
- source_word: וַיִּתֶּן ל֛וֹ
  english_pob_choice: he gave him
  chosen_spanish: le dio
  alternatives_spanish:
  - se lo dio
  - Caleb se lo dio
  lexicon: HALOT
  rationale: El sujeto está implícito por el contexto inmediato y en español puede omitirse sin pérdida. "Le dio" mantiene la referencia contextual a Caleb sin sobrecargar la frase con repetición innecesaria.
- source_word: עַכְסָה
  english_pob_choice: Achsah
  chosen_spanish: Aksá
  alternatives_spanish:
  - Acsá
  - Acsa
  lexicon: Convención onomástica bíblica
  rationale: Se adopta una transliteración española clara para el nombre propio, con acento gráfico para indicar la pronunciación llana final y facilitar la lectura eclesial.
- source_word: בִתּוֹ
  english_pob_choice: his daughter
  chosen_spanish: su hija
  alternatives_spanish:
  - la hija de él
  lexicon: HALOT
  rationale: La referencia posesiva es inequívocamente a Caleb en el contexto. En español, "su hija" es la forma más natural y fiel.
- source_word: לְאִשָּׁה
  english_pob_choice: as a wife
  chosen_spanish: por esposa
  alternatives_spanish:
  - como esposa
  - para esposa
  - en matrimonio
  lexicon: HALOT
  rationale: La construcción hebrea expresa entrega en matrimonio. "Por esposa" suena natural en español bíblico contemporáneo y evita el giro más pesado "como esposa".
theological_decisions:
- issue: Relación de parentesco entre Otoniel y Caleb
  english_pob_reading: Othniel is rendered as Caleb’s younger brother in the main text, with a footnote preserving the broader-kin option.
  chosen_spanish_reading: Otoniel, hermano menor de Caleb
  alternative_spanish_readings:
  - Otoniel, hijo de Quenaz, el hermano menor de Caleb
  - Otoniel, hijo de Quenaz, pariente menor de Caleb
  rationale: No es un asunto doctrinal, sino interpretativo. El hebreo admite la lectura más directa de que Otoniel es "hermano de Caleb, menor que él". El español mantiene esa lectura principal y deja abierta la discusión en la nota, evitando imponer una armonización no exigida por el texto.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios y el resumen de control cruzado mostró acuerdo alto con solo observaciones menores; por eso se mantiene la decisión principal del audit trail inglés, adaptada al español sin introducir nuevas tensiones.
  spanish_consistency_notes:
  - Se usó "Yahvé" como terminología por defecto cuando el texto lo requiera; este versículo no la contiene.
  - Se mantuvo la forma verbal y el orden informativo del hebreo sin añadir sujetos explícitos innecesarios.
  - Los nombres propios se transliteraron de manera consistente y legible para una audiencia hispanohablante bíblica.
  - La nota conserva la alternativa de parentesco porque el español, igual que el inglés auditado, puede reflejar la ambigüedad sin resolverla artificialmente.
