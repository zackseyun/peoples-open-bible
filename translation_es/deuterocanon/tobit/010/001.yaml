base_translation:
  language: en
  yaml_path: translation/deuterocanon/tobit/010/001.yaml
  text: And Tobit his father counted each day[a]; and when the days of the journey were completed and they were not coming back[b],
  footnotes:
  - marker: a
    text: Or, 'they were not coming.' The Greek imperfect can denote that they had still not arrived after the expected time for the journey had passed; in context this implies not returning home on schedule.
    reason: lexical_alternative
  - marker: b
    text: The Semitic parallel tradition expands the scene by mentioning counting both days and nights and the parents' distress, but the main translation here follows the shorter Greek wording of the primary source.
    reason: alternative_reading
