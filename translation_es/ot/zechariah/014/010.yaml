translation:
  language: es
  text: Toda la región será transformada en una llanura[a], desde Geba hasta Rimón, al sur de Jerusalén. Pero Jerusalén será elevada y permanecerá en su lugar, desde la puerta de Benjamín hasta el lugar de la Puerta Primera, hasta la Puerta del Ángulo, y desde la torre de Hananel hasta los lagares del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como la Arabá». El hebreo puede comparar la región con el valle o la estepa de la Arabá, en vez de afirmar simplemente «en una llanura».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִסּוֹב
  english_pob_choice: will be turned
  chosen_spanish: será transformada
  alternatives_spanish:
  - será vuelta
  - será convertida
  - será cambiada
  lexicon: HALOT
  rationale: El verbo hebreo expresa aquí un cambio de configuración topográfica. En español, "será transformada" comunica mejor la acción resultante sobre la tierra sin sonar mecánico. Mantiene la idea de transformación física del terreno.
- source_word: כָּל הָאָרֶץ
  english_pob_choice: all the land
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - todo el país
  - toda la región
  - toda la tierra/territorio
  lexicon: HALOT
  rationale: Aunque el contexto limita el alcance con hitos geográficos, en español "tierra" conserva la amplitud del sustantivo hebreo sin forzarlo a un término técnico moderno. El contexto inmediato evita entenderlo como el globo entero.
- source_word: כָּעֲרָבָה
  english_pob_choice: into a plain
  chosen_spanish: en una llanura
  alternatives_spanish:
  - como la Arabá
  - como una llanura
  - como la estepa
  lexicon: HALOT
  rationale: El hebreo puede comparar la tierra con la Arabá o describir su llaneza. En el texto principal, "en una llanura" expresa el resultado topográfico de forma natural en español. La comparación con la Arabá queda preservada en la nota.
- source_word: מִגֶּבַע לְרִמּוֹן נֶגֶב יְרֽוּשָׁלִָ֑ם
  english_pob_choice: from Geba to Rimmon south of Jerusalem
  chosen_spanish: de Geba a Rimón, al sur de Jerusalén
  alternatives_spanish:
  - desde Geba hasta Rimón, al sur de Jerusalén
  - de Geba hasta Rimón, al sur de Jerusalén
  lexicon: HALOT
  rationale: Se conservan los nombres propios y la relación espacial indicada por el hebreo. "Al sur de Jerusalén" sigue naturalmente a Rimón, reflejando la apposición geográfica sin sobreexplicar.
- source_word: וְרָאֲמָה
  english_pob_choice: will be raised up
  chosen_spanish: será elevada
  alternatives_spanish:
  - será alzada
  - será levantada
  - será enaltecida
  lexicon: HALOT
  rationale: La forma apunta a elevación física en contraste con la llanura circundante. "Será elevada" es breve, natural y fiel a la oposición topográfica del versículo.
- source_word: וְיָשְׁבָה תַחְתֶּיהָ
  english_pob_choice: will remain in its place
  chosen_spanish: permanecerá en su lugar
  alternatives_spanish:
  - se quedará en su lugar
  - habitará en su lugar
  - reposará en su lugar
  lexicon: HALOT
  rationale: El hebreo usa una expresión idiomática de asentarse/seguir estable. "Permanecerá en su lugar" comunica bien la idea de continuidad estable sin introducir un matiz más coloquial o más litúrgico de lo necesario.
- source_word: לְמִשַּׁעַר בִּנְיָמִן
  english_pob_choice: from the Benjamin Gate
  chosen_spanish: desde la puerta de Benjamín
  alternatives_spanish:
  - desde la puerta de Benjamín
  - de la puerta de Benjamín
  - a partir de la puerta de Benjamín
  lexicon: HALOT
  rationale: '"Puerta" traduce שער con naturalidad; se mantiene el nombre propio "Benjamín". "Desde" marca el punto inicial de la secuencia de límites urbanos, conforme al recorrido del hebreo.'
- source_word: מְקוֹם שַׁעַר הָרִאשׁוֹן
  english_pob_choice: the place of the First Gate
  chosen_spanish: el lugar de la primera puerta
  alternatives_spanish:
  - el sitio de la primera puerta
  - el lugar de la puerta primera
  - la ubicación de la primera puerta
  lexicon: HALOT
  rationale: '"מקום" señala ubicación/lugar, quizá de una puerta ya desaparecida. "El lugar de la primera puerta" preserva esa referencia espacial sin añadir precisión histórica no explicitada.'
- source_word: שַׁעַר הַפִּנִּים
  english_pob_choice: the Corner Gate
  chosen_spanish: la puerta de la esquina
  alternatives_spanish:
  - la puerta de la esquina
  - la puerta de los ángulos
  - la puerta del rincón
  lexicon: HALOT
  rationale: El sentido del plural relacionado con "esquina/ángulo" se comunica de forma clara en español con "la puerta de la esquina". Es entendible y mantiene el valor topográfico del nombre.
- source_word: וּמִגְדַּל חֲנַנְאֵל
  english_pob_choice: the Tower of Hananel
  chosen_spanish: la torre de Hananel
  alternatives_spanish:
  - la torre de Hananel
  lexicon: HALOT
  rationale: Se conserva la estructura nombre común + nombre propio. "Torre" es la traducción directa y transparente de מִגְדַּל.
- source_word: יִקְבֵי הַמֶּלֶךְ
  english_pob_choice: the king’s winepresses
  chosen_spanish: los lagares del rey
  alternatives_spanish:
  - los lagares del rey
  - los estanques del rey
  - las prensas del rey
  lexicon: HALOT
  rationale: יֶקֶב se refiere a un lagar o instalación para prensar u obtener vino. "Lagares" es el equivalente español más exacto y evita reducir el término a un simple "depósito"; además conserva la imagen agrícola del hebreo.
theological_decisions:
- issue: Alcance de la transformación geográfica
  english_pob_reading: regional transformation around Jerusalem rather than a statement about the entire globe
  chosen_spanish_reading: transformación regional alrededor de Jerusalén, no una afirmación sobre toda la tierra en sentido global
  alternative_spanish_readings:
  - toda la tierra será aplanada literalmente en sentido mundial
  - todo el mundo quedará como una llanura
  rationale: Los hitos geográficos delimitan claramente el pasaje a una zona concreta de Judá y Jerusalén. En español, "toda la tierra" se conserva por fidelidad al hebreo, pero el contexto impide leerlo como una afirmación cosmológica universal.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el audit trail; el borrador español sigue de cerca la última lectura aprobada por el equipo inglés, manteniendo la misma decisión principal sobre el alcance regional y la alternativa léxica de כָּעֲרָבָה.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma del proyecto cuando aparezca el nombre divino; en este versículo no figura.
  - '"Puerta" se usa de manera consistente para שער.'
  - '"Lagar" se emplea para יֶקֶב, siguiendo la imagen agrícola del texto.'
  - Se evita "SEÑOR" o un lenguaje de mayúsculas que oculte la forma del hebreo.
  - La nota al pie conserva la alternativa 'Arabá' para reflejar la tensión léxica del original.
