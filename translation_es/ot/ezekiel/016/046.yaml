translation:
  language: es
  text: Tu hermana mayor es Samaria, ella y sus hijas, que habitan a tu izquierda; y tu hermana menor, que habita a tu derecha, es Sodoma y sus hijas.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, desde la perspectiva de Jerusalén, Samaria queda al norte y Sodoma al sur.
    reason: cultural_note
lexical_decisions:
- source_word: אֲחוֹתֵךְ
  english_pob_choice: your sister
  chosen_spanish: tu hermana
  alternatives_spanish:
  - tu parienta
  - tu compatriota
  lexicon: HALOT
  rationale: ‘Hermana’ conserva la metáfora de parentesco que estructura el pasaje. ‘Parienta’ o ‘compatriota’ debilitarían la imagen familiar que el texto usa para comparar ciudades y pueblos.
- source_word: הַגְּדוֹלָה
  english_pob_choice: older
  chosen_spanish: mayor
  alternatives_spanish:
  - más grande
  - superior
  lexicon: HALOT
  rationale: En español, ‘hermana mayor’ es la forma natural y fiel para una comparación entre hermanas. ‘Más grande’ suena más físico y menos relacional.
- source_word: שֹׁמְרוֹן
  english_pob_choice: Samaria
  chosen_spanish: Samaria
  alternatives_spanish:
  - Samaría
  lexicon: HALOT
  rationale: Se conserva el nombre propio tradicional en español bíblico y reconocido por los lectores, sin cambiar la referencia geográfica.
- source_word: וּבְנוֹתֶיהָ
  english_pob_choice: she and her daughters
  chosen_spanish: ella y sus hijas
  alternatives_spanish:
  - y sus hijas
  - ella y sus dependencias
  lexicon: HALOT
  rationale: ‘Hijas’ mantiene el valor literal y metafórico de ciudades dependientes. La coordinación ‘ella y sus hijas’ refleja la estructura appositiva del hebreo y evita perder a Samaria como ciudad principal.
- source_word: הַיּוֹשֶׁבֶת
  english_pob_choice: who dwell
  chosen_spanish: la que habita
  alternatives_spanish:
  - la que vive
  - la que mora
  lexicon: HALOT
  rationale: El participio de ישׁב puede significar ‘habitar’. En español, ‘habita’ es sobrio y adecuado para un registro bíblico contemporáneo, sin arcaísmo excesivo.
- source_word: עַל שְׂמֹאולֵךְ
  english_pob_choice: to your left
  chosen_spanish: a tu izquierda
  alternatives_spanish:
  - a tu mano izquierda
  - al norte de ti
  lexicon: HALOT
  rationale: Se conserva el lenguaje corporal del hebreo. ‘A tu izquierda’ es natural en español y evita introducir explícitamente la interpretación geográfica en el texto principal.
- source_word: הַקְּטַנָּה מִמֵּךְ
  english_pob_choice: your younger sister
  chosen_spanish: tu hermana menor
  alternatives_spanish:
  - tu hermana pequeña
  - tu hermana más pequeña
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente ‘la pequeña de ti’, en el marco de hermanas la equivalencia natural y fiel es ‘menor’. No se añade ‘que tú’ porque la comparación ya queda clara por el contexto y la oposición con ‘mayor’.
- source_word: מִימִינֵךְ
  english_pob_choice: to your right
  chosen_spanish: a tu derecha
  alternatives_spanish:
  - a tu mano derecha
  - al sur de ti
  lexicon: HALOT
  rationale: Como en ‘izquierda’, se preserva la orientación relacional del texto. ‘A tu derecha’ es la forma más directa y clara en español.
- source_word: סְדֹם
  english_pob_choice: Sodom
  chosen_spanish: Sodoma
  alternatives_spanish:
  - Sodoma
  lexicon: HALOT
  rationale: Nombre propio bíblico establecido en español. Se mantiene la forma usual para legibilidad y reconocimiento.
- source_word: וּבְנוֹתֶיהָ
  english_pob_choice: and her daughters
  chosen_spanish: y sus hijas
  alternatives_spanish:
  - y sus dependencias
  - y sus ciudades hijas
  lexicon: HALOT
  rationale: Se repite la misma solución para conservar la coherencia del motivo de ‘madre/hijas’ aplicado a ciudades y asentamientos.
theological_decisions:
- issue: Relación espacial izquierda/derecha y su posible valor geográfico
  english_pob_reading: Preserve the relational spatial terms 'to your left' and 'to your right' in the main text.
  chosen_spanish_reading: Preservar ‘a tu izquierda’ y ‘a tu derecha’ en el texto principal, con nota sobre la orientación geográfica implícita.
  alternative_spanish_readings:
  - al norte de ti / al sur de ti
  - a la izquierda / a la derecha (sin nota)
  rationale: El hebreo usa lenguaje corporal, no términos de brújula. Mantener la formulación relacional respeta la imagen original; la nota aclara la implicación histórica/geográfica para el lector sin reemplazar el texto.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Metáfora de ‘hijas’ para ciudades dependientes
  english_pob_reading: Retain literal 'daughters' to preserve the city-family metaphor.
  chosen_spanish_reading: Conservar ‘hijas’ como metáfora literal de ciudades dependientes.
  alternative_spanish_readings:
  - ciudades hijas
  - dependencias
  - poblaciones
  rationale: ‘Hijas’ reproduce el recurso profético del hebreo y deja visible la metáfora familiar; otras opciones explicitan el sentido pero atenúan la imagen original.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó ‘than you’ por resultar innecesario y áspero en inglés; en español esa comparación explícita tampoco es necesaria, porque ‘hermana menor’ ya transmite la relación comparativa de manera natural. Se mantuvo el resto del sentido y la estructura del verso, incluyendo el paralelismo entre Samaria/Sodoma y la orientación izquierda/derecha.
  spanish_consistency_notes:
  - Se prefirió ‘Samaria’ y ‘Sodoma’ como nombres propios estándar en español bíblico.
  - Se mantuvo ‘hijas’ para conservar la metáfora ciudad-familia presente en el hebreo.
  - Se evitó convertir ‘izquierda/derecha’ en ‘norte/sur’ dentro del texto principal para no introducir interpretación geográfica sin señalarla.
  - Se eligió ‘mayor/menor’ como equivalentes naturales de la comparación entre hermanas, en vez de traducir literalmente ‘grande/pequeña’.
