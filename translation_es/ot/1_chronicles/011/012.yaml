translation:
  language: es
  text: Después de él fue Eleazar, hijo de Dodo el ahohita[a]; él estaba entre los tres valientes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «uno de los tres valientes». La expresión hebrea puede indicar pertenencia al grupo selecto de tres.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַחֲרָיו
  english_pob_choice: After him
  chosen_spanish: Después de él
  alternatives_spanish:
  - Y después de él
  - Tras él
  lexicon: HALOT
  rationale: La frase marca sucesión en la lista de guerreros de David. «Después de él» conserva el valor de orden sin introducir una relación espacial. Se evita añadir un «y» inicial que en español no aporta claridad.
- source_word: אֶלְעָזָר
  english_pob_choice: Eleazar
  chosen_spanish: Eleazar
  lexicon: Nombre propio
  rationale: Se translitera el nombre propio conforme al uso bíblico en español.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: El sentido genealógico inmediato es el más natural en esta lista. «Hijo de» corresponde al inglés auditado y al hebreo en este contexto.
- source_word: דּוֹדוֹ
  english_pob_choice: Dodo
  chosen_spanish: Dodo
  alternatives_spanish:
  - Dodai
  lexicon: Nombre propio
  rationale: La forma consonántica de este versículo favorece «Dodo». Se conserva como nombre propio transliterado.
- source_word: הָאֲחוֹחִי
  english_pob_choice: the Ahohite
  chosen_spanish: el ahohita
  alternatives_spanish:
  - el descendiente de Ahoah
  lexicon: HALOT
  rationale: Se mantiene el valor gentilicio/clánico con una forma española transparente. «Ahohita» reproduce el tipo de designación de linaje o procedencia sin explicitar más de lo que el texto dice.
- source_word: בִּשְׁלוֹשָׁה
  english_pob_choice: among the three
  chosen_spanish: entre los tres
  alternatives_spanish:
  - uno de los tres
  lexicon: HALOT
  rationale: La preposición con numeral expresa inclusión en un grupo. «Entre los tres» preserva esa pertenencia y deja abierta la alternativa de rango/composición que el inglés auditado anotó.
- source_word: הַגִּבֹּרִים
  english_pob_choice: mighty men
  chosen_spanish: guerreros poderosos
  alternatives_spanish:
  - hombres poderosos
  - mighty men
  lexicon: HALOT
  rationale: En Crónicas el término designa a la élite militar de David. «Guerreros poderosos» comunica la fuerza y evita una expresión demasiado idiomática que podría ocultar el matiz de título. No se usa «siervos» ni otra terminología ajena al campo militar.
theological_decisions:
- issue: Pertenencia al grupo de élite de David
  english_pob_reading: he was among the three mighty men
  chosen_spanish_reading: él estaba entre los tres guerreros poderosos
  alternative_spanish_readings:
  - él era uno de los tres guerreros poderosos
  - estaba entre los tres poderosos
  rationale: El hebreo puede leerse como pertenencia al grupo o, según la nota auditada en inglés, como una fórmula que a veces equivale a «uno de los tres». La redacción española mantiene abierta esa tensión sin resolverla de forma más estrecha de lo que permite el texto.
  doctrine_reference: 1 Crónicas 11:12; nota lexical sobre בִּשְׁלוֹשָׁה
translation_notes:
  revision_awareness: Coincide con la evaluación de alta concordancia del control cruzado; no se registran revisiones aplicadas en el expediente inglés. La versión española conserva la alternativa interpretativa señalada por la nota auditada.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero este versículo no la requiere.
  - «Ahohita» se usa como gentilicio bíblico transliterado para mantener consistencia con designaciones tribales/clánicas en la serie.
  - Se evita «Cristo», «SEÑOR» y fórmulas eclesiásticas no presentes en el hebreo.
  - 'El orden listado en español sigue el flujo del hebreo: sucesión, nombre propio, filiación, gentilicio y pertenencia al grupo.'
