base_translation:
  language: en
  yaml_path: translation/ot/genesis/025/020.yaml
  text: Isaac was forty years old when he took Rebekah[a], the daughter of Bethuel the Aramean from Paddan-aram, the sister of Laban the Aramean[b], to be his wife.
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'when he married Rebekah.' The Hebrew literally says 'when he took Rebekah ... to be his wife.'
    reason: lexical_alternative
  - marker: b
    text: '''Aramean'' is more precise than the older traditional rendering ''Syrian.'''
    reason: lexical_alternative
