theological_decisions:
- issue: Interpretation of the proverb's second colon
  chosen_reading: The verse contrasts the productive potential available even to the poor with the reality that some are nevertheless ruined because justice is absent.
  alternative_readings:
  - The second colon refers impersonally to produce being lost through poor management rather than social injustice.
  rationale: The phrase בלא משפט most naturally denotes absence of justice/judgment rather than mere inefficiency. In Proverbs, משפט commonly carries an ethical-judicial sense, so the translation preserves the social critique without expanding beyond the text.
  doctrine_reference: Translation philosophy §1, §3, §6
