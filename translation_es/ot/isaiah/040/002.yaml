translation:
  language: es
  text: Hablen al corazón[a] de Jerusalén, y proclámenle que su duro servicio[b] ha terminado, que su iniquidad ha sido perdonada[c], que ha recibido de la mano de Yahvé el doble[d] por todos sus pecados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Hablen consoladoramente a Jerusalén»; el hebreo expresa una exhortación que llega al corazón y alienta.'
    reason: alternative_reading
  - marker: b
    text: 'O: «su guerra ha terminado» o «su tiempo de servicio se ha cumplido».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «su castigo ha sido aceptado como suficiente» o «su culpa ha sido aceptada».'
    reason: lexical_alternative
  - marker: d
    text: «El doble» puede ser un modismo para una medida completa, no necesariamente una duplicación matemática exacta.
    reason: cultural_note
lexical_decisions:
- source_word: דַּבְּרוּ עַל־לֵב
  english_pob_choice: Speak to the heart of Jerusalem
  chosen_spanish: Habla al corazón de Jerusalén
  alternatives_spanish:
  - Habla tiernamente a Jerusalén
  - Habla consoladoramente a Jerusalén
  lexicon: HALOT
  rationale: La locución hebrea עַל־לֵב comunica hablar de modo que anime, calme o llegue íntimamente; el POB inglés corrigió de una paráfrasis más libre a una más cercana al hebreo. En español, «habla al corazón» conserva la idiomática semítica sin caer en una calca opaca, y mantiene el tono de consolación profética.
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - la ciudad de Jerusalén
  lexicon: Nombre propio
  rationale: Se traduce con el nombre propio estándar en español bíblico.
- source_word: וְקִרְאוּ אֵלֶיהָ
  english_pob_choice: and call out to her
  chosen_spanish: y clámale
  alternatives_spanish:
  - y proclámale
  - y llámale
  lexicon: HALOT
  rationale: קרא con אֶל puede significar llamar a, proclamar a, clamar a. «Clámale» conserva la fuerza de proclamación profética y la dirección personal del mandato, sin limitarlo a una mera llamada audible.
- source_word: מָלְאָה צְבָאָהּ
  english_pob_choice: her hard service is completed
  chosen_spanish: su duro servicio ha terminado
  alternatives_spanish:
  - su guerra ha terminado
  - su tiempo de servicio ha concluido
  lexicon: HALOT
  rationale: צָבָא puede referirse a guerra, servicio militar o un período de servicio impuesto. El contexto de exilio y restauración favorece una carga/servicio duro que llega a su fin; «duro servicio» conserva esa amplitud, y «ha terminado» expresa el cumplimiento.
- source_word: נִרְצָה עֲוֺנָהּ
  english_pob_choice: her iniquity is pardoned
  chosen_spanish: su iniquidad ha sido perdonada
  alternatives_spanish:
  - su culpa ha sido aceptada/satisfecha
  - su castigo ha sido aceptado
  lexicon: HALOT
  rationale: El nifal de רצה aquí tiene el sentido de ser aceptado o considerado suficiente, y en contexto anuncia restauración. «Ha sido perdonada» comunica el resultado de forma clara en español, mientras las alternativas preservan la tensión semántica entre perdón y satisfacción/aceptación.
- source_word: עֲוֺנָהּ
  english_pob_choice: her iniquity
  chosen_spanish: su iniquidad
  alternatives_spanish:
  - su culpa
  - su pecado
  lexicon: HALOT
  rationale: עָוֹן abarca iniquidad, culpa y también la consecuencia penal de la culpa. «Iniquidad» conserva el componente moral y judicial del término mejor que una simplificación a «pecado».
- source_word: לָקְחָה מִיַּד יְהוָה
  english_pob_choice: she has received from the hand of Yahweh
  chosen_spanish: ha recibido de la mano de Yahvé
  alternatives_spanish:
  - ha tomado de la mano de Yahvé
  lexicon: HALOT
  rationale: לקח puede significar tomar o recibir; en este contexto, la idea es haber recibido lo que vino como trato divino. Se mantiene la imagen de «la mano de Yahvé», y el nombre divino sigue la norma POB en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: Tetragrámaton
  rationale: Se usa «Yahvé» como transliteración del nombre divino, según la norma del proyecto, en vez de sustituirlo por un título.
- source_word: כִּפְלַיִם
  english_pob_choice: double
  chosen_spanish: el doble
  alternatives_spanish:
  - doblemente
  - una doble medida
  lexicon: HALOT
  rationale: El término puede indicar una cantidad doble o, idiomáticamente, una medida completa. «El doble» preserva la imagen literal del hebreo, sin resolver de más la cuestión interpretativa.
- source_word: בְּכָל חַטֹּאתֶיהָ
  english_pob_choice: for all her sins
  chosen_spanish: por todos sus pecados
  alternatives_spanish:
  - por todos sus pecados cometidos
  - a causa de todos sus pecados
  lexicon: HALOT
  rationale: חַטָּאוֹת aquí son pecados, no sacrificios por el pecado. «Por todos sus pecados» expresa bien la relación causal o retributiva dentro de la cláusula final.
theological_decisions:
- issue: Sentido de «el doble»
  english_pob_reading: A full measure corresponding to all her sins, without specifying a precise mathematical ratio.
  chosen_spanish_reading: Una afirmación de medida completa o suficiente correspondiente a todo lo que Jerusalén ha recibido en juicio, sin fijar una proporción matemática exacta.
  alternative_spanish_readings:
  - Un castigo estrictamente doble por cada pecado
  - Una abundancia de gracia en vez de castigo
  rationale: El contexto anuncia conclusión del servicio duro y perdón/restauración. Por eso conviene conservar «el doble» en el texto y no cerrarlo con una explicación que elimine la ambigüedad idiomática. La nota permite al lector ver que puede tratarse de una medida plena, no necesariamente aritmética.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
- issue: Fuerza de נִרְצָה עֲוֺנָהּ
  english_pob_reading: An announcement of pardon/acceptance of Jerusalem's iniquity after judgment.
  chosen_spanish_reading: Un anuncio de perdón/restauración respecto de la iniquidad de Jerusalén después del juicio.
  alternative_spanish_readings:
  - Su castigo ha sido aceptado como suficiente
  - Su culpa ha sido favorecida/propiciada
  rationale: La forma verbal admite matices de aceptación, satisfacción o aceptación favorable; el contexto general, sin embargo, es de restauración. «Ha sido perdonada» traduce el efecto del anuncio de modo inteligible, manteniendo abierta la tensión semántica en la nota.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: El POB inglés revisó «Speak tenderly to Jerusalem» a «Speak to the heart of Jerusalem» para reflejar con más precisión el hebreo עַל־לֵב. En español se siguió esa revisión con «Habla al corazón de Jerusalén», manteniendo el registro formal y la transparencia idiomática. También se preservó la ambigüedad de כִּפְלַיִם como «el doble» sin explicarla en el texto principal.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el Tetragrámaton, en coherencia con la norma del proyecto.
  - Se eligió «iniquidad» en lugar de «culpa» para conservar la fuerza moral/judicial de עָוֹן.
  - Se evitó «SEÑOR» como sustituto del nombre divino.
  - 'El tono profético se sostuvo con verbos de mandato: «Habla» y «clámale».'
