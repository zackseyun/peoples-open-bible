    reason: alternative_reading
  - marker: b
    text: 'El hebreo distingue los nombres: «Joram» (rey de Israel) y «Jehoram» (hijo de Jehosafat, rey de Judá), aunque estas formas están estrechamente relacionadas.'
    reason: lexical_alternative
  revision_rationale: Se conserva íntegramente la traducción principal porque es fiel al hebreo y al audit trail inglés. Solo se corrige la ubicación de las notas para que cada marcador aparezca en la frase pertinente, y se pule la redacción de la nota [a] para un español más natural.
