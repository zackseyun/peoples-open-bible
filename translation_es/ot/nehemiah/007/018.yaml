  lexicon: HALOT
  rationale: En listas de retorno y genealogía, בְּנֵי introduce un grupo de descendencia o pertenencia familiar. 'Los hijos de' conserva la forma hebrea de manera directa y natural en español; 'descendientes de' explicaría el sentido, pero se aleja más del paralelismo formal del texto.
- source_word: אֲדֹנִיקָם
  english_pob_choice: Adonikam
  chosen_spanish: Adonicam
  alternatives_spanish:
  - Adonikam
  lexicon: HALOT
  rationale: Nombre propio transliterado. En español, la forma 'Adonicam' es más fluida y se adapta a la ortografía habitual sin cambiar el referente.
- source_word: שֵׁשׁ מֵאוֹת שִׁשִּׁים וְשִׁבְעָה
  english_pob_choice: six hundred sixty-seven
  chosen_spanish: seiscientos sesenta y siete
  alternatives_spanish:
  - seiscientos y sesenta y siete
  lexicon: HALOT
  rationale: El hebreo expresa el número de forma cardinal simple; en español bíblico actual 'seiscientos sesenta y siete' es claro y fiel. Se evita 'y' tras 'seiscientos' para mantener la misma economía que la traducción inglesa auditada.
