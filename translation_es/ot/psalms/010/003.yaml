    issue: Pluralización de תַּאֲוַת como «los deseos»
    rationale: El hebreo está en singular constructo («el deseo / la avidez de su alma»). El plural español no es imposible, pero introduce una expansión no apoyada por el texto ni por el audit trail.
  - severity: medium
    issue: Falta el matiz contrastivo del segundo hemistiquio
    rationale: El POB inglés revisado adoptó «blesses but despises Yahweh». En español, «pero» representa mejor esa tensión que «y», sin sobreinterpretar.
  - severity: low
    issue: Nota al pie mejorable en precisión y estilo
    rationale: '«lectura irónica» y «sentido euphemístico distinto» suenan vagos o poco naturales. Conviene reflejar más directamente las alternativas documentadas: «se bendice» y, menos probablemente, un uso eufemístico con sentido de «maldice/reniega».'
  revised_spanish_text: Porque el impío se jacta del deseo de su alma, y el avaro bendice[a], pero desprecia a Yahvé.
  revised_footnotes:
