translation:
  language: es
  text: Pero yo soy Yahvé tu Dios de la tierra de Egipto[a]; no conoces a Dios fuera de mí[b], y no hay salvador sino yo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde la tierra de Egipto» o «fuera de la tierra de Egipto». La frase hebrea puede destacar la relación de Yahvé con Israel desde el tiempo del éxodo o su acción salvadora al sacarlo de allí.
    reason: lexical_alternative
  - marker: b
    text: O «no conocerás a Dios fuera de mí». El verbo hebreo puede entenderse con fuerza declarativa o con fuerza de pacto/prohibitiva en este contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאָנֹכִי
  english_pob_choice: But I
  chosen_spanish: Pero yo
  alternatives_spanish:
  - Y yo
  - Mas yo
  lexicon: HALOT
  rationale: El hebreo combina la conjunción con el pronombre enfático de primera persona; en español, «Pero yo» comunica mejor el contraste enfático que un simple «Y yo».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino con la forma establecida por el proyecto, evitando la sustitución por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tus dioses
  lexicon: HALOT
  rationale: 'El sufijo de segunda persona singular y el contexto de pacto exigen un referente singular: «tu Dios».'
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: desde la tierra de Egipto
  alternatives_spanish:
  - de la tierra de Egipto
  - desde el país de Egipto
  lexicon: HALOT
  rationale: '«Desde» deja abierta la fuerza relacional o temporal que el inglés POB anotó: desde el tiempo/salida de Egipto o desde la acción salvadora de allí.'
- source_word: וֵאלֹהִים
  english_pob_choice: God
  chosen_spanish: otro Dios
  alternatives_spanish:
  - Dios
  - otro dios
  lexicon: HALOT
  rationale: En la cláusula negativa de exclusividad, el sentido es singular; en español, añadir «otro» evita la lectura de simple repetición y refleja la prohibición implícita de reconocer a otro dios además de Yahvé.
- source_word: זוּלָתִי
  english_pob_choice: besides me
  chosen_spanish: fuera de mí
  alternatives_spanish:
  - además de mí
  - aparte de mí
  lexicon: HALOT
  rationale: La expresión de exclusión se vierte de manera natural con «fuera de mí», que preserva la separación/exclusividad del hebreo.
- source_word: לֹא תֵדָע
  english_pob_choice: you know no
  chosen_spanish: no conocerás
  alternatives_spanish:
  - no conocerás ni reconocerás
  - no debes conocer
  lexicon: HALOT
  rationale: El imperfecto hebreo admite lectura declarativa o prohibitiva; «no conocerás» mantiene esa ambivalencia en español sin forzar un imperativo explícito.
- source_word: וּמוֹשִׁיעַ
  english_pob_choice: and there is no savior
  chosen_spanish: y no hay salvador
  alternatives_spanish:
  - y no existe salvador
  - y no hay quien salve
  lexicon: HALOT
  rationale: El participio funciona como sustantivo de agente; «salvador» conserva el valor nominal y resulta idiomático en español.
- source_word: אַיִן בִּלְתִּי
  english_pob_choice: there is no ... except me
  chosen_spanish: sino yo
  alternatives_spanish:
  - excepto yo
  - fuera de mí
  lexicon: HALOT
  rationale: La combinación expresa exclusividad fuerte; «sino yo» es la forma más natural y directa en español para esa estructura.
theological_decisions:
- issue: Exclusividad divina y salvífica de Yahvé
  english_pob_reading: The verse is rendered as an exclusive claim by the LORD that Israel has no God and no savior besides him.
  chosen_spanish_reading: 'El verso se entiende como una afirmación exclusiva de Yahvé: Israel no tiene otro Dios ni otro salvador fuera de él.'
  alternative_spanish_readings:
  - 'La primera cláusula podría leerse más temporalmente: «Yo he sido tu Dios desde la tierra de Egipto».'
  - 'La cláusula central podría sonar más exhortativa: «no conocerás a otro Dios».'
  - 'La última cláusula podría expresarse: «no hay salvador fuera de mí».'
  rationale: El hebreo sostiene una declaración de pacto anclada en el éxodo y afirma la unicidad de Dios y de quien salva. La traducción conserva esa exclusividad sin introducir formulaciones doctrinales posteriores ajenas al verso.
  doctrine_reference: Afirmaciones; filosofía de traducción §§1, 3, 6
translation_notes:
  revision_awareness: La base inglesa POB no requirió revisiones sustanciales en la última pasada; mantuve su decisión de preservar el alcance exclusivo de la cláusula media y de reflejar la ambigüedad temporal/covenantal de la primera frase mediante una nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino, coherente con el proyecto.
  - «Salvador» conserva el valor nominal del participio hebreo y evita una paráfrasis verbal que debilitaría la cláusula existencial.
  - La nota sobre «no conocerás» preserva la tensión entre lectura declarativa y prohibitiva sin resolverla unilateralmente.
  - «Desde la tierra de Egipto» se eligió por claridad y por su capacidad de abarcar las dos posibilidades anotadas en el POB inglés.
