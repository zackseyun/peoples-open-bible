translation:
  language: es
  text: Entonces, si el que oye oye el sonido de la trompeta y no hace caso a la advertencia,[a] y viene la espada y se lo lleva, su sangre estará sobre su propia cabeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «su sangre estará sobre su cabeza», un modismo que indica que él mismo carga con la responsabilidad de su propia muerte.'
    reason: cultural_note
lexical_decisions:
- source_word: וְשָׁמַע
  english_pob_choice: then if ... hears
  chosen_spanish: Entonces, si ... oye
  alternatives_spanish:
  - y oye
  - y si oye
  lexicon: HALOT
  rationale: El hebreo continúa la cláusula condicional anterior; en español conviene explicitar el valor condicional con «si». «Entonces» conserva la continuidad discursiva del hebreo y del audit trail inglés sin volver la frase rígida.
- source_word: הַשֹּׁמֵעַ
  english_pob_choice: the one who hears
  chosen_spanish: el que oye
  alternatives_spanish:
  - el oyente
  - quien oye
  lexicon: HALOT
  rationale: El participio con artículo funciona sustantivamente. «El que oye» es natural en español y conserva el matiz individualizante mejor que un sustantivo más técnico o abstracto.
- source_word: קוֹל הַשּׁוֹפָר
  english_pob_choice: the sound of the trumpet
  chosen_spanish: el sonido de la trompeta
  alternatives_spanish:
  - la voz de la trompeta
  - el toque de la trompeta
  lexicon: HALOT
  rationale: קוֹל aquí designa el sonido audible. «El sonido de la trompeta» es claro y fiel; «toque» sería posible, pero añade una interpretación del tipo de señal.
- source_word: נִזְהָר
  english_pob_choice: take warning
  chosen_spanish: tomar advertencia
  alternatives_spanish:
  - ser advertido
  - prestar atención
  lexicon: HALOT
  rationale: El nifal expresa recibir o tomar advertencia. «Tomar advertencia» conserva la responsabilidad del oyente y evita suavizar el verbo hacia una simple atención genérica.
- source_word: חֶרֶב
  english_pob_choice: the sword
  chosen_spanish: la espada
  alternatives_spanish:
  - una espada
  lexicon: HALOT
  rationale: En el contexto profético, «la espada» funciona como metonimia de muerte violenta o invasión. Se mantiene la imagen hebrea y su fuerza judicial.
- source_word: וַתִּקָּחֵהוּ
  english_pob_choice: takes him away
  chosen_spanish: lo arrebata
  alternatives_spanish:
  - lo lleva
  - lo toma
  lexicon: HALOT
  rationale: לקח significa «tomar / llevar». «Arrebatar» comunica mejor el desenlace fatal en español sin abandonar el sentido de «tomar» y sin introducir una paráfrasis demasiado explicativa.
- source_word: דָּמוֹ בְרֹאשׁוֹ יִהְיֶה
  english_pob_choice: his blood will be on his own head
  chosen_spanish: su sangre recaerá sobre su propia cabeza
  alternatives_spanish:
  - su sangre estará sobre su cabeza
  - él cargará con la culpa de su muerte
  lexicon: HALOT
  rationale: Se preserva el idiomático hebreo de responsabilidad personal por la muerte propia. «Recaerá sobre su propia cabeza» mantiene la imagen y el valor judicial sin convertirlo en una paráfrasis doctrinal.
theological_decisions:
- issue: Idiom of responsibility for ignored warning
  english_pob_reading: his blood will be on his own head
  chosen_spanish_reading: su sangre recaerá sobre su propia cabeza
  alternative_spanish_readings:
  - él será responsable de su propia muerte
  - cargará con la culpa de su muerte
  rationale: La frase enfatiza responsabilidad personal por desoír la advertencia. Se conserva el idiomático bíblico en vez de sustituirlo por una explicación abstracta, para no perder el peso retórico y jurídico del hebreo.
  doctrine_reference: 'Translation philosophy #3, #6'
translation_notes:
  revision_awareness: 'El pasaje presenta plena concordancia con el audit trail inglés: cláusula condicional continuada, sujeto participial sustantivado, «sound of the trumpet» como señal audible, y el modismo final de responsabilidad personal. No se reportaron revisiones aplicadas en el registro inglés, y el punto de mayor tensión es conservar el hebraísmo final sin volverlo explicativo en exceso.'
  spanish_consistency_notes:
  - Se mantuvo «la espada» para conservar la imagen profética recurrente.
  - «Tomar advertencia» se eligió por fidelidad al valor responsivo del nifal.
  - El modismo final se traduce de forma idiomática pero transparente, con nota para explicitar su sentido.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes; el versículo no contiene el nombre divino.
