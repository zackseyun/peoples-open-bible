translation:
  language: es
  text: Tú dividiste el mar con tu fuerza[a][b]; quebrantaste las cabezas de los monstruos marinos sobre las aguas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Este versículo puede evocar tanto la victoria de Dios sobre el mar caótico en lenguaje poético como su liberación histórica en el mar durante el éxodo.
    reason: cross_reference
  - marker: b
    text: O «dragones» o «grandes criaturas marinas». El hebreo tanninim puede referirse a criaturas monstruosas y serpentinas asociadas con las aguas.
    reason: lexical_alternative
lexical_decisions:
- source_word: פוֹרַרְתָּ
  english_pob_choice: split
  chosen_spanish: dividiste
  alternatives_spanish:
  - partiste
  - abriste
  - separaste
  lexicon: HALOT
  rationale: El verbo hebreo expresa romper o dividir en forma intensa. En español, «dividiste» transmite con naturalidad la acción decisiva sobre el mar sin sonar arcaico, y mantiene la imagen de separación violenta sin añadir más de lo que el texto dice.
- source_word: בְעָזְּךָ
  english_pob_choice: by your strength
  chosen_spanish: con tu poder
  alternatives_spanish:
  - por tu fuerza
  - con tu fuerza
  - por tu poder
  lexicon: HALOT
  rationale: La preposición instrumental puede rendirse en español con «con» o «por». «Con tu poder» suena natural y digno, y conserva la idea de medio o instrumento. «Poder» aquí comunica bien la capacidad eficaz de Dios; «fuerza» también sería posible, pero «poder» evita una lectura demasiado física.
- source_word: יָם
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el mar
  - el mar grande
  lexicon: HALOT
  rationale: Aunque el hebreo no lleva artículo, el español lo pide naturalmente en este contexto. «Mar» mantiene la amplitud poética del término y funciona bien en paralelo con las aguas del verso.
- source_word: שִׁבַּרְתָּ
  english_pob_choice: shattered
  chosen_spanish: quebrantaste
  alternatives_spanish:
  - rompiste
  - destrozaste
  - trituraste
  lexicon: HALOT
  rationale: El hebreo indica romper con fuerza. «Quebrantaste» conserva el impacto violento y es suficientemente solemne para poesía bíblica; «destrozaste» sería más fuerte pero menos sobrio, y «rompiste» más débil.
- source_word: רָאשֵׁי
  english_pob_choice: the heads of
  chosen_spanish: las cabezas de
  alternatives_spanish:
  - las cabezas de
  - los jefes de
  lexicon: HALOT
  rationale: La expresión es literalmente anatómica y poética. «Cabezas» mantiene la imagen del texto; «jefes» introduciría una lectura humana que no está indicada por el hebreo.
- source_word: תַנִּינִים
  english_pob_choice: sea monsters
  chosen_spanish: monstruos marinos
  alternatives_spanish:
  - dragones
  - serpientes marinas
  - grandes criaturas marinas
  lexicon: HALOT
  rationale: El término hebreo puede referirse a criaturas monstruosas o serpentinas asociadas con las aguas caóticas. «Monstruos marinos» conserva esa amplitud poética y sigue de cerca la decisión inglesa, evitando tanto el arcaísmo de «dragones» como una neutralización excesiva.
- source_word: עַל הַמָּיִם
  english_pob_choice: on the waters
  chosen_spanish: sobre las aguas
  alternatives_spanish:
  - sobre las aguas
  - en las aguas
  - encima de las aguas
  lexicon: HALOT
  rationale: «Sobre las aguas» reproduce bien el valor de עַל y mantiene la imagen poética de dominio o ubicación encima del agua sin suavizarla a «en».
theological_decisions:
- issue: Imagen del mar y los monstruos marinos
  english_pob_reading: Retain the poetic-cosmic imagery in the main text without reducing it either to mere mythological metaphor or to a narrowly historical paraphrase.
  chosen_spanish_reading: Mantener la imagen poética y cósmica en el texto principal, sin reducirla ni a una metáfora mitológica vacía ni a una paráfrasis histórica estrecha.
  alternative_spanish_readings:
  - Limitarlo solo al cruce del mar en el éxodo
  - Entenderlo solo como combate mítico
  rationale: El salmo conserva un lenguaje de caos y victoria sobre el mar que también puede resonar con el éxodo. La traducción debe dejar abierta esa tensión, y «monstruos marinos» permite oír tanto la imaginería cósmica como la posible alusión histórica.
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el pasaje hebreo y la auditoría inglesa: mantiene el paralelismo entre dividir el mar y quebrantar las cabezas de las criaturas del mar, conserva la ambigüedad poético-histórica del segundo hemistiquio y usa un español público, claro y reverente.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiriera explícitamente; aquí no aparece el tetragrámaton.
  - Se prefirió «monstruos marinos» para conservar la amplitud de תנינים sin cerrar la interpretación.
  - Se mantuvo un registro poético y bíblico, pero con sintaxis natural en español contemporáneo.
