translation:
  language: es
  text: Entraron y tomaron posesión de ella, pero no escucharon tu voz, ni anduvieron en tu ley[a]. No hicieron todo lo que les mandaste hacer, y trajiste sobre ellos todo este desastre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu instrucción». La palabra hebrea torá puede significar «ley» o «instrucción»; aquí se refiere a la enseñanza pactal de Dios.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «toda esta calamidad». El hebreo dice literalmente: «llamaste sobre ellos todo este desastre», un modismo para expresar que les trajiste juicio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: They came in
  chosen_spanish: Llegaron
  alternatives_spanish:
  - Entraron
  - Vinieron
  lexicon: HALOT
  rationale: En contexto de entrada y ocupación de la tierra, "llegaron" comunica el movimiento narrativo con naturalidad en español. "Entraron" también es posible, pero puede sonar más limitado al acto de ingresar; "vinieron" es más general.
- source_word: וַיִּרְשׁוּ אֹתָהּ
  english_pob_choice: took possession of it
  chosen_spanish: tomaron posesión de ella
  alternatives_spanish:
  - la heredaron
  - la poseyeron
  lexicon: HALOT
  rationale: '"Tomaron posesión de ella" expresa la ocupación efectiva de la tierra sin reducirlo a una herencia meramente jurídica. Conserva el valor territorial del verbo en este contexto.'
- source_word: בְּקוֹלֶךָ
  english_pob_choice: your voice
  chosen_spanish: tu voz
  alternatives_spanish:
  - tu palabra
  - tu mandato
  lexicon: HALOT
  rationale: Se mantiene "voz" para preservar la imagen literal del hebreo y la relación de obediencia personal. "Mandato" aclara el sentido, pero pierde esa formulación.
- source_word: וּבְתוֹרֹתֶךָ
  english_pob_choice: your law
  chosen_spanish: tu ley
  alternatives_spanish:
  - tu instrucción
  - tu enseñanza
  lexicon: HALOT
  rationale: En el marco del pacto, תורה puede abarcar ley e instrucción. "Ley" es el equivalente más establecido y adecuado aquí; "instrucción" es una alternativa válida, pero menos precisa para este contexto jurídico-covenantal.
- source_word: אֵת כָּל אֲשֶׁר צִוִּיתָה לָהֶם לַעֲשׂוֹת לֹא עָשׂוּ
  english_pob_choice: They did not do all that you commanded them to do
  chosen_spanish: No hicieron todo lo que les mandaste hacer
  alternatives_spanish:
  - No hicieron todo lo que les mandaste
  - No hicieron todo cuanto les ordenaste
  lexicon: HALOT
  rationale: La formulación conserva el valor comprehensivo de כָּל y el infinitivo "hacer" sin sonar rígida en español. "Mandaste" refleja bien el sentido de צִוִּיתָה.
- source_word: וַתַּקְרֵא אֹתָם אֵת כָּל הָרָעָה הַזֹּאת
  english_pob_choice: and you brought upon them all this disaster
  chosen_spanish: trajiste sobre ellos todo este desastre
  alternatives_spanish:
  - les trajiste todo este desastre
  - hiciste venir sobre ellos todo este desastre
  lexicon: HALOT
  rationale: קרא en esta construcción es idiomático para hacer recaer algo sobre alguien. "Trajiste sobre ellos" conserva la fuerza de la acción divina sin introducir una paráfrasis demasiado interpretativa. "Desastre" evita la ambigüedad moral de "mal".
- source_word: הָרָעָה
  english_pob_choice: disaster
  chosen_spanish: desastre
  alternatives_spanish:
  - calamidad
  - desgracia
  lexicon: HALOT
  rationale: En contexto de juicio profético, רָעָה refiere al daño/castigo que sobreviene, no a maldad moral. "Desastre" es claro y natural en español moderno.
theological_decisions:
- issue: Sentido de תּוֹרָה en contexto de pacto
  english_pob_reading: your law
  chosen_spanish_reading: tu ley
  alternative_spanish_readings:
  - tu instrucción
  - tu enseñanza
  rationale: El pasaje recuerda la obligación pactal de obedecer a Yahvé. "Ley" comunica mejor ese marco normativo y covenantal que una traducción más amplia como "instrucción".
  doctrine_reference: Consistencia terminológica del pacto y de la ley divina
- issue: Naturaleza de הָרָעָה como juicio divino
  english_pob_reading: disaster
  chosen_spanish_reading: desastre
  alternative_spanish_readings:
  - calamidad
  - desgracia
  - mal
  rationale: El texto describe juicio que recae sobre el pueblo. "Desastre" preserva el sentido de calamidad sin sugerir que Dios comete maldad moral.
  doctrine_reference: Distinción entre mal moral y calamidad judicial
- issue: Construcción verbal de וַתַּקְרֵא
  english_pob_reading: you brought upon them
  chosen_spanish_reading: trajiste sobre ellos
  alternative_spanish_readings:
  - les trajiste
  - hiciste venir sobre ellos
  rationale: La traducción sigue el sentido idiomático atestiguado por la lectura inglesa auditada, manteniendo una expresión directa en español y evitando una paráfrasis excesiva.
  doctrine_reference: Fidelidad al hebreo con equivalencia óptima
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión auditada del inglés POB: se mantuvo el sentido directo de וַתַּקְרֵא como acción de traer/poner sobre ellos, evitando una paráfrasis más interpretativa como «clamaste contra ellos». También se conservó la preferencia por una traducción clara y contemporánea de רָעָה como calamidad/desastre.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en este proyecto cuando el texto lo requiera; en este versículo no aparece el Tetragrámaton explícito, pero la segunda persona hace referencia a Dios de modo contextual.
  - Se mantiene «ley» para תורה dentro del marco pactal, en coherencia con el criterio terminológico del proyecto.
  - Se preserva la imaginería de «tu voz» y «anduvieron»/«no anduvieron» como formas bíblicas naturales en español.
  - «Desastre» se usa para רָעָה en contexto judicial, evitando cargar el texto con una idea de maldad moral atribuida a Dios.
