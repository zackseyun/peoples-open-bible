translation:
  language: es
  text: 'Y llamó a Sara, su hija, y, tomándola de la mano, la entregó a Tobías como esposa, y le dijo: «Mira, conforme a la ley de Moisés, tómala[a] y llévala a tu padre». Y los bendijo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «recíbela» para «tómala»; el imperativo griego puede implicar tomar, recibir o traer, pero la frase siguiente ya expresa el movimiento hacia su padre.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκάλεσεν
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - mandó llamar
  lexicon: BDAG
  rationale: El griego indica una acción simple de llamar; «llamó» es natural en español y conserva el valor básico sin añadir formalidad excesiva.
- source_word: λαβὼν τῆς χειρὸς αὐτῆς
  english_pob_choice: taking her by the hand
  chosen_spanish: tomándola de la mano
  alternatives_spanish:
  - tomando su mano
  - habiéndola tomado de la mano
  lexicon: BDAG
  rationale: La expresión conserva el gesto concreto de transferencia matrimonial. «Tomándola de la mano» refleja bien el participio y su sentido físico.
- source_word: παρέδωκεν αὐτὴν Τωβείᾳ γυναῖκα
  english_pob_choice: he gave her to Tobiah as a wife
  chosen_spanish: la entregó a Tobit como esposa
  alternatives_spanish:
  - la dio a Tobit como mujer
  - la puso en manos de Tobit como esposa
  lexicon: BDAG
  rationale: παραδίδωμι aquí expresa entrega formal, no traición. «La entregó» mantiene ese matiz. Se usa «esposa» para el valor marital de γυναῖκα, y «Tobit» sigue la forma española habitual del nombre en esta sección.
- source_word: Ἰδοὺ
  english_pob_choice: See
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Ve
  lexicon: BDAG
  rationale: Es un marcador deíctico de atención. «Mira» suena natural en español y conserva el impulso exhortativo sin arcaísmo.
- source_word: κατὰ τὸν νόμον Μωυσέως
  english_pob_choice: according to the law of Moses
  chosen_spanish: conforme a la ley de Moisés
  alternatives_spanish:
  - según la ley de Moisés
  - de acuerdo con la ley de Moisés
  lexicon: BDAG
  rationale: La fórmula mantiene explícita la referencia mosaica. «Conforme a» expresa adecuación normativa y funciona bien en un contexto jurídico-ritual.
- source_word: κομίζου
  english_pob_choice: take her
  chosen_spanish: tómala
  alternatives_spanish:
  - recíbela
  - llévala
  lexicon: BDAG
  rationale: El imperativo puede abarcar recibir/tomar/traer. En esta secuencia, «tómala» conserva el primer paso del gesto, como en la nota inglesa que reconoce la alternativa de «receive her».
- source_word: ἄπαγε πρὸς τὸν πατέρα σου
  english_pob_choice: bring her to your father
  chosen_spanish: llévala a tu padre
  alternatives_spanish:
  - tráela a tu padre
  - condúcela hacia tu padre
  lexicon: BDAG
  rationale: ἄπαγε implica llevar o conducir a alguien hacia un destino. «Ll&eacute;vala a tu padre» suena natural y preserva el movimiento hacia la casa paterna.
- source_word: εὐλόγησεν αὐτούς
  english_pob_choice: he blessed them
  chosen_spanish: los bendijo
  alternatives_spanish:
  - les dio su bendición
  lexicon: BDAG
  rationale: Es la traducción directa del verbo de bendición. «Los bendijo» mantiene la acción verbal breve y solemne.
theological_decisions:
- issue: Referencia explícita a la ley de Moisés en una escena de matrimonio
  english_pob_reading: Retain the explicit phrase 'according to the law of Moses' without softening or expanding it.
  chosen_spanish_reading: Conservar «conforme a la ley de Moisés» sin suavizarla ni sustituirla por una fórmula genérica.
  alternative_spanish_readings:
  - según la ley
  - de acuerdo con nuestra ley
  rationale: El griego nombra expresamente a Moisés; la versión española debe preservar esa ancla legal y narrativa. No se debe diluir en una referencia vaga.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y sin revisiones aplicadas; se ha mantenido la lectura principal con una sola nota léxica equivalente a la del inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Tobit» se usa como nombre propio españolizado en el cuerpo del texto para coherencia interna del libro.
  - Se conserva un registro sobrio y bíblico sin arcaísmos innecesarios.
  - La nota a pie de página se ancla en «Tobit[a]» para reflejar la alternativa léxica de tomar/recibir.
