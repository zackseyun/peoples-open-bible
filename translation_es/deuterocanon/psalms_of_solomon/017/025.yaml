translation:
  language: es
  text: En sabiduría y justicia[a][b], purifica a Jerusalén de las naciones[c] que la pisotean para ruina[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con sabiduría» para ἐν σοφίᾳ.
    reason: lexical_alternative
  - marker: b
    text: O «en rectitud» para ἐν δικαιοσύνῃ.
    reason: lexical_alternative
  - marker: c
    text: O «los gentiles» para ἐθνῶν.
    reason: lexical_alternative
  - marker: d
    text: Lit. «en destrucción»; o «hacia la ruina» para ἐν ἀπωλείᾳ.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθάρισον
  english_pob_choice: Cleanse
  chosen_spanish: limpia
  alternatives_spanish:
  - purifica
  - limpia de impureza
  lexicon: BDAG
  rationale: El imperativo aoristo pide una acción decisiva de remoción. «Limpia» conserva la fuerza directa y natural del verbo sin perder el matiz de purificación o depuración que también puede implicar el griego.
- source_word: Ἰερουσαλήμ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  lexicon: Nombre propio estándar
  rationale: Se mantiene el nombre propio en su forma española corriente, conforme al uso bíblico.
- source_word: ἐθνῶν
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  lexicon: BDAG
  rationale: El contexto alude a pueblos extranjeros opresores de Jerusalén; «las naciones» es más transparente y menos restringido que «los gentiles», aunque esta última sigue siendo una posibilidad léxica.
- source_word: καταπατούντων
  english_pob_choice: trampling
  chosen_spanish: que la aplastan
  alternatives_spanish:
  - que la pisan
  - que la pisan y oprimen
  lexicon: BDAG
  rationale: El participio expresa dominación hostil y desprecio. «Aplastan» comunica bien esa violencia figurada en español y conserva el impacto del original.
- source_word: ἐν ἀπωλείᾳ
  english_pob_choice: in destruction
  chosen_spanish: en destrucción
  alternatives_spanish:
  - para ruina
  - hacia la ruina
  lexicon: BDAG
  rationale: La frase puede señalar resultado o modo. «En destrucción» conserva de cerca la expresión griega sin resolver en exceso la relación exacta, dejando abierta la ambigüedad del original.
- source_word: ἐν σοφίᾳ
  english_pob_choice: in wisdom
  chosen_spanish: en sabiduría
  alternatives_spanish:
  - con sabiduría
  lexicon: BDAG
  rationale: Se conserva la preposición de forma bastante literal para mantener la posible relación de modo o medio que presenta el griego.
- source_word: ἐν δικαιοσύνῃ
  english_pob_choice: in righteousness
  chosen_spanish: en justicia
  alternatives_spanish:
  - en rectitud
  - con justicia
  lexicon: BDAG
  rationale: Se elige «justicia» por fidelidad al campo semántico de δικαιοσύνη y por la sonoridad paralela con «sabiduría». En español, «justicia» también permite la lectura ética/judicial del término.
theological_decisions:
- issue: 'Cómo entender ἐθνῶν: «naciones» o «gentiles».'
  english_pob_reading: nations
  chosen_spanish_reading: las naciones
  alternative_spanish_readings:
  - los gentiles
  rationale: El pasaje habla de pueblos extranjeros que oprimen a Jerusalén. «Las naciones» evita introducir una oposición técnica judíos/gentiles que el verso no exige explícitamente.
  doctrine_reference: Uso contextual de lenguaje etnopolítico en literatura judía del Segundo Templo
- issue: 'A qué modifican «ἐν σοφίᾳ, ἐν δικαιοσύνῃ»: al mandamiento de limpiar o a las naciones.'
  english_pob_reading: They are taken with the imperative ‘Cleanse,’ expressing manner/means.
  chosen_spanish_reading: 'Modifican la petición de limpiar: «En sabiduría y justicia, limpia…»'
  alternative_spanish_readings:
  - Las naciones lo hacen en sabiduría y justicia.
  - En sabiduría y justicia describe el criterio con que son removidas.
  rationale: El orden en español debe dejar claro que los modificadores acompañan el imperativo, no que califiquen a las naciones. Colocarlos al inicio evita ambigüedad y reproduce la solución adoptada en el texto inglés revisado.
  doctrine_reference: Sintaxis de participios y frases preposicionales en griego bíblico
- issue: 'Sentido de ἐν ἀπωλείᾳ: ¿«ruina», «destrucción» o «perdición»?'
  english_pob_reading: in destruction
  chosen_spanish_reading: en destrucción
  alternative_spanish_readings:
  - para ruina
  - en ruina
  rationale: «Destrucción» mantiene la dureza del término sin cargarlo con una connotación soteriológica que «perdición» tendría en español cristiano. Así se preserva el sentido de devastación material y social.
  doctrine_reference: Léxico de devastación en textos de juicio
translation_notes:
  revision_awareness: La redacción inglesa revisada movió «in wisdom and righteousness» al inicio para evitar que parecieran modificar a las naciones. La versión española adopta esa misma solución sintáctica y conserva la densidad de ἐν ἀπωλείᾳ con «en destrucción», sin expandir el sentido a una paráfrasis.
  spanish_consistency_notes:
  - Se mantiene «Jerusalén» como nombre propio estándar.
  - Se usa «justicia» para δικαιοσύνη, en continuidad con el valor ético/judicial preferido por el proyecto.
  - «Naciones» se conserva como opción principal; «gentiles» queda solo como alternativa de nota.
  - El verbo «limpia» se eligió por su naturalidad en español y por su correspondencia con el imperativo decisivo del griego.
