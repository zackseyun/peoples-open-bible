translation:
  language: es
  text: ¡El chasquido del látigo[a], y el traqueteo de la rueda[b], con caballo al galope y carro de guerra que salta!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el sonido del látigo, y el sonido de la rueda traqueteante».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo acumula imágenes sonoras breves sin verbo finito, intensificando la inmediatez de la escena de combate.
    reason: cultural_note
lexical_decisions:
- source_word: ק֣וֹל
  english_pob_choice: the crack / the rumble
  chosen_spanish: el chasquido / el estruendo
  alternatives_spanish:
  - el sonido
  - el ruido
  - la voz
  lexicon: HALOT
  rationale: קוֹל puede significar sonido, ruido o voz. En este cuadro bélico, el español natural exige imágenes auditivas concretas; por eso se especifica como 'chasquido' para el látigo y 'estruendo' para la rueda, manteniendo el foco en el sonido sin repetir mecánicamente 'sonido de...'.
- source_word: שׁ֔וֹט
  english_pob_choice: whip
  chosen_spanish: látigo
  alternatives_spanish:
  - azote
  - fusta
  - chicote
  lexicon: HALOT
  rationale: El sustantivo designa un látigo usado para conducir o golpear. 'Látigo' es el equivalente claro y natural en español para este contexto militar de carros de guerra.
- source_word: רַ֣עַשׁ
  english_pob_choice: rumble
  chosen_spanish: estruendo
  alternatives_spanish:
  - tableteo
  - traqueteo
  - ruido
  - retumbo
  lexicon: HALOT
  rationale: רַעַשׁ implica sacudida, ruido fuerte o traqueteo. Con 'rueda' como complemento, 'estruendo' comunica bien la intensidad sonora del movimiento bélico; 'traqueteo' o 'retumbo' quedan como alternativas posibles, pero 'estruendo' funciona mejor en esta construcción poética.
- source_word: אוֹפָ֑ן
  english_pob_choice: wheel
  chosen_spanish: rueda
  alternatives_spanish:
  - rueda del carro
  lexicon: HALOT
  rationale: El sentido básico es 'rueda'. El contexto ya sugiere el carro de guerra, de modo que no hace falta expandirlo en el texto principal.
- source_word: ס֣וּס
  english_pob_choice: horse
  chosen_spanish: caballo
  alternatives_spanish:
  - corcel
  - caballo de guerra
  lexicon: HALOT
  rationale: El hebreo dice simplemente 'caballo'. En español, 'caballo' es la forma natural y precisa; 'caballo de guerra' añadiría una especificación no explícita en el hebreo.
- source_word: דֹּהֵ֔ר
  english_pob_choice: galloping
  chosen_spanish: galopante
  alternatives_spanish:
  - al galope
  - que galopa
  - en galope
  lexicon: HALOT
  rationale: El participio expresa movimiento rápido del caballo. 'Galopante' mantiene la imagen y la concisión poética del original sin sobrecargar la línea con una perífrasis.
- source_word: מֶרְכָּבָ֖ה
  english_pob_choice: chariot
  chosen_spanish: carro
  alternatives_spanish:
  - carro de guerra
  - carroza
  lexicon: HALOT
  rationale: Aunque 'chariot' suele traducirse 'carro de guerra', el hebreo no añade explícitamente esa expansión aquí. 'Carro' conserva la imagen breve y sonora del poema; el contexto militar ya la define.
- source_word: מְרַקֵּדָֽה
  english_pob_choice: bounding
  chosen_spanish: que salta
  alternatives_spanish:
  - rebotando
  - que brinca
  - que danza
  lexicon: HALOT
  rationale: El verbo proviene de רקד, literalmente 'saltar/brincar/danzar'. Para un carro sacudido en movimiento, 'que salta' reproduce la vivacidad física sin sugerir festividad, que sería engañosa en español moderno.
translation_notes:
  revision_awareness: 'Coincide con el contexto fuente y con el audit trail inglés: se preserva la secuencia de imágenes sonoras y cinéticas, y se evita añadir especificaciones no presentes en el hebreo.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo auditivo del hebreo con dos núcleos sonoros coordinados.
  - '''Caballo'' y ''carro'' conservan la concisión del original, mientras que la nota explica el efecto poético acumulativo.'
  - No se introduce vocabulario eclesiástico ni lecturas interpretativas ajenas al verso.
