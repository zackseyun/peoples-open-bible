review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: כִּי como explicación, לִימִין como posición de apoyo, לְהוֹשִׁיעַ como propósito, y מִשֹּׁפְטֵי ... נַפְשׁוֹ como amenaza judicial dirigida contra la persona. Sin embargo, «se pone» para יַעֲמֹד debilita el valor de postura firme/característica de «stands» y del hebreo; «está» o «permanece» encaja mejor. Además, el sistema de notas no preserva bien las alternativas significativas del POB inglés: falta nota sobre «su alma / su vida / él mismo», y la nota [b] sobre «el pobre» es impropia porque no aporta una alternativa real al texto principal.'
  spanish_quality_summary: El español es claro y digno, pero «se pone a la diestra» suena menos natural y menos estable que «está a la derecha/diestra». «A la diestra» es aceptable en registro bíblico, pero «a la derecha» es más natural en español contemporáneo amplio sin perder el sentido. Las notas actuales también necesitan limpieza para evitar redundancia y para reflejar verdaderas alternativas léxicas.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Alma» puede mantenerse por fidelidad al estado actual de la auditoría inglesa, pero conviene anotar que נֶפֶשׁ también puede significar «vida» o «él mismo». «El pobre» es adecuado para אֶבְיוֹן.
  issues:
  - severity: medium
    issue: «se pone» no representa óptimamente יַעֲמֹד
    rationale: El hebreo y el POB inglés expresan una postura de apoyo firme o característica («stands»), no solo el movimiento de colocarse. «Se pone» puede sugerir acto puntual y suena menos idiomático con «a la diestra».
  - severity: medium
    issue: Falta nota sobre «su alma»
    rationale: El POB inglés conserva nota para nephesh; en español también hace falta porque «alma» puede malinterpretarse como sentido estrictamente inmaterial, mientras el hebreo puede abarcar «vida» o «él mismo».
  - severity: low
    issue: La nota [b] actual es débil e innecesaria
    rationale: Decir «O “el pobre”» no ofrece alternativa real al texto principal, y la explicación mezcla alternativas semánticas que deberían formularse con claridad si se conservan.
  revised_spanish_text: Porque él está a la derecha del pobre, para salvarlo de quienes juzgan su alma[a].
  revised_footnotes:
  - marker: a
    text: O «su vida» o «a él mismo»; el hebreo néfesh puede significar «alma», «vida» o la persona misma, según el contexto.
    reason: lexical_alternative
