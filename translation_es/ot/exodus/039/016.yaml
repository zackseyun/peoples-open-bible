review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el contenido del hebreo: hicieron dos piezas de oro, dos anillos de oro, y colocaron los anillos en los dos extremos del pectoral. También conserva la repetición de ''oro'' y la doble mención de ''dos'', en línea con el texto fuente y la auditoría inglesa.'
  spanish_quality_summary: El español es claro y natural, pero 'monturas' puede sonar algo impreciso o menos idiomático en un contexto de orfebrería/costura cultual. 'Engastes' comunica mejor la idea de piezas de sujeción/ajuste para piedras o elementos ornamentales, y armoniza mejor con las alternativas documentadas por el POB. Además, 'sobre los dos extremos' es aceptable, pero 'en los dos extremos' suena más natural para ubicación de anillos fijados al pectoral.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Pectoral' para הַחֹשֶׁן está bien. La nota léxica debe mantenerse porque מִשְׁבְּצֹת admite alternativas como 'monturas' o 'trabajo de filigrana'.
  issues:
  - severity: medium
    issue: '''monturas'' para מִשְׁבְּצֹת es posible, pero menos preciso que ''engastes'' en este contexto artesanal/cultual'
    rationale: La auditoría inglesa eligió 'settings' con alternativas 'mountings' y 'filigree settings'. En español, 'engastes' corresponde mejor a 'settings' en contexto de orfebrería, mientras 'monturas' puede sonar más general o mecánico.
  - severity: low
    issue: '''sobre los dos extremos'' puede mejorarse a ''en los dos extremos'''
    rationale: El hebreo עַל literalmente es 'sobre/on', pero en español la colocación de anillos sujetos a una pieza suele expresarse con 'en' sin pérdida de sentido. Esto mejora la naturalidad sin apartarse del original.
  revised_spanish_text: Hicieron dos engastes[a] de oro y dos anillos de oro, y pusieron los dos anillos en los dos extremos del pectoral.
  revised_footnotes:
  - marker: a
    text: O "monturas" o "engastes de filigrana"; el término hebreo se refiere al trabajo de oro usado como pieza de ajuste o sujeción ornamental.
    reason: lexical_alternative
