translation:
  language: es
  text: Porque cuando fueron probados[a], aunque eran disciplinados con misericordia[b], aprendieron cómo los impíos[c] eran atormentados al ser juzgados en ira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fueron puestos a prueba»; el griego puede expresar prueba o examen, no principalmente tentación al pecado en este contexto.
    reason: lexical_alternative
  - marker: b
    text: O «siendo instruidos» o «siendo corregidos» para «eran disciplinados»; el término griego puede abarcar educación, formación y disciplina correctiva.
    reason: lexical_alternative
  - marker: c
    text: O «los malvados»; el griego resalta especialmente la impiedad hacia Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπειράσθησαν
  english_pob_choice: were tested
  chosen_spanish: fueron probados
  alternatives_spanish:
  - fueron puestos a prueba
  - fueron tentados
  lexicon: BDAG
  rationale: El verbo griego aquí expresa prueba o examen, no principalmente tentación al pecado. «Fueron probados» conserva el sentido de experiencia de prueba y suena natural en español bíblico actual.
- source_word: καίπερ
  english_pob_choice: though
  chosen_spanish: aunque
  alternatives_spanish:
  - si bien
  - aun cuando
  lexicon: LSJ
  rationale: Introduce una concesión clara y fluida en español, equivalente al valor concesivo del griego.
- source_word: ἐν ἐλέει
  english_pob_choice: with mercy
  chosen_spanish: con misericordia
  alternatives_spanish:
  - en misericordia
  - misericordiosamente
  lexicon: BDAG
  rationale: La frase expresa el modo o la esfera de la disciplina. «Con misericordia» conserva el sustantivo y mantiene la fuerza teológica de ἔλεος sin volverlo meramente adverbial.
- source_word: παιδευόμενοι
  english_pob_choice: being disciplined
  chosen_spanish: eran disciplinados
  alternatives_spanish:
  - eran instruidos
  - eran corregidos
  - eran educados
  lexicon: BDAG
  rationale: En este contexto, παιδεύω incluye corrección formativa bajo trato divino. «Disciplinados» preserva la tensión entre formación y corrección, sin reducirlo solo a enseñanza.
- source_word: ἔγνωσαν
  english_pob_choice: they learned
  chosen_spanish: aprendieron
  alternatives_spanish:
  - llegaron a saber
  - comprendieron
  lexicon: BDAG
  rationale: El aoristo indica adquisición de conocimiento por experiencia. «Aprendieron» transmite bien ese reconocimiento experiencial.
- source_word: ἐν ὀργῇ
  english_pob_choice: in wrath
  chosen_spanish: en ira
  alternatives_spanish:
  - bajo ira
  - con ira
  lexicon: BDAG
  rationale: «Ira» es el equivalente natural de ὀργή en español bíblico. Se mantiene la preposición para conservar la compacta relación del griego con el juicio divino.
- source_word: κρινόμενοι
  english_pob_choice: being judged
  chosen_spanish: eran juzgados
  alternatives_spanish:
  - estaban bajo juicio
  - eran condenados
  lexicon: BDAG
  rationale: El verbo indica el proceso de juicio. «Eran juzgados» es directo y evita intensificar indebidamente hacia «condenados».
- source_word: ἀσεβεῖς
  english_pob_choice: the ungodly
  chosen_spanish: los impíos
  alternatives_spanish:
  - los irreverentes
  - los malvados
  lexicon: BDAG
  rationale: ἀσεβής enfatiza falta de reverencia hacia Dios. «Impíos» es el correlato español más estable para esa carga religiosa y moral.
- source_word: ἐβασανίζοντο
  english_pob_choice: were tormented
  chosen_spanish: eran atormentados
  alternatives_spanish:
  - eran torturados
  - sufrían tormento
  lexicon: BDAG
  rationale: El verbo puede denotar tormento severo o tortura. «Eran atormentados» comunica sufrimiento intenso sin especificar más de lo que el texto exige.
theological_decisions:
- issue: Contraste entre disciplina misericordiosa y juicio en ira
  english_pob_reading: Rendered παιδευόμενοι as corrective 'being disciplined' and contrasted it with the ungodly 'being judged in wrath' and 'tormented.'
  chosen_spanish_reading: Se tradujo παιδευόμενοι como «eran disciplinados» y se mantuvo el contraste con «eran juzgados en ira» y «eran atormentados».
  alternative_spanish_readings:
  - eran instruidos
  - eran corregidos
  - eran castigados
  rationale: El versículo contrapone el trato misericordioso a los justos con el juicio iracundo sobre los impíos. «Disciplinados» conserva la mezcla de corrección y formación sin borrar la tensión teológica del pasaje.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica en lugar de resolverla; español claro, no arcaizante.'
translation_notes:
  revision_awareness: El texto inglés auditado y la revisión más reciente muestran alta concordancia y ningún cambio pendiente; se conservó la lectura óptima sin introducir expansiones interpretativas.
  spanish_consistency_notes:
  - Se mantuvo «impíos» para ἀσεβεῖς, en línea con el valor religioso de impiedad hacia Dios.
  - Se eligió «ira» para ὀργή y «eran juzgados» para κρινόμενοι, preservando el tono judicial-teológico del verso.
  - Se evitó «tentados» para ἐπειράσθησαν, porque el contexto no apunta primariamente a seducción al pecado.
  - Se evitó «torturados» en el cuerpo principal para no especificar el modo de tormento más allá del griego, aunque la alternativa queda implícita en la nota.
