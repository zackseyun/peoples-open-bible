review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del hebreo: mandato ritual de poner todas las porciones sobre las palmas de Aarón y de sus hijos, seguido del gesto de mecerlas delante de Yahvé. Conserva correctamente «palmas» y el nombre divino «Yahvé». Sin embargo, no preserva fielmente el número del pronombre objeto אֹתָם, que es plural («them»), ya que traduce «lo mecerás» en singular. Además, «sus hijos» pierde la precisión de «sons» que el inglés auditado documentó explícitamente; en este contexto sacerdotal conviene «sus hijos varones» o mejor «sus hijos» solo si el contexto basta, pero aquí la revisión más fiel al razonamiento auditado es «sus hijos» puede mantenerse si no hay ambigüedad. Aun así, el principal problema fuente-texto es el singular «lo».'
  spanish_quality_summary: El español es natural y digno. «Pondrás», «sobre las palmas», «delante de Yahvé» y «ofrenda mecida» son legibles y apropiados para un registro bíblico moderno. La principal reparación necesaria es cambiar «lo mecerás» por un plural que concuerde con las porciones mencionadas. Para mejorar la claridad sin rigidez, «los mecerás como ofrenda mecida» funciona bien.
  glossary_alignment: 'Alineación generalmente buena con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; תְּנוּפָה -> «ofrenda mecida» es defendible y claro; כַּפֵּי -> «palmas» preserva la concreción ritual. La divergencia relevante no es de glosario sino gramatical: אֹתָם debe mantenerse en plural en español.'
  issues:
  - severity: high
    issue: 'El pronombre objeto אֹתָם (plural) se tradujo como singular: «lo mecerás».'
    rationale: El hebreo se refiere a múltiples porciones/elementos. El inglés POB documentó explícitamente «them». El singular español cambia la referencia gramatical y atenúa la pluralidad del original.
  - severity: medium
    issue: La decisión léxica sobre בָנָיו como «sus hijos» es menos precisa que el razonamiento auditado en inglés («his sons»).
    rationale: Aunque «hijos» puede ser aceptable en español bíblico por contexto, el audit trail justificó precisión masculina por el contexto sacerdotal. No exige adjudicación mayor, pero conviene notar la ligera pérdida de especificidad.
  revised_spanish_text: Pondrás todo sobre las palmas de Aarón y sobre las palmas de sus hijos[a], y los mecerás como ofrenda mecida delante de Yahvé.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «sobre las palmas de Aarón y sobre las palmas de sus hijos»; algunas traducciones amplían a «manos», pero el hebreo es más específico: «palmas».'
    reason: lexical_alternative
  revision_rationale: Se corrigió el pronombre singular «lo» a plural «los» para reflejar fielmente אֹתָם y el inglés auditado «them», manteniendo el resto de las decisiones bien alineadas con el hebreo y con la terminología del proyecto.
