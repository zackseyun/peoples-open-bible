translation:
  language: es
  text: Ahora, porque comemos la sal del palacio[a], y no es apropiado para nosotros presenciar la deshonra del rey[b], por eso hemos enviado e informado al rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Arameo: «comer la sal del palacio», un modismo que significa recibir sustento de la corte o estar al servicio del palacio real.'
    reason: cultural_note
  - marker: b
    text: Literalmente, «la desnudez del rey», un modismo para la deshonra, el perjuicio o el daño del rey.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּעַן כָּל קֳבֵל דִּי
  english_pob_choice: Now because
  chosen_spanish: Ahora, porque
  alternatives_spanish:
  - Ahora bien, porque
  - Pues ahora
  lexicon: HALOT
  rationale: La secuencia aramea introduce la razón de la acción; «Ahora, porque» conserva tanto el giro discursivo como el valor causal sin sonar forzado en español.
- source_word: מְלַח הֵיכְלָא מְלַחְנָא
  english_pob_choice: we eat the salt of the palace
  chosen_spanish: comemos la sal del palacio
  alternatives_spanish:
  - recibimos sustento del palacio
  - estamos al servicio del palacio
  lexicon: HALOT
  rationale: Se mantiene la imagen idiomática de la sal, porque el hebreo/arameo la usa como expresión cultural de dependencia o manutención en la corte. En el texto principal se conserva la textura original, como en el POB inglés.
- source_word: הֵיכְלָא
  english_pob_choice: the palace
  chosen_spanish: el palacio
  alternatives_spanish:
  - el templo
  - la corte
  lexicon: HALOT
  rationale: El contexto persa y administrativo apunta al palacio real, no al templo; por eso «palacio» es la opción contextual más fiel.
- source_word: וְעַרְוַת מַלְכָּא
  english_pob_choice: the king’s dishonor
  chosen_spanish: la deshonra del rey
  alternatives_spanish:
  - la vergüenza del rey
  - el daño del rey
  - la desnudez del rey
  lexicon: HALOT
  rationale: La expresión es literalmente «la desnudez del rey», pero funciona como idiomática de deshonra, perjuicio o humillación. «Deshonra» comunica bien el sentido global sin borrar el trasfondo literal.
- source_word: לָא אֲרִיךְ לַנָא
  english_pob_choice: it is not fitting for us
  chosen_spanish: no nos conviene
  alternatives_spanish:
  - no nos parece उचितo
  - no es apropiado para nosotros
  - no es correcto para nosotros
  lexicon: HALOT
  rationale: La frase expresa conveniencia/propriedad moral más que capacidad. «No nos conviene» es natural y mantiene el tono formal.
- source_word: לְמֶחֱזֵא
  english_pob_choice: to witness
  chosen_spanish: ver
  alternatives_spanish:
  - contemplar
  - presenciar
  - ser testigos de
  lexicon: HALOT
  rationale: El infinitivo es simplemente «ver». Aunque el inglés POB optó por «witness» por estilo, en español «ver» conserva mejor la concisión del arameo; la restricción idiomática ya la aporta el contexto.
- source_word: עַל־דְּנָה
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por tanto
  - así que
  - por esta razón
  lexicon: HALOT
  rationale: La expresión introduce la consecuencia lógica de lo anterior. «Por eso» es claro, idiomático y suficientemente formal.
- source_word: שְׁלַחְנָא
  english_pob_choice: we have sent
  chosen_spanish: hemos enviado
  alternatives_spanish:
  - enviamos
  - mandamos
  lexicon: HALOT
  rationale: El perfecto arameo se vierte naturalmente con presente perfecto en español en este contexto epistolar/reportado.
- source_word: וְהוֹדַעְנָא לְמַלְכָּא
  english_pob_choice: and informed the king
  chosen_spanish: y dado aviso al rey
  alternatives_spanish:
  - y hecho saber al rey
  - y notificado al rey
  - y comunicado al rey
  lexicon: HALOT
  rationale: «Hacer saber»/«dar aviso» reproduce el valor de הודע sin forzar tecnicismos. Se elige «dado aviso» para mantener paralelismo con «hemos enviado» y un registro formal.
theological_decisions:
- issue: Imagen idiomática de «la desnudez del rey»
  english_pob_reading: Literally, 'the king’s nakedness,' an idiom for the king’s dishonor, detriment, or injury.
  chosen_spanish_reading: «La deshonra del rey» en el texto principal, con la imagen literal preservada en nota.
  alternative_spanish_readings:
  - la desnudez del rey
  - la vergüenza del rey
  - el daño del rey
  rationale: 'No se borra la tensión entre literalidad e idiomática: la frase hebrea/aramea es corporalmente cruda, pero su función aquí es política y honorífica. El texto principal comunica el sentido; la nota conserva la literalidad.'
  doctrine_reference: Principio de equivalencia optimal y fidelidad semántica idiomática
translation_notes:
  revision_awareness: Se siguió el pasaje revisado del POB inglés en su forma final, incluyendo el matiz de «witness» en la base auditada, pero se juzgó que en español «ver» mantiene mejor la economía del arameo sin perder el registro formal. Se preservó la idiomaticidad de ambos modismos con notas explicativas.
  spanish_consistency_notes:
  - Se usa «palacio» para הֵיכְלָא por el contexto persa, no «templo».
  - Se traduce הודע con «dar aviso» para mantener un registro administrativo formal.
  - Se conserva el modismo de la sal en el cuerpo del texto y se explicita en nota, siguiendo el POB inglés.
  - Se mantiene «rey» sin reemplazos honoríficos adicionales para no añadir solemnidad no exigida por el arameo.
