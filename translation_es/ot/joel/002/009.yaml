revisions:
- from: Por la ciudad[a] corren; sobre el muro corren; suben a las casas; entran por las ventanas como ladrón.
  to: Por la ciudad[a] irrumpen; corren sobre el muro; trepan a las casas; entran por las ventanas como un ladrón.
  rationale: Se ajusta el primer verbo para reflejar mejor la fuerza de יָשֹׁקּוּ y distinguirlo de «corren» para יְרֻצוּן; se cambia «suben a las casas» por «trepan a las casas» para expresar mejor la imagen de asalto implícita en el contexto; y se normaliza «como un ladrón» por naturalidad idiomática en español. La nota [a] se conserva tal como corresponde al matiz locativo de בָּעִיר.
