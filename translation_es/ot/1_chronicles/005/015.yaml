lexical_decisions:
- source_word: אֲחִי
  english_pob_choice: Ahi
  chosen_spanish: Ahi
  alternatives_spanish:
  - Ají
  lexicon: nombre propio
  rationale: Es un nombre אישי/proprio; en español se conserva por transliteración, no se traduce.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En esta fórmula genealógica, 'hijo de' es la equivalencia natural y clara en español; mantiene la relación inmediata de linaje que expresa el hebreo.
- source_word: עַבְדִּיאֵל
  english_pob_choice: Abdiel
  chosen_spanish: Abdiel
  alternatives_spanish:
  - Abdiel
  lexicon: nombre propio
  rationale: Nombre propio transliterado de manera estándar, sin intentar traducir su composición semítica.
- source_word: גּוּנִי
  english_pob_choice: Guni
  chosen_spanish: Guni
  alternatives_spanish:
  - Guni
  lexicon: nombre propio
  rationale: Nombre propio preservado por transliteración.
- source_word: רֹאשׁ
  english_pob_choice: head
  chosen_spanish: jefe
  alternatives_spanish:
  - cabeza
  - principal
  - líder
  lexicon: HALOT
  rationale: '''Jefe'' comunica en español la idea funcional de autoridad o liderazgo que el hebreo expresa con ''cabeza'', sin sonar forzado como calco literal.'
- source_word: לְבֵית אֲבוֹתָם
  english_pob_choice: of their fathers’ houses
  chosen_spanish: de las casas de sus padres
  alternatives_spanish:
  - de sus casas paternas
  - de sus casas ancestrales
  - de las casas de sus antepasados
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de clan. 'Casas de sus padres' conserva el orden y la imaginería del original, y es comprensible en español; 'padres' mantiene la referencia técnica a linaje/ascendencia.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo de 1 Crónicas 5:15 y coincide en sustancia con el audit trail inglés: nombre propio inicial, fórmula genealógica con בן, y el modismo בית אבותם entendido como jefatura de casas/clanes paternos. No se introdujeron cambios textuales respecto al testimonio base, solo ajustes naturales al español.'
  spanish_consistency_notes:
  - Se preserva el paralelismo genealógico del hebreo con la repetición de 'hijo de'.
  - '''Casas de sus padres'' mantiene el valor de clan/linaje sin sustituirlo por una paráfrasis sociológica.'
  - '''Jefe'' traduce la metáfora de ''cabeza'' de manera idiomática en español sin perder la noción de liderazgo.'
