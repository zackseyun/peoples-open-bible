  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: finalidad con ἵνα, conocimiento resultante con γνῶσιν, y la lógica de correspondencia medida-por-medida en διʼ ὧν ... διὰ τούτων ... κολάζεται. Sin embargo, el español introduce una incongruencia gramatical al pasar de «una persona» a «es castigada», lo que desajusta el referente genérico singular. También puede simplificarse levemente la segunda mitad para sonar más natural sin perder el paralelismo.'
  spanish_quality_summary: El texto es claro y fiel, pero «por esas mismas es castigada» suena algo forzado y además depende de un antecedente femenino expreso por «una persona». En español bíblico natural y neutral, «alguien» permite mantener el valor indefinido sin tropiezo de género, y «por estas es castigado» conserva mejor la simetría del griego con lectura fluida.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «peca» y «castigado» preservan bien la fuerza moral y judicial. No intervienen términos sensibles como Yahvé, Mesías, Espíritu, carne o esclavo. La nota léxica sobre la repetición de διά está bien encaminada y debe conservarse con ajuste al nuevo texto.
  issues:
  - severity: medium
    issue: Desajuste de género y referente en «una persona ... es castigada»
    rationale: El griego tiene un sujeto indefinido singular genérico (τις). El español del borrador usa «una persona», pero la estructura resultante suena pesada y la concordancia femenina condiciona innecesariamente toda la cláusula. «Alguien ... es castigado» o una reformulación impersonal preserva mejor el valor genérico.
  - severity: low
    issue: Leve rigidez en «por esas mismas es castigada»
    rationale: Aunque semánticamente correcto, el giro no suena tan natural en español como podría. Una leve revisión puede mantener el paralelismo y mejorar la legibilidad eclesial sin alejarse del original.
