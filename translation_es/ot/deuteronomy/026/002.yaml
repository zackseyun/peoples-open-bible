translation:
  language: es
  text: Tomarás de las primicias[a] de todo el fruto de la tierra[b] que traigas de tu tierra, que Yahvé tu Dios te está dando, y las pondrás en un canasto, y irás al lugar que Yahvé tu Dios escogerá para hacer habitar allí su nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Primicias» recoge el valor de מֵרֵאשִׁית con mayor precisión que una paráfrasis como «lo primero»; también es la forma bíblica tradicional para la primera porción ofrecida.
    reason: lexical_alternative
  - marker: b
    text: «Fruto de la tierra» conserva la imagen agrícola del hebreo y evita una abstracción como «producto»; en este contexto incluye la cosecha en sentido amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַחְתָּ
  english_pob_choice: you shall take
  chosen_spanish: Tomarás
  alternatives_spanish:
  - y tomarás
  - deberás tomar
  lexicon: HALOT
  rationale: En un contexto legal/instructivo, el imperfecto consecutivo funciona como mandato. «Tomarás» comunica mejor la fuerza prescriptiva en español que repetir una coordinación inicial.
- source_word: מֵרֵאשִׁית
  english_pob_choice: some of the firstfruits
  chosen_spanish: de las primicias
  alternatives_spanish:
  - de los primeros frutos
  - de la primera porción
  lexicon: HALOT
  rationale: La POB inglesa revisó hacia «firstfruits» para reflejar con más precisión מֵרֵאשִׁית. En español, «primicias» es el equivalente bíblico y conserva esa noción de primera porción ofrecida.
- source_word: כָּל פְּרִי הָאֲדָמָה
  english_pob_choice: all the fruit of the ground
  chosen_spanish: todo el fruto de la tierra
  alternatives_spanish:
  - todo el producto de la tierra
  - todo el fruto del suelo
  lexicon: HALOT
  rationale: «Fruto de la tierra» mantiene la imagen agrícola concreta del hebreo y es natural en español bíblico. Se evita «producto» por ser más abstracto y menos transparente.
- source_word: אֲשֶׁר תָּבִיא מֵאַרְצְךָ
  english_pob_choice: that you bring in from your land
  chosen_spanish: que traigas de tu tierra
  alternatives_spanish:
  - que introduzcas de tu tierra
  - que lleves de tu tierra
  lexicon: HALOT
  rationale: «Traer» reproduce bien la idea de introducir la cosecha desde la tierra al lugar del culto. «Traigas» conserva el matiz subordinado del hebreo dentro del mandato principal.
- source_word: אֲשֶׁר יְהוָה אֱלֹהֶיךָ נֹתֵן לָךְ
  english_pob_choice: which Yahweh your God is giving you
  chosen_spanish: que Yahvé tu Dios te está dando
  alternatives_spanish:
  - que Yahvé tu Dios te da
  - que Yahvé tu Dios te concede
  lexicon: HALOT
  rationale: El participio נֹתֵן indica acción en curso o carácter continuo; «te está dando» preserva ese valor aspectual y la idea de posesión como don divino.
- source_word: וְשַׂמְתָּ בַטֶּנֶא
  english_pob_choice: and put it in a basket
  chosen_spanish: y las pondrás en un canasto
  alternatives_spanish:
  - y las colocarás en un canasto
  - y las pondrás en una canasta
  lexicon: HALOT
  rationale: Se traduce el recipiente con un término claro y común. «Las» retoma naturalmente las primicias/frutos en español, evitando una referencia opaca al singular colectivo del inglés.
- source_word: וְהָלַכְתָּ אֶל הַמָּקוֹם
  english_pob_choice: and go to the place
  chosen_spanish: y irás al lugar
  alternatives_spanish:
  - y te irás al lugar
  - y caminarás al lugar
  lexicon: HALOT
  rationale: «Lugar» es el equivalente usual para הַמָּקוֹם en el lenguaje deuteronómico del santuario central. «Irás» mantiene la secuencia normativa del pasaje.
- source_word: אֲשֶׁר יִבְחַר
  english_pob_choice: that ... will choose
  chosen_spanish: que Yahvé tu Dios escoja
  alternatives_spanish:
  - que Yahvé tu Dios elegirá
  - que Yahvé tu Dios seleccione
  lexicon: HALOT
  rationale: El imperfecto apunta a una elección futura relativa al discurso de Moisés. «Escoja» preserva ese valor sin forzar un futuro auxiliar poco natural en español.
- source_word: לְשַׁכֵּן שְׁמוֹ שָׁם
  english_pob_choice: to make his name dwell there
  chosen_spanish: para hacer habitar allí su nombre
  alternatives_spanish:
  - para hacer morar allí su nombre
  - para poner allí su nombre
  lexicon: HALOT
  rationale: Se conserva la fórmula deuteronómica del «nombre» de Yahvé en el lugar escogido. «Hacer habitar» mantiene la causativa del hebreo y evita reducirla a mera designación geográfica.
theological_decisions:
- issue: Renderización del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La política del proyecto exige transliterar el nombre divino en lugar de ocultarlo como título. «Yahvé» es la forma normativa en el texto español del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fórmula deuteronómica del nombre que habita en el santuario
  english_pob_reading: to make his name dwell there
  chosen_spanish_reading: para hacer habitar allí su nombre
  alternative_spanish_readings:
  - para poner allí su nombre
  - para hacer morar allí su nombre
  rationale: 'La traducción conserva la tensión teológica: el lugar escogido no contiene a Dios, sino que es el sitio donde su nombre/presencia cultual se establece. «Hacer habitar» mantiene la metáfora sin suavizarla.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que corrigió la expresión desde una redacción más literal a «firstfruits» para reflejar mejor מֵרֵאשִׁית. La versión española sigue esa corrección con «primicias» y mantiene la fórmula del nombre que habita en el lugar escogido.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene «su nombre» en singular para שְׁמוֹ, conforme a la fórmula deuteronómica.
  - El mandato se expresa con futuros de valor injuntivo, natural en español bíblico contemporáneo.
  - Se evita sobretraducir «el lugar» con términos cultuales más interpretativos.
  - Las primicias y el fruto de la tierra se distinguen sin perder la cohesión sintáctica del hebreo.
