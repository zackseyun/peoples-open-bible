translation:
  language: es
  text: Porque Topet[a] ya está preparada desde hace tiempo[b]; sí, está dispuesta para el rey. La ha hecho profunda y ancha, con una pira de fuego y abundante leña. El aliento de Yahvé, como un torrente de azufre[c], la enciende.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Topet». La forma hebrea es un nombre de lugar asociado con imágenes de fuego y juicio.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «desde ayer», un modismo que significa que fue preparada con anterioridad o desde hace mucho tiempo.
    reason: lexical_alternative
  - marker: c
    text: Tradicionalmente, algunas traducciones usan una expresión como «azufre ardiente»; el sentido básico aquí es «azufre».
    reason: lexical_alternative
lexical_decisions:
- source_word: עָרוּךְ
  english_pob_choice: has long been prepared
  chosen_spanish: ya está preparada
  alternatives_spanish:
  - está dispuesta
  - ha sido preparada
  - está ordenada
  lexicon: HALOT
  rationale: El participio pasivo comunica un estado resultante; en español, «ya está preparada» conserva la idea de disposición previa sin sonar forzado. Se mantiene la repetición semántica con la línea siguiente para respetar el paralelismo.
- source_word: מֵאֶתְמוּל
  english_pob_choice: long
  chosen_spanish: desde hace tiempo
  alternatives_spanish:
  - desde ayer
  - hace mucho
  - ya
  lexicon: HALOT
  rationale: La forma literal «desde ayer» funciona como modismo de anterioridad, no como marcador temporal de 24 horas. «Desde hace tiempo» transmite esa fuerza idiomática en español natural.
- source_word: תָּפְתֶּה
  english_pob_choice: Topheth
  chosen_spanish: Topet[a]
  alternatives_spanish:
  - Topet
  - Tofet
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado. «Topet» refleja la forma hebrea y evita traducir el término, ya que el texto lo usa como topónimo cargado de imaginería de juicio y fuego.
- source_word: גַּם הוא
  english_pob_choice: indeed, it
  chosen_spanish: sí, está dispuesta
  alternatives_spanish:
  - también está
  - incluso está
  lexicon: HALOT
  rationale: La partícula añade énfasis; en español se reproduce con «sí» y con la reiteración de la idea de disposición. No se introduce un referente interpretativo más allá del texto.
- source_word: לַמֶּלֶךְ
  english_pob_choice: for the king
  chosen_spanish: para el rey
  alternatives_spanish:
  - para el rey mismo
  - para un rey
  lexicon: HALOT
  rationale: Se conserva la ambigüedad del hebreo. «El rey» es la forma más directa y no obliga a identificarlo de manera explícita, como exige la evidencia textual.
- source_word: הוּכָן
  english_pob_choice: is made ready
  chosen_spanish: está dispuesta
  alternatives_spanish:
  - ha sido preparada
  - está preparada
  lexicon: HALOT
  rationale: El hofal de כון expresa ser puesto en orden o preparado. En español se integra con la primera cola para no duplicar mecánicamente la misma idea, manteniendo el paralelismo semántico.
- source_word: הֶעְמִיק הִרְחִב
  english_pob_choice: He has made it deep and wide
  chosen_spanish: la han hecho profunda y ancha
  alternatives_spanish:
  - la hicieron profunda y ancha
  - la hizo profunda y ancha
  - la han profundizado y ensanchado
  lexicon: HALOT
  rationale: Los verbos son 3.ª persona masculina singular en hebreo, pero el español permite un sujeto impersonal plural acorde con la voz pasiva implícita del contexto. «Profunda y ancha» conserva la paridad de los dos verbos sin añadir interpretación.
- source_word: מְדֻרָתָהּ
  english_pob_choice: a pyre
  chosen_spanish: una pira
  alternatives_spanish:
  - un montón para quemar
  - un fogón
  - un hogar
  lexicon: HALOT
  rationale: El sustantivo describe un lugar o montón para el fuego. «Pira» es la opción más precisa para un contexto de combustión y juicio; «hogar» sería demasiado doméstico y «fogón» menos exacto.
- source_word: אֵשׁ וְעֵצִים הַרְבֵּה
  english_pob_choice: of fire and wood in abundance
  chosen_spanish: de fuego y abundante leña
  alternatives_spanish:
  - con fuego y mucha leña
  - de fuego y mucha madera
  - con fuego y gran cantidad de leña
  lexicon: HALOT
  rationale: «Leña» expresa mejor el material destinado a arder que «madera» en este contexto. «Abundante» reproduce con naturalidad el valor de הַרְבֵּה sin recargar la frase.
- source_word: נִשְׁמַת יְהוָה
  english_pob_choice: The breath of Yahweh
  chosen_spanish: El aliento de Yahvé
  alternatives_spanish:
  - El soplo de Yahvé
  - La respiración de Yahvé
  - El aliento de Yahveh
  lexicon: HALOT
  rationale: נשמת puede significar aliento, soplo o respiración; «aliento» preserva el sentido de fuerza vital o soplo poderoso y suena más natural en español bíblico contemporáneo. Se usa «Yahvé» según el criterio terminológico del proyecto.
- source_word: כְּנַחַל גָּפְרִית
  english_pob_choice: like a stream of sulfur
  chosen_spanish: como un torrente de azufre[c]
  alternatives_spanish:
  - como un arroyo de azufre
  - como una corriente de azufre
  - como un torrente de brimstone
  lexicon: HALOT
  rationale: נחל puede abarcar corriente, torrente o cauce estacional; «torrente» comunica mejor la imagen de caudal ardiente e impetuoso. גפרית es «azufre»; se evita «azufre» con sentido técnico moderno, pero aquí la imagen exige su valor bíblico de destrucción.
- source_word: בֹּעֲרָה בָּהּ
  english_pob_choice: kindles it
  chosen_spanish: la enciende
  alternatives_spanish:
  - la prende
  - la hace arder
  - arde en ella
  lexicon: HALOT
  rationale: El participio femenino concuerda con «el aliento» y expresa acción causativa. «La enciende» preserva la fuerza verbal y el efecto inmediato sobre la pira/Topet sin sobreexplicar el mecanismo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo nombra explícitamente a יְהוָה. La política del proyecto en español usa «Yahvé» como forma principal para no ocultar el nombre propio divino tras un título genérico, manteniendo transparencia con el hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Identidad de 'el rey'
  english_pob_reading: for the king
  chosen_spanish_reading: para el rey
  alternative_spanish_readings:
  - para el rey de Asiria
  - para el rey mismo
  - para Molec
  rationale: El hebreo dice solo «para el rey». La traducción no debe fijar una identificación interpretativa que el verso no explicita, aunque el contexto pueda sugerir opciones. Se preserva así la ambigüedad textual documentada.
  doctrine_reference: 'Translation philosophy: original-language primacy; do not import doctrinal claims the text does not make'
translation_notes:
  revision_awareness: 'El texto inglés auditado quedó sin cambios en la última revisión, con solo observaciones menores del control cruzado. La versión española sigue de cerca el original hebreo y conserva las decisiones clave del POB: topónimo transliterado, temporalidad idiomática, imagen de combustión y referencia directa al nombre divino.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה de forma coherente con el estándar del proyecto.
  - Se conserva la distinción entre «aliento» y la imagen de acción encendida, sin convertirla en una explicación interpretativa.
  - «Topet» se translitera con nota para sostener la referencia de lugar y su carga de juicio.
  - Se evita añadir «brimstone» o «SEÑOR» por tratarse de opciones no acordes con la terminología española del proyecto.
