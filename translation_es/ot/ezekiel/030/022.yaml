translation:
  language: es
  text: 'Por tanto, así dice el Señor Yahvé: He aquí que estoy contra el faraón, rey de Egipto, y quebraré sus brazos, tanto el fuerte como el quebrado[a], y haré que la espada caiga de su mano.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el brazo fuerte y el brazo quebrado». Los adjetivos hebreos están en femenino singular y se refieren a «brazo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Marca la conclusión inferencial del contexto profético anterior. 'Por tanto' conserva el nexo lógico con un tono formal y natural en español.
- source_word: כֹּה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - esto dice
  - así ha dicho
  lexicon: HALOT
  rationale: Es la fórmula profética estándar. 'Así dice' mantiene la solemnidad y la inmediatez del oráculo sin sonar forzado.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: Yahvé, el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor Dios
  lexicon: HALOT
  rationale: Se preserva el nombre divino YHWH como 'Yahvé' según el estándar del proyecto, y אֲדֹנָי se vierte como 'el Señor'. En español, la inversión 'Yahvé, el Señor' evita la duplicación 'Señor Señor' y conserva la distinción del título compuesto.
- source_word: הִנְנִי אֶל
  english_pob_choice: Behold, I am against
  chosen_spanish: He aquí que estoy contra
  alternatives_spanish:
  - Miren, estoy contra
  - Estoy contra
  lexicon: HALOT
  rationale: '''הִנְנִי'' introduce autodeclaración enfática; ''He aquí que'' conserva el tono solemne. En este contexto hostil, ''אֶל'' se entiende como ''contra''.'
- source_word: פַּרְעֹה מֶלֶךְ מִצְרַיִם
  english_pob_choice: Pharaoh king of Egypt
  chosen_spanish: el faraón, rey de Egipto
  alternatives_spanish:
  - Faraón, rey de Egipto
  - el faraón, el rey de Egipto
  lexicon: HALOT
  rationale: Se conserva el título real compacto y apposicional. 'Faraón' se escribe en minúscula conforme al uso común en español bíblico y el paralelismo con el título sigue claro.
- source_word: וְשָׁבַרְתִּי
  english_pob_choice: and I will break
  chosen_spanish: quebraré
  alternatives_spanish:
  - romperé
  - haré pedazos
  lexicon: HALOT
  rationale: '''Quebraré'' mantiene el valor básico de שׁבר y su conexión directa con la imagen corporal de los brazos. Es suficientemente literal y natural en español.'
- source_word: זְרֹעֹתָיו
  english_pob_choice: his arms
  chosen_spanish: sus brazos
  alternatives_spanish:
  - sus brazos
  - sus brazos/armas
  lexicon: HALOT
  rationale: En español bíblico 'brazos' es el equivalente más natural de זרועות en esta imagen concreta. Se evita 'armas' para no desplazar el sentido corporal principal.
- source_word: אֶת הַחֲזָקָה וְאֶת הַנִּשְׁבָּרֶת
  english_pob_choice: both the strong one and the broken one
  chosen_spanish: tanto el fuerte como el quebrado
  alternatives_spanish:
  - el fuerte y el quebrado
  - tanto el brazo fuerte como el brazo quebrado
  lexicon: HALOT
  rationale: El hebreo usa adjetivos/participio femeninos que remiten a 'brazo' implícito. En español, 'el fuerte' y 'el quebrado' preservan el contraste sin forzar la repetición de 'brazo', aunque la nota explica la referencia implícita.
- source_word: וְהִפַּלְתִּי
  english_pob_choice: and I will make ... fall
  chosen_spanish: haré que ... caiga
  alternatives_spanish:
  - haré caer
  - caerá
  lexicon: HALOT
  rationale: La forma causativa se expresa con una construcción natural en español. Mantiene la agencia divina y la imagen del arma perdiendo el control.
- source_word: הַחֶרֶב מִיָּדוֹ
  english_pob_choice: the sword fall from his hand
  chosen_spanish: la espada caiga de su mano
  alternatives_spanish:
  - la espada caiga de su mano
  - la espada se le caiga de la mano
  lexicon: HALOT
  rationale: '''La espada'' conserva el sustantivo definido; ''de su mano'' refleja el sufijo pronominal y la escena de desarme. La construcción es idiomática y fiel al hebreo.'
theological_decisions:
- issue: Forma de rendir el nombre divino en יְהוִה dentro del título compuesto אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Yahvé, el Señor
  alternative_spanish_readings:
  - el Señor Yahvé
  - el Señor Dios
  rationale: El proyecto español usa 'Yahvé' para YHWH. Pero en el título compuesto la secuencia directa 'Yahvé, el Señor' permite distinguir el nombre revelado del título de soberanía sin crear una repetición extraña en español. Así se conserva la tensión documental entre nombre propio y título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se revisó el contexto auditado en inglés y la revisión más reciente indicó que no había cambios necesarios. La presente propuesta adapta fielmente esas decisiones al español, preservando la metáfora corporal, la fórmula profética y el tratamiento del nombre divino propio del proyecto.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - '''brazos'' conserva la imagen física de fuerza militar; no se reduce a ''fuerza'' para no perder la metáfora.'
  - La nota [a] aclara la alternativa explícita que en español puede surgir al suplir el sustantivo implícito 'brazo'.
  - Se evita la forma tradicional 'SEÑOR' como máscara para YHWH, salvo en el título compuesto donde 'el Señor' corresponde a אֲדֹנָי.
