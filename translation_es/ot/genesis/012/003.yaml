base_translation:
  language: en
  yaml_path: translation/ot/genesis/012/003.yaml
  text: And I will bless those who bless you[a], and the one who curses you I will curse[c][b]; and in you all the families of the earth will be blessed.
  footnotes:
  - marker: a
    text: Or, 'the one who curses you'; the Hebrew verb here (קלל) can mean to treat with contempt, dishonor, or curse, and it is weaker than the following verb 'I will curse' (ארר).
    reason: lexical_alternative
  - marker: b
    text: Or, 'all the families of the earth will bless themselves by you,' or 'through you all the families of the earth will be blessed.' The Hebrew form allows debate over passive versus reflexive/middle sense, and the preposition can also be understood instrumentally.
    reason: alternative_reading
  - marker: c
    text: Or 'and the one who treats you lightly I will curse'.
    reason: previous_rendering
