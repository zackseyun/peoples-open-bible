translation:
  language: es
  text: Pero mantengan con vida para ustedes a toda niña entre las mujeres que no haya conocido el lecho de un hombre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más explícitamente, «que no haya tenido relaciones sexuales con un hombre».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כֹל
  english_pob_choice: But every
  chosen_spanish: Pero toda
  alternatives_spanish:
  - Y toda
  - Pero cada
  lexicon: HALOT
  rationale: La ו inicial continúa la instrucción con matiz de contraste; en español, «Pero» conserva esa fuerza adversativa. «Toda» funciona naturalmente con el sustantivo colectivo singular femenino implícito en el contexto, y evita un calco pesado de «todas» que alteraría la concordancia con «niña».
- source_word: הַ/טַּף
  english_pob_choice: young girl
  chosen_spanish: niña
  alternatives_spanish:
  - pequeña
  - niña joven
  - hija
  lexicon: HALOT
  rationale: טַף puede referirse a pequeños/niños en general, pero el contexto inmediato limita el referente a mujeres jóvenes. «Niña» comunica bien esa restricción en español sin introducir una paráfrasis más fuerte que el hebreo.
- source_word: בַּ/נָּשִׁים
  english_pob_choice: among the women
  chosen_spanish: entre las mujeres
  alternatives_spanish:
  - de entre las mujeres
  - entre las féminas
  lexicon: HALOT
  rationale: La preposición ב con נשים expresa el grupo de procedencia o pertenencia. «Entre las mujeres» es la forma natural y transparente en español para mantener ese matiz partitivo.
- source_word: אֲשֶׁר לֹא יָדְע֖וּ
  english_pob_choice: who has not known
  chosen_spanish: que no haya conocido
  alternatives_spanish:
  - que no conoció
  - que no conocieran
  lexicon: HALOT
  rationale: יָדַע funciona aquí como eufemismo sexual. En español, el subjuntivo relativo «que no haya conocido» mantiene la referencia al estado previo sin forzar un tiempo narrativo más específico de lo que el hebreo requiere.
- source_word: מִשְׁכַּב זָכָר
  english_pob_choice: the bed of a man
  chosen_spanish: el lecho de varón
  alternatives_spanish:
  - el lecho de un hombre
  - relaciones sexuales con un hombre
  lexicon: HALOT
  rationale: La frase hebrea es un eufemismo y metáfora sexual. «Lecho de varón» conserva mejor la imagen y la formalidad del original que una paráfrasis explícita; «varón» además refleja bien el registro más genérico/sexual del hebreo זָכָר.
- source_word: הַחֲי֖וּ לָ/כֶם
  english_pob_choice: keep alive for yourselves
  chosen_spanish: mantengan con vida para ustedes
  alternatives_spanish:
  - dejen con vida para ustedes
  - conserven con vida para ustedes
  lexicon: HALOT
  rationale: El hifil de חיה significa dar vida/guardar con vida. «Mantengan con vida» expresa con claridad la orden de preservar la vida; «para ustedes» conserva לָכֶם como beneficio o destinación, sin añadir explicación extratextual.
theological_decisions:
- issue: Cómo rendir el eufemismo sexual sin ocultarlo ni volverlo demasiado explícito
  english_pob_reading: Retain the idiomatic expression in the main text, with a footnote offering a more explicit alternative.
  chosen_spanish_reading: Mantener «el lecho de varón» en el texto principal, con nota que aclara la relación sexual implícita.
  alternative_spanish_readings:
  - que no haya tenido relaciones sexuales con un hombre
  - que sea virgen
  rationale: El hebreo usa una expresión idiomática y no la etiqueta técnica «virgen». Conservar el eufemismo respeta la forma del original y evita una simplificación teológica o cultural; la nota ofrece la equivalencia explícita para lectores que la necesiten.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Cómo reflejar el alcance femenino del sustantivo colectivo טַף
  english_pob_reading: Translate with 'young girl' rather than a gender-neutral 'child'.
  chosen_spanish_reading: Usar «niña» para hacer explícito en español el referente femenino que el contexto ya restringe.
  alternative_spanish_readings:
  - niño
  - infante
  - menor
  rationale: Aunque טַף puede ser colectivo y no exclusivamente femenino por sí mismo, la cláusula «entre las mujeres» y el eufemismo sexual lo restringen a personas femeninas. «Niña» comunica ese sentido contextual en un español natural y fiel.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el último pase revisado; no se detectaron cambios necesarios frente al contexto inglés auditado ni frente al hebreo base.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se evita «cristianizar» el pasaje con vocabulario eclesiástico ajeno al hebreo.
  - «Varón» se conserva por la carga lexical del eufemismo sexual de זָכָר; no se sustituye por «hombre» en el texto principal para no perder el paralelismo más formal del original.
