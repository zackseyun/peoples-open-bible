translation:
  language: es
  text: 'Y los hijos de Jehoiaquim: Jeconías su hijo[a], Sedequías su hijo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo muy breve: «Jeconías su hijo, Sedequías su hijo». Puede leerse como una secuencia genealógica simple, aunque los intérpretes discrepan sobre si ambos nombres son hijos de Jehoiaquim o si Sedequías es hijo de Jeconías en la línea tal como está expresada aquí.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/בְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Ahora los hijos de
  - Los hijos de
  lexicon: HALOT
  rationale: בְנֵי es el plural constructo de «hijos de», introduciendo una lista genealógica. Se conserva la conjunción inicial con «Y» para reflejar la continuidad enumerativa del hebreo.
- source_word: יְהוֹיָקִים
  english_pob_choice: Jehoiakim
  chosen_spanish: Jehoiaquim
  alternatives_spanish:
  - Joiaquim
  lexicon: HALOT
  rationale: Nombre propio transliterado a la forma española bíblica más establecida y legible, manteniendo la correspondencia directa con el hebreo.
- source_word: יְכָנְיָה
  english_pob_choice: Jeconiah
  chosen_spanish: Jeconías
  alternatives_spanish:
  - Jeconías
  - Conías
  lexicon: HALOT
  rationale: Se elige la forma española tradicional de este nombre propio, que corresponde bien a la forma hebrea יְכָנְיָה y conserva la identificación bíblica reconocible.
- source_word: בְנ֖/וֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - hijo de él
  lexicon: HALOT
  rationale: La frase con sufijo pronominal se vierte de manera natural en español como «su hijo». Se mantiene la repetición explícita porque el hebreo es breve y genealógico, y la reiteración forma parte del dato textual.
- source_word: צִדְקִיָּה
  english_pob_choice: Zedekiah
  chosen_spanish: Sedequías
  alternatives_spanish:
  - Tsedecías
  lexicon: HALOT
  rationale: Nombre propio bíblico con forma española asentada. Se preserva la transliteración estándar sin reinterpretarla.
- source_word: בְנֽ/וֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - hijo de él
  lexicon: HALOT
  rationale: Se repite la misma solución que para el primer marcador genealógico, conservando la tersura y el paralelismo del original.
theological_decisions:
- issue: Sintaxis genealógica ambigua y relación entre los nombres
  english_pob_reading: 'The verse is rendered as a straightforward genealogy: Jeconiah his son, Zedekiah his son.'
  chosen_spanish_reading: 'El versículo se vierte como genealogía directa: «Jeconías su hijo, Sedequías su hijo».'
  alternative_spanish_readings:
  - Jeconías y Sedequías, sus hijos.
  - Jeconías, su hijo Sedequías.
  rationale: El hebreo es muy conciso y repite «su hijo» tras cada nombre. La traducción conserva esa tersura sin armonizar la relación de parentesco con otros pasajes; así se deja visible la tensión genealógica que el texto presenta.
  doctrine_reference: Principios de primacía del texto original y preservación de tensiones textuales en genealogías
translation_notes:
  revision_awareness: La auditoría inglesa indica acuerdo alto y sin cambios en la última pasada. No se registraron revisiones aplicadas; por ello, la versión española sigue de cerca la estructura y la ambigüedad genealógica del hebreo sin intentar resolverla.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «su hijo» dos veces para reflejar la repetición hebrea y la posible ambigüedad relacional.
  - Los nombres propios se presentan en formas españolas bíblicas habituales para legibilidad e identificación canónica.
