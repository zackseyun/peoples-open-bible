translation:
  language: es
  text: los que se postran en las azoteas al ejército del cielo[a] y los que se postran, los que juran por Yahvé y juran por Milcóm.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘por su rey’; algunos entienden que el nombre aquí es ‘Molec’.
    reason: alternative_reading
lexical_decisions:
- source_word: הַמִּשְׁתַּחֲוִים
  english_pob_choice: those who bow down
  chosen_spanish: los que se postran
  alternatives_spanish:
  - los que se inclinan
  - los que adoran
  - los que se prosternan
  lexicon: HALOT
  rationale: La forma participial expresa el acto físico de inclinarse o postrarse en adoración. 'Postrarse' conserva el gesto corporal y deja claro el matiz de culto en el contexto.
- source_word: עַל הַגַּגּוֹת
  english_pob_choice: on the rooftops
  chosen_spanish: en las azoteas
  alternatives_spanish:
  - sobre los tejados
  - en los techos
  lexicon: HALOT
  rationale: La referencia es locativa y culturalmente concreta. 'Azoteas' es natural en español y comunica bien el escenario de culto doméstico.
- source_word: לִצְבָא הַשָּׁמַיִם
  english_pob_choice: to the host of heaven
  chosen_spanish: ante el ejército del cielo
  alternatives_spanish:
  - al ejército del cielo
  - a la hueste del cielo
  - al ejército celestial
  lexicon: HALOT
  rationale: צָבָא puede denotar 'ejército/hueste'; en este contexto astral, 'ejército del cielo' mantiene la fuerza del hebreo y evita reducirlo a 'estrellas'. 'Ante' refleja la orientación de adoración/prostración implícita en el participio.
- source_word: הַנִּשְׁבָּעִים לַיהוָה
  english_pob_choice: who swear by Yahweh
  chosen_spanish: los que juran por Yahvé
  alternatives_spanish:
  - los que juran en nombre de Yahvé
  - los que hacen juramento por Yahvé
  lexicon: HALOT
  rationale: Con נשׁבע + ל, el sentido es jurar invocando a Yahvé como garante del juramento. 'Jurar por Yahvé' conserva la construcción y la relación con el siguiente miembro paralelo.
- source_word: לַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: ''Yahvé'' en el texto principal, en lugar de la sustitución por ''SEÑOR''.'
- source_word: בְּמַלְכָּם
  english_pob_choice: by Milcom
  chosen_spanish: Milcóm
  alternatives_spanish:
  - por su rey
  - por Molec
  - por Milcom
  lexicon: HALOT
  rationale: La lectura principal del POB en inglés entiende aquí el nombre de la deidad amonita. 'Milcóm' es la forma española natural del nombre propio y preserva la tensión textual con las lecturas alternativas.
theological_decisions:
- issue: Identidad de בְּמַלְכָּם
  english_pob_reading: Milcom, the foreign deity, in the main text; alternatives preserved in footnote.
  chosen_spanish_reading: Milcóm, como deidad extranjera, en el texto principal; se preservan las alternativas en nota.
  alternative_spanish_readings:
  - por su rey
  - Molec
  rationale: El paralelo con jurar por Yahvé y luego por otra lealtad apunta a una denuncia de sincretismo. La lectura como el dios amonita Milcóm explica bien el contraste, sin ocultar que la forma hebrea también puede entenderse de otras maneras.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica y textual)
translation_notes:
  revision_awareness: La redacción sigue el ajuste de la revisión inglesa que prefirió 'host of heaven' frente a 'host of the heavens'. En español se reflejó con 'ejército del cielo', una formulación natural que conserva el singular colectivo y el trasfondo astral del hebreo. También se mantuvo la doble cláusula paralela de 'postrarse' y 'jurar' para no suavizar la estructura acusatoria del verso.
  spanish_consistency_notes:
  - Se usó 'Yahvé' según la convención del proyecto para יהוה.
  - Se prefirió 'postrarse' sobre 'adorar' para conservar el acto físico del participio hebreo.
  - '''Ejército del cielo'' mantiene el valor colectivo de צָבָא y evita una lectura angélica no requerida por el contexto.'
  - Se preservó la ambigüedad de בְּמַלְכָּם en nota, sin resolverla silenciosamente.
