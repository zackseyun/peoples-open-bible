theological_decisions:
- issue: 호세아 11:1 인용 — 「내 아들」을 메시아에 적용
  chosen_reading: 내가 내 아들을 이집트에서 불러내었다
  alternative_readings:
  - 내가 내 아들을 애굽에서 불렀다
  rationale: 마태는 호세아 11:1(이스라엘 출애굽)을 메시아 예수에게 유형론적으로 적용한다. 한국어 본문도 헬라어 1인칭 단수 인용을 그대로 살려, 야훼의 직접 발화로 옮긴다.
  doctrine_reference: Hos 11:1 cited by Matthew typologically; preserve direct divine speech
