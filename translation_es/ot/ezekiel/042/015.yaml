revisions:
- from: Cuando hubo terminado de medir la casa interior[a], me sacó por el camino de la puerta que daba al oriente[b], y la midió todo alrededor.
  to: Cuando hubo terminado de medir la casa interior[a], me sacó por la puerta que daba al oriente[b], y la midió por todos lados.
  rationale: Se ajustó «por el camino de la puerta» a «por la puerta» para un español más natural que aún refleja la idea de ruta/salida. Se cambió «la midió todo alrededor» por «la midió por todos lados» para expresar con claridad e idiomaticidad la duplicación hebrea סָבִיב סָבִיב. Se conservaron «casa interior» y las notas existentes porque sí reflejan adecuadamente el audit trail y el hebreo.
