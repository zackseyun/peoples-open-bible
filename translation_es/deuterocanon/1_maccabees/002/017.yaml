translation:
  language: es
  text: 'Y los del rey[a] respondieron y dijeron a Matatías, diciendo: «Tú eres un gobernante, honrado y grande en esta ciudad[b], y sostenido por hijos y hermanos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «los que venían de parte del rey»; es decir, los representantes del rey.
    reason: lexical_alternative
  - marker: b
    text: O, «establecido con hijos y hermanos». El griego puede enfatizar tanto el respaldo familiar de Matatías como su posición firmemente asentada gracias a su familia.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ παρὰ τοῦ βασιλέως
  english_pob_choice: those from the king
  chosen_spanish: los que estaban junto al rey
  alternatives_spanish:
  - los del rey
  - los enviados por el rey
  - los hombres del rey
  lexicon: LSJ
  rationale: La expresión griega indica procedencia o cercanía funcional al rey. En español, 'los que estaban junto al rey' conserva esa relación sin forzar una traducción demasiado interpretativa; evita también introducir 'enviados' sin que el griego lo diga explícitamente.
- source_word: ἀπεκρίθησαν ... καὶ εἶπαν
  english_pob_choice: answered and said
  chosen_spanish: respondieron y dijeron
  alternatives_spanish:
  - contestaron y dijeron
  - respondieron
  - replicaron y dijeron
  lexicon: LSJ
  rationale: Conservo la fórmula narrativa doble, que refleja el tono semítico/greco-bíblico del original, pero con un español natural y solemne.
- source_word: Ἄρχων
  english_pob_choice: ruler
  chosen_spanish: gobernante
  alternatives_spanish:
  - ruler
  - líder
  - jefe
  lexicon: LSJ
  rationale: '''Gobernante'' comunica autoridad y prominencia. ''Ruler'' en español sería un anglicismo; ''líder'' o ''jefe'' bajarían el tono formal del pasaje.'
- source_word: ἔνδοξος
  english_pob_choice: honored
  chosen_spanish: honrado
  alternatives_spanish:
  - glorioso
  - distinguido
  - honorable
  lexicon: LSJ
  rationale: '''Honrado'' transmite reconocimiento público y estima social en un registro natural para el español bíblico. ''Glorioso'' sonaría excesivo; ''distinguido'' es posible, pero menos directo.'
- source_word: μέγας
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - importante
  - eminente
  - prominente
  lexicon: LSJ
  rationale: '''Grande'' sigue de cerca el griego y conserva la dignidad enfática de la aclamación. Otras opciones explican más de la cuenta.'
- source_word: ἐν τῇ πόλει ταύτῃ
  english_pob_choice: in this city
  chosen_spanish: en esta ciudad
  alternatives_spanish:
  - en esta villa
  - en esta población
  lexicon: LSJ
  rationale: '''Ciudad'' es la equivalencia estándar de πόλις en este contexto formal.'
- source_word: ἐστηριγμένος
  english_pob_choice: supported
  chosen_spanish: sostenido
  alternatives_spanish:
  - apoyado
  - establecido
  - fortalecido
  lexicon: LSJ
  rationale: '''Sostenido'' preserva la idea de respaldo firme y puede abarcar el matiz de apoyo familiar que sigue. ''Apoyado'' sería más coloquial; ''establecido'' y ''fortalecido'' desplazan el énfasis.'
- source_word: ἐν υἱοῖς καὶ ἀδελφοῖς
  english_pob_choice: by sons and brothers
  chosen_spanish: por hijos y hermanos
  alternatives_spanish:
  - con hijos y hermanos
  - entre hijos y hermanos
  - en hijos y hermanos
  lexicon: LSJ
  rationale: 'Sigo el valor de apoyo expresado por el contexto: la preposición española ''por'' conserva mejor la relación causal/instrumental que una lectura meramente locativa. ''Hijos y hermanos'' mantiene el paralelismo familiar del griego.'
translation_notes:
  revision_awareness: El texto sigue de cerca el griego de Swete (1909) y la pauta auditada de la POB en inglés. Se conserva la doble fórmula verbal, la tríada de atributos (autoridad, honor, grandeza) y la ambigüedad de ἐστηριγμένος ἐν υἱοῖς καὶ ἀδελφοῖς mediante una nota alternativa sobre apoyo familiar o condición establecida. A diferencia del borrador inglés inicial 'those sent by the king', se evita introducir explícitamente 'enviados' porque la revisión auditada prefirió una relación más directa con οἱ παρὰ τοῦ βασιλέως.
  spanish_consistency_notes:
  - Se usa 'Matatías' para Ματταθίας de forma uniforme.
  - Se mantiene 'Yahvé' como norma general del proyecto, aunque este versículo no lo contiene.
  - Se prefirió 'gobernante' a 'líder' para conservar el peso de Ἄρχων.
  - La nota [b] se ancla en 'sostenido por hijos y hermanos' porque el español admite la misma ambigüedad que señaló la POB en inglés.
