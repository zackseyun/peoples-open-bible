translation:
  language: es
  text: Tu riqueza, tus mercaderías, tu mercancía, tus marineros y tus pilotos, los que reparan tu daño[a], y los que comercian con tu mercancía, y todos tus hombres de guerra que están en ti, con toda tu asamblea que está en medio de ti, caerán en el corazón de los mares[b], en el día de tu caída.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que calafatean tus junturas» o «los que reparan tus brechas».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el corazón de los mares», es decir, el centro o las profundidades de los mares.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹנֵךְ
  english_pob_choice: your wealth
  chosen_spanish: tu riqueza
  alternatives_spanish:
  - tus riquezas
  - tu hacienda
  lexicon: HALOT
  rationale: הון designa riqueza o bienes; «riqueza» es natural en español y conserva el campo semántico económico del lamento sobre Tiro.
- source_word: עִזְבוֹנַיִךְ
  english_pob_choice: your wares
  chosen_spanish: tus mercaderías
  alternatives_spanish:
  - tus bienes
  - tus artículos
  lexicon: HALOT
  rationale: En este contexto comercial, el término apunta a bienes destinados al intercambio. «Mercaderías» mantiene el valor de mercancía vendible sin perder claridad.
- source_word: מַעֲרָבֵךְ
  english_pob_choice: your merchandise
  chosen_spanish: tu mercancía
  alternatives_spanish:
  - tu comercio
  - tus bienes de comercio
  lexicon: HALOT
  rationale: En Ezequiel 27 el término pertenece al campo mercantil. «Mercancía» reproduce bien la idea de carga o bienes comerciables en una lista de elementos navales y comerciales.
- source_word: מַלָּחַיִךְ
  english_pob_choice: your sailors
  chosen_spanish: tus marineros
  alternatives_spanish:
  - tus navegantes
  - tus hombres de mar
  lexicon: HALOT
  rationale: «Marineros» es el equivalente español más claro y natural para quienes trabajan en el mar.
- source_word: חֹבְלָיִךְ
  english_pob_choice: your pilots
  chosen_spanish: tus pilotos
  alternatives_spanish:
  - tus timoneles
  - tus capitanes de nave
  lexicon: HALOT
  rationale: Aquí designa a quienes dirigen la nave; «pilotos» refleja esa función directiva con concisión, como en la solución inglesa.
- source_word: מַחֲזִיקֵי בִדְקֵךְ
  english_pob_choice: those who repair your damage
  chosen_spanish: los que reparan tu daño
  alternatives_spanish:
  - los que calafatean tus junturas
  - los que remiendan tus brechas
  lexicon: HALOT
  rationale: La imagen hebrea alude a reparar una abertura o avería del barco. «Reparan tu daño» conserva la referencia amplia; la alternativa más técnica se deja implícita en el margen lexical.
- source_word: וְעֹרְבֵי מַעֲרָבֵךְ
  english_pob_choice: those who trade in your merchandise
  chosen_spanish: los que trafican con tu mercancía
  alternatives_spanish:
  - los que comercian con tu mercancía
  - los tratantes de tu mercancía
  lexicon: HALOT
  rationale: El participio es comercial en contexto; «trafican con» mantiene la idea de actividad mercantil ligada a la mercancía de Tiro, sin reducirla solo a una transacción puntual.
- source_word: אַנְשֵׁי מִלְחַמְתֵּךְ
  english_pob_choice: your men of war
  chosen_spanish: tus hombres de guerra
  alternatives_spanish:
  - tus guerreros
  - tus combatientes
  lexicon: HALOT
  rationale: La expresión hebrea es formal y militar; «hombres de guerra» preserva su fuerza y su tono bíblico.
- source_word: קְהָלֵךְ
  english_pob_choice: your assembly
  chosen_spanish: tu asamblea
  alternatives_spanish:
  - tu congregación
  - tu multitud
  lexicon: HALOT
  rationale: קהל refiere a un grupo reunido; «asamblea» conserva el sentido de conjunto reunido sin estrecharlo indebidamente.
- source_word: יִפְּלוּ
  english_pob_choice: will fall
  chosen_spanish: caerán
  alternatives_spanish:
  - se hundirán
  - perecerán
  lexicon: HALOT
  rationale: El verbo básico es «caer». En contexto marítimo implica desastre, pero la versión principal retiene la imagen hebrea de caída.
- source_word: בְּלֵב יַמִּים
  english_pob_choice: into the heart of the seas
  chosen_spanish: en el corazón de los mares
  alternatives_spanish:
  - en medio de los mares
  - en las profundidades de los mares
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea «corazón de los mares» para no perder su fuerza poética; el sentido idiomático queda disponible por el contexto.
- source_word: מַפַּלְתֵּךְ
  english_pob_choice: your downfall
  chosen_spanish: tu caída
  alternatives_spanish:
  - tu ruina
  - tu derrumbe
  lexicon: HALOT
  rationale: El sustantivo expresa caída o desplome. «Caída» es directo y fiel; «ruina» sería más interpretativo.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el aparato auditado en inglés y conserva las dos notas de alternativa: una sobre el campo semántico de la riqueza/comercio y otra sobre el modismo «corazón de los mares». No se introdujeron revisiones textuales adicionales.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Marineros» y «pilotos» mantienen el paralelo naval del hebreo y del inglés auditado.
  - Se preserva la imagen metafórica de «caer» y «corazón de los mares» en lugar de explicitarla como «hundirse» para no borrar la tensión poética del original.
