translation:
  language: es
  text: Hambrientos y sedientos, su alma[a] desfallecía dentro de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su vida desfallecía dentro de ellos» o «ellos mismos desfallecían dentro de ellos». נֶפֶשׁ puede significar alma, vida o la persona misma.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רְעֵבִ֥ים
  english_pob_choice: Hungry
  chosen_spanish: Hambrientos
  alternatives_spanish:
  - Con hambre
  - hambrientos
  lexicon: HALOT
  rationale: 'El adjetivo describe una condición física: la forma plural concuerda naturalmente con el sujeto implícito. "Hambrientos" conserva la fuerza simple y directa del hebreo sin intensificarla a "desesperados de hambre" o similar.'
- source_word: גַּם
  english_pob_choice: and also
  chosen_spanish: y
  alternatives_spanish:
  - también
  - y también
  - e incluso
  lexicon: HALOT
  rationale: Aunque גַּם puede añadir énfasis, en una enumeración breve el español fluido prefiere "y". La nota registra que existe un matiz aditivo/emfático, pero el texto principal no necesita recargarlo.
- source_word: צְמֵאִ֑ים
  english_pob_choice: thirsty
  chosen_spanish: sedientos
  alternatives_spanish:
  - con sed
  - sedientos
  lexicon: HALOT
  rationale: '"Sedientos" es el equivalente natural y digno en español para el estado de tener sed, paralelo a "hambrientos".'
- source_word: נַפְשָׁם
  english_pob_choice: their soul
  chosen_spanish: su alma
  alternatives_spanish:
  - su vida
  - ellos mismos
  - su ser interior
  lexicon: HALOT
  rationale: Se conserva "alma" para mantener la imaginería hebrea de נֶפֶשׁ sin reducirla a un mero pronombre. En español, "alma" comunica bien la interioridad y evita borrar la tensión antropológica del texto.
- source_word: בָּהֶם
  english_pob_choice: within them
  chosen_spanish: dentro de ellos
  alternatives_spanish:
  - en ellos
  - dentro de ellos
  lexicon: HALOT
  rationale: La preposición expresa localización interna; "dentro de ellos" reproduce con naturalidad el sentido idiomático de interioridad.
- source_word: תִּתְעַטָּף
  english_pob_choice: fainted
  chosen_spanish: se desfallecía
  alternatives_spanish:
  - se desmayaba
  - desfallecía
  - se consumía
  lexicon: HALOT
  rationale: El verbo puede sugerir el apagarse o cubrirse de la vitalidad/ánimo. "Se desfallecía" mantiene el proceso de debilitamiento interno y suena más fiel al aspecto imperfectivo que un simple pasado puntual como "se desmayó".
translation_notes:
  revision_awareness: La revisión inglesa reciente simplificó 'and also' a 'and' por naturalidad estilística. En español se adopta igualmente la coordinación simple para evitar redundancia, sin perder el matiz que aporta la nota léxica sobre גַּם.
  spanish_consistency_notes:
  - Se mantiene "alma" para נֶפֶשׁ en este contexto poético, con nota alternativa para vida/persona misma.
  - Se evita "SEÑOR" u otras sustituciones, porque el versículo no contiene el nombre divino ni un título teológico equivalente.
  - '"Hambrientos y sedientos" conserva el paralelismo adjetival breve del hebreo.'
  - La nota usa un solo marcador porque el texto principal solo necesita una observación léxica relevante.
