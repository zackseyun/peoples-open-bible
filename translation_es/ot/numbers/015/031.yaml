    text: O «su iniquidad quedará sobre él».
    reason: lexical_alternative
  revision_rationale: 'Se requiere una reparación menor: reubicar la nota alternativa de «ha despreciado» al segmento correcto y añadir la nota cultural para «ciertamente será cortada», en consonancia con el audit trail inglés y con la política de preservar alternativas significativas e idiomatismos judiciales. El texto base español es sustancialmente fiel, por lo que no hace falta una reescritura mayor.'
