revisions:
- from: Como el humo es dispersado[a], así tú los dispersas; como la cera se derrite ante el fuego[b][c], así los impíos perecen ante Dios.
  to: Como se desvanece el humo[a], así tú los ahuyentas; como la cera se derrite ante el fuego[b][c], así los impíos perecen ante Dios.
  rationale: Se propone una reparación menor para hacer el español más idiomático y ajustar mejor la imagen de נדף en el símil del humo. 'Se desvanece' suena natural en español poético para el humo, mientras 'los ahuyentas' conserva la acción divina sobre el referente plural implícito. Se mantienen 'ante el fuego' y 'ante Dios', que son fieles y fluidos. También se afinan las notas para que las alternativas españolas sean más naturales y para explicar de forma más precisa el modismo מִפְּנֵי en ambas apariciones.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:13:41Z'
