translation:
  language: es
  text: Y aconteció que, cuando se oyó la orden del rey y su decreto, y cuando muchas jóvenes fueron reunidas en Susa la ciudadela, bajo la custodia de Hegai[a], Ester también fue llevada a la casa del rey[b], bajo la custodia de Hegai, guardián de las mujeres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al cargo de Hegai»; literalmente, «a la mano de Hegai».
    reason: lexical_alternative
  - marker: b
    text: O «el palacio del rey».
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּבַר
  english_pob_choice: command
  chosen_spanish: orden
  alternatives_spanish:
  - mandato
  - comando
  lexicon: HALOT
  rationale: En este contexto de corte real, el término denota una disposición oficial. «Orden» suena natural en español y conserva el valor de una instrucción real sin cargarla con un matiz excesivamente jurídico.
- source_word: דָת
  english_pob_choice: decree
  chosen_spanish: decreto
  alternatives_spanish:
  - edicto
  - ley
  lexicon: HALOT
  rationale: «Decreto» reproduce bien la naturaleza de una disposición formal y encaja con «orden» en la misma frase. «Edicto» es posible, pero más marcado; «ley» sería demasiado amplio y permanente.
- source_word: נְעָרוֹת
  english_pob_choice: young women
  chosen_spanish: jóvenes
  alternatives_spanish:
  - muchachas
  - doncellas
  lexicon: HALOT
  rationale: El hebreo se refiere a mujeres jóvenes en edad casadera. En español, «jóvenes» mantiene el sentido básico sin introducir una edad demasiado infantil; «muchachas» o «doncellas» serían más específicas o más arcaizantes.
- source_word: רַבּוֹת
  english_pob_choice: many
  chosen_spanish: muchas
  alternatives_spanish:
  - numerosas
  lexicon: HALOT
  rationale: «Muchas» es la correspondencia más natural y directa en español, y preserva la simple cuantificación del hebreo.
- source_word: שׁוּשַׁן הַבִּירָה
  english_pob_choice: Susa the citadel
  chosen_spanish: Susa la ciudadela
  alternatives_spanish:
  - la ciudadela de Susa
  - Susa la fortaleza
  lexicon: HALOT
  rationale: «Ciudadela» conserva el sentido de recinto fortificado y resultará inteligible para lectores españoles. Se mantiene la forma appositiva del original, como en la traducción inglesa auditada.
- source_word: אֶל יַד
  english_pob_choice: into the custody of
  chosen_spanish: bajo la custodia de
  alternatives_spanish:
  - bajo el cuidado de
  - en manos de
  lexicon: HALOT
  rationale: El hebreo literal «a la mano de» expresa sujeción a autoridad o cuidado. «Bajo la custodia de» comunica con claridad en español el matiz institucional y coercitivo que la auditoría inglesa quiso preservar con «into the custody of».
- source_word: וַתִּלָּקַח
  english_pob_choice: was taken
  chosen_spanish: fue llevada
  alternatives_spanish:
  - fue tomada
  - fue conducida
  lexicon: HALOT
  rationale: Aunque el inglés auditado mantiene la pasividad con «was taken», en español «fue llevada» resulta más natural y conserva la falta de iniciativa de Ester. «Fue tomada» puede sonar duro o ambiguo; «fue conducida» atenúa demasiado la coerción.
- source_word: בֵּית הַמֶּלֶךְ
  english_pob_choice: the king’s house
  chosen_spanish: la casa del rey
  alternatives_spanish:
  - el palacio del rey
  - la casa real
  lexicon: HALOT
  rationale: La traducción más transparente y literal en español es «la casa del rey». En este contexto puede aludir al complejo palaciego; se evita sustituirlo por «palacio» para no borrar la huella léxica del hebreo.
- source_word: שֹׁמֵר הַנָּשִׁים
  english_pob_choice: keeper of the women
  chosen_spanish: guardián de las mujeres
  alternatives_spanish:
  - custodio de las mujeres
  - encargado de las mujeres
  lexicon: HALOT
  rationale: El participio de שׁמר señala a quien guarda o vigila. «Guardián» conserva ese valor con claridad en español; «custodio» es posible, pero algo más administrativo y menos narrativo.
- source_word: וַיְהִי בְּהִשָּׁמַע ... וּבְהִקָּבֵץ
  english_pob_choice: And when ... were heard, and when ... were gathered
  chosen_spanish: Y aconteció que, cuando se oyó ..., y cuando fueron reunidas ...
  alternatives_spanish:
  - Y sucedió que, al oírse ..., y al reunirse ...
  lexicon: HALOT
  rationale: Las construcciones temporales del hebreo se reproducen con «cuando» para mantener el flujo narrativo. «Y aconteció que» refleja la fórmula narrativa inicial y conserva el ritmo del relato bíblico.
theological_decisions:
- issue: Coercive/passive movement of Esther into the king’s household
  english_pob_reading: was taken ... into the king’s house
  chosen_spanish_reading: fue llevada ... a la casa del rey
  alternative_spanish_readings:
  - fue tomada ...
  - fue conducida ...
  rationale: El versículo presenta a Ester como paciente de la acción, no como agente. «Fue llevada» preserva esa pasividad en español y evita suavizar la posible coerción implícita en el hebreo y en la lectura auditada del inglés.
  doctrine_reference: Narrative ethics / textual transparency
- issue: Royal authority terminology
  english_pob_reading: the king’s command and his decree
  chosen_spanish_reading: la orden del rey y su decreto
  alternative_spanish_readings:
  - el mandato del rey y su decreto
  - la orden y el decreto del rey
  rationale: Se conserva la distinción entre una orden y un decreto, como en la auditoría inglesa. «Orden» y «decreto» son comprensibles y no introducen una interpretación más técnica de la que exige el texto.
  doctrine_reference: Lexical transparency
- issue: Idiomatic rendering of אֶל יַד
  english_pob_reading: into the custody of Hegai
  chosen_spanish_reading: bajo la custodia de Hegai
  alternative_spanish_readings:
  - en manos de Hegai
  - bajo el cuidado de Hegai
  rationale: La expresión hebrea literalmente dice «a la mano de». En español, «bajo la custodia de» comunica con mayor claridad la relación de autoridad/cuidado sin perder el matiz institucional del pasaje.
  doctrine_reference: Lexical transparency
translation_notes:
  revision_awareness: Se siguió la revisión más reciente con estatus de alta concordancia y sin cambios requeridos. La presente versión mantiene la estructura y las decisiones léxicas clave del audit trail inglés, adaptándolas a un español natural y transparente.
  spanish_consistency_notes:
  - Se mantiene la fórmula narrativa inicial con «Y aconteció que» para reflejar el hebreo וַיְהִי.
  - «Casa del rey» conserva la literalidad del hebreo frente a una interpretación más libre como «palacio».
  - «Ciudadela» traduce consistentemente שׁוּשַׁן הַבִּירָה con el mismo valor fortificado que «citadel» en la auditoría inglesa.
  - Se preserva la pasividad de Ester con «fue llevada», evitando un giro activo.
  - La nota [a] se coloca en «custodia» para señalar la alternativa literal «a la mano de Hegai» sin repetir el marcador.
