translation:
  language: es
  text: Pero no escucharon ni inclinaron su oído[a], sino que cada uno caminó en la terquedad de su corazón malo; por eso traje sobre ellos[b] todas las palabras de este pacto, que les mandé hacer, pero no las hicieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no oyeron»; en este contexto la expresión también implica que se negaron a obedecer.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «todas las palabras de este pacto»; esto puede incluir también las sanciones anunciadas del pacto, no solo sus mandatos.'
    reason: alternative_reading
lexical_decisions:
- source_word: שָׁמְעוּ
  english_pob_choice: did not listen
  chosen_spanish: no escucharon
  alternatives_spanish:
  - no oyeron
  - no obedecieron
  lexicon: HALOT
  rationale: שמע puede significar oír, escuchar u obedecer según el contexto. En paralelo con 'inclinaron su oído', 'no escucharon' conserva la idea de atención deliberada y también deja ver la desobediencia implícita sin sobrecargar la línea principal.
- source_word: הִטּוּ אֶת אָזְנָם
  english_pob_choice: incline their ear
  chosen_spanish: inclinaron su oído
  alternatives_spanish:
  - volvieron su oído
  - prestaron atención
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para escuchar con atención. 'Inclinaron su oído' mantiene la metáfora y sigue siendo natural en español bíblico contemporáneo.
- source_word: וַיֵּלְכוּ אִישׁ
  english_pob_choice: each one walked
  chosen_spanish: cada uno caminó
  alternatives_spanish:
  - cada uno fue
  - cada uno anduvo
  lexicon: HALOT
  rationale: אישׁ aquí es distributivo, por eso 'cada uno'. 'Caminó' conserva la metáfora hebrea del comportamiento o la conducta.
- source_word: בִּשְׁרִירוּת
  english_pob_choice: in the stubbornness
  chosen_spanish: en la terquedad
  alternatives_spanish:
  - en la obstinación
  - en la dureza
  lexicon: HALOT
  rationale: שׁרירות expresa persistencia obstinada y autoafirmada. 'Terquedad' comunica bien esa fuerza en español sin perder el matiz moral del contexto del pacto.
- source_word: לִבָּם הָרָע
  english_pob_choice: of his evil heart
  chosen_spanish: de su corazón malo
  alternatives_spanish:
  - de su corazón perverso
  - de su mal corazón
  lexicon: HALOT
  rationale: El hebreo usa singular 'corazón' con sufijo plural/individualizante. 'De su corazón malo' preserva esa correspondencia y mantiene el adjetivo sencillo 'malo' para רַע.
- source_word: וָאָבִיא עֲלֵיהֶם
  english_pob_choice: so I brought upon them
  chosen_spanish: Así les hice venir
  alternatives_spanish:
  - así traje sobre ellos
  - por eso hice venir sobre ellos
  lexicon: HALOT
  rationale: El verbo הביא con עליהם puede expresarse naturalmente en español como 'hacer venir sobre' o 'traer sobre'. 'Así les hice venir' preserva el movimiento de consecuencia y resulta más idiomático en español, sin perder la idea de acción divina.
- source_word: כָּל דִּבְרֵי הַבְּרִית הַזֹּאת
  english_pob_choice: all the words of this covenant
  chosen_spanish: todas las palabras de este pacto
  alternatives_spanish:
  - todas las estipulaciones de este pacto
  - todos los términos de este pacto
  lexicon: HALOT
  rationale: Se conserva literalmente 'palabras' para no estrechar el alcance a solo mandatos o sanciones. 'Pacto' traduce בְּרִית de manera coherente y comprensible en español bíblico.
- source_word: אֲשֶׁר צִוִּיתִי לַעֲשׂוֹת
  english_pob_choice: which I commanded them to do
  chosen_spanish: que les mandé hacer
  alternatives_spanish:
  - que les mandé cumplir
  - que les mandé realizar
  lexicon: HALOT
  rationale: El infinitivo לַעֲשׂוֹת se expresa de forma directa con 'hacer'. Añadir 'les' es necesario en español para recuperar el complemento implícito del hebreo.
- source_word: וְלֹא עָשׂוּ
  english_pob_choice: but they did not do them
  chosen_spanish: pero no las hicieron
  alternatives_spanish:
  - pero no las cumplieron
  - pero no las obedecieron
  lexicon: HALOT
  rationale: El objeto implícito son las 'palabras' del pacto; por eso 'las'. 'Hicieron' mantiene el paralelismo con לַעֲשׂוֹת y evita reducir el fracaso a una sola dimensión interpretativa.
theological_decisions:
- issue: Alcance de 'todas las palabras de este pacto'
  english_pob_reading: Retain the literal 'words' rather than interpretively narrowing to curses alone.
  chosen_spanish_reading: Mantener 'todas las palabras de este pacto' sin restringirlo a maldiciones o sanciones.
  alternative_spanish_readings:
  - todas las maldiciones de este pacto
  - todas las estipulaciones de este pacto
  rationale: El hebreo dice 'palabras'. En contexto puede abarcar tanto mandatos como las consecuencias del pacto, pero la traducción no debe estrechar el alcance antes de tiempo. 'Palabras' deja que el contexto cumpla su función interpretativa.
  doctrine_reference: Translation philosophy items 1 and 3
- issue: Valor de שמע en contexto de pacto
  english_pob_reading: did not listen
  chosen_spanish_reading: no escucharon
  alternative_spanish_readings:
  - no oyeron
  - no obedecieron
  rationale: '''No escucharon'' permite conservar el campo semántico de oído/escucha y, a la vez, la dimensión de respuesta obediente que el contexto del pacto sugiere, sin forzar una paráfrasis más doctrinal que el texto.'
  doctrine_reference: Translation philosophy item 2
translation_notes:
  revision_awareness: Tomé como base la revisión final del inglés POB, que ajustó el posesivo a singular ('his evil heart') para reflejar אישׁ distributivo. En español se resolvió con 'su corazón malo' en singular distributivo, manteniendo el efecto colectivo-individual del hebreo. También preservé la amplitud de 'all the words of this covenant' y la dependencia de las dos negaciones iniciales, sin añadir explicaciones ajenas al texto.
  spanish_consistency_notes:
  - '''Pacto'' se usa para בְּרִית de manera consistente con el registro bíblico y para evitar una carga confesional ajena al hebreo.'
  - '''Escucharon'' / ''inclinaron su oído'' mantiene el doblete hebreo de oír atenta y responsablemente.'
  - 'La secuencia verbal conserva la relación causal: rechazo de la escucha, conducta obstinada y consecuencia divina.'
  - Los pronombres objetos 'las' remiten a 'las palabras' para conservar el plural implícito del original.
