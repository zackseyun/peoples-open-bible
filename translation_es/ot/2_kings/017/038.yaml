- from: Y el pacto[a] que hice con ustedes, no lo olvidarán[b], y no temerán a otros dioses.
  to: Y el pacto[a] que hice con ustedes no olviden[b], ni teman a otros dioses.
  rationale: Se ajusta la prohibición a un español más natural y claramente exhortativo ('no olviden ... ni teman'), se elimina el pronombre innecesario, y se corrige la nota del modismo de 'cortar un pacto' para que refleje con precisión la decisión léxica documentada.
