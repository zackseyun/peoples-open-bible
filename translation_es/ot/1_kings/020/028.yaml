base_translation:
  language: en
  yaml_path: translation/ot/1_kings/020/028.yaml
  text: 'Then the man of God came near and said to the king of Israel[a], “Thus says Yahweh: Because Aram has said, ‘Yahweh is a god of the mountains, but he is not a god of the valleys,’ I will give all this great multitude into your hand[c][b], and you shall know that I am Yahweh.”'
  footnotes:
  - marker: a
    text: Hebrew 'Aram'; traditionally 'Syria' in some English versions.
    reason: alternative_reading
  - marker: b
    text: Or 'God of the hills ... God of the plains.' The Hebrew contrasts elevated terrain with lowlands/valleys.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew verb 'you shall know' is plural, extending the statement beyond the king to Israel collectively.
    reason: lexical_alternative
