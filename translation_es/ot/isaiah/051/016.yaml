translation:
  language: es
  text: 'Y puse mis palabras en tu boca, y te cubrí con la sombra de mi mano[a], para plantar los cielos[b] y para fundar la tierra, y para decir a Sion: «Tú eres mi pueblo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘en la sombra de mi mano’ o ‘bajo la sombra de mi mano’.
    reason: lexical_alternative
  - marker: b
    text: O ‘para establecer los cielos’. El hebreo dice literalmente ‘para plantar los cielos’, una imagen inusual que puede evocar la creación o una restauración de nueva creación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאָשִׂים
  english_pob_choice: And I have put
  chosen_spanish: Y puse
  alternatives_spanish:
  - Y he puesto
  - Y pondré
  lexicon: HALOT
  rationale: El hebreo usa una forma narrativa perfecta con waw consecutiva; en español suena natural como pasado simple en un oráculo de acción ya establecida o garantizada. 'Puse' evita forzar un perfecto compuesto menos idiomático aquí, sin perder la certeza de la acción.
- source_word: דְּבָרַי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mi palabra
  - mis dichos
  lexicon: HALOT
  rationale: El plural hebreo pide plural en español. 'Mis palabras' conserva la fuerza literal y evita nivelar el plural a un singular abstracto.
- source_word: בְּפִיךָ
  english_pob_choice: in your mouth
  chosen_spanish: en tu boca
  alternatives_spanish:
  - en tus labios
  lexicon: HALOT
  rationale: '''Boca'' reproduce de manera directa la imagen profética de poner el discurso en el órgano de hablar. ''Labios'' es posible, pero atenúa la correspondencia con el hebreo.'
- source_word: וּבְצֵל יָדִי
  english_pob_choice: with the shadow of my hand
  chosen_spanish: con la sombra de mi mano
  alternatives_spanish:
  - bajo la sombra de mi mano
  - en la sombra de mi mano
  lexicon: HALOT
  rationale: '''Con la sombra de mi mano'' conserva la imagen protectora y puede leerse de modo instrumental, como en el inglés POB. No se resuelve la ambigüedad entre valor locativo e instrumental; se deja abierta como en el original.'
- source_word: כִּסִּיתִיךָ
  english_pob_choice: covered you
  chosen_spanish: te cubrí
  alternatives_spanish:
  - te escondí
  - te protegí
  lexicon: HALOT
  rationale: '''Cubrir'' mantiene el valor básico del verbo y deja que el contexto aporte la idea de protección, en vez de interpretar demasiado pronto como ''proteger'' o ''esconder''.'
- source_word: לִנְטֹעַ שָׁמַיִם
  english_pob_choice: to plant the heavens
  chosen_spanish: para plantar los cielos
  alternatives_spanish:
  - para plantar el cielo
  - para establecer los cielos
  lexicon: HALOT
  rationale: Se conserva el verbo inusual 'plantar' para no normalizar la imagen. 'Cielos' en plural refleja el hebreo שָׁמַיִם y evita suavizar la metáfora creadora a una expresión más plana.
- source_word: וְלִיסֹד אָרֶץ
  english_pob_choice: and to found the earth
  chosen_spanish: y para fundar la tierra
  alternatives_spanish:
  - y para establecer la tierra
  - y para poner los cimientos de la tierra
  lexicon: HALOT
  rationale: '''Fundar'' comunica bien יסד y mantiene el paralelo con la acción creadora anterior. ''Tierra'' es la equivalencia natural de אָרֶץ en este contexto cosmológico.'
- source_word: וְלֵאמֹר לְצִיּוֹן
  english_pob_choice: and to say to Zion
  chosen_spanish: y para decir a Sion
  alternatives_spanish:
  - y para declarar a Sion
  lexicon: HALOT
  rationale: '''Decir'' es la forma más directa de אמר y no eleva indebidamente el registro. ''Sion'' sigue la grafía española habitual del topónimo bíblico.'
- source_word: עַמִּי אָתָּה
  english_pob_choice: You are my people
  chosen_spanish: Tú eres mi pueblo
  alternatives_spanish:
  - Ustedes son mi pueblo
  - Tú eres mi gente
  lexicon: HALOT
  rationale: El hebreo personifica a Sion con singular masculino, y la fórmula covenantal puede expresarse de manera natural en español como 'Tú eres mi pueblo'. 'Mi pueblo' conserva el vínculo de pertenencia; 'mi gente' sería demasiado coloquial.
theological_decisions:
- issue: Referencia del destinatario en segunda persona singular
  english_pob_reading: Kept the singular 'you/your' without specifying whether the addressee is the servant, the prophet, or personified Israel/Zion.
  chosen_spanish_reading: Se mantiene el singular 'tú/tu' sin identificar explícitamente si el destinatario es el siervo, el profeta o Israel/Sion personificada.
  alternative_spanish_readings:
  - el siervo
  - el profeta
  - Israel corporativo / Sion personificada
  rationale: El hebreo no resuelve la identidad del destinatario en este versículo. La traducción española conserva esa tensión, evitando una lectura interpretativa que cierre indebidamente el sentido.
  doctrine_reference: Translation philosophy §3
- issue: Imagen cósmica de 'plantar los cielos' y 'fundar la tierra'
  english_pob_reading: Retained creation-language as stated, without reducing it to merely metaphorical restoration language in the main text.
  chosen_spanish_reading: 'Se conserva el lenguaje creador tal como está: ''plantar los cielos'' y ''fundar la tierra''.'
  alternative_spanish_readings:
  - imagen figurada de restauración o nueva creación
  - lenguaje literal de la creación cósmica
  rationale: El hebreo presenta verbos fuertes e inusuales que deben permanecer visibles en la traducción. La versión principal no reduce la imagen a una sola interpretación; deja abierta la tensión entre creación y restauración que el texto bíblico sugiere.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada: no se requirieron cambios sustanciales. Se respetó el tratamiento del hebreo como texto creativo y la ambigüedad del destinatario singular.'
  spanish_consistency_notes:
  - Se mantiene 'Sion' para el topónimo, conforme al uso bíblico español estándar.
  - Se usa 'tú' y no 'usted' por tratarse de una alocución bíblica directa y por mantener la correspondencia con el singular hebreo.
  - '''Cielos'' se conserva en plural como en el hebreo שָׁמַיִם.'
  - No se sustituyó 'cubrir' por 'proteger' para preservar la transparencia léxica del verbo hebreo.
  - Se evitó 'SEÑOR' porque aquí el texto hebreo no contiene el Tetragrámaton; el poseedor divino está expresado por el pronombre 'mi' en boca de Yahvé implícito en el discurso.
