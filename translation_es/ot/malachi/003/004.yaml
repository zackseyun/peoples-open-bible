  - marker: b
    text: «Ofrenda» puede ser más específicamente «ofrenda vegetal» o «ofrenda de cereal» en algunos contextos.
    reason: lexical_alternative
  revision_rationale: Se ajusta la preposición a la construcción española más idiomática («agradable a Yahvé») y se aligera la coordinación de los topónimos («Judá y Jerusalén») sin cambiar el sentido ni las decisiones léxicas principales.
