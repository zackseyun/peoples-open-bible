translation:
  language: es
  text: 'Entonces los hombres de Bet-semes dijeron[a]: «¿Quién podrá estar en pie delante de Yahvé, este Dios santo? ¿Y a quién subirá de entre nosotros?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Y a quién subirá ello de entre nosotros?»; probablemente se refiere al arca de Yahvé.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijeron
  alternatives_spanish:
  - Y ... dijeron
  lexicon: HALOT
  rationale: La forma waw-consecutiva avanza la narración; «Entonces» reproduce bien ese avance temporal en español sin volverla mecánica.
- source_word: אַנְשֵׁי בֵית שֶׁמֶשׁ
  english_pob_choice: the men of Beth-shemesh
  chosen_spanish: los hombres de Bet-semes
  alternatives_spanish:
  - la gente de Bet-semes
  - los varones de Bet-semes
  lexicon: HALOT
  rationale: אַנְשֵׁי es literalmente «hombres de». Se conserva el matiz masculino plural del hebreo, siguiendo la decisión auditada de no neutralizarlo sin razón textual.
- source_word: מִי יוּכַל
  english_pob_choice: Who is able
  chosen_spanish: ¿Quién podrá?
  alternatives_spanish:
  - ¿Quién es capaz?
  - ¿Quién puede?
  lexicon: HALOT
  rationale: En español, «podrá» expresa con naturalidad la capacidad/posibilidad implícita en יכל y mantiene el tono de incapacidad ante la presencia divina.
- source_word: לַעֲמֹד לִפְנֵי
  english_pob_choice: to stand before
  chosen_spanish: estar en pie delante de
  alternatives_spanish:
  - estar delante de
  - presentarse ante
  lexicon: HALOT
  rationale: «Estar en pie delante de» conserva el sentido literal e idiomático de la expresión hebrea y su gravedad cultual/judicial. Se evita suavizarlo a un mero «presentarse».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el principio del proyecto de verter el Tetragrama como «Yahvé», preservando el nombre propio divino en lugar de una sustitución titulada.
- source_word: הָאֱלֹהִים הַקָּדוֹשׁ הַזֶּה
  english_pob_choice: this holy God
  chosen_spanish: este Dios santo
  alternatives_spanish:
  - este Dios, el Santo
  - este santo Dios
  lexicon: HALOT
  rationale: La construcción appositiva se expresa de forma natural como «este Dios santo», conservando el demostrativo y la cualidad de santidad. Se mantiene la tensión retórica del «este» cercano e impactante.
- source_word: וְאֶל מִי
  english_pob_choice: And to whom
  chosen_spanish: ¿Y a quién
  alternatives_spanish:
  - ¿Y a quién más
  - ¿Y hacia quién
  lexicon: HALOT
  rationale: «¿Y a quién» reproduce la segunda pregunta de manera directa y fluida en español.
- source_word: יַעֲלֶה
  english_pob_choice: shall he go up
  chosen_spanish: subirá
  alternatives_spanish:
  - subirá él
  - irá hacia arriba
  lexicon: HALOT
  rationale: עלה normalmente significa «subir/ascender». «Subirá» mantiene la ambigüedad del sujeto implícito y evita resolverla en el cuerpo del texto.
- source_word: מֵעָלֵינוּ
  english_pob_choice: from us
  chosen_spanish: desde nosotros
  alternatives_spanish:
  - de nosotros
  - lejos de nosotros
  lexicon: HALOT
  rationale: «Desde nosotros» refleja con naturalidad el movimiento de alejamiento inherente a la preposición con על y armoniza con la imagen de algo que se retira de su presencia.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre divino como nombre propio, conforme a la política del proyecto y al valor directo del Tetragrama en el hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Implicit subject of יַעֲלֶה in the second clause
  english_pob_reading: he go up
  chosen_spanish_reading: subirá
  alternative_spanish_readings:
  - subirá ella (refiriéndose explícitamente al arca)
  rationale: El hebreo deja el sujeto implícito; el español conserva esa ambigüedad con un verbo sin sujeto explícito. La posible referencia al arca se deja sin explicitar en el texto principal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; este borrador sigue de cerca la auditoría inglesa y mantiene la misma lectura textual y teológica, adaptada a un español natural y publicable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrama, coherente con la terminología del proyecto.
  - Se conserva el masculino plural de אַנְשֵׁי como «los hombres», siguiendo la decisión auditada de no neutralizar sin base textual.
  - «Dios santo» reproduce la fuerza de הָאֱלֹהִים הַקָּדוֹשׁ הַזֶּה sin volverla una paráfrasis.
  - La ambigüedad del sujeto de «subirá» queda intacta en el cuerpo principal y se aclara solo en nota.
  - La puntuación con comillas españolas y dos preguntas respeta la fluidez del original.
