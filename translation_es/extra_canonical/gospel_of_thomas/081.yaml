base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/081.yaml
  text: Jesus said[a], "Whoever has become rich, let him be king; and whoever has power[c][b], let him renounce it."
  footnotes:
  - marker: a
    text: ⲣⲣⲣⲟ can be rendered "reign" or "rule"; "be king" reflects the verbal nuance tied to ⲣⲟ (king) and preserves Thomas’s stark phrasing.
    reason: lexical_alternative
  - marker: b
    text: ⲇⲩⲛⲁⲙⲓⲥ (Greek loan) may also mean "might" or "ability," and in some contexts "miraculous power." "Power" is kept here for broadness and parallelism.
    reason: lexical_alternative
  - marker: c
    text: The object of ⲁⲣⲛⲁ is implicit in Coptic; supplying "it" (i.e., the power) clarifies the sense without altering the structure.
    reason: dialect_note
