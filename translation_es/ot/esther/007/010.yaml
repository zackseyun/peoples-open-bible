translation:
  language: es
  text: Así colgaron a Hamán en la horca[a] que había preparado para Mardoqueo, y la ira del rey se apaciguó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'impalaron a Hamán en la estaca/árbol que había preparado para Mardoqueo'. El hebreo usa עֵץ ('árbol', 'madera', 'estaca'), y el verbo puede referirse de manera más amplia a colgar un cuerpo; el método exacto de ejecución es debatido.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְלוּ
  english_pob_choice: they hanged
  chosen_spanish: colgaron
  alternatives_spanish:
  - lo impalearon
  - lo suspendieron
  - lo ahorcaron
  lexicon: HALOT
  rationale: El verbo hebreo תלה significa colgar/suspender; en este contexto narrativo la forma española natural es 'colgaron'. 'Ahorcaron' puede sonar demasiado específico hacia un método judicial moderno, mientras que 'impalearon' introduce una concreción que el hebreo no exige de manera inequívoca.
- source_word: הָמָן
  english_pob_choice: Haman
  chosen_spanish: Haman
  alternatives_spanish:
  - Amán
  lexicon: Transliteración estándar del nombre propio
  rationale: Se conserva el nombre propio en forma transliterada. 'Amán' es una adaptación posible en español, pero 'Haman' mantiene más de cerca la convención del texto fuente y la transparencia auditada del proyecto.
- source_word: עַל הָעֵץ
  english_pob_choice: on the gallows
  chosen_spanish: en la horca[a]
  alternatives_spanish:
  - en el árbol[a]
  - en el madero[a]
  - en la estaca[a]
  lexicon: HALOT
  rationale: עֵץ puede significar árbol, madera, madero o estaca; en Ester funciona como el dispositivo de ejecución preparado por Haman. 'Horca' comunica la función narrativa en español moderno, mientras la nota preserva la amplitud lexical del hebreo y la posibilidad de un instrumento tipo poste/estaca.
- source_word: אֲשֶׁר הֵכִין לְמָרְדֳּכָי
  english_pob_choice: that he had prepared for Mordecai
  chosen_spanish: que había preparado para Mardoqueo
  alternatives_spanish:
  - que había dispuesto para Mardoqueo
  - que había hecho preparar para Mardoqueo
  lexicon: HALOT
  rationale: 'הכין expresa preparar, disponer, dejar listo. ''Había preparado para'' conserva el sentido directo y la ironía del relato: Haman recibe el instrumento que él mismo destinó para Mardoqueo.'
- source_word: וַחֲמַת הַמֶּלֶךְ
  english_pob_choice: and the king’s wrath
  chosen_spanish: y la ira del rey
  alternatives_spanish:
  - y el furor del rey
  - y la indignación del rey
  lexicon: HALOT
  rationale: חֵמָה denota ira/furia. 'Ira' es la opción más natural y fiel en español; 'furor' intensifica más de lo necesario y 'indignación' desplaza el matiz emocional hacia la evaluación moral.
- source_word: שָׁכָכָה
  english_pob_choice: subsided
  chosen_spanish: se apaciguó
  alternatives_spanish:
  - se calmó
  - cedió
  - amainó
  lexicon: HALOT
  rationale: שׁכך significa aquietarse, disminuir, apaciguarse. 'Se apaciguó' mantiene la idea de una pasión que baja de intensidad y funciona bien con el sujeto 'la ira'.
theological_decisions:
- issue: Método de ejecución implícito en עֵץ y en וַיִּתְלוּ
  english_pob_reading: The Hebrew uses עֵץ ('tree,' 'wood,' 'stake'), and the verb can refer more broadly to hanging up a body; the exact execution method is debated.
  chosen_spanish_reading: El texto principal usa 'horca' para la función narrativa, pero la nota aclara que el hebreo admite 'árbol', 'madero' o 'estaca', y que el método exacto de ejecución es discutido.
  alternative_spanish_readings:
  - colgado en un árbol
  - impalado en una estaca
  - colgado en un madero
  rationale: La fuente hebrea no obliga a un único instrumento. La traducción principal busca claridad lectora, mientras la nota preserva la tensión lexical y evita cerrar indebidamente la cuestión histórica.
  doctrine_reference: No aplica; decisión lexical-histórica, no doctrinal.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registran cambios en el juicio auditado del texto fuente, y se mantiene la equivalencia óptima con una nota que conserva la ambigüedad léxica del hebreo.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - '''Mardoqueo'' se conserva como forma española tradicional del nombre propio.'
  - '''ira'' traduce חֵמָה de manera consistente con el registro narrativo y evita intensificar innecesariamente el tono.'
  - La nota al pie usa un solo marcador y corresponde exactamente al segmento anclado en 'horca[a]'.
