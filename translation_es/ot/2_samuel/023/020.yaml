    rationale: El audit trail inglés documenta explícitamente la incertidumbre léxica de אֲרִאֵל. El borrador español traduce “los dos hijos de Ariel de Moab” pero no preserva esa explicación para el lector.
  - severity: medium
    issue: La nota [a] sobre “Joiadá” no corresponde a una necesidad exegética o de traducción significativa
    rationale: La variación transliterativa Yehoiadá/Joiadá no es la ambigüedad principal del versículo y ocupa el lugar de una nota más importante sobre אֲרִאֵל.
  - severity: low
