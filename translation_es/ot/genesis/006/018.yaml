revisions:
- from: 'Pero yo estableceré mi pacto contigo[a], y tú entrarás en el arca: tú, tus hijos, tu esposa y las esposas de tus hijos contigo.'
  to: Pero yo estableceré mi pacto contigo[a], y entrarás en el arca—tú, tus hijos, tu esposa y las esposas de tus hijos contigo.
  rationale: 'Se mantiene el sentido del original y del POB inglés, pero se corrige la forma para mayor coherencia y fidelidad estilística: se conserva ''mi pacto'' y la nota alternativa ''confirmaré''; se elimina el pronombre ''tú'' antes del verbo para un español más natural, mientras el énfasis hebreo queda reflejado en la aposición posterior; y se usa una raya para introducir la lista familiar, siguiendo mejor la estructura enfática del original y del audit trail inglés.'
