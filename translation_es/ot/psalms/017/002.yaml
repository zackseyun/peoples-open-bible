translation:
  language: es
  text: Que mi juicio[a] salga de delante de ti; que tus ojos vean lo recto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi vindicación».'
    reason: alternative_reading
  - marker: b
    text: 'O: «lo que es recto» o «lo justo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִלְּפָנֶיךָ
  english_pob_choice: from before you
  chosen_spanish: de delante de ti
  alternatives_spanish:
  - de tu presencia
  - desde tu presencia
  - de ante ti
  lexicon: HALOT
  rationale: Conserva la imagen espacial y judicial de algo que sale 'de delante' de Dios. 'De delante de ti' es natural en español y mantiene mejor la concreción que una paráfrasis como 'de tu presencia'.
- source_word: מִשְׁפָּטִי
  english_pob_choice: my judgment
  chosen_spanish: mi juicio
  alternatives_spanish:
  - mi vindicación
  - mi justicia
  - mi causa
  lexicon: HALOT
  rationale: '''Juicio'' en español puede abarcar tanto el veredicto como la causa ante un tribunal, lo que preserva la ambigüedad útil del hebreo. ''Vindicación'' explicita demasiado una sola dirección interpretativa.'
- source_word: יֵצֵא
  english_pob_choice: come forth
  chosen_spanish: salga
  alternatives_spanish:
  - venga
  - salga adelante
  - salga fuera
  lexicon: HALOT
  rationale: El subjuntivo exhortativo 'que salga' refleja bien el valor peticional del versículo y mantiene la idea de movimiento desde la presencia divina.
- source_word: עֵינֶיךָ
  english_pob_choice: your eyes
  chosen_spanish: tus ojos
  alternatives_spanish:
  - tú
  - tu mirada
  lexicon: HALOT
  rationale: Se conserva el antropomorfismo explícito del hebreo. 'Tus ojos' es claro en español y no aplana la imagen a un abstracto como 'tú'.
- source_word: תֶּחֱזֶינָה
  english_pob_choice: behold
  chosen_spanish: vean
  alternatives_spanish:
  - contemplen
  - miren
  - vean atentamente
  lexicon: HALOT
  rationale: '''Ver'' es idiomático y suficientemente formal en español; mantiene la atención observadora del verbo hebreo sin introducir solemnidad artificial.'
- source_word: מֵישָׁרִים
  english_pob_choice: what is upright
  chosen_spanish: lo recto
  alternatives_spanish:
  - lo justo
  - lo derecho
  - la rectitud
  lexicon: HALOT
  rationale: '''Lo recto'' reproduce bien la cualidad moral y visual de ''lo derecho/upright'' en un español natural. ''Lo justo'' tendería más al ámbito forense, y ''la rectitud'' suena más abstracta.'
theological_decisions:
- issue: 'Forma del versículo: petición o simple futuro'
  english_pob_reading: 'Petition: ''May my judgment come forth...; may your eyes behold...'''
  chosen_spanish_reading: 'Petición: ''Que mi juicio salga...; que tus ojos vean...'''
  alternative_spanish_readings:
  - Mi juicio sale...; tus ojos ven...
  - Saldrá mi juicio...; tus ojos verán...
  rationale: El contexto de súplica favorece una lectura peticional. El uso de 'que' en español preserva la función volitiva/jussiva sin convertirla en una afirmación cerrada ni en una mera predicción.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve it)
translation_notes:
  revision_awareness: La redacción sigue el último ajuste del POB inglés que prefirió un registro más formal ('come forth', 'behold') sin cambiar el sentido. En español se optó por un equivalente natural y solemne ('salga', 'vean') que conserva el tono peticional y judicial del hebreo.
  spanish_consistency_notes:
  - Se mantiene el paralelismo con dos miembros coordinados por punto y coma, como en el hebreo y el audit trail inglés.
  - '''Juicio'' se usa aquí en sentido forense/contextual, no como ''condena''.'
  - '''Lo recto'' recoge la opción del POB inglés ''what is upright'' y evita una abstracción innecesaria.'
  - Los marcadores [a][b] están colocados en el punto de mayor ambigüedad semántica, como exige el registro del POB.
