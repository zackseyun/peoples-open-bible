translation:
  language: es
  text: 'Entonces el rey respondió y dijo al hombre de Dios: «Por favor, implora el favor de Yahvé tu Dios[a], y ora por mí, para que mi mano vuelva a mí». Y el hombre de Dios imploró el favor de Yahvé, y la mano del rey volvió a él y quedó como antes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «busca el favor de Yahvé». El hebreo dice literalmente «implorar el rostro/faz de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן ... וַיֹּאמֶר
  english_pob_choice: answered and said
  chosen_spanish: respondió y dijo
  alternatives_spanish:
  - contestó y dijo
  - respondió
  lexicon: HALOT
  rationale: La pareja narrativa hebrea se conserva con un giro natural en español. «Respondió y dijo» refleja ambos verbos sin forzar una literalidad extraña; «contestó y dijo» sería igualmente posible, pero menos neutro.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el profeta
  lexicon: HALOT
  rationale: Se preserva el título del texto fuente. «Profeta» interpreta la función, pero el hebreo dice literalmente «hombre de Dios», y esa designación debe mantenerse.
- source_word: חַל ... אֶת פְּנֵי יְהוָה / וַיְחַל ... אֶת פְּנֵי יְהוָה
  english_pob_choice: entreat the favor of Yahweh / entreated the favor of Yahweh
  chosen_spanish: ruega el favor de Yahvé / rogó el favor de Yahvé
  alternatives_spanish:
  - implora el favor de Yahvé
  - busca el favor de Yahvé
  - apacigua a Yahvé
  lexicon: HALOT
  rationale: El modismo hebreo חלה את־פני no se traduce de forma mecánica como «rostro». «Rogar el favor de» transmite el sentido idiomático de buscar la disposición favorable de alguien. «Apaciguar» sería demasiado fuerte y sugeriría una idea no requerida por el contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé» y no sustituirlo por un título en mayúsculas.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu dios
  lexicon: HALOT
  rationale: En el contexto, el rey reconoce al Dios de Israel como el Dios del profeta. En español, la mayúscula en «Dios» corresponde al referente divino específico, no a una deidad genérica.
- source_word: וְהִתְפַּלֵּל בַּעֲדִי
  english_pob_choice: and pray for me
  chosen_spanish: y ora por mí
  alternatives_spanish:
  - e intercede por mí
  - y ruega por mí
  lexicon: HALOT
  rationale: El hitpael con בעד expresa oración intercesora. «Ora por mí» es natural y fiel; «intercede por mí» también es válido, pero algo más técnico.
- source_word: וְתָשֹׁב יָדִי אֵלָי
  english_pob_choice: that my hand may be restored to me
  chosen_spanish: para que mi mano vuelva a mí
  alternatives_spanish:
  - para que mi mano sea restaurada
  - para que mi mano regrese a mí
  lexicon: HALOT
  rationale: El hebreo dice literalmente que la mano «vuelva» al hablante. Se conserva la imagen de retorno, que en contexto implica recuperación de la condición anterior. «Sea restaurada» es correcta, pero más interpretativa.
- source_word: וַתָּשָׁב יַד הַמֶּלֶךְ אֵלָיו
  english_pob_choice: the king’s hand was restored to him
  chosen_spanish: la mano del rey volvió a él
  alternatives_spanish:
  - la mano del rey fue restaurada
  - la mano del rey regresó a él
  lexicon: HALOT
  rationale: Se mantiene la misma raíz y la misma imagen verbal que en la petición, evitando perder la correspondencia entre solicitud y cumplimiento. «Volvió a él» suena natural en español y sigue de cerca el hebreo.
- source_word: וַתְּהִי כְּבָרִאשֹׁנָה
  english_pob_choice: and became as it was before
  chosen_spanish: y quedó como antes
  alternatives_spanish:
  - y fue como al principio
  - y quedó como anteriormente
  lexicon: HALOT
  rationale: La frase expresa restitución al estado previo. «Quedó como antes» es claro, idiomático y fiel; «como al principio» sería posible, aunque menos directo en español.
theological_decisions:
- issue: Distinción entre el Dios del rey y el Dios confesado por el profeta
  english_pob_reading: Retain 'the LORD your God' exactly, without softening to 'our God.'
  chosen_spanish_reading: Conservar «Yahvé tu Dios» sin convertirlo en «nuestro Dios».
  alternative_spanish_readings:
  - Yahvé nuestro Dios
  - Dios nuestro
  rationale: El rey no se presenta aquí como solidario en fidelidad de pacto; habla al profeta reconociendo la relación especial del profeta con Yahvé. Cambiar a «nuestro Dios» borraría esa tensión teológica y discursiva que el texto sí expresa.
  doctrine_reference: Preservar la tensión teológica del relato sin resolverla artificialmente.
translation_notes:
  revision_awareness: La traducción sigue el acuerdo alto del audit trail inglés y no introduce cambios sustantivos. Se mantuvo la imagen hebrea del «volver» de la mano para conservar la correspondencia entre la petición y su cumplimiento, y se preservó el tratamiento del Tetragrámaton como «Yahvé» conforme a la política del proyecto.
  spanish_consistency_notes:
  - Se mantiene «hombre de Dios» como título fijo, no como «profeta».
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - «Tu Dios» conserva la referencia específica al Dios del profeta.
  - La secuencia «volvió a mí / volvió a él» refleja la repetición intencional del hebreo.
  - La nota al pie se ancla en «favor» para señalar la alternativa idiomática del hebreo sin ocultar el modismo.
