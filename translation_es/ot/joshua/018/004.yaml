review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia verbal hebrea y la lógica del versículo: mandato de proveer hombres, envío, levantarse, recorrer la tierra, ponerla por escrito según la heredad, y venir a Josué. Sin embargo, hay dos puntos mejorables para mayor fidelidad y naturalidad: «la escribirán» suena poco idiomático en español para וְיִכְתְּבוּ אֹתָהּ en este contexto, y «a mí» tras «vendrán» es menos natural que «vendrán a verme» o «vendrán a mí». Además, «por tribu» es aceptable, pero «de cada tribu» expresa mejor el distributivo documentado en el inglés POB.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «Provean» y sobre todo «la escribirán» producen una lectura algo rígida. «Ponerla por escrito» comunica la misma idea con fidelidad y mejor legibilidad. «Conforme a su heredad» es comprensible, aunque el singular posesivo puede sonar algo genérico; se puede mantener si la nota aclara que se refiere a las porciones de herencia. El conjunto necesita solo una reparación menor de idiomaticidad.
  glossary_alignment: No hay términos teológicos sensibles aquí. «Heredad» encaja con el registro bíblico y con נַחֲלָה. «Tres hombres» preserva correctamente el masculino explícito. «De cada tribu» representa mejor el distributivo de לַשָּׁבֶט que «por tribu» en este contexto.
  issues:
  - severity: medium
    issue: «la escribirán» es poco natural en español para referirse a registrar la tierra
    rationale: Aunque sigue de cerca el hebreo, en español suena extraño 'escribir la tierra'. El inglés auditado ya se ajustó a 'write it down'; «la pondrán por escrito» preserva la referencia pronominal y mejora mucho la idiomaticidad sin expandir indebidamente el sentido.
  - severity: low
    issue: «por tribu» podría aclararse como «de cada tribu»
    rationale: Ambas opciones pueden funcionar, pero «de cada tribu» refleja con más transparencia el distributivo documentado en las decisiones léxicas del POB.
  - severity: low
    issue: «vendrán a mí» suena algo calcado
    rationale: Es fiel formalmente, pero en español bíblico moderno y natural «vendrán a verme» comunica bien el sentido de venir a la presencia de Josué. No obstante, «vendrán a mí» no es incorrecto; es una cuestión menor de estilo.
  revised_spanish_text: Provean[a] para ustedes tres hombres de cada tribu, y yo los enviaré; ellos se levantarán y recorrerán la tierra, y la pondrán por escrito[b] conforme a su heredad, y vendrán a mí.
  revised_footnotes:
  - marker: a
    text: O «Designen para ustedes tres hombres por tribu».
    reason: lexical_alternative
  - marker: b
    text: Es decir, la pondrán por escrito en relación con los repartos de la heredad territorial.
    reason: cultural_note
  revision_rationale: Se ajusta «por tribu» a «de cada tribu» para expresar con más claridad el distributivo del hebreo, y se reemplaza «la escribirán» por «la pondrán por escrito» para conservar el sentido de registrar la tierra de manera idiomática en español. Se mantiene «conforme a su heredad» por su sobriedad bíblica y su cercanía al texto fuente, apoyado por la nota explicativa.
