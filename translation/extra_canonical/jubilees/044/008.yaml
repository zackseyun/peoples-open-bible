translation:
  text: And Israel sent Judah before him to his son Joseph, so that he might examine
    the land of Goshen, because there Joseph had told his brothers to come and dwell,
    so that they might be near him. And it was the best of the land of Egypt, and
    near to him, for all of them and for their livestock.
