translation:
  language: es
  text: Porque huirán de los piadosos[a] como los perseguidos por la guerra[b], pero perseguirán a los pecadores y los alcanzarán; y los que practican la iniquidad no escaparán del juicio del Señor; serán capturados como quienes son apresados por enemigos experimentados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los fieles»; ὁσίων en este libro puede referirse a la gente piadosa o fiel, no simplemente a «santos» en sentido técnico.
    reason: lexical_alternative
  - marker: b
    text: La expresión griega «como los perseguidos por guerra» es comprimida; también puede entenderse de manera más dinámica como «como personas expulsadas por la guerra».
    reason: alternative_reading
lexical_decisions:
- source_word: φεύξονται
  english_pob_choice: will flee
  chosen_spanish: huirán
  alternatives_spanish:
  - escaparán
  - saldrán huyendo
  lexicon: BDAG
  rationale: El futuro medio expresa retiro o huida; «huirán» es la forma más natural y directa en español, y conserva la imagen de desplazamiento forzado.
- source_word: ὡς διωκόμενοι πολέμου
  english_pob_choice: as those pursued by war
  chosen_spanish: como los perseguidos por la guerra
  alternatives_spanish:
  - como gente expulsada por la guerra
  - como los que son acosados por la guerra
  lexicon: BDAG
  rationale: La frase es compacta en griego; «perseguidos por la guerra» mantiene la imagen bélica sin explicar de más el mecanismo exacto de la persecución.
- source_word: ἀπὸ ὁσίων
  english_pob_choice: from the holy ones
  chosen_spanish: de los piadosos
  alternatives_spanish:
  - de los santos
  - de los fieles
  lexicon: BDAG
  rationale: En Psalmos Salomonis, ὅσιοι tiene el valor socioreligioso de personas piadosas o fieles; «piadosos» evita confundirlo con ἅγιοι («santos») y sigue la corrección revisada en el audit trail inglés.
- source_word: καταδιώξονται
  english_pob_choice: will pursue
  chosen_spanish: perseguirán
  alternatives_spanish:
  - acecharán
  - darán caza a
  lexicon: BDAG
  rationale: El verbo intensifica la persecución; «perseguirán» conserva el paralelismo formal con «huirán» y no añade color extra.
- source_word: καταλήψονται
  english_pob_choice: overtake
  chosen_spanish: los alcanzarán
  alternatives_spanish:
  - los atraparán
  - los cogerán
  lexicon: BDAG
  rationale: En secuencia con la persecución, «alcanzarán» es natural en español y distingue bien esta acción de la captura pasiva posterior.
- source_word: οἱ ποιοῦντες ἀνομίαν
  english_pob_choice: those who practice lawlessness
  chosen_spanish: los que practican la iniquidad
  alternatives_spanish:
  - los que hacen injusticia
  - los inicuos
  lexicon: BDAG
  rationale: La construcción participial describe conducta continua; «los que practican» refleja ese aspecto durativo. «Iniquidad» comunica ἀνομία con fuerza moral/jurídica en un registro bíblico claro.
- source_word: τὸ κρίμα Κυρίου
  english_pob_choice: the Lord’s judgment
  chosen_spanish: el juicio del Señor
  alternatives_spanish:
  - el juicio de Yahvé
  - el juicio del Señor Dios
  lexicon: BDAG
  rationale: El griego dice Κύριος; siguiendo el contexto inmediato y el audit trail inglés, «Señor» evita introducir una convención onomástica no presente en esta frase. No se cambia a «Yahvé» porque aquí la fuente es κύριος, no el tetragrámaton.
- source_word: ὡς ὑπὸ πολεμίων ἐμπείρων καταλημφθήσονται
  english_pob_choice: they will be captured like those seized by experienced enemies
  chosen_spanish: serán capturados como los que son apresados por enemigos experimentados
  alternatives_spanish:
  - serán capturados como por enemigos diestros
  - serán tomados como por enemigos expertos
  lexicon: BDAG
  rationale: «ἐμπείρων» comunica enemigos experimentados o consumados; «enemigos experimentados» conserva el matiz militar sin sobretraducir. «Serán capturados» mantiene la pasiva y el cierre paralelo del versículo.
theological_decisions:
- issue: Cómo traducir ὁσίων en Psalms of Solomon
  english_pob_reading: from the holy ones / from the pious, with revision favoring closer lexical correspondence
  chosen_spanish_reading: de los piadosos
  alternative_spanish_readings:
  - de los santos
  - de los fieles
  rationale: La decisión revisada en el audit trail distingue ὅσιοι de ἅγιοι. En español, «piadosos» expresa mejor ese grupo socioreligioso específico y evita diluir la distinción. Mantiene la tensión entre literalidad y claridad sin borrar el matiz histórico.
  doctrine_reference: 'DOCTRINE.md contested terms: ὅσιοι in Psalms of Solomon → pious/faithful ones'
- issue: Cómo renderizar Κύριος en τὸ κρίμα Κυρίου
  english_pob_reading: the Lord’s judgment
  chosen_spanish_reading: el juicio del Señor
  alternative_spanish_readings:
  - el juicio de Yahvé
  - el juicio del Señor Dios
  rationale: Aunque el proyecto usa «Yahvé» para יהוה en el texto principal, aquí la forma griega es κύριος. Por eso se conserva «Señor», siguiendo el criterio del audit trail inglés y evitando introducir un nombre divino que el griego no marca explícitamente en esta frase.
  doctrine_reference: 'DOCTRINE.md contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés y sus revisiones: la corrección de ὁσίων hacia una equivalencia más cercana a «pious/holy ones», la conservación de la imagen militar del versículo, y la simplificación de la pasiva final para no añadir «hombres» que no están en el griego. La traducción española sigue esa línea y ajusta ὅσιοι a «piadosos» por claridad lexical en el contexto de Psalmos de Salomón.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para Κύριος en esta frase, en coherencia con el griego y con el audit trail inglés.
  - 'Se conserva el paralelismo verbal: huirán / perseguirán / alcanzarán / escaparán / serán capturados.'
  - «Iniquidad» se usa para ἀνομία para sostener el tono moral-jurídico del pasaje.
  - «Piadosos» se usa aquí como término socioreligioso específico, no como simple adjetivo devocional.
