translation:
  language: es
  text: Samuel oyó todas las palabras del pueblo, y las dijo en oídos[a] de Yahvé[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en los oídos de Yahvé», un modismo que significa en la audiencia de Yahvé o delante de él.'
    reason: lexical_alternative
  - marker: b
    text: El nombre divino es YHWH; en este proyecto se traduce como «Yahvé».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  lexicon: HALOT
  rationale: El hebreo שׁמע en esta forma narrativa expresa recepción auditiva directa. «Oyó» conserva la naturalidad del español y corresponde bien a «heard» en el POB inglés; «escuchó» podría sonar más activo o intencional de lo que exige el texto.
- source_word: כָּל דִּבְרֵי הָעָם
  english_pob_choice: all the words of the people
  chosen_spanish: todas las palabras del pueblo
  alternatives_spanish:
  - todo lo que dijo el pueblo
  - todas las declaraciones del pueblo
  lexicon: HALOT
  rationale: Se mantiene la literalidad formal de דִּבְרֵי como «palabras» y de כָּל como totalidad. «Del pueblo» preserva la referencia colectiva sin añadir interpretación.
- source_word: וַיְדַבְּרֵם
  english_pob_choice: he spoke them
  chosen_spanish: se las habló
  alternatives_spanish:
  - las repitió
  - las comunicó
  lexicon: HALOT
  rationale: El sufijo pronominal remite a las palabras del pueblo, y en español «hablar algo a alguien» permite reflejar ese objeto directo pronominal. «Se las habló» mantiene la referencia sin introducir explícitamente un matiz ausente como «informó».
- source_word: בְּאָזְנֵי
  english_pob_choice: in the ears of
  chosen_spanish: al oído de
  alternatives_spanish:
  - en los oídos de
  - delante de
  lexicon: HALOT
  rationale: 'El hebreo es idiomático: literalmente «en los oídos de». En español, «al oído de» conserva la imagen auditiva y suena más natural que un calco rígido. La nota explica el valor idiomático de presencia/audición.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto en español: «Yahvé» para el nombre divino YHWH. Esto preserva el nombre personal del pacto, en lugar de sustituirlo por un título.'
- source_word: שְׁמוּאֵל
  english_pob_choice: Samuel
  chosen_spanish: Samuel
  lexicon: standard transliteration
  rationale: Nombre propio bíblico establecido por convención en español.
theological_decisions:
- issue: Renderizado del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa el Tetragrámaton. La política española del proyecto favorece «Yahvé» como forma principal en lugar de la sustitución litúrgica «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Sentido idiomático de «en los oídos de Yahvé»
  english_pob_reading: in the ears of Yahweh
  chosen_spanish_reading: al oído de Yahvé
  alternative_spanish_readings:
  - en los oídos de Yahvé
  - delante de Yahvé
  rationale: Se preserva la imagen semítica de hablar en la presencia/audiencia de Dios sin borrar el hebraísmo. La formulación española intenta ser inteligible sin perder la tensión idiomática documentada por el POB inglés.
  doctrine_reference: Lexical/idiomatic note from source packet
translation_notes:
  revision_awareness: El archivo inglés reciente no presenta cambios; el análisis de revisión indica alta concordancia y sin modificaciones necesarias. Esta propuesta sigue la lectura estable del POB inglés, pero adapta la idiomática al español sin perder el hebraísmo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal del nombre divino, coherente con las normas del proyecto en español.
  - Se conserva la estructura narrativa breve y directa del hebreo.
  - La construcción pronominal «se las habló» evita añadir contenido interpretativo y mantiene el referente de «las palabras».
