translation:
  language: es
  text: Dios lo ayudó contra los filisteos, contra los árabes que habitaban en Gur-baal, y contra los meunitas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los maonitas». El etnónimo hebreo puede reflejar un nombre de grupo relacionado o variante.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעְזְרֵהוּ
  english_pob_choice: helped him
  chosen_spanish: lo ayudó
  alternatives_spanish:
  - le dio ayuda
  - acudió en su ayuda
  lexicon: HALOT
  rationale: עזר en forma narrativa con sufijo de 3.ª persona masculina singular expresa que Dios prestó ayuda a Uzías. "Lo ayudó" conserva la relación directa sujeto-objeto y suena natural en español bíblico moderno.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: Aunque el hebreo lleva artículo, aquí funciona como designación propia del Dios de Israel. En español, "Dios" es la forma más natural y fiel en este contexto narrativo.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - frente a
  lexicon: HALOT
  rationale: Con un verbo de ayuda en marco militar, עַל introduce el ámbito de oposición o combate. "Contra" reproduce mejor esa relación hostil que "sobre" o "acerca de".
- source_word: פְּלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los filisteos
  lexicon: HALOT
  rationale: Es el etnónimo estándar en español para este pueblo. No requiere nota especial porque la identificación es estable.
- source_word: הערביים
  english_pob_choice: the Arabians
  chosen_spanish: los arabios
  alternatives_spanish:
  - los árabes
  lexicon: HALOT
  rationale: El hebreo denota un grupo étnico/arabo-peninsular en un marco histórico antiguo. "Arabios" preserva mejor ese valor de pueblo antiguo que "árabes", que en español moderno puede sonar más amplio o anacrónico.
- source_word: הַיֹּשְׁבִים
  english_pob_choice: who lived
  chosen_spanish: que habitaban
  alternatives_spanish:
  - que vivían
  - que moraban
  lexicon: HALOT
  rationale: El participio de ישב expresa residencia estable. "Que habitaban" mantiene el sentido de asentamiento y funciona bien como modificador del grupo étnico.
- source_word: בְּגוּר בָּעַל
  english_pob_choice: in Gur-baal
  chosen_spanish: en Gur-baal
  alternatives_spanish:
  - en Gur-Baal
  - en la región de Gur-baal
  lexicon: HALOT
  rationale: Es un topónimo que debe transliterarse. La preposición ב con lugar se rinde naturalmente con "en".
- source_word: הַמְּעוּנִים
  english_pob_choice: the Meunites
  chosen_spanish: los meunitas
  alternatives_spanish:
  - los maonitas
  lexicon: HALOT
  rationale: La forma consonántica apunta a un etnónimo transliterable. "Meunitas" conserva la lectura adoptada por el POB en inglés y deja abierta la variante histórica "maonitas".
theological_decisions:
- issue: Identidad del sujeto divino
  english_pob_reading: God helped him
  chosen_spanish_reading: Dios lo ayudó
  alternative_spanish_readings:
  - el Dios lo ayudó
  rationale: El texto presenta a Dios como agente directo de la victoria de Uzías; no hay necesidad de introducir otra mediación o circunloquio. La traducción mantiene la agencia divina explícita.
  doctrine_reference: Providencia y ayuda divina en la historia de Israel
translation_notes:
  revision_awareness: 'Concorda con el pasaje fuente y con el audit trail inglés: no se introdujeron cambios textuales ni revisiones posteriores. Se preservó la nota alternativa del etnónimo final y la lectura militar de עַל.'
  spanish_consistency_notes:
  - Se mantiene "Dios" para הָאֱלֹהִים, sin artículo, por uso bíblico natural en español.
  - '"Arabios" se usa deliberadamente para reflejar un grupo antiguo; "árabes" queda como alternativa menos precisa para este contexto.'
  - '"Meunitas" sigue la transliteración preferida del POB; la nota conserva la variante histórica "maonitas".'
  - Se conserva el paralelismo de dos grupos con repetición de "contra" para reflejar la estructura hebrea.
