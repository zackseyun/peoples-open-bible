  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: la propuesta de poner alimentos preparados delante de Eleazar, la simulación de probar carne de cerdo y la exhortación a preservar la vida. Sin embargo, «alimentos asados» es menos seguro para ἡψημένων que una formulación más amplia como «alimentos cocinados/preparados», dado que la propia justificación léxica reconoce un campo semántico de cocción más general. Además, «probar cerdo» suena algo abrupto en español; «probar carne de cerdo» expresa con más claridad el referente de τῶν ὑείων sin perder fuerza.'
  spanish_quality_summary: El español es claro y comprensible, pero puede sonar un poco rígido en «pondremos delante alimentos asados» y algo poco idiomático en «probar cerdo». Una ligera revisión mejora naturalidad y precisión sin apartarse del texto fuente ni del registro digno del proyecto.
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. La decisión clave aquí es τῶν ὑείων: conviene explicitar «carne de cerdo» en el texto español para evitar una construcción elíptica menos natural que «cerdo» a secas. σώθητι como «sálvate» está bien alineado con la decisión auditada de autopreservación, no salvación doctrinal.'
  issues:
  - severity: medium
    issue: «asados» puede ser demasiado específico para ἡψημένων
    rationale: La auditoría inglesa eligió «roasted», pero la nota léxica reconoce un sentido culinario más amplio de comida cocinada. En español, «asados» puede restringir innecesariamente la imagen; «cocinados» conserva mejor la amplitud si se desea evitar sobreespecificación.
  - severity: medium
    issue: «probar cerdo» es menos natural que «probar carne de cerdo»
    rationale: Aunque comprensible, la expresión con el animal a secas resulta más brusca en español bíblico-natural. La nota ya contempla «carne de cerdo» como alternativa, y esta formulación aclara que se trata del alimento prohibido.
  revised_spanish_text: Nosotros, pues, pondremos delante alimentos cocinados[a]; pero tú, fingiendo probar carne de cerdo, sálvate.
