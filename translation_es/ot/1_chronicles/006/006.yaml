lexical_decisions:
- source_word: יוֹאָח
  english_pob_choice: Joah
  chosen_spanish: Joah
  alternatives_spanish:
  - Joac
  - Yoah
  lexicon: HALOT
  rationale: Nombre propio; se conserva en transliteración para mantener la forma identificable del linaje. 'Joah' sigue de cerca la forma inglesa auditada y evita una adaptación innecesaria.
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - su descendiente
  lexicon: HALOT
  rationale: En una genealogía, בן con sufijo posesivo señala la relación filial inmediata según el formato del pasaje. En español, 'su hijo' comunica con naturalidad esa sucesión directa.
- source_word: עִדּוֹ
  english_pob_choice: Iddo
  chosen_spanish: Iddo
  alternatives_spanish:
  - Idó
  lexicon: HALOT
  rationale: Nombre propio; se translitera sin traducir. Se mantiene la forma breve y reconocible usada en la tradición inglesa auditada.
- source_word: זֶרַח
  english_pob_choice: Zerah
  chosen_spanish: Zérah
  alternatives_spanish:
  - Zerah
  lexicon: HALOT
  rationale: Nombre propio; la transliteración conserva la consonancia con el hebreo. Se emplea acento gráfico en español para indicar la pronunciación llana y ayudar a la lectura pública.
- source_word: יְאָתְרַי
  english_pob_choice: Jeatherai
  chosen_spanish: Jeaterai
  alternatives_spanish:
  - Jetherai
  lexicon: HALOT
  rationale: Nombre propio. La forma española sigue la transliteración base del POB inglés, mientras que 'Jetherai' se conserva como variante lexical documentada por el audit trail.
translation_notes:
  revision_awareness: El texto inglés auditado no muestra revisiones aplicadas y el control cruzado indica alto acuerdo; por eso la versión española sigue de cerca la secuencia genealógica y solo ajusta la ortografía para lectura natural en español.
  spanish_consistency_notes:
  - Se mantiene 'su hijo' de manera uniforme para reflejar בן con sufijo posesivo en la genealogía.
  - Los nombres propios se transliteran en lugar de traducirse, siguiendo el tratamiento del texto base auditado.
  - Se conserva una única nota alternativa para el nombre final, paralela a la nota inglesa sobre la variante 'Jetherai'.
