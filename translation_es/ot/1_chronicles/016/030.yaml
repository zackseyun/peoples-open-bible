revisions:
- from: ¡Tiemblen[a] delante de él, todos los habitantes de la tierra; sí, el mundo está establecido; no será movido.
  to: ¡Tiemblen delante de él, toda la tierra! Sí, el mundo está establecido; no será movido[a].
  rationale: Se corrige «todos los habitantes de la tierra» a «toda la tierra» para ajustarse al hebreo כָּל הָאָרֶץ y al alcance cósmico del contexto. Se reubica la nota al pie para reflejar la alternativa léxica documentada en inglés para תִּמּוֹט, que es el principal lugar donde la POB preserva matices. El resto de la redacción se mantiene por fidelidad y buena legibilidad en español.
