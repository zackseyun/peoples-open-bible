translation:
  language: es
  text: los hijos de Baiterous[a], tres mil cinco; los hijos de Ragethlomon, ciento veintitrés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los nombres griegos de este versículo difieren de la tradición paralela hebrea/MT aproximada, que en este punto refleja «los hijos de Hashum, doscientos veintitrés». El texto principal sigue el griego de 1 Esdras en lugar de armonizarlo con el MT.
    reason: alternative_reading
lexical_decisions:
- source_word: υἱοὶ
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos de la casa de
  lexicon: LSJ
  rationale: En este contexto de lista/censo, υἱοὶ funciona como fórmula genealógica de pertenencia a un clan. 'Los hijos de' conserva la estructura formal del griego y es idiomático en español bíblico sin añadir interpretación.
- source_word: Βαιτηρούς
  english_pob_choice: Baiterous
  chosen_spanish: Baiterous
  alternatives_spanish:
  - Baitherous
  - Beterous
  lexicon: LSJ
  rationale: Es un nombre propio transliterado; se mantiene la forma más cercana al griego de Swete para preservar la transparencia textual.
- source_word: τρισχίλιοι πέντε
  english_pob_choice: three thousand five
  chosen_spanish: tres mil cinco
  alternatives_spanish:
  - 3,005
  - tres mil y cinco
  lexicon: LSJ
  rationale: La cifra se expresa con cardinales en estilo bíblico. En español, 'tres mil cinco' es natural y fiel; se evita 'y' porque el ajuste revisado del audit trail favorece un registro más formal.
- source_word: Ῥαγεθλωμῶν
  english_pob_choice: Ragethlomon
  chosen_spanish: Ragethlomon
  alternatives_spanish:
  - Ragethlomón
  - Ragetlomon
  lexicon: LSJ
  rationale: Nombre propio transliterado directamente del testimonio griego. Se conserva sin armonizar con el paralelo hebreo aproximado, porque la primacía textual aquí es del griego.
- source_word: ἑκατὸν εἴκοσι τρεῖς
  english_pob_choice: one hundred twenty-three
  chosen_spanish: ciento veintitrés
  alternatives_spanish:
  - ciento y veintitrés
  - '123'
  lexicon: LSJ
  rationale: Número cardinal directo; 'ciento veintitrés' reproduce fielmente el valor y mantiene el registro formal de una lista censal.
theological_decisions:
- issue: Diferencia entre el griego de 1 Esdras y el paralelo hebreo/MT aproximado en los nombres y el número
  english_pob_reading: Retain the Greek list names 'Baiterous' and 'Ragethlomon' in the main text
  chosen_spanish_reading: Mantener en el texto principal 'Baiterous' y 'Ragethlomon'
  alternative_spanish_readings:
  - armonizar con el paralelo hebreo y leer 'Hashum'
  - ajustar el número al paralelo masorético
  rationale: La fuente principal para 1 Esdras es el griego de Swete; el paralelo hebreo sirve como control, no como corrección automática. Por eso se evita importar nombres o cifras que no están en el texto fuente principal.
  doctrine_reference: Translation philosophy §1; PHILOSOPHY.md sobre 1 Esdras usando el LXX de Swete como fuente con paralelos MT como referencia secundaria
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail: se mantuvo la cifra sin ''y'' y se usó ''de'' en la construcción de pertenencia para mayor naturalidad y fidelidad al griego. No se añadió nota al pie porque el texto español no introduce una alternativa textual explícita en esta línea.'
  spanish_consistency_notes:
  - Se usa 'hijos de' de manera consistente con la fórmula genealógica de listas censales.
  - Los nombres propios se transliteran y no se traducen.
  - Los números se expresan en palabras para mantener el registro bíblico y la concordancia estilística con el resto de la sección.
  - No se armoniza con el paralelo hebreo aproximado cuando esto alteraría la lectura griega principal.
