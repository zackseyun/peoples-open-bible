translation:
  language: es
  text: Y yo mismo seré para ella una muralla de fuego alrededor[a], declara Yahvé, y seré gloria en medio de ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y seré una gloria en medio de ella». El hebreo puede entenderse con un predicado nominal sin artículo («gloria») o con sentido indefinido («una gloria»).'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: And I myself
  chosen_spanish: Y yo mismo
  alternatives_spanish:
  - Y yo
  - Pero yo
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis al sujeto verbal. En español, «yo mismo» conserva ese refuerzo de manera natural; «Y» mantiene el avance del oráculo.
- source_word: אֶהְיֶה
  english_pob_choice: will be
  chosen_spanish: seré
  alternatives_spanish:
  - estaré
  - seré / estaré
  lexicon: HALOT
  rationale: El imperfecto de היה aquí es predictivo. «Seré» reproduce la relación predicativa establecida por el hebreo en ambas apariciones del versículo.
- source_word: לָהּ
  english_pob_choice: for her
  chosen_spanish: para ella
  alternatives_spanish:
  - a ella
  - en favor de ella
  lexicon: HALOT
  rationale: La preposición ל con היה expresa relación beneficiosa o protectora. «Para ella» comunica esa función con naturalidad en español.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: La fórmula profética נְאֻם se rinde bien con «declara», que conserva el tono solemne y directo. El nombre divino se mantiene como «Yahvé» según la terminología del proyecto.
- source_word: חוֹמַת אֵשׁ
  english_pob_choice: a wall of fire
  chosen_spanish: una muralla de fuego
  alternatives_spanish:
  - un muro de fuego
  - una pared de fuego
  lexicon: HALOT
  rationale: La cadena constructa significa literalmente «muro/muralla de fuego». «Muralla» preserva el valor protector y suena digno en español bíblico contemporáneo.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: en derredor
  alternatives_spanish:
  - alrededor
  - todo alrededor
  lexicon: HALOT
  rationale: El adverbio intensifica la imagen de cerco. «En derredor» mantiene el matiz envolvente con un registro bíblico sobrio; se refleja la idea de circunvalación completa.
- source_word: וּלְכָבוֹד
  english_pob_choice: and I will be glory
  chosen_spanish: y seré gloria
  alternatives_spanish:
  - y seré una gloria
  - y seré glorioso
  lexicon: HALOT
  rationale: El hebreo carece de artículo explícito y presenta un predicado nominal sobrio. «Seré gloria» preserva esa fuerza y deja abierta la tensión entre lectura indefinida y cualitativa.
- source_word: בְּתוֹכָהּ
  english_pob_choice: in her midst
  chosen_spanish: en medio de ella
  alternatives_spanish:
  - en su interior
  - dentro de ella
  lexicon: HALOT
  rationale: La expresión señala el centro o interior de la ciudad personificada. «En medio de ella» es natural, preciso y conserva la referencia femenina.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrama. El proyecto pide representarlo como «Yahvé», no ocultarlo tras un título. Se conserva así el nombre propio del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Predicado nominal en וּלְכָבוֹד
  english_pob_reading: I will be glory / a glory
  chosen_spanish_reading: seré gloria
  alternative_spanish_readings:
  - seré una gloria
  - seré glorioso
  rationale: El hebreo permite entender el predicado como sustantivo anarthrous o como indefinido. «Seré gloria» conserva la ambigüedad sin forzar una interpretación más específica de la que el texto exige.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve lexical tension where the source allows it'
- issue: Jerusalén personificada como femenino singular
  english_pob_reading: her
  chosen_spanish_reading: ella
  alternative_spanish_readings:
  - la ciudad
  - Jerusalén
  rationale: Los sufijos pronominales hebreos son femeninos singulares. Mantener «ella» conserva la personificación profética sin introducir un sustantivo ausente del versículo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; do not paraphrase beyond the source text'
translation_notes:
  revision_awareness: No hubo cambios recientes en la revisión más alta; el texto inglés auditado quedó confirmado sin modificaciones y el presente borrador sigue su lectura de alta concordancia, adaptada al español con las decisiones léxicas y teológicas correspondientes.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en coherencia con el proyecto.
  - Se conserva el femenino singular de la referencia a la ciudad con «ella».
  - Se evita una paráfrasis expansiva; el versículo queda en una sintaxis española natural pero cercana al hebreo.
  - La ambigüedad de «gloria» se preserva mediante nota, como en el registro inglés.
  - «Muralla de fuego» refleja el valor protector de חוֹמָה con registro bíblico claro.
