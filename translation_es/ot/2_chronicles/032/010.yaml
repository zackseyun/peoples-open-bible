translation:
  language: es
  text: 'Así dice Senaquerib, rey de Asiria: ¿En qué confían[a] ustedes, que permanecen bajo asedio en Jerusalén?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «¿En qué confían ustedes y permanecen bajo asedio en Jerusalén?». El hebreo usa participios («confiando», «permaneciendo»), que describen la condición continua del pueblo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: La fórmula profética/mensajera se expresa naturalmente en español con presente solemne. «Así dice» conserva el valor introductorio directo sin forzar un calco del inglés.
- source_word: סַנְחֵרִיב
  english_pob_choice: Sennacherib
  chosen_spanish: Senaquerib
  alternatives_spanish:
  - Sennáquerib
  - Senaquerib
  lexicon: Transliteración tradicional en español
  rationale: Se usa la forma habitual en español bíblico, legible para lectores eclesiales, manteniendo la identidad propia del nombre.
- source_word: מֶ֣לֶךְ אַשּׁ֑וּר
  english_pob_choice: king of Assyria
  chosen_spanish: rey de Asiria
  alternatives_spanish:
  - el rey de Asiria
  lexicon: HALOT
  rationale: La cadena constructa se vierte de manera directa y natural en español. El artículo puede omitirse o añadirse según fluidez; aquí la aposición con el nombre personal hace clara la referencia.
- source_word: עַל מָה
  english_pob_choice: In what
  chosen_spanish: ¿En qué
  alternatives_spanish:
  - ¿Sobre qué?
  - ¿En qué cosa?
  lexicon: HALOT
  rationale: Aunque el hebreo lleva עַל, en español la pregunta sobre el objeto o base de la confianza se expresa con «en qué». Evita la rigidez de «sobre qué» y conserva el sentido de respaldo/confianza.
- source_word: אַתֶּם בֹּטְחִים
  english_pob_choice: are you trusting
  chosen_spanish: confían ustedes
  alternatives_spanish:
  - están confiando ustedes
  - ustedes confían
  lexicon: HALOT
  rationale: בּטח denota confiar/recaer la confianza en algo. En español, el presente simple funciona mejor que un progresivo obligatorio y mantiene la fuerza retórica del interrogante.
- source_word: וְיֹשְׁבִים
  english_pob_choice: that you remain
  chosen_spanish: que permanecen
  alternatives_spanish:
  - y están sentados
  - que están quedándose
  lexicon: HALOT
  rationale: ישב en este contexto militar expresa permanencia o estancia continua. «Permanecen» evita el literalismo de «sentados» y conserva la idea de una condición sostenida.
- source_word: בְּמָצוֹר
  english_pob_choice: under siege
  chosen_spanish: bajo sitio
  alternatives_spanish:
  - asediados
  - en sitio
  lexicon: HALOT
  rationale: «Bajo sitio» transmite el estado militar de cerco de forma idiomática y fiel; «asediados» puede ser una glosa válida, pero aquí la estructura de estado encaja mejor.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: Topónimo bíblico estándar
  rationale: Se conserva el nombre propio geográfico con la preposición normal de ubicación en español.
theological_decisions:
- issue: Matiz de la pregunta retórica sobre confianza
  english_pob_reading: In what are you trusting, that you remain under siege in Jerusalem?
  chosen_spanish_reading: ¿En qué confían ustedes, que permanecen bajo sitio en Jerusalén?
  alternative_spanish_readings:
  - ¿En qué se están apoyando, que permanecen bajo sitio en Jerusalén?
  - ¿En qué ponen su confianza, que permanecen bajo sitio en Jerusalén?
  rationale: 'No hay un problema doctrinal, pero sí un matiz semántico importante: el texto cuestiona el fundamento de la confianza. «Confían» conserva mejor el valor de בּטח que un término más interpretativo como «apoyarse».'
  doctrine_reference: No aplica; observación semántica contextual.
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó «On what» a «In what» para naturalidad sin cambiar el sentido de confianza en la preposición hebrea עַל. La versión española sigue ese ajuste con «¿En qué?», y evita una nota adicional no anclada. Se eliminó cualquier pie de nota no marcado para cumplir la validación.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Senaquerib» se prefiere por uso bíblico español; no se sustituye por una transliteración inglesa.
  - «Bajo sitio» conserva el valor militar de מצור sin cargar un tecnicismo innecesario.
  - La nota [a] está anclada exactamente en el punto de mayor tensión sintáctica y semántica del verso.
