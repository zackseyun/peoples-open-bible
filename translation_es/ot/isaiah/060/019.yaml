  text: לֹא יִֽהְיֶה לָּ֨/ךְ ע֤וֹד הַ/שֶּׁ֨מֶשׁ֙ לְ/א֣וֹר יוֹמָ֔ם וּ/לְ/נֹ֕גַהּ הַ/יָּרֵ֖חַ לֹא יָאִ֣יר לָ֑/ךְ וְ/הָיָה לָ֤/ךְ יְהוָה֙ לְ/א֣וֹר עוֹלָ֔ם וֵ/אלֹהַ֖יִ/ךְ לְ/תִפְאַרְתֵּֽ/ךְ־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/060/019.yaml
  text: The sun will no longer be for you a light by day[a], nor will the moon give light to you for brightness; but Yahweh will be for you an everlasting light[c][b], and your God your glory.
