translation:
  language: es
  text: '¡Ay de mí! Porque he llegado a ser como uno que recoge fruta de verano, como uno que rebusca en la vendimia: no hay racimo para comer, ni primer higo maduro[a] que mi alma desea.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «primer fruto maduro»; probablemente se refiere a un higo temprano apreciado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַ֣לְלַי לִ֗י
  english_pob_choice: Woe is me!
  chosen_spanish: ¡Ay de mí!
  alternatives_spanish:
  - ¡Ay de mí, que...!
  - ¡Ay para mí!
  - ¡Ay, desgraciado de mí!
  lexicon: WLC + POB English audit trail
  rationale: La interjección expresa lamento intenso. En español, «¡Ay de mí!» conserva el valor exclamativo y doliente sin forzar una fórmula demasiado explicativa. Mantiene la fuerza de «Woe is me!» y evita un giro más interpretativo.
- source_word: כִּי הָיִ֨יתִי
  english_pob_choice: For I have become
  chosen_spanish: Porque he llegado a ser
  alternatives_spanish:
  - Porque soy
  - Porque fui
  - Porque me he vuelto
  lexicon: WLC + HALOT
  rationale: El perfecto de היה señala un estado resultante. «He llegado a ser» conserva el matiz de transición y estado presente mejor que un simple presente o pasado.
- source_word: כְּ/אָסְפֵּי קַ֔יִץ
  english_pob_choice: like one gathering summer fruit
  chosen_spanish: como uno que recoge fruta de verano
  alternatives_spanish:
  - como el que recoge fruta de verano
  - como uno recogiendo fruta de verano
  - como quien recoge fruta de verano
  lexicon: HALOT
  rationale: El sustantivo participial sugiere a una persona en acción, no un plural. «Uno que recoge» sigue de cerca la imagen y es natural en español. «Fruta de verano» conserva el sentido agrícola del término, sin precisar más de lo que el hebreo exige.
- source_word: כְ/עֹלְלֹ֖ת בָּצִ֑יר
  english_pob_choice: like one gleaning the grape harvest
  chosen_spanish: como uno que rebusca en la vendimia
  alternatives_spanish:
  - como uno que rebusca las uvas de la vendimia
  - como unas rebuscas de la vendimia
  - como uno que recoge los restos de la vendimia
  lexicon: HALOT
  rationale: עֹלְלוֹת comunica lo que queda tras la cosecha; en español «rebuscar» transmite mejor la idea de recoger lo remanente. «Vendimia» hace explícito el ámbito de la cosecha de uvas, como en la lectura inglesa. Aunque «rebuscas» podría sonar más técnico, «rebusca» es más claro y fluido.
- source_word: אֵין אֶשְׁכּ֣וֹל לֶ/אֱכ֔וֹל
  english_pob_choice: there is no cluster to eat
  chosen_spanish: no hay racimo que comer
  alternatives_spanish:
  - no hay racimo para comer
  - no hay un racimo para comer
  - no hay racimo de uvas que comer
  lexicon: HALOT
  rationale: אֶשְׁכּוֹל es un racimo, especialmente de uvas. «No hay racimo que comer» mantiene la concisión del hebreo y la imagen de escasez. Se evita sobreexplicar con «de uvas» porque el contexto de vendimia ya lo sugiere.
- source_word: בִּכּוּרָ֖ה
  english_pob_choice: first-ripe fig
  chosen_spanish: higo temprano
  alternatives_spanish:
  - higo de primicias
  - primer higo maduro
  - higo precoz
  lexicon: HALOT
  rationale: La POB inglesa opta por identificar el referente probable como higo temprano/principio de madurez. En español, «higo temprano» es claro y natural, preservando la idea de un fruto temprano y apreciado sin imponer una glosa más larga.
- source_word: אִוְּתָ֥ה נַפְשִֽׁי
  english_pob_choice: that my soul desires
  chosen_spanish: que mi alma desea
  alternatives_spanish:
  - que deseo
  - que mi apetito desea
  - que mi alma anhela
  lexicon: HALOT
  rationale: נפש expresa el asiento interior del deseo. «Mi alma desea» mantiene la huella antropológica del hebreo, como en la solución inglesa, sin volverlo demasiado arcaico. Se prefirió «desea» sobre «anhela» para seguir el matiz directo del verbo.
translation_notes:
  revision_awareness: La versión española sigue la revisión inglesa más reciente al mantener los participios en sentido singular («uno que recoge... uno que rebusca...»), en lugar de formas plurales o nominales. También conserva la oposición agrícola entre fruta de verano, vendimia, racimo e higo temprano, porque el paquete fuente y el audit trail muestran que esa imaginería es intencional y no debe diluirse.
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca en este versículo, sino como criterio general del proyecto; aquí no se requiere nombre divino.
  - Se mantuvo «alma» para נֶפֶשׁ, coherente con la POB inglesa y útil para reflejar el deseo interior sin sustituirlo por una paráfrasis psicológica.
  - «Vendimia» se eligió por claridad agrícola y por su equivalencia natural con el contexto de uvas; no se introdujo una terminología eclesiástica ajena al hebreo.
  - Las notas al pie preservan la alternativa semántica de lamento y la identificación contextual del fruto temprano, sin añadir interpretaciones devocionales.
