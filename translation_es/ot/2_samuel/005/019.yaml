review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo: David consulta a Yahvé, pregunta si debe subir contra los filisteos y si Yahvé se los dará en su mano, y recibe una respuesta afirmativa con énfasis de certeza. Se preservan correctamente el nombre divino «Yahvé», la repetición de עלה con «subir/sube» y el modismo de victoria con «en tu mano».'
  spanish_quality_summary: 'El español es claro y digno, pero hay un pequeño problema de alineación entre el texto principal y la nota: la nota alternativa usa «mi poder», mientras el texto principal conserva «mi mano». Dado que la nota inglesa alternativa es sobre «deliver them» y explica el modismo «give into the hand», conviene que la nota española ofrezca una alternativa más cercana al verbo principal («entregar») o al sentido de la frase completa, sin desviar el foco hacia «mano/poder».'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; עלה → «subir/sube» bien conservado; el modismo נתן + בְּיַד se maneja con «entregar ... en la mano», aceptable en español bíblico legible. No hay conflicto con otras directrices mayores.'
  issues:
  - severity: low
    issue: La nota al pie no corresponde bien a la alternativa documentada en el rastro inglés.
    rationale: La nota inglesa ofrece como alternativa «Will you deliver them into my hand?», mientras la española propone «¿Los pondrás en mi poder?». Esa formulación cambia el punto léxico de la alternativa y desplaza el énfasis del verbo al sustantivo idiomático. Es mejor una alternativa como «¿Me los entregarás?» o similar.
  revised_spanish_text: 'David consultó a Yahvé[a], diciendo: «¿Debo subir contra los filisteos? ¿Los entregarás en mi mano?» Yahvé dijo a David: «Sube, porque ciertamente entregaré a los filisteos en tu mano».'
  revised_footnotes:
  - marker: a
    text: O, «¿Me los entregarás?». El hebreo «dar en la mano» suele referirse a conceder victoria sobre un enemigo.
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal, que es fiel y natural. Solo se ajusta la nota para alinearla mejor con la alternativa léxica documentada en inglés y con el modismo hebreo explicado por la propia nota.
