translation:
  language: es
  text: Aquel lugar se llamó el valle de Escol[a][b], por el racimo que los hijos de Israel cortaron de allí[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «wadi de Escol» o «barranco de Escol»; el hebreo naḥal puede designar un cauce estacional o el valle asociado con él.
    reason: lexical_alternative
  - marker: b
    text: Escol suena al término hebreo para «racimo». El lugar recibió ese nombre por el racimo cortado allí por los hijos de Israel.
    reason: cultural_note
  - marker: c
    text: O «los israelitas» o «los hijos de Jacob».
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמָּקוֹם הַהוּא
  english_pob_choice: That place
  chosen_spanish: Aquel lugar
  alternatives_spanish:
  - Ese lugar
  - Aquel sitio
  lexicon: HALOT
  rationale: La forma demostrativa remite a un lugar ya mencionado. «Aquel lugar» conserva la distancia textual del hebreo y suena natural en español.
- source_word: קָרָא
  english_pob_choice: was called
  chosen_spanish: fue llamado
  alternatives_spanish:
  - se llamó
  - lo llamó
  lexicon: HALOT
  rationale: Aunque el hebreo usa una forma activa, aquí funciona como fórmula de nombramiento. El pasivo español refleja bien ese uso idiomático sin forzar un sujeto explícito.
- source_word: נַחַל
  english_pob_choice: Valley
  chosen_spanish: valle
  alternatives_spanish:
  - wadi
  - barranco
  - quebrada
  lexicon: HALOT
  rationale: En este contexto de topónimo, «valle» es la equivalencia más clara y publicable en español. Mantiene el valor geográfico sin el tecnicismo de «wadi».
- source_word: אֶשְׁכּוֹל
  english_pob_choice: Eshcol
  chosen_spanish: Escol
  alternatives_spanish:
  - Eshcol
  - Escol
  lexicon: HALOT
  rationale: Se translitera el nombre propio como «Escol» para adaptarlo a la ortografía española, conservando la referencia al topónimo.
- source_word: עַל אֹדוֹת
  english_pob_choice: because of
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - debido a
  lexicon: HALOT
  rationale: La construcción introduce la razón del nombre. En español, «por» expresa causalidad de manera breve y fiel al sentido.
- source_word: הָאֶשְׁכּוֹל
  english_pob_choice: the cluster
  chosen_spanish: el racimo
  alternatives_spanish:
  - el racimo de uvas
  - el manojo
  lexicon: HALOT
  rationale: «Racimo» comunica de forma natural la idea del grupo de uvas implícito por el contexto inmediato, sin añadir palabras que el verso no trae.
- source_word: אֲשֶׁר כָּרְתוּ
  english_pob_choice: that ... cut
  chosen_spanish: que ... cortaron
  alternatives_spanish:
  - que ... habían cortado
  - que ... arrancaron
  lexicon: HALOT
  rationale: «Cortaron» reproduce el acto de cortar el racimo con el verbo español más directo y adecuado al contexto agrícola.
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - desde allí
  - de ese lugar
  lexicon: HALOT
  rationale: «De allí» conserva la referencia deíctica de manera breve y natural en español.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se mantiene la formulación familiar del hebreo. «Hijos de Israel» es transparente y conserva la textura del original mejor que una simplificación etnónima.
theological_decisions:
- issue: Nombre divino no presente en este versículo
  english_pob_reading: No divine-name issue in the verse
  chosen_spanish_reading: No hay problema de representación del Nombre divino en este versículo
  alternative_spanish_readings:
  - —
  rationale: El texto no contiene יהוה ni κύριος con referencia al Nombre divino, así que no hay ajuste teológico necesario aquí.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 (Source-first transparency)
- issue: Render of Israel ethnonym
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Jacob
  rationale: Se conserva la forma relacional del hebreo para no borrar la textura covenantal/familiar del original. No implica una afirmación doctrinal distinta, solo una preferencia de transparencia textual.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios y que hay alto acuerdo con el control cruzado; por eso esta versión sigue de cerca el sentido fuente sin añadir expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene «hijos de Israel» para coherencia con la preferencia de transparencia del proyecto y con el audit trail inglés.
  - Se usa «Escol» como forma adaptada al español, coherente con la transliteración de nombres propios en el texto principal.
  - Se evita «SEÑOR» porque el versículo no contiene el Nombre divino ni una alusión inmediata que lo exija.
  - «Racimo» se eligió en lugar de una expansión como «racimo de uvas» para no añadir información ajena al verso; la referencia uvas se infiere del contexto inmediato, pero no se explicita en el texto base.
