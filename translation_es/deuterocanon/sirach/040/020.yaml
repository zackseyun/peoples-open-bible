translation:
  language: es
  text: El vino y la bebida fuerte alegran el corazón[a], pero mejor que ambos es el amor de los seres queridos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice: «y por encima de ambos, el amor de la sabiduría». El testimonio hebreo aquí dice «el amor de los seres queridos», y el texto principal sigue el hebreo como fuente primaria donde se conserva.'
    reason: alternative_reading
lexical_decisions:
- source_word: יין
  english_pob_choice: Wine
  chosen_spanish: El vino
  alternatives_spanish:
  - vino
  lexicon: HALOT
  rationale: יין nombra vino de uva; en español 'vino' es el equivalente natural y transparente.
- source_word: שכר
  english_pob_choice: strong drink
  chosen_spanish: la bebida fuerte
  alternatives_spanish:
  - bebida embriagante
  - licor fuerte
  - bebida alcohólica
  lexicon: HALOT
  rationale: שכר designa una bebida intoxicante distinta del vino. 'Bebida fuerte' conserva esa amplitud sin precisar indebidamente una bebida moderna específica.
- source_word: יעליצו
  english_pob_choice: gladden
  chosen_spanish: alegran
  alternatives_spanish:
  - alegran el corazón
  - regocijan
  - llenan de alegría
  lexicon: HALOT
  rationale: El verbo expresa causar alegría; 'alegran' mantiene el sentido causativo con buen español.
- source_word: לב
  english_pob_choice: the heart
  chosen_spanish: el corazón
  alternatives_spanish:
  - el ánimo
  - el interior
  - la mente
  lexicon: HALOT
  rationale: En literatura sapiencial, לב puede abarcar la interioridad. 'Corazón' conserva la imagen bíblica común y es claro en español.
- source_word: ומשניהם
  english_pob_choice: but better than both
  chosen_spanish: y más que ambos
  alternatives_spanish:
  - y más allá de ambos
  - y mejor que ambos
  lexicon: HALOT
  rationale: La expresión comparativa hebrea requiere una formulación natural en español. 'Más que ambos' preserva la superioridad sin añadir interpretación excesiva.
- source_word: אהבת
  english_pob_choice: the love of
  chosen_spanish: el amor de
  alternatives_spanish:
  - amor de
  - el cariño de
  lexicon: HALOT
  rationale: La construcción en estado constructo se refleja bien con 'el amor de', manteniendo la relación sintáctica del hebreo.
- source_word: דודים
  english_pob_choice: beloved ones
  chosen_spanish: los amados
  alternatives_spanish:
  - los amados
  - los queridos
  - los amantes
  lexicon: HALOT
  rationale: דודים puede referirse a personas amadas o al amor entre amados. Dado el ajuste revisado en el POB inglés, 'los amados' conserva el campo relacional sin sexualizar ni restringir de más el sentido.
theological_decisions:
- issue: Divergencia textual entre el hebreo y el griego en la segunda cola
  english_pob_reading: 'The main text follows the Hebrew: ''the love of beloved ones,'' with a footnote noting the Greek ''the love of wisdom.'''
  chosen_spanish_reading: 'El texto principal sigue el hebreo: ''el amor de los amados'', con nota sobre la variante griega ''el amor de la sabiduría''.'
  alternative_spanish_readings:
  - el amor de la sabiduría
  - el amor de los amantes
  rationale: En Sirácida, cuando el hebreo está disponible y es confiable, se le da primacía; el griego se conserva como variante importante para transparencia textual.
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives; use Greek parallel as actual input/check'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que ajustó 'lovers' a 'beloved ones' para reflejar mejor דודים y evitar un sentido demasiado específico. La redacción española adopta esa decisión con 'los amados' y conserva la comparación formal.
  spanish_consistency_notes:
  - Se mantuvo 'vino' y 'bebida fuerte' para seguir la distinción léxica hebrea entre יין y שכר.
  - Se evitó 'Cristo' o terminología cristiana tradicional no presente en el pasaje.
  - Se preservó la tensión textual hebreo/griego mediante nota, sin fusionar las dos lecturas en el cuerpo principal.
  - Se usó 'corazón' por coherencia con el registro sapiencial y con el uso bíblico amplio de לב.
