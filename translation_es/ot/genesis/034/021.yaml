translation:
  language: es
  text: Estos hombres están en paz con nosotros[a]. Que habiten en la tierra y comercien[c] en ella, porque he aquí[d], la tierra es amplia[b] ante ellos. Tomaremos para nosotros a sus hijas por esposas, y les daremos nuestras hijas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «amistosos con nosotros» / «en buenos términos con nosotros» para שְׁלֵמִים.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «la tierra—he aquí—es ancha de manos delante de ellos», un modismo que significa que la tierra es espaciosa o tiene sitio de sobra para ellos.'
    reason: cultural_note
  - marker: c
    text: O «comercien por ella»; el hebreo puede denotar actividad comercial dentro de la tierra o a través de su territorio.
    reason: lexical_alternative
  - marker: d
    text: O «porque, he aquí, la tierra».
    reason: previous_rendering
lexical_decisions:
- source_word: שְׁלֵמִים
  english_pob_choice: at peace
  chosen_spanish: están en paz
  alternatives_spanish:
  - son amistosos
  - están en buenos términos
  - están en paz con nosotros
  lexicon: HALOT
  rationale: El adjetivo comunica una relación pacífica o íntegra con el grupo de referencia. «Están en paz con nosotros» conserva el sentido relacional y suena natural en español bíblico contemporáneo.
- source_word: וְיֵשְׁבוּ
  english_pob_choice: Let them dwell
  chosen_spanish: Que habiten
  alternatives_spanish:
  - y que vivan
  - y que se establezcan
  - que residan
  lexicon: HALOT
  rationale: En este contexto exhortativo, el imperfecto funciona como permiso/propuesta. «Que habiten» retiene la formalidad y el sentido de asentarse en el territorio.
- source_word: וְיִסְחֲרוּ
  english_pob_choice: trade
  chosen_spanish: trafiquen
  alternatives_spanish:
  - comercien
  - hagan negocio
  - realicen comercio
  lexicon: HALOT
  rationale: El verbo puede referirse a actividad comercial. «Traficar» en español clásico/bíblico aún puede expresar comercio; sin embargo, se eligió con cautela por su fuerza léxica. En contexto, indica transacciones comerciales en la tierra.
- source_word: אֹתָהּ
  english_pob_choice: in it
  chosen_spanish: en ella
  alternatives_spanish:
  - por ella
  - a través de ella
  - dentro de ella
  lexicon: HALOT
  rationale: El pronombre femenino remite a «la tierra». «En ella» mantiene la referencia explícita a la tierra como esfera de comercio sin sobreinterpretar el movimiento.
- source_word: רַחֲבַת יָדַיִם
  english_pob_choice: wide enough
  chosen_spanish: bastante ancha
  alternatives_spanish:
  - espaciosa
  - de amplitud suficiente
  - ancha y holgada
  lexicon: HALOT
  rationale: La expresión idiomática literalmente dice «ancha de manos» y comunica amplitud/espacio suficiente. «Bastante ancha» da el sentido idiomático de manera clara y sobria.
- source_word: לִפְנֵיהֶם
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante ellos
  - a su disposición
  - frente a ellos
  lexicon: HALOT
  rationale: «Delante de ellos» conserva la imagen espacial del hebreo y evita reducir demasiado pronto el matiz a mera disponibilidad, aunque ese sea el efecto pragmático.
- source_word: נִקַּח לָנוּ לְנָשִׁים
  english_pob_choice: We will take their daughters for ourselves as wives
  chosen_spanish: Tomaremos para nosotros a sus hijas por esposas
  alternatives_spanish:
  - tomaremos sus hijas para nosotros como esposas
  - tomaremos a sus hijas como esposas para nosotros
  - tomaremos sus hijas por mujeres
  lexicon: HALOT
  rationale: Se conserva la fórmula matrimonial hebrea con «por esposas». «Para nosotros» reproduce לָנוּ y mantiene el tono deliberativo del discurso.
- source_word: נִתֵּן לָהֶם
  english_pob_choice: we will give our daughters to them
  chosen_spanish: daremos nuestras hijas a ellos
  alternatives_spanish:
  - les daremos nuestras hijas
  - entregaremos nuestras hijas a ellos
  lexicon: HALOT
  rationale: La cláusula refleja el intercambio matrimonial recíproco. «Daremos nuestras hijas a ellos» conserva la estructura paralela del hebreo.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - he aquí
  - mira bien
  - fíjate
  lexicon: HALOT
  rationale: La partícula llama la atención sobre el motivo. «Mira» es una forma natural de conservar la fuerza discursiva sin arcaísmo excesivo.
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca el texto hebreo y el audit trail inglés: conserva el valor relacional de שְׁלֵמִים, el matiz exhortativo de los imperfectos, el modismo espacial de רַחֲבַת יָדַיִם / לִפְנֵיהֶם y la fórmula matrimonial paralela. También incorpora la revisión inglesa que prefirió una construcción más formal para הִנֵּה, aunque en español se optó por «mira» por naturalidad y claridad.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un título divino.
  - «Esposas» se usó para לְנָשִׁים siguiendo la idiomaticidad matrimonial del hebreo; no se sustituyó por un término más eclesiástico.
  - «Trafiquen» conserva el campo comercial del verbo, aunque en español puede sonar menos neutral que «comercien»; la nota explica la alternativa.
  - Se preservó el paralelismo entre «sus hijas» y «nuestras hijas» sin suavizar la proposición de intercambio familiar.
