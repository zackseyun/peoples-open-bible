translation:
  language: es
  text: Yo soy Yahvé, su Dios, que los saqué de la tierra de Egipto para ser su Dios[a]. Yo soy Yahvé, su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «para ser Dios para ustedes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El nombre divino יְהוָה se conserva como nombre propio en español con la forma 'Yahvé', siguiendo el principio del POB de no sustituirlo por un título. 'Yahvé' es la forma española estable y legible para el Tetragrámaton.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - tu Dios
  - sus dioses
  lexicon: HALOT
  rationale: La forma hebrea es plural morfológicamente, pero en contexto es singular y covenantal. En español, 'su Dios' expresa mejor el sentido colectivo dirigido a Israel; se evita 'sus dioses', que falsearía el referente.
- source_word: אֲשֶׁר
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - quien
  - el cual
  lexicon: HALOT
  rationale: El relativo funciona aquí como enlace natural a 'Yahvé, su Dios'. En español, 'que' es la opción más fluida y fiel; 'quien' sería posible pero más marcado.
- source_word: הוֹצֵאתִי
  english_pob_choice: brought ... out
  chosen_spanish: saqué
  alternatives_spanish:
  - los hice salir
  - los traje fuera
  lexicon: HALOT
  rationale: El Hifil de יצא tiene fuerza causativa ('hacer salir / sacar'). 'Saqué' reproduce de modo idiomático y directo la fórmula del éxodo sin perder el matiz causal.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: out of the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - fuera de Egipto
  - de Egipto
  lexicon: HALOT
  rationale: '''Tierra'' conserva el valor de אֶרֶץ y la cadencia formal del hebreo. ''De la tierra de Egipto'' mantiene la fórmula del éxodo sin volverla más coloquial de lo que el texto warrants.'
- source_word: לִהְיוֹת לָכֶם לֵאלֹהִים
  english_pob_choice: to be your God
  chosen_spanish: para ser su Dios
  alternatives_spanish:
  - para ser Dios para ustedes
  - para serles Dios
  lexicon: HALOT
  rationale: La construcción expresa finalidad/resultado de pacto. 'Para ser su Dios' conserva la relación de pertenencia y la dirección del pacto; 'para ser Dios para ustedes' explicita demasiado lo que el español puede decir de forma más natural.
- source_word: אֲנִי
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Yo
  - Yo mismo soy
  lexicon: HALOT
  rationale: El hebreo es una cláusula copulativa elíptica; en español se requiere el verbo 'ser'. 'Yo soy' mantiene el énfasis y la solemnidad del original.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio del pacto en lugar de un sustituto titular. 'Yahvé' coincide con la política de traducción del POB y evita ocultar el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fórmula de pacto לִהְיוֹת לָכֶם לֵאלֹהִים
  english_pob_reading: to be your God
  chosen_spanish_reading: para ser su Dios
  alternative_spanish_readings:
  - para ser Dios para ustedes
  - para serles Dios
  rationale: La frase no describe solo deidad abstracta, sino relación de alianza. 'Para ser su Dios' conserva la fuerza teológica y el carácter relacional del pacto sin sonar arcaico.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve theological weight without archaic phrasing'
translation_notes:
  revision_awareness: El pasaje muestra concordancia alta con la auditoría inglesa y no requiere revisiones doctrinales. Se mantuvo el valor de pacto de לִהְיוֹת לָכֶם לֵאלֹהִים sin añadir paráfrasis, y se preservó el nombre divino con la forma española estable 'Yahvé'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה.
  - Se traduce אֱלֹהֵיכֶם como 'su Dios' para reflejar el singular referencial del hebreo.
  - La nota al pie marca la alternativa semántica del infinitivo constructo sin duplicar el sentido en el cuerpo del texto.
  - La puntuación y el tratamiento de mayúsculas siguen el español bíblico moderno y la lectura pública en español.
