translation:
  language: es
  text: Quédense quietos[a] y sepan que yo soy Dios. Seré exaltado entre las naciones[b]; seré exaltado en la tierra[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cesad» o «Soltad»; el imperativo hebreo puede significar aflojar, detenerse o soltar el control.
    reason: lexical_alternative
  - marker: b
    text: O «soy exaltado» / «seré levantado»; la forma hebrea puede leerse con fuerza presente o futura según el contexto.
    reason: alternative_reading
  - marker: c
    text: «Tierra» también podría traducirse «país», pero el alcance más amplio del salmo favorece el sentido universal.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַרְפּוּ
  english_pob_choice: Be still
  chosen_spanish: ¡Deteneos!
  alternatives_spanish:
  - Estad quietos
  - Cesad
  - Soltad
  lexicon: HALOT
  rationale: El verbo hebreo expresa aflojar, dejar ir o cesar. En español, «Deteneos» comunica la idea de dejar la actividad o resistencia en un mandato directo y digno, sin volverlo meramente contemplativo. Mantiene la tensión entre cese de esfuerzo y rendición ante la soberanía divina.
- source_word: וּדְעוּ
  english_pob_choice: and know
  chosen_spanish: y sabed
  alternatives_spanish:
  - y conoced
  - y reconoced
  - y entended
  lexicon: HALOT
  rationale: ידע conserva el valor básico de conocer, con matiz de reconocer. «Sabed» reproduce bien el imperativo bíblico en un registro natural y solemne, y deja abierta la dimensión cognitiva y relacional.
- source_word: אָנֹכִי אֱלֹהִים
  english_pob_choice: I am God
  chosen_spanish: yo soy Dios
  alternatives_spanish:
  - yo soy Dios mismo
  - yo soy Dios en verdad
  lexicon: HALOT
  rationale: 'La combinación es enfática en hebreo, pero en español el orden natural con pronombre explícito mantiene bien la fuerza: «yo soy Dios». No se añadió intensificador para no sobretraducir.'
- source_word: אָרוּם
  english_pob_choice: I will be exalted
  chosen_spanish: seré exaltado
  alternatives_spanish:
  - soy exaltado
  - seré enaltecido
  - seré levantado
  lexicon: HALOT
  rationale: El imperfecto hebreo expresa una certeza futura o una acción segura. «Seré exaltado» conserva ese valor y el campo semántico de רום en un registro poético y teológicamente adecuado.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - en medio de las naciones
  lexicon: HALOT
  rationale: גוֹיִם designa a las naciones como colectividades; «entre las naciones» es la forma más clara y natural en español para el alcance universal del verso.
- source_word: בָּאָרֶץ
  english_pob_choice: in the earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en la tierra misma
  - sobre la tierra
  - en el país
  lexicon: HALOT
  rationale: אֶרֶץ puede significar tierra o país, pero el paralelismo con «las naciones» favorece el sentido amplio de la tierra como ámbito universal. «En la tierra» preserva ese alcance sin sonar forzado.
theological_decisions:
- issue: Fuerza del imperativo inicial הַרְפּוּ
  english_pob_reading: A call to cease striving and submit to God's sovereignty, rendered 'Be still'
  chosen_spanish_reading: Un llamado a cesar la resistencia o la actividad desafiante y someterse a la soberanía de Dios, rendido como «Deteneos»
  alternative_spanish_readings:
  - Quedaos quietos
  - Cesad
  - Soltad
  rationale: 'El hebreo permite más de una inflexión: cese de esfuerzo, aflojar el control o detener la oposición. «Deteneos» conserva la amplitud del mandato sin reducirlo a mera quietud interior ni a un solo contexto militar.'
  doctrine_reference: Translation philosophy §3, preservar la tensión teológica en lugar de resolverla
- issue: Valor aspectual de אָרוּם
  english_pob_reading: '''I will be exalted'' with possible present force in context'
  chosen_spanish_reading: «Seré exaltado» como futuro de certeza, con posibilidad implícita de presente resultativo
  alternative_spanish_readings:
  - Soy exaltado
  - Seré enaltecido
  - He de ser exaltado
  rationale: El hebreo admite una lectura de futuro seguro o de realidad declarada. El español futuro mantiene la proclamación y no elimina la posibilidad de un sentido actual-constatativo en el contexto poético.
  doctrine_reference: HALOT; parallelismo poético en Salmos 46:11
- issue: Alcance universal de גּוֹיִם y אֶרֶץ
  english_pob_reading: 'Global scope: ''among the nations'' / ''in the earth'''
  chosen_spanish_reading: «entre las naciones» / «en la tierra»
  alternative_spanish_readings:
  - entre los pueblos / en el mundo
  - entre las naciones / en la tierra
  rationale: La pareja poética apunta a una afirmación de supremacía divina de alcance universal. «Tierra» mantiene el paralelismo con «naciones» y evita estrechar el sentido a una sola región o nación.
  doctrine_reference: Salmos 46:10-11; soberanía universal de Dios
translation_notes:
  revision_awareness: No se detectaron cambios sustanciales en la revisión más reciente; la versión inglesa auditada y el cotejo cruzado muestran alta concordancia, así que la propuesta española conserva la lectura óptima-equivalente sin introducir novedades no respaldadas por el fuente.
  spanish_consistency_notes:
  - Se mantuvo el tratamiento reverente en segunda persona plural («Deteneos») para reflejar el plural hebreo.
  - Se prefirió «tierra» sobre «país» por el paralelismo con «las naciones» y el alcance universal del versículo.
  - Se evitó «SEÑOR» para el nombre divino porque en este verso aparece אֱלֹהִים, que corresponde a «Dios».
