review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura básica del hebreo: traen el arca de Yahvé, la colocan en su lugar dentro de la tienda preparada por David, y David ofrece holocaustos y sacrificios de paz delante de Yahvé. Sin embargo, hay dos desajustes relevantes: (1) la nota al pie [a] está anclada en ''su lugar'' pero comenta שְׁלָמִים, por lo que no corresponde al punto léxico señalado por la evidencia inglesa; (2) ''que David le había extendido'' es gramaticalmente posible, pero en español suena poco natural para una tienda y no refleja tan claramente el sentido contextual de נטה con tienda como ''había levantado/instalado/preparado para ella''.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero 'le había extendido' resulta extraño en español eclesial general; 'había levantado para ella' o 'había instalado para ella' lee mejor y conserva el sentido. También conviene mover la nota [a] a 'sacrificios de paz[a]' para que el lector entienda la alternativa léxica donde corresponde.
  glossary_alignment: Alinea bien con la terminología del proyecto en 'Yahvé', 'arca', 'holocaustos' y 'sacrificios de paz'. No hay conflicto doctrinal. La única corrección de glosario/edición es ubicar correctamente la nota léxica de שְׁלָמִים y mejorar la formulación de נטה con 'tienda'.
  issues:
  - severity: medium
    issue: La nota [a] está colocada sobre 'su lugar' pero explica שְׁלָמִים.
    rationale: Esto rompe la trazabilidad del aparato crítico y puede confundir al lector, ya que el marcador debe aparecer en la palabra o frase relevante.
  - severity: medium
    issue: '''que David le había extendido'' suena poco natural en español para una tienda.'
    rationale: Aunque נטה literalmente puede ser 'extender', con אוהל en contexto narrativo suele equivaler a 'levantar/instalar/pitch a tent'. La redacción actual es forzada y menos inteligible que una opción idiomática fiel.
  revised_spanish_text: Trajeron el arca de Yahvé y la colocaron en su lugar, dentro de la tienda que David había levantado para ella. Y David ofreció holocaustos y sacrificios de paz[a] delante de Yahvé.
  revised_footnotes:
  - marker: a
    text: O 'sacrificios de comunión' u 'ofrendas de bienestar' para el hebreo שְׁלָמִים.
    reason: lexical_alternative
  revision_rationale: Se reubica la nota al término correcto ('sacrificios de paz') para mantener coherencia con la evidencia y la práctica editorial. Se sustituye 'le había extendido' por 'había levantado para ella', que expresa de manera más natural en español el sentido de נטה aplicado a una tienda, sin perder la referencia al arca.
