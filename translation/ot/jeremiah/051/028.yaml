theological_decisions:
- issue: Referent shift in pronominal suffixes
  chosen_reading: Retain 'her' for Media in 'her governors' and 'her prefects,' but 'his' in 'his dominion' as in the Hebrew text.
  alternative_readings:
  - Regularize all suffixes to one referent in English
  - Read the final suffix as referring collectively to Media and translate 'their dominion'
  rationale: The Hebrew presents feminine suffixes with the administrative officers and then a masculine singular suffix with 'dominion.' Rather than smoothing the text, the translation preserves the source-level tension. The final masculine may point to the king of Media as representative head, or function as a collective/political singular. Keeping the shift is more auditable and textually faithful.
  doctrine_reference: Translation philosophy §3, §5
