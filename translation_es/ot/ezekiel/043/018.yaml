revisions:
- from: 'Y me dijo[a]: «Hijo de hombre, así dice Adonay Yahvé: Estas son las normas del altar el día en que se haga[b], para ofrecer sobre él holocaustos y para derramar sangre sobre él[c]».'
  to: 'Y me dijo: «Hijo de hombre, así dice el Señor Yahvé: Estos son los estatutos del altar el día en que sea hecho[a], para ofrecer sobre él holocaustos[b] y para rociar sangre sobre él[c]».'
  rationale: 'Se corrigen dos problemas de fidelidad principales: la mala asignación de notas y la traducción de זָרַק דָּם. También se mejora la naturalidad y el registro con «el Señor Yahvé» y «estatutos», sin abandonar la política del proyecto de usar «Yahvé» para el nombre divino. Se conserva «Hijo de hombre» y «holocaustos», y se restauran las alternativas documentadas en notas con anclajes correctos.'
  reviewer_model: gpt-5.4
