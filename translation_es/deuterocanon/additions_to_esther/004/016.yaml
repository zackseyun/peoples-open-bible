translation:
  language: es
  text: Y el rey estaba turbado[a], y todos sus asistentes la consolaban[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «perturbado». El griego ἐταράσσετο también puede expresar estar agitado o alarmado, pero «turbado» conserva bien la idea de inquietud interior.
    reason: lexical_alternative
  - marker: b
    text: O «todo su séquito la animaba». El griego παρακαλέω puede denotar consolar, animar o alentar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐταράσσετο
  english_pob_choice: was troubled
  chosen_spanish: estaba turbado
  alternatives_spanish:
  - estaba perturbado
  - estaba agitado
  - estaba alarmado
  lexicon: BDAG
  rationale: El imperfecto expresa un estado continuo de perturbación interior. «Estaba turbado» conserva ese matiz de inquietud sin añadir una intensidad que el griego no exige.
- source_word: πᾶσα ἡ θεραπεία αὐτοῦ
  english_pob_choice: all his attendants
  chosen_spanish: todo su séquito
  alternatives_spanish:
  - todos sus asistentes
  - toda su servidumbre
  - toda su corte
  lexicon: LSJ
  rationale: En contexto de corte real, θεραπεία designa al conjunto de los que están al servicio o en torno al rey. «Séquito» mantiene el sentido colectivo y resulta natural en español; «todo» conserva el carácter global de πᾶσα.
- source_word: παρεκάλει
  english_pob_choice: were comforting her
  chosen_spanish: lo consolaba
  alternatives_spanish:
  - la consolaban
  - lo animaba
  - la animaban
  lexicon: BDAG
  rationale: El verbo puede significar confortar, animar o exhortar. El contexto revisado en el audit trail favorece «consolar/comfortar» más que «urgir»; se eligió «lo consolaba» por concordar con el referente masculino inmediato «el rey» y mantener la lectura revisada de apoyo o alivio.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail, que corrigió la idea de «urgir» a «confortar/animar» para reflejar mejor παρεκάλει αὐτήν. También se mantuvieron las decisiones consistentes de «was troubled» y «attendants», pero se adaptaron a un español natural con «estaba turbado» y «séquito».
  spanish_consistency_notes:
  - Se mantuvo el registro sobrio y cortesano adecuado para Esther.
  - Se evitó «SEÑOR» u այլ sustituciones porque el texto no contiene el nombre divino ni un título teológico relevante.
  - Se optó por «séquito» en lugar de «corte» para preservar el matiz de grupo en torno al rey sin exagerar la institución.
