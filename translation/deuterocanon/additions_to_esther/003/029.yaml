id: ESG.3.29
reference: Additions to Esther 3:29
source:
  edition: lxx-swete-1909
  text: ὁ θεὸς ὁ ἰσχύων ἐπὶ πάντας, εἰσάκουσον φωνὴν ἀπηλπισμένων καὶ ῥῦσαι ἡμᾶς ἐκ χειρὸς τῶν πονηρευομένων, καὶ ῥῦσαί με ἐκ τοῦ φόβου μου.
  language: Greek
