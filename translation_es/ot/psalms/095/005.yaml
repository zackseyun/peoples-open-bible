translation:
  language: es
  text: El mar es suyo[a], porque él lo hizo[b]; y sus manos formaron la tierra seca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «le pertenece». El hebreo literalmente dice: «que/a él [es] el mar».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y él lo hizo». La conjunción hebrea es formalmente «y», aunque aquí probablemente expresa la relación causal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר לּוֹ
  english_pob_choice: is his
  chosen_spanish: es suyo
  alternatives_spanish:
  - le pertenece
  - es de él
  lexicon: HALOT
  rationale: 'La construcción hebrea expresa posesión: literalmente, «que/le es el mar». En español, «es suyo» comunica con naturalidad la pertenencia sin perder la fuerza posesiva del hebreo.'
- source_word: הַיָּם
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el océano
  lexicon: HALOT
  rationale: El sustantivo hebreo corresponde a «mar». «Océano» sería más interpretativo y menos directo.
- source_word: וְהוּא
  english_pob_choice: for he
  chosen_spanish: porque él
  alternatives_spanish:
  - y él
  - pues él
  lexicon: HALOT
  rationale: 'Aunque el hebreo trae literalmente «y él», el contexto causal hace claro que la frase explica por qué el mar es suyo: porque él lo hizo. «Porque él» conserva esa relación sin introducir más contenido del que el texto permite.'
- source_word: עָשָׂהוּ
  english_pob_choice: made it
  chosen_spanish: lo hizo
  alternatives_spanish:
  - lo creó
  - lo formó
  lexicon: HALOT
  rationale: עָשָׂה significa «hacer». En español, «lo hizo» mantiene el verbo genérico del hebreo y evita sustituirlo por un término más específico que pudiera borrar el contraste con «formaron» al final del versículo.
- source_word: וְיַבֶּשֶׁת
  english_pob_choice: the dry land
  chosen_spanish: la tierra seca
  alternatives_spanish:
  - la tierra firme
  - el seco terreno
  lexicon: HALOT
  rationale: יַבֶּשֶׁת designa la tierra seca en contraste con el mar. «La tierra seca» conserva ese contraste de manera clara y fiel.
- source_word: יָדָיו
  english_pob_choice: his hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - su mano
  lexicon: HALOT
  rationale: El plural hebreo se mantiene como plural en español. Es una imagen antropomórfica poética que conviene conservar.
- source_word: יָצָרוּ
  english_pob_choice: formed
  chosen_spanish: formaron
  alternatives_spanish:
  - moldearon
  - dieron forma a
  lexicon: HALOT
  rationale: יצר expresa formar con intención. «Formaron» preserva la distinción léxica respecto de עשה («hizo») y mantiene el paralelismo poético.
theological_decisions:
- issue: Antropomorfismo divino en «sus manos»
  english_pob_reading: Retain 'his hands formed' as poetic anthropomorphism
  chosen_spanish_reading: Conservar «sus manos formaron» como antropomorfismo poético
  alternative_spanish_readings:
  - Él formó
  - su poder formó
  rationale: El hebreo atribuye la formación a las «manos» de Dios. La traducción conserva la imagen, porque forma parte de la poesía y no requiere suavización doctrinal.
  doctrine_reference: Translation philosophy §1, §6
- issue: Distinción entre עשה y יצר
  english_pob_reading: 'Render with two different English verbs: ''made'' and ''formed'''
  chosen_spanish_reading: Distinguir «hizo» y «formaron»
  alternative_spanish_readings:
  - lo hizo... lo hizo
  - lo formó... formaron
  rationale: Mantener dos verbos distintos refleja la variación del hebreo y su paralelismo. En español también evita aplanar el texto.
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y la decisión auditada de la POB inglesa de conservar la posesión, la causalidad implícita y la distinción entre los verbos de crear/formar, adaptándolos a un español natural y publicable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino explícito.
  - Se conserva el paralelismo entre «hizo» y «formaron» para no borrar la distinción léxica del original.
  - «Mar» se prefirió frente a «océano» por ser más directo y bíblicamente estable.
  - Se mantuvo el antropomorfismo de «sus manos» por fidelidad poética.
