translation:
  language: es
  text: '¡Ay del que contiende con su Hacedor, un tiesto entre los tiestos de la tierra! ¿Acaso el barro dirá al que lo forma: «¿Qué estás haciendo?» o tu obra[a]: «No tiene manos»?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «No tiene asas», si la cláusula final se toma como una crítica del producto a la forma del recipiente más que a la competencia del que lo hizo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay!
  alternatives_spanish:
  - ¡Ay de!
  - ¡Ay del que...!
  lexicon: HALOT
  rationale: La interjección profética expresa lamento y advertencia. En español, «¡Ay!» conserva mejor el tono oracular que un calco más rígido.
- source_word: רָב אֶת יֹצְרוֹ
  english_pob_choice: the one who contends with his Maker
  chosen_spanish: el que contiende con su Hacedor
  alternatives_spanish:
  - el que disputa con su Hacedor
  - el que pelea con su Hacedor
  lexicon: HALOT
  rationale: רָב expresa contienda o disputa, no simple conflicto físico. «Contiende» mantiene el carácter forense y reverente del contraste Creador-criatura. «Hacedor» traduce יֹצֵר con una forma idiomática en español y conserva la idea de formar.
- source_word: חֶרֶשׂ
  english_pob_choice: a potsherd
  chosen_spanish: un tiesto
  alternatives_spanish:
  - un pedazo de barro
  - un fragmento de cerámica
  lexicon: HALOT
  rationale: El término hebreo designa un fragmento de vasija. «Tiesto» es natural en español bíblico y comunica la pequeñez y fragilidad del objeto.
- source_word: אֶת חַרְשֵׂי אֲדָמָה
  english_pob_choice: among the potsherds of the earth
  chosen_spanish: entre los tiestos de la tierra
  alternatives_spanish:
  - entre los fragmentos de la tierra
  - entre los tiestos del suelo
  lexicon: HALOT
  rationale: 'La frase es elíptica; el sentido es comparativo: un fragmento entre otros fragmentos terrestres. «Entre» hace explícita la comparación sin añadir más de lo necesario. «Tierra» conserva la materialidad de אֲדָמָה.'
- source_word: הֲיֹאמַר חֹמֶר לְיֹצְרוֹ
  english_pob_choice: Shall the clay say to the one who forms it
  chosen_spanish: ¿Acaso el barro dirá al que lo forma?
  alternatives_spanish:
  - ¿Dirá el barro al que lo forma?
  - ¿Acaso dirá el barro a su alfarero?
  lexicon: HALOT
  rationale: חֹמֶר aquí corresponde al material del alfarero; «barro» es claro y natural en español. «Al que lo forma» sigue de cerca el participio y evita fijar de más la imagen en «alfarero».
- source_word: מַה תַּעֲשֶׂה
  english_pob_choice: What are you making?
  chosen_spanish: ¿Qué haces?
  alternatives_spanish:
  - ¿Qué estás haciendo?
  - ¿Qué haces tú?
  lexicon: HALOT
  rationale: עָשָׂה puede significar hacer o hacer/forjar una pieza. En español, dentro del diálogo breve, «¿Qué haces?» suena natural y preserva la reprensión.
- source_word: וּפָעָלְךָ
  english_pob_choice: or your work
  chosen_spanish: o tu obra
  alternatives_spanish:
  - o tu trabajo
  - o lo que has hecho
  lexicon: HALOT
  rationale: פָּעַל puede referirse al producto hecho. «Obra» mantiene el paralelismo con el barro formado y el tono elevado del pasaje, sin perder la ambigüedad entre acto y resultado.
- source_word: אֵין יָדַיִם לוֹ
  english_pob_choice: He has no hands
  chosen_spanish: No tiene manos
  alternatives_spanish:
  - No tiene asas
  - No tiene habilidad
  lexicon: HALOT
  rationale: La lectura priorizada en el POB inglés entiende יָדַיִם como «hands», es decir, capacidad/aptitud del que forma. «Manos» conserva la ofensa al Hacedor y la tensión retórica. La alternativa «asas» queda reflejada en la nota.
theological_decisions:
- issue: Insulto al Hacedor mediante la cláusula final
  english_pob_reading: The formed object says of its maker, 'He has no hands'
  chosen_spanish_reading: 'La obra dice de su Hacedor: «No tiene manos»'
  alternative_spanish_readings:
  - 'La vasija dice: «No tiene asas»'
  - 'La obra dice: «No tiene habilidad»'
  rationale: La lectura principal mantiene el reproche directo a la competencia del Hacedor, que encaja con el flujo retórico del pasaje. No se resuelve la tensión del hebreo por vía interpretativa; se conserva la posibilidad material alternativa en nota, como hizo el POB inglés.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se siguió la revisión más reciente sin cambios sustantivos; el texto español conserva la decisión auditable del POB inglés respecto de la cláusula final ambigua y refleja la misma preferencia por la fuerza retórica del pasaje.
  spanish_consistency_notes:
  - Se mantuvo el registro profético solemne pero natural en español.
  - «Hacedor» se usa para יֹצֵר por coherencia con la imagen creador-criatura y para evitar una repetición excesivamente técnica de «el que forma».
  - «Tiesto» y «barro» preservan la imaginería artesanal sin sonar arcaizantes en exceso.
  - La nota al pie ancla la alternativa léxica principal del cierre, tal como exige el auditable del POB.
