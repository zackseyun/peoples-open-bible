- from: Y sus enemigos planearon invadir su tierra, para destruir su tierra y extender sus manos contra sus lugares santos[a].
  to: Y sus enemigos planearon invadir su tierra, para destruir su tierra y alzar la mano contra sus lugares santos[a].
  rationale: Se reemplaza «extender sus manos contra» por «alzar la mano contra» para reflejar con español natural el modismo griego de acción hostil, manteniendo la imagen figurada. Se conserva «lugares santos» con su nota porque preserva el plural de τὰ ἅγια según la decisión documentada en el POB.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:54:58Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego y el audit trail inglés: «planearon», «invadir», la repetición de «tierra», el propósito «para destruir», y la nota sobre τὰ ἅγια en plural están bien encaminados. Sin embargo, «extender sus manos contra» suena poco idiomático en español bíblico moderno; el griego conserva la imagen de acción hostil, y «alzar la mano contra» la transmite con mayor naturalidad y claridad.'
  spanish_quality_summary: El texto es claro y fiel en general, pero requiere un ajuste de naturalidad idiomática. «Lugares santos» es aceptable para preservar el plural de τὰ ἅγια, aunque algo rígido; aun así, con la nota léxica, funciona. El principal problema de legibilidad es «extender sus manos contra», que resulta calcado.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, Cristo, esclavo, etc. La decisión sobre τὰ ἅγια respeta la documentación del POB al mantener el plural y ofrecer alternativas en nota.
  issues:
  - severity: medium
    issue: «extender sus manos contra» es un calco poco natural
    rationale: Para ἐκτεῖναι τὰς χεῖρας ἐπὶ, el borrador conserva demasiado literalmente la imagen griega. En español, «alzar la mano contra» o «levantar la mano contra» expresa mejor la hostilidad y mantiene la metáfora sin sonar forzado.
  revised_spanish_text: Y sus enemigos planearon invadir su tierra, para destruir su tierra y alzar la mano contra sus lugares santos[a].
  revised_footnotes:
  - marker: a
    text: O «su santuario» o «sus cosas santas» para «sus lugares santos»; el griego usa el plural τὰ ἅγια.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «extender sus manos contra» por «alzar la mano contra» para reflejar con español natural el modismo griego de acción hostil, manteniendo la imagen figurada. Se conserva «lugares santos» con su nota porque preserva el plural de τὰ ἅγια según la decisión documentada en el POB.
