translation:
  language: es
  text: Entonces tomarás toda la grasa que cubre las entrañas, el lóbulo del hígado[a], los dos riñones y la grasa que está sobre ellos, y los quemarás sobre el altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el lóbulo sobre el hígado». El término hebreo señala una parte específica unida al hígado, pero su identificación anatómica exacta es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָֽקַחְתָּ
  english_pob_choice: you shall take
  chosen_spanish: tomarás
  alternatives_spanish:
  - deberás tomar
  - habrás de tomar
  lexicon: HALOT
  rationale: En una instrucción ritual, el perfecto con waw funciona como mandato secuencial. «Tomarás» conserva el valor directivo sin sonar forzado en español bíblico contemporáneo.
- source_word: כָּל הַחֵלֶב
  english_pob_choice: all the fat
  chosen_spanish: toda la grasa
  alternatives_spanish:
  - todo el sebo
  - toda la gordura
  lexicon: HALOT
  rationale: חֵלֶב designa la porción grasa del animal sacrificial; «grasa» es claro y natural en español. «Sebo» sería más técnico y menos transparente para lectura pública.
- source_word: הַמְכַסֶּה אֶת הַקֶּרֶב
  english_pob_choice: that covers the entrails
  chosen_spanish: que cubre las entrañas
  alternatives_spanish:
  - que cubre los intestinos
  - que cubre las vísceras
  lexicon: HALOT
  rationale: קֶרֶב apunta al interior visceral del animal. «Entrañas» mantiene concreción sacrificial y corresponde bien al idioma bíblico en español sin perder inteligibilidad.
- source_word: הַיֹּתֶרֶת עַל הַכָּבֵד
  english_pob_choice: the lobe on the liver
  chosen_spanish: el lóbulo sobre el hígado
  alternatives_spanish:
  - el lóbulo del hígado
  - la porción sobre el hígado
  lexicon: HALOT
  rationale: El inglés POB opta por «lobe» para la parte anatómica incierta; en español, «lóbulo» comunica mejor esa forma sin afirmar más de lo que el hebreo permite. Se mantiene «sobre» para reflejar עַל.
- source_word: שְׁתֵּי הַכְּלָיֹת
  english_pob_choice: the two kidneys
  chosen_spanish: los dos riñones
  alternatives_spanish:
  - las dos vísceras renales
  lexicon: HALOT
  rationale: El equivalente directo y estándar de כְּלָיוֹת es «riñones». En español, el plural con numeral es más natural que una construcción más técnica.
- source_word: הַחֵלֶב אֲשֶׁר עֲלֵיהֶן
  english_pob_choice: the fat that is on them
  chosen_spanish: la grasa que está sobre ellos
  alternatives_spanish:
  - la grasa que está encima de ellos
  - la grasa que está sobre las mismas
  lexicon: HALOT
  rationale: Se conserva la relación espacial de עֲלֵיהֶן con «sobre ellos», evitando reinterpretar la frase como «alrededor de». La referencia vuelve a los riñones en español por concordancia natural.
- source_word: הִקְטַרְתָּ
  english_pob_choice: you shall burn them
  chosen_spanish: los quemarás
  alternatives_spanish:
  - los ofrecerás en humo
  - los harás arder
  lexicon: HALOT
  rationale: En contexto sacrificial, קטר implica quemar sobre el altar como ofrenda. «Quemarás» es claro y mantiene la fuerza ritual; el sentido cultual queda explicitado por «sobre el altar».
- source_word: הַמִּזְבֵּחָה
  english_pob_choice: on the altar
  chosen_spanish: sobre el altar
  alternatives_spanish:
  - en el altar
  - encima del altar
  lexicon: HALOT
  rationale: La partícula direccional indica movimiento hacia/encima del altar. «Sobre el altar» reproduce bien la imagen espacial y es idiomático en español.
translation_notes:
  revision_awareness: La redacción sigue de cerca el estado más reciente del POB inglés, que estabiliza la anatomía en «lobe on the liver» y conserva la secuencia ritual de tomar/quemar; se evita una paráfrasis más libre y se mantiene la ambigüedad anatómica documentada en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en el texto base del proyecto cuando aparezca; este versículo no lo contiene.
  - Se mantiene el vocabulario sacrificial concreto («grasa», «entrañas», «riñones», «altar») sin sustituirlo por términos más eclesiásticos.
  - La nota [a] solo cubre la alternativa anatómica del hebreo y no altera el sentido principal del versículo.
