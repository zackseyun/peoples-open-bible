translation:
  language: es
  text: Entonces sabrán que yo soy Yahvé, su Dios, que habito en Sion, mi monte santo. Y Jerusalén será santa, y los extranjeros[a] no pasarán más por ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «forasteros». El hebreo זָרִים designa a personas de fuera; en este contexto probablemente se refiere a quienes no pertenecen a la ciudad santa, no necesariamente a todo no israelita en cualquier sentido.
    reason: lexical_alternative
lexical_decisions:
- source_word: וִידַעְתֶּם
  english_pob_choice: Then you will know
  chosen_spanish: Entonces sabrán
  alternatives_spanish:
  - Y sabrán
  - Así sabrán
  lexicon: HALOT
  rationale: El waw consecutivo en un contexto profético expresa consecuencia o resultado; «Entonces» comunica esa relación sin forzar una paráfrasis. «Sabrán» mantiene el valor cognitivo/experiencial de ידע.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton con la forma española usada en el proyecto, evitando la sustitución por un título y manteniendo la referencia directa al nombre revelado.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - vuestro Dios
  - su Dios de ustedes
  lexicon: HALOT
  rationale: El sufijo de segunda persona plural se vierte naturalmente con «su» en español cuando el contexto ya identifica a los destinatarios; se evita una literalidad rígida que sonaría artificial en español bíblico contemporáneo.
- source_word: שֹׁכֵן
  english_pob_choice: dwelling
  chosen_spanish: que habito
  alternatives_spanish:
  - que mora
  - morando
  lexicon: HALOT
  rationale: 'En español, el participio hebreo se expresa con relativa verbal para conservar el sujeto divino explícito y la continuidad de la acción/estado: Yahvé es el que habita en Sion.'
- source_word: בְּצִיּוֹן
  english_pob_choice: in Zion
  chosen_spanish: en Sion
  alternatives_spanish:
  - en Zion
  lexicon: HALOT
  rationale: Se mantiene el topónimo bíblico en su forma castellana tradicional «Sion», adecuada para lectura eclesial y fiel al lugar nombrado.
- source_word: הַר קָדְשִׁי
  english_pob_choice: my holy mountain
  chosen_spanish: mi monte santo
  alternatives_spanish:
  - mi montaña santa
  - el monte de mi santidad
  lexicon: HALOT
  rationale: «Monte santo» preserva el orden y la fuerza cultual del hebreo con un español natural. La posesión («mi») y la cualidad de santidad quedan ambas explícitas.
- source_word: וְהָיְתָה יְרוּשָׁלִַם קֹדֶשׁ
  english_pob_choice: And Jerusalem will be holy
  chosen_spanish: Jerusalén será santa
  alternatives_spanish:
  - Jerusalén será un lugar santo
  - Entonces Jerusalén será santa
  lexicon: HALOT
  rationale: El predicado nominal קֹדֶשׁ se traduce con «santa», que reproduce la afirmación de santidad sobre Jerusalén. «Santa» evita añadir matices de proceso no presentes en el hebreo.
- source_word: וְזָרִים
  english_pob_choice: and strangers
  chosen_spanish: y los extranjeros
  alternatives_spanish:
  - y los extraños
  - y los forasteros
  lexicon: HALOT
  rationale: En este contexto de santidad urbana y exclusión de intrusión profanadora, «extranjeros» comunica bien el sentido de outsiders. Se mantiene la tensión lexical del hebreo sin convertirla automáticamente en una afirmación étnica absoluta.
- source_word: לֹא יַעַבְרוּ בָהּ עוֹד
  english_pob_choice: will pass through her no more
  chosen_spanish: no pasarán más por ella
  alternatives_spanish:
  - no pasarán por ella nunca más
  - no atravesarán más por ella
  lexicon: HALOT
  rationale: «Pasarán por ella» conserva la imagen de tránsito de עבר con ב, mientras «más» comunica עוֹד en español idiomático. Se mantiene la personificación de Jerusalén con el pronombre femenino implícito en «ella».
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El hebreo usa explícitamente יְהוָה, por lo que la traducción debe preservar el nombre propio divino. En español del POB se adopta «Yahvé» como forma base, manteniendo la audibilidad del nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de זָרִים en un anuncio de santidad
  english_pob_reading: strangers
  chosen_spanish_reading: los extranjeros
  alternative_spanish_readings:
  - los forasteros
  - los extraños
  rationale: El contexto no exige una restricción étnica absoluta, sino la exclusión de quienes no pertenecen al espacio santo. «Extranjeros» preserva la fuerza de outsiders y encaja con la nota contextual del POB inglés.
  doctrine_reference: Contexto de santidad/restauración en Joel 4:17; preservación de la tensión lexical documentada
translation_notes:
  revision_awareness: Se siguió el último pase de revisión, que indicó alta concordancia y ningún cambio necesario; la redacción española conserva las decisiones auditadas del inglés POB, con adaptación natural al español y sin ampliar el alcance semántico del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino conforme a la política del proyecto.
  - «Sion» y «Jerusalén» se conservan como topónimos bíblicos estándar en español.
  - Se evita reemplazar «extranjeros» por un equivalente más débil o más cargado teológicamente sin respaldo del contexto.
  - La personificación de Jerusalén se conserva con el pronombre femenino «ella».
