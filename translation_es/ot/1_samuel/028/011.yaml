translation:
  language: es
  text: 'Entonces la mujer dijo[a]: «¿A quién haré subir para ti?». Y él dijo: «Haz subir a Samuel para mí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacer subir»; literalmente, «traer arriba». El verbo hebreo significa «hacer subir» o «hacer venir arriba», y aquí refleja el modismo usado en este contexto necromántico.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: Then the woman said
  chosen_spanish: Entonces la mujer dijo
  alternatives_spanish:
  - Y la mujer dijo
  - Luego la mujer dijo
  lexicon: HALOT
  rationale: El wayyiqtol de אמר avanza la narración. «Entonces» conserva la secuencia narrativa natural en español sin perder el valor consecutivo del hebreo.
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: HALOT
  rationale: En el contexto se trata de la médium de En-dor; «mujer» es la designación simple y contextual. «Esposa» no corresponde al contexto.
- source_word: אֶת מִי
  english_pob_choice: Whom
  chosen_spanish: ¿A quién
  alternatives_spanish:
  - ¿Quién
  lexicon: HALOT
  rationale: El marcador de objeto directo antes del interrogativo indica la función de complemento directo. En español, «¿a quién?» comunica mejor esa función que «¿quién?».
- source_word: אַעֲלֶה
  english_pob_choice: shall I bring up
  chosen_spanish: haré subir
  alternatives_spanish:
  - haré venir arriba
  - haré ascender
  - subiré
  lexicon: HALOT
  rationale: El hiphil de עלה significa «hacer subir / traer arriba». «Haré subir» conserva la imagen verbal del hebreo sin resolver el matiz necromántico con una paráfrasis más explicativa.
- source_word: לָּךְ
  english_pob_choice: for you
  chosen_spanish: para ti
  alternatives_spanish:
  - por ti
  - a ti
  lexicon: HALOT
  rationale: 'El ל es benefactivo: la acción se realiza en favor de Saúl. «Para ti» expresa bien ese valor en español contemporáneo.'
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y él dijo
  alternatives_spanish:
  - Entonces él dijo
  - Y respondió
  lexicon: HALOT
  rationale: La forma narrativa se mantiene con un enlace simple. «Él» evita ambigüedad en el diálogo y conserva la fluidez del intercambio.
- source_word: אֶת שְׁמוּאֵל
  english_pob_choice: Samuel
  chosen_spanish: a Samuel
  alternatives_spanish:
  - Samuel
  lexicon: HALOT
  rationale: El nombre propio se traduce como «Samuel» y el objeto directo se marca con «a» en español para reflejar su función gramatical.
- source_word: הַעֲלִי
  english_pob_choice: Bring up
  chosen_spanish: Haz subir
  alternatives_spanish:
  - Hazlo subir
  - Haz venir arriba
  - Súbelo
  lexicon: HALOT
  rationale: Imperativo femenino singular de עלה dirigido a la mujer. «Haz subir» mantiene la misma imagen léxica que el verbo anterior y respeta el paralelismo del diálogo.
- source_word: לִי
  english_pob_choice: for me
  chosen_spanish: para mí
  alternatives_spanish:
  - por mí
  - a mí
  lexicon: HALOT
  rationale: Igual que en לָּךְ, aquí el ל es benefactivo. «Para mí» es la forma más natural y clara en español.
theological_decisions:
- issue: Cómo rendir el verbo necromántico עלה sin borrar la tensión del pasaje
  english_pob_reading: bring up
  chosen_spanish_reading: haré subir / haz subir
  alternative_spanish_readings:
  - haré venir
  - haré llamar
  - evocaré
  rationale: La POB inglesa preserva el verbo concreto «bring up» para no explicar de más el mecanismo del evento. En español, «haré subir / haz subir» conserva esa misma literalidad útil y no sustituye el texto por un término interpretativo como «evocaré».
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se sigue de cerca el criterio revisado del inglés POB: mantener el valor narrativo del wayyiqtol, preservar el léxico concreto de עלה en contexto necromántico y no suavizar el pasaje con una paráfrasis doctrinal.'
  spanish_consistency_notes:
  - Se mantiene «mujer» para הָאִשָּׁה, coherente con el contexto y con el uso habitual de la POB para esta figura.
  - Se conserva la misma raíz léxica «subir» en ambas ocurrencias de עלה para reflejar el paralelo del hebreo.
  - Se usa la puntuación española con comillas angulares o dobles según convención; aquí se opta por comillas latinas dobles simples por claridad de publicación.
  - Se marca el objeto directo personal con la preposición «a» ante «Samuel», conforme al español estándar.
