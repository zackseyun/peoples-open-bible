translation:
  language: es
  text: 'Al cabo de siete días[a], la palabra de Yahvé me vino, diciendo[b]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''Y sucedió ...''. La cláusula es una fórmula narrativa estándar, expresada aquí en español más fluido como ''Al cabo de siete días''.'
