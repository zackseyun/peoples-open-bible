translation:
  language: es
  text: Porque, así como los cielos nuevos y la tierra nueva que yo hago permanecerán delante de mí[a], declara Yahvé, así permanecerán vuestra descendencia y vuestro nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estarán en pie» / «subsistirán» para ambos verbos עמד («estar en pie, permanecer»).
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque, en efecto
  lexicon: HALOT
  rationale: Introduce la relación explicativa o de fundamento del versículo anterior; «Porque» es natural en español y conserva la conexión discursiva.
- source_word: כַאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - tal como
  - de la misma manera que
  lexicon: HALOT
  rationale: La correlación comparativa con כֵּן pide una construcción equivalente en español; «así como ... así» preserva bien la simetría.
- source_word: הַשָּׁמַיִם הַחֳדָשִׁים וְהָאָרֶץ הַחֲדָשָׁה
  english_pob_choice: the new heavens and the new earth
  chosen_spanish: los cielos nuevos y la tierra nueva
  alternatives_spanish:
  - los nuevos cielos y la nueva tierra
  - los cielos nuevos y la tierra nueva
  lexicon: HALOT
  rationale: Conservo la expresión programática con el orden natural del español bíblico y lectura clara; no reduzco su alcance escatológico.
- source_word: עֹשֶׂה
  english_pob_choice: am making
  chosen_spanish: hago
  alternatives_spanish:
  - estoy haciendo
  - haré
  lexicon: HALOT
  rationale: El participio hebreo expresa acción en curso o inminente; en español, el presente simple de primera persona comunica bien la acción divina en desarrollo sin forzar una perífrasis menos natural.
- source_word: עֹמְדִים / יַעֲמֹד
  english_pob_choice: shall remain
  chosen_spanish: permanecerán / permanecerá
  alternatives_spanish:
  - estarán en pie / estará en pie
  - se mantendrán / se mantendrá
  - durarán / durará
  lexicon: HALOT
  rationale: En español, «permanecer» transmite mejor la idea de continuidad/estabilidad que «estar en pie» aplicado a cielos y tierra; también preserva la correspondencia entre ambos verbos hebreos.
- source_word: לְפָנַי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - en mi presencia
  - ante mí
  lexicon: HALOT
  rationale: «Delante de mí» conserva la relación espacial/personal sin sobrerinterpretar; es un equivalente claro y bíblicamente inteligible.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - oráculo de Yahvé
  - dice Yahvé
  lexicon: HALOT
  rationale: Sigo el estándar del proyecto para יְהוָה como «Yahvé» y mantengo la fórmula profética solemne con «declara».
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de la misma manera
  - de igual modo
  lexicon: HALOT
  rationale: Completa la correlación comparativa iniciada por כַאֲשֶׁר; «así» es la forma más natural y precisa en español.
- source_word: זַרְעֲכֶם
  english_pob_choice: your offspring
  chosen_spanish: su descendencia
  alternatives_spanish:
  - su simiente
  - sus hijos
  - su posteridad
  lexicon: HALOT
  rationale: Prefiero «descendencia» por su registro digno y su fuerza colectiva; en este contexto se entiende como la continuidad del pueblo, evitando el arcaísmo de «simiente».
- source_word: וְשִׁמְכֶם
  english_pob_choice: and your name
  chosen_spanish: y su nombre
  alternatives_spanish:
  - y su nombre
  - y vuestra fama
  - y su renombre
  lexicon: HALOT
  rationale: El hebreo dice literalmente «vuestro nombre». Dado el giro impersonal de la cláusula final en español, «su nombre» recoge el referente colectivo de la descendencia/nombre con fluidez; la nota textual preserva la literalidad de «nombre».
theological_decisions:
- issue: Alcance de «los cielos nuevos y la tierra nueva»
  english_pob_reading: Retained as a direct cosmic-renewal expression without narrowing it to either purely literal cosmology or merely metaphorical restoration.
  chosen_spanish_reading: Se mantiene como una expresión de renovación cósmica sin cerrarla a una interpretación puramente literal ni meramente metafórica.
  alternative_spanish_readings:
  - una descripción literal del mundo futuro
  - una imagen figurada del orden restaurado
  rationale: El hebreo y la tradición bíblica posterior sostienen la amplitud de la expresión; el español debe conservar esa tensión teológica sin resolverla de antemano.
  doctrine_reference: Preservar la tensión teológica sin imponer una conclusión interpretativa.
- issue: Sentido del endurecimiento/promesa sobre «su descendencia y su nombre»
  english_pob_reading: Rendered as enduring continuance of the people's offspring and name before the LORD, without specifying whether this refers primarily to ethnic Israel alone, the faithful remnant, or the eschatological people of God more broadly.
  chosen_spanish_reading: Se entiende como continuidad duradera de la descendencia y del nombre del pueblo delante de Yahvé, sin especificar si se refiere sobre todo a Israel étnico, al remanente fiel o al pueblo escatológico de Dios en sentido amplio.
  alternative_spanish_readings:
  - perpetuidad étnico-nacional de Israel
  - perpetuidad del remanente fiel
  - extensión al pueblo escatológico de Dios
  rationale: La cláusula promete permanencia, pero no define por sí sola el alcance teológico completo; la redacción española permanece cercana al hebreo y evita cerrar la cuestión denominacional.
  doctrine_reference: No imponer una conclusión denominacional donde el hebreo no la explicita.
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada del texto fuente: no hay cambios aplicados ni observaciones pendientes; el draft español sigue la solución auditada del POB en inglés y conserva la misma tensión lexical y teológica.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - «Así como ... así» conserva la correlación hebrea כַאֲשֶׁר / כֵּן.
  - «Permanecer» se usa de forma consistente para עמד en ambos miembros de la comparación.
  - La nota [a] queda anclada al verbo principal porque la alternativa lexical afecta a ambos usos de עמד.
  - La cláusula final conserva «nombre» como término concreto, evitando reemplazarlo por «fama» o «renombre» en el texto principal.
