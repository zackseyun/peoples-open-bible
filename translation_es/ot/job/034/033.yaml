translation:
  language: es
  text: ¿Ha de retribuir él conforme a tu juicio[a] porque has rechazado eso[b]? Pues tú debes escoger, y no yo; así que declara lo que sabes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Ha de retribuir él según tú?». El inicio hebreo es idiomático y difícil; el sentido es que la retribución de Dios no queda determinada por la preferencia de Job.'
    reason: lexical_alternative
  - marker: b
    text: «Has rechazado eso» puede referirse al juicio de Dios, a su modo de gobernar, o a la retribución propuesta. Se añade «eso» en español para evitar una frase truncada, sin fijar el referente implícito.
    reason: alternative_reading
lexical_decisions:
- source_word: הֲמֵעִמְּךָ
  english_pob_choice: according to your judgment
  chosen_spanish: conforme a tu juicio
  alternatives_spanish:
  - de parte tuya
  - a tu manera
  - según tu parecer
  lexicon: HALOT
  rationale: El hebreo es idiomático y literalmente dice algo como 'de contigo'. La POB inglesa entiende la pregunta como si la retribución divina dependiera del juicio de Job; en español, 'conforme a tu juicio' conserva ese sentido sin volverlo opaco.
- source_word: יְשַׁלְמֶנָּה
  english_pob_choice: should he repay
  chosen_spanish: haría él restitución
  alternatives_spanish:
  - devolvería
  - retribuiría
  - pagaría
  lexicon: HALOT
  rationale: El verbo en piel expresa retribuir o restituir. 'Haría restitución' preserva el matiz de recompensar/compensar y mantiene el tono de pregunta retórica mejor que un simple 'pagaría'.
- source_word: כִּי מָאַסְתָּ
  english_pob_choice: because you have rejected it
  chosen_spanish: porque has rechazado
  alternatives_spanish:
  - porque has despreciado
  - porque has rehusado
  - porque lo has rechazado
  lexicon: HALOT
  rationale: מָאַס suele significar rechazar, despreciar o repudiar. La POB deja el objeto implícito; en español también puede quedar implícito sin añadir un pronombre que fuerce una referencia demasiado específica.
- source_word: כִּי אַתָּה תִבְחַר וְלֹא אָנִי
  english_pob_choice: For you must choose, and not I
  chosen_spanish: pues tú debes escoger, y no yo
  alternatives_spanish:
  - porque tú escogerás, y no yo
  - pues tú eres el que elige, y no yo
  lexicon: HALOT
  rationale: בחר significa 'elegir/escoger'. 'Debes escoger' mantiene la fuerza exhortativa o polémica del hebreo y la lectura inglesa, donde Eliú insiste en que Job debe tomar la postura o decisión, no el hablante.
- source_word: וּמַה יָדַעְתָּ דַבֵּר
  english_pob_choice: so declare what you know
  chosen_spanish: así que declara lo que sabes
  alternatives_spanish:
  - y habla lo que sabes
  - por tanto, di lo que sabes
  lexicon: HALOT
  rationale: La secuencia interrogativa seguida del imperativo queda natural en español como exhortación directa. 'Declara lo que sabes' conserva el desafío de exponer con claridad el entendimiento propio.
theological_decisions:
- issue: 'El sentido de la primera cola: si la retribución de Dios se mide por el juicio humano'
  english_pob_reading: God's recompense is not determined by Job's preference.
  chosen_spanish_reading: La restitución divina no se rige por el juicio de Job.
  alternative_spanish_readings:
  - Dios no restituye según el parecer de Job.
  - La paga de Dios no depende del criterio de Job.
  rationale: La frase hebrea es idiomática y difícil. La POB entiende que Eliú rechaza la idea de que Job fije el estándar del obrar de Dios. La redacción española mantiene esa tensión sin resolverla de modo doctrinalmente excesivo.
  doctrine_reference: Providencia divina; justicia y soberanía de Dios en Job 34
- issue: El referente implícito de 'has rejected it'
  english_pob_reading: '''Rejected it'' may refer to God''s judgment, God''s way of governing, or the proposed recompense.'
  chosen_spanish_reading: '''Has rechazado'' deja igualmente abierto el referente implícito.'
  alternative_spanish_readings:
  - '''Has rechazado eso'''
  - '''Has rechazado su modo de obrar'''
  - '''Has rechazado la restitución'''
  rationale: La ambigüedad del hebreo debe preservarse. En español se evita fijar un objeto explícito que cierre indebidamente la referencia, respetando la tensión documentada por la POB inglesa.
  doctrine_reference: Ambigüedad textual y prudencia exegética
translation_notes:
  revision_awareness: Esta redacción sigue de cerca la lectura revisada de la POB inglesa, que suprimió el objeto innecesario tras 'repay' y mantuvo un registro formal. En español se optó por una formulación igualmente compacta, con la ambigüedad del objeto conservada donde el hebreo y la POB la dejan abierta.
  spanish_consistency_notes:
  - Se usa 'Dios' implícitamente solo en las notas, porque el versículo no lo nombra explícitamente.
  - '''Restitución'' se eligió para reflejar el matiz de recompensar/retribuir del verbo en piel sin perder legibilidad.'
  - Se mantuvo un tono de reproche directo y formal, acorde con el discurso de Eliú.
  - Los marcadores de nota aparecen exactamente en el texto principal y corresponden uno a uno con las notas incluidas.
