translation:
  language: es
  text: Los ladrillos han caído, pero reconstruiremos con piedra labrada[a]; los sicómoros han sido talados[b], pero los reemplazaremos con cedros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «piedra cortada» para «piedra labrada».
    reason: lexical_alternative
  - marker: b
    text: «Sicómoros» se refiere a sicómoros higuerones o higueras sicómoras.
    reason: cultural_note
lexical_decisions:
- source_word: לְבֵנִים
  english_pob_choice: Bricks
  chosen_spanish: Ladrillos
  alternatives_spanish:
  - adobes
  - ladrillos de barro
  lexicon: HALOT
  rationale: El hebreo designa ladrillos de construcción ordinaria; en español, 'ladrillos' transmite bien el contraste con la piedra más durable del miembro siguiente. 'Adobes' o 'ladrillos de barro' precisan más de lo que el texto exige.
- source_word: נָפָלוּ
  english_pob_choice: have fallen
  chosen_spanish: han caído
  alternatives_spanish:
  - cayeron
  - han caído
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción completada; el pretérito perfecto compuesto mantiene ese valor de resultado presente y encaja con el tono de respuesta inmediata.
- source_word: גָזִית
  english_pob_choice: cut stone
  chosen_spanish: piedra labrada
  alternatives_spanish:
  - piedra cortada
  - piedra hewn
  lexicon: HALOT
  rationale: '''גָזִית'' se refiere a piedra trabajada o tallada para construcción. ''Piedra labrada'' es natural en español y conserva la oposición con ''ladrillos''. ''Piedra cortada'' es posible, pero menos idiomática.'
- source_word: נִבְנֶה
  english_pob_choice: we will rebuild
  chosen_spanish: reconstruiremos
  alternatives_spanish:
  - edificaremos de nuevo
  - construiremos
  lexicon: HALOT
  rationale: Aunque el verbo básico es 'construir', el contexto de lo que ya cayó permite 'reconstruiremos' para explicitar la restauración. La forma sigue siendo futura y de primera persona plural, como en el hebreo.
- source_word: שִׁקְמִים
  english_pob_choice: sycamores
  chosen_spanish: sicómoros
  alternatives_spanish:
  - higueras sicómoras
  - sicómoros de Egipto
  lexicon: HALOT
  rationale: '''Sicómoros'' es el equivalente español estándar para el árbol aquí mencionado. Mantiene la referencia botánica sin sobreexplicar en el texto principal.'
- source_word: גֻּדָּעוּ
  english_pob_choice: have been cut down
  chosen_spanish: han sido cortados
  alternatives_spanish:
  - han sido derribados
  - han sido talados
  lexicon: HALOT
  rationale: La pasiva hebrea expresa que fueron cortados o derribados. 'Han sido cortados' es fiel y conciso; 'han sido talados' daría una matización botánica algo más específica.
- source_word: אֲרָזִים
  english_pob_choice: cedars
  chosen_spanish: cedros
  alternatives_spanish:
  - cedros del Líbano
  - árboles de cedro
  lexicon: HALOT
  rationale: '''Cedros'' es el plural normal en español y conserva el contraste de maderas valiosas respecto a los sicómoros.'
- source_word: נַחֲלִיף
  english_pob_choice: we will replace them with
  chosen_spanish: los reemplazaremos con
  alternatives_spanish:
  - los sustituiremos por
  - intercambiaremos por
  lexicon: HALOT
  rationale: El hiphil de חלף comunica sustituir una cosa por otra. 'Los reemplazaremos con' reproduce bien la intención de cambio y el tono desafiante del dicho.
theological_decisions:
- issue: Tono del dicho colectivo
  english_pob_reading: Rendered as a proud, defiant resolve to rebuild with better materials after judgment.
  chosen_spanish_reading: Se mantiene como una declaración colectiva jactanciosa y desafiante de reconstrucción con materiales mejores tras la caída.
  alternative_spanish_readings:
  - declaración neutral de reconstrucción
  - expresión humilde de esperanza
  rationale: El contraste entre materiales humildes y más nobles, en este contexto, comunica autosuficiencia orgullosa más que arrepentimiento. El español debe conservar esa tensión sin moralizarla ni suavizarla.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El pasaje coincide con el texto hebreo masorético y con la revisión inglesa más reciente; no se requieren ajustes derivados de revisiones previas.
  spanish_consistency_notes:
  - Se prefirió 'Yahvé' no aplicable aquí; el versículo no contiene el nombre divino.
  - Se mantuvo la primera persona plural en todo el dicho para conservar el paralelismo y el tono colectivo.
  - '''Ladrillos'' / ''piedra labrada'' preserva el contraste material sin introducir tecnicismos innecesarios.'
