revisions:
- from: Si, pues, algunos hombres perniciosos[a] han escapado de su tierra y han venido a nosotros, entréguenlos a Simón, el sumo sacerdote[b], para que los castigue conforme a su ley.
  to: Si, pues, algunos hombres perniciosos[a] han escapado de su tierra a nosotros, entréguenlos a Simón, el sumo sacerdote, para que los castigue conforme a la ley de ellos[b].
  rationale: La revisión elimina un añadido verbal no necesario, hace explícito el plural de 'their law', y corrige una nota que invertía el sentido de la alternativa de venganza. Se conserva el buen español del borrador y su alineación con las decisiones léxicas del POB.
