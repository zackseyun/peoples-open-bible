translation:
  language: es
  text: Y debe pagar cuatro veces su valor por la cordera, porque hizo esto y porque no tuvo piedad.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: הַכִּבְשָׂה
  english_pob_choice: the ewe lamb
  chosen_spanish: la cordera
  alternatives_spanish:
  - la oveja
  - la corderita
  - la hembra del cordero
  lexicon: HALOT
  rationale: כִּבְשָׂה designa una cría hembra de oveja/cordero. En español, «cordera» conserva el rasgo femenino y suena natural en un contexto narrativo-legal; «oveja» perdería la especificidad de cría.
- source_word: יְשַׁלֵּם
  english_pob_choice: he must repay
  chosen_spanish: debe restituir
  alternatives_spanish:
  - debe pagar
  - debe reponer
  - debe devolver
  lexicon: HALOT
  rationale: El piel de שׁלם aquí expresa restitución jurídica, no solo pago monetario. «Restituir» conserva el sentido de reparación/compensación exigida por sentencia.
- source_word: אַרְבַּעְתָּיִם
  english_pob_choice: fourfold
  chosen_spanish: cuatro veces
  alternatives_spanish:
  - cuádruple
  - cuatro veces más
  lexicon: HALOT
  rationale: El adverbio numeral indica multiplicación por cuatro. «Cuatro veces» es claro y natural en español; «cuádruple» sería más compacto pero algo más abstracto.
- source_word: עֵקֶב אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  - a causa de que
  lexicon: HALOT
  rationale: La construcción introduce la razón de la sentencia. «Porque» reproduce de forma directa la relación causal sin sobrecargar el tono.
- source_word: עָשָׂה אֶת־הַדָּבָר הַזֶּה
  english_pob_choice: he did this thing
  chosen_spanish: hizo esta cosa
  alternatives_spanish:
  - hizo este hecho
  - hizo este acto
  - hizo esto
  lexicon: HALOT
  rationale: דָּבָר puede ser «cosa», «asunto» o «hecho». «Esta cosa» mantiene la expresión hebrea sin interpretarla más allá de lo que el texto dice; suena algo más literal que «hizo esto».
- source_word: לֹא חָמָל
  english_pob_choice: he had no pity
  chosen_spanish: no tuvo piedad
  alternatives_spanish:
  - no se compadeció
  - no perdonó
  - no tuvo compasión
  lexicon: HALOT
  rationale: חמל puede implicar no perdonar / no tener piedad al abstenerse de dañar. «No tuvo piedad» sigue de cerca la decisión inglesa revisada y preserva el tono moral de la acusación; «compasión» sería posible pero menos directo aquí.
theological_decisions:
- issue: Valor moral de la sentencia por falta de piedad
  english_pob_reading: because he had no pity
  chosen_spanish_reading: porque no tuvo piedad
  alternative_spanish_readings:
  - porque no se compadeció
  - porque no perdonó
  rationale: La cláusula final enfatiza la dureza moral de la acción. «No tuvo piedad» comunica la ausencia de misericordia sin suavizar el juicio.
  doctrine_reference: Ética bíblica / misericordia y juicio
translation_notes:
  revision_awareness: El inglés POB fue revisado de «had no compassion» a «had no pity» para reflejar más directamente el verbo hebreo y mantener un registro más conciso. La versión española sigue esa revisión con «no tuvo piedad» y evita expandir el matiz a «compasión».
  spanish_consistency_notes:
  - Se mantiene el registro jurídico de la sentencia con «debe restituir».
  - Se preserva la tensión entre literalidad y claridad en «esta cosa», equivalente al hebreo דבר sin sobreinterpretación.
  - La nota [a] está anclada en el texto sobre «cuatro veces» y ofrece la alternativa «cuádruple» sin duplicar marcadores.
