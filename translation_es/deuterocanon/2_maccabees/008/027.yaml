base_translation:
  language: en
  yaml_path: translation/deuterocanon/2_maccabees/008/027.yaml
  text: After they had collected their weapons and stripped the spoils from the enemies[a], they devoted themselves to the Sabbath, abundantly blessing and giving thanks to the Lord who had preserved them to this day[b], having appointed for them the beginning of mercy.
  footnotes:
  - marker: a
    text: Or, 'they were engaged with Sabbath observance.' The Greek expression περὶ τὸ σάββατον ἐγίνοντο is somewhat idiomatic and may refer to turning their attention to keeping the Sabbath as it arrived.
    reason: lexical_alternative
  - marker: b
    text: Or, 'having granted them a beginning of mercy' or 'the first sign of mercy.' The Greek can denote that this deliverance marked the start of renewed divine favor.
    reason: alternative_reading
