translation:
  language: es
  text: Y sucederá[a] que, cuando se cumplan tus días para ir a estar con tus padres, yo levantaré tu descendencia después de ti, que será uno de tus hijos, y estableceré su reino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «ir con tus padres», un modismo hebreo para morir y reunirse con los antepasados.
    reason: cultural_note
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it shall be
  chosen_spanish: Y sucederá
  alternatives_spanish:
  - Y será
  - Y acontecerá
  lexicon: HALOT
  rationale: La fórmula introduce una transición solemne y futura. «Sucederá» conserva el tono elevado sin sonar tan arcaico como una calca rígida.
- source_word: כִּי
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - que
  - pues
  lexicon: HALOT
  rationale: 'En esta construcción temporal, כִּי introduce la cláusula de tiempo: «cuando se cumplan tus días».'
- source_word: מָלְאוּ יָמֶיךָ
  english_pob_choice: your days are fulfilled
  chosen_spanish: se cumplan tus días
  alternatives_spanish:
  - se completen tus días
  - se llenen tus días
  lexicon: HALOT
  rationale: Expresa el modismo hebreo para la terminación de la vida. «Se cumplan» conserva el sentido idiomático y el registro solemne.
- source_word: לָלֶכֶת עִם אֲבֹתֶיךָ
  english_pob_choice: to go to be with your fathers
  chosen_spanish: irte a estar con tus padres
  alternatives_spanish:
  - irte con tus padres
  - partir con tus padres
  lexicon: HALOT
  rationale: Se mantiene el idioma distintivo de Crónicas, pero en español «estar con tus padres» hace claro que se trata de la muerte y la reunión con los antepasados, no de un viaje físico. Se conservó el matiz de «irte» para reflejar לָלֶכֶת.
- source_word: וַהֲקִימוֹתִי
  english_pob_choice: I will raise up
  chosen_spanish: yo levantaré
  alternatives_spanish:
  - yo suscitaré
  - yo estableceré
  lexicon: HALOT
  rationale: En este contexto dinástico, קום en hifil expresa hacer surgir a un sucesor. «Levantaré» reproduce esa idea con naturalidad; «estableceré» se reserva para el verbo posterior.
- source_word: זַרְעֲךָ
  english_pob_choice: your offspring
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu simiente
  - tu posteridad
  lexicon: HALOT
  rationale: «Descendencia» transmite el sentido colectivo-singular de זרע en un contexto dinástico. «Simiente» sería demasiado técnico y menos transparente para el español actual.
- source_word: אַחֲרֶיךָ
  english_pob_choice: after you
  chosen_spanish: después de ti
  alternatives_spanish:
  - tras de ti
  - luego de ti
  lexicon: HALOT
  rationale: Equivale de forma directa al lenguaje de sucesión temporal y dinástica.
- source_word: אֲשֶׁר יִהְיֶה מִבָּנֶיךָ
  english_pob_choice: who shall be one of your sons
  chosen_spanish: la cual será de entre tus hijos
  alternatives_spanish:
  - que será uno de tus hijos
  - que procederá de tus hijos
  lexicon: HALOT
  rationale: Se preserva el sentido partitivo de מִן y la referencia a que el heredero vendrá de los propios hijos de David. Se usa «la cual» para concordar con «descendencia», sin perder el contenido filial del hebreo.
- source_word: וַהֲכִינוֹתִי
  english_pob_choice: I will establish
  chosen_spanish: estableceré
  alternatives_spanish:
  - afirmaré
  - confirmaré
  lexicon: HALOT
  rationale: En contexto de pacto dinástico, הכין expresa hacer firme o establecer. «Estableceré» es la opción más natural y precisa en español.
- source_word: מַלְכוּתוֹ
  english_pob_choice: his kingdom
  chosen_spanish: su reino
  alternatives_spanish:
  - su realeza
  - su soberanía
  lexicon: HALOT
  rationale: «Reino» mantiene el alcance político-dinástico del término y encaja con la promesa davídica.
theological_decisions:
- issue: Promesa dinástica y posible lectura mesiánica
  english_pob_reading: Render the immediate historical sense of a Davidic successor without importing an explicit messianic title into the verse.
  chosen_spanish_reading: Mantener el sentido histórico inmediato de un sucesor davídico sin introducir en el texto un título mesiánico explícito.
  alternative_spanish_readings:
  - Dar una formulación más abiertamente mesiánica en el texto principal
  rationale: El versículo habla primero de la descendencia de David surgida de entre sus hijos y del establecimiento de su reino. La traducción debe conservar esa formulación directa; la resonancia mesiánica puede surgir del contexto canónico, no añadirse aquí.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El borrador inglés revisó una versión previa para incorporar explícitamente «who shall be» antes de «one of your sons», reflejando con más completitud אֲשֶׁר יִהְיֶה מִבָּנֶיךָ. En español, esto se representó con «la cual será de entre tus hijos», manteniendo la relación partitiva y el matiz sucesorio del hebreo.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» como norma del proyecto solo cuando el texto fuente lo exigiera; aquí el versículo no contiene el tetragrámaton.
  - «Descendencia» se usó de manera consistente para זרע en un contexto de promesa dinástica.
  - «Reino» conserva el campo semántico político y real de מַלְכוּת.
  - La nota al pie marca el modismo de «irse a estar con tus padres» sin alterar el sentido principal del versículo.
