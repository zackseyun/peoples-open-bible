revisions:
- from: Y les contaron todas las palabras que Yosef les había dicho[a], y él vio los carros que Yosef había enviado para llevarlo[b], y revivió el espíritu de su padre Yaakov.
  to: Y le contaron todas las palabras que Yosef les había dicho, y él vio las carretas[a] que Yosef había enviado para llevarlo, y el espíritu de su padre Yaakov revivió[b].
  rationale: Se corrigió «les» por «le» para reflejar el objeto singular del hebreo. Se movió la nota [a] a «carretas», que es donde pertenece la alternativa léxica documentada para הָעֲגָלוֹת. Se sustituyó «carros» por «carretas» para evitar ambigüedad moderna en español y se reordenó la cláusula final para una sintaxis más natural y más cercana al sujeto explícito del hebreo. La nota [b] se ancló a la cláusula final, que es donde corresponde la alternativa idiomática sobre «el espíritu ... revivió».
