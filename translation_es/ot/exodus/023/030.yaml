    issue: El texto principal usa «heredes la tierra» para וְנָחַלְתָּ en vez de la opción principal auditada «tomar posesión de la tierra».
    rationale: La documentación inglesa establece «take possession of» como traducción principal por el contexto concreto de ocupación de la tierra, con «inherit» como alternativa. El español debería preservar esa prioridad semántica en el texto principal.
  - severity: low
