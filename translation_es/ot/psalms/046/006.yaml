translation:
  language: es
  text: Dios está dentro de ella[a]; no será sacudida[b]. Dios la ayudará cuando despunte la mañana[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en medio de ella».
    reason: lexical_alternative
  - marker: b
    text: O «no tambaleará» o «no será movida».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «al volverse la mañana»; es decir, cuando despunte el alba.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dioses
  lexicon: HALOT
  rationale: En este contexto salmódico, el sustantivo plural formal se refiere al único Dios de Israel; el español natural y fiel es «Dios».
- source_word: בְּקִרְבָּהּ
  english_pob_choice: within her
  chosen_spanish: en medio de ella
  alternatives_spanish:
  - dentro de ella
  - en su interior
  - en medio de ella
  lexicon: HALOT
  rationale: La expresión hebrea puede indicar presencia interna o central. «En medio de ella» conserva la imagen espacial y es muy natural en español bíblico sin perder la posibilidad de «en su interior».
- source_word: בַּל
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - nunca
  - ciertamente no
  lexicon: HALOT
  rationale: La partícula simplemente niega el verbo siguiente; «no» reproduce bien la negación poética sin añadir énfasis no documentado.
- source_word: תִּמּוֹט
  english_pob_choice: will be moved
  chosen_spanish: será conmovida
  alternatives_spanish:
  - será sacudida
  - tambaleará
  - será movida
  lexicon: HALOT
  rationale: El verbo niphal de מוט expresa ser sacudida, trastornada o hecha tambalear. «Será conmovida» mantiene la imagen de inestabilidad y funciona mejor en español que un calco más mecánico.
- source_word: יַעְזְרֶהָ
  english_pob_choice: will help her
  chosen_spanish: la ayudará
  alternatives_spanish:
  - la socorrerá
  - vendrá en su ayuda
  - la auxiliará
  lexicon: HALOT
  rationale: El imperfecto expresa acción futura/asegurada. «La ayudará» es breve, fiel y conserva el paralelismo con la primera línea.
- source_word: לִפְנוֹת בֹּקֶר
  english_pob_choice: when morning dawns
  chosen_spanish: cuando despunte la mañana
  alternatives_spanish:
  - cuando amanezca
  - al despuntar la mañana
  - al alba
  lexicon: HALOT
  rationale: La expresión hebrea literalmente alude al «volverse/turnarse» de la mañana, es decir, al llegar el alba. «Cuando despunte la mañana» preserva la imagen y suena natural en español.
theological_decisions:
- issue: Referente femenino singular de «ella/la»
  english_pob_reading: The 'her/she' refers to the city of God/Zion from the immediate context.
  chosen_spanish_reading: «Ella/la» se conserva como referencia a la ciudad de Dios, Sion, del contexto inmediato.
  alternative_spanish_readings:
  - la comunidad del pueblo de Dios
  - la ciudad personificada de Sion
  rationale: La gramática femenina singular del hebreo apunta al antecedente contextual. Mantener el pronombre evita introducir un sustantivo interpretativo que el verso no explicita.
  doctrine_reference: Salmo 46:4–5 en el contexto inmediato de la ciudad de Dios; personificación poética de Sion.
translation_notes:
  revision_awareness: La fuente inglesa revisó la última cláusula desde una traducción más literal («at the turning of the morning») hacia una forma más idiomática («when morning dawns»). Por eso la redacción española adopta «cuando despunte la mañana», que mantiene la imagen hebrea y la naturalidad en español.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים conforme al contexto monoteísta del salmo.
  - Se evita «SEÑOR» porque el hebreo aquí usa אֱלֹהִים, no el Tetragrámaton.
  - Se conserva el pronombre femenino singular para no borrar la personificación de la ciudad.
  - La elección «será conmovida» busca reflejar la estabilidad/ inestabilidad del verbo hebreo sin introducir una equivalencia doctrinalmente cargada.
