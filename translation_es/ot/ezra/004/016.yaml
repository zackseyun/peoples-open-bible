translation:
  language: es
  text: Hacemos saber al rey que, si esta ciudad es reconstruida y sus murallas quedan terminadas, por esto no tendrás parte[a] Más allá del Río[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «porción»; más específicamente en este contexto, «participación» o incluso «ingreso». El arameo חֲלָק puede abarcar la idea de parte, porción o cuota según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «Más allá del Río», nombre oficial persa de la provincia trans-Eufrates.
    reason: cultural_note
lexical_decisions:
- source_word: מְהוֹדְעִין
  english_pob_choice: We make known
  chosen_spanish: Hacemos saber
  alternatives_spanish:
  - Informamos
  - Notificamos
  lexicon: HALOT
  rationale: La forma aramea funciona como verbo formular en un informe oficial; «hacer saber» conserva el registro administrativo sin volverlo coloquial.
- source_word: לְמַלְכָּא
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - al rey
  - para el rey
  lexicon: HALOT
  rationale: El dativo se expresa de manera natural con «al rey» en español y mantiene la relación indirecta del destinatario.
- source_word: דִּי הֵן
  english_pob_choice: that if
  chosen_spanish: que, si
  alternatives_spanish:
  - que si
  - que, en caso de que
  lexicon: HALOT
  rationale: La construcción introduce un contenido reportado con valor condicional; en español «que, si» preserva la fuerza sin sonar forzado.
- source_word: קִרְיְתָא דָךְ
  english_pob_choice: this city
  chosen_spanish: esta ciudad
  alternatives_spanish:
  - esa ciudad
  - la ciudad esta
  lexicon: HALOT
  rationale: El demostrativo apunta a Jerusalén desde la perspectiva de los redactores; «esta ciudad» refleja el deíctico del original.
- source_word: תִּתְבְּנֵא
  english_pob_choice: is rebuilt
  chosen_spanish: es reedificada
  alternatives_spanish:
  - es reconstruida
  - llega a ser reedificada
  lexicon: HALOT
  rationale: El pasivo imperfectivo expresa una condición futura real. «Es reedificada» conserva la forma pasiva y el matiz de rehacer un edificio.
- source_word: וְשׁוּרַיָּה
  english_pob_choice: and its walls
  chosen_spanish: y sus murallas
  alternatives_spanish:
  - y sus muros
  - y las murallas
  lexicon: HALOT
  rationale: «Murallas» comunica mejor el sentido fortificado del plural arameo en este contexto político-militar.
- source_word: יִשְׁתַּכְלְל֑וּן
  english_pob_choice: are completed
  chosen_spanish: son completadas
  alternatives_spanish:
  - son terminadas
  - quedan terminadas
  lexicon: HALOT
  rationale: Se mantiene la idea de llevar a término una obra. «Son completadas» reproduce con transparencia la pasiva verbal del original.
- source_word: לָקֳבֵל דְּנָה
  english_pob_choice: then because of this
  chosen_spanish: entonces, por esto
  alternatives_spanish:
  - por lo tanto
  - debido a esto
  lexicon: HALOT
  rationale: La expresión introduce la consecuencia derivada de la condición anterior. «Por esto» conserva el demostrativo explícito del arameo mejor que una mera conclusión inferida.
- source_word: חֲלָק
  english_pob_choice: portion
  chosen_spanish: parte
  alternatives_spanish:
  - porción
  - parte alícuota
  - participación
  lexicon: HALOT
  rationale: El término puede significar parte, porción o participación. En este contexto administrativo, «parte» mantiene la amplitud semántica sin añadir una especificación no garantizada por el texto.
- source_word: בַּעֲבַר נַהֲרָא
  english_pob_choice: Beyond the River
  chosen_spanish: al otro lado del Río
  alternatives_spanish:
  - Más allá del Río
  - al otro lado del Éufrates
  lexicon: HALOT
  rationale: Se conserva el nombre oficial persa en una forma inteligible para el lector español. No se añade «provincia» porque no está en el arameo de este versículo.
- source_word: לָא אִיתַי לָךְ
  english_pob_choice: you will have no
  chosen_spanish: no tendrás
  alternatives_spanish:
  - no habrá para ti
  - no tendrás ningún
  lexicon: HALOT
  rationale: La construcción existencial con dativo de posesión se vuelve idiomática en español con «no tendrás», manteniendo la advertencia directa al rey.
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó la expansión «in the province» y afinó חֲלָק como «portion». Por eso el español evita añadir «provincia» y conserva una opción amplia con «parte», sin cerrar indebidamente el sentido administrativo-político.
  spanish_consistency_notes:
  - He mantenido un registro formal y documental coherente con una carta oficial.
  - He evitado «SEÑOR» y no hay términos divinos en este versículo.
  - «Río» se escribe con mayúscula en el nombre oficial tradicional de la región, siguiendo el uso editorial del POB y la claridad en español.
