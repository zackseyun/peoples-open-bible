    text: O "la plata de la expiación" o "el dinero del rescate". El hebreo dice literalmente algo como "la plata/dinero de las expiaciones" y se refiere a la contribución cultual establecida en el contexto anterior.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: "por vuestras almas". Aquí el sentido es "por sus vidas" o "por ustedes mismos" en el contexto de la expiación relacionada con el censo.'
    reason: lexical_alternative
