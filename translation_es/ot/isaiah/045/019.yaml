  text: לֹ֧א בַ/סֵּ֣תֶר דִּבַּ֗רְתִּי בִּ/מְקוֹם֙ אֶ֣רֶץ חֹ֔שֶׁךְ לֹ֥א אָמַ֛רְתִּי לְ/זֶ֥רַע יַעֲקֹ֖ב תֹּ֣הוּ בַקְּשׁ֑וּ/נִי אֲנִ֤י יְהוָה֙ דֹּבֵ֣ר צֶ֔דֶק מַגִּ֖יד מֵישָׁרִֽים׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/045/019.yaml
  text: I did not speak in secret[a], in a land of darkness; I did not say to the offspring of Jacob, ‘Seek me in vain.’ I, Yahweh, speak righteousness[b], declaring what is upright.
  footnotes:
  - marker: a
    text: Or 'I did not say to the offspring of Jacob, “Seek me for nothing.”' The Hebrew תֹהוּ can denote emptiness, futility, or formlessness; here the sense is that seeking the LORD is not pointless.
    reason: lexical_alternative
  - marker: b
    text: Or 'I, the LORD, speak what is right' / 'speak justice.' The Hebrew צֶדֶק can carry the sense of righteousness, rightness, or justice.
    reason: lexical_alternative
