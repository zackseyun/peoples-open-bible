review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: ubicación locativa («En el campo»), alimento animal para בְּלִילוֹ, cosecha paralela a recolección, y la ambigüedad de רָשָׁע como poseedor malvado/genericidad. También conserva adecuadamente la nota sobre la preposición no repetida con «viña».'
  spanish_quality_summary: La redacción es clara y legible, pero «espigan en la viña» suena poco natural en español general, ya que «espigar» se asocia más con cereal que con uvas o rebusca en viña. Una formulación como «rebuscan en la viña» preserva mejor el sentido de gleaning/late gathering en contexto vitícola. Además, en la nota a, «provenda» es forma poco usual; «pienso» funciona mejor como alternativa española actual.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Forraje» para בְּלִילוֹ está bien. «Malvado» es aceptable para רָשָׁע en este contexto poético y mantiene la ambigüedad documentada. La revisión propuesta solo mejora naturalidad léxica en español para יְלַקֵּשׁוּ y una alternativa de nota.
  issues:
  - severity: medium
    issue: «espigan en la viña» es poco idiomático
    rationale: Aunque «espigar» puede transmitir rebusca agrícola, en español se vincula primariamente con espigas/cereal; con «viña» produce una imagen extraña y reduce la naturalidad sin necesidad.
  - severity: low
    issue: «provenda» en la nota es arcaizante o poco conocida
    rationale: La alternativa intenta reflejar «provender», pero en español eclesial amplio suena poco transparente. «Pienso» o mantener «forraje mezclado» comunica mejor el valor léxico.
