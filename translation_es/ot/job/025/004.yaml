translation:
  language: es
  text: ¿Cómo podrá el hombre ser justo delante de Dios?[a] ¿Y cómo podrá ser puro el nacido de mujer?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con Dios». El hebreo dice literalmente «con Dios», pero la frase puede denotar la condición de una persona ante él.
    reason: lexical_alternative
  - marker: b
    text: O «ser limpio» o «ser inocente».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמַה
  english_pob_choice: So how can
  chosen_spanish: ¿Cómo podrá
  alternatives_spanish:
  - ¿Y cómo podrá
  - ¿Pues cómo podrá
  lexicon: HALOT
  rationale: La partícula interrogativa con ו inicial introduce una pregunta retórica. En español, «¿Cómo podrá» expresa con naturalidad la capacidad/potencial implícitos; se omite un equivalente mecánico de «so» porque el valor discursivo queda absorbido por la interrogación retórica, aunque se mantiene la segunda pregunta coordinada.
- source_word: יִצְדַּק
  english_pob_choice: be righteous
  chosen_spanish: ser justo
  alternatives_spanish:
  - ser justificado
  - estar en lo correcto
  lexicon: HALOT
  rationale: El verbo en qal expresa resultar justo/recto en relación con Dios. «Ser justo» conserva ese sentido sin introducir demasiado pronto la terminología forense de «justificado», aunque esa posibilidad queda abierta en la nota de alternativa.
- source_word: אֱנוֹשׁ
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - un mortal
  - un ser humano
  lexicon: HALOT
  rationale: אֱנוֹשׁ subraya la fragilidad humana. «El hombre» mantiene el singular genérico y la fuerza antropológica del hebreo en un registro bíblico natural en español.
- source_word: עִם אֵל
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - con Dios
  - en relación con Dios
  lexicon: HALOT
  rationale: 'La expresión es literalmente «con Dios», pero aquí el sentido es relacional/judicial: la condición humana ante Dios. «Delante de Dios» transmite bien ese matiz en español sin fijar una lectura doctrinal más estrecha.'
- source_word: יִזְכֶּה
  english_pob_choice: be pure
  chosen_spanish: ser puro
  alternatives_spanish:
  - ser limpio
  - ser inocente
  lexicon: HALOT
  rationale: זכה en qal puede denotar pureza/limpieza moral. «Ser puro» funciona de manera natural en paralelo con «ser justo» y preserva la amplitud semántica mejor que restringirlo solo a inocencia legal.
- source_word: יְלוּד אִשָּׁה
  english_pob_choice: one born of woman
  chosen_spanish: el que nace de mujer
  alternatives_spanish:
  - uno nacido de mujer
  - el nacido de mujer
  lexicon: HALOT
  rationale: La idiomática hebrea designa a todo ser humano nacido de mujer. «El que nace de mujer» suena natural en español y mantiene el valor genérico e idiomático sin añadir especificaciones no presentes en el texto.
theological_decisions:
- issue: Matiz relacional/judicial de la preposición עִם
  english_pob_reading: before God
  chosen_spanish_reading: delante de Dios
  alternative_spanish_readings:
  - con Dios
  - ante Dios
  rationale: El hebreo dice literalmente «con Dios», pero en este contexto de pregunta sobre justicia humana el valor es la posición del hombre respecto de Dios, con resonancia judicial. «Delante de Dios» conserva la tensión entre literalidad y sentido contextual sin encerrar el pasaje en una formulación técnica posterior.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Lenguaje antropológico genérico
  english_pob_reading: man ... one born of woman
  chosen_spanish_reading: el hombre ... el que nace de mujer
  alternative_spanish_readings:
  - la humanidad ... cualquiera nacido de mujer
  - un mortal ... el que nace de mujer
  rationale: El hebreo emplea formas masculinas/genéricas para la humanidad. En español, «el hombre» y «el que nace de mujer» conservan ese alcance representativo sin perder inteligibilidad ni forzar una neutralización que el texto no exige.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'El pasaje fue revisado en el último pase y quedó sin cambios, con alto grado de acuerdo entre revisión y control cruzado. La versión española sigue esa lectura estable: mantiene la pregunta retórica doble, la relación humana ante Dios y el paralelo entre justicia y pureza sin añadir interpretaciones externas.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֵל conforme al estándar del proyecto.
  - Se evita «Cristo» o terminología eclesiástica no presente en el texto.
  - La coordinación interrogativa se conserva con dos preguntas paralelas.
  - Las notas al pie conservan las alternativas relevantes del audit trail inglés, adaptadas al español.
