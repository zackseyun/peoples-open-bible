translation:
  language: es
  text: Mira[a], también nuestras ciudades y los que habitan en ellas son tus esclavos; ven y haz con ellas como bien te parezca a tus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervos». El griego puede expresar ambos matices, pero aquí probablemente subraya la sujeción bajo conquista.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Mira aquí
  - He aquí
  lexicon: BDAG
  rationale: Conserva la fuerza deíctica e imperativa de la interjección sin caer en una forma demasiado arcaica. 'Mira' funciona de modo natural en español moderno y mantiene el tono enfático del griego.
- source_word: πόλεις
  english_pob_choice: cities
  chosen_spanish: ciudades
  alternatives_spanish:
  - pueblos
  - urbs
  lexicon: BDAG
  rationale: El sentido básico es el de asentamientos urbanos; 'ciudades' es la correspondencia directa y más transparente.
- source_word: κατοικοῦντες
  english_pob_choice: those who live
  chosen_spanish: los que habitan
  alternatives_spanish:
  - los habitantes
  - los que viven
  lexicon: BDAG
  rationale: El participio mantiene el valor verbal de residencia; 'los que habitan' suena natural y conserva el énfasis en quienes residen en ellas.
- source_word: δοῦλοί
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - sirvientes
  lexicon: BDAG
  rationale: Se sigue la preferencia del proyecto por 'esclavos' cuando δοῦλος expresa sujeción política o cautiva. Aquí el contexto es de rendición total ante el conquistador, por lo que 'esclavos' comunica mejor la fuerza del término que 'siervos'.
- source_word: ἐλθὼν ἀπάντησον
  english_pob_choice: come and deal with
  chosen_spanish: ven y trátalas
  alternatives_spanish:
  - ven y haz con ellas
  - ven y encáralas
  - ven y dispón de ellas
  lexicon: BDAG
  rationale: La combinación participio + imperativo se vierte de manera natural como dos mandatos coordinados. 'Trátalas' intenta conservar el sentido práctico de actuar sobre las ciudades sin imponer una interpretación más específica que la del contexto.
- source_word: ὡς ἔστιν ἀγαθὸν ἐν ὀφθαλμοῖς σου
  english_pob_choice: as is good in your eyes
  chosen_spanish: como te parezca bueno a tus ojos
  alternatives_spanish:
  - como te parezca bien
  - como sea bueno a tus ojos
  - como te agrade
  lexicon: BDAG
  rationale: Se preserva el modismo semítico 'a tus ojos' y la valoración subjetiva de la acción. La expansión mínima 'te parezca bueno' hace la frase idiomática y comprensible en español sin perder el eco del original.
theological_decisions:
- issue: Renderización de δοῦλοι en un contexto de sometimiento político
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - servidores
  rationale: El texto no describe servicio voluntario sino sumisión ante una conquista. Mantener 'esclavos' preserva la dureza del término y evita suavizar la escena. La nota permite la alternativa 'siervos' solo como posibilidad léxica general, pero no como traducción principal.
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y que la concordancia con el texto fuente era alta; por eso se mantiene la decisión principal de traducir δοῦλοι como 'esclavos' y se conserva el valor imperativo de ἰδοὺ sin arcaísmos.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio, moderno y claro.
  - Se conserva el modismo 'a tus ojos' para reflejar la expresión griega sin sustituirla por una paráfrasis excesiva.
  - '''Trátalas'' refiere a las ciudades mencionadas inmediatamente antes, por concordancia contextual en español.'
  - La nota textual sobre 'siervos' queda anclada en 'esclavos' para reflejar la alternativa léxica documentada.
