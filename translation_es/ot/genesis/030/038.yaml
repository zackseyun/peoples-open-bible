review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en general el sentido del hebreo: Jacob coloca las varas peladas en la zona de abrevar, delante del rebaño, y los animales se aparean/al entrar en celo cuando vienen a beber. Sin embargo, hay desajustes importantes: «de donde venía el rebaño a beber» introduce una idea de procedencia no presente en אֲשֶׁר תָּבֹאןָ ... לִשְׁתּוֹת, que significa «donde/a donde venía el rebaño a beber». Además, las notas a y c están mal ancladas: la nota sobre וַיֵּחַמְנָה no debe ir en «abrevaderos», y la nota c repite exactamente la lectura principal en vez de ofrecer alternativa real.'
  spanish_quality_summary: El español es mayormente legible, pero «en los canales de agua de donde venía el rebaño a beber» suena poco natural y semánticamente incorrecto. «Canales de abrevadero donde venía el rebaño a beber» o «canales de agua donde el rebaño venía a beber» es más claro. La puntuación funciona, y «delante del rebaño» es natural. Conviene reubicar las notas para que el lector no reciba información léxica en palabras no relacionadas.
  glossary_alignment: 'No hay conflictos con la terminología teológica del proyecto. Las elecciones léxicas principales son adecuadas: «varas» para הַמַּקְלוֹת, «rebaño» para הַצֹּאן, y «se aparearon» para וַיֵּחַמְנָה con nota alternativa. La distinción entre los dos términos de localización debe mantenerse, pero en español conviene hacerla más idiomática con «abrevaderos» y «canales de abrevadero».'
  issues:
  - severity: high
    issue: «de donde venía el rebaño a beber» expresa procedencia en vez de ubicación/destino
    rationale: El relativo אֲשֶׁר con תָּבֹאןָ לִשְׁתּוֹת describe el lugar al que venían para beber, no el lugar de donde salían. «De donde» altera el sentido de la escena.
  - severity: high
    issue: La nota [a] está anclada en «abrevaderos», pero explica וַיֵּחַמְנָה
    rationale: La disciplina de notas exige que el marcador aparezca en la palabra o frase relevante. Aquí la nota léxica sobre «estaban en celo» debe ir junto a «se aparearon», no junto a «abrevaderos».
  - severity: medium
    issue: La nota [c] no ofrece una alternativa real
    rationale: El texto principal ya dice «delante del rebaño», y la nota c repite exactamente eso. Según el rastro inglés, la alternativa es más bien «frente al rebaño» o una explicación de una lectura previa, no una duplicación inútil.
  - severity: low
    issue: «canales de agua» puede mejorarse a «canales de abrevadero»
    rationale: Ambas son posibles, pero «canales de abrevadero» conecta mejor con el contexto pastoril y con la relación entre בָּרֳהָטִים y בְּשִׁקֲתוֹת הַמָּיִם.
  revised_spanish_text: Puso las varas que había pelado en los abrevaderos, en los canales de abrevadero[a] donde venía el rebaño a beber, delante del rebaño[b]; y se aparearon[c] cuando venían a beber.
  revised_footnotes:
  - marker: a
    text: Los dos términos de lugar («abrevaderos» y «canales de abrevadero») probablemente describen la zona de bebida con más detalle, no necesariamente dos sitios separados.
    reason: lexical_alternative
  - marker: b
    text: 'O: «frente al rebaño».'
    reason: previous_rendering
  - marker: c
    text: 'O: «estaban en celo cuando venían a beber». El hebreo puede referirse más literalmente a que los animales se calentaron o estaban en celo, con el apareamiento implícito por el contexto.'
    reason: lexical_alternative
  revision_rationale: Se corrige un error de sentido importante («de donde»), se mejora la naturalidad contextual de la segunda expresión locativa, y se reordenan/anclan las notas en los lugares correctos. También se elimina una nota redundante y se preservan las alternativas léxicas documentadas por el POB inglés.
