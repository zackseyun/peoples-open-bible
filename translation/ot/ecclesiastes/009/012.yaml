id: ECC.9.12
reference: Ecclesiastes 9:12
source:
  edition: WLC
  text: כִּ֡י גַּם֩ לֹֽא יֵדַ֨ע הָ/אָדָ֜ם אֶת עִתּ֗/וֹ כַּ/דָּגִים֙ שֶׁ/נֶּֽאֱחָזִים֙ בִּ/מְצוֹדָ֣ה רָעָ֔ה וְ/כַ֨/צִּפֳּרִ֔ים הָ/אֲחֻז֖וֹת בַּ/פָּ֑ח כָּ/הֵ֗ם יֽוּקָשִׁים֙ בְּנֵ֣י הָֽ/אָדָ֔ם לְ/עֵ֣ת רָעָ֔ה כְּ/שֶׁ/תִּפּ֥וֹל עֲלֵי/הֶ֖ם פִּתְאֹֽם־־׃
translation:
  text: 'For man does not even know his time: like fish that are caught in a cruel net[a], and like birds that are caught in a snare, so the sons of man are trapped at an evil time[c][b], when it suddenly falls upon them.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'humankind does not even know its time.' The Hebrew has singular generic 'man.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the sons of man,' a Hebrew idiom for human beings.
    reason: lexical_alternative
  - marker: c
    text: Or 'at a time of calamity.' Hebrew 'at an evil time.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאָדָם
  chosen: man
  alternatives:
  - humankind
  - a person
  lexicon: HALOT
  rationale: אָדָם here is singular generic, referring representatively to humanity. Per doctrine, gender-accurate rendering is preferred where the source has representative masculine force. 'Man' preserves the singular generic parallel with 'his time.'
- source_word: עִתּוֹ
  chosen: his time
  alternatives:
  - his season
  - his appointed time
  lexicon: HALOT
  rationale: עֵת commonly denotes a time or season, often a fitting or appointed time in Ecclesiastes. 'His time' is concise and preserves the existential sense that a person does not know the moment that will befall him.
- source_word: מְצוֹדָה רָעָה
  chosen: a cruel net
  alternatives:
  - an evil net
  - a bad net
  lexicon: HALOT
  rationale: מְצוֹדָה is a hunting/fishing net. רָעָה literally 'evil/bad' modifies the net idiomatically as harmful, deadly, or disastrous rather than morally evil. 'Cruel net' communicates the destructive force in natural English without over-paraphrasing.
- source_word: צִפֳּרִים
  chosen: birds
  alternatives:
  - small birds
  lexicon: HALOT
  rationale: The noun refers broadly to birds; 'birds' is the natural English equivalent.
- source_word: פָּח
  chosen: snare
  alternatives:
  - trap
  lexicon: HALOT
  rationale: פָּח often denotes a trap or snare, especially in poetic wisdom contexts. 'Snare' fits the parallelism with net and preserves the imagery.
- source_word: יֽוּקָשִׁים
  chosen: are trapped
  alternatives:
  - are ensnared
  - are caught
  lexicon: HALOT
  rationale: The passive of יקש conveys being snared or trapped. 'Are trapped' is idiomatic and matches the imagery of net and snare while avoiding repetition of 'caught' in the same clause.
- source_word: בְּנֵי הָאָדָם
  chosen: the sons of man
  alternatives:
  - the children of man
  - human beings
  - people
  lexicon: HALOT
  rationale: This expression is a conventional Hebrew way of referring to human beings, but the literal form carries rhetorical weight in Ecclesiastes. 'The sons of man' preserves the Hebrew idiom and the contrast with singular 'man' earlier in the verse.
- source_word: לְעֵת רָעָה
  chosen: at an evil time
  alternatives:
  - for an evil time
  - at a bad time
  - in a time of calamity
  lexicon: HALOT
  rationale: The phrase points to a disastrous or calamitous moment. 'At an evil time' stays close to the Hebrew and preserves the thematic repetition of רָעָה from the net image. A more interpretive gloss like 'time of calamity' is possible but less formally transparent.
- source_word: כְּשֶׁתִּפּוֹל עֲלֵיהֶם פִּתְאֹם
  chosen: when it suddenly falls upon them
  alternatives:
  - when it falls on them suddenly
  - when sudden disaster falls upon them
  lexicon: HALOT
  rationale: The feminine singular verb likely refers back to 'time' (עֵת, feminine). 'It' preserves the grammatical linkage without importing an explicit noun not present in the clause. 'Suddenly' renders פִּתְאֹם naturally in English.
