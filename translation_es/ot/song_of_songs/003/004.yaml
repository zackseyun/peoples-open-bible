revisions:
- from: Apenas había pasado junto a ellos, cuando encontré al que ama mi alma[a]. Lo abracé y no lo solté, hasta que lo hube llevado a la casa de mi madre[b], y a la cámara de la que me concibió.
  to: Apenas había pasado junto a ellos cuando encontré al que mi alma ama[a]. Me aferré a él y no lo solté, hasta que lo hube llevado a la casa de mi madre[b], y a la cámara de la que me concibió.
  rationale: 'Se corrige la expresión central para reflejar con claridad y fidelidad el hebreo recurrente de Cantares: el amado es aquel a quien ama su alma, no una construcción ambigua. Se reemplaza «Lo abracé» por «Me aferré a él» para conservar el matiz de retener con firmeza sin introducir una acción no explícita. También se repara la nota [a] para que aporte la alternativa formal documentada y se mejora la naturalidad de la puntuación.'
