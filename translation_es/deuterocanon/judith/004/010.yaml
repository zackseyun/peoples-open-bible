revisions:
- from: Y todo hombre de Israel clamó a Dios con gran intensidad[a], y humillaron sus almas[b] con gran intensidad[a].
  to: Y todos los hombres de Israel clamaron a Dios con gran intensidad[a], y humillaron sus almas[c] con gran intensidad[b].
  rationale: Se corrige la sintaxis española para evitar la mezcla forzada de singular distributivo y plural verbal dentro de la misma oración, optando por «todos los hombres de Israel», que sigue siendo fiel al referente explícitamente masculino de ἀνήρ y lee con naturalidad en español. También se corrigen los marcadores de nota para que sean únicos y se ajusta la nota léxica sobre ἐν ἐκτενείᾳ μεγάλῃ para que ofrezca alternativas reales. Se mantiene «humillaron sus almas» para preservar τὰς ψυχὰς αὐτῶν conforme al razonamiento auditado.
