translation:
  language: es
  text: Porque el rey confía en Yahvé, y por el amor fiel[a] del Altísimo no será sacudido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por el amor constante del Altísimo»; la preposición hebrea puede entenderse de modo instrumental o locativo, y חֶסֶד también puede traducirse «fidelidad de pacto».
    reason: lexical_alternative
  - marker: b
    text: O «no será movido» o «no vacilará».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la base o explicación de la afirmación anterior. «Porque» conserva bien la relación explicativa en español sin forzar una causalidad más fuerte de la que exige el hebreo.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Sustantivo definido referido al personaje real del salmo. «El rey» es la equivalencia natural y fiel en español.
- source_word: בֹּטֵחַ
  english_pob_choice: trusts
  chosen_spanish: confía
  alternatives_spanish:
  - está confiando
  - tiene confianza
  lexicon: HALOT
  rationale: El participio qal expresa una confianza característica o continua. «Confía» comunica de manera natural esa dependencia confiada en español.
- source_word: בַּיהוָה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en Yahweh
  - en el SEÑOR
  lexicon: HALOT
  rationale: Siguiendo el criterio del proyecto, el nombre divino se vierte «Yahvé» en el texto principal. La preposición marca el objeto de la confianza.
- source_word: וּבְחֶסֶד
  english_pob_choice: and through the steadfast love
  chosen_spanish: y por la fidelidad constante
  alternatives_spanish:
  - y por el amor constante
  - y mediante la lealtad de pacto
  - y por la misericordia
  lexicon: HALOT
  rationale: חֶסֶד admite «amor leal», «fidelidad de pacto» o «amor constante». En español, «fidelidad constante» conserva el valor relacional y estable del término, sin perder la idea de lealtad activa. La preposición puede ser instrumental o causal; «por» mantiene esa amplitud.
- source_word: עֶלְיוֹן
  english_pob_choice: the Most High
  chosen_spanish: del Altísimo
  alternatives_spanish:
  - del Más Alto
  - del Exaltado
  lexicon: HALOT
  rationale: Título divino sustantivado. «Altísimo» es la equivalencia estable y natural en español bíblico, y el genitivo «del» está exigido por la construcción preposicional.
- source_word: בַּל
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - nunca
  - ciertamente no
  lexicon: HALOT
  rationale: Partícula negativa poética. «No» preserva la negación directa sin añadir énfasis que el hebreo no obliga a explicitar.
- source_word: יִמּוֹט
  english_pob_choice: he will not be shaken
  chosen_spanish: será sacudido
  alternatives_spanish:
  - será movido
  - tambaleará
  - vacilará
  lexicon: HALOT
  rationale: El verbo puede significar ser movido, sacudido o tambalear. «Será sacudido» mantiene la imagen de inestabilidad con una construcción pasiva natural en español. La nota preserva las alternativas principales del campo semántico.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo tiene el Tetragrámaton. Conforme al criterio del proyecto, el nombre del pacto se traduce «Yahvé» en el cuerpo principal, en vez de ocultarlo bajo un título genérico. Se conserva así la referencia explícita al nombre divino.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de חֶסֶד
  english_pob_reading: steadfast love / covenant faithfulness
  chosen_spanish_reading: fidelidad constante
  alternative_spanish_readings:
  - amor constante
  - lealtad de pacto
  - misericordia constante
  rationale: La POB inglesa preserva la tensión entre «steadfast love» y la posible glosa «covenant faithfulness». En español, «fidelidad constante» mantiene el núcleo de lealtad perseverante y relación de pacto, sin reducir el término a un afecto meramente emocional ni a una sola dimensión jurídica.
  doctrine_reference: HALOT 2617 חֶסֶד
- issue: Sentido del verbo יִמּוֹט
  english_pob_reading: he will not be shaken / moved / totter
  chosen_spanish_reading: no será sacudido
  alternative_spanish_readings:
  - no será movido
  - no tambaleará
  - no vacilará
  rationale: El hebreo describe inestabilidad o desplazamiento. «Será sacudido» comunica la imagen de una conmoción que no llega a derribar al rey, y preserva la amplitud semántica del original con naturalidad en español.
  doctrine_reference: HALOT 4131 מוט
translation_notes:
  revision_awareness: 'El pasaje coincide en sustancia con la revisión inglesa más reciente: no se requieren cambios textuales adicionales. Se mantiene la decisión doctrinal de traducir יהוה como «Yahvé» en el texto principal, y se conserva la ambigüedad semántica de חֶסֶד y יִמּוֹט mediante notas alternativas.'
  spanish_consistency_notes:
  - Se mantiene el nombre divino «Yahvé» conforme al estándar del proyecto para יהוה.
  - «Altísimo» se usa como título divino establecido en español bíblico.
  - «Fidelidad constante» fue elegido para evitar una traducción demasiado estrecha de חֶסֶד.
  - La negación simple «no» conserva el tono poético del hebreo sin añadir énfasis interpretativo.
  - «Será sacudido» conserva el campo semántico de inestabilidad de יִמּוֹט con español natural.
