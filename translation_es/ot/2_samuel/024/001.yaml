  glossary_alignment: Se alinea con la terminología del proyecto al usar «Yahvé». No hay conflicto con otras decisiones léxicas principales. «Furor» es posible, pero «ira» sería algo más directo; sin embargo, no exige corrección. La nota sobre Satanás y 1 Crónicas preserva correctamente la tensión teológica documentada.
