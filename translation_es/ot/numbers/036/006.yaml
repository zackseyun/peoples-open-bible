    reason: lexical_alternative
  - marker: b
    text: 'O: «dentro del clan de la tribu de su padre». El hebreo combina lenguaje de familia/clan y de tribu para subrayar que la herencia permanezca en la línea tribal paterna.'
    reason: lexical_alternative
  revision_rationale: Se corrige la principal inexactitud semántica reemplazando «sean dadas por esposas» por «lleguen a ser esposas», que refleja mejor תִּהְיֶינָה לְנָשִׁים sin introducir una pasiva inexistente. Se ajusta «pero» a «solo» para representar la restricción de אַךְ. También se recolocan las notas al pie en los segmentos correctos para que coincidan con su contenido.
