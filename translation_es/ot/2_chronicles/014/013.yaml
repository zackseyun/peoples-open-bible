review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del hebreo: ataque a todas las ciudades alrededor de Gerar, terror de Yahvé sobre sus habitantes, y saqueo por el abundante botín. Sin embargo, ''hirieron'' suena menos natural en español con objeto ''ciudades'' y puede sugerir herir físicamente a personas más que derrotar/atacar poblaciones en contexto militar. Además, el topónimo debe unificarse como ''Gerar'', conforme al source/English POB y a una forma más reconocible en español bíblico actual.'
  spanish_quality_summary: 'La redacción es mayormente clara y digna, pero ''E hirieron'' resulta algo rígido e inusual en español moderno; ''Y atacaron'' o ''Y derrotaron'' sería más idiomático con ''ciudades''. Dado que el hebreo y la auditoría inglesa conservaron ''struck'' por cercanía léxica, ''atacaron'' equilibra fidelidad y naturalidad. El resto del versículo lee bien: ''el terror de Yahvé estaba sobre ellos'' y ''había gran botín en ellas'' son claros.'
  glossary_alignment: 'Correcto en el uso de ''Yahvé'' para יְהוָה. ''Terror'' para פַחַד mantiene bien la fuerza contextual. ''Saquearon'' y ''botín'' reflejan adecuadamente בזז / בִזָּה. La principal desalineación no es doctrinal sino estilístico-lexical: ''hirieron'' no funciona tan bien con ''ciudades''.'
  issues:
  - severity: medium
    issue: '''hirieron'' con objeto ''todas las ciudades'' es poco natural en español'
    rationale: Aunque נכה puede traducirse de forma cercana como 'herir/golpear', en español 'herir ciudades' suena extraño y puede confundir el referente. En narrativa militar, 'atacaron' comunica mejor la acción contra ciudades sin sobreinterpretar.
  - severity: medium
    issue: Topónimo 'Guerar' frente a 'Gerar'
    rationale: El source/English POB usa 'Gerar' y esta forma es suficientemente natural y más directamente alineada con el nombre hebreo גְּרָר. Conviene evitar variación innecesaria.
  - severity: low
    issue: La nota al pie actual presupone una elección principal menos adecuada
    rationale: Si se cambia a 'atacaron', la nota debe ajustarse para reflejar alternativas reales y la razón contextual, no mantener 'hirieron' como base.
  revised_spanish_text: Y atacaron[a] todas las ciudades alrededor de Gerar, porque el terror de Yahvé estaba sobre ellos. Y saquearon todas las ciudades, porque había gran botín en ellas.
  revised_footnotes:
  - marker: a
    text: También puede traducirse «hirieron» o «golpearon»; el hebreo נכה en este contexto militar expresa un ataque o derrota violenta.
    reason: lexical_alternative
  revision_rationale: Se revisa 'hirieron' a 'atacaron' para lograr un español más natural con 'ciudades' sin apartarse del sentido militar de נכה. Se normaliza el topónimo a 'Gerar' para alineación con la fuente y la auditoría inglesa. Se actualiza la nota para que corresponda a la nueva elección principal.
