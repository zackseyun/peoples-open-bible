revisions:
- from: ¿Se mantendrá firme tu corazón[a], o se fortalecerán tus manos, en los días en que yo te trato? Yo, Yahvé, he hablado, y lo haré.
  to: ¿Resistirá tu corazón[a], o seguirán fuertes tus manos, en los días cuando yo tome medidas contra ti? Yo, Yahvé, he hablado, y lo haré.
  rationale: Se revisa «se mantendrá firme» a «resistirá» para acercarse al valor de endure/endurecerse bajo presión; se cambia «se fortalecerán tus manos» por «seguirán fuertes tus manos» para reflejar continuidad de fuerza, no incremento; y se sustituye «yo te trato» por «yo tome medidas contra ti», que es más idiomático en español y conserva el contexto judicial sin estrecharlo tanto como «te juzgo». Se mantiene «Yahvé», «he hablado» y «lo haré» por buena alineación con el proyecto y el audit trail.
  reviewer_model: gpt-5.4
