translation:
  language: es
  text: Por tanto, el Seol ha ensanchado su garganta y ha abierto su boca sin medida[a], y descienden su esplendor, su multitud, su estruendo[c][b], y el que exulta en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ha ensanchado su apetito» (literalmente, «ha ensanchado su nefesh/alma»).'
    reason: lexical_alternative
  - marker: b
    text: «Sin medida» también puede traducirse «sin límite».
    reason: lexical_alternative
  - marker: c
    text: Seol es el ámbito de los muertos; aquí está personificado y abre su boca para devorar el esplendor de la ciudad y a sus festejantes.
    reason: cultural_note
lexical_decisions:
- source_word: שְּׁאוֹל
  english_pob_choice: Sheol
  chosen_spanish: Seol
  alternatives_spanish:
  - el sepulcro
  - el reino de los muertos
  - la muerte
  lexicon: HALOT
  rationale: Se conserva el término hebreo transliterado para no aplanar la imagen poética ni reducirla a una noción más débil como 'sepulcro' o más abstracta como 'muerte'. En español, 'Seol' mantiene la personificación del ámbito de los muertos y permite auditar la imagen devoradora del verso.
- source_word: הִרְחִיבָה ... נַפְשָׁהּ
  english_pob_choice: has enlarged its throat
  chosen_spanish: ha ensanchado su garganta
  alternatives_spanish:
  - ha ensanchado su apetito
  - ha ensanchado su alma
  - ha abierto su interior
  lexicon: HALOT
  rationale: El hebreo dice literalmente que ha 'ensanchado su nefesh'. Dado el paralelismo con 'ha abierto su boca' y el cuadro de devorar, 'garganta' expresa mejor en español la imagen corporal concreta que 'alma' o 'apetito', sin forzar una paráfrasis excesiva.
- source_word: וּפָעֲרָה פִיהָ
  english_pob_choice: and opened its mouth
  chosen_spanish: y ha abierto su boca
  alternatives_spanish:
  - y ha abierto de par en par su boca
  - y ha desencajado su boca
  lexicon: HALOT
  rationale: '''Abrir su boca'' reproduce de manera clara y digna la acción devoradora. Se evita una intensificación innecesaria en español, ya que el ensanchamiento previo de la garganta ya comunica el gesto de abrir ampliamente.'
- source_word: לִבְלִי חֹק
  english_pob_choice: without measure
  chosen_spanish: sin medida
  alternatives_spanish:
  - sin límite
  - sin restricción
  - sin regla
  lexicon: HALOT
  rationale: '''Sin medida'' conserva el valor poético e idiomático del hebreo y evita leer חֹק como ''decreto'' en este contexto. En español suena natural y mantiene la amplitud ilimitada del acto.'
- source_word: וְיָרַד
  english_pob_choice: go down
  chosen_spanish: descienden
  alternatives_spanish:
  - desciende
  - bajan
  - caen
  lexicon: HALOT
  rationale: Se usa el plural 'descienden' para reflejar con naturalidad en español el sujeto compuesto final ('su esplendor, su multitud, su estruendo y quien se regocija en ella'), manteniendo la fuerza de descenso al Seol.
- source_word: הֲדָרָהּ
  english_pob_choice: her splendor
  chosen_spanish: su esplendor
  alternatives_spanish:
  - su majestad
  - su nobleza
  - su pompa
  lexicon: HALOT
  rationale: '''Esplendor'' comunica la gloria o magnificencia de la ciudad sin arcaísmo innecesario. Conserva el tono elevado del texto y funciona bien con los demás sustantivos del hemistiquio.'
- source_word: הֲמוֹנָהּ
  english_pob_choice: her multitude
  chosen_spanish: su multitud
  alternatives_spanish:
  - su muchedumbre
  - su gente
  - su tropel
  lexicon: HALOT
  rationale: '''Multitud'' mantiene el valor colectivo del término hebreo y el paralelismo poético con los demás elementos del juicio. Es más neutro y auditable que opciones más interpretativas.'
- source_word: וּשְׁאוֹנָהּ
  english_pob_choice: her uproar
  chosen_spanish: su estruendo
  alternatives_spanish:
  - su bullicio
  - su tumulto
  - su ruido
  lexicon: HALOT
  rationale: '''Estruendo'' traduce bien la idea de ruido fuerte y agitación pública, y encaja con el contexto de vida ostentosa y revuelta. En español suena más grave y más amplio que ''ruido'' o ''bullicio''.'
- source_word: וְעָלֵז בָּהּ
  english_pob_choice: and the one who exults in her
  chosen_spanish: y quien se regocija en ella
  alternatives_spanish:
  - y el que se alegra en ella
  - y el que exulta en ella
  - y el que festeja en ella
  lexicon: HALOT
  rationale: Se mantiene el participio singular con una construcción española natural ('quien se regocija en ella'). 'Regocijarse' conserva el matiz de celebración gozosa, aunque el contexto de juicio sugiere ironía.
theological_decisions:
- issue: Tratamiento de שְׁאוֹל como realidad personificada del mundo de los muertos
  english_pob_reading: Sheol is the realm of the dead; here it is personified as opening its mouth to swallow the city's glory and revelers.
  chosen_spanish_reading: Seol es el ámbito de los muertos; aquí está personificado como una boca devoradora que engulle el esplendor y a los festejantes de la ciudad.
  alternative_spanish_readings:
  - el sepulcro
  - la muerte
  - el lugar de los muertos
  rationale: 'Se conserva la tensión poética y teológica del texto: no se reduce Seol a la sepultura física ni a un concepto abstracto de muerte. La personificación es parte esencial del juicio proclamado y de la imaginería del verso.'
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor de לִבְלִי חֹק en el marco de juicio poético
  english_pob_reading: Without measure may also be rendered without limit.
  chosen_spanish_reading: sin medida; también podría expresarse como sin límite.
  alternative_spanish_readings:
  - sin límite
  - sin restricción
  - sin medida alguna
  rationale: El hebreo admite un sentido de amplitud ilimitada. 'Sin medida' es la forma principal porque suena natural en español y preserva la imagen poética; 'sin límite' queda como alternativa válida sin desplazar el matiz principal.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción sigue de cerca el ajuste final del inglés auditado, que reordenó el cierre para que el verbo de descenso rija de forma natural sobre el sujeto compuesto. En español, se reflejó esa misma estructura con 'descienden' y una enumeración final clara, sin introducir cambios léxicos adicionales no justificados por el hebreo.
  spanish_consistency_notes:
  - Se conservó 'Seol' como transliteración técnica coherente con la política POB para שְׁאוֹל.
  - Se mantuvo 'sin medida' como equivalente principal de לִבְלִי חֹק, evitando convertir חֹק en un término legal no requerido por el contexto.
  - Se eligió 'garganta' para נַפְשָׁהּ siguiendo la imagen corporal sugerida por el paralelismo y evitando 'alma' en el texto principal.
  - El plural verbal 'descienden' se usa para acomodar naturalmente en español el sujeto plural final, respetando el contenido del hebreo sin rigidizar la sintaxis.
