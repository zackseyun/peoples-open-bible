review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y el rastro inglés en la secuencia militar/geográfica: subida, campamento frente a Dotaim, envío de un destacamento hacia el sur y el oriente, localización de Egrebel cerca de Chus junto al wadi Mochmur, y luego el resto del ejército asirio en la llanura cubriendo la tierra. Sin embargo, hay dos desajustes importantes: el marcador de nota [a] está anclado en ''Dotaim'' cuando la nota trata ''oriente/naciente'', y la nota [b] está anclada en ''multitud muy grande'' cuando en realidad explica ''wadi''. Además, ''el resto del ejército de Asiria'' suena algo menos preciso que ''del ejército asirio'', y ''quedaron acampados'' aplicado a tiendas y bagaje es menos natural que una formulación como ''se extendieron''.'
  spanish_quality_summary: El español es en general legible y digno, pero presenta problemas de naturalidad y de anclaje de notas. 'Y enviaron de entre ellos hacia el sur y el oriente' es comprensible, aunque 'enviaron a algunos de los suyos' fluye mejor en español y recoge la implicación contextual ya reconocida por el POB inglés. La frase 'sus tiendas y su bagaje quedaron acampados en una multitud muy grande' resulta poco idiomática, porque tiendas y bagaje no 'quedan acampados' naturalmente; conviene reformularla para expresar la vasta extensión del campamento sin perder el énfasis numérico del griego.
  glossary_alignment: No hay términos teológicos clave del glosario general en este versículo. Los topónimos se manejan de forma básicamente fiel. 'Chus' y 'Mochmur' son aceptables como adaptaciones españolas documentadas en las decisiones léxicas. 'Wadi' es admisible si va acompañado de nota cultural, pero la nota debe anclarse en 'wadi'.
  issues:
  - severity: high
    issue: Los marcadores de notas están colocados en palabras equivocadas.
    rationale: La nota [a] explica 'oriente/naciente', pero está puesta en 'Dotaim'; la nota [b] explica 'wadi', pero está puesta en 'multitud muy grande'. Esto rompe la correspondencia exigida entre texto y notas.
  - severity: medium
    issue: '''Quedaron acampados'' con ''sus tiendas y su bagaje'' suena poco natural en español.'
    rationale: Aunque intenta reflejar κατεστρατοπέδευσαν, en español esa combinación resulta torpe. Conviene expresar que las tiendas y el bagaje se extendían o estaban instalados en enorme cantidad, conservando el sentido militar y el énfasis numérico.
  - severity: medium
    issue: '''Enviaron de entre ellos'' es demasiado literal y menos claro que una formulación idiomática.'
    rationale: El griego implica un destacamento sacado de sus filas. 'Enviaron a algunos de los suyos' mantiene el sentido sin rigidez innecesaria.
  - severity: low
    issue: '''Ejército de Asiria'' es entendible, pero ''ejército asirio'' encaja mejor con el griego y el español natural.'
    rationale: τῶν Ἀσσυρίων califica la fuerza militar; en español adjetival, 'ejército asirio' suena más directo y natural.
