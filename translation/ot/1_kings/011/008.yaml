id: 1KI.11.8
reference: 1 Kings 11:8
source:
  edition: WLC
  text: וְ/כֵ֣ן עָשָׂ֔ה לְ/כָל נָשָׁ֖י/ו הַ/נָּכְרִיּ֑וֹת מַקְטִיר֥וֹת וּֽ/מְזַבְּח֖וֹת לֵ/אלֹהֵי/הֶֽן־׃
translation:
  text: And so he did for all his foreign wives[a], who were burning incense and sacrificing to their gods.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And likewise he did for all his foreign wives.' The Hebrew leaves the specific action implicit, referring back to the previous verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֵן
  chosen: And so
  alternatives:
  - And likewise
  - And in the same way
  lexicon: HALOT
  rationale: Introduces continuation from the previous verse, indicating Solomon acted similarly for the rest of his foreign wives. 'And so' is natural modern English while preserving the connective force.
- source_word: עָשָׂה
  chosen: he did
  alternatives:
  - he made
  - he acted
  lexicon: HALOT
  rationale: The verb is broad ('do/make'). Here it refers back to the action just described in context, so 'he did' best preserves the elliptical Hebrew without over-specifying beyond the source text.
- source_word: לְכָל
  chosen: for all
  alternatives:
  - to all
  lexicon: HALOT
  rationale: The preposition with 'all' is best rendered 'for all' in this context, indicating Solomon provided similar accommodations for each of them.
- source_word: נָשָׁיו
  chosen: his wives
  alternatives:
  - his women
  lexicon: HALOT
  rationale: The noun clearly refers to wives in context, not women generally.
- source_word: הַנָּכְרִיּוֹת
  chosen: foreign
  alternatives:
  - strange
  - alien
  - from other nations
  lexicon: HALOT
  rationale: Describes wives from outside Israel. 'Foreign' is clear, idiomatic, and avoids archaic 'strange'.
- source_word: מַקְטִירוֹת
  chosen: burning incense
  alternatives:
  - offering smoke
  - making offerings by fire
  lexicon: HALOT
  rationale: The Hiphil participle of קטר commonly refers to burning incense or making smoke offerings. In this cultic context, 'burning incense' is the most natural and specific rendering.
- source_word: וּמְזַבְּחוֹת
  chosen: and sacrificing
  alternatives:
  - and offering sacrifices
  lexicon: HALOT
  rationale: The participle from זבח denotes sacrificial activity. 'And sacrificing' is concise and preserves the participial sense linked with the previous verb.
- source_word: לֵאלֹהֵיהֶן
  chosen: to their gods
  alternatives:
  - to their god(s)
  lexicon: HALOT
  rationale: The plural form with feminine plural suffix naturally refers to the deities worshiped by the wives. Lowercase 'gods' reflects that these are not the God of Israel.
