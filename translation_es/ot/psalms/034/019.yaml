review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: Yahvé está cerca de los quebrantados de corazón y salva a los aplastados/quebrantados en espíritu. Conserva correctamente el nombre divino y el valor salvífico de יוֹשִׁיעַ. Sin embargo, la nota al pie no coincide con el anclaje textual: el marcador [a] está colocado en «quebrantados de corazón», pero la alternativa documentada en el POB inglés corresponde a דַּכְּאֵי רוּחַ, no a לְנִשְׁבְּרֵי לֵב.'
  spanish_quality_summary: El español es claro y digno. «Está cerca de» y «quebrantados de corazón» suenan naturales y fieles. «Los que tienen el espíritu aplastado» es comprensible, pero algo más perifrástico y menos elegante que «los quebrantados en espíritu» o «los de espíritu aplastado». Aun así, el problema principal es de ubicación y contenido de la nota, no de inteligibilidad.
  glossary_alignment: 'Se alinea bien con la terminología del proyecto: יְהוָה → «Yahvé», יוֹשִׁיעַ → «salva», y רוּחַ → «espíritu». También respeta la decisión teológica de no forzar una lectura penitencial en דַּכְּאֵי רוּחַ. Conviene que la nota alternativa se aplique a la frase correcta y que en español la alternativa tradicional se formule de manera idiomática como «los contritos en espíritu» o «los contritos de espíritu».'
  issues:
  - severity: high
    issue: La nota al pie está anclada a la frase equivocada.
    rationale: En el POB inglés, la nota «Or 'those contrite in spirit'» explica דַּכְּאֵי רוּחַ («those crushed in spirit»), no «the brokenhearted». En el borrador español, [a] aparece en «quebrantados de corazón», lo que distorsiona la evidencia fuente y el rastro de auditoría.
  - severity: medium
    issue: La redacción principal de דַּכְּאֵי רוּחַ es algo perifrástica.
    rationale: «Los que tienen el espíritu aplastado» transmite bien el sentido, pero «los quebrantados en espíritu» suena más compacto, poético y bíblico en español, y mantiene mejor el paralelismo con «quebrantados de corazón» sin perder la fuerza del hebreo.
  - severity: low
    issue: La formulación de la alternativa en la nota puede afinarse.
    rationale: «Los contritos de espíritu» es entendible, pero «los contritos en espíritu» suena más natural para muchos lectores contemporáneos y se acerca mejor a la construcción inglesa «contrite in spirit». No es un error grave.
  revised_spanish_text: Yahvé está cerca de los quebrantados de corazón, y salva a los quebrantados en espíritu[a].
  revised_footnotes:
  - marker: a
    text: O «los contritos en espíritu». El hebreo puede describir a quienes están interiormente aplastados o humillados.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para que corresponda a דַּכְּאֵי רוּחַ, conforme al hebreo y al POB inglés. También se ajusta la frase principal a «los quebrantados en espíritu» para lograr un español más natural y poético, manteniendo la intensidad del hebreo sin imponer una lectura exclusivamente penitencial.
