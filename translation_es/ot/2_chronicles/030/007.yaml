review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la prohibición, el paralelismo «padres/hermanos», la infidelidad a Yahvé y la cláusula final «como ustedes ven». Sin embargo, «los entregó a la desolación» no preserva con suficiente precisión la decisión auditada del POB para וַיִּתְּנֵם לְשַׁמָּה, que apunta a un resultado equivalente a «los hizo una desolación» / «los convirtió en desolación», no a una entrega a un estado externo.
  spanish_quality_summary: El español es claro y legible, con buen registro bíblico moderno. No obstante, «entregó a la desolación» suena algo interpretativo y menos directo que el hebreo. Una formulación como «los hizo una desolación» conserva mejor el sustantivo y el valor resultativo, aunque conviene suavizar con nota para el matiz de horror/asombro ya documentado.
  glossary_alignment: 'Buen uso de «Yahvé» según la norma del proyecto. «Fueron infieles» para מָעֲלוּ está bien. La principal desalineación es terminológica/sintáctica en וַיִּתְּנֵם לְשַׁמָּה: el borrador se aparta de la racionalidad documentada del POB al escoger «entregó».'
  issues:
  - severity: medium
    issue: «y él los entregó a la desolación» se aleja de la decisión auditada «he made them a desolation»
    rationale: 'Aunque נתן puede a veces expresar entrega, aquí la documentación del POB privilegia un sentido causativo/resultativo con לְשַׁמָּה. «Entregó a la desolación» introduce una imagen distinta: entrega a un estado, más que convertirlos en desolación/objeto de espanto.'
  - severity: low
    issue: La nota al pie está anclada en «hermanos[a]», pero semánticamente comenta «desolación»
    rationale: El marcador funciona técnicamente, pero en español sería más natural asociar la nota al término comentado para evitar ambigüedad de referencia.
  revised_spanish_text: No sean como sus padres ni como sus hermanos, que fueron infieles a Yahvé, el Dios de sus padres, y él los hizo desolación[a], como ustedes ven.
  revised_footnotes:
