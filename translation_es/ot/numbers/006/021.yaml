translation:
  language: es
  text: Esta es la ley del nazareo que promete su ofrenda a Yahvé por su nazareato, además de lo que alcance su mano[a]. Conforme al voto que hace, así hará, según la ley de su nazareato.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «además de lo que pueda costear»; literalmente, «además de lo que su mano pueda alcanzar».
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹרַת
  english_pob_choice: the law of
  chosen_spanish: la ley de
  alternatives_spanish:
  - la instrucción de
  - la regulación de
  lexicon: HALOT
  rationale: En este contexto legal, תּוֹרָה designa la norma que rige el caso del nazareo. «Ley de» conserva el valor normativo y la cadencia jurídica que el POB inglés documenta.
- source_word: הַנָּזִיר
  english_pob_choice: the Nazirite
  chosen_spanish: el nazareo
  alternatives_spanish:
  - el consagrado
  - el dedicado
  lexicon: HALOT
  rationale: El término técnico hebreo se refiere a la persona bajo este voto especial. «Nazareo» es el equivalente español estable para ese estado/voto y conserva la categoría técnica mejor que una paráfrasis.
- source_word: אֲשֶׁר יִדֹּר
  english_pob_choice: who vows
  chosen_spanish: que hace voto
  alternatives_spanish:
  - que promete
  - que hace una promesa
  lexicon: HALOT
  rationale: El verbo expresa el acto formal de votar. «Hace voto» mantiene el carácter jurídico-religioso del hebreo y evita suavizarlo en exceso.
- source_word: קָרְבָּנוֹ
  english_pob_choice: his offering
  chosen_spanish: su ofrenda
  alternatives_spanish:
  - su oblación
  - su don
  lexicon: HALOT
  rationale: קָרְבָּן es una ofrenda presentada a Dios. «Ofrenda» es la equivalencia más clara y sobria en español bíblico contemporáneo.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  lexicon: HALOT
  rationale: 'Se sigue la convención editorial del proyecto: יהוה se vierte «Yahvé» en el texto principal. La preposición hebrea marca dirección/dedicación, por lo que «a Yahvé» resulta natural y fiel.'
- source_word: עַל נִזְרוֹ
  english_pob_choice: for his Nazirite vow
  chosen_spanish: por su nazareato
  alternatives_spanish:
  - por su consagración nazarea
  - por su separación nazarea
  lexicon: HALOT
  rationale: נֵזֶר aquí remite al estado o voto de separación del nazareo. «Nazareato» preserva la relación con el término técnico y permite distinguirlo de la mera ofrenda.
- source_word: מִלְּבַד אֲשֶׁר תַּשִּׂיג יָדוֹ
  english_pob_choice: besides what his hand can afford
  chosen_spanish: además de lo que alcance su mano
  alternatives_spanish:
  - además de lo que pueda obtener
  - aparte de lo que le alcancen sus medios
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y alude a la capacidad o recursos disponibles. «Lo que alcance su mano» conserva la imagen original; «además de» refleja la relación aditiva que el POB inglés señala con «besides».
- source_word: כְּפִי נִדְרוֹ
  english_pob_choice: According to the vow
  chosen_spanish: Conforme al voto
  alternatives_spanish:
  - Según el voto
  - De acuerdo con el voto
  lexicon: HALOT
  rationale: כְּפִי indica conformidad con el contenido del voto. «Conforme al voto» mantiene el tono legal y evita duplicar innecesariamente la formulación.
- source_word: אֲשֶׁר יִדֹּר
  english_pob_choice: that he vows
  chosen_spanish: que hace
  alternatives_spanish:
  - que vota
  - que promete
  lexicon: HALOT
  rationale: La repetición subraya el carácter vinculante del voto. Se conserva la reiteración, pero en español se evita una repetición torpe usando «que hace» en el mismo campo semántico de voto.
- source_word: כֵּן יַעֲשֶׂה
  english_pob_choice: so he shall do
  chosen_spanish: así hará
  alternatives_spanish:
  - así debe hacer
  - así lo hará
  lexicon: HALOT
  rationale: La fórmula legal expresa obligación correspondiente al voto. «Así hará» conserva la tersura formal y la fuerza normativa del hebreo.
- source_word: עַל תּוֹרַת נִזְרוֹ
  english_pob_choice: according to the law of his Nazirite vow
  chosen_spanish: según la ley de su nazareato
  alternatives_spanish:
  - conforme a la ley de su consagración
  - según la regulación de su nazareato
  lexicon: HALOT
  rationale: La frase final retoma la norma rectora del caso. «Ley de su nazareato» mantiene la correspondencia con תּוֹרָה y con el término técnico del versículo.
theological_decisions:
- issue: Rendering the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton, no un sustituto. Conforme a la terminología editorial del proyecto, se traduce como «Yahvé» en el cuerpo del texto para mantener la transparencia hacia la forma original.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El contexto en inglés fue revisado y quedó sin cambios sustantivos; se mantuvo la decisión de tratar la expresión idiomática de la «mano» como capacidad/recursos, pero en español se conservó la imagen hebrea con una formulación natural. No se detectaron variantes textuales relevantes en el paquete fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה, en coherencia con la política del proyecto.
  - «Nazareo» y «nazareato» se usan de forma consistente para el término técnico del capítulo.
  - «Ofrenda» y «ley» sostienen el registro legal-cultual sin introducir paráfrasis doctrinales.
  - La imagen de la «mano» se conserva para reflejar el hebraísmo, pero la construcción española sigue siendo idiomática.
