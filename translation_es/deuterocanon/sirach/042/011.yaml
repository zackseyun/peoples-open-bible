translation:
  language: es
  text: Mantén una vigilancia estricta sobre tu hija virgen[a], para que no te haga un nombre vergonzoso, habladuría de la ciudad y maldición del pueblo[c][b], y te siente en la asamblea a la puerta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo «un nombre de deshonra» también puede traducirse «un mal nombre» o «una reputación vergonzosa». El paralelo griego amplía la idea hacia la burla pública.
    reason: lexical_alternative
  - marker: b
    text: La última cláusula es difícil en hebreo. Literalmente, habla de hacerte sentar «en la reunión/multitud a la puerta». La puerta era el lugar público de asamblea y juicio. El paralelo griego también apunta a vergüenza pública ante una multitud.
    reason: cultural_note
  - marker: c
    text: 'Masada conserva la redacción más breve: «Sobre una hija mantén vigilancia; habladuría en la ciudad y asamblea del pueblo ...», mientras que el texto de la Guenizá de El Cairo aquí es más amplio.'
    reason: textual_variant
lexical_decisions:
- source_word: בני / ἐπὶ ... στερέωσον φυλακήν
  english_pob_choice: Keep a strict watch
  chosen_spanish: Mantén una vigilancia estricta
  alternatives_spanish:
  - Guarda con firme vigilancia
  - Sostén una guardia estricta
  lexicon: HALOT; LXX στερεόω + φυλακή
  rationale: El hebreo imperativo con משמר y el griego con στερέωσον φυλακήν expresan intensificación de la vigilancia. «Mantén una vigilancia estricta» conserva el mandato y la fuerza idiomática en español sin volverse mecánico.
- source_word: בתולתך / θυγατρὶ ἀδιατρέπτῳ
  english_pob_choice: your virgin daughter
  chosen_spanish: tu hija virgen
  alternatives_spanish:
  - tu hija doncella
  - tu hija no casada
  lexicon: HALOT; LXX ἀδιατρέπτῳ
  rationale: La referencia apunta a una hija en condición de virginidad/Doncellez; «hija virgen» mantiene la carga social y sexual del término mejor que una expresión más amplia o eufemística.
- source_word: שם סרה
  english_pob_choice: a byword of disgrace
  chosen_spanish: objeto de burla
  alternatives_spanish:
  - nombre vergonzoso
  - reputación vergonzosa
  lexicon: HALOT
  rationale: El hebreo habla de un nombre/reputación dañada; la versión inglesa opta por una fórmula de oprobio público. En español, «objeto de burla» comunica esa deshonra social de manera natural, y el contexto añade el componente de public shame.
- source_word: ἐπίχαρμα ἐχθροῖς
  english_pob_choice: a byword of disgrace
  chosen_spanish: objeto de burla de los enemigos
  alternatives_spanish:
  - alegría para los enemigos
  - motivo de risa para los enemigos
  lexicon: LSJ; contexto LXX
  rationale: Aunque el hebreo base habla de deshonra, el griego explicita la reacción de los enemigos. Se conserva esta tensión como ampliación interpretativa útil sin sustituir el eje hebreo de vergüenza pública.
- source_word: דבת עיר
  english_pob_choice: a gossip of the city
  chosen_spanish: habladuría de la ciudad
  alternatives_spanish:
  - chisme de la ciudad
  - mala fama en la ciudad
  lexicon: HALOT
  rationale: דבה designa rumor, calumnia o chisme. «Habladuría de la ciudad» es idiomático y mantiene el matiz de rumor público, cercano al inglés auditado.
- source_word: וקללת עם
  english_pob_choice: a curse of the people
  chosen_spanish: maldición del pueblo
  alternatives_spanish:
  - maldición entre el pueblo
  - objeto de maldición del pueblo
  lexicon: HALOT
  rationale: La expresión nominal indica convertirse en objeto de maldición o denuesto comunitario. «Maldición del pueblo» preserva la concisión y la fuerza pública de la frase.
- source_word: והושיבתך בעדר שער
  english_pob_choice: and seat you in the assembly at the gate
  chosen_spanish: y te siente en la asamblea a la puerta
  alternatives_spanish:
  - y te coloque en la reunión a la puerta
  - y te haga sentar en la congregación a la puerta
  lexicon: HALOT; cultural gate assembly
  rationale: El hebreo es difícil, y la imagen de la puerta como lugar de reunión cívica/judicial se conserva. «Asamblea a la puerta» refleja el sitio público sin explicar más de lo que el texto exige.
theological_decisions:
- issue: Base hebrea con apoyo del griego para la ampliación de la vergüenza pública
  english_pob_reading: Translate from the Cairo Geniza Hebrew, with the Greek used to clarify the public-shame sequence and the difficult gate clause.
  chosen_spanish_reading: Traducir desde el hebreo conservado, permitiendo que el griego ilumine la secuencia de deshonra pública y el final oscuro sobre la puerta.
  alternative_spanish_readings:
  - 'Seguir más de cerca el griego: «que te haga objeto de burla para los enemigos... y te avergüence ante mucha gente»'
  - 'Hacer la cláusula final más literal pero opaca: «y te siente en el grupo de la puerta»'
  rationale: Sirácida debe traducirse primariamente desde el hebreo cuando se conserva. Aquí el griego confirma el tema de vergüenza pública y ayuda a entender la cláusula final, pero no debe desplazar el núcleo hebreo de deshonra y rumor público.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirach desde el hebreo donde se conserva; usar el paralelo griego como entrada real'
- issue: Conservar la tensión entre nombre/reputación y burla pública
  english_pob_reading: a byword of disgrace / gossip of the city / a curse of the people
  chosen_spanish_reading: objeto de burla / habladuría de la ciudad / maldición del pueblo
  alternative_spanish_readings:
  - nombre vergonzoso / chisme de la ciudad / objeto de maldición
  - mala fama / rumor urbano / denuesto del pueblo
  rationale: 'El hebreo contiene varias capas: nombre avergonzado, rumor público y maldición comunitaria. La traducción española conserva esa progresión sin nivelarla en una sola idea genérica de ''vergüenza''.'
  doctrine_reference: 'Principio POB: no borrar tensiones léxicas o semánticas documentadas'
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail: se mantuvo la secuencia de frases en paralelo, se evitó un guion explicativo entre cláusulas y se prefirieron preposiciones que reflejan mejor el hebreo y el carácter público de la vergüenza. La traducción española conserva el orden del original y la ambigüedad de la cláusula final sin sobreexplicarla.'
  spanish_consistency_notes:
  - Se emplea «virgen» para בתולה, conforme al valor léxico central del término.
  - Se usa «Yahvé» solo cuando el texto lo exija; este versículo no contiene el nombre divino.
  - «Asamblea a la puerta» preserva el espacio cívico/judicial implícito sin introducir terminología eclesiástica.
  - Se evita «siervo» o vocabulario teológico ajeno, porque el pasaje trata de honra familiar y control social.
  - La puntuación separa las cláusulas con comas para reflejar el paralelismo acumulativo del hebreo y del griego.
