translation:
  language: es
  text: 'Y sus hermanos, por sus clanes[a], en el registro genealógico de sus generaciones: el jefe era Jeiel, y Zacarías.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando fueron inscritos según sus generaciones».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶחָיו
  english_pob_choice: And his brothers
  chosen_spanish: Y sus hermanos
  alternatives_spanish:
  - Y sus parientes
  - Y sus familiares
  lexicon: HALOT
  rationale: En contextos genealógicos, אָח puede abarcar hermanos o parientes masculinos del mismo linaje. «Hermanos» conserva la relación de parentesco más directa y mantiene el registro genealógico sin ampliar indebidamente a un sentido más general.
- source_word: לְמִשְׁפְּחֹתָיו
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus clanes
  - por sus familias
  lexicon: HALOT
  rationale: מִשְׁפָּחָה en listas tribales se refiere mejor a «clan» que a la familia doméstica moderna. «Por sus clanes» refleja la agrupación genealógica y conserva la fuerza distributiva del hebreo.
- source_word: בְּהִתְיַחֵשׂ
  english_pob_choice: in the genealogy of their generations
  chosen_spanish: en la genealogía
  alternatives_spanish:
  - cuando fueron inscritos en la genealogía
  - en su registro genealógico
  lexicon: HALOT
  rationale: El hitpael de יחס en Crónicas alude al registro o inscripción genealógica. En español, «en la genealogía» reproduce bien la idea documental sin forzar una cláusula temporal que el hebreo no exige explícitamente en esta forma de revisión.
- source_word: לְתֹלְדוֹתָם
  english_pob_choice: by their generations
  chosen_spanish: de sus generaciones
  alternatives_spanish:
  - según sus generaciones
  - en sus generaciones
  lexicon: HALOT
  rationale: תּוֹלְדוֹת aquí señala líneas de descendencia o registros generacionales. «De sus generaciones» mantiene la referencia a linaje y descendencia de manera natural en español bíblico contemporáneo.
- source_word: הָרֹאשׁ
  english_pob_choice: the chief was
  chosen_spanish: el jefe era
  alternatives_spanish:
  - el principal era
  - el cabeza era
  lexicon: HALOT
  rationale: רֹאשׁ puede significar cabeza, jefe o líder. «Jefe» comunica mejor la función de preeminencia en una lista genealógica y evita un calco menos natural como «cabeza».
- source_word: יְעִיאֵל
  english_pob_choice: Jeiel
  chosen_spanish: Jeiel
  alternatives_spanish:
  - Jeiél
  lexicon: Convención onomástica bíblica
  rationale: Se translitera el nombre propio según el uso bíblico estándar en español para asegurar reconocimiento y continuidad con la tradición de nombres propios, sin introducir una forma artificial.
- source_word: וּזְכַרְיָהוּ
  english_pob_choice: and Zechariah
  chosen_spanish: y Zacarías
  alternatives_spanish:
  - y Zekarías
  - y Zacaríahu
  lexicon: Convención onomástica bíblica
  rationale: «Zacarías» es la forma establecida y ampliamente reconocible en español bíblico. Aunque la forma hebrea completa refleja -yahu, la transliteración tradicional española ofrece claridad y lectura natural.
theological_decisions:
- issue: Sentido de la relación genealógica y de la inscripción
  english_pob_reading: in the genealogy of their generations
  chosen_spanish_reading: en la genealogía de sus generaciones
  alternative_spanish_readings:
  - cuando fueron inscritos en la genealogía de sus generaciones
  - en su registro genealógico
  rationale: No hay carga doctrinal compleja, pero sí una tensión lexical entre ubicación estática y acto de inscripción. «En la genealogía» conserva el valor documental del pasaje sin afirmar más de lo que el hebreo y la revisión inglesa sostienen.
  doctrine_reference: Crónicas; registro genealógico tribal
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que sustituyó una formulación temporal más explícita por «in the genealogy of their generations». Por eso el español evita enfatizar «cuando» y opta por una construcción documental más cercana al estado del texto revisado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general cuando aparezca el nombre divino; aquí no hay incidencia.
  - Los nombres propios se presentan en formas españolas bíblicamente reconocibles.
  - «Clanes» se usa con sentido genealógico/tribal, no moderno sociológico.
  - La puntuación con dos puntos conserva la estructura enumerativa del hebreo y del inglés auditado.
