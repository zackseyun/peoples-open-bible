review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: Yahvé como nombre divino, fórmula de pacto ‘su Dios’, mandato reflexivo de consagración, vínculo teológico entre la santidad de Yahvé y la del pueblo, y prohibición de contaminación por criaturas terrestres. Sin embargo, el cierre español no preserva con suficiente precisión la distinción léxica entre שׁרץ (‘ser que pulula/repta’) y רמשׂ (‘que se mueve’). ‘animal que se arrastra’ fusiona ambos elementos en una sola imagen de arrastrarse y además estrecha innecesariamente el referente.'
  spanish_quality_summary: El español es claro y digno, pero ‘Y no se contaminarán’ suena menos natural y menos directamente exhortativo que ‘Y no se contaminen’. Además, la nota al pie actual repite prácticamente la misma forma que el texto y no refleja bien la alternativa documentada en el POB inglés. Una ligera revisión mejora fidelidad y legibilidad.
  glossary_alignment: 'Alineación general buena: ‘Yahvé’ respeta la política del nombre divino; ‘conságrense’ y ‘sean santos’ conservan el campo léxico de קדשׁ; se evita ‘almas’ para נַפְשֹׁתֵיכֶם, correctamente idiomático. El punto a corregir es שׁרץ/רמשׂ: conviene una formulación como ‘todo ser que pulula y se mueve sobre la tierra’ o equivalente, para no sustituir el término específico por ‘animal que se arrastra’.'
  issues:
  - severity: medium
    issue: La cláusula final ‘con ningún animal que se arrastra’ no representa bien שׁרץ + הָרֹמֵשׂ.
    rationale: El hebreo distingue entre ‘todo ser que pulula/repta’ (שׁרץ) y ‘que se mueve’ (רמשׂ). La versión actual reduce ambos a ‘animal que se arrastra’, lo que pierde precisión léxica y comprime dos elementos en uno solo.
  - severity: medium
    issue: El futuro prohibitivo ‘no se contaminarán’ es menos natural que un imperativo negativo en español bíblico actual.
    rationale: Aunque el inglés auditado usa ‘you shall not’ por registro, en español eclesial contemporáneo ‘no se contaminen’ comunica mejor la fuerza exhortativa del hebreo sin perder dignidad.
  - severity: low
    issue: La nota [a] no conserva bien la alternativa auditada y su redacción es confusa.
    rationale: La nota dice ‘O se contaminarán’, que no ofrece una alternativa real frente al texto negativo ni refleja la opción auditada ‘no se hagan impuros / no se vuelvan impuros’. Debe reformularse con una alternativa léxica útil.
  revised_spanish_text: Porque yo soy Yahvé, su Dios. Por tanto, conságrense[a] y sean santos, porque yo soy santo. Y no se contaminen[b] con ningún ser que pulula y se mueve sobre la tierra.
  revised_footnotes:
  - marker: a
    text: O ‘Santifíquense’. El verbo hebreo es reflexivo y expresa apartarse ustedes mismos como santos.
    reason: lexical_alternative
  - marker: b
    text: O ‘no se hagan impuros con ningún ser que pulula sobre la tierra’.
    reason: lexical_alternative
  revision_rationale: Se ajusta la cláusula final para reflejar mejor la distinción hebrea entre שׁרץ y רמשׂ, se mejora la naturalidad del prohibitivo en español, y se corrigen las notas para que presenten alternativas reales y alineadas con la auditoría inglesa.
