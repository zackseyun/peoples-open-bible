translation:
  language: es
  text: Con el puro te muestras puro[a], y con el torcido te muestras torcido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te muestras astuto» o «desbaratas al torcido». El hebreo usa un juego recíproco de palabras: Dios trata con el torcido de una manera que corresponde a su torcedura y la revierte, no que él mismo sea moralmente torcido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָבָר
  english_pob_choice: pure
  chosen_spanish: puro
  alternatives_spanish:
  - limpio
  - sin culpa
  - íntegro
  lexicon: HALOT
  rationale: El adjetivo expresa pureza/moralidad y, en español, 'puro' es natural y conserva el juego de palabras con el verbo de la misma raíz en la línea siguiente.
- source_word: תִּתְבָּרָר
  english_pob_choice: you show yourself pure
  chosen_spanish: te muestras puro
  alternatives_spanish:
  - te demuestras puro
  - te revelas puro
  - te manifiestas puro
  lexicon: HALOT
  rationale: El hitpael tiene valor reflexivo/resultativo. 'Te muestras puro' mantiene la relación recíproca del verso y el paralelismo con נָבָר, sin volverlo una simple descripción estática.
- source_word: עִקֵּשׁ
  english_pob_choice: crooked
  chosen_spanish: torcido
  alternatives_spanish:
  - perverso
  - retorcido
  - corrupto
  lexicon: HALOT
  rationale: Aunque 'torcido' es menos moralizante que 'perverso', en español conserva bien la imagen de alguien moralmente desviado y permite el paralelismo con el verbo siguiente.
- source_word: תִּתְפַּתָּל
  english_pob_choice: you show yourself twisted
  chosen_spanish: te muestras torcido
  alternatives_spanish:
  - te muestras astuto
  - vences con astucia
  - te conduces de forma retorcida
  lexicon: HALOT
  rationale: El hitpael de פתל puede implicar obrar con giros/torsión. En este contexto poético, 'te muestras torcido' conserva el impacto retórico y la correspondencia con 'torcido', sin afirmar una torcedura moral ontológica en Dios.
theological_decisions:
- issue: Reciprocidad poética aplicada a Dios en respuesta al torcido
  english_pob_reading: Retain the strong reciprocal wording 'you show yourself twisted' in the main text.
  chosen_spanish_reading: Mantener en el texto principal 'te muestras torcido'.
  alternative_spanish_readings:
  - te muestras astuto
  - vences con astucia
  - desbaratas al torcido
  rationale: 'El hebreo usa paralelismo recíproco: Dios se relaciona con cada clase de persona de un modo que corresponde a su carácter. Traducirlo suavemente perdería la tensión deliberada del versículo. La formulación se mantiene en el texto principal y se entiende de manera relacional/judicial, no como corrupción moral de Dios.'
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo directo y el criterio del POB en inglés: preservar el paralelismo puro/puro y torcido/torcido, manteniendo la tensión poética sin convertirla en una afirmación ontológica sobre la rectitud moral de Dios. No se hicieron cambios respecto del borrador previo del pasaje.'
  spanish_consistency_notes:
  - Se usa 'puro' y 'torcido' de forma consistente para sostener el juego de palabras de raíz y el paralelismo del versículo.
  - Se evitó 'SEÑOR' porque el versículo no contiene el tetragrámaton ni una cita directa del mismo.
  - '''Te muestras'' reproduce bien el valor reflexivo del hitpael en español bíblico moderno, sin sonar arcaico.'
