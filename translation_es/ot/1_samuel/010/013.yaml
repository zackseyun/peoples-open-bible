lexical_decisions:
- source_word: וַיְכַל
  english_pob_choice: When he had finished
  chosen_spanish: Cuando terminó
  alternatives_spanish:
  - Y terminó
  - Cuando había terminado
  lexicon: HALOT
  rationale: El hebreo expresa conclusión de una acción previa antes del siguiente movimiento narrativo. «Cuando terminó» reproduce bien ese valor temporal y resulta natural en español.
- source_word: מֵהִתְנַבּוֹת
  english_pob_choice: prophesying
  chosen_spanish: de profetizar
  alternatives_spanish:
  - de estar profetizando
  - de actuar como profeta
  lexicon: HALOT
  rationale: El infinitivo constructo con מן señala el cese de la actividad de profetizar. En español, «profetizar» conserva de forma directa la fuerza verbal del original sin recargar el texto.
- source_word: וַיָּבֹא
  english_pob_choice: he came
  chosen_spanish: fue
  alternatives_spanish:
  - vino
  - llegó
  lexicon: HALOT
  rationale: En este contexto narrativo, «fue» comunica el desplazamiento hacia el lugar mencionado. «Llegó» también sería posible, pero «fue» mantiene una transición simple y sobria sin añadir énfasis no explicitado.
- source_word: הַבָּמָה
  english_pob_choice: the high place
  chosen_spanish: la altura
  alternatives_spanish:
  - el lugar alto
  - el alto lugar
  - la colina santuario
  lexicon: HALOT
  rationale: La expresión hebrea designa un sitio elevado de culto. En español, «la altura» conserva la referencia al sitio elevado, pero es menos transparente que el término técnico. Se prefiere aquí una forma breve y readable, con nota para aclarar el sentido cultual.
theological_decisions:
- issue: Sentido cultual de הַבָּמָה
  english_pob_reading: the high place
  chosen_spanish_reading: la altura
  alternative_spanish_readings:
  - el lugar alto
  - la colina santuario
  - el lugar de culto alto
  rationale: El texto hebreo nombra un sitio elevado vinculado al culto, pero el versículo no exige resolver su valoración histórica o teológica. La traducción conserva la referencia espacial y deja la explicación del término para una nota, manteniendo la tensión documentada.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; readable modern Spanish, not archaic or academic.'
translation_notes:
  revision_awareness: El control de revisión inglés no introdujo cambios textuales; el español sigue la lectura estable del pasaje y conserva el contraste entre el cese de la profecía y el movimiento hacia el lugar alto.
  spanish_consistency_notes:
  - Se mantiene «profetizar» para נבא, en consonancia con el valor verbal del hebreo.
  - Se evita «SEÑOR» u այլ masking; no hay Tetragrámaton en este versículo.
  - «La altura» se entiende con la nota, preservando la referencia cultual sin sobreinterpretarla.
