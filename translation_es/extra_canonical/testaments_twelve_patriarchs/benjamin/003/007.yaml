base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/benjamin/003/007.yaml
  text: And thus Jacob cried out, “O good child, you have stirred the inward affection of Jacob your father”; and embracing him, he kept kissing him for two hours, saying,
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:07Z'
    unchanged: false
    changes_summary: 'Adjusted word order to more natural English: moved ''for two hours'' after ''he kept kissing him.'''
translation:
  language: es
  text: 'Y así clamó Jacob: «Oh hijo bueno, has conmovido las entrañas de Jacob tu padre»; y abrazándolo, lo seguía besando por dos horas, diciendo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐβόα
  english_pob_choice: cried out
  chosen_spanish: clamó
  alternatives_spanish:
  - exclamó
  - gritó
  lexicon: BDAG
  rationale: βοάω en imperfecto; 'clamar' tiene resonancia bíblica y registro elevado.
- source_word: ὦ τέκνον χρηστόν
  english_pob_choice: O good child
  chosen_spanish: Oh hijo bueno
  alternatives_spanish:
  - Oh hijo benigno
  - Oh hijo amable
  lexicon: BDAG
  rationale: χρηστός denota bondad/amabilidad de carácter; 'bueno' es claro y preserva el tono afectivo paterno.
- source_word: ἐνίκησας τὰ σπλάγχνα
  english_pob_choice: you have stirred the inward affection
  chosen_spanish: has conmovido las entrañas
  alternatives_spanish:
  - has vencido las entrañas
  - has cautivado el corazón
  lexicon: BDAG
  rationale: νικάω literalmente 'vencer'; aquí en sentido afectivo de cautivar/conmover. 'Conmovido las entrañas' conserva la imagen visceral del griego.
- source_word: σπλάγχνα
  english_pob_choice: inward affection
  chosen_spanish: entrañas
  alternatives_spanish:
  - el corazón
  - afecto entrañable
  lexicon: BDAG
  rationale: Conserva el sentido encarnado emocional mejor que 'corazón' plano.
- source_word: περιλαβών
  english_pob_choice: embracing
  chosen_spanish: abrazándolo
  alternatives_spanish:
  - tomándolo en sus brazos
  lexicon: BDAG
  rationale: Traducción simple y fiel del gesto físico.
- source_word: κατεφίλει
  english_pob_choice: kept kissing
  chosen_spanish: lo seguía besando
  alternatives_spanish:
  - lo besaba repetidamente
  - lo cubría de besos
  lexicon: BDAG
  rationale: El sentido imperfecto/intensivo es importante; 'lo seguía besando' conserva la acción repetida.
translation_notes:
  revision_awareness: El POB inglés fue revisado para mover 'for two hours' después de 'kept kissing him'. La versión española sigue 'lo seguía besando por dos horas'.
  spanish_consistency_notes:
  - Ἰακώβ → 'Jacob'
  - σπλάγχνα → 'entrañas'
  - καταφιλέω → 'seguir besando' (imperfecto intensivo)
