review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo y el rastro POB en la mayor parte: conserva las cuatro mesas, su propósito sacrificial, el material de piedra labrada/cortada, las medidas, la colocación de los implementos y la amplitud de זֶבַח como «sacrificio». Sin embargo, se aparta innecesariamente de la revisión inglesa auditada al usar el imperfecto habitual «ponían» donde el POB final decidió «placed». En español, aquí conviene un pasado descriptivo simple («pusieron» o mejor «colocaron») para reflejar con más cercanía la decisión auditada sin perder naturalidad.'
  spanish_quality_summary: El texto es claro y legible en español eclesial contemporáneo. «Mesas», «holocausto» y «sacrificio» funcionan bien. «Degollaban» es semánticamente fuerte y fiel, pero junto con «utensilios» suena algo áspero; aun así no es incorrecto. La nota b actual no aporta valor, porque solo repite el texto fuente sin resolver una ambigüedad ni preservar una alternativa significativa. También es preferible «colocaron» a «pusieron/ponían» por dignidad y precisión estilística.
  glossary_alignment: 'Alineación general buena con la terminología del proyecto: עֹלָה -> «holocausto», זֶבַח -> «sacrificio», שֻׁלְחָנוֹת -> «mesas». No hay conflicto con términos troncales del glosario. La alternativa «piedra labrada» debe mantenerse como nota léxica válida para אַבְנֵי גָזִית. Se elimina la nota b por no corresponder a una alternativa léxica ni teológica preservada por el POB inglés.'
  issues:
  - severity: medium
    issue: Tiempo/aspecto verbal «ponían»
    rationale: El POB inglés revisado asentó «they placed», no el habitual «they would place». Aunque el hebreo permite matiz funcional, en este contexto narrativo-descriptivo del informe visionario el pasado simple español («colocaron») preserva mejor la decisión auditada y evita una habitualidad añadida.
  - severity: low
    issue: Nota b innecesaria
    rationale: 'La nota «Hebreo: “de un codo de alto”» no preserva una alternativa significativa ni aclara una dificultad nueva en español. Solo repite lo ya dicho en el texto principal, por lo que recarga sin beneficio.'
  revised_spanish_text: Y cuatro mesas para el holocausto eran de piedra cortada[a], de un codo y medio de largo, de un codo y medio de ancho, y de un codo de alto. Sobre ellas colocaron los utensilios con los cuales degollaban el holocausto y el sacrificio.
  revised_footnotes:
