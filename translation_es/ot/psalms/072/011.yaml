translation:
  language: es
  text: Que todos los reyes se postren ante él[a]; que todas las naciones le sirvan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo adoren» para «se postren ante él» y/o «le sirvan»; los verbos hebreos pueden llevar tanto matiz de homenaje real como de adoración religiosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִשְׁתַּחֲווּ
  english_pob_choice: may ... bow down
  chosen_spanish: se postren
  alternatives_spanish:
  - se inclinen
  - se postren ante él
  - lo adoren
  lexicon: HALOT
  rationale: El verbo hebreo expresa inclinarse o postrarse físicamente como acto de homenaje. En español, «se postren» conserva ese gesto corporal y la carga honorífica sin forzar de entrada el sentido más estrecho de «adorar».
- source_word: לוֹ
  english_pob_choice: before him
  chosen_spanish: ante él
  alternatives_spanish:
  - a él
  - delante de él
  lexicon: HALOT
  rationale: La preposición con este verbo indica dirección del homenaje. «Ante él» suena natural en español y comunica la orientación reverente del gesto mejor que un simple «a él».
- source_word: כָל מְלָכִים
  english_pob_choice: all kings
  chosen_spanish: todos los reyes
  alternatives_spanish:
  - todos los monarcas
  lexicon: HALOT
  rationale: «Reyes» reproduce de manera directa el alcance universal del hebreo y mantiene el paralelismo con «naciones».
- source_word: כָל גּוֹיִם
  english_pob_choice: all nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todos los pueblos
  - todas las gentes
  lexicon: HALOT
  rationale: «Naciones» es la equivalencia más natural en español para גּוֹיִם en este paralelismo y evita restringir el término a un matiz étnico que aquí no domina.
- source_word: יַעַבְדוּהוּ
  english_pob_choice: may ... serve him
  chosen_spanish: le sirvan
  alternatives_spanish:
  - lo sirvan
  - le rindan servicio
  - le adoren
  lexicon: HALOT
  rationale: עבד significa ante todo servir, y en este contexto puede abarcar también homenaje reverente. «Le sirvan» conserva el núcleo léxico y deja abierta la amplitud político-religiosa que el inglés POB preserva.
theological_decisions:
- issue: Si traducir los verbos con lenguaje explícito de adoración
  english_pob_reading: 'Retain broader homage/service language: ''bow down before him'' and ''serve him.'''
  chosen_spanish_reading: 'Mantener el lenguaje amplio de homenaje y servicio: «se postren ante él» y «le sirvan».'
  alternative_spanish_readings:
  - lo adoren
  - se inclinen y lo adoren
  - le rindan culto
  rationale: El salmo es real y, en lectura cristiana, puede tener extensión mesiánica; sin embargo, el hebreo no exige resolver aquí el matiz hacia culto explícito. La traducción conserva la tensión entre homenaje regio y posible resonancia religiosa, como en el texto inglés auditado.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: El texto sigue de cerca el packet hebreo y coincide con la decisión auditada en inglés de mantener un sentido amplio de homenaje/servicio en vez de cerrar el verso con «adoración» explícita. No se registran revisiones previas aplicadas en este versículo.
  spanish_consistency_notes:
  - Se mantiene «naciones» para גּוֹיִם conforme al paralelismo con «reyes».
  - Se evita «SEÑOR» para el nombre divino porque este versículo no contiene el Tetragrámaton.
  - «Se postren» conserva mejor la imagen física del verbo hebreo que un simple «se inclinen».
