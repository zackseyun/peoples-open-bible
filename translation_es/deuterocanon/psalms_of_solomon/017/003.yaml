review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: futuro de ἐλπιοῦμεν, título confesional ''Salvador'', distinción entre κράτος y βασιλεία, y autoridad ''sobre las naciones''. Sin embargo, ''esperaremos en Dios'' suena poco natural en español actual; la construcción más fiel y legible es ''pondremos nuestra esperanza en Dios'' o ''esperaremos en Dios'' solo como alternativa más literal. Además, ''con misericordia'' colocado tras ''para siempre'' resulta algo duro en español.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero presenta dos problemas de naturalidad: ''esperaremos en Dios'' es gramaticalmente posible pero poco idiomático en español moderno, y la secuencia ''es para siempre con misericordia'' suena forzada. Una leve reestructuración mejora mucho la legibilidad sin perder precisión.'
  glossary_alignment: 'La terminología clave está bien alineada: θεός -> ''Dios'', σωτῆρα -> ''Salvador'', κράτος -> ''dominio'', βασιλεία -> ''reino''. No hay conflicto con los glosarios del proyecto. La única excepción recomendada es preferir una expresión española más natural para ἐλπιοῦμεν ἐπὶ τὸν θεόν.'
  issues:
  - severity: medium
    issue: '''esperaremos en Dios'' es poco natural como texto principal'
    rationale: Aunque reproduce el futuro y la preposición con bastante literalidad, en español bíblico legible suena más natural 'pondremos nuestra esperanza en Dios' o 'esperaremos en Dios' como nota alternativa. La decisión inglesa prioriza el verbo 'hope', pero en español la colocación usual con complemento personal suele requerir 'poner la esperanza en'.
  - severity: medium
    issue: Orden poco fluido en 'es para siempre con misericordia'
    rationale: La frase transmite el sentido de μετʼ ἐλέους, pero el orden español es torpe. 'Es para siempre, con misericordia' o mejor 'permanece para siempre con misericordia' / 'es para siempre y con misericordia' mejora la legibilidad. Dado que el inglés auditado mantiene 'with mercy', conviene conservar 'con misericordia' pero en una estructura más idiomática.
  - severity: low
    issue: La nota a usa 'libertador' donde el inglés tiene 'deliverer' pero el texto principal ya justifica 'Salvador'
    rationale: No es incorrecto, pero 'libertador' puede sonar más estrecho que 'salvador'. Como nota alternativa es aceptable; no requiere adjudicación.
