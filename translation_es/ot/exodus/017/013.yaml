    rationale: No es un error, porque la nota explica el modismo de לְפִי חָרֶב, pero una ligera tensión semántica permanece entre el verbo principal menos conclusivo y la glosa explicativa del modismo.
  revised_spanish_text: Y Josué debilitó las fuerzas de Amalec y de su pueblo con el filo de la espada[a].
