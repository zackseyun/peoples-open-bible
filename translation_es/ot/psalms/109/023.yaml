    rationale: El rastro inglés usa la nota c para la alternativa léxica de אַרְבֶּה (‘locust/grasshopper’). En el borrador español, [c] aparece sobre “sacudido” y comenta la pasiva de נִנְעַרְתִּי, creando desalineación con la evidencia y perdiendo la alternativa de “langosta/saltamontes”.
  - severity: medium
