translation:
  language: es
  text: Entonces naciones de las provincias se pusieron contra él[a] por todos lados, y extendieron sobre él su red; en su fosa[b] fue atrapado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vinieron contra él por todos lados desde las provincias». Más literalmente, el hebreo puede expresarse como «se pusieron contra él».'
    reason: alternative_reading
  - marker: b
    text: «Fosa» probablemente alude a una fosa-trampa usada en la caza.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּתְּנוּ עָלָיו
  english_pob_choice: set themselves against him
  chosen_spanish: se pusieron contra él
  alternatives_spanish:
  - se alzaron contra él
  - se dirigieron contra él
  - se establecieron contra él
  lexicon: HALOT
  rationale: La expresión hebrea implica una acción hostil coordinada contra alguien. En español, 'se pusieron contra él' comunica bien ese sentido sin volverse literal de manera artificial. Mantiene la fuerza relacional de la construcción, como en la decisión inglesa de 'set themselves against him'.
- source_word: גּוֹיִם
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - pueblos
  - gentiles
  lexicon: HALOT
  rationale: '''Naciones'' conserva el referente de poderes políticos extranjeros. ''Gentiles'' introduciría un contraste religioso que el contexto no exige.'
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: todo alrededor
  alternatives_spanish:
  - alrededor
  - por todos lados
  - de alrededor
  lexicon: HALOT
  rationale: La frase enfatiza el cerco. 'Todo alrededor' es natural en español y preserva la imagen de encierro.
- source_word: מִמְּדִינוֹת
  english_pob_choice: from the provinces
  chosen_spanish: de las provincias
  alternatives_spanish:
  - de las regiones
  - de los territorios
  - de los estados
  lexicon: HALOT
  rationale: '''מְדִינוֹת'' puede aludir a divisiones administrativas o provincias. ''De las provincias'' sigue el matiz político-administrativo del texto fuente y coincide con la lectura auditada en inglés.'
- source_word: וַיִּפְרְשׂוּ עָלָיו רִשְׁתָּם
  english_pob_choice: they spread their net over him
  chosen_spanish: extendieron sobre él su red
  alternatives_spanish:
  - tendieron sobre él su red
  - arrojaron sobre él su red
  - extendieron su red sobre él
  lexicon: HALOT
  rationale: '''פרשׂ'' significa extender o desplegar. ''Red'' traduce literalmente רֶשֶׁת y mantiene la metáfora de caza. El orden ''sobre él su red'' suena natural y conserva el objeto directo enfático.'
- source_word: בְּשַׁחְתָּם
  english_pob_choice: in their pit
  chosen_spanish: en su fosa
  alternatives_spanish:
  - en su hoyo
  - en su pozo
  - en su trampa-pit
  lexicon: HALOT
  rationale: '''שַׁחַת'' puede ser hoyo, fosa o pit de trampa. ''Fosa'' funciona bien en español bíblico moderno y deja abierta la imagen de una trampa excavada, coherente con la nota cultural del inglés.'
- source_word: נִתְפָּשׂ
  english_pob_choice: he was caught
  chosen_spanish: fue atrapado
  alternatives_spanish:
  - fue capturado
  - fue asido
  - quedó atrapado
  lexicon: HALOT
  rationale: '''Fue atrapado'' reproduce la pasiva y el sentido de captura dentro del campo metafórico de caza. ''Fue capturado'' es posible, pero ''atrapado'' conecta mejor con la red y la fosa.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y la solución inglesa auditada. No se detectan revisiones posteriores que requieran ajuste; se mantiene la imagen de cerco, red y fosa como metáfora unificada de caza/captura.
  spanish_consistency_notes:
  - Se mantiene 'naciones' y no 'pueblos' para no diluir el matiz político.
  - '''Fosa'' se eligió por claridad y por su compatibilidad con el campo semántico de trampa, sin reemplazar el sentido de captura.'
  - Se evitó 'SEÑOR' porque no aparece aquí ninguna referencia al nombre divino.
  - El orden de los complementos busca naturalidad en español sin perder la secuencia de la imagen original.
