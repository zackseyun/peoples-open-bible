translation:
  language: es
  text: Porque hay una prueba[a][b]; y ¿qué si incluso el cetro que desprecia no permanecerá? —declara el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque hay una prueba; y ¿qué si incluso el cetro despreciador ya no existirá?». El hebreo de este versículo es notablemente difícil, especialmente la cláusula acerca del cetro.'
    reason: alternative_reading
  - marker: b
    text: Hebreo שֵׁבֶט puede significar «cetro», «vara» o «tribu». Aquí se eligió «cetro» porque el contexto favorece la imagen real/judicial.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque, en efecto
  lexicon: HALOT
  rationale: La partícula introduce una razón o fundamento respecto del contexto previo. «Porque» conserva esa función explicativa en español sin añadir interpretación extra.
- source_word: בֹחַן
  english_pob_choice: there is a testing
  chosen_spanish: hay un examen
  alternatives_spanish:
  - hay una prueba
  - existe un examen
  - hay un tamizamiento
  lexicon: HALOT
  rationale: El hebreo es nominal y elíptico. «Hay un examen» preserva la idea de prueba/examen sin obligar a especificar sujeto o proceso más allá de lo que el texto exige.
- source_word: וּמָה אִם גַּם
  english_pob_choice: and what if even
  chosen_spanish: y ¿qué si aun
  alternatives_spanish:
  - y ¿qué tal si aun
  - y ¿qué si incluso
  - y ¿qué si también
  lexicon: HALOT
  rationale: La secuencia abre una pregunta retórica difícil. «¿Qué si aun…?» mantiene la fuerza interrogativa y el énfasis de gַם sin sobreexplicarlo.
- source_word: שֵׁבֶט
  english_pob_choice: scepter
  chosen_spanish: cetro
  alternatives_spanish:
  - vara
  - bastón
  - cetro real
  lexicon: HALOT
  rationale: En el contexto judicial y regia, la imagen apunta al símbolo de autoridad. «Cetro» es la opción más natural en español para esa función, como equivalente de «scepter».
- source_word: מֹאֶסֶת
  english_pob_choice: that despises
  chosen_spanish: que desprecia
  alternatives_spanish:
  - despreciador
  - que rechaza
  - que desdeña
  lexicon: HALOT
  rationale: Se conserva el participio activo como cláusula relativa. «Que desprecia» mantiene el agente y la dureza semántica del verbo מאס.
- source_word: לֹא יִהְיֶה
  english_pob_choice: will not remain
  chosen_spanish: no permanecerá
  alternatives_spanish:
  - no será
  - no existirá
  - no continuará
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «no será», el contexto favorece la idea de no durar o no subsistir. «No permanecerá» comunica ese valor sin exagerar.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara Yahvé, el Señor
  alternatives_spanish:
  - —oráculo de Yahvé, el Señor
  - declara el Señor Yahvé
  - dice Yahvé, el Señor
  lexicon: HALOT
  rationale: Se conserva la fórmula profética con un verbo de dicción natural en español. «Yahvé» sigue el estándar del proyecto para יְהוִה, y «el Señor» traduce אֲדֹנָי sin diluir el doble título.
theological_decisions:
- issue: Tratamiento del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Yahvé, el Señor
  alternative_spanish_readings:
  - el Señor Yahvé
  - Yahvé, el Señor Dios
  - el Señor DIOS
  rationale: El texto hebreo distingue el título אֲדֹנָי del nombre propio יְהוִה. En español, «Yahvé, el Señor» preserva ambos elementos sin recurrir a la sustitución tradicional por mayúsculas. Evita también la redundancia «Señor Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se siguió el pasaje base con alta concordancia respecto del audit trail inglés. La principal adaptación al español está en la formulación de la pregunta retórica y en la colocación natural del título divino doble. No se introdujeron lecturas textuales nuevas.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma principal del Tetragrama, según la política del proyecto.
  - Se conservó la tensión del hebreo en la cláusula breve y difícil mediante una nota alternativa en lugar de resolverla por paráfrasis extensa.
  - «Cetro» mantiene la lectura regia/judicial adoptada en el inglés POB y evita la ambigüedad de «vara» en este contexto.
