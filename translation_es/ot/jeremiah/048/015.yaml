revisions:
- from: Moab[a] está devastada, y sus ciudades han subido; los más escogidos de sus jóvenes han bajado a la matanza, declara el Rey[b], cuyo nombre es Yahvé de los Ejércitos.
  to: Moab[a] está devastada, y sus ciudades han subido; lo mejor de sus jóvenes ha bajado a la matanza, declara el Rey[b], cuyo nombre es Yahvé de los Ejércitos.
  rationale: 'Se conserva el texto principal casi intacto, pero se corrigen las notas para alinearlas con el rastro de auditoría inglés: [a] ahora preserva la alternativa más literal documentada, y [b] vuelve a ser una nota léxica sobre la formulación tradicional del título divino. Además, ''lo mejor de sus jóvenes'' mejora la naturalidad del español manteniendo el sentido de מִבְחַר. El singular colectivo es aceptable en español para ese grupo selecto.'
  reviewer_model: gpt-5.4
