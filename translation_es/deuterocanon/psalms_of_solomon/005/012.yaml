review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del griego: condición general futura («si ...») seguida por la respuesta de dirigirse a Dios. «Tienen hambre» y «alzarán» son opciones fieles. Sin embargo, la combinación «alzarán su rostro hacia ti» suena menos natural en español bíblico actual y no refleja tan claramente el giro idiomático explicado en la nota. Además, con sujeto plural, «su rostro» es posible pero aquí resulta menos claro que «su rostro»/«sus rostros» dentro de una formulación más idiomática.'
  spanish_quality_summary: La redacción es comprensible, pero «alzarán su rostro hacia ti» suena algo calcada. En español natural y digno, «levantarán el rostro hacia ti» funciona mejor como expresión fija de súplica o dependencia. También conviene evitar anclar la nota en «hambre», porque la nota explica el modismo de «levantar el rostro».
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. No aparecen términos sensibles como Yahvé, Mesías o esclavo. La revisión propuesta mantiene fidelidad léxica al griego sin introducir paráfrasis.
  issues:
  - severity: medium
    issue: La nota al pie está anclada en «hambre» en lugar de la expresión idiomática «alzarán su rostro hacia ti».
    rationale: La nota explica el modismo griego de levantar el rostro a Dios; por claridad editorial, el marcador debe aparecer en la frase que la nota comenta.
  - severity: medium
    issue: «Alzarán su rostro hacia ti» suena algo forzado en español.
    rationale: Aunque es formalmente cercano al griego, «levantarán el rostro hacia ti» es más idiomático y mantiene mejor el sentido de apelación o dependencia sin perder la imagen concreta.
  revised_spanish_text: Y si tienen hambre, levantarán el rostro hacia ti[a].
