revisions:
- from: Y toda persona que coma un animal hallado muerto o uno despedazado[a], sea nativo o forastero residente[b], lavará sus vestidos y se bañará en agua, y quedará impuro hasta la tarde; luego quedará limpio.
  to: Y toda persona que coma un animal hallado muerto[a] o uno despedazado por fieras, sea nativo o extranjero residente[b], lavará sus vestidos y se bañará en agua, y quedará impuro hasta la tarde; luego quedará limpio.
  rationale: Se ajusta טְרֵפָה para preservar la causa predatoria explícita en el término hebreo; se mejora la naturalidad de גֵּר con 'extranjero residente'; y se corrige la nota de נְבֵלָה para evitar la falsa implicación de sacrificio cultual, alineándola con la explicación auditada de muerte sin matanza apropiada.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:45:08Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura legal del hebreo: ''toda persona'' para נֶפֶשׁ, la distinción entre נְבֵלָה y טְרֵפָה, la inclusión de ''nativo'' y ''ger'', y la secuencia de lavar la ropa, bañarse, quedar impuro hasta la tarde y luego quedar limpio. Sin embargo, hay dos puntos que conviene ajustar para mayor fidelidad y claridad: la nota sobre נְבֵלָה habla de ''sacrificio adecuado'', cuando la evidencia inglesa y hebrea se refiere más precisamente a falta de sacrificio/degüello apropiado; y ''uno despedazado'' pierde la causa implícita en טְרֵפָה (''despedazado por fieras'').'
  spanish_quality_summary: El español es claro y digno, pero 'uno despedazado' suena algo elíptico en este contexto y puede leerse como mero estado físico sin la causa predatoria. 'Forastero residente' es entendible, pero 'extranjero residente' suena más natural en español neutro eclesial. También conviene evitar 'sacrificio adecuado' en la nota, porque en español puede sugerir ofrenda cultual en vez de degüello apropiado.
  glossary_alignment: No hay conflictos con terminología de proyecto principal. La elección 'persona' para נֶפֶשׁ y 'impuro/limpio' para טָמֵא/טָהֵר está bien alineada con la racionalidad documentada. Para גֵּר, el inglés principal usa 'sojourner' con alternativa 'resident foreigner'; en español, 'extranjero residente' representa mejor esa categoría legal que 'forastero residente'.
  issues:
  - severity: medium
    issue: La traducción de טְרֵפָה como 'uno despedazado' omite la causa implícita.
    rationale: El hebreo y la auditoría inglesa especifican 'torn by beasts'. En español conviene mantener 'despedazado por fieras' o equivalente, no solo el resultado físico.
  - severity: medium
    issue: La nota [a] usa 'murió sin sacrificio adecuado'.
    rationale: נְבֵלָה describe un animal muerto sin degüello apropiado, no uno sin 'sacrificio' cultual. 'Sacrificio' puede inducir una lectura ritual incorrecta.
  - severity: low
    issue: '''Forastero residente'' es menos natural que ''extranjero residente'' en español neutro.'
    rationale: Aunque comprensible, 'forastero residente' suena más marcado regionalmente y menos idiomático en registro bíblico contemporáneo; la propia nota alternativa ya apunta a una mejor formulación.
  revised_spanish_text: Y toda persona que coma un animal hallado muerto[a] o uno despedazado por fieras, sea nativo o extranjero residente[b], lavará sus vestidos y se bañará en agua, y quedará impuro hasta la tarde; luego quedará limpio.
  revised_footnotes:
  - marker: a
    text: O "cadáver" para "animal hallado muerto"; el hebreo se refiere a un animal que murió sin degüello apropiado.
    reason: lexical_alternative
  - marker: b
    text: O "forastero residente" para "extranjero residente".
    reason: lexical_alternative
  revision_rationale: Se ajusta טְרֵפָה para preservar la causa predatoria explícita en el término hebreo; se mejora la naturalidad de גֵּר con 'extranjero residente'; y se corrige la nota de נְבֵלָה para evitar la falsa implicación de sacrificio cultual, alineándola con la explicación auditada de muerte sin matanza apropiada.
