translation:
  language: es
  text: 'Entonces los hombres de David le dijeron: «Mira, este es el día del que Yahvé te dijo: “Mira, yo estoy entregando a tu enemigo en tu mano, y podrás hacer con él como bien te parezca[a]”». David se levantó y cortó en secreto el borde del manto de Saúl.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «como parezca bien a tus ojos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... le dijeron
  alternatives_spanish:
  - Y ... dijeron
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» comunica la secuencia de manera natural en español sin perder el valor narrativo.
- source_word: אַנְשֵׁי דָוִד
  english_pob_choice: David’s men
  chosen_spanish: los hombres de David
  alternatives_spanish:
  - los hombres de David
  lexicon: HALOT
  rationale: La construcción posesiva se vierte de forma directa y idiomática en español; «hombres» conserva el valor de seguidores/compañeros sin necesidad de añadir matices no presentes.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Mira ahora
  lexicon: HALOT
  rationale: «Mira» reproduce el deíctico de atención con naturalidad en español y mantiene la fuerza exhortativa del original.
- source_word: הַיּוֹם
  english_pob_choice: this is the day
  chosen_spanish: este es el día
  alternatives_spanish:
  - hoy es el día
  - este día
  lexicon: HALOT
  rationale: 'Con el deíctico previo, la expresión funciona en español como identificación enfática: «este es el día».'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el default del proyecto para el nombre divino en el texto principal español, evitando la sustitución por un título genérico.
- source_word: נֹתֵן
  english_pob_choice: I am giving
  chosen_spanish: estoy entregando
  alternatives_spanish:
  - estoy dando
  - te entrego
  lexicon: HALOT
  rationale: El participio expresa acción vívida e inminente. «Estoy entregando» conserva el aspecto y además refleja mejor el sentido idiomático de entregar a alguien al poder de otro que un simple «dar».
- source_word: איבי/ך
  english_pob_choice: your enemy
  chosen_spanish: a tu enemigo
  alternatives_spanish:
  - a tus enemigos
  lexicon: HALOT
  rationale: Aunque la grafía puede sugerir plural, el contexto narrativo apunta a Saúl individualmente; el singular es necesario para mantener la coherencia del pasaje.
- source_word: בְּ/יָדֶ֔/ךָ
  english_pob_choice: into your hand
  chosen_spanish: en tu mano
  alternatives_spanish:
  - en tus manos
  - a tu poder
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de la mano como esfera de poder; en español «en tu mano» resulta claro en este contexto de dominio entregado.
- source_word: וְ/עָשִׂ֣יתָ לּ֔/וֹ
  english_pob_choice: you may do to him
  chosen_spanish: harás con él
  alternatives_spanish:
  - puedes hacer con él
  - podrás hacer con él
  lexicon: HALOT
  rationale: El hebreo permite entender una acción habilitada por la entrega previa. En español, «harás con él» mantiene la relación verbal sin forzar una lectura demasiado jurídicamente modal; el contexto ya delimita la libertad de acción.
- source_word: כַּ/אֲשֶׁ֖ר יִטַ֣ב בְּ/עֵינֶ֑י/ךָ
  english_pob_choice: as seems good in your eyes
  chosen_spanish: como bien te parezca
  alternatives_spanish:
  - como te parezca bien
  - como te parezca
  lexicon: HALOT
  rationale: Se vierte el modismo hebreo con un equivalente natural que conserva la evaluación personal implícita en «tus ojos» sin repetir la imagen de forma rígida. La alternativa más literal se preserva como posibilidad interpretativa.
- source_word: וַ/יָּ֣קָם
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: HALOT
  rationale: Es un verbo narrativo claro y natural en español; mantiene el movimiento sucesivo sin cargar el registro con arcaísmo.
- source_word: וַ/יִּכְרֹ֛ת
  english_pob_choice: cut off
  chosen_spanish: cortó
  alternatives_spanish:
  - cortó de
  - arrancó
  lexicon: HALOT
  rationale: En español, el objeto «la orilla del manto» hace suficiente claro el valor de cortar; «cortó» evita sonar redundante y sigue la acción completa.
- source_word: כְּנַף
  english_pob_choice: the corner
  chosen_spanish: la orilla
  alternatives_spanish:
  - el borde
  - la esquina
  lexicon: HALOT
  rationale: Para una prenda, el término hebreo alude al extremo o borde. «Orilla» comunica bien la porción de tela que se corta sin introducir una imagen geométrica menos natural en español.
- source_word: הַמְּעִיל
  english_pob_choice: robe
  chosen_spanish: manto
  alternatives_spanish:
  - ropa de exterior
  - capa
  lexicon: HALOT
  rationale: «Manto» es un equivalente digno y narrativamente apropiado para la prenda exterior de Saúl, y evita estrechar el sentido a una prenda moderna específica.
- source_word: בַּלָּט
  english_pob_choice: secretly
  chosen_spanish: en secreto
  alternatives_spanish:
  - sigilosamente
  - a escondidas
  lexicon: HALOT
  rationale: El adverbio describe una acción oculta; «en secreto» es natural y fiel en español, sin cargar el estilo con excesiva afectación.
theological_decisions:
- issue: Cómo presentar la frase atribuida a Yahvé sin resolver si se trata de una promesa oracular directa o de la interpretación de los hombres de David
  english_pob_reading: 'The main text preserves the men’s claim without endorsing it beyond the narrative report: ‘the day of which the LORD said to you.’'
  chosen_spanish_reading: 'El texto principal conserva la afirmación de los hombres de David sin aclararla ni desautorizarla: «del que Yahvé te dijo»'
  alternative_spanish_readings:
  - del que Yahvé habló de ti
  - del que Yahvé te había prometido
  rationale: El hebreo presenta un reporte dentro del discurso directo, no una explicación editorial. La traducción debe preservar esa tensión narrativa y no convertir la afirmación en una certeza teológica más allá de lo que el texto permite.
  doctrine_reference: Preservar la tensión teológica y narrativa sin resolverla artificialmente.
translation_notes:
  revision_awareness: El pasaje coincide en alto grado con el análisis inglés auditado; no se detectaron revisiones que obliguen a cambiar la base de traducción. Se preservó la tensión del dicho atribuido a Yahvé y se ajustó el modismo hebreo a un español natural sin perder la imagen original.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino conforme al criterio del proyecto.
  - Se conserva el singular de «enemigo» por la referencia contextual a Saúl.
  - La imagen de la mano y del manto se preserva sin sustituirla por explicaciones interpretativas.
  - Los verbos narrativos se mantienen simples y consecutivos para reflejar el movimiento del relato.
