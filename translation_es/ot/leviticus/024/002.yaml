translation:
  language: es
  text: Ordena a los hijos[a] de Israel que te traigan aceite de oliva puro, machacado[b], para la luz, para hacer arder continuamente una lámpara.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas» o «el pueblo de Israel». El hebreo dice «los hijos de Israel», una designación pactual convencional.
    reason: lexical_alternative
  - marker: b
    text: O «aceite de oliva, puro, machacado». El hebreo especifica aceite procedente de olivas, con énfasis en su pureza y en que fue obtenido por machacado o trituración.
    reason: lexical_alternative
lexical_decisions:
- source_word: צַו
  english_pob_choice: Command
  chosen_spanish: Ordena
  alternatives_spanish:
  - Manda
  - Da la orden a
  lexicon: HALOT
  rationale: El imperativo transmite una instrucción autoritativa directa. «Ordena» conserva esa fuerza en español sin sonar innecesariamente áspero.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: «Hijos de Israel» refleja de forma transparente la expresión hebrea y mantiene la designación pactual masculina documentada en el audit trail.
- source_word: וְיִקְחוּ אֵלֶיךָ
  english_pob_choice: that they bring to you
  chosen_spanish: que te traigan
  alternatives_spanish:
  - que lleven a ti
  - que te lleven
  lexicon: HALOT
  rationale: Aunque לקח suele ser «tomar», aquí con אליך el sentido contextual es el de llevar/proveer a la persona destinataria. «Traigan» comunica esa función natural en español.
- source_word: שֶׁמֶן זַיִת זָךְ כָּתִית
  english_pob_choice: pure beaten olive oil
  chosen_spanish: aceite de oliva puro, machacado
  alternatives_spanish:
  - aceite de oliva puro, triturado
  - aceite puro de olivas machacadas
  lexicon: HALOT
  rationale: 'El hebreo especifica aceite de oliva con dos calificativos: pureza y un proceso de obtención por machacado. En español, «aceite de oliva puro, machacado» preserva ambos rasgos sin perder naturalidad.'
- source_word: לַמָּאוֹר
  english_pob_choice: for the light
  chosen_spanish: para la luz
  alternatives_spanish:
  - para iluminar
  - para la iluminación
  lexicon: HALOT
  rationale: «Luz» reproduce de manera cercana el sustantivo hebreo מָאוֹר y conserva la referencia cultual al alumbrado del santuario.
- source_word: לְהַעֲלֹת נֵר
  english_pob_choice: to cause a lamp to burn continually
  chosen_spanish: para mantener una lámpara encendida
  alternatives_spanish:
  - para hacer arder una lámpara
  - para encender una lámpara
  lexicon: HALOT
  rationale: El hebreo expresa el acto de hacer subir/arder una lámpara; en contexto, la finalidad es su mantenimiento continuo. «Mantener una lámpara encendida» captura esa función sin perder el matiz de continuidad.
- source_word: נֵר
  english_pob_choice: a lamp
  chosen_spanish: una lámpara
  alternatives_spanish:
  - un candil
  - una lámpara de aceite
  lexicon: HALOT
  rationale: «Lámpara» es el equivalente más natural y exacto para נֵר en este contexto ritual; no conviene precisar más de lo que el hebreo indica.
- source_word: תָּמִיד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - sin cesar
  - de manera continua
  lexicon: HALOT
  rationale: «Continuamente» refleja la idea de continuidad cultual y mantiene la fuerza de תָּמִיד con un español claro y digno.
theological_decisions:
- issue: Designación pactual masculina בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se preserva la forma masculina explícita del hebreo, que el audit trail considera parte de la designación convencional pactual. No se neutraliza en el texto principal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail: se mantuvo la naturalidad de «beaten olive oil» como «aceite de oliva ... machacado» y se optó por una formulación funcional para לְהַעֲלֹת que preserve la idea de continuidad cultual. También se respetó el dato del cross-check de alta concordancia.'
  spanish_consistency_notes:
  - Se conserva la designación masculina «hijos de Israel» por coherencia con el principio POB documentado.
  - «Yahvé» no aparece en este versículo, por lo que no se requiere decisión terminológica adicional sobre el nombre divino.
  - Se usó «luz»/«lámpara» de forma diferenciada para reflejar מָאוֹר y נֵר sin confundir ambos términos.
