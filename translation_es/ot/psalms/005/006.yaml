review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: la imposibilidad de que los הוֹלְלִים permanezcan ante Dios y la afirmación directa de que Dios odia a todos los פֹּעֲלֵי אָוֶן. Sin embargo, hay un problema de anclaje de notas: la nota [b] en español está colocada sobre «se mantendrán», pero su contenido corresponde a «los que hacen maldad». Además, «se mantendrán» es posible, pero «estarán de pie» o «se mantendrán en pie» representa con más transparencia el valor de יִתְיַצְּבוּ.'
  spanish_quality_summary: El español es claro y digno. «Los jactanciosos» es comprensible aunque algo menos natural que «los arrogantes»; no obstante, dado el rastro léxico del POB, puede mantenerse con nota. La frase «delante de tus ojos» suena bien. Conviene ajustar el verbo a una formulación más natural y precisa en español bíblico moderno, y corregir la ubicación de las notas para evitar confusión.
  glossary_alignment: No hay conflicto con los términos base del proyecto. Se mantiene correctamente «odias» para שָׂנֵאתָ, sin suavización teológica. «Los que hacen maldad» es aceptable para פֹּעֲלֵי אָוֶן, aunque la nota alternativa debe anclarse ahí, no en el primer colon.
  issues:
  - severity: medium
    issue: La nota [b] está anclada en el lugar equivocado.
    rationale: El contenido de la nota [b] trata alternativas para פֹּעֲלֵי אָוֶן, pero en el texto aparece después de «se mantendrán». Debe ir junto a «los que hacen maldad» o frase equivalente.
  - severity: low
    issue: «No se mantendrán» es algo menos transparente que una formulación con «estar de pie».
    rationale: יִתְיַצְּבוּ transmite la idea de presentarse o estar de pie ante Dios. «No estarán de pie» o «no se mantendrán en pie» suena más directo y natural en español, preservando mejor la imagen concreta.
  revised_spanish_text: Los jactanciosos[a] no estarán de pie delante de tus ojos; odias a todos los que hacen maldad[b].
