  from: the bed that you have gone up on there
  to: the bed on which you have gone up
  rationale: The Hebrew includes the adverb שָּׁם ('there'), which functions as a resumptive element within the relative clause. While a literal translation, including 'there' in the English rendering ('the bed that you have gone up on there') is redundant and sounds unnatural. The meaning is fully conveyed by 'the bed you have gone up on' or the slightly more formal 'the bed on which you have gone up'. Removing the redundant adverb improves the English flow without losing any essential meaning, consistent with an optimal-equivalence philosophy.
