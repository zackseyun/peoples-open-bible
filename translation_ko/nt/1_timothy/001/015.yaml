id: 1TI.1.15
reference: 1 Timothy 1:15
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: πιστὸς ὁ λόγος καὶ πάσης ἀποδοχῆς ἄξιος, ὅτι Χριστὸς Ἰησοῦς ἦλθεν εἰς τὸν κόσμον ἁμαρτωλοὺς σῶσαι· ὧν πρῶτός εἰμι ἐγώ,
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/001/015.yaml
  text: 'The saying is trustworthy and worthy of full acceptance: that Messiah Jesus came into the world to save sinners[b][a], of whom I am the foremost.'
  footnotes:
  - marker: a
    text: Or, 'Christ Jesus.'
    reason: alternative_reading
  - marker: b
    text: Or, 'of whom I am the worst' or 'chief.'
    reason: lexical_alternative
translation:
  language: ko
  text: '이 말씀은 신실하며 온전한 받아들임을 받기에 합당합니다: 메시아[a] 예수께서 죄인들을 구원하시려고 세상에 오셨다는 것입니다. 나는 그 죄인 중 으뜸[b]입니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그리스도」.
    reason: alternative_reading
  - marker: b
    text: 또는 「그중 가장 큰 자」 「우두머리」. 헬라어 πρῶτος는 서열·중요도에서 첫째를 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: πιστὸς ὁ λόγος
  english_pob_choice: The saying is trustworthy
  chosen_korean: 이 말씀은 신실하며
  alternatives_korean:
  - 이 말씀은 미쁘며
  - 이 말씀은 믿을 만하며
  lexicon: BDAG
  rationale: 목회서신 정형구. 「신실하며」가 πιστός의 어감을 자연스럽게 담는다.
- source_word: πάσης ἀποδοχῆς ἄξιος
  english_pob_choice: worthy of full acceptance
  chosen_korean: 온전한 받아들임을 받기에 합당
  alternatives_korean:
  - 전적인 수용을 받기에 합당
  - 모든 사람의 받아들임을 받기에 합당
  lexicon: BDAG
  rationale: ἀποδοχή는 「받아들임·승인」. 「온전한 받아들임」이 πᾶσα의 폭을 살린다.
- source_word: εἰς τὸν κόσμον
  english_pob_choice: into the world
  chosen_korean: 세상에
  alternatives_korean:
  - 이 세상으로
  lexicon: BDAG
  rationale: 간결한 한국어 표현.
- source_word: ἁμαρτωλοὺς σῶσαι
  english_pob_choice: to save sinners
  chosen_korean: 죄인들을 구원하시려고
  alternatives_korean:
  - 죄인들을 구원하시기 위하여
  lexicon: BDAG
  rationale: 부정사의 목적 어감을 「~하시려고」로 자연스럽게 옮긴다.
- source_word: πρῶτος
  english_pob_choice: the foremost
  chosen_korean: 으뜸
  alternatives_korean:
  - 첫째
  - 가장 큰 자
  - 우두머리
  lexicon: BDAG
  rationale: 죄에 있어서의 「가장 앞선」을 한국어로 「으뜸」으로 자연스럽게 옮긴다. 본문은 자기비하의 강력한 표현.
theological_decisions:
- issue: Χριστός의 칭호 번역
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: 본 번역 일관 원칙.
  doctrine_reference: 'DOCTRINE.md: Translate titles'
