revisions:
- from: Pero Sijón no confió en Israel para dejarlo pasar por su territorio. Entonces Sijón reunió[a] a todo su pueblo, acamparon en Jahaz[b], y peleó contra Israel[c].
  to: Pero Sijón no confió en Israel[a] para pasar por su territorio. Entonces Sijón reunió a todo su pueblo[b], y ellos acamparon en Jahaz, y peleó contra Israel[c].
  rationale: 'Se ajusta «para pasar por su territorio» para reflejar más de cerca עֲבֹר בִּגְבֻלוֹ sin convertir la implicación en traducción principal. Se rehacen las notas para alinearlas con el rastro de auditoría inglés: alternativa léxica de הֶאֱמִין, preservación de «todo su pueblo» y literalidad de «peleó con». Se añade «ellos» para mejorar la naturalidad del cambio al verbo plural «acamparon».'
