- from: Pero cada hombre morirá por su propia iniquidad; toda persona que coma las uvas agrias[a], sus dientes se le pondrán ásperos.
  to: Pero cada hombre morirá por su propia iniquidad; toda persona que come las uvas agrias[a] tendrá dentera.
  rationale: Se mantiene la estructura y las decisiones léxicas principales del borrador, pero se reemplaza la cláusula final por «tendrá dentera», que transmite de forma idiomática en español el efecto proverbial de comer uvas agrias sin inventar una imagen extraña. También se ajusta «que coma» a «que come» para mayor naturalidad y cercanía funcional al participio hebreo. No se requiere adjudicación adicional porque la corrección es estilística y semántica clara, no doctrinalmente difícil.
