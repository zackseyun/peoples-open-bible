review_pass:
  verdict: revise
  source_alignment_summary: 'La mayor parte del borrador refleja bien el hebreo: «Moisés llamó», «todo Israel», «han visto», «Yahvé», «ante sus ojos» y «en la tierra de Egipto» preservan adecuadamente el sentido fuente y las decisiones POB. Sin embargo, la serie final לְפַרְעֹה וּלְכָל עֲבָדָיו וּלְכָל אַרְצוֹ fue convertida en el texto principal a «contra...», aunque la POB inglesa eligió de forma más formalmente cercana «to ...» y dejó «against ...» solo como alternativa en nota. El español debe reflejar esa misma jerarquía: texto principal más literal («a Faraón...»), con nota para la lectura interpretativa «contra».'
  spanish_quality_summary: 'El español es claro y legible, con registro bíblico moderno y digno. Hay un pequeño ajuste de naturalidad y fidelidad: la nota actual repite exactamente la lectura ya puesta en el texto principal, por lo que no funciona como alternativa. Al mover «contra...» a la nota y dejar «a Faraón...» en el cuerpo, se corrige tanto la lógica de la nota como la alineación con la auditoría inglesa.'
  glossary_alignment: «Yahvé» sigue correctamente la política del proyecto para יהוה. «Siervos» para עֲבָדָיו es aceptable aquí por el contexto cortesano y la amplitud del término, aunque «servidores» también sería posible; no requiere cambio. No hay otros choques relevantes con el glosario del proyecto.
  issues:
  - severity: high
    issue: La preposición final fue sobreinterpretada en el texto principal como «contra».
    rationale: El hebreo usa ל repetido, y la POB inglesa decidió conservar en el texto principal una traducción formalmente cercana («to ...») mientras relegó «against ...» a nota. El borrador español invierte esa decisión documentada y por eso no preserva fielmente la racionalidad auditada.
  - severity: medium
    issue: La nota al pie no presenta una alternativa real.
    rationale: Como el cuerpo ya dice «contra Faraón...», la nota «O “contra Faraón...”» es redundante e incorrecta funcionalmente. La nota debe corresponder a una lectura alternativa distinta del texto principal.
  revised_spanish_text: 'Y Moisés llamó a todo Israel y les dijo[a]: «Ustedes han visto todo lo que Yahvé hizo ante sus ojos en la tierra de Egipto, a Faraón, a todos sus siervos y a toda su tierra».

