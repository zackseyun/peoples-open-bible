  rationale: Se corrige el anclaje de la nota de נֵס para que recaiga sobre «estandarte», se mejora la naturalidad del español con «será glorioso» en línea con la revisión inglesa auditada, y se pule la puntuación del inciso sin alterar el sentido fuente.
