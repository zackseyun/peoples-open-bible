translation:
  language: es
  text: Pero para ustedes que temen mi nombre[a], saldrá el sol de justicia con curación en sus alas[b]; y ustedes saldrán y saltarán[c] como terneros del establo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el sol de vindicación». צְדָקָה puede llevar el sentido de justicia, rectitud o vindicación.
    reason: lexical_alternative
  - marker: b
    text: O «en sus rayos». El hebreo «alas» puede usarse metafóricamente para los extremos o los rayos del sol.
    reason: lexical_alternative
  - marker: c
    text: O «brincarán» o «retozarán». El verbo hebreo es raro y puede denotar movimiento exuberante; algunos lo han entendido como «engordarán».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזָרְחָה
  english_pob_choice: will rise
  chosen_spanish: se levantará
  alternatives_spanish:
  - saldrá
  - resplandecerá
  - amanecerá
  lexicon: HALOT
  rationale: El verbo זרח se usa para la salida o aparición luminosa de un astro. En español, «se levantará» comunica bien la imagen de la salida del sol y mantiene el valor futuro sin volverlo demasiado interpretativo.
- source_word: יִרְאֵי שְׁמִי
  english_pob_choice: you who fear my name
  chosen_spanish: ustedes que temen mi nombre
  alternatives_spanish:
  - los que temen mi nombre
  - ustedes, los que reverencian mi nombre
  lexicon: HALOT
  rationale: La expresión participial identifica a los destinatarios. «Temen mi nombre» preserva el paralelismo con el hebreo y mantiene la orientación directa a la segunda persona implícita en לָכֶם.
- source_word: שֶׁמֶשׁ צְדָקָה
  english_pob_choice: the sun of righteousness
  chosen_spanish: el sol de justicia
  alternatives_spanish:
  - el sol de rectitud
  - el sol de vindicación
  lexicon: HALOT
  rationale: «Justicia» es la forma más natural en español para צְדָקָה en este contexto poético. Conserva la imagen sin forzar una identificación doctrinal específica, y deja abierta la amplitud semántica de justicia/rectitud/vindicación.
- source_word: וּמַרְפֵּא
  english_pob_choice: with healing
  chosen_spanish: sanidad
  alternatives_spanish:
  - curación
  - salud
  - con sanidad
  lexicon: HALOT
  rationale: El sustantivo מרפא denota remedio o sanidad. En español, «habrá sanidad» comunica de forma natural la idea de beneficio curativo asociado a la imagen solar; también evita una construcción demasiado pesada con preposición.
- source_word: בִּכְנָפֶיהָ
  english_pob_choice: in its wings
  chosen_spanish: en sus alas
  alternatives_spanish:
  - en sus rayos
  - en sus extremidades
  lexicon: HALOT
  rationale: «Alas» mantiene la metáfora concreta de כנף. Aunque el contexto solar permite «rayos», la imagen corporal/metafórica de alas es más cercana al hebreo y conserva la ambigüedad poética.
- source_word: וִיצָאתֶם
  english_pob_choice: you will go out
  chosen_spanish: saldrán
  alternatives_spanish:
  - irán afuera
  - saldréis
  lexicon: HALOT
  rationale: יצא significa salir o ir afuera. «Saldrán» es la opción natural y clara en español para el movimiento desde un estado de restricción hacia libertad.
- source_word: וּפִשְׁתֶּם
  english_pob_choice: leap
  chosen_spanish: saltarán
  alternatives_spanish:
  - brincarán
  - retozarán
  - saltarán de alegría
  lexicon: HALOT
  rationale: El verbo es raro y admite varias lecturas. En el contexto de terneros liberados, «saltarán» reproduce el movimiento exuberante sin añadir matices no sustentados por el texto.
- source_word: כְּעֶגְלֵי מַרְבֵּק
  english_pob_choice: like calves from the stall
  chosen_spanish: como terneros del establo
  alternatives_spanish:
  - como terneros de engorda
  - como becerros del corral
  - como terneros recién soltados del establo
  lexicon: HALOT
  rationale: מַרְבֵּק designa un establo o lugar de engorde. «Del establo» mantiene la idea de encierro del que salen con energía, y «terneros» resulta natural y entendible en español moderno.
theological_decisions:
- issue: Identificación mesiánica del «sol de justicia»
  english_pob_reading: Retain the metaphor without explicitly identifying it as the Messiah in the translation.
  chosen_spanish_reading: Conservar la metáfora sin nombrar al Mesías en el texto principal.
  alternative_spanish_readings:
  - el Mesías, el sol de justicia
  - Cristo, el sol de justicia
  rationale: El hebreo presenta primero una imagen poética de liberación y sanidad para quienes temen el nombre de Yahvé. Traducirla sin insertar una identificación explícita evita sobreinterpretar el versículo y preserva la tensión histórica/teológica que la tradición cristiana ha leído mesiánicamente.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'La presente redacción coincide con el último pase de revisión: no se aplicaron cambios posteriores al borrador de referencia; se mantiene la alta concordancia con el chequeo cruzado.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» en la referencia conceptual implícita de «mi nombre» según la política del proyecto, sin expandir innecesariamente el texto.
  - «Sol de justicia» mantiene la metáfora central y evita reemplazarla por una formulación doctrinalmente cerrada.
  - Las notas alternativas preservan la ambigüedad léxica relevante en צְדָקָה, בכנפיה y ופשתם.
  - Se optó por un español de tono bíblico contemporáneo, legible para congregación amplia, sin calcos rígidos.
