translation:
  language: es
  text: 'Y nosotros también les escribimos en respuesta: Sus ganados y sus posesiones son nuestros[a], y lo nuestro es suyo[c][b]. Por tanto, damos órdenes de que les informen de esto en el mismo sentido.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «les escribimos de vuelta» o «les respondemos por escrito»; el verbo griego puede entenderse más literalmente como «copiar», pero aquí probablemente significa una respuesta por escrito.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «Sus ganados y sus propiedades son nuestros, y lo nuestro es suyo». Es una fórmula diplomática de alianza y solidaridad mutua, no necesariamente una renuncia a la propiedad legal.'
    reason: cultural_note
  - marker: c
    text: 'O: «que les informen en ese mismo sentido» o «a ese mismo efecto». El griego deja implícito el objeto exacto de lo que se debe informar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀντιγράφομεν
  english_pob_choice: write back
  chosen_spanish: les escribimos en respuesta
  alternatives_spanish:
  - les respondemos por escrito
  - les escribimos de vuelta
  - les copiamos en respuesta
  lexicon: LSJ
  rationale: En un contexto epistolar, el verbo expresa escribir como respuesta; 'les escribimos en respuesta' comunica bien el matiz recíproco sin sonar forzado.
- source_word: κτήνη
  english_pob_choice: livestock
  chosen_spanish: ganados
  alternatives_spanish:
  - animales domésticos
  - cabezas de ganado
  - bestias
  lexicon: LSJ
  rationale: Se refiere a animales domesticados como propiedad; 'ganados' es natural en español bíblico y conserva la idea de bienes pecuarios.
- source_word: ὕπαρξις
  english_pob_choice: possessions
  chosen_spanish: posesiones
  alternatives_spanish:
  - bienes
  - propiedad
  - haberes
  lexicon: LSJ
  rationale: Aquí designa bienes materiales o patrimonio. 'Posesiones' sigue de cerca el valor de posesión patrimonial y armoniza con 'ganados'.
- source_word: ἐντελλόμεθα
  english_pob_choice: we are giving orders
  chosen_spanish: damos órdenes
  alternatives_spanish:
  - mandamos
  - ordenamos
  - damos instrucciones
  lexicon: LSJ
  rationale: El medio/deponente expresa la emisión de instrucciones o mandatos. 'Damos órdenes' conserva el tono oficial y diplomático del texto.
- source_word: ἀπαγγείλωσιν
  english_pob_choice: they report this to you
  chosen_spanish: les informen de esto
  alternatives_spanish:
  - les comuniquen esto
  - les den parte de esto
  - les reporten esto
  lexicon: LSJ
  rationale: El verbo significa transmitir o informar un mensaje; en español, 'les informen de esto' expresa con claridad el contenido implícito sin añadir más de lo necesario.
- source_word: κατὰ τὰ αὐτά
  english_pob_choice: accordingly
  chosen_spanish: conforme a ello
  alternatives_spanish:
  - de la misma manera
  - en el mismo sentido
  - según esto
  lexicon: LSJ
  rationale: La frase indica correspondencia con lo dicho antes. 'Conforme a ello' preserva la referencia relacional y suena natural en español formal.
theological_decisions:
- issue: Fórmula diplomática de posesión compartida
  english_pob_reading: '''Your livestock and your possessions are ours, and ours are yours''—a diplomatic formula expressing alliance and mutual solidarity, not necessarily abolition of legal ownership.'
  chosen_spanish_reading: '''Sus ganados y sus posesiones son nuestros, y las nuestras son suyas'' como fórmula diplomática de alianza y solidaridad mutua, no como abolición literal de la propiedad legal.'
  alternative_spanish_readings:
  - una declaración de propiedad compartida absoluta
  - una mera hipérbole sin valor político
  - un intercambio legal de bienes
  rationale: 'El griego presenta una fórmula recíproca de alianza. En español debe conservarse esa tensión: afirma solidaridad y reciprocidad, pero no obliga a leer una transferencia legal absoluta de dominio.'
  doctrine_reference: Lectura histórico-diplomática; concordante con el uso cortesano de fórmulas de alianza en textos helenísticos.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente al preferir un equivalente natural para ὕπαρξις ('posesiones') y al tratar el mensaje reportado como singular ('esto'). También se mantuvo el valor epistolar de ἀντιγράφομεν como respuesta escrita, y la fórmula diplomática de mutua pertenencia sin exagerar hacia una abolición jurídica de la propiedad.
  spanish_consistency_notes:
  - Se usa 'Yahvé' sólo cuando el texto lo requiera; aquí no aparece.
  - '''Ganados'' conserva el campo semántico de κτήνη como bienes pecuarios, no animales en general.'
  - '''Posesiones'' se prefirió a ''propiedad'' por naturalidad y porque refleja ὕπαρξις como patrimonio/materialidad.'
  - Se mantuvo un tono formal y diplomático, acorde con la carta helenística.
  - Las notas preservan la ambigüedad legítima del griego sin añadir interpretación doctrinal indebida.
