revisions:
- from: Pero un joven los vio y se lo informó a Absalón[a]. Entonces los dos siguieron rápidamente y llegaron a la casa de un hombre en Bahurim, que tenía un pozo en su patio, y descendieron allí.
  to: Pero un joven los vio y le informó a Absalón[a]; entonces los dos se fueron rápidamente y llegaron a la casa de un hombre en Bahurim, que tenía un pozo en su patio, y descendieron allí.
  rationale: Se corrige «siguieron rápidamente» por «se fueron rápidamente» para reflejar con fidelidad el verbo hebreo de movimiento. También se suaviza «se lo informó a Absalón» a «le informó a Absalón» por naturalidad idiomática sin pérdida semántica. La nota se mantiene, pero con redacción española más natural.
