theological_decisions:
- issue: Nature of Joseph's perception of the 'terrifying man' with the sword
  chosen_reading: Translate as a visionary or revelatory perception without over-explaining whether the figure is angelic, demonic, or symbolic.
  alternative_readings:
  - A demonic apparition linked to the sorcery
  - A symbolic inner perception of danger
  - An angelic warning figure
  rationale: The Greek simply reports Joseph's sight and his understanding of the danger. The text does not identify the figure, so the translation preserves the ambiguity.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering μετανοήσεις in Joseph's rebuke
  chosen_reading: repent
  alternative_readings:
  - change your mind
  - change your thinking
  rationale: The context is a direct confrontation over attempted corruption and possible murder/seduction; this is a specific-sin context, so 'repent' best fits project policy.
  doctrine_reference: 'DOCTRINE.md: μετανοέω → repent in specific-sin contexts.'
