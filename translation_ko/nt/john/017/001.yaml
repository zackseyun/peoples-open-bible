  text: Ταῦτα ⸀ἐλάλησεν Ἰησοῦς, καὶ ⸂ἐπάρας τοὺς ὀφθαλμοὺς αὐτοῦ εἰς τὸν οὐρανὸν εἶπεν⸃· Πάτερ, ἐλήλυθεν ἡ ὥρα· δόξασόν σου τὸν υἱόν, ⸀ἵνα ὁ ⸀υἱὸς δοξάσῃ σέ,
base_translation:
  language: en
  yaml_path: translation/nt/john/017/001.yaml
  text: 'Jesus said these things, and lifting up his eyes to heaven, he said: “Father, the hour has come. Glorify your Son, so that the Son may glorify you,”'
translation:
  language: ko
  text: 예수께서는 이것들을 말씀하시고, 눈을 들어 하늘을 우러러보시며 말씀하셨습니다. 「아버지여, 때가 이르렀습니다. 아들이 아버지께 영광을 돌리게 하시려고, 아버지의 아들을 영광스럽게 하소서.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Πάτερ
  english_pob_choice: Father
  chosen_korean: 아버지여
  alternatives_korean:
  - 아버지
  lexicon: BDAG
  rationale: 호격의 직접 부름을 합쇼체의 호격 「~여」로 옮겨 기도의 격조를 살린다.
- source_word: ἐλήλυθεν ἡ ὥρα
  english_pob_choice: the hour has come
  chosen_korean: 때가 이르렀습니다
  alternatives_korean:
  - 때가 왔습니다
  lexicon: BDAG
  rationale: 요한복음의 신학적 「때」를 「이르다」의 장중함으로 옮긴다.
- source_word: δόξασόν
  english_pob_choice: Glorify
  chosen_korean: 영광스럽게 하소서
  alternatives_korean:
  - 영화롭게 하소서
  lexicon: BDAG
  rationale: 명령형의 기도 어조를 「~소서」 청유형으로(합쇼체 하나님께-기도용).
- source_word: υἱόν
  english_pob_choice: Son
  chosen_korean: 아들
  alternatives_korean: []
  lexicon: BDAG
  rationale: 글로사리 표준 등가어.
