translation:
  language: es
  text: Corta tu cabello y échalo[a]; alza un lamento sobre las alturas desnudas[b], porque Yahvé ha rechazado y abandonado a la generación de su ira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu corona». El sustantivo hebreo puede aludir a consagración, corona o diadema, o al cabello asociado con la consagración; aquí, los mandatos de cortar y echar favorecen la referencia al cabello.
    reason: lexical_alternative
  - marker: b
    text: O «la generación bajo su ira». El hebreo dice literalmente «la generación de su ira».
    reason: alternative_reading
lexical_decisions:
- source_word: גָּזִּי
  english_pob_choice: Cut off
  chosen_spanish: Córtate
  alternatives_spanish:
  - Corta
  - Corta de ti
  lexicon: HALOT
  rationale: Es un imperativo femenino singular dirigido a una personificación femenina; en español, la forma pronominal refleja bien la acción directa sobre el propio cabello. 'Córtate' conserva la fuerza imperativa natural sin volverse rígido.
- source_word: נִזְרֵךְ
  english_pob_choice: your hair
  chosen_spanish: el cabello
  alternatives_spanish:
  - tu cabello
  - tu corona
  - tu cabello consagrado
  lexicon: HALOT
  rationale: Aunque el campo léxico puede abarcar corona, consagración o cabello asociado a consagración, el contexto de 'cortar' y 'arrojar' favorece 'cabello'. La revisión inglesa reciente también retiró 'consecrated', así que el español debe evitar sobreespecificar la idea de consagración.
- source_word: וְהַשְׁלִיכִי
  english_pob_choice: and throw it away
  chosen_spanish: y arrójalo
  alternatives_spanish:
  - y échalo
  - y lánzalo
  lexicon: HALOT
  rationale: '''Arrojar'' mantiene la idea de desechar con decisión. El pronombre enclítico ''lo'' enlaza con ''cabello'' y reproduce la economía del hebreo.'
- source_word: וּשְׂאִי
  english_pob_choice: and raise
  chosen_spanish: alza
  alternatives_spanish:
  - levanta
  - eleva
  lexicon: HALOT
  rationale: Con קִינָה como complemento, 'alza un lamento' es una construcción natural y fiel, equivalente al valor idiomático de empezar o entonar un lamento.
- source_word: עַל שְׁפָיִם
  english_pob_choice: on the bare heights
  chosen_spanish: sobre las alturas peladas
  alternatives_spanish:
  - sobre las alturas desnudas
  - sobre los montes pelados
  - sobre las alturas áridas
  lexicon: HALOT
  rationale: '''Peladas'' comunica el carácter expuesto, despojado o estéril de שְׁפָיִם. Se evita ''alturas'' sin más, porque el adjetivo es parte del contraste poético del texto.'
- source_word: קִינָה
  english_pob_choice: a lament
  chosen_spanish: un lamento
  alternatives_spanish:
  - una endecha
  - una lamentación
  - un canto fúnebre
  lexicon: HALOT
  rationale: '''Lamento'' es claro, solemne y suficientemente cercano al género de la קִינָה sin volverlo técnico en exceso.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se traduce conforme al criterio del proyecto como 'Yahvé', manteniendo el nombre propio divino en vez de sustituirlo por un título.
- source_word: מָאַס
  english_pob_choice: has rejected
  chosen_spanish: ha rechazado
  alternatives_spanish:
  - ha desechado
  - ha despreciado
  - ha rehusado
  lexicon: HALOT
  rationale: '''Rechazado'' expresa bien la repulsa pactual y profética del verbo sin cargarlo con un matiz emocional más fuerte de lo necesario.'
- source_word: וַיִּטֹּשׁ
  english_pob_choice: and abandoned
  chosen_spanish: y abandonado
  alternatives_spanish:
  - y dejado
  - y desamparado
  - y apartado
  lexicon: HALOT
  rationale: '''Abandonado'' reproduce el sentido de dejar de lado, forsaking, y empareja naturalmente con ''rechazado''.'
- source_word: דּוֹר עֶבְרָתוֹ
  english_pob_choice: the generation of his wrath
  chosen_spanish: la generación de su ira
  alternatives_spanish:
  - la generación bajo su ira
  - la generación de su furor
  - esta generación de su ira
  lexicon: HALOT
  rationale: Se conserva la literalidad del constructo para no suavizar la dureza del hebreo. 'Ira' es el equivalente natural en español para עֶבְרָה en este contexto.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el nombre divino directamente, y la práctica del proyecto es expresarlo como 'Yahvé'. Esto preserva el nombre propio del pacto en vez de ocultarlo tras un sustituto reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sense of נִזְרֵךְ in the command to cut and throw away
  english_pob_reading: your hair
  chosen_spanish_reading: el cabello
  alternative_spanish_readings:
  - tu corona
  - tu cabello consagrado
  rationale: La combinación de verbos apunta a algo tangible que puede cortarse y arrojarse. 'Cabello' mantiene la imagen sin introducir una interpretación más específica de consagración que la revisión inglesa decidió no mantener en la línea principal.
  doctrine_reference: Translation philosophy §1, §5
- issue: Force of דּוֹר עֶבְרָתוֹ
  english_pob_reading: the generation of his wrath
  chosen_spanish_reading: la generación de su ira
  alternative_spanish_readings:
  - la generación bajo su ira
  - la generación de su furor
  rationale: Se conserva la construcción posesiva para preservar el tono profético y la severidad del juicio. 'Ira' comunica adecuadamente la fuerza del hebreo sin diluirla en una paráfrasis.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del audit trail inglés: se evitó añadir ''consagrado'' en la línea principal, porque el ajuste de revisión lo retiró por considerarlo una sobreespecificación. También se mantuvo la literalidad fuerte de ''la generación de su ira'', con nota alternativa para la lectura interpretativa.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' para el nombre divino, de acuerdo con la terminología del proyecto.
  - Se evitó 'SEÑOR' como sustituto reverencial.
  - '''Ira'' se usó para עֶבְרָה por coherencia con el registro profético y con el uso del proyecto.'
  - La puntuación separa la primera orden y la segunda cláusula con punto y coma para reflejar el paralelismo hebreo sin forzar una subordinación excesiva.
