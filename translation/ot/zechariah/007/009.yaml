id: ZEC.7.9
reference: Zechariah 7:9
source:
  edition: WLC
  text: כֹּ֥ה אָמַ֛ר יְהוָ֥ה צְבָא֖וֹת לֵ/אמֹ֑ר מִשְׁפַּ֤ט אֱמֶת֙ שְׁפֹ֔טוּ וְ/חֶ֣סֶד וְ/רַֽחֲמִ֔ים עֲשׂ֖וּ אִ֥ישׁ אֶת אָחִֽי/ו־׃
translation:
  text: 'Thus says Yahweh of hosts[a], saying: Render true judgments, and show steadfast love and compassion[b], each man to his brother.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Judge a true judgment.' The Hebrew phrase combines 'judgment/justice' with 'truth' to call for judgments marked by truthfulness and integrity.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'each man to his brother,' a masculine representative expression for mutual covenantal treatment within the community.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: Thus
  alternatives:
  - So
  - This is what
  lexicon: HALOT
  rationale: Introduces a prophetic declaration formula. 'Thus' preserves the formal prophetic tone in natural English.
- source_word: אָמַר
  chosen: says
  alternatives:
  - said
  lexicon: HALOT
  rationale: Although morphologically perfect, in prophetic messenger formulas English idiom commonly uses the present, 'Thus says,' to convey the ongoing authority of the divine utterance.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and alignment with the doctrine guidelines.
- source_word: צְבָאוֹת
  chosen: of hosts
  alternatives:
  - of armies
  lexicon: HALOT
  rationale: In the title יְהוָה צְבָאוֹת, 'of hosts' is the established and sufficiently transparent rendering for the heavenly armies/hosts; it preserves the title's weight without over-specifying.
- source_word: לֵאמֹר
  chosen: ':'
  alternatives:
  - saying
  lexicon: HALOT
  rationale: Rendered implicitly with punctuation in English. The infinitive marks the content of the speech; a colon communicates this naturally.
- source_word: מִשְׁפַּט אֱמֶת
  chosen: true justice
  alternatives:
  - a true judgment
  - judgment of truth
  - justice truly
  lexicon: HALOT
  rationale: The construct phrase denotes judgments characterized by truth/reliability. 'True justice' is idiomatic and preserves both the judicial and moral force better than the more wooden 'judgment of truth.'
- source_word: שְׁפֹטוּ
  chosen: Judge
  alternatives:
  - Render judgment
  - Administer justice
  lexicon: HALOT
  rationale: Imperative plural addressed to the community. 'Judge' is concise and keeps the legal force of the verb.
- source_word: חֶסֶד
  chosen: steadfast love
  alternatives:
  - kindness
  - mercy
  - covenant loyalty
  lexicon: HALOT
  rationale: חֶסֶד carries durable covenantal kindness/loyalty. 'Steadfast love' preserves its rich ethical and relational sense better than the thinner 'kindness.'
- source_word: רַחֲמִים
  chosen: compassion
  alternatives:
  - mercies
  - mercy
  lexicon: HALOT
  rationale: Plural abstract noun expressing tender mercy/pity. 'Compassion' is natural modern English and captures the affective force.
- source_word: עֲשׂוּ
  chosen: show
  alternatives:
  - do
  - practice
  lexicon: HALOT
  rationale: With חֶסֶד and רַחֲמִים, English idiom prefers 'show' rather than the more literal but awkward 'do.' This is a justified optimal-equivalence adjustment.
- source_word: אִישׁ
  chosen: each man
  alternatives:
  - each one
  - everyone
  lexicon: HALOT
  rationale: The Hebrew is grammatically masculine singular with distributive force. Per the project's gender-accurate policy, 'each man' preserves the source form and representative sense.
- source_word: אָחִיו
  chosen: his brother
  alternatives:
  - his neighbor
  - one another
  lexicon: HALOT
  rationale: Literally 'his brother.' While contextually broader social solidarity may be implied, the text uses kinship language, which should be preserved in the main text rather than generalized to 'neighbor.'
