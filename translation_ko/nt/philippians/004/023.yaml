id: PHP.4.23
reference: Philippians 4:23
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἡ χάρις τοῦ κυρίου Ἰησοῦ Χριστοῦ μετὰ ⸂τοῦ πνεύματος⸃ ⸀ὑμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/004/023.yaml
  text: The grace of the Lord Jesus Christ be with your spirit.
translation:
  language: ko
  text: 주 예수 메시아[a]의 은혜가 여러분의 영[b]과 함께 있기를 빕니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「주 예수 그리스도」. Χριστός를 칭호로 옮기는 본 번역의 원칙에 따라 「메시아」로 번역한다. 영어 POB는 본 절의 lexical_decisions에서 「Messiah」를 택하면서도 본문은 「Christ」를 그대로 두었으나, 한국어 번역은 본 번역의 일관된 원칙을 따른다.
    reason: lexical_alternative
  - marker: b
    text: 헬라어 πνεῦμα는 본문 맥락에서 빌립보 성도 자신의 인격적 영(內的 生)을 가리키므로 소문자 「영」으로 옮기며, 성령(聖靈)으로 좁히지 않는다.
    reason: alternative_reading
lexical_decisions:
- source_word: χάρις
  english_pob_choice: grace
  chosen_korean: 은혜
  alternatives_korean:
  - 은총
  - 호의
  lexicon: BDAG
  rationale: 본 번역의 χάρις 기본 옮김. 바울 서신 축도 정형어이며, 한국 교회의 표준 등가어.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_korean: 주
  alternatives_korean:
  - 주님
  lexicon: BDAG
  rationale: 본 번역의 κύριος 기본 옮김. 「주 예수 메시아」 어순이 한국어로 가장 간결하다.
- source_word: Χριστοῦ
  english_pob_choice: Messiah (lexical_decisions); Christ (main text)
  chosen_korean: 메시아
  alternatives_korean:
  - 그리스도
  lexicon: BDAG
  rationale: 본 번역의 칭호 번역 원칙에 따라 「메시아」를 유지한다. 영어 POB의 lexical_decisions가 「Messiah」를 택했으므로 한국어도 동일한 결정으로 옮긴다. 영어 본문의 「Christ」는 7절·21절에서도 일어났던 azure 회귀 패턴과 유사하나, 한국어는 본 번역의 일관된 원칙(KOREAN_PIPELINE.md glossary)을 따른다.
- source_word: μετὰ
  english_pob_choice: with
  chosen_korean: 함께
  lexicon: BDAG
  rationale: 속격을 동반한 μετά의 동반·임재 의미를 「함께」로 옮긴다.
- source_word: πνεύματος
  english_pob_choice: spirit
  chosen_korean: 영
  alternatives_korean:
  - 심령
  - 마음
  lexicon: BDAG
  rationale: 본 번역의 πνεῦμα 기본 옮김(소문자 「영」). 본문 맥락은 빌립보 성도 자신의 인격적 영을 가리키므로 「성령」으로 좁히지 않는다.
- source_word: ὑμῶν
  english_pob_choice: your
  chosen_korean: 여러분의
  lexicon: BDAG
  rationale: 2인칭 복수 소유격. 합쇼체 호격 「여러분」과 일관성.
- source_word: (전체 축도 구조)
  english_pob_choice: ... be with your spirit.
  chosen_korean: ~함께 있기를 빕니다
  alternatives_korean:
  - ~함께 있을지어다
  - ~함께 있기를
  lexicon: BDAG
  rationale: 무동사 축도에 합쇼체 「있기를 빕니다」를 보충해 한국어 자연 축도문을 만든다. 「있을지어다」는 평어/보통체로 본 번역의 합쇼체 일관성과 어긋난다.
theological_decisions:
- issue: 'Χριστός 칭호 번역: 영어 POB 본문의 「Christ」와 lexical_decisions의 「Messiah」 불일치 처리'
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: 영어 POB의 본 절은 lexical_decisions에서 「Messiah」를 택하면서도 본문에 「Christ」가 남아 있는 미적용 상태이다(7·21절은 회귀 수정으로 「Messiah」가 복원됨). 한국어 번역은 본 번역의 일관된 원칙(KOREAN_PIPELINE.md glossary)과 영어 POB lexical_decisions의 의도를 함께 따라 「메시아」를 택한다.
  doctrine_reference: 'Contested terms: Χριστός → Messiah (where title; Christ where name-like)'
