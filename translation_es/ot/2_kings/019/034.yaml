review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: Yahvé promete defender la ciudad para salvarla, con dos motivos explícitos, por sí mismo y por David su siervo. Sin embargo, la anotación de nota al pie está mal anclada: la nota existente sobre ‘librar’ corresponde a לְהוֹשִׁיעָהּ (‘salvarla’), no a וְגַנּוֹתִי (‘defenderé’).'
  spanish_quality_summary: El español es claro y digno. ‘Defenderé esta ciudad para salvarla’ suena natural. ‘Por amor a mí mismo’ comunica bien לְמַעֲנִי, y ‘por amor de mi siervo David’ es comprensible, aunque algo más tradicional; sigue siendo aceptable en un registro bíblico. La corrección necesaria es principalmente de notas y anclaje, no de redacción principal.
  glossary_alignment: No hay términos del glosario principal en conflicto. ‘Mi siervo David’ respeta la decisión contextual; no se requiere ‘esclavo’. No aparece el nombre divino en este versículo. La elección ‘salvarla’ con alternativa ‘librarla’ concuerda con la auditoría inglesa.
  issues:
  - severity: medium
    issue: La nota [a] está colocada sobre ‘defenderé’, pero su contenido explica una alternativa de ‘salvar/librar’.
    rationale: En la evidencia fuente y en la auditoría inglesa, la alternativa léxica ‘deliver’ corresponde a לְהוֹשִׁיעָהּ, no a וְגַנּוֹתִי. Mantener la nota en ‘defenderé’ induce a error léxico.
  - severity: low
    issue: Hay dos notas distintas para la misma alternativa léxica de לְהוֹשִׁיעָהּ.
    rationale: La duplicación no añade información sustancial. Una sola nota en ‘salvarla’ basta y se ajusta mejor a la disciplina de notas.
  revised_spanish_text: Porque defenderé esta ciudad para salvarla[a], por amor a mí mismo y por amor de mi siervo David.
  revised_footnotes:
