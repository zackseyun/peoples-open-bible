translation:
  language: es
  text: 'Los caldeos respondieron delante del rey y dijeron[a]: «No hay hombre sobre la tierra[b] que pueda dar a conocer el asunto del rey[c], porque ningún rey grande y poderoso ha pedido tal cosa a ningún adivino-sacerdote, encantador[d] o caldeo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los astrólogos». El término arameo «caldeos» puede referirse tanto al grupo étnico como a una clase de sabios babilónicos de la corte.
    reason: lexical_alternative
  - marker: b
    text: 'Aquí «hombre» funciona como singular representativo con sentido genérico: cualquier ser humano.'
    reason: lexical_alternative
  - marker: c
    text: O «la palabra del rey» o «la demanda del rey».
    reason: lexical_alternative
  - marker: d
    text: Las traducciones tradicionales incluyen «mago» para «adivino-sacerdote». Las distinciones exactas entre estas clases de especialistas babilónicos no son completamente seguras.
    reason: cultural_note
lexical_decisions:
- source_word: כשדי/א
  english_pob_choice: The Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los chaldeos
  - los astrólogos
  lexicon: HALOT
  rationale: Conservo el etnónimo y el término técnico del contexto de Daniel. «Caldeos» mantiene la referencia recurrente del libro; «astrólogos» sería más interpretativo y estrecharía el campo semántico.
- source_word: קֳדָם
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: La relación espacial y judicial ante el rey se expresa de forma natural con «delante de». «Ante» también sería válido, pero aquí «delante de» suena más directo y claro.
- source_word: אִיתַי אֲנָשׁ עַל יַבֶּשְׁתָּא
  english_pob_choice: There is not a man on earth
  chosen_spanish: No hay hombre sobre la tierra
  alternatives_spanish:
  - No hay persona sobre la tierra
  - No existe ningún hombre sobre la tierra
  lexicon: HALOT
  rationale: Mantengo el singular representativo del arameo con «hombre», como hace la POB en inglés, para preservar la fuerza genérica de la afirmación. «Sobre la tierra» reproduce el modismo de יַבֶּשְׁתָּא.
- source_word: מִלַּת מַלְכָּא
  english_pob_choice: the king’s matter
  chosen_spanish: la cuestión del rey
  alternatives_spanish:
  - el asunto del rey
  - la palabra del rey
  - la demanda del rey
  lexicon: HALOT
  rationale: «מִלָּה» puede abarcar palabra, asunto o cosa. «Cuestión» comunica bien la amplitud y evita reducirlo a mero discurso. «Asunto» también es posible, pero «cuestión» suena más cercano al valor de algo por resolver o dar a conocer.
- source_word: יוּכַל לְהַחֲוָיָה
  english_pob_choice: can make known
  chosen_spanish: pueda dar a conocer
  alternatives_spanish:
  - pueda hacer saber
  - pueda declarar
  - pueda revelar
  lexicon: HALOT
  rationale: La expresión verbal apunta a revelar o hacer saber. «Dar a conocer» es natural en español, conserva la idea de divulgación y evita intensificar innecesariamente hacia «revelar».
- source_word: כָּל קֳבֵל דִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: La conjunción causal queda bien en español con «porque», que es el equivalente más simple y natural para introducir la razón dada.
- source_word: מֶלֶךְ רַב וְשַׁלִּיט
  english_pob_choice: great and powerful king
  chosen_spanish: gran rey y poderoso
  alternatives_spanish:
  - rey grande y poderoso
  - gran y poderoso rey
  - rey grande y gobernante
  lexicon: HALOT
  rationale: «רַב» y «שַׁלִּיט» expresan grandeza y poder/autoridad. En español, la colocación «gran rey y poderoso» preserva la paridad de los adjetivos sin sonar rígida. Se omite repetir «rey» después de «poderoso» para no forzar el ritmo.
- source_word: מִלָּה כִדְנָה
  english_pob_choice: such a thing
  chosen_spanish: tal cosa
  alternatives_spanish:
  - una cosa así
  - semejante cosa
  - tal asunto
  lexicon: HALOT
  rationale: «Tal cosa» reproduce bien el carácter inusitado de la petición y sigue de cerca la revisión inglesa final. «Asunto» sería posible, pero aquí el texto subraya la rareza de la solicitud.
- source_word: שְׁאֵל
  english_pob_choice: has asked for
  chosen_spanish: ha pedido
  alternatives_spanish:
  - ha preguntado por
  - ha solicitado
  - ha demandado
  lexicon: HALOT
  rationale: El verbo tiene el sentido básico de pedir/solicitar. «Ha pedido» es transparente y suficientemente neutro; el tono severo depende del contexto, no de una intensificación léxica obligatoria.
- source_word: חַרְטֹּם
  english_pob_choice: diviner-priest
  chosen_spanish: adivino-sacerdote
  alternatives_spanish:
  - sacerdote adivino
  - mago
  - magistrado adivino
  lexicon: HALOT
  rationale: Sigo la decisión inglesa de no usar un término tradicional genérico como «mago» si borra el matiz sacral. «Adivino-sacerdote» mantiene la ambigüedad de una clase profesional religiosa y adivinatoria sin imponer una equivalencia moderna demasiado estrecha.
- source_word: אָשַׁף
  english_pob_choice: enchanter
  chosen_spanish: encantador
  alternatives_spanish:
  - hechicero
  - conjurador
  - exorcista
  lexicon: HALOT
  rationale: «Encantador» conserva el carácter de practicante de artes ocultas y sigue la distinción de la lista. «Hechicero» o «conjurador» son posibles, pero «encantador» resulta más sobrio y legible.
- source_word: כַשְׂדָּי
  english_pob_choice: Chaldean
  chosen_spanish: caldeo
  alternatives_spanish:
  - chaldeo
  - astrólogo
  lexicon: HALOT
  rationale: 'Mantengo el mismo término que abre la frase para conservar la estructura inclusiva del original: los caldeos responden y se excluyen ellos mismos al final de la lista. La alternancia con «astrólogo» no es necesaria en el texto principal.'
theological_decisions:
- issue: Referencia a los especialistas de la corte babilónica
  english_pob_reading: The Aramaic term “Chaldeans” can refer either to the ethnic group or to a class of Babylonian wise men in the royal court.
  chosen_spanish_reading: «Caldeos» conserva el término histórico y, en este contexto, puede abarcar la clase de sabios de la corte babilónica.
  alternative_spanish_readings:
  - «astrólogos»
  - «sabios caldeos»
  rationale: No borro la tensión entre etnónimo y nombre de clase profesional. El texto principal conserva «caldeos» y la nota explica la posible referencia funcional, sin reemplazarla por un término más interpretativo.
  doctrine_reference: Contexto histórico-literario de Daniel 2; cf. el uso interno del libro para categorías de sabios de la corte.
- issue: Singular representativo en «אֲנָשׁ»
  english_pob_reading: “Man” here is a representative singular meaning any human being.
  chosen_spanish_reading: «No hay hombre sobre la tierra» como singular representativo de cualquier ser humano.
  alternative_spanish_readings:
  - «No hay persona sobre la tierra»
  - «No existe ningún ser humano sobre la tierra»
  rationale: Conservo el singular genérico para reflejar la forma del original y la decisión auditable de la POB en inglés. «Persona» o «ser humano» aclararían el sentido, pero perderían el eco del singular representativo.
  doctrine_reference: Uso genérico del singular; antropología bíblica en lenguaje proverbial o proverbializado.
- issue: Alcance de מִלָּה
  english_pob_reading: the king’s matter / word / demand
  chosen_spanish_reading: «la cuestión del rey»
  alternative_spanish_readings:
  - «el asunto del rey»
  - «la palabra del rey»
  - «la demanda del rey»
  rationale: No reduzco מִלָּה a «palabra», porque el contexto exige algo que debe ser explicado o dado a conocer. «Cuestión» conserva la amplitud semántica y permite el eco de «matter» en la auditable English POB.
  doctrine_reference: Principios de traducción semántica y preservación de amplitud léxica.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que afinó «a thing like this» a «such a thing» y ajustó la relación preposicional de «asked of». En español se reflejó con «tal cosa» y «ha pedido», manteniendo un registro formal y natural sin añadir intensidad no sustentada por el hebreo/arameo.
  spanish_consistency_notes:
  - Se mantiene «caldeos» de manera consistente para כשדיא/כַשְׂדָּי.
  - Se conserva el singular representativo «hombre» para אֲנָשׁ, con nota explicativa.
  - Se evita traducir מִלָּה de forma uniforme como «palabra» para no estrechar su alcance en este versículo.
  - Los términos de especialistas («adivino-sacerdote», «encantador») buscan distinguir clases sin normalizarlas en vocabulario eclesiástico tradicional.
  - La puntuación y el estilo siguen un registro bíblico moderno y publicable en español neutral.
