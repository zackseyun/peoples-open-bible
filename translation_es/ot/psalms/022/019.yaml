translation:
  language: es
  text: Ellos reparten mis vestidos entre sí[a], y por mi ropa echan suertes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Esta línea es retomada en los relatos del evangelio sobre la crucifixión de Jesús; véase Mateo 27:35; Marcos 15:24; Lucas 23:34; Juan 19:24.
    reason: cross_reference
lexical_decisions:
- source_word: יְחַלְּקוּ
  english_pob_choice: they divide
  chosen_spanish: reparten
  alternatives_spanish:
  - dividen
  - distribuyen
  - se reparten
  lexicon: HALOT
  rationale: El piel imperfecto de חלק expresa aquí la acción hostil de parcelar las prendas. «Reparten» comunica bien la división entre varios en un español natural y mantiene el tono poético sin añadir interpretación.
- source_word: בְגָדַי
  english_pob_choice: my garments
  chosen_spanish: mis vestidos
  alternatives_spanish:
  - mis prendas
  - mis ropas
  - mis vestiduras
  lexicon: HALOT
  rationale: בגד denota ropa o prendas. «Vestidos» conserva un registro algo elevado y poético, y funciona bien en paralelo con «ropa» en la segunda línea. Se evita «vestiduras» por sonar más eclesiástico de lo que exige el hebreo.
- source_word: לָהֶם
  english_pob_choice: among themselves
  chosen_spanish: entre sí
  alternatives_spanish:
  - para sí
  - para ellos
  - entre ellos
  lexicon: HALOT
  rationale: La preposición con pronombre expresa distribución dentro del grupo. «Entre sí» reproduce el sentido idiomático de reparto mutuo sin introducir matices de posesión que no están explícitos.
- source_word: לְבוּשִׁי
  english_pob_choice: my clothing
  chosen_spanish: mi ropa
  alternatives_spanish:
  - mi vestimenta
  - mis prendas
  - mi ropa de vestir
  lexicon: HALOT
  rationale: לְבוּשׁ es un término amplio para ropa o vestimenta. «Mi ropa» es claro y fiel, y mantiene el paralelismo con «mis vestidos» sin especificar una prenda concreta que el hebreo no determina.
- source_word: יַפִּילוּ
  english_pob_choice: they cast
  chosen_spanish: echan
  alternatives_spanish:
  - echan suertes
  - lanzan
  - tirarán
  lexicon: HALOT
  rationale: El hiphil de נפל con גוֹרָל forma el modismo «echar suertes». En español, «echan» junto con «suertes» expresa el giro idiomático con precisión y naturalidad.
- source_word: גוֹרָל
  english_pob_choice: lots
  chosen_spanish: suertes
  alternatives_spanish:
  - lotes
  - dados
  - suerte
  lexicon: HALOT
  rationale: גוֹרָל refiere a suertes o lotes para decidir una repartición. «Suertes» preserva la expresión bíblica tradicional en español y corresponde al plural idiomático de «echar suertes».
theological_decisions:
- issue: Eco cristológico y cita pasionaria
  english_pob_reading: Translate the Hebrew directly as the psalm's poetic description without importing explicit crucifixion language.
  chosen_spanish_reading: Traducir el hebreo de modo directo, y dejar el eco pasionario en nota sin introducir lenguaje explícito de crucifixión en el texto.
  alternative_spanish_readings:
  - una versión que mencione directamente la crucifixión de Jesús
  - una redacción que aluda de manera explícita al cumplimiento mesiánico
  rationale: El versículo describe literalmente el reparto de la ropa del salmista. La resonancia con los evangelios es real, pero debe mantenerse como eco y referencia cruzada, no como ampliación del texto base.
  doctrine_reference: Prioridad del texto fuente; la tipología mesiánica se preserva por nota, no por sobretraducción.
translation_notes:
  revision_awareness: El pasaje presenta un alto grado de concordancia con el texto hebreo y con el audit trail en inglés; no se requieren revisiones sustantivas respecto de la estructura ni del sentido. Se ha optado por una formulación española natural que conserva el paralelismo poético y el modismo de «echar suertes».
  spanish_consistency_notes:
  - Se mantiene el paralelismo entre «mis vestidos» y «mi ropa» para distinguir los dos términos hebreos sin forzar una diferencia excesivamente técnica.
  - «Entre sí» reproduce la distribución recíproca implícita en לָהֶם con un español idiomático.
  - El modismo «echan suertes» evita una traducción literal poco natural de יַפִּילוּ גוֹרָל.
  - La nota cruzada conserva la referencia cristológica documentada en el audit trail inglés sin incorporarla al cuerpo del versículo.
