review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia y el sentido general del arameo: Nebucadnezar se postra ante Daniel y manda presentar ofrendas para él. También preserva correctamente la cautela teológica de סְגִד con "rindió homenaje". Sin embargo, "perfumes" debilita y desplaza el matiz cultual de נִיחֹחִין en este contexto sacrificial; el rastro de auditoría inglés eligió "incense" como la mejor opción idiomática, conservando en nota la alternativa más literal "aromas agradables/sweet odors". Además, la nota b está mal anclada: la observación sobre libación corresponde al verbo לְנַסָּכָה, no a "perfumes".'
  spanish_quality_summary: 'El español es claro y legible, pero requiere un ajuste menor para mayor fidelidad y naturalidad cultual. "Entonces el rey Nabucodonosor cayó sobre su rostro" es comprensible, aunque algo calcado; aun así puede mantenerse. El principal problema de calidad es léxico y de notas: "perfumes" suena demasiado moderno/cosmético y menos sacrificial que "incienso". También conviene reordenar las notas para que cada una ancle en la palabra o frase pertinente.'
  glossary_alignment: 'No hay conflicto con los términos base del proyecto como Yahvé/Mesías/etc. La decisión teológica clave de סְגִד está bien alineada con el POB: "rindió homenaje" en vez de "adoró". La revisión necesaria es contextual: נִיחֹחִין debe representarse como "incienso" en el texto principal, con nota para "aromas agradables/aromas fragantes"; y la nota sobre libación debe anclarse al verbo de ofrecer.'
  issues:
  - severity: medium
    issue: '"perfumes" para נִיחֹחִין'
    rationale: Aunque el término puede evocar aromas agradables, en este contexto de מִנְחָה + לנסכה el registro es cultual. "Incienso" refleja mejor la decisión documentada del POB en inglés y evita una connotación cosmética moderna.
  - severity: medium
