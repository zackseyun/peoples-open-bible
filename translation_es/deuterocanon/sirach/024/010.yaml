translation:
  language: es
  text: En la tienda santa[a] delante de él ministré[b], y así fui establecido en Sión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "en el tabernáculo santo"; también puede entenderse como "en el santuario santo".
    reason: lexical_alternative
  - marker: b
    text: O "En la tienda santa, delante de él, ministré, y así fui establecido en Sión".
    reason: previous_rendering
lexical_decisions:
- source_word: σκηνῇ ἁγίᾳ
  english_pob_choice: the holy tent
  chosen_spanish: la tienda santa
  alternatives_spanish:
  - el tabernáculo santo
  - el santuario santo
  lexicon: LSJ
  rationale: σκηνή designa literalmente una tienda o tabernáculo; en español, 'tienda' conserva la imagen concreta del recinto cultual y evita imponer un tecnicismo más eclesiástico. 'Santa' comunica ἁγίᾳ de forma directa.
- source_word: ἐνώπιον αὐτοῦ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  lexicon: LSJ
  rationale: La expresión griega mantiene una relación espacial y relacional. 'Delante de él' reproduce esa cercanía sin añadir interpretación, mientras que 'en su presencia' es más idiomático pero algo más explicativo.
- source_word: ἐλειτούργησα
  english_pob_choice: I ministered
  chosen_spanish: ministré
  alternatives_spanish:
  - presté servicio
  - ejercí servicio sagrado
  lexicon: BDAG
  rationale: λειτουργέω en contexto cultual señala servicio sagrado o ministerio religioso. 'Ministré' conserva esa fuerza cultual en español y es natural en registro bíblico, sin forzar una terminología litúrgica posterior.
- source_word: οὕτως
  english_pob_choice: so
  chosen_spanish: y así
  alternatives_spanish:
  - así
  - de este modo
  lexicon: LSJ
  rationale: La partícula conecta el servicio previo con el resultado. 'Y así' expresa con claridad la relación consecutiva sin alterar el sentido.
- source_word: ἐστηρίχθην
  english_pob_choice: I was established
  chosen_spanish: fui establecido
  alternatives_spanish:
  - quedé firmemente establecido
  - fui afirmado
  lexicon: BDAG
  rationale: στηρίζω en pasivo indica ser fijado o hecho firme. 'Fui establecido' preserva la pasiva y la dignidad formal del enunciado.
- source_word: Σειὼν
  english_pob_choice: Zion
  chosen_spanish: Sión
  alternatives_spanish:
  - Sion
  lexicon: LSJ
  rationale: '''Sión'' es la forma usual y reconocible en español para Σειών/Σειὼν.'
theological_decisions:
- issue: Matiz cultual del verbo λειτουργέω
  english_pob_reading: Render ἐλειτούργησα as 'I ministered' to preserve sacred-service language without narrowing it to a specific priestly office.
  chosen_spanish_reading: Renderizar ἐλειτούργησα como 'ministré' para conservar el sentido de servicio sagrado sin convertirlo en un título sacerdotal explícito.
  alternative_spanish_readings:
  - presté servicio
  - ejercí servicio sacerdotal
  rationale: El texto presenta a la Sabiduría personificada en un marco de culto, pero no le asigna un cargo sacerdotal formal. 'Ministré' mantiene la resonancia religiosa y deja abierta la tensión del pasaje.
  doctrine_reference: 'Principio POB: preservar la tensión teológica cuando el griego no la resuelve; español claro y reverente.'
translation_notes:
  revision_awareness: 'El texto español sigue el ajuste final del POB inglés que elimina una puntuación disyuntiva y mantiene la secuencia del griego: ''ἐν σκηνῇ ἁγίᾳ ἐνώπιον αὐτοῦ ἐλειτούργησα''. Se priorizó una sintaxis española fluida que conserve el orden lógico del original y la relación resultativa con ''y así''.'
  spanish_consistency_notes:
  - Se usó 'Sión' como forma estándar en español para Σειών.
  - '''Ministré'' conserva el campo semántico cultual sin sobreespecificar oficio sacerdotal.'
  - '''Fui establecido'' mantiene la pasiva del griego y la idea de firmeza/estabilidad.'
