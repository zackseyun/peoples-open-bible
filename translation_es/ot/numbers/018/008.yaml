  text: וַ/יְדַבֵּ֣ר יְהוָה֮ אֶֽל אַהֲרֹן֒ וַ/אֲנִי֙ הִנֵּ֣ה נָתַ֣תִּֽי לְ/ךָ֔ אֶת מִשְׁמֶ֖רֶת תְּרוּמֹתָ֑/י לְ/כָל קָדְשֵׁ֣י בְנֵֽי יִ֠שְׂרָאֵל לְ/ךָ֨ נְתַתִּ֧י/ם לְ/מָשְׁחָ֛ה וּ/לְ/בָנֶ֖י/ךָ לְ/חָק עוֹלָֽם־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/018/008.yaml
  text: 'Then Yahweh spoke to Aaron: “And I[a], behold, I have given you the charge of my contributions, all the holy gifts of the sons of Israel. I have given them to you for an anointing portion[c][b], and to your sons as a permanent statute.”'
  footnotes:
  - marker: a
    text: Or “my offerings” or, more technically, “my heave offerings.”
    reason: lexical_alternative
  - marker: b
    text: Or “for anointing”; the Hebrew likely means the portion belonging to Aaron by virtue of his anointed priestly office.
    reason: lexical_alternative
  - marker: c
    text: Hebrew “sons of Israel,” the standard covenantal designation for the people of Israel.
    reason: cultural_note
