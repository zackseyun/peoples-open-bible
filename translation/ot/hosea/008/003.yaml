id: HOS.8.3
reference: Hosea 8:3
source:
  edition: WLC
  text: זָנַ֥ח יִשְׂרָאֵ֖ל ט֑וֹב אוֹיֵ֖ב יִרְדְּֽפ/וֹ׃
translation:
  text: Israel has rejected the good[a]; an enemy will pursue him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Israel has cast off the good.' The Hebrew may also be rendered more literally with 'the good' rather than 'what is good.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זָנַח
  chosen: has rejected
  alternatives:
  - has cast off
  - has spurned
  - has abandoned
  lexicon: HALOT
  rationale: The verb denotes rejecting or casting off. 'Has rejected' is clear modern English and preserves the force of deliberate repudiation better than a softer option.
- source_word: יִשְׂרָאֵל
  chosen: Israel
  rationale: Proper name referring to the nation/personified people; standard transliteration is appropriate.
- source_word: טוֹב
  chosen: what is good
  alternatives:
  - good
  - the good
  lexicon: HALOT
  rationale: The adjective is used substantivally here. 'What is good' communicates the object of rejection idiomatically in English while preserving the broad moral/religious sense, rather than narrowing it to a specific concrete good thing.
- source_word: אוֹיֵב
  chosen: an enemy
  alternatives:
  - the enemy
  - foe
  lexicon: HALOT
  rationale: The singular functions generically. 'An enemy' fits the lack of article in Hebrew and conveys the coming hostile pursuer without over-specifying identity.
- source_word: יִרְדְּפוֹ
  chosen: will pursue him
  alternatives:
  - pursues him
  - will chase him
  lexicon: HALOT
  rationale: The imperfect naturally conveys future consequence in this prophetic context. The 3ms suffix is rendered 'him,' matching the personified singular Israel in the verse.
