revisions:
- from: Estas son las testimonios[a], los estatutos y los juicios que Moisés habló a los hijos de Israel cuando salieron de Egipto.
  to: Estos son los testimonios, los estatutos y los juicios que Moisés dijo a los hijos de Israel[a] cuando salieron de Egipto.
  rationale: Se corrige el error gramatical «las testimonios» a «los testimonios». También se ajusta «Estas son» a «Estos son» para concordar con la serie masculina plural encabezada por «testimonios», y se mejora la naturalidad de «habló a» a «dijo a» sin apartarse del sentido de דִּבֶּר. La nota al pie se traslada a «los hijos de Israel» para reflejar la alternativa lexical documentada en el POB inglés y evitar una nota innecesaria sobre «testimonios».
