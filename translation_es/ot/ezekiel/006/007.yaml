translation:
  language: es
  text: Caerá un [a]muerto[a] en medio de ustedes, y sabrán que yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: חָלָל, término que puede designar a alguien muerto por violencia; aquí se traduce de forma general como “muerto”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָפַל
  english_pob_choice: will fall
  chosen_spanish: Caerá
  alternatives_spanish:
  - caerá
  - va a caer
  - caerá abatido
  lexicon: HALOT
  rationale: El hebreo en discurso profético expresa un hecho futuro/resultativo; en español, el futuro simple mantiene bien ese valor y conserva la fuerza eventiva del verbo.
- source_word: חָלָל
  english_pob_choice: the slain
  chosen_spanish: muerto
  alternatives_spanish:
  - el caído
  - el abatido
  - el herido
  - el muerto
  lexicon: HALOT
  rationale: El sustantivo apunta a una persona muerta o tendida por la violencia; en español, 'muerto' comunica la realidad del resultado sin introducir una perífrasis extraña. Se evita 'herido' porque debilita el juicio mortal que el contexto sugiere.
- source_word: בְּתוֹכְכֶם
  english_pob_choice: in your midst
  chosen_spanish: en medio de ustedes
  alternatives_spanish:
  - entre ustedes
  - en su medio
  - dentro de ustedes
  lexicon: HALOT
  rationale: La frase indica ubicación dentro del grupo, no interioridad física. 'En medio de ustedes' es natural, solemne y fiel al matiz colectivo.
- source_word: וִידַעְתֶּם
  english_pob_choice: you will know
  chosen_spanish: sabrán
  alternatives_spanish:
  - conocerán
  - entonces sabrán
  - reconocerán
  lexicon: HALOT
  rationale: El hebreo usa la fórmula de reconocimiento típica de Ezequiel. 'Sabrán' conserva la claridad futura y la fórmula de conocimiento sin añadir explicación interpretativa.
- source_word: כִּי אֲנִי יְהוָה
  english_pob_choice: that I am Yahweh
  chosen_spanish: que yo soy Yahvé
  alternatives_spanish:
  - que yo soy Yahvé
  - que yo soy el Dios Yahvé
  - que yo soy el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se preserva el nombre divino explícito del hebreo como 'Yahvé', en consonancia con la directriz del proyecto. Se evita 'SEÑOR' porque ocultaría el Tetragrámaton y debilitaría la fórmula de reconocimiento de Ezequiel.
theological_decisions:
- issue: Preservación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el nombre propio de Dios y la política del proyecto pide hacerlo visible en el texto principal. 'Yahvé' es la forma española estándar adoptada aquí para respetar esa transparencia.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El contexto auditado en inglés decidió una lectura futura y resultativa para וְנָפַל, tomó חָלָל como 'the slain' y marcó una nota sobre la alternativa de traducir el nombre divino como 'Yahweh'. La versión española conserva esas decisiones centrales, pero adapta el nombre divino a la convención del proyecto ('Yahvé') y explicita en nota la alternativa léxica de חָלָל para evitar perder la tensión entre 'slain', 'wounded' y 'corpse'.
  spanish_consistency_notes:
  - Se mantiene el registro profético sobrio y directo.
  - '''Yahvé'' se usa consistentemente para יְהוָה en el texto principal.'
  - La nota al pie se ancla en 'muerto' para señalar la alternativa léxica de חָלָל sin sobrecargar el texto principal.
