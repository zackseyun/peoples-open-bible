review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura hebrea y preserva la agencia divina directa, así como las metáforas de «flechas del hambre» y «staff/staff of bread». Sin embargo, hay dos problemas de fidelidad/claridad: (1) el antecedente de la nota [b] está mal anclado, porque la nota explica «el bastón del pan» pero el marcador aparece en «destruirlos»; (2) «bastón del pan» suena menos idiomático y menos transparente en registro bíblico que «sostén del pan», aunque aquí el inglés POB pidió conservar la metáfora, por lo que conviene una opción más natural como «el sustento del pan» o mantener la metáfora con una nota. También hay una leve inconsistencia pronominal entre «ellos», «los» y «ustedes», aunque el hebreo efectivamente cambia de tercera persona a segunda persona.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero «quebrantaré para ustedes el bastón del pan» suena forzado. «Quebraré para ustedes el sustento del pan» sería demasiado interpretativo para el cuerpo principal; mejor mantener la imagen con una forma más natural: «quebraré el sustento del pan» perdería el לָכֶם. Una solución fiel y legible es «quebraré para ustedes el sostén del pan» o «el bastón del pan» con la nota bien anclada. También conviene cambiar «las cuales» por «que» para fluidez moderna.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparece Yahvé/Mesías/etc. La preservación de metáforas y de la acción divina coincide con el razonamiento auditado. La principal corrección es de anclaje de nota y naturalidad léxica en español.
  issues:
  - severity: high
    issue: La nota [b] está anclada en «destruirlos» en vez de en «el bastón del pan».
    rationale: La nota explica el modismo hebreo מַטֵּה לָחֶם («el bastón del pan»), por lo que el marcador debe aparecer exactamente en esa frase, no en otra cláusula.
  - severity: medium
    issue: «Bastón del pan» es comprensible pero poco natural en español bíblico general.
    rationale: Aunque preserva la metáfora, «bastón» en esta expresión puede sonar extraño. «Sostén del pan» mantiene mejor la imagen de apoyo/sustento y conecta con la explicación de la nota.
  - severity: low
    issue: «Las cuales enviaré» suena más pesado de lo necesario.
    rationale: «Que enviaré» es más natural en español moderno y no pierde ninguna información del hebreo.
  revised_spanish_text: Cuando envíe contra ellos las flechas mortales[a] del hambre, que son para destrucción, que enviaré para destruirlos, entonces añadiré hambre sobre ustedes y quebraré para ustedes el sostén del pan[b].
  revised_footnotes:
  - marker: a
    text: 'O: «las flechas dañinas/desastrosas del hambre».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el bastón del pan», un modismo para la provisión o el sostén del pan.'
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje obligatorio de la nota [b] al sintagma que realmente explica el modismo hebreo. Además, se mejora la naturalidad del español con «que» en vez de «las cuales» y con «sostén del pan», que conserva la imagen de apoyo/sustento de מַטֵּה לָחֶם sin volverla opaca en español. Se mantiene la agencia divina directa y la imaginería de juicio del texto fuente.
