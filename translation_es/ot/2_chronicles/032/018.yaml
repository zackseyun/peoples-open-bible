translation:
  language: es
  text: Y ellos clamaron con gran voz en judeo[a] al pueblo de Jerusalén que estaban sobre el muro, para asustarlos y aterrorizarlos, a fin de capturar la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Judeo» intenta reflejar el valor etnolingüístico de יְהוּדִית. Otras posibilidades son «en el idioma de Judá» o, de modo tradicional, «en hebreo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרְאוּ
  english_pob_choice: they called out
  chosen_spanish: clamaban
  alternatives_spanish:
  - gritaban
  - llamaban
  lexicon: HALOT
  rationale: קרא aquí expresa una proclamación en voz alta dirigida a un auditorio. «Clamaban» conserva el acto de alzar la voz públicamente sin reducirlo a un grito puramente emocional.
- source_word: בְקוֹל גָּדוֹל
  english_pob_choice: with a loud voice
  chosen_spanish: con voz muy alta
  alternatives_spanish:
  - con gran voz
  - en voz alta
  lexicon: HALOT
  rationale: La frase hebrea es literalmente «con una voz grande/fuerte». «Con voz muy alta» reproduce la fuerza sonora de manera natural en español y mantiene la correspondencia léxica con la imagen vocal.
- source_word: יְהוּדִית
  english_pob_choice: in Judean
  chosen_spanish: en judeo
  alternatives_spanish:
  - en el idioma de Judá
  - en hebreo
  lexicon: HALOT
  rationale: El término apunta a la lengua o habla de Judá. Se evita «hebreo» como etiqueta técnica porque el dato del texto es etnolingüístico; «judeo» mantiene esa referencia, aunque suene menos tradicional.
- source_word: עַל עַם יְרוּשָׁלִַם אֲשֶׁר עַל הַחוֹמָה
  english_pob_choice: to the people of Jerusalem who were on the wall
  chosen_spanish: al pueblo de Jerusalén que estaba sobre el muro
  alternatives_spanish:
  - contra el pueblo de Jerusalén que estaba sobre el muro
  - sobre el pueblo de Jerusalén que estaba sobre el muro
  lexicon: HALOT
  rationale: Con un verbo de hablar o proclamar, עַל puede marcar al destinatario. Por eso se traduce «al pueblo», no con un matiz adversativo, y se conserva la localización «sobre el muro».
- source_word: לְיָרְאָם
  english_pob_choice: to frighten them
  chosen_spanish: para aterrorizarlos
  alternatives_spanish:
  - para asustarlos
  - para hacerlos temer
  lexicon: HALOT
  rationale: La forma causativa expresa inducir temor. «Aterrorizarlos» refleja con fuerza esa intención; se deja una opción menos intensa en alternativas por si se prefiere un registro algo más suave.
- source_word: וּלְבַהֲלָם
  english_pob_choice: to terrify them
  chosen_spanish: y espantarlos
  alternatives_spanish:
  - y alarmarlos
  - y atemorizarlos
  lexicon: HALOT
  rationale: בהל añade la idea de sobresalto, pánico o descomposición interior. «Espantarlos» conserva la intensificación del par verbal sin repetir exactamente el mismo matiz de «aterrorizarlos».
- source_word: לְמַעַן יִלְכְּדוּ אֶת הָעִיר
  english_pob_choice: so that they might capture the city
  chosen_spanish: a fin de tomar la ciudad
  alternatives_spanish:
  - para capturar la ciudad
  - a fin de apoderarse de la ciudad
  lexicon: HALOT
  rationale: למען introduce finalidad. לכד en contexto militar es «capturar/tomar». «Tomar la ciudad» es idiomático en español bíblico contemporáneo y preserva la meta militar sin cargar innecesariamente el verbo.
translation_notes:
  revision_awareness: Se siguió el ajuste del audit trail inglés que prefirió una equivalencia más cercana a «with a loud voice» en lugar de un adverbio más libre. Por eso el español usa una frase nominal explícita («con voz muy alta») en vez de un adverbio solo.
  spanish_consistency_notes:
  - 'Se mantuvo la secuencia verbal doble del hebreo: «aterrorizarlos y espantarlos».'
  - Se preservó el destinatario con «al pueblo de Jerusalén» para reflejar la función discursiva de עַל.
  - Se evitó «SEÑOR» u otra sustitución teológica, ya que este versículo no contiene el Tetragrámaton en el texto base.
