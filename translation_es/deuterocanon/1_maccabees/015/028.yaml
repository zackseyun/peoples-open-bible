review_pass:
  verdict: revise
  source_alignment_summary: 'La base del borrador sigue en general el sentido del griego: envío de un emisario cortesano para hablar con Simón y acusación de retener tres plazas pertenecientes al reino. Sin embargo, hay varias decisiones léxicas que no preservan bien la evidencia fuente ni la pista auditada en inglés: Ἀθηνόβιον no debe aparecer como «Atnobio»; «Atenobio» es la transliteración española normal y fiel. κοινολογησόμενον αὐτῷ se expresa mejor como «para conferenciar con él» o «para tratar con él»; eso está bien. El mayor problema es ἄκρας: «acrópolis» no corresponde bien aquí, porque el inglés auditado fijó «the citadel» con nota sobre «Acra», y el griego apunta a la fortaleza/ciudadela seleúcida, no a una acrópolis en sentido general clásico. También la nota a) es impropia: no debe explicar una transliteración errónea del propio borrador ni remitir al inglés como autoridad principal.'
  spanish_quality_summary: 'El español es mayormente claro, pero tiene detalles poco naturales o inadecuados para el proyecto: «envió a él» suena calcado; mejor «le envió». «Atnobio» es una forma extraña e innecesaria. «Amigos» con mayúscula puede mantenerse por el matiz cortesano, aunque en español conviene explicarlo en la decisión léxica más que forzarlo con nota. «acrópolis» introduce un referente histórico distinto del que necesita el texto. «citadela» en la nota está mal escrito; debe ser «ciudadela».'
  glossary_alignment: 'No hay términos teológicos mayores en juego. La alineación terminológica principal exige respetar la forma griega de los topónimos cuando el POB inglés la preserva: «Gazara» está bien. «Joppe» es aceptable como forma española cercana al griego, aunque «Jope» también sería viable; no requiere cambio. Para ἄκρας, la opción alineada con la auditoría es «la ciudadela» en texto principal, con nota sobre «Acra» como alternativa histórica/nombre propio.'
  issues:
  - severity: high
    issue: Nombre propio «Atnobio»
    rationale: Ἀθηνόβιον no está bien representado por «Atnobio». La forma española fiel y legible es «Atenobio», sin necesidad de nota.
  - severity: high
    issue: Traducción de ἄκρας como «acrópolis»
    rationale: «Acrópolis» no es el equivalente adecuado aquí y desvía el sentido hacia otro concepto. El contexto y la auditoría inglesa apoyan «ciudadela» con nota sobre «Acra».
  - severity: medium
    issue: Construcción «envió a él»
    rationale: Es comprensible pero poco natural en español bíblico moderno; «le envió» o «envió a Atenobio a verlo» fluye mejor sin perder literalidad.
  - severity: medium
