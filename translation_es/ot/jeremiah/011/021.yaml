    rationale: El POB inglés conserva una nota para וְלֹא תָמוּת בְּיָדֵנוּ explicando que la forma hebrea es literalmente negativa pero funciona como amenaza. El español debe preservar esa justificación, especialmente porque 'no sea que mueras...' puede sugerir advertencia más que amenaza.
  - severity: low
    issue: Hay espaciado/puntuación incorrecta antes del marcador [a].
    rationale: En español no debe quedar 'Yahvé, [a] no sea'; el marcador debe ir pegado al término anclado o a la frase relevante sin espacio impropio, y la puntuación debe fluir naturalmente.
