translation:
  language: es
  text: A los veinticuatro días del mes noveno, en el segundo año de Darío, vino la palabra de Yahvé a Hageo el profeta, diciendo,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּ/עֶשְׂרִים וְ/אַרְבָּעָה
  english_pob_choice: on the twenty-fourth day
  chosen_spanish: el día veinticuatro
  alternatives_spanish:
  - el veinticuatro
  - en el día veinticuatro
  lexicon: HALOT
  rationale: La fórmula hebrea expresa una fecha de manera idiomática. En español, añadir «día» hace natural y claro el valor dativo sin alejarse del original.
- source_word: לַ/תְּשִׁיעִי
  english_pob_choice: of the ninth month
  chosen_spanish: del mes noveno
  alternatives_spanish:
  - del noveno mes
  - del noveno
  lexicon: HALOT
  rationale: El ordinal apunta al mes noveno en una datación. «Mes noveno» mantiene el orden hebreo y suena más fluido que una simple ordinalidad aislada.
- source_word: בִּ/שְׁנַת שְׁתַּיִם
  english_pob_choice: in the second year
  chosen_spanish: en el segundo año
  alternatives_spanish:
  - en año dos
  - en el año segundo
  lexicon: HALOT
  rationale: Es una fórmula regnal estándar. «Segundo año» es la equivalencia española más natural y fiel.
- source_word: לְ/דָרְיָוֶשׁ
  english_pob_choice: of Darius
  chosen_spanish: de Darío
  alternatives_spanish:
  - de Dario
  lexicon: HALOT
  rationale: El nombre propio se vierte con la forma española usual «Darío». El lamed dentro de la fórmula cronológica se expresa naturalmente con «de».
- source_word: הָיָה דְּבַר יְהוָה
  english_pob_choice: the word of Yahweh came
  chosen_spanish: vino la palabra de Yahvé
  alternatives_spanish:
  - fue la palabra de Yahvé
  - llegó la palabra de Yahvé
  lexicon: HALOT
  rationale: El hebreo usa la fórmula profética idiomática הָיָה + דְּבַר יְהוָה. «Vino» conserva el movimiento de irrupción del mensaje divino mejor que un simple «era/fue».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene la decisión del POB en español de transliterar el nombre divino como «Yahvé», en lugar de sustituirlo por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - hacia
  lexicon: HALOT
  rationale: La preposición marca al destinatario del mensaje. En español, «a» es la equivalencia más natural y precisa.
- source_word: חַגַּ֥י
  english_pob_choice: Haggai
  chosen_spanish: Hageo
  alternatives_spanish:
  - Haggai
  lexicon: HALOT
  rationale: Se usa la forma española bíblica tradicional «Hageo», que es la transliteración asentada en español para este profeta.
- source_word: הַ/נָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - profeta
  lexicon: HALOT
  rationale: El artículo refleja el hebreo y mantiene la fórmula profética completa en español.
- source_word: לֵ/אמֹר
  english_pob_choice: saying,
  chosen_spanish: diciendo,
  alternatives_spanish:
  - y dijo,
  - así diciendo,
  lexicon: HALOT
  rationale: «Diciendo» reproduce la fórmula introductoria abierta que enlaza con la cita siguiente sin sobreinterpretarla.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrama directamente. La lectura elegida preserva el nombre personal de Dios conforme a la política del POB y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Yahvé'
translation_notes:
  revision_awareness: La versión inglesa revisada permanece sin cambios; no hay notas ni variantes textuales que requieran reflejo adicional en español. La redacción española sigue de cerca la fórmula cronológica y profética del hebreo, con equivalencias idiomáticas naturales en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה en coherencia con el estándar del proyecto.
  - Se usa «Hageo» como forma española del nombre del profeta, por consistencia bíblica en español.
  - La construcción verbal «vino la palabra» conserva la fuerza idiomática de la fórmula profética sin convertirla en paráfrasis.
