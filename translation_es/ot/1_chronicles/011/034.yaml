lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - hijos de
  - los hijos de
  lexicon: HALOT
  rationale: El hebreo presenta un constructo plural de בן. En español, 'los hijos de' conserva el sentido de filiación y el tono de lista genealógica. Mantengo el plural y no armonizo con 2 Samuel 23:32, siguiendo el texto masorético de Crónicas.
- source_word: הָשֵׁם
  english_pob_choice: Hashem
  chosen_spanish: Hashem
  alternatives_spanish:
  - Hasem
  - Jashem
  lexicon: HALOT
  rationale: Es un nombre propio; la transliteración conserva la forma del texto fuente. 'Hashem' es la representación más reconocible y evita convertirlo indebidamente en un término común.
- source_word: הַגִּזוֹנִי
  english_pob_choice: the Gizonite
  chosen_spanish: el gizonita
  alternatives_spanish:
  - el gizoní
  - el gizonita de Gizón
  lexicon: HALOT
  rationale: Se trata de un gentilicio/procedencia con artículo. En español, '-ita' comunica de manera natural el valor gentilicio y preserva el artículo sin añadir explicación no presente en el hebreo.
- source_word: יוֹנָתָן
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonathan
  lexicon: HALOT
  rationale: Nombre propio bíblico. 'Jonatán' es la forma castellana usual y plenamente inteligible en registro bíblico.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - el hijo de
  - hijo de
  lexicon: HALOT
  rationale: Fórmula genealógica directa. 'Hijo de' reproduce con naturalidad la relación de filiación en español.
- source_word: שָׁגֵה
  english_pob_choice: Shagee
  chosen_spanish: Shagee
  alternatives_spanish:
  - Shagé
  - Shage
  lexicon: HALOT
  rationale: Nombre propio transliterado. Conservo 'Shagee' para reflejar la tradición de transliteración inglesa auditada y evitar introducir una forma no documentada.
- source_word: הַהֲרָרִי
  english_pob_choice: the Hararite
  chosen_spanish: el hararita
  alternatives_spanish:
  - el harari
  - el de Harar
  lexicon: HALOT
  rationale: Gentilicio/procedencia con artículo. 'Hararita' mantiene el valor de origen y resulta natural en español; no lo trato como segundo nombre personal.
theological_decisions:
- issue: Armonización con el paralelo de 2 Samuel 23:32
  english_pob_reading: The Hebrew text reads 'the sons of Hashem the Gizonite.' The parallel list in 2 Samuel 23:32 has a different name sequence, often reflected in translations or reconstructions.
  chosen_spanish_reading: Se conserva 'los hijos de Hashem el gizonita' con nota textual, sin armonizar con el paralelo.
  alternative_spanish_readings:
  - armonizar la lista con 2 Samuel 23:32
  - reconstruir una secuencia de nombres distinta
  rationale: La lectura de Crónicas está atestiguada en el hebreo masorético y la POB inglesa documenta explícitamente la variante. En una edición transparente, la solución es mantener el texto recibido y señalar la discrepancia en nota, no resolverla por conjetura.
  doctrine_reference: Transparencia textual / crítica textual del AT
translation_notes:
  revision_awareness: 'Coincido con el pase de revisión más reciente: no se requieren cambios respecto al sentido del hebreo ni a la nota textual sobre la variante paralela. La traducción mantiene la forma masorética de 1 Crónicas 11:34 y conserva la transparencia auditada.'
  spanish_consistency_notes:
  - Se conserva el patrón genealógico breve propio de una lista de nombres.
  - Se usa 'gizonita' y 'hararita' como gentilicios, no como apodos ni nombres adicionales.
  - La nota textual marca la discrepancia con 2 Samuel 23:32 sin alterar el cuerpo del versículo.
