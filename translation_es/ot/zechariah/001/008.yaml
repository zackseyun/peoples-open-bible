translation:
  language: es
  text: Vi en la noche[a], y he aquí, un hombre montado sobre un caballo rojo. Estaba de pie entre los mirtos que estaban en la hondonada, y detrás de él había caballos rojos, alazanes[b] y blancos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en las profundidades' o 'en la hondonada'; el hebreo probablemente se refiere a un lugar bajo o una depresión.
    reason: lexical_alternative
  - marker: b
    text: O 'moteados', 'manchados' o quizá otro color de pelaje marrón-rojizo.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאִיתִי
  english_pob_choice: I saw
  chosen_spanish: Vi
  alternatives_spanish:
  - Vi en visión
  - Miré
  lexicon: HALOT
  rationale: El perfecto qal de 1.ª persona singular expresa simplemente la acción de ver. En español, 'Vi' es directo y no añade la interpretación de 'visión', que el contexto narrativo ya sugiere.
- source_word: הַלַּיְלָה
  english_pob_choice: in the night
  chosen_spanish: en la noche
  alternatives_spanish:
  - de noche
  - esa noche
  lexicon: HALOT
  rationale: Con el artículo, la expresión sitúa la escena en un marco nocturno concreto. 'En la noche' conserva esa referencia de manera natural en español.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y resultó que
  lexicon: HALOT
  rationale: La partícula introduce la escena con sorpresa y énfasis visual. 'Y he aquí' mantiene ese valor discursivo sin volverlo demasiado moderno.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una figura
  - alguien
  lexicon: HALOT
  rationale: El sustantivo común masculino singular debe conservarse como 'hombre'. No hay base en el versículo para neutralizarlo o identificarlo más allá de lo que el texto dice.
- source_word: רֹכֵב עַל סוּס
  english_pob_choice: riding on a horse
  chosen_spanish: montado sobre un caballo
  alternatives_spanish:
  - cabalgando sobre un caballo
  - montando un caballo
  lexicon: HALOT
  rationale: La construcción participial con עַל describe a alguien a caballo. 'Montado sobre un caballo' es claro y fiel en español.
- source_word: אָדֹם
  english_pob_choice: red
  chosen_spanish: rojo
  alternatives_spanish:
  - bermejo
  - colorado
  lexicon: HALOT
  rationale: El adjetivo denota el color rojo; 'rojo' es el equivalente más directo y sobrio.
- source_word: וְהוּא עֹמֵד
  english_pob_choice: He was standing
  chosen_spanish: Él estaba de pie
  alternatives_spanish:
  - y estaba de pie
  - él permanecía
  lexicon: HALOT
  rationale: El pronombre más el participio expresa una postura en curso. 'Estaba de pie' reproduce bien el valor descriptivo de la escena.
- source_word: בֵּין הַהֲדַסִּים
  english_pob_choice: among the myrtle trees
  chosen_spanish: entre los mirtos
  alternatives_spanish:
  - entre los árboles de mirto
  - entre las mirtas
  lexicon: HALOT
  rationale: הֲדַסִּים son mirtos. 'Entre los mirtos' es natural y suficientemente preciso; evita explicar de más la imagen botánica.
- source_word: בַּמְּצֻלָה
  english_pob_choice: in the ravine
  chosen_spanish: en la hondonada
  alternatives_spanish:
  - en la profundidad
  - en el hondo
  lexicon: HALOT
  rationale: El término puede referirse a un lugar bajo, hondo o deprimido. 'Hondonada' conserva esa idea topográfica sin forzar una sola identificación geográfica; en español también permite el matiz alternativo preservado por la POB inglesa.
- source_word: וְאַחֲרָיו
  english_pob_choice: and behind him were
  chosen_spanish: y detrás de él había
  alternatives_spanish:
  - y tras él había
  - y detrás de él venían
  lexicon: HALOT
  rationale: La expresión marca posición espacial relativa. 'Detrás de él había' funciona de forma natural en español para introducir los caballos posteriores.
- source_word: סוּסִים
  english_pob_choice: horses
  chosen_spanish: caballos
  alternatives_spanish:
  - corceles
  lexicon: HALOT
  rationale: Sustantivo plural directo; 'caballos' es el término neutro y claro.
- source_word: אֲדֻמִּים
  english_pob_choice: red
  chosen_spanish: rojos
  alternatives_spanish:
  - colorados
  - bermejos
  lexicon: HALOT
  rationale: Adjetivo plural concordando con 'caballos'. Se mantiene el mismo color básico que el caballo principal.
- source_word: שְׂרֻקִּים
  english_pob_choice: sorrel
  chosen_spanish: tordos
  alternatives_spanish:
  - atigrados
  - sorrel
  lexicon: HALOT
  rationale: El término hebreo es raro y su coloración exacta es debatida. 'Tordos' preserva la idea de un pelaje distintivo sin afirmar con exceso un patrón específico; se reconoce que es una aproximación lexical, no una equivalencia cerrada.
- source_word: וּלְבָנִים
  english_pob_choice: and white
  chosen_spanish: y blancos
  alternatives_spanish:
  - y de color blanco
  - y albos
  lexicon: HALOT
  rationale: Adjetivo plural simple, coordinado con los colores anteriores.
theological_decisions:
- issue: Identidad del hombre sobre el caballo rojo
  english_pob_reading: Render generically as 'a man' without identifying him in the translation.
  chosen_spanish_reading: Traducirlo de manera genérica como 'un hombre', sin identificarlo teológicamente en el texto.
  alternative_spanish_readings:
  - el ángel de Yahvé
  - una figura simbólica
  - una manifestación preencarnada de Cristo
  rationale: El versículo presenta la figura solo como 'un hombre'. La traducción no debe importar una identificación doctrinal que el hebreo de este versículo no explicita; conviene conservar la tensión interpretativa para el contexto posterior.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla anticipadamente.
translation_notes:
  revision_awareness: La revisión más reciente del texto fuente no introdujo cambios; el cotejo final indica alta concordancia y no se registraron enmiendas aplicadas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma preferida del nombre divino cuando corresponda; en este versículo no aparece.
  - Se conserva 'he aquí' para וְהִנֵּה por su valor discursivo de atención súbita.
  - '''Mirtos'' se usa como equivalente natural de הֲדַסִּים, sin convertir la imagen en una explicación botánica.'
  - La nota de 'tordos' recoge la misma incertidumbre lexical que la nota inglesa para שְׂרֻקִּים.
  - No se introduce identificación cristológica o angélica del jinete, para no cerrar una ambigüedad que el versículo deja abierta.
