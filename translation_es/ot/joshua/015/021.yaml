base_translation:
  language: en
  yaml_path: translation/ot/joshua/015/021.yaml
  text: And the cities at the extremity of the tribe of the sons of Judah[a], toward the border of Edom in the Negev, were Kabzeel, Eder[b], and Jagur.
  footnotes:
