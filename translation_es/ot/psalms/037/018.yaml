translation:
  language: es
  text: Yahvé conoce los días de los íntegros[a], y su herencia será para siempre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los rectos» o «los de corazón entero» para «los íntegros».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «su herencia será para siempre». La frase puede implicar posesión duradera o permanencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre propio divino del Tetragrámaton, siguiendo la decisión auditada de la POB de no sustituirlo por un título. En español, 'Yahvé' mantiene esa transparencia y es la forma más natural dentro del registro bíblico moderno.
- source_word: יוֹדֵעַ
  english_pob_choice: knows
  chosen_spanish: conoce
  alternatives_spanish:
  - sabe
  - está atento a
  lexicon: HALOT
  rationale: '''Conoce'' expresa conocimiento personal y continuo de manera natural en español. Evita el matiz demasiado abstracto de ''sabe'' y no añade la paráfrasis interpretativa de ''está atento a''.'
- source_word: יְמֵי
  english_pob_choice: the days of
  chosen_spanish: los días de
  alternatives_spanish:
  - la vida de
  - el curso de los días de
  lexicon: HALOT
  rationale: Se conserva la forma idiomática hebrea 'días de' en vez de expandirla interpretativamente. En español, 'los días de' es claro y refleja el texto sin forzar una glosa.
- source_word: תְמִימִם
  english_pob_choice: the blameless
  chosen_spanish: los íntegros
  alternatives_spanish:
  - los irreprochables
  - los rectos
  - los de corazón entero
  lexicon: HALOT
  rationale: '''Íntegros'' comunica bien la idea de integridad/entereza de תמים sin sugerir impecabilidad moral absoluta. Se evita ''blameless'' como calco y también ''sin culpa'', que podría sobreactuar la fuerza ética del término.'
- source_word: נַחֲלָתָם
  english_pob_choice: their inheritance
  chosen_spanish: su herencia
  alternatives_spanish:
  - su heredad
  - su posesión
  lexicon: HALOT
  rationale: '''Herencia'' es el equivalente español más natural para נחלה en este contexto, manteniendo la resonancia de posesión asignada y duradera. Se prefiere a ''heredad'' por fluidez moderna.'
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: '''Para siempre'' es la expresión idiomática y precisa en español para לְעוֹלָם. Conserva la amplitud temporal sin introducir una formulación más doctrinal que el hebreo no exige.'
- source_word: תִּהְיֶה
  english_pob_choice: will be
  chosen_spanish: será
  alternatives_spanish:
  - permanecerá
  - estará
  lexicon: HALOT
  rationale: El futuro simple 'será' traduce de manera directa היה sin añadir un matiz aspectual de permanencia que no está explícito en el verbo. El contexto permite entender la continuidad.
theological_decisions:
- issue: Sentido de תְמִימִם en un contexto sapiencial
  english_pob_reading: A description of people marked by integrity, not a claim of absolute sinlessness.
  chosen_spanish_reading: Una descripción de personas caracterizadas por integridad, no una afirmación de impecabilidad absoluta.
  alternative_spanish_readings:
  - los moralmente perfectos
  - los sin culpa
  rationale: '''Íntegros'' preserva la tensión bíblica entre rectitud real y perfección absoluta sin resolverla artificialmente. Se evita una traducción que pudiera sonar doctrinalmente exagerada o reducir el término a una categoría meramente religiosa.'
  doctrine_reference: Preservar la tensión lexical y teológica del texto; no importar afirmaciones doctrinales ajenas al hebreo.
- issue: Alcance de la conciencia divina en יוֹדֵעַ
  english_pob_reading: Covenantal, attentive knowledge expressed simply as 'knows'.
  chosen_spanish_reading: Conocimiento personal y atento expresado simplemente como 'conoce'.
  alternative_spanish_readings:
  - aprueba a
  - vela por
  rationale: '''Conoce'' deja que el contexto del salmo aporte la dimensión pactual/relacional sin convertir la traducción en paráfrasis. Así se evita sobreinterpretar el verbo hebreo y se mantiene la sobriedad del original.'
  doctrine_reference: Primacía del texto original sobre la tradición de traducción; no paraphrase beyond the source warrants.
translation_notes:
  revision_awareness: El texto base mantiene alta concordancia con la auditoría inglesa; no se detectaron revisiones posteriores que requirieran ajustar el sentido. Se conservó la estructura del verso y las dos notas de alternativa lexical donde el hebreo admite más de una matización.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino, de acuerdo con la política POB.
  - Se usó 'íntegros' para תְמִימִם por claridad natural en español, con nota de alternativas bíblicamente cercanas.
  - Se conservó la literalidad de 'su herencia será para siempre' para reflejar la fuerza del hebreo sin expandirla.
  - No se empleó 'Cristo', 'SEÑOR' ni otras sustituciones tradicionales que oculten el nombre divino del original.
