review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la estructura principal del hebreo: la cláusula temporal, las plantas de los pies, los sacerdotes que llevan el arca, Yahvé, el título en aposición, la entrada en las aguas del Jordán, el corte de las aguas que descienden desde arriba y la imagen final del amontonamiento. Sin embargo, hay dos desajustes menores pero significativos: la nota [a] no refleja bien la alternativa inglesa/auditada porque repite prácticamente la lectura principal en vez de ofrecer con claridad la alternativa «el arca del Señor de toda la tierra»; y «se alzarán» en la última cláusula añade un matiz dinámico no presente en ויעמדו, que es más bien «se quedarán/pararán/estarán».'
  spanish_quality_summary: El español es claro y digno, con buena legibilidad general. «Las plantas de los pies» y «en las aguas del Jordán» suenan naturales. «Serán cortadas en el Jordán» es comprensible aunque algo áspero; se tolera por fidelidad al ajuste del POB inglés. La principal mejora estilística y semántica es cambiar «se alzarán» por una formulación más cercana a «quedarán/se detendrán» para evitar sobretraducción.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יהוה -> «Yahvé» correctamente; אדון -> «Señor» en título divino; no hay conflictos mayores de glosario. La decisión aposicional se mantiene apropiadamente en el texto principal. La nota alternativa debe ajustarse para reflejar fielmente la opción documentada: «el arca del Señor de toda la tierra».'
  issues:
  - severity: medium
    issue: La nota [a] no presenta correctamente la alternativa documentada.
    rationale: 'El inglés auditado dice: Or, ''the ark of the Lord of all the earth.'' La nota española ofrece «el arca de Yahvé, el Señor de toda la tierra», que coincide sustancialmente con el texto principal y no comunica la alternativa sintáctica real.'
  - severity: medium
    issue: «Se alzarán en un solo montón» sobreinterpreta ויעמדו.
    rationale: El hebreo dice «y estarán/se detendrán en un solo montón». «Se alzarán» introduce la idea de elevarse, mientras que el foco del verbo es permanecer/pararse. Conviene una opción como «quedarán detenidas en un solo montón» o «se quedarán en un solo montón».
  - severity: low
    issue: La decisión léxica asociada a מֵי הַיַּרְדֵּן no corresponde exactamente a la frase fuente repetida.
    rationale: En las decisiones léxicas, se asigna a מֵי הַיַּרְדֵּן la elección «las aguas que bajan desde arriba», pero eso mezcla la frase repetida «las aguas del Jordán» con el participio posterior. No exige adjudicación, pero conviene coherencia editorial.
