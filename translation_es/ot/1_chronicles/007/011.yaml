    changes_summary: Adjusted phrasing to reflect לְרָאשֵׁי הָאָבוֹת more accurately as 'according to the heads of the fathers’ houses'; rendered גִּבּוֹרֵי חֲיָלִים more formally as 'mighty men of valor'; and translated יֹצְאֵי צָבָא לַמִּלְחָמָה more completely as 'able to go out in the army for war' rather than 'fit for military service in war.'
translation:
  language: es
  text: Todos estos eran hijos de Jediael[a], conforme a los jefes de las casas paternas[b], poderosos guerreros[c], diecisiete mil doscientos[d], que podían salir al ejército para la guerra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «descendientes de Jediael». En listas genealógicas, «hijos de» puede abarcar una línea de descendencia más amplia.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «jefes de las casas paternas», es decir, jefes de clan o de familia.'
    reason: cultural_note
  - marker: c
    text: O «hombres poderosos de valor».
    reason: lexical_alternative
  - marker: d
    text: Literalmente, «los que salían al ejército para la guerra», un modismo para los aptos o disponibles para el servicio militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל אֵלֶּה
  english_pob_choice: All these
  chosen_spanish: Todos estos
  alternatives_spanish:
  - Todos estos hombres
  - Todos ellos
  lexicon: HALOT
  rationale: La fórmula resumidora del hebreo se conserva de manera compacta. «Todos estos» reproduce el alcance colectivo sin añadir sustantivos que el texto no expresa.
- source_word: בְּנֵי יְדִיעֲאֵל
  english_pob_choice: sons of Jediael
  chosen_spanish: hijos de Jediael
  alternatives_spanish:
  - descendientes de Jediael
  lexicon: HALOT
  rationale: En listas genealógicas, בְּנֵי puede extenderse a «descendientes». Aun así, «hijos de» mantiene la forma genealógica directa del hebreo y la POB inglesa, dejando que el contexto amplíe el sentido familiar o clanal.
- source_word: לְרָאשֵׁי הָאָבוֹת
  english_pob_choice: according to the heads of the fathers’ houses
  chosen_spanish: según las cabezas de las casas paternas
  alternatives_spanish:
  - según los jefes de las casas paternas
  - según los cabezas de familia
  lexicon: HALOT
  rationale: La expresión remite a jefes/clanes familiares. «Casas paternas» conserva el idioma social bíblico; «cabezas» refleja לְרָאשֵׁי sin suavizarlo demasiado, y «según» reproduce bien la relación de distribución/orden indicada por לְ.
- source_word: גִּבּוֹרֵי חֲיָלִים
  english_pob_choice: mighty warriors
  chosen_spanish: poderosos guerreros
  alternatives_spanish:
  - mighty men of valor
  - guerreros valientes
  lexicon: HALOT
  rationale: El hebreo describe hombres de fuerza/proeza militar. «Poderosos guerreros» comunica el valor marcial en español moderno y evita una calca demasiado arcaica, sin perder la idea de hombres probados en combate.
- source_word: שִׁבְעָה עָשָׂר אֶלֶף וּמָאתַיִם
  english_pob_choice: seventeen thousand two hundred
  chosen_spanish: diecisiete mil doscientos
  alternatives_spanish:
  - '17.200'
  lexicon: HALOT
  rationale: El total censal se traduce con número escrito para conservar el registro bíblico formal y la precisión contable del hebreo.
- source_word: יֹצְאֵי צָבָא
  english_pob_choice: able to go out in the army
  chosen_spanish: los que salían para la guerra
  alternatives_spanish:
  - los que podían salir al ejército
  - aptos para el servicio militar
  lexicon: HALOT
  rationale: El hebreo usa un modismo militar («los que salen al ejército»). «Los que salían para la guerra» conserva la imagen de disponibilidad/aptitud para el servicio, sin reducirla a una simple capacidad abstracta.
- source_word: לַמִּלְחָמָה
  english_pob_choice: for war
  chosen_spanish: para la guerra
  alternatives_spanish:
  - en la guerra
  - para el combate
  lexicon: HALOT
  rationale: «Para la guerra» sigue de cerca el complemento final del hebreo y encaja naturalmente con el modismo previo de los que salían.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y tiene en cuenta la revisión inglesa más reciente, que precisó לְרָאשֵׁי הָאָבוֹת como relación de orden/adscripción y amplió יֹצְאֵי צָבָא לַמִּלְחָמָה como un modismo militar. En español se decidió mantener la expresión genealógica y la imagen militar sin sobreexplicarlas en el cuerpo principal, reservando la aclaración idiomática para las notas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto solo cuando aparezca el Tetragrámaton; aquí no aplica.
  - «hijos de» se usa por fidelidad genealógica, aunque la nota permite la ampliación semántica a «descendientes».
  - «casas paternas» conserva la terminología bíblica social sin sustituirla por «familias» en el texto principal.
  - La imagen militar se preserva con «los que salían para la guerra», evitando simplificarla a un mero adjetivo técnico.
