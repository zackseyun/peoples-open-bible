translation:
  language: es
  text: Entonces salieron todos los hijos de Israel[a], y la congregación se reunió como un solo hombre[b], desde Dan hasta Beerseba, y desde la tierra de Galaad, ante Yahvé[c], en Mizpa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hijos de Israel» es una traducción literal de la expresión hebrea para el pueblo de Israel; se refiere corporativamente a las tribus, no solo a individuos varones.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «como un solo hombre», un modismo que significa actuar en unidad o con acuerdo total.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «a Yahvé en Mizpa». La redacción hebrea también puede entenderse como la asamblea reunida en la presencia de Yahvé en Mizpa.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּצְאוּ
  english_pob_choice: came out
  chosen_spanish: salieron
  alternatives_spanish:
  - salieron afuera
  - vinieron
  lexicon: HALOT
  rationale: יצא expresa salir/ir afuera. En español, 'salieron' conserva la acción narrativa sin introducir matices innecesarios; 'vinieron' sonaría más interpretativo que el hebreo.
- source_word: כָּל בְּנֵי יִשְׂרָאֵל
  english_pob_choice: all the sons of Israel
  chosen_spanish: todos los hijos de Israel
  alternatives_spanish:
  - todos los israelitas
  - todos los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión corporal y literal 'hijos de Israel' para reflejar el hebreo y su fuerza representativa; en español es clara y tradicionalmente inteligible.
- source_word: וַתִּקָּהֵל הָעֵדָה
  english_pob_choice: the congregation assembled
  chosen_spanish: la congregación se reunió
  alternatives_spanish:
  - la asamblea se reunió
  - la congregación se congregó
  lexicon: HALOT
  rationale: עֵדָה designa el cuerpo reunido; 'congregación' mantiene el sentido colectivo. 'Se reunió' comunica bien el valor narrativo de קהל sin un calco torpe.
- source_word: כְּאִישׁ אֶחָד
  english_pob_choice: as one man
  chosen_spanish: como un solo hombre
  alternatives_spanish:
  - como un hombre solo
  - como una sola persona
  lexicon: HALOT
  rationale: Se conserva el idiomatismo hebreo. 'Como un solo hombre' refleja unidad de acción y no debe neutralizarse, porque el masculino singular forma parte de la textura del original.
- source_word: לְמִדָּן וְעַד בְּאֵר שֶׁבַע
  english_pob_choice: from Dan to Beer-sheba
  chosen_spanish: desde Dan hasta Beerseba
  alternatives_spanish:
  - de Dan a Beerseba
  - desde Dan hasta Beer-Sheba
  lexicon: HALOT
  rationale: Es un merismo geográfico estándar. 'Desde... hasta...' reproduce naturalmente el rango territorial del hebreo.
- source_word: וְאֶרֶץ הַגִּלְעָד
  english_pob_choice: and from the land of Gilead
  chosen_spanish: y desde la tierra de Galaad
  alternatives_spanish:
  - y la tierra de Galaad
  - y desde la región de Galaad
  lexicon: HALOT
  rationale: El añadido amplía el alcance geográfico. 'Tierra de Galaad' conserva la forma bíblica y 'desde' continúa la serie espacial del versículo.
- source_word: אֶל יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - hacia Yahvé
  - delante de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino 'Yahvé' conforme al estándar del proyecto. La preposición 'a' es la correspondencia más directa de אֶל; en este contexto puede implicar orientación o reunión ante su presencia sin añadir 'delante de' al texto principal.
- source_word: הַמִּצְפָּה
  english_pob_choice: at Mizpah
  chosen_spanish: en Mizpa
  alternatives_spanish:
  - a Mizpa
  - en Mitzpa
  lexicon: HALOT
  rationale: Mizpah es topónimo y se translitera como 'Mizpa' en español bíblico claro. 'En' expresa el lugar de la asamblea de manera natural.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh rather than 'the LORD'
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El hebreo usa explícitamente el Tetragrámaton. Se adopta 'Yahvé' por coherencia con el estándar del proyecto y para no ocultar el nombre del pacto mediante una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Lenguaje corporativo masculino en בְּנֵי יִשְׂרָאֵל y כְּאִישׁ אֶחָד
  english_pob_reading: Preserve 'sons of Israel' and 'as one man' in the main text
  chosen_spanish_reading: Conservar 'hijos de Israel' y 'como un solo hombre'
  alternative_spanish_readings:
  - israelitas
  - como una sola persona
  rationale: El español permite reproducir el masculino corporativo sin oscurecer el sentido. Se evita neutralizar la forma del original, ya que el texto quiere subrayar unidad total de la asamblea.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: No se reportaron revisiones aplicadas en el paquete fuente. El borrador sigue el texto hebreo directamente y coincide con el último pase auditado de alta concordancia.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה.
  - '''Mizpa'' mantiene la transliteración bíblica breve y legible en español.'
  - Se preserva la carga idiomática de 'como un solo hombre' con nota explicativa para evitar perder la fuerza unitaria del hebreo.
  - '''Hijos de Israel'' conserva el lenguaje corporativo masculino documentado en el audit trail.'
