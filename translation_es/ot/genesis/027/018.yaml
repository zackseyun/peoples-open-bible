translation:
  language: es
  text: 'Así que fue a donde estaba su padre y dijo[a]: «Padre mío». Y respondió: «Aquí estoy. ¿Quién eres tú, hijo mío?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Y vino a su padre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: So he went in
  chosen_spanish: Así que entró
  alternatives_spanish:
  - Y vino
  - Y fue
  lexicon: HALOT
  rationale: El verbo wayyiqtol avanza la narración. En español, «entró» expresa de forma natural el movimiento hacia el espacio del padre; «así que» conserva la progresión narrativa que el inglés POB marcó con «So».
- source_word: אֶל אָבִיו
  english_pob_choice: to his father
  chosen_spanish: a su padre
  alternatives_spanish:
  - hasta su padre
  - para su padre
  lexicon: HALOT
  rationale: La preposición אֶל con sufijo indica dirección hacia la persona del padre. «A su padre» es la forma directa y fiel en español; no se añade el nombre propio porque no está en el hebreo.
- source_word: וַיֹּאמֶר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y le dijo
  - y habló
  lexicon: HALOT
  rationale: La fórmula narrativa estándar se vierte con el verbo simple «dijo». El sujeto implícito queda claro por el contexto, como en el inglés POB.
- source_word: אָבִי
  english_pob_choice: My father
  chosen_spanish: Padre mío
  alternatives_spanish:
  - Mi padre
  - Padre
  lexicon: HALOT
  rationale: Es un vocativo directo; «Padre mío» conserva la relación posesiva del hebreo y su tono de apelación inmediata. Se evita «padre» sin posesivo porque atenúa la forma del original.
- source_word: הִנֶּנִּי
  english_pob_choice: Here I am
  chosen_spanish: Aquí estoy
  alternatives_spanish:
  - Heme aquí
  - Aquí me tienes
  lexicon: HALOT
  rationale: La respuesta formula presencia y disposición. En español, «Aquí estoy» comunica de manera natural la misma idea; «heme aquí» sería más arcaico y menos transparente para lectura pública.
- source_word: מִי אַתָּה
  english_pob_choice: Who are you
  chosen_spanish: ¿Quién eres tú?
  alternatives_spanish:
  - ¿Quién eres?
  - ¿Quién es usted?
  lexicon: HALOT
  rationale: La pregunta hebrea identifica al interlocutor en segunda persona masculina singular. «¿Quién eres tú?» reproduce ese valor con claridad; el pronombre explícito puede omitir-se en español, pero aquí ayuda a reflejar la fuerza interrogativa del hebreo.
- source_word: בְּנִי
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  - hijo
  lexicon: HALOT
  rationale: Es un vocativo afectivo y posesivo. «Hijo mío» mantiene la relación del hebreo y suena natural en español bíblico contemporáneo.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo y el audit trail inglés. Se mantuvo el valor narrativo de wayyiqtol, la dirección de אֶל, y las fórmulas de dirección vocativa y respuesta idiomática sin suavizar la tensión entre literalidad y naturalidad.
  spanish_consistency_notes:
  - Se usó «Padre mío» y «hijo mío» para conservar los vocativos posesivos del hebreo.
  - «Aquí estoy» se mantuvo como fórmula idiomática estable para הִנֶּנִּי.
  - No se añadió el nombre de Isaac en el cuerpo principal, conforme al texto fuente.
  - La nota al pie ofrece la alternativa más literal que el POB inglés preservó.
