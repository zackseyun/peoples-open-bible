review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la estructura merística del hebreo y mantiene correctamente «trono» y «polvo y ceniza», pero omite un elemento significativo del original: לגבה, ‘lofty/high/exalted’, que el English POB sí preserva como «lofty». Además, falta la nota paralela griega que el audit trail conserva, y aparece un anclaje de nota en el texto sin nota correspondiente.'
  spanish_quality_summary: El español es legible y natural, pero «desde el que está sentado» suena algo más pesado que una formulación participial más concisa. «Hasta el que vuelve...» es comprensible, aunque puede mejorarse a «hasta el que vuelve a ser polvo y ceniza» solo si se quisiera para mayor idiomaticidad; no es necesario. La reparación principal es reintroducir el matiz de elevación del trono y normalizar la nota.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones para «trono» y «polvo y ceniza» están bien alineadas. La omisión de לגבה sí entra en tensión con la racionalidad léxica documentada, pues el POB inglés decidió explícitamente «lofty» para preservar altura y exaltación.
  issues:
  - severity: high
    issue: Omisión de לגבה en el texto principal
    rationale: El hebreo incluye explícitamente la idea de altura/exaltación del trono. El borrador la suprime por completo, aunque el English POB la conserva y la justifica léxicamente. Eso reduce el contraste social del versículo.
  - severity: medium
    issue: Anclaje de nota presente pero sin nota correspondiente
    rationale: El texto tiene «trono[а]» pero el arreglo de footnotes está vacío. Esto incumple el formato requerido y pierde la información del paralelo griego preservada en la auditoría inglesa.
  - severity: low
    issue: Formulación algo pesada en «desde el que está sentado»
    rationale: Es fiel, pero «desde uno sentado» o «desde quien está sentado» serían algo más fluidos. Sin embargo, no es un problema grave; la prioridad es la fidelidad al hebreo.
  revised_spanish_text: desde el que está sentado en un trono elevado[a], hasta el que vuelve al polvo y a la ceniza.
  revised_footnotes:
  - marker: a
    text: 'Paralelo griego: «desde uno sentado en un trono en gloria hasta uno humillado en tierra y ceniza». El griego hace explícitas las ideas de gloria y humillación que el hebreo expresa de manera más concisa.'
    reason: alternative_reading
  revision_rationale: Se revisa para restaurar לגבה con «elevado», que preserva la altura/exaltación del hebreo sin importar al texto principal la expansión interpretativa griega. También se añade la nota paralela griega con su anclaje correcto, ya que el borrador tenía un marcador sin nota y el audit trail inglés conserva esa información. El resto de la redacción se mantiene por ser fiel y natural en español.
