  text: וְ/הֵנִיף֩ אוֹתָ֨/ם הַ/כֹּהֵ֥ן תְּנוּפָה֮ לִ/פְנֵ֣י יְהוָה֒ קֹ֤דֶשׁ הוּא֙ לַ/כֹּהֵ֔ן עַ֚ל חֲזֵ֣ה הַ/תְּנוּפָ֔ה וְ/עַ֖ל שׁ֣וֹק הַ/תְּרוּמָ֑ה וְ/אַחַ֛ר יִשְׁתֶּ֥ה הַ/נָּזִ֖יר יָֽיִן׀׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/006/020.yaml
  text: The priest shall wave them as a wave offering before Yahweh[a]. It is holy for the priest, besides the breast of the wave offering and the thigh of the contribution offering[b]. Afterward the Nazirite may drink wine.
  footnotes:
  - marker: a
    text: Or, 'the thigh of the heave offering.' The traditional term 'heave offering' renders תְּרוּמָה, but 'contribution offering' is clearer in contemporary English while preserving the sense of a portion set apart and presented.
    reason: lexical_alternative
  - marker: b
    text: Or, 'the Nazirite shall drink wine.' The Hebrew form can be rendered more literally this way, but the context indicates restored permission after the vow's completion.
    reason: alternative_reading
