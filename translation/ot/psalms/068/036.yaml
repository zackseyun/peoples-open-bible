theological_decisions:
- issue: Number and sense of 'sanctuaries'
  chosen_reading: from your sanctuaries
  alternative_readings:
  - from your sanctuary
  - in your sanctuary
  rationale: The Hebrew form is morphologically plural with a second-person suffix, so the main text preserves that plurality. Because English readers may expect the singular temple/sanctuary and because some construe the preposition more loosely, the alternatives are preserved in a footnote rather than adopted in the main text.
  doctrine_reference: Translation philosophy §1, §3, §5
