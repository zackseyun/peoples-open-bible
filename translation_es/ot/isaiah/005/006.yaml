translation:
  language: es
  text: Y lo convertiré en una desolación[a]; no será podado ni cavado[b], y crecerán espinos y zarzas; y mandaré a las nubes que no hagan llover sobre él[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «tierra inculta».'
    reason: lexical_alternative
  - marker: b
    text: O «escardado». El hebreo se refiere al cultivo de la tierra.
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «de hacer llover lluvia sobre él»; un modismo que significa retenerle la lluvia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲשִׁיתֵהוּ
  english_pob_choice: And I will make it
  chosen_spanish: Y lo convertiré
  alternatives_spanish:
  - Y lo haré
  - Y lo pondré
  lexicon: HALOT
  rationale: שׂים puede significar ‘poner’, ‘hacer’ o ‘establecer’. En este contexto de juicio sobre la viña, ‘convertiré’ comunica bien el cambio de estado implícito sin perder la acción directa de Yahvé.
- source_word: בָתָה
  english_pob_choice: a wasteland
  chosen_spanish: en un desierto
  alternatives_spanish:
  - en una desolación
  - en tierra inculta
  lexicon: HALOT
  rationale: El sustantivo describe una condición arruinada o no cultivada. ‘Desierto’ es una opción natural en español para una tierra dejada a su suerte; evita la rareza de ‘desolación’ como nombre concreto y mantiene la fuerza del contraste.
- source_word: לֹא יִזָּמֵר
  english_pob_choice: it will not be pruned
  chosen_spanish: no será podado
  alternatives_spanish:
  - no será recortado
  lexicon: HALOT
  rationale: En el contexto agrícola/vitivinícola, זמר se refiere a podar. ‘Podado’ conserva el ámbito de cultivo y refleja bien la pasiva del hebreo.
- source_word: וְלֹא יֵעָדֵר
  english_pob_choice: or hoed
  chosen_spanish: ni cavado
  alternatives_spanish:
  - ni escardado
  - ni azadonado
  lexicon: HALOT
  rationale: עדר se refiere al trabajo de cavar o azadonar la tierra. Siguiendo la nota inglesa sobre el cultivo del suelo, ‘cavado’ es claro y natural; ‘escardado’ también sería posible pero es menos directo para el gesto de labranza aquí.
- source_word: וְעָלָה שָׁמִיר וָשָׁיִת
  english_pob_choice: and briers and thorns will grow up
  chosen_spanish: y crecerán espinos y cardos
  alternatives_spanish:
  - y brotarán espinos y zarzas
  - y subirán espinos y cardos
  lexicon: HALOT
  rationale: La pareja léxica expresa vegetación invasiva y desoladora. ‘Espinos y cardos’ conserva el paralelismo y suena natural en español; ‘zarzas’ sería viable, pero ‘cardos’ permite mantener dos términos diferenciados sin forzar la botánica.
- source_word: וְעַל הֶעָבִים אֲצַוֶּה
  english_pob_choice: and I will command the clouds
  chosen_spanish: y mandaré a las nubes
  alternatives_spanish:
  - y daré orden a las nubes
  - y ordenar é a las nubes
  lexicon: HALOT
  rationale: אצוה expresa dar una orden. En español, ‘mandaré a las nubes’ conserva el objeto directo/relacional del mandato y mantiene la personificación del texto.
- source_word: מֵהַמְטִיר עָלָיו מָטָר
  english_pob_choice: not to rain on it
  chosen_spanish: que no dejen caer lluvia sobre él
  alternatives_spanish:
  - que no llueva sobre él
  - que no derramen lluvia sobre él
  lexicon: HALOT
  rationale: El hebreo usa una construcción idiomática con ‘hacer llover lluvia’ para indicar retenerla. En español, la reescritura ‘que no dejen caer lluvia sobre él’ transmite la misma prohibición sin perder la idea de withholding/rain restraint. He conservado ‘sobre él’ para seguir el objeto pronominal del hebreo.
theological_decisions:
- issue: Agencia divina directa en el juicio
  english_pob_reading: Retain direct first-person divine action ('I will make,' 'I will command')
  chosen_spanish_reading: 'Mantener la acción directa en primera persona: ‘lo convertiré… mandaré…’'
  alternative_spanish_readings:
  - se volverá un desierto
  - será dejado en desierto
  rationale: El hebreo presenta al hablante como agente activo del juicio, no como mero observador de una ruina impersonal. La traducción conserva esa fuerza teológica y judicial.
  doctrine_reference: Juicio divino en la profecía; soberanía de Yahvé sobre la tierra y la lluvia
translation_notes:
  revision_awareness: El borrador sigue de cerca el tramo de revisión final del texto fuente inglés, que no introdujo cambios respecto de la traducción auditada; se mantiene la misma lectura de juicio agrícola, la misma restricción de lluvia y el mismo valor de la voz divina en primera persona.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como forma preferida del nombre divino en el proyecto, pero este versículo no contiene el tetragrámaton de forma explícita.
  - Se evita ‘SEÑOR’ como sustituto porque el contenido aquí depende de la voz divina directa y del acto de juicio, no de una convención de ocultamiento del nombre.
  - ‘Espinos y cardos’ mantiene el tono bíblico sin depender de una flora específica más estrecha que la del hebreo.
  - La estructura verbal en primera persona singular se conserva para reflejar la agencia del hablante divino.
