translation:
  language: es
  text: 'Cuando Samuel vio a Saúl, Yahvé le respondió: «Mira, este es el hombre del cual te hablé. Este contendrá[a] a mi pueblo»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Este gobernará / ejercerá control sobre mi pueblo». El verbo hebreo puede implicar contener, detener, controlar o gobernar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאָה
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - miró
  - vio a
  lexicon: HALOT
  rationale: El verbo expresa percepción visual directa en la secuencia narrativa; en español, «vio» es la equivalencia natural y fiel.
- source_word: וַיהוָה
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: La guía del proyecto pide transliterar el nombre divino como «Yahvé» en el texto principal, manteniendo el nombre del pacto y evitando el sustituto tradicional.
- source_word: עָנָהוּ
  english_pob_choice: answered him
  chosen_spanish: le respondió
  alternatives_spanish:
  - le contestó
  - le dijo
  lexicon: HALOT
  rationale: ענה suele significar «responder/contestar». «Le respondió» conserva la relación con una respuesta real sin reducirlo simplemente a «dijo».
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira aquí
  - Mira, pues
  lexicon: HALOT
  rationale: Es una partícula de señalamiento. «Mira» reproduce bien el impulso de atención en español moderno y digno.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: este es el hombre
  alternatives_spanish:
  - este hombre
  - el hombre
  lexicon: HALOT
  rationale: 'El hebreo presenta primero el sustantivo definido y luego el demostrativo; en español, la estructura natural es introducirlo como identificación enfática: «este es el hombre».'
- source_word: אֲשֶׁר אָמַרְתִּי אֵלֶיךָ
  english_pob_choice: of whom I spoke to you
  chosen_spanish: del cual te hablé
  alternatives_spanish:
  - sobre quien te hablé
  - a quien te mencioné
  lexicon: HALOT
  rationale: La relativa remite a una comunicación previa. «Del cual te hablé» es idiomático y suficientemente cercano al hebreo, sin sobrecargar el registro.
- source_word: זֶה
  english_pob_choice: This one
  chosen_spanish: Este
  alternatives_spanish:
  - Este hombre
  - Él
  lexicon: HALOT
  rationale: El demostrativo es enfático. En español, «Este» conserva la fuerza deíctica al inicio de la cláusula final.
- source_word: יַעְצֹר
  english_pob_choice: shall restrain / govern
  chosen_spanish: retendrá
  alternatives_spanish:
  - contendrá
  - gobernará
  - restringirá
  lexicon: HALOT
  rationale: El verbo עצר puede expresar detener, contener, restringir o gobernar según el contexto. Dado el audit trail inglés y la necesidad de no borrar la tensión léxica, «retendrá» mantiene el sentido de contención/control sin importar de manera explícita un verbo de gobierno que el hebreo no dice de forma directa.
- source_word: בְּעַמִּי
  english_pob_choice: my people
  chosen_spanish: a mi pueblo
  alternatives_spanish:
  - sobre mi pueblo
  - entre mi pueblo
  lexicon: HALOT
  rationale: La preposición con este verbo se entiende en el campo de influencia sobre el pueblo. En español, «a mi pueblo» permite una construcción más natural con «retener» y conserva la referencia al pueblo de Yahvé.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: 'Se sigue el estándar del proyecto: el Tetragrámaton se vierte como «Yahvé» en vez de ocultarlo tras una sustitución litúrgica. Esto preserva la identidad del nombre revelado.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de יַעְצֹר en relación con Saúl
  english_pob_reading: shall restrain / govern my people
  chosen_spanish_reading: retendrá a mi pueblo
  alternative_spanish_readings:
  - gobernará a mi pueblo
  - contendrá a mi pueblo
  rationale: El audit trail inglés deja abierta la tensión entre 'restrain' y 'govern'. En español, «retendrá» conserva el núcleo de detener/contener sin cerrar indebidamente la ambigüedad del verbo hebreo; por eso no se sustituye por un verbo monárquico más explícito.
  doctrine_reference: 'DOCTRINE.md: Translation principle — preserve documented lexical tension where the source warrants it'
translation_notes:
  revision_awareness: La versión inglesa más reciente revisó la cláusula final desde «rule over» a «restrain» para acercarse más a יַעְצֹר. La propuesta española sigue esa revisión y preserva la ambigüedad control/gobierno mediante «retendrá», sin borrar la tensión léxica documentada.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para el nombre divino.
  - «Le respondió» mantiene el valor verbal de ענה sin desplazarlo a una simple locución de habla.
  - La última cláusula conserva una alternativa de lectura en nota porque el hebreo admite más de una matización semántica.
  - Se evita «Cristo» u այլ terminología no pertinente; el verso no trata de Mesías, sino de designación real implícita.
