  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: תפקד como designación/nombramiento, ושמרו como custodia del sacerdocio, הקרב como acercamiento no autorizado, y יומת con fuerza penal pasiva. Sin embargo, ''el extraño'' en español tiende más que el inglés a sugerir desconocido o extranjero, por lo que no preserva tan bien el matiz funcional de הזר sin apoyo fuerte; además, la nota [a] no corresponde a una alternativa significativa preservada por el inglés ni resuelve una ambigüedad real del español.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse en naturalidad y precisión. 'Será muerto' suena bíblico pero algo forzado en español actual; 'será puesto a muerte' conserva mejor la fuerza legal sin sonar tan anómalo. 'La persona no autorizada' es más claro y fiel al contexto que 'el extraño'.
  glossary_alignment: 'No hay conflictos con los términos de proyecto principales. ''Sacerdocio'' está bien para כְּהֻנָּתָם. La principal cuestión léxica es הַזָּר: conviene evitar ''el extraño'' en el texto principal y reservarlo, si se desea, como alternativa en nota. También conviene eliminar la nota [a], ya que el inglés no la documenta y no añade valor contextual.'
  issues:
