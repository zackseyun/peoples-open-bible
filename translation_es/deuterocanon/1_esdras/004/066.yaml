translation:
  language: es
  text: y todos los objetos tomados de Jerusalén han de ser enviados de vuelta allí[a]—aquellos que Ciro apartó cuando hizo un voto[b] de destruir Babilonia, y hizo un voto de enviarlos allí[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «enviados allí»; «de vuelta» se entiende por el contexto de objetos tomados de Jerusalén.
    reason: lexical_alternative
  - marker: b
    text: O «oró»; el griego puede leerse como «hizo un voto» o «oró», aunque aquí la sintaxis favorece el sentido de voto.
    reason: alternative_reading
  - marker: c
    text: Lit. «enviar allí»; el español explicita el objeto («los objetos») para que la frase sea clara.
    reason: lexical_alternative
lexical_decisions:
- source_word: σκεύη
  english_pob_choice: vessels
  chosen_spanish: utensilios
  alternatives_spanish:
  - vasos
  - vasijas
  - utensilios sagrados
  lexicon: LSJ
  rationale: En contexto de templo, σκεύη puede referirse a objetos o implementos cultuales. 'Utensilios' es suficientemente amplio y natural en español, sin forzar una especificación que el griego aquí no explicita.
- source_word: τὰ λημφθέντα
  english_pob_choice: taken
  chosen_spanish: tomados
  alternatives_spanish:
  - llevados
  - arrebatados
  - recibidos
  lexicon: LSJ
  rationale: El participio indica objetos que habían sido tomados desde Jerusalén. 'Tomados' conserva esa idea básica de procedencia sin añadir un matiz más fuerte de saqueo que no está expresado de forma directa aquí.
- source_word: ἐξ Ἰερουσαλήμ
  english_pob_choice: from Jerusalem
  chosen_spanish: de Jerusalén
  alternatives_spanish:
  - desde Jerusalén
  - fuera de Jerusalén
  lexicon: LSJ
  rationale: '''De Jerusalén'' es la forma más idiomática y clara en español para expresar procedencia.'
- source_word: ἐκπέμψαι
  english_pob_choice: are to be sent back
  chosen_spanish: han de ser enviados de vuelta
  alternatives_spanish:
  - han de ser enviados
  - han de ser despachados
  lexicon: LSJ
  rationale: El griego dice literalmente 'enviar', pero el contexto de restitución de objetos ya tomados de Jerusalén exige en español la idea de retorno. 'De vuelta' mantiene la fuerza contextual sin borrar la literalidad básica del verbo.
- source_word: ἃ ἐχώρισεν
  english_pob_choice: those that ... set apart
  chosen_spanish: aquellos que apartó
  alternatives_spanish:
  - aquellos que separó
  - aquellos que designó
  - aquellos que reservó
  lexicon: LSJ
  rationale: χωρίζω aquí sugiere separar o apartar para un propósito. 'Apartó' conserva esa neutralidad y permite la posible resonancia de una separación administrativa o dedicada.
- source_word: ηὔξατο
  english_pob_choice: vowed
  chosen_spanish: hizo voto
  alternatives_spanish:
  - prometió
  - votó
  - oró
  lexicon: LSJ
  rationale: En este contexto con infinitivos dependientes, el sentido más probable es el de una resolución solemne o voto. 'Hizo voto' preserva ese valor mejor que una simple 'promesa', y deja visible la alternativa 'oró' como lectura posible.
- source_word: ἐκκόψαι Βαβυλῶνα
  english_pob_choice: destroy Babylon
  chosen_spanish: destruir Babilonia
  alternatives_spanish:
  - cortar Babilonia
  - cortar off Babilonia
  - derribar Babilonia
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente 'cortar' Babilonia, en español esa imagen resulta oscura. 'Destruir Babilonia' expresa la finalidad violenta o devastadora que el contexto sugiere, en línea con la revisión inglesa más natural.
- source_word: ἐξαποστεῖλαι ἐκεῖ
  english_pob_choice: to send there
  chosen_spanish: enviarlos allí
  alternatives_spanish:
  - enviarlos allá
  - mandarlos allí
  - despacharlos allí
  lexicon: LSJ
  rationale: El griego solo dice 'enviar allí'; el antecedente de los utensilios hace necesario explicitar el objeto en español. 'Enviarlos allí' es claro y sigue de cerca la referencia contextual al envío.
theological_decisions:
- issue: 'ηὔξατο: voto u oración'
  english_pob_reading: vowed; footnote preserves prayed as alternative
  chosen_spanish_reading: hizo voto
  alternative_spanish_readings:
  - oró
  - hizo una oración
  - prometió
  rationale: La construcción con infinitivos favorece un compromiso solemne más que una oración ordinaria. Traducir 'hizo voto' preserva la lectura principal y deja espacio para la alternativa 'oró' sin ocultar la tensión semántica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Restitución implícita en ἐκπέμψαι ... ἐκεῖ
  english_pob_reading: sent back there
  chosen_spanish_reading: enviados de vuelta allí
  alternative_spanish_readings:
  - enviados allí
  - devueltos allí
  rationale: El contexto hace evidente que los objetos regresan al lugar de origen. El español 'de vuelta' comunica esa restitución implícita sin eliminar que el verbo griego, por sí solo, solo dice 'enviar'.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
translation_notes:
  revision_awareness: He tomado en cuenta la revisión inglesa que prefirió 'destroy Babylon' frente a 'cut off Babylon' por naturalidad y precisión; en español se refleja con 'destruir Babilonia'. También se conserva la nota de que el griego literalmente dice solo 'enviar allí', mientras que el contexto exige expresar el retorno de los utensilios. La alternativa 'oró' para ηὔξατο se mantiene como posibilidad semántica documentada.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el tetragrámaton ni una referencia directa al nombre divino.
  - '''Babilonia'' se traduce con la forma habitual en español para el topónimo.'
  - Se usa 'hizo voto' para preservar la tensión entre voto y oración, sin resolverla de forma excesiva.
  - '''Utensilios'' evita una sobrerespecificación; si se quisiera una lectura más cultual, ''utensilios sagrados'' sería posible, pero el griego no lo exige aquí.'
