review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura casuística del hebreo y conserva la secuencia de ejemplos de animales, la finalidad de custodia y la ausencia de testigos. Sin embargo, hay dos desajustes importantes con la evidencia y con la auditoría inglesa: (1) la nota [a] está anclada en «asno», pero la alternativa léxica corresponde a שֶׂה («oveja»), no a חֲמוֹר; y (2) «es llevado» para נִשְׁבָּה queda demasiado débil/ambiguo en español y no comunica bien la idea de ser llevado cautivo o arrebatado. Una mejora menor es hacer más idiomático «y se muere» -> mantener mejor «y este muere» no es necesario; «y muere» está bien. También conviene pulir «sin que nadie lo vea» a «sin que nadie lo haya visto» para expresar mejor la falta de testigo del hecho ya ocurrido.'
  spanish_quality_summary: El español es generalmente claro y digno. «Asno», «buey» y «guardar» son apropiados para el registro bíblico. No obstante, la colocación errónea de la nota [a] crea confusión seria de legibilidad y fidelidad. Además, «es llevado» suena incompleto en español actual; «es llevado cautivo» o «es arrebatado» comunica mejor el evento legal descrito. La frase final mejora en naturalidad con perfecto compuesto.
  glossary_alignment: 'No hay conflictos con la terminología teológica principal del proyecto. Las decisiones léxicas están mayormente alineadas con la auditoría inglesa: «Si», «un hombre», «vecino», «buey», «oveja», «guardar». La excepción relevante es נִשְׁבָּה, donde el español debería reflejar mejor la noción de captura/sustracción. También debe corregirse la ancla de la nota sobre שֶׂה para respetar la decisión léxica documentada.'
  issues:
  - severity: high
    issue: La nota [a] está colocada en «asno», pero su contenido explica שֶׂה («oveja o cabra»).
    rationale: Esto altera la correspondencia entre texto y nota, y confunde al lector sobre qué palabra hebrea tiene la alternativa léxica preservada por la POB inglesa.
  - severity: medium
    issue: «es llevado» para נִשְׁבָּה no transmite con suficiente claridad la idea de ser llevado cautivo, arrebatado o capturado.
    rationale: La auditoría inglesa eligió «is carried off» para mantener un sentido más fuerte que mero movimiento. En español, «es llevado» puede sonar demasiado genérico y subrepresenta la pérdida por captura o sustracción.
  - severity: low
    issue: «sin que nadie lo vea» puede sonar menos preciso temporalmente que la idea de ausencia de testigo del suceso ya ocurrido.
    rationale: «Sin que nadie lo haya visto» suena más natural en español para un hecho consumado y conserva la fuerza de «no eyewitness».
