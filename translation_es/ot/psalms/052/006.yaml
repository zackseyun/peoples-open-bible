lexical_decisions:
- source_word: אָהַבְתָּ
  english_pob_choice: You love
  chosen_spanish: Tú amas
  alternatives_spanish:
  - Tú has amado
  - Tú amaste
  lexicon: HALOT
  rationale: El perfecto hebreo en este contexto poético de reprensión puede expresar una acción o disposición vigente; por eso el presente de indicativo español comunica mejor la acusación directa y continua, en línea con la revisión inglesa que prefirió presente para la dirección poética natural.
- source_word: כָל
  english_pob_choice: all
  chosen_spanish: todas
  alternatives_spanish:
  - todo
  - cada
  lexicon: HALOT
  rationale: Con el plural constructo de דִּבְרֵי, 'todas' conserva la idea de totalidad y suena natural en español con 'palabras'.
- source_word: דִּבְרֵי
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - palabra
  - dichos
  - expresiones
  lexicon: HALOT
  rationale: Aunque formalmente es plural constructo de 'palabra/cosa dicha', en español 'palabras' transmite bien el contenido verbal sin perder la acusación contra el habla.
- source_word: בָלַע
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - devoración
  - ruina
  - tragar
  lexicon: HALOT
  rationale: La imagen hebrea procede de la raíz 'tragar/devorar', pero en este sintagma la POB inglesa ya interpretó el valor metafórico como habla dañina. 'Destrucción' conserva el efecto semántico y evita una imagen extraña en español.
- source_word: לְשׁוֹן
  english_pob_choice: tongue
  chosen_spanish: lengua
  alternatives_spanish:
  - lengua
  - habla
  lexicon: HALOT
  rationale: '''Lengua'' mantiene el cuerpo-metáfora del hebreo y es la forma más natural en español bíblico para referirse al habla.'
- source_word: מִרְמָה
  english_pob_choice: deceitful
  chosen_spanish: engañosa
  alternatives_spanish:
  - de engaño
  - mentirosa
  - fraudulenta
  lexicon: HALOT
  rationale: El sustantivo hebreo es 'engaño/decepción'. En aposición a 'lengua', el adjetivo 'engañosa' reproduce de manera idiomática la equivalencia inglesa 'deceitful tongue' y mantiene la fuerza acusatoria.
translation_notes:
  revision_awareness: La revisión inglesa final prefirió el presente ('You love') frente al perfecto, y 'all words of destruction' frente a una solución más literal como 'every devouring word'. La versión española sigue esa decisión de aspecto y conserva la personificación del habla mediante 'lengua'.
  spanish_consistency_notes:
  - Se mantuvo 'lengua' como metáfora corporal coherente con el hebreo y con el uso bíblico habitual en español.
  - Se evitó 'SEÑOR' u otras sustituciones no pertinentes, porque el versículo no contiene el nombre divino.
  - '''Destrucción'' refleja la lectura semántica ya resuelta en la auditoría inglesa, sin forzar un calco de ''devorar'' que en español sonaría menos natural en este contexto.'
