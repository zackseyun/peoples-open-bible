review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido básico del hebreo: fórmula de maldición, el modismo sexual שֹׁכֵב עִם, el referente ''su suegra'', y la respuesta litúrgica de todo el pueblo con ''Amén''. Sin embargo, no preserva del todo la decisión auditada sobre el masculino singular explícito de la fórmula legal (''he who'').'
  spanish_quality_summary: El español es claro y natural. No obstante, 'el que' neutraliza en parte el masculino singular que el POB inglés decidió conservar por precisión de forma fuente. En este contexto legal, 'Maldito sea quien...' o mejor 'Maldito sea el hombre que...' podría sonar más explícito, pero para mantener cercanía al inglés auditado y naturalidad española, conviene una formulación con masculino singular visible.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. 'Maldito', 'suegra', 'todo el pueblo' y 'Amén' están bien. El modismo 'se acueste con' sigue adecuadamente la rationale del hebreo 'lies with'.
  issues:
  - severity: medium
    issue: Neutralización del masculino singular en 'el que'
    rationale: La decisión teológica auditada en inglés fue conservar el masculino singular ('he') por fidelidad al participio masculino singular hebreo en fórmula legal. 'El que' en español puede funcionar de modo genérico y no reproduce con la misma claridad esa forma.
  - severity: low
    issue: Predicación elíptica en 'Maldito el que...'
    rationale: Es inteligible, pero 'Maldito sea...' suena más completo y solemne en una fórmula de maldición legal-litúrgica, sin añadir significado ajeno al hebreo.
  revised_spanish_text: 'Maldito sea el hombre que se acueste con su suegra[a]. Y todo el pueblo dirá: «Amén».'
