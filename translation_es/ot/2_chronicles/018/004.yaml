lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Así que ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo introduce la narración de forma directa; en español, «Y ... dijo» conserva el flujo narrativo sin añadir una relación causal o explicativa que el hebreo no exige.
- source_word: יְהוֹשָׁפָט
  english_pob_choice: Jehoshaphat
  chosen_spanish: Josafat
  alternatives_spanish:
  - Jehosafat
  - Jehoshafat
  lexicon: Transliteración bíblica usual en español
  rationale: El nombre propio se adapta a la forma estándar y reconocible en español bíblico, manteniendo la identificación del personaje.
- source_word: אֶל מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: to the king of Israel
  chosen_spanish: al rey de Israel
  alternatives_spanish:
  - al rey de Israel
  - al rey israelita
  lexicon: HALOT
  rationale: La preposición con artículo y sustantivos en hebreo se vierte naturalmente como «al rey de Israel», conservando el título real formal.
- source_word: דְּרָשׁ
  english_pob_choice: inquire
  chosen_spanish: consulta
  alternatives_spanish:
  - pregunta
  - busca
  - inquire
  lexicon: HALOT
  rationale: En este contexto, דרש tiene el sentido de buscar o consultar una respuesta divina; «consulta» expresa bien la acción oracular en español sin perder la referencia a una indagación religiosa.
- source_word: נָא
  english_pob_choice: Please
  chosen_spanish: Por favor
  alternatives_spanish:
  - te ruego
  - ahora
  - por favor te
  lexicon: HALOT
  rationale: La partícula suaviza la petición; «Por favor» reproduce de modo natural y respetuoso el tono cortés del imperativo.
- source_word: כַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  - ahora mismo
  - en este día
  lexicon: HALOT
  rationale: El valor adverbial es inmediato; «hoy» es la forma más clara y natural en español.
- source_word: אֶת דְּבַר יְהוָה
  english_pob_choice: for the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - una palabra de Yahvé
  - la palabra de Yahvé
  lexicon: HALOT
  rationale: El hebreo presenta el objeto directo de la consulta; en español, «consultar la palabra de Yahvé» es la manera natural de expresar la búsqueda de una respuesta profética. Se conserva «palabra» para reflejar דְּבַר y «Yahvé» para el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: 'Se mantiene la convención del proyecto para el Tetragrámaton: «Yahvé», preservando el nombre personal del Dios del pacto y evitando el sustituto tradicional «el SEÑOR».'
theological_decisions:
- issue: Cómo verter el mandato de consultar la palabra divina
  english_pob_reading: Please inquire today for the word of Yahweh.
  chosen_spanish_reading: Por favor, consulta hoy la palabra de Yahvé.
  alternative_spanish_readings:
  - Por favor, busca hoy la palabra de Yahvé.
  - Por favor, pregunta hoy por la palabra de Yahvé.
  rationale: La orden de Josafat no es una petición genérica de información, sino una consulta profética. «Consulta» mantiene el matiz oracular del verbo y respeta la intención del texto.
  doctrine_reference: Uso contextual de דרש en consultas proféticas
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el nombre propio divino, no un título. La forma «Yahvé» mantiene la distinción lexical y teológica del Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y no requirió cambios; por eso el borrador español sigue de cerca el sentido del hebreo y la decisión inglesa ya auditada, manteniendo la terminología del proyecto para el nombre divino y el verbo de consulta.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se conserva el tono narrativo breve con «Y ... dijo».
  - «Consulta» se emplea para דרש en sentido profético, no como simple preguntar.
  - La cita se presenta con comillas angulares y puntuación española estándar.
