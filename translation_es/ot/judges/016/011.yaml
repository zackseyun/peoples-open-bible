translation:
  language: es
  text: 'Él le dijo: «Si me atan con cuerdas nuevas[a] que nunca se han usado para trabajar, entonces me debilitaré y seré como uno de los hombres[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con las que no se ha hecho trabajo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «como cualquier hombre»; es decir, como un ser humano ordinario, sin fuerza extraordinaria.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלֶיהָ
  english_pob_choice: He said to her
  chosen_spanish: Él le dijo
  alternatives_spanish:
  - Y le dijo
  - Entonces le dijo
  lexicon: HALOT
  rationale: Se conserva el valor narrativo básico del wayyiqtol sin añadir énfasis innecesario. En español, «le dijo» comunica de forma natural el diálogo y mantiene la referencia femenina de la destinataria.
- source_word: אִם אָסוֹר יַאַסְר֨וּ/נִי
  english_pob_choice: If they bind me
  chosen_spanish: Si me atan
  alternatives_spanish:
  - Si me ataran
  - Si llegan a atarme
  lexicon: HALOT
  rationale: El hebreo usa infinitivo absoluto con verbo finito para intensificar la acción, pero el revision trail en inglés retiró «tightly» por no estar explícito. «Si me atan» preserva la condición y la acción sin sobretraducir la intensidad.
- source_word: בַּעֲבֹתִים
  english_pob_choice: with ... ropes
  chosen_spanish: con cuerdas
  alternatives_spanish:
  - con sogas
  - con ropes gruesas
  lexicon: HALOT
  rationale: עֲבֹתִים puede ser «cuerdas» o «sogas/cordeles»; en español «cuerdas» es claro y sobrio. Se evita «cuerdas gruesas» porque el texto no lo explicita de forma directa para el lector español.
- source_word: חֲדָשִׁים
  english_pob_choice: new
  chosen_spanish: nuevas
  alternatives_spanish:
  - recién hechas
  - frescas
  lexicon: HALOT
  rationale: Se traduce literalmente el adjetivo y se conserva la oposición con el uso previo del material. «Nuevas» es natural y fiel.
- source_word: אֲשֶׁר לֹא נַעֲשָׂה בָהֶם מְלָאכָה
  english_pob_choice: that have never been used for work
  chosen_spanish: que no han sido usadas para trabajo
  alternatives_spanish:
  - con las que no se ha hecho trabajo
  - en las que no se ha trabajado
  lexicon: HALOT
  rationale: La construcción pasiva indica que no se ha hecho trabajo con ellas. «Usadas para trabajo» refleja esa idea en español corriente. Se evita una formulación demasiado rígida o ambigua.
- source_word: וְחָלִיתִי
  english_pob_choice: then I will become weak
  chosen_spanish: entonces me debilitaré
  alternatives_spanish:
  - entonces quedaré débil
  - entonces me volveré débil
  lexicon: HALOT
  rationale: חלה aquí expresa volverse débil o enfermo; en el contexto de Sansón, la pérdida de fuerza está implícita. «Me debilitaré» comunica bien el resultado en español.
- source_word: וְהָיִיתִי כְּאַחַד הָאָדָם
  english_pob_choice: and be like one of the men
  chosen_spanish: y seré como uno de los hombres
  alternatives_spanish:
  - y seré como cualquier hombre
  - y seré como un hombre más
  lexicon: HALOT
  rationale: Se mantiene el contraste con la fuerza excepcional de Sansón y el uso masculino singular-colectivo del hebreo. «Uno de los hombres» conserva la estructura y la lectura de hombre ordinario.
theological_decisions:
- issue: Renderizado de הָאָדָם en contraste con la singularidad de Sansón
  english_pob_reading: one of the men
  chosen_spanish_reading: uno de los hombres
  alternative_spanish_readings:
  - cualquier hombre
  - un hombre cualquiera
  - humankind
  rationale: El contexto contrasta a Sansón con hombres ordinarios, no con la humanidad en abstracto. La forma masculina explícita preserva la precisión del hebreo y evita neutralizar el matiz del pasaje.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested terms table for אָדָם'
- issue: Intensificación implícita en la forma verbal de אסר
  english_pob_reading: If they bind me
  chosen_spanish_reading: Si me atan
  alternative_spanish_readings:
  - Si me atan firmemente
  - Si me sujetan
  rationale: Aunque la construcción hebrea es enfática, la revisión inglesa eliminó «tightly» por no estar justificado de forma explícita. En español se mantiene la fuerza del verbo sin añadir una intensificación no requerida por el texto base.
  doctrine_reference: Revision awareness aligned with latest_revision_pass
translation_notes:
  revision_awareness: 'Se incorporó la revisión más reciente del audit trail que eliminó la intensificación añadida en inglés («tightly»). La redacción española evita sobretraducir esa intensidad y mantiene el sentido del hebreo: atar, cuerdas nuevas, ausencia de uso para trabajo, debilitamiento y comparación con un hombre ordinario.'
  spanish_consistency_notes:
  - Se usó «cuerdas» para עֲבֹתִים por claridad natural en español; «sogas» sería una alternativa aceptable si se quisiera un matiz más fuerte.
  - «Hombres» conserva el contraste de género y número implícito en הָאָדָם dentro de este contexto narrativo.
  - La puntuación de diálogo sigue normas españolas y mantiene la división oracional de la cláusula condicional.
