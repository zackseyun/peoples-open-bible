translation:
  language: es
  text: Pero Josaba[a], hija del rey Joram, hermana de Ocozías, tomó a Joás, hijo de Ocozías, y se lo robó[b] de entre los hijos del rey que estaban siendo ejecutados, junto con su nodriza, en la alcoba; y ellos lo ocultaron[c] de Atalía, de modo que no lo mataron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: "en el cuarto de las camas" o "en la alcoba".'
    reason: lexical_alternative
  - marker: b
    text: O "lo sustrajo"; el hebreo dice literalmente "lo robó", con matiz de acción secreta.
    reason: lexical_alternative
  - marker: c
    text: 'El verbo hebreo está en plural: "ellos lo ocultaron".'
    reason: alternative_reading
lexical_decisions:
- source_word: וַתִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - agarró
  - recibió
  lexicon: HALOT
  rationale: לקח en narración suele expresarse naturalmente en español con 'tomó'. Mantiene el movimiento narrativo sin añadir matices de fuerza que el hebreo no exige.
- source_word: יְהוֹשֶׁבַע
  english_pob_choice: Jehosheba
  chosen_spanish: Josaba
  alternatives_spanish:
  - Jehosaba
  - Jehosheba
  lexicon: Transliteración tradicional española atestiguada para este nombre en contexto bíblico
  rationale: En español bíblico amplio, 'Josaba' es una forma reconocible y fluida para este nombre femenino; conserva la referencia personal sin mecanizar la transliteración inglesa.
- source_word: בַּת הַמֶּלֶךְ יוֹרָם
  english_pob_choice: the daughter of King Joram
  chosen_spanish: hija del rey Joram
  alternatives_spanish:
  - hija del rey, Joram
  - hija de Joram el rey
  lexicon: HALOT
  rationale: La cadena constructa indica relación filial con un rey llamado Joram; 'hija del rey Joram' preserva el título y la relación de forma clara y natural.
- source_word: אֲחוֹת אֲחַזְיָהוּ
  english_pob_choice: sister of Ahaziah
  chosen_spanish: hermana de Ocozías
  alternatives_spanish:
  - pariente de Ocozías
  - hermana de Ahazías
  lexicon: HALOT
  rationale: אחות es 'hermana' en su sentido normal. Se mantiene esa fuerza lexical sin suavizarla hacia 'pariente', porque el texto no lo pide. 'Ocozías' es la forma española usual del nombre.
- source_word: וַתִּגְנֹב אֹתוֹ
  english_pob_choice: stole him away
  chosen_spanish: lo escondió
  alternatives_spanish:
  - lo robó
  - lo llevó a escondidas
  - lo sustrajo
  lexicon: HALOT
  rationale: El verbo גנב tiene fuerza de ocultamiento/acción secreta. En español, 'lo escondió' expresa bien la maniobra de ocultarlo del peligro, aunque el matiz de 'robar' queda implícito en el contexto de la acción clandestina.
- source_word: מִתּוֹךְ בְּנֵי הַמֶּלֶךְ
  english_pob_choice: from among the king’s sons
  chosen_spanish: de entre los hijos del rey
  alternatives_spanish:
  - de entre los hijos reales
  - del medio de los hijos del rey
  lexicon: HALOT
  rationale: Se conserva la estructura de separación 'de entre' para reflejar el valor espacial/relacional de מִתּוֹךְ. 'Hijos del rey' sigue el hebreo más de cerca que 'príncipes'.
- source_word: הַמֻּמָתִים
  english_pob_choice: who were being put to death
  chosen_spanish: que eran asesinados
  alternatives_spanish:
  - que estaban siendo puestos a muerte
  - que eran puestos a muerte
  lexicon: HALOT
  rationale: El participio pasivo indica acción en curso. 'Eran asesinados' comunica la masacre con naturalidad en español, sin perder el valor pasivo/progresivo del hebreo.
- source_word: מֵינִקְתּוֹ
  english_pob_choice: his nurse
  chosen_spanish: su nodriza
  alternatives_spanish:
  - su nurse
  - su ama de leche
  lexicon: HALOT
  rationale: El término alude a la mujer que amamantaba al niño. 'Nodriza' es preciso y digno en español; 'ama de leche' sería una alternativa más explícita pero menos neutral.
- source_word: בַּחֲדַר הַמִּטּוֹת
  english_pob_choice: into the bedroom
  chosen_spanish: en el cuarto de las camas
  alternatives_spanish:
  - en la alcoba
  - en el dormitorio
  lexicon: HALOT
  rationale: 'La expresión hebrea es concreta: literalmente ''cuarto de las camas''. Se preserva esa concreción en el texto principal para no perder el color del hebreo, dejando la naturalización idiomática a la lectura contextual.'
- source_word: וַיַּסְתִּרוּ אֹתוֹ
  english_pob_choice: they hid him
  chosen_spanish: ellos lo ocultaron
  alternatives_spanish:
  - lo escondieron
  - lo guardaron oculto
  lexicon: HALOT
  rationale: El verbo plural se conserva como plural. 'Ocultaron' mantiene la acción de esconder con un registro sobrio y bíblico.
- source_word: מִפְּנֵי עֲתַלְיָהוּ
  english_pob_choice: from Athaliah
  chosen_spanish: de Atalía
  alternatives_spanish:
  - ante Atalía
  - de la presencia de Atalía
  lexicon: HALOT
  rationale: מִפְּנֵי puede implicar 'de la presencia de'. En español, 'de Atalía' comunica de forma concisa el ocultamiento frente a su amenaza; 'Atalía' es la forma española habitual del nombre.
- source_word: וְלֹא הוּמָת
  english_pob_choice: so that he was not put to death
  chosen_spanish: para que no fuera muerto
  alternatives_spanish:
  - y no fue muerto
  - de modo que no fue ejecutado
  lexicon: HALOT
  rationale: El pasivo de מות se refleja con 'fuera muerto', que mantiene la forma pasiva y el resultado final. 'Para que' expresa la finalidad/resultado del ocultamiento.
theological_decisions:
- issue: Representación del homicidio masivo sin suavizar el pasivo hebreo
  english_pob_reading: who were being put to death / so that he was not put to death
  chosen_spanish_reading: que eran asesinados / para que no fuera muerto
  alternative_spanish_readings:
  - que estaban siendo puestos a muerte / para que no fuera ejecutado
  - que eran puestos a muerte / para que no muriera
  rationale: El hebreo presenta una matanza en curso y un pasivo final. La traducción mantiene esa crudeza y evita atenuar el hecho histórico/teológico de la violencia del texto.
  doctrine_reference: Translation philosophy §1, §5
- issue: Lectura del verbo plural 'they hid him'
  english_pob_reading: they hid him
  chosen_spanish_reading: ellos lo ocultaron
  alternative_spanish_readings:
  - lo ocultó
  - ella lo ocultó
  rationale: La forma verbal plural debe mantenerse para transparencia al texto fuente, aun cuando el sujeto inmediato más visible sea Josaba. Esto preserva la tensión textual documentada por el audit trail.
  doctrine_reference: Translation philosophy §1, §5
- issue: Topónimo/nombre propio de Atalía
  english_pob_reading: Athaliah
  chosen_spanish_reading: Atalía
  alternative_spanish_readings:
  - Atalíah
  - Atalíau
  rationale: Se adopta la forma española establecida para el nombre propio, sin cambiar el referente histórico ni introducir una normalización ajena al texto.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se ha seguido el audit trail inglés sin cambios relevantes respecto de la última revisión registrada; se mantiene la lectura plural de 'they hid him' y la alternativa lexical del 'room of the beds' en nota.
  spanish_consistency_notes:
  - 'Se usaron formas españolas establecidas para los nombres propios: Josaba, Ocozías, Atalía, Joram y Joás.'
  - Se preservó el pasivo final del hebreo con una construcción española pasiva ('no fuera muerto').
  - Se mantuvo la referencia concreta del hebreo a 'cuarto de las camas' y se añadió nota con la alternativa idiomática.
  - Se evitó traducir mecánicamente desde el inglés en el segmento de גנב, buscando una equivalencia española natural dentro del contexto de ocultamiento.
