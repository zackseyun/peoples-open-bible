translation:
  language: es
  text: Estos se jactan de carros y aquellos de caballos[a], pero nosotros nos gloriamos en el nombre de Yahvé nuestro Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Estos están en carros y aquellos en caballos, pero nosotros hacemos mención del nombre de Yahvé nuestro Dios». El verbo hebreo también puede traducirse «recordar» o «mencionar», pero aquí probablemente expresa la invocación del nombre de Yahvé en contraste con la confianza en la fuerza militar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These
  chosen_spanish: Estos
  alternatives_spanish:
  - Algunos
  - Estos mismos
  lexicon: HALOT
  rationale: El demostrativo plural mantiene el contraste poético con el segundo miembro. «Estos» reproduce bien la deixis y suena natural en español.
- source_word: בָרֶכֶב
  english_pob_choice: boast in chariots
  chosen_spanish: se jactan en carros
  alternatives_spanish:
  - confían en carros
  - se glorían en carros
  - se apoyan en carros
  lexicon: HALOT
  rationale: El hebreo es elíptico y la POB inglesa optó por un verbo de autoexaltación/confianza. En español, «se jactan en» conserva esa fuerza y el tono poético, sin convertirlo en mera referencia nominal.
- source_word: וְאֵלֶּה
  english_pob_choice: and those
  chosen_spanish: y aquellos
  alternatives_spanish:
  - y estos
  - y algunos
  lexicon: HALOT
  rationale: «Aquellos» preserva el paralelismo contrastivo con «estos» y evita repetir la misma forma deíctica.
- source_word: בַסּוּסִים
  english_pob_choice: in horses
  chosen_spanish: en caballos
  alternatives_spanish:
  - en los caballos
  - en corceles
  lexicon: HALOT
  rationale: El plural se refiere a fuerza militar/caballería. «Caballos» mantiene la imagen concreta sin añadir especificación no indicada por el texto.
- source_word: נַזְכִּיר
  english_pob_choice: boast in
  chosen_spanish: nos gloriamos
  alternatives_spanish:
  - hacemos mención de
  - recordamos
  - invocamos
  lexicon: HALOT
  rationale: Aunque el verbo hiphil de זכר puede significar «hacer mención de / recordar», la POB inglesa revisada priorizó el valor retórico del paralelo. En español, «nos gloriamos» mantiene la correspondencia con el primer hemistiquio y comunica la antítesis de confianza sin diluirla.
- source_word: בְּשֵׁם
  english_pob_choice: in the name
  chosen_spanish: en el nombre
  alternatives_spanish:
  - por el nombre
  - sobre el nombre
  lexicon: HALOT
  rationale: La construcción formula la esfera o fundamento de la proclamación/confianza. «En el nombre» es la correspondencia idiomática más clara en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La convención del proyecto en español es «Yahvé» para el Tetragrámaton, evitando la sustitución por un título. Es la forma más establecida y legible en español para esta edición.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - el Dios nuestro
  - nuestro Elohim
  lexicon: HALOT
  rationale: La sufijación posesiva expresa relación de pacto; «nuestro Dios» conserva esa pertenencia de forma natural y fiel.
theological_decisions:
- issue: Valor del verbo נַזְכִּיר en el contraste poético
  english_pob_reading: boast in / call on the name of Yahweh our God
  chosen_spanish_reading: nos gloriamos en el nombre de Yahvé nuestro Dios
  alternative_spanish_readings:
  - hacemos mención del nombre de Yahvé nuestro Dios
  - invocamos el nombre de Yahvé nuestro Dios
  - recordamos el nombre de Yahvé nuestro Dios
  rationale: El hebreo puede sugerir «hacer mención» o «recordar», pero en el paralelismo del verso el sentido global contrasta la confianza en recursos militares con la afirmación orgullosa/confesional del pueblo respecto del nombre divino. «Nos gloriamos» preserva esa tensión y evita bajar el nivel retórico del poema.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se mantiene el nombre propio divino en español, sin ocultarlo tras una sustitución titulativa. La forma «Yahvé» responde a la terminología proyectual para lectores de español y conserva la distinción entre el nombre y el título «Dios».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'La redacción inglesa pasó por una revisión importante: primero se tradujo como «trust in / call on», y luego se ajustó a «boast in / boast in» para acercarse más al paralelismo léxico del hebreo. La propuesta española sigue esa lectura final, pero mantiene en nota la alternativa formal «hacer mención / invocar / recordar» porque el hebreo נַזְכִּיר admite esa tensión semántica y el contraste poético no debe perderse.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como forma española del nombre divino, en coherencia con el marco del proyecto.
  - Se mantiene el paralelismo demostrativo «Estos / aquellos» para reproducir la antítesis del verso.
  - «Nos gloriamos» refleja la misma decisión retórica que la revisión inglesa final, mientras la nota preserva el valor alternativo de נַזְכִּיר.
  - El término «caballos» se usa de manera literal y militar; no se explicita «caballería» para no añadir información no presente en el hebreo.
