translation:
  language: es
  text: Entonces Yahvé habló[a] a Moisés, diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Yahvé dijo a Moisés, diciendo». El hebreo usa una fórmula narrativa estándar de introducción al discurso.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... spoke
  chosen_spanish: Entonces ... habló
  alternatives_spanish:
  - Y ... dijo
  - Luego ... habló
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva introduce avance secuencial; «Entonces» comunica bien ese valor en español, y «habló» refleja de manera natural la fórmula introductoria de discurso sin perder la función narrativa del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se rinde con el nombre propio divino «Yahvé», conforme al criterio del proyecto de no sustituirlo por un título enmascarado. «Jehová» se evita por su forma histórica menos probable, y «SEÑOR» borraría el nombre personal del texto.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: En esta fórmula de introducción al habla, la preposición hebrea expresa destinatario directo; en español, «a» es la correspondencia natural y precisa.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: לֵּאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - 'así:'
  - para decir
  lexicon: HALOT
  rationale: El infinitivo constructo funciona como marcador de continuación del discurso. «Diciendo» conserva ese valor introductorio sin forzarlo a una paráfrasis más interpretativa.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se preserva el nombre del pacto como nombre propio, en consonancia con la decisión del POB de traducir el Tetragrámaton en lugar de ocultarlo tras un título. Esto mantiene visible la identidad personal de Dios en la narración.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente que prefiere un verbo de habla más natural para la fórmula introductoria, manteniendo «diciendo» para representar לֵאמֹר. También conserva el nombre divino según la política del proyecto, adaptándolo al español como «Yahvé».
  spanish_consistency_notes:
  - Se mantiene el tratamiento del Tetragrámaton como nombre propio divino, no como título.
  - «Entonces» conserva la progresión narrativa del waw consecutivo sin sonar forzado en español.
  - «Diciendo» se deja por fidelidad al marcador discursivo hebreo, aunque suena más literario que coloquial.
