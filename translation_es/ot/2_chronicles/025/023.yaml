  text: And Joash king of Israel captured Amaziah king of Judah[a], the son of Joash, son of Jehoahaz, at Beth-shemesh, and brought him to Jerusalem. Then he broke down the wall of Jerusalem from the Ephraim Gate to the Corner Gate, four hundred cubits.
