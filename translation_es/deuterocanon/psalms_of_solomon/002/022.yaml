review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del griego: una figura femenina se quita una prenda honorífica que Dios le había puesto. Sin embargo, el anclaje de notas está invertido respecto al campo semántico documentado: el texto principal usa «diadema» mientras la nota ofrece «tocado», cuando la revisión inglesa ya estableció «headdress» como opción principal y «diadem» como alternativa. Además, para el aoristo medio περιείλατο, «se quitó» refleja mejor en español la acción sobre algo que ella llevaba puesto que el más ambiguo «quitó».'
  spanish_quality_summary: El español es claro y digno, pero «se quitó» suena más natural e idiomático que «quitó» en este contexto. «Tocado» funciona mejor como término principal neutral y femenino que «diadema», porque preserva la amplitud de μίτρα sin cerrar demasiado el sentido hacia una joya regia específica. La frase completa queda más fluida y fiel con «se quitó el tocado de gloria».
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. «Dios» está bien. La decisión léxica importante es μίτραν: conviene alinear el español con la adjudicación inglesa usando un término base equivalente a «headdress», es decir, «tocado», y dejar «diadema» como alternativa en nota.'
  issues:
  - severity: medium
    issue: El término principal para μίτραν está demasiado estrechado como «diadema».
    rationale: La evidencia auditada favorece «headdress» como término principal por ser más amplio y más adecuado al contexto femenino personificado; «diadema» debe conservarse como alternativa, no como texto base.
  - severity: medium
    issue: La nota [a] es redundante e incorrecta frente al texto principal.
    rationale: Si el texto principal ya dice «diadema», la nota «O «diadema»» no aporta ninguna alternativa real y no preserva la relación principal/alternativa del expediente inglés.
  - severity: low
    issue: «Quitó» no expresa tan bien como «se quitó» el valor medio de περιείλατο.
    rationale: El griego describe que ella misma se despoja de la prenda que llevaba; en español reflexivo esto se expresa de manera más natural y precisa con «se quitó».
  revised_spanish_text: Se quitó el tocado[a] de gloria que Dios había puesto sobre ella[b].
  revised_footnotes:
  - marker: a
    text: O «diadema».
    reason: lexical_alternative
  - marker: b
