translation:
  language: es
  text: tanto los de baja condición[a] como los de alta condición[b], el rico y el pobre juntos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «hijos de Adán»; aquí la expresión funciona idiomáticamente para personas de baja condición o estatus.
    reason: lexical_alternative
  - marker: b
    text: Hebreo literalmente, «hijos de hombre»; aquí la expresión funciona idiomáticamente para personas de alta condición o estatus.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם ... גַּם
  english_pob_choice: both ... and
  chosen_spanish: tanto ... como
  alternatives_spanish:
  - ambos ... y
  - así ... como
  lexicon: HALOT
  rationale: La repetición de גַּם marca inclusión de dos grupos en paralelo. En español, 'tanto ... como' reproduce de forma natural esa coordinación distributiva.
- source_word: בְּנֵי אָדָם
  english_pob_choice: low
  chosen_spanish: los [a]
  alternatives_spanish:
  - los de baja condición
  - los hombres
  - los comunes
  lexicon: HALOT
  rationale: El hebreo funciona idiomáticamente como una categoría social, no como filiación literal. Para conservar la tensión/contraste documentado sin traducir de manera interpretativa excesiva, se omite una glosa en el texto principal y se explicita en nota que remite a personas de condición inferior.
- source_word: בְּנֵי אִישׁ
  english_pob_choice: high
  chosen_spanish: los [b]
  alternatives_spanish:
  - los de alta condición
  - los notables
  - los hombres
  lexicon: HALOT
  rationale: Paralelo a בְּנֵי אָדָם, este sintagma apunta a una categoría de mayor rango social. Se mantiene la misma estrategia textual y se deja la aclaración idiomática en nota para no borrar el contraste social del hebreo.
- source_word: יַחַד
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - a la vez
  - en conjunto
  - igualmente
  lexicon: HALOT
  rationale: יַחַד indica agrupamiento o simultaneidad de los referidos. 'Juntos' es claro, poético y natural en español.
- source_word: עָשִׁיר
  english_pob_choice: rich
  chosen_spanish: rico
  alternatives_spanish:
  - acaudalado
  - rico en bienes
  lexicon: HALOT
  rationale: Equivalente socioeconómico directo y transparente, adecuado al paralelismo con 'pobre'.
- source_word: וְאֶבְיוֹן
  english_pob_choice: and poor
  chosen_spanish: y el pobre
  alternatives_spanish:
  - y el necesitado
  - y el indigente
  lexicon: HALOT
  rationale: En este paralelismo con 'rico', 'pobre' es la opción más natural y fiel al contraste de estatus.
theological_decisions:
- issue: Conservar el contraste social idiomático sin convertirlo en una afirmación ontológica sobre 'hijos de Adán'
  english_pob_reading: both low and high ... rich and poor together
  chosen_spanish_reading: tanto los de baja condición como los de alta condición, el rico y el pobre juntos
  alternative_spanish_readings:
  - tanto los hombres comunes como los importantes
  - tanto los humildes como los poderosos
  rationale: El hebreo emplea expresiones filiales para un contraste de estatus social. La lectura elegida preserva esa tensión idiomática y evita una literalidad que oscurezca el sentido poético del versículo.
  doctrine_reference: Salmo 49:3; paralelismo poético hebreo
translation_notes:
  revision_awareness: 'El audit trail inglés muestra que la versión revisada prefirió ''rich and poor together'' por fluidez; en español se sigue la misma pauta, colocando ''juntos'' al final. También se preserva la decisión interpretativa central: las dos expresiones hebreas son idiomáticas y de contraste social, no meramente genealógicas.'
  spanish_consistency_notes:
  - Se mantuvo la equivalencia funcional de גַּם ... גַּם con 'tanto ... como'.
  - Se conservaron dos notas explicativas porque el hebreo repite dos sintagmas idiomáticos distintos y el inglés POB los trató de forma diferenciada.
  - '''Juntos'' se colocó al final para seguir la cadencia natural del español y reflejar la revisión inglesa.'
  - No se usó 'SEÑOR' ni terminología doctrinal ajena al versículo.
