translation:
  language: es
  text: 'En aquel momento, los discípulos se acercaron a Jesús[a], diciendo: «¿Quién, pues, es el mayor en el reino de los cielos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “¿Quién, pues, es más grande en el reino de los cielos?”. El adjetivo griego es comparativo («mayor» / «más grande»), aunque en español esta pregunta suele expresarse con sentido superlativo en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν ἐκείνῃ τῇ ὥρᾳ
  english_pob_choice: At that time
  chosen_spanish: En aquel momento
  alternatives_spanish:
  - En aquella hora
  - En ese tiempo
  lexicon: BDAG
  rationale: El giro griego es temporal e idiomático; en español, «en aquel momento» comunica bien la referencia narrativa sin sonar rígido. «Hora» sería demasiado literal y podría sugerir una hora del reloj.
- source_word: προσῆλθον
  english_pob_choice: came
  chosen_spanish: se acercaron
  alternatives_spanish:
  - vinieron a
  - llegaron a
  - se dirigieron a
  lexicon: BDAG
  rationale: El verbo indica movimiento hacia Jesús. «Se acercaron» conserva ese matiz de aproximación con naturalidad en español; «vinieron a» resulta posible pero menos preciso como imagen.
- source_word: οἱ μαθηταὶ
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - los aprendices
  lexicon: BDAG
  rationale: Es el equivalente establecido y contextual para los seguidores de Jesús.
- source_word: τῷ Ἰησοῦ
  english_pob_choice: to Jesus
  chosen_spanish: a Jesús
  alternatives_spanish:
  - hacia Jesús
  lexicon: BDAG
  rationale: El dativo de dirección se expresa naturalmente con «a» en español.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  lexicon: BDAG
  rationale: El participio contemporáneo se refleja de forma directa con «diciendo», sin añadir interpretación.
- source_word: Τίς
  english_pob_choice: Who
  chosen_spanish: ¿Quién…?
  alternatives_spanish:
  - ¿Quién es…?
  lexicon: BDAG
  rationale: Interrogativo personal directo.
- source_word: ἄρα
  english_pob_choice: then
  chosen_spanish: pues
  alternatives_spanish:
  - entonces
  - así que
  - pues entonces
  lexicon: BDAG
  rationale: «ἄρα» añade una inferencia o consecuencia; «pues» reproduce ese matiz discursivo de manera natural en la pregunta española.
- source_word: μείζων
  english_pob_choice: greatest
  chosen_spanish: el mayor
  alternatives_spanish:
  - el más grande
  - el mayor de todos
  lexicon: BDAG
  rationale: Aunque la forma griega es comparativa («mayor»), en esta pregunta el sentido idiomático es superlativo; por eso se traduce «el mayor», siguiendo la decisión inglesa final de reflejar la fuerza implícita sin perder la base comparativa.
- source_word: ἐν τῇ βασιλείᾳ τῶν οὐρανῶν
  english_pob_choice: in the kingdom of heaven
  chosen_spanish: en el reino de los cielos
  alternatives_spanish:
  - en el reino de los cielos
  - en el reino celestial
  lexicon: BDAG
  rationale: Se mantiene la expresión mateana tradicional y fiel al griego. «Cielos» conserva el plural del original τῶν οὐρανῶν; en español bíblico esta fórmula es plenamente comprensible.
theological_decisions:
- issue: Expresión mateana βασιλεία τῶν οὐρανῶν
  english_pob_reading: the kingdom of heaven
  chosen_spanish_reading: el reino de los cielos
  alternative_spanish_readings:
  - el reino de los cielos
  - el reino del cielo
  rationale: Se conserva la formulación reverencial propia de Mateo sin sustituirla por una expresión más general. El plural «cielos» sigue de cerca el griego y evita aplanar la forma característica del evangelio.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El texto español refleja la revisión inglesa que cambió de «greater» a «greatest» por la fuerza superlativa implícita de la pregunta. En español se mantuvo la misma decisión semántica con «el mayor», respetando el comparativo griego y su sentido idiomático en contexto.
  spanish_consistency_notes:
  - Se usó «Jesús» para Ἰησοῦς conforme al criterio del proyecto.
  - Se evitó «SEÑOR» o «Señor» porque no aparece el nombre divino en este versículo.
  - «Reino de los cielos» se mantuvo como fórmula estable de Mateo y coherente con el griego plural.
  - La puntuación y el orden sintáctico se ajustaron a un registro bíblico moderno y publicable.
