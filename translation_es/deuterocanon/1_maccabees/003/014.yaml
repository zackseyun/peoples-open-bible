  rationale: Se corrigió el anclaje de la nota sobre Ἰούδαν para que aparezca junto a «Judas», se reparó la nota lexical para que preserve una alternativa real al verbo principal, y se ajustó el modismo inicial a un español más natural sin apartarse del sentido del griego ni del expediente del POB.
