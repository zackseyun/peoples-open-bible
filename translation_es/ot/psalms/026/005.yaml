  glossary_alignment: No hay términos del glosario de proyecto especialmente activados aquí. Las opciones 'asamblea', 'malhechores' y 'malvados' son compatibles con la evidencia fuente y con la filosofía POB. No hay conflictos con nombres divinos ni terminología teológica fija.
