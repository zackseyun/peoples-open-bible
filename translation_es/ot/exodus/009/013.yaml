revisions:
- from: 'Entonces Yahvé[a] dijo a Moisés: «Levántate temprano por la mañana y preséntate delante de Faraón, y dile: “Así dice Yahvé, el Dios de los hebreos: Deja ir a mi pueblo, para que me sirva[b]”».'
  to: 'Entonces Yahvé[a] dijo a Moisés: «Levántate temprano por la mañana y preséntate delante de Faraón, y dile: “Así dice Yahvé, el Dios de los hebreos: Deja ir a mi pueblo, para que me sirvan[b]”».'
  rationale: Se corrige la cláusula final al plural ('me sirvan') para reflejar con mayor precisión el verbo hebreo plural y la decisión léxica del English POB. También se ajusta la nota alternativa para que corresponda sintácticamente a la redacción revisada del texto principal.
