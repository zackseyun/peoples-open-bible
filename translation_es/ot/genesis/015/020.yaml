  glossary_alignment: 'No hay conflicto con los términos troncales del proyecto. La cuestión principal es la fidelidad a la decisión léxica documentada para רְפָאִים: el texto principal debe mantener el etnónimo y la única nota necesaria debe conservar la alternativa «gigantes» anclada correctamente a ese término.'
