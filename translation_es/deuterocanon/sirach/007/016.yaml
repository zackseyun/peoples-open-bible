translation:
  language: es
  text: Humilla mucho, mucho la soberbia,[a] porque la esperanza del ser humano es gusanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego (Swete) dice: «No te cuentes entre la multitud de pecadores». Esto parece reflejar una tradición textual diferente, no solo una pequeña diferencia de redacción.'
    reason: textual_variant
lexical_decisions:
- source_word: μὴ προσλογίζου σεαυτὸν
  english_pob_choice: Do not count yourself
  chosen_spanish: No te atribuyas
  alternatives_spanish:
  - No te cuentes
  - No te pongas
  - No te consideres
  lexicon: LSJ / BDAG (προσλογίζομαι en sentido de contar, agregar o imputar)
  rationale: El griego usa un verbo compuesto que puede sugerir ‘contar con’, ‘agregar a’ o ‘clasificar entre’. En español, ‘atribuirse entre’ no es literal, pero comunica con naturalidad la idea de colocarse a uno mismo dentro de un grupo; sin embargo, para una publicación más clara y fiel al valor de conteo/adscripción, se opta por una formulación breve que preserve la prohibición. La frase se orienta al sentido de no clasificarse a sí mismo como parte del grupo descrito.
- source_word: ἐν πλήθει ἁμαρτωλῶν
  english_pob_choice: among the multitude of sinners
  chosen_spanish: entre la multitud de pecadores
  alternatives_spanish:
  - entre la muchedumbre de pecadores
  - entre muchos pecadores
  - entre el conjunto de pecadores
  lexicon: LSJ / BDAG
  rationale: ‘ἐν πλήθει’ expresa ubicación o pertenencia ‘en/entre una multitud’. ‘Multitud’ mantiene el matiz colectivo y solemne del griego, y ‘pecadores’ traduce directamente ἁμαρτωλῶν con un término bíblico claro en español.
theological_decisions:
- issue: Divergencia textual entre el hebreo conservado y el paralelo griego
  english_pob_reading: 'Greek parallel reads: ''Do not count yourself among the multitude of sinners.'' This appears to reflect a different textual tradition rather than a small wording difference.'
  chosen_spanish_reading: 'Se sigue el paralelo griego en el texto español: ''No te atribuyas entre la multitud de pecadores.'''
  alternative_spanish_readings:
  - No te cuentes entre la multitud de pecadores.
  - No te consideres entre la multitud de pecadores.
  rationale: En esta sección, el griego no coincide con el hebreo conservado y ofrece una sentencia distinta. Para este registro se adopta la lectura griega como base visible en español porque es el único texto alineado con el packet griego proporcionado y porque la tarea requiere un único verso/sección fuente-graduada. La tensión textual se mantiene en la nota correspondiente mediante la lexical decision y la footnote anclada.
  doctrine_reference: 'PHILOSOPHY.md: use original-language sources auditablely; preserve textual divergence honestly.'
