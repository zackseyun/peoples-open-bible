translation:
  language: es
  text: ¡Oh Yahvé, Dios de los ejércitos! ¿Quién como tú, poderoso, Yah[a]? Tu fidelidad te rodea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yah», la forma breve del nombre divino; muchas traducciones lo vierten aquí como «SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: ¡Oh Yahvé!
  alternatives_spanish:
  - Oh Yahvé
  - Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrama como ‘Yahvé’, siguiendo la decisión base del POB en inglés de transliterar el nombre propio y no sustituirlo por un título. El vocativo se expresa naturalmente con ‘¡Oh!’ en español poético.
- source_word: אֱלֹהֵי צְבָאוֹת
  english_pob_choice: God of hosts
  chosen_spanish: Dios de los ejércitos
  alternatives_spanish:
  - Dios de los ejércitos celestiales
  - Dios de las huestes
  lexicon: HALOT
  rationale: La construcción hebrea admite ‘ejércitos’ o ‘huestes’. En español, ‘Dios de los ejércitos’ comunica bien la amplitud militar/cósmica del plural sin añadir especificaciones que el hebreo no obliga a hacer.
- source_word: מִי כָמוֹךָ
  english_pob_choice: who is like you
  chosen_spanish: quién como tú
  alternatives_spanish:
  - quién es como tú
  - quién se compara contigo
  lexicon: HALOT
  rationale: La fórmula de incomparabilidad se mantiene breve y poética. En español, la elipsis verbal es natural en poesía y preserva la fuerza retórica del hebreo.
- source_word: חֲסִין
  english_pob_choice: mighty
  chosen_spanish: poderoso
  alternatives_spanish:
  - fuerte
  - mighty
  lexicon: HALOT
  rationale: ‘Poderoso’ expresa la idea de fuerza/mayor capacidad con buena naturalidad en español. Aquí funciona como equivalente poético de ‘mighty’ sin debilitar el sentido de fuerza del adjetivo hebreo.
- source_word: יָהּ
  english_pob_choice: O Yah
  chosen_spanish: Yah
  alternatives_spanish:
  - Oh Yah
  - Yahvé
  lexicon: HALOT
  rationale: Se conserva la forma breve del nombre divino como ‘Yah’, distinta de ‘Yahvé’ en la primera cola del versículo. El vocativo está ya marcado por la interjección inicial.
- source_word: וֶאֱמוּנָתְךָ
  english_pob_choice: Your faithfulness
  chosen_spanish: Tu fidelidad
  alternatives_spanish:
  - Tu fe firme
  - Tu fidelidad constante
  lexicon: HALOT
  rationale: En este contexto, אֱמוּנָה denota confiabilidad, firmeza y fidelidad. ‘Fidelidad’ es la opción más natural y teológicamente precisa en español para la estabilidad del carácter divino.
- source_word: סְבִיבוֹתֶיךָ
  english_pob_choice: surrounds you
  chosen_spanish: te rodea
  alternatives_spanish:
  - te circunda
  - está alrededor de ti
  lexicon: HALOT
  rationale: El valor locativo/adverbial del plural se expresa idiomáticamente con ‘te rodea’. Esta formulación mantiene la imagen de algo que envuelve a Dios sin sonar forzada en español moderno.
theological_decisions:
- issue: Distinción entre יְהוָה y יָהּ en el mismo versículo
  english_pob_reading: Render יְהוָה as 'Yahweh' and יָהּ as 'Yah' to preserve the distinction between the full divine name and the short form.
  chosen_spanish_reading: Renderizar יְהוָה como ‘Yahvé’ y יָהּ como ‘Yah’, manteniendo la diferencia entre el nombre completo y la forma breve.
  alternative_spanish_readings:
  - Traducir ambos como ‘Señor’
  - Traducir ambos como ‘Yahvé’
  rationale: El hebreo distingue dos formas relacionadas pero no idénticas del nombre divino. Conservar ambas en español respeta el texto y evita borrar una tensión lexical real del versículo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sujeto implícito y orden poético en la pregunta de incomparabilidad
  english_pob_reading: '''who is like you'' preserves the rhetorical force and poetic directness.'
  chosen_spanish_reading: ‘quién como tú’ conserva la pregunta retórica sin añadir verbos innecesarios.
  alternative_spanish_readings:
  - ‘quién es como tú’
  - ‘quién se compara contigo’
  rationale: La forma breve en español reproduce mejor la concisión del hebreo y el tono de exaltación poética. Añadir el verbo es posible, pero menos directo.
  doctrine_reference: Poética hebrea / paralelismo
translation_notes:
  revision_awareness: Alineé la versión española con la última revisión inglesa que mantuvo ‘Yah’ como forma breve distinta de ‘Yahweh’, y con el ajuste de ‘mighty’ para חֲסִין. También preservé la clausula final compacta (‘Tu fidelidad te rodea’) porque representa bien el hebreo sin expandirlo innecesariamente.
  spanish_consistency_notes:
  - Uso ‘Yahvé’ para יְהוָה y ‘Yah’ para יָהּ, conforme al criterio del proyecto.
  - ‘Dios de los ejércitos’ mantiene la referencia de צְבָאוֹת sin introducir ‘celestiales’ o ‘huestes’ salvo nota alternativa.
  - ‘Fidelidad’ traduce אֱמוּנָה en el sentido de confiabilidad divina, no de fe humana.
  - La puntuación reproduce el paralelismo poético del original, con vocativo inicial y cierre breve.
