translation:
  language: es
  text: 'Y dijeron: «Los daremos sin falta»[a]. Entonces extendieron la capa[b], y cada hombre arrojó allí un pendiente[c] de su botín.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo usa un infinitivo absoluto con un verbo finito para intensificar la afirmación; por eso el sentido es de certeza enfática. También puede traducirse: «Sin duda los daremos» o «Ciertamente los daremos».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la capa» o «la prenda exterior», extendida para recibir los anillos.'
    reason: cultural_note
  - marker: c
    text: «Pendiente» podría expresarse más generalmente como «anillo»; en algunos contextos, el término hebreo también puede referirse a un aro de la nariz.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָתוֹן נִתֵּן
  english_pob_choice: We will surely give them
  chosen_spanish: Daremos sin falta
  alternatives_spanish:
  - Daremos ciertamente
  - Sí daremos
  - Daremos con seguridad
  lexicon: HALOT
  rationale: La construcción de infinitivo absoluto + verbo finito en hebreo intensifica la afirmación. En español, «daremos sin falta» transmite con naturalidad la certeza enfática sin añadir una matiz de emoción que el hebreo no exige.
- source_word: הַשִּׂמְלָה
  english_pob_choice: the cloak
  chosen_spanish: la capa
  alternatives_spanish:
  - el manto
  - la prenda
  - el vestido exterior
  lexicon: HALOT
  rationale: שִׂמְלָה puede referirse a una prenda exterior amplia. «Capa» comunica bien en español la idea de una pieza extendida para recoger objetos, manteniendo una imagen concreta y natural.
- source_word: וַיִּפְרְשׂוּ
  english_pob_choice: they spread out
  chosen_spanish: extendieron
  alternatives_spanish:
  - desplegaron
  - esparcieron
  - abrieron
  lexicon: HALOT
  rationale: El verbo פרשׂ significa extender o desplegar. «Extendieron» es claro y idiomático en español para la acción de abrir una prenda sobre la que se depositarán objetos.
- source_word: וַיַּשְׁלִיכוּ שָׁמָּה
  english_pob_choice: threw there
  chosen_spanish: arrojó allí
  alternatives_spanish:
  - echó allí
  - lanzó allí
  - arrojó en ella
  lexicon: HALOT
  rationale: שׁלך expresa lanzar o arrojar, no simplemente poner. «Arrojó allí» conserva la fuerza del verbo y «allí» reproduce el adverbio שָׁמָּה sin sobreinterpretar el recipiente en el texto principal.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada uno
  - cada varón
  - cada hombre por su parte
  lexicon: HALOT
  rationale: אִישׁ funciona distributivamente aquí. «Cada hombre» preserva el valor distributivo y el referente masculino plural del pasaje.
- source_word: נֶזֶם
  english_pob_choice: an earring
  chosen_spanish: un aro
  alternatives_spanish:
  - un anillo
  - un pendiente
  - un aro de la nariz
  lexicon: HALOT
  rationale: נֶזֶם puede designar una joya en la oreja o la nariz según el contexto. Dado que en el verso anterior se trata de los aros solicitados como botín, «aro» mantiene la ambigüedad controlada mejor que «pendiente» y evita fijar innecesariamente la ubicación.
- source_word: שְׁלָלֽוֹ
  english_pob_choice: his spoil
  chosen_spanish: de su botín
  alternatives_spanish:
  - de su presa
  - de su despojo
  - tomado de su botín
  lexicon: HALOT
  rationale: שָׁלָל significa botín o despojo de guerra. «De su botín» es la forma más directa y fiel en español, y conserva el vínculo militar del relato.
translation_notes:
  revision_awareness: El contexto inglés revisó la primera redacción de «will gladly give» a «will surely give» para reflejar mejor el infinitivo absoluto hebreo; la versión española sigue esa corrección y evita añadir una idea de alegría o entusiasmo no explícita en el texto fuente.
  spanish_consistency_notes:
  - Se mantiene el tono narrativo breve y directo del hebreo.
  - Se conserva la fuerza distributiva de אִישׁ con «cada hombre».
  - Se evita convertir נֶזֶם en una glosa demasiado específica; «aro» deja abierta la posibilidad señalada por el aparato textual.
  - «Botín» conserva el lenguaje militar y no se sustituye por un término más genérico.
