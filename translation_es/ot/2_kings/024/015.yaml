base_translation:
  language: en
  yaml_path: translation/ot/2_kings/024/015.yaml
  text: And he carried Jehoiachin away to Babylon[a], along with the king’s mother, the king’s wives, his officials, and the mighty men of the land[c][b]; he took them into exile from Jerusalem to Babylon.
  footnotes:
  - marker: a
    text: Or 'his eunuchs'; the Hebrew term can refer either to eunuchs specifically or more generally to royal/court officials.
    reason: lexical_alternative
  - marker: b
    text: Or 'the mighty men of the land' or 'the nobles of the land.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the king’s mother'; this could also be expressed as 'the queen mother,' but the translation keeps the familial wording of the source text.
    reason: lexical_alternative
