id: EPH.1.3
reference: Ephesians 1:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Εὐλογητὸς ὁ θεὸς καὶ πατὴρ τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ, ὁ εὐλογήσας ἡμᾶς ἐν πάσῃ εὐλογίᾳ πνευματικῇ ἐν τοῖς ἐπουρανίοις ἐν Χριστῷ,
base_translation:
  language: en
  yaml_path: translation/nt/ephesians/001/003.yaml
  text: Blessed be the God and Father of our Lord Jesus Messiah, who has blessed us with every spiritual blessing in the heavenly realms in Messiah,
translation:
  language: ko
  text: 찬송하리로다, 우리 주 예수 메시아의 하나님 곧 아버지께서는, 메시아 안에서 하늘에 속한 모든 영적 복으로 우리를 복 주신 분이시니[a]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 에베소서 1:3–14는 헬라어 본문에서 한 문장으로 이어지는 송영이다. 한국어 가독성을 위해 행간 호흡을 두되, 4–14절을 종결 없이 분사·관형절로 이어 흐름을 보존한다.
    reason: structural_note
lexical_decisions:
- source_word: Εὐλογητὸς
  english_pob_choice: Blessed be
  chosen_korean: 찬송하리로다
  alternatives_korean:
  - 찬양받으소서
  - 송축받으실
  lexicon: BDAG
  rationale: 송영의 정형 도입부로 한국 교회 전통의 「찬송하리로다」가 자연스럽고 무게가 살아 있다. 합쇼체 흐름 안에서도 송영 도입부로 허용된다.
- source_word: εὐλογίᾳ πνευματικῇ
  english_pob_choice: spiritual blessing
  chosen_korean: 영적 복
  alternatives_korean:
  - 성령에 속한 복
  lexicon: BDAG
  rationale: πνευματικῇ는 「성령에 속한」으로도 읽을 수 있으나 본문이 보다 넓은 영적 차원을 가리키므로 「영적 복」으로 옮기고 가능성은 각주 없이 lexical 결정에 남긴다.
- source_word: ἐν τοῖς ἐπουρανίοις
  english_pob_choice: in the heavenly realms
  chosen_korean: 하늘에 속한
  alternatives_korean:
  - 하늘들에
  - 하늘의 처소에
  lexicon: BDAG
  rationale: 에베소서 특유 어구로 우주적 영역을 가리킨다. 「하늘에 속한」으로 풀어 영역성을 살린다.
theological_decisions:
- issue: 에베소서 1:3–14 단일 헬라어 문장의 한국어 처리
  chosen_reading: 절마다 분사·관형절·말줄임표(또는 쉼표)로 흐름을 이어, 14절에 가서야 종결한다.
  alternative_readings:
  - 각 절을 독립 문장으로 분리
  rationale: 송영의 누적적·찬양적 구조가 본문 신학의 일부이다. 한국어 가독성과 헬라어 문장 흐름 사이에서, 본 번역은 각 절을 분사·관형절로 매끄럽게 이어 14절에서야 송영을 닫는다.
  doctrine_reference: 'PHILOSOPHY.md: Preserve rhetorical structure where it carries theological weight.'
