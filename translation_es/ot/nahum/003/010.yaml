translation:
  language: es
  text: Pero ella también fue al exilio, al cautiverio; sus niños[a] también fueron despedazados en la cabeza[b] de todas las calles. Echaron suertes sobre sus hombres honrados[c], y todos sus grandes hombres fueron atados con cadenas[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus pequeños».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «en la cabeza de todas las calles»; es decir, en entradas o esquinas prominentes de las calles.
    reason: cultural_note
  - marker: c
    text: O «sus nobles».
    reason: lexical_alternative
  - marker: d
    text: O «fueron atados con grilletes».
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם הִיא
  english_pob_choice: Yet she too
  chosen_spanish: Sí, ella también
  alternatives_spanish:
  - Ella también
  - Y ella también
  - Incluso ella
  lexicon: HALOT
  rationale: גַּם añade énfasis de continuidad o sorpresa; en español, «Sí, ella también» conserva el eco enfático y la referencia femenina singular sin forzar una lectura interpretativa excesiva.
- source_word: לַגֹּלָה הָלְכָה
  english_pob_choice: went into exile
  chosen_spanish: fue llevada al exilio
  alternatives_spanish:
  - entró en exilio
  - fue al exilio
  - marchó al exilio
  lexicon: HALOT
  rationale: Aunque el hebreo usa הלך, el contexto de juicio y deportación favorece la idea de ser llevada. «Fue llevada al exilio» comunica con naturalidad el resultado histórico sin perder la noción de destierro.
- source_word: בַּשֶּׁבִי
  english_pob_choice: into captivity
  chosen_spanish: al cautiverio
  alternatives_spanish:
  - en cautiverio
  - como cautivos
  - a la cautividad
  lexicon: HALOT
  rationale: La frase intensifica el exilio como condición de sometimiento. «Al cautiverio» mantiene el movimiento/resultante y suena natural en español bíblico moderno.
- source_word: עֹלָלֶיהָ
  english_pob_choice: her children
  chosen_spanish: sus niños
  alternatives_spanish:
  - sus pequeños
  - sus hijos
  - sus infantes
  lexicon: HALOT
  rationale: עֹלָלִים se refiere a niños muy pequeños. «Niños» comunica bien en el texto principal; «pequeños» o «infantes» serían más específicos, pero menos fluidos aquí.
- source_word: יְרֻטְּשׁוּ
  english_pob_choice: were dashed to pieces
  chosen_spanish: fueron despedazados
  alternatives_spanish:
  - fueron hechos pedazos
  - fueron aplastados
  - fueron destrozados
  lexicon: HALOT
  rationale: El verbo expresa violencia extrema. «Despedazados» preserva el impacto gráfico del hebreo mejor que una versión suavizada.
- source_word: בְּרֹאשׁ כָּל חוּצוֹת
  english_pob_choice: at the head of every street
  chosen_spanish: al comienzo de todas las calles
  alternatives_spanish:
  - en la esquina de todas las calles
  - a la entrada de cada calle
  - al extremo de todas las calles
  lexicon: HALOT
  rationale: La imagen es literalmente la cabeza o inicio de las calles. «Al comienzo de todas las calles» conserva la literalidad; «esquina» sería una adaptación cultural válida, pero menos cercana al hebreo.
- source_word: נִכְבַּדֶּיהָ
  english_pob_choice: her honored men
  chosen_spanish: sus hombres honrados
  alternatives_spanish:
  - sus nobles
  - sus dignatarios
  - sus hombres de honor
  lexicon: HALOT
  rationale: נִכְבָּדִים apunta a personas de peso, honor y rango. «Hombres honrados» mantiene la raíz semántica del honor sin convertirlo automáticamente en un título nobiliario.
- source_word: יַדּוּ גוֹרָל
  english_pob_choice: They cast lots
  chosen_spanish: Echaron suertes
  alternatives_spanish:
  - tiraron suertes
  - sortearon
  - echaron lotes
  lexicon: HALOT
  rationale: «Echar suertes» es el equivalente bíblico y natural en español para el reparto por sorteo. Conserva el valor idiomático del hebreo.
- source_word: גְּדוֹלֶיהָ
  english_pob_choice: her great men
  chosen_spanish: sus hombres grandes
  alternatives_spanish:
  - sus grandes hombres
  - sus líderes
  - sus hombres principales
  lexicon: HALOT
  rationale: גדולים describe prominencia o estatus. «Hombres grandes» sigue de cerca el patrón hebreo y conserva la tensión entre grandeza social y poder, evitando estrecharlo solo a «líderes».
- source_word: רֻתְּקוּ בַזִּקִּים
  english_pob_choice: were bound in chains
  chosen_spanish: fueron atados con cadenas
  alternatives_spanish:
  - fueron sujetos con grilletes
  - fueron encadenados
  - fueron atados con grillos
  lexicon: HALOT
  rationale: זִקִּים son ataduras, cadenas o grilletes. «Atados con cadenas» reproduce bien la humillación y permite una lectura transparente en español.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente no introdujo cambios: el texto quedó confirmado con alta concordancia. La redacción española sigue ese mismo análisis, conservando la fuerza poética y violenta del versículo y reflejando las alternativas léxicas documentadas sin añadir interpretaciones nuevas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención POB cuando el nombre divino no aparece en este versículo.
  - Se usa un español bíblico moderno y claro, evitando arcaísmos innecesarios como «llevada en cautiverio» en favor de un registro más natural.
  - «Echar suertes» se conserva como locución estable, coherente con el uso bíblico español.
  - Los términos de estatus social se han mantenido cercanos al hebreo para no aplanar la tensión entre honor, peso social y prominencia.
