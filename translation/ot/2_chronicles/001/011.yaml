theological_decisions:
- issue: Rendering the divine speaker אֱלֹהִים
  chosen_reading: God
  rationale: The verse uses אֱלֹהִים, not the divine name YHWH. Therefore it should be rendered 'God,' not 'the LORD.'
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; contested term table for YHWH applies only where the divine name appears.'
