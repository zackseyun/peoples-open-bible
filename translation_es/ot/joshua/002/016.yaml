base_translation:
  language: en
  yaml_path: translation/ot/joshua/002/016.yaml
  text: And she said to them[a], "Go to the hill country, lest the pursuers encounter you, and hide yourselves there three days, until the pursuers return[b]. Afterward you may go on your way."
  footnotes:
