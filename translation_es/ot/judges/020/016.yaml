    text: 'O «de entre todo este pueblo». El hebreo expresa un sentido partitivo: «de todo este pueblo».'
    reason: lexical_alternative
  - marker: b
    text: Lit. «restringidos o impedidos en la mano derecha»; el hebreo probablemente implica combate con la izquierda, de ahí «zurdos».
    reason: lexical_alternative
  revision_rationale: Se ajustó el distributivo («cada uno de ellos») para reflejar כָּל זֶה, se explicitó «con honda» para conservar mejor la destreza expresada por קֹלֵעַ בָּאֶבֶן, y se mejoró la naturalidad española con «a un cabello» y «no fallar», manteniendo la nota sobre el hebreo literal de «zurdos».
