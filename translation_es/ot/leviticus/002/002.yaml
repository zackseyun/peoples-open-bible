    issue: «hará subir» para וְהִקְטִיר
    rationale: Aunque puede evocar el humo ascendente del rito, el hebreo aquí describe la acción sacrificial de quemar sobre el altar. La decisión inglesa documentada es «shall burn», y «quemará» es más claro y natural en español.
  - severity: medium
    issue: «como ofrenda encendida» para אִשֵּׁה
    rationale: El hebreo presenta una aposición nominal («una אִשֵּׁה»), no una comparación con «como». Además, el audit trail teológico/lexical favorece el sentido de «food offering», por lo que «ofrenda de alimento» refleja mejor la decisión del proyecto.
  - severity: low
    issue: Nota al pie desalineada con la mejor opción principal
    rationale: La nota actual ofrece alternativas relativas al fuego para «ofrenda encendida», pero si el texto principal se corrige a «ofrenda de alimento», la nota debe conservar las alternativas tradicionales documentadas desde esa base.
