translation:
  text: and to forbid whole burnt offerings and sacrifices and drink offerings from the sanctuary[a], and to profane Sabbaths and feasts[d][c][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'burnt offerings.' The Greek term refers specifically to offerings wholly consumed by fire.
    reason: lexical_alternative
  - marker: b
    text: Or 'libation' for 'drink offerings.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'from the sanctuary' likely means that these rites were to be excluded from taking place there; some English renderings smooth this to 'in the sanctuary.'
    reason: lexical_alternative
  - marker: d
    text: Or 'festivals.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κωλῦσαι
  chosen: to forbid
  alternatives:
  - to prevent
  - to hinder
  lexicon: LSJ
  rationale: The infinitive expresses the content of the decree/purpose in the surrounding context. 'Forbid' best captures an official prohibition rather than mere physical prevention.
- source_word: ὁλοκαυτώματα
  chosen: whole burnt offerings
  alternatives:
  - burnt offerings
  lexicon: LSJ
  rationale: The term denotes offerings wholly consumed by fire. 'Whole burnt offerings' preserves that nuance more fully than the shorter traditional 'burnt offerings,' while remaining readable.
- source_word: θυσίας
  chosen: sacrifices
  alternatives:
  - offerings
  lexicon: LSJ
  rationale: A broad sacrificial term distinct from the more specific whole burnt offerings and drink offering. 'Sacrifices' keeps the cultic force and the distinction among the listed rites.
- source_word: σπονδὴν
  chosen: drink offerings
  alternatives:
  - libation
  lexicon: LSJ
  rationale: Although singular in Greek, English idiom naturally uses the plural in a list of cultic practices being prohibited generally. 'Drink offerings' is clearer for modern readers than 'libation' while accurately conveying the ritual sense.
- source_word: ἐκ τοῦ ἁγιάσματος
  chosen: from the sanctuary
  alternatives:
  - in the sanctuary
  - out of the sanctuary
  - from the holy place
  lexicon: LSJ
  rationale: 'With κωλῦσαι, ἐκ marks exclusion/removal from the sanctuary''s sphere: the rites are to be barred from taking place there. ''From the sanctuary'' reflects the Greek preposition more directly than smoothing to ''in the sanctuary.'''
- source_word: βεβηλῶσαι
  chosen: to profane
  alternatives:
  - to desecrate
  - to defile
  lexicon: LSJ
  rationale: The verb means to treat as common or unholy. 'Profane' is a strong but still readable cultic term and matches the religious violation in view.
- source_word: σάββατα
  chosen: Sabbaths
  alternatives:
  - the Sabbath days
  lexicon: LSJ
  rationale: The plural form is explicit in Greek and likely refers to Sabbath observance generally. 'Sabbaths' preserves the source form without awkwardness.
- source_word: ἑορτάς
  chosen: feasts
  alternatives:
  - festivals
  - appointed feasts
  lexicon: LSJ
  rationale: The word denotes religious festival days. 'Feasts' is concise and traditional, fitting the cultic context; 'festivals' is possible but slightly less tied to Israel's sacred calendar.
