    text: O 'en orden de batalla' o 'preparados para la guerra' para 'armados'.
    reason: alternative_reading
  - marker: b
    text: O 'sus compañeros israelitas' para 'sus hermanos'; el hebreo usa el término masculino de parentesco de manera representativa.
    reason: lexical_alternative
  revision_rationale: Se corrigió la nota mal anclada moviendo la alternativa representativa a 'hermanos' y se ordenaron las notas según su aparición en el texto. También se ajustó el español hacia un registro más neutro latinoamericano ('sus/les/ustedes') y se cambió 'habitarán' por 'se quedarán' para reflejar mejor el contraste contextual con 'pasarán'. 'Esposas' hace más explícito el sentido contextual de נְשֵׁיכֶם y suena natural en español actual.
