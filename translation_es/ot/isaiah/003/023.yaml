translation:
  language: es
  text: y los espejos[a], y las prendas de lino, y los turbantes[b], y los velos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tabletas»; el término hebreo puede referirse de manera más amplia a objetos lisos y pulidos, pero en este contexto «espejos» encaja mejor con la lista de adornos de lujo.
    reason: lexical_alternative
  - marker: b
    text: O «chales» o «envolturas» para «velos». La forma exacta de la prenda es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: גִּלְיֹנִים
  english_pob_choice: mirrors
  chosen_spanish: espejos
  alternatives_spanish:
  - tabletas
  - objetos pulidos de metal
  - espejos de metal pulido
  lexicon: HALOT, BDB
  rationale: El contexto enumera adornos de lujo femeninos; en español, 'espejos' comunica con claridad la función probable del objeto sin añadir una precisión no segura. 'Tabletas' conserva una posibilidad etimológica, pero resulta menos natural y menos contextual en español.
- source_word: סְּדִינִים
  english_pob_choice: linen garments
  chosen_spanish: prendas de lino
  alternatives_spanish:
  - mantos de lino
  - ropas de lino
  - vestidos de lino
  lexicon: HALOT, BDB
  rationale: El hebreo señala prendas hechas de lino, pero no especifica su corte. 'Prendas de lino' preserva el material y evita sobredefinir la forma. 'Vestidos' o 'mantos' concretan más de lo que el término garantiza.
- source_word: צְּנִיפוֹת
  english_pob_choice: turbans
  chosen_spanish: turbantes
  alternatives_spanish:
  - tocados
  - paños para la cabeza
  - coberturas de cabeza
  lexicon: HALOT, BDB
  rationale: La imagen básica es algo enrollado o colocado en la cabeza. 'Turbantes' es el equivalente español más claro y natural; 'tocados' o 'paños para la cabeza' son posibles, pero menos precisos o menos idiomáticos.
- source_word: רְדִידִים
  english_pob_choice: veils
  chosen_spanish: velos
  alternatives_spanish:
  - chales
  - mantos
  - envolturas
  lexicon: HALOT, BDB
  rationale: En esta lista de adornos, el término probablemente designa una cobertura ligera femenina. 'Velos' mantiene el sentido tradicional y sigue siendo suficientemente amplio; 'chales' o 'mantos' podrían funcionar si se entendiera más como prenda exterior, pero no son tan directos.
translation_notes:
  revision_awareness: El texto hebreo y la traducción inglesa auditada coinciden de forma alta; no se observaron revisiones aplicadas en el registro fuente más reciente. Se conservó esa lectura estable, con las alternativas léxicas documentadas en notas.
  spanish_consistency_notes:
  - Se mantiene una lista coordinada con comas y la conjunción final 'y', en paralelo al hebreo y al inglés auditado.
  - Se evitó 'SEÑOR' u otro vocabulario teológico ajeno porque el versículo es un inventario de prendas y objetos; no hay carga doctrinal que requiera adaptación.
  - '''Prendas de lino'' conserva el valor material sin forzar una identificación más específica de la vestimenta.'
  - '''Velos'' se usa en plural como en el original plural, sin singularizar innecesariamente.'
