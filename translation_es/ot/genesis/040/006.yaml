- from: José vino a ellos por la mañana, y los vio[a]; y he aquí, estaban preocupados.
  to: José vino a ellos por la mañana y los vio[a], y he aquí, estaban afligidos.
  rationale: Se reemplaza «preocupados» por «afligidos» para reflejar mejor el estado visible de turbación o abatimiento expresado por זֹעֲפִים y documentado en la auditoría inglesa. También se aligera la puntuación para una lectura más natural sin perder la fuerza de «y he aquí».
