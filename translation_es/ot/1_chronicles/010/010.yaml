  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparece Yahvé ni Mesías. «Dagón» está correctamente transliterado. «Casa» preserva בֵּית según la pauta documentada, y «cráneo» mantiene la precisión léxica del POB.
