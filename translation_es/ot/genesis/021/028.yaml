revisions:
- from: Y Abraham colocó siete corderas[a] del rebaño aparte de ellas.
  to: Y Abraham colocó siete corderas[a] del rebaño por separado.
  rationale: 'Se corrige la frase final para reflejar con fidelidad לְבַדְּהֶן en español natural: ''por separado'' comunica la separación de las siete corderas sin introducir un pronombre confuso. Se conserva ''colocó'' como equivalente válido de וַיַּצֵּב y se mejora la nota para que suene idiomática mientras preserva la alternativa ''apartó / set apart'' documentada en el POB inglés.'
