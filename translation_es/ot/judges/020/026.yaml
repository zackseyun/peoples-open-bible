base_translation:
  language: en
  yaml_path: translation/ot/judges/020/026.yaml
  text: Then all the sons of Israel and all the people went up and came to Bethel[a], and they wept and sat there before Yahweh and fasted that day until evening[b]. Then they offered up burnt offerings and peace offerings before Yahweh.
