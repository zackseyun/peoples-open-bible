revisions:
- from: Yahvé es tu guardador[a]; Yahvé es tu sombra a tu derecha.
  to: Yahvé es el que te guarda; Yahvé es tu sombra[a] a tu derecha.
  rationale: Se reemplaza «tu guardador» por «el que te guarda» para conservar el campo léxico de שׁמר y la recurrencia temática del salmo, pero con español más natural y claro. Se mantiene «tu sombra» para צִלְּךָ, y la nota se ajusta para ofrecer una alternativa realmente útil en español y explicar la imagen protectora sin duplicar la redacción principal.
