review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo y del POB inglés: gasto ostentoso de metales preciosos, contratación de un artesano, fabricación de un falso dios y doble gesto de reverencia intensificada. También preserva correctamente ''un dios'' para אֵל y la nota sobre קָנֶה. Sin embargo, la secuencia final invierte la fuerza relativa de los dos verbos de reverencia: יִסְגְּדוּ es mejor como ''se inclinan''/''se postran'', y אַף יִשְׁתַּחֲוּוּ debe intensificar con una formulación más fuerte equivalente a ''de hecho, se postran''.'
  spanish_quality_summary: El español es claro y digno. 'Orfebre' funciona bien. No obstante, 'se postran, sí, se inclinan hasta el suelo' suena algo redundante y estilísticamente menos natural, además de debilitar la escalada retórica documentada en el POB inglés. Una pequeña reparación mejora fidelidad y fluidez.
  glossary_alignment: No hay conflictos con la terminología del proyecto. 'Un dios' respeta la decisión teológica documentada. La nota léxica sobre קָנֶה está bien enfocada. La única corrección necesaria es la gradación verbal de los actos de adoración.
  issues:
  - severity: medium
    issue: La gradación de los dos verbos de reverencia está invertida o desajustada.
    rationale: El POB inglés documenta 'they bow down, indeed they prostrate themselves', donde el segundo verbo intensifica al primero. En el borrador español, 'se postran, sí, se inclinan hasta el suelo' hace más fuerte el primero y menos directo el segundo, lo que no refleja bien la progresión retórica de יִסְגְּדוּ ... אַף יִשְׁתַּחֲוּוּ.
  - severity: low
    issue: La frase final suena algo forzada en español.
    rationale: '''Sí, se inclinan hasta el suelo'' comunica la idea, pero es menos natural y más perifrástica que una opción como ''de hecho, se postran'', que además refleja mejor la intensificación del hebreo.'
  revised_spanish_text: Los que derraman oro de la bolsa y pesan plata en la balanza[a] contratan a un orfebre, y él lo convierte en un dios; se inclinan, de hecho, se postran.
  revised_footnotes:
  - marker: a
    text: O 'y pesan plata con el brazo de la balanza'; el hebreo literalmente dice 'caña' o 'junco' y puede referirse al travesaño medidor de una balanza.
    reason: lexical_alternative
  revision_rationale: 'Se mantiene casi todo el borrador porque refleja bien el hebreo y las decisiones auditadas. Solo se ajusta la cláusula final para preservar la intensificación entre los dos verbos de adoración: primero un gesto de inclinación, luego la postración enfática. Esto mejora tanto la fidelidad al texto fuente como la naturalidad del español.'
