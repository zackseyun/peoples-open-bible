    issue: Los marcadores de notas están asignados a frases equivocadas.
    rationale: El texto pone [a] en 'casas de sus padres' y [b] en la fórmula de edad, pero la nota a explica una alternativa de 'inscripción genealógica' y la nota b explica 'casas de sus padres'. Esto incumple la disciplina de anclaje y confunde al lector.
  - severity: medium
    issue: '''Desde los veinte años y más'' es menos idiomático que ''desde los veinte años en adelante''.'
    rationale: El hebreo וּלְמָעְלָה expresa un umbral inclusivo. En español general, 'en adelante' o 'o más' suena más natural y preciso que 'y más'.
  - severity: low
    issue: '''Inscripción genealógica'' es aceptable, pero ''registro genealógico'' suena más natural en contexto administrativo.'
    rationale: Ambas opciones son fieles, pero 'registro' encaja mejor con la idea de listas oficiales por linaje y con el tono administrativo del pasaje.
  revised_spanish_text: El registro genealógico de los sacerdotes fue según las casas de sus padres[a], y el de los levitas, desde los veinte años en adelante, en sus deberes, por sus divisiones.
