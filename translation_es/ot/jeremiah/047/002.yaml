  text: 'Thus says Yahweh: Behold[a], waters are rising from the north, and they will become an overflowing torrent; they will overflow the land and its fullness, the city and those who dwell in it. Then men will cry out[c][b], and every inhabitant of the land will wail.'
  footnotes:
