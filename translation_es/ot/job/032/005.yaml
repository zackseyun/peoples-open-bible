translation:
  language: es
  text: Cuando Eliú vio que no había respuesta en la boca de los tres hombres[a], su ira se encendió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «no había respuesta en la boca de los tres hombres», un modismo que significa que no tenían réplica que dar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: When ... saw
  chosen_spanish: Cuando ... vio
  alternatives_spanish:
  - Y ... vio
  - Entonces ... vio
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; en español, «Cuando» comunica bien la secuencia temporal y mantiene el enlace con la reacción de Eliú sin sonar forzado.
- source_word: אֱלִיהוּא
  english_pob_choice: Elihu
  chosen_spanish: Eliú
  alternatives_spanish:
  - Elihu
  lexicon: Transliteración tradicional en español bíblico
  rationale: Se adapta el nombre a la forma habitual en español, conservando la identidad propia del personaje sin alterar el referente.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: 'Aquí introduce el contenido de lo que Eliú vio: «vio que...». «Que» es la construcción natural en español y refleja la función completiva del hebreo.'
- source_word: אֵין
  english_pob_choice: there was no
  chosen_spanish: no había
  alternatives_spanish:
  - no hubo
  - no existía
  lexicon: HALOT
  rationale: En un contexto narrativo pasado, «no había» expresa con naturalidad la negación existencial del hebreo.
- source_word: מַעֲנֶה
  english_pob_choice: answer
  chosen_spanish: respuesta
  alternatives_spanish:
  - contestación
  - réplica
  lexicon: HALOT
  rationale: «Respuesta» comunica el valor dialógico del término en Job. En español suena más fluido que una forma más técnica, sin perder el sentido de réplica esperada.
- source_word: בְּפִי
  english_pob_choice: in the mouth of
  chosen_spanish: en la boca de
  alternatives_spanish:
  - en los labios de
  - de
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática del hebreo. «En la boca de» mantiene la fuerza concreta del original y refleja el audit trail inglés, que también preserva la metáfora.
- source_word: שְׁלֹשֶׁת הָאֲנָשִׁים
  english_pob_choice: the three men
  chosen_spanish: los tres hombres
  alternatives_spanish:
  - estos tres hombres
  - los tres varones
  lexicon: HALOT
  rationale: Es una traducción directa del sintagma contado; «hombres» sigue el hebreo y es plenamente comprensible en español.
- source_word: וַיִּחַר אַפּוֹ
  english_pob_choice: his anger burned
  chosen_spanish: su ira se encendió
  alternatives_spanish:
  - ardió su ira
  - se inflamó su ira
  - se encendió su enojo
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y literaliza la emoción como fuego. «Se encendió» preserva la metáfora del ardor sin caer en un calco opaco; «ira» mantiene la intensidad del término.
translation_notes:
  revision_awareness: El texto inglés del POB ya había optado por mantener la metáfora idiomática de «in the mouth of» y por explicar con nota que significa «no tenían respuesta que dar». Esta versión española conserva esa imagen y la aclara con una nota equivalente, sin reducirla a una paráfrasis más plana. No hay revisiones aplicadas en el expediente inglés; por eso no se introducen cambios textuales mayores respecto del sentido auditado.
  spanish_consistency_notes:
  - Se mantiene «Eliú» como forma española estable del nombre propio.
  - Se conserva la imagen corporal «en la boca de» para alinear la metáfora hebrea con el expediente inglés.
  - «Ira» se usa para reflejar la intensidad del hebreo אַף en contexto narrativo, sin suavizarla a un simple «enojo».
