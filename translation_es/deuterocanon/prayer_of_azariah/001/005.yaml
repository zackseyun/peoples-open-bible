translation:
  language: es
  text: Y has ejecutado juicios verdaderos en todo lo que has traído sobre nosotros y sobre tu ciudad santa, Jerusalén, la ciudad de nuestros padres; porque en verdad y juicio[a] has hecho todas estas cosas a causa de nuestros pecados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en verdad y justicia». La frase griega puede traducirse con «juicio» o «justicia»; aquí se mantiene «juicio» para preservar la repetición del lenguaje judicial en el versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: κρίματα
  english_pob_choice: judgments
  chosen_spanish: juicios
  alternatives_spanish:
  - sentencias
  - fallos
  - justicia
  lexicon: BDAG
  rationale: El plural κρίματα conserva un matiz forense y evaluativo. «Juicios» mantiene ese valor judicial y resulta natural en español bíblico contemporáneo. «Justicia» suaviza el matiz de decisión judicial; «sentencias» es más estrecho y «fallos» es menos apropiado en registro bíblico.
- source_word: ἀληθείας
  english_pob_choice: 'true'
  chosen_spanish: verdaderos
  alternatives_spanish:
  - de verdad
  - verdaderos en verdad
  - de verdad y rectitud
  lexicon: BDAG
  rationale: La construcción κρίματα ἀληθείας se entiende como juicios conformes a la verdad. En español, «juicios verdaderos» comunica de forma directa esa cualidad sin forzar una genitivación poco natural. «De verdad» suena adverbial y no preserva tan bien la relación con «juicios».
- source_word: ἐπήγαγες ἡμῖν
  english_pob_choice: brought upon us
  chosen_spanish: has traído sobre nosotros
  alternatives_spanish:
  - has hecho venir sobre nosotros
  - has cargado sobre nosotros
  - has traído encima de nosotros
  lexicon: BDAG
  rationale: ἐπάγω aquí expresa traer sobre alguien calamidad o castigo. «Has traído sobre nosotros» conserva la idea causal sin añadir una interpretación más específica que el griego no exige. Se mantiene el pasado perfecto por la forma verbal de la traducción inglesa auditada y la cadencia confesional del texto.
- source_word: πόλιν σου τὴν ἁγίαν
  english_pob_choice: your holy city
  chosen_spanish: tu ciudad santa
  alternatives_spanish:
  - tu ciudad sagrada
  - tu ciudad consagrada
  lexicon: BDAG
  rationale: «Ciudad santa» es la correspondencia natural y bíblica de πόλις + ἅγιος. Conserva el valor teológico del lugar sin explicarlo de más. «Sagrada» sería posible, pero menos estable en el uso bíblico español.
- source_word: τὴν τῶν πατέρων ἡμῶν Ἰερουσαλήμ
  english_pob_choice: Jerusalem, the city of our fathers
  chosen_spanish: Jerusalén, la ciudad de nuestros padres
  alternatives_spanish:
  - Jerusalén, de nuestros padres
  - Jerusalén, ciudad de nuestros padres
  lexicon: BDAG
  rationale: La aposición identifica Jerusalén como la ciudad ancestral. «La ciudad de nuestros padres» reproduce con claridad esa relación, evitando una literalidad torpe y conservando el vínculo patrimonial e histórico.
- source_word: ἐν ἀληθείᾳ καὶ κρίσει
  english_pob_choice: in truth and judgment
  chosen_spanish: en verdad y juicio
  alternatives_spanish:
  - con verdad y justicia
  - verdaderamente y justamente
  lexicon: BDAG
  rationale: 'La frase conserva dos términos en paralelo: verdad y juicio. «En verdad y juicio» mantiene la estructura binaria del griego y el registro judicial. «Justicia» es una alternativa viable, pero «juicio» preserva mejor la repetición de la raíz forense en el versículo.'
- source_word: πάντα ταῦτα
  english_pob_choice: all these things
  chosen_spanish: todo esto
  alternatives_spanish:
  - todas estas cosas
  - todo ello
  lexicon: BDAG
  rationale: Aunque el griego pluraliza la demostración, en español «todo esto» suena más natural y sigue abarcando el conjunto de acciones mencionadas. «Todas estas cosas» es más explícito, pero más pesado.
- source_word: διὰ τὰς ἁμαρτίας ἡμῶν
  english_pob_choice: because of our sins
  chosen_spanish: a causa de nuestros pecados
  alternatives_spanish:
  - por nuestros pecados
  - debido a nuestros pecados
  - por causa de nuestros pecados
  lexicon: BDAG
  rationale: διά con acusativo expresa causa. «A causa de nuestros pecados» es claro, solemne y conserva la confesión explícita del motivo del juicio divino. «Por nuestros pecados» es posible, pero menos preciso en español contemporáneo.
theological_decisions:
- issue: Mantener el lenguaje judicial aplicado a la acción de Dios sin suavizarlo
  english_pob_reading: Use 'judgments' and 'judgment' language explicitly, presenting God's actions against Jerusalem as just judicial acts because of Israel's sins.
  chosen_spanish_reading: Usar «juicios» y «juicio» de manera explícita, presentando lo ocurrido como actos judiciales verdaderos de Dios por causa del pecado.
  alternative_spanish_readings:
  - usar solo «justicia»
  - usar expresiones más generales como «actos correctos» o «lo recto»
  rationale: El verso confiesa que la destrucción y el castigo no fueron arbitrarios, sino respuestas judiciales verdaderas. En español, «juicio» conserva ese peso forense y evita diluir la tensión teológica del texto. «Justicia» sería posible, pero perdería la reiteración verbal del campo judicial.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego del LXX y el audit trail inglés, conservando la duplicación del lenguaje judicial y la causalidad explícita del pecado. Se evitó traducir mecánicamente «judgment» por «justicia» para no perder la resonancia forense del pasaje.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; aquí no hay aparición del tetragrámaton.
  - Se usa «juicios/juicio» de forma consistente para κρίματα/κρίσει, preservando la red judicial del versículo.
  - Se prefiere «pecados» para ἁμαρτίαις en un contexto confesional y cultual, sin suavizar el motivo del castigo.
  - La puntuación separa claramente la cláusula causal final, siguiendo la sintaxis griega y la cadencia litúrgica del español bíblico.
