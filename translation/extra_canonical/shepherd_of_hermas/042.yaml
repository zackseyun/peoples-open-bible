id: HERM.M.12.ii
reference: Shepherd of Hermas — Mandate 12, section ii
unit: section
book: Shepherd of Hermas
source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Πάντων προέχουσα ἐπιθυμία γυναικὸς ἀλλοτρίας ἢ ἀνδρός, καὶ πολυτελείας πλούτου
    καὶ ἐδεσμάτων πολλῶν ματαίων καὶ μεθυσμάτων, καὶ ἑτέρων τρυφῶν πολλῶν καὶ μωρῶν·
    πᾶσα γὰρ τρυφὴ μωρά ἐστι καὶ κενὴ τοῖς δούλοις τοῦ Θεοῦ. 2. αὗται οὖν αἱ ἐπιθυμίαι
    πονηραί εἰσι, θανατοῦσαι τοὺς δούλους τοῦ Θεοῦ. αὕτη γὰρ ἡ ἐπιθυμία ἡ πονηρὰ τοῦ
    διαβόλου θυγάτηρ ἐστίν. ἀπέχεσθαι οὖν δεῖ ἀπὸ τῶν ἐπιθυμιῶν τῶν πονηρῶν, ἵνα ἀποσχόμενοι
    ζήσητε τῷ Θεῷ. 3. ὅσοι δὲ ἂν κατακυριευθῶσιν ὑπ᾽ αὐτῶν καὶ μὴ ἀντισταθῶσιν αὐταῖς,
    ἀποθανοῦνται εἰς τέλος· θανατώδεις γάρ εἰσιν αἱ ἐπιθυμίαι αὗται. 4. σὺ δὲ ἔνδυσαι
    τὴν ἐπιθυμίαν τῆς δικαιοσύνης, καὶ καθοπλισάμενος τὸν φόβον τοῦ Κυρίου ἀντίστηθι
    αὐταῖς. ὁ γὰρ φόβος τοῦ Θεοῦ κατοικεῖ ἐν τῇ ἐπιθυμίᾳ τῇ ἀγαθῇ. ἡ ἐπιθυμία ἡ πονηρά,
    ἐὰν ἴδῃ σε καθωπλισμένον τῷ φόβῳ τοῦ Θεοῦ καὶ ἀνθεστηκότα αὐτῇ, φεύξεται ἀπὸ σοῦ
    μακράν, καὶ οὐκ ἔτι σοι ὀφθήσεται φοβουμένη τὰ ὅπλα σου. 5. σὺ οὖν στεφανωθεὶς
    κατ᾽ αὐτῆς ἐλθὲ πρὸς τὴν ἐπιθυμίαν τῆς δικαιοσύνης, καὶ παραδοὺς αὐτῇ τὸ νῖκος
    ὃ ἔλαβες, δούλευσον αὐτῇ καθὼς αὐτὴ βούλεται. ἐὰν δουλεύσῃς τῇ ἐπιθυμίᾳ τῇ ἀγαθῇ
    καὶ ὑποταγῇς αὐτῇ, δυνήσῃ τῆς ἐπιθυμίας τῆς πονηρᾶς κατακυριεῦσαι καὶ ὑποτάξαι
    αὐτὴν καθὼς βούλει.
  language: Greek
  pages:
  - 353
  - 354
  unit_id: M.12.ii
  label: Mandate 12, section ii
  sequence: 42
translation:
  text: ‘Foremost of all is desire for another’s wife or husband[a], and for the luxury
    of wealth, and for many vain dishes and intoxicating drinks[b], and for many other
    foolish indulgences[c]; for every indulgence is foolish and empty for the slaves
    of God[d].


    2. These, then, are evil desires, putting the slaves of God to death. For this
    evil desire is the devil’s daughter. Therefore one must abstain from evil desires,
    so that, by abstaining, you may live to God[e].


    3. But all who are overmastered by them and do not stand against them will die
    utterly[f]; for these desires are death‑dealing.


    4. But you—put on the desire for righteousness[g], and, having armed yourself
    with the fear of the Lord, stand against them. For the fear of God dwells in the
    good desire. If the evil desire sees you armed with the fear of God and standing
    against it, it will flee far away from you, and it will no longer appear to you,
    being afraid of your weapons.


    5. So then, having been crowned in your contest against it[h], come to the desire
    for righteousness, and, handing over to it the victory you received, serve it as
    it wills[i]. If you serve the good desire and submit to it, you will be able to
    master[j] the evil desire and to subject it as you wish.’
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: “a woman belonging to another or a man.” The rendering makes the
      symmetry explicit in English.'
    reason: lexical_alternative
  - marker: b
    text: '“Dishes” renders ἐδέσματα (prepared courses), and “intoxicating drinks”
      renders μεθύσματα. Alternatives: “foods and potations.” “Vain” (ματαῖα) carries
      the sense of empty, futile.'
    reason: lexical_alternative
  - marker: c
    text: τρυφή signifies self‑indulgent luxury or soft living. “Indulgences” keeps
      the moral nuance.
    reason: cultural_note
  - marker: d
    text: Or “servants of God.” The translation chooses “slaves” to keep the sharp
      allegiance contrast in this context.
    reason: lexical_alternative
  - marker: e
    text: Or “live for God.” The dative is kept as “to God” to preserve the ancient
      idiom.
    reason: lexical_alternative
  - marker: f
    text: 'εἰς τέλος intensifies the verb: “utterly, to the full.” Alternatives: “die
      in the end,” “die completely.”'
    reason: lexical_alternative
  - marker: g
    text: Lit. “desire of righteousness.” Rendered as “for righteousness” to express
      orientation; Hermas also calls it “the good desire,” personifying it.
    reason: lexical_alternative
  - marker: h
    text: στεφανωθείς evokes the victor’s wreath after a contest; κατ’ αὐτῆς marks
      the adversative direction (“against it”).
    reason: cultural_note
  - marker: i
    text: “Serve” translates δουλεύω; alternatively, “be a slave to it.” The nuance
      of devoted service is intended.
    reason: lexical_alternative
  - marker: j
    text: '“Master” renders κατακυριεῦσαι; alternatives: “gain dominion over,” “overpower.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιθυμία
  chosen: desire
  alternatives:
  - lust
  - craving
  lexicon: BDAG
  rationale: The term covers both positive and negative longing in this passage; using
    “desire” preserves the symmetry between evil desire and the desire aligned with
    righteousness.
- source_word: γυναικὸς ἀλλοτρίας ἢ ἀνδρός
  chosen: another’s wife or husband
  alternatives:
  - a woman belonging to another or a man
  - another man’s wife or a man
  lexicon: BDAG / LSJ
  rationale: ἀλλότριος means “belonging to another.” Rendering symmetrically reflects
    the moral scope to both sexes, fitting Hermas’s paraenetic style.
- source_word: πολυτέλεια
  chosen: luxury
  alternatives:
  - extravagance
  - costliness
  lexicon: LSJ
  rationale: πολυτέλεια denotes luxurious living; “luxury” is concise and retains
    the moral critique.
- source_word: πλοῦτος
  chosen: wealth
  alternatives:
  - riches
  lexicon: BDAG
  rationale: “Wealth” is the plain modern equivalent and pairs naturally with luxury.
- source_word: ἐδέσματα
  chosen: dishes
  alternatives:
  - foods
  - delicacies
  lexicon: LSJ
  rationale: The word often refers to prepared dishes/delicacies; “dishes” keeps the
    concrete image of many courses.
- source_word: ματαῖος
  chosen: vain
  alternatives:
  - empty
  - futile
  lexicon: BDAG
  rationale: Hermas frequently uses “vain” in moral critique; it preserves the moral
    coloring without over-explaining.
- source_word: μεθύσματα
  chosen: intoxicating drinks
  alternatives:
  - potations
  - drunken bouts
  lexicon: LSJ
  rationale: μεθύσμα refers to intoxicant drinks; “intoxicating drinks” communicates
    plainly without archaic tone.
- source_word: τρυφή
  chosen: indulgence
  alternatives:
  - luxury
  - self‑indulgence
  - soft living
  lexicon: LSJ
  rationale: τρυφή connotes soft, luxurious self‑indulgence; “indulgence” captures
    the moral nuance and fits repeated phrasing.
- source_word: μωρός
  chosen: foolish
  alternatives:
  - senseless
  - stupid
  lexicon: BDAG
  rationale: “Foolish” is the standard moral term and matches Hermas’s register.
- source_word: δοῦλοι τοῦ Θεοῦ
  chosen: slaves of God
  alternatives:
  - servants of God
  - bondservants of God
  lexicon: BDAG
  rationale: Following project policy, “slave” is used where ownership/service is
    theologically salient; Hermas emphasizes belonging to God over against sinful
    masters.
- source_word: πονήραι ἐπιθυμίαι
  chosen: evil desires
  alternatives:
  - wicked cravings
  - bad desires
  lexicon: BDAG
  rationale: “Evil desires” is transparent and preserves moral weight.
- source_word: θανατώδεις
  chosen: death‑dealing
  alternatives:
  - deadly
  - lethal
  lexicon: LSJ
  rationale: The vivid compound emphasizes that such desires inflict death; “death‑dealing”
    keeps the sharpness.
- source_word: διάβολος
  chosen: the devil
  alternatives:
  - the slanderer
  - the accuser
  lexicon: BDAG
  rationale: In early Christian usage διάβολος functions as a proper designation;
    “the devil” communicates this idiomatically.
- source_word: ἀπέχεσθαι
  chosen: abstain
  alternatives:
  - keep away from
  - refrain
  lexicon: BDAG
  rationale: “Abstain” is the standard moral term for avoidance of vices and fits
    Hermas’s exhortational style.
- source_word: ζήσητε τῷ Θεῷ
  chosen: live to God
  alternatives:
  - live for God
  - live unto God
  lexicon: BDAG
  rationale: The dative expresses orientation/relationship; “to God” preserves the
    ancient idiom while remaining intelligible.
- source_word: κατακυριεύω
  chosen: overmaster
  alternatives:
  - dominate
  - gain mastery over
  lexicon: BDAG / LSJ
  rationale: 'Passive sense here: to be mastered by. “Overmastered” captures being
    brought under power without awkwardness.'
- source_word: ἀνθίστημι
  chosen: stand against
  alternatives:
  - resist
  lexicon: BDAG
  rationale: Hermas repeats the imagery of standing/opposing; “stand against” keeps
    the combat metaphor alongside “armed.”
- source_word: ἀποθανοῦνται εἰς τέλος
  chosen: die utterly
  alternatives:
  - die in the end
  - die completely
  lexicon: BDAG
  rationale: εἰς τέλος intensifies finality; “utterly” communicates completeness without
    adding interpretation.
- source_word: ἔνδυσαι
  chosen: put on
  alternatives:
  - clothe yourself with
  lexicon: BDAG
  rationale: Retains the clothing metaphor common in moral exhortation.
- source_word: δικαιοσύνη
  chosen: righteousness
  alternatives:
  - justice
  lexicon: BDAG
  rationale: Project default retains “righteousness” in non‑forensic exhortation contexts.
- source_word: καθοπλίζω
  chosen: arm (yourself)
  alternatives:
  - equip with arms
  lexicon: LSJ
  rationale: The middle participle stresses self‑arming; “arm yourself” aligns with
    the martial imagery of weapons and fleeing enemies.
- source_word: φόβος τοῦ Κυρίου/Θεοῦ
  chosen: fear of the Lord/God
  alternatives:
  - reverence for the Lord/God
  lexicon: BDAG
  rationale: “Fear” preserves the moral seriousness and covenantal idiom; softening
    to “reverence” would blunt the exhortation.
- source_word: κατοικέω
  chosen: dwell
  alternatives:
  - reside
  lexicon: BDAG
  rationale: “Dwell” retains the dwelling metaphor and weight of presence.
- source_word: φεύγω… μακράν
  chosen: flee far away
  alternatives:
  - flee far from you
  lexicon: BDAG
  rationale: Explicitly renders both motion and distance implied by μακράν.
- source_word: ὅπλα
  chosen: weapons
  alternatives:
  - arms
  - armor
  lexicon: LSJ
  rationale: “Weapons” matches the active combat scene (arming, fleeing), whereas
    “armor” would shift the image.
- source_word: στεφανωθεὶς κατ’ αὐτῆς
  chosen: having been crowned in your contest against it
  alternatives:
  - having been crowned over it
  - having received the victor’s wreath against it
  lexicon: LSJ
  rationale: The participle evokes athletic victory and wreath; the added “in your
    contest” clarifies κατ’ αὐτῆς as adversative without adding new concepts.
- source_word: νῖκος
  chosen: victory
  alternatives:
  - win
  - conquest
  lexicon: LSJ
  rationale: Neuter form of ‘victory’ attested in Koine; retaining “victory” keeps
    the athletic/contest imagery.
- source_word: παραδούς
  chosen: handing (over)
  alternatives:
  - entrusting
  - delivering
  lexicon: BDAG
  rationale: “Handing over” is concrete and fits the image of transferring the wreath/win
    to the good desire’s service.
- source_word: δουλεύω
  chosen: serve
  alternatives:
  - be a slave to
  lexicon: BDAG
  rationale: While the verb can carry slavery nuance, here it balances the previous
    “slaves of God” without overloading the phrase; footnoted alternative noted in
    text.
- source_word: ὑποτάσσομαι/ὑποτάσσω
  chosen: submit/subject
  alternatives:
  - be subject/subdue
  lexicon: BDAG
  rationale: 'Keeps the contrast: submit to the good desire; subject the evil desire.'
- source_word: κατακυριεῦσαι… ὑποτάξαι
  chosen: to master … to subject
  alternatives:
  - to gain dominion over … to subdue
  lexicon: BDAG / LSJ
  rationale: “Master/subject” render the different but related verbs without redundancy.
- source_word: καθὼς βούλει
  chosen: as you wish
  alternatives:
  - as you please
  lexicon: BDAG
  rationale: Simple idiomatic English for volition; avoids casual tone of “please.”
