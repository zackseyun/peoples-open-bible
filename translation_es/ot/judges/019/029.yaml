  to: Cuando entró en su casa, tomó el cuchillo, agarró a su concubina y la cortó, miembro por miembro[a], en doce pedazos, y la envió por todo el territorio de Israel.
  rationale: La revisión restituye en el texto principal el matiz de לַעֲצָמֶיהָ con «miembro por miembro», en línea con la evidencia hebrea y el POB inglés, mientras mantiene una nota con la literalidad «según sus huesos». También cambia «se apoderó de» por «agarró a», que suena más físico y directo para חזק con ב. No se requiere adjudicación adicional.
