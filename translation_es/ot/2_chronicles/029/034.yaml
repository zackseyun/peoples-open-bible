    rationale: En la auditoría inglesa, la nota b explica יִשְׁרֵי לֵבָב («more upright in heart / more wholehearted»), no יִתְקַדְּשׁוּ («had consecrated themselves»). Mantenerla sobre «se consagraron» altera la documentación léxica del versículo.
  - severity: low
    issue: «los sostuvieron» es menos idiomático que «los apoyaron» en este contexto
    rationale: Aunque es defendible, el contexto describe ayuda práctica en una tarea ritual. «Los apoyaron» suena más natural y coincide mejor con la revisión inglesa final.
