revisions:
- from: De las primicias de vuestra masa daréis a Yahvé una contribución[a] por todas vuestras generaciones[b].
  to: De la primera parte de su masa[a] darán a Yahvé una contribución[b] por todas sus generaciones.
  rationale: Se ajusta «primicias» a «la primera parte» para reflejar mejor el valor partitivo de מֵרֵאשִׁית en relación con la masa. Se reemplaza la nota sobre «generaciones» por la nota léxica correspondiente a תְּרוּמָה, siguiendo el audit trail inglés. También se normaliza el registro a «su/sus» para un español latinoamericano más neutral sin pérdida de dignidad ni fidelidad.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:31:14Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido básico del hebreo: una porción inicial de la masa debe darse a Yahvé como contribución de manera permanente por generaciones. También acierta al usar «Yahvé» para יהוה y «masa» para עֲרִסֹתֵיכֶם. Sin embargo, no preserva de forma óptima la estructura partitiva de מֵרֵאשִׁית + עֲרִסֹתֵיכֶם: «De las primicias de vuestra masa» suena más interpretativo y eclesiástico que el más directo «De la primera parte de vuestra masa» o equivalente. Además, la nota [b] no corresponde al tipo de nota preservado por el English POB, que allí documenta alternativas para תְּרוּמָה, no para לְדֹרֹתֵיכֶם.'
  spanish_quality_summary: El español es claro y digno, pero «vuestra/vuestras» empuja el registro hacia un castellano peninsular/litúrgico menos neutral para el objetivo latinoamericano amplio. «Por todas vuestras generaciones» es inteligible, aunque «a través de sus generaciones» o «por todas sus generaciones» resulta más natural en registro bíblico neutral. La frase principal mejora con una formulación menos cargada que «primicias» en este contexto singular de masa.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יהוה → «Yahvé» correctamente; תְּרוּמָה → «contribución» es aceptable; עֲרִסָה → «masa» está bien con nota alternativa sobre el recipiente. El principal ajuste es evitar que «primicias» sobreinterprete רֵאשִׁית aquí frente al audit trail inglés «From the first of». También debe restaurarse la nota léxica sobre «contribución/ofrenda/ofrenda alzada».'
  issues:
  - severity: medium
    issue: «Primicias» sobreinterpreta מֵרֵאשִׁית en esta construcción
    rationale: Aunque puede funcionar en contexto cultual, el hebreo expresa más literalmente la primera parte/porción de la masa. «Primicias» introduce una etiqueta técnica más fuerte que la del source trail y puede sonar menos precisa al ir con «masa».
  - severity: medium
    issue: La nota [b] documenta el elemento equivocado
    rationale: El English POB conserva una nota alternativa para תְּרוּמָה («contribution / offering / heave offering»), no para לְדֹרֹתֵיכֶם. En revisión conviene alinear las notas con el audit trail fuente.
  - severity: low
    issue: Registro pronominal menos neutral para español latinoamericano amplio
    rationale: «Vuestra/vuestras» no es incorrecto, pero «su/sus» encaja mejor con el objetivo de español neutral y mantiene dignidad bíblica sin sabor regional marcado.
  revised_spanish_text: De la primera parte de su masa[a] darán a Yahvé una contribución[b] por todas sus generaciones.
  revised_footnotes:
  - marker: a
    text: O «sus artesas»; el hebreo puede referirse a la masa o, por asociación, al recipiente de amasado.
    reason: lexical_alternative
  - marker: b
