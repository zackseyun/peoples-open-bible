lexical_decisions:
- source_word: שַׁמָּה
  english_pob_choice: appalling thing
  chosen_spanish: espantosa cosa
  alternatives_spanish:
  - horror
  - desolación
  - asombro
  lexicon: HALOT
  rationale: El sustantivo expresa algo que causa horror o asombro consternado. En español, 'espantosa' comunica bien el impacto emocional y mantiene el valor de choque sin convertirlo en una simple abstracción.
- source_word: וְשַׁעֲרוּרָה
  english_pob_choice: horrible thing
  chosen_spanish: horrenda
  alternatives_spanish:
  - horrible
  - espantable
  - dreadful
  lexicon: HALOT
  rationale: El término intensifica el anterior con un matiz de lo monstruoso o repulsivo. 'Horrenda' conserva esa fuerza en español actual y funciona naturalmente en la coordinación con 'espantosa'.
- source_word: נִהְיְתָה
  english_pob_choice: has happened
  chosen_spanish: ha sucedido
  alternatives_spanish:
  - ha acontecido
  - ha ocurrido
  - ha llegado a ser
  lexicon: HALOT
  rationale: El verbo indica que tal estado o evento ha llegado a existir. 'Ha sucedido' transmite el sentido perfectivo de un hecho que se ha producido, sin caer en un giro demasiado literal.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la tierra de Judá
  - en el territorio
  lexicon: HALOT
  rationale: Aunque 'la tierra' puede referirse al país o territorio del pacto, en español bíblico 'en la tierra' reproduce bien el alcance profético y evita estrechar indebidamente el referente.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y coincide con la lectura auditada en inglés: un par de sustantivos intensivos coordinados y un perfecto que presenta el hecho como ya ocurrido en la tierra. No se detectan variantes textuales o tensiones teológicas adicionales en este versículo.'
  spanish_consistency_notes:
  - Se mantuvo 'la tierra' para הארץ por ser la equivalencia bíblica más directa y natural en este contexto.
  - Se evitó una paráfrasis que suavizara la doble intensificación del hebreo.
  - El registro es sobrio y publicable, con una sintaxis breve que refleja la sentencia del original.
