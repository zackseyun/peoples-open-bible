    issue: «la casa de la prisión» es un calco poco natural
    rationale: Aunque intenta conservar בֵּית הַכְּלִיא, en español suena forzado y menos legible. «Casa de confinamiento» preserva mejor la concreción hebrea con español más natural.
  - severity: low
