  text: Then the king said to him[a], “Ask for whatever you want beyond what has been written, and we will give it to you, because you have been found wiser; and you shall sit next to me[c][b], and you shall be called my kinsman.”
  footnotes:
  - marker: a
    text: Or “more than what has been written,” likely referring to what had already been recorded or promised.
    reason: lexical_alternative
  - marker: b
    text: Or “you shall sit beside me.” The Greek expression denotes nearness, likely in rank or honor at court.
    reason: lexical_alternative
  - marker: c
    text: Or “my relative” or “my kin.” The term can function as an honorific of close royal favor, not necessarily a statement of literal blood relation.
    reason: alternative_reading
