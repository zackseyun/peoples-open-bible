review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo: la obligación triple anual, el grupo masculino obligado, la comparecencia ante Yahvé en el lugar escogido y la prohibición de presentarse sin ofrenda. También mantiene correctamente «Yahvé» para יְהוָה. Sin embargo, no preserva del todo el rastro de auditoría del inglés POB en las notas: falta la nota léxica sobre el valor pasivo/reflexivo de יֵרָאֶה y la nota cultural sobre «empty-handed», mientras se añade una nota teológica sobre Yahvé no necesaria aquí.'
  spanish_quality_summary: El español es claro y digno, pero requiere pequeños ajustes de naturalidad y consistencia. «No se presentarán» con sujeto previo «todos tus varones» funciona, pero «ninguno se presentará» o «nadie se presentará» expresa mejor el singular impersonal hebreo y suena más natural tras el cambio de cláusula. También conviene conservar en nota la alternativa tradicional y la explicación cultural donde el inglés ya las documentó.
  glossary_alignment: 'Buena alineación global con el glosario del proyecto: יְהוָה → «Yahvé» correcto; nombres festivos transparentes y fieles; mantenimiento del masculino legal en «todos tus varones». La elección «Cabañas» para סֻכּוֹת es defendible, aunque «Tabernáculos» debe mantenerse en nota como alternativa tradicional. Se debe reintroducir la nota sobre el matiz de יֵרָאֶה y la de «con las manos vacías».'
  issues:
  - severity: medium
    issue: Falta la nota léxica sobre יֵרָאֶה
    rationale: 'El inglés POB conserva una nota importante: el verbo hebreo es literalmente pasivo/reflexivo («ser visto»), aunque funciona idiomáticamente como «presentarse/comparecer». El borrador español omite esta información auditada.'
  - severity: medium
    issue: Falta la nota cultural sobre «empty-handed»
    rationale: El inglés POB explica que «empty-handed» significa venir sin el don u ofrenda requerida. El español usa bien «con las manos vacías», pero no preserva la aclaración contextual.
  - severity: low
    issue: La nota sobre «Yahvé» es redundante en este versículo
    rationale: La decisión doctrinal es correcta, pero aquí no hace falta una nota adicional si no resuelve una ambigüedad textual. Conviene priorizar las notas ya justificadas por el POB inglés.
  - severity: low
    issue: La cláusula final puede sonar más natural en singular impersonal
    rationale: «No se presentarán ante Yahvé con las manos vacías» es comprensible, pero «Ninguno se presentará…» reproduce mejor el giro hebreo y evita que la negación plural suene algo rígida en español bíblico moderno.
  revised_spanish_text: 'Tres veces al año todos tus varones se presentarán[a] ante Yahvé tu Dios, en el lugar que él escoja: en la fiesta de los Panes sin Levadura, en la fiesta de las Semanas y en la fiesta de las Cabañas[b]. Ninguno se presentará ante Yahvé con las manos vacías[c].'
  revised_footnotes:
  - marker: a
    text: O «será visto ante Yahvé»; el verbo hebreo es literalmente pasivo/reflexivo, pero en este contexto funciona como el modismo de presentarse ante Dios.
    reason: lexical_alternative
  - marker: b
    text: «La fiesta de las Cabañas» se traduce tradicionalmente «la fiesta de los Tabernáculos».
    reason: alternative_reading
  - marker: c
    text: «Con las manos vacías» significa venir sin el don u ofrenda requeridos.
    reason: cultural_note
  revision_rationale: 'Se hicieron reparaciones pequeñas para alinear mejor el español con la evidencia fuente y con las notas del POB inglés: se restauró la nota léxica sobre יֵרָאֶה, se añadió la nota cultural sobre «con las manos vacías», se mantuvo la alternativa tradicional para סֻכּוֹת y se suavizó la cláusula final a un singular impersonal más natural en español.'
