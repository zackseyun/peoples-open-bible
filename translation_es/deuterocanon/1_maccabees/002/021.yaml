translation:
  language: es
  text: ¡Lejos esté de nosotros abandonar la ley y las ordenanzas![a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Lejos de la misericordia para nosotros, abandonar la ley y las ordenanzas»; el griego usa un idiomatismo que expresa un rechazo fuerte: «lejos esté de nosotros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵλεως
  english_pob_choice: Far be it from us
  chosen_spanish: ¡Lejos de nosotros!
  alternatives_spanish:
  - ¡Dios nos libre!
  - ¡Que tal no nos suceda!
  lexicon: LSJ
  rationale: El griego funciona idiomáticamente como una fuerte repulsión de la acción, no como una simple petición de misericordia. En español, «¡Lejos de nosotros!» reproduce bien esa fuerza negativa y mantiene el tono de rechazo enfático.
- source_word: ἡμῖν
  english_pob_choice: from us
  chosen_spanish: de nosotros
  alternatives_spanish:
  - para nosotros
  - a nosotros
  lexicon: LSJ
  rationale: Aunque el dativo es formalmente «para / a nosotros», dentro de la construcción idiomática el sentido es de rechazo respecto de nosotros mismos. «De nosotros» conserva la naturalidad del español en la expresión idiomática.
- source_word: καταλεῖπειν
  english_pob_choice: to abandon
  chosen_spanish: abandonar
  alternatives_spanish:
  - dejar
  - desertar
  - dejar atrás
  lexicon: LSJ
  rationale: «Abandonar» comunica bien la idea de deserción deliberada de una obligación pactal. Es más fuerte y preciso que «dejar», y evita suavizar el matiz ético.
- source_word: νόμον
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  - la ley de Yahvé
  - la instrucción
  lexicon: LSJ
  rationale: En este contexto judío, el término remite a la norma revelada y conocida por el pueblo. «La ley» es claro y natural en español; la mayúscula no es necesaria aquí porque el referente ya está definido por el contexto.
- source_word: δικαιώματα
  english_pob_choice: the ordinances
  chosen_spanish: los decretos
  alternatives_spanish:
  - los estatutos
  - las ordenanzas
  - los preceptos
  lexicon: LSJ
  rationale: El término puede abarcar estatutos u ordenanzas prescritas. «Decretos» conserva el carácter de disposiciones obligatorias y empareja bien con «la ley» sin sobreespecificar su clase jurídica.
theological_decisions:
- issue: Fidelidad pactal a la ley ancestral
  english_pob_reading: Rendered as 'the law and the ordinances' to preserve reference to Israel's covenantal legal tradition.
  chosen_spanish_reading: «la ley y los decretos» mantiene la referencia a la tradición legal pactal de Israel.
  alternative_spanish_readings:
  - la ley y los estatutos
  - la ley y las ordenanzas
  - la ley y los preceptos
  rationale: La afirmación expresa rechazo a la apostasía y compromiso con la obediencia a la instrucción recibida. «Decretos» conserva la idea de mandatos vinculantes sin introducir categorías doctrinales ajenas al pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: Valor del idiomatismo ἵλεως ἡμῖν
  english_pob_reading: '''Far be it from us'' with a footnote noting the underlying Greek idiom.'
  chosen_spanish_reading: «¡Lejos de nosotros!» transmite el mismo rechazo idiomático enfático.
  alternative_spanish_readings:
  - ¡Dios nos libre de ello!
  - ¡Nunca haríamos tal cosa!
  rationale: La frase no debe rebajarse a una mera solicitud de gracia. El español elegido conserva la fuerza retórica de la construcción griega y deja visible la tensión entre literalidad y idiomatismo mediante la nota.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
translation_notes:
  revision_awareness: 'Coincide con la última revisión disponible: no se registraron cambios necesarios y el control de concordancia indicó alta coincidencia con observaciones menores בלבד.'
  spanish_consistency_notes:
  - Se mantuvo «la ley» en minúscula por tratarse aquí de un referente contextual, no de una forma litúrgica fija.
  - «Decretos» evita introducir «ordenanzas» si en el registro español del proyecto se prefiere una equivalencia más directa y solemne para δικαιώματα.
  - La exclamación inicial refuerza el tono del idiomatismo griego sin añadir contenido no sustentado por el texto.
