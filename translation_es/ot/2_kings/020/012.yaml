translation:
  language: es
  text: En aquel tiempo Merodac-baladán[a], hijo de Baladán, rey de Babilonia, envió cartas y un regalo a Ezequías, porque había oído que Ezequías había estado enfermo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Berodac-baladán». Muchos traductores prefieren «Merodac-baladán», probablemente por una forma variante conservada en Isaías 39:1 y por la tradición antigua.'
    reason: alternative_reading
lexical_decisions:
- source_word: בָּעֵת הַהִיא
  english_pob_choice: At that time
  chosen_spanish: En aquel tiempo
  alternatives_spanish:
  - En ese tiempo
  - Entonces
  lexicon: HALOT
  rationale: La expresión temporal introduce el marco narrativo sin añadir precisión innecesaria. «En aquel tiempo» conserva la neutralidad y la fluidez del inglés POB, con un tono natural en español bíblico contemporáneo.
- source_word: שָׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El verbo básico de envío se expresa con «envió», que funciona bien en un contexto diplomático y evita un matiz más fuerte o administrativo que «mandó» o «despachó».
- source_word: בְּרֹאדַךְ בַּלְאֲדָן
  english_pob_choice: Merodach-baladan
  chosen_spanish: Merodac-baladán
  alternatives_spanish:
  - Berodac-baladán
  - Merodac-Baladán
  lexicon: HALOT
  rationale: Se preserva el nombre propio con transliteración española. «Merodac-baladán» sigue la convención castellana y refleja la variante tradicional asociada al paralelo de Isaías 39:1, mientras que el consonantismo hebreo admite la forma alternativa señalada en la nota.
- source_word: בֶּן בַּלְאֲדָן
  english_pob_choice: son of Baladan
  chosen_spanish: hijo de Baladán
  alternatives_spanish:
  - descendiente de Baladán
  lexicon: HALOT
  rationale: La relación patronímica se expresa directamente con «hijo de», que es la equivalencia formal y más transparente en español.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: king of Babylon
  chosen_spanish: rey de Babilonia
  alternatives_spanish:
  - monarca de Babilonia
  lexicon: HALOT
  rationale: La cadena constructa indica oficio y reino; «rey de Babilonia» es la forma natural y exacta en español.
- source_word: סְפָרִים
  english_pob_choice: letters
  chosen_spanish: cartas
  alternatives_spanish:
  - documentos
  - escritos
  lexicon: HALOT
  rationale: En un intercambio diplomático, el sentido más probable es correspondencia escrita. «Cartas» es el equivalente más claro y directo en español.
- source_word: וּמִנְחָה
  english_pob_choice: and a gift
  chosen_spanish: y un regalo
  alternatives_spanish:
  - y un presente
  - y un tributo
  lexicon: HALOT
  rationale: Aquí מִנְחָה puede ser «regalo», «presente» o «tributo». Se elige «regalo» porque el contexto inmediato presenta un envío diplomático sin obligar al lector a decidir todavía por el matiz tributario.
- source_word: אֶל חִזְקִיָּהוּ
  english_pob_choice: to Hezekiah
  chosen_spanish: a Ezequías
  alternatives_spanish:
  - para Ezequías
  lexicon: HALOT
  rationale: La preposición marca destinatario; «a Ezequías» es la solución española más simple y fiel.
- source_word: כִּי שָׁמַע
  english_pob_choice: because he had heard
  chosen_spanish: porque había oído
  alternatives_spanish:
  - pues había oído
  - ya que había oído
  lexicon: HALOT
  rationale: La primera כִּי introduce la causa del envío. «Había oído» reproduce bien la anterioridad respecto del acto de enviar y suena natural en español.
- source_word: כִּי חָלָה חִזְקִיָּהוּ
  english_pob_choice: that Hezekiah had been sick
  chosen_spanish: que Ezequías había estado enfermo
  alternatives_spanish:
  - que Ezequías estaba enfermo
  - que Ezequías había enfermado
  lexicon: HALOT
  rationale: La segunda כִּי introduce el contenido de lo oído. «Había estado enfermo» conserva la referencia a una enfermedad previa ya superada o al menos ya conocida, sin forzar una lectura puntual que el hebreo no exige.
translation_notes:
  revision_awareness: Se siguió de cerca el paquete fuente hebreo y el auditor inglés. La única tensión importante es el nombre propio בְּרֹאדַךְ/בְּרוֹדַךְ, donde el texto masorético y la tradición paralela de Isaías permiten una doble forma; se conserva la forma habitual en español y se documenta la variante textual en nota.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se mantuvo «Ezequías» para חִזְקִיָּהוּ conforme al uso bíblico estándar en español.
  - Se evitó «señor» u այլ equivalentes no pertinentes para no desplazar el sentido del texto.
  - «Cartas» y «regalo» siguen el marco diplomático del contexto sin añadir interpretación de tributo.
