translation:
  language: es
  text: Como un adorno de oro engastado con ónice y zafiro[c][b][a], así son las palabras bellas en un banquete de vino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término hebreo para la piedra aquí es incierto; otras identificaciones han sido propuestas.
    reason: lexical_alternative
  - marker: b
    text: La piedra llamada «zafiro» en textos antiguos puede no corresponder exactamente al zafiro moderno; algunos la identifican con lapislázuli.
    reason: lexical_alternative
  - marker: c
    text: La fuente griega paralela suministrada para este versículo no coincide con el hebreo y parece reflejar otra alineación textual.
    reason: textual_variant
lexical_decisions:
- source_word: כרביד
  english_pob_choice: Like a gold ornament
  chosen_spanish: Como un adorno de oro
  alternatives_spanish:
  - Como un collar de oro
  - Como una cadena de oro
  lexicon: HALOT
  rationale: רביד puede referirse a un adorno o collar llevado al cuello. «Adorno» conserva la imagen de un objeto ornamental sin fijar más de lo que el hebreo exige; el כ comparativo se refleja con «Como».
- source_word: נפך
  english_pob_choice: onyx
  chosen_spanish: ónice
  alternatives_spanish:
  - cornalina
  - granate
  - turquesa
  lexicon: HALOT
  rationale: La identificación exacta del mineral es incierta en el hebreo antiguo. «Ónice» mantiene una designación tradicional y natural en español, mientras la incertidumbre se preserva en la nota.
- source_word: ספיר
  english_pob_choice: sapphire
  chosen_spanish: zafiro
  alternatives_spanish:
  - lapislázuli
  lexicon: HALOT
  rationale: ספיר suele traducirse de forma convencional como «zafiro». Aunque la piedra antigua quizá no corresponda exactamente al zafiro moderno, el término es claro en español y la posible diferencia histórico-material queda indicada en nota.
- source_word: כך נאים
  english_pob_choice: so are
  chosen_spanish: así son
  alternatives_spanish:
  - tan adecuadas son
  - tan hermosas son
  lexicon: HALOT
  rationale: La comparación expresa adecuación y belleza. «Así son» conserva la concisión del paralelo comparativo y deja que el resto de la frase complete la valoración estética.
- source_word: דברים יפים
  english_pob_choice: beautiful words
  chosen_spanish: las palabras hermosas
  alternatives_spanish:
  - las palabras agradables
  - las palabras finas
  - las palabras graciosas
  lexicon: HALOT
  rationale: El hebreo describe la excelencia o atractivo de lo dicho. «Palabras hermosas» reproduce mejor la comparación con joyas que alternativas más débiles como «agradables».
- source_word: על משתה היין
  english_pob_choice: at a banquet of wine
  chosen_spanish: en un banquete de vino
  alternatives_spanish:
  - en un festín de vino
  - durante una fiesta de vino
  - en un banquete con vino
  lexicon: HALOT
  rationale: משתה היין designa un banquete caracterizado por el vino. «En un banquete de vino» conserva el sustantivo concreto y su matiz social festivo en un español natural.
theological_decisions:
- issue: 'Alcance textual: hebreo de Ben Sira frente al paralelo griego suministrado'
  english_pob_reading: Translate from the Hebrew Ben Sira witness for this verse, with the Greek kept in view as a consistency check but not followed here.
  chosen_spanish_reading: Traducir el testimonio hebreo de Ben Sira para este versículo, manteniendo el griego como control de coherencia, pero sin seguirlo aquí.
  alternative_spanish_readings:
  - Seguir el texto griego del paralelo
  - Fusionar ambos testimonios en una sola redacción
  rationale: El hebreo de este versículo es coherente y de alta confianza; el griego suministrado corresponde semánticamente a otra tradición o a una alineación distinta. Según la filosofía del proyecto para Sirácides, el hebreo superviviente tiene prioridad cuando está disponible.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirácides desde el hebreo donde se conserva; usar el griego en paralelo'
- issue: 'Imagen sapiencial: comparación ornamental aplicada al habla'
  english_pob_reading: Like a gold ornament set with onyx and sapphire, so are beautiful words at a banquet of wine.
  chosen_spanish_reading: Como un adorno de oro con ónice y zafiro, así son las palabras hermosas en un banquete de vino.
  alternative_spanish_readings:
  - Como un collar de oro con ónice y zafiro, así son las palabras hermosas en un banquete de vino.
  - Como un adorno de oro engastado con ónice y zafiro, así son las palabras hermosas en un banquete de vino.
  rationale: La comparación sapiencial une belleza material y belleza verbal. «Adorno de oro» transmite la imagen sin añadir una precisión material no segura; «palabras hermosas» mantiene la correspondencia estética con las joyas.
  doctrine_reference: La sabiduría bíblica usa imágenes concretas para valorar el discurso sin convertirlo en alegoría excesiva
translation_notes:
  revision_awareness: Se respetó la lectura hebrea de alta confianza para Sirácides 32:5 y se mantuvo el paralelo griego solo como verificación externa. La redacción española sigue la imagen de joyería y el símil sapiencial sin introducir una paráfrasis interpretativa amplia.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque este versículo no contiene el Tetragrámaton ni una referencia directa a יהוה.
  - Se mantuvo el orden retórico simétrico del símil para preservar el paralelismo.
  - «Ónice» y «zafiro» se eligieron como equivalentes españoles naturales, dejando la incertidumbre mineral en nota.
  - El registro es formal y literario, pero con sintaxis moderna y clara para lectura eclesial.
