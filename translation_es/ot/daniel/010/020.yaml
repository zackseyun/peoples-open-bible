translation:
  language: es
  text: 'Entonces dijo: «¿Sabes por qué he venido a ti? Y ahora volveré a combatir contra el príncipe[a] de Persia; y cuando salga[b], he aquí, el príncipe[c] de Grecia[d] viene».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Príncipe» aquí probablemente se refiere a un gobernante sobrenatural asociado con una nación, aunque este versículo no lo identifica explícitamente como tal.
    reason: alternative_reading
  - marker: b
    text: 'O «y estoy saliendo»; la cláusula hebrea es breve, y el matiz exacto puede ser simple salida o una secuencia temporal: «cuando salga».'
    reason: lexical_alternative
  - marker: c
    text: «Príncipe» aquí probablemente se refiere a un gobernante sobrenatural asociado con una nación, aunque este versículo no lo identifica explícitamente como tal.
    reason: alternative_reading
  - marker: d
    text: Hebreo «Javán», término que comúnmente se refiere a Grecia o al ámbito griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲיָדַעְתָּ
  english_pob_choice: Do you know
  chosen_spanish: ¿Sabes
  alternatives_spanish:
  - ¿Has entendido?
  - ¿Comprendes?
  lexicon: HALOT
  rationale: La forma interrogativa con ידע pregunta si el interlocutor sabe o entiende la razón de la llegada. «Sabes» es natural en español moderno y conserva el sentido directo de conocimiento/comprensión.
- source_word: לָמָּה
  english_pob_choice: why
  chosen_spanish: por qué
  alternatives_spanish:
  - con qué fin
  - para qué razón
  lexicon: HALOT
  rationale: Es la interrogativa estándar de causa o razón. «Por qué» es la equivalencia más clara y concisa en español.
- source_word: בָּאתִי אֵלֶיךָ
  english_pob_choice: I have come to you
  chosen_spanish: he venido a ti
  alternatives_spanish:
  - vine a ti
  - he llegado a ti
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una llegada ya cumplida con relevancia presente en el diálogo. «He venido» reproduce bien esa relación temporal y conversacional.
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  - Pues ahora
  lexicon: HALOT
  rationale: La conjunción más adverbio marca transición discursiva. «Y ahora» conserva el enlace con lo anterior y el giro narrativo.
- source_word: אָשׁוּב
  english_pob_choice: I will return
  chosen_spanish: volveré
  alternatives_spanish:
  - regresaré
  - volveré otra vez
  lexicon: HALOT
  rationale: El imperfecto es futuro en este contexto. «Volveré» comunica con naturalidad la acción de regresar al conflicto previo.
- source_word: לְהִלָּחֵם עִם
  english_pob_choice: to fight against
  chosen_spanish: para combatir contra
  alternatives_spanish:
  - para pelear contra
  - para guerrear contra
  lexicon: HALOT
  rationale: El infinitivo de לחם con עִם denota enfrentamiento bélico. «Combatir contra» preserva la fuerza adversarial con un registro digno y claro.
- source_word: שַׂר פָּרָס
  english_pob_choice: the prince of Persia
  chosen_spanish: el príncipe de Persia
  alternatives_spanish:
  - el soberano de Persia
  - el jefe de Persia
  lexicon: HALOT
  rationale: שַׂר puede ser «príncipe», «jefe» u «oficial». Aquí se conserva «príncipe» para mantener el término tradicional del pasaje sin resolver la identidad del ser, que el contexto sugiere pero no explicita en este versículo.
- source_word: וַאֲנִי יוֹצֵא
  english_pob_choice: when I go out
  chosen_spanish: y cuando salga
  alternatives_spanish:
  - y yo salgo
  - y al salir
  lexicon: HALOT
  rationale: La cláusula hebrea es breve y admite matiz temporal. «Y cuando salga» refleja bien la secuencia antes de la siguiente cláusula y evita una coordinación torpe en español.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - he aquí
  - mira, pues
  lexicon: HALOT
  rationale: La partícula introduce un anuncio enfático. «Mira» comunica la llamada de atención en español actual; se mantiene la intensidad sin una fórmula arcaica innecesaria.
- source_word: שַׂר יָוָן
  english_pob_choice: the prince of Greece
  chosen_spanish: el príncipe de Grecia
  alternatives_spanish:
  - el príncipe de Javán
  lexicon: HALOT
  rationale: יָוָן designa a Grecia o el ámbito griego. «Grecia» es más transparente para el lector moderno, mientras que «Javán» quedaría menos claro en el texto principal.
- source_word: בָּא
  english_pob_choice: is coming
  chosen_spanish: viene
  alternatives_spanish:
  - está viniendo
  - se acerca
  lexicon: HALOT
  rationale: La forma participial expresa acción en curso o inminencia. «Viene» es la equivalencia más natural y suficientemente dinámica en español.
theological_decisions:
- issue: Identidad de los 'príncipes' de Persia y de Grecia
  english_pob_reading: Retain 'prince' in the main text without specifying 'angelic' or 'demonic.'
  chosen_spanish_reading: Mantener «príncipe» en el texto principal sin aclarar si se trata de un ser angelical, demoníaco o humano.
  alternative_spanish_readings:
  - príncipe territorial sobrenatural
  - gobernante político
  rationale: El contexto amplio sugiere seres sobrenaturales, pero el hebreo de este versículo no lo declara explícitamente. Conservar «príncipe» preserva la tensión teológica y evita imponer una interpretación no expresada en el texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No hubo revisiones aplicadas en el pasaje base; la auditoría final indicó alto acuerdo y sin cambios necesarios.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conservó «príncipe» para שַׂר, conforme a la decisión auditada, sin sustituirlo por «jefe» o «gobernante» en el texto principal.
  - Se eligió un español natural pero reverente, evitando calcos excesivos y manteniendo la secuencia narrativa del hebreo.
