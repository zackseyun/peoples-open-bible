translation:
  language: es
  text: Así ejecutaré juicios[a] sobre Egipto, y sabrán que yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre». El hebreo usa una preposición locativa; en español, el sentido de juicio punitivo puede expresarse naturalmente así.
    reason: alternative_reading
lexical_decisions:
- source_word: וְעָשִׂיתִי
  english_pob_choice: Thus I will execute
  chosen_spanish: Así ejecutaré
  alternatives_spanish:
  - Y ejecutaré
  - Y haré
  lexicon: HALOT
  rationale: El verbo hacer con objeto judicial en este contexto profético expresa la idea de ejecutar o llevar a cabo actos de juicio. «Así» comunica la transición consecuente que el inglés POB marcó con «Thus», sin convertir el texto en una mera suma coordinada.
- source_word: שְׁפָטִים
  english_pob_choice: judgments
  chosen_spanish: juicios
  alternatives_spanish:
  - actos de juicio
  - sentencias
  lexicon: HALOT
  rationale: «Juicios» conserva el valor formal y profético del plural hebreo para actos judiciales/divinos. «Sentencias» sonaría más estrecho y «actos de juicio» es más explicativo de lo que el hebreo requiere.
- source_word: בְּמִצְרָיִם
  english_pob_choice: on Egypt
  chosen_spanish: sobre Egipto
  alternatives_spanish:
  - en Egipto
  - contra Egipto
  lexicon: HALOT
  rationale: El hebreo dice literalmente «en Egipto», pero en español el matiz de acción punitiva se expresa con naturalidad mediante «sobre Egipto», manteniendo el objeto de la acción divina sin perder el sentido locativo de fondo.
- source_word: וְיָדְעוּ
  english_pob_choice: and they will know
  chosen_spanish: y sabrán
  alternatives_spanish:
  - y conocerán
  - entonces sabrán
  lexicon: HALOT
  rationale: «Sabrán» preserva la fórmula característica de Ezequiel para el conocimiento revelador y judicial, más fuerte y más bíblica que «se darán cuenta» o «reconocerán».
- source_word: כִּי אֲנִי יְהוָה
  english_pob_choice: that I am Yahweh
  chosen_spanish: que yo soy Yahvé
  alternatives_spanish:
  - que yo soy el SEÑOR
  - que yo soy Yahvé
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para יְהוָה: «Yahvé» en el texto principal. La construcción «yo soy» conserva la fórmula de reconocimiento. No se usa «SEÑOR» porque el objetivo es transparentar el nombre divino del original.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh in the main text, with a note about the Hebrew divine name
  chosen_spanish_reading: Yahvé en el texto principal
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo contiene explícitamente el tetragrámaton. En español, el proyecto adopta «Yahvé» como forma transparente y consistente para el nombre divino, evitando el reemplazo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado y quedó sin cambios en el último pase; la presente redacción española sigue esa lectura estable, trasladando sus decisiones léxicas al español con el ajuste necesario para la naturalidad idiomática.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se conserva el paralelismo profético de juicio + conocimiento, frecuente en Ezequiel.
  - «Juicios» y no «justicia» preserva el matiz punitivo/judicial del plural hebreo en este contexto.
