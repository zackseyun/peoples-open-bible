translation:
  language: es
  text: Las hormigas son un pueblo sin fuerza, y preparan en el verano su alimento.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «su pan»; aquí «alimento» refleja el sentido más amplio de comida o provisiones, no pan literal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנְּמָלִים
  english_pob_choice: the ants
  chosen_spanish: las hormigas
  alternatives_spanish:
  - hormigas
  lexicon: HALOT
  rationale: El sustantivo definido y plural se refiere a las hormigas como clase. En español, el artículo plural es natural y conserva la referencia genérica con valor definido.
- source_word: עַם
  english_pob_choice: a people
  chosen_spanish: un pueblo
  alternatives_spanish:
  - una gente
  - una nación
  lexicon: HALOT
  rationale: Se conserva la metáfora del hebreo aplicando a las hormigas el lenguaje de un grupo humano. 'Un pueblo' mantiene la imagen y la fuerza formal mejor que reducirlo a 'criaturas'.
- source_word: לֹא עָז
  english_pob_choice: not strong
  chosen_spanish: no fuerte
  alternatives_spanish:
  - sin fuerza
  - no poderoso
  - débil
  lexicon: HALOT
  rationale: La expresión niega el rasgo de fortaleza/mayoría de fuerza. 'No fuerte' sigue de cerca la estructura hebrea y evita cargar el término con una interpretación más valorativa que el texto no exige.
- source_word: וַיָּכִינוּ
  english_pob_choice: they prepare
  chosen_spanish: preparan
  alternatives_spanish:
  - se preparan
  - alistan
  - preparan y almacenan
  lexicon: HALOT
  rationale: El verbo en forma causativa expresa poner en orden o preparar. 'Preparan' es natural en español y conserva el sentido básico sin añadir la idea de almacenar, que sería más interpretativa.
- source_word: בַקַּיִץ
  english_pob_choice: in the summer
  chosen_spanish: en el verano
  alternatives_spanish:
  - durante el verano
  - en la estación del verano
  lexicon: HALOT
  rationale: La preposición con artículo indica tiempo; 'en el verano' es idiomático y transmite bien el marco temporal.
- source_word: לַחְמָם
  english_pob_choice: their food
  chosen_spanish: su alimento
  alternatives_spanish:
  - su comida
  - sus provisiones
  - su pan
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'su pan', aquí el campo semántico es más amplio que pan literal. 'Alimento' conserva la referencia general a provisión/comida, como en el audit trail inglés.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene la metáfora de 'a people' para las hormigas y entiende לַחְמָם como 'their food'. No se detectaron revisiones posteriores ni cambios requeridos; la versión española sigue esas decisiones con una formulación natural y fiel al hebreo.
  spanish_consistency_notes:
  - Se mantuvo 'un pueblo' para conservar la personificación metafórica del hebreo.
  - '''No fuerte'' reproduce la negación simple de עָז sin intensificar a ''débil''.'
  - '''Su alimento'' traduce el valor amplio de לֶחֶם en este contexto sapiencial.'
  - Se evitó 'SEÑOR' o terminología teológica porque el versículo no contiene referencia divina.
