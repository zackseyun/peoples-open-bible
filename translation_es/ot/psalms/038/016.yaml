  text: כִּֽי לְ/ךָ֣ יְהוָ֣ה הוֹחָ֑לְתִּי אַתָּ֥ה תַ֝עֲנֶ֗ה אֲדֹנָ֥/י אֱלֹהָֽ/י־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/038/016.yaml
  text: For I wait for you[a], O Yahweh; you will answer[c][b], O Lord my God.
  footnotes:
  - marker: a
    text: 'Hebrew: ''For to/for you, O LORD, I have waited/hoped.'' The verb can also be rendered ''I have hoped'' or ''I have waited in hope.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'you will respond.' The Hebrew does not state the object explicitly; English may supply 'me' by sense.
    reason: lexical_alternative
  - marker: c
    text: '''LORD'' represents the divine name YHWH; alternatively transliterated ''Yahweh.'''
    reason: alternative_reading
