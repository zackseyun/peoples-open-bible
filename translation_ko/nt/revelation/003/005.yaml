  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὁ νικῶν ⸀οὕτως περιβαλεῖται ἐν ἱματίοις λευκοῖς, καὶ οὐ μὴ ἐξαλείψω τὸ ὄνομα αὐτοῦ ἐκ τῆς βίβλου τῆς ζωῆς, καὶ ὁμολογήσω τὸ ὄνομα αὐτοῦ ἐνώπιον τοῦ πατρός μου καὶ ἐνώπιον τῶν ἀγγέλων αὐτοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/003/005.yaml
  text: 'The one who conquers will thus be clothed in white garments[a], and I will certainly not erase his name from the book of life[d][c][b], and I will confess his name before my Father and before his angels.'
  footnotes:
  - marker: a
    text: Or 'The one who overcomes.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I will never blot out his name from the book of life.' The Greek uses an emphatic negation.
    reason: lexical_alternative
  - marker: c
    text: That is, a heavenly register of those who belong to God and inherit life.
    reason: cultural_note
  - marker: d
    text: 'Or ''I will acknowledge his name.'' Compare Matthew 10:32.'
    reason: cross_reference
translation:
  language: ko
  text: '이기는 자는 이와 같이 흰옷을 입을 것이며, 내가 그의 이름을 생명책[a]에서 결코 지워 버리지 아니할 것이다. 또 내가 내 아버지 앞과 그 천사들 앞에서 그의 이름을 시인하리라.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 곧 하나님께 속하여 생명을 상속받는 자들의 천상의 등록부이다.
    reason: cultural_note
lexical_decisions:
- source_word: βίβλου τῆς ζωῆς
  english_pob_choice: book of life
  chosen_korean: 생명책
  alternatives_korean:
