translation:
  language: es
  text: Y el sexto ángel tocó la trompeta, y oí una sola voz de los cuernos del altar de oro que está delante de Dios,
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ἐσάλπισεν
  english_pob_choice: blew his trumpet
  chosen_spanish: tocó la trompeta
  alternatives_spanish:
  - hizo sonar la trompeta
  - sopló la trompeta
  lexicon: BDAG
  rationale: σάλπιζω significa tocar o hacer sonar una trompeta. En español, «tocó la trompeta» es la forma natural y fiel para este acto litúrgico/apocalíptico, sin añadir información ajena al griego.
- source_word: φωνὴν μίαν
  english_pob_choice: one voice
  chosen_spanish: una voz
  alternatives_spanish:
  - una sola voz
  - una voz única
  lexicon: BDAG
  rationale: El griego subraya la singularidad de la voz. «Una voz» conserva la ambigüedad y la concisión; el matiz de unicidad queda disponible por el contexto y puede explicitarse como alternativa en nota.
- source_word: ἐκ τῶν κεράτων
  english_pob_choice: from the horns
  chosen_spanish: de los cuernos
  alternatives_spanish:
  - desde los cuernos
  - de entre los cuernos
  lexicon: BDAG
  rationale: κέρας aquí se refiere a las protuberancias del altar. «De los cuernos» mantiene la imagen cultual de forma directa en español; «desde» o «de entre» serían opciones interpretativas más explícitas.
- source_word: θυσιαστηρίου τοῦ χρυσοῦ
  english_pob_choice: the golden altar
  chosen_spanish: el altar de oro
  alternatives_spanish:
  - el altar dorado
  lexicon: BDAG
  rationale: La construcción genitiva con adjetivo se vierte de manera transparente como «el altar de oro», preservando la referencia cultual. «Dorado» es posible, pero menos cercano a la forma del griego y algo más descriptivo.
- source_word: τοῦ ἐνώπιον τοῦ θεοῦ
  english_pob_choice: that is before God
  chosen_spanish: que está delante de Dios
  alternatives_spanish:
  - que está en la presencia de Dios
  - que está ante Dios
  lexicon: BDAG
  rationale: ἐνώπιον indica posición delante de o en presencia de alguien. «Que está delante de Dios» es fiel, natural y mantiene el escenario celestial sin resolver más de lo que el texto dice.
- source_word: ἄγγελος
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: BDAG
  rationale: En el contexto visionario de Apocalipsis, ἄγγελος se refiere con claridad a un ser angélico; «ángel» es la equivalencia directa y estándar en español.
theological_decisions:
- issue: Identidad de la voz
  english_pob_reading: Render neutrally as 'one voice' without specifying whether it is God's voice, an angel's voice, or a personified voice from the altar.
  chosen_spanish_reading: Traducir de manera neutral como «una voz» sin identificarla como la voz de Dios, de un ángel o una voz personificada del altar.
  alternative_spanish_readings:
  - la voz de Dios
  - la voz de un ángel
  - una voz asociada con el altar
  rationale: El griego solo afirma que Juan oyó una voz proveniente de los cuernos del altar de oro delante de Dios. La traducción debe conservar esa ambigüedad en lugar de resolverla interpretativamente.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: El borrador sigue el texto griego SBLGNT y el registro auditado en inglés. No se observan revisiones aplicadas en el historial reciente; la versión inglesa quedó sin cambios tras la última pasada.
  spanish_consistency_notes:
  - Se usa «ángel» para ἄγγελος y «Dios» para θεοῦ, conforme a los valores del proyecto.
  - Se evita «SEÑOR» porque aquí no aparece κύριος ni una cita directa del nombre divino.
  - Se mantiene «altar de oro» como equivalencia transparente de τοῦ χρυσοῦ y no se parafrasea como una descripción más libre.
