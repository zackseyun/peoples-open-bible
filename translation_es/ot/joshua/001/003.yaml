translation:
  language: es
  text: Todo lugar donde pise la planta de sus pies[a], se lo he dado, tal como hablé a Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Todo lugar sobre el cual pise la planta de sus pies».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל מָקוֹם
  english_pob_choice: Every place
  chosen_spanish: Todo lugar
  alternatives_spanish:
  - Cada lugar
  - Todo sitio
  lexicon: HALOT
  rationale: 'כָּל con מָקוֹם tiene sentido distributivo: no un solo territorio en bloque, sino cada lugar individualmente. «Todo lugar» conserva ese alcance y suena natural en español bíblico contemporáneo.'
- source_word: אֲשֶׁר
  english_pob_choice: on which
  chosen_spanish: que
  alternatives_spanish:
  - donde
  - en el que
  lexicon: HALOT
  rationale: El relativo introduce la cláusula que modifica «lugar». En español, «que» funciona con naturalidad y permite que la relación espacial quede expresada por el verbo siguiente y por el contexto territorial.
- source_word: תִּדְרֹךְ
  english_pob_choice: treads
  chosen_spanish: pise
  alternatives_spanish:
  - haga pisar
  - ande
  lexicon: HALOT
  rationale: דרך significa ‘pisar, hollar, poner el pie’. «Pise» conserva la imagen concreta del acto de poner el pie sobre la tierra, que es importante en esta promesa territorial.
- source_word: כַּף רַגְלְכֶם
  english_pob_choice: the sole of your foot
  chosen_spanish: la planta de vuestro pie
  alternatives_spanish:
  - la suela de vuestro pie
  - la planta de sus pies
  lexicon: HALOT
  rationale: כַּף רֶגֶל designa específicamente la planta o suela del pie. «La planta de vuestro pie» reproduce la imagen corporal de forma clara y respetuosa; el singular distributivo en español refleja bien el hebreo plural del destinatario.
- source_word: בּוֹ
  english_pob_choice: on which
  chosen_spanish: —
  alternatives_spanish:
  - en él
  - sobre él
  lexicon: HALOT
  rationale: El sufijo pronominal retoma «lugar». En español, la relación espacial queda absorbida naturalmente por la estructura «Todo lugar que pise…», sin necesidad de repetir un pronombre explícito.
- source_word: לָכֶם
  english_pob_choice: to you
  chosen_spanish: os
  alternatives_spanish:
  - para vosotros
  - a vosotros
  lexicon: HALOT
  rationale: 'El dativo beneficiario se expresa de forma natural en español con clítico: «os lo he dado». Mantiene el destinatario plural sin añadir una construcción pesada.'
- source_word: נְתַתִּי/ו
  english_pob_choice: I have given to you
  chosen_spanish: os lo he dado
  alternatives_spanish:
  - os lo doy
  - os lo daré
  lexicon: HALOT
  rationale: El perfecto hebreo presenta el don como ya decretado y otorgado. El perfecto compuesto español («he dado») conserva esa fuerza de certeza y de acción establecida, más que un futuro simple.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - así como
  - como
  lexicon: HALOT
  rationale: La comparación enlaza esta declaración con una palabra previa de Yahvé. «Tal como» marca correspondencia directa sin sonar demasiado rígido.
- source_word: דִּבַּרְתִּי אֶל מֹשֶׁה
  english_pob_choice: I spoke to Moses
  chosen_spanish: hablé a Moisés
  alternatives_spanish:
  - le hablé a Moisés
  - hablé con Moisés
  lexicon: HALOT
  rationale: דִּבֶּר אֶל es la fórmula normal de ‘hablar a’. «Hablé a Moisés» reproduce el movimiento verbal hacia Moisés sin convertirlo en una idea más interpretativa como «prometí».
theological_decisions:
- issue: Modo verbal del don divino y certeza de la promesa
  english_pob_reading: I have given to you
  chosen_spanish_reading: os lo he dado
  alternative_spanish_readings:
  - os lo doy
  - os lo daré
  rationale: El hebreo perfecto expresa la concesión como una realidad ya establecida por el decreto de Dios, aunque su posesión se despliegue históricamente. El perfecto compuesto español conserva mejor esa certeza que un presente o futuro.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Destino corporativo del pronombre plural
  english_pob_reading: your foot / to you
  chosen_spanish_reading: vuestro pie / os
  alternative_spanish_readings:
  - tu pie / te
  - sus pies / les
  rationale: El hebreo usa sufijos plurales para dirigirse al pueblo. En español conviene mantener el plural para no individualizar indebidamente la promesa dirigida a Israel.
  doctrine_reference: Translation philosophy §2, §5
translation_notes:
  revision_awareness: Se ha respetado la revisión del inglés POB que eliminó el pronombre redundante ‘it’; en español se refleja de manera natural con «os lo he dado», manteniendo un objeto pronominal necesario para la fluidez. También se conserva la fuerza perfectiva del hebreo sin convertirla en simple futuro.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca en el contexto inmediato, conforme a la política del proyecto.
  - Se mantiene el paralelismo verbal concreto de ‘pisar/hollar’ sin suavizarlo a ‘caminar’.
  - El singular distributivo en «la planta de vuestro pie» sigue el hebreo y suena natural en español bíblico.
  - «Hablé a Moisés» conserva la fórmula de comunicación directa sin sobreinterpretar el contenido como «prometí».
