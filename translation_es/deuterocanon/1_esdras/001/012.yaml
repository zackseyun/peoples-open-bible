translation:
  language: es
  text: Después de esto, prepararon para sí mismos y para los sacerdotes[a], sus hermanos[b], los hijos de Aarón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más explícita: «para sí mismos y también para los sacerdotes, sus hermanos, los hijos de Aarón».'
    reason: lexical_alternative
  - marker: b
    text: El paralelo hebreo de 2 Crónicas 35:11 difiere considerablemente aquí; 1 Esdras conserva una formulación griega centrada en preparar para sí mismos y para los sacerdotes.
    reason: cross_reference
lexical_decisions:
- source_word: μετὰ δὲ ταῦτα
  english_pob_choice: After this
  chosen_spanish: Después de esto
  alternatives_spanish:
  - Luego
  - Después de estas cosas
  lexicon: LSJ
  rationale: La expresión marca una secuencia temporal directa. «Después de esto» conserva esa transición sin añadir interpretación.
- source_word: ἡτοίμασαν
  english_pob_choice: they prepared
  chosen_spanish: prepararon
  alternatives_spanish:
  - hicieron listo
  - dispusieron
  lexicon: LSJ
  rationale: El verbo pide una acción transitiva de preparar. «Prepararon» es natural en español y mantiene el sentido básico del griego.
- source_word: ἑαυτοῖς
  english_pob_choice: for themselves
  chosen_spanish: para sí mismos
  alternatives_spanish:
  - para ellos mismos
  - para su propio uso
  lexicon: LSJ
  rationale: El dativo reflexivo se vierte con claridad como destino o beneficio de la preparación.
- source_word: τοῖς ἱερεῦσιν
  english_pob_choice: for the priests
  chosen_spanish: para los sacerdotes
  alternatives_spanish:
  - para los sacerdotes también
  - para los presbíteros
  lexicon: LSJ
  rationale: En español, «sacerdotes» es el equivalente más transparente de ἱερεῦσιν en este contexto levítico.
- source_word: ἀδελφοῖς αὐτῶν
  english_pob_choice: their brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus hermanos de sangre
  - sus parientes
  lexicon: LSJ
  rationale: Se conserva el término de parentesco/fraternidad del griego sin neutralizarlo. El contexto indica una relación interna entre los sacerdotes y sus hermanos.
- source_word: υἱοῖς Ἀαρών
  english_pob_choice: the sons of Aaron
  chosen_spanish: los hijos de Aarón
  alternatives_spanish:
  - los descendientes de Aarón
  - los hijos de Aarón
  lexicon: LSJ
  rationale: «Hijos de Aarón» reproduce de forma directa la identificación sacerdotal del texto. Aunque «descendientes» sería posible, diluye la formulación bíblica y su fuerza genealógica.
theological_decisions:
- issue: Relación entre «los sacerdotes», «sus hermanos» y «los hijos de Aarón»
  english_pob_reading: 'The English preserves an appositional sequence: ''for the priests, their brothers, the sons of Aaron.'''
  chosen_spanish_reading: «para los sacerdotes, sus hermanos, los hijos de Aarón»
  alternative_spanish_readings:
  - «para los sacerdotes, sus hermanos, es decir, los hijos de Aarón»
  - «para los sacerdotes, que eran sus hermanos, los hijos de Aarón»
  rationale: El griego enumera los sintagmas en secuencia, sin introducir una cláusula relativa. La traducción mantiene esa tensión appositiva y deja que «los hijos de Aarón» identifique a los sacerdotes sin explicitar más de lo que el texto ofrece.
  doctrine_reference: Translation philosophy §§3-4, 6
- issue: Posible ambigüedad de destinatarios en la frase final
  english_pob_reading: The English note allows a more explicit reading but preserves the Greek focus on provisions for themselves and the priests.
  chosen_spanish_reading: 'La puntuación y el orden mantienen el doble destinatario: para sí mismos y para los sacerdotes, sus hermanos.'
  alternative_spanish_readings:
  - Reformular como «prepararon provisiones para sí mismos y también para los sacerdotes»
  - Unificar como «prepararon para sí mismos y para sus hermanos sacerdotes»
  rationale: No se introduce una paráfrasis que borre la estructura del griego. Se conserva la doble referencia y la relación fraterna, tal como el texto la presenta.
  doctrine_reference: Translation philosophy §§3-4, 6
translation_notes:
  revision_awareness: El testimonio principal es el griego de Swete (1909); el paralelo hebreo de 2 Crónicas 35:11 se considera solo como control secundario para nombres y encuadre, no como base primara. La redacción española sigue la lectura griega y conserva la secuencia appositiva señalada por la auditoría inglesa.
  spanish_consistency_notes:
  - Se usa «Aarón» de forma consistente para el nombre propio.
  - Se prefieren «sacerdotes» e «hijos de Aarón» por su claridad y correspondencia directa con el griego.
  - Se conserva «sus hermanos» para respetar la fraternidad explícita del texto sin sustituirla por un término más interpretativo.
