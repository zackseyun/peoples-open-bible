translation:
  language: es
  text: Al director del coro, según Jedutún[a]. Salmo de David[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre Jedutún» o «para Jedutún»; la frase puede referirse a un estilo musical, una melodía o una indicación de ejecución asociada con Jedutún.
    reason: alternative_reading
  - marker: b
    text: La expresión «de David» puede señalar autoría, dedicación o asociación con David.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Al director del coro
  alternatives_spanish:
  - Al director musical
  - Al maestro de canto
  lexicon: HALOT
  rationale: En encabezamientos de salmos, el término señala al responsable de la ejecución musical. «Director del coro» comunica con claridad moderna esa función sin perder el contexto litúrgico.
- source_word: עַל
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - sobre
  - para
  lexicon: HALOT
  rationale: Con un nombre propio en superscripción, la preposición puede indicar melodía, estilo o dirección interpretativa. «Según» preserva mejor esa ambigüedad que una opción más concreta.
- source_word: יְדוּת֗וּן
  english_pob_choice: Jeduthun
  chosen_spanish: Jedutún
  alternatives_spanish:
  - Jedutún
  - Yedutún
  lexicon: HALOT
  rationale: Es un nombre propio; se translitera al español. «Jedutún» conserva la forma reconocible y la pronunciación aproximada en español bíblico.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Canción
  - Melodía
  lexicon: HALOT
  rationale: Es la etiqueta literaria estándar del género en los títulos de salmos. «Salmo» es la equivalencia más natural y fiel en español.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: La construcción hebrea permite autoría, dedicación o asociación. «De David» mantiene esa amplitud sin resolver indebidamente la relación histórica.
theological_decisions:
- issue: Sentido de לְדָוִד en el encabezamiento
  english_pob_reading: of David
  chosen_spanish_reading: de David
  alternative_spanish_readings:
  - por David
  - para David
  rationale: El hebreo no obliga a elegir entre autoría estricta y una asociación davídica más amplia. Traducir «de David» conserva la tensión documental en vez de cerrarla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Revisión comparada con el último pase: el cotejo de traducción inglés-español mantiene alta concordancia con el audit trail inglés (acuerdo alto, sin cambios necesarios en la fuente).'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - Se usa «salmo» como género literario estándar, sin forzar una lectura musical adicional.
  - «De David» preserva la amplitud semántica del hebreo y evita decidir autoría donde el texto no la impone.
