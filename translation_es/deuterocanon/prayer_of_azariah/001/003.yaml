translation:
  language: es
  text: Bendito eres[a], Señor, Dios de nuestros padres, y alabado y glorificado es tu nombre por siempre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Dios de nuestros antepasados». El griego dice «nuestros padres», una expresión bíblica de pacto que se conserva en el texto principal.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «por los siglos»; un modismo que expresa perpetuidad continua.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐλογητὸς
  english_pob_choice: Blessed
  chosen_spanish: Bendito
  alternatives_spanish:
  - Alabado
  - Digno de bendición
  lexicon: BDAG
  rationale: En una fórmula doxológica dirigida a Dios, «Bendito» conserva el valor litúrgico y la estructura de dirección directa. «Alabado» sería comprensible, pero desplaza ligeramente el matiz hacia la respuesta humana de alabanza; «digno de bendición» suena más explicativo que formular.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: En vocativo dirigido a Dios, «Señor» es el equivalente natural y reverente en español. «Maestro» no expresa adecuadamente la invocación divina del texto.
- source_word: ὁ θεὸς τῶν πατέρων ἡμῶν
  english_pob_choice: the God of our fathers
  chosen_spanish: Dios de nuestros padres
  alternatives_spanish:
  - Dios de nuestros antepasados
  lexicon: BDAG
  rationale: Se conserva la expresión bíblica de pacto y la forma masculina plural del griego («padres»). «Antepasados» es posible, pero suaviza el eco bíblico tradicional que el texto griego mantiene.
- source_word: αἰνετὸν
  english_pob_choice: praised
  chosen_spanish: alabado
  alternatives_spanish:
  - digno de alabanza
  - praiseworthy
  lexicon: BDAG
  rationale: El adjetivo indica que algo es merecedor de alabanza. En español, «alabado» funciona bien en una cláusula nominal litúrgica y mantiene el paralelismo con «glorificado».
- source_word: δεδοξασμένον
  english_pob_choice: glorified
  chosen_spanish: glorificado
  alternatives_spanish:
  - honrado
  - hecho glorioso
  lexicon: BDAG
  rationale: «Glorificado» preserva el peso teológico del verbo δοξάζω mejor que «honrado», que es más débil. Mantiene también el paralelismo con «alabado».
- source_word: τὸ ὄνομά σου
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu reputación
  - tu nombre revelado
  lexicon: BDAG
  rationale: Se conserva la metonimia bíblica usual para la identidad y fama de Dios. No hace falta expandirla en el texto principal.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por siempre
  alternatives_spanish:
  - por los siglos
  - para siempre
  lexicon: BDAG
  rationale: «Por siempre» comunica bien la perpetuidad idiomática del griego en un español natural y solemne. «Por los siglos» sería posible, pero suena más marcado y menos directo en esta línea doxológica.
theological_decisions:
- issue: Conservar la expresión de alianza «the God of our fathers / τῶν πατέρων ἡμῶν» sin neutralizarla
  english_pob_reading: the God of our fathers
  chosen_spanish_reading: Dios de nuestros padres
  alternative_spanish_readings:
  - Dios de nuestros antepasados
  rationale: El griego dice literalmente «nuestros padres», y el POB inglés retiene ese eco covenantal. En español, «padres» mantiene la resonancia bíblica y la continuidad con la tradición de oración de Israel, sin borrar el lenguaje heredado.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Reproducir la cláusula doxológica nominal «and praised and glorified is your name» sin imponer una paráfrasis verbal innecesaria
  english_pob_reading: and praised and glorified is your name
  chosen_spanish_reading: y alabado y glorificado es tu nombre
  alternative_spanish_readings:
  - y tu nombre es digno de alabanza y de gloria
  - y tu nombre es alabado y glorificado
  rationale: La construcción española conserva el tono litúrgico y la condición nominal del original. «Es tu nombre» mantiene la cópula implícita en español sin añadir contenido doctrinal ajeno.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
- issue: Renderizar el vocativo divino Κύριε como «Señor» en una oración de alabanza
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Soberano
  - Maestro
  rationale: Aquí Κύριε funciona como título divino de invocación. «Señor» es la forma más natural y reverente en español, y no necesita ser sustituida por una forma más interpretativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
translation_notes:
  revision_awareness: 'El texto griego y el paquete de auditoría inglés muestran pleno acuerdo, sin revisiones aplicadas. La propuesta española sigue esa misma lectura estable: doxología directa, fórmula de pacto con «padres», y clausura temporal idiomática equivalente a «forever».'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «Señor» para Κύριε, siguiendo el uso bíblico español estándar y el audit trail.
  - Se conserva el paralelo adjetival «alabado y glorificado» para reflejar el doble predicado del griego.
  - «Por siempre» equilibra fidelidad y naturalidad; la nota explica la lectura idiomática sin perder el sentido literal.
