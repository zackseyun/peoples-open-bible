review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la comparación y el sentido general del griego: el arca de Noé en medio del diluvio soporta las olas con firmeza. Sin embargo, la nota al pie no preserva correctamente la alternativa documentada en el POB inglés. La nota actual repite exactamente el texto principal en vez de reflejar la variante de estructuración sintáctica ligada a κοσμοφορουμένη/κοσμοπληθεῖ.'
  spanish_quality_summary: El español es claro, natural y de registro digno. 'Arca de Noé', 'diluvio', 'soportó con firmeza las olas' funcionan bien. 'Siendo llevada' es aceptable, aunque un poco pesado; no requiere cambio obligatorio. La única reparación necesaria es la nota al pie.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. Las decisiones léxicas principales son adecuadas: κιβωτός -> ''arca'', κατακλυσμός -> ''diluvio'', κλύδωνες -> ''olas''.'
  issues:
  - severity: medium
    issue: La nota al pie [a] no presenta una alternativa real.
    rationale: El POB inglés conserva como alternativa 'being borne along in the flood that filled the world'. En español, la nota repite 'siendo llevada en el diluvio que llenó el mundo', que ya es el texto principal, por lo que no transmite ninguna opción léxica o sintáctica distinta.
  revised_spanish_text: Porque, así como el arca de Noé[a], siendo llevada en el diluvio que llenó el mundo, soportó con firmeza las olas,
  revised_footnotes:
  - marker: a
    text: 'O: «siendo llevada en el diluvio que llenó al mundo».'
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal, que es fiel y natural, y se corrige la nota para que preserve una alternativa real, aunque mínima, en línea con el expediente inglés. No se requiere adjudicación adicional.
