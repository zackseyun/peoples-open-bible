translation:
  language: es
  text: Lo que no veo[a], tú me instruyes; si he obrado mal[b], no lo repetiré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Lo que no veo, muéstramelo / enséñamelo». El hebreo es elíptico y también puede traducirse: «Aparte de lo que veo, tú me instruyes».'
    reason: lexical_alternative
  - marker: b
    text: 'O, más literalmente: «no añadiré más», es decir, «no continuaré» o «no lo volveré a hacer».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּלְעֲדֵי
  english_pob_choice: what ... not
  chosen_spanish: ¿Qué no alcanzo a ver?
  alternatives_spanish:
  - Aparte de lo que veo
  - Sin ver
  lexicon: HALOT
  rationale: El hebreo es elíptico y, junto con אֶחֱזֶה, apunta a «lo que no veo / no alcanzo a percibir». En español, una pregunta directa conserva la brevedad y el sentido de carencia de percepción sin sonar forzada como un calco de «aparte de».
- source_word: אֶחֱזֶה
  english_pob_choice: I see
  chosen_spanish: alcanzo a ver
  alternatives_spanish:
  - veo
  - percibo
  - comprendo
  lexicon: HALOT
  rationale: חזה tiene el sentido básico de ver o percibir. «Alcanzo a ver» mantiene la imagen visual y sugiere la percepción implícita en el contexto de corrección divina.
- source_word: אַתָּה הֹרֵנִי
  english_pob_choice: you teach me
  chosen_spanish: Tú me instruyes
  alternatives_spanish:
  - Tú me enseñas
  - Tú me corriges
  - Tú me muestras
  lexicon: HALOT
  rationale: ירה en Hifil suele significar enseñar o instruir. «Instruyes» suena natural y dignificado en español, y preserva el matiz de dirección moral o formativa más que el simple acto de mostrar.
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  - aunque
  lexicon: HALOT
  rationale: 'La lectura condicional es la más directa en el contexto: introduce la confesión hipotética del mal obrado.'
- source_word: עָוֶל
  english_pob_choice: wrong
  chosen_spanish: mal
  alternatives_spanish:
  - injusticia
  - iniquidad
  - torcido
  lexicon: HALOT
  rationale: עָוֶל puede expresar injusticia o wrongdoing. «Mal» es claro y amplio en español; en este contexto de confesión funciona mejor que un tecnicismo más pesado, aunque «injusticia» queda como alternativa semánticamente más precisa.
- source_word: פָּעַלְתִּי
  english_pob_choice: I have done
  chosen_spanish: he obrado
  alternatives_spanish:
  - he hecho
  - he actuado
  - he cometido
  lexicon: HALOT
  rationale: פעל se refiere a hacer/obrar/actuar. «He obrado» conserva el valor verbal general y suena más elevado que «he hecho»; además, combina bien con «mal» sin especificar de más.
- source_word: לֹא אֹסִיף
  english_pob_choice: I will not do it again
  chosen_spanish: no lo repetiré
  alternatives_spanish:
  - no añadiré más
  - no continuaré
  - no volveré a hacerlo
  lexicon: HALOT
  rationale: Con la negación, יסף en este tipo de construcción expresa no continuar ni añadir más. «No lo repetiré» transmite de forma natural la decisión de cesar el mal; mantiene la fuerza aspectual sin introducir un objeto inexistente en el hebreo.
theological_decisions:
- issue: Postura de humildad y docilidad ante la instrucción divina
  english_pob_reading: Render the verse as a plea/request for instruction and a resolve to cease wrongdoing, without importing stronger doctrinal language such as confession of total guilt or formal repentance terminology.
  chosen_spanish_reading: La versión presenta una disposición a ser instruido por Dios y la resolución de no repetir el mal, sin añadir lenguaje doctrinal más fuerte que el del hebreo.
  alternative_spanish_readings:
  - 'Una formulación más literal y seca que diga: «fuera de lo que veo, tú me instruyes»'
  - Una formulación más confesional que diga «me arrepentiré»
  rationale: El hebreo expresa humildad, apertura a la corrección y decisión de no persistir en el mal. «Tú me instruyes» y «no lo repetiré» conservan esa postura sin forzar términos teológicos que el texto no exige.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'Coincide con la última revisión disponible: no se registran cambios posteriores en el texto de referencia ni en las decisiones auditadas.'
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito en el discurso directo sin agregar el nombre divino, porque el hebreo dirige la frase a la segunda persona.
  - Se traduce פָּעַלְתִּי con un verbo de obrar/actuar para conservar el campo semántico general de פעל.
  - Se evita «SEÑOR» u այլ substitución litúrgica, ya que el versículo no contiene el tetragrámaton ni una cita explícita del nombre divino.
