translation:
  language: es
  text: Y los hijos de Israel volvieron a hacer lo malo[a] ante los ojos de Yahvé, y sirvieron a los Baales y a las Astorets, y a los dioses de Aram, a los dioses de Sidón, a los dioses de Moab, a los dioses de los hijos de Amón[b] y a los dioses de los filisteos. Abandonaron a Yahvé y no le sirvieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «continuaron haciendo lo malo». El verbo hebreo puede expresar repetición o continuación.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los dioses de los hijos de Amón»; es decir, los dioses adorados por los amonitas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּסִ֣פוּ
  english_pob_choice: again did
  chosen_spanish: volvieron a hacer
  alternatives_spanish:
  - hicieron de nuevo
  - siguieron haciendo
  lexicon: HALOT
  rationale: El hebreo expresa repetición o continuación; en español, 'volvieron a hacer' conserva bien el sentido cíclico del relato sin sonar mecánico.
- source_word: בְּנֵ֣י יִשְׂרָאֵ֗ל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene la expresión hebrea de forma transparente, que además conserva el ritmo narrativo típico de Jueces.
- source_word: לַעֲשׂוֹת הָרַע בְּעֵינֵי יְהוָה
  english_pob_choice: did what was evil in the eyes of Yahweh
  chosen_spanish: hacer lo malo ante los ojos de Yahvé
  alternatives_spanish:
  - hacer lo malo a los ojos de Yahvé
  - hacer el mal ante Yahvé
  lexicon: HALOT
  rationale: '''Ante los ojos de'' reproduce la metáfora evaluativa del hebreo. ''Lo malo'' mantiene el matiz idiomático y evita endurecerlo innecesariamente como un mero sustantivo moral.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se usa el nombre divino en transliteración, conforme al criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: וַיַּעַבְד֣וּ
  english_pob_choice: they served
  chosen_spanish: sirvieron
  alternatives_spanish:
  - adoraron
  - rindieron culto a
  lexicon: HALOT
  rationale: '''Servir'' conserva la repetición lexical con la cláusula final (''no le sirvieron'') y refleja la idea de lealtad/servicio del verbo עבד mejor que un equivalente más interpretativo.'
- source_word: הַבְּעָלִים
  english_pob_choice: the Baals
  chosen_spanish: los baales
  alternatives_spanish:
  - los Baales
  - los ídolos de Baal
  lexicon: HALOT
  rationale: Se translitera el plural cultual para mantener la forma del hebreo y su fuerza como designación de múltiples manifestaciones de Baal.
- source_word: הָעַשְׁתָּרוֹת
  english_pob_choice: the Ashtoreths
  chosen_spanish: las ashtoretes
  alternatives_spanish:
  - las Astartes
  - las Astoretes
  lexicon: HALOT
  rationale: Se conserva la forma plural cultual con transliteración cercana al hebreo; 'ashtoretes' comunica la referencia bíblica sin reemplazarla por un término más tradicional pero menos transparente.
- source_word: אֱלֹהֵי אֲרָם
  english_pob_choice: the gods of Aram
  chosen_spanish: los dioses de Aram
  alternatives_spanish:
  - los dioses de Siria
  lexicon: HALOT
  rationale: '''Aram'' se mantiene como nombre propio regional, siguiendo la forma del hebreo y evitando la actualización a ''Siria''.'
- source_word: אֱלֹהֵי צִידוֹן
  english_pob_choice: the gods of Sidon
  chosen_spanish: los dioses de Sidón
  alternatives_spanish:
  - los dioses sidonios
  lexicon: HALOT
  rationale: Se conserva el nombre de lugar de modo directo y natural en español.
- source_word: אֱלֹהֵי מוֹאָב
  english_pob_choice: the gods of Moab
  chosen_spanish: los dioses de Moab
  alternatives_spanish:
  - los dioses moabitas
  lexicon: HALOT
  rationale: Traducción directa del sintagma constructo, transparente al texto fuente.
- source_word: אֱלֹהֵי בְנֵי עַמּוֹן
  english_pob_choice: the gods of the sons of Ammon
  chosen_spanish: los dioses de los hijos de Amón
  alternatives_spanish:
  - los dioses de los amonitas
  - los dioses del pueblo de Amón
  lexicon: HALOT
  rationale: Se conserva la estructura hebrea 'hijos de Amón' para mantener la transparencia del original, como hace el inglés auditado.
- source_word: אֱלֹהֵי פְלִשְׁתִּים
  english_pob_choice: the gods of the Philistines
  chosen_spanish: los dioses de los filisteos
  alternatives_spanish:
  - los dioses filisteos
  lexicon: HALOT
  rationale: Se sigue el genitivo étnico directo del hebreo, claro y natural en español.
- source_word: וַיַּעַזְב֥וּ
  english_pob_choice: They forsook
  chosen_spanish: Y abandonaron
  alternatives_spanish:
  - Y dejaron
  - Y desertaron de
  lexicon: HALOT
  rationale: '''Abandonaron'' comunica bien la ruptura relacional y de lealtad implícita en עזב en este contexto. En español es más natural que ''abandonaron'' con objeto personal; se mantuvo la fuerza del verbo sin recurrir a un calco rígido.'
- source_word: וְלֹ֥א עֲבָדֽוּ/הוּ
  english_pob_choice: and did not serve him
  chosen_spanish: y no le sirvieron
  alternatives_spanish:
  - y no lo sirvieron
  - y no le prestaron servicio
  lexicon: HALOT
  rationale: 'Se preserva la repetición de ''servir'' del inicio del versículo, que forma el contraste retórico central: sirvieron a otros dioses, pero no sirvieron a Yahvé.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente; el proyecto lo rinde como Yahvé para no ocultar el nombre personal del Dios de Israel tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de עבד en un contexto de idolatría
  english_pob_reading: they served / did not serve him
  chosen_spanish_reading: sirvieron / no le sirvieron
  alternative_spanish_readings:
  - adoraron / no lo adoraron
  - rindieron culto a / no le rindieron culto
  rationale: Mantener 'servir' en ambas cláusulas reproduce la oposición del hebreo y evita reducir el sentido a ritual solamente; implica lealtad y sujeción, no solo acto litúrgico.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5: Consistency of key terms, or documented exception'
translation_notes:
  revision_awareness: 'Alineado con el audit trail inglés: se conserva la estructura causal y la repetición de עבד; se traduce יְהוָה como Yahvé y se mantiene la serie de divinidades con nombres propios/transliteraciones. No se introducen cambios de sentido respecto del texto hebreo ni del análisis léxico revisado.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de manera consistente para יְהוָה.
  - Se conserva 'sirvieron' / 'no le sirvieron' para reflejar la repetición de עבד.
  - Se usa 'los hijos de Israel' en lugar de 'israelitas' para mayor transparencia al hebreo.
  - Las transliteraciones cultuales ('baales', 'ashtoretes') se mantienen en minúscula por ser nombres comunes de deidades/cultos en este contexto.
