  yaml_path: translation/nt/2_corinthians/006/017.yaml
  text: Therefore, come out from among them and be separate, says the Lord, and do not touch what is unclean; and I will receive you.
  footnotes:
  - marker: a
    text: Or 'be set apart' or 'separate yourselves.'
    reason: lexical_alternative
  - marker: b
    text: Or 'do not touch anything unclean.'
    reason: lexical_alternative
  - marker: c
    text: Paul is echoing Old Testament prophetic language, especially Isaiah 52:11.
    reason: cross_reference
translation:
  language: ko
  text: 그러므로 「그들 가운데서 나와 따로 떨어지라, 주께서 말씀하신다. 부정한 것을 만지지 말라. 그리하면 내가 너희를 영접하리라」라고 하셨습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 사 52:11 + 겔 20:34의 결합 인용. LXX의 κύριος는 히브리어 본문에서 야훼(יהוה)에 해당한다. 본 번역은 LXX의 어휘 형태를 따라 「주」로 옮기되, 원 히브리 본문의 야훼 인유를 본 각주에 명시한다.
    reason: cross_reference
