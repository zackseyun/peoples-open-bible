id: MAT.18.11
reference: Matthew 18:11
source:
  edition: robinson-pierpont-2005-byzantine
  text: Ἦλθεν γὰρ ὁ υἱὸς τοῦ ἀνθρώπου σῶσαι τὸ ἀπολωλός.
  language: Greek
translation:
  text: For the Son[a] of Man came to save the lost.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: This verse is absent from the earliest Greek manuscripts (including 4th-century
      Sinaiticus and Vaticanus) and early Coptic translations, but is present in the
      5th-century Codex Bezae, the Byzantine majority tradition, and the Latin Vulgate.
      It was likely added by later scribes to harmonize with Luke 19:10.
    reason: textual_critical
lexical_decisions:
- source_word: ἀπόλλυμι
  chosen: the lost
  alternatives:
  - what was lost
  - that which is lost
  - the ruined
  lexicon: BDAG
  rationale: The perfect active participle (ἀπολωλός) is neuter singular and functions
    substantively here. 'The lost' concisely captures the state of spiritual ruin
    and separation from God, serving as a collective noun.
- source_word: σῴζω
  chosen: to save
  alternatives:
  - to rescue
  - to deliver
  lexicon: BDAG
  rationale: The standard rendering for σῴζω in soteriological contexts, denoting
    rescue from spiritual peril or destruction.
