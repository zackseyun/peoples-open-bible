  text: וְ/לִ/בְנֵ֨י בַרְזִלַּ֤י הַ/גִּלְעָדִי֙ תַּֽעֲשֶׂה חֶ֔סֶד וְ/הָי֖וּ בְּ/אֹכְלֵ֣י שֻׁלְחָנֶ֑/ךָ כִּי כֵן֙ קָרְב֣וּ אֵלַ֔/י בְּ/בָרְחִ֕/י מִ/פְּנֵ֖י אַבְשָׁל֥וֹם אָחִֽי/ךָ־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_kings/002/007.yaml
  text: But show kindness to the sons of Barzillai the Gileadite[a], and let them be among those who eat at your table[c][b], for this is how they came near to me when I fled from Absalom your brother.
  footnotes:
  - marker: a
    text: Or 'deal loyally with the sons of Barzillai'; the Hebrew phrase 'do/show hesed' can carry the sense of loyal kindness, not mere sentiment.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'let them be among the eaters of your table,' an idiom for ongoing royal provision and favor.
    reason: cultural_note
  - marker: c
    text: Or 'they came to me' / 'they stood by me'; the Hebrew verb is literally 'came near,' here implying support during David's flight.
    reason: lexical_alternative
