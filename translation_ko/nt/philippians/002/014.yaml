  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Πάντα ποιεῖτε χωρὶς γογγυσμῶν καὶ διαλογισμῶν,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/002/014.yaml
  text: 'Do everything without grumbling or arguing,'
translation:
  language: ko
  text: 모든 일을 불평[a]과 다툼[b] 없이 행하십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「투덜거림」, 「원망」. 헬라어 γογγυσμός는 광야의 이스라엘이 보였던 원망과 같은 어조를 함의할 수 있다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「논쟁」, 「의심」. 본 권면 문맥에서는 사람들 사이의 다툼·논쟁을 가리키는 의미가 우세하다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πάντα
  english_pob_choice: Do everything
  chosen_korean: 모든 일을
  alternatives_korean:
  - 모든 것을
  - 무슨 일이든
  lexicon: BDAG
  rationale: 본 절의 보편적 범위를 한국어 「모든 일」로 자연스럽게 표현한다.
- source_word: ποιεῖτε
  english_pob_choice: Do
  chosen_korean: 행하다
  alternatives_korean:
  - 하다
  - 수행하다
  lexicon: BDAG
  rationale: 현재 명령형. 합쇼체 「행하십시오」가 자연스럽다.
- source_word: χωρὶς
  english_pob_choice: without
  chosen_korean: ~없이
  alternatives_korean:
  - ~을 떠나서
  lexicon: BDAG
  rationale: 표준적 결여 표현. 한국어 「없이」가 자연스럽다.
- source_word: γογγυσμῶν
  english_pob_choice: grumbling
  chosen_korean: 불평
  alternatives_korean:
  - 원망
  - 투덜거림
  lexicon: BDAG
  rationale: γογγυσμός는 중얼거리는 불만을 가리킨다. 「불평」이 한국어로 자연스럽고, 광야의 이스라엘에 대한 본문의 가능한 반향을 「원망」으로 각주에 보존한다.
- source_word: διαλογισμῶν
  english_pob_choice: arguing
  chosen_korean: 다툼
  alternatives_korean:
  - 논쟁
  - 시비
  - 의심
  lexicon: BDAG
  rationale: 본 권면 문맥에서 διαλογισμός는 인간 내적 추론보다 대인적 다툼·논쟁을 가리킨다. 「다툼」이 「불평」과 자연스럽게 짝을 이루며 대인 관계의 의미를 보존한다.
