translation:
  language: es
  text: Y salió por todos los confines de Judea y por la región circundante[a], y tomó venganza contra los hombres y contra los que habían desertado[b], y se les impidió entrar en la región[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por las regiones circundantes». El adverbio griego κυκλόθεν amplía el alcance más allá de los límites de Judea propiamente dichos.
    reason: lexical_alternative
  - marker: b
    text: O «los que habían defectado» o «los desertores». El griego se refiere a personas que se habían pasado al otro lado.
    reason: lexical_alternative
  - marker: c
    text: O «entrar en el país» o «entrar en la tierra». χώρα puede significar «país», «tierra» o «región».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - fue
  - salió fuera
  - partió
  lexicon: BDAG
  rationale: El aoristo de ἐξέρχομαι expresa salida o desplazamiento. «Salió» reproduce de forma natural y sobria el movimiento narrativo sin añadir matices no presentes en el griego.
- source_word: ὅρια
  english_pob_choice: borders
  chosen_spanish: límites
  alternatives_spanish:
  - fronteras
  - territorios
  - regiones
  lexicon: BDAG
  rationale: Aquí ὅρια puede referirse a los confines o límites geográficos de Judea. «Límites» conserva el sentido concreto de extensión territorial y suena natural en español.
- source_word: κυκλόθεν
  english_pob_choice: the surrounding region
  chosen_spanish: por los alrededores
  alternatives_spanish:
  - alrededor
  - en torno
  - las regiones circunvecinas
  lexicon: LSJ
  rationale: El adverbio amplía el alcance más allá de los límites propiamente dichos. «Por los alrededores» mantiene esa expansión espacial sin forzar una paráfrasis demasiado interpretativa.
- source_word: ἐποίησεν ἐκδίκησιν
  english_pob_choice: took vengeance
  chosen_spanish: hizo venganza
  alternatives_spanish:
  - tomó venganza
  - ejerció venganza
  - cobró venganza
  lexicon: BDAG
  rationale: La expresión griega es literalmente «hizo venganza». Aunque «tomó venganza» es más idiomático, «hizo venganza» conserva mejor la forma y el peso judicial/punitivo del original. Se evita suavizarlo a «castigó» porque el texto usa el lenguaje fuerte de ἐκδίκησις.
- source_word: ἐν τοῖς ἀνδράσιν
  english_pob_choice: on the men
  chosen_spanish: contra los hombres
  alternatives_spanish:
  - sobre los hombres
  - entre los hombres
  - a los hombres
  lexicon: BDAG
  rationale: Con ἐκδίκησιν, la preposición se entiende como acción dirigida contra personas. «Contra los hombres» comunica la hostilidad del acto mejor que una preposición más neutra, sin añadir sujetos o cualidades que el griego no especifica.
- source_word: τοῖς αὐτομολήσασιν
  english_pob_choice: those who had deserted
  chosen_spanish: los que habían desertado
  alternatives_spanish:
  - los desertores
  - los que habían defeccionado
  - los que se habían pasado al otro bando
  lexicon: BDAG
  rationale: αὐτομολέω designa deserción o defección hacia el otro lado. «Los que habían desertado» reproduce bien el acto ya completado y conserva el valor histórico del participio aoristo.
- source_word: ἐνεστάλησαν
  english_pob_choice: were prevented
  chosen_spanish: se les impidió
  alternatives_spanish:
  - fueron detenidos
  - se les obstaculizó
  - fueron impedidos
  lexicon: BDAG
  rationale: La pasiva indica una restricción efectiva sobre el movimiento. En español, «se les impidió» expresa con naturalidad esa obstrucción sin perder la fuerza pasiva del griego.
- source_word: τοῦ πορεύεσθαι εἰς χώραν
  english_pob_choice: from going into the country
  chosen_spanish: entrar en la región
  alternatives_spanish:
  - ir al país
  - entrar en el país
  - ir a la tierra
  lexicon: BDAG
  rationale: La construcción infinitiva expresa aquello de lo que fueron impedidos. χώρα admite «tierra», «país» o «región»; aquí «región» evita una lectura demasiado moderna o nacionalizada de «país» y conserva la amplitud espacial del término.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran acuerdo alto y sin revisiones aplicadas; la presente redacción sigue esa lectura estable sin introducir cambios textuales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se ha conservado el tono judicial de ἐκδίκησις mediante «hizo venganza», en vez de suavizarlo a «castigó».
  - «Región» se usa para χώρα por su amplitud semántica y por coherencia con la nota de alternativa abierta en el POB inglés.
