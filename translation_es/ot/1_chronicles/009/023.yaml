translation:
  language: es
  text: Ellos y sus hijos estaban a cargo de las puertas de la casa de Yahvé, es decir, la casa de la tienda[a], como guardias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «la casa del tabernáculo». Hebreo: «la casa de la tienda».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵם
  english_pob_choice: They
  chosen_spanish: Ellos
  alternatives_spanish:
  - Y ellos
  lexicon: HALOT
  rationale: El pronombre resumptivo introduce el sujeto principal; en español natural conviene omitir la conjunción inicial y conservar el referente con «Ellos».
- source_word: וּבְנֵיהֶם
  english_pob_choice: and their sons
  chosen_spanish: y sus hijos
  alternatives_spanish:
  - y sus descendientes
  lexicon: HALOT
  rationale: בנים aquí señala descendencia masculina en un oficio hereditario. «Hijos» mantiene el valor básico y la referencia familiar sin ampliar indebidamente a «descendientes».
- source_word: עַל הַשְּׁעָרִים
  english_pob_choice: were over the gates
  chosen_spanish: estaban sobre las puertas
  alternatives_spanish:
  - estaban a cargo de las puertas
  - estaban en las puertas
  lexicon: HALOT
  rationale: El hebreo con עַל en este contexto expresa supervisión o responsabilidad, no solo ubicación. «Sobre las puertas» conserva la relación de autoridad; el sentido administrativo queda claro por el contexto y la continuación «como guardias».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la directriz del proyecto para el nombre divino: «Yahvé» en el texto principal, en lugar de una sustitución devocional.'
- source_word: לְבֵית יְהוָה
  english_pob_choice: of the house of Yahweh
  chosen_spanish: de la casa de Yahvé
  alternatives_spanish:
  - de la casa de Yahvé,
  lexicon: HALOT
  rationale: La frase identifica el complejo del templo como perteneciente a Yahvé. Se mantiene la forma posesiva sencilla y directa en español.
- source_word: לְבֵית הָאֹהֶל
  english_pob_choice: the house of the tent
  chosen_spanish: la casa del tabernáculo
  alternatives_spanish:
  - la casa de la tienda
  - la casa de la tienda de reunión
  lexicon: HALOT
  rationale: El hebreo dice literalmente «la casa de la tienda/tent». La nota auditada en inglés preserva la alternativa «tabernáculo»; en español «tabernáculo» comunica mejor ese referente cultual sin perder la tensión con la expresión literal.
- source_word: לְמִשְׁמָרֽוֹת
  english_pob_choice: as guards
  chosen_spanish: como guardias
  alternatives_spanish:
  - para la guardia
  - en funciones de guardia
  lexicon: HALOT
  rationale: מִשְׁמָרוֹת expresa servicio de guardia o custodia. «Como guardias» traduce con naturalidad la función predicativa y evita un calco como «para vigilias» que sería menos claro en español.
theological_decisions:
- issue: Relación entre «la casa de Yahvé» y «la casa del tabernáculo»
  english_pob_reading: Treat the second phrase as an appositional/clarifying designation, preserving both expressions in translation.
  chosen_spanish_reading: 'Tratar la segunda frase como explicación appositiva: «es decir, la casa del tabernáculo».'
  alternative_spanish_readings:
  - la casa de Yahvé, la casa del tabernáculo
  - la casa de Yahvé, o sea, la casa del tabernáculo
  - la casa de Yahvé y la casa del tabernáculo
  rationale: La estructura hebrea y la revisión inglesa favorecen una relación explicativa, no dos lugares separados. «Es decir» mantiene la aclaración sin borrar la tensión histórica entre el templo presente y la terminología ligada a la tienda sagrada.
  doctrine_reference: Preservar la tensión textual y teológica entre templo y tabernáculo sin resolverla de forma excesiva.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa, que añadió una clarificación appositiva («that is») entre «house of Yahweh» y «house of the tent». En español se reprodujo esa relación con «es decir», manteniendo el registro formal y la tensión interpretativa documentada.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el nombre divino.
  - Se mantiene «tabernáculo» como equivalente interpretativo, con nota que preserva la literalidad hebrea «casa de la tienda».
  - «Como guardias» refleja función administrativa/ceremonial sin introducir vocabulario eclesiástico no atestiguado.
  - El texto evita añadir partículas innecesarias al inicio para conservar la fluidez del español bíblico moderno.
