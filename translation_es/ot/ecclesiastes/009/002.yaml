    issue: La nota [a] repite la lectura principal en lugar de ofrecer alternativas reales.
    rationale: El texto principal ya dice "una misma suerte". La nota debería preservar las alternativas documentadas por el POB inglés, no duplicar la opción elegida.
  - severity: low
    issue: '"una misma suerte ocurre" suena menos idiomático que una expresión de desenlace que sobreviene a todos.'
    rationale: מִקְרֶה אֶחָד en este contexto apunta a lo que les sucede o sobreviene por igual. En español bíblico natural, "les sobreviene" fluye mejor con "suerte"/"destino" que "ocurre".
  - severity: low
    issue: '"al malo" es aceptable, pero "al malvado" representa con mayor precisión el contraste con "al justo".'
    rationale: רָשָׁע en paralelo con צַדִּיק suele expresar maldad moral más marcada que simple "malo". "Malvado" sigue siendo natural y más alineado con el audit trail inglés.
