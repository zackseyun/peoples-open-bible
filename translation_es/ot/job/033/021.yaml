translation:
  language: es
  text: Su carne se consume hasta desaparecer de la vista[a], y sus huesos, antes invisibles, quedan al descubierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Su carne es consumida hasta dejar de verse, y sus huesos, que no se veían, quedan al descubierto». El hebreo de esta línea es compacto y algo difícil, especialmente el verbo que aquí se vierte «quedan al descubierto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִכֶל
  english_pob_choice: wastes away
  chosen_spanish: se consume
  alternatives_spanish:
  - se va deshaciendo
  - se desvanece
  lexicon: HALOT
  rationale: El verbo hebreo expresa deterioro físico hasta el agotamiento. «Se consume» conserva esa idea de desgaste corporal de manera natural en español y mantiene la fuerza concreta del texto.
- source_word: בְּשָׂרוֹ
  english_pob_choice: his flesh
  chosen_spanish: su carne
  alternatives_spanish:
  - su cuerpo
  lexicon: HALOT
  rationale: «Carne» reproduce de forma más literal y vívida el hebreo בשר, preservando la imagen corporal concreta. «Cuerpo» suavizaría la imaginería original.
- source_word: מֵרֹאִי
  english_pob_choice: from sight
  chosen_spanish: lejos de la vista
  alternatives_spanish:
  - de la vista
  - sin ser visto
  lexicon: HALOT
  rationale: La construcción indica desaparición del campo visual. «Lejos de la vista» comunica bien la idea de que la carne se va perdiendo hasta quedar fuera de la vista, sin forzar una paráfrasis excesiva.
- source_word: וְשֻׁפִי
  english_pob_choice: stick out
  chosen_spanish: quedan al descubierto
  alternatives_spanish:
  - sobresalen
  - quedan expuestos
  lexicon: HALOT
  rationale: La forma es difícil; el contexto pide que los huesos se vuelvan visibles conforme la carne desaparece. «Quedan al descubierto» preserva esa imagen y resulta idiomático en español, sin cerrar indebidamente la ambigüedad del hebreo.
- source_word: עַצְמוֹתָיו
  english_pob_choice: his bones
  chosen_spanish: sus huesos
  alternatives_spanish:
  - los huesos de él
  lexicon: HALOT
  rationale: Traducción directa y natural del sustantivo plural con sufijo de tercera persona masculina singular.
- source_word: לֹא רֻאּוּ
  english_pob_choice: once unseen
  chosen_spanish: antes invisibles
  alternatives_spanish:
  - que no se veían
  - nunca vistos
  lexicon: HALOT
  rationale: El pasivo negado de ראה señala que esos huesos no se veían antes. «Antes invisibles» conserva el contraste temporal del original y funciona con claridad en español.
translation_notes:
  revision_awareness: 'La versión española sigue el alto acuerdo del recorrido de revisión: no se introdujeron cambios de sentido respecto del texto hebreo ni del criterio auditado en inglés; solo se ajustó la formulación para que suene natural en español sin perder la imaginería corporal ni la dificultad del hemistiquio final.'
  spanish_consistency_notes:
  - Se mantuvo el lenguaje corporal concreto («carne», «huesos») para conservar la imaginería del hebreo.
  - Se evitó «SEÑOR» u otra sustitución porque no aparece el nombre divino en este versículo.
  - La nota al pie preserva la alternativa semántica documentada en el audit trail inglés y reconoce la dificultad del hebreo.
  - «Antes invisibles» refleja el contraste temporal implícito en לֹא רֻאּוּ sin volverlo explicativo en exceso.
