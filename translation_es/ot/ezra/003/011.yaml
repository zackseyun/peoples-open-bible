    changes_summary: 'Adjusted phrasing for closer lexical accuracy and completeness: added ''with'' before ''praise and thanksgiving,'' moved ''toward Israel'' to reflect the Hebrew order more naturally, added ''with'' in ''shouted with a great shout,'' and revised the final clause from ''had been founded'' to ''the foundation of the house of the LORD had been laid'' to better represent the source verb and noun.'
translation:
  language: es
  text: 'Y respondían[a] con alabanza y acción de gracias a Yahvé: «Porque él es bueno, porque su amor constante hacia Israel es para siempre[b]». Y todo el pueblo gritó con un gran grito en alabanza a Yahvé, porque se había puesto el fundamento[c] de la casa de Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «respondieron». El verbo hebreo también puede significar «respondieron» o «contestaron», probablemente en alabanza antifonal o responsiva.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «porque su amor constante es para siempre hacia Israel».'
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «porque la casa de Yahvé había sido fundada»; en contexto se refiere a la colocación del fundamento del templo.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעֲנוּ
  english_pob_choice: they sang responsively
  chosen_spanish: respondieron
  alternatives_spanish:
  - cantaron responsivamente
  - contestaron
  - respondieron en forma alternada
  lexicon: HALOT
  rationale: ענה en este contexto litúrgico expresa respuesta coral o responsiva; en español, «respondieron» conserva la idea de réplica ritual sin forzar una construcción poco natural.
- source_word: בְּהַלֵּל וּבְהוֹדֹת
  english_pob_choice: with praise and thanksgiving
  chosen_spanish: con alabanza y acción de gracias
  alternatives_spanish:
  - en alabanza y acción de gracias
  - alabando y dando gracias
  lexicon: HALOT
  rationale: Los infinitivos acompañan la respuesta del pueblo como modo de su acción; «con alabanza y acción de gracias» mantiene ambas expresiones y su valor de acompañamiento.
- source_word: לַיהוָה / יְהוָה
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue el criterio del proyecto de renderizar el Nombre divino como «Yahvé» en el texto principal, evitando la sustitución por una forma de ocultamiento.
- source_word: כִּי טוֹב
  english_pob_choice: For he is good
  chosen_spanish: Porque es bueno
  alternatives_spanish:
  - Porque él es bueno
  - Pues es bueno
  lexicon: HALOT
  rationale: La fórmula confesional queda clara y natural en español con el verbo implícito, sin perder el valor predicativo del adjetivo.
- source_word: כִּי לְעוֹלָם חַסְדּוֹ
  english_pob_choice: for his steadfast love is forever
  chosen_spanish: porque para siempre es su misericordia
  alternatives_spanish:
  - porque para siempre es su amor constante
  - porque su misericordia es eterna
  lexicon: HALOT
  rationale: חֶסֶד requiere decidir entre lealtad pactal, amor constante o misericordia; aquí se opta por «misericordia» por su amplitud bíblica en español, manteniendo «para siempre» para לְעוֹלָם.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: toward Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - para Israel
  - hacia Israel
  lexicon: HALOT
  rationale: La preposición עַל permite varias relaciones; en la fórmula tradicional del texto, «sobre Israel» conserva la dirección del favor sin añadir una interpretación demasiado específica.
- source_word: הֵרִיעוּ תְרוּעָה גְדוֹלָה
  english_pob_choice: shouted with a great shout
  chosen_spanish: gritó con gran clamor
  alternatives_spanish:
  - alzaron un gran clamor
  - prorrumpió en gran grito
  lexicon: HALOT
  rationale: El hebreo usa un cognado para intensificar la idea de grito; «gran clamor» preserva la fuerza retórica con español natural.
- source_word: בְהַלֵּל לַיהוָה
  english_pob_choice: in praise to Yahweh
  chosen_spanish: en alabanza a Yahvé
  alternatives_spanish:
  - alabando a Yahvé
  - para alabanza de Yahvé
  lexicon: HALOT
  rationale: La frase explica la cualidad del clamor del pueblo; «en alabanza a Yahvé» mantiene la relación preposicional y el carácter cultual.
- source_word: עַל הוּסַד בֵּית יְהוָה
  english_pob_choice: because the foundation of the house of the LORD had been laid
  chosen_spanish: porque se había puesto el fundamento de la casa de Yahvé
  alternatives_spanish:
  - porque se había echado el fundamento de la casa de Yahvé
  - porque la casa de Yahvé había sido fundada
  lexicon: HALOT
  rationale: El pasivo de יסד en este contexto apunta a la colocación del fundamento del templo; «se había puesto el fundamento» refleja el hecho constructivo con claridad en español.
theological_decisions:
- issue: Renderización del Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrama; el proyecto pide la forma «Yahvé» en el texto principal, preservando el Nombre propio del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de חֶסֶד en la fórmula de alabanza
  english_pob_reading: steadfast love
  chosen_spanish_reading: misericordia
  alternative_spanish_readings:
  - amor constante
  - amor leal
  - misericordia fiel
  rationale: Aunque חֶסֶד puede enfatizar amor leal o fidelidad pactal, en esta cláusula doxológica española «misericordia» ofrece una equivalencia bíblica amplia y comprensible, sin perder el tono confesional de duración perpetua.
  doctrine_reference: DOCTRINE.md Translation philosophy §6; consistency of key terms §5
- issue: Relación de עַל con Israel
  english_pob_reading: toward Israel
  chosen_spanish_reading: sobre Israel
  alternative_spanish_readings:
  - para Israel
  - hacia Israel
  rationale: La preposición no exige una sola equivalencia; «sobre Israel» mantiene la idea de dirección/referencia del favor divino y respeta el giro tradicional del pasaje.
  doctrine_reference: HALOT / sintaxis hebrea del texto
- issue: וַיַּעֲנוּ en contexto litúrgico
  english_pob_reading: they sang responsively
  chosen_spanish_reading: respondieron
  alternative_spanish_readings:
  - cantaron responsivamente
  - respondieron en forma alternada
  rationale: La clave teológica-litúrgica es la respuesta coral del pueblo en adoración. «Respondieron» conserva esa acción sin añadir detalles no explicitados por el hebreo.
  doctrine_reference: HALOT
translation_notes:
  revision_awareness: 'Se integró la revisión reciente del POB inglés que privilegia cercanía léxica y claridad sintáctica: se conservó la respuesta responsiva, la doxología con dos miembros paralelos, la mención explícita del fundamento y el orden natural del complemento final. En español se ajustó la línea para mantener esa misma estructura sin depender de la máscara tradicional del Nombre divino.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה conforme al criterio del proyecto.
  - Se prefirió «misericordia» para חֶסֶד en esta fórmula doxológica, aunque el término admite matices de amor leal.
  - Se evitó «SEÑOR» como sustituto del Nombre divino.
  - El paralelo poético «Porque es bueno..., porque para siempre... es su misericordia...» conserva la doble razón de alabanza del hebreo.
  - «Se había puesto el fundamento» traduce el hecho constructivo sin convertirlo en una paráfrasis amplia.
