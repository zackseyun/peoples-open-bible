translation:
  language: es
  text: Lo hice hermoso[a] con la multitud de sus ramas, y todos los árboles de Edén que estaban en el huerto de Dios le tuvieron envidia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Lo hice hermoso... y todos los árboles de Edén... lo envidiaron», si el referente subyacente se enfatiza como Asiria o el rey más que como la imagen del árbol.'
    reason: alternative_reading
lexical_decisions:
- source_word: יָפֶה
  english_pob_choice: beautiful
  chosen_spanish: hermoso
  alternatives_spanish:
  - bello
  - lindo
  lexicon: HALOT
  rationale: Adjetivo predicativo que describe la apariencia/esplendor del árbol. ‘Hermoso’ comunica bien la idea estética en español actual y conserva un tono digno sin volverse arcaico.
- source_word: עֲשִׂיתִיו
  english_pob_choice: I made it
  chosen_spanish: lo hice
  alternatives_spanish:
  - lo hice hermoso
  - lo hice bello
  lexicon: HALOT
  rationale: El verbo en primera persona singular con sufijo de tercera persona masculina singular se traduce de forma directa con objeto neutro ‘lo’, manteniendo la imagen del árbol en el texto principal.
- source_word: בְּרֹב
  english_pob_choice: with its many
  chosen_spanish: con la multitud de
  alternatives_spanish:
  - con la abundancia de
  - por la multitud de
  lexicon: HALOT
  rationale: La preposición con ‘multitud/abundancia’ expresa de manera natural la idea de gran cantidad ligada a las ramas. ‘Multitud de’ refleja bien el valor cuantitativo del hebreo.
- source_word: דָּלִיּוֹתָיו
  english_pob_choice: branches
  chosen_spanish: ramas
  alternatives_spanish:
  - brazos
  - brazos altos
  - ramaje
  lexicon: HALOT
  rationale: Designa las ramas colgantes o prominentes del árbol. ‘Ramas’ es el equivalente más claro y comprensible en español moderno; evita un tecnicismo innecesario.
- source_word: וַיְקַנְאֻהוּ
  english_pob_choice: envied it
  chosen_spanish: le tuvieron envidia
  alternatives_spanish:
  - lo envidiaron
  - le envidiaron
  lexicon: HALOT
  rationale: El verbo קנא aquí expresa envidia/celos. ‘Le tuvieron envidia’ conserva el sentido relacional y suena natural en español, manteniendo el referente metafórico al árbol en la frase principal.
- source_word: כָּל עֲצֵי עֵדֶן
  english_pob_choice: all the trees of Eden
  chosen_spanish: todos los árboles de Edén
  alternatives_spanish:
  - todos los árboles del Edén
  - cada árbol de Edén
  lexicon: HALOT
  rationale: La expresión colectiva se vierte literalmente para preservar el paralelismo poético y la imagen de Edén. ‘Edén’ se mantiene como nombre propio del marco simbólico.
- source_word: אֲשֶׁר בְּגַן הָאֱלֹהִים
  english_pob_choice: that were in the garden of God
  chosen_spanish: que estaban en el huerto de Dios
  alternatives_spanish:
  - que estaban en el jardín de Dios
  - que estaban en el huerto de Yahvé
  lexicon: HALOT
  rationale: ‘Huerto de Dios’ reproduce con claridad el idiomático ‘garden of God’ sin diluir la solemnidad. ‘Huerto’ es más bíblico y más natural aquí que ‘jardín’ en español moderno de registro sagrado.
theological_decisions:
- issue: Referente de los sufijos de tercera persona en un contexto metafórico
  english_pob_reading: Mantener ‘it’ en el texto principal, sosteniendo la metáfora del árbol; una nota permite la lectura personal (‘him’) si se foregrounds Asiria/el rey.
  chosen_spanish_reading: 'Mantener el pronombre neutro implícito en la imagen arbórea: ‘lo hice... le tuvieron envidia’.'
  alternative_spanish_readings:
  - lo hice hermoso... lo envidiaron
  - lo hice hermoso... le envidiaron
  - lo hice hermoso... le tuvieron envidia, si se foregrounda Asiria/el rey
  rationale: En español, el pronombre neutro ‘lo’ conserva la continuidad de la metáfora del árbol, mientras ‘le’ para ‘tener envidia’ mantiene una formulación idiomática. La ambigüedad entre árbol y referente histórico subyacente queda preservada sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión alegórica sin forzar la identificación; equivalencia óptima
- issue: Imagen de Edén como marco simbólico del árbol majestuoso
  english_pob_reading: ‘garden of God’ retains elevated biblical idiom and echoes Eden language elsewhere in Ezekiel.
  chosen_spanish_reading: ‘huerto de Dios’ conserva el marco bíblico elevado y el eco de Edén.
  alternative_spanish_readings:
  - jardín de Dios
  - huerto divino
  rationale: ‘Huerto de Dios’ es más fiel al registro bíblico del pasaje y conserva mejor la resonancia intertextual con Edén. Evita una modernización que debilite la solemnidad poética.
  doctrine_reference: Imagen profética y lenguaje figurado; fidelidad literaria
- issue: ‘Envidia’ como traducción de קנא en contexto poético
  english_pob_reading: ‘envied it’
  chosen_spanish_reading: ‘le tuvieron envidia’
  alternative_spanish_readings:
  - ‘lo envidiaron’
  - ‘sintieron celos de él’
  rationale: ‘Tener envidia’ es la forma más natural y exacta en español para captar tanto el sentido de envidia como el matiz de celos que puede estar presente en קנא. Se evita ‘celos’ como forma principal por su posible ambigüedad relacional en español.
  doctrine_reference: Lexema emocional/relacional; preservación de fuerza semántica
translation_notes:
  revision_awareness: 'Se siguió el último pase revisado sin cambios: el inglés POB mantiene la metáfora del árbol en el texto principal y deja constancia de la alternativa personal en una nota. La versión española conserva esa misma tensión referencial y no introduce reinterpretaciones adicionales.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ como norma del proyecto solo cuando el hebreo lo requiere explícitamente; aquí el hebreo dice הָאֱלֹהִים, por lo que se traduce ‘Dios’.
  - Se mantuvo el paralelismo arbóreo con ‘lo’ y ‘le’ en la frase principal para no romper la metáfora del pasaje.
  - ‘Huerto’ se prefirió a ‘jardín’ por registro bíblico y por coherencia con la imagen de Edén en Ezequiel.
  - No se sustituyó ‘envidia’ por ‘celos’ como forma principal, para conservar la fuerza léxica de קנא en español común y eclesial.
