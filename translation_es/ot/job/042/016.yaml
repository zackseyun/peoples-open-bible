translation:
  language: es
  text: Después de esto[a], Job vivió ciento cuarenta años y vio a sus hijos y a sus nietos, cuatro generaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática, «vivió hasta ver a sus hijos y a sus nietos». El hebreo dice más literalmente: «vio a sus hijos y a los hijos de sus hijos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְחִי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - siguió viviendo
  - continuó viviendo
  lexicon: HALOT
  rationale: El verbo חיה en esta forma narrativa expresa que Job continuó con vida después de los acontecimientos previos. «Vivió» es la opción más natural y directa en español, y conserva la relación temporal sin añadir más de lo que el hebreo dice.
- source_word: אַחֲרֵי זֹאת
  english_pob_choice: After this
  chosen_spanish: Después de esto
  alternatives_spanish:
  - Después de estas cosas
  - Luego de esto
  lexicon: HALOT
  rationale: La expresión marca tiempo subsecuente respecto a lo narrado antes. «Después de esto» es idiomática en español y mantiene la referencia temporal inmediata del hebreo.
- source_word: מֵאָה וְאַרְבָּעִים שָׁנָה
  english_pob_choice: one hundred and forty years
  chosen_spanish: ciento cuarenta años
  alternatives_spanish:
  - cien y cuarenta años
  - ciento cuarenta años de edad
  lexicon: HALOT
  rationale: La cifra se traslada de forma directa y sobria. En español, «ciento cuarenta años» preserva el conteo formal con buena fluidez.
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - llegó a ver
  - vivió para ver
  lexicon: HALOT
  rationale: El hebreo dice literalmente «vio». En la frase completa, el sentido implícito de haber vivido lo suficiente para ver a su descendencia queda claro sin necesidad de explicitarlo en el texto principal.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus hijos varones
  - a sus hijos
  lexicon: HALOT
  rationale: Aunque el hebreo especifica «sus hijos varones», en español «hijos» puede abarcar el conjunto de hijos varones y funciona con naturalidad narrativa. Se evita una repetición extraña como «sus hijos varones» en una línea final de cierre, sin perder el referente masculino del contexto.
- source_word: בְּנֵי בָנָיו
  english_pob_choice: his grandsons
  chosen_spanish: a los hijos de sus hijos
  alternatives_spanish:
  - a sus nietos
  - a los hijos de sus hijos varones
  lexicon: HALOT
  rationale: El hebreo es literalmente «hijos de sus hijos». La POB inglesa optó por «grandsons» por idiomaticidad; en español, «los hijos de sus hijos» conserva la estructura hebrea y sigue siendo plenamente comprensible. «Nietos» sería más idiomático, pero pierde la repetición genética del original.
- source_word: אַרְבָּעָה דֹּרוֹת
  english_pob_choice: four generations
  chosen_spanish: cuatro generaciones
  alternatives_spanish:
  - hasta la cuarta generación
  - cuatro linajes
  lexicon: HALOT
  rationale: La expresión señala el alcance de la descendencia que Job alcanzó a ver. «Cuatro generaciones» es la forma más clara y fiel en español, equivalente a la elección inglesa.
theological_decisions:
- issue: Referencia a la descendencia masculina y su alcance generacional
  english_pob_reading: his sons and his grandsons, four generations
  chosen_spanish_reading: a sus hijos y a los hijos de sus hijos, cuatro generaciones
  alternative_spanish_readings:
  - a sus hijos y a sus nietos, cuatro generaciones
  - a sus hijos varones y a los hijos de sus hijos varones, cuatro generaciones
  rationale: El verso enfatiza la restauración visible de la línea familiar de Job. Se conserva el referente masculino del hebreo sin introducir una generalización que borre la forma concreta del original. La opción principal mantiene la tensión entre literalidad y naturalidad.
  doctrine_reference: Job 42:16; cf. la restauración narrativa de Job al final del libro
- issue: Expresión temporal final del relato
  english_pob_reading: After this
  chosen_spanish_reading: Después de esto
  alternative_spanish_readings:
  - Luego de esto
  - Después de aquellas cosas
  rationale: La frase funciona como cierre narrativo y transición temporal. «Después de esto» respeta esa función sin convertirla en una paráfrasis interpretativa.
  doctrine_reference: Job 42:16
translation_notes:
  revision_awareness: 'La redacción española sigue la lectura final del POB inglés en sentido general: mantiene «After this / Después de esto», el verbo simple «vio», y la descendencia como relación familiar visible. En lugar de depender del inglés como base ciega, se volvió al hebreo para decidir entre una traducción más literal («a los hijos de sus hijos») y una más idiomática («nietos»). Se optó por una solución intermedia que conserva la estructura hebrea sin sacrificar claridad.'
  spanish_consistency_notes:
  - Se usa «Job» como nombre propio estable.
  - Se mantiene «hijos» para el masculino específico del hebreo, sin convertirlo en un término genérico de género mixto.
  - Se conserva «generaciones» para דֹּרוֹת, evitando expansiones como «linaje» que no añade el plural explícito del texto.
  - El tono es sobrio y narrativo, apropiado para el cierre del libro.
