translation:
  language: es
  text: Pero si consagra a Yahvé un campo que ha comprado[a], y que no forma parte del campo de su heredad,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un campo que ha comprado», en contraste con la tierra que pertenece a su heredad ancestral.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Pero en caso de que
  lexicon: HALOT
  rationale: La partícula introduce una condición dentro de una serie legal. «Pero si» conserva el matiz de continuidad y leve contraste que el inglés POB expresó con «But if».
- source_word: שְׂדֵה מִקְנָתוֹ
  english_pob_choice: a field that he has bought
  chosen_spanish: un campo que ha comprado
  alternatives_spanish:
  - un campo comprado por él
  - un campo de su compra
  lexicon: HALOT
  rationale: La frase hebrea describe un campo adquirido por compra. En español, la construcción verbal es más natural que un calco nominal, y conserva la fuerza legal de propiedad adquirida frente a heredad.
- source_word: אֲשֶׁר לֹא מִשְּׂדֵה אֲחֻזָּתוֹ
  english_pob_choice: which is not part of the field of his inherited property
  chosen_spanish: que no forma parte del campo de su heredad
  alternatives_spanish:
  - que no pertenece al campo de su propiedad heredada
  - que no es parte del campo de su posesión hereditaria
  lexicon: HALOT
  rationale: אֲחֻזָּה en Levítico designa la posesión/heredad familiar de tierra. «Heredad» comunica bien el valor ancestral y legal en español bíblico sin recurrir a una formulación más pesada.
- source_word: יַקְדִּישׁ
  english_pob_choice: he consecrates
  chosen_spanish: consagra
  alternatives_spanish:
  - dedica
  - santifica
  lexicon: HALOT
  rationale: En Levítico 27 el verbo tiene un sentido cultual-legal de poner algo aparte para Yahvé. «Consagra» mantiene mejor ese valor técnico que «dedica».
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a Yahvé Dios
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como «Yahvé», conforme a la terminología POB en español y al valor directo del Tetragrámaton.
theological_decisions:
- issue: Renderización del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La base doctrinal del proyecto pide reproducir el nombre divino con una forma transparente. «Yahvé» es la forma establecida en el POB español para conservar el nombre del pacto, en lugar de la sustitución litúrgica «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Distinción entre tierra comprada y heredad ancestral
  english_pob_reading: a field that he has bought, which is not part of the field of his inherited property
  chosen_spanish_reading: un campo que ha comprado, que no forma parte del campo de su heredad
  alternative_spanish_readings:
  - un campo de compra, no perteneciente a la heredad
  - un campo adquirido, distinto de su heredad
  rationale: El contraste jurídico-teológico del versículo distingue propiedad adquirida de heredad ancestral. «Heredad» preserva el peso legal y familiar de אֲחֻזָּה sin diluirlo en un término genérico.
  doctrine_reference: Levítico 27:22; doctrina de fidelidad al contraste legal en la legislación de votos
translation_notes:
  revision_awareness: La revisión inglesa más reciente reemplazó la construcción más rígida «field of his purchase» por la forma más natural «a field that he has bought», manteniendo el contraste con la heredad ancestral. La presente versión española sigue esa decisión y evita un calco nominal como «campo de su compra».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino, conforme al proyecto español.
  - «Consagra» conserva el valor cultual-legal de יַקְדִּישׁ en Levítico 27.
  - «Heredad» se usa para אֲחֻזָּה por su carga de posesión ancestral y legal.
  - La nota a pie de página se ancla en «ha comprado[a]» para reflejar la alternativa lexical preservada por el POB inglés.
