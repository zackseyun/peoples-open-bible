translation:
  language: es
  text: ¿No haré yo a Jerusalén y a sus ídolos[a] lo mismo que hice a Samaria y a sus ídolos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo usa dos palabras distintas: para Samaria, «ídolos» (אֱלִילִים), y para Jerusalén, «imágenes/ídolos» (עֲצַבִּים).'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: shall I not
  chosen_spanish: ¿No haré yo…?
  alternatives_spanish:
  - ¿No voy a hacer yo…?
  - ¿No haré acaso yo…?
  lexicon: HALOT
  rationale: 'La pregunta retórica en primera persona futura/intencional se expresa naturalmente en español con futuro: «¿No haré yo…?». Conserva el valor enfático y la expectativa afirmativa del hebreo.'
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: lo mismo que
  alternatives_spanish:
  - así como
  - tal como
  lexicon: HALOT
  rationale: La comparación entre Samaria y Jerusalén exige una equivalencia clara. «Lo mismo que» transmite el paralelismo retórico sin sonar forzado.
- source_word: עָשִׂיתִי
  english_pob_choice: I did
  chosen_spanish: hice
  alternatives_spanish:
  - he hecho
  - actué contra
  lexicon: HALOT
  rationale: El pretérito simple comunica la acción ya consumada sobre Samaria y mantiene el tono de amenaza histórica del discurso.
- source_word: לְשֹׁמְרוֹן
  english_pob_choice: to Samaria
  chosen_spanish: a Samaria
  alternatives_spanish:
  - contra Samaria
  - para Samaria
  lexicon: HALOT
  rationale: En español, «a» conserva la relación del hebreo con עשה sin añadir una explicitación interpretativa que el texto no exige.
- source_word: וְלֶאֱלִילֶיהָ
  english_pob_choice: and her idols
  chosen_spanish: y a sus ídolos
  alternatives_spanish:
  - y a sus ídolos vanos
  - y a sus imágenes
  lexicon: HALOT
  rationale: «Ídolos» es el equivalente más claro y sobrio para אֱלִילִים; la referencia posesiva «sus» reproduce el sufijo pronominal femenino de Samaria.
- source_word: לִירוּשָׁלִַם
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - contra Jerusalén
  lexicon: HALOT
  rationale: Como con Samaria, se conserva la construcción básica con «a», dejando que el contexto hostil establezca la intención del juicio.
- source_word: וְלַעֲצַבֶּיהָ
  english_pob_choice: and her idols
  chosen_spanish: y a sus ídolos
  alternatives_spanish:
  - y a sus imágenes
  - y a sus ídolos tallados
  lexicon: HALOT
  rationale: Aunque el hebreo usa un término distinto de אֱלִילִים, en español «ídolos» comunica el mismo campo semántico y mantiene el paralelo retórico con Samaria. La diferencia lexical se preserva en una nota.
theological_decisions:
- issue: 'Dos términos hebreos distintos para ídolos: אֱלִילִים y עֲצַבִּים'
  english_pob_reading: Render both as 'idols' in the main text, with a footnote preserving the lexical distinction.
  chosen_spanish_reading: Traducir ambos como «ídolos» en el texto principal, con nota que preserve la distinción léxica.
  alternative_spanish_readings:
  - «imágenes» para el segundo término
  - «ídolos / imágenes talladas» en el cuerpo del texto
  rationale: El sentido retórico del versículo depende de equiparar Samaria y Jerusalén. Mantener «ídolos» en ambos miembros preserva la fuerza del paralelismo; la nota permite auditar la diferencia hebrea sin romper la fluidez española.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
translation_notes:
  revision_awareness: 'El borrador sigue el acuerdo alto del repaso final: no hubo cambios necesarios respecto del pase anterior, y se conserva la decisión auditada de mantener «ídolos» en ambos miembros del paralelismo con nota léxica.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; aquí no se presenta.
  - «ídolos» se usa de manera consistente para reproducir el paralelo retórico entre Samaria y Jerusalén.
  - El orden español conserva la pregunta retórica inicial y el paralelismo comparativo sin añadir elementos interpretativos ajenos al hebreo.
