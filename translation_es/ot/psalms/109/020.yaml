translation:
  language: es
  text: Esta es la retribución de mis acusadores de Yahvé[a], y de los que hablan mal contra mi vida[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Esta es la recompensa de mis adversarios de Yahvé». El sustantivo hebreo puede significar «obra», «hecho» o, por extensión, «retribución/recompensa», y שֹׂטְנַי también puede traducirse «mis adversarios».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «contra mi alma». Aquí נֶפֶשׁ probablemente significa «vida» o «yo mismo» en este contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  english_pob_choice: This is
  chosen_spanish: Esta es
  alternatives_spanish:
  - Esto es
  - Ésta es
  lexicon: HALOT
  rationale: El demostrativo femenino singular introduce una afirmación con cópula implícita. En español, «Esta es» reproduce de forma natural la estructura del hebreo sin añadir interpretación.
- source_word: פְּעֻלַּת
  english_pob_choice: reward
  chosen_spanish: retribución
  alternatives_spanish:
  - obra
  - hecho
  - recompensa
  - paga
  lexicon: HALOT
  rationale: El sustantivo puede significar 'obra/hecho' y, por extensión, 'retribución/recompensa'. Dado el contexto hostil y retributivo, «retribución» conserva el valor de lo que se les mide sin suavizarlo ni volverlo demasiado interpretativo.
- source_word: שֹׂטְנַי
  english_pob_choice: my accusers
  chosen_spanish: mis acusadores
  alternatives_spanish:
  - mis adversarios
  - los que se oponen a mí
  - mis atacantes
  lexicon: HALOT
  rationale: La base léxica permite el sentido de opositor/acusador. Aquí el contexto de habla hostil favorece «acusadores», que mantiene el matiz verbal y forense que destacó el POB en inglés.
- source_word: מֵאֵת
  english_pob_choice: from
  chosen_spanish: de parte de
  alternatives_spanish:
  - de
  - desde
  - por
  lexicon: HALOT
  rationale: En español, «de parte de» comunica con naturalidad origen o procedencia y conserva mejor la idea de que la retribución proviene de Yahvé, sin convertir la frase en una simple marcación de fuente abstracta.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como transliteración del Tetragrámaton, conforme a la decisión doctrinal del proyecto. «Yahvé» preserva el nombre personal de Dios sin sustituirlo por un título.
- source_word: וְהַדֹּבְרִים
  english_pob_choice: of those who speak
  chosen_spanish: y de los que hablan
  alternatives_spanish:
  - y de quienes hablan
  - y de los que dicen
  - y de los que pronuncian
  lexicon: HALOT
  rationale: La conjunción debe reflejarse, como mostró la revisión inglesa. «Los que hablan» es una equivalencia directa y fluida para el participio plural con artículo.
- source_word: רָע
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - malvadamente
  - daño
  - malicia
  lexicon: HALOT
  rationale: En combinación con «hablan», el adverbial/sustantivo funciona como contenido negativo de lo dicho. «Mal» preserva la fuerza moral del término sin forzarlo a una paráfrasis adverbial.
- source_word: עַל נַפְשִׁי
  english_pob_choice: against my life
  chosen_spanish: contra mi vida
  alternatives_spanish:
  - contra mi alma
  - contra mí
  - sobre mi vida
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar 'alma', 'ser' o 'vida'. En este contexto de amenaza e imprecación, «vida» comunica la concreción del peligro y sigue la decisión auditada del POB inglés.
theological_decisions:
- issue: Nombre divino en יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. La política del proyecto exige preservar el nombre divino en lugar de ocultarlo tras una sustitución titulada; por eso se usa «Yahvé».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de נֶפֶשׁ en el contexto
  english_pob_reading: against my life
  chosen_spanish_reading: contra mi vida
  alternative_spanish_readings:
  - contra mi alma
  - contra mí
  rationale: 'En este versículo la referencia no es principalmente doctrinal sino contextual: la agresión verbal recae sobre la persona y su vida. «Vida» evita confundir al lector con un sentido exclusivamente espiritual de «alma».'
  doctrine_reference: Lexical policy for נֶפֶשׁ in hostile contexts
translation_notes:
  revision_awareness: La revisión inglesa añadió explícitamente la conjunción antes de «those who speak evil», y esta versión española la conserva con «y de los que hablan mal». También se mantuvo la decisión auditada de traducir el Tetragrámaton como un nombre propio y no como una sustitución titulada.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo de dos grupos coordinados: «mis acusadores» y «los que hablan mal contra mi vida».'
  - Se evitó la formulación tradicional «el SEÑOR» para preservar la política del proyecto sobre יְהוָה.
  - «Contra mi vida» se eligió por claridad contextual y coherencia con el POB inglés, que prefirió «life» frente a «soul».
  - La frase completa conserva un tono poético sin añadir conceptos que no estén en el hebreo.
