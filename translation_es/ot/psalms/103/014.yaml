translation:
  language: es
  text: Porque él conoce nuestra hechura[a]; se acuerda de que somos polvo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestra formación» o «cómo somos formados». El término hebreo se refiere a lo que es formado o modelado.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduces la relación explicativa/causal con el versículo anterior. 'Porque' es natural en español y conserva la fuerza de fundamento.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - Dios
  - él mismo
  lexicon: HALOT
  rationale: El sujeto se entiende por el contexto; 'él' mantiene el énfasis del hebreo sin añadir explícitamente 'Dios', que no está en la línea.
- source_word: יָדַע
  english_pob_choice: knows
  chosen_spanish: conoce
  alternatives_spanish:
  - sabe
  - entiende
  lexicon: HALOT
  rationale: El perfecto qal expresa conocimiento estable y vigente. 'Conoce' suena natural en español y preserva la idea de conocimiento pleno y continuo.
- source_word: יִצְרֵנוּ
  english_pob_choice: our frame
  chosen_spanish: nuestra condición
  alternatives_spanish:
  - nuestra formación
  - nuestra estructura
  - cómo somos formados
  lexicon: HALOT
  rationale: יַצֵר refiere a lo formado o modelado. 'Condición' comunica la realidad de nuestra fragilidad creada sin forzar una imagen demasiado técnica; se ancla en la nota para mantener la alternativa más literal.
- source_word: זָכוּר
  english_pob_choice: he remembers
  chosen_spanish: se acuerda
  alternatives_spanish:
  - recuerda
  - está atento a
  lexicon: HALOT
  rationale: El hebreo funciona de manera predicativa respecto de la memoria continua de Dios. 'Se acuerda' es idiomático en español y mantiene la idea de recordar activamente.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: de que
  alternatives_spanish:
  - que
  lexicon: HALOT
  rationale: Introduce el contenido de lo que recuerda. 'De que' es la construcción natural en español tras 'se acuerda'.
- source_word: עָפָר
  english_pob_choice: dust
  chosen_spanish: polvo
  alternatives_spanish:
  - tierra
  - polvo de la tierra
  lexicon: HALOT
  rationale: '''Polvo'' es la equivalencia más directa y bíblicamente reconocible en español para la imagen de criatura frágil y mortal.'
- source_word: אֲנָחְנוּ
  english_pob_choice: we are
  chosen_spanish: somos
  alternatives_spanish:
  - estamos
  lexicon: HALOT
  rationale: 'El hebreo elíptico requiere copula en español. ''Somos'' reproduce de forma natural la afirmación nominal: ''somos polvo''.'
theological_decisions:
- issue: Imagen antropológica de la fragilidad humana
  english_pob_reading: Rendered עָפָר אֲנָחְנוּ as 'we are dust' to preserve the text's emphasis on mortality and creaturely weakness.
  chosen_spanish_reading: '''somos polvo'' preserva la imagen de fragilidad y mortalidad sin suavizarla con añadidos interpretativos.'
  alternative_spanish_readings:
  - somos apenas polvo
  - somos solo polvo
  rationale: El texto afirma la pequeñez creatural humana ante la memoria compasiva de Dios. Evito intensificadores como 'apenas' o 'solo' porque añaden énfasis no explícito en el hebreo.
  doctrine_reference: Preservar la tensión teológica del texto y la primacía del lenguaje fuente sobre fórmulas tradicionales.
translation_notes:
  revision_awareness: Conforme al registro auditado, no hubo revisiones aplicadas en la fuente inglesa; se mantiene la misma lectura de alta concordancia. Se corrigió la ancla de nota para que el marcador [a] aparezca en el texto español.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque el texto hebreo aquí no contiene el nombre divino explícito en esta línea, sino un sujeto implícito por contexto.
  - '''polvo'' conserva la imagen bíblica de fragilidad sin añadir ''solo'' o ''apenas''.'
  - '''nuestra condición'' es una solución idiomática para יִצְרֵנוּ, con nota que preserva la alternativa más literal.'
