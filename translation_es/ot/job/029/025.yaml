translation:
  language: es
  text: Elegí su camino y me senté a la cabeza[a]; habité como rey entre las tropas[b], como quien consuela a los dolientes[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Elegí su curso y me senté a la cabeza». El hebreo puede entenderse como que Job seleccionaba o aprobaba el camino que otros debían tomar, y luego ocupaba el lugar de liderazgo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «como rey en la tropa» o «en la banda». El hebreo גְּדוּד puede referirse a una tropa, banda o compañía.'
    reason: lexical_alternative
  - marker: c
    text: La comparación final es difícil. El hebreo puede significar «como quien consuela a los dolientes», enfatizando el papel consolador de Job aun mientras ocupa un lugar de honor.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶבֲחַר
  english_pob_choice: I chose
  chosen_spanish: Elegí
  alternatives_spanish:
  - Escogí
  - Elegía
  lexicon: HALOT
  rationale: El qal imperfecto 1cs en este contexto retrospectivo se entiende como acción pasada. "Elegí" conserva la fuerza activa de seleccionar o aprobar una dirección, sin sonar rígido en español.
- source_word: דַּרְכָּם
  english_pob_choice: their way
  chosen_spanish: su camino
  alternatives_spanish:
  - su senda
  - su curso
  lexicon: HALOT
  rationale: דֶּרֶךְ puede significar camino, ruta o curso. "Su camino" es natural en español y mantiene la idea de la dirección o conducta que Job aprobaba o establecía.
- source_word: וְאֵשֵׁב רֹאשׁ
  english_pob_choice: and sat as chief
  chosen_spanish: y me senté como jefe
  alternatives_spanish:
  - y me senté a la cabeza
  - y tomé asiento como líder
  lexicon: HALOT
  rationale: La construcción con רֹאשׁ expresa posición de liderazgo. "Como jefe" preserva la imagen de ocupar el primer puesto y es claro para el lector español.
- source_word: וְאֶשְׁכּוֹן
  english_pob_choice: I dwelt
  chosen_spanish: habité
  alternatives_spanish:
  - viví
  - permanecí
  lexicon: HALOT
  rationale: שכן expresa habitar, residir o permanecer. "Habité" conserva el registro poético y el paralelismo con la comparación siguiente.
- source_word: כְּמֶלֶךְ
  english_pob_choice: like a king
  chosen_spanish: como rey
  alternatives_spanish:
  - como un rey
  - cual rey
  lexicon: HALOT
  rationale: El prefijo כ marca comparación. "Como rey" mantiene la imagen comparativa sin añadir elementos innecesarios; el artículo indefinido puede omitirse en español por estilo poético.
- source_word: בַּגְּדוּד
  english_pob_choice: among the troops
  chosen_spanish: entre las tropas
  alternatives_spanish:
  - en la tropa
  - entre la banda
  lexicon: HALOT
  rationale: גְּדוּד puede referirse a tropa, banda o compañía armada. "Entre las tropas" comunica con naturalidad la escena de un rey en medio de su gente sin cerrar indebidamente el matiz colectivo.
- source_word: כַּאֲשֶׁר
  english_pob_choice: like one who
  chosen_spanish: como quien
  alternatives_spanish:
  - como el que
  - así como quien
  lexicon: HALOT
  rationale: Aquí la partícula introduce una comparación que en español se expresa con naturalidad como "como quien". La forma mantiene la ambigüedad del hebreo sin recargarla.
- source_word: אֲבֵלִים
  english_pob_choice: mourners
  chosen_spanish: a los dolientes
  alternatives_spanish:
  - a los que lloran
  - a los enlutados
  lexicon: HALOT
  rationale: El participio plural designa personas en duelo. "Dolientes" es una opción digna y natural en español, y conserva el tono humano del pasaje.
- source_word: יְנַחֵם
  english_pob_choice: comforts
  chosen_spanish: consuela
  alternatives_spanish:
  - conforta
  - alivia
  lexicon: HALOT
  rationale: El piel de נחם aquí significa consolar o confortar. "Consuela" es la opción más clara y usual en español, y mantiene el sentido de alguien que apacigua el dolor de los que están de duelo.
theological_decisions:
- issue: La comparación final puede entenderse como una escena de consuelo o como una formulación de honor real en medio de un grupo.
  english_pob_reading: The final comparison is difficult. The Hebrew may mean 'like one who comforts mourners,' emphasizing Job's consoling role even while holding a place of honor.
  chosen_spanish_reading: como quien consuela a los dolientes
  alternative_spanish_readings:
  - como rey entre los que lloran
  - como quien da consuelo a los enlutados
  rationale: Se mantiene la lectura que resalta el papel consolador de Job, porque es la opción destacada en el audit trail inglés y encaja con el paralelo poético del versículo. La ambigüedad no se elimina del todo, pero se expresa de manera transparente en la nota.
  doctrine_reference: Job 29:25; comparación poética sin implicación doctrinal específica
translation_notes:
  revision_awareness: El borrador sigue el estado revisado del expediente inglés, que no presenta cambios aplicados y muestra alta concordancia. Por eso se conserva la solución óptima ya auditada, con notas breves para las ambigüedades léxicas finales.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" solo cuando el texto lo exija; este versículo no contiene el nombre divino.
  - Se evita "SEÑOR" como sustituto automático, porque aquí no corresponde.
  - '"Dolientes" se usa para reflejar el campo semántico de duelo sin imponer un registro eclesiástico rígido.'
  - Las notas usan marcadores únicos y corresponden exactamente a los anclajes del texto.
