translation:
  language: es
  text: para guiar a los hombres en obras de rectitud[a][b], en el temor de Dios, para ponerlos a todos ante el Señor[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en obras justas».
    reason: lexical_alternative
  - marker: b
    text: O «en obras de justicia».
    reason: lexical_alternative
