base_translation:
  language: en
  yaml_path: translation/ot/daniel/003/022.yaml
  text: Because of this[a], because the king’s command was urgent and the furnace had been heated exceedingly, the flame of the fire killed those men who brought up Shadrach, Meshach[b], and Abed-nego.
  footnotes:
  - marker: a
    text: Or 'the blaze of the fire killed them'; the Aramaic שְׁבִיבָא may be rendered 'flame,' 'blaze,' or 'fiery burst.'
    reason: lexical_alternative
  - marker: b
    text: The verb rendered 'brought up' literally has an upward directional sense; it does not itself specify 'threw in.'
    reason: lexical_alternative
