id: HEB.2.3
reference: Hebrews 2:3
source:
  edition: SBLGNT
  text: πῶς ἡμεῖς ἐκφευξόμεθα τηλικαύτης ἀμελήσαντες σωτηρίας, ἥτις, ἀρχὴν λαβοῦσα λαλεῖσθαι διὰ τοῦ κυρίου, ὑπὸ τῶν ἀκουσάντων εἰς ἡμᾶς ἐβεβαιώθη,
translation:
  text: How will we escape if we neglect so great a salvation? This salvation[a], having at first been spoken through the Lord, was confirmed to us by those who heard him,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which, after first being spoken through the Lord, was confirmed to us by those who heard.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πῶς
  chosen: how
  alternatives:
  - how can
  - in what way
  lexicon: BDAG
  rationale: Introduces a rhetorical question of impossibility or severe difficulty. 'How will we escape' preserves the force without overinterpreting it as explicit impossibility.
- source_word: ἐκφευξόμεθα
  chosen: will we escape
  alternatives:
  - shall we escape
  - can we escape
  lexicon: BDAG
  rationale: Future middle indicative naturally yields 'will we escape.' In context it is rhetorical, implying that escape will not occur, but the translation preserves the question form rather than converting it into a statement.
- source_word: τηλικαύτης
  chosen: so great a
  alternatives:
  - such a great
  - such
  lexicon: BDAG
  rationale: An idiomatic English rendering before a singular noun. It preserves the emphatic magnitude of the salvation.
- source_word: ἀμελήσαντες
  chosen: if we neglect
  alternatives:
  - having neglected
  - by neglecting
  lexicon: BDAG
  rationale: 'Although formally an aorist participle (''having neglected''), English idiom in this warning context is best represented by a conditional sense: ''if we neglect.'' This captures the participle''s attendant circumstance in relation to the main verb without wooden awkwardness.'
- source_word: σωτηρίας
  chosen: salvation
  alternatives:
  - deliverance
  lexicon: BDAG
  rationale: '''Salvation'' is the standard and contextually appropriate rendering in Hebrews, carrying both rescue and eschatological-redemptive weight.'
- source_word: ἥτις
  chosen: This salvation
  alternatives:
  - which
  - and it
  lexicon: BDAG
  rationale: The relative pronoun refers back to 'salvation' and has a slightly qualitative/explanatory force. Repeating 'This salvation' in English makes the referent clear and reads naturally.
- source_word: ἀρχὴν λαβοῦσα
  chosen: having first begun
  alternatives:
  - having received a beginning
  - which at first began
  lexicon: BDAG
  rationale: The idiom literally means 'having taken a beginning.' 'Having first begun' is natural English and preserves the temporal sense that the message had its initial proclamation through the Lord.
- source_word: λαλεῖσθαι
  chosen: to be spoken
  alternatives:
  - to be proclaimed
  - to be announced
  lexicon: BDAG
  rationale: The passive infinitive is retained with 'to be spoken.' 'Proclaimed' is possible, but 'spoken' stays closer to the Greek while remaining clear.
- source_word: διὰ τοῦ κυρίου
  chosen: through the Lord
  alternatives:
  - by the Lord
  lexicon: BDAG
  rationale: διά with genitive commonly expresses agency or instrumentality. 'Through the Lord' preserves the Greek preposition and the mediating sense. 'Lord' follows the doctrinal default for κύριος.
- source_word: κυρίου
  chosen: the Lord
  alternatives:
  - the Master
  lexicon: BDAG
  rationale: Per the doctrine's contested-terms guidance, κύριος is rendered 'Lord.' In Hebrews 2:3 the referent is Jesus, and 'Lord' is the established title that preserves the christological force.
- source_word: ὑπὸ τῶν ἀκουσάντων
  chosen: by those who heard him
  alternatives:
  - by the hearers
  - by those who heard
  lexicon: BDAG
  rationale: The aorist participle denotes those who heard the Lord directly. Supplying 'him' clarifies the implied object from context and avoids ambiguity in English.
- source_word: εἰς ἡμᾶς
  chosen: to us
  alternatives:
  - for us
  - among us
  lexicon: BDAG
  rationale: In this context εἰς conveys direction toward the recipients of the confirmed message. 'To us' is the most natural rendering.
- source_word: ἐβεβαιώθη
  chosen: was confirmed
  alternatives:
  - was attested
  - was established
  lexicon: BDAG
  rationale: The passive verb indicates that the message/salvation was validated for the audience by eyewitness hearers. 'Was confirmed' is both accurate and idiomatic.
