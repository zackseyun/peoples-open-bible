  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo ni otros términos sensibles del glosario. La decisión sobre מָרוֹם debe seguir preservando la ambigüedad mediante nota al pie más completa.
