review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: Levi enseña los juicios de Dios a Jacob y su ley a Israel, y presenta incienso y ofrendas totalmente consumidas sobre el altar. También preserva correctamente el antropomorfismo de בְּאַפֶּךָ mediante una nota. Sin embargo, hay ajustes menores de fidelidad y naturalidad en español: el plural ''holocaustos completos'' suena poco idiomático para כָּלִיל, y la nota b contiene una mezcla impropia de español e inglés (''en/at'').'
  spanish_quality_summary: La redacción general es clara y digna, pero 'holocaustos completos' resulta algo forzada en español bíblico y puede sonar mecánica. 'holocaustos' por sí solo ya comunica normalmente una ofrenda totalmente quemada. La nota cultural necesita español más limpio y natural. El resto del verso fluye bien.
  glossary_alignment: Se mantiene correctamente 'ley' para תּוֹרָה con alternativa 'instrucción' en nota, 'juicios' para מִשְׁפָּטֶיךָ, e 'incienso' para קְטוֹרָה. No hay conflicto con la terminología del proyecto. La elección 'holocaustos' alinea mejor el uso cultual español que 'holocaustos completos'.
  issues:
  - severity: medium
    issue: '''holocaustos completos'' es poco idiomático para וְכָלִיל'
    rationale: Aunque intenta reflejar la idea de totalidad, en español bíblico 'holocausto' ya implica ofrenda enteramente quemada. Añadir 'completos' suena redundante y menos natural. 'holocaustos' preserva mejor el sentido y la legibilidad.
  - severity: low
    issue: 'La nota b mezcla español e inglés: ''en/at tu nariz'''
    rationale: La glosa literal debe estar en español natural y preciso. Una formulación como 'Literalmente, «en tu nariz» o «a tu nariz»' comunica mejor la imagen antropomórfica sin mezclar idiomas.
  revised_spanish_text: Enseñarán tus juicios a Jacob y tu ley a Israel[a][b]; pondrán incienso delante de ti y holocaustos sobre tu altar.
  revised_footnotes:
  - marker: a
    text: O "tu instrucción" para תּוֹרָה.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, "en tu nariz" o "a tu nariz"; expresión antropomórfica para incienso presentado ante Dios.
    reason: cultural_note
  revision_rationale: 'Se hizo una reparación menor para mejorar la naturalidad y fidelidad funcional del español: ''holocaustos completos'' se simplificó a ''holocaustos'', ya que el término español ya incorpora la idea de una ofrenda totalmente quemada. También se normalizó la nota antropomórfica al español, eliminando la mezcla con inglés.'
