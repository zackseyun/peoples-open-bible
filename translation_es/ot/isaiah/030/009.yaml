translation:
  language: es
  text: Porque ellos son un pueblo rebelde, hijos mentirosos[a], hijos que no quisieron oír[b] la ley[c] de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hijos engañosos» o «hijos que mienten».
    reason: lexical_alternative
  - marker: b
    text: O «hijos que rehúsan oír» o «hijos que no están dispuestos a escuchar».
    reason: lexical_alternative
  - marker: c
    text: O «la instrucción de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque en efecto
  lexicon: HALOT
  rationale: Introduces la explicación o motivo del juicio profético anterior. «Porque» conserva la fuerza explicativa de modo natural en español.
- source_word: עַם
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - gente
  - nación
  lexicon: HALOT
  rationale: El sustantivo colectivo apunta a la comunidad en conjunto. «Pueblo» mantiene mejor el sentido corporativo y pactal que «gente».
- source_word: מְרִי
  english_pob_choice: rebellious
  chosen_spanish: rebelde
  alternatives_spanish:
  - rebeldía
  - obstinado
  - rebelde y obstinado
  lexicon: HALOT
  rationale: En aposición con «pueblo», el valor adjetival funciona mejor en español. «Rebelde» conserva el peso moral y de alianza del término hebreo sin sobreexplicar.
- source_word: בָּנִים
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos e hijas
  - niños
  - descendientes
  lexicon: HALOT
  rationale: El hebreo usa una metáfora filial. «Hijos» reproduce la imagen de parentesco más de cerca; el contexto no exige neutralizarla a «niños».
- source_word: כֶּחָשִׁים
  english_pob_choice: lying
  chosen_spanish: mentirosos
  alternatives_spanish:
  - engañosos
  - falsos
  - los que mienten
  lexicon: HALOT
  rationale: El término describe a quienes se caracterizan por la falsedad. «Mentirosos» conserva la acusación directa y breve del hebreo.
- source_word: לֹא אָבוּ שְׁמֹעַ
  english_pob_choice: unwilling to hear
  chosen_spanish: que no quisieron escuchar
  alternatives_spanish:
  - que no estaban dispuestos a oír
  - que se negaron a escuchar
  - que no quisieron oír
  lexicon: HALOT
  rationale: El hebreo expresa voluntad/rechazo, no mera incapacidad. «No quisieron escuchar» preserva la resistencia obstinada y mantiene la construcción verbal natural en español.
- source_word: תּוֹרַת
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  - la enseñanza
  lexicon: HALOT
  rationale: En contexto profético y de pacto, «ley» comunica mejor el carácter normativo y autoritativo de תּוֹרָה; «instrucción» queda como alternativa lexical legítima.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se preserva el nombre divino en español como «Yahvé», conforme al criterio del proyecto para יְהוָה, en vez de sustituirlo por un título.
theological_decisions:
- issue: El nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton de forma directa. La forma española del proyecto es «Yahvé», que preserva el nombre propio revelado sin el reemplazo tradicional por un título.
  doctrine_reference: 'DOCTRINE.md: contested terms — יְהוָה / YHWH → Yahvé'
- issue: Valor de תּוֹרָה en contexto profético de pacto
  english_pob_reading: the law
  chosen_spanish_reading: la ley
  alternative_spanish_readings:
  - la instrucción
  - la enseñanza
  rationale: El contexto denuncia la negativa a oír la autoridad pactal de Yahvé. «La ley» conserva mejor el peso jurídico y covenantal que «instrucción», aunque esta sigue siendo una alternativa legítima.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de «this is» a «they are» para concordar con el sujeto plural; el español mantiene desde el inicio la pluralidad explícita con «ellos son». También se preservó la tensión léxica de כֶּחָשִׁים, que puede entenderse como «mentirosos» o, de forma más dinámica, «engañosos».
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se eligió «ley» en el cuerpo por su fuerza normativa, dejando «instrucción» en nota como alternativa.
  - «Hijos» conserva la metáfora filial del hebreo; no se neutraliza a «descendientes» porque el original enfatiza la relación y la acusación.
  - La negación se tradujo como rechazo voluntario («no quisieron escuchar») para reflejar אָבוּ más que una mera falta de comprensión.
