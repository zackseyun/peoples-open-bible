  to: Pero el mal vendrá sobre ti[a]; no sabrás cómo conjurarlo. Y caerá sobre ti la desgracia[b]; no podrás apartarla. Y la ruina vendrá sobre ti de repente; no lo sabrás.
  rationale: Se corrige 'expirarla' por 'apartarla' para reflejar con fidelidad y buen español el valor contextual de כַּפְּרָהּ según el expediente auditado, preservando en nota las alternativas más literales. Se ajusta 'vendrá sobre ti la desgracia' a 'caerá sobre ti la desgracia' para reflejar mejor תִפֹּל. Se elimina la nota innecesaria sobre 'de repente' y se sustituye 'no la conocerás' por 'no lo sabrás', que suena natural en español y conserva el sentido de desconocimiento repentino del juicio.
