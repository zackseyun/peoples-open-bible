translation_notes:
  revision_awareness: El texto sigue la revisión inglesa más reciente que precisó «of the temple foliage»; por eso se refleja el genitivo con «del follaje del templo» en vez de una construcción con «de» más libre. También se conserva la ambigüedad del griego en la frase sobre lo «habitual» mediante una nota alternativa, sin expandirla más allá de lo que el texto permite.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece el nombre divino en este pasaje.
  - Se prefirió «corona de oro» y no «guirnalda» para conservar la imagen de ofrenda/cortesía contextual.
  - «Palma» se usa como forma breve y literariamente natural; la nota preserva la alternativa más explícita «rama de palma».
  - «Guardó silencio» interpreta la locución idiomática de manera funcional y coherente con el contexto narrativo.
