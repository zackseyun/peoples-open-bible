base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/025/002.yaml
  text: Now there was a man in Maon whose business was in Carmel[a]. The man was very wealthy, and he had three thousand sheep and a thousand goats[b]. He was shearing his sheep in Carmel.
  footnotes:
