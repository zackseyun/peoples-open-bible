translation:
  language: es
  text: Además[a], sí es mi hermana —la hija de mi padre, pero no la hija de mi madre—, y llegó a ser mi esposa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Y en verdad es mi hermana, hija de mi padre, pero no hija de mi madre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: Besides
  chosen_spanish: Además
  alternatives_spanish:
  - Y también
  - Por otra parte
  - Además de eso
  lexicon: HALOT
  rationale: La partícula añade una afirmación a la defensa de Abraham. «Además» reproduce bien la fuerza aditiva y discursiva sin sonar tan coloquial como «por otra parte» ni tan pesada como una coordinación literal.
- source_word: אָמְנָה
  english_pob_choice: really
  chosen_spanish: sí
  alternatives_spanish:
  - realmente
  - de veras
  - ciertamente
  lexicon: HALOT
  rationale: Aquí la partícula enfatiza la veracidad de la afirmación. En español, «sí es» expresa con naturalidad esa afirmación enfática dentro de una frase explicativa; «ciertamente» o «realmente» serían más explícitos pero menos fluidos en este contexto.
- source_word: אֲחֹתִי
  english_pob_choice: my sister
  chosen_spanish: mi hermana
  alternatives_spanish:
  - mi hermana propia
  - mi parienta
  lexicon: HALOT
  rationale: Kinship directo con sufijo de primera persona; «mi hermana» es la equivalencia natural y precisa.
- source_word: בַת אָבִי
  english_pob_choice: the daughter of my father
  chosen_spanish: la hija de mi padre
  alternatives_spanish:
  - la hija de mi padre propio
  - mi hermana por parte de padre
  lexicon: HALOT
  rationale: Mantiene el paralelismo explicativo del hebreo y deja claro en qué sentido es hermana. Se evita «por parte de padre» porque añade interpretación no explícita del texto.
- source_word: אַךְ לֹא
  english_pob_choice: though not
  chosen_spanish: aunque no
  alternatives_spanish:
  - pero no
  - si bien no
  - salvo que no
  lexicon: HALOT
  rationale: La relación es concesiva/limitativa. «Aunque no» comunica mejor esa tensión que una simple adversativa fuerte como «pero no».
- source_word: בַת אִמִּי
  english_pob_choice: the daughter of my mother
  chosen_spanish: la hija de mi madre
  alternatives_spanish:
  - mi hermana por parte de madre
  - la hija de mi madre propia
  lexicon: HALOT
  rationale: 'Se conserva la simetría con la cláusula anterior y la precisión de la restricción: no comparten la misma madre.'
- source_word: וַתְּהִי לִי לְאִשָּׁה
  english_pob_choice: and she became my wife
  chosen_spanish: y llegó a ser mi esposa
  alternatives_spanish:
  - y se convirtió en mi esposa
  - y fue mi esposa
  - y pasó a ser mi esposa
  lexicon: HALOT
  rationale: El wayyiqtol con לְאִשָּׁה expresa ingreso al estado de matrimonio. «Llegó a ser» preserva el valor eventivo mejor que «fue» y suena más natural que una traducción demasiado literal.
theological_decisions:
- issue: Término de parentesco y matrimonio sin suavizar la tensión moral del relato
  english_pob_reading: Besides, she really is my sister... and she became my wife.
  chosen_spanish_reading: Además, sí es mi hermana... y llegó a ser mi esposa.
  alternative_spanish_readings:
  - Además, en verdad es mi hermana... y se casó conmigo.
  - Además, realmente es mi hermana... y fue mi esposa.
  rationale: 'No se elimina la tensión narrativa del pasaje: Abraham presenta una verdad parcial sobre el parentesco y afirma el estado matrimonial. «Llegó a ser mi esposa» conserva el hecho sin convertirlo en una formulación interpretativa más amplia que la del hebreo.'
  doctrine_reference: Lectura narrativa de Génesis 20:12; coherencia con la semántica del hebreo bíblico del parentesco y el matrimonio.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés: additive וְגַם como «Además», אָמְנָה como énfasis afirmativo natural en español, la doble aclaración genealógica con paralelismo, y el valor eventivo de וַתְּהִי como entrada al estado matrimonial. No hubo revisiones aplicadas en el contexto inglés; la versión española refleja ese estado estable.'
  spanish_consistency_notes:
  - Se mantiene «esposa» como término contemporáneo y claro para לְאִשָּׁה en este contexto narrativo.
  - Se conserva el paralelismo «la hija de mi padre / la hija de mi madre» para no desdibujar la precisión relacional del hebreo.
  - La puntuación con dos puntos y punto y coma reproduce la estructura explicativa y concesiva del original sin sobrecargarla.
