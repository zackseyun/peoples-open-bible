revisions:
- from: Ella es una vara de fuerza y un apoyo[a], alabanza y honra eterna para todo el que camina tras ella.
  to: Ella es un bastón de fortaleza y un apoyo[a], alabanza y honra eterna para todo el que camina tras ella.
  rationale: Se ajusta solo la primera imagen nominal para mejorar la naturalidad y dignidad del español sin apartarse del hebreo ni del razonamiento léxico del English POB. 'Bastón de fortaleza' conserva la metáfora de apoyo robusto y evita el calco algo tosco 'vara de fuerza'.
