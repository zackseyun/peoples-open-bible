    reason: lexical_alternative
  - marker: c
    text: 'El verbo evoca una imagen de inundación: «su ejército desbordará / será barrido».'
    reason: lexical_alternative
  revision_rationale: 'La revisión hace dos ajustes menores para reflejar mejor la evidencia fuente y el audit trail del POB: «su comida» expresa con más naturalidad el modismo hebreo de provisión de mesa, y «será barrido» conserva mejor la imagen de inundación/arrastre de יִשְׁטוֹף que «será arrasado». Se mantienen la estructura y el sentido general del borrador.'
