translation:
  language: es
  text: 'Entonces Abram dijo a Sarai: «Mira, tu esclava está en tu mano; haz con ella lo que bien te parezca». Entonces Sarai la afligió[a], y ella huyó de su presencia.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la maltrató» / «la trató con dureza». El verbo hebreo puede denotar aflicción, humillación o trato severo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Ve
  lexicon: HALOT
  rationale: ‘Mira’ funciona como marcador discursivo natural en español y conserva la fuerza de atención del hebreo sin sonar arcaico.
- source_word: שִׁפְחָתֵךְ
  english_pob_choice: your female slave
  chosen_spanish: tu esclava
  alternatives_spanish:
  - tu sierva
  - tu criada
  - tu esclava mujer
  lexicon: HALOT
  rationale: ‘Esclava’ preserva el estatus ligado y dependiente de Hagar; evita suavizar el término con ‘sierva’ o ‘criada’, que en español pueden sonar menos fuertes y no reflejan bien la relación de propiedad/autoridad implícita.
- source_word: בְּיָדֵךְ
  english_pob_choice: in your hand
  chosen_spanish: está en tu mano
  alternatives_spanish:
  - está bajo tu autoridad
  - está en tu poder
  lexicon: HALOT
  rationale: La expresión conserva el hebraísmo y su sentido de control/autoridad. En español suena natural sin borrar la imagen corporal del original.
- source_word: עֲשִׂי לָהּ
  english_pob_choice: do to her
  chosen_spanish: haz con ella
  alternatives_spanish:
  - trátala
  - hazle
  lexicon: HALOT
  rationale: ‘Haz con ella’ sigue de cerca la estructura del hebreo y encaja con la frase siguiente sin añadir especificación que el texto no da.
- source_word: הַטּוֹב בְּעֵינַיִךְ
  english_pob_choice: what is good in your eyes
  chosen_spanish: lo que bien te parezca
  alternatives_spanish:
  - lo que te parezca bueno
  - lo que sea bueno a tus ojos
  lexicon: HALOT
  rationale: Se conserva el sentido idiomático del hebreo con una expresión natural en español. La opción evita una calca dura como ‘lo bueno en tus ojos’.
- source_word: וַתְּעַנֶּהָ
  english_pob_choice: afflicted her
  chosen_spanish: la afligió
  alternatives_spanish:
  - la maltrató
  - la humilló
  - la trató con dureza
  lexicon: HALOT
  rationale: ‘Afligió’ mantiene la gravedad del verbo ענה sin especificar una forma concreta de abuso que el verso no detalla. Se preserva la tensión semántica entre sufrimiento, humillación y trato duro.
- source_word: וַתִּבְרַח
  english_pob_choice: she fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - salió huyendo
  lexicon: HALOT
  rationale: ‘Huyó’ comunica el evento con sobriedad narrativa y mantiene la seriedad del verbo.
- source_word: מִפָּנֶיהָ
  english_pob_choice: from her presence
  chosen_spanish: de su presencia
  alternatives_spanish:
  - de delante de ella
  - lejos de ella
  lexicon: HALOT
  rationale: ‘De su presencia’ reproduce el valor relacional del hebreo y es suficientemente natural en español bíblico contemporáneo.
theological_decisions:
- issue: Estatus social de Hagar
  english_pob_reading: female slave
  chosen_spanish_reading: esclava
  alternative_spanish_readings:
  - sierva
  - criada
  rationale: El pasaje presenta una relación de dominio doméstico real; ‘esclava’ conserva la fuerza social y ética del texto. No se atenúa el vínculo a un servicio genérico.
  doctrine_reference: Translation philosophy §1; términos de estatus ligado
- issue: Intensidad de וַתְּעַנֶּהָ
  english_pob_reading: afflicted her
  chosen_spanish_reading: la afligió
  alternative_spanish_readings:
  - la maltrató
  - la humilló
  - la trató con dureza
  rationale: El hebreo admite varias intensidades de sufrimiento o vejación. ‘La afligió’ mantiene la amplitud semántica y evita resolver de antemano el tipo exacto de maltrato.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se introdujeron cambios adicionales respecto del audit trail inglés; se mantuvieron las decisiones de estatus social y de ambigüedad semántica en וַתְּעַנֶּהָ con equivalentes transparentes en español.'
  spanish_consistency_notes:
  - Se prefirió ‘esclava’ por coherencia con la política del proyecto de no suavizar el lenguaje de estatus ligado cuando es relevante.
  - Se usó ‘de su presencia’ para mantener el hebraísmo relacional sin perder naturalidad.
  - La puntuación y el diálogo siguen un registro bíblico moderno y publicable en español.
