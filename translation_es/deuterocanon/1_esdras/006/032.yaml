  to: Por tanto, que Yahvé[a], cuyo nombre ha sido invocado allí, destruya a todo rey y a toda nación que extienda su mano para impedir o dañar aquella casa de Yahvé en Jerusalén.
  rationale: Se elimina la nota b por innecesaria y se suaviza la frase final quitando el segundo «allí», que en español suena redundante sin aportar un matiz que no quede ya expresado por «en Jerusalén». Se conserva la nota a porque documenta una alternativa literal significativa presente en la auditoría inglesa.
