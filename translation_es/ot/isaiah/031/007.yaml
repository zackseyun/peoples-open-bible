    issue: Falta una nota al pie para la cláusula «que sus manos hicieron para ustedes».
    rationale: El inglés POB conserva una alternativa significativa para אֲשֶׁר עָשׂוּ לָכֶם יְדֵיכֶם («which your own hands made for yourselves»). El español debe preservar esa opción documentalmente.
  - severity: medium
    issue: «Como pecado» es menos natural en español que «como un pecado».
    rationale: El hebreo final חֵטְא es abrupto y apposicional; en español, el artículo indefinido ayuda a expresar esa relación con naturalidad sin perder fuerza. Además, armoniza con la revisión inglesa final «as a sin».
