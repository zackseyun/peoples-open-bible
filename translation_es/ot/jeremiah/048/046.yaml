translation:
  language: es
  text: ¡Ay de ti, Moab! El pueblo de Quemos ha perecido, porque tus hijos varones han sido llevados cautivos[a], y tus hijas, en cautiverio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en cautiverio» también para el primer miembro; los dos términos hebreos son casi sinónimos y forman un paralelo poético.
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de ti!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de ti, Moab!
  lexicon: HALOT
  rationale: En español, «¡Ay de ti!» conserva el tono profético de lamentación y juicio de «Woe», sin sonar tan arcaico como una mera transliteración del interjección inglesa. Se mantiene el objeto directo de la lamentación con claridad.
- source_word: לְךָ מוֹאָב
  english_pob_choice: to you, Moab
  chosen_spanish: de ti, Moab
  alternatives_spanish:
  - a ti, Moab
  - para ti, Moab
  lexicon: HALOT
  rationale: El hebreo לְךָ marca al destinatario del clamor. En español, «de ti» dentro de «¡Ay de ti!» reproduce bien la relación del lamento y suena natural en estilo profético.
- source_word: כְּמוֹשׁ
  english_pob_choice: Chemosh
  chosen_spanish: Quemos
  alternatives_spanish:
  - Chemosh
  lexicon: HALOT
  rationale: Se emplea la transliteración española habitual «Quemos» para el nombre del dios moabita, manteniendo un registro bíblico legible en español.
- source_word: אָבַד
  english_pob_choice: have perished
  chosen_spanish: ha perecido
  alternatives_spanish:
  - ha sido destruido
  - se ha arruinado
  lexicon: HALOT
  rationale: «Perecido» comunica bien la ruina completa del pueblo y conserva la fuerza verbal de אָבַד sin añadir un agente explícito que el hebreo no expresa aquí.
- source_word: עַם כְּמוֹשׁ
  english_pob_choice: the people of Chemosh
  chosen_spanish: el pueblo de Quemos
  alternatives_spanish:
  - la gente de Quemos
  - el pueblo perteneciente a Quemos
  lexicon: HALOT
  rationale: 'La cadena constructa se vierte de forma directa: el pueblo asociado con Quemos. «Pueblo» preserva la identificación colectiva y la carga teológica del texto.'
- source_word: לֻקְּחוּ
  english_pob_choice: have been taken
  chosen_spanish: han sido llevados
  alternatives_spanish:
  - han sido tomados
  - fueron llevados
  lexicon: HALOT
  rationale: El pasivo de לקח en este contexto se expresa de modo natural como «han sido llevados», que en español transmite la idea de deportación/captura sin sobrecargar la frase.
- source_word: בָנֶיךָ
  english_pob_choice: your sons
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus varones
  - tus hijos varones
  lexicon: HALOT
  rationale: Aunque el inglés POB mantiene «sons», en español «hijos» suele cubrir el masculino plural dentro del contraste hijos/hijas de forma fluida; el contexto inmediato distingue el paralelismo sexual explícito.
- source_word: בַּשֶּׁבִי
  english_pob_choice: into captivity
  chosen_spanish: cautivos
  alternatives_spanish:
  - en cautiverio
  - a la cautividad
  lexicon: HALOT
  rationale: Para «בַּשֶּׁבִי» se opta por el adjetivo/participio «cautivos», que en español funciona con naturalidad con «han sido llevados» y conserva la idea de captura/deportación.
- source_word: וּבְנֹתֶיךָ
  english_pob_choice: and your daughters
  chosen_spanish: y tus hijas
  alternatives_spanish:
  - y tus muchachas
  - y tus hijas mujeres
  lexicon: HALOT
  rationale: Se conserva el contraste directo con «hijos» mediante «hijas», siguiendo el paralelismo del hebreo y una formulación clara en español.
- source_word: בַּשִּׁבְיָה
  english_pob_choice: into exile
  chosen_spanish: en cautiverio
  alternatives_spanish:
  - en exilio
  - al cautiverio
  lexicon: HALOT
  rationale: El segundo término, aunque cercano al primero, se vierte también como «cautiverio» para reflejar la estrecha paralela hebrea y la revisión del POB en inglés que unificó ambas expresiones. En español, «en cautiverio» mantiene el paralelismo poético y la fuerza semántica.
theological_decisions:
- issue: Referencia a Quemos en relación con Moab
  english_pob_reading: the people of Chemosh
  chosen_spanish_reading: el pueblo de Quemos
  alternative_spanish_readings:
  - la gente de Quemos
  - el pueblo perteneciente a Quemos
  rationale: 'Se preserva la relación constructa entre Moab y su deidad nacional sin explicarla o suavizarla. La traducción deja visible la tensión teológica del pasaje: el pueblo ligado a Quemos ha perecido.'
  doctrine_reference: Mantener la tensión textual y la carga polemista del original; no armonizar ni reinterpretar el vínculo entre pueblo y deidad.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB en inglés, que unificó la línea de cautividad y prefirió una formulación más natural para לֻקְּחוּ ... בַּשֶּׁבִי. En español, se refleja esa unificación con «han sido llevados cautivos» y «en cautiverio», evitando una variación innecesaria entre «cautiverio» y «exilio» mientras se preserva el paralelismo hebreo.
  spanish_consistency_notes:
  - Se usa «Moab» como nombre propio transliterado estándar.
  - Se usa «Quemos» de manera consistente para כְּמוֹשׁ.
  - Se mantiene el paralelismo hijos/hijas en español.
  - La nota al pie se ancla en «cautivos» porque allí aparece la primera decisión léxica sensible del verso.
