translation:
  language: es
  text: Pero si un sacerdote compra a una persona como su propiedad comprada con su dinero[a], esta puede comer de ello[b], y los nacidos en su casa pueden comer de su alimento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «una persona, una adquisición de su dinero»; es decir, alguien comprado con su dinero.
    reason: lexical_alternative
  - marker: b
    text: O «de su pan»; aquí «pan» probablemente se refiere en sentido más amplio al alimento sacerdotal que le corresponde.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כֹהֵ֗ן
  english_pob_choice: But if a priest
  chosen_spanish: Pero si un sacerdote
  alternatives_spanish:
  - Y un sacerdote
  - Cuando un sacerdote
  lexicon: HALOT
  rationale: En este caso legal, la conjunción introduce una nueva cláusula condicional con valor de contraste respecto del contexto previo. «Pero si» comunica bien esa transición en español y mantiene el flujo casuístico.
- source_word: כִּֽי
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  lexicon: HALOT
  rationale: Aquí כִּי introduce una situación hipotética dentro de la ley. «Si» es la forma más natural y precisa en español jurídico-bíblico.
- source_word: יִקְנֶ֥ה
  english_pob_choice: buys
  chosen_spanish: compra
  alternatives_spanish:
  - adquiere
  - compra
  lexicon: HALOT
  rationale: El verbo קנה aquí tiene sentido de adquisición por compra, reforzado por la frase siguiente «con su dinero». «Compra» es claro y fiel en español.
- source_word: נֶ֨פֶשׁ֙
  english_pob_choice: a person
  chosen_spanish: una persona
  alternatives_spanish:
  - un ser humano
  - alguien
  lexicon: HALOT
  rationale: נֶפֶשׁ designa aquí a un ser humano concreto, no el alma inmaterial. «Una persona» transmite bien el referente legal sin perder naturalidad.
- source_word: קִנְיַ֣ן כַּסְפּ֔/וֹ
  english_pob_choice: as his property with his money
  chosen_spanish: como posesión adquirida con su dinero
  alternatives_spanish:
  - como su propiedad comprada con su dinero
  - adquirida con su dinero
  lexicon: HALOT
  rationale: La construcción expresa el estatus de algo obtenido por compra y perteneciente al sacerdote. «Posesión adquirida con su dinero» conserva la dimensión de pertenencia/propiedad sin suavizarla indebidamente.
- source_word: ה֖וּא יֹ֣אכַל בּ֑/וֹ
  english_pob_choice: he may eat of it
  chosen_spanish: él puede comer de ella
  alternatives_spanish:
  - puede comer de ello
  - él puede comer de eso
  lexicon: HALOT
  rationale: El pronombre hebreo retoma a la persona comprada, pero el referente de «comer» es el alimento sagrado mencionado en el contexto. En español, «de ella» mantiene la referencia al objeto implícito del permiso y evita ambigüedad, aunque el antecedente gramatical inmediato en hebreo sea singular masculino.
- source_word: וִ/ילִ֣יד בֵּית֔/וֹ
  english_pob_choice: those born in his house
  chosen_spanish: los nacidos en su casa
  alternatives_spanish:
  - los de su casa nacidos allí
  - los hijos de su casa
  lexicon: HALOT
  rationale: יְלִיד בַּיִת significa literalmente «nacido de la casa», una expresión de pertenencia doméstica/servil. El plural español «los nacidos en su casa» conserva el valor colectivo del hebreo.
- source_word: הֵ֖ם יֹאכְל֥וּ
  english_pob_choice: may eat
  chosen_spanish: pueden comer
  alternatives_spanish:
  - comerán
  - tienen permiso para comer
  lexicon: HALOT
  rationale: En contexto legal, el imperfecto expresa permiso. «Pueden comer» comunica autorización de forma natural en español.
- source_word: בְ/לַחְמֽ/וֹ
  english_pob_choice: of his food
  chosen_spanish: de su pan
  alternatives_spanish:
  - de su alimento
  - de su comida
  lexicon: HALOT
  rationale: לֶחֶם significa literalmente «pan», pero en este contexto ritual puede extenderse a la comida asignada. Dado que la POB inglesa preserva la posible lectura literal con nota, se mantiene «pan» en el texto principal por mayor proximidad al hebreo.
theological_decisions:
- issue: Mantener la carga legal de compra/posesión sin suavizarla
  english_pob_reading: as his property with his money
  chosen_spanish_reading: como posesión adquirida con su dinero
  alternative_spanish_readings:
  - como su propiedad comprada con su dinero
  - adquirida con su dinero
  rationale: La fidelidad al hebreo exige conservar la relación de pertenencia y compra. No se sustituye por lenguaje más eufemístico de «servicio» o «dependencia» porque el texto habla de estatus de adquisición, no solo de empleo o parentesco.
  doctrine_reference: Principio de transparencia léxica y prioridad del texto מקור/original
- issue: El alimento sacerdotal y el posible sentido de «pan»
  english_pob_reading: of his food
  chosen_spanish_reading: de su pan
  alternative_spanish_readings:
  - de su alimento
  - de su comida
  rationale: La POB inglesa mantiene una nota sobre la lectura literal «bread». En español, «pan» conserva esa literalidad y, a la vez, puede entenderse en sentido amplio como alimento ritual asignado al sacerdote.
  doctrine_reference: Notas léxicas del texto fuente
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail, que prefirió mantener el pronombre singular correspondiente al hebreo en la cláusula central y conservar el valor legal del enunciado. Se incorporó además la nota de posible sentido literal de לֶחֶם como «pan», siguiendo la alternativa preservada por la POB inglesa.
  spanish_consistency_notes:
  - Se mantiene «sacerdote» para כֹּהֵן conforme al uso establecido en la POB inglesa y la claridad eclesial en español.
  - Se usa «persona» para נֶפֶשׁ en sentido legal-humano, evitando «alma» que sería inadecuado aquí.
  - Se conserva la transparencia de la relación de adquisición/posesión sin introducir vocabulario ajeno al hebreo.
  - «Pan» se deja en el texto principal por cercanía léxica, con nota aclaratoria para su posible valor amplio de alimento.
