translation:
  language: es
  text: Leí la carta que ustedes me enviaron. Por tanto, ordené investigar[a], y se halló que esa ciudad, desde tiempos antiguos, se ha opuesto a los reyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ha estado oponiéndose a los reyes». El participio griego puede expresarse de manera más expandida, pero el texto principal conserva la idea de una postura hostil frente a la autoridad real.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀνέγνων
  english_pob_choice: I read
  chosen_spanish: Leí
  alternatives_spanish:
  - He leído
  - Le había leído
  lexicon: LSJ
  rationale: Aoristo narrativo en una respuesta administrativa; en español, el pretérito simple comunica de forma natural la acción puntual de leer la carta.
- source_word: τὴν ἐπιστολήν
  english_pob_choice: letter
  chosen_spanish: la carta
  alternatives_spanish:
  - el escrito
  - el documento
  lexicon: LSJ
  rationale: La referencia es a una comunicación enviada; 'carta' es el equivalente más directo y natural en español, sin sobrerformalizar el género del texto.
- source_word: ἐπέταξα
  english_pob_choice: I gave orders
  chosen_spanish: ordené
  alternatives_spanish:
  - di órdenes
  - mandé
  lexicon: LSJ
  rationale: El verbo expresa una orden administrativa. 'Ordené' conserva la autoridad del emisor y suena más fluido que una calca más pesada.
- source_word: ἐπισκέψασθαι
  english_pob_choice: to investigate
  chosen_spanish: investigar
  alternatives_spanish:
  - examinar
  - inspeccionar
  - indagar
  lexicon: LSJ
  rationale: En este contexto oficial, el infinitivo denota una pesquisa o averiguación. 'Investigar' comunica bien el sentido de investigación formal.
- source_word: εὑρέθη
  english_pob_choice: it was found
  chosen_spanish: se halló
  alternatives_spanish:
  - se encontró
  - resultó
  lexicon: LSJ
  rationale: La fórmula impersonal de informe se vierte de manera natural con 'se halló', manteniendo el tono burocrático del griego.
- source_word: ἐξ αἰῶνος
  english_pob_choice: from ancient times
  chosen_spanish: desde tiempos antiguos
  alternatives_spanish:
  - desde antiguo
  - desde hace mucho tiempo
  - desde tiempos remotos
  lexicon: LSJ
  rationale: Aquí αἰῶνος no es 'eternidad' metafísica, sino antigüedad histórica. 'Desde tiempos antiguos' evita la ambigüedad doctrinal y conserva el valor temporal.
- source_word: ἀντιπαρατάσσουσα
  english_pob_choice: has set itself in opposition
  chosen_spanish: se ha puesto en oposición
  alternatives_spanish:
  - se ha enfrentado
  - ha opuesto resistencia
  - se ha alineado contra
  lexicon: LSJ
  rationale: El participio sugiere una postura hostil o adversaria más que una rebelión abierta. 'Se ha puesto en oposición' preserva la tensión léxica sin exceder el grado de conflicto.
- source_word: βασιλεῦσιν
  english_pob_choice: kings
  chosen_spanish: a los reyes
  alternatives_spanish:
  - contra los reyes
  - a los monarcas
  - a las autoridades reales
  lexicon: LSJ
  rationale: El dativo plural conserva la referencia a reyes como autoridades históricas. En español, el complemento 'a los reyes' encaja con la construcción de oposición ya expresada.
theological_decisions:
- issue: Alcance temporal de ἐξ αἰῶνος
  english_pob_reading: from ancient times
  chosen_spanish_reading: desde tiempos antiguos
  alternative_spanish_readings:
  - desde la eternidad
  - desde siempre
  rationale: Se evita una lectura metafísica de eternidad que el contexto histórico no requiere. La ciudad es descrita como históricamente conflictiva, no como existente desde la eternidad.
  doctrine_reference: Distinción entre uso histórico-temporal y lenguaje de eternidad; coherencia con el contexto narrativo-histórico.
- issue: Intensidad de ἀντιπαρατάσσουσα
  english_pob_reading: has set itself in opposition
  chosen_spanish_reading: se ha puesto en oposición
  alternative_spanish_readings:
  - se ha rebelado
  - ha combatido
  rationale: El griego señala oposición hostil, pero no obliga a la idea de rebelión armada. La traducción evita sobreinterpretar la acusación política.
  doctrine_reference: Principio de no exceder el valor aspectual y semántico del participio griego; prudencia exegética en lenguaje político.
translation_notes:
  revision_awareness: Se tomó como ancla principal el griego de Swete; el paralelo arameo/hebreo de Esdras 4:13 funciona solo como comprobación contextual de la referencia a la oposición a la autoridad real. No se requieren cambios respecto del borrador auditado en inglés, salvo la adaptación natural al español.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto solo cuando aparezca el nombre divino; aquí no aplica.
  - Se evitó 'SEÑOR' y 'Cristo/Mesías' porque no pertenecen a este versículo.
  - 'El tono administrativo se conservó con verbos simples y precisos: ''leí'', ''ordené'', ''se halló''.'
  - '''Se puso en oposición'' preserva la fuerza del participio sin endurecerlo a ''rebelarse''.'
