- from: ¡Mira![a] Como asnos salvajes en el desierto, salen a su trabajo, buscando presa temprano; el desierto es pan para él[b], para los niños.
  to: Mira[a], como asnos salvajes en el desierto, salen a su trabajo, buscando temprano su presa; el desierto es pan para él[b], para los niños.
  rationale: Se ajustó el inicio para un tono más sobrio y bíblico en español, sin perder la fuerza deíctica de הֵן. También se reordenó la frase participial para que el matiz de búsqueda temprana sea idiomático y claro en español, manteniendo la decisión léxica de «presa». La nota final se amplió ligeramente para reflejar mejor la alternativa documentada sobre לַנְּעָרִים.
