translation:
  language: es
  text: Extendió[a] desde lo alto; me tomó; me sacó de muchas aguas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Envió desde lo alto' o 'Se extendió desde lo alto'. El verbo hebreo puede significar más literalmente 'enviar' o 'extender'; 'extendió' expresa mejor en español el sentido de intervención rescatadora en este contexto.
    reason: lexical_alternative
  - marker: b
    text: O 'de grandes aguas' o 'de aguas poderosas'. El hebreo dice literalmente 'de muchas aguas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׁלַח
  english_pob_choice: He sent from on high
  chosen_spanish: Envió
  alternatives_spanish:
  - mandó
  - envió desde lo alto
  - extendió
  lexicon: HALOT
  rationale: El verbo hebreo puede significar 'enviar' o 'extender'; el contexto de rescate divino permite un español breve y natural con 'envió'. Se conserva la relación con la intervención desde arriba sin forzar una paráfrasis más interpretativa.
- source_word: מִמָּרוֹם
  english_pob_choice: from on high
  chosen_spanish: desde lo alto
  alternatives_spanish:
  - desde las alturas
  - desde el cielo
  lexicon: HALOT
  rationale: מָרוֹם denota altura o lugar elevado. 'Desde lo alto' preserva el registro poético y evita especificar 'cielo' cuando el hebreo es más general.
- source_word: יִקָּחֵנִי
  english_pob_choice: he took me
  chosen_spanish: me tomó
  alternatives_spanish:
  - me recogió
  - me recibió
  - me arrebató
  lexicon: HALOT
  rationale: לקח normalmente significa 'tomar'. 'Me tomó' es la forma más directa y fiel en español; 'recibió' o 'arrebató' introducirían matices no necesarios aquí.
- source_word: יַמְשֵׁנִי
  english_pob_choice: he drew me out
  chosen_spanish: me sacó
  alternatives_spanish:
  - me extrajo
  - me rescató
  - me sacó fuera
  lexicon: HALOT
  rationale: El hifil de משה se usa para sacar/draw out, especialmente del agua. En español, 'me sacó' comunica con naturalidad la acción de rescate sin perder la imagen del contexto acuático.
- source_word: מִמַּיִם רַבִּים
  english_pob_choice: out of many waters
  chosen_spanish: de muchas aguas
  alternatives_spanish:
  - de grandes aguas
  - de aguas abundantes
  - de aguas poderosas
  lexicon: HALOT
  rationale: La expresión literal es 'de muchas aguas'. 'De muchas aguas' mantiene la imagen poética y la fuerza semítica del plural; 'de grandes aguas' suavizaría demasiado la literalidad.
theological_decisions:
- issue: Imagen de rescate divino desde arriba
  english_pob_reading: Retain the poetic spatial language 'from on high' rather than interpret it explicitly as 'from heaven.'
  chosen_spanish_reading: Mantener 'desde lo alto' como lenguaje espacial poético, sin explicitar 'del cielo'.
  alternative_spanish_readings:
  - desde el cielo
  - del cielo
  rationale: El hebreo usa lenguaje elevado y general. 'Desde lo alto' conserva la metáfora de intervención divina sin reducirla a una formulación cosmológica más cerrada.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó la primera cláusula de 'reached down' a 'sent from on high' por mayor precisión léxica; la versión española sigue esa decisión con 'Envió desde lo alto' y mantiene el resto de la línea sin expansión interpretativa. Se conservó el paralelismo breve del hebreo.
  spanish_consistency_notes:
  - Se mantiene el registro poético breve y paralelo.
  - No se usa 'SEÑOR' ni 'cielo' donde el hebreo solo dice altura.
  - '''Muchas aguas'' conserva la imagen hebrea y evita suavizarla a un equivalente genérico.'
  - La sintaxis española refleja tres acciones consecutivas, separadas por punto y coma, como en el hebreo.
