translation:
  language: es
  text: De la opresión y de la violencia él redimirá su vida[a], y su sangre será preciosa a sus ojos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su alma» o «sus vidas» para «su vida» (hebreo néfesh, que según el contexto puede significar vida, ser, alma o persona).
    reason: lexical_alternative
  - marker: b
    text: El singular «él / sus» continúa más naturalmente al rey del salmo, aunque el lenguaje también evoca el propio cuidado redentor de Dios por los oprimidos.
    reason: alternative_reading
lexical_decisions:
- source_word: מִתּוֹךְ / מֵחָמָס
  english_pob_choice: from oppression and violence
  chosen_spanish: De la opresión y de la violencia
  alternatives_spanish:
  - Desde la opresión y la violencia
  - De en medio de la opresión y de la violencia
  lexicon: HALOT
  rationale: מִתּוֹךְ expresa salida o liberación desde una esfera; en español, «de» transmite bien el punto de partida de rescate sin cargar la frase. חָמָס designa violencia, injusticia violenta o abuso; «violencia» conserva el sentido directo y idiomático en español, y «opresión» explicita el marco de maltrato que el contexto sugiere.
- source_word: יִגְאַל
  english_pob_choice: he will redeem
  chosen_spanish: rescatará
  alternatives_spanish:
  - redimirá
  - canjeará
  lexicon: HALOT
  rationale: גאל puede tener fuerza de redimir como pariente-rescatador, pero en español «redimir» suele sonar más teológico o abstracto. Aquí «rescatará» comunica con claridad la acción liberadora y mantiene el sentido de intervención efectiva; el matiz legal/covenantal se conserva en la nota doctrinal y en el contexto del versículo.
- source_word: נַפְשָׁם
  english_pob_choice: their life
  chosen_spanish: su vida
  alternatives_spanish:
  - su alma
  - sus vidas
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar vida, ser, persona o alma. Dado el paralelismo con sangre y el contexto de opresión, «su vida» preserva la referencia concreta a la existencia de los oprimidos. Se evita «alma» porque sería demasiado restrictivo en español y podría desviar el sentido.
- source_word: וְיֵיקַר
  english_pob_choice: will be precious
  chosen_spanish: será preciosa
  alternatives_spanish:
  - será valiosa
  - será estimada
  lexicon: HALOT
  rationale: יָקַר expresa ser precioso, valioso o de gran peso. «Será preciosa» mantiene la imagen hebrea y funciona naturalmente con «sangre» en español; «valiosa» sería correcto pero menos idiomático en esta construcción.
- source_word: דָּמָם
  english_pob_choice: their blood
  chosen_spanish: su sangre
  alternatives_spanish:
  - su sangre vital
  - su vida derramada
  lexicon: HALOT
  rationale: דָּם es literalmente «sangre». Se conserva la imagen concreta porque el versículo valora la vida de los oprimidos incluso en su sangre, sin convertirlo en una paráfrasis interpretativa.
- source_word: בְּעֵינָיו
  english_pob_choice: in his eyes
  chosen_spanish: ante sus ojos
  alternatives_spanish:
  - en sus ojos
  - a su vista
  lexicon: HALOT
  rationale: El hebreo es idiomático y literalmente significa «en sus ojos». En español, «ante sus ojos» mantiene la imagen de valoración o percepción personal con mejor fluidez que una calca más rígida. Dado que el audit trail inglés conserva la imagen ocular, esta formulación sigue siendo fiel.
theological_decisions:
- issue: Referente singular de «he/his»
  english_pob_reading: The singular 'he/his' most naturally continues the king of the psalm, though the language also echoes God's own redeeming care for the oppressed.
  chosen_spanish_reading: El singular «rescaratará / sus» se mantiene naturalmente como continuación del rey del salmo, aunque el lenguaje también hace eco del cuidado redentor de Dios por los oprimidos.
  alternative_spanish_readings:
  - «Dios rescatará…»
  - «él rescatará…» sin referencia real al rey
  rationale: El hebreo usa formas singulares coherentes con el sujeto real del salmo. La traducción no resuelve la tensión entre el rey ideal y el lenguaje que evoca la obra de Dios; por eso se conserva el singular sin explicitar un sujeto distinto en el texto principal.
  doctrine_reference: Preservar la tensión literaria y teológica del salmo sin resolverla de manera prematura.
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se requieren cambios sustanciales respecto del análisis inglés; se mantiene la lectura principal y la tensión teológica documentada.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo exigiera; aquí no aparece el nombre divino explícito.
  - Se prefirió «rescatará» sobre «redimirá» para evitar un tecnicismo innecesario en el texto principal, sin perder el valor redentor del verbo hebreo.
  - Se mantuvo la imagen concreta de «sangre» y «ojos» para conservar el paralelismo poético hebreo.
  - «Su vida» refleja el valor colectivo de נֶפֶשׁ sin imponer una lectura espiritualizada.
