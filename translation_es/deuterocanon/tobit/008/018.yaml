revisions:
- from: Entonces ordenó a los siervos que rellenaran la tumba.
  to: Entonces ordenó a los sirvientes que rellenaran la sepultura.
  rationale: 'Se ajustan dos elecciones léxicas para reflejar mejor el griego y la auditoría inglesa: «sirvientes» por οἰκέταις en contexto doméstico narrativo, y «sepultura» por τάφον para evitar la posible sobrelectura de «tumba» como estructura funeraria construida. El resto del borrador es fiel y natural.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:38:58Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del griego: ἐκέλευσεν = «ordenó», χῶσαι = «rellenaran», y la cláusula final expresa correctamente la acción de cubrir de nuevo la sepultura. Sin embargo, τοῖς οἰκέταις se acerca mejor aquí a «los sirvientes» que a «los siervos», y τὸν τάφον corresponde más naturalmente a «la sepultura» o «la fosa» que a «la tumba» en este contexto de una fosa que se manda tapar.'
  spanish_quality_summary: La frase es clara y gramatical, pero «siervos» suena más bíblico-tradicional y menos natural en español actual para personal doméstico. «Tumba» puede sugerir un monumento funerario más construido, mientras que el contexto pide el hoyo o sepultura ya cavada. «Sepultura» mantiene dignidad y legibilidad amplia.
  glossary_alignment: No hay términos del glosario mayor en juego. La principal cuestión léxica es mantener la fuerza doméstica de οἰκέταις sin recurrir a un registro antinatural; «sirvientes» encaja mejor que «siervos» aquí. También conviene evitar que «tumba» desplace el matiz de τάφος como grave/sepultura en este pasaje.
  issues:
  - severity: medium
    issue: «los siervos» para τοῖς οἰκέταις
    rationale: οἰκέτης se refiere a servidores domésticos. «Siervos» es entendible, pero en español actual suena más marcado, bíblico o ambiguo; «sirvientes» transmite mejor el referente narrativo y coincide mejor con el inglés auditado «servants».
  - severity: medium
    issue: «la tumba» para τὸν τάφον
    rationale: Aunque posible, «tumba» en español puede sugerir un sepulcro construido. El contexto y la decisión inglesa («grave») apuntan más a una sepultura/fosa que se rellena con tierra. «La sepultura» conserva dignidad y mayor precisión contextual.
  revised_spanish_text: Entonces ordenó a los sirvientes que rellenaran la sepultura.
  revision_rationale: 'Se ajustan dos elecciones léxicas para reflejar mejor el griego y la auditoría inglesa: «sirvientes» por οἰκέταις en contexto doméstico narrativo, y «sepultura» por τάφον para evitar la posible sobrelectura de «tumba» como estructura funeraria construida. El resto del borrador es fiel y natural.'
