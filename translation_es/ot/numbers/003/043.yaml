translation:
  language: es
  text: Y todos los primogénitos varones, por el número de nombres[a], desde un mes de edad en adelante, según su conteo[b], eran veintidós mil, trescientos setenta y tres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «por el número de nombres», una expresión de censo que indica que fueron inscritos o contados individualmente por nombre.'
    reason: cultural_note
  - marker: b
    text: O «según su inscripción censal». El hebreo se refiere al conteo oficial del grupo.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - la totalidad de
  - todo el conjunto de
  lexicon: HALOT
  rationale: Conserva la fuerza de totalidad del hebreo sin sonar artificial en español.
- source_word: בְּכוֹר זָכָר
  english_pob_choice: the firstborn males
  chosen_spanish: los primogénitos varones
  alternatives_spanish:
  - los primogénitos masculinos
  - los primeros nacidos varones
  lexicon: HALOT
  rationale: '''Primogénitos varones'' reproduce el contenido semántico del sustantivo + adjetivo y es natural en español bíblico contemporáneo.'
- source_word: בְּמִסְפַּר שֵׁמוֹת
  english_pob_choice: by the number of names
  chosen_spanish: por el número de nombres
  alternatives_spanish:
  - según el número de nombres
  - contados por nombre
  - inscritos por nombre
  lexicon: HALOT
  rationale: Mantiene el giro censal del hebreo. 'Por el número de nombres' conserva la literalidad necesaria para el expediente auditado, sin ocultar que se trata de una enumeración nominal.
- source_word: מִבֶּן חֹדֶשׁ וָמַעְלָה
  english_pob_choice: from a month old and upward
  chosen_spanish: desde un mes de edad en adelante
  alternatives_spanish:
  - desde que tenía un mes y más
  - de un mes de edad o más
  lexicon: HALOT
  rationale: Expresa con claridad la fórmula técnica de edad mínima usada en censos, manteniendo el sentido exacto del hebreo.
- source_word: לִפְקֻדֵיהֶם
  english_pob_choice: according to their count
  chosen_spanish: según su registro
  alternatives_spanish:
  - según su conteo
  - según su enrolamiento
  - conforme a su número
  lexicon: HALOT
  rationale: '''פקד'' en este contexto es contar/inscribir en un censo. ''Registro'' comunica bien la idea de una enumeración oficial y preserva la referencia a la inscripción individual.'
- source_word: שְׁנַיִם וְעֶשְׂרִים אֶלֶף שְׁלֹשָׁה וְשִׁבְעִים וּמָאתָיִם
  english_pob_choice: twenty-two thousand, three hundred seventy-three
  chosen_spanish: veintidós mil, trescientos setenta y tres
  alternatives_spanish:
  - veintidós mil trescientos setenta y tres
  lexicon: HALOT
  rationale: Número en español moderno estándar para máxima claridad y fidelidad al total resultante del hebreo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió 'according to their count' por ser más natural y exacto; por eso el español usa 'según su registro', evitando una repetición mecánica del número final y conservando el matiz censal. También se conservó la expresión hebrea 'por el número de nombres' con nota explicativa, porque la POB inglesa la mantuvo como giro técnico.
  spanish_consistency_notes:
  - Se emplea 'primogénitos' para בְּכוֹר en concordancia con el uso bíblico normal en español.
  - '''Yahvé'' no aplica en este versículo.'
  - '''Registro'' se usa en sentido censal, no administrativo moderno genérico; la nota aclara el vínculo con פקד.'
  - La puntuación numérica sigue la convención española y evita ambigüedad.
