    text: Or 'in Jerusalem'; the Greek uses 'in Jerusalem' with a verb of travel, but English normally says 'go to Jerusalem.'
    reason: lexical_alternative
  - marker: b
    text: The rare Greek term rendered 'first shearings' likely refers to the first portion from shearing livestock; some take it more generally as first pastoral dues.
    reason: lexical_alternative
