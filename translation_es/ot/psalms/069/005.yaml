translation:
  language: es
  text: Más numerosos que los cabellos de mi cabeza son los que me odian sin causa; se han fortalecido los que me destruyen, mis enemigos[a]. Lo que no robé[b], entonces tengo que restituirlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mis enemigos falsamente» o «mis enemigos engañosos». La frase hebrea puede describir a los enemigos como engañosos, o indicar que se oponen al salmista sin base o injustamente.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «entonces restituyo». El sentido puede ser que el salmista es obligado a devolver lo que no robó.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַבּוּ מִ/שַּׂעֲר֣וֹת רֹאשִׁ/י
  english_pob_choice: are more than the hairs of my head
  chosen_spanish: Más numerosos que los cabellos de mi cabeza
  alternatives_spanish:
  - son más que los cabellos de mi cabeza
  - superan en número a los cabellos de mi cabeza
  lexicon: HALOT
  rationale: El hebreo usa un comparativo de multitud con imagen hiperbólica. En español, 'más numerosos que' conserva el sentido comparativo y el tono poético sin sonar forzado.
- source_word: שֹׂנְאַי חִנָּם
  english_pob_choice: those who hate me without cause
  chosen_spanish: los que me odian sin causa
  alternatives_spanish:
  - los que me odian gratuitamente
  - los que me odian sin motivo
  lexicon: HALOT
  rationale: '''Sin causa'' reproduce bien la idea de חִנָּם como falta de fundamento o justificación, manteniendo el matiz moral y judicial del texto.'
- source_word: עָצְמוּ
  english_pob_choice: are mighty
  chosen_spanish: se han fortalecido
  alternatives_spanish:
  - son fuertes
  - son poderosos
  lexicon: HALOT
  rationale: El verbo expresa volverse fuerte o poderoso. 'Se han fortalecido' conserva el aspecto verbal y sugiere incremento de poder en el contexto de amenaza.
- source_word: מַצְמִיתַי
  english_pob_choice: those who would destroy me
  chosen_spanish: los que me destruyen
  alternatives_spanish:
  - mis destructores
  - los que buscan destruirme
  lexicon: HALOT
  rationale: La forma participial apunta a personas activamente orientadas a arruinar al hablante. 'Los que me destruyen' es natural en español y mantiene la fuerza hostil del participio.
- source_word: אֹיְבַי שֶׁקֶר
  english_pob_choice: my false enemies
  chosen_spanish: mis falsos enemigos
  alternatives_spanish:
  - mis enemigos falsos
  - mis enemigos en falso
  lexicon: HALOT
  rationale: Se conserva la lectura adjetival del sustantivo con שֶׁקֶר, tal como la POB inglesa, evitando resolver indebidamente si significa 'falsos' o 'injustamente'.
- source_word: אֲשֶׁר לֹא גָזַלְתִּי
  english_pob_choice: What I did not steal
  chosen_spanish: Lo que no robé
  alternatives_spanish:
  - Lo que no arrebaté
  - Lo que no tomé por robo
  lexicon: HALOT
  rationale: גזל alude a quitar por robo o despojo. 'Robé' es la equivalencia más clara y directa en español, aunque un poco más amplia.
- source_word: אָז אָשִׁיב
  english_pob_choice: then I must restore
  chosen_spanish: entonces tengo que restituirlo
  alternatives_spanish:
  - entonces lo restituiré
  - entonces debo devolverlo
  lexicon: HALOT
  rationale: La restitución forzada está implícita en el contexto. 'Tengo que restituirlo' preserva la tensión del original sin afirmar más de lo que dice el hebreo.
theological_decisions:
- issue: Restitución forzada por una acusación injusta
  english_pob_reading: What I did not steal, then I must restore.
  chosen_spanish_reading: Lo que no robé, entonces tengo que restituirlo.
  alternative_spanish_readings:
  - Lo que no robé, entonces lo restituiré.
  - Lo que no robé, entonces debo devolverlo.
  rationale: El salmista presenta la paradoja de ser obligado a reparar por algo que no cometió. La redacción elegida mantiene esa tensión de injusticia sin suavizarla ni convertirla en una afirmación voluntaria.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Sentido de שֶׁקֶר aplicado a 'enemigos'
  english_pob_reading: my false enemies
  chosen_spanish_reading: mis falsos enemigos
  alternative_spanish_readings:
  - mis enemigos falsos
  - mis enemigos injustamente
  rationale: La POB inglesa preserva la ambigüedad entre enemigos mentirosos/deceitful y enemigos que actúan sin base. El español 'falsos enemigos' mantiene esa tensión sin cerrarla hacia una sola interpretación.
  doctrine_reference: 'Translation philosophy §3: Preserve lexical/theological tension rather than collapsing alternatives.'
translation_notes:
  revision_awareness: Se ajustó la nota sobre שֶׁקֶר para reflejar la revisión inglesa más reciente ('my false enemies' en lugar de 'my lying enemies'). También se anclaron correctamente las notas [a] y [b] en el texto español para cumplir con la validación.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como forma estándar del proyecto solo cuando el texto lo requiere; este versículo no contiene el Tetragrámaton.
  - Se evitó 'siervo' para δοῦλος porque no aplica aquí; no hay términos cristológicos que requieran 'Cristo'.
  - Se preservó el paralelismo poético con dos hemistiquios principales y una cláusula final de restitución.
  - '''Sin causa'' y ''falsos enemigos'' conservan la ambigüedad lexical señalada en el audit trail inglés.'
