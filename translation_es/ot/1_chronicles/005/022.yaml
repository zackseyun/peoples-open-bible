translation:
  language: es
  text: Porque muchos murieron, porque la batalla venía de Dios[a]; y vivieron en su lugar hasta el exilio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque la batalla pertenecía a Dios». El hebreo enfatiza que el resultado de la batalla provenía de Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La primera כִּי introduce la explicación del reporte anterior; en español, «Porque» comunica bien ese enlace causal/expositivo sin forzar el orden sintáctico.
- source_word: חֲלָלִים רַבִּים
  english_pob_choice: many slain
  chosen_spanish: muchos caídos
  alternatives_spanish:
  - muchos muertos
  - muchos heridos de muerte
  lexicon: HALOT
  rationale: חֲלָלִים señala a los abatidos o muertos en combate. «Caídos» mantiene el matiz bélico y, unido al siguiente verbo, preserva la idea de muerte sin volverla redundante en exceso.
- source_word: נָפָלוּ
  english_pob_choice: fell
  chosen_spanish: cayeron
  alternatives_spanish:
  - fueron derribados
  - cayeron muertos
  lexicon: HALOT
  rationale: נָפַל en contexto de guerra se usa para caer en la muerte o en combate. «Cayeron» reproduce ese valor básico y deja que el sustantivo precedente sostenga la referencia a los muertos de guerra.
- source_word: מֵהָאֱלֹהִים
  english_pob_choice: from God
  chosen_spanish: de Dios
  alternatives_spanish:
  - procedía de Dios
  - venía de Dios
  lexicon: HALOT
  rationale: El hebreo usa מִן para origen o procedencia. «De Dios» conserva esa fuente/origen de manera natural en español sin añadir una formulación más interpretativa.
- source_word: הַמִּלְחָמָה
  english_pob_choice: the battle
  chosen_spanish: la batalla
  alternatives_spanish:
  - la guerra
  - el combate
  lexicon: HALOT
  rationale: En este contexto militar concreto, «batalla» es la equivalencia más natural y precisa para מִלְחָמָה.
- source_word: וַיֵּשְׁבוּ
  english_pob_choice: they lived
  chosen_spanish: habitaron
  alternatives_spanish:
  - vivieron
  - se establecieron
  lexicon: HALOT
  rationale: יָשַׁב puede significar habitar, vivir o asentarse. Aquí el contexto de ocupar el lugar del enemigo favorece «habitaron», que conserva la permanencia/ocupación sin sonar demasiado moderno.
- source_word: תַחְתֵּיהֶם
  english_pob_choice: in their place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en su lugar de ellos
  - en vez de ellos
  lexicon: HALOT
  rationale: La expresión idiomática indica sustitución y ocupación del sitio dejado por los derrotados. «En su lugar» comunica bien esa idea en español.
- source_word: עַד הַגֹּלָה
  english_pob_choice: until the exile
  chosen_spanish: hasta el exilio
  alternatives_spanish:
  - hasta la deportación
  - hasta el cautiverio
  lexicon: HALOT
  rationale: גּוֹלָה alude al exilio/deportación. «Exilio» es una forma breve, estándar y clara en español, adecuada para el registro bíblico.
theological_decisions:
- issue: Origen divino del combate
  english_pob_reading: because the battle was from God
  chosen_spanish_reading: porque la batalla fue de Dios
  alternative_spanish_readings:
  - porque la batalla procedía de Dios
  - porque Dios dio la batalla
  rationale: El hebreo afirma que el origen/resultado decisivo del combate está en Dios. «Fue de Dios» conserva esa atribución sin expandirla innecesariamente ni perder la tensión de agencia/origen que el texto presenta.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés y el último pase revisado, que no introdujo cambios. La redacción española conserva el doble כִּי, el matiz bélico de חֲלָלִים/נָפָלוּ, la procedencia divina de la batalla y el sentido de ocupación expresado por יָשַׁב + תַחְתֵּיהֶם.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים según el estándar del proyecto.
  - Se usa «batalla» para מִלְחָמָה en coherencia con el contexto militar puntual.
  - «Exilio» traduce גּוֹלָה de forma breve y bíblicamente reconocible en español.
  - No se usa «SEÑOR» ni se introduce terminología eclesiástica no respaldada por el texto.
