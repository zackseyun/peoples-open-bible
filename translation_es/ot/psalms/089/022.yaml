  revision_rationale: Se revisa el texto para mejorar la naturalidad y legibilidad del español sin apartarse del hebreo ni del expediente léxico inglés. «Quedará firme» expresa mejor en español el sentido de תִּכּוֹן en este contexto, y «ciertamente» representa más adecuadamente el énfasis de אַף que «sí». Se conservan las metáforas corporales y el futuro promisorio. La nota alternativa también se adapta a un español más idiomático.
