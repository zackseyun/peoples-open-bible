translation:
  language: es
  text: Cuando David llegó a la cima[a], donde adoró a Dios, he aquí[b], Husai el arquita vino a su encuentro con su túnica rasgada y tierra sobre su cabeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'donde se postraba ante Dios'; el verbo hebreo puede referirse tanto a una acción simple en pasado como a una acción habitual.
    reason: alternative_reading
  - marker: b
    text: '''He aquí'' traduce un marcador narrativo hebreo que subraya la aparición repentina de Husai.'
    reason: cultural_note
lexical_decisions:
- source_word: הָרֹאשׁ
  english_pob_choice: the summit
  chosen_spanish: la cima
  alternatives_spanish:
  - la cumbre
  - la parte alta
  - la cabeza
  lexicon: HALOT
  rationale: En contexto topográfico, la palabra hebrea literalmente significa 'la cabeza', pero aquí designa el punto más alto del ascenso. 'La cima' transmite bien la ubicación sin sonar forzado en español.
- source_word: אֲשֶׁר יִשְׁתַּחֲוֶה שָׁם לֵאלֹהִים
  english_pob_choice: where he worshiped God
  chosen_spanish: donde adoraba a Dios
  alternatives_spanish:
  - donde adoró a Dios
  - donde solía adorar a Dios
  - donde se postraba ante Dios
  lexicon: HALOT
  rationale: El imperfecto hebreo puede expresar acción habitual o simplemente imperfectiva en pasado. 'Adoraba' mantiene esa tensión mejor que una perfectividad cerrada, y 'a Dios' refleja לֵאלֹהִים con naturalidad en español.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - y he aquí
  - y mira
  - y entonces
  lexicon: HALOT
  rationale: La fórmula narrativa introduce una aparición repentina. 'He aquí' conserva el matiz de sorpresa y solemnidad del marcador hebreo.
- source_word: לִקְרָאתוֹ
  english_pob_choice: came to meet him
  chosen_spanish: salió a su encuentro
  alternatives_spanish:
  - vino a su encuentro
  - fue a encontrarlo
  - salió para encontrarlo
  lexicon: HALOT
  rationale: La construcción indica movimiento orientado al encuentro. En español, 'salió a su encuentro' expresa bien la iniciativa del encuentro sin perder naturalidad.
- source_word: חוּשַׁי הָאַרְכִּי
  english_pob_choice: Hushai the Archite
  chosen_spanish: Husai el arquita
  alternatives_spanish:
  - Jusai el arquita
  - Husai el arcita
  - Hushai el arquita
  lexicon: Onomástica bíblica estándar / gentilicio
  rationale: Se translitera el nombre propio con ortografía española habitual 'Husai'. El gentilicio se conserva como 'el arquita', equivalente transparente del hebreo הָאַרְכִּי.
- source_word: קָרוּעַ כֻּתָּנְתּוֹ
  english_pob_choice: with his tunic torn
  chosen_spanish: con su túnica rasgada
  alternatives_spanish:
  - con su túnica rota
  - con la túnica rasgada
  - con su vestido rasgado
  lexicon: HALOT
  rationale: כֻּתֹּנֶת designa una prenda tipo túnica; 'túnica' es preciso y natural. 'Rasgada' refleja el estado resultante de קָרוּעַ mejor que un verbo más general como 'rota'.
- source_word: וַאֲדָמָה עַל רֹאשׁוֹ
  english_pob_choice: and dirt on his head
  chosen_spanish: y tierra sobre la cabeza
  alternatives_spanish:
  - y polvo sobre la cabeza
  - y tierra sobre su cabeza
  - con tierra sobre la cabeza
  lexicon: HALOT
  rationale: אֲדָמָה significa literalmente 'tierra/suelo'. Se prefiere 'tierra' sobre 'polvo' porque el hebreo es más amplio que un simple residuo fino, y la imagen de duelo queda clara en español.
theological_decisions:
- issue: Sentido de יִשְׁתַּחֲוֶה en relación con אלֹהִים
  english_pob_reading: where he worshiped God
  chosen_spanish_reading: donde adoraba a Dios
  alternative_spanish_readings:
  - donde se postraba ante Dios
  - donde rendía culto a Dios
  rationale: El verbo puede denotar postrarse físicamente, pero con לֵאלֹהִים el sentido cultual es central. 'Adoraba' preserva esa amplitud sin borrar la postura implícita del verbo.
  doctrine_reference: Uso cultual del verbo de postración en el AT; no implica necesariamente una doctrina específica, sino la relación entre gesto corporal y adoración.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que eliminó 'used to' por no estar expresado explícitamente en el hebreo y mantuvo el resto con estilo formal y natural.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אלֹהִים, conforme al estándar del proyecto.
  - Se usa 'Husai' como forma española del nombre propio, con gentilicio transparente 'el arquita'.
  - Se conserva el tono narrativo elevado con 'he aquí' para reflejar וְהִנֵּה.
  - '''Tierra sobre la cabeza'' se alinea con el valor material de אֲדָמָה sin imponer ''polvo'' como única opción.'
