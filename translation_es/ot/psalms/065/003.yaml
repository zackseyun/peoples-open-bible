review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro de auditoría en casi todo: vocativo participial («tú que escuchas/oyes»), dirección «a ti», y la conservación poética de «toda carne» con nota explicativa. Sin embargo, hay un problema de concordancia con יָבֹאוּ (3mp, ‘vendrán’): aunque «toda carne» puede sentirse colectiva, en esta construcción bíblica y en línea con el hebreo plural, el verbo debe ir en plural en español para preservar mejor el sentido del original.'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero «Oh tú» suena algo forzado en español actual; «Oh, tú» mejora la puntuación, aunque la opción más natural sería «Tú que...». Dado que el cambio necesario principal es pequeño, basta reparar la concordancia verbal. El resto es legible y fiel. La nota al pie está bien formulada.
  glossary_alignment: No hay conflictos con la terminología del proyecto. No aparece Yahvé ni otros términos sensibles. «Toda carne» preserva correctamente la decisión léxica y teológica documentada para כָּל בָּשָׂר.
  issues:
  - severity: medium
    issue: Concordancia verbal en «a ti vendrá toda carne»
    rationale: El hebreo יָבֹאוּ es plural (‘vendrán’). Aunque «toda carne» funciona como expresión colectiva, aquí el original mantiene plural y el español puede reflejarlo naturalmente como «a ti vendrán todos los mortales» o, conservando la literalidad, «a ti vendrán toda carne». Como el proyecto quiere mantener «toda carne», conviene usar el plural verbal para no perder el dato gramatical fuente.
  - severity: low
    issue: Vocativo «Oh tú» suena poco natural
    rationale: No es una infidelidad grave, pero en español bíblico legible «Oh, tú que...» o simplemente «Tú que...» suena más natural que «Oh tú». No obstante, el ajuste indispensable es la concordancia verbal.
  revised_spanish_text: Oh, tú que escuchas la oración[a], a ti vendrán toda carne.
