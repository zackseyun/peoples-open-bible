review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: שָׁמְרֵנִי = «Guárdame», כְּאִישׁוֹן בַּת עָיִן = «como la pupila del ojo», בְּצֵל כְּנָפֶיךָ = «a la sombra de tus alas», תַּסְתִּירֵנִי = «escóndeme». Mantiene la imaginería concreta del ojo y de las alas, en línea con la POB inglesa y con el hebreo.'
  spanish_quality_summary: 'El texto es claro, natural y digno en español. Sin embargo, la nota al pie no preserva fielmente la alternativa documentada en la auditoría inglesa: allí la alternativa tradicional es «apple of the eye», no «niña del ojo». Aunque «niña del ojo» existe en español y se acerca al uso tradicional hispano, la alternativa más reconocible y directamente correspondiente al inglés auditado es «la niña de los ojos» o, mejor aún, una fórmula que conserve la tradición española establecida. Además, «pupila del ojo» suena algo redundante; «la pupila del ojo» es aceptable, pero «como la pupila del ojo» puede mantenerse para corresponder estrechamente al inglés POB.'
  glossary_alignment: 'No hay términos del glosario mayor en disputa aquí. Las decisiones léxicas principales son coherentes con la política del proyecto: modernidad legible sin paráfrasis excesiva. La única desalineación relevante está en la nota léxica alternativa, que debería ajustarse para reflejar mejor la alternativa tradicional preservada por la POB inglesa.'
  issues:
  - severity: medium
    issue: La nota al pie alternativa no coincide suficientemente con la alternativa tradicional preservada en la auditoría inglesa.
    rationale: La POB inglesa conserva «apple of the eye» como alternativa tradicional. El borrador español ofrece «la niña del ojo», que es posible, pero no es la forma tradicional más establecida en español bíblico; además, en español suele aparecer como «la niña de los ojos». Conviene reparar la nota para reflejar una alternativa tradicional más idiomática y reconocible.
  - severity: low
    issue: Lista de alternativas léxicas contiene un elemento erróneo («tus wings»).
    rationale: No afecta el texto bíblico principal, pero indica descuido editorial en los metadatos y conviene corregirlo en revisión interna.
  revised_spanish_text: Guárdame como la pupila del ojo[a]; escóndeme a la sombra de tus alas.
  revised_footnotes:
  - marker: a
    text: O, tradicionalmente, «como la niña de los ojos».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel al hebreo y a la decisión de la POB inglesa de traducir el modismo por su sentido llano. Se ajusta únicamente la nota al pie para reflejar una alternativa tradicional española más idiomática y más cercana a la intención de conservar un equivalente tradicional del inglés «apple of the eye».
