review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: imperativo dirigido a Yahvé, destino de reposo, pronombre explícito y coordinación con el arca. Sin embargo, intercambia los anclajes de las notas al pie y además desplaza innecesariamente עֻזֶּךָ de «tu fuerza/fortaleza» a «tu poder», cuando el rastro auditado del POB prefirió una equivalencia más directa y literal.'
  spanish_quality_summary: 'El español es claro y digno, pero «¡Levántate!» suena un poco más coloquial/corporal que el tono litúrgico de «Arise»; «Levántate» sigue siendo aceptable, aunque «Álzate» o «Levántate» ambos funcionarían. El problema principal no es de fluidez sino de precisión editorial: la nota [a] pertenece a «lugar de reposo», no al verbo, y la nota [b] pertenece a «fuerza/fortaleza».'
  glossary_alignment: 'Se respeta correctamente «Yahvé» para יְהוָה. La frase del arca debería alinearse mejor con la decisión lexical del POB: conservar la genitiva compacta de עֹז como «fuerza» o «fortaleza» en el texto principal, dejando «poder» como alternativa en nota. «Lugar de reposo» es una buena representación de לִמְנוּחָתֶךָ.'
  issues:
  - severity: high
    issue: Las notas al pie están ancladas a las palabras equivocadas.
    rationale: La nota [a] explica la alternativa de לִמְנוּחָתֶךָ («reposo/lugar de reposo»), pero en el borrador está puesta sobre «Levántate». La nota [b] explica «fuerza/poder» del sintagma final, pero está puesta sobre «lugar de reposo». Esto rompe la trazabilidad del audit trail.
  - severity: medium
    issue: «de tu poder» se aparta de la elección principal auditada «your strength».
    rationale: Aunque «poder» es semánticamente posible, el POB documentó una preferencia por una traducción más directa y menos interpretativa de עֹז. En español, «de tu fuerza» conserva mejor la compacidad y literalidad del hebreo, dejando «poder» como alternativa en nota.
  - severity: low
    issue: El signo de exclamación no es necesario para reflejar el hebreo poético.
    rationale: No es incorrecto, pero el hebreo no exige exclamación; una puntuación más sobria puede ajustarse mejor al registro bíblico digno y moderno.
  revised_spanish_text: Levántate, Yahvé, para tu lugar de reposo[a], tú y el arca de tu fuerza[b].
  revised_footnotes:
  - marker: a
    text: O «para tu reposo». El término hebreo puede denotar el reposo en abstracto o un lugar de reposo; aquí probablemente alude al sitio donde Yahvé establece su presencia estable.
    reason: lexical_alternative
  - marker: b
    text: O «el arca de tu poder» o «el arca que significa tu poder».
    reason: lexical_alternative
