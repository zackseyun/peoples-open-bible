translation:
  language: es
  text: 'Y si presentas una ofrenda de cereal[a] cocida en horno, será de flor de harina: tortas sin levadura mezcladas con aceite, o galletas sin levadura ungidas con aceite.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Ofrenda de cereal» traduce la categoría sacrificial de מִנְחָה; en este contexto se refiere a una ofrenda hecha de harina y aceite, no a una ofrenda general de grano cualquiera.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי / וְ
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Si
  - Ahora bien, si
  lexicon: HALOT
  rationale: La secuencia condicional introduce una disposición legal; «Y si» conserva el enlace discursivo y su valor condicional sin sonar forzado en español.
- source_word: תַקְרִב
  english_pob_choice: you bring near
  chosen_spanish: presentas
  alternatives_spanish:
  - traes cerca
  - ofreces
  - presentas al acercar
  lexicon: HALOT
  rationale: El hiphil de קרב expresa acercar/presentar una ofrenda. «Presentas» comunica naturalmente la acción cultual y evita perder el matiz de acercamiento que la revisión inglesa quiso recuperar con «bring near».
- source_word: קָרְבַּן
  english_pob_choice: offering
  chosen_spanish: ofrenda
  alternatives_spanish:
  - ofrecimiento
  - oblatión
  lexicon: HALOT
  rationale: «Ofrenda» es el equivalente español más claro para el sustantivo general de algo presentado a Dios, manteniendo el valor sacrificial sin cargar terminología tradicional innecesaria.
- source_word: מִנְחָה
  english_pob_choice: grain offering
  chosen_spanish: ofrenda de cereal
  alternatives_spanish:
  - ofrenda de grano
  - ofrenda vegetal
  lexicon: HALOT
  rationale: En Levítico 2 el referente es la ofrenda sacrificial hecha de harina, pan y aceite. «Cereal» evita ambigüedad y conserva la categoría material del rito; se prefiere sobre «grano» por ser más natural en este contexto y sobre «vegetal» por ser menos transparente.
- source_word: מַאֲפֵה תַנּוּר
  english_pob_choice: baked in an oven
  chosen_spanish: cocida en horno
  alternatives_spanish:
  - horneada
  - cocida al horno
  lexicon: HALOT
  rationale: La expresión describe el modo de preparación. «Cocida en horno» mantiene la idea de cocción por calor de horno sin añadir una idiomaticidad moderna que borre el término de origen; «horneada» también sería posible, pero «cocida en horno» conserva mejor la estructura descriptiva.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina selecta
  lexicon: HALOT
  rationale: «Flor de harina» es la equivalencia española asentada para harina de la mejor calidad y reproduce bien el valor del hebreo sin necesidad de una paráfrasis técnica.
- source_word: חַלּוֹת מַצֹּת
  english_pob_choice: unleavened cakes
  chosen_spanish: tortas sin levadura
  alternatives_spanish:
  - panes ázimos
  - pasteles sin levadura
  lexicon: HALOT
  rationale: El término designa piezas de pan/cake sin fermento. «Tortas» funciona bien en español para un alimento plano y ritual; se mantiene «sin levadura» para conservar el rasgo definitorio.
- source_word: בְּלוּלֹת בַּשֶּׁמֶן
  english_pob_choice: mixed with oil
  chosen_spanish: mezcladas con aceite
  alternatives_spanish:
  - amasadas con aceite
  - batidas con aceite
  lexicon: HALOT
  rationale: El participio pasivo indica que las tortas están mezcladas con aceite. «Mezcladas» sigue de cerca el sentido y es claro en español; «amasadas» sería demasiado específico.
- source_word: וּרְקִיקֵי מַצּוֹת
  english_pob_choice: or unleavened wafers
  chosen_spanish: o galletas sin levadura
  alternatives_spanish:
  - y galletas sin levadura
  - o panes delgados sin levadura
  lexicon: HALOT
  rationale: El hebreo usa una conjunción que, según el audit trail inglés, probablemente introduce una forma alternativa del mismo tipo de ofrenda. «O» preserva esa alternativa. «Galletas» comunica la delgadez/fragilidad del término sin sonar anacrónico; se admite que «galletas» es aproximativo, pero la línea de sentido es la de piezas finas y secas.
- source_word: מְשֻׁחִים בַּשָּׁמֶן
  english_pob_choice: anointed with oil
  chosen_spanish: ungidas con aceite
  alternatives_spanish:
  - untadas con aceite
  - rociadas con aceite
  lexicon: HALOT
  rationale: משח puede ser «ungir» o «untar». En contexto alimentario ritual, «ungidas con aceite» conserva el verbo de la raíz y la formulación tradicional que aquí sigue siendo literal sin exigir consagración simbólica adicional.
theological_decisions:
- issue: Naturaleza de מִנְחָה en Levítico 2
  english_pob_reading: grain offering
  chosen_spanish_reading: ofrenda de cereal
  alternative_spanish_readings:
  - ofrenda de grano
  - ofrenda vegetal
  rationale: El pasaje no trata de una ofrenda general ni de una lectura devocional libre, sino de una categoría sacrificial concreta compuesta por harina, tortas y aceite. «Ofrenda de cereal» preserva la especificidad material del rito y evita importar una teología ajena al texto.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; consistency of key terms, or documented exception.'
- issue: 'Relación de la segunda miembro con la primera: וּרְקִיקֵי מַצּוֹת'
  english_pob_reading: or unleavened wafers
  chosen_spanish_reading: o galletas sin levadura
  alternative_spanish_readings:
  - y galletas sin levadura
  - o panes delgados sin levadura
  rationale: La conjunción hebrea puede leerse como simple 'y', pero el propio audit trail inglés documenta que probablemente enumera una forma alternativa del mismo tipo de ofrenda. En español, «o» comunica mejor esa lectura alternativa sin borrar la tensión textual; por eso se conserva como opción principal.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve documented lexical/theological tension.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés al reflejar más directamente el valor de תַקְרִב como ‘presentar/acercar’, y conserva la alternativa documentada para וּרְקִיקֵי מַצּוֹת como opción disyuntiva en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando corresponda, aunque este versículo no lo contiene.
  - Se usa «ofrenda» para קָרְבָּן y «ofrenda de cereal» para מִנְחָה siguiendo el valor cultual específico del pasaje.
  - «Ungidas con aceite» conserva la raíz de משח sin convertirla en una paráfrasis devocional.
