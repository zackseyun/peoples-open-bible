review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo difícil según la guía del paralelo griego: la idea central es que al codicioso su propia porción le parece insuficiente, y al tomar la de su prójimo termina destruyendo la suya. Sin embargo, la apertura «A los ojos del codicioso» introduce un plural no presente en el hebreo/inglés y suena menos ceñida que «A los ojos del codicioso»? Mejor aún, «Ante los ojos del codicioso» o «En los ojos del codicioso»; pero en español natural, «A los ojos de» funciona. El problema principal no es semántico fuerte, sino estilístico y de consistencia léxica en la segunda cláusula.'
  spanish_quality_summary: La redacción es clara y digna, pero «demasiado poca» con «porción» suena algo pesada; «demasiado pequeña» sería menos fiel al matiz evaluativo, e «insuficiente» ya sería más interpretativo. Puede mantenerse «demasiado poca». El ajuste más conveniente es usar «porción» también en «la porción de su prójimo» para conservar la repetición sapiencial de חֵלֶק / חֶלְקוֹ que el expediente inglés quiso preservar.
  glossary_alignment: No hay términos del glosario mayor en juego. «Codicioso» alinea bien con la decisión documentada para כּוֹשֵׁל a la luz de πλεονέκτου. «Porción» debe mantenerse de forma consistente en ambas apariciones para reflejar la decisión lexical auditada.
  issues:
  - severity: medium
    issue: Inconsistencia entre «porción» y «parte» para חֶלֶק / חֶלְקוֹ
    rationale: El expediente inglés subraya la importancia de repetir «portion» en el versículo por tono sapiencial y fidelidad léxica. El borrador usa «su porción» pero luego «la parte de su prójimo», debilitando esa repetición significativa.
  - severity: low
    issue: La frase inicial podría sonar algo menos directa en español
    rationale: «A los ojos del codicioso» es comprensible y natural, así que no constituye error. No obstante, el versículo queda más fluido con la reparación léxica principal sin necesidad de alterar esta apertura.
  revised_spanish_text: A los ojos del codicioso[a], su porción es demasiado poca, y al tomar la porción de su prójimo destruye su propia porción.
  revised_footnotes:
  - marker: a
    text: El hebreo de este pasaje es difícil; el paralelo griego dice literalmente «el ojo del codicioso no se llena con una porción», lo que apoya leer aquí a כּוֹשֵׁל como referencia a la avidez y no de manera literal como «el que tropieza».
    reason: alternative_reading
  revision_rationale: Se conserva la interpretación correcta del sujeto como «el codicioso» y la nota explicativa del hebreo difícil, pero se corrige «la parte de su prójimo» a «la porción de su prójimo» para preservar la repetición léxica y el tono proverbial del original y del expediente POB en inglés. No se requiere una reescritura mayor.
