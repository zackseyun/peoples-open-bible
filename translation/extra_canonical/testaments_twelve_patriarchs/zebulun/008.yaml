theological_decisions:
- issue: Meaning of 'God will send his compassion upon the earth' in an eschatological setting
  chosen_reading: Translate the phrase straightforwardly as a divine visitation of compassion, without specifying a messianic or incarnational referent in the main text.
  alternative_readings:
  - A veiled reference to a personal salvific agent
  - A later Christianized allusion to incarnation
  rationale: The Greek witness speaks of God sending 'his compassion' and then dwelling where mercy is found. Because the wording can be read either as personified mercy or as divine merciful action, the translation preserves the ambiguity rather than resolving it.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
- issue: Variant at the end of v.6
  chosen_reading: Use the main-text reading 'disfigures the face' and note the alternative 'destroys one's substance/possessions.'
  alternative_readings:
  - τὴν ὕπαρξιν ἀφανίζει — 'destroys one's substance/possessions'
  rationale: The base Greek line in the provided text reads 'the face,' which fits the sequence of inward and outward effects. The attested variant is significant and should be preserved in a footnote rather than silently ignored.
  doctrine_reference: 'PHILOSOPHY.md: document textual decisions transparently.'
