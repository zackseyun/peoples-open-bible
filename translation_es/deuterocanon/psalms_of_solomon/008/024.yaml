  - severity: low
    issue: El pronombre «Él» puede omitirse.
    rationale: No es incorrecto, pero en español bíblico fluye mejor «Se llevó...» salvo que se quiera énfasis explícito, ausente en el griego.
  revised_spanish_text: Se llevó a sus hijos y a sus hijas[a], a quienes habían engendrado en profanación.
