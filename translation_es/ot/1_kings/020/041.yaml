translation:
  language: es
  text: Entonces se apresuró y quitó la venda[a] de sobre sus ojos, y el rey de Israel reconoció que era uno de los profetas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo הָאֲפֵר puede entenderse tradicionalmente como «las cenizas», pero aquí el contexto apunta a una cubierta o venda usada como disfraz sobre los ojos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְמַהֵר
  english_pob_choice: Then he quickly
  chosen_spanish: Entonces se apresuró
  alternatives_spanish:
  - Y se apresuró
  - Entonces actuó con rapidez
  lexicon: HALOT
  rationale: El verbo מהר expresa prisa o rapidez. «Se apresuró» conserva la acción verbal en español y encaja bien con la secuencia narrativa inicial de «Entonces».
- source_word: וַיָּסַר
  english_pob_choice: removed
  chosen_spanish: quitó
  alternatives_spanish:
  - retiró
  - sacó
  lexicon: HALOT
  rationale: הסיר/סור significa quitar o retirar. «Quitó» es natural en español y comunica la acción de despojar algo que estaba cubriendo los ojos.
- source_word: הָאֲפֵר
  english_pob_choice: the bandage
  chosen_spanish: la cubierta[a]
  alternatives_spanish:
  - la venda
  - el vendaje
  - el cubrimiento
  lexicon: HALOT
  rationale: El contexto narrativo muestra un objeto usado como disfraz sobre los ojos. En español, «cubierta» mantiene la función de cubrir sin fijar demasiado el material; se deja la alternativa lexical en nota porque el hebreo tradicionalmente puede leerse como «ceniza», pero aquí el contexto favorece un cubrimiento/disfraz.
- source_word: מֵעַל עֵינָיו
  english_pob_choice: from over his eyes
  chosen_spanish: de sobre sus ojos
  alternatives_spanish:
  - de encima de sus ojos
  - de sobre los ojos de él
  lexicon: HALOT
  rationale: La construcción מן + על indica separación «de sobre». «De sobre sus ojos» conserva la relación espacial con claridad y suena natural en español.
- source_word: וַיַּכֵּר אֹתוֹ
  english_pob_choice: recognized him
  chosen_spanish: lo reconoció
  alternatives_spanish:
  - lo identificó
  - supo quién era
  lexicon: HALOT
  rationale: נכר en hifil suele significar reconocer o identificar. «Lo reconoció» es la forma más directa y transparente en español.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: the king of Israel
  chosen_spanish: el rey de Israel
  alternatives_spanish:
  - el rey de Israel
  lexicon: HALOT
  rationale: Sintagma constructo directo; se mantiene la forma estándar y comprensible en español.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Aquí כִּי introduce el contenido de lo reconocido, no una causa. «Que» reproduce mejor esa función completiva en español.
- source_word: מֵהַנְּבִאִים
  english_pob_choice: one of the prophets
  chosen_spanish: uno de los profetas
  alternatives_spanish:
  - de entre los profetas
  - entre los profetas
  lexicon: HALOT
  rationale: El מן partitivo indica pertenencia a un grupo. «Uno de los profetas» expresa bien esa relación de membresía en español idiomático.
- source_word: הוּא
  english_pob_choice: he was
  chosen_spanish: era
  alternatives_spanish:
  - fue
  lexicon: HALOT
  rationale: El copulativo implícito requiere verbo en español. «Era» funciona mejor en el marco descriptivo de la identificación del rey.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el análisis auditado en inglés. Se conserva la tensión léxica de הָאֲפֵר con una nota, porque el contexto narrativo favorece una cubierta/disfraz sobre los ojos más que «cenizas» literales.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en este proyecto cuando corresponda al nombre divino, pero este versículo no lo contiene.
  - Se prefiere «lo reconoció» por naturalidad narrativa y fidelidad semántica al hifil de נכר.
  - Se mantiene un registro bíblico claro y contemporáneo, evitando calcos innecesarios.
