source:
  edition: SBLGNT
  text: ἀγαπητοί, νῦν τέκνα θεοῦ ἐσμεν, καὶ οὔπω ἐφανερώθη τί ἐσόμεθα. ⸀οἴδαμεν ὅτι ἐὰν φανερωθῇ ὅμοιοι αὐτῷ ἐσόμεθα, ὅτι ὀψόμεθα αὐτὸν καθώς ἐστιν.
base_translation:
  language: en
  yaml_path: translation/nt/1_john/003/002.yaml
  text: Beloved[a], now we are children of God, and what we will be has not yet been revealed. We know that if he is revealed, we will be like him[b], because we will see him as he is.
  footnotes:
  - marker: a
    text: Or, 'if it is revealed,' referring to what we will be; the Greek subject is implicit. Context favors 'he,' referring to Christ.
    reason: alternative_reading
  - marker: b
    text: Many translations render this clause 'when he appears.' The Greek is more literally 'if he is revealed,' using the same verb as earlier in the verse.
    reason: lexical_alternative
translation:
  language: ko
  text: 사랑하는 자들이여, 지금 우리는 하나님의 자녀이며, 우리가 무엇이 될지는 아직 나타나지 않았습니다. 그러나 우리는 압니다 — 그분이 나타나시면 우리가 그분과 같이 될 것입니다. 우리가 그분을 그분 그대로 볼 것이기 때문입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὅμοιοι αὐτῷ ἐσόμεθα
