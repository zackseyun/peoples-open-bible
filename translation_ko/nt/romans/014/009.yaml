id: ROM.14.9
reference: Romans 14:9
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἰς τοῦτο γὰρ ⸀Χριστὸς ⸀ἀπέθανεν καὶ ἔζησεν ἵνα καὶ νεκρῶν καὶ ζώντων κυριεύσῃ.
base_translation:
  language: en
  yaml_path: translation/nt/romans/014/009.yaml
  text: For to this end Messiah died and lived again, so that he might rule over both the dead and the living.
translation:
  language: ko
  text: 이를 위하여 메시아께서 죽으셨다가 다시 살아나셨으니[a], 곧 죽은 자와 산 자 모두의 주가 되시기 위함입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「사셨다」 「부활하여 사셨다」. 헬라어는 「죽으셨다가 사셨다」이며, 문맥상 부활 생명을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Χριστὸς
  english_pob_choice: Messiah
  chosen_korean: 메시아
  alternatives_korean:
  - 그리스도
  lexicon: BDAG
  rationale: 정책 글로사리. 칭호로 기능하는 Χριστός→메시아.
- source_word: ἀπέθανεν καὶ ἔζησεν
  english_pob_choice: died and lived again
  chosen_korean: 죽으셨다가 다시 살아나셨다
  alternatives_korean:
  - 죽으셨다가 사셨다
  lexicon: BDAG
  rationale: 「죽음 다음의 삶」을 한국어 자연스러움을 위해 「다시 살아나셨다」로 옮긴다. 더 명시적 「부활하여 사셨다」는 각주 대안.
- source_word: κυριεύσῃ
  english_pob_choice: rule over / be Lord of
  chosen_korean: 주가 되시다
  alternatives_korean:
  - 주재하시다
  - 통치하시다
  lexicon: BDAG
  rationale: 동사 κυριεύω는 「주」(κύριος)와 동족어. 「주가 되시다」가 칭호적 무게와 통치 의미를 함께 살린다.
theological_decisions:
- issue: ἔζησεν의 부활 함의
  chosen_reading: 「다시 살아나셨다」로 부활 함의를 자연스럽게 살림
  alternative_readings:
  - 「사셨다」
  - 「부활하여 사셨다」
  rationale: 「죽음/삶」의 짝과 죽은 자·산 자 모두를 다스리신다는 목적 절이 부활 생명을 함의한다. 「다시 살아나셨다」가 문맥의 무게를 본문 너머로 확장하지 않으면서 자연스럽다.
  doctrine_reference: 'DOCTRINE.md: 신학적 긴장을 보존하라'
