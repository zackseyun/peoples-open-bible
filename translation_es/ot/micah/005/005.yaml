base_translation:
  language: en
  yaml_path: translation/ot/micah/005/005.yaml
  text: They will shepherd the land of Assyria with the sword[a], and the land of Nimrod at its entrances; and he will deliver us from Assyria when he comes into our land[b], and when he treads within our border.
  footnotes:
