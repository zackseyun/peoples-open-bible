translation:
  language: es
  text: Pues los sueños han extraviado a muchos[a], y los que esperaban en ellos han caído[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «han desviado a muchos» para «han extraviado a muchos».
    reason: lexical_alternative
  - marker: b
    text: O «han venido a ruina»; el griego puede sugerir caída, fracaso o desastre.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὺς
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - muchas personas
  - multitudes
  lexicon: LSJ
  rationale: El acusativo plural tiene referencia humana indefinida; «muchos» comunica esa amplitud de forma natural en español sin añadir una palabra innecesaria.
- source_word: ἐπλάνησεν
  english_pob_choice: have misled
  chosen_spanish: han extraviado
  alternatives_spanish:
  - han engañado
  - han desviado
  - han llevado astray
  lexicon: BDAG
  rationale: El verbo expresa hacer errar o salir del camino. «Extraviado» conserva la idea de desvío/errores provocados por los sueños sin volverlo más fuerte que el griego.
- source_word: τὰ ἐνύπνια
  english_pob_choice: dreams
  chosen_spanish: los sueños
  alternatives_spanish:
  - las visiones de sueño
  - las cosas vistas en sueños
  lexicon: LSJ
  rationale: «Sueños» es el equivalente directo, claro y suficiente para ἐνύπνια en este contexto.
- source_word: ἐξέπεσαν
  english_pob_choice: have fallen
  chosen_spanish: han caído
  alternatives_spanish:
  - han fracasado
  - han venido a ruina
  - han caído en desgracia
  lexicon: BDAG
  rationale: La imagen básica es de caída o derrumbe; «han caído» preserva la metáfora sin especificar más de lo que el texto dice.
- source_word: ἐλπίζοντες
  english_pob_choice: those who hoped
  chosen_spanish: los que ... esperaban
  alternatives_spanish:
  - los que ponían su esperanza
  - los que confiaban
  lexicon: BDAG
  rationale: El participio funciona sustantivamente. En español, «los que ... esperaban» refleja la acción continua y requiere una continuación natural con el complemento.
- source_word: ἐπʼ αὐτοῖς
  english_pob_choice: in them
  chosen_spanish: en ellos
  alternatives_spanish:
  - sobre ellos
  - en esos sueños
  lexicon: BDAG
  rationale: La preposición con pronombre retoma a «los sueños»; «en ellos» es la equivalencia idiomática normal para expresar confianza puesta en algo.
theological_decisions:
- issue: Alcance de la advertencia sobre los sueños
  english_pob_reading: The verse warns that dreams can mislead and bring downfall when people place their hope in them.
  chosen_spanish_reading: El versículo advierte que los sueños pueden extraviar y causar caída cuando se pone la esperanza en ellos.
  alternative_spanish_readings:
  - Condena todos los sueños sin excepción.
  - Se refiere sólo a interpretaciones falsas de sueños, no a los sueños mismos.
  rationale: El griego afirma directamente el extravío causado por los sueños y la caída de quienes esperaban en ellos. La traducción conserva esa advertencia sin absolutizar más allá del alcance del texto.
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del pasaje.
translation_notes:
  revision_awareness: Se corrigió la ubicación de las notas para que cada marcador aparezca exactamente en el texto español. No se añadieron notas sin anclaje. La redacción mantiene el orden y la fuerza proverbial del griego.
  spanish_consistency_notes:
  - Se usó «sueños» como equivalente directo de ἐνύπνια, coherente con el audit trail inglés.
  - Se prefirió «extraviado» por su campo semántico de desvío y error, evitando una intensificación innecesaria.
  - «Han caído» conserva la metáfora de ἐξέπεσαν sin especificar un tipo de ruina que el griego no explicita.
  - La construcción española reorganiza el orden para sonar natural, pero mantiene todos los elementos semánticos del original.
