translation:
  language: es
  text: Fuego y agua están puestos[a] delante de ti; hacia lo que quieras, extiende tu mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «מוּצָק», una forma inusual; el sentido de «están puestos» se apoya en el paralelo griego, «ha puesto delante de ti».'
    reason: textual_variant
lexical_decisions:
- source_word: מוּצָק
  english_pob_choice: are set
  chosen_spanish: están puestos
  alternatives_spanish:
  - están colocados
  - están dispuestos
  - son puestos
  lexicon: HALOT
  rationale: El hebreo de este testimonio es inusual, pero el contexto de לְפָנֶיךָ y el paralelo griego παρέθηκέν σοι indican claramente una presentación de opciones delante de la persona. «Están puestos» conserva la idea de disposición delante de alguien sin sonar forzado en español.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - frente a ti
  lexicon: HALOT
  rationale: Es un idiomatismo espacial directo. «Delante de ti» mantiene la imagen concreta y resulta natural en español moderno.
- source_word: אֵשׁ וָמָיִם
  english_pob_choice: Fire and water
  chosen_spanish: Fuego y agua
  alternatives_spanish:
  - Fuego y las aguas
  - Fuego y agua
  lexicon: HALOT
  rationale: Se conserva literalmente la pareja de contrarios, tal como en hebreo y en el paralelo griego πῦρ καὶ ὕδωρ.
- source_word: בַּאֲשֶׁר תַּחְפֹּץ
  english_pob_choice: whichever you choose
  chosen_spanish: cualquiera que elijas
  alternatives_spanish:
  - cualquiera que quieras
  - lo que prefieras
  lexicon: HALOT
  rationale: חפץ expresa deseo/voluntad; en este contexto de decisión moral, «elijas» transmite mejor el acto volitivo que una mera preferencia. «Cualquiera que» reproduce la alternativa abierta del texto.
- source_word: שְׁלַח יָדֶיךָ
  english_pob_choice: stretch out your hand to it
  chosen_spanish: extiende tu mano hacia ello
  alternatives_spanish:
  - tiende tu mano hacia ello
  - alarga tu mano hacia ello
  - extiende tu mano
  lexicon: HALOT
  rationale: La frase es idiomática y significa extender la mano hacia algo. «Extiende tu mano hacia ello» es natural en español y conserva el gesto de decisión; «hacia ello» explicita el objeto según el contexto inmediato.
theological_decisions:
- issue: Énfasis en la agencia moral humana
  english_pob_reading: The verse is rendered as a genuine presentation of choice without importing later doctrinal qualifiers.
  chosen_spanish_reading: El versículo se traduce como una presentación real de opciones y una invitación explícita a escoger, sin suavizar la fuerza de la decisión.
  alternative_spanish_readings:
  - Una lectura más determinista que atenúe el mandato de elegir
  - Una formulación más exhortativa que añada matices doctrinales
  rationale: Tanto el hebreo como el griego ponen alternativas delante del oyente y mandan elegir/extender la mano. La traducción conserva esa tensión de manera transparente y no introduce restricciones doctrinales ajenas al texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: Pasaje con alto acuerdo en la revisión más reciente; no hubo cambios aplicados y la lectura se mantiene estable según el control cruzado.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el nombre divino aparece; aquí no aplica.
  - Se mantiene un español moderno y digno, evitando calcos innecesarios.
  - «Puestos delante de ti» conserva la imagen de opciones situadas ante la persona sin forzar una explicación interpretativa.
