    rationale: El hebreo es un modismo temporal de promesa-cumplimiento que indica aproximadamente la misma época del año siguiente. La redacción actual conserva forma literal pero no comunica bien el sentido al lector hispanohablante, contrariando la filosofía POB y la evidencia léxica documentada.
  - severity: medium
    issue: La nota al pie aclara bien el modismo, pero la línea principal debería comunicar el sentido básico sin depender de la nota.
    rationale: Las notas sirven para preservar alternativas o literalidades relevantes, no para rescatar una redacción principal que por sí sola resulta oscura.
