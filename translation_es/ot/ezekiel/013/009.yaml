  yaml_path: translation/ot/ezekiel/013/009.yaml
  text: And my hand will be against the prophets who see falsehood and who practice lying divination[a]. They will not be in the council of my people, nor will they be written in the register of the house of Israel, nor will they enter the land of Israel[c][b]. Then you will know that I am the Lord Yahweh.
