translation:
  language: es
  text: Su pensamiento interior es que sus casas durarán para siempre[a], sus moradas de generación en generación[b]; pusieron sus nombres a las tierras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo una comprensión textual alternativa: «Sus sepulcros son sus casas para siempre, sus moradas de generación en generación».'
    reason: textual_variant
  - marker: b
    text: 'Literalmente: «llamaron por sus nombres sobre tierras». El sentido es que dieron sus propios nombres a tierras o propiedades.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קִרְבָּם
  english_pob_choice: their inward thought
  chosen_spanish: su pensamiento íntimo
  alternatives_spanish:
  - su interior
  - su corazón
  - su sepulcro
  lexicon: HALOT
  rationale: El hebreo con קֶרֶב apunta al interior, lo íntimo o lo que está dentro de ellos. En español, 'pensamiento íntimo' comunica con naturalidad la idea del supuesto interno del rico sin introducir una glosa doctrinal. 'Su sepulcro' queda reservado para la lectura textual alternativa, no para el texto principal.
- source_word: בָּתֵּימוֹ
  english_pob_choice: their houses
  chosen_spanish: sus casas
  alternatives_spanish:
  - sus hogares
  - sus casas-hogar
  lexicon: HALOT
  rationale: בַּיִת normalmente es 'casa'. 'Casas' mantiene el paralelismo con 'moradas' y conserva la imagen de propiedad y permanencia. 'Hogares' sería más interpretativo.
- source_word: לְעוֹלָם
  english_pob_choice: will last forever
  chosen_spanish: durarán para siempre
  alternatives_spanish:
  - serán para siempre
  - permanecerán para siempre
  lexicon: HALOT
  rationale: El hebreo es una construcción sin verbo explícito; el español requiere verbalizarla. 'Durarán para siempre' expresa la pretensión de permanencia de manera natural y sin exagerar el sentido.
- source_word: מִשְׁכְּנֹתָם
  english_pob_choice: their dwelling places
  chosen_spanish: sus moradas
  alternatives_spanish:
  - sus viviendas
  - sus habitaciones
  lexicon: HALOT
  rationale: מִשְׁכָּן / מִשְׁכְּנֹת habla de lugar de estancia o residencia. 'Moradas' preserva el paralelismo poético con 'casas' y es más digno que 'viviendas' en este contexto.
- source_word: לְדֹר וָדֹר
  english_pob_choice: from generation to generation
  chosen_spanish: de generación en generación
  alternatives_spanish:
  - por generación y generación
  - para todas las generaciones
  lexicon: HALOT
  rationale: La fórmula idiomática se expresa de manera natural y estable en español como 'de generación en generación'.
- source_word: קָרְאוּ
  english_pob_choice: they have called
  chosen_spanish: han llamado
  alternatives_spanish:
  - han nombrado
  - han puesto nombre
  lexicon: HALOT
  rationale: קרא en este contexto tiene el valor de designar o nombrar. 'Han llamado' conserva la forma verbal y se entiende en español como acto de nombrar algo con su nombre.
- source_word: בִּשְׁמוֹתָם
  english_pob_choice: by their own names
  chosen_spanish: por sus propios nombres
  alternatives_spanish:
  - con sus propios nombres
  - a su propio nombre
  lexicon: HALOT
  rationale: La preposición בְּ con 'nombres' expresa designación mediante el nombre. 'Por sus propios nombres' comunica en español que pusieron sus nombres sobre las tierras sin perder la referencia al acto de nombrar.
- source_word: עֲלֵי אֲדָמוֹת
  english_pob_choice: lands
  chosen_spanish: tierras
  alternatives_spanish:
  - terrenos
  - propiedades
  - extensiones de tierra
  lexicon: HALOT
  rationale: El plural hebreo sugiere tierras o dominios. 'Tierras' es breve, bíblico y suficientemente amplio para abarcar parcelas, fincas o dominios nombrados por ellos.
theological_decisions:
- issue: Lectura de קִרְבָּם frente a la variante interpretativa 'sus sepulcros'
  english_pob_reading: their inward thought
  chosen_spanish_reading: su pensamiento íntimo
  alternative_spanish_readings:
  - sus sepulcros son sus casas
  - su sepulcro es su casa
  rationale: El texto consonántico y la vocalización masorética favorecen la lectura de lo interior, no la de 'sepulcros'. Por eso el texto principal sigue la lectura masorética y reserva la alternativa en una nota textual, para no borrar la tensión documentada entre ambas tradiciones.
  doctrine_reference: Textual criticism; cf. Ps 49:11-12 en el contexto de la falsa seguridad de los ricos
- issue: Permanencia ilusoria de posesiones y renombre
  english_pob_reading: their houses will last forever ... they have called lands by their own names
  chosen_spanish_reading: sus casas durarán para siempre ... han llamado tierras por sus propios nombres
  alternative_spanish_readings:
  - sus casas son eternas
  - han bautizado tierras con sus nombres
  rationale: El verso expone la autoexaltación y la ilusión de permanencia asociadas con posesiones y tierras. La formulación española conserva ese juicio implícito sin añadir comentario devocional que no esté en el hebreo.
  doctrine_reference: Tema bíblico de la vanidad de las riquezas y la pretensión humana de permanencia
translation_notes:
  revision_awareness: 'La versión inglesa POB adoptó una lectura óptima-equivalente con nota textual para קִרְבָּם y una nota léxica para בִּשְׁמוֹתָם / עֲלֵי אֲדָמוֹת. El borrador español conserva ambas aperturas críticas: texto principal siguiendo la lectura masorética y notas que preservan la alternativa textual y el sentido de nombrar tierras o propiedades por sus nombres.'
  spanish_consistency_notes:
  - Se mantiene 'casas' / 'moradas' para reflejar el paralelismo hebreo.
  - '''De generación en generación'' conserva la fórmula idiomática estable en español.'
  - '''Tierras'' se prefiere a ''estados'' o ''propiedades'' para no estrechar indebidamente el alcance semántico.'
  - No se usa 'SEÑOR' ni sustitución reverencial, porque el versículo no contiene el nombre divino.
