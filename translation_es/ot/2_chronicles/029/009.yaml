review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo: וְהִנֵּה como llamada de atención, נָפְלוּ como «han caído», la lista familiar diferenciada, בַּשְּׁבִי como estado de cautiverio, y עַל זֹאת como causa. Sin embargo, «nuestros hijos y nuestras hijas» no preserva con suficiente precisión la distinción léxica de וּבָנֵינוּ «nuestros hijos varones / nuestros hijos» frente a וּבְנוֹתֵינוּ «nuestras hijas», porque en español «hijos» puede sonar inclusivo y solaparse con «hijas».'
  spanish_quality_summary: 'El español es claro y digno. «Y he aquí» funciona en registro bíblico; «han caído a espada» y «están en cautiverio» son naturales. La mejora principal es léxica y de precisión: «nuestros hijos varones» suena algo pesado; «nuestros hijos y nuestras hijas» es ambiguo. La opción más fiel y legible es «nuestros hijos, nuestras hijas y nuestras esposas».'
  glossary_alignment: No hay conflictos con la terminología del proyecto. Se mantiene «esposas» para וְנָשֵׁינוּ, «cautiverio» para בַּשְּׁבִי y no hay términos teológicos especiales en disputa. La única desalineación relevante es con la decisión auditada de conservar la especificidad de «sons» frente a una expresión española potencialmente inclusiva.
  issues:
  - severity: medium
    issue: «nuestros hijos» para וּבָנֵינוּ puede neutralizar la distinción con «nuestras hijas»
    rationale: El hebreo enumera explícitamente varones y mujeres por separado. En español contemporáneo, «hijos» puede entenderse como descendencia en general, de modo que la forma actual debilita la diferenciación que el texto quiere conservar.
  - severity: low
    issue: La nota al pie [a] ofrece como alternativa exactamente la misma expresión que el texto principal
    rationale: El texto dice «Y he aquí[a]», mientras la nota dice «O «he aquí»». No es incorrecto, pero la alternativa no añade mucho valor al lector porque solo omite la conjunción.
  revised_spanish_text: Y he aquí[a], nuestros padres han caído a espada[b], y nuestros hijos, nuestras hijas y nuestras esposas están en cautiverio por causa de esto.
