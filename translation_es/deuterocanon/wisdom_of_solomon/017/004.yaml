translation:
  language: es
  text: Pues ni siquiera la cámara interior que los retenía los mantenía libres de temor; más bien, sonidos que los perturbaban resonaban a su alrededor[a], y apariciones[b] sombrías, con rostros sombríos y sin sonrisa, aparecían.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo raro sugiere un ruido repetido y envolvente, con idea de reverberación o de sonido que rodea a quienes lo oyen.
    reason: lexical_alternative
  - marker: b
    text: O «fantasmas» o «espectros» para «apariciones». El término griego puede referirse a manifestaciones fantasmales o inquietantes.
    reason: lexical_alternative
lexical_decisions:
- source_word: μυχὸς
  english_pob_choice: inner chamber
  chosen_spanish: cámara interior
  alternatives_spanish:
  - receso interior
  - aposento interior
  - lugar recóndito
  lexicon: LSJ
  rationale: μυχός designa un interior recóndito o retirado. «Cámara interior» conserva la idea de un espacio cerrado y oculto, con un español natural y digno, sin volverlo demasiado técnico o abstracto.
- source_word: ὁ κατέχων αὐτοὺς
  english_pob_choice: that held them
  chosen_spanish: que los retenía
  alternatives_spanish:
  - que los contenía
  - que los confinaba
  - que los mantenía
  lexicon: BDAG
  rationale: El participio con κατέχω expresa la idea de retener, sostener o mantener dentro. «Los retenía» conserva la fuerza de encierro sin añadir una coerción mayor de la que exige el griego.
- source_word: ἀφόβως
  english_pob_choice: free from fear
  chosen_spanish: libres de temor
  alternatives_spanish:
  - sin temor
  - sin miedo
  - libres de miedo
  lexicon: LSJ
  rationale: El adverbio significa «sin temor» o «sin miedo». En español, «libres de temor» reproduce con claridad la idea de ausencia de miedo y mantiene un tono formal acorde al libro.
- source_word: ἐκταράσσοντες
  english_pob_choice: troubled
  chosen_spanish: perturbaban
  alternatives_spanish:
  - trastornaban
  - inquietaban
  - agitarban
  lexicon: LSJ
  rationale: El participio expresa causar agitación o desorden interior. «Perturbaban» comunica bien la inquietud psicológica sin intensificar indebidamente el efecto como terror explícito.
- source_word: ἐτρεκόμπουν
  english_pob_choice: rang around them
  chosen_spanish: resonaban a su alrededor
  alternatives_spanish:
  - reverberaban a su alrededor
  - retumbaban a su alrededor
  - sonaban en torno a ellos
  lexicon: LSJ
  rationale: El verbo raro sugiere un ruido repetido, envolvente o reverberante. «Resonaban a su alrededor» transmite el efecto auditivo circundante con naturalidad en español y sin oscurecer el sentido.
- source_word: φάσματα
  english_pob_choice: apparitions
  chosen_spanish: apariciones
  alternatives_spanish:
  - fantasmas
  - espectros
  - visiones
  lexicon: LSJ
  rationale: φάσματα puede denotar apariciones, fantasmas o espectros. «Apariciones» preserva la ambigüedad sobrenatural del texto sin decidir más de lo que el griego obliga.
- source_word: ἀμειδήτοις
  english_pob_choice: unsmiling
  chosen_spanish: sin sonrisa
  alternatives_spanish:
  - inesbozables
  - adustas
  - sombrías
  lexicon: LSJ
  rationale: El adjetivo significa literalmente «no sonrientes». «Sin sonrisa» reproduce de manera directa la imagen concreta del griego y evita una interpretación más libre.
- source_word: κατηφῆ προσώποις
  english_pob_choice: gloomy faces
  chosen_spanish: rostros sombríos
  alternatives_spanish:
  - rostros abatidos
  - rostros adustos
  - caras sombrías
  lexicon: LSJ
  rationale: κατηφής significa abatido, sombrío o de semblante triste. «Rostros sombríos» es una equivalencia natural y solemne para el español bíblico contemporáneo.
- source_word: ἐνεφανίζετο
  english_pob_choice: appeared
  chosen_spanish: se les mostraban
  alternatives_spanish:
  - aparecían
  - se hacían visibles
  - se presentaban
  lexicon: LSJ
  rationale: El verbo significa aparecer o hacerse visible. Aquí, «se les mostraban» conserva el carácter visual y experiencial de la escena y evita sonar demasiado genérico.
theological_decisions:
- issue: Naturaleza de las φάσματα
  english_pob_reading: Render as 'apparitions' without deciding whether the text implies objective demonic beings or fear-induced visions.
  chosen_spanish_reading: Traducir como «apariciones» sin resolver si se trata de seres objetivos, espectros o visiones inducidas por el temor.
  alternative_spanish_readings:
  - fantasmas
  - espectros
  - visiones
  rationale: El pasaje describe fenómenos aterradores, pero no obliga a precisar su ontología. La traducción preserva la ambigüedad teológica y experiencial del original.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: El borrador sigue la revisión inglesa más reciente en el sentido de ἀφόβως como ausencia de temor y de ἐκταράσσοντες como perturbación. También conserva la ambigüedad de φάσματα, siguiendo la nota auditada del inglés POB.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto lo exija; este versículo no contiene el nombre divino.
  - Se tradujeron los elementos auditivos y visuales con equivalentes naturales, evitando calcos innecesarios.
  - Se preservó la tensión semántica de φάσματα con «apariciones» y una nota alternativa.
  - Se evitó «siervo» o terminología doctrinal ajena al pasaje; el lenguaje permanece descriptivo y fiel al griego.
