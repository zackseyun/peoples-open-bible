    issue: La expresión 'se han vuelto nada' resulta algo áspera en español bíblico natural.
    rationale: Aunque comunica el sentido, 'han llegado a ser nada' expresa mejor el cambio de estado de הֱיִיתֶם y evita una formulación más chocante o coloquial.
  - severity: low
    issue: El marcador de nota [a] está separado por un espacio de la palabra/frase anclada.
    rationale: Las instrucciones requieren que el marcador aparezca directamente en el texto relevante con el formato exacto, p. ej. 'nada[a]'.
  revised_spanish_text: Porque ahora han llegado a ser nada[a]; ven el terror[b] y tienen miedo.
