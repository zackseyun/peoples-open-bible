  source_alignment_summary: La propuesta española no preserva fielmente el sentido del hebreo ni la auditoría inglesa. רֹעֶה aquí debe comunicar explotación/predación, pero «al barrer a» es un error léxico en español y no representa רעה. Además, אַלְמָנָה significa «viuda», no «huérfano»; ese cambio altera el referente vulnerable del verso sin base en la evidencia dada. El resto del verso («que no da a luz», «no hace bien») va en línea general con el original.
  spanish_quality_summary: El borrador actual no es legible ni natural en español bíblico moderno por «Al barrer a…», que resulta gramatical y semánticamente impropio. También la frase inicial con marcador antepuesto queda torpe. Una redacción clara y digna en español sería «Se aprovecha de la mujer estéril que no da a luz[a], y no hace bien a la viuda».
  glossary_alignment: No hay términos de glosario mayores implicados aparte de mantener la categoría social correcta «viuda» para אַלְמָנָה. La revisión respeta la decisión POB de dar a רֹעֶה una fuerza hostil; en español «se aprovecha de» comunica esa explotación mejor que un calco literal confuso. También conserva «estéril» y «da a luz» de forma natural.
  issues:
  - severity: high
    issue: «al barrer a» para רֹעֶה
    rationale: Es un error léxico; «barrer» no corresponde a רעה y produce un sinsentido. La auditoría inglesa documenta un valor predatorio («preys on»), no una acción de barrer.
  - severity: high
    issue: «huérfano» por אַלְמָנָה
    rationale: El hebreo dado dice inequívocamente «viuda». Sustituirlo por «huérfano» altera el significado del texto y el paralelismo social del verso.
  - severity: medium
    issue: Anclaje y posición del marcador de nota
    rationale: El marcador [a] al inicio de la oración no señala la palabra discutida. Debe anclarse en la frase relevante, idealmente junto a la expresión que traduce לֹא תֵלֵד o al verbo principal según la nota.
