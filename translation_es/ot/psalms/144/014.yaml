translation:
  language: es
  text: Nuestro ganado está cargado de crías[a]; no hay brecha, ni salida[b][c], ni clamor en nuestras calles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Nuestros bueyes están cargados». El hebreo אַלּוּפֵינוּ también puede significar «nuestros bueyes/ganado», y מְסֻבָּלִים literalmente significa «cargados» o «llevando una carga». En este contexto, muchos entienden la línea como una descripción de fecundidad o abundancia del ganado.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ni exilio» o «ni alguien que salga». El hebreo es breve y puede referirse a que no hay salida forzada de la ciudad, más que a un simple movimiento hacia afuera.'
    reason: alternative_reading
  - marker: c
    text: 'O: «ni salida».'
    reason: previous_rendering
lexical_decisions:
- source_word: אַלּוּפֵינוּ
  english_pob_choice: our cattle
  chosen_spanish: nuestros ganados
  alternatives_spanish:
  - nuestros bueyes
  - nuestros animales de ganado
  - nuestros rebaños
  lexicon: HALOT
  rationale: El hebreo אַלּוּפֵינוּ puede referirse a ganado, especialmente en este contexto de prosperidad. 'Ganados' conserva el sentido colectivo y evita decidir demasiado pronto entre 'bueyes' y 'cattle'. Asimismo, funciona bien con el participio siguiente.
- source_word: מְסֻבָּלִים
  english_pob_choice: heavy with young
  chosen_spanish: están preñados
  alternatives_spanish:
  - están cargados
  - están muy cargados
  - llevan carga
  lexicon: HALOT
  rationale: La forma pasiva sugiere literalmente 'cargados' o 'llevando una carga', pero la lectura contextual adoptada por la POB inglesa es de fecundidad del ganado. 'Están preñados' comunica esa idea de manera natural en español sin perder la imagen de prosperidad animal.
- source_word: פֶּרֶץ
  english_pob_choice: there is no breach
  chosen_spanish: no hay brecha
  alternatives_spanish:
  - no hay ruptura
  - no hay rotura
  - no hay quebranto
  lexicon: HALOT
  rationale: '''Brecha'' reproduce con precisión el valor de ruptura/abertura y mantiene el posible trasfondo de seguridad urbana o militar.'
- source_word: יוֹצֵאת
  english_pob_choice: no going out
  chosen_spanish: salida
  alternatives_spanish:
  - salir
  - salida hacia afuera
  - expulsión
  lexicon: HALOT
  rationale: El hebreo es elíptico e impersonal. 'Salida' conserva la tersura del original y permite tanto la idea general de movimiento hacia afuera como la posible referencia a salida forzada, sin fijar de más el sentido.
- source_word: צְוָחָה
  english_pob_choice: cry
  chosen_spanish: clamor
  alternatives_spanish:
  - grito
  - llanto
  - alarido
  lexicon: HALOT
  rationale: '''Clamor'' expresa bien un grito de angustia o protesta, y en español puede abarcar mejor el matiz de aflicción pública que ''grito''.'
- source_word: בִּרְחֹבֹתֵינוּ
  english_pob_choice: in our streets
  chosen_spanish: en nuestras calles
  alternatives_spanish:
  - en nuestras plazas
  - en nuestros espacios públicos
  - en nuestras avenidas
  lexicon: HALOT
  rationale: '''Calles'' es la equivalencia natural y pública para רְחֹבוֹת en español contemporáneo, manteniendo el ámbito cívico del versículo.'
theological_decisions:
- issue: Ambigüedad de אַלּוּפֵינוּ entre ganado y líderes
  english_pob_reading: our cattle
  chosen_spanish_reading: nuestros ganados
  alternative_spanish_readings:
  - nuestros jefes
  - nuestros clanes
  - nuestros capitanes
  rationale: La POB inglesa adopta la lectura de animales domésticos por coherencia con מְסֻבָּלִים y con el cuadro de prosperidad. En español se mantiene esa lectura para no introducir una interpretación sociopolítica menos probable en este contexto.
  doctrine_reference: No aplica; decisión lexicográfica-contextual.
- issue: יוֹצֵאת como salida general o salida forzada/exilio
  english_pob_reading: and no going out
  chosen_spanish_reading: ni salida
  alternative_spanish_readings:
  - ni exilio
  - ni salida forzada
  - ni nadie que salga
  rationale: La POB inglesa conserva la ambigüedad del hebreo y deja abierta la nota sobre 'exile' o 'one going forth'. En español, 'salida' mantiene esa tensión sin cerrar el sentido a una única lectura.
  doctrine_reference: No aplica; decisión de ambigüedad textual-semántica.
translation_notes:
  revision_awareness: La revisión inglesa más reciente volvió de 'no one going forth' a 'no going out' para reflejar mejor la impersonalidad del hebreo. La redacción española sigue esa misma línea, usando 'salida' para conservar la tersura y la ambigüedad del original. También se preserva la lectura de prosperidad del ganado, en vez de forzar un sentido militar o administrativo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - 'Se conserva una sintaxis paralela de negaciones: ''no hay... ni... ni...'', cercana a la concisión del hebreo.'
  - '''Ganados'' se usa aquí en sentido colectivo; no se pretende fijar especie exacta.'
  - '''Clamor'' en lugar de ''grito'' evita un tono demasiado coloquial y mantiene el registro solemne.'
