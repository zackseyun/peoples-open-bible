translation:
  language: es
  text: Y entabló guerra[a] contra Tolomeo, rey de Egipto; y Tolomeo fue derrotado delante de él y huyó[b], y cayeron muchos heridos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego usa un modismo que literalmente significa ‘organizó/estableció guerra’. ‘Entabló guerra’ expresa de manera natural en español que inició y sostuvo conflicto militar; también podría traducirse ‘hizo guerra’.
    reason: lexical_alternative
  - marker: b
    text: El griego puede significar ‘fue rechazado/puesto en fuga’ o ‘retrocedió ante él’. Aquí se traduce ‘fue derrotado’ para expresar el sentido militar general; una alternativa más literal sería ‘fue rechazado delante de él’.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνεστήσατο πόλεμον
  english_pob_choice: waged war
  chosen_spanish: trabó guerra
  alternatives_spanish:
  - hizo guerra
  - entabló guerra
  - libró guerra
  lexicon: LSJ
  rationale: El giro griego literalmente significa ‘estableció/organizó guerra’, pero en este contexto expresa iniciar y sostener conflicto militar. ‘Trabó guerra’ es una fórmula natural en español bíblico y conserva el matiz activo sin ser demasiado libre.
- source_word: πρὸς
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - hacia
  - frente a
  lexicon: LSJ
  rationale: Con πόλεμον, πρὸς marca dirección hostil. ‘Contra’ transmite con claridad la relación adversarial militar.
- source_word: ἐνετράπη
  english_pob_choice: was routed
  chosen_spanish: fue derrotado
  alternatives_spanish:
  - fue rechazado
  - fue desbandado
  - fue puesto en fuga
  lexicon: LSJ
  rationale: En este contexto de batalla, el verbo indica haber sido hecho retroceder o vencido frente al adversario. ‘Fue derrotado’ conserva el sentido militar de una caída en combate sin introducir un matiz más específico que el griego no exige.
- source_word: ἀπὸ προσώπου αὐτοῦ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - de delante de él
  - de su presencia
  - ante él
  lexicon: LSJ
  rationale: La expresión idiomática comunica retirada ante la presencia o fuerza del enemigo. ‘Delante de él’ es natural en español y mantiene la imagen espacial del original.
- source_word: ἔφυγεν
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - fue huyendo
  - escapó
  lexicon: LSJ
  rationale: El verbo significa huir en contexto de combate. ‘Huyó’ es directo, digno y plenamente fiel.
- source_word: ἔπεσαν τραυματίαι πολλοί
  english_pob_choice: many fell wounded
  chosen_spanish: cayeron muchos heridos
  alternatives_spanish:
  - muchos heridos cayeron
  - cayeron muchos, heridos
  - muchos quedaron heridos y cayeron
  lexicon: LSJ
  rationale: El griego dice literalmente que ‘cayeron’ muchos ‘heridos’. ‘Cayeron muchos heridos’ preserva el orden y la imaginería bélica; en español suena natural y evita precisar más allá de lo dicho.
translation_notes:
  revision_awareness: El pasaje griego y el audit trail inglés están en alta concordancia; no se requieren revisiones textuales. La versión española sigue la misma lectura semántica y conserva la ambigüedad bélica de ἐνετράπη sin ampliarla indebidamente.
  spanish_consistency_notes:
  - Se mantiene ‘Ptolomeo’ para Πτολεμαῖος y ‘Egipto’ para Αἰγύπτου conforme al uso español estándar.
  - Se evita ‘SEÑOR’ u otras convenciones de ocultamiento del nombre divino porque este versículo no contiene referencias al Tetragrámaton.
  - ‘Heridos’ conserva el valor de τραυματίαι como personas heridas en combate, sin forzar la idea de muerte ni de simple lesión aislada.
