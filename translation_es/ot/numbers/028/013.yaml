translation:
  language: es
  text: y una décima de efa de flor de harina como ofrenda vegetal, mezclada con aceite, para cada cordero[a], como holocausto, aroma grato, ofrenda por fuego para Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «ofrenda hecha por fuego» para אִשֶּׁה.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעִשָּׂרֹן עִשָּׂרוֹן
  english_pob_choice: and a tenth of an ephah
  chosen_spanish: una décima de efa
  alternatives_spanish:
  - una décima parte
  - una décima de un efa
  lexicon: HALOT
  rationale: La construcción hebrea expresa una medida sacrificial de décima parte; en español, 'una décima de efa' conserva el valor técnico y es idiomático. Mantener 'efa' hace inteligible la unidad de medida sin añadir explicación innecesaria en el cuerpo del texto.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - flor fina de harina
  lexicon: HALOT
  rationale: '''Flor de harina'' es una equivalencia bíblica estable y natural en español para la harina refinada usada en ofrendas; comunica la calidad especial del producto sin perder claridad.'
- source_word: מִנְחָה
  english_pob_choice: grain offering
  chosen_spanish: ofrenda vegetal
  alternatives_spanish:
  - ofrenda de cereal
  - ofrenda de grano
  lexicon: HALOT
  rationale: Aunque 'ofrenda de cereal' o 'de grano' sería más literal, 'ofrenda vegetal' refleja el uso cultual tradicional en español y evita reducir el término a un solo cultivo; aquí se trata de una ofrenda no animal, de producto vegetal.
- source_word: בְּלוּלָה בַשֶּׁמֶן
  english_pob_choice: mixed with oil
  chosen_spanish: amasada con aceite
  alternatives_spanish:
  - mezclada con aceite
  - removida con aceite
  lexicon: HALOT
  rationale: El participio indica una mezcla preparada de manera ritual; 'amasada con aceite' expresa bien la elaboración de la ofrenda en español culto y conserva el matiz de preparación material, no solo de combinación abstracta.
- source_word: לַכֶּבֶשׂ הָאֶחָד
  english_pob_choice: for each lamb
  chosen_spanish: para cada cordero
  alternatives_spanish:
  - para el cordero
  - por cada cordero
  lexicon: HALOT
  rationale: El hebreo tiene fuerza distributiva; 'para cada cordero' evita sugerir un solo animal y conserva la distribución ritual. 'Cordero' es natural en español para un animal sacrificial joven.
- source_word: עֹלָה
  english_pob_choice: a burnt offering
  chosen_spanish: como holocausto
  alternatives_spanish:
  - como ofrenda quemada
  - como ofrenda íntegramente quemada
  lexicon: HALOT
  rationale: '''Holocausto'' es el término técnico habitual en español bíblico para עֹלָה y preserva el carácter sacrificial completo, sin reemplazarlo por una paráfrasis más explicativa.'
- source_word: רֵיחַ נִיחֹחַ
  english_pob_choice: a pleasing aroma
  chosen_spanish: aroma grato
  alternatives_spanish:
  - aroma agradable
  - aroma de satisfacción
  lexicon: HALOT
  rationale: La expresión fija describe aceptación cultual ante Dios, no una reacción física; 'aroma grato' mantiene dignidad, brevedad y el tono sacrificial tradicional en español.
- source_word: אִשֶּׁה
  english_pob_choice: a food offering
  chosen_spanish: ofrenda encendida
  alternatives_spanish:
  - ofrenda hecha por fuego
  - ofrenda por fuego
  lexicon: HALOT
  rationale: La raíz remite a fuego/combustión. Frente al inglés POB, en español 'ofrenda encendida' comunica el mismo campo semántico sin depender de la categoría 'food offering', que en español sería equívoca. Se preserva la tensión literal del término cultual.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - de Yahvé
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: Se sigue el estándar del proyecto para el nombre divino. 'Para Yahvé' refleja el destinatario cultual de la ofrenda en español natural y mantiene la transliteración establecida del Tetragrama.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrama. Conforme al estándar del proyecto, se traduce como 'Yahvé' y no se sustituye por una máscara titulada. Esto conserva la identidad pactual del nombre en el texto público.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Naturaleza de אִשֶּׁה
  english_pob_reading: food offering
  chosen_spanish_reading: ofrenda encendida
  alternative_spanish_readings:
  - ofrenda por fuego
  - ofrenda de fuego
  rationale: El inglés POB opta por 'food offering' con nota alternativa; en español, esa expresión no comunica bien el valor cultual ni es tradicional. 'Ofrenda encendida' mantiene la referencia al fuego sin borrar la dimensión sacrificial.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Término sacrificial עֹלָה
  english_pob_reading: burnt offering
  chosen_spanish_reading: holocausto
  alternative_spanish_readings:
  - ofrenda quemada
  - ofrenda totalmente quemada
  rationale: '''Holocausto'' es el término técnico bíblico establecido en español para עֹלָה. Aunque en uso común la palabra puede tener asociaciones modernas, en este contexto cultual es la opción más precisa y reconocible.'
  doctrine_reference: Lexical standardization for sacrificial terminology
translation_notes:
  revision_awareness: El inglés POB revisó la cláusula distributiva de 'for each one lamb' a 'for each lamb' por naturalidad y ajustó la aposición de 'as a burnt offering'. El español sigue esa decisión con una distribución natural ('para cada cordero') y conserva la aposición cultual ('como holocausto').
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino, coherente con el estándar del proyecto.
  - '''Holocausto'' y ''ofrenda encendida'' preservan el léxico sacrificial sin confundir categorías.'
  - '''Flor de harina'' y ''ofrenda vegetal'' forman una pareja de términos bíblicos comprensible en español litúrgico y académico.'
  - La nota de pie de página se usa solo para una alternativa lexical relevante y anclada en el término cultual final.
