translation:
  language: es
  text: Y Yahvé dijo a Moisés.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Y Yahvé dijo a Moisés, diciendo». El infinitivo introductorio «diciendo» señala que el discurso continúa en el versículo siguiente; en español puede omitirse por fluidez.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: habló
  alternatives_spanish:
  - y dijo
  - entonces dijo
  lexicon: HALOT
  rationale: El hebreo narrativo וַיֹּאמֶר introduce una acción de habla en secuencia. En español, "habló" comunica con naturalidad la transición narrativa sin forzar un calco de "y ... dijo" cuando el contenido directo continúa en el versículo siguiente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio según el criterio del proyecto para el Tetragrámaton, evitando la sustitución por un título. "Yahvé" es la forma estándar de este proyecto en español.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - hacia
  lexicon: HALOT
  rationale: La preposición hebrea marca destinatario del habla; en español, "a" expresa de manera natural la dirección del discurso hacia Moisés.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico establecido en español.
- source_word: לֵּאמֹר
  english_pob_choice: saying
  alternatives_spanish:
  - diciendo
  - así
  lexicon: HALOT
  rationale: El infinitivo לֵאמֹר introduce el discurso siguiente, pero en español puede omitirse sin pérdida de sentido y con mejor fluidez, siguiendo la revisión auditada del inglés POB que también lo omitió por considerarlo redundante en este contexto.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se mantiene la transliteración del nombre divino, preservando la distinción entre el Nombre y un título. No se usa una sustitución litúrgica porque el texto fuente nombra explícitamente a Yahvé.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El audit trail en inglés muestra que lֵאמֹר fue considerado redundante y finalmente omitido en la traducción publicada. Para el español se siguió la misma decisión: se preserva el valor discursivo del marcador hebreo en la nota, pero no en el cuerpo del texto, porque la cita comienza en el versículo siguiente.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como forma base para יְהוָה.
  - Se usa "Moisés" como nombre propio estándar.
  - No se añade una coma antes del punto final en el texto principal; la nota explica el valor de לֵאמֹר.
  - El registro es sobrio y bíblico, sin arcaísmos innecesarios.
