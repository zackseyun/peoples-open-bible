revisions:
- from: Y he aquí[a] unos hombres que pasaban, y vieron el cadáver[b] echado en el camino, y al león que estaba junto al cadáver; y llegaron y lo comunicaron en la ciudad donde habitaba el profeta anciano.
  to: Y, miren[a], unos hombres pasaban y vieron el cadáver[b] arrojado en el camino, y al león que estaba junto al cadáver; y llegaron y lo reportaron[c] en la ciudad donde vivía el profeta anciano.
  rationale: Se ajusta el español para mayor naturalidad y precisión léxica sin apartarse del hebreo ni del razonamiento documentado en el POB. Se fortalece מֻשְׁלֶכֶת con «arrojado», se hace más idiomático el marcador narrativo, se preserva en nota la alternativa literal de וַיְדַבְּרוּ, y se suaviza «habitaba» a «vivía».
  reviewer_model: gpt-5.4
