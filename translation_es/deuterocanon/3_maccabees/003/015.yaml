translation:
  language: es
  text: Consideramos que las naciones que habitan en Celesiria y Fenicia debían ser criadas[a], no por la fuerza de la lanza[b], sino con gentileza y gran benignidad, habiéndoles hecho bien de buen grado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nutridas» o «fomentadas». El verbo griego evoca la crianza o el amamantamiento, con una imagen paternalista para el trato de pueblos sujetos.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente, «no por la fuerza de la lanza»: una imagen militar de gobierno coercitivo.'
    reason: cultural_note
lexical_decisions:
- source_word: ἡγησάμεθα
  english_pob_choice: We considered
  chosen_spanish: Consideramos
  alternatives_spanish:
  - Pensamos
  - Juzgamos
  - Estimamos
  lexicon: BDAG
  rationale: El aoristo medio de ἡγέομαι introduce una decisión deliberada; «consideramos» conserva el matiz de juicio reflexivo sin endurecer el estilo.
- source_word: μὴ βίᾳ δόρατος
  english_pob_choice: not by the force of the spear
  chosen_spanish: no con la fuerza de la lanza
  alternatives_spanish:
  - no por la fuerza de la lanza
  - no con violencia de la lanza
  - no con fuerza de armas
  lexicon: LSJ
  rationale: La imagen militar concreta de βία + δόρατος se mantiene con «fuerza de la lanza», evitando una generalización excesiva como «fuerza de armas».
- source_word: ἐπιεικείᾳ
  english_pob_choice: with gentleness
  chosen_spanish: con mansedumbre
  alternatives_spanish:
  - con clemencia
  - con benignidad
  - con moderación
  lexicon: BDAG
  rationale: En este contexto de política real, «mansedumbre» comunica trato suave y no coercitivo, manteniendo el contraste con la fuerza militar.
- source_word: πολλῇ φιλανθρωπίᾳ
  english_pob_choice: great kindness
  chosen_spanish: gran benignidad
  alternatives_spanish:
  - gran bondad
  - mucha benevolencia
  - gran humanidad
  lexicon: BDAG
  rationale: φιλανθρωπία expresa amor a la humanidad, benevolencia o humanidad. «Benignidad» preserva la cualidad benévola y suena natural en español bíblico actual.
- source_word: τιθηνήσασθαι
  english_pob_choice: should be nurtured
  chosen_spanish: se las debía criar
  alternatives_spanish:
  - se las debía nutrir
  - se las debía fomentar
  - se las debía criar como a niños
  lexicon: LSJ
  rationale: El verbo remite a criar o amamantar con imagen paternal/nutricia. «Críar» conserva mejor la metáfora de cuidado formativo que un término administrativo neutral.
- source_word: τὰ κατοικοῦντα ... ἔθνη
  english_pob_choice: the nations inhabiting
  chosen_spanish: a las naciones que habitan en
  alternatives_spanish:
  - a los pueblos que habitan en
  - a las naciones que moran en
  lexicon: BDAG
  rationale: «Naciones» traduce ἔθνη y «que habitan en» conserva κατοικοῦντα sin alterar la estructura del griego.
- source_word: Κοίλην Συρίαν
  english_pob_choice: Coele-Syria
  chosen_spanish: Coele-Siria
  alternatives_spanish:
  - Siria Hípanada
  - Siria Hueca
  lexicon: LSJ
  rationale: Es un topónimo helenístico fijo; se translitera como nombre propio geográfico.
- source_word: Φοινίκην
  english_pob_choice: Phoenicia
  chosen_spanish: Fenicia
  alternatives_spanish:
  - Fenice
  lexicon: LSJ
  rationale: Es el equivalente geográfico estándar en español para el topónimo Φοινίκη.
- source_word: εὖ ποιήσαντες
  english_pob_choice: having gladly done them good
  chosen_spanish: habiéndoles hecho el bien de buen grado
  alternatives_spanish:
  - habiéndoles hecho bien con gusto
  - habiéndoles beneficiado de buen grado
  - habiendo obrado bien hacia ellos
  lexicon: BDAG
  rationale: La construcción participial expresa acción benefactora previa y disposición alegre. «Hacer el bien» comunica εὖ ποιέω con naturalidad.
- source_word: ἀσμένως
  english_pob_choice: gladly
  chosen_spanish: de buen grado
  alternatives_spanish:
  - gustosamente
  - con gusto
  - alegremente
  lexicon: BDAG
  rationale: «De buen grado» refleja disposición voluntaria y satisfecha; en combinación con el participio evita duplicar el adverbio con un tono redundante.
theological_decisions:
- issue: Metáfora de crianza/gobierno en τιθηνήσασθαι
  english_pob_reading: Retain the nurturing/rearing metaphor rather than replacing it with a neutral administrative term.
  chosen_spanish_reading: Conservar la imagen de crianza en «se las debía criar», en vez de neutralizarla con «gobernar» o «tratar».
  alternative_spanish_readings:
  - se las debía gobernar
  - se las debía administrar
  - se las debía tratar
  rationale: El griego presenta el ejercicio del poder con una imagen nutricia y paternalista; mantenerla hace visible la retórica del texto y evita ocultar su tono político.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El borrador español sigue el ajuste más reciente del audit trail inglés en cuanto a la preferencia por un verbo de cuidado («nurtured») y una cualidad benévola más idiomática («great kindness»), pero conserva en español la metáfora visible de crianza y la concreción de la imagen bélica para no suavizar indebidamente el griego.
  spanish_consistency_notes:
  - Se mantuvo «Coele-Siria» como transliteración del topónimo helenístico fijo.
  - Se prefirió «Fenicia» por ser el equivalente geográfico estándar en español.
  - Se evitó «SEÑOR» u otras sustituciones teológicas irrelevantes porque el versículo no contiene el Tetragrámaton ni κύριος en función divina.
  - La puntuación sigue el periodo griego con una sola oración amplia, adecuada para una traducción formal y legible.
