translation:
  language: es
  text: 'Y esta casa será una ruina[a]. Todo el que pase por allí quedará horrorizado y silbará[b], y dirán: “¿Por qué ha hecho Yahvé así a esta tierra y a esta casa?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “esta casa será alta/exaltada”. En contexto, muchos entienden que el sentido es que se convertirá en ruina u objeto de horror; compárese 2 Crónicas 7:21.'
    reason: textual_variant
  - marker: b
    text: O “siseará”. El verbo hebreo alude a hacer un sonido agudo de asombro o desprecio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַבַּיִת הַזֶּה
  english_pob_choice: And this house
  chosen_spanish: Y esta casa
  alternatives_spanish:
  - Y este templo
  lexicon: HALOT
  rationale: בַּיִת significa literalmente “casa”. Mantener “casa” conserva el paralelismo hebreo y la referencia al edificio del pacto; el contexto permite entender que se trata del templo sin sustituir el término de base.
- source_word: יִהְיֶה עֶלְיוֹן
  english_pob_choice: will become a ruin
  chosen_spanish: será una ruina
  alternatives_spanish:
  - será alta
  - será exaltada
  - será un montón de ruinas
  lexicon: HALOT
  rationale: La forma literal “alto/exaltado” no encaja bien en este contexto de juicio. Como el audit trail inglés, la traducción española sigue el sentido contextual de desolación/ruina, preservando la tensión textual en la nota.
- source_word: כָּל עֹבֵר עָלָיו
  english_pob_choice: Everyone who passes by it
  chosen_spanish: Todo el que pase junto a ella
  alternatives_spanish:
  - Todo transeúnte
  - Todos los que pasen por allí
  lexicon: HALOT
  rationale: La construcción idiomática designa a los que pasan delante del lugar. “Todo el que pase junto a ella” es natural en español y conserva el valor distributivo de כָּל.
- source_word: יִשֹּׁם
  english_pob_choice: will be appalled
  chosen_spanish: se quedará pasmado
  alternatives_spanish:
  - quedará asombrado
  - quedará desolado
  lexicon: HALOT
  rationale: El verbo expresa conmoción ante una escena de devastación. “Se quedará pasmado” transmite bien el impacto emocional en español contemporáneo sin perder solemnidad.
- source_word: וְשָׁרָק
  english_pob_choice: and will whistle
  chosen_spanish: y silbará
  alternatives_spanish:
  - y silbará con desprecio
  - y siseará
  lexicon: HALOT
  rationale: El verbo denota un sonido agudo de asombro o burla. “Silbará” conserva la imagen verbal básica; el matiz de burla queda abierto por el contexto y se puede matizar en nota si se desea.
- source_word: וְאָמְרוּ
  english_pob_choice: and they will say
  chosen_spanish: y dirán
  alternatives_spanish:
  - y dirán ellos
  - y la gente dirá
  lexicon: HALOT
  rationale: El plural impersonal se vierte de forma simple y fluida. “Dirán” mantiene la indefinición del sujeto colectivo.
- source_word: עַל מֶה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Con qué motivo?
  - ¿Por qué razón?
  lexicon: HALOT
  rationale: La pregunta pide la causa del juicio. “¿Por qué?” es el equivalente más natural y exacto en español.
- source_word: עָשָׂה יְהוָה
  english_pob_choice: has Yahweh done
  chosen_spanish: ha hecho Yahvé
  alternatives_spanish:
  - ha hecho el Señor
  - hizo Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino “Yahvé” conforme a la política del proyecto. El perfecto compuesto español funciona bien en una pregunta que presupone un resultado visible.
- source_word: כָּכָה
  english_pob_choice: thus
  chosen_spanish: así
  alternatives_spanish:
  - de esta manera
  - tal cosa
  lexicon: HALOT
  rationale: El deíctico señala el modo del juicio. “Así” es breve, natural y fiel al valor demostrativo del hebreo.
- source_word: לָאָרֶץ הַזֹּאת
  english_pob_choice: to this land
  chosen_spanish: a esta tierra
  alternatives_spanish:
  - a este país
  - a esta región
  lexicon: HALOT
  rationale: אֶרֶץ en este contexto designa la tierra del pueblo de Israel, no la tierra en sentido global. “Tierra” es la equivalencia más tradicional y precisa.
- source_word: וְלַבַּיִת הַזֶּה
  english_pob_choice: and to this house
  chosen_spanish: y a esta casa
  alternatives_spanish:
  - y a este templo
  lexicon: HALOT
  rationale: Se repite “casa” por fidelidad al hebreo y por la cohesión retórica del versículo. El contexto deja claro que se refiere al templo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - El SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Siguiendo la norma del proyecto, se translitera como “Yahvé” en vez de sustituirlo por un título, preservando el nombre propio del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sense of עֶלְיוֹן in a judgment context
  english_pob_reading: understood contextually as desolation/ruin rather than literal 'high/exalted'
  chosen_spanish_reading: entendido contextualmente como ruina/desolación y no como “alto/exaltado”
  alternative_spanish_readings:
  - alto
  - exaltado
  rationale: La lectura literal choca con el contexto de maldición y con el paralelismo de 2 Crónicas 7:21. La traducción española sigue el sentido contextual, pero la nota conserva la tensión textual.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el texto quedó sin modificaciones tras la comprobación final, con acuerdo alto y solo observaciones menores.'
  spanish_consistency_notes:
  - Se mantuvo “casa” en dos lugares para reflejar el hebreo בַּיִת y conservar la repetición retórica.
  - Se usó “Yahvé” para יְהוָה conforme al estándar del proyecto.
  - Se eligió un español natural (“se quedará pasmado”, “silbará”) sin borrar la tensión entre la lectura literal y la contextual de עֶלְיוֹן.
  - El registro es formal y publicable, pero evita el arcaísmo de sustituciones como “SEÑOR” o giros demasiado bíblicos que no aportan precisión.
