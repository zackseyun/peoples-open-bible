translation:
  language: es
  text: 'Dios los bendijo, y Dios les dijo: «Fructifiquen, multiplíquense, llenen la tierra, sométanla y dominen[a] los peces del mar, las aves de los cielos y todo ser viviente que se mueve sobre la tierra[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ejerzan dominio sobre».
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse «toda criatura viviente que se arrastra sobre la tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: En este contexto narrativo de Génesis 1, el texto hebreo usa אֱלֹהִים con verbo singular para el Dios de Israel. Siguiendo la política española del proyecto para el nombre divino, se rinde aquí como «Yahvé» en el texto principal, en vez de la forma genérica «Dios», para mantener la trazabilidad del nombre divino cuando el contexto lo permite.
- source_word: וַיְבָרֶךְ
  english_pob_choice: blessed
  chosen_spanish: bendijo
  alternatives_spanish:
  - pronunció una bendición sobre
  lexicon: HALOT
  rationale: El piel de ברך expresa impartir bendición. «Bendijo» es la forma natural y fiel en español, sin diluir la acción performativa del hebreo.
- source_word: פְּרוּ
  english_pob_choice: Be fruitful
  chosen_spanish: Fructifiquen
  alternatives_spanish:
  - Sean fructíferos
  - Produzcan fruto
  lexicon: HALOT
  rationale: «Fructifiquen» conserva el mandato de fertilidad/procreación y evita una paráfrasis excesiva. En español resulta más idiomático que un calco literal de «ser fructíferos».
- source_word: וּרְבוּ
  english_pob_choice: multiply
  chosen_spanish: multiplíquense
  alternatives_spanish:
  - crezcan en número
  - aumenten
  lexicon: HALOT
  rationale: La idea es el aumento numérico. «Multiplíquense» mantiene la fuerza del imperativo y corresponde al paralelismo con el mandato anterior.
- source_word: וּמִלְאוּ
  english_pob_choice: fill
  chosen_spanish: llenen
  alternatives_spanish:
  - llenen de lleno
  - colmén
  lexicon: HALOT
  rationale: El verbo מלא significa llenar. «Llenen la tierra» es directo, claro y suficientemente cercano al hebreo.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el mundo
  - la tierra
  lexicon: HALOT
  rationale: En el marco universal de Génesis 1, el referente es la tierra como totalidad creada. «La tierra» preserva ese alcance sin introducir un matiz territorial más estrecho.
- source_word: וְכִבְשֻׁהָ
  english_pob_choice: subdue it
  chosen_spanish: sométanla
  alternatives_spanish:
  - sujétenla
  - domínenla
  lexicon: HALOT
  rationale: כבש tiene el sentido de someter o poner bajo control. «Sométanla» reproduce esa fuerza en español sin suavizarla a mera administración.
- source_word: וּרְדוּ
  english_pob_choice: rule over
  chosen_spanish: dominen
  alternatives_spanish:
  - gobiernen
  - ejerzan dominio sobre
  lexicon: HALOT
  rationale: רדה expresa ejercer dominio o gobierno. «Dominen» conserva la intensidad del verbo y, junto con «sométanla», mantiene el paralelismo de autoridad sobre la creación.
- source_word: בִּדְגַת הַיָּם
  english_pob_choice: the fish of the sea
  chosen_spanish: los peces del mar
  alternatives_spanish:
  - la fauna marina
  - los seres del mar
  lexicon: HALOT
  rationale: La construcción nominal se refiere específicamente a los peces. «Los peces del mar» es preciso y natural en español.
- source_word: בְעוֹף הַשָּׁמַיִם
  english_pob_choice: the birds of the heavens
  chosen_spanish: las aves de los cielos
  alternatives_spanish:
  - las aves del cielo
  - las aves del firmamento
  lexicon: HALOT
  rationale: עוֹף puede abarcar aves o seres voladores; aquí «aves» es la opción más natural. «De los cielos» conserva el plural hebreo y evita aplanar el matiz cósmico del texto.
- source_word: בְכָל חַיָּה הָרֹמֶשֶׂת
  english_pob_choice: every living thing that moves
  chosen_spanish: todo ser viviente que se mueve
  alternatives_spanish:
  - toda criatura viviente que se arrastra
  - todo animal viviente que se mueve
  lexicon: HALOT
  rationale: 'חיה es amplio: ser viviente, criatura viva, animal. La construcción «todo ser viviente» conserva la amplitud, y «que se mueve» reproduce el participio de רמש sin restringirlo innecesariamente a «se arrastra».'
- source_word: עַל הָאָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre la tierra
  lexicon: HALOT
  rationale: La preposición עַל aquí marca ubicación/superficie. «Sobre la tierra» suena natural en español y refleja la relación espacial del hebreo.
theological_decisions:
- issue: Fuerza del mandato humano sobre la creación en כבש y רדה
  english_pob_reading: Retain strong governance language with 'subdue it' and 'rule over' without softening to stewardship-only terminology.
  chosen_spanish_reading: Conservar un lenguaje fuerte de autoridad con «sométanla» y «dominen», sin convertir el pasaje en una simple exhortación al cuidado.
  alternative_spanish_readings:
  - cuídenla
  - sean sus mayordomos
  - adminístrenla
  rationale: Los verbos hebreos son más fuertes que un mero cuidado responsable. La redacción española preserva esa fuerza y evita tanto una atenuación interpretativa como una lectura explotadora no exigida por el texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Alcance de הָאָרֶץ
  english_pob_reading: Translate as 'the earth' rather than 'the land.'
  chosen_spanish_reading: Traducir como «la tierra» en sentido global, no como territorio local.
  alternative_spanish_readings:
  - la tierra
  - el país
  rationale: En el marco de Génesis 1, el alcance es cósmico/universal. «La tierra» mantiene esa amplitud y evita territorializar indebidamente la comisión humana.
  doctrine_reference: Translation philosophy §1
- issue: Referencia del nombre divino en el texto español
  english_pob_reading: God
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Dios
  - el Dios
  rationale: Aunque el inglés POB usa «God» según su convención editorial, el proyecto español pide traducir el nombre divino como «Yahvé». En este versículo la forma hebrea con verbo singular permite sostener esa decisión sin pérdida de sentido.
  doctrine_reference: Project-level Spanish terminology defaults
translation_notes:
  revision_awareness: Se revisó el paralelismo verbal de la línea hebrea y la decisión inglesa de mantener verbos fuertes para כבש y רדה. La redacción española conserva ese nivel de fuerza con «sométanla» y «dominen», ajustándolo a un imperativo plural natural en español. También se alineó el nombre divino con la terminología española del proyecto («Yahvé») sin perder la lectura singular de אֱלֹהִים en el contexto.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y digno, evitando calcos innecesarios.
  - «Cielos» se conservó para respetar el plural del hebreo y la convención del proyecto.
  - No se suavizó el mandato de dominio a lenguaje de simple mayordomía.
  - Los imperativos se tradujeron en plural de cortesía bíblica natural en español.
