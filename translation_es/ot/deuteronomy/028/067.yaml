base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/028/067.yaml
  text: In the morning you will say[a], “If only it were evening!” and in the evening you will say, “If only it were morning!” because of the dread of your heart that you will dread[b], and because of the sight of your eyes that you will see.
  footnotes:
  - marker: a
    text: 'Hebrew: ''Who will give evening/morning?''—an idiom expressing longing, hence ''If only it were evening/morning!'''
    reason: lexical_alternative
  - marker: b
    text: Or 'because of the fear in your heart ... and because of what your eyes will see.'
    reason: lexical_alternative
