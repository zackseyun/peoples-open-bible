revisions:
- from: Y estos fueron los que subieron de Tel-melah[a], Tel-harsha, Querub, Addón y Imer; pero no pudieron declarar[b] la casa de sus padres ni su descendencia[c], si eran de Israel.
  to: Y estos fueron los que subieron de Tel-melah[a], Tel-harsha, Querub, Addón y Imer, pero no pudieron declarar la casa de sus padres[b] ni su descendencia, si eran de Israel[c].
