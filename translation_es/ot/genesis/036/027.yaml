translation:
  language: es
  text: 'Estos son los hijos de Ezer[a]: Bilhan, Zaaván[b] y Akan[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Etser es una forma alternativa más cercana a la transliteración; Ezer es la forma tradicional en muchas versiones.
    reason: lexical_alternative
  - marker: b
    text: Zaaván también puede escribirse Zaván en una transliteración más simplificada.
    reason: lexical_alternative
  - marker: c
    text: Akan es distinto de Acán/Achan; el hebreo aquí usa una grafía diferente.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Estos eran
  lexicon: HALOT
  rationale: La forma hebrea introduce una lista genealógica de manera deíctica; en español, «Estos son» suena natural y conserva el valor presentacional del original.
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos
  lexicon: HALOT
  rationale: En un contexto genealógico, בְּנֵי expresa descendencia masculina inmediata. «Los hijos de» mantiene la estructura formal sin perder claridad en español.
- source_word: אֵצֶר
  english_pob_choice: Ezer
  chosen_spanish: Ezer
  alternatives_spanish:
  - Etser
  lexicon: HALOT
  rationale: Se conserva la forma usada por la revisión inglesa y la transliteración tradicional más reconocible en español, ya que el texto auditado corrigió la forma menos estándar 'Etser'.
- source_word: בִּלְהָן
  english_pob_choice: Bilhan
  chosen_spanish: Bilhan
  lexicon: HALOT
  rationale: Nombre propio; se translitera sin traducción.
- source_word: זַעֲוָן
  english_pob_choice: Zaavan
  chosen_spanish: Zaaván
  alternatives_spanish:
  - Zaván
  lexicon: HALOT
  rationale: Nombre propio; se conserva la vocalización más cercana al hebreo con acento gráfico en español. La alternativa simplificada «Zaván» podría usarse, pero aquí se preserva la secuencia vocálica del nombre.
- source_word: עֲקָן
  english_pob_choice: Akan
  chosen_spanish: Akan
  alternatives_spanish:
  - Acan
  lexicon: HALOT
  rationale: Nombre propio; se translitera directamente. Se evita confundirlo con «Acan»/«Achan», que remitirían a otra forma hebrea distinta.
translation_notes:
  revision_awareness: La revisión inglesa corrigió la forma del nombre del padre de esta lista de 'Etser' a 'Ezer' y mantuvo sin cambios los otros nombres; la versión española sigue esa corrección y conserva el orden genealógico del hebreo.
  spanish_consistency_notes:
  - Se prefirió «hijos» en lugar de «descendientes» para reflejar con más precisión la fórmula genealógica hebrea, aunque en español ambos pueden sugerir linaje.
  - Se mantuvo el nombre «Ezer» por coherencia con el registro auditado y por ser la forma más extendida en español bíblico.
  - La acentuación de «Zaaván» busca ayudar a la lectura en español sin alterar la transliteración base.
