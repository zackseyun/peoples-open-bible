translation:
  language: es
  text: Y Jeshúa[a] hijo de Josedec se levantó, con sus hermanos los sacerdotes, y Zorobabel hijo de Salatiel[b], con sus hermanos, y prepararon el altar del Dios de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El nombre griego Ἰησοῦς puede verterse también como «Josué» o «Jesús», según el contexto; aquí se refiere al sumo sacerdote posexílico conocido como Jeshúa.
    reason: lexical_alternative
  - marker: b
    text: El griego Σαλαθιήλ también puede reflejarse con la forma hebrea «Shealtiel»; aquí se sigue la forma transmitida por el texto griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ καταστὰς
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso en pie
  - se alzó
  - habiéndose levantado
  lexicon: LSJ
  rationale: El participio aoristo introduce la acción decisiva de Jesúa al iniciar la preparación. En español, «se levantó» comunica bien ese movimiento narrativo sin sonar forzado, y evita una calca pesada como «habiéndose levantado».
- source_word: Ἰησοῦς
  english_pob_choice: Jeshua
  chosen_spanish: Jesúa
  alternatives_spanish:
  - Jeshúa
  - Josué
  - Jesús
  lexicon: LSJ
  rationale: La referencia es al sumo sacerdote posexílico conocido en español como Jesúa/Jeshúa. Mantengo una forma hispanizada cercana a la tradición del nombre en este contexto, evitando «Jesús» por anacronismo y «Josué» por posible confusión con el personaje de otra época.
- source_word: ὁ τοῦ Ἰωσεδὲκ
  english_pob_choice: son of Josedec
  chosen_spanish: hijo de Josedec
  alternatives_spanish:
  - el hijo de Josedec
  - de Josedec
  lexicon: LSJ
  rationale: La construcción filial griega se expresa naturalmente en español con «hijo de». Conserva el parentesco directo sin añadir información.
- source_word: οἱ ἀδελφοὶ αὐτοῦ οἱ ἱερεῖς
  english_pob_choice: his brothers the priests
  chosen_spanish: sus hermanos los sacerdotes
  alternatives_spanish:
  - sus hermanos, los sacerdotes
  - sus parientes sacerdotales
  - sus hermanos sacerdotes
  lexicon: LSJ
  rationale: «ἀδελφοί» se traduce de manera directa como «hermanos», y el apposicional «los sacerdotes» identifica el grupo. Se evita ampliar a «parientes» porque el griego usa un término familiar concreto.
- source_word: Ζοροβαβὲλ
  english_pob_choice: Zerubbabel
  chosen_spanish: Zorobabel
  alternatives_spanish:
  - Zerubabel
  - Zorobabel
  lexicon: LSJ
  rationale: Se usa la transliteración bíblica más reconocible en español. Es una adaptación estándar del nombre propio griego.
- source_word: ὁ τοῦ Σαλαθιὴλ
  english_pob_choice: son of Salathiel
  chosen_spanish: hijo de Salatiel
  alternatives_spanish:
  - hijo de Salatiel
  - hijo de Shealtiel
  - de Salatiel
  lexicon: LSJ
  rationale: Como el texto fuente griego trae Σαλαθιήλ, la forma española sigue esa base como «Salatiel». Se preserva la referencia del witness griego sin imponer la forma hebrea.
- source_word: ἡτοίμασαν
  english_pob_choice: prepared
  chosen_spanish: prepararon
  alternatives_spanish:
  - pusieron listo
  - dejaron preparado
  - hicieron listo
  lexicon: LSJ
  rationale: El verbo está en plural y pide una forma simple y fiel. «Prepararon» es la equivalencia directa y más natural en español.
- source_word: τὸ θυσιαστήριον
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - el altar sacrificial
  - el altar de sacrificio
  lexicon: LSJ
  rationale: «Altar» basta para reproducir el sustantivo griego estándar; el contexto ya deja claro su uso cultual.
- source_word: τοῦ θεοῦ Ἰσραήλ
  english_pob_choice: of the God of Israel
  chosen_spanish: del Dios de Israel
  alternatives_spanish:
  - del Dios de Israel
  - para el Dios de Israel
  lexicon: LSJ
  rationale: La construcción genitiva identifica pertenencia o relación cultual. «Del Dios de Israel» preserva el vínculo sin interpretarlo de forma excesiva.
theological_decisions:
- issue: Nombre de Ἰησοῦς en contexto posexílico
  english_pob_reading: Jeshua
  chosen_spanish_reading: Jesúa
  alternative_spanish_readings:
  - Jeshúa
  - Josué
  - Jesús
  rationale: Aunque el griego coincide gráficamente con «Jesús» del NT, el referente histórico es el sumo sacerdote posexílico. La forma española elegida evita confusión cronológica y mantiene la identidad del personaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
- issue: Traducción de ἀδελφοί en un contexto sacerdotal
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - parientes
  - compañeros
  - correligionarios
  rationale: El texto griego usa un término familiar masculino explícito. En ausencia de una razón contextual fuerte para expandirlo, se conserva «hermanos», que respeta el dato lingüístico y la precisión del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el audit trail inglés; no se requieren cambios sustanciales. La principal decisión de estilo en español fue escoger una forma natural para el verbo inicial y mantener los nombres propios según el contexto posexílico y la grafía griega.
  spanish_consistency_notes:
  - 'Se mantiene el orden coordinado del original: Jesúa, sus hermanos sacerdotes, Zorobabel y sus hermanos, y luego la acción conjunta de preparar el altar.'
  - Se conserva «Dios de Israel» sin convertirlo en una perífrasis más explicativa.
  - Se evita «SEÑOR» para no ocultar el nombre divino donde el griego tiene θεοῦ.
  - Se usa puntuación española con comas para las incisos coordinados.
