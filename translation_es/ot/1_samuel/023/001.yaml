translation:
  language: es
  text: 'Entonces le informaron a David[a], diciendo: «Mira, los filisteos están combatiendo contra Queila, y ellos están saqueando las eras».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «están combatiendo en Queila». La preposición hebrea es literalmente «en», pero en este contexto militar probablemente significa que los filisteos están atacando la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגִּדוּ
  english_pob_choice: Then they told
  chosen_spanish: Entonces se lo informaron
  alternatives_spanish:
  - Entonces le dijeron
  - Luego le comunicaron
  lexicon: HALOT
  rationale: El verbo הִגִּיד en Hiphil introduce una comunicación narrativa; en español, «se lo informaron» mantiene el valor de reporte formal y la progresión temporal del wayyiqtol, sin forzar un calco. El objeto indirecto David queda explícito por el contexto y por el dativo en la fuente.
- source_word: לְדָוִד
  english_pob_choice: David
  chosen_spanish: a David
  alternatives_spanish:
  - David
  lexicon: HALOT
  rationale: La preposición ל marca destinatario; en español se expresa naturalmente con «a». Se conserva el nombre propio sin adaptación adicional.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - que
  lexicon: HALOT
  rationale: El infinitivo sustantivado quotativo introduce el discurso directo. «Diciendo» mantiene la estructura del hebreo y enlaza bien con la cita en español.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - ¡Mira!
  lexicon: HALOT
  rationale: La partícula deíctica pide atención inmediata. «Mira» reproduce esa urgencia en español moderno y resulta más natural que «He aquí» o «He aquí que».
- source_word: פְלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - filisteos
  lexicon: HALOT
  rationale: El etnónimo aparece con referencia definida en el informe militar; en español el artículo es natural y conserva la identificación del grupo enemigo.
- source_word: נִלְחָמִים
  english_pob_choice: are fighting against
  chosen_spanish: están combatiendo contra
  alternatives_spanish:
  - están peleando contra
  - están guerreando contra
  lexicon: HALOT
  rationale: El participio niphal de לחם expresa acción militar en curso. «Están combatiendo contra» preserva el aspecto progresivo y la orientación bélica sin concretar indebidamente el tipo de ataque.
- source_word: בִּקְעִילָה
  english_pob_choice: against Keilah
  chosen_spanish: contra Queila
  alternatives_spanish:
  - en Queila
  - en/contra Queila
  lexicon: HALOT
  rationale: Aunque la preposición básica es ב, el contexto narrativo muestra que la ciudad es el blanco del ataque. «Contra Queila» comunica mejor esa fuerza contextual en español, como lo hace la decisión inglesa, y evita la ambigüedad de una mera localización espacial.
- source_word: וְהֵמָּה
  english_pob_choice: and they
  chosen_spanish: y ellos
  alternatives_spanish:
  - y también ellos
  - y en cuanto a ellos
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis. «Y ellos» conserva la referencia explícita y el valor enfático sin sobrecargar el español.
- source_word: שֹׁסִים
  english_pob_choice: are plundering
  chosen_spanish: están saqueando
  alternatives_spanish:
  - están despojando
  - están pillando
  lexicon: HALOT
  rationale: El verbo expresa despojo/pillaje en contexto militar. «Saqueando» es la forma más natural en español para una acción bélica sobre recursos agrícolas y preserva la fuerza del término.
- source_word: אֶת הַגֳּרָנוֹת
  english_pob_choice: the threshing floors
  chosen_spanish: las eras
  alternatives_spanish:
  - las eras de trillar
  - las parvas
  lexicon: HALOT
  rationale: גֹּרֶן designa el lugar de trilla; en español «eras» es el equivalente técnico y claro. Se evita simplificarlo a «granos» porque el hebreo nombra el lugar/instalación, no solo el producto.
theological_decisions:
- issue: Sentido de בִּקְעִילָה con verbo militar
  english_pob_reading: “against Keilah” instead of a purely locative “in/at Keilah”
  chosen_spanish_reading: «contra Queila»
  alternative_spanish_readings:
  - «en Queila»
  - «en/contra Queila»
  rationale: La preposición ב puede ser locativa, pero con לחם en este contexto narrativo señala la ciudad como objetivo del combate. Traducir «contra» evita diluir la implicación de asalto y armoniza con la acción posterior de David en favor de la ciudad. Esta decisión mantiene la tensión lexicográfica documentada por el audit trail.
  doctrine_reference: No aplica; decisión semántico-narrativa.
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje base y coincide con el juicio de alta concordancia del audit trail inglés; no hay revisiones aplicadas que alteren el sentido, por lo que se conserva la lectura estable: reporte urgente, ataque contra Queila y saqueo de las eras.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma POB, pero este versículo no contiene el nombre divino.
  - Se usa «filisteos» en minúscula por tratarse de un etnónimo en español.
  - «Eras» refleja el lugar de trilla; no se reemplaza por una paráfrasis más general.
  - El pronombre «ellos» conserva el énfasis del hebreo sin añadir información externa.
