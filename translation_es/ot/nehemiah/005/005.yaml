base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/005/005.yaml
  text: And now[a], our flesh is as the flesh of our brothers, our children as their children; yet here we are, subjecting our sons and our daughters to slavery, and some of our daughters have already been subjected. But it is not in our power to help[b], and our fields and our vineyards belong to others.
  footnotes:
  - marker: a
    text: Or, 'we are of the same flesh as our brothers.' The Hebrew keeps the concrete image of shared flesh to stress common humanity and kinship.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'there is not to our hand power.' The clause expresses that they have no means or power, especially since their fields and vineyards are in the possession of others.
    reason: lexical_alternative
