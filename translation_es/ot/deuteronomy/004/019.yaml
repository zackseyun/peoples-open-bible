base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/004/019.yaml
  text: And beware lest you lift up your eyes to heaven[a], and when you see the sun and the moon and the stars—all the host of heaven—you be drawn away and bow down to them and serve them[b], which Yahweh your God has allotted to all the peoples under all the heavens.
  footnotes:
  - marker: a
    text: Or 'has assigned' or 'has apportioned.' The Hebrew says the LORD 'allotted' these to all the peoples; the wording does not itself say that he approved their worship of them.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'under all the heavens'; many English versions render this idiom as 'under the whole heaven.'
    reason: lexical_alternative
