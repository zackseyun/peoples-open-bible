    rationale: Aunque es comprensible y relativamente literal, en español bíblico contemporáneo suena invertido y algo rígido. 'Que tu palabra sea una' mantiene el jussivo y la fuerza sapiencial sin perder fidelidad.
  - severity: low
    issue: Frase de nota 'condenación mala' demasiado calcada
    rationale: Proviene del inglés/greco de forma poco idiomática. Una formulación más natural en español mejora la legibilidad sin alterar el valor de testigo alterno.
  - severity: low
    issue: Expresión 'habla ... engañosa' añade un matiz no estrictamente necesario
    rationale: El griego enfatiza lengua doble/duplicidad. 'Doble' o 'dividida' refleja mejor la conexión con 'tu palabra sea una'.
