translation:
  language: es
  text: 'Y Edna dijo a su mujer[a]: «¡Cuánto se parece el joven Tobit a mi sobrino[b]!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice: «Edna dijo a su mujer», aunque el paralelo semítico presenta a Ragüel hablando a Edna, su esposa. El contexto sugiere una irregularidad textual o de transmisión.'
    reason: textual_variant
  - marker: b
    text: También puede entenderse «primo» o, más ampliamente, «pariente cercano». El término griego de parentesco puede emplearse con un alcance mayor que «sobrino».
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ εἶπεν
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Y ... habló
  lexicon: BDAG
  rationale: La conjunción narrativa καὶ se vierte naturalmente con «Y» en español, manteniendo el flujo de relato sin añadir interpretación temporal. El verbo εἶπεν se expresa con el simple «dijo», que es claro y fiel al movimiento de discurso.
- source_word: Ἔδνα
  english_pob_choice: Edna
  chosen_spanish: Edna
  alternatives_spanish:
  - Edna
  lexicon: Nombre propio
  rationale: Se conserva la transliteración estándar del nombre propio, conforme a la práctica del proyecto.
- source_word: τῇ γυναικὶ αὐτοῦ
  english_pob_choice: to his wife
  chosen_spanish: a su esposa
  alternatives_spanish:
  - a su mujer
  - a su cónyuge
  lexicon: BDAG
  rationale: γυνή en este contexto significa claramente «esposa». En español, «su esposa» evita la ambigüedad de «mujer» y conserva el referente relacional del griego. El valor posesivo de αὐτοῦ se refleja en «su».
- source_word: Ὡς
  english_pob_choice: How much
  chosen_spanish: ¡Cuánto!
  alternatives_spanish:
  - ¡Qué tan!
  - ¡Qué!
  lexicon: BDAG
  rationale: En esta exclamación de semejanza, ὡς introduce una reacción enfática. «¡Cuánto!» comunica de modo natural la sorpresa ante la semejanza, sin sobrecargar el texto con un calco.
- source_word: ὅμοιος
  english_pob_choice: resembles
  chosen_spanish: se parece
  alternatives_spanish:
  - es semejante a
  - es como
  lexicon: BDAG
  rationale: El adjetivo predicativo con dativo de comparación expresa parecido. «Se parece» es la forma más natural en español y conserva el valor de semejanza relacional.
- source_word: ὁ νεανίσκος
  english_pob_choice: the young man
  chosen_spanish: el joven
  alternatives_spanish:
  - el muchacho
  - el joven hombre
  lexicon: BDAG
  rationale: νεανίσκος designa a un hombre joven. «El joven» es idiomático en español y mantiene la referencia masculina sin sonar forzado.
- source_word: Τωβεὶτ
  english_pob_choice: Tobit
  chosen_spanish: Tobit
  alternatives_spanish:
  - Tobit
  lexicon: Nombre propio
  rationale: Se mantiene la forma establecida del nombre propio según la tradición del proyecto y la fuente griega.
- source_word: τῷ ἀνεψιῷ μου
  english_pob_choice: my nephew
  chosen_spanish: a mi sobrino
  alternatives_spanish:
  - a mi primo
  - a mi pariente cercano
  lexicon: BDAG
  rationale: ἀνεψιός puede abarcar en uso amplio «sobrino» o «primo/parentesco cercano». En este pasaje, la versión inglesa optó por «nephew» como sentido más específico; en español «sobrino» refleja esa opción y comunica bien la relación familiar, sin perder la tensión semántica que se explicita en la nota.
theological_decisions:
- issue: Variación en la identificación del hablante
  english_pob_reading: The Greek text reads, 'Edna said to his wife,' though the Semitic parallel has Raguel speaking to Edna his wife. The context may suggest a textual or transmission irregularity.
  chosen_spanish_reading: 'El texto principal sigue el griego: «Edna dijo a su esposa».'
  alternative_spanish_readings:
  - «Ragüel dijo a su esposa Edna»
  - «Ragüel dijo a Edna, su esposa»
  rationale: La tradición griega, que es el ancla primaria del encargo, presenta una forma irregular frente al paralelo semítico. En lugar de corregir silenciosamente el texto, la traducción española conserva la lectura griega y deja constancia de la irregularidad en nota, preservando la transparencia textual del proyecto.
  doctrine_reference: Primacía de la fuente original y honestidad textual; no armonizar sin base explícita.
- issue: Alcance de ἀνεψιός
  english_pob_reading: Or 'my cousin.' The Greek kinship term can be used more broadly for a close male relative, though 'nephew' is the more specific sense.
  chosen_spanish_reading: «sobrino» en el texto principal, con nota sobre la alternativa amplia.
  alternative_spanish_readings:
  - «primo»
  - «pariente cercano»
  rationale: El español también puede oscilar entre parentesco específico y más amplio. Para no neutralizar la elección inglesa y mantener la fuerza relacional del término, se adopta «sobrino» en el texto y se preserva la alternativa amplia en nota.
  doctrine_reference: Precisión léxica con transparencia sobre la ambigüedad semántica.
translation_notes:
  revision_awareness: Se revisó el cruce con el informe de control y no se adoptó una armonización no atestiguada con el paralelo semítico; se mantuvo la lectura griega del texto base y se hizo explícita la irregularidad en nota. La elección de «sobrino» conserva la decisión léxica inglesa principal, mientras que la nota preserva la alternativa semántica amplia.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico moderno y digno, con puntuación española estándar.
  - Se conserva la transparencia textual mediante nota de variante sin emendar el texto principal.
  - Se usa «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; no aplica en este versículo.
  - Los nombres propios se transliteran de forma consistente con el español bíblico del proyecto.
