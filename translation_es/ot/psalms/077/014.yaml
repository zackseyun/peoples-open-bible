translation:
  language: es
  text: Dios[a], tu camino es santo; ¿quién es un gran dios como Dios?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en el santuario». La frase hebrea puede referirse tanto a la santidad como al ámbito o carácter de Dios, como al lugar santo.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Oh Dios
  lexicon: HALOT
  rationale: El hebreo tiene sentido vocativo por la segunda persona en «tu camino». En español, «Dios» funciona naturalmente como vocativo sin añadir una partícula exclamativa que el texto no exige.
- source_word: בַּקֹּדֶשׁ
  english_pob_choice: in holiness
  chosen_spanish: en santidad
  alternatives_spanish:
  - en el santuario
  - en lo santo
  lexicon: HALOT
  rationale: 'Conserva la lectura principal del POB inglés: el camino de Dios está caracterizado por la santidad. «En santidad» suena natural en español y mantiene abierta la tensión con el posible sentido locativo/cúltico.'
- source_word: דַּרְכֶּךָ
  english_pob_choice: your way
  chosen_spanish: tu camino
  alternatives_spanish:
  - tu senda
  - tu manera de actuar
  lexicon: HALOT
  rationale: «Camino» es el equivalente más directo y amplio para דֶּרֶךְ, y permite incluir tanto la acción como el modo de obrar de Dios.
- source_word: מִי
  english_pob_choice: who
  chosen_spanish: quién
  alternatives_spanish:
  - qué dios
  lexicon: HALOT
  rationale: La interrogación retórica se conserva de forma directa con «quién».
- source_word: אֵל
  english_pob_choice: god
  chosen_spanish: dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: Aquí funciona como sustantivo común en la comparación, no como el nombre propio del Dios de Israel; por eso se usa minúscula.
- source_word: גָּדוֹל
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - poderoso
  - magnífico
  lexicon: HALOT
  rationale: «Grande» reproduce el valor léxico básico y la fuerza exclamativa de la pregunta retórica.
- source_word: כֵּאלֹהִים
  english_pob_choice: like God
  chosen_spanish: como Dios
  alternatives_spanish:
  - como nuestro Dios
  - como dioses
  lexicon: HALOT
  rationale: La comparación final se mantiene breve y contundente. Aunque el inglés POB usa «like God», en español «como Dios» expresa mejor la comparación con el Dios verdadero sin sobrecargar la frase.
theological_decisions:
- issue: Sentido de בַּקֹּדֶשׁ
  english_pob_reading: God's way is characterized by holiness
  chosen_spanish_reading: Tu camino está caracterizado por santidad
  alternative_spanish_readings:
  - Tu camino está en el santuario
  rationale: Se preserva la lectura principal del POB inglés y se evita cerrar el verso en una referencia exclusiva al templo. La alternativa cultual permanece posible por la ambigüedad hebrea.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Sin revisiones aplicadas en el expediente; se sigue la lectura vigente de alta concordancia sin cambios sustantivos.
  spanish_consistency_notes:
  - Se mantiene «Dios» con mayúscula para el nombre divino y «dios» con minúscula en la comparación.
  - «Santidad» conserva la tensión entre cualidad divina y posible referencia al lugar santo.
  - La pregunta retórica final queda breve para reflejar la concisión del hebreo.
