  text: And in this way I make it my ambition to proclaim the good news, not where Messiah has already been named, so that I might not build on another's foundation.
translation:
  language: ko
  text: 이렇게 하여 나는 메시아의 이름이 이미 일컬어진 곳이 아닌 데에서 복음을 전하기를 힘써 왔습니다. 이는 남의 터 위에 세우지 않기 위함입니다.
