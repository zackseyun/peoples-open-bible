base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/035/014.yaml
  text: Afterward they prepared for themselves and for the priests[a], because the priests, the sons of Aaron, were occupied in offering up the burnt offering and the fat portions until night. So the Levites prepared for themselves and for the priests, the sons of Aaron.
  footnotes:
