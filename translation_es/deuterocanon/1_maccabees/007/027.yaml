- from: Y Nikanor vino a Jerusalén con un gran ejército, y envió engañosamente a Judas y a sus hermanos con palabras de paz, diciendo,
  to: Y Nikanor vino a Jerusalén con una gran fuerza, y envió a Judas y a sus hermanos, engañosamente, palabras de paz, diciendo,
  rationale: Se corrige la sintaxis de «envió» para que el español exprese con claridad que Nikanor dirigió su comunicación a Judas y a sus hermanos, no que los envió a ellos. También se ajusta «gran ejército» a «gran fuerza» para reflejar mejor la cautela léxica documentada para δυνάμει πολλῇ. No se requieren notas.
