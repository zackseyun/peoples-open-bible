id: 2SA.15.24
reference: 2 Samuel 15:24
source:
  edition: WLC
  text: וְ/הִנֵּ֨ה גַם צָד֜וֹק וְ/כָֽל הַ/לְוִיִּ֣ם אִתּ֗/וֹ נֹֽשְׂאִים֙ אֶת אֲרוֹן֙ בְּרִ֣ית הָ/אֱלֹהִ֔ים וַ/יַּצִּ֨קוּ֙ אֶת אֲר֣וֹן הָ/אֱלֹהִ֔ים וַ/יַּ֖עַל אֶבְיָתָ֑ר עַד תֹּ֥ם כָּל הָ/עָ֖ם לַ/עֲב֥וֹר מִן הָ/עִֽיר־־־־־־־׃
translation:
  text: And look[a], Zadok also came, and all the Levites with him, carrying the ark of the covenant of God. And they set down the ark of God[c][b], and Abiathar went up until all the people had finished crossing over from the city.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: That is, from Jerusalem.
    reason: cross_reference
  - marker: b
    text: Or 'They placed the ark of God.' The Hebrew verb may denote setting it down or positioning it there.
    reason: lexical_alternative
  - marker: c
    text: Or 'Abiathar came up.' The Hebrew literally says 'went up,' and the precise narrative nuance is uncertain.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהִנֵּה
  chosen: And look
  alternatives:
  - And behold
  - Now look
  - And there was
  lexicon: HALOT
  rationale: Introduces a vivid scene shift or attention marker. 'And look' preserves the discourse force in readable modern English better than the more archaic 'behold.'
- source_word: גַם
  chosen: also
  alternatives:
  - too
  - even
  lexicon: HALOT
  rationale: Marks Zadok as an additional participant arriving with David's company; 'also' is the most natural additive rendering here.
- source_word: צָדוֹק
  chosen: Zadok
  rationale: Personal name transliterated per translation philosophy.
- source_word: כָל הַלְוִיִּם אִתּוֹ
  chosen: all the Levites with him
  alternatives:
  - all the Levites who were with him
  lexicon: HALOT
  rationale: Straightforward rendering of the noun phrase; 'with him' most naturally refers to Zadok in context.
- source_word: נֹשְׂאִים
  chosen: carrying
  alternatives:
  - bearing
  lexicon: HALOT
  rationale: Participial form describing the Levites' action. 'Carrying' is clear modern English; 'bearing' is more formal but less natural.
- source_word: אֲרוֹן בְּרִית הָאֱלֹהִים
  chosen: the ark of the covenant of God
  alternatives:
  - the ark of God's covenant
  lexicon: HALOT
  rationale: Retains the full construct chain with explicit covenant language. This is a standard and transparent rendering of the Hebrew phrase.
- source_word: וַיַּצִּקוּ
  chosen: They set down
  alternatives:
  - They placed
  - They stationed
  - They poured out/caused to rest
  lexicon: HALOT
  rationale: In context, the verb refers to placing or setting the ark down at a location while the people continue crossing. 'Set down' best fits the narrative action and avoids overly technical or misleading senses of the root.
- source_word: אֶת אֲרוֹן הָאֱלֹהִים
  chosen: the ark of God
  lexicon: HALOT
  rationale: Simple direct-object phrase; rendered consistently with the preceding fuller title while allowing the Hebrew variation in expression.
- source_word: וַיַּעַל אֶבְיָתָר
  chosen: and Abiathar went up
  alternatives:
  - and Abiathar came up
  - and Abiathar ascended
  lexicon: HALOT
  rationale: The Hebrew verb is literally 'went up.' The exact nuance is somewhat uncertain in context, but the basic motion should be preserved rather than interpreted more freely.
- source_word: עַד תֹּם
  chosen: until ... had finished
  alternatives:
  - until the completion of
  - until ... was done
  lexicon: HALOT
  rationale: Idiomatic temporal expression indicating the endpoint of the action. Rendering with an English finite clause is natural and accurate.
- source_word: כָל הָעָם
  chosen: all the people
  alternatives:
  - all the troops
  - all the populace
  lexicon: HALOT
  rationale: In context this refers broadly to the people accompanying the departure, not necessarily only soldiers.
- source_word: לַעֲבוֹר
  chosen: crossing over
  alternatives:
  - passing over
  - going across
  lexicon: HALOT
  rationale: The infinitive expresses the action completed by the people. 'Crossing over' is idiomatic and preserves the movement sense.
- source_word: מִן הָעִיר
  chosen: from the city
  alternatives:
  - out of the city
  lexicon: HALOT
  rationale: A direct rendering of the prepositional phrase. 'From the city' is concise and natural, with 'the city' referring contextually to Jerusalem.
