revisions:
- from: Y la mano de los hijos de Israel fue y fue haciéndose más fuerte[a] contra Jabín, rey de Canaán, hasta que destruyeron a Jabín, rey de Canaán.
  to: Y la mano de los hijos de Israel iba fortaleciéndose[a] contra Jabín, rey de Canaán, hasta que destruyeron[b] a Jabín, rey de Canaán.
