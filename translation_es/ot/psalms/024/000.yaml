translation:
  language: es
  text: Salmo de David. De Yahvé es la tierra y su plenitud[a],[b] el mundo y los que habitan en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y todo lo que la llena».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «La tierra y su plenitud son de Yahvé».'
    reason: previous_rendering
lexical_decisions:
- source_word: לְדָוִד מִזְמוֹר
  english_pob_choice: A psalm of David
  chosen_spanish: Salmo de David
  alternatives_spanish:
  - Un salmo de David
  - Salmo dedicado a David
  lexicon: None
  rationale: לְדָוִד es la atribución habitual ‘de David’; מִזְמוֹר es ‘salmo’. La fórmula breve y natural en español preserva el encabezado sin añadir contenido interpretativo.
- source_word: לַיהוָה
  english_pob_choice: Yahweh's
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - pertenece a Yahvé
  - es de Yahvé
  lexicon: YHWH -> Yahvé
  rationale: La relación posesiva del hebreo se expresa con ‘de Yahvé’. Se mantiene el nombre divino ‘Yahvé’ según el criterio del proyecto, en lugar de ocultarlo con una convención tipográfica.
- source_word: הָאָרֶץ וּמְלוֹאָהּ
  english_pob_choice: the earth and its fullness
  chosen_spanish: la tierra y su plenitud
  alternatives_spanish:
  - la tierra y todo lo que contiene
  - la tierra y todo su contenido
  lexicon: אָרֶץ -> tierra; מְלוֹא -> plenitud/contenido
  rationale: ‘Plenitud’ conserva la amplitud poética de מְלוֹאָהּ y evita reducirlo sólo a una lista de objetos. En nota se mantiene la alternativa semántica ‘todo lo que la llena/contiene’.
- source_word: תֵבֵל
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el orbe
  - la tierra habitada
  lexicon: תֵבֵל -> mundo / tierra habitada
  rationale: ‘El mundo’ es la equivalencia más natural y amplia en español. ‘Orbe’ o ‘tierra habitada’ serían posibles, pero más marcadas o menos fluidas para este verso.
- source_word: וְיֹשְׁבֵי בָהּ
  english_pob_choice: those who dwell in it
  chosen_spanish: los que habitan en él
  alternatives_spanish:
  - los habitantes de él
  - los que moran en él
  lexicon: ישׁב -> habitar; יֹשְׁבֵי -> habitantes / los que habitan
  rationale: Se mantiene el participio relativo con una construcción idiomática en español. ‘Habitan’ conserva el sentido de residencia estable sin arcaísmo.
theological_decisions:
- issue: Propiedad absoluta de la creación bajo Yahvé
  english_pob_reading: Yahweh's is the earth and its fullness, the world and those who dwell in it.
  chosen_spanish_reading: De Yahvé es la tierra y su plenitud, el mundo y los que habitan en él.
  alternative_spanish_readings:
  - La tierra y su plenitud son de Yahvé, el mundo y los que habitan en él.
  - Yahvé es dueño de la tierra y de todo lo que hay en ella.
  rationale: El hebreo presenta una afirmación de pertenencia soberana de toda la creación a Yahvé. La construcción española preserva esa fuerza posesiva sin domesticarla a una simple metáfora de dominio.
  doctrine_reference: Salmo 24:1; tema bíblico de la soberanía creadora de Dios sobre toda la tierra
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió la sintaxis para unir ‘the earth and its fullness’ como sujeto compuesto y añadió el contenido principal del versículo después del encabezado. La versión española sigue esa estructura revisada, conserva el nombre divino ‘Yahvé’ y mantiene la ambigüedad legítima de מְלוֹאָהּ mediante nota.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de manera consistente para לַיהוָה.
  - ‘Plenitud’ preserva el paralelismo con ‘el mundo y los que habitan en él’ sin convertir el primer hemistiquio en prosa explicativa.
  - El marcador [a] se coloca en ‘plenitud’ porque ahí se concentra la alternativa léxica relevante.
  - El marcador [b] se coloca en la cláusula posesiva completa para reflejar la alternativa de lectura del hebreo y del precedente inglés.
