revisions:
- from: 'Así dice Yahvé de los ejércitos: He aquí, estoy quebrando el arco de Elam, el principal de su poder.[a]'
  to: 'Así dice Yahvé de los ejércitos: He aquí, estoy quebrando el arco de Elam, la parte principal[a] de su poder.'
  rationale: 'Se sustituye una frase poco idiomática (‘el principal de su poder’) por una formulación más natural y fiel al valor appositivo de רֵאשִׁית en contexto: ‘la parte principal de su poder’. Se conserva el tono formal, la inminencia de הִנְנִי שֹׁבֵר, el nombre divino ‘Yahvé’ y la imagen militar del arco. La nota mantiene la alternativa relevante ya respaldada por el expediente inglés.'
