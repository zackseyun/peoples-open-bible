theological_decisions:
- issue: Referent of the feminine suffix in 'all her groaning'
  chosen_reading: Left implicit as 'her,' without specifying the city or nation in the main text.
  alternative_readings:
  - Babylon's groaning
  - the land's groaning
  - the groaning caused by her
  rationale: The Hebrew suffix is feminine singular, but the immediate referent is not explicitly named in this verse. Preserving 'her' maintains the source-text ambiguity rather than resolving it interpretively.
  doctrine_reference: Preserve theological tension rather than resolve it.
