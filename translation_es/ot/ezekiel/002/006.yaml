translation:
  language: es
  text: Pero tú, hijo de hombre, no temas a ellos ni a sus palabras. Aunque haya[a] espinos y cardos contigo, y habites entre escorpiones, no temas sus palabras ni te acobardes por sus rostros[b], porque son una casa rebelde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, 'aunque rebeldes y cardos estén contigo'. La palabra hebrea traducida 'espinos' es difícil y se ha entendido de más de una manera, pero la imaginería circundante favorece una metáfora de peligro espinoso.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'por sus rostros'; es decir, por su aspecto o presencia intimidante.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - ser humano
  - mortal
  lexicon: HALOT
  rationale: Mantiene la fórmula vocativa fija de Ezequiel y conserva el eco literal de la expresión hebrea. 'Hijo de hombre' es más transparente como término recurrente del libro que una paráfrasis como 'ser humano' o 'mortal'.
- source_word: תִּירָא
  english_pob_choice: do not fear
  chosen_spanish: no temas
  alternatives_spanish:
  - no tengas miedo
  - no te asustes
  lexicon: HALOT
  rationale: El imperativo negativo de ירא se vierte naturalmente como 'no temas', que conserva la repetición enfática del versículo y su tono formal.
- source_word: דִּבְרֵיהֶם
  english_pob_choice: their words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - lo que dicen
  - su habla
  lexicon: HALOT
  rationale: Se conserva el sustantivo concreto 'palabras', como en el texto fuente y en la traducción inglesa auditada, para mantener la repetición y el énfasis en la hostilidad verbal.
- source_word: סָרָבִים
  english_pob_choice: briers
  chosen_spanish: espinos
  alternatives_spanish:
  - zarzas
  - matorrales espinosos
  - rebeldes
  lexicon: HALOT
  rationale: La POB inglesa dejó abierta la posibilidad de una lectura alternativa, pero el contexto inmediato favorece la imagen de peligros espinosos junto con 'cardos' y 'escorpiones'. 'Espinos' funciona bien en español como imagen metafórica sin cerrar indebidamente la ambigüedad del hebreo.
- source_word: וְסַלּוֹנִים
  english_pob_choice: thorns
  chosen_spanish: cardos
  alternatives_spanish:
  - espinas
  - zarzas
  lexicon: HALOT
  rationale: Se preserva el paralelismo de dos imágenes vegetales dañinas. 'Cardos' comunica bien el campo semántico de algo punzante y hostil en español bíblico actual.
- source_word: אוֹתָךְ
  english_pob_choice: are with you
  chosen_spanish: contigo hay
  alternatives_spanish:
  - te rodean
  - están contigo
  lexicon: HALOT
  rationale: La sintaxis hebrea es elíptica; en español conviene explicitar la relación circunstancial sin forzarla. 'Contigo hay' mantiene la idea de presencia adversa sin introducir una interpretación más fuerte que el texto.
- source_word: עַקְרַבִּים
  english_pob_choice: scorpions
  chosen_spanish: escorpiones
  alternatives_spanish:
  - alacranes
  lexicon: HALOT
  rationale: Equivalente léxico directo y claro para el lector español, conservando la imaginería de peligro y agresión.
- source_word: יוֹשֵׁב
  english_pob_choice: you sit among
  chosen_spanish: habitas entre
  alternatives_spanish:
  - vives entre
  - estás sentado entre
  lexicon: HALOT
  rationale: El participio comunica una situación estable y continuada más que el acto físico de sentarse. 'Habitas entre' suena natural en español y preserva la permanencia del entorno hostil.
- source_word: מִפְּנֵיהֶם
  english_pob_choice: by their faces
  chosen_spanish: por sus rostros
  alternatives_spanish:
  - por su presencia
  - ante sus rostros
  - por su apariencia
  lexicon: HALOT
  rationale: Se conserva la concreción del hebreo 'rostros' como imagen de intimidación o presencia amenazante. 'Por sus rostros' suena algo más literal, y el contexto aclara el valor figurado.
- source_word: תֵּחָת
  english_pob_choice: do not be dismayed
  chosen_spanish: te acobardes
  alternatives_spanish:
  - te desmayes
  - te desanimes
  - te aterres
  lexicon: HALOT
  rationale: חתת en Niphal expresa quebranto interior, desánimo o desmayo de ánimo. 'Te acobardes' comunica bien la reacción de intimidación sin perder la fuerza del mandato negativo.
- source_word: בֵּית מְרִי
  english_pob_choice: a rebellious house
  chosen_spanish: una casa rebelde
  alternatives_spanish:
  - un pueblo rebelde
  - una casa de rebelión
  lexicon: HALOT
  rationale: Se preserva la metáfora corporativa de 'casa' usada en Ezequiel para el pueblo, y 'rebelde' recoge la desobediencia pactual implícita en מְרִי.
theological_decisions:
- issue: Retención de la fórmula vocativa 'hijo de hombre'
  english_pob_reading: son of man
  chosen_spanish_reading: hijo de hombre
  alternative_spanish_readings:
  - ser humano
  - mortal
  rationale: La traducción mantiene la fórmula característica del libro de Ezequiel y evita aplanar una expresión vocativa recurrente que forma parte de la identidad literaria del profeta. No se neutraliza el género porque el texto fuente emplea una dirección masculina singular.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Conservación de la imaginería hostil concreta
  english_pob_reading: Retain the imagery of briers, thorns, and scorpions rather than flattening it into an abstract statement about opposition
  chosen_spanish_reading: Conservar 'espinos', 'cardos' y 'escorpiones' como imágenes concretas de peligro
  alternative_spanish_readings:
  - resistentes y hostiles
  - gente peligrosa
  rationale: La fuerza retórica del pasaje depende de la tríada imagética. Se evita sustituirla por una explicación abstracta, porque eso reduciría la vividez profética y ocultaría parte de la tensión lexical del hebreo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la evaluación auditada en inglés: mantiene la lectura imagética principal de ''espinos/cardos/escorpiones'', preserva la fórmula vocativa de Ezequiel, y refleja la nota sobre ''rostros'' como presencia intimidante. No se adoptó la alternativa ''rebeldes'' para סָרָבִים porque el contexto inmediato favorece la metáfora de peligro espinoso, aunque la ambigüedad léxica permanece reconocida en la decisión sobre ''espinos''.'
  spanish_consistency_notes:
  - Se usó 'hijo de hombre' como fórmula estable del libro.
  - Se prefirió 'no temas' para reproducir la cadencia repetida del mandato.
  - Se mantuvo 'casa rebelde' como expresión corporativa de Ezequiel.
  - Se preservó el lenguaje metafórico concreto sin explicitarlo en una paráfrasis abstracta.
  - '''Espinos'' y ''cardos'' mantienen un paralelismo natural en español y distinguen dos términos hebreos emparentados pero no idénticos.'
