  text: ὡς δὲ φανερὸν ἐγενήθη τὸ πρᾶγμα, καὶ διηγήθη τῷ βασιλεῖ τῶν Περσῶν ὅτι εἰς τὸν τόπον οὗ τὸ πῦρ ἔκρυψαν οἱ μεταχθέντες ἱερεῖς τὸ ὕδωρ ἐφάνη, ἀφ' οὗ καὶ οἱ περὶ τὸν Νεεμίαν ἥγνισαν τὰς θυσίας,
