revisions:
- from: Porque el rey tenía en el mar una flota de naves de Tarsis[a], junto con la flota de Hiram. Una vez cada tres años venía la flota de naves de Tarsis, trayendo oro y plata, marfil, monos[c][b] y pavos reales.
  to: Porque el rey tenía en alta mar una flota de naves de Tarsis[a], junto con la flota de Hiram. Una vez cada tres años venía la flota de naves de Tarsis, trayendo oro y plata, marfil, simios[c], y pavos reales[b].
  rationale: Se ajusta קֹפִים a «simios» para preservar la decisión léxica principal del POB ('apes') y se deja «monos» como alternativa más amplia en nota. También se mejora «en el mar» a «en alta mar» para reflejar de forma más idiomática el valor de בַּיָּם / 'at sea' en español. Se normaliza además el orden de las notas para evitar la secuencia visual invertida [c][b].
  reviewer_model: gpt-5.4
