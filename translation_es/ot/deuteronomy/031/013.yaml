review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja en gran medida la estructura y el sentido del hebreo: los hijos/la siguiente generación oirán, aprenderán y temerán a Yahvé durante su vida en la tierra que van a poseer. Sin embargo, hay dos problemas de fidelidad: (1) "sus hijos" estrecha más que el inglés auditado "their children" y que el contexto pactual generacional; conviene una forma más inclusiva como "sus hijos" con nota "o sus hijos varones" no resuelve del todo, por lo que "sus hijos" podría pasar, pero el proyecto ya documentó explícitamente children. Mejor "sus hijos" sería menos exacto que "sus hijos"? En español la opción más fiel y natural es "sus hijos" o "sus descendientes", pero para preservar el alcance generacional sin sonar remoto, conviene "sus hijos" con nota "O sus hijos varones". (2) La nota [b] está mal anclada y su contenido no corresponde: el inglés auditado reserva una nota sobre Yahweh/YHWH, no sobre "que no han conocido". Además, el texto tiene "Yahvé,
    su Dios" con coma innecesaria y con una posible ambigüedad; debe ser "Yahvé su Dios".'
  spanish_quality_summary: 'El español es legible, pero necesita ajustes menores para sonar más natural y alineado con el proyecto: quitar la coma en "Yahvé su Dios", evitar "sobre la tierra" en este contexto donde "en la tierra" es mucho más idiomático sin perder sentido territorial, y mantener una nota correctamente ubicada para el nombre divino. "Tomar posesión de ella" es correcto y claro.'
  glossary_alignment: 'Alineación parcial. Se usa correctamente "Yahvé" para יְהוָה. "Temer" para ליראה y "tomar posesión de ella" para לרשתה están bien. El punto mejorable es בנים: el inglés POB decidió "children" por alcance generacional amplio; en español "hijos" puede funcionar, pero "descendientes" en nota como alternativa no expresa bien que la referencia primaria son los hijos/la siguiente generación inmediata. También debe preservarse la nota sobre YHWH, no sustituirla por una nota sobre ידע.'
  issues:
  - severity: high
    issue: La nota [b] no corresponde al audit trail inglés y está anclada en la frase equivocada.
    rationale: El inglés POB conserva una nota sobre el Tetragrama en Yahweh; el borrador español reemplaza eso por una nota sobre "que no han conocido", alterando la documentación léxica y dejando sin reflejar la nota teológica requerida.
  - severity: medium
    issue: '"Yahvé, su Dios" lleva coma innecesaria.'
    rationale: 'En español, el sintagma nominal es continuo: "Yahvé su Dios". La coma introduce una pausa no motivada y afecta la fluidez.'
  - severity: medium
    issue: '"sobre la tierra" es poco idiomático en español para este contexto territorial.'
    rationale: Aunque על puede reflejarse literalmente como "sobre", en español bíblico natural "en la tierra" comunica mejor el sentido de habitar en el territorio sin pérdida sustancial de fidelidad.
  - severity: low
    issue: La nota [a] ofrece "sus descendientes" como alternativa, pero la alternativa más directa al hebreo sería "sus hijos varones" o simplemente "sus hijos" frente a un alcance más amplio.
    rationale: El audit trail explica la tensión sons/children. En español conviene que la nota preserve esa alternativa específica.
  revised_spanish_text: Y sus hijos[a], que no han conocido, oirán y aprenderán a temer a Yahvé[b] su Dios, todos los días que vivan en la tierra que ustedes están cruzando el Jordán para tomar posesión de ella[c].
  revised_footnotes:
  - marker: a
    text: O ‘sus hijos varones’. El hebreo puede referirse específicamente a hijos varones o, más ampliamente, a hijos/descendencia.
    reason: lexical_alternative
  - marker: b
    text: Hebreo ‘YHWH’; tradicionalmente se traduce ‘el SEÑOR’.
    reason: alternative_reading
  - marker: c
    text: O ‘para heredarla’ o ‘para poseerla’. El verbo hebreo puede abarcar la idea de tomar posesión de la tierra prometida.
    reason: lexical_alternative
  revision_rationale: 'Se corrige la documentación para que refleje el audit trail inglés: la nota sobre YHWH vuelve a anclarse en Yahvé, se elimina la nota impropia sobre "que no han conocido", se quita la coma en "Yahvé su Dios", y se mejora la naturalidad territorial con "en la tierra". Se mantiene el resto del sentido y la terminología clave del proyecto.'
