  text: 그의 주인이 그에게 말하였습니다, ʻ잘하였다, 선하고 신실한 종아. 네가 작은 일에 신실하였으니, 내가 너를 많은 일 위에 세우겠다. 네 주인의 기쁨에 들어오너라.ʼ
