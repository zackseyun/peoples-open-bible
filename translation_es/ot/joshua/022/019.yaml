review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el hebreo y el rastro de auditoría POB: mantiene el paralelismo de «posesión», el nombre divino «Yahvé», la ambigüedad de la impureza, y la prohibición de un altar adicional. Sin embargo, hay pequeños desajustes: «habitaba» suena pasado habitual donde el hebreo/POB expresa mejor una referencia vigente o de residencia; «crucen para ustedes» y «tomen posesión entre nosotros» son comprensibles pero algo poco idiomáticos; y la nota d introduce «en lugar de», que no corresponde bien a מִבַּלְעֲדֵי ni al inglés auditado.'
  spanish_quality_summary: El texto es legible y digno, pero puede pulirse para sonar más natural en español eclesial contemporáneo sin perder literalidad. «Crucen ustedes» y «establezcan su posesión entre nosotros» fluyen mejor. «Donde está el tabernáculo de Yahvé» evita una referencia temporal innecesaria. «Aparte de» funciona, pero conviene armonizar con una nota fiel al abanico semántico documentado.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יהוה -> «Yahvé», אֱלֹהֵינוּ -> «nuestro Dios», מִשְׁכָּן -> «tabernáculo», מִזְבֵּחַ -> «altar». Se conserva «posesión» para אֲחֻזָּה, adecuadamente paralelo en ambos sintagmas. La única corrección terminológica necesaria está en la nota d: debe reflejar «además de / aparte de», no «en lugar de».'
  issues:
  - severity: medium
    issue: «donde habitaba el tabernáculo de Yahvé» introduce un matiz temporal pasado innecesario
    rationale: El hebreo qatal con esta cláusula relativa se usa aquí en referencia al lugar donde reside/está el tabernáculo; el inglés POB lo vierte «dwells». «Habitaba» puede sugerir que ya no está allí, lo cual no es la intención del contexto.
  - severity: low
    issue: «crucen para ustedes» es demasiado calcado
    rationale: Conserva el matiz benefactivo de לָכֶם, pero en español suena rígido. «Crucen ustedes» mantiene el imperativo claro y es más natural; el matiz puede quedar implícito sin pérdida significativa.
  - severity: medium
    issue: La nota d ofrece «en lugar de», alternativa no bien sustentada
    rationale: מִבַּלְעֲדֵי aquí se mueve en el campo de «aparte de / además de / fuera de», como refleja el inglés auditado. «En lugar de» reorienta el sentido hacia sustitución, que no es la mejor equivalencia documentada.
  - severity: low
    issue: «tomen posesión entre nosotros» resulta algo duro en español
    rationale: Aunque es cercano al hebreo, «establezcan su posesión entre nosotros» o «tomen su heredad entre nosotros» suenan más naturales y preservan la idea de tenencia/asentamiento.
  revised_spanish_text: Pero si la tierra de su posesión es impura[a], crucen ustedes a la tierra de la posesión de Yahvé, donde está el tabernáculo de Yahvé[b], y establezcan su posesión entre nosotros[c]. Solo no se rebelen contra Yahvé, ni contra nosotros, al construir para ustedes un altar, aparte del altar de Yahvé nuestro Dios[d].
  revised_footnotes:
  - marker: a
    text: O «la tierra de su heredad» / «la tierra de su herencia». El término hebreo para «posesión» puede denotar una tenencia hereditaria.
    reason: lexical_alternative
  - marker: b
    text: O «donde habita el tabernáculo de Yahvé». El hebreo dice literalmente que allí habitó/habita el tabernáculo de Yahvé.
    reason: lexical_alternative
  - marker: c
    text: O «y tomen posesión entre nosotros». El verbo hebreo puede expresar obtener una tenencia o establecerse en un lugar.
    reason: lexical_alternative
  - marker: d
    text: O «además de» o «fuera de» el altar de Yahvé nuestro Dios.
    reason: lexical_alternative
  revision_rationale: 'Se hicieron ajustes menores para mejorar la fidelidad semántica y la naturalidad del español: se evitó el pasado potencialmente engañoso en la cláusula del tabernáculo, se suavizó un calco poco idiomático del imperativo, se hizo más natural la expresión de asentamiento/tenencia, y se corrigió la nota sobre מִבַּלְעֲדֵי para alinearla con el hebreo y con el POB auditado.'
