translation:
  language: es
  text: Y Demetrio oyó[a] estas palabras, y
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto griego proporcionado está incompleto y termina a mitad de la oración con una segunda conjunción («y»). Por eso la traducción conserva la frase abierta sin añadir palabras ausentes.
    reason: textual_variant
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: LSJ
  rationale: La conjunción coordinante simple mantiene el flujo paratáctico del griego. En español, «Y» reproduce mejor la conexión inmediata que «Entonces», que añadiría una relación temporal o lógica no explícita.
- source_word: ἤκουσεν
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - escuchó decir
  lexicon: LSJ
  rationale: El aoristo de ἀκούω aquí expresa que Demetrio recibió lo dicho. «Oyó» es natural en español y conserva el sentido narrativo básico de recepción auditiva sin intensificar a «escuchó», que sugiere atención deliberada.
- source_word: Δημήτριος
  english_pob_choice: Demetrius
  chosen_spanish: Demetrio
  alternatives_spanish:
  - Demetrius
  lexicon: convención onomástica
  rationale: Se vierte el nombre propio a la forma española habitual «Demetrio», que es inteligible y consistente con el uso bíblico en español.
- source_word: τοὺς λόγους τούτους
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estos dichos
  - estos asuntos
  lexicon: LSJ
  rationale: λόγοι puede significar palabras, dichos o declaraciones. En este contexto narrativo, «estas palabras» es la opción más directa y fiel; «dichos» suena más marcado y «asuntos» se aleja del valor léxico primario.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y luego
  lexicon: LSJ
  rationale: La segunda conjunción se conserva como «y» para reflejar honestamente que el texto griego disponible termina en mitad de la frase. No se completa ni se suaviza el corte textual.
translation_notes:
  revision_awareness: El griego de base es un fragmento incompleto que termina en «καὶ»; la versión española preserva esa incompletud sin intentar resolverla con material no atestiguado. La redacción sigue de cerca la sintaxis disponible y mantiene la ambigüedad textual documentada en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene la coordinación simple con «Y» para respetar el arranque del versículo.
  - Se usa el nombre propio español habitual «Demetrio» en lugar de transliteración rígida.
  - La nota de pie marca explícitamente la interrupción textual para evitar que el lector suponga una omisión editorial.
