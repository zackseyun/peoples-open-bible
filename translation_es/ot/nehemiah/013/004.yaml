revisions:
- from: Antes de esto[a], Eliasib el sacerdote, que había sido puesto sobre la cámara de la casa de nuestro Dios, era pariente de Tobías—
  to: Antes de esto[a], Eliasib el sacerdote, que había sido encargado del aposento de la casa de nuestro Dios, era pariente de Tobías—
  rationale: Se ajusta 'cámara' a 'aposento' para un español bíblico más natural y fiel al sentido de לשכה como dependencia del templo. Se reemplaza 'puesto sobre' por 'encargado del' para expresar con claridad la idea de responsabilidad administrativa implícita en נָתוּן. Se corrige la nota para reflejar de manera idiomática en español la alternativa de asociación social, sin cerrar la ambigüedad del hebreo.
