    reason: lexical_alternative
  revision_rationale: 'Se ajusta la cláusula final a un español más natural y teológicamente preciso: ''seré reconocido como santo por medio de ellos'' comunica la manifestación pública de la santidad divina sin sugerir cambio intrínseco en Dios y sin la torpeza de ''seré mostrado santo''. Se conserva la nota con alternativas formales mejoradas. No se requieren cambios estructurales adicionales.'
