base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/017/024.yaml
  text: 'And all the trees of the field shall know that I am Yahweh: I have brought low the high tree[a], I have raised up the low tree, I have dried up the green tree, and I have made the dry tree flourish. I am Yahweh; I have spoken[b], and I have done it.'
  footnotes:
  - marker: a
    text: Or 'the fresh tree' / 'the moist tree' for 'the green tree.' The Hebrew adjective literally denotes freshness or moisture.
    reason: lexical_alternative
  - marker: b
    text: Or 'I have caused the dry tree to bud/blossom.'
    reason: lexical_alternative
