    rationale: El expediente inglés conserva una nota léxica sobre ἀντιπεριβεβλημένη θανάτῳ («clothed with death / surrounded by death»). El borrador español trasladó indebidamente la nota a εὐσεβῶν, creando desalineación con la auditoría.
