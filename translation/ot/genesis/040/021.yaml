id: GEN.40.21
reference: Genesis 40:21
source:
  edition: WLC
  text: וַ/יָּ֛שֶׁב אֶת שַׂ֥ר הַ/מַּשְׁקִ֖ים עַל מַשְׁקֵ֑/הוּ וַ/יִּתֵּ֥ן הַ/כּ֖וֹס עַל כַּ֥ף פַּרְעֹֽה־־־׃
translation:
  text: He restored the chief cupbearer to his office[b][a], and he put the cup into Pharaoh’s hand.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'returned the chief cupbearer to his office.' The Hebrew is more literally 'restored ... to his cupbearing.'
    reason: lexical_alternative
  - marker: b
    text: Or 'and he put'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיָּשֶׁב
  chosen: restored
  alternatives:
  - returned
  lexicon: HALOT
  rationale: The Hiphil of שוב here means to cause someone to return to a former position or status. 'Restored' communicates reinstatement to office more naturally in English than the more literal 'returned.'
- source_word: שַׂר הַמַּשְׁקִים
  chosen: the chief cupbearer
  alternatives:
  - the captain/prince of the drink servers
  - the chief of the cupbearers
  lexicon: HALOT
  rationale: שַׂר denotes an official or chief, and הַמַּשְׁקִים refers to those who serve drink. In this court context, the established and accurate idiom is 'chief cupbearer.'
- source_word: עַל מַשְׁקֵהוּ
  chosen: to his cupbearing
  alternatives:
  - to his office
  - to his service of drink
  lexicon: HALOT
  rationale: The phrase literally indicates restoration 'upon/to his drinking-service.' Rendering it as 'to his cupbearing' preserves the concrete occupational sense without over-paraphrasing to the abstract 'office.'
- source_word: וַיִּתֵּן
  chosen: he put
  alternatives:
  - he gave
  lexicon: HALOT
  rationale: נתן commonly means 'give,' but with the direct object 'the cup' and the phrase 'into Pharaoh’s hand,' idiomatic English prefers 'put.'
- source_word: הַכּוֹס
  chosen: the cup
  lexicon: HALOT
  rationale: A straightforward rendering of the concrete noun is best here.
- source_word: עַל כַּף פַּרְעֹה
  chosen: into Pharaoh’s hand
  alternatives:
  - upon Pharaoh’s palm
  - to Pharaoh’s hand
  lexicon: HALOT
  rationale: כַּף is literally 'palm,' but in this idiom English naturally says 'hand.' 'Into Pharaoh’s hand' reflects the action of placing the cup for service.
