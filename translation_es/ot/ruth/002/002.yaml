translation:
  language: es
  text: 'Y Rut, la moabita, dijo a Noemí: «Por favor, déjame ir al campo y espigar[a] entre las espigas de cereal, detrás del que[b] halle favor ante sus ojos». Y ella le dijo: «Ve, hija mía».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «recoger espigas».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «detrás de quien halle favor en sus ojos», un modismo hebreo para recibir la mirada favorable de alguien. El hebreo usa masculino singular.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמּוֹאֲבִיָּה
  english_pob_choice: the Moabite
  chosen_spanish: la moabita
  alternatives_spanish:
  - la mujer de Moab
  - la moabita
  lexicon: HALOT
  rationale: El gentilicio marca la identidad étnica de Rut. «La moabita» es natural en español y conserva el énfasis narrativo sin recurrir a una forma arcaica como «moabita mujer» o «moabitessa».
- source_word: אֵֽלְכָה נָּא
  english_pob_choice: Please let me go
  chosen_spanish: Déjame ir, por favor
  alternatives_spanish:
  - Por favor, déjame ir
  - Voy a ir, por favor
  lexicon: HALOT
  rationale: El cohortativo con נָא expresa ruego o solicitud respetuosa, no simplemente futuro. «Déjame ir, por favor» comunica bien la petición cortés en español sin perder la intención volitiva.
- source_word: הַ/שָּׂדֶה
  english_pob_choice: the field
  chosen_spanish: el campo
  alternatives_spanish:
  - el campo agrícola
  - la tierra de labor
  lexicon: HALOT
  rationale: Aunque «campo» no copia de manera mecánica «field», en español transmite de forma natural el lugar rural donde se realiza la recolección. «El campo» funciona mejor que un calco rígido y sigue siendo fiel al contexto.
- source_word: וַ/אֲלַקֳטָּה
  english_pob_choice: and glean
  chosen_spanish: espigar
  alternatives_spanish:
  - y recoger lo que quede
  - y recoger espigas
  lexicon: HALOT
  rationale: El verbo describe la práctica técnica de recoger el sobrante de la cosecha. «Espigar» conserva ese sentido especializado y es el equivalente más preciso y bíblicamente reconocible en español.
- source_word: בַ/שִׁבֳּלִים
  english_pob_choice: among the ears of grain
  chosen_spanish: entre las espigas de cereal
  alternatives_spanish:
  - entre las espigas
  - entre las cabezas de grano
  lexicon: HALOT
  rationale: שִׁבֳּלִים se refiere a espigas/orejas de grano. «Espigas de cereal» comunica la imagen agrícola de manera clara para el lector español, mientras conserva el matiz de las unidades que se recogen al espigar.
- source_word: אַחַר אֲשֶׁר אֶמְצָא חֵן בְּעֵינָיו
  english_pob_choice: after him in whose eyes I find favor
  chosen_spanish: detrás de aquel en cuyos ojos halle favor
  alternatives_spanish:
  - tras aquel en cuyos ojos encuentre favor
  - después de aquel ante quien halle favor
  lexicon: HALOT
  rationale: El español necesita resolver el hebraísmo sin oscurecerlo. «En cuyos ojos halle favor» mantiene la idiomática hebrea de «hallar favor en los ojos de alguien» y «aquel» deja implícito el referente masculino singular que el contexto señala.
- source_word: חֵן
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - gracia
  - benevolencia
  lexicon: HALOT
  rationale: En este contexto social, חֵן expresa aceptación o trato favorable. «Favor» es la opción más natural y exacta en español; «gracia» podría sonar más teológica de lo que el pasaje requiere.
- source_word: לְכִ֥י בִתִּֽי
  english_pob_choice: Go, my daughter
  chosen_spanish: Ve, hija mía
  alternatives_spanish:
  - Anda, hija mía
  - Ve, mi hija
  lexicon: HALOT
  rationale: La respuesta de Noemí es breve y afectuosa. «Hija mía» reproduce bien la cercanía relacional, y «Ve» es el imperativo natural en español.
theological_decisions:
- issue: Identidad del destinatario implícito en «hallar favor en sus ojos»
  english_pob_reading: after him in whose eyes I find favor
  chosen_spanish_reading: detrás de aquel en cuyos ojos halle favor
  alternative_spanish_readings:
  - tras aquel en cuyos ojos encuentre favor
  - después de aquel ante quien halle favor
  rationale: El hebreo lleva sufijo masculino singular; la revisión inglesa añadió «him» para reflejarlo. En español, «aquel» permite mantener la referencia masculina implícita sin explicitar innecesariamente un título o cargo que el texto no da.
  doctrine_reference: fidelidad al referente gramatical del texto
- issue: Campo semántico de חֵן
  english_pob_reading: favor
  chosen_spanish_reading: favor
  alternative_spanish_readings:
  - gracia
  - benevolencia
  rationale: Aunque «gracia» puede ser posible, aquí el contexto es de acogida y permiso laboral, no una formulación doctrinal. «Favor» preserva mejor la tensión lexical del hebreo y evita cargar el pasaje con un matiz teológico ajeno al contexto inmediato.
  doctrine_reference: distinción entre uso relacional/social y uso teológico de gracia
translation_notes:
  revision_awareness: La revisión inglesa más reciente añadió explícitamente «him» para reflejar el sufijo masculino singular de בְּעֵינָיו. La redacción española conserva esa precisión con «aquel» y no neutraliza el referente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto solo cuando el hebreo lo exige; este versículo no contiene el Tetragrámaton.
  - Se usó «la moabita» para el gentilicio, en coherencia con el estilo POB de preservar la identidad étnica sin arcaísmo.
  - «Favor» se conserva de manera consistente como equivalente social de חֵן en este contexto.
  - Se prefirió «espigar» por ser el verbo técnico y bíblicamente transparente que mejor corresponde a לקט en Rut.
