- from: 'Y este será el derecho de los sacerdotes[a] del pueblo, de los que sacrifican un sacrificio, sea un toro o una oveja: dará al sacerdote la espaldilla[b], las dos quijadas[c] y el cuajar[d].'
  to: 'Y este será el derecho de los sacerdotes del pueblo, de los que sacrifican un sacrificio[a], sea un toro o una oveja: dará al sacerdote la espaldilla[b], las dos quijadas[c] y el estómago[d].'
  rationale: Se corrige el anclaje de la nota [a] para que corresponda a la frase hebrea repetitiva מֵאֵת זֹבְחֵי הַזֶּבַח. Se cambia «el cuajar» por «el estómago» para seguir la decisión léxica principal del POB y mejorar la claridad en español, manteniendo la forma tradicional en nota. También se pule la redacción de la nota [b].
