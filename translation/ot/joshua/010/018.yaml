id: JOS.10.18
reference: Joshua 10:18
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר יְהוֹשֻׁ֔עַ גֹּ֛לּוּ אֲבָנִ֥ים גְּדֹל֖וֹת אֶל פִּ֣י הַ/מְּעָרָ֑ה וְ/הַפְקִ֧ידוּ עָלֶ֛י/הָ אֲנָשִׁ֖ים לְ/שָׁמְרָֽ/ם־׃
translation:
  text: And Joshua said[a], “Roll large stones to the mouth of the cave[b], and appoint men over it to guard it.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the entrance of the cave.' Hebrew literally says 'to the mouth of the cave.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says 'to guard them,' with a plural object, likely referring to the kings shut inside the cave rather than to the cave itself.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And ... said
  alternatives:
  - Then ... said
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative advance; 'And ... said' preserves Hebrew narrative flow without overinterpreting temporal sequence.
- source_word: יְהוֹשֻׁעַ
  chosen: Joshua
  rationale: Personal name is transliterated by standard English convention, in keeping with the translation philosophy to transliterate names.
- source_word: גֹּלּוּ
  chosen: Roll
  alternatives:
  - Move
  - Roll away
  lexicon: HALOT
  rationale: Imperative plural from גלל, commonly used of rolling stones. 'Roll' is the most direct and idiomatic rendering.
- source_word: אֲבָנִים גְּדֹלוֹת
  chosen: large stones
  alternatives:
  - great stones
  - big stones
  lexicon: HALOT
  rationale: The adjective denotes size; 'large stones' is natural modern English and preserves the physical sense.
- source_word: אֶל פִּי הַמְּעָרָה
  chosen: to the mouth of the cave
  alternatives:
  - to the entrance of the cave
  - against the mouth of the cave
  lexicon: HALOT
  rationale: פִּי literally 'mouth of' is a common idiom for an opening. 'Mouth of the cave' preserves the Hebrew image while remaining clear in English.
- source_word: וְהַפְקִידוּ
  chosen: and appoint
  alternatives:
  - and station
  - and set
  lexicon: HALOT
  rationale: From פקד in the causative sense of assigning or appointing persons to a task. 'Appoint' captures the commissioning nuance better than merely 'put'.
- source_word: עָלֶיהָ
  chosen: over it
  alternatives:
  - by it
  - at it
  lexicon: HALOT
  rationale: The preposition על with the cave refers to placement in charge over/at the cave. 'Over it' fits the governance nuance with 'appoint.'
- source_word: אֲנָשִׁים
  chosen: men
  alternatives:
  - people
  - guards
  lexicon: HALOT
  rationale: The Hebrew specifically says 'men,' not a generic term for people. This follows the gender-accurate principle and avoids importing the more specific 'guards,' though their function is then stated.
- source_word: לְשָׁמְרָם
  chosen: to guard them
  alternatives:
  - to keep watch over them
  - to guard it
  lexicon: HALOT
  rationale: The suffix is masculine plural, most naturally referring to the five kings confined in the cave rather than the singular cave. 'To guard them' best matches the grammar and context.
