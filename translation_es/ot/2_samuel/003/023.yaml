revisions:
- from: 'Cuando Joab y toda la tropa que estaba con él vinieron, le avisaron a Joab, diciendo: «Abner hijo de Ner vino al rey, y él lo despidió[a], y fue en paz».'
  to: 'Cuando Joab y todo el ejército que estaba con él vinieron, le dijeron a Joab: «Abner hijo de Ner vino al rey, y él lo dejó ir, y se fue en paz[a]».'
  rationale: Se ajusta «avisaron» a «dijeron» para reflejar mejor נגד en Hifil; «tropa» a «ejército» para representar con más claridad צבא; «lo despidió» a «lo dejó ir» para evitar ambigüedad y reflejar mejor שׁלח en contexto; y «fue en paz» a «se fue en paz» por naturalidad idiomática en español y mejor correspondencia con una salida pacífica. Se mantiene la nota léxica sobre בשלום con anclaje en la frase correspondiente.
