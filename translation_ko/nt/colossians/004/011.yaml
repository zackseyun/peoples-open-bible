id: COL.4.11
reference: Colossians 4:11
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ Ἰησοῦς ὁ λεγόμενος Ἰοῦστος, οἱ ὄντες ἐκ περιτομῆς, οὗτοι μόνοι συνεργοὶ εἰς τὴν βασιλείαν τοῦ θεοῦ, οἵτινες ἐγενήθησάν μοι παρηγορία.
base_translation:
  language: en
  yaml_path: translation/nt/colossians/004/011.yaml
  text: and Jesus who is called Justus. These are the only ones from the circumcision who are fellow workers for the kingdom of God, and they became a comfort to me.
translation:
  language: ko
  text: 또 유스도라 하는 예수도 문안합니다. 이들이 할례에 속한 자들[a] 가운데 하나님 나라를 위한 나의 동역자가 된 유일한 사람들이며, 또한 나에게 위로가 되었습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「유대인 출신들」. 직역하면 「할례에서 난 자들」.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰησοῦς ὁ λεγόμενος Ἰοῦστος
  english_pob_choice: Jesus who is called Justus
  chosen_korean: 유스도라 하는 예수
  alternatives_korean:
  - 유스도라 일컫는 예수
  lexicon: BDAG
  rationale: 한국 교회의 정립된 표현.
- source_word: οἱ ὄντες ἐκ περιτομῆς
  english_pob_choice: who are from the circumcision
  chosen_korean: 할례에 속한 자들
  alternatives_korean:
  - 할례에서 난 자들
  - 유대인 출신들
  lexicon: BDAG
  rationale: 셈어적 「할례에서 난」을 「할례에 속한 자들」로 한국어로 자연스럽게 옮긴다.
- source_word: οὗτοι μόνοι συνεργοὶ
  english_pob_choice: These are the only ones ... fellow workers
  chosen_korean: 이들이 ... 유일한 ... 동역자가 된
  alternatives_korean:
  - 오직 이들만이 동역자
  lexicon: BDAG
  rationale: 「동역자」는 한국 교회의 정립된 표현.
- source_word: εἰς τὴν βασιλείαν τοῦ θεοῦ
  english_pob_choice: for the kingdom of God
  chosen_korean: 하나님 나라를 위한
  alternatives_korean:
  - 하나님의 나라를 위해
  lexicon: BDAG
  rationale: 「하나님 나라」는 한국 교회의 정립된 표현.
- source_word: οἵτινες ἐγενήθησάν μοι παρηγορία
  english_pob_choice: they have been a comfort to me
  chosen_korean: 나에게 위로가 되었습니다
  alternatives_korean:
  - 내게 격려가 되었습니다
  - 나의 위안이 되었습니다
  lexicon: BDAG
  rationale: παρηγορία의 「위로·위안」을 살린다.
