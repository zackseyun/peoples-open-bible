translation:
  language: es
  text: En el primer año de Ciro, rey de Persia, para el cumplimiento de la palabra del Señor[a], por boca de Jeremías,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, siguiendo más explícitamente el paralelo hebreo, 'para el cumplimiento de la palabra de Yahvé, por boca de Jeremías'.
    reason: alternative_reading
lexical_decisions:
- source_word: Βασιλεύοντος
  english_pob_choice: In the first year of Cyrus king of Persia
  chosen_spanish: En el primer año de Ciro, rey de Persia
  alternatives_spanish:
  - Mientras Ciro reinaba
  - Durante el reinado de Ciro
  lexicon: LSJ
  rationale: El griego usa un genitivo absoluto con valor temporal; en español, la fórmula natural y fiel es una cláusula temporal directa. La mención del primer año sigue el paralelo hebreo y evita una traducción pesada del participio.
- source_word: Κύρου Περσῶν
  english_pob_choice: Cyrus king of Persia
  chosen_spanish: Ciro, rey de Persia
  alternatives_spanish:
  - Ciro de los persas
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente 'Ciro de los persas', el paralelo hebreo confirma la construcción titulativa 'rey de Persia'. En español, esa forma es natural y precisa.
- source_word: ἔτους πρώτου
  english_pob_choice: the first year
  chosen_spanish: el primer año
  alternatives_spanish:
  - año uno
  - el primer año de reinado
  lexicon: LSJ
  rationale: La expresión temporal simple es la más clara en español. No hace falta explicitar 'de reinado' en el texto principal, porque el contexto ya lo implica.
- source_word: εἰς συντέλειαν
  english_pob_choice: for the fulfillment of
  chosen_spanish: para el cumplimiento de
  alternatives_spanish:
  - para la realización de
  - para llevar a cumplimiento
  lexicon: LSJ
  rationale: Conservo el valor final/resultativo del giro griego. 'Cumplimiento' mantiene el tono bíblico y refleja bien la idea de llevar algo a su desenlace designado, sin volverlo demasiado abstracto.
- source_word: ῥήματος Κυρίου
  english_pob_choice: the word of the Lord
  chosen_spanish: la palabra del Señor
  alternatives_spanish:
  - la palabra del Señor
  - la palabra de Yahvé
  lexicon: LSJ
  rationale: El griego tiene Κυρίου, así que en español corresponde 'Señor'. No se sustituye por 'Yahvé' en el texto principal, porque la fuente inmediata es griega; el posible trasfondo del nombre divino queda indicado en la nota.
- source_word: ἐν στόματι Ἰερεμίου
  english_pob_choice: by the mouth of Jeremiah
  chosen_spanish: por boca de Jeremías
  alternatives_spanish:
  - por la boca de Jeremías
  - mediante Jeremías
  lexicon: LSJ
  rationale: La imagen concreta 'en/by la boca de' se conserva de manera idiomática. 'Por boca de Jeremías' mantiene el giro profético tradicional sin sonar rígido en español.
theological_decisions:
- issue: Cómo reflejar Κυρίου cuando el paralelo hebreo tiene el nombre divino YHWH
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el SEÑOR
  - Yahvé
  rationale: La base textual primaria de 1 Esdras es el griego, que lee Κυρίου. Por eso el texto principal sigue 'Señor'. La alternativa con YHWH se reconoce en la nota para no borrar la correspondencia con el paralelo hebreo.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; יְהוָה → the LORD'
- issue: Valor de la fórmula profética 'por boca de Jeremías'
  english_pob_reading: by the mouth of Jeremiah
  chosen_spanish_reading: por boca de Jeremías
  alternative_spanish_readings:
  - mediante Jeremías
  - hablado por Jeremías
  rationale: La formulación concreta preserva el lenguaje profético de mediación verbal. No se reduce a una mera referencia indirecta, porque el griego y el hebreo mantienen la imagen de la boca como órgano de la palabra profética.
  doctrine_reference: Uso profético de fórmula mediadora en la tradición bíblica
translation_notes:
  revision_awareness: El texto inglés pasó de 'to bring to completion' a 'for the fulfillment of' para representar más naturalmente εἰς συντέλειαν. La versión española sigue esa revisión con 'para el cumplimiento de', manteniendo el sentido de finalidad y resultado. También conserva la decisión de traducir Κυρίου como 'el Señor' en el texto principal, con la alternativa relacionada con el paralelo hebreo reservada para nota.
  spanish_consistency_notes:
  - Se mantiene 'Señor' para Κυρίου, conforme al manejo del griego en el POB y al hecho de que esta sección no cita directamente el tetragrámaton en el texto fuente primario.
  - '''Jeremías'' conserva la forma usual en español bíblico y coincide con el referente profético del paralelo hebreo.'
  - '''Cumplimiento'' equilibra fidelidad semántica y fluidez española, evitando una perístasis demasiado explicativa.'
