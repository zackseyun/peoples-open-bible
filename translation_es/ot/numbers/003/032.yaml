revisions:
- from: Y el principal de los principales de los levitas fue Eleazar, hijo de Aarón, el sacerdote, encargado de los que guardaban el cargo del santuario[a].
  to: Y el principal de los principales de los levitas fue Eleazar, hijo de Aarón el sacerdote, encargado de los que cumplían la custodia del santuario[a].
  rationale: Se reemplaza «guardaban el cargo» por «cumplían la custodia» para reflejar mejor שֹׁמְרֵי מִשְׁמֶרֶת en un español natural y cultualmente preciso. También se suaviza la puntuación en «Aarón el sacerdote», que fluye bien en español y sigue permitiendo que el título modifique a Aarón. Se conserva «el principal de los principales» por su cercanía al hebreo y al audit trail inglés, y se mantiene la nota sobre la ambigüedad de הַקֹּדֶשׁ.
