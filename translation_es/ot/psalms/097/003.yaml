translation:
  language: es
  text: Fuego va delante de él y quema[a] a sus adversarios a su alrededor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus enemigos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵשׁ
  english_pob_choice: Fire
  chosen_spanish: Fuego
  alternatives_spanish:
  - Un fuego
  lexicon: HALOT
  rationale: El sustantivo designa fuego literal; en poesía hebrea el artículo indefinido suele faltar. En español, el sustantivo desnudo 'Fuego' suena natural y conserva el valor imagístico sin añadir un artículo no presente.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - en frente de él
  lexicon: HALOT
  rationale: La expresión con 'rostro/presencia' indica una posición previa o frontal. 'Delante de él' mantiene el orden poético y es natural en español; 'ante él' es posible, pero algo más formal.
- source_word: תֵּלֵךְ
  english_pob_choice: goes
  chosen_spanish: va
  alternatives_spanish:
  - avanza
  - procede
  lexicon: HALOT
  rationale: El verbo הלך en esta imagen con sujeto 'fuego' se traduce con el movimiento simple 'va' en español, evitando una construcción más pesada y conservando el dinamismo poético.
- source_word: וּתְלַהֵט
  english_pob_choice: burns
  chosen_spanish: quema
  alternatives_spanish:
  - abrasa
  - enciende
  - devora
  lexicon: HALOT
  rationale: La forma verbal expresa acción de arder o consumir. Dado que la revisión inglesa retiró 'up' para no añadir aspecto no explicitado, 'quema' reproduce el valor verbal sin intensificar innecesariamente la consumación. La fuerza destructiva queda apoyada por el contexto y por 'adversarios'.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - en torno
  - por todas partes
  lexicon: HALOT
  rationale: El adverbio indica circundación distributiva. 'Alrededor' es la opción española más directa y natural; 'por todas partes' enfatiza más la extensión, pero puede sonar menos literal.
- source_word: צָרָיו
  english_pob_choice: his adversaries
  chosen_spanish: sus adversarios
  alternatives_spanish:
  - sus enemigos
  - sus enemigos hostiles
  - sus opositores
  lexicon: HALOT
  rationale: El término nombra a quienes se oponen o causan estrechez/aflicción. 'Adversarios' conserva el matiz de oposición sin reducirlo a enemistad emocional; 'enemigos' sigue siendo una alternativa válida, como en la nota inglesa.
theological_decisions:
- issue: Referente de los sufijos de 3ª persona en un contexto teofánico
  english_pob_reading: Render the pronouns simply as 'him/his,' leaving the antecedent implicit from context rather than inserting 'the LORD' into the verse.
  chosen_spanish_reading: Mantener 'él/sus' sin insertar 'Yahvé' en el versículo.
  alternative_spanish_readings:
  - Fuego va delante de Yahvé y quema a sus adversarios alrededor.
  - Fuego va delante del Señor y quema a sus adversarios alrededor.
  rationale: El hebreo usa sufijos de tercera persona y el antecedente se identifica por el contexto inmediato del salmo. En español, conservar los pronombres preserva la fluidez poética y evita añadir un sustantivo que no aparece en este verso. Como en la audición inglesa, se prefiere la transparencia del dato textual sobre la explicitación interpretativa.
  doctrine_reference: Principio de primacía del texto original y de no expandir más allá de lo que el hebreo warrants; YHWH como referente contextual del salmo sin reescritura intratextual.
translation_notes:
  revision_awareness: La revisión inglesa eliminó 'up' de 'burns up' para no introducir un matiz aspectual no explícito; por eso el español usa simplemente 'quema' y no añade 'consume por completo' u otra intensificación semejante. También se preservó el antecedente implícito de los pronombres, sin nominalizarlo.
  spanish_consistency_notes:
  - Se mantiene 'él/sus' para reflejar el sufijo hebreo de tercera persona, coherente con el tratamiento auditable del inglés.
  - '''Adversarios'' reproduce la opción léxica principal y la nota permite ''enemigos'' como alternativa.'
  - El estilo conserva tono poético y directo, sin calcos pesados ni paráfrasis interpretativas.
