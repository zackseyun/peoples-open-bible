translation:
  language: es
  text: Gad[a]—una banda de incursión lo asaltará[b], pero él asaltará a sus talones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo hace un juego de palabras entre Gad, גדוד ("banda de incursión") y גדד ("asaltar/incursionar").
    reason: lexical_alternative
  - marker: b
    text: 'O: "Gad, asaltantes lo asaltarán, pero él asaltará al talón"; la última frase también puede entenderse como atacar o perseguir por detrás, en la retaguardia.'
    reason: alternative_reading
lexical_decisions:
- source_word: גָּד
  english_pob_choice: Gad
  chosen_spanish: Gad
  alternatives_spanish:
  - Gad (transliterado)
  lexicon: HALOT
  rationale: Es nombre propio de persona y tribu; en español se mantiene transliterado.
- source_word: גְּדוּד
  english_pob_choice: a raiding band
  chosen_spanish: una banda de incursión
  alternatives_spanish:
  - una tropa
  - una banda de asaltantes
  - una banda de saqueo
  lexicon: HALOT
  rationale: ‘Banda de incursión’ conserva el sentido de grupo armado y el juego verbal con גדד, sin sonar forzado en español.
- source_word: יְגוּדֶנּוּ
  english_pob_choice: will raid him
  chosen_spanish: lo asaltará
  alternatives_spanish:
  - lo atacará
  - lo invadirá
  - lo saqueará
  lexicon: HALOT
  rationale: El verbo expresa ataque hostil; ‘asaltar’ comunica bien la acción violenta en español y mantiene cercanía semántica con el sustantivo anterior.
- source_word: וְהוּא
  english_pob_choice: but he
  chosen_spanish: pero él
  alternatives_spanish:
  - y él
  - mas él
  lexicon: HALOT
  rationale: El contraste del verso pide una conjunción adversativa en español para reflejar la inversión entre ser atacado y responder.
- source_word: יָגֻד
  english_pob_choice: will raid
  chosen_spanish: asaltará
  alternatives_spanish:
  - atacará
  - incursionará
  - saqueará
  lexicon: HALOT
  rationale: Se repite el mismo campo verbal para conservar la correspondencia con la primera mitad del verso y el juego de palabras hebreo.
- source_word: עָקֵב
  english_pob_choice: at their heels
  chosen_spanish: por el talón
  alternatives_spanish:
  - a sus talones
  - a la retaguardia
  - por detrás
  lexicon: HALOT
  rationale: 'La frase hebrea es ambigua: puede referirse al talón literal, a la retaguardia o a una acción desde atrás. ‘Por el talón’ preserva la imagen base y deja visible la tensión interpretativa.'
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto hebreo y con la lectura inglesa auditada; se conservan el paralelismo, el contraste y la ambigüedad final del término עָקֵב sin añadir interpretaciones no sustentadas.
  spanish_consistency_notes:
  - Se usó ‘Gad’ como nombre propio transliterado, consistente con la norma del proyecto.
  - Se evitó ‘SEÑOR/Cristo’ porque no aparecen en el versículo.
  - Se mantuvo un registro digno y bíblico, con español natural y sin depender de calco mecánico del inglés.
