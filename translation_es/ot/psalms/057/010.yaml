translation:
  language: es
  text: Te daré gracias entre los pueblos[a], Señor; te cantaré alabanzas entre las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «Te alabaré entre los pueblos». El verbo hebreo puede denotar tanto dar gracias como alabar; se eligió «dar gracias» para distinguirlo del siguiente hemistiquio: «te cantaré alabanzas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹדְךָ
  english_pob_choice: I will give thanks to you
  chosen_spanish: Te daré gracias
  alternatives_spanish:
  - Te alabaré
  - Te confesaré
  lexicon: HALOT
  rationale: El verbo hebreo en Hifil de ידה puede expresar tanto dar gracias como alabar. En español, «dar gracias» conserva mejor la distinción respecto del segundo hemistiquio, donde aparece «cantaré alabanzas», y evita duplicar la misma idea con dos verbos casi idénticos.
- source_word: בָעַמִּים
  english_pob_choice: among the peoples
  chosen_spanish: entre los pueblos
  alternatives_spanish:
  - entre los pueblos
  - entre las gentes
  - entre las naciones
  lexicon: HALOT
  rationale: «Pueblos» reproduce bien el plural colectivo de עַמִּים y mantiene el paralelismo con «naciones» en el siguiente miembro. «Entre» expresa con naturalidad la esfera pública del testimonio poético.
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Oh Señor
  - Señor mío
  lexicon: HALOT
  rationale: La forma es el título divino אֲדֹנָי, no el Tetragrámaton. En español, «Señor» es el equivalente directo y digno para este título; el vocativo está implícito por el contexto poético sin necesidad de añadir «Oh».
- source_word: אֲזַמֶּרְךָ
  english_pob_choice: I will sing praise to you
  chosen_spanish: cantaré alabanzas a ti
  alternatives_spanish:
  - te cantaré alabanzas
  - te cantaré
  - te haré música
  lexicon: HALOT
  rationale: El piel de זמר en contexto salmódico tiene sentido de cantar alabanzas, a menudo con connotación musical. Se conservó la expresión explícita «alabanzas» para reflejar el valor laudatorio del verbo y mantener la diferencia con «te daré gracias».
- source_word: בַּל
  english_pob_choice: among
  chosen_spanish: entre
  alternatives_spanish:
  - entre los
  - en medio de
  lexicon: HALOT
  rationale: Aquí בַּל funciona en paralelo poético con ב del primer cola y marca el mismo ámbito. «Entre» es el equivalente español más natural para esa relación distributiva/local.
- source_word: אֻמִּים
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - las tribus
  lexicon: HALOT
  rationale: «Naciones» diferencia este término de עַמִּים («pueblos») y preserva el paralelismo semántico entre dos designaciones de los gentiles.
theological_decisions:
- issue: Tratamiento del título divino אֲדֹנָי
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Oh Señor
  - Señor mío
  rationale: La POB inglesa traduce este título como «Lord» siguiendo la política del proyecto para los títulos divinos. En español, «Señor» mantiene esa equivalencia sin introducir la forma reservada para Yahvé ni añadir una intensificación no exigida por el hebreo.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table'
- issue: Distinción poética entre agradecer y alabar
  english_pob_reading: I will give thanks to you ... I will sing praise to you
  chosen_spanish_reading: Te daré gracias ... cantaré alabanzas a ti
  alternative_spanish_readings:
  - Te alabaré ... cantaré alabanzas a ti
  - Te daré gracias ... te cantaré
  rationale: La POB inglesa eligió «give thanks» para evitar que el primer cola repita la idea del segundo («sing praise»). En español, «dar gracias» / «cantar alabanzas» conserva esa tensión lexical y la progresión poética del paralelismo.
  doctrine_reference: Poetic parallelism; lexical distinction in Psalm 57:10
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: la última revisión no cambió el texto y el revisor marcó alta concordancia con solo observaciones menores. No se introdujeron cambios sustantivos respecto de la decisión léxica central; solo se ajustó la formulación española para que sonara natural y mantuviera la distinción entre agradecer y alabar.'
  spanish_consistency_notes:
  - Se mantuvo «Señor» para אֲדֹנָי, consistente con el tratamiento de títulos divinos del proyecto.
  - Se prefirió «pueblos» para עַמִּים y «naciones» para אֻמִּים para conservar el paralelismo y la diferencia semántica.
  - Se usó «te daré gracias» en lugar de repetir «alabar» para preservar la distinción poética documentada en el audit trail inglés.
