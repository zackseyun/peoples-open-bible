translation:
  language: es
  text: 'Y dijo: «Yo mismo haré pasar toda mi bondad delante de ti, y proclamaré el nombre de Yahvé delante de ti. Y tendré misericordia de quien tendré misericordia, y me compadeceré[a] de quien me compadeceré».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tendré compasión de quien tendré compasión».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲנִי
  english_pob_choice: I myself
  chosen_spanish: Yo mismo
  alternatives_spanish:
  - Yo
  - Yo solo
  lexicon: HALOT
  rationale: El pronombre explícito añade énfasis. «Yo mismo» conserva ese énfasis sin volverlo más excluyente de lo que exige el hebreo.
- source_word: אַעֲבִיר
  english_pob_choice: will make ... pass
  chosen_spanish: haré pasar
  alternatives_spanish:
  - haré que pase
  - pasaré
  lexicon: HALOT
  rationale: El hifil de עבר es causativo. «Haré pasar» reproduce esa causalidad de manera natural en español.
- source_word: כָּל טוּבִי
  english_pob_choice: all my goodness
  chosen_spanish: toda mi bondad
  alternatives_spanish:
  - toda mi bondad y benignidad
  - todo mi bien
  lexicon: HALOT
  rationale: «טוּב» aquí comunica el bien/bondad beneficente de Dios. «Bondad» es natural en español y conserva el sentido de benevolencia divina sin reducirlo a apariencia o a dones.
- source_word: עַל פָּנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - en tu presencia
  lexicon: HALOT
  rationale: La expresión idiomática hebrea se vierte mejor con «delante de ti» para mantener la imagen espacial de manifestación.
- source_word: וְקָרָאתִי בְשֵׁם יְהוָה
  english_pob_choice: I will proclaim the name of Yahweh
  chosen_spanish: proclamaré el nombre de Yahvé
  alternatives_spanish:
  - declararé el nombre de Yahvé
  - invocaré el nombre de Yahvé
  lexicon: HALOT
  rationale: En este contexto קרא בשם es anuncio o proclamación del nombre divino, no simple invocación. «Proclamaré» mantiene el sentido de revelación pública.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración directa en la norma del proyecto, en lugar de sustituirlo por un título.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - en tu presencia
  - ante ti
  lexicon: HALOT
  rationale: La repetición de la locución espacial se conserva con la misma fórmula para mantener el paralelismo del hebreo.
- source_word: וְחַנֹּתִי אֶת אֲשֶׁר אָחֹן
  english_pob_choice: I will be gracious to whom I will be gracious
  chosen_spanish: tendré gracia de quien tendré gracia
  alternatives_spanish:
  - seré bondadoso con quien seré bondadoso
  - daré gracia a quien daré gracia
  lexicon: HALOT
  rationale: La construcción repetida del hebreo preserva la libertad soberana del sujeto y la fuerza enfática del juego de raíces. «Tendré gracia» mantiene esa repetición sin convertirla en una paráfrasis explicativa.
- source_word: וְרִחַמְתִּי אֶת אֲשֶׁר אֲרַחֵם
  english_pob_choice: I will show mercy to whom I will show mercy
  chosen_spanish: tendré compasión de quien tendré compasión
  alternatives_spanish:
  - tendré misericordia de quien tendré misericordia
  - me compadeceré de quien me compadeceré
  lexicon: HALOT
  rationale: רחם puede expresar compasión/misericordia. «Tendré compasión» preserva el paralelismo con la línea anterior y permite mantener la tensión lexical del texto.
theological_decisions:
- issue: Declaración divina de gracia y compasión con repetición enfática
  english_pob_reading: Retained the repeated first-person formulations ('I will be gracious... I will show mercy...') without softening or systematizing them.
  chosen_spanish_reading: Se conservan las fórmulas repetidas en primera persona («tendré gracia... tendré compasión...») sin suavizarlas ni convertirlas en principio abstracto.
  alternative_spanish_readings:
  - Parafrasear como una afirmación general sobre la bondad divina
  - Introducir formulaciones doctrinales posteriores sobre predestinación o mérito
  rationale: El hebreo presenta la libertad soberana de Dios mediante repetición enfática. La traducción mantiene esa tensión y no la resuelve con doctrinas posteriores que el verso no explicita.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: El pasaje fue revisado en la trayectoria inglesa reciente sin cambios sustantivos; el acuerdo de revisión indica alta conformidad, por lo que no se requieren ajustes adicionales en español más allá de reflejar el sentido lexical y la repetición enfática del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se mantiene la repetición de «tendré gracia / tendré compasión» para conservar el paralelismo y la tensión teológica del original.
  - «Delante de ti» se repite para sostener la imagen espacial y la cadencia del hebreo.
  - La nota a pie de página ofrece la alternativa lexical principal para רחם sin desplazar el texto base.
