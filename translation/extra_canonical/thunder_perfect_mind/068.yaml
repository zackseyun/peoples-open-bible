  lexicon: Crum (from Gk ἀνάπαυσις)
  rationale: Possessive ⲧⲁ- + ἀνάπαυσις. "Rest" is the established sense; "repose"
    possible but less natural in modern English.
- source_word: ⲡⲥⲟⲟⲩⲛ
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: Crum
  rationale: Common Sahidic noun for knowledge/gnosis; "knowledge" is the straightforward
