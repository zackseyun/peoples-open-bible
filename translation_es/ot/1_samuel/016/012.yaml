translation:
  language: es
  text: 'Así que lo mandó a llamar y lo hizo entrar. Y él era rojizo, de hermosos ojos y de agradable presencia. Entonces Yahvé dijo: «Levántate, úngelo, porque este es[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque este es el indicado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: So he sent
  chosen_spanish: Así que lo mandó a llamar
  alternatives_spanish:
  - Entonces lo envió
  - Y lo envió
  lexicon: HALOT
  rationale: El hebreo avanza la secuencia narrativa; en español, «Así que» conserva ese avance y «mandó a llamar» expresa con naturalidad la idea de enviar en este contexto de convocación.
- source_word: וַיְבִיאֵהוּ
  english_pob_choice: and brought him in
  chosen_spanish: y lo hizo entrar
  alternatives_spanish:
  - y lo trajo dentro
  - y lo introdujo
  lexicon: HALOT
  rationale: En hebreo, el causativo de בוא implica hacer venir o introducir. «Lo hizo entrar» comunica bien el movimiento hacia la presencia del interlocutor sin sonar forzado.
- source_word: אַדְמוֹנִי
  english_pob_choice: ruddy
  chosen_spanish: rojizo
  alternatives_spanish:
  - bermejo
  - rojizo de tez
  lexicon: HALOT
  rationale: «Ruddy» alude a un color o complexión rojiza. «Rojizo» mantiene la referencia física sin especificar erróneamente cabello ni introducir una lectura más precisa de la que permite el hebreo.
- source_word: עִם יְפֵה עֵינַיִם
  english_pob_choice: with beautiful eyes
  chosen_spanish: de hermosos ojos
  alternatives_spanish:
  - con ojos hermosos
  - de bellos ojos
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente descriptiva. «De hermosos ojos» conserva la cualidad estética y suena natural en español literario.
- source_word: וְטוֹב רֹאִי
  english_pob_choice: and a handsome appearance
  chosen_spanish: y de agradable presencia
  alternatives_spanish:
  - y de buen parecer
  - y de buen aspecto
  lexicon: HALOT
  rationale: La frase apunta a la apariencia exterior agradable. «De agradable presencia» expresa la idea sin trasladarla a un juicio más moderno o restringido como «guapo».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino en transliteración, conforme al principio del proyecto. «Yahvé» es la forma establecida para el texto principal en español.
- source_word: קוּם
  english_pob_choice: Rise
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte de pie
  - Álzate
  lexicon: HALOT
  rationale: El imperativo dirigido a Samuel pide acción inmediata. «Levántate» es claro, reverente y natural en el discurso divino.
- source_word: מְשָׁחֵהוּ
  english_pob_choice: anoint him
  chosen_spanish: úngelo
  alternatives_spanish:
  - sáciolo con óleo
  - conságralo por unción
  lexicon: HALOT
  rationale: El verbo משׁח se refiere a la unción ritual para designación real. «Úngelo» es preciso y conserva la fuerza verbal directa del mandato.
- source_word: כִּי זֶה הוּא
  english_pob_choice: for this is he
  chosen_spanish: porque este es él
  alternatives_spanish:
  - porque este es el indicado
  - porque éste es el que he escogido
  lexicon: HALOT
  rationale: La hebrea es breve y enfática. «Este es él» mantiene la identificación concisa; el añadido de «porque» conserva la relación causal del original.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrama directamente. Siguiendo la política del proyecto, se preserva el nombre propio divino en lugar de sustituirlo por un título funcional.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
- issue: Descripción física de David sin interpretación moral
  english_pob_reading: Retain the physical description without softening or overinterpreting it
  chosen_spanish_reading: Conservar la descripción corporal como observación externa
  alternative_spanish_readings:
  - Espiritualizar la descripción
  - Precisar que alude al cabello o al rostro
  rationale: El hebreo describe la apariencia de David, no su carácter. La traducción preserva esa tensión narrativa sin convertir la descripción en símbolo ni reducirla a un rasgo no explícito.
  doctrine_reference: 'Translation philosophy: Original-language primacy; Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no hubo cambios necesarios tras el pase más reciente; el consenso de auditoría marcó alta concordancia y ninguna objeción abierta.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene «úngelo» para el mandato ritual de משׁח, evitando sustituirlo por vocabulario más eclesiástico.
  - «Rojizo» conserva la ambigüedad física del hebreo sin forzar «pelirrojo».
  - La nota a pie de página preserva la alternativa breve documentada en el POB inglés.
