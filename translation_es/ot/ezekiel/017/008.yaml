translation:
  language: es
  text: Fue plantada en un buen campo, junto a aguas abundantes[a], para producir ramas y dar fruto, para llegar a ser una vid majestuosa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “junto a muchas aguas”.
    reason: lexical_alternative
  - marker: b
    text: O “para llegar a ser una vid espléndida”.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶל שָׂדֶה טּוֹב
  english_pob_choice: a good field
  chosen_spanish: en un buen campo
  alternatives_spanish:
  - en tierra buena
  - en un campo fértil
  lexicon: HALOT
  rationale: שָׂדֶה designa un campo concreto, no simplemente 'suelo'. 'Campo' conserva la imagen agrícola; 'bueno' refleja טּוֹב sin introducir una interpretación más fuerte como 'fértil'.
- source_word: אֶל מַיִם רַבִּים
  english_pob_choice: by abundant waters
  chosen_spanish: junto a muchas aguas
  alternatives_spanish:
  - al lado de muchas aguas
  - cerca de aguas abundantes
  lexicon: HALOT
  rationale: El hebreo usa שוב אֶל con un valor locativo/proximal en la imagen de plantación. 'Junto a' mantiene la proximidad sin sonar forzado en español. 'Muchas aguas' conserva el plural y la abundancia; 'aguas abundantes' es posible, pero menos fiel al sustantivo plural del texto.
- source_word: שְׁתוּלָה
  english_pob_choice: was planted
  chosen_spanish: fue plantada
  alternatives_spanish:
  - había sido plantada
  - fue trasplantada
  lexicon: HALOT
  rationale: La forma pasiva participial expresa que la planta fue puesta/establecida. 'Fue plantada' es claro y directo; 'trasplantada' añade una precisión no obligatoria en este versículo.
- source_word: לַעֲשׂוֹת עָנָף
  english_pob_choice: to produce branches
  chosen_spanish: para producir ramas
  alternatives_spanish:
  - para echar ramas
  - para hacer ramas
  lexicon: HALOT
  rationale: El infinitivo con intención final expresa resultado esperado. 'Producir ramas' es natural y conserva el sentido botánico; 'hacer ramas' sería demasiado literal y poco idiomático.
- source_word: וְלָשֵׂאת פֶּרִי
  english_pob_choice: and bear fruit
  chosen_spanish: y dar fruto
  alternatives_spanish:
  - y llevar fruto
  - y producir fruto
  lexicon: HALOT
  rationale: נשא + fruto es un giro establecido de 'dar/bear fruit'. 'Dar fruto' es la equivalencia más natural en español y preserva el valor idiomático.
- source_word: לִהְיוֹת לְגֶפֶן אַדָּרֶת
  english_pob_choice: to become a majestic vine
  chosen_spanish: para llegar a ser una vid majestuosa
  alternatives_spanish:
  - para convertirse en una vid espléndida
  - para ser una vid noble
  lexicon: HALOT
  rationale: אַדָּרֶת expresa magnificencia o esplendor. 'Majestuosa' comunica bien esa grandeza en español sin perder el tono elevado; 'vid' mantiene el término botánico concreto de גֶפֶן.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y coincide con el control auditado en inglés: campo bueno, aguas רבות, resultado de ramas/fruto y la cualidad final de una vid majestuosa. No se introdujeron cambios doctrinales ni ampliaciones interpretativas.'
  spanish_consistency_notes:
  - Se mantiene 'vid' para גֶפֶן por coherencia con el lenguaje bíblico agrícola.
  - Se conserva el plural 'muchas aguas' para reflejar מַיִם רַבִּים y la nota aclara la alternativa locativa.
  - '''Dar fruto'' se usa como equivalente idiomático estándar de וְלָשֵׂאת פֶּרִי.'
