  yaml_path: translation/deuterocanon/sirach/040/029.yaml
  text: A man who watches another’s table—his life is not to be counted as life[a]; he pollutes himself with another man’s food[b], but a man who knows inwardly will beware.
  footnotes:
  - marker: a
    text: Hebrew 'another’s table'; the Greek likewise has 'a table belonging to another.' The point is dependence on someone else’s provisions, not necessarily a foreign ethnicity.
    reason: lexical_alternative
  - marker: b
    text: 'The Hebrew of the final line is difficult: literally something like ''a man knowing the secret of the inward parts.'' The Greek interprets it as ''a knowledgeable and educated man will guard himself,'' which supports the sense of inward discipline or prudent restraint.'
    reason: alternative_reading
