revisions:
- from: Y tomó sandalias para sus pies[a], y se puso los brazaletes, las pulseras, los anillos, los pendientes y todo su adorno[b]; y se hermoseó mucho, para engañar a los ojos de los hombres que pudieran verla.
  to: Y se puso sandalias en los pies, y se puso las tobilleras, las pulseras, los anillos, los pendientes y todo su adorno[a]; y se hizo muy hermosa, para engañar a los ojos de los hombres que pudieran verla.
  rationale: 'Se corrige el texto principal para que suene natural en español y siga más de cerca las decisiones léxicas auditadas: ἔλαβεν ... σανδάλια se vierte idiomáticamente como ''se puso sandalias en los pies''; χλιδῶνας se alinea con ''tobilleras''; se mantiene ''todo su adorno'' para κόσμος con nota alternativa; y ''se hizo muy hermosa'' mejora la legibilidad y el matiz resultativo de ἐκαλλωπίσατο σφόδρα. No se requiere adjudicación adicional porque los cambios son claros y de bajo riesgo doctrinal.'
