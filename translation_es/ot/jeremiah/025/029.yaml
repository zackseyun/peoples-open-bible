base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/025/029.yaml
  text: For behold[a], in the city over which my name is called, I am beginning to bring harm, and shall you indeed go unpunished? You shall not go unpunished, for I am calling for a sword against all the inhabitants of the earth[b], declares Yahweh of hosts.
  footnotes:
  - marker: a
    text: Or 'in the city that is called by my name.' The Hebrew idiom is literally 'the city over which my name is called.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all the inhabitants of the land.' Hebrew אֶרֶץ can mean either 'land' or 'earth'; here 'earth' is taken as the broader sense in context.
    reason: alternative_reading
