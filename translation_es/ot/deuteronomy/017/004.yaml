translation:
  language: es
  text: y se te informa[a], y oyes de eso, y lo investigas a fondo, y he aquí, es verdad y cierto que esta abominación ha sido cometida en Israel,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el asunto es verdadero y está establecido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֻגַּד לְךָ
  english_pob_choice: and it is reported to you
  chosen_spanish: y se te informa
  alternatives_spanish:
  - y se te comunica
  - y se te da noticia
  lexicon: HALOT
  rationale: El verbo en pasivo comunica que la información llega al destinatario; «se te informa» conserva ese valor pasivo de manera natural en español y evita una formulación demasiado literal o torpe.
- source_word: וְשָׁמָעְתָּ
  english_pob_choice: and you hear of it
  chosen_spanish: y oyes de ello
  alternatives_spanish:
  - y lo oyes
  - y escuchas de ello
  lexicon: HALOT
  rationale: שׁמע es «oir». En español, «oyes de ello» explicita que el objeto es el asunto reportado, manteniendo la secuencia del hebreo sin añadir contenido nuevo.
- source_word: וְדָרַשְׁתָּ הֵיטֵב
  english_pob_choice: and you investigate thoroughly
  chosen_spanish: y lo investigas a fondo
  alternatives_spanish:
  - y lo indagas cuidadosamente
  - y lo examinas con diligencia
  lexicon: HALOT
  rationale: En contexto judicial, דרש es inquirir/investigar; הֵיטֵב intensifica la acción. «A fondo» transmite bien la intensidad en un español contemporáneo y digno.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y en efecto
  lexicon: HALOT
  rationale: «He aquí» preserva la función discursiva de llamada de atención y la solemnidad del marcador hebreo.
- source_word: אֱמֶת
  english_pob_choice: 'true'
  chosen_spanish: es verdad
  alternatives_spanish:
  - es verdadero
  - es cierto
  lexicon: HALOT
  rationale: Aquí אֱמֶת funciona predicativamente sobre el asunto; «es verdad» suena natural en español y conserva la afirmación de veracidad.
- source_word: נָכוֹן
  english_pob_choice: certain
  chosen_spanish: y cierto
  alternatives_spanish:
  - y establecido
  - y confirmado
  lexicon: HALOT
  rationale: נָכוֹן añade firmeza/establecimiento. «Cierto» reproduce la segunda confirmación sin volver redundante la frase en español.
- source_word: הַדָּבָר
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - el asunto
  - el caso
  lexicon: HALOT
  rationale: Tras la fórmula de confirmación, el español fluye mejor con una subordinada introducida por «que»; así se preserva el contenido del asunto sin forzar una repetición nominal.
- source_word: נֶעֶשְׂתָה
  english_pob_choice: has been done
  chosen_spanish: ha sido hecha
  alternatives_spanish:
  - ha sido cometida
  - se ha hecho
  lexicon: HALOT
  rationale: La pasiva de עשה indica una acción efectivamente realizada. Aunque «cometida» sería más idiomático, «ha sido hecha» mantiene más de cerca la forma verbal del hebreo en esta construcción confirmatoria.
- source_word: הַתּוֹעֵבָה הַזֹּאת
  english_pob_choice: this abomination
  chosen_spanish: esta abominación
  alternatives_spanish:
  - este acto abominable
  - esta cosa detestable
  lexicon: HALOT
  rationale: תּוֹעֵבָה es un término fuerte de peso moral y pactual; «abominación» conserva esa gravedad y sigue la decisión auditada en inglés.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  - dentro de Israel
  lexicon: HALOT
  rationale: La localización del delito dentro del pueblo del pacto se expresa de forma directa y clara con «en Israel».
theological_decisions:
- issue: Fórmula judicial de confirmación אֱמֶת נָכוֹן הַדָּבָר
  english_pob_reading: it is true and certain that
  chosen_spanish_reading: es verdad y cierto que
  alternative_spanish_readings:
  - el asunto es verdad y está establecido
  - es verdad; el asunto está confirmado
  rationale: El hebreo usa una confirmación legal de hecho verificado. «Es verdad y cierto que» conserva los dos elementos sin añadir interpretación doctrinal y mantiene el tono judicial del pasaje.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Término pactual y moral תּוֹעֵבָה
  english_pob_reading: abomination
  chosen_spanish_reading: abominación
  alternative_spanish_readings:
  - cosa detestable
  - acto abominable
  rationale: En Deuteronomio, el término expresa fuerte repulsión moral y pactual. «Abominación» preserva esa carga sin suavizar la valoración del texto.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se corrigió la validación previa anclando la nota [a] dentro del texto en la forma «se te informa[a]». Se mantuvo la correspondencia auditada con el hebreo y el enfoque de equivalencia óptima del registro inglés, sin añadir notas no ancladas.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se mantiene «abominación» para תּוֹעֵבָה por consistencia pactual en Deuteronomio.
  - Se evita «Cristo/Mesías» porque no aplica al versículo.
  - La subordinación con «que» en la cláusula final hace el español más natural sin perder la estructura de confirmación del hebreo.
