review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: mantiene la convocatoria futura, la fórmula temporal «en los últimos años», la restauración tras la espada, la reunión desde muchos pueblos, la referencia a los montes de Israel y la seguridad final. Sin embargo, varias elecciones españolas necesitan ajuste para reflejar mejor las preposiciones hebreas y sonar más naturales: «restaurada de la espada» y «reunida de muchos pueblos» son poco idiomáticas; «ella fue sacada» es innecesariamente rígido. También conviene alinear mejor la nota léxica de תִּפָּקֵד con las alternativas inglesas auditadas.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero contiene calcos poco naturales en español bíblico moderno. «Restaurada de la espada» debe pasar a «restaurada tras la espada» o equivalente; «reunida de muchos pueblos» a «reunida de entre muchos pueblos»; y «pero ella fue sacada» a «pero fue sacada» para evitar una personificación forzada. «Habitarán seguros» es aceptable, aunque «vivirán seguros» sería más llano; no es necesario cambiarlo.
  glossary_alignment: No hay términos del glosario mayor en conflicto. La decisión escatológica «en los últimos años» respeta bien בְּאַחֲרִית הַשָּׁנִים y evita armonizar con «postreros días». La nota alternativa de תִּפָּקֵד debe evitar «serás citado», que suena jurídico y no militar; «serás convocado» o «serás visitado» reflejan mejor el expediente auditado.
  issues:
  - severity: medium
    issue: «restaurada de la espada» es un calco poco natural
    rationale: אֶרֶץ מְשׁוֹבֶבֶת מֵחֶרֶב expresa restauración/recuperación desde la devastación de la espada. En español, «restaurada de la espada» suena antinatural; «restaurada tras la espada» o «restaurada de la devastación de la espada» comunica mejor el sentido.
  - severity: medium
    issue: «reunida de muchos pueblos» omite el matiz de procedencia ‘de entre’
    rationale: מְקֻבֶּצֶת מֵעַמִּים רַבִּים indica reunión desde entre muchos pueblos. «Reunida de muchos pueblos» no es idiomático; «reunida de entre muchos pueblos» preserva la fuente dispersa y lee naturalmente.
  - severity: low
    issue: «pero ella fue sacada» suena rígido e innecesario
    rationale: Aunque הִיא es femenino y refiere a la tierra, el español no necesita explicitar «ella» aquí. «Pero fue sacada de entre los pueblos» preserva el sentido sin dureza estilística.
  - severity: low
    issue: La nota alternativa de תִּפָּקֵד incluye «serás citado», que no refleja bien el contexto
    rationale: El expediente inglés documenta ‘visited’ y ‘summoned/mustered’. «Citado» introduce un matiz legal o administrativo ajeno al contexto militar. Debe sustituirse por una alternativa más alineada, como «serás convocado» o «serás visitado».
  revised_spanish_text: Después de muchos días serás llamado[a]; en los últimos años entrarás en una tierra restaurada tras la espada, reunida de entre muchos pueblos, sobre los montes de Israel, que habían sido siempre una desolación; pero fue sacada de entre los pueblos, y todos ellos habitarán seguros.
  revised_footnotes:
  - marker: a
    text: 'O: «serás visitado» o «serás convocado». El hebreo probablemente comunica la idea de ser llamado o movilizado para actuar.'
    reason: lexical_alternative
  revision_rationale: 'Se hicieron reparaciones menores para mejorar la fidelidad y la naturalidad del español sin cambiar el sentido base: se corrigieron dos calcos preposicionales («tras la espada», «de entre muchos pueblos»), se suavizó la referencia pronominal a la tierra, y se alineó la nota léxica con las alternativas auditadas para תִּפָּקֵד.'
