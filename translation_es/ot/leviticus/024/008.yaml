    text: 'Hebrew: ''On the Sabbath day, on the Sabbath day,'' an idiom meaning every Sabbath or Sabbath by Sabbath.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he shall set it in order'; the singular 'it' refers collectively to the bread arrangement.
    reason: lexical_alternative
  - marker: c
    text: Or 'an everlasting covenant.'
    reason: alternative_reading
