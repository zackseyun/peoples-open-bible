translation:
  language: es
  text: Quien guiña el ojo causa tristeza[a], y la boca necia llega a la ruina.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "Quien guiña el ojo causa tristeza, y un necio de labios llega a la ruina." El segundo miembro es difícil; el hebreo literalmente dice "un necio de labios".'
    reason: lexical_alternative
lexical_decisions:
- source_word: קֹרֵץ עַיִן
  english_pob_choice: Whoever winks the eye
  chosen_spanish: Quien guiña el ojo
  alternatives_spanish:
  - El que guiña el ojo
  - Quien hace guiños
  lexicon: HALOT
  rationale: La forma participial funciona de manera sustantiva para describir a una persona caracterizada por este gesto. "Quien" conserva el valor genérico; "guiña el ojo" mantiene el modismo sin volverlo demasiado literal ni perder naturalidad en español.
- source_word: יִתֵּן
  english_pob_choice: causes
  chosen_spanish: causa
  alternatives_spanish:
  - produce
  - trae
  - da
  lexicon: HALOT
  rationale: En este contexto, נתן tiene valor causativo idiomático junto con עַצָּבֶת. "Causa" expresa bien la relación de efecto sin traducir mecánicamente como "da".
- source_word: עַצָּבֶת
  english_pob_choice: grief
  chosen_spanish: tristeza
  alternatives_spanish:
  - dolor
  - pena
  - aflicción
  lexicon: HALOT
  rationale: El término abarca dolor, pena o aflicción. "Tristeza" comunica de forma clara el daño emocional y relacional en un español amplio y natural, aunque "dolor" o "pena" también serían posibles.
- source_word: וֶאֱוִיל שְׂפָתַיִם
  english_pob_choice: and a foolish mouth
  chosen_spanish: y la boca necia
  alternatives_spanish:
  - y un necio de labios
  - y un hablador necio
  - y un necio con los labios
  lexicon: HALOT
  rationale: La expresión hebrea literalmente es "necio de labios", un giro que caracteriza a la persona por su habla. "La boca necia" conserva el énfasis en el habla y suena más natural en español que un calco rígido.
- source_word: יִלָּבֵט
  english_pob_choice: comes to ruin
  chosen_spanish: llega a la ruina
  alternatives_spanish:
  - será arruinada
  - caerá
  - vendrá a ruina
  lexicon: HALOT
  rationale: El verbo nifal es raro y difícil; el sentido contextual apunta a derrumbe o ruina. "Llega a la ruina" mantiene el resultado sin forzar una imagen más específica que el hebreo no exige.
translation_notes:
  revision_awareness: La redacción sigue el audit trail inglés y conserva la dificultad del segundo miembro con una nota alternativa. Se eligió un español natural pero cercano al hebreo, manteniendo el paralelismo entre el gesto engañoso y el habla necia.
  spanish_consistency_notes:
  - Se usó "Yahvé" por norma del proyecto solo cuando corresponda; en este versículo no aparece el nombre divino.
  - '"Necia" se eligió para reproducir el valor de אֱוִיל sin cargarlo con un término más técnico o eclesiástico.'
  - La nota mantiene la tensión del hebreo literal "necio de labios" que el inglés POB también documenta.
