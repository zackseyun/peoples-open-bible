theological_decisions:
- issue: Judicial language in מִשְׁפָּטָם
  chosen_reading: 'The phrase is rendered as God''s vindicating or justly handling the people''s case: ''uphold their cause.'''
  alternative_readings:
  - execute their judgment
  - grant them justice
  rationale: The verse combines hearing prayer, acting judicially, and forgiving sin. The chosen rendering preserves the legal dimension without implying condemnation of the petitioners. It reflects the prayer that God would act rightly on behalf of repentant exiles.
  doctrine_reference: Translation philosophy §3, §5
