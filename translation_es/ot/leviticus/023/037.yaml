    text: O 'ofrenda por fuego'. El hebreo se refiere a una ofrenda hecha por fuego para Yahvé.
    reason: lexical_alternative
  - marker: b
    text: O 'lo requerido para cada día en ese día'. El modismo hebreo señala lo prescrito correspondiente a cada día.
    reason: lexical_alternative
  revision_rationale: Se corrigió el anclaje de la nota [a] para que recaiga sobre el término que traduce אִשֶּׁה, se reemplazó 'ofrenda encendida' por 'ofrenda hecha por fuego' para mayor fidelidad al hebreo y al rastro de auditoría inglés, y se afinó la cláusula final para expresar mejor el sentido prescriptivo de דְּבַר יוֹם בְּיוֹמוֹ en español natural.
