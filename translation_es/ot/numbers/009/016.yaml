translation:
  language: es
  text: 'Así sucedía continuamente: la nube lo cubría[a], y la apariencia de fuego de noche.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo que parecía fuego de noche».'
