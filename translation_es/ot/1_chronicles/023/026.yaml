review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del hebreo: continuación aditiva («Y también»), referencia a los levitas, cese de la necesidad de cargar, y los objetos del tabernáculo para su servicio. Sin embargo, «ya no les toca llevar» desplaza el matiz desde ‘ya no es necesario/requerido’ hacia ‘ya no les corresponde por turno’, lo cual suena más administrativo que el hebreo אֵין לָשֵׂאת en este contexto. La nota alternativa con «no les corresponde» repite el mismo desvío semántico.'
  spanish_quality_summary: El español es natural y legible, pero «les toca llevar» resulta algo coloquial y menos digno para el registro bíblico buscado. «Ya no tienen que llevar» o «ya no necesitan llevar» expresa mejor el sentido práctico sin sugerir prohibición ni sistema de turnos. El resto del versículo suena claro y adecuado.
  glossary_alignment: 'La terminología principal está bien alineada: «levitas», «tabernáculo», «utensilios», «servicio». No hay conflictos con los glosarios del proyecto. El ajuste necesario es principalmente semántico-estilístico en la expresión de אֵין לָשֵׂאת.'
  issues:
  - severity: medium
    issue: «ya no les toca llevar» debilita y desplaza el matiz de necesidad/requisito
    rationale: El hebreo, según el expediente inglés, expresa que ya no es necesario o requerido que los levitas carguen el tabernáculo; «les toca» puede insinuar turno, asignación o coloquialidad, no simplemente cese de necesidad.
  - severity: medium
    issue: La nota al pie alternativa («no les corresponde llevar») conserva el mismo problema semántico
    rationale: La alternativa debería reflejar la opción documentada de tipo impersonal/necessitativa, no otra formulación de asignación funcional.
