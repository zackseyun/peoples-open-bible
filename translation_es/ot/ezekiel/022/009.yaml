revisions:
- from: Hombres de chisme[a] estaban en ti para derramar sangre; y sobre los montes comieron[b][c]; hicieron lewdness en medio de ti.
  to: Hombres de calumnia[a] había en ti para derramar sangre; y en los montes comieron[b]; cometieron perversidad sexual[c] en medio de ti.
  rationale: Se corrigió el mayor problema del borrador al traducir זִמָּה al español y reubicar correctamente su nota. Se sustituyó 'hombres de chisme' por 'hombres de calumnia' para reflejar mejor el valor de רכיל en un contexto de acusación dañina que conduce a derramamiento de sangre. También se ajustó 'sobre los montes' a 'en los montes' para mejorar naturalidad en español sin perder la imagen original. Se prefirió 'cometieron' con objeto abstracto por ser el giro idiomático más natural para עָשׂוּ ... בְתוֹכֵךְ.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:40:32Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador preserva en parte la estructura del hebreo: presencia de אַנְשֵׁי רָכִיל dentro de Jerusalén, propósito de derramar sangre, comidas en los montes y práctica de זִמָּה en medio de ella. Sin embargo, falla de manera importante al dejar ''lewdness'' sin traducir y al anclar la nota [c] en ''comieron'' en vez de en el término correspondiente a זִמָּה. Además, ''hombres de chisme'' debilita el matiz de calumnia/delación dañina que contribuye al derramamiento de sangre.'
  spanish_quality_summary: El español necesita reparación clara para ser publicable. 'Hombres de chisme' suena coloquial y demasiado leve; 'hicieron lewdness' no es español aceptable; y la ubicación de las notas induce confusión. Una redacción como 'hombres de calumnia' o 'hombres dedicados a la calumnia' y 'cometieron perversidad sexual' o 'cometieron depravación' mejora fidelidad y legibilidad. 'En los montes comieron' suena más natural que 'sobre los montes comieron', aunque ambas pueden defenderse.
  glossary_alignment: 'No hay conflictos con términos troncales del glosario mayor, pero sí con la política de legibilidad y fidelidad léxica: el préstamo inglés ''lewdness'' viola el requisito de español claro, y ''hombres de chisme'' no refleja bien la fuerza de רכיל documentada en el rastro inglés. La nota de alternativas para זִמָּה debe mantenerse, pero anclada al término español correspondiente.'
  issues:
  - severity: high
    issue: Se dejó 'lewdness' en inglés dentro del texto español.
    rationale: No es español publicable y rompe tanto la legibilidad como la fidelidad al sentido de זִמָּה.
  - severity: high
    issue: La nota [c] está anclada a 'comieron' en lugar del equivalente de זִמָּה.
    rationale: La nota léxica [c] explica זִמָּה ('lewdness/wickedness/sexual depravity'), no el verbo 'comieron'; así, la marcación actual confunde el lector y no sigue el rastro auditado.
  - severity: medium
    issue: '''Hombres de chisme'' debilita el sentido de רכיל.'
    rationale: En este contexto profético-judicial, el término apunta a calumnia/delación/acusación difamatoria asociada con violencia y derramamiento de sangre; 'chisme' suena demasiado liviano y doméstico.
  - severity: low
    issue: '''Sobre los montes comieron'' es menos natural en español que ''en los montes comieron'' o ''comieron en los montes''.'
    rationale: Aunque puede defenderse por cercanía formal, en español bíblico natural 'en los montes' transmite mejor la escena sin pérdida de sentido.
