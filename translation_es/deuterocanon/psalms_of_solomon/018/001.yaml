review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego: una invocación a Dios seguida por la afirmación de que su misericordia está/sobre las obras de sus manos para siempre. Conserva adecuadamente ἔλεος como «misericordia», ἔργα τῶν χειρῶν σου como «las obras de tus manos» y εἰς τὸν αἰῶνα como «para siempre».'
  spanish_quality_summary: 'La redacción es clara y digna, pero hay dos reparaciones menores. Primero, «Yahvé» para Κύριε aquí no está suficientemente sustentado por la evidencia fuente inmediata: el griego dice κύριε, no el tetragrámaton, y el inglés auditado eligió «Lord». En español, «Señor» preserva mejor la forma atestiguada. Segundo, la nota [a] está mal anclada: el contenido de la nota ofrece una alternativa para toda la cláusula «tu misericordia está sobre… para siempre», no para «Yahvé/Señor».'
  glossary_alignment: La terminología general está bien alineada salvo en Κύριε. La política de «Yahvé» aplica cuando la evidencia inmediata remite al nombre divino; aquí el testimonio conservado es κύριε en vocativo, por lo que «Señor» es la opción más fiel y menos interpretativa. «Misericordia», «obras de tus manos» y «para siempre» sí concuerdan con las pautas del proyecto.
  issues:
  - severity: medium
    issue: Κύριε se tradujo como «Yahvé» en el texto principal.
    rationale: La fuente griega atestigua κύριε, no יהוה. Aunque el proyecto español favorece «Yahvé» cuando el texto remite al nombre divino, aquí sustituir «Señor» por «Yahvé» introduce una identificación no explicitada por la evidencia inmediata y se aparta del audit trail inglés sin necesidad.
  - severity: medium
    issue: La nota [a] está colocada sobre «Yahvé» pero comenta una alternativa para toda la predicación.
    rationale: La nota dice «tu misericordia reposa sobre las obras de tus manos para siempre», que corresponde a ἐπὶ/está sobre y no al vocativo inicial. Debe anclarse en la frase pertinente, no en el nombre divino.
  - severity: low
    issue: La nota [b] usa «tu hechura», que es posible pero algo menos natural que «tu obra hecha» o «tu obra».
    rationale: No es incorrecto, y refleja bien la alternativa inglesa «your handiwork». Puede conservarse, pero conviene mantenerla como alternativa secundaria y no como mejora principal.
  revised_spanish_text: Señor, tu misericordia reposa[a] sobre las obras de tus manos para siempre[b];
  revised_footnotes:
