- from: Pero alégrense todos los que se refugian en ti[a]; para siempre canten con júbilo. Extiende tu protección sobre ellos[b], para que se llenen de gozo en ti los que aman tu nombre.
  to: Pero alégrense todos los que se refugian en ti; para siempre griten de alegría[a]. Extiende tu protección sobre ellos[b], para que se regocijen en ti los que aman tu nombre.
