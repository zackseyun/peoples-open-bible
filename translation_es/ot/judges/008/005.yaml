  glossary_alignment: No hay términos teológicos conflictivos en este versículo. Los nombres propios y topónimos están bien tratados para español bíblico. La nota léxica sobre el modismo hebreo está bien alineada con la documentación inglesa. La principal corrección léxica necesaria es sustituir «panes de pan» por un equivalente idiomático como «hogazas de pan».
