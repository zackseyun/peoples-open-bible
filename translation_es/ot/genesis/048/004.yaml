revisions:
- from: 'Y le dijo a mí[a]: «Mira, yo te haré fecundo y te multiplicaré, y te convertiré en una asamblea de pueblos, y daré esta tierra a tu descendencia después de ti como posesión perpetua».'
  to: 'Y me dijo: «Mira, yo te haré fecundo y te multiplicaré, y te convertiré en una asamblea de pueblos[a], y daré esta tierra a tu descendencia después de ti como posesión perpetua».'
  rationale: 'Se corrige «Y le dijo a mí» a «Y me dijo» para ajustarlo al español natural sin perder el sentido del hebreo. Se reubica la nota al sintagma «asamblea de pueblos» y se revisa su contenido para reflejar la alternativa léxica real documentada en la auditoría inglesa: «compañía de pueblos». No se requieren otros cambios.'
