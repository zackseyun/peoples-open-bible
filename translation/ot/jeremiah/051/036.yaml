id: JER.51.36
reference: Jeremiah 51:36
source:
  edition: WLC
  text: לָ/כֵ֗ן כֹּ֚ה אָמַ֣ר יְהוָ֔ה הִנְ/נִי רָב֙ אֶת רִיבֵ֔/ךְ וְ/נִקַּמְתִּ֖י אֶת נִקְמָתֵ֑/ךְ וְ/הַחֲרַבְתִּי֙ אֶת יַמָּ֔/הּ וְ/הֹבַשְׁתִּ֖י אֶת מְקוֹרָֽ/הּ־־־־־׃
translation:
  text: 'Therefore thus says Yahweh: Behold[a], I am about to plead your case and take vengeance for you[c][b]; I will dry up her sea and make her spring dry.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or ''contend for your cause.'' The Hebrew uses a legal-dispute idiom: ''I am pleading your case.'''
    reason: lexical_alternative
  - marker: b
    text: 'Or ''I will dry up its sea.'' The Hebrew personifies Babylon as feminine: ''her sea.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'her fountain' or 'her source.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  chosen: Therefore
  alternatives:
  - For this reason
  - So
  lexicon: HALOT
  rationale: Marks an inferential conclusion from the preceding context; 'Therefore' is the most natural formal English connector here.
- source_word: כֹּה אָמַר יְהוָה
  chosen: thus says the LORD
  alternatives:
  - this is what the LORD says
  lexicon: HALOT
  rationale: Standard prophetic messenger formula. 'the LORD' follows the project's default rendering for יְהוָה.
- source_word: הִנְנִי
  chosen: Behold, I am about to
  alternatives:
  - Behold, I am
  - Look, I am
  lexicon: HALOT
  rationale: הִנְנִי is a deictic self-presentation often introducing imminent divine action. 'Behold' preserves the prophetic force, while 'am about to' brings out the impending action implied by the construction in context.
- source_word: רָב אֶת רִיבֵךְ
  chosen: plead your case
  alternatives:
  - contend for your cause
  - take up your dispute
  lexicon: HALOT
  rationale: The verb ריב with cognate noun ריב forms a legal/dispute idiom. 'Plead your case' communicates the forensic sense clearly in modern English.
- source_word: וְנִקַּמְתִּי אֶת נִקְמָתֵךְ
  chosen: and take vengeance for you
  alternatives:
  - and avenge you
  - and execute your vengeance
  lexicon: HALOT
  rationale: The cognate construction intensifies the avenging action. 'Take vengeance for you' preserves the personal and judicial sense without awkward literal repetition.
- source_word: וְהַחֲרַבְתִּי
  chosen: I will dry up
  alternatives:
  - I will lay waste
  - I will make desolate
  lexicon: HALOT
  rationale: With 'her sea' as object, the sense is not general devastation but causing waters to dry up. 'Dry up' fits the immediate imagery and parallelism with the next clause.
- source_word: אֶת יַמָּהּ
  chosen: her sea
  alternatives:
  - its sea
  lexicon: HALOT
  rationale: The feminine suffix refers to Babylon personified as a woman/city. 'Her sea' preserves the personification and likely refers metaphorically to Babylon's abundant waters.
- source_word: וְהֹבַשְׁתִּי
  chosen: and make ... dry
  alternatives:
  - and dry up
  - and cause to wither
  lexicon: HALOT
  rationale: 'Hiphil of יבש is causative: ''make dry'' or ''dry up.'' In English, ''make her spring dry'' gives a smooth parallel to the previous clause.'
- source_word: אֶת מְקוֹרָהּ
  chosen: her spring
  alternatives:
  - her fountain
  - her source
  lexicon: HALOT
  rationale: מָקוֹר denotes a spring or fountainhead. 'Spring' is natural modern English and suits the water-source imagery.
