lexical_decisions:
- source_word: τὸ ποτήριον τῆς εὐλογίας
  english_pob_choice: cup of blessing
  chosen_korean: 축복의 잔
  lexicon: BDAG
  rationale: 유대 만찬 전통의 「축복의 잔(kos ha-berakhah)」을 그대로 보존하는 표준 한국어 표현.
- source_word: κοινωνία τοῦ αἵματος τοῦ Χριστοῦ
  english_pob_choice: sharing in the blood of Messiah
  chosen_korean: 메시아의 피에 참여함
  alternatives_korean:
  - 메시아의 피에 동참함
  - 메시아의 피와의 교제
  lexicon: BDAG
  rationale: κοινωνία는 단순한 「교제」가 아니라 실제적인 공동 참여를 가리킨다. 한국 교회 전통의 「성찬 참여」 의미를 살려 「참여함」을 사용.
- source_word: τὸν ἄρτον ὃν κλῶμεν
  english_pob_choice: bread that we break
  chosen_korean: 우리가 떼는 빵
  alternatives_korean:
  - 우리가 떼는 떡
  lexicon: BDAG
  rationale: 「떡」은 한국 전통 번역어이나, 현대 한국어 일상에서 빵(loaf)으로 더 분명히 전달된다. 「떼다」 동사는 그대로 살린다.
theological_decisions:
- issue: 10:16 κοινωνία τοῦ αἵματος — 성찬에서 그리스도의 피와 몸에 실제로 참여함
  chosen_reading: 메시아의 피에 참여함 / 메시아의 몸에 참여함
  alternative_readings:
  - 메시아의 피와의 교제
  - 메시아의 피에 동참함
  rationale: κοινωνία는 추상적 교감이 아니라 실제적 공동 참여를 가리킨다. 본문은 다음 절들에서 우상 제물과의 「참여」와 대조시키므로 「참여함」으로 옮겨 평행을 보존한다. 성찬 신학의 구체적 해석(실재설/기념설 등)은 본문 자체가 결정하지 않으므로 한국어 본문도 결정하지 않는다.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve it'
