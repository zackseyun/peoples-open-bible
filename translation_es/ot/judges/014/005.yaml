translation:
  language: es
  text: Entonces Sansón descendió con su padre y su madre a Timnat, y llegaron hasta las viñas de Timnat. Y he aquí[a], un león joven[b] rugía mientras venía hacia él[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse de manera más formal: «Y he aquí».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «un león joven de leones», un modismo que significa «un león joven».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «rugía al salirle al encuentro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרֶד
  english_pob_choice: went down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - fue hacia abajo
  lexicon: HALOT
  rationale: El hebreo expresa movimiento descendente, y el español 'descendió' conserva esa dirección con registro digno y natural.
- source_word: תִּמְנָתָה
  english_pob_choice: to Timnah
  chosen_spanish: a Timnat
  alternatives_spanish:
  - hacia Timnat
  - a Timna
  lexicon: HALOT
  rationale: Se mantiene el nombre propio con la forma española habitual 'Timnat', reflejando el destino del movimiento indicado por el sufijo direccional.
- source_word: וַיָּבֹאוּ עַד
  english_pob_choice: they came as far as
  chosen_spanish: llegaron hasta
  alternatives_spanish:
  - vinieron hasta
  - llegaron a
  lexicon: HALOT
  rationale: La construcción marca que alcanzaron un punto concreto del trayecto; 'llegaron hasta' conserva bien ese límite de llegada sin sobrerelatar.
- source_word: כַּרְמֵי תִמְנָתָה
  english_pob_choice: the vineyards of Timnah
  chosen_spanish: las viñas de Timnat
  alternatives_spanish:
  - los viñedos de Timnat
  - las viñas cerca de Timnat
  lexicon: HALOT
  rationale: כֶּרֶם designa viña/viñedo. 'Viñas' es una forma clara y bíblica en español; el genitivo se expresa naturalmente con 'de Timnat'.
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y he aquí que
  - Y miren
  lexicon: HALOT
  rationale: '''He aquí'' preserva el marcador discursivo de sorpresa y atención, y corresponde bien al registro formal del texto poético-narrativo.'
- source_word: כְּפִיר אֲרָיוֹת
  english_pob_choice: a young lion
  chosen_spanish: un cachorro de león
  alternatives_spanish:
  - un león joven
  - un cachorro de leones
  lexicon: HALOT
  rationale: כְּפִיר denota un león joven; en español, 'cachorro de león' comunica la juventud del animal con precisión. No se reproduce literalmente el plural idiomático 'de leones' para evitar rareza innecesaria.
- source_word: שֹׁאֵג
  english_pob_choice: was roaring
  chosen_spanish: rugía
  alternatives_spanish:
  - estaba rugiendo
  - rugía con fuerza
  lexicon: HALOT
  rationale: El participio presenta una acción en curso; 'rugía' transmite el aspecto imperfectivo en un español narrativo fluido.
- source_word: לִקְרָאתוֹ
  english_pob_choice: as it came toward him
  chosen_spanish: mientras venía hacia él
  alternatives_spanish:
  - al venir hacia él
  - al salirle al encuentro
  lexicon: HALOT
  rationale: '''Venía hacia él'' expresa el acercamiento del animal sin forzar una interpretación más específica que el hebreo. ''Mientras'' reproduce el simultáneo del escenario.'
translation_notes:
  revision_awareness: La auditoría inglesa mantuvo el valor discursivo de הִנֵּה con una revisión de 'look' a 'behold' por mayor registro formal. También conservó la imagen dinámica de un león joven que ruge mientras se aproxima. La versión española sigue esa decisión, evitando una paráfrasis explicativa y manteniendo la tensión narrativa del encuentro.
  spanish_consistency_notes:
  - Se usa 'Y he aquí' para reflejar el marcador hebreo הִנֵּה con registro bíblico formal.
  - '''Timnat'' se mantiene como topónimo transliterado de manera consistente.'
  - '''Cachorro de león'' evita una traducción mecánica del plural idiomático hebreo sin perder el sentido.'
