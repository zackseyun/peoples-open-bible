translation:
  language: es
  text: 'Entonces me dijo[a]: «Hijo de hombre, ve a la casa de Israel y háblales mis palabras».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mortal» o «ser humano». El hebreo usa aquí un giro idiomático que es la forma recurrente de dirigirse a Ezequiel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלַי
  english_pob_choice: Then he said to me
  chosen_spanish: Entonces me dijo
  alternatives_spanish:
  - Y me dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» conserva la secuencia con naturalidad en español y mantiene el valor narrativo del original.
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - hombre mortal
  - ser humano
  lexicon: HALOT
  rationale: Se preserva el giro idiomático recurrente en Ezequiel. «Hijo de hombre» mantiene la forma verbal y la resonancia literaria mejor que una equivalencia explicativa.
- source_word: לֶךְ
  english_pob_choice: go
  chosen_spanish: ve
  alternatives_spanish:
  - anda
  - ve, anda
  lexicon: HALOT
  rationale: Es un imperativo breve y directo; «ve» reproduce bien el mandato.
- source_word: בֹּא
  english_pob_choice: go, come / omitted in revision for English naturalness
  chosen_spanish: —
  alternatives_spanish:
  - entra
  - ven
  lexicon: HALOT
  rationale: El hebreo contiene dos imperativos consecutivos; sin embargo, como el texto auditado inglés revisado lo trató como redundante para la fluidez, el español también puede omitir la segunda forma explícita sin perder el sentido del mandato direccional global.
- source_word: אֶל בֵּית יִשְׂרָאֵל
  english_pob_choice: to the house of Israel
  chosen_spanish: a la casa de Israel
  alternatives_spanish:
  - a Israel
  - al pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión profética fija «casa de Israel», que carga matiz de identidad colectiva y pacto.
- source_word: וְדִבַּרְתָּ
  english_pob_choice: and speak
  chosen_spanish: y habla
  alternatives_spanish:
  - y hablarás
  - y debes hablar
  lexicon: HALOT
  rationale: El verbo funciona como instrucción consecuente; el imperativo español transmite bien el mandato continuo sin añadir paráfrasis.
- source_word: בִדְבָרַי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - con mis palabras
  - mi mensaje
  lexicon: HALOT
  rationale: «Mis palabras» conserva el sustantivo plural y la fuerza de hablar con las palabras propias de Yahvé, sin diluirlo en «mensaje».
- source_word: אֲלֵיהֶם
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - a la casa de Israel
  lexicon: HALOT
  rationale: El pronombre remite a la casa de Israel ya mencionada; «a ellos» es natural en español y respeta la referencia pronominal.
theological_decisions:
- issue: Tratamiento del título profético בֶּן אָדָם
  english_pob_reading: Son of man
  chosen_spanish_reading: Hijo de hombre
  alternative_spanish_readings:
  - hombre mortal
  - ser humano
  rationale: Se evita deshacer el título en una explicación más interpretativa. La forma tradicionalmente conocida en español conserva mejor el valor vocativo repetitivo en Ezequiel y no introduce una lectura cristológica ajena al contexto inmediato.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם adam'
translation_notes:
  revision_awareness: El borrador español sigue de cerca el texto hebreo y toma en cuenta el ajuste de la revisión inglesa que simplificó la doble orden direccional. Por eso mantiene la naturalidad en español sin forzar una duplicación innecesaria, pero conserva la expresión fija «casa de Israel» y el título vocativo «Hijo de hombre».
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del nombre divino en el proyecto, pero en este versículo no aparece el tetragrámaton de manera explícita.
  - «casa de Israel» se mantiene como expresión profética estable.
  - «mis palabras» conserva el plural del hebreo דְבָרַי.
  - La nota al pie está anclada correctamente en el vocativo «Hijo de hombre» mediante [a].
