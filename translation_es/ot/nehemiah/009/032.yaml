review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: invocación vocativa, epítetos divinos, petición de no minimizar el sufrimiento, lista de afectados y marco temporal desde los reyes de Asiria hasta el presente. Sin embargo, hay dos desajustes relevantes con la evidencia y la auditoría POB: חֶסֶד en este contexto pactal queda insuficientemente representado por ''misericordia'', y la sintaxis española ''no tenga por pequeña'' no es idiomáticamente correcta como súplica directa a Dios; debe expresarse como ''no consideres pequeña'' o equivalente.'
  spanish_quality_summary: El español es generalmente claro y digno, pero presenta detalles mejorables de naturalidad y precisión. 'No tenga por pequeña' suena gramaticalmente defectuoso en este contexto; 'delante de ti' es correcto pero combina mejor con un verbo finito dirigido a Dios. 'Jefes' para שׂרים es aceptable, aunque 'oficiales' o 'gobernantes' sería más cercano al inglés auditado; no es un error. La nota [a] está mal formulada porque ofrece la misma palabra ('temible' para 'temible') en vez de una alternativa real.
  glossary_alignment: 'No hay conflicto con términos de alto nivel del glosario del proyecto. La decisión principal a corregir es חֶסֶד: la auditoría inglesa documenta explícitamente ''steadfast love'' por su peso pactal; en español conviene ''amor constante'' o ''amor fiel'' más que ''misericordia''. ''Nuestros padres'' está alineado con la política de mantener el masculino histórico, con nota alternativa adecuada.'
  issues:
  - severity: high
    issue: חֶסֶד se tradujo como 'misericordia' en vez de una expresión que preserve mejor la lealtad de pacto.
    rationale: La auditoría inglesa justifica 'steadfast love' precisamente para conservar el peso teológico-covenantal. 'Misericordia' es posible en abstracto, pero aquí adelgaza la dimensión de fidelidad/amor leal que el registro documentado quiso resguardar.
  - severity: high
    issue: La frase 'no tenga por pequeña delante de ti' es sintácticamente inadecuada en español para una súplica dirigida a Dios.
    rationale: El hebreo pide que Dios no considere insignificante la aflicción. En español natural y fiel debe decirse 'no consideres pequeña delante de ti...' o 'no dejes que... parezca pequeña ante ti'.
  - severity: medium
    issue: La nota [a] no ofrece una alternativa real.
    rationale: Dice 'O “temible” para “temible”'. Debe reflejar la alternativa auditada, por ejemplo 'imponente' o 'majestuoso', o mejor 'admirable/asombroso' no sería ideal; la más directa es 'imponente' o 'temible/majestuoso'. Conviene conservar la explicación de temor reverente.
