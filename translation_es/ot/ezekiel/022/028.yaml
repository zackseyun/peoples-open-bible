review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: los profetas de la ciudad encubren, ven falsedad, adivinan mentira y pronuncian una fórmula profética falsa aunque Yahvé no ha hablado. También preserva correctamente el nombre divino «Yahvé». Sin embargo, hay varios puntos donde la forma española no refleja con suficiente naturalidad o precisión la decisión auditada: «con yeso» no expresa bien la idea de «whitewash»/recubrimiento engañoso; «Así ha dicho» suena menos idiomático que la fórmula profética española estable; y la nota b está anclada a «diciendo» aunque la decisión léxica relevante recae en «el Señor Yahvé».'
  spanish_quality_summary: El texto es comprensible, pero suena algo calcado. «Han recubierto para ellos con yeso» y «adivinando mentira» son aceptables pero pesados; «con cal[a]» o «con encalado[a]» comunica mejor la imagen de blanqueamiento engañoso en español bíblico moderno. «Así dice el Señor Yahvé[b]» es más natural y reconocible que «Así ha dicho». La puntuación y el registro general son buenos.
  glossary_alignment: 'Buena alineación con la política del proyecto en «Yahvé». La combinación אֲדֹנָי יְהוִה se puede mantener como «el Señor Yahvé», con nota léxica en el propio sintagma, y el segundo יְהוָה como «Yahvé». No hay conflicto doctrinal serio. El principal ajuste terminológico es תָּפֵל: «yeso» no corresponde tan bien al valor de «whitewash» como «cal»/«encalado».'
  issues:
  - severity: medium
    issue: «con yeso» debilita la imagen de blanqueamiento engañoso de תָּפֵל
    rationale: El inglés auditado eligió «whitewash» por la metáfora de una capa engañosa que oculta defectos. En español, «yeso» remite más a material de construcción que a blanqueado superficial; «cal» o «encalado» preserva mejor la imagen.
  - severity: medium
    issue: «Así ha dicho» no es la fórmula profética española más natural para כֹּה אָמַר
    rationale: Aunque posible, suena menos idiomático en español bíblico actual. «Así dice» conserva la fórmula reconocible y refleja bien el uso formular del hebreo.
  - severity: low
    issue: La nota b está ubicada en «diciendo» en vez de en el sintagma divino relevante
    rationale: La nota explica la forma «el Señor Yahvé», por lo que el marcador debe anclarse ahí para mayor precisión y auditabilidad.
  - severity: low
    issue: «adivinando mentira» suena algo áspero en español
    rationale: No es incorrecto y puede mantenerse por cercanía al hebreo, pero «adivinando mentiras» sería más idiomático. Aun así, el singular abstracto «mentira» es defendible, así que no exige cambio obligatorio.
  revised_spanish_text: 'Y sus profetas han recubierto para ellos con cal[a], viendo falsedad y adivinando mentira para ellos, diciendo: «Así dice el Señor Yahvé[b]», cuando Yahvé no ha hablado.'
  revised_footnotes:
