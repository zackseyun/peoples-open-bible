  chosen_spanish: Bilga
  alternatives_spanish:
  - Bilgah
  lexicon: Nombre propio; transliteración de nombre hebreo
  rationale: Se mantiene el nombre propio en forma breve y natural para el español. La h final del inglés no es necesaria en español; la vocal final abierta reproduce adecuadamente el hebreo.
