translation:
  language: es
  text: 'Entonces midió el portón desde el techo de una cámara de guardia[a] hasta el techo de la otra: veinticinco codos de ancho, entrada frente a entrada[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cámara lateral». El hebreo תָּא se refiere a una cámara dentro de la estructura del portón, a menudo entendida aquí como una cámara de guardia.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «entrada frente a entrada», describiendo accesos enfrentados a través del portón.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָד
  english_pob_choice: Then he measured
  chosen_spanish: Entonces midió
  alternatives_spanish:
  - Y midió
  - Luego midió
  lexicon: HALOT
  rationale: El wayyiqtol avanza la acción narrativa; «entonces» conserva esa secuencia en español sin sobrecargarla.
- source_word: הַשַּׁעַר
  english_pob_choice: the gateway
  chosen_spanish: la puerta de entrada
  alternatives_spanish:
  - la puerta
  - el portal
  - la entrada
  lexicon: HALOT
  rationale: En este contexto arquitectónico de Ezequiel 40 se trata de la estructura de acceso. «Puerta de entrada» comunica la función de paso, aunque «portal» o «entrada» también serían posibles.
- source_word: מִגַּג הַתָּא לְגַגּוֹ
  english_pob_choice: from the roof of one guardroom to the roof of the other
  chosen_spanish: desde el techo de una guardroom[a] hasta el techo de la otra
  alternatives_spanish:
  - desde el techo de una cámara de guardia hasta el techo de la otra
  - desde el techo del cuarto lateral hasta el techo del otro
  lexicon: HALOT
  rationale: תָּא puede referirse a una cámara lateral dentro de la estructura de la puerta; el audit trail inglés opta por «guardroom». En español, el préstamo inglés no es ideal para lectura pública, pero aquí se conserva la referencia a esa unidad arquitectónica mientras la nota explica la alternativa más natural, «cámara de guardia». El contraste «la otra» refleja el paralelismo del hebreo y la revisión inglesa que aclaró la relación opuesta.
- source_word: רֹחַב
  english_pob_choice: wide
  chosen_spanish: de ancho
  alternatives_spanish:
  - en anchura
  - ancho
  lexicon: HALOT
  rationale: El sustantivo expresa la dimensión medida; «de ancho» es la forma natural en español para este tipo de especificación.
- source_word: עֶשְׂרִים וְחָמֵשׁ אַמּוֹת
  english_pob_choice: twenty-five cubits
  chosen_spanish: veinticinco codos
  alternatives_spanish:
  - veinticinco medidas de codo
  - veinticinco codos de longitud
  lexicon: HALOT
  rationale: Se conserva la unidad antigua «codos» de forma formal y transparente, como en el original y en el audit trail inglés.
- source_word: פֶּתַח נֶגֶד פָּתַח
  english_pob_choice: doorway opposite doorway
  chosen_spanish: entrada frente a entrada
  alternatives_spanish:
  - abertura frente a abertura
  - puerta frente a puerta
  - entrada opuesta a entrada
  lexicon: HALOT
  rationale: La repetición del sustantivo con נֶגֶד expresa accesos correspondientes que se enfrentan a ambos lados del pasaje. «Entrada frente a entrada» preserva la simetría arquitectónica sin imponer una imagen más cerrada que «puerta».
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés, manteniendo la idea arquitectónica de una estructura de acceso medida de un techo a otro, con la aclaración de que la revisión inglesa precisó el sentido opuesto entre ambos lados.
  spanish_consistency_notes:
  - Se prefiere «Yahvé» en esta serie cuando aparezca el nombre divino; aquí no ocurre.
  - Se mantiene «codos» para la unidad de medida antigua, sin modernizarla.
  - Se evita «Señor» o «puerta» como traducción automática de otros contextos; aquí «puerta de entrada» responde a la arquitectura del pasaje.
  - La nota sobre תָּא deja visible la tensión lexical entre «guardroom» y «cámara lateral», sin borrar la ambigüedad del término.
