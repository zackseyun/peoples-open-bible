revisions:
- from: Y cuando los que llevaban el arca llegaron hasta el Jordán[a], y los pies de los sacerdotes que llevaban el arca se mojaron en el borde del agua (y el Jordán estaba lleno por todos sus márgenes[b], todos los días de la siega)[c],
  to: Y cuando los que llevaban el arca llegaron hasta el Jordán, y los pies de los sacerdotes que llevaban el arca se hundieron en el borde del agua[a] (ahora bien, el Jordán estaba lleno sobre todas sus orillas[b] todos los días de la siega),
  rationale: Se corrige el anclaje de la nota léxica al sintagma correcto, se fortalece el verbo para reflejar mejor נִטְבְּלוּ sin sobretraducir, se elimina una nota redundante y se mejora la naturalidad de la descripción del Jordán crecido manteniendo el sentido parentético del hebreo.
