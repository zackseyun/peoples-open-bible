translation:
  language: es
  text: y vuelvan a ti con todo su corazón y con toda su alma, en la tierra de sus enemigos que los hicieron cautivos[a], y te oren[b] vueltos hacia su tierra, que tú diste a sus padres, la ciudad que elegiste, y la casa que he edificado[c] para tu nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que los llevaron cautivos»; la expresión hebrea puede referirse a la captura forzada en el exilio.
    reason: lexical_alternative
  - marker: b
    text: O «en dirección a su tierra». El hebreo indica la orientación de la oración hacia la tierra de ellos.
    reason: lexical_alternative
  - marker: c
    text: Es decir, la casa/templo dedicado a tu nombre.
    reason: cultural_note
lexical_decisions:
- source_word: וְשָׁבוּ אֵלֶיךָ
  english_pob_choice: and they return to you
  chosen_spanish: y vuelvan a ti
  alternatives_spanish:
  - y regresen a ti
  - y se vuelvan a ti
  - y se arrepientan ante ti
  lexicon: HALOT
  rationale: שׁוּב expresa la idea de volver/retornar; en este contexto también puede implicar arrepentimiento, pero la forma básica relacional y direccional se conserva mejor en español con «vuelvan a ti» sin explicitar demasiado el matiz penitencial en el texto principal.
- source_word: בְּכָל לְבָבָם וּבְכָל נַפְשָׁם
  english_pob_choice: with all their heart and with all their soul
  chosen_spanish: con todo su corazón y con toda su alma
  alternatives_spanish:
  - con todo su ser
  - con todo su interior y con toda su vida
  lexicon: HALOT
  rationale: Se preserva la imagen hebrea de totalidad y devoción con los binomios «corazón/alma», que son claros en español y mantienen la resonancia bíblica del original.
- source_word: בְּאֶרֶץ אֹיְבֵיהֶם
  english_pob_choice: in the land of their enemies
  chosen_spanish: en la tierra de sus enemigos
  alternatives_spanish:
  - en el país de sus enemigos
  - en el territorio de sus enemigos
  lexicon: HALOT
  rationale: «Tierra» conserva el contraste bíblico entre destierro y tierra propia, y se alinea con el uso posterior de «su tierra» en la misma cláusula.
- source_word: אֲשֶׁר שָׁבוּ אֹתָם
  english_pob_choice: who took them captive
  chosen_spanish: que los hicieron cautivos
  alternatives_spanish:
  - que los capturaron
  - que los llevaron cautivos
  lexicon: HALOT
  rationale: La expresión hebrea comunica captura forzada; «hicieron cautivos» es natural en español y retiene la fuerza de la acción sin añadir una paráfrasis extensa.
- source_word: וְהִתְפַּלְלוּ אֵלֶיךָ
  english_pob_choice: and pray to you
  chosen_spanish: y oren hacia ti
  alternatives_spanish:
  - y oren a ti
  - y se pongan a orar hacia ti
  lexicon: HALOT
  rationale: El hebreo sigue con una orientación espacial de la oración; «oren hacia ti» permite conservar la dirección implícita sin borrar el valor de «a ti».
- source_word: דֶּרֶךְ אַרְצָם
  english_pob_choice: toward their land
  chosen_spanish: hacia su tierra
  alternatives_spanish:
  - en dirección a su tierra
  - mirando hacia su tierra
  lexicon: HALOT
  rationale: «Hacia» es la forma más natural para reflejar la orientación de la oración y mantiene la relación con la cláusula siguiente sobre la tierra dada a sus padres.
- source_word: אֲשֶׁר נָתַתָּה לַאֲבוֹתָם
  english_pob_choice: that you gave to their fathers
  chosen_spanish: que tú diste a sus padres
  alternatives_spanish:
  - que diste a sus antepasados
  - que tú concediste a sus padres
  lexicon: HALOT
  rationale: «Padres» conserva el lenguaje pactal del hebreo; se mantiene la segunda persona explícita «tú» para reproducir el tono directo de la oración.
- source_word: הָעִיר אֲשֶׁר בָּחַרְתָּ
  english_pob_choice: the city that you chose
  chosen_spanish: la ciudad que elegiste
  alternatives_spanish:
  - la ciudad que has elegido
  - la ciudad que escogiste
  lexicon: HALOT
  rationale: El perfecto hebreo se vierte naturalmente con pasado simple en esta oración retrospectiva. «Elegiste» es claro y conserva el lenguaje de elección divina.
- source_word: וְהַבַּיִת אֲשֶׁר בנית לִשְׁמֶךָ
  english_pob_choice: and the house that I have built for your name
  chosen_spanish: y la casa que he edificado para tu nombre
  alternatives_spanish:
  - y la casa que he construido para tu nombre
  - y el templo que he edificado para tu nombre
  lexicon: HALOT
  rationale: «Casa» preserva el hebreo בַּיִת mejor que «templo», y «he edificado» refleja con dignidad la forma verbal en contexto. Se conserva «para tu nombre» como idiomático bíblico.
theological_decisions:
- issue: Matiz penitencial de שׁוּב en contexto de exilio
  english_pob_reading: Rendered as 'return to you' rather than explicit 'repent'
  chosen_spanish_reading: «vuelvan a ti» conserva el retorno relacional sin convertirlo en una glosa moral explícita
  alternative_spanish_readings:
  - «se arrepientan ante ti»
  - «vuelvan arrepentidos a ti»
  - «se conviertan a ti»
  rationale: El hebreo permite tanto retorno físico/covenantal como arrepentimiento interno. La traducción principal evita resolver la tensión, manteniendo la posibilidad de ambas dimensiones en una sola formulación española.
  doctrine_reference: 'Translation philosophy #3'
- issue: Referencia del hablante en 'la casa que he edificado para tu nombre'
  english_pob_reading: 'First person singular is retained: ''I have built'''
  chosen_spanish_reading: 'Se conserva la primera persona singular: «he edificado»'
  alternative_spanish_readings:
  - «la casa que edificaron»
  - «la casa que se ha edificado»
  rationale: El contexto de Salomón orando favorece la primera persona singular. Mantenerla evita suavizar un rasgo textual importante y conserva la voz del hablante en la súplica.
  doctrine_reference: 'Translation philosophy #1, #5'
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó 'I built' a 'I have built' para reflejar mejor el perfecto en contexto; la redacción española ya lo refleja con 'he edificado'. No se requieren otras acomodaciones de revisión.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del texto porque este versículo no contiene el nombre divino explícito, aunque sí una segunda persona dirigida a Dios.
  - Se preservó la distinción entre 'corazón' y 'alma' por fidelidad al paralelismo hebreo.
  - '''Casa'' se eligió sobre ''templo'' en el texto principal para conservar el léxico del hebreo, con aclaración en nota.'
  - El giro direccional de la oración se tradujo con 'hacia' para no perder la imagen espacial del hebreo.
