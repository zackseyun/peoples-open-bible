review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: marcador discursivo inicial, nombre divino como ''Yahvé'', identificación ''Dios de Israel'', sentido territorial de הוֹרִישׁ, plural colectivo ''amorreos'', y la pregunta retórica final con énfasis en ''tú''. Sin embargo, hay dos ajustes necesarios: (1) ''ha desposeído a los amorreos'' suena menos natural en español bíblico actual que ''ha despojado a los amorreos de su tierra'' o ''ha expulsado...''; conviene conservar mejor el matiz de pérdida de posesión sin producir una formulación torpe. (2) El pronombre objeto singular en תִּירָשֶׁנּוּ se refiere al territorio/la tierra, y ''poseerlo'' deja el referente algo opaco; ''vas a tomar posesión de ella'' expresa mejor el sentido territorial y evita ambigüedad.'
  spanish_quality_summary: El texto es legible y digno, pero 'ha desposeído' es poco idiomático en este registro, y 'poseerlo' resulta algo duro y ambiguo para el lector. También 'de delante de' es aceptable, pero 'de delante de su pueblo Israel' suena algo calcado; aun así, puede conservarse por fidelidad. La revisión propuesta mejora naturalidad sin perder precisión.
  glossary_alignment: Se alinea correctamente con la terminología del proyecto al usar 'Yahvé' para יְהוָה. No hay conflicto con otros términos doctrinales. La revisión mantiene el valor territorial de ירש con una formulación más idiomática en español.
  issues:
  - severity: medium
    issue: Verbo 'ha desposeído' poco natural en español
    rationale: Aunque semánticamente cercano a 'has dispossessed', 'desposeer' aplicado así a un pueblo suena forzado en español general eclesial. 'Ha despojado ... de su tierra' conserva la idea de pérdida de posesión de manera más clara y natural.
  - severity: medium
    issue: '''poseerlo'' deja ambiguo el referente del pronombre'
    rationale: El sufijo hebreo apunta al territorio/la tierra, no al pueblo. En español, 'poseerlo' puede sonar abstracto o incluso referirse a otro antecedente. 'Tomar posesión de ella' aclara el referente territorial y coincide con la nota léxica.
  revised_spanish_text: Y ahora Yahvé, Dios de Israel, ha despojado[a] a los amorreos de delante de su pueblo Israel; ¿y tú vas a tomar posesión de ella[b]?
  revised_footnotes:
