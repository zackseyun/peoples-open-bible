translation:
  language: es
  text: De año en año las hijas de Israel solían ir a conmemorar[a] a la hija de Jefté el galaadita cuatro días en el año.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a lamentar» o «a hablar de» la hija de Jefté. El verbo hebreo es raro y debatido.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִיָּמִים יָמִימָה
  english_pob_choice: From year to year
  chosen_spanish: De año en año
  alternatives_spanish:
  - Año tras año
  - De un año al otro
  lexicon: HALOT
  rationale: El hebreo expresa recurrencia anual. «De año en año» comunica con naturalidad esa repetición periódica y conserva bien el valor idiomático del original.
- source_word: תֵּלַכְנָה
  english_pob_choice: would go
  chosen_spanish: solían ir
  alternatives_spanish:
  - iban
  - iban acostumbradamente
  lexicon: HALOT
  rationale: El imperfecto en contexto indica acción habitual pasada. «Solían ir» mantiene la idea de costumbre sin sonar forzado en español.
- source_word: בְּנוֹת יִשְׂרָאֵל
  english_pob_choice: the daughters of Israel
  chosen_spanish: las hijas de Israel
  alternatives_spanish:
  - las mujeres de Israel
  - las jóvenes de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea de manera cercana. «Hijas de Israel» evita introducir precisión sobre edad o estado civil que el texto no explicita.
- source_word: לְתַנּוֹת
  english_pob_choice: to lament
  chosen_spanish: a lamentar
  alternatives_spanish:
  - a conmemorar
  - a recountar
  - a recordar
  lexicon: HALOT
  rationale: La raíz es rara y debatida. En español, «lamentar» preserva la tensión interpretativa principal que el inglés POB mantuvo en su lectura anterior, mientras el sentido conmemorativo queda anotado en la nota.
- source_word: לְבַת יִפְתָּח
  english_pob_choice: the daughter of Jephthah
  chosen_spanish: a la hija de Jefté
  alternatives_spanish:
  - a la hija de Yefté
  lexicon: HALOT
  rationale: «Jefté» es la forma usual y clara en español bíblico. La construcción identifica de forma directa a la destinataria del rito anual.
- source_word: הַגִּלְעָדִי
  english_pob_choice: the Gileadite
  chosen_spanish: el galaadita
  alternatives_spanish:
  - el de Galaad
  lexicon: HALOT
  rationale: Se mantiene el gentilicio en forma adjetival, como en el inglés POB. «Galaadita» es transparente y reconocido en español.
- source_word: אַרְבַּעַת יָמִים בַּשָּׁנָה
  english_pob_choice: four days in the year
  chosen_spanish: cuatro días en el año
  alternatives_spanish:
  - cuatro días al año
  - por cuatro días en el año
  lexicon: HALOT
  rationale: La frase indica duración o marco temporal de la observancia. «Cuatro días en el año» es fiel y natural en español.
theological_decisions:
- issue: Sentido del verbo raro לְתַנּוֹת en el rito anual
  english_pob_reading: Main text rendered as 'to lament,' while preserving commemorative sense as an alternative in the footnote.
  chosen_spanish_reading: «a lamentar» en el texto principal, con nota que preserva las alternativas «a conmemorar» y «a recountar respecto de» la hija de Jefté.
  alternative_spanish_readings:
  - a conmemorar
  - a recordar
  - a recountar respecto de
  rationale: El hebreo es raro y admite más de una lectura. Para no resolver indebidamente la tensión interpretativa ligada al desenlace de Jefté, el texto principal conserva una traducción que funciona bien en español y la nota deja abiertas las alternativas documentadas por el POB inglés.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión reciente que cambió la opción principal de 'lament' a 'commemorate' para el verbo raro. En esta versión española se conserva la tensión textual con una opción principal sobria y una nota que guarda las alternativas, sin borrar el debate lexical ni imponer una resolución interpretativa única.
  spanish_consistency_notes:
  - Se usa «Jefté» de forma consistente para el nombre propio.
  - «Hijas de Israel» mantiene el paralelismo y la cercanía al hebreo.
  - «galaadita» sigue la convención española para el gentilicio de Gilead/Galaad.
  - La nota usa comillas angulares sencillas con la alternativa principal y menciona el carácter raro del verbo para reflejar el archivo auditado.
