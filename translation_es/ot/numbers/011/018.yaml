revisions:
- from: 'Y al pueblo le dirás[a]: “Santifíquense para mañana, y comerán carne, porque lloraron en oídos de Yahvé, diciendo: ‘¿Quién nos dará carne para comer? Porque en Egipto nos iba bien.’ Yahvé les dará carne, y comerán”.'
  to: 'Y al pueblo le dirás[a]: «Conságrense para mañana, y comerán carne, porque lloraron a oídos de Yahvé, diciendo: “¿Quién nos dará carne para comer? Porque en Egipto nos iba bien”. Yahvé les dará carne, y comerán».'
  rationale: Se revisa el texto para mejorar la fidelidad idiomática y la alineación con el audit trail. ‘Conságrense’ sigue mejor la decisión principal del English POB para הִתְקַדְּשׁוּ, mientras que ‘Santifíquense’ se conserva como alternativa en nota. ‘A oídos de Yahvé’ reemplaza el calco poco natural ‘en oídos de Yahvé’ y preserva la imagen hebrea de audición divina en un español más claro y eclesialmente legible.
