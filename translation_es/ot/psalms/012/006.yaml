translation:
  language: es
  text: Por la devastación de los pobres[a], por el gemido de los necesitados, ahora me levantaré, dice Yahvé; lo pondré en la seguridad que él anhela.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo del último miembro es difícil. También puede entenderse más literalmente: «pondré en la seguridad; él suspira por ello», y algunos lo toman como «lo pondré en la seguridad frente al que resopla contra él» o algo similar.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִשֹּׁד
  english_pob_choice: because of the devastation
  chosen_spanish: porque de la devastación
  alternatives_spanish:
  - a causa de la devastación
  - por la devastación
  - debido a la devastación
  lexicon: HALOT
  rationale: La preposición causal del hebreo se conserva con «porque de», que en español refleja bien la idea de motivo sin volver mecánica la frase. «Devastación» transmite la violencia destructiva del término mejor que opciones más débiles como «daño» o más estrechas como «saqueo».
- source_word: עֲנִיִּים
  english_pob_choice: the poor
  chosen_spanish: los pobres
  alternatives_spanish:
  - los afligidos
  - los oprimidos
  lexicon: HALOT
  rationale: «Pobres» es la equivalencia directa y natural en español. El contexto de opresión ya está aportado por el paralelismo y por el sustantivo previo, así que no conviene cargarlo con una interpretación adicional.
- source_word: מֵאַנְקַת
  english_pob_choice: because of the groaning
  chosen_spanish: por el gemido
  alternatives_spanish:
  - a causa del gemido
  - por el lamento
  - a causa del suspiro
  lexicon: HALOT
  rationale: La partícula causal se expresa con «por» para mantener el paralelismo del verso. «Gemido» conserva el tono audible y doliente del sustantivo hebreo mejor que un término más suave como «suspiro».
- source_word: אֶבְיוֹנִים
  english_pob_choice: the needy
  chosen_spanish: los necesitados
  alternatives_spanish:
  - los pobres
  - los desamparados
  - los menesterosos
  lexicon: HALOT
  rationale: «Necesitados» distingue este segundo término del anterior «pobres» y preserva el paralelismo poético. Así se evita aplanar ambos miembros con una sola palabra en español.
- source_word: עַתָּה
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  - ya
  lexicon: HALOT
  rationale: Es un adverbio temporal simple; «ahora» mantiene la inmediatez de la intervención divina.
- source_word: אָקוּם
  english_pob_choice: I will arise
  chosen_spanish: me levantaré
  alternatives_spanish:
  - me alzaré
  - me pondré en pie
  lexicon: HALOT
  rationale: En español, «me levantaré» conserva la imagen antropomórfica de acción decidida y suena natural en un registro bíblico contemporáneo.
- source_word: יֹאמַר יְהוָה
  english_pob_choice: says Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - dice el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como «Yahvé» conforme al criterio del proyecto para יְהוָה. «Dice» reproduce el giro profético directo sin intensificarlo innecesariamente.
- source_word: אָשִׁית
  english_pob_choice: I will set
  chosen_spanish: pondré
  alternatives_spanish:
  - colocaré
  - estableceré
  - pondré a
  lexicon: HALOT
  rationale: «Pondré» es la forma más breve y natural para שׂים en este contexto de colocar a alguien en una condición o esfera.
- source_word: בְּיֵשַׁע
  english_pob_choice: in the safety
  chosen_spanish: en la seguridad
  alternatives_spanish:
  - en la salvación
  - en la liberación
  - en un lugar seguro
  lexicon: HALOT
  rationale: Aquí el sustantivo puede expresar el estado de estar a salvo más que una formulación abstracta de «salvación». «Seguridad» comunica bien ese resultado concreto sin perder el trasfondo de rescate.
- source_word: יָפִיחַ לוֹ
  english_pob_choice: for which he longs
  chosen_spanish: a quien suspira por ella
  alternatives_spanish:
  - por quien suspira
  - que él anhela
  - a quien anhela
  lexicon: HALOT
  rationale: El hebreo final es difícil y admite varias lecturas. Se opta por una formulación que preserve el sentido de anhelo/suspiro documentado en la nota inglesa, manteniendo la referencia a la seguridad como antecedente femenino implícito en español.
theological_decisions:
- issue: Renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente, y el estándar del proyecto es transliterarlo como «Yahvé» para conservar el nombre propio de Dios en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH'
translation_notes:
  revision_awareness: La versión española sigue el paquete fuente hebreo y el criterio auditado de la POB en inglés. Se conserva la dificultad del miembro final mediante una nota alternativa, sin armonizarlo artificialmente con una sola paráfrasis interpretativa. No se registraron revisiones posteriores que alteren la lectura de trabajo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה de forma consistente con el proyecto.
  - Se distingue «los pobres» / «los necesitados» para mantener el paralelismo hebreo.
  - «Seguridad» se emplea aquí como estado de resguardo, no como mera abstracción.
  - La nota al pie conserva la ambigüedad del cierre hebreo sin resolverla de modo definitivo.
