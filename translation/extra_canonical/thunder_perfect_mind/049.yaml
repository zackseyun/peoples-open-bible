- source_word: ϩⲏⲧⲥ
  chosen: in her/within her
  alternatives:
  - within it
  - inside her
  lexicon: Crum, Coptic Dictionary
  rationale: Feminine pronominal object; in context the referent is Egypt (feminine
    in Coptic). Rendered in English as “in Egypt” with an alignment note.
- source_word: ⲣⲁⲧϣⲓ
  chosen: barbarians
  alternatives:
  - foreigners
  - those of another tongue
  lexicon: Crum, Coptic Dictionary
  rationale: Literally “of language/speech,” idiomatically ‘people of another tongue’;
    “barbarians” preserves the strangeness and inter-ethnic contrast of the source,
    with “foreigners” as a milder alternative.
