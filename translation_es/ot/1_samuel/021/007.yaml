base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/021/007.yaml
  text: So the priest gave him holy bread[a], for there was no bread there except the bread of the Presence, which had been removed from before Yahweh, to put hot bread there on the day it was taken away.
