review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del hebreo: juicio de exilio más allá de Damasco, fórmula profética con «dice», y uso de «Yahvé». Sin embargo, hay dos desajustes importantes: (1) «los haré ir al exilio» es menos natural y menos directo que el valor causativo de וְהִגְלֵיתִי; «los exiliaré» o «los llevaré al exilio» preserva mejor el sentido en español. (2) «el Dios de los ejércitos» no sigue bien la decisión léxica auditada para צבאות, que privilegia «hosts» por su amplitud; en español, «las huestes» preserva mejor esa amplitud que «ejércitos».'
  spanish_quality_summary: El texto es legible, pero «los haré ir al exilio» suena forzado en español bíblico natural. La cláusula final «cuyo nombre es el Dios de las huestes» sigue siendo algo rígida, pero es fiel a la redacción auditada y entendible. La puntuación con raya es adecuada. Conviene afinar la frase principal y alinear mejor el título divino.
  glossary_alignment: 'Alinea bien «Yahvé» para יְהוָה. No alinea óptimamente אֱלֹהֵי צְבָאוֹת: el proyecto inglés documenta «God of hosts» para no estrechar el título a ejércitos; en español «Dios de las huestes» es la mejor correspondencia. La nota léxica sobre וְהִגְלֵיתִי es útil, pero debe invertirse si el texto principal adopta «los exiliaré».'
  issues:
  - severity: medium
    issue: «los haré ir al exilio» es una formulación poco idiomática
    rationale: Aunque intenta reflejar el causativo de הִגְלֵיתִי, en español suena torpe. «Los exiliaré» expresa naturalmente ‘causar que vayan al exilio’ y coincide con la alternativa preservada por el POB inglés.
  - severity: medium
    issue: «el Dios de los ejércitos» estrecha innecesariamente צבאות
    rationale: La documentación auditada insiste en la amplitud de «hosts». «Ejércitos» puede sugerir una especificación militar más estrecha; «huestes» preserva mejor el título tradicional y su amplitud semántica.
  - severity: low
    issue: La nota al pie queda desajustada si se cambia el texto principal
    rationale: Si el cuerpo del texto adopta «los exiliaré», la alternativa debe pasar a «los llevaré al exilio» u otra formulación relevante, no repetir la opción principal.
  revised_spanish_text: Por tanto, los exiliaré[a] más allá de Damasco —dice Yahvé, cuyo nombre es el Dios de las huestes.
