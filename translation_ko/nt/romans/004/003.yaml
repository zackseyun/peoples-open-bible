id: ROM.4.3
reference: Romans 4:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τί γὰρ ἡ γραφὴ λέγει; Ἐπίστευσεν δὲ Ἀβραὰμ τῷ θεῷ καὶ ἐλογίσθη αὐτῷ εἰς δικαιοσύνην.
base_translation:
  language: en
  yaml_path: translation/nt/romans/004/003.yaml
  text: For what does the Scripture say? Abraham believed God[b][a], and it was counted to him as righteousness.
  footnotes:
  - marker: a
    text: Or 'was reckoned to him as righteousness' or 'was credited to him as righteousness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'as justice.'
    reason: lexical_alternative
translation:
  language: ko
  text: 성경이 무엇이라고 말합니까? 「아브라함이 하나님을 믿었고, 그것이 그에게 의로 여겨졌다.」
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπίστευσεν τῷ θεῷ
  english_pob_choice: believed God
  chosen_korean: 하나님을 믿었고
  alternatives_korean:
  - 하나님을 신뢰했고
  lexicon: BDAG
  rationale: 여격을 「~을」로 옮겨 한국어 자연스러움을 유지한다.
- source_word: ἐλογίσθη ... εἰς δικαιοσύνην
  english_pob_choice: was counted ... as righteousness
  chosen_korean: 의로 여겨졌다
  alternatives_korean:
  - 의로 간주되었다
  - 의로 인정되었다
  lexicon: BDAG
  rationale: 바울의 핵심 동사 λογίζομαι를 「여기다」로 일관되게 옮긴다. 창 15:6 인용의 무게를 보존한다.
theological_decisions:
- issue: 4:3 ἐλογίσθη — 4장 전체의 중심 술어
  chosen_reading: 의로 여겨졌다
  alternative_readings:
  - 의로 간주되었다
  - 의로 인정되었다
  - 의로 산정되었다
  rationale: 4장은 λογίζομαι를 11회 반복하며 칭의의 「계산·전가」 함의를 부각한다. 본 번역은 4장 전체에서 「여기다」를 기본으로 하고, 강조 문맥에서는 「간주하다」를 보조적으로 사용해 어휘적 일관성과 신학적 무게를 둘 다 살린다.
  doctrine_reference: DOCTRINE.md §1 — central node consistency
