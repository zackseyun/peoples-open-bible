translation:
  language: es
  text: En aquel tiempo, Salomón celebró la fiesta durante siete días[a], y con él todo Israel, una asamblea muy grande, desde Lebo-hamat hasta el arroyo de Egipto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘desde la entrada de Hamat’. El hebreo puede entenderse ya sea como un nombre de lugar ('Lebo-hamat') o como una expresión descriptiva de límite.
    reason: alternative_reading
  - marker: b
    text: O ‘hasta el Wadi de Egipto’. La palabra hebrea puede designar un cauce estacional, no necesariamente un río principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: kept
  chosen_spanish: celebró
  alternatives_spanish:
  - hizo
  - observó
  - guardó
  lexicon: HALOT
  rationale: Con חָג, el verbo hebreo funciona idiomáticamente como celebrar/observar una fiesta. En español, 'celebró' comunica la acción ritual sin perder el sentido de observancia.
- source_word: הֶחָג
  english_pob_choice: the feast
  chosen_spanish: la fiesta
  alternatives_spanish:
  - la fiesta solemne
  - el festival
  lexicon: HALOT
  rationale: חָג designa una fiesta o celebración de carácter religioso. 'Fiesta' es natural en español bíblico moderno y evita un tecnicismo innecesario.
- source_word: בָּעֵת הַהִיא
  english_pob_choice: At that time
  chosen_spanish: En aquel tiempo
  alternatives_spanish:
  - En ese tiempo
  - Entonces
  lexicon: HALOT
  rationale: Es una fórmula temporal directa y natural en español, con un matiz solemne acorde al relato.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: for seven days
  chosen_spanish: durante siete días
  alternatives_spanish:
  - por siete días
  - siete días
  lexicon: HALOT
  rationale: El español requiere una preposición para expresar duración. 'Durante siete días' preserva la duración observada en la frase hebrea.
- source_word: וְכָל יִשְׂרָאֵל עִמּוֹ
  english_pob_choice: and all Israel with him
  chosen_spanish: y con él todo Israel
  alternatives_spanish:
  - y todo Israel estaba con él
  - y todo Israel junto con él
  lexicon: HALOT
  rationale: Se mantiene la noción colectiva y de acompañamiento. El orden 'con él todo Israel' suena natural en español y conserva el énfasis del hebreo.
- source_word: קָהָל גָּדוֹל מְאֹד
  english_pob_choice: a very great assembly
  chosen_spanish: una asamblea muy grande
  alternatives_spanish:
  - una congregación muy grande
  - una gran asamblea
  lexicon: HALOT
  rationale: '''Asamblea'' corresponde bien a קָהָל. Se evita ''congregación'' por su color más eclesiástico, y ''muy grande'' preserva מְאֹד sin intensificar más allá del original.'
- source_word: מִלְּבוֹא חֲמָת
  english_pob_choice: from Lebo-hamath
  chosen_spanish: desde Lebo-hamat
  alternatives_spanish:
  - desde la entrada de Hamat
  - desde Lebo-Hamat
  lexicon: HALOT
  rationale: Se conserva el valor toponímico que el POB inglés prefirió. La forma 'Lebo-hamat' refleja el nombre tradicional sin añadir interpretación descriptiva al texto principal.
- source_word: עַד נַחַל מִצְרַיִם
  english_pob_choice: to the Brook of Egypt
  chosen_spanish: hasta el Arroyo de Egipto
  alternatives_spanish:
  - hasta el Wadi de Egipto
  - hasta el torrente de Egipto
  lexicon: HALOT
  rationale: נַחַל puede referirse a arroyo, torrente o wadi. 'Arroyo de Egipto' mantiene la imagen geográfica y es comprensible en español, conservando la ambigüedad natural del término.
theological_decisions:
- issue: Geographical boundary expression in “from Lebo-hamath to the Brook of Egypt”
  english_pob_reading: A territorial formula spanning the full extent of the gathered nation; 'Lebo-hamath' and 'Brook of Egypt' are retained with footnoted alternatives.
  chosen_spanish_reading: Se conserva la fórmula geográfica amplia, con toponimia en el texto y nota para la alternativa descriptiva del primer límite.
  alternative_spanish_readings:
  - desde la entrada de Hamat hasta el Arroyo de Egipto
  - desde Lebo-hamat hasta el Wadi de Egipto
  rationale: No se debe reducir la expresión a una paráfrasis explicativa, porque el hebreo funciona como marcador de extensión nacional y territorial. La traducción mantiene la amplitud geográfica sin decidir indebidamente entre toponimia y descripción.
  doctrine_reference: Histórico-geográfica; no doctrinal
- issue: Rendering of the assembled people as קָהָל
  english_pob_reading: a very great assembly
  chosen_spanish_reading: una asamblea muy grande
  alternative_spanish_readings:
  - una congregación muy grande
  - un gran concilio
  rationale: '''Asamblea'' preserva el sentido de reunión colectiva sin cargarlo con connotaciones eclesiales posteriores. No hay razón para suavizar el tamaño ni la naturaleza pública del grupo.'
  doctrine_reference: Eclesiología descriptiva; no doctrinal
translation_notes:
  revision_awareness: Se siguió el texto fuente hebreo (WLC) y se alineó la redacción española con el audit trail inglés de la POB. No se registraron revisiones aplicadas en el paquete inglés; el borrador mantiene esa lectura estable y conserva las alternativas footnotadas documentadas.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto fuente lo requiera; en este versículo no aparece el nombre divino.
  - Se prefirió 'asamblea' para קָהָל por ser el equivalente más neutro y fiel al contexto narrativo.
  - Se mantuvo la toponimia 'Lebo-hamat' en el cuerpo principal para respetar la decisión inglesa y la ambigüedad fuente entre nombre propio y descripción.
  - '''Arroyo de Egipto'' evita escoger demasiado pronto entre ''brook'', ''wadi'' o ''torrente'', preservando la flexibilidad semántica del hebreo.'
