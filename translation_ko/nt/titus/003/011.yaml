id: TIT.3.11
reference: Titus 3:11
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἰδὼς ὅτι ἐξέστραπται ὁ τοιοῦτος καὶ ἁμαρτάνει, ὢν αὐτοκατάκριτος.
base_translation:
  language: en
  yaml_path: translation/nt/titus/003/011.yaml
  text: knowing that such a person is warped and is sinning[c][b][a], being self-condemned.
  footnotes:
  - marker: a
    text: Or 'has turned aside' or 'is perverted' for 'is warped.' The Greek perfect verb indicates a state resulting from prior deviation.
    reason: lexical_alternative
  - marker: b
    text: "Or 'such a person.' The Greek expression is masculine singular: 'such a man.'"
    reason: lexical_alternative
  - marker: c
    text: Or 'condemned by himself.' The adjective means condemned by his own actions or testimony against himself.
    reason: lexical_alternative
translation:
  language: ko
  text: 그런 사람[b]은 비뚤어져 있고[a] 죄를 짓고 있으며, 스스로 정죄받은 자[c]임을 그대는 알고 있기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「길에서 벗어난」, 「변질된」. 헬라어 완료동사는 이전의 일탈에서 비롯된 현재의 상태를 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「그러한 자」. 헬라어 표현은 남성 단수 「그런 사람(남자)」.
    reason: lexical_alternative
  - marker: c
    text: 또는 「자기 자신에 의해 정죄받은 자」. 그 형용사는 자신의 행위·증언으로 인해 정죄받았음을 의미한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰδὼς
  english_pob_choice: knowing
  chosen_korean: 그대는 알고 있기 때문입니다
  alternatives_korean:
  - 알기 때문입니다
  - 알고 있으면서
  lexicon: BDAG
  rationale: 완료 능동 분사. 10절의 명령(「멀리하라」)에 대한 근거 절. 한국어로는 「~이기 때문입니다」 형태가 자연스럽다.
- source_word: ἐξέστραπται
  english_pob_choice: is warped
  chosen_korean: 비뚤어져 있고
  alternatives_korean:
  - 변질되어 있고
  - 길에서 벗어나 있고
  lexicon: BDAG
  rationale: ἐκστρέφομαι 완료 수동(이미 뒤틀린 상태). 「비뚤어져 있다」가 한국어로 자연스러우며 인격의 굴절 상태를 잘 드러낸다.
- source_word: ἁμαρτάνει
  english_pob_choice: is sinning
  chosen_korean: 죄를 짓고 있으며
  alternatives_korean:
  - 죄를 범하고 있으며
  lexicon: BDAG
  rationale: 현재 시제로 지속적 죄의 상태. 「죄를 짓고 있다」.
- source_word: αὐτοκατάκριτος
  english_pob_choice: self-condemned
  chosen_korean: 스스로 정죄받은 자
  alternatives_korean:
  - 자기 자신에 의해 정죄된 자
  - 스스로 단죄된 자
  lexicon: BDAG
  rationale: αὐτο- + κατακρίνω의 합성. 자신의 행위로 인해 정죄받은 상태. 「스스로 정죄받은 자」가 자연스럽다.
