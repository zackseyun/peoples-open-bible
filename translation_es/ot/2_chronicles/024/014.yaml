base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/024/014.yaml
  text: When they had finished[a], they brought the rest of the silver before the king and Jehoiada, and with it he made articles for the house of Yahweh, articles for service and for offering, and bowls, and articles of gold and silver[c][b]. And they offered burnt offerings in the house of Yahweh continually all the days of Jehoiada.
  footnotes:
  - marker: a
    text: Or 'he made it into vessels'; the Hebrew verb is singular with a singular object suffix referring to the remaining silver.
    reason: lexical_alternative
  - marker: b
    text: Or 'articles for service.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew says 'for offering up'; the object is not stated here, though 'burnt offerings' is named explicitly later in the verse.
    reason: lexical_alternative
