base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/002/019.yaml
  text: But when Sanballat the Horonite[a], Tobiah the Ammonite slave, and Geshem the Arab heard, they mocked us and despised us, and said, “What is this thing that you are doing? Are you rebelling against the king?”
  footnotes:
