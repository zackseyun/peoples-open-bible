translation:
  language: es
  text: Y cambió su ropa de prisión, y comió pan continuamente delante de él[a] todos los días de su vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en su presencia'; la frase también puede implicar que comía a la mesa del rey.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁנָּא
  english_pob_choice: and he changed
  chosen_spanish: y cambió
  alternatives_spanish:
  - y alteró
  - y reemplazó
  lexicon: HALOT
  rationale: שׁנה en piel expresa 'cambiar/alterar'. En español, 'cambió' comunica con naturalidad la acción de salir de la condición anterior, sin añadir matices no requeridos por el contexto.
- source_word: בִּגְדֵי כִלְאוֹ
  english_pob_choice: his prison clothes
  chosen_spanish: sus vestidos de prisión
  alternatives_spanish:
  - sus prendas de prisión
  - sus vestidos de su confinamiento
  - sus vestidos carcelarios
  lexicon: HALOT
  rationale: בִּגְדֵי es 'vestidos/ropas' y כלאו señala confinamiento o prisión. 'Vestidos de prisión' conserva el genitivo del hebreo y suena público y digno en español; 'prisión' evita una paráfrasis demasiado interpretativa.
- source_word: וְאָכַל לֶחֶם
  english_pob_choice: and he ate bread
  chosen_spanish: y comió pan
  alternatives_spanish:
  - y comió alimento
  - y comió comida
  - y cenó
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'comió pan', fórmula que puede referirse a tomar alimento. Se conserva la literalidad porque el español la entiende bien y mantiene el eco semítico del texto.
- source_word: תָּמִיד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - regularmente
  - siempre
  lexicon: HALOT
  rationale: תמיד expresa continuidad o regularidad sostenida. 'Continuamente' corresponde bien al contexto de provisión constante y al estilo formal del pasaje.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - a su mesa
  lexicon: HALOT
  rationale: 'La expresión es literalmente espacial: ''delante de él''. En español, ''delante de él'' preserva el alcance amplio del hebreo sin decidir de antemano si se trata de presencia real o de mesa real.'
- source_word: כָּל יְמֵי חַיָּיו
  english_pob_choice: all the days of his life
  chosen_spanish: todos los días de su vida
  alternatives_spanish:
  - durante toda su vida
  - por el resto de su vida
  lexicon: HALOT
  rationale: Es una expresión hebrea fija de duración de por vida. 'Todos los días de su vida' es la equivalencia formal más directa y natural en español.
translation_notes:
  revision_awareness: La revisión inglesa reciente no alteró el contenido; el texto permanece en acuerdo alto con la fuente hebrea y con la traducción inglesa auditada, sin cambios sustantivos que requieran ajuste en español.
  spanish_consistency_notes:
  - Se mantiene 'prisión' para כלא y no 'cárcel' porque el contexto histórico de exilio/custodia real admite el matiz de confinamiento más general.
  - Se conserva la literalidad de 'pan' y 'delante de él' para no perder el carácter idiomático ni el posible trasfondo de mesa real.
  - El estilo busca ser moderno y bíblico, sin depender de fórmulas tradicionales que oculten el sentido directo del hebreo.
