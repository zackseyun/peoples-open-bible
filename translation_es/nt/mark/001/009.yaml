translation:
  language: es
  text: Y sucedió en aquellos días que Jesús vino de Nazaret de Galilea y fue bautizado en el Jordán por Juan[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “hacia el Jordán”. La preposición griega puede traducirse más literalmente así.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ ἐγένετο
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y pasó
  lexicon: BDAG
  rationale: Expresa en español la fórmula narrativa introductoria con naturalidad y un registro digno. 'Sucedió' conserva el valor de introducir un nuevo episodio sin endurecerlo en un giro arcaizante.
- source_word: ἐν ἐκείναις ταῖς ἡμέραις
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - durante aquellos días
  lexicon: BDAG
  rationale: La expresión temporal fija se vierte de manera directa y idiomática. 'Aquellos días' mantiene el tono narrativo del griego.
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  lexicon: BDAG
  rationale: '''Vino'' reproduce bien el movimiento de llegada sin añadir la idea de punto terminal que ''llegó'' puede sugerir más fuertemente.'
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio estándar en español bíblico y de iglesia.
- source_word: ἀπὸ Ναζαρὲτ τῆς Γαλιλαίας
  english_pob_choice: from Nazareth of Galilee
  chosen_spanish: de Nazaret de Galilea
  alternatives_spanish:
  - desde Nazaret de Galilea
  - de Nazaret en Galilea
  lexicon: BDAG
  rationale: La construcción española con 'de' sigue de cerca el genitivo de procedencia y la identificación geográfica. 'De Galilea' evita añadir una preposición o matiz no exigidos por el texto.
- source_word: ἐβαπτίσθη
  english_pob_choice: was baptized
  chosen_spanish: fue bautizado
  alternatives_spanish:
  - fue sumergido
  lexicon: BDAG
  rationale: En español, 'bautizado' es la forma natural y fiel para el rito mencionado. 'Sumergido' sería más estrecho y doctrinalmente marcado de lo que el verso afirma explícitamente.
- source_word: εἰς τὸν Ἰορδάνην
  english_pob_choice: in the Jordan
  chosen_spanish: en el Jordán
  alternatives_spanish:
  - dentro del Jordán
  - hacia el Jordán
  lexicon: BDAG
  rationale: Aunque εἰς puede significar 'hacia/into', el contexto de bautismo permite un español idiomático con 'en'. 'El Jordán' conserva el nombre del río sin expansión interpretativa a 'río Jordán'.
- source_word: ὑπὸ Ἰωάννου
  english_pob_choice: by John
  chosen_spanish: por Juan
  lexicon: BDAG
  rationale: La preposición pasiva de agencia se traduce de forma directa y natural con 'por'.
theological_decisions:
- issue: Modo del bautismo y alcance denominacional
  english_pob_reading: was baptized
  chosen_spanish_reading: fue bautizado
  alternative_spanish_readings:
  - fue sumergido
  rationale: El verso relata el hecho sin precisar un modo que obligue a una traducción más estrecha. 'Fue bautizado' preserva la amplitud confesional y sigue el valor verbal del texto griego sin introducir una interpretación ritual específica.
  doctrine_reference: Affirmations; Translation philosophy §1, §6
- issue: Valor de εἰς con el Jordán
  english_pob_reading: in the Jordan
  chosen_spanish_reading: en el Jordán
  alternative_spanish_readings:
  - al Jordán
  - dentro del Jordán
  rationale: El texto griego admite una lectura más literal ('hacia/en el Jordán'), pero la equivalencia óptima en español favorece una formulación natural. La nota permite conservar la alternativa literal sin perder claridad en el cuerpo del texto.
  doctrine_reference: Lexical precision; readable-modern-Spanish policy
translation_notes:
  revision_awareness: Se siguió el auditorio inglés sin copiar mecánicamente su sintaxis. No hubo revisiones del texto fuente en el paquete auditado; por ello, la redacción española conserva la lectura base y solo explicita en nota la alternativa literal de εἰς.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el hebreo lo exige; este versículo no lo contiene.
  - Se mantiene 'Jesús' como nombre propio y 'bautizado' para βαπτίζω, coherente con el contexto narrativo y la política de legibilidad.
  - '''El Jordán'' se conserva como nombre del río sin añadir ''río'' para no expandir el texto.'
  - La construcción inicial 'Y sucedió' conserva el arranque narrativo semítico sin sonar arcaizante.
