translation:
  language: es
  text: 'David no dejó con vida ni a hombre ni a mujer, para que nadie fuera llevado a Gat, diciendo: «No sea que informen sobre nosotros, diciendo: “Esto hizo David, y así fue su costumbre[a] todos los días que habitó en el territorio de los filisteos[b]”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «su juicio» o «su manera establecida». Aquí se entiende como su costumbre o práctica habitual.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en el campo de los filisteos», un modismo para el territorio o la región filistea.'
    reason: cultural_note
lexical_decisions:
- source_word: וְאִישׁ וְאִשָּׁה
  english_pob_choice: neither man nor woman
  chosen_spanish: ni a hombre ni a mujer
  alternatives_spanish:
  - ni hombre ni mujer
  - a ningún hombre ni a ninguna mujer
  lexicon: HALOT
  rationale: El par hebreo funciona de manera distributiva y total, abarcando a cualquier sobreviviente humano. En español, 'ni a hombre ni a mujer' conserva la amplitud del original sin pluralizar indebidamente.
- source_word: לֹא יְחַיֶּה
  english_pob_choice: left alive
  chosen_spanish: no dejó con vida
  alternatives_spanish:
  - no permitió vivir
  - no mantuvo con vida
  lexicon: HALOT
  rationale: El piel de חיה expresa preservar la vida o perdonar. 'No dejó con vida' es natural en español y comunica con claridad que no perdonó a nadie.
- source_word: לְהָבִיא גַת
  english_pob_choice: to bring to Gath
  chosen_spanish: para llevarlos a Gat
  alternatives_spanish:
  - para traerlos a Gat
  - para que fueran llevados a Gat
  lexicon: HALOT
  rationale: El infinitivo expresa propósito. Aunque el hebreo omite el objeto explícito, en español conviene suplirlo con 'los' para evitar ambigüedad y mantener la referencia a las víctimas potenciales. Se conserva el topónimo 'Gat'.
- source_word: פֶּן
  english_pob_choice: Otherwise
  chosen_spanish: No sea que
  alternatives_spanish:
  - para que no
  - lest
  lexicon: HALOT
  rationale: פֶּן introduce prevención de un resultado indeseado. 'No sea que' preserva ese valor preventivo en un registro claro y bíblico sin sonar arcaizante.
- source_word: יַגִּדוּ עָלֵינוּ
  english_pob_choice: they might report about us
  chosen_spanish: informen acerca de nosotros
  alternatives_spanish:
  - den aviso acerca de nosotros
  - hablen de nosotros
  lexicon: HALOT
  rationale: El verbo נגד en hifil significa informar o declarar. Con עַל, la idea es comunicar acerca de David y sus hombres. 'Informen acerca de nosotros' mantiene la neutralidad del hebreo.
- source_word: כֹּה עָשָׂה דָוִד
  english_pob_choice: This is what David did
  chosen_spanish: Esto hizo David
  alternatives_spanish:
  - Así hizo David
  - David hizo esto
  lexicon: HALOT
  rationale: כֹּה introduce contenido citado. 'Esto hizo David' conserva la deixis demostrativa y suena natural en español.
- source_word: וְכֹה מִשְׁפָּטוֹ
  english_pob_choice: this was his practice
  chosen_spanish: y así fue su costumbre
  alternatives_spanish:
  - y así fue su práctica
  - y así fue su manera de proceder
  - y tal fue su costumbre
  lexicon: HALOT
  rationale: מִשְׁפָּט puede significar 'costumbre', 'norma' o 'proceder' según el contexto. Aquí designa el modo habitual de actuar de David; 'costumbre' reproduce bien la idea de una pauta estable sin cargarla de sentido jurídico.
- source_word: כָּל הַיָּמִים אֲשֶׁר יָשַׁב
  english_pob_choice: all the days that he lived
  chosen_spanish: todos los días que habitó
  alternatives_spanish:
  - todo el tiempo que vivió
  - todos los días que vivió
  - durante todo el tiempo que habitó
  lexicon: HALOT
  rationale: La cláusula expresa duración de residencia. 'Habitó' conserva la idea de permanecer o residir, que en este contexto es más precisa que un simple 'vivió'.
- source_word: בִּשְׂדֵה פְלִשְׁתִּים
  english_pob_choice: in the country of the Philistines
  chosen_spanish: en el territorio de los filisteos
  alternatives_spanish:
  - en la tierra de los filisteos
  - en el campo de los filisteos
  lexicon: HALOT
  rationale: שָׂדֶה literalmente es 'campo', pero en este giro idiomático se refiere al ámbito territorial. 'Territorio de los filisteos' comunica el sentido geográfico sin literalismo innecesario.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la última revisión inglesa: mantiene una sola oración fluida sin coma tras el equivalente de ''mujer'', y refleja el tiempo narrativo pasado con ''fue'' y ''habitó'' para concordar con el contexto del relato. También conserva la tensión léxica de מִשְׁפָּטוֹ, traducido aquí como ''costumbre'', con nota alternativa donde podría entenderse como ''juicio'' o ''norma''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa 'filisteos' en minúscula por ser etnónimo común en español.
  - Se conserva 'Gat' como topónimo tradicional y reconocible.
  - La frase 'no dejó con vida' refleja el valor de sparing/llevar con vida sin introducir interpretación adicional.
