base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/002/003.yaml
  text: Behold[a], I am building a house for the name of Yahweh my God, to consecrate it to him, to burn fragrant incense before him, and to set out the regular arrangement, and burnt offerings morning and evening, on the Sabbaths, at the new moons[b], and at the appointed feasts of Yahweh our God[c]. This is forever for Israel.
  footnotes:
  - marker: a
    text: Or, more traditionally, 'the continual showbread' or 'the bread set out continually.'
    reason: lexical_alternative
  - marker: b
    text: '''House'' refers to the temple; the Hebrew literally says ''a house for the name of the LORD.'''
    reason: lexical_alternative
  - marker: c
    text: The phrase 'This is forever for Israel' means that these offerings are a perpetual obligation for Israel.
    reason: lexical_alternative
