translation:
  language: es
  text: Ahora bien, respecto de estos asuntos[a], se inició un proceso judicial contra Menelao.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «surgió una causa legal contra Menelao». El griego es conciso y también puede expresarse más formalmente como el inicio de un proceso judicial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Περὶ δὲ τούτων
  english_pob_choice: Now concerning these matters
  chosen_spanish: Ahora, en relación con estos asuntos
  alternatives_spanish:
  - Ahora acerca de estas cosas
  - Ahora sobre estos asuntos
  lexicon: LSJ
  rationale: Περὶ con genitivo introduce el tema en discusión, y δέ marca transición. «En relación con» conserva ese valor introductorio sin sonar forzado en español, y «asuntos» refleja el registro legal del contexto mejor que «cosas».
- source_word: ἐνέστη
  english_pob_choice: was brought
  chosen_spanish: se entabló
  alternatives_spanish:
  - se inició
  - se levantó
  lexicon: LSJ
  rationale: En combinación con κρίσις, el verbo apunta al inicio de un procedimiento legal. «Se entabló» comunica de forma natural la apertura de una acción o juicio, manteniendo la fuerza procesal del griego.
- source_word: κρίσις
  english_pob_choice: a judicial hearing
  chosen_spanish: un juicio
  alternatives_spanish:
  - una audiencia judicial
  - un proceso judicial
  - una causa
  lexicon: LSJ
  rationale: Aquí κρίσις designa un procedimiento legal más que un mero «juicio» abstracto de valor. «Juicio» es la opción más clara y breve en español, sin cerrar innecesariamente la precisión procesal.
- source_word: ἐπὶ τὸν Μενέλαον
  english_pob_choice: against Menelaus
  chosen_spanish: contra Menelao
  alternatives_spanish:
  - sobre Menelao
  - en contra de Menelao
  lexicon: LSJ
  rationale: Con lenguaje jurídico, ἐπί con acusativo puede indicar acción dirigida contra una persona. «Contra Menelao» reproduce esa orientación adversativa de modo idiomático y transparente.
translation_notes:
  revision_awareness: El texto griego es breve y coincide de cerca con la lectura auditada en inglés. La principal decisión fue cómo verter κρίσις y ἐνέστη en un español legal natural sin perder la concisión del original. No se detectan tensiones textuales o doctrinales adicionales.
  spanish_consistency_notes:
  - Se mantuvo el nombre «Menelao» como forma española estándar del nombre propio.
  - Se prefirió un registro jurídico sobrio y comprensible, acorde con el contexto del versículo.
  - No se introdujeron términos eclesiásticos que no estén justificados por el griego.
