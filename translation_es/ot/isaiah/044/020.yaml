  source_alignment_summary: 'El borrador español sigue bien el hebreo y la auditoría inglesa: preserva la imagen de רֹעֶה אֵפֶר, el sujeto singular, el corazón engañado que lo desvía, la incapacidad de rescatar su נפשׁ, y la pregunta retórica final sobre la falsedad en la mano derecha. Sin embargo, hay dos ajustes menores necesarios: en español bíblico-natural conviene usar el plural «cenizas» para אֵפֶר en este giro, y la nota [b] no debe mezclar hebreo en grafía original dentro de una nota española cuando puede expresarse claramente como «נפשׁ» o mejor simplemente explicarse en español.'
