  text: וַ/יְדַבֵּ֨ר אַהֲרֹ֜ן אֶל מֹשֶׁ֗ה הֵ֣ן הַ֠/יּוֹם הִקְרִ֨יבוּ אֶת חַטָּאתָ֤/ם וְ/אֶת עֹֽלָתָ/ם֙ לִ/פְנֵ֣י יְהוָ֔ה וַ/תִּקְרֶ֥אנָה אֹתִ֖/י כָּ/אֵ֑לֶּה וְ/אָכַ֤לְתִּי חַטָּאת֙ הַ/יּ֔וֹם הַ/יִּיטַ֖ב בְּ/עֵינֵ֥י יְהוָֽה־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/010/019.yaml
  text: And Aaron said to Moses[a], “Behold, today they presented their sin offering and their burnt offering before Yahweh, and such things as these have happened to me. If I had eaten the sin offering today[c][b], would it have been good in the sight of Yahweh?”
  footnotes:
  - marker: a
    text: Or 'their purification offering' (for both occurrences of 'sin offering'). The Hebrew חַטָּאת can denote either 'sin' or the sacrifice associated with purification from sin/impurity; in Leviticus, 'sin offering' is the conventional rendering.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and such things as these happened to me.' Aaron refers to the calamities of that day, especially the death of his sons.
    reason: cultural_note
  - marker: c
    text: Or 'would it have pleased the LORD?'
    reason: lexical_alternative
