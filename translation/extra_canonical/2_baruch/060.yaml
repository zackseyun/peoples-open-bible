    ܬܘܒ ܡ̈ܝܐ ܚܫ̈ܟܐ ܘܐܬܚܠܛܘ

    ܒܗܘܢ. ܗܢܘ ܫܘܪܝܐ

    ܕܡܐܬܝܬܗ ܕܡܫܝܚܐ. ܘܒܬܪ

