id: AMO.8.5
reference: Amos 8:5
source:
  edition: WLC
  text: לֵ/אמֹ֗ר מָתַ֞י יַעֲבֹ֤ר הַ/חֹ֨דֶשׁ֙ וְ/נַשְׁבִּ֣ירָה שֶּׁ֔בֶר וְ/הַ/שַּׁבָּ֖ת וְ/נִפְתְּחָה בָּ֑ר לְ/הַקְטִ֤ין אֵיפָה֙ וּ/לְ/הַגְדִּ֣יל שֶׁ֔קֶל וּ/לְ/עַוֵּ֖ת מֹאזְנֵ֥י מִרְמָֽה־׃
translation:
  text: saying[a], “When will the new moon be over, so that we may sell grain, and the Sabbath, so that we may offer wheat for sale—making the ephah small and the shekel large[b], and distorting deceitful scales?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the month' for 'the new moon'; here the context favors the festival observance rather than the calendar month.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'making the ephah small and the shekel large'—that is, giving less product and demanding more payment.
    reason: cultural_note
lexical_decisions:
- source_word: הַחֹדֶשׁ
  chosen: the new moon
  alternatives:
  - the month
  lexicon: HALOT
  rationale: In this commercial/religious context, חֹדֶשׁ refers to the new moon festival rather than the abstract month. The complaint is about waiting for a sacred observance to end so trade can resume.
- source_word: וְנַשְׁבִּירָה שֶּׁבֶר
  chosen: so that we may sell grain
  alternatives:
  - that we may market grain
  - that we may sell food
  lexicon: HALOT
  rationale: The Hiphil of שׁבר can mean to sell grain/provisions, and שׁבר here denotes grain/provisions as merchandise. 'Sell grain' is idiomatic and fits the economic setting.
- source_word: וְהַשַּׁבָּת
  chosen: and the Sabbath
  lexicon: HALOT
  rationale: Retained as 'the Sabbath,' the weekly sacred day whose restrictions the merchants resent.
- source_word: וְנִפְתְּחָה בָּר
  chosen: so that we may offer wheat for sale
  alternatives:
  - so that we may open the grain
  - so that we may sell grain
  lexicon: HALOT
  rationale: פתח with בָּר is an idiom for opening storehouses/sacks for sale. בָּר often denotes cleaned grain or wheat. 'Offer wheat for sale' conveys the commercial sense in natural English while preserving the distinction from the previous clause.
- source_word: בָּר
  chosen: wheat
  alternatives:
  - grain
  - corn
  lexicon: HALOT
  rationale: Here בָּר likely refers to grain, especially wheat, in a market context. 'Wheat' gives a concrete commodity and avoids the ambiguity of 'corn' in modern English.
- source_word: לְהַקְטִין אֵיפָה
  chosen: making the ephah small
  alternatives:
  - reducing the measure
  - making the measure small
  lexicon: HALOT
  rationale: An ephah is a dry measure. Keeping 'ephah' preserves the concrete ancient unit and the fraud imagery; 'small' indicates giving less product than claimed.
- source_word: וּלְהַגְדִּיל שֶׁקֶל
  chosen: and the shekel large
  alternatives:
  - and increasing the shekel
  - and making the weight heavy
  lexicon: HALOT
  rationale: The shekel here functions as a weight/monetary standard. 'Making the shekel large' preserves the parallelism with 'making the ephah small' and reflects cheating by demanding more payment.
- source_word: וּלְעַוֵּת מֹאזְנֵי מִרְמָה
  chosen: and distorting deceitful scales
  alternatives:
  - and falsifying dishonest scales
  - and twisting scales of deceit
  lexicon: HALOT
  rationale: עוה means to bend/distort/pervert. מֹאזְנֵי מִרְמָה are scales characterized by deceit. 'Distorting deceitful scales' keeps the vivid image and moral force.
- source_word: מִרְמָה
  chosen: deceitful
  alternatives:
  - 'false'
  - fraudulent
  - dishonest
  lexicon: HALOT
  rationale: Rendered adjectivally in English to modify 'scales.' 'Deceitful' preserves the semantic field of fraud and treachery.
