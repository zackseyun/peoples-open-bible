translation:
  language: es
  text: Las conjuro, hijas de Jerusalén, por las gacelas o por las ciervas del campo[b], que no despierten ni aviven el amor, hasta que quiera[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «hasta que le plazca». El hebreo tiene un verbo femenino singular que concuerda con «amor»; algunos entienden la línea de manera personal, como «hasta que ella quiera» o «hasta que él quiera».
    reason: alternative_reading
  - marker: b
    text: El hebreo probablemente se refiere literalmente a gacelas y ciervas del campo; la expresión también puede evocar «ejércitos» mediante un juego poético de palabras en la fórmula del juramento.
    reason: cultural_note
lexical_decisions:
- source_word: הִשְׁבַּעְתִּי
  english_pob_choice: I adjure you
  chosen_spanish: Te conjuro
  alternatives_spanish:
  - Os conjuro
  - Les conjuro
  - Te pongo bajo juramento
  lexicon: HALOT
  rationale: El hifil de שׁבע expresa imponer un juramento o una solemne carga. «Conjuro» conserva mejor en español la fuerza ritual y apelativa de «I adjure you» que una fórmula más débil como «exhorto» o «cargo».
- source_word: בְּנוֹת יְרוּשָׁלִַם
  english_pob_choice: daughters of Jerusalem
  chosen_spanish: hijas de Jerusalén
  alternatives_spanish:
  - jóvenes de Jerusalén
  - mujeres de Jerusalén
  lexicon: HALOT
  rationale: Se mantiene la imagen poética y el paralelismo tradicional del vocativo. «Hijas de Jerusalén» reproduce de manera literal y transparente la personificación colectiva del original.
- source_word: בִּצְבָאוֹת אֹו בְּאַיְלוֹת הַשָּׂדֶה
  english_pob_choice: by the gazelles or by the does of the field
  chosen_spanish: por las gacelas o por las ciervas del campo
  alternatives_spanish:
  - por las gacelas y por las ciervas del campo
  - por las gacelas o por las hembras de ciervo del campo
  lexicon: HALOT
  rationale: El contexto poético favorece una referencia literal a animales. «Gacelas» y «ciervas» son equivalentes naturales y comprensibles en español; se evita «hosts» porque el juego fónico con צבאות no debe imponerse sobre el sentido animal que establece el paralelismo.
- source_word: אִם ... וְאִם
  english_pob_choice: that you not
  chosen_spanish: que no
  alternatives_spanish:
  - 'no'
  - para que no
  - si no
  lexicon: HALOT
  rationale: En esta fórmula de conjuro, el hebreo introduce la prohibición de manera idiomática. «Que no» expresa en español la fuerza de la advertencia/juramento sin volverla una traducción mecánica de la partícula condicional.
- source_word: תָּעִירוּ
  english_pob_choice: stir up
  chosen_spanish: despierten
  alternatives_spanish:
  - agiten
  - inciten
  - remuevan
  lexicon: HALOT
  rationale: El primer verbo se rinde con un verbo natural en español que conserve la imagen de provocar o interrumpir el reposo del amor. «Despierten» funciona bien en paralelo con el siguiente verbo y mantiene la metáfora del despertar.
- source_word: תְּעוֹרְרוּ
  english_pob_choice: awaken
  chosen_spanish: aviven
  alternatives_spanish:
  - despierten
  - exciten
  - reactiven
  lexicon: HALOT
  rationale: El segundo verbo intensifica el primero; «aviven» evita una repetición plana de «despierten» y conserva la idea de reanimar o provocar activamente. Así se refleja la pareja verbal del hebreo sin perder fluidez en español.
- source_word: הָאַהֲבָה
  english_pob_choice: love
  chosen_spanish: el amor
  alternatives_spanish:
  - la amor
  - la pasión
  - el amado
  lexicon: HALOT
  rationale: 'El sustantivo hebreo es el término ordinario para amor. En español, «el amor» mantiene la abstracción y la ambigüedad poética: puede aludir al amor como fuerza, experiencia o realidad personificada.'
- source_word: עַד שֶׁתֶּחְפָּץ
  english_pob_choice: until it desires
  chosen_spanish: hasta que quiera
  alternatives_spanish:
  - hasta que le plazca
  - hasta que desee
  - hasta que se complazca
  lexicon: HALOT
  rationale: El verbo femenino singular concuerda con «amor» en hebreo. «Hasta que quiera» comunica la idea de voluntad o disposición sin decidir si el referente es personificado como ella, él o simplemente el amor mismo; así se preserva la tensión interpretativa documentada por la POB inglesa.
theological_decisions:
- issue: Referente del verbo femenino singular final
  english_pob_reading: Render 'love' as the subject of the feminine verb without specifying a male or female human referent.
  chosen_spanish_reading: Mantener «el amor» como sujeto implícito de «quiera», sin asignarle un referente humano específico.
  alternative_spanish_readings:
  - hasta que ella quiera
  - hasta que él quiera
  - hasta que le plazca
  rationale: El hebreo presenta un verbo femenino singular que concuerda naturalmente con אַהֲבָה, un sustantivo femenino. La traducción española debe conservar esa ambigüedad poética sin resolverla en favor de una persona determinada, tal como hace el POB inglés.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa al preferir una cláusula negativa más explícita («que no») y evitar expansiones innecesarias. Se conservó la estructura concisa de la advertencia y la ambigüedad final de «love» + verbo femenino singular.
  spanish_consistency_notes:
  - Se mantuvo «hijas de Jerusalén» como vocativo poético uniforme con el patrón del texto base.
  - Se evitó «SEÑOR» u otra sustitución porque no aparece en el versículo; tampoco se introdujo terminología cristiana ajena al hebreo.
  - «El amor» conserva la abstracción requerida por el contexto y no se personaliza en la línea principal.
  - «Gacelas»/«ciervas» ofrece un equivalente natural para el paralelismo animal sin borrar la posible resonancia sonora con צבאות.
