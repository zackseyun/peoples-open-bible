translation:
  language: es
  text: Todavía hoy estoy tan fuerte como lo estaba el día en que Moisés me envió; como era mi fuerza entonces, así es mi fuerza ahora, para la batalla y para salir y entrar[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit., «para salir y entrar», un hebraísmo para plena capacidad de acción y liderazgo.
    reason: cultural_note
lexical_decisions:
- source_word: עוֹדֶנִּי
  english_pob_choice: I am still
  chosen_spanish: Todavía hoy estoy
  alternatives_spanish:
  - Sigo estando
  - Aún estoy
  lexicon: HALOT
  rationale: עוֹד con sufijo personal expresa continuidad. 'Todavía hoy estoy' comunica con naturalidad la permanencia de la condición de Caleb sin perder el matiz de continuidad temporal.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  - en este día
  lexicon: HALOT
  rationale: '''Hoy'' es la equivalencia natural y moderna para el valor temporal idiomático de הַיּוֹם.'
- source_word: חָזָק
  english_pob_choice: strong
  chosen_spanish: fuerte
  alternatives_spanish:
  - fuerte físicamente
  - vigoroso
  lexicon: HALOT
  rationale: En el contexto de guerra y movilidad, חָזָק apunta a fortaleza/energía. 'Fuerte' es la forma más directa y natural en español.
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  lexicon: HALOT
  rationale: Introduce una comparación. 'Como' mantiene la relación comparativa sin sobrecargar la frase.
- source_word: בְּיוֹם שְׁלֹחַ אֹתִי מֹשֶׁה
  english_pob_choice: on the day Moses sent me
  chosen_spanish: el día en que Moisés me envió
  alternatives_spanish:
  - cuando Moisés me envió
  - el día que Moisés me envió
  lexicon: HALOT
  rationale: La construcción hebrea temporal se vierte de forma natural en español con 'el día en que', preservando la especificidad del momento.
- source_word: כְּכֹחִי אָז
  english_pob_choice: as my strength was then
  chosen_spanish: como era mi fuerza entonces
  alternatives_spanish:
  - como fue mi fuerza entonces
  - tal como era mi fuerza entonces
  lexicon: HALOT
  rationale: El hebreo es elíptico; el español necesita una cópula explícita. 'Como era mi fuerza entonces' conserva la comparación sin añadir contenido ajeno.
- source_word: וּכְכֹחִי עָתָּה
  english_pob_choice: so my strength is now
  chosen_spanish: así es mi fuerza ahora
  alternatives_spanish:
  - y así es mi fuerza ahora
  - mi fuerza es ahora así
  lexicon: HALOT
  rationale: Se preserva el paralelismo entre 'entonces' y 'ahora'. 'Así es mi fuerza ahora' refleja bien la segunda mitad de la comparación hebrea.
- source_word: לַמִּלְחָמָה
  english_pob_choice: for battle
  chosen_spanish: para la guerra
  alternatives_spanish:
  - para la batalla
  - para pelear
  lexicon: HALOT
  rationale: מִלְחָמָה puede ser guerra o batalla. Aquí el sustantivo abarca la disposición general para combate; 'guerra' mantiene amplitud y fuerza lexical.
- source_word: וְלָצֵאת וְלָבוֹא
  english_pob_choice: for going out and coming in
  chosen_spanish: para salir y entrar
  alternatives_spanish:
  - para ir y venir
  - para salir y volver
  lexicon: HALOT
  rationale: Se conserva el hebraísmo con una formulación natural en español. 'Salir y entrar' mantiene el valor idiomático de actividad plena y capacidad de movimiento.
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste final del audit trail en el que la comparación quedó explícitamente en paralelo: ''como era mi fuerza entonces, así es mi fuerza ahora''. Se evitó traducir mecánicamente desde el inglés cuando el español podía reproducir con más naturalidad la estructura hebrea.'
  spanish_consistency_notes:
  - Se mantuvo 'Moisés' y no 'Moshé' por consistencia bíblica en español.
  - Se eligió 'guerra' en lugar de 'batalla' para conservar el alcance de מִלְחָמָה, mientras el pie de nota aclara que 'salir y entrar' es un hebraísmo.
  - No se introdujeron términos doctrinales ajenos; el verso es declarativo y autobiográfico.
