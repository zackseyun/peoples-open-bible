translation:
  language: es
  text: 'Los hijos de Sela, hijo de Judá: Er, padre de Lecá[a], y Laada, padre de Maresá, y los clanes de la casa de los trabajadores del lino de la casa de Asbea.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de la casa de quienes trabajaban el lino fino, de Bet-Asbea». La expresión hebrea está muy comprimida, y la fórmula anterior «padre de» también puede implicar «fundador de» o «antepasado de».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  lexicon: HALOT
  rationale: En una genealogía, "hijos de" mantiene la forma filial del hebreo y su tono listal. "Descendientes de" sería posible, pero atenúa la estructura del texto fuente.
- source_word: שֵׁלָה
  english_pob_choice: Shelah
  chosen_spanish: Sela
  alternatives_spanish:
  - Selá
  - Shelah
  lexicon: HALOT
  rationale: Se translitera el nombre propio en forma natural para el español bíblico. "Sela" conserva la identificación tradicional en español sin forzar una adaptación mecánica del inglés.
- source_word: בֶן יְהוּדָה
  english_pob_choice: son of Judah
  chosen_spanish: hijo de Judá
  alternatives_spanish:
  - de Judá
  lexicon: HALOT
  rationale: La construcción de parentesco se expresa directamente como "hijo de Judá" para preservar el vínculo genealógico explícito.
- source_word: עֵר
  english_pob_choice: Er
  chosen_spanish: Er
  lexicon: HALOT
  rationale: Nombre propio transliterado sin adaptación adicional.
- source_word: אֲבִי
  english_pob_choice: the father of
  chosen_spanish: padre de
  alternatives_spanish:
  - fundador de
  - antepasado de
  lexicon: HALOT
  rationale: '"Padre de" reproduce con transparencia la fórmula hebrea. En este tipo de lista puede implicar también fundador o antepasado, pero el texto español conserva la expresión literal para no borrar esa tensión semántica.'
- source_word: לֵכָה
  english_pob_choice: Lecah
  chosen_spanish: Lecá
  alternatives_spanish:
  - Lecah
  lexicon: HALOT
  rationale: Nombre de lugar o linaje transliterado en una forma española fluida.
- source_word: לַעְדָּה
  english_pob_choice: Laadah
  chosen_spanish: Laada
  alternatives_spanish:
  - Laadah
  lexicon: HALOT
  rationale: Nombre propio transliterado con ortografía española natural.
- source_word: מָרֵשָׁה
  english_pob_choice: Mareshah
  chosen_spanish: Maresá
  alternatives_spanish:
  - Maresa
  - Maresah
  lexicon: HALOT
  rationale: Se adopta una forma española legible del topónimo, manteniendo la referencia al lugar conocido en la tradición bíblica.
- source_word: מִשְׁפְּחוֹת
  english_pob_choice: the clans
  chosen_spanish: los clanes
  alternatives_spanish:
  - las familias
  lexicon: HALOT
  rationale: '"Clanes" comunica mejor en español la idea de grupos de parentesco extensos y no meramente familias nucleares.'
- source_word: בֵּית
  english_pob_choice: the house of
  chosen_spanish: la casa de
  alternatives_spanish:
  - el linaje de
  - el hogar de
  lexicon: HALOT
  rationale: Se conserva la fórmula de "casa" porque en este contexto designa un linaje o agrupación asociada con una actividad u origen.
- source_word: עֲבֹדַת הַבֻּץ
  english_pob_choice: linen workers
  chosen_spanish: los trabajadores del lino
  alternatives_spanish:
  - los que trabajaban el lino
  - los obreros del lino
  - los trabajadores de lino fino
  lexicon: HALOT
  rationale: La frase hebrea comprimida se vierte de forma transparente como ocupación. "Trabajadores del lino" mantiene el sentido de labor u oficio sin añadir una precisión textil que el contexto no obliga a explicitar.
- source_word: לְבֵית אַשְׁבֵּעַ
  english_pob_choice: of the house of Ashbea
  chosen_spanish: de la casa de Asbea
  alternatives_spanish:
  - de Bet-Asbea
  - de la casa de Ashbea
  lexicon: HALOT
  rationale: Se sigue la revisión inglesa que entiende la expresión como designación de casa/linaje más que como simple localización. "Asbea" preserva la forma de nombre propio en español.
translation_notes:
  revision_awareness: La versión inglesa revisada desplazó la última frase desde una lectura locativa («at Beth-ashbea») hacia una lectura de casa/linaje («of the house of Ashbea»). La redacción española sigue esa revisión y mantiene la compresión del hebreo sin expandirla más allá de lo que permite el texto.
  spanish_consistency_notes:
  - Se usa «hijos de» para la apertura genealógica y «padre de» para אֲבִי, manteniendo la misma tensión semántica que el audit trail inglés.
  - Los nombres propios se adaptan a una forma española legible, sin perder la identificación con la tradición bíblica.
  - «Casa» y «clanes» se conservan para reflejar la estructura social/genealógica del versículo.
  - La nota al pie marca la alternativa importante sobre la frase final y sobre el valor potencial de «padre de» como fundador/antepasado.
