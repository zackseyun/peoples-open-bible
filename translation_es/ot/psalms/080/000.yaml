  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Asaf», «salmo» y el tratamiento de la superscripción son adecuados. La principal mejora léxica es preferir «Testimonio» como rótulo breve, sin artículo, para conservar mejor la ambigüedad litúrgica/titular documentada.
  issues:
