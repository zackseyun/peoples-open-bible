revisions:
- from: 'Pero cuando vieron el campamento que venía a enfrentarlos, dijeron a Judas: «¿Cómo podremos nosotros, siendo tan pocos, combatir contra una multitud tan grande? Y nosotros estamos agotados[c][b], habiendo pasado hoy sin comer».'
  to: 'Pero cuando vieron el campamento que venía a su encuentro[a], dijeron a Judas: «¿Cómo podremos, siendo tan pocos, combatir contra una multitud tan grande? Estamos agotados[c][b], después de pasar hoy sin comer».'
  rationale: Se corrigió el referente singular de αὐτῷ con «a su encuentro», se añadió la nota alternativa documentada por la POB inglesa («contra él»), y se suavizó la última cláusula para un español más natural sin cambiar el sentido. También se aligeró la repetición de «nosotros», que no es necesaria en español.
