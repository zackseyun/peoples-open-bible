translation:
  language: es
  text: 'Pero él les dijo: «¿Cómo dicen que el Mesías[a] es hijo de David[b]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Cristo». El título griego Χριστός se traduce aquí como «Mesías» porque el contexto trata explícitamente del libertador davídico esperado.
    reason: alternative_reading
  - marker: b
    text: O «un hijo de David» o «el Hijo de David». El griego dice literalmente «hijo de David».
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ funciona como conector leve de transición; en español, «Pero» comunica bien el giro discursivo de Jesús hacia una pregunta que pone a prueba la afirmación previa.
- source_word: πρὸς αὐτούς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: 'La construcción de habla con πρός + acusativo se expresa de forma natural en español con dativo de destinatario indirecto: «les dijo».'
- source_word: Πῶς
  english_pob_choice: How
  chosen_spanish: ¿Cómo
  alternatives_spanish:
  - ¿De qué manera?
  - ¿Cómo es que?
  lexicon: BDAG
  rationale: «¿Cómo» reproduce de manera directa la pregunta sobre la lógica o manera de la afirmación.
- source_word: λέγουσιν
  english_pob_choice: do they say
  chosen_spanish: dicen
  alternatives_spanish:
  - están diciendo
  - dice la gente
  lexicon: BDAG
  rationale: El presente indicativo con sujeto indefinido se vierte naturalmente como «dicen»; en español no hace falta auxiliar interrogativo como en inglés.
- source_word: τὸν χριστὸν
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  lexicon: BDAG
  rationale: Se mantiene el título mesiánico con el término preferido del proyecto para Χριστός en este contexto de expectativa davídica.
- source_word: Δαυὶδ υἱόν
  english_pob_choice: David’s son
  chosen_spanish: hijo de David
  alternatives_spanish:
  - el hijo de David
  - un hijo de David
  lexicon: BDAG
  rationale: La frase griega es literalmente «David hijo», pero en español la construcción más natural y fiel es «hijo de David»; conserva la filiación davídica y deja abierta la tensión teológica del pasaje.
theological_decisions:
- issue: Título Χριστός en contexto davídico
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El pasaje trata del esperado libertador davídico; por eso se privilegia el título mesiánico y no el nombre eclesiástico «Cristo».
  doctrine_reference: 'DOCTRINE.md: Χριστός → «Mesías» cuando es título; preservar el sentido judío-mesiánico del contexto'
- issue: Relación de filiación davídica
  english_pob_reading: David’s son
  chosen_spanish_reading: hijo de David
  alternative_spanish_readings:
  - el Hijo de David
  - un hijo de David
  rationale: La formulación mantiene la afirmación común sobre el linaje davídico sin resolver la cuestión que Jesús está interrogando; así se preserva la tensión del argumento.
  doctrine_reference: 'DOCTRINE.md: Preservar la tensión teológica en lugar de armonizarla prematuramente'
translation_notes:
  revision_awareness: El pasaje mostró alto acuerdo entre revisiones y no requirió cambios sustantivos; la redacción española sigue de cerca el griego y el criterio auditado de la POB en cuanto a Χριστός y la filiación davídica.
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός como título, en coherencia con el criterio del proyecto.
  - Se traduce la filiación como «hijo de David» para conservar naturalidad en español y la ambigüedad teológica del original.
  - No se introducen notas al pie porque la formulación española puede reflejar las alternativas sin necesidad de marcadores en el texto.
