base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/020/025.yaml
  text: Then Jehoshaphat and his people came to plunder their spoil[a], and they found among them in abundance goods, garments, and desirable articles; and they took for themselves more than they could carry. They were three days plundering the spoil, because it was so much.
  footnotes:
  - marker: a
    text: 'Hebrew: ''corpses.'' Some ancient witnesses and translations reflect a reading such as ''garments'' or omit the term to smooth the sense of the inventory, but the Masoretic Text reads ''corpses,'' likely indicating the fallen enemy bodies among whom the spoil was found.'
