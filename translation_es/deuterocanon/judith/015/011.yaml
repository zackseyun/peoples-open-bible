lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: BDAG
  rationale: La simple coordinación conserva el avance narrativo inmediato del griego y suena natural en español.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: BDAG
  rationale: El aoristo de λέγω se vierte de manera normal como «dijo» en una cláusula narrativa breve.
- source_word: πᾶς ὁ λαός
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo reunido
  - toda la asamblea
  lexicon: BDAG
  rationale: La frase es colectiva y completa; «todo el pueblo» preserva la totalidad de πᾶς con un sustantivo natural en español.
- source_word: Γένοιτο
  english_pob_choice: May it be so
  chosen_spanish: Que así sea
  alternatives_spanish:
  - Amén
  - Sea así
  lexicon: BDAG
  rationale: El optativo expresa asentimiento o deseo. En español, «Que así sea» comunica con naturalidad la fuerza responsiva sin imponer una fórmula litúrgica que el griego no exige aquí.
theological_decisions:
- issue: Cómo reflejar la acclamación congregacional Γένοιτο
  english_pob_reading: May it be so
  chosen_spanish_reading: Que así sea
  alternative_spanish_readings:
  - Amén
  - Sea así
  rationale: No hay una controversia doctrinal, pero sí una decisión interpretativa. Mantener una fórmula de asentimiento en español reproduce el valor del optativo griego y evita oscurecerlo con una transliteración litúrgica que no es necesaria en este contexto.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El contexto inglés pasó de «Amen» a «May it be so» para reflejar más directamente Γένοιτο. La versión española sigue esa revisión al preferir una fórmula semiliteral y natural («Que así sea») en vez de «Amén» como simple equivalencia litúrgica.
  spanish_consistency_notes:
  - Se mantiene «pueblo» para πᾶς ὁ λαός, evitando «asamblea» porque no es requerido por el contexto inmediato.
  - Se usa mayúscula inicial solo en la cita directa después de dos puntos, conforme al uso editorial español.
  - La nota a pie conserva la alternativa más literal para transparencia auditiva.
