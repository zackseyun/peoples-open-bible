review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en gran parte el sentido del hebreo: David ordena huir con urgencia, advierte que no habrá escape de Absalón, y teme que este los alcance, traiga calamidad sobre ellos y golpee la ciudad a espada. Sin embargo, varias decisiones no siguen bien ni la evidencia fuente ni la auditoría inglesa: עֲבָדָיו en este contexto cortesano debe evitar ''esclavos''; מִפְּנֵי אַבְשָׁלוֹם se entiende mejor como ''de Absalón'' que ''delante de Absalón''; רָעָה aquí es calamidad/desgracia, no ''el mal''; y la nota/orden de marcadores no preserva adecuadamente la trazabilidad del POB inglés.'
  spanish_quality_summary: El español es generalmente legible, pero mezcla registro peninsular ('Levantaos', 'Daos prisa') con el objetivo neutral latinoamericano. Además, 'no habrá para nosotros escape' suena algo forzado; 'no habrá escape para nosotros' es más natural. 'Haga caer sobre nosotros el mal' introduce ambigüedad moral no deseada. 'Con filo de espada' es comprensible, pero 'a filo de espada' o 'con el filo de la espada' suena más idiomático; dado el POB inglés, conviene mantener 'con el filo de la espada' y nota explicativa.
  glossary_alignment: 'No hay términos teológicos mayores del glosario principal en juego, pero sí una desviación importante de la política contextual para עֶבֶד: aquí debe traducirse como ''siervos'' o ''servidores'', no ''esclavos'', porque el propio expediente inglés documenta contexto de corte real y opta por ''servants''.'
  issues:
  - severity: high
    issue: עֲבָדָיו se tradujo como 'esclavos'
    rationale: La auditoría inglesa decidió 'his servants' explícitamente por el contexto cortesano de oficiales y servidores de David. 'Esclavos' sobre-especifica estatus de servidumbre no exigido por el contexto y contradice la rationale documentada.
  - severity: medium
    issue: Registro no alineado con español neutral latinoamericano
    rationale: Formas como 'Levantaos' y 'Daos prisa' son naturales en España pero no en un registro ampliamente panhispánico latinoamericano. Un imperativo plural neutral como 'Levántense' / 'Dense prisa' mejora adecuación del proyecto.
  - severity: medium
    issue: '''delante de Absalón'' para מִפְּנֵי אַבְשָׁלוֹם suena poco natural aquí'
    rationale: Aunque es más literal, en este contexto de amenaza y fuga el sentido es 'de Absalón' o 'ante Absalón' como fuente de peligro. 'Delante de Absalón' en español moderno sugiere ubicación física más que escape de una amenaza.
  - severity: high
    issue: רָעָה se vertió como 'el mal' en vez de calamidad/desgracia
    rationale: El expediente inglés marcó expresamente que aquí no se trata de mal moral sino de desastre. En español, 'el mal' queda ambiguo y puede malentenderse teológicamente. Debe decir 'desgracia' o 'desastre'.
  - severity: medium
    issue: Los marcadores y notas no reflejan bien la auditoría inglesa
    rationale: El inglés conserva alternativas para 'Hurry to depart', 'bring disaster upon us' y el modismo de la espada. El borrador español omitió nota sobre 'partir' y usó marcadores con contenido desalineado. Conviene reordenar y anclar notas de modo consistente.
