revisions:
- from: 'Entonces Natán dijo a David[a]: «Tú eres el hombre. Así dice Yahvé, el Dios de Israel: Yo te ungí como rey sobre Israel, y yo te libré de la mano de Saúl».'
  to: 'Entonces Natán dijo a David[a]: «¡Tú eres el hombre! Así dice Yahvé, el Dios de Israel: Yo te ungí como rey sobre Israel, y te libré de la mano de Saúl».'
  rationale: Se ajusta la puntuación para reflejar la fuerza acusatoria y climática de אַתָּה הָאִישׁ, en línea con la decisión auditada en inglés. También se mejora levemente la naturalidad del español al evitar una repetición innecesariamente rígida del pronombre «yo», sin alterar el significado del original.
