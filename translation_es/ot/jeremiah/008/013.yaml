  to: Ciertamente los reuniré[a], dice Yahvé. No hay uvas en la vid, ni higos en la higuera; la hoja misma se ha marchitado[b], y lo que les di se alejará de ellos.
  rationale: Se mantiene la estructura y las decisiones principales del borrador, pero se ajusta la cláusula final a «se alejará de ellos» para un español más natural que «se apartará de ellos» y más cercano a la idea de pérdida por alejamiento. También se pule la redacción de la nota [a] para mejor estilo editorial en español.
