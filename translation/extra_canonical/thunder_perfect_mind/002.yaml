translation:
  text: 'Consider me[1], and I found myself among those who seek me,

    you who watch for me—you yourselves;[3]

    and you hearers, listen to me.

    You who are troubled in heart, receive me to yourselves[d][c][b][a][4][3][2],

    and do not turn away from me.[4]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: 'OCR shows ⲁⲓϭⲓⲛⲉ (1sg. perfect, ‘I found’), but the chain of imperatives
      and the collocation with ‘those who seek me’ favor reading/understanding an
      imperative ϭⲓⲛⲉ ⲙⲙⲟⲓ ‘find me.’ If the indicative is confirmed, an alternative
      would be: ‘and I am found among those who seek me.’'
    reason: alignment_note
  - marker: '2'
    text: ϣⲟⲡⲧ ranges over ‘strength/firmness/courage’; alternatives include ‘take
      courage’ or ‘be firm.’
    reason: lexical_alternative
  - marker: '3'
    text: ⲉⲧⲏⲩⲧⲛ is an emphatic independent pronoun ‘you yourselves,’ intensifying
      the address. It can be left implicit, but we preserve it to keep the rhetorical
      force.
    reason: cultural_note
  - marker: '4'
    text: ⲡⲱⲧ is literally ‘run/flee’; ‘turn away’ renders the relational sense in
      context. ‘Do not flee from me’ is a viable alternative.
    reason: lexical_alternative
  - marker: a
    text: Or 'and find me among those who seek me,[1]'.
    reason: previous_rendering
  - marker: b
    text: Or 'you who know me—you yourselves;[3]'.
    reason: previous_rendering
  - marker: c
    text: Or 'be strong,[2]'.
    reason: previous_rendering
  - marker: d
    text: Or 'and let whoever will listen, listen to me.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲙⲉⲉⲩⲉ ⲉⲣⲟⲓ
  chosen: Consider me
  alternatives:
  - Meditate on me
  - Think upon me
  - Ponder me
  lexicon: Crum, Coptic Dictionary s.v. ⲙⲉⲉⲩⲉ
  rationale: ⲙⲉⲉⲩⲉ carries sense of consider/ponder; imperative suits the vocative
    exhortation of the poem. "Consider" preserves directness and avoids over-interpretive
    religiolect.
- source_word: (ⲁ)ϭⲓⲛⲉ ⲙⲙⲟⲓ
  chosen: find me
  alternatives:
  - receive me
  - discover me
  lexicon: Crum s.v. ϭⲓⲛⲉ
  rationale: ϭⲓⲛⲉ is 'find, discover'. In collocation with 'those who seek me' it
    naturally reads as imperative 'find me'. OCR shows ⲁⲓϭⲓⲛⲉ (1sg. perfect), but
    context and parallel imperatives favor an imperative reading; we flag this in
    the alignment note.
- source_word: ⲛⲉⲧϣⲓⲛⲉ ⲛⲥⲱⲓ
  chosen: those who seek me
  alternatives:
  - those who search for me
  lexicon: Crum s.v. ϣⲓⲛⲉ
  rationale: ϣⲓⲛⲉ means 'seek/search'; straightforward participial relative + object
    pronoun construction.
- source_word: ⲧⲉⲧⲛⲉⲣⲟⲉⲓⲥ ⲉⲣⲟⲓ
  chosen: you who know me
  alternatives:
  - you who recognize me
  lexicon: Crum s.v. ⲣⲟⲉⲓⲥ
  rationale: ⲣⲟⲉⲓⲥ = 'know'; present with 2pl prefix ⲧⲉⲧⲛ-. This vocative address
    continues the chain of hearers.
- source_word: ⲉⲧⲏⲩⲧⲛ
  chosen: you yourselves
  alternatives:
  - (unrendered emphasis)
  lexicon: Layton, Coptic Grammar §75; Crum s.v. ⲏⲩ
  rationale: Independent pronoun used emphatically; rendering preserves the intensifying
    force without smoothing it away.
- source_word: ⲛⲣⲉϥⲥⲱⲧⲙ
  chosen: who will listen
  alternatives:
  - who has ears to hear
  - who is ready to hear
  lexicon: Crum s.v. ⲣⲉϥ- (future/relative) + ⲥⲱⲧⲙ
  rationale: Relative future formation; 'will listen' captures prospective sense without
    importing NT idiom.
- source_word: ⲥⲱⲧⲙ ⲉⲣⲟⲓ
  chosen: listen to me
  alternatives:
  - hear me
  lexicon: Crum s.v. ⲥⲱⲧⲙ
  rationale: Imperative fits the parallel chain; 'listen' emphasizes heeding rather
    than mere auditory perception.
- source_word: ⲛⲉⲧⲧⲟϣⲧ ⲉⲃⲟⲗ ϩⲏⲧ
  chosen: You who are troubled in heart
  alternatives:
  - You who are fearful in heart
  - You who are alarmed within
  lexicon: Crum s.v. ⲧⲟϣⲧ; ϩⲏⲧ
  rationale: ⲧⲟϣⲧ conveys fear/disturbance; ϩⲏⲧ is 'heart'. 'Troubled in heart' preserves
    internal affect.
- source_word: ϣⲟⲡⲧ
  chosen: be strong
  alternatives:
  - take courage
  - be firm
  - harden yourselves
  lexicon: Crum s.v. ϣⲟⲡⲧ
  rationale: Noun/verb field of strength/firmness; imperative sense in context to
    counter 'troubled'. 'Be strong' is direct; alternatives noted.
- source_word: ⲙⲡⲣⲡⲱⲧ ⲛⲥⲱⲓ
  chosen: do not turn away from me
  alternatives:
  - do not flee from me
  - do not run from me
  lexicon: Crum s.v. ⲡⲱⲧ
  rationale: Negative imperative with ⲙⲡⲣ- + ⲡⲱⲧ 'run/flee'; 'turn away' is idiomatic
    in English for relational flight while keeping spatial metaphor.
parallelism_check: 'This segment runs as a chain of imperatives/vocatives with repeated
  "to me" (ⲉⲣⲟⲓ): consider me; find me; you who know me (emphatic); let whoever will
  listen, listen to me; you who are troubled, be strong; and do not turn away from
  me. I preserved the parallelism and the cadence of address + imperative, including
  the emphatic "you yourselves" to keep the rhetorical pressure on the addressees.'
voice_check: 'The commanding, first-person-centered voice of Thunder is retained:
  the speaker demands attention (consider, find, listen), identifies her audience
  (you who know me; you who are troubled), and issues prohibitions (do not turn away).
  The repeated "to me" keeps the self-referential focus without softening it into
  general moral counsel.'
alignment_risk_note: Overall alignment confidence is medium. The OCR shows ⲁⲓϭⲓⲛⲉ
  (1sg perfect) where the rhetoric strongly expects an imperative ϭⲓⲛⲉ 'find'; I rendered
  the clause as imperative but flagged this as a risk. The clause ⲧⲉⲧⲛⲉⲣⲟⲉⲓⲥ ⲉⲧⲏⲩⲧⲛ
  ⲉⲣⲟⲓ is somewhat awkward; I took it as a vocative 'you who know me—you yourselves',
  preserving the emphatic pronoun rather than smoothing. The phrase ⲛⲉⲧⲧⲟϣⲧ ⲉⲃⲟⲗ ϩⲏⲧ
  ϣⲟⲡⲧ is compact; ϣⲟⲡⲧ's nuance ranges from 'strength' to 'hardness/courage'; I chose
  'be strong' but note viable alternatives. Finally, ⲡⲱⲧ is literally 'run/flee';
  I rendered 'turn away' to fit the relational context, but 'flee' is possible.
