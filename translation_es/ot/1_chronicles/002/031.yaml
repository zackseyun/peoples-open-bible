translation:
  language: es
  text: 'Los hijos de Appaim: Ishi[a]; y los hijos de Ishi: Sheshan; y los hijos de Sheshan: Ahlai.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «descendientes de» en cada ocurrencia de «hijos de»; el hebreo בני puede denotar linaje en genealogías, aunque «hijos de» es la traducción más directa aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: and the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos/descendientes de
  lexicon: HALOT
  rationale: En genealogías, בני introduce pertenencia de linaje o descendencia directa. En español, «los hijos de» reproduce con más precisión y economía la fórmula repetida del hebreo, mientras que «descendientes de» ampliaría el alcance más allá de lo que el texto exige.
- source_word: אַפַּיִם
  english_pob_choice: Appaim
  chosen_spanish: Appaim
  alternatives_spanish:
  - Appayim
  lexicon: HALOT
  rationale: Es un nombre propio y se translitera. Se conserva la forma usual en español bíblico para mantener identificabilidad y coherencia genealógica.
- source_word: יִשְׁעִי
  english_pob_choice: Ishi
  chosen_spanish: Ishi
  alternatives_spanish:
  - Jishi
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se mantiene la forma breve y estándar ya reconocible para lectores de genealogías bíblicas.
- source_word: שֵׁשָׁן
  english_pob_choice: Sheshan
  chosen_spanish: Shesán
  alternatives_spanish:
  - Sesán
  - Sheshán
  lexicon: HALOT
  rationale: 'Nombre propio transliterado con adaptación ortográfica al español para facilitar lectura: se conserva la sibilante y se marca el acento final según pronunciación probable. No se traduce el nombre.'
- source_word: אַחְלָי
  english_pob_choice: Ahlai
  chosen_spanish: Ahlai
  alternatives_spanish:
  - Ajlai
  lexicon: HALOT
  rationale: Nombre propio transliterado directamente. Se evita castellanizar en exceso para no perder la relación con la forma estándar del nombre.
theological_decisions:
- issue: La fórmula genealógica בני en una lista de descendencia
  english_pob_reading: Or 'descendants of' at each occurrence of 'sons of'; the Hebrew בני can denote lineage in genealogies, though 'sons of' is the more direct rendering here.
  chosen_spanish_reading: «hijos de» como fórmula genealógica directa, con la posibilidad de entender «descendientes de» como alternativa semántica.
  alternative_spanish_readings:
  - descendientes de
  - linaje de
  rationale: El hebreo permite una lectura de descendencia amplia, pero el contexto de la lista favorece una traducción directa y repetida. En español, «hijos de» conserva la forma del original sin borrar la amplitud genealógica; la alternativa se documenta en nota para no perder la tensión lexical.
  doctrine_reference: N/A
