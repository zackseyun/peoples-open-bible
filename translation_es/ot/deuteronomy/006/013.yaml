review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: temor reverente a Yahvé, servicio a él y jurar por su nombre. También preserva correctamente el pronombre enfático ''a él'' y el uso de ''Yahvé''. Sin embargo, hay una inconsistencia de modo/tiempo verbal: el hebreo usa formas imperfectas 2ms de valor exhortativo/mandatario en serie, y el inglés POB las mantuvo uniformemente con ''you shall ...''. En español, mezclar ''Teme'' con ''servirás'' y ''jurarás'' rompe la paralelidad formal del verso. La mejor reparación es uniformar a futuro exhortativo: ''Temerás ... servirás ... jurarás''.'
  spanish_quality_summary: El español es claro y digno, pero la mezcla de imperativo y futuro suena menos pulida que una serie uniforme. Además, la nota a dice 'no mera terror', que es gramaticalmente incorrecto; debe ser 'no mero terror'. La nota b propone 'adorarlo', pero como alternativa paralela a 'servirás' conviene 'adorarás' para mantener forma verbal finita y mayor naturalidad. El resto del texto es legible y eclesialmente adecuado.
  glossary_alignment: 'Se alinea bien con la terminología del proyecto: יְהוָה -> ''Yahvé'', אֱלֹהֶיךָ -> ''tu Dios'', עבד -> ''servir'', y שׁבע -> ''jurar''. También respeta la decisión teológica de mantener ''temer'' en vez de reducirlo a ''reverenciar''. No hay conflicto doctrinal relevante.'
  issues:
  - severity: medium
    issue: Mezcla de imperativo y futuro en la serie verbal
    rationale: 'El hebreo presenta una cadena paralela de formas 2ms con valor mandatorio/exhortativo. En español bíblico natural conviene mantener paralelismo: ''Temerás ... servirás ... jurarás'' o bien toda la serie en imperativo. El borrador actual ''Teme ... servirás ... jurarás'' suena inconsistente.'
  - severity: low
    issue: 'Error gramatical en la nota a: ''no mera terror'''
    rationale: En español debe decir 'no mero terror' porque 'terror' es masculino.
  - severity: low
    issue: Alternativa de la nota b menos natural en paralelismo verbal
    rationale: '''O “adorarlo”'' funciona, pero ''O “adorarás”'' corresponde mejor a la forma verbal principal y evita un cambio innecesario de construcción.'
  revised_spanish_text: A Yahvé tu Dios[a] temerás, y a él servirás[b], y por su nombre jurarás.
  revised_footnotes:
  - marker: a
    text: O 'reverenciarás a Yahvé tu Dios'; el verbo hebreo incluye temor reverente y asombro, no mero terror.
    reason: lexical_alternative
  - marker: b
    text: O 'adorarás'; el verbo hebreo suele significar 'servir' y, en contexto, incluye servicio de adoración.
    reason: lexical_alternative
  revision_rationale: Se revisa para uniformar la serie verbal en futuro exhortativo, que reproduce mejor la paralelidad del hebreo y del audit trail inglés. También se corrige un error gramatical en la nota a y se mejora la naturalidad de la alternativa en la nota b sin alterar las decisiones léxicas o teológicas del proyecto.
