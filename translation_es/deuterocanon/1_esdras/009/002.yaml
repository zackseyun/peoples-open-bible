    text: Or 'camping there' or 'spending the night there.' The Greek participle denotes staying overnight in that place.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew parallel in Ezra 10 describes the specific offense as taking foreign wives; the Greek here summarizes it more generally as 'lawless deeds.'
    reason: alternative_reading
