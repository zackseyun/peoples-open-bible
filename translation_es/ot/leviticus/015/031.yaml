review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del hebreo: advertencia a los hijos de Israel respecto de su condición ritual, propósito preventivo para que no mueran, y causa instrumental al contaminar/profanar el tabernáculo en medio de ellos. Sin embargo, «advertirás» no refleja el plural hebreo הִזַּרְתֶּם; debe ser «advertirán» o mejor un futuro plural directo. Además, «impureza» es legible, pero la POB en inglés documenta de manera consistente la categoría cultual como ‘uncleanness’; en español, «impureza ritual» sería explicativo de más en el texto principal, pero «impureza» puede mantenerse si se preserva claramente el sentido ritual en las decisiones. El resto se alinea bien con el hebreo y la auditoría inglesa.'
  spanish_quality_summary: 'El texto es claro y natural, con buen registro bíblico contemporáneo. La principal falla es gramatical: el verbo inicial está en segunda persona singular («advertirás») cuando el hebreo y el contexto legislativo exigen plural («advertirán»/«advertiréis»). «Así» no es incorrecto, pero «Así» puede sonar ligeramente inferencial; se tolera. «Al profanar» es una buena solución española para בְּטַמְּאָם, y «que está entre ellos» suena natural y fiel.'
  glossary_alignment: Cumple bien con «tabernáculo» para מִשְׁכָּן y mantiene «hijos de Israel» según la decisión auditada. No intervienen términos del glosario mayor como Yahvé/Mesías. La elección «impureza» es aceptable como equivalente ritual de טֻמְאָה en español, aunque algo menos formalmente cercana a ‘uncleanness/inmundicia’; no requiere rechazo. El problema real de alineación es morfosintáctico en el verbo inicial.
  issues:
  - severity: high
    issue: Discordancia de número en el verbo inicial
    rationale: הִזַּרְתֶּם es segunda persona masculina plural (‘ustedes/vosotros advertirán’), pero el borrador dice «advertirás» (singular). Esto altera la referencia gramatical del mandato legal.
  - severity: low
    issue: Ligera tensión entre «impureza» y la terminología cultual más tradicional
    rationale: «Impureza» comunica bien la categoría ritual, pero en Levítico «inmundicia» también preserva un eco cultual más tradicional. No es un error; solo conviene asegurar que no se moralice el término.
  revised_spanish_text: Así advertirán a los hijos de Israel acerca de su impureza[a], para que no mueran en su impureza al profanar mi tabernáculo, que está entre ellos.
  revised_footnotes:
  - marker: a
    text: O «los israelitas» o «los descendientes de Israel».
    reason: lexical_alternative
  revision_rationale: Se corrigió «advertirás» a «advertirán» para reflejar fielmente el plural hebreo הִזַּרְתֶּם. Se mantuvo el resto porque conserva bien el sentido fuente, la terminología cultual básica y la legibilidad en español.
