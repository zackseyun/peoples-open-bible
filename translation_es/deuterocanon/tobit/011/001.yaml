    text: 'Greek: ''because he prospered his way,'' an idiom meaning that God gave success to his journey.'
    reason: lexical_alternative
  - marker: b
    text: The final clause is awkward in Greek. It likely means 'until they came near to Nineveh'; some could construe it as 'until he came near to Nineveh.'
    reason: textual_variant
