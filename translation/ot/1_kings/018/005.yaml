id: 1KI.18.5
reference: 1 Kings 18:5
source:
  edition: WLC
  text: וַ/יֹּ֤אמֶר אַחְאָב֙ אֶל עֹ֣בַדְיָ֔הוּ לֵ֤ךְ בָּ/אָ֨רֶץ֙ אֶל כָּל מַעְיְנֵ֣י הַ/מַּ֔יִם וְ/אֶ֖ל כָּל הַ/נְּחָלִ֑ים אוּלַ֣י נִמְצָ֣א חָצִ֗יר וּ/נְחַיֶּה֙ ס֣וּס וָ/פֶ֔רֶד וְ/ל֥וֹא נַכְרִ֖ית מֵ/הַ/בְּהֵמָֽה־־־־׀׃
translation:
  text: And Ahab said to Obadiah[a], “Go through the land to all the springs of water and to all the wadis. Perhaps we may find grass and keep horse and mule alive[b], so that we do not have to cut off some of the livestock.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the streams.” The Hebrew word can denote a wadi, torrent-bed, or stream; in this drought setting, “wadis” best reflects the likely sense of seasonal watercourses.
    reason: lexical_alternative
  - marker: b
    text: Literally “cut off from the livestock.” The expression likely means reducing the number of animals, probably because there is not enough fodder to keep them alive.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּאָרֶץ
  chosen: through the land
  alternatives:
  - in the land
  - into the land
  lexicon: HALOT
  rationale: With the verb 'go,' the preposition ב can express movement through an area rather than simple location. 'Through the land' fits the search context better than the more static 'in the land.'
- source_word: מַעְיְנֵי הַמַּיִם
  chosen: the springs of water
  alternatives:
  - water springs
  - springs
  lexicon: HALOT
  rationale: A fairly literal rendering preserves the concrete sense of natural water sources. 'Springs of water' is idiomatic enough in English while staying close to the Hebrew construction.
- source_word: הַנְּחָלִים
  chosen: the wadis
  alternatives:
  - the streams
  - the valleys
  - the brooks
  lexicon: HALOT
  rationale: נחל often refers to seasonal watercourses rather than perennial streams. 'Wadis' best captures the Near Eastern geographical sense in a drought context, though 'streams' is a common smoother alternative.
- source_word: אוּלַי נִמְצָא
  chosen: Perhaps we may find
  alternatives:
  - perhaps we will find
  - maybe we can find
  lexicon: HALOT
  rationale: The cohortative-like first person plural sense is prospective and tentative. 'Perhaps we may find' preserves both uncertainty and shared intention.
- source_word: חָצִיר
  chosen: grass
  alternatives:
  - green fodder
  - herbage
  - hay
  lexicon: HALOT
  rationale: The word here refers to vegetation suitable for animal feed. 'Grass' is the most natural and sufficiently precise English rendering; 'hay' would imply cut and dried fodder not stated in the text.
- source_word: וּנְחַיֶּה
  chosen: and keep ... alive
  alternatives:
  - and preserve
  - and let ... live
  lexicon: HALOT
  rationale: The hiphil conveys causing to live or preserving life. 'Keep ... alive' is natural English and clearly expresses the practical aim of finding fodder.
- source_word: סוּס וָפֶרֶד
  chosen: horse and mule
  alternatives:
  - horses and mules
  lexicon: HALOT
  rationale: The Hebrew uses singular collectives after the verb; English can preserve this as representative singulars. This keeps the phrasing compact while still conveying the classes of animals.
- source_word: וְלֹא נַכְרִית מֵהַבְּהֵמָה
  chosen: so that we do not have to cut off some of the livestock
  alternatives:
  - so that we do not destroy any of the cattle
  - and not cut off from the beasts
  - so that we do not lose some of the animals
  lexicon: HALOT
  rationale: כרת in hiphil literally means 'cut off,' here likely idiomatic for reducing the number of animals, probably by slaughter or disposal due to lack of feed. 'Cut off some of the livestock' preserves the metaphor while clarifying the partitive sense implied by מן. 'Livestock' is broader and contextually better than 'cattle,' since horses and mules are in view.
- source_word: מֵהַבְּהֵמָה
  chosen: some of the livestock
  alternatives:
  - from the livestock
  - of the animals
  lexicon: HALOT
  rationale: 'The מן construction is naturally partitive here: avoiding the loss of part of the animal stock. ''Livestock'' fits the domestic-animal context better than the generic ''animals.'''
