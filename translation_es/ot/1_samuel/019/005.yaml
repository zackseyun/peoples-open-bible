translation:
  language: es
  text: Porque él puso su vida en su mano[a] y derribó al filisteo, y Yahvé realizó una gran salvación[b] para todo Israel. Tú lo viste y te alegraste. Entonces, ¿por qué habrías de pecar derramando sangre inocente, dando muerte a David sin motivo[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «arriesgó su vida», literalmente, «puso su vida en su mano».'
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse «una gran victoria» o «una gran liberación».
    reason: lexical_alternative
  - marker: c
    text: 'O: «sin causa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם אֶת־נַפְשׁוֹ בְכַפּוֹ
  english_pob_choice: he put his life in his hand
  chosen_spanish: puso su vida en su mano
  alternatives_spanish:
  - arriesgó su vida
  - tomó su vida en su mano
  lexicon: HALOT
  rationale: Conservo la imagen idiomática hebrea de poner la vida en la mano, que expresa riesgo mortal, y la hago natural en español sin perder la metáfora.
- source_word: נַפְשׁוֹ
  english_pob_choice: his life
  chosen_spanish: su vida
  alternatives_spanish:
  - su alma
  - él mismo
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ significa la vida del hombre en peligro, no el alma inmortal. «Vida» es la opción más fiel y clara.
- source_word: בְכַפּוֹ
  english_pob_choice: in his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - en su palma
  lexicon: HALOT
  rationale: «Mano» reproduce el valor idiomático de כַּף de manera natural en español; «palma» es posible pero menos idiomática aquí.
- source_word: וַיַּךְ אֶת־הַפְּלִשְׁתִּי
  english_pob_choice: struck down the Philistine
  chosen_spanish: derribó al filisteo
  alternatives_spanish:
  - hirió al filisteo
  - mató al filisteo
  lexicon: HALOT
  rationale: «Derribó» comunica el golpe decisivo y el resultado fatal sin reducir el verbo a una mera referencia al acto de matar, preservando el dinamismo narrativo.
- source_word: וַיַּעַשׂ יְהוָה
  english_pob_choice: the LORD brought about
  chosen_spanish: Yahvé realizó
  alternatives_spanish:
  - Yahvé hizo
  - Yahvé efectuó
  lexicon: HALOT
  rationale: עוֹשֶׂה con sustantivo abstracto expresa que Yahvé efectuó/produjo la liberación; «realizó» suena natural y mantiene la agencia divina.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino revelado en el texto hebreo, conforme al criterio editorial del proyecto, en vez de sustituirlo por un título.
- source_word: תְּשׁוּעָה גְדוֹלָה
  english_pob_choice: a great salvation
  chosen_spanish: una gran salvación
  alternatives_spanish:
  - una gran victoria
  - una gran liberación
  lexicon: HALOT
  rationale: «Salvación» conserva el alcance teológico amplio de תְּשׁוּעָה, aun en un contexto militar; «victoria» o «liberación» estrecharían el matiz.
- source_word: לְכָל־יִשְׂרָאֵל
  english_pob_choice: for all Israel
  chosen_spanish: para todo Israel
  alternatives_spanish:
  - para todos los israelitas
  - para todo el pueblo de Israel
  lexicon: HALOT
  rationale: La preposición ל indica beneficio en favor de Israel; «para todo Israel» es breve, natural y fiel.
- source_word: רָאִיתָ וַתִּשְׂמָח
  english_pob_choice: You saw it and rejoiced
  chosen_spanish: Tú lo viste y te alegraste
  alternatives_spanish:
  - lo viste y te alegraste
  - viste y te alegraste
  lexicon: HALOT
  rationale: Mantengo el sujeto explícito para claridad en español y traduzco el objeto implícito de «ver» con «lo» para que la referencia contextual quede clara.
- source_word: וְלָמָּה תֶחֱטָא
  english_pob_choice: So why should you sin
  chosen_spanish: Entonces, ¿por qué habrías de pecar?
  alternatives_spanish:
  - ¿por qué pecarías?
  - ¿por qué debes pecar?
  lexicon: HALOT
  rationale: La pregunta retórica se expresa naturalmente con «habrías de» en español y conserva el valor inferencial de וְלָמָּה sin volverla mecánica.
- source_word: בְּדָם נָקִי
  english_pob_choice: against innocent blood
  chosen_spanish: contra sangre inocente
  alternatives_spanish:
  - derramando sangre inocente
  - con sangre inocente
  lexicon: HALOT
  rationale: «Contra sangre inocente» reproduce el valor de culpa de sangre y mantiene el tono jurídico-moral del hebreo.
- source_word: לְהָמִית אֶת־דָּוִד
  english_pob_choice: by putting David to death
  chosen_spanish: dando muerte a David
  alternatives_spanish:
  - matando a David
  - para matar a David
  lexicon: HALOT
  rationale: El infinitivo expresa el modo o resultado del pecado; «dando muerte» es formal, claro y evita una expresión demasiado cruda o demasiado libre.
- source_word: חִנָּם
  english_pob_choice: for no reason
  chosen_spanish: sin motivo
  alternatives_spanish:
  - sin causa
  - gratuitamente
  lexicon: HALOT
  rationale: חִנָּם significa «sin causa / sin razón»; «sin motivo» es la opción más natural en español contemporáneo y mantiene la idea de gratuidad.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El versículo usa el Tetragrámaton directamente. Según la política del proyecto, se preserva el nombre propio divino como «Yahvé» y no se lo oculta detrás de un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Scope of תְּשׁוּעָה in a military context
  english_pob_reading: a great salvation
  chosen_spanish_reading: una gran salvación
  alternative_spanish_readings:
  - una gran victoria
  - una gran liberación
  rationale: Aunque el contexto inmediato es bélico, la palabra hebrea tiene un alcance más amplio que «victoria»; «salvación» conserva el peso teológico y la resonancia de rescate divino.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Rendering the bloodguilt phrase בְּדָם נָקִי
  english_pob_reading: against innocent blood
  chosen_spanish_reading: contra sangre inocente
  alternative_spanish_readings:
  - derramando sangre inocente
  - con sangre inocente
  rationale: La expresión mantiene la carga legal y moral del hebreo, donde la sangre inocente es objeto de culpa y juicio, no solo una descripción del acto violento.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §4
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés actualizado: conserva la imagen idiomática de «poner la vida en la mano», mantiene «Yahvé» para el nombre divino, traduce תְּשׁוּעָה con «salvación» y refleja la revisión más reciente en la pregunta retórica con «¿por qué habrías de pecar?».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se usa «filisteo» en minúscula por tratarse de un gentilicio común en español bíblico.
  - «Sangre inocente» conserva la fuerza jurídica del hebreo sin explicitar innecesariamente el derramamiento.
  - Las notas al pie respetan las alternativas relevantes del auditor inglés y añaden solo ambigüedades reales del español.
