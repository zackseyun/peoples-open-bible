revisions:
- from: Y los convertiré en una bendición, alrededor de mi collado[a]; haré descender la lluvia en su tiempo; lluvias de bendición serán.
  to: Y haré de ellos y de los alrededores de mi collado[a] una bendición; haré descender la lluvia en su tiempo; serán lluvias de bendición.
