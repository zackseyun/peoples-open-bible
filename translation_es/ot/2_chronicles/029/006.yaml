translation:
  language: es
  text: Porque nuestros padres actuaron con infidelidad e hicieron lo malo ante los ojos de Yahvé nuestro Dios[a]. Lo abandonaron, apartaron sus rostros de la morada de Yahvé[b], y le dieron la espalda[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cometieron traición» / «faltaron a su fidelidad»; el verbo hebreo expresa infidelidad, especialmente en asuntos de pacto.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «de la morada de Yahvé»; «tabernáculo» es posible como glosa léxica de מִשְׁכָּן, pero aquí la referencia es al templo como morada de Yahvé.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «dieron la nuca». El modismo expresa rechazo o rebeldía.
    reason: lexical_alternative
lexical_decisions:
- source_word: מָעֲלוּ
  english_pob_choice: acted unfaithfully
  chosen_spanish: actuaron con infidelidad
  alternatives_spanish:
  - fueron infieles
  - cometieron traición
  - faltaron a su fidelidad
  lexicon: HALOT
  rationale: El hebreo מעל expresa quebranto de lealtad o infidelidad, a menudo con tono de pacto. «Actuaron con infidelidad» conserva esa fuerza relacional y religiosa mejor que un simple «fueron infieles», que en español puede sonar más genérico.
- source_word: הָרַע
  english_pob_choice: what was evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - el mal
  - lo perverso
  lexicon: HALOT
  rationale: Con עשה, la expresión significa hacer lo malo / hacer el mal. «Lo malo» mantiene la evaluación moral objetiva sin volver la frase pesada en español.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - en la presencia de Yahvé
  lexicon: HALOT
  rationale: Se conserva el idiomático hebreo de «ojos» para no perder la metáfora de evaluación divina. «Ante los ojos de» es natural en español y respeta la imagen original.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el Tetragrámaton. «Yahvé» preserva el nombre propio divino y evita la sustitución por un título.
- source_word: וַיַּעַזְבֻהוּ
  english_pob_choice: They abandoned him
  chosen_spanish: Lo abandonaron
  alternatives_spanish:
  - Lo dejaron
  - Lo desampararon
  lexicon: HALOT
  rationale: עָזַב aquí comunica abandono religioso y de pacto. «Lo abandonaron» es claro, actual y mantiene esa ruptura de relación.
- source_word: וַיַּסֵּבּוּ פְנֵיהֶם
  english_pob_choice: turned their faces away
  chosen_spanish: volvieron sus rostros de espaldas
  alternatives_spanish:
  - apartaron sus rostros
  - volvieron el rostro
  lexicon: HALOT
  rationale: Se busca reflejar la imagen concreta de apartar el rostro del lugar santo. «Volvieron sus rostros de espaldas» preserva el gesto deliberado y deja preparada la idiomática siguiente.
- source_word: מִמִּשְׁכַּן יְהוָה
  english_pob_choice: from the dwelling place of Yahweh
  chosen_spanish: al lugar donde habitaba Yahvé
  alternatives_spanish:
  - del lugar de morada de Yahvé
  - del santuario de Yahvé
  - del tabernáculo de Yahvé
  lexicon: HALOT
  rationale: מִשְׁכָּן literalmente es «morada / lugar de habitación». En este contexto de Crónicas se refiere al templo como la morada de Yahvé; por eso «lugar donde habitaba» evita la posible confusión con el tabernáculo del desierto sin perder el sentido.
- source_word: וַיִּתְּנוּ עֹרֶף
  english_pob_choice: turned their backs
  chosen_spanish: le dieron la espalda
  alternatives_spanish:
  - volvieron la nuca
  - dieron el cuello
  lexicon: HALOT
  rationale: El hebreo dice literalmente «dieron la nuca/espalda del cuello», un modismo de rechazo. «Le dieron la espalda» es la equivalencia idiomática más natural en español y conserva la idea de rechazo deliberado.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se mantiene la política del proyecto de transliterar el Nombre divino, en vez de sustituirlo por «SEÑOR». «Yahvé» es la forma establecida en el texto español de este proyecto y conserva el referente personal del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido cultual de מִשְׁכָּן en contexto de templo
  english_pob_reading: dwelling place of Yahweh
  chosen_spanish_reading: al lugar donde habitaba Yahvé
  alternative_spanish_readings:
  - del tabernáculo de Yahvé
  - del santuario de Yahvé
  rationale: En Crónicas, מִשְׁכָּן puede referirse al templo como morada divina. «Lugar donde habitaba» conserva el valor de morada sin sugerir erróneamente solo el tabernáculo mosaico.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el auditor inglés y la revisión más reciente, que no introdujo cambios. Se mantuvo el paralelismo de las dos acciones de rechazo: apartar el rostro del lugar de Yahvé y darle la espalda.'
  spanish_consistency_notes:
  - 'Se siguió la convención del proyecto para el Tetragrámaton: «Yahvé».'
  - Se evitó «SEÑOR» como sustituto del Nombre divino.
  - «Lo abandonaron» mantiene el sujeto plural y el objeto directo pronominal como en el hebreo.
  - La segunda mitad preserva el paralelismo semítico con dos imágenes complementarias de rechazo.
