translation:
  language: es
  text: 'En el séptimo año, Joiada se fortaleció y tomó a los comandantes de cientos en pacto con él: Azarías hijo de Jeroam[a], Ismael hijo de Johanán, Azarías hijo de Obed, Maaséyahu hijo de Adayáhu y Elisafat hijo de Zicri.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hizo pacto con ellos» / «los tomó en un pacto con él». El hebreo combina el verbo «tomó» con «con él» y «en/al pacto», expresando que Joiada incorporó a estos oficiales a un acuerdo pactal con él.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַשָּׁנָה הַשְּׁבִעִית
  english_pob_choice: In the seventh year
  chosen_spanish: En el séptimo año
  alternatives_spanish:
  - Y en el séptimo año
  lexicon: HALOT
  rationale: La frase temporal se vierte de forma natural en español con una preposición simple. Se conserva el valor cronológico sin sobrecargar con la conjunción inicial.
- source_word: הִתְחַזַּק
  english_pob_choice: strengthened himself
  chosen_spanish: se fortaleció
  alternatives_spanish:
  - cobró ánimo
  - se hizo fuerte
  - actuó con decisión
  lexicon: HALOT
  rationale: El hitpael tiene matiz reflexivo; en español, 'se fortaleció' preserva ese valor de fortalecerse a sí mismo sin convertirlo en una paráfrasis interpretativa.
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - reunió
  - llevó consigo
  - tomó consigo
  lexicon: HALOT
  rationale: '''Tomó'' mantiene la base verbal del hebreo y permite que la frase siguiente explique el sentido pactal de la acción.'
- source_word: שָׂרֵי הַמֵּאוֹת
  english_pob_choice: the commanders of hundreds
  chosen_spanish: los jefes de cientos
  alternatives_spanish:
  - los comandantes de centenas
  - los capitanes de cientos
  - los oficiales de cien
  lexicon: HALOT
  rationale: '''Jefes de cientos'' comunica el rango militar de manera clara y evita introducir asociaciones históricas ajenas que tendría ''centuriones''.'
- source_word: עִמּוֹ בַבְּרִית
  english_pob_choice: into covenant with him
  chosen_spanish: para hacer pacto con él
  alternatives_spanish:
  - en pacto con él
  - para pactar con él
  - a un pacto con él
  lexicon: HALOT
  rationale: El hebreo combina 'tomó' con 'con él' y 'en el pacto', indicando un acto de incorporación pactal. En español, 'para hacer pacto con él' expresa el resultado/propósito del gesto sin borrar el trasfondo de pacto. Se conserva la tensión entre la acción de 'tomar' y la formalización del pacto.
- source_word: לַעֲזַרְיָהוּ ... וּלְיִשְׁמָעֵאל ... וְלַעֲזַרְיָהוּ ... וְאֶת מַעֲשֵׂיָהוּ ... וְאֶת אֱלִישָׁפָט
  english_pob_choice: Azariah ... Ishmael ... Azariah ... Maaseiah ... and Elishaphat
  chosen_spanish: Azarías ... Ismael ... Azarías ... Maaséyahu ... y Elisafat
  alternatives_spanish:
  - Azarías ... Ismael ... Azarías ... Maaseías ... y Elishafat
  - Azarías ... Ismael ... Azarías ... Maaseías ... y Elisafat
  lexicon: HALOT
  rationale: Los nombres propios se transliteran. Se preserva la repetición de Azarías tal como aparece en el hebreo. 'Maaséyahu' y 'Elisafat' reflejan de manera más directa la forma hebrea que una adaptación tradicional española.
- source_word: בֶן
  english_pob_choice: son of
  chosen_spanish: hijo de
  lexicon: HALOT
  rationale: Equivalente patronímico estándar y natural en español para la identificación genealógica.
theological_decisions:
- issue: Naturaleza del acto en בַּבְּרִית / עִמּוֹ בַּבְּרִית
  english_pob_reading: into covenant with him
  chosen_spanish_reading: para hacer pacto con él
  alternative_spanish_readings:
  - en pacto con él
  - para pactar con él
  - a un pacto con él
  rationale: El hebreo admite una formulación breve que mezcla acción y estado pactal. La traducción elegida conserva la dimensión formal del pacto y el movimiento de inclusión de los jefes en ese compromiso, sin reducirlo a una mera reunión política.
  doctrine_reference: Teología bíblica del pacto; cf. uso veterotestamentario de ברית como compromiso vinculante.
translation_notes:
  revision_awareness: 'El texto inglés auditado pasó de un orden más rígido a uno más natural: ''took the commanders of hundreds into covenant with him''. La versión española sigue esa misma orientación de legibilidad sin perder el nexo entre la acción de tomar y el pacto. Se respetó la repetición del nombre Azarías y la lista nominal completa, sin armonizarla con formas tradicionales no atestiguadas en el hebreo.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma por defecto para el nombre divino cuando aparezca; este versículo no lo contiene.
  - Se prefirió 'se fortaleció' para reflejar el reflexivo del hitpael.
  - Se mantuvo la nomenclatura militar como 'jefes de cientos' para transparencia semántica.
  - Los nombres propios siguen la forma hebrea y no la adaptación litúrgica española cuando esta se aleja del original.
