translation:
  language: es
  text: Soy como una lechuza[a] del desierto; he venido a ser como un búho[b] entre las ruinas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un pelícano del desierto». El nombre hebreo קָאַת es incierto; muchas traducciones tradicionales usan «pelícano».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «una lechuza pequeña entre las ruinas». El término hebreo כּוֹס no permite precisar la especie.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דָּ֭מִיתִי
  english_pob_choice: I am like
  chosen_spanish: Me he parecido
  alternatives_spanish:
  - Soy como
  - Me parezco a
  - He llegado a ser como
  lexicon: HALOT
  rationale: El perfecto qal puede expresar comparación con matiz de estado resultante; en español, "me he parecido" conserva esa cualidad sin perder la lectura comparativa del verso.
- source_word: לִקְאַת
  english_pob_choice: a desert owl
  chosen_spanish: una lechuza
  alternatives_spanish:
  - un pelícano
  - un ave del desierto
  - un búho
  lexicon: HALOT
  rationale: El nombre hebreo del ave es incierto. Dado el contexto de desolación y ruina, "lechuza" comunica bien una ave nocturna y solitaria sin forzar una especie demasiado precisa.
- source_word: מִדְבָּר
  english_pob_choice: desert
  chosen_spanish: del desierto
  alternatives_spanish:
  - del desierto árido
  - de la estepa
  - del yermo
  lexicon: HALOT
  rationale: '"Desierto" es la forma más natural y fiel en español para מִדְבָּר en este contexto poético de soledad y despoblación.'
- source_word: הָיִיתִי
  english_pob_choice: I have become like
  chosen_spanish: he venido a ser
  alternatives_spanish:
  - he llegado a ser
  - he sido
  - me he vuelto
  lexicon: HALOT
  rationale: El perfecto aquí puede ser resultativo. "He venido a ser" preserva el cambio de estado que el inglés POB quiso reflejar con "have become".
- source_word: כְּכוֹס
  english_pob_choice: an owl
  chosen_spanish: una lechuza
  alternatives_spanish:
  - un búho
  - un ave nocturna
  lexicon: HALOT
  rationale: El término exacto para כּוֹס es incierto. Mantener "lechuza" da continuidad a la imagen de un ave nocturna en las ruinas y evita una identificación taxonómica indebida.
- source_word: חֳרָבוֹת
  english_pob_choice: among the ruins
  chosen_spanish: entre las ruinas
  alternatives_spanish:
  - en las ruinas
  - en los lugares desolados
  - entre desolaciones
  lexicon: HALOT
  rationale: El plural denota ruinas o lugares arruinados; "entre las ruinas" reproduce bien la escena concreta y poética del hebreo.
