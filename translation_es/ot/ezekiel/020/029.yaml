revisions:
- from: 'Entonces les dije[a]: «¿Qué es ese lugar alto al que van?». Así se le puso por nombre Bamá[b] hasta el día de hoy.'
  to: 'Entonces les dije: «¿Qué es el lugar alto[a] al que van?». Así fue llamado Bamá[a] hasta el día de hoy.'
  rationale: Se ajusta «ese» a «el» para reflejar mejor el artículo definido hebreo y la revisión auditada en inglés. Se simplifica la fórmula de nombramiento a «Así fue llamado Bamá», que preserva el sentido pasivo/narrativo de וַיִּקָּרֵא שְׁמָהּ con español más natural. Se consolida la explicación del juego de palabras en una sola nota, anclada en ambas ocurrencias para máxima claridad sin redundancia. No se requiere adjudicación adicional, porque la corrección es menor y bien sustentada por la evidencia dada.
