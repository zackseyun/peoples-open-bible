translation:
  language: es
  text: Que toda tu creación te sirva; porque tú hablaste, y llegaron a existir; enviaste tu Espíritu[a], y los formó; y no hay quien resista a tu voz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu aliento» o «tu viento». La palabra griega puede abarcar esos tres sentidos en contextos de creación.
    reason: lexical_alternative
lexical_decisions:
- source_word: δουλευσάτω
  english_pob_choice: serve
  chosen_spanish: te sirva
  alternatives_spanish:
  - esté sometida a ti
  - te sea esclava
  lexicon: BDAG
  rationale: El griego expresa servicio/subordinación universal. En español, «te sirva» conserva esa relación sin endurecerla innecesariamente con «esclava», que en esta línea poética aplicada a la creación resultaría más fuerte de lo que exige el contexto.
- source_word: πᾶσα ἡ κτίσις σου
  english_pob_choice: all your creation
  chosen_spanish: toda tu creación
  alternatives_spanish:
  - toda la creación que es tuya
  - toda criatura tuya
  lexicon: LSJ
  rationale: La construcción con πᾶσα + sustantivo singular es colectiva. «Toda tu creación» mantiene el alcance total y suena natural en español, sin convertirlo en un plural de criaturas que perdería la lectura colectiva.
- source_word: εἶπας
  english_pob_choice: you spoke
  chosen_spanish: tú hablaste
  alternatives_spanish:
  - tú dijiste
  lexicon: BDAG
  rationale: «Hablaste» conserva el tono solemne y poético del acto creador. En este contexto, «dijiste» es posible, pero «hablaste» enlaza mejor con la idea de la voz creadora que continúa al final del versículo.
- source_word: ἐγενήθησαν
  english_pob_choice: they came to be
  chosen_spanish: llegaron a existir
  alternatives_spanish:
  - fueron hechas
  - vinieron a ser
  lexicon: BDAG
  rationale: La forma expresa llegar a existir, no solo ser fabricadas. «Llegaron a existir» mantiene el matiz de surgimiento a la existencia sin imponer un agente explícito distinto del habla divina.
- source_word: ἀπέστειλας
  english_pob_choice: you sent out
  chosen_spanish: enviaste
  alternatives_spanish:
  - enviaste fuera
  - mandaste
  lexicon: BDAG
  rationale: El matiz de envío está bien cubierto en español por «enviaste». Añadir «fuera» sería innecesario aquí, porque el contexto ya muestra la salida activa del Espíritu.
- source_word: τὸ πνεῦμά σου
  english_pob_choice: your Spirit
  chosen_spanish: tu Espíritu
  alternatives_spanish:
  - tu aliento
  - tu viento
  lexicon: BDAG
  rationale: En un contexto de creación, πνεῦμα admite «espíritu», «aliento» y «viento». Se conserva «Espíritu» en el texto principal por su peso teológico y porque la frase habla de la acción divina personal; las otras posibilidades quedan implícitamente abiertas por la nota.
- source_word: ᾠκοδόμησεν
  english_pob_choice: it formed them
  chosen_spanish: los formó
  alternatives_spanish:
  - los edificó
  - los estableció
  lexicon: LSJ
  rationale: Aunque el verbo literalmente puede significar «construyó/edificó», en este contexto de creación «los formó» transmite la acción formativa de modo natural en español y refleja la corrección adoptada en el audit trail inglés hacia una equivalencia más precisa.
- source_word: ἀντιστήσεται
  english_pob_choice: will resist
  chosen_spanish: resista
  alternatives_spanish:
  - se oponga
  - haga frente
  lexicon: BDAG
  rationale: «Resista» mantiene la idea de oponerse activamente a la voz divina. La forma verbal en subjuntivo dentro de la construcción negativa española reproduce de manera natural la futuridad/posibilidad del griego.
- source_word: τῇ φωνῇ σου
  english_pob_choice: your voice
  chosen_spanish: tu voz
  alternatives_spanish:
  - tu palabra
  - tu mandato
  lexicon: BDAG
  rationale: Se conserva la imagen concreta de la «voz» en vez de abstractarla como «mandato». Así permanece la fuerza poética del versículo, donde la voz divina es el medio de creación y autoridad.
theological_decisions:
- issue: Sentido de πνεῦμα en contexto creador
  english_pob_reading: your Spirit
  chosen_spanish_reading: tu Espíritu
  alternative_spanish_readings:
  - tu aliento
  - tu viento
  rationale: El texto griego permite las tres acepciones, y la traducción inglesa preserva esa tensión en nota. En el texto español se eligió «Espíritu» por ser la lectura más teológicamente cargada y la más coherente con la acción personal de Dios en la creación, sin negar las otras posibilidades léxicas.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente al preferir una formulación equivalente a «formed them» en lugar de una imagen más literal de edificación. En español, «los formó» reproduce mejor la precisión revisada y evita una metáfora arquitectónica innecesaria en este contexto creador.
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca en este versículo, sino como norma del proyecto para el nombre divino cuando corresponda; aquí el texto se dirige directamente a Dios con «tú».
  - Se mantuvo un registro solemne y bíblico sin caer en arcaísmos rígidos.
  - «Espíritu» se capitalizó por referirse al Espíritu divino en este contexto.
  - La estructura del período sigue de cerca el paralelismo del griego para preservar su cadencia poética.
