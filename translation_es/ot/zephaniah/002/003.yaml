revisions:
- from: Busca a Yahvé[a], todos los humildes[b] de la tierra, los que han practicado su justicia; busquen rectitud[c], busquen humildad[d]; quizá sean escondidos en el día de la ira de Yahvé.
  to: Busquen a Yahvé, todos los humildes[a] de la tierra,[b] los que han practicado su justicia; busquen rectitud,[c] busquen humildad; quizá serán escondidos[d] en el día de la ira de Yahvé.
  rationale: Se corrige la concordancia del imperativo al plural en las tres repeticiones, se reubican las notas para que correspondan exactamente a las palabras/frases pertinentes, se ajusta la nota sobre הָאָרֶץ para reflejar la alternativa documentada ('tierra/país'), y se mejora 'sean escondidos' a 'serán escondidos' para una lectura española más natural y más cercana al sentido auditado del POB inglés.
  reviewer_model: gpt-5.4
