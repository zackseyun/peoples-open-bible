translation:
  language: es
  text: 'Saúl le dijo: «¿Por qué han conspirado contra mí tú y el hijo de Isaí, al darle pan y espada y al consultar[a] a Dios por él, para que se haya levantado contra mí para acecharme[b], como hoy?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al inquirir de Dios por él».
    reason: lexical_alternative
  - marker: b
    text: O «para que él pudiera levantarse contra mí, acechando, como hoy».
    reason: alternative_reading
lexical_decisions:
- source_word: קְשַׁרְתֶּם
  english_pob_choice: have conspired
  chosen_spanish: se han confabulado
  alternatives_spanish:
  - han conspirado
  - se han aliado
  lexicon: HALOT
  rationale: En este contexto el verbo expresa una acción hostil contra el rey, no solo una unión neutral. «Se han confabulado» comunica bien el sentido político de conspiración y mantiene la intención acusatoria de Saúl.
- source_word: בֶן יִשָׁי
  english_pob_choice: the son of Jesse
  chosen_spanish: el hijo de Isaí
  alternatives_spanish:
  - David
  lexicon: HALOT
  rationale: Saúl no usa el nombre propio, sino el patronímico despectivo o distanciador. «El hijo de Isaí» conserva esa forma y el tono retórico.
- source_word: בְּתִתְּךָ לוֹ לֶחֶם וְחֶרֶב
  english_pob_choice: by giving him bread and a sword
  chosen_spanish: al darle pan y espada
  alternatives_spanish:
  - dándole pan y espada
  - cuando le diste pan y espada
  lexicon: HALOT
  rationale: La construcción con ב marca aquí medio o circunstancia concomitante. En español, «al darle» expresa esa relación de manera natural y fiel.
- source_word: וְשָׁאוֹל לוֹ בֵּאלֹהִים
  english_pob_choice: and by inquiring of God for him
  chosen_spanish: y al consultar a Dios por él
  alternatives_spanish:
  - y al inquirir de Dios por él
  - y al consultar de Dios por él
  lexicon: HALOT
  rationale: שׁאל con בֵּאלֹהִים corresponde a buscar dirección divina. «Consultar a Dios» es natural en español bíblico y evita reducir el acto a una simple pregunta. Se mantiene «Dios» porque el hebreo dice אֱלֹהִים, no YHWH.
- source_word: בֵּאלֹהִים
  english_pob_choice: of God
  chosen_spanish: a Dios
  alternatives_spanish:
  - de Dios
  - ante Dios
  lexicon: HALOT
  rationale: La frase hebrea expresa el objeto de la consulta, no una posesión. «A Dios» reproduce con claridad el valor del complemento en español.
- source_word: לָקוּם אֵלַי לְאֹרֵב
  english_pob_choice: so that he has risen against me to lie in wait
  chosen_spanish: para que se haya levantado contra mí para tender una emboscada
  alternatives_spanish:
  - para levantarse contra mí y acechar
  - para que se levante contra mí para acecharme
  lexicon: HALOT
  rationale: El verbo לקום aquí expresa levantarse/ponerse en acción contra alguien; לְאֹרֵב añade la idea de acechar o emboscar. «Tender una emboscada» es idiomático en español y conserva el contenido militar del hebreo.
- source_word: כַּיּוֹם הַזֶּה
  english_pob_choice: as on this day
  chosen_spanish: como en el día de hoy
  alternatives_spanish:
  - como hasta el día de hoy
  - como en este día
  lexicon: HALOT
  rationale: La expresión temporal apunta al estado presente y visible de la acusación. «Como en el día de hoy» mantiene ese énfasis con español claro y solemne.
theological_decisions:
- issue: Uso de אֱלֹהִים en la consulta sacerdotal
  english_pob_reading: and by inquiring of God for him
  chosen_spanish_reading: y al consultar a Dios por él
  alternative_spanish_readings:
  - y al consultar al Señor por él
  - y al consultar de Dios por él
  rationale: El texto hebreo usa אֱלֹהִים, no el nombre divino YHWH. Por fidelidad al original, la traducción conserva «Dios» y no sustituye por «el Señor».
  doctrine_reference: Principio de primacía del texto fuente; terminología POB para YHWH y אֱלֹהִים
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail en el punto de לְאֹרֵב, prefiriendo una expresión verbal natural en español («tender una emboscada») en lugar de una nominalización más rígida. También se mantuvo la distinción original entre אֱלֹהִים y el nombre divino, sin armonizarlo a YHWH.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֱלֹהִים, coherente con la política POB de no ocultar la forma hebrea.
  - «El hijo de Isaí» conserva la distancia retórica del patronímico, en paralelo al inglés POB.
  - El registro es formal pero natural para lectura eclesial en español latinoamericano.
  - La puntuación de cita sigue el uso español, con comillas angulares no necesarias al usar comillas dobles simples del sistema de salida.
