translation:
  language: es
  text: Han sembrado trigo, pero han segado espinas; se han agotado, pero no sacan provecho alguno. Avergüéncense[a] de sus productos, a causa del ardor de la ira de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y ustedes se avergonzarán de sus cosechas», si וּבֹשׁוּ se toma como lectura predictiva más que imperativa.'
    reason: alternative_reading
lexical_decisions:
- source_word: זָרְעוּ
  english_pob_choice: they have sown
  chosen_spanish: han sembrado
  alternatives_spanish:
  - sembraron
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción presentada como cumplida; en español, el pretérito perfecto compuesto conserva bien ese valor y suena natural en una sentencia profética.
- source_word: חִטִּים
  english_pob_choice: wheat
  chosen_spanish: trigo
  alternatives_spanish:
  - grano
  lexicon: HALOT
  rationale: חִטִּים designa específicamente trigo. 'Trigo' mantiene la precisión agrícola y el contraste con 'espinas'.
- source_word: וְקֹצִים
  english_pob_choice: but ... thorns
  chosen_spanish: pero ... espinas
  alternatives_spanish:
  - y ... espinas
  - y ... abrojos
  lexicon: HALOT
  rationale: Aunque el hebreo lleva וְ, el contraste del paralelismo pide una conjunción adversativa en español. 'Espinas' es el equivalente más directo y claro.
- source_word: קָצָרוּ
  english_pob_choice: they have reaped
  chosen_spanish: han segado
  alternatives_spanish:
  - han cosechado
  - han recogido
  lexicon: HALOT
  rationale: El verbo de cosecha se expresa con naturalidad por 'segar', que mantiene el paralelismo con sembrar y el tono agrícola del verso.
- source_word: נֶחְלוּ
  english_pob_choice: they have exhausted themselves
  chosen_spanish: se han agotado
  alternatives_spanish:
  - se han fatigado
  - se han consumido
  lexicon: HALOT
  rationale: La lectura adoptada en el audit trail entiende el verbo como debilidad o agotamiento por el esfuerzo. 'Se han agotado' es natural y fiel sin endurecer el español.
- source_word: לֹא יוֹעִלוּ
  english_pob_choice: they profit nothing
  chosen_spanish: no sacan provecho alguno
  alternatives_spanish:
  - no aprovechan nada
  - nada les aprovecha
  lexicon: HALOT
  rationale: El hiphil de יעל expresa 'beneficiar' o 'aprovechar'. En español, 'sacar provecho' conserva bien la idea de beneficio sin sonar demasiado técnico.
- source_word: וּבֹשׁוּ
  english_pob_choice: Be ashamed
  chosen_spanish: Sean avergonzados
  alternatives_spanish:
  - Avergüéncense
  - Van a avergonzarse
  - Quedarán avergonzados
  lexicon: HALOT
  rationale: La forma puede entenderse como imperativa plural en el contexto profético. 'Sean avergonzados' preserva la fuerza de exhortación/juicio y la tensión gramatical documentada.
- source_word: מִתְּבוּאֹתֵיכֶם
  english_pob_choice: of your produce
  chosen_spanish: por sus productos
  alternatives_spanish:
  - por sus cosechas
  - por su cosecha
  lexicon: HALOT
  rationale: תְּבוּאָה significa producto/rendimiento/cosecha. 'Productos' permite una referencia amplia y plural acorde con el sufijo de 2mp, que en español se expresa mejor con 'sus' en un mandato dirigido a un grupo.
- source_word: מֵחֲרוֹן אַף
  english_pob_choice: because of the burning anger
  chosen_spanish: a causa del ardor de la ira
  alternatives_spanish:
  - por el ardor de la ira
  - a causa del fuego de la ira
  lexicon: HALOT
  rationale: La imagen idiomática de חֲרוֹן אַף combina calor/ardor con ira. 'Ardor de la ira' conserva la metáfora sin perder inteligibilidad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del Tetragrama como 'Yahvé', conforme al criterio del proyecto para preservar el nombre propio de Dios en el texto principal.
theological_decisions:
- issue: Render of the Tetragrammaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo contiene el nombre propio divino, no un título. 'Yahvé' comunica en español la decisión del proyecto de no enmascarar el nombre con 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Interpretation of וּבֹשׁוּ as direct address
  english_pob_reading: 'imperative addressed to the people: ''Be ashamed'''
  chosen_spanish_reading: 'imperativo dirigido al pueblo: ''Sean avergonzados'''
  alternative_spanish_readings:
  - '''Ustedes serán avergonzados'''
  - 'continuación descriptiva: ''y fueron avergonzados'''
  rationale: La forma verbal y el contexto retórico favorecen una lectura exhortativa/judicial en segunda persona plural. En español, el subjuntivo exhortativo refleja mejor esa fuerza que una simple lectura futura o descriptiva.
  doctrine_reference: 'DOCTRINE.md: Prophetic discourse and grammatical ambiguity'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail al preferir un verbo de agotamiento más preciso y natural que 'worn themselves out'. En español, 'se han agotado' reproduce ese ajuste con registro formal y mantiene el paralelismo agrícola y judicial del verso.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' para el Tetragrama, coherente con el criterio terminológico del proyecto.
  - Se eligió 'espinas' para קֹצִים por ser el equivalente directo y comprensible en español.
  - Se conservó la tensión gramatical de וּבֹשׁוּ con una lectura imperativa, pero se documentó la alternativa predictiva en nota.
  - El campo agrícola se mantuvo uniforme con sembrar/cegar/cosecha para reflejar el paralelismo hebreo.
