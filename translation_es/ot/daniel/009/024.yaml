review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el contenido del hebreo y sigue de cerca el POB en inglés: mantiene «setenta semanas», «están decretadas», la serie de infinitivos finales, «la visión y el profeta», y «el lugar santísimo». También conserva adecuadamente las notas sobre «setenta sietes», «visión y profecía» y la posible lectura personal de קֹדֶשׁ קָדָשִׁים. Sin embargo, hay un desajuste léxico importante en «para acabar con la transgresión», que en español tiende a sonar más interpretativo/idiomático que «to finish the transgression» y puede sugerir eliminación plena más que terminación/llevar a su fin. Además, «justicia eterna» es comprensible, pero «justicia perdurable» o «justicia eterna» ambas son posibles; no requiere cambio por sí mismo.'
  spanish_quality_summary: 'El texto es claro, natural y de registro bíblico moderno. No obstante, un pequeño ajuste mejoraría la fidelidad y la dignidad del estilo: «poner fin a la transgresión» o «terminar la transgresión» representa mejor el hebreo לְכַלֵּא y el inglés auditado «to finish the transgression» que «acabar con», que en español suena más coloquial y algo más fuerte. En la nota d, «un ser santísimo» es inteligible, pero «uno santísimo» o «un santísimo» sería peor; aun así, «un ser santísimo» suena algo raro. Conviene alinearla más de cerca con el inglés: «uno santísimo» no es buen español; mejor «una persona santísima» o «un ser sumamente santo».'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. «Expiación», «iniquidad», «profeta» y «lugar santísimo» están bien alineados con las decisiones léxicas y teológicas auditadas.
  issues:
  - severity: medium
    issue: «para acabar con la transgresión» es más interpretativo que el original auditado
    rationale: El hebreo לְכַלֵּא con הַפֶּשַׁע y la decisión inglesa «to finish the transgression» favorecen una formulación como «poner fin a la transgresión» o «terminar la transgresión». «Acabar con» en español puede implicar erradicar/destruir y sonar más idiomático que estrictamente formal.
  - severity: low
    issue: La nota d usa «un ser santísimo», expresión poco natural
    rationale: Aunque intenta preservar la posibilidad personal de קֹדֶשׁ קָדָשִׁים, «un ser santísimo» no suena del todo natural en español eclesial. «Una persona santísima» comunica mejor la alternativa sin forzar una lectura doctrinal.
  revised_spanish_text: 'Setenta semanas[a] están decretadas sobre tu pueblo y sobre tu ciudad santa: para poner fin a la transgresión, para sellar los pecados, para hacer expiación por la iniquidad, para traer justicia eterna, para sellar la visión y el profeta[c][b], y para ungir el lugar santísimo[d].'
  revised_footnotes:
