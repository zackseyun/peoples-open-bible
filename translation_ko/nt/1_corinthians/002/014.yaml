id: 1CO.2.14
reference: '1 Corinthians 2:14'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ψυχικὸς δὲ ἄνθρωπος οὐ δέχεται τὰ τοῦ πνεύματος τοῦ θεοῦ, μωρία γὰρ αὐτῷ ἐστίν, καὶ οὐ δύναται γνῶναι, ὅτι πνευματικῶς ἀνακρίνεται·
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/002/014.yaml
  text: But the natural person does not accept the things of the Spirit of God[a], for they are foolishness to him, and he is not able to know them[b], because they are spiritually discerned.
  footnotes:
  - marker: a
    text: Or “the unspiritual person.”
    reason: lexical_alternative
  - marker: b
    text: Or “are evaluated” or “are examined.”
    reason: lexical_alternative
translation:
  language: ko
  text: 혼적인 사람은 하나님의 영의 일들을 받아들이지 않으니, 그것이 그에게는 어리석음이고, 알 수도 없습니다. 이는 그것들이 영적으로 분별되기 때문입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ψυχικὸς ἄνθρωπος
  english_pob_choice: the natural person
  chosen_korean: 혼적인 사람
  alternatives_korean:
  - 자연적 사람
  - 혼에 속한 사람
  lexicon: BDAG
  rationale: ψυχικός는 ψυχή(혼)에서 파생된 형용사로, 영(πνεῦμα)을 받지 않은 「혼적」 인간을 가리킨다. 「자연적」은 의역으로 손실이 크고, 본 POB는 πνευματικός/ψυχικός/σαρκικός 세 항을 어휘적으로 구분해 「영적/혼적/육적」으로 옮긴다.
- source_word: τὰ τοῦ πνεύματος τοῦ θεοῦ
  english_pob_choice: the things of the Spirit of God
  chosen_korean: 하나님의 영의 일들
  alternatives_korean:
  - 하나님의 영에 속한 것들
  lexicon: BDAG
  rationale: 11절의 τὰ τοῦ θεοῦ와 일관.
- source_word: πνευματικῶς ἀνακρίνεται
  english_pob_choice: are spiritually discerned
  chosen_korean: 영적으로 분별되기
  alternatives_korean:
  - 영적으로 판단되기
  lexicon: BDAG
  rationale: ἀνακρίνω의 사법적·시험적 「분별·판정」 함의.
theological_decisions:
- issue: 'πνευματικός / ψυχικός / σαρκικός 어휘 체계 (2:14–15; 3:1–3)'
  chosen_reading: 세 항을 각각 「영적」/「혼적」/「육적」으로 구분 번역
  alternative_readings:
  - 「혼적」을 「자연적」으로 의역하여 ψυχικός의 인간학적 무게를 약화시키는 전통적 선택
  rationale: '바울은 본 절들에서 인간을 πνεῦμα·ψυχή·σάρξ의 세 차원으로 구분하여 영을 받았는지 여부를 핵심 기준으로 삼는다. 영어 POB가 「natural」로 의역한 것은 한국어로 「자연적」이 되면 어휘 체계가 사라지므로, 본 POB는 셋을 「영적/혼적/육적」으로 일관되게 구분한다. 14–15절은 πνευματικός/ψυχικός 짝, 3:1–3은 πνευματικός/σαρκικός 짝이다.'
  doctrine_reference: 'DOCTRINE.md §1: 원저자가 청중에게 의도한 의미 보존; §5: 원어 어휘 체계의 일관성'
