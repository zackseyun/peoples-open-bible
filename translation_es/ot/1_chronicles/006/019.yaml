translation:
  language: es
  text: hijo de Elcaná, hijo de Jeroham, hijo de Eliel, hijo de Tohá[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Tohá; algunos comparan la genealogía paralela de 1 Samuel 1:1, donde aparece Nahat en una posición correspondiente.
