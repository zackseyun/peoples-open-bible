  yaml_path: translation/ot/ezekiel/006/009.yaml
  text: Then your survivors will remember me among the nations where they were taken captive[a], when I have broken their whoring heart that turned away from me, and their eyes that whored after their idols[c][b]; and they will loathe themselves for the evils they committed in all their abominations.
  footnotes:
  - marker: a
    text: Or, 'when I was broken by their whoring heart that turned away from me.' The Hebrew verb can be understood this way by some interpreters, emphasizing the LORD's grief over their unfaithfulness.
    reason: alternative_reading
  - marker: b
    text: The Hebrew uses prostitution imagery ('whoring heart,' 'eyes that whored') as a metaphor for covenant unfaithfulness and idolatry.
    reason: cultural_note
  - marker: c
    text: '''Idols'' translates a contemptuous Hebrew term often used by Ezekiel for false gods; it may carry a pejorative nuance such as ''filthy idols.'''
    reason: lexical_alternative
