review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: custodia hasta la fecha indicada, sujeto corporativo para la acción, y mantenimiento del modismo temporal con nota. Sin embargo, hay dos desajustes importantes. Primero, «lo sacrificará» pone el verbo en singular, mientras que el sujeto español «toda la asamblea de la congregación de Israel» requiere plural si se mantiene la acción corporativa; además, el hebreo וְשָׁחֲטוּ es 3cp. Segundo, «sacrificarán» sería aceptable, pero «degollarán» o «matarán ritualmente» se acerca más al valor de שׁחט sin introducir más teología cultual de la necesaria; aun así, «sacrificarán» puede mantenerse por legibilidad bíblica.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero «entre las dos tardes» suena algo rígido y poco natural en español general; no es incorrecto, pero conviene apoyarlo con la nota, como ya se hace. La corrección más necesaria es la concordancia verbal: «toda la asamblea... lo sacrificará» resulta gramaticalmente forzada por la larga construcción colectiva. «Toda la asamblea... lo sacrificará» además puede sonar como sujeto singular institucional, pero el hebreo y la lógica española quedan mejor con «toda la asamblea... lo sacrificará/lo sacrificará»; no obstante, para respetar וְשָׁחֲטוּ y la lectura corporativa, la mejor solución es reformular el sujeto colectivo en plural implícito mediante «toda la congregación de la asamblea de Israel» no es buena. Más simple: mantener el sujeto y usar «sacrificará» sigue siendo discutible; por fidelidad al plural hebreo, debe ser «lo sacrificarán» con sujeto colectivo entendido corporativamente. En español bíblico esto es aceptable.'
  glossary_alignment: No hay términos del glosario principal directamente implicados como Yahvé/Mesías. La decisión de conservar el modismo «entre las dos tardes» está alineada con la revisión inglesa que prefirió mayor literalidad. La retención de la doble expresión colectiva también está alineada con la rationale auditada.
  issues:
  - severity: high
    issue: Discordancia y pérdida del plural verbal en «lo sacrificará».
    rationale: El hebreo וְשָׁחֲטוּ está en 3ª plural, y la decisión teológica inglesa insiste en preservar el sujeto corporativo sin resolverlo. «Lo sacrificará» introduce singular y debilita esa correspondencia.
  - severity: medium
    issue: «Entre las dos tardes» es muy literal pero poco idiomático en español actual.
    rationale: Puede mantenerse por fidelidad, pero necesita la nota para evitar opacidad. Dado que la nota ya existe, no exige rechazo; solo conviene pulir el resto para que el conjunto suene natural.
  - severity: low
    issue: «día catorce» es entendible, pero «día catorce» suena menos formal que «día catorce»/«día catorce» frente a «día catorce».
    rationale: No es un error. «el día catorce» es comprensible y fiel. No requiere cambio obligatorio.
  revised_spanish_text: Y será guardado por ustedes hasta el día catorce de este mes, y toda la asamblea de la congregación de Israel lo sacrificarán entre las dos tardes[a].
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «entre las dos tardes», un giro idiomático que suele entenderse como el tiempo alrededor del anochecer o del crepúsculo.'
    reason: lexical_alternative
  revision_rationale: Se corrige el verbo final a plural para reflejar וְשָׁחֲטוּ y preservar la lectura corporativa documentada por la POB inglesa. También se mueve la nota al modismo temporal, que es donde realmente corresponde el apoyo explicativo. Se mantiene «entre las dos tardes» por fidelidad al hebreo y al rastro de auditoría inglés.
