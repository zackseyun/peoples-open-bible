base_translation:
  language: en
  yaml_path: translation/ot/isaiah/034/013.yaml
  text: Thorns will grow over her palaces[a], nettles and brambles in her fortresses; and she will become a haunt of jackals[b], a pasture for ostriches.
  footnotes:
  - marker: a
    text: Or simply, 'for ostriches.' The Hebrew reads literally, 'for daughters of the ostrich,' an idiomatic expression for ostriches.
    reason: lexical_alternative
  - marker: b
    text: '''Jackals'' is the likely sense here; older English versions often have ''dragons.'''
    reason: alternative_reading
