review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y la línea del English POB: preserva la metáfora de לַמְאַהֲבַי como «mis amantes», traduce רִמּוּנִי con «me engañaron», mantiene «mis sacerdotes y mis ancianos», y refleja adecuadamente el valor circunstancial de כִּי con «mientras». El punto principal a corregir es וְיָשִׁיבוּ אֶת נַפְשָׁם: «para reanimar sus vidas» suena poco idiomático en español y distorsiona el matiz de restaurar/recobrar la vida o las fuerzas.'
  spanish_quality_summary: 'El español es en general claro y digno, pero «para reanimar sus vidas» resulta extraño y algo mecánico; en español bíblico-natural funciona mejor «para recobrar la vida» o «para restaurar sus vidas». Además, la nota [b] está mal anclada: explica una alternativa para la cláusula final de כִּי, pero el marcador aparece sobre «me engañaron». Conviene moverla al segmento final pertinente.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Sacerdotes», «ancianos» y la preservación de la metáfora «amantes» concuerdan con la racionalidad documentada. La corrección propuesta mejora la representación de נֶפֶשׁ como «vida» sin introducir «alma» ni una formulación forzada.
  issues:
  - severity: medium
    issue: «para reanimar sus vidas» es poco idiomático en español
    rationale: Aunque intenta reflejar el plural del sufijo hebreo, la expresión suena antinatural. El hebreo וְיָשִׁיבוּ אֶת נַפְשָׁם expresa recobrar/restaurar la vida o las fuerzas; «para recobrar la vida» comunica mejor el sentido en español.
  - severity: medium
    issue: La nota [b] está anclada en la frase equivocada
    rationale: La nota habla de una lectura causal de כִּי בִקְשׁוּ... וְיָשִׁיבוּ..., no de «ellos me engañaron». El marcador debe colocarse en la cláusula final donde surge la alternativa.
  revised_spanish_text: Llamé a mis amantes[a]; ellos me engañaron. Mis sacerdotes y mis ancianos perecieron en la ciudad mientras buscaban alimento para sí mismos para recobrar la vida[b].
  revised_footnotes:
  - marker: a
    text: «Amantes» preserva la metáfora hebrea. En este contexto puede aludir a aliados políticos o a objetos de confianza mal depositada; el texto hebreo no obliga a especificar más en el versículo.
    reason: cultural_note
  - marker: b
    text: 'También puede entenderse: «porque buscaban alimento para sí mismos para recobrar la vida». El hebreo permite una relación más causal en la cláusula.'
    reason: lexical_alternative
  revision_rationale: Se ajustó la cláusula final para un español más natural y fiel al sentido de restaurar/recobrar la vida, y se reubicó la nota [b] al lugar textual correspondiente a la alternativa causal documentada en el English POB.
