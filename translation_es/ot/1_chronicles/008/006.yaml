review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura genealógica del hebreo y conserva adecuadamente ''hijos de'', ''jefes de las casas paternas'' y ''Geba''. Sin embargo, el giro final ''los llevaron cautivos a Manahat'' no reproduce con suficiente precisión el valor de גלה en Hifil como traslado al exilio; ''cautivos'' puede sugerir captura bélica más que deportación/exilio. Además, la nota a no sigue la pista del POB inglés: allí la nota va ligada a ''Ehud'' por una cuestión de posible amplitud genealógica/encabezamiento, mientras que en español el contenido de la nota sobre ''hijos de'' es posible pero no el más necesario. Conviene también mantener la alternativa léxica documentada sobre ''los llevaron al exilio''.'
  spanish_quality_summary: El español es claro y eclesialmente legible. 'Casas paternas' funciona bien y la sintaxis es natural. La principal mejora estilística y semántica es reemplazar 'los llevaron cautivos' por 'los llevaron al exilio', que suena natural en español bíblico moderno y refleja mejor el hebreo. También es preferible unificar la transliteración del topónimo como 'Manahat' según el borrador español o 'Manahat/Manahath' con criterio consistente; aquí basta con conservar 'Manahat'.
  glossary_alignment: No hay términos del glosario principal en juego salvo nombres propios. 'Ehud', 'Geba' y 'Manahat' están aceptables. La decisión 'casas paternas' concuerda con la justificación lexical del POB y evita aplanar la frase a 'familias'.
  issues:
  - severity: medium
    issue: '''los llevaron cautivos'' no expresa de forma óptima el sentido de exilio/deportación'
    rationale: וַיַּגְלוּם indica causar que fueran al exilio. 'Cautivos' puede desplazar el sentido hacia prisioneros de guerra, mientras que el POB inglés revisado optó por 'carried them into exile' precisamente para mantener ese matiz.
  - severity: low
    issue: La nota [a] no es la más alineada con la necesidad interpretativa principal del pasaje
    rationale: La nota inglesa en ese marcador no explica 'hijos de' sino la frase social/técnica. En español ya existe una buena nota [b] para 'casas paternas'; la nota [a] sobre amplitud genealógica no es errónea, pero es menos necesaria aquí.
  - severity: low
    issue: Falta nota de alternativa léxica para el verbo final
    rationale: El POB inglés conserva una alternativa de traducción para la cláusula final. La revisión española debe preservar una nota equivalente si se ajusta el texto principal.
  revised_spanish_text: 'Estos eran los hijos de Ehud. Estos eran los jefes de las casas paternas[a] de los habitantes de Geba, y los llevaron al exilio a Manahat[b]:'
  revised_footnotes:
  - marker: a
    text: La expresión 'casas paternas' traduce una unidad de linaje o casa ancestral, no solo una familia nuclear.
    reason: cultural_note
  - marker: b
    text: 'O: ''y los llevaron al destierro a Manahat''.'
    reason: lexical_alternative
  revision_rationale: Se ajusta el verbo final para reflejar mejor el sentido de exilio forzado de גלה y para alinearlo con la revisión auditada del POB inglés. Se conserva 'casas paternas' con su nota explicativa, y se añade una nota de alternativa léxica para la cláusula final. La nota anterior sobre 'hijos de' se elimina por ser menos necesaria en este versículo.
