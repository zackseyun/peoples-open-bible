translation:
  language: es
  text: Y tomará[a], para purificar la casa, dos aves, madera de cedro, hilo escarlata[b] y hisopo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘para limpiar la casa’; el verbo hebreo en este contexto ritual tiene el sentido de purificarla de impureza.
    reason: lexical_alternative
  - marker: b
    text: O ‘hilo carmesí’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַח
  english_pob_choice: And he shall take
  chosen_spanish: Y tomará
  alternatives_spanish:
  - Y ha de tomar
  - Entonces tomará
  lexicon: HALOT
  rationale: En una instrucción ritual, el perfecto con waw puede tener valor modal o futuro. «Tomará» conserva el tono formal y directivo sin volverlo mecánico en español.
- source_word: לְחַטֵּא
  english_pob_choice: to purify the house
  chosen_spanish: para purificar la casa
  alternatives_spanish:
  - para limpiar la casa
  - para hacer expiación por la casa
  lexicon: HALOT
  rationale: El piel de חטא en contexto ritual expresa purificación/depuración cultual, no simplemente limpieza física ni una formulación explícita de expiación. «Purificar» mantiene esa tensión ritual.
- source_word: אֶת הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el hogar
  - la vivienda
  lexicon: HALOT
  rationale: El contexto de Levítico 14 trata de una casa material afectada ritualmente; «casa» es la equivalencia directa y más clara.
- source_word: שְׁתֵּי צִפֳּרִים
  english_pob_choice: two birds
  chosen_spanish: dos aves
  alternatives_spanish:
  - dos pájaros
  - dos aves vivas
  lexicon: HALOT
  rationale: El hebreo dice solo «dos aves». En español «aves» es más sobrio y amplio que «pájaros», y no añade «vivas», que pertenece al contexto cercano pero no a esta cláusula.
- source_word: וְעֵץ אֶרֶז
  english_pob_choice: cedar wood
  chosen_spanish: madera de cedro
  alternatives_spanish:
  - cedro
  - madera de cedro
  lexicon: HALOT
  rationale: La construcción nominal indica el material. «Madera de cedro» preserva el valor concreto de la sustancia usada en el rito.
- source_word: וּשְׁנִי תוֹלַעַת
  english_pob_choice: scarlet yarn
  chosen_spanish: hilo escarlata
  alternatives_spanish:
  - cordón escarlata
  - hebra escarlata
  lexicon: HALOT
  rationale: La expresión señala material teñido de escarlata empleado en el ritual. «Hilo» comunica bien la idea de fibra o cordón sin forzar una precisión textil que el hebreo no exige aquí. Se mantiene el color escarlata como rasgo distintivo.
- source_word: וְאֵזֹב
  english_pob_choice: hyssop
  chosen_spanish: hisopo
  alternatives_spanish:
  - hisopo
  - hyssopo
  lexicon: HALOT
  rationale: «Hisopo» es la equivalencia tradicional y comprensible en español para אֵזוֹב. Aunque la identificación botánica exacta es debatida, el término convencional conserva la referencia ritual.
theological_decisions:
- issue: Sentido ritual de לְחַטֵּא aplicado a una casa
  english_pob_reading: Rendered as ritual purification rather than moral cleansing or explicit atonement.
  chosen_spanish_reading: Renderizado como purificación ritual de la casa, sin añadir ni «limpiar» ni «hacer expiación».
  alternative_spanish_readings:
  - para limpiar la casa
  - para hacer expiación por la casa
  rationale: El verso pertenece a un rito levítico para una casa contaminada. «Purificar» conserva la categoría cultual sin resolver la tensión entre purificación, limpieza y expiación que el hebreo no desglosa aquí.
  doctrine_reference: Mantener la tensión teológica del texto; primacía del idioma original sobre la tradición interpretativa.
translation_notes:
  revision_awareness: Se siguió la revisión auditada que eliminó la adición explicativa «from sin» en inglés. En español, por lo tanto, se evita cualquier glosa equivalente como «de pecado» o «de impureza» en el texto principal, reservando la aclaración semántica para la nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca en otros versículos del proyecto; aquí no aparece.
  - Se usó «purificar» y no «limpiar» en el texto principal para conservar el valor cultual del verbo.
  - Se prefirió «hilo escarlata» como equivalente natural de la materia ritual; la nota conserva la alternativa «carmesí».
  - «Hisopo» se deja sin adaptación adicional, por ser el término español establecido en contextos bíblicos.
