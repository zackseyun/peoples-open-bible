theological_decisions:
- issue: Referent of the participles מַקְטִירוֹת וּמְזַבְּחוֹת
  chosen_reading: The participles describe the foreign wives as the ones burning incense and sacrificing.
  alternative_readings:
  - The participles could be taken more loosely as describing the cultic practice associated with the shrines Solomon made for them.
  rationale: The feminine plural participles agree most directly with 'his foreign wives,' so the plain grammatical sense is that the wives were engaged in these acts of worship. The translation preserves that syntax rather than shifting the action to Solomon or to the shrines.
  doctrine_reference: Translation philosophy §1, §3
- issue: Ellipsis of what Solomon 'did'
  chosen_reading: The translation leaves the object implicit ('he did') and lets the previous verse supply the content.
  alternative_readings:
  - He built high places for all his foreign wives
  - He did the same
  rationale: Hebrew leaves the action elliptical, relying on context. Rendering it simply as 'he did' avoids importing more wording than this verse itself states, while still remaining intelligible in context.
  doctrine_reference: Translation philosophy §1
