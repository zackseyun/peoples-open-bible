translation:
  language: es
  text: Y envió un mensaje por medio de Natán el profeta[b], y llamó su nombre Jedidías[a], por causa de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Jedidías» probablemente significa «amado de Yahvé».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «por la mano de Natán el profeta».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: he sent word
  chosen_spanish: envió un mensaje
  alternatives_spanish:
  - envió
  - mandó decir
  lexicon: HALOT
  rationale: El verbo básico es «enviar», pero el contexto con בְּיַד de Natán indica una comunicación mediada. «Envió un mensaje» conserva el sentido comunicativo sin perder la base verbal ni volverlo excesivamente interpretativo.
- source_word: בְּיַד נָתָן הַנָּבִיא
  english_pob_choice: through Nathan the prophet
  chosen_spanish: por medio de Natán el profeta
  alternatives_spanish:
  - por la mano de Natán el profeta
  - por Natán el profeta
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice «por mano de». En español, «por medio de» comunica con naturalidad la agencia instrumental o mediadora que el hebreo expresa.
- source_word: וַיִּקְרָא אֶת־שְׁמוֹ
  english_pob_choice: he called his name
  chosen_spanish: llamó su nombre
  alternatives_spanish:
  - le puso por nombre
  - lo nombró
  lexicon: HALOT
  rationale: Se mantiene más cerca de la construcción hebrea «llamar el nombre de alguien», que el POB inglés conservó con «he called his name» tras su revisión. «Le puso por nombre» sería idiomático, pero menos transparente respecto de la forma fuente.
- source_word: יְדִידְיָהּ
  english_pob_choice: Jedidiah
  chosen_spanish: Jedidías
  alternatives_spanish:
  - Jedidiah
  lexicon: HALOT
  rationale: Se translitera el nombre propio con adaptación española frecuente de terminación -ías, como otros nombres bíblicos en español. La forma «Jedidías» conserva la identidad nominal y su lectura más natural en español.
- source_word: בַּעֲבוּר
  english_pob_choice: because of
  chosen_spanish: por causa de
  alternatives_spanish:
  - a causa de
  - porque de
  lexicon: HALOT
  rationale: La preposición causal pide una relación de motivo o fundamento. «Por causa de» es natural en español bíblico contemporáneo y refleja bien el valor causal del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Siguiendo la convención del proyecto, el Tetragrámaton se rinde como «Yahvé» en el texto principal, preservando el nombre divino en vez de sustituirlo por un título.
theological_decisions:
- issue: Sujeto implícito de los verbos «envió» y «llamó»
  english_pob_reading: The implied subject is the LORD for both verbs.
  chosen_spanish_reading: El sujeto implícito es Yahvé en ambos verbos.
  alternative_spanish_readings:
  - David como sujeto de «llamó»
  - Natán como sujeto de «llamó»
  rationale: 'El contexto inmediato favorece que la acción provenga de Yahvé: la comunicación llega por medio de Natán y el nombre es dado «por causa de Yahvé». No se introduce otro sujeto para no debilitar la iniciativa divina que el texto presenta.'
  doctrine_reference: Mantener la lectura contextual y la tensión textual donde el hebreo deja el sujeto implícito.
translation_notes:
  revision_awareness: La base inglesa revisó «he named him» a «he called his name» para reflejar más de cerca el hebreo; por eso el español conserva «llamó su nombre» en lugar de una paráfrasis más libre. También se refleja la elección del POB de mantener el nombre divino como Yahvé, no como un sustituto titulado.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה.
  - Se conserva la forma verbal cercana al hebreo («llamó su nombre») para respetar la construcción fuente.
  - El nombre propio se adapta a una forma española natural («Jedidías») sin perder la transliteración reconocible.
