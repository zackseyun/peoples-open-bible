translation:
  language: es
  text: Yahvé hizo cambiar la dirección de un viento del oeste muy fuerte[a], y este se llevó las langostas y las arrojó al mar de los Juncos[b]. No quedó ni una sola langosta en todo el territorio de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ‘viento del mar’; en este contexto se entiende como un viento del oeste.'
    reason: cultural_note
  - marker: b
    text: 'Hebreo: ‘mar de los Juncos’; tradicionalmente, ‘Mar Rojo’.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּהֲפֹךְ
  english_pob_choice: turned
  chosen_spanish: dio vuelta
  alternatives_spanish:
  - volvió
  - cambió
  lexicon: HALOT
  rationale: El verbo expresa cambio de dirección o volteo; en español, ‘dio vuelta’ comunica bien la acción sobre el viento sin sonar forzado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino según el criterio del proyecto; ‘Yahvé’ es la forma establecida en el español de esta traducción y evita sustituirlo por un título.
- source_word: רוּחַ יָם
  english_pob_choice: west wind
  chosen_spanish: viento del mar
  alternatives_spanish:
  - viento occidental
  - viento del mar Mediterráneo
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘viento del mar’. Aunque el contexto apunta a un viento del oeste, el español principal conserva la imagen fuente, dejando la precisión direccional implícita por el contexto y en nota.
- source_word: חָזָק מְאֹד
  english_pob_choice: very strong
  chosen_spanish: muy fuerte
  alternatives_spanish:
  - sumamente fuerte
  - extremadamente fuerte
  lexicon: HALOT
  rationale: Es una intensificación directa y natural en español moderno, fiel al énfasis hebreo.
- source_word: וַיִּשָּׂא אֶת־הָאַרְבֶּה
  english_pob_choice: it carried away the locusts
  chosen_spanish: se llevó las langostas
  alternatives_spanish:
  - las cargó
  - las levantó y se las llevó
  lexicon: HALOT
  rationale: Con el viento como sujeto, ‘se llevó’ expresa de forma idiomática que las apartó o arrastró fuera del lugar.
- source_word: וַיִּתְקָעֵהוּ
  english_pob_choice: drove them
  chosen_spanish: las arrojó
  alternatives_spanish:
  - las empujó
  - las lanzó
  lexicon: HALOT
  rationale: El verbo indica forzar o impulsar con violencia hacia un destino; ‘las arrojó’ comunica ese empuje con naturalidad en español.
- source_word: יָמָּה סּוּף
  english_pob_choice: Sea of Reeds
  chosen_spanish: mar de Suf
  alternatives_spanish:
  - mar de los Juncos
  - Mar Rojo
  lexicon: HALOT
  rationale: Se preserva el topónimo fuente ‘Suf’ para mantener la referencia hebrea y la tensión con la traducción tradicional; la tradición ‘Mar Rojo’ se evita en el texto principal, como en el audit trail inglés.
- source_word: לֹא נִשְׁאַר אַרְבֶּה אֶחָד
  english_pob_choice: Not one locust remained
  chosen_spanish: No quedó ni una sola langosta
  alternatives_spanish:
  - No quedó una langosta
  - No permaneció ni una langosta
  lexicon: HALOT
  rationale: ‘No quedó’ refleja היטב la idea de permanecer/restar; ‘ni una sola’ reproduce la fuerza enfática del hebreo ‘una’ en singular.
- source_word: בְּכֹל גְּב֥וּל מִצְרָיִם
  english_pob_choice: in all the territory of Egypt
  chosen_spanish: en todo el territorio de Egipto
  alternatives_spanish:
  - en toda la frontera de Egipto
  - por todo Egipto
  lexicon: HALOT
  rationale: ‘Territorio’ expresa bien גְּבֻל como extensión o dominio del país, sin reducirlo a una línea fronteriza.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se mantiene el nombre propio divino en lugar de una sustitución por título. Esto sigue la línea del POB en inglés y la terminología española ya fijada para יְהוָה.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Topónimo יָם סּוּף
  english_pob_reading: Sea of Reeds
  chosen_spanish_reading: mar de Suf
  alternative_spanish_readings:
  - Mar Rojo
  - mar de los Juncos
  rationale: La traducción principal conserva el elemento hebreo ‘Suf’ para priorizar el original y no cerrar prematuramente la identificación tradicional. La equivalencia tradicional se reserva para nota o contexto catequético.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §1: Original-language primacy over translation tradition'
translation_notes:
  revision_awareness: La base inglesa fue revisada de ‘sea wind’ a ‘west wind’ por precisión contextual de רוּחַ יָם. En español se optó por mantener la imagen hebrea ‘viento del mar’ en el texto principal y explicar en nota que el sentido contextual es un viento del oeste, evitando perder la huella del original mientras se preserva la precisión interpretativa.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente para el Tetragrammaton.
  - Se conserva ‘mar de Suf’ para mantener la toponimia hebrea, con nota orientadora sobre la traducción tradicional.
  - ‘Langostas’ traduce אַרְבֶּה con el sentido zoológico estándar y en plural colectivo como en el hebreo.
  - El tono es formal y bíblico sin depender de fórmulas tradicionales que oculten el nombre divino.
