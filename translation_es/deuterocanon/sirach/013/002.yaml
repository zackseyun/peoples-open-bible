review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien el hebreo como texto principal y conserva correctamente la nota sobre la expansión griega («más fuerte»). También incluye las dos cláusulas restauradas del versículo. Sin embargo, en la segunda pregunta comparativa el español introduce «¿Con qué puede...?» en lugar de reflejar el sentido de «¿Qué puede unirse...?»; y «Él lo golpea» deja ambiguo el referente, cuando el hebreo contrasta la vasija que choca con el tiesto y este se rompe.
  spanish_quality_summary: El español es mayormente claro y digno, pero hay giros mejorables. «Lo que es más pesado que tú» es aceptable, aunque algo literal; se puede mantener por fidelidad al POB inglés. «¿Con qué puede un tiesto unirse a una vasija?» suena menos natural y cambia el matiz semántico. «Él lo golpea» es torpe y ambiguo; conviene explicitar el sujeto y objeto con una redacción natural en español.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La decisión de no introducir «más fuerte» en el texto principal y conservarlo en nota está alineada con la política de seguir el hebreo de Sirácida donde existe.
  issues:
  - severity: medium
    issue: «¿Con qué puede un tiesto unirse a una vasija?» cambia el sentido de la pregunta
    rationale: El hebreo/inglés preguntan qué puede ser unido/juntado, no con qué medio. «¿Qué puede unirse un tiesto a una vasija?» o mejor «¿Qué puede unir a un tiesto con una vasija?» reflejan mejor la construcción comparativa.
  - severity: medium
    issue: «Él lo golpea, y se rompe» es ambiguo
    rationale: 'En el hebreo, la vasija golpea al tiesto y este se rompe. La redacción actual no permite identificar con claridad quién golpea a quién. Debe explicitarse: «la golpea y se rompe» o equivalente, refiriendo la vasija al tiesto.'
  - severity: low
    issue: «uno más rico que tú» es comprensible pero algo coloquial
    rationale: «alguien más rico que tú» suena un poco más natural en español general, aunque la forma actual no es infiel.
  revised_spanish_text: 'Lo que es más pesado que tú[a], no lo lleves; y con alguien más rico que tú, no te asocies. ¿Qué puede unir a un tiesto con una vasija? Esta lo golpea, y se rompe. ¿O qué puede unirse: un rico con un pobre?'
  revised_footnotes:
  - marker: a
    text: 'Griego: «No levantes una carga más allá de ti, y no compartas con uno más fuerte y más rico que tú». El griego añade «más fuerte» además de «más rico».'
    reason: alternative_reading
  revision_rationale: 'Se hacen ajustes menores para reflejar con más precisión la sintaxis y la imagen del hebreo: se corrige la pregunta del tiesto y la vasija para evitar el matiz instrumental no presente en la fuente, se aclara quién golpea a quién, y se suaviza ligeramente «uno» a «alguien» para mejor naturalidad en español general. Se mantiene la nota textual sobre la expansión griega y la fidelidad al hebreo en el cuerpo principal.'
