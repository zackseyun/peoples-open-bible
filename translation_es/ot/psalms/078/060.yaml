translation:
  language: es
  text: Así abandonó el tabernáculo de Silo, la tienda donde habitó entre la humanidad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre los seres humanos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּטֹּשׁ
  english_pob_choice: abandoned
  chosen_spanish: abandonó
  alternatives_spanish:
  - dejó
  - desamparó
  - rechazó
  lexicon: HALOT
  rationale: נטשׁ expresa dejar atrás o abandonar. «Abandonó» comunica con naturalidad en español la retirada divina del santuario sin añadir matices que el hebreo no exige.
- source_word: מִשְׁכַּן
  english_pob_choice: tabernacle
  chosen_spanish: tabernáculo
  alternatives_spanish:
  - morada
  - santuario
  - lugar de habitación
  lexicon: HALOT
  rationale: מִשְׁכַּן designa la morada/santuario de Dios; «tabernáculo» conserva el sentido cultual e histórico y mantiene el paralelismo con «tienda».
- source_word: שִׁלֹה
  english_pob_choice: Shiloh
  chosen_spanish: Silo
  alternatives_spanish:
  - Siló
  - Shiloh
  lexicon: nombre propio
  rationale: Es un nombre de lugar; «Silo» es la forma española asentada y clara para lectores bíblicos en español.
- source_word: אֹהֶל
  english_pob_choice: tent
  chosen_spanish: tienda
  alternatives_spanish:
  - tabernáculo
  - morada
  lexicon: HALOT
  rationale: «Tienda» distingue este término de מִשְׁכַּן y preserva el paralelismo poético del hebreo.
- source_word: שִׁכֵּן
  english_pob_choice: dwelt
  chosen_spanish: habitó
  alternatives_spanish:
  - moró
  - se estableció
  - puso su morada
  lexicon: HALOT
  rationale: El verbo expresa la presencia habitable de Dios; «habitó» es idiomático y adecuado en español para este contexto.
- source_word: בָּאָדָם
  english_pob_choice: among humankind
  chosen_spanish: entre la humanidad
  alternatives_spanish:
  - entre los hombres
  - entre la gente
  - entre los seres humanos
  lexicon: HALOT
  rationale: אָדָם funciona aquí en sentido colectivo/generic. «Entre la humanidad» expresa con claridad el valor inclusivo y evita la ambigüedad de una lectura masculina o de la awkwardness de un singular genérico en español.
theological_decisions:
- issue: Lugar de la presencia divina
  english_pob_reading: The verse speaks of God's sanctuary/tent at Shiloh as the place where he dwelt among human beings.
  chosen_spanish_reading: El versículo presenta el tabernáculo de Silo como el lugar de la presencia de Dios entre la humanidad.
  alternative_spanish_readings:
  - El versículo puede leerse como que Dios estableció su tienda entre la gente.
  - El verso resalta el abandono del santuario más que el modo de la presencia.
  rationale: La construcción hebrea asocia el tabernáculo/tienda con la presencia divina. «Habitó entre la humanidad» conserva esa afirmación sin sobreespecificar el mecanismo.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor colectivo de אָדָם
  english_pob_reading: man / humankind
  chosen_spanish_reading: la humanidad
  alternative_spanish_readings:
  - el hombre
  - los hombres
  - los seres humanos
  rationale: Aunque el hebreo usa un singular colectivo, en español «la humanidad» comunica de forma natural el alcance general sin perder la referencia colectiva.
  doctrine_reference: Translation philosophy §4; Contested terms table for אָדָם
translation_notes:
  revision_awareness: Se incorporó la revisión que prefiere «of Shiloh» en inglés como reflejo del constructo; en español eso se expresa naturalmente con «de Silo». También se atendió la revisión que evita un singular genérico poco natural en favor de una formulación colectiva clara.
  spanish_consistency_notes:
  - Se mantiene la distinción entre «tabernáculo» (מִשְׁכַּן) y «tienda» (אֹהֶל).
  - Se usa «Silo» como forma española del topónimo.
  - «Humanidad» refleja el valor colectivo de אָדָם sin masculinizar el referente.
  - No se introdujeron notas sin anclaje; el marcador [a] aparece en el texto.
