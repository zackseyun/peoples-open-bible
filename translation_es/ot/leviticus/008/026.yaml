  to: Y del canasto de los panes sin levadura que estaba delante de Yahvé, tomó una torta sin levadura, una torta de pan con aceite[a] y una oblea, y las puso sobre las porciones de grasa y sobre el muslo derecho.
  rationale: Se corrige «galleta» a «oblea» para reflejar mejor רָקִיק en contexto sacrificial y se reubica la nota al sintagma «con aceite», que es donde existe la ambigüedad léxica documentada por el POB inglés. No se requiere cambio en «delante de Yahvé», que ya traduce fielmente לִפְנֵי יְהוָה.
