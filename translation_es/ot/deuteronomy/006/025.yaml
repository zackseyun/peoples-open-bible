translation:
  language: es
  text: Y será rectitud[a] para nosotros si cuidamos de hacer todo este mandamiento[b] delante de Yahvé nuestro Dios, como él nos ha mandado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «justicia». El hebreo צְדָקָה puede denotar lo que es recto o justo; aquí «rectitud» expresa mejor el sentido pactual, aunque «justicia» también es posible.
    reason: lexical_alternative
  - marker: b
    text: O «este mandamiento entero». El singular probablemente se refiere al mandamiento como una instrucción unificada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּצְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia para nosotros
  - justicia/correctitud
  lexicon: HALOT
  rationale: צְדָקָה puede designar lo recto o justo; en español, «justicia» conserva mejor esa amplitud semántica y evita forzar una formulación doctrinal más técnica que el hebreo no exige aquí. Como la POB inglesa abrió la alternativa «justice», la versión española mantiene esa posibilidad mediante la nota.
- source_word: תִּהְיֶה לָּנוּ
  english_pob_choice: it will be ... for us
  chosen_spanish: será ... para nosotros
  alternatives_spanish:
  - será ... de nosotros
  - nos contará como ...
  - será ... para nosotros
  lexicon: HALOT
  rationale: La construcción predicativa-existencial del hebreo se reproduce con «será ... para nosotros», preservando el valor relacional sin añadir una noción de imputación que el texto no explicita.
- source_word: כִּי
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - porque
  - cuando
  lexicon: HALOT
  rationale: Aquí introduce la condición bajo la cual se cumple la afirmación anterior; «si» es el equivalente natural y preciso en español.
- source_word: נִשְׁמֹר
  english_pob_choice: we are careful
  chosen_spanish: cuidamos
  alternatives_spanish:
  - guardamos
  - observamos
  - nos cuidamos de
  lexicon: HALOT
  rationale: El verbo שׁמר incluye la idea de guardar con atención. En español, «cuidamos de hacer» transmite bien el matiz de vigilancia/atención antes del infinitivo siguiente y evita una repetición pesada con «observar».
- source_word: לַעֲשׂוֹת
  english_pob_choice: to do
  chosen_spanish: de hacer
  alternatives_spanish:
  - para hacer
  - a hacer
  - para cumplir
  lexicon: HALOT
  rationale: Se conserva el verbo ordinario «hacer», siguiendo de cerca el hebreo עשה y manteniendo la estructura «cuidar de hacer».
- source_word: כָּל הַמִּצְוָה הַזֹּאת
  english_pob_choice: all this commandment
  chosen_spanish: todo este mandamiento
  alternatives_spanish:
  - toda esta ordenanza
  - todo este mandamiento
  - toda esta instrucción
  lexicon: HALOT
  rationale: El singular מִצְוָה con el demostrativo probablemente alude al mandamiento como unidad. «Todo este mandamiento» reproduce esa unidad y la fuerza de כָּל sin diluirla en plural.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: «Delante de» es un equivalente natural de לִפְנֵי y comunica adecuadamente la idea de estar bajo la mirada o en la presencia de Dios.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Siguiendo el estándar POB en español, se translitera el Tetragrámaton como «Yahvé», preservando el nombre divino propio en lugar de una sustitución por título.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestro Dios
  - el Dios nuestro
  lexicon: HALOT
  rationale: Se mantiene el valor posesivo y relacional del hebreo con la forma natural «nuestro Dios».
- source_word: כַּאֲשֶׁר צִוָּנוּ
  english_pob_choice: as he has commanded us
  chosen_spanish: como él nos ha mandado
  alternatives_spanish:
  - como nos mandó
  - tal como nos mandó
  - según nos ha mandado
  lexicon: HALOT
  rationale: «Mandar» expresa bien צוה en español bíblico moderno y «como él nos ha mandado» conserva la referencia al mandato ya dado, sin sobrecargar el aspecto verbal.
theological_decisions:
- issue: Sentido de צְדָקָה en un contexto de obediencia del pacto
  english_pob_reading: The verse states that such obedience 'will be righteousness for us' in the covenantal sense of being regarded as right before God, without specifying a later doctrinal mechanism of imputation.
  chosen_spanish_reading: 'La obediencia descrita «será justicia para nosotros» en sentido pactual: algo recto/justo ante Dios, sin introducir una mecánica doctrinal posterior que el texto no declara.'
  alternative_spanish_readings:
  - será rectitud para nosotros
  - nos será contado como justicia en sentido técnico
  rationale: El hebreo afirma una relación real entre obediencia y justicia, pero no obliga a explicar esa relación con categorías sistemáticas posteriores. La traducción conserva la tensión teológica del texto en vez de resolverla.
  doctrine_reference: Preservar la tensión teológica en vez de armonizarla con un sistema posterior.
- issue: Referencia del mandamiento singular
  english_pob_reading: Or 'this whole commandment.' The singular 'commandment' likely refers to the instruction as a unified whole.
  chosen_spanish_reading: «Todo este mandamiento» mantiene la lectura de una instrucción unificada, no un conjunto fragmentado de preceptos.
  alternative_spanish_readings:
  - «este mandamiento entero»
  - «toda esta instrucción»
  rationale: El singular hebreo con el demostrativo sugiere una unidad normativa. La redacción española respeta esa lectura sin forzar una explicación adicional.
  doctrine_reference: Unidad de la instrucción del pacto en el contexto deuteronómico.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés, conservando la estructura condicional, el valor pactual de צְדָקָה y la lectura unificada de הַמִּצְוָה. Se ajustó el orden para sonar natural en español sin perder correspondencias léxicas clave.
  spanish_consistency_notes:
  - Se usó «Yahvé» para יהוה conforme al estándar POB en español.
  - Se mantuvo «mandamiento» en singular, con nota alternativa, para reflejar la unidad del hebreo.
  - Se prefirió «justicia» sobre «rectitud» como opción principal por su amplitud semántica en el contexto pactual.
  - La sintaxis española evita calcos rígidos, pero conserva la relación condicional y predicativa del hebreo.
