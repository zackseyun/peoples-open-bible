translation:
  language: es
  text: Entonces, Gaal salió[a] delante de los líderes de Siquem y combatió contra Abimélec.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la cabeza de los líderes de Siquem», reflejando la fuerza idiomática de «delante de» en este contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - fue
  - salió hacia afuera
  lexicon: HALOT
  rationale: El qal wayyiqtol de יצא se usa aquí como verbo narrativo de movimiento. En español, «salió» conserva la acción simple y natural sin sobretraducir ni introducir un matiz adicional que el hebreo no exige.
- source_word: גַעַל
  english_pob_choice: Gaal
  chosen_spanish: Gaal
  alternatives_spanish:
  - Gaal
  lexicon: Nombre propio
  rationale: Se conserva el nombre propio con transliteración estándar al español, sin traducirlo.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  - a la cabeza de
  lexicon: HALOT
  rationale: La preposición expresa literalmente posición «antes/frente a». En este contexto narrativo y militar, «delante de» mantiene la imagen espacial del hebreo y es suficientemente natural en español. La alternativa idiomática de liderazgo se consigna en la nota.
- source_word: בַּעֲלֵי שְׁכֶם
  english_pob_choice: the leaders of Shechem
  chosen_spanish: los líderes de Siquem
  alternatives_spanish:
  - los señores de Siquem
  - los hombres de Siquem
  - los ciudadanos de Siquem
  lexicon: HALOT
  rationale: בעלים aquí apunta a los hombres principales o dirigentes de la ciudad. «Líderes» transmite ese sentido político sin cargar el término con un matiz feudal que «señores» podría sugerir en español.
- source_word: וַיִּלָּחֶם
  english_pob_choice: fought
  chosen_spanish: peleó
  alternatives_spanish:
  - luchó
  - combatió
  - hizo guerra
  lexicon: HALOT
  rationale: El verbo denota combatir/entrar en pelea. «Peleó» es directo y natural en español narrativo; mantiene el valor de acción bélica sin exagerar a una fórmula más pesada.
- source_word: בַּאֲבִימֶלֶךְ
  english_pob_choice: against Abimelech
  chosen_spanish: contra Abimélec
  alternatives_spanish:
  - con Abimélec
  lexicon: HALOT
  rationale: Con לחם, la preposición marca al oponente. En español, «contra» reproduce claramente la oposición implícita y evita la ambigüedad de «con».
translation_notes:
  revision_awareness: El inglés POB siguió una equivalencia óptima estable y no registró cambios posteriores; el texto español mantiene esa misma lectura, conservando la referencia espacial de לִפְנֵי y la oposición militar de בַּאֲבִימֶלֶךְ sin añadir elementos ajenos al hebreo.
  spanish_consistency_notes:
  - Se prefirió «Siquem» como forma española habitual del topónimo bíblico.
  - Se evitó «señores» para בעלי por su posible matiz anacrónico en español.
  - La construcción «peleó contra» refleja adecuadamente la relación de oposición verbal en el hebreo.
