translation:
  language: es
  text: Tomará un poco de la sangre del toro y la rociará con su dedo sobre el frente de la cubierta de expiación[a], hacia el oriente; y delante de la cubierta de expiación rociará de la sangre con su dedo siete veces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "propiciatorio". El hebreo kapporet se refiere a la cubierta del arca, el lugar asociado con la expiación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַח
  english_pob_choice: And he shall take
  chosen_spanish: Tomará
  alternatives_spanish:
  - Y tomará
  - Entonces tomará
  lexicon: HALOT
  rationale: En una instrucción ritual, el imperfecto consecutivo funciona con valor modal/procedural. En español, el futuro simple expresa bien esa secuencia normativa sin volverlo narrativo en pasado.
- source_word: מִדַּם הַפָּר
  english_pob_choice: some of the bull's blood
  chosen_spanish: un poco de la sangre del toro
  alternatives_spanish:
  - un poco de sangre del toro
  - tomará parte de la sangre del toro
  lexicon: HALOT
  rationale: מִן aquí es partititivo; por eso conviene marcar que no es toda la sangre, sino una porción. 'Toro' refleja הַפָּר con naturalidad en español y mantiene el referente sacrificial.
- source_word: וְהִזָּה
  english_pob_choice: sprinkle
  chosen_spanish: la rociará
  alternatives_spanish:
  - la salpicará
  - la asperjará
  lexicon: HALOT
  rationale: En contexto ritual, נזה refiere a la aplicación de sangre por aspersión. 'Rociar' es claro y natural en español, aunque 'asperjar' conserva más directamente el registro litúrgico técnico.
- source_word: בְאֶצְבָּעוֹ
  english_pob_choice: with his finger
  chosen_spanish: con su dedo
  alternatives_spanish:
  - por medio de su dedo
  - usando su dedo
  lexicon: HALOT
  rationale: El bet indica instrumento; 'con su dedo' es la forma más natural y precisa en español.
- source_word: עַל פְּנֵי הַכַּפֹּרֶת
  english_pob_choice: on the front of the mercy seat
  chosen_spanish: sobre la parte frontal de la cubierta de expiación
  alternatives_spanish:
  - sobre el frente de la cubierta de expiación
  - sobre la cara de la cubierta de expiación
  lexicon: HALOT
  rationale: פְּנֵי aquí apunta a la parte/frente visible del objeto. En español, 'parte frontal' evita el calco literal de 'rostro/cara' y conserva la orientación espacial. Para כַּפֹּרֶת, 'cubierta de expiación' retiene el sentido físico y semántico del término, en lugar de sustituirlo por una fórmula tradicional opaca.
- source_word: הַכַּפֹּרֶת
  english_pob_choice: mercy seat
  chosen_spanish: cubierta de expiación
  alternatives_spanish:
  - propiciatorio
  - cubierta propiciatoria
  lexicon: HALOT
  rationale: El término hebreo nombra la cubierta del arca ligada al rito de expiación. 'Cubierta de expiación' explicita la función cultual y preserva la transparencia del significado; 'propiciatorio' es una opción tradicional, pero menos transparente para el lector moderno.
- source_word: קֵדְמָה
  english_pob_choice: eastward
  chosen_spanish: hacia el oriente
  alternatives_spanish:
  - al oriente
  - hacia el este
  lexicon: HALOT
  rationale: El adverbio direccional indica orientación. 'Hacia el oriente' mantiene el registro bíblico sobrio y evita ambigüedad.
- source_word: וְלִפְנֵי הַכַּפֹּרֶת
  english_pob_choice: and before the mercy seat
  chosen_spanish: y delante de la cubierta de expiación
  alternatives_spanish:
  - y en frente de la cubierta de expiación
  - y ante la cubierta de expiación
  lexicon: HALOT
  rationale: לִפְנֵי marca posición frontal. 'Delante de' es natural y distingue esta segunda aspersión de la primera, que fue 'sobre' la cubierta.
- source_word: יַזֶּה שֶׁבַע פְּעָמִים
  english_pob_choice: he shall sprinkle ... seven times
  chosen_spanish: rociará ... siete veces
  alternatives_spanish:
  - asperjará ... siete veces
  - salpicará ... siete veces
  lexicon: HALOT
  rationale: Se conserva la repetición ritual exacta. 'Siete veces' se mantiene literal por su carga ceremonial en el texto.
- source_word: מִן הַדָּם
  english_pob_choice: some of the blood
  chosen_spanish: un poco de la sangre
  alternatives_spanish:
  - parte de la sangre
  - de la sangre
  lexicon: HALOT
  rationale: De nuevo, מִן es partititivo. 'Un poco de la sangre' expresa la porción sin añadir interpretación excesiva.
theological_decisions:
- issue: Cómo traducir הַכַּפֹּרֶת en un contexto sacrificial cargado
  english_pob_reading: mercy seat
  chosen_spanish_reading: cubierta de expiación
  alternative_spanish_readings:
  - propiciatorio
  - cubierta propiciatoria
  rationale: La POB en inglés preserva la referencia cultual del objeto del arca y anota la alternativa más concreta. En español, 'cubierta de expiación' hace visible tanto el referente material como su vínculo con el rito de expiación, evitando depender de un tecnicismo tradicional que puede ser opaco. Se mantiene la tensión entre objeto físico y función teológica.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el audit trail; la traducción inglesa final fue confirmada sin cambios, con acuerdo alto en las revisiones cruzadas. La versión española sigue esa lectura estable y conserva la distinción espacial entre la aspersión 'sobre' la cubierta y la aspersión 'delante de' ella.
  spanish_consistency_notes:
  - Se mantiene 'sangre del toro' para reflejar el partitivo de מִן y el referente sacrificial.
  - Se usa 'rociará' de forma consistente para נזה, con opción alternativa registrada como 'asperjará' para mayor tecnicismo litúrgico.
  - Se evita 'SEÑOR' o sustituciones no pertinentes; no aparece el Tetragrámaton en este versículo.
  - '''Cubierta de expiación'' se usa de manera consistente para כַּפֹּרֶת, con nota para la alternativa más tradicional.'
