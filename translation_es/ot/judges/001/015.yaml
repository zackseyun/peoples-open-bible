translation:
  language: es
  text: 'Ella le dijo: «Te ruego que me des una bendición, porque me has dado la tierra del Néguev[a]; dame también fuentes de agua[b]». Entonces Caleb le dio las fuentes superiores y las fuentes inferiores.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tierra del sur». El hebreo נֶגֶב puede funcionar como nombre regional («Néguev») o como descripción direccional/topográfica («sur» o «tierra del sur»).
    reason: lexical_alternative
  - marker: b
    text: La expresión hebrea puede referirse a manantiales, pozas u otras fuentes de agua; «fuentes de agua» encaja bien en el contexto de una región seca que necesita abastecimiento confiable.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָבָה
  english_pob_choice: Please give
  chosen_spanish: Te ruego que me des
  alternatives_spanish:
  - Dame, por favor
  - Por favor, dame
  lexicon: HALOT
  rationale: El hebreo funciona como una petición urgente y cortés. «Te ruego que me des» conserva el matiz de súplica mejor que un imperativo desnudo en español.
- source_word: בְרָכָה
  english_pob_choice: a blessing
  chosen_spanish: una bendición
  alternatives_spanish:
  - un regalo
  - un favor
  lexicon: HALOT
  rationale: El sustantivo básico es «bendición». Aunque el contexto apunta a una concesión beneficiosa, mantener «bendición» preserva el vínculo léxico con el hebreo y la ambigüedad intencional.
- source_word: אֶרֶץ הַנֶּגֶב
  english_pob_choice: the land of the Negev
  chosen_spanish: la tierra del Néguev
  alternatives_spanish:
  - la tierra del sur
  - la región del Néguev
  lexicon: HALOT
  rationale: «Néguev» puede ser nombre regional y también sugerir el sur/sequedad. En español, el topónimo es la opción más transparente y evita reducir el término a una mera dirección.
- source_word: גֻּלֹּת מָיִם
  english_pob_choice: springs of water
  chosen_spanish: fuentes de agua
  alternatives_spanish:
  - manantiales de agua
  - fuentes
  lexicon: HALOT
  rationale: La expresión designa una fuente hídrica concreta. «Fuentes de agua» mantiene claridad natural en español y es suficientemente amplia para no imponer más de lo que el hebreo exige.
- source_word: גֻּלֹּת עִלִּית
  english_pob_choice: the upper springs
  chosen_spanish: las fuentes superiores
  alternatives_spanish:
  - las fuentes de arriba
  - los manantiales superiores
  lexicon: HALOT
  rationale: «Superior» traduce el adjetivo עִלִּית sin perder la relación espacial con la pareja siguiente. Se evita repetir «de agua» porque el hebreo tampoco lo repite aquí.
- source_word: גֻּלֹּת תַּחְתִּית
  english_pob_choice: the lower springs
  chosen_spanish: las fuentes inferiores
  alternatives_spanish:
  - las fuentes de abajo
  - los manantiales inferiores
  lexicon: HALOT
  rationale: «Inferiores» traduce תַּחְתִּית y mantiene el paralelismo con «superiores». En español suena más natural que una glosa excesivamente literal como «de abajo».
translation_notes:
  revision_awareness: El inglés POB mantiene «Negev» como opción principal y anota la alternativa semántica «land of the South». Para el español se siguió la misma decisión de preservar el topónimo, con una nota que reconoce la lectura direccional del hebreo.
  spanish_consistency_notes:
  - Se conserva el tratamiento directo en segunda persona singular («te», «me des», «dame»), acorde con el diálogo.
  - «Fuentes» se usa de manera consistente para גֻּלֹּת, manteniendo el paralelismo entre las dos expresiones finales.
  - No se añade una nota separada para גֻּלֹּת מָיִם porque la opción «fuentes de agua» ya comunica el sentido sin sobrerrepresentar una incertidumbre que el contexto resuelve.
