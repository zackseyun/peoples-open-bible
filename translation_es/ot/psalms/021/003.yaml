translation:
  language: es
  text: Tú le has concedido el deseo de su corazón, y no le has rehusado la petición[a] de sus labios. Selah[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el deseo de sus labios» / «la petición de sus labios». El sustantivo hebreo raro וַאֲרֶשֶׁת probablemente se refiere a un ruego verbal, en paralelo con «el deseo de su corazón».
    reason: lexical_alternative
  - marker: b
    text: «Selah» se conserva como transliteración porque su significado o función exactos son inciertos, aunque probablemente marque una pausa musical o litúrgica.
    reason: cultural_note
lexical_decisions:
- source_word: תַּאֲוַת
  english_pob_choice: desire
  chosen_spanish: deseo
  alternatives_spanish:
  - anhelo
  - aspiración
  lexicon: HALOT
  rationale: El sustantivo expresa deseo o anhelo. «Deseo» comunica con naturalidad la fuerza del término y mantiene el paralelo con la segunda cola, donde hay una petición expresada en palabras.
- source_word: לִבּוֹ
  english_pob_choice: his heart’s
  chosen_spanish: de su corazón
  alternatives_spanish:
  - de su alma
  - interior
  lexicon: HALOT
  rationale: La construcción hebrea equivale a «el deseo de su corazón». En español, «de su corazón» conserva la imagen interna y suena idiomático junto con «deseo».
- source_word: נָתַתָּה לּוֹ
  english_pob_choice: you have given him
  chosen_spanish: le has concedido
  alternatives_spanish:
  - le has dado
  - le has otorgado
  lexicon: HALOT
  rationale: El verbo es «dar», pero en este contexto la idea es conceder o dar favorablemente el deseo pedido. «Concedido» comunica el resultado sin perder la acción completa del perfecto.
- source_word: וַאֲרֶשֶׁת
  english_pob_choice: the request
  chosen_spanish: la petición
  alternatives_spanish:
  - el deseo
  - la solicitud
  lexicon: HALOT
  rationale: Este sustantivo raro suele entenderse como una petición o ruego, en paralelo con el deseo interno del primer hemistiquio. «Petición» distingue bien la expresión verbalizada del deseo.
- source_word: שְׂפָתָיו
  english_pob_choice: of his lips
  chosen_spanish: de sus labios
  alternatives_spanish:
  - de sus palabras
  - de su boca
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de lo que sale de los labios. «De sus labios» es literal y claro en español.
- source_word: בַּל
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - nunca
  lexicon: HALOT
  rationale: La partícula es una negación poética. «No» es la equivalencia directa y natural en español.
- source_word: מָנַעְתָּ
  english_pob_choice: withheld
  chosen_spanish: has negado
  alternatives_spanish:
  - has retenido
  - has rehusado
  lexicon: HALOT
  rationale: El verbo significa contener, retener o negar. En español, «has negado» expresa bien la idea de no privar a alguien de lo pedido, manteniendo el tono de respuesta positiva del salmo.
- source_word: סֶּלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  lexicon: HALOT
  rationale: Se conserva como transliteración porque su sentido exacto sigue siendo incierto; traducirlo afirmaría más de lo que el hebreo permite.
translation_notes:
  revision_awareness: 'Coincide con el texto base de referencia y con la revisión más reciente: no se requieren cambios sustanciales. Se mantuvo la decisión de preservar Selah y de reflejar el valor raro de וַאֲרֶשֶׁת mediante una nota de alternativa lexical.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo subyacente lo exige; este versículo no contiene el nombre divino.
  - Se prefirió «deseo» y «petición» para conservar el paralelismo semántico entre impulso interno y expresión verbal.
  - «Selah» permanece sin traducir por la incertidumbre de su función.
