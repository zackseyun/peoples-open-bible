revisions:
- from: 'Y toda la asamblea respondió y dijo con voz fuerte[a]: «Así, como has dicho[b], haremos».'
  to: 'Y toda la asamblea clamó y dijo a gran voz[a]: «Así, como has dicho[b], haremos».'
  rationale: Se revisa «respondió» a «clamó» para reflejar mejor ἐφώνησαν y el matiz de aclamación pública del original. Se cambia «con voz fuerte» por «a gran voz» por mayor naturalidad y dignidad en español. Se ajusta la nota de alternativas de πᾶν τὸ πλῆθος para alinearla mejor con la auditoría inglesa.
