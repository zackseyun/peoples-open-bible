translation:
  language: es
  text: El bien[a] les es asignado a los buenos desde el principio; así también, para los impíos, bien y mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Las cosas buenas fueron creadas para los buenos desde el principio; así también, para los pecadores, males». El testimonio hebreo conservado aquí lee con más plenitud: «para los impíos, bien y mal».'
    reason: alternative_reading
lexical_decisions:
- source_word: טוב / ἀγαθὰ
  english_pob_choice: good
  chosen_spanish: bienes
  alternatives_spanish:
  - lo bueno
  - cosas buenas
  - bien
  lexicon: HALOT; LXX ἀγαθά
  rationale: En este proverbio sapiencial, el sustantivo/adjetivo funciona de manera concreta y distributiva. «Bienes» expresa mejor en español la idea de cosas buenas o favorables que se reparten, y evita la ambigüedad de «bueno» como adjetivo suelto al inicio de la frase.
- source_word: חלק
  english_pob_choice: is allotted
  chosen_spanish: han sido dispuestos
  alternatives_spanish:
  - se han asignado
  - corresponden
  - han sido apartados
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo («porción/parte») en una construcción nominal; el inglés lo hace verbal con «is allotted». En español, «han sido dispuestos» comunica la idea de una distribución ordenada sin perder la noción de asignación implícita en la raíz.
- source_word: מראש / ἀπʼ ἀρχῆς
  english_pob_choice: from the beginning
  chosen_spanish: desde el principio
  alternatives_spanish:
  - desde el comienzo
  - desde el inicio
  lexicon: HALOT; LXX ἀπʼ ἀρχῆς
  rationale: «Desde el principio» sería muy literal y perfectamente válido, pero «desde el principio» / «desde el comienzo» son equivalentes. Se eligió «desde el principio» para conservar el paralelismo tradicional con el griego, aunque en la formulación final se optó por un ritmo más fluido con «desde el principio» implícito en la colocación.
- source_word: לרעים / τοῖς ἁμαρτωλοῖς
  english_pob_choice: for the wicked / for sinners
  chosen_spanish: para los impíos
  alternatives_spanish:
  - para los malvados
  - para los pecadores
  - para los injustos
  lexicon: HALOT; LXX ἁμαρτωλοῖς
  rationale: El hebreo habla de personas moralmente malas, y el paralelo griego especifica «pecadores». «Impíos» es un equivalente bíblico sobrio en español que preserva el contraste moral sin endurecer el término hasta un matiz puramente penal.
- source_word: טוב ורע / κακά
  english_pob_choice: good and evil / evil things
  chosen_spanish: bien y mal
  alternatives_spanish:
  - lo bueno y lo malo
  - bienes y males
  - bueno y malo
  lexicon: HALOT; LXX κακά
  rationale: El hebreo conserva una polaridad amplia, y el griego comprime la clausula hacia «males». En español, «bien y mal» mantiene la amplitud semántica del hebreo y su paralelismo antitético, sin reducirlo solo a calamidades.
theological_decisions:
- issue: Cómo reflejar la tensión entre el hebreo más pleno y el paralelo griego más breve
  english_pob_reading: The Hebrew is rendered as stating that for the wicked there are both good and evil; the Greek parallel shortens this to evil things for sinners.
  chosen_spanish_reading: 'Se preserva la amplitud del hebreo: para los impíos hay bien y mal.'
  alternative_spanish_readings:
  - 'Según el griego: para los pecadores, males.'
  - Para los impíos, males.
  rationale: El expediente auditado da prioridad al hebreo transmitido, mientras el griego sirve de control textual. Por eso la traducción española mantiene la formulación más completa y deja constancia de la variante abreviada del griego en nota.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando Sirácida se conserva en hebreo; usar el paralelo griego como apoyo, no como sustituto del testimonio principal.'
translation_notes:
  revision_awareness: El registro inglés indica revisión reciente sin cambios y un acuerdo alto entre testigos. La redacción española sigue ese estado textual estable, conservando el alcance del hebreo y anotando la abreviación del griego solo en la nota.
  spanish_consistency_notes:
  - Se mantiene «impíos» para לרעים/τοῖς ἁμαρτωλοῖς por consistencia con el contraste moral sapiencial.
  - Se evita «SEÑOR» o terminología cultual ajena porque el versículo no contiene el Tetragrámaton ni un título divino explícito.
  - Se conserva un paralelismo breve y sentencioso, adecuado al estilo sapiencial de Sirácida.
