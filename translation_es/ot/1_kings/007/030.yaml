base_translation:
  language: en
  yaml_path: translation/ot/1_kings/007/030.yaml
  text: And the one stand had four bronze wheels and bronze axles[a], and its four corners had supports for them; beneath the basin the supports were cast[c][b], each beside wreathwork.
  footnotes:
  - marker: a
    text: Or 'base' for 'stand' (Hebrew מְכוֹנָה), referring to the wheeled support structure beneath the basin.
    reason: lexical_alternative
  - marker: b
    text: Hebrew כְּתֵפֹת is literally 'shoulders'; here it likely means projecting support pieces.
    reason: lexical_alternative
  - marker: c
    text: The final term may refer to decorative garlands or festoons; 'wreathwork' reflects this likely sense.
    reason: lexical_alternative
