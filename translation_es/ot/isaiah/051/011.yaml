revisions:
- from: Y los redimidos de Yahvé volverán y vendrán a Sion con júbilo[a]; el gozo eterno estará sobre sus cabezas; alegría y gozo los alcanzarán[b]; la tristeza y el gemido huirán.
  to: Y los redimidos de Yahvé volverán y vendrán a Sion con cantos[a]; el gozo eterno estará sobre sus cabezas; alegría y gozo los alcanzarán[b]; la tristeza y el gemido huirán.
  rationale: Se ajusta בְּרִנָּה a «con cantos» para reflejar mejor la elección principal del POB inglés y el valor sonoro del hebreo, dejando «gritos de júbilo» como alternativa en nota. También se corrige la nota [b] para conservar el paralelismo de «alegría y gozo» y explicar con mayor precisión la imagen de יַשִּׂיגוּן como 'dar alcance / alcanzar persiguiendo'. El resto del versículo puede mantenerse.
