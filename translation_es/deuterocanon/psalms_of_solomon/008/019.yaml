    text: 'O: «desde su entrada». El griego usa una expresión algo abrupta; aquí se entiende como preparación previa a su entrada.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «hacia Jerusalén».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «guirnaldearon sus muros».'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «aplanaron» por «allanaron» para una imagen más idiomática y precisa con «caminos». Se conservan las demás decisiones principales, pero se simplifican y alinean las notas con las alternativas documentadas en el audit trail inglés.
