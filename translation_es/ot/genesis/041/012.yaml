translation:
  language: es
  text: Y allí con nosotros estaba un joven hebreo[a], esclavo del capitán de la guardia; le contamos nuestros sueños, y nos interpretó los sueños; a cada uno le interpretó según su sueño[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «un joven hebreo, esclavo del capitán de la guardia».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «a un hombre según su sueño interpretó», es decir, dio una interpretación ajustada al sueño de cada uno.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נַעַר
  english_pob_choice: young Hebrew man
  chosen_spanish: un joven hebreo
  alternatives_spanish:
  - un muchacho hebreo
  - un joven hombre hebreo
  lexicon: HALOT
  rationale: נַעַר puede referirse a un muchacho o a un joven. En español, «joven» conserva la idea de edad o etapa sin sonar infantil, y «hebreo» reproduce el etnónimo estándar.
- source_word: עִבְרִי
  english_pob_choice: Hebrew
  chosen_spanish: hebreo
  alternatives_spanish:
  - hebraeo
  lexicon: HALOT
  rationale: El término étnico se expresa naturalmente como «hebreo» en español bíblico y moderno.
- source_word: עֶבֶד
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: HALOT
  rationale: La relación de pertenencia a la casa/autoridad del capitán de la guardia está explícita en el contexto, y el POB en inglés mantiene la fuerza de dependencia con «slave». En español, «esclavo» preserva mejor esa carga que «siervo».
- source_word: שַׂר הַטַּבָּחִים
  english_pob_choice: captain of the guard
  chosen_spanish: capitán de la guardia
  alternatives_spanish:
  - jefe de la guardia
  - capitán de los guardias
  - jefe de los verdugos
  lexicon: HALOT
  rationale: Este título cortesano egipcio tiene equivalente tradicional en la narración de Génesis como «capitán de la guardia». Aunque la raíz puede relacionarse con ejecutores o carniceros, el contexto favorece una función oficial de custodia.
- source_word: וַנְּסַפֶּר לוֹ
  english_pob_choice: we told him
  chosen_spanish: le contamos
  alternatives_spanish:
  - se lo contamos
  - le relatamos
  lexicon: HALOT
  rationale: ספר aquí es «contar/relatar». «Le contamos» suena natural en español y refleja el acto de comunicarle el sueño.
- source_word: וַיִּפְתָּר לָנוּ
  english_pob_choice: he interpreted ... for us
  chosen_spanish: nos interpretó
  alternatives_spanish:
  - nos explicó
  - nos descifró
  lexicon: HALOT
  rationale: En contexto de sueños, פתר significa «interpretar». «Nos interpretó» mantiene el sentido técnico sin añadir matices ajenos.
- source_word: חֲלֹמֹתֵינוּ
  english_pob_choice: our dreams
  chosen_spanish: nuestros sueños
  alternatives_spanish:
  - los sueños de nosotros
  lexicon: HALOT
  rationale: Traducción directa y transparente del plural con sufijo de primera persona plural.
- source_word: אִישׁ כַּחֲלֹמוֹ פָּתָר
  english_pob_choice: he interpreted each man's dream according to his dream
  chosen_spanish: a cada uno le interpretó según su sueño
  alternatives_spanish:
  - interpretó a cada hombre conforme a su sueño
  - interpretó el sueño de cada uno según su sueño
  lexicon: HALOT
  rationale: 'La construcción hebrea enfatiza la distribución individual: «un hombre según su sueño interpretó». En español, «a cada uno le interpretó según su sueño» conserva esa fuerza sin la repetición pesada de «sueño» en cada miembro de la frase.'
translation_notes:
  revision_awareness: 'El inglés POB pasó por una revisión importante en la última cláusula: se ajustó la lectura para reflejar mejor el hebreo distributivo («each man''s dream according to his dream»), y luego se restauró «slave» después de una variación a «servant». La presente versión española sigue esa decisión final y conserva el valor distributivo del hebreo con una formulación natural en español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no lo contiene.
  - «Esclavo» se usa aquí por la fuerza lexical de עֶבֶד y por la decisión auditada del POB en inglés.
  - La cláusula final evita una repetición innecesaria en español, pero conserva la correspondencia distributiva del hebreo y del ajuste final del POB inglés.
