translation:
  language: es
  text: y Jeuz, y Sachía, y Mirmah. Estos fueron sus hijos, cabezas de casas paternas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “jefes de clanes”. El hebreo literalmente dice “cabezas de padres”, un giro idiomático para los principales de casas ancestrales o grupos familiares.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְעוּץ
  english_pob_choice: Jeuz
  chosen_spanish: Jeús
  alternatives_spanish:
  - Jeuz
  lexicon: Nombre propio
  rationale: Es un nombre propio y debe transliterarse, no traducirse. Se adopta una forma española breve y pronunciable que conserva la base consonántica y el valor onomástico del hebreo.
- source_word: שָׂכְיָה
  english_pob_choice: Sachia
  chosen_spanish: Sachía
  alternatives_spanish:
  - Sakía
  - Sakia
  lexicon: Nombre propio
  rationale: Nombre propio en contexto genealógico. La forma española mantiene la transliteración de manera legible, conservando la secuencia consonántica sin convertirla en un término común.
- source_word: מִרְמָה
  english_pob_choice: Mirmah
  chosen_spanish: Mirmá
  alternatives_spanish:
  - Mirma
  lexicon: Nombre propio
  rationale: Aunque el lexema común puede significar 'engaño', aquí funciona claramente como nombre personal. Se translitera como nombre propio y no se vierte semánticamente para no borrar la decisión auditada del texto fuente.
- source_word: אֵלֶּה
  english_pob_choice: These
  chosen_spanish: Estos
  alternatives_spanish:
  - Estas
  - Éstos son
  lexicon: HALOT
  rationale: Demostrativo plural que retoma la lista anterior. En español, 'Estos' reproduce bien la deíxis del hebreo en una cláusula nominal breve.
- source_word: בָנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos
  lexicon: HALOT
  rationale: En genealogías hebreas, בנים puede referirse a descendientes masculinos. Sin embargo, en español 'sus hijos' comunica el parentesco de manera natural y no fuerza una distinción que el contexto inmediato no desarrolla más allá de la descendencia masculina implícita.
- source_word: רָאשֵׁי אָבוֹת
  english_pob_choice: heads of fathers’ houses
  chosen_spanish: cabezas de casas paternas
  alternatives_spanish:
  - jefes de casas paternas
  - cabezas de clanes paternos
  lexicon: HALOT
  rationale: Se conserva la metáfora de 'cabezas' para reflejar el hebreo 'heads of'. 'Casas paternas' expresa el giro idiomático de 'fathers’ houses' sin sustituirlo por un término más interpretativo como 'clanes'.
translation_notes:
  revision_awareness: El pasaje se mantiene sin cambios sustanciales respecto al audit trail en cuanto a contenido; solo se ajusta la forma española para naturalidad y transparencia textual. Se preserva la tensión idiomática de רָאשֵׁי אָבוֹת con una traducción literal en el cuerpo y una alternativa explicativa en nota.
  spanish_consistency_notes:
  - Se mantiene un registro genealógico sobrio y directo, acorde con listas de nombres.
  - Se evita 'clanes' en el texto principal para no borrar la metáfora hebrea de 'cabezas de casas' y se deja la alternativa en nota.
  - Los nombres propios se uniforman como transliteraciones españolas breves y legibles.
