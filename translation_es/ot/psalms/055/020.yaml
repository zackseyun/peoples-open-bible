translation:
  language: es
  text: Dios los oirá y les responderá[a], él que está entronizado desde antiguo (Selah), porque no tienen cambios[b] y no temen a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los humillará’. El verbo hebreo puede entenderse como ‘responder’, pero en este contexto también puede sugerir un trato de juicio, humillación o aflicción.
    reason: alternative_reading
  - marker: b
    text: O ‘no tienen alteraciones’ o ‘no tienen reveses’. La frase hebrea es difícil y puede referirse a una condición sin sobresaltos que produce complacencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׁמַע / יַעֲנֵם
  english_pob_choice: will hear and answer them
  chosen_spanish: los oirá y les responderá
  alternatives_spanish:
  - los oirá y los humillará
  - los oirá y les dará respuesta
  lexicon: HALOT
  rationale: שׁמע se entiende naturalmente como ‘oír’, y ענה puede traducirse como ‘responder’ o, en contexto judicial, como ‘humillar/afligir’. En español, ‘responderá’ conserva la lectura principal del texto y deja la tensión interpretativa para la nota, sin forzar una solución teológica.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios poderoso
  - el Dios fuerte
  lexicon: HALOT
  rationale: Como título poético divino, ‘Dios’ es la opción más natural y sobria en español; no hace falta ampliar a ‘poderoso’ sin una señal contextual adicional.
- source_word: וְיֹשֵׁב קֶדֶם
  english_pob_choice: he who sits enthroned from of old
  chosen_spanish: el que está entronizado desde antiguo
  alternatives_spanish:
  - el que se sienta desde antiguo
  - el que habita desde antiguo
  - el entronizado de tiempos antiguos
  lexicon: HALOT
  rationale: El participio con קֶדֶם expresa permanencia y antigüedad soberana. ‘Entronizado desde antiguo’ conserva la imagen real y evita un calco pesado en español.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Se conserva la transliteración porque su función exacta sigue siendo incierta; traducirla supondría una certeza que el texto no da.
- source_word: חֲלִיפוֹת
  english_pob_choice: changes
  chosen_spanish: cambios
  alternatives_spanish:
  - reveses
  - alteraciones
  - mudanzas
  lexicon: HALOT
  rationale: ‘Cambios’ es la manera más directa de reproducir la idea básica del sustantivo y mantiene la ambigüedad entre cambios de situación, reveses o alternancias, que la nota explica.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - a Dios
  lexicon: HALOT
  rationale: Aquí el sustantivo mantiene su sentido normal de ‘Dios’ en una cláusula de temor reverente; no se requiere una distinción semántica especial en español.
theological_decisions:
- issue: Sentido de וְיַעֲנֵם en contexto de juicio
  english_pob_reading: answer them, with the punitive/humbling nuance preserved as a documented possibility
  chosen_spanish_reading: les responderá, manteniendo abierta la posibilidad de un responder judicial o de humillación
  alternative_spanish_readings:
  - los humillará
  - los afligirá
  - les dará respuesta
  rationale: El verbo hebreo permite tanto la idea de ‘responder’ como la de tratar con ellos en juicio. La revisión inglesa más reciente favorece ‘answer’, pero el contexto adversarial sigue permitiendo una lectura punitiva. El español principal adopta ‘responderá’ y la nota preserva la alternativa, para no borrar la tensión documental.
  doctrine_reference: Preservar la tensión lexical y dejar que el contexto determine la fuerza judicial sin cerrarla artificialmente.
translation_notes:
  revision_awareness: La base inglesa pasó de ‘humble them’ a ‘answer them’ en una revisión posterior, mientras que la nota textual mantiene la posibilidad de un sentido judicial del verbo hebreo. La redacción española refleja esa revisión principal con ‘les responderá’, pero conserva la alternativa punitiva en nota para no perder la ambigüedad documentada.
  spanish_consistency_notes:
  - Se usa ‘Dios’ para אֵל y אֱלֹהִים conforme al estándar del proyecto; no se introduce ‘SEÑOR’ porque el texto no contiene el Tetragrámaton.
  - ‘Selah’ se mantiene sin traducir, por consistencia con la práctica del proyecto ante términos musicales/litúrgicos de sentido incierto.
  - ‘Entronizado desde antiguo’ conserva el matiz regio del participio y evita una traducción meramente temporal que debilitaría la imagen de soberanía.
