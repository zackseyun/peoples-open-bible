translation:
  language: es
  text: «Vapor de vapores», dice el Maestro[a]; «todo es vapor».
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «Vanidad de vanidades … todo es vanidad». La traducción tradicional conserva el uso heredado, pero el hebreo הבל evoca literalmente algo como vapor o aliento: lo que es fugaz, insustancial o difícil de asir.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲבֵל הֲבָלִים
  english_pob_choice: Vapor of vapors
  chosen_spanish: Vapor de vapores
  alternatives_spanish:
  - Vanidad de vanidades
  - Futilidad de futilidades
  - Aliento de alientos
  lexicon: HALOT, BDB
  rationale: Conservo la imagen concreta de הבל como algo vaporoso, pasajero e insustancial, siguiendo la decisión inglesa de 'vapor' frente a 'vanity'. En español, 'vapor de vapores' reproduce bien la intensificación del hebreo y evita reducir el término a una abstracción moral.
- source_word: אָמַר
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: HALOT, BDB
  rationale: En una fórmula de cita o refrán, el presente en español suena natural y mantiene el carácter sentencioso de la declaración final, como en la decisión inglesa 'says'.
- source_word: הַקּוֹהֶלֶת
  english_pob_choice: the Teacher
  chosen_spanish: el Maestro
  alternatives_spanish:
  - el Predicador
  - Qohelet
  lexicon: HALOT, BDB
  rationale: La función del título es la de quien instruye a una asamblea. 'Maestro' comunica esa relación didáctica con claridad en español y evita el matiz más eclesiástico de 'Predicador'. No translitero 'Qohelet' porque el proyecto privilegia traducir el título.
- source_word: הַכֹּל
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todo lo demás
  - el todo
  lexicon: HALOT, BDB
  rationale: '''Todo'' es la manera más idiomática de expresar la totalización absoluta del hebreo en esta sentencia resumidora. Mantiene el alcance universal de la afirmación sin añadir matices ajenos.'
- source_word: הָבֶל
  english_pob_choice: vapor
  chosen_spanish: vapor
  alternatives_spanish:
  - vanidad
  - futilidad
  - aliento
  lexicon: HALOT, BDB
  rationale: Uso la misma imagen concreta que en la primera frase para conservar la cohesión del refrán. 'Vapor' preserva la fugacidad e insustancialidad del término hebreo sin importar el sentido moderno restringido de 'vanidad'.
theological_decisions:
- issue: Cómo rendir la palabra clave הבל en Eclesiastés
  english_pob_reading: vapor
  chosen_spanish_reading: vapor
  alternative_spanish_readings:
  - vanidad
  - futilidad
  - aliento
  rationale: La decisión es principalmente léxica y literaria, pero afecta la lectura global del libro. 'Vapor' conserva la metáfora original y deja abierta la tensión interpretativa del hebreo, en lugar de resolverla en una sola abstracción.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La versión inglesa auditada permanece sin cambios en la última revisión; no se registran modificaciones aplicadas y el acuerdo de revisión fue alto.
  spanish_consistency_notes:
  - 'Conservo una misma imagen léxica para הבל en ambas cláusulas: ''vapor'' y ''vapor''.'
  - Evito 'vanidad' en el texto principal para no introducir un matiz de orgullo personal que el hebreo no exige.
  - '''Maestro'' refleja el título funcional de הַקּוֹהֶלֶת sin transliteración, manteniendo legibilidad en español.'
