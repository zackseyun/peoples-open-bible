review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo: David exhorta a toda la asamblea a bendecir a Yahvé; la asamblea bendice a Yahvé, el Dios de sus padres, y realiza dos gestos corporales ante Yahvé y ante el rey. También conserva correctamente «Yahvé» y la tensión teológica de los mismos verbos dirigidos a ambos objetos. Sin embargo, hay un problema de concordancia que afecta la fidelidad formal: el hebreo tiene verbos plurales para las acciones de la asamblea, y en español «toda la asamblea» puede admitir singular gramatical, pero aquí el propio texto ya venía tratando a la asamblea como grupo personal y la secuencia verbal en singular («se inclinó y se postró») suena menos natural y menos clara. Conviene usar plural explícito para reflejar mejor la multitud reunida y el hebreo verbal plural.'
  spanish_quality_summary: 'El español es claro, digno y mayormente natural. «Ahora bendigan a Yahvé, su Dios» y «el Dios de sus padres» funcionan bien. La principal debilidad es estilística y gramatical: «Y toda la asamblea ... se inclinó y se postró» con sujeto colectivo humano resulta algo rígido y menos idiomático en una narración bíblica de acción colectiva. «Se inclinaron y se postraron» mejora la fluidez y la claridad. Las notas son útiles; la nota b puede mantenerse, aunque la frase «acto corporal de postración» se refiere sobre todo al segundo verbo y no a toda la pareja verbal, pero no es un problema grave.'
  glossary_alignment: 'Buena alineación con el glosario del proyecto: יְהוָה -> «Yahvé» correctamente; אֱלֹהֵיכֶם -> «su Dios» adecuado para español neutro; הַקָּהָל -> «la asamblea» correcto; אֱלֹהֵי אֲבֹתֵיהֶם -> «el Dios de sus padres» correcto. Los verbos de reverencia deben conservar lenguaje corporal concreto; esto se mantiene, pero es preferible en plural: «se inclinaron y se postraron».'
  issues:
  - severity: medium
    issue: Concordancia verbal singular con «toda la asamblea» en las acciones finales.
    rationale: El hebreo usa verbos plurales (וַיִּקְּדוּ, וַיִּשְׁתַּחֲווּ) para las personas reunidas. Aunque el singular con un colectivo es posible en español, aquí suena menos natural y debilita la representación de la multitud actuando. El propio archivo reconoce «se inclinaron / se postraron» como alternativas válidas.
  - severity: low
    issue: La decisión léxica documenta «se inclinó / se postró» como elección principal pese al valor colectivo explícito del sujeto.
    rationale: No cambia el sentido central, pero la documentación interna queda mejor alineada con el texto revisado si se refleja el plural, más idiomático y más cercano a la forma verbal hebrea.
