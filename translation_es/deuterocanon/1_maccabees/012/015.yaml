  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y el sentido general del griego: recuerdo constante, en fiestas y otros días prescritos, en el contexto de sacrificios y oraciones, y la conveniencia de recordar a los hermanos. Sin embargo, hay dos fallas relevantes: la nota [a] está anclada en «en todo tiempo» pero comenta ἑορταῖς, por lo que no corresponde al lugar ni al contenido correctos; además, «días debidos» suena poco natural en español y no refleja tan bien como «días señalados» o «prescritos» la idea calendárica de καθηκούσαις ἡμέραις.'
  spanish_quality_summary: El español es mayormente claro y digno, pero presenta una nota mal colocada y una expresión algo forzada («días debidos»). «Nos acordamos de ustedes» es comprensible, aunque «los recordamos» suena más fluido en una línea litúrgico-diplomática; aun así no es necesario cambiarlo. La frase revisada mejora naturalidad y legibilidad sin apartarse del original.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Hermanos» preserva correctamente ἀδελφῶν. «Fiestas» es una buena opción para ἑορταῖς. La principal corrección léxica recomendada es cambiar «días debidos» por «días señalados», con nota que explique el matiz de días prescritos o establecidos para observancia.
  issues:
  - severity: high
    issue: La nota [a] está anclada en la frase equivocada y su contenido no corresponde al texto marcado.
    rationale: En el borrador, [a] aparece tras «en todo tiempo», pero la nota dice «O «en las fiestas» para ἑορταῖς», lo cual no tiene relación con ese segmento y además no funciona como alternativa léxica válida. Esto rompe la trazabilidad entre texto y nota.
  - severity: medium
    issue: «Los demás días debidos» es poco idiomático en español bíblico actual.
    rationale: Aunque intenta reflejar la fuerza de καθηκούσαις, «debidos» aplicado a días suena forzado. «Señalados» o «prescritos» comunica mejor la idea de días establecidos del calendario religioso y mantiene la explicación del POB inglés.
  revised_spanish_text: Por tanto, nosotros continuamente nos acordamos de ustedes en todo tiempo, en las fiestas[a] y en los demás días señalados[b], cuando ofrecemos sacrificios y en nuestras oraciones, como es justo y conveniente acordarse de los hermanos.
  revised_footnotes:
  - marker: a
    text: O «festividades».
    reason: lexical_alternative
  - marker: b
    text: «Días señalados» traduce una expresión que indica los otros días que corresponden, se deben o están prescritos para observancia.
