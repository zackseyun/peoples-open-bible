translation:
  language: es
  text: Porque entonces la virtud presidía[a] el certamen para los que eran probados por medio de la constancia; la victoria consistía en la incorrupción, en una vida de larga duración[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estaba al frente del certamen». El griego ἀθλοθέτει presenta a la virtud como quien preside o arbitra la competencia, más que solo como quien entrega un premio.
    reason: alternative_reading
  - marker: b
    text: O «en vida eterna». El griego dice literalmente «en vida de larga duración»; la frase anterior, «en la incorrupción», puede sugerir un sentido eterno o escatológico.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀθλοθέτει
  english_pob_choice: was presiding over the contest
  chosen_spanish: presidía el certamen
  alternatives_spanish:
  - otorgaba el premio del certamen
  - presidía los juegos
  - actuaba como juez del certamen
  lexicon: LSJ
  rationale: El verbo es raro y pertenece al campo atlético/agonístico. En español, «presidía el certamen» conserva la idea de dirección o arbitraje del concurso sin forzar una imagen demasiado técnica ni reducirla solo a la entrega del premio.
- source_word: ἀρετή
  english_pob_choice: virtue
  chosen_spanish: la virtud
  alternatives_spanish:
  - la excelencia
  lexicon: LSJ
  rationale: En 4 Macabeos, ἀρετή es un término moral central y personificado. «La virtud» es la equivalencia más natural en español y preserva ese uso personificado.
- source_word: διʼ ὑπομονῆς
  english_pob_choice: through endurance
  chosen_spanish: mediante la perseverancia
  alternatives_spanish:
  - por medio de la constancia
  - a través de la resistencia
  lexicon: BDAG
  rationale: ὑπομονή expresa aguante firme bajo prueba. «Mediante la perseverancia» mantiene la fuerza instrumental de διά y sugiere constancia bajo sufrimiento.
- source_word: δοκιμάζουσι
  english_pob_choice: to those being tested
  chosen_spanish: para los que eran probados
  alternatives_spanish:
  - para los que estaban siendo puestos a prueba
  - para los que eran sometidos a prueba
  lexicon: BDAG
  rationale: El contexto inmediato es el martirio bajo tortura, por lo que el sentido pasivo «eran probados» refleja bien la situación. «Probados» también evita introducir una idea de auto-demostración que el griego no exige.
- source_word: τὸ νῖκος
  english_pob_choice: the victory
  chosen_spanish: la victoria
  alternatives_spanish:
  - el triunfo
  - el premio de la victoria
  lexicon: LSJ
  rationale: El sustantivo continúa la metáfora atlética. «La victoria» es la opción más directa y clara en español.
- source_word: ἐν ἀφθαρσίᾳ
  english_pob_choice: in incorruptibility
  chosen_spanish: en la incorrupción
  alternatives_spanish:
  - en la inmortalidad
  - en la imperdurabilidad
  lexicon: BDAG
  rationale: ἀφθαρσία puede significar incorruptibilidad o imperishabilidad. «Incorrupción» conserva la proximidad formal al griego y suena natural en español bíblico; se mantiene una alternativa doctrinal más explícita en nota.
- source_word: ἐν ζωῇ πολυχρονίῳ
  english_pob_choice: in long-lasting life
  chosen_spanish: en una vida de larga duración
  alternatives_spanish:
  - en vida eterna
  - en una vida perdurable
  - en vida de muchos años
  lexicon: LSJ
  rationale: πολυχρόνιος significa literalmente «de larga duración». «Una vida de larga duración» evita importar de entrada el lenguaje más doctrinal de «vida eterna», aunque ese matiz puede sentirse como posibilidad interpretativa.
theological_decisions:
- issue: Si ζωῇ πολυχρονίῳ debe sonar como «vida eterna» o conservar su valor literal de duración prolongada
  english_pob_reading: long-lasting life, with a note allowing 'eternal life' as an alternative because the context of incorruptibility may suggest it
  chosen_spanish_reading: una vida de larga duración, con nota que permita «vida eterna» como posibilidad interpretativa
  alternative_spanish_readings:
  - vida eterna
  - vida perdurable
  - vida de muchos años
  rationale: El griego habla literalmente de vida de larga duración. Para no introducir más de lo que el texto dice, el cuerpo principal conserva esa literalidad; sin embargo, el contexto de recompensa martirial e incorrupción permite oír una resonancia escatológica, por lo que se deja constancia de esa alternativa.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Cómo reflejar el campo agonístico de ἀθλοθέτει sin borrar la personificación de la virtud
  english_pob_reading: virtue was then presiding over the contest
  chosen_spanish_reading: la virtud presidía el certamen
  alternative_spanish_readings:
  - la virtud dirigía el certamen
  - la virtud estaba al frente del certamen
  - la virtud actuaba como árbitro del certamen
  rationale: La frase no describe solo un premio, sino una figura que dirige el certamen. «Presidía el certamen» conserva la personificación y la imagen competitiva sin hacerla demasiado técnica.
  doctrine_reference: Translation philosophy §§2, 4
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del inglés POB, que sustituyó una formulación centrada en «awarding the contest» por otra que enfatiza «presiding over the contest». Por eso se eligió «presidía el certamen» y no una expresión centrada solo en el premio. También se mantuvo la distinción entre «incorrupción» y la vida de larga duración para respetar la tensión lexical señalada en el audit trail.
  spanish_consistency_notes:
  - Se mantiene «virtud» para ἀρετή, en continuidad con el valor moral personificado del término.
  - Se evita «Cristo» u otra terminología ajena, pues el verso no la contiene.
  - Se usa «certamen» para conservar la metáfora atlética sin caer en un tecnicismo innecesario.
  - «Incorrupción» se conserva como sustantivo bíblico reconocible y cercano al griego.
  - 'El orden de las cláusulas sigue el relieve del original: virtud / prueba por perseverancia / victoria / incorrupción / vida de larga duración.'
