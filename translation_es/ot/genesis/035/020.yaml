translation:
  language: es
  text: Y Jacob levantó una estela[a] sobre su sepultura. Esta es la estela de la sepultura de Raquel hasta hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pilar», «piedra memorial» o «la estela que marca la sepultura de Raquel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּצֵּב
  english_pob_choice: set up
  chosen_spanish: levantó
  alternatives_spanish:
  - erigió
  - levantó en pie
  - colocó
  lexicon: HALOT
  rationale: El verbo hebreo expresa la acción de hacer que algo quede firme o erguido. En español, 'levantó' comunica bien la idea de alzar una estela o pilar funerario sin sonar artificial; 'erigió' mantiene más solemnidad, pero puede resultar algo más técnico.
- source_word: מַצֵּבָה
  english_pob_choice: a pillar
  chosen_spanish: un pilar
  alternatives_spanish:
  - una estela
  - una piedra memorial
  - un monumento
  lexicon: HALOT
  rationale: El sustantivo designa una piedra erguida o pilar memorial. 'Pilar' conserva la imagen concreta y coincide con la decisión inglesa sin forzar una interpretación más elaborada.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - sobre la parte de
  lexicon: HALOT
  rationale: Aquí la preposición señala la relación espacial del marcador con la sepultura. 'Sobre' es la forma natural en español para un objeto colocado encima o por encima de una tumba.
- source_word: קְבֻרָתָהּ
  english_pob_choice: her grave
  chosen_spanish: su sepultura
  alternatives_spanish:
  - su tumba
  - su lugar de sepultura
  lexicon: HALOT
  rationale: '''Sepultura'' mantiene el valor de lugar de enterramiento y suena sobrio y bíblico en español. ''Tumba'' es posible, pero puede sugerir un sepulcro más construido; ''sepultura'' deja mejor abierta la sencillez del texto.'
- source_word: הִוא
  english_pob_choice: It is
  chosen_spanish: Ese es
  alternatives_spanish:
  - Éste es
  - Se trata de
  lexicon: HALOT
  rationale: La forma hebrea introduce una identificación explicativa. En español, 'Ese es' enlaza de manera natural con el antecedente 'un pilar' y mantiene la fuerza identificadora del hebreo.
- source_word: מַצֶּבֶת קְבֻרַת רָחֵל
  english_pob_choice: the pillar of Rachel’s grave
  chosen_spanish: el pilar de la sepultura de Raquel
  alternatives_spanish:
  - la piedra memorial de la sepultura de Raquel
  - el pilar que marca la sepultura de Raquel
  lexicon: HALOT
  rationale: 'La cadena constructa se refleja con una relación posesiva directa: ''el pilar de la sepultura de Raquel''. Esto conserva la estructura del hebreo sin agregar la idea de un monumento más desarrollado.'
- source_word: עַד הַיּוֹם
  english_pob_choice: to this day
  chosen_spanish: hasta hoy
  alternatives_spanish:
  - hasta el día de hoy
  - hasta este día
  lexicon: HALOT
  rationale: Es el equivalente natural del modismo hebreo que indica continuidad desde el tiempo narrado hasta el presente del narrador. 'Hasta hoy' es breve y fiel.
theological_decisions:
- issue: Naturaleza del marcador funerario
  english_pob_reading: a pillar / grave marker, with alternatives suggesting 'Rachel’s grave marker'
  chosen_spanish_reading: un pilar sobre su sepultura, identificado como el pilar de la sepultura de Raquel
  alternative_spanish_readings:
  - una estela
  - una piedra memorial
  - un monumento
  rationale: El hebreo permite entender tanto una piedra erguida concreta como un marcador memorial. Se mantiene la concreción de 'pilar' y, en nota, se deja abierta la alternativa de un marcador funerario sin imponer una reinterpretación más amplia.
  doctrine_reference: None
- issue: Identificación final con valor de permanencia
  english_pob_reading: to this day
  chosen_spanish_reading: hasta hoy
  alternative_spanish_readings:
  - hasta el día de hoy
  - hasta este día
  rationale: El hebreo expresa duración hasta el momento narrativo. No se debe suavizar en una paráfrasis temporal distinta; 'hasta hoy' conserva la función testimonial del texto.
  doctrine_reference: None
translation_notes:
  revision_awareness: 'Coincide con el estado de alta concordancia del auditorío inglés: no se registraron revisiones aplicadas y el sentido básico permanece estable. La redacción española sigue de cerca el hebreo y el inglés POB, sin introducir ampliaciones interpretativas.'
  spanish_consistency_notes:
  - Se mantiene 'Raquel' para el nombre propio y 'Yahvé' no aparece en este versículo.
  - Se usa 'pilar' de manera consistente con la imagen de una piedra erguida o marcador memorial.
  - '''Sepultura'' se prefirió a ''tumba'' para conservar un tono sobrio y la amplitud del término hebreo.'
  - La nota al pie recoge alternativas léxicas reales sin debilitar la lectura principal.
