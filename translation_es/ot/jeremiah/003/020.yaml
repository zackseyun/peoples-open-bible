    issue: 'Construcción comparativa algo rígida: «así como ... así ustedes ...»'
    rationale: Aunque no es incorrecta, la duplicación con «así como» y luego «así» suena menos natural en español bíblico contemporáneo que «como ... así ...».
  - severity: low
    issue: Redundancia en «me han traicionado a mí»
    rationale: El pronombre tónico «a mí» no añade un contraste exigido por el hebreo y hace la frase más pesada en español.
  - severity: low
    issue: Vocativo con «oh» algo forzado
    rationale: «Oh casa de Israel» es entendible, pero «casa de Israel» entre comas conserva la solemnidad y suena más natural en español neutral moderno.
