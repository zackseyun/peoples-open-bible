translation:
  language: es
  text: Y el nombre del segundo río era Gihón[a][b]; es el que rodea toda la tierra de Cus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que circunda toda la tierra de Cus».
    reason: lexical_alternative
  - marker: b
    text: Cus es un nombre de lugar tradicionalmente asociado con regiones al sur de Egipto; el hebreo conserva el nombre antiguo.
    reason: cultural_note
lexical_decisions:
- source_word: וְ/שֵׁם
  english_pob_choice: And the name
  chosen_spanish: Y el nombre
  alternatives_spanish:
  - Ahora el nombre
  lexicon: HALOT
  rationale: וְ aquí enlaza la descripción del río con la oración anterior; «Y» conserva esa continuidad narrativa. שֵׁם se traduce de forma directa como «nombre».
- source_word: הַ/נָּהָר
  english_pob_choice: of the ... river
  chosen_spanish: del río
  alternatives_spanish:
  - del arroyo
  lexicon: HALOT
  rationale: נָהָר denota normalmente un río; «río» es la opción más clara y natural en este contexto del Edén.
- source_word: הַ/שֵּׁנִי
  english_pob_choice: second
  chosen_spanish: segundo
  lexicon: HALOT
  rationale: El adjetivo ordinal marca la secuencia entre los ríos; «segundo» es una correspondencia directa y formal.
- source_word: גִּיחוֹן
  english_pob_choice: Gihon
  chosen_spanish: Gihón
  alternatives_spanish:
  - Gihon
  lexicon: HALOT
  rationale: Nombre propio transliterado; se usa la forma española usual con tilde, sin traducir el nombre.
- source_word: הוּא
  english_pob_choice: it is the one
  chosen_spanish: es el que
  alternatives_spanish:
  - es
  - este es
  lexicon: HALOT
  rationale: El pronombre retoma el sujeto con valor identificativo. «Es el que» conserva esa fuerza relacional en español sin resultar forzado.
- source_word: הַ/סּוֹבֵב
  english_pob_choice: that goes around
  chosen_spanish: rodea
  alternatives_spanish:
  - que rodea
  - que circunda
  - que da vueltas alrededor de
  lexicon: HALOT
  rationale: De סבב, «rodear/encircilar». «Rodea» comunica el sentido descriptivo de manera natural y sigue siendo fiel al alcance espacial del participio.
- source_word: אֵת כָּל אֶרֶץ
  english_pob_choice: all the land of
  chosen_spanish: toda la tierra de
  alternatives_spanish:
  - todo el territorio de
  - toda la región de
  lexicon: HALOT
  rationale: כָּל אֶרֶץ se expresa de forma idiomática como «toda la tierra de»; «tierra» mantiene el registro bíblico y la amplitud geográfica.
- source_word: כּוּשׁ
  english_pob_choice: Cush
  chosen_spanish: Cus
  alternatives_spanish:
  - Cush
  - Etiopía
  lexicon: HALOT
  rationale: Nombre propio geográfico que se translitera como «Cus» en español. «Etiopía» sería interpretativo y anacrónico en este contexto primeval.
theological_decisions:
- issue: Tratamiento del nombre geográfico כּוּשׁ
  english_pob_reading: Cush is a place name traditionally associated with regions south of Egypt; the Hebrew text preserves the ancient name itself.
  chosen_spanish_reading: Se conserva el nombre antiguo «Cus» sin equivalerlo a un país moderno.
  alternative_spanish_readings:
  - Etiopía
  - Cush
  rationale: La decisión evita imponer una identificación histórica posterior al texto hebreo. Al preservar el nombre propio, la traducción respeta la ambigüedad geográfica original y la nota cultural del audit trail.
  doctrine_reference: Principio de fidelidad al referente histórico-textual y de no anacronismo en nombres propios bíblicos.
translation_notes:
  revision_awareness: El registro inglés más reciente indica que no hubo cambios en la revisión; se conserva la solución auditada sin ajustes adicionales.
  spanish_consistency_notes:
  - Se mantiene «Gihón» con acento gráfico por uso español, pero se preserva el nombre propio sin glosa en el texto principal.
  - Se usa «tierra» para כָּל אֶרֶץ por coherencia con el registro bíblico y la elección inglesa «all the land of».
  - «Rodea» traduce el participio descriptivo de סבב con una solución natural en español; la alternativa con nota mantiene la posible lectura «circunda».
