  yaml_path: translation/ot/1_samuel/015/023.yaml
  text: For rebellion is like the sin of divination[a], and stubbornness is like wickedness and household idols. Because you have rejected the word of Yahweh[c][b], he has also rejected you from being king.
  footnotes:
