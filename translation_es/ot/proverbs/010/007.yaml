translation:
  language: es
  text: La memoria del justo es una bendición[a], pero el nombre de los impíos se pudrirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La memoria del justo es para bendición».'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֵכֶר
  english_pob_choice: memory
  chosen_spanish: memoria
  alternatives_spanish:
  - recuerdo
  - rememoración
  lexicon: HALOT
  rationale: זֵכֶר denota la idea de memoria o recuerdo. «Memoria» es natural en español moderno y mantiene bien el contraste proverbial con «nombre». «Recuerdo» también es posible, pero aquí suena algo más subjetivo y menos proverbial.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - un justo
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivamente en sentido genérico. «Los justos» conserva la referencia colectiva y la fuerza moral de la categoría sin restringirla a un individuo.
- source_word: לִבְרָכָה
  english_pob_choice: is a blessing
  chosen_spanish: es una bendición
  alternatives_spanish:
  - para bendición
  - trae bendición
  lexicon: HALOT
  rationale: Aunque la preposición sugiere literalmente «para bendición», en español la lectura predicativa «es una bendición» comunica mejor la afirmación proverbial breve y evaluativa del hebreo.
- source_word: שֵׁם
  english_pob_choice: name
  chosen_spanish: nombre
  alternatives_spanish:
  - reputación
  - renombre
  lexicon: HALOT
  rationale: «Nombre» es el equivalente directo y conserva el valor idiomático hebreo de identidad, reputación y legado, sin reducirlo a una sola matiz interpretativa.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los perversos
  lexicon: HALOT
  rationale: El plural adjetival es sustantivado. «Los impíos» es una opción bíblica y comprensible en español que comunica la categoría moral de quienes se oponen a Dios; «malvados» sería más general y menos marcado religiosamente.
- source_word: יִרְקָב
  english_pob_choice: will rot
  chosen_spanish: se pudrirá
  alternatives_spanish:
  - podrirá
  - se corromperá
  lexicon: HALOT
  rationale: El verbo expresa descomposición física concreta. «Se pudrirá» preserva esa imagen vívida mejor que una formulación más abstracta como «perecerá» o «se corromperá».
translation_notes:
  revision_awareness: El borrador sigue de cerca el hebreo y el cierre del audit trail inglés. No hubo revisiones aplicadas en el pase más reciente, y la versión inglesa aprobada mantiene alta concordancia; por eso la redacción española conserva la imaginería concreta y la simetría proverbial sin añadir explicación interpretativa.
  spanish_consistency_notes:
  - Se mantuvo la polaridad proverbial «los justos / los impíos» para reflejar el paralelo hebreo.
  - Se prefirió «bendición» en lugar de una paráfrasis como «algo bueno» para conservar el valor léxico de בְּרָכָה.
  - La nota al pie recoge la alternativa preposicional más literal, equivalente a la glosa inglesa.
  - «Se pudrirá» reproduce el deterioro físico implícito en el verbo hebreo y el inglés «will rot».
