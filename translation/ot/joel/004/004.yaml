theological_decisions:
- issue: Nature of divine response language
  chosen_reading: The verse is rendered in judicial-retributive terms without softening the threat formula.
  alternative_readings:
  - A more generalized statement of consequences
  rationale: The repeated גמל/גמול language and 'on your own head' idiom depict direct divine requital. The translation preserves that tension and does not dilute it into impersonal karma or mere consequence.
  doctrine_reference: Preserve theological tension rather than resolve it.
