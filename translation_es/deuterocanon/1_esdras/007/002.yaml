translation:
  language: es
  text: Supervisaban las obras santas[a] con mayor diligencia, colaborando con los ancianos de los judíos y los encargados del templo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las obras sagradas» o «la obra del templo». El griego dice literalmente «las obras santas»; el paralelo hebreo habla de «la obra de la casa de Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεστάτουν
  english_pob_choice: they supervised
  chosen_spanish: supervisaban
  alternatives_spanish:
  - dirigían
  - estaban al frente de
  - velaban por
  lexicon: LSJ
  rationale: El imperfecto griego expresa una acción continua de supervisión. «Supervisaban» conserva el valor de vigilancia y dirección sin sonar forzado en español.
- source_word: τῶν ἱερῶν ἔργων
  english_pob_choice: the holy works
  chosen_spanish: los trabajos sagrados
  alternatives_spanish:
  - las obras santas
  - la obra del santuario
  - el trabajo del templo
  lexicon: LSJ
  rationale: «ἱερῶν ἔργων» significa literalmente «obras sagradas/ santas». «Trabajos sagrados» mantiene la referencia al carácter sagrado de la tarea y permite que el contexto del templo quede implícito, como en el audit trail inglés.
- source_word: ἐπιμελέστερον
  english_pob_choice: more diligently
  chosen_spanish: con mayor diligencia
  alternatives_spanish:
  - con más cuidado
  - con mayor esmero
  lexicon: LSJ
  rationale: El adverbio comparativo indica mayor atención o cuidado. «Con mayor diligencia» reproduce bien el matiz comparativo y es natural en español bíblico moderno.
- source_word: συνεργοῦντες
  english_pob_choice: working together
  chosen_spanish: trabajando en cooperación
  alternatives_spanish:
  - colaborando
  - trabajando junto con
  - cooperando
  lexicon: LSJ
  rationale: El participio expresa cooperación activa con los grupos en dativo. «Trabajando en cooperación» conserva la idea colaborativa y evita la ambigüedad de un simple «con».
- source_word: τοῖς πρεσβυτέροις τῶν Ἰουδαίων
  english_pob_choice: with the elders of the Jews
  chosen_spanish: con los ancianos de los judíos
  alternatives_spanish:
  - con los ancianos judíos
  - con los ancianos de Judá
  lexicon: LSJ
  rationale: «Πρεσβύτεροι» son ancianos o líderes reconocidos. Se mantiene «de los judíos» para reflejar más de cerca el genitivo griego, tal como el POB inglés prefirió una forma posesiva más literal.
- source_word: ἱεροστάταις
  english_pob_choice: the temple overseers
  chosen_spanish: los encargados del templo
  alternatives_spanish:
  - los supervisores del templo
  - los guardianes del templo
  - los oficiales del santuario
  lexicon: LSJ
  rationale: El término señala a quienes están a cargo de asuntos sagrados/templo. «Encargados del templo» es claro y no especifica más de lo que el griego permite, preservando la función de supervisión.
theological_decisions:
- issue: Relación entre el texto griego de 1 Esdras y el paralelo hebreo de Esdras 6:22
  english_pob_reading: Retain the Greek's explicit mention of cooperation with the elders of the Jews and temple overseers, while allowing the MT parallel to confirm the temple-work context.
  chosen_spanish_reading: Seguir la formulación explícita del griego sobre la cooperación con los ancianos de los judíos y los encargados del templo, dejando que el paralelo hebreo confirme que se trata de labor del templo.
  alternative_spanish_readings:
  - Adaptar libremente el verso según el paralelo hebreo como «fortalecían sus manos en la obra de la casa de Dios»
  rationale: Para 1 Esdras, el griego es el texto ancla primario. El paralelo hebreo respalda el contexto del templo, pero no reemplaza la redacción distintiva del griego, que debe conservarse en la traducción.
  doctrine_reference: 'PHILOSOPHY.md: WLC MT parallels for 1 Esdras; Translation philosophy #1'
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: se mantuvo la lectura alta concordancia sin ajustes adicionales.'
  spanish_consistency_notes:
  - Se conserva el contraste entre el carácter sagrado de las obras y la función administrativa de los encargados.
  - «Judíos» se mantiene como sustantivo colectivo, en paralelo con el genitivo griego.
  - No se introduce «Mesías», «Yahvé» ni otros términos no presentes en este versículo.
  - La nota al pie preserva la alternativa léxica relevante entre «trabajos sagrados» y una formulación más explícita de templo.
