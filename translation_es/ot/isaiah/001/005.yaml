review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo y del POB inglés: mantiene la doble pregunta retórica, la persistencia en la rebelión y la imagen corporal colectiva de cabeza y corazón. También preserva adecuadamente la nota alternativa sobre עַל־מֶה como lectura locativa posible. Sin embargo, «habrían de ser golpeados» introduce un matiz condicional/remoto menos natural que el valor retórico de תֻכּוּ עוֹד; una forma más directa como «serían golpeados» o «van a ser golpeados» sería posible, pero la opción más fiel y natural en este contexto es «¿Por qué habrían de seguir siendo golpeados?» o, mejor, una formulación simple con futuro perifrástico. Además, la nota al pie usa «seríais», que rompe el registro latinoamericano neutral al mezclar voseo/vosotros peninsular con «ustedes» implícito en el texto principal.'
  spanish_quality_summary: El español es claro y eclesialmente legible. «Toda la cabeza está enferma» y «todo el corazón está desfallecido» suenan naturales y conservan la metáfora. El punto principal a reparar es la naturalidad de la primera pregunta y la uniformidad dialectal de la nota. «Desfallecido» funciona, aunque «debilitado» también sería posible; no requiere cambio.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías, Espíritu, etc. «Rebelión» refleja bien סָרָה. La imagen corporal colectiva se conserva correctamente.
  issues:
  - severity: medium
    issue: «habrían de ser golpeados» suena innecesariamente remoto/condicional
    rationale: El hebreo formula una pregunta retórica sobre más castigo. «Habrían de» no es imposible, pero en español bíblico moderno resulta menos directo y menos natural que una formulación simple como «¿Por qué seguirán siendo golpeados?» o «¿Por qué habrían de seguir siendo golpeados?» con ajuste de flujo.
  - severity: medium
    issue: La nota al pie mezcla registro peninsular («seríais») con español neutro latinoamericano
    rationale: El proyecto pide español neutral latinoamericano/broadly church-readable. La nota debe armonizar con el texto principal usando «serían» o una formulación impersonal.
  revised_spanish_text: ¿Por qué habrían de seguir siendo golpeados otra vez? ¿Por qué siguen en rebelión? Toda la cabeza está enferma[a], y todo el corazón está desfallecido.
