translation:
  language: es
  text: Pero si buscas a Dios con diligencia[a], e imploras su favor al Todopoderoso[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «buscas temprano»; el verbo hebreo también puede dar la idea de buscar temprano, aunque aquí probablemente significa buscar con diligencia o empeño.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Shaddai». Tradicionalmente: «el Todopoderoso».'
    reason: alternative_reading
lexical_decisions:
- source_word: אִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Si
  lexicon: HALOT
  rationale: La partícula introduce una cláusula condicional; en español, 'Pero si' conserva tanto la condición como el contraste discursivo con el versículo anterior, de modo natural y fiel.
- source_word: תְּשַׁחֵר
  english_pob_choice: seek earnestly
  chosen_spanish: buscas con diligencia
  alternatives_spanish:
  - buscas temprano
  - buscas
  - buscas con empeño
  lexicon: HALOT
  rationale: El verbo puede significar 'buscar temprano' o 'buscar con diligencia/earnestness'. En este contexto de exhortación piadosa, la fuerza idiomática es la de búsqueda intensa y persistente, no solo una referencia horaria.
- source_word: אֶל אֵל
  english_pob_choice: seek God
  chosen_spanish: a Dios
  alternatives_spanish:
  - de Dios
  - hacia Dios
  lexicon: HALOT
  rationale: El movimiento dirigido a Dios se expresa naturalmente en español con la preposición 'a' tras 'buscar'. 'Dios' mantiene el valor del título/divinidad del hebreo אֵל.
- source_word: שַׁדַּי
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - Shaddai
  lexicon: HALOT
  rationale: Se traduce el título divino para comunicar su fuerza semántica en español, siguiendo la decisión POB de traducir títulos divinos en lugar de transliterarlos en la línea principal.
- source_word: תִּתְחַנָּן
  english_pob_choice: plead for favor
  chosen_spanish: suplicas
  alternatives_spanish:
  - imploras favor
  - pides misericordia
  - haces súplica
  lexicon: HALOT
  rationale: El hitpael de חנן expresa rogar, suplicar o pedir gracia/favor. 'Suplicas' conserva el tono de entreaty sin sobrecargar la frase; el matiz de favor se mantiene por el paralelo con el destinatario divino.
theological_decisions:
- issue: Traducción del título divino שַׁדַּי
  english_pob_reading: the Almighty
  chosen_spanish_reading: el Todopoderoso
  alternative_spanish_readings:
  - Shaddai
  rationale: La tradición auditada del POB en inglés traduce el título para preservar el sentido. En español, 'el Todopoderoso' comunica adecuadamente la majestad y poder del título sin transliteración innecesaria.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
translation_notes:
  revision_awareness: 'Se siguió el pasaje hebreo directo y la auditoría inglesa: el condicional se mantuvo, el verbo שׁחר se entendió en su valor idiomático de búsqueda diligente, y el título שַׁדַּי se tradujo por su equivalente semántico en español. No se detectaron revisiones posteriores que alteren la línea aprobada.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אֵל y 'el Todopoderoso' para שַׁדַּי, evitando mezclar transliteración y traducción en la línea principal.
  - '''Suplicas'' conserva el registro reverente y la idea de petición urgente sin añadir interpretación doctrinal.'
  - La nota de pie para תְּשַׁחֵר preserva la alternativa 'temprano' porque el valor léxico está documentado en la auditoría inglesa.
