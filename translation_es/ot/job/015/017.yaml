lexical_decisions:
- source_word: אֲחַוְךָ
  english_pob_choice: I will tell you
  chosen_spanish: Te lo diré
  alternatives_spanish:
  - Te lo mostraré
  - Te lo declararé
  lexicon: HALOT
  rationale: El piel de חוה aquí introduce el discurso de Elifaz. En español, «te lo diré» transmite de forma natural el acto de comunicar lo que sigue, sin sugerir erróneamente una demostración visual.
- source_word: שְׁמַע לִי
  english_pob_choice: listen to me
  chosen_spanish: escúchame
  alternatives_spanish:
  - oye mi voz
  - escucha lo que digo
  lexicon: HALOT
  rationale: El imperativo con la preposición expresa una petición de atención dirigida al oyente. «Escúchame» conserva esa fuerza apelativa en español actual y bíblico.
- source_word: וְזֶה
  english_pob_choice: What
  chosen_spanish: Lo que
  alternatives_spanish:
  - Y esto
  - Esto
  lexicon: HALOT
  rationale: Aunque formalmente es «y esto», aquí introduce el contenido de la afirmación siguiente. «Lo que» funciona de modo natural en español para presentar la cláusula subordinada.
- source_word: חָזִיתִי
  english_pob_choice: I have seen
  chosen_spanish: he visto
  alternatives_spanish:
  - vi
  - he percibido
  lexicon: HALOT
  rationale: El perfecto expresa una experiencia personal ya adquirida pero todavía relevante para el argumento. «He visto» conserva ese matiz y evita reducirlo a un pasado meramente narrativo.
- source_word: וַאֲסַפֵּרָה
  english_pob_choice: I will recount
  chosen_spanish: lo contaré
  alternatives_spanish:
  - lo relataré
  - lo declararé
  lexicon: HALOT
  rationale: La forma cohortativa comunica intención de narrar o exponer lo observado. «Lo contaré» es claro y fiel al acto de relatar, sin introducir un tono más técnico que el del hebreo.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto al análisis auditado; se mantiene el sentido de habla intencional y de experiencia personal observada.'
  spanish_consistency_notes:
  - Se conserva un registro bíblico moderno y digno, evitando calcos como «oye» o «y esto» cuando el español requiere una subordinación más natural.
  - 'Se mantiene la distinción entre ver y contar: «he visto» / «lo contaré», alineada con la secuencia observación-relato del hebreo.'
  - No se usa «SEÑOR» ni terminología teológica ajena al versículo, porque no aparece el tetragrámaton ni un título divino en este segmento.
