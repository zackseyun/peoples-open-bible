  to: 'Otra vez envió a un tercer capitán de cincuenta con sus cincuenta.[a] Él subió y vino, y el tercer capitán de cincuenta se arrodilló de rodillas delante de Elías, le rogó y le dijo: «Hombre de Dios[b], te ruego que mi vida y la vida de estos cincuenta siervos tuyos sean preciosas ante tus ojos».[c]'
