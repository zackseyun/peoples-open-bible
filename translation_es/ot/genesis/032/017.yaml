  to: 'Puso cada rebaño aparte[d] en manos de sus siervos[a], y dijo a sus siervos: «Pasen delante de mí, y pongan un espacio entre rebaño y rebaño[b][c]».'
  rationale: La revisión conserva el sentido del hebreo y el estilo natural del borrador, pero corrige el aparato crítico para que siga fielmente el rastro del POB inglés y la disciplina de anclaje. Se elimina la nota espuria sobre «Pasen delante de mí», se restituye una nota en «cada rebaño aparte» para עֵדֶר עֵדֶר לְבַדּוֹ, y se corrigen las alternativas de «entre rebaño y rebaño».
