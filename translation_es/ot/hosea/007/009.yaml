    issue: «Los extraños» para זָרִים suena ambiguo en español.
    rationale: En este contexto de Oseas, se trata de extranjeros o potencias foráneas que consumen la fuerza de Efraín. «Extraños» en español contemporáneo puede sugerir personas raras o desconocidas más que extranjeras.
  - severity: medium
    issue: «El cabello cano ha sido esparcido sobre él» es poco idiomático.
    rationale: Aunque formalmente cercano, resulta rígido en español. La imagen hebrea apunta a la aparición dispersa de canas como señal de envejecimiento; conviene expresarla de modo más natural y legible.
  - severity: low
    issue: La nota b repite una literalidad demasiado cercana a una redacción española poco natural.
    rationale: Si el texto principal se mejora a «las canas ya están esparcidas sobre él», la nota puede conservar la explicación cultural sin insistir en una formulación española torpe.
