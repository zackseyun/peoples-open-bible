translation:
  language: es
  text: Así apartaron a Quedes en Galilea, en la región montañosa de Neftalí, y a Siquem, en la región montañosa de Efraín, y a Quiriat-arba, es decir, Hebrón[a], en la región montañosa de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Quiriat-arba, ella es Hebrón»; es decir, Quiriat-arba es otro nombre para Hebrón.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְדִּשׁוּ
  english_pob_choice: set apart
  chosen_spanish: apartaron
  alternatives_spanish:
  - consagraron
  - santificaron
  - designaron
  lexicon: HALOT
  rationale: En este contexto jurídico-territorial, el verbo indica la acción formal de reservar estas ciudades para un propósito especial (ciudades de refugio). 'Apartaron' conserva la idea de separación funcional sin cargarla innecesariamente de sentido ritual.
- source_word: קֶדֶשׁ
  english_pob_choice: Kedesh
  chosen_spanish: Quedes
  alternatives_spanish:
  - Kedés
  - Cades
  lexicon: HALOT
  rationale: Es nombre propio de lugar. Se translitera al español de forma readable y coherente con el resto de nombres geográficos del pasaje.
- source_word: בַּגָּלִיל
  english_pob_choice: in Galilee
  chosen_spanish: en Galilea
  alternatives_spanish:
  - en el Galil
  lexicon: HALOT
  rationale: Se usa la forma geográfica habitual en español, que es clara y estable para los lectores.
- source_word: בְּהַר נַפְתָּלִי
  english_pob_choice: in the hill country of Naphtali
  chosen_spanish: en la región montañosa de Neftalí
  alternatives_spanish:
  - en la serranía de Neftalí
  - en la montaña de Neftalí
  lexicon: HALOT
  rationale: הַר en descripciones territoriales suele referirse a una zona montañosa o de altiplano, no a un monte singular. 'Región montañosa' comunica mejor ese valor en español que 'monte' o una forma demasiado literal.
- source_word: שְׁכֶם
  english_pob_choice: Shechem
  chosen_spanish: Siquem
  alternatives_spanish:
  - Siquén
  lexicon: HALOT
  rationale: Nombre propio de lugar; 'Siquem' es la forma española tradicional y ampliamente reconocible.
- source_word: בְּהַר אֶפְרָיִם
  english_pob_choice: in the hill country of Ephraim
  chosen_spanish: en la región montañosa de Efraín
  alternatives_spanish:
  - en la serranía de Efraín
  - en la montaña de Efraín
  lexicon: HALOT
  rationale: Se mantiene la misma solución territorial que para Neftalí, preservando la fuerza regional de הַר en un registro natural de español.
- source_word: קִרְיַת אַרְבַּע
  english_pob_choice: Kiriath-arba
  chosen_spanish: Quiriat-arba
  alternatives_spanish:
  - Quiriat Arba
  - Ciudad de Arba
  lexicon: HALOT
  rationale: Es un nombre fijo. Se translitera en español para no perder la forma onomástica del hebreo.
- source_word: הִיא חֶבְרוֹן
  english_pob_choice: (that is, Hebron)
  chosen_spanish: es decir, Hebrón
  alternatives_spanish:
  - esto es, Hebrón
  - o sea, Hebrón
  lexicon: HALOT
  rationale: La construcción hebrea identifica Quiriat-arba con Hebrón. 'Es decir' expresa la equivalencia de manera natural y precisa en español.
- source_word: בְּהַר יְהוּדָה
  english_pob_choice: in the hill country of Judah
  chosen_spanish: en la región montañosa de Judá
  alternatives_spanish:
  - en la serranía de Judá
  - en la montaña de Judá
  lexicon: HALOT
  rationale: Se conserva el mismo tratamiento territorial de הַר para mantener consistencia y claridad en la descripción geográfica.
theological_decisions:
- issue: Sentido de וַיַּקְדִּשׁוּ en un listado de ciudades de refugio
  english_pob_reading: set apart
  chosen_spanish_reading: apartaron
  alternative_spanish_readings:
  - consagraron
  - santificaron
  - designaron
  rationale: 'La acción no es primariamente cultual sino legal-administrativa: separar ciudades para un uso específico. ''Apartaron'' evita imponer un matiz religioso más fuerte del que exige el hebreo en este contexto.'
  doctrine_reference: Josué 20:7; ciudades de refugio
- issue: Valor territorial de הַר en las fórmulas 'בְּהַר נַפְתָּלִי', 'בְּהַר אֶפְרָיִם' y 'בְּהַר יְהוּדָה'
  english_pob_reading: hill country
  chosen_spanish_reading: región montañosa
  alternative_spanish_readings:
  - montes de
  - montaña de
  - serranía de
  rationale: La referencia describe una zona elevada o montañosa asociada con cada tribu, no un solo monte. 'Región montañosa' comunica el sentido regional sin perder precisión geográfica.
  doctrine_reference: Josué 20:7
translation_notes:
  revision_awareness: 'Se revisó la validación previa: el único problema detectado era que el marcador [a] no aparecía en el texto. En esta versión, [a] está anclado explícitamente en ''Quiriat-arba[a]''. No se introdujeron otros cambios de contenido respecto del sentido auditado por la POB inglesa.'
  spanish_consistency_notes:
  - 'Se mantiene una terminología geográfica coherente: ''región montañosa'' para las fórmulas territoriales con הַר.'
  - Se usa 'Hebrón' con tilde, forma estándar en español.
  - Los nombres propios se transliteran en español cuando corresponde, evitando traducciones innecesarias.
  - '''Apartaron'' conserva el valor de separación formal sin sobrerreligiosizar el verbo hebreo en este contexto.'
