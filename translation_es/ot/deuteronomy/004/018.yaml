    reason: lexical_alternative
  - marker: b
    text: «Debajo de la tierra» hace eco de la expresión bíblica fija para las aguas situadas bajo la tierra firme; compárese la redacción de la prohibición de imágenes en Éxodo 20:4.
    reason: cross_reference
  revision_rationale: Se reubica la nota léxica [a] sobre «forma», que es el término traducido de תַּבְנִית, y se corrige la redacción de la nota [b] para un español natural y normativo sin cambiar su contenido.
