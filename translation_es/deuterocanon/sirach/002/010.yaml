translation:
  language: es
  text: 'Miren a las generaciones antiguas y vean: ¿quién creyó en Yahvé y fue avergonzado? ¿O quién confió en él y fue abandonado? ¿O quién lo invocó y no recibió respuesta?[a][b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «¿quién permaneció en su temor y fue abandonado?». El hebreo conservado dice: «¿quién confió en él y fue abandonado?».'
    reason: alternative_reading
  - marker: b
    text: 'Griego: «¿quién lo invocó, y él lo ignoró?». El hebreo dice: «¿quién lo invocó y no recibió respuesta?».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבִּיטוּ
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - Observen
  lexicon: HALOT
  rationale: El imperativo plural pide dirigir la atención a ejemplos históricos; «Miren» es natural en español y conserva el tono exhortativo sin endurecerse.
- source_word: לְדוֹרוֹת רִאשׂוֹנִים
  english_pob_choice: to the generations of old
  chosen_spanish: a las generaciones antiguas
  alternatives_spanish:
  - a las generaciones de antaño
  - a las generaciones primeras
  lexicon: HALOT
  rationale: La expresión apunta a generaciones anteriores como precedente histórico. «Antiguas» mantiene el registro elevado y es clara en español.
- source_word: הֶאֱמִין בַּיהֹוָה
  english_pob_choice: believed in Yahweh
  chosen_spanish: creyó en Yahvé
  alternatives_spanish:
  - confió en Yahvé
  - tuvo fe en Yahvé
  lexicon: HALOT
  rationale: Aquí אמן conserva el sentido de creer/poner la confianza en Dios. Se mantiene «Yahvé» conforme al criterio del proyecto para el Tetragrammaton.
- source_word: וַיֵּבוֹשׁ
  english_pob_choice: was put to shame
  chosen_spanish: fue avergonzado
  alternatives_spanish:
  - fue puesto en vergüenza
  - quedó avergonzado
  lexicon: HALOT
  rationale: El hebreo expresa el resultado de la confianza fallida; «fue avergonzado» comunica bien la deshonra, y deja abierta la fuerza de la pasiva hebrea.
- source_word: בָּטַח בּוֹ
  english_pob_choice: trusted in him
  chosen_spanish: confió en él
  alternatives_spanish:
  - se apoyó en él
  - depositó su confianza en él
  lexicon: HALOT
  rationale: Se distingue de הֶאֱמִין. «Confió en él» mantiene el paralelo sin repetir mecánicamente la primera cláusula.
- source_word: וְנֶעֱזַב
  english_pob_choice: was abandoned
  chosen_spanish: fue abandonado
  alternatives_spanish:
  - fue dejado
  - fue desamparado
  lexicon: HALOT
  rationale: עָזַב en pasiva señala quedar sin ayuda. «Fue abandonado» es claro y fiel; «desamparado» sería más literario pero menos directo.
- source_word: קָרָא אֵלָיו
  english_pob_choice: called on him
  chosen_spanish: lo invocó
  alternatives_spanish:
  - clamó a él
  - llamó a él
  lexicon: HALOT
  rationale: El giro idiomático es religioso y verbalmente compacto; «lo invocó» conserva ese matiz litúrgico/orante sin añadir paráfrasis.
- source_word: וְלֹא נֶעֱנָה
  english_pob_choice: was not answered
  chosen_spanish: no fue atendido
  alternatives_spanish:
  - no recibió respuesta
  - no fue oído
  lexicon: HALOT
  rationale: El pasivo de ענה indica recibir respuesta. «No fue atendido» es idiomático en español y mantiene la negativa de la petición sin forzar una especificación adicional.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrama. Conforme al estándar del proyecto, se traduce directamente por el nombre divino «Yahvé», no por una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Diferencia entre el hebreo conservado y el paralelo griego
  english_pob_reading: Main text follows the extant Hebrew; Greek alternatives preserved in footnotes
  chosen_spanish_reading: El texto principal sigue el hebreo; se preservan en notas las variantes griegas significativas
  alternative_spanish_readings:
  - Seguir el griego en el texto principal
  - armonizar silenciosamente hebreo y griego
  rationale: 'El hebreo está disponible con alta confianza y presenta la lectura principal del proyecto para Sirácides. La divergencia griega no se borra: se documenta en notas para que el lector vea la tensión textual.'
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use Greek parallel as input'
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del expediente inglés, que corrigió la primera cláusula a «believed» para reflejar mejor הֶאֱמִין y mantenerla distinta de בָּטַח. La versión española conserva esa distinción: «creyó» / «confió». También se respetó la decisión editorial de seguir el hebreo conservado en el texto principal y documentar el griego en notas.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrama, coherente con el criterio del proyecto.
  - Se distingue «creyó» de «confió» para reflejar dos verbos hebreos diferentes.
  - «Lo invocó» mantiene el verbo de oración dirigido a Dios sin expandir el sentido.
  - Las notas reproducen las dos divergencias griegas relevantes sin mezclarlas en el texto principal.
