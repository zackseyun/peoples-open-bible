id: COL.1.3
reference: Colossians 1:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Εὐχαριστοῦμεν τῷ ⸀θεῷ πατρὶ τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ πάντοτε ⸀περὶ ὑμῶν προσευχόμενοι,
base_translation:
  language: en
  yaml_path: translation/nt/colossians/001/003.yaml
  text: We always give thanks to God, the Father of our Lord Jesus Messiah, when we pray for you,
translation:
  language: ko
  text: 우리는 여러분을 위하여 기도할 때마다, 우리 주 예수 메시아[a]의 아버지이신 하나님께 늘 감사드립니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그리스도」. Χριστός를 칭호로 옮기는 본 번역의 원칙에 따라 「메시아」로 번역한다.
    reason: alternative_reading
lexical_decisions:
- source_word: Εὐχαριστοῦμεν
  english_pob_choice: We give thanks
  chosen_korean: 감사드립니다
  alternatives_korean:
  - 감사합니다
  - 감사를 드립니다
  lexicon: BDAG
  rationale: 현재 능동 직설법 1인칭 복수. 합쇼체 격식과 하나님께 대한 경어 어감을 살려 「감사드립니다」로 옮긴다.
- source_word: τῷ θεῷ πατρὶ
  english_pob_choice: to God, the Father
  chosen_korean: 아버지이신 하나님께
  alternatives_korean:
  - 하나님, 곧 아버지께
  - 하나님 아버지께
  lexicon: BDAG
  rationale: 두 여격의 동격 구조를 한국어에서는 관형사절 「아버지이신 하나님」으로 풀어 자연스럽게 옮긴다.
- source_word: τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ
  english_pob_choice: of our Lord Jesus Messiah
  chosen_korean: 우리 주 예수 메시아의
  alternatives_korean:
  - 우리 주 예수 그리스도의
  - 우리 주이신 예수 메시아의
  lexicon: BDAG
  rationale: 한국 교회 전통의 정형 「우리 주 예수 메시아」를 사용하며, Χριστός는 칭호로서 「메시아」로 옮긴다.
- source_word: πάντοτε
  english_pob_choice: always
  chosen_korean: 늘
  alternatives_korean:
  - 항상
  - 언제나
  lexicon: BDAG
  rationale: 합쇼체 산문에서 「늘」이 간결하고 자연스럽다. 본 절의 「~할 때마다 늘」 구조에서 시간적 지속성을 잘 살린다.
- source_word: περὶ ὑμῶν
  english_pob_choice: for you
  chosen_korean: 여러분을 위하여
  alternatives_korean:
  - 여러분에 관하여
  - 여러분에 대하여
  lexicon: BDAG
  rationale: 기도의 περί + 속격은 중보의 대상을 가리키므로, 「~을 위하여」로 옮기는 것이 가장 자연스럽다.
- source_word: προσευχόμενοι
  english_pob_choice: when we pray
  chosen_korean: 기도할 때마다
  alternatives_korean:
  - 기도하면서
  - 기도하며
  lexicon: BDAG
  rationale: 현재 분사로 주동사의 정황을 표현한다. 「~할 때마다」로 옮겨 감사의 계기를 명확히 한다.
