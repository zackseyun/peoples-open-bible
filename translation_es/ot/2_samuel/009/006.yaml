base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/009/006.yaml
  text: Mephibosheth son of Jonathan[a], son of Saul, came to David and fell on his face and bowed down. David said, “Mephibosheth,” and he said, “Behold[b], your servant.”
  footnotes:
  - marker: a
    text: Or “paid homage.” The Hebrew verb can denote bowing in reverence; because the action is toward David, the main text avoids the potentially misleading English “worshiped.”
    reason: lexical_alternative
  - marker: b
    text: Literally, “Behold, your servant.”
    reason: lexical_alternative
