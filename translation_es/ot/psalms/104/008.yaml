translation:
  language: es
  text: Los montes se elevaron[a], los valles se hundieron, al lugar que tú estableciste para ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo otra lectura plausible de la poesía hebrea: «Subieron sobre los montes; bajaron a los valles, al lugar que tú estableciste para ellos», entendiendo que las aguas son el sujeto implícito.'
    reason: alternative_reading
lexical_decisions:
- source_word: יַעֲלוּ
  english_pob_choice: rose
  chosen_spanish: subieron
  alternatives_spanish:
  - ascendieron
  - subieron hacia arriba
  lexicon: HALOT
  rationale: El qal imperfecto 3mp de עלה expresa movimiento ascendente. En español, «subieron» conserva la imagen verbal y suena natural en poesía; evita una paráfrasis excesiva.
- source_word: הָרִים
  english_pob_choice: the mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - las montañas
  - los montes y montañas
  lexicon: HALOT
  rationale: El plural definido apunta a relieves concretos en el cuadro poético. «Montes» es un equivalente bíblico-natural en español, sobrio y claramente topográfico.
- source_word: יֵרְדוּ
  english_pob_choice: sank down
  chosen_spanish: descendieron
  alternatives_spanish:
  - bajaron
  - se hundieron
  lexicon: HALOT
  rationale: El qal imperfecto 3mp de ירד pide un movimiento hacia abajo. «Descendieron» preserva la correspondencia formal con «subieron» sin añadir la connotación física más fuerte de «se hundieron».
- source_word: בְקָעוֹת
  english_pob_choice: the valleys
  chosen_spanish: los valles
  alternatives_spanish:
  - las quebradas
  - las hondonadas
  lexicon: HALOT
  rationale: El sustantivo plural se refiere a lugares bajos/vallejos. «Valles» es el término más claro y poéticamente equilibrado frente a «montes».
- source_word: אֶל מְקוֹם
  english_pob_choice: to the place
  chosen_spanish: al lugar
  alternatives_spanish:
  - a el lugar
  - hacia el lugar
  lexicon: HALOT
  rationale: La preposición con sustantivo singular expresa destino. «Al lugar» es la forma natural y fiel en español.
- source_word: זֶה
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - donde
  lexicon: HALOT
  rationale: Aunque formalmente es «este», la cadena relativa en español requiere «que» para evitar una construcción torpe. Se mantiene el referente deíctico dentro de la cláusula relativa.
- source_word: יָסַדְתָּ
  english_pob_choice: established
  chosen_spanish: estableciste
  alternatives_spanish:
  - fundaste
  - fijaste
  lexicon: HALOT
  rationale: El qal perfecto 2ms de יסד habla de poner/establecer con orden. «Estableciste» comunica la acción divina de asignar y ordenar ese lugar sin forzar una metáfora arquitectónica.
- source_word: לָהֶם
  english_pob_choice: for them
  chosen_spanish: para ellos
  alternatives_spanish:
  - para estas
  - para éstos
  lexicon: HALOT
  rationale: El sufijo masculino plural se conserva con un pronombre plural español. «Para ellos» mantiene la referencia plural sin decidir de forma innecesaria si el antecedente inmediato es el relieve o el agua personificada.
theological_decisions:
- issue: Sujeto poético de los verbos de movimiento
  english_pob_reading: 'The verse can be read as topography in motion: ''The mountains rose, the valleys sank down, to the place that you established for them.'''
  chosen_spanish_reading: Los montes y los valles se presentan como los sujetos gramaticales del movimiento.
  alternative_spanish_readings:
  - 'Las aguas son el sujeto implícito: ''Subieron sobre los montes; descendieron en los valles, al lugar que tú estableciste para ellos.'''
  rationale: La sintaxis hebrea permite la lectura publicada, coherente con la imagen de ordenación del paisaje. Sin embargo, el contexto amplio de la estrofa también permite entender aguas implícitas; por eso se conserva la tensión en nota en vez de resolverla silenciosamente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El borrador sigue el pasaje hebreo WLC y el audit trail en inglés sin cambios necesarios respecto a la revisión más reciente; se mantiene la lectura principal con una nota alternativa para el sujeto poético implícito.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente exija el nombre divino; este versículo no contiene el tetragrámaton.
  - Se evitó «SEÑOR» porque no aparece en el hebreo de este verso.
  - «Montes»/«valles» preserva el paralelismo poético y la imaginería topográfica sin introducir un registro excesivamente moderno.
  - La nota a conserva la alternativa interpretativa documentada por la POB inglesa y no añade lecturas no atestiguadas.
