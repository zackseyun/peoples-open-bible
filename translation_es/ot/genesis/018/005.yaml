translation:
  language: es
  text: 'Y permítanme traer un bocado de pan[a], para que recobren fuerzas[b]; después podrán seguir su camino, pues para eso han pasado junto a su siervo. Y ellos dijeron: «Sí, haz como has dicho».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión hebrea פַת לֶחֶם es una fórmula modesta de hospitalidad; puede entenderse como «un bocado de pan» o «una porción pequeña de pan».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «sostengan/fortalezcan su corazón». El hebreo usa una expresión idiomática para recobrar fuerzas o ser fortalecido con comida.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶקְחָה
  english_pob_choice: And let me bring
  chosen_spanish: Y déjame traer
  alternatives_spanish:
  - Y permíteme traer
  - Y tomaré
  lexicon: HALOT
  rationale: El cohortativo expresa una oferta voluntariosa y cortés, no un futuro simple. «Déjame traer» comunica bien esa autopresentación hospitalaria en español natural.
- source_word: פַת לֶחֶם
  english_pob_choice: a morsel of bread
  chosen_spanish: un bocado de pan
  alternatives_spanish:
  - una mordida de pan
  - un pedazo de pan
  lexicon: HALOT
  rationale: La expresión hebrea es una modestia hospitaria para una porción pequeña de pan. «Bocado de pan» preserva la pequeñez y suena más natural que una versión demasiado literal.
- source_word: וְסַעֲדוּ לִבְּכֶם
  english_pob_choice: so that you may refresh your hearts
  chosen_spanish: para que refresquen su corazón
  alternatives_spanish:
  - para que sostengan su corazón
  - para que fortalezcan su corazón
  lexicon: HALOT
  rationale: 'El hebreo usa una imagen idiomática: sostener/refrescar el corazón con comida. «Refresquen su corazón» conserva la imagen y el sentido de alivio/refrigerio; se mantiene el singular colectivo reflejando el giro idiomático del original.'
- source_word: אַחַר תַּעֲבֹרוּ
  english_pob_choice: after that you may pass on
  chosen_spanish: después de eso pasarán adelante
  alternatives_spanish:
  - luego seguirán su camino
  - después de eso pasarán
  lexicon: HALOT
  rationale: Aquí עבר alude a continuar el viaje. «Pasarán adelante» expresa el avance en el camino sin perder la fuerza del movimiento.
- source_word: כִּי עַל כֵּן
  english_pob_choice: since this is why
  chosen_spanish: pues para eso
  alternatives_spanish:
  - porque por eso
  - ya que para eso
  lexicon: HALOT
  rationale: La combinación introduce la razón de la invitación. «Pues para eso» comunica de manera fluida la idea causal, manteniendo el vínculo con el propósito del gesto de hospitalidad.
- source_word: עֲבַרְתֶּם עַל עַבְדְּכֶם
  english_pob_choice: you have passed by your servant
  chosen_spanish: han pasado junto a su siervo
  alternatives_spanish:
  - han pasado por su siervo
  - han pasado junto a su servidor
  lexicon: HALOT
  rationale: El verbo y la preposición apuntan a haber pasado por el lugar de Abraham. «Junto a» refleja ese movimiento espacial; «su siervo» conserva el registro deferente de עבד en este contexto de cortesía.
- source_word: עַבְדְּכֶם
  english_pob_choice: your servant
  chosen_spanish: su siervo
  alternatives_spanish:
  - su servidor
  - su esclavo
  lexicon: HALOT
  rationale: Aunque el campo léxico de עבד puede incluir «esclavo», aquí funciona como fórmula de humildad y deferencia en hospitalidad. «Siervo» reproduce mejor ese registro en español sin endurecerlo innecesariamente.
- source_word: וַיֹּאמְרוּ
  english_pob_choice: And they said
  chosen_spanish: Y ellos dijeron
  alternatives_spanish:
  - Entonces dijeron
  - Y respondieron
  lexicon: HALOT
  rationale: Es la transición narrativa estándar del wayyiqtol. «Y ellos dijeron» mantiene el flujo del relato de forma sobria y directa.
- source_word: כֵּן תַּעֲשֶׂה
  english_pob_choice: Yes, do
  chosen_spanish: Sí, haz
  alternatives_spanish:
  - Sí, hazlo
  - Así haz
  lexicon: HALOT
  rationale: La réplica es breve y afirmativa. «Sí, haz» expresa el asentimiento explícito sin añadir material ajeno.
- source_word: כַּאֲשֶׁר דִּבַּרְתָּ
  english_pob_choice: as you have said
  chosen_spanish: como has dicho
  alternatives_spanish:
  - tal como has dicho
  - según has dicho
  lexicon: HALOT
  rationale: La cláusula confirma la propuesta de Abraham. «Como has dicho» es la forma más natural y fiel en español contemporáneo.
translation_notes:
  revision_awareness: 'Se siguió el último pase de revisión del contexto inglés: la traducción adopta la imagen de una porción pequeña de pan para פַת לֶחֶם y refleja más directamente עֲבַרְתֶּם con una formulación espacial de haber pasado junto a Abraham. También se preservó el tono cortés y hospitable del cohortativo.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» por defecto del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se evitó «Señor» para עַבְדְּכֶם porque aquí no es vocativo de divinidad sino autoidentificación humilde de Abraham.
  - La coherencia de registro se sostuvo con un español bíblico moderno, digno y claro, sin calcos innecesarios.
