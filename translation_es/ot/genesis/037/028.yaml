translation:
  language: es
  text: Entonces pasaron hombres madianitas[a], comerciantes; y sacaron a José y lo subieron del pozo, y vendieron a José a los ismaelitas por veinte piezas de plata[b][c]. Luego llevaron a José a Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente 'hombres madianitas'. La traducción conserva tanto el sustantivo como el gentilicio; 'comerciantes' traduce el participio siguiente.
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente 'por veinte plata'; no especifica la unidad. Por eso se traduce 'veinte piezas de plata'.
    reason: lexical_alternative
  - marker: c
    text: El hebreo usa verbos en plural ('sacaron', 'subieron', 'vendieron', 'llevaron') después de mencionar tanto a los comerciantes madianitas como a los ismaelitas, dejando cierta ambigüedad sobre qué grupo está en vista en cada acción.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַבְרוּ
  english_pob_choice: passed by
  chosen_spanish: pasaron
  alternatives_spanish:
  - pasaron por allí
  - iban pasando
  lexicon: HALOT
  rationale: El verbo עבר en este contexto narrativo expresa que un grupo pasó por el lugar. 'Pasaron' conserva el movimiento sin añadir una idea de llegada o detención.
- source_word: אֲנָשִׁים מִדְיָנִים
  english_pob_choice: Midianite men
  chosen_spanish: hombres madianitas
  alternatives_spanish:
  - madianitas
  - hombres de Madián
  lexicon: HALOT
  rationale: El hebreo combina 'hombres' con el gentilicio. 'Hombres madianitas' conserva ambos elementos y suena natural en español.
- source_word: סֹחֲרִים
  english_pob_choice: traders
  chosen_spanish: comerciantes
  alternatives_spanish:
  - mercaderes
  - traficantes
  lexicon: HALOT
  rationale: El participio indica actividad comercial viajera. 'Comerciantes' comunica bien ese sentido en español sin perder la referencia a su oficio.
- source_word: וַיִּמְשְׁכוּ
  english_pob_choice: they pulled
  chosen_spanish: sacaron
  alternatives_spanish:
  - tiraron de
  - arrastraron
  lexicon: HALOT
  rationale: En combinación con el siguiente verbo, el movimiento es sacar a alguien de un hoyo. 'Sacaron' expresa el resultado en español con naturalidad, aunque el original usa una acción de tirar o jalar.
- source_word: וַיַּעֲלוּ
  english_pob_choice: they brought him up
  chosen_spanish: lo subieron
  alternatives_spanish:
  - lo levantaron
  - lo hicieron subir
  lexicon: HALOT
  rationale: עלה con מן הבור marca subida desde el pozo. 'Lo subieron' mantiene la imagen de ascenso y permite conservar la secuencia verbal hebrea.
- source_word: מִן הַבּוֹר
  english_pob_choice: out of the pit
  chosen_spanish: del pozo
  alternatives_spanish:
  - fuera del pozo
  - del hoyo
  lexicon: HALOT
  rationale: En esta escena, בור se entiende como un pozo/cisterna. 'Del pozo' es el equivalente más claro y leído naturalmente en español.
- source_word: וַיִּמְכְּרוּ
  english_pob_choice: sold
  chosen_spanish: vendieron
  alternatives_spanish:
  - lo vendieron
  - lo entregaron por dinero
  lexicon: HALOT
  rationale: El verbo significa de manera directa 'vender'. 'Vendieron' conserva la fuerza comercial y legal del acto.
- source_word: לַיִּשְׁמְעֵאלִים
  english_pob_choice: to the Ishmaelites
  chosen_spanish: a los ismaelitas
  alternatives_spanish:
  - para los ismaelitas
  - a los de Ismael
  lexicon: HALOT
  rationale: El complemento indirecto es explícito. Se mantiene 'ismaelitas' como nombre de grupo, sin suavizar la identificación étnica.
- source_word: בְּעֶשְׂרִים כָּסֶף
  english_pob_choice: for twenty pieces of silver
  chosen_spanish: por veinte de plata
  alternatives_spanish:
  - por veinte piezas de plata
  - por veinte siclos de plata
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'por veinte plata' y no especifica la unidad. 'Veinte de plata' deja visible la ambigüedad textual; las alternativas más explícitas añaden una unidad que el hebreo no da aquí.
- source_word: וַיָּבִיאוּ
  english_pob_choice: they brought
  chosen_spanish: llevaron
  alternatives_spanish:
  - trajeron
  - condujeron
  lexicon: HALOT
  rationale: El verbo puede expresar llevar a alguien a un destino. 'Llevaron' funciona bien en español y evita la repetición de 'trajeron' en una narración de movimiento hacia Egipto.
- source_word: מִצְרָיְמָה
  english_pob_choice: to Egypt
  chosen_spanish: a Egipto
  alternatives_spanish:
  - hasta Egipto
  - hacia Egipto
  lexicon: HALOT
  rationale: La terminación direccional indica movimiento hacia Egipto. 'A Egipto' es idiomático y fiel al sentido.
theological_decisions:
- issue: Ambigüedad sobre qué grupo realiza las acciones posteriores (madianitas o ismaelitas)
  english_pob_reading: Use the generic plural 'they' without resolving beyond the Hebrew sequence
  chosen_spanish_reading: Se mantiene el plural impersonal 'ellos' implícito en los verbos, sin identificar de forma cerrada a un solo grupo como agente de cada acción
  alternative_spanish_readings:
  - Hacer que los madianitas sean los únicos agentes
  - Hacer que los ismaelitas sean los únicos agentes
  rationale: El hebreo menciona a madianitas y luego a ismaelitas, y usa verbos plurales que dejan cierta tensión narrativa. La traducción conserva esa ambigüedad en lugar de armonizarla artificialmente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB que reordenó 'pulled' y 'lifted' para reflejar mejor la secuencia hebrea. En español se mantuvo esa secuencia con 'sacaron... y lo subieron'. También se preservó la ambigüedad sobre los agentes plurales, tal como el audit trail en inglés aconseja.
  spanish_consistency_notes:
  - Se emplea 'Yahvé' para el nombre divino en el proyecto, pero este versículo no lo contiene.
  - '''José'' se mantiene como forma bíblica estable.'
  - '''Pozo'' se usa para בור siguiendo el uso narrativo habitual y la claridad en español.'
  - Se evita 'siclos' porque el hebreo de este versículo no nombra la unidad de peso o moneda.
