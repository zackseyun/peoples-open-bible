revisions:
- from: Entonces Yahvé siguió su camino[a] cuando terminó de hablar con Abraham, y Abraham volvió a su lugar.
  to: Entonces Yahvé[a] siguió su camino cuando terminó de hablar a Abraham, y Abraham volvió a su lugar.
  rationale: Se corrige «con Abraham» a «a Abraham» para reflejar mejor אֶל y el análisis léxico auditado. También se reubica y depura la nota al pie para que ancle correctamente en «Yahvé» y no repita la forma principal como si fuera alternativa. El resto del verso puede mantenerse, pues es fiel, claro y acorde con la terminología del proyecto.
