revisions:
- from: Pero lavará las entrañas y las piernas con agua[a], y el sacerdote presentará todo ello y lo hará subir en humo sobre el altar. Es un holocausto, una ofrenda encendida, olor grato para Yahvé.
  to: Pero lavará las entrañas y las piernas con agua, y el sacerdote presentará todo ello y lo hará subir en humo sobre el altar. Es un holocausto, una ofrenda hecha por fuego[a], olor grato para Yahvé.
  rationale: Se corrige el problema principal moviendo la nota al término que realmente glosa, אִשֵּׁה. También se mejora «ofrenda encendida» a «ofrenda hecha por fuego», que suena más natural en español bíblico y preserva mejor el matiz léxico documentado en el expediente inglés. Se mantiene el resto porque refleja adecuadamente el sentido hebreo y la terminología del proyecto.
