translation:
  language: es
  text: Y Balac sacrificó ganado y ovejas[b], y les envió parte[a] a Balaam y a los funcionarios que estaban con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «les envió porciones a Balaam y a los funcionarios que estaban con él». El hebreo dice simplemente «envió», pero el contexto de los animales sacrificados sugiere que se enviaron alimentos o porciones del sacrificio.'
    reason: lexical_alternative
  - marker: b
    text: «Ovejas» puede entenderse también de manera más amplia como «rebaño» o «ganado menor», pues el término hebreo puede incluir cabras.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְבַּח
  english_pob_choice: sacrificed
  chosen_spanish: sacrificó
  alternatives_spanish:
  - inmoló
  - ofreció en sacrificio
  - mató para sacrificio
  lexicon: HALOT
  rationale: זבח tiene sentido cultual de sacrificar, no solo matar. En español, «sacrificó» comunica ese valor con naturalidad y sin volverlo demasiado explicativo.
- source_word: בָּקָר
  english_pob_choice: cattle
  chosen_spanish: ganado
  alternatives_spanish:
  - bovinos
  - reses
  - cattle
  lexicon: HALOT
  rationale: בקר es un término colectivo para animales vacunos. «Ganado» funciona en español como colectivo natural y evita restringir indebidamente a machos o a una sola clase de res.
- source_word: צֹאן
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - rebaño
  - ganado menor
  - ovejas y cabras
  lexicon: HALOT
  rationale: צאן puede abarcar ganado menor, incluidas ovejas y cabras. Aquí, en el par con בקר, «ovejas» es una forma breve y natural; la nota conserva la amplitud posible del término.
- source_word: וַיְשַׁלַּח
  english_pob_choice: sent some
  chosen_spanish: envió
  alternatives_spanish:
  - envió algunas porciones
  - mandó
  - envió parte
  lexicon: HALOT
  rationale: El verbo hebreo dice simplemente «envió». En español, dado el contexto sacrificial, «envió» deja abierta la implicación de porciones o comida sin añadir más de lo que el texto explicita.
- source_word: לְבִלְעָם
  english_pob_choice: to Balaam
  chosen_spanish: a Balaam
  alternatives_spanish:
  - a Balaam
  - para Balaam
  lexicon: transliteration policy
  rationale: Se conserva el nombre propio con la transliteración habitual del proyecto; la preposición «a» refleja el dativo de destinatario.
- source_word: לַשָּׂרִים
  english_pob_choice: to the officials
  chosen_spanish: a los funcionarios
  alternatives_spanish:
  - a los oficiales
  - a los jefes
  - a los príncipes
  lexicon: HALOT
  rationale: שׂרים designa personas de rango o autoridad. «Funcionarios» es claro en español moderno y evita la carga monárquica o cortesana que «príncipes» podría sugerir.
- source_word: אֲשֶׁר אִתּוֹ
  english_pob_choice: who were with him
  chosen_spanish: que estaban con él
  alternatives_spanish:
  - que estaban con él
  - que estaban con Balaam
  - con él
  lexicon: HALOT
  rationale: La cláusula relativa preserva la relación explícita del hebreo. «Con él» mantiene el referente natural en contexto, sin forzarlo más allá del texto.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; por eso se mantiene la misma solución de sentido, con una formulación española natural y fiel al valor cultual del verbo y a la amplitud de los sustantivos colectivos.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según la convención del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «Balaam» de forma consistente con la transliteración del nombre propio.
  - «Ganado» y «ovejas» preservan el paralelismo colectivo del hebreo sin añadir especificaciones no presentes en el texto.
