translation:
  language: es
  text: Sin embargo[a], en el primer año de Ciro, rey de Babilonia, Ciro el rey emitió un decreto para reconstruir esta casa de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «construir esta casa de Dios». El verbo arameo significa literalmente «construir»; «reconstruir» refleja el contexto de restauración.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרַם
  english_pob_choice: However
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - Pero
  - No obstante
  lexicon: HALOT
  rationale: Marca un giro adversativo respecto de lo anterior. «Sin embargo» conserva el contraste con tono natural y sobrio en español.
- source_word: בִּשְׁנַת חֲדָה
  english_pob_choice: in the first year
  chosen_spanish: en el primer año
  alternatives_spanish:
  - en el año primero
  - en el año uno
  lexicon: HALOT
  rationale: Expresión cronológica regnal idiomática. «Primer año» es la equivalencia más natural y precisa en español.
- source_word: לְכ֥וֹרֶשׁ מַלְכָּא דִּי בָבֶל
  english_pob_choice: of Cyrus king of Babylon
  chosen_spanish: de Ciro, rey de Babilonia
  alternatives_spanish:
  - de Ciro, el rey de Babilonia
  - bajo Ciro, rey de Babilonia
  lexicon: HALOT
  rationale: La construcción dativa señala la referencia regnal; en español, «de Ciro, rey de Babilonia» reproduce bien el valor cronológico y titulación real.
- source_word: שָׂם טְעֵם
  english_pob_choice: issued a decree
  chosen_spanish: emitió un decreto
  alternatives_spanish:
  - dictó un decreto
  - estableció un decreto
  - publicó un decreto
  lexicon: HALOT
  rationale: El verbo arameo literalmente es «poner/establecer», pero con טְעֵם en contexto administrativo real se entiende como promulgar una orden oficial. «Emitió un decreto» conserva la fuerza jurídica sin caer en calco rígido.
- source_word: טְעֵם
  english_pob_choice: decree
  chosen_spanish: decreto
  alternatives_spanish:
  - orden
  - edicto
  - mandato
  lexicon: HALOT
  rationale: Término administrativo de autoridad imperial. «Decreto» es claro y formal en español, y mantiene el registro oficial del texto.
- source_word: בֵּית אֱלָהָא דְנָה
  english_pob_choice: this house of God
  chosen_spanish: esta casa de Dios
  alternatives_spanish:
  - este templo de Dios
  - esta casa, casa de Dios
  lexicon: HALOT
  rationale: Se preserva la formulación literal del arameo. «Casa de Dios» mantiene la idiomática bíblica y evita sustituirla por un término más interpretativo como «templo».
- source_word: לִבְנֵא
  english_pob_choice: to rebuild
  chosen_spanish: reconstruir
  alternatives_spanish:
  - edificar de nuevo
  - volver a construir
  - construir
  lexicon: HALOT
  rationale: El verbo básico es «construir», pero el contexto restaurativo del templo hace que «reconstruir» comunique mejor la situación histórica, como refleja también la nota auditada en inglés.
theological_decisions:
- issue: 'Restoration language: build vs. rebuild'
  english_pob_reading: The English POB renders the infinitive as 'to rebuild' and footnotes the simpler 'to build' as a lexical alternative, noting the restoration context.
  chosen_spanish_reading: «reconstruir» en el texto principal, con la opción «construir» preservada en nota
  alternative_spanish_readings:
  - construir
  - reedificar
  rationale: El arameo por sí mismo significa «construir», pero el contexto histórico de restauración justifica explicitar «reconstruir» sin alterar el valor léxico de base. Esto refleja fielmente la decisión auditada del POB en inglés.
  doctrine_reference: Restauración del templo en el retorno del exilio (contexto histórico de Ezra).
translation_notes:
  revision_awareness: 'Coincide con el expediente auditado en inglés: no hubo cambios revisionales posteriores y el estado de concordancia es alto. La principal decisión sensible es mantener la equivalencia óptima de «reconstruir» frente al sentido léxico básico «construir», tal como lo documenta la nota inglesa.'
  spanish_consistency_notes:
  - Se usa «Dios» de forma consistente para אֱלָהָא.
  - Se conserva «Ciro» como nombre propio sin transliteración adicional.
  - Se mantiene el tono administrativo y formal de la cláusula real.
  - «Casa de Dios» se deja literal para alinearse con la formulación fuente y la tradición bíblica inmediata.
