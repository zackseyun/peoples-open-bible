translation:
  language: es
  text: 'Rey Ptolomeo Filopátor, a los generales en Egipto[a] y a todos los que están puestos a cargo de los asuntos: saludos y buena salud[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a los generales por todo Egipto», reflejando el matiz distributivo de κατʼ Αἴγυπτον.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «saludos y estar fuerte/bien»; es una fórmula griega convencional de carta que expresa un saludo y un deseo de bienestar o salud.
    reason: cultural_note
lexical_decisions:
- source_word: Βασιλεὺς
  english_pob_choice: King
  chosen_spanish: El rey
  alternatives_spanish:
  - Rey
  - El monarca
  lexicon: LSJ
  rationale: El término griego funciona como título real encabezando la carta. En español, «El rey» conserva el valor epistolar y la naturalidad sintáctica sin añadir interpretación.
- source_word: Πτολεμαῖος Φιλοπάτωρ
  english_pob_choice: Ptolemy Philopator
  chosen_spanish: Ptolomeo Filopátor
  alternatives_spanish:
  - Ptolomeo Filopátor
  - Ptolemeo Filopátor
  lexicon: Transliteración del nombre propio; uso histórico habitual en español
  rationale: Se translitera el nombre y el epíteto, siguiendo la política del proyecto para nombres propios. «Filopátor» mantiene la forma helenística reconocible.
- source_word: τοῖς κατʼ Αἴγυπτον στρατηγοῖς
  english_pob_choice: to the generals in Egypt
  chosen_spanish: a los estrategas que están en Egipto
  alternatives_spanish:
  - a los generales en Egipto
  - a los comandantes en Egipto
  - a los estrategas por todo Egipto
  lexicon: LSJ
  rationale: Aunque στρατηγοῖς puede equivaler a «generales» o «comandantes», en contexto administrativo greco-egipcio «estrategas» refleja mejor el cargo que «general» en español moderno. La frase distributiva κατʼ Αἴγυπτον se vierte como presencia localizada en Egipto; se deja abierta la posibilidad distributiva mediante la nota textual.
- source_word: πᾶσιν τοῖς τεταγμένοις ἐπὶ πραγμάτων
  english_pob_choice: to all who are appointed over affairs
  chosen_spanish: a todos los que han sido puestos sobre los asuntos
  alternatives_spanish:
  - a todos los que están designados sobre los asuntos
  - a todos los funcionarios encargados de los asuntos
  - a todos los que tienen a su cargo los asuntos
  lexicon: LSJ
  rationale: τεταγμένοις expresa personas designadas o asignadas; «han sido puestos» preserva la noción de nombramiento. ἐπὶ πραγμάτων se traduce con lenguaje administrativo general («los asuntos») sin estrecharlo indebidamente a «negocios».
- source_word: χαίρειν
  english_pob_choice: greetings
  chosen_spanish: saludos
  alternatives_spanish:
  - greetings
  - salutación
  lexicon: LSJ
  rationale: En fórmulas epistolares griegas, χαίρειν funciona como saludo convencional. «Saludos» reproduce esa función comunicativa en español de forma natural.
- source_word: ἐρρῶσθαι
  english_pob_choice: good health
  chosen_spanish: bienestar
  alternatives_spanish:
  - salud
  - que estén bien
  - fortaleza
  lexicon: LSJ
  rationale: La fórmula es un deseo de bienestar/fortaleza física al final de una carta. «Bienestar» conserva el sentido amplio y evita restringirlo solo a salud corporal, aunque esa sea una matización válida.
translation_notes:
  revision_awareness: Se siguió el contexto auditado en inglés, pero se ajustó el cargo στρατηγοῖς a «estrategas» para reflejar mejor el término técnico griego en español y se mantuvo la fórmula epistolar convencional mediante equivalentes naturales.
  spanish_consistency_notes:
  - 'Se conserva el título real como encabezamiento epistolar: «El rey Ptolomeo Filopátor».'
  - «Asuntos» mantiene la amplitud administrativa de πραγμάτων sin concretar innecesariamente.
  - Las notas preservan la ambigüedad distributiva de κατʼ Αἴγυπτον y la fórmula epistolar de χαίρειν / ἐρρῶσθαι.
