base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/083.yaml
  text: Jesus said[1], "The images are manifest to humanity, and the light that is within them is hidden in the image of the light of the Father. He will be revealed[2], and his image is hidden by his light."
  footnotes:
  - marker: '1'
    text: 'The Coptic masculine singular pronoun ϥ- (''he/it'') could refer either to the Father (ⲡⲉⲓⲱⲧ) or to the light (ⲡⲟⲩⲟⲉⲓⲛ), as both are masculine nouns. Thus, an alternative translation is: ''It will be revealed, and its image is hidden by its light.'''
    reason: textual_variant
  - marker: '2'
    text: Coptic ⲡⲣⲱⲙⲉ (literally 'the person' or 'the human'), functioning as a collective.
    reason: lexical_alternative
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:48Z'
    unchanged: true
    changes_summary: No changes needed.
translation:
  language: es
  text: 'Jesús dijo: «Las imágenes se manifiestan a la humanidad, y la luz que está dentro de ellas está oculta dentro de la imagen de la luz del Padre. Él será revelado[a], y su imagen está oculta por su luz».'
  philosophy: formal
  footnotes:
  - marker: a
    text: 'El pronombre copto masculino singular puede referirse tanto al Padre como a la luz, porque ambos sustantivos son masculinos. También es posible traducir: «La luz será revelada, y su imagen está oculta por su luz».'
    reason: textual_variant
lexical_decisions:
- source_word: ⲛϩⲓⲕⲱⲛ
  english_pob_choice: the images
  chosen_spanish: las imágenes
  alternatives_spanish:
  - las formas
  - las figuras
  lexicon: BDAG / préstamo griego εἰκών
  rationale: Conserva el sustantivo visual concreto del original y evita suavizarlo a un término más abstracto. En español, «imágenes» es natural y mantiene la relación con «imagen» en la segunda mitad del dicho.
- source_word: ⲥⲉⲟⲩⲟⲛϩ ⲉⲃⲟⲗ
  english_pob_choice: are manifest
  chosen_spanish: se manifiestan
  alternatives_spanish:
  - son visibles
  - se revelan
  lexicon: Crum 485a
  rationale: «Se manifiestan» expresa visibilidad o aparición sin forzar una lectura plenamente teológica de revelación donde el copto permite un matiz más amplio de hacerse patente.
- source_word: ⲙ̄ⲡⲣⲱⲙⲉ
  english_pob_choice: to humanity
  chosen_spanish: a la humanidad
  alternatives_spanish:
  - a la gente
  - a las personas
  lexicon: Crum 294a
  rationale: La forma singular colectiva funciona de modo genérico; «a la humanidad» preserva ese valor colectivo y suena más directo que una pluralización interpretativa.
- source_word: ϩⲏⲡ⳿
  english_pob_choice: is hidden
  chosen_spanish: está oculta
  alternatives_spanish:
  - está escondida
  - permanece oculta
  lexicon: Crum 695a
  rationale: El estatívo pide un estado presente; «está oculta» conserva la idea de ocultamiento sin añadir énfasis ajenos.
- source_word: ϭⲱⲗⲡ ⲉⲃⲟⲗ
  english_pob_choice: be revealed
  chosen_spanish: será revelado
  alternatives_spanish:
  - será manifestado
  - será dado a conocer
  lexicon: Crum 815a
  rationale: «Ser revelado» reproduce el sentido pasivo/intransitivo de la construcción y conserva el contraste deliberado con «oculta». La voz pasiva española es la más fiel y sobria.
- source_word: ⲡⲉⲓⲱⲧ
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - el Padre celestial
  - Dios Padre
  lexicon: Crum / uso teológico del texto
  rationale: Se mantiene el término relacional del texto sin expandirlo; en español, «el Padre» es claro y suficiente dentro de la fórmula «la luz del Padre».
- source_word: ⲡⲟⲩⲟⲉⲓⲛ
  english_pob_choice: the light
  chosen_spanish: la luz
  alternatives_spanish:
  - la claridad
  lexicon: Crum
  rationale: «Luz» es la equivalencia directa y adecuada para el símbolo central del dicho; no se reemplaza por una explicación interpretativa.
theological_decisions:
- issue: Referente del pronombre masculino en «Él será revelado»
  english_pob_reading: He will be revealed, and his image is hidden by his light.
  chosen_spanish_reading: Él será revelado, y su imagen está oculta por su luz.
  alternative_spanish_readings:
  - Eso será revelado, y su imagen está oculta por su luz.
  - Será revelada la luz, y su imagen está oculta por su luz.
  rationale: El copto permite que el pronombre masculino refiera al Padre o a la luz, ambos masculinos. Se conserva «Él» porque mantiene la lectura personal y la ambigüedad marcada por el audit trail; la nota recoge la alternativa impersonal sin resolver el caso en exceso.
  doctrine_reference: Ambigüedad pronominal preservada; no se fuerza una identificación dogmática del referente.
- issue: Contraste revelación/ocultamiento
  english_pob_reading: manifest / hidden / revealed
  chosen_spanish_reading: se manifiestan / está oculta / será revelado
  alternative_spanish_readings:
  - son visibles / está escondida / se dará a conocer
  rationale: 'Se mantiene el eje retórico del dicho: lo visible, lo oculto y lo revelado. La tríada española conserva el paralelismo sin domesticar la tensión conceptual del original.'
  doctrine_reference: Léxico de revelación y ocultamiento en literatura gnóstica/taumática; fidelidad al contraste del texto.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión que corrigió un error previo en ϭⲱⲗⲡ ⲉⲃⲟⲗ: aquí significa «ser revelado», no «despojarse»; y ϩⲏⲡ es estado presente («está oculta»), no futuro. La redacción española sigue esa adjudicación corregida.'
  spanish_consistency_notes:
  - Se conserva «Padre» para ⲡⲉⲓⲱⲧ y «luz» para ⲡⲟⲩⲟⲉⲓⲛ, evitando sustituciones interpretativas.
  - Se mantiene «imagen» en singular y plural de manera coherente para reflejar el juego del dicho.
  - La puntuación y las comillas siguen el uso editorial español estándar.
