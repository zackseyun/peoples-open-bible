translation:
  language: es
  text: Por tanto, un hombre dejará a su padre y a su madre, y se unirá[a] a su esposa, y llegarán a ser una sola carne[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se pegará a» o «se adherirá a». El verbo hebreo expresa adhesión fuerte o unión estrecha.'
    reason: lexical_alternative
  - marker: b
    text: «Una sola carne» es una expresión hebrea que incluye la unión corporal y la formación de un nuevo vínculo de parentesco.
    reason: cultural_note
lexical_decisions:
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por esta razón
  - Así que
  lexicon: HALOT
  rationale: Expresa la conclusión inferida del contexto inmediato y mantiene el valor causal-consecutivo natural del hebreo sin volverlo explicativo de más.
- source_word: יַֽעֲזָב
  english_pob_choice: shall leave
  chosen_spanish: dejará
  alternatives_spanish:
  - abandonará
  - se irá de
  lexicon: HALOT
  rationale: El futuro simple español transmite bien el valor general/normativo del yiqtol. 'Dejará' conserva la idea de separación del hogar de origen sin cargarlo con la fuerza excesiva de 'abandonará'.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: el hombre
  alternatives_spanish:
  - un hombre
  - el varón
  lexicon: HALOT
  rationale: En este proverbio general, el singular funciona de modo representativo. 'El hombre' suena natural en español y conserva el valor genérico masculino del hebreo.
- source_word: אָבִיו ... אִמּוֹ
  english_pob_choice: his father and his mother
  chosen_spanish: a su padre y a su madre
  alternatives_spanish:
  - a sus padres
  lexicon: HALOT
  rationale: Se mantienen ambos referentes explícitos, como en el hebreo, en vez de resumirlos en 'padres'. 'A su' refleja el sufijo posesivo singular.
- source_word: וְדָבַק
  english_pob_choice: and cling to
  chosen_spanish: y se unirá
  alternatives_spanish:
  - y se pegará a
  - y se adherirá a
  - y se aferrará a
  lexicon: HALOT
  rationale: דבק denota adhesión fuerte. En español, 'se unirá' comunica con claridad la unión estrecha sin sonar arcaico; la nota conserva las alternativas más literales ('adhesión/pegado').
- source_word: בְּאִשְׁתּוֹ
  english_pob_choice: his wife
  chosen_spanish: a su esposa
  alternatives_spanish:
  - a su mujer
  lexicon: HALOT
  rationale: En este contexto el término designa a la esposa del hombre, no simplemente a una mujer. 'Esposa' es preciso y natural en español contemporáneo.
- source_word: וְהָיוּ
  english_pob_choice: and they shall become
  chosen_spanish: y serán
  alternatives_spanish:
  - y llegarán a ser
  - y se convertirán en
  lexicon: HALOT
  rationale: El hebreo presenta una consecuencia/resultante. En español, con el predicado 'una sola carne', 'serán' puede expresar adecuadamente el estado resultante sin forzar una transición demasiado explícita.
- source_word: לְבָשָׂר אֶחָד
  english_pob_choice: one flesh
  chosen_spanish: una sola carne
  alternatives_spanish:
  - una carne
  - una misma carne
  lexicon: HALOT
  rationale: '''Una sola carne'' es la forma española establecida y fiel al hebreo idiomático, preservando tanto la referencia corporal como la unión de parentesco/alianza implícita en la expresión.'
theological_decisions:
- issue: Forma normativa de la declaración
  english_pob_reading: Rendered as a general normative principle ('shall leave ... shall become') rather than a direct imperative
  chosen_spanish_reading: 'Se vierte como principio general: ''dejará ... y serán'', no como mandato directo'
  alternative_spanish_readings:
  - debe dejar ... debe ser
  - deje ... sea
  rationale: El hebreo usa formas verbales que, en este contexto de creación, funcionan como declaración general o principio de orden, no como imperativo explícito. El futuro español preserva esa fuerza normativa-proverbial.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: Lenguaje masculino representativo
  english_pob_reading: a man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - un hombre
  - una persona
  rationale: El hebreo אִישׁ es masculino singular y aquí representa al varón en la institución matrimonial. Se evita neutralizar el referente, manteniendo la precisión de género del texto fuente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El texto inglés auditado no requirió revisiones posteriores; la traducción española sigue la lectura estable y de alta concordancia del paquete fuente, procurando equivalencia óptima con fidelidad al hebreo y al valor normativo del contexto.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una sustitución por κύριος.
  - Se usa 'una sola carne' por ser la equivalencia española idiomática y tradicionalmente comprensible de בשר אחד.
  - '''Esposa'' evita la ambigüedad de ''mujer'' en español actual y conserva el valor relacional del hebreo con sufijo posesivo.'
  - El futuro español se usa para reflejar el valor general/normativo del hebreo, no una profecía puntual.
