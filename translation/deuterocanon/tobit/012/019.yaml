theological_decisions:
- issue: Nature of Raphael's visible presence and actions
  chosen_reading: Raphael states that his apparent human presence involved visible appearance without literal eating or drinking, and that what Tobit and Tobias perceived was a vision.
  alternative_readings:
  - Raphael merely means they misperceived ordinary events
  - The statement should be flattened to 'it only seemed so' without preserving the visionary category
  rationale: The Greek explicitly contrasts appearing with not eating/drinking and identifies the disciples' perception as ὅρασιν. The translation preserves the text's supernatural tension without overexplaining angelology beyond what the verse states.
  doctrine_reference: Preserve theological tension rather than resolve it.
