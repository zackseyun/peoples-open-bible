translation:
  language: es
  text: Dios, sálvame por tu nombre, y vindícame[a] por tu poder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «júzgame» o «defiende mi causa». El verbo hebreo puede denotar juicio en sentido forense, pero aquí probablemente expresa que Dios conceda justicia o vindicación.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Oh Dios
  lexicon: HALOT
  rationale: En este salmo se trata de un llamado directo en oración. En español, «Dios» conserva esa dirección sin añadir una interjección que no está en el hebreo. Mantiene la lectura auditada de la POB en inglés.
- source_word: בְּשִׁמְךָ
  english_pob_choice: by your name
  chosen_spanish: por tu nombre
  alternatives_spanish:
  - en tu nombre
  - a causa de tu nombre
  lexicon: HALOT
  rationale: El hebreo usa ב con valor instrumental. «Por tu nombre» reproduce bien ese valor y conserva la referencia al nombre como identidad revelada y reputación pactal de Yahvé. «En tu nombre» sonaría más idiomático en algunos contextos, pero aquí puede desplazar el matiz instrumental.
- source_word: הוֹשִׁיעֵנִי
  english_pob_choice: save me
  chosen_spanish: sálvame
  alternatives_spanish:
  - líbrame
  - rescátame
  lexicon: HALOT
  rationale: El verbo en hifil pide rescate/salvación. «Sálvame» es la equivalencia más directa y natural en español, sin reducir el alcance del ruego a una liberación meramente circunstancial.
- source_word: וּבִגְבוּרָתְךָ
  english_pob_choice: and by your might
  chosen_spanish: y por tu poder
  alternatives_spanish:
  - y por tu fuerza
  - y con tu poder
  lexicon: HALOT
  rationale: גְּבוּרָה expresa fuerza poderosa, capacidad eficaz o poder. «Poder» es un equivalente claro y solemne en español; «fuerza» sería posible, pero puede sonar más física y menos adecuada al registro poético-orante.
- source_word: תְדִינֵנִי
  english_pob_choice: vindicate me
  chosen_spanish: vindícame
  alternatives_spanish:
  - júzgame
  - defiende mi causa
  lexicon: HALOT
  rationale: Aunque דִּין puede significar «juzgar», en este contexto de súplica ante enemigos suele implicar obtener justicia favorable. «Vindícame» conserva el matiz forense de la POB en inglés y evita la impresión de un juicio meramente neutral o condenatorio.
theological_decisions:
- issue: Sentido de תְדִינֵנִי en una súplica contra adversarios
  english_pob_reading: vindicate me
  chosen_spanish_reading: vindícame
  alternative_spanish_readings:
  - júzgame
  - defiende mi causa
  rationale: La petición no es simplemente ser examinado en un tribunal, sino recibir una decisión justa que reivindique al inocente frente a sus opresores. «Vindícame» preserva esa tensión jurídica y devocional sin convertirla en un comentario doctrinal ajeno al salmo.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: Se siguió el pasaje auditado de la POB en inglés sin cambios de revisión pendientes; el texto español refleja la misma lectura óptima y conserva la alternativa forense de תְדִינֵנִי en una nota.
  spanish_consistency_notes:
  - Se mantuvo «Dios» como vocativo implícito, sin añadir «Oh».
  - Se prefirió «por» para reproducir el valor instrumental de בְּ.
  - Se evitó «SEÑOR» para no ocultar el nombre divino del hebreo en esta línea.
  - «Vindícame» mantiene el matiz jurídico favorable que la POB inglesa documenta como principal.
