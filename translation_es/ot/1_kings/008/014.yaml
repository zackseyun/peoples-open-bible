translation:
  language: es
  text: Entonces el rey se volvió[a] y bendijo a toda la asamblea de Israel[b], mientras toda la asamblea de Israel estaba de pie.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa posible: «se giró» o «dio vuelta». El hebreo dice literalmente que «volvió» o «giró» su rostro, pero en español se prefirió una forma más natural.'
    reason: lexical_alternative
  - marker: b
    text: También puede traducirse «toda la congregación de Israel». Se eligió «asamblea» para conservar el sentido de pueblo reunido sin introducir un matiz eclesial ajeno al contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּסֵּב
  english_pob_choice: turned around
  chosen_spanish: se volvió
  alternatives_spanish:
  - se giró
  - se volvió hacia atrás
  - dio vuelta
  lexicon: HALOT
  rationale: El hebreo expresa un giro físico del rey; en español, «se volvió» comunica ese movimiento con naturalidad y sin añadir elementos no presentes. Evita una paráfrasis más larga y conserva el matiz corporal del verbo.
- source_word: פָּנָיו
  english_pob_choice: turned around (omitting explicit 'his face' in the revised English)
  chosen_spanish: se volvió
  alternatives_spanish:
  - volvió su rostro
  - giró su rostro
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «su rostro/cara», el audit trail inglés decidió no explicitarlo por fluidez. En español, también conviene mantener la acción idiomática sin forzar un calco como «volvió su rostro», que sonaría menos natural en este contexto narrativo.
- source_word: וַיְבָרֶךְ
  english_pob_choice: blessed
  chosen_spanish: bendijo
  alternatives_spanish:
  - pronunció una bendición sobre
  - bendecía
  lexicon: HALOT
  rationale: «Bendijo» es la equivalencia directa y natural para ברך en este acto público de bendición real. «Pronunció una bendición sobre» sería más explicativo de lo que permite el texto.
- source_word: כָּל קְהַל יִשְׂרָאֵל
  english_pob_choice: all the assembly of Israel
  chosen_spanish: toda la asamblea de Israel
  alternatives_spanish:
  - toda la congregación de Israel
  - todo el pueblo reunido de Israel
  lexicon: HALOT
  rationale: «Asamblea» conserva el sentido de pueblo reunido y sigue la decisión inglesa de evitar «congregación» por su carga eclesial tradicional. El cuantificador «toda» refleja כָּל.
- source_word: עֹמֵד
  english_pob_choice: was standing
  chosen_spanish: estaba de pie
  alternatives_spanish:
  - permanecía de pie
  - estaba en pie
  lexicon: HALOT
  rationale: El participio describe el estado continuo de la asamblea durante la bendición. «Estaba de pie» comunica bien esa postura en español moderno y mantiene el valor aspectual del original.
translation_notes:
  revision_awareness: 'La revisión inglesa eliminó la expresión explícita «his face» por fluidez, pero conservó la imagen de giro físico. La propuesta española sigue ese ajuste: mantiene el movimiento del rey y la repetición de «toda la asamblea de Israel», sin añadir explicaciones ni suavizar el paralelismo del verso.'
  spanish_consistency_notes:
  - Se usó «asamblea» de forma consistente con la decisión POB en inglés para קהל.
  - Se evitó «SEÑOR» porque no aparece el nombre divino en este versículo.
  - 'Se mantuvo el orden narrativo: giro del rey, bendición, y postura de la asamblea mientras estaba de pie.'
