  spanish_quality_summary: El español es claro y natural, pero puede afinarse para corresponder mejor al matiz bélico del original. «Tomaron cautivas» suena más fiel que «capturaron» en este contexto. «Ganado como botín» es idiomático y correcto.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. Las decisiones «mujeres», «niños» y «ganado» están alineadas con el expediente inglés. La principal corrección necesaria es reubicar la nota lexical al verbo correspondiente ἐκληρονόμησαν y hacer más precisa la traducción de ᾐχμαλώτευσεν.
  issues:
  - severity: medium
    issue: «capturaron» debilita el matiz de cautiverio de ᾐχμαλώτευσεν
    rationale: El verbo griego no solo indica captura, sino llevar a alguien cautivo como prisionero de guerra. «Tomaron cautivas» o «llevaron cautivas» preserva mejor ese sentido.
  - severity: high
    issue: La nota al pie está asignada al verbo equivocado
    rationale: El expediente inglés pone la nota de alternativa léxica en «plunder», explicando ἐκληρονόμησαν. El borrador español coloca una nota sobre «capturaron», lo que altera la documentación auditada y omite la explicación necesaria sobre el verbo de posesión/plunder.
  - severity: low
    issue: «los niños» puede ser un poco más estrecho que «los hijos/los niños» para τέκνα
    rationale: No es un error grave, porque en contexto de víctimas funciona bien; sin embargo, «los niños» puede sonar más etario que el amplio «children». Aun así, sigue siendo aceptable en este versículo.
