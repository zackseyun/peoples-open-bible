translation:
  language: es
  text: Y nadie oprimirá[a] a su prójimo, sino que temerás a tu Dios; porque yo soy Yahvé, su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'agraviará' o 'explotará'. El verbo hebreo puede indicar aprovecharse injustamente de otro en relaciones sociales o económicas.
    reason: lexical_alternative
lexical_decisions:
- source_word: תוֹנוּ
  english_pob_choice: shall oppress
  chosen_spanish: oprimirán
  alternatives_spanish:
  - hacer injusticia
  - maltratar
  - explotar
  lexicon: HALOT
  rationale: En este contexto legal y económico, el verbo expresa aprovecharse injustamente de otro. "Oprimir" conserva la fuerza ética y social del mandato, sin reducirlo a un simple agravio menor.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: uno
  alternatives_spanish:
  - nadie
  - cada persona
  - hombre
  lexicon: HALOT
  rationale: El hebreo usa un singular masculino con valor distributivo. En español, "uno" permite mantener el alcance general sin forzar una expresión masculina innecesaria en la primera cláusula, aunque el valor representativo del original sigue presente.
- source_word: עֲמִיתוֹ
  english_pob_choice: his neighbor
  chosen_spanish: su prójimo
  alternatives_spanish:
  - su vecino
  - su semejante
  - su compañero
  lexicon: HALOT
  rationale: עָמִית indica a un par o miembro del mismo ámbito comunitario. "Prójimo" comunica bien la relación interpersonal y moral en español bíblico contemporáneo.
- source_word: וְיָרֵאתָ
  english_pob_choice: but you shall fear
  chosen_spanish: sino que temerás
  alternatives_spanish:
  - y temerás
  - pero temerás
  lexicon: HALOT
  rationale: 'La conjunción hebrea conecta una prohibición con la obligación positiva resultante. En español, "sino que" expresa mejor el contraste práctico: en lugar de oprimir, se debe temer a Dios.'
- source_word: מֵאֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: a tu Dios
  alternatives_spanish:
  - de tu Dios
  - por tu Dios
  lexicon: HALOT
  rationale: Después de ירא, el hebreo usa la preposición מן con valor idiomático. En español, el objeto de temor se expresa naturalmente con la preposición "a".
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino en forma reverente y reconocible para el español bíblico, conforme al criterio del proyecto para el Tetragrámaton.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: vuestro Dios
  alternatives_spanish:
  - su Dios
  - su Dios de ustedes
  lexicon: HALOT
  rationale: El sufijo plural dirige la fórmula al pueblo en conjunto. "Vuestro" refleja con precisión la pluralidad del hebreo; aquí se mantiene junto con la forma singular de la exhortación en la línea anterior.
theological_decisions:
- issue: Nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa directamente el Tetragrámaton como fundamento del mandamiento. Se lo vierte por el nombre propio de Dios, no por una sustitución titular, para preservar la identidad pactal del hablante divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahweh'
- issue: Aparente cambio de persona entre la prohibición y la exhortación
  english_pob_reading: And no man shall oppress his neighbor, but you shall fear your God
  chosen_spanish_reading: Y no oprimirán uno a su prójimo, sino que temerás a tu Dios
  alternative_spanish_readings:
  - Y no oprimas uno a su prójimo, sino que temerás a tu Dios
  - Y nadie oprimirá a su prójimo, sino que temerás a tu Dios
  rationale: El hebreo alterna de una forma impersonal/plural a una exhortación singular. La redacción española conserva esa tensión sin nivelarla del todo, manteniendo la fuerza distributiva del mandato y su aplicación directa al oyente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: la nota [a] ahora aparece anclada en el texto español. La redacción también revisa la relación sintáctica entre la prohibición y la exhortación, preservando el contraste del hebreo sin perder claridad en español.'
  spanish_consistency_notes:
  - Se mantiene Yahvé para יהוה conforme al criterio del proyecto.
  - Se preserva el contraste entre daño al prójimo y temor a Dios.
  - La alternancia de persona en el hebreo se refleja parcialmente en español sin forzar una armonización artificial.
  - Se evita la terminología eclesiástica tradicional de ‘SEÑOR’ como sustituto del nombre divino.
