translation:
  language: es
  text: Será como un arbusto[a] en el desierto[c], y no verá cuando venga el bien[b]. Habitará en parajes resecos en el desierto, en una tierra salada que no está habitada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como un enebro», «como un tamarisco» o «como un matorral estéril»; la planta exacta designada por el hebreo es incierta.
    reason: lexical_alternative
  - marker: b
    text: 'O «cuando venga la prosperidad». El hebreo dice literalmente: «no verá cuando venga el bien».'
    reason: lexical_alternative
  - marker: c
    text: O «en el Arabá», si se toma como la región geográfica específica y no como tierra desértica en general.
    reason: alternative_reading
lexical_decisions:
- source_word: כְּעַרְעָר
  english_pob_choice: like a shrub
  chosen_spanish: como un arbusto
  alternatives_spanish:
  - como un enebro
  - como un tamarisco
  - como un matorral estéril
  lexicon: HALOT
  rationale: El hebreo nombra una planta del desierto, pero la identificación botánica exacta es incierta. «Arbusto» conserva la imagen general sin fijar una especie debatida. «Matorral estéril» también es posible, pero suena más interpretativo.
- source_word: בָּעֲרָבָה
  english_pob_choice: in the desert
  chosen_spanish: en la estepa
  alternatives_spanish:
  - en el desierto
  - en el Arabá
  - en la tierra árida
  lexicon: HALOT
  rationale: El término puede referirse al Arabá como región específica o a una llanura árida en general. «Estepa» comunica bien la idea de terreno seco y abierto en español sin decidir demasiado la identificación geográfica.
- source_word: וְלֹא יִרְאֶה כִּי יָבוֹא טוֹב
  english_pob_choice: and he will not see when good comes
  chosen_spanish: y no verá cuando venga el bien
  alternatives_spanish:
  - y no percibirá cuando llegue la prosperidad
  - y no verá que ha venido el bien
  lexicon: HALOT
  rationale: La expresión es idiomática. «No verá cuando venga el bien» conserva la imagen hebrea de «ver» sin perder el sentido de no reconocer o no aprovechar el bien que llega. Se mantiene «bien» para no reducir prematuramente el alcance a «prosperidad».
- source_word: וְשָׁכַן
  english_pob_choice: He will dwell
  chosen_spanish: Habitará
  alternatives_spanish:
  - Vivirá
  - Se asentará
  lexicon: HALOT
  rationale: «Habitará» funciona bien en registro profético-poético y reproduce el valor de permanencia de שׁכן. «Viviría» sería demasiado general; «se asentará» desplaza el énfasis.
- source_word: חֲרֵרִים
  english_pob_choice: in parched places
  chosen_spanish: en parajes resecos
  alternatives_spanish:
  - en parajes abrasados
  - en lugares áridos
  - en sitios calcinados
  lexicon: HALOT
  rationale: El sustantivo apunta a lugares secos, quemados o estériles. «Parajes resecos» transmite desolación árida en español natural sin precisar más de lo que el hebreo garantiza.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en la estepa
  - en el yermo
  lexicon: HALOT
  rationale: Aquí «desierto» comunica directamente el paralelo poético con «parajes resecos» y es claro para lectores hispanos. Aunque el inglés POB alterna «wilderness» para evitar repetir «desert», en español la repetición no resulta forzada y mantiene la fuerza del contraste.
- source_word: אֶרֶץ מְלֵחָה
  english_pob_choice: a salt land
  chosen_spanish: una tierra salada
  alternatives_spanish:
  - una tierra de sal
  - una tierra salitrosa
  - una tierra salina
  lexicon: HALOT
  rationale: La expresión señala una tierra marcada por salinidad y esterilidad. «Tierra salada» es breve, transparente y fiel al sentido; «salitrosa» sería más técnico y menos directo.
- source_word: וְלֹא תֵשֵׁב
  english_pob_choice: that is not inhabited
  chosen_spanish: que no está habitada
  alternatives_spanish:
  - donde no vive nadie
  - y no está habitada
  lexicon: HALOT
  rationale: El verbo concuerda con «tierra». En español, una oración relativa («que no está habitada») reproduce con naturalidad la función descriptiva del hebreo y evita un giro demasiado paraprástico.
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje hebreo directamente y refleja el mismo conjunto de decisiones auditadas en el inglés POB: planta desértica incierta, lectura idiomática de «ver el bien», y la posible ambigüedad geográfica de עֲרָבָה. No se documentaron revisiones posteriores que alteren estas opciones.'
  spanish_consistency_notes:
  - Se mantiene «bien» en singular, como en el hebreo y en el inglés POB, para no estrechar el sentido a prosperidad económica.
  - Se usa «desierto» en la segunda mitad del versículo porque el español permite la repetición sin perder naturalidad; no se sustituyó por un sinónimo solo por variedad estilística.
  - «Habitará» conserva el tono profético y la idea de residencia continua.
  - Las notas a pie preservan las alternativas relevantes donde el hebreo o la tradición de traducción dejan una tensión legítima.
