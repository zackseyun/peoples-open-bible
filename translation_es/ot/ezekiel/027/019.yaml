translation:
  language: es
  text: Dan[a] y Javán de Uzal[b] comerciaron contigo; cambiaron hierro trabajado, casia[c] y caña[d] por tus mercancías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo 'Dan'; algunos leen 'Vedán' o emendan de otro modo el nombre, porque el texto es difícil.
    reason: textual_variant
  - marker: b
    text: O 'Javán de Uzal'. La relación entre 'Javán' y 'Uzal' es sintácticamente difícil en hebreo.
    reason: alternative_reading
  - marker: c
    text: O 'casia aromática'.
    reason: lexical_alternative
  - marker: d
    text: O 'cálamo' o 'caña dulce'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְדָן
  english_pob_choice: Dan
  chosen_spanish: Dan
  alternatives_spanish:
  - Vedan
  lexicon: HALOT
  rationale: El texto consonántico leído por la POB inglesa conserva Dan como nombre propio. En español se mantiene la misma transliteración breve y reconocible; la alternativa Vedán se reserva para la nota textual, no para el texto principal.
- source_word: וְיָוָן
  english_pob_choice: Javan
  chosen_spanish: Javán
  alternatives_spanish:
  - Javán
  - Grecia
  - Ionia
  lexicon: HALOT
  rationale: Se conserva el nombre propio como transliteración, no como interpretación geográfica ('Grecia') ni étnica ('jonios'), porque el contexto comercial favorece una lista de pueblos/lugares. Se adapta la acentuación al español para lectura natural.
- source_word: מְאוּזָּל
  english_pob_choice: from Uzal
  chosen_spanish: desde Uzal
  alternatives_spanish:
  - de Uzal
  - procedentes de Uzal
  lexicon: HALOT
  rationale: La POB entiende el término como topónimo con preposición. 'Desde Uzal' comunica el origen comercial de manera natural en español y preserva la incertidumbre de la relación sintáctica sin explicitar más de lo que el hebreo permite.
- source_word: בְּעִזְבוֹנַיִךְ
  english_pob_choice: traded with you
  chosen_spanish: comerciaron contigo
  alternatives_spanish:
  - traficaron contigo
  - negociaron contigo
  lexicon: HALOT
  rationale: El sustantivo hebreo apunta a mercancías/trato comercial. En español, un verbo explícito como 'comerciaron' transmite mejor la función relacional del segmento que una traducción demasiado literal de la preposición.
- source_word: נָתָנּוּ
  english_pob_choice: they exchanged
  chosen_spanish: cambiaron
  alternatives_spanish:
  - intercambiaron
  - dieron
  lexicon: HALOT
  rationale: Aunque el verbo básico es 'dar', el contexto de intercambio mercantil exige un verbo recíproco en español. 'Cambiaron' es idiomático y mantiene la idea de trueque sin introducir un matiz ajeno.
- source_word: בַּרְזֶל עָשׁוֹת
  english_pob_choice: wrought iron
  chosen_spanish: hierro trabajado
  alternatives_spanish:
  - hierro forjado
  - hierro labrado
  lexicon: HALOT
  rationale: La forma verbal/participial con 'hierro' indica metal trabajado, no simple hierro bruto. 'Hierro trabajado' conserva la fuerza descriptiva y evita una precisión técnica excesiva que el hebreo no exige.
- source_word: קִדָּה
  english_pob_choice: cassia
  chosen_spanish: casia
  alternatives_spanish:
  - canela aromática
  - casia aromática
  lexicon: HALOT
  rationale: Se conserva el nombre de la especia tradicional en español bíblico y botánico. 'Casia' es claro y cercano al valor comercial del inventario.
- source_word: וְקָנֶה
  english_pob_choice: cane
  chosen_spanish: caña
  alternatives_spanish:
  - caña dulce
  - cálamo
  lexicon: HALOT
  rationale: La POB inglesa eligió 'cane' para un término de mercancía vegetal. En español, 'caña' es el equivalente más directo y accesible; 'cálamo' queda como alternativa más específica pero menos transparente.
- source_word: בְּמַעֲרָבֵךְ
  english_pob_choice: for your wares
  chosen_spanish: por tus mercancías
  alternatives_spanish:
  - para tus mercancías
  - en tus mercancías
  - en tu mercado
  lexicon: HALOT
  rationale: En el capítulo el término se refiere a bienes de comercio. 'Por tus mercancías' expresa de forma natural el destino o contravalor del intercambio, manteniendo el sentido comercial del texto.
theological_decisions:
- issue: Tratamiento de nombres propios oscuros y posible lectura alternativa textual
  english_pob_reading: The main text reads Dan and Javan from Uzal, with a note that some read 'Vedan' or otherwise emend the name because the text is difficult.
  chosen_spanish_reading: Dan y Javán desde Uzal, con nota sobre la variante Vedán
  alternative_spanish_readings:
  - Vedán y Javán desde Uzal
  - Dan y Javan de Uzal
  rationale: 'No hay una cuestión doctrinal, pero sí una decisión textual importante: el texto principal debe seguir la lectura MT conservada por la POB y dejar la incertidumbre en nota. Así se respeta la transparencia del trabajo y no se normaliza indebidamente una forma hipotética.'
  doctrine_reference: Textual criticism / editorial transparency
translation_notes:
  revision_awareness: Se revisó el estado más reciente del archivo fuente y el resumen de revisión; no hubo cambios aplicados y el pasaje permanece sin modificación, por lo que el borrador español sigue la lectura base MT con las mismas tensiones textuales y léxicas documentadas.
  spanish_consistency_notes:
  - Se mantuvo la transliteración de nombres propios como práctica consistente con la POB cuando el hebreo funciona como designación geográfica o étnica.
  - Se evitó 'SEÑOR' o equivalentes porque el versículo no contiene el tetragrámaton ni un equivalente divino.
  - Se usó vocabulario comercial directo para preservar el género de catálogo mercantil del pasaje.
  - Se conservaron notas alternativas donde el español también admite ambigüedad entre nombre propio, origen y relación sintáctica.
