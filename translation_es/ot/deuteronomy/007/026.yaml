    text: O «bajo el ban»; tradicionalmente, «maldita». El hebreo חֵרֶם designa algo apartado para destrucción bajo juicio divino.
    reason: lexical_alternative
  revision_rationale: Se reemplaza la transliteración 'herem' por 'dedicado a destrucción' para seguir la decisión léxica y teológica del POB en inglés y mantener claridad en español. Se mueve la nota al lugar donde aparece חֵרֶם. También se ajusta la advertencia a 'no sea que' para reflejar mejor el valor precautorio de la cláusula.
