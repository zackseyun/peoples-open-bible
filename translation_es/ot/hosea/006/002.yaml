translation:
  language: es
  text: Nos revivirá[a] después de dos días; al tercer día nos levantará[b][c], para que vivamos delante de él[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "en dos días"; la expresión temporal hebrea puede indicar un intervalo breve que conduce al tercer día.'
    reason: lexical_alternative
  - marker: b
    text: '"Nos levantará" también puede entenderse más generalmente como "nos restaurará" o "nos pondrá en pie".'
    reason: lexical_alternative
  - marker: c
    text: Muchos cristianos ven la expresión "al tercer día" como una anticipación tipológica de la resurrección del Mesías, aunque el versículo habla directamente de la restauración del pueblo.
    reason: cross_reference
  - marker: d
    text: 'O: "en su presencia".'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְחַיֵּנוּ
  english_pob_choice: he will revive us
  chosen_spanish: nos revivirá
  alternatives_spanish:
  - nos hará vivir
  - nos devolverá la vida
  lexicon: HALOT
  rationale: 'El piel de חיה tiene fuerza causativa: no solo ''vivir'', sino ''dar vida / revivir''. ''Revivirá'' conserva ese valor verbal y suena natural en español bíblico contemporáneo.'
- source_word: מִיֹּמָיִם
  english_pob_choice: after two days
  chosen_spanish: después de dos días
  alternatives_spanish:
  - en dos días
  - a partir de dos días
  lexicon: HALOT
  rationale: La preposición con expresión temporal admite un matiz de intervalo posterior. 'Después de dos días' expresa bien el sentido temporal sin endurecerlo mecánicamente.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  english_pob_choice: on the third day
  chosen_spanish: al tercer día
  alternatives_spanish:
  - en el tercer día
  - el tercer día
  lexicon: HALOT
  rationale: Es una fórmula temporal estándar. 'Al tercer día' es idiomático en español y mantiene la progresión temporal marcada por el hebreo.
- source_word: יְקִימֵנוּ
  english_pob_choice: he will raise us up
  chosen_spanish: nos levantará
  alternatives_spanish:
  - nos alzará
  - nos restablecerá
  lexicon: HALOT
  rationale: El hiphil de קום puede significar 'levantar' o 'establecer'. Dado el paralelo con 'revivir', 'nos levantará' conserva la imagen de ser alzados desde una condición caída, sin cerrar la posible resonancia de restauración.
- source_word: וְנִחְיֶה
  english_pob_choice: that we may live
  chosen_spanish: para que vivamos
  alternatives_spanish:
  - y viviremos
  - y así vivamos
  lexicon: HALOT
  rationale: El prefijo conjuntivo funciona aquí con valor de resultado o finalidad. 'Para que vivamos' expresa de modo natural el propósito del levantamiento/revivificación.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: HALOT
  rationale: '''Delante de él'' es una equivalencia directa y bíblicamente transparente. ''En su presencia'' preserva la relación personal implícita, pero suena un poco más interpretativo.'
theological_decisions:
- issue: Si el tercer día debe presentarse como profecía mesiánica explícita o como restauración corporativa de Israel
  english_pob_reading: Main text preserves the corporate first-person restoration language without making an explicit christological interpretation.
  chosen_spanish_reading: El texto principal mantiene el lenguaje corporativo en primera persona, sin introducir una lectura cristológica explícita en la traducción.
  alternative_spanish_readings:
  - Muchos cristianos ven aquí una anticipación tipológica de la resurrección del Mesías.
  - El tercer día puede leerse canónicamente en relación con la resurrección de Jesús.
  rationale: El hebreo habla directamente de 'nosotros' y describe la restauración del pueblo por Dios. La traducción debe respetar ese sentido primario y no convertir la versión en una interpretación doctrinal cerrada, aunque la lectura tipológica quede disponible.
  doctrine_reference: Prioridad del sentido del texto original; mantener la tensión teológica sin resolverla en la traducción.
translation_notes:
  revision_awareness: La redacción sigue de cerca el consenso alto del audit trail inglés sin cambios sustantivos respecto de la última pasada; se conserva la ambigüedad temporal de מִיֹּמָיִם y la tensión entre restauración corporativa y lectura tipológica del 'tercer día'.
  spanish_consistency_notes:
  - Se mantiene 'nos' para la primera persona plural coherente con el hebreo.
  - Se usa 'Yahvé' no aplica aquí porque el versículo no contiene el Tetragrámaton.
  - '''Delante de él'' preserva la relación directa y evita una paráfrasis excesiva.'
  - Los corchetes de notas se colocan solo en los puntos donde la alternativa afecta la lectura del texto.
