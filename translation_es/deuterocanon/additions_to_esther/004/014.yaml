translation:
  language: es
  text: Porque tú eres admirable[a], Yahvé, y tu rostro está lleno de gracia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "maravilloso"; o, en la segunda línea, "tu presencia está llena de favor" o "tu semblante está lleno de gracia".'
    reason: lexical_alternative
lexical_decisions:
- source_word: θαυμαστὸς
  english_pob_choice: wonderful
  chosen_spanish: admirable
  alternatives_spanish:
  - maravilloso
  - admirable
  - digno de asombro
  lexicon: LSJ
  rationale: En español, 'admirable' conserva mejor la idea de alguien que provoca asombro o admiración sin sonar tan forzado como 'maravilloso' en este contexto litúrgico. Mantiene el valor de κάτι θαυμαστόν como objeto de admiración.
- source_word: κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: LSJ
  rationale: Como vocativo dirigido a Dios, 'Señor' es la equivalencia natural y reverente en español, coherente con el valor devocional de κύριος en el texto griego y con la práctica auditada de la POB.
- source_word: πρόσωπόν
  english_pob_choice: face
  chosen_spanish: rostro
  alternatives_spanish:
  - cara
  - presencia
  - semblante
  lexicon: LSJ
  rationale: '''Rostro'' preserva la imagen corporal del griego πρόσωπον y suena más digno y bíblico en español que ''cara''. Se evita sustituirlo por ''presencia'' para no borrar la metáfora.'
- source_word: χαρίτων
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - graciosidad
  - dones
  lexicon: LSJ
  rationale: Aunque el griego usa el plural de χάρις, en español 'gracia' puede funcionar de modo colectivo y conserva el peso teológico del término mejor que 'favor'. 'Graciosidad' sería demasiado abstracto o poco natural.
- source_word: μεστόν
  english_pob_choice: full of
  chosen_spanish: está lleno de
  alternatives_spanish:
  - está colmado de
  - rebosa de
  lexicon: LSJ
  rationale: '''Está lleno de'' es la forma más natural en español para expresar la relación adjetival con genitivo. Mantiene la imagen de plenitud sin añadir énfasis no presente en el griego.'
theological_decisions:
- issue: Mantenimiento de la imagen antropomórfica del 'rostro' de Dios
  english_pob_reading: Retain the literal anthropomorphic expression 'your face'
  chosen_spanish_reading: Conservar 'tu rostro'
  alternative_spanish_readings:
  - tu presencia
  - tu semblante
  rationale: El griego dice πρόσωπον de manera directa. Traducirlo como 'rostro' conserva la imagen bíblica en lugar de resolverla en una abstracción. 'Presencia' suavizaría la antropomorfía y perdería parte del color del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
- issue: Elección de 'gracia' para χαρις en una descripción de Dios
  english_pob_reading: Use 'grace' rather than 'favor' or 'graciousness'
  chosen_spanish_reading: Usar 'gracia'
  alternative_spanish_readings:
  - favor
  - bondad
  - graciosidad
  rationale: '''Gracia'' preserva mejor la resonancia teológica de χάρις en español y mantiene el paralelismo devocional del texto. ''Favor'' sería posible, pero reduciría el alcance del término; ''graciosidad'' suena poco natural.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 5, 6
translation_notes:
  revision_awareness: La versión inglesa auditada se mantuvo sin cambios en la revisión más reciente; no hubo cambios aplicados. La presente redacción española sigue esa lectura estable y conserva las mismas tensiones léxicas señaladas por la auditoría.
  spanish_consistency_notes:
  - Se mantiene el vocativo reverente 'Señor' para κύριος, alineado con el uso devocional del proyecto.
  - Se conserva la metáfora de 'rostro/rostro lleno' sin convertirla en 'presencia', para no perder la imagen del griego.
  - '''Gracia'' se usa como equivalente colectivo natural de χαρίτων, aunque el plural griego admita matices alternativos.'
  - La puntuación y el orden buscan una dicción bíblica moderna y publicable en español, sin calcos rígidos del inglés.
