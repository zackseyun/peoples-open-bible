  text: וְ/הֵ֗מָּה עָזְר֤וּ עִם דָּוִיד֙ עַֽל הַ/גְּד֔וּד כִּֽי גִבּ֥וֹרֵי חַ֖יִל כֻּלָּ֑/ם וַ/יִּהְי֥וּ שָׂרִ֖ים בַּ/צָּבָֽא־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/012/022.yaml
  text: And they helped David against the raiding band[a], for all of them were mighty men of valor[c][b], and they became commanders in the army.
  footnotes:
  - marker: a
    text: Or 'against the band' or 'against the troop'; the Hebrew גְּדוּד can refer to a military band or raiding party.
    reason: lexical_alternative
  - marker: b
    text: Or 'mighty warriors'; the Hebrew phrase גִבּוֹרֵי חַיִל is a standard expression for valiant, capable fighting men.
    reason: lexical_alternative
  - marker: c
    text: Or 'captains' or 'chiefs' for 'commanders.'
    reason: lexical_alternative
