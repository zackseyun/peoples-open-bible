translation:
  language: es
  text: Y yo te entregaré en manos de los que buscan tu vida, en manos de aquellos a quienes temes, en manos de Nabucodonosor[a], rey de Babilonia, y en manos de los caldeos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Nebucadrezar», forma que refleja más de cerca el hebreo.
    reason: lexical_alternative
  - marker: b
    text: «Los caldeos» también puede traducirse «los babilonios» en este contexto, ya que el término puede referirse más ampliamente a las fuerzas de Babilonia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְתַתִּיךָ
  english_pob_choice: And I will give you
  chosen_spanish: Y yo te entregaré
  alternatives_spanish:
  - Y yo te daré
  - Y yo te pondré
  lexicon: HALOT
  rationale: En este contexto, נתן con complemento personal y la repetición de בְּיַד funciona como fórmula de entrega a poder ajeno. «Entregaré» comunica mejor esa transferencia de control que un simple «daré», sin perder la correspondencia con el hebreo.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en mano de
  alternatives_spanish:
  - en manos de
  - en poder de
  lexicon: HALOT
  rationale: Se conserva la imagen concreta del hebreo y su repetición retórica. «En mano de» mantiene la estructura fuente de manera natural en español bíblico moderno.
- source_word: מְבַקְשֵׁי נַפְשֶׁךָ
  english_pob_choice: those who seek your life
  chosen_spanish: los que buscan tu vida
  alternatives_spanish:
  - los que buscan tu alma
  - los que quieren quitarte la vida
  lexicon: HALOT
  rationale: נפש aquí apunta a la vida de la persona, no a «alma» en sentido inmortal. «Buscar tu vida» reproduce bien la expresión hebrea y conserva el tono hostil del original.
- source_word: אֲשֶׁר אַתָּה יָגוֹר מִפְּנֵיהֶם
  english_pob_choice: those before whom you are afraid
  chosen_spanish: de quienes tú tiemblas
  alternatives_spanish:
  - de quienes tú tienes miedo
  - ante quienes tú sientes temor
  lexicon: HALOT
  rationale: יָגוֹר expresa temor o pavor. En español, «temblar» comunica esa reacción con fuerza y naturalidad. La construcción «de quienes» refleja el relativo hebreo, y «tú» puede mantenerse para marcar énfasis.
- source_word: נְבוּכַדְרֶאצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nebucadrezar
  - Nebucodonosor
  lexicon: HALOT
  rationale: Se adopta la forma castellana tradicional y reconocible del nombre propio, sin forzar una transliteración técnica. El texto hebreo preserva una grafía cercana a «Nebuchadrezzar», pero la forma española asentada sigue siendo inteligible y fiel al referente.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: king of Babylon
  chosen_spanish: rey de Babilonia
  alternatives_spanish:
  - rey de Babel
  - rey de Babilonia
  lexicon: HALOT
  rationale: La cadena constructa se traduce de forma directa y natural. «Babilonia» es el equivalente español estándar del topónimo en este contexto.
- source_word: הַכַּשְׂדִּים
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los babilonios
  - los caldeos
  lexicon: HALOT
  rationale: Se preserva el término étnico-histórico «caldeos», como hace la POB inglesa, porque mantiene la relación con el lexema hebreo. En nota puede indicarse la alternativa contextual «babilonios».
theological_decisions:
- issue: Imagen de entrega a enemigos y gradación de amenazas
  english_pob_reading: The repeated 'into the hand of' portrays transfer into hostile control, culminating in Nebuchadnezzar and the Chaldeans.
  chosen_spanish_reading: La repetición de «en mano de» conserva la imagen de entrega a dominio hostil y la escalada retórica del verso.
  alternative_spanish_readings:
  - en poder de
  - a manos de
  rationale: No se suaviza la dureza del hebreo con un verbo más abstracto. La imagen de dominio ajeno pertenece al sentido del texto y debe mantenerse para no perder su fuerza profética.
  doctrine_reference: Jeremías 22:25; uso idiomático bíblico de entrega bajo juicio y poder enemigo
translation_notes:
  revision_awareness: 'Coincide sustancialmente con el audit trail inglés: se conserva la repetición de בְּיַד, se traduce נֶפֶשׁ como «vida», se mantiene la fuerza de יָגוֹר como temor intenso, y se registra la variante del nombre propio según la forma hebrea más cercana.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en el proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se mantiene «los caldeos» para preservar el término fuente, con la alternativa contextual documentada en nota.
  - Se opta por «entregaré» para expresar el valor idiomático de נתן + בְּיַד sin perder transparencia.
  - La puntuación replica la enumeración escalonada del hebreo con comas y repetición sintáctica.
