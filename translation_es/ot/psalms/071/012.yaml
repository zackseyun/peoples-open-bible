review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo: doble invocación directa a Dios, súplica negativa «no te alejes de mí» y mandato urgente «apresúrate a ayudarme». La estructura y el paralelismo del versículo están preservados fielmente.'
  spanish_quality_summary: 'El español es claro, natural y digno. La única reparación necesaria es la nota al pie: en español la alternativa vocativa debe presentarse como «Oh Dios ... Oh Dios mío», no con coma tras «Oh», para evitar una puntuación poco natural y una formulación tipográficamente extraña.'
  glossary_alignment: 'Alinea correctamente con la terminología del proyecto: אֱלֹהִים / אֱלֹהַי se vierten como «Dios / Dios mío», sin introducir «Yahvé» donde el texto no lo tiene. No hay conflictos con otras políticas léxicas del glosario.'
  issues:
  - severity: low
    issue: Puntuación y formulación de la nota alternativa vocativa
    rationale: La nota «O «Oh, Dios ... Oh, Dios mío».» no suena natural en español y mezcla una abreviatura inglesa/latina con comillas y coma innecesaria. La alternativa correcta en español es «O “Oh Dios ... Oh Dios mío”», o mejor, «O “Dios ... Dios mío” con vocativo explícito “oh”». Dado el formato existente, basta corregir a «O «Oh Dios ... Oh Dios mío»».
  revised_spanish_text: Dios[a], no te alejes de mí; Dios mío, apresúrate a ayudarme.
  revised_footnotes:
