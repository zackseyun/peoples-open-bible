translation:
  language: es
  text: ¿Harán trato sobre él los comerciantes[a]? ¿Lo repartirán entre los mercaderes[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Comerán de él los compañeros?». El hebreo de la primera cláusula es difícil, y algunos entienden חַבָּרִים en un sentido no comercial.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «cananeos»; en este contexto, probablemente significa «mercaderes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִכְרוּ
  english_pob_choice: bargain
  chosen_spanish: Negociarán
  alternatives_spanish:
  - harán trato
  - cambiarán
  - concertarán un trato
  lexicon: HALOT
  rationale: El verbo puede implicar comprar, regatear o llegar a un acuerdo; en español, «negociarán» comunica bien la acción comercial sugerida por el contexto sin volverlo demasiado literal ni técnico.
- source_word: עָלָיו
  english_pob_choice: over him
  chosen_spanish: sobre él
  alternatives_spanish:
  - acerca de él
  - por él
  lexicon: HALOT
  rationale: La preposición expresa la transacción o deliberación que recae sobre la criatura; «sobre él» conserva el giro idiomático del hebreo y del inglés POB.
- source_word: חַבָּרִים
  english_pob_choice: traders
  chosen_spanish: negociantes
  alternatives_spanish:
  - compañeros
  - socios
  - comerciantes
  lexicon: HALOT
  rationale: Aunque el término puede significar «compañeros» o «asociados», aquí el paralelismo comercial favorece un sentido mercantil. «Negociantes» mantiene esa lectura sin sonar demasiado moderno o restrictivo.
- source_word: יֶחֱצוּהוּ
  english_pob_choice: divide him
  chosen_spanish: Lo repartirán
  alternatives_spanish:
  - lo dividirán
  - lo distribuirán
  - lo apportionarán
  lexicon: HALOT
  rationale: El verbo indica dividir o asignar porciones. En el contexto, «repartirán» comunica mejor la distribución mercantil del animal que una división física literal.
- source_word: בֵּין
  english_pob_choice: among
  chosen_spanish: entre
  alternatives_spanish:
  - entre los
  - en medio de
  lexicon: HALOT
  rationale: Con un objeto plural, «entre» es la equivalencia natural en español y conserva el reparto colectivo.
- source_word: כְּנַעֲנִים
  english_pob_choice: merchants
  chosen_spanish: los mercaderes
  alternatives_spanish:
  - los cananeos
  - los comerciantes
  lexicon: HALOT
  rationale: En este contexto, «cananeos» funciona metonímicamente como «mercaderes». El español «mercaderes» expresa la lectura contextual adoptada por la POB sin perder el matiz comercial del hebreo.
translation_notes:
  revision_awareness: 'Se siguió el estado más reciente del expediente inglés: acuerdo alto, sin revisiones aplicadas y sin cambios necesarios en la traducción de referencia.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo comercial del original, evitando una paráfrasis explicativa más amplia.
  - Se preservó la ambigüedad documentada en la primera cláusula mediante nota, sin imponer una sola lectura secundaria en el texto principal.
  - «Mercaderes» se eligió para reflejar la lectura contextual de כְּנַעֲנִים, coherente con el audit trail inglés.
  - El registro es sobrio y publicable, con puntuación y tono compatibles con una Biblia en español contemporánea.
