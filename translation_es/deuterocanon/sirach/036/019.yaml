revisions:
- from: Según la bendición de Aarón sobre tu pueblo[a], y todos los que están sobre la tierra sabrán que tú eres el Señor[b], el Dios de los siglos.
  to: Según la bendición de Aarón sobre tu pueblo[a], todos los que están en la tierra sabrán que tú eres el Señor[b], el Dios de los siglos.
  rationale: 'Se hizo una reparación menor de estilo y fidelidad idiomática: «sobre la tierra» se cambió a «en la tierra» para evitar un calco torpe del griego, sin alterar el sentido. También se eliminó la conjunción inicial «y» después de la coma para mejorar la fluidez en español dentro de esta oración litúrgica fragmentaria. Se mantiene «el Señor» como traducción contextual de κύριος en la fuente griega, con la nota teológica ya documentada.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:47:31Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y el audit trail inglés en la mayoría de los elementos: κατὰ τὴν εὐλογίαν = «Según la bendición», Ἀαρὼν = «Aarón», γνώσονται = «sabrán», y ὁ θεὸς τῶν αἰώνων = «el Dios de los siglos», con nota alternativa adecuada. También preserva correctamente la nota sobre περὶ τοῦ λαοῦ σου. Sin embargo, «todos los que están sobre la tierra» suena demasiado calco e introduce una torpeza innecesaria en español; el sentido es referencial a quienes están en la tierra, no una postura espacial marcada. Además, para κύριος como título divino en griego, «el Señor» es defendible, pero conviene señalar que es una excepción contextual al valor por defecto del proyecto para el nombre divino, no una formulación idealmente alineada con la guía general.'
  spanish_quality_summary: El español es mayormente claro, pero presenta dos problemas de naturalidad. Primero, la coordinación inicial con coma tras «pueblo[a]» resulta menos fluida que una estructura verbal completa al inicio («Bendice...») o una sintaxis más integrada; dado que el griego es fragmentario en contexto de oración, no hace falta reestructurar agresivamente, pero sí conviene mantener la frase con mejor fluidez. Segundo, «todos los que están sobre la tierra» es poco idiomático en español bíblico moderno; «todos los que están en la tierra» o «todos los de la tierra» es más natural y fiel. El resto del registro es digno y legible.
  glossary_alignment: 'Hay una desviación justificada pero real respecto del valor por defecto del proyecto: κύριος se vertió «el Señor» en vez de «Yahvé». Dado que la fuente inmediata es griega y usa κύριος como título divino, esta excepción puede sostenerse, pero debe reconocerse como decisión contextual. Los demás términos clave están bien alineados: «Aarón», «Dios», «bendición», «siglos».'
  issues:
  - severity: medium
    issue: «todos los que están sobre la tierra» es un calco poco natural
    rationale: Aunque refleja formalmente ἐπὶ τῆς γῆς, en español moderno suena forzado. «En la tierra» conserva el sentido referencial sin perder fidelidad.
  - severity: low
    issue: La decisión «el Señor» necesita quedar claramente como excepción contextual
    rationale: La guía del proyecto favorece «Yahvé» para el nombre divino, pero aquí la fuente griega tiene κύριος. No requiere cambio obligatorio en el texto, pero sí una justificación cuidadosa, ya presente de forma parcial.
  revised_spanish_text: Según la bendición de Aarón sobre tu pueblo[a], todos los que están en la tierra sabrán que tú eres el Señor[b], el Dios de los siglos.
  revised_footnotes:
  - marker: a
    text: 'También: «para tu pueblo» o «acerca de tu pueblo». La frase griega puede entenderse en relación con la bendición que Aarón pronuncia sobre Israel.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «el Dios eterno». El griego dice más literalmente: «el Dios de los siglos».'
    reason: lexical_alternative
  revision_rationale: 'Se hizo una reparación menor de estilo y fidelidad idiomática: «sobre la tierra» se cambió a «en la tierra» para evitar un calco torpe del griego, sin alterar el sentido. También se eliminó la conjunción inicial «y» después de la coma para mejorar la fluidez en español dentro de esta oración litúrgica fragmentaria. Se mantiene «el Señor» como traducción contextual de κύριος en la fuente griega, con la nota teológica ya documentada.'
