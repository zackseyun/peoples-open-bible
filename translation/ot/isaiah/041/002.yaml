id: ISA.41.2
reference: Isaiah 41:2
source:
  edition: WLC
  text: מִ֤י הֵעִיר֙ מִ/מִּזְרָ֔ח צֶ֖דֶק יִקְרָאֵ֣/הוּ לְ/רַגְל֑/וֹ יִתֵּ֨ן לְ/פָנָ֤י/ו גּוֹיִם֙ וּ/מְלָכִ֣ים יַ֔רְדְּ יִתֵּ֤ן כֶּֽ/עָפָר֙ חַרְבּ֔/וֹ כְּ/קַ֥שׁ נִדָּ֖ף קַשְׁתּֽ/וֹ׃
translation:
  text: Who has stirred up one from the east[a], calling him in righteousness to his feet? He gives nations before him and subdues kings; he gives them like dust to his sword[b], like driven stubble to his bow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'calling him in victory/justice'; the Hebrew phrase is difficult, and 'righteousness' may also carry the sense of vindication or just cause here.
    reason: lexical_alternative
  - marker: b
    text: Or 'and subdues kings before him' or 'and makes him tread down kings'; the Hebrew of this clause is textually and syntactically difficult.
    reason: alternative_reading
lexical_decisions:
- source_word: הֵעִיר
  chosen: has stirred up
  alternatives:
  - has roused
  - has awakened
  lexicon: HALOT
  rationale: The Hiphil of עור here means to arouse or raise up a person for action. 'Has stirred up' is idiomatic modern English and preserves the causative sense.
- source_word: מִמִּזְרָח
  chosen: from the east
  alternatives:
  - from the sunrise
  - from the eastward place
  lexicon: HALOT
  rationale: The noun denotes the place of sunrise, idiomatically 'the east.' This is the natural English geographic rendering.
- source_word: צֶדֶק
  chosen: in righteousness
  alternatives:
  - righteousness
  - victory
  - justice
  lexicon: HALOT
  rationale: The term can denote righteousness, justice, or in some contexts vindication/victory. Here it most plausibly describes the manner or basis of the calling. 'In righteousness' preserves the lexical core without over-interpreting the phrase.
- source_word: יִקְרָאֵהוּ לְרַגְלוֹ
  chosen: calling him in righteousness to his feet
  alternatives:
  - calls him to follow
  - summons him in victory
  - calls him to his service
  lexicon: HALOT
  rationale: The syntax is difficult. The verb means 'call/summon,' and 'to his foot/feet' is commonly understood as attendance, following, or being at one's disposal. Rendering it more literally as 'to his feet' preserves the Hebrew image while remaining intelligible, avoiding an overly interpretive paraphrase.
- source_word: יִתֵּן לְפָנָיו גּוֹיִם
  chosen: He gives nations before him
  alternatives:
  - He delivers nations before him
  - He hands over nations before him
  lexicon: HALOT
  rationale: נתן with 'before him' conveys giving over or placing nations in front of the raised conqueror. 'Gives nations before him' is slightly formal but transparent and close to the Hebrew.
- source_word: וּמְלָכִים יַרְדְּ
  chosen: and makes kings rule
  alternatives:
  - and subdues kings
  - and makes him tread down kings
  - and causes kings to descend
  lexicon: HALOT
  rationale: The consonantal text is difficult and has been understood in different ways. The MT vocalization points toward a sense related to ruling/subduing. Many translations render the clause as subjugation of kings. 'Makes kings rule' follows the vocalized form more closely, though the context is conquest; the ambiguity is preserved in a footnote.
- source_word: יִתֵּן כֶּעָפָר חַרְבּוֹ
  chosen: he gives them like dust to his sword
  alternatives:
  - he makes them like dust before his sword
  - he gives his sword over them like dust
  lexicon: HALOT
  rationale: The idiom compares the defeated foes to dust in relation to the conqueror's sword. Supplying 'them' in English is necessary for sense, with the antecedent being nations and kings.
- source_word: כְּקַשׁ נִדָּף קַשְׁתּוֹ
  chosen: like driven stubble to his bow
  alternatives:
  - like wind-driven chaff to his bow
  - like scattered straw before his bow
  lexicon: HALOT
  rationale: קשׁ is stubble/straw rather than the more specific 'chaff.' נדף means driven away/scattered. 'Driven stubble' keeps the agricultural image and parallels 'dust' in the previous clause.
