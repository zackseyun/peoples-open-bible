lexical_decisions:
- source_word: לִ/רְחַבְיָהוּ
  english_pob_choice: For Rehabiah
  chosen_spanish: Para Rehabías
  alternatives_spanish:
  - As for Rehabías
  - De Rehabías
  lexicon: HALOT
  rationale: El ל inicial funciona aquí como marca de encabezado/listado en una enumeración administrativa o genealógica. En español, «Para» conserva bien ese valor de referencia/entrada de sección sin volver la frase extraña. Se mantiene el nombre propio transliterado como «Rehabías».
- source_word: לִ/בְנֵ֣י רְחַבְיָ֔הוּ
  english_pob_choice: from the sons of Rehabiah
  chosen_spanish: de los hijos de Rehabías
  alternatives_spanish:
  - para los hijos de Rehabías
  - los hijos de Rehabías
  lexicon: HALOT
  rationale: בני se traduce de forma directa como «hijos» en este contexto genealógico, preservando el paralelismo de linaje. El prefijo ל se expresa naturalmente con «de» para indicar procedencia/adscripción del jefe nombrado.
- source_word: הָ/רֹאשׁ
  english_pob_choice: the chief
  chosen_spanish: el jefe
  alternatives_spanish:
  - el cabeza
  - el líder
  lexicon: HALOT
  rationale: רֹאשׁ literalmente es «cabeza», pero aquí señala al representante principal de la subdivisión familiar. «Jefe» comunica esa función administrativa de forma clara y digna en español, sin perder la idea de primacía.
- source_word: יִשִּׁיָּֽה
  english_pob_choice: Isshiah
  chosen_spanish: Ishiías
  alternatives_spanish:
  - Isshiah
  - Jisiías
  lexicon: HALOT
  rationale: Se translitera el nombre propio de manera cercana a la forma hebrea. «Ishiías» mantiene la resonancia del original y evita adaptar innecesariamente a una forma más inglesa. Se prefiere esta forma por claridad fonética en español.
translation_notes:
  revision_awareness: 'El texto hebreo es breve y coincide sustancialmente con el inglés auditado; no se detectan variantes textuales significativas. La única tensión relevante es sintáctica: el ל inicial puede reflejar un encabezado («Para») o una relación más literal («de/para Rehabías»), y el orden de los complementos puede leerse de dos maneras, como lo muestra la nota alternativa.'
  spanish_consistency_notes:
  - Se conserva el nombre propio del clan como «Rehabías» de forma consistente.
  - Se mantiene la distinción entre el sustantivo de relación genealógica («hijos») y el cargo administrativo («jefe»).
  - La nota al pie marca la alternativa sintáctica sin introducir una diferencia doctrinal o textual.
