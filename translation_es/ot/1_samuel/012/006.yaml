translation:
  language: es
  text: 'Entonces Samuel dijo al pueblo: «Yahvé[a] es el que estableció a Moisés y a Aarón y el que hizo subir a sus padres de la tierra de Egipto[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase hebrea puede leerse literalmente «Yahvé, el que hizo a Moisés y a Aarón»; aquí se entiende como que los estableció o constituyó en su función.
    reason: lexical_alternative
  - marker: b
    text: «Padres» puede entenderse en sentido más amplio como «antepasados».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then Samuel said
  chosen_spanish: Entonces Samuel dijo
  alternatives_spanish:
  - Y Samuel dijo
  lexicon: HALOT
  rationale: La conjunción consecutiva avanza la narración; «Entonces» comunica bien la secuencia en español sin perder el valor discursivo del hebreo.
- source_word: אֶל הָעָם
  english_pob_choice: to the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  lexicon: HALOT
  rationale: «Pueblo» refleja de manera natural y precisa el sustantivo colectivo definido del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre divino del Tetragrámaton con la forma «Yahvé», conforme al criterio del proyecto para no sustituirlo por una designación encubridora.
- source_word: אֲשֶׁר עָשָׂה אֶת מֹשֶׁה וְאֶת אַהֲרֹן
  english_pob_choice: who appointed Moses and Aaron
  chosen_spanish: el que estableció a Moisés y a Aarón
  alternatives_spanish:
  - el que hizo a Moisés y a Aarón
  - el que nombró a Moisés y a Aarón
  lexicon: HALOT
  rationale: El hebreo usa עשה, literalmente «hacer», pero en este contexto de constitución para funciones históricas el sentido no es crear a la persona sino establecerla/constituirla en su papel. «Estableció» conserva la fuerza de la acción divina sin sonar engañosamente literal.
- source_word: וַאֲשֶׁר הֶעֱלָה
  english_pob_choice: and who brought ... up
  chosen_spanish: y el que hizo subir
  alternatives_spanish:
  - y el que sacó
  - y el que trajo arriba
  lexicon: HALOT
  rationale: עלה en hiphil mantiene el idiomático «hacer subir», que en el contexto del éxodo comunica correctamente el acto de sacar a Israel de Egipto.
- source_word: אֶת אֲבֹתֵיכֶם
  english_pob_choice: your fathers
  chosen_spanish: vuestros padres
  alternatives_spanish:
  - vuestros antepasados
  lexicon: HALOT
  rationale: Se conserva el lenguaje literal del hebreo. En español, «padres» puede abarcar los antepasados del pueblo; además evita neutralizar indebidamente la forma del original.
- source_word: מֵאֶרֶץ מִצְרָיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: desde la tierra de Egipto
  alternatives_spanish:
  - de la tierra de Egipto
  - de Egipto
  lexicon: HALOT
  rationale: «Desde la tierra de Egipto» reproduce con fidelidad la fórmula espacial del hebreo y mantiene el paralelismo con el relato del éxodo.
theological_decisions:
- issue: Traducción del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se sigue la decisión doctrinal del proyecto de renderizar יְהוָה como nombre propio divino y no como sustitución titulada. «Yahvé» preserva mejor la identidad pactual del nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de עָשָׂה con Moisés y Aarón
  english_pob_reading: appointed Moses and Aaron
  chosen_spanish_reading: estableció a Moisés y a Aarón
  alternative_spanish_readings:
  - nombró a Moisés y a Aarón
  - constituyó a Moisés y a Aarón
  rationale: La intención teológica del pasaje es subrayar la acción soberana de Yahvé al poner a Moisés y Aarón en su papel dentro de la historia de Israel; «estableció» comunica esa relación sin reducirla a creación física ni forzar una paráfrasis excesiva.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy over translation tradition'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail inglés, que añadió explícitamente «is the one» para expresar la cláusula nominal hebrea. En español se reflejó con «Yahvé es el que…», una construcción natural que mantiene la identificación explícita del sujeto divino.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de manera consistente con la terminología del proyecto para יְהוָה.
  - Se eligió «estableció» para preservar la tensión entre la literalidad de עשה («hacer») y el sentido contextual de constituir o poner en funciones.
  - Se conservó «vuestros padres» porque el hebreo usa un término masculino plural que el propio audit trail inglés también retiene.
  - Se evitó «SEÑOR» para no ocultar el nombre divino revelado en el texto original.
