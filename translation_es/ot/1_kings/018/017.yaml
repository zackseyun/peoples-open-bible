revisions:
- from: 'Y cuando Ahab vio a Elías[a], Ahab le dijo: «¿Eres tú el que perturba a Israel?»'
  to: 'Y cuando Acab vio a Elías[a], Acab le dijo: «¿Eres tú el que acarrea desgracia sobre Israel?»'
  rationale: Se corrige «Ahab» a «Acab» por uso bíblico español estándar; se fortalece עֹכֵר de «el que perturba» a «el que acarrea desgracia», más acorde con la acusación de causar calamidad sobre Israel; y se repara la nota al pie para eliminar el anglicismo accidental y preservar en español las alternativas léxicas documentadas.
