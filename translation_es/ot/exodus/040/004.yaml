review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia hebrea: introducir la mesa, ordenar su disposición, introducir el candelabro y tratar sus lámparas. También conserva adecuadamente la nota sobre el matiz alternativo de וְהַעֲלֵיתָ. Sin embargo, el español pierde un matiz importante de movimiento hacia adentro en וְהֵבֵאתָ, que el inglés POB explicitó como ''bring in''.'
  spanish_quality_summary: El texto es claro y legible en español neutro, pero 'llevarás' suena menos preciso que 'meterás/introducirás/harás entrar' en un contexto de instalación dentro del tabernáculo. Además, 'colocarás sus lámparas' es entendible, pero 'pondrás en su lugar sus lámparas' o 'dispondrás sus lámparas' reflejaría mejor el sentido de instalación; aun así, 'colocarás' es aceptable. La nota al pie necesita una ligera limpieza de puntuación y formulación.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. 'Candelabro' para הַמְּנֹרָה es defendible y natural en español eclesial amplio, aunque 'lampadario' no sería adecuado como alternativa. La decisión principal que conviene ajustar es וְהֵבֵאתָ -> 'introducirás' para alinearse mejor con el razonamiento documentado de 'bring in'.
  issues:
  - severity: medium
    issue: וְהֵבֵאתָ se traduce como 'llevarás' en ambas ocurrencias.
    rationale: El hiphil de בוא en este contexto no es solo traslado genérico sino ingreso al recinto. El inglés POB documentó explícitamente 'bring in'. 'Introducirás' preserva mejor ese matiz sin sonar forzado.
  - severity: low
    issue: La nota al pie comienza con comilla innecesaria y formulación algo torpe.
    rationale: La nota actual es comprensible, pero en español editorial queda mejor 'O «harás subir sus lámparas»...' sin comillas sueltas ni puntuación extraña.
  - severity: low
    issue: Una alternativa léxica interna propone 'lampadario'.
    rationale: No afecta el texto final, pero no es una alternativa natural ni ampliamente inteligible en español bíblico general.
  revised_spanish_text: Entonces introducirás la mesa y dispondrás lo que va sobre ella; e introducirás el candelabro y colocarás sus lámparas[a].
  revised_footnotes:
