translation:
  language: es
  text: Entonces el siervo sacó artículos de plata, artículos de oro y prendas, y se los dio a Rebeca; también dio regalos escogidos[a] a su hermano y a su madre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «presentes selectos» para מִגְדָּנֹת; el término puede designar presentes especialmente finos o preciosos, y en algunos contextos también puede referirse a delicadezas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹצֵא
  english_pob_choice: brought out
  chosen_spanish: sacó
  alternatives_spanish:
  - trajo
  - sacó afuera
  - hizo salir
  lexicon: HALOT
  rationale: El hifil de יצא expresa hacer salir o sacar. En español, «sacó» comunica la acción concreta de extraer objetos y mantiene naturalidad narrativa.
- source_word: הָעֶבֶד
  english_pob_choice: the servant
  chosen_spanish: el siervo
  alternatives_spanish:
  - el esclavo
  - el criado
  lexicon: HALOT
  rationale: Aunque עֶבֶד puede significar esclavo o siervo, el contexto narrativo de una casa patriarcal y la relación funcional hacen que «siervo» sea comprensible y digno en español, sin afirmar más de lo que el pasaje destaca.
- source_word: כְּלֵי כֶסֶף
  english_pob_choice: articles of silver
  chosen_spanish: artículos de plata
  alternatives_spanish:
  - objetos de plata
  - vasijas de plata
  - piezas de plata
  lexicon: HALOT
  rationale: כְּלִי es amplio y no obliga a «vasijas». «Artículos de plata» reproduce la amplitud del término y sigue de cerca la decisión inglesa de no restringir el tipo de objeto.
- source_word: וּכְלֵי זָהָב
  english_pob_choice: articles of gold
  chosen_spanish: artículos de oro
  alternatives_spanish:
  - objetos de oro
  - vasijas de oro
  - piezas de oro
  lexicon: HALOT
  rationale: Se conserva el paralelismo de כְּלֵי כֶסֶף con la misma solución amplia y formal en español.
- source_word: וּבְגָדִים
  english_pob_choice: garments
  chosen_spanish: vestidos
  alternatives_spanish:
  - ropa
  - prendas
  - ropas
  lexicon: HALOT
  rationale: בְּגָדִים denota ropa o prendas; «vestidos» es una forma natural en español bíblico moderno y mantiene un registro digno. Se evita «ropa» por su mayor generalidad y menor formalidad.
- source_word: וַיִּתֵּן לְרִבְקָה
  english_pob_choice: and gave them to Rebekah
  chosen_spanish: y se los dio a Rebeca
  alternatives_spanish:
  - y los dio a Rebeca
  - y se los entregó a Rebeca
  lexicon: HALOT
  rationale: El pronombre resumptivo «se los» es idiomático en español y refleja el plural de los objetos ya mencionados, manteniendo la fluidez.
- source_word: וּמִגְדָּנֹת
  english_pob_choice: choice gifts
  chosen_spanish: regalos escogidos
  alternatives_spanish:
  - dones escogidos
  - presentes selectos
  - regalos selectos
  lexicon: HALOT
  rationale: מִגְדָּנוֹת refiere a presentes preciosos o escogidos; «regalos escogidos» conserva el matiz de selección/valía sin restringir indebidamente a comida ni exagerar el valor monetario.
- source_word: נָתַן
  english_pob_choice: he also gave
  chosen_spanish: también dio
  alternatives_spanish:
  - dio además
  - también entregó
  lexicon: HALOT
  rationale: La segunda acción de dar se expresa con «también dio» para reflejar el valor aditivo del hebreo y sonar natural en español.
- source_word: לְאָחִיהָ וּלְאִמָּהּ
  english_pob_choice: to her brother and to her mother
  chosen_spanish: a su hermano y a su madre
  alternatives_spanish:
  - al hermano de ella y a su madre
  - a su hermano y a la madre de ella
  lexicon: HALOT
  rationale: El posesivo español «su» ya queda anclado por el referente inmediato Rebeca, por lo que evita redundancia sin perder claridad. Se conserva la coordinación distributiva con «a».
theological_decisions:
- issue: Naturaleza de הָעֶבֶד en el relato
  english_pob_reading: the servant
  chosen_spanish_reading: el siervo
  alternative_spanish_readings:
  - el esclavo
  - el criado
  rationale: No hay tensión doctrinal en el verso, pero sí una decisión de registro y estatus. «Siervo» evita una dureza innecesaria en español moderno y sigue siendo compatible con la función servicial del personaje en el contexto narrativo.
  doctrine_reference: Gn 24:2–10; uso narrativo de עֶבֶד
- issue: Sentido de מִגְדָּנֹת
  english_pob_reading: choice gifts
  chosen_spanish_reading: regalos escogidos
  alternative_spanish_readings:
  - presentes selectos
  - dones preciosos
  - dulces/viandas escogidas
  rationale: La traducción evita limitar el término a comida y a la vez no sobredimensiona el valor económico. «Regalos escogidos» deja abierta la connotación de presentes de calidad o seleccionados, en línea con la auditoría inglesa.
  doctrine_reference: Gn 24:53; léxico de presentes nupciales
translation_notes:
  revision_awareness: La auditoría inglesa revisó «costly gifts» a «choice gifts» para מִגְדָּנֹת, afinando el matiz hacia regalos seleccionados o preciosos sin sobrecargar el costo. La versión española sigue esa revisión y conserva la amplitud semántica del hebreo, mientras mantiene la parataxis narrativa del hebreo mediante una sola oración con dos actos de dar.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «siervo» en vez de «esclavo» porque el foco del pasaje es la función narrativa y la hospitalidad, no la institución servil en sentido jurídico.
  - «Artículos de plata/oro» reproduce la amplitud de כְּלִי y evita restringirlo a recipientes.
  - «Regalos escogidos» conserva la alternativa lexical documentada para מִגְדָּנֹת y evita la implicación exclusiva de alimentos.
