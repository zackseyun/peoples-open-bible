base_translation:
  language: en
  yaml_path: translation/ot/malachi/001/008.yaml
  text: When you present a blind animal for sacrifice[a], is that not evil? And when you present one that is lame or sick, is that not evil? Present it, please, to your governor. Will he accept you[c][b], or show you favor? says Yahweh of hosts.
  footnotes:
