  glossary_alignment: 'No hay conflictos con la terminología del proyecto. Los términos fiscales están bien resueltos: «diezmos», «impuestos», «coronas». Se mantiene la literalidad contextual de «coronas» con explicación fiscal en nota, y «lagunas de sal» conserva la transparencia del griego con alternativa interpretativa en nota.'
