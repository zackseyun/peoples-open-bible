translation:
  language: es
  text: Por tanto, en todo, lo que quieran que las personas les hagan, hagan ustedes lo mismo por ellas; porque esto es la Ley y los Profetas.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: Πάντα
  english_pob_choice: in everything
  chosen_spanish: en todo
  alternatives_spanish:
  - en todas las cosas
  - en todo aspecto
  lexicon: BDAG
  rationale: El acusativo neutro plural con valor comprehensivo expresa alcance total. «En todo» conserva esa amplitud de manera natural en español y evita la rigidez de un calco.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Entonces
  lexicon: BDAG
  rationale: Marca una inferencia lógica desde lo anterior. «Por tanto» conserva con claridad el valor conclusivo del conector sin sonar forzado.
- source_word: ὅσα ἐὰν θέλητε
  english_pob_choice: whatever you want
  chosen_spanish: lo que quieran
  alternatives_spanish:
  - todo lo que quieran
  - cualquier cosa que quieran
  lexicon: BDAG
  rationale: La construcción relativa indefinida expresa generalidad. En español, «lo que quieran» transmite esa apertura sin añadir matices ausentes en el griego.
- source_word: ἵνα ποιῶσιν ὑμῖν οἱ ἄνθρωποι
  english_pob_choice: people to do for you
  chosen_spanish: que la gente les haga
  alternatives_spanish:
  - que las personas les hagan
  - que la gente haga por ustedes
  lexicon: BDAG
  rationale: «ἄνθρωποι» es genérico; «la gente» preserva ese valor no masculino. «Hacerles» reproduce de forma natural el sentido benefactivo de «ποιῶσιν ὑμῖν» en español.
- source_word: οἱ ἄνθρωποι
  english_pob_choice: people
  chosen_spanish: la gente
  alternatives_spanish:
  - las personas
  - los seres humanos
  lexicon: BDAG
  rationale: Aunque el plural es morfológicamente masculino, aquí es genérico para seres humanos. «La gente» mantiene el alcance universal y suena idiomático en español.
- source_word: οὕτως καὶ ὑμεῖς ποιεῖτε αὐτοῖς
  english_pob_choice: do the same for them
  chosen_spanish: háganlo ustedes también de la misma manera para ellos
  alternatives_spanish:
  - háganles ustedes también así
  - hagan ustedes también lo mismo por ellos
  lexicon: BDAG
  rationale: El imperativo presente pide una conducta continua. La forma elegida conserva la reciprocidad de οὕτως καὶ y el paralelismo ético, aunque en español requiere reordenamiento para sonar natural.
- source_word: οὗτος γάρ ἐστιν
  english_pob_choice: for this is
  chosen_spanish: porque esto es
  alternatives_spanish:
  - pues esto es
  - porque este es
  lexicon: BDAG
  rationale: La cláusula explicativa es copulativa y directa. «Porque esto es» preserva la función causal/explanatoria de γάρ y la sencillez del griego.
- source_word: ὁ νόμος καὶ οἱ προφῆται
  english_pob_choice: the Law and the Prophets
  chosen_spanish: la Ley y los Profetas
  alternatives_spanish:
  - la ley y los profetas
  lexicon: BDAG
  rationale: Se conserva la fórmula judía reconocible como resumen de la Escritura y su enseñanza. La mayúscula en español señala el valor de título/corpus, no una abstracción genérica.
theological_decisions:
- issue: Alcance universal del mandato ético
  english_pob_reading: whatever you want people to do for you, do the same for them
  chosen_spanish_reading: lo que quieran que la gente les haga, háganlo ustedes también de la misma manera para ellos
  alternative_spanish_readings:
  - todo lo que quieran que la gente les haga, háganlo ustedes también para ellos
  - cualquier cosa que quieran que otros les hagan, háganla ustedes también
  rationale: La frase española conserva el principio universal del versículo y evita restringirlo a un grupo masculino. Mantiene el carácter recíproco y general de la enseñanza.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Fórmula «la Ley y los Profetas»
  english_pob_reading: the Law and the Prophets
  chosen_spanish_reading: la Ley y los Profetas
  alternative_spanish_readings:
  - la ley y los profetas
  - la Ley y los Profetas como resumen de la Escritura
  rationale: Se retiene la fórmula intertextual reconocible en Mateo sin parafrasearla. Esto preserva la resonancia judaica y teológica del dicho, en línea con el texto fuente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: El texto inglés auditado no requiere cambios y la cruzada de revisión indica alta concordancia; la versión española sigue esa lectura sin introducir ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el texto fuente lo exija; este versículo no contiene el nombre divino.
  - «Mesías/Cristo» no aparece aquí, por lo que no hay decisión terminológica adicional.
  - «La Ley y los Profetas» se capitaliza como fórmula establecida del corpus escritural.
  - «La gente» se usa para οἱ ἄνθρωποι con valor genérico, manteniendo la política de lenguaje inclusivo contextual.
