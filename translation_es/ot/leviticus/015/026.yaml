revisions:
- from: Toda cama[a] en la que se acueste durante todos los días de su flujo será para ella como la cama de su menstruación, y toda vasija[b] en la que se siente será inmunda, como la impureza de su menstruación.
  to: Toda cama[a] en la que se acueste durante todos los días de su flujo será para ella como la cama de su menstruación, y todo objeto[b] sobre el que se siente quedará impuro, como la impureza de su menstruación.
  rationale: Se revisa «vasija» a «objeto» porque preserva mejor el sentido amplio de כְּלִי y evita una imagen española extraña. También se ajusta «será inmunda» a «quedará impuro» para mantener una relación léxica más natural con «impureza» y un español más claro, sin cambiar el sentido ritual del hebreo.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:28:18Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: cada cama en la que ella se acueste durante los días de su flujo queda en la misma categoría que la cama de su menstruación, y todo objeto sobre el cual se siente queda ritualmente impuro de modo comparable. Sin embargo, «vasija» no preserva bien el valor amplio de כְּלִי en este contexto, porque en español sugiere principalmente un recipiente y choca con la idea de sentarse sobre ello. También conviene alinear mejor el par léxico טָמֵא / טֻמְאָה con una pareja española más natural y coherente.'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero «toda vasija en la que se siente» suena poco natural y potencialmente confusa para lectores hispanos. «Todo objeto» o «todo artículo» comunica mejor el sentido contextual. Además, la combinación «será inmunda, como la impureza» mezcla adjetivo y sustantivo con registro algo desigual; «quedará impuro, como la impureza» o equivalente suena más uniforme. El resto del versículo es legible y fiel.
  glossary_alignment: No hay conflicto con los términos globales principales del proyecto. En este versículo, la decisión teológica de mantener lenguaje de impureza ritual está bien encaminada, pero la elección de «inmunda» frente a «impureza» es menos natural que «impuro» / «impureza». La nota sobre כְּלִי debe reflejar una traducción española que de verdad conserve su amplitud semántica.
  issues:
  - severity: high
    issue: «Vasija» para כְּלִי es demasiado estrecho en este contexto
    rationale: Aunque כְּלִי puede abarcar recipientes, aquí se refiere ampliamente a cualquier artículo u objeto sobre el que ella se siente. En español, «vasija» evoca sobre todo un recipiente, por lo que «vasija en la que se siente» resulta poco natural y puede distorsionar el referente.
  - severity: medium
    issue: Desajuste léxico entre «inmunda» y «impureza»
    rationale: El hebreo usa el adjetivo טָמֵא y el sustantivo טֻמְאָה de manera relacionada. En español, «impuro» / «impureza» conserva mejor esa relación que «inmunda» / «impureza», además de sonar más natural en registro neutral eclesial contemporáneo.
  - severity: low
    issue: La nota b debe corresponder a la traducción revisada
    rationale: Si se corrige כְּלִי como «objeto» o similar, la nota actual centrada en justificar «vasija» deja de ser adecuada y debe actualizarse para explicar la amplitud semántica del término hebreo.
  revised_spanish_text: Toda cama[a] en la que se acueste durante todos los días de su flujo será para ella como la cama de su menstruación, y todo objeto[b] sobre el que se siente quedará impuro, como la impureza de su menstruación.
  revised_footnotes:
  - marker: a
    text: O «lecho». El hebreo מִשְׁכָּב designa el lugar donde uno se acuesta; «cama» es la equivalencia natural en español.
    reason: lexical_alternative
  - marker: b
    text: '«Objeto» traduce aquí כְּלִי en sentido amplio: cualquier artículo o implemento sobre el que ella se siente, no solo un recipiente.'
    reason: lexical_alternative
  revision_rationale: Se revisa «vasija» a «objeto» porque preserva mejor el sentido amplio de כְּלִי y evita una imagen española extraña. También se ajusta «será inmunda» a «quedará impuro» para mantener una relación léxica más natural con «impureza» y un español más claro, sin cambiar el sentido ritual del hebreo.
