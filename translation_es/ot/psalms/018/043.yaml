  - severity: low
    issue: 'La nota c usa una alternativa algo rígida: «como barro en las calles los vaciaba».'
    rationale: Aunque «vaciar» corresponde bien a ריק, en español la colocación con un objeto personal aquí suena menos idiomática. «los vertía» o «los vaciaba por las calles» sería más natural; como nota breve, «como barro en las calles los vertía» funciona mejor.
