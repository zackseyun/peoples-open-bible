  to: 'Habla a toda la congregación de los hijos de Israel[a], y diles: “Serán santos[b], porque yo, Yahvé, su Dios, soy santo.”'
  rationale: Se ajusta el texto principal para reflejar la decisión auditada del POB sobre קְדֹשִׁים תִּהְיוּ con un matiz legislativo ('Serán santos'), y se reubica la nota [b] en la frase a la que realmente corresponde. Se mantiene el resto, incluida la transliteración 'Yahvé' y 'los hijos de Israel', por buena fidelidad al hebreo y a la terminología del proyecto.
