translation:
  language: es
  text: ¿Hasta cuándo, Yahvé, me olvidarás para siempre? ¿Hasta cuándo esconderás tu rostro[a] de mí?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu presencia». Literalmente, «tu rostro». En hebreo, esconder el rostro puede significar retirar favor o presencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד אָ֣נָה
  english_pob_choice: How long
  chosen_spanish: ¿Hasta cuándo
  alternatives_spanish:
  - ¿Hasta cuándo será?
  - ¿Hasta cuándo pues?
  lexicon: HALOT
  rationale: Es la interrogación idiomática de duración en la lamentación; «¿Hasta cuándo» reproduce de modo natural y solemne el clamor repetido del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte según el estándar del proyecto como «Yahvé», preservando el nombre propio del pacto en lugar de sustituirlo por un título.
- source_word: תִּשְׁכָּחֵ֣/נִי
  english_pob_choice: will you forget me
  chosen_spanish: me olvidarás
  alternatives_spanish:
  - me olvidarás de
  - me ignorarás
  lexicon: HALOT
  rationale: El verbo שׁכח expresa olvidar; en español «me olvidarás» conserva la fuerza directa de la queja sin debilitarla a mera desatención.
- source_word: נֶ֑צַח
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - para siempre jamás
  - continuamente
  - perpetuamente
  lexicon: HALOT
  rationale: En este lamento, el término intensifica la pregunta con valor temporal absoluto; «para siempre» transmite bien esa carga emotiva y semántica.
- source_word: תַּסְתִּ֖יר
  english_pob_choice: will you hide
  chosen_spanish: ocultarás
  alternatives_spanish:
  - esconderás
  - te apartarás
  lexicon: HALOT
  rationale: El hiphil de סתר se expresa naturalmente como «ocultar»; en español bíblico contemporáneo «ocultarás» mantiene la imagen sin sonar forzado.
- source_word: פָּנֶ֣י/ךָ
  english_pob_choice: your face
  chosen_spanish: tu rostro
  alternatives_spanish:
  - tu presencia
  lexicon: HALOT
  rationale: Se preserva la expresión concreta «rostro» para no desactivar el hebraísmo poético; la posible implicación de presencia/favor queda implícita en la imagen.
- source_word: מִמֶּֽ/נִּי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - alejado de mí
  - apartado de mí
  lexicon: HALOT
  rationale: La preposición de separación se expresa de manera simple y idiomática con «de mí» en este giro poético.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se mantiene el nombre divino explícito del texto hebreo, conforme a la política del proyecto. «Yahvé» preserva la referencia al nombre revelado sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Whether to keep the concrete idiom 'face' rather than dynamic 'presence'
  english_pob_reading: Retain 'your face' in the main text
  chosen_spanish_reading: Conservar 'tu rostro' en el texto principal
  alternative_spanish_readings:
  - tu presencia
  - tu favor
  rationale: La imagen hebrea es concreta y poética; en el texto principal se conserva para no perder el hebraísmo ni añadir interpretación. La noción de presencia/favor puede inferirse sin desplazar la metáfora.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; este borrador mantiene esa lectura estable y conserva la resolución del audit trail sin introducir novedades no sustentadas.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con el estándar del proyecto para יְהוָה.
  - Se conserva la imagen corporal «rostro» en el texto principal y se aclara la alternativa semántica en nota.
  - La pregunta de lamento se formula con «¿Hasta cuándo» para reproducir el tono poético y la repetición del hebreo.
  - «Para siempre» refleja la intensificación de נֶצַח sin sobreexplicarla.
