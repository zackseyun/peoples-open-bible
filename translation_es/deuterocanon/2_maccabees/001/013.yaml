translation:
  language: es
  text: Porque, cuando el líder y la fuerza que lo rodeaba, que parecía invencible[a], habían entrado, fueron abatidos en el templo de Nanaia, ya que los sacerdotes de Nanaia habían usado engaño[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que parecía ser invencible». El griego describe a la fuerza como algo que, en apariencia, no podía ser resistido.
    reason: lexical_alternative
  - marker: b
    text: O «por engaño» / «mediante engaño». El genitivo absoluto indica que los sacerdotes de Nanaia actuaron con fraude o trampa como medio de la muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: γενόμενος
  english_pob_choice: had entered
  chosen_spanish: hubo entrado
  alternatives_spanish:
  - había llegado
  - había entrado
  - cuando entró
  lexicon: LSJ
  rationale: El participio introduce la circunstancia narrativa previa al derribo. En español, «hubo entrado» mantiene el valor de acción completada con tono más formal y evita una paráfrasis excesiva, a la vez que sigue la resolución contextual del POB inglés.
- source_word: ὁ ἡγεμών
  english_pob_choice: the leader
  chosen_spanish: el líder
  alternatives_spanish:
  - el jefe
  - el caudillo
  - el gobernante
  lexicon: LSJ
  rationale: ἡγεμών es amplio; aquí designa al jefe de la expedición. «Líder» conserva amplitud sin forzar un cargo administrativo específico.
- source_word: ἡ περὶ αὐτὸν ... δύναμις
  english_pob_choice: the force around him
  chosen_spanish: la fuerza que lo rodeaba
  alternatives_spanish:
  - su comitiva
  - las tropas que lo acompañaban
  - el ejército que lo rodeaba
  lexicon: LSJ
  rationale: δύναμις en contexto militar puede ser «fuerza» o «tropas». «La fuerza que lo rodeaba» reproduce el sentido colectivo de περὶ αὐτόν y evita precisar indebidamente el tamaño o rango del grupo.
- source_word: ἀνυπόστατος δοκοῦσα εἶναι
  english_pob_choice: that seemed to be invincible
  chosen_spanish: que parecía ser invencible
  alternatives_spanish:
  - que parecía imposible de resistir
  - que parecía irresistible
  - que parecía incontenible
  lexicon: LSJ
  rationale: ἀνυπόστατος apunta a lo que no puede resistirse o sostenerse contra. En español, «invencible» comunica bien la fuerza aparente del grupo, y «parecía ser» preserva δοκοῦσα εἶναι sin convertirlo en afirmación absoluta.
- source_word: κατεκόπησαν
  english_pob_choice: they were cut down
  chosen_spanish: fueron abatidos
  alternatives_spanish:
  - fueron derribados
  - fueron degollados
  - fueron muertos
  lexicon: LSJ
  rationale: El verbo expresa una muerte violenta por golpes o tajos. «Fueron abatidos» conserva la violencia sin volver el texto innecesariamente gráfico en español.
- source_word: ἐν τῷ τῆς Ναναίας ἱερῷ
  english_pob_choice: in the temple of Nanaia
  chosen_spanish: en el templo de Nanaia
  alternatives_spanish:
  - en el santuario de Nanaia
  - en el templo de la diosa Nanaia
  lexicon: LSJ
  rationale: ἱερόν se traduce naturalmente por «templo»; el nombre propio se mantiene transliterado. No se añade «diosa» porque el griego no lo explicita en esta cláusula.
- source_word: παραλογισμῷ χρησαμένων
  english_pob_choice: had used deceit
  chosen_spanish: habían usado engaño
  alternatives_spanish:
  - habían empleado engaño
  - habían recurrido al engaño
  - habían obrado con astucia
  lexicon: LSJ
  rationale: παραλογισμός denota engaño, trampa o sofisma. «Habían usado engaño» mantiene la causalidad/instrumentalidad del absoluto genitivo con un español claro y directo.
- source_word: τῶν περὶ τὴν Ναναίαν ἱερέων
  english_pob_choice: the priests of Nanaia
  chosen_spanish: los sacerdotes de Nanaia
  alternatives_spanish:
  - los sacerdotes pertenecientes a Nanaia
  - los sacerdotes vinculados con Nanaia
  - los sacerdotes al servicio de Nanaia
  lexicon: LSJ
  rationale: La construcción identifica a los sacerdotes asociados con Nanaia. «De Nanaia» es la forma más natural en español y sigue la revisión inglesa que simplifica la relación sin perder el sentido.
theological_decisions:
- issue: Nombrar la deidad Nanaia sin sustituirla por un término genérico
  english_pob_reading: Nanaia is transliterated as a proper name; the temple and priests are associated with her directly.
  chosen_spanish_reading: Nanaia se mantiene como nombre propio, y se habla del templo y de los sacerdotes de Nanaia.
  alternative_spanish_readings:
  - la diosa Nanaia
  - el templo de la diosa Nanaia
  rationale: El texto griego y el POB inglés tratan el nombre como propio. En español, mantener «Nanaia» sin glosa preserva la referencia histórica y evita introducir un dato no expresado explícitamente en la cláusula.
  doctrine_reference: Respeto al texto histórico-literario; no hay afirmación doctrinal cristiana directa en este versículo.
- issue: Expresar la fuerza como aparentemente invencible sin afirmar invencibilidad absoluta
  english_pob_reading: the force around him that seemed to be invincible
  chosen_spanish_reading: la fuerza que lo rodeaba, que parecía ser invencible
  alternative_spanish_readings:
  - la fuerza que lo rodeaba, que parecía irresistible
  - la fuerza que lo rodeaba, que parecía incontenible
  rationale: El griego incluye δοκοῦσα εἶναι, por lo que la cualidad pertenece a la apariencia. «Parecía ser invencible» preserva esa tensión y evita convertir una percepción narrativa en una afirmación absoluta.
  doctrine_reference: Precisión semántica del aspecto narrativo; no se teologiza el adjetivo más allá del texto.
translation_notes:
  revision_awareness: He tenido en cuenta la revisión inglesa más reciente, que prefirió «invincible» frente a «irresistible» para ἀνυπόστατος δοκοῦσα εἶναι δύναμις, y que simplificó la relación de los sacerdotes a «priests of Nanaia». La versión española refleja esa última decisión, conservando además la tensión aspectual de «parecía ser» y la causalidad del genitivo absoluto en «habían usado engaño».
  spanish_consistency_notes:
  - Se usa «Nanaia» como transliteración estable del nombre propio.
  - Se mantiene «líder» para ὁ ἡγεμών por su amplitud contextual.
  - Se usa «fuerza» para δύναμις en sentido militar.
  - Se reserva «invencible» para la apariencia descrita por δοκοῦσα εἶναι.
  - 'Se traduce κατεκόπησαν con una pasiva de violencia no demasiado gráfica: «fueron abatidos».'
  - «Sacerdotes de Nanaia» sigue la decisión inglesa más reciente y suena natural en español.
