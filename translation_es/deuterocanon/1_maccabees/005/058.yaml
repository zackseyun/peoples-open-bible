translation:
  language: es
  text: Y dieron órdenes a los de la fuerza que estaba con ellos, y marcharon contra Yamnia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a Yamnia». La frase griega puede indicar movimiento hacia un lugar, pero en este contexto militar probablemente implica un avance hostil.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρήγγειλαν
  english_pob_choice: gave orders
  chosen_spanish: dieron órdenes
  alternatives_spanish:
  - mandaron
  - dieron instrucciones
  lexicon: BDAG
  rationale: El verbo griego indica emitir órdenes o instrucciones; «dieron órdenes» suena natural en español actual y conserva el matiz militar del contexto sin volverse demasiado rígido.
- source_word: τοῖς ἀπὸ τῆς δυνάμεως τῆς μετʼ αὐτῶν
  english_pob_choice: to those of the force with them
  chosen_spanish: a los de la fuerza que estaba con ellos
  alternatives_spanish:
  - a los del ejército que estaba con ellos
  - a los hombres de la fuerza que estaba con ellos
  lexicon: LSJ
  rationale: La frase griega es algo enrevesada. Mantengo el sentido partitivo de ἀπό con «los de» y traduzco δύναμις aquí como «fuerza» por el contexto militar. «Que estaba con ellos» evita una construcción pesada en español y conserva la idea de compañía.
- source_word: ἐπορεύθησαν
  english_pob_choice: they marched
  chosen_spanish: marcharon
  alternatives_spanish:
  - fueron
  - avanzaron
  lexicon: BDAG
  rationale: En un relato militar, «marcharon» expresa mejor el desplazamiento de tropas que el verbo más genérico «fueron».
- source_word: ἐπὶ Ἰαμνίαν
  english_pob_choice: against Jamnia
  chosen_spanish: contra Yamnia
  alternatives_spanish:
  - a Yamnia
  - hacia Yamnia
  lexicon: LSJ
  rationale: Con un verbo de movimiento militar, ἐπί con acusativo puede señalar dirección hostil. «Contra» refleja bien ese matiz en español.
- source_word: Ἰαμνίαν
  english_pob_choice: Jamnia
  chosen_spanish: Yamnia
  alternatives_spanish:
  - Iamnia
  - Jamnia
  lexicon: LSJ
  rationale: Se usa «Yamnia» como transliteración española coherente y legible del topónimo.
translation_notes:
  revision_awareness: El inglés POB revisó «from the force» a «of the force» para reflejar mejor τοῖς ἀπὸ τῆς δυνάμεως; la versión española sigue esa decisión con «de la fuerza», manteniendo además el matiz militar y la lectura hostil de ἐπὶ Ἰαμνίαν.
  spanish_consistency_notes:
  - Se mantiene «Yamnia» para el topónimo, en lugar de «Jamnia», por coherencia fonética y transliteración española.
  - Se conserva un registro narrativo sobrio y militar, sin añadir explicaciones interpretativas al cuerpo del texto.
  - La nota al pie conserva la alternativa locativa, equivalente a la observación auditada en inglés.
