translation:
  language: es
  text: Y muchas naciones se unirán a Yahvé[a] en aquel día, y serán mi pueblo. Y habitaré en medio de ti[b], y sabrás que Yahvé de los Ejércitos me ha enviado a ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, 'el SEÑOR de los ejércitos'.
    reason: lexical_alternative
  - marker: b
    text: 'El hablante dice: ''Yahvé de los Ejércitos me ha enviado a ti''. El texto no identifica explícitamente al ''me''; conviene preservar la ambigüedad.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְנִלְווּ
  english_pob_choice: will join themselves
  chosen_spanish: se unirán
  alternatives_spanish:
  - se allegarán
  - se adherirán
  - se juntarán a sí mismas
  lexicon: HALOT
  rationale: El nifal de לוה expresa aquí adhesión/unión voluntaria. En español, 'se unirán' comunica bien la idea de incorporarse a Yahvé sin volverla mecánica ni perder el matiz relacional.
- source_word: גוֹיִם רַבִּים
  english_pob_choice: many nations
  chosen_spanish: muchas naciones
  alternatives_spanish:
  - muchos pueblos
  - muchos gentiles
  lexicon: HALOT
  rationale: '''Naciones'' preserva el valor básico de גוֹיִם y el alcance internacional del pasaje. ''Pueblos'' puede sonar más fluido, pero ''naciones'' mantiene mejor la amplitud geopolítica del hebreo.'
- source_word: אֶל יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - hacia Yahvé
  - junto a Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino 'Yahvé' según la norma del proyecto. La preposición 'a' reproduce adecuadamente la relación de dirección/alineación implícita en אֶל con לוה.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: in that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - en el día aquel
  lexicon: HALOT
  rationale: La fórmula profética estándar se vierte de modo natural como 'en aquel día', que mantiene el tono escatológico y bíblico sin sonar arcaizante en exceso.
- source_word: וְהָיוּ לִי לְעָם
  english_pob_choice: and they will be my people
  chosen_spanish: y serán mi pueblo
  alternatives_spanish:
  - y llegarán a ser mi pueblo
  - y serán para mí un pueblo
  lexicon: HALOT
  rationale: La fórmula de pacto se expresa con la construcción natural 'serán mi pueblo'. Aunque el hebreo usa un sustantivo singular colectivo tras un sujeto plural, en español el singular colectivo conserva mejor la resonancia pactal que 'mis pueblos'.
- source_word: וְשָׁכַנְתִּי בְתוֹכֵךְ
  english_pob_choice: And I will dwell in your midst
  chosen_spanish: Y habitaré en medio de ti
  alternatives_spanish:
  - y morar é en tu interior
  - y pondré mi morada en medio de ti
  lexicon: HALOT
  rationale: שׁכן se traduce con 'habitar', un verbo reverente y claro en español bíblico actual. 'En medio de ti' refleja con precisión la forma femenina singular del sufijo y evita diluir el destinatario colectivo/zionita.
- source_word: וְיָדַעַתְּ
  english_pob_choice: and you will know
  chosen_spanish: y sabrás
  alternatives_spanish:
  - y conocerás
  - y reconocerás
  lexicon: HALOT
  rationale: En este contexto profético, 'sabrás' comunica la certeza de reconocimiento que marca la fórmula. 'Conocerás' es posible, pero 'sabrás' suena más natural en español y mantiene el valor epistémico.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: the LORD of Armies
  chosen_spanish: Yahvé de los Ejércitos
  alternatives_spanish:
  - Yahvé de los ejércitos
  - Yahvé de los ejércitos celestiales
  lexicon: HALOT
  rationale: Se sigue la preferencia del proyecto por 'Yahvé'. 'Ejércitos' conserva la fuerza de צְבָאוֹת y evita la ambigüedad de 'hosts' en español. La mayúscula inicial de 'Ejércitos' señala el título divino.
- source_word: שְׁלָחַנִי
  english_pob_choice: has sent me
  chosen_spanish: me ha enviado
  alternatives_spanish:
  - me envió
  - me envía
  lexicon: HALOT
  rationale: El perfecto hebreo en una fórmula de reconocimiento se vierte bien con presente perfecto en español, indicando una acción completada con relevancia actual. 'Me ha enviado' mantiene esa relación sin añadir identificación del remitente.
- source_word: אֵלַיִךְ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - a ti, Jerusalén
  - a ti, hija de Sion
  lexicon: HALOT
  rationale: El sufijo femenino singular se conserva como 'a ti'. El referente femenino queda implícito por el contexto profético; no se introduce una glosa interpretativa en el texto principal.
theological_decisions:
- issue: Identidad del hablante en 'me ha enviado a ti'
  english_pob_reading: Retain the first-person 'me' without interpretive expansion
  chosen_spanish_reading: Conservar el 'me' sin identificar al hablante en el texto principal
  alternative_spanish_readings:
  - el mensajero dice esto en nombre de Yahvé
  - el profeta habla de sí mismo
  - una figura mesiánica/divina habla
  rationale: El hebreo deja deliberadamente abierta la identidad del 'me'. La traducción española debe preservar esa tensión en vez de resolverla mediante una aclaración que el texto no aporta.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Singular colectivo de pacto en 'mi pueblo'
  english_pob_reading: Render 'they will be my people' even though the subject is 'many nations'
  chosen_spanish_reading: Verterlo como 'serán mi pueblo'
  alternative_spanish_readings:
  - serán mis pueblos
  - serán un pueblo para mí
  rationale: El hebreo une un sujeto plural con un sustantivo colectivo singular de pacto. 'Mi pueblo' conserva esa unidad teológica sin fragmentar la fórmula bíblica.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el juicio del audit trail inglés y no introduce revisiones adicionales. Se mantiene la ambigüedad del hablante y la fórmula de pacto, con adaptación natural al español.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה, conforme a la norma del proyecto.
  - '''Yahvé de los Ejércitos'' se emplea como equivalente transparente de יְהוָה צְבָאוֹת.'
  - '''habitaré en medio de ti'' respeta el sufijo femenino singular y la referencia contextual a Sion/Jerusalén.'
  - '''mi pueblo'' conserva la fórmula colectiva de pacto sin pluralizarla.'
