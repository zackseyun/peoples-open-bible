  spanish_consistency_notes:
  - Se mantiene «Parbar» de forma consistente en ambos lugares del versículo, en línea con la revisión inglesa.
  - «Oeste» y «camino» ofrecen un registro bíblico claro sin arcaísmos innecesarios.
  - Los marcadores de nota [a] y [b] aparecen exactamente en el texto donde corresponden.
