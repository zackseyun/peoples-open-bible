revisions:
- from: Saúl se precipitó y cayó[a] de lleno al suelo, y tuvo mucho miedo a causa de las palabras de Samuel. Tampoco tenía fuerza en él, porque no había comido pan[b] todo aquel día y toda aquella noche.
  to: Saúl inmediatamente cayó[a] al suelo, de cuerpo entero, y tuvo mucho miedo a causa de las palabras de Samuel. Tampoco tenía fuerzas, porque no había comido pan[b] todo aquel día y toda aquella noche.
  rationale: Se ajustó 'se precipitó' a 'inmediatamente' para reflejar mejor el valor de rapidez súbita sin sobreinterpretación. Se reemplazó 'de lleno' por 'de cuerpo entero' para expresar con mayor claridad el idiomatismo 'full length'. Se suavizó 'tenía fuerza en él' a 'tenía fuerzas' por naturalidad española, evitando añadir 'quedaban' o 'le quedaban', que introduciría un matiz no presente en el hebreo auditado.
