lexical_decisions:
- source_word: ἐάν
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - cuando
  - siquiera que
  lexicon: BDAG
  rationale: Introduce una cláusula condicional; 'si' es la equivalencia natural y fiel en español.
- source_word: τι
  english_pob_choice: anything
  chosen_spanish: algo
  alternatives_spanish:
  - cualquier cosa
  - nada
  lexicon: BDAG
  rationale: El indefinido neutro en esta construcción se expresa de forma natural como 'algo'; en español 'algo' funciona mejor que un literal 'cualquier cosa' dentro de la petición.
- source_word: αἰτήσητέ
  english_pob_choice: you ask
  chosen_spanish: me piden
  alternatives_spanish:
  - me pidan
  - me solicitan
  lexicon: BDAG
  rationale: El aoristo subjuntivo en una cláusula con ἐάν se vierte naturalmente con subjuntivo presente en español. 'Pedir' conserva el sentido de ruego/petición mejor que un verbo más técnico.
- source_word: με
  english_pob_choice: me
  chosen_spanish: me
  lexicon: BDAG
  rationale: El pronombre objeto está en el texto griego recibido y debe mantenerse explícito en la traducción principal.
- source_word: ἐν τῷ ὀνόματί μου
  english_pob_choice: in my name
  chosen_spanish: en mi nombre
  alternatives_spanish:
  - sobre la base de mi nombre
  - como representantes míos
  lexicon: BDAG
  rationale: La fórmula joánica se conserva con la expresión española habitual 'en mi nombre', que comunica relación, autoridad e identidad sin añadir paráfrasis interpretativas.
- source_word: ἐγὼ
  english_pob_choice: I
  chosen_spanish: yo
  lexicon: BDAG
  rationale: El pronombre explícito refuerza la respuesta personal de Jesús; en español puede conservarse con 'yo' sin sobrecargar el énfasis.
- source_word: ποιήσω
  english_pob_choice: will do it
  chosen_spanish: lo haré
  alternatives_spanish:
  - lo cumpliré
  - lo haré realidad
  lexicon: BDAG
  rationale: El futuro se expresa de manera natural con 'lo haré'; el pronombre 'lo' retoma la petición implícita o explícita del enunciado anterior.
theological_decisions:
- issue: 'Presencia de με (''me'') en el texto griego y su implicación cristológica: la petición se dirige a Jesús'
  english_pob_reading: Translate the verse with 'ask me' in the main text; preserve the alternate manuscript reading in a footnote
  chosen_spanish_reading: Mantener 'me piden' en el texto principal y señalar la variante que omite 'me' en una nota
  alternative_spanish_readings:
  - Si piden algo en mi nombre, yo lo haré.
  - Si me piden algo en mi nombre, yo lo haré.
  rationale: El texto griego proporcionado incluye με, por lo que la traducción principal debe reflejar que la petición se dirige directamente a Jesús. La variante manuscrita sin el pronombre se preserva como nota textual para no ocultar la tensión del testimonio.
  doctrine_reference: Translation philosophy §1 (primacía del original), §3 (preservar tensiones textuales y teológicas)
translation_notes:
  revision_awareness: Se siguió el texto griego SBLGNT provisto, que contiene με, y se mantuvo la variante sin ese pronombre en nota textual, en continuidad con el audit trail inglés. No se hicieron ajustes de armonización con otras tradiciones textuales.
  spanish_consistency_notes:
  - Se prefirió 'mi nombre' para la fórmula joánica estable.
  - Se conservó el pronombre explícito 'me' porque pertenece al texto fuente dado.
  - Se usó 'yo' para reflejar el énfasis del pronombre explícito ἐγώ sin añadir intensificación innecesaria.
