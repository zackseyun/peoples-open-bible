translation:
  language: es
  text: Las cosas ocultas[a] pertenecen a Yahvé nuestro Dios, pero las cosas reveladas nos pertenecen y a nuestros hijos para siempre, para que cumplamos todas las palabras de esta ley[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las cosas secretas».'
    reason: lexical_alternative
  - marker: b
    text: «Esta ley» también puede traducirse «esta instrucción»; en Deuteronomio el término se refiere a la enseñanza de pacto que Moisés presenta a Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנִּסְתָּרֹת
  english_pob_choice: the hidden things
  chosen_spanish: las cosas ocultas
  alternatives_spanish:
  - las cosas secretas
  - las cosas escondidas
  lexicon: HALOT
  rationale: El participio pasivo sustantivado de סתר comunica algo que está oculto o reservado. "Cosas ocultas" preserva bien la idea sin cargarla con el matiz de misterio esotérico que puede traer "secretas".
- source_word: לַיהוָה
  english_pob_choice: to Yahweh our God
  chosen_spanish: pertenecen a Yahvé nuestro Dios
  alternatives_spanish:
  - son de Yahvé nuestro Dios
  - están reservadas a Yahvé nuestro Dios
  lexicon: HALOT
  rationale: El hebreo expresa pertenencia mediante la preposición ל. En español, "pertenecen a" reproduce con naturalidad esa relación de posesión/belonging, y se mantiene "Yahvé" conforme al criterio del proyecto.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - el Dios nuestro
  - el Dios de nosotros
  lexicon: HALOT
  rationale: Es la forma covenental estándar en español y conserva la relación de alianza expresada por el posesivo de primera persona plural.
- source_word: וְהַנִּגְלֹת
  english_pob_choice: but the revealed things
  chosen_spanish: pero las cosas reveladas
  alternatives_spanish:
  - y las cosas reveladas
  - mas las cosas reveladas
  lexicon: HALOT
  rationale: El paralelismo con "las cosas ocultas" pide un sustantivo equivalente. "Reveladas" conserva el participio pasivo de גלה y "pero" refleja adecuadamente el contraste implícito del contexto y de la lectura inglesa POB.
- source_word: לָנוּ
  english_pob_choice: belong to us
  chosen_spanish: nos pertenecen
  alternatives_spanish:
  - son para nosotros
  - quedan para nosotros
  lexicon: HALOT
  rationale: El verbo se sobreentiende en hebreo; en español debe explicitarse. "Nos pertenecen" mantiene el paralelismo con la primera cláusula y la fuerza de posesión compartida.
- source_word: וּלְבָנֵינוּ
  english_pob_choice: and to our children
  chosen_spanish: y a nuestros hijos
  alternatives_spanish:
  - y a nuestros hijos e hijas
  - y a nuestros descendientes
  lexicon: HALOT
  rationale: בנים puede funcionar de modo colectivo como descendencia. "Hijos" es la correspondencia más directa y conserva la formulación bíblica sin perder inteligibilidad en español.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - por toda la eternidad
  lexicon: HALOT
  rationale: La expresión idiomática de duración indefinida se vierte de manera natural con "para siempre".
- source_word: לַעֲשׂוֹת
  english_pob_choice: so that we may do
  chosen_spanish: para que cumplamos
  alternatives_spanish:
  - para hacer
  - a fin de hacer
  lexicon: HALOT
  rationale: El infinitivo con ל expresa propósito. En español, "para que cumplamos" comunica bien la finalidad obediencial del pasaje y evita una calca rígida de "hacer".
- source_word: אֵת כָּל דִּבְרֵי
  english_pob_choice: all the words of
  chosen_spanish: todas las palabras de
  alternatives_spanish:
  - todas las palabras relativas a
  - todo lo que dice
  lexicon: HALOT
  rationale: Se conserva "palabras" para reflejar el peso textual de los preceptos concretos. Aunque "cosas" podría sonar más natural, aquí el hebreo enfatiza las "palabras" de la instrucción.
- source_word: הַתּוֹרָה הַזֹּאת
  english_pob_choice: this law
  chosen_spanish: esta ley
  alternatives_spanish:
  - esta instrucción
  - esta enseñanza
  lexicon: HALOT
  rationale: En Deuteronomio, תּוֹרָה puede abarcar enseñanza/instrucción, pero en este marco legal-covenantal "ley" es una equivalencia clara y tradicionalmente comprensible. Se evita ocultar el matiz normativo que el pasaje presenta.
theological_decisions:
- issue: Alcance de lo oculto y lo revelado
  english_pob_reading: The verse contrasts matters reserved to God with covenantal revelation given to Israel for obedience, without specifying exhaustive categories of divine secrecy.
  chosen_spanish_reading: El versículo contrapone lo que Dios reserva para sí con lo que ha revelado a Israel, orientándolo a la obediencia, sin definir de modo exhaustivo qué entra en cada categoría.
  alternative_spanish_readings:
  - Una afirmación general sobre los misterios divinos
  - Una referencia restringida solo a las maldiciones y bendiciones del contexto inmediato
  rationale: La traducción mantiene la tensión bíblica sin cerrarla artificialmente. No precisa más de lo que el hebreo dice, pero deja que el contexto deuteronómico oriente la interpretación.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo y coincide con el sentido y las decisiones del audit trail inglés. No se registran revisiones aplicadas en el paquete fuente, y la lectura final permanece estable.
  spanish_consistency_notes:
  - Se conserva Yahvé en lugar de un reemplazo genérico por «Señor», conforme al criterio del proyecto.
  - «Cosas ocultas» y «cosas reveladas» mantienen el paralelismo y la tensión semántica del original.
  - «Ley» se usa para תּוֹרָה en este contexto de pacto, con nota alternativa a «instrucción» para reflejar la ambigüedad documentada.
  - La cláusula final se vierte con una finalidad explícita en español («para que cumplamos») para reflejar el infinitivo final hebreo.
