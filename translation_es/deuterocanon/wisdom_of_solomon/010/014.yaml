translation:
  language: es
  text: Bajó con él al pozo[a], y en cadenas no lo abandonó, hasta que le trajo el cetro de un reino y autoridad sobre quienes lo tiranizaban; mostró como falsos[b] a los que lo habían acusado, y le dio gloria eterna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al calabozo»; el griego dice literalmente «al pozo», que puede referirse a una cisterna o a un pozo de prisión.
    reason: lexical_alternative
  - marker: b
    text: O «demostró falsos a los que lo habían acusado».
    reason: alternative_reading
lexical_decisions:
- source_word: συγκατέβη
  english_pob_choice: went down with
  chosen_spanish: bajó con él
  alternatives_spanish:
  - descendió con él
  - se bajó con él
  lexicon: LSJ
  rationale: El compuesto con σύν expresa descenso acompañante; en español, «bajó con él» mantiene la idea de acompañamiento y suena natural y digno.
- source_word: εἰς λάκκον
  english_pob_choice: into the pit
  chosen_spanish: al pozo
  alternatives_spanish:
  - a la fosa
  - al calabozo
  lexicon: LSJ
  rationale: λάκκος designa literalmente un pozo o fosa y puede aludir a una cisterna o prisión-pit. «Pozo» conserva la imagen concreta sin imponer una interpretación más estrecha.
- source_word: ἐν δεσμοῖς
  english_pob_choice: in chains
  chosen_spanish: en cadenas
  alternatives_spanish:
  - en prisiones
  - en grilletes
  lexicon: LSJ
  rationale: δεσμοί son ataduras o vínculos; «en cadenas» comunica de manera clara e idiomática la condición de encierro.
- source_word: οὐκ ἀφῆκεν αὐτόν
  english_pob_choice: did not abandon him
  chosen_spanish: no lo abandonó
  alternatives_spanish:
  - no lo dejó
  - no lo desamparó
  lexicon: LSJ
  rationale: ἀφίημι aquí tiene el sentido de no dejar atrás ni abandonar. «No lo abandonó» sigue de cerca la fuerza del griego y del POB en inglés.
- source_word: ἕως ἤνεγκεν αὐτῷ
  english_pob_choice: until she brought him
  chosen_spanish: hasta que le trajo
  alternatives_spanish:
  - hasta que le llevó
  - hasta que le concedió
  lexicon: LSJ
  rationale: φέρω con dativo puede significar traer o conferir. «Le trajo» preserva la concreción verbal y se enlaza bien con los objetos que siguen.
- source_word: σκῆπτρα βασιλείας
  english_pob_choice: the scepter of a kingdom
  chosen_spanish: los cetros de un reino
  alternatives_spanish:
  - el cetro de un reino
  - los cetros del reino
  lexicon: LSJ
  rationale: El plural σκῆπτρα se mantiene como plural en español para respetar la forma griega, aunque el sentido sea colectivo o intensivo. «Cetros de un reino» evita forzar un singular donde el texto no lo ofrece.
- source_word: ἐξουσίαν τυραννούντων αὐτοῦ
  english_pob_choice: authority over those who had tyrannized him
  chosen_spanish: autoridad sobre quienes lo tiranizaban
  alternatives_spanish:
  - autoridad sobre los que lo oprimían
  - poder sobre sus tiranos
  lexicon: LSJ
  rationale: τυραννέω implica gobernar como tirano, dominar u oprimir. «Tiranizaban» conserva la dureza del verbo y evita suavizarlo a un simple gobierno.
- source_word: ψευδεῖς ... ἔδειξεν
  english_pob_choice: showed ... to be false
  chosen_spanish: mostró como falsos
  alternatives_spanish:
  - demostró falsos
  - dejó ver como falsos
  lexicon: LSJ
  rationale: La construcción expresa que se les prueba falsos. «Mostró como falsos» reproduce esa relación sin añadir más contenido del que el griego da.
- source_word: τοὺς μωμησαμένους αὐτόν
  english_pob_choice: those who had accused him
  chosen_spanish: a los que lo habían acusado
  alternatives_spanish:
  - a los que lo habían reprochado
  - a sus detractores
  lexicon: LSJ
  rationale: μωμάομαι puede significar censurar, culpar o hallar falta. Dado el contexto narrativo, «habían acusado» conserva la hostilidad sin convertirlo en una acusación técnica más precisa de lo que exige el griego.
- source_word: δόξαν αἰώνιον
  english_pob_choice: everlasting glory
  chosen_spanish: gloria eterna
  alternatives_spanish:
  - gloria perpetua
  - gloria para siempre
  lexicon: LSJ
  rationale: La expresión es la fórmula elevada habitual; «gloria eterna» mantiene el registro solemne y la duración sin calco forzado.
theological_decisions:
- issue: Sujeto femenino personificado de Sabiduría
  english_pob_reading: Render the subject as 'She,' referring to personified Wisdom from the immediate context.
  chosen_spanish_reading: Mantener el sujeto implícito femenino por el contexto de la Sabiduría personificada, sin repetir «Sabiduría» dentro del verso.
  alternative_spanish_readings:
  - Sabiduría bajó con él al pozo...
  - Ella bajó con él al pozo...
  rationale: El griego continúa la personificación sin repetición nominal. En español, una referencia pronominal implícita sería más forzada; por eso se verbaliza el sujeto con una forma natural, pero sin perder la identificación contextual con la Sabiduría personificada.
  doctrine_reference: Preservar la personificación literaria y la continuidad del contexto, sin resolverla por tradición litúrgica.
translation_notes:
  revision_awareness: 'La redacción sigue el texto griego de Swete 1909 y toma en cuenta el ajuste final del POB en inglés: se prefirió «tyrannized» frente a «ruled» y «accused» frente a «slandered», por lo que en español se eligieron «tiranizaban» y «habían acusado» para no sobrerinterpretar ni debilitar el matiz del original. También se conservó el plural de σκῆπτρα con «cetros» para respetar la forma griega.'
  spanish_consistency_notes:
  - Se usa «pozo» para λάκκος, manteniendo la imagen concreta y la posible ambigüedad de cisterna/prisión.
  - Se usa «en cadenas» para δεσμοῖς por claridad idiomática.
  - «Gloria eterna» se conserva como fórmula solemne y transparente.
  - Se evita «SEÑOR» o sustitución teológica ajena, pues el verso no contiene el Nombre divino explícito.
  - El sujeto de Sabiduría queda identificado por el contexto inmediato sin añadir una glosa dentro del texto principal.
