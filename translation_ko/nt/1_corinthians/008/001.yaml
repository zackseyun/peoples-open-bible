reference: '1 Corinthians 8:1'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Περὶ δὲ τῶν εἰδωλοθύτων, οἴδαμεν ὅτι πάντες γνῶσιν ἔχομεν. ἡ γνῶσις φυσιοῖ, ἡ δὲ ἀγάπη οἰκοδομεῖ.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/008/001.yaml
  text: 'Now concerning food sacrificed to idols: we know that we all have knowledge[a]. Knowledge puffs up[b], but love builds up.'
  footnotes:
  - marker: a
    text: 'Or ''meat offered to idols'' or ''things sacrificed to idols.'''
    reason: lexical_alternative
  - marker: b
    text: 'Paul may be echoing a Corinthian slogan in ''we all have knowledge.'''
    reason: alternative_reading
translation:
  language: ko
  text: 이제 우상에게 바쳐진 음식에 관하여 말합니다. 우리는 우리 모두가 지식을 가지고 있다는 것을 압니다. 지식은 교만하게 하나, 사랑은 세웁니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τῶν εἰδωλοθύτων
  english_pob_choice: food sacrificed to idols
  chosen_korean: 우상에게 바쳐진 음식
  alternatives_korean:
  - 우상 제물
  lexicon: BDAG
  rationale: εἰδωλόθυτος는 「우상에 도살되어 바쳐진 [것]」 — 시장에서 팔리거나 신전 식사에 등장하는 고기. 「우상에게 바쳐진 음식」이 어원과 문맥을 모두 살린다.
- source_word: γνῶσιν
  english_pob_choice: knowledge
  chosen_korean: 지식
  alternatives_korean:
  - 앎
  lexicon: BDAG
  rationale: 고린도 회중의 표어적 자랑.
- source_word: φυσιοῖ
  english_pob_choice: puffs up
  chosen_korean: 교만하게 하나
  alternatives_korean:
  - 우쭐하게 하나
  lexicon: BDAG
  rationale: 4·5장의 φυσιόω 어휘와 호응 — 분파주의 비판이 식사 문제에까지 연장.
- source_word: οἰκοδομεῖ
  english_pob_choice: builds up
  chosen_korean: 세웁니다
  alternatives_korean:
  - 덕을 세웁니다
  lexicon: BDAG
  rationale: '3:9의 건축 비유와 어휘 연결.'
