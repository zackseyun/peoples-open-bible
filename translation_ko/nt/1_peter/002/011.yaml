id: 1PE.2.11
reference: 1 Peter 2:11
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἀγαπητοί, παρακαλῶ ὡς παροίκους καὶ παρεπιδήμους ἀπέχεσθαι τῶν σαρκικῶν ἐπιθυμιῶν, αἵτινες στρατεύονται κατὰ τῆς ψυχῆς·
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/002/011.yaml
  text: 'Beloved, I urge you as sojourners and exiles to abstain from fleshly desires, which wage war against the soul.'
translation:
  language: ko
  text: '사랑하는 여러분, 나는 여러분을 거류민이며 나그네로 여기고[a] 권합니다. 영혼을 거슬러 싸우는 육신의 정욕들을 멀리하십시오.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: πάροικος(거류민)와 παρεπίδημος(나그네)가 함께 등장한다. 1:1과 동일 모티프(나그네 정체성).
    reason: cross_reference
lexical_decisions:
- source_word: Ἀγαπητοί
  english_pob_choice: Beloved
  chosen_korean: 사랑하는 여러분
  alternatives_korean:
  - 사랑하는 자들이여
  - 사랑받는 자들이여
  lexicon: BDAG
  rationale: 합쇼체 호격 형태로 자연스럽게 옮긴다.
- source_word: παροίκους καὶ παρεπιδήμους
  english_pob_choice: sojourners and exiles
  chosen_korean: 거류민이며 나그네
  alternatives_korean:
  - 외국인이며 나그네
  - 임시 거주자이며 떠도는 자
  lexicon: BDAG
  rationale: 1:1에서 παρεπίδημος를 「나그네」로 정한 것과 일관성 유지. πάροικος는 별도 단어이므로 「거류민」으로 옮겨 두 단어의 구별을 드러낸다.
- source_word: σαρκικῶν ἐπιθυμιῶν
  english_pob_choice: fleshly desires
  chosen_korean: 육신의 정욕들
  alternatives_korean:
  - 육적 욕망들
  - 육체의 욕심들
  lexicon: BDAG
  rationale: 한국 성서 전통의 「육신의 정욕」 유지.
- source_word: στρατεύονται κατὰ τῆς ψυχῆς
  english_pob_choice: wage war against the soul
  chosen_korean: 영혼을 거슬러 싸우는
  alternatives_korean:
  - 영혼을 대적하여 싸우는
  - 영혼에 맞서 전쟁하는
  lexicon: BDAG
  rationale: στρατεύω의 군사적 비유를 「싸우는」으로 살리되, 「거슬러」로 대적성을 명시한다.
