    rationale: El participio hebreo se refiere a quienes tienden trampas o lazos. «Cazadores» puede incluir otras formas de caza y diluye la imagen concreta del lazo para aves.
  revised_spanish_text: Nuestra alma ha escapado como un ave del lazo de los que ponen lazos[a]; el lazo está roto, y nosotros hemos escapado.
