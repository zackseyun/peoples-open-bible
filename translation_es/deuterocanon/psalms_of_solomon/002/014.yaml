translation:
  language: es
  text: Así como ellos mismos solían hacerlo, exhibieron sus iniquidades[a] delante del sol[b], y las hijas de Jerusalén quedaron profanas[c] conforme a tu juicio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'injusticias'.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'delante del sol'; es decir, abierta y públicamente.
    reason: lexical_alternative
  - marker: c
    text: O 'quedaron contaminadas' o 'fueron profanadas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὰ
  english_pob_choice: Just as
  chosen_spanish: Así como
  alternatives_spanish:
  - Justo como
  - Tal como
  lexicon: LSJ
  rationale: La comparación introductoria pide un equivalente natural en español que conserve la relación de semejanza con la acción anterior sin volverse mecánico.
- source_word: ἐποίουν αὐτοί
  english_pob_choice: they themselves used to do
  chosen_spanish: ellos mismos solían hacerlo
  alternatives_spanish:
  - ellos mismos lo hacían
  - ellos mismos acostumbraban hacerlo
  lexicon: LSJ
  rationale: El imperfecto expresa acción habitual pasada; 'solían hacerlo' comunica ese valor, y 'ellos mismos' conserva el énfasis del pronombre αὐτοί.
- source_word: παρεδειγμάτισαν
  english_pob_choice: displayed
  chosen_spanish: exhibieron
  alternatives_spanish:
  - mostraron
  - pusieron en exhibición
  - expusieron
  lexicon: LSJ
  rationale: El verbo sugiere una exhibición pública y vergonzosa. 'Exhibieron' preserva esa publicidad sin perder naturalidad en español.
- source_word: ἀδικίας
  english_pob_choice: iniquities
  chosen_spanish: iniquidades
  alternatives_spanish:
  - maldades
  - iniquidades cometidas
  - injusticias
  lexicon: LSJ
  rationale: El plural apunta a actos concretos de maldad o culpa moral. 'Iniquidades' mantiene el peso ético y religioso mejor que 'injusticias' en este contexto.
- source_word: ἀπέναντι τοῦ ἡλίου
  english_pob_choice: before the sun
  chosen_spanish: delante del sol
  alternatives_spanish:
  - ante el sol
  - a la vista del sol
  - en pleno día
  lexicon: LSJ
  rationale: La expresión literal se conserva para no borrar la imagen, pero 'delante del sol' sigue siendo natural en español y mantiene la idea de publicidad abierta.
- source_word: βέβηλοι
  english_pob_choice: profane
  chosen_spanish: profanas
  alternatives_spanish:
  - impuras
  - contaminadas
  - profanadas
  lexicon: LSJ
  rationale: El adjetivo describe una condición de profanación respecto de lo santo. 'Profanas' mantiene esa oposición de santidad/profanación y funciona bien con 'las hijas de Jerusalén'.
- source_word: κατὰ τὸ κρίμα σου
  english_pob_choice: according to your judgment
  chosen_spanish: conforme a tu juicio
  alternatives_spanish:
  - según tu juicio
  - de acuerdo con tu juicio
  - conforme a tu sentencia
  lexicon: LSJ
  rationale: '''Juicio'' conserva el sentido judicial general de κρίμα sin fijar más de lo que el griego exige. ''Conforme a'' suena bíblico y claro en español contemporáneo.'
theological_decisions:
- issue: Relación entre la condición de las hijas de Jerusalén y el juicio divino
  english_pob_reading: were profane according to your judgment
  chosen_spanish_reading: eran profanas conforme a tu juicio
  alternative_spanish_readings:
  - estaban profanadas conforme a tu juicio
  - eran impuras conforme a tu juicio
  rationale: Se conserva la formulación que une su estado con una decisión judicial divina, sin resolver de antemano si el matiz es estado moral, ritual o resultado de sentencia. Eso mantiene la tensión del texto fuente.
  doctrine_reference: juicio divino / santidad ritual y moral
- issue: Valor de ἀδικίας como pecado concreto y no solo desigualdad social
  english_pob_reading: their iniquities
  chosen_spanish_reading: sus iniquidades
  alternative_spanish_readings:
  - sus injusticias
  - sus maldades
  rationale: En este contexto, el plural griego apunta a actos de culpa moral/religiosa. 'Iniquidades' evita la reducción moderna de 'injusticias' a inequidad social y preserva la carga teológica.
  doctrine_reference: pecado / culpa moral
translation_notes:
  revision_awareness: 'El inglés auditado pasó por correcciones importantes: se restauró el valor habitual del imperfecto ἐποίουν con el énfasis de αὐτοί, se ajustó ἀδικίας desde ''injustices'' a ''iniquities'', y se volvió a una forma más literal de ἀπέναντι τοῦ ἡλίου (''before the sun''). La redacción española sigue esas decisiones y evita suavizar la imagen pública del pasaje.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como terminología estándar del proyecto solo cuando el texto lo requiera; aquí no aparece.
  - '''Juicio'' se usa en sentido forense, no meramente como opinión.'
  - Se evita 'SEÑOR' porque el pasaje no contiene el tetragrámaton ni una cita directa del nombre divino.
  - El participio/adjetivo 'profanas' se dejó en femenino plural para concordar con 'las hijas de Jerusalén'.
