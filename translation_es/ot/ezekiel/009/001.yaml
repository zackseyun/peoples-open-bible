translation:
  language: es
  text: 'Entonces él gritó en mis oídos con voz fuerte, diciendo: «Acérquense, ejecutores[a] de la ciudad, cada uno con su arma de destrucción[b] en su mano».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los designados de la ciudad»; el término hebreo también puede denotar a los nombrados para supervisión o para visitación/jucio.
    reason: alternative_reading
  - marker: b
    text: Hebreo literalmente «y cada hombre [con] su arma de destrucción en su mano».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: he cried out
  chosen_spanish: gritó
  alternatives_spanish:
  - clamó
  - llamó
  lexicon: HALOT
  rationale: El hebreo indica una llamada fuerte y audible, no una simple mención. «Gritó» comunica bien la intensidad del verbo en este contexto de anuncio judicial.
- source_word: בְאָזְנַי
  english_pob_choice: in my ears
  chosen_spanish: en mis oídos
  alternatives_spanish:
  - a mis oídos
  - en mi oído
  lexicon: HALOT
  rationale: Se conserva la imagen concreta del hebreo. «En mis oídos» mantiene la fuerza expresiva sin suavizarla demasiado.
- source_word: קוֹל גָּדוֹל
  english_pob_choice: with a loud voice
  chosen_spanish: con una gran voz
  alternatives_spanish:
  - con voz fuerte
  - con una voz poderosa
  lexicon: HALOT
  rationale: Aunque «voz grande» sería más literal, en español suena extraña. «Gran voz» conserva el sustantivo y refleja la fórmula hebrea de manera digna y natural.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - 'diciendo:'
  - al decir
  lexicon: HALOT
  rationale: Funciona como introducción de discurso directo. «Diciendo» es formal y fiel al enlace sintáctico del hebreo.
- source_word: קָרְבוּ
  english_pob_choice: Draw near
  chosen_spanish: Acercaos
  alternatives_spanish:
  - Acérquense
  - Acercaos
  lexicon: HALOT
  rationale: El imperativo plural se reproduce con una forma natural y solemne. Se mantiene el tono de convocatoria o mandato.
- source_word: פְּקֻדּוֹת הָעִיר
  english_pob_choice: you executioners of the city
  chosen_spanish: ejecutores de la ciudad
  alternatives_spanish:
  - verdugos de la ciudad
  - encargados de la ciudad
  - visitadores de la ciudad
  lexicon: HALOT
  rationale: El sustantivo derivado de פקד es difícil y el contexto apunta a agentes de juicio. «Ejecutores» transmite la función judicial/punitiva sin convertir el término en una simple abstracción ni fijar una especificidad angelológica no explicitada en el versículo.
- source_word: וְאִישׁ
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - y cada hombre
  - y cada cual
  lexicon: HALOT
  rationale: El hebreo usa un singular distributivo. «Cada uno» expresa bien la distribución sobre el grupo sin sonar masculino de manera innecesaria.
- source_word: כְּלִי מַשְׁחֵתוֹ
  english_pob_choice: his weapon of destruction
  chosen_spanish: arma de destrucción
  alternatives_spanish:
  - instrumento de destrucción
  - arma destructora
  - arma para destruir
  lexicon: HALOT
  rationale: כְּלִי puede ser utensilio, instrumento o arma; aquí el contexto bélico/judicial favorece «arma». «De destrucción» conserva el genitivo fuerte del hebreo y la imagen de un instrumento destinado a destruir.
- source_word: בְּיָדוֹ
  english_pob_choice: in his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - en la mano
  - en su mano
  lexicon: HALOT
  rationale: Se mantiene la imagen concreta y la concordancia con el hebreo singular. Es una expresión directa y natural en español.
theological_decisions:
- issue: פְּקֻדּוֹת הָעִיר como agentes de juicio, no como mera abstracción
  english_pob_reading: you executioners of the city
  chosen_spanish_reading: ejecutores de la ciudad
  alternative_spanish_readings:
  - verdugos de la ciudad
  - encargados de la ciudad
  - visitadores de la ciudad
  rationale: El contexto inmediato presenta a estos personajes con armas de destrucción y como agentes del juicio que sigue. La traducción evita reducir el término a «visitaciones» como abstracción y también evita imponer una identificación más específica de la que el hebreo del versículo por sí solo garantiza.
  doctrine_reference: Preservar la tensión léxica y contextual sin añadir especificidad doctrinal no explicitada en el texto.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail al preferir una lectura agentiva/punitiva para פְּקֻדּוֹת הָעִיר, manteniendo el resto de la formulación estable y conservando el carácter auditable de la alternativa literal.
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el hebreo exige el nombre divino; este versículo no lo contiene.
  - Se eligió «ejecutores» por coherencia con la revisión aplicada en el audit trail; se mantiene una nota alternativa para no borrar la tensión léxica del hebreo.
  - «Gran voz» conserva la construcción nominal del hebreo y evita una paráfrasis excesiva como «fuertemente».
  - Se mantuvo el singular distributivo de «cada uno» para reflejar el hebreo sin volverlo artificial.
