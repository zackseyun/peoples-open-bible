translation:
  language: es
  text: Simea[a] su hijo, Haguías su hijo, Asaías su hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo repite literalmente la fórmula genealógica «su hijo ... su hijo ... su hijo», marcando descendencia sucesiva en el linaje.
