translation:
  language: es
  text: Y la guerra contra los filisteos fue intensa[a] todos los días de Saúl. Cada vez que Saúl veía a cualquier hombre poderoso o a cualquier hombre de valor[b], lo incorporaba a su servicio[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fiera» o «dura»; el hebreo dice literalmente «fuerte».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «cualquier hombre poderoso o cualquier hijo de valor».'
    reason: lexical_alternative
  - marker: c
    text: Es decir, Saúl reclutaba a tales hombres para su propio servicio.
    reason: cultural_note
lexical_decisions:
- source_word: הַמִּלְחָמָה
  english_pob_choice: the war
  chosen_spanish: la guerra
  alternatives_spanish:
  - el combate
  - la lucha
  lexicon: HALOT
  rationale: El sustantivo describe el estado continuo de conflicto, no una sola batalla; en español, «la guerra» conserva esa continuidad de manera natural y fiel.
- source_word: חֲזָקָה
  english_pob_choice: severe
  chosen_spanish: muy fuerte
  alternatives_spanish:
  - severa
  - fiera
  - dura
  lexicon: HALOT
  rationale: El hebreo significa literalmente «fuerte». En español, «muy fuerte» mantiene la fuerza léxica sin sonar forzado; «severa» sería más interpretativo y «dura» menos preciso respecto de la intensidad.
- source_word: עַל פְּלִשְׁתִּים
  english_pob_choice: against the Philistines
  chosen_spanish: contra los filisteos
  alternatives_spanish:
  - sobre los filisteos
  - con los filisteos
  lexicon: HALOT
  rationale: Con מלחמה, עַל marca al adversario. «Contra» es la preposición española más natural y clara para el conflicto bélico.
- source_word: כֹּל יְמֵי שָׁאוּל
  english_pob_choice: all the days of Saul
  chosen_spanish: todos los días de Saúl
  alternatives_spanish:
  - durante toda la vida de Saúl
  - en todos los días de Saúl
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y señala la duración del reinado o de la vida de Saúl. «Todos los días de Saúl» preserva bien la forma hebrea y sigue siendo comprensible en español.
- source_word: וְרָאָה
  english_pob_choice: Whenever ... saw
  chosen_spanish: y cuando ... veía
  alternatives_spanish:
  - y veía
  - cada vez que ... veía
  lexicon: HALOT
  rationale: Aunque la forma es un qatal con waw, el contexto expresa acción repetida. «Y cuando ... veía» conserva el sentido iterativo sin perder fluidez en español.
- source_word: כָּל אִישׁ גִּבּוֹר
  english_pob_choice: any mighty man
  chosen_spanish: cualquier hombre valiente
  alternatives_spanish:
  - cualquier hombre poderoso
  - cualquier guerrero
  lexicon: HALOT
  rationale: «גִּבּוֹר» puede ser «valiente», «poderoso» o «héroe de guerra». En este contexto de reclutamiento militar, «hombre valiente» transmite el matiz marcial sin sonar arcaico.
- source_word: וְכָל בֶּן חַיִל
  english_pob_choice: or any valiant man
  chosen_spanish: o a cualquier hijo de valor
  alternatives_spanish:
  - o a cualquier hombre de valor
  - o a cualquier hombre capaz
  lexicon: HALOT
  rationale: «בן חיל» es literalmente «hijo de valor» y puede funcionar como idiomismo para un hombre de valor o competencia. Se conserva la imagen hebrea con una redacción española inteligible; la alternativa idiomática sería «hombre de valor».
- source_word: וַיַּאַסְפֵהוּ אֵלָיו
  english_pob_choice: he gathered him to himself
  chosen_spanish: lo reunía a su alrededor
  alternatives_spanish:
  - lo incorporaba a su servicio
  - lo reunía consigo
  lexicon: HALOT
  rationale: אסף significa literalmente «reunir» o «juntar». En contexto militar, el sentido es que Saúl incorporaba a esos hombres a su grupo; «lo reunía a su alrededor» conserva la imagen de reunión y sugiere su integración al entorno de Saúl.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; se mantiene el acuerdo alto con el texto base y la solución óptima-equivalente para el estilo español.
  spanish_consistency_notes:
  - Se usa «filisteos» para פְּלִשְׁתִּים, coherente con el uso bíblico estándar en español.
  - Se mantiene «Saúl» como nombre propio sin adaptación.
  - Se conserva la distinción entre el sentido literal de «reunir» y la implicación contextual de reclutamiento militar, reflejada en la nota c.
  - La elección de «hijo de valor» preserva la tensión entre literalidad hebrea e idiomatismo español; se explica en la nota b.
