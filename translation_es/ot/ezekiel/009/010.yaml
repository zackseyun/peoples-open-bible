revisions:
- from: Y en cuanto a mí, mi ojo no tendrá compasión[a], ni tendré piedad[b]; he puesto su conducta sobre su propia cabeza.
  to: Y en cuanto a mí, mi ojo no tendrá compasión, ni tendré piedad; he hecho recaer su conducta[a] sobre sus cabezas[b].
  rationale: Se corrigió el anclaje de la nota léxica para que explique el término correspondiente ('conducta'). Se restauró el plural hebreo 'sus cabezas' y se quitó 'propia', que introducía una explicitación no presente en el texto fuente. También se ajustó el verbo a 'he hecho recaer' para una formulación española más natural de la retribución judicial, manteniendo la imagen y severidad del original.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:49:12Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador español preserva en general el sentido de juicio divino y la doble negación de compasión, pero contiene problemas importantes de anclaje de notas y de fidelidad idiomática. La nota [a] fue colocada sobre 'compasión' aunque explica דַּרְכָּם ('su camino/conducta'), no el primer cola. Además, 'su propia cabeza' cambia indebidamente el plural hebreo בְּרֹאשָׁם ('sobre sus cabezas') y añade 'propia', que el inglés reservó para nota explicativa, no para el texto principal. 'He puesto' es comprensible, pero 'he hecho recaer' comunica mejor en español la fórmula de retribución sin perder la imagen hebrea.
  spanish_quality_summary: El español es claro y digno, pero la distribución de las notas vuelve confuso el texto y una formulación más idiomática mejoraría la cláusula final. 'Mi ojo no tendrá compasión, ni tendré piedad' es aceptable; la última cláusula suena más natural y fiel como 'he hecho recaer su conducta sobre sus cabezas'.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparece Yahvé en el hebreo de este versículo. La elección de 'conducta' para דַּרְכָּם es válida en español si se conserva la alternativa 'camino' en nota. Debe mantenerse la imagen judicial de 'sobre sus cabezas' en el texto principal, dejando la explicación idiomática para la nota.
  issues:
  - severity: high
    issue: La nota [a] está anclada en la frase equivocada.
    rationale: La nota explica 'su camino/conducta' (דַּרְכָּם), pero en el borrador aparece tras 'compasión', creando un error material y exegético.
  - severity: high
    issue: '''Sobre su propia cabeza'' altera el número y añade interpretación al texto principal.'
    rationale: El hebreo tiene plural 'sobre sus cabezas'. El añadido 'propia' no está en el texto fuente y traslada al texto principal una explicitación que corresponde a nota.
  - severity: medium
    issue: La nota [b] cita una frase distinta de la que debería aparecer en el texto revisado.
    rationale: Si el texto principal conserva la imagen hebrea, la nota cultural debe anclarse a 'sobre sus cabezas', no a 'sobre su propia cabeza'.
  - severity: medium
    issue: La cláusula final puede expresarse con mayor naturalidad judicial en español.
    rationale: '''He puesto su conducta sobre sus cabezas'' es entendible, pero ''he hecho recaer su conducta sobre sus cabezas'' refleja mejor la fórmula de retribución sin paráfrasis excesiva.'
  revised_spanish_text: Y en cuanto a mí, mi ojo no tendrá compasión, ni tendré piedad; he hecho recaer su conducta[a] sobre sus cabezas[b].
  revised_footnotes:
  - marker: a
    text: O 'su camino'. El hebreo 'camino' es un modismo para la manera de vivir o el comportamiento.
    reason: lexical_alternative
  - marker: b
    text: '''Sobre sus cabezas'' es una expresión hebrea de retribución que vuelve sobre el culpable.'
    reason: cultural_note
  revision_rationale: Se corrigió el anclaje de la nota léxica para que explique el término correspondiente ('conducta'). Se restauró el plural hebreo 'sus cabezas' y se quitó 'propia', que introducía una explicitación no presente en el texto fuente. También se ajustó el verbo a 'he hecho recaer' para una formulación española más natural de la retribución judicial, manteniendo la imagen y severidad del original.
