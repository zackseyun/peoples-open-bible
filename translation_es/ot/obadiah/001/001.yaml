base_translation:
  language: en
  yaml_path: translation/ot/obadiah/001/001.yaml
  text: 'The vision of Obadiah[a]. Thus says the Lord GOD concerning Edom: We have heard a report from Yahweh, and a messenger has been sent among the nations: “Rise up[c][b], and let us rise against her for battle.”'
  footnotes:
  - marker: a
    text: Or 'an envoy' or 'an ambassador' for 'a messenger.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'against her,' referring to Edom as a nation; English could also render 'against it.'
    reason: lexical_alternative
  - marker: c
    text: The identity of 'we' and 'let us' is not specified in the Hebrew and may be understood in more than one way.
    reason: alternative_reading
