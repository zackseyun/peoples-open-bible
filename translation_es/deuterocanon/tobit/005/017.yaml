revisions:
- from: 'Ellos estuvieron de acuerdo[a]. Entonces dijo a Tobías: «Prepárate para el camino, y que tu viaje sea próspero». Así su hijo preparó lo necesario para el camino. Luego su padre le dijo: «Ve con el hombre, y que Dios, que habita en el cielo, haga prosperar tu camino, y que su ángel vaya contigo[b]». Entonces ambos salieron para partir, y el perro del muchacho iba con ellos.'
  to: 'Estuvieron de acuerdo. Entonces dijo a Tobías: «Prepárate para el camino, y que tu viaje sea próspero[a]». Así su hijo preparó lo necesario para el viaje. Luego su padre le dijo: «Ve con el hombre, y que Dios, que habita en el cielo, haga prosperar el camino de ustedes, y que su ángel vaya con ustedes[b]». Entonces ambos salieron para partir, y el perro del muchacho iba con ellos.'
  rationale: La revisión corrige el error principal de número al reflejar los plurales griegos en la bendición del padre («de ustedes», «con ustedes»), reubica la nota [a] en la frase que realmente comenta, y pule ligeramente la naturalidad del español sin apartarse del sentido de la fuente ni de las decisiones del POB inglés.
