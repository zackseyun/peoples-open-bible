    text: 'O: «los oficiales del rey», ya que el término hebreo puede denotar también funcionarios de corte.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se dieron prisa» o «se apresuraron rápidamente a llevar a Amán»; el verbo hebreo aquí comunica urgencia.'
    reason: lexical_alternative
  revision_rationale: 'Se elimina la nota no esencial sobre «aún/todavía» y se restauran las dos alternativas léxicas significativas documentadas por la auditoría inglesa: «eunucos/oficiales» y la urgencia de וַיַּבְהִלוּ. También se suaviza levemente la primera cláusula para una lectura más natural en español sin apartarse del hebreo.'
