lexical_decisions:
- source_word: וַתְּהִי
  english_pob_choice: also had
  chosen_spanish: tuvo también
  alternatives_spanish:
  - y hubo
  - y tuvo
  lexicon: HALOT
  rationale: En un contexto genealógico, el hebreo expresa una relación posesiva/existencial que en español se naturaliza mejor como «tuvo». «También» comunica el valor aditivo del waw en el contexto, como en el inglés POB.
- source_word: אִשָּׁה אַחֶרֶת
  english_pob_choice: another wife
  chosen_spanish: otra esposa
  alternatives_spanish:
  - otra mujer
  - una esposa adicional
  lexicon: HALOT
  rationale: Aquí אִשָּׁה se entiende como «esposa» por el contexto de parentesco. «Otra» conserva la idea de adición/distinción de אַחֶרֶת sin recargar la frase.
- source_word: לִירַחְמְאֵל
  english_pob_choice: Jerahmeel
  chosen_spanish: Jerahmeel
  alternatives_spanish:
  - a Jerahmeel
  - para Jerahmeel
  lexicon: convención de nombres propios
  rationale: El nombre propio se translitera. El prefijo ל queda absorbido en la construcción natural española «tuvo», evitando una preposición forzada que no aporta claridad.
- source_word: וּשְׁמָהּ
  english_pob_choice: and her name was
  chosen_spanish: y su nombre fue
  alternatives_spanish:
  - y se llamaba
  - y el nombre de ella fue
  lexicon: HALOT
  rationale: La fórmula nominal hebrea se reproduce de manera directa y clara en español. «Fue» mantiene el verbo copulativo sin volver la línea pesada.
- source_word: עֲטָרָה
  english_pob_choice: Atarah
  chosen_spanish: Atará
  alternatives_spanish:
  - Atara
  lexicon: convención de nombres propios
  rationale: Se translitera el nombre propio con acentuación española para facilitar la lectura, sin alterar la forma del nombre.
- source_word: הִיא
  english_pob_choice: she
  chosen_spanish: ella
  alternatives_spanish:
  - ella misma
  - esta
  lexicon: HALOT
  rationale: El pronombre independiente añade claridad o énfasis leve; en español basta «ella» para reflejarlo sin sobrerrepresentar el énfasis.
- source_word: אֵם
  english_pob_choice: mother
  chosen_spanish: la madre
  alternatives_spanish:
  - madre
  lexicon: HALOT
  rationale: Se mantiene el sustantivo común con artículo por naturalidad en español dentro de una afirmación identificadora.
- source_word: אוֹנָם
  english_pob_choice: Onam
  chosen_spanish: Onam
  alternatives_spanish:
  - Onán
  lexicon: convención de nombres propios
  rationale: Se conserva la transliteración del nombre propio tal como corresponde al texto base, sin armonizarlo con otras tradiciones de forma no sustentada por el pasaje.
