base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/028/009.yaml
  text: Will you still say[a], ‘I am a god,’ before the one who kills you? But you are a man, and not a god[c][b], in the hand of those who wound you.
  footnotes:
  - marker: a
    text: Or, “Will you indeed say” or “Will you really keep saying”; the Hebrew uses an infinitive absolute with the finite verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a man'; the contrast is between a human being and deity.
    reason: lexical_alternative
  - marker: c
    text: Or “those who defile you”; the Hebrew verb can carry the sense of profaning or desecrating, highlighting the humiliation of one who claimed to be divine.
    reason: lexical_alternative
