translation:
  language: es
  text: Entonces Jacob tuvo mucho miedo y se angustió, y dividió a la gente que estaba con él, y los rebaños, y el ganado, y los camellos, en dos campamentos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en dos compañías». El término hebreo puede referirse a un campamento o a una compañía organizada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּירָא
  english_pob_choice: was very afraid
  chosen_spanish: tuvo mucho miedo
  alternatives_spanish:
  - estuvo muy atemorizado
  - tuvo gran temor
  lexicon: HALOT
  rationale: ירא expresa temor real; en español, 'tuvo mucho miedo' comunica con naturalidad la intensidad del verbo, en concordancia con el intensificador siguiente.
- source_word: מְאֹד
  english_pob_choice: very
  chosen_spanish: mucho
  alternatives_spanish:
  - muy
  - en gran manera
  lexicon: HALOT
  rationale: מְאֹד intensifica el miedo de Jacob. 'Mucho' suena natural con 'miedo' en español y conserva la fuerza del adverbio sin arcaísmo.
- source_word: וַיֵּצֶר לוֹ
  english_pob_choice: and distressed
  chosen_spanish: y se angustió
  alternatives_spanish:
  - y estuvo angustiado
  - y fue afligido
  - y quedó oprimido
  lexicon: HALOT
  rationale: La locución idiomática comunica aflicción interior, no solo preocupación externa. 'Se angustió' preserva ese matiz y evita una paráfrasis demasiado libre.
- source_word: וַיַּחַץ
  english_pob_choice: he divided
  chosen_spanish: dividió
  alternatives_spanish:
  - partió
  - separó
  lexicon: HALOT
  rationale: חצה indica dividir deliberadamente; 'dividió' reproduce bien la acción táctica de Jacob y mantiene el paralelismo narrativo.
- source_word: הָעָם אֲשֶׁר אִתּוֹ
  english_pob_choice: the people who were with him
  chosen_spanish: al pueblo que estaba con él
  alternatives_spanish:
  - a la gente que iba con él
  - a la compañía que estaba con él
  lexicon: HALOT
  rationale: עָם aquí se refiere al grupo acompañante de Jacob. 'Pueblo' puede sonar más amplio, pero en contexto español bíblico funciona para el conjunto de personas; se mantiene el valor colectivo sin convertirlo en un sentido étnico.
- source_word: הַצֹּאן
  english_pob_choice: the flocks
  chosen_spanish: las ovejas
  alternatives_spanish:
  - los rebaños
  - el ganado menor
  lexicon: HALOT
  rationale: צֹאן es un colectivo de animales menores; en este versículo, para evitar una expresión demasiado general, se concretó como 'ovejas' en el flujo del inventario pastoril. Se reconoce, no obstante, que el término hebreo puede abarcar más que ovejas estrictamente.
- source_word: הַבָּקָר
  english_pob_choice: the herds
  chosen_spanish: las vacas
  alternatives_spanish:
  - el ganado
  - los rebaños de ganado
  lexicon: HALOT
  rationale: בָּקָר designa ganado vacuno. 'Vacas' es una solución clara y pública en español; aunque 'ganado' sería más amplio, aquí se busca distinguirlo de צֹאן en la enumeración.
- source_word: הַגְּמַלִּים
  english_pob_choice: the camels
  chosen_spanish: los camellos
  alternatives_spanish:
  - los dromedarios
  lexicon: HALOT
  rationale: גְּמַלִּים se traduce de manera directa como 'camellos', término estándar y transparente en español.
- source_word: לִשְׁנֵי מַחֲנוֹת
  english_pob_choice: into two camps
  chosen_spanish: en dos campamentos[a]
  alternatives_spanish:
  - en dos campamentos[a]
  - en dos compañías[a]
  - en dos grupos
  lexicon: HALOT
  rationale: מַחֲנוֹת puede significar 'campamentos' o 'compañías'. 'Campamentos' conserva el sentido concreto de asentamiento temporal y deja visible la alternativa semántica documentada por la POB inglesa. La nota explica la ambigüedad lexical.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y conserva la estructura narrativa repetitiva del original, en línea con la revisión inglesa que prefirió series coordinadas con ‘and’ para reflejar mejor la sintaxis fuente. También mantiene la ambigüedad lexical de מַחֲנוֹת mediante una nota, como en el audit trail inglés.
  spanish_consistency_notes:
  - 'Se preservó la progresión verbal narrativa con formas simples y directas: ''tuvo'', ''se angustió'', ''dividió''.'
  - Se evitó sustituir el valor colectivo de עָם por una generalización moderna que borrara el grupo acompañante de Jacob.
  - La enumeración de animales mantiene una distinción visible entre pequeños y grandes ganados, acorde con la estructura hebrea.
  - Se usó 'campamentos' en lugar de 'SEÑOR' u otra terminología no pertinente; no hay aquí nombres divinos ni tensiones doctrinales.
  - El marcador de nota [a] aparece únicamente en la frase afectada por la ambigüedad léxica del término final.
