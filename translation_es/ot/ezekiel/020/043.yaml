translation:
  language: es
  text: Allí recordarán sus caminos y todos sus hechos con los cuales se contaminaron[a], y se aborrecerán a sí mismos a su propia vista[b] por todas las maldades que han hecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sentirán repugnancia de sí mismos» / «se verán llenos de asco de sí mismos». El verbo hebreo expresa un fuerte autoaborrecimiento.
    reason: lexical_alternative
  - marker: b
    text: Literalmente «en sus caras»; el sentido es «a su propia vista» o «ante sus propios ojos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּזְכַרְתֶּם
  english_pob_choice: you will remember
  chosen_spanish: recordarán
  alternatives_spanish:
  - se acordarán
  - recordarán en su memoria
  lexicon: HALOT
  rationale: En este contexto profético futuro, זכר expresa recordar o traer a la memoria. «Recordarán» es natural en español y conserva el valor retrospectivo del pasaje sin añadir matices ajenos.
- source_word: שָׁם
  english_pob_choice: There
  chosen_spanish: Allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: El adverbio local remite al lugar de restauración del contexto inmediato. «Allí» es la forma más idiomática y clara en español.
- source_word: דַּרְכֵיכֶם
  english_pob_choice: your ways
  chosen_spanish: sus caminos
  alternatives_spanish:
  - su conducta
  - sus sendas
  lexicon: HALOT
  rationale: דֶּרֶךְ en contextos morales suele referirse al modo de vida. «Caminos» mantiene la metáfora hebrea y sigue siendo comprensible en español.
- source_word: עֲלִילוֹתֵיכֶם
  english_pob_choice: your deeds
  chosen_spanish: sus hechos
  alternatives_spanish:
  - sus obras
  - sus acciones
  lexicon: HALOT
  rationale: El sustantivo señala actos o obras concretas. «Hechos» conserva el sentido de acciones realizadas y combina bien con «caminos» sin borrar la distinción entre conducta y actos.
- source_word: אֲשֶׁר נִטְמֵאתֶם בָּם
  english_pob_choice: by which you defiled yourselves
  chosen_spanish: con los que se contaminaron
  alternatives_spanish:
  - por medio de los cuales se contaminaron
  - en los que se contaminaron
  lexicon: HALOT
  rationale: נִטְמֵאתֶם en nifal expresa contaminarse o quedar impuros. «Se contaminaron» refleja la pasiva/reflexiva moral del hebreo; «con los que» mantiene el vínculo instrumental con sus obras, aunque en español es más natural que «por los cuales» en este contexto.
- source_word: וּנְקֹטֹתֶם
  english_pob_choice: you will loathe
  chosen_spanish: se aborrecerán a sí mismos
  alternatives_spanish:
  - se detestarán
  - sentirán repugnancia de sí mismos
  lexicon: HALOT
  rationale: קוט expresa fuerte aborrecimiento o repulsión. «Aborrecerse a sí mismos» preserva la intensidad del verbo y el matiz de auto-rechazo indicado por el inglés POB, evitando suavizarlo a simple vergüenza.
- source_word: בִּפְנֵי כֶם
  english_pob_choice: in your own sight
  chosen_spanish: a su propia vista
  alternatives_spanish:
  - en su propia opinión
  - ante sus propios ojos
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «en/sobre sus caras», con sentido idiomático de autoevaluación o percepción propia. «A su propia vista» reproduce ese valor idiomático de manera natural en español.
- source_word: בְּכָל רָעוֹתֵיכֶם
  english_pob_choice: for all the evils
  chosen_spanish: por todas las maldades
  alternatives_spanish:
  - por todos los males
  - por todas sus malvadas acciones
  lexicon: HALOT
  rationale: רָעוֹת puede referirse a males, maldades o actos perversos. «Maldades» comunica bien el peso moral del sustantivo en este verso y encaja con el cierre explicativo siguiente.
- source_word: אֲשֶׁר עֲשִׂיתֶם
  english_pob_choice: that you have done
  chosen_spanish: que han hecho
  alternatives_spanish:
  - que hicieron
  - que han cometido
  lexicon: HALOT
  rationale: La cláusula relativa con עשה se vierte de forma simple y directa. El presente perfecto español mantiene el punto de vista retrospectivo del profeta sin forzar una lectura doctrinal adicional.
theological_decisions:
- issue: Intensidad del arrepentimiento expresado
  english_pob_reading: The verse describes repentance expressed as self-loathing over past sins, without importing a fuller doctrinal system beyond the text.
  chosen_spanish_reading: El verso describe un arrepentimiento expresado como aborrecimiento de sí mismos por pecados pasados, sin añadir categorías doctrinales ajenas al texto.
  alternative_spanish_readings:
  - El verso podría entenderse solo como vergüenza o pesar por el pasado.
  - El verso podría leerse como una simple reflexión moral sin autodesprecio intenso.
  rationale: El verbo hebreo transmite una repulsión fuerte, y el contexto de recordar caminos y hechos pecaminosos exige conservar esa intensidad. La traducción mantiene el peso moral del pasaje sin añadir formulaciones teológicas posteriores que el verso no explicita.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La base inglesa del POB se mantiene con alta concordancia; no hubo revisiones sustantivas en el pasaje auditado, y se conservan su estructura, énfasis moral y nota idiomática sobre «en sus caras» mediante una equivalencia española natural.
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto en el proyecto, pero este versículo no contiene el tetragrámaton.
  - Se prefirió «contaminaron» para נִטְמֵאתֶם, manteniendo la noción de impureza moral sin convertirla en un término ritual técnico innecesario.
  - «Aborrecerán a sí mismos» reproduce la fuerza de self-loathing del inglés POB y evita suavizarlo a mera vergüenza.
  - La pareja «caminos / hechos» conserva la distinción hebrea entre conducta habitual y actos concretos.
