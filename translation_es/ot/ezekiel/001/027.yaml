  language: en
  yaml_path: translation/ot/ezekiel/001/027.yaml
  text: And I saw something like the appearance of glowing metal[a], like the appearance of fire all around within it, from the appearance of his waist and upward; and from the appearance of his waist and downward I saw something like the appearance of fire[b], and brightness all around him.
