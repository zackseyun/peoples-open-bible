translation:
  language: es
  text: Los que edificaban en el muro, y los que llevaban cargas, se cargaban[a] de manera que, con una mano, cada uno hacía la obra, y con la otra sostenía su arma[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que llevaban cargas se cargaban»; el participio hebreo עֹמְשִׂים es raro y su matiz exacto es difícil, pero el sentido es que los obreros manejaban materiales mientras permanecían armados.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo הַשָּׁלַח puede referirse más específicamente a una lanza, dardo u otra arma.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבּוֹנִים
  english_pob_choice: the builders
  chosen_spanish: los albañiles
  alternatives_spanish:
  - los constructores
  - los que edificaban
  lexicon: HALOT
  rationale: El participio sustantivado designa a los que trabajaban en la construcción. En español, «albañiles» comunica de forma natural y concreta la función laboral sin perder el sentido de edificación.
- source_word: בַּחוֹמָה
  english_pob_choice: on the wall
  chosen_spanish: sobre el muro
  alternatives_spanish:
  - en el muro
  - junto al muro
  lexicon: HALOT
  rationale: Con la preposición ב, el contexto de trabajo físico sobre la estructura favorece «sobre el muro»; «muro» es más idiomático en español bíblico que una repetición de «pared» y mantiene la imagen constructiva.
- source_word: וְהַנֹּשְׂאִים בַּסֶּבֶל
  english_pob_choice: those who carried burdens
  chosen_spanish: los que llevaban cargas
  alternatives_spanish:
  - los que cargaban pesos
  - los porteadores
  lexicon: HALOT
  rationale: נשא con סבל alude a transportar materiales/pesos. «Llevaban cargas» conserva la concreción del trabajo y evita un término demasiado técnico o moderno.
- source_word: עֹמְשִׂים
  english_pob_choice: loaded themselves
  chosen_spanish: se cargaban
  alternatives_spanish:
  - iban cargados
  - eran cargados
  lexicon: HALOT
  rationale: El participio raro se entiende por el contexto como una condición de estar cargados o llevar materiales mientras trabajaban armados. «Se cargaban» mantiene la ambigüedad del hebreo y la relación con el peso de la labor, sin fijar innecesariamente un sujeto externo.
- source_word: בְּאַחַת יָדוֹ
  english_pob_choice: with one hand
  chosen_spanish: con una mano
  alternatives_spanish:
  - con una de sus manos
  - con una sola mano
  lexicon: HALOT
  rationale: 'El singular con sufijo es distributivo: cada trabajador tenía ocupada una mano. «Con una mano» es la forma natural en español y reproduce la distribución individual.'
- source_word: עֹשֶׂה בַמְּלָאכָה
  english_pob_choice: did the work
  chosen_spanish: hacía la obra
  alternatives_spanish:
  - trabajaba
  - hacía el trabajo
  lexicon: HALOT
  rationale: עָשָׂה + מְלָאכָה expresa ejecutar la labor. «Hacía la obra» conserva el sustantivo de actividad y el tono de construcción, evitando modernizar en exceso con «trabajo».
- source_word: וְאַחַת מַחֲזֶקֶת
  english_pob_choice: and with the other held
  chosen_spanish: y con la otra sostenía
  alternatives_spanish:
  - y la otra mantenía
  - mientras la otra sujetaba
  lexicon: HALOT
  rationale: La forma femenina singular del participio concuerda con la mano implícita. «Sostenía» expresa la acción continua y preparada de mantener el arma lista, de modo natural en español.
- source_word: הַשָּׁלַח
  english_pob_choice: his weapon
  chosen_spanish: su arma
  alternatives_spanish:
  - su lanza
  - su arma de combate
  - su arma arrojadiza
  lexicon: HALOT
  rationale: El término puede designar un arma o proyectil de forma general. «Arma» evita especificar indebidamente lanza o dardo y mantiene la amplitud semántica que el audit trail inglés preserva.
theological_decisions:
- issue: El matiz de preparación defensiva mientras se edifica
  english_pob_reading: the workers remained armed while doing construction work
  chosen_spanish_reading: los trabajadores seguían armados mientras hacían la obra
  alternative_spanish_readings:
  - los trabajadores tenían un arma en la mano mientras construían
  - los obreros trabajaban protegidos con armas
  rationale: El versículo no solo describe una escena laboral, sino una disposición vigilante en medio de amenaza. «Sostenía su arma» conserva esa tensión entre construcción y defensa sin añadir detalles no presentes en el hebreo.
  doctrine_reference: Nehemías 4:11; cf. Nehemías 4:17-18
- issue: El valor de עֹמְשִׂים como lectura incierta
  english_pob_reading: loaded themselves / those bearing loads were loaded
  chosen_spanish_reading: se cargaban
  alternative_spanish_readings:
  - iban cargados
  - los que llevaban cargas
  rationale: La rareza léxica exige no resolver con exceso de certeza. «Se cargaban» deja visible la dificultad textual/lexical y permite la idea de cargar materiales o ir encorvados bajo peso mientras trabajaban armados.
  doctrine_reference: Método de traducción con respeto a la ambigüedad léxica del hebreo
translation_notes:
  revision_awareness: Se tomó como base el texto hebreo masorético y el audit trail inglés existente, que ya resuelve la sintaxis distributiva y la ambigüedad de עֹמְשִׂים y הַשָּׁלַח. No se introdujeron cambios respecto de la valoración revisional más reciente; la redacción española conserva esas mismas decisiones semánticas con adaptación natural al español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque aquí no aparece el nombre divino.
  - Se prefirió «arma» como término amplio, coherente con la decisión inglesa de no especificar lanza o dardo.
  - Se evitó «siervo» y «Cristo» por no ser pertinentes en este texto.
  - «Muro» se usa por coherencia con el contexto de construcción, aunque en español también sería posible «muralla»; aquí «muro» sigue más de cerca la imagen del hebreo y del audit trail inglés.
