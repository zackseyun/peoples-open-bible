translation:
  language: es
  text: 'Pero su hermano y su madre dijeron[a]: «Que la joven se quede con nosotros unos días, o diez; después podrá irse».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «días, o diez». La frase probablemente significa «unos días, o diez días».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: But ... said
  chosen_spanish: Pero ... dijeron
  alternatives_spanish:
  - Y ... dijeron
  - Entonces ... dijeron
  lexicon: HALOT
  rationale: La waw narrativa introduce la secuencia del relato; en español, «pero» conserva además el contraste implícito con la insistencia previa del siervo, sin perder el avance narrativo. El plural se refleja por el sujeto compuesto «su hermano y su madre».
- source_word: אָחִיהָ וְאִמָּהּ
  english_pob_choice: her brother and her mother
  chosen_spanish: su hermano y su madre
  alternatives_spanish:
  - el hermano de ella y su madre
  - su hermano, y su madre
  lexicon: HALOT
  rationale: El hebreo usa singular con sufijo de 3ª femenina singular para «hermano» y «madre»; en español el posesivo «su» expresa naturalmente la relación referida a Rebeca sin necesidad de repetir «de ella».
- source_word: תֵּשֵׁב
  english_pob_choice: Let ... stay
  chosen_spanish: Que ... se quede
  alternatives_spanish:
  - Que ... permanezca
  - Que ... stay
  lexicon: HALOT
  rationale: En este contexto de postergar la salida, «quedarse» comunica con naturalidad el valor de permanecer/retenerse de ישב, mejor que un calco como «permanezca».
- source_word: הַנַּעֲרָ
  english_pob_choice: the young woman
  chosen_spanish: la joven
  alternatives_spanish:
  - la muchacha
  - la muchacha joven
  lexicon: HALOT
  rationale: נַעֲרָה designa a una joven; «la joven» es digno y natural en español contemporáneo, evitando «niña» o un arcaísmo como «doncella».
- source_word: יָמִים
  english_pob_choice: a few days
  chosen_spanish: unos días
  alternatives_spanish:
  - unos cuantos días
  - algunos días
  lexicon: HALOT
  rationale: Aunque literalmente es «días», en la expresión idiomática la referencia es a un lapso indefinido breve; «unos días» conserva esa vaguedad temporal sin sobredeterminarla.
- source_word: אוֹ עָשׂוֹר
  english_pob_choice: or ten
  chosen_spanish: o diez
  alternatives_spanish:
  - o diez días
  - o una decena
  lexicon: HALOT
  rationale: 'עָשׂוֹר significa «diez». Como «días» ya está implícito por el sintagma anterior, el español puede repetir solo el número: «o diez».'
- source_word: אַחַר
  english_pob_choice: after that
  chosen_spanish: después
  alternatives_spanish:
  - luego
  - más tarde
  lexicon: HALOT
  rationale: La partícula marca sucesión temporal; «después» expresa de manera directa y natural la relación de posterioridad.
- source_word: תֵּלֵךְ
  english_pob_choice: she may go
  chosen_spanish: se irá
  alternatives_spanish:
  - podrá irse
  - que se vaya
  lexicon: HALOT
  rationale: Aunque la morfología dada apunta formalmente a una forma verbal que en contexto debe entenderse por la joven, el sentido es de permiso/propuesta de salida posterior. «Se irá» recoge la futura acción permitida sin añadir una modalidad más fuerte que el hebreo no exige.
translation_notes:
  revision_awareness: Se siguió el estado revisado sin cambios del audit trail inglés, manteniendo su lectura idiomática de יָמִים / עָשׂוֹר y el valor discursivo de la waw narrativa, pero expresándolo en español con sintaxis natural y sin perder la ambigüedad temporal breve del hebreo.
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca en este versículo, sino como norma del proyecto; aquí no aplica.
  - Se prefirió «la joven» / «unos días» / «o diez» para mantener el paralelismo idiomático del hebreo.
  - El marcador [a] está anclado en «dijeron[a]» para señalar la nota sobre la expresión temporal.
