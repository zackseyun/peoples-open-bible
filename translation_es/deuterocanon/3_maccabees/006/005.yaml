translation:
  language: es
  text: Tú quebrantaste a Senaquerib, el gran rey[a] de los asirios, que se había envanecido por sus innumerables fuerzas, que ya había puesto toda la tierra bajo su mano[b] por la lanza, y que se había levantado contra tu santa ciudad, hablando cosas graves con jactancia e insolencia; tú, Soberano[c], haciendo manifiesto tu poder a muchas naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'duro' u 'opresivo' rey de los asirios; el adjetivo griego puede expresar peso, gravedad o carácter gravoso.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: ''ya había tomado toda la tierra bajo su mano por la lanza''.'
    reason: lexical_alternative
  - marker: c
    text: Aquí el griego usa despótēs, traducido como 'Soberano', no el más común kyrios ('Señor').
    reason: lexical_alternative
lexical_decisions:
- source_word: Σενναχηρεὶμ
  english_pob_choice: Sennacherib
  chosen_spanish: Senaquerib
  alternatives_spanish:
  - Sennáquerib
  lexicon: Nombre propio bíblico / uso histórico
  rationale: Se usa la forma española tradicional y ampliamente reconocible del nombre propio, manteniendo la referencia histórica sin alterar la identidad del personaje.
- source_word: βαρὺν
  english_pob_choice: mighty / oppressive / harsh (English audit note); final revision favored lexical accuracy in context
  chosen_spanish: grande
  alternatives_spanish:
  - poderoso
  - mighty
  - duro
  lexicon: LSJ
  rationale: Aquí βαρὺν califica al rey de Asiria en una frase de alta solemnidad. 'Grande' conserva el tono de peso/importancia sin forzar 'opresivo', que el repaso final del inglés descartó, ni introducir una valoración distinta.
- source_word: ἀναριθμήτοις δυνάμεσιν
  english_pob_choice: innumerable forces
  chosen_spanish: innumerables fuerzas
  alternatives_spanish:
  - fuerzas incontables
  - fuerzas sin número
  lexicon: LSJ
  rationale: '''Innumerables'' reproduce con naturalidad el sentido de ''más allá de contar'' y ''fuerzas'' conserva el matiz militar del contexto.'
- source_word: γαυρωθέντα
  english_pob_choice: had become arrogant
  chosen_spanish: se había envanecido
  alternatives_spanish:
  - se había vuelto arrogante
  - se había ensoberbecido
  lexicon: LSJ
  rationale: El participio expresa soberbia y altivez; 'envanecido' es natural en español bíblico moderno y conserva el matiz moral de orgullo.
- source_word: ὑποχείριον
  english_pob_choice: under his hand
  chosen_spanish: bajo su mano
  alternatives_spanish:
  - sometida a él
  - bajo su control
  lexicon: LSJ
  rationale: Se conserva la imagen idiomática 'bajo su mano', porque el texto griego la usa de forma concreta y el inglés auditado también la retiene.
- source_word: δόρατι
  english_pob_choice: by the spear
  chosen_spanish: por la espada
  alternatives_spanish:
  - por la lanza
  - con la lanza
  lexicon: LSJ
  rationale: Aunque δόρατι es literalmente 'lanza', el contexto de conquista militar permite una equivalencia española fluida con 'espada' como arma bélica general; sin embargo, esta opción atenúa la concreción del griego. Se mantiene aquí la fuerza marcial, pero la alternativa 'por la lanza' queda implícitamente preferible para mayor literalidad.
- source_word: μετεωρισθέντα ἐπὶ τὴν ἁγίαν σου πόλιν
  english_pob_choice: had exalted himself against your holy city
  chosen_spanish: se había levantado contra tu santa ciudad
  alternatives_spanish:
  - se había enaltecido contra tu santa ciudad
  - se había ensoberbecido contra tu santa ciudad
  lexicon: LSJ
  rationale: El verbo sugiere alzarse con arrogancia contra alguien; 'se había levantado contra' preserva tanto el movimiento hostil como el tono de presunción, sin sobrecargar con una paráfrasis.
- source_word: βαρέα λαλοῦντα
  english_pob_choice: speaking grievous things
  chosen_spanish: hablando cosas graves
  alternatives_spanish:
  - hablando palabras duras
  - pronunciando cosas pesadas
  lexicon: LSJ
  rationale: La expresión comunica lenguaje ofensivo o agraviante; 'cosas graves' mantiene la gravedad del habla sin especificar más de lo que el griego dice.
- source_word: κόμπῳ καὶ θράσει
  english_pob_choice: with boasting and insolence
  chosen_spanish: con jactancia e insolencia
  alternatives_spanish:
  - con alarde y audacia
  - con arrogancia y osadía
  lexicon: LSJ
  rationale: '''Jactancia e insolencia'' expresa bien el doble matiz de autoexaltación y descaro del original, y suena natural en registro bíblico contemporáneo.'
- source_word: ἔθραυσας
  english_pob_choice: shattered
  chosen_spanish: quebrantaste
  alternatives_spanish:
  - destruiste
  - rompiste
  lexicon: LSJ
  rationale: '''Quebrantaste'' comunica derrota violenta y decisiva en un castellano reverente, sin perder la imagen de ruptura fuerte que el verbo sugiere.'
- source_word: ἔκδηλον δεικνὺς
  english_pob_choice: making your power plain
  chosen_spanish: haciendo manifiesto
  alternatives_spanish:
  - dejando claramente ver
  - mostrando abiertamente
  lexicon: LSJ
  rationale: El participio expresa una manifestación pública y evidente. 'Haciendo manifiesto' es natural en español y conserva la idea de exhibición clara ante otros.
- source_word: τὸ σὸν κράτος
  english_pob_choice: your power / your might
  chosen_spanish: tu poder
  alternatives_spanish:
  - tu fuerza
  - tu dominio
  lexicon: LSJ
  rationale: '''Poder'' es la forma más directa y solemne para κράτος en este contexto de demostración divina ante las naciones.'
- source_word: δέσποτα
  english_pob_choice: Master
  chosen_spanish: Soberano
  alternatives_spanish:
  - Dueño
  - Señor
  lexicon: LSJ
  rationale: Se evita 'Señor' para no borrar la distinción lexical de δέσποτα frente a κύριος. 'Soberano' mantiene la reverencia y la idea de autoridad absoluta en español.
theological_decisions:
- issue: Tratamiento del título divino δέσποτα
  english_pob_reading: Master, not the more common Lord (kyrios)
  chosen_spanish_reading: Soberano
  alternative_spanish_readings:
  - Dueño
  - Señor
  rationale: El griego usa δέσποτα y el audit trail insiste en no neutralizar la diferencia con κύριος. 'Soberano' conserva la dignidad del vocativo y distingue el título sin recurrir al calco eclesiástico más cargado.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve lexical distinctions when documented by the source.'
- issue: Imagen militar de conquista en δόρατι
  english_pob_reading: by the spear
  chosen_spanish_reading: por la espada
  alternative_spanish_readings:
  - por la lanza
  - con la lanza
  rationale: La oración celebra la liberación divina frente a una conquista militar concreta. Aunque 'espada' funciona en español como arma general, el griego es más específico; por fidelidad auditable, la alternativa preferible en una revisión futura sería 'por la lanza'.
  doctrine_reference: 'DOCTRINE.md: original-language primacy over translation tradition.'
- issue: Referencia histórica a la humillación de Senaquerib
  english_pob_reading: Translate the allusion directly without importing details from 2 Kings/Isaiah
  chosen_spanish_reading: Mantener la alusión sin expandirla narrativamente
  alternative_spanish_readings:
  - Añadir detalles de Jerusalén o Nínive
  rationale: El texto solo alude a la derrota de Senaquerib como ejemplo del poder de Dios entre las naciones; no se deben importar elementos narrativos no presentes en este versículo.
  doctrine_reference: 'DOCTRINE.md: Never import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: 'La redacción sigue el último estado revisado del inglés auditado: ''mighty king of the Assyrians'', la construcción participial final ''making your power plain to many nations'', y la advertencia de no importar detalles narrativos ajenos al verso. Se corrigió el marcador de notas para que cada nota aparezca anclada en el texto español.'
  spanish_consistency_notes:
  - Se conserva 'Yahvé' solo cuando el texto lo requiera explícitamente; aquí el vocativo es 'Soberano' y no aparece el Tetragrámaton en la línea española.
  - Se mantiene el registro reverente pero no arcaizante.
  - Se evita 'Señor' para δέσποτα, siguiendo la distinción léxica documentada.
  - '''Haciendo manifiesto tu poder'' refleja la construcción participial sin volverla una afirmación narrativa añadida.'
