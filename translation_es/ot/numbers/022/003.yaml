  language: en
  yaml_path: translation/ot/numbers/022/003.yaml
  text: And Moab was very afraid because of the people[a], because they were numerous[b]; and Moab was filled with dread because of the sons of Israel.
  footnotes:
  - marker: a
    text: Or 'Moab loathed the sons of Israel' / 'Moab was disgusted because of the sons of Israel.' The Hebrew verb can express abhorrence, vexation, or sickened dread; here the context favors a fear-laden revulsion.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'sons of Israel'; traditionally 'children of Israel.'
    reason: lexical_alternative
