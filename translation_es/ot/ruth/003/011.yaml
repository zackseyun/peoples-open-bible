translation:
  language: es
  text: Y ahora, hija mía, no temas. Todo lo que digas, lo haré por ti, porque toda la puerta[a] de mi pueblo sabe que eres una mujer de noble carácter[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «todo mi pueblo en la puerta lo sabe». La «puerta» se refiere al lugar público de reconocimiento cívico y de procedimientos legales.'
    reason: cultural_note
  - marker: b
    text: 'O: «una mujer de valor», «una mujer excelente» o «una mujer virtuosa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּתִּי
  english_pob_choice: my daughter
  chosen_spanish: hija mía
  alternatives_spanish:
  - mi hija
  - mi niña
  lexicon: HALOT
  rationale: Conserva el valor afectivo y protector del vocativo sin hacerlo más literal de lo que permite el español natural. 'Hija mía' mantiene la cercanía del hebreo y suena digno en registro bíblico.
- source_word: אַל תִּירְאִי
  english_pob_choice: do not fear
  chosen_spanish: no temas
  alternatives_spanish:
  - no tengas miedo
  - no temas tú
  lexicon: HALOT
  rationale: La prohibición/ánimo queda bien en español con 'no temas', una fórmula breve y fiel al imperativo negativo hebreo.
- source_word: כֹּל אֲשֶׁר תֹּאמְרִי אֶעֱשֶׂה לָּךְ
  english_pob_choice: All that you say, I will do for you
  chosen_spanish: Todo lo que digas, lo haré por ti
  alternatives_spanish:
  - Todo cuanto digas, lo haré por ti
  - Todo lo que me digas, lo haré por ti
  - Todo lo que pidas, lo haré por ti
  lexicon: HALOT
  rationale: '''Decir'' conserva el verbo del hebreo sin estrecharlo a ''pedir''. ''Lo haré por ti'' expresa naturalmente el compromiso de Boaz en español; ''por ti'' refleja el dativo beneficiario sin sonar forzado.'
- source_word: שַׁעַר
  english_pob_choice: gate
  chosen_spanish: portón
  alternatives_spanish:
  - puerta
  - portal
  - puerta de la ciudad
  lexicon: HALOT
  rationale: '''Portón'' conserva el elemento físico y puede funcionar como metonimia del ámbito público/jurídico en español. Se eligió para evitar la repetición demasiado abstracta de ''la puerta'' y mantener la imagen concreta del hebreo.'
- source_word: כָּל שַׁעַר עַמִּי
  english_pob_choice: all the gate of my people
  chosen_spanish: todo el portón de mi pueblo
  alternatives_spanish:
  - todo mi pueblo en el portón
  - todos los de mi pueblo en el portón
  - todo mi pueblo
  lexicon: HALOT
  rationale: Se preserva la metonimia del hebreo sin interpretarla por completo. La construcción resulta algo marcada, pero auditable y cercana al texto; la nota explica la referencia comunitaria y jurídica.
- source_word: אֵשֶׁת חַיִל
  english_pob_choice: a woman of noble character
  chosen_spanish: una mujer de noble carácter
  alternatives_spanish:
  - una mujer virtuosa
  - una mujer de valor
  - una mujer excelente
  lexicon: HALOT
  rationale: '''Noble carácter'' comunica la idea de valor, capacidad e integridad moral sin reducir חַיִל a una sola cualidad ni cargar el texto con un matiz exclusivamente bélico. Mantiene la riqueza del elogio y es claro en español contemporáneo.'
theological_decisions:
- issue: Metonimia de 'la puerta/portón' como lugar público de reconocimiento y juicio
  english_pob_reading: all the gate of my people knows
  chosen_spanish_reading: todo el portón de mi pueblo sabe
  alternative_spanish_readings:
  - todo mi pueblo en el portón sabe
  - todos los de mi pueblo saben en la puerta
  - toda la comunidad de mi pueblo lo sabe
  rationale: Se conserva la imagen del 'portón' como lugar de deliberación pública y reconocimiento legal, en línea con el audit trail inglés. La formulación sigue siendo comprensible y permite anotar el sentido social sin borrar la metáfora.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Valor interpretativo de אֵשֶׁת חַיִל
  english_pob_reading: a woman of noble character
  chosen_spanish_reading: una mujer de noble carácter
  alternative_spanish_readings:
  - una mujer virtuosa
  - una mujer de valor
  - una mujer excelente
  rationale: La frase hebrea tiene una gama semántica amplia; el español elegido preserva esa amplitud y evita domesticarla a un solo matiz moral o heroico. No hay tensión doctrinal, pero sí una decisión lexical con peso interpretativo.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: La versión anterior en inglés fue revisada y quedó sin cambios; no hay correcciones aplicadas que afecten el español. La redacción española se ajusta al mismo estado estable del texto fuente y conserva la nota cultural sobre el 'gate' y la alternativa léxica para אֵשֶׁת חַיִל.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita 'Cristo/Mesías' porque no aparece en el versículo.
  - '''No temas'' respeta el hebreo y su tono exhortativo.'
  - '''Portón'' conserva la imagen espacial y jurídica del hebreo sin sustituirla por una interpretación explicativa en el texto principal.'
