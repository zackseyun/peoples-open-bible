id: JOS.10.37
reference: Joshua 10:37
source:
  edition: WLC
  text: וַ/יִּלְכְּד֣וּ/הָ וַ/יַּכּֽוּ/הָ לְ/פִי חֶ֠רֶב וְ/אֶת מַלְכָּ֨/הּ וְ/אֶת כָּל עָרֶ֜י/הָ וְ/אֶת כָּל הַ/נֶּ֤פֶשׁ אֲשֶׁר בָּ/הּ֙ לֹֽא הִשְׁאִ֣יר שָׂרִ֔יד כְּ/כֹ֥ל אֲשֶׁר עָשָׂ֖ה לְ/עֶגְל֑וֹן וַ/יַּחֲרֵ֣ם אוֹתָ֔/הּ וְ/אֶת כָּל הַ/נֶּ֖פֶשׁ אֲשֶׁר בָּֽ/הּ־־־־־־־־־־־־־׃ס
translation:
  text: And they captured it and struck it with the edge of the sword[a], along with its king, all its cities, and every person who was in it. He left no survivor, just as he had done to Eglon. He devoted it to destruction, along with every person who was in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'he utterly destroyed it'; Hebrew 'put it under ḥerem,' that is, devoted it to destruction.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלְכְּדוּהָ
  chosen: they captured it
  alternatives:
  - they took it
  lexicon: HALOT
  rationale: לכד commonly means to capture or seize a city. 'Captured' is natural modern English and preserves the military sense.
- source_word: וַיַּכּוּהָ
  chosen: struck it
  alternatives:
  - smote it
  - defeated it
  lexicon: HALOT
  rationale: נכה is broad ('strike, smite'). 'Struck it' keeps the concrete military action without archaic diction; 'defeated' would be too interpretive given the following sword phrase.
- source_word: לְפִי חֶרֶב
  chosen: with the edge of the sword
  alternatives:
  - by the sword
  - with the mouth of the sword
  lexicon: HALOT
  rationale: This idiom literally refers to the mouth/edge of the sword. 'With the edge of the sword' is a standard, transparent English equivalent that preserves the idiomatic force better than a flattened 'by the sword'.
- source_word: מַלְכָּהּ
  chosen: its king
  lexicon: HALOT
  rationale: Straightforward possessive rendering referring to the king of the city.
- source_word: כָּל עָרֶיהָ
  chosen: all its towns
  alternatives:
  - all its cities
  lexicon: HALOT
  rationale: עיר can mean city/town. Here the referent is the dependent settlements belonging to the captured royal city, so 'towns' reads more naturally in English while preserving the sense of subordinate urban centers.
- source_word: כָּל הַנֶּפֶשׁ אֲשֶׁר בָּהּ
  chosen: every person who was in it
  alternatives:
  - every soul who was in it
  - everyone who was in it
  lexicon: HALOT
  rationale: נפש here refers to persons/lives rather than the immaterial soul. 'Every person' is clear, accurate modern English and avoids misleading anthropological implications.
- source_word: לֹא הִשְׁאִיר שָׂרִיד
  chosen: He left no survivor
  alternatives:
  - he left no remnant
  - he left none remaining
  lexicon: HALOT
  rationale: The singular verb likely has Joshua as the subject in summary form. שָׂרִיד denotes a survivor/remnant. 'Left no survivor' is idiomatic and precise.
- source_word: כְּכֹל אֲשֶׁר עָשָׂה לְעֶגְלוֹן
  chosen: just as he had done to Eglon
  alternatives:
  - according to all that he did to Eglon
  lexicon: HALOT
  rationale: ככל אשר introduces comparison with the prior treatment of Eglon. English pluperfect fits the narrative reference back to an earlier action.
- source_word: וַיַּחֲרֵם
  chosen: He devoted it to destruction
  alternatives:
  - he utterly destroyed it
  - he put it under the ban
  lexicon: HALOT
  rationale: חרם in the Hiphil here denotes placing under ḥerem, that is, devoting to destruction. This rendering preserves the technical force better than simply 'utterly destroyed,' while remaining readable; 'put it under the ban' is less transparent to modern readers.
- source_word: וְאֶת כָּל הַנֶּפֶשׁ אֲשֶׁר בָּהּ
  chosen: along with every person who was in it
  alternatives:
  - and every person who was in it
  lexicon: HALOT
  rationale: The repeated phrase is rendered consistently. 'Along with' smooths the coordination in English while preserving the inclusion of all inhabitants in the ḥerem action.
