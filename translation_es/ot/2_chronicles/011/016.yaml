base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/011/016.yaml
  text: And after them[a], from all the tribes of Israel, those who set their hearts to seek Yahweh, the God of Israel, came to Jerusalem to sacrifice to Yahweh[b], the God of their fathers.
  footnotes:
