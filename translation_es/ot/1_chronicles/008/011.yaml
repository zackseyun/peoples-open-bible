translation:
  language: es
  text: Y por Husim[a] fue padre de Abitub y de Elpaal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de Husim». La preposición hebrea también puede traducirse más literalmente así, pero en una genealogía «por Husim» comunica mejor la paternidad a través de ella.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מֵ/חֻשִׁים
  english_pob_choice: And by Hushim
  chosen_spanish: Y por Husim
  alternatives_spanish:
  - Y de Husim
  - Y desde Husim
  lexicon: HALOT
  rationale: El hebreo con מִן puede expresar origen o relación. En una genealogía, el valor relacional se comunica con naturalidad en español mediante «por», que sugiere el vínculo de parentesco sin forzar una lectura espacial. Se conserva la conjunción inicial con «Y» para el flujo genealógico.
- source_word: הוֹלִיד
  english_pob_choice: he fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - engendró
  lexicon: HALOT
  rationale: En listas genealógicas, el hifil de ילד indica causar descendencia. «Engendró» preserva el sentido genealógico directo y es un término bíblico claro en español; «fue padre de» sería más explicativo pero menos compacto.
- source_word: אֲבִיטוּב
  english_pob_choice: Abitub
  chosen_spanish: Abitub
  alternatives_spanish:
  - Abituv
  lexicon: transliteración convencional
  rationale: Nombre propio transliterado siguiendo la forma ya usada en la tradición POB inglesa y en consonancia con la práctica de transliterar nombres, no traducirlos.
- source_word: אֶלְפָּעַל
  english_pob_choice: Elpaal
  chosen_spanish: Elpaal
  alternatives_spanish:
  - Elpa'al
  lexicon: transliteración convencional
  rationale: Nombre propio transliterado de manera legible en español. Se omite el apóstrofo por conveniencia tipográfica y porque no aporta diferenciación práctica en esta forma española.
theological_decisions:
- issue: Relación expresada por la preposición מִן en una genealogía
  english_pob_reading: Or 'from Hushim.' The Hebrew preposition can be rendered more literally this way, but in a genealogy 'by Hushim' better communicates parentage through her.
  chosen_spanish_reading: «por Husim» comunica la relación genealógica sin ocultar el matiz de procedencia.
  alternative_spanish_readings:
  - de Husim
  - desde Husim
  rationale: 'No hay una disputa doctrinal, pero sí una tensión lexical: la preposición puede ser literal («de/desde») o relacional. En este contexto genealógico, «por» preserva mejor la idea de mediación parental indicada por la nota inglesa, sin volverla ambigua para el lector español.'
  doctrine_reference: Genealogía bíblica; lectura léxico-contextual de מִן
translation_notes:
  revision_awareness: 'Se siguió el estado revisado final de la fuente inglesa: sin cambios adicionales respecto de la última pasada, con acuerdo alto entre revisores.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Los nombres propios se transliteran de manera estable y legible para lector hispanohablante.
  - Se evita la fórmula arcaica «engendró» solo cuando el contexto requiera mayor claridad; aquí se conserva por su precisión genealógica.
