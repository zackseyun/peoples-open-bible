translation:
  language: es
  text: Sin embargo, toda cosa dedicada[a] que un hombre dedique a Yahvé, de todo lo que le pertenece —sea humano o animal, o del campo de su heredad— no será vendida ni redimida. Toda cosa dedicada es santísima para Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo חֵרֶם (ḥérem), un término técnico para algo irrevocablemente apartado para Yahvé; en algunos contextos puede implicar estar bajo anatema o destinado a destrucción.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: However
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - Pero
  - No obstante
  lexicon: HALOT
  rationale: La partícula introduce una restricción o contraste con la regulación anterior; «Sin embargo» comunica bien ese giro sin endurecerlo innecesariamente.
- source_word: חֵרֶם / יַחֲרִם
  english_pob_choice: devoted thing / devotes
  chosen_spanish: cosa dedicada / dedique
  alternatives_spanish:
  - cosa entregada al anatema / consagre
  - cosa bajo prohibición / aparte
  lexicon: HALOT
  rationale: Conservo el valor técnico de חֵרֶם como algo irrevocablemente apartado para Yahvé. «Dedicada» preserva la consagración, mientras que el verbo «dedique» mantiene la forma verbal cognada sin introducir en el texto principal la idea de destrucción, aunque esa posibilidad queda indicada en la nota.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El hebreo usa singular masculino genérico en estilo legal. Mantengo «un hombre» para respetar el dicción del original y la política de precisión de género cuando el contexto legal lo presenta así.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - delante de Yahvé
  lexicon: HALOT
  rationale: 'Sigo el estándar del proyecto para el nombre divino YHWH: «Yahvé». La preposición «a» funciona naturalmente con el verbo de dedicación en español.'
- source_word: מִכָּל אֲשֶׁר לוֹ
  english_pob_choice: from all that belongs to him
  chosen_spanish: de todo lo que le pertenece
  alternatives_spanish:
  - de todo cuanto es suyo
  - de todo lo que tiene
  lexicon: HALOT
  rationale: Expresa con claridad el ámbito de procedencia de lo dedicado, conservando la amplitud posesiva del hebreo sin estrecharla a bienes solamente materiales.
- source_word: מֵאָדָם
  english_pob_choice: human
  chosen_spanish: humano
  alternatives_spanish:
  - persona
  - hombre
  lexicon: HALOT
  rationale: Sigo la revisión inglesa que optó por «human» para equilibrar mejor el paralelismo con «animal». En español, «humano» mantiene el valor genérico y evita confundirlo con el masculino legal de אִישׁ.
- source_word: וּבְהֵמָה
  english_pob_choice: animal
  chosen_spanish: animal
  alternatives_spanish:
  - bestia
  - ganado
  lexicon: HALOT
  rationale: El término es amplio; «animal» es la correspondencia más natural y general en español contemporáneo.
- source_word: וּמִשְּׂדֵה אֲחֻזָּתוֹ
  english_pob_choice: or from the field of his inherited property
  chosen_spanish: o del campo de su heredad
  alternatives_spanish:
  - o del campo de su posesión heredada
  - o de su campo hereditario
  lexicon: HALOT
  rationale: «Heredad» comunica bien el sentido legal de la porción heredada dentro del reparto del clan. Aunque el inglés explicita «inherited property», en español «heredad» resulta fiel y más idiomático en este contexto bíblico-jurídico.
- source_word: לֹא יִמָּכֵר
  english_pob_choice: shall not be sold
  chosen_spanish: no será vendida
  alternatives_spanish:
  - no podrá venderse
  - no se venderá
  lexicon: HALOT
  rationale: Conservo la prohibición legal en futuro pasivo, que suena natural en español jurídico-bíblico.
- source_word: וְלֹא יִגָּאֵל
  english_pob_choice: or redeemed
  chosen_spanish: ni redimida
  alternatives_spanish:
  - ni rescatada
  - ni comprada de nuevo
  lexicon: HALOT
  rationale: «Redimir» mantiene el término técnico de גאל dentro del marco legal-sacrificial del capítulo y enlaza con el campo semántico de la redención de bienes dedicados.
- source_word: קֹדֶשׁ קָדָשִׁים
  english_pob_choice: most holy
  chosen_spanish: santísima
  alternatives_spanish:
  - santa de santas
  - sumamente santa
  lexicon: HALOT
  rationale: La construcción superlativa se rinde de forma natural con «santísima». En español, esta forma comunica la intensidad máxima de santidad mejor que un calco literal.
- source_word: הוּא לַיהוָה
  english_pob_choice: to the LORD / belongs to the LORD
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - de Yahvé
  - pertenece a Yahvé
  lexicon: HALOT
  rationale: El hebreo concluye con una relación de pertenencia y consagración. «Para Yahvé» conserva bien la orientación cultual del enunciado sin sobrecargar la frase final.
theological_decisions:
- issue: Sentido de חֵרֶם en este contexto legal
  english_pob_reading: Rendered as an irrevocably devoted thing, while preserving the possible ban/destruction nuance in a note.
  chosen_spanish_reading: «Cosa dedicada» en el texto principal, con nota que preserva la posible idea de «anatema» o destino a destrucción.
  alternative_spanish_readings:
  - anatema
  - cosa bajo el anatema
  - cosa dedicada a la destrucción
  rationale: El versículo enfatiza la irrevocabilidad, la imposibilidad de venta o redención y su carácter santísimo. Por eso el texto principal prioriza la consagración total. A la vez, חֵרֶם puede implicar «anatema» o destrucción en otros contextos, y esa tensión se conserva en la nota.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Registro legal del masculino singular אִישׁ
  english_pob_reading: Retained 'a man' for אִישׁ.
  chosen_spanish_reading: Se mantiene «un hombre» para conservar el singular masculino legal.
  alternative_spanish_readings:
  - una persona
  - alguien
  rationale: El hebreo usa dicción jurídica masculina singular con alcance representativo. En español, neutralizarlo aquí perdería una señal formal importante del original.
  doctrine_reference: Translation philosophy §4
- issue: Relación final con Yahvé
  english_pob_reading: '''is most holy to the LORD'' communicates the sense naturally.'
  chosen_spanish_reading: «es santísima para Yahvé» comunica la consagración final sin borrar la relación de pertenencia.
  alternative_spanish_readings:
  - es santísima a Yahvé
  - pertenece santísimamente a Yahvé
  rationale: La cláusula final no sólo califica la cosa como santa, sino que la sitúa en relación exclusiva con Yahvé. «Para Yahvé» conserva ese vínculo de dedicación y pertenencia.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado revisado del inglés POB, que aclaró מֵאָדָם como «human» para equilibrar mejor el paralelismo con בְהֵמָה. En español, esa aclaración se reflejó con «humano», manteniendo además el masculino legal de אִישׁ. También se conservó la estructura legal de prohibición («no será vendida ni redimida») y el cierre superlativo («santísima»).
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - «Redimida» conserva el tecnicismo jurídico de גאל en el contexto levítico.
  - «Heredad» funciona como equivalente idiomático de אֲחֻזָּה en un marco de propiedad heredada.
  - La nota de חֵרֶם mantiene la tensión lexical entre dedicación irrevocable y posible anatema/destrucción.
  - Se preserva el singular masculino de «un hombre» porque corresponde a la forma del hebreo legal.
