translation:
  language: es
  text: Abátelos por la espada de los que te aman, y que todos los que conocen tu nombre te alaben con himnos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κατάβαλε
  english_pob_choice: Strike ... down
  chosen_spanish: Hiérelos
  alternatives_spanish:
  - Derríbalos
  - Átalos
  - Véncelos
  lexicon: LSJ
  rationale: El imperativo aoristo pide una acción decisiva en tono de súplica. En español, «hiérelos» conserva la fuerza de derrota violenta del contexto militar mejor que un calco más abstracto como «derríbalos».
- source_word: ῥομφαίᾳ
  english_pob_choice: by the sword
  chosen_spanish: con la espada
  alternatives_spanish:
  - por la espada
  - con una espada
  - mediante la espada
  lexicon: LSJ
  rationale: El dativo instrumental se vierte de forma natural en español con «con». «Espada» mantiene el sentido bélico sin forzar un calco preposicional menos idiomático.
- source_word: ἀγαπώντων σε
  english_pob_choice: of those who love you
  chosen_spanish: de los que te aman
  alternatives_spanish:
  - de los que te aman a ti
  - de tus amantes
  - de quienes te aman
  lexicon: LSJ
  rationale: «Los que te aman» preserva el participio presente y el matiz de lealtad afectiva/devocional. Se evita «amantes» por su posible ambigüedad en español contemporáneo.
- source_word: αἰνεσάτωσάν
  english_pob_choice: let ... praise
  chosen_spanish: te alaben
  alternatives_spanish:
  - te ensalcen
  - te alaben y celebren
  - te canten alabanzas
  lexicon: LSJ
  rationale: El valor exhortativo/jussivo se expresa naturalmente con «que ... te alaben». Se conserva el registro de culto sin ampliar innecesariamente el verbo griego.
- source_word: εἰδότες τὸ ὄνομά σου
  english_pob_choice: who know your name
  chosen_spanish: los que conocen tu nombre
  alternatives_spanish:
  - quienes saben tu nombre
  - los que han conocido tu nombre
  - los que reconocen tu nombre
  lexicon: LSJ
  rationale: «Conocen tu nombre» mantiene el sentido bíblico de reconocimiento relacional y reverente, no mera información. «Conocen» resulta más natural que un perfecto literal en español.
- source_word: ἐν ὕμνοις
  english_pob_choice: with hymns
  chosen_spanish: con himnos
  alternatives_spanish:
  - en himnos
  - con cánticos de alabanza
  - con salmos
  lexicon: LSJ
  rationale: «Con himnos» refleja el modo/acompañamiento de la alabanza y conserva el término culto de forma clara en español.
theological_decisions:
- issue: Destino del discurso de segunda persona
  english_pob_reading: Addressed to God throughout the verse
  chosen_spanish_reading: Dirigido a Dios en todo el versículo
  alternative_spanish_readings:
  - Dirigido al Señor
  - Dirigido a Yahvé explícitamente en el texto
  rationale: El contexto de oración y las referencias a «tu nombre» y «te aman» indican dirección a Dios. No se añade un título divino que el griego no expresa aquí; se mantiene la identificación implícita, como en el audit trail inglés.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; do not import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: El texto sigue la lectura revisada del audit trail inglés que prefiere una construcción instrumental natural («by the sword») sin perder el sentido del dativo griego; en español se refleja con «con la espada».
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y culto, apto para lectura pública.
  - Se evita «SEÑOR» como sustituto editorial del nombre divino porque este versículo no contiene יהוה en el texto griego recibido.
  - «Himnos» conserva la musicalidad litúrgica sin sobreinterpretar el género.
  - No se introducen notas al pie porque no hay una variante textual o lexical significativa que requiera anclaje explícito.
