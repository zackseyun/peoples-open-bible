translation:
  language: es
  text: Abías entró en batalla con un ejército de cuatrocientos mil hombres escogidos[a], guerreros valientes; y Jeroboam se dispuso para la batalla contra él con ochocientos mil hombres escogidos[b], hombres valientes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se trabó en batalla»; el hebreo usa un modismo militar literalmente cercano a «atar la batalla».'
    reason: lexical_alternative
  - marker: b
    text: La expresión hebrea equivale a una fórmula militar para combatientes capaces y valientes.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֶּאְסֹר
  english_pob_choice: joined battle
  chosen_spanish: se preparó para la batalla
  alternatives_spanish:
  - entró en batalla
  - se unió a la batalla
  - se trabó en batalla
  lexicon: HALOT
  rationale: El hebreo usa un modismo militar con el verbo 'atar/ceñir' más 'la batalla'. En español, 'se preparó para la batalla' conserva la idea de disposición militar sin forzar un calco como 'ató la batalla', que sería opaco.
- source_word: אֶת הַמִּלְחָמָה
  english_pob_choice: battle
  chosen_spanish: la batalla
  alternatives_spanish:
  - la guerra
  - el combate
  lexicon: HALOT
  rationale: En este contexto inmediato se trata de un enfrentamiento militar concreto, no de una guerra en sentido amplio. 'La batalla' es el equivalente natural y preciso.
- source_word: בְּחַיִל
  english_pob_choice: with an army
  chosen_spanish: con un ejército
  alternatives_spanish:
  - con una fuerza
  - con tropas
  lexicon: HALOT
  rationale: חַיִל puede significar fuerza, ejército o valor. Aquí precede a una cifra de tropas, por lo que 'ejército' expresa mejor el sentido militar del pasaje en español.
- source_word: גִּבּוֹרֵי מִלְחָמָה
  english_pob_choice: mighty warriors
  chosen_spanish: guerreros valientes
  alternatives_spanish:
  - guerreros poderosos
  - hombres de guerra valientes
  lexicon: HALOT
  rationale: La expresión describe combatientes probados. 'Guerreros valientes' comunica bien la fuerza y la función militar sin recurrir a un giro demasiado arcaico.
- source_word: אַרְבַּע מֵאוֹת אֶלֶף אִישׁ בָּחוּר
  english_pob_choice: four hundred thousand chosen men
  chosen_spanish: cuatrocientos mil hombres escogidos
  alternatives_spanish:
  - cuatrocientos mil hombres seleccionados
  - cuatrocientos mil hombres elegidos
  lexicon: HALOT
  rationale: בָּחוּר aquí indica tropas seleccionadas o de élite. 'Escogidos' mantiene esa idea de selección militar con buena naturalidad en español.
- source_word: עָרַךְ עִמּוֹ מִלְחָמָה
  english_pob_choice: drew up for battle against him
  chosen_spanish: se dispuso para la batalla contra él
  alternatives_spanish:
  - se alineó para la batalla contra él
  - ordenó sus tropas para la batalla contra él
  lexicon: HALOT
  rationale: עָרַךְ en contexto militar es 'disponer/ordenar' en formación de combate. La frase elegida mantiene el sentido táctico y la oposición contra Abías.
- source_word: בִּשְׁמוֹנֶה מֵאוֹת אֶלֶף אִישׁ
  english_pob_choice: with eight hundred thousand ... men
  chosen_spanish: con ochocientos mil hombres
  alternatives_spanish:
  - con ochocientos mil varones
  - con ochocientos mil hombres
  lexicon: HALOT
  rationale: La numeración se expresa de forma idiomática en español con 'hombres'. No hay necesidad de marcar una diferencia semántica adicional en este pasaje.
- source_word: גִּבּוֹר חָיִל
  english_pob_choice: mighty men of valor
  chosen_spanish: hombres valientes de guerra
  alternatives_spanish:
  - mighty warriors
  - hombres poderosos de valor
  lexicon: HALOT
  rationale: La expresión hebrea es un giro militar fijo que denota combatientes capaces y valerosos. 'Hombres valientes de guerra' conserva el valor marcial y evita suavizarlo demasiado; 'de guerra' refleja la relación nominal del hebreo.
theological_decisions:
- issue: Representación del tamaño de los ejércitos sin armonización interpretativa
  english_pob_reading: The verse simply reports the troop numbers and military quality terms.
  chosen_spanish_reading: El versículo simplemente reporta los números de tropas y los calificativos militares.
  alternative_spanish_readings:
  - Podría entenderse como cifras redondeadas o estilizadas.
  - Podría armonizarse con otros relatos históricos, pero aquí no se hace.
  rationale: No hay base en este versículo para corregir, suavizar o armonizar los números. La traducción conserva el dato tal como aparece en el texto fuente, sin introducir ajustes interpretativos.
  doctrine_reference: Principio de fidelidad textual y no armonización intratextual innecesaria.
translation_notes:
  revision_awareness: El contexto auditado en inglés presenta alta concordancia y no registra revisiones aplicadas; por ello, el borrador español sigue de cerca la decisión óptima-equivalente ya validada, sin introducir variantes textuales nuevas.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como término por defecto en este proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se mantiene «escogidos» para בָּחוּר en ambas apariciones por consistencia léxica.
  - Se traduce el modismo militar con vocabulario natural del español, evitando un calco demasiado literal de 'atar la batalla'.
  - Las cifras se conservan literalmente sin normalización ni redondeo.
