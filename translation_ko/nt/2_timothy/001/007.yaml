id: 2TI.1.7
reference: 2 Timothy 1:7
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οὐ γὰρ ἔδωκεν ἡμῖν ὁ θεὸς πνεῦμα δειλίας, ἀλλὰ δυνάμεως καὶ ἀγάπης καὶ σωφρονισμοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/001/007.yaml
  text: For God did not give us a spirit of cowardice, but of power and love and self-control.
translation:
  language: ko
  text: 하나님께서는 우리에게 비겁의 영을 주신 것이 아니라, 능력과 사랑과 절제[a]의 영을 주셨기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「건전한 분별」, 「자기 다스림」. 헬라어 σωφρονισμός는 정신의 건전함과 자기 절제를 함께 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: πνεῦμα δειλίας
  english_pob_choice: a spirit of cowardice
  chosen_korean: 비겁의 영
  alternatives_korean:
  - 두려움의 영
  - 소심함의 영
  lexicon: BDAG
  rationale: δειλία는 단순한 두려움(φόβος)이 아니라 「비겁·겁먹음」을 가리키며, 박해 앞에서 물러서는 태도를 함의한다. 「비겁」이 그 무게를 가장 잘 살린다.
- source_word: δυνάμεως
  english_pob_choice: of power
  chosen_korean: 능력의
  alternatives_korean:
  - 힘의
  lexicon: BDAG
  rationale: 신약 헬라어 δύναμις는 신적 능력을 포함하는 포괄적 「능력」을 가리키며, 한국 성서 전통의 「능력」이 가장 자연스럽다.
- source_word: σωφρονισμοῦ
  english_pob_choice: self-control
  chosen_korean: 절제
  alternatives_korean:
  - 건전한 분별
  - 자기 다스림
  - 신중함
  lexicon: BDAG
  rationale: σωφρονισμός는 자기 자신을 다스리는 건전한 정신을 가리킨다. 「절제」가 한국어로 가장 익숙하고 본문 흐름에 맞다.
