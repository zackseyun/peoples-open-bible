review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo y sigue de cerca el rastro auditado en inglés: «perdonaste» transmite adecuadamente el modismo נָשָׂאתָ עָוֹן; «iniquidad» mantiene la distinción con חטאתם; «cubriste» preserva la metáfora de כִּסִּיתָ; y «Selah» está bien transliterado. También conserva correctamente la opción colectiva «su pecado».'
  spanish_quality_summary: 'El texto principal es claro y natural en español eclesial moderno. Sin embargo, hay pequeños problemas de calidad en las notas: en [a], «Tú cargaste con» no corresponde exactamente a la formulación inglesa «You bore / carried away» y suena menos precisa que «cargaste» o «te llevaste»; además, «quitar la culpa» se aparta un poco de la imaginería de levantar/llevar. En [b], «todo sus pecados» es gramaticalmente incorrecto; debe ser «todos sus pecados».'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé/Mesías ni otros términos sensibles. «Iniquidad», «pecado» y «Selah» están alineados con las decisiones léxicas documentadas.
  issues:
  - severity: medium
    issue: 'Error gramatical en la nota [b]: «todo sus pecados»'
    rationale: En español, con sustantivo plural debe decirse «todos sus pecados». La forma actual es incorrecta y afecta la legibilidad y confiabilidad editorial.
  - severity: low
    issue: La nota [a] puede ajustarse mejor a la imaginería hebrea documentada
    rationale: El inglés auditado preserva «You bore» / «You carried away». En español, «llevaste» y «cargaste» son más directos y fieles que «cargaste con», y «levantar o llevarse la culpa» representa mejor la imagen que «quitar la culpa».
  revised_spanish_text: Tú perdonaste la iniquidad de tu pueblo[a]; cubriste todo su pecado[b]. Selah
  revised_footnotes:
  - marker: a
    text: 'O más literalmente: «Tú llevaste» o «Tú cargaste» la iniquidad de tu pueblo. El hebreo expresa el perdón mediante la imagen de levantar o llevarse la culpa.'
    reason: lexical_alternative
  - marker: b
    text: O «todos sus pecados». El hebreo emplea un sustantivo singular con sufijo plural, que puede rendirse de modo colectivo como «pecado» o de modo distributivo como «pecados».
    reason: alternative_reading
  revision_rationale: El texto principal puede mantenerse. Se corrigen solo las notas para reparar un error gramatical y alinear mejor la explicación con la imaginería hebrea y el audit trail inglés.
