lexical_decisions:
- source_word: תַּחַת
  english_pob_choice: Tahath
  chosen_spanish: Tahat
  alternatives_spanish:
  - Tahath
  lexicon: nombre propio (transliteración)
  rationale: Es un nombre propio en una genealogía; se translitera en lugar de traducirse. Se adapta a la ortografía española conservando la forma fuente del nombre.
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - su descendiente
  lexicon: HALOT
  rationale: En listas genealógicas, בֵּן normalmente mantiene su sentido básico de parentesco. 'Su hijo' reproduce la fórmula sin ampliar innecesariamente a 'descendiente'.
- source_word: אוּרִיאֵל
  english_pob_choice: Uriel
  chosen_spanish: Uriel
  lexicon: nombre propio (transliteración)
  rationale: Nombre propio; la forma española estándar coincide con la transliteración directa.
- source_word: עֻזִּיָּה
  english_pob_choice: Uzziah
  chosen_spanish: Uzías
  alternatives_spanish:
  - Uzzías
  lexicon: nombre propio (transliteración)
  rationale: Se conserva el nombre propio con una forma española natural y reconocible. 'Uzías' refleja bien la base hebrea y es más manejable en español; se mantiene la posibilidad de la forma con doble z en nota.
- source_word: וְשָׁאוּל
  english_pob_choice: and Shaul
  chosen_spanish: y Saúl
  alternatives_spanish:
  - y Shaul
  lexicon: nombre propio (transliteración)
  rationale: El hebreo שָׁאוּל puede transliterarse como 'Shaul', pero en español el nombre bíblico está ampliamente asentado como 'Saúl'. Se adopta la forma tradicional española por inteligibilidad, sin perder la referencia al nombre hebreo.
