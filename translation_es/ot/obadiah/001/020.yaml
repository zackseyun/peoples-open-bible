translation:
  language: es
  text: Y los exiliados[a] de este ejército de los hijos de Israel, que están entre los cananeos hasta Zarefat, y los exiliados de Jerusalén que están en Sefarad[b], poseerán las ciudades del Neguev.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esta hueste»; el término hebreo es difícil y también se ha entendido de otras maneras, incluso como «riqueza» o con sentidos semejantes.
    reason: lexical_alternative
  - marker: b
    text: Sefarad es un nombre de lugar incierto; algunos lo identifican con España, pero aquí se conserva el nombre hebreo.
    reason: cultural_note
lexical_decisions:
- source_word: גָּלוּת
  english_pob_choice: exiles
  chosen_spanish: exiliados
  alternatives_spanish:
  - desterrados
  - cautivos
  - exilio
  lexicon: HALOT
  rationale: 'El sustantivo puede referirse al estado de destierro o a las personas que están en él. En esta frase, como son grupos que luego "poseerán" ciudades, conviene la lectura personal: "exiliados".'
- source_word: הַחֵל
  english_pob_choice: army
  chosen_spanish: ejército
  alternatives_spanish:
  - hueste
  - tropa
  - fuerza
  - riqueza
  lexicon: HALOT
  rationale: La palabra es difícil y debatida. El audit trail inglés decidió una lectura militar más directa. En español, "ejército" transmite mejor esa opción que "hueste", sin perder el matiz colectivo.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: of the sons of Israel
  chosen_spanish: de los hijos de Israel
  alternatives_spanish:
  - de los israelitas
  - del pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión covenantal y genealógica del hebreo. "Hijos de Israel" es fiel y plenamente inteligible en español bíblico contemporáneo.
- source_word: כְּנַעֲנִים עַד צָרְפַת
  english_pob_choice: who are among the Canaanites as far as Zarephath
  chosen_spanish: que están entre los cananeos hasta Sarepta
  alternatives_spanish:
  - que están en Canaán hasta Sarepta
  - que están entre los cananeos en Sarepta
  lexicon: HALOT
  rationale: La sintaxis es compacta y difícil. "Entre los cananeos" sigue la solución auditada en inglés y evita forzar una reconstrucción especulativa; "hasta Sarepta" mantiene el límite geográfico.
- source_word: צָרְפַת
  english_pob_choice: Zarephath
  chosen_spanish: Sarepta
  alternatives_spanish:
  - Zarepta
  lexicon: HALOT
  rationale: Como topónimo, se translitera con la forma española más establecida. "Sarepta" es más reconocible en español bíblico que "Zarepta".
- source_word: סְפָרַד
  english_pob_choice: Sepharad
  chosen_spanish: Sefarad
  alternatives_spanish:
  - España
  lexicon: HALOT
  rationale: El lugar es incierto; se conserva el nombre hebreo transliterado. "Sefarad" respeta la cautela del texto y evita identificarlo de manera especulativa.
- source_word: יִרְשׁוּ
  english_pob_choice: will possess
  chosen_spanish: poseerán
  alternatives_spanish:
  - heredarán
  - tomarán posesión de
  lexicon: HALOT
  rationale: En contexto territorial, "poseerán" expresa la toma efectiva de posesión sin añadir interpretaciones innecesarias; mantiene también la fuerza de herencia implícita.
- source_word: עָרֵי הַנֶּגֶב
  english_pob_choice: the cities of the Negev
  chosen_spanish: las ciudades del Neguev
  alternatives_spanish:
  - las ciudades del Negev
  - las ciudades de la región del Neguev
  - las ciudades del sur
  lexicon: HALOT
  rationale: Se conserva Negev como topónimo regional. En español bíblico, "Neguev" es una forma tradicional y clara; no se generaliza a "sur" porque el contexto favorece el nombre de la región.
theological_decisions:
- issue: Renderización de הַחֵל הַזֶּה sin borrar la ambigüedad documentada
  english_pob_reading: this army
  chosen_spanish_reading: este ejército
  alternative_spanish_readings:
  - esta hueste
  - esta fuerza
  - esta riqueza
  rationale: El texto hebreo es léxicamente difícil y admite varias lecturas. Se sigue la decisión revisada del audit trail inglés, pero se preserva en nota la tensión interpretativa para no ocultar la ambigüedad del término.
  doctrine_reference: Translation philosophy §3, §5
- issue: Tratamiento de Sefarad como topónimo incierto
  english_pob_reading: Sepharad is an uncertain place name; some identify it with Spain, but the Hebrew name is retained here.
  chosen_spanish_reading: Sefarad se conserva como nombre propio incierto
  alternative_spanish_readings:
  - España
  - territorio no identificado
  rationale: No hay base suficiente para convertir el topónimo en una identificación histórica segura. Mantener el nombre transliterado respeta el alcance del hebreo y la cautela teológica/textual del POB.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de 'host' a 'army' en la revisión más reciente para una traducción más directa de חיל, manteniendo la dificultad léxica del término. La presente versión española sigue esa decisión revisada y conserva las notas de ambigüedad y del topónimo incierto.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa 'hijos de Israel' de manera uniforme con la convención del proyecto para expresiones de linaje/covenio.
  - Se transliteran los topónimos bíblicos con formas españolas reconocibles y auditables.
  - Se evita 'SEÑOR' porque no corresponde al texto hebreo de este versículo.
