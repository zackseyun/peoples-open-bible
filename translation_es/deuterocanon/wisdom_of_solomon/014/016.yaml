  glossary_alignment: No hay conflictos con la terminología base del proyecto. Se preserva «tiranos» para τυράννων y se evita el interpretativo «ídolos». La mejora propuesta mantiene la prioridad del original y el énfasis material de τὰ γλυπτά mediante «imágenes talladas».
