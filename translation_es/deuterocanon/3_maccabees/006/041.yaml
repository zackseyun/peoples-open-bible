translation:
  language: es
  text: 'Y cuando el rey estuvo de acuerdo con ellos, les escribió la siguiente[a] carta a los generales de cada ciudad[b], presentando magnánimamente la exposición completa:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «la carta escrita abajo» o «la carta adjunta».
    reason: lexical_alternative
  - marker: b
    text: El griego στρατηγοί también puede traducirse «comandantes» o, en algunos contextos administrativos, «gobernadores»; aquí «generales» encaja mejor con el entorno militar-administrativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: συναινέσας
  english_pob_choice: agreed with
  chosen_spanish: estuvo de acuerdo con
  alternatives_spanish:
  - consintió con
  - estuvo conforme con
  lexicon: LSJ
  rationale: El participio aoristo expresa asentimiento o aprobación. «Estuvo de acuerdo con» es natural en español y conserva la idea de consentimiento a la propuesta mencionada.
- source_word: ὁ βασιλεύς
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: LSJ
  rationale: Título directo y estándar, sin necesidad de expansión.
- source_word: ἔγραψεν αὐτοῖς
  english_pob_choice: he wrote them
  chosen_spanish: les escribió
  alternatives_spanish:
  - escribió a ellos
  lexicon: LSJ
  rationale: El dativo permite «les escribió» en español, una formulación idiomática y concisa que mantiene el sentido epistolar.
- source_word: τὴν ὑπογεγραμμένην ἐπιστολήν
  english_pob_choice: the following letter
  chosen_spanish: la siguiente carta
  alternatives_spanish:
  - la carta escrita abajo
  - la carta subyacente
  lexicon: LSJ
  rationale: ὑπογεγραμμένην significa literalmente «escrita abajo» o «subscrita». En contexto narrativo, «la siguiente carta» comunica mejor la función introductoria sin forzar el español.
- source_word: πρὸς τοὺς κατὰ πόλιν στρατηγούς
  english_pob_choice: to the generals in each city
  chosen_spanish: a los generales de cada ciudad
  alternatives_spanish:
  - a los comandantes de cada ciudad
  - a los generales ciudad por ciudad
  lexicon: LSJ
  rationale: στρατηγοί se rinde aquí como «generales», siguiendo el valor militar-administrativo. κατὰ πόλιν se expresa de forma distributiva natural como «de cada ciudad».
- source_word: μεγαλοψύχως
  english_pob_choice: magnanimously
  chosen_spanish: con magnanimidad
  alternatives_spanish:
  - con nobleza de ánimo
  - generosamente
  lexicon: LSJ
  rationale: El adverbio transmite grandeza de ánimo, nobleza o generosidad. «Con magnanimidad» conserva el tono elevado del decreto y es claro en español.
- source_word: τὴν ἐκτενῆ ἔχουσαν
  english_pob_choice: setting out the full account
  chosen_spanish: exponiendo el relato completo
  alternatives_spanish:
  - conteniendo la exposición detallada
  - con el contenido extenso
  lexicon: LSJ
  rationale: La frase griega es comprimida y describe a la carta por su contenido extenso o detallado. «Exponiendo el relato completo» refleja la plenitud del contenido sin volverlo rígido o oscuro en español.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje muestra alta concordancia con la fuente griega y solo requiere resolver matices léxicos en español.
  spanish_consistency_notes:
  - Se mantiene «rey» como título simple y «generales» para στρατηγοί, en continuidad con el registro militar-administrativo del pasaje.
  - Se evita una traducción demasiado literal de ὑπογεγραμμένην para preservar naturalidad en español sin perder la nota textual alternativa.
  - «Con magnanimidad» conserva el tono solemne del adverbio μεγαλοψύχως sin sustituirlo por un matiz meramente sentimental.
