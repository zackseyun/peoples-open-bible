  - Se usa 'gloria' para δόξα en sentido doxológico, coherente con el uso bíblico y el audit trail inglés.
  - Se opta por 'por los siglos de los siglos' como equivalente idiomático de εἰς τοὺς αἰῶνας τῶν αἰώνων.
