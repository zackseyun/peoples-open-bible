translation:
  language: es
  text: 'Entonces le envió un capitán de cincuenta con sus cincuenta hombres. Este subió hacia él, y he aquí, él estaba sentado en la cima del monte[a]. Le habló: «Hombre de Dios, el rey dice[b]: “Baja”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la cima del cerro». El hebreo הַר puede referirse a un cerro o a un monte, según el contexto.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente, «el rey ha hablado: “Baja”». La fórmula hebrea del mensajero usa «ha hablado», que aquí se vierte de modo más idiomático como «dice».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: Then he sent
  chosen_spanish: Entonces envió
  alternatives_spanish:
  - Y envió
  - Luego envió
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración; «entonces» conserva la secuencia narrativa sin sonar forzado en español.
- source_word: שַׂר חֲמִשִּׁים
  english_pob_choice: a captain of fifty
  chosen_spanish: un capitán de cincuenta
  alternatives_spanish:
  - un comandante de cincuenta
  - un oficial sobre cincuenta
  lexicon: HALOT
  rationale: La expresión nombra un oficial militar a cargo de una unidad de cincuenta. «Capitán de cincuenta» mantiene esa fuerza militar de forma natural en español.
- source_word: וַחֲמִשָּׁיו
  english_pob_choice: with his fifty men
  chosen_spanish: con sus cincuenta
  alternatives_spanish:
  - con sus cincuenta hombres
  - y sus cincuenta
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus cincuenta»; en español puede omitirse «hombres» porque el rango militar ya está explícito en el contexto inmediato. Se conserva así la brevedad del original sin perder sentido.
- source_word: וַיַּעַל אֵלָיו
  english_pob_choice: He went up to him
  chosen_spanish: Él subió a donde estaba él
  alternatives_spanish:
  - Él fue hacia él, subiendo
  - Subió hasta él
  lexicon: HALOT
  rationale: «Subió» preserva el matiz vertical de עלה; «a donde estaba él» hace explícito en español el destino implícito por el contexto narrativo.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y resulta que
  lexicon: HALOT
  rationale: «He aquí» conserva la fuerza deíctica y la vividez del hebreo, con un registro bíblico comprensible.
- source_word: יֹשֵׁב
  english_pob_choice: he was sitting
  chosen_spanish: estaba sentado
  alternatives_spanish:
  - se hallaba sentado
  - estaba sentado allí
  lexicon: HALOT
  rationale: El participio describe estado/postura en curso; «estaba sentado» es la forma más natural en español y mantiene el valor aspectual.
- source_word: עַל רֹאשׁ הָהָר
  english_pob_choice: on the top of the hill
  chosen_spanish: en la cima del monte
  alternatives_spanish:
  - sobre la cima del monte
  - en la cima del monte/cerro
  lexicon: HALOT
  rationale: «Cabeza»/«top» se traduce por «cima»; para הַר el español admite «monte» de manera amplia y digna, sin obligar a decidir entre cerro y montaña más de lo que exige el texto.
- source_word: וַיְדַבֵּר אֵלָיו
  english_pob_choice: He spoke to him
  chosen_spanish: Le habló
  alternatives_spanish:
  - Le dijo
  - Y le habló
  lexicon: HALOT
  rationale: El verbo דבר se refleja con «habló», que preserva el matiz de hablar/speak mejor que un simple «dijo».
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: Man of God
  chosen_spanish: Hombre de Dios
  alternatives_spanish:
  - Varón de Dios
  - Hombre de Dios, profeta
  lexicon: HALOT
  rationale: Se conserva el título profético tradicional y reconocible, sin sustituirlo por una glosa interpretativa.
- source_word: הַמֶּלֶךְ דִּבֶּר
  english_pob_choice: the king says
  chosen_spanish: el rey ha hablado
  alternatives_spanish:
  - el rey dice
  - el rey habló
  lexicon: HALOT
  rationale: El hebreo usa una fórmula mensajera con «ha hablado»; se conserva el perfecto para no borrar la forma literal documentada por la POB, aunque en español idiomático también pueda sonar como una orden implícita.
- source_word: רֵדָה
  english_pob_choice: Come down
  chosen_spanish: Desciende
  alternatives_spanish:
  - Baja
  - Ven abajo
  lexicon: HALOT
  rationale: El imperativo de ירד se expresa con «desciende», que mantiene con dignidad el sentido direccional y vertical del mandato.
theological_decisions:
- issue: Tratamiento de la fórmula real «el rey ha hablado» frente a una lectura más interpretativa como mandato
  english_pob_reading: 'The king says / literally, ''the king has spoken: “Come down.”'''
  chosen_spanish_reading: el rey ha hablado
  alternative_spanish_readings:
  - el rey dice
  - el rey manda
  rationale: Se preserva la forma verbal documentada por el hebreo y auditada por la POB. «Manda» introduciría una interpretación no expresada por el verbo; «dice» es más idiomático, pero aquí se prioriza la trazabilidad formal.
  doctrine_reference: Principio de fidelidad textual y transparencia traductora; no doctrinal
- issue: Elección entre «monte», «montaña» o «cerro» para הַר en este contexto narrativo
  english_pob_reading: hill / mountain depending on context
  chosen_spanish_reading: monte
  alternative_spanish_readings:
  - cerro
  - montaña
  rationale: El hebreo admite una gama semántica según el contexto. «Monte» funciona como equivalente amplio y solemne en español, sin cerrar indebidamente la referencia topográfica.
  doctrine_reference: Principio de equivalencia semántica contextual; no doctrinal
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del texto hebreo y del audit trail inglés de la POB. Se mantuvieron las decisiones de secuencia narrativa, el título militar, la fórmula mensajera y el imperativo direccional, ajustando solo la naturalidad del español sin borrar las tensiones léxicas documentadas.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del proyecto solo cuando aparezca el tetragrámaton; en este versículo no aparece.
  - «Hombre de Dios» se conserva como título profético fijo.
  - «Desciende» mantiene la direccionalidad vertical del hebreo; «baja» quedaría como alternativa menos solemne.
  - Se evitó añadir «hombres» en «sus cincuenta» porque el contexto militar ya lo hace explícito.
