translation:
  language: es
  text: En aquel día el retoño de Yahvé será para belleza y para gloria[a], y el fruto de la tierra para majestad y para esplendor, para los sobrevivientes de Israel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el crecimiento de Yahvé» o «lo que Yahvé hace brotar». El hebreo puede evocar tanto la fertilidad renovada de la tierra como la imagen profética posterior del «Renuevo» de Yahvé.
    reason: alternative_reading
  - marker: b
    text: O «el remanente de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: In that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - Aquel día
  lexicon: HALOT
  rationale: La expresión es un modismo profético temporal. «En aquel día» suena natural en español bíblico contemporáneo y conserva el sentido escatológico/propético sin precisar más de lo que el hebreo indica.
- source_word: צֶמַח יְהוָה
  english_pob_choice: the branch of Yahweh
  chosen_spanish: un retoño de Yahvé
  alternatives_spanish:
  - un vástago de Yahvé
  - un brote de Yahvé
  - la rama de Yahvé
  lexicon: HALOT
  rationale: צֶמַח puede referirse a brote, retoño, crecimiento o rama. «Retoño» mantiene la imagen vegetal concreta y deja abierta la resonancia profética/mesiánica posterior. Se conserva Yahvé para el nombre divino, según la pauta del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el término doctrinal del proyecto para el nombre divino, en lugar de ocultarlo con una convención tipográfica.
- source_word: לִצְבִי
  english_pob_choice: for beauty
  chosen_spanish: para hermosura
  alternatives_spanish:
  - para belleza
  - para adorno
  - para gloria
  lexicon: HALOT
  rationale: צְבִי puede significar belleza, hermosura o atractivo. «Hermosura» conserva el registro elevado y evita una redundancia excesiva con «gloria».
- source_word: וּלְכָבוֹד
  english_pob_choice: and for glory
  chosen_spanish: y para gloria
  alternatives_spanish:
  - y para honor
  lexicon: HALOT
  rationale: כָבוֹד suele denotar gloria, honor o peso. «Gloria» es la correspondencia más directa y solemne en español, y encaja con el paralelismo poético.
- source_word: וּפְרִי הָאָרֶץ
  english_pob_choice: and the fruit of the land
  chosen_spanish: el fruto de la tierra
  alternatives_spanish:
  - el fruto del país
  - el producto de la tierra
  lexicon: HALOT
  rationale: Se traduce de forma directa y natural. «Tierra» mantiene la fuerza agrícola del hebreo y no fuerza una paráfrasis interpretativa.
- source_word: לְגָאוֹן
  english_pob_choice: for majesty
  chosen_spanish: para majestad
  alternatives_spanish:
  - para orgullo
  - para exaltación
  - para grandeza
  lexicon: HALOT
  rationale: En este contexto, גָאוֹן tiene sentido positivo. «Majestad» preserva la elevación del término sin confundirlo con el uso negativo de «orgullo».
- source_word: וּלְתִפְאֶרֶת
  english_pob_choice: and for splendor
  chosen_spanish: y para esplendor
  alternatives_spanish:
  - y para hermosura
  - y para gloria
  - y para belleza
  lexicon: HALOT
  rationale: תִפְאֶרֶת admite belleza, gloria, esplendor o adorno. «Esplendor» evita repetir «hermosura» y conserva el valor poético de la serie.
- source_word: לִפְלֵיטַת יִשְׂרָאֵל
  english_pob_choice: for the survivors of Israel
  chosen_spanish: para los sobrevivientes de Israel
  alternatives_spanish:
  - para el remanente de Israel
  - para los escapados de Israel
  lexicon: HALOT
  rationale: פְלֵיטָה alude a los que han escapado o sobrevivido. «Sobrevivientes» comunica con claridad el sentido básico en español moderno, sin borrar la idea teológica de remanente; esa alternativa se conserva en nota.
theological_decisions:
- issue: Cómo conservar la posible resonancia mesiánica de צֶמַח יְהוָה sin resolverla en una sola lectura
  english_pob_reading: the branch of Yahweh
  chosen_spanish_reading: un retoño de Yahvé
  alternative_spanish_readings:
  - el retoño de Yahvé
  - lo que Yahvé hace brotar
  - la rama de Yahvé
  rationale: La imagen vegetal concreta deja abierta tanto la restauración fértil de la tierra como la resonancia posterior con el motivo profético del «Renuevo». Se evita capitalizar o explicitar una identificación mesiánica que el texto aquí no obliga a cerrar.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla.'
- issue: Si לִפְלֵיטַת יִשְׂרָאֵל debe verterse con lenguaje tradicional de «remanente»
  english_pob_reading: for the survivors of Israel
  chosen_spanish_reading: para los sobrevivientes de Israel
  alternative_spanish_readings:
  - para el remanente de Israel
  rationale: El hebreo habla de los que han quedado con vida/han escapado. «Sobrevivientes» es más transparente para el lector actual y mantiene implícita la idea de un grupo preservado en juicio; «remanente» queda como alternativa teológicamente significativa.
  doctrine_reference: 'Translation philosophy §6: español moderno legible sin perder la carga bíblica.'
translation_notes:
  revision_awareness: No se detectaron revisiones posteriores que alteren el sentido base; la versión inglesa auditada permanece sin cambios y presenta alta concordancia con el hebreo masorético.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino, conforme al estándar del proyecto.
  - Se prefirió un español bíblico moderno y sobrio, evitando calcos innecesarios pero conservando las imágenes agrícolas y de honor del hebreo.
  - Se preservó la tensión entre lectura vegetal y posible resonancia mesiánica de צֶמַח sin resolverla en el texto principal.
