translation:
  language: es
  text: Ahora bien, cuando todos los jefes de las tropas que estaban en el campo[a], ellos y sus hombres, oyeron que el rey de Babilonia había nombrado a Guedalías hijo de Ahicam sobre el país, y que había confiado a su cuidado a hombres, mujeres, niños y a algunos de los más pobres de la tierra, de entre los que no habían sido deportados a Babilonia[b][c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el campo abierto» para «en el campo».
    reason: lexical_alternative
  - marker: b
    text: O «que no habían sido exiliados a Babilonia».
    reason: lexical_alternative
  - marker: c
    text: O «los humildes / pobres de la tierra» para «algunos de los más pobres de la tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֵי הַחֲיָלִים
  english_pob_choice: the commanders of the forces
  chosen_spanish: los jefes de las tropas
  alternatives_spanish:
  - los comandantes de las fuerzas
  - los oficiales de las tropas
  lexicon: HALOT
  rationale: שָׂרִים señala líderes o jefes, y חֲיָלִים aquí se refiere a tropas o fuerzas militares. «Jefes de las tropas» conserva el sentido militar sin sonar demasiado técnico en español.
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the open country
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el campo abierto
  - en la campiña
  lexicon: HALOT
  rationale: La expresión literalmente es «en el campo», y en este contexto alude a estar fuera de la zona urbana controlada. En español, «en el campo» es natural y mantiene la ambigüedad útil entre campo literal y zona rural.
- source_word: וְאַנְשֵׁיהֶם
  english_pob_choice: and their men
  chosen_spanish: ellos y sus hombres
  alternatives_spanish:
  - y sus hombres
  - y los hombres con ellos
  lexicon: HALOT
  rationale: אַנְשֵׁי con sufijo es literalmente «sus hombres». «Ellos y sus hombres» conserva la estructura coordinada del hebreo y el contraste entre los jefes y sus subordinados.
- source_word: הִפְקִיד
  english_pob_choice: had appointed
  chosen_spanish: había puesto
  alternatives_spanish:
  - había nombrado
  - había colocado
  lexicon: HALOT
  rationale: 'El verbo cubre tanto nombrar oficialmente como poner en una función o cargo. En la primera ocurrencia, «había puesto sobre la tierra» expresa la investidura de autoridad sin perder el matiz de colocación/encargo. '
- source_word: בָּאָרֶץ
  english_pob_choice: over the land
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre el país
  lexicon: HALOT
  rationale: Con הִפְקִיד, la frase indica jurisdicción. «Sobre la tierra» reproduce de forma directa el alcance del encargo, manteniendo el lenguaje bíblico usual de la tierra como ámbito de gobierno.
- source_word: הִפְקִיד אִתּוֹ
  english_pob_choice: had entrusted to him
  chosen_spanish: había puesto con él
  alternatives_spanish:
  - había confiado a su cuidado
  - había encargado a él
  lexicon: HALOT
  rationale: La segunda ocurrencia de הִפְקִיד no repite simplemente el nombramiento, sino que señala personas colocadas bajo su cuidado. «Había puesto con él» preserva la concreción del hebreo, aunque en español puede sonar menos explícito que «había confiado a su cuidado».
- source_word: אֲנָשִׁים וְנָשִׁים וָטָף
  english_pob_choice: men, women, children
  chosen_spanish: hombres, mujeres, niños
  alternatives_spanish:
  - hombres, mujeres y niños
  - varones, mujeres y niños
  lexicon: HALOT
  rationale: טָף se refiere a los pequeños o niños. «Niños» es la manera más clara y actual de comunicar el sentido. «Hombres, mujeres, niños» reproduce la serie de tres grupos.
- source_word: מִדַּלַּת הָאָרֶץ
  english_pob_choice: some of the poorest of the land
  chosen_spanish: a algunos de los más pobres de la tierra
  alternatives_spanish:
  - a algunos de los pobres de la tierra
  - a algunos de los humildes de la tierra
  lexicon: HALOT
  rationale: La frase apunta al remanente social y económicamente más bajo. «Los más pobres» conserva el partitivo y la fuerza social del término, sin suavizarlo a «humildes».
- source_word: מֵאֲשֶׁר לֹא הָגְלוּ בָּבֶלָה
  english_pob_choice: from those who had not been exiled to Babylon
  chosen_spanish: de entre los que no habían sido deportados a Babilonia
  alternatives_spanish:
  - de entre los que no habían sido exiliados a Babilonia
  - de los que no habían ido cautivos a Babilonia
  lexicon: HALOT
  rationale: El pasivo en español natural para הָגְלוּ es «deportados». «De entre los que no habían sido deportados a Babilonia» conserva el valor de selección y el destino geográfico.
- source_word: וַיִּשְׁמְעוּ
  english_pob_choice: Now when ... heard
  chosen_spanish: Ahora bien, cuando ... oyeron
  alternatives_spanish:
  - Y cuando ... oyeron
  - Entonces ... oyeron
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración. «Ahora bien, cuando» funciona bien en español para abrir la escena y enlazar con el desarrollo siguiente.
theological_decisions:
- issue: Nombre divino no presente en el versículo, pero mantener terminología bíblica de «la tierra» sin reinterpreta­ción territorial moderna
  english_pob_reading: No theological decision recorded
  chosen_spanish_reading: sobre la tierra / de la tierra
  alternative_spanish_readings:
  - sobre el país
  - sobre el territorio
  rationale: Aunque el versículo no nombra a Yahvé, la frase hebrea con הארץ conserva la carga bíblica de la tierra como ámbito del gobierno y del remanente. «La tierra» es preferible a «el país» para no modernizar indebidamente el marco teológico-literario.
  doctrine_reference: No aplica; decisión de marco léxico-teológico sobre tierra/promesa
- issue: «Guedalías» como forma transliterada del nombre propio
  english_pob_reading: Gedaliah
  chosen_spanish_reading: Guedalías
  alternative_spanish_readings:
  - Gedalías
  - Guedalias
  rationale: Se elige una transliteración española que refleje mejor la pronunciación aproximada y sea publicable en español. Mantiene la identidad del personaje sin sustituir el nombre por una forma tradicional no unificada.
  doctrine_reference: No aplica; decisión onomástica
- issue: «deportados» frente a «exiliados» para el cautiverio en Babilonia
  english_pob_reading: had not been exiled to Babylon
  chosen_spanish_reading: no habían sido deportados a Babilonia
  alternative_spanish_readings:
  - no habían sido exiliados a Babilonia
  - no habían ido cautivos a Babilonia
  rationale: «Deportados» expresa con precisión el traslado forzado implícito en הָגְלוּ. «Exiliados» puede sonar más abstracto o institucional; «deportados» conserva el carácter histórico y coercitivo del evento.
  doctrine_reference: No aplica; decisión histórico-lexical
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail en inglés. Se mantuvo la doble ocurrencia de הִפְקִיד con dos matices distintos: investidura sobre la tierra y colocación de personas con Gedalías. También se conservó el valor partitivo de מִדַּלַּת הָאָרֶץ y la referencia al cautiverio/deportación a Babilonia, sin suavizar la tensión social del pasaje.'
  spanish_consistency_notes:
  - Se emplea «Babilonia» como topónimo, no «Babilón».
  - Se translitera el nombre propio como «Guedalías» de forma consistente.
  - Se mantiene «la tierra» para הארץ en sentido bíblico-contextual.
  - Se preserva la enumeración «hombres, mujeres, niños» como serie compacta y natural en español.
