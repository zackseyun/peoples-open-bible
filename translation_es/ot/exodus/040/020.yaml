translation:
  language: es
  text: Entonces tomó el testimonio[a] y lo puso en el arca, y puso los varales sobre el arca, y colocó el propiciatorio[b] encima del arca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las tablas del testimonio'; el hebreo 'el testimonio' es el término técnico usado aquí para lo que se colocó dentro del arca.
    reason: lexical_alternative
  - marker: b
    text: O 'cubierta de expiación'.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֵדֻת
  english_pob_choice: the testimony
  chosen_spanish: el testimonio
  alternatives_spanish:
  - las tablas del testimonio
  - el documento del pacto
  lexicon: HALOT
  rationale: En contexto tabernacular, עֵדוּת es un término técnico para lo que se guardó dentro del arca. 'El testimonio' conserva esa designación cultual sin especificar más de lo que dice el hebreo. La nota mantiene abierta la posibilidad de que se trate concretamente de las tablas.
- source_word: הָאָרֹן
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - el cofre
  - el arca del pacto
  lexicon: HALOT
  rationale: אָרוֹן designa literalmente un cofre o caja; en este contexto se trata del arca sagrada. 'El arca' es natural en español y no añade 'del pacto', que no aparece en este versículo.
- source_word: הַבַּדִּים
  english_pob_choice: the poles
  chosen_spanish: los varales
  alternatives_spanish:
  - los postes
  - las barras de transporte
  lexicon: HALOT
  rationale: בַּדִּים se refiere a las piezas de madera para cargar el arca. 'Varales' conserva un término bíblico entendido en español y evita la pérdida de la función de transporte; 'postes' sería menos específico.
- source_word: הַכַּפֹּרֶת
  english_pob_choice: the mercy seat
  chosen_spanish: el propiciatorio
  alternatives_spanish:
  - la cubierta de expiación
  - la tapa
  lexicon: HALOT
  rationale: כַּפֹּרֶת nombra la pieza cultual específica sobre el arca. En español, 'propiciatorio' es el equivalente tradicional y técnico más fiel en este contexto; 'cubierta de expiación' explicita el sentido pero suena menos natural y 'tapa' reduce indebidamente su valor cultual.
- source_word: מִלְמָעְלָה
  english_pob_choice: above
  chosen_spanish: por encima
  alternatives_spanish:
  - encima
  - desde arriba
  lexicon: HALOT
  rationale: La expresión indica ubicación superior sin añadir un objeto explícito. 'Por encima' refleja bien la relación espacial y evita introducir un complemento no presente en el hebreo.
- source_word: וַיִּתֵּן ... אֶל
  english_pob_choice: put ... into
  chosen_spanish: lo puso en
  alternatives_spanish:
  - lo colocó en
  - lo metió en
  lexicon: HALOT
  rationale: El verbo נתן con אֶל en este contexto físico expresa colocar dentro o en dirección a un recipiente. 'Lo puso en' es natural y preciso en español, y sigue el movimiento concreto del texto.
- source_word: וַיָּשֶׂם ... עַל
  english_pob_choice: set ... on
  chosen_spanish: puso ... sobre
  alternatives_spanish:
  - colocó ... sobre
  - instaló ... sobre
  lexicon: HALOT
  rationale: שׂים describe aquí la colocación correcta de los varales sobre el arca. 'Puso ... sobre' es claro y directo; 'colocó' también es posible, pero 'puso' mantiene mejor la simplicidad del hebreo narrativo.
theological_decisions:
- issue: Referente de 'el testimonio'
  english_pob_reading: A cultic designation for the covenant testimony placed inside the ark, likely the stone tablets, rendered without over-specifying.
  chosen_spanish_reading: Una designación cultual del testimonio del pacto guardado dentro del arca, probablemente las tablas, sin precisar más allá del texto.
  alternative_spanish_readings:
  - Identificarlo explícitamente como las tablas del pacto
  - Dejarlo como un testimonio abstracto sin sugerir soporte material
  rationale: 'El hebreo usa el término técnico עֵדוּת y describe un acto físico de colocarlo en el arca. La traducción conserva esa tensión: no nombra las tablas, pero tampoco vacía el término de su referencia concreta.'
  doctrine_reference: Translation philosophy §3
- issue: Renderización de כַּפֹּרֶת
  english_pob_reading: mercy seat
  chosen_spanish_reading: propiciatorio
  alternative_spanish_readings:
  - cubierta de expiación
  - cubierta
  rationale: La pieza tiene un peso cultual y teológico propio en el tabernáculo. 'Propiciatorio' mantiene esa terminología bíblica tradicional en español y evita reducirla a una mera cubierta funcional.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del inglés auditado: se evitó añadir cualquier pronombre equivalente a ''it'' después de ''above'', porque el hebreo solo indica la relación espacial ''por encima'' sin objeto explícito. También se preservó la tensión entre el término técnico ''testimonio'' y su probable referencia material, tal como muestra el audit trail.'
  spanish_consistency_notes:
  - Se mantuvo 'arca' sin expandir a 'arca del pacto' porque el contexto inmediato ya la identifica y el hebreo no lo dice aquí.
  - '''Propiciatorio'' se eligió como término técnico asentado en español para כַּפֹּרֶת, en vez de una glosa más explicativa.'
  - '''Varales'' comunica la función de transporte del objeto y es más sobrio que alternativas más descriptivas.'
  - La puntuación reproduce la cadencia de la narración hebrea con una sola cláusula principal y encadenamiento de acciones.
