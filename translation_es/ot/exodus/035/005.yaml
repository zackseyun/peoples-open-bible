translation:
  language: es
  text: 'Tomen de entre ustedes una ofrenda para Yahvé. Todo el que tenga el corazón dispuesto[a] la traerá: la ofrenda de Yahvé[b]—oro, plata y bronce.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «todo el de corazón dispuesto»; la expresión señala una disposición interior voluntaria.'
    reason: lexical_alternative
  - marker: b
    text: 'O también: «la contribución para Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: קְחוּ
  english_pob_choice: Take
  chosen_spanish: Tomen
  alternatives_spanish:
  - Tomen
  - Reciban
  - Tomen para ustedes
  lexicon: HALOT
  rationale: Es un imperativo plural directo. «Tomen» conserva la fuerza de la orden sin añadir matices ajenos; en español suena natural y puede coordinarse con el complemento siguiente.
- source_word: מֵאִתְּכֶם
  english_pob_choice: from among you
  chosen_spanish: de entre ustedes
  alternatives_spanish:
  - de ustedes
  - de entre ustedes
  - de su medio
  lexicon: HALOT
  rationale: La expresión marca procedencia dentro de la comunidad. «De entre ustedes» preserva mejor el sentido colectivo que un simple «de ustedes».
- source_word: תְּרוּמָה
  english_pob_choice: offering
  chosen_spanish: ofrenda
  alternatives_spanish:
  - ofrenda
  - contribución
  - ofrenda elevada
  lexicon: HALOT
  rationale: En este contexto de materiales para el tabernáculo, el término designa una entrega apartada para uso sagrado. «Ofrenda» es natural y amplio; «contribución» es posible pero menos cultual.
- source_word: לַיהוָה / יְהוָה
  english_pob_choice: for Yahweh / Yahweh’s
  chosen_spanish: para Yahvé / de Yahvé
  alternatives_spanish:
  - para Yahvé
  - de Yahvé
  - para el Señor
  lexicon: HALOT
  rationale: Se mantiene el nombre divino en la forma POB española «Yahvé», conforme al valor directo del Tetragrama. El lamed expresa dedicación, por eso «para Yahvé»; en la segunda mención, el genitivo se vierte como «de Yahvé».
- source_word: כֹּל נְדִיב לִבּוֹ
  english_pob_choice: Everyone whose heart is willing
  chosen_spanish: Todo el que tenga el corazón dispuesto
  alternatives_spanish:
  - Todo el que tenga el corazón dispuesto
  - Todo el de corazón generoso
  - Todo el que sea generoso de corazón
  lexicon: HALOT
  rationale: La idiomática hebrea enfatiza la disposición interior voluntaria. «Corazón dispuesto» conserva esa imagen sin endurecerla en una fórmula demasiado literal ni perder la dimensión voluntaria.
- source_word: יְבִיאֶהָ
  english_pob_choice: shall bring it
  chosen_spanish: la traerá
  alternatives_spanish:
  - la traerá
  - la llevará
  - deberá traerla
  lexicon: HALOT
  rationale: El verbo de traer/aportar encaja en el contexto de entregar materiales al santuario. «La traerá» expresa el compromiso esperado sin sobrecargar el texto con obligatoriedad.
- source_word: אֵת תְּרוּמַת יְהוָה
  english_pob_choice: the LORD’s offering
  chosen_spanish: la ofrenda de Yahvé
  alternatives_spanish:
  - la ofrenda de Yahvé
  - la contribución de Yahvé
  - la ofrenda para Yahvé
  lexicon: HALOT
  rationale: La frase retoma y especifica la ofrenda ya mencionada. En español, «la ofrenda de Yahvé» conserva el valor posesivo/apposicional de forma idiomática.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro
  lexicon: HALOT
  rationale: Correspondencia directa y estándar para el metal precioso.
- source_word: וָכֶסֶף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - plata
  lexicon: HALOT
  rationale: Correspondencia directa y estándar para el metal precioso. Se preserva la lista de materiales sin expansión.
- source_word: וּנְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - bronce
  - cobre
  lexicon: HALOT
  rationale: En listas de materiales del tabernáculo, נְחֹשֶׁת se entiende con valor de aleación para trabajo metálico. «Bronce» es la equivalencia castellana más natural y tradicional en este contexto técnico.
theological_decisions:
- issue: Rendering of the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: La base hebrea usa el Tetragrama de manera directa. Siguiendo la terminología española del proyecto, se conserva el nombre divino como «Yahvé» en lugar de una sustitución por título reverencial.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Voluntary disposition of the donor
  english_pob_reading: Everyone whose heart is willing
  chosen_spanish_reading: Todo el que tenga el corazón dispuesto
  alternative_spanish_readings:
  - Todo el que tenga el corazón dispuesto
  - Todo el de corazón generoso
  rationale: La expresión hebrea subraya una disposición interior voluntaria, no una mera obligación externa. «Corazón dispuesto» comunica esa tensión sin convertirla en un tecnicismo.
  doctrine_reference: Exodus 35:5 lexical context
translation_notes:
  revision_awareness: El pasaje mantiene alta concordancia con el audit trail inglés y no requiere revisión adicional; se conservaron el nombre divino, el carácter voluntario de la ofrenda y la lista de materiales sin cambios de sentido.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el Tetragrama.
  - «Ofrenda» se emplea para תְּרוּמָה en este contexto cultual, evitando «ofrenda elevada» por ser demasiado técnica para lectura pública.
  - «Bronce» se mantiene para נְחֹשֶׁת en listas tabernaculares.
  - La estructura con dos puntos conserva la apposición de «la ofrenda de Yahvé».
