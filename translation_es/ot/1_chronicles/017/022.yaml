revisions:
- from: Y tú hiciste que tu pueblo, Israel, fuera tu pueblo para siempre[a]; y tú, Yahvé, llegaste a ser su Dios.
  to: Y diste a tu pueblo Israel para que fuera tu pueblo para siempre[a], y tú, Yahvé, llegaste a ser su Dios.
  rationale: Se ajusta la primera cláusula para un español más natural y más cercano a la sintaxis hebrea de constitución de pacto, sin perder el matiz de que Dios estableció a Israel como su pueblo. Se conserva «Yahvé», «para siempre» y la lectura dinámica «llegaste a ser su Dios», así como la nota alternativa documentada.
