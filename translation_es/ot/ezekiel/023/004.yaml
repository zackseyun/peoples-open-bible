    text: The names Oholah and Oholibah likely echo Hebrew words meaning 'her tent' and 'my tent is in her,' reinforcing the allegory.
    reason: cultural_note
  - marker: b
    text: Or 'They were mine'; the Hebrew can be understood as stating possession/relationship, and in context the larger allegory is marital.
    reason: alternative_reading
