revisions:
- from: Porque Yahvé no pudo traer[a] a este pueblo a la tierra que les juró, los degolló en el desierto.
  to: Porque Yahvé no pudo llevar[a] a este pueblo a la tierra que les juró, los masacró en el desierto.
  rationale: Se hicieron ajustes menores para mejorar la naturalidad del español y la precisión del registro semántico. «Llevar» encaja mejor que «traer» en este contexto narrativo, y «los masacró» preserva la severidad de שׁחט sin restringir indebidamente el verbo a un degüello literal. La nota se suavizó para sonar más idiomática en español.
