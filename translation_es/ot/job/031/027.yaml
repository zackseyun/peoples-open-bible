lexical_decisions:
- source_word: וַיִּפְתְּ
  english_pob_choice: was enticed
  chosen_spanish: fue secretamente seducido
  alternatives_spanish:
  - fue engañado
  - fue persuadido
  - fue atraído
  lexicon: HALOT
  rationale: פּתה expresa aquí la idea de ser atraído o seducido interiormente. «Fue secretamente seducido» conserva el matiz de una inclinación interna y oculta, y mantiene la tensión moral del contexto sin volverlo más explícito de lo que el hebreo dice.
- source_word: בַּסֵּתֶר
  english_pob_choice: secretly
  chosen_spanish: secretamente
  alternatives_spanish:
  - en secreto
  - ocultamente
  lexicon: HALOT
  rationale: סֵתֶר denota ocultamiento o clandestinidad. El adverbio «secretamente» suena natural en español y conserva la idea de una acción interna y no pública.
- source_word: לִבִּי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi interior
  - mi alma
  lexicon: HALOT
  rationale: לֵב/לֵבָב puede referirse al centro interior de la persona. «Mi corazón» es la equivalencia más directa y transparente en español, y mantiene el lenguaje antropológico del original.
- source_word: וַתִּשַּׁק
  english_pob_choice: kissed
  chosen_spanish: besó
  alternatives_spanish:
  - dió un beso a
  - lanzó un beso a
  lexicon: HALOT
  rationale: נשק es el verbo común «besar». En el texto principal conviene conservar la acción concreta «besó»; la posible interpretación gestual se reserva para la nota.
- source_word: יָדִי
  english_pob_choice: my hand
  chosen_spanish: mi mano
  alternatives_spanish:
  - mi mano derecha
  - mi brazo
  lexicon: HALOT
  rationale: La forma es literal y directa. «Mi mano» conserva el instrumento físico del gesto sin añadir especificaciones no presentes en el hebreo.
- source_word: לְפִי
  english_pob_choice: my mouth
  chosen_spanish: mi boca
  alternatives_spanish:
  - mi boca
  - a mi boca
  lexicon: HALOT
  rationale: פֶה significa literalmente «boca». Aunque «mi boca» puede sonar algo más literal que la construcción inglesa, es natural en español y mantiene el cuerpo del gesto sin interpretarlo excesivamente.
theological_decisions:
- issue: Posible gesto de homenaje o adoración hacia los astros
  english_pob_reading: Retain the concrete bodily action in the main text without making the idolatry explicit in added wording.
  chosen_spanish_reading: Conservar la acción corporal concreta en el texto principal, sin explicitar en la línea principal que se trata de un acto idólatra.
  alternative_spanish_readings:
  - y lancé un beso con la mano
  - y besé mi mano en señal de homenaje
  - y lancé un beso de mi mano
  rationale: El contexto inmediato de Job 31:26–28 sugiere un gesto de reverencia o adoración astral, pero el versículo en sí describe la acción corporal. La traducción principal mantiene la concreción del hebreo y deja la posible lectura idiomática para la nota, evitando añadir interpretación no formulada en el texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El control de revisión indica que no hubo cambios adicionales y que la lectura sigue en alta concordancia con el audit trail inglés; por eso se preserva la estructura concreta del hebreo con una sola nota idiomática.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «mi corazón» y «mi boca» para conservar la imaginería corporal directa del hebreo.
  - Se conserva el orden sintáctico básico con una pausa final para reflejar el ritmo del verso y el inciso de la nota idiomática.
