    text: O 'apresarlos'.
    reason: lexical_alternative
  revision_rationale: 'Se corrigió la construcción incorrecta ''lo rodeaban a David y a sus hombres'' y se optó por ''iban cercando'' para reflejar mejor el progreso táctico de עֹטְרִים. También se realinearon las notas con el audit trail inglés: la alternativa de ''rodeaban'' quedó en la frase de cerco, y la alternativa de ''apresarlos'' quedó en ''capturarlos''. Se añadió la nota sobre ''un lado/el otro lado'' porque el POB inglés preserva esa explicación del contraste espacial hebreo.'
