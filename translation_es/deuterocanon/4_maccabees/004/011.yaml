review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido general del griego: Apolonio cae medio muerto, extiende las manos al cielo, ruega a los hebreos que oren por él, y el propósito es aplacar al στρατός celestial. Sin embargo, hay dos puntos mejorables para una fidelidad más precisa y un español más natural: (1) «extendiendo las manos» queda algo colgante frente al verbo principal y suena menos fluido que una coordinación verbal; (2) la nota [b] introduce confusión al decir literalmente «orar por él» o «orar sobre él», cuando la auditoría inglesa distingue correctamente entre el literal «acerca de él» y el sentido natural «por él».'
  spanish_quality_summary: 'El español es claro y digno, pero «patio sin vida» suena algo extraño en español moderno, aunque no es incorrecto y preserva bien ἄψυχον. La mejora principal es estilística/sintáctica: «extendió sus manos al cielo» lee mejor que «extendiendo las manos hacia el cielo». También conviene ajustar la nota [b] para evitar una glosa literal inexacta y mantener la claridad para lectores hispanos.'
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Santuario», «Apolonio», «oraran por él» y «ejército celestial» son compatibles con la auditoría. La ambigüedad teológica de τὸν ἐπουράνιον στρατόν se conserva adecuadamente. La elección «ejército celestial» es válida, con nota alternativa para «hueste celestial».
  issues:
  - severity: medium
    issue: Construcción participial poco natural en español
    rationale: 'El griego usa participios encadenados, pero «extendiendo las manos hacia el cielo y con lágrimas, rogaba» suena forzado en español. Una forma finita coordinada preserva mejor el sentido y la legibilidad: «extendió sus manos al cielo y, con lágrimas, rogó...».'
  - severity: medium
    issue: Nota [b] explica de forma inexacta el literal griego
    rationale: 'La nota dice: «Literalmente, ‘orar por él’ o ‘orar sobre él’», pero el inglés auditado indica que el literal es ‘orar concerning him’, es decir, «orar acerca de él» o «respecto de él». Debe corregirse para no confundir el fundamento léxico.'
  - severity: low
    issue: Uso de «las manos» sin posesivo
    rationale: No es incorrecto, pero «sus manos» resulta más natural y específico en esta escena narrativa de súplica.
