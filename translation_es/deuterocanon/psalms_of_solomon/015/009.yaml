  - marker: b
    text: La expresión griega «como los perseguidos por guerra» es comprimida; también puede entenderse de manera más dinámica como «como personas expulsadas por la guerra».
    reason: alternative_reading
  revision_rationale: Se revisa para corregir el anclaje de la nota [b], que estaba unida a la frase equivocada, y para mejorar levemente la naturalidad de la cláusula final. El resto del texto conserva fielmente el sentido del griego y la decisión léxica documentada de traducir ὁσίων como «piadosos».
