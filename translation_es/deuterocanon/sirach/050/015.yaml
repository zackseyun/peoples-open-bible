translation:
  language: es
  text: Entonces los hijos de Aarón[a], los sacerdotes[b], alzaban un clamor con trompetas de metal batido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego tiene aquí un paralelo más largo, que describe al sacerdote extendiendo la mano para la libación y derramando la sangre de la uva junto al altar como aroma agradable para el Altísimo, el Rey de todos. El testigo hebreo conservado aquí contiene solo la línea de la aclamación con trompetas.
    reason: textual_variant
  - marker: b
    text: O «hacían sonar un toque con trompetas trabajadas a martillo». El verbo hebreo puede denotar una aclamación fuerte o un grito de señal, y en este contexto se expresa por medio de las trompetas.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Marca temporal-secuencial que introduce la siguiente acción litúrgica; «Entonces» es natural y mantiene la progresión narrativa.
- source_word: יָרִיעוּ
  english_pob_choice: would raise a shout
  chosen_spanish: alzaban un clamor
  alternatives_spanish:
  - gritarían
  - prorrumpían en un grito
  - darían un clamor
  lexicon: HALOT
  rationale: El hebreo puede abarcar una aclamación sonora. «Alzaban un clamor» conserva la fuerza vocal sin forzar un tecnicismo de trompeta que el verbo por sí solo no expresa de manera explícita.
- source_word: בְנֵי אַהֲרֹן
  english_pob_choice: the sons of Aaron
  chosen_spanish: los hijos de Aarón
  alternatives_spanish:
  - los hijos de Aarón
  - los descendientes de Aarón
  lexicon: HALOT
  rationale: Mantiene el título sacerdotal y la línea de linaje cultual, importante para el contexto ritual.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes
  lexicon: HALOT
  rationale: Es la aclaración appositiva del grupo anterior; «sacerdotes» es el equivalente idiomático directo en español y preserva la identificación cultual.
- source_word: בַּחֲצֹצְרוֹת
  english_pob_choice: with trumpets
  chosen_spanish: con trompetas
  alternatives_spanish:
  - con trompetas
  lexicon: HALOT
  rationale: El instrumento ritual es el de las trompetas sacerdotales; «con trompetas» mantiene el sentido instrumental natural en español.
- source_word: מִקְשֶׁה
  english_pob_choice: beaten
  chosen_spanish: de metal batido
  alternatives_spanish:
  - batidas
  - trabajadas a martillo
  - forjadas
  lexicon: HALOT
  rationale: Refiere al trabajo del metal por martillado/forja. En español, «de metal batido» refleja la cualidad material sin introducir una lectura demasiado técnica o anticuada.
theological_decisions:
- issue: Relación entre el hebreo conservado y el paralelo griego más amplio
  english_pob_reading: Translate the extant Hebrew line as the main text, while allowing the Greek to inform the cultic setting rather than importing its additional content.
  chosen_spanish_reading: Traducir la línea hebrea conservada como texto principal, sin importar al texto base las acciones sacrificiales añadidas por el griego.
  alternative_spanish_readings:
  - Incluir la libación y el derramamiento de la sangre de la uva según el griego
  - Fusionar ambos testigos en una sola formulación amplia
  rationale: La política del proyecto da primacía al hebreo conservado en Sirácides cuando está disponible. El griego ofrece un paralelo más largo, pero sus detalles no figuran en el testigo hebreo provisto y no deben trasladarse al texto principal.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use Greek parallel as actual input while keeping Hebrew primacy'
translation_notes:
  revision_awareness: Se siguió la revisión del inglés POB que prefiere «beaten trumpets» frente a «hammered trumpets», reflejando mejor מִקְשֶׁה como metal trabajado/batido. También se evitó importar el contenido ampliado del paralelo griego al texto principal.
  spanish_consistency_notes:
  - Se mantiene el registro litúrgico sobrio y claro.
  - No se usa «SEÑOR» ni otras sustituciones no requeridas por el hebreo de este versículo.
  - La frase «metal batido» intenta conservar el matiz artesanal de מִקְשֶׁה sin sonar demasiado arqueizante.
