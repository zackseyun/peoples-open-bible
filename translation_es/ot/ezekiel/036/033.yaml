translation:
  language: es
  text: 'Así dice el Señor Yahvé[a]: En el día en que los limpie de todas sus iniquidades, haré que las ciudades sean habitadas[b], y las ruinas[c] serán reconstruidas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo אֲדֹנָי יְהוִה también puede representarse como «el Señor Dios»; aquí se traduce «el Señor Yahvé» para conservar explícitamente el nombre divino יְהוִה, conforme al criterio del proyecto en español.
    reason: alternative_reading
  - marker: b
    text: 'O: «estableceré las ciudades» o «haré que haya habitantes en las ciudades». El hebreo es causativo: no solo indica habitación, sino que Dios hará que las ciudades vuelvan a tener moradores.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «los lugares desolados» o «los lugares arruinados». El hebreo חֳרָבוֹת designa sitios devastados; «ruinas» es una opción breve y clara en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvéh
  lexicon: HALOT
  rationale: El hebreo combina el título אֲדֹנָי con el nombre divino יְהוִה. En español, 'el Señor Yahvé' conserva ambos elementos sin convertir el nombre propio en un título genérico. Se evita 'Señor SEÑOR' y también la máscara 'SEÑOR', porque el sistema POB para español pide traducir YHWH como 'Yahvé'.
- source_word: בְּיוֹם
  english_pob_choice: On the day
  chosen_spanish: En el día en que
  alternatives_spanish:
  - El día en que
  - Cuando
  lexicon: HALOT
  rationale: '''En el día en que'' mantiene el valor temporal idiomático del hebreo y suena natural en español. ''Cuando'' sería más fluido, pero reduce la transparencia formal del marcador temporal.'
- source_word: טַהֲרִי
  english_pob_choice: I cleanse
  chosen_spanish: los limpie
  alternatives_spanish:
  - los purifique
  - los haga limpios
  lexicon: HALOT
  rationale: El piel de טהר expresa limpiar/purificar de impureza. 'Limpiar' comunica bien en español el acto de quitar la impureza moral ligada a las iniquidades, sin perder la fuerza concreta del verbo.
- source_word: מִכֹּל עֲוֺנֹתֵיכֶם
  english_pob_choice: from all your iniquities
  chosen_spanish: de todas sus iniquidades
  alternatives_spanish:
  - de todos sus pecados
  - de toda su culpa
  lexicon: HALOT
  rationale: '''Iniquidades'' preserva el peso moral de עָוֹן y sigue de cerca la decisión del POB inglés. Se usa ''de'' para reflejar la separación causada por la preposición מִן.'
- source_word: וְהוֹשַׁבְתִּי אֶת הֶעָרִים
  english_pob_choice: I will cause the cities to be inhabited
  chosen_spanish: haré habitar las ciudades
  alternatives_spanish:
  - haré que las ciudades sean habitadas
  - estableceré las ciudades
  lexicon: HALOT
  rationale: El causativo de ישׁב pide una traducción que exprese hacer habitar/causar que haya moradores. 'Haré habitar las ciudades' conserva la causatividad sin añadir explícitamente un sujeto que el hebreo no menciona.
- source_word: וְנִבְנוּ הֶחֳרָבוֹת
  english_pob_choice: the ruins will be rebuilt
  chosen_spanish: las ruinas serán reconstruidas
  alternatives_spanish:
  - los lugares arruinados serán reconstruidos
  - los lugares desolados serán reconstruidos
  lexicon: HALOT
  rationale: '''Ruinas'' es la forma más natural y concisa en español para חֳרָבוֹת. ''Serán reconstruidas'' refleja adecuadamente el pasivo del verbo נבנוּ.'
theological_decisions:
- issue: Tratamiento del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: La decisión doctrinal del proyecto para español es no ocultar el Tetragrámaton con una máscara tipográfica. Por eso se traduce יְהוִה como 'Yahvé', incluso dentro de la combinación fija con אֲדֹנָי. 'El Señor Yahvé' conserva el sentido reverente del título y el nombre propio del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de טהר aplicado a la restauración después del pecado
  english_pob_reading: I cleanse you from all your iniquities
  chosen_spanish_reading: los limpie de todas sus iniquidades
  alternative_spanish_readings:
  - los purifique de todas sus iniquidades
  - los haga limpios de todas sus iniquidades
  rationale: El contexto no describe limpieza ritual aislada sino remoción moral/relacional de la culpa del pueblo. 'Limpiar' mantiene esa tensión entre purificación y restauración sin endurecer el texto con un tecnicismo innecesario.
  doctrine_reference: Ezequiel 36:33; cf. uso de טהר en contextos de purificación moral
translation_notes:
  revision_awareness: El texto español sigue el último pass de revisión, que no introdujo cambios respecto del acuerdo alto con la fuente. Se mantuvo la equivalencia óptima del POB inglés y se adaptó la terminología al estándar español del proyecto, especialmente en el tratamiento de YHWH como 'Yahvé'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como equivalente español de יְהוִה en todo el texto.
  - Se eligió 'iniquidades' para conservar el matiz jurídico-moral de עֲוֺנֹת.
  - Se tradujo el causativo de הוֹשַׁבְתִּי con una construcción verbal natural en español.
  - '''Ruinas'' se usó como término principal para חֳרָבוֹת, con nota sobre alternativas semánticas.'
