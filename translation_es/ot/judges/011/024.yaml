revisions:
- from: ¿No poseerás lo que Quemós tu dios te hace poseer? Y todo lo que Yahvé nuestro Dios ha desposeído de delante de nosotros, eso poseeremos[a].
  to: ¿No poseerás lo que Quemós tu dios te hace poseer[a]? Y todo lo que Yahvé nuestro Dios ha quitado de delante de nosotros[b], eso poseeremos[c].
  rationale: La revisión conserva el sentido fuente y la terminología del proyecto, pero reemplaza una construcción española poco natural («ha desposeído de delante de nosotros») por «ha quitado de delante de nosotros», que comunica con claridad la remoción de ocupantes previos. Además, se añaden notas separadas para reflejar fielmente las dos decisiones léxicas documentadas en el expediente inglés sobre ירשׁ.
  reviewer_model: gpt-5.4
