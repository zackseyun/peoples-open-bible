review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo y el rastro POB en casi todo: מִּצְנֶפֶת como «turbante», צִיץ como «placa», נֵזֶר הַקֹּדֶשׁ como identificación appositiva, y יְהוָה como «Yahvé». También refleja correctamente la ubicación frontal del ornamento y la cláusula final de conformidad con el mandato divino. Sin embargo, hay dos desajustes menores: el hebreo dice «sobre su cabeza», no «sobre la cabeza», y la nota al pie está anclada a «cabeza», aunque la alternativa documentada corresponde a נֵזֶר הַקֹּדֶשׁ («la diadema sagrada»), no a «cabeza».'
  spanish_quality_summary: 'El español es claro y digno, pero puede mejorarse ligeramente para mayor naturalidad y precisión posesiva: «sobre su cabeza» suena más fiel y natural que «sobre la cabeza». La frase «sobre el frente del turbante» es comprensible; «en la parte delantera del turbante» sería posible, pero no necesaria. La principal corrección de calidad es mover la nota al lugar semánticamente correcto.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: «Yahvé» para יְהוָה, «turbante» para מִּצְנֶפֶת, y preservación de la distinción cultual del objeto sacerdotal. No hay conflicto doctrinal; la alternativa «diadema sagrada» debe mantenerse como nota lexical sobre «corona santa», no sobre «cabeza».'
  issues:
  - severity: medium
    issue: Falta el posesivo en «sobre la cabeza»
    rationale: El hebreo עַל רֹאשׁוֹ significa explícitamente «sobre su cabeza». Omitir el posesivo no destruye el sentido, pero reduce la precisión formal y la referencia inmediata al sujeto.
  - severity: high
    issue: La nota al pie está anclada a la palabra equivocada
    rationale: La nota «O «la diadema sagrada»» corresponde a נֵזֶר הַקֹּדֶשׁ / «la corona santa», no a «cabeza». Tal como está, induce a error sobre qué expresión tiene la alternativa lexical.
  revised_spanish_text: Y le puso el turbante sobre su cabeza, y sobre el frente del turbante colocó la placa de oro, la corona santa[a], tal como Yahvé había mandado a Moisés.
  revised_footnotes:
  - marker: a
    text: O «la diadema sagrada».
    reason: lexical_alternative
  revision_rationale: Se corrige el posesivo explícito del hebreo («su cabeza») y se reubica la nota lexical al sintagma «la corona santa», que es donde pertenece la alternativa «la diadema sagrada». No se requieren cambios doctrinales ni estructurales adicionales.
