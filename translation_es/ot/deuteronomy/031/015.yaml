translation:
  language: es
  text: Yahvé apareció en la tienda[a] en una columna de nube, y la columna de nube permaneció a la entrada[b] de la tienda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la Tienda»; el hebreo dice simplemente «la tienda», probablemente refiriéndose a la tienda de reunión por el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «sobre la entrada de la tienda»; la preposición hebrea también puede traducirse más literalmente como «sobre», aunque «a la entrada» encaja mejor con la escena.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרָא
  english_pob_choice: appeared
  chosen_spanish: apareció
  alternatives_spanish:
  - fue visto
  - se reveló
  lexicon: HALOT
  rationale: El nifal de ראה aquí expresa una manifestación visible. «Apareció» es natural en español y conserva el matiz teofánico sin explicarlo en exceso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio doctrinal del proyecto para el Tetragrámaton: usar «Yahvé» como transliteración del nombre divino, preservando el nombre propio del pacto.'
- source_word: בָּאֹהֶל
  english_pob_choice: in the tent
  chosen_spanish: en la tienda
  alternatives_spanish:
  - en la Tienda
  - en el tabernáculo
  lexicon: HALOT
  rationale: אֹהֶל significa «tienda». Aunque el contexto apunta a la tienda de reunión, el hebreo dice simplemente «la tienda»; por eso se evita «tabernáculo» o una mayúscula interpretativa.
- source_word: בְּעַמּוּד עָנָן
  english_pob_choice: in a pillar of cloud
  chosen_spanish: en una columna de nube
  alternatives_spanish:
  - en la columna de nube
  - por una columna de nube
  lexicon: HALOT
  rationale: La construcción describe el medio o forma de la manifestación. «Columna de nube» reproduce la imagen bíblica de manera clara; «en» conserva mejor la preposición hebrea que «por».
- source_word: וַיַּעֲמֹד
  english_pob_choice: stood
  chosen_spanish: se detuvo
  alternatives_spanish:
  - estuvo
  - tomó posición
  lexicon: HALOT
  rationale: Aunque el verbo básico es «estar de pie», en este contexto espacial una formulación como «se detuvo» comunica de modo natural que la columna quedó fija en un punto. Se mantiene la concreción de la imagen sin perder fluidez en español.
- source_word: עַמּוּד הֶעָנָן
  english_pob_choice: the pillar of cloud
  chosen_spanish: la columna de nube
  alternatives_spanish:
  - la columna nubosa
  lexicon: HALOT
  rationale: La repetición retoma y especifica la misma manifestación visible. «La columna de nube» es la forma más clara y estable en español bíblico contemporáneo.
- source_word: עַל פֶּתַח הָאֹהֶל
  english_pob_choice: at the entrance of the tent
  chosen_spanish: a la entrada de la tienda
  alternatives_spanish:
  - sobre la entrada de la tienda
  - en la entrada de la tienda
  lexicon: HALOT
  rationale: Aunque עַל puede significar «sobre», con פֶּתַח en este escenario espacial señala ubicación junto/al frente de la entrada. «A la entrada» suena natural y preserva la escena sin forzar un valor estrictamente vertical.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se conserva el nombre propio del Dios del pacto, conforme a la línea doctrinal del POB, y no se sustituye por un título genérico como «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Modo de la teofanía
  english_pob_reading: appeared in the tent in a pillar of cloud
  chosen_spanish_reading: apareció en la tienda en una columna de nube
  alternative_spanish_readings:
  - apareció a la tienda en una columna de nube
  - fue visto en la tienda como una columna de nube
  rationale: La traducción conserva la aparición visible y localizada sin resolver la tensión entre presencia divina y forma de manifestación. No se explicita más de lo que el hebreo permite.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La última revisión indicó que no había cambios necesarios; se mantiene el sentido del texto fuente y las decisiones auditadas, con ajuste solo de formulación española para fluidez natural y fidelidad léxica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se usa «tienda» y no «tabernáculo» para respetar el léxico inmediato del hebreo.
  - «Columna de nube» se conserva de forma uniforme en ambas ocurrencias para reflejar la repetición del original.
  - La relación espacial de עַל פֶּתַח se vierte con «a la entrada», evitando una lectura excesivamente literal de «sobre» sin necesidad contextual.
