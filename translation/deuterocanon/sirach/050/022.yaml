theological_decisions:
- issue: אָדָם as singular representative noun
  chosen_reading: man
  alternative_readings:
  - humankind
  - humanity
  rationale: The Hebrew is singular אדם and the line speaks generically of the human being. Per doctrine, gender-accurate rendering is preferred where representative force is present. 'Man' preserves the singular anthropological focus; inclusive alternatives are possible but less formally aligned.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם'
- issue: Final clause divergence between Hebrew and Greek witnesses
  chosen_reading: according to his will
  alternative_readings:
  - according to his mercy
  rationale: The primary witness for this verse is the surviving Hebrew, which reads ברצונו ('according to his will'). The Greek parallel instead has κατὰ τὸ ἔλεος αὐτοῦ ('according to his mercy'). Since Hebrew has primacy where extant, the main text follows the Hebrew, but the Greek alternative is significant enough to preserve in a footnote due to its theological nuance (sovereign will vs merciful dealing).
  doctrine_reference: 'PHILOSOPHY.md: Hebrew Sirach translated from Hebrew where it survives; DOCTRINE.md §Translation philosophy 3'
