translation:
  language: es
  text: 'Fueron inscritos por genealogía[a], según sus generaciones, como jefes de las casas de sus padres[b], hombres poderosos y valerosos: veinte mil doscientos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «registrados por genealogía». El hebreo indica haber sido incorporados en un registro genealógico.
    reason: lexical_alternative
  - marker: b
    text: «Casas de sus padres» es un término clánico que se refiere a unidades familiares ancestrales, no solo a la familia nuclear.
    reason: cultural_note
lexical_decisions:
- source_word: וְהִתְיַחְשָׂם
  english_pob_choice: They were enrolled by genealogy
  chosen_spanish: Fueron inscritos por genealogía
  alternatives_spanish:
  - Fueron registrados por genealogía
  - Quedaron inscritos en el registro genealógico
  lexicon: HALOT
  rationale: En Crónicas, el hitpael de יחשׂ apunta a quedar incorporado en un registro genealógico. «Inscritos» conserva la idea administrativa de entrada en un registro y suena natural en español; «por genealogía» mantiene el matiz instrumental del hebreo sin sobreexplicar.
- source_word: לְתֹלְדוֹתָם
  english_pob_choice: according to their generations
  chosen_spanish: según sus generaciones
  alternatives_spanish:
  - de acuerdo con sus generaciones
  - según sus linajes
  lexicon: HALOT
  rationale: תולדות puede referirse a generaciones, descendencia o linaje. «Según sus generaciones» sigue de cerca la estructura hebrea y funciona bien en el contexto genealógico de Crónicas.
- source_word: רָאשֵׁי בֵּית אֲבוֹתָם
  english_pob_choice: as heads of their fathers’ houses
  chosen_spanish: como jefes de las casas de sus padres
  alternatives_spanish:
  - como cabezas de las casas de sus padres
  - como jefes de sus casas paternas
  lexicon: HALOT
  rationale: Se conserva el idiomatismo social de «casas de sus padres», que en Crónicas designa unidades clánicas. «Jefes» expresa la función de liderazgo de רָאשֵׁי y evita reducir el término a una familia nuclear.
- source_word: גִּבּוֹרֵי חָיִל
  english_pob_choice: mighty men of valor
  chosen_spanish: hombres valerosos
  alternatives_spanish:
  - hombres de valor
  - guerreros valientes
  - hombres poderosos y valerosos
  lexicon: HALOT
  rationale: La expresión hebrea puede abarcar fortaleza, capacidad y valor militar. «Hombres valerosos» transmite la fuerza moral y bélica sin introducir una fórmula demasiado marcada o redundante en español.
- source_word: עֶשְׂרִים אֶלֶף וּמָאתָיִם
  english_pob_choice: twenty thousand two hundred
  chosen_spanish: veinte mil doscientos
  alternatives_spanish:
  - '20.200'
  - veinte mil doscientos hombres
  lexicon: HALOT
  rationale: El número cardinal es directo y se vierte de manera estándar en español. Se omite «hombres» porque el contexto ya identifica a la población contada.
translation_notes:
  revision_awareness: El texto español sigue de cerca el audit trail inglés y el hebreo, manteniendo el valor administrativo-genealógico de וְהִתְיַחְשָׂם, la referencia clánica de בֵּית אֲבוֹתָם y la fórmula tradicional de גִּבּוֹרֵי חָיִל sin ampliar el sentido más allá de lo atestiguado. No se observaron revisiones previas que alteren la lectura base.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; aquí no aplica.
  - Se evita «SEÑOR» como sustituto teológico porque el verso no contiene el tetragrámaton.
  - «Inscritos» se usa en sentido documental, coherente con el registro genealógico de Crónicas.
  - La cifra se escribe con palabras para conservar el tono literario y bíblico del conjunto.
