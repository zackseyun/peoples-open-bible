translation:
  language: es
  text: '¿Quién lo declaró desde el principio[a], para que lo supiéramos, y de antemano, para que pudiéramos decir: «Él está en lo cierto[b]»? Pero no había quien lo declarara, ni quien lo hiciera oír, ni quien oyera las palabras de ustedes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde el comienzo».
    reason: lexical_alternative
  - marker: b
    text: O «Él tiene razón»; o «Él es justo».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién es el que
  - ¿Quién fue el que
  lexicon: HALOT
  rationale: El interrogativo abre un desafío retórico; «¿Quién» conserva la fuerza directa y breve del hebreo.
- source_word: הִגִּיד
  english_pob_choice: declared
  chosen_spanish: lo declaró
  alternatives_spanish:
  - lo anunció
  - lo dijo
  lexicon: HALOT
  rationale: El hiphil de נגד implica dar a conocer públicamente o de forma clara; «declaró» mantiene ese matiz mejor que «dijo».
- source_word: מֵרֹאשׁ
  english_pob_choice: from the beginning
  chosen_spanish: desde el principio
  alternatives_spanish:
  - desde el comienzo
  - desde primero
  lexicon: HALOT
  rationale: La expresión señala una divulgación previa en el tiempo. «Desde el principio» es natural en español y conserva el valor temporal de anticipación.
- source_word: וְנֵדָעָה
  english_pob_choice: so that we might know
  chosen_spanish: para que nosotros lo supiéramos
  alternatives_spanish:
  - y lo supiéramos
  - para que lo conociéramos
  lexicon: HALOT
  rationale: El cohortativo expresa resultado o propósito. En español, «para que... lo supiéramos» refleja bien esa finalidad y evita una simple coordinación mecánica.
- source_word: וּמִלְּפָנִים
  english_pob_choice: and beforehand
  chosen_spanish: y de antemano
  alternatives_spanish:
  - y antes
  - y previamente
  lexicon: HALOT
  rationale: La frase paralela intensifica la idea de anticipación; «de antemano» es clara y idiomática.
- source_word: וְנֹאמַר
  english_pob_choice: so that we might say
  chosen_spanish: para que pudiéramos decir
  alternatives_spanish:
  - y pudiéramos decir
  - para decir
  lexicon: HALOT
  rationale: Se mantiene el segundo cohortativo con valor de resultado/proposito. «Pudiéramos decir» conserva el carácter potencial y coordinado del hebreo.
- source_word: צַדִּיק
  english_pob_choice: He is right
  chosen_spanish: Él está en lo cierto
  alternatives_spanish:
  - Él tiene razón
  - Él es justo
  lexicon: HALOT
  rationale: Aquí el adjetivo funciona como veredicto vindicativo sobre la exactitud de la predicción. «Está en lo cierto» comunica mejor ese valor forense que «es justo».
- source_word: אַף אֵין מַגִּיד
  english_pob_choice: But there was no one declaring it
  chosen_spanish: Pero no había quien lo declarara
  alternatives_spanish:
  - Y no había quien lo declarara
  - Pero no había nadie que lo declarara
  lexicon: HALOT
  rationale: אַף con אֵין refuerza la negación; «Pero no había» transmite el giro adversativo del pasaje y el fuerte contraste con la pregunta inicial.
- source_word: מַשְׁמִיעַ
  english_pob_choice: making it heard
  chosen_spanish: quien lo hiciera oír
  alternatives_spanish:
  - quien lo hiciera escuchar
  - quien lo proclamara
  lexicon: HALOT
  rationale: El hiphil de שמע tiene valor causativo. «Hiciera oír» preserva ese matiz de causar que algo sea escuchado, sin perder naturalidad en español.
- source_word: שֹׁמֵעַ
  english_pob_choice: hearing
  chosen_spanish: quien oyera
  alternatives_spanish:
  - quien escuchara
  - quien lo oyera
  lexicon: HALOT
  rationale: El participio final señala a alguien que oye. «Oyera» mantiene el paralelismo con la serie de participios negativos y suena natural en el registro bíblico español.
- source_word: אִמְרֵיכֶם
  english_pob_choice: your words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - vuestras palabras
  - las palabras de ustedes
  lexicon: HALOT
  rationale: El plural constructo refiere a las expresiones dirigidas al interlocutor colectivo. En este contexto polémico, «sus palabras» evita ambigüedad en español sin añadir información no presente en el hebreo.
theological_decisions:
- issue: Sentido de צַדִּיק en el desafío profético
  english_pob_reading: Use forensic/vindicatory sense ('He is right') rather than moral quality ('He is righteous').
  chosen_spanish_reading: 'Usar un sentido forense o vindicativo: «Está en lo cierto» / «tiene razón», no «es justo» en sentido moral.'
  alternative_spanish_readings:
  - Él es justo
  - Él es recto
  rationale: En el contexto de una prueba de predicción, el punto es si el dicho queda vindicado. La traducción española debe reflejar ese juicio sobre la veracidad del anuncio, no una afirmación moral abstracta.
  doctrine_reference: Translation philosophy §1, §6
- issue: Objeto implícito de la declaración
  english_pob_reading: Render without supplying an explicit object ('it') rather than specifying a person or event.
  chosen_spanish_reading: Mantener el objeto implícito con «lo», sin concretarlo como persona o evento.
  alternative_spanish_readings:
  - lo declaró de antemano
  - declaró esto
  rationale: El hebreo no especifica el objeto; añadirlo sería más interpretativo de lo que el verso permite. «Lo» conserva la apertura referencial y el reto retórico.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: The latest English POB revision was unchanged after review (gpt-5.4, 2026-04-23T10:51:14Z), with high agreement in cross-checking. No applied revisions were listed, so the Spanish draft follows the established English audit trail closely without needing divergence from a revised English base.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo exige el nombre divino; este versículo no lo contiene.
  - Se conserva el paralelismo retórico de preguntas y negaciones sin introducir glosas explicativas.
  - «Está en lo cierto» traduce el veredicto de צַדִּיק en sentido forense, coherente con el contexto del desafío.
  - La forma «sus palabras» sigue el plural de אִמְרֵיכֶם y evita singularizar indebidamente.
