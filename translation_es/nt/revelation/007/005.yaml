    issue: La nota al pie no conserva bien la alternativa auditada en inglés.
    rationale: 'El inglés dice: «Or, more formally, ''from the tribe of Judah, twelve thousand sealed.''» En español, el texto principal ya dice precisamente «de la tribu de Judá, doce mil sellados», así que la nota no aporta una alternativa real y resulta redundante.'
  - severity: low
    issue: La redacción de la nota contiene puntuación y comillas poco limpias.
    rationale: Empieza con una comilla simple innecesaria antes de O y eso afecta la legibilidad editorial.
