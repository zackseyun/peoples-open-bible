- issue: Nature of κρίμα in context
  chosen_reading: judgment
  alternative_readings:
  - condemnation
  rationale: The context is Jesus' denunciation of exploitative religious leaders, so the term clearly refers to adverse divine judgment. Rendering it as 'judgment' preserves the lexical breadth of κρίμα without narrowing it beyond the Greek; the condemnatory sense remains evident from context.
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
