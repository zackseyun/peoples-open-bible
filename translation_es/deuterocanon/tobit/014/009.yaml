translation:
  language: es
  text: Pero tú, guarda la ley y los mandamientos, y sé misericordioso y justo[a], para que te vaya bien.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «recto». El adjetivo griego puede denotar tanto justicia como rectitud moral.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τήρησον
  english_pob_choice: keep
  chosen_spanish: guarda
  alternatives_spanish:
  - observa
  - cumple
  - guarda
  lexicon: BDAG
  rationale: En contexto legal y ético, τηρέω expresa mantener o observar fielmente. 'Guarda' conserva bien la fuerza de custodia/fidelidad al mandato y suena natural en español bíblico sin volverse arcaico.
- source_word: νόμον
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la ley
  - la Ley
  lexicon: BDAG
  rationale: El artículo griego apunta a un cuerpo reconocido de instrucción. 'La ley' refleja ese valor en español y mantiene la referencia judía del texto.
- source_word: προστάγματα
  english_pob_choice: the commandments
  chosen_spanish: los mandamientos
  alternatives_spanish:
  - los mandatos
  - los preceptos
  - las ordenanzas
  lexicon: BDAG
  rationale: El término designa disposiciones con autoridad. 'Mandamientos' encaja de forma natural junto con 'la ley' y conserva el tono exhortativo-moral.
- source_word: γενοῦ
  english_pob_choice: be
  chosen_spanish: sé
  alternatives_spanish:
  - hazte
  - llega a ser
  - sé
  lexicon: BDAG
  rationale: Aunque el aoristo medio de γίνομαι puede sugerir 'llegar a ser', aquí la revisión inglesa ya optó por 'be' por naturalidad. En español, 'sé' comunica bien la exhortación a asumir esa cualidad de carácter sin endurecer la frase.
- source_word: φιλελεήμων
  english_pob_choice: merciful
  chosen_spanish: misericordioso
  alternatives_spanish:
  - compasivo
  - misericordioso
  - inclinado a la misericordia
  lexicon: LSJ
  rationale: El compuesto expresa una disposición amante de la misericordia. 'Misericordioso' es la equivalencia más clara y digna en español; 'compasivo' sería viable, pero menos ligado al campo semántico de misericordia.
- source_word: δίκαιος
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - justo
  - recto
  - righteous
  lexicon: BDAG
  rationale: Aquí el inglés dejó abierta la alternativa 'just'. En español, 'justo' cubre tanto la rectitud moral como la justicia, y permite mantener la ambigüedad semántica del adjetivo sin imponer un matiz exclusivamente forense o exclusivamente piadoso.
- source_word: ἵνα σοι καλῶς ἦν
  english_pob_choice: so that it may go well with you
  chosen_spanish: para que te vaya bien
  alternatives_spanish:
  - para que te vaya bien
  - a fin de que te vaya bien
  - para que te vaya bien en todo
  lexicon: BDAG
  rationale: La expresión es idiomática y apunta al bienestar general. 'Para que te vaya bien' reproduce naturalmente el valor final/resultativo en español y conserva la promesa de bienestar sin explicitar más de lo que el griego dice.
theological_decisions:
- issue: δίκαιος en exhortación moral
  english_pob_reading: righteous / Or 'be just.' The Greek adjective can denote both moral righteousness and justice.
  chosen_spanish_reading: justo, con nota de ambigüedad entre justicia y rectitud moral
  alternative_spanish_readings:
  - recto
  - justo
  rationale: El texto exhorta a una conducta integral, no solo a equidad social. 'Justo' en español conserva la amplitud entre justicia y rectitud, y la nota preserva la tensión lexical que el audit trail documenta.
  doctrine_reference: 'DOCTRINE.md: consistencia terminológica; justicia/rectitud según contexto'
translation_notes:
  revision_awareness: La revisión inglesa cambió 'become merciful and righteous' a 'be merciful and righteous' para mayor naturalidad, sin alterar el sentido de γενοῦ. La versión española sigue esa decisión con 'sé misericordioso y justo', manteniendo la exhortación de carácter sin forzar una lectura de proceso.
  spanish_consistency_notes:
  - Se mantuvo 'ley' y 'mandamientos' para reflejar el paralelismo del griego.
  - '''Yahvé'' no aparece en este versículo; no hay decisión sobre el nombre divino aquí.'
  - Se eligió 'justo' para δίκαιος por su amplitud semántica en español, con nota alternativa para no perder la tensión documentada entre justicia y rectitud.
