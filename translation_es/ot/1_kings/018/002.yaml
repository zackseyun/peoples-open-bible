revisions:
- from: Así que Elías fue a presentarse ante Acab[a]. Ahora el hambre era severa en Samaria[b].
  to: Así que Elías fue a mostrarse ante Acab[a]. La hambruna era severa en Samaria[b].
  rationale: Se ajusta el verbo principal a «mostrarse» para preservar mejor el matiz reflexivo de לְהֵרָאוֹת y para que la nota [a] aporte alternativas reales en vez de repetir la lectura principal. Se cambia «hambre» por «hambruna» para una referencia más natural y precisa a רעב en contexto de desastre prolongado. Se elimina «Ahora» para un flujo narrativo español más limpio sin pérdida semántica relevante.
