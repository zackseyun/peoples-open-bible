translation:
  language: es
  text: Él y su pueblo con él —los despiadados[a] de las naciones— serán traídos para destruir la tierra. Desenvainarán sus espadas contra Egipto y llenarán la tierra de los caídos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los violentos de las naciones» / «los terribles de las naciones». La expresión hebrea resalta el carácter brutal de los pueblos invasores.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: su pueblo
  alternatives_spanish:
  - su ejército
  - sus tropas
  lexicon: HALOT
  rationale: עַם significa literalmente 'pueblo' y, en este contexto militar, puede incluir a los combatientes que acompañan al gobernante. 'Su pueblo' conserva la forma del hebreo sin precisar más de lo que el texto dice.
- source_word: עָרִיצֵי גוֹיִם
  english_pob_choice: the ruthless of the nations
  chosen_spanish: los violentos de las naciones
  alternatives_spanish:
  - los despiadados de las naciones
  - los tiranos de las naciones
  - los terribles de las naciones
  lexicon: HALOT
  rationale: עָרִיץ denota personas violentas, crueles o temibles. 'Violentos' comunica bien la fuerza moral y bélica del término en español sin introducir una superlación que el hebreo no expresa explícitamente.
- source_word: מֽוּבָאִים
  english_pob_choice: will be brought in
  chosen_spanish: serán traídos
  alternatives_spanish:
  - serán introducidos
  - vendrán traídos
  lexicon: HALOT
  rationale: El pasivo de בוא indica que son hechos venir. 'Serán traídos' mantiene la pasiva y resulta natural en español; 'traídos' por sí solo quedaría demasiado abrupto.
- source_word: לְשַׁחֵת
  english_pob_choice: to destroy
  chosen_spanish: destruir
  alternatives_spanish:
  - arruinar
  - devastar
  lexicon: HALOT
  rationale: שׁחת aquí expresa acción destructiva contra la tierra. 'Destruir' es la equivalencia más directa y clara en español.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  lexicon: HALOT
  rationale: En el oráculo contra Egipto, אֶרֶץ se refiere a la tierra/territorio de Egipto. 'La tierra' conserva la amplitud del hebreo y encaja con el uso profético.
- source_word: וְהֵרִיקוּ חַרְבוֹתָם עַל
  english_pob_choice: They will draw their swords against
  chosen_spanish: Desenvainarán sus espadas contra
  alternatives_spanish:
  - Sacarán sus espadas contra
  - Blandirán sus espadas contra
  lexicon: HALOT
  rationale: El idioma con ריק y 'espadas' significa desenvainar o sacar para atacar. 'Desenvainarán sus espadas contra' refleja bien el modismo militar en español.
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  lexicon: HALOT
  rationale: Nombre propio geográfico estándar en español; no requiere adaptación teológica.
- source_word: חָלָל
  english_pob_choice: the slain
  chosen_spanish: cadáveres
  alternatives_spanish:
  - los muertos
  - los caídos
  lexicon: HALOT
  rationale: חָלָל denota a los muertos o caídos en batalla. 'Cadáveres' comunica el resultado mortuorio de la escena, aunque 'los caídos' también sería posible; se evita una formulación demasiado abstracta.
theological_decisions:
- issue: Referencia al nombre divino
  english_pob_reading: No divine name appears in this verse; the line is a judgment oracle against Egypt.
  chosen_spanish_reading: No aparece el nombre divino en este versículo; se mantiene el tono de oráculo judicial.
  alternative_spanish_readings:
  - Introducir una mención implícita de Yahvé en la traducción
  - Agregar 'dice Yahvé'
  rationale: El hebreo de este versículo no contiene יהוה ni un discurso introductorio explícito, por lo que no corresponde añadirlo. La traducción conserva el enunciado tal como está en el texto base.
  doctrine_reference: Fidelidad textual y no expansión del texto base
translation_notes:
  revision_awareness: La redacción sigue el ajuste más reciente del POB en inglés, que afinó 'the most ruthless' a 'the ruthless' para evitar una superlación no explícita. La versión española evita igualmente añadir superlativos y conserva el valor caracterizador del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'la tierra' para הָאָרֶץ, coherente con el contexto egipcio y con el registro profético.
  - Se usa 'Egipto' como nombre propio establecido en español.
  - '''Desenvainarán sus espadas'' conserva el modismo militar sin caer en un calco opaco.'
  - '''Cadáveres'' comunica el efecto físico del término חָלָל en este contexto bélico, aunque la nota permite otras lecturas léxicas.'
