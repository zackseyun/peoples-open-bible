revisions:
- from: 'Entonces el rey dijo: «Tráiganme una espada». Y le llevaron la espada delante del rey.'
  to: 'Entonces el rey dijo: «Tráiganme una espada». Y trajeron la espada ante el rey.'
  rationale: Se elimina el pronombre añadido «le» y se sustituye «delante del rey» por «ante el rey» para reflejar con mayor naturalidad y precisión el hebreo וַיָּבִאוּ הַחֶרֶב לִפְנֵי הַמֶּלֶךְ, conservando el sentido de llevar/presentar la espada a la presencia del rey.
