translation:
  language: es
  text: ¡Despiértate, despiértate, levántate, Jerusalén, tú que has bebido de la mano de Yahvé la copa de su ira; has bebido el cuenco[a], la copa del tambaleo[b]; la has vaciado hasta las heces!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el tazón» o «la copa grande». El hebreo designa un recipiente para beber con forma de cuenco.
    reason: lexical_alternative
  - marker: b
    text: O «la copa del vértigo»; tradicionalmente, «la copa del temblor». El hebreo se refiere al efecto de tambalearse causado por la bebida.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִתְעוֹרְרִי הִֽתְעוֹרְרִי
  english_pob_choice: Awake, awake
  chosen_spanish: ¡Despiértate, despiértate!
  alternatives_spanish:
  - ¡Despierta, despierta!
  - ¡Ruébate, ruébate!
  lexicon: HALOT
  rationale: El hebreo está en hitpael femenino singular imperativo con fuerza reflexiva y repetición enfática. En español, «despiértate» conserva mejor esa vivencia reflexiva que un simple «despierta», y la duplicación mantiene la urgencia poética.
- source_word: קוּמִי
  english_pob_choice: rise up
  chosen_spanish: levántate
  alternatives_spanish:
  - álzate
  - levántate arriba
  lexicon: HALOT
  rationale: El imperativo llama a ponerse en pie; «levántate» es natural, solemne y se integra bien con el paralelo «despiértate».
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: N/A
  rationale: Nombre propio establecido en español bíblico y plenamente inteligible.
- source_word: אֲשֶׁר
  english_pob_choice: you who
  chosen_spanish: tú que
  alternatives_spanish:
  - que
  - la cual
  lexicon: HALOT
  rationale: La cláusula relativa en español requiere explicitar el sujeto vocativo («tú que») para que el discurso directo siga claro y fiel al hebreo.
- source_word: שָׁתִית
  english_pob_choice: have drunk
  chosen_spanish: has bebido
  alternatives_spanish:
  - bebiste
  - has tomado
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una experiencia ya cumplida con efecto presente; el perfecto compuesto español transmite bien esa situación persistente.
- source_word: מִיַּד יְהוָה
  english_pob_choice: from the hand of Yahweh
  chosen_spanish: de la mano de Yahvé
  alternatives_spanish:
  - de la mano de Yahweh
  - de la mano del SEÑOR
  lexicon: HALOT
  rationale: 'Se conserva la imagen de agencia mediante la locución «de la mano de». El nombre divino sigue la norma editorial del proyecto: «Yahvé».'
- source_word: כּוֹס חֲמָתוֹ
  english_pob_choice: the cup of his wrath
  chosen_spanish: la copa de su ira
  alternatives_spanish:
  - la copa de su furia
  - la copa de su enojo
  lexicon: HALOT
  rationale: «חֵמָה» en este contexto profético denota ira judicial. «Ira» es la equivalencia natural y digna en español, sin diluir la fuerza teológica del símbolo.
- source_word: קֻבַּעַת
  english_pob_choice: the bowl
  chosen_spanish: la vasija
  alternatives_spanish:
  - el cuenco
  - la copa grande
  lexicon: HALOT
  rationale: El término apunta a un recipiente para beber, de forma más amplia que una simple copa. «Vasija» deja abierta la forma sin perder la imagen del recipiente lleno para ser vaciado; en nota se puede indicar la alternativa «cuenco».
- source_word: כּוֹס הַתַּרְעֵלָה
  english_pob_choice: the cup of staggering
  chosen_spanish: la copa del aturdimiento
  alternatives_spanish:
  - la copa del mareo
  - la copa del tambaleo
  - la copa del reeleo
  lexicon: HALOT
  rationale: 'El sustantivo designa el efecto de beber: desorientación, tambaleo, aturdimiento. «Aturdimiento» comunica bien el resultado del licor de juicio en español contemporáneo; se preserva la metáfora de la copa sin convertirla en abstracción.'
- source_word: מָצִית
  english_pob_choice: have drained it dry
  chosen_spanish: la has vaciado hasta las heces
  alternatives_spanish:
  - la has drenado por completo
  - la has agotado
  lexicon: HALOT
  rationale: El verbo intensifica la idea de vaciar hasta el fondo. «Hasta las heces» es una expresión española tradicional y precisa para el vaciamiento total del recipiente, conservando la imagen extrema del hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: La pauta del proyecto exige traducir el Tetragrámaton como «Yahvé». Se evita el sustituto litúrgico «SEÑOR» para no ocultar el nombre divino revelado en el texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Metáfora de la copa de ira y del aturdimiento
  english_pob_reading: Retained as a metaphor for divine judgment without softening
  chosen_spanish_reading: Se conserva la metáfora de la copa bebida como juicio divino
  alternative_spanish_readings:
  - parafrasear como castigo
  - reducirlo a juicio sin imagen
  rationale: El pasaje profético usa una figura establecida de sufrimiento bajo la acción judicial de Dios. La traducción mantiene la copa, la mano de Yahvé y el beber completo, para no borrar la tensión teológica ni la imaginería del oráculo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: La redacción sigue de cerca la auditoría inglesa, pero adapta al español la doble exhortación imperativa y el idiomatismo final. Se optó por «despiértate» para conservar el matiz reflexivo del hitpael y por «vasija» para la segunda imagen del recipiente, dejando abierta en nota la posibilidad de «cuenco» o «vaso». No se suavizó la metáfora de la ira divina ni se sustituyó el nombre de Yahvé.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma editorial del Tetragrámaton, coherente con la política terminológica del proyecto.
  - «Copa de su ira» conserva la fuerza judicial de חֵמָה sin introducir un término más débil.
  - La repetición verbal inicial y la acumulación de imágenes al final preservan el paralelismo hebreo.
  - La expresión «hasta las heces» comunica el vaciamiento completo con una locución española natural y bíblicamente reconocible.
