translation:
  language: es
  text: Tú eres mi Dios[a], y te daré gracias; mi Dios[b], te exaltaré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y te alabaré»; el verbo puede abarcar tanto acción de gracias como alabanza en contextos de salmo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «te ensalzaré».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלִי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - mi Dios poderoso
  - mi divino
  lexicon: HALOT
  rationale: El vocativo con sufijo de 1.ª persona expresa una relación personal y devocional con Dios. «Mi Dios» conserva esa dirección directa y es la forma natural en español para esta poesía.
- source_word: אַתָּה
  english_pob_choice: you are
  chosen_spanish: Tú eres
  alternatives_spanish:
  - Eres tú
  - Tú
  lexicon: HALOT
  rationale: 'El pronombre independiente refuerza la identificación: en español se expresa con cópula explícita. «Tú eres» mantiene el énfasis del hebreo sin sonar forzado.'
- source_word: וְאוֹדֶךָּ
  english_pob_choice: and I will give thanks to you
  chosen_spanish: y te daré gracias
  alternatives_spanish:
  - y te alabaré
  - y te confesaré con gratitud
  lexicon: HALOT
  rationale: La forma hifil de ידה en contextos de salmo suele abarcar acción de gracias y alabanza. «Daré gracias» reproduce bien el valor central de agradecimiento y conserva el objeto directo indirecto de segunda persona.
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - mi Dios mío
  - mi Deidad
  lexicon: HALOT
  rationale: La repetición poética del apelativo divino se conserva en español con la misma expresión. No se introduce variación innecesaria para preservar el paralelismo.
- source_word: אֲרוֹמְמֶךָּ
  english_pob_choice: I will exalt you
  chosen_spanish: te exaltaré
  alternatives_spanish:
  - te ensalzaré
  - te levantaré en alto
  lexicon: HALOT
  rationale: El verbo de רום en este uso de alabanza expresa exaltación. «Exaltar» es el equivalente reverente y natural en español, y conserva la metáfora vertical.
theological_decisions:
- issue: Tratamiento de los títulos divinos directos
  english_pob_reading: my God ... my God
  chosen_spanish_reading: mi Dios ... mi Dios
  alternative_spanish_readings:
  - mi Dios poderoso ... mi Dios poderoso
  - mi Dios ... mi Señor
  rationale: El versículo es una confesión personal y litúrgica dirigida al Dios de Israel. Mantener «mi Dios» en ambas ocurrencias preserva la intimidad del vocativo y la repetición poética, sin sustituirla por títulos tradicionales que el hebreo aquí no exige.
  doctrine_reference: Affirmations; Translation philosophy §1, §6
- issue: Valor de ידה en contexto de salmo
  english_pob_reading: give thanks to you / praise you
  chosen_spanish_reading: daré gracias
  alternative_spanish_readings:
  - te alabaré
  - te daré gracias y te alabaré
  rationale: En este contexto doxológico, la forma verbal puede incluir agradecimiento y alabanza. Se eligió «daré gracias» como traducción principal por ser precisa y natural; la posible amplitud semántica queda reflejada en la nota textual.
  doctrine_reference: 'Lexical note: psalmic praise register'
translation_notes:
  revision_awareness: El pasaje fue revisado en el ciclo más reciente y quedó sin cambios sustantivos; la presente redacción sigue el acuerdo alto del auditor inglés y preserva las dos repeticiones de «mi Dios» junto con el paralelismo verbal.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהַי y אֵלִי, evitando alternar con «Señor» porque el hebreo no usa aquí el Tetragrámaton.
  - Se conserva la segunda persona directa con pronombre explícito para reflejar el énfasis del hebreo.
  - El orden de las cláusulas sigue el paralelismo poético del original sin añadir contenido interpretativo.
