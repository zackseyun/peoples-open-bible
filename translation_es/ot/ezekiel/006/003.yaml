translation:
  language: es
  text: 'Y dirás: «Montes de Israel, oigan la palabra del Señor Dios Yahvé. Así dice el Señor Dios Yahvé a los montes y a los collados, a los barrancos[a] y a los valles: He aquí, yo mismo estoy trayendo contra ustedes una espada, y destruiré sus lugares altos[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los cauces» o «a los wadis» para «a los barrancos».
    reason: lexical_alternative
  - marker: b
    text: «Lugares altos» se refiere a sitios de culto elevados, a menudo asociados con adoración ilícita o idolátrica.
    reason: cultural_note
lexical_decisions:
- source_word: הָרֵי יִשְׂרָאֵל
  english_pob_choice: Mountains of Israel
  chosen_spanish: Montes de Israel
  alternatives_spanish:
  - montes de Israel
  - montañas de Israel
  lexicon: HALOT
  rationale: Conservo el vocativo directo y personificado. «Montes» suena más natural en español bíblico que «montañas» y mantiene el tono solemne del llamado profético.
- source_word: שִׁמְעוּ
  english_pob_choice: hear
  chosen_spanish: oigan
  alternatives_spanish:
  - escuchen
  - oíd
  lexicon: HALOT
  rationale: El imperativo plural se expresa con un mandato directo. «Oigan» preserva la apelación profética y es idiomático en español actual reverente.
- source_word: דְּבַר אֲדֹנָי יְהוִה
  english_pob_choice: the word of the Lord GOD
  chosen_spanish: la palabra del Señor Yahvé
  alternatives_spanish:
  - la palabra del Señor Dios
  - la palabra de Yahvé, el Señor
  lexicon: HALOT
  rationale: «Dabar» es ‘palabra’. Para יְהוָה sigo el criterio del proyecto y uso «Yahvé»; «Señor Yahvé» evita una traducción mecánica de «Lord GOD» y mantiene el título compuesto sin ocultar el nombre divino.
- source_word: כֹּה אָמַר אֲדֹנָי יְהוִה
  english_pob_choice: Thus says the Lord GOD
  chosen_spanish: Así dice el Señor Yahvé
  alternatives_spanish:
  - Esto dice el Señor Yahvé
  - Así ha dicho el Señor Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se rinde de modo formal y natural en español. «Así dice» conserva la solemnidad del mensajero y la inmediatez del discurso divino.
- source_word: לֶהָרִים וְלַגְּבָעוֹת
  english_pob_choice: to the mountains and to the hills
  chosen_spanish: a los montes y a los collados
  alternatives_spanish:
  - a los montes y a las colinas
  - a las montañas y a los collados
  lexicon: HALOT
  rationale: Mantengo la duplicación preposicional. «Collados» es un equivalente bíblico y topográfico apropiado para גְּבָעוֹת; evita reducir el matiz de relieve bajo.
- source_word: לָאֲפִיקִים
  english_pob_choice: to the ravines
  chosen_spanish: a los barrancos
  alternatives_spanish:
  - a los cauces
  - a los wadis
  - a los ravines
  lexicon: HALOT
  rationale: אֲפִיקִים puede referirse a cauces o quebradas. En este listado geográfico, «barrancos» comunica bien una depresión/cañada y funciona con naturalidad en español; la nota conserva la alternativa léxica.
- source_word: וְלַגֵּיאָיוֹת
  english_pob_choice: to the valleys
  chosen_spanish: a los valles
  alternatives_spanish:
  - a las hondonadas
  - a las depresiones
  lexicon: HALOT
  rationale: «Valles» es el equivalente amplio y claro para גֵּיאָיוֹת, manteniendo el contraste con montes, collados y barrancos.
- source_word: הִנְנִי אֲנִי
  english_pob_choice: Behold, I myself
  chosen_spanish: He aquí, yo mismo
  alternatives_spanish:
  - Miren, yo mismo
  - He aquí, yo
  lexicon: HALOT
  rationale: Conservo la fuerza enfática de la doble primera persona en una forma natural para español bíblico. «Yo mismo» expresa el énfasis sin caer en una repetición artificial.
- source_word: מֵבִיא
  english_pob_choice: am bringing
  chosen_spanish: traigo
  alternatives_spanish:
  - estoy trayendo
  - estoy por traer
  lexicon: HALOT
  rationale: El participio con הִנְנִי expresa acción inminente y enfática. En español, el presente «traigo» conserva esa vivacidad profética mejor que una perífrasis más pesada.
- source_word: חֶרֶב
  english_pob_choice: a sword
  chosen_spanish: una espada
  alternatives_spanish:
  - la espada
  - un arma
  lexicon: HALOT
  rationale: El sustantivo es literal y mantiene la imagen judicial y bélica del texto. «Espada» es la correspondencia directa y transparente.
- source_word: וְאִבַּדְתִּי
  english_pob_choice: and I will destroy
  chosen_spanish: y destruiré
  alternatives_spanish:
  - y haré perecer
  - y exterminaré
  lexicon: HALOT
  rationale: El verbo implica causar la ruina o desaparición de algo. «Destruiré» comunica bien el acto divino de juicio sin intensificar más de lo que el hebreo exige.
- source_word: בָּמוֹתֵיכֶם
  english_pob_choice: your high places
  chosen_spanish: sus lugares altos
  alternatives_spanish:
  - sus altares en las alturas
  - sus santuarios altos
  - sus lugares de culto altos
  lexicon: HALOT
  rationale: «Lugares altos» es la forma establecida para בָּמוֹת y preserva su sentido cultual. Cambio a tercera persona de cortesía plural en español para concordar con el vocativo colectivo y el discurso dirigido a la tierra/territorio personificado.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה en la fórmula profética compuesta con אֲדֹנָי
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Señor Yahvé
  alternative_spanish_readings:
  - Señor Dios
  - el Señor Yahvé
  rationale: Sigo el criterio del proyecto de no ocultar el Nombre divino. En español, «Señor Yahvé» conserva el título reverente y hace visible יְהוָה sin caer en una traducción tradicional de máscara. Mantiene también la fuerza de la fórmula profética.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido cultual de בָּמוֹתֵיכֶם
  english_pob_reading: your high places
  chosen_spanish_reading: sus lugares altos
  alternative_spanish_readings:
  - sus lugares de culto
  - sus santuarios en las alturas
  rationale: No suavizo el término. «Lugares altos» mantiene la tensión histórica y teológica de los sitios de culto elevados, frecuentemente asociados con culto ilícito o sincretista.
  doctrine_reference: POB lexical note on בָּמוֹת / high places
translation_notes:
  revision_awareness: El borrador sigue la revisión inglesa más reciente que resolvió el énfasis de הִנְנִי אֲנִי como «I myself». En español lo reflejo con «yo mismo», evitando una repetición artificial y conservando la fuerza enfática. También tomo en cuenta el consenso alto del control cruzado, sin introducir cambios no motivados por la fuente.
  spanish_consistency_notes:
  - Usé «Yahvé» para יְהוָה de acuerdo con el criterio del proyecto.
  - Mantuve una sintaxis profética solemne pero fluida, evitando calcos innecesarios.
  - Conservo la distinción entre topografía física y sentido cultual en «lugares altos».
  - Elegí formas plurales naturales en español para el vocativo colectivo dirigido a la geografía de Israel.
