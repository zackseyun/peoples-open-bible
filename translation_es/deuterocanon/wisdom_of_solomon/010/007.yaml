revisions:
- from: cuyo maldad todavía tiene como testimonio un desierto humeante[a], plantas que dan fruto que nunca madura[b], y una columna de sal en pie como memorial de un alma incrédula.
  to: cuya maldad todavía tiene como testimonio una tierra yerma humeante[a], plantas que dan fruto que nunca madura, y una columna de sal en pie como memorial de un alma incrédula[b].
  rationale: Se corrigió el error gramatical 'cuyo maldad' a 'cuya maldad'; se ajustó χέρσος a 'tierra yerma' para reflejar mejor el sentido de terreno devastado o estéril; y se reemplazó la nota [b] por la alternativa léxica documentada para ἀπιστούσης, anclándola donde corresponde en 'alma incrédula'. Se mantuvo la decisión correcta de no añadir un equivalente temporal para ὥρας.
