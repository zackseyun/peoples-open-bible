review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido central del hebreo: Yahvé anuncia que quitará también a Judá de delante de sí, como hizo con Israel, y que rechazará la ciudad escogida y la casa asociada a su nombre. Conserva correctamente «Yahvé», «de delante de mí», la fuerza comparativa de «así como», y «la casa» para הַבַּיִת. Sin embargo, los marcadores de notas están invertidos respecto de sus anclajes: [a] aparece tras «dijo» pero su nota trata «la casa/el templo», mientras que [b] aparece tras «dije» pero su nota trata la lectura alternativa de «rechazaré». Además, la puntuación de la aposición «Jerusalén» puede afinarse para reflejar mejor la estructura del original.'
  spanish_quality_summary: 'El español es claro y digno, pero la frase mejora con una puntuación más natural y precisa: en español, la aposición explicativa se lee mejor entre rayas o comas bien resueltas, y la cita interna queda más limpia si la nota alternativa se ancla en «rechazaré» y la nota léxica en «la casa». También conviene evitar dos puntos antes de «Jerusalén» en esta construcción, ya que la aposición no introduce una explicación enumerativa sino identificación.'
  glossary_alignment: 'Buena alineación con el glosario del proyecto: יהוה -> «Yahvé»; הַבַּיִת -> «la casa» con alternativa «el templo» en nota; מאס -> «rechazaré», preservando la decisión teológica de fuerza futura. No hay conflictos terminológicos mayores; el ajuste requerido es de anclaje de notas y pulido de puntuación.'
  issues:
  - severity: high
    issue: Los marcadores de notas al pie están anclados a las palabras equivocadas.
    rationale: La nota [a] explica «la casa/el templo», pero en el borrador está colocada después de «dijo». La nota [b] explica la lectura alternativa de וּמָאַסְתִּי («rechazaré / he rechazado»), pero está colocada después de «dije». Esto rompe la trazabilidad del aparato y puede confundir al lector.
  - severity: medium
    issue: La puntuación de la aposición «Jerusalén» no refleja de la mejor manera el original ni el español natural.
    rationale: '«esta ciudad que escogí: Jerusalén» con dos puntos suena menos natural que una aposición entre rayas o comas. El inglés auditado usa rayas para marcar la aposición; en español también funciona bien «esta ciudad que escogí —Jerusalén—».'
  revised_spanish_text: 'Y Yahvé dijo: «También quitaré a Judá de delante de mí, así como quité a Israel; y rechazaré[a] esta ciudad que escogí —Jerusalén—, y la casa[b] de la cual dije: “Mi nombre estará allí”».'
  revised_footnotes:
