  revision_awareness: 'Se siguió el mismo criterio de la POB inglesa: conservar el carácter incompleto del fragmento griego y no completar la última cláusula. En el resto, se optó por equivalentes españoles naturales que mantienen la estructura participial y la repetición enfática de ''mismo/a''.'
  spanish_consistency_notes:
  - Se mantuvo 'hermanos' en masculino plural, siguiendo el valor explícito de ἀδελφοὶ.
  - '''Al mismo tiempo'' se eligió por naturalidad española frente a calcos más rígidos.'
  - Se preservó la repetición de 'mismo/a' para reflejar el paralelismo del griego.
  - No se introdujeron términos doctrinales ajenos; el pasaje es descriptivo y genealógico, no confesional.
