revisions:
- from: Así, todos los días de Noé fueron novecientos cincuenta años, y murió.
  to: Todos los días de Noé sumaron novecientos cincuenta años, y murió.
  rationale: Se elimina «Así» por no estar exigido por el hebreo y se sustituye «fueron» por «sumaron» para reflejar de manera más idiomática en español el valor resumitivo de וַיִּהְיוּ en una fórmula de longevidad. No se requieren notas al pie.
  reviewer_model: gpt-5.4
