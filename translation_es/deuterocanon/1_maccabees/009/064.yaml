translation:
  language: es
  text: Y vino y acampó contra Betbasi[a], y peleó contra ella durante muchos días, y construyó máquinas de asedio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «Bet-basi»; se mantiene una sola forma en el texto para la lectura pública.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθὼν
  english_pob_choice: he came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - y vino
  lexicon: LSJ
  rationale: El participio aoristo introduce la siguiente acción en la narración. En español, «vino» mantiene la secuencia narrativa con naturalidad; el añadido de «y» refleja el comienzo conjuntivo del griego.
- source_word: παρεβάλεν ἐπὶ
  english_pob_choice: encamped against
  chosen_spanish: acampó contra
  alternatives_spanish:
  - acampar contra
  - sitió
  lexicon: LSJ
  rationale: En contexto militar, la expresión indica disposición hostil frente a un lugar. «Acampó contra» conserva la imagen de campamento y el valor bélico, sin convertir de antemano la acción en un asedio pleno.
- source_word: Βεθβασί
  english_pob_choice: Bethbasi
  chosen_spanish: Betbasi
  alternatives_spanish:
  - Bethbasi
  - Bet-basi
  lexicon: transliteración
  rationale: Se conserva el nombre propio por transliteración. «Betbasi» se adapta a la ortografía española sin alterar la identificación del topónimo.
- source_word: ἐπολέμησεν αὐτήν
  english_pob_choice: fought against it
  chosen_spanish: peleó contra ella
  alternatives_spanish:
  - combatió contra ella
  - hizo guerra contra ella
  lexicon: LSJ
  rationale: πολεμέω expresa combatir o guerrear. «Peleó contra ella» es directo y mantiene la referencia a un conflicto sostenido con el lugar/persona gramatical del texto.
- source_word: ἡμέρας πολλὰς
  english_pob_choice: for many days
  chosen_spanish: por muchos días
  alternatives_spanish:
  - durante muchos días
  - muchos días
  lexicon: LSJ
  rationale: El acusativo de duración se rinde de forma idiomática con «por muchos días», preservando la extensión temporal.
- source_word: ἐποίησεν μηχανάς
  english_pob_choice: made siege engines
  chosen_spanish: construyó máquinas de asedio
  alternatives_spanish:
  - hizo máquinas de asedio
  - construyó aparatos de asedio
  - fabricó máquinas
  lexicon: LSJ
  rationale: μηχανάς, en contexto de sitio, se refiere a dispositivos o ingenios militares. «Máquinas de asedio» explicita la función bélica sin abandonar la fuerza del término; «construyó» refleja bien ἐποίησεν en este contexto.
translation_notes:
  revision_awareness: El texto griego y la traducción inglesa auditada concuerdan estrechamente; no se registran revisiones aplicadas y la versión española sigue ese perfil de alta correspondencia.
  spanish_consistency_notes:
  - Se mantiene el tono narrativo sobrio y militar del original.
  - Se evita el calco excesivo, pero se conserva la secuencia verbal del griego.
  - El nombre propio se translitera de forma consistente al español.
  - «Máquinas de asedio» explicita el sentido contextual de μηχανάς sin introducir una paráfrasis más amplia.
