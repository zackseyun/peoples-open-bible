revisions:
- from: La fianza[a] ha destruido a muchos que iban rectamente, y los ha sacudido como una ola del mar; ha expulsado a hombres poderosos de sus hogares, y anduvieron entre naciones extranjeras.
  to: La fianza[a] ha destruido a muchos que eran rectos, y los ha sacudido como una ola del mar; ha expulsado a hombres poderosos de sus hogares, y vagaron entre naciones extranjeras.
  rationale: Se revisa κατευθύνοντας a 'que eran rectos' para reflejar de forma más natural en español la lectura auditada 'upright'. Se cambia 'anduvieron' por 'vagaron' para expresar mejor el matiz de ἐπλανήθησαν en contexto de desplazamiento. En la nota, se corrige la alternativa no idiomática y se mejora levemente la explicación jurídica.
