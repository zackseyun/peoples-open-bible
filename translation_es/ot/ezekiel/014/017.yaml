review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia y el sentido del hebreo: caso condicional adicional, juicio por espada, decreto divino, y eliminación de vida humana y animal de la tierra. Conserva correctamente «una espada» en ambas ocurrencias y refleja la fuerza directiva de «que pase». Sin embargo, «sobre aquella tierra» atenúa el matiz adversativo de עַל en contexto de juicio, y «de ella corto al hombre y al animal» suena poco natural en español y coloca mal el complemento de «cortar de».'
  spanish_quality_summary: 'El texto es comprensible, pero presenta dos problemas de legibilidad: 1) «sobre aquella tierra» es menos idiomático que «contra aquella tierra» en contexto judicial; 2) «y de ella corto al hombre y al animal» resulta forzado en español bíblico moderno. Una redacción como «y corto de ella al hombre y al animal» preserva mejor la metáfora y mejora la sintaxis. También las notas están mal ancladas: [a] está puesto en «espada» aunque la nota explica el uso metafórico del término en general, y [b] está puesto en «corto» aunque la nota trata la expresión «hombre y animal».'
  glossary_alignment: No hay conflicto con la terminología global del proyecto. «espada», «tierra», «hombre» y «animal» son aceptables aquí. La decisión de mantener «hombre» en la fórmula fija coincide con la justificación auditada. La revisión propuesta mejora fidelidad contextual sin apartarse de la racionalidad léxica documentada.
  issues:
  - severity: medium
    issue: Preposición en «sobre aquella tierra»
    rationale: Aunque עַל puede traducirse literalmente «sobre», en este contexto de juicio el inglés auditado optó por «against». En español «contra aquella tierra» comunica mejor la fuerza hostil del juicio divino.
  - severity: medium
    issue: Sintaxis poco natural en «y de ella corto al hombre y al animal»
    rationale: El hebreo expresa «cortar de ella». En español, anteponer «de ella» al verbo aquí suena torpe. «Y corto de ella al hombre y al animal» preserva la imagen y es más natural.
  - severity: medium
    issue: Anclaje incorrecto de las notas
    rationale: La nota [b] explica «hombre y animal», pero el marcador está colocado en «espada/corto» en vez de la frase pertinente. Las notas deben anclarse exactamente donde corresponde.
  revised_spanish_text: 'O si yo traigo una espada[a] contra aquella tierra y digo: «Que pase una espada por la tierra», y corto de ella al hombre y al animal[b],'
  revised_footnotes:
