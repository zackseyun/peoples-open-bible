translation:
  language: es
  text: ¿Harás maravillas para los muertos? ¿Se levantarán los espíritus de los muertos[a] para alabarte? Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “las sombras” para “los espíritus de los muertos”; hebreo רְפָאִים, término poético para los muertos en el inframundo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלַמֵּתִים
  english_pob_choice: for the dead
  chosen_spanish: para los muertos
  alternatives_spanish:
  - para los difuntos
  - para los muertos de verdad
  lexicon: HALOT
  rationale: La partícula interrogativa con לַ marca aquí una pregunta retórica equivalente a “¿para los muertos?”. En español, “los muertos” es natural, breve y conserva la fuerza del cuestionamiento; “difuntos” es posible, pero algo más formal y menos directo en esta construcción.
- source_word: תַּעֲשֶׂה פֶּלֶא
  english_pob_choice: do you work wonders
  chosen_spanish: harás maravillas
  alternatives_spanish:
  - harás un milagro
  - obrarás maravillas
  lexicon: HALOT
  rationale: עשה con פֶּלֶא forma la idea de realizar actos extraordinarios de poder divino. “Maravillas” reproduce bien el campo semántico bíblico sin estrecharlo a “milagros”, y el futuro interrogativo español comunica la pregunta retórica del hebreo.
- source_word: אִם
  english_pob_choice: Do
  chosen_spanish: ¿
  alternatives_spanish:
  - si
  - acaso
  lexicon: HALOT
  rationale: Aquí אִם introduce una segunda pregunta retórica paralela, no una condición. En español se expresa mejor con otra interrogación directa que con “si”.
- source_word: רְפָאִים
  english_pob_choice: the departed spirits
  chosen_spanish: los espíritus de los difuntos
  alternatives_spanish:
  - las sombras
  - los refaítas
  - los muertos
  lexicon: HALOT
  rationale: En este contexto poético, רְפָאִים alude a los muertos en el ámbito de los muertos, con matiz de entidades difusas o sombrías. “Espíritus de los difuntos” conserva la referencia al estado de muerte y la ambigüedad poética, evitando tanto una lectura etnónima como una simplificación excesiva.
- source_word: יָק֤וּמוּ
  english_pob_choice: rise up
  chosen_spanish: se levantarán
  alternatives_spanish:
  - resucitarán
  - se pondrán de pie
  lexicon: HALOT
  rationale: קום aquí expresa levantarse o surgir desde la muerte/Seol en la imagen retórica. “Se levantarán” es idiomático y suficientemente literal; “resucitarán” introduciría una afirmación doctrinal más específica de la que el verso exige.
- source_word: יוֹד֬וּ/ךָ
  english_pob_choice: to praise you
  chosen_spanish: para alabarte
  alternatives_spanish:
  - para darte gracias
  - para confesarte
  lexicon: HALOT
  rationale: ידה en esta construcción puede abarcar dar gracias/alabar. Dado el paralelismo con el lenguaje de adoración del salmo, “alabarte” comunica bien el sentido devocional en español sin perder la posibilidad de gratitud implícita.
- source_word: סֶּלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  lexicon: HALOT
  rationale: Se translitera el término por su valor incierto y por la práctica estable en traducciones bíblicas; no conviene imponer una traducción especulativa.
theological_decisions:
- issue: Sentido de רְפָאִים en el ámbito de los muertos
  english_pob_reading: the departed spirits
  chosen_spanish_reading: los espíritus de los difuntos
  alternative_spanish_readings:
  - las sombras
  - los muertos
  rationale: La versión española conserva la tensión poética y el trasfondo del Seol sin resolver el término hacia una doctrina del estado intermedio. “Espíritus de los difuntos” mantiene la ambigüedad reverente y el carácter retórico de la pregunta.
  doctrine_reference: Preservar la tensión lexical y no sobreexplicar la condición de los muertos.
translation_notes:
  revision_awareness: Se siguió el texto hebreo consonante-vocalizado del WLC y el rastro auditado en inglés POB, manteniendo la pregunta retórica doble, la transliteración de Selah y la ambigüedad poética de רְפָאִים sin convertirla en una explicación doctrinal cerrada.
  spanish_consistency_notes:
  - Se prefirió “Yahvé” como convención del proyecto cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - Se mantuvo un registro bíblico claro y natural, evitando calcos como “hacer maravillas” donde el español exigía una formulación más fluida, pero sin perder la literalidad del paralelismo.
  - El tono de las preguntas conserva la queja/lamento del salmo.
