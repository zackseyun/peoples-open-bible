translation:
  language: es
  text: De David. Bendice, alma mía, a Yahvé, y todo mi interior[a], su santo nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «todo lo que está dentro de mí»; también «todas mis entrañas» o «todo mi ser interior».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Por David
  - Para David
  lexicon: HALOT
  rationale: El encabezamiento לְ con un nombre propio en los Salmos suele indicar asociación davídica. «De David» conserva esa ambigüedad sin forzar autoría o finalidad, y suena natural en español bíblico.
- source_word: בָּרֲכִי
  english_pob_choice: Bless
  chosen_spanish: Bendice
  alternatives_spanish:
  - Bendiga
  - Alaba
  lexicon: HALOT
  rationale: ברך en piel significa «bendecir». En la vocativa dirigida al alma, «Bendice» mantiene el valor léxico y la fuerza reverente mejor que «alaba».
- source_word: נַפְשִׁי
  english_pob_choice: O my soul
  chosen_spanish: alma mía
  alternatives_spanish:
  - mi alma
  - yo mismo
  - ser mío
  lexicon: HALOT
  rationale: נפש puede significar alma, vida, ser o interior. En el autoapóstrofe poético, «alma mía» conserva el tono vocativo natural del hebreo y es idiomático en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: La fuente hebrea usa directamente el Tetragrámaton. Siguiendo la norma del proyecto, se rinde como «Yahvé» para preservar el nombre propio del pacto, en vez de sustituirlo por un título.
- source_word: וְכָל קְרָבַי
  english_pob_choice: and all that is within me
  chosen_spanish: y todo lo que hay en mí
  alternatives_spanish:
  - y todas mis entrañas
  - y todo mi ser interior
  - y todo lo que está dentro de mí
  lexicon: HALOT
  rationale: קְרָבַי alude al interior, las entrañas o el ser interno. «Todo lo que hay en mí» comunica la totalidad interior sin sonar anatómico o arcaizante, y conserva la amplitud semántica.
- source_word: שֵׁם קָדְשׁוֹ
  english_pob_choice: his holy name
  chosen_spanish: su santo nombre
  alternatives_spanish:
  - su nombre santo
  - el nombre de su santidad
  - su nombre sagrado
  lexicon: HALOT
  rationale: La construcción hebrea significa literalmente «su nombre santo». «Su santo nombre» es la forma natural en español y conserva tanto la referencia al nombre como el atributo de santidad.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton, y la política del proyecto pide transliterarlo como «Yahvé». Se evita la sustitución litúrgica «el SEÑOR» para no enmascarar el nombre divino revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con la fuente hebrea y con la decisión auditada en inglés; no se registran revisiones textuales recientes ni cambios pendientes.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con la terminología del proyecto para el Tetragrámaton.
  - Se conserva un registro poético y reverente, evitando calcos rígidos que sonaran poco naturales en español.
  - La nota [a] preserva la alternativa semántica de קְרָבַי sin perder fluidez en el texto principal.
