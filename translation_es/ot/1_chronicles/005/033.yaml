lexical_decisions:
- source_word: מְרָיוֹת
  english_pob_choice: Meraioth
  chosen_spanish: Merayot
  alternatives_spanish:
  - Meraiot
  - Merayot
  lexicon: nombre propio transliterado
  rationale: Se translitera el nombre propio para conservar la forma bíblica hebrea; 'Merayot' refleja mejor la vocalización del hebreo que una adaptación demasiado castellanizada.
- source_word: הוֹלִיד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - engendró a
  - fue padre de
  - procreó
  lexicon: verbo genealogía / causativo de ילד
  rationale: En una genealogía, el hiphil de ילד expresa paternidad directa. En español, 'engendró' conserva el sentido genealógico y la relación paterna con mayor precisión que un giro más explicativo.
- source_word: אֲמַרְיָה
  english_pob_choice: Amariah
  chosen_spanish: Amarías
  alternatives_spanish:
  - Amarías
  - Amaríah
  lexicon: nombre propio transliterado
  rationale: Se mantiene el nombre propio con una transliteración española estable y pronunciable. 'Amarías' respeta la forma tradicional de nombres bíblicos en español sin perder claramente la referencia al hebreo.
- source_word: וַ/אֲמַרְיָה
  english_pob_choice: and Amariah
  chosen_spanish: y Amarías
  alternatives_spanish:
  - e Amarías
  lexicon: conjunción coordinante + nombre propio
  rationale: La conjunción waw se expresa con 'y', la coordinación más natural y fiel en español aquí.
- source_word: אֲחִיטוּב
  english_pob_choice: Ahitub
  chosen_spanish: Ahitub
  alternatives_spanish:
  - Ahituv
  lexicon: nombre propio transliterado
  rationale: Se conserva la forma bíblica reconocible en español. 'Ahitub' sigue la convención hispana habitual y evita introducir una variante menos asentada.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés muestran una genealogía simple sin variantes textuales o decisiones teológicas controvertidas; por eso la versión española mantiene una equivalencia directa y no añade notas.
  spanish_consistency_notes:
  - 'Se preserva la secuencia genealógica directa: sujeto + verbo + objeto propio en ambos miembros.'
  - Se evita 'becó' o fórmulas arcaicas para mantener español actual sin perder el tono bíblico.
  - Los nombres propios se mantienen transliterados de forma consistente dentro del patrón hispano bíblico.
