review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: una acción cultual de quemar/ofrecer incienso realizada en las entradas de las casas y en espacios públicos urbanos. También preserva correctamente la nota sobre la alternativa de ἐθυμίων y la amplitud semántica de πλατείαις. Sin embargo, «marcos de las puertas» sobreinterpreta θυρίδων frente al valor más amplio de ''doorways/entrances'', y «sobre los marcos» suena físicamente más específico y menos natural que el griego exige.'
  spanish_quality_summary: El español es claro, pero «sobre los marcos de las puertas de las casas» resulta algo rígido y arquitectónicamente cargado. «En las entradas de las casas» suena más natural y sigue siendo fiel al griego sin añadir detalle. El resto del verso es publicable y digno.
  glossary_alignment: No hay términos teológicos del glosario principal en juego. La decisión «quemaban incienso» concuerda con la pauta del POB y la nota alternativa «ofrecían incienso» está bien preservada. La nota sobre «calles»/«plazas públicas» también está alineada con el expediente inglés.
  issues:
  - severity: medium
    issue: «marcos de las puertas» sobreespecifica θυρίδων
    rationale: El expediente inglés eligió 'doorways' precisamente para evitar detalles arquitectónicos como 'doorposts'. «Marcos de las puertas» reintroduce esa precisión no exigida por la fuente.
  - severity: low
    issue: «sobre los marcos» suena menos natural en español
    rationale: Aunque ἐπί puede reflejarse con «sobre», en español bíblico moderno «en las entradas de las casas» comunica mejor la ubicación sin perder fidelidad contextual.
  revised_spanish_text: Y en las entradas de las casas y en las calles quemaban incienso[a][b].
