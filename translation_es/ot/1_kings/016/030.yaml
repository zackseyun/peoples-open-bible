revisions:
- from: Acab son de Omrí hizo lo malo[a] a los ojos de Yahvé, más que todos los que habían estado antes que él.
  to: Acab hijo de Omrí hizo lo malo a los ojos de Yahvé, más que todos los que lo precedieron.[a]
  rationale: Se reemplaza «son» por «hijo de» para un español más natural y digno. Se mantiene «hizo lo malo a los ojos de Yahvé» por fidelidad al modismo hebreo y a la terminología del proyecto. Se revisa la cláusula comparativa a «más que todos los que lo precedieron» para expresar con claridad y naturalidad el sentido de מִכֹּל אֲשֶׁר לְפָנָיו. Se elimina la nota redundante sobre «a los ojos de Yahvé» y se conserva una nota útil sobre la alternativa comparativa.
