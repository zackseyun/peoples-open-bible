translation:
  language: es
  text: Lo pondrás delante de Eleazar el sacerdote y delante de toda la congregación, y le encargarás[a] su comisión ante sus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'le ordenarás' o 'le darás cargo'. El verbo hebreo puede significar 'ordenar'; aquí probablemente se refiere a confiarle públicamente a Josué su comisión o encargo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַעֲמַדְתָּ
  english_pob_choice: you shall set
  chosen_spanish: lo pondrás delante
  alternatives_spanish:
  - lo presentarás delante
  - lo colocarás delante
  - lo establecerás delante
  lexicon: HALOT
  rationale: El causativo de עמד aquí expresa poner a alguien en posición o presentarlo ante otros. En español, 'poner delante' comunica con naturalidad el acto formal sin introducir una interpretación excesiva.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: '''Delante de'' conserva la idea espacial y ceremonial de estar ante una autoridad o una asamblea, y suena claro en español moderno.'
- source_word: אֶלְעָזָר
  english_pob_choice: Eleazar
  chosen_spanish: Eleazar
  lexicon: convención onomástica
  rationale: Nombre propio transliterado de forma estándar.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficial
  - el sacerdote principal
  lexicon: HALOT
  rationale: '''כהן'' designa el oficio sacerdotal. En español, ''sacerdote'' es el equivalente natural y transparente en este contexto.'
- source_word: כָּל הָעֵדָה
  english_pob_choice: all the congregation
  chosen_spanish: toda la congregación
  alternatives_spanish:
  - toda la asamblea
  - toda la comunidad
  lexicon: HALOT
  rationale: '''עֵדָה'' se refiere al cuerpo reunido de Israel. ''Congregación'' preserva ese sentido colectivo y formal, y coincide con el registro bíblico común sin perder claridad.'
- source_word: וְצִוִּיתָה
  english_pob_choice: you shall commission
  chosen_spanish: lo comisionarás
  alternatives_spanish:
  - lo encargarás
  - lo mandarás
  - le darás comisión
  lexicon: HALOT
  rationale: En este pasaje el verbo צוה no es solo 'mandar', sino realizar una investidura o encargo público. 'Comisionar' refleja mejor la instalación formal de Josué sin borrar la fuerza autorizativa del verbo.
- source_word: לְעֵינֵיהֶם
  english_pob_choice: in their sight
  chosen_spanish: a su vista
  alternatives_spanish:
  - ante sus ojos
  - en su presencia
  lexicon: HALOT
  rationale: La expresión idiomática hebrea indica publicidad visible para todos. 'A su vista' mantiene esa idea de acto observado públicamente.
theological_decisions:
- issue: 'Naturaleza del acto con Josué: mandato o comisión pública'
  english_pob_reading: Render צוה in this context as 'commission' rather than the more general 'command.'
  chosen_spanish_reading: Traducir צוה como 'comisionar' en vez de 'mandar' o 'ordenar'
  alternative_spanish_readings:
  - mandar
  - ordenar
  - encargar
  rationale: El contexto describe una instalación pública ante Eleazar y toda la congregación. 'Comisionar' conserva la autoridad del acto y resalta su carácter oficial y visible, evitando reducirlo a un simple mandato verbal.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto hebreo masorético y con el audit trail inglés; no se observaron revisiones aplicadas en el pasaje base, por lo que la traducción sigue la decisión de alta concordancia sin cambios sustantivos.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto fuente lo requiera explícitamente; este versículo no contiene el nombre divino.
  - '''Congregación'' se usa como término bíblico colectivo consistente con el registro del POB.'
  - '''Comisionar'' se reserva para el acto formal de investidura; no se usa como sinónimo genérico de ''mandar''.'
