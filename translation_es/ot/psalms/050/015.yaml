translation:
  language: es
  text: Y clámame en el día de la angustia; yo te libraré[a], y tú me honrarás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me glorificarás». El verbo hebreo puede significar «honrar» o «glorificar».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּקְרָאֵנִי
  english_pob_choice: And call on me
  chosen_spanish: Y clámame
  alternatives_spanish:
  - Y llámame
  - Y invócame
  lexicon: HALOT
  rationale: קרא con objeto directo y en contexto de ayuda divina expresa una llamada a Dios en oración/invocación. «Clámame» mantiene ese valor apelativo con registro digno y breve; «llámame» suena más neutral pero puede debilitar el matiz de súplica, y «invócame» es válido pero más técnico.
- source_word: בְּיוֹם
  english_pob_choice: in the day of
  chosen_spanish: en el día de
  alternatives_spanish:
  - el día de
  - cuando
  lexicon: HALOT
  rationale: La expresión hebrea es temporal y literal; «en el día de» conserva la forma del hebreo sin volverlo extraño en español. «Cuando» sería más libre y menos transparente.
- source_word: צָרָה
  english_pob_choice: distress
  chosen_spanish: la angustia
  alternatives_spanish:
  - la aflicción
  - la tribulación
  - la adversidad
  lexicon: HALOT
  rationale: צָרָה abarca angustia, apuro, aflicción o calamidad. «Angustia» comunica bien la presión y gravedad del término en español actual; las otras opciones son posibles, pero «angustia» mantiene un tono natural y serio.
- source_word: אֲחַלֶּצְךָ
  english_pob_choice: I will deliver you
  chosen_spanish: yo te libraré
  alternatives_spanish:
  - yo te rescataré
  - yo te sacaré
  lexicon: HALOT
  rationale: El piel de חלץ aquí significa liberar o rescatar de peligro. «Libraré» es una forma clara y tradicional en español bíblico, compatible con la fuerza del verbo sin sonar mecánica; «rescataré» también es posible, y «sacaré» refleja el valor más literal de «arrancar/sacar» pero es menos preciso aquí.
- source_word: וּתְכַבְּדֵנִי
  english_pob_choice: and you will honor me
  chosen_spanish: y tú me honrarás
  alternatives_spanish:
  - y tú me glorificarás
  - y me darás honor
  lexicon: HALOT
  rationale: כבד en piel puede significar honrar o glorificar. «Honrarás» preserva el sentido amplio que el POB inglés eligió con «honor me»; «glorificarás» es una alternativa válida, pero en español puede sonar más litúrgica o interpretativa.
theological_decisions:
- issue: Respuesta debida a Dios después de la liberación
  english_pob_reading: and you will honor me
  chosen_spanish_reading: y tú me honrarás
  alternative_spanish_readings:
  - y tú me glorificarás
  rationale: El verso presenta la liberación divina como seguida por el reconocimiento debido a Dios. «Honrarás» conserva esa respuesta relacional y reverente sin limitarla a una fórmula doxológica específica; «glorificarás» sigue siendo una lectura posible, pero más especializada en el oído español.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'El texto hebreo y el audit trail inglés están en alto acuerdo y no muestran revisiones aplicadas. La versión española sigue la misma decisión lexical central: invocación a Dios, liberación en contexto de angustia y respuesta de honra; solo ajusta el registro al español natural.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; este versículo no lo contiene.
  - Se mantiene «honrar» como equivalente principal de כבד, alineado con la opción inglesa «honor», dejando «glorificar» como alternativa anotada.
  - «Clámame» conserva el carácter de súplica/invocación de קרא en este contexto.
  - Se evitó «aflicción» como principal porque el contexto pide una formulación más inmediata y idiomática en español, sin perder gravedad.
