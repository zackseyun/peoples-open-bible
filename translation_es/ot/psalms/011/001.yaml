review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo y el audit trail inglés en los puntos principales: encabezado de superscripción, «De David», uso de «Yahvé», valor perfectivo de חָסִיתִי, «a mi alma» para לְנַפְשִׁי, y la dificultad del imperativo final. Sin embargo, hay un desajuste gramatical importante: el hebreo tiene imperativo plural נודו y sufijo plural «vuestro monte»/«su monte de ustedes» en הַרְכֶם, mientras que el borrador cita «Huye ... a tu monte» en singular. Aunque el inglés auditado también usa singular idiomático, en español eso crea una incongruencia más notoria con «pueden decir» y conviene reflejar el plural del interlocutor en la cita.'
  spanish_quality_summary: El español es claro y digno, pero la nota [a] es defectuosa porque presenta como alternativa literal exactamente la misma frase ya usada en el texto. Además, «pájaro» es entendible, pero «ave» suena un poco más bíblico y amplio en registro. La principal mejora es alinear número gramatical y afinar las notas.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יהוה -> «Yahvé» correctamente; no hay conflicto con términos teológicos mayores. «Alma» preserva bien נֶפֶשׁ según la revisión inglesa. «Director del coro» es aceptable para לַמְנַצֵּחַ, aunque la nota actual no aporta una verdadera alternativa.'
  issues:
  - severity: high
    issue: La cita directa usa singular («Huye ... a tu monte») donde el hebreo presenta formas plurales.
    rationale: נודו es imperativo 2mp y הַרְכֶם lleva sufijo 2mp. En español, mantener el plural («Huyan ... a su monte») preserva mejor el dato fuente y evita tensión con «pueden decir». Si se quisiera singularizar por idiomaticidad, habría que justificarlo mejor en nota, pero aquí no es necesario.
  - severity: medium
    issue: La nota [a] no funciona como nota de alternativa.
    rationale: 'Dice «O más literalmente: “para el director del coro”», que repite exactamente el texto principal y no añade información útil. Debe ofrecer una alternativa real, como «Al músico principal».'
  - severity: low
    issue: «Pájaro» es natural, pero «ave» encaja mejor con el registro bíblico general.
    rationale: No es error de fidelidad, pero «como un ave» suena más amplio y digno en español eclesial que «como un pájaro», sin perder claridad.
  revised_spanish_text: 'Para el director del coro.[a] De David. En Yahvé me he refugiado; ¿cómo pueden decir a mi alma[b]: «Huyan como un ave a su monte»?'
  revised_footnotes:
  - marker: a
    text: 'O también: «Al músico principal».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Huyan a su monte, ave», o posiblemente «Huyan como un ave a su monte». El hebreo es difícil.'
    reason: alternative_reading
  revision_rationale: Se corrige la cita final para reflejar las formas plurales del hebreo, se reemplaza una nota defectuosa por una alternativa real para la superscripción, y se afina el registro de «pájaro» a «ave» sin apartarse del sentido documentado.
