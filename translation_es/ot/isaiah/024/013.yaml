translation:
  language: es
  text: 'Porque así será en medio de la tierra, entre los pueblos: como el vareo de un olivo[a], como rebuscos[b] cuando la vendimia ha terminado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como el sacudimiento de un olivo». La imagen hebrea es la de golpear o sacudir el árbol para que queden solo unas pocas aceitunas.
    reason: lexical_alternative
  - marker: b
    text: O «como rebuscos después de que la vendimia ha terminado».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación o fundamento de lo dicho antes; «Porque» conserva esa relación causal/discursiva en español de manera natural.
- source_word: כֹה
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - de esta manera
  lexicon: HALOT
  rationale: Adverbio de manera; «así será» reproduce la sencillez del hebreo sin sobrecargar el verso.
- source_word: יִהְיֶה
  english_pob_choice: it will be
  chosen_spanish: será
  alternatives_spanish:
  - habrá de ser
  - va a ser
  lexicon: HALOT
  rationale: El futuro simple expresa bien el valor predicativo de היה en este contexto.
- source_word: בְּקֶרֶב הָאָרֶץ
  english_pob_choice: in the midst of the earth
  chosen_spanish: en medio de la tierra
  alternatives_spanish:
  - en el corazón de la tierra
  - en medio del país
  lexicon: HALOT
  rationale: קֶרֶב indica interior o medio; aquí se mantiene «tierra» para reflejar el alcance amplio del oráculo, como en el inglés POB.
- source_word: בְּתוֹךְ הָעַמִּים
  english_pob_choice: among the peoples
  chosen_spanish: entre los pueblos
  alternatives_spanish:
  - entre las naciones
  - en medio de los pueblos
  lexicon: HALOT
  rationale: עַמִּים puede ser «pueblos» o «naciones»; «pueblos» conserva el plural étnico sin forzar un matiz político.
- source_word: כְּנֹקֶף זַיִת
  english_pob_choice: like the beating of an olive tree
  chosen_spanish: como el vareo de un olivo
  alternatives_spanish:
  - como el golpeo de un olivo
  - como la sacudida de un olivo
  lexicon: HALOT
  rationale: נֹקֶף alude al acto de golpear o varear el árbol para desprender las aceitunas. «Vareo» comunica esa imagen agrícola con precisión en español natural.
- source_word: כְּעוֹלֵלֹת
  english_pob_choice: like gleanings
  chosen_spanish: como rebuscos
  alternatives_spanish:
  - como espigaduras
  - como restos para rebusco
  lexicon: HALOT
  rationale: עוֹלֵלֹת designa lo que queda para el rebusco tras la cosecha principal; «rebuscos» transmite bien la idea de lo poco que queda.
- source_word: אִם כָּלָה בָצִיר
  english_pob_choice: when the grape harvest is finished
  chosen_spanish: cuando la vendimia ha terminado
  alternatives_spanish:
  - cuando acaba la cosecha de uvas
  - cuando se ha acabado la vendimia
  lexicon: HALOT
  rationale: Aquí אִם funciona temporalmente, no condicionalmente. בָצִיר se refiere específicamente a la vendimia; «ha terminado» conserva el sentido de finalización del inglés POB.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca la lectura aprobada del POB inglés y su nota auditada: mantiene el valor temporal de אִם en «cuando», conserva la metáfora agrícola de las pocas aceitunas que quedan tras varear el olivo y la de los rebuscos al final de la vendimia, sin suavizar la fuerza imagética del hebreo.'
  spanish_consistency_notes:
  - Se prefirió «tierra» en lugar de «país» para mantener el alcance amplio del hebreo y la decisión del POB inglés.
  - «Pueblos» se usó para respetar el plural colectivo de עַמִּים sin imponer una lectura exclusivamente nacional.
  - «Vareo» y «rebuscos» son términos agrícolas precisos y naturales en español; se evitaron equivalentes más literales pero menos claros.
  - Se conservó «cuando» para אִם, siguiendo la función temporal documentada en el audit trail en vez de una condicional española.
