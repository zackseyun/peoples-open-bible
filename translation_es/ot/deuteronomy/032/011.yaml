base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/032/011.yaml
  text: Like an eagle that stirs up its nest[a], that hovers over its young, he spreads out his wings, takes him[c][b], and carries him on his pinions.
  footnotes:
  - marker: a
    text: Or 'like a vulture,' since the Hebrew נֶשֶׁר can denote a large carrion bird or eagle-like raptor.
    reason: lexical_alternative
  - marker: b
    text: Or 'fluttering over its young' or 'brooding over its young.'
    reason: lexical_alternative
  - marker: c
    text: '''Pinions'' refers to the outer wing feathers; more generally, ''wings.'''
    reason: lexical_alternative
  ai_draft:
