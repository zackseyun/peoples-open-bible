translation:
  text: And this man[a], Pharaoh’s chief cook, entrusted his house to me. And I struggled against a shameless woman who kept pressing me to transgress with her, but the God of my father rescued me from a burning flame. I was imprisoned, I was beaten, I was mocked; and the Lord gave me compassion in the sight of the jailer. For the Lord does not abandon those who fear him, not in darkness, or chains, or afflictions, or distress[b]. For God is not ashamed like a man, nor does he grow fearful like a son of man, nor, like one born of earth, does he become weak or terrified. But in all these things he takes the lead[c], and in various ways he gives comfort.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Some witnesses or interpreters understand ἀρχιμάγειρος as an official court title rather than a strictly culinary role; compare the Genesis narrative about Joseph in Egypt.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'from a burning flame' is likely metaphorical for the consuming danger of sexual temptation, though the Greek leaves the image itself unexpanded.
    reason: lexical_alternative
  - marker: c
    text: '''He stands over us'' may also be understood as ''he stands by us'' or ''he takes the lead for us''; the Greek verb can carry several related senses of leadership and care.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀρχιμάγειρος
  chosen: chief cook
  alternatives:
  - chief steward
  - captain of the guard
  lexicon: LSJ
  rationale: The Greek compound is literally related to cooking rather than military command. Although the Genesis/Potiphar tradition may suggest an official title, this chapter’s Greek witness names the office in culinary terms, so 'chief cook' preserves source transparency.
- source_word: ἠγωνισάμην
  chosen: I struggled
  alternatives:
  - I contended
  - I fought
  lexicon: LSJ
  rationale: The verb conveys active moral contest, fitting Joseph’s resistance to seduction. 'Struggled' preserves the ethical and personal force without sounding overly martial.
- source_word: γυναῖκα ἀναιδῆ
  chosen: a shameless woman
  alternatives:
  - an impudent woman
  - a brazen woman
  lexicon: LSJ
  rationale: ἀναιδής denotes lack of shame or modest restraint. 'Shameless' is direct, idiomatic, and preserves the moral evaluation in the testamentary voice.
- source_word: ἐπείγουσάν με παρανομεῖν μετʼ αὐτῆς
  chosen: who kept pressing me to transgress with her
  alternatives:
  - urging me to act lawlessly with her
  - pressing me to sin with her
  lexicon: LSJ
  rationale: The participle plus infinitive expresses repeated pressure. παρανομεῖν is more literally 'to transgress/act unlawfully' than simply 'commit adultery,' so 'transgress with her' keeps the broader moral-legal sense.
- source_word: ἐρρύσατό με ἐκ φλογὸς καιομένης
  chosen: rescued me from a burning flame
  alternatives:
  - delivered me from blazing fire
  - saved me from a consuming flame
  lexicon: LSJ
  rationale: The phrase is metaphorical in context, describing the danger of lust and temptation. 'Burning flame' preserves the vivid image without over-explaining it.
- source_word: ἐφυλακίσθην
  chosen: I was imprisoned
  alternatives:
  - I was put in prison
  - I was jailed
  lexicon: LSJ
  rationale: A straightforward passive; 'imprisoned' is elevated but readable and suits the testament style.
- source_word: ἐτύφθην
  chosen: I was beaten
  alternatives:
  - I was struck
  - I was flogged
  lexicon: LSJ
  rationale: The verb indicates being physically struck. 'Beaten' is clear and strong without specifying a form of punishment the Greek does not explicitly name.
- source_word: ἐξεμυκτηρίσθην
  chosen: I was mocked
  alternatives:
  - I was ridiculed
  - I was treated with contempt
  lexicon: LSJ
  rationale: The verb carries the sense of derision or sneering contempt. 'Mocked' is concise and fits the rhetorical sequence.
- source_word: ἔδωκέ με ... εἰς οἰκτιρμούς
  chosen: gave me compassion
  alternatives:
  - granted me mercy
  - gave me favor
  lexicon: LSJ
  rationale: The idiom means causing someone to receive compassionate treatment. 'Gave me compassion in the sight of the jailer' preserves the concrete Greek construction better than smoothing to 'gave me favor,' though the sense overlaps.
- source_word: δεσμοφύλακος
  chosen: jailer
  alternatives:
  - keeper of the prison
  - prison guard
  lexicon: LSJ
  rationale: A natural English equivalent for the prison custodian; concise and contextually clear.
- source_word: τοὺς φοβουμένους αὐτόν
  chosen: those who fear him
  alternatives:
  - those who revere him
  - those who stand in awe of him
  lexicon: BDAG
  rationale: The testament tradition regularly uses fear-of-God language in a covenantal and ethical sense. 'Fear him' preserves the traditional theological register and the source wording.
- source_word: δεσμοῖς
  chosen: chains
  alternatives:
  - bonds
  - imprisonment
  lexicon: LSJ
  rationale: The plural concrete noun heightens the sequence of hardships. 'Chains' is vivid and preserves the imagery better than the more abstract 'imprisonment.'
- source_word: θλίψεσιν
  chosen: afflictions
  alternatives:
  - tribulations
  - troubles
  lexicon: BDAG
  rationale: The term denotes pressures and sufferings. 'Afflictions' keeps the elevated paraenetic tone while remaining understandable.
- source_word: ἀνάγκαις
  chosen: distress
  alternatives:
  - necessities
  - hardships
  - constraints
  lexicon: BDAG
  rationale: In this hardship list, the experiential sense of pressing distress fits better than the more literal but potentially misleading 'necessities.'
- source_word: δειλιᾷ
  chosen: grow fearful
  alternatives:
  - lose courage
  - be cowardly
  lexicon: LSJ
  rationale: The verb denotes shrinking back in fear. 'Grow fearful' reads naturally in parallel with the surrounding clauses.
- source_word: γηγενής
  chosen: one born of earth
  alternatives:
  - earthborn man
  - mortal
  lexicon: LSJ
  rationale: The expression emphasizes creatureliness and earthly limitation. 'One born of earth' preserves the image and rhetorical contrast with God.
- source_word: πτοεῖται
  chosen: become ... terrified
  alternatives:
  - be alarmed
  - be shaken
  lexicon: LSJ
  rationale: The verb conveys agitation or fright. 'Terrified' gives the full force of the climactic denial about God.
- source_word: προΐσταται
  chosen: he stands over us
  alternatives:
  - he presides
  - he stands by
  - he takes the lead
  lexicon: BDAG
  rationale: The verb can mean to stand before, lead, or care for. In context of divine help amid suffering, 'stands over us' preserves the protective, overseeing nuance without collapsing it into a single interpretive gloss.
- source_word: παρακαλεῖ
  chosen: he gives comfort
  alternatives:
  - he encourages
  - he consoles
  lexicon: BDAG
  rationale: The verb here points to divine consolation in suffering. 'Gives comfort' is idiomatic and fits the sequence of God’s sustaining action.
