  text: שְׁמָר תָּ֭ם וּ/רְאֵ֣ה יָשָׁ֑ר כִּֽי אַחֲרִ֖ית לְ/אִ֣ישׁ שָׁלֽוֹם־־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/037/037.yaml
  text: Observe the blameless[a], and see the upright[c][b], for there is a future for the man of peace.
  footnotes:
  - marker: a
    text: Or 'Mark the blameless, and behold the upright.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew אַחֲרִית can also mean 'end' or 'outcome'; some understand it here as 'posterity.'
    reason: lexical_alternative
  - marker: c
    text: Or 'for the peaceable man'; שָׁלוֹם can also carry the sense of well-being or wholeness.
    reason: lexical_alternative
