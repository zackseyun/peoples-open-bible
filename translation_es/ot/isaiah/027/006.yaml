translation:
  language: es
  text: En los días venideros[a] Jacob echará raíces; Israel brotará y florecerá, y llenarán la faz del mundo de fruto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Los que vienen». El hebreo inicial puede leerse más literalmente como «los que vienen», pero aquí probablemente funciona de manera idiomática como referencia temporal: «en los días venideros».'
    reason: alternative_reading
  - marker: b
    text: «Fruto» también puede traducirse «producto» o «rendimiento».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבָּאִים
  english_pob_choice: In days to come
  chosen_spanish: En los días venideros
  alternatives_spanish:
  - En los días que vienen
  - En los días por venir
  - Los que vienen
  lexicon: HALOT
  rationale: El participio con artículo funciona de manera temporal e idiomática en el contexto, no como un sustantivo que identifique a un grupo. «En los días venideros» conserva el valor prospectivo y suena natural en español bíblico moderno.
- source_word: יַשְׁרֵשׁ
  english_pob_choice: will take root
  chosen_spanish: echará raíces
  alternatives_spanish:
  - tendrá raíz
  - arraigará
  - hará echar raíces
  lexicon: HALOT
  rationale: El verbo en hifil puede tener fuerza causativa, pero en el poema la imagen agrícola presenta a Jacob como planta que se establece. «Echará raíces» comunica bien esa imagen en español sin forzar una construcción más pesada.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - los descendientes de Jacob
  - la casa de Jacob
  lexicon: nombre propio
  rationale: Se conserva el nombre propio porque el paralelo poético con Israel debe mantenerse y el texto no expande explícitamente a una paráfrasis explicativa.
- source_word: יָצִיץ
  english_pob_choice: will blossom
  chosen_spanish: florecerá
  alternatives_spanish:
  - brotará
  - despuntará
  - y dará flor
  lexicon: HALOT
  rationale: El verbo expresa brotar o florecer. En español, «florecerá» resume con naturalidad la primera imagen del crecimiento vegetal y armoniza con «brotará» en el paralelismo.
- source_word: וּפָרַח
  english_pob_choice: and flower
  chosen_spanish: brotará
  alternatives_spanish:
  - florecerá
  - y dará flor
  - y florecerá
  lexicon: HALOT
  rationale: Para evitar un calco poco idiomático como «y flower», se usa un verbo natural que conserva la imagen de expansión vegetal. «Brotará» mantiene el movimiento ascendente del hebreo y acompasa el paralelismo con «florecerá».
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  - la casa de Israel
  lexicon: nombre propio
  rationale: 'Se retiene el nombre propio por la misma razón que con Jacob: el paralelismo poético y el sentido corporativo están ya presentes sin necesidad de explicitarse en el texto principal.'
- source_word: וּמָלְאוּ
  english_pob_choice: and they will fill
  chosen_spanish: y llenarán
  alternatives_spanish:
  - y ellos llenarán
  - y colmarán
  - y llenarán de lleno
  lexicon: HALOT
  rationale: El plural pasa a una referencia colectiva. En español, el sujeto puede sobreentenderse por la flexión verbal; «llenarán» evita redundancia y conserva la fluidez poética.
- source_word: פְנֵי תֵבֵל
  english_pob_choice: the face of the world
  chosen_spanish: la faz del mundo
  alternatives_spanish:
  - la superficie del mundo
  - el mundo entero
  - la faz de la tierra
  lexicon: HALOT
  rationale: «Faz» preserva la imagen hebrea de פני, y «mundo» representa תבל como el mundo habitado. Esta combinación mantiene el registro poético sin sustituir la metáfora por una explicación más abstracta.
- source_word: תְּנוּבָה
  english_pob_choice: fruit
  chosen_spanish: fruto
  alternatives_spanish:
  - produce
  - rendimiento
  - cosecha
  lexicon: HALOT
  rationale: «Fruto» es la opción más natural en español para la imagen vegetal y permite mantener el paralelo con el resto del versículo. Aunque también puede significar produce o rendimiento, aquí la metáfora agraria es clara.
theological_decisions:
- issue: Valor corporativo de Jacob e Israel en paralelo poético
  english_pob_reading: Jacob/Israel are rendered as the covenant people personified, without making the corporate sense explicit in the main text.
  chosen_spanish_reading: Jacob e Israel se mantienen como nombres propios personificados, dejando que el paralelismo poético exprese el sentido colectivo.
  alternative_spanish_readings:
  - los descendientes de Jacob e Israel
  - la nación de Israel
  rationale: El hebreo usa los nombres directamente y el poema de crecimiento agrícola describe al pueblo del pacto como una sola planta. Explicitar la colectividad en el texto principal añadiría interpretación que el original no obliga a poner en primer plano.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La versión española sigue el pasaje final del POB inglés sin cambios de revisión relevantes; se mantiene la decisión idiomática para הַבָּאִים y la metáfora agrícola para el cierre.
  spanish_consistency_notes:
  - Se conservan los nombres propios Jacob e Israel para respetar el paralelismo hebreo.
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se opta por un español bíblico moderno, con imágenes corporales y agrícolas sin sobreexplicación.
