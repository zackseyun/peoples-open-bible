translation:
  language: es
  text: El que persigue la ganancia no quedará sin castigo[a][b][c], y el que ama el provecho se extraviará por ello.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo conservado dice un dicho sobre perseguir la ganancia y amar el provecho. El paralelo griego en este versículo, en cambio, dice: «Las adivinaciones, los agüeros y los sueños son vanos, y el corazón imagina como el de una mujer en labor». Esto parece reflejar una tradición textual sustancialmente distinta.'
    reason: textual_variant
  - marker: b
    text: También puede entenderse «riqueza» u «oro» para «ganancia» en la primera cola; el término hebreo puede designar más específicamente riqueza material.
    reason: lexical_alternative
  - marker: c
    text: O «precio» o «pago» para «provecho» en la segunda cola.
    reason: lexical_alternative
lexical_decisions:
- source_word: רודף
  english_pob_choice: pursues
  chosen_spanish: persigue
  alternatives_spanish:
  - corre tras
  - sigue tras
  - anda tras
  lexicon: HALOT
  rationale: El participio expresa una búsqueda activa y continua; «persigue» mantiene ese matiz y suena natural en español sapiencial.
- source_word: חרוץ
  english_pob_choice: gain
  chosen_spanish: ganancia
  alternatives_spanish:
  - riqueza
  - oro
  - dinero
  lexicon: HALOT
  rationale: En este contexto, el sustantivo apunta a provecho material. «Ganancia» conserva el alcance económico sin restringirlo a un metal específico.
- source_word: לא ינקה
  english_pob_choice: will not go unpunished
  chosen_spanish: no quedará sin castigo
  alternatives_spanish:
  - no quedará inocente
  - no será absuelto
  - no escapará al castigo
  lexicon: HALOT
  rationale: La expresión idiomática comunica la consecuencia judicial/moral de no salir libre de sanción; «sin castigo» es claro y fiel en español.
- source_word: אוהב
  english_pob_choice: one who loves
  chosen_spanish: el que ama
  alternatives_spanish:
  - quien ama
  - el amante de
  - el que desea
  lexicon: HALOT
  rationale: El participio substantivado se vierte de manera genérica con «el que ama», preservando el paralelismo con la primera cola.
- source_word: מחיר
  english_pob_choice: profit
  chosen_spanish: provecho
  alternatives_spanish:
  - beneficio
  - precio
  - pago
  lexicon: HALOT
  rationale: Aunque puede significar «precio» o «pago», aquí el sentido sapiencial es el de ventaja económica; «provecho» recoge ese valor sin sonar demasiado técnico.
- source_word: בו
  english_pob_choice: by it
  chosen_spanish: por ello
  alternatives_spanish:
  - por eso
  - con ello
  - a causa de ello
  lexicon: HALOT
  rationale: 'El sufijo pronominal funciona causal/instrumentalmente: el apego al provecho termina siendo el medio de la desviación. «Por ello» es natural en español.'
- source_word: ישגה
  english_pob_choice: will go astray
  chosen_spanish: se extraviará
  alternatives_spanish:
  - errará
  - se desviará
  - irá por mal camino
  lexicon: HALOT
  rationale: El verbo expresa desviación moral y práctica. «Se extraviará» conserva la idea de perder el rumbo sin añadir agencia externa que el hebreo no exige.
theological_decisions:
- issue: Preferencia del testimonio hebreo frente al paralelo griego muy divergente
  english_pob_reading: Translate from the extant Hebrew witness for this verse, while noting that the Greek parallel reads a substantially different saying about divinations, omens, dreams, and the heart of a woman in labor.
  chosen_spanish_reading: Traducir el hebreo conservado y documentar que el paralelo griego ofrece un dicho distinto sobre adivinaciones, agüeros, sueños y el corazón como el de una mujer en labor.
  alternative_spanish_readings:
  - 'Tomar el contenido del griego y traducir: «Las adivinaciones, los agüeros y los sueños son vanos…»'
  - Intentar armonizar ambos textos en una sola lectura
  rationale: La política del proyecto exige traducir el testimonio hebreo cuando existe, pero sin ocultar la divergencia textual mayor con el griego. Aquí no se trata de una variante menor, sino de tradiciones sustancialmente distintas, por lo que debe registrarse explícitamente.
  doctrine_reference: 'PHILOSOPHY.md: Hebrew Sirach is translated from Hebrew where it survives; preserve source uncertainty honestly.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; se conserva la solución previamente aceptada, manteniendo la prioridad del hebreo con la nota explícita sobre el fuerte desajuste con el griego.
  spanish_consistency_notes:
  - Se conserva una sintaxis paralela de dos miembros con sujeto genérico («el que…»), acorde con el hebreo y con la formulación sapiencial.
  - «Ganancia» y «provecho» distinguen los dos sustantivos hebreos sin borrar su solapamiento semántico.
  - La nota textual deja constancia de la tradición griega divergente sin incorporarla al texto principal.
  - Se evita «SEÑOR» o «Cristo» porque no corresponden a este versículo ni al testimonio base.
