translation:
  language: es
  text: Pero en cuanto a los gentiles que han creído, nosotros les enviamos aviso[a], habiendo decidido que se guarden de lo sacrificado a los ídolos[c], y de sangre, y de lo estrangulado, y de inmoralidad sexual.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «les enviamos mensaje»; el verbo griego «enviamos» deja implícito el objeto, aunque el contexto remite al decreto o carta enviada en Hechos 15.'
    reason: lexical_alternative
  - marker: c
    text: Es decir, alimentos asociados con sacrificios idólatras.
    reason: cultural_note
lexical_decisions:
- source_word: περὶ δὲ
  english_pob_choice: But concerning
  chosen_spanish: Pero en cuanto a
  alternatives_spanish:
  - Ahora bien, en cuanto a
  - Y en cuanto a
  lexicon: BDAG
  rationale: La expresión introduce el tema tratado y δέ marca una transición leve; «pero en cuanto a» conserva ambas funciones de modo natural en español.
- source_word: τῶν πεπιστευκότων ἐθνῶν
  english_pob_choice: the Gentiles who have believed
  chosen_spanish: los gentiles que han creído
  alternatives_spanish:
  - los gentiles creyentes
  - los gentiles que son creyentes
  lexicon: BDAG
  rationale: El participio perfecto comunica gente que ha llegado a creer y permanece en ese estado; la cláusula relativa en español preserva esa fuerza sin sonar forzada.
- source_word: ἡμεῖς
  english_pob_choice: we
  chosen_spanish: nosotros
  alternatives_spanish:
  - nosotros mismos
  lexicon: BDAG
  rationale: El pronombre explícito enfatiza la acción ya tomada por los apóstoles y ancianos; «nosotros» reproduce el énfasis de forma directa.
- source_word: ἀπεστείλαμεν
  english_pob_choice: sent word
  chosen_spanish: les enviamos noticia
  alternatives_spanish:
  - les enviamos mensaje
  - les mandamos decir
  lexicon: BDAG
  rationale: El verbo griego no expresa aquí explícitamente «carta»; el contexto remite al decreto anterior. «Les enviamos noticia» conserva la idea de comunicación enviada sin añadir un objeto inexistente en el texto.
- source_word: κρίναντες
  english_pob_choice: having decided
  chosen_spanish: habiendo decidido
  alternatives_spanish:
  - después de decidir
  - habiendo determinado
  lexicon: BDAG
  rationale: El participio aoristo expresa una decisión previa al envío; «habiendo decidido» refleja bien esa relación temporal y formal.
- source_word: φυλάσσεσθαι αὐτοὺς
  english_pob_choice: that they should keep themselves from
  chosen_spanish: que se guardaran de
  alternatives_spanish:
  - que se abstuvieran de
  - que se mantuvieran alejados de
  lexicon: BDAG
  rationale: El verbo medio pasivo sugiere cuidarse/guardarse de algo; «guardarse de» conserva el matiz reflexivo mejor que una simple negación.
- source_word: τό τε εἰδωλόθυτον
  english_pob_choice: what is sacrificed to idols
  chosen_spanish: lo sacrificado a los ídolos
  alternatives_spanish:
  - la comida sacrificada a los ídolos
  - los alimentos ofrecidos a los ídolos
  lexicon: BDAG
  rationale: La forma neutra y sustantivada apunta a lo asociado al sacrificio idolátrico; «lo sacrificado a los ídolos» es literal y suficientemente claro.
- source_word: αἷμα
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - la sangre
  lexicon: BDAG
  rationale: La palabra es directa y debe mantenerse simple; en este decreto alude al consumo de sangre, pero el texto solo dice «sangre».
- source_word: πνικτόν
  english_pob_choice: what is strangled
  chosen_spanish: lo estrangulado
  alternatives_spanish:
  - lo ahogado
  - la carne de animales estrangulados
  lexicon: BDAG
  rationale: El adjetivo sustantivado designa aquello muerto por estrangulación/sufocación; «lo estrangulado» mantiene la literalidad y la simetría de la lista.
- source_word: πορνείαν
  english_pob_choice: sexual immorality
  chosen_spanish: inmoralidad sexual
  alternatives_spanish:
  - fornicación
  - conducta sexual inmoral
  lexicon: BDAG
  rationale: El término es más amplio que relaciones prematrimoniales; «inmoralidad sexual» comunica bien su alcance sin reducirlo indebidamente.
theological_decisions:
- issue: Naturaleza y alcance de las prohibiciones apostólicas
  english_pob_reading: Render the four prohibitions straightforwardly without narrowing them to one specific theological system in the main text.
  chosen_spanish_reading: Traducir las cuatro prohibiciones de forma llana, sin convertir el versículo en una explicación doctrinal sobre su duración o aplicación universal.
  alternative_spanish_readings:
  - Interpretar estas normas como concesiones temporales de convivencia
  - Interpretarlas como ley moral universal permanente
  rationale: El versículo reporta el contenido del decreto apostólico, pero no desarrolla aquí su fundamento ni su vigencia detallada. La traducción debe preservar esa tensión sin resolverla por cuenta propia.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que prefirió «sent word» en lugar de «sent a letter» porque el objeto no aparece explícito en el griego; por eso en español se evitó introducir «carta» y se optó por una formulación igualmente implícita y fiel al contexto.
  spanish_consistency_notes:
  - Se mantiene «gentiles» para ἐθνῶν, coherente con el uso bíblico habitual y con el inglés POB.
  - Se traduce εἰδωλόθυτον de manera literal, con nota cultural para aclarar su referente alimentario.
  - Se conserva el orden de la lista prohibitiva para reflejar la estructura del griego.
  - «Inmoralidad sexual» se usa como equivalente amplio de πορνεία, evitando restringirlo a una sola práctica.
