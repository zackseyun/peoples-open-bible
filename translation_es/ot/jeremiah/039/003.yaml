translation:
  language: es
  text: 'Entonces todos los oficiales del rey de Babilonia entraron y se sentaron en la Puerta del Medio[a]: Nergal-sarezer, Samgar-nebu, Sarsequim el Rab-saris[b][c], Nergal-sarezer el Rab-mag[d], y todos los demás oficiales del rey de Babilonia.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'junto a la Puerta del Medio'. La preposición hebrea puede rendirse de ambas maneras en este contexto.
    reason: lexical_alternative
  - marker: b
    text: La secuencia 'Samgar-nebu, Sarsequim el Rab-saris' es difícil. Algunos intérpretes dividen los nombres y títulos de otra manera, por ejemplo leyendo 'Samgar' como título o 'Sarsequim' como un cargo en vez de un nombre propio.
    reason: alternative_reading
  - marker: c
    text: '''Rab-saris'' es un título babilónico, tradicionalmente entendido como algo así como ''jefe eunuco'' o ''jefe oficial de la corte''.'
    reason: cultural_note
  - marker: d
    text: '''Rab-mag'' es un título babilónico, posiblemente con el sentido de ''jefe de los magos'' o de un oficial ritual de alto rango.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: came in
  chosen_spanish: entraron
  alternatives_spanish:
  - vinieron
  - ingresaron
  lexicon: HALOT
  rationale: En español, 'entraron' expresa naturalmente el movimiento hacia el interior que el contexto exige. Mantiene el valor narrativo del hebreo sin sobretraducirlo.
- source_word: כֹּל שָׂרֵי מֶלֶךְ בָּבֶל
  english_pob_choice: all the officials of the king of Babylon
  chosen_spanish: todos los oficiales del rey de Babilonia
  alternatives_spanish:
  - todos los príncipes del rey de Babilonia
  - todos los comandantes del rey de Babilonia
  lexicon: HALOT
  rationale: '''שָׂרִים'' puede abarcar funcionarios, jefes o altos oficiales. ''Oficiales'' preserva ese rango amplio sin restringirlo solo a mando militar o a sentido dinástico.'
- source_word: וַיֵּשְׁבוּ
  english_pob_choice: sat
  chosen_spanish: se sentaron
  alternatives_spanish:
  - tomaron asiento
  - se establecieron
  lexicon: HALOT
  rationale: El verbo hebreo puede significar 'sentarse' o 'habitar'. Aquí describe que ocuparon el lugar; 'se sentaron' conserva la imagen concreta y la decisión de la POB de no explicitar más de lo que dice el texto.
- source_word: בְּשַׁעַר הַתָּוֶךְ
  english_pob_choice: in the Middle Gate
  chosen_spanish: en la Puerta del Medio
  alternatives_spanish:
  - en la Puerta Central
  - en la puerta del medio
  lexicon: HALOT
  rationale: La mayúscula en 'Puerta del Medio' refleja que funciona como designación de lugar. 'En' sigue la preposición hebrea y permite entender el asentamiento dentro del complejo de la puerta.
- source_word: נֵרְגַל שַׂר אֶצֶר
  english_pob_choice: Nergal-sharezer
  chosen_spanish: Nergal-sarezer
  alternatives_spanish:
  - Nergal-sharezer
  lexicon: HALOT
  rationale: Se conserva la transliteración del nombre babilónico. 'Sarezer' reproduce de forma más transparente la secuencia consonántica del hebreo en español, sin traducir el nombre.
- source_word: סַמְגַּר נְבוּ
  english_pob_choice: Samgar-nebu
  chosen_spanish: Samgar-nebu
  alternatives_spanish:
  - Samgar-Nebo
  lexicon: HALOT
  rationale: La forma se translitera porque el texto consonántico presenta un nombre propio y no conviene resolverlo como traducción. Se mantiene con guion para reflejar la unidad del nombre.
- source_word: שַׂר סְכִים
  english_pob_choice: Sarsechim
  chosen_spanish: Sarsequim
  alternatives_spanish:
  - Sarsechim
  - Sar-sequim
  lexicon: HALOT
  rationale: La vocalización permite una forma hispana como 'Sarsequim'. Se conserva como nombre propio, evitando convertirlo en título en el texto principal.
- source_word: רַב סָרִיס
  english_pob_choice: the Rab-saris
  chosen_spanish: el Rab-saris
  alternatives_spanish:
  - el jefe eunuco
  - el jefe oficial
  lexicon: HALOT
  rationale: La POB opta por transliterar este título acadiano. En español se conserva igual para no perder la referencia al cargo antiguo ni imponer un equivalente potencialmente reductivo.
- source_word: רַב מָג
  english_pob_choice: the Rab-mag
  chosen_spanish: el Rab-mag
  alternatives_spanish:
  - el jefe de los magos
  - el mago principal
  lexicon: HALOT
  rationale: También aquí se preserva el título babilónico como forma transliterada. Esto evita cargar el término con asociaciones posteriores que no están garantizadas por el contexto.
- source_word: וְכָל שְׁאֵרִית שָׂרֵי מֶלֶךְ בָּבֶל
  english_pob_choice: and all the rest of the officials of the king of Babylon
  chosen_spanish: y todos los demás oficiales del rey de Babilonia
  alternatives_spanish:
  - y todos los restantes oficiales del rey de Babilonia
  lexicon: HALOT
  rationale: '''שְׁאֵרִית'' es ''resto, remanente''. En una lista administrativa, ''los demás'' comunica con naturalidad el sentido de los que no fueron nombrados individualmente.'
theological_decisions:
- issue: Tratamiento de títulos babilónicos y posibles equivalentes funcionales
  english_pob_reading: The Rab-saris and Rab-mag are retained as titles, with explanatory footnotes about possible meanings.
  chosen_spanish_reading: Se conservan como 'Rab-saris' y 'Rab-mag' en el texto principal, con nota explicativa sobre sus posibles sentidos.
  alternative_spanish_readings:
  - '''jefe eunuco'' / ''jefe oficial'' y ''jefe de los magos'''
  - '''eunuco principal'' y ''mago principal'''
  rationale: La evidencia histórica y lexical no permite fijar con total seguridad equivalentes exactos; transliterar preserva la tensión y evita una falsa precisión. Las notas pueden ofrecer sentidos probables sin borrar el título original.
  doctrine_reference: Principio de transparencia textual y prudencia lexical en nombres/títulos antiguos
- issue: Secuencia difícil de nombres y títulos en la lista
  english_pob_reading: The sequence 'Samgar-nebu, Sarsechim the Rab-saris' is difficult; the English note preserves alternative division possibilities.
  chosen_spanish_reading: Se mantiene la lectura tradicional de la lista en el texto principal y se deja constancia de la dificultad en nota.
  alternative_spanish_readings:
  - 'dividir la secuencia de manera distinta: ''Samgar'' como título o ''Sarsequim'' como oficio'
  rationale: El hebreo presenta una lista onomástica compleja. La traducción no debe resolver de forma dogmática una segmentación discutida cuando el texto y la tradición auditada reconocen la dificultad.
  doctrine_reference: Respeto por la ambigüedad textual documentada
translation_notes:
  revision_awareness: 'La versión auditada en inglés no requiere cambios sustantivos: mantiene la misma estructura, el mismo tratamiento transliterado de los nombres y títulos babilónicos, y la misma nota de ambigüedad sobre la secuencia difícil. La propuesta española sigue esa línea, adaptando solo la formulación al español natural.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera explícitamente; aquí no aparece el nombre divino.
  - Se mantiene la transliteración de nombres y títulos babilónicos para respetar la transparencia del POB.
  - '''Oficiales'' traduce שָׂרִים con un rango amplio y no militarizado en exceso.'
  - La mayúscula en 'Puerta del Medio' trata la expresión como nombre de lugar.
  - Se conserva el tono narrativo sobrio sin añadir explicaciones interpretativas al cuerpo del versículo.
