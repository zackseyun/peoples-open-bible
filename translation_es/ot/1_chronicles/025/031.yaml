translation:
  language: es
  text: para el vigésimo cuarto[a], Romamti-ezer, sus hijos y sus hermanos, doce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «para el vigésimo cuarto»; en esta sección la expresión se refiere al vigésimo cuarto sorteo o división.
    reason: cross_reference
lexical_decisions:
- source_word: לְ/אַרְבָּעָה וְ/עֶשְׂרִים
  english_pob_choice: for the twenty-fourth
  chosen_spanish: para el vigésimo cuarto
  alternatives_spanish:
  - para el cuarto y vigésimo
  - para el vigésimo cuarto lote
  lexicon: HALOT
  rationale: El prefijo לְ expresa asignación/destinación, por lo que 'para' reproduce bien el valor contextual. El numeral compuesto funciona como ordinal en esta lista de turnos, así que 'vigésimo cuarto' es la forma natural en español. No se añade 'lote' en el texto principal porque, aunque el contexto lo implica, no está expresado en esta línea.
- source_word: לְ/רוֹמַמְתִּי עָזֶר
  english_pob_choice: Romamti-ezer
  chosen_spanish: Romamti-ezer
  alternatives_spanish:
  - Romamti Ezer
  lexicon: HALOT
  rationale: Es un nombre propio y se translitera. Se conserva el guion para reflejar la unión gráfica del nombre compuesto, coherente con la solución inglesa auditada.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos e hijas
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'sus hijos varones'/'sus hijos', y en este contexto genealógico la referencia masculina está clara. En español, 'hijos' comunica de manera natural la filiación masculina sin sonar tan técnica como 'varones'.
- source_word: וְאֶחָיו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus parientes varones
  - y sus hermanos de clan
  lexicon: HALOT
  rationale: La acepción básica es 'hermanos'. En un registro de distribución cultual puede abarcar parientes o asociados, pero la traducción conserva el término lexical directo, como en la POB inglesa.
- source_word: שְׁנֵים עָשָׂר
  english_pob_choice: twelve
  chosen_spanish: doce
  lexicon: HALOT
  rationale: Es el cardinal que completa el total del grupo. No requiere expansión en español.
translation_notes:
  revision_awareness: El texto sigue el estado revisado más reciente del inglés POB, que permanece sin cambios; por eso no se introducen variantes nuevas ni se reabre la decisión sobre la ordinalidad contextual.
  spanish_consistency_notes:
  - Se mantiene 'Romamti-ezer' como nombre transliterado con guion, en paralelo con la convención auditada en inglés.
  - '''Para el vigésimo cuarto'' conserva la fuerza distributiva del לְ sin añadir ''sorteo'' al cuerpo del versículo; esa aclaración queda en nota.'
  - Se usa 'hijos' en sentido masculino/genealógico, coherente con el hebreo y con la lista de turnos del capítulo.
