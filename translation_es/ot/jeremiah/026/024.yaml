translation:
  language: es
  text: Pero la mano de Ahicam hijo de Safán estaba con Jeremías[a], de modo que no fue entregado en manos[b] del pueblo para darle muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «la mano de Ahicam ... estaba con Jeremías». La expresión significa que Ahicam lo apoyaba y protegía.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en manos del pueblo», un modismo que significa «bajo su poder».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - Mas
  - No obstante
  lexicon: HALOT
  rationale: La partícula introduce contraste con la amenaza previa; «Pero» comunica bien el valor adversativo en español sin endurecer el estilo.
- source_word: יַד
  english_pob_choice: the hand
  chosen_spanish: la mano
  alternatives_spanish:
  - el poder
  - el apoyo
  - la protección
  lexicon: HALOT
  rationale: Conservo la imagen de «mano» para reflejar el hebreo y permitir el contraste deliberado con «en mano del pueblo» más adelante.
- source_word: אֲחִיקָם בֶּן שָׁפָן
  english_pob_choice: Ahikam son of Shaphan
  chosen_spanish: Ahicam hijo de Safán
  alternatives_spanish:
  - Ahicam, hijo de Safán
  lexicon: HALOT
  rationale: Transliteración coherente con español; «hijo de» es la forma natural para בן en una identificación genealógica.
- source_word: הָיְתָה אֶת יִרְמְיָהוּ
  english_pob_choice: was with Jeremiah
  chosen_spanish: estaba con Jeremías
  alternatives_spanish:
  - estuvo con Jeremías
  - apoyaba a Jeremías
  - protegía a Jeremías
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice «estaba con Jeremías»; en español mantiene el giro y deja visible el soporte implícito sin sustituirlo por una paráfrasis más interpretativa.
- source_word: לְבִלְתִּי
  english_pob_choice: so that ... not
  chosen_spanish: de modo que no
  alternatives_spanish:
  - para que no
  - a fin de que no
  lexicon: HALOT
  rationale: Este conector expresa resultado o finalidad negativa; «de modo que no» fluye con naturalidad y conserva la relación lógica del hebreo.
- source_word: תֵּת אֹתוֹ
  english_pob_choice: he was not given
  chosen_spanish: fue entregado
  alternatives_spanish:
  - le dieron
  - lo entregaron
  lexicon: HALOT
  rationale: El hebreo usa un infinitivo con valor de entrega en contexto pasivo. «Fue entregado» preserva la pasividad y evita introducir un sujeto no explicitado.
- source_word: בְיַד הָעָם
  english_pob_choice: into the hand of the people
  chosen_spanish: en mano del pueblo
  alternatives_spanish:
  - en poder del pueblo
  - a manos del pueblo
  lexicon: HALOT
  rationale: Mantengo la metáfora de «mano» para reflejar el hebreo y su contraste interno con la «mano» de Ahicam; «en mano de» suena más bíblico y directo que una reformulación explicativa.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: del pueblo
  alternatives_spanish:
  - de la gente
  - de la multitud
  lexicon: HALOT
  rationale: «Pueblo» corresponde bien a עם como colectivo y mantiene el tono formal del pasaje.
- source_word: לַהֲמִיתוֹ
  english_pob_choice: to put him to death
  chosen_spanish: para matarlo
  alternatives_spanish:
  - para darle muerte
  - para ejecutarlo
  lexicon: HALOT
  rationale: En español, «para matarlo» es claro y fiel; «para darle muerte» sería más formal, pero menos natural.
theological_decisions:
- issue: La expresión idiomática de «la mano» puede entenderse literalmente o como apoyo/protección.
  english_pob_reading: The hand of Ahikam ... was with Jeremiah, meaning Ahikam supported and protected Jeremiah.
  chosen_spanish_reading: La mano de Ahicam estaba con Jeremías, es decir, lo apoyaba y protegía.
  alternative_spanish_readings:
  - Ahicam favorecía a Jeremías
  - Ahicam defendía a Jeremías
  rationale: La traducción principal conserva el hebraísmo; la nota aclara el sentido idiomático que el inglés POB ya documenta, sin borrar la imagen original.
  doctrine_reference: No aplica; se trata de una decisión idiomática y narrativa.
- issue: La frase «en mano del pueblo» también es un modismo de entrega al poder de otros.
  english_pob_reading: Into the hand of the people, an idiom meaning into their power.
  chosen_spanish_reading: En mano del pueblo, es decir, bajo su poder.
  alternative_spanish_readings:
  - en poder del pueblo
  - a merced del pueblo
  rationale: Se conserva «mano» en el texto para reproducir el paralelismo del hebreo; la nota hace explícito el valor idiomático sin perder la imagen.
  doctrine_reference: No aplica; es una cuestión semántica del idioma bíblico.
translation_notes:
  revision_awareness: El texto fuente y la auditoría inglesa muestran alto acuerdo y ninguna revisión sustantiva reciente; por eso la versión española conserva la imagen doble de «mano» en ambos miembros del versículo y sólo explicita el sentido idiomático en notas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se usa «Jeremías» y transliteración española consistente para los nombres propios.
  - Se conserva el paralelismo de «mano» en ambas cláusulas para reflejar el contraste del hebreo.
  - «Pueblo» se mantiene para עם por coherencia con el tono bíblico y colectivo del pasaje.
