  glossary_alignment: 'Buen ajuste a la terminología del proyecto: יהוה -> ''Yahvé'', צבאות -> ''de los ejércitos'', קֹדֶשׁ -> ''santo'', כְנַעֲנִי -> ''cananeo'' con nota alternativa. No hay conflicto doctrinal. Se recomienda ajustar סִיר de ''caldero'' a ''olla'' por naturalidad panhispánica y cercanía al POB inglés ''pot''.'
