  rationale: Se mantiene la estructura y fuerza normativa del hebreo, pero se sustituye «toda tu obra» por «todo tu trabajo» para reflejar mejor מְלָאכָה en el contexto del mandamiento del sábado y para mejorar la claridad en español. También se limpia la redacción de la nota al pie. No se requiere adjudicación adicional.
