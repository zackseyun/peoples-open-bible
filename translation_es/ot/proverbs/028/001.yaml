    issue: La expresión 'tienen confianza como un león joven' es poco idiomática en español bíblico-natural.
    rationale: Aunque semánticamente cercana, suena abstracta y algo forzada para describir la cualidad comparada con un león. בטח aquí expresa seguridad/confiada firmeza; 'están seguros' comunica mejor esa idea en español.
  revised_spanish_text: Los malvados huyen cuando nadie los persigue[a], pero los justos están seguros como un león joven.
