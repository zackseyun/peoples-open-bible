  verdict: revise
  source_alignment_summary: El borrador refleja correctamente la secuencia del participio aoristo ἐξελθόντες y el sentido recíproco de διεχωρίσθησαν ἀπ᾿ ἀλλήλων. Sin embargo, «después de salir» atenúa innecesariamente el sujeto explícito implícito en el participio plural; una forma finita como «después de que salieron» preserva mejor la relación temporal y la referencia a los dos sujetos, en línea con la auditoría inglesa.
  spanish_quality_summary: El español es claro, pero «después de salir» suena un poco más impersonal y menos narrativo que el original. Además, «el uno del otro» es comprensible, aunque «uno del otro» fluye mejor en español moderno sin pérdida de reciprocidad. Conviene un ajuste menor para mayor naturalidad y precisión.
  glossary_alignment: No hay términos de glosario teológicamente sensibles en este versículo. Las decisiones «se separaron» y la nota sobre el participio concuerdan con la filosofía POB.
