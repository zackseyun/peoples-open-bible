translation:
  language: es
  text: 'Entonces los oficiales dijeron al rey: «Por favor, que se dé muerte a este hombre, porque así está debilitando las manos[a] de los hombres de guerra[b] que han quedado en esta ciudad, y las manos de todo el pueblo, al hablarles palabras como estas. Porque este hombre no está buscando el bienestar[c] de este pueblo, sino su daño».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «debilitando las manos». Es un modismo que significa desanimar o desmoralizar.'
    reason: lexical_alternative
  - marker: b
    text: O «los soldados», por «los hombres de guerra».
    reason: lexical_alternative
  - marker: c
    text: O «buscando la paz»; aquí «bienestar» refleja mejor el alcance de שָׁלוֹם, que puede incluir paz, bienestar y prosperidad.
    reason: alternative_reading
lexical_decisions:
- source_word: הַשָּׂרִים
  english_pob_choice: the officials
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los príncipes
  - los jefes
  lexicon: HALOT
  rationale: שָׂרִים designa funcionarios o autoridades del poder. «Oficiales» es natural en español moderno y mantiene el sentido político de la escena sin forzar una jerarquía militar más precisa de lo que el hebreo exige.
- source_word: יּוּמַת נָא
  english_pob_choice: Please let this man be put to death
  chosen_spanish: que se dé muerte a este hombre
  alternatives_spanish:
  - que este hombre sea ejecutado
  - que maten a este hombre, por favor
  lexicon: HALOT
  rationale: La forma expresa una petición de ejecución judicial. En español, «que se dé muerte» conserva la fuerza impersonal/jurídica sin reducirla al simple «matar», y el valor de נָא queda atendido por «por favor» al inicio de la cita.
- source_word: עַל כֵּן
  english_pob_choice: for in this way
  chosen_spanish: así
  alternatives_spanish:
  - por eso
  - de esta manera
  - porque de este modo
  lexicon: HALOT
  rationale: La frase introduce la base de la acusación. «Así» comunica la relación causal/instrumental de forma breve y natural en español, manteniendo el vínculo con lo que sigue.
- source_word: מְרַפֵּא אֶת יְדֵי
  english_pob_choice: he is weakening the hands of
  chosen_spanish: está debilitando las manos de
  alternatives_spanish:
  - está desanimando a
  - está aflojando las manos de
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de «las manos» para no borrar la imagen idiomática; «debilitando» reproduce el sentido de desaliento o desmoralización que el hebreo transmite.
- source_word: אַנְשֵׁי הַמִּלְחָמָה
  english_pob_choice: the men of war
  chosen_spanish: los hombres de guerra
  alternatives_spanish:
  - los soldados
  - los guerreros
  lexicon: HALOT
  rationale: «Hombres de guerra» sigue más de cerca el hebreo y preserva el paralelismo con «todo el pueblo». «Soldados» sería más interpretativo.
- source_word: הַנִּשְׁאָרִים
  english_pob_choice: who remain
  chosen_spanish: que han quedado
  alternatives_spanish:
  - que permanecen
  - los que quedan
  lexicon: HALOT
  rationale: El participio indica a los que quedaron en la ciudad. «Que han quedado» es claro en español y mantiene la idea de remanente sin añadir matiz de supervivencia que el contexto no exige explícitamente.
- source_word: וְאֵת יְדֵי כָל הָעָם
  english_pob_choice: and the hands of all the people
  chosen_spanish: y las manos de todo el pueblo
  alternatives_spanish:
  - y el ánimo de todo el pueblo
  - y a todo el pueblo
  lexicon: HALOT
  rationale: Se mantiene la repetición de «las manos» para conservar el paralelismo y la metáfora idiomática del hebreo. La frase española sigue siendo comprensible y auditables como calco semántico controlado.
- source_word: לְדַבֵּר אֲלֵיהֶם כַּדְּבָרִים הָאֵלֶּה
  english_pob_choice: by speaking to them words like these
  chosen_spanish: al hablarles palabras como estas
  alternatives_spanish:
  - al decirles cosas como estas
  - hablándoles con palabras como estas
  lexicon: HALOT
  rationale: La construcción infinitiva se vuelve naturalmente a una cláusula con «al + infinitivo». «Palabras como estas» conserva el valor comparativo de כַדְּבָרִים הָאֵלֶּה sin exigir una cita literal.
- source_word: דֹרֵשׁ לְשָׁלוֹם
  english_pob_choice: seeking the welfare
  chosen_spanish: buscando el bienestar
  alternatives_spanish:
  - buscando la paz
  - buscando el bien
  lexicon: HALOT
  rationale: שָׁלוֹם abarca paz, bienestar y plenitud. «Bienestar» reproduce mejor la amplitud de la acusación que un simple «paz», y evita empobrecer el campo semántico.
- source_word: כִּי אִם לְרָעָה
  english_pob_choice: but their harm
  chosen_spanish: sino su mal
  alternatives_spanish:
  - sino su daño
  - sino para mal de ellos
  lexicon: HALOT
  rationale: El contraste retórico opone bienestar y mal. «Sino su mal» es breve, fiel y suficientemente abierto para abarcar daño/desgracia sin ampliar indebidamente el sentido.
translation_notes:
  revision_awareness: Se siguió el estado más reciente del audit trail, que indica que no hubo revisiones sustantivas después de la traducción inglesa base y que el consenso fue alto. La redacción española conserva las metáforas clave del hebreo («manos», «bienestar/mal») sin volverlas opacas.
  spanish_consistency_notes:
  - Se mantuvo «oficiales» para שָׂרִים, consistente con el valor político-cortesano del término.
  - Se preservó la imagen de «las manos» dos veces para reflejar el paralelismo hebreo.
  - «Bienestar» se usó de forma coherente con el alcance de שָׁלוֹם en contextos de paz, prosperidad y seguridad.
  - La cita conserva un registro formal y judicial apropiado para un decreto cortesano.
