translation:
  language: es
  text: 'Entonces el hombre que estaba de pie entre los árboles de mirto respondió y dijo: «Estos son los que Yahvé ha enviado para recorrer[a] la tierra[b].»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para patrullar» o «para andar por la tierra».
    reason: lexical_alternative
  - marker: b
    text: O «el país», según si el alcance es toda la tierra o una región más localizada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: HALOT
  rationale: ענה en discurso narrativo introduce una réplica. En español, «respondió» conserva ese valor idiomático sin añadir contenido ajeno.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el varón
  - la persona
  lexicon: HALOT
  rationale: אִישׁ es masculino singular. «El hombre» es la equivalencia natural y precisa para este personaje concreto de la visión.
- source_word: הָעֹמֵד
  english_pob_choice: who was standing
  chosen_spanish: que estaba de pie
  alternatives_spanish:
  - que permanecía
  - de pie
  lexicon: HALOT
  rationale: El participio describe la postura continua del personaje. «Que estaba de pie» mantiene el sentido durativo con español natural.
- source_word: בֵּין הַהַדַסִּים
  english_pob_choice: among the myrtle trees
  chosen_spanish: entre los árboles de mirto
  alternatives_spanish:
  - entre los mirtos
  - entre los arrayanes
  lexicon: HALOT
  rationale: הֲדַסִּים son «mirto(s)». Se prefiere «árboles de mirto» para claridad pública; «entre» refleja mejor la preposición literal que «among» en este contexto visual.
- source_word: אֵלֶּה
  english_pob_choice: These are the ones
  chosen_spanish: Estos son los que
  alternatives_spanish:
  - Estos son ellos
  - Estos son los
  lexicon: HALOT
  rationale: El demostrativo señala a personas ya vistas. «Estos son los que» hace explícito el referente personal sin exceder el hebreo.
- source_word: אֲשֶׁר שָׁלַח יְהוָה
  english_pob_choice: whom Yahweh has sent
  chosen_spanish: que Yahvé ha enviado
  alternatives_spanish:
  - a quienes Yahvé envió
  - los que Yahvé ha enviado
  lexicon: HALOT
  rationale: La cláusula relativa se refiere a personas enviadas por Dios. Se conserva el nombre divino «Yahvé» conforme al criterio del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se translitera como «Yahvé» en el texto principal, siguiendo el estándar del proyecto y preservando el nombre propio divino.
- source_word: לְהִתְהַלֵּךְ
  english_pob_choice: to walk throughout
  chosen_spanish: para recorrer
  alternatives_spanish:
  - para andar por
  - para patrullar
  lexicon: HALOT
  rationale: הִתְהַלֵּךְ expresa moverse de un lado a otro. «Recorrer» comunica ese desplazamiento amplio sin forzar aún el matiz militar de «patrullar».
- source_word: בָּאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el mundo
  lexicon: HALOT
  rationale: אֶרֶץ puede significar «tierra», «país» o «tierra/territorio». En este contexto de visión, «la tierra» mantiene la amplitud posible sin decidir demasiado restrictivamente.
theological_decisions:
- issue: Traducción del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. El proyecto lo rinde como «Yahvé» para preservar el nombre personal del Dios de Israel, no una sustitución titular.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Se atendió la validación anterior evitando notas al pie no ancladas: el texto español no contiene marcadores [a] ni [b], por lo que no se incluyen footnotes. Se mantuvo el sentido del audit trail inglés y la lectura directa del hebreo.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יְהוָה.
  - Se prefirió «tierra» en sentido amplio, coherente con la ambigüedad reconocida en el audit trail inglés.
  - Se evitó el calco excesivo de la estructura inglesa, manteniendo un español publicable y fiel al hebreo.
