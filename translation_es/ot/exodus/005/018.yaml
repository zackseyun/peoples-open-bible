- from: Así que ahora[a], vayan, trabajen; pero no se les dará paja, y ustedes deben entregar la cantidad requerida de ladrillos.
  to: Ahora bien[a], vayan, trabajen; pero no se les dará paja; sin embargo, ustedes deben entregar la cantidad exigida de ladrillos.
  rationale: Se ajusta la apertura a un español más natural y digno ('Ahora bien'), se refuerza el contraste concesivo de la cláusula final con 'sin embargo', y se afina 'cantidad exigida' para reflejar mejor la cuota impuesta, manteniendo la nota léxica existente.
