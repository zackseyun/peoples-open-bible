translation:
  language: es
  text: Entre los muertos[a] estoy libre; como los caídos que yacen en el sepulcro, a quienes ya no recuerdas[b], y ellos han sido cortados de tu mano[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «estoy libre entre los muertos». El hebreo usa el lenguaje de libertad o liberación de manera irónica: el salmista está como muerto, apartado del ámbito de los vivos.'
    reason: lexical_alternative
  - marker: b
    text: «Recordar» aquí probablemente significa más que una mera evocación mental; implica atender a alguien o actuar en su favor.
    reason: lexical_alternative
  - marker: c
    text: O «separados de tu mano». «Mano» es una imagen hebrea de poder, control o cuidado.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּמֵּתִים
  english_pob_choice: among the dead
  chosen_spanish: Entre los muertos
  alternatives_spanish:
  - entre los muertos
  - en medio de los muertos
  - con los muertos
  lexicon: HALOT
  rationale: La preposición ב con el plural «los muertos» admite una lectura locativa/social. «Entre los muertos» conserva la idea de pertenencia o ubicación dentro del ámbito de los muertos sin forzar una interpretación más específica.
- source_word: חָפְשִׁי
  english_pob_choice: set free
  chosen_spanish: estoy libre
  alternatives_spanish:
  - estoy liberado
  - estoy suelto
  - estoy libre, como liberado
  lexicon: HALOT
  rationale: El adjetivo expresa libertad o liberación; en este contexto poético es irónico. «Estoy libre» mantiene la fuerza predicativa y sugiere la paradoja sin sonar artificial en español.
- source_word: חֲלָלִים
  english_pob_choice: the slain
  chosen_spanish: los muertos caídos
  alternatives_spanish:
  - los muertos heridos
  - los caídos
  - los asesinados
  lexicon: HALOT
  rationale: En poesía hebrea el término suele referirse a los muertos por violencia. «Los muertos caídos» conserva el matiz de muerte violenta sin estrecharlo demasiado ni añadir una precisión no exigida por el texto.
- source_word: שֹׁכְבֵי קֶבֶר
  english_pob_choice: who lie in the grave
  chosen_spanish: que yacen en el sepulcro
  alternatives_spanish:
  - que yacen en la tumba
  - acostados en el sepulcro
  - los que yacen en el sepulcro
  lexicon: HALOT
  rationale: El participio describe un estado continuo. «Yacen en el sepulcro» reproduce esa duratividad con un español natural; «sepulcro» es un equivalente digno y bíblico para קֶבֶר.
- source_word: אֲשֶׁר לֹא זְכַרְתָּם עוֹד
  english_pob_choice: whom you remember no more
  chosen_spanish: a quienes ya no recuerdas
  alternatives_spanish:
  - a quienes no recuerdas más
  - a quienes ya no tienes presentes
  - a quienes no recuerdas ya
  lexicon: HALOT
  rationale: «Recuerdas» conserva el verbo clave y su peso relacional/covenantal. «Ya no» refleja עוֹד en una negación temporal natural en español. Se evita ampliar el sentido a «cuidar» o «tener presentes» en el texto principal para preservar la tensión del hebreo.
- source_word: וְהֵמָּה
  english_pob_choice: and they
  chosen_spanish: y están
  alternatives_spanish:
  - y ellos
  - pero ellos
  - y ellos están
  lexicon: HALOT
  rationale: La conjunción simple se mantiene como «y». En español se añade el verbo para hacer la frase fluida y explícita sin introducir una causalidad inexistente en el hebreo.
- source_word: מִיָּדְךָ
  english_pob_choice: from your hand
  chosen_spanish: de tu mano
  alternatives_spanish:
  - de tu poder
  - de tu control
  - de tu cuidado
  lexicon: HALOT
  rationale: «Mano» conserva la metáfora hebrea de poder, control o cuidado. Se evita explicarla en el texto principal, porque el hebreo permite más de una resonancia y conviene preservar esa amplitud.
- source_word: נִגְזָרוּ
  english_pob_choice: are cut off
  chosen_spanish: están separados
  alternatives_spanish:
  - son cortados
  - han sido cortados
  - están cortados
  lexicon: HALOT
  rationale: El niphal expresa separación o corte. «Están separados» comunica el resultado sin sonar demasiado brusco en español; como alternativa más literal, «están cortados» quedaría más cercano al verbo, pero es menos idiomático.
theological_decisions:
- issue: Sentido de «recordar» aplicado a Dios en un lamento sobre los muertos
  english_pob_reading: Rendered as 'remember' in the main text, preserving the covenantal-relational sense without overinterpreting it as abandonment from God's omniscience.
  chosen_spanish_reading: Se mantiene «recuerdas» en el texto principal, conservando el valor relacional de la memoria divina sin traducirlo como ausencia de conocimiento.
  alternative_spanish_readings:
  - te acuerdas de
  - tienes presentes a
  - cuentas con
  rationale: El hebreo permite una memoria que implica atención y acción, pero el versículo no obliga a resolver la tensión teológica. «Recuerdas» deja abierta la carga relacional del lamento.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
- issue: La ironía de «libre» entre los muertos
  english_pob_reading: Kept the paradoxical image 'set free among the dead' rather than smoothing to 'forsaken' or 'left alone.'
  chosen_spanish_reading: Se conserva la paradoja con «estoy libre entre los muertos» en vez de suavizarla como abandono o desamparo.
  alternative_spanish_readings:
  - estoy abandonado entre los muertos
  - estoy dejado entre los muertos
  - estoy libre, como uno de los muertos
  rationale: La imagen de libertad o liberación es irónica en el contexto. Mantenerla evita introducir una interpretación doctrinal que el hebreo no dice explícitamente y respeta la fuerza poética del verso.
  doctrine_reference: Translation philosophy §1 Original-language primacy over translation tradition; §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail, que sustituyó «for» por «and» para reflejar con más precisión la conjunción hebrea וְ y evitar una causalidad añadida. En español se reprodujo esa relación con «y»; además, se conservaron las decisiones del audit trail sobre el valor irónico de חָפְשִׁי, el sentido relacional de «recordar» y la metáfora de «mano».
  spanish_consistency_notes:
  - Se prefirió «sepulcro» para קֶבֶר por ser bíblico y natural en español.
  - Se evitó «SEÑOR» para el nombre divino, aunque aquí no aparece YHWH.
  - Se mantuvo un registro formal y poético, con sintaxis clara para lectura eclesial.
  - Las notas conservan alternativas relevantes donde el español puede crear nuevas ambigüedades o donde el inglés POB ya había preservado una opción lexical.
