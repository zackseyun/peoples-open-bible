translation:
  language: es
  text: Entonces Jonatán y Simón llevaron a Judas, el hermano de ambos,[a] y lo sepultaron en el sepulcro de sus padres en Modeín.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «su hermano»; con el sujeto compuesto («Jonatán y Simón»), el sentido es «el hermano de ambos».
    reason: lexical_alternative
  - marker: b
    text: O «en/por Modeín», según cómo se entienda la preposición de lugar en español; el griego simplemente dice «en Modeín».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦραν
  english_pob_choice: carried
  chosen_spanish: llevaron
  alternatives_spanish:
  - cargaron
  - tomaron
  lexicon: LSJ
  rationale: En este contexto funerario, αἴρω describe trasladar el cuerpo. «Llevaron» comunica el acto con naturalidad en español y evita un calco más pesado como «tomaron».
- source_word: Ἰωναθὰν καὶ Σίμων
  english_pob_choice: Jonathan and Simon
  chosen_spanish: Jonathan y Simón
  alternatives_spanish:
  - Jonatán y Simón
  lexicon: Nombres propios; transliteración editorial
  rationale: Se conservan los nombres propios en forma reconocible para el lector español. «Jonathan» mantiene la forma usada por POB en inglés, mientras que «Simón» sigue la forma española usual.
- source_word: Ἰούδα τὸν ἀδελφὸν αὐτοῦ
  english_pob_choice: Judas their brother
  chosen_spanish: Judas, su hermano
  alternatives_spanish:
  - Judas, su hermano de ellos
  - Judas, el hermano de ambos
  lexicon: LSJ
  rationale: El griego usa un singular formal en αὐτοῦ, pero el sujeto compuesto exige sentido colectivo. En español, «su hermano» es el equivalente natural y evita una referencia engañosamente singular.
- source_word: ἔθαψαν
  english_pob_choice: buried
  chosen_spanish: sepultaron
  alternatives_spanish:
  - enterraron
  - enterraron y sepultaron
  lexicon: LSJ
  rationale: «Sepultaron» es fiel al acto funerario y encaja bien con «sepulcro» en la línea siguiente. «Enterraron» también sería posible, pero «sepultaron» conserva un tono más formal sin sobreinterpretar.
- source_word: ἐν τῷ τάφῳ
  english_pob_choice: in the tomb
  chosen_spanish: en el sepulcro
  alternatives_spanish:
  - en la tumba
  - en el lugar de sepultura
  lexicon: LSJ
  rationale: τάφος puede ser tumba o sepulcro. Aquí el contexto de una tumba familiar favorece «sepulcro», que mantiene el sentido de lugar de enterramiento y suena natural en registro bíblico español.
- source_word: τῶν πατέρων αὐτοῦ
  english_pob_choice: of his fathers
  chosen_spanish: de sus padres
  alternatives_spanish:
  - de sus antepasados
  - de sus padres y mayores
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente «de sus padres/fathers», en español «sepulcro de sus padres» comunica bien la idea hereditaria y familiar. «Antepasados» sería más explícito, pero menos cercano al giro bíblico del original.
- source_word: ἐν Μωδεείμ
  english_pob_choice: at Modein
  chosen_spanish: en Modeín
  alternatives_spanish:
  - en Modein
  - en Modín
  lexicon: Topónimo según el testimonio griego
  rationale: Se conserva el nombre geográfico según la forma griega del texto fuente. «En» es idiomático con el entierro en un lugar; «Modeín» reproduce la transliteración más directamente que otras normalizaciones.
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa coinciden estrechamente; no se requiere revisión sustantiva. Se conservó la ambigüedad relacional de ἀδελφόν mediante una nota, y se mantuvo la variante toponímica como alternativa de lectura.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y otras terminologías no aplicables, porque el versículo no contiene lenguaje divino.
  - «Sepulcro» y «sepultaron» forman un par léxico coherente en español y reflejan bien el contexto funerario.
  - La forma «Modeín» se eligió por legibilidad en español, con alternativa textual en nota para «Modein».
