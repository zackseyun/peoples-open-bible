  text: 'Y los hijos de Rubén: Hanoch[a], Pallu, Hezron y Carmi.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Hanoch; tradicionalmente también se vierte Enoc en algunas traducciones españolas.
