    reason: cultural_note
  - marker: c
    text: O, «porque ha actuado con arrogancia». El hebreo dice literalmente «porque ha hecho grandes cosas», una expresión que aquí probablemente tiene sentido negativo por el contexto.
    reason: alternative_reading
  revision_rationale: Se corrigen los anclajes de notas para que coincidan con el expediente inglés y con sus lugares en el texto, se reemplaza «su peste» por «su fetidez» para preservar el campo semántico de mal olor, y se mejora la naturalidad de dos expresiones («el nortista» > «al del norte»; «quitaré de sobre ustedes» > «alejaré de ustedes») sin perder la personificación ni la fuerza del hebreo.
