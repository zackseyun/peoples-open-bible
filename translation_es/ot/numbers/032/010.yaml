translation:
  language: es
  text: 'Así se encendió el enojo de Yahvé aquel día[a], y juró, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; alternativamente, «Yahvé» o «Jehová».'
