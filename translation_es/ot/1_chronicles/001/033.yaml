review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura y el sentido básico del hebreo: una lista genealógica de los hijos de Madián seguida por la cláusula resumidora ''Todos estos fueron hijos de Keturah''. Sin embargo, varias transliteraciones españolas son innecesariamente idiosincráticas o poco naturales frente al uso bíblico español y frente a la propia lógica auditada del POB en inglés. En particular, ''Hanoq'' no corresponde bien al criterio del inglés, que prefirió ''Hanoch'' para distinguirlo de ''Enoch''; en español, la forma auditable y legible sería ''Hanoc'' o ''Hanoch'', no ''Hanoq''. También ''Eldaá'' y ''Queturá'' introducen acentos no justificados por el uso español y reducen la legibilidad.'
  spanish_quality_summary: 'El texto es mayormente claro, pero algunos nombres propios suenan artificiales en español e interrumpen la lectura pública: ''Hanoq'', ''Eldaá'' y ''Queturá''. ''Quetura'' es una forma española más natural y ampliamente reconocible; ''Eldaa'' o ''Eldaá'' es menos estable, pero ''Eldaa'' evita una acentuación gráfica extraña. La sintaxis general (''Los hijos de Madián... Todos estos fueron hijos de Quetura'') es correcta y digna.'
  glossary_alignment: 'No hay términos teológicos de proyecto en juego. En nombres propios, el borrador se aparta sin necesidad de una transliteración española legible. Debe alinearse mejor con la racionalidad lexical documentada: conservar la distinción respecto de ''Enoc'' sin crear una forma española opaca. ''Hanoc'' cumple mejor ese objetivo que ''Hanoq''.'
  issues:
  - severity: high
    issue: Uso de 'Hanoq' para חֲנוֹךְ
    rationale: La elección no sigue bien ni la auditabilidad del inglés ('Hanoch') ni la legibilidad del español. La q final sin u no es una representación natural en español y parece una transliteración técnica, no texto bíblico eclesial legible. 'Hanoc' preserva la distinción frente a 'Enoc' y suena natural en español.
  - severity: medium
    issue: Uso de 'Queturá' para קְטוּרָה
    rationale: La acentuación final es poco natural en español bíblico y no está exigida por el hebreo en una traducción de lectura común. 'Quetura' es más legible y reconocible.
  - severity: medium
    issue: Uso de 'Eldaá'
    rationale: La forma con acento agudo resulta extraña en español y no mejora claramente la fidelidad. 'Eldaa' conserva mejor la secuencia vocálica final sin producir una grafía poco idiomática.
  revised_spanish_text: 'Los hijos de Madián: Efa, Efer, Hanoc[a], Abida y Eldaa. Todos estos fueron hijos de Quetura.'
  revised_footnotes:
