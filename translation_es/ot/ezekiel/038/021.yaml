revisions:
- from: Y llamaré contra él una espada sobre todos mis montes[a] —declara el Señor Yahvé—; la espada de cada hombre será contra su hermano.
  to: Y llamaré una espada contra él en todos mis montes[a] —declara el Señor Yahvé—; la espada de cada hombre será contra su hermano.
  rationale: Se ajusta solo la redacción para lograr un español más natural sin perder ningún componente semántico del hebreo ni del rastro de auditoría inglés. Se mantiene «Yahvé», la fórmula profética y la imagen concreta de la espada de cada hombre contra su hermano. La nota alternativa sigue preservando el otro orden posible de la frase hebrea.
