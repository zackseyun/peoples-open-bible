translation:
  language: es
  text: Harás el altar de madera de acacia, de cinco codos de largo y cinco codos de ancho; el altar será cuadrado[a], y su altura será de tres codos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «será de cuatro lados iguales».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  english_pob_choice: You shall make
  chosen_spanish: Harás
  alternatives_spanish:
  - Y harás
  - Harás tú
  - Debes hacer
  lexicon: HALOT
  rationale: En este contexto instructivo, el imperfecto con waw funciona como mandato. «Harás» comunica la fuerza directiva de forma natural en español sin sobrecargar con un futuro perifrástico.
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - el altar sacrificial
  - el altar de sacrificio
  lexicon: HALOT
  rationale: Es el sustantivo estándar para מִזְבֵּחַ y el artículo definido se conserva porque el hebreo lo marca claramente.
- source_word: עֲצֵי שִׁטִּים
  english_pob_choice: of acacia wood
  chosen_spanish: de madera de acacia
  alternatives_spanish:
  - de acacia
  - de madera de shittim
  - de madera de acacia
  lexicon: HALOT
  rationale: La expresión de materia se vierte naturalmente como «de madera de acacia». Se evita la transliteración «shittim» porque no aporta claridad al lector español y el sentido botánico general está bien atestiguado.
- source_word: חָמֵשׁ אַמּוֹת אֹרֶךְ
  english_pob_choice: five cubits long
  chosen_spanish: de cinco codos de largo
  alternatives_spanish:
  - cinco codos de longitud
  - con una longitud de cinco codos
  lexicon: HALOT
  rationale: La construcción hebrea de medida se expresa con una fórmula dimensional natural en español. «Codos» conserva la unidad tradicional de la perícopa.
- source_word: וְחָמֵשׁ אַמּוֹת רֹחַב
  english_pob_choice: and five cubits wide
  chosen_spanish: y cinco codos de ancho
  alternatives_spanish:
  - y con cinco codos de ancho
  - y de cinco codos de ancho
  lexicon: HALOT
  rationale: Se mantiene el paralelismo del hebreo con una expresión idiomática equivalente y clara.
- source_word: רָבּוּעַ
  english_pob_choice: square
  chosen_spanish: cuadrado
  alternatives_spanish:
  - de cuatro lados iguales
  - foursquare
  lexicon: HALOT
  rationale: El adjetivo describe la forma del altar. «Cuadrado» es la equivalencia más transparente en español moderno y conserva la fuerza geométrica del término.
- source_word: קֹמָתוֹ
  english_pob_choice: its height
  chosen_spanish: su altura
  alternatives_spanish:
  - su estatura
  - la altura de él
  lexicon: HALOT
  rationale: קֹמָה aquí denota altura física de un objeto. «Su altura» preserva el poseedor y evita una construcción pesada.
theological_decisions:
- issue: 'Forma del altar: רָבוּעַ / square'
  english_pob_reading: the altar shall be square; or 'shall be foursquare.'
  chosen_spanish_reading: el altar será cuadrado
  alternative_spanish_readings:
  - el altar será de forma cuadrada
  - el altar será cuadrangular
  rationale: El hebreo describe la geometría del altar sin añadir implicaciones simbólicas. Se traduce de manera directa y sobria; la nota puede conservar la alternativa tradicional «de cuatro lados iguales» si se desea reflejar la opción inglesa «foursquare».
  doctrine_reference: Éxodo 27:1; HALOT רָבוּעַ
- issue: 'Unidad de medida: אַמּוֹת / cubits'
  english_pob_reading: five cubits long ... five cubits wide ... three cubits
  chosen_spanish_reading: cinco codos ... tres codos
  alternative_spanish_readings:
  - cinco medidas de codo
  - cinco codos de longitud
  rationale: «Codo» es la equivalencia consagrada para אַמָּה y mantiene la referencia antigua de medida sin sustituirla por una medida moderna anacrónica.
  doctrine_reference: Éxodo 27:1; HALOT אַמָּה
translation_notes:
  revision_awareness: Se siguió el texto hebreo consonántico/vocalizado de WLC y se contrastó con el audit trail inglés, que mantiene «altar», «acacia wood», «square» y las medidas en cubits. No se detectaron revisiones sustantivas en el pass más reciente, por lo que el borrador español refleja directamente ese consenso.
  spanish_consistency_notes:
  - Se usa «codos» de manera consistente para אַמּוֹת, en armonía con el registro bíblico técnico.
  - Se prefiere «Yahvé» como término proyectivo general cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - 'Se conserva el orden informativo del hebreo: objeto, material, dimensiones, forma, altura.'
  - La nota al pie se ancla en «cuadrado» para reflejar la alternativa inglesa «foursquare».
