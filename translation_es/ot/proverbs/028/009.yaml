translation:
  language: es
  text: El que aparta el oído para no oír la ley[a], aun su oración es abominación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «instrucción» o «enseñanza» para «la ley» (hebreo torah), destacando más ampliamente la instrucción de Dios con autoridad, no solo mandatos legales.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵסִיר
  english_pob_choice: turns away
  chosen_spanish: aparta
  alternatives_spanish:
  - se aparta
  - vuelve aparte
  lexicon: HALOT
  rationale: El participio hifil describe una acción habitual o característica. «Aparta» conserva la idea volitiva de desviar el oído y funciona de modo natural en español sin perder la relación con el acto de alejarse de la escucha.
- source_word: אָזְנוֹ
  english_pob_choice: his ear
  chosen_spanish: su oído
  alternatives_spanish:
  - su oreja
  - su escucha
  lexicon: HALOT
  rationale: «Oído» mantiene la metáfora corporal del hebreo y sugiere la negativa a escuchar. «Escucha» sería más interpretativo y debilitaría la imagen concreta.
- source_word: מִשְּׁמֹעַ
  english_pob_choice: from hearing
  chosen_spanish: de oír
  alternatives_spanish:
  - de escuchar
  - para no oír
  lexicon: HALOT
  rationale: La construcción expresa apartarse del acto de oír. «De oír» conserva la cercanía al hebreo y mantiene la estructura causal/relacional del texto.
- source_word: תּוֹרָה
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  - la enseñanza
  lexicon: HALOT
  rationale: En este proverbio, תּוֹרָה puede abarcar la instrucción divina con autoridad. «La ley» preserva el peso normativo y coincide con la opción inglesa, mientras que la nota permite la amplitud semántica de «instrucción» o «enseñanza».
- source_word: גַּם
  english_pob_choice: even
  chosen_spanish: aun
  alternatives_spanish:
  - también
  - incluso
  lexicon: HALOT
  rationale: '«Aun» transmite el matiz enfático: no solo la conducta es reprobable, sino que hasta la oración resulta inaceptable. Es una equivalencia natural y sobria en español.'
- source_word: תְּפִלָּתוֹ
  english_pob_choice: his prayer
  chosen_spanish: su oración
  alternatives_spanish:
  - su plegaria
  - su súplica
  lexicon: HALOT
  rationale: «Oración» es la traducción directa y más pertinente en el contexto sapiencial. Conserva el sentido religioso general sin añadir matices no presentes en el hebreo.
- source_word: תּוֹעֵבָה
  english_pob_choice: an abomination
  chosen_spanish: abominación
  alternatives_spanish:
  - algo abominable
  - repugnancia
  lexicon: HALOT
  rationale: «Abominación» preserva la fuerza moral y la resonancia bíblica del término, evitando suavizar el juicio del texto. En español, el sustantivo funciona bien predicativamente con «es».
theological_decisions:
- issue: Alcance de תּוֹרָה en contexto sapiencial
  english_pob_reading: the law with the sense of God's authoritative instruction
  chosen_spanish_reading: la ley, con el sentido de la instrucción autorizada de Dios
  alternative_spanish_readings:
  - la instrucción
  - la enseñanza
  rationale: El proverbio condena rechazar la instrucción divina. «La ley» conserva la autoridad normativa y el eco bíblico del término, mientras la explicación en la decisión lexical evita estrecharlo solo a estatutos legales.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail en inglés. Se mantuvo la estructura proverbial y la intensificación de גַּם con «aun». No se introdujeron cambios respecto del pasaje base; la única nota preserva la alternativa semántica documentada para תּוֹרָה.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como término estándar del proyecto cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - 'Se conservaron formas sobrias y publicables: «oído», «ley», «oración», «abominación», coherentes con el registro bíblico del proyecto.'
  - La nota a pie de página usa un solo marcador y está anclada en «ley» para reflejar la alternativa lexical documentada sin alterar el texto principal.
