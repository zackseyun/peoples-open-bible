- from: Con tu sabiduría y con tu entendimiento te hiciste riquezas[a], y metiste oro y plata en tus tesoros.
  to: Con tu sabiduría y con tu entendimiento te hiciste riquezas[a], y pusiste oro y plata en tus tesorerías.
  rationale: 'Se mantiene la estructura y el sentido del borrador, pero se corrigen dos puntos: «pusiste» reemplaza a «metiste» por mejor registro y naturalidad, y «tesorerías» reemplaza a «tesoros» para reflejar con mayor precisión el sentido locativo de אוֹצְרוֹתֶיךָ como lugar de almacenamiento de bienes valiosos. La nota se ajusta para concordar con la redacción revisada.'
