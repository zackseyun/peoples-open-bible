  text: אִיתַ֨י גְּבַ֜ר בְּ/מַלְכוּתָ֗/ךְ דִּ֠י ר֣וּחַ אֱלָהִ֣ין קַדִּישִׁין֮ בֵּ/הּ֒ וּ/בְ/יוֹמֵ֣י אֲב֗/וּךְ נַהִיר֧וּ וְ/שָׂכְלְתָנ֛וּ וְ/חָכְמָ֥ה כְּ/חָכְמַת אֱלָהִ֖ין הִשְׁתְּכַ֣חַת בֵּ֑/הּ וּ/מַלְכָּ֤/א נְבֻֽכַדְנֶצַּר֙ אֲב֔/וּךְ רַ֧ב חַרְטֻמִּ֣ין אָֽשְׁפִ֗ין כַּשְׂדָּאִין֙ גָּזְרִ֔ין הֲקִימֵ֖/הּ אֲב֥/וּךְ מַלְכָּֽ/א־׃
base_translation:
  language: en
  yaml_path: translation/ot/daniel/005/011.yaml
  text: There is a man in your kingdom in whom is a spirit of the holy gods[a], and in the days of your father light and insight and wisdom like the wisdom of the gods were found in him. And King Nebuchadnezzar, your father, appointed him chief of the magicians, enchanters, Chaldeans, and diviners—your father[b], the king.
  footnotes:
  - marker: a
    text: Or, 'the Spirit of the holy God' / 'the spirit of the holy God.' The Aramaic is plural ('gods'), but some understand the queen's wording as referring to the one true God.
    reason: alternative_reading
  - marker: b
    text: '''Your father'' may also mean ''your ancestor'' or ''your predecessor'' in this courtly/dynastic context.'
    reason: cultural_note
