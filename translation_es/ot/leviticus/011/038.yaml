revisions:
- from: Pero si se ha puesto agua sobre la semilla, y cae sobre ella cualquiera de sus cadáveres[a], será impura para ustedes.
  to: Pero si se pone agua sobre la semilla, y cae sobre ella alguno de sus cadáveres animales[a], es impura para ustedes.
  rationale: Se ajustó el verbo condicional a un presente legal más natural ('se pone'), se explicitó el matiz animal de נְבֵלָה para evitar la ambigüedad de 'cadáveres', y se cambió la declaración final a presente ('es impura para ustedes') para reflejar mejor la fórmula hebrea y el inglés auditado. No se requiere adjudicación adicional.
