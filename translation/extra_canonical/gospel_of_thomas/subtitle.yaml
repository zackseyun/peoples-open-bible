translation:
  text: The gospel according to Thomas[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or: good news; εὐαγγέλιον/ⲉⲩⲁⲅⲅⲉⲗⲓⲟⲛ can be rendered literally as ''good
      message'', but as a genre-title ''gospel'' is customary.'
    reason: lexical_alternative
  - marker: b
    text: The Coptic literally has 'the according-to Thomas' (ⲡⲕⲁⲧⲁ ⲑⲱⲙⲁⲥ), a fixed
      title formula in Coptic manuscripts.
    reason: cultural_note
lexical_decisions:
- source_word: ⲡⲉⲩⲁⲅⲅⲉⲗⲓⲟⲛ
  chosen: gospel
  alternatives:
  - good news
  - evangel
  lexicon: Crum; loan from Gk. εὐαγγέλιον
  rationale: As a genre-title in Coptic manuscripts, εὐαγγέλιον/ⲉⲩⲁⲅⲅⲉⲗⲓⲟⲛ is conventionally
    rendered 'gospel'; 'good news' is a possible literal but less idiomatic for a
    title.
- source_word: ⲡⲕⲁⲧⲁ
  chosen: according to
  alternatives:
  - by
  - as told by
  - per
  lexicon: Lambdin; Layton; Crum (Greek preposition κατά in Coptic usage)
  rationale: In Coptic title formulae, ⲕⲁⲧⲁ renders Gk. κατά with the sense 'according
    to' (authorship/attribution). The prefixed ⲡ- is part of the set title idiom and
    need not be separately rendered in English.
- source_word: ⲑⲱⲙⲁⲥ
  chosen: Thomas
  alternatives: []
  lexicon: Crum (proper name; from Gk. Θωμᾶς)
  rationale: Standard rendering of the proper name.
textual_note: 'NH II, p. 51, lines 27–28 present the title as two lines: ⲡⲉⲩⲁⲅⲅⲉⲗⲓⲟⲛ
  / ⲡⲕⲁⲧⲁ ⲑⲱⲙⲁⲥ. No lacunae or restorations. Orthographically, the definite article
  ⲡ- is fused to the Greek preposition ⲕⲁⲧⲁ in ⲡⲕⲁⲧⲁ, a common Coptic title formula
  meaning literally ''the according-to Thomas''. Greek loanwords throughout: ⲉⲩⲁⲅⲅⲉⲗⲓⲟⲛ
  < εὐαγγέλιον; ⲕⲁⲧⲁ < κατά; ⲑⲱⲙⲁⲥ < Θωμᾶς. No dialectal features affect meaning here.'
