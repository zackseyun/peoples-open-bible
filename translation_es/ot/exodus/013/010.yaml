translation:
  language: es
  text: Guardarás este estatuto en su tiempo señalado, de año en año[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «de días a días», un hebraísmo que aquí suele entenderse como «de año en año».'
