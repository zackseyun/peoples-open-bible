review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la estructura tripartita, el vocativo «oh Yahvé», «ríos» para נְהָרוֹת, y el contraste verbal «han alzado / alzan». Sin embargo, el primer hemistiquio traduce incorrectamente el primer נָשְׂאוּ sin objeto como «han alzado su voz», repitiendo anticipadamente el segundo hemistiquio. El hebreo dice primero simplemente que los ríos «han alzado» ante Yahvé, y solo después especifica «su voz».
  spanish_quality_summary: 'El español es claro y poético, pero la repetición de «han alzado su voz» en los dos primeros miembros borra el paralelismo progresivo del original. Además, la nota [a] está mal anclada: comenta «ríos/floods», pero aparece junto a «voz». Conviene reanclar [a] a «ríos» y dejar [b] en la expresión final rara.'
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: «Yahvé» para יְהוָה, «ríos» para נְהָרוֹת, y mantenimiento de la personificación con «voz». La principal desviación está en דָּכְיָם: «sus aguas estruendosas» es legible, pero se aleja del matiz de golpeteo/rompientes documentado en la auditoría inglesa. «sus olas golpeantes» o «sus olas rompientes» refleja mejor la decisión documentada sin perder claridad.'
  issues:
  - severity: high
    issue: El primer miembro añade «su voz» donde el hebreo no la tiene.
    rationale: נָשְׂאוּ נְהָרוֹת יְהוָה expresa primero «los ríos han alzado, oh Yahvé». El objeto «su voz» aparece solo en el segundo miembro con קוֹלָם. Repetirlo en el primero elimina la progresión poética del texto fuente.
  - severity: medium
    issue: La nota [a] está anclada al lugar equivocado.
    rationale: La nota [a] explica la alternativa léxica «ríos / inundaciones», así que debe ir sobre «ríos», no sobre «voz».
  - severity: medium
    issue: La tercera cola no refleja suficientemente el matiz léxico de דָּכְיָם.
    rationale: «Sus aguas estruendosas» comunica ruido, pero el término raro apunta más específicamente al embate, golpe o rompientes de las aguas. La auditoría inglesa opta por hacer explícitas las olas para claridad.
  revised_spanish_text: Los ríos[a] han alzado, oh Yahvé; los ríos han alzado su voz; los ríos alzan sus olas golpeantes[b].
  revised_footnotes:
  - marker: a
    text: O «inundaciones» en vez de «ríos»; muchas traducciones eligen esa opción para enfatizar las aguas caóticas, pero el sustantivo hebreo significa más literalmente «ríos».
    reason: lexical_alternative
  - marker: b
    text: O «sus rompientes» o «su estruendo». El sustantivo final es raro y denota la fuerza golpeante o estrepitosa de las aguas.
    reason: lexical_alternative
