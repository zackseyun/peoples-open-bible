translation:
  text: And he said[3][2][1], "Whoever finds the interpretation(1) of these sayings(2)
    will not taste death(3)."
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: Or “explanation.” We retain “interpretation” to reflect the technical hermeneutical
      sense of Coptic ⲡϩⲉⲣⲙⲏⲛⲉⲓⲁ (Greek ἑρμηνεία).
    reason: lexical_alternative
  - marker: '2'
    text: Manuscript exhibits a Lycopolitan-style plural demonstrative (ⲛ̄ⲛⲉⲉⲓϣⲁϫⲉ,
      “these sayings”), while the normalized lemmatization reads singular (ⲛⲡⲉⲓϣⲁϫⲉ).
      The Greek fragment (POxy 654) also favors the plural.
    reason: dialect_note
  - marker: '3'
    text: “Taste death” is a conventional idiom meaning “experience death” (cf. Crum
      s.v. ϫⲓϯ).
    reason: cultural_note
lexical_decisions:
- source_word: ⲁⲩⲱ
  chosen: And
  alternatives:
  - Also
  - Now
  lexicon: Crum; Lambdin
  rationale: Simple connective opening a new saying; English "And" best preserves
    terse discourse linkage typical of Thomas.
- source_word: ⲡⲉϫⲉⲛⲧⲟϥ
  chosen: he said
  alternatives:
  - he spoke
  - he declared
  lexicon: Crum; Layton (grammar)
  rationale: Standard past narrative verb of speaking; plain "said" matches Thomasine
    terseness.
- source_word: ϫⲉ
  chosen: introduces direct speech (rendered with quotation marks)
  alternatives:
  - that
  lexicon: Layton (grammar)
  rationale: Coptic quotative; English direct-speech punctuation conveys function
    more idiomatically than "that."
- source_word: ⲡⲉⲧⲉⲣⲉⲛⲁϩⲉ
  chosen: Whoever finds
  alternatives:
  - The one who finds
  - Who finds
  lexicon: Layton; Lambdin
  rationale: Relative construction ⲡⲉⲧⲉⲣⲉ- + infinitive expresses a generic subject;
    English "whoever" captures indefinite-generic force.
- source_word: ⲛⲁϩⲉ
  chosen: find
  alternatives:
  - discover
  - come upon
  lexicon: Crum
  rationale: Primary sense "find" suits cognitive discovery in context of interpretation.
- source_word: ⲡϩⲉⲣⲙⲏⲛⲉⲓⲁ
  chosen: interpretation
  alternatives:
  - explanation
  - meaning
  lexicon: Crum; Greek loanword noted by Layton
  rationale: Loanword from Greek ἑρμηνεία; "interpretation" preserves technical-hermeneutical
    force.
- source_word: ⲛ̄ⲛⲉⲉⲓϣⲁϫⲉ / ⲛⲡⲉⲓϣⲁϫⲉ
  chosen: of these sayings
  alternatives:
  - of this saying
  lexicon: Crum; Layton (demonstratives)
  rationale: Manuscript shows Lycopolitan-style plural demonstrative (ⲛ̄ⲛⲉⲉⲓ-); normalized
    lemmatization has singular. Greek POxy 654 supports plural; we render plural.
- source_word: ⲛⲧⲟϥ
  chosen: that one (understood generically by "whoever")
  alternatives:
  - he
  lexicon: Layton (pronouns)
  rationale: 3ms independent pronoun resumes the generic relative; English collapses
    to "whoever … will" to avoid gendered pronoun.
- source_word: ϥⲛⲁ
  chosen: will
  alternatives:
  - is going to
  lexicon: Lambdin
  rationale: Future auxiliary marks simple future.
- source_word: ϫⲓϯ
  chosen: taste
  alternatives:
  - experience
  lexicon: Crum
  rationale: Idiomatically used with ⲛ ⲡⲙⲟⲩ; we retain the vivid metaphor "taste"
    per Thomas’s sharp diction.
- source_word: ⲁⲛ
  chosen: not
  alternatives: []
  lexicon: Lambdin
  rationale: Standard postverbal negation.
- source_word: ⲛⲡⲙⲟⲩ
  chosen: death
  alternatives:
  - the death
  lexicon: Crum
  rationale: English idiom omits article in "taste death"; article in Coptic is governed
    by the preposition ⲛ.
textual_note: 'Dialect/orthography: The manuscript line has ⲛ̄ⲛⲉⲉⲓϣⲁϫⲉ (Lycopolitan-style
  plural demonstrative, “these sayings”), whereas the normalized lemmatization gives
  ⲛⲡⲉⲓϣⲁϫⲉ (singular, “this saying”). Given the manuscript form and the wider collection-view
  in Thomas, we translate the plural. The sequence ϥⲛⲁϫⲓϯⲡⲉ ⲁⲛ ⲙ̄ⲡⲙⲟⲩ reflects typical
  NHC spacing: the ⲡⲉ attached to ϫⲓϯ is actually the article of the following ⲡⲙⲟⲩ;
  the intended construction is ϫⲓϯ ⲛ ⲡⲙⲟⲩ (“taste death”). Grammar: ⲡⲉⲧⲉⲣⲉ- + infinitive
  forms a generic relative (“whoever …”), with ⲛⲧⲟϥ resuming the subject in the main
  clause. No lacunae or restorations are reported in this Coptic line of NHC II 32.'
