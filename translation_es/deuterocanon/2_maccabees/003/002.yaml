translation:
  language: es
  text: A causa de la piedad y del aborrecimiento de la maldad que había allí, sucedía que incluso los mismos reyes honraban el lugar y glorificaban el santuario con las ofrendas[a] más excelentes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con las ofrendas más espléndidas». El griego ἀποστολαῖς puede referirse a cosas enviadas como dones o benefacciones; el matiz exacto depende del contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐσέβειαν
  english_pob_choice: piety
  chosen_spanish: piedad
  alternatives_spanish:
  - devoción
  - religiosidad
  lexicon: LSJ
  rationale: εὐσέβεια expresa reverencia y conducta devota ante Dios. En español, 'piedad' conserva bien ese valor religioso y encaja de forma natural en el contexto del santuario.
- source_word: μισοπονηρίαν
  english_pob_choice: hatred of wickedness
  chosen_spanish: odio de la maldad
  alternatives_spanish:
  - odio del mal
  - aborrecimiento de la maldad
  lexicon: LSJ
  rationale: El compuesto señala un rechazo intenso de la maldad/lo malo. 'Odio de la maldad' mantiene la fuerza moral y la estructura nominal, sin suavizarla demasiado.
- source_word: συνέβαινεν
  english_pob_choice: it came about
  chosen_spanish: sucedía
  alternatives_spanish:
  - ocurría
  - acontecía
  lexicon: LSJ
  rationale: El imperfecto sugiere un efecto o estado resultante. 'Sucedía' permite una lectura fluida en español y conserva la idea de resultado reiterado o establecido.
- source_word: τιμᾶν
  english_pob_choice: honored
  chosen_spanish: honraban
  alternatives_spanish:
  - estimaban
  - rendían honor a
  lexicon: LSJ
  rationale: τιμάω aquí implica mostrar honor público o reconocimiento. 'Honraban' reproduce bien ese acto hacia el lugar sin necesidad de una perífrasis más pesada.
- source_word: τὸν τόπον
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - el sitio
  - este lugar
  lexicon: LSJ
  rationale: El griego dice literalmente 'el lugar'. Mantener 'el lugar' conserva la formulación reverencial y no especifica de más.
- source_word: τὸ ἱερὸν
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el templo
  - el recinto sagrado
  lexicon: LSJ
  rationale: ἱερόν puede referirse al recinto sagrado o complejo del templo. 'Santuario' preserva esa sacralidad y distingue este segundo término de 'el lugar'.
- source_word: ἀποστολαῖς ταῖς κρατίσταις
  english_pob_choice: the finest offerings
  chosen_spanish: las ofrendas más excelentes
  alternatives_spanish:
  - las mejores ofrendas
  - las ofrendas más espléndidas
  - las ofrendas enviadas más excelentes
  lexicon: LSJ
  rationale: ἀποστολαῖς puede aludir a dones/ofrendas enviadas; la revisión inglesa optó por 'offerings'. 'Ofrendas más excelentes' transmite la idea cultual y el superlativo de κράτιστος sin introducir innecesariamente 'enviadas' en el texto principal.
- source_word: δοξάζειν
  english_pob_choice: glorified
  chosen_spanish: glorificaban
  alternatives_spanish:
  - daban gloria a
  - honraban
  lexicon: LSJ
  rationale: δοξάζω implica dar gloria o realce. Como τιμᾶν ya se traduce con 'honraban', 'glorificaban' conserva la distinción entre ambos verbos.
theological_decisions:
- issue: Relación causal entre piedad/maldad y favor real
  english_pob_reading: The verse says that because of the piety and hatred of wickedness associated with the temple, even kings honored it and adorned it with benefactions.
  chosen_spanish_reading: El verso presenta la piedad y el odio de la maldad como la base del honor que los reyes dieron al lugar y al santuario.
  alternative_spanish_readings:
  - Podría entenderse que esas cualidades pertenecen a una persona concreta, no al lugar mismo.
  - Podría leerse como una descripción más general del ambiente religioso de Jerusalén.
  rationale: El griego vincula directamente estas cualidades con el efecto que sigue, pero no identifica explícitamente un sujeto personal. La traducción evita añadir un referente no explicitado y conserva la ambigüedad contextual.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla indebidamente.
translation_notes:
  revision_awareness: La redacción sigue el último estado revisado del texto inglés, donde se prefirió 'offerings' frente a 'gifts sent' para ἀποστολαῖς. La versión española adopta esa decisión en forma natural ('ofrendas') y mantiene la distinción entre τιμᾶν y δοξάζειν con 'honraban' / 'glorificaban'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' según la terminología del proyecto, aunque este versículo no lo menciona explícitamente.
  - '''Piedad'' se usa en sentido religioso, no como simple cortesía.'
  - '''Santuario'' se reserva para ἱερόν, mientras ''el lugar'' traduce τόπον para conservar la duplicación del texto griego.'
  - La nota a pie marca la alternativa semántica relevante de ἀποστολαῖς sin convertirla en paráfrasis del texto principal.
