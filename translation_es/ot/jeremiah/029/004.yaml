translation:
  language: es
  text: 'Así dice Yahvé de los ejércitos, el Dios de Israel, a todos los exiliados[a] que he enviado al exilio[b] de Jerusalén a Babilonia:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Exiliados» traduce el colectivo hebreo הַגּוֹלָה; también podría expresarse como «los desterrados» o «la comunidad del exilio».
    reason: lexical_alternative
  - marker: b
    text: 'O: «que he exiliado de Jerusalén a Babilonia». El verbo hebreo es causativo: «hacer ir al exilio/deportar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: La fórmula profética se expresa de manera natural en español con «Así dice», conservando el tono formal del mensaje y el valor discursivo de la introducción profética.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio proyectual para el nombre divino: transliterar el Tetragrámaton como «Yahvé», manteniendo el nombre personal de Dios y evitando la sustitución por un título.'
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los huestes
  - Todopoderoso
  lexicon: HALOT
  rationale: «De los ejércitos» comunica bien el sentido del título divino en español moderno. «Huestes» es posible pero más literario/arcaizante; «Todopoderoso» sería interpretativo y no estrictamente léxico.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: La construcción de posesión/identificación se mantiene de forma directa y transparente; en español es la formulación natural y fiel del sintagma constructo.
- source_word: לְכָל
  english_pob_choice: to all
  chosen_spanish: a todos
  alternatives_spanish:
  - para todos
  lexicon: HALOT
  rationale: La preposición marca a quién va dirigido el mensaje; «a todos» refleja el destinatario de manera natural en español.
- source_word: הַגּוֹלָה
  english_pob_choice: the exiles
  chosen_spanish: los desterrados
  alternatives_spanish:
  - los exiliados
  - la comunidad del destierro
  lexicon: HALOT
  rationale: Aunque el hebreo es un sustantivo colectivo singular, en español «los desterrados» transmite con claridad el grupo deportado. Se evita «exiliados» porque puede sonar más abstracto o moderno, y «comunidad del destierro» añade una paráfrasis no exigida por el texto.
- source_word: הִגְלֵיתִי
  english_pob_choice: I have sent into exile
  chosen_spanish: he hecho llevar al destierro
  alternatives_spanish:
  - he exiliado
  - he llevado al destierro
  lexicon: HALOT
  rationale: El verbo hitpael/hiphil causativo de גלה implica hacer ir al destierro, no solo describir una condición. «He hecho llevar al destierro» conserva esa causalidad explícita y evita suavizar la agencia divina.
- source_word: מִירוּשָׁלַם
  english_pob_choice: from Jerusalem
  chosen_spanish: de Jerusalén
  alternatives_spanish:
  - desde Jerusalén
  lexicon: HALOT
  rationale: La procedencia se expresa normalmente con «de» en español. «Desde» también sería posible, pero aquí «de» sigue el movimiento de salida implicado por el verbo.
- source_word: בָּבֶלָה
  english_pob_choice: to Babylon
  chosen_spanish: a Babilonia
  alternatives_spanish:
  - hasta Babilonia
  lexicon: HALOT
  rationale: La terminación direccional indica movimiento hacia Babilonia; «a Babilonia» es la equivalencia idiomática más natural y precisa en español.
theological_decisions:
- issue: Agencia divina en el destierro
  english_pob_reading: whom I have sent into exile
  chosen_spanish_reading: que he hecho llevar al destierro
  alternative_spanish_readings:
  - que he exiliado
  - que he permitido ser llevados al destierro
  rationale: Se conserva explícitamente que el propio Yahvé actúa como agente del destierro. No se atenúa la afirmación a mera अनुमति/permiso ni se desplaza la acción al poder babilónico, porque el hebreo atribuye la deportación a la iniciativa divina.
  doctrine_reference: Translation philosophy §1, §3
- issue: Modo de nombrar el Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se aplica el estándar del proyecto para יְהוָה, preservando el nombre divino en forma transliterada y evitando la sustitución tradicional por un título. Esto mantiene la continuidad con el audit trail en inglés.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El audit trail inglés muestra alta concordancia y sin revisiones aplicadas; por ello, la propuesta española sigue de cerca las decisiones léxicas y teológicas ya aprobadas, adaptándolas a un español natural sin perder la causalidad divina ni el valor formal de la fórmula profética.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino, en coherencia con el estándar del proyecto.
  - Se conserva la causalidad del verbo hebreo en la cláusula del destierro, evitando una traducción que diluya la agencia divina.
  - Se usa una fórmula profética breve y solemne («Así dice») que funciona bien en español bíblico contemporáneo.
  - «Desterrados» se usa como colectivo humano, en paralelo a la lectura inglesa «the exiles».
