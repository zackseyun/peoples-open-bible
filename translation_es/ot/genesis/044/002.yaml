translation:
  language: es
  text: Y pondrás mi copa, la copa de plata, en la boca[a] del saco del menor, junto con la plata de su compra de grano[b]. Y él hizo conforme a la palabra de José, que había dicho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''en la boca del saco'', un modismo para la abertura del saco.'
    reason: cultural_note
  - marker: b
    text: O 'el dinero para su grano'; el hebreo se refiere a la plata pagada por el grano o las provisiones.
    reason: lexical_alternative
lexical_decisions:
- source_word: גְּבִיעִי גְּבִיעַ הַכֶּסֶף
  english_pob_choice: my cup, the silver cup
  chosen_spanish: mi copa, la copa de plata
  alternatives_spanish:
  - mi cáliz, el cáliz de plata
  - mi copa, la copa plateada
  lexicon: HALOT
  rationale: גְּבִיעַ designa una copa o vaso ceremonial; en español 'copa' es la opción más natural y fiel. Mantengo la repetición appositiva ('mi copa, la copa de plata') para reflejar el énfasis hebreo sin fusionarlo en una sola expresión.
- source_word: תָּשִׂים
  english_pob_choice: put
  chosen_spanish: pondrás
  alternatives_spanish:
  - colocarás
  - meterás
  lexicon: HALOT
  rationale: שׂים es un verbo común de poner/colocar. En español narrativo, 'pondrás' conserva la directitud del mandato y suena natural en este contexto.
- source_word: בְּפִי
  english_pob_choice: in the mouth of
  chosen_spanish: en la boca de
  alternatives_spanish:
  - en la abertura de
  - en la entrada de
  lexicon: HALOT
  rationale: El hebreo usa literalmente 'boca' como idiomático para la abertura de un recipiente. Se conserva la imagen concreta, como en el audit trail inglés, porque el español la entiende y mantiene la textura del hebreo.
- source_word: אַמְתַּחַת
  english_pob_choice: sack
  chosen_spanish: talega
  alternatives_spanish:
  - saco
  - saco de grano
  lexicon: HALOT
  rationale: En el relato de hambre y provisiones, אַמְתַּחַת refiere a un saco o talega para transportar grano. 'Talega' es un equivalente natural y algo más preciso que el genérico 'bolsa' o 'bag', sin perder el contexto narrativo.
- source_word: הַקָּטֹן
  english_pob_choice: the youngest one
  chosen_spanish: el menor
  alternatives_spanish:
  - el más joven
  - el más pequeño
  lexicon: HALOT
  rationale: El contexto identifica al hermano menor. 'El menor' es una forma natural en español bíblico actual y evita añadir palabras que no están en el hebreo.
- source_word: כֶּסֶף שִׁבְרֹו
  english_pob_choice: the silver for his grain purchase
  chosen_spanish: el dinero de su compra de grano
  alternatives_spanish:
  - la plata de su compra de grano
  - el dinero para su grano
  lexicon: HALOT
  rationale: שֶׁבֶר / שִׁבְרוֹ en los relatos de hambre alude al grano/provisiones adquiridos. 'Dinero de su compra de grano' preserva la referencia comercial sin sobrerinterpretar el monto o el acto exacto; la nota explica la alternativa de 'plata' si se quisiera destacar el metal.
- source_word: וַיַּעַשׂ כִּדְבַר
  english_pob_choice: And he did according to Joseph's word
  chosen_spanish: Y él hizo conforme a la palabra de José
  alternatives_spanish:
  - Y actuó según la palabra de José
  - Y hizo como José había dicho
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea כִּדְבַר se rinde con 'conforme a la palabra de' para mantener la estructura y el carácter formal del relato. 'Palabra' conserva el valor de instrucción/indicación sin convertirlo en 'mandato'.
- source_word: אֲשֶׁר דִּבֵּר
  english_pob_choice: which he had spoken
  chosen_spanish: que había hablado
  alternatives_spanish:
  - que habló
  - que había dicho
  lexicon: HALOT
  rationale: El relativo remite a la instrucción previa de José. 'Había hablado' conserva el pasado anterior del inglés auditado y resulta idiomático en español; 'había dicho' sería posible, pero 'hablado' mantiene mejor el eco formal de דִּבֵּר.
theological_decisions:
- issue: Cómo traducir el objeto de la instrucción sin ocultar la imagen hebrea de 'boca'
  english_pob_reading: Retains 'in the mouth of the sack' as an idiom for the opening of the sack.
  chosen_spanish_reading: Se conserva 'en la boca de la talega' como imagen idiomática, no como un literalismo confuso.
  alternative_spanish_readings:
  - en la abertura de la talega
  - en la boca del saco
  rationale: 'No hay tensión doctrinal, pero sí una decisión de estilo y exégesis: la imagen concreta del hebreo merece preservarse porque es clara en español y mantiene la auditabilidad del original.'
  doctrine_reference: Principio de fidelidad textual y transparencia traductológica
- issue: Rendir כֶּסֶף שִׁבְרוֹ sin borrar la ambigüedad entre 'dinero' y 'plata'
  english_pob_reading: the silver for his grain purchase
  chosen_spanish_reading: el dinero de su compra de grano
  alternative_spanish_readings:
  - la plata de su compra de grano
  - el dinero para su grano
  rationale: El hebreo habla de כסף ('plata/dinero') ligado a la compra de grano. 'Dinero' comunica con claridad la función económica; la alternativa 'plata' es válida si se quiere enfatizar el metal. La redacción elegida no elimina la tensión léxica, pues queda explicada en la decisión lexical.
  doctrine_reference: Transparencia léxica y preservación de ambigüedad controlada
translation_notes:
  revision_awareness: 'El texto inglés auditado pasó por una revisión menor: ''the word of Joseph'' fue ajustado a ''Joseph''s word'' por naturalidad, sin cambio de sentido. La versión española sigue esa lectura formal y mantiene el orden narrativo del hebreo: instrucción de poner la copa y el dinero, seguida de la nota de obediencia.'
  spanish_consistency_notes:
  - Se usa 'José' para יוֹסֵף de manera consistente con la práctica estándar del español bíblico y con la inteligibilidad del relato.
  - Se conserva la repetición appositiva 'mi copa, la copa de plata' para reflejar el hebreo sin aplanar el estilo.
  - Se prefiere 'talega' por claridad narrativa; si una futura sección mantuviera 'saco', convendrá revisar uniformidad terminológica en este pasaje.
  - No se introduce mayúscula en 'palabra' porque no se trata de un título divino ni de un tecnicismo teológico.
