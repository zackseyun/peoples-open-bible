translation:
  language: es
  text: 'Estos fueron los hijos de Raquel, que le nacieron a Jacob: catorce personas en total[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «toda alma/persona, catorce»; un giro idiomático que significa que el total de personas era catorce.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These were
  chosen_spanish: Estos fueron
  alternatives_spanish:
  - Éstos fueron
  - Estos son
  lexicon: HALOT
  rationale: La forma hebrea introduce una cláusula-resumen en contexto genealógico; el pasado narrativo español resulta natural y conserva el valor de recapitulación del inglés POB.
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los hijos
  - los descendientes de
  - los hijos e hijas de
  lexicon: HALOT
  rationale: En español, "hijos de" mantiene la relación genealógica y es natural en una lista de descendencia. "Descendientes" ampliaría el sentido, pero borraría la forma lexical concreta del hebreo.
- source_word: רָחֵל
  english_pob_choice: Rachel
  chosen_spanish: Raquel
  alternatives_spanish:
  - Rakel
  lexicon: transliteration estándar bíblica
  rationale: Se usa la forma bíblica española tradicional y ampliamente reconocible, que corresponde al nombre propio del original.
- source_word: אֲשֶׁר
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - quienes
  - el cual
  lexicon: HALOT
  rationale: Para personas en español, "que" es la construcción relativa más natural y evita una rigidez innecesaria.
- source_word: יֻלַּד
  english_pob_choice: were born
  chosen_spanish: nacieron
  alternatives_spanish:
  - fueron nacidos
  - les nacieron
  lexicon: HALOT
  rationale: El pasivo hebreo expresa nacimiento en sentido genealógico; en español, la pasiva analítica resultaría pesada. "Nacieron" comunica fielmente el hecho sin perder la referencia al linaje.
- source_word: לְיַעֲקֹב
  english_pob_choice: to Jacob
  chosen_spanish: para Jacob
  alternatives_spanish:
  - a Jacob
  - de Jacob
  lexicon: HALOT
  rationale: El ל de relación/parentesco en este contexto puede expresarse de manera natural con "para" en español genealógico, sin implicar finalidad. Se conserva la idea de pertenencia/relación parental como en el inglés POB "to Jacob".
- source_word: כָּל נֶפֶשׁ
  english_pob_choice: persons in all
  chosen_spanish: en total, catorce personas
  alternatives_spanish:
  - catorce personas en total
  - catorce almas en total
  - un total de catorce personas
  lexicon: HALOT
  rationale: '"נֶפֶשׁ" en listas censales designa personas contables. "Personas" evita una lectura devocional de "almas" y preserva el valor enumerativo; "en total" refleja la suma final del hebreo, como en la nota inglesa.'
- source_word: אַרְבָּעָה עָשָׂר
  english_pob_choice: fourteen
  chosen_spanish: catorce
  alternatives_spanish:
  - catorce en número
  lexicon: HALOT
  rationale: Equivalente cardinal directo y preciso.
translation_notes:
  revision_awareness: 'Se mantuvo la lectura de resumen genealógico del hebreo y el audit trail inglés: la única tensión importante es נֶפֶשׁ, donde se optó por "personas" en vez de "almas" para no introducir un matiz teológico ajeno al conteo. No se requirieron revisiones textuales adicionales; el versículo es de alta concordancia con el contexto dado.'
  spanish_consistency_notes:
  - Se preserva el tono genealógico y resumitivo del pasaje.
  - '"Hijos de" refleja la forma hebrea sin forzar una reformulación explicativa.'
  - '"Personas" mantiene la función censal de נֶפֶשׁ; la nota conserva la alternativa literal idiomática.'
  - La puntuación con dos puntos reproduce la relación de resumen y conteo del original y del POB inglés.
