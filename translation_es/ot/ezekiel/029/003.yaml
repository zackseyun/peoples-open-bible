translation:
  language: es
  text: 'Habla y di: «Así dice el Señor Yahvé: Mira, estoy contra ti, Faraón, rey de Egipto, el gran monstruo marino[a] que yace en medio de sus canales del Nilo[b], el cual dice: “Mi Nilo es mío[c], y yo me hice a mí mismo”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “el gran dragón”; en este contexto, la imagen también puede evocar un monstruo semejante a un cocodrilo del Nilo.
    reason: lexical_alternative
  - marker: b
    text: O “en medio de sus ríos del Nilo”.
    reason: alternative_reading
  - marker: c
    text: O “Mi río es mío, y yo lo hice para mí”. El hebreo puede entenderse como una jactancia de poseer el Nilo o de haberse hecho a sí mismo.
    reason: alternative_reading
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor DIOS
  - el Señor Yahvéh
  lexicon: HALOT
  rationale: El hebreo combina el título אֲדֹנָי con el nombre divino יְהוִה. En español, 'el Señor Yahvé' preserva la doble referencia sin ocultar el nombre propio como haría 'SEÑOR', y evita la tautología de 'Señor SEÑOR'. 'DIOS' sería posible, pero diluye el nombre personal del pacto.
- source_word: הִנְנִי עָלֶיךָ
  english_pob_choice: Behold, I am against you
  chosen_spanish: He aquí, estoy contra ti
  alternatives_spanish:
  - Mira, estoy contra ti
  - Aquí estoy contra ti
  lexicon: HALOT
  rationale: '''He aquí'' conserva la fuerza profética de הִנְנִי y ''estoy contra ti'' refleja היטב el valor hostil de עַל en este contexto de juicio.'
- source_word: הַתַּנִּים הַגָּדוֹל
  english_pob_choice: the great sea monster
  chosen_spanish: el gran monstruo marino
  alternatives_spanish:
  - el gran dragón
  - el gran cocodrilo
  lexicon: HALOT
  rationale: תַּנִּין en lenguaje profético admite una imagen de criatura acuática monstruosa o caótica. 'Monstruo marino' conserva la amplitud semántica sin reducirlo solo a 'dragón' ni a un referente zoológico estrecho como 'cocodrilo'.
- source_word: הָרֹבֵץ
  english_pob_choice: lying
  chosen_spanish: que yace
  alternatives_spanish:
  - que está tendido
  - que se agazapa
  lexicon: HALOT
  rationale: El participio de רבץ describe a uno echado o recostado; 'que yace' mantiene la imagen de reposo soberbio en el Nilo y suena natural en español bíblico.
- source_word: בְּתוֹךְ יְאֹרָיו
  english_pob_choice: in the midst of his Nile channels
  chosen_spanish: en medio de sus canales del Nilo
  alternatives_spanish:
  - en medio de sus ríos del Nilo
  - en medio de sus corrientes del Nilo
  lexicon: HALOT
  rationale: יְאֹר designa especialmente el Nilo y sus canales. 'Canales del Nilo' hace explícito el contexto egipcio y preserva el plural posesivo.
- source_word: יְאֹרִי
  english_pob_choice: My Nile
  chosen_spanish: Mi Nilo
  alternatives_spanish:
  - Mi río
  - Mi canal del Nilo
  lexicon: HALOT
  rationale: La forma singular debe mantener el eco con יְאֹרָיו. 'Mi Nilo' reproduce el reclamo de posesión de Faraón y es más fiel al contexto que simplemente 'mi río'.
- source_word: וַאֲנִי עֲשִׂיתִנִי
  english_pob_choice: and I made myself
  chosen_spanish: y yo me hice a mí mismo
  alternatives_spanish:
  - y yo me hice
  - y yo me hice para mí
  lexicon: HALOT
  rationale: 'La vocalización masorética favorece un valor reflexivo: el sufijo es de primera persona singular. ''Me hice a mí mismo'' conserva el énfasis de autoexaltación y evita suavizar el hebreo.'
theological_decisions:
- issue: Traducción del nombre divino YHWH en combinación con אֲדֹנָי
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor DIOS
  - Señor Yahvé
  rationale: El texto hebreo contiene el Tetragrámaton, no un simple título genérico. En el marco del proyecto, se mantiene 'Yahvé' para no enmascarar el nombre del pacto. La forma 'el Señor Yahvé' comunica el doble título sin perder la identidad del nombre divino.
  doctrine_reference: 'DOCTRINE.md: יְהוָה YHWH → Yahvé'
- issue: Interpretación de וַאֲנִי עֲשִׂיתִנִי
  english_pob_reading: 'Pharaoh claims self-creation: ''I made myself'''
  chosen_spanish_reading: 'Faraón afirma auto-hacerse: ''y yo me hice a mí mismo'''
  alternative_spanish_readings:
  - 'Faraón afirma que hizo el Nilo para sí: ''y yo lo hice para mí'''
  - '''y yo me hice'''
  rationale: La forma hebrea favorece una lectura reflexiva, y el contexto acusa la soberbia casi divina de Faraón. Mantener la idea de auto-creación preserva la tensión teológica del pasaje en vez de resolverla o atenuarla.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; document ambiguity and preserve alternative in footnote'
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y no requirió cambios. Se mantuvo la decisión clave de traducir יְהוִה como 'Yahvé' y de conservar la lectura reflexiva de וַאֲנִי עֲשִׂיתִנִי, documentando la alternativa de posesión del Nilo en nota.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' de manera consistente con la política del proyecto para יְהוָה.
  - '''Señor'' se usa para אֲדֹנָי, evitando la duplicación ''Señor Yahvé'' como título rígido pero preservando la distinción entre título y nombre.'
  - '''Monstruo marino'' mantiene el campo semántico amplio de תַּנִּין sin fijarlo excesivamente.'
  - '''Canales del Nilo'' y ''Mi Nilo'' mantienen la referencia egipcia explícita y la coherencia léxica interna.'
  - Las notas al pie conservan la ambigüedad documentada entre auto-creación y posesión del Nilo.
