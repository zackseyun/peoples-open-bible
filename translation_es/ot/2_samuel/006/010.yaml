    rationale: Aunque intenta reflejar אֵלָיו, en español suena forzada y oscurece la relación entre 'hacia sí' y el destino físico. 'Llevarse ... a la Ciudad de David' preserva mejor el sentido narrativo de traer el arca a su propia sede.
  - severity: low
