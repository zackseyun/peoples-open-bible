translation:
  language: es
  text: Y allí proclamé un ayuno[a] ante nuestro Señor para los jóvenes varones[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego puede entenderse más literalmente como “y allí recé” o “hice voto de un ayuno” para los jóvenes varones ante nuestro Señor. El hebreo paralelo dice “proclamé un ayuno ... ante nuestro Dios”, lo cual probablemente explica el sentido adoptado aquí para el verbo.
    reason: alternative_reading
  - marker: b
    text: 'El paralelo hebreo de Esdras 8:21 continúa con detalles que no aparecen en esta línea griega: que el ayuno fue proclamado junto al río Ahava para humillarse ante Dios y pedir de él un camino recto para ellos, sus hijos y todos sus bienes.'
    reason: cross_reference
lexical_decisions:
- source_word: εὐξάμην
  english_pob_choice: I proclaimed
  chosen_spanish: proclamé
  alternatives_spanish:
  - recé
  - hice voto
  - anuncié
  lexicon: LSJ
  rationale: El verbo griego εὔχομαι/εὐξάμην puede significar “orar” o “votar”, pero el contexto y el paralelo hebreo favorecen la idea de declarar o proclamar un ayuno. Por eso se usa “proclamé” en vez de un calco devocional más estrecho.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - en ese lugar
  lexicon: LSJ
  rationale: Adverbio locativo simple; “allí” conserva la referencia narrativa con naturalidad en español.
- source_word: νηστείαν
  english_pob_choice: a fast
  chosen_spanish: un ayuno
  alternatives_spanish:
  - ayunamiento
  lexicon: LSJ
  rationale: El sustantivo griego se refiere al acto o institución del ayuno; en español, “ayuno” es la forma más clara y bíblica sin forzar la sintaxis.
- source_word: τοῖς νεανίσκοις
  english_pob_choice: for the young men
  chosen_spanish: para los jóvenes
  alternatives_spanish:
  - para los muchachos
  - para los jóvenes varones
  lexicon: LSJ
  rationale: νεανίσκοι señala a jóvenes o muchachos; “jóvenes” comunica bien el sentido y evita una redundancia pesada. Aunque el griego menciona explícitamente a los jóvenes, la frase se mantiene en el texto por fidelidad al testimonio griego.
- source_word: ἔναντι
  english_pob_choice: before
  chosen_spanish: ante
  alternatives_spanish:
  - delante de
  - en presencia de
  lexicon: LSJ
  rationale: “Ante” es la preposición española más natural en registro bíblico para expresar presencia delante de alguien.
- source_word: κυρίου ἡμῶν
  english_pob_choice: our Lord
  chosen_spanish: nuestro Señor
  alternatives_spanish:
  - nuestro Dueño
  - nuestro Maestro
  lexicon: LSJ
  rationale: κύριος se traduce aquí por “Señor” por ser el equivalente reverente y estándar en español bíblico. Se conserva el posesivo del griego. Aunque el paralelo hebreo dice “nuestro Dios”, el texto base griego dice “nuestro Señor”.
theological_decisions:
- issue: Divergencia entre el griego y el paralelo hebreo en el verbo principal
  english_pob_reading: Render εὐξάμην contextually as 'I proclaimed' rather than 'I prayed'
  chosen_spanish_reading: “proclamé” en lugar de “recé / oré”
  alternative_spanish_readings:
  - “recé un ayuno”
  - “voté un ayuno”
  - “proclamé un ayuno”
  rationale: El griego, leído literalmente, sugiere “orar” o “votar”, pero el paralelo hebreo y el contexto narrativo del ayuno favorecen la idea de proclamarlo. La traducción española sigue esa lectura contextual sin ocultar la tensión textual.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Título divino en el griego frente al paralelo hebreo
  english_pob_reading: our Lord
  chosen_spanish_reading: nuestro Señor
  alternative_spanish_readings:
  - nuestro Dios
  rationale: Como 1 Esdras se traduce primariamente desde el griego, se mantiene “Señor”. La diferencia con el hebreo paralelo se conserva implícita en la nota, sin reemplazar el término griego por la forma hebrea.
  doctrine_reference: 'DOCTRINE.md contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: 'Se siguió la revisión inglesa más reciente al mantener todos los elementos del versículo en orden natural: “allí”, “proclamé un ayuno”, “ante nuestro Señor” y “para los jóvenes”. La versión española conserva además la tensión entre el griego εὐξάμην y el paralelo hebreo, sin borrarla.'
  spanish_consistency_notes:
  - Se mantiene “Señor” para κύριος, conforme al criterio del proyecto para el griego kýr-ios.
  - Se evita “SEÑOR” como sustituto tipográfico y se usa la forma reverencial normal en español.
  - “Ayuno” se usa como sustantivo concreto, no como verbo, para reflejar νηστείαν.
  - El orden español prioriza fluidez sin omitir ningún elemento del texto griego.
