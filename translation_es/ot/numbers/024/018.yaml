translation:
  language: es
  text: Edom se convertirá en posesión[a]; Seir también se convertirá en posesión para sus enemigos, mientras Israel actúa con valentía[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Seir se convertirá en posesión de sus enemigos». El hebreo dice literalmente «sus enemigos» con un sufijo masculino singular; los intérpretes difieren sobre si se refiere a Seir/Edom o al gobernante descrito en el oráculo circundante.
    reason: alternative_reading
  - marker: b
    text: Hebreo «hace/actúa valor», un modismo que significa mostrar fuerza o actuar con valentía.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: will become
  chosen_spanish: se convertirá
  alternatives_spanish:
  - será
  lexicon: HALOT
  rationale: El hebreo profético expresa aquí un resultado futuro; «se convertirá» comunica mejor el cambio de estado que un simple «será».
- source_word: אֱדוֹם
  english_pob_choice: Edom
  chosen_spanish: Edom
  lexicon: HALOT
  rationale: Nombre propio del territorio/nación; se translitera de forma estándar.
- source_word: יְרֵשָׁה
  english_pob_choice: a possession
  chosen_spanish: posesión
  alternatives_spanish:
  - herencia
  - propiedad
  lexicon: HALOT
  rationale: En este contexto de conquista, «posesión» conserva la idea de algo ocupado o dominado sin introducir el matiz doméstico de «herencia».
- source_word: שֵׂעִיר
  english_pob_choice: Seir
  chosen_spanish: Seir
  alternatives_spanish:
  - Monte Seir
  lexicon: HALOT
  rationale: El hebreo nombra el lugar sin añadir «monte»; por eso se mantiene «Seir».
- source_word: אֹיְבָיו
  english_pob_choice: his enemies
  chosen_spanish: sus enemigos
  alternatives_spanish:
  - sus enemigos de él
  - sus adversarios
  lexicon: HALOT
  rationale: El sufijo hebreo es masculino singular; en español se refleja con «sus». Se evita resolver el referente en el texto, manteniendo la ambigüedad documentada por el POB inglés.
- source_word: וְיִשְׂרָאֵל
  english_pob_choice: while Israel
  chosen_spanish: mientras Israel
  alternatives_spanish:
  - e Israel
  lexicon: HALOT
  rationale: «Mientras» hace explícita la relación de simultaneidad/contraste que en español puede quedar implícita si solo se usa «y».
- source_word: עֹשֶׂה חָיִל
  english_pob_choice: acts valiantly
  chosen_spanish: actúa con valentía
  alternatives_spanish:
  - obra con valor
  - hace proezas
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de fortaleza o valor militar; «actúa con valentía» preserva ese sentido de forma natural en español actual.
theological_decisions:
- issue: Referente del sufijo singular en «sus enemigos»
  english_pob_reading: The suffix refers to the singular ruler figure in Balaam's oracle, so the text is rendered 'his enemies.'
  chosen_spanish_reading: El texto se traduce con un posesivo singular implícito en español, pero sin explicitar un referente concreto en el cuerpo del versículo.
  alternative_spanish_readings:
  - «sus enemigos» referido a Seir/Edom
  - «sus enemigos» referido al gobernante singular del oráculo
  rationale: El hebreo conserva un sufijo masculino singular y la tradición auditada del POB mantiene la tensión entre un referente territorial y uno personal/soberano. En español, «sus enemigos» preserva la forma y deja abierta la identificación, sin cerrar indebidamente el pasaje.
  doctrine_reference: Preservar la tensión interpretativa del texto
- issue: Valor del modismo verbal final
  english_pob_reading: Hebrew 'does/acts valor'—an idiom meaning to show strength or act valiantly.
  chosen_spanish_reading: «actúa con valentía» como modismo de fortaleza/heroísmo.
  alternative_spanish_readings:
  - «obra con valor»
  - «hace proezas»
  rationale: La frase hebrea no describe solo actividad general, sino un desempeño vigoroso o heroico. El español elegido mantiene ese contenido sin forzar una lectura doctrinal ajena al contexto.
  doctrine_reference: Léxico idiomático y sentido poético
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el POB inglés revisado: conserva la secuencia de tres miembros, refleja el futuro/resultativo de וְהָיָה con «se convertirá», mantiene la ambigüedad del sufijo singular en «sus enemigos» y traduce el modismo final con una expresión española natural y activa.'
  spanish_consistency_notes:
  - Se mantiene «Edom» y «Seir» como nombres propios transliterados, en coherencia con el estándar POB.
  - «posesión» se usa de forma uniforme para יְרֵשָׁה, evitando alternar con «herencia» que introduciría un matiz no requerido aquí.
  - Se evita «SEÑOR» u otra sustitución teológica, pues no aparece el nombre divino en este versículo.
  - La puntuación con punto y coma respeta la coordinación poética del hebreo y la segmentación del POB inglés.
