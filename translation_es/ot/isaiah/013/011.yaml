  - marker: b
    text: O «humillaré la soberbia de los despiadados». El hebreo usa dos expresiones casi sinónimas para la exaltación orgullosa en líneas paralelas.
    reason: lexical_alternative
  revision_rationale: Se cambió «violentosos»/«violentos» a «despiadados» para reflejar mejor עָרִיצִים y concordar con la decisión inglesa «the ruthless». También se corrigió la nota b para que represente la alternativa documentada sin desalinear los miembros paralelos. El resto del texto ya era fiel, claro y estilísticamente adecuado.
