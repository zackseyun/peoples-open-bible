base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/023/019.yaml
  text: Then the Ziphites went up to Saul at Gibeah[a], saying, “Is not David hiding among us in the strongholds in the wooded area, on the hill of Hachilah[b], which is to the right of the Jeshimon?”
  footnotes:
  - marker: a
    text: Or “in Horesh,” taking the term as a place name rather than “in the wooded area.”
    reason: alternative_reading
  - marker: b
    text: Literally “to the right of the Jeshimon”; in Hebrew geographical usage this likely means “south of the Jeshimon.”
    reason: lexical_alternative
