translation:
  language: es
  text: Porque un fuego se ha encendido en mi ira, y arde hasta las profundidades de Seol[a]; devora la tierra y su fruto, y abrasa los cimientos de los montes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hasta el Seol más profundo' o 'hasta las profundidades del sepulcro'. El hebreo dice 'hasta Seol, lo más bajo/profundo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación/causa de la acción de juicio precedente; 'Porque' conserva la fuerza conectiva en un español natural y bíblico sin sobretraducir.
- source_word: אֵשׁ קָדְחָה
  english_pob_choice: a fire has been kindled
  chosen_spanish: un fuego se ha encendido
  alternatives_spanish:
  - un fuego ha sido encendido
  - un fuego se ha prendido
  lexicon: HALOT
  rationale: La combinación sustantivo + perfecto expresa un fuego iniciado; 'se ha encendido' comunica bien el arranque del fuego y su estado resultante.
- source_word: בְאַפִּי
  english_pob_choice: in my anger
  chosen_spanish: en mi ira
  alternatives_spanish:
  - en mi enojo
  - en mi furor
  lexicon: HALOT
  rationale: אַפּ literalmente alude a nariz/nares, pero idiomáticamente significa ira. 'Ira' preserva la fuerza emotiva sin volverlo anatómico.
- source_word: וַתִּיקַד
  english_pob_choice: and it burns
  chosen_spanish: y arde
  alternatives_spanish:
  - y flamea
  - y prende
  lexicon: HALOT
  rationale: Mantiene la continuidad de la imagen del fuego con un verbo simple y directo; 'arde' es natural en español y no añade intensidad no explicitada.
- source_word: עַד שְׁאוֹל תַּחְתִּית
  english_pob_choice: to the depths of Sheol
  chosen_spanish: hasta las profundidades de Seol
  alternatives_spanish:
  - hasta lo más profundo de Seol
  - hasta las profundidades del Seol
  lexicon: HALOT
  rationale: Se conserva 'Seol' como término propio del mundo conceptual hebreo. 'Profundidades' refleja תַּחְתִּית con un superlativo espacial sin resolverlo doctrinalmente como 'infierno' o 'sepulcro'.
- source_word: וַתֹּאכַל
  english_pob_choice: it devours
  chosen_spanish: devora
  alternatives_spanish:
  - consume
  - se come
  lexicon: HALOT
  rationale: El verbo literal 'comer' funciona metafóricamente para el fuego; 'devora' conserva la vividez destructiva en español bíblico contemporáneo.
- source_word: אֶרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra firme
  - el país
  lexicon: HALOT
  rationale: En este poema de juicio cósmico, 'la tierra' es la opción más natural y abarca el alcance amplio del contexto.
- source_word: וִיבֻלָהּ
  english_pob_choice: its produce
  chosen_spanish: su produce
  alternatives_spanish:
  - su fruto
  - su cosecha
  - su rendimiento
  lexicon: HALOT
  rationale: יבול designa lo que la tierra produce. Se conserva 'produce' por fidelidad semántica y claridad, aunque suene menos idiomático que 'fruto' o 'cosecha'.
- source_word: וַתְּלַהֵט
  english_pob_choice: and sets ablaze
  chosen_spanish: y abrasa
  alternatives_spanish:
  - y incendia
  - y prende fuego a
  lexicon: HALOT
  rationale: '''Abrasa'' transmite una acción intensiva del fuego, cercana al valor causativo del verbo hebreo, sin recargar la línea.'
- source_word: מוֹסְדֵי הָרִים
  english_pob_choice: the foundations of the mountains
  chosen_spanish: los cimientos de los montes
  alternatives_spanish:
  - los fundamentos de los montes
  - las bases de los montes
  lexicon: HALOT
  rationale: '''Cimientos'' y ''fundamentos'' son equivalentes posibles; ''cimientos'' resulta más transparente para el español general y conserva la imagen estructural literal.'
theological_decisions:
- issue: Rendering of שְׁאוֹל
  english_pob_reading: Sheol
  chosen_spanish_reading: Seol
  alternative_spanish_readings:
  - el sepulcro
  - el inframundo
  - el infierno
  rationale: Se mantiene el término propio para no colapsar el concepto hebreo en categorías posteriores. 'Seol' preserva la tensión teológica y conceptual del texto original.
  doctrine_reference: Original-language primacy; preserve Old Testament underworld terminology without importing later doctrinal identifications.
translation_notes:
  revision_awareness: La revisión auditada en inglés sustituyó 'burns down to' por 'burns to' para ajustarse mejor al hebreo sin añadir matiz. La redacción española sigue esa decisión con 'arde hasta' y evita cualquier incremento interpretativo. También se mantuvo la preservación de 'Sheol/Seol' como término técnico del hebreo, conforme al criterio revisado y a la nota lexical del original.
  spanish_consistency_notes:
  - Se usa 'Seol' de forma consistente para שְׁאוֹל, siguiendo la decisión del POB inglés de preservar el término técnico.
  - Se emplea 'produce' en español como calco semántico controlado para יְבֻלָהּ, porque el contexto poético requiere el sustantivo general de lo que la tierra produce.
  - '''Cimientos'' traduce el paralelismo de ''foundations'' sin introducir una interpretación arquitectónica ajena al hebreo.'
