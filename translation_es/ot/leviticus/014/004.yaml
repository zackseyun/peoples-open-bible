    reason: lexical_alternative
  - marker: b
    text: La identidad botánica exacta del «hisopo» es incierta; se conserva la traducción tradicional.
    reason: cultural_note
  revision_rationale: Se ajusta «para el que se purifica» a «para la persona que está siendo purificada» para reflejar mejor el matiz procesual/pasivo de לַמִּטַּהֵר. Se cambia «carmesí» por «hilo escarlata» para conservar que שְׁנִי תוֹלַעַת designa un material teñido, en línea con la decisión léxica auditada y con un español más natural en una lista de objetos rituales. Se actualiza la nota [a] para mantener una alternativa real y coherente con el texto principal.
