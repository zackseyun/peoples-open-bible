translation:
  language: es
  text: Yahvé estaba con Josué[a], y su fama se extendió por toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su reporte» o «la noticia acerca de él». El hebreo puede denotar reporte, noticia o reputación; aquí probablemente se refiere a la creciente fama de Josué.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Sigo el criterio del proyecto para el nombre divino: transliterar el Tetragrámaton como «Yahvé», preservando el nombre personal de Dios en vez de sustituirlo por un título.'
- source_word: וַיְהִי
  english_pob_choice: was
  chosen_spanish: estaba
  alternatives_spanish:
  - era
  - llegó a estar
  lexicon: HALOT
  rationale: En esta secuencia narrativa, היה expresa estado/presencia continuada; en español, «estaba» comunica de forma natural la idea de que Yahvé acompañaba a Josué.
- source_word: אֶת יְהוֹשֻׁעַ
  english_pob_choice: with Joshua
  chosen_spanish: con Josué
  alternatives_spanish:
  - junto a Josué
  - al lado de Josué
  lexicon: HALOT
  rationale: La construcción hebrea con היה + אֶת + persona expresa acompañamiento o presencia a favor de alguien; «con Josué» refleja esa relación de manera directa y natural.
- source_word: שָׁמְעֹו
  english_pob_choice: his fame
  chosen_spanish: su fama
  alternatives_spanish:
  - su fama y renombre
  - su noticia
  - el reporte acerca de él
  lexicon: HALOT
  rationale: El sustantivo derivado de שמע puede significar reporte, noticia o reputación. En este contexto, el sentido dominante es la reputación/renombre que se difundía, y «su fama» lo expresa bien en español.
- source_word: בְּכָל הָאָרֶץ
  english_pob_choice: in all the land
  chosen_spanish: en toda la tierra
  alternatives_spanish:
  - en toda la tierra
  - por toda la tierra
  - en todo el país
  lexicon: HALOT
  rationale: Aunque «la tierra» puede sonar más amplio, aquí הארץ se entiende en el marco narrativo local. «En toda la tierra» mantiene el alcance total de la difusión y es una opción bíblica comprensible en español.
theological_decisions:
- issue: Nombre divino en el texto principal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto principal conserva el nombre propio de Dios según la política del proyecto, sin ocultarlo tras una sustitución titulada. Esto también evita perder la transparencia auditiva del original hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Coincide con el contexto auditado en inglés: Yahvé/Yahweh, presencia con Josué y el sentido de שָׁמְעֹו como fama/renombre. No se detectan revisiones aplicadas en la pista inglesa, por lo que la redacción española sigue directamente el sentido aprobado.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con el estándar del proyecto para יְהוָה.
  - Se usa «Josué» para el nombre propio, con ortografía española común y clara.
  - «Su fama» preserva el valor de reputación/renombre sin volver demasiado técnico el texto principal.
  - La nota conserva la ambigüedad lexical relevante de שָׁמְעֹו sin sobreinterpretar el alcance.
