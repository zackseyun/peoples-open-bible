translation:
  language: es
  text: 'Los llamó[a], y dijeron: «Aquí estamos»[c][b]; resplandecieron con alegría para el que los hizo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «los convocó»; el griego admite el matiz de llamar o convocar.
    reason: lexical_alternative
  - marker: b
    text: El referente son los astros o luminarias del contexto anterior, presentados poéticamente como si respondieran a su Creador.
    reason: cross_reference
  - marker: c
    text: O, «Estamos aquí»; el griego permite una formulación de presencia o de respuesta más literal.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκάλεσεν
  english_pob_choice: He called
  chosen_spanish: lo llamó
  alternatives_spanish:
  - los llamó
  - los convocó
  lexicon: BDAG
  rationale: El aoristo de καλέω se expresa de forma natural con «llamó». Como el antecedente inmediato en el contexto español se sobreentiende por el verso anterior, el pronombre «lo» funciona aquí como referencia al acto de llamada en el flujo poético; si se prefiriera explicitar el referente plural, «los llamó» también sería posible.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - los llamó
  - les llamó
  lexicon: BDAG
  rationale: El pronombre griego es plural masculino y remite a los astros/cielos personificados. En español, el referente plural se expresa naturalmente con «los»; «les» sería menos preciso aquí por ser objeto directo.
- source_word: εἶπον
  english_pob_choice: they said
  chosen_spanish: dijeron
  alternatives_spanish:
  - respondieron
  - contestaron
  lexicon: BDAG
  rationale: Como el griego puede funcionar como simple expresión de habla o respuesta, «dijeron» mantiene la cercanía formal al texto; el matiz responsivo queda claro por el contexto de llamada previa.
- source_word: Πάρεσμεν
  english_pob_choice: Here we are
  chosen_spanish: Aquí estamos
  alternatives_spanish:
  - Estamos aquí
  - Presentes
  lexicon: LSJ
  rationale: La forma expresa presencia y disposición en respuesta a ser llamados. «Aquí estamos» es la equivalencia idiomática más natural en español y conserva el carácter responsivo.
- source_word: ἔλαμψαν
  english_pob_choice: they shone
  chosen_spanish: resplandecieron
  alternatives_spanish:
  - brillaron
  - dieron luz
  lexicon: BDAG
  rationale: El verbo λάμπω denota irradiar luz. «Resplandecieron» conserva el tono poético y la intensidad visual mejor que una formulación más plana.
- source_word: μετʼ εὐφροσύνης
  english_pob_choice: with gladness
  chosen_spanish: con alegría
  alternatives_spanish:
  - con gozo
  - gozosamente
  lexicon: BDAG
  rationale: εὐφροσύνη es alegría/gozo/alegría festiva. «Con alegría» es claro, digno y natural en español; mantiene el sustantivo y el tono elevadamente poético.
- source_word: τῷ ποιήσαντι αὐτούς
  english_pob_choice: for the one who made them
  chosen_spanish: para el que los hizo
  alternatives_spanish:
  - ante el que los hizo
  - al que los hizo
  lexicon: BDAG
  rationale: El dativo con λάμπω admite relación u orientación hacia el creador. «Para el que los hizo» preserva la relación de respuesta y evita precisar indebidamente si la idea es «ante», «a» o «para».
theological_decisions:
- issue: Personificación de los astros como respuesta al llamado divino
  english_pob_reading: 'Retain the personification directly: the stars answer and shine gladly for their maker.'
  chosen_spanish_reading: 'Mantener la personificación: los astros responden al llamado y resplandecen con alegría para su Hacedor.'
  alternative_spanish_readings:
  - Reducirlo a descripción astronómica impersonal
  - Despersonificar la imagen poética
  rationale: El griego presenta a los cuerpos celestes como participantes obedientes en la alabanza de su Creador. La traducción conserva esa fuerza poético-teológica sin reducirla a mera descripción física.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: No hubo cambios necesarios en la revisión más reciente; el acuerdo de control fue alto y la lectura se mantuvo estable respecto del texto fuente y la auditoría inglesa.
  spanish_consistency_notes:
  - Se preserva la personificación poética de los astros sin desactivarla en prosa explicativa.
  - Se evita «SEÑOR» y se traduce el participio con un sustantivo verbal («el que los hizo») acorde con el original.
  - El registro es reverente y publicable en español neutral, con sintaxis breve y clara.
