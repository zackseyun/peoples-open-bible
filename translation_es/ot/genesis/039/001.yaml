translation:
  language: es
  text: Y José había sido llevado a Egipto, y Potifar, oficial[a] de Faraón, capitán de la guardia, un egipcio[b], lo compró a los ismaelitas que lo habían llevado allá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo סְרִיס puede significar tanto «oficial/cortesano» como «eunuco».
    reason: lexical_alternative
  - marker: b
    text: 'O: «un hombre egipcio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוּרַד
  english_pob_choice: had been brought down
  chosen_spanish: había sido llevado
  alternatives_spanish:
  - había sido traído
  - había sido bajado
  lexicon: HALOT
  rationale: El hophal de ירד expresa que José fue hecho descender o llevado a un lugar más bajo. En español, «había sido llevado» conserva la pasividad y el movimiento de descenso sin sonar artificial; «bajado» sería más literal, pero menos natural en este contexto narrativo.
- source_word: מִצְרָיְמָה
  english_pob_choice: to Egypt
  chosen_spanish: a Egipto
  alternatives_spanish:
  - a Egipto
  - hacia Egipto
  lexicon: HALOT
  rationale: El sufijo direccional indica destino. «A Egipto» es la forma natural y transparente en español; mantiene la orientación sin añadir matices no necesarios.
- source_word: וַיִּקְנֵהוּ
  english_pob_choice: bought him
  chosen_spanish: lo compró
  alternatives_spanish:
  - lo adquirió
  - lo compró
  lexicon: HALOT
  rationale: קנה en este contexto de transacción de esclavos se entiende de compra. «Lo compró» conserva la fuerza comercial directa del verbo y es la opción más clara en español.
- source_word: סְרִיס פַּרְעֹה
  english_pob_choice: an officer of Pharaoh
  chosen_spanish: oficial de Faraón
  alternatives_spanish:
  - oficial de Faraón
  - eunuco de Faraón
  - cortesano de Faraón
  lexicon: HALOT
  rationale: סְרִיס puede significar «oficial/cortesano» o «eunuco». Siguiendo el criterio del POB inglés, el sentido administrativo es el más seguro en el texto principal; se conserva la alternativa más literal en la nota para no borrar la tensión léxica.
- source_word: שַׂר הַטַּבָּחִים
  english_pob_choice: the captain of the guard
  chosen_spanish: capitán de la guardia
  alternatives_spanish:
  - capitán de la guardia
  - jefe de los guardias
  - jefe de los verdugos
  lexicon: HALOT
  rationale: La expresión tradicional comunica bien el cargo en español y evita sobreespecificar entre guardia, escolta o verdugos. «Capitán de la guardia» conserva el rango y la función militar/real.
- source_word: אִישׁ מִצְרִי
  english_pob_choice: an Egyptian man
  chosen_spanish: un egipcio
  alternatives_spanish:
  - un egipcio
  - un hombre egipcio
  - un hombre de Egipto
  lexicon: HALOT
  rationale: Aunque el hebreo incluye literalmente «hombre», en español «un egipcio» comunica la nacionalidad de forma natural y fiel al sentido del sintagma. Se evita la redundancia de «hombre» en el flujo de la frase.
- source_word: מִיַּד
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - de
  - de la mano de
  lexicon: HALOT
  rationale: El hebreo usa una idiomática «de la mano de». En el contexto de compra, el español normal dice «de»; la frase conserva el origen de la transacción sin forzar la imagen corporal.
- source_word: הַיִּשְׁמְעֵאלִים
  english_pob_choice: the Ishmaelites
  chosen_spanish: los ismaelitas
  alternatives_spanish:
  - los ismaelitas
  lexicon: HALOT
  rationale: Se mantiene el etnónimo de manera directa, como en el original, sin expandir a «comerciantes» porque eso ya sería inferencia contextual.
- source_word: אֲשֶׁר הוֹרִדֻהוּ שָׁמָּה
  english_pob_choice: who had brought him down there
  chosen_spanish: que lo habían llevado allá
  alternatives_spanish:
  - que lo habían llevado allá
  - que lo habían bajado allí
  lexicon: HALOT
  rationale: La relativa repite el motivo de descenso de ירד. «Lo habían llevado allá» mantiene el antecedente y la referencia al destino; «allá» reproduce el valor de שָׁמָּה sin excesiva literalidad.
theological_decisions:
- issue: Sentido de סְרִיס en el título de Potifar
  english_pob_reading: Rendered as 'officer of Pharaoh' in the main text
  chosen_spanish_reading: «oficial de Faraón» en el texto principal
  alternative_spanish_readings:
  - «eunuco de Faraón»
  - «cortesano de Faraón»
  rationale: Se preserva la ambigüedad real del término sin imponer el sentido biológico cuando el relato no lo exige. La nota mantiene visible la alternativa literal para que el lector vea la tensión lexical que el hebreo permite.
  doctrine_reference: Translation philosophy §3 (preserve theological/interpretive tension where genuine ambiguity exists)
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión desde «an Egyptian man» a «an Egyptian» por razones de naturalidad. Para el español se siguió el mismo principio: se evita la redundancia innecesaria y se conserva el sentido nominativo de nacionalidad. También se mantuvo la decisión estable de traducir סְרִיס en el texto principal por su sentido administrativo, con la alternativa literal visible en nota.'
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma de proyecto, pero en este versículo no aparece el nombre divino.
  - «Faraón» se conserva como nombre/título estable en español bíblico.
  - La estructura de la oración reproduce el encadenamiento narrativo del hebreo sin añadir explicaciones interpretativas.
  - Se conserva la progresión temporal con pluscuamperfecto en la primera cláusula para reflejar anterioridad relativa.
