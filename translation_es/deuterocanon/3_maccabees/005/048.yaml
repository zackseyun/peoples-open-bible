    rationale: βαρυχῆ θόρυβον apunta a un ruido/clamor de gran peso o resonancia. 'Tumulto fuerte' suena extraño en español; 'un gran estruendo' comunica mejor la intensidad acústica. Conviene conservar en nota las alternativas de resonancia profunda, siguiendo el rastro inglés.
