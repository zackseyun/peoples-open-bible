translation:
  language: es
  text: también todas las ciudades de almacenamiento[a] que eran de Salomón, las ciudades de los carros, las ciudades de los jinetes[b], y todo lo que Salomón deseó[c] construir en Jerusalén, en el Líbano, y en toda la tierra de su dominio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ciudades de depósito' o 'ciudades de provisiones'. El hebreo se refiere a ciudades destinadas al almacenamiento o al suministro.
    reason: lexical_alternative
  - marker: b
    text: O 'ciudades de la caballería'. El término hebreo se refiere más específicamente a jinetes o caballería que a caballos en general.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'el deseo de Salomón que él deseó construir', una expresión hebrea enfática para lo que Salomón quiso construir con fuerza.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָרֵי הַמִּסְכְּנוֹת
  english_pob_choice: storage cities
  chosen_spanish: ciudades de provisiones
  alternatives_spanish:
  - ciudades de almacenes
  - ciudades de depósito
  - ciudades de almacenamiento
  lexicon: HALOT
  rationale: El hebreo apunta a ciudades destinadas al almacenamiento o a provisiones, no simplemente a poblaciones ordinarias. En español, 'ciudades de provisiones' conserva la función administrativa y logística con buena claridad, sin cargar una imagen comercial ajena al contexto.
- source_word: אֲשֶׁר הָיוּ לִשְׁלֹמֹה
  english_pob_choice: that belonged to Solomon
  chosen_spanish: que eran de Salomón
  alternatives_spanish:
  - que pertenecían a Salomón
  - que eran para Salomón
  lexicon: HALOT
  rationale: La construcción hebrea expresa pertenencia o asignación. 'Que eran de Salomón' es natural en español y mantiene la idea posesiva sin forzar una formulación más jurídica de lo necesario.
- source_word: עָרֵי הָרֶכֶב
  english_pob_choice: the chariot cities
  chosen_spanish: las ciudades de los carros
  alternatives_spanish:
  - las ciudades de los carros de guerra
  - las ciudades para carros
  lexicon: HALOT
  rationale: '''Rékhev'' se refiere a carros, y en este contexto militar conviene conservar la designación directa. ''Carros'' reproduce el referente con sobriedad y evita sobreinterpretar el tipo exacto de uso más allá del contexto.'
- source_word: עָרֵי הַפָּרָשִׁים
  english_pob_choice: the cities of the horsemen
  chosen_spanish: las ciudades de los jinetes
  alternatives_spanish:
  - las ciudades de los hombres de caballo
  - las ciudades de la caballería
  lexicon: HALOT
  rationale: El término designa a los jinetes o la caballería, no a los caballos en general. 'Jinetes' mantiene la distinción lexical respecto de los carros y es más transparente para el lector español que una calca como 'ciudades de los horsemen'.
- source_word: חֵשֶׁק שְׁלֹמֹה אֲשֶׁר חָשַׁק
  english_pob_choice: all that Solomon desired
  chosen_spanish: todo lo que Salomón deseó
  alternatives_spanish:
  - todo el deseo de Salomón que él deseó
  - todo cuanto Salomón anheló
  lexicon: HALOT
  rationale: El hebreo usa una construcción intensiva de sustantivo + verbo de la misma raíz. En español, 'todo lo que Salomón deseó' transmite fielmente el alcance y la fuerza del deseo sin una repetición artificial que sonaría poco natural.
- source_word: לִבְנוֹת
  english_pob_choice: to build
  chosen_spanish: construir
  alternatives_spanish:
  - edificar
  - levantar
  lexicon: HALOT
  rationale: En proyectos reales y urbanos, 'construir' comunica bien la acción general del texto. 'Edificar' sería posible, pero 'construir' resulta más claro y no pierde el sentido de obra material.
- source_word: בִּירוּשָׁלִַם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: Topónimo estándar en español bíblico.
- source_word: וּבַלְּבָנוֹן
  english_pob_choice: in Lebanon
  chosen_spanish: en el Líbano
  alternatives_spanish:
  - en el país del Líbano
  - en la región del Líbano
  lexicon: HALOT
  rationale: El contexto parece referirse al ámbito geográfico de la actividad constructiva de Salomón. 'Líbano' se mantiene como topónimo, sin resolver aquí si alude estrictamente a la cordillera o al territorio amplio, porque el hebreo deja esa amplitud.
- source_word: אֶרֶץ מֶמְשַׁלְתּוֹ
  english_pob_choice: the land of his dominion
  chosen_spanish: la tierra de su dominio
  alternatives_spanish:
  - la tierra de su gobierno
  - el territorio bajo su dominio
  - la tierra de su reino
  lexicon: HALOT
  rationale: El binomio hebreo combina una idea concreta de tierra con la de dominio o gobierno. 'Tierra de su dominio' preserva ambas dimensiones con un tono bíblico claro y no meramente abstracto.
theological_decisions:
- issue: La extensión de חֵשֶׁק/חָשַׁק como deseo intensivo, sin suavizarla
  english_pob_reading: all that Solomon desired
  chosen_spanish_reading: todo lo que Salomón deseó
  alternative_spanish_readings:
  - todo el deseo de Salomón
  - todo cuanto Salomón anheló
  rationale: No hay necesidad de domesticar la repetición hebrea en una sola idea vaga. 'Todo lo que Salomón deseó' conserva el contenido amplio y la fuerza volitiva del pasaje, sin introducir una lectura devocional inexistente en el texto.
  doctrine_reference: Principio de suficiencia y precisión textual; no añade contenido doctrinal.
translation_notes:
  revision_awareness: Seguí la revisión inglesa más reciente que prefirió una formulación más completa para la cláusula de deseo ('all that Solomon desired') y una forma más directa para el grupo de los horsemen ('cities of the horsemen'). En español, eso se refleja en 'todo lo que Salomón deseó' y 'las ciudades de los jinetes'. También mantuve el alcance del topónimo 'Líbano' sin explicitar una glosa interpretativa que el hebreo no impone.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto base lo exija; aquí no aparece.
  - '''Mesías/Cristo'' no aplica en este versículo.'
  - Se conserva 'carros' y 'jinetes' como pares contrastivos para reflejar la distinción hebrea.
  - La puntuación y el orden sintáctico buscan sonar naturales en español sin perder el paralelismo enumerativo del hebreo.
