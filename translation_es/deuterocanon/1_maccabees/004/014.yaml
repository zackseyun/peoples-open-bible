translation:
  language: es
  text: Y trabaron batalla[a], y las naciones fueron aplastadas, y huyeron a la llanura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los gentiles fueron aplastados», ya que «las naciones» puede referirse aquí específicamente a pueblos no judíos.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνῆψαν
  english_pob_choice: they joined battle
  chosen_spanish: trabaron batalla
  alternatives_spanish:
  - entraron en combate
  - se unieron en batalla
  - lucharon
  lexicon: LSJ
  rationale: En contexto militar, συνάπτω expresa entablar o trabar combate, no solo “juntarse”. «Trabar batalla» conserva el matiz bélico y suena natural en español bíblico sin perder precisión.
- source_word: συνετρίβησαν
  english_pob_choice: were crushed
  chosen_spanish: fueron aplastadas
  alternatives_spanish:
  - fueron quebrantadas
  - fueron destrozadas
  - fueron derrotadas
  lexicon: LSJ
  rationale: El pasivo de συντρίβω tiene fuerza de romper o aplastar. «Fueron aplastadas» mantiene la imagen intensa del griego mejor que una simple “derrotadas”.
- source_word: τὰ ἔθνη
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - los pueblos
  - las fuerzas enemigas
  lexicon: LSJ
  rationale: El griego dice literalmente «las naciones». En 1 Macabeos puede aludir a no judíos, pero aquí el texto mantiene el término amplio; por eso se conserva «las naciones» sin estrecharlo demasiado.
- source_word: τὸ πεδίον
  english_pob_choice: the plain
  chosen_spanish: la llanura
  alternatives_spanish:
  - el campo abierto
  - el llano
  - la planicie
  lexicon: LSJ
  rationale: πεδίον designa una llanura o zona plana y abierta. «La llanura» es una equivalencia natural y fiel en español para el retiro hacia terreno abierto.
theological_decisions:
- issue: τὰ ἔθνη como designación de pueblos no judíos o de fuerzas enemigas
  english_pob_reading: the nations / Or 'the Gentiles'
  chosen_spanish_reading: 'las naciones / Origen posible: «los gentiles» como glosa alternativa'
  alternative_spanish_readings:
  - los gentiles
  - los extranjeros
  rationale: La POB inglesa preserva «the nations» y anota que en este contexto puede referirse específicamente a gentiles. En español se mantiene el término literal en el texto principal y se deja la alternativa interpretativa como nota, sin borrar la ambigüedad histórica del pasaje.
  doctrine_reference: No aplica; decisión léxica-histórica de traducción.
translation_notes:
  revision_awareness: El texto fuente griego y la auditoría inglesa concuerdan de manera alta; no se identificaron revisiones sustantivas pendientes. La versión española sigue de cerca el griego y conserva la alternancia militar de los verbos con una nota para la posible lectura específica de τὰ ἔθνη.
  spanish_consistency_notes:
  - Se mantiene «las naciones» como traducción principal de τὰ ἔθνη, en consonancia con la POB inglesa.
  - Se usa «Y» inicial para coordinar la narración, sin añadir información implícita.
  - «Trabar batalla» se eligió como equivalente idiomático de la acción militar de συνῆψαν.
  - La nota al pie solo aclara la alternativa contextual de «gentiles» y no introduce una reinterpretación doctrinal.
