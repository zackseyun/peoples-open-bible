translation:
  language: es
  text: Y miré, y he aquí, cuatro ruedas junto a los querubines, una rueda junto a cada querubín; y la apariencia de las ruedas era como piedra de berilo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «piedra de tarshish»; la identificación exacta de la piedra preciosa es incierta. Puede referirse al berilo, al crisólito o a otra piedra preciosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶרְאֶה
  english_pob_choice: And I looked
  chosen_spanish: Y miré
  alternatives_spanish:
  - Y vi
  lexicon: HALOT
  rationale: En un reporte de visión, «miré» conserva el acto de dirigir la atención antes de la descripción, igual que el inglés POB optó por «looked» en vez de «saw». «Vi» es posible, pero aquí suena menos dinámico frente a «he aquí».
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y resulta que
  lexicon: HALOT
  rationale: «He aquí» reproduce bien la fuerza deíctica e inmediata del hebreo en lenguaje profético, y es una fórmula española digna y reconocible. Mantiene el efecto de sorpresa o presentación visual sin exagerar la paráfrasis.
- source_word: אַרְבָּעָה אוֹפַנִּים
  english_pob_choice: four wheels
  chosen_spanish: cuatro ruedas
  alternatives_spanish:
  - cuatro llantas
  lexicon: HALOT
  rationale: «Ruedas» es la equivalencia normal para אוֹפַנִּים en este contexto visionario de Ezequiel. «Llantas» sería poco natural y más técnico en español moderno, sin aportar fidelidad adicional.
- source_word: אֵצֶל
  english_pob_choice: beside
  chosen_spanish: junto a
  alternatives_spanish:
  - al lado de
  - cerca de
  lexicon: HALOT
  rationale: «Junto a» es natural y preciso para proximidad inmediata. En español bíblico moderno evita la repetición rígida de «al lado de» sin perder el matiz espacial.
- source_word: הַכְּרוּבִים
  english_pob_choice: the cherubim
  chosen_spanish: los querubines
  alternatives_spanish:
  - los querubines alados
  lexicon: HALOT
  rationale: «Querubines» conserva el término consagrado para estos seres visionarios. No se añade «alados» porque el hebreo aquí no lo dice explícitamente y sería una expansión innecesaria.
- source_word: אוֹפַן אֶחָד אֵצֶל הַכְּרוּב אֶחָד
  english_pob_choice: one wheel beside each cherub
  chosen_spanish: una rueda junto a cada querubín
  alternatives_spanish:
  - una rueda junto a un querubín
  lexicon: HALOT
  rationale: El hebreo distribuye el par «uno... uno», y en español «cada querubín» comunica esa distribución con claridad, como hizo el POB inglés. Evita una repetición forzada sin perder el paralelismo.
- source_word: וּמַרְאֵה הָאוֹפַנִּים
  english_pob_choice: and the appearance of the wheels
  chosen_spanish: y la apariencia de las ruedas
  alternatives_spanish:
  - y el aspecto de las ruedas
  lexicon: HALOT
  rationale: «Apariencia» refleja bien מַרְאֶה como lo visible que se presenta ante el profeta. «Aspecto» también sería posible, pero «apariencia» conserva mejor el registro descriptivo de la visión.
- source_word: כְּעֵין
  english_pob_choice: like beryl stone
  chosen_spanish: como piedra de berilo
  alternatives_spanish:
  - como berilo
  - como una piedra de tarshish
  lexicon: HALOT
  rationale: El hebreo compara la apariencia con una piedra preciosa específica, pero la identificación exacta es incierta. «Piedra de berilo» sigue la decisión del POB inglés de usar una gema moderna comúnmente propuesta, sin convertir la identificación en certeza absoluta.
- source_word: אֶבֶן תַּרְשִׁישׁ
  english_pob_choice: beryl stone
  chosen_spanish: piedra de berilo
  alternatives_spanish:
  - piedra de tarshish
  - topacio
  - crisólito
  lexicon: HALOT
  rationale: Se mantiene «berilo» como opción sobria y académicamente frecuente para תַּרְשִׁישׁ, reconociendo que la equivalencia exacta es discutida. «Piedra» se conserva porque אֶבֶן es explícito en el hebreo.
theological_decisions:
- issue: Identificación de la piedra preciosa de la visión
  english_pob_reading: The exact gemstone identification is uncertain; 'beryl stone' is used without overclaiming certainty.
  chosen_spanish_reading: La apariencia era como piedra de berilo, sin afirmar con certeza la identificación mineral exacta.
  alternative_spanish_readings:
  - como piedra de tarshish
  - como crisólito
  - como topacio
  rationale: El pasaje describe una semejanza visual, no una identificación técnica definitiva. La traducción conserva la tensión documentada entre la imagen bíblica y la incertidumbre lexicográfica, evitando resolverla de forma dogmática.
  doctrine_reference: No aplica; decisión lexicográfica sobre imaginería visionaria.
translation_notes:
  revision_awareness: Se siguió la revisión del POB inglés que eliminó la idea de «gleam/fulgor» y dejó la comparación más directa con la piedra preciosa misma. Por eso el español dice «como piedra de berilo» y no añade brillo, color ni resplandor. También se mantuvo la distribución «una rueda junto a cada querubín» para reflejar el hebreo repetitivo sin calco excesivo.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el corpus cuando corresponde al tetragrámaton, pero en este versículo no aparece.
  - Se mantiene «querubines/querubín» como término técnico bíblico, sin sustituirlo por formas más domésticas.
  - «Berilo» se usa como solución sobria; si en pasajes paralelos del corpus se documenta otra opción, deberá armonizarse solo si el contexto lo justifica.
