translation:
  language: es
  text: David llegó a los doscientos hombres que se habían agotado hasta no poder seguir a David[a], y a quienes habían dejado en el arroyo Besor. Ellos salieron al encuentro de David y al encuentro del pueblo que estaba con él, y David se acercó al pueblo y les preguntó por su bienestar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que se habían quedado rezagados / que habían quedado atrás». El hebreo también puede expresar la idea de no poder continuar en la marcha.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «les preguntó cómo estaban». El hebreo dice literalmente que les preguntó «por paz/bienestar», es decir, por su bienestar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פִּגְּרוּ
  english_pob_choice: had become too exhausted
  chosen_spanish: se habían agotado hasta no poder seguir
  alternatives_spanish:
  - se habían quedado rezagados
  - estaban demasiado cansados
  - se habían debilitado
  lexicon: HALOT
  rationale: El verbo comunica quedar sin fuerzas, debilitado o incapaz de continuar. La opción elegida conserva la causa de la detención y su fuerza resultativa sin introducir más contenido del que permite el hebreo.
- source_word: מִלֶּכֶת אַחֲרֵי דָוִד
  english_pob_choice: to follow David
  chosen_spanish: seguir a David
  alternatives_spanish:
  - ir tras David
  - continuar detrás de David
  - seguir después de David
  lexicon: HALOT
  rationale: La construcción expresa dejar de ir en pos de David. En español, 'seguir a David' es natural y conserva la idea de acompañarlo en la marcha.
- source_word: וַיֹּשִׁיבֻם
  english_pob_choice: whom they had left
  chosen_spanish: a quienes habían dejado
  alternatives_spanish:
  - a quienes habían puesto allí
  - a quienes habían hecho quedarse allí
  - a quienes habían establecido allí
  lexicon: HALOT
  rationale: El hiphil de ישׁב puede implicar 'hacer sentar/establecer/dejar en un lugar'. En este contexto narrativo, el sentido más claro en español es que los dejaron allí al seguir adelante.
- source_word: בְּנַחַל הַבְּשׂוֹר
  english_pob_choice: at the Brook Besor
  chosen_spanish: en el arroyo Besor
  alternatives_spanish:
  - en el wadi Besor
  - en el valle de Besor
  - junto al arroyo Besor
  lexicon: HALOT
  rationale: נחל puede ser cauce, arroyo o wadi. 'Arroyo Besor' funciona bien en español bíblico moderno y mantiene el valor geográfico del término sin tecnicismo innecesario.
- source_word: לִקְרַאת
  english_pob_choice: to meet
  chosen_spanish: al encuentro de
  alternatives_spanish:
  - para recibir a
  - a reunirse con
  - para encontrarse con
  lexicon: HALOT
  rationale: El infinitivo indica salir para un encuentro. 'Al encuentro de' refleja con precisión esa orientación de movimiento y es idiomático en español.
- source_word: הָעָם אֲשֶׁר אִתּוֹ
  english_pob_choice: the people who were with him
  chosen_spanish: el pueblo que estaba con él
  alternatives_spanish:
  - la gente que estaba con él
  - los hombres que estaban con él
  - el grupo que iba con él
  lexicon: HALOT
  rationale: עָם es amplio y no obliga a precisar 'soldados' o 'hombres'. 'Pueblo' preserva la amplitud del término hebreo en el contexto del séquito de David.
- source_word: וַיִּגַּשׁ
  english_pob_choice: came near / approached
  chosen_spanish: se acercó
  alternatives_spanish:
  - se aproximó
  - llegó cerca
  - se puso junto a
  lexicon: HALOT
  rationale: נגשׁ denota acercarse. 'Se acercó' es la forma natural y clara en español, sin convertir la acción en un saludo prematuro.
- source_word: וַיִּשְׁאַל לָהֶם לְשָׁלוֹם
  english_pob_choice: asked them about their welfare
  chosen_spanish: les preguntó por su bienestar
  alternatives_spanish:
  - les preguntó por su paz
  - les preguntó cómo estaban
  - les preguntó por su salud
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo para indagar por el bienestar/paz de alguien. 'Por su bienestar' preserva el valor idiomático y su tono formal.
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa, que afinó la relación relativa de los doscientos hombres, hizo más formal el giro de ‘asked them about their welfare’ y evitó una repetición innecesaria en ‘came near/approached’. La redacción española sigue esos ajustes y mantiene el paralelismo narrativo del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'David' para el nombre propio, sin sustitución por títulos.
  - Se conserva 'Besor' como topónimo transliterado con complemento geográfico natural en español.
  - '''Pueblo'' se usa de manera amplia, acorde con el valor hebreo עָם en este contexto.'
  - La fórmula 'les preguntó por su bienestar' mantiene el modismo semítico sin convertirlo en una simple cortesía vacía.
