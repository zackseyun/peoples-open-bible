translation:
  text: For we also[a], like you, listen to your Lord, and we will sacrifice to him from the days of Asbakaphath king of the Assyrians[c][b], who brought us here.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Asbakaphath is the Greek form here; the Hebrew parallel in Ezra 4:2 identifies this king as Esarhaddon.
    reason: alternative_reading
  - marker: b
    text: Or 'we will offer sacrifice to him.' The Greek verb refers specifically to sacrificial worship.
    reason: lexical_alternative
  - marker: c
    text: The phrase 'brought us here' may imply forced relocation or resettlement under Assyrian rule.
    reason: cultural_note
lexical_decisions:
- source_word: ὁμοίως
  chosen: like you / also, like you
  alternatives:
  - likewise
  - in the same way
  lexicon: LSJ
  rationale: Introduces claimed similarity between the speakers and their addressees. In English, 'like you' makes the comparison explicit and reads naturally with the following clause.
- source_word: ἀκούομεν
  chosen: listen to
  alternatives:
  - hear
  - obey
  lexicon: BDAG
  rationale: The verb can mean hear or heed. Here, in a religious claim about relation to the deity, 'listen to' preserves the sense of hearing with possible responsiveness without overcommitting to 'obey.'
- source_word: τοῦ κυρίου ὑμῶν
  chosen: your Lord
  alternatives:
  - your master
  - the Lord your God
  lexicon: BDAG
  rationale: κύριος is rendered by the project's default as 'Lord.' The possessive 'your' is explicit in the Greek. 'The Lord your God' would import words not present in this Greek clause.
- source_word: ἐπιθύσομεν
  chosen: we will sacrifice
  alternatives:
  - we will offer sacrifice
  - we will make offerings
  lexicon: LSJ
  rationale: The future of ἐπιθύω refers to sacrificial offering. 'We will sacrifice' is concise and faithful; 'offer sacrifice' is possible but less direct.
- source_word: ἀπὸ ἡμερῶν
  chosen: from the days of
  alternatives:
  - since the days of
  - ever since the time of
  lexicon: LSJ
  rationale: This idiom marks a starting point in time. 'From the days of' stays close to the Greek while remaining idiomatic English.
- source_word: Ἀσβακαφὰθ
  chosen: Asbakaphath
  alternatives:
  - Esarhaddon (by identification with the Hebrew parallel)
  lexicon: Greek proper name / transliteration
  rationale: Following the project's policy to transliterate names from the Greek source in deuterocanonical material. The Hebrew parallel in Ezra 4:2 points to Esarhaddon, but the Zone 1 Greek form should govern the main text; the identification is preserved in a footnote.
- source_word: βασιλέως Ἀσσυρίων
  chosen: king of the Assyrians
  alternatives:
  - king of Assyria
  lexicon: LSJ
  rationale: The Greek is literally 'king of the Assyrians.' English often prefers 'king of Assyria,' but the more literal rendering is clear and preserves the ethnographic form of the source.
- source_word: μετήγαγεν
  chosen: brought
  alternatives:
  - transferred
  - carried away
  - resettled
  lexicon: LSJ
  rationale: The verb denotes leading or transporting from one place to another. In this context of imperial relocation, 'brought us here' is natural English and fits the clause; the more technical nuance 'resettled' is preserved as an alternative.
- source_word: ἐνταῦθα
  chosen: here
  alternatives:
  - to this place
  lexicon: LSJ
  rationale: Simple adverb of place; 'here' is the most natural equivalent.
