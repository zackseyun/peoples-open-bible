  to: Que Dios Todopoderoso les conceda misericordia[a] delante del hombre, para que les devuelva a su otro hermano[b] y a Benjamín. Y en cuanto a mí, si quedo sin hijos[c], sin hijos quedo.
  rationale: Se corrige «envíe» a «devuelva» para reflejar explícitamente el sentido contextual de retorno/liberación presente en וְשִׁלַּח לָכֶם y documentado en el POB inglés. Se simplifica la última cláusula a «si quedo sin hijos, sin hijos quedo» para conservar la repetición enfática del hebreo con español claro y digno, evitando una formulación demasiado forzada. También se corrige la nota a por gramática española natural.
