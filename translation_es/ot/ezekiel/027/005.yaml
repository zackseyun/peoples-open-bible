    reason: lexical_alternative
  - marker: b
    text: Senir es un nombre regional asociado con el monte Hermón (cf. Dt 3:9).
    reason: cross_reference
  revision_rationale: Se reemplaza 'todas tus planchas' por 'toda tu tablazón' para reflejar mejor el sentido colectivo de 'planking' en contexto naval. Se cambia 'para hacer un mástil para ti' por 'para hacerte un mástil' para evitar repetición y lograr un español más natural, manteniendo la relación de segunda persona femenina implícita en el hebreo.
