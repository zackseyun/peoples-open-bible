translation:
  language: es
  text: Porque, mira, los impíos tensan el arco; han colocado su flecha en la cuerda para disparar en la oscuridad[a] contra los rectos de corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde la oscuridad». La frase hebrea puede enfatizar tanto el escenario oscuro del ataque como el ocultamiento desde el que se lanza.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la relación de motivo o fundamento respecto del contexto anterior; «Porque» conserva esa conexión causal de manera natural en español.
- source_word: הִנֵּה
  english_pob_choice: look
  chosen_spanish: mira
  alternatives_spanish:
  - he aquí
  - mira bien
  lexicon: HALOT
  rationale: Es una partícula deíctica que llama la atención sobre la escena inmediata; «mira» comunica la vividez sin arcaísmo excesivo.
- source_word: הָרְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los culpables
  lexicon: HALOT
  rationale: «Impíos» es el equivalente bíblico común para רשעים y mantiene el matiz moral/religioso del término.
- source_word: יִדְרְכוּן קֶשֶׁת
  english_pob_choice: bend the bow
  chosen_spanish: tensan el arco
  alternatives_spanish:
  - doblan el arco
  - preparan el arco
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática en el contexto del arco y la flecha; en español, «tensan el arco» comunica de forma natural la preparación para disparar.
- source_word: כּוֹנְנ֣וּ חִצָּ֣ם עַל יֶתֶר
  english_pob_choice: have fitted their arrow to the string
  chosen_spanish: han colocado su flecha en la cuerda
  alternatives_spanish:
  - han preparado su flecha sobre la cuerda
  - han puesto su flecha en la cuerda del arco
  lexicon: HALOT
  rationale: El hebreo describe el acto concreto de poner la flecha en la cuerda; «han colocado… en la cuerda» conserva la imagen sin forzar un calco como «fijado».
- source_word: לִירוֹת
  english_pob_choice: to shoot
  chosen_spanish: para disparar
  alternatives_spanish:
  - para tirar
  - para lanzar
  lexicon: HALOT
  rationale: Verbo natural en español para el acto de arrojar la flecha; mantiene la intención de ataque preparada por el infinitivo hebreo.
- source_word: בְּמוֹ אֹפֶל
  english_pob_choice: in the darkness
  chosen_spanish: en la oscuridad
  alternatives_spanish:
  - desde la oscuridad
  - en tinieblas
  lexicon: HALOT
  rationale: La frase puede enfatizar el ambiente oscuro o la ocultación del ataque; «en la oscuridad» preserva el sentido más directo del texto y permite la ambigüedad documentada.
- source_word: לְיִשְׁרֵי לֵב
  english_pob_choice: at the upright in heart
  chosen_spanish: contra los rectos de corazón
  alternatives_spanish:
  - contra los de corazón recto
  - contra los íntegros de corazón
  lexicon: HALOT
  rationale: El sustantivo/adjetivo expresa a los moralmente rectos; «rectos de corazón» mantiene el hebraísmo, y la preposición «contra» explicita el blanco del ataque implícito en el contexto.
theological_decisions:
- issue: 'Sentido de בְּמוֹ אֹפֶל: ambiente oscuro o procedencia desde la oscuridad'
  english_pob_reading: The Hebrew phrase may emphasize either the dark setting of the attack or the concealment from which it is launched.
  chosen_spanish_reading: «en la oscuridad» mantiene abierto el matiz entre el entorno oscuro y la ocultación del agresor sin decidirlo de forma innecesaria.
  alternative_spanish_readings:
  - desde la oscuridad
  - en tinieblas
  rationale: La evidencia admite ambas posibilidades; la redacción española conserva la tensión semántica sin apagarla.
  doctrine_reference: Observación lexical, no doctrinal
- issue: Relación implícita con los destinatarios del ataque
  english_pob_reading: to shoot in the darkness at the upright in heart
  chosen_spanish_reading: «para disparar en la oscuridad contra los rectos de corazón» explicita en español el blanco que el hebreo deja en el final de la cláusula.
  alternative_spanish_readings:
  - para disparar en la oscuridad a los rectos de corazón
  - para disparar en la oscuridad hacia los rectos de corazón
  rationale: El contexto poético permite hacer explícita la hostilidad dirigida al grupo mencionado, sin añadir contenido ajeno al versículo.
  doctrine_reference: Observación textual y sintáctica
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente hebreo y el audit trail inglés, manteniendo la misma estructura imagística del arco, la flecha y la oscuridad. Se resolvió la ambigüedad de בְּמוֹ אֹפֶל con una nota textual anclada y se evitó el calco mecánico de «bend the bow» a favor de un español natural que conserva la escena.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando aparece el nombre divino explícito; aquí no aplica.
  - Se mantuvo el registro poético y bíblico con español moderno y claro.
  - «Impíos» y «rectos de corazón» conservan el contraste moral del hebreo.
  - La preposición «contra» está añadida por exigencia sintáctica del español para hacer explícito el objetivo del ataque, sin alterar el contenido del verso.
