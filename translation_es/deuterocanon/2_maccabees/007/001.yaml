  yaml_path: translation/deuterocanon/2_maccabees/007/001.yaml
  text: It also happened that seven brothers[a], along with their mother, having been arrested, were being forced by the king to partake of the unlawful flesh of swine[b], while being tortured with whips and cords.
  footnotes:
