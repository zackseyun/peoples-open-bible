revisions:
- from: Él les quebró el sustento de pan[a], y en su celo los disminuyó.
  to: Él les quebró el bastón del pan[a], y en su celo los redujo.
  rationale: Se reemplazó «sustento de pan» por «bastón del pan» para conservar mejor el modismo hebreo מטה לחם en el texto principal, conforme a la filosofía documentada en inglés, y se mantuvo una nota que explicita el sentido de provisión de alimento y el apoyo del griego. Se cambió «los disminuyó» por «los redujo» por mayor naturalidad y claridad en español, sin alterar el sentido de המעיטם.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:41:22Z'
