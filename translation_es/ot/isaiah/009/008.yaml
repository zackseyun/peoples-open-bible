  rationale: Se elimina «lo» para ajustarse con más fidelidad al hebreo y al POB inglés, se reubica la nota al sintagma que realmente explica, y se sustituyen los dos puntos por rayas para reflejar mejor la aposición del original auditado sin cambiar el sentido.
