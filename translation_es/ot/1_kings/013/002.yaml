  text: 'And he cried out against the altar by the word of Yahweh and said[a], “Altar, altar, thus says Yahweh: Behold, a son will be born to the house of David, Josiah by name, and he will sacrifice on you the priests of the high places who burn incense on you[c][b], and human bones will be burned on you.”'
  footnotes:
