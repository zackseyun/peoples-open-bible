translation:
  language: es
  text: La esposa de noble carácter[a] es corona de su marido, pero la que avergüenza es como podredumbre en sus huesos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'una esposa capaz', 'una esposa valiente' o 'una esposa excelente'. El hebreo חַיִל tiene un sentido amplio que incluye fuerza, valor, competencia y excelencia.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'como podredumbre en sus huesos', imagen de ruina interior profunda o de deshonra corrosiva.
    reason: cultural_note
lexical_decisions:
- source_word: אֵֽשֶׁת
  english_pob_choice: a wife of
  chosen_spanish: la mujer de
  alternatives_spanish:
  - la esposa de
  - una mujer de
  lexicon: HALOT
  rationale: El constructo puede leerse naturalmente como relación marital por el paralelismo con "su marido". En español, "mujer de" preserva la construcción breve del proverbio sin forzar una glosa excesiva.
- source_word: חַ֭יִל
  english_pob_choice: noble character
  chosen_spanish: noble carácter
  alternatives_spanish:
  - valentía
  - excelencia
  - capacidad
  - fortaleza
  lexicon: HALOT
  rationale: חַיִל abarca fuerza, valor, competencia y excelencia. "Noble carácter" comunica dignidad moral y capacidad en un español natural, manteniendo la amplitud semántica mejor que una sola cualidad más estrecha.
- source_word: עֲטֶ֣רֶת
  english_pob_choice: crown
  chosen_spanish: corona
  alternatives_spanish:
  - diadema
  - guirnalda
  lexicon: HALOT
  rationale: '"Corona" es la equivalencia española más clara para el símbolo de honor. Conserva la metáfora de prestigio y honra del proverbio.'
- source_word: בַּעְלָ֑הּ
  english_pob_choice: her husband's
  chosen_spanish: de su marido
  alternatives_spanish:
  - de su esposo
  - de su hombre
  lexicon: HALOT
  rationale: El poseedor se expresa con naturalidad en español como "de su marido". Mantiene la relación posesiva y el valor relacional del hebreo sin un giro artificial.
- source_word: וּ/כְ/רָקָ֖ב
  english_pob_choice: but she who brings shame is like rot
  chosen_spanish: pero la que avergüenza es como podredumbre
  alternatives_spanish:
  - pero la que trae vergüenza es como rotura
  - y como podredumbre
  lexicon: HALOT
  rationale: El contraste adversativo del proverbio pide "pero". רָקָב significa descomposición/podredumbre; "podredumbre" conserva la imagen de deterioro interno y es más idiomática en español que un calco como "rot".
- source_word: בְּ/עַצְמוֹתָ֣י/ו
  english_pob_choice: in his bones
  chosen_spanish: en sus huesos
  alternatives_spanish:
  - en sus huesos mismos
  - dentro de sus huesos
  lexicon: HALOT
  rationale: Mantener "huesos" preserva la metáfora hebrea de ruina interna y corrosiva. En español, "en sus huesos" es natural y suficientemente vívido.
- source_word: מְבִישָֽׁה
  english_pob_choice: she who brings shame
  chosen_spanish: la que avergüenza
  alternatives_spanish:
  - la que causa vergüenza
  - la que trae vergüenza
  - la deshonrosa
  lexicon: HALOT
  rationale: 'El participio causativo se conserva verbalmente: no solo describe, sino que actúa. "La que avergüenza" refleja la fuerza causal mejor que un adjetivo estático.'
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo y el audit trail inglés, manteniendo el paralelismo del proverbio y la tensión imagística entre honor y deterioro interno. Se preservó la ambigüedad amplia de חַיִל con una solución española sobria, sin reducirla a una sola virtud estrecha.
  spanish_consistency_notes:
  - Se usa "marido" para בַּעְלָהּ por ser el poseedor explícito y el equivalente más natural en este contexto.
  - Se evitó "Cristo/SEÑOR" u otra terminología no pertinente; el versículo no contiene nombres divinos ni cristológicos.
  - '"Corona" y "podredumbre" mantienen el registro sapiencial y la imaginería concreta del hebreo.'
  - El paralelismo femenino se reflejó con "la que avergüenza" para concordar con el sujeto implícito del segundo hemistiquio.
