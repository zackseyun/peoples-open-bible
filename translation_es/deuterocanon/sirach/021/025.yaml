translation:
  language: es
  text: Los labios de los extraños quedarán cargados por estas cosas[a], pero las palabras de los sabios serán puestas en una balanza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «en estas cosas». Aquí se traduce «por estas cosas» para expresar el sentido contextual más probable.
    reason: lexical_alternative
  - marker: b
    text: La imagen de «serán puestas en una balanza» sugiere que los sabios hablan con juicio medido.
    reason: cultural_note
lexical_decisions:
- source_word: χείλη
  english_pob_choice: lips
  chosen_spanish: labios
  alternatives_spanish:
  - boca
  - habla
  lexicon: LSJ
  rationale: Conserva la imagen literal y la metonimia de la parte del cuerpo por el hablar, como en el inglés POB. "Habla" abstraería demasiado la imagen sapiencial.
- source_word: ἀλλοτρίων
  english_pob_choice: strangers
  chosen_spanish: extraños
  alternatives_spanish:
  - forasteros
  - ajenos
  - los otros
  lexicon: LSJ
  rationale: '"Extraños" preserva la distancia social o relacional sin imponer una idea étnica o nacional demasiado precisa; en español transmite bien la oposición a los sabios.'
- source_word: ἐν τούτοις
  english_pob_choice: by these things
  chosen_spanish: por estas cosas
  alternatives_spanish:
  - en estas cosas
  - con estas cosas
  lexicon: LSJ
  rationale: La construcción causal/instrumental se expresa naturalmente con "por" en español, manteniendo el sentido contextual que el inglés auditado toma como probable.
- source_word: βαρυνθήσεται
  english_pob_choice: will be weighed down
  chosen_spanish: serán pesados
  alternatives_spanish:
  - serán cargados
  - serán agobiados
  - se harán pesados
  lexicon: LSJ
  rationale: El griego sugiere hacerse pesado o ser cargado. Opto por "serán pesados" para conservar la metáfora de peso y enlazarla con la imagen de la balanza del segundo hemistiquio. Aunque menos idiomático, sigue de cerca el valor verbal del original.
- source_word: λόγοι
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - dichos
  - expresiones
  - discursos
  lexicon: LSJ
  rationale: '"Palabras" es el equivalente más directo y natural en un proverbio de sabiduría; mantiene la concisión y el paralelismo.'
- source_word: φρονίμων
  english_pob_choice: the wise
  chosen_spanish: los sabios
  alternatives_spanish:
  - los prudentes
  - los sensatos
  lexicon: LSJ
  rationale: '"Los sabios" reproduce el uso sustantivado del adjetivo y conserva el registro sapiencial. "Prudentes" sería posible, pero menos común como colectivo en español.'
- source_word: ἐν ζυγῷ
  english_pob_choice: on a balance
  chosen_spanish: en una balanza
  alternatives_spanish:
  - en la balanza
  - sobre una balanza
  - en unas balanzas
  lexicon: LSJ
  rationale: '"Balanza" expresa el instrumento de pesaje y evita la posible ambigüedad de "yugo". El singular conserva la imagen del original y su valor proverbial de medida exacta.'
- source_word: σταθήσονται
  english_pob_choice: will be set
  chosen_spanish: serán puestas
  alternatives_spanish:
  - se mantendrán
  - serán colocadas
  - quedarán puestas
  lexicon: LSJ
  rationale: En contexto de pesaje, el verbo evoca ser colocadas en la balanza para ser medidas. "Serán puestas" mantiene esa idea sin introducir una interpretación demasiado explicativa.
translation_notes:
  revision_awareness: El texto griego presenta un paralelismo proverbial entre la pesadez de los labios de los extraños y la medida exacta de las palabras de los sabios. El inglés POB opta por interpretar ἐν τούτοις como causal/instrumental («by these things») y por explicitar la imagen de la balanza; la versión española conserva esa lectura contextual sin perder la posibilidad literal de «en estas cosas» en nota. No hubo revisiones textuales sustanciales en el audit trail.
  spanish_consistency_notes:
  - Se mantiene «sabios» para φρόνιμοι, coherente con el registro de literatura sapiencial.
  - Se usa «balanza» y no «yugo» para ζυγός, conforme al contexto de pesaje.
  - Se preserva la metáfora del peso en «serán pesados» para reflejar la oposición semántica con la balanza del segundo hemistiquio.
  - No se introduce terminología eclesiástica ajena al proverbio; el verso permanece en lenguaje proverbial directo.
