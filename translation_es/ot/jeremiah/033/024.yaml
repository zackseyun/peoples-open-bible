base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/033/024.yaml
  text: Have you not seen what this people have spoken[a], saying, ‘The two families that Yahweh chose—he has rejected them’? Thus they despise my people[c][b], so that they should no longer be a nation before them.
  footnotes:
  - marker: a
    text: Or 'the two clans' or 'the two houses.' The Hebrew does not explicitly identify which two are meant.
    reason: lexical_alternative
  - marker: b
    text: Or 'he rejected them' / 'he cast them off.'
    reason: lexical_alternative
  - marker: c
    text: The final clause is literally 'from being still a nation before them,' likely meaning 'in their sight' or 'in their estimation.'
    reason: lexical_alternative
