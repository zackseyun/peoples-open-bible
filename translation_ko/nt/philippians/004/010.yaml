id: PHP.4.10
reference: Philippians 4:10
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἐχάρην δὲ ἐν κυρίῳ μεγάλως ὅτι ἤδη ποτὲ ἀνεθάλετε τὸ ὑπὲρ ἐμοῦ φρονεῖν, ἐφ’ ᾧ καὶ ἐφρονεῖτε ἠκαιρεῖσθε δέ.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/004/010.yaml
  text: I rejoiced greatly in the Lord that now at last you have revived your concern for me; indeed, you were concerned, but you lacked opportunity.
translation:
  language: ko
  text: 내가 이제 마침내 여러분이 나를 위한 마음을 다시 꽃피웠음을[a] 인하여 주 안에서 크게 기뻤습니다. 사실 여러분은 늘 마음을 두고 있었으나, 다만 기회가 없었을 뿐입니다[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 직역하면 「여러분이 ... 다시 꽃피웠습니다」. 헬라어 ἀναθάλλω는 식물이 다시 싹트고 꽃피움을 가리키는 비유이다. 「관심을 다시 새롭게 했다」로도 옮길 수 있다.
    reason: lexical_alternative
  - marker: b
    text: 헬라어 ἀκαιρέομαι는 「적절한 때를 얻지 못하다」를 뜻하며, 빌립보 성도의 무관심이 아니라 외적 상황의 제약이었음을 분명히 한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐχάρην
  english_pob_choice: I rejoiced
  chosen_korean: 크게 기뻤습니다
  alternatives_korean:
  - 크게 즐거워했습니다
  - 기뻐했습니다
  lexicon: BDAG
  rationale: χαίρω 부정과거. 합쇼체 「기뻤습니다」가 자연스럽고, 「크게」(μεγάλως)와 짝지어 강조를 살린다.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_korean: 주 안에서
  lexicon: BDAG
  rationale: 4절과 같은 정형 표현. 영역·관계적 의미 보존.
- source_word: μεγάλως
  english_pob_choice: greatly
  chosen_korean: 크게
  lexicon: BDAG
  rationale: 간결한 표준 등가어. 부사적 강조를 자연스럽게 살린다.
- source_word: ἤδη ποτὲ
  english_pob_choice: now at last
  chosen_korean: 이제 마침내
  alternatives_korean:
  - 이제 비로소
  - 마침내 다시
  lexicon: BDAG
  rationale: 시간 경과 후 마침내 드러난 행위를 가리키며, 질책의 어감 없이 「이제 마침내」가 자연스럽다.
- source_word: ἀνεθάλετε
  english_pob_choice: have revived
  chosen_korean: 다시 꽃피웠음을
  alternatives_korean:
  - 다시 새롭게 했음을
  - 되살렸음을
  lexicon: BDAG
  rationale: 본 번역의 north-star(원저자의 의도를 강력하고 생생하게 보존)에 따라 ἀναθάλλω의 식물적 은유를 본문에 살린다. 「다시 꽃피웠다」는 한국어 비유로도 자연스럽고 따뜻하다. 영어 POB의 「revived」보다 한 발 더 원어 이미지에 가깝다.
- source_word: τὸ ὑπὲρ ἐμοῦ φρονεῖν
  english_pob_choice: your concern for me
  chosen_korean: 나를 위한 마음
  alternatives_korean:
  - 나에 대한 생각
  - 나를 위한 관심
  lexicon: BDAG
  rationale: φρονέω는 단순 사고가 아닌 마음의 정향·돌봄을 함의하므로 「마음」으로 옮긴다. 「관심」도 가능하나 더 가볍다.
- source_word: ἐφ’ ᾧ
  english_pob_choice: indeed
  chosen_korean: 사실
  alternatives_korean:
  - 그 일에 있어서는
  - 그 마음 자체는
  lexicon: BDAG
  rationale: 바울의 설명적 명료화(「있던 마음은 늘 있었다」)를 한국어로는 「사실」이 자연스럽게 연결한다.
- source_word: ἐφρονεῖτε
  english_pob_choice: you were concerned
  chosen_korean: 늘 마음을 두고 있었으나
  alternatives_korean:
  - 마음을 쓰고 있었으나
  - 생각하고 있었으나
  lexicon: BDAG
  rationale: 앞의 φρονεῖν과 어휘 일관성을 위해 「마음」을 다시 사용하고, 미완료 시제의 지속성을 「늘 ... 있었다」로 살린다.
- source_word: ἠκαιρεῖσθε
  english_pob_choice: you lacked opportunity
  chosen_korean: 기회가 없었을 뿐입니다
  alternatives_korean:
  - 적절한 때를 얻지 못했습니다
  - 때를 얻지 못하고 있었습니다
  lexicon: BDAG
  rationale: 빌립보 성도의 의지가 아닌 외적 상황이 원인이었음을 「뿐입니다」로 분명히 한다. 「적절한 때」의 함의는 「기회」로 자연스럽게 압축된다.
