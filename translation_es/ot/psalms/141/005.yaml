translation:
  language: es
  text: Que me hiera un hombre justo—es un acto de bondad[a]; que me reprenda—es aceite para la cabeza; que mi cabeza no lo rechace[b]. Porque aún mi oración está contra sus maldades[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «es amor fiel»; aquí חֶסֶד puede entenderse más fuertemente como lealtad pactual o misericordia.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo es difícil. También puede entenderse: «que mi cabeza no lo rechace / no lo desprecie».'
    reason: alternative_reading
  - marker: c
    text: 'La frase final es incierta. También puede significar: «porque aún mi oración está en sus calamidades» o «porque aun entonces mi oración es por ellos en sus aflicciones».'
    reason: alternative_reading
lexical_decisions:
- source_word: יֶהֶלְמֵנִי
  english_pob_choice: let ... strike me
  chosen_spanish: que me hiera
  alternatives_spanish:
  - que me golpee
  - que me dé un golpe
  lexicon: HALOT
  rationale: El verbo expresa un golpe fuerte. En español, «hiera» mantiene la fuerza concreta sin caer en un giro excesivamente arcaico como «golpee» ni en una expresión más interpretativa.
- source_word: צַדִּיק
  english_pob_choice: a righteous man
  chosen_spanish: un hombre justo
  alternatives_spanish:
  - un justo
  - una persona justa
  lexicon: HALOT
  rationale: El hebreo usa el adjetivo en masculino singular con valor sustantivo. «Un hombre justo» conserva ese valor representativo y suena natural en español; «persona justa» neutraliza el género sin necesidad textual.
- source_word: חֶסֶד
  english_pob_choice: it is a kindness
  chosen_spanish: eso es una bondad
  alternatives_spanish:
  - eso es una bondad leal
  - eso es misericordia
  - eso es amor fiel
  lexicon: HALOT
  rationale: Aquí חֶסֶד describe el acto de golpear/reprender como benéfico. «Bondad» comunica el valor favorable del acto sin imponer de entrada el matiz más técnico de fidelidad pactual; ese matiz se deja como alternativa cuando el contexto lo permita.
- source_word: וְיוֹכִיחֵנִי
  english_pob_choice: let him rebuke me
  chosen_spanish: que me reprenda
  alternatives_spanish:
  - que me corrija
  - que me repruebe
  lexicon: HALOT
  rationale: El hifil de יכח puede significar reprender o corregir. «Reprenda» conserva la aspereza verbal del contexto y la relación con una corrección moral.
- source_word: שֶׁמֶן רֹאשׁ
  english_pob_choice: oil for the head
  chosen_spanish: aceite para la cabeza
  alternatives_spanish:
  - aceite en la cabeza
  - aceite para mi cabeza
  lexicon: HALOT
  rationale: La construcción metafórica se mantiene de manera directa. «Aceite para la cabeza» preserva la imagen sin explicarla como unción formal, algo que el hebreo no exige de forma explícita.
- source_word: אַל יָנִי רֹאשִׁי
  english_pob_choice: let my head not refuse it
  chosen_spanish: que mi cabeza no lo rechace
  alternatives_spanish:
  - que mi cabeza no lo desprecie
  - que mi cabeza no lo decline
  lexicon: HALOT
  rationale: El verbo es difícil. En español, «rechace» reproduce bien la idea de no aceptar la corrección comparada con el «aceite»; se conserva la metáfora de la cabeza como sujeto del verbo.
- source_word: כִּי עוֹד
  english_pob_choice: For still
  chosen_spanish: Porque aún
  alternatives_spanish:
  - Pues todavía
  - Porque todavía
  lexicon: HALOT
  rationale: La partícula introduce la razón o continuidad del pensamiento. «Porque aún» es una forma natural y breve que conserva el valor continuativo.
- source_word: וּתְפִלָּתִי
  english_pob_choice: my prayer
  chosen_spanish: mi oración
  alternatives_spanish:
  - mi plegaria
  lexicon: HALOT
  rationale: Término común y fiel al hebreo. «Oración» mantiene el sustantivo simple con claridad litúrgica y bíblica.
- source_word: בְּרָעוֹתֵיהֶם
  english_pob_choice: against their evils
  chosen_spanish: contra sus maldades
  alternatives_spanish:
  - en sus desgracias
  - en medio de sus males
  - acerca de sus maldades
  lexicon: HALOT
  rationale: La preposición ב es sintácticamente difícil. La lectura de POB entiende un valor adversativo en relación con la maldad de los adversarios; «contra sus maldades» hace explícita esa fuerza sin abandonar el vínculo léxico con «maldades».
theological_decisions:
- issue: Renderización de צַדִּיק con género masculino
  english_pob_reading: a righteous man
  chosen_spanish_reading: un hombre justo
  alternative_spanish_readings:
  - una persona justa
  - los justos
  rationale: El hebreo es masculino singular usado de modo representativo. Se conserva el género y la singularidad para respetar la forma del texto y el énfasis en un justo concreto o paradigmático.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Valor de חֶסֶד en el contexto inmediato
  english_pob_reading: it is a kindness
  chosen_spanish_reading: eso es una bondad
  alternative_spanish_readings:
  - eso es misericordia
  - eso es amor leal
  - eso es bondad fiel
  rationale: El contexto habla de recibir corrección dolorosa como algo beneficioso. Se evita forzar aquí el sentido pactual técnico de חֶסֶד, aunque ese matiz permanece como posibilidad contextual en otras ocurrencias.
  doctrine_reference: HALOT; DOCTRINE.md §Translation philosophy 3
- issue: Cláusula final difícil con בְּרָעוֹתֵיהֶם
  english_pob_reading: For still my prayer is against their evils
  chosen_spanish_reading: Porque aún mi oración está contra sus maldades
  alternative_spanish_readings:
  - Porque aún mi oración está en sus calamidades
  - Porque aun entonces mi oración es por ellos en sus aflicciones
  rationale: La sintaxis admite varias lecturas. Se preserva la opción adversativa principal de la POB, que encaja mejor con el contraste del versículo y mantiene visible la dificultad textual mediante alternativas posibles.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión final sin cambios y la preferencia auditada por un español natural que conserve la tensión del hebreo. La elección «eso es una bondad» sigue la actualización inglesa «a kindness», y la cláusula final mantiene la lectura adversativa principal de la POB con nota de ambigüedad.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en la política general, pero este versículo no lo contiene.
  - Se usó «oración» para תְפִלָּה, consistente con el registro bíblico general.
  - Se preservó la metáfora concreta de «aceite para la cabeza» sin convertirla en una explicación interpretativa.
  - Se conservaron notas cuando el hebreo o la lectura POB presentan ambigüedad real; no se añadieron glosas innecesarias.
