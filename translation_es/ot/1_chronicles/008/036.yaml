translation:
  language: es
  text: Acaz engendró a Jehoaddah[a], y Jehoaddah engendró a Alemet, Azmavet y Zimri; y Zimri engendró a Moza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Jehoaddah; algunas tradiciones inglesas leen 'Jehoadah'.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹלִיד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - procreó
  lexicon: HALOT
  rationale: En una genealogía, el hifil de ילד expresa descendencia directa. 'Engendró' conserva esa relación genealógica con un registro natural y bíblico en español, sin volver la frase mecánica ni usar un giro más explicativo de lo que el hebreo requiere.
- source_word: אָחָז
  english_pob_choice: Ahaz
  chosen_spanish: Yahaz
  alternatives_spanish:
  - Ahaz
  lexicon: transliteración del nombre propio en el texto hebreo
  rationale: El hebreo dado presenta אָחָז, que corresponde a Yahaz en la tradición española más cercana a esa grafía; 'Ahaz' sería la forma inglesa asociada al rey homónimo, pero aquí no es el mismo nombre en español. Se conserva la forma que refleja mejor el hebreo del versículo.
- source_word: יְהוֹעַדָּה
  english_pob_choice: Jehoaddah
  chosen_spanish: Jehoaddá
  alternatives_spanish:
  - Jehoaddah
  - Jehoadah
  lexicon: transliteración del nombre propio en el texto hebreo
  rationale: Se translitera el nombre propio en una forma española legible que sigue de cerca la secuencia consonántica y vocal del hebreo. La forma inglesa auditada 'Jehoaddah' se adapta a la ortografía española como 'Jehoaddá'.
- source_word: עָלֶמֶת
  english_pob_choice: Alemeth
  chosen_spanish: Alemet
  alternatives_spanish:
  - Alemeth
  lexicon: transliteración del nombre propio en el texto hebreo
  rationale: Nombre propio transliterado directamente al español, ajustando la terminación a la ortografía española sin alterar la identificación del nombre.
- source_word: עַזְמָוֶת
  english_pob_choice: Azmaveth
  chosen_spanish: Azmavet
  alternatives_spanish:
  - Azmaveth
  lexicon: transliteración del nombre propio en el texto hebreo
  rationale: Se mantiene el valor consonántico del nombre hebreo y se adapta la terminación al español. La variante inglesa 'Azmaveth' se refleja en una forma española fonéticamente transparente.
- source_word: זִמְרִי
  english_pob_choice: Zimri
  chosen_spanish: Zimri
  lexicon: transliteración del nombre propio en el texto hebreo
  rationale: El nombre propio ya es plenamente natural en español en esta forma y coincide con la tradición bíblica usual.
- source_word: מוֹצָא
  english_pob_choice: Moza
  chosen_spanish: Moza
  lexicon: transliteración del nombre propio en el texto hebreo
  rationale: Nombre propio transliterado conforme al uso bíblico habitual en español y al valor consonántico del hebreo.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: HALOT
  rationale: La conjunción hebrea se expresa de manera directa con 'y', preservando la coordinación genealógica simple del texto.
translation_notes:
  revision_awareness: El texto hebreo y la auditoría inglesa están en alto acuerdo; no se requieren revisiones textuales ni decisiones doctrinales especiales. La única tensión léxica relevante es la forma del nombre יְהוֹעַדָּה, que se conserva con nota alternativa.
  spanish_consistency_notes:
  - Se mantiene el estilo genealógico breve y paratáctico del hebreo.
  - Se transliteran los nombres propios de manera consistente y legible en español.
  - No se usa 'SEÑOR' ni otras sustituciones teológicas, porque el versículo no contiene el nombre divino.
  - La nota al pie marca únicamente la variante tradicional del nombre Jehoaddá/Jehoadah, siguiendo la auditoría inglesa.
