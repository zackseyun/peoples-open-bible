translation:
  language: es
  text: He aquí, yo le traigo curación y remedio, y los sanaré, y les revelaré abundancia de paz y de verdad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fidelidad»; el término hebreo también puede denotar veracidad, confiabilidad o fidelidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: ¡Mira[a]!
  alternatives_spanish:
  - He aquí
  - Mira
  lexicon: HALOT
  rationale: La partícula deíctica introduce un anuncio solemne. «¡Mira!» conserva el tono profético de llamado a atención en español moderno; se marca la opción alternativa porque también podría leerse como «He aquí», de matiz más tradicional.
- source_word: מַעֲלֶה
  english_pob_choice: I am bringing
  chosen_spanish: yo hago subir
  alternatives_spanish:
  - yo traigo
  - yo hago venir
  lexicon: HALOT
  rationale: 'El hifil de עלה tiene fuerza causativa: literalmente ‘hacer subir / hacer venir’. «Yo hago subir» mantiene mejor la imagen verbal de origen que un simple «traigo», aunque en español suene algo más marcado.'
- source_word: לָּהּ
  english_pob_choice: her
  chosen_spanish: para ella
  alternatives_spanish:
  - a ella
  - sobre ella
  lexicon: HALOT
  rationale: El referente es la ciudad/personificación femenina. En español conviene conservar el dativo explícito con «para ella» para no borrar el destinatario de la acción divina.
- source_word: אֲרֻכָה
  english_pob_choice: healing
  chosen_spanish: curación
  alternatives_spanish:
  - sanidad
  - restauración
  lexicon: HALOT
  rationale: El término puede denotar la recuperación de una herida o la restauración de salud. «Curación» es natural en español y mantiene la idea médica sin sobrecargarla con una paráfrasis.
- source_word: מַרְפֵּא
  english_pob_choice: cure
  chosen_spanish: medicina
  alternatives_spanish:
  - remedio
  - cura
  lexicon: HALOT
  rationale: El par con אֲרֻכָה sugiere dos expresiones cercanas pero no idénticas de sanidad. «Medicina» preserva el valor de remedio/medicamento y evita repetir exactamente «curación».
- source_word: וּרְפָאתִים
  english_pob_choice: and I will heal them
  chosen_spanish: y los sanaré
  alternatives_spanish:
  - y los restauraré a la salud
  - y los curaré
  lexicon: HALOT
  rationale: La forma verbal futura profética se expresa con naturalidad en español. Se mantiene el plural «los» para reflejar el cambio del singular femenino de la ciudad al plural de sus habitantes.
- source_word: וְגִלֵּיתִי
  english_pob_choice: and I will reveal
  chosen_spanish: y les revelaré
  alternatives_spanish:
  - y les descubriré
  - y les mostraré
  lexicon: HALOT
  rationale: «Revelar» comunica con claridad el acto de dar a conocer algo antes oculto. El dativo plural «les» conserva el cambio de referente hacia el pueblo/los habitantes.
- source_word: עֲתֶרֶת
  english_pob_choice: an abundance of
  chosen_spanish: abundancia de
  alternatives_spanish:
  - plenitud de
  - copiosa cantidad de
  lexicon: HALOT
  rationale: El sustantivo expresa abundancia/plenitud. «Abundancia de» es la opción más transparente y evita una traducción demasiado interpretativa.
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - plenitud
  lexicon: HALOT
  rationale: «Paz» es la equivalencia más directa y bíblicamente reconocible en español; conserva también el sentido amplio de bienestar cuando se lee dentro de la promesa profética.
- source_word: וֶאֱמֶת
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - fidelidad
  - lealtad
  lexicon: HALOT
  rationale: Aunque el término puede significar también fidelidad o confiabilidad, «verdad» reproduce de modo más inmediato la pareja con «paz» en el texto principal, dejando abiertas las otras acepciones.
theological_decisions:
- issue: Paso del singular femenino al plural
  english_pob_reading: The city/community is addressed as 'her' and then its people as 'them.'
  chosen_spanish_reading: La ciudad/personificación se mantiene en «ella», y luego el pueblo en «los/les».
  alternative_spanish_readings:
  - Suavizar todo a un solo referente colectivo
  - Repetir solo una forma singular para toda la frase
  rationale: El hebreo pasa deliberadamente de la ciudad personificada al conjunto de sus habitantes. En español conviene respetar ese movimiento, porque forma parte de la imagen y no es un accidente gramatical.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Valor semántico de אֱמֶת
  english_pob_reading: '''truth'' in the main text, with ''faithfulness'' in a footnote.'
  chosen_spanish_reading: «verdad» en el texto principal, con nota para «fidelidad».
  alternative_spanish_readings:
  - fidelidad
  - veracidad
  - confiabilidad
  rationale: El término admite más de un matiz. Mantener «verdad» en el texto principal preserva la lectura más directa, y la nota guarda la alternativa ‘fidelidad’ para no cerrar indebidamente el rango semántico.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La fuente y el audit trail inglés muestran alto acuerdo y sin revisiones aplicadas en la última pasada; por eso el borrador español sigue de cerca las decisiones léxicas documentadas, manteniendo solo ajustes necesarios para naturalidad y claridad en español.
  spanish_consistency_notes:
  - Se conserva el registro profético solemne sin caer en arcaísmos innecesarios.
  - Se mantiene la distinción entre la ciudad/personificación femenina («ella») y sus habitantes en plural («los/les»).
  - «Verdad» queda en el cuerpo principal y la alternativa semántica se reserva para la nota, conforme al audit trail.
  - Se evita reemplazar términos del campo de sanidad con vocabulario eclesiástico no atestiguado por la fuente.
