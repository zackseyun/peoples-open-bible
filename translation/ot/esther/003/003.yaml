id: EST.3.3
reference: Esther 3:3
source:
  edition: WLC
  text: וַ/יֹּ֨אמְר֜וּ עַבְדֵ֥י הַ/מֶּ֛לֶךְ אֲשֶׁר בְּ/שַׁ֥עַר הַ/מֶּ֖לֶךְ לְ/מָרְדֳּכָ֑י מַדּ֨וּעַ֙ אַתָּ֣ה עוֹבֵ֔ר אֵ֖ת מִצְוַ֥ת הַ/מֶּֽלֶךְ־׃
translation:
  text: Then the king’s servants who were at the king’s gate said to Mordecai[a], “Why are you transgressing the king’s command?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'Why are you transgressing the king’s command?'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then ... said' gives natural English narrative flow while preserving the sequential sense of the Hebrew wayyiqtol.
- source_word: עַבְדֵי הַמֶּלֶךְ
  chosen: the king’s servants
  alternatives:
  - the king’s officials
  - the king’s attendants
  lexicon: HALOT
  rationale: עֶבֶד commonly means 'servant' or 'slave'; here these are royal functionaries at the gate, so 'servants' is the most natural contextual rendering without overstating bonded status. 'Officials' is possible by function, but the Hebrew term itself is better preserved by 'servants'.
- source_word: אֲשֶׁר בְּשַׁעַר הַמֶּלֶךְ
  chosen: who were at the king’s gate
  alternatives:
  - who were in the king’s gate
  - who were stationed at the king’s gate
  lexicon: HALOT
  rationale: The phrase identifies the servants by location. 'At the king’s gate' is idiomatic English and preserves the court setting. 'In the king’s gate' is more literal but less natural in modern English.
- source_word: לְמָרְדֳּכָי
  chosen: to Mordecai
  lexicon: HALOT
  rationale: Standard dative of indirect object; straightforwardly rendered 'to Mordecai.'
- source_word: מַדּוּעַ
  chosen: Why
  alternatives:
  - For what reason
  lexicon: HALOT
  rationale: Direct interrogative asking reason; 'Why' is the natural concise English equivalent.
- source_word: אַתָּה
  chosen: you
  lexicon: HALOT
  rationale: Second masculine singular pronoun addressed directly to Mordecai; English simply uses 'you.'
- source_word: עוֹבֵר
  chosen: are you disobeying
  alternatives:
  - are you transgressing
  - are you violating
  - are you passing over
  lexicon: HALOT
  rationale: The participle of עבר with אֵת plus 'the king’s command' means to go beyond or violate a command. 'Disobeying' best captures the idiomatic sense in clear modern English. 'Transgressing' is more formal; 'violating' is possible but slightly harsher.
- source_word: אֵת מִצְוַת הַמֶּלֶךְ
  chosen: the king’s command
  alternatives:
  - the command of the king
  - the king’s order
  lexicon: HALOT
  rationale: מִצְוָה is 'command, commandment.' In this court context, 'command' is preferable to 'commandment,' which can sound overly religious in English. 'Order' is possible, but 'command' stays closer to the Hebrew noun.
