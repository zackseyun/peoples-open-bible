base_translation:
  language: en
  yaml_path: translation/deuterocanon/tobit/002/002.yaml
  text: And I saw much food[a], and I said to my son, “Go and bring whichever one of our brothers you may find in need, who remembers the Lord; and behold[c][b], I am waiting for you.”
  footnotes:
  - marker: a
    text: Or “many dishes” or “much meat”; the Greek term refers to prepared food served with a meal.
    reason: lexical_alternative
  - marker: b
    text: “Our brothers” here means fellow members of Tobit’s people, not only literal siblings.
    reason: cultural_note
  - marker: c
    text: The closing words are awkward in the Greek manuscript tradition; the sense is that Tobit remains behind waiting for his son to return.
    reason: textual_variant
