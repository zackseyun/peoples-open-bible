    text: O «presa de las naciones».
    reason: lexical_alternative
  - marker: b
    text: O «las fieras de la tierra».
    reason: lexical_alternative
  - marker: c
    text: O «habitarán en seguridad, y nadie los aterrorizará».
    reason: lexical_alternative
  revision_rationale: Se reemplaza «las bestias del campo» por «los animales salvajes de la tierra» para ajustarse mejor a חַיַּת הָאָרֶץ y al razonamiento léxico del POB inglés, manteniendo a la vez un español natural y la alternativa más tradicional en nota.
