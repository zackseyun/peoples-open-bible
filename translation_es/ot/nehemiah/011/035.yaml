    rationale: En español, dentro de una frase nominativa de lugar, «valle» puede ir con mayúscula por tratarse de un topónimo compuesto, pero «artesanos» funciona más naturalmente en minúscula. Ajustarlo mejora la legibilidad sin alterar el sentido.
