    reason: lexical_alternative
translation:
  language: ko
  text: 그러므로 또 다른 시편에서도 말씀하셨습니다. 「당신은 당신의 거룩한 분이 썩음을 보게 하지 않으실 것입니다.」
  philosophy: optimal-equivalence
theological_decisions:
- issue: 시편 16:10 인용 — κύριος 호칭 처리
  chosen_reading: 당신은 당신의 거룩한 분이 썩음을 보게 하지 않으실 것입니다
  alternative_readings:
  - 주의 거룩한 자에게 썩음을 보이지 아니하시리이다
  rationale: LXX 시 15(16):10의 화자는 다윗이 야훼께 드리는 기도이지만, 바울이 인용할 때 호격은 명시되지 않는다. 호격이 명시되지 않으므로 「야훼」로 명시하지 않고 「당신」(2인칭 존칭)으로 옮겨 LXX의 모호성과 인용 구조를 함께 보존한다. (LXX κύριος = YHWH의 호격이 본문에 명시되어 있을 때만 「야훼」로 옮긴다는 본 프로젝트 정책에 따른다.)
  doctrine_reference: 'DOCTRINE.md: LXX-YHWH citation policy — explicit κύριος-vocative only'
