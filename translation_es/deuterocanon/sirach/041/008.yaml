translation:
  language: es
  text: ¡Ay de ustedes, hombres malvados, que han abandonado la ley[a] del Altísimo[b]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo תורת también puede traducirse «instrucción» o «enseñanza», aunque «ley» encaja aquí con el sentido pactal y está respaldado por el griego νόμον.
    reason: lexical_alternative
  - marker: b
    text: 'Paralelo griego: «la ley de Dios Altísimo». El testigo hebreo principal dice simplemente «la ley del Altísimo».'
    reason: alternative_reading
lexical_decisions:
- source_word: אוי / οὐαί
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de ustedes!
  alternatives_spanish:
  - ¡Ay!
  - ¡Woe de ustedes!
  lexicon: HALOT; BDAG
  rationale: La interjección expresa denuncia profética y lamento. En español, «¡Ay de ustedes!» comunica mejor ese golpe exhortativo que una transliteración o una forma más débil.
- source_word: לכם / ὑμῖν
  english_pob_choice: to you
  chosen_spanish: de ustedes
  alternatives_spanish:
  - a ustedes
  - para ustedes
  lexicon: HALOT; BDAG
  rationale: El dativo de destinatario se vuelve natural en español con «de ustedes» dentro de la exclamación de reprensión.
- source_word: אנשי / ἄνδρες
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  - gente
  lexicon: HALOT; BDAG
  rationale: El sustantivo masculino plural debe conservarse sin neutralizarlo. «Hombres» refleja con precisión la forma fuente.
- source_word: רשע / ἀσεβεῖς
  english_pob_choice: wicked
  chosen_spanish: impíos
  alternatives_spanish:
  - malvados
  - malos
  lexicon: HALOT; BDAG
  rationale: La rama griega resalta la impiedad; en español «impíos» preserva mejor ese matiz religioso y sigue siendo compatible con la maldad ética del hebreo.
- source_word: אשר / οἵτινες
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - los cuales
  - quienes
  lexicon: HALOT; BDAG
  rationale: Una relativa simple y directa es la más natural en español y mantiene el valor explicativo del hebreo y del griego.
- source_word: עזבתם / ἐγκατελίπετε
  english_pob_choice: have abandoned
  chosen_spanish: han abandonado
  alternatives_spanish:
  - han dejado
  - han abandonado por completo
  - han forsaken
  lexicon: HALOT; BDAG
  rationale: «Abandonado» conserva la fuerza deliberada de dejar/forsaking y funciona bien en español moderno.
- source_word: תורת / νόμον
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  - la enseñanza
  lexicon: HALOT; BDAG
  rationale: Aunque תּוֹרָה puede ser «instrucción», el valor pactal/jurídico y el paralelo νόμος justifican «ley» como traducción principal.
- source_word: עליון / θεοῦ Ὑψίστου
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Dios Altísimo
  - el Altísimo Dios
  lexicon: HALOT; BDAG
  rationale: El hebreo fuente dice simplemente «Altísimo»; en español la forma sustantivada tradicional y clara es «el Altísimo». Se evita añadir «Dios» al texto principal porque no está explícito en el testigo hebreo principal.
theological_decisions:
- issue: Relación entre el hebreo «Altísimo» y el griego «Dios Altísimo»
  english_pob_reading: the Most High, with Greek parallel noting 'the law of God Most High'
  chosen_spanish_reading: el Altísimo, con nota sobre «la ley de Dios Altísimo»
  alternative_spanish_readings:
  - el Dios Altísimo
  - el Altísimo Dios
  rationale: Se preserva la primacía del testigo hebreo sin perder la expansión explícita del griego. La nota permite ver la variación textual sin incorporar un término no presente en el hebreo base.
  doctrine_reference: Primacía del testigo original disponible; no importar en el texto principal ampliaciones que pertenecen solo al paralelo griego.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el estado revisado más reciente del proyecto: mantiene la prioridad del hebreo como testigo principal, conserva la variación griega en nota, y no introduce cambios respecto del consenso auditado de alta concordancia.'
  spanish_consistency_notes:
  - Se usa «Altísimo» sin añadir «Dios» en el texto principal, conforme al testigo hebreo base.
  - «Impíos» se eligió para reflejar el matiz religioso del griego ἀσεβεῖς sin perder la severidad ética del hebreo.
  - Se mantiene «ley» como traducción principal de תורת por el contexto pactal y el apoyo de νόμον.
