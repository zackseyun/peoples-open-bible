review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego y del POB en la segunda mitad: «hallarás descanso» refleja εὑρήσεις ἀνάπαυσιν, «deja que sus manos queden ociosas» representa adecuadamente ἄνες χεῖρας αὐτῷ, y «buscará libertad» conserva literalmente ζητήσει ἐλευθερίαν con la nota aclaratoria correcta. Sin embargo, la primera cláusula no preserva fielmente ἔργασαι ἐν παιδί. «Apártalo para el trabajo» introduce la idea de apartar/separar, ausente en el griego, y suena poco natural en español para el sentido causativo de poner al niño a trabajar o mantenerlo ocupado disciplinadamente.'
  spanish_quality_summary: La redacción es en general clara y legible, pero «Apártalo para el trabajo» no suena idiomática en español general y puede entenderse como separar o destinar aparte, no como ponerlo a trabajar. El resto del versículo es natural y digno. La nota [a] también necesita ajustarse porque actualmente glosa una expresión que no corresponde al punto léxico principal ni a una alternativa española útil para el lector.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. Las decisiones sobre «libertad», la referencia masculina singular y el tono sapiencial son consistentes con el expediente inglés. La principal corrección es léxica y estilística en ἔργασαι.
  issues:
  - severity: high
    issue: «Apártalo para el trabajo» no refleja bien ἔργασαι
    rationale: El verbo griego exhorta a poner al niño a trabajar o a ocuparlo en labor/actividad disciplinada. «Apartar» añade una noción de separación o destino que no está en la fuente y debilita el sentido causativo documentado por el POB.
  - severity: medium
    issue: La nota [a] no corresponde bien a la decisión léxica documentada
    rationale: La nota inglesa preserva una alternativa ligada a ἄνες («let up on his hands»), no a ἔργασαι. En español, la nota actual queda desconectada del texto y además usa una formulación poco clara («aflojar en sus manos»). Conviene reemplazarla por una alternativa española inteligible sobre la segunda cláusula.
  revised_spanish_text: Ponlo a trabajar mientras sea niño, y hallarás descanso; deja ociosas sus manos[a], y buscará libertad[b].
