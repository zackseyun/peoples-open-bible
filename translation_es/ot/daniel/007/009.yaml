base_translation:
  language: en
  yaml_path: translation/ot/daniel/007/009.yaml
  text: I kept watching until thrones were set in place[a], and the Ancient of Days took his seat. His clothing was white as snow, and the hair of his head was like pure wool. His throne was flames of fire[b]; its wheels were a burning fire.
  footnotes:
  - marker: a
    text: Or, 'thrones were placed.' The traditional rendering 'thrones were cast down' is less likely here because the scene immediately depicts the heavenly court being convened.
    reason: alternative_reading
  - marker: b
    text: Aramaic 'Ancient of Days,' a title emphasizing great age and eternal majesty.
    reason: cultural_note
