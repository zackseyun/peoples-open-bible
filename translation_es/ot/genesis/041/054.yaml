translation:
  language: es
  text: Y los siete años de hambre comenzaron a llegar, tal como lo había dicho José. Y hubo hambre en todas las tierras, pero en toda la tierra de Egipto había pan[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «había alimento»; el hebreo לֶחֶם («pan») puede funcionar de manera más amplia para comida o provisiones.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתְּחִלֶּינָה
  english_pob_choice: began
  chosen_spanish: comenzaron
  alternatives_spanish:
  - empezaron
  lexicon: HALOT
  rationale: El hebreo marca el inicio de los años de hambre; «comenzaron» conserva el valor incoativo y suena natural en español.
- source_word: שֶׁבַע שְׁנֵי הָרָעָב
  english_pob_choice: the seven years of famine
  chosen_spanish: los siete años de hambre
  alternatives_spanish:
  - los siete años de famine
  lexicon: HALOT
  rationale: La construcción posesiva se expresa con naturalidad en español como «años de hambre». «Hambre» mantiene el sentido del sustantivo hebreo en este contexto.
- source_word: לָבוֹא
  english_pob_choice: to come
  chosen_spanish: '[implícito en el inicio verbal]'
  alternatives_spanish:
  - a venir
  - a llegar
  lexicon: HALOT
  rationale: En español, el infinitivo complementario queda mejor absorbido por el verbo incoativo principal («comenzaron»), sin forzar una perífrasis poco natural.
- source_word: כַּאֲשֶׁר אָמַר יוֹסֵף
  english_pob_choice: just as Joseph had said
  chosen_spanish: tal como lo había dicho José
  alternatives_spanish:
  - como José había dicho
  - justo como José había dicho
  lexicon: HALOT
  rationale: «Tal como» conserva la correspondencia; el pluscuamperfecto «había dicho» respeta la anterioridad narrativa respecto del cumplimiento.
- source_word: וַיְהִי רָעָב
  english_pob_choice: there was famine
  chosen_spanish: hubo hambre
  alternatives_spanish:
  - hubo escasez
  - había hambre
  lexicon: HALOT
  rationale: «היה» existencial se vierte bien con «hubo». «Hambre» mantiene la referencia concreta del hebreo y no diluye la imagen en una generalidad como «escasez».
- source_word: בְּכָל הָאֲרָצוֹת
  english_pob_choice: in all the lands
  chosen_spanish: en todas las tierras
  alternatives_spanish:
  - en todas las regiones
  - por todas las tierras
  lexicon: HALOT
  rationale: «Tierras» refleja el plural hebreo sin introducir la carga moderna de «países». Mantiene amplitud geográfica.
- source_word: וּבְכָל אֶרֶץ מִצְרַיִם
  english_pob_choice: but in all the land of Egypt
  chosen_spanish: pero en toda la tierra de Egipto
  alternatives_spanish:
  - y en toda la tierra de Egipto
  lexicon: HALOT
  rationale: Se conserva el contraste narrativo que la POB marcó con «but». «Tierra de Egipto» sigue el campo semántico de אֶרֶץ y es idiomático en español bíblico actual.
- source_word: הָיָה לָחֶם
  english_pob_choice: there was bread
  chosen_spanish: había pan
  alternatives_spanish:
  - había alimento
  - había provisiones
  lexicon: HALOT
  rationale: «Pan» preserva el término concreto del hebreo, que también puede funcionar metonímicamente para alimento o provisiones; el sentido amplio queda documentado en la nota.
theological_decisions:
- issue: Valor de לֶחֶם en el cierre de la frase
  english_pob_reading: there was bread, with a note that Hebrew 'bread' can mean food or provisions
  chosen_spanish_reading: había pan, con nota sobre el sentido más amplio de alimento o provisiones
  alternative_spanish_readings:
  - había alimento
  - había provisiones
  rationale: 'Se mantiene el término concreto del texto hebreo y se preserva la tensión semántica: la palabra puede designar pan literalmente o, por extensión, comida/provisiones. La nota evita perder ese rango semántico.'
  doctrine_reference: Ninguna; decisión léxica y semántica
- issue: Contraste entre la hambruna general y la provisión en Egipto
  english_pob_reading: And there was famine in all the lands, but in all the land of Egypt there was bread.
  chosen_spanish_reading: Y hubo hambre en todas las tierras, pero en toda la tierra de Egipto había pan.
  alternative_spanish_readings:
  - Y hubo hambre en todas las tierras, y en toda la tierra de Egipto había pan.
  rationale: El contraste narrativo del hebreo se refleja mejor con «pero», como en la auditada inglesa. No añade contenido doctrinal; solo hace explícita la oposición implícita entre escasez y provisión.
  doctrine_reference: Ninguna; decisión discursiva
translation_notes:
  revision_awareness: La versión inglesa auditada quedó sin cambios en su última revisión; se sigue la lectura estable y de alta concordancia, manteniendo la nota léxica sobre לֶחֶם.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «José» mantiene la forma española usual del nombre propio.
  - «Tierra» se conserva para אֶרֶץ/אֲרָצוֹת, evitando «países» para no modernizar en exceso el referente geográfico bíblico.
  - «Pan» se mantiene en el texto principal por fidelidad al hebreo, con nota para el sentido más amplio.
