translation:
  language: es
  text: Has cargado con tu conducta desvergonzada y tus abominaciones[a], declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «has cargado con tu culpa» o «has cargado con tu castigo». El verbo hebreo puede tener matiz judicial en este contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זִמָּתֵךְ
  english_pob_choice: your lewdness
  chosen_spanish: tu lujuria
  alternatives_spanish:
  - tu lascivia
  - tu conducta desvergonzada
  - tu inmoralidad sexual
  lexicon: HALOT
  rationale: זִמָּה en Ezequiel suele cargar una fuerza moral y sexualmente vergonzosa. 'Lujuria' conserva ese peso sexual-moral en español con naturalidad, sin suavizarlo a un término demasiado general.
- source_word: תּוֹעֲבוֹתַיִךְ
  english_pob_choice: your abominations
  chosen_spanish: tus abominaciones
  alternatives_spanish:
  - tus cosas detestables
  - tus actos abominables
  lexicon: HALOT
  rationale: '''Abominaciones'' reproduce bien el valor intenso y profético de תּוֹעֵבָה, y mantiene el plural enfático del hebreo.'
- source_word: נְשָׂאתִם
  english_pob_choice: have borne
  chosen_spanish: has llevado
  alternatives_spanish:
  - has soportado
  - has cargado con
  - has llevado sobre ti
  lexicon: HALOT
  rationale: '''Llevar'' conserva la amplitud semántica de נשׂא sin decidir de antemano entre culpa y castigo. En español, ''has llevado'' permite oír tanto la responsabilidad como las consecuencias judiciales.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'Se sigue el estándar del proyecto para el Nombre divino: ''Yahvé'' en el texto principal, en lugar de una sustitución por ''Señor''.'
theological_decisions:
- issue: Ambigüedad judicial de נָשָׂא en contexto de juicio
  english_pob_reading: have borne (keeping the ambiguity between guilt, punishment, and consequence)
  chosen_spanish_reading: has llevado (manteniendo abierta la relación entre culpa, castigo y consecuencia)
  alternative_spanish_readings:
  - has llevado tu culpa
  - has soportado tu castigo
  rationale: El hebreo admite un sentido judicial, pero el objeto directo incluye tanto la conducta como las abominaciones. 'Has llevado' preserva esa tensión sin resolverla interpretativamente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: Tratamiento del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  rationale: El texto hebreo usa directamente el Tetragrámaton; por la directriz del proyecto, se conserva el Nombre propio y no se lo oculta tras una convención litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El borrador refleja la revisión más reciente al omitir cualquier equivalente de 'you yourself' y mantener una formulación breve y natural en español, sin perder la fuerza judicial y moral del hebreo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente con la política del proyecto para יְהוָה.
  - '''Lujuria'' traduce aquí la carga sexual-moral de זִמָּה sin banalizarla.'
  - '''Has llevado'' deja abierta la ambigüedad entre carga moral, culpa y castigo, como en el análisis auditado.'
  - La puntuación y el tono buscan una cadencia bíblica sobria y publicable en español contemporáneo.
