translation:
  language: es
  text: 'Así me acerqué a la profetisa[a], y ella concibió y dio a luz un hijo. Entonces Yahvé me dijo[b]: «Ponle por nombre Maher-shalal-hash-baz».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Maher-shalal-hash-baz probablemente significa algo como «pronto al saqueo, veloz al botín».
    reason: lexical_alternative
  - marker: b
    text: 'O traducción previa: «Entonces me acerqué a la profetisa, y ella concibió y dio a luz un hijo. Entonces Yahvé me dijo: “Llama su nombre Maher-shalal-hash-baz”».'
    reason: previous_rendering
lexical_decisions:
- source_word: וָאֶקְרַב
  english_pob_choice: So I went near
  chosen_spanish: me acerqué
  alternatives_spanish:
  - me aproximé
  - me arrimé
  lexicon: HALOT
  rationale: El hebreo קרב significa literalmente 'acercarse'. En este contexto funciona como un eufemismo moderado para relaciones conyugales, pero el texto no lo explicita. 'Me acerqué' conserva el lenguaje hebreo y su nivel de reserva, sin volverlo más explícito de lo que el fuente permite.
- source_word: הַנְּבִיאָה
  english_pob_choice: the prophetess
  chosen_spanish: la profetisa
  alternatives_spanish:
  - la mujer profeta
  lexicon: HALOT
  rationale: El femenino de נביא se refleja naturalmente en español con 'profetisa'. Mantiene el marcador de género y es más conciso que una perífrasis como 'mujer profeta'.
- source_word: וַתַּהַר
  english_pob_choice: she conceived
  chosen_spanish: concibió
  alternatives_spanish:
  - quedó encinta
  - quedó embarazada
  lexicon: HALOT
  rationale: הרה expresa concebir/embarazarse. 'Concibió' mantiene el registro narrativo y la secuencia verbal del hebreo.
- source_word: וַתֵּלֶד בֵּן
  english_pob_choice: and bore a son
  chosen_spanish: dio a luz un hijo
  alternatives_spanish:
  - dio a luz un varón
  - parió un hijo
  lexicon: HALOT
  rationale: ילד con בן se traduce de forma natural como 'dio a luz un hijo'. 'Hijo' reproduce el sustantivo בן sin necesidad de hacerlo más interpretativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Siguiendo el criterio del proyecto, el Tetragrámaton se vierte como 'Yahvé' y no como una sustitución titular. Así se preserva el nombre personal divino presente en el hebreo.
- source_word: קְרָא שְׁמוֹ
  english_pob_choice: Call his name
  chosen_spanish: Llama su nombre
  alternatives_spanish:
  - Ponle por nombre
  - Nombra al niño
  lexicon: HALOT
  rationale: La fórmula hebrea es literalmente 'llama su nombre'. Aunque menos idiomática que 'ponle por nombre', conserva con precisión el giro narrativo de imposición de nombre.
- source_word: מַהֵר שָׁלָל חָשׁ בַּז
  english_pob_choice: Maher-shalal-hash-baz
  chosen_spanish: Maher-shalal-hash-baz
  alternatives_spanish:
  - Rápido al botín, presto al saqueo
  - Pronto al despojo, veloz al botín
  lexicon: HALOT
  rationale: En el texto principal se translitera el nombre simbólico, porque funciona como nombre propio. Su sentido semántico se conserva en nota, siguiendo la práctica del POB de no sustituir el nombre por una traducción en la línea principal.
theological_decisions:
- issue: Nivel de explicitud del eufemismo marital en 'me acerqué a la profetisa'
  english_pob_reading: Retain the Hebrew euphemism without expanding it to an explicit paraphrase
  chosen_spanish_reading: Conservar el eufemismo hebreo con 'me acerqué a la profetisa'
  alternative_spanish_readings:
  - tuve relaciones con la profetisa
  - me acosté con la profetisa
  rationale: El contexto narrativo implica unión conyugal, pero el hebreo usa una expresión contenida. La versión española mantiene esa misma reserva para no resolver la tensión lexical del original ni añadir explicitud no textual.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source text warrants; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El borrador inglés reciente suavizó la cadencia repetitiva al pasar de ''Then I went near'' a ''So I went near''. En español, ''Entonces me acerqué...'' mantiene un flujo narrativo natural sin duplicar innecesariamente marcas discursivas. También se siguió la última revisión estable: no hubo cambios sustanciales de sentido y se preservó el nombre simbólico transliterado con nota semántica.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - Se prefirió 'profetisa' por claridad y por conservar el género del sustantivo hebreo.
  - Se mantuvo la transliteración del nombre simbólico en el texto principal y se explicó su sentido en nota.
  - Se conservó la reserva del hebreo en la descripción de la acción con la profetisa, sin explicitar la relación sexual.
