translation:
  language: es
  text: 'Por tanto, así dice Yahvé[a], el Dios de Israel, acerca de los pastores que apacientan a mi pueblo: Ustedes han dispersado a mi rebaño y lo han ahuyentado, y no se han ocupado de él. He aquí, estoy por ocuparme de ustedes por el mal de sus obras[b], oráculo de Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse 'contra los pastores'; la preposición hebrea puede introducir un oráculo dirigido hostilmente a ellos.
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo repite el verbo equivalente a ''ocuparse de/atender'': ''no se han ocupado de él ... estoy por ocuparme de ustedes'', creando una reversión deliberada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como nombre propio transliterado en español, conforme al enfoque del POB, en vez de ocultarlo con un título sustitutivo.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel como pacto
  - el Dios de Israel
  lexicon: HALOT
  rationale: Es una construcción directa y natural en español que mantiene la identificación covenantal de Yahvé con Israel.
- source_word: עַל
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - contra
  - sobre
  lexicon: HALOT
  rationale: En la introducción profética, עַל puede introducir un oráculo dirigido a alguien o referente a alguien. 'Acerca de' preserva la fluidez española; el tono de juicio queda explícito en el resto del versículo.
- source_word: הָרֹעִים הָרֹעִים אֶת עַמִּי
  english_pob_choice: the shepherds who shepherd my people
  chosen_spanish: los pastores que apacientan a mi pueblo
  alternatives_spanish:
  - los pastores que pastorean a mi pueblo
  - los líderes que apacientan a mi pueblo
  lexicon: HALOT
  rationale: Se conserva la metáfora de 'pastores' y el valor verbal de רעה con 'apacientan', una solución natural en español que mantiene la repetición retórica del hebreo.
- source_word: הֲפִצֹתֶם
  english_pob_choice: have scattered
  chosen_spanish: han dispersado
  alternatives_spanish:
  - han esparcido
  - han desparramado
  lexicon: HALOT
  rationale: '''Dispersar'' es una equivalencia idiomática clara para la acción sobre un rebaño y conserva la fuerza del verbo en contexto pastoral.'
- source_word: צֹאנִי
  english_pob_choice: my flock
  chosen_spanish: mi rebaño
  alternatives_spanish:
  - mis ovejas
  - mi manada
  lexicon: HALOT
  rationale: '''Rebaño'' reproduce naturalmente la imagen colectiva del hebreo y funciona bien con ''pastores'' y ''apacentar''.'
- source_word: וַתַּדִּחוּם
  english_pob_choice: driven them away
  chosen_spanish: los han ahuyentado
  alternatives_spanish:
  - los han echado
  - los han expulsado
  lexicon: HALOT
  rationale: El verbo comunica el empuje forzado del rebaño lejos de su lugar; 'ahuyentar' refleja bien ese desplazamiento violento sin perder naturalidad.
- source_word: וְלֹא פְקַדְתֶּם אֹתָם
  english_pob_choice: you have not attended to them
  chosen_spanish: no se han ocupado de ellos
  alternatives_spanish:
  - no han atendido a ellos
  - no los han cuidado
  lexicon: HALOT
  rationale: '''Ocuparse de'' comunica el sentido de supervisión/cuidado con una formulación idiomática en español. Aunque no repite literalmente ''atender'', mantiene la idea de negligencia pastoral; la repetición verbal queda indicada en nota.'
- source_word: הִנְנִי פֹקֵד עֲלֵיכֶם
  english_pob_choice: Behold, I am about to attend to you
  chosen_spanish: He aquí, yo me ocuparé de ustedes
  alternatives_spanish:
  - He aquí, yo los atenderé
  - Miren, yo me ocuparé de ustedes
  lexicon: HALOT
  rationale: Se conserva la solemnidad de הִנְנִי con 'He aquí'. 'Me ocuparé de ustedes' refleja el mismo verbo traducido antes de forma natural, permitiendo que el contexto de juicio precise el sentido.
- source_word: אֶת רֹעַ מַעַלְלֵיכֶם
  english_pob_choice: for the evil of your deeds
  chosen_spanish: por el mal de sus obras
  alternatives_spanish:
  - por la maldad de sus hechos
  - por la perversidad de sus acciones
  lexicon: HALOT
  rationale: '''Mal'' representa רֹעַ y ''obras'' traduce מַעַלְלֵי con un término bíblicamente estable en español. ''Por'' expresa la base causal/judicial del castigo.'
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Fórmula profética estándar, fiel y natural en español contemporáneo.
theological_decisions:
- issue: Conservación del nombre divino frente a sustitución por título
  english_pob_reading: The Tetragrammaton is rendered 'Yahweh' rather than 'the LORD'.
  chosen_spanish_reading: Yahvé en lugar de un sustituto como 'el SEÑOR'.
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene la decisión doctrinal y editorial del POB de preservar el nombre propio de Dios revelado a Israel, evitando el sustituto tradicional.
  doctrine_reference: Translation philosophy §3, §5
- issue: Metáfora de pastores y rebaño
  english_pob_reading: Retain 'shepherds' rather than substituting 'leaders.'
  chosen_spanish_reading: Conservar 'pastores' y 'rebaño' en vez de interpretar solo como 'líderes' o 'gobernantes'.
  alternative_spanish_readings:
  - líderes
  - gobernantes
  rationale: La metáfora es estructural en Jeremías 23 y sostiene la acusación de mala conducción del pueblo; traducirla literalmente preserva el argumento profético.
  doctrine_reference: Translation philosophy §1, §5
- issue: Juego verbal con פקד (no se han ocupado / me ocuparé)
  english_pob_reading: Use 'attended to' in both clauses, with the second clarified by 'for the evil of your deeds.'
  chosen_spanish_reading: Usar un verbo de cuidado/supervisión en ambas cláusulas, con la segunda especificada por el contexto de juicio.
  alternative_spanish_readings:
  - atender / atender
  - visitar / visitar
  - cuidar / castigar
  rationale: El hebreo repite deliberadamente פקד. En español, 'ocuparse de' permite retener la idea de supervisión/cuidado en la primera cláusula sin perder el contraste judicial de la segunda.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el auditable inglés del POB. Se aceptó la última pasada sin cambios, por lo que no se introdujeron revisiones adicionales; la principal adaptación al español fue escoger equivalencias idiomáticas que preservan el metáforo pastoral y el juego verbal de פקד.
  spanish_consistency_notes:
  - Se conserva Yahvé como nombre divino en el texto principal y en la fórmula final.
  - '''Pastores'', ''rebaño'' y ''apacentan'' mantienen coherencia con la metáfora extendida de Jeremías 23.'
  - Se procuró que el verbo de la primera mitad y el de la segunda mantengan relación semántica para reflejar el paralelismo y la inversión del hebreo.
  - El registro es bíblico y contemporáneo, evitando tanto arcaísmos innecesarios como paráfrasis excesiva.
