translation:
  language: es
  text: Para la asamblea[a], habrá una sola ordenanza para ustedes y para el residente extranjero que reside con ustedes; una ordenanza perpetua[b] por todas sus generaciones. Como ustedes, así será el residente extranjero delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la congregación». קָהָל apunta al pueblo reunido; «asamblea» conserva ese valor comunitario y jurídico.
    reason: lexical_alternative
  - marker: b
    text: O «una ordenanza permanente» o «un estatuto perpetuo». עוֹלָם en fórmulas legales indica vigencia duradera a través de las generaciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקָּהָל
  english_pob_choice: the assembly
  chosen_spanish: la asamblea
  alternatives_spanish:
  - la congregación
  lexicon: HALOT
  rationale: קָהָל designa al cuerpo reunido del pueblo. «Asamblea» conserva el sentido comunitario y jurídico-cultual sin cargarlo de un matiz eclesiástico más fuerte de lo que exige el hebreo.
- source_word: חֻקָּה אַחַת
  english_pob_choice: one statute
  chosen_spanish: una sola ordenanza
  alternatives_spanish:
  - una ordenanza
  - un estatuto
  - una sola norma
  lexicon: HALOT
  rationale: חֻקָּה es una disposición prescrita, de fuerza legal. «Ordenanza» comunica bien ese valor normativo en español; «sola» refleja la unicidad enfática de אַחַת.
- source_word: לָכֶם וְלַגֵּר
  english_pob_choice: for you and for the sojourner
  chosen_spanish: para ustedes y para el forastero
  alternatives_spanish:
  - para ustedes y para el residente extranjero
  - para ustedes y para el extranjero
  lexicon: HALOT
  rationale: גֵּר puede abarcar al extranjero residente bajo el orden comunitario de Israel. «Forastero» mantiene la distancia de origen sin reducirlo a simple desconocido; en este contexto legal resulta suficientemente claro y natural.
- source_word: הַגָּר
  english_pob_choice: who sojourns with you
  chosen_spanish: que reside con ustedes
  alternatives_spanish:
  - que vive con ustedes
  - que habita con ustedes
  - que sojurna con ustedes
  lexicon: HALOT
  rationale: El participio de גור enfatiza residencia continua entre el pueblo. «Reside con ustedes» comunica el estado duradero y evita una forma verbal poco natural en español como «sojurna».
- source_word: חֻקַּת עוֹלָם
  english_pob_choice: a permanent statute
  chosen_spanish: una ordenanza perpetua
  alternatives_spanish:
  - una ordenanza permanente
  - un estatuto perpetuo
  - una ordenanza para siempre
  lexicon: HALOT
  rationale: עוֹלָם en fórmulas legales suele indicar vigencia duradera a través de las generaciones. «Perpetua» preserva esa fuerza tradicional sin forzar una idea filosófica de eternidad absoluta.
- source_word: לְדֹרֹתֵיכֶם
  english_pob_choice: throughout your generations
  chosen_spanish: por todas sus generaciones
  alternatives_spanish:
  - a lo largo de sus generaciones
  - para sus generaciones
  - de generación en generación
  lexicon: HALOT
  rationale: La expresión indica continuidad a lo largo de las sucesivas generaciones. «Por todas sus generaciones» es natural en español y mantiene el alcance histórico del hebreo.
- source_word: כָּכֶם כַּגֵּר יִהְיֶה
  english_pob_choice: As you are, so shall the sojourner be
  chosen_spanish: Como ustedes, así será el forastero
  alternatives_spanish:
  - El forastero será como ustedes
  - Así como ustedes, así será el forastero
  - Tal como ustedes, así será el forastero
  lexicon: HALOT
  rationale: La construcción comparativa כּ...כ subraya la igualdad de trato. «Como ustedes, así será…» conserva el paralelismo enfático y suena natural en español.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: לִפְנֵי expresa estar ante la presencia de alguien. Se conserva «Yahvé» según la norma del proyecto para el nombre divino, sin sustituirlo por un título.
theological_decisions:
- issue: Estatuto igual para israelita y forastero residente en esta ley
  english_pob_reading: The verse states equal statutory standing in this matter for the native assembly and the sojourner residing among them.
  chosen_spanish_reading: El versículo presenta una misma ordenanza para la asamblea y para el forastero que vive entre ellos, sin resolver más allá del texto el alcance de esa igualdad.
  alternative_spanish_readings:
  - Podría leerse de manera más estrecha, limitándolo solo a la regulación del contexto inmediato.
  - Podría entenderse como una afirmación general de igualdad religiosa en todo sentido.
  rationale: El hebreo enfatiza una sola disposición para ambos grupos «delante de Yahvé». La traducción mantiene esa paridad y evita extenderla o limitarla más de lo que el texto dice.
  doctrine_reference: Preservar la tensión textual sin importar conclusiones doctrinales ajenas al pasaje.
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se documentaron revisiones aplicadas y el estado general fue de alta concordancia, con solo observaciones menores.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - «Forastero» traduce גֵּר de modo consistente con el valor de residente extranjero; se evita «extranjero» por su posible ambigüedad moderna.
  - «Ordenanza» se mantiene como equivalente de חֻקָּה para conservar el matiz legal-prescriptivo.
  - «Delante de Yahvé» conserva la fórmula relacional de לִפְנֵי sin reemplazarla por una paraphrase devocional.
