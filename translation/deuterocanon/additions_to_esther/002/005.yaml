  text: διειληφότες οὖν ὅδε τὸ ἔθνος μονώτατον ἐν ἀντιπαραγωγῇ παντὶ διὰ παντὸς ἀνθρώπῳ κείμενον, διαγωγὴν νόμων ξενίζουσαν παραλλάσσον, καὶ δυσονοοῦν τοῖς ἡμετέροις πράγμασιν τὰ χείριστα συντελοῦν κακὰ καὶ πρὸς τὸ μὴ τὴν βασιλείαν εὐσταθείας τυγχάνειν·
