translation:
  language: es
  text: Y no piensen que es extraño[a] que incluso la razón[b] puede prevalecer sobre la hostilidad[c] por causa de la ley[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “paradójico” o “inesperado”. El griego παράδοξον puede significar algo contrario a la expectativa o sorprendente.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: “la razón”. Aquí λογισμός designa la facultad racional o el juicio razonado, un término clave en 4 Macabeos.'
    reason: lexical_alternative
  - marker: c
    text: 'Lit.: “enemistad”. ἔχθρα puede abarcar enemistad, hostilidad u oposición.'
    reason: lexical_alternative
  - marker: d
    text: 'Lit.: “donde también la razón puede prevalecer sobre la hostilidad por causa de la ley”. La construcción griega es algo condensada; la traducción expresa el sentido en español natural.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ νομίσητε
  english_pob_choice: do not think
  chosen_spanish: no piensen
  alternatives_spanish:
  - no supongan
  - no consideren
  lexicon: BDAG
  rationale: El verbo griego expresa un juicio evaluativo; en español, "no piensen" suena natural, directo y conserva la prohibición sin volverla rígida.
- source_word: παράδοξον
  english_pob_choice: strange
  chosen_spanish: extraño
  alternatives_spanish:
  - paradójico
  - inesperado
  - raro
  lexicon: LSJ
  rationale: El adjetivo puede significar algo contrario a lo esperado o sorprendente. "Extraño" reproduce bien la frase idiomática y evita el tecnicismo de "paradójico".
- source_word: ὁ λογισμός
  english_pob_choice: reason
  chosen_spanish: el razonamiento
  alternatives_spanish:
  - la razón
  - el juicio racional
  - el pensamiento
  lexicon: LSJ
  rationale: En 4 Macabeos λογισμός es un término clave para la facultad racional o el juicio razonado. "Razonamiento" conserva ese valor activo y permite mantener el matiz conceptual sin sonar demasiado abstracto.
- source_word: ἐπικρατεῖν δύναται
  english_pob_choice: can prevail even over
  chosen_spanish: pueda prevalecer sobre
  alternatives_spanish:
  - pueda dominar sobre
  - pueda vencer a
  - pueda imponerse sobre
  lexicon: BDAG
  rationale: La combinación expresa capacidad de vencer o imponerse. "Prevalecer sobre" conserva la idea de superioridad efectiva y funciona bien en español; "también" refleja el énfasis de la construcción griega en contexto.
- source_word: ἔχθραν
  english_pob_choice: hostility
  chosen_spanish: la hostilidad
  alternatives_spanish:
  - la enemistad
  - el odio
  - la oposición
  lexicon: BDAG
  rationale: '"Hostilidad" abarca enemistad y oposición sin reducirse al sentimiento interior de odio. Mantiene la amplitud semántica del griego.'
- source_word: διὰ τὸν νόμον
  english_pob_choice: for the sake of the law
  chosen_spanish: por causa de la ley
  alternatives_spanish:
  - por causa de la Ley
  - a causa de la ley
  - por amor de la ley
  lexicon: BDAG
  rationale: διά con acusativo aquí indica motivo o fundamento. "Por causa de la ley" comunica la relación causal/motivacional de forma clara y fiel; no se capitaliza porque el contexto no obliga a tratar νόμος como título tipográfico.
theological_decisions:
- issue: Sentido filosófico-teológico de λογισμός en 4 Macabeos
  english_pob_reading: reason
  chosen_spanish_reading: razonamiento
  alternative_spanish_readings:
  - la razón
  - juicio racional
  - la mente
  rationale: El libro contrasta la facultad racional obediente con las pasiones. "Razonamiento" preserva la dimensión de ejercicio racional y mantiene la tensión conceptual del pasaje sin introducir terminología filosófica posterior.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
- issue: Fuerza de διὰ τὸν νόμον
  english_pob_reading: for the sake of the law
  chosen_spanish_reading: por causa de la ley
  alternative_spanish_readings:
  - porque de la ley
  - a causa de la ley
  - por amor a la ley
  rationale: La frase expresa motivación y lealtad a la ley más que mera instrumentación. "Por causa de la ley" conserva esa orientación sin forzar una explicación doctrinal ajena al pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
translation_notes:
  revision_awareness: El texto griego es conciso y algo comprimido; la versión española conserva la estructura exhortativa y la relación causal final, evitando ampliar el contenido más allá de lo que el griego permite. Se ha preferido una solución que mantenga el paralelismo conceptual entre la facultad racional y la hostilidad, con el matiz de propósito/motivo en διὰ τὸν νόμον.
  spanish_consistency_notes:
  - Se usó "ley" en minúscula siguiendo el contexto inmediato, sin añadir mayúscula interpretativa.
  - Se evitó "Cristo" u otra terminología no pertinente al pasaje.
  - La secuencia "Y no piensen" reproduce la prohibición inicial con un tono natural y publicable en español.
  - Las notas se reservaron para las alternativas léxicas que el texto griego sí deja abiertas, sin sobrecargar la línea principal.
