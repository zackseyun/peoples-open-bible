revisions:
- from: Por tanto, ellos serán como la nube de la mañana[a], y como el rocío que se va temprano, como paja llevada por el viento desde la era, y como humo desde la ventana.
  to: Por tanto, ellos serán como la nube de la mañana, y como el rocío que se va temprano, como tamo arrebatado de la era, y como humo de una ventana[a].
  rationale: Se ajusta 'paja' a 'tamo' para reflejar con más precisión מֹץ ('chaff'), se fortalece el verbo con 'arrebatado' para expresar mejor יְסֹעֵר, y se mejora la naturalidad de la última imagen con 'de una ventana'. La nota mantiene la alternativa léxica documentada para אֲרֻבָּה en español más idiomático.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:34:24Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura de los cuatro símiles del hebreo y conserva el sentido de desaparición rápida: nube de la mañana, rocío que se va temprano, material ligero expulsado de la era y humo que sale por una abertura. Sin embargo, מֹץ se alinea mejor con ''tamo'' que con ''paja'', y יְסֹעֵר pide una imagen más vívida de ser arrebatado/remolinado que la formulación algo aplanada ''llevada por el viento''. También suena más natural en español ''de una ventana'' que ''desde la ventana'' para מֵאֲרֻבָּה.'
  spanish_quality_summary: El texto es legible y digno, pero requiere un ajuste léxico para mayor precisión bíblica y una ligera mejora de naturalidad. 'Paja' en muchos contextos españoles no distingue bien el residuo liviano de la trilla; 'tamo' refleja mejor la imagen agrícola. 'Arrebatado' o 'remolinado' expresa mejor el dinamismo del verbo. La nota al pie es adecuada, aunque 'celosía' suena más natural que 'enrejado' como alternativa arquitectónica.
  glossary_alignment: 'No hay conflictos con la terminología teológica del proyecto. La revisión propuesta mejora la fidelidad léxica al hebreo: מֹץ -> ''tamo'', אֲרֻבָּה principal -> ''ventana'' con nota alternativa ''celosía''.'
  issues:
  - severity: medium
    issue: '''paja'' para כְּמֹץ'
    rationale: מֹץ es el material liviano separado en la trilla, más precisamente 'tamo' o 'paja menuda', no la 'paja' en sentido amplio. El inglés POB eligió 'chaff', por lo que conviene mantener esa precisión en español.
  - severity: medium
    issue: '''llevada por el viento'' suaviza יְסֹעֵר'
    rationale: El verbo comunica ser impulsado de manera tormentosa o en remolino. 'Llevada por el viento' transmite el resultado general, pero pierde viveza. 'arrebatado' preserva mejor la fuerza sin volverse extraño.
  - severity: low
    issue: '''desde la ventana'' es menos idiomático que ''de una ventana'''
    rationale: Para humo que sale de una abertura, en español natural suele preferirse 'de una ventana'. Además evita introducir un artículo definido no motivado por el hebreo.
  - severity: low
    issue: 'Nota al pie: ''enrejado'' menos natural que ''celosía'''
    rationale: La nota inglesa ofrece 'lattice'; en español bíblico y arquitectónico 'celosía' comunica mejor esa alternativa.
  revised_spanish_text: Por tanto, ellos serán como la nube de la mañana, y como el rocío que se va temprano, como tamo arrebatado de la era, y como humo de una ventana[a].
  revised_footnotes:
  - marker: a
    text: O 'de una celosía'. El término hebreo puede referirse a la abertura de una ventana o a una celosía.
    reason: lexical_alternative
