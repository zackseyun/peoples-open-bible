  to: 'Di a la casa de Israel: «Así dice el Señor Yahvé: He aquí, voy a profanar[a] mi santuario, el orgullo de su fuerza, el deleite[b] de sus ojos y el anhelo[c] de su alma; y sus hijos y sus hijas, a quienes dejaron atrás, caerán a espada».'
