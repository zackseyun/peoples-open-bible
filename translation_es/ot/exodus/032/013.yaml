translation:
  language: es
  text: 'Acuérdate de Abraham, Isaac e Israel[a], tus siervos, a quienes juraste por ti mismo y les dijiste: «Multiplicaré su descendencia como las estrellas de los cielos, y toda esta tierra que dije que daría a su descendencia, y la heredarán para siempre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Jacob», el patriarca que después recibió el nombre de Israel. El hebreo aquí dice «Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: זְכֹר
  english_pob_choice: Remember
  chosen_spanish: Acuérdate
  alternatives_spanish:
  - Recuerda
  - Haz memoria
  lexicon: HALOT
  rationale: El imperativo pide a Dios que tenga presente la promesa en el contexto de intercesión. «Acuérdate» es natural en español bíblico y conserva el tono de ruego covenantal sin añadir paráfrasis.
- source_word: לְאַבְרָהָם לְיִצְחָק וּלְיִשְׂרָאֵל
  english_pob_choice: Abraham, Isaac, and Israel
  chosen_spanish: Abraham, Isaac e Israel
  alternatives_spanish:
  - Abraham, Isaac y Jacob
  lexicon: HALOT
  rationale: Se conserva «Israel» porque el hebreo nombra así al patriarca y la POB inglesa decidió mantener ese nombre para reflejar la resonancia del nombre del pacto. En español, la conjunción «e» evita la secuencia áspera antes de «Israel».
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus esclavos
  lexicon: HALOT
  rationale: Aunque el valor léxico básico puede ser «esclavos», aquí el contexto es la relación de pacto y servicio a Dios; por eso «siervos» expresa mejor la función relacional y la tradición bíblica del pasaje.
- source_word: אֲשֶׁר נִשְׁבַּעְתָּ לָהֶם בָּךְ
  english_pob_choice: to whom you swore by yourself
  chosen_spanish: a quienes juraste por ti mismo
  alternatives_spanish:
  - a quienes juraste por tu propia persona
  - a quienes juraste por ti
  lexicon: HALOT
  rationale: La expresión hebrea enfatiza un juramento autoattestante de Dios. «Por ti mismo» comunica ese sentido reflexivo con claridad y naturalidad en español.
- source_word: וַתְּדַבֵּר אֲלֵהֶם
  english_pob_choice: and said to them
  chosen_spanish: y les dijiste
  alternatives_spanish:
  - y hablaste con ellos
  - y les hablaste
  lexicon: HALOT
  rationale: Se mantiene el valor de decir en la introducción al discurso directo. «Les dijiste» es más natural que un calco de «hablaste» y conserva la relación con la cita siguiente.
- source_word: אַרְבֶּה אֶת זַרְעֲכֶם
  english_pob_choice: I will multiply your offspring
  chosen_spanish: Multiplicaré tu descendencia
  alternatives_spanish:
  - Multiplicaré tu simiente
  - Aumentaré tu descendencia
  lexicon: HALOT
  rationale: El verbo causativo expresa aumento numérico; «multiplicaré» es preciso. «Descendencia» conserva el sentido colectivo de זרע y es idiomático en español bíblico.
- source_word: כְּכוֹכְבֵי הַשָּׁמָיִם
  english_pob_choice: like the stars of the heavens
  chosen_spanish: como las estrellas de los cielos
  alternatives_spanish:
  - como las estrellas del cielo
  - como las estrellas del firmamento
  lexicon: HALOT
  rationale: Se conserva el plural hebreo «cielos» para reflejar la forma del texto original y el registro elevado de la promesa.
- source_word: וְכָל הָאָרֶץ הַזֹּאת
  english_pob_choice: and all this land
  chosen_spanish: y toda esta tierra
  alternatives_spanish:
  - y toda esta región
  - y toda esta tierra prometida
  lexicon: HALOT
  rationale: El demostrativo apunta a la tierra mencionada en la promesa; «tierra» es más preciso que «país» o «región» en este contexto de promesa patriarcal.
- source_word: אֲשֶׁר אָמַרְתִּי
  english_pob_choice: that I said I would give
  chosen_spanish: que dije que daría
  alternatives_spanish:
  - que dije que iba a dar
  - de la cual dije que la daría
  lexicon: HALOT
  rationale: La revisión inglesa volvió más directo el hebreo. En español, «que dije que daría» refleja con fidelidad el contenido prometido sin forzar una construcción más explicativa.
- source_word: אֶתֵּן לְזַרְעֲכֶם
  english_pob_choice: I would give to your offspring
  chosen_spanish: daría a tu descendencia
  alternatives_spanish:
  - daré a tu descendencia
  - daría a tus descendientes
  lexicon: HALOT
  rationale: Dentro de la cita de promesa, el futuro o el condicional de futuro en español puede funcionar; aquí «daría» refleja bien el estilo de discurso reportado. «Descendencia» mantiene el valor colectivo de זרע.
- source_word: וְנָחֲלוּ
  english_pob_choice: and they shall inherit it
  chosen_spanish: y la heredarán
  alternatives_spanish:
  - y la poseerán como herencia
  - y la recibirán en herencia
  lexicon: HALOT
  rationale: El verbo נחל comunica recibir como herencia. «La heredarán» es la equivalencia española más natural y conserva el objeto implícito, que es la tierra.
- source_word: לְעֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: En promesa de pacto, «para siempre» transmite la duración indefinida del hebreo de modo claro y sobrio.
theological_decisions:
- issue: 'Identidad del patriarca final: Israel frente a Jacob'
  english_pob_reading: Retain 'Israel' in the main text
  chosen_spanish_reading: Mantener «Israel» en el texto principal
  alternative_spanish_readings:
  - Jacob
  rationale: El hebreo nombra explícitamente a Israel; conservarlo respeta la forma del texto y la resonancia del nombre de pacto. Traducirlo como «Jacob» introduciría una interpretación no presente aquí.
  doctrine_reference: 'Principio POB: prioridad del original y preservación del nombre de pacto cuando el hebreo lo usa.'
- issue: Juramento divino con בָּךְ
  english_pob_reading: by yourself
  chosen_spanish_reading: por ti mismo
  alternative_spanish_readings:
  - por tu propia persona
  - por ti
  rationale: La fórmula subraya que Dios se compromete con su propio ser como garantía. «Por ti mismo» preserva esa fuerza sin añadir explicación doctrinal.
  doctrine_reference: 'Principio POB: conservar la tensión teológica del original y no suavizarla con una paráfrasis interpretativa.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés que sustituyó una formulación más explicativa por «that I said I would give». Por eso el español usa «que dije que daría», manteniendo la relación directa entre la promesa y el don de la tierra, sin convertirla en una glosa.
  spanish_consistency_notes:
  - 'Se mantiene coherencia terminológica con el proyecto: Yahvé no aparece en este versículo, así que no se requiere decisión sobre el tetragrámaton.'
  - «Descendencia» se usa de forma consistente para זרע, evitando alternar con «simiente» por registro o ambigüedad.
  - 'Se conserva el paralelismo del original: memoria del pacto, juramento, promesa de multiplicación y promesa de herencia perpetua.'
