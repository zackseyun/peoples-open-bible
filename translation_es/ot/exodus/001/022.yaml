translation:
  language: es
  text: 'Entonces el faraón mandó a todo su pueblo, diciendo: «Todo niño varón[a] que nazca, arrójenlo al Nilo[b]; pero a toda hija déjenla vivir[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Todo hijo'. El hebreo 'hijo' puede funcionar de manera genérica para un niño varón en este contexto.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''el río''. En Éxodo, este término suele referirse específicamente al Nilo.'
    reason: lexical_alternative
  - marker: c
    text: Literalmente 'y toda hija'; se traduce 'pero' para mostrar el contraste en el decreto del faraón.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dio la orden
  lexicon: HALOT
  rationale: צוה expresa emitir una orden. En español, 'mandó' comunica bien el acto de autoridad real sin sonar demasiado técnico; 'ordenó' también es posible, pero 'mandó' fluye naturalmente en un decreto narrativo.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: el faraón
  alternatives_spanish:
  - Faraón
  lexicon: HALOT
  rationale: Se conserva el título propio tradicional, en minúscula por la sintaxis española en medio de la oración. El artículo ayuda a la lectura natural en español.
- source_word: לְכָל עַמּוֹ
  english_pob_choice: all his people
  chosen_spanish: a todo su pueblo
  alternatives_spanish:
  - a toda su gente
  - a todos sus súbditos
  lexicon: HALOT
  rationale: עַם significa 'pueblo' o 'gente'. 'Pueblo' es la equivalencia más directa y mantiene el alcance colectivo bajo la autoridad del faraón; 'súbditos' introduce una interpretación política más específica.
- source_word: כָּל הַבֵּן
  english_pob_choice: Every son
  chosen_spanish: Todo hijo
  alternatives_spanish:
  - Todo varón
  - Todo niño varón
  lexicon: HALOT
  rationale: בֵּן puede funcionar de modo genérico para un hijo varón. 'Hijo' conserva la forma léxica del hebreo, aunque en este contexto incluye a los varones recién nacidos; se mantiene la posible tensión entre forma literal y sentido contextual.
- source_word: הַיִּלּוֹד
  english_pob_choice: who is born
  chosen_spanish: que nazca
  alternatives_spanish:
  - nacido
  - que esté naciendo
  lexicon: HALOT
  rationale: El participio pasivo de ילד describe al niño como el que nace. 'Que nazca' suena natural en español y conserva el valor referencial a cada nacimiento individual.
- source_word: הַיְאֹרָה
  english_pob_choice: into the Nile
  chosen_spanish: al Nilo
  alternatives_spanish:
  - al río
  - en el Nilo
  lexicon: HALOT
  rationale: En Éxodo, יְאֹר se refiere específicamente al Nilo. 'Al Nilo' expresa el destino del lanzamiento con naturalidad; la nota preserva la posibilidad literal de 'el río' sin perder la identificación histórica.
- source_word: תַּשְׁלִיכֻהוּ
  english_pob_choice: you must throw
  chosen_spanish: arrójenlo
  alternatives_spanish:
  - échennlo
  - tírenlo
  lexicon: HALOT
  rationale: El imperativo de Hifil transmite una acción violenta y deliberada. 'Arrójenlo' conserva la fuerza y el carácter brutal del mandato; el pronombre objeto se integra de forma natural en español.
- source_word: וְכָל הַבַּת
  english_pob_choice: but every daughter
  chosen_spanish: y toda hija
  alternatives_spanish:
  - pero toda hija
  - y toda niña
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'y toda hija'. Se mantiene 'y' en el texto principal porque refleja la forma del original; la nota puede señalar que el valor contrastivo queda implícito en el contexto del decreto.
- source_word: תְּחַיּוּן
  english_pob_choice: you must let live
  chosen_spanish: déjenla vivir
  alternatives_spanish:
  - manténganla con vida
  - háganla vivir
  lexicon: HALOT
  rationale: El piel de חיה aquí significa conservar con vida. 'Déjenla vivir' es una forma idiomática y clara en español, y reproduce el contraste con arrojar a los varones al Nilo.
theological_decisions:
- issue: Conservación de la tensión entre literalidad y sentido en בֵּן
  english_pob_reading: Every son; note that Hebrew 'son' can function generically for a male child in this context.
  chosen_spanish_reading: Todo hijo; puede entenderse como todo niño varón.
  alternative_spanish_readings:
  - Todo varón
  - Todo niño varón
  rationale: El hebreo usa 'hijo' con posible valor genérico masculino. Mantener 'hijo' preserva la forma del texto y evita borrar la tensión léxica; la nota permite al lector entender el sentido contextual sin reemplazarlo por una paráfrasis total.
  doctrine_reference: none
- issue: Contraste ético en la orden de Faraón
  english_pob_reading: but every daughter you must let live
  chosen_spanish_reading: y toda hija, déjenla vivir
  alternative_spanish_readings:
  - pero toda hija, déjenla vivir
  rationale: Aunque el inglés explicita el contraste con 'but', el hebreo conserva una conjunción simple. En español puede mantenerse 'y' para respetar la forma del original; el contraste surge por oposición semántica dentro del mandato, sin necesidad de introducir una conjunción adversativa no presente en el hebreo.
  doctrine_reference: none
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y la auditoría inglesa: conserva el valor léxico de בֵּן como ''hijo'', mantiene la identificación contextual de יְאֹר como Nilo y reproduce la asimetría del decreto de Faraón sin añadir material interpretativo innecesario. No se reportan revisiones aplicadas en el expediente inglés, y el acuerdo de revisión es alto.'
  spanish_consistency_notes:
  - Se usa 'faraón' en minúscula cuando no inicia oración, según uso normal del español.
  - Se prefiere 'Nilo' para יְאֹר en este contexto, pero se documenta la opción literal 'río'.
  - Se mantiene 'hijo' en el texto principal para no borrar la tensión léxica de בֵּן; la nota aclara el sentido masculino genérico.
  - Se usa 'déjenla vivir' para תְּחַיּוּן porque expresa con naturalidad el valor causativo de 'hacer/conservar viva'.
