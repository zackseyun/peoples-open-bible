translation:
  language: es
  text: Y dijo:[a] «¡Ay de mí! ¿Por qué nací para ver la ruina[b] de mi pueblo y la ruina de la ciudad santa, y para sentarme allí mientras era entregada en manos de enemigos[c], y el santuario en manos de extranjeros?»
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¡Ay!». La interjección griega expresa lamento; «¡Ay de mí!» mantiene mejor el tono doliente en español.
    reason: lexical_alternative
  - marker: b
    text: O «los estragos» o «la destrucción de mi pueblo»; el griego usa una forma plural que puede destacar la magnitud de la devastación.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «en la mano de enemigos ... en la mano de extranjeros», un giro bíblico para ser entregado al poder de ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἴμοι
  english_pob_choice: Alas!
  chosen_spanish: ¡Ay de mí!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay, triste de mí!
  - ¡Ay de mí, qué dolor!
  lexicon: LSJ
  rationale: Es una interjección de lamento. «¡Ay de mí!» mantiene el tono de queja doliente con naturalidad en español y sin sonar excesivamente arcaica.
- source_word: ἵνα τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Con qué propósito
  - ¿Para qué
  lexicon: LSJ
  rationale: En este contexto funciona como pregunta de causa o motivo en un lamento; «¿Por qué» es la equivalencia más natural y transparente.
- source_word: ἐγενήθην
  english_pob_choice: was I born
  chosen_spanish: fui hecho
  alternatives_spanish:
  - nací
  - llegué a ser
  - vine a existir
  lexicon: LSJ
  rationale: El aoristo de γίνομαι expresa llegada a existir, pero el griego aquí no obliga a una formulación literal de nacimiento. «Fui hecho» conserva la pasividad y el peso existencial del lamento, aunque deja abierta la fuerza idiomática del original.
- source_word: ἰδεῖν
  english_pob_choice: to see
  chosen_spanish: ver
  alternatives_spanish:
  - contemplar
  - presenciar
  lexicon: LSJ
  rationale: Infinitivo de finalidad/complemento. «Ver» es directo y fiel, y mantiene la simplicidad del griego.
- source_word: τὰ συντρίμματα
  english_pob_choice: the ruin
  chosen_spanish: la ruina
  alternatives_spanish:
  - los escombros
  - la destrucción
  - el desastre
  lexicon: LSJ
  rationale: Aunque el plural griego puede ser colectivo, la idea es de devastación. «La ruina» reproduce bien el sentido global y permite conservar el paralelismo con la ciudad.
- source_word: τοῦ λαοῦ μου
  english_pob_choice: of my people
  chosen_spanish: de mi pueblo
  alternatives_spanish:
  - de mi gente
  - de mi nación
  lexicon: LSJ
  rationale: «Pueblo» conserva el valor comunitario y de pertenencia del término griego sin desplazarlo a una categoría más moderna o sociológica.
- source_word: τὸ σύντριμμα
  english_pob_choice: the ruin
  chosen_spanish: la ruina
  alternatives_spanish:
  - la destrucción
  - el quebranto
  lexicon: LSJ
  rationale: Mantiene la repetición con el término anterior, como en el inglés POB, para preservar el paralelismo enfático del pasaje.
- source_word: τῆς πόλεως τῆς ἁγίας
  english_pob_choice: of the holy city
  chosen_spanish: de la ciudad santa
  alternatives_spanish:
  - de la ciudad sagrada
  - de la santa ciudad
  lexicon: LSJ
  rationale: «Ciudad santa» es la forma natural en español y reproduce la designación reverente sin añadir interpretación.
- source_word: καθίσαι ἐκεῖ
  english_pob_choice: to sit there
  chosen_spanish: para sentarme allí
  alternatives_spanish:
  - para quedarme allí
  - para estar allí sentado
  lexicon: LSJ
  rationale: El infinitivo expresa la postura/estado de permanecer allí en impotencia. «Para sentarme allí» conserva la concreción de la imagen y la continuidad sintáctica.
- source_word: ἐν τῷ δοθῆναι αὐτὴν
  english_pob_choice: while it was given
  chosen_spanish: mientras era entregada
  alternatives_spanish:
  - cuando fue entregada
  - al ser entregada
  lexicon: LSJ
  rationale: La construcción articular infinitiva con ἐν indica circunstancia contemporánea. «Mientras era entregada» reproduce bien el valor pasivo y el sentido de desamparo.
- source_word: ἐν χειρὶ ἐχθρῶν
  english_pob_choice: into the hand of enemies
  chosen_spanish: en mano de enemigos
  alternatives_spanish:
  - en manos de enemigos
  - en poder de enemigos
  lexicon: LSJ
  rationale: Se conserva la metáfora bíblica de «mano» como poder o dominio. «En mano de» mantiene más de cerca la forma del griego y el patrón idiomático visible en la POB inglesa.
- source_word: τὸ ἁγίασμα
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el lugar santo
  - el recinto sagrado
  lexicon: LSJ
  rationale: «Santuario» es una equivalencia transparente y digna para el espacio sagrado referido por el griego, sin especificar más de lo que el texto dice.
- source_word: ἐν χειρὶ ἀλλοτρίων
  english_pob_choice: into the hand of foreigners
  chosen_spanish: en mano de extranjeros
  alternatives_spanish:
  - en manos de extranjeros
  - en poder de extranjeros
  lexicon: LSJ
  rationale: Se mantiene la misma metáfora de entrega/poder y se preserva el contraste con los enemigos. «Extranjeros» refleja el sentido de ἀλλότριοι como quienes están fuera del pueblo del pacto.
theological_decisions:
- issue: Conservar el lamento personal sin suavizar su intensidad
  english_pob_reading: '"Alas! Why was I born..." as a direct lament'
  chosen_spanish_reading: '"¡Ay de mí! ¿Por qué fui hecho..."'
  alternative_spanish_readings:
  - '"¡Ay de mí! ¿Por qué nací..."'
  - '"¡Ay! ¿Por qué existí..."'
  rationale: El texto es una queja doliente y no una simple observación. La opción elegida preserva la carga emocional y la pasividad sufrida del hablante.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Mantener la carga covenantal de "my people" y "the holy city" sin explicitar más
  english_pob_reading: '''my people'' and ''the holy city'' retained without interpretive expansion'
  chosen_spanish_reading: '"mi pueblo" y "la ciudad santa"'
  alternative_spanish_readings:
  - '"mi nación"'
  - '"Jerusalén"'
  rationale: El griego usa términos directos con peso teológico e identitario. La traducción no añade glosas que el texto no ofrece.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Preservar la metáfora bíblica de entrega "en la mano"
  english_pob_reading: Literally 'into the hand of enemies ... into the hand of foreigners,' a biblical idiom for being handed over to their power.
  chosen_spanish_reading: '"en mano de enemigos" ... "en mano de extranjeros"'
  alternative_spanish_readings:
  - '"en manos de enemigos" ... "en manos de extranjeros"'
  - '"bajo el poder de enemigos" ... "bajo el poder de extranjeros"'
  rationale: La imagen de la mano como poder/dominio es importante en el lenguaje bíblico y en este lamento. Se conserva en español para no diluir la expresión idiomática.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El audit trail inglés no requirió revisiones sustantivas: la solución publicada conserva el lamento exclamativo, el paralelismo de «ruina/ruina», y la metáfora idiomática de la «mano» como poder. Se ajustó la sintaxis española para sonar natural sin perder cercanía al griego.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; aquí no ocurre.
  - Se mantiene el paralelismo léxico entre «la ruina» y «la ruina» para reflejar τὰ συντρίμματα / τὸ σύντριμμα.
  - «Santuario» se reserva para τὸ ἁγίασμα y no se amplía a «templo» porque el griego no lo especifica.
  - «Extranjeros» traduce ἀλλοτρίων con el matiz de quienes están fuera del pueblo, no simplemente forasteros casuales.
