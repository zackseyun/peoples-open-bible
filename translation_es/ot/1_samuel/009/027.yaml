translation:
  language: es
  text: 'Mientras ellos bajaban[a] hacia el borde de la ciudad, Samuel dijo a Saúl: «Di al joven que vaya delante de nosotros». Y él fue delante. «Pero tú, quédate aquí por ahora[b], y te haré oír la palabra de Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mientras ellos descendían hacia el borde de la ciudad». El hebreo יֹרְדִים puede traducirse de manera más literal como «descendían»; la versión principal opta por un español más natural.'
    reason: lexical_alternative
  - marker: b
    text: Hebreo «quédate/detente como en este día/tiempo»; la expresión כַּיּוֹם es idiomática y aquí significa detenerse y permanecer por el momento.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֽוֹרְדִים
  english_pob_choice: were going down
  chosen_spanish: bajaban
  alternatives_spanish:
  - estaban bajando
  - descendían
  lexicon: HALOT
  rationale: El participio narrativo expresa acción en curso. «Bajaban» comunica el movimiento sin sonar forzado en español; «descendían» es posible, pero menos natural aquí.
- source_word: בִּקְצֵה הָעִיר
  english_pob_choice: to the edge of the city
  chosen_spanish: hacia la orilla de la ciudad
  alternatives_spanish:
  - hasta el borde de la ciudad
  - hacia las afueras de la ciudad
  lexicon: HALOT
  rationale: קצה apunta a un extremo o borde. «Orilla» funciona en español como borde/límite y mantiene una imagen concreta; «afueras» sería más interpretativo.
- source_word: נַעַר
  english_pob_choice: the young man
  chosen_spanish: el joven
  alternatives_spanish:
  - el muchacho
  - el sirviente
  - el criado
  lexicon: HALOT
  rationale: El hebreo puede referirse a un joven, asistente o siervo. Aquí el POB inglés conservó la amplitud lexical con «young man»; en español «el joven» reproduce esa amplitud mejor que «sirviente», que estrecha demasiado el sentido.
- source_word: וְיַעֲבֹר לְפָנֵינוּ
  english_pob_choice: to go on ahead of us
  chosen_spanish: que siga adelante de nosotros
  alternatives_spanish:
  - que pase delante de nosotros
  - que vaya delante de nosotros
  lexicon: HALOT
  rationale: עבר con לִפְנֵי indica ir delante. «Siga adelante de nosotros» suena natural y conserva la dirección; «pase delante» también es válido, pero menos idiomático en esta orden.
- source_word: וַיַּעֲבֹר
  english_pob_choice: he went on ahead
  chosen_spanish: Siguió adelante
  alternatives_spanish:
  - pasó delante
  - fue delante
  lexicon: HALOT
  rationale: La forma wayyiqtol narra la obediencia inmediata del acompañante. «Siguió adelante» enlaza bien con la orden previa y mantiene el flujo narrativo.
- source_word: עֲמֹד כַּיּוֹם
  english_pob_choice: stand here now
  chosen_spanish: quédate de pie ahora
  alternatives_spanish:
  - quédate ahora
  - permanece aquí ahora
  - detente ahora
  lexicon: HALOT
  rationale: La expresión es idiomática y pide una traducción natural. «Quédate de pie ahora» conserva el imperativo de estar inmóvil; el matiz de «aquí» queda implícito por el contexto y no se sobrecarga el español.
- source_word: וְאַשְׁמִיעֲךָ
  english_pob_choice: I will let you hear
  chosen_spanish: yo te haré oír
  alternatives_spanish:
  - te haré escuchar
  - te haré saber
  lexicon: HALOT
  rationale: El hiphil de שמע tiene fuerza causativa. «Te haré oír» mantiene esa causatividad en un español bíblico claro y no suaviza el verbo a mera notificación.
- source_word: דְּבַר אֱלֹהִים
  english_pob_choice: the word of God
  chosen_spanish: la palabra de Dios
  alternatives_spanish:
  - el mensaje de Dios
  - la palabra divina
  lexicon: HALOT
  rationale: דבר aquí introduce discurso revelado. «La palabra de Dios» preserva el peso profético y la formulación más transparente para lectores en español.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים se refiere al Dios de Israel en sentido singular; «Dios» es la equivalencia estándar y precisa.
theological_decisions:
- issue: Fórmula revelatoria דְּבַר אֱלֹהִים
  english_pob_reading: the word of God
  chosen_spanish_reading: la palabra de Dios
  alternative_spanish_readings:
  - el mensaje de Dios
  rationale: La frase señala que Samuel va a comunicar revelación divina. «La palabra de Dios» conserva el peso teológico y profético sin explicar más de lo que el hebreo dice.
  doctrine_reference: 'Principio de traducción: preservar el valor revelatorio sin paráfrasis excesiva.'
translation_notes:
  revision_awareness: La revisión inglesa reciente quedó sin cambios; el inglés POB mantiene las mismas decisiones léxicas y de nota, por lo que el español se alinea con ese estado estable del texto auditado.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים en sentido singular, conforme al uso POB y al contexto.
  - Se evita «Señor» como sustituto del nombre divino porque en este versículo no aparece יהוה.
  - «Joven» se usa para נַעַר por su amplitud semántica; no se estrecha a «siervo» sin apoyo contextual explícito.
  - «Palabra de Dios» conserva el peso profético del hebreo דְּבַר אֱלֹהִים.
  - La puntuación dialogal sigue el español estándar con comillas angulares y segmentación clara de la cita directa.
