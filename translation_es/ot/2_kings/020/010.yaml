translation:
  language: es
  text: 'Y Ezequías dijo[a]: «Es cosa fácil que la sombra se alargue diez escalones. No, sino que la sombra vuelva atrás diez escalones».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘diez grados’. La palabra hebrea significa ‘escalones’ o ‘subidas’ y puede referirse a los escalones o gradaciones del dispositivo de sombra de Acaz.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר יְחִזְקִיָּהוּ
  english_pob_choice: And Hezekiah said
  chosen_spanish: Y Ezequías dijo
  alternatives_spanish:
  - Entonces Ezequías dijo
  - Y dijo Ezequías
  lexicon: WLC / uso narrativo
  rationale: Se conserva la fórmula narrativa simple del hebreo con verbo introductorio de habla. ‘Ezequías’ es la forma habitual en español para el nombre propio. Se evita añadir contenido no presente en el hebreo.
- source_word: נָקֵל
  english_pob_choice: it is an easy thing
  chosen_spanish: Es cosa fácil
  alternatives_spanish:
  - Es fácil
  - Es cosa ligera
  lexicon: HALOT
  rationale: El término expresa facilidad o ligereza. ‘Es cosa fácil’ conserva el valor evaluativo impersonal del hebreo y suena natural en español sin diluir la fuerza de la afirmación.
- source_word: לַצֵּל
  english_pob_choice: the shadow
  chosen_spanish: la sombra
  alternatives_spanish:
  - la sombra del reloj
  - la sombra
  lexicon: HALOT
  rationale: צֵל se traduce de manera directa por ‘sombra’. Se mantiene así la imagen concreta del texto sin introducir una identificación interpretativa en el cuerpo principal.
- source_word: לִנְטוֹת
  english_pob_choice: to lengthen
  chosen_spanish: se alargue
  alternatives_spanish:
  - se extienda
  - se incline
  lexicon: HALOT
  rationale: El verbo puede significar extenderse o inclinarse. En este contexto, siguiendo la decisión inglesa de ‘lengthen’, ‘se alargue’ expresa bien el movimiento de la sombra hacia adelante y mantiene la imagen física.
- source_word: עֶשֶׂר מַעֲלוֹת
  english_pob_choice: ten steps
  chosen_spanish: diez escalones
  alternatives_spanish:
  - diez pasos
  - diez grados
  lexicon: HALOT
  rationale: מַעֲלוֹת literalmente son ‘escalones/subidas’. ‘Escalones’ conserva mejor el sentido básico que ‘grados’. Se deja abierta la posible relación con un dispositivo de sombra en la nota, sin fijarla en el texto principal.
- source_word: לֹא כִי
  english_pob_choice: No, but
  chosen_spanish: No, sino que
  alternatives_spanish:
  - No; más bien
  - No, pero
  lexicon: HALOT
  rationale: La combinación introduce rechazo y corrección preferente. ‘No, sino que’ reproduce con naturalidad el giro contrastivo del hebreo en español bíblico claro y actual.
- source_word: יָשׁוּב
  english_pob_choice: let ... go back
  chosen_spanish: vuelva atrás
  alternatives_spanish:
  - retroceda
  - regrese
  lexicon: HALOT
  rationale: El verbo expresa volver/retroceder. ‘Vuelva atrás’ transmite el movimiento solicitado para la sombra con una forma española idiomática y fiel al sentido.
- source_word: אֲחֹרַנִּית
  english_pob_choice: back
  chosen_spanish: atrás
  alternatives_spanish:
  - hacia atrás
  - retrocediendo
  lexicon: HALOT
  rationale: El adverbio indica dirección hacia atrás. ‘Atrás’ es breve y natural, y encaja bien con la secuencia ‘vuelva atrás’.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que prefirió ‘lengthen’ sobre ‘stretch forward’ para לִנְטוֹת. En español, ‘se alargue’ conserva esa elección revisada y mantiene clara la oposición con ‘vuelva atrás’.
  spanish_consistency_notes:
  - Se usa ‘Ezequías’ de forma uniforme para el nombre propio.
  - Se evita ‘SEÑOR’ porque este versículo no contiene el nombre divino.
  - ‘Escalones’ se reserva para מַעֲלוֹת sin imponer ‘grados’ en el texto principal.
  - La nota al pie usa una alternativa léxica legítima sin alterar la lectura base.
