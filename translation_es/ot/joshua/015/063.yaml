translation:
  language: es
  text: Pero los hijos de Judá no pudieron desalojar a los jebuseos, habitantes de Jerusalén; y los jebuseos[a] han vivido con los hijos de Judá en Jerusalén hasta hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, 'el jebuseo ha vivido [con/entre] los hijos de Judá'. El término étnico singular tiene sentido colectivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Y además
  - Y en cuanto a
  lexicon: HALOT
  rationale: La partícula introduce un giro contrastivo respecto del reparto anterior. En español, 'Pero' comunica mejor ese contraste que una 'Y' más plana.
- source_word: הַיְבוּסִי
  english_pob_choice: the Jebusites
  chosen_spanish: los jebuseos
  alternatives_spanish:
  - el jebuseo
  - los jebusitas
  lexicon: HALOT
  rationale: Aunque el hebreo es singular con sentido colectivo, en español el nombre étnico colectivo natural es plural. 'Jebuseos' sigue la decisión del inglés POB de no forzar el singular inglés frente al valor colectivo.
- source_word: יוֹשְׁבֵי יְרוּשָׁלִַם
  english_pob_choice: the inhabitants of Jerusalem
  chosen_spanish: habitantes de Jerusalén
  alternatives_spanish:
  - los que habitaban Jerusalén
  - los moradores de Jerusalén
  lexicon: HALOT
  rationale: El participio funciona como aposición explicativa; 'habitantes de Jerusalén' es idiomático y conserva la relación apposicional sin sobrecargar el texto.
- source_word: לֹא יוכלו
  english_pob_choice: could not
  chosen_spanish: no pudieron
  alternatives_spanish:
  - no fueron capaces de
  - no lograron
  lexicon: HALOT
  rationale: La expresión de incapacidad pasada se vierte de forma directa y natural con 'no pudieron'.
- source_word: בְנֵי יְהוּדָה
  english_pob_choice: the sons of Judah
  chosen_spanish: los hijos de Judá
  alternatives_spanish:
  - el pueblo de Judá
  - los descendientes de Judá
  - la tribu de Judá
  lexicon: HALOT
  rationale: Se conserva el giro genealógico/tribal del hebreo, como hizo el POB inglés con 'sons'. 'Hijos de Judá' preserva la forma y evita neutralizar sin necesidad el matiz del texto.
- source_word: לְהוֹרִישָׁם
  english_pob_choice: dispossess
  chosen_spanish: desalojar
  alternatives_spanish:
  - desposeer
  - expulsar
  - quitarles la posesión
  lexicon: HALOT
  rationale: En contextos de conquista, ירשׁ en hifil implica hacer perder posesión. 'Desalojar' expresa bien el resultado en español, con menos dureza técnica que 'desposeer' y sin perder el sentido de expulsión/ocupación.
- source_word: וַיֵּשֶׁב
  english_pob_choice: have lived
  chosen_spanish: han vivido
  alternatives_spanish:
  - han habitado
  - han morado
  - han estado viviendo
  lexicon: HALOT
  rationale: Con 'hasta hoy', la acción pasada continúa hasta el presente narrativo. El perfecto compuesto español ('han vivido') reproduce mejor ese valor durativo que un pretérito simple.
- source_word: אֶת בְּנֵי יְהוּדָה
  english_pob_choice: with the sons of Judah
  chosen_spanish: con los hijos de Judá
  alternatives_spanish:
  - entre los hijos de Judá
  - junto a los hijos de Judá
  lexicon: HALOT
  rationale: La construcción hebrea es inusual si se lee de modo literal. En contexto, la relación es de coexistencia; 'con' expresa esa convivencia sin introducir una interpretación más fuerte de la necesaria.
- source_word: בִּירוּשָׁלִַם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - dentro de Jerusalén
  lexicon: HALOT
  rationale: Traducción locativa directa y sobria.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta hoy
  alternatives_spanish:
  - hasta el día de hoy
  - hasta este día
  lexicon: HALOT
  rationale: Equivale al modismo temporal hebreo que indica continuidad hasta el momento del narrador.
theological_decisions:
- issue: Tratamiento del etnónimo singular colectivo הַיְבוּסִי
  english_pob_reading: the Jebusites
  chosen_spanish_reading: los jebuseos
  alternative_spanish_readings:
  - el jebuseo
  - los jebusitas
  rationale: 'No hay una cuestión doctrinal, pero sí una decisión de forma: el hebreo usa un singular colectivo. En español, el plural étnico es la forma más natural y evita una lectura artificialmente singular.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sentido de la cláusula final con וַיֵּשֶׁב ... אֶת בְּנֵי יְהוּדָה
  english_pob_reading: the Jebusites have lived with the sons of Judah
  chosen_spanish_reading: los jebuseos han vivido con los hijos de Judá
  alternative_spanish_readings:
  - los jebuseos vivieron entre los hijos de Judá
  - los jebuseos moraron junto a los hijos de Judá
  rationale: La sintaxis hebrea es algo marcada, pero el contexto apunta a convivencia/prolongada permanencia, no a que 'habitaban' a Judá como objeto. 'Con' conserva la tensión sin simplificar en exceso.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Renderización de בְנֵי יְהוּדָה
  english_pob_reading: the sons of Judah
  chosen_spanish_reading: los hijos de Judá
  alternative_spanish_readings:
  - el pueblo de Judá
  - la tribu de Judá
  rationale: Se mantiene el lenguaje filial-tribal del original. No hay carga doctrinal especial; la decisión sigue el principio de correspondencia formal controlada.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El pasaje fue revisado en la fuente inglesa y quedó sin cambios en la última pasada; el español sigue esa lectura estable sin introducir nuevas variantes textuales.
  spanish_consistency_notes:
  - Se conserva 'hijos de Judá' para mantener la correspondencia con el hebreo y con el POB inglés.
  - '''Jebuseos'' se usa como etnónimo colectivo plural, equivalente al plural colectivo inglés.'
  - '''Hasta hoy'' reproduce el valor aspectual-temporal del hebreo y su equivalente en la versión inglesa.'
  - 'La nota al pie marca la única tensión léxica relevante: לְהוֹרִישָׁם, traducido de manera funcional como ''desalojar''.'
