translation:
  language: es
  text: 'Pero él volvió de las imágenes talladas[a] que estaban cerca de Gilgal[b] y dijo: «Tengo para ti un mensaje secreto[c], oh rey». Y él dijo: «Silencio». Entonces salieron de su presencia todos los que estaban junto a él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los ídolos». El término hebreo suele referirse a imágenes de culto.
    reason: lexical_alternative
  - marker: b
    text: O «que estaban en Gilgal». La frase locativa hebrea es comprimida y puede indicar posición o cercanía respecto de Gilgal.
    reason: lexical_alternative
  - marker: c
    text: O «una palabra secreta» o «un asunto privado». דבר puede abarcar varias nociones; «mensaje» es una elección contextual.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁב
  english_pob_choice: turned back
  chosen_spanish: se volvió
  alternatives_spanish:
  - volvió atrás
  - regresó
  lexicon: HALOT
  rationale: El hebreo expresa la idea de regresar o volver atrás en la acción narrativa. «Se volvió» conserva el movimiento de retroceso de modo natural en español sin perder la fuerza direccional del verbo.
- source_word: הַפְּסִילִים
  english_pob_choice: the carved images
  chosen_spanish: los ídolos
  alternatives_spanish:
  - las imágenes talladas
  - las imágenes esculpidas
  lexicon: HALOT
  rationale: Aunque el valor concreto puede ser «imágenes talladas», en este contexto cultual el término señala objetos idolátricos. En español, «ídolos» comunica la carga religiosa que el contexto requiere; se mantiene la nota sobre el sentido literal en la documentación de apoyo.
- source_word: אֲשֶׁר אֶת־הַגִּלְגָּל
  english_pob_choice: that were near Gilgal
  chosen_spanish: que estaban cerca de Gilgal
  alternatives_spanish:
  - que estaban en Gilgal
  - que estaban junto a Gilgal
  lexicon: HALOT
  rationale: La construcción hebrea es comprimida y permite una relación locativa aproximada. «Cerca de Gilgal» conserva la ambigüedad espacial reconocida por la POB en inglés y evita decidir de más.
- source_word: דְּבַר סֵתֶר
  english_pob_choice: a secret message
  chosen_spanish: un mensaje secreto
  alternatives_spanish:
  - una palabra secreta
  - un asunto secreto
  lexicon: HALOT
  rationale: דָּבָר puede significar palabra, asunto o mensaje; en el marco de corte, «mensaje» resulta claro y fiel. «Secreto» refleja סֵתֶר y mantiene la posible tensión entre palabra, asunto e വിവരം sin fijarla en exceso.
- source_word: לִי אֵלֶיךָ
  english_pob_choice: for you
  chosen_spanish: para ti
  alternatives_spanish:
  - para usted
  - a ti
  lexicon: HALOT
  rationale: La construcción hebrea es idiomática y no se vierte de forma mecánica. En español, «tengo para ti» reproduce bien la naturalidad del enunciado y conserva la intención comunicativa directa.
- source_word: הַמֶּלֶךְ
  english_pob_choice: O king
  chosen_spanish: oh rey
  alternatives_spanish:
  - rey
  - mi rey
  lexicon: HALOT
  rationale: En el vocativo directo, «oh rey» conserva la solemnidad y el tono de corte del original, de manera equivalente al inglés «O king».
- source_word: הָס
  english_pob_choice: Silence
  chosen_spanish: Silencio
  alternatives_spanish:
  - ¡Silencio!
  - Calla
  lexicon: HALOT
  rationale: El imperativo es abrupto y breve. «Silencio» reproduce esa brusquedad en español y puede funcionar como orden dirigida a los presentes para retirarse y callar.
- source_word: כָּל הָעֹמְדִים עָלָיו
  english_pob_choice: all who were standing by him
  chosen_spanish: todos los que estaban a su alrededor
  alternatives_spanish:
  - todos los que le asistían
  - todos los que estaban junto a él
  lexicon: HALOT
  rationale: La frase describe a los asistentes de la corte. «A su alrededor» expresa bien la disposición espacial y social sin forzar un tecnicismo; se complementa con la siguiente frase para mostrar la retirada de su presencia.
- source_word: מֵעָלָיו
  english_pob_choice: from his presence
  chosen_spanish: de su lado
  alternatives_spanish:
  - de su presencia
  - de junto a él
  lexicon: HALOT
  rationale: El hebreo literalmente indica apartarse de encima/de junto a él, es decir, retirarse de la cercanía del rey. «De su lado» suena natural en español y mantiene la idea de abandono de la atención inmediata; la alternativa «de su presencia» sigue siendo válida y está preservada en la documentación.
translation_notes:
  revision_awareness: 'Se ha respetado el estado de alta concordancia del control más reciente: no se registran revisiones aplicadas al texto base. La redacción española sigue el mismo sentido auditado por la POB inglesa y conserva las ambigüedades léxicas relevantes donde el hebreo lo permite.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se mantiene un registro bíblico claro y moderno, evitando calcos innecesarios como «imagen esculpida» cuando el contexto exige la fuerza cultual de «ídolos».
  - «Oh rey» se emplea como vocativo respetuoso y natural en español bíblico contemporáneo.
  - Las notas a pie preservan las alternativas auditablemente significativas del inglés POB y del hebreo, sin introducir lecturas no sustentadas.
