  yaml_path: translation/ot/ezekiel/048/017.yaml
  text: And the city's open land shall be two hundred fifty cubits to the north[a], two hundred fifty to the south, two hundred fifty to the east[b], and two hundred fifty to the west.
  footnotes:
  - marker: a
    text: Hebrew simply gives the measurements as 'fifty and two hundred' in each direction; this is rendered in standard English order as 'two hundred fifty.'
    reason: lexical_alternative
  - marker: b
