translation:
  language: es
  text: Y Aarón, el sacerdote, subió al monte Hor[a] por orden de Yahvé, y murió allí, en el año cuarenta después de que los israelitas salieron de la tierra de Egipto, en el quinto mes, el primer día del mes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «según la palabra de Yahvé»; literalmente, «sobre la boca de Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - subió hacia
  lexicon: HALOT
  rationale: עלה expresa movimiento ascendente. En español, "subió" es natural y conserva el sentido direccional sin volver la frase rígida.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiantel
  - el presbítero
  lexicon: HALOT
  rationale: כהן se refiere al oficio sacerdotal de Aarón. "Sacerdote" es el equivalente normal y fiel en español contemporáneo.
- source_word: אֶל הֹר הָהָר
  english_pob_choice: Mount Hor
  chosen_spanish: el monte Hor
  alternatives_spanish:
  - al monte Hor
  - a Hor, el monte
  lexicon: HALOT
  rationale: El hebreo nombra un lugar propio. En español bíblico natural, "el monte Hor" preserva el topónimo establecido y la referencia geográfica.
- source_word: עַל פִּי יְהוָה
  english_pob_choice: at the command of Yahweh
  chosen_spanish: por orden de Yahvé
  alternatives_spanish:
  - según la palabra de Yahvé
  - por mandato de Yahvé
  lexicon: HALOT
  rationale: La expresión literal "sobre la boca de" funciona idiomáticamente como mandato u orden. "Por orden de Yahvé" comunica la autorización divina con claridad. Se conserva "Yahvé" según la norma del proyecto para יהוה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio, no el sustituto titulado. "Yahvé" es la forma de referencia del proyecto para el Tetragrámaton.
- source_word: וַיָּמָת שָׁם
  english_pob_choice: and he died there
  chosen_spanish: y murió allí
  alternatives_spanish:
  - y murió en ese lugar
  - y falleció allí
  lexicon: HALOT
  rationale: La cláusula es directa y narrativa. "Murió allí" reproduce con sobriedad el dato de la muerte en el lugar indicado.
- source_word: בִּשְׁנַת הָאַרְבָּעִים
  english_pob_choice: in the fortieth year
  chosen_spanish: en el año cuarenta
  alternatives_spanish:
  - en el año cuadragésimo
  lexicon: HALOT
  rationale: La datación hebrea se expresa de forma natural con el cardinal en español narrativo; "año cuarenta" es claro y fiel.
- source_word: לְצֵאת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: after the Israelites came out
  chosen_spanish: después de la salida de los hijos de Israel
  alternatives_spanish:
  - después de que los hijos de Israel salieron
  - tras la salida de Israel
  lexicon: HALOT
  rationale: El infinitivo constructo con ל marca el punto de referencia temporal. Se conserva la imagen de "salida" porque el sustantivo verbal es parte del registro del pasaje.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the Israelites
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los descendientes de Israel
  lexicon: HALOT
  rationale: Aunque "israelitas" sería idiomático, aquí la formulación "hijos de Israel" mantiene más de cerca el hebreo y su tono genealógico/nacional.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de Egipto
  - de la tierra egipcia
  lexicon: HALOT
  rationale: Se conserva la construcción con "tierra" para reflejar la expresión hebrea completa y su alcance histórico-geográfico.
- source_word: בַּחֹדֶשׁ הַחֲמִישִׁי
  english_pob_choice: in the fifth month
  chosen_spanish: en el mes quinto
  alternatives_spanish:
  - en el quinto mes
  lexicon: HALOT
  rationale: La secuencia calendárica puede reproducirse de forma directa; "mes quinto" mantiene el orden del hebreo y es plenamente comprensible.
- source_word: בְּאֶחָד לַחֹדֶשׁ
  english_pob_choice: on the first day of the month
  chosen_spanish: el primer día del mes
  alternatives_spanish:
  - al primer día del mes
  - el día primero del mes
  lexicon: HALOT
  rationale: La expresión temporal se vierte de manera natural en español como fecha del calendario, sin añadir elementos ajenos.
theological_decisions:
- issue: Renderizado del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme al criterio del proyecto, se translitera como "Yahvé" para preservar el nombre propio y no sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Expresión idiomática עַל פִּי יְהוָה
  english_pob_reading: at the command of Yahweh
  chosen_spanish_reading: por orden de Yahvé
  alternative_spanish_readings:
  - según la palabra de Yahvé
  - por mandato de Yahvé
  - por la boca de Yahvé
  rationale: La frase hebrea literalmente significa "sobre la boca de" y en contexto denota mandato/autorización divina. "Por orden de Yahvé" expresa bien esa fuerza sin perder la relación con la voluntad de Dios.
  doctrine_reference: Uso idiomático hebreo de formula de mandato; coherente con la nota lexical del POB inglés
translation_notes:
  revision_awareness: 'El antecedente inglés fue revisado para eliminar un "to" innecesario antes de Mount Hor y quedó en alta concordancia con las fuentes. La redacción española sigue ese estado final: mantiene el topónimo sin preposición redundante, conserva el orden narrativo y reproduce con fidelidad la fecha hebrea.'
  spanish_consistency_notes:
  - Se usa "Yahvé" de manera consistente para יהוה, en consonancia con la política terminológica del proyecto.
  - Se mantiene "el monte Hor" como topónimo estable y no se parafrasea a una forma menos reconocible.
  - '"Hijos de Israel" se conserva por cercanía al hebreo en una fórmula histórica/genealógica.'
  - La nota al pie ancla la única alternativa léxica relevante sin introducir variantes innecesarias en el cuerpo del texto.
