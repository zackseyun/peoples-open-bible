lexical_decisions:
- source_word: λόγος
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - mensaje
  lexicon: BDAG
  rationale: En español, «palabra de Dios» conserva el giro lucano recurrente y la amplitud semántica de λόγος mejor que «mensaje», que estrecha el término. Mantiene además la resonancia bíblica sin perder naturalidad.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  lexicon: BDAG
  rationale: Se traduce como genitivo posesivo directo, indicando que la palabra pertenece a Dios o procede de él, sin añadir matices no presentes en el griego.
- source_word: ηὔξανεν
  english_pob_choice: continued to grow
  chosen_spanish: seguía creciendo
  alternatives_spanish:
  - crecía
  - continuaba creciendo
  lexicon: BDAG
  rationale: El imperfecto expresa acción en curso; «seguía creciendo» comunica bien la progresión continua de forma natural en español.
- source_word: ἐπληθύνετο
  english_pob_choice: multiply
  chosen_spanish: multiplicándose
  alternatives_spanish:
  - aumentando
  - extendiéndose
  lexicon: BDAG
  rationale: «Multiplicándose» conserva el matiz distinto del segundo verbo, evitando fundirlo con «crecer» y respetando la fuerza acumulativa del griego.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: «Pero» refleja bien el giro adversativo/narrativo respecto al relato anterior y es idiomático en español.
theological_decisions:
- issue: Cómo rendir λόγος τοῦ θεοῦ sin reducirlo a un significado meramente informativo
  english_pob_reading: the word of God
  chosen_spanish_reading: la palabra de Dios
  alternative_spanish_readings:
  - el mensaje de Dios
  rationale: Se conserva la formulación tradicional y el alcance amplio del término, que en Lucas-Hechos incluye proclamación y contenido divino, no solo «mensaje» en sentido estrecho.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El texto griego y el auditorial inglés están en alto acuerdo; no se reportan revisiones aplicadas. La versión española sigue la misma decisión central del POB inglés, preservando el doble verbo de crecimiento sin nivelarlo en una sola idea.
  spanish_consistency_notes:
  - Se mantuvo «palabra de Dios» para corresponder al uso lucano y al criterio del POB inglés.
  - Se eligió un aspecto continuo en español («seguía creciendo») para reflejar los imperfectos griegos.
  - Se separó el valor de los dos verbos con «creciendo» y «multiplicándose» para no perder la progresión paralela del original.
