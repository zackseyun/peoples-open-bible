base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/019/004.yaml
  text: Because they have forsaken me and made this place unrecognizable[a], and have burned incense in it to other gods whom neither they nor their fathers nor the kings of Judah had known, and they have filled this place with the blood of innocents[b],
  footnotes:
  - marker: a
    text: Or 'defiled this place' or 'treated this place as foreign.' The Hebrew verb carries the sense of making something foreign or estranged.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the blood of innocents'; many English versions render this idiomatically as 'innocent blood.'
    reason: lexical_alternative
