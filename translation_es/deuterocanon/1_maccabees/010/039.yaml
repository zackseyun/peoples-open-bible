    issue: La expresión 'como don' suena poco idiomática en español actual.
    rationale: Aunque refleja el matiz elevado de δόμι, en español administrativo y narrativo suena rígida y algo extraña. 'En donación' conserva formalidad y comunica mejor una cesión oficial.
  revised_spanish_text: Ptolemaida y el territorio adyacente a ella los he dado en donación[a] al santuario en Jerusalén, para los gastos principales del santuario.
