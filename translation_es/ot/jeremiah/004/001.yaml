    rationale: El expediente inglés justifica una lectura condicional-exhortativa, no meramente predictiva. En español, «volverás» se oye sobre todo como futuro indicativo, lo que debilita la exhortación profética.
  - severity: medium
    issue: «y no andarás errante» es poco natural y demasiado futurizante
    rationale: Aunque comunica inestabilidad, la expresión no suena idiomática en español bíblico moderno. «No andes errante» o «no vagues» preserva mejor la exhortación y la legibilidad.
  - severity: low
    issue: «oh Israel» resulta algo acartonado
    rationale: Es entendible, pero «Israel» sin «oh» suele leerse con mayor naturalidad en español actual manteniendo el vocativo.
