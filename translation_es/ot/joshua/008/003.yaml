translation:
  language: es
  text: Entonces Josué y todo el pueblo de guerra[a] se levantaron para subir contra Hai[b], y Josué escogió treinta mil hombres, hombres poderosos de valor[c], y los envió de noche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo el ejército». La expresión hebrea dice literalmente «todo el pueblo de la guerra».
    reason: lexical_alternative
  - marker: b
    text: O «subir a Hai». El modismo hebreo «subir» se conserva, mientras que el contexto sugiere movimiento hostil contra la ciudad.
    reason: lexical_alternative
  - marker: c
    text: O «hombres valientes de valor». La expresión hebrea es una fórmula militar que subraya fuerza y valentía.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: rose
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se pusieron en marcha
  - se alzaron
  lexicon: HALOT / קום
  rationale: En este contexto narrativo, קום marca el inicio de la acción. «Se levantaron» conserva ese valor aspectual sin añadir más movimiento del que el hebreo expresa.
- source_word: כָל עַם הַמִּלְחָמָה
  english_pob_choice: all the people of war
  chosen_spanish: todo el pueblo de guerra
  alternatives_spanish:
  - todo el ejército
  - todo el pueblo guerrero
  lexicon: HALOT / עם + מלחמה
  rationale: Se mantiene la estructura literal «pueblo de guerra», como en la decisión inglesa «people of war», para no diluir la expresión hebrea en un término más institucional como «ejército».
- source_word: לַעֲלוֹת
  english_pob_choice: to go up against
  chosen_spanish: subir contra
  alternatives_spanish:
  - subir a
  - ir contra
  lexicon: HALOT / עלה
  rationale: El verbo conserva la imagen direccional de «subir» y, por el contexto militar, el matiz hostil de oposición con «contra», sin convertirlo en una paráfrasis de «atacar».
- source_word: הָעָי
  english_pob_choice: Ai
  chosen_spanish: Hai
  alternatives_spanish:
  - Aí
  lexicon: Topónimo bíblico tradicional en español
  rationale: Se usa «Hai», forma bíblica establecida en español, como equivalente natural del topónimo Ai.
- source_word: וַיִּבְחַר
  english_pob_choice: chose
  chosen_spanish: escogió
  alternatives_spanish:
  - eligió
  - seleccionó
  lexicon: HALOT / בחר
  rationale: «Escogió» es un verbo narrativo natural en español y conserva el sentido directo de elegir o seleccionar.
- source_word: שְׁלֹשִׁים אֶלֶף אִישׁ
  english_pob_choice: thirty thousand men
  chosen_spanish: treinta mil hombres
  alternatives_spanish:
  - treinta mil soldados
  lexicon: HALOT / אישׁ
  rationale: «Hombres» reproduce la unidad léxica del hebreo sin introducir el término interpretativo «soldados», que sería correcto por contexto pero menos cercano al texto.
- source_word: גִּבּוֹרֵי הַחַיִל
  english_pob_choice: mighty men of valor
  chosen_spanish: valientes guerreros
  alternatives_spanish:
  - hombres valientes
  - guerreros poderosos
  - mighty men of valor
  lexicon: HALOT / גבור + חיל
  rationale: La expresión militar hebrea combina capacidad, valentía y fuerza. «Valientes guerreros» comunica bien el peso semántico en español sin recurrir a una fórmula demasiado arcaica.
- source_word: וַיִּשְׁלָחֵם
  english_pob_choice: sent them out
  chosen_spanish: los envió
  alternatives_spanish:
  - los mandó
  - los despachó
  lexicon: HALOT / שלח
  rationale: El sentido básico es enviar. En español, «los envió» es suficientemente natural; el contexto militar ya aporta la idea de destacamento.
- source_word: לָיְלָה
  english_pob_choice: by night
  chosen_spanish: de noche
  alternatives_spanish:
  - por la noche
  - durante la noche
  lexicon: HALOT / לילה
  rationale: «De noche» expresa con claridad la circunstancia temporal y es idiomático en español bíblico y moderno.
theological_decisions:
- issue: Matiz militar de «subir contra» versus una traducción más interpretativa
  english_pob_reading: to go up against Ai
  chosen_spanish_reading: subir contra Hai
  alternative_spanish_readings:
  - atacar a Hai
  - ir a Hai
  rationale: Se conserva el idioma espacial del hebreo עלה, que en contexto bélico implica movimiento hostil. «Subir contra» respeta tanto la metáfora direccional como la hostilidad implícita, sin borrar la tensión textual.
  doctrine_reference: No aplica; decisión semántica y de estilo narrativo
- issue: Preservación de la fórmula militar «pueblo de guerra»
  english_pob_reading: all the people of war
  chosen_spanish_reading: todo el pueblo de guerra
  alternative_spanish_readings:
  - todo el ejército
  - todos los hombres de guerra
  rationale: La POB inglesa retuvo la literalidad de «people of war» para no normalizarlo a «army». En español se conserva esa misma rareza controlada para reflejar el hebreo y su colectivo militar.
  doctrine_reference: No aplica; fidelidad léxica al texto hebreo
- issue: Expresión de גִּבּוֹרֵי הַחַיִל
  english_pob_reading: mighty men of valor
  chosen_spanish_reading: valientes guerreros
  alternative_spanish_readings:
  - hombres poderosos de valor
  - mighty men of valor
  rationale: La frase hebrea es una fórmula militar de prestigio. En español, «valientes guerreros» conserva la fuerza evaluativa y evita una calca arcaizante que sonaría menos natural para el lector actual.
  doctrine_reference: No aplica; decisión de equivalencia semántica
- issue: Topónimo Ai / Hai
  english_pob_reading: Ai
  chosen_spanish_reading: Hai
  alternative_spanish_readings:
  - Ai
  rationale: En español bíblico, «Hai» es la forma tradicional y legible del nombre. Mantiene identificación inmediata para lectores en español sin afectar el sentido del versículo.
  doctrine_reference: No aplica; convención toponímica en español
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés al preferir una formulación más literal y formal para עַם הַמִּלְחָמָה y para גִּבּוֹרֵי הַחַיִל. Se evitó una paráfrasis como «ejército» o «atacaron», para mantener la textura narrativa del hebreo y la coherencia con el audit trail.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como terminología estándar del proyecto cuando aparezca el nombre divino; aquí no aparece.
  - «Hai» se usa de manera consistente como topónimo bíblico en español.
  - Se mantiene el registro bíblico moderno y digno, sin arcaísmos innecesarios.
  - La nota [a] en el texto marca la alternativa léxica principal sobre עַם הַמִּלְחָמָה; la nota [b] marca la alternativa sobre גִּבּוֹרֵי הַחַיִל.
