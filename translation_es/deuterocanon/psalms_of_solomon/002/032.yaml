translation:
  language: es
  text: porque lo trató con desprecio y deshonra[a]; no consideró que era un hombre[b], y después tampoco lo consideró[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «lo despreció» o, más literalmente, «en deshonra».
    reason: lexical_alternative
  - marker: b
    text: O «un ser humano»; la frase subraya la condición humana y su fragilidad.
    reason: lexical_alternative
  - marker: c
    text: O «más tarde»; también puede entenderse como referencia a lo que vino después.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξουδένωσεν
  english_pob_choice: treated ... with contempt / despised
  chosen_spanish: lo trató con desprecio
  alternatives_spanish:
  - lo despreció
  - lo tuvo en nada
  lexicon: BDAG
  rationale: El verbo expresa tratar a alguien como de poco valor, con menosprecio o desprecio. «Lo trató con desprecio» conserva esa fuerza relacional y resulta natural en español sin debilitar el verbo a una mera idea mental.
- source_word: ἐν ἀτιμίᾳ
  english_pob_choice: with dishonor
  chosen_spanish: con deshonra
  alternatives_spanish:
  - en deshonra
  - con vergüenza
  lexicon: BDAG
  rationale: ἀτιμία denota deshonra o infamia. «Con deshonra» reproduce el matiz de manera directa y fluida en español. Se evita una paráfrasis más interpretativa que diluya el valor de la frase preposicional.
- source_word: ἐλογίσατο
  english_pob_choice: consider
  chosen_spanish: consideró
  alternatives_spanish:
  - pensó
  - tomó en cuenta
  - calculó
  lexicon: BDAG
  rationale: El verbo repetido subraya una evaluación deliberada. «Consideró» mantiene la repetición y la idea de tener en cuenta algo de manera intencional.
- source_word: ἄνθρωπός
  english_pob_choice: man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un ser humano
  - un humano
  lexicon: BDAG
  rationale: El griego usa un singular masculino que conserva el tono retórico y la referencia a la fragilidad humana. «Un hombre» sigue de cerca el original y mantiene la fuerza de la formulación.
- source_word: τὸ ὕστερον
  english_pob_choice: afterward
  chosen_spanish: después
  alternatives_spanish:
  - más tarde
  - al final
  - el después
  lexicon: BDAG
  rationale: La frase puede referirse al tiempo posterior o al resultado. Aquí «después» es la opción más sobria y cercana al griego, evitando interpretar de antemano si se trata del desenlace, el final o lo que vino luego.
theological_decisions:
- issue: Identidad del sujeto implícito de ἐξουδένωσεν
  english_pob_reading: The English audit trail notes that the subject of ἐξουδένωσεν is God, but the latest revision removed 'God' because it is not expressed in the Greek.
  chosen_spanish_reading: Se mantiene el sujeto implícito sin añadir «Dios» en el texto principal.
  alternative_spanish_readings:
  - porque Dios lo trató con desprecio y deshonra
  - porque él lo trató con desprecio y deshonra
  rationale: El griego no expresa el sujeto de forma explícita en esta cláusula, y el expediente revisado pidió retirar «God» por no estar en el texto. Por eso el español conserva la ambigüedad gramatical del original y no introduce un sujeto que el griego no dice.
  doctrine_reference: Fidelidad al texto fuente y evitación de sobreespecificación del sujeto implícito
translation_notes:
  revision_awareness: 'El borrador español sigue la revisión más reciente del expediente: no añade «Dios» al texto principal, traduce ἐν ἀτιμίᾳ de forma más literal como «con deshonra», y conserva τὸ ὕστερον con un valor temporal sobrio («después») en vez de interpretar «el resultado» o «el final».'
  spanish_consistency_notes:
  - Se mantiene «consideró» en ambas ocurrencias de ἐλογίσατο para preservar la repetición del griego.
  - Se evita «Cristo», «SEÑOR» u otras convenciones no atestiguadas en este versículo.
  - La puntuación reproduce dos miembros principales separados por punto y coma, como en el griego.
  - «Con deshonra» conserva el sustantivo abstracto de ἀτιμία sin reemplazarlo por lenguaje más confesional o devocional.
