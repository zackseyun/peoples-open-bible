review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura narrativa y los elementos léxicos principales del hebreo: marco circunstancial (''estaban''), designación ''los hijos de Israel'', hallazgo de ''un hombre'' y la acción de recoger madera en sábado. También preserva bien la alternativa léxica para מְקֹשֵׁשׁ עֵצִים. Sin embargo, ''en día de sábado'' no es una formulación natural ni plenamente fiel en español; el hebreo בְּיוֹם הַשַּׁבָּת se traduce mejor como ''en el día de sábado'' o, más naturalmente sin pérdida de sentido, ''en el día de reposo'' / ''en el día de sábado''. Dado el objetivo de claridad y dignidad modernas, conviene reparar esa frase.'
  spanish_quality_summary: La redacción es generalmente clara y sobria, pero 'en día de sábado' suena forzada e impropia del español natural. 'Hallaron' es aceptable, aunque 'encontraron' sería más llano; no es necesario cambiarlo. 'En el desierto' es una elección defendible para בַּמִּדְבָּר, aunque algo menos alineada con el matiz de 'wilderness' que 'desierto' suele admitir en español bíblico. La mejora principal es la naturalidad sintáctica del complemento temporal.
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé, Mesías o esclavo. 'Los hijos de Israel' alinea bien con la decisión documentada de preservar בְנֵי יִשְׂרָאֵל de forma más literal que 'los israelitas'. La nota léxica 'palos' preserva adecuadamente la alternativa inglesa 'sticks'.
  issues:
  - severity: medium
    issue: La frase 'en día de sábado' es antinatural en español.
    rationale: 'Aunque intenta reflejar literalmente בְּיוֹם הַשַּׁבָּת, en español requiere artículo: ''en el día de sábado''. Sin esa reparación, la frase suena defectuosa y afecta la legibilidad.'
  - severity: low
    issue: La justificación de 'día de sábado' sobreliteraliza la estructura hebrea.
    rationale: El proyecto pide evitar calcos de madera cuando la gramática española resulta extraña. Aquí conviene una formulación española digna y clara que mantenga el sentido temporal explícito.
  revised_spanish_text: Mientras los hijos de Israel estaban en el desierto[a], hallaron a un hombre recogiendo leña en el día de sábado.
  revised_footnotes:
  - marker: a
    text: O 'recogiendo palos'.
    reason: lexical_alternative
  revision_rationale: Se mantiene casi todo el borrador porque es fiel al hebreo y a la auditoría inglesa. Solo se corrige 'en día de sábado' a 'en el día de sábado' para cumplir con la sintaxis natural del español sin perder la explicitud de יוֹם ('día').
