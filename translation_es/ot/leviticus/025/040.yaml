translation:
  language: es
  text: Estará contigo como jornalero[a], como forastero; trabajará contigo hasta el año del jubileo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'como forastero residente' o 'como residente extranjero' para 'como forastero'.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּשָׂכִיר
  english_pob_choice: like a hired worker
  chosen_spanish: como jornalero
  alternatives_spanish:
  - como trabajador contratado
  - como obrero asalariado
  lexicon: HALOT
  rationale: שָׂכִיר designa a quien trabaja por jornal o salario. 'Jornalero' comunica en español la idea de trabajo pagado sin cargar el texto con connotaciones de esclavitud, en línea con la decisión inglesa de preservar el estatus laboral no servil.
- source_word: כְּתוֹשָׁב
  english_pob_choice: like a sojourner
  chosen_spanish: como forastero
  alternatives_spanish:
  - como residente
  - como huésped residente
  lexicon: HALOT
  rationale: תוֹשָׁב indica una persona que reside sin ser miembro pleno del grupo de origen. 'Forastero' es una opción directa y legible en español bíblico moderno; evita el tecnicismo de 'residente extranjero' y mantiene la categoría social del texto.
- source_word: יִהְיֶה עִמָּךְ
  english_pob_choice: he shall be with you
  chosen_spanish: Estará contigo
  alternatives_spanish:
  - será contigo
  - permanecerá contigo
  lexicon: HALOT
  rationale: La cláusula expresa su situación relacional frente al israelita. 'Estará contigo' conserva el valor de presencia/relación del hebreo y funciona de forma natural en español.
- source_word: עַד שְׁנַת הַיֹּבֵל
  english_pob_choice: until the year of jubilee
  chosen_spanish: hasta el año del jubileo
  alternatives_spanish:
  - hasta el año del Jubileo
  lexicon: HALOT
  rationale: '''Jubileo'' mantiene el término técnico legal de Levítico 25. Se prefiere el minúsculo como sustantivo común técnico, coherente con el uso contextual del periodo de liberación.'
- source_word: יַעֲבֹד עִמָּךְ
  english_pob_choice: he shall serve with you
  chosen_spanish: servirá contigo
  alternatives_spanish:
  - trabajará contigo
  - laborará contigo
  lexicon: HALOT
  rationale: עבד puede significar 'servir' o 'trabajar'. 'Servirá contigo' sigue de cerca la relación marcada por עִמָּךְ y evita sugerir dominio esclavista, acorde con el contexto inmediato que regula esta relación laboral.
theological_decisions:
- issue: Estatus del israelita en servicio
  english_pob_reading: Rendered in a way that emphasizes hired-worker status rather than slave status.
  chosen_spanish_reading: Se expresa como jornalero y no como esclavo.
  alternative_spanish_readings:
  - como esclavo
  - como siervo
  rationale: El contexto cercano distingue a esta persona de un esclavo y regula su servicio como temporal y protegido. Por eso la traducción española debe conservar la fuerza de trabajo contratado, sin importar una lectura de esclavitud absoluta que el pasaje limita.
  doctrine_reference: Principio de primacía del texto original; evitar importar una teología posterior que borre la distinción legal del contexto.
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó 'resident foreigner' por 'sojourner' para un renderizado más directo de תושב. La línea española sigue esa preferencia semántica con 'forastero', manteniendo el par comparativo doble ('como jornalero, como forastero') y el cierre temporal hasta el jubileo.
  spanish_consistency_notes:
  - Se mantiene 'jubileo' como término técnico legal.
  - Se evita 'esclavo' porque el contexto inglés y hebreo apuntan a un estatus laboral no servil.
  - '''Contigo'' reproduce la relación marcada por עִמָּךְ sin añadir matices de subordinación no explicitados.'
