revisions:
- from: Y mira si hay en mí algún camino de dolor[a][b], y guíame en el camino eterno.
  to: Y mira si hay en mí algún camino dañino[a], y guíame por el camino eterno[b].
  rationale: Se corrige el anclaje de las notas para que cada una corresponda al término fuente adecuado. Se sustituye «camino de dolor» por «camino dañino» para reflejar mejor el valor de עֹצֶב en este contexto y sonar más natural en español. Se ajusta «en el camino» a «por el camino» por mejor fluidez idiomática. Se conserva «eterno» como equivalente válido de עוֹלָם, con su nota de alternativas.
