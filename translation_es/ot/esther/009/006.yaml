translation:
  language: es
  text: Y en Susa, la ciudadela[a], los judíos mataron y destruyeron a quinientos hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la fortaleza». El término hebreo puede designar un complejo fortificado, una acrópolis o una ciudadela.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/שׁוּשַׁן
  english_pob_choice: And in Susa
  chosen_spanish: Y en Susa
  alternatives_spanish:
  - Ahora en Susa
  - En Susa
  lexicon: HALOT
  rationale: Mantengo la relación narrativa con el versículo anterior mediante la conjunción «Y», y conservo el valor locativo de la preposición con «en». «Susa» es la transliteración estándar y transparente del topónimo.
- source_word: הַ/בִּירָה
  english_pob_choice: the citadel
  chosen_spanish: la ciudadela
  alternatives_spanish:
  - la fortaleza
  - el palacio
  lexicon: HALOT
  rationale: «בִּירָה» puede referirse a un complejo fortificado elevado o administrativo; «ciudadela» comunica bien ese sentido en español sin reducirlo solo a una residencia real. Evito «palacio» porque estrecha demasiado el campo semántico documentado.
- source_word: הָרְגוּ
  english_pob_choice: killed
  chosen_spanish: mataron
  alternatives_spanish:
  - mataron a
  - dieron muerte a
  lexicon: HALOT
  rationale: El perfecto plural de הרג se expresa naturalmente con «mataron». Es claro, moderno y conserva el acto violento sin arcaísmo.
- source_word: הַ/יְּהוּדִים
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  lexicon: HALOT
  rationale: En Ester, el grupo etnorreligioso se identifica de manera natural como «los judíos». «Judeanos» sería más geográfico y menos idiomático en español para este contexto.
- source_word: וְ/אַבֵּד
  english_pob_choice: and destroyed
  chosen_spanish: y destruyeron
  alternatives_spanish:
  - y aniquilaron
  - y hicieron perecer
  lexicon: HALOT
  rationale: Conservo el segundo verbo por separado para reflejar la doble expresión hebrea («mataron y destruyeron»), en lugar de fusionarla. «Destruyeron» mantiene fuerza semántica sin exceder el alcance del verbo.
- source_word: חֲמֵשׁ מֵא֖וֹת אִֽישׁ
  english_pob_choice: five hundred men
  chosen_spanish: quinientos hombres
  alternatives_spanish:
  - quinientas personas
  lexicon: HALOT
  rationale: «אִישׁ» aquí funciona como sustantivo de conteo masculino; por eso conservo «hombres» en vez de neutralizar a «personas», siguiendo la precisión de género del hebreo.
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el audit trail inglés: se conservan el paralelismo verbal «mataron y destruyeron», el topónimo Susa y la nota léxica sobre בִּירָה. No se requieren revisiones textuales adicionales.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y digno, con sintaxis natural en español.
  - Se preserva la distinción entre el acto de matar y el de destruir, reflejando la doble verbalidad del hebreo.
  - La nota de pie de página se ancla en «ciudadela» para conservar la alternativa léxica documentada.
