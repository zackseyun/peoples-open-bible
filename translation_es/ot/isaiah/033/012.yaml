revisions:
- from: Y los pueblos vendrán a ser quemas de cal; como espinos cortados[a], serán quemados en el fuego.
  to: Y los pueblos llegarán a ser como cal quemada; como espinos cortados[a], serán quemados en el fuego.
  rationale: Se ajusta la redacción para mejorar la naturalidad del español sin perder la imagen compacta del hebreo ni las decisiones léxicas del POB. «Llegarán a ser» mantiene el cambio de estado, y «como cal quemada» conserva el campo semántico de combustión de שִׂיד con mejor legibilidad que «quemas de cal».
