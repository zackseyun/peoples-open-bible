translation:
  language: es
  text: y hacer que el santuario quedara sujeto a tributo[a], como los otros santuarios de las naciones, y hacer que el sumo sacerdocio fuera vendido cada año[b][c];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tributario». El adjetivo griego ἀργυρολόγητον sugiere estar sujeto a una tasación monetaria o tributo.
    reason: lexical_alternative
  - marker: b
    text: O «puesto en venta cada año». El adjetivo griego πρατήν enfatiza que el sumo sacerdocio debía ser vendido.
    reason: lexical_alternative
  - marker: c
    text: El griego conservado aquí es sintácticamente comprimido; esta traducción sigue el sentido de la política descrita más que una frase griega completamente desarrollada.
    reason: textual_variant
lexical_decisions:
- source_word: ἱερὸν
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el templo
  - el lugar santo
  lexicon: LSJ
  rationale: ἱερὸν designa el recinto o complejo sagrado; en este contexto de 2 Macabeos, «santuario» conserva la referencia al lugar santo de Jerusalén sin limitarla indebidamente al edificio solamente.
- source_word: ἀργυρολόγητον
  english_pob_choice: taxable
  chosen_spanish: gravado
  alternatives_spanish:
  - sujeto a tributo
  - sujeto a impuestos
  - tributable
  lexicon: LSJ
  rationale: El adjetivo indica una carga económica o fiscal. «Gravado» comunica de forma natural que el santuario quedaría sometido a una carga tributaria, manteniendo el matiz de imposición monetaria.
- source_word: τεμένη
  english_pob_choice: shrines
  chosen_spanish: santuarios
  alternatives_spanish:
  - santuarios paganos
  - recintos sagrados
  - templos
  lexicon: LSJ
  rationale: τεμένη alude a recintos o lugares sagrados de los pueblos no judíos. «Santuarios» conserva el valor cultual y permite marcar la analogía degradante con el santuario de Jerusalén.
- source_word: ἐθνῶν
  english_pob_choice: of the nations
  chosen_spanish: de las naciones
  alternatives_spanish:
  - de los gentiles
  - de los pueblos
  lexicon: LSJ
  rationale: Se mantiene la cercanía al griego con «naciones», evitando forzar una equivalencia interpretativa distinta del contraste étnico-religioso del pasaje.
- source_word: πρατὴν
  english_pob_choice: sold
  chosen_spanish: sea vendido
  alternatives_spanish:
  - sea puesto en venta
  - sea subastado
  - sea comercializado
  lexicon: LSJ
  rationale: πρατήν expresa la condición de algo puesto a la venta o vendido. Dado que modifica el sumo sacerdocio, la voz pasiva «sea vendido» preserva la fuerza de la comercialización indebida.
- source_word: ἀρχιερωσύνην
  english_pob_choice: the high priesthood
  chosen_spanish: el sumo sacerdocio
  alternatives_spanish:
  - el oficio de sumo sacerdote
  - la dignidad sumo sacerdotal
  lexicon: LSJ
  rationale: La expresión denota el oficio o dignidad del sumo sacerdote. «Sumo sacerdocio» es la forma natural en español y mantiene la referencia institucional.
- source_word: ποιήσειν
  english_pob_choice: to make
  chosen_spanish: hacer
  alternatives_spanish:
  - convertir
  - poner
  - establecer
  lexicon: LSJ
  rationale: 'El infinitivo de propósito conserva la secuencia causativa del griego: «hacer del santuario... y hacer que el sumo sacerdocio...». «Hacer» mantiene la paralelismo sin sobreexplicar.'
theological_decisions:
- issue: Tratamiento del santuario de Jerusalén frente a los lugares sagrados paganos
  english_pob_reading: Render ἱερὸν as 'sanctuary' and τεμένη as 'shrines'
  chosen_spanish_reading: Traducir ἱερὸν como «el santuario» y τεμένη como «santuarios», manteniendo la analogía degradante con los recintos sagrados de las naciones
  alternative_spanish_readings:
  - traducir ambos como «templos»
  - traducir ambos como «santuarios»
  rationale: 'El griego distingue entre el recinto sagrado de Jerusalén y los recintos sagrados de las naciones. La traducción conserva esa distinción sin intensificarla más allá del texto, y deja ver el agravio implicado: tratar el santuario de Yahvé como si fuera un santuario pagano.'
  doctrine_reference: Translation philosophy §§1, 5
- issue: Sentido económico y político de ἀργυρολόγητον
  english_pob_reading: subject to tribute / taxable
  chosen_spanish_reading: «algo gravado» para expresar carga fiscal o tributaria
  alternative_spanish_readings:
  - «sujeto a tributo»
  - «sometido a impuestos»
  - «tributado»
  rationale: El término griego sugiere imposición monetaria o tributaria, no solo una cualidad abstracta. «Gravado» permite una formulación breve y digna, compatible con el paralelismo del versículo, sin perder la idea de sujeción fiscal.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: El inglés POB revisó este verso para mantener «taxable» y «sold each year», y eliminó «a thing» para acercarse más al griego. La versión española sigue esa decisión al conservar la idea de carga fiscal para ἀργυρολόγητον y la venta anual del sumo sacerdocio, evitando añadir explicaciones que no estén en el texto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» cuando aparezca el nombre divino en el contexto amplio, pero este versículo no lo contiene explícitamente.
  - «Sumo sacerdocio» se usa como equivalente estable de ἀρχιερωσύνην en vez de una paráfrasis más larga.
  - Se preserva la diferencia entre el santuario de Jerusalén y los santuarios de las naciones, siguiendo la distinción léxica del griego.
