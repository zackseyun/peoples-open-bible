translation:
  language: es
  text: 'Y en cuanto a Coat: el clan de los amramitas, y el clan de los izharitas, y el clan de los hebronitas, y el clan de los uzielitas; estos son los clanes de los coatitas.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְ/לִ/קְהָת
  english_pob_choice: And for Kohath
  chosen_spanish: Y para Coat
  alternatives_spanish:
  - Y a Coat
  - Y respecto de Coat
  lexicon: HALOT
  rationale: La preposición introduce aquí una agrupación genealógica/administrativa. En español, 'para' comunica bien la asignación o encabezamiento del linaje sin forzar un calco duro de la construcción hebrea.
- source_word: מִשְׁפַּחַת
  english_pob_choice: the clan of
  chosen_spanish: la familia de
  alternatives_spanish:
  - el clan de
  - la estirpe de
  lexicon: HALOT
  rationale: Aunque la POB inglesa usa 'clan' para el valor administrativo-genealógico, en español 'familia' transmite naturalmente la misma unidad de parentesco sin perder el sentido de subdivisión. 'Clan' sería posible, pero menos natural en español bíblico corriente.
- source_word: הַֽ/עַמְרָמִי
  english_pob_choice: the Amramites
  chosen_spanish: los amramitas
  alternatives_spanish:
  - los de Amram
  - la familia amramita
  lexicon: HALOT
  rationale: El gentilic indica descendientes de Amram. Se conserva con el plural español 'amramitas', paralelo a la forma inglesa y claro para la genealogía.
- source_word: הַ/יִּצְהָרִי
  english_pob_choice: the Izharites
  chosen_spanish: los izharitas
  alternatives_spanish:
  - los de Izhar
  - la familia izharita
  lexicon: HALOT
  rationale: Se mantiene el gentilicio derivado de Izhar con una forma española transparente y consistente con los demás nombres del versículo.
- source_word: הַֽ/חֶבְרֹנִי
  english_pob_choice: the Hebronites
  chosen_spanish: los hebronitas
  alternatives_spanish:
  - los de Hebrón
  - la familia hebronita
  lexicon: HALOT
  rationale: El término es un gentilic del nombre Hebrón. 'Hebronitas' conserva el valor derivado y la paralela formal con el resto de la lista.
- source_word: הָֽ/עָזִּיאֵלִי
  english_pob_choice: the Uzzielites
  chosen_spanish: los uzielitas
  alternatives_spanish:
  - los de Uzziel
  - la familia uzielita
  lexicon: HALOT
  rationale: Se reproduce el gentilicio de Uzziel en una forma española natural. La 'z' simplifica la transliteración sin alterar la identificación del linaje.
- source_word: אֵלֶּה הֵם
  english_pob_choice: these are
  chosen_spanish: estos son
  alternatives_spanish:
  - éstos son
  - así son
  lexicon: HALOT
  rationale: Fórmula identificadora directa y natural en español. Mantiene el carácter conclusivo del hebreo sin añadir matices interpretativos.
- source_word: מִשְׁפְּחֹ֥ת
  english_pob_choice: the clans of
  chosen_spanish: los linajes de
  alternatives_spanish:
  - las familias de
  - los clanes de
  lexicon: HALOT
  rationale: Para el resumen final, 'linajes' comunica bien la suma de subgrupos genealógicos y evita repetir 'familias' en exceso. También preserva el valor de agrupación hereditaria del hebreo.
- source_word: הַ/קְּהָתִי
  english_pob_choice: the Kohathites
  chosen_spanish: los coatitas
  alternatives_spanish:
  - los cohatitas
  - la descendencia de Coat
  lexicon: HALOT
  rationale: Se sigue la forma tradicional española 'coatitas' para el gentilicio de Kohath/Coat, clara y reconocible en genealogías bíblicas. 'Cohatitas' sería menos estándar en español.
theological_decisions:
- issue: Tipo de unidad genealógica en מִשְׁפַּחַת / מִשְׁפְּחֹת
  english_pob_reading: the clan of / the clans of
  chosen_spanish_reading: la familia de / los linajes de
  alternative_spanish_readings:
  - el clan de / los clanes de
  - la estirpe de / las familias de
  rationale: 'No se neutraliza el valor técnico del hebreo: aquí se trata de subdivisiones de parentesco dentro del registro censal. ''Familia'' es un equivalente idiomático apto para el primer nivel, mientras ''linajes'' resume con propiedad el conjunto de subgrupos al final del versículo.'
  doctrine_reference: Números 1–4; uso genealógico/censal de מִשְׁפָּחָה
translation_notes:
  revision_awareness: La versión inglesa POB está en alta concordancia con el hebreo y no requiere correcciones textuales. La principal decisión española consiste en trasladar el valor genealógico-administrativo de מִשְׁפָּחָה y sus plurales con términos naturales ('familia', 'linajes') sin perder la estructura enumerativa del original.
  spanish_consistency_notes:
  - Se mantiene 'Coat' como forma española del nombre propio, coherente con el uso bíblico tradicional en castellano.
  - Se evita 'SEÑOR' u otra sustitución teológica porque el versículo no contiene el Tetragrámaton ni un título divino.
  - Se conserva una enumeración paralela con 'y ... y ... y ...', reflejando la serie hebrea.
  - No se añaden notas textuales porque no hay variante textual relevante en el paquete fuente.
