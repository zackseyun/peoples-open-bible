translation:
  language: es
  text: Hijos míos[a], ahora no sean negligentes, porque Yahvé los ha elegido para estar ante él[b], para ministrarle y para ser sus ministros y los que ofrecen incienso[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hijos míos» refleja el vocativo masculino del hebreo; en este contexto se dirige a los ministros sacerdotales o levíticos.
    reason: source_note
  - marker: b
    text: Literalmente, «estar de pie delante de él», expresión sacerdotal para servir en la presencia de Dios.
    reason: cultural_note
  - marker: c
    text: 'Hebreo: «y quemadores de incienso»; también puede entenderse como «los que queman incienso».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּנַי
  english_pob_choice: My sons
  chosen_spanish: Hijos míos
  alternatives_spanish:
  - Mis hijos
  - Hijos míos, varones
  lexicon: HALOT
  rationale: La forma hebrea es un vocativo masculino con sufijo de primera persona. «Hijos míos» conserva el tono afectuoso y directo del llamado; «mis hijos» suena posible pero algo menos natural en exhortación. No se añade «varones» porque el contexto sacerdotal ya restringe el grupo y la adición sería innecesaria.
- source_word: עַתָּה
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  - ya
  lexicon: HALOT
  rationale: Adverbio temporal simple que intensifica la urgencia de la exhortación. «Ahora» es la opción más natural y fiel en español.
- source_word: אַל תִּשָּׁל֑וּ
  english_pob_choice: do not be negligent
  chosen_spanish: no seáis negligentes
  alternatives_spanish:
  - no seáis descuidados
  - no seáis laxos
  - no os descuidéis
  lexicon: HALOT
  rationale: En este contexto cultual, el verbo expresa flojedad o remisión en el deber. «No seáis negligentes» comunica bien la advertencia práctica y mantiene el registro serio. Se evita «no os descuidéis» porque en español puede sonar más general y menos cargado éticamente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el Tetragrama. «Yahvé» preserva el nombre propio divino en español y evita la sustitución por un título.
- source_word: לַעֲמֹד לְפָנָיו
  english_pob_choice: to stand before him
  chosen_spanish: para estar de pie delante de él
  alternatives_spanish:
  - para presentarse ante él
  - para servir en su presencia
  lexicon: HALOT
  rationale: La expresión es un modismo sacerdotal de servicio en la presencia divina. «Estar de pie delante de él» conserva la imagen hebrea. «Presentarse ante él» es posible, pero pierde un poco el valor lexical de «estar de pie».
- source_word: לְשָׁרְת֔/וֹ
  english_pob_choice: to minister to him
  chosen_spanish: para ministrarle
  alternatives_spanish:
  - para servirle
  - para hacerle servicio
  lexicon: HALOT
  rationale: En lenguaje cultual, שׁרת indica servicio ministerial, no mera servidumbre general. «Ministrarle» mantiene el matiz litúrgico sin caer en perífrasis más largas.
- source_word: וְלִהְי֥וֹת ל֖/וֹ מְשָׁרְתִ֥ים
  english_pob_choice: and to be his ministers
  chosen_spanish: y para ser sus ministros
  alternatives_spanish:
  - y para ser sus servidores
  - y para ser quienes le ministran
  lexicon: HALOT
  rationale: La construcción expresa función o condición asignada. «Sus ministros» reproduce bien el valor de rol. Se evita «servidores» porque en español puede resultar demasiado genérico y diluir el matiz sacerdotal.
- source_word: וּמַקְטִרִים
  english_pob_choice: and burners of incense
  chosen_spanish: y quemadores de incienso
  alternatives_spanish:
  - y los que queman incienso
  - y oferentes de incienso
  lexicon: HALOT
  rationale: El participio hiphil de קטר designa a quienes hacen ascender el incienso en el culto. «Quemadores de incienso» refleja de manera directa el sustantivo de oficio preservado por la revisión inglesa; «los que queman incienso» es igualmente válida, pero más perifrástica.
theological_decisions:
- issue: Tratamiento del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - el Señor
  rationale: El hebreo trae el Tetragrama explícitamente. La línea editorial del proyecto exige conservar el nombre propio divino en la traducción principal. Se evita «SEÑOR» porque funcionaría como sustitución litúrgica y ocultaría el dato textual.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor cultual de los infinitivos y participios finales
  english_pob_reading: to be his ministers and burners of incense
  chosen_spanish_reading: para ser sus ministros y quemadores de incienso
  alternative_spanish_readings:
  - para ser sus ministros y quienes queman incienso
  - para ministrar y quemar incienso
  rationale: 'El hebreo acumula funciones rituales: estar delante de Yahvé, ministrar, y ejercer oficios cultuales específicos. La traducción conserva esa progresión sin suavizarla a una generalidad devocional. El plural de oficio en «quemadores de incienso» mantiene la función asignada.'
  doctrine_reference: POB lexical/theological consistency on cultic service
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión del inglés POB que prefirió mantener la forma participial/nominal del último miembro («burners of incense») para conservar el paralelismo con «his ministers». Por eso el español usa un sustantivo de oficio paralelo: «quemadores de incienso».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se usó «ministrarle» para reflejar el matiz litúrgico de שׁרת en contexto sacerdotal.
  - «Estar de pie delante de él» conserva la imagen idiomática hebrea sin reemplazarla por una paráfrasis.
  - Se evitó el calco de «SEÑOR» y de «siervos» porque debilitarían la distinción cultual del texto.
