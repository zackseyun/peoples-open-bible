review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del hebreo y mantiene «tus obras» para מַעֲשֶׂיךָ, además de conservar la alternativa para דּוֹר לְדוֹר. Sin embargo, se aparta de dos puntos importantes del sentido fuente: יְשַׁבַּח significa «alabar» más directamente que «proclamar», y יַגִּידוּ es plural («declararán/contarán»), no singular. También la nota [a] no corresponde bien al texto principal, porque el texto usa «De generación en generación», mientras la decisión inglesa preserva «Generation to generation» con alternativa «One generation to another».'
  spanish_quality_summary: 'El español es legible, pero «De generación en generación proclamará...» suena algo torpe por el singular distributivo implícito y debilita el paralelismo. «Generación tras generación alabará tus obras y declararán tus hechos poderosos» mezcla singular y plural; por eso conviene una formulación plenamente plural y natural: «Una generación alabará tus obras a otra, y declararán tus hechos poderosos». Esto preserva mejor el flujo en español y la sintaxis hebrea con sujeto plural implícito en el segundo verbo.'
  glossary_alignment: No hay conflictos con terminología doctrinal mayor. La principal corrección léxica es preferir «alabará» para יְשַׁבַּח frente a «proclamará», conforme a la decisión auditada «will praise». Para וּגְבוּרֹתֶיךָ, «hechos poderosos» es aceptable, aunque «actos poderosos» o «hechos de poder» siguen siendo alternativas válidas en nota.
  issues:
  - severity: high
    issue: «proclamará» para יְשַׁבַּח
    rationale: El verbo hebreo en piel expresa alabanza; «proclamar» desplaza el sentido hacia anuncio público y duplica innecesariamente el campo semántico de יַגִּידוּ.
  - severity: high
    issue: «anunciará» en singular para יַגִּידוּ plural
    rationale: El hebreo tiene verbo plural y el paralelismo funciona mejor en español si se conserva el plural explícito o una estructura que lo refleje claramente.
  - severity: medium
    issue: La nota [a] no está bien alineada con la formulación principal
    rationale: Si el texto principal no usa una estructura cercana a «Generation to generation», la alternativa «De una generación a otra» pierde contraste; conviene ajustar texto y nota para que la alternativa sea real y clara.
  - severity: low
    issue: «poderosos hechos» suena menos natural que «hechos poderosos»
    rationale: Ambas opciones son comprensibles, pero «hechos poderosos» fluye mejor en español general y mantiene el matiz de hazañas poderosas.
