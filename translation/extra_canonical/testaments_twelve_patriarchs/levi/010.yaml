id: T12P.LEV.10
reference: Testament of Levi 10
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: X. *Καὶ τανῦν¹ φυλάξατε² *ὅσα ἐγὼ ἐντέλλομαι ὑμῖν, τέκνα, ἐπειδὴ ὅσα ἐγὼ ἤκουσα παρὰ τῶν πατέρων μου Γἀνήγγειλα ὑμῖν³⁾. 2. ΓΚαὶ ἰδοὺ⁴⁾ ἀθῷός εἰμι⁵ τῆς⁶ ἀσεβείας⁷ ὑμῶν⁸ *καὶ παραβάσεως⁹ ἣν ποιήσετε ἐπὶ *τῇ συντελείᾳ¹⁰ *τῶν αἰώνων¹¹ [εἰς τὸν σωτῆρα τοῦ κόσμου χριστόν]¹² *πλανῶντες τὸν Ἰσραήλ¹³, καὶ ἐπεγείροντες¹⁴ *ἐπ᾿ αὐτὸν¹⁵ κακὰ μεγάλα¹⁶ *παρὰ Κυρίου¹⁷. 3. Καὶ ἀνομήσετε¹⁸ *ἐν τῷ¹⁹ Ἰσραήλ²⁰, ὥστε μὴ βαστάζειν²¹ τὴν²² Ἱερουσαλήμ²³ ἀπὸ προσώπου τῆς²⁴ πονηρίας ὑμῶν, ἀλλὰ σχισθήσεται²⁵ τὸ καταπέτασμα²⁶ τοῦ ναοῦ, ὥστε μὴ καλύψαι²⁷ τὴν²⁸ ἀσχημοσύνην ὑμῶν. 4. Καὶ²⁹ διασπαρήσεσθε³⁰ αἰχμάλωτοι³¹ ἐν³² τοῖς ἔθνεσιν, καὶ ἔσεσθε *εἰς ὄνειδος καὶ εἰς κατάραν ἐκεῖ³³. 5. Ὁ γὰρ οἶκος, ὃν ἂν³⁴ ἐκλέξεται³⁵ Κύριος³⁶, *Ἱερουσαλὴμ κληθήσεται³⁷, καθὼς *περιέχει ἡ βίβλος³⁸ Ἐνὼχ τοῦ δικαίου.
  language: Greek
  source_pages:
  - 115
  - 116
translation:
  text: 1[v2]. And now, children, keep what I command you, since I have declared to you all that I heard from my fathers. 2[v2]. And behold, I am innocent of your ungodliness and transgression, which you will commit at the consummation of the ages [against the Savior of the world, the Messiah], misleading Israel and stirring up great evils from the Lord against him. 3. And you will act lawlessly in Israel, so that Jerusalem will not be able to bear it because of your wickedness; but the veil of the temple will be torn, so as no longer to cover your shame. 4. And you will be scattered as captives among the nations, and there you will be for reproach and for a curse. 5. For the house which the Lord will choose shall be called Jerusalem[v5][v3], as the book of Enoch the righteous contains.
  philosophy: optimal-equivalence
  footnotes:
  - marker: v2
    text: The words 'against the Savior of the world, the Messiah' are present in the Greek witness used here but are often regarded by scholars as a later Christian expansion; they are therefore retained in brackets.
    reason: textual_variant
  - marker: v2
    text: The clause 'stirring up great evils from the Lord against him' is syntactically difficult. The pronoun may be understood differently by interpreters.
    reason: alternative_reading
  - marker: v3
    text: Or 'curtain' for 'veil.' The image is the inner temple hanging.
    reason: lexical_alternative
  - marker: v5
    text: Reference to Enoch reflects the broader Second Temple literary world in which authoritative ancestral books could be cited outside the later biblical canon.
    reason: cultural_note
lexical_decisions:
- source_word: φυλάξατε
  chosen: keep
  alternatives:
  - guard
  - observe
  lexicon: LSJ
  rationale: In exhortational context, 'keep' naturally conveys obedient observance of commands without sounding overly wooden.
- source_word: ἐντέλλομαι
  chosen: I command
  alternatives:
  - I charge
  - I instruct
  lexicon: LSJ
  rationale: Preserves the testamentary authority and imperative force of Levi's speech.
- source_word: ἀθῷός εἰμι
  chosen: I am innocent
  alternatives:
  - I am guiltless
  - I am blameless
  lexicon: LSJ
  rationale: '''Innocent'' best expresses freedom from responsibility for the coming sins he predicts.'
- source_word: ἀσεβείας
  chosen: ungodliness
  alternatives:
  - impiety
  - godlessness
  lexicon: LSJ
  rationale: Retains the religious and covenantal dimension of the offense, not merely moral wrongdoing.
- source_word: παράβασις
  chosen: transgression
  alternatives:
  - violation
  - trespass
  lexicon: LSJ
  rationale: A standard rendering that preserves the sense of crossing a known boundary or command.
- source_word: συντέλεια τῶν αἰώνων
  chosen: the consummation of the ages
  alternatives:
  - the end of the ages
  - the completion of the ages
  lexicon: LSJ
  rationale: Keeps the apocalyptic register and avoids reducing the phrase to a merely chronological 'end time' cliché.
- source_word: σωτήρ
  chosen: Savior
  alternatives:
  - deliverer
  lexicon: LSJ
  rationale: The Greek title is weighty and should be rendered directly; 'deliverer' is possible but weaker in this prophetic context.
- source_word: χριστός
  chosen: Messiah
  alternatives:
  - Christ
  lexicon: LSJ
  rationale: Per project doctrine, title usage is translated as 'Messiah' to preserve its Hebraic sense.
- source_word: πλανῶντες
  chosen: misleading
  alternatives:
  - deceiving
  - leading astray
  lexicon: LSJ
  rationale: '''Misleading'' fits the participial construction and the communal effect on Israel.'
- source_word: ἐπεγείροντες
  chosen: stirring up
  alternatives:
  - provoking
  - bringing upon
  lexicon: LSJ
  rationale: 'Captures the causative force: their action incites or brings about divine evils/judgments.'
- source_word: κακὰ μεγάλα
  chosen: great evils
  alternatives:
  - great calamities
  - great troubles
  lexicon: LSJ
  rationale: The Greek is literally 'great evils'; in context it refers to disastrous judgments, but the literal wording preserves the prophetic severity.
- source_word: ἀνομήσετε
  chosen: you will act lawlessly
  alternatives:
  - you will commit lawlessness
  - you will transgress
  lexicon: LSJ
  rationale: Verbal rendering preserves the active, ongoing character of their rebellion.
- source_word: βαστάζειν
  chosen: endure
  alternatives:
  - bear
  - carry
  lexicon: LSJ
  rationale: With Jerusalem as subject and wickedness as cause, 'endure' best conveys inability to withstand the burden.
- source_word: καταπέτασμα
  chosen: veil
  alternatives:
  - curtain
  lexicon: LSJ
  rationale: '''Veil'' is the established cultic term in English and suits temple imagery.'
- source_word: ἀσχημοσύνη
  chosen: shame
  alternatives:
  - indecency
  - disgrace
  lexicon: LSJ
  rationale: The term can denote nakedness or indecency; 'shame' preserves both moral and exposure imagery in this prophetic setting.
- source_word: διασπαρήσεσθε
  chosen: you will be scattered
  alternatives:
  - you will be dispersed
  lexicon: LSJ
  rationale: A standard covenant-judgment term that echoes exile language.
- source_word: αἰχμάλωτοι
  chosen: as captives
  alternatives:
  - in captivity
  - captive
  lexicon: LSJ
  rationale: Keeps the exile image concrete and personal.
- source_word: ὄνειδος
  chosen: reproach
  alternatives:
  - disgrace
  - insult
  lexicon: LSJ
  rationale: Biblical register fits covenant curse language better than the more colloquial 'disgrace.'
- source_word: κατάρα
  chosen: curse
  alternatives:
  - accursed state
  lexicon: LSJ
  rationale: Direct and traditional rendering appropriate to judgment language.
- source_word: περιέχει
  chosen: contains
  alternatives:
  - records
  - includes
  lexicon: LSJ
  rationale: A restrained rendering for a citation formula referring to written content.
