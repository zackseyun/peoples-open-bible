revisions:
- from: Y hicieron nuevos los utensilios santos[a][b], y llevaron el candelabro, el altar de los holocaustos y de incienso, y la mesa al templo.
  to: Y hicieron utensilios sagrados nuevos[a], e introdujeron el candelabro, el altar de los holocaustos y de incienso, y la mesa en el templo[b].
  rationale: La revisión corrige el anclaje obligatorio de la nota sobre «templo», mejora la naturalidad de «σκεύη τὰ ἅγια καινά» en español, y hace más explícito el matiz de entrada de εἰσήνεγκαν ... εἰς τὸν ναόν con «introdujeron ... en el templo», sin añadir contenido no presente en el griego.
