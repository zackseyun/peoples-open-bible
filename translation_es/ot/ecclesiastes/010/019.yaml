translation:
  language: es
  text: Para la risa hacen pan[a], y el vino alegra la vida, y el dinero responde a todo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «preparan comida»; «pan» aquí puede referirse de manera amplia a alimento o a una comida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִשְׂחוֹק
  english_pob_choice: for laughter
  chosen_spanish: para la risa
  alternatives_spanish:
  - para la alegría
  - para el gozo
  - para la diversión
  lexicon: HALOT
  rationale: La preposición ל indica propósito o resultado; שְׂחוֹק refiere a risa o regocijo. 'Para la risa' conserva la concisión proverbial del hebreo y sigue de cerca la fuerza de finalidad del original.
- source_word: עֹשִׂים לֶחֶם
  english_pob_choice: they make bread
  chosen_spanish: hacen banquete
  alternatives_spanish:
  - hacen pan
  - preparan comida
  - preparan un festín
  lexicon: HALOT
  rationale: Aunque לֶחֶם es literalmente 'pan', en este contexto sapiencial puede funcionar metonímicamente por comida o un banquete. En español, 'hacen banquete' comunica mejor el sentido contextual que un 'pan' demasiado literal, sin perder la idea de provisión material asociada a la celebración o el consumo.
- source_word: וְיַיִן יְשַׂמַּח חַיִּים
  english_pob_choice: and wine gladdens life
  chosen_spanish: y el vino alegra la vida
  alternatives_spanish:
  - y el vino hace alegre la vida
  - y el vino alegra a los vivos
  - y el vino da alegría a la vida
  lexicon: HALOT
  rationale: יַיִן es 'vino' y el piel de שׂמח expresa causar alegría. חַיִּים puede leerse como 'vida' o 'los vivos'; 'la vida' es la opción más natural en español y mantiene el tono proverbial breve del hebreo.
- source_word: וְהַכֶּסֶף
  english_pob_choice: and money
  chosen_spanish: y el dinero
  alternatives_spanish:
  - y la plata
  - y el dinero de plata
  lexicon: HALOT
  rationale: כֶּסֶף puede significar 'plata' o 'dinero'. Aquí el sentido económico general es el que mejor encaja, por lo que 'dinero' comunica con claridad la idea proverbial en español moderno.
- source_word: יַעֲנֶה אֶת הַכֹּל
  english_pob_choice: answers everything
  chosen_spanish: responde a todo
  alternatives_spanish:
  - contesta a todo
  - da respuesta a todo
  - es la respuesta para todo
  lexicon: HALOT
  rationale: ענה suele significar 'responder'. La formulación 'responde a todo' mantiene la brusquedad y la tensión del hebreo, sin suavizarla con una paráfrasis explicativa.
theological_decisions:
- issue: Fuerza del cierre proverbial sobre el dinero
  english_pob_reading: Render the statement straightforwardly without inserting an interpretive qualifier such as 'seems to' or 'people think.'
  chosen_spanish_reading: Traducir la afirmación de manera directa, sin añadir marcadores como 'parece' o 'según algunos'.
  alternative_spanish_readings:
  - El dinero es la respuesta para todo.
  - El dinero lo resuelve todo.
  - El dinero parece responder a todo.
  rationale: El hebreo presenta una observación sentenciosa y abreviada, no una frase gramaticalmente marcada como irónica o modal. La traducción directa preserva la tensión literaria para que el contexto de Eclesiastés oriente la interpretación.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el borrador mantiene alta concordancia con el audit trail en los puntos léxicos y retiene la tensión proverbial del cierre sin explicitar ironía en el texto principal.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del versículo porque no aparece en el texto fuente.
  - Se evitó 'Cristo'/'Mesías' porque no aplica a esta unidad.
  - Se conservó el paralelismo breve del hebreo con tres miembros coordinados.
  - El marcador de nota [a] se ancla en 'banquete' para señalar la alternativa léxica de לֶחֶם.
