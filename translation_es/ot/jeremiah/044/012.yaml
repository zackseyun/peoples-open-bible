  language: en
  yaml_path: translation/ot/jeremiah/044/012.yaml
  text: And I will take the remnant of Judah who have set their faces to enter the land of Egypt to sojourn there[a], and they will all be consumed in the land of Egypt. They will fall by the sword and by famine; from the least even to the greatest, by the sword and by famine they will die, and they will become an oath, a horror, a curse, and a reproach.
  footnotes:
