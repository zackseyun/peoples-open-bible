translation:
  language: es
  text: los que se encienden de pasión entre los terebintos[a], debajo de todo árbol frondoso, los que degüellan a los niños en los wadis[b], debajo de las hendiduras de las rocas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre los encinos». El hebreo puede referirse a árboles sagrados en general; «terebintos» se elige aquí como el sentido más específico y probable en este contexto cultual.
    reason: lexical_alternative
  - marker: b
    text: O «en los valles». El hebreo se refiere a wadis o barrancos, a menudo cauces estacionales.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנֵּחָמִים
  english_pob_choice: you who burn with lust
  chosen_spanish: los que se encienden de pasión
  alternatives_spanish:
  - los que se inflaman
  - los que arden de deseo
  - los que se calientan
  lexicon: HALOT
  rationale: La forma participial en este contexto de culto idólatra y prácticas sexuales sugiere una imagen de excitación o ardor; en español, «se encienden de pasión» comunica esa fuerza sin sonar mecánico. Evita «confortan/consuelan», que seguiría otra línea semántica no adecuada al contexto.
- source_word: בָּאֵלִים
  english_pob_choice: among the terebinths
  chosen_spanish: entre los terebintos
  alternatives_spanish:
  - entre los encinos
  - entre los robles
  - entre los dioses
  lexicon: HALOT
  rationale: Aquí el contexto favorece árboles sagrados, no «dioses». «Terebintos» preserva la elección específica del POB en un término preciso y culto; «encinos» o «robles» son alternativas posibles, pero menos exactas en este contexto.
- source_word: תַּחַת כָּל עֵץ רַעֲנָן
  english_pob_choice: under every green tree
  chosen_spanish: debajo de todo árbol frondoso
  alternatives_spanish:
  - debajo de todo árbol verde
  - bajo todo árbol frondoso
  - debajo de todo árbol exuberante
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo para lugares de culto ilícito. «Frondoso» suena natural en español y conserva la imagen de vegetación densa sin forzar un calco demasiado literal de «verde».
- source_word: שֹׁחֲטֵי
  english_pob_choice: who slaughter
  chosen_spanish: los que degüellan
  alternatives_spanish:
  - los que matan
  - los que sacrifican al degollar
  lexicon: HALOT
  rationale: «Degüellan» mantiene la violencia concreta del verbo y encaja con el tono profético; «matan» sería demasiado general y perdería fuerza. «Sacrifican» podría sugerir un acto cultual más estrecho de lo que el hebreo exige.
- source_word: הַיְלָדִים
  english_pob_choice: the children
  chosen_spanish: a los hijos
  alternatives_spanish:
  - a los niños
  - a los pequeños
  - a la descendencia
  lexicon: HALOT
  rationale: El sustantivo amplio «children» puede expresarse en español como «hijos» cuando el objeto del verbo y el contexto de violencia cultual lo piden; esta opción mantiene la resonancia de descendencia/niñez sin introducir precisión innecesaria sobre edad o sexo.
- source_word: בַּנְּחָלִים
  english_pob_choice: in the wadis
  chosen_spanish: en los wadis
  alternatives_spanish:
  - en los valles
  - en las cañadas
  - en las quebradas
  lexicon: HALOT
  rationale: «Wadi» es el término geográfico más preciso para cauces o lechos de arroyo estacionales. Se conserva como préstamo por su exactitud; las alternativas más conocidas se reservarían para una nota explicativa.
- source_word: תַּחַת סְעִפֵי הַסְּלָעִים
  english_pob_choice: under the clefts of the rocks
  chosen_spanish: debajo de los salientes de las rocas
  alternatives_spanish:
  - debajo de las grietas de las rocas
  - debajo de las hendiduras de las rocas
  - debajo de los peñascos hendidos
  lexicon: HALOT
  rationale: סְעִיפֵי sugiere ramas/divisiones y, aplicado a rocas, por extensión puede indicar salientes, oquedades o grietas. «Salientes de las rocas» conserva la imagen de lugares ocultos y encaja bien con un español natural; «grietas» o «hendiduras» serían alternativas válidas.
theological_decisions:
- issue: Cómo expresar el trasfondo cultual y sexual del primer hemistiquio sin añadir interpretación excesiva
  english_pob_reading: Render the participle as 'burn with lust'
  chosen_spanish_reading: «se encienden de pasión»
  alternative_spanish_readings:
  - «se inflaman»
  - «arden de deseo»
  - «se calientan»
  rationale: La acusación profética apunta a prácticas idólatras con carga sexual. «Se encienden de pasión» mantiene esa fuerza expresiva en español sin cerrar el sentido a una sola formulación psicológica; así se preserva la tensión lexical que el hebreo y el POB destacan.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente hebreo y el audit trail inglés del POB. No se registran revisiones aplicadas en esta pasada; el borrador se mantiene alineado con la decisión inglesa de hacer explícita la fuerza cultual-sexual del primer participio y con las elecciones léxicas sobre árboles sagrados, wadis y salientes rocosos.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantiene la distinción entre «terebintos» y la alternativa explicada en nota para no perder la precisión léxica.
  - «Wadis» se deja como préstamo técnico para respetar la geografía del hebreo; la nota ofrece la alternativa más familiar.
  - El registro es sobrio y bíblico, pero con español moderno y comprensible para lectura eclesial.
