review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: la exhortación conclusiva, la idea legal de quitar/purgar la sangre inocente de la comunidad, la causalidad de כִּי, y la referencia a Yahvé. Sin embargo, «lo recto» en este contexto ético-jurídico suena menos natural que «lo correcto» o «lo que es recto», y la nota al pie introduce una opción («la sangre inocente de culpa») que no corresponde bien al hebreo ni al matiz del POB inglés, que habla de la posible responsabilidad comunitaria por sangre no expiada, no de una cualidad de la sangre como ‘inocente de culpa’.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero necesita un ajuste menor de naturalidad y precisión. «Así purgarás…» funciona bien. «De en medio de ti» es aceptable y fiel al singular colectivo. El punto principal a reparar es «lo recto», que resulta algo rígido; «lo correcto» comunica mejor en español general sin perder el sentido. La nota al pie también debe pulirse para sonar natural en español y alinearse mejor con la alternativa inglesa documentada.
  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: יְהוָה -> «Yahvé» está correctamente aplicado. No hay conflictos con otros términos clave del glosario. «Purgarás» preserva adecuadamente la fuerza de בער en contexto deuteronómico.'
  issues:
  - severity: medium
    issue: «lo recto» suena rígido y menos idiomático en español general
    rationale: Aunque semánticamente posible, «harás lo recto» es menos natural y menos claro para lectores amplios que «harás lo correcto» o «harás lo que es recto». Dado el objetivo de español moderno y ampliamente legible, conviene ajustar la formulación.
  - severity: medium
    issue: 'La nota al pie ofrece una alternativa mal formulada: «la sangre inocente de culpa»'
    rationale: Esa redacción no refleja bien el hebreo ni la nota inglesa auditada. El contraste adecuado es entre «la sangre inocente» y «la sangre del inocente», con explicación sobre la responsabilidad comunitaria por sangre derramada sin expiación.
  - severity: low
    issue: Comillas y puntuación de la nota mejorables
    rationale: La nota comienza con una comilla innecesaria y puede presentarse de forma más limpia y consistente con el estilo editorial.
  revised_spanish_text: Así purgarás la sangre inocente[a] de en medio de ti, porque harás lo correcto ante los ojos de Yahvé.
  revised_footnotes:
  - marker: a
    text: 'O: «la sangre del inocente». La expresión hebrea «sangre inocente» puede implicar la responsabilidad de la comunidad por sangre derramada sin expiación.'
    reason: lexical_alternative
  revision_rationale: 'Se mantiene la estructura y el contenido del borrador porque son fieles al hebreo y al POB inglés, pero se hace una reparación menor para mejorar la legibilidad y la precisión editorial en español: «lo recto» se cambia a «lo correcto», y la nota al pie se corrige para reflejar exactamente la alternativa léxica documentada y su explicación contextual.'
