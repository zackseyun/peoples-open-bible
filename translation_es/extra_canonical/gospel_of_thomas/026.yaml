  source_alignment_summary: Dicho 26 — Versión tomasina de la astilla y la viga (paralelos en Mateo 7:3-5 / Lucas 6:41-42), dicho de Jesús en discurso directo. El español preserva la asimetría «astilla / viga», la observación sobre la doble visión propia y ajena, y la condición temporal «cuando saques la viga… entonces verás claramente». No se interpola «hipócrita» (ausente en Tomás).
  spanish_quality_summary: Buen español, fluido. «La astilla… la viga» preserva el contraste de tamaño. «Verás claramente» es la lectura idiomática correcta de ⲉⲕⲛⲁⲛⲁⲩ ⲉⲃⲟⲗ.
  glossary_alignment: 'Terminología alineada con la pauta POB: «Jesús» para ⲓⲏⲥⲟⲩⲥ, ausencia de calcos eclesiásticos posteriores en términos tomasinos sensibles (monachos, reino, Padre). No se introduce «Yahvé» ni terminología ajena al texto fuente. Las decisiones léxicas y teológicas siguen las del expediente POB inglés y de la revisión española previa (gpt-5.4), que ya armonizó el texto con la documentación auditada.'
