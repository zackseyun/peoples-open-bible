    changes_summary: Changed 'lick him up' to 'wipe him out' to reflect the idiomatic sense of ἐκλεῖξαι ἐκ γῆς ζώντων while preserving the following simile about a calf licking up the field’s green growth. Left the rest substantially unchanged.
translation:
  language: es
  text: '1 Por tanto, confieso mi pecado[a], hijos: muchas veces quise matarlo, porque lo odiaba desde el alma. 2 Y a causa de los sueños aumenté mi odio contra él, y quise borrarlo[b] de la tierra de los vivientes, como un becerro lame los pastos verdes del campo. 3 Pero Judá lo vendió en secreto a los ismaelitas[c]. 4 Así, el Dios de nuestros padres lo libró de nuestras manos, para que no cometiéramos una gran iniquidad en Israel.


    3 Por tanto, Simeón y yo lo vendimos a los ismaelitas por treinta piezas de oro[d]; y, escondiendo diez, mostramos veinte a nuestros hermanos. 4 Y así, por la avaricia, quedamos plenamente persuadidos de su asesinato. 5 Pero el Dios de mis padres lo libró de mis manos, para que yo no cometiera una iniquidad en Israel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El capítulo conserva más de una forma textual del episodio de la venta de José. Esta traducción rinde ambos estratos sin armonizarlos.
    reason: textual_variant
  - marker: b
    text: Lit. 'lamerlo'; el verbo griego ἐκλεῖξαι es concreto, pero el revision_pass inglés optó por el sentido idiomático 'borrar/consumir', preservando el símil del becerro.
    reason: lexical_alternative
  - marker: c
    text: 'Algunos testigos atribuyen la venta secreta a Judá; otra rama dice: ''Por tanto, Simeón y yo lo vendimos a los ismaelitas por treinta piezas de oro''.'
    reason: textual_variant
  - marker: d
    text: '''Treinta piezas de oro'' refleja el griego en este punto; la línea sobre esconder diez y mostrar veinte pertenece también a esta rama variante.'
    reason: textual_variant
lexical_decisions:
- source_word: Ὁμολογῶ
  english_pob_choice: I confess
  chosen_spanish: confieso
  alternatives_spanish:
  - reconozco
  - admito
  lexicon: BDAG
  rationale: Conserva el tono confesional penitencial frente al más plano 'reconozco'.
- source_word: ἁμαρτίαν
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - ofensa
  lexicon: BDAG
  rationale: Termino moral-religioso estándar; preserva el peso teológico de la autoacusación.
- source_word: ἀνελεῖν
  english_pob_choice: to kill
  chosen_spanish: matarlo
  alternatives_spanish:
  - darle muerte
  - asesinarlo
  lexicon: BDAG
  rationale: Lenguaje claro y enérgico que refleja la intención homicida.
- source_word: ἐμίσουν ... ἐκ ψυχῆς
  english_pob_choice: I hated him from my soul
  chosen_spanish: lo odiaba desde el alma
  alternatives_spanish:
  - lo odiaba de todo corazón
  - lo odiaba profundamente
  lexicon: BDAG
  rationale: Conserva la intensidad semitizante del idiotismo griego.
- source_word: ἐνύπνια
  english_pob_choice: dreams
  chosen_spanish: sueños
  alternatives_spanish:
  - visiones oníricas
  lexicon: BDAG
  rationale: Rendido directamente; el contexto son los sueños de José.
- source_word: προσεθέμην ... τὸ μῖσος
  english_pob_choice: I added hatred
  chosen_spanish: aumenté mi odio
  alternatives_spanish:
  - añadí odio
  lexicon: BDAG
  rationale: Preserva la imagen verbal de odio acrecentándose, en español natural.
- source_word: ἐκλεῖξαι
  english_pob_choice: to wipe him out
  chosen_spanish: borrarlo
  alternatives_spanish:
  - consumirlo
  - lamerlo hasta hacerlo desaparecer
  lexicon: LSJ
  rationale: El revision_pass inglés cambió 'lick him up' a 'wipe him out' para captar la idiomática; 'borrarlo' funciona en español sin perder la fuerza, y se conserva el símil del becerro.
- source_word: ἐκ γῆς ζώντων
  english_pob_choice: from the land of the living
  chosen_spanish: de la tierra de los vivientes
  alternatives_spanish:
  - de entre los vivos
  lexicon: BDAG
  rationale: Idioma bíblico tradicional, transparente y de registro elevado.
- source_word: τὰ χλωρὰ τοῦ πεδίου
  english_pob_choice: the green growth of the field
  chosen_spanish: los pastos verdes del campo
  alternatives_spanish:
  - la hierba del campo
  - lo verde del campo
  lexicon: LSJ
  rationale: Capta el sentido neutro plural de vegetación verde sin sobreespecificar.
- source_word: κρυφῆ
  english_pob_choice: secretly
  chosen_spanish: en secreto
  alternatives_spanish:
  - a escondidas
  lexicon: BDAG
  rationale: Adverbio natural que conserva la acción clandestina.
- source_word: ἐρρύσατο
  english_pob_choice: rescued
  chosen_spanish: lo libró
  alternatives_spanish:
  - lo rescató
  - lo liberó
  lexicon: BDAG
  rationale: '''Librar'' es el verbo bíblico tradicional español para liberación de peligro inminente.'
- source_word: ἀνομίαν μεγάλην / ἀνόμημα
  english_pob_choice: a great lawless deed / a lawless deed
  chosen_spanish: una gran iniquidad / una iniquidad
  alternatives_spanish:
  - una gran maldad
  - un gran crimen
  lexicon: BDAG
  rationale: Conserva el peso jurídico-moral de ἀνομία; 'iniquidad' es el equivalente bíblico estándar.
- source_word: πλεονεξίᾳ
  english_pob_choice: through greed
  chosen_spanish: por la avaricia
  alternatives_spanish:
  - por codicia
  lexicon: BDAG
  rationale: Español natural y moderno que nombra el vicio con claridad.
- source_word: ἐπληροφορήθημεν
  english_pob_choice: we were fully persuaded of
  chosen_spanish: quedamos plenamente persuadidos de
  alternatives_spanish:
  - fuimos plenamente convencidos
  - fuimos llevados a la plenitud en
  lexicon: BDAG
  rationale: Refleja el revision_pass inglés (gpt-5.4) que corrigió 'fully set on' a 'fully persuaded'; 'plenamente persuadidos' captura el sentido de πληροφορέω.
- source_word: ἀναιρέσεως
  english_pob_choice: murder
  chosen_spanish: asesinato
  alternatives_spanish:
  - muerte
  - destrucción
  lexicon: BDAG
  rationale: Dada la intención personal e ilícita contra José, 'asesinato' expresa la fuerza moral.
theological_decisions:
- issue: Formas textuales divergentes en el capítulo (Judá lo vendió en secreto vs. Simeón y yo lo vendimos; un rescate en plural y otro en singular)
  chosen_reading: Traducir ambas formas tal como se conservan en el testimonio griego, presentando la doblez textual del capítulo en lugar de armonizarla.
  alternative_readings:
  - Fusionar las narraciones en un solo relato uniforme
  - Preferir un solo manuscrito y omitir el otro en la traducción
  rationale: El griego suministrado conserva material paralelo/variante. La transparencia exige rendir el testimonio existente con honestidad y dejar que las notas expliquen la tensión, en lugar de resolverla en silencio.
  doctrine_reference: DOCTRINE.md §Preservar la tensión teológica en lugar de resolverla
- issue: Significado de la imagen inusual ἐκλεῖξαι ... ὡς ... ἐκλείχει ὁ μόσχος
  chosen_reading: El revision_pass inglés optó por la lectura idiomática 'wipe him out'; en español traducimos 'borrarlo' y conservamos el símil del becerro lamiendo los pastos verdes inmediatamente después.
  alternative_readings:
  - Mantener la imagen literal 'lamerlo hasta consumirlo'
  - Rendir más generalmente 'consumirlo'
  rationale: Seguimos el revision_pass aplicado en el inglés POB; el símil del becerro se conserva intacto para preservar la imagen literaria del griego.
  doctrine_reference: DOCTRINE.md §Auditabilidad frente a glosa
translation_notes:
  revision_awareness: El revision_pass de gpt-5.4 cambió 'lick him up' por 'wipe him out' en el verso 2 para reflejar el sentido idiomático de ἐκλεῖξαι ἐκ γῆς ζώντων, conservando el símil del becerro. En español 'borrarlo' captura ese sentido idiomático sin perder fuerza, y el símil del becerro lamiendo los pastos verdes se conserva intacto.
  spanish_consistency_notes:
  - '''hijos'' en vocativo sin posesivo, siguiendo τέκνα.'
  - '''desde el alma'' para ἐκ ψυχῆς (consistente con el verso 1).'
  - '''librar'' como verbo estándar para ἐρρύσατο en este Testamento.'
  - '''iniquidad'' para ἀνομία/ἀνόμημα en todo el capítulo.'
