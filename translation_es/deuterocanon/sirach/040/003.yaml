  to: desde el que está sentado en un trono elevado[a], hasta el que vuelve al polvo y a la ceniza.
  rationale: Se revisa para restaurar לגבה con «elevado», que preserva la altura/exaltación del hebreo sin importar al texto principal la expansión interpretativa griega. También se añade la nota paralela griega con su anclaje correcto, ya que el borrador tenía un marcador sin nota y el audit trail inglés conserva esa información. El resto de la redacción se mantiene por ser fiel y natural en español.
