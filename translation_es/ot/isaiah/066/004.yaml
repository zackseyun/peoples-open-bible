translation:
  language: es
  text: Yo también escogeré para ellos un trato duro[a], y haré venir sobre ellos sus temores[b], porque llamé y nadie respondió; hablé y no escucharon; hicieron lo malo a mis ojos, y escogieron lo que no me agradó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'mofas', 'engaños' o 'abusos severos' para 'un trato duro' (heb. תַעֲלֻלֵיהֶם). El término hebreo es difícil y puede denotar un proceder severo o burlón como juicio.
    reason: lexical_alternative
  - marker: b
    text: O 'lo que temen' para 'sus temores'.
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם אֲנִי
  english_pob_choice: So I also
  chosen_spanish: Así que yo también
  alternatives_spanish:
  - Yo también
  - Y yo también
  lexicon: HALOT
  rationale: 'גַּם con el pronombre enfático expresa correspondencia reactiva: como ellos escogieron lo que Dios no deseaba, así Dios responde. ''Así que yo también'' conserva esa relación causal-retórica en español natural.'
- source_word: אֶבְחַר
  english_pob_choice: will choose
  chosen_spanish: escogeré
  alternatives_spanish:
  - elegiré
  - seleccionaré
  lexicon: HALOT
  rationale: El qal de בחר significa escoger/elegir. 'Escogeré' mantiene la conexión deliberada con el verbo final del versículo ('escogieron'), preservando la ironía del texto.
- source_word: בְּתַעֲלֻלֵיהֶם
  english_pob_choice: harsh treatment
  chosen_spanish: un trato duro
  alternatives_spanish:
  - mofas
  - engaños
  - abusos severos
  - tratos abusivos
  lexicon: HALOT
  rationale: El hebreo es difícil y puede abarcar trato caprichoso, ofensivo o severo. 'Un trato duro' comunica en español el sentido punitivo sin resolver indebidamente la ambigüedad lexical.
- source_word: וּמְגוּרֹתָם
  english_pob_choice: their fears
  chosen_spanish: sus temores
  alternatives_spanish:
  - lo que temen
  - sus terrores
  lexicon: HALOT
  rationale: מגוּרָה puede indicar temor o el objeto temido. 'Sus temores' es natural en español y permite entender que aquello que temen será lo que les sobrevendrá.
- source_word: אָבִיא לָהֶם
  english_pob_choice: I will bring ... upon them
  chosen_spanish: haré venir sobre ellos
  alternatives_spanish:
  - les traeré
  - haré caer sobre ellos
  lexicon: HALOT
  rationale: La construcción idiomática de juicio se expresa bien con 'hacer venir sobre ellos', que conserva la idea de envío/ocurrencia adversa y suena más idiomático que una traducción demasiado literal.
- source_word: יַעַן
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: HALOT
  rationale: Conjunción causal directa; 'porque' es la equivalencia más clara y fiel en español contemporáneo.
- source_word: קָרָאתִי וְאֵין עוֹנֶה
  english_pob_choice: I called and no one answered
  chosen_spanish: llamé, y nadie respondió
  alternatives_spanish:
  - llamé, y no hubo quien respondiera
  - llamé, y no respondieron
  lexicon: HALOT
  rationale: El participio con אֵין expresa la ausencia de respuesta. 'Nadie respondió' preserva la negativa personal y el tono de rechazo profético.
- source_word: דִּבַּרְתִּי וְלֹא שָׁמֵעוּ
  english_pob_choice: I spoke and they did not listen
  chosen_spanish: hablé, y no escucharon
  alternatives_spanish:
  - hablé, y no oyeron
  - les hablé, y no hicieron caso
  lexicon: HALOT
  rationale: En contexto profético, שׁמע va más allá de percibir sonidos y significa prestar atención/obedecer. 'No escucharon' comunica el rechazo culpable sin perder la literalidad básica.
- source_word: וַיַּעֲשׂוּ הָרַע בְּעֵינַי
  english_pob_choice: they did what was evil in my eyes
  chosen_spanish: hicieron lo malo ante mis ojos
  alternatives_spanish:
  - hicieron lo malo en mis ojos
  - hicieron el mal a mis ojos
  lexicon: HALOT
  rationale: La fórmula hebrea evaluativa se conserva con 'ante mis ojos', una expresión española clara que retiene la imagen de evaluación divina sin sonar forzada.
- source_word: וּבַאֲשֶׁר לֹא חָפַצְתִּי בָּחָרוּ
  english_pob_choice: and chose what I did not delight in
  chosen_spanish: y escogieron lo que no me complacía
  alternatives_spanish:
  - y escogieron lo que no me agradaba
  - y escogieron en lo que no me deleitaba
  lexicon: HALOT
  rationale: חפץ implica deleite, complacencia o deseo. 'No me complacía' conserva la dimensión afectiva-volitiva del verbo y corresponde bien al paralelo con 'escogieron'.
theological_decisions:
- issue: Naturaleza de la respuesta divina en juicio
  english_pob_reading: God judicially chooses punitive treatment corresponding to the people's prior choices.
  chosen_spanish_reading: Dios decide un trato punitivo correspondiente a las elecciones previas del pueblo.
  alternative_spanish_readings:
  - Dios entrega al pueblo a sus propias perversidades
  - Dios elige sus engaños o aberraciones como objeto de castigo
  rationale: 'El contexto inmediato y la mención de ''sus temores'' favorecen una lectura retributiva: Dios responde judicialmente a la desobediencia. La traducción evita atribuirle a Dios la maldad moral como objeto directo de su agrado, sin borrar la dureza del juicio.'
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del POB en inglés: se mantuvo el giro judicial sin añadir ''pero'' antes de ''hicieron lo malo'', y se preservó la ambigüedad de תַעֲלֻלֵיהֶם mediante una solución española que no cierra indebidamente el sentido.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' implícito por no aparecer el Tetragrámaton en este versículo.
  - Se tradujo בחר de forma consistente como 'escoger' para conservar la ironía con el verbo final del versículo.
  - Se usó 'escucharon' para שׁמע en sentido de atender/obedecer, no mero oír físico.
  - La construcción 'ante mis ojos' conserva la fórmula evaluativa hebrea sin cambiarla por una paráfrasis interpretativa.
