translation:
  language: es
  text: 'Así dice Yahvé de los ejércitos[a], el Dios de Israel: He quebrado el yugo del rey de Babilonia.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Yahvé de las huestes». El título hebreo צְבָאוֹת alude a las fuerzas celestiales y terrenales bajo el mando de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - Así es como
  lexicon: HALOT
  rationale: La fórmula profética introductoria requiere en español una partícula breve y elevada. «Así» conserva el valor sentencioso de la proclamación sin volverla rígida o arcaizante.
- source_word: אָמַר
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: Aunque el hebreo es perfectivo, en la fórmula fija de mensajero se presenta en español como presente de proclamación, manteniendo el carácter vigente de la declaración divina.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino como nombre propio, no como sustituto reverencial. «Yahvé» sigue el estándar del proyecto para יְהוָה y es natural en español bíblico moderno.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los huestes
  - de las huestes
  lexicon: HALOT
  rationale: «Hosts» en español suena menos transparente; «ejércitos» comunica el campo semántico de fuerzas bajo su mando y evita un calco poco idiomático. Mantiene la amplitud de la expresión sin borrar su fuerza militar/cósmica.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: La cadena constructa se traduce de forma directa y convencional, preservando la identificación pactual de Yahvé como Dios de Israel.
- source_word: שָׁבַרְתִּי
  english_pob_choice: I have broken
  chosen_spanish: He quebrado
  alternatives_spanish:
  - He roto
  - He quebrantado
  lexicon: HALOT
  rationale: El perfecto hebreo presenta la acción como consumada. «He quebrado» mantiene esa completitud y conserva el matiz de ruptura efectiva del yugo. «Quebrado» resulta más ajustado al simbolismo político que «roto».
- source_word: עֹל
  english_pob_choice: yoke
  chosen_spanish: yugo
  alternatives_spanish:
  - coyunda
  lexicon: HALOT
  rationale: «Yugo» es el equivalente metafórico establecido para opresión y dominio político en Jeremías, y en español conserva bien la imagen de sujeción.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: the king of Babylon
  chosen_spanish: el rey de Babilonia
  alternatives_spanish:
  - el rey babilónico
  lexicon: HALOT
  rationale: Se mantiene la estructura transparente del constructo y el referente político directo. «El rey de Babilonia» es la forma más clara y bíblicamente idiomática.
theological_decisions:
- issue: Título divino יְהוָה צְבָאוֹת
  english_pob_reading: Yahweh of hosts
  chosen_spanish_reading: Yahvé de los ejércitos
  alternative_spanish_readings:
  - Yahvé de las huestes
  rationale: El texto hebreo usa el nombre divino junto con el título צְבָאוֹת. En español, «de los ejércitos» comunica de modo natural la idea de fuerzas bajo su mando y evita una transliteración o un tecnicismo menos transparente. No se sustituye por «el SEÑOR», para preservar el nombre divino revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor verbal del perfecto שָׁבַרְתִּי
  english_pob_reading: I have broken
  chosen_spanish_reading: He quebrado
  alternative_spanish_readings:
  - Quebré
  rationale: El perfecto se vierte como presente perfecto para conservar el valor de acción completa con relevancia actual, siguiendo el criterio del POB en inglés. Esto ayuda a sostener la fuerza oracular de la declaración.
  doctrine_reference: Hebrew verbal aspect / discourse usage
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el audit trail más reciente; el pasaje muestra alto acuerdo entre revisiones y no requiere ajustes adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del nombre divino en todo el texto.
  - Se conserva el presente de proclamación «dice» para la fórmula profética.
  - «Yugo» se usa en sentido metafórico político, acorde con Jeremías y con la decisión inglesa auditada.
  - La puntuación con dos puntos reproduce la función introductoria de לֵאמֹר sin añadir palabras innecesarias.
