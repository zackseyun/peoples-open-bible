translation:
  language: es
  text: Y prodigó sus prostituciones[a] sobre ellos, sobre todos los hijos más escogidos de Asiria; y con todos aquellos a quienes codició con pasión[b], con todos sus ídolos[c] se contaminó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sus actos de prostitución».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo emplea imágenes sexuales explícitas («prostituciones», «codició con pasión») para representar infidelidad política, religiosa e idolátrica.
    reason: theological_note
  - marker: c
    text: «Ídolos» traduce el término despectivo que Ezequiel usa para los ídolos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּתֵּן
  english_pob_choice: she lavished
  chosen_spanish: derramó
  alternatives_spanish:
  - las prodigó
  - las dio
  lexicon: HALOT
  rationale: El hebreo dice literalmente “dio”, pero en esta construcción con «sobre ellos» y «sus prostituciones» la idea es de entregar u ofrecer abundantemente. «Derramó» comunica esa abundancia y el movimiento sobre el objeto sin volver la frase áspera o poco natural en español.
- source_word: תַּזְנוּתֶיהָ
  english_pob_choice: her prostitutions
  chosen_spanish: sus prostituciones
  alternatives_spanish:
  - sus fornicaciones
  - sus actos de prostitución
  - sus rameras
  lexicon: HALOT
  rationale: El sustantivo expresa actos de prostitución/infidelidad sexual y, en Ezequiel, carga metafórica para la infidelidad pactal e idolátrica. «Prostituciones» conserva la fuerza literal y metafórica que el texto exige.
- source_word: עֲלֵיהֶם
  english_pob_choice: on them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - contra ellos
  - encima de ellos
  lexicon: HALOT
  rationale: La preposición es “sobre/upon”. «Sobre ellos» sigue de cerca la imagen hebrea y funciona bien con el verbo elegido en español.
- source_word: מִבְחַר בְּנֵי אַשּׁוּר כֻּלָּם
  english_pob_choice: all the choicest sons of Assyria
  chosen_spanish: todos los más escogidos hijos de Asiria
  alternatives_spanish:
  - todos los hombres escogidos de Asiria
  - todo el mejor de los asirios
  lexicon: HALOT
  rationale: Se conserva בני como «hijos» porque el hebreo lo explicita. «Más escogidos» reproduce el valor de מִבְחַר como selección, elite o lo mejor, sin borrar el matiz concreto del texto.
- source_word: וּבְכֹל אֲשֶׁר עָגְבָה
  english_pob_choice: and with all those for whom she lusted
  chosen_spanish: y con todos aquellos por los cuales se encendió de deseo
  alternatives_spanish:
  - y con todos aquellos que deseó con pasión
  - y con todos los que codició
  lexicon: HALOT
  rationale: עגב expresa deseo erótico intenso. «Se encendió de deseo» preserva la intensidad sin sonar forzado; «por los cuales» refleja el relativo hebreo con claridad en español.
- source_word: בְּכָל גִּלּוּלֵיהֶם
  english_pob_choice: with all their idols
  chosen_spanish: con todos sus ídolos
  alternatives_spanish:
  - con todos sus ídolos repugnantes
  - con todos sus ídolos sucios
  lexicon: HALOT
  rationale: גִּלּוּלִים es el término despectivo de Ezequiel para los ídolos. La forma base «ídolos» conserva el referente; el matiz peyorativo se puede explicar, pero no siempre debe recargarse en el cuerpo del texto.
- source_word: נִטְמָאָה
  english_pob_choice: she defiled herself
  chosen_spanish: se contaminó
  alternatives_spanish:
  - se volvió impura
  - se profanó
  lexicon: HALOT
  rationale: 'El nifal de טמא aquí es resultativo/reflexivo: por su implicación idolátrica quedó impura. «Se contaminó» transmite el resultado moral-cultual con naturalidad en español; «se defile» sería menos idiomático.'
theological_decisions:
- issue: Metáfora sexual como figura de infidelidad política-religiosa e idolátrica
  english_pob_reading: Retain explicit sexual language ('prostitutions,' 'lusted') while allowing the broader prophetic metaphor of idolatry and political-religious unfaithfulness to stand implicit.
  chosen_spanish_reading: Mantener el lenguaje sexual explícito («prostituciones», «se encendió de deseo») y dejar implícita la metáfora profética más amplia de idolatría e infidelidad pactal.
  alternative_spanish_readings:
  - Suavizar a «infidelidades» o «deslealtades» en el texto principal
  rationale: Ezequiel usa a propósito un lenguaje fuerte y escandaloso. Suavizarlo borraría el filo retórico del profeta y reduciría la correspondencia con el hebreo.
  doctrine_reference: 'Principios de traducción POB: preservar la fuerza retórica y el tenor metafórico del original sin domesticarlo.'
- issue: Conservar el término kinésico masculino בני
  english_pob_reading: Use 'sons of Assyria' in the main text.
  chosen_spanish_reading: Usar «hijos de Asiria» en el texto principal.
  alternative_spanish_readings:
  - «hombres de Asiria»
  - «asirios»
  rationale: El hebreo dice literalmente «hijos». En este contexto los referidos son varones, y el mantenimiento del término conserva el dato formal del original.
  doctrine_reference: Principio de precisión léxica y respeto a las marcas gramaticales del hebreo cuando no obscurecen el sentido.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la solución inglesa auditada y mantiene las mismas decisiones clave: lenguaje sexual explícito, בני como «hijos», גִּלּוּלִים como «ídolos» y el nifal de טמא con sentido reflexivo/resultativo. No se registraron cambios recientes en la revisión final inglesa.'
  spanish_consistency_notes:
  - 'Se mantuvo un registro terminológico uniforme: «prostituciones», «ídolos», «se contaminó».'
  - «Se encendió de deseo» evita una paráfrasis excesiva y conserva la fuerza erótica del verbo hebreo.
  - La puntuación con dos puntos y punto y coma reproduce la progresión del hebreo sin sobreexplicar la metáfora.
