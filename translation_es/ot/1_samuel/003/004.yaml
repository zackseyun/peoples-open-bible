lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - llamó en voz alta
  - llamó por su nombre
  lexicon: HALOT
  rationale: El verbo narrativo en wayyiqtol expresa una llamada audible y directa. En español, «llamó» reproduce de forma natural esa acción sin añadir una paráfrasis innecesaria.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», conforme al criterio del proyecto en español. Evita la sustitución por un título y mantiene la referencia personal al nombre revelado.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - hacia
  lexicon: HALOT
  rationale: La preposición marca al destinatario de la llamada. En español, «llamó a Samuel» es la realización idiomática más natural y fiel.
- source_word: שְׁמוּאֵל
  english_pob_choice: Samuel
  chosen_spanish: Samuel
  lexicon: standard proper-name convention
  rationale: El nombre propio se mantiene en su forma usual en español.
- source_word: וַיֹּאמֶר
  english_pob_choice: he said
  chosen_spanish: y él dijo
  alternatives_spanish:
  - y dijo
  - entonces dijo
  lexicon: HALOT
  rationale: El sujeto implícito se entiende por el contexto como Samuel, respuesta directa a la llamada. Se explicita «él» para evitar ambigüedad en español sin alterar el sentido narrativo.
- source_word: הִנֵּנִי
  english_pob_choice: Here I am
  chosen_spanish: Aquí estoy
  alternatives_spanish:
  - Heme aquí
  - Presente
  lexicon: HALOT
  rationale: La fórmula hebrea expresa disponibilidad y presencia inmediata. «Aquí estoy» es la equivalencia natural y reverente en español; «heme aquí» sería más tradicional, pero menos transparente para lectores modernos.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. La traducción española debe preservar el nombre divino en forma transliterada; «Yahvé» sigue el criterio terminológico del proyecto y evita la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El inglés auditado no introdujo cambios de revisión ni pasajes alternativos; la concordancia de revisión se reporta como estable, con acuerdo alto y sin modificaciones en la última pasada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton, coherente con el estándar del proyecto.
  - Se traduce la respuesta formulaica הִנֵּנִי con una expresión natural en español sin perder su valor de disponibilidad inmediata.
  - No se añadieron elementos interpretativos ajenos al versículo; la sintaxis sigue la secuencia narrativa del hebreo.
