translation:
  language: es
  text: Cuando los caminos de un hombre agradan a Yahvé[a], hace que aun sus enemigos estén en paz con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «los caminos de una persona»; el hebreo dice literalmente «los caminos de un hombre», con fuerza representativa o genérica.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּרְצוֹת
  english_pob_choice: When ... is pleased with
  chosen_spanish: Cuando ... agradan a
  alternatives_spanish:
  - Cuando ... son agradables para
  - En el agradar de
  lexicon: HALOT
  rationale: La construcción con ב + infinitivo de רצה introduce una circunstancia temporal; en español, «Cuando ... agradan a» expresa con naturalidad que los caminos son aprobados por Yahvé, sin volver la frase pesada o artificial.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino como nombre propio, siguiendo el criterio del proyecto para יְהוָה, en lugar de sustituirlo por un título impersonal.
- source_word: דַּרְכֵי אִישׁ
  english_pob_choice: a man's ways
  chosen_spanish: los caminos de un hombre
  alternatives_spanish:
  - los caminos de una persona
  - los modos de vivir de un hombre
  lexicon: HALOT
  rationale: דַּרְכֵי puede abarcar conducta o curso de vida; «caminos» mantiene esa amplitud. Se conserva el singular masculino representativo de אִישׁ, con una nota para el sentido genérico.
- source_word: גַּם
  english_pob_choice: even
  chosen_spanish: aun
  alternatives_spanish:
  - también
  - incluso
  lexicon: HALOT
  rationale: '«Aun» comunica bien el valor enfático/concesivo de גַּם: no solo hay aprobación divina, sino que hasta los enemigos quedan afectados.'
- source_word: אֹיְבָיו
  english_pob_choice: his enemies
  chosen_spanish: a sus enemigos
  alternatives_spanish:
  - a los que le son hostiles
  - a sus adversarios
  lexicon: HALOT
  rationale: El sustantivo plural con sufijo posesivo se traduce de forma directa y natural como «sus enemigos».
- source_word: יַשְׁלִם
  english_pob_choice: he makes ... be at peace
  chosen_spanish: los pone en paz
  alternatives_spanish:
  - los reconcilia
  - hace que vivan en paz
  lexicon: HALOT
  rationale: El hifil de שלם aquí tiene valor causativo en un contexto de paz/relación. «Los pone en paz» conserva la idea de causar paz sin introducir una carga doctrinal más específica que la del hebreo.
- source_word: אִתּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  - para con él
  lexicon: HALOT
  rationale: La preposición marca relación o asociación; «con él» es la equivalencia más natural en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se mantiene el nombre personal de Dios en transliteración española establecida por el proyecto, preservando la referencia directa del Tetragrama sin convertirla en título.
  doctrine_reference: 'DOCTRINE.md § Contested terms: יְהוָה YHWH'
- issue: Sujeto genérico masculino אִישׁ
  english_pob_reading: a man's ways
  chosen_spanish_reading: los caminos de un hombre
  alternative_spanish_readings:
  - los caminos de una persona
  - los caminos de alguien
  rationale: El hebreo usa un singular masculino con fuerza representativa. Se conserva esa forma y se deja constancia de su valor genérico para no borrar el matiz del original.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de una construcción más literal («Cuando Yahvé está complacido con los caminos de un hombre») a una forma más natural («Cuando los caminos de un hombre agradan a Yahvé»). La redacción española sigue esa relación sintáctica más directa y mantiene la fuerza causativa de יַשְׁלִם con un verbo natural en español.
  spanish_consistency_notes:
  - Se conserva Yahvé para יְהוָה, conforme al criterio del proyecto.
  - Se evita «Cristo» u otras sustituciones tradicionales no pertinentes.
  - «Aun» refleja el valor enfático de גַּם mejor que «también» en este contexto.
  - «Los pone en paz» mantiene la idea de paz causada sin sobreespecificar reconciliación teológica.
