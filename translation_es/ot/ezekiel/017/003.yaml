    text: 'Hebreo: «que tenía bordado/variegación»; la frase probablemente alude metafóricamente a plumaje ricamente dibujado o multicolor.'
    reason: lexical_alternative
  revision_rationale: Se ajusta la fórmula profética a un español bíblico más natural («Así dice»), se mejora la precisión aviar de אֶרֶךְ הָאֵבֶר con «piniones», y se reemplaza el anglicismo «variegado» por «multicolores», preservando en la nota la metáfora de «bordado/variegación». Se mantiene «Señor Yahvé» conforme a la política del proyecto y «copa del cedro» como una opción española natural para la parte superior del árbol.
