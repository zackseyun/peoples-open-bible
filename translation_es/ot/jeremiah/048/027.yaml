translation:
  language: es
  text: ¿No era Israel para ti objeto de burla? ¿Acaso fue hallado él entre ladrones, para que cada vez que hablabas de él, meneabas la cabeza?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «agitabas la cabeza». El verbo hebreo puede denotar sacudir o menearse, y aquí probablemente señala un gesto de desprecio.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשְּׂחֹק
  english_pob_choice: a laughingstock
  chosen_spanish: objeto de burla
  alternatives_spanish:
  - ridículo
  - motivo de burla
  lexicon: HALOT
  rationale: El sustantivo expresa desprecio y escarnio. «Objeto de burla» conserva el valor de ridiculización sin sonar tan coloquial como «chiste» y sin cargar un matiz más fuerte que el hebreo.
- source_word: הָיָה לְךָ
  english_pob_choice: was ... to you
  chosen_spanish: era ... para ti
  alternatives_spanish:
  - fue ... para ti
  - te parecía
  lexicon: HALOT
  rationale: La construcción idiomática indica lo que Israel significaba para Moab. «Era ... para ti» reproduce la relación expresada por לְ sin forzar una paráfrasis.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Nombre propio mantenido por transparencia y continuidad bíblica.
- source_word: בְּגַנָּבִים
  english_pob_choice: among thieves
  chosen_spanish: entre ladrones
  alternatives_spanish:
  - con ladrones
  - en compañía de ladrones
  lexicon: HALOT
  rationale: '«Entre ladrones» sigue de cerca la imagen hebrea y conserva el contraste retórico: Israel no era tratado como si perteneciera a una banda criminal.'
- source_word: מִדֵּי
  english_pob_choice: whenever
  chosen_spanish: cada vez que
  alternatives_spanish:
  - cuandoquiera que
  - todas las veces que
  lexicon: HALOT
  rationale: La partícula señala repetición. «Cada vez que» comunica bien el carácter iterativo en español natural.
- source_word: דְבָרֶיךָ בּוֹ
  english_pob_choice: you spoke of him
  chosen_spanish: hablabas de él
  alternatives_spanish:
  - hablabas contra él
  - hablabas sobre él
  lexicon: HALOT
  rationale: El hebreo literalmente dice «tus palabras en él», un giro que en español se expresa mejor como hablar de alguien. Se evita añadir explícitamente «contra» porque el texto, aunque burlón en contexto, no lo marca de modo directo en la frase misma.
- source_word: תִּתְנוֹדָד
  english_pob_choice: you shook your head
  chosen_spanish: meneabas la cabeza
  alternatives_spanish:
  - agitabas la cabeza
  - movías la cabeza con desdén
  lexicon: HALOT
  rationale: El verbo puede implicar un movimiento de cabeza o un gesto de burla. «Meneabas la cabeza» es una expresión natural en español que preserva la fuerza gestual despectiva; «movías la cabeza con desdén» explicita demasiado la interpretación.
theological_decisions:
- issue: Tono de reproche y burla contra Moab
  english_pob_reading: Israel was a laughingstock to Moab, and Moab mocked Israel by head-shaking.
  chosen_spanish_reading: Israel fue objeto de burla para Moab; el gesto de menear la cabeza se conserva como burla visible.
  alternative_spanish_readings:
  - Israel fue una burla para ti
  - Israel fue motivo de escarnio para ti
  rationale: El verso acusa una actitud de menosprecio, no una simple observación neutral. La elección mantiene el reproche implícito en el hebreo y en la lectura inglesa, sin intensificarlo más allá de lo que el texto sustenta.
  doctrine_reference: None
translation_notes:
  revision_awareness: 'Se siguió la lectura inglesa auditada como apoyo, pero la redacción española se ajustó al hebreo: el objeto de burla se expresa con una construcción natural en español, y se mantuvo la ambigüedad del gesto final sin convertirla en una interpretación más fuerte de lo que el texto exige.'
  spanish_consistency_notes:
  - Se usó «Yahvé» en los casos donde corresponda; este versículo no lo contiene.
  - Se prefirió «objeto de burla» para conservar el matiz de escarnio sin vulgaridad.
  - «Meneabas la cabeza» mantiene el gesto idiomático con naturalidad en español.
  - La persona singular de «ti» y «hablabas» sigue el trato directo retórico del hebreo y del POB inglés.
