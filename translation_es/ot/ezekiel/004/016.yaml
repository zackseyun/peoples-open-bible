translation:
  language: es
  text: 'Entonces me dijo: «Hijo de hombre, he aquí, estoy quebrando el bastón del pan[a] en Jerusalén; y comerán pan por peso y con angustia, y beberán agua por medida y con horror».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el bastón del pan», un modismo para la provisión de pan o el sustento alimentario.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - hijo del hombre
  - ser humano
  lexicon: HALOT
  rationale: Mantiene la fórmula profética tradicional y su fuerza solemne. En Ezequiel no se trata de un título cristológico, sino de la forma de خطاب profético dirigida al profeta.
- source_word: הִנְנִי
  english_pob_choice: behold, I am
  chosen_spanish: he aquí, estoy
  alternatives_spanish:
  - miren, estoy
  - vean, estoy
  lexicon: HALOT
  rationale: Conserva el énfasis deíctico e inminente del hebreo sin omitirlo. En español, «he aquí» sostiene el tono profético y «estoy» reproduce el valor enfático de la forma con participio.
- source_word: שֹׁבֵר
  english_pob_choice: am breaking
  chosen_spanish: estoy quebrando
  alternatives_spanish:
  - estoy rompiendo
  - estoy a punto de quebrar
  lexicon: HALOT
  rationale: El participio con הִנְנִי expresa una acción cierta e inminente. «Quebrando» conserva la imagen de ruptura y el paralelismo con la metáfora del sustento.
- source_word: מַטֵּה לֶחֶם
  english_pob_choice: the staff of bread
  chosen_spanish: el bastón del pan
  alternatives_spanish:
  - el bastón del alimento
  - el sustento del pan
  lexicon: HALOT
  rationale: Se conserva la metáfora concreta del hebreo en lugar de sustituirla por una explicación. «Bastón» refleja mejor la imagen de soporte/vara que «vara» en este contexto, y la nota a pie explica el sentido idiomático de provisión de alimento.
- source_word: בִּירוּשָׁלִַם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - dentro de Jerusalén
  lexicon: HALOT
  rationale: Renderización locativa directa y natural.
- source_word: וְאָכְלוּ לֶחֶם בְּמִשְׁקָל
  english_pob_choice: they will eat bread by weight
  chosen_spanish: comerán pan por peso
  alternatives_spanish:
  - comerán pan pesado
  - comerán pan racionado
  lexicon: HALOT
  rationale: «Por peso» reproduce el instrumento de medida del hebreo y la escasez resultante. «Pan» es la forma natural del español para לֶחֶם en este contexto, manteniendo el paralelismo con agua.
- source_word: וּבִדְאָגָה
  english_pob_choice: with anxiety
  chosen_spanish: con angustia
  alternatives_spanish:
  - con ansiedad
  - con preocupación
  lexicon: HALOT
  rationale: דְאָגָה denota inquietud y ansiedad por la carestía. «Angustia» es una equivalencia más idiomática en español bíblico contemporáneo y mantiene el peso emocional del juicio.
- source_word: וּמַיִם בִּמְשׂוּרָה
  english_pob_choice: water by measure
  chosen_spanish: agua por medida
  alternatives_spanish:
  - agua medida
  - agua racionada
  lexicon: HALOT
  rationale: Conserva el paralelismo concreto con «por peso» y transmite la ración limitada de agua.
- source_word: וּבְשִׁמָּמ֖וֹן
  english_pob_choice: with horror
  chosen_spanish: con horror
  alternatives_spanish:
  - con desolación
  - con espanto
  lexicon: HALOT
  rationale: La elección sigue la lectura del POB inglés revisado a «with horror». En español, «con horror» preserva la fuerza de la reacción ante la desolación anunciada y mantiene el paralelo con «con angustia».
- source_word: יִשְׁתּוּ
  english_pob_choice: they will drink
  chosen_spanish: beberán
  alternatives_spanish:
  - tomarán
  - beberán de
  lexicon: HALOT
  rationale: Imperfecto futuro contextual en español, en paralelo con «comerán».
theological_decisions:
- issue: Metáfora de מַטֵּה לֶחֶם
  english_pob_reading: Keep the metaphor 'staff of bread' in the main text and explain the idiomatic sense in a footnote.
  chosen_spanish_reading: Conservar la metáfora «el bastón del pan» en el texto principal y explicar en nota que se trata de una expresión idiomática para la provisión de alimento.
  alternative_spanish_readings:
  - traducir como «el sustento del pan»
  - traducir como «la provisión de pan»
  rationale: La traducción principal respeta la imagen profética de ruptura del sustento, y la nota evita que el lector pierda el sentido idiomático. Así se mantiene la tensión entre imagen y significado, en línea con la primacía del texto fuente.
  doctrine_reference: 'Translation philosophy: original-language primacy; documented lexical tension preserved'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que mantuvo la estructura de la cláusula final y precisó «with horror» para mejorar el paralelismo con «with anxiety». La versión española refleja ese paralelismo con «con angustia» / «con horror».
  spanish_consistency_notes:
  - 'Se preserva el paralelismo poético: «por peso / con angustia» y «por medida / con horror».'
  - Se usa «pan» como equivalente contextual de לֶחֶם, sin alterar la metáfora principal del texto.
  - La nota a pie está anclada en la frase «el bastón del pan» para cumplir con la trazabilidad del sentido idiomático.
