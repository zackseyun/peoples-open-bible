translation:
  language: es
  text: 'Y los hijos de Israel dijeron[a]: «¿Quién de todas las tribus de Israel no subió a Yahvé en la asamblea?» Porque el gran juramento había sido hecho acerca de todo el que no subió a Yahvé en Mizpa, diciendo: «Ciertamente será puesto a muerte».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas dijeron».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva el giro hebreo corporativo y masculino sin neutralizarlo. En español, «los hijos de Israel» es claro y corresponde al valor formal del original, mientras que «los israelitas» suavizaría la forma pero perdería transparencia.
- source_word: מִי אֲשֶׁר
  english_pob_choice: Who is there ... who
  chosen_spanish: ¿Quién ... no
  alternatives_spanish:
  - ¿Quién ... que
  - ¿Cuál ... que
  lexicon: HALOT
  rationale: La pregunta busca identificar al individuo que no participó. En español, la construcción interrogativa directa con relativa implícita resulta natural y mantiene el sentido distributivo de la frase hebrea.
- source_word: עָלָה
  english_pob_choice: did not come up
  chosen_spanish: no subió
  alternatives_spanish:
  - no fue
  - no acudió
  lexicon: HALOT
  rationale: עלה se vierte con su sentido básico de «subir». En contexto de peregrinación/reunión cultual, «subió» conserva la dirección espacial y el vínculo con la asamblea sin añadir explicaciones.
- source_word: בַקָּהָל
  english_pob_choice: in the assembly
  chosen_spanish: en la asamblea
  alternatives_spanish:
  - en la congregación
  - ante la asamblea
  lexicon: HALOT
  rationale: קהל designa la reunión del pueblo. «Asamblea» refleja bien el término y evita el matiz eclesiástico de «congregación».
- source_word: אֶל יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - hacia Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino según la norma del proyecto. El valor preposicional es directo; «a Yahvé» reproduce la orientación del hebreo sin convertirla en una paráfrasis.
- source_word: הַשְּׁבוּעָה הַגְּדוֹלָה
  english_pob_choice: the great oath
  chosen_spanish: el gran juramento
  alternatives_spanish:
  - el juramento grande
  - el solemne juramento
  lexicon: HALOT
  rationale: «Juramento» es el equivalente natural en español para שְׁבוּעָה. Se opta por «gran» para conservar el adjetivo sin sobreinterpretar su fuerza legal o emotiva.
- source_word: הָיְתָה לַאֲשֶׁר
  english_pob_choice: had been made concerning whoever
  chosen_spanish: había sido hecho acerca de todo el que
  alternatives_spanish:
  - había recaído sobre todo el que
  - se había pronunciado contra todo el que
  lexicon: HALOT
  rationale: La construcción expresa una obligación/juramento vinculada a quien no subió. «Acerca de todo el que» comunica esa referencia legal sin fijar un matiz preposicional más fuerte de lo que el hebreo exige.
- source_word: הַמִּצְפָּה
  english_pob_choice: at Mizpah
  chosen_spanish: en Mizpa
  alternatives_spanish:
  - en la Mizpa
  - a Mizpa
  lexicon: HALOT
  rationale: Los topónimos en español normalmente no llevan artículo. Se conserva la forma geográfica habitual «Mizpa».
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - a saber
  lexicon: HALOT
  rationale: Fórmula introductoria estándar para el contenido citado.
- source_word: מוֹת יוּמָת
  english_pob_choice: He shall surely be put to death
  chosen_spanish: De cierto, morirá
  alternatives_spanish:
  - Morirá sin falta
  - Ciertamente morirá
  - Será condenado a muerte
  lexicon: HALOT
  rationale: La construcción intensiva expresa certeza de muerte; en español, «De cierto, morirá» mantiene la fuerza jurídica sin añadir el pasivo explícito que el hebreo formula de manera idiomática. Se preserva la severidad del juramento.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se sigue la convención del proyecto para YHWH. En este versículo el nombre aparece de forma directa, y «Yahvé» preserva la identidad propia del nombre divino sin ocultarlo bajo una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Gendered corporate expression בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel
  rationale: Se conserva el plural masculino corporativo del hebreo, conforme a la política de transparencia de género gramatical cuando el original lo marca así.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La redacción incorpora la revisión más reciente del audit trail inglés, que reordenó la frase equivalente a «come up to Yahweh in the assembly» para reflejar mejor la relación hebrea entre la asamblea y Yahvé. En español, esto se reflejó manteniendo «a Yahvé en la asamblea» como orden natural y fiel al original.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton, conforme al estándar del proyecto.
  - Se conserva «hijos de Israel» para el valor corporativo masculino del hebreo.
  - «Asamblea» se emplea como equivalente de קהל en contexto no eclesiástico.
  - «Juramento» traduce שְׁבוּעָה con su fuerza legal; no se reemplaza por «promesa».
