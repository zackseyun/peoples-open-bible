translation:
  language: es
  text: Los que temen a Yahvé no se rebelarán contra sus caminos[a], y los que lo aman guardarán sus senderos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: ''no desobedecerán sus palabras'' en vez de ''no se rebelarán contra sus caminos''. El testigo hebreo de Qumrán/Cairo es primario aquí, pero el griego confirma el sentido general de obediencia fiel.'
    reason: alternative_reading
lexical_decisions:
- source_word: יִרְאֵי יְהֹוָה
  english_pob_choice: those who fear Yahweh
  chosen_spanish: los que temen a Yahvé
  alternatives_spanish:
  - los que reverencian a Yahvé
  - los temerosos de Yahvé
  lexicon: HALOT
  rationale: El participio describe a un grupo caracterizado por el temor a Dios. 'Temen' conserva la fuerza sapiencial y de pacto del hebreo y mantiene el paralelo con la elección inglesa de 'fear Yahweh'. 'Reverencian' suaviza demasiado el término.
- source_word: לֹא יַמְרוּ
  english_pob_choice: will not rebel
  chosen_spanish: no se rebelarán
  alternatives_spanish:
  - no desobedecerán
  - no serán desafiantes
  lexicon: HALOT
  rationale: מָרָה en este contexto expresa resistencia o rebelión, no solo una falta de obediencia. 'Rebelarán' preserva esa fuerza y sigue la decisión inglesa principal.
- source_word: בִּדְרָכָיו
  english_pob_choice: against his ways
  chosen_spanish: contra sus caminos
  alternatives_spanish:
  - en sus caminos
  - sus caminos
  lexicon: HALOT
  rationale: El hebreo puede llevar aquí el valor de oposición. 'Contra' hace explícita la relación de resistencia que el texto sugiere, y 'caminos' mantiene la metáfora bíblica habitual para la conducta de Yahvé.
- source_word: וְאוֹהֲבָיו
  english_pob_choice: those who love him
  chosen_spanish: los que lo aman
  alternatives_spanish:
  - sus amantes
  - los que le aman
  lexicon: HALOT
  rationale: La frase identifica a una clase de personas por su amor a Dios. 'Lo aman' es natural en español y conserva el objeto personal del sufijo.
- source_word: יִצְרוּ
  english_pob_choice: will keep
  chosen_spanish: guardarán
  alternatives_spanish:
  - conservarán
  - observarán
  - mantendrán
  lexicon: HALOT
  rationale: נצר puede significar guardar, vigilar o preservar. 'Guardarán' conserva la idea de cuidado fiel y encaja bien con el campo semántico de obediencia sabia.
- source_word: אָרְחוֹתָיו
  english_pob_choice: his paths
  chosen_spanish: sus senderos
  alternatives_spanish:
  - sus caminos
  - sus huellas
  lexicon: HALOT
  rationale: אָרַח/אֹרַח designa un sendero o curso. Se eligió 'senderos' para diferenciarlo de 'caminos' en el primer colon y preservar la variación poética del hebreo.
theological_decisions:
- issue: Nombre divino יְהֹוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El texto hebreo contiene el Tetragrámaton y la política terminológica del proyecto pide 'Yahvé' en el texto principal. Se evita 'SEÑOR' porque oculta el nombre divino; 'Yahweh' es posible, pero 'Yahvé' es la forma establecida para el español de este proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהֹוָה YHWH'
- issue: Relación entre el hebreo y el paralelo griego
  english_pob_reading: Greek parallel supports the same overall sense of faithful obedience
  chosen_spanish_reading: El paralelo griego apoya el mismo sentido general de obediencia fiel
  alternative_spanish_readings:
  - 'El griego dice: ''no desobedecerán sus palabras'''
  - 'El griego ofrece una lectura alternativa más fuerte: ''no desobedecerán sus palabras'''
  rationale: El hebreo primario habla de rebelarse 'contra sus caminos', mientras que el griego tiene 'no desobedecerán sus palabras'. La nota española conserva esa tensión sin sustituir el hebreo, pero deja visible que el griego concreta el objeto como 'palabras'.
  doctrine_reference: Principio de prioridad del testigo hebreo con apoyo del paralelo griego
- issue: Verbo de obediencia final
  english_pob_reading: will keep his paths
  chosen_spanish_reading: guardarán sus senderos
  alternative_spanish_readings:
  - observarán sus senderos
  - preservarán sus senderos
  rationale: '''Guardar'' conserva la resonancia de fidelidad observante y también permite la idea de vigilar/proteger. ''Senderos'' refleja la imagen poética sin nivelarla con el primer colon.'
  doctrine_reference: Poética hebrea y léxico de נצר / אָרַח
translation_notes:
  revision_awareness: Se revisó el testimonio hebreo primario de Kahana y el paralelo griego de Swete. La versión inglesa POB optó por 'rebel against his ways' siguiendo el hebreo; para el español se preserva esa lectura y se introduce una nota que deja visible la variante griega 'sus palabras' sin anular el texto hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al estándar del proyecto en español.
  - Se distingue 'caminos' / 'senderos' para respetar la variación poética del hebreo.
  - '''Temen'' y ''guardarán'' conservan un registro bíblico natural sin caer en arcaísmos innecesarios.'
  - La nota [a] se ancla en 'caminos' porque ahí está la tensión textual principal.
