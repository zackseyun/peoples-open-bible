id: EZK.33.20
reference: Ezekiel 33:20
source:
  edition: WLC
  text: וַ/אֲמַרְתֶּ֕ם לֹ֥א יִתָּכֵ֖ן דֶּ֣רֶךְ אֲדֹנָ֑/י אִ֧ישׁ כִּ/דְרָכָ֛י/ו אֶשְׁפּ֥וֹט אֶתְ/כֶ֖ם בֵּ֥ית יִשְׂרָאֵֽלפ
translation:
  text: Yet you say[a], ‘The way of the Lord is not just.’ I will judge each of you according to his ways[b], O house of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'The way of the Lord is not fair' or 'is not right.' The Hebrew expression concerns whether God's manner of judgment is considered equitable.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'each man according to his ways.' The verse addresses the house of Israel as a whole while stressing individual accountability.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲמַרְתֶּם
  chosen: Yet you say
  alternatives:
  - And you say
  - But you say
  lexicon: HALOT
  rationale: The waw with qatal here continues the discourse with an adversative nuance in context, responding to Israel's complaint. 'Yet' captures the contrast with the preceding divine defense better than a simple 'and.'
- source_word: לֹא יִתָּכֵן
  chosen: is not just
  alternatives:
  - is not right
  - is not fair
  - is not established
  lexicon: HALOT
  rationale: The Niphal of תכן in this idiom conveys that the Lord's way is not considered right, proper, or equitable by the people. In Ezekiel this complaint concerns divine fairness in judgment, so 'is not just' best conveys the forensic sense in natural English.
- source_word: דֶּרֶךְ אֲדֹנָי
  chosen: the way of the Lord
  alternatives:
  - the Lord's way
  lexicon: HALOT
  rationale: דֶּרֶךְ is a common metaphor for manner, conduct, or course of action. 'The way of the Lord' preserves the Hebrew idiom while remaining clear. אֲדֹנָי is rendered 'Lord' in keeping with the project's default for divine title terms.
- source_word: אֲדֹנָי
  chosen: the Lord
  alternatives:
  - Lord
  lexicon: HALOT
  rationale: This is the divine title 'Adonai,' not the Tetragrammaton. The project's contested-terms table specifies 'Lord' as the default rendering for this title family. The article is included in English because the phrase is idiomatic as 'the way of the Lord.'
- source_word: אִישׁ
  chosen: each man of you
  alternatives:
  - each one of you
  - each person of you
  lexicon: HALOT
  rationale: The singular distributive אִישׁ introduces individual accountability. Per the doctrine's gender-accurate principle, 'man' is retained rather than neutralized, while 'each' makes the distributive force explicit.
- source_word: כִּדְרָכָיו
  chosen: according to his ways
  alternatives:
  - according to his way
  - according to his conduct
  lexicon: HALOT
  rationale: The plural 'ways' is the Hebrew form and commonly denotes patterns of conduct. 'According to his ways' preserves the idiom and matches the distributive singular introduced by אִישׁ.
- source_word: אֶשְׁפּוֹט אֶתְכֶם
  chosen: I will judge each man of you
  alternatives:
  - I will judge you
  - I will pass judgment on you
  lexicon: HALOT
  rationale: 'שׁפט here is judicial. The object ''you'' is made distributive in English by carrying forward the force of אִישׁ: God judges the community by judging each individual within it.'
- source_word: בֵּית יִשְׂרָאֵל
  chosen: O house of Israel
  alternatives:
  - house of Israel
  lexicon: HALOT
  rationale: A direct address is natural here and reflects the prophetic vocative force. 'House of Israel' is the standard rendering for the covenant people as a corporate entity.
