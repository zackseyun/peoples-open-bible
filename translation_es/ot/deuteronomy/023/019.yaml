revisions:
- from: No llevarás a la casa de Yahvé tu Dios la paga de una prostituta[a] ni el precio de un perro, para ningún voto, porque ambos son una abominación para Yahvé tu Dios.
  to: No llevarás a la casa de Yahvé tu Dios la paga de una prostituta ni el precio de un perro[a], por cualquier voto, porque ambos son una abominación para Yahvé tu Dios.
  rationale: Se corrige el anclaje de la nota para que recaiga sobre «perro», que es el término realmente debatido en el hebreo. También se mejora la redacción de la nota para un español natural y preciso, y se ajusta «para ningún voto» a «por cualquier voto» para reflejar mejor לְכָל נֶדֶר sin añadir interpretación innecesaria.
