revisions:
- from: 'Y él les dijo: «Así dice Yahvé, el Dios de Israel: Ponga cada hombre su espada sobre su muslo. Pasen y vuelvan de puerta en puerta por el campamento, y maten cada hombre a su hermano, y cada hombre a su compañero, y cada hombre a su pariente».[a]'
  to: 'Y él les dijo: «Así dice Yahvé, el Dios de Israel: Que cada hombre ponga su espada sobre su muslo. Pasen y vuelvan de puerta en puerta por el campamento, y maten cada hombre a su hermano, y cada hombre a su compañero, y cada hombre a su allegado[a]»'
  rationale: Se corrige el mandato distributivo al español idiomático y fiel ('Que cada hombre ponga...'), se mueve la nota al término que realmente comenta, y se ajusta קְרֹבוֹ a 'allegado' para reflejar mejor la amplitud semántica preservada por el English POB, dejando las alternativas más estrechas o distintas en la nota.
