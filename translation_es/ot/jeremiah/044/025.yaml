    reason: theological_note
  revision_rationale: Se corrige la principal falla de claridad ('hemos votado') por una formulación natural y fiel en español ('hemos hecho'), se restauran los plurales concretos boca/manos, se explicita el objeto implícito de 'cumplieron', y se fortalece el tono concesivo-irónico final con 'Adelante'. Las notas se ajustan al texto revisado y preservan las alternativas relevantes del hebreo.
