  glossary_alignment: No hay términos teológicos mayores en juego. El borrador respeta bien las decisiones léxicas del proyecto salvo θροῦς, donde conviene alinearse con la rationale auditada y usar «procesión ruidosa» o equivalente. «Hermanos» preserva correctamente ἀδελφοί; «armas» preserva ὅπλων.
