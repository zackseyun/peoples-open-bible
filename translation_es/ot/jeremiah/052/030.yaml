translation:
  language: es
  text: En el año veintitrés de Nabucodonosor, Nebuzaradán, el capitán de la guardia, deportó[a] a 745 judíos[b]. El total de personas fue 4.600[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “llevó al exilio” o “desterró”. El verbo hebreo significa causar que alguien vaya al exilio.
    reason: lexical_alternative
  - marker: b
    text: Hebreo “almas” (נֶפֶשׁ) en ambos conteos; aquí es un modismo para personas.
    reason: lexical_alternative
  - marker: c
    text: El total de 4.600 resume a los deportados listados en los versículos 28–30.
    reason: cross_reference
lexical_decisions:
- source_word: בִּשְׁנַת שָׁלֹשׁ וְעֶשְׂרִים
  english_pob_choice: In the twenty-third year
  chosen_spanish: En el año veintitrés
  alternatives_spanish:
  - En el año tercero y veinte
  - En el año veintitrés
  lexicon: HALOT
  rationale: La fórmula hebrea de datación regnal se expresa de modo natural en español con el ordinal 'veintitrés', manteniendo el valor temporal sin reproducir el orden hebreo de las cifras.
- source_word: לִנְבוּכַדְרֶאצַּר
  english_pob_choice: of Nebuchadnezzar
  chosen_spanish: de Nabucodonosor
  alternatives_spanish:
  - de Nebucodonosor
  - de Nabucodonosor rey
  lexicon: HALOT
  rationale: Se translitera el nombre propio en su forma española tradicional ampliamente reconocible, conservando el referente histórico del reinado de Nabucodonosor.
- source_word: הֶגְלָה
  english_pob_choice: carried away
  chosen_spanish: deportó
  alternatives_spanish:
  - llevó al exilio
  - desterró
  - hizo exiliar
  lexicon: HALOT
  rationale: El hebreo en hifil indica causar que alguien vaya al exilio. 'Deportó' comunica bien la acción histórica y mantiene la fuerza causal; 'llevó al exilio' queda como alternativa más explicativa.
- source_word: נְבוּזַרְאֲדָן
  english_pob_choice: Nebuzaradan
  chosen_spanish: Nebuzaradán
  alternatives_spanish:
  - Nebuzaradan
  lexicon: transliteration policy
  rationale: Se usa la transliteración española usual con acento final, adaptando la forma del nombre propio al español de manera legible.
- source_word: רַב טַבָּחִים
  english_pob_choice: the captain of the guard
  chosen_spanish: el capitán de la guardia
  alternatives_spanish:
  - el jefe de los verdugos
  - el jefe de los ejecutores
  lexicon: HALOT
  rationale: Se conserva la equivalencia idiomática ya establecida para este título oficial. En español, 'capitán de la guardia' transmite el cargo sin imponer una lectura demasiado literal del etimológico 'carniceros/ejecutores'.
- source_word: יְהוּדִים
  english_pob_choice: Judeans
  chosen_spanish: judeos
  alternatives_spanish:
  - judíos
  - hombres de Judá
  lexicon: HALOT
  rationale: Se mantiene la distinción etnogeográfica de 'Judeans' mejor que 'judíos', que en español suele inclinarse más hacia la identidad religiosa posterior. 'Judeos' es menos común, pero conserva mejor el matiz histórico de la población de Judá.
- source_word: נֶפֶשׁ
  english_pob_choice: persons
  chosen_spanish: personas
  alternatives_spanish:
  - almas
  - gentes
  lexicon: HALOT
  rationale: En este contexto de conteo, נֶפֶשׁ funciona como término enumerativo de individuos. 'Personas' evita el sentido metafísico de 'almas' y refleja de modo natural el valor de censo.
- source_word: שְׁבַע מֵאוֹת אַרְבָּעִים וַחֲמִשָּׁה
  english_pob_choice: '745'
  chosen_spanish: '745'
  alternatives_spanish:
  - setecientas cuarenta y cinco
  lexicon: HALOT
  rationale: Los números arábigos preservan el dato exacto y facilitan la lectura, como en el texto inglés auditado.
- source_word: כָּל נֶפֶשׁ
  english_pob_choice: All the persons
  chosen_spanish: Todas las personas
  alternatives_spanish:
  - El total de personas
  - Todas las almas
  lexicon: HALOT
  rationale: La fórmula sumaria final se vierte de forma cercana y natural. 'Personas' mantiene el valor de conteo del hebreo y evita el doble sentido de 'almas'.
- source_word: אַרְבַּעַת אֲלָפִים וְשֵׁשׁ מֵאוֹת
  english_pob_choice: 4,600
  chosen_spanish: 4,600
  alternatives_spanish:
  - cuatro mil seiscientos
  lexicon: HALOT
  rationale: Se conserva la cifra exacta en formato numérico para facilitar la lectura y reflejar el total resumido del versículo.
theological_decisions:
- issue: 'Identidad de la población deportada: ''Judeans'' frente a ''judíos'''
  english_pob_reading: Judeans
  chosen_spanish_reading: judeos
  alternative_spanish_readings:
  - judíos
  - hombres de Judá
  rationale: El contexto exílico favorece una designación etnogeográfica ligada a Judá. Aunque 'judíos' es la forma más común en español, 'judeos' evita proyectar de manera automática una identidad religiosa posterior ajena al matiz histórico del pasaje.
  doctrine_reference: Historia bíblica del exilio; distinción contextual entre Judá e Israel/Israelitas
- issue: 'נֶפֶשׁ en conteos: ''soul'' vs. ''person'''
  english_pob_reading: persons
  chosen_spanish_reading: personas
  alternative_spanish_readings:
  - almas
  - gente
  rationale: El conteo de deportados usa נֶפֶשׁ como unidad de personas, no como afirmación doctrinal sobre el alma. 'Personas' conserva el valor numérico y evita una carga antropológica no presente en el contexto.
  doctrine_reference: Uso léxico del AT; antropología bíblica contextual
- issue: Título רַב טַבָּחִים
  english_pob_reading: the captain of the guard
  chosen_spanish_reading: el capitán de la guardia
  alternative_spanish_readings:
  - el jefe de los verdugos
  - el jefe de los ejecutores
  rationale: El título funciona aquí como cargo administrativo-militar reconocido por la tradición de traducción; en español, 'capitán de la guardia' comunica mejor su función histórica sin forzar una traducción demasiado cruda del componente literal.
  doctrine_reference: Traducción de cargos oficiales en narrativa histórica
translation_notes:
  revision_awareness: Se revisó el pasaje con alta concordancia entre el texto fuente hebreo y el audit trail inglés. No se registraron revisiones aplicadas; por ello, el borrador español sigue la lectura estable del POB inglés, ajustando únicamente la naturalidad del español y la transliteración al uso hispano.
  spanish_consistency_notes:
  - Se mantiene 'Nabucodonosor' para el nombre del rey y 'Nebuzaradán' para el oficial, con transliteración española consistente.
  - Se conserva el valor enumerativo de נֶפֶשׁ como 'personas' tanto en el conteo parcial como en el total.
  - La cifra final se presenta en números arábigos para coherencia con el audit trail inglés y legibilidad editorial.
  - La nota sobre 'llevó al exilio' se ofrece como alternativa lexical, sin diluir la opción principal 'deportó'.
