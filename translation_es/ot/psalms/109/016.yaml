translation:
  language: es
  text: Porque no recordó[a] mostrar bondad, sino que persiguió al pobre y necesitado[b], y al quebrantado de corazón[b], para darles muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no recordó practicar misericordia». חָסֶד puede también tener el sentido de lealtad amorosa o fidelidad de pacto, pero aquí se refiere a bondad concreta mostrada a personas vulnerables.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «el hombre pobre y necesitado, y el quebrantado de corazón». El singular probablemente tiene un valor representativo y describe la clase de persona a la que perseguía.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַן אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: La construcción causal introduce la razón del juicio; «Porque» comunica con naturalidad esa relación causal en español y mantiene el valor explicativo.
- source_word: לֹא זָכַר עֲשׂוֹת חָסֶד
  english_pob_choice: did not remember to show kindness
  chosen_spanish: no recordó hacer misericordia
  alternatives_spanish:
  - no recordó mostrar bondad
  - no recordó practicar misericordia
  lexicon: HALOT
  rationale: זָכַר con infinitivo expresa no tener presente algo hasta el punto de actuar. «Hacer misericordia» refleja el verbo con sustantivo de acción y conserva la amplitud de חָסֶד sin forzar solo una acepción de lealtad de pacto.
- source_word: וַיִּרְדֹּף
  english_pob_choice: but pursued
  chosen_spanish: sino persiguió
  alternatives_spanish:
  - y persiguió
  - pero persiguió
  lexicon: HALOT
  rationale: 'En español, después de una negación previa, «sino» expresa mejor el contraste adversativo: no mostró misericordia, sino que actuó opuestamente persiguiendo a los vulnerables.'
- source_word: אִישׁ עָנִי וְאֶבְיוֹן
  english_pob_choice: the poor and needy man
  chosen_spanish: al pobre y al menesteroso
  alternatives_spanish:
  - a un pobre y menesteroso
  - al hombre pobre y necesitado
  lexicon: HALOT
  rationale: Se conserva el valor singular representativo de אִישׁ con la forma natural «al pobre y al menesteroso». «Menesteroso» mantiene el matiz de necesidad/indigencia de אֶבְיוֹן en español bíblico comprensible.
- source_word: וְנִכְאֵה לֵבָב
  english_pob_choice: and the broken in heart
  chosen_spanish: al quebrantado de corazón
  alternatives_spanish:
  - al roto de corazón
  - al corazón quebrantado
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente adjetival; «quebrantado de corazón» conserva la imagen de un corazón herido o aplastado y es más formal que «quebrantado de corazón» en registro devocional español.
- source_word: לְמוֹתֵת
  english_pob_choice: to put them to death
  chosen_spanish: para darles muerte
  alternatives_spanish:
  - para matarlos
  - para causarle muerte
  lexicon: HALOT
  rationale: El infinitivo final expresa propósito. «Darles muerte» mantiene el tono más formal y jurídico del resultado buscado, sin añadir elementos que no están en el hebreo.
translation_notes:
  revision_awareness: 'Se corrigió la anclaje de la nota: el marcador [a] aparece ahora en el texto principal junto a «recordó», de modo que la alternativa lexical está auditada y vinculada al punto exacto del término hebreo.'
  spanish_consistency_notes:
  - Se preservó el contraste entre la omisión de la misericordia y la persecución activa mediante «sino».
  - «Menesteroso» comunica la pobreza/necesidad sin perder el paralelismo hebreo.
  - La nota [a] está anclada en el verbo de memoria/recuerdo, donde recae la alternativa lexical de חָסֶד.
