translation:
  language: es
  text: Cuando pasé junto a ti y te vi, he aquí que tu tiempo era tiempo de amor[a]. Entonces extendí el borde de mi manto[b] sobre ti y cubrí tu desnudez. Te juré y entré en pacto contigo, declara el Señor Yahvé, y llegaste a ser mía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Tiempo de amor» también puede entenderse como «tiempo de cariños» o «tiempo de amores»; el hebreo lleva matices románticos y eróticos dentro de la metáfora matrimonial.
    reason: lexical_alternative
  - marker: b
    text: 'O, más literalmente: «extendí mi ala sobre ti». El hebreo puede aludir al borde del manto y evoca protección o reclamo matrimonial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֶעֱבֹ֨ר עָלַ֜יִךְ
  english_pob_choice: When I passed by you
  chosen_spanish: Cuando pasé junto a ti
  alternatives_spanish:
  - Cuando pasé por ti
  - Cuando fui pasando junto a ti
  lexicon: HALOT
  rationale: עבר con על expresa pasar junto a/al lado de alguien. «Pasé junto a ti» conserva el movimiento narrativo sin añadir elementos no explícitos.
- source_word: וָאֶרְאֵ֗ךְ
  english_pob_choice: and saw you
  chosen_spanish: y te vi
  alternatives_spanish:
  - y te miré
  - y te observé
  lexicon: HALOT
  rationale: ראה es el verbo ordinario «ver». La forma directa «te vi» reproduce la sencillez del hebreo.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - y he aquí
  lexicon: HALOT
  rationale: La partícula introduce una escena vívida. «He aquí» preserva el énfasis retórico y funciona bien en español bíblico digno.
- source_word: עִתֵּךְ עֵת דֹּדִים
  english_pob_choice: your time was the time for love
  chosen_spanish: tu tiempo era tiempo de amor
  alternatives_spanish:
  - tu tiempo era tiempo de cariños
  - tu tiempo era tiempo de amores
  lexicon: HALOT
  rationale: דֹּדִים puede abarcar amor, caricias o amor erótico. «Tiempo de amor» conserva esa amplitud relacional y afectiva sin volverlo más explícito que el hebreo.
- source_word: וָאֶפְרֹ֤שׂ כְּנָפִי֙ עָלַ֔יִךְ
  english_pob_choice: So I spread the edge of my garment over you
  chosen_spanish: Entonces extendí la orilla de mi manto sobre ti
  alternatives_spanish:
  - Entonces extendí mi ala sobre ti
  - Entonces extendí el borde de mi vestido sobre ti
  lexicon: HALOT
  rationale: כָּנָף literalmente es «ala», pero también el borde o extremo de una prenda. En este contexto matrimonial, «la orilla de mi manto» hace inteligible el modismo sin perder la imagen concreta.
- source_word: וָאֲכַסֶּ֖ה עֶרְוָתֵ֑ךְ
  english_pob_choice: and covered your nakedness
  chosen_spanish: y cubrí tu desnudez
  alternatives_spanish:
  - y cubrí tu vergüenza
  - y cubrí tu exposición
  lexicon: HALOT
  rationale: עֶרְוָה significa literalmente «desnudez», con connotaciones de exposición sexual o vergüenza. «Desnudez» mantiene el valor literal y la modestia pactal del pasaje.
- source_word: וָאֶשָּׁ֣בַע לָ֠ךְ
  english_pob_choice: I swore to you
  chosen_spanish: Te lo juré
  alternatives_spanish:
  - Te juré
  - Hice juramento a ti
  lexicon: HALOT
  rationale: El hebreo expresa un juramento dirigido a la persona. «Te lo juré» conserva la acción juratoria en español natural y mantiene el tono solemne.
- source_word: וָאָב֨וֹא בִ/בְרִ֜ית אֹתָ֗ךְ
  english_pob_choice: and entered into a covenant with you
  chosen_spanish: y entré en pacto contigo
  alternatives_spanish:
  - y hice un pacto contigo
  - y entré en alianza contigo
  lexicon: HALOT
  rationale: בוא בברית es literalmente «entrar en pacto/alianza». «Entré en pacto contigo» sigue de cerca la construcción y conserva el registro formal de pacto.
- source_word: נְאֻם אֲדֹנָ֥י יְהוִ֖ה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - declara el Señor Dios
  - oráculo del Señor Yahvé
  lexicon: HALOT
  rationale: El Tetragrámaton se rinde aquí como «Yahvé» según el criterio del proyecto. «Señor Yahvé» reproduce la fórmula profética sin ocultar el nombre divino.
- source_word: וַתִּ֥הְיִי לִֽי
  english_pob_choice: and you became mine
  chosen_spanish: y fuiste mía
  alternatives_spanish:
  - y llegaste a ser mía
  - y viniste a ser mía
  lexicon: HALOT
  rationale: 'La expresión hebrea indica pertenencia de pacto: «ser para mí». «Fuiste mía» es breve, idiomático y conserva el sentido de posesión/covenantal sin sobreespecificar «esposa».'
theological_decisions:
- issue: Metáfora matrimonial con matiz erótico moderado
  english_pob_reading: Retain the marital/covenantal metaphor with modest but explicit language ('time for love,' 'covered your nakedness,' 'entered into a covenant').
  chosen_spanish_reading: 'Mantener la metáfora matrimonial y de pacto con lenguaje sobrio pero explícito: «tiempo de amor», «cubrí tu desnudez», «entré en pacto contigo».'
  alternative_spanish_readings:
  - Suavizar el lenguaje para minimizar el matiz erótico
  - Hacer más explícita la dimensión sexual con «tiempo de amores» o «tiempo de caricias»
  rationale: El hebreo combina imagen nupcial, protección y sexualidad. La traducción no debe diluir la metáfora ni intensificarla más allá del texto; por eso se conserva un vocabulario claro y moderado.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Cierre con pertenencia de pacto
  english_pob_reading: and you became mine
  chosen_spanish_reading: y fuiste mía
  alternative_spanish_readings:
  - y te convertiste en mía
  - y llegaste a ser mía
  rationale: La frase final expresa pertenencia pactal dentro del marco marital. «Fuiste mía» mantiene la fuerza relacional y la concisión del hebreo.
  doctrine_reference: 'DOCTRINE.md: covenant formulae and marriage imagery'
- issue: Rendering of the divine name in אֲדֹנָי יְהוִה
  english_pob_reading: Lord GOD
  chosen_spanish_reading: Señor Yahvé
  alternative_spanish_readings:
  - Señor Dios
  - el Señor Yahvé
  rationale: El texto hebreo contiene el Nombre divino; conforme al criterio del proyecto, se preserva «Yahvé» en español en lugar de enmascararlo con «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se incorporó la corrección del repaso final: no se añadió «de nuevo» porque no está explícito en el hebreo. También se preservó la opción del nombre divino como «Yahvé» conforme al criterio doctrinal actualizado, y se anclaron las notas al texto español con [a] y [b].'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוִה, coherente con el criterio del proyecto.
  - Se usa «pacto» para בְּרִית, manteniendo el registro bíblico formal.
  - Se usa «desnudez» para עֶרְוָה, sin eufemizar la imagen.
  - «Tiempo de amor» preserva el campo semántico amplio de דֹּדִים sin volverlo excesivamente explícito.
  - Las notas [a] y [b] están ancladas exactamente en el texto principal.
