source:
  edition: WLC
  text: כִּ֤י לֹ֪א יָנ֡וּחַ שֵׁ֤בֶט הָ/רֶ֗שַׁע עַל֮ גּוֹרַ֪ל הַֽ/צַּדִּ֫יקִ֥ים לְמַ֡עַן לֹא יִשְׁלְח֖וּ הַ/צַּדִּיקִ֨ים בְּ/עַוְלָ֬תָ/ה יְדֵי/הֶֽם־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/125/003.yaml
  text: For the scepter of wickedness will not rest on the lot of the righteous[c][b][a], lest the righteous stretch out their hands to wrongdoing.
  footnotes:
  - marker: a
    text: Or, 'the scepter of the wicked.' The Hebrew construction may point either to wickedness as a quality or to the wicked as those wielding the scepter.
    reason: lexical_alternative
  - marker: b
    text: '''Lot'' can also mean ''portion'' or ''inheritance''—the share allotted to the righteous.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'put forth their hands to injustice/iniquity.' The Hebrew idiom means to engage in wrongdoing.
    reason: lexical_alternative
