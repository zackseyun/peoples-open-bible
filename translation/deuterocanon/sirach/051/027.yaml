theological_decisions:
- issue: Referent and personification of the feminine suffixes in בָהּ and מְצָאתִיהָ
  chosen_reading: Render with impersonal 'it' in the main text, referring to wisdom/instruction, while preserving 'her' in a footnote.
  alternative_readings:
  - Render both suffixes as 'her,' making Wisdom's personification explicit
  rationale: Sirach often personifies Wisdom as feminine, and the Hebrew grammar supports that. However, this verse alone does not require a strongly personified English rendering, and 'it' reads more naturally in modern English while still allowing the likely referent to remain clear from context. The alternative is preserved for transparency.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Handling divergence between Hebrew and Greek parallel
  chosen_reading: Follow the Hebrew as the primary witness for Sirach where extant, while noting the Greek's substantially different sense in a footnote.
  alternative_readings:
  - 'Translate toward the Greek sense: ''I labored little and found for myself much rest'''
  rationale: Project policy gives primacy to the surviving Hebrew of Sirach where available. The Greek parallel here appears to reflect a different textual form or interpretive development, substantial enough that readers should be alerted rather than having the difference silently absorbed.
  doctrine_reference: 'PHILOSOPHY.md: Hebrew Sirach is translated from Hebrew where it survives; transparency principle'
