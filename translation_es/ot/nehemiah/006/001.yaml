translation:
  language: es
  text: Entonces, cuando Sanbalat[a], Tobías, Gesem el árabe[b] y el resto de nuestros enemigos oyeron que yo había reconstruido la muralla y que no había quedado en ella ninguna brecha —aunque hasta entonces no había puesto las puertas en las puertas de la ciudad—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «yo había construido la muralla». El hebreo dice simplemente «construí»; se usa «reconstruido» porque el contexto es la restauración de una muralla existente.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Gesem el de Arabia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כַאֲשֶׁר
  english_pob_choice: Now when
  chosen_spanish: Entonces, cuando
  alternatives_spanish:
  - Y aconteció que cuando
  - Y cuando
  lexicon: HALOT
  rationale: En español, una transición narrativa como esta se expresa de manera natural con «Entonces, cuando», que mantiene el arranque secuencial sin calco excesivo.
- source_word: נִשְׁמַע
  english_pob_choice: heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - se oyó
  - llegó a oídos de
  lexicon: HALOT
  rationale: Aunque el hebreo es pasivo, el contexto identifica a los receptores. «Oyeron» es la forma idiomática y clara en español.
- source_word: סַנְבַלַּט ... טוֹבִיָּה ... גֶשֶׁם הָעַרְבִי
  english_pob_choice: Sanballat, Tobiah, Geshem the Arab
  chosen_spanish: Sanbalat, Tobías, Gesem el árabe
  alternatives_spanish:
  - Sanbalat, Tobías, Gesem el arabio
  lexicon: HALOT
  rationale: 'Se conservan los nombres propios transliterados. הָעַרְבִי se vierte como designación étnica directa: «el árabe», siguiendo la decisión inglesa de no suavizarla con una forma más tradicional pero menos directa.'
- source_word: יֶתֶר אֹיְבֵינוּ
  english_pob_choice: the rest of our enemies
  chosen_spanish: el resto de nuestros enemigos
  alternatives_spanish:
  - los demás de nuestros enemigos
  - los demás enemigos
  lexicon: HALOT
  rationale: «יֶתֶר» expresa lo que queda o el resto; «el resto de nuestros enemigos» reproduce bien esa idea en español sin perder el matiz colectivo.
- source_word: בָנִיתִי אֶת הַחוֹמָה
  english_pob_choice: I had rebuilt the wall
  chosen_spanish: yo había reconstruido la muralla
  alternatives_spanish:
  - yo había construido la muralla
  - yo había reedificado la muralla
  lexicon: HALOT
  rationale: El verbo hebreo es simplemente «construir», pero el contexto es restaurativo. «Reconstruido» comunica mejor en español la obra de reparación de una muralla ya existente.
- source_word: לֹא נוֹתַר בָּהּ פָּרֶץ
  english_pob_choice: no breach was left in it
  chosen_spanish: no había quedado en ella ninguna brecha
  alternatives_spanish:
  - no había quedado en ella ningún portillo
  - no quedaba en ella una abertura
  lexicon: HALOT
  rationale: «פָּרֶץ» en contexto de muralla indica una brecha o abertura. «Brecha» preserva el valor constructivo y militar del término.
- source_word: גַּם עַד הָעֵת הַהִיא
  english_pob_choice: though up to that time
  chosen_spanish: aunque hasta entonces
  alternatives_spanish:
  - sin embargo, hasta entonces
  - aun hasta ese momento
  lexicon: HALOT
  rationale: La partícula añade una salvedad concesiva; «aunque» hace explícita esa relación en español sin agregar contenido extra.
- source_word: דְּלָתוֹת
  english_pob_choice: the doors
  chosen_spanish: las puertas
  alternatives_spanish:
  - las hojas de las puertas
  - los batientes
  lexicon: HALOT
  rationale: En castellano bíblico y contemporáneo, «puertas» es la forma natural para los batientes de las entradas de la ciudad; evita la torpeza de «las puertas de los portones».
- source_word: לֹא הֶעֱמַדְתִּי
  english_pob_choice: I had not set up
  chosen_spanish: no había puesto
  alternatives_spanish:
  - no había instalado
  - no había colocado
  lexicon: HALOT
  rationale: El Hifil de עמד puede expresar poner en su sitio o instalar. «No había puesto» es suficientemente amplio y natural en español, especialmente con el complemento siguiente.
- source_word: בַשְּׁעָרִים
  english_pob_choice: in the gates
  chosen_spanish: en los portones
  alternatives_spanish:
  - en las puertas
  - en las entradas
  lexicon: HALOT
  rationale: Dado que ya se habló de «las puertas», «portones» ayuda a distinguir las estructuras de la ciudad en español. Mantiene la referencia arquitectónica del hebreo sin confundirla con las hojas de la puerta.
theological_decisions:
- issue: Cómo reflejar el valor restaurativo del verbo «construir» en una muralla ya existente
  english_pob_reading: I had rebuilt the wall; the Hebrew verb is simply 'built', but the context is restoration of an existing wall.
  chosen_spanish_reading: yo había reconstruido la muralla
  alternative_spanish_readings:
  - yo había construido la muralla
  - yo había reedificado la muralla
  rationale: La lectura inglesa documenta que el hebreo dice literalmente «construí», pero el contexto exige una idea de restauración. «Reconstruido» conserva esa tensión sin ocultar el valor básico del verbo.
  doctrine_reference: Nehemías 6:1; auditable lexical decision based on context, not doctrine
- issue: Cómo traducir הָעַרְבִי sin suavizar la designación étnica
  english_pob_reading: Geshem the Arab; Or 'Geshem the Arabian.'
  chosen_spanish_reading: Gesem el árabe
  alternative_spanish_readings:
  - Gesem el arabio
  - Gesem el árabe
  rationale: Se mantiene la designación étnica directa y se evita una paráfrasis tradicionalizante. La forma con artículo y sustantivo simple es la más transparente para el lector español.
  doctrine_reference: Nehemías 6:1; lexical transparency and ethnic designation
- issue: Cómo expresar la concesión de גַּם עַד הָעֵת הַהִיא
  english_pob_reading: though up to that time
  chosen_spanish_reading: aunque hasta entonces
  alternative_spanish_readings:
  - sin embargo, hasta entonces
  - aun hasta ese momento
  rationale: La partícula tiene aquí fuerza concesiva. «Aunque» preserva la relación lógica que introduce la cláusula de limitación temporal.
  doctrine_reference: Nehemías 6:1; discourse function rather than doctrinal issue
translation_notes:
  revision_awareness: 'Se revisó el pasaje y no se requirieron cambios sustantivos respecto del sentido base: la traducción conserva la transición narrativa, la lista de destinatarios, el valor restaurativo de «construir/reconstruir», la imagen de la brecha y la salvedad temporal final. Se ajustó la dicción española para que sea natural y a la vez auditable frente al hebreo.'
  spanish_consistency_notes:
  - Se usa «muralla» para הַחוֹמָה, coherente con el contexto de fortificación urbana.
  - Se conserva «árabe» como designación étnica directa para הָעַרְבִי, en paralelo con la decisión inglesa.
  - «Brecha» se mantiene para פָּרֶץ, evitando términos más genéricos que debilitarían la imagen constructiva.
  - «Portones» se emplea para בַשְּׁעָרִים y ayuda a distinguir la estructura de acceso de las «puertas» mismas.
  - 'Los nombres propios siguen la transliteración española usual: Sanbalat, Tobías, Gesem.'
