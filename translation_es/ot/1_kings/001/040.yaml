translation:
  language: es
  text: Y todo el pueblo subieron detrás de él[a], y el pueblo iba tocando flautas y alegrándose con gran alegría[b], y la tierra se partió por su estruendo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tras él»; el hebreo indica seguimiento en procesión.
    reason: alternative_reading
  - marker: b
    text: La expresión «la tierra se partió» es probablemente hiperbólica y describe la intensidad del festejo.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעֲלוּ
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - subieron
  lexicon: HALOT
  rationale: עלה expresa movimiento de subida. En español, «subió» conserva la imagen concreta y funciona bien en un contexto procesional.
- source_word: כָל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la gente
  - la gente entera
  lexicon: HALOT
  rationale: El colectivo hebreo se refiere al conjunto del pueblo. «Todo el pueblo» es natural y respeta el sentido público y total.
- source_word: אַחֲרָיו
  english_pob_choice: after him
  chosen_spanish: detrás de él
  alternatives_spanish:
  - tras él
  - siguiéndolo
  lexicon: HALOT
  rationale: La idea es de seguir en procesión. «Detrás de él» expresa la relación espacial y narrativa sin volverse demasiado interpretativa.
- source_word: מְחַלְּלִים בַּחֲלִלִים
  english_pob_choice: playing flutes
  chosen_spanish: iba tocando flautas
  alternatives_spanish:
  - tocaba flautas
  - tocando flautas
  - tocando pitos
  lexicon: HALOT
  rationale: El verbo y el sustantivo describen música con un instrumento de viento tipo flauta o pipa. «Iba tocando flautas» mantiene el carácter procesional y el valor instrumental amplio sin forzar una equivalencia técnica cerrada.
- source_word: וּשְׂמֵחִים שִׂמְחָה גְדוֹלָה
  english_pob_choice: rejoicing with great joy
  chosen_spanish: alegrándose con gran alegría
  alternatives_spanish:
  - regocijándose con gran regocijo
  - celebrando con gran alegría
  lexicon: HALOT
  rationale: Se conserva la construcción cognada enfática. «Alegrándose con gran alegría» refleja la repetición intensificadora del hebreo de manera clara en español.
- source_word: וַתִּבָּקַע הָאָרֶץ
  english_pob_choice: the earth was split apart
  chosen_spanish: la tierra se abrió
  alternatives_spanish:
  - la tierra se partió
  - la tierra se hendió
  lexicon: HALOT
  rationale: בקע indica partir, abrir, hender. En este contexto hiperbólico, «se abrió» comunica la imagen sin sonar demasiado física o geológica para el lector español.
- source_word: בְּקוֹלָם
  english_pob_choice: by their sound
  chosen_spanish: por su sonido
  alternatives_spanish:
  - a causa de su sonido
  - por el ruido que hacían
  lexicon: HALOT
  rationale: קוֹל puede ser sonido, voz o ruido. Dado que hay instrumentos y júbilo, «por su sonido» abarca ambos sin limitarse a la voz humana.
theological_decisions:
- issue: Naturaleza hiperbólica de «la tierra se abrió»
  english_pob_reading: The earth split apart is likely hyperbolic, describing the overwhelming volume of the celebration.
  chosen_spanish_reading: La tierra se abrió es una imagen hiperbólica del estruendo de la celebración.
  alternative_spanish_readings:
  - la tierra se partió de forma hiperbólica
  - la tierra pareció abrirse por el ruido
  rationale: El hebreo presenta una imagen fuerte que no debe suavizarse hasta perder fuerza. En español conviene mantenerla como hipérbole evidente, no como un evento literal.
  doctrine_reference: figura literaria / lenguaje hiperbólico en narrativa bíblica
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del POB en inglés: se mantuvo la coordinación simple con «y» en lugar de introducir una relación de resultado, y se reflejó el valor natural de בְּ con una formulación española equivalente en lugar de una preposición demasiado literal.'
  spanish_consistency_notes:
  - Se usó «Yahvé» para el nombre divino cuando corresponda; este versículo no lo contiene.
  - Se prefirió un español claro y digno, evitando calcos innecesarios.
  - Se mantuvo la imagen hiperbólica del texto hebreo sin explicarla dentro del cuerpo principal.
