review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo y sigue de cerca la auditoría inglesa: mantiene ''siete mujeres'', la autosuficiencia expresada en ''nuestro propio pan/ropa'', conserva el modismo de ''tu nombre'' y traduce חֶרְפָּה con un término de deshonra social. Sin embargo, hay dos desajustes importantes: (1) el anclaje de notas está invertido respecto del contenido de las notas; y (2) ''tu nombre sea llamado sobre nosotros'' resulta gramaticalmente poco natural en español porque el referente son mujeres, y además ''nosotros'' rompe la concordancia contextual. El hebreo permite mantener el idiomatismo sin esa torpeza mediante ''sobre nosotras'' o mejor con la alternativa idiomática documentada en nota.'
  spanish_quality_summary: El español es mayormente claro y digno, pero 'se asirán de' suena algo tieso; aun así es aceptable. El problema principal de legibilidad está en 'solo que tu nombre sea llamado sobre nosotros', que se siente calcado y con discordancia de género. También conviene ajustar las notas para que [a] marque la frase sobre 'aquel día' o, mejor aún, mover [a] a la expresión del nombre, ya que esa es la nota de alternativa léxica. La nota cultural de 'oprobio' debe anclarse en 'oprobio'.
  glossary_alignment: No hay términos del glosario de alto impacto (Yahvé, Mesías, etc.) en este versículo. 'Oprobio' concuerda con la decisión POB para 'reproach'. La preservación del idiomático 'tu nombre...' es correcta en principio, pero requiere forma española más natural y concordante.
  issues:
  - severity: high
    issue: Las notas al pie están ancladas en lugares incorrectos.
    rationale: La nota [a] explica la alternativa de 'let your name be called over us', pero está puesta tras 'en aquel día'. La nota [b] explica 'oprobio', pero está puesta tras la cláusula del nombre. Esto rompe la trazabilidad auditiva y editorial requerida.
  - severity: high
    issue: Discordancia y calco poco natural en 'tu nombre sea llamado sobre nosotros'.
    rationale: El contexto explícito es 'siete mujeres', por lo que 'nosotros' es impropio en español; debe ser 'nosotras' o una formulación equivalente. Además, 'sea llamado sobre nosotras' preserva el hebreo mejor que el borrador actual, que suena torpe en español.
  - severity: medium
    issue: La nota alternativa usa 'llamadas' mientras el texto principal usa 'nosotros'.
    rationale: La incoherencia de género entre texto y nota aumenta la sensación de descuido y dificulta la lectura eclesial.
