    rationale: La nota [a] trata la alternativa «congregación» para «asamblea», por lo que debe anclarse a «asamblea». La nota [b] trata la literalidad de «asiento/sesión de los ancianos» para «consejo de los ancianos», por lo que debe anclarse a esa frase. En el borrador actual, [a] aparece tras «pueblo» y [b] tras «ancianos», lo cual desorienta al lector y no sigue la disciplina de notas.
