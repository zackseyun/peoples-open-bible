translation:
  language: es
  text: Sepárense de entre esta congregación[a], para que yo los consuma en un instante[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de en medio de».
    reason: lexical_alternative
  - marker: b
    text: O «en un momento».
