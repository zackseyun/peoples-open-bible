  text: For you yourselves know very well that the day of the Lord comes like a thief in the night.
translation:
  language: ko
  text: 여러분 자신이 주의 날이 밤에 도둑이 오듯 그렇게 온다는 것을 잘 알고 있기 때문입니다.
