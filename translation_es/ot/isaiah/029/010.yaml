translation:
  language: es
  text: Porque Yahvé ha derramado sobre ustedes un espíritu de sueño profundo[a][b], y ha cerrado sus ojos —los profetas—, y ha cubierto sus cabezas —los videntes—.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un espíritu de estupor». El término hebreo puede denotar sueño profundo o un torpor que aturde.'
    reason: lexical_alternative
  - marker: b
    text: 'La sintaxis hebrea probablemente identifica «los profetas» con «sus ojos» y «los videntes» con «sus cabezas»; alternativamente, algunos entienden que son objetos separados: «ha cerrado a los profetas y ha cubierto sus cabezas, los videntes».'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o explicación del juicio descrito en el contexto inmediato. «Porque» comunica bien el valor explicativo de כִּי en español moderno y mantiene el enlace causal sin sobrecargar el tono.
- source_word: נָסַךְ
  english_pob_choice: has poured out
  chosen_spanish: ha derramado
  alternatives_spanish:
  - ha vertido
  - ha echado
  lexicon: HALOT
  rationale: El verbo admite una imagen de derramar/libar. «Ha derramado» conserva la metáfora de una acción impuesta por Yahvé sobre el pueblo y suena natural en español. «Ha vertido» sería posible, pero menos idiomático en este contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino, sin enmascararlo con «SEÑOR». «Yahvé» es la forma establecida en la serie y conserva la referencia directa al nombre del pacto.
- source_word: רוּחַ תַּרְדֵּמָה
  english_pob_choice: a spirit of deep sleep
  chosen_spanish: un espíritu de profundo sueño
  alternatives_spanish:
  - un espíritu de estupor
  - un sopor profundo
  lexicon: HALOT
  rationale: «Espíritu» conserva la amplitud de רוּחַ y evita reducirlo a «viento» o «aliento» donde el contexto apunta a una condición impuesta. «Profundo sueño» reproduce תַּרְדֵּמָה de forma directa y mantiene la tensión entre sueño literal y torpor judicial. Se prefiere «de profundo sueño» a «de estupor» por mayor cercanía al hebreo y al audit trail inglés.
- source_word: וַיְעַצֵּם
  english_pob_choice: has shut
  chosen_spanish: ha cerrado
  alternatives_spanish:
  - ha tapado
  - ha cegado
  lexicon: HALOT
  rationale: El verbo expresa cerrar, especialmente los ojos. «Ha cerrado» mantiene la imagen concreta sin decidir prematuramente por una interpretación más fuerte como «ha cegado».
- source_word: עֵינֵיכֶם
  english_pob_choice: your eyes
  chosen_spanish: sus ojos
  alternatives_spanish:
  - los ojos de ustedes
  lexicon: HALOT
  rationale: La referencia es directa y literal. En español, «sus ojos» resulta natural en una dirección plural de segunda persona, y preserva el paralelismo con las cláusulas siguientes.
- source_word: אֶת הַנְּבִיאִים
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - a los profetas
  lexicon: HALOT
  rationale: Se conserva el sustantivo común «profetas». En la sintaxis difícil del versículo, el audit trail inglés entiende a «los profetas» como explicación en aposición de «sus ojos»; el español lo refleja con rayas para no perder esa relación.
- source_word: רָאשֵׁיכֶם
  english_pob_choice: your heads
  chosen_spanish: sus cabezas
  alternatives_spanish:
  - sus jefes
  - sus líderes
  lexicon: HALOT
  rationale: Aunque el término puede metafóricamente referirse a líderes, el audit trail inglés opta por retener la imagen literal. «Sus cabezas» mantiene la estructura hebrea y permite la aposición con «los videntes».
- source_word: הַחֹזִים
  english_pob_choice: the seers
  chosen_spanish: los videntes
  alternatives_spanish:
  - los que ven
  - los visionarios
  lexicon: HALOT
  rationale: «Vidientes» es el término castellano más cercano y tradicional para הַחֹזִים, y conserva el contraste profético con «profetas». Frente a «seers», en español «videntes» comunica mejor el oficio sin sonar arcaico en exceso.
- source_word: כִּסָּה
  english_pob_choice: covered
  chosen_spanish: ha cubierto
  alternatives_spanish:
  - ha velado
  - ha tapado
  lexicon: HALOT
  rationale: «Ha cubierto» conserva el paralelo con «ha cerrado» y la imagen de ocultamiento que culmina el verso. No se suaviza a una metáfora más interpretativa.
theological_decisions:
- issue: Agencia divina y endurecimiento judicial
  english_pob_reading: 'Render the verse as describing the LORD''s active judicial act: he has poured out deep sleep and shut/covered the people''s prophetic faculties.'
  chosen_spanish_reading: 'El versículo se traduce como una acción directa y judicial de Yahvé: él ha derramado el espíritu de profundo sueño y ha cerrado/cubierto las facultades de visión profética.'
  alternative_spanish_readings:
  - Yahvé permitió que cayera sobre ustedes un espíritu de profundo sueño
  - Yahvé dejó que se adormecieran
  rationale: El hebreo atribuye la acción directamente a Yahvé; por eso la versión española conserva la agencia divina explícita en vez de suavizarla con lenguaje permisivo. Esto mantiene la tensión teológica del texto fuente sin resolverla artificialmente.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Relación sintáctica entre «los profetas» y «los videntes»
  english_pob_reading: Treat 'the prophets' and 'the seers' as appositional clarifications to 'your eyes' and 'your heads'.
  chosen_spanish_reading: 'Se mantiene la lectura en aposición: «sus ojos —los profetas—» y «sus cabezas —los videntes—».'
  alternative_spanish_readings:
  - Ha cerrado a los profetas y ha cubierto sus cabezas, a los videntes
  - Ha cerrado sus ojos y ha cubierto sus cabezas; los profetas y los videntes
  rationale: La aposición refleja mejor la sintaxis difícil del hebreo y la lectura auditada en inglés. Las rayas ayudan al español a mostrar que los profetas y los videntes son aclaraciones identificativas, no objetos independientes añadidos sin conexión.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation tradition)
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; esta propuesta conserva esa línea y solo explicita en español las decisiones ya auditadas en el inglés POB.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera consistente con el estándar del proyecto.
  - Se evita «SEÑOR» para el nombre divino y «Cristo» porque no corresponde a este versículo.
  - Se conserva la metáfora corporal («ojos», «cabezas») y la terminología profética («profetas», «videntes») sin resolverla en paráfrasis.
  - Las rayas tipográficas marcan la aposición explicativa de acuerdo con la sintaxis difícil del hebreo y la lectura auditada.
