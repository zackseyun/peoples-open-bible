translation:
  language: es
  text: Entonces todos los hombres de su ciudad lo apedrearán[a] con piedras, y morirá. Así purgarás el mal de en medio de ti, y todo Israel oirá y temerá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''toda la gente de su ciudad''; el hebreo, literalmente, ''todos los hombres de su ciudad''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּרְגָמֻהוּ
  english_pob_choice: shall stone him
  chosen_spanish: lo apedrearán
  alternatives_spanish:
  - lo lapidarán
  - lo matarán a pedradas
  lexicon: HALOT
  rationale: El hebreo en contexto legal indica ejecución por apedreamiento. En español, 'apedrear' comunica ese acto de forma natural y fiel; 'lapidar' es válido pero algo más técnico, y 'matar a pedradas' pierde la forma jurídica del verbo.
- source_word: כָּל אַנְשֵׁי עִירוֹ
  english_pob_choice: all the men of his city
  chosen_spanish: todos los hombres de su ciudad
  alternatives_spanish:
  - toda la gente de su ciudad
  - todos los ciudadanos de su ciudad
  lexicon: HALOT
  rationale: אַנְשֵׁי es literalmente 'hombres de'. En este contexto jurídico, se conserva el masculino explícito del hebreo, evitando neutralizarlo a 'gente' sin base textual. 'Hombres de su ciudad' es claro y directo en español.
- source_word: בָאֲבָנִים
  english_pob_choice: with stones
  chosen_spanish: con piedras
  alternatives_spanish:
  - a pedradas
  - mediante piedras
  lexicon: HALOT
  rationale: La preposición indica el medio de la ejecución. 'Con piedras' preserva el elemento concreto del hebreo y suena natural en español; 'a pedradas' es idiomático pero menos cercano a la forma nominal del texto.
- source_word: וָמֵת
  english_pob_choice: and he shall die
  chosen_spanish: y morirá
  alternatives_spanish:
  - y morirá como resultado
  - y así morirá
  lexicon: HALOT
  rationale: El hebreo expresa el resultado de la acción. En español, 'y morirá' conserva la secuencia jurídica sin sobreexplicar ni convertirla en finalidad.
- source_word: וּבִעַרְתָּ
  english_pob_choice: you shall purge
  chosen_spanish: purgarás
  alternatives_spanish:
  - eliminarás
  - quitarás
  lexicon: HALOT
  rationale: En fórmulas deuteronómicas, בער funciona como un verbo técnico para remover el mal de la comunidad. 'Purgarás' mantiene ese registro solemne y formulaico mejor que un simple 'eliminarás'.
- source_word: הָרָע
  english_pob_choice: the evil
  chosen_spanish: el mal
  alternatives_spanish:
  - la maldad
  - lo malo
  lexicon: HALOT
  rationale: La expresión formulaica apunta al mal moral/judicial como entidad abstracta. 'El mal' preserva esa fuerza proverbial y su repetición en Deuteronomio.
- source_word: מִקִּרְבֶּךָ
  english_pob_choice: from your midst
  chosen_spanish: de en medio de ti
  alternatives_spanish:
  - de tu medio
  - de entre ti
  lexicon: HALOT
  rationale: La idiomática bíblica hebrea se expresa de forma transparente en español con 'de en medio de ti'. Conserva el sentido comunitario del hebreo sin sonar rígido.
- source_word: יִשְׁמְע֥וּ
  english_pob_choice: shall hear
  chosen_spanish: oirá[n]?
  alternatives_spanish:
  - oirán
  - escucharán
  lexicon: HALOT
  rationale: El hebreo dice simplemente 'oirán/oirá'. El plural de sujeto es claro por 'todo Israel'; en español se expresa como 'oirá y temerá' no sería concordante, por eso se usa la forma plural 'oirán'.
- source_word: וְיִרָֽאוּ
  english_pob_choice: and fear
  chosen_spanish: y temerá
  alternatives_spanish:
  - y temerán
  - y tendrán temor
  lexicon: HALOT
  rationale: יִרָא aquí denota temor reverente o advertido por juicio. En español, 'temerán' mantiene el valor de advertencia; la concordancia con 'todo Israel' requiere plural.
theological_decisions:
- issue: Fórmula deuteronómica de purga del mal
  english_pob_reading: purge the evil from your midst
  chosen_spanish_reading: purgarás el mal de en medio de ti
  alternative_spanish_readings:
  - eliminarás el mal de en medio de ti
  - quitarás el mal de en medio de ti
  rationale: La expresión es una fórmula legal-covenantal recurrente en Deuteronomio. 'Purgarás' conserva mejor el tono técnico y solemne que 'eliminarás' o 'quitarás', sin cambiar su sentido central.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
- issue: Sujeto masculino explícito en contexto cívico-legal
  english_pob_reading: all the men of his city
  chosen_spanish_reading: todos los hombres de su ciudad
  alternative_spanish_readings:
  - toda la gente de su ciudad
  - todos los habitantes de su ciudad
  rationale: El hebreo usa un sustantivo masculino explícito. Se conserva la referencia masculina en español por fidelidad al texto y por la política de precisión de género, sin afirmar nada más allá de este pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La auditoría inglesa indica alta concordancia y ninguna revisión aplicada; la decisión principal en español es mantener el valor jurídico de 'apedrear', la fórmula deuteronómica 'purgarás el mal' y el masculino explícito de 'los hombres de su ciudad'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar cuando el tetragrámaton aparezca; en este versículo no aparece.
  - Se conserva el registro legal-covenantal con verbos como 'apedrear' y 'purgar'.
  - Se usa 'mal' para la fórmula deuteronómica, no 'maldad', para reflejar la abstracción del hebreo.
  - La concordancia verbal final se ajusta al sujeto plural 'todo Israel'.
