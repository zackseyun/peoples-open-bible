id: T12P.GAD.05
reference: Testament of Gad 5
source:
  edition: Charles 1908 Greek Versions (pages 232-243, Gad pilot)
  text: 'V. ⸀Κακὸν οὖν¹ ἐστι² τὸ μῖσος³, ὅτι *ἐνδελεχεῖ συνεχῶς³ *τῷ ψεύδει, λαλῶν⁴ κατὰ τῆς⁵ ἀληθείας, καὶ τὰ μικρὰ μεγάλα ποιεῖ⁶, τὸ *φῶς σκότος⁷ παρέχει⁸, καὶ⁹ τὸ γλυκὺ πικρὸν λέγει¹⁰, ⸀καὶ⸀ συκοφαντίαν¹¹ ἐκδιδάσκει *καὶ ὀργὴν¹² ⸀ἐκταράσσει⸀¹³ καὶ πόλεμον ⸀διεγείρει⸀¹⁴, καὶ ὕβριν¹⁵ καὶ πᾶσαν πλεονεξίαν, κακῶν¹⁶ καὶ¹⁷ ἰοῦ διαβολικοῦ τὴν καρδίαν ἐκπληροῖ¹⁸. 2. *Ταῦτα οὖν¹⁹ ἐκ πείρας²⁰ λέγω ὑμῖν, τέκνα μου, ὅπως ἐξώσητε²¹ τὸ μῖσος *τὸ διαβολικόν²², καὶ κολληθῆτε τῇ ἀγάπῃ τοῦ²³ Θεοῦ²⁴. 3. Ἡ²⁵ δικαιοσύνη²⁶ ἐκβάλλει τὸ μῖσος²⁷, ἡ ταπείνωσις ἀναιρεῖ *τὸ ζῆλος²⁸. ὁ γὰρ δίκαιος καὶ ταπεινῶς αἰδεῖται ποιῆσαι ἄδικον²⁹, ⸀οὐχ ὑπ᾽ ἄλλου³⁰ καταγινωσκόμενος³¹ ἀλλ᾽³² ὑπὸ τῆς ἰδίας καρδίας³³, ὅτι Κύριος ἐπισκοπεῖ³⁴ *τὴν ψυχὴν³⁵ αὐτοῦ³⁶. 4. *Οὐ καταλαλεῖ³⁷ *ἀνδρὸς ὁσίου³⁸, ἐπειδὴ ὁ φόβος τοῦ Θεοῦ³⁹ *οἰκεῖ ἐν αὐτῷ⁴⁰. 5. Φοβούμενος γὰρ⁴¹ μὴ προσκρούσαι⁴² Κυρίῳ⁴³, οὐ θέλει τὸ καθόλου⁴⁴ οὐδὲ⁴⁵ ἕως ἐννοίας⁴⁶ ἀδικῆσαι ἄνθρωπον. 6. Ταῦτα *ἐγὼ ἔσχατον⁴⁷ ἔγνων μετὰ τὸ μετανοῆσαί⁴⁸ με περὶ⁴⁹ Ἰωσήφ⁵⁰. 7. Ἡ γὰρ κατὰ Θεὸν ἀληθὴς⁵¹ μετάνοια⁵² [ἀναιρεῖ *τὴν ἄγνοιαν⁵³ καὶ] φυγαδεύει τὸ σκότος, καὶ φωτίζει τοὺς ὀφθαλμοὺς καὶ γνῶσιν παρέχει τῇ ψυχῇ, καὶ ὁδηγεῖ *τὸ διαβούλιον⁵⁴ *πρὸς σωτηρίαν⁵⁵. 8. *Καὶ οὐκ ἔμαθεν ἀπὸ ἀνθρώπων τοῦτο ἀλλ᾽ οἶδε διὰ μετανοίας τοὺς ἐπιστρέφοντας δέχεσθαι⁵⁶. 9. Ἐπήγαγε γάρ⁴¹ μοι ὁ Θεὸς νόσον ἥπατος, καὶ εἰ μὴ⁵⁷ *αἱ εὐχαὶ⁵⁸ τοῦ πατρός μου⁵⁹ *ἐβοήθησάν μοι⁶⁰, ὀλίγου δεῖν⁶¹ *ἐξέλειπε τὸ πνεῦμα μου⁶². 10. Δι’ ὧν γὰρ δ⁶³ ἄνθρωπος παρανομεῖ, δι’ ἐκείνων⁶⁴ κολάζεται. 11. Ἐπεὶ Γοὖν⌉ ἔκειτο⁶⁵ τὰ ἥπατα μου ἀνιλεως⁶⁶ κατὰ τοῦ Ἰωσήφ, *τῷ ἥπατι⁶⁷ πάσχων⁶⁸ ἀνιλεως ἐκρινόμην ἐπὶ *χρόνους δέκα⁶⁹, καθ’ *ὃν χρόνον⁷⁰ ἐπείχον⁷¹ τῷ Ἰωσήφ⁷².'
