translation:
  language: es
  text: Tres cosas[a] son demasiado maravillosas para mí; cuatro no las entiendo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tres son demasiado maravillosas para mí, y cuatro no las conozco».'
    reason: alternative_reading
lexical_decisions:
- source_word: שְׁלֹשָׁה
  english_pob_choice: Three things
  chosen_spanish: Tres cosas
  alternatives_spanish:
  - Tres
  lexicon: HALOT
  rationale: El hebreo presenta una fórmula numérica sapiencial que en español normalmente requiere un sustantivo explícito para sonar natural. «Cosas» es una adición implícita y sobria que conserva el valor general del dicho sin concretarlo más de lo que permite el texto.
- source_word: הֵמָּה
  english_pob_choice: are
  chosen_spanish: son
  alternatives_spanish:
  - ellas son
  lexicon: HALOT
  rationale: El pronombre independiente hebreo añade énfasis («ellas»), pero en español el énfasis puede quedar implícito en la estructura breve del proverbio. Se mantiene el predicado simple con «son» para evitar torpeza estilística.
- source_word: נִפְלְאוּ
  english_pob_choice: too wonderful
  chosen_spanish: demasiado maravillosas
  alternatives_spanish:
  - maravillosas
  - admirables
  - incomprensibles
  lexicon: HALOT
  rationale: פלא expresa algo extraordinario, admirable y fuera del alcance del hablante. «Demasiado maravillosas» reproduce el matiz de exceder la capacidad de comprensión; «maravillosas» por sí solo sería demasiado débil y «incomprensibles» perdería el matiz de asombro.
- source_word: מִמֶּנִּי
  english_pob_choice: for me
  chosen_spanish: para mí
  alternatives_spanish:
  - más allá de mí
  - de mí
  lexicon: HALOT
  rationale: La expresión hebrea indica que estas cosas exceden al hablante. «Para mí» mantiene la construcción idiomática natural en español y conserva la relación con el juicio de incomprensibilidad sin añadir interpretación excesiva.
- source_word: וְאַרְבַּע
  english_pob_choice: four
  chosen_spanish: cuatro
  alternatives_spanish:
  - y cuatro
  lexicon: HALOT
  rationale: En la paralelismo numérico hebreo, el segundo miembro puede aparecer sin necesidad de repetir una conjunción explícita en español. Se conserva el avance de «tres… cuatro» con puntuación que marca la progresión.
- source_word: לֹא יְדַעְתִּים
  english_pob_choice: I do not understand
  chosen_spanish: no las entiendo
  alternatives_spanish:
  - no las conozco
  - no sé cuáles son
  lexicon: HALOT
  rationale: ידע aquí tiene fuerza de comprensión, no solo de conocimiento factual. «No las entiendo» comunica naturalmente la incapacidad de comprenderlas y respeta el objeto plural implícito en «cuatro».
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alto acuerdo y no requieren cambios sustantivos. La principal decisión en español fue hacer explícitas las elipsis normales del dicho sapiencial («cosas», «las») para lograr una lectura natural sin alterar el paralelismo numérico.
  spanish_consistency_notes:
  - Se mantiene «maravillosas» para פלא en un registro digno y bíblico, evitando «admirables» por sonar más interpretativo.
  - Se conserva la comprensión epistémica de ידע con «entiendo», en línea con la lectura inglesa «I do not understand».
  - La nota al pie preserva la alternativa más literal, donde «conozco» refleja el verbo ידע con mayor proximidad léxica.
