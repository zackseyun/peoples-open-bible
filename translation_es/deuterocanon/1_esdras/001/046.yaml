base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/001/046.yaml
  text: And though he had sworn by the name of the Lord to King Nebuchadnezzar[a], he broke his oath and rebelled; and, stiffening his neck and his heart[c][b], he transgressed the laws of the Lord God of Israel.
  footnotes:
  - marker: a
    text: Or, more literally, 'having been sworn from/by King Nebuchadnezzar.' The Greek preposition is awkward in English here; the sense is that he had taken an oath of loyalty in relation to the king.
    reason: lexical_alternative
  - marker: b
    text: '''Rebelled'' likely refers to revolt against Nebuchadnezzar, though the Greek does not restate the object explicitly.'
    reason: alternative_reading
  - marker: c
    text: Or 'the statutes' or 'the ordinances' of the Lord God of Israel.
    reason: lexical_alternative
