- from: 'Pero Yahvé me tomó de detrás del rebaño[a], y Yahvé me dijo: «Ve[b], profetiza a mi pueblo Israel».'
  to: 'Pero Yahvé me tomó de seguir al rebaño[a], y Yahvé me dijo: «Ve[b], profetiza a mi pueblo Israel».'
  rationale: Se corrige la cláusula pastoral para que el texto principal siga la decisión auditada equivalente a «from following the flock», con una formulación natural en español («de seguir al rebaño»). La lectura más literal («de detrás del rebaño») se conserva en nota, donde realmente funciona como alternativa. El resto del versículo se mantiene porque está bien alineado con el hebreo, la teología documentada y el estilo del proyecto.
