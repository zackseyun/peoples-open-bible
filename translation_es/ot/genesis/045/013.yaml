  text: וְ/הִגַּדְתֶּ֣ם לְ/אָבִ֗/י אֶת כָּל כְּבוֹדִ/י֙ בְּ/מִצְרַ֔יִם וְ/אֵ֖ת כָּל אֲשֶׁ֣ר רְאִיתֶ֑ם וּ/מִֽהַרְתֶּ֛ם וְ/הוֹרַדְתֶּ֥ם אֶת אָבִ֖/י הֵֽנָּה־־־־׃
base_translation:
