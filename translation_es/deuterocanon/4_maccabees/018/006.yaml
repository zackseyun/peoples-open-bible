- from: 'Entonces, en efecto, habiendo salido de Jerusalén, acampó contra los persas. Y la madre de los siete muchachos les decía también estas cosas a cada uno de sus hijos:'
  to: 'Entonces sí, habiendo salido de Jerusalén, acampó contra los persas. Y la madre de los siete muchachos también le decía estas cosas a cada uno de sus niños:'
