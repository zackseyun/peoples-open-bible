translation:
  language: es
  text: 'Entonces el rey Joás llamó al sacerdote Joiada y a los sacerdotes, y les dijo: «¿Por qué no están reparando el daño de la casa[a][b]? Ahora pues, no tomen dinero de sus donantes[c], sino entréguenlo para la reparación de la casa[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''la casa'', es decir, el templo.'
    reason: cultural_note
  - marker: b
    text: O 'las reparaciones de la casa' o 'las brechas de la casa' para 'el daño de la casa'.
    reason: lexical_alternative
  - marker: c
    text: La expresión hebrea es difícil; también puede entenderse como 'sus contribuyentes' o, más literalmente, 'los que ustedes conocen'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - mandó llamar
  lexicon: HALOT
  rationale: En este contexto narrativo, קרא expresa llamar o hacer venir a alguien. 'Llamó' es natural en español y conserva el valor directo de la acción sin sobreinterpretarla.
- source_word: הַמֶּלֶךְ יְהוֹאָשׁ
  english_pob_choice: King Jehoash
  chosen_spanish: el rey Joás
  alternatives_spanish:
  - el rey Jehoash
  - Joás, el rey
  lexicon: HALOT
  rationale: El español bíblico común identifica a este monarca como Joás. Se conserva el título antes del nombre para mantener la estructura natural y la referencia clara.
- source_word: לִיהוֹיָדָע הַכֹּהֵן וְלַכֹּהֲנִים
  english_pob_choice: Jehoiada the priest and the priests
  chosen_spanish: al sacerdote Joiada y a los sacerdotes
  alternatives_spanish:
  - a Joiada el sacerdote y a los sacerdotes
  - al sacerdote Joiada y a los demás sacerdotes
  lexicon: HALOT
  rationale: El hebreo nombra a Joiada y luego añade a 'los sacerdotes'. Se conserva ambos elementos sin añadir 'demás', porque el texto no lo exige.
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué razón
  - ¿A causa de qué
  lexicon: HALOT
  rationale: La interrogación directa se expresa de forma natural con '¿Por qué?'.
- source_word: אֵינְכֶם מְחַזְּקִים
  english_pob_choice: are you not repairing
  chosen_spanish: no están reparando
  alternatives_spanish:
  - no están fortaleciendo
  - no están restaurando
  lexicon: HALOT
  rationale: Aunque חזק literalmente es 'fortalecer', aquí está unido a בדק הבית y refiere a hacer reparaciones estructurales. 'Reparando' comunica mejor el sentido en español.
- source_word: בֶּדֶק הַבָּיִת
  english_pob_choice: the damage of the house
  chosen_spanish: el daño de la casa
  alternatives_spanish:
  - las reparaciones de la casa
  - las brechas de la casa
  - el daño del templo
  lexicon: HALOT
  rationale: בדק puede significar daño, brecha o lo que requiere reparación. 'Daño de la casa' preserva la imagen hebrea y deja visible que la 'casa' es el templo.
- source_word: וְעַתָּה
  english_pob_choice: Now then
  chosen_spanish: Ahora pues
  alternatives_spanish:
  - Y ahora
  - Ahora
  lexicon: HALOT
  rationale: La expresión marca el paso de reprensión a instrucción. 'Ahora pues' reproduce bien ese giro discursivo en español.
- source_word: אַ ל תִּקְחוּ כֶסֶף
  english_pob_choice: do not take money
  chosen_spanish: no tomen dinero
  alternatives_spanish:
  - no reciban dinero
  - no cobren dinero
  lexicon: HALOT
  rationale: כֶסֶף puede ser plata o dinero; en este contexto administrativo se refiere a fondos. 'No tomen dinero' es claro y fiel.
- source_word: מֵאֵת מַכָּרֵיכֶם
  english_pob_choice: from your donors
  chosen_spanish: de parte de sus donantes
  alternatives_spanish:
  - de sus conocidos
  - de sus contribuyentes
  - de parte de quienes les conocen
  lexicon: HALOT
  rationale: El término es difícil. El contexto del sostenimiento del templo favorece una referencia a quienes entregan fondos, por eso se traduce 'donantes' y se preserva una nota para la alternativa literal más ambigua.
- source_word: כִּי
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: 'Aquí introduce contraste con la prohibición anterior; en español, ''sino'' expresa mejor la corrección: no tomar dinero de unos, sino destinarlo al fin correcto.'
- source_word: לְבֶדֶק הַבַּיִת
  english_pob_choice: for the repair of the house
  chosen_spanish: para la reparación de la casa
  alternatives_spanish:
  - para reparar la casa
  - para la reparación del templo
  lexicon: HALOT
  rationale: El lamed marca destino o propósito. 'Reparación de la casa' conserva la repetición del hebreo y su sentido técnico.
- source_word: תִּתְּנֻהוּ
  english_pob_choice: give it
  chosen_spanish: entréguenlo
  alternatives_spanish:
  - denlo
  - pónganlo
  lexicon: HALOT
  rationale: El sufijo remite al dinero. 'Entréguenlo' comunica la idea de destinarlo formalmente a su finalidad.
- source_word: הַבָּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  lexicon: HALOT
  rationale: Se mantiene la expresión hebrea 'casa' en el texto principal para transparencia de fuente; el contexto muestra que se refiere al templo.
theological_decisions:
- issue: Tratamiento de יהוה / 'la casa' del templo y lenguaje cultual
  english_pob_reading: The English POB retains 'house' in the main text and notes that it refers to the temple.
  chosen_spanish_reading: Se conserva 'casa' en el cuerpo del texto y se aclara en nota que se trata del templo.
  alternative_spanish_readings:
  - templo
  - casa del Señor
  rationale: El hebreo usa de forma deliberada la expresión 'casa' para el santuario. Mantenerla preserva la transparencia del texto y la continuidad con la decisión auditada en inglés; la aclaración evita confusión para el lector español.
  doctrine_reference: No aplica; decisión de traducción cultual y de transparencia textual.
translation_notes:
  revision_awareness: Se siguió el pasaje sin cambios de revisión relevantes; la versión inglesa auditada permanece estable y se reflejó la misma distinción entre 'house' y 'temple' mediante una nota cultural en español.
  spanish_consistency_notes:
  - Se mantuvo 'casa' para el término hebreo הַבָּיִת, en línea con la transparencia del original y la nota de contexto.
  - '''Reparar/reparación'' traduce el valor contextual de חזק + בדק sin perder la alusión a daño estructural.'
  - '''Donantes'' es una solución contextual; se conserva la ambigüedad en nota porque el término hebreo es difícil.'
