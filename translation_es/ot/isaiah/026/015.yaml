  to: Has aumentado la nación, Yahvé; has aumentado la nación; has ganado gloria[a]; has extendido todos los límites de la tierra[b].
  rationale: 'Se corrige el texto para seguir más de cerca el hebreo y el expediente POB inglés: se hace natural «has aumentado la nación»; se mantiene «Yahvé»; se reemplaza «te has cubierto de gloria» por «has ganado gloria» para reflejar mejor el valor resultativo de נִכְבָּדְתָּ sin añadir una metáfora; y se prioriza la lectura territorial «límites de la tierra» para כָּל קַצְוֵי אָרֶץ, preservando «confines de la tierra» como alternativa en nota. También se reordenan y rehacen las notas para que correspondan exactamente a los anclajes y decisiones documentadas.'
