base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/009/013.yaml
  text: As soon as you enter the city[a], you will find him, before he goes up to the high place to eat. For the people will not eat until he comes, because he is the one who blesses the sacrifice; afterward those who are invited eat. So go up now[c][b], for today you will find him.
  footnotes:
  - marker: a
    text: Or 'at this time' for 'today' (Hebrew כְהַיּוֹם), emphasizing immediacy rather than the calendar day as such.
    reason: lexical_alternative
  - marker: b
    text: '''High place'' refers to an elevated worship site where sacrificial meals were held.'
    reason: cultural_note
  - marker: c
    text: '''Blesses the sacrifice'' likely means pronouncing the blessing associated with the sacrificial meal before the invited participants eat.'
    reason: cultural_note
