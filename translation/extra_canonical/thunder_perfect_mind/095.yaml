translation:
  text: … of your hearing[d][c][b][a]. I am the […] my defense […] if they […] and
    the injustice […]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The OCR’s ⲉⲩϣⲁⲛⲙⲟⲩ[ is likely ⲉⲩϣⲁⲛⲙⲟϣⲧ ‘they are able to reach/attain,’
      but could also be ⲉⲩϣⲁⲛⲙⲟⲩⲧⲉ ‘they are able to know’; the translation follows
      the ‘reach/attain’ reading to pair with the following ‘grasp’ paradox.
    reason: alignment_note
  - marker: b
    text: ⲁⲡⲟⲗⲟⲅⲓⲁ (ἀπολογία) can mean ‘defense’ or ‘reply’; here ‘speech’ is chosen
      to keep the balanced sound-field with ‘hearing.’
    reason: lexical_alternative
  - marker: c
    text: 'ⲡϫⲓⲛϭⲟⲛⲥ is a nominalized form (‘the taking/strength’). The sense is ‘not
      subject to seizure’—hence ‘cannot be grasped.’ Alternatives: ‘cannot be seized,’
      ‘cannot be comprehended.’'
    reason: lexical_alternative
  - marker: d
    text: Or 'I am the hearing within reach of everyone, and the speech that cannot
      be grasped.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲥⲱⲧⲙ
  chosen: hearing
  alternatives:
  - listening
  - obedience
  lexicon: Crum; Coptic verbal noun usage
  rationale: As a noun, ⲥⲱⲧⲙ can denote the faculty/act of hearing or obedience. In
    this paired line with “speech,” the acoustic sense (“hearing”) creates the intended
    antithetical balance; “obedience” would shift the sense away from the sound/say
    paradox that structures the poem.
- source_word: ⲁⲡⲟⲗⲟⲅⲓⲁ
  chosen: speech
  alternatives:
  - discourse
  - utterance
  - reply
  - defense
  lexicon: Greek loan (ἀπολογία) via Coptic lists; Crum s.v. loanwords
  rationale: While ἀπολογία often means “defense,” Thunder’s parallel with ⲥⲱⲧⲙ favors
    a general ‘speaking’/‘speech’ sense. Retaining “speech” preserves the sound-field
    paradox with “hearing” without importing the judicial nuance of “defense.”
- source_word: ϣⲁⲛⲙⲟϣⲧ (repr. of ⲉⲩϣⲁⲛⲙⲟⲩ[ … ])
  chosen: within reach (can reach/attain)
  alternatives:
  - attain
  - reach
  - grasp
  lexicon: Crum s.v. ⲙⲟϣⲧ ‘reach, overtake, seize’
  rationale: The OCR likely reflects the potential construction with ϣⲁⲛ- + ⲙⲟϣⲧ ‘be
    able to reach/attain.’ Rendering as “within reach” keeps the concrete, tactile
    metaphor and the accessibility contrast with the following ‘ungraspable’ speech.
- source_word: ⲡϫⲓⲛϭⲟⲛⲥ
  chosen: grasped (i.e., seized)
  alternatives:
  - seized by force
  - comprehended
  - overpowered
  lexicon: Crum s.v. ϭⲟⲛⲥ ‘be strong, prevail’; nominalizer ϫⲓⲛ- forming ‘the act/power
    of seizing/strength’
  rationale: 'The phrase points to non-seizability: not subject to the ‘taking/force’
    denoted by ϫⲓⲛϭⲟⲛⲥ. “Grasped” preserves the physical/cognitive double sense apt
    for Thunder’s paradox; “comprehended” would tilt it too far into cognition.'
parallelism_check: 'The line preserves the pairwise paradox: “hearing” (accessible)
  versus “speech” (ungraspable). A single “I am” governs both predicates, matching
  the Coptic structure where one copular clause coordinates two nouns with ⲁⲩⲱ ‘and.’
  Repeating “I am” was avoided to mirror the likely source syntax while keeping the
  antithesis sharp.'
voice_check: First-person, declarative “I am” voice is retained, with terse, gnomic
  cadence. The diction keeps the strangeness (“within reach … cannot be grasped”)
  rather than smoothing into abstract generalities. No explanatory softening was introduced.
alignment_risk_note: Overall alignment is medium. The initial standalone ⲙⲡⲉⲧⲛⲥⲱⲧⲙ
  may belong to the prior line; it was not determinative here. The fragment ⲁⲛ ⲓ ⲉⲩϣⲁⲛⲙⲟⲩ[
  likely represents ϣⲁⲛ- + ⲙⲟϣⲧ ‘be able to reach,’ but could also be read as ⲙⲟⲩⲧⲉ
  ‘know,’ which would shift the sense toward “can know me.” The final ⲡϫⲓⲛϭⲟⲛ[ⲥ is
  legible enough to support a ‘seizure/grasping’ idea, but the exact construction
  (e.g., negative scope) is partially reconstructed from context.
