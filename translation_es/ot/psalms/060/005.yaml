translation:
  language: es
  text: Tú has mostrado a tu pueblo cosas difíciles[a]; nos has hecho beber vino de aturdimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cosas duras». También: «vino de tambaleo», «vino de mareo» o «vino de confusión».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִרְאִיתָה
  english_pob_choice: You have shown
  chosen_spanish: has mostrado
  alternatives_spanish:
  - has hecho ver
  - has hecho experimentar
  lexicon: HALOT
  rationale: El hifil de ראה puede significar ‘hacer ver / mostrar’. ‘Has mostrado’ conserva el idiomatismo hebreo y suena natural en español, sin perder la idea de experiencia provocada por Dios.
- source_word: עַמְּךָ
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu nación
  - tu gente
  lexicon: HALOT
  rationale: En contexto de pacto, עַם designa al pueblo perteneciente a Dios. ‘Tu pueblo’ es la opción más fiel y clara.
- source_word: קָשָׁה
  english_pob_choice: hard things
  chosen_spanish: cosas duras
  alternatives_spanish:
  - cosas severas
  - aflicciones duras
  - durezas
  lexicon: HALOT
  rationale: El adjetivo se usa sustantivado para experiencias severas. ‘Cosas duras’ conserva la brevedad y la fuerza sin convertirlo prematuramente en una explicación interpretativa como ‘aflicciones’.
- source_word: הִשְׁקִיתָנוּ
  english_pob_choice: you have made us drink
  chosen_spanish: nos has dado a beber
  alternatives_spanish:
  - nos has hecho beber
  - nos has causado beber
  lexicon: HALOT
  rationale: 'El hifil de שקה es causativo: ‘dar/causar de beber’. ‘Nos has dado a beber’ es idiomático en español y mantiene la imposición de la experiencia.'
- source_word: יַיִן
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - vino literal
  lexicon: HALOT
  rationale: Se conserva ‘vino’ por su sentido básico y por la imagen metafórica bíblica de una bebida que desorienta o juzga.
- source_word: תַּרְעֵלָה
  english_pob_choice: wine of staggering
  chosen_spanish: vino de aturdimiento
  alternatives_spanish:
  - vino de tambaleo
  - vino de reeling
  - vino de confusión
  lexicon: HALOT
  rationale: El sustantivo expresa reeling, staggering, bewilderment o intoxicating disorientation. ‘Aturdimiento’ comunica en español el efecto de desorientación resultante sin ampliar el texto con una cláusula interpretativa.
theological_decisions:
- issue: La imagen del vino
  english_pob_reading: The verse speaks metaphorically of God giving his people an experience of severe disorientation/judgment, not literal wine-drinking.
  chosen_spanish_reading: El versículo usa una imagen metafórica de desorientación severa enviada por Dios, no de vino literal.
  alternative_spanish_readings:
  - vino literal
  - mero símbolo genérico de sufrimiento sin matiz judicial
  rationale: El paralelismo con ‘cosas duras’ y el sentido bíblico de ‘vino de aturdimiento’ favorecen leerlo como una metáfora de juicio o aflicción impuesta. La traducción conserva la imagen sin diluirla en una paráfrasis.
  doctrine_reference: Salmo 60:5; imaginería profética/bíblica de juicio mediante copa o vino de desorientación
translation_notes:
  revision_awareness: 'La redacción sigue el giro revisado del audit trail inglés: se evita expandir la segunda cola con una cláusula explicativa como ‘que nos hace tambalear’; en su lugar se mantiene la expresión nominal compacta ‘vino de aturdimiento’, más cercana al hebreo y consistente con la última revisión inglesa.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como default del proyecto cuando aparezca el nombre divino; en este versículo el sujeto está expresado por ‘Tú’ en el hebreo y no requiere inserción explícita.
  - Se preserva el paralelismo hebreo entre ‘mostrar cosas duras’ y ‘dar a beber vino de aturdimiento’.
  - ‘Tu pueblo’ conserva el valor de pueblo de pacto de עַם.
  - 'No se suaviza la fuerza causal de הִשְׁקִיתָנוּ: ‘nos has dado a beber’ mantiene la agencia divina en la experiencia descrita.'
