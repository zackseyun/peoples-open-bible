id: COL.2.9
reference: Colossians 2:9
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὅτι ἐν αὐτῷ κατοικεῖ πᾶν τὸ πλήρωμα τῆς θεότητος σωματικῶς,
base_translation:
  language: en
  yaml_path: translation/nt/colossians/002/009.yaml
  text: For in him all the fullness of deity dwells bodily,
translation:
  language: ko
  text: 이는 신성의 모든 충만[a]이 그분 안에 육체적으로[b] 거하고 있기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 πλήρωμα τῆς θεότητος. θεότης는 「신적 본성」의 강한 어휘이며, 단순한 「신성한 속성」보다 「하나님이심」 자체를 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「몸의 형태로」, 「육체적 형식으로」. 헬라어 σωματικῶς는 신성의 충만이 그리스도의 몸 안에 실제 거하심을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_korean: 이는 ... 때문입니다
  alternatives_korean:
  - 왜냐하면
  - 곧
  lexicon: BDAG
  rationale: 앞 절(메시아 표준)의 근거를 제시한다.
- source_word: ἐν αὐτῷ κατοικεῖ
  english_pob_choice: in him ... dwells
  chosen_korean: 그분 안에 ... 거하고 있기
  alternatives_korean:
  - 그분 안에 머무는
  - 그분 안에 정착하여 거하는
  lexicon: BDAG
  rationale: κατοικέω의 「정착·항존적 거하심」을 「거하고 있기」로 옮긴다.
- source_word: πᾶν τὸ πλήρωμα τῆς θεότητος
  english_pob_choice: all the fullness of deity
  chosen_korean: 신성의 모든 충만
  alternatives_korean:
  - 신격의 충만 전체
  - 하나님 되심의 모든 충만
  lexicon: BDAG
  rationale: θεότης의 강한 신적 본성 어휘를 「신성」으로 옮긴다(한국 교회 정립). πλήρωμα는 글로사리 기본 「충만」.
- source_word: σωματικῶς
  english_pob_choice: bodily
  chosen_korean: 육체적으로
  alternatives_korean:
  - 몸으로
  - 몸의 형식으로
  lexicon: BDAG
  rationale: 부사 σωματικῶς를 「육체적으로」로 직역하여 신성 충만의 실제 육체적 거하심을 보존한다.
theological_decisions:
- issue: θεότης와 σωματικῶς의 기독론적 무게
  chosen_reading: 신성의 모든 충만이 그리스도의 몸 안에 실제 거하심을 선포함
  alternative_readings:
  - 신적 속성들의 거하심으로 약화
  - 신성의 임재만을 가리킴으로 약화
  rationale: θεότης는 「하나님 되심」의 강한 어휘이며 단순한 신적 속성을 가리키지 않는다. σωματικῶς는 이 거하심이 육체적임을 명시한다. 본 번역은 본문의 높은 기독론적 주장을 약화시키지 않고 보존한다. 니케아 신경(381)과 칼케돈 정의(451)와 부합한다.
  doctrine_reference: 'DOCTRINE.md: Affirmations — Nicene Creed (381); Definition of Chalcedon (451)'
- issue: πλήρωμα(충만)의 글로사리 적용
  chosen_reading: 글로사리 기본 「충만」
  alternative_readings:
  - 「풍만」
  - 「가득함」
  rationale: KOREAN_PIPELINE.md의 글로사리 기본값을 따라 「충만」을 사용한다. 1:19과의 어휘적 일관성도 살린다.
  doctrine_reference: 'KOREAN_PIPELINE.md: πλήρωμα → 충만'
