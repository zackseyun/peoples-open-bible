translation:
  language: es
  text: Y condujo todo su ganado y todas sus posesiones que había adquirido —el ganado que había adquirido en Padán-aram— para ir a Isaac su padre a la tierra de Canaán[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacia la tierra de Canaán». El hebreo usa una forma direccional, literalmente «hacia Canaán» o «en dirección a la tierra», que indica movimiento hacia Canaán.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּנְהַג
  english_pob_choice: drove
  chosen_spanish: condujo
  alternatives_spanish:
  - llevó
  - arreó
  lexicon: HALOT
  rationale: En este contexto pastoral, נהג expresa mover rebaños o ganados. «Condujo» comunica el desplazamiento de animales y pertenencias de manera natural en español, sin perder la idea de guiarlos en movimiento.
- source_word: מִקְנֵהוּ
  english_pob_choice: his livestock
  chosen_spanish: sus ganados
  alternatives_spanish:
  - su ganado
  - sus reses
  lexicon: HALOT
  rationale: El hebreo abarca el conjunto de animales domésticos/ganado. «Ganados» conserva el sentido colectivo y permite acompañar el paralelo con «ganados» repetido en la frase explicativa.
- source_word: רְכֻשׁוֹ
  english_pob_choice: his possessions
  chosen_spanish: sus posesiones
  alternatives_spanish:
  - sus bienes
  - su propiedad
  lexicon: HALOT
  rationale: רְכוּשׁ se refiere a bienes o propiedad mobiliaria. «Posesiones» es amplio, claro y suficientemente formal para el registro bíblico.
- source_word: רָכָשׁ
  english_pob_choice: had acquired
  chosen_spanish: había adquirido
  alternatives_spanish:
  - había obtenido
  - había ganado
  lexicon: HALOT
  rationale: El verbo enfatiza la adquisición de bienes. «Había adquirido» mantiene el valor económico y la repetición del verbo en la línea, como en el texto fuente y en el auditorio inglés.
- source_word: מִקְנֵה קִנְיָנוֹ
  english_pob_choice: the livestock he had acquired
  chosen_spanish: los ganados que había adquirido
  alternatives_spanish:
  - el ganado de su adquisición
  - los ganados de su propio haber
  lexicon: HALOT
  rationale: La expresión hebrea es enfática y reiterativa. Siguiendo la revisión inglesa, la forma más natural en español es repetir el sentido con «los ganados que había adquirido», preservando la redundancia retórica sin una calca incómoda.
- source_word: בְּפַדַּן אֲרָם
  english_pob_choice: in Paddan-aram
  chosen_spanish: en Padan-aram
  alternatives_spanish:
  - en Paddan-aram
  - en Padán-aram
  lexicon: HALOT
  rationale: Es un nombre propio transliterado. «Padan-aram» sigue una forma española reconocible y estable, conservando la referencia geográfica sin interpretarla.
- source_word: לָבוֹא
  english_pob_choice: to go
  chosen_spanish: para ir
  alternatives_spanish:
  - a fin de ir
  - para dirigirse
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad. «Para ir» es directo y fiel al propósito del movimiento, con una construcción natural en español.
- source_word: אֶל יִצְחָק אָבִיו
  english_pob_choice: to Isaac his father
  chosen_spanish: a Isaac su padre
  alternatives_spanish:
  - hacia Isaac su padre
  - para ver a Isaac su padre
  lexicon: HALOT
  rationale: La preposición indica dirección hacia Isaac. En español, «a Isaac su padre» conserva la relación filial y la meta del viaje sin añadir elementos no presentes.
- source_word: אַ֥רְצָה כְּנָעַן
  english_pob_choice: in the land of Canaan
  chosen_spanish: a la tierra de Canaán
  alternatives_spanish:
  - hacia la tierra de Canaán
  - a Canaán
  lexicon: HALOT
  rationale: La forma direccional hebrea apunta hacia Canaán. En español, «a la tierra de Canaán» refleja el movimiento de destino con claridad; la nota conserva la alternativa direccional del hebreo.
theological_decisions:
- issue: Direccionalidad de אַרְצָה כְּנָעַן
  english_pob_reading: The Hebrew uses a directional form, literally 'Canaan-ward/landward,' indicating movement toward Canaan.
  chosen_spanish_reading: «a la tierra de Canaán» con nota que indica el matiz direccional del hebreo
  alternative_spanish_readings:
  - «hacia la tierra de Canaán»
  - «Canaán-ward»
  rationale: El hebreo no solo nombra el destino, sino que marca orientación. El texto principal usa un español idiomático y la nota preserva el matiz semántico sin oscurecer la lectura pública.
  doctrine_reference: Ninguna doctrina en disputa; decisión semántica y geográfica.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que simplificó la repetición pesada de «the livestock of his own acquisition» a «the livestock he had acquired in Paddan-aram», manteniendo el paralelismo y la repetición retórica del versículo. El español refleja esa decisión con una segunda cláusula explicativa más natural, sin perder la reiteración de la adquisición.
  spanish_consistency_notes:
  - Se mantuvo «Y» inicial para reproducir el flujo narrativo hebreo y el registro bíblico.
  - «Ganados» se usa dos veces para conservar el paralelismo entre מִקְנֵהוּ y מִקְנֵה קִנְיָנוֹ.
  - Se prefirió «Padan-aram» como transliteración española coherente y fácilmente legible.
  - No se sustituyó la referencia geográfica por una paráfrasis teológica o interpretativa.
