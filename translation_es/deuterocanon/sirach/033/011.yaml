    text: El griego ὁ σωζόμενος también puede traducirse como «el que es salvado» o «el que se salva». En este contexto de juicio, «el sobreviviente» expresa de forma más natural a quien ha escapado solo para enfrentar destrucción.
    reason: lexical_alternative
