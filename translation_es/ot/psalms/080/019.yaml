review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la primera mitad del verso: וְלֹא נָסוֹג מִמֶּךָ se refleja adecuadamente como una consecuencia/resultante: «Entonces no nos apartaremos de ti». También representa aceptablemente תְּחַיֵּנוּ con un verbo de revitalización. Sin embargo, la última cláusula וּבְשִׁמְךָ נִקְרָא no está fielmente expresada por «llamaremos tu nombre», porque en hebreo con קרא + בְּשֵׁם el sentido idiomático es «invocar / llamar al nombre de», no simplemente mencionar el nombre.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero tiene dos problemas de legibilidad/estilo: el marcador de nota está mal colocado al inicio de «avívanos» en vez de anclarse después de la palabra, y «llamaremos tu nombre» suena antinatural e incompleto en español bíblico contemporáneo. «Avívanos» es comprensible, pero «revívenos» suena más natural y además se alinea mejor con la revisión final del audit trail inglés.'
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. No aparece el nombre divino explícito. La decisión clave es idiomática: קרא בשם debe verterse como «invocar tu nombre» o «llamar a tu nombre», preferiblemente «invocar tu nombre» en español natural y eclesial. Para תְּחַיֵּנוּ, «revívenos» encaja mejor que «avívanos» con el English POB final y con el matiz documentado, conservando la nota léxica sobre alternativas («presérvanos con vida», «haznos vivir»).'
  issues:
  - severity: medium
    issue: «llamaremos tu nombre» no refleja bien וּבְשִׁמְךָ נִקְרָא
    rationale: El hebreo קרא + בְּשֵׁם forma un modismo de invocación; en español «llamar tu nombre» suena como nombrarlo, no como acudir a Dios en oración/adoración.
  - severity: low
    issue: El marcador de nota [a] está mal anclado en «[a]avívanos»
    rationale: Las instrucciones exigen que el marcador aparezca en la palabra o frase pertinente con formato [a]; en español debe colocarse después del término anclado, no antes.
  - severity: low
    issue: «Avívanos» es menos natural que «revívenos» en este contexto
    rationale: Aunque no es imposible, «revívenos» suena más idiomático en español bíblico moderno y sigue la revisión inglesa final que cambió a «revive us».
  revised_spanish_text: Entonces no nos apartaremos de ti; revívenos[a], e invocaremos tu nombre.
  revised_footnotes:
