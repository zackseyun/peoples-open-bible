  to: Cuando estos leprosos[a] llegaron al borde del campamento, entraron en una tienda, comieron y bebieron, y se llevaron de allí plata, oro y ropa; luego fueron y lo escondieron. Después regresaron, entraron en otra tienda, se llevaron cosas de allí, y fueron y las escondieron.
  rationale: Se corrigió la omisión del objeto en la última cláusula para que el español exprese con claridad el sentido de וַיַּטְמִנוּ. También se ajustó «vestidos» a «ropa» para reflejar mejor בְגָדִים en español general. La secuencia se puntuó de manera más natural sin alterar el contenido fuente. En la segunda ocurrencia de וַיִּשְׂאוּ מִשָּׁם, se explicitó «cosas» siguiendo la lógica del English POB («carried things off»), ya que en español ayuda a evitar una elipsis áspera.
