translation:
  language: es
  text: 'Entonces Tobías dijo a Ragüel[a]: «Despídeme, porque mi padre y mi madre ya no esperan verme».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ya no tienen esperanza de verme». El verbo griego puede significar tanto «esperar» como «tener esperanza»; aquí se prefirió «esperan» por naturalidad y porque el contexto expresa que han dado por perdida la posibilidad de volver a verlo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἶπεν δὲ
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: LSJ
  rationale: δέ es una partícula de enlace leve; «Entonces» conserva el avance narrativo natural sin añadir contraste fuerte.
- source_word: Τωβείας
  english_pob_choice: Tobias
  chosen_spanish: Tobit
  alternatives_spanish:
  - Tobías
  - Tobias
  lexicon: LSJ
  rationale: En español bíblico, el nombre del libro y del personaje suele darse como «Tobit» en este contexto deuterocanónico; mantiene coherencia con el título tradicional en español y evita ambigüedad entre formas castellanas del nombre.
- source_word: τῷ Ῥαγουὴλ
  english_pob_choice: to Raguel
  chosen_spanish: a Ragüel
  alternatives_spanish:
  - a Raguel
  - a Raguel
  lexicon: LSJ
  rationale: El dativo se vierte naturalmente con «a». Se usa «Ragüel» para reflejar la transliteración española habitual del nombre y mantener la lectura fluida.
- source_word: Ἐξαπόστειλόν με
  english_pob_choice: Send me away
  chosen_spanish: Despídeme
  alternatives_spanish:
  - Envíame lejos
  - Déjame ir
  - Mándame away
  lexicon: LSJ
  rationale: El imperativo aoristo expresa petición de partida o liberación; «Despídeme» comunica esa solicitud directa en español con fuerza natural y sin perder la idea de autorización para irse.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: LSJ
  rationale: Introduce la razón de la petición; «porque» es la conjunción más clara y directa en español.
- source_word: ὁ πατήρ μου καὶ ἡ μήτηρ μου
  english_pob_choice: my father and my mother
  chosen_spanish: mi padre y mi madre
  alternatives_spanish:
  - mis padres
  lexicon: LSJ
  rationale: Se conserva la mención explícita de ambos progenitores, que refuerza el peso afectivo del motivo, en lugar de compactarlo en «mis padres».
- source_word: οὐκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no más
  - ya no más
  lexicon: LSJ
  rationale: «Ya no» expresa la cesación temporal de manera idiomática en español y corresponde bien a οὐκέτι.
- source_word: ἐλπίζουσιν
  english_pob_choice: expect
  chosen_spanish: esperan
  alternatives_spanish:
  - tienen esperanza de
  - esperan ver
  lexicon: LSJ
  rationale: El verbo puede significar «esperar» o «tener esperanza». Se mantiene «esperan» para conservar esa ambigüedad semántica que el inglés POB trató como «expect», y el contexto de ver de nuevo al hijo permite naturalmente esa lectura en español.
- source_word: ὄψεσθαί με
  english_pob_choice: to see me
  chosen_spanish: verme
  alternatives_spanish:
  - que me vean
  - a verme
  lexicon: LSJ
  rationale: El infinitivo de futuro medio se traduce de modo natural como «verme», preservando el contenido sin sobrecargar la sintaxis española.
translation_notes:
  revision_awareness: 'Coincide con el testimonio griego de Tobit 10:8: Tobias/Tobit pide a Raguel que lo deje partir porque sus padres ya no esperan verlo. No se documentan revisiones textuales o cambios de sentido relevantes respecto del pasaje base.'
  spanish_consistency_notes:
  - Se mantiene «ya no» para οὐκέτι y «esperan» para ἐλπίζουσιν, preservando la tensión léxica entre expectativa y esperanza indicada en el audit trail inglés.
  - Se usa «Despídeme» como equivalente funcional de Ἐξαπόστειλόν με, evitando tanto la literalidad rígida como una paráfrasis más amplia.
  - El nombre «Ragüel» se normaliza con diéresis para lectura española, sin alterar la identificación del personaje.
