translation:
  language: es
  text: y[a], siendo abrumado por las amenazas del tirano y siendo anegado por las olas embravecidas de los tormentos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «siendo inundado por las amenazas del tirano y empapado por las olas tempestuosas de las torturas». El griego mantiene en ambos participios y en el sustantivo final una imagen sostenida de inundación y tempestad marina.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατακλυζόμενος
  english_pob_choice: being overwhelmed
  chosen_spanish: siendo abrumado
  alternatives_spanish:
  - siendo inundado
  - siendo sumergido
  lexicon: LSJ
  rationale: El participio conserva la imagen de una inundación o diluvio; en español, «abrumado» comunica la sensación de quedar totalmente sobrepasado sin perder el valor figurado del verbo.
- source_word: ἀπειλαῖς
  english_pob_choice: threats
  chosen_spanish: amenazas
  alternatives_spanish:
  - amenazas verbales
  - conminaciones
  lexicon: BDAG
  rationale: El sentido normal es de amenazas coercitivas. «Amenazas» es el equivalente directo, claro y natural en español.
- source_word: καταντλούμενος
  english_pob_choice: being swamped
  chosen_spanish: siendo anegado
  alternatives_spanish:
  - siendo empapado
  - siendo inundado
  lexicon: LSJ
  rationale: El verbo continúa la metáfora acuática. «Anegado» mantiene la idea de quedar cubierto o invadido por aguas, con suficiente fuerza literaria en español.
- source_word: βασάνων
  english_pob_choice: torments
  chosen_spanish: tormentos
  alternatives_spanish:
  - torturas
  - pruebas
  lexicon: BDAG
  rationale: En este contexto martirial, «tormentos» conserva la intensidad del sufrimiento infligido sin forzar un tecnicismo penal específico.
- source_word: τρικυμίαις
  english_pob_choice: billows
  chosen_spanish: oleajes
  alternatives_spanish:
  - olas encrespadas
  - tormentas marinas
  lexicon: LSJ
  rationale: La palabra describe mar agitado o oleaje violento. «Oleajes» mantiene el campo semántico náutico y la continuidad de la metáfora de inundación y tempestad.
- source_word: τοῦ τυράννου
  english_pob_choice: the tyrant’s
  chosen_spanish: del tirano
  alternatives_spanish:
  - del opresor
  - del tirano cruel
  lexicon: LSJ
  rationale: El genitivo se expresa naturalmente con posesión en español. «Tirano» preserva la carga moral y política del término.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden de forma alta; no se registran revisiones aplicadas en la fuente auditada. La traducción española sigue la misma estructura imagística de agua/tormenta señalada por la nota inglesa.
  spanish_consistency_notes:
  - Se conserva el paralelismo de los dos participios con «siendo… y siendo…».
  - «Tirano» se mantiene por coherencia con la valoración moral del contexto y con el inglés auditado.
  - La nota [a] refleja la alternativa más literal sin desplazar el texto principal idiomático.
