    rationale: El texto coloca [a] en «a mí», pero la nota [a] trata sobre «desde el tiempo de su ser». Esto incumple la disciplina requerida de que cada nota aparezca en la palabra o frase pertinente del texto.
  - severity: medium
    issue: Hay redundancia/confusión entre las notas [a] y [b] sobre מֵעֵת הֱיוֹתָהּ.
    rationale: Ambas notas explican alternativas o precisión sobre la misma expresión. Conviene consolidarlas y mantener solo una nota léxica bien enfocada, como en la auditoría inglesa.
  - severity: low
    issue: «desde el tiempo de su venir a ser» suena algo calco y menos natural en español.
    rationale: Aunque fiel, «desde el tiempo en que llegó a ser» o similar preserva mejor el sentido verbal del hebreo con mayor naturalidad para lectores hispanos.
  revised_spanish_text: 'Acérquense a mí; oigan esto: desde el principio no hablé en secreto; desde el tiempo en que llegó a ser[a], yo estaba allí. Y ahora el Señor Yahvé me ha enviado[b], y su Espíritu[c].'
