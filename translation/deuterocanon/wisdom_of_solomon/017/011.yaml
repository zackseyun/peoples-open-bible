theological_decisions:
- issue: Moral psychology of guilt in the verse
  chosen_reading: The verse describes wickedness as inwardly cowardly because conscience condemns it and drives it to expect disaster.
  alternative_readings:
  - 'The verse could be read more impersonally: wickedness simply ''testifies'' to fearful realities when condemned.'
  rationale: The immediate pairing of καταδικαζομένη with συνεχομένη τῇ συνειδήσει supports an internal, conscience-driven reading rather than an external judicial scene alone. The translation preserves this moral-psychological emphasis without adding doctrinal claims beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it; readable modern English, not archaic or academic.
