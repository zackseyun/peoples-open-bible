base_translation:
  language: en
  yaml_path: translation/ot/leviticus/020/002.yaml
  text: 'And you shall say to the sons of Israel: Any man from the sons of Israel[a], or from the sojourner who sojourns in Israel, who gives any of his offspring to Molech shall surely be put to death[c][b]; the people of the land shall stone him with stones.'
  footnotes:
  - marker: a
    text: 'Or ''the resident foreigner who resides in Israel.'' The Hebrew uses a noun and cognate verb: ''the sojourner who sojourns.'''
    reason: lexical_alternative
  - marker: b
    text: '''Offspring'' translates a Hebrew word literally meaning ''seed,'' here referring to one''s descendants or children.'
    reason: lexical_alternative
  - marker: c
    text: Molech may refer to a deity traditionally associated with child sacrifice; some interpreters understand the term as referring instead to a type of offering.
    reason: alternative_reading
