translation:
  language: es
  text: Que los ríos aplaudan; que los montes canten de alegría[a] a una,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «griten de alegría juntos». El verbo hebreo también puede denotar un clamor jubiloso, además de canto gozoso.
    reason: lexical_alternative
lexical_decisions:
- source_word: נְהָרוֹת
  english_pob_choice: the rivers
  chosen_spanish: los ríos
  alternatives_spanish:
  - los arroyos
  lexicon: HALOT
  rationale: El sustantivo plural designa ríos; «los ríos» reproduce de forma directa la imagen cósmica del texto y mantiene la amplitud poética mejor que una reducción a «arroyos».
- source_word: יִמְחֲאוּ
  english_pob_choice: let ... clap
  chosen_spanish: aplaudan
  alternatives_spanish:
  - den palmadas
  - batan las manos
  lexicon: HALOT
  rationale: El verbo מחא expresa golpear o aplaudir; en español, «aplaudan» conserva el movimiento corporal festivo y la fuerza exhortativa del hebreo sin sonar rígido.
- source_word: כָף
  english_pob_choice: their hands
  chosen_spanish: con sus manos
  alternatives_spanish:
  - con las palmas
  - con las manos
  lexicon: HALOT
  rationale: En el idiomático מחא כף, el sentido es aplaudir con la mano/palma. «Con sus manos» mantiene la imagen natural en español y evita una literalidad extraña como «la palma» en singular.
- source_word: יַחַד
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - a la vez
  - en unión
  lexicon: HALOT
  rationale: El adverbio significa «juntos». «Juntos» conserva la idea de acción unida y encaja con el paralelismo poético del verso.
- source_word: הָרִים
  english_pob_choice: the mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - las montañas
  lexicon: HALOT
  rationale: «Montes» es un equivalente natural y poético en español para הָרִים, y mantiene el tono bíblico sin perder inteligibilidad.
- source_word: יְרַנֵּנוּ
  english_pob_choice: let ... sing for joy
  chosen_spanish: canten de alegría
  alternatives_spanish:
  - griten de alegría
  - alcen cantos de júbilo
  lexicon: HALOT
  rationale: El verbo רנן puede implicar canto jubiloso o grito de alegría. «Canten de alegría» preserva el componente jubiloso y funciona bien en paralelo con «aplaudan».
theological_decisions:
- issue: Personificación poética de la creación
  english_pob_reading: Retain the personified imagery directly ('rivers clap,' 'mountains sing for joy')
  chosen_spanish_reading: 'Mantener la personificación: los ríos y los montes actúan como participantes en la alabanza.'
  alternative_spanish_readings:
  - Interpretar la imagen de modo más abstracto como una figura de la alabanza humana inspirada por la creación
  rationale: El hebreo presenta de manera directa a los ríos y a los montes como sujetos poéticos de la alabanza. La traducción debe conservar esa imagen sin reducirla a una paráfrasis abstracta.
  doctrine_reference: Principio de primacía del texto original; conservar la imaginería poética sin atenuarla.
translation_notes:
  revision_awareness: 'El borrador sigue la revisión final sin cambios del contexto inglés: no hay correcciones pendientes ni ajustes textuales adicionales. Se conservan la personificación de la creación y la ambigüedad jubilosa de יְרַנֵּנוּ mediante una opción española idiomática.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - «Montes» se prefiere aquí por registro poético bíblico, aunque «montañas» sería también válido.
  - La nota mantiene la alternativa semántica de יְרַנֵּנוּ sin sobrecargar el texto principal.
