review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido general del griego: Judas combate contra los hijos de Esaú en Judea/Akrabattene, porque oprimían cercando a Israel; luego los derrota y toma sus despojos. Sin embargo, falta una nota correspondiente a la ambigüedad sintáctica de ἐν τῇ Ἰουδαίᾳ τὴν Ἀκραβαττήνην que el rastro inglés conserva, y conviene ajustar ligeramente la redacción para reflejar mejor la presión envolvente continua de περικάθηντο y un español más natural en la cláusula geográfica.'
  spanish_quality_summary: El español es claro y mayormente natural. «Combatía contra» funciona, y «despojos» es adecuado. No obstante, «rodeaban a Israel» puede sonar demasiado estático en español y menos preciso que una expresión como «tenían cercado a Israel», que comunica mejor la presión continua. Además, la nota actual está bien, pero el texto requiere también una nota para la geografía/sintaxis de Akrabattene.
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. Se conserva correctamente «hijos de Esaú» en vez de interpretar como «edomitas» en el texto principal, con nota léxica apropiada. «Israel» mantiene bien el singular colectivo. Las decisiones militares («gran golpe», «despojos») son aceptables dentro del campo semántico documentado.
  issues:
  - severity: medium
    issue: Falta la nota sobre la sintaxis/geografía de «Akrabattene» presente en el audit trail inglés.
    rationale: El inglés documenta que la construcción griega es comprimida y también puede entenderse como «en Judea, en Akrabattene» o «en Judea, en/acerca de Akrabattene». Esa información debe preservarse en español, especialmente porque el texto principal toma una opción interpretativa («región»).
  - severity: low
    issue: «Rodeaban a Israel» no comunica tan bien el matiz de presión envolvente continua de περικάθηντο.
    rationale: El verbo griego sugiere que estaban cercando/estrechando a Israel, no solo ubicados alrededor. «Tenían cercado a Israel» o «acosaban cercando a Israel» suena más idiomático y preciso en español bíblico moderno.
  revised_spanish_text: Y Judas combatía[a] contra los hijos de Esaú en Judea, en la región de Akrabattene[b], porque tenían cercado a Israel. Y les dio un gran golpe, y los sometió, y tomó sus despojos.
  revised_footnotes:
  - marker: a
    text: 'O: «los descendientes de Esaú»; es decir, probablemente los edomitas. El griego dice literalmente «los hijos de Esaú».'
    reason: lexical_alternative
  - marker: b
    text: Akrabattene es un nombre regional en Judea; la sintaxis griega es comprimida y también puede entenderse como «en Judea, en Akrabattene».
    reason: cultural_note
  revision_rationale: Se conserva la traducción base, pero se añade la nota geográfica/sintáctica exigida por el audit trail inglés y se mejora levemente «rodeaban a Israel» a «tenían cercado a Israel» para reflejar mejor el valor de περικάθηντο en español natural.
