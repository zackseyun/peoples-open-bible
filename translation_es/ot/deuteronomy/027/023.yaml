translation:
  language: es
  text: 'Maldito sea el hombre que se acueste con su suegra[a]. Y todo el pueblo dirá: «Amén».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más explícitamente: «tenga relaciones sexuales con su suegra». El hebreo usa el giro idiomático «se acueste con».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרוּר
  english_pob_choice: Cursed
  chosen_spanish: Maldito
  alternatives_spanish:
  - Maldicho
  - Sea maldito
  lexicon: HALOT
  rationale: En una fórmula legal de maldición pactual, 'maldito' transmite de forma directa el valor declarativo del hebreo. 'Sea maldito' sonaría más perifrástico y menos natural en español actual.
- source_word: שֹׁכֵב עִם
  english_pob_choice: lies with
  chosen_spanish: se acueste con
  alternatives_spanish:
  - duerma con
  - tenga relaciones sexuales con
  lexicon: HALOT
  rationale: El hebreo usa un eufemismo sexual. En español, 'se acueste con' conserva el carácter idiomático sin ocultar el sentido legal y sexual del pasaje. 'Tenga relaciones sexuales con' explicita más, pero pierde parte del registro formulístico.
- source_word: חֹתַנְתּוֹ
  english_pob_choice: his mother-in-law
  chosen_spanish: su suegra
  alternatives_spanish:
  - su madre política
  lexicon: HALOT
  rationale: '''חֹתֶנֶת'' designa a la madre política, es decir, la suegra; ''suegra'' es el equivalente idiomático natural en español. ''Madre política'' es más literal pero menos idiomática.'
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo de Israel
  - toda la gente
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'todo el pueblo'; en español, 'todo el pueblo' conserva el alcance sin añadir 'de Israel', que no está explícito en el texto.
- source_word: אָמֵן
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Así sea
  lexicon: HALOT
  rationale: Se conserva la respuesta litúrgica por transliteración, como en el hebreo y en la tradición bíblica recibida, porque ya es plenamente inteligible en español.
theological_decisions:
- issue: Eufemismo sexual en una fórmula de maldición legal
  english_pob_reading: Render the idiom transparently as 'lies with' rather than a blunter paraphrase.
  chosen_spanish_reading: 'Mantener un eufemismo transparente: ''se acueste con''.'
  alternative_spanish_readings:
  - tenga relaciones sexuales con
  - duerma con
  rationale: La traducción conserva el eufemismo hebreo sin volverlo ambiguo ni demasiado técnico. Así respeta la forma legal y el peso moral del texto sin sobreparáfrasis.
  doctrine_reference: 'Translation philosophy: optimal equivalence; original-language primacy over translation tradition.'
- issue: Respuesta litúrgica congregacional
  english_pob_reading: And all the people shall say, 'Amen.'
  chosen_spanish_reading: 'Y todo el pueblo dirá: «Amén».'
  alternative_spanish_readings:
  - 'Y todo el pueblo responderá: «Amén».'
  rationale: '''Dirá'' refleja con fidelidad la fórmula hebrea וְאָמַר en una secuencia litúrgica repetida. ''Responderá'' es posible, pero introduce un matiz no explicitado por el verbo.'
  doctrine_reference: 'Translation philosophy §4: formally preserving the performative liturgical speech act.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español, y se mantuvo la nota anclada al giro idiomático correspondiente.
  spanish_consistency_notes:
  - Se preserva el tono jurídico-litúrgico del hebreo con vocabulario sobrio y actual.
  - Se evita añadir 'de Israel' porque no aparece explícitamente en el versículo.
  - Se mantiene 'Amén' como respuesta congregacional transliterada, coherente con el uso bíblico y eclesial en español.
