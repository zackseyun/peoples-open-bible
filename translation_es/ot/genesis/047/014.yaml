base_translation:
  language: en
  yaml_path: translation/ot/genesis/047/014.yaml
  text: And Joseph gathered up all the silver found in the land of Egypt and in the land of Canaan for the grain that they were buying[b][a], and Joseph brought the silver into Pharaoh’s house.
  footnotes:
