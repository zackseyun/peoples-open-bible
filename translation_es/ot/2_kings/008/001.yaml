review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro POB en la mayoría de los puntos: pluscuamperfecto narrativo («había hablado»), identificación de la mujer por el milagro previo, imperativos femeninos, nombre divino «Yahvé», y duración de siete años. Sin embargo, hay varios desajustes de sentido y naturalidad: «cuyo hijo había devuelto a la vida» omite el objeto indirecto requerido en español; «tu casa» no comunica bien aquí el sentido de «household» en un contexto de desplazamiento; «ha llamado al hambre» suena poco idiomático para לָרָעָב, que aquí se entiende mejor como «ha convocado/traído una hambruna»; y «sobre la tierra» conviene afinarse a «sobre el país/la tierra» según el referente regional.'
  spanish_quality_summary: 'El español es en general claro, pero presenta giros algo duros o poco idiomáticos: «cuyo hijo había devuelto a la vida», «reside dondequiera que residas» y especialmente «ha llamado al hambre». También «sojorna» en la nota no es español aceptable. Conviene elevar la legibilidad sin perder la repetición deliberada de גור. «Hogar» o «familia» serían interpretativos; «casa» es demasiado literal. «Los tuyos» o «tu casa» con nota podrían funcionar, pero «tu casa» sigue siendo menos claro en esta escena. La mejor reparación mínima es «tú y tu familia» o «tú y tu casa»; dado el audit trail inglés explícito, «tu familia» comunica mejor el valor doméstico.'
  glossary_alignment: Alinea bien con la terminología del proyecto en «Yahvé». No aparecen otros términos glosario sensibles. La decisión sobre גור debe conservar la idea de residencia temporal; «residir» puede valer con nota, pero la nota debe usar alternativas idiomáticas en español como «vivir temporalmente» o «establecerte por un tiempo», no «sojorna».
  issues:
  - severity: medium
    issue: Construcción defectuosa en «cuyo hijo había devuelto a la vida»
    rationale: 'En español, «devolver a la vida» requiere objeto indirecto: «a cuyo hijo había devuelto a la vida» o mejor «cuyo hijo había vuelto a la vida» si el sujeto fuera otro, pero aquí el sujeto es Elíseo. La forma actual suena gramaticalmente incompleta.'
  - severity: medium
    issue: «Tu casa» no refleja bien el sentido contextual de וּבֵיתֵךְ
    rationale: En este contexto de salir y habitar en otro lugar, el hebreo apunta al hogar doméstico/personas dependientes, no meramente al edificio. El audit trail inglés eligió «your household» por esta razón. En español «tu familia» comunica mejor el referente.
  - severity: high
    issue: «Yahvé ha llamado al hambre» es poco natural y semánticamente débil
    rationale: Aunque calca la metáfora hebrea, en español «llamar al hambre» no suena idiomático y puede resultar oscuro. «Ha convocado una hambruna» o «ha llamado una hambruna» serían más comprensibles; «hambruna» expresa mejor רָעָב que «hambre» en este contexto nacional y prolongado.
  - severity: low
    issue: Nota b contiene «sojorna», que no es forma española válida
    rationale: La nota debe ofrecer alternativas españolas legibles y fieles. «Sojorna» es un anglicismo/no-palabra en español bíblico general.
