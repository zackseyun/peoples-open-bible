review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: Moab habla a los ancianos de Madián, expresa temor de que el grupo israelita consuma todo alrededor, usa el símil del buey, y cierra con la nota de trasfondo sobre Balac. Sin embargo, hay dos problemas de alineación puntual: (1) el verbo con sujeto singular colectivo en español está bien en «esta multitud lamerá», pero la nota [a] altera el alcance al decir «devorará todo lo que nos rodea», cuando la alternativa documentada corresponde al verbo «lamerá/devorará» y no a toda la cláusula; (2) las notas [a] y [b] están ancladas en lugares invertidos respecto de su contenido y del rastro de auditoría inglés.'
  spanish_quality_summary: El español es claro, natural y de registro bíblico moderno. «Ancianos de Madián», «todo lo que nos rodea», «como lame el buey» y «era rey de Moab en aquel tiempo» son lecturas fluidas y dignas. Hace falta solo corregir la colocación de las notas para evitar confusión lectora y ajustar la redacción de la nota léxica sobre «lamerá».
  glossary_alignment: No hay conflicto con la terminología proyectual principal. Los nombres propios «Moab», «Madián», «Balac» y «Sipor» son aceptables en español bíblico. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. La decisión de mantener «lamerá» preserva correctamente la imaginería de לחך; «multitud» sigue la revisión inglesa; «hierba del campo» es admisible si se conserva en nota que el hebreo puede ser más amplio que césped/hierba estricta.
  issues:
  - severity: medium
    issue: Los marcadores de notas están colocados en frases equivocadas.
    rationale: La nota [a] trata del verbo «lamer/devorar» y debe anclarse en «lamerá»; la nota [b] trata de «hierba del campo/vegetación verde» y debe anclarse en «hierba del campo». En el borrador actual, [a] aparece junto a «multitud» y [b] junto a «nos rodea», lo que desorienta y no cumple la disciplina de anclaje.
  - severity: medium
    issue: La nota [a] formula mal la alternativa léxica.
    rationale: La alternativa auditada es al verbo («devorará» / «will devour»), no necesariamente a toda la cláusula «devorará todo lo que nos rodea». Conviene limitar la nota a la decisión léxica pertinente.
  revised_spanish_text: 'Y Moab dijo a los ancianos de Madián: «Ahora esta multitud lamerá[a] todo lo que nos rodea, como lame el buey la hierba del campo[b]». Balac hijo de Sipor era rey de Moab en aquel tiempo.'
  revised_footnotes:
  - marker: a
    text: O «devorará». El verbo hebreo es literalmente «lamer», y el texto principal conserva esa imagen.
    reason: lexical_alternative
  - marker: b
    text: O «la vegetación verde del campo». El hebreo se refiere más ampliamente a la vegetación verde.
    reason: lexical_alternative
  revision_rationale: Se conservó el texto base casi intacto porque es fiel y natural, pero se corrigieron los anclajes de las notas para que correspondan al lugar exacto en el texto y se ajustó la nota [a] para que refleje con precisión la alternativa léxica documentada. También se afinó la nota [b] para expresar mejor que יֶרֶק puede ser más amplio que «hierba».
