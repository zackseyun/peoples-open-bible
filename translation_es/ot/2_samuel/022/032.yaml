translation:
  language: es
  text: Pues ¿quién es Dios aparte de Yahvé? ¿Y quién es una roca aparte de nuestro Dios?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿quién es Roca aparte de nuestro Dios?». En hebreo, «roca» es una metáfora frecuente y a veces funciona casi como título para Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La partícula introduce la base retórica de la pregunta anterior; «Porque» conserva bien la relación explicativa en español sin sonar forzada.
- source_word: מִי
  english_pob_choice: who
  chosen_spanish: quién
  alternatives_spanish:
  - quién es
  - qué persona
  lexicon: HALOT
  rationale: Es una pregunta retórica directa; «quién» es el equivalente natural y mantiene la fuerza interrogativa.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dios
  - el Poderoso
  lexicon: HALOT
  rationale: En este contexto monoteísta el referente es el Dios verdadero, no una deidad genérica. «Dios» mantiene la lectura teológica del original y del inglés POB.
- source_word: מִבַּלְעֲדֵי
  english_pob_choice: besides
  chosen_spanish: fuera de
  alternatives_spanish:
  - además de
  - aparte de
  - sin
  lexicon: HALOT
  rationale: 'La expresión marca exclusión: no existe otro Dios/roca aparte de Yahvé y de nuestro Dios. «Fuera de» comunica con claridad esa exclusividad en español.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del POB en español de transliterar el nombre divino con «Yahvé», preservando el nombre personal del pacto en vez de sustituirlo por un título.
- source_word: צוּר
  english_pob_choice: a rock
  chosen_spanish: una roca
  alternatives_spanish:
  - Roca
  - refugio
  - peñasco
  lexicon: HALOT
  rationale: El hebreo usa una metáfora de estabilidad y protección. Aquí funciona como sustantivo común en predicación, por eso «una roca» conserva el valor metafórico sin convertirlo automáticamente en título.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestro Dios
  - el Dios nuestro
  lexicon: HALOT
  rationale: El sufijo posesivo de primera persona plural expresa pertenencia de pacto y comunidad; «nuestro Dios» lo reproduce de forma natural en español.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton directamente. En la línea editorial del POB, la traducción española debe preservar el nombre revelado de Dios; «Yahvé» es la forma adoptada para el texto principal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Si צוּר debe leerse como título o como metáfora nominal
  english_pob_reading: a rock
  chosen_spanish_reading: una roca
  alternative_spanish_readings:
  - Roca
  - peñasco
  rationale: La sintaxis hebrea es comparativa y predicativa; no exige capitalización de título. «Una roca» mantiene la imagen de firmeza y refugio sin perder la tensión metafórica que el inglés POB también documenta.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La revisión más reciente indica que no se requirieron cambios adicionales y que hubo alto acuerdo entre evaluaciones. El español propuesto sigue esa lectura estable: conserva la exclusividad del paralelismo, el nombre divino Yahvé y la metáfora de «roca» sin amplificarla indebidamente.'
  spanish_consistency_notes:
  - Se mantiene el orden retórico del hebreo con dos preguntas paralelas.
  - «Yahvé» se usa de forma consistente para יְהוָה, conforme al criterio POB en español.
  - «Dios» y «nuestro Dios» conservan la referencia monoteísta y comunitaria del verso.
  - «Una roca» preserva la metáfora sin convertirla en título en el texto principal.
  - La puntuación española adapta la interrogación retórica sin alterar el sentido.
