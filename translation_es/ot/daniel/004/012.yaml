  to: Sin embargo[a], dejen el tocón de sus raíces en la tierra, aun con una banda[b] de hierro y de bronce en la hierba del campo; y que sea empapado por el rocío del cielo, y que su porción sea con las bestias en la hierba de la tierra.
  rationale: Se corrige la imagen principal a ‘tocón de sus raíces’ para reflejar mejor el remanente enraizado del árbol. Se añade ‘aun con’ para conservar el matiz concesivo documentado en el POB inglés. Se cambia ‘aro’ por ‘banda’ para alinear la decisión léxica principal con la rationale auditada, manteniendo una nota con la alternativa ‘atadura’. También se pule ‘empapado por el rocío’ para un español más natural.
