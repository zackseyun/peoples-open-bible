id: 2CH.15.4
reference: 2 Chronicles 15:4
source:
  edition: WLC
  text: וַ/יָּ֨שָׁב֙ בַּ/צַּר ל֔/וֹ עַל יְהוָ֖ה אֱלֹהֵ֣י יִשְׂרָאֵ֑ל וַ/יְבַקְשֻׁ֖/הוּ וַ/יִּמָּצֵ֥א לָ/הֶֽם־־׃
translation:
  text: But in their distress they returned to Yahweh[a], the God of Israel, and sought him[b], and he was found by them.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'in his distress,' with the singular referring collectively to Israel.
    reason: lexical_alternative
  - marker: b
    text: Or, 'he was found by them.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  chosen: returned
  alternatives:
  - turned back
  - turned
  lexicon: HALOT
  rationale: שׁוּב commonly means 'return/turn back.' In this context, with עַל plus the LORD, it denotes a renewed turning to God after estrangement. 'Returned' captures both motion and restoration better than the more ambiguous 'turned.'
- source_word: בַּצַּר לוֹ
  chosen: in their distress
  alternatives:
  - in his distress
  - when they were in distress
  - in distress
  lexicon: HALOT
  rationale: The singular suffix in לוֹ is best understood collectively/distributively in context, referring to Israel in the period described. English idiom prefers the plural 'their' to match the subsequent plural verbs and pronouns. צַר here denotes distress/trouble rather than a narrow spatial sense.
- source_word: עַל יְהוָה
  chosen: to the LORD
  alternatives:
  - unto the LORD
  - toward the LORD
  lexicon: HALOT
  rationale: Although עַל is literally 'upon/to,' with שׁוּב in this idiom it conveys turning back to someone. English 'returned to the LORD' is the most natural equivalent. Per doctrine, יְהוָה is rendered 'the LORD.'
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: A straightforward construct chain; retaining it preserves the covenantal identification of the LORD with Israel.
- source_word: וַיְבַקְשֻׁהוּ
  chosen: sought him
  alternatives:
  - sought after him
  - searched for him
  lexicon: HALOT
  rationale: בקשׁ with a personal object often means to seek someone, especially God, in the sense of turning to him in dependence and worship. 'Sought him' is both natural and faithful.
- source_word: וַיִּמָּצֵא לָהֶם
  chosen: he let himself be found by them
  alternatives:
  - he was found by them
  - he was available to them
  lexicon: HALOT
  rationale: The Niphal of מצא can mean 'be found,' but when God is the implied subject in covenantal contexts, English can sound misleadingly accidental if rendered merely 'he was found.' 'He let himself be found by them' makes explicit the relational/passive nuance without over-paraphrasing.
