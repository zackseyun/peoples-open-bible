revisions:
- from: Los que se aferran a ídolos vanos[a] abandonan su misericordia[b].
  to: Los que se aferran a ídolos vanos abandonan su misericordia[a].
  rationale: 'Se elimina la nota léxica redundante sobre «ídolos vanos», porque no preserva una alternativa importante del hebreo ni del expediente inglés. Se conserva una sola nota en «su misericordia» para reflejar la ambigüedad real de חַסְדָּם: puede entenderse como «su amor leal» o como la misericordia que Dios les ofrece y que ellos pierden al aferrarse a los ídolos. El texto principal queda más limpio, fiel y natural.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:39:48Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: מְשַׁמְּרִים se representa adecuadamente como apego continuo («se aferran»), הַבְלֵי שָׁוְא se entiende correctamente como referencia idolátrica, y יַעֲזֹבוּ como «abandonan». También conserva la ambigüedad de חַסְדָּם mediante nota. Sin embargo, la nota [a] no aporta una alternativa significativa al texto principal, porque repite «ídolos vanos» y luego da sinónimos menores; además, el inglés auditado preserva como alternativa relevante «vain idols / keep vain idols / steadfast love», no una glosa redundante.'
  spanish_quality_summary: 'La frase principal es clara y natural en español eclesial contemporáneo. No obstante, la anotación [a] está formulada de manera poco pulida («O «ídolos vanos» = ...») y resulta innecesaria. La nota [b] sí es útil, pero puede mejorarse para reflejar con más precisión la tensión semántica de חֶסֶד: «amor leal» y la posible idea de la misericordia que reciben de Dios. Sin esa limpieza, el conjunto se siente algo sobreanotado y menos elegante de lo deseable.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Ídolos» para הַבְלֵי שָׁוְא y «misericordia» para חַסְדָּם son compatibles con el expediente inglés revisado. «Se aferran» es una buena equivalencia de «cling to».
  issues:
  - severity: medium
    issue: La nota [a] es redundante y poco justificada.
    rationale: El texto principal ya dice «ídolos vanos», y la nota comienza con «O “ídolos vanos”», repitiendo exactamente la lectura principal. No preserva una alternativa exegética importante; solo ofrece sinónimos menores. Esto no sigue bien la práctica de notas del POB, que deben conservar alternativas significativas.
  - severity: low
    issue: La redacción de la nota [a] es torpe en español.
    rationale: La fórmula «O «ídolos vanos» = ...» suena editorialmente descuidada y no encaja con un estilo bíblico pulido.
  - severity: low
    issue: La nota [b] puede expresar mejor la ambigüedad de חַסְדָּם.
    rationale: El expediente inglés destaca «steadfast love» y la posible idea de la misericordia disponible de parte de Dios. «Amor leal» comunica mejor esa alternativa que una explicación más vaga; conviene mantenerla con una redacción más natural.
  revised_spanish_text: Los que se aferran a ídolos vanos abandonan su misericordia[a].
  revised_footnotes:
  - marker: a
    text: O «su amor leal»; posiblemente significa que renuncian a la misericordia disponible para ellos de parte de Dios.
    reason: alternative_reading
  revision_rationale: 'Se elimina la nota léxica redundante sobre «ídolos vanos», porque no preserva una alternativa importante del hebreo ni del expediente inglés. Se conserva una sola nota en «su misericordia» para reflejar la ambigüedad real de חַסְדָּם: puede entenderse como «su amor leal» o como la misericordia que Dios les ofrece y que ellos pierden al aferrarse a los ídolos. El texto principal queda más limpio, fiel y natural.'
