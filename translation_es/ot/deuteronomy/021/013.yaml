translation:
  language: es
  text: Ella quitará de sí la ropa de su cautiverio[a] y permanecerá en tu casa, y llorará por su padre y por su madre por un mes de días. Después de eso podrás llegarte a ella y ser su esposo, y ella será tu esposa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las prendas de su cautiverio» o «la ropa que llevaba cuando fue capturada».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵסִירָה
  english_pob_choice: She shall remove
  chosen_spanish: Ella quitará de sí
  alternatives_spanish:
  - Ella removerá
  - Ella se quitará
  lexicon: HALOT
  rationale: El hebreo expresa acción causativa de retirar algo; en español, «quitar de sí» conserva la idea de apartar la prenda sin sonar demasiado técnico ni perder la voz directiva.
- source_word: שִׂמְלַת שִׁבְיָהּ
  english_pob_choice: the clothing of her captivity
  chosen_spanish: la ropa de su cautiverio
  alternatives_spanish:
  - el vestido de su cautiverio
  - las prendas de su cautiverio
  - la ropa que llevaba en cautiverio
  lexicon: HALOT
  rationale: Se conserva el genitivo hebreo con un sustantivo natural en español. «Ropa de su cautiverio» mantiene la referencia a su condición cautiva sin decidir más de lo que el texto dice.
- source_word: מֵעָלֶיהָ
  english_pob_choice: from herself
  chosen_spanish: de sí
  alternatives_spanish:
  - de encima de ella
  - de sobre ella
  lexicon: HALOT
  rationale: La expresión hebrea literalmente dice «de sobre ella»; «de sí» funciona de manera idiomática en español y conserva el matiz reflexivo de la acción de quitarse la prenda.
- source_word: וְיָשְׁבָה בְּבֵיתֶךָ
  english_pob_choice: and remain in your house
  chosen_spanish: y permanecerá en tu casa
  alternatives_spanish:
  - y vivirá en tu casa
  - y morará en tu casa
  - y se quedará en tu casa
  lexicon: HALOT
  rationale: ישב en este contexto legal apunta a residencia continuada. «Permanecerá» es claro y formal, y evita cargar el verbo con un tono demasiado coloquial o exclusivamente habitacional.
- source_word: וּבָכְתָה
  english_pob_choice: and mourn
  chosen_spanish: y llorará
  alternatives_spanish:
  - y hará duelo
  - y lamentará
  - y llorará por
  lexicon: HALOT
  rationale: El hebreo dice «llorar»; aunque el contexto es luctuoso, se mantiene el verbo base para no introducir de manera demasiado interpretativa la noción de duelo formal.
- source_word: יֶרַח יָמִים
  english_pob_choice: for a month of days
  chosen_spanish: por un mes de días
  alternatives_spanish:
  - por un mes completo
  - durante un mes
  lexicon: HALOT
  rationale: Se sigue de cerca la idiomática hebrea «un mes de días» para conservar la literalidad auditada por la POB en inglés, sin perder comprensibilidad.
- source_word: תָּבֹא אֵלֶיהָ
  english_pob_choice: you may go in to her
  chosen_spanish: podrás entrar a ella
  alternatives_spanish:
  - podrás ir a ella
  - podrás acostarte con ella
  - podrás llegarte a ella
  lexicon: HALOT
  rationale: Se preserva el valor sexual-matrimonial del giro hebreo sin usar una paráfrasis más fuerte que el texto. «Entrar a ella» mantiene el idiomatismo bíblico con claridad formal.
- source_word: וּבְעַלְתָּהּ
  english_pob_choice: and be her husband
  chosen_spanish: y ser su esposo
  alternatives_spanish:
  - y desposarte con ella
  - y tomarla por esposa
  - y ser su marido
  lexicon: HALOT
  rationale: El verbo בעל en este contexto expresa la función de esposo. «Ser su esposo» conserva el rol marital sin introducir una connotación de posesión que el español podría sugerir indebidamente.
- source_word: וְהָיְתָה לְךָ לְאִשָּׁה
  english_pob_choice: and she shall be your wife
  chosen_spanish: y ella será para ti esposa
  alternatives_spanish:
  - y ella será tu esposa
  - y ella será mujer para ti
  lexicon: HALOT
  rationale: Se mantiene la fórmula final de estatus marital; «para ti esposa» refleja la relación establecida por el hebreo y deja abierta la asimetría formulada en el texto sin suavizarla.
theological_decisions:
- issue: La secuencia legal y sexual del matrimonio con una cautiva
  english_pob_reading: Retain the idiom 'go in to her' and explicit marital language without softening the text into mere romance or hardening it beyond what the Hebrew states.
  chosen_spanish_reading: Conservar «entrar a ella» junto con el lenguaje matrimonial explícito, sin convertir el pasaje en una mera relación romántica ni intensificarlo más allá del hebreo.
  alternative_spanish_readings:
  - «casarte con ella»
  - «tener relaciones con ella»
  - «acostarte con ella y tomarla por esposa»
  rationale: El hebreo distingue entre la aproximación sexual idiomática y el resultado jurídico del vínculo. La traducción española mantiene esa distinción para preservar el carácter normativo y la tensión moral del texto.
  doctrine_reference: Translation philosophy items 1 and 3
translation_notes:
  revision_awareness: La redacción española sigue la revisión más literal del inglés POB, manteniendo la frase idiomática de duración como «un mes de días» y preservando la distinción entre el acercamiento sexual legal («entrar a ella») y el estado matrimonial resultante.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el Tetragrámaton; aquí no está presente.
  - Se mantiene «esposo/esposa» para el vínculo marital, coherente con el registro bíblico y con la decisión inglesa de diferenciar el acto previo del estado resultante.
  - «Cautiverio» traduce el sustantivo relacional de forma más natural en español que una calca como «captividad»; la nota conserva la alternativa más literal.
  - La fórmula «un mes de días» se preserva por fidelidad a יֶרַח יָמִים y para armonizar con la POB inglesa revisada.
