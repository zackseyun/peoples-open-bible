    rationale: Es fiel al inglés auditado y al sentido retributivo del griego, pero una leve mejora contextual en el conjunto ayuda a que el verso fluya mejor en español. No es error grave, por lo que no requiere cambio adicional si se mantiene la fuerza semántica.
