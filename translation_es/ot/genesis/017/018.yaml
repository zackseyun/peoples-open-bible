translation:
  language: es
  text: 'Y Abraham dijo a Dios[a]: «¡Ojalá que Ismael viva delante de ti!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¡Si tan solo Ismael viva en tu presencia!» o «bajo tu favor».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Así que ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; en español bíblico natural, «Y ... dijo» conserva la progresión sin recargar el estilo.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: Con un verbo de habla, la preposición directa española es «a»; expresa la dirección del discurso sin alterar el sentido.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: El hebreo lleva artículo, pero en español bíblico referido al Dios de Israel en este contexto directo, «Dios» es la forma idiomática y fiel.
- source_word: לוּ
  english_pob_choice: Oh, that
  chosen_spanish: ¡Ojalá que!
  alternatives_spanish:
  - ¡Si tan solo!
  - ¡Quién pudiera!
  lexicon: HALOT
  rationale: לוּ introduce un deseo, no una condición; «¡Ojalá que!» preserva el valor optativo y el tono afectivo en español natural.
- source_word: יִשְׁמָעֵאל
  english_pob_choice: Ishmael
  chosen_spanish: Ismael
  lexicon: nombre propio
  rationale: Nombre propio transliterado a la forma estándar en español.
- source_word: יִחְיֶה
  english_pob_choice: might live
  chosen_spanish: viva
  alternatives_spanish:
  - pueda vivir
  - viviera
  lexicon: HALOT
  rationale: El imperfecto con partícula optativa expresa un deseo; en español, el subjuntivo presente «viva» transmite bien esa petición o anhelo.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - en tu presencia
  - bajo tu favor
  lexicon: HALOT
  rationale: «Delante de ti» reproduce el valor espacial-relacional literal sin cerrar la tensión teológica que el inglés POB decidió conservar al no expandirlo a «favor» o «bendición».
theological_decisions:
- issue: Alcance de לְפָנֶיךָ en la petición de Abraham
  english_pob_reading: Rendered as 'before you' without expanding to 'under your blessing' or 'in covenant before you.'
  chosen_spanish_reading: «delante de ti» sin añadir «bajo tu bendición» ni «en pacto delante de ti»
  alternative_spanish_readings:
  - en tu presencia
  - bajo tu favor
  rationale: El hebreo puede implicar vida en la presencia y el favor de Dios, pero el texto no explicita aquí ese contenido. Mantener la frase concisa conserva la tensión narrativa y evita resolverla por adelantado.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El texto inglés más reciente se mantuvo sin cambios tras la revisión; la versión española sigue esa lectura estable y reproduce la misma tensión optativa y relacional de לְפָנֶיךָ.
  spanish_consistency_notes:
  - Se usa «Dios» para הָאֱלֹהִים conforme al uso español natural en contexto narrativo.
  - Se mantiene «delante de ti» para לְפָנֶיךָ, evitando una explicitación teológica no presente en el hebreo.
  - La puntuación optativa con «¡Ojalá que!» refleja el matiz de deseo de לוּ sin sonar arcaica.
