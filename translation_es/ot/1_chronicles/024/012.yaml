lexical_decisions:
- source_word: לְ/אֶלְיָשִׁיב
  english_pob_choice: to Eliashib
  chosen_spanish: para Eliasib
  alternatives_spanish:
  - a Eliasib
  - para Eliashib
  lexicon: HALOT
  rationale: El prefijo לְ en esta lista de asignación puede expresarse en español con valor distributivo/atributivo como «para». Se translitera el nombre de forma cercana al hebreo vocalizado, adaptándolo a ortografía española como «Eliasib».
- source_word: עַשְׁתֵּ֣י עָשָׂ֔ר
  english_pob_choice: the eleventh
  chosen_spanish: el undécimo
  alternatives_spanish:
  - once
  - el once
  lexicon: HALOT
  rationale: Aunque la forma hebrea es literalmente cardinal, en la secuencia de sorteo funciona como ordinal. En español, «el undécimo» conserva ese valor enumerativo sin añadir «suerte» o «turno», que no están expresados en el verso.
- source_word: לְ/יָקִים
  english_pob_choice: to Jakim
  chosen_spanish: para Jacim
  alternatives_spanish:
  - a Jacim
  - para Jakim
  lexicon: HALOT
  rationale: Se mantiene el sentido de asignación del prefijo לְ con «para». Se usa «Jacim» para reflejar más de cerca la vocalización hebrea יָקִים dentro de una ortografía española natural.
- source_word: שְׁנֵ֥ים עָשָֽׂר
  english_pob_choice: the twelfth
  chosen_spanish: el duodécimo
  alternatives_spanish:
  - doce
  - el doce
  lexicon: HALOT
  rationale: Como en la primera mención numérica, el valor contextual es ordinal dentro de una lista administrativa. «El duodécimo» suena natural en español y preserva la función de orden.
