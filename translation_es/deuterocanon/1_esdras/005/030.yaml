translation:
  language: es
  text: los hijos de Akoud[a], los hijos de Outa, los hijos de Ketab, los hijos de Akkaba, los hijos de Sybaei, los hijos de Anan, los hijos de Koua, los hijos de Keddour,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo hebreo de Nehemías 7:45 presenta una lista distinta de familias de porteros (incluidos Shallum, Ater, Talmon, Akkub, Hatita y Shobai). Aquí 1 Esdras conserva una lista griega divergente, así que la traducción sigue el griego y no la armoniza con el hebreo.
    reason: alternative_reading
lexical_decisions:
- source_word: υἱοὶ
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - hijos de
  - descendientes de
  lexicon: LSJ
  rationale: En esta lista genealógica o de clan, υἱοὶ funciona como fórmula de pertenencia familiar. «Los hijos de» conserva la repetición estructural del griego y es más transparente que «descendientes de», que sería más interpretativo.
- source_word: Ἀκούδ
  english_pob_choice: Akoud
  chosen_spanish: Akud
  alternatives_spanish:
  - Akoud
  - Akkud
  lexicon: LSJ
  rationale: Nombre propio transliterado desde la forma griega. «Akud» mantiene una adaptación española simple y legible sin alejarse del valor fónico del testimonio griego.
- source_word: Οὐτά
  english_pob_choice: Outa
  chosen_spanish: Outa
  alternatives_spanish:
  - Uta
  lexicon: LSJ
  rationale: Nombre propio transliterado del griego. Se conserva «Outa» para reflejar con mayor transparencia la secuencia ου.
- source_word: Κητάβ
  english_pob_choice: Ketab
  chosen_spanish: Ketab
  alternatives_spanish:
  - Ketav
  - Chetab
  lexicon: LSJ
  rationale: Nombre propio transliterado directamente del griego transmitido. No se armoniza con el paralelo hebreo porque el texto base aquí es la lista griega de 1 Esdras.
- source_word: Ἀκκαβά
  english_pob_choice: Akkaba
  chosen_spanish: Akkaba
  alternatives_spanish:
  - Akkabah
  - Accaba
  lexicon: LSJ
  rationale: Nombre propio transliterado desde el griego, preservando la geminación inicial sugerida por κκ.
- source_word: Συβαεί
  english_pob_choice: Sybaei
  chosen_spanish: Sybaei
  alternatives_spanish:
  - Subai
  - Sybai
  lexicon: LSJ
  rationale: Nombre propio transliterado según la forma griega conservada. Se mantiene muy cerca del testimonio griego, sin normalizarlo hacia una variante del paralelo hebreo.
- source_word: Ἀνάν
  english_pob_choice: Anan
  chosen_spanish: Anan
  lexicon: LSJ
  rationale: Nombre propio transliterado de manera directa y natural al español.
- source_word: Κουά
  english_pob_choice: Koua
  chosen_spanish: Koua
  alternatives_spanish:
  - Kua
  - Cua
  lexicon: LSJ
  rationale: Nombre propio transliterado desde el griego; «Koua» hace visible la secuencia ου.
- source_word: Κεδδούρ
  english_pob_choice: Keddour
  chosen_spanish: Keddour
  alternatives_spanish:
  - Kedour
  - Keddur
  lexicon: LSJ
  rationale: Nombre propio transliterado desde el griego, conservando la doble consonante y la secuencia ου del testimonio recibido.
theological_decisions:
- issue: Relación entre la lista griega de 1 Esdras y el paralelo hebreo aproximado de Nehemías 7:45
  english_pob_reading: Translate the Greek list of names as given, without harmonizing it to the Hebrew gatekeeper list.
  chosen_spanish_reading: Traducir la lista griega tal como está dada, sin armonizarla con la lista hebrea de porteros.
  alternative_spanish_readings:
  - Ajustar algunos nombres a las formas del paralelo hebreo, como Akkub, Hatita y Shobai
  rationale: La primacía textual aquí corresponde al griego de 1 Esdras. El paralelo hebreo es explícitamente aproximado y difiere en nombres y estructura; por eso sirve como control, no como base para reconstruir el texto.
  doctrine_reference: 'Filosofía de traducción §1: primacía del idioma original sobre la tradición de traducción'
translation_notes:
  revision_awareness: Revisión final sin cambios sustanciales respecto del control de alta concordancia; se corrigió el anclaje de la nota al agregar el marcador [a] en el texto. No se armonizó la lista con Nehemías 7:45 porque el testimonio primario es el griego de 1 Esdras.
  spanish_consistency_notes:
  - Se mantuvo la fórmula repetida «los hijos de» para reflejar la estructura genealógica del griego.
  - Se preservaron los nombres propios como transliteraciones cercanas al testimonio griego, sin normalizarlos al paralelo hebreo.
  - La nota [a] explica la divergencia textual con el paralelo de Nehemías sin afectar el texto principal.
