revisions:
- from: Y contigo he hecho pedazos caballo y jinete[a][b]; y contigo he hecho pedazos carro y jinete.
  to: Y contigo he hecho pedazos caballo y jinete[a][b]; y contigo he hecho pedazos carro de guerra[c] y jinete.
  rationale: Se revisa «carro» a «carro de guerra» para preservar con mayor claridad el referente bélico antiguo de רֶכֶב y evitar la ambigüedad moderna de «carro». También se añade la nota omitida sobre la posible lectura colectiva del término y se normaliza «instrumentabilidad» a «instrumentalidad».
