    issue: Tiempo verbal de לָקְחוּ
    rationale: El POB inglés justificó 'had taken' por la reanudación narrativa tras la batalla previa. El español 'tomaron' no es imposible, pero pierde ese matiz de anterioridad ya documentado.
  - severity: medium
    issue: Uso de 'hasta Asdod' para אַשְׁדּוֹדָה
    rationale: El he direccional indica movimiento hacia Asdod. En español bíblico natural 'a Asdod' expresa mejor el destino; 'hasta Asdod' puede sonar a distancia recorrida o límite final.
  - severity: low
    issue: Forma del topónimo 'Eben-ezer'
    rationale: Aunque es defendible por cercanía formal al hebreo, 'Ebenezer' es la forma más estándar y coincide con el expediente inglés auditado; mejora consistencia editorial.
