translation:
  language: es
  text: Te acostarás, y nadie te hará temer; muchos procurarán tu favor[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «muchos implorarán ante tu rostro», un modismo que significa buscar tu favor.
    reason: lexical_alternative
lexical_decisions:
- source_word: רָבַצְתָּ
  english_pob_choice: you will lie down
  chosen_spanish: Te acostarás
  alternatives_spanish:
  - Te tenderás
  - Reposarás
  - Yacerás
  lexicon: HALOT
  rationale: El verbo hebreo expresa la acción de echarse o recostarse, con matiz de descanso seguro. «Te acostarás» comunica bien la imagen en español natural sin perder el sentido de reposo confiado.
- source_word: מַחֲרִיד
  english_pob_choice: make you afraid
  chosen_spanish: te hará temer
  alternatives_spanish:
  - te aterrará
  - te asustará
  - te inquietará
  lexicon: HALOT
  rationale: El participio causativo describe al que provoca miedo o sobresalto. «Te hará temer» sigue de cerca la fuerza causal de la expresión hebrea y mantiene el paralelismo con el negativo absoluto «nadie».
- source_word: חִלּוּ פָנֶיךָ
  english_pob_choice: will entreat your favor
  chosen_spanish: te rogarán tu favor
  alternatives_spanish:
  - buscarán tu favor
  - te suplicarán de tu presencia
  - te implorarán tu favor
  lexicon: HALOT
  rationale: La locución hebrea literalmente dice «suavizar/ablandar el rostro de alguien» y se usa idiomáticamente para pedir favor o apaciguar a una persona. En español, «te rogarán tu favor» conserva el contenido relacional y la idea de súplica sin volver opaca la imagen con una traducción demasiado literal.
- source_word: רַבִּים
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - multitudes
  - numerosos
  lexicon: HALOT
  rationale: El término designa una gran cantidad de personas. «Muchos» es la correspondencia más directa y natural en el paralelismo poético.
- source_word: וְאֵין
  english_pob_choice: and none will
  chosen_spanish: y nadie
  alternatives_spanish:
  - y no habrá quien
  - y ninguno
  lexicon: HALOT
  rationale: La construcción existencial negativa se expresa con naturalidad en español como «nadie» para mantener brevedad y claridad, sin perder el valor absoluto del hebreo.
theological_decisions:
- issue: El giro idiomático «volverse hacia el rostro» / «entretener el favor» en la segunda cola.
  english_pob_reading: many will entreat your favor
  chosen_spanish_reading: muchos te rogarán tu favor
  alternative_spanish_readings:
  - muchos buscarán tu favor
  - muchos te suplicarán
  - muchos buscarán agradarte
  rationale: No hay una tensión doctrinal aquí, pero sí una tensión lexical entre la literalidad del hebreo y la naturalidad española. Se conserva el sentido de buscar/apaciguar favor personal, evitando una traducción demasiado literal de «tu rostro» que en español sería oscura.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que prefirió «entreat your favor» para reflejar con más precisión la idiomática hebrea. Por eso el español evita «buscar tu favor» si pudiera sonar demasiado genérico, y opta por una fórmula de ruego que preserve el matiz de súplica implícito en חִלּוּ פָנֶיךָ.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto del proyecto, pero este versículo no contiene el nombre divino.
  - Se traduce el futuro poético con valor de promesa como futuro simple en español, acorde al paralelismo del hebreo.
  - Se evita «Señor» o fórmulas eclesiásticas no presentes en el texto fuente.
  - La nota al pie se limita a la primera cola porque el resto del verso ya queda suficientemente claro en español.
