revisions:
- from: Tu ropa no se gastó sobre ti[a], ni tu pie se hinchó[b], estos cuarenta años.
  to: La ropa que llevabas puesta[a] no se gastó, ni tu pie se hinchó[b], estos cuarenta años.
  rationale: Se reemplaza el calco «sobre ti» por «que llevabas puesta» para expresar idiomáticamente el valor de מֵעָלֶיךָ sin perder precisión. Se conserva «tu pie» en singular y «estos cuarenta años» para reflejar el hebreo. Se simplifican las notas para que aporten alternativas reales y no repitan innecesariamente el texto principal.
