  text: 'Y Judas acampó en Adasá con tres mil hombres; y Judas oró y dijo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παρενέβαλεν
  english_pob_choice: encamped
  chosen_spanish: acampó
  alternatives_spanish:
  - levantó campamento
  - acampó militarmente
  lexicon: LSJ
  rationale: El verbo describe una acción militar de instalar campamento. En español, "acampó" comunica de forma natural y fiel esa idea sin añadir matices innecesarios.
- source_word: ἐν Ἀδασὰ
  english_pob_choice: at Adasa
  chosen_spanish: en Adasá
  alternatives_spanish:
  - en Adasa
  - en la ciudad de Adasá
  lexicon: LSJ
  rationale: Con un topónimo después de ἐν, el español conserva la preposición locativa "en". La forma "Adasá" adapta la acentuación al uso español y mantiene el nombre propio sin interpretarlo más allá del texto.
- source_word: ἐν τρισχιλίοις ἀνδράσιν
  english_pob_choice: with three thousand men
  chosen_spanish: con tres mil hombres
  alternatives_spanish:
  - junto con tres mil hombres
  - en compañía de tres mil hombres
  lexicon: LSJ
  rationale: La frase indica la fuerza que acompaña a Judas. "Con tres mil hombres" es la expresión más natural en español y preserva el sentido militar del griego.
- source_word: προσηύξατο
  english_pob_choice: prayed
  chosen_spanish: oró
  alternatives_spanish:
  - rezó
  - hizo oración
  lexicon: LSJ
  rationale: Para προσεύχομαι, "oró" es una forma clara, digna y ampliamente inteligible en español bíblico, sin desplazar el sentido hacia una formulación litúrgica excesiva.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - expresó
  lexicon: LSJ
  rationale: El verbo narrativo introductorio se traduce de manera directa con "dijo", que mantiene el flujo del relato y prepara la oración que sigue.
