translation:
  language: es
  text: Se unieron a Baal de Peor[a] y comieron sacrificios de los muertos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se yugaron con».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «sacrificios de los muertos»; la frase puede referirse a sacrificios ofrecidos a ídolos sin vida o a ritos asociados con los muertos.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּצָּמְדוּ
  english_pob_choice: joined themselves
  chosen_spanish: se unieron
  alternatives_spanish:
  - se adhirieron
  - se ligaron
  - se ataron
  lexicon: HALOT
  rationale: El hebreo expresa una adhesión estrecha o unirse de manera comprometida, en contexto de apostasía cultual. «Se unieron» comunica esa unión sin sonar forzado en español y conserva el matiz reflexivo del verbo.
- source_word: לְבַעַל פְּעוֹר
  english_pob_choice: to Baal of Peor
  chosen_spanish: a Baal de Peor
  alternatives_spanish:
  - a Baal-peor
  - al Baal de Peor
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio con transliteración y la relación constructa se expresa de forma natural en español con «de». «A Baal de Peor» mantiene el referente sin fusionar el nombre.
- source_word: וַיֹּאכְלוּ
  english_pob_choice: and ate
  chosen_spanish: y comieron
  alternatives_spanish:
  - y ellos comieron
  - y consumieron
  lexicon: HALOT
  rationale: El perfecto narrativo se vierte de manera simple y directa. «Comieron» es fiel, claro y suficientemente sobrio para la secuencia del verso.
- source_word: זִבְחֵי
  english_pob_choice: sacrifices of
  chosen_spanish: sacrificios de
  alternatives_spanish:
  - sacrificios ofrecidos a
  - ofrendas sacrificiales de
  lexicon: HALOT
  rationale: «Sacrificios» conserva el sustantivo básico. Se evita añadir «ofrecidos» porque el ajuste español ya transmite la relación sin expandir más de lo que el hebreo exige.
- source_word: מֵתִים
  english_pob_choice: the dead
  chosen_spanish: los muertos
  alternatives_spanish:
  - los difuntos
  - los muertos/idolos muertos
  - los muertos
  lexicon: HALOT
  rationale: Se preserva la ambigüedad del hebreo plural participial. «Los muertos» puede aludir tanto a muertos reales vinculados al rito como, en lectura polémica, a ídolos sin vida; no se resuelve en el texto principal.
theological_decisions:
- issue: Referencia de «los muertos» en «sacrificios de los muertos»
  english_pob_reading: Retain the broad wording 'the dead' without specifying idols, demons, or deceased humans.
  chosen_spanish_reading: Mantener «los muertos» sin aclarar si son ídolos sin vida, personas fallecidas o una alusión polemica a ambos.
  alternative_spanish_readings:
  - los ídolos muertos
  - los difuntos
  - los dioses muertos
  rationale: El hebreo es deliberadamente abierto. La versión española conserva esa tensión en vez de decidir por una interpretación específica que el texto fuente no impone.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue el último ajuste del POB inglés, que prefirió «sacrifices of the dead» frente a «sacrifices offered to the dead» para ceñirse más al hebreo sin expandir la interpretación. En español se conservó la misma ambigüedad con una formulación breve y natural.
  spanish_consistency_notes:
  - Se mantuvo «Baal» como nombre propio transliterado, conforme a la política del proyecto.
  - Se prefirió «los muertos» a «los difuntos» porque conserva mejor el eco literal del hebreo y su posible tensión teológica.
  - La nota [a] se ancla en «se unieron» porque el hebreo admite también la imagen de yugo/unión estrecha.
