translation:
  language: es
  text: Desde la planta del pie hasta la cabeza, no hay salud en ello[a]; solo heridas, moretones y golpes recientes[b]; no han sido exprimidos[c], ni vendados[d], ni suavizados con aceite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no hay salud en él». El hebreo personifica a la nación como un cuerpo herido.'
    reason: alternative_reading
  - marker: b
    text: 'O: «heridas frescas». La frase puede denotar lesiones recientes, todavía crudas.'
    reason: lexical_alternative
  - marker: c
    text: El verbo puede referirse a apretar o exprimir las heridas para sacar la materia antes del tratamiento.
    reason: cultural_note
  - marker: d
    text: 'O: «envueltos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִכַּף רֶגֶל
  english_pob_choice: From the sole of the foot
  chosen_spanish: Desde la planta del pie
  alternatives_spanish:
  - Desde la suela del pie
  - Desde la planta del pie hasta la suela
  lexicon: HALOT
  rationale: כַּף con רֶגֶל designa la parte inferior del pie, equivalente natural en español a 'planta del pie'. Conserva el punto de partida del merismo corporal sin sonar forzado.
- source_word: וְעַד רֹאשׁ
  english_pob_choice: even to the head
  chosen_spanish: hasta la cabeza
  alternatives_spanish:
  - y hasta la cabeza
  - incluso hasta la cabeza
  lexicon: HALOT
  rationale: El hebreo marca extensión total desde abajo hasta arriba. 'Hasta la cabeza' comunica bien esa totalidad en español; el énfasis de 'even' se mantiene por el conjunto del merismo.
- source_word: אֵין בּוֹ מְתֹם
  english_pob_choice: there is no soundness in it
  chosen_spanish: no hay en él sanidad
  alternatives_spanish:
  - no hay en él salud
  - no hay en él integridad
  lexicon: HALOT
  rationale: מְתֹם expresa estado sano, íntegro o sin daño. 'Sanidad' preserva la idea de estado corporal no dañado y funciona en un registro bíblico claro. Se mantiene el masculino 'él' para reflejar la personificación del pueblo como cuerpo, tal como la nota inglesa admite 'him'.
- source_word: פֶּצַע
  english_pob_choice: wounds
  chosen_spanish: heridas
  alternatives_spanish:
  - laceraciones
  - lesiones
  lexicon: HALOT
  rationale: פֶּצַע es una herida o lesión general. 'Heridas' es la equivalencia más natural y comprensible en español.
- source_word: חַבּוּרָה
  english_pob_choice: bruises
  chosen_spanish: moretones
  alternatives_spanish:
  - cardenales
  - contusiones
  lexicon: HALOT
  rationale: El término señala marcas o hinchazones causadas por golpes. 'Moretones' comunica esa idea de manera moderna y directa; 'cardenales' sería más regional.
- source_word: מַכָּה טְרִיָּה
  english_pob_choice: fresh blows
  chosen_spanish: golpes recientes
  alternatives_spanish:
  - heridas recientes
  - golpes frescos
  lexicon: HALOT
  rationale: מַכָּה puede ser golpe o herida, y טְרִיָּה indica que es fresca, reciente o todavía cruda. 'Golpes recientes' conserva la imagen de agresión y la temporalidad; en español suena más natural que 'golpes frescos'.
- source_word: לֹא זֹרוּ
  english_pob_choice: they have not been pressed out
  chosen_spanish: no han sido exprimidos
  alternatives_spanish:
  - no han sido apretados
  - no han sido drenados
  lexicon: HALOT
  rationale: En el contexto de curación de heridas, זור alude a apretar o exprimir para sacar la materia de la herida. 'Exprimidos' refleja bien esa práctica médica antigua y mantiene el sentido concreto.
- source_word: וְלֹא חֻבָּשׁוּ
  english_pob_choice: or bandaged
  chosen_spanish: ni vendados
  alternatives_spanish:
  - ni curados
  - ni ligados
  lexicon: HALOT
  rationale: חבשׁ en contexto médico significa vendar o envolver una herida. 'Vendados' es claro, preciso y más natural que un calco como 'ligados'.
- source_word: וְלֹא רֻכְּכָה בַּשָּׁמֶן
  english_pob_choice: or softened with oil
  chosen_spanish: ni suavizados con aceite
  alternatives_spanish:
  - ni ablandados con aceite
  - ni aliviados con aceite
  lexicon: HALOT
  rationale: רכך significa ablandar o suavizar. 'Suavizados con aceite' conserva el procedimiento de tratamiento con aceite sin añadir una interpretación terapéutica más específica de lo que el hebreo exige.
theological_decisions:
- issue: Referente del cuerpo enfermo y personificación nacional
  english_pob_reading: Use impersonal 'it' for the diseased body
  chosen_spanish_reading: Usar 'él' para el cuerpo personificado del pueblo
  alternative_spanish_readings:
  - usar 'eso'
  - usar una reformulación impersonal
  rationale: El hebreo personifica a la nación como un cuerpo herido. En español, 'él' permite conservar esa personificación sin introducir una lectura individualizada masculina ajena al contexto; además evita una impersonalidad que debilitaría la metáfora.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail inglés, preservando el merismo corporal completo, la personificación nacional y la serie médica de heridas no tratadas. Se mantuvieron las tensiones léxicas principales: מְתֹם como estado de sanidad/entereza, מַכָּה טְרִיָּה como golpe/herida reciente, y זור como acción de exprimir una lesión.'
  spanish_consistency_notes:
  - Se prefirió 'Yahvé' sólo cuando corresponda; este versículo no lo contiene.
  - Se mantuvo 'sanidad' para מְתֹם y no se sustituyó por una paráfrasis moral o espiritual.
  - '''Golpes recientes'' preserva el carácter físico y reciente de la serie de lesiones.'
  - La personificación se conservó con 'él' para reflejar el hebreo y el audit trail inglés.
  - Se usó 'vendados' en el texto principal, con 'vendar' como sentido médico estándar, sin añadir material inexistente en el hebreo.
