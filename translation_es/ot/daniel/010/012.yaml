review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura general y la mayor parte del sentido del hebreo: la exhortación «No temas», la referencia temporal «desde el primer día», la finalidad de entender y humillarse delante de Dios, la escucha divina de las palabras de Daniel y la venida del mensajero a causa de esas palabras. Sin embargo, «diste tu corazón» no representa bien el valor idiomático de נָתַתָּ אֶת־לִבְּךָ en español natural; suena poco idiomático y debilita el matiz de dirigir o aplicar el corazón. Además, la nota al pie está mal anclada: el marcador [a] aparece tras «me dijo», pero la nota trata sobre «afligirte/humillarte».'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero presenta dos problemas de calidad editorial: 1) «diste tu corazón para entender» suena extraño en español bíblico contemporáneo y puede malentenderse; 2) las notas duplican el mismo punto léxico y una de ellas está colocada en un lugar incorrecto del texto. Una reparación menor resuelve esto sin alterar la traducción en conjunto.'
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto en este versículo. «Dios» y «humillarte» están alineados con las decisiones documentadas. La principal desalineación es estilístico-idiomática respecto al hebreo auditado: para נָתַתָּ אֶת־לִבְּךָ conviene «pusiste tu corazón» o «dispusiste tu corazón», no «diste tu corazón».'
  issues:
  - severity: high
    issue: La expresión «diste tu corazón» no es idiomática ni fiel al valor funcional de נָתַתָּ אֶת־לִבְּךָ en español.
    rationale: El hebreo significa dirigir, aplicar o disponer el corazón hacia algo. «Dar el corazón» en español suele evocar afecto romántico o entrega emocional, no resolución interior para comprender. Esto afecta fidelidad y legibilidad.
  - severity: high
    issue: El marcador [a] está anclado en «me dijo», pero la nota se refiere a «humillarte/afligirte».
    rationale: Las instrucciones requieren que cada nota aparezca exactamente en la palabra o frase relevante. La ubicación actual induce a error editorial y semántico.
  - severity: medium
    issue: Las dos notas al pie duplican el mismo asunto léxico sobre וּלְהִתְעַנּוֹת.
    rationale: El inglés preserva una sola alternativa significativa; en español basta una sola nota bien anclada. La duplicación añade ruido y crea incoherencia interna.
