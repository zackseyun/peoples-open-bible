translation:
  language: es
  text: ¿Quién se levantará por mí contra los malhechores?[a] ¿Quién se pondrá en pie por mí contra los que obran iniquidad?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo «con» (עִם), pero aquí se traduce «contra» porque el contexto es adversarial: el salmista pregunta quién se alzará y tomará su posición en oposición a los malhechores a favor suyo.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «los obradores de iniquidad», «los que hacen mal» o «los que practican maldad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién será el que
  - ¿Quién es el que
  lexicon: HALOT
  rationale: El interrogativo hebreo se conserva de forma directa y natural en español.
- source_word: יָקוּם
  english_pob_choice: will rise up
  chosen_spanish: se levantará
  alternatives_spanish:
  - se alzará
  - se pondrá de pie
  lexicon: HALOT
  rationale: קום expresa levantarse o ponerse en pie; en español, 'se levantará' mantiene la imagen verbal y la fuerza modal/futura de la pregunta retórica.
- source_word: לִי
  english_pob_choice: for me
  chosen_spanish: por mí
  alternatives_spanish:
  - para mí
  - en mi favor
  lexicon: HALOT
  rationale: La preposición ל indica beneficio o apoyo; 'por mí' comunica bien la idea de actuar en favor del hablante y suena natural en este contexto de defensa.
- source_word: עִם
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - con
  - frente a
  lexicon: HALOT
  rationale: Aunque עִם suele significar 'con', aquí el contexto es adversarial; 'contra' transmite la oposición implícita de manera clara en español.
- source_word: מְרֵעִים
  english_pob_choice: evildoers
  chosen_spanish: los malhechores
  alternatives_spanish:
  - los que hacen mal
  - los malvados
  lexicon: HALOT
  rationale: El participio designa a quienes hacen el mal. 'Malhechores' es conciso, idiomático y moralmente fuerte sin perder el sentido del término.
- source_word: יִתְיַצֵּב
  english_pob_choice: will stand
  chosen_spanish: se pondrá en pie
  alternatives_spanish:
  - se mantendrá firme
  - tomará posición
  lexicon: HALOT
  rationale: El hitpael de יצב puede expresar ponerse firmemente en posición. 'Se pondrá en pie' preserva el paralelismo con 'se levantará' y la imagen de presentarse para apoyar o confrontar.
- source_word: פֹּעֲלֵי אָוֶן
  english_pob_choice: workers of iniquity
  chosen_spanish: los que practican iniquidad
  alternatives_spanish:
  - los obreros de iniquidad
  - los que hacen mal
  lexicon: HALOT
  rationale: La construcción idiomática se puede verter de forma más natural como 'los que practican iniquidad', manteniendo el sentido de actividad habitual y la carga moral de אָוֶן.
- source_word: אָוֶן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - maldad
  - malo proceder
  - mal
  lexicon: HALOT
  rationale: '''Iniquidad'' conserva el valor ético y el tono tradicional del sintagma sin perder fidelidad al hebreo.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo de WLC y el auditoría inglesa: mantiene la doble pregunta retórica, el valor adversarial de עִם y la expresión idiomática פֹּעֲלֵי אָוֶן con una solución española natural y publicable. No se detectaron revisiones aplicadas en la fuente inglesa reciente; el acuerdo de revisión es alto.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' no aplicable aquí.
  - Se mantiene la correspondencia paralela entre 'se levantará' y 'se pondrá en pie'.
  - '''Iniquidad'' se usa de manera consistente para אָוֶן en la frase idiomática.'
  - Las notas preservan las alternativas relevantes sin sobrecargar el texto principal.
