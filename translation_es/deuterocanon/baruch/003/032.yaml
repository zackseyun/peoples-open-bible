translation:
  language: es
  text: Pero el que conoce todas las cosas la conoce[a]; la descubrió por su entendimiento. El que estableció la tierra por siempre[c] la llenó de animales de cuatro patas[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la halló» para «la descubrió».
    reason: lexical_alternative
  - marker: b
    text: El griego usa pronombres femeninos para la sabiduría («la»), conservando su personificación.
    reason: cultural_note
  - marker: c
    text: O «para todo tiempo» o «por toda la eternidad» para «por siempre».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ εἰδὼς τὰ πάντα
  english_pob_choice: he who knows all things
  chosen_spanish: el que conoce todas las cosas
  alternatives_spanish:
  - el que ha conocido todas las cosas
  - el que comprende todo
  lexicon: BDAG
  rationale: El participio perfecto con artículo funciona como sustantivo y describe a Dios como el que posee conocimiento completo. «Conoce todas las cosas» es natural en español y conserva el alcance total de τὰ πάντα.
- source_word: γινώσκει αὐτήν
  english_pob_choice: knows her
  chosen_spanish: la conoce
  alternatives_spanish:
  - la conoce a ella
  - la conoce como persona
  lexicon: BDAG
  rationale: El pronombre femenino αὐτήν remite a la sabiduría personificada. En español, repetir el pronombre femenino explícito sería menos natural; el clítico «la» preserva la referencia personal sin perder fluidez.
- source_word: ἐξεῦρεν αὐτὴν
  english_pob_choice: he discovered her
  chosen_spanish: la descubrió
  alternatives_spanish:
  - la halló
  - la encontró
  lexicon: BDAG
  rationale: ἐξευρίσκω expresa hallar tras descubrir o averiguar. «La descubrió» conserva la fuerza de encontrar por indagación y evita una formulación demasiado interpretativa.
- source_word: τῇ συνέσει αὐτοῦ
  english_pob_choice: by his understanding
  chosen_spanish: por su entendimiento
  alternatives_spanish:
  - por su inteligencia
  - mediante su discernimiento
  lexicon: BDAG
  rationale: σύνεσις significa entendimiento, discernimiento o comprensión. «Por su entendimiento» refleja bien el valor instrumental del dativo y suena natural en registro bíblico español.
- source_word: ὁ κατασκευάσας τὴν γῆν
  english_pob_choice: he who established the earth
  chosen_spanish: el que estableció la tierra
  alternatives_spanish:
  - el que preparó la tierra
  - el que dispuso la tierra
  lexicon: LSJ
  rationale: κατασκευάζω puede significar preparar, disponer o establecer. Dado el contexto de la acción creadora y de llenar la tierra, «estableció» comunica con claridad la firmeza y ordenamiento de la tierra sin sobreespecificar el modo.
- source_word: εἰς τὸν αἰῶνα χρόνον
  english_pob_choice: for all time
  chosen_spanish: para todo tiempo
  alternatives_spanish:
  - para siempre
  - por tiempo eterno
  lexicon: LSJ
  rationale: La expresión combinada αἰῶνα χρόνον intensifica la duración. «Para todo tiempo» conserva la idea de duración indefinida y continua, siguiendo de cerca el matiz del griego.
- source_word: ἐνέπλησεν αὐτὴν
  english_pob_choice: filled it
  chosen_spanish: la llenó
  alternatives_spanish:
  - la colmó
  - la llenó completamente
  lexicon: BDAG
  rationale: La tierra es femenina en español, de modo que el clítico «la» mantiene la concordancia natural sin alterar el sentido.
- source_word: κτηνῶν τετραπόδων
  english_pob_choice: with four-footed animals
  chosen_spanish: de animales de cuatro patas
  alternatives_spanish:
  - de cuadrúpedos
  - de bestias de cuatro patas
  lexicon: LSJ
  rationale: κτήνη alude a animales o bestias, y τετράποδα especifica que son de cuatro patas. «Animales de cuatro patas» es claro y comprensible en español moderno, sin tecnicismo innecesario.
theological_decisions:
- issue: Personificación femenina de la sabiduría
  english_pob_reading: Retain feminine personal reference ('her') for wisdom
  chosen_spanish_reading: Mantener la referencia femenina a la sabiduría mediante el clítico «la»
  alternative_spanish_readings:
  - usar «lo» como impersonal
  - neutralizar con «esa sabiduría»
  rationale: El texto griego usa pronombres femeninos para la sabiduría personificada. En español, «la» conserva esa personificación sin convertirla en un simple objeto impersonal.
  doctrine_reference: Proverbios/ Sabiduría personificada; cf. Sabiduría 7–9
- issue: Acción creadora expresada por κατασκευάσας
  english_pob_reading: Render as 'established the earth' rather than a more doctrinally loaded 'created'
  chosen_spanish_reading: «Estableció la tierra» en vez de «creó la tierra»
  alternative_spanish_readings:
  - creó la tierra
  - preparó la tierra
  rationale: El verbo griego no es el más directo para «crear». «Estableció» respeta su valor lexical y evita introducir una formulación teológica más fuerte que la del texto.
  doctrine_reference: Doctrina de la creación; precisión lexical
- issue: Duración de εἰς τὸν αἰῶνα χρόνον
  english_pob_reading: Or 'for all time' or 'forever' for 'for everlasting time.'
  chosen_spanish_reading: «para todo tiempo»
  alternative_spanish_readings:
  - «para siempre»
  - «por tiempo eterno»
  rationale: La frase griega es intensiva y algo redundante. «Para todo tiempo» comunica la duración continua de manera fiel y no fuerza un absoluto dogmático donde el griego enfatiza permanencia.
  doctrine_reference: Lenguaje de duración en la Escritura
translation_notes:
  revision_awareness: 'Se siguió la lectura revisada del audit trail inglés, que prefirió «discovered her» y «for all time» frente a alternativas menos idiomáticas. En español, se mantuvo esa orientación: «la descubrió» y «para todo tiempo», con una redacción pública natural y fiel al griego.'
  spanish_consistency_notes:
  - Se conserva la personificación femenina de la sabiduría sin recurrir a un neutro impersonal.
  - Se evita «SEÑOR» porque el versículo no contiene יהוה ni κύριος como sustituto directo en este punto.
  - «Estableció» refleja adecuadamente κατασκευάσας sin sobrerenderizarlo como «creó».
  - «Animales de cuatro patas» mantiene claridad moderna y el valor semántico de κτηνῶν τετραπόδων.
