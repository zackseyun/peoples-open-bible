revisions:
- from: Y será que la ciudad más cercana al muerto[a], los ancianos de aquella ciudad tomarán una novilla[b] del ganado[c] que no ha sido trabajada y que no ha tirado del yugo[d].
  to: Y será que la ciudad más cercana al hombre muerto[a], los ancianos de aquella ciudad tomarán una novilla[b] del ganado que no ha sido trabajada y que no ha tirado del yugo[c].
  rationale: Se ajusta חָלָל a «hombre muerto» para reflejar mejor la referencia personal y violenta del contexto legal, más cerca de la POB inglesa. Se elimina la nota independiente sobre «del ganado» porque añadía una explicación no sustentada por la evidencia. Se corrige la nota sobre el yugo para reflejar mejor la formulación auditada y el sentido práctico del hebreo.
