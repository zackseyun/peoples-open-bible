revisions:
- from: Y reconstruyó los lugares altos que había destruido su padre Ezequías, erigió altares para Baal, e hizo un[a] Asera, como había hecho Ahab rey de Israel; y se postró ante todo el ejército del cielo y les sirvió.
  to: Y reconstruyó los lugares altos que había destruido Ezequías su padre, erigió altares para Baal, e hizo una Asera[a], como había hecho Acab rey de Israel; y se postró ante todo el ejército del cielo y les sirvió.
  rationale: Se corrigió un error gramatical en el artículo de «Asera», se normalizó el nombre propio al español («Acab») para mejor legibilidad y adecuación onomástica, y se mejoró la aposición «Ezequías su padre» para que suene más natural y fiel al hebreo. No se requieren cambios doctrinales ni adjudicación adicional.
