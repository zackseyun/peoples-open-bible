translation:
  text: They showed Jesus a gold coin,[1] and they said to him[1], "Those who belong
    to Caesar demand the tax from us."[2] He said to them, "Give the things of Caesar
    to Caesar; give the things of God to God[a][3][2]; and what is mine—give it to
    me."[3]
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: ⲉⲟⲩⲛⲟⲩⲃ literally ‘a gold’; in context this denotes a coin of gold, not
      merely raw metal.
    reason: lexical_alternative
  - marker: '2'
    text: The phrase can also be read more literally as ‘those who [work for/serve]
      Caesar seek from us the tax.’ The verb ⲥϣⲓⲧⲉ is ‘seek/ask for’; in fiscal contexts
      ‘demand/exact’ is natural.
    reason: lexical_alternative
  - marker: '3'
    text: Thomas uniquely adds this third imperative (‘and what is mine, give it to
      me’) beyond the Synoptic versions.
    reason: cross_reference
  - marker: a
    text: Or "Give to Caesar what is Caesar's; give to God what is God's".
    reason: previous_rendering
lexical_decisions:
- source_word: ⲥⲉⲃⲟⲓ (as in ⲧⲥⲉⲃⲟⲓ … ⲏⲥⲟⲩⲥ)
  chosen: showed
  alternatives:
  - displayed
  - pointed out
  lexicon: Crum; Layton
  rationale: The verb ⲥⲃⲟⲓ is used in Sahidic for ‘to show, display’. In context of
    presenting a coin, ‘showed’ fits best.
- source_word: ⲉⲟⲩⲛⲟⲩⲃ
  chosen: a gold coin
  alternatives:
  - a piece of gold
  - a gold piece
  lexicon: Crum (ⲛⲟⲩⲃ ‘gold’)
  rationale: ⲛⲟⲩⲃ ‘gold’ often functions metonymically for a gold coin. Given the
    fiscal context, ‘a gold coin’ conveys the concrete item without over-specifying
    denomination.
- source_word: ⲁⲕⲁⲓⲥⲁⲣ (ⲕⲁⲓⲥⲁⲣ)
  chosen: Caesar
  alternatives:
  - the emperor
  lexicon: Loanword from Greek Καῖσαρ
  rationale: Proper name/title retained as in the Coptic; ‘Caesar’ preserves the historical
    coloration.
- source_word: ⲛⲧⲟⲟⲩϣⲓⲧⲉ
  chosen: demand
  alternatives:
  - seek
  - ask for
  lexicon: Crum; Layton (ⲥϣⲓⲧⲉ ‘seek, request’)
  rationale: In a taxation setting, ⲥϣⲓⲧⲉ carries the sense of ‘demand/exact’. ‘Demand’
    reflects the coercive nuance of tax collection.
- source_word: ⲡϣⲱⲙ
  chosen: the tax
  alternatives:
  - the tribute
  - the assessment
  lexicon: Crum (sense ‘tribute, tax’ attested); Layton (lexical lists)
  rationale: Within this fiscal context ⲡϣⲱⲙ refers to a levy/tribute; ‘the tax’ is
    idiomatic and concise.
- source_word: ϯ (imperative)
  chosen: give
  alternatives:
  - hand over
  - render
  lexicon: Layton (verbal paradigms)
  rationale: Plain imperative ‘give’ reflects the Coptic verb directly; avoids harmonizing
    to the familiar ‘render’ from canonical phrasing.
- source_word: ⲡⲁⲕⲁⲓⲥⲁⲣ
  chosen: what is Caesar’s
  alternatives:
  - the things of Caesar
  - Caesar’s due
  lexicon: Layton (possessive article ⲡⲁ- ‘that which pertains to’)
  rationale: Possessive article ⲡⲁ- forms a nominal phrase ‘that which belongs to
    Caesar’. ‘What is Caesar’s’ is succinct and accurate.
- source_word: ⲡⲁⲡⲛⲟⲩⲧⲉ
  chosen: what is God’s
  alternatives:
  - the things of God
  - God’s due
  lexicon: Layton (possessive article)
  rationale: Parallel to ⲡⲁⲕⲁⲓⲥⲁⲣ; preserves balance and terseness.
- source_word: ⲡⲉⲧⲉⲡⲱⲉⲓ
  chosen: what is mine
  alternatives:
  - my own (things)
  - what belongs to me
  lexicon: Crum (ⲡⲱⲉⲓ ‘one’s own, property’)
  rationale: Coptic uses a relative construction to form ‘what is mine’; ‘what is
    mine’ retains the stark Thomasine turn.
textual_note: 'Dialect: Sahidic with Lycopolitan features. Orthography shows the common
  possessive-article construction (ⲡⲁ-), here ⲡⲁⲕⲁⲓⲥⲁⲣ / ⲡⲁⲡⲛⲟⲩⲧⲉ. The object shown
  is ⲉⲟⲩⲛⲟⲩⲃ (‘a gold [coin]’), where ‘gold’ serves metonymically for a coin. The
  taxation clause employs ⲛⲧⲟⲟⲩϣⲓⲧⲉ ‘seek/demand’ plus ⲡϣⲱⲙ ‘tax/tribute’. Final clause:
  the line-level printed text reads ⲁⲩⲱ ⲡⲉⲧⲉⲡⲱⲉⲓ ⲡⲉ ⲙⲁⲧⲛ̄ⲛⲁⲉⲓϥ (NHAM02.49/lb31). Dilley’s
  normalized line appears mechanically garbled in this segment, but the sense ‘and
  what is mine—give it to me’ is standard and contextually demanded; ⲡⲉⲧⲉⲡⲱⲉⲓ forms
  ‘what is mine’, and the verbal complex supplies an imperative with pronominal object.
  No lacunae are signaled in this saying; orthographic supralineation over the proper
  name ⲕⲁⲓⲥⲁⲣ is a routine scribal feature.'
