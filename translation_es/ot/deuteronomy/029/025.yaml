translation:
  language: es
  text: y fueron y sirvieron a otros dioses, y se inclinaron ante ellos[a], dioses que no habían conocido y a quienes él no les había asignado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y que no les habían sido asignados». El hebreo tiene un sujeto singular implícito, probablemente referido a Dios.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּלְכוּ
  english_pob_choice: they went
  chosen_spanish: fueron
  alternatives_spanish:
  - iban
  - se fueron
  - caminaron
  lexicon: HALOT
  rationale: El hebreo marca el movimiento con הלך; en este contexto narrativo, «fueron» conserva la secuencia idiomática sin añadir una dirección o matiz no explicitado.
- source_word: וַיַּעַבְדוּ
  english_pob_choice: served
  chosen_spanish: sirvieron
  alternatives_spanish:
  - adoraron
  - prestaron servicio
  lexicon: HALOT
  rationale: Como en el inglés auditado, «sirvieron» mantiene la fuerza de עבד y deja aparte el acto explícito de postración que sigue en el versículo.
- source_word: אֱלֹהִים אֲחֵרִים
  english_pob_choice: other gods
  chosen_spanish: otros dioses
  alternatives_spanish:
  - dioses ajenos
  - dioses extranjeros
  lexicon: HALOT
  rationale: «Otros dioses» es la equivalencia más directa y literal del sintagma; conserva el contraste deuteronómico sin introducir un matiz geográfico o étnico que el hebreo no exige aquí.
- source_word: וַיִּשְׁתַּחֲוּוּ לָהֶם
  english_pob_choice: bowed down to them
  chosen_spanish: se inclinaron ante ellos
  alternatives_spanish:
  - se postraron ante ellos
  - los adoraron
  lexicon: HALOT
  rationale: שׁחה denota inclinarse/prostrarse. «Se inclinaron ante ellos» preserva la imagen física y evita confundir este verbo con עבד, que ya se tradujo como «sirvieron».
- source_word: אֱלֹהִים אֲשֶׁר לֹא יְדָעוּם
  english_pob_choice: gods whom they had not known
  chosen_spanish: dioses que no habían conocido
  alternatives_spanish:
  - dioses a quienes no habían conocido
  - dioses con los que no estaban familiarizados
  lexicon: HALOT
  rationale: ידע aquí expresa conocimiento relacional/experiencial. «Que no habían conocido» es natural en español y conserva esa falta de relación reconocida por el texto.
- source_word: וְלֹא חָלַק לָהֶם
  english_pob_choice: and whom he had not allotted to them
  chosen_spanish: y a quienes él no había asignado a ellos
  alternatives_spanish:
  - y a quienes no les había repartido
  - y que no habían sido asignados a ellos
  lexicon: HALOT
  rationale: חלק comunica repartir/asignar/otorgar por porción. «Asignado» mantiene la idea de reparto designado. Se explicita «él» porque el verbo es singular y el contexto apunta a Dios como sujeto implícito, tal como refleja el inglés auditado.
theological_decisions:
- issue: Sujeto implícito del verbo singular חָלַק
  english_pob_reading: 'The subject is implicit and refers to God: ''whom he had not allotted to them.'''
  chosen_spanish_reading: 'Se mantiene el sujeto implícito como «él», entendido como Dios: «a quienes él no había asignado a ellos».'
  alternative_spanish_readings:
  - a quienes no les habían sido asignados
  - y a quienes no les había tocado en reparto
  rationale: El hebreo usa un verbo singular sin sujeto expreso. En el contexto de Deuteronomio, el agente implícito es Dios, coherente con el lenguaje de la porción/asignación. La formulación española preserva esa lectura sin borrar la tensión textual.
  doctrine_reference: Deuteronomio 4:19; 32:8-9
translation_notes:
  revision_awareness: El pasaje presenta una alta concordancia con el audit trail inglés y no requiere revisiones textuales adicionales; se preserva la distinción entre «servir» y «inclinarse», y se explicita el sujeto implícito de חָלַק siguiendo la decisión auditada.
  spanish_consistency_notes:
  - Se mantiene «dioses» para אֱלֹהִים según el contexto plural del verso.
  - Se conserva la distinción semántica entre «sirvieron» (עבד) y «se inclinaron» (שׁחה).
  - Se usa «Yahvé» solo cuando el texto fuente lo exige explícitamente; en este versículo no aparece el Tetragrámaton.
  - La nota se ancla en la frase con sujeto implícito para reflejar la alternativa textual sin duplicar marcadores.
