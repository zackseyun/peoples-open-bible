  text: ἐκκαθάρατε τὴν παλαιὰν ζύμην, ἵνα ἦτε νέον φύραμα, καθώς ἐστε ἄζυμοι. καὶ γὰρ τὸ πάσχα ⸀ἡμῶν ἐτύθη Χριστός·
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/005/007.yaml
  text: Clean out the old leaven[a], so that you may be a new batch, just as you are unleavened. For Messiah, our Passover lamb[b], has been sacrificed.
  footnotes:
  - marker: a
    text: 'Or simply, ''our Passover has been sacrificed: Christ.'' The Greek says ''our Passover,'' which may be understood as shorthand for the Passover lamb or Passover sacrifice.'
    reason: lexical_alternative
  - marker: b
    text: 'Greek ''Christos''; rendered ''the Messiah'' here because the title sense is prominent in the Passover context.'
    reason: alternative_reading
translation:
