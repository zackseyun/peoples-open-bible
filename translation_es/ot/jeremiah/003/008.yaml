    text: O «Israel infiel». El término hebreo subraya el apartarse o volverse atrás; también puede expresar apostasía.
    reason: lexical_alternative
  - marker: b
    text: O «carta de repudio». El hebreo se refiere al documento legal formal de divorcio.
    reason: lexical_alternative
  - marker: c
    text: O «fue y jugó a la prostituta». La frase continúa la metáfora del capítulo sobre la infidelidad de pacto como infidelidad sexual.
    reason: lexical_alternative
  revision_rationale: 'Se revisa para alinear mejor el español con el hebreo y con las decisiones auditadas del POB: «descarriada» refleja mejor מְשֻׁבָה que «rebelde»; «la había enviado lejos» evita el matiz laboral de «despedido» y encaja con la carta de divorcio; se mejora el sintagma sobre Judá y se pule la nota alternativa final para mayor naturalidad. No cambia el sentido global del borrador.'
