translation:
  language: es
  text: 'Tú dijiste[a]: «Mira, has derrotado a Edom, y tu corazón te ha enaltecido para jactarte». Ahora quédate en casa. ¿Por qué has de provocar una desgracia, para que caigas tú y Judá contigo?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu corazón te ha exaltado para gloria»; o: «tu corazón te ha hecho orgulloso para honor». La expresión hebrea es idiomática y comunica autoexaltación tras la victoria.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָמַרְתָּ
  english_pob_choice: You said
  chosen_spanish: Tú dijiste
  alternatives_spanish:
  - Has dicho
  lexicon: HALOT
  rationale: El perfecto narrativo se vierte naturalmente en pasado simple en español. Mantengo la segunda persona explícita para dar claridad al discurso directo.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Observa
  - He aquí
  lexicon: HALOT
  rationale: La partícula deíctica exige una forma que llame la atención. «Mira» conserva la fuerza conversacional sin el tono arcaico de «He aquí».
- source_word: הִכִּיתָ אֶת אֱדוֹם
  english_pob_choice: you have struck Edom
  chosen_spanish: has derrotado a Edom
  alternatives_spanish:
  - has golpeado a Edom
  - has vencido a Edom
  - has herido a Edom
  lexicon: HALOT
  rationale: En contexto militar, נכה puede referir el triunfo sobre un enemigo. «Derrotado» expresa el resultado bélico que el contexto presupone, sin volver demasiado literal «golpeado».
- source_word: וּנְשָׂאֲךָ לִבְּךָ
  english_pob_choice: your heart has lifted you up
  chosen_spanish: tu corazón te ha enaltecido
  alternatives_spanish:
  - tu corazón te ha levantado
  - tu corazón te ha exaltado
  - tu corazón te ha hecho altivo
  lexicon: HALOT
  rationale: Conservo la metáfora del corazón como agente interior que eleva al rey. «Enaltecido» mantiene esa elevación y deja abierta la nota de orgullo implícita.
- source_word: לְהַכְבִּיד
  english_pob_choice: to boast
  chosen_spanish: para jactarte
  alternatives_spanish:
  - para gloriarte
  - para mostrar orgullo
  - para vanagloriarte
  lexicon: HALOT
  rationale: El infinitivo funciona como finalidad/resultante de la autoelevación. «Jactarte» comunica bien la idea de autoexaltación ostentosa que el contexto de reprensión exige.
- source_word: עַתָּה שְׁבָה בְּבֵיתֶךָ
  english_pob_choice: Now stay at home
  chosen_spanish: Ahora quédate en casa
  alternatives_spanish:
  - Ahora permanece en tu casa
  - Ahora siéntate en tu casa
  - Ahora quédate en tu casa y no salgas
  lexicon: HALOT
  rationale: El imperativo de ישב con «en tu casa» expresa la idea de permanecer y no salir a guerra. «Quédate en casa» es idiomático y fiel al mandato.
- source_word: לָמָּה תִתְגָּרֶה
  english_pob_choice: Why should you provoke
  chosen_spanish: ¿Por qué provocarías
  alternatives_spanish:
  - ¿Por qué te provocarías?
  - ¿Por qué te meterías en pleito?
  - ¿Por qué te empeñarías en la pelea?
  lexicon: HALOT
  rationale: El hitpael de גרה aquí apunta a buscar o suscitar conflicto. En español, una formulación interrogativa retórica en condicional reproduce bien la advertencia implícita.
- source_word: בְּרָעָה
  english_pob_choice: disaster
  chosen_spanish: un mal
  alternatives_spanish:
  - una desgracia
  - un desastre
  - una calamidad
  lexicon: HALOT
  rationale: רעה puede referirse a calamidad o daño, no necesariamente a mal moral. «Un mal» conserva amplitud semántica y se integra bien con el verbo «provocar».
- source_word: וְנָפַלְתָּ
  english_pob_choice: so that you fall
  chosen_spanish: para que caigas
  alternatives_spanish:
  - y caerás
  - y caerás en ello
  - y termines cayendo
  lexicon: HALOT
  rationale: La forma con waw consecuencial se traduce como resultado temido. «Para que caigas» conserva la relación causal advertida por el texto.
- source_word: אַתָּה וִיהוּדָה עִמָּךְ
  english_pob_choice: you and Judah with you
  chosen_spanish: tú y Judá contigo
  alternatives_spanish:
  - tú, y Judá contigo
  - tú junto con Judá
  - tú y Judá con él
  lexicon: HALOT
  rationale: La frase remarca que la caída del rey arrastraría a Judá. «Contigo» preserva la solidaridad de destino sin añadir una glosa interpretativa.
translation_notes:
  revision_awareness: Se siguió el paquete fuente hebreo (WLC) y el audit trail inglés. El punto más delicado es וּנְשָׂאֲךָ לִבְּךָ לְהַכְבִּיד, donde el hebreo conserva una metáfora de elevación interior; la redacción española mantiene esa imagen y traduce la finalidad con un verbo natural de orgullo/jactancia. No se aplicaron revisiones posteriores en el inglés de referencia.
  spanish_consistency_notes:
  - Se usa «Dios / Yahvé» según el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene «Judá» como nombre propio del reino, siguiendo el contexto histórico.
  - Se evita «SEÑOR» o lenguaje eclesiástico añadido porque el pasaje es una reprensión histórica con sentido militar-político.
  - «Un mal» se conserva deliberadamente amplio para no restringir indebidamente רעה a mal moral.
