translation:
  language: es
  text: En un pacto[a][b] estableciste a nuestros padres acerca de nosotros, y nosotros esperaremos en ti en el retorno de nuestra alma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Estableciste un pacto».'
    reason: alternative_reading
  - marker: b
    text: 'O: «cuando nuestra alma se vuelva»; el griego dice literalmente «en el volver/retorno de nuestra alma».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν διαθήκῃ
  english_pob_choice: In a covenant
  chosen_spanish: En un pacto
  alternatives_spanish:
  - En un pacto establecido
  - En alianza
  lexicon: BDAG
  rationale: διαθήκη en este contexto bíblico expresa una disposición pactal; en español, «pacto» conserva ese peso relacional y teológico. «Alianza» es posible, pero «pacto» resulta más transparente para el auditorio bíblico y evita una carga interpretativa excesiva.
- source_word: διέθου
  english_pob_choice: appointed / made a covenant
  chosen_spanish: estableciste
  alternatives_spanish:
  - hiciste
  - instituiste
  - sellaste
  lexicon: BDAG
  rationale: El verbo de διατίθημι aquí funciona en un giro hebraizante con διαθήκη. «Estableciste» comunica con naturalidad que Dios fijó/dispuso el pacto, sin forzar una reconstrucción técnica en español ni perder el valor verbal.
- source_word: τοῖς πατράσιν ἡμῶν
  english_pob_choice: with our fathers
  chosen_spanish: con nuestros padres
  alternatives_spanish:
  - con nuestros antepasados
  - con nuestros padres ancestrales
  lexicon: BDAG
  rationale: El griego dice literalmente «a/ con los padres nuestros»; «padres» preserva el paralelismo bíblico y la referencia a los antepasados del pacto. Se mantiene el matiz genealógico del original.
- source_word: περὶ ἡμῶν
  english_pob_choice: concerning us
  chosen_spanish: acerca de nosotros
  alternatives_spanish:
  - sobre nosotros
  - por nosotros
  lexicon: BDAG
  rationale: περί con genitivo aquí es más naturalmente «acerca de/concerning». «Acerca de nosotros» sigue de cerca el griego y evita convertir la preposición en una finalidad no expresada explícitamente.
- source_word: ἐλπιοῦμεν
  english_pob_choice: we will hope
  chosen_spanish: esperaremos
  alternatives_spanish:
  - tendremos esperanza
  - pondremos nuestra esperanza
  lexicon: BDAG
  rationale: El futuro griego se refleja con futuro español. «Esperaremos» es idiomático y conserva la forma verbal sin añadir énfasis devocional ausente en el texto.
- source_word: ἐπιστροφῇ
  english_pob_choice: turning back
  chosen_spanish: volver
  alternatives_spanish:
  - retorno
  - conversión
  - arrepentimiento
  lexicon: BDAG
  rationale: ἐπιστροφή puede significar retorno o vuelta, y en contextos religiosos también puede rozar la conversión/arrepentimiento. Se eligió «volver» para mantener la imagen literal y dejar abierta la tensión penitencial señalada por el aparato inglés.
- source_word: ψυχῆς ἡμῶν
  english_pob_choice: our soul
  chosen_spanish: de nuestra alma
  alternatives_spanish:
  - de nuestra vida
  - de nosotros mismos
  lexicon: BDAG
  rationale: ψυχή se traduce aquí por «alma» para conservar la singularidad colectiva de la expresión griega. «Vida» o «nosotros mismos» suavizan demasiado la imagen y reducen la fuerza antropológica del término.
theological_decisions:
- issue: Si ἐν ἐπιστροφῇ ψυχῆς ἡμῶν debe explicitarse como arrepentimiento/conversión
  english_pob_reading: in the turning back of our soul
  chosen_spanish_reading: en el volver de nuestra alma
  alternative_spanish_readings:
  - cuando nos arrepintamos
  - en la conversión de nuestra alma
  - cuando nuestra alma se vuelva
  rationale: El griego permite una lectura penitencial, pero no la formula de manera explícita. Se conserva la ambigüedad fértil del original con «volver», evitando resolver la frase en «arrepentimiento» o «conversión» y preservando la tensión teológica documentada por el POB inglés.
  doctrine_reference: Preservar la tensión teológica en vez de cerrarla interpretativamente.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente que entendió ἐν διαθήκῃ διέθου como una construcción idiomática que puede verterse con un verbo principal natural en la lengua receptora, sin perder el contenido pactal. También toma en cuenta que el inglés revisado volvió más literal ἐν ἐπιστροφῇ ψυχῆς ἡμῶν; por eso el español conserva la imagen de «volver» y no la explicita como «arrepentimiento».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija explícitamente; aquí no aparece el Tetragrámaton.
  - Se prefiere «pacto» en lugar de «alianza» por consistencia con la terminología bíblica pactal del proyecto.
  - Se mantiene «alma» para ψυχή, y «volver» para ἐπιστροφή, para no borrar la posible resonancia de conversión sin imponerla.
