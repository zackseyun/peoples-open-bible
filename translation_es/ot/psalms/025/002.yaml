revisions:
- from: Dios mío[a], en ti confío; no permitas que me avergüence[b]; no permitas que mis enemigos se regocijen sobre mí.
  to: Dios mío, en ti confío; no permitas que sea avergonzado[a]; no permitas que mis enemigos triunfen sobre mí[b].
  rationale: La revisión fortalece la fidelidad al expediente POB y mejora la naturalidad del español. «Sea avergonzado» refleja mejor la deshonra pública contextual sin eliminar la alternativa más interna en nota. «Triunfen sobre mí» evita un calco poco idiomático y mantiene en nota el matiz de exultación hostil preservado por el inglés. Se elimina la nota innecesaria sobre «Dios mío» porque no añade una alternativa relevante.
  reviewer_model: gpt-5.4
