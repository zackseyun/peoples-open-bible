translation:
  language: es
  text: Oráculo[a] de la palabra de Yahvé a Israel por medio de Malaquías.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «carga». El término hebreo puede denotar una declaración profética de gran peso.
    reason: lexical_alternative
  - marker: b
    text: «Malaquías» también puede entenderse como «mi mensajero», ya que la forma hebrea está claramente relacionada con esa expresión.
    reason: alternative_reading
lexical_decisions:
- source_word: מַשָּׂא
  english_pob_choice: oracle
  chosen_spanish: carga
  alternatives_spanish:
  - oráculo
  lexicon: HALOT
  rationale: En encabezamientos proféticos, מַשָּׂא puede expresar una declaración solemne y pesada. En español, «carga» conserva la imagen concreta y la gravedad del hebreo; «oráculo» es una alternativa válida, pero más interpretativa.
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  lexicon: HALOT
  rationale: La construcción hebrea dice literalmente «palabra de YHWH». «Palabra» mantiene la relación directa con el original y funciona bien en un encabezamiento profético.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración del Tetragrámaton, según la convención del proyecto, en vez de sustituirlo por un título como «Señor».
- source_word: אֶל יִשְׂרָאֵל
  english_pob_choice: to Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - contra Israel
  - acerca de Israel
  lexicon: HALOT
  rationale: El valor básico de אֶל aquí es direccional y marca al destinatario del mensaje; por eso «a Israel» es la opción más directa.
- source_word: בְּיַד
  english_pob_choice: by the hand of
  chosen_spanish: por medio de
  alternatives_spanish:
  - por la mano de
  - por
  lexicon: HALOT
  rationale: La expresión idiomática hebrea indica agencia o mediación. En español, «por medio de» comunica esa función con naturalidad, sin perder el sentido instrumental.
- source_word: מַלְאָכִי
  english_pob_choice: Malachi
  chosen_spanish: Malquías
  alternatives_spanish:
  - mi mensajero
  lexicon: HALOT
  rationale: Como encabezamiento de libro, el término se toma mejor como nombre propio. En español se adapta a la forma usual del nombre, mientras se preserva en la documentación la posibilidad descriptiva «mi mensajero».
theological_decisions:
- issue: Título profético מַשָּׂא
  english_pob_reading: oracle
  chosen_spanish_reading: carga
  alternative_spanish_readings:
  - oráculo
  rationale: El hebreo permite tanto la idea de «carga» como la de «oráculo». Se mantiene la tensión semántica en la nota implícita de la documentación, pero en el texto principal se elige «carga» para conservar la imagen verbal del hebreo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve lexical tension where source permits'
- issue: Nombre o descriptor en מַלְאָכִי
  english_pob_reading: proper name 'Malachi'
  chosen_spanish_reading: nombre propio 'Malquías'
  alternative_spanish_readings:
  - «mi mensajero»
  rationale: En una suscripción profética, el término funciona más naturalmente como nombre propio. La alternativa descriptiva se conserva como posibilidad reconocida, sin reemplazar el nombre en el texto principal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Translate titles; transliterate names; preserve theological tension rather than resolve it without note'
translation_notes:
  revision_awareness: La revisión inglesa posterior prefirió «oracle» sobre «burden» para מַשָּׂא. En español se optó por «carga» porque preserva mejor la imagen del hebreo; no se añadieron notas para evitar marcadores sin anclaje en el texto.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se tradujo el encabezamiento de forma breve y publicable, manteniendo el orden y las relaciones sintácticas del hebreo.
  - No se incluyeron notas al pie porque la validación exige que todo marcador aparezca anclado exactamente en el texto principal.
