base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/023/009.yaml
  text: And after him was Eleazar son of Dodo[a], son of Ahohi, one of the three mighty men with David when they defied the Philistines who had gathered there for battle[c][b], and the men of Israel had gone up.
  footnotes:
  - marker: a
    text: Or "son of Dodai, son of an Ahohite."
    reason: lexical_alternative
  - marker: b
    text: Or "when they defied the Philistines."
    reason: lexical_alternative
  - marker: c
    text: Literally "and the men of Israel went up"; in context this may mean they withdrew.
    reason: lexical_alternative
