  to: 'Y acontecerá que todos los que te vean huirán de ti y dirán: «Nínive está devastada[a]; ¿quién hará duelo por ella?[b] ¿Dónde podré buscar consoladores para ti?»'
  rationale: Se reemplazó «se compadecerá de ella» por «hará duelo por ella» para reflejar mejor el sentido de lamentación de יָנוּד en este contexto. Se ajustó «¿De dónde buscaré…?» a «¿Dónde podré buscar…?» para un español más natural sin perder la fuerza retórica. Se añadió una nota nueva para preservar la alternativa léxica de lamento/simpatía que la auditoría inglesa mantiene.
