  lexicon: BDAG
  rationale: 「(하나님이) 너에게 자비를 베푸시기를(= 그런 일이 일어나지 않기를)」의 셈어식 기원 관용구. 한국어 「결코 안 됩니다」가 그 강한 부정을 자연스럽게 옮긴다.
