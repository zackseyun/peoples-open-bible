translation:
  language: es
  text: 'Y ellos confiaron en él[a], y capturó a sesenta hombres de entre ellos, y los mató en un solo día, conforme a las palabras que él escribió:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego transmite una construcción mixta: el verbo de captura aparece en plural, mientras que el de matar es singular. La versión española unifica la acción en un sujeto singular para leer con naturalidad, pero la irregularidad del testimonio griego queda documentada.'
    reason: textual_variant
lexical_decisions:
- source_word: ἐνεπίστευσαν
  english_pob_choice: they trusted
  chosen_spanish: confiaron en él
  alternatives_spanish:
  - creyeron en él
  - pusieron su confianza en él
  lexicon: BDAG
  rationale: El verbo expresa poner confianza o dependencia en alguien. "Confiaron en él" conserva ese sentido natural en español y evita cargar el verbo con un matiz meramente doctrinal que aquí no es necesario.
- source_word: συνέλαβον
  english_pob_choice: he seized
  chosen_spanish: tomó
  alternatives_spanish:
  - apresó
  - capturó
  - tomó presos
  lexicon: LSJ
  rationale: El griego transmitido está en plural, pero el contexto inmediato y el verbo singular siguiente muestran al agente principal como el responsable de toda la acción. En español, "tomó" permite reflejar esa unidad narrativa sin perder la nota de captura.
- source_word: ἐξ αὐτῶν
  english_pob_choice: from among them
  chosen_spanish: de entre ellos
  alternatives_spanish:
  - de entre los suyos
  - de ellos
  lexicon: BDAG
  rationale: 'La expresión es partitiva: señala una selección dentro de un grupo mayor. "De entre ellos" es la forma española más natural y precisa.'
- source_word: ἑξήκοντα ἄνδρας
  english_pob_choice: sixty men
  chosen_spanish: sesenta hombres
  alternatives_spanish:
  - sesenta varones
  lexicon: BDAG
  rationale: La referencia es numérica y literal a personas varones. "Hombres" es claro y fiel en español contemporáneo.
- source_word: ἀπέκτεινεν
  english_pob_choice: killed
  chosen_spanish: los mató
  alternatives_spanish:
  - los hizo morir
  - los dio muerte
  lexicon: BDAG
  rationale: El verbo significa matar. "Los mató" es directo, claro y conserva la fuerza narrativa del griego sin sobreformalizarla.
- source_word: ἐν ἡμέρᾳ μιᾷ
  english_pob_choice: in one day
  chosen_spanish: en un solo día
  alternatives_spanish:
  - en un día
  - en el mismo día
  lexicon: BDAG
  rationale: La frase temporal marca que la acción ocurrió dentro de un único día. "En un solo día" expresa bien esa unidad temporal en español.
- source_word: κατὰ τοὺς λόγους
  english_pob_choice: according to the words
  chosen_spanish: conforme a las palabras
  alternatives_spanish:
  - según las palabras
  - de acuerdo con las palabras
  lexicon: BDAG
  rationale: La construcción introduce conformidad con una formulación previa escrita. "Conforme a las palabras" mantiene el vínculo formal con esa expresión citada.
- source_word: οὓς ἔγραφεν
  english_pob_choice: that he wrote
  chosen_spanish: que él escribió
  alternatives_spanish:
  - que escribió
  - las cuales escribió
  lexicon: BDAG
  rationale: El griego usa un verbo activo singular y anticipa el texto citado después. "Que él escribió" preserva esa referencia directa y el sujeto explícito.
theological_decisions:
- issue: Cambio de número entre συνέλαβον y ἀπέκτεινεν
  english_pob_reading: Render the seizure and killing with singular subject ('he seized ... and killed')
  chosen_spanish_reading: 'Unificar la acción bajo un sujeto singular implícito en el español: "tomó ... y los mató"'
  alternative_spanish_readings:
  - '"ellos tomaron ... y él los mató"'
  - '"tomaron ... y mató"'
  rationale: El testimonio griego presenta una secuencia mixta de plural y singular. Para el español, la solución más natural y coherente es reflejar la acción del principal agente como una sola línea narrativa, sin borrar que el texto griego conserva una irregularidad de número. La nota al pie documenta la tensión textual.
  doctrine_reference: Principio POB de conservar las tensiones textuales documentadas sin suavizarlas indebidamente
- issue: Referencia anticipada a un texto escrito
  english_pob_reading: according to the words that he wrote
  chosen_spanish_reading: conforme a las palabras que él escribió
  alternative_spanish_readings:
  - según las palabras que escribió
  - de acuerdo con lo que escribió
  rationale: La frase griega apunta a una correspondencia con palabras ya escritas, probablemente una cita inmediata en el contexto. La versión española conserva esa expectativa sin explicarla de más ni cerrarla prematuramente.
  doctrine_reference: Criterio POB de mantener alusiones y vínculos intertextuales cuando el griego los marca explícitamente
translation_notes:
  revision_awareness: Se revisó la tensión de número del griego frente a la fluidez española. La draft sigue el sentido narrativo del original y conserva la referencia a las palabras escritas sin anticipar más contenido del que el verso ofrece.
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" como norma del proyecto, pero este verso no contiene el nombre divino.
  - Se eligió "confiaron" para ἐνεπίστευσαν por su valor relacional y narrativo, no "creyeron".
  - Se evitó "SEÑOR" y también una paraphrasis explicativa para no ocultar la concatenación verbal del griego.
  - La puntuación con dos puntos al final conserva la apertura hacia la cita siguiente, como en el inglés auditado.
