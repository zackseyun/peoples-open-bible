revisions:
- from: 'Porque así ha dicho el Señor Yahvé: ¿Cuánto más cuando yo envíe mis cuatro juicios severos[a] contra Jerusalén —espada, hambre, bestias feroces y peste[b]— para exterminar de ella a hombre y bestia!'
  to: 'Porque así dice el Señor Yahvé: ¿Cuánto más cuando yo envíe mis cuatro juicios severos[a] contra Jerusalén—espada, hambruna, bestias feroces y peste[b]—para eliminar de ella a seres humanos y animales?'
  rationale: 'Se ajustó el texto para acercarlo mejor al hebreo y al POB auditado: ''dice'' refleja mejor la declaración profética; ''hambruna'' especifica el juicio de רָעָב; ''eliminar'' evita la sobretraducción de ''exterminar'' y se acerca mejor a לְהַכְרִית; y ''seres humanos y animales'' mejora la naturalidad del español sin perder el paralelismo humano-animal del original. Se mantuvieron ''Señor Yahvé'', ''juicios severos'', ''bestias feroces'' y las notas léxicas existentes por estar bien fundamentadas.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:01:56Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del hebreo y del POB inglés: fórmula profética, fuerza a fortiori de אַף כִּי, lista de cuatro juicios, y propósito de eliminar humanos y animales de Jerusalén. Sin embargo, hay dos desajustes relevantes: ''hambre'' debilita el valor específico de רָעָב, que aquí corresponde mejor a ''hambruna'', y ''para exterminar'' se aparta del idiomatismo más cercano de לְהַכְרִית (''cortar/excluir/eliminar''), intensificando innecesariamente el verbo.'
  spanish_quality_summary: El español es mayormente claro y digno, pero requiere un ajuste de naturalidad y precisión. 'Porque así ha dicho' suena algo rígido frente a 'Porque así dice'. 'A hombre y bestia' es comprensible pero menos natural que 'a seres humanos y animales' o la fórmula tradicional 'a hombre y bestia'; dado el registro buscado, conviene una formulación clara y bíblica. También es preferible evitar espacios tipográficos impropios alrededor de la raya en este contexto.
  glossary_alignment: Alinea bien con la política del proyecto al usar 'Yahvé' visiblemente en el título divino. 'Juicios severos' es aceptable para הָרָעִים según la revisión inglesa. 'Bestias feroces' funciona bien para חַיָּה רָעָה. La principal desviación terminológica es רָעָב, mejor como 'hambruna' que 'hambre' en una lista formal de juicios covenantales.
  issues:
  - severity: medium
    issue: '''hambre'' para רָעָב'
    rationale: Aunque no es incorrecto, en esta lista de juicios proféticos רָעָב se refiere a una calamidad de hambre generalizada; 'hambruna' preserva mejor la especificidad de 'famine' y del hebreo.
  - severity: medium
    issue: '''para exterminar'' para לְהַכְרִית'
    rationale: El hebreo y el POB inglés conservan el giro de 'cut off'. 'Exterminar' añade una carga más absoluta y moderna; 'para eliminar' o 'para extirpar/cortar de' es más fiel y natural.
  - severity: low
    issue: '''Porque así ha dicho'''
    rationale: No es inexacto, pero en español bíblico moderno 'Porque así dice el Señor Yahvé' suena más natural y mantiene el presente profético del discurso.
  - severity: low
    issue: '''a hombre y bestia'''
    rationale: La fórmula literal es reconocible, pero con la preposición 'a' queda algo dura en español actual. 'a seres humanos y animales' mejora la fluidez sin perder el sentido; si se quisiera máxima tradicionalidad, también valdría 'a hombre y bestia' sin mayor problema.
  revised_spanish_text: 'Porque así dice el Señor Yahvé: ¿Cuánto más cuando yo envíe mis cuatro juicios severos[a] contra Jerusalén—espada, hambruna, bestias feroces y peste[b]—para eliminar de ella a seres humanos y animales?'
  revised_footnotes:
  - marker: a
    text: O ‘mis cuatro juicios malos’. El adjetivo hebreo puede significar ‘malo’, ‘dañino’ o ‘funesto’ en este contexto.
    reason: lexical_alternative
  - marker: b
    text: O ‘pestilencia’ para ‘peste’.
    reason: lexical_alternative
  revision_rationale: 'Se ajustó el texto para acercarlo mejor al hebreo y al POB auditado: ''dice'' refleja mejor la declaración profética; ''hambruna'' especifica el juicio de רָעָב; ''eliminar'' evita la sobretraducción de ''exterminar'' y se acerca mejor a לְהַכְרִית; y ''seres humanos y animales'' mejora la naturalidad del español sin perder el paralelismo humano-animal del original. Se mantuvieron ''Señor Yahvé'', ''juicios severos'', ''bestias feroces'' y las notas léxicas existentes por estar bien fundamentadas.'
