translation:
  language: es
  text: Toda sabiduría es temor del Señor[a], y en toda sabiduría está la práctica de la ley[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «reverencia del Señor». El griego tradicionalmente vertido «temor del Señor» incluye asombro reverente, pero el texto principal mantiene la expresión más fuerte del original.
    reason: lexical_alternative
  - marker: b
    text: O «observancia de la ley». El griego puede expresarse de forma más formal con «hacer» u «observancia» en lugar de «práctica».
    reason: alternative_reading
lexical_decisions:
- source_word: Πᾶσα
  english_pob_choice: All
  chosen_spanish: Toda
  alternatives_spanish:
  - Toda la
  - Cada
  lexicon: LSJ
  rationale: El griego expresa amplitud total. «Toda» conserva el alcance general de Πᾶσα y suena natural en español sin perder la fuerza distributiva.
- source_word: σοφία
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  - entendimiento
  lexicon: LSJ
  rationale: En Sirácida, σοφία tiene sentido moral y religioso, no solo habilidad técnica. «Sabiduría» es la equivalencia más fiel y estable en español.
- source_word: φόβος Κυρίου
  english_pob_choice: fear of the Lord
  chosen_spanish: temor del Señor
  alternatives_spanish:
  - reverencia del Señor
  - respeto del Señor
  lexicon: LSJ
  rationale: La expresión sapiencial debe conservar la tensión entre temor, asombro y reverencia. «Temor del Señor» mantiene el peso lexical y teológico del giro sin suavizarlo excesivamente.
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  lexicon: 'DOCTRINE.md contested terms: κύριος → Lord'
  rationale: El texto griego dice Κυρίου, y el audito inglés mantiene «the Lord». En esta cláusula sapiencial, «el Señor» refleja fielmente la forma griega y el uso tradicional del título sin forzar una reconstrucción del nombre divino.
- source_word: ἐν πάσῃ σοφίᾳ
  english_pob_choice: in all wisdom
  chosen_spanish: en toda sabiduría
  alternatives_spanish:
  - con toda sabiduría
  - en cada clase de sabiduría
  lexicon: LSJ
  rationale: La preposición ἐν se conserva de manera bastante directa. «En toda sabiduría» reproduce la estructura del griego y deja abierta la relación con la segunda cola.
- source_word: ποίησις
  english_pob_choice: there is the practice
  chosen_spanish: está la práctica
  alternatives_spanish:
  - está el hacer
  - está la observancia
  - está el cumplimiento
  lexicon: LSJ
  rationale: ποίησις denota hacer/realizar. Dado que rige νόμου en un contexto moral-legal, «la práctica» comunica observancia activa en un español claro y cercano al valor verbal del sustantivo.
- source_word: νόμου
  english_pob_choice: of the law
  chosen_spanish: de la ley
  alternatives_spanish:
  - de la instrucción
  - de la Torá
  lexicon: LSJ
  rationale: En literatura sapiencial judía, νόμος suele referirse a la ley/Torá. «Ley» es la opción más natural y fiel en español; «instrucción» diluye demasiado la referencia legal.
theological_decisions:
- issue: φόβος Κυρίου y la tensión reverencial
  english_pob_reading: fear of the Lord
  chosen_spanish_reading: temor del Señor
  alternative_spanish_readings:
  - reverencia del Señor
  - temor reverente del Señor
  rationale: 'Se preserva la tensión doctrinal: no se reduce φόβος a mera cortesía religiosa. «Temor del Señor» mantiene el rango de miedo, asombro y reverencia presente en la frase sapiencial.'
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
- issue: Relación de σοφία con νόμου en la cola final
  english_pob_reading: and in all wisdom there is the practice of the law
  chosen_spanish_reading: y en toda sabiduría está la práctica de la ley
  alternative_spanish_readings:
  - y en toda sabiduría está la observancia de la ley
  - y en toda sabiduría está el cumplimiento de la ley
  rationale: La segunda cola no se paraphrasea como un mero principio moral general; conserva su vínculo explícito con νόμου. «Práctica de la ley» expresa una observancia activa sin borrar la posibilidad de matiz jurídico y sapiencial.
  doctrine_reference: 'DOCTRINE.md contested terms: νόμος → law/torah'
translation_notes:
  revision_awareness: 'El borrador sigue el consenso alto del audit trail inglés (0.95, sin cambios recientes) y mantiene las dos tensiones documentadas: φόβος Κυρίου como «temor del Señor» y ποίησις νόμου como «práctica de la ley», con alternativas anotadas donde el español permite matiz.'
  spanish_consistency_notes:
  - Se usa «Señor» para Κυρίου en concordancia con el audit trail griego-inglés y sin introducir «Yahvé», ya que el verso cita Κυρίου y no el Tetragrámaton hebreo explícito.
  - «Ley» se conserva de manera consistente para νόμου por tratarse de un contexto sapiencial judío; no se reemplaza por «instrucción» en el texto principal.
  - 'La estructura paralela se mantiene en español: una primera cláusula nominal y una segunda cláusula copulativa, para reflejar la concisión del griego.'
