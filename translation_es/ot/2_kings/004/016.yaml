revisions:
- from: 'Entonces él dijo[a]: «Para este tiempo señalado, el año próximo, estarás abrazando a un hijo». Pero ella dijo: «No, mi señor, hombre de Dios; no engañes a tu sierva».'
  to: 'Entonces él dijo[a]: «En este tiempo señalado, el año próximo, tendrás en tus brazos a un hijo». Pero ella dijo: «No, mi señor, hombre de Dios; no engañes a tu sierva».'
  rationale: Se ajusta la primera cláusula para que suene natural en español sin perder el sentido de tiempo fijado y del mismo momento del año siguiente. Se cambia «estarás abrazando» por «tendrás en tus brazos», que representa fielmente חֹבֶקֶת y es más idiomático. Se mejora la nota para reflejar con más precisión la alternativa literal preservada en el audit trail inglés.
