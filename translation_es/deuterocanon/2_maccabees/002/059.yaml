translation:
  language: es
  text: Por tanto, a partir de aquí comencemos el relato[a], añadiendo solo esto a lo ya dicho; porque es insensato excederse antes de la historia[b], pero abreviar la historia misma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la narración» para διήγησις; el griego puede designar un relato narrado o una exposición ordenada.
    reason: lexical_alternative
  - marker: b
    text: O «decir demasiado antes de la historia, pero acortar la historia misma».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐντεῦθεν
  english_pob_choice: from this point
  chosen_spanish: desde este punto
  alternatives_spanish:
  - desde aquí
  - por tanto, desde aquí
  lexicon: LSJ
  rationale: La expresión marca transición discursiva al relato principal; «desde este punto» conserva el valor de arranque narrativo con español natural.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Así pues
  lexicon: BDAG
  rationale: El conector introduce una inferencia desde el prólogo hacia el relato. «Por tanto» mantiene claramente esa relación.
- source_word: ἀρξώμεθα
  english_pob_choice: let us begin
  chosen_spanish: comencemos
  alternatives_spanish:
  - comencemos nosotros
  - empecemos
  lexicon: BDAG
  rationale: Es un subjuntivo exhortativo de primera persona plural; «comencemos» refleja bien la invitación a iniciar el relato.
- source_word: τῆς διηγήσεως
  english_pob_choice: the narrative
  chosen_spanish: el relato
  alternatives_spanish:
  - la narración
  - el relato narrado
  lexicon: LSJ
  rationale: διήγησις puede referirse al relato contado. «Relato» es natural en español y conserva el sentido de exposición narrativa.
- source_word: τοῖς προειρημένοις
  english_pob_choice: what has been said before
  chosen_spanish: a lo ya dicho
  alternatives_spanish:
  - a lo anteriormente dicho
  - a las cosas antes mencionadas
  lexicon: LSJ
  rationale: La frase retoma lo previo del prólogo; «a lo ya dicho» es conciso y fiel al carácter retrospectivo.
- source_word: τοσοῦτον ἐπιζεύξαντες
  english_pob_choice: adding only this much
  chosen_spanish: uniendo ... solo esto
  alternatives_spanish:
  - añadiendo solo esto
  - agregando solo esto
  lexicon: LSJ
  rationale: El participio expresa adjuntar una breve adición a lo precedente. «Uniendo ... solo esto» conserva la imagen de enlace sin exagerar.
- source_word: εὔηθες
  english_pob_choice: foolish
  chosen_spanish: insensato
  alternatives_spanish:
  - necio
  - tonto
  lexicon: LSJ
  rationale: En este contexto retórico-literario, la evaluación es fuerte pero sobria; «insensato» comunica bien la censura sin coloquialismo.
- source_word: πλεονάζειν
  english_pob_choice: to be excessive before the history
  chosen_spanish: ser prolijo antes de la historia
  alternatives_spanish:
  - excederse antes de la historia
  - ser excesivo antes del relato
  lexicon: LSJ
  rationale: El verbo apunta a excederse en lo previo al relato. «Ser prolijo» expresa la idea de exceso verbal de manera idiomática en español.
- source_word: ἐπιτέμνειν
  english_pob_choice: to abridge the history itself
  chosen_spanish: abreviar la historia misma
  alternatives_spanish:
  - cortar la historia misma
  - recortar la historia misma
  lexicon: LSJ
  rationale: ἐπιτέμνειν significa cortar o abreviar; «abreviar» mantiene el contraste con la prolijidad anterior y funciona bien en español culto.
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés, conservando el giro discursivo introductorio y la antítesis retórica entre ser prolijo/excesivo antes del relato y abreviarlo después. No hubo cambios textuales posteriores en el pasaje auditado.
  spanish_consistency_notes:
  - Se mantuvo un registro formal y readable en español, evitando calcos como «desde aquí» donde «desde este punto» suena más idiomático y preserva el valor transicional.
  - Se eligió «relato» para διήγησις en el texto principal, con nota alternativa por la posible equivalencia «el relato»/«la narración» según el matiz discursivo.
  - «Historia» se conservó para ἱστορία siguiendo el español del audit trail, con «abreviar» para ἐπιτέμνειν y «ser prolijo» para πλεονάζειν como equivalentes naturales del contraste retórico.
