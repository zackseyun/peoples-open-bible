translation:
  language: es
  text: un hombre judío que vivía en Susa la ciudad[a], un hombre importante[b], sirviendo en la corte del rey[c];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la ciudad de Susa». El griego dice literalmente «en Susa la ciudad», y esa forma puede funcionar como simple identificación urbana.
    reason: lexical_alternative
  - marker: b
    text: O «un gran hombre» o «un hombre prominente». El griego «grande» probablemente se refiere a estatus o importancia en el entorno real.
    reason: lexical_alternative
  - marker: c
    text: O «atendiendo en la corte del rey». El participio puede expresar servicio o asistencia en la corte.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνθρωπος
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  lexicon: BDAG
  rationale: El griego es masculino y se refiere a un individuo concreto; «hombre» conserva la referencia personal y el valor narrativo sin generalizar a «persona».
- source_word: Ἰουδαῖος
  english_pob_choice: Jewish
  chosen_spanish: judío
  alternatives_spanish:
  - judeano
  - un judío
  lexicon: BDAG
  rationale: Como adjetivo atributivo de ἄνθρωπος, expresa identidad étnico-religiosa. «Judío» es la correspondencia natural en español y mantiene el sentido amplio que la POB inglesa también privilegia.
- source_word: οἰκῶν
  english_pob_choice: living
  chosen_spanish: que vivía
  alternatives_spanish:
  - que habitaba
  - residiendo
  lexicon: BDAG
  rationale: El participio indica residencia; «que vivía» es idiomático en español moderno y sigue de cerca la idea de asentamiento sin elevar el registro excesivamente.
- source_word: ἐν Σούσοις τῇ πόλει
  english_pob_choice: in Susa the city
  chosen_spanish: en Susa la ciudad
  alternatives_spanish:
  - en la ciudad de Susa
  - en Susa
  lexicon: BDAG
  rationale: Se conserva la aposición explícita del griego («Susa la ciudad») en vez de reducirla a una forma más fluida, porque el POB inglés también retiene esa plenitud estructural.
- source_word: μέγας
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - importante
  - prominente
  lexicon: BDAG
  rationale: «Grande» reproduce con más cercanía la palabra base del griego y deja abierta la posible fuerza de estatus o prominencia, sin interpretarla de antemano.
- source_word: θεραπεύων
  english_pob_choice: serving
  chosen_spanish: sirviendo
  alternatives_spanish:
  - atendiendo
  - prestando servicio
  lexicon: BDAG
  rationale: En contexto cortesano, el participio puede denotar servicio o asistencia. «Sirviendo» es natural y suficientemente amplio para no imponer un matiz religioso que el contexto no exige.
- source_word: αὐλή
  english_pob_choice: court
  chosen_spanish: corte
  alternatives_spanish:
  - corte real
  - palacio
  lexicon: BDAG
  rationale: «Corte» reproduce el ámbito institucional del rey; «palacio» desplazaría el foco hacia el edificio, no hacia la esfera de servicio.
- source_word: βασιλεύς
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - monarca
  lexicon: BDAG
  rationale: Título estándar y directo en español, sin ambigüedad especial.
