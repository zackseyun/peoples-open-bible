  yaml_path: translation/deuterocanon/2_maccabees/005/018.yaml
  text: But if we had not become involved in many sins[a], then, just as Heliodorus, who was sent by King Seleucus to inspect the treasury, was immediately scourged and turned back from his boldness when he came forward, so also would we have been struck down.
  footnotes:
