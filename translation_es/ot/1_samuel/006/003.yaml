translation:
  language: es
  text: 'Y dijeron[a]: «Si van a devolver el arca del Dios de Israel, no la devuelvan vacía, porque ciertamente deben devolverle una ofrenda por la culpa[b]; entonces serán sanados, y se les hará saber por qué su mano no se ha apartado de ustedes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «enviar de regreso»; también «dejar ir».
    reason: lexical_alternative
  - marker: b
    text: O «una ofrenda de reparación»; tradicionalmente, «una ofrenda por la culpa» o «una ofrenda por la transgresión».
    reason: lexical_alternative
lexical_decisions:
- source_word: מְשַׁלְּחִים / תְּשַׁלְּחוּ
  english_pob_choice: are sending away / do not send ... away
  chosen_spanish: están enviando / no la envíen
  alternatives_spanish:
  - envían / no envíen
  - despiden / no despidan
  - dejan ir / no la dejen ir
  lexicon: HALOT
  rationale: El verbo שׁלח aquí expresa despachar/devolver el arca desde custodia filistea. «Están enviando» y «no la envíen» conservan la repetición y el matiz de remisión, evitando una paráfrasis más libre.
- source_word: אֲרוֹן אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the ark of the God of Israel
  chosen_spanish: el arca del Dios de Israel
  alternatives_spanish:
  - el arca del Dios de Israel
  - el arca del Dios de Israel
  lexicon: HALOT
  rationale: Se mantiene la designación formal y directa del hebreo. «Dios de Israel» preserva la relación genitiva sin introducir la fórmula más eclesiástica «del pacto», que no está en el texto.
- source_word: רֵיקָם
  english_pob_choice: empty
  chosen_spanish: vacía
  alternatives_spanish:
  - vacía
  - sin nada
  - con las manos vacías
  lexicon: HALOT
  rationale: Como el sustantivo implícito es el arca, «vacía» reproduce mejor la imagen que «con las manos vacías», expresión más propia de personas que de un objeto.
- source_word: הָשֵׁב תָּשִׁיבוּ
  english_pob_choice: you must surely return
  chosen_spanish: ciertamente deben devolver
  alternatives_spanish:
  - deben devolver sin falta
  - deben devolver ciertamente
  - tienen que devolver
  lexicon: HALOT
  rationale: El infinitivo absoluto más verbo finito intensifica la obligación. «Ciertamente deben devolver» comunica esa fuerza sin perder naturalidad en español.
- source_word: לּוֹ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - para él
  - al arca
  lexicon: HALOT
  rationale: El sufijo masculino singular apunta de manera natural al Dios de Israel, no al arca. En español, el dativo «le» mantiene esa referencia personal sin sobrecargar la frase.
- source_word: אָשָׁם
  english_pob_choice: a guilt offering
  chosen_spanish: una ofrenda por la culpa
  alternatives_spanish:
  - una ofrenda por la culpa
  - una ofrenda de reparación
  - una ofrenda por la transgresión
  lexicon: HALOT
  rationale: «Ofrenda por la culpa» conserva el vínculo con la terminología sacrificial y deja visible la tensión entre culpa y reparación. «Ofrenda de reparación» es viable, pero menos transparente respecto del término hebreo.
- source_word: תֵּרָפְאוּ
  english_pob_choice: you will be healed
  chosen_spanish: serán sanados
  alternatives_spanish:
  - serán curados
  - recobrarán la salud
  lexicon: HALOT
  rationale: El nifal de רפא expresa resultado pasivo. «Serán sanados» conserva esa pasividad y funciona bien en registro bíblico actual.
- source_word: וְנוֹדַע לָכֶם
  english_pob_choice: it will be made known to you
  chosen_spanish: se les hará saber
  alternatives_spanish:
  - les será hecho saber
  - ustedes sabrán
  - les será revelado
  lexicon: HALOT
  rationale: El nifal/impersonal se refleja mejor con una construcción pasiva en español. «Se les hará saber» preserva el carácter impersonal mejor que «ustedes sabrán».
- source_word: לָמָּה לֹא תָסוּר יָדוֹ מִכֶּם
  english_pob_choice: why his hand has not turned away from you
  chosen_spanish: por qué su mano no se ha apartado de ustedes
  alternatives_spanish:
  - por qué su mano no se ha alejado de ustedes
  - por qué su mano no se ha retirado de ustedes
  - por qué su mano no se ha quitado de ustedes
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de «su mano» como idiomática del poder divino en juicio. «Se ha apartado» refleja bien תסור y mantiene la tensión teológica sin explicitarla de más.
theological_decisions:
- issue: Referente del dativo en לּוֹ
  english_pob_reading: The offering is returned 'to him,' that is, to the God of Israel.
  chosen_spanish_reading: «Le» se refiere al Dios de Israel, no al arca como objeto.
  alternative_spanish_readings:
  - «al arca» como destinatario implícito
  - «a él» explícito
  rationale: El contexto inmediato habla del arca del Dios de Israel y de una ofrenda sacrificial. El dativo personal es mejor conservado como referencia al Dios vivo, evitando reducir la acción a un simple acompañamiento del arca.
  doctrine_reference: 1 Samuel 6:3; cf. la lógica sacrificial de אָשָׁם en la Torá
- issue: Sentido de «su mano»
  english_pob_reading: A metaphor for God's afflicting power/judgment is preserved literally as 'his hand'.
  chosen_spanish_reading: Se mantiene literalmente «su mano» como metáfora del poder aflictivo de Dios.
  alternative_spanish_readings:
  - «su castigo»
  - «su plaga»
  - «su juicio»
  rationale: La metáfora es teológicamente significativa en el texto hebreo y coincide con la lectura auditada en inglés. Traducirla interpretativamente reduciría la fuerza idiomática y la referencia al actuar divino.
  doctrine_reference: Uso bíblico del motivo de la mano de Yahvé en juicio y aflicción
- issue: Naturaleza de אָשָׁם
  english_pob_reading: a guilt offering / or a reparation offering / traditional trespass offering
  chosen_spanish_reading: una ofrenda por la culpa
  alternative_spanish_readings:
  - una ofrenda de reparación
  - una ofrenda por la transgresión
  - una ofrenda por el pecado
  rationale: El español necesita una opción que conserve tanto la culpa como el aspecto reparador. «Por la culpa» es suficientemente transparente y no borra la dimensión sacrificial del término.
  doctrine_reference: Levítico 5–7; uso de אָשָׁם como ofrenda expiatoria/reparadora
translation_notes:
  revision_awareness: 'Esta versión sigue de cerca el texto hebreo y la auditoría inglesa: conserva el paralelismo verbal de שׁלח, la designación formal del arca, la obligación intensificada de הָשֵׁב תָּשִׁיבוּ, el dativo personal de לּוֹ, el término sacrificial אָשָׁם, y la metáfora de «su mano» sin interpretarla. No se detectaron revisiones pendientes en el registro base.'
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים y no «Señor» como máscara.
  - Se mantiene «arca» sin añadir «del pacto», porque el hebreo no lo dice aquí.
  - Se preserva la metáfora de «su mano» por consistencia con la auditoría inglesa.
  - «Sanados» conserva el sentido pasivo/resultativo de תֵּרָפְאוּ.
  - El pronombre dativo se entiende como referido al Dios de Israel, no al arca.
