translation:
  language: es
  text: muy justamente, el que había torturado las entrañas[b] de otros con muchas y foráneas[a] aflicciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con muchas y extrañas aflicciones». ξενίζουσαις puede significar «extrañas», «foráneas» o «ajenas»; aquí se usa «foráneas» para conservar mejor la idea de ajenidad o extrañeza del griego.
    reason: lexical_alternative
  - marker: b
    text: O «las vísceras» o «los órganos internos» para «las entrañas». El griego es corporal y concreto, no meramente emocional.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάνυ δικαίως
  english_pob_choice: very justly
  chosen_spanish: muy justamente
  alternatives_spanish:
  - con plena justicia
  - muy rectamente
  - del todo justamente
  lexicon: LSJ
  rationale: πάνυ intensifica δικαίως; «muy justamente» conserva la evaluación moral enfática sin sonar forzado en español.
- source_word: σπλάγχνα
  english_pob_choice: the inward parts
  chosen_spanish: las entrañas
  alternatives_spanish:
  - los órganos internos
  - el interior
  - las vísceras
  lexicon: LSJ
  rationale: El griego es corporal y concreto; «entrañas» mantiene esa corporeidad y es natural en español bíblico sin espiritualizar el término.
- source_word: βασανίσαντα
  english_pob_choice: had tortured
  chosen_spanish: había torturado
  alternatives_spanish:
  - había atormentado
  - había puesto en tortura
  lexicon: LSJ
  rationale: El participio expresa tormento severo o tortura; «había torturado» reproduce bien la dureza y la referencia retrospectiva.
- source_word: πολλαῖς καὶ ξενίζουσαις συμφοραῖς
  english_pob_choice: with many and foreign afflictions
  chosen_spanish: con muchas y extrañas aflicciones
  alternatives_spanish:
  - con muchas y foráneas aflicciones
  - con muchos y extraños sufrimientos
  - con muchas y extraordinarias miserias
  lexicon: LSJ
  rationale: συμφοραί comunica calamidades o aflicciones; ξενίζουσαις puede significar extrañas, ajenas o foráneas. «Extrañas» conserva la rareza y la viveza del giro griego; la nota explica la alternativa «foráneas».
- source_word: τὸν ... βασανίσαντα
  english_pob_choice: he who had tortured
  chosen_spanish: al que había torturado
  alternatives_spanish:
  - al que torturó
  - al que había atormentado
  lexicon: LSJ
  rationale: El participio articular funciona sustantivamente; «al que había torturado» mantiene la relación participial y suena natural en español.
theological_decisions:
- issue: Juicio moral sobre el sufrimiento de Antíoco
  english_pob_reading: 'The verse states that his punishment was deserved: ''very justly.'''
  chosen_spanish_reading: 'El versículo afirma que su castigo fue merecido: «muy justamente».'
  alternative_spanish_readings:
  - «con toda justicia»
  - «con razón»
  rationale: El griego expresa un juicio moral explícito; la traducción debe preservarlo sin atenuarlo ni explicarlo más allá del texto.
  doctrine_reference: Preservar la tensión teológica y moral del texto original; primacía del idioma fuente sobre la tradición de traducción.
translation_notes:
  revision_awareness: La traducción sigue la última revisión del audit trail, que afinó ξενίζουσαις hacia una opción más cercana a «foreign» sin perder el registro formal. En español se optó por «extrañas» en el texto principal y se dejó «foráneas» como alternativa, porque ambas conservan la tensión entre rareza y alteridad.
  spanish_consistency_notes:
  - Se mantiene «muy justamente» para reflejar πάνυ δικαίως con la misma intensidad adverbial del inglés auditado.
  - «Entrañas» se usa como equivalente concreto de σπλάγχνα, coherente con el criterio POB de no espiritualizar el cuerpo.
  - Se evita «Señor» o cualquier sustitución litúrgica no pertinente; este versículo no contiene el Tetragrámaton ni lenguaje divino directo.
  - Se conserva una estructura participial española natural, sin suavizar el juicio moral del pasaje.
