base_translation:
  language: en
  yaml_path: translation/ot/genesis/040/005.yaml
  text: And the two of them dreamed a dream[a], each man his own dream, in one night, each according to the interpretation of his dream—the cupbearer and the baker who belonged to the king of Egypt[d][c][b], who were confined in the prison house.
  footnotes:
  - marker: a
    text: Or 'both of them had a dream ... on the same night.' The Hebrew uses a cognate expression, literally 'dreamed a dream,' and a temporal phrase literally 'in one night.'
    reason: lexical_alternative
  - marker: b
    text: Or 'each dream with its own interpretation.' The Hebrew emphasizes that each man's dream had a distinct interpretation corresponding to it.
    reason: lexical_alternative
  - marker: c
    text: Or 'who served the king of Egypt.' The phrase can denote official attachment to Pharaoh's service.
    reason: lexical_alternative
  - marker: d
    text: Or 'who were confined in the prison house'.
    reason: previous_rendering
