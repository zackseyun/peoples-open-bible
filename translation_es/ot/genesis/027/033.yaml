translation:
  language: es
  text: 'Entonces Isaac se estremeció con un estremecimiento muy grande, en gran manera, y dijo: «¿Quién, pues, fue el que cazó algo de caza, me lo trajo, y yo comí de todo ello antes de que tú vinieras, y lo bendije? Sí, y bendito será[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Sí, y será bendito».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּחֱרַד
  english_pob_choice: trembled
  chosen_spanish: se estremeció
  alternatives_spanish:
  - tembló
  - se sobresaltó
  lexicon: HALOT
  rationale: חָרַד expresa un sobresalto físico-emocional fuerte; en español, «se estremeció» comunica bien la reacción corporal intensa sin forzar a «temió» o «estuvo aterrorizado».
- source_word: חֲרָדָה גְּדֹלָה עַד מְאֹד
  english_pob_choice: with a very great trembling
  chosen_spanish: con un estremecimiento muy grande, hasta sobremanera
  alternatives_spanish:
  - con un temblor muy grande
  - con un estremecimiento sumamente grande
  lexicon: HALOT
  rationale: La construcción hebrea intensifica por acumulación. Mantener «extremecimiento muy grande» preserva el sustantivo cognado; «hasta sobremanera» refuerza el exceso del original sin borrar la repetición enfática.
- source_word: מִי אֵפוֹא הוּא
  english_pob_choice: Who then was it
  chosen_spanish: ¿Quién, pues, fue el que…?
  alternatives_spanish:
  - ¿Quién entonces era el que…?
  - ¿Quién, pues, era el que…?
  lexicon: HALOT
  rationale: אֵפוֹא aporta valor inferencial/emfático («pues/entonces»). En español, la pregunta con «¿Quién, pues, fue el que…?» reproduce ese matiz y encaja con la secuencia narrativa en pasado.
- source_word: הַצָּד צַיִד
  english_pob_choice: who hunted game
  chosen_spanish: el que cazó presa
  alternatives_spanish:
  - el que cazó caza
  - el que cazó animales
  lexicon: HALOT
  rationale: El hebreo combina verbo y sustantivo emparentados. «Cazó presa» conserva la idea de cazar algo obtenido por la caza, evitando «venado» o «venison», que estrecharían innecesariamente el término.
- source_word: וַיָּבֵא לִי
  english_pob_choice: and brought it to me
  chosen_spanish: me la trajo
  alternatives_spanish:
  - y me la llevó
  - y la trajo a mí
  lexicon: HALOT
  rationale: El objeto directo está implícito por el contexto; en español, el clítico femenino singular funciona porque «presa» es femenino y el referente inmediato queda claro. Se evita añadir un objeto más largo que rompa la fluidez.
- source_word: וָאֹכַל מִכֹּל
  english_pob_choice: and I ate from all of it
  chosen_spanish: y yo comí de todo
  alternatives_spanish:
  - y comí de todo ello
  - y yo comí de todo de ello
  lexicon: HALOT
  rationale: La partícula partitiva מִכֹּל se expresa naturalmente como «de todo»; el clítico «yo» mantiene el énfasis explícito del hebreo sin cargar el estilo.
- source_word: בְּטֶרֶם תָּבוֹא
  english_pob_choice: before you came
  chosen_spanish: antes de que tú vinieras
  alternatives_spanish:
  - antes de que vinieras
  - antes de tu llegada
  lexicon: HALOT
  rationale: La temporalidad es clara y pasada; «antes de que tú vinieras» conserva el valor de anterioridad con un registro sobrio y bíblicamente readable.
- source_word: וָאֲבָרֲכֵהוּ
  english_pob_choice: and I blessed him
  chosen_spanish: y yo lo bendije
  alternatives_spanish:
  - y lo bendije
  - y yo lo bendije a él
  lexicon: HALOT
  rationale: El hebreo explicita la primera persona; en español, el clítico «lo» y el pronombre «yo» reflejan bien ese énfasis. «Bendije» se conserva por la acción ya realizada en la narrativa.
- source_word: גַּם בָּרוּךְ יִהְיֶה
  english_pob_choice: Yes, and he will be blessed
  chosen_spanish: Sí, y bendito será
  alternatives_spanish:
  - Sí, y será bendito
  - Ciertamente, bendito será
  lexicon: HALOT
  rationale: «Bendito será» mantiene la pasiva/resultativa del hebreo y su cierre solemne. «Sí» recoge el גַּם enfático; se evita resolverlo en una mera resignación.
theological_decisions:
- issue: Fuerza de la declaración final de Isaac después de haber pronunciado la bendición
  english_pob_reading: A firm affirmation that the blessing already pronounced on Jacob stands and will remain effective
  chosen_spanish_reading: Una afirmación firme de que la bendición ya pronunciada permanece y seguirá eficaz
  alternative_spanish_readings:
  - Una simple constatación resignada sin énfasis
  - Una corrección de Isaac cancelando la bendición
  rationale: El hebreo final no suena a mera resignación ni a revocación; la afirmación confirma la validez de lo ya dicho. La traducción conserva esa tensión narrativa-teológica sin añadir explicaciones doctrinales ajenas al texto.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla
translation_notes:
  revision_awareness: 'Esta versión sigue la revisión más reciente del audit trail: conserva la secuencia coordinada del hebreo (sin convertirla en una subordinada de resultado), hace explícita la primera persona en «yo lo bendije», y mantiene la fuerza afirmativa final de גַּם בָּרוּךְ יִהְיֶה sin suavizarla en una mera observación pasiva.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el hebreo apunta al nombre divino; aquí no aparece, así que no se introduce.
  - Se eligió un tono narrativo sobrio y bíblicamente readable, evitando arcaísmos innecesarios.
  - «Bendito será» preserva la pasiva/resultativa del cierre hebreo; no se sustituyó por fórmulas eclesiásticas más tradicionales sin base textual.
  - Se mantuvo la repetición enfática («yo», «de todo», «bendito será») para reflejar la intensidad del hebreo.
