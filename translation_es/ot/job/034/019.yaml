review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido general del hebreo: imparcialidad hacia los príncipes, ausencia de favoritismo del rico sobre el pobre, y fundamento en que todos son hechura divina. Conserva bien la nota alternativa para נִכַּר ... לִפְנֵי. Sin embargo, ''hace acepción de personas entre los príncipes'' introduce ''entre'' sin apoyo claro en el original y suena menos natural que una construcción directa con ''a los príncipes''.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero 'hace acepción de personas entre los príncipes' resulta algo forzado en español contemporáneo y puede sugerir parcialidad dentro del grupo de príncipes, no hacia ellos. Una leve reparación mejora fidelidad y legibilidad. El resto del verso fluye bien; la nota al pie es útil y natural.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Príncipes', 'rico', 'pobre' y 'obra de sus manos' están bien alineados. La elección 'acepción de personas' es aceptable por registro bíblico, pero conviene ajustarla sintácticamente a 'con los príncipes' o sustituirla por 'muestra parcialidad a'.
  issues:
  - severity: medium
    issue: La frase 'entre los príncipes' no refleja bien la sintaxis ni el sentido del original.
    rationale: El hebreo נָשָׂא פְּנֵי שָׂרִים significa mostrar favor a los príncipes, no hacer distinciones dentro de ellos. 'Entre los príncipes' puede malinterpretarse como parcialidad interna al grupo.
  - severity: low
    issue: La expresión fija 'hacer acepción de personas' es comprensible, pero algo tradicional y rígida.
    rationale: No es incorrecta, pero con la preposición adecuada debe sonar natural. Mantenerla es válido por registro bíblico; el problema principal es sintáctico, no léxico.
  revised_spanish_text: que no hace acepción de personas con los príncipes, ni favorece al rico[a] sobre el pobre; porque todos ellos son obra de sus manos.
  revised_footnotes:
  - marker: a
    text: 'O: «no reconoce al rico antes que al pobre», es decir, no le da trato preferencial al rico.'
    reason: lexical_alternative
  revision_rationale: Se corrige únicamente la construcción 'entre los príncipes' por 'con los príncipes' para reflejar mejor el sentido de mostrar favoritismo hacia personas de alto rango y evitar una lectura equívoca. Se conserva el resto por su buena fidelidad al hebreo y al rastro de auditoría inglés.
