id: 2CO.11.2
reference: '2 Corinthians 11:2'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ζηλῶ γὰρ ὑμᾶς θεοῦ ζήλῳ, ἡρμοσάμην γὰρ ὑμᾶς ἑνὶ ἀνδρὶ παρθένον ἁγνὴν παραστῆσαι τῷ Χριστῷ·
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/011/002.yaml
  text: For I am jealous for you with God's jealousy[a], because I betrothed you to one husband[b], to present you as a pure virgin to Messiah.
translation:
  language: ko
  text: 나는 하나님의 질투로 여러분을 향해 질투합니다. 내가 여러분을 한 남편에게 정혼시켜, 정결한 처녀로 메시아께 드리려 함입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ζηλῶ ... ζήλῳ
  english_pob_choice: jealous ... jealousy
  chosen_korean: 질투합니다 ... 질투로
  lexicon: BDAG
  rationale: 동족 목적어. 여기서 ζῆλος는 단순한 「열심」이 아니라 언약적 「질투」(하나님이 자기 백성을 향해 갖는 거룩한 질투). 「질투」가 그 신학적 무게를 보존한다.
  alternatives_korean:
  - 열심으로 ... 열심
- source_word: ἡρμοσάμην
  english_pob_choice: betrothed
  chosen_korean: 정혼시켜
  lexicon: BDAG
  rationale: 동사 ἁρμόζω 중간태. 「정혼하다, 약혼시키다」. 「정혼」이 약혼 이상의 결속을 함의해 자연스럽다.
  alternatives_korean:
  - 약혼시켜
- source_word: παρθένον ἁγνήν
  english_pob_choice: pure virgin
  chosen_korean: 정결한 처녀
  lexicon: BDAG
  rationale: 「순결한 처녀」가 정형 표현. 「정결한」이 한국어에서 자연스럽다.
- source_word: τῷ Χριστῷ
  english_pob_choice: to Messiah
  chosen_korean: 메시아께
  lexicon: BDAG
  rationale: 칭호 보존.
  alternatives_korean:
  - 그리스도께
