    text: Or 'The terror of a king is like the roaring of a young lion.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the one provoking him'; the sense is provoking the king to anger.
    reason: lexical_alternative
  - marker: c
    text: Or 'sins against himself' or 'his own soul'; Hebrew nephesh can mean 'life,' 'self,' or 'soul' depending on context.
    reason: lexical_alternative
