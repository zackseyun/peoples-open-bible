translation:
  language: es
  text: En la mano de Dios está el gobierno del mundo[a], y a su debido tiempo establecerá sobre él al hombre adecuado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La tradición griega dice: «En la mano del Señor está el éxito de un hombre, y sobre el rostro del escriba pondrá su gloria». El griego difiere de manera sustancial del hebreo conservado en este versículo.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּיַד / ἐν χειρὶ
  english_pob_choice: In the hand of
  chosen_spanish: En la mano de
  alternatives_spanish:
  - Por la mano de
  - En poder de
  lexicon: HALOT; Greek χειρ́
  rationale: Conservo la metáfora de autoridad/control de la expresión idiomática. «En la mano de» es natural en español y mantiene la imagen sin diluirla en una paráfrasis.
- source_word: אֱלֹהִים / Κυρίου
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Señor
  lexicon: HALOT; Septuaginta κύριος
  rationale: El hebreo conservado lee אֱלֹהִים, por lo que «Dios» sigue el testimonio primario. El paralelo griego usa κύριος; aquí no se introduce «Yahvé» porque la base inmediata de esta sección es el hebreo con אֱלֹהִים.
- source_word: מֶמְשֶׁלֶת
  english_pob_choice: the rule
  chosen_spanish: el gobierno
  alternatives_spanish:
  - el dominio
  - la autoridad
  - el reinado
  lexicon: HALOT
  rationale: El sustantivo apunta al ejercicio de gobierno o soberanía. «Gobierno» comunica bien esa fuerza en español actual y conserva el sentido político-regio del término.
- source_word: תֵּבֵל
  english_pob_choice: the world
  chosen_spanish: del mundo
  alternatives_spanish:
  - de la tierra
  - del mundo habitado
  lexicon: HALOT
  rationale: «Mundo» es la equivalencia más idiomática para תֵּבֵל en este contexto, sin perder la idea de la esfera habitada.
- source_word: וְאִישׁ
  english_pob_choice: the right man
  chosen_spanish: al hombre adecuado
  alternatives_spanish:
  - al hombre justo
  - a un hombre
  - a la persona adecuada
  lexicon: HALOT
  rationale: El hebreo dice literalmente «y un hombre», pero el contexto habla de la colocación de una figura gobernante. «Al hombre adecuado» expresa la idoneidad contextual sin borrar el singular masculino que tiene el hebreo.
- source_word: לְעֵת
  english_pob_choice: in due time
  chosen_spanish: en su tiempo oportuno
  alternatives_spanish:
  - a su debido tiempo
  - en el momento oportuno
  - en debido tiempo
  lexicon: HALOT
  rationale: «לְעֵת» señala el momento apropiado. «En su tiempo oportuno» suena digno y natural en español, y conserva la idea de un tiempo fijado y acertado.
- source_word: יַעֲמוֹד עָלֶיהָ
  english_pob_choice: he will raise up over it
  chosen_spanish: pondrá sobre él
  alternatives_spanish:
  - levantará sobre él
  - lo establecerá sobre él
  - lo pondrá al frente de
  lexicon: HALOT
  rationale: La expresión hebrea idiomática comunica establecer o colocar a alguien en posición de autoridad. «Pondrá sobre él» reproduce esa instalación; en español fluye mejor completándolo con el sentido contextual de gobernar.
theological_decisions:
- issue: Texto hebreo frente al paralelo griego significativamente distinto
  english_pob_reading: Translate from the extant Hebrew as primary, while allowing the Greek parallel to inform the contextual sense of divinely appointed human leadership.
  chosen_spanish_reading: Traducir según el hebreo conservado como base principal, dejando constancia de la tradición griega como variante importante.
  alternative_spanish_readings:
  - En la mano del Señor está el éxito del hombre, y sobre el rostro del escriba pondrá su gloria.
  rationale: Sirácides presenta aquí una divergencia real entre el hebreo y el griego. Como el hebreo está conservado y con alta confianza, el texto principal sigue ese testimonio; la variante griega se preserva como alternativa relevante sin mezclar ambas formas en el cuerpo principal.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirach desde el hebreo donde se conserva; usar el griego paralelo como control y variante.'
- issue: Referencia divina y uso de «Dios»
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: El testimonio hebreo lee אֱלֹהִים, no el nombre propio. Por fidelidad textual y terminológica, «Dios» es la forma preferida aquí.
  doctrine_reference: 'Terminología POB: אֱלֹהִים -> Dios.'
translation_notes:
  revision_awareness: Se siguió la decisión de revisión de preferir una formulación formal y natural para לְעֵת («en su tiempo oportuno»), manteniendo el sentido de instalación de un gobernante sobre el mundo. La principal divergencia textual queda marcada con nota, conforme al audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֱלֹהִים, en consonancia con el hebreo conservado y con la terminología del proyecto.
  - Se usó «mundo» para תֵּבֵל por claridad idiomática y consistencia con la equivalencia inglesa auditada.
  - La imagen de autoridad en «en la mano de» se conservó de forma transparente, sin convertirla en una abstracción.
  - No se introdujo «Yahvé» porque el hebreo de base no contiene el nombre divino propio en este versículo.
  - Se preservó el matiz masculino singular de אִישׁ mediante «el hombre», con una especificación contextual («adecuado») para evitar ambigüedad.
