  glossary_alignment: No hay términos del glosario mayor en juego. La traducción respeta el criterio de seguir el hebreo como texto principal y consignar el griego como variante. La decisión léxica sobre נֶפֶשׁ debe reflejar 'vida(s)' y no 'alma(s)'.
