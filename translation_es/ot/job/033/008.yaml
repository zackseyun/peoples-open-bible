lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Sin duda
  - Verdaderamente
  - Solo
  lexicon: HALOT
  rationale: אַךְ aquí es una partícula enfática de confirmación, no restrictiva. «Ciertamente» comunica en español la fuerza asertiva introducida por Eliú al citar a Job.
- source_word: אָמַרְתָּ
  english_pob_choice: you have spoken
  chosen_spanish: has hablado
  alternatives_spanish:
  - has dicho
  - hablaste
  lexicon: HALOT
  rationale: El perfecto 2ms reporta una խոսa previa; en este contexto, «has hablado» mantiene el valor de habla efectiva y suena natural en español al introducir una cita recordada.
- source_word: בְאָזְנִי
  english_pob_choice: in my hearing
  chosen_spanish: en mi oído
  alternatives_spanish:
  - en mis oídos
  - a mis oídos
  - en mi audición
  lexicon: HALOT
  rationale: La expresión es literalmente «en mi oído(s)». Se conserva la imagen auditiva directa con un español natural; la nota explica el giro idiomático sin perder el matiz físico.
- source_word: וְקוֹל
  english_pob_choice: and ... the sound
  chosen_spanish: y he oído el sonido
  alternatives_spanish:
  - y la voz
  - y el ruido
  lexicon: HALOT
  rationale: קוֹל puede ser «voz» o «sonido». Aquí, con «palabras» después, «sonido» preserva la percepción auditiva sin forzar «voz de palabras» en español.
- source_word: מִלִּין
  english_pob_choice: your words
  chosen_spanish: tus palabras
  alternatives_spanish:
  - tus dichos
  - tus expresiones
  lexicon: HALOT
  rationale: La forma plural arameizante significa «palabras». El posesivo se explicita en español porque el contexto de la cita de Job deja claro que son las palabras de Job.
- source_word: אֶשְׁמָע
  english_pob_choice: I have heard
  chosen_spanish: he oído
  alternatives_spanish:
  - oigo
  - oí
  lexicon: HALOT
  rationale: Aunque la forma es imperfecta, aquí funciona como reporte de percepción vinculada al habla anterior. «He oído» reproduce bien la relación de anterioridad y suena idiomático en español.
translation_notes:
  revision_awareness: El texto inglés POB de referencia no requirió cambios en la revisión más reciente; el borrador español sigue de cerca la misma lectura auditiva e idiomática, conservando la imagen hebrea y su énfasis enfático.
  spanish_consistency_notes:
  - Se mantuvo «Ciertamente» para אַךְ como partícula enfática.
  - Se eligió «en mi oído» para reflejar el hebreo literal, con nota explicativa para la naturalidad española.
  - «Palabras» se emplea para מִלִּין, evitando términos más interpretativos.
  - No hay decisiones teológicas específicas en este versículo.
