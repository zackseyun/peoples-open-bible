base_translation:
  language: en
  yaml_path: translation/ot/daniel/008/014.yaml
  text: And he said to me[a], “Until 2,300 evenings and mornings[b]; then the sanctuary will be restored.”
  footnotes:
  - marker: a
    text: Or 'Until evening-morning, 2,300'; the phrase may refer either to 2,300 full days or to 2,300 evening-morning offerings (about 1,150 days).
    reason: alternative_reading
  - marker: b
    text: Or 'then the sanctuary will be cleansed,' 'vindicated,' or 'justified.' The Hebrew verb is literally 'be put right.'
