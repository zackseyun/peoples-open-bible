translation:
  language: es
  text: Entonces Yahvé saldrá y peleará contra esas naciones[a], como cuando pelea en un día de batalla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como en el día en que pelea, en un día de batalla». El hebreo puede traducirse de manera más formal con la repetición de «día», pero el texto principal expresa el sentido en un español más natural.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָצָא
  english_pob_choice: Then ... will go out
  chosen_spanish: Entonces ... saldrá
  alternatives_spanish:
  - Y ... saldrá
  - Entonces ... irá
  lexicon: HALOT
  rationale: La secuencia verbal profética se expresa naturalmente en futuro español. «Entonces» conserva la progresión narrativa/escatológica del contexto inmediato, como en la decisión inglesa de usar una partícula de avance temporal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre propio divino según la política del proyecto, en lugar de sustituirlo por un título. «Yahvé» es la transliteración estable en español para el tetragrámaton.
- source_word: וְנִלְחַם
  english_pob_choice: and fight
  chosen_spanish: y peleará
  alternatives_spanish:
  - y combatirá
  - y hará guerra
  lexicon: HALOT
  rationale: 'El valor es bélico: entrar en combate contra un enemigo. «Peleará» es natural en español y mantiene el sentido de enfrentamiento militar sin sobredeterminar el matiz técnico.'
- source_word: בַּגּוֹיִם הָהֵם
  english_pob_choice: against those nations
  chosen_spanish: contra esas naciones
  alternatives_spanish:
  - contra las naciones, esas
  - con esas naciones
  lexicon: HALOT
  rationale: Con לחם, la preposición marca al oponente en batalla; por eso «contra» reproduce el valor relacional correcto. «Naciones» conserva el contexto internacional profético, y «esas» recoge ההם.
- source_word: כְּיוֹם
  english_pob_choice: as when
  chosen_spanish: como cuando
  alternatives_spanish:
  - como en el día en que
  - igual que cuando
  lexicon: HALOT
  rationale: El comparativo introduce una comparación temporal idiomática. «Como cuando» transmite de manera natural la relación de similitud temporal sin perder la estructura del hebreo.
- source_word: הִלָּחֲמוֹ
  english_pob_choice: he fights
  chosen_spanish: pelea
  alternatives_spanish:
  - peleó
  - pelee
  lexicon: HALOT
  rationale: La construcción comparativa funciona idiomáticamente como «como cuando pelea/peleó». En español, el presente gnómico «pelea» comunica mejor el carácter típico de la acción divina, en línea con la opción inglesa de presente.
- source_word: בְּיוֹם קְרָב
  english_pob_choice: on a day of battle
  chosen_spanish: en un día de batalla
  alternatives_spanish:
  - en el día de batalla
  - en día de combate
  lexicon: HALOT
  rationale: «קרב» designa batalla o combate. «En un día de batalla» preserva el valor idiomático sin forzar un día histórico específico; además sigue de cerca la revisión inglesa que optó por una preposición natural en la frase.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La escena muestra la intervención personal de Dios en la guerra. Se conserva el nombre del pacto, no un sustituto, para mantener la transparencia del texto fuente y la coherencia doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El audit trail inglés pasó de «on a day of battle» a «in a day of battle» para reflejar de modo más natural la preposición hebrea, manteniendo el mismo sentido. La versión española sigue esa decisión con «en un día de batalla» y conserva la comparación temporal idiomática.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, no una sustitución por «SEÑOR».
  - Se mantiene «naciones» para גוים en el marco profético internacional.
  - Se evita «Cristo» o terminología cristológica ajena al versículo.
  - La expresión comparativa se vierte con una estructura natural en español sin perder la repetición conceptual de la batalla.
  - Se conserva el matiz bélico con «peleará» y «contra», evitando suavizar el conflicto.
