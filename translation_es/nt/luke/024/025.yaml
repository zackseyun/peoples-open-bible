base_translation:
  language: en
  yaml_path: translation/nt/luke/024/025.yaml
  text: And he said to them[a], “O foolish ones[c][b], and slow of heart to believe all that the prophets have spoken!”
  footnotes:
  - marker: a
    text: Or “senseless” or “without understanding.”
    reason: lexical_alternative
  - marker: b
    text: Literally “slow of heart,” an idiom for being sluggish in the inner person to trust and receive what God has said.
    reason: cultural_note
  - marker: c
    text: Or “spoke.”
    reason: lexical_alternative
