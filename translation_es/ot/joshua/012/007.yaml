translation:
  language: es
  text: Y estos son los reyes de la tierra que Josué y los hijos de Israel derrotaron al otro lado del Jordán, hacia el occidente[a], desde Baal-gad en el valle del Líbano hasta el monte Halac, que sube hacia Seír[b]; y Josué la entregó a las tribus de Israel como herencia, según sus divisiones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'al oeste del Jordán'. El hebreo marca la ubicación en el lado occidental con un matiz direccional.
    reason: lexical_alternative
  - marker: b
    text: O 'que sube a Seír'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: And these are
  chosen_spanish: Y estos son
  alternatives_spanish:
  - Ahora bien, estos son
  - Estos son
  lexicon: HALOT
  rationale: Conserva la conjunción inicial y la función introductoria de una lista; 'Y' mantiene la continuidad narrativa sin sonar rígido en español.
- source_word: מַלְכֵי הָאָרֶץ
  english_pob_choice: the kings of the land
  chosen_spanish: los reyes de la tierra
  alternatives_spanish:
  - los reyes del país
  - los reyes de la región
  lexicon: HALOT
  rationale: '''Tierra'' reproduce bien el campo territorial del hebreo y evita restringirlo a una entidad política moderna.'
- source_word: אֲשֶׁר הִכָּה
  english_pob_choice: whom ... struck down
  chosen_spanish: que ... derrotaron
  alternatives_spanish:
  - que ... derribaron
  - que ... hirieron
  lexicon: HALOT
  rationale: En contexto de conquista, 'derrotaron' comunica el resultado bélico de הִכָּה sin perder naturalidad en español; la fuerza de 'golpear' queda absorbida por el sentido de guerra.
- source_word: וּבְנֵי יִשְׂרָאֵל
  english_pob_choice: and the sons of Israel
  chosen_spanish: y los hijos de Israel
  alternatives_spanish:
  - y los israelitas
  - y la gente de Israel
  lexicon: HALOT
  rationale: Se conserva la formulación literal del hebreo ('hijos') porque el texto fuente la usa de manera habitual y no hay motivo textual para neutralizarla.
- source_word: בְּעֵבֶר הַיַּרְדֵּן יָמָּה
  english_pob_choice: beyond the Jordan westward
  chosen_spanish: al otro lado del Jordán, hacia el occidente
  alternatives_spanish:
  - más allá del Jordán, hacia el oeste
  - al otro lado del Jordán, al occidente
  lexicon: HALOT
  rationale: El hebreo marca dirección occidental desde la perspectiva narrativa; 'hacia el occidente' preserva el valor direccional y suena digno en español.
- source_word: מִבַּעַל גָּד
  english_pob_choice: from Baal-gad
  chosen_spanish: desde Baal-gad
  alternatives_spanish:
  - de Baal-gad
  - a partir de Baal-gad
  lexicon: HALOT
  rationale: '''Desde'' expresa correctamente el punto de partida del recorrido geográfico.'
- source_word: בְּבִקְעַת הַלְּבָנוֹן
  english_pob_choice: in the Valley of Lebanon
  chosen_spanish: en el valle del Líbano
  alternatives_spanish:
  - en la hondonada del Líbano
  - en el valle del Líbano
  lexicon: HALOT
  rationale: '''Valle'' es una equivalencia clara para בִּקְעָה y mantiene la referencia geográfica tradicional sin forzar un término más técnico.'
- source_word: וְעַד הָהָר הֶחָלָק
  english_pob_choice: as far as Mount Halak
  chosen_spanish: hasta el monte de Hálac
  alternatives_spanish:
  - hasta el monte Hálac
  - hasta el monte Halac
  lexicon: HALOT
  rationale: Se trata de un nombre propio asentado en el contexto; se translitera como topónimo y se le da acentuación española para lectura pública.
- source_word: הָעֹלֶה שֵׂעִירָה
  english_pob_choice: which rises toward Seir
  chosen_spanish: que sube hacia Seír
  alternatives_spanish:
  - que asciende hacia Seír
  - que va subiendo a Seír
  lexicon: HALOT
  rationale: '''Sube hacia'' conserva la imagen topográfica del participio y evita una paráfrasis más interpretativa. ''Seír'' mantiene el nombre propio con acento español.'
- source_word: וַיִּתְּנָהּ
  english_pob_choice: and Joshua gave it
  chosen_spanish: y Josué la dio
  alternatives_spanish:
  - y Josué se la dio
  - y Josué la entregó
  lexicon: HALOT
  rationale: El sufijo femenino singular remite a la tierra/territorio; 'la dio' mantiene el objeto implícito y el paralelismo con el hebreo sin añadir material no pedido.
- source_word: לְשִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: to the tribes of Israel
  chosen_spanish: a las tribus de Israel
  alternatives_spanish:
  - para las tribus de Israel
  lexicon: HALOT
  rationale: Es la fórmula habitual del reparto de la tierra y se expresa naturalmente con 'a' en español.
- source_word: יְרֻשָּׁה
  english_pob_choice: as an inheritance
  chosen_spanish: como herencia
  alternatives_spanish:
  - como posesión
  - como patrimonio
  lexicon: HALOT
  rationale: '''Herencia'' reproduce bien el sentido de posesión otorgada por pacto y la resonancia bíblica del término en Josué.'
- source_word: כְּמַחְלְקֹתָם
  english_pob_choice: according to their divisions
  chosen_spanish: según sus divisiones
  alternatives_spanish:
  - conforme a sus divisiones
  - según sus repartos
  lexicon: HALOT
  rationale: '''Divisiones'' conserva el sustantivo de distribución tribal y evita suavizarlo excesivamente como mera ''repartición''.'
theological_decisions:
- issue: Dirección geográfica del sintagma בְּעֵבֶר הַיַּרְדֵּן יָמָּה
  english_pob_reading: beyond the Jordan westward
  chosen_spanish_reading: al otro lado del Jordán, hacia el occidente
  alternative_spanish_readings:
  - más allá del Jordán, hacia el oeste
  - al oeste del Jordán
  rationale: No se trata de una generalidad devocional sino de un marcador espacial exacto dentro del marco narrativo. La redacción elegida conserva la relación de perspectiva sin convertirla en una localización técnica más moderna que el hebreo.
  doctrine_reference: Geografía bíblica y coherencia textual; no implica doctrina especial.
- issue: Expresión del sujeto colectivo וּבְנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se mantiene la masculinidad literal del hebreo donde el texto no exige neutralización. Esto preserva la forma fuente y evita introducir una equivalencia interpretativa adicional.
  doctrine_reference: Fidelidad lexical al hebreo; antropología bíblica del texto, no una afirmación doctrinal diferenciada.
translation_notes:
  revision_awareness: El audit trail inglés corrigió la dirección final de la frase espacial de 'to the west' a 'westward' por naturalidad; esta versión española sigue esa lectura direccional con una formulación igualmente natural. También conserva la decisión revisada de mantener la referencia geográfica como recorrido territorial completo y no como una localización abreviada.
  spanish_consistency_notes:
  - Se mantiene 'Josué' para יְהוֹשֻׁעַ y 'Yahvé' no aparece en este versículo, por lo que no se requiere decisión sobre el nombre divino.
  - Se prefirió 'hijos de Israel' por consistencia con el hebreo literal y con el estilo POB de preservar marcadores lexicográficos relevantes.
  - '''Monte de Hálac'' y ''Seír'' se transliteran como topónimos; la acentuación española facilita la lectura sin alterar el contenido.'
  - La nota a pie de página marca la opción direccional; la nota b recoge una alternativa verbal legítima; la nota c conserva una alternativa sintáctica del participio; la nota d aclara el antecedente implícito del pronombre femenino.
