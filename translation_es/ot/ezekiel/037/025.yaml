review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: residencia en la tierra dada a Jacob, continuidad generacional, duración permanente y el papel de David como príncipe. Sin embargo, no preserva con fidelidad la segunda persona plural de אֲבוֹתֵיכֶם (''vuestros/sus padres'' según tratamiento), ya que cambia a tercera persona (''sus padres'') sin antecedente adecuado en español y pierde el vínculo directo con el destinatario del oráculo. También conviene alinear mejor el anclaje de notas con los elementos correspondientes.'
  spanish_quality_summary: El español es mayormente claro, digno y natural. 'Habitarán', 'en la tierra' y 'príncipe sobre ellos' funcionan bien. No obstante, 'donde habitaron sus padres' suena confuso porque el versículo venía hablando de 'mi siervo Jacob' y luego 'sus padres' puede referirse ambiguamente a Jacob o a ellos. 'Sus antepasados' en la nota también hereda ese problema de persona. Cambiar a 'vuestros padres' mejora claridad y fidelidad. El orden de las notas [b][c] en 'para siempre' tampoco corresponde idealmente a sus referentes semánticos.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. 'Siervo' para עַבְדִּי aquí es contextual y defendible. 'Príncipe' preserva correctamente נָשִׂיא frente a 'rey'. No aparecen Yahvé/Mesías u otros términos sensibles del glosario en este versículo.
  issues:
  - severity: high
    issue: Cambio indebido de persona en 'sus padres'
    rationale: El hebreo tiene אֲבוֹתֵיכֶם, 'vuestros padres' (2mp). El borrador usa 'sus padres' (3mp), lo que altera la referencia y crea ambigüedad contextual.
  - severity: medium
    issue: La nota [a] también usa la persona incorrecta
    rationale: Si el texto debe decir 'vuestros padres', la alternativa coherente es 'vuestros antepasados', no 'sus antepasados'.
  - severity: low
    issue: Anclaje y orden de notas mejorables
    rationale: La nota sobre 'David' está anclada en 'para siempre' mediante [c], cuando corresponde más naturalmente al nombre 'David'; la nota léxica de 'príncipe' debería anclarse en 'príncipe'. Esto mejora legibilidad y correspondencia entre nota y texto.
