  text: And the sons of Israel again did what was evil in the eyes of Yahweh[a], and they served the Baals and the Ashtoreths, and the gods of Aram, the gods of Sidon, the gods of Moab, the gods of the sons of Ammon, and the gods of the Philistines[b]. They forsook Yahweh and did not serve him.
