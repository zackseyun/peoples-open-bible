translation:
  language: es
  text: 'Las más sabias princesas[a] le responden; sí, ella misma responde a sus propias palabras:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sus mujeres nobles»; el hebreo puede referirse a damas de alto rango en lugar de «princesas» en sentido estrictamente dinástico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חַכְמוֹת
  english_pob_choice: wisest
  chosen_spanish: las más sabias
  alternatives_spanish:
  - las sabias
  - las mujeres sabias
  lexicon: HALOT
  rationale: El hebreo funciona aquí de manera sustantiva y calificativa con שָׂרוֹתֶיהָ. En español, «las más sabias» conserva el superlativo implícito del POB inglés y encaja bien con el tono poético del verso.
- source_word: שָׂרוֹתֶיהָ
  english_pob_choice: princesses
  chosen_spanish: princesas
  alternatives_spanish:
  - nobles
  - noblewomen
  - damas
  lexicon: HALOT
  rationale: El término remite a mujeres de rango cortesano o noble. «Princesas» reproduce la lectura del POB inglés y comunica el entorno real sin perder la referencia a mujeres de alto estatus.
- source_word: תַּעֲנֶינָּה
  english_pob_choice: answer
  chosen_spanish: le responden
  alternatives_spanish:
  - le contestan
  - le replican
  lexicon: HALOT
  rationale: El verbo ענה aquí significa responder o contestar. En español, «responden» mantiene el valor de respuesta directa y funciona de manera natural en la escena poética.
- source_word: אַף
  english_pob_choice: indeed
  chosen_spanish: sí
  alternatives_spanish:
  - ciertamente
  - en efecto
  - de hecho
  lexicon: HALOT
  rationale: La partícula intensifica lo anterior. «Sí» conserva la fuerza enfática de una afirmación añadida y evita un calco pesado en español.
- source_word: הִיא
  english_pob_choice: she herself
  chosen_spanish: ella misma
  alternatives_spanish:
  - ella
  - incluso ella
  lexicon: HALOT
  rationale: El pronombre independiente es enfático. «Ella misma» conserva esa insistencia en español y hace visible la auto-respuesta de la madre de Sisera.
- source_word: תָּשִׁיב
  english_pob_choice: answers
  chosen_spanish: responde
  alternatives_spanish:
  - contesta
  - replica
  - devuelve
  lexicon: HALOT
  rationale: El hiphil de שוב con אֲמָרֶיהָ en contexto dialogal expresa respuesta o réplica. «Responde» refleja bien la relación con las palabras mencionadas sin introducir una paráfrasis psicológica más amplia.
- source_word: אֲמָרֶיהָ
  english_pob_choice: her own words
  chosen_spanish: sus propias palabras
  alternatives_spanish:
  - sus dichos
  - su խոս speech
  lexicon: HALOT
  rationale: El plural de אֵמֶר/אָמֶר alude a palabras o dichos. «Sus propias palabras» es idiomático en español y conserva el matiz de auto-referencialidad del POB inglés.
- source_word: לָהּ
  english_pob_choice: to her
  chosen_spanish: le
  alternatives_spanish:
  - a ella
  - para ella
  lexicon: HALOT
  rationale: La preposición más sufijo de 3fs se expresa naturalmente con el dativo indirecto en español. El sentido reflexivo queda claro por el contexto y por «ella misma».
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del POB inglés, que prefirió una respuesta a las propias palabras en vez de la paráfrasis interpretativa «repite sus palabras para sí misma». En español se mantuvo una formulación formal pero natural: «responde sus propias palabras», sin añadir explicación psicológica que el hebreo no exige explícitamente.'
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto solo cuando aparezca el nombre divino; en este versículo no aparece.
  - 'Se mantuvo la referencia femenina singular y plural con concordancia explícita: «las más sabias princesas» / «ella misma» / «sus propias palabras».'
  - 'No se tradujo mecánicamente desde el inglés: «responde sus propias palabras» sigue el hebreo תָּשִׁיב אֲמָרֶיהָ לָהּ y evita la glosa más interpretativa de una repetición interna.'
