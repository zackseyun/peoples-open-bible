    reason: previous_rendering
  revision_rationale: Se corrigió la ubicación de la nota literal para que acompañe 'boca de sus sacos', se normalizó el registro al español neutral latinoamericano ('lleven', 'su/sus'), se reemplazó 'dinero duplicado' por 'dinero doble' por mayor naturalidad y mejor alineación con 'double money', y se sustituyó 'costales' por 'sacos' para mayor neutralidad. También se ajustó la nota alternativa para reflejar con más fidelidad el historial auditado de תָּשִׁיבוּ בְיֶדְכֶם.
