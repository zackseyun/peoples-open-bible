revisions:
- from: Yahvé determinó destruir el muro de la hija de Sion[a]; extendió un cordel de medir; no retiró su mano de devorar, y hizo que el baluarte y el muro lamentaran[b]; juntos languidecen.
  to: Yahvé determinó destruir el muro de la hija de Sion; extendió un cordel de medir; no retiró su mano de devorar[b], e hizo que el baluarte y el muro se lamentaran; juntos languidecen.
  rationale: Se elimina la nota [a] porque no aporta una alternativa real en español tal como estaba formulada. Se reubica y corrige la nota [b] para reflejar la alternativa léxica auditada sobre מִבַּלֵּעַ. También se mejora la naturalidad de 'lamentaran' a 'se lamentaran' sin alterar el sentido ni la personificación poética.
