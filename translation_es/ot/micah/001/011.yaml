translation:
  language: es
  text: Pasa[a][b], desnuda y avergonzada, habitante de Sefir. La habitante de Zaanán no ha salido. El lamento de Bet-Ésel les quitará su apoyo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Sefir, Zaanán y Bet-Ésel son nombres de lugar. Es probable que Miqueas juegue con sus sonidos o significados: Sefir puede sugerir belleza, Zaanán suena como «salir», y Bet-Ésel puede sugerir una casa cercana o al lado.'
    reason: cultural_note
  - marker: b
    text: O «Pasa de largo» en lugar de «Pasa». El mandato puede implicar irse al destierro.
    reason: lexical_alternative
  - marker: c
    text: O «El duelo de Bet-Ésel les quitará su lugar de apoyo». El final del verso es difícil; el hebreo puede referirse a la pérdida de un apoyo, refugio o lugar donde mantenerse en pie.
    reason: lexical_alternative
lexical_decisions:
- source_word: עִבְרִי
  english_pob_choice: Pass on
  chosen_spanish: Pasa
  alternatives_spanish:
  - Pasa de largo
  - Sigue adelante
  - Ve pasando
  lexicon: HALOT
  rationale: El imperativo femenino singular pide una orden breve y directa a la habitante personificada. «Pasa» conserva el movimiento forzado que el contexto sugiere, sin añadir explicación no presente en el hebreo.
- source_word: לָכֶם
  english_pob_choice: (implicit in the address)
  chosen_spanish: implícito en el vocativo y la orden
  alternatives_spanish:
  - para ustedes
  - a ustedes
  lexicon: HALOT
  rationale: Como en la solución inglesa, el valor de לָכֶם queda absorbido en la dirección del mandato al colectivo de la ciudad; no conviene forzar una preposición adicional en español.
- source_word: יוֹשֶׁבֶת שָׁפִיר
  english_pob_choice: inhabitant of Shaphir
  chosen_spanish: habitante de Sefir
  alternatives_spanish:
  - oh habitante de Sefir
  - la habitante de Sefir
  - moradora de Sefir
  lexicon: HALOT
  rationale: La forma participial femenina personifica la ciudad como su habitante. «Habitante de Sefir» mantiene la personificación y fluye de manera natural en español.
- source_word: שָׁפִיר
  english_pob_choice: Shaphir
  chosen_spanish: Sefir
  alternatives_spanish:
  - Shafir
  - Sefir (nombre propio)
  lexicon: HALOT
  rationale: Se translitera el topónimo con adaptación gráfica española. No se incorpora el posible juego con 'belleza/hermosura' en el cuerpo del texto, para no sobrecargar la línea.
- source_word: עֶרְיָה בֹשֶׁת
  english_pob_choice: naked and in shame
  chosen_spanish: desnuda y avergonzada
  alternatives_spanish:
  - desnuda y en vergüenza
  - desnuda, con vergüenza
  - desnuda e infamada
  lexicon: HALOT
  rationale: La pareja expresa exposición y humillación. «Desnuda y avergonzada» conserva ambos elementos con español natural; «avergonzada» comunica el componente de ignominia sin explicar de más.
- source_word: לֹא יָצְאָה
  english_pob_choice: has not come out
  chosen_spanish: no ha salido
  alternatives_spanish:
  - no salió
  - no sale
  lexicon: HALOT
  rationale: 'El perfecto hebreo se vierte con relevancia presente, como en la traducción inglesa. «No ha salido» preserva la ambigüedad del gesto: salir para ayuda, combate o duelo.'
- source_word: יוֹשֶׁבֶת צַאֲנָן
  english_pob_choice: the inhabitant of Zaanan
  chosen_spanish: la habitante de Zaanán
  alternatives_spanish:
  - habitante de Zaanán
  - oh habitante de Zaanán
  - la moradora de Zaanán
  lexicon: HALOT
  rationale: Se mantiene la misma construcción personificadora. El artículo ayuda a la fluidez en español sin perder la referencia a la ciudad como figura femenina.
- source_word: צַאֲנָן
  english_pob_choice: Zaanan
  chosen_spanish: Zaanán
  alternatives_spanish:
  - Saanán
  - Zaanán (topónimo)
  lexicon: HALOT
  rationale: Topónimo transliterado con adaptación usual al español bíblico. Se conserva la sonoridad necesaria para el posible juego fónico con יצא, sin explicitarlo en el texto principal.
- source_word: מִסְפַּד בֵּית הָאֵצֶל
  english_pob_choice: The lamentation of Beth-ezel
  chosen_spanish: El lamento de Bet-Ésel
  alternatives_spanish:
  - El duelo de Bet-Ésel
  - La lamentación de Bet-Ésel
  - El llanto de Bet-Ésel
  lexicon: HALOT
  rationale: מִסְפַּד denota lamento/mourning. «Lamento» es natural en español y suficientemente amplio para conservar la ambigüedad sobre si el llanto ocurre allí o por allí.
- source_word: בֵּית הָאֵצֶל
  english_pob_choice: Beth-ezel
  chosen_spanish: Bet-Ésel
  alternatives_spanish:
  - Beth-Ésel
  - Bet-Ezel
  lexicon: HALOT
  rationale: Se translitera el topónimo con forma española. La posible resonancia de 'casa al lado/casa contigua' queda reservada para nota, no para el cuerpo del verso.
- source_word: יִקַּח
  english_pob_choice: will take away
  chosen_spanish: tomará de ustedes
  alternatives_spanish:
  - quitará de ustedes
  - tomará
  - les quitará
  lexicon: HALOT
  rationale: El verbo לקח, con el complemento de מן, comunica remoción o privación. «Tomará de ustedes» conserva el movimiento de quitar sin introducir un sujeto explícito distinto del texto.
- source_word: מִכֶּם
  english_pob_choice: from you
  chosen_spanish: de ustedes
  alternatives_spanish:
  - de vosotros
  - de ti
  lexicon: HALOT
  rationale: El plural masculino se vierte en forma inclusiva y neutral de registro bíblico contemporáneo. «De ustedes» es claro y evita regionalismos.
- source_word: עֶמְדָּתוֹ
  english_pob_choice: its support
  chosen_spanish: su apoyo
  alternatives_spanish:
  - su sostén
  - su lugar de apoyo
  - su puesto
  lexicon: HALOT
  rationale: El sustantivo alude a un lugar o recurso de sostén cercano. «Apoyo» comunica bien la idea de soporte/refugio sin perder la dificultad del hebreo, que no se resuelve de manera más precisa en español.
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo masorético y el tramo auditado en inglés. No hubo revisiones aplicadas en el pase más reciente; por eso se conservan la ambigüedad del último hemistiquio y el juego de palabras solo en nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se prefirió «lamento» para מִסְפַּד por ser amplio y natural en español, sin concretarlo a una sola modalidad de duelo.
  - Se conservaron los topónimos como nombres propios transliterados con adaptación española.
  - No se suavizó la fuerza de la orden imperativa, que en el contexto sugiere desplazamiento forzado.
