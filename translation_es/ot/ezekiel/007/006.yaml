review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido básico del hebreo: la repetición de «fin», la personificación de הֵקִיץ y la fuerza hostil contextual de אֵלַיִךְ. Sin embargo, «Se ha acercado el fin» no corresponde tan fielmente a בָּא como «ha llegado / ha venido», y el anclaje de la nota [a] está mal ubicado: la alternativa se refiere a «Ha despertado contra ti», no a «el fin».'
  spanish_quality_summary: El español es generalmente claro y legible, pero conviene mejorar la precisión y el registro. «Mira» es posible para הִנֵּה, pero en un contexto profético solemne «he aquí» refleja mejor el tono documentado por el POB en inglés («behold»). «Está viniendo» es comprensible, aunque «ya viene» suena más natural y conserva la inminencia.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. «fin» para קֵץ y «contra ti» para אֵלַיִךְ están bien. La principal corrección léxica es usar una forma de «llegar/venir» para בָּא en vez de «se ha acercado».
  issues:
  - severity: medium
    issue: «Se ha acercado el fin» debilita la equivalencia de בָּא
    rationale: El hebreo usa repetidamente בוא (‘venir/llegar’), y el inglés auditado eligió «has come». «Se ha acercado» introduce una noción de proximidad previa, no de llegada ya ocurrida.
  - severity: medium
    issue: La nota [a] está anclada en el lugar equivocado
    rationale: La nota explica la alternativa para הֵקִיץ («ha despertado» / «se ha puesto en movimiento»), pero el marcador aparece junto a «el fin» en vez de junto a la cláusula correspondiente.
  - severity: low
    issue: «mira» no refleja tan bien el registro final auditado
    rationale: El inglés POB fue revisado de «look» a «behold» por registro. En español bíblico legible, «he aquí» reproduce mejor ese tono que «mira».
  - severity: low
    issue: «está viniendo» es menos natural que una opción española más idiomática
    rationale: Aunque comprensible, «ya viene» o «viene» suena más natural en español y mantiene la progresión retórica del hebreo.
  revised_spanish_text: Ha llegado el fin; ha llegado el fin. Ha despertado[a] contra ti; he aquí[b], ya viene.
