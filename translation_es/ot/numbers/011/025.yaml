base_translation:
  language: en
  yaml_path: translation/ot/numbers/011/025.yaml
  text: Then Yahweh came down in the cloud and spoke to him[a], and he took some of the Spirit that was on him and put it on the seventy elders. And when the Spirit rested on them, they prophesied, but they did not continue.
  footnotes:
