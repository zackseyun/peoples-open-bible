translation:
  language: es
  text: Tú aplastaste las cabezas de Leviatán[a]; lo diste como alimento para las criaturas del desierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para los moradores del desierto» o «para las criaturas salvajes del desierto». El término hebreo es difícil y puede referirse a habitantes o criaturas de regiones áridas.
    reason: lexical_alternative
lexical_decisions:
- source_word: רִצַּצְתָּ
  english_pob_choice: crushed
  chosen_spanish: aplastaste
  alternatives_spanish:
  - machacaste
  - destruiste
  lexicon: HALOT
  rationale: El hebreo expresa una acción violenta de romper o aplastar. «Aplastaste» conserva la fuerza física del verbo sin sonar artificial en español bíblico moderno.
- source_word: רָאשֵׁי
  english_pob_choice: the heads of
  chosen_spanish: las cabezas de
  alternatives_spanish:
  - la cabeza de
  lexicon: HALOT
  rationale: El hebreo está en plural constructo; mantener el plural refleja mejor la imagen poética de varias cabezas y sigue de cerca la forma del original.
- source_word: לִוְיָתָן
  english_pob_choice: Leviathan
  chosen_spanish: Leviatán
  alternatives_spanish:
  - el monstruo marino
  lexicon: HALOT
  rationale: Se conserva como nombre propio transliterado para mantener la imaginería poética e intertextual del término bíblico.
- source_word: תִּתְּנֶנּוּ
  english_pob_choice: you gave him
  chosen_spanish: lo diste
  alternatives_spanish:
  - se lo diste
  - lo entregaste
  lexicon: HALOT
  rationale: El verbo נתן se rinde de forma directa con «dar». En español, el objeto referido a Leviatán puede expresarse naturalmente como «lo» sin perder la referencia.
- source_word: מַאֲכָל
  english_pob_choice: as food
  chosen_spanish: como alimento
  alternatives_spanish:
  - como comida
  - en alimento
  lexicon: HALOT
  rationale: «Alimento» mantiene el sentido de comida dada para consumo y suena más sobrio que «comida» en este registro poético.
- source_word: לְעָם
  english_pob_choice: for the people of
  chosen_spanish: para las criaturas de
  alternatives_spanish:
  - para el pueblo de
  - para los habitantes de
  lexicon: HALOT
  rationale: La secuencia hebrea es difícil y la revisión inglesa favorece una lectura no humana del término final. En español, «para las criaturas de» deja abierta la relación sintáctica y conserva la ambigüedad de la construcción.
- source_word: לְצִיִּים
  english_pob_choice: the creatures of the desert
  chosen_spanish: el desierto
  alternatives_spanish:
  - las criaturas del desierto
  - los moradores del desierto
  lexicon: HALOT
  rationale: El término צִיִּים admite la idea de seres del desierto o criaturas de regiones áridas. La frase «criaturas del desierto» expresa esa posibilidad sin imponer una sola concreción excesiva. En la versión final, el sentido se integra en la frase completa «para las criaturas del desierto».
theological_decisions:
- issue: Imagen de Leviatán
  english_pob_reading: Retain 'Leviathan' as poetic-cosmic imagery without specifying whether the referent is a literal creature, mythic symbol, or historical enemy.
  chosen_spanish_reading: Conservar «Leviatán» como imagen poética-cósmica, sin precisar si se trata de un animal literal, un símbolo mítico o un enemigo histórico.
  alternative_spanish_readings:
  - Interpretar Leviatán únicamente como un monstruo marino
  - Interpretar Leviatán como Egipto o como poderes del caos
  rationale: El verso usa una imagen poética consolidada de victoria divina sobre el caos. La traducción española debe preservar esa tensión interpretativa en lugar de resolverla.
  doctrine_reference: Preservar la tensión teológica sin cerrarla artificialmente.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del expediente inglés, que prefirió «creatures of the desert» frente a «people of the desert» para reflejar mejor el sentido probable de צִיִּים. Se mantuvo la imagen de Leviatán y la estructura general del versículo, evitando resolver la ambigüedad más allá de lo que el hebreo y el registro poético permiten.
  spanish_consistency_notes:
  - Se usó «Leviatán» de forma transliterada para mantener coherencia con la política POB de nombres poéticos bíblicos.
  - Se eligió «aplastaste» por su fuerza verbal y naturalidad en español bíblico contemporáneo.
  - Se evitó «SEÑOR» porque en este versículo no aparece el tetragrámaton ni una sustitución directa de κύριος.
  - La nota al pie preserva la ambigüedad del término final y ofrece alternativas útiles para el lector.
  - Se mantuvo un tono reverente, moderno y publicable, sin calco excesivo del inglés.
