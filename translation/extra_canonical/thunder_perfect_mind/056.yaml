translation:
  text: 'I am she who keeps no festival[b][a],

    and I am she whose festivals are many.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Festival can also be rendered ‘feast’ (Greek loan ἑορτή).
    reason: lexical_alternative
  - marker: b
    text: ‘Are many’ could be ‘are abundant’ or ‘are great in number,’ depending on
      the reading of ⲕⲁϩ.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲙⲛⲧⲁⲧ(ⲉⲟⲣⲧⲏ)
  chosen: keeps no festival
  alternatives:
  - not in a festival
  - without festival
  - non-festival
  lexicon: Crum, Coptic Dictionary s.v. ἑορτή (loanword) and privative ⲙⲛⲧⲁⲧ-; Layton,
    A Coptic Grammar (privative nominal formation)
  rationale: The OCR shows ⲙⲛⲧⲁⲧ-, likely the privative nominal compounded with ⲉⲟⲣⲧⲏ
    (Greek ‘festival’). Idiomatically this yields ‘not keeping festival.’ Rendering
    as ‘keeps no festival’ preserves the privative force and the concrete cultic sense.
- source_word: ϩⲛ ⲟⲩ ⲕⲁϩ (phrase)
  chosen: are many
  alternatives:
  - are abundant
  - are great in number
  lexicon: Crum s.v. ⲕⲁϩ (multitude/abundance) — reading provisional; context from
    parallelism with ‘festival(s)’
  rationale: The phrase likely means ‘in a multitude,’ modifying the noun ‘festivals.’
    In English we carry the sense with ‘are many’ to maintain the antithetical parallel.
    Reading of ⲕⲁϩ as ‘multitude’ fits the standard paradox ‘many festivals.’
- source_word: ⲁⲩⲱ
  chosen: and
  alternatives: []
  lexicon: Crum s.v. ⲁⲩⲱ
  rationale: Simple coordinating conjunction linking the paradoxical halves.
- source_word: '(relative construction: ⲡⲁⲓ …)'
  chosen: I am she who
  alternatives:
  - I am the one who
  lexicon: Layton, A Coptic Grammar (predicate with demonstrative for ‘the one who…’)
  rationale: The repeated first-person feminine relative declaration is a hallmark
    of the poem’s voice; ‘I am she who’ preserves both gender and parallelism.
parallelism_check: 'Two balanced first-person declarations are preserved: ‘I am she
  who keeps no festival’ // ‘I am she whose festivals are many.’ The privative/abundant
  antithesis is left intact without smoothing.'
voice_check: First-person feminine ‘I am she who…’ is retained, matching the poem’s
  recurring self-revelatory voice and preserving cadence and authority.
alignment_risk_note: 'Alignment confidence is medium and the OCR is fragmentary: ⲙⲛⲧⲁⲧ
  appears without the following ⲉⲟⲣⲧⲏ in the snippet, and the sequence ⲉⲓⲉⲃⲟⲗ ϩⲛⲟⲩ
