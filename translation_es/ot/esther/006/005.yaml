translation:
  language: es
  text: 'Los servidores del rey le dijeron: «Mira, Amán está de pie en el patio[a]». Y el rey dijo: «Que entre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el patio del palacio».
    reason: lexical_alternative
lexical_decisions:
- source_word: נַעֲרֵי הַמֶּלֶךְ
  english_pob_choice: the king’s attendants
  chosen_spanish: los servidores del rey
  alternatives_spanish:
  - los asistentes del rey
  - los jóvenes del rey
  - los siervos del rey
  lexicon: HALOT
  rationale: נַעַר puede designar joven, servidor o asistente según el contexto. En una escena de corte, 'servidores' comunica la función de servicio al rey de forma natural en español sin restringir innecesariamente la edad. 'Asistentes' también sería posible, pero 'servidores' conserva mejor la relación de subordinación sugerida por el contexto.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Mira bien
  - He aquí
  lexicon: HALOT
  rationale: הִנֵּה introduce una llamada de atención inmediata. 'Mira' reproduce esa deixis de manera directa y natural en español moderno; 'He aquí' sería más formal y menos idiomático.
- source_word: עֹמֵד
  english_pob_choice: is standing
  chosen_spanish: está en
  alternatives_spanish:
  - está de pie en
  - se encuentra en
  - permanece en
  lexicon: HALOT
  rationale: El participio expresa una postura o estado presente. En español, la idea comunicativa principal aquí es que Amán está ubicado/presente en el patio, por lo que 'está en' evita una rigidez innecesaria. La postura física ya queda implícita por el contexto del informante que lo ve allí; 'está de pie en' sería más literal pero menos natural.
- source_word: בֶּחָצֵר
  english_pob_choice: in the court
  chosen_spanish: en el patio
  alternatives_spanish:
  - en el corte
  - en la corte
  - en el patio interior
  lexicon: HALOT
  rationale: חָצֵר puede significar 'patio' o 'corte/courtyard'. En este contexto de palacio, 'patio' mantiene la imagen espacial concreta y evita que 'corte' se confunda con la esfera administrativa del rey. La POB inglesa preservó la alternativa 'courtyard'; en español, 'patio' cumple esa función de manera clara.
- source_word: יָבֹא
  english_pob_choice: Let him come in
  chosen_spanish: Que entre
  alternatives_spanish:
  - Déjenlo entrar
  - Puede entrar
  - Que venga
  lexicon: HALOT
  rationale: El imperfecto/jusivo expresa mandato o permiso. 'Que entre' conserva la fuerza directiva de forma breve y natural en español. 'Déjenlo entrar' añade un plural no presente; 'Que venga' pierde la idea de movimiento hacia el interior.
- source_word: הָמָן
  english_pob_choice: Haman
  chosen_spanish: Amán
  alternatives_spanish:
  - Haman
  lexicon: standard transliteration
  rationale: El nombre propio se adapta a la forma española habitual 'Amán', ampliamente reconocible en biblias en español, sin alterar la referencia al personaje.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior anclando la nota [a] directamente en la frase traducida correspondiente, y se mantuvo la equivalencia fuente-texto con una decisión espacial coherente con חָצֵר.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' o máscaras reverenciales, irrelevantes en este versículo.
  - Se tradujo el nombre propio como 'Amán' para coherencia con el uso bíblico en español.
  - La nota [a] aparece exactamente en el lugar de la alternativa léxica relevante, sin marcadores huérfanos.
