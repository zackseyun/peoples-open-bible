translation:
  language: es
  text: No contaminarás la tierra en la que habitas, en medio de la cual yo habito, porque yo, Yahvé, habito en medio de los hijos de Israel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más idiomáticamente, 'entre los israelitas' o 'entre los hijos de Israel'.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְטַמֵּא
  english_pob_choice: defile
  chosen_spanish: contaminarán
  alternatives_spanish:
  - profanarán
  - mancharán ritualmente
  - volverán impura
  lexicon: HALOT
  rationale: El hebreo en este contexto legal-cultual expresa dejar la tierra en estado de impureza por sangre derramada. En español, 'contaminar' comunica bien el daño ritual y moral sin sonar demasiado técnico; se conserva la gravedad del acto. 'Profanar' podría sugerir ante todo falta de respeto a lo sagrado, y 'manchar' es menos preciso.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra de la promesa
  lexicon: HALOT
  rationale: Aquí אֶרֶץ designa la tierra concreta donde Israel vive, no la tierra como planeta. 'La tierra' mantiene la referencia geográfica y pactal sin añadir matices no presentes en el hebreo.
- source_word: יֹשְׁבִים בָּהּ
  english_pob_choice: in which you dwell
  chosen_spanish: en la que habitan
  alternatives_spanish:
  - donde habitan
  - en que moran
  - en la que viven
  lexicon: HALOT
  rationale: El participio de ישב expresa residencia continua. 'Habitan' conserva ese sentido de morar o residir y resulta natural en español bíblico moderno. Se evita 'viven' por ser más genérico y menos estable en este registro.
- source_word: שֹׁכֵן
  english_pob_choice: dwell
  chosen_spanish: habito
  alternatives_spanish:
  - moro
  - resido
  - demezco
  lexicon: HALOT
  rationale: שכן repite la idea de presencia estable. 'Habito' permite mantener la repetición verbal entre la tierra, la presencia divina y el medio de Israel. 'Moro' sería más arcaizante; 'resido' suena administrativo.
- source_word: בְּתוֹכָהּ
  english_pob_choice: in the midst of which
  chosen_spanish: en medio de la cual
  alternatives_spanish:
  - dentro de la cual
  - en el centro de la cual
  - en su interior
  lexicon: HALOT
  rationale: תוך indica interioridad y presencia central. 'En medio de la cual' reproduce la repetición enfática del hebreo y la relación espacial-teológica entre la tierra y la presencia divina.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque, en efecto
  lexicon: HALOT
  rationale: Aquí כִּי introduce fundamento causal. 'Porque' es la forma más natural y clara en español para expresar la razón del mandamiento.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrama: ''Yahvé'' como forma española estable y transparente del nombre divino, preservando la distinción entre el nombre propio y un título.'
- source_word: בְּתוֹךְ בְּנֵי יִשְׂרָאֵל
  english_pob_choice: in the midst of the sons of Israel
  chosen_spanish: en medio de los hijos de Israel
  alternatives_spanish:
  - entre los israelitas
  - en medio del pueblo de Israel
  - entre los hijos de Israel
  lexicon: HALOT
  rationale: Se mantiene la literalidad de בני ישראל como 'los hijos de Israel', porque el proyecto prefiere conservar el rasgo masculino del hebreo cuando no hay motivo textual para neutralizarlo. 'En medio de' reproduce היטב la repetición del verso y el lenguaje de presencia divina.
theological_decisions:
- issue: La presencia divina en medio del pueblo y de la tierra
  english_pob_reading: for I, Yahweh, dwell in the midst of the sons of Israel
  chosen_spanish_reading: porque yo, Yahvé, habito en medio de los hijos de Israel
  alternative_spanish_readings:
  - porque yo, Yahvé, habito entre los hijos de Israel
  - porque yo, Yahvé, habito en medio de Israel
  rationale: El hebreo enfatiza la presencia permanente de Yahvé en el centro del pueblo del pacto. Se conserva 'en medio de' para mantener la fuerza local y relacional del texto. 'Entre' sería posible, pero debilita el eco repetido de תוך/בְּתוֹךְ. La formulación mantiene el paralelismo entre la tierra, el pueblo y la presencia divina.
  doctrine_reference: 'DOCTRINE.md Contested terms: divine presence and covenant holiness'
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se evita la sustitución litúrgica 'el SEÑOR' para no ocultar el nombre propio revelado. 'Yahvé' es la forma española adoptada por el proyecto para preservar la transparencia del Tetragrama.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Expresión בני ישראל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  - los hijos de Jacob
  rationale: Se conserva la forma masculina literal del hebreo, siguiendo la política del proyecto de mantener la precisión morfológica cuando no compromete la comprensión. Aunque 'israelitas' sería más idiomático, atenúa el eco formal del texto fuente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La redacción española sigue de cerca el estado final del audit trail inglés, especialmente la revisión que prefirió 'dwell' frente a 'are living' para reforzar la repetición léxica del hebreo. También se preserva la decisión estable sobre el nombre divino como 'Yahvé' y la referencia literal a בני ישראל, con una nota para la alternativa idiomática.
  spanish_consistency_notes:
  - Se usa 'Yahvé' consistentemente para יְהוָה, conforme al estándar del proyecto.
  - '''En medio de'' se repite para reflejar la insistencia espacial del hebreo y evitar una paráfrasis suavizante.'
  - '''Hijos de Israel'' conserva la literalidad morfológica; la nota ofrece la opción idiomática sin desplazar el texto principal.'
  - El verbo 'habitan/habito' mantiene la reiteración de residir/dwell en el versículo.
