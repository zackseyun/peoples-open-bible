    issue: 'Nombre propio mal representado: ‘Simi’'
    rationale: El hebreo שִׁמְעִי corresponde regularmente a ‘Simei’ en español bíblico. ‘Simi’ omite una vocal final relevante y no preserva bien la forma del nombre.
  - severity: medium
    issue: ‘era el principal sobre ellos’ suena poco natural y ambiguo en español
    rationale: Aunque ‘sobre ellos’ refleja de cerca עֲלֵיהֶם, en español puede sugerir localización o autoridad sobre personas, cuando aquí se trata de supervisión administrativa de los bienes/arreglos mencionados. ‘Estaba a cargo de ellos’ comunica mejor el sentido sin alejarse del hebreo.
  - severity: low
    issue: Puntuación algo rígida con punto y coma antes de ‘y’
    rationale: Una coma fluye mejor en español moderno para esta coordinación narrativa y mantiene el tono digno sin sonar forzado.
