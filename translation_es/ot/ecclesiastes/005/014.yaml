translation:
  language: es
  text: Como salió del vientre de su madre, desnudo volverá; como vino, así se irá; y no se llevará nada de su labor[a] que pueda tomar en su mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y no se llevará nada de su trabajo que pueda tomar en su mano»'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  english_pob_choice: As
  chosen_spanish: Como
  alternatives_spanish:
  - Así como
  - Tal como
  lexicon: HALOT
  rationale: Expresa la comparación del hebreo de manera natural en español, manteniendo el paralelismo entre el origen y el retorno sin volverlo más pesado de lo necesario.
- source_word: יָצָא מִבֶּטֶן אִמּוֹ
  english_pob_choice: he came from his mother’s womb
  chosen_spanish: salió del vientre de su madre
  alternatives_spanish:
  - vino del vientre de su madre
  - salió de la matriz de su madre
  lexicon: HALOT
  rationale: En español, 'salió del vientre de su madre' conserva la imagen concreta del nacimiento y el movimiento de salida que el hebreo usa, sin sonar forzado.
- source_word: עָרוֹם
  english_pob_choice: naked
  chosen_spanish: desnudo
  alternatives_spanish:
  - en desnudez
  - sin nada
  lexicon: HALOT
  rationale: '''Desnudo'' es la equivalencia directa y clara para la desnudez literal del nacimiento y la muerte.'
- source_word: יָשׁוּב
  english_pob_choice: he will return
  chosen_spanish: volverá
  alternatives_spanish:
  - regresará
  - volverá de nuevo
  lexicon: HALOT
  rationale: '''Volverá'' conserva el verbo de retorno y su fuerza proverbial en español.'
- source_word: לָלֶכֶת
  english_pob_choice: going
  chosen_spanish: yéndose
  alternatives_spanish:
  - para irse
  - al ir
  lexicon: HALOT
  rationale: El hebreo funciona de modo adverbial; 'yéndose' transmite el matiz de movimiento concomitante con 'volverá' sin añadir contenido nuevo.
- source_word: כְּשֶׁבָּא
  english_pob_choice: as he came
  chosen_spanish: como vino
  alternatives_spanish:
  - tal como vino
  - así como vino
  lexicon: HALOT
  rationale: Se conserva la simetría con el inicio del versículo y la brevedad proverbial del hebreo.
- source_word: וּמְא֨וּמָה
  english_pob_choice: nothing
  chosen_spanish: nada
  alternatives_spanish:
  - absolutamente nada
  - ni una cosa
  lexicon: HALOT
  rationale: '''Nada'' expresa la negación total de מְאוּמָה con naturalidad en español.'
- source_word: יִשָּׂא
  english_pob_choice: he will carry away
  chosen_spanish: llevará consigo
  alternatives_spanish:
  - cargará con
  - se llevará
  lexicon: HALOT
  rationale: '''Llevará consigo'' comunica la idea de llevar algo al partir, que es el punto del contexto, y evita una formulación demasiado literal o confusa.'
- source_word: בַעֲמָלוֹ
  english_pob_choice: from his labor
  chosen_spanish: de su labor
  alternatives_spanish:
  - de su trabajo
  - de su fatiga
  lexicon: HALOT
  rationale: '''Labor'' mantiene la correspondencia con el campo semántico de עָמָל en Eclesiastés y su tono de esfuerzo penoso.'
- source_word: שֶׁיֹּלֵךְ בְּיָדוֹ
  english_pob_choice: that he can take in his hand
  chosen_spanish: que pueda llevar en su mano
  alternatives_spanish:
  - que pueda tomar con la mano
  - que pueda cargar en la mano
  lexicon: HALOT
  rationale: La cláusula final explica el límite de lo que puede retener al morir. 'Llevar en su mano' conserva la imagen concreta y resulta idiomático en español.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y el razonamiento del POB inglés: mantiene el paralelo nacimiento/retorno, conserva la negación total de מְאוּמָה y resuelve la cláusula final con una imagen concreta de portar en la mano. Se adoptó ''volverá''/''yéndose'' por fluidez proverbial en español y ''de su labor'' para reflejar el campo semántico de עָמָל.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto fuente lo exigiera; este versículo no contiene el nombre divino.
  - '''Labor'' se conservó para עָמָל, en línea con el valor de esfuerzo penoso del término en Eclesiastés.'
  - La nota al pie preserva la alternativa 'trabajo' para reflejar la opción léxica documentada por el POB inglés sin introducir una paráfrasis más amplia.
