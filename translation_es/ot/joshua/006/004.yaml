revisions:
- from: Y siete sacerdotes llevarán siete trompetas de cuerno de carnero[a] delante del arca. Y en el séptimo día rodearás la ciudad siete veces, y los sacerdotes tocarán las trompetas.
  to: Y siete sacerdotes llevarán siete trompetas de cuerno de carnero[a] delante del arca. El séptimo día marcharán alrededor de la ciudad siete veces, y los sacerdotes tocarán las trompetas.
  rationale: Se corrigió el verbo de singular a plural para reflejar fielmente תָּסֹבּוּ. También se suavizó «Y en el séptimo día» a «El séptimo día» para un español más natural, y se prefirió «marcharán alrededor de» para conservar mejor el matiz procesional documentado en el English POB. Se mantuvo la nota léxica y la especificación instrumental principal.
