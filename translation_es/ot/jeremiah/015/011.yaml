translation:
  language: es
  text: 'Yahvé dijo: «Ciertamente te he liberado[a] para bien; ciertamente he hecho que el enemigo te suplique[b] en tiempo de desastre y en tiempo de angustia».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo incierto en la primera cláusula; alternativamente, «ciertamente te he puesto en libertad para bien», o, con una comprensión distinta de la forma, «ciertamente he fortalecido al remanente para bien».
    reason: textual_variant
  - marker: b
    text: 'O: «ciertamente he intercedido por ti con el enemigo en tiempo de desastre y de angustia».'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: Se sigue el nombre propio del pacto en forma transparente, conforme al criterio del proyecto. En español, «Yahvé» conserva esa visibilidad mejor que una sustitución litúrgica como «SEÑOR».
- source_word: אִם לֹא ... אִם לוא
  english_pob_choice: surely ... surely
  chosen_spanish: ciertamente ... ciertamente
  alternatives_spanish:
  - seguramente ... seguramente
  - en verdad ... en verdad
  - si no ... si no
  lexicon: HALOT
  rationale: La secuencia funciona aquí como afirmación enfática, no como condición. «Ciertamente» comunica el valor asseverativo sin forzar un giro idiomático ajeno al español bíblico contemporáneo.
- source_word: שרותך
  english_pob_choice: I have set you free
  chosen_spanish: te he liberado
  alternatives_spanish:
  - te he puesto en libertad
  - te he soltado
  - he fortalecido al remanente
  lexicon: HALOT
  rationale: El hebreo es incierto. En español, «liberado» mantiene la idea de desatar/soltar con un matiz de beneficio para Jeremías, y deja abierta la dificultad textual sin inventar precisión donde el hebreo no la ofrece.
- source_word: לְטוֹב
  english_pob_choice: for good
  chosen_spanish: para bien
  alternatives_spanish:
  - para tu bien
  - para beneficio
  - para el bien
  lexicon: HALOT
  rationale: «Para bien» reproduce bien el valor benefactivo y es natural en español. Evita restringir demasiado el alcance de la expresión hebrea.
- source_word: הִפְגַּעְתִּי בְךָ
  english_pob_choice: I have made ... plead with you
  chosen_spanish: he hecho que ... te suplique
  alternatives_spanish:
  - he intercedido por ti
  - he hecho que ... te ruegue
  - he hecho que ... te implore
  lexicon: HALOT
  rationale: La forma hiphil de פגע es ambigua. La lectura elegida sigue el contexto de un enemigo que se ve movido a suplicar, sin eliminar la alternativa de intercesión que la auditoría inglesa preserva.
- source_word: אֶת הָאֹיֵב
  english_pob_choice: the enemy
  chosen_spanish: el enemigo
  alternatives_spanish:
  - el adversario
  - el foe
  - tu enemigo
  lexicon: HALOT
  rationale: El singular colectivo se expresa de manera directa con «el enemigo». Es preciso y no introduce posesivo que el hebreo no exige explícitamente.
- source_word: בְּעֵת רָעָה
  english_pob_choice: in a time of disaster
  chosen_spanish: en tiempo de desastre
  alternatives_spanish:
  - en un tiempo de calamidad
  - en tiempo de mal
  - en época de desgracia
  lexicon: HALOT
  rationale: Aquí רָעָה se refiere a circunstancia adversa, no a mal moral. «Desastre» comunica ese valor situacional con claridad en español actual.
- source_word: וּבְעֵת צָרָה
  english_pob_choice: and in a time of distress
  chosen_spanish: y en tiempo de angustia
  alternatives_spanish:
  - y en tiempo de aflicción
  - y en tiempo de tribulación
  - y en tiempo de aprieto
  lexicon: HALOT
  rationale: צָרָה expresa estrechez, aflicción o angustia. «Angustia» funciona bien en paralelo con «desastre» y conserva el énfasis de la expresión.
theological_decisions:
- issue: Promesa difícil y textualmente debatida a Jeremías
  english_pob_reading: The verse is rendered as a divine assurance that Jeremiah will ultimately be released/preserved and that even the enemy will be brought to entreat him in calamity.
  chosen_spanish_reading: Se presenta como una seguridad divina de liberación o preservación para Jeremías, con la imagen de que el enemigo acabará suplicándole en la calamidad.
  alternative_spanish_readings:
  - «ciertamente he fortalecido al remanente para bien»
  - «ciertamente he intercedido por ti con el enemigo en tiempo de desastre y de angustia»
  rationale: No hay un punto doctrinal central en juego, pero el hebreo es genuinamente difícil. La redacción española conserva la lectura principal y no borra las alternativas reconocidas por la auditoría inglesa, para no resolver artificialmente la tensión textual.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La versión española sigue la última pasada de revisión, sin cambios adicionales respecto del sentido auditado en la fuente inglesa. Se conserva la incertidumbre de la primera cláusula y la alternativa de lectura para la segunda, evitando normalizar el hebreo difícil.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino en todo el pasaje.
  - Se traduce la secuencia enfática אִם לֹא ... אִם לוא con «ciertamente ... ciertamente», no como condición.
  - Se evita «SEÑOR» para no ocultar el nombre propio del texto fuente.
  - Se conserva el paralelo «desastre / angustia» para reflejar רָעָה y צָרָה como calamidad y opresión circunstancial.
  - El sujeto del segundo hemistiquio se mantiene como «el enemigo», en concordancia con la lectura auditada, sin cerrar la alternativa de intercesión divina.
