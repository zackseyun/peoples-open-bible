translation:
  language: es
  text: He visto todas las obras que se hacen debajo del sol, y he aquí, todo es vanidad[a] y un afanarse tras el viento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vapor», «aliento» o «futilidad» para «vanidad»; el hebreo הֶבֶל en Eclesiastés sugiere lo pasajero, insustancial y frustrante, no simplemente «sin sentido».
    reason: lexical_alternative
  - marker: b
    text: O «un esforzarse tras el viento». La frase hebrea רְעוּת רוּחַ es idiomática y probablemente comunica una búsqueda inútil; una posibilidad más literal sería «pastorear el viento».
    reason: lexical_alternative
lexical_decisions:
- source_word: רָאִיתִי
  english_pob_choice: I have seen
  chosen_spanish: He visto
  alternatives_spanish:
  - Vi
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una observación completada con vigencia en la reflexión del hablante. El español perfecto compuesto («he visto») conserva mejor esa fuerza de experiencia acumulada que el pretérito simple.
- source_word: הַמַּעֲשִׂים
  english_pob_choice: the works
  chosen_spanish: las obras
  alternatives_spanish:
  - las obras hechas
  - los hechos
  - las actividades
  lexicon: HALOT
  rationale: מַעֲשִׂים abarca acciones, realizaciones y empresas humanas. «Obras» es natural en español y mantiene la amplitud concreta sin reducirla a «deeds» morales ni a «actividades» modernas.
- source_word: שֶׁנַּעֲשׂוּ
  english_pob_choice: that are done
  chosen_spanish: que se hacen
  alternatives_spanish:
  - que han sido hechas
  - que se han hecho
  lexicon: HALOT
  rationale: La cláusula relativa generaliza la actividad humana contemplada por Qohelet. «Que se hacen» comunica en español una verdad habitual o general sin sobrecargar el aspecto temporal.
- source_word: תַּחַת הַשָּׁמֶשׁ
  english_pob_choice: under the sun
  chosen_spanish: debajo del sol
  alternatives_spanish:
  - bajo el sol
  - bajo el sol de este mundo
  lexicon: HALOT
  rationale: Se conserva el idiomático eclesiastés «under the sun» con una forma plenamente comprensible en español. «Debajo del sol» mantiene el valor figurado de la esfera terrenal de la experiencia humana.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y mira bien
  - y observa
  lexicon: HALOT
  rationale: La interjección introduce énfasis y sorpresa discursiva. «Y he aquí» preserva ese golpe retórico con un registro digno y todavía inteligible en español bíblico contemporáneo.
- source_word: הַכֹּל
  english_pob_choice: all
  chosen_spanish: todo
  alternatives_spanish:
  - todo ello
  - todo eso
  - el conjunto
  lexicon: HALOT
  rationale: El hebreo resume la totalidad de lo observado. «Todo» es la manera más natural de reflejar הַכֹּל sin añadir un referente innecesario ni volver la frase pesada.
- source_word: הֶבֶל
  english_pob_choice: vanity
  chosen_spanish: vanidad
  alternatives_spanish:
  - vapor
  - aliento
  - futilidad
  - transitoriedad
  lexicon: HALOT
  rationale: En Eclesiastés, הֶבֶל es un término cargado de tradición exegética. «Vanidad» conserva el registro bíblico clásico y permite mantener la tensión semántica entre fugacidad, insustancialidad y frustración; las demás posibilidades quedan abiertas como matices.
- source_word: רְעוּת רוּחַ
  english_pob_choice: a striving after wind
  chosen_spanish: un esforzarse tras el viento
  alternatives_spanish:
  - una búsqueda del viento
  - un afanarse tras el viento
  - un perseguir el viento
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y difícil. «Un esforzarse tras el viento» conserva la idea de empeño vano y la dirección imposible del esfuerzo, sin reducirla a una sola paráfrasis interpretativa. Se evita «vexación de espíritu», porque oscurece el hebreo y no refleja bien la imagen.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés al preferir una formulación más natural de הַכֹּל («todo») y una expresión formal para רְעוּת רוּחַ que conserve el valor idiomático sin perder claridad.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no contiene el tetragrámaton.
  - Se usa «vanidad» de manera consistente con el registro tradicional de Eclesiastés, mientras que las alternativas semánticas quedan registradas en la nota.
  - «Debajo del sol» conserva el idiomático literario del libro y evita explicitar en exceso la metáfora.
  - La puntuación con coma antes de «y he aquí» reproduce el giro retórico del hebreo sin volverlo artificial en español.
