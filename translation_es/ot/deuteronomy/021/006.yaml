translation:
  language: es
  text: Y todos los ancianos de aquella ciudad, los más cercanos al muerto[a], se lavarán las manos sobre la becerra cuya cerviz fue quebrada en el cauce del arroyo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al asesinado» o «al cadáver». El hebreo puede referirse a la persona muerta de forma violenta o al cuerpo de la víctima; aquí se eligió «muerto» por naturalidad, sin perder el contexto de homicidio.
    reason: lexical_alternative
  - marker: b
    text: O «en el valle», «en el barranco» o «en el lecho seco del arroyo». El hebreo נַחַל se refiere a un cauce estacional, ravina o valle asociado con un curso de agua.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֹל
  english_pob_choice: And all
  chosen_spanish: Y todos
  alternatives_spanish:
  - Entonces todos
  - Y todos ellos
  lexicon: HALOT
  rationale: La conjunción hebrea continúa el procedimiento ritual; «Y todos» conserva la coordinación y el valor inclusivo sin volver la frase pesada en español.
- source_word: זִקְנֵי הָעִיר הַהִוא
  english_pob_choice: the elders of that city
  chosen_spanish: los ancianos de aquella ciudad
  alternatives_spanish:
  - los ancianos de esa ciudad
  - los líderes de aquella ciudad
  lexicon: HALOT
  rationale: זִקְנִים designa aquí a los ancianos o autoridades civiles de la ciudad. «Ancianos» es transparente y fiel; «aquella ciudad» mantiene el demostrativo específico del hebreo.
- source_word: הַקְּרֹבִים אֶל הֶחָלָל
  english_pob_choice: nearest to the slain man
  chosen_spanish: los más cercanos al asesinado
  alternatives_spanish:
  - los más cercanos al cadáver
  - los más cercanos al muerto
  lexicon: HALOT
  rationale: חָלָל puede referirse a un hombre muerto de forma violenta. «El asesinado» conserva el contexto de homicidio que requiere esta ley; «los más cercanos» expresa el comparativo plural de proximidad.
- source_word: יִרְחֲצוּ אֶת יְדֵיהֶם
  english_pob_choice: shall wash their hands
  chosen_spanish: lavarán sus manos
  alternatives_spanish:
  - deberán lavar sus manos
  - han de lavarse las manos
  lexicon: HALOT
  rationale: El imperfecto funciona como instrucción legal/procedimental. «Lavarán» mantiene el tono normativo sin añadir matices que no están explícitos en el hebreo.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - por encima de
  lexicon: HALOT
  rationale: Aquí עַל indica la posición ritual de las manos respecto de la becerra. «Sobre» es la equivalencia española más natural y precisa.
- source_word: הָעֶגְלָה
  english_pob_choice: the heifer
  chosen_spanish: la becerra
  alternatives_spanish:
  - la novilla
  - la vaquilla
  lexicon: HALOT
  rationale: עֶגְלָה es una res joven hembra; en español «becerra» comunica juventud bovina sin cargar un tecnicismo menos usual. Se evita «novilla» por posible ambigüedad regional.
- source_word: הָעֲרוּפָה
  english_pob_choice: whose neck was broken
  chosen_spanish: cuya cerviz fue quebrada
  alternatives_spanish:
  - cuya nuca fue quebrada
  - cuya cerviz fue rota
  lexicon: HALOT
  rationale: La raíz ערף alude al quebrantamiento del cuello en este rito, no a una decapitación con espada. «Cerviz» preserva el registro bíblico y la precisión anatómica; «quebrada» refleja mejor el acto ritual que «decapitada».
- source_word: בַנָּחַל
  english_pob_choice: in the wadi
  chosen_spanish: en el valle
  alternatives_spanish:
  - en el barranco
  - en el cauce
  - en el lecho seco del arroyo
  lexicon: HALOT
  rationale: נחל puede designar un wadi, valle o cauce estacional. Para español de lectura amplia, «valle» es entendible y conserva la amplitud topográfica del término; se evita un anglicismo transliterado.
theological_decisions:
- issue: 'Alcance de הֶחָלָל: cadáver general o víctima de homicidio'
  english_pob_reading: nearest to the slain man
  chosen_spanish_reading: los más cercanos al asesinado
  alternative_spanish_readings:
  - los más cercanos al cadáver
  - los más cercanos al muerto
  rationale: La escena legal de Deuteronomio 21 presupone un homicidio no resuelto; por eso conviene explicitar la víctima como «el asesinado». Esto conserva la fuerza jurídica del pasaje sin neutralizar el contexto.
  doctrine_reference: Deuteronomio 21:1-9; cf. HALOT חָלָל
- issue: 'Descripción del rito sobre la becerra: postura de las manos'
  english_pob_reading: wash their hands over the heifer
  chosen_spanish_reading: lavarán sus manos sobre la becerra
  alternative_spanish_readings:
  - lavarán sus manos encima de la becerra
  - lavarán sus manos por encima de la becerra
  rationale: No se añade un gesto interpretativo como «imponer las manos»; el hebreo solo dice que lavan sus manos en relación con el animal. «Sobre» mantiene la relación espacial sin exagerar el simbolismo.
  doctrine_reference: Deuteronomio 21:6
translation_notes:
  revision_awareness: 'El texto coincide con la revisión más reciente del audit trail en su sentido y no requiere cambios adicionales. Se mantuvieron las decisiones de equivalencia óptima: «asesinado» para explicitar el contexto homicida, y «valle» en lugar de una transliteración técnica del topónimo hidráulico, ambos conforme al contexto legal del pasaje.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el Nombre divino.
  - Se eligió «ancianos» para זִקְנֵי porque en español bíblico es transparente y no fuerza una interpretación eclesiástica.
  - «Cerviz» conserva el tono bíblico y evita la ambigüedad de «cuello» en un rito animal.
  - «Becerra» y no «heifer» ni un calco, para una lectura natural en español latinoamericano.
