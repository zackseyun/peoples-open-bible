translation:
  text: O reason[b][a], tyrant over the passions of children! And godliness is to a mother more longed for than children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'O reason, tyrant over the passions of the children'; the genitive 'of children' may be taken closely with 'passions,' though the sense remains that reason rules passions and that devotion to God outweighs even a mother's attachment to her children.
    reason: lexical_alternative
  - marker: b
    text: Or 'piety is more desirable to a mother than children.'
    reason: alternative_reading
lexical_decisions:
- source_word: λογισμέ
  chosen: reason
  alternatives:
  - rational mind
  - reasoning
  lexicon: LSJ
  rationale: In 4 Maccabees, λογισμός is a key theme denoting rational judgment or reason governing the passions. The vocative λογισμέ is best rendered 'reason' in concise, natural English while preserving the book's philosophical emphasis.
- source_word: τέκνων
  chosen: of children
  alternatives:
  - of sons
  - of offspring
  lexicon: LSJ
  rationale: τέκνα broadly means children/offspring. 'Children' is the most natural and least over-specific rendering here, and it fits both occurrences in the verse.
- source_word: παθῶν
  chosen: passions
  alternatives:
  - sufferings
  - emotions
  - desires
  lexicon: LSJ
  rationale: In this work πάθη commonly refers to passions or emotional impulses subject to rational control, not merely sufferings. 'Passions' preserves the philosophical-moral sense.
- source_word: τύραννε
  chosen: tyrant over
  alternatives:
  - master of
  - despot over
  lexicon: LSJ
  rationale: The vocative τύραννε is metaphorical and forceful. 'Tyrant over' preserves the vivid image of dominating rule exercised by reason over the passions.
- source_word: εὐσέβεια
  chosen: godliness
  alternatives:
  - piety
  - reverence
  lexicon: LSJ
  rationale: εὐσέβεια in 4 Maccabees denotes devout fidelity toward God. 'Godliness' is accessible modern English and keeps the explicitly God-directed sense better than the somewhat narrower 'piety'.
- source_word: μητρί
  chosen: to a mother
  alternatives:
  - for a mother
  - in a mother
  lexicon: LSJ
  rationale: The dative marks reference or relation. 'To a mother' is slightly formal but reflects the Greek structure and the comparative statement that follows.
- source_word: ποθεινοτέρα
  lemma: ποθέω
  chosen: more longed for
  alternatives:
  - more desirable
  - more beloved
  - more cherished
  lexicon: LSJ
  rationale: The comparative adjective from ποθέω/ποθεινός conveys being more yearned for or desired. 'More longed for' keeps the emotional force, though idiomatic English could also use 'more desirable.'
