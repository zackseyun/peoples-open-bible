translation:
  language: es
  text: Y las calamidades[a] y la maldición que Yahvé dispuso[b] para Moisés, su siervo, se nos adhirieron, el día en que sacó a nuestros padres para darnos una tierra que fluye con leche y miel, como sucede hasta hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los males»; aquí el griego probablemente se refiere a juicios desastrosos más que a males morales.
    reason: lexical_alternative
  - marker: b
    text: O «ordenó», «decretó» o «prescribió».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκολλήθη
  english_pob_choice: clung to
  chosen_spanish: se nos pegaron
  alternatives_spanish:
  - se nos adhirieron
  - se nos pegaron fuertemente
  - se nos quedaron encima
  lexicon: BDAG
  rationale: El pasivo de κολλάω expresa una adhesión estrecha y persistente; «se nos pegaron» conserva la imagen de algo que se adhiere de manera tenaz sin volverla más abstracta.
- source_word: τὰ κακὰ
  english_pob_choice: the calamities
  chosen_spanish: las calamidades
  alternatives_spanish:
  - los males
  - las desgracias
  - las desgracias enviadas
  lexicon: BDAG
  rationale: En este contexto de juicio del pacto, τὰ κακά apunta a desastres y aflicciones sobrevenidas, no a maldad moral. «Calamidades» comunica bien ese sentido.
- source_word: ἡ ἀρὰ
  english_pob_choice: the curse
  chosen_spanish: la maldición
  alternatives_spanish:
  - la maldición del pacto
  - la imprecación
  - la maldición jurada
  lexicon: BDAG
  rationale: Aunque ἀρά puede tener matiz técnico de maldición de pacto, «maldición» es la forma natural y suficientemente solemne en español; el contexto con Moisés y el éxodo preserva la referencia covenantal sin sobreexplicar.
- source_word: συνέταξεν
  english_pob_choice: appointed
  chosen_spanish: había dispuesto
  alternatives_spanish:
  - había ordenado
  - había decretado
  - había prescrito
  lexicon: BDAG
  rationale: El verbo puede implicar ordenar, decretar o prescribir. «Había dispuesto» transmite que Yahvé estableció esas sanciones en relación con Moisés, con un tono idiomático y bíblico.
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: Tradition / divine-name policy
  rationale: Según la política del proyecto, el nombre divino se vierte como «Yahvé» cuando el griego Κύριος refleja el nombre sagrado. Así se evita el ocultamiento del tetragrámaton.
- source_word: παιδὶ αὐτοῦ
  english_pob_choice: his servant
  chosen_spanish: su siervo
  alternatives_spanish:
  - su hijo
  - su servidor
  lexicon: BDAG
  rationale: Aunque παῖς puede significar «niño/ni hijo», con Moisés el sentido bíblico natural es el de servidor o siervo de Dios. «Siervo» es el equivalente más fiel y consagrado en este contexto.
- source_word: ἐν ἡμέρᾳ ᾗ
  english_pob_choice: on the day when
  chosen_spanish: el día en que
  alternatives_spanish:
  - en el día en que
  - cuando
  lexicon: BDAG
  rationale: La construcción temporal se expresa con naturalidad en español como «el día en que», manteniendo la ancla temporal del éxodo.
- source_word: ἐξήγαγεν
  english_pob_choice: he brought ... out
  chosen_spanish: sacó
  alternatives_spanish:
  - hizo salir
  - sacó fuera
  - liberó
  lexicon: BDAG
  rationale: En el lenguaje del éxodo, «sacó» reproduce de forma directa y tradicional el movimiento de sacar al pueblo de la esclavitud.
- source_word: γῆν ῥέουσαν γάλα καὶ μέλι
  english_pob_choice: a land flowing with milk and honey
  chosen_spanish: una tierra que fluye leche y miel
  alternatives_spanish:
  - una tierra que mana leche y miel
  - una tierra rebosante de leche y miel
  lexicon: BDAG
  rationale: Se mantiene la fórmula bíblica tradicional y reconocible. «Fluye leche y miel» sigue de cerca el participio griego y conserva la imagen de abundancia.
- source_word: ὡς ἡ ἡμέρα αὕτη
  english_pob_choice: as it is this day
  chosen_spanish: como lo es hasta hoy
  alternatives_spanish:
  - hasta este día
  - como en este día
  lexicon: BDAG
  rationale: La clausula final expresa continuidad desde el momento del habla hasta el presente; «como lo es hasta hoy» comunica ese valor con fluidez en español.
theological_decisions:
- issue: Sanciones del pacto y su alcance
  english_pob_reading: The verse refers to covenant judgments attaching to the people as consequences announced by the Lord through Moses.
  chosen_spanish_reading: El versículo presenta calamidades y maldición como consecuencias del pacto que recayeron sobre el pueblo desde la época de Moisés.
  alternative_spanish_readings:
  - Un enunciado general de desgracias sin trasfondo de pacto
  - Una maldición meramente retórica sin referencia a la alianza
  rationale: La referencia a Moisés, al éxodo y a la tierra prometida exige conservar el trasfondo de pacto. La traducción mantiene esa tensión sin convertir el versículo en una cita explícita de Deuteronomio.
  doctrine_reference: Mantener la resonancia deuteronómica y la primacía del texto original, sin resolver en exceso la referencia teológica.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que ajustó la relación sintáctica de συνέταξεν hacia una lectura más directa con el dativo («for Moses»), por lo que en español se optó por «había dispuesto para Moisés»/«había dispuesto para Moisés, su siervo» en lugar de una paráfrasis instrumental. También se respetó la nota de que τὰ κακά puede leerse como desastres/juicios y que παῖς con Moisés significa «siervo».
  spanish_consistency_notes:
  - Se usó «Yahvé» para Κύριος conforme a la política del proyecto.
  - Se mantuvo «siervo» para παιδὶ αὐτοῦ por el contexto de Moisés.
  - Se conservó la fórmula bíblica «tierra que fluye leche y miel» por su valor intertextual.
  - La clausula final se verte como continuidad temporal, no como comentario doctrinal adicional.
