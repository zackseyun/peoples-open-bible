review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo: fórmula profética, pregunta retórica, imagen botánica, y la cláusula final instrumental. Sin embargo, falta preservar una alternativa léxica importante documentada en el POB inglés para יְנַתֵּק / raíces (''arrancar/desarraigar/arrancar de raíz''), mientras que la nota actual sobre ''brazo'' no corresponde a la ubicación del marcador [a], que está anclado en ''Di[a]'' y no en ''brazo''. También conviene mejorar ''brazo grande'' a ''brazo fuerte'' o equivalente más natural sin perder la metáfora.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero presenta un problema formal de notas: el marcador [a] está mal colocado y genera incoherencia. Además, ''brazo grande'' suena poco natural en español bíblico actual; ''brazo fuerte'' conserva mejor la metáfora y la legibilidad. ''Será levantada de sus raíces'' es aceptable, aunque ''arrancada de sus raíces'' sería demasiado interpretativo frente a לְמַשְׂאוֹת.'
  glossary_alignment: 'Buena alineación general con el glosario del proyecto: יְהוָה → ''Yahvé'', אֲדֹנָי + יְהוָה → ''el Señor Yahvé'', imágenes botánicas preservadas. No hay conflicto doctrinal mayor. La única desviación relevante es de documentación/footnotes, no de terminología principal.'
  issues:
  - severity: medium
    issue: El marcador de nota [a] está anclado en 'Di[a]' pero la nota trata sobre 'brazo'.
    rationale: Las instrucciones exigen que cada nota esté anclada exactamente en la palabra o frase pertinente. Tal como está, el aparato de notas es incorrecto y confuso.
  - severity: medium
    issue: Falta reflejar en español la alternativa léxica documentada en el POB inglés para יְנַתֵּק.
    rationale: El inglés conserva una nota alternativa sobre el matiz de 'pull up/uproot/tear loose'. En español conviene preservar esa alternativa porque el hebreo puede enfatizar el arrancar de raíz.
  - severity: low
    issue: '''brazo grande'' suena poco idiomático en español.'
    rationale: Aunque literal, en español moderno la metáfora se entiende mejor como 'brazo fuerte' o, menos literalmente, 'gran fuerza'. Dado que el proyecto prefiere conservar la metáfora, 'brazo fuerte' es la mejor reparación.
  revised_spanish_text: 'Di: «Así dice el Señor Yahvé: ¿Prosperará? ¿No arrancará[a] sus raíces y cortará su fruto, de modo que se seque? Todas las hojas tiernas de su brote se secarán. Y no con un brazo fuerte[b] ni con mucha gente será levantada de sus raíces».


    [a] O “arrancará de raíz”; el verbo hebreo también puede enfatizar el desarraigar o arrancar por completo.

    [b] Hebreo literal: “brazo”; aquí conserva el valor figurado de fuerza o poder.'
  revised_footnotes:
