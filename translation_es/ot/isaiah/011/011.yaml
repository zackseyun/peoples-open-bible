review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: fórmula profética temporal, repetición de la acción divina, preservación de la imagen de la mano, remanente, y la lista geográfica. También acierta al traducir אֲדֹנָי como «el Señor», no «Yahvé», porque aquí es título y no el Tetragrámaton. Sin embargo, hay un desajuste importante entre el texto y la nota cultural: el texto usa «Cus» mientras la nota explica «Cush». Conviene unificar el topónimo como «Cus» en la nota. Además, el marcador [b] está anclado en «Cus», pero la nota sobre Hamat/Hamath del inglés no se preservó; no es obligatoria porque no añade ambigüedad nueva en español, pero la nota cultural sí debe corresponder exactamente al nombre usado en el texto.'
  spanish_quality_summary: El español es claro, natural y de registro digno. «Y sucederá en aquel día» suena bien; «volverá a extender su mano, por segunda vez» preserva con buena fluidez la duplicación hebrea; «remanente» es terminología adecuada. «Recuperar» es defendible en contexto, especialmente dado el audit trail revisado del inglés. El ajuste principal es de consistencia editorial en la nota de «Cus».
  glossary_alignment: 'Buena alineación con la terminología del proyecto: אֲדֹנָי -> «el Señor» correctamente por tratarse de título; שְׁאָר -> «remanente» bien; topónimos mayormente transliterados: Asiria, Patros, Cus, Elam, Sinar, Hamat. No hay conflicto con la política de «Yahvé», porque el hebreo no usa יהוה aquí. Se mantiene la preferencia por transliterar «Cus» en vez de «Etiopía».'
  issues:
  - severity: medium
    issue: Inconsistencia entre «Cus» en el texto y «Cush» en la nota [b]
    rationale: La nota debe explicar exactamente el término presente en el texto español. Mantener dos formas distintas para el mismo topónimo crea confusión y debilita la consistencia editorial.
  - severity: low
    issue: La nota [a] dice «comprar/adquirir»
    rationale: Aunque busca explicar el núcleo léxico de קנה, «comprar» puede sonar demasiado comercial en español bíblico. «Adquirir» basta para preservar la alternativa literal sin introducir una imagen menos natural.
  revised_spanish_text: Y sucederá en aquel día que el Señor volverá a extender su mano, por segunda vez, para recuperar[a] el remanente de su pueblo que quede, de Asiria, de Egipto, de Patros, de Cus[b], de Elam, de Sinar, de Hamat y de las costas del mar[c].
  revised_footnotes:
  - marker: a
    text: O «para adquirir ...». El hebreo dice literalmente «adquirir», pero en este contexto la idea es la de volver a tomar o recobrar al remanente.
    reason: lexical_alternative
  - marker: b
    text: Cus es el nombre hebreo del lugar, a menudo asociado con regiones al sur de Egipto; algunas traducciones dicen «Etiopía».
    reason: cultural_note
  - marker: c
    text: O «de las islas del mar». La expresión hebrea puede referirse a islas o, más ampliamente, a regiones costeras marítimas.
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal casi intacto porque es fiel y natural, pero se corrige la inconsistencia entre el topónimo del texto y la nota cultural, y se afina la nota léxica para evitar un matiz innecesariamente comercial en «comprar».
