translation:
  language: es
  text: de detrás de las ovejas que crían lo trajo[a], para pastorear a Jacob su pueblo, e Israel su herencia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de seguir tras las ovejas con cría».'
    reason: lexical_alternative
  - marker: b
    text: «Herencia» también puede traducirse «posesión» o «patrimonio».
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵאַחַר
  english_pob_choice: from following
  chosen_spanish: desde el seguir a
  alternatives_spanish:
  - desde detrás de
  - desde el ir tras
  - desde el seguir de
  lexicon: HALOT
  rationale: La expresión hebrea con אַחַר funciona idiomáticamente como 'desde ir siguiendo' o 'desde detrás de'. En español, 'desde el seguir a' conserva la imagen pastoral y la dirección relacional mejor que una paráfrasis más interpretativa.
- source_word: עָלוֹת
  english_pob_choice: the nursing ewes
  chosen_spanish: las ovejas que amamantaban
  alternatives_spanish:
  - las ovejas lactantes
  - las ovejas con cría
  - las madres ovejas
  lexicon: HALOT
  rationale: El participio femenino plural señala ovejas que están criando o amamantando crías. 'Ovejas que amamantaban' expresa de forma clara y natural en español la especificidad pastoral del término sin perder su fuerza concreta.
- source_word: הֱבִיאוֹ
  english_pob_choice: he brought him
  chosen_spanish: lo trajo
  alternatives_spanish:
  - lo llevó
  - lo condujo
  - lo llevó consigo
  lexicon: HALOT
  rationale: El Hifil de בוא aquí significa 'traer'. 'Lo trajo' es la correspondencia más directa y mantiene al sujeto implícito que actúa conforme al contexto previo.
- source_word: לִרְעוֹת
  english_pob_choice: to shepherd
  chosen_spanish: para pastorear
  alternatives_spanish:
  - para apacentar
  - para cuidar como pastor
  - para pastorear a
  lexicon: HALOT
  rationale: Como el objeto es el pueblo de Jacob/Israel, conviene preservar el verbo pastoral. 'Pastorear' mantiene el metáforo-royal y evita reducir la acción a solo alimentar o dirigir.
- source_word: בְּיַעֲקֹב עַמּוֹ
  english_pob_choice: Jacob his people
  chosen_spanish: a Jacob, su pueblo
  alternatives_spanish:
  - a Jacob, su pueblo
  - entre Jacob, su pueblo
  - sobre Jacob, su pueblo
  lexicon: HALOT
  rationale: La preposición y la aposición se traducen con una construcción fluida en español. La coma ayuda a conservar la relación explicativa entre Jacob y 'su pueblo' sin oscurecer el paralelismo poético.
- source_word: וּבְיִשְׂרָאֵל נַחֲלָתוֹ
  english_pob_choice: and Israel his inheritance
  chosen_spanish: e Israel, su herencia
  alternatives_spanish:
  - e Israel, su herencia
  - e Israel, su posesión
  - e Israel, su patrimonio
  lexicon: HALOT
  rationale: נַחֲלָה puede ser 'herencia', 'posesión' o 'patrimonio'. 'Herencia' es la opción más transparente y conserva la resonancia de pertenencia pactual; en español, 'su herencia' suena natural y solemne.
theological_decisions:
- issue: Imagen de pastor aplicado a David
  english_pob_reading: Retain the shepherding imagery explicitly ('to shepherd') rather than flattening it to 'to lead' or 'to care for.'
  chosen_spanish_reading: Mantener explícitamente 'pastorear' en vez de suavizarlo a 'dirigir' o 'cuidar'.
  alternative_spanish_readings:
  - para dirigir a Jacob
  - para cuidar a Jacob
  - para gobernar a Jacob
  rationale: El versículo enlaza el oficio real de David con su trabajo literal con ovejas. 'Pastorear' preserva esa conexión literaria y teológica sin añadir formulaciones doctrinales ajenas al texto.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: El borrador sigue el último pase de revisión, que indica conformidad alta y sin cambios necesarios; se mantuvo la lectura pastoral explícita y la equivalencia léxica principal del audit trail inglés.
  spanish_consistency_notes:
  - Se preserva 'Yahvé' según el estándar del proyecto cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - Se eligió 'pastorear' para mantener la metáfora pastoral y su posible valor real/ministerial sin reemplazarla por un verbo más general.
  - '''Herencia'' se usa como equivalente principal de נַחֲלָה por ser la opción más directa y pactual en español.'
