review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: corrupción interna (''en vuestro corazón''), práctica deliberada de la injusticia y acción pública violenta. También conserva adecuadamente la metáfora final de pesar/medir violencia. Sin embargo, los marcadores de notas están invertidos respecto a las notas inglesas y a su punto de anclaje: [a] debe ir con ''sobre la tierra'' / ''en la tierra'', y [b] con ''pesan'' / ''miden''.'
  spanish_quality_summary: El español es inteligible y digno, pero 'Sí, aun' suena algo forzado y poco natural en español bíblico contemporáneo. 'Sí, aun' puede simplificarse a 'Aun' para mantener la fuerza enfática sin pesadez. El resto del verso lee bien; 'cometéis injusticia' y 'vuestras manos pesan violencia' son comprensibles, aunque la segunda expresión es deliberadamente poética.
  glossary_alignment: 'No hay términos del glosario maestro en disputa en este versículo. Las decisiones léxicas principales están bien alineadas con la auditoría inglesa: עוֹלֹת -> ''injusticia'', חֲמַס -> ''violencia'', תְּפַלֵּסוּן -> ''pesan''. La única corrección necesaria es de anclaje y orden de notas al pie.'
  issues:
  - severity: medium
    issue: Marcadores de notas al pie mal anclados e invertidos
    rationale: En el texto inglés, la nota sobre 'earth/land' corresponde a בָּאָרֶץ y la nota sobre 'weigh/measure' corresponde a תְּפַלֵּסוּן. En el borrador español, [a] está puesto en 'injusticia' pero su contenido habla de 'tierra', y [b] está puesto en 'pesan' con contenido correcto. Esto rompe la trazabilidad del audit trail y la disciplina de notas.
  - severity: low
    issue: '''Sí, aun'' suena poco natural'
    rationale: Aunque intenta reflejar la fuerza de אַף, la combinación 'Sí, aun' resulta redundante y menos natural que 'Aun' o 'Incluso'. 'Aun' conserva bien la acusación enfática sin sobrecargar el arranque del verso.
  revised_spanish_text: Aun en vuestro corazón cometéis injusticia; sobre la tierra[a] vuestras manos pesan[b] violencia.
  revised_footnotes:
  - marker: a
    text: 'O: «en la tierra» en vez de «sobre la tierra».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «miden» o «miden y distribuyen» violencia. El verbo hebreo puede llevar la idea de pesar o medir.'
    reason: lexical_alternative
  revision_rationale: 'Se corrige el problema principal de fidelidad editorial: las notas al pie ahora están ancladas al sintagma correcto y en el orden debido. Además, se mejora ligeramente la naturalidad del arranque sustituyendo ''Sí, aun'' por ''Aun'', sin perder la fuerza enfática de אַף.'
