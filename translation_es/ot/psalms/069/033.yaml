revisions:
- from: Los humildes han visto y se alegran[a]; ustedes que buscan a Dios, que viva su corazón[b][c].
  to: Los humildes han visto y se alegran[a]; ustedes que buscan a Dios, que vivan sus corazones[b][c].
  rationale: Se ajusta el cierre a «que vivan sus corazones» para que el español sea natural y concuerde con «ustedes», en línea con la revisión ya adoptada en el inglés POB. Se conserva en nota el singular hebreo «que viva su corazón» por su valor idiomático y documental. También se corrige la clasificación de la nota c para reflejar mejor el audit trail.
