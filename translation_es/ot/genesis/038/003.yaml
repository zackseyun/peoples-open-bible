translation:
  language: es
  text: Concibió y dio a luz un hijo,[a] y él lo llamó Er.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «y él llamó su nombre Er», con verbo masculino singular; el sujeto más natural es Judá.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַתַּהַר
  english_pob_choice: She conceived
  chosen_spanish: Concibió
  alternatives_spanish:
  - Quedó encinta
  - Se embarazó
  lexicon: HALOT
  rationale: הרה expresa el inicio del embarazo/concepción. En español, «concibió» es breve, narrativo y digno, y conserva bien la secuencia de acción sin añadir explicaciones.
- source_word: וַתֵּלֶד
  english_pob_choice: and bore
  chosen_spanish: y dio a luz
  alternatives_spanish:
  - y parió
  - y alumbró
  lexicon: HALOT
  rationale: ילד en qal significa dar a luz. «Dar a luz» es la formulación más natural y clara en español contemporáneo para un registro bíblico reverente.
- source_word: בֵּן
  english_pob_choice: a son
  chosen_spanish: un hijo
  alternatives_spanish:
  - un varón
  - un niño
  lexicon: HALOT
  rationale: בֵּן puede referirse a un hijo varón. En español, «hijo» comunica el sentido familiar/narrativo de manera más natural que «varón» o «niño».
- source_word: וַיִּקְרָא אֶת־שְׁמוֹ
  english_pob_choice: and he called his name
  chosen_spanish: y le puso por nombre
  alternatives_spanish:
  - y llamó su nombre
  - y lo nombró
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «llamó su nombre», pero en español bíblico claro «le puso por nombre» transmite el acto de nombrar de forma idiomática sin perder el contenido.
- source_word: עֵר
  english_pob_choice: Er
  chosen_spanish: Er
  alternatives_spanish:
  - Er
  lexicon: convención onomástica
  rationale: Los nombres propios se transliteran. La forma española convencional es «Er».
theological_decisions:
- issue: Sujeto implícito de וַיִּקְרָא
  english_pob_reading: 'The subject is rendered as Judah: ''and he called his name Er.'''
  chosen_spanish_reading: Se mantiene la ambigüedad gramatical del hebreo en una nota, porque el verbo está en masculino singular y el sujeto más natural es Judá.
  alternative_spanish_readings:
  - y él le puso por nombre Er
  - y ella le puso por nombre Er
  - y fue llamado Er
  rationale: El hebreo cambia de verbos femeninos («concibió», «dio a luz») a un verbo masculino singular en «llamó». En español, traducir simplemente «le puso por nombre» conserva la referencia pero no explicita el sujeto; la nota deja constancia de que el sujeto más probable es Judá, como indica el análisis gramatical del texto fuente.
  doctrine_reference: Principio de primacía del idioma original; consistencia con la gramática del texto fuente
translation_notes:
  revision_awareness: 'El contexto de auditoría en inglés no requiere revisiones adicionales: la observación clave es la discordancia entre los verbos femeninos previos y el verbo masculino singular final, que se conserva mediante nota sin forzar una armonización en el cuerpo del texto.'
  spanish_consistency_notes:
  - Se conserva un español natural y breve, acorde con narrativa genealógica.
  - «Dar a luz» y «poner por nombre» son fórmulas idiomáticas bíblicas claras en español.
  - No se usa «SEÑOR» ni terminología teológica ajena al versículo.
  - La nota mantiene la tensión gramatical documentada sin sobreinterpretarla.
