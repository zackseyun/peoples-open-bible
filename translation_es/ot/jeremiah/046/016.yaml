review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo y del POB inglés: sujeto implícito singular en הִרְבָּה, idea de tropiezo multiplicado, colapso mutuo en combate, exhortación a regresar al propio pueblo y tierra natal, y la lectura contextual de הַיּוֹנָה como «opresor» con nota alternativa. Sin embargo, la nota al pie está mal anclada: el marcador [a] aparece en «ha multiplicado» pero la nota corresponde a la frase final «la espada del opresor».'
  spanish_quality_summary: El español es claro y digno, pero «Él ha multiplicado los que tropiezan» suena algo forzado; «ha multiplicado a los que tropiezan» o «ha multiplicado los tropiezos» serían más naturales. Dado que la decisión léxica documentada prefiere referente humano/colectivo, conviene añadir la preposición personal y mantener la referencia a personas. También es mejor mover la nota al lugar pertinente.
  glossary_alignment: No hay conflictos con la terminología de proyecto. «Opresor» coincide con la decisión auditada para הַיּוֹנָה; «pueblo», «tierra de nuestro nacimiento» y «espada» están bien. «Levántate» es aceptable aunque el POB inglés usó «Come» por idiomaticidad; no exige corrección.
  issues:
  - severity: medium
    issue: Marcador de nota al pie colocado en la palabra equivocada
    rationale: La nota explica הַיּוֹנָה («opresor» / «paloma»), no הִרְבָּה («ha multiplicado»). Debe anclarse en «opresor» o en la frase final correspondiente.
  - severity: medium
    issue: Falta la preposición personal en «ha multiplicado los que tropiezan»
    rationale: En español estándar, con objeto humano definido/colectivo, «ha multiplicado a los que tropiezan» es más natural y legible, y preserva la decisión de entender כּוֹשֵׁל como personas que tropiezan.
  revised_spanish_text: 'Él ha multiplicado a los que tropiezan; sí, cada hombre cae contra su compañero, y dicen: «Levántate, y volvamos a nuestro pueblo y a la tierra de nuestro nacimiento, lejos de la espada del opresor[a]».'
  revised_footnotes:
  - marker: a
    text: O «la espada de la paloma». El hebreo puede leerse literalmente así, pero en el contexto suele entenderse como «la espada del opresor» o «del violento».
    reason: alternative_reading
  revision_rationale: Se corrige la sintaxis española con la preposición personal «a» y se reubica la nota al pie al término que realmente explica, sin cambiar el sentido ni las decisiones léxicas principales del POB.
