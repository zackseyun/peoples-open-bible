review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: exhortación urgente a Abigail, razón introducida por כִּי, desastre fijado contra Nabal y su casa, y la descripción idiomática de su carácter obstinado. Sin embargo, hay dos puntos mejorables frente al rastro POB y al hebreo: (1) «qué debes hacer» suena más fuerte que el valor deliberativo de מַה תַּעֲשִׂי, mejor «qué deberías hacer»; (2) la nota al pie actual explica «considera», pero la nota preservada en el inglés POB corresponde a בֶּן בְּלִיַּעַל, no a וּרְאִי.'
  spanish_quality_summary: El español es claro y digno, pero puede afinarse para mayor naturalidad y precisión semántica. «El mal ha sido determinado» suena menos idiomático en este contexto de amenaza violenta; «la calamidad ha sido decidida» o similar comunica mejor el sentido de כָלְתָה הָרָעָה. «Nuestro señor» es comprensible, pero «nuestro amo» encaja mejor en boca de un siervo doméstico; aun así, «señor» no es erróneo. La frase final es natural.
  glossary_alignment: No hay términos del glosario mayor en juego salvo la decisión idiomática sobre בֶּן בְּלִיַּעַל. El borrador sigue correctamente la línea del POB al evitar «Belial» en el texto principal, pero debe conservar esa alternativa tradicional en nota, como hace el inglés POB.
  issues:
  - severity: medium
    issue: La nota al pie está anclada al segmento equivocado.
    rationale: El inglés POB documenta una alternativa léxica para בֶּן בְּלִיַּעַל («son of worthlessness» / «son of Belial»), no para וּרְאִי. La nota española debería preservar esa alternativa en el lugar correspondiente del texto.
  - severity: medium
    issue: «Qué debes hacer» sobretraduce el imperfecto deliberativo.
    rationale: מַה תַּעֲשִׂי en este contexto pide deliberación prudente, no una obligación explícita. «Qué deberías hacer» conserva mejor el matiz del POB inglés («what you should do»).
  - severity: low
    issue: «El mal ha sido determinado» suena poco idiomático en español para este contexto narrativo.
    rationale: Aunque defendible, «mal» aquí puede sonar moral más que calamitoso. El inglés POB justificó «disaster». En español, «la calamidad ha sido decidida» o «el desastre está decidido» expresa mejor la amenaza inminente sin perder fidelidad.
  revised_spanish_text: Ahora, sabe esto y considera qué deberías hacer, porque la calamidad ha sido decidida contra nuestro amo y contra toda su casa, y él es un hombre tan vil[a] que no se le puede hablar.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «un hijo de indignidad»; tradicionalmente, «un hijo de Belial».'
    reason: lexical_alternative
  revision_rationale: Se corrige el matiz deliberativo de מַה תַּעֲשִׂי con «deberías hacer», se sustituye la nota para alinearla con la alternativa léxica documentada por el POB en בֶּן בְּלִיַּעַל, y se mejora la naturalidad contextual de כָלְתָה הָרָעָה con «la calamidad ha sido decidida». También se usa «amo» para reflejar mejor el registro doméstico de אֲדֹנֵינוּ en este contexto.
