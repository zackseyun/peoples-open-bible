translation:
  language: es
  text: Entonces lo abatieron[a], a él, a sus hijos y a todo su pueblo, hasta no dejarle ningún sobreviviente; y tomaron posesión de su tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo derrotaron» o «lo mataron». El verbo hebreo en contexto militar puede expresar golpear con fuerza letal, derrotar o matar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכּוּ
  english_pob_choice: struck ... down
  chosen_spanish: los hirieron
  alternatives_spanish:
  - los golpearon
  - los derrotaron
  - los abatieron
  lexicon: HALOT
  rationale: El verbo נכה en contexto militar puede expresar golpear, derrotar o matar. «Los hirieron» conserva la acción concreta sin forzar una especificación más fuerte que el hebreo inmediato por sí solo, aunque el contexto de destrucción total la sugiere.
- source_word: אֹתוֹ
  english_pob_choice: him
  chosen_spanish: a él
  alternatives_spanish:
  - lo
  - a Og
  lexicon: HALOT
  rationale: El pronombre retoma a Og del versículo anterior. «A él» mantiene la referencia sin añadir el nombre propio que no aparece en este versículo.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus hijos varones
  - a sus hijos e hijas
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus hijos» en masculino plural. En español, «hijos» puede ser neutral o masculino; aquí se prefiere una formulación natural y fiel al masculino plural del original.
- source_word: כָּל עַמּוֹ
  english_pob_choice: all his people
  chosen_spanish: a todo su pueblo
  alternatives_spanish:
  - a toda su gente
  - a toda su población
  - a todo su ejército
  lexicon: HALOT
  rationale: עַם normalmente significa «pueblo». En este contexto de conquista abarca a los sometidos bajo su autoridad, no solo a soldados; «pueblo» es el equivalente más amplio y fiel.
- source_word: עַד בִּלְתִּי הִשְׁאִיר לוֹ שָׂרִיד
  english_pob_choice: until he had no survivor left
  chosen_spanish: hasta no dejarle ningún sobreviviente
  alternatives_spanish:
  - hasta no dejarle remanente alguno
  - hasta que no le quedó sobreviviente
  lexicon: HALOT
  rationale: 'El giro expresa una negación total: literalmente, «hasta no dejarle un sobreviviente». «No dejarle ningún sobreviviente» conserva la fuerza idiomática y evita introducir un tecnicismo como «remanente» que en español puede sonar teológico.'
- source_word: שָׂרִיד
  english_pob_choice: survivor
  chosen_spanish: sobreviviente
  alternatives_spanish:
  - superviviente
  - remanente
  lexicon: HALOT
  rationale: En este marco bélico, «sobreviviente» es claro y directo. «Remanente» podría sugerir una carga técnica ajena al pasaje.
- source_word: וַיִּירְשׁוּ
  english_pob_choice: took possession of
  chosen_spanish: tomaron posesión de
  alternatives_spanish:
  - heredaron
  - poseyeron
  - ocuparon
  lexicon: HALOT
  rationale: ירשׁ puede significar heredar, poseer o tomar posesión según el contexto. Aquí describe la apropiación territorial tras la victoria, por lo que «tomaron posesión de» reproduce bien el resultado.
- source_word: אַרְצוֹ
  english_pob_choice: his land
  chosen_spanish: su tierra
  alternatives_spanish:
  - su territorio
  - su país
  lexicon: HALOT
  rationale: אֶרֶץ se refiere al territorio de Og. «Tierra» es la forma más natural y suficientemente amplia en español bíblico contemporáneo.
translation_notes:
  revision_awareness: El texto hebreo y el aparato inglés están en alto acuerdo y no muestran revisiones aplicadas; por eso la versión española sigue de cerca el valor militar totalizante del original y conserva la misma ambigüedad controlada del hebreo en la cláusula de aniquilación.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se usa un registro bíblico moderno y claro, evitando arcaísmos innecesarios.
  - «Sobreviviente» se eligió para reflejar שָׂרִיד sin cargar el verso con terminología técnica de «remanente».
