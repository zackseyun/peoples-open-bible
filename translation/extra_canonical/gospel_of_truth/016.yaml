  - need
  lexicon: Crum
  rationale: Valentinian contrast between Fullness and Deficiency; “deficiency” preserves
    technical opposition to Pleroma.
- source_word: ⲁⲡⲟⲩⲁⲉⲓⲛ
  chosen: the Light
  alternatives:
  - light
  lexicon: Crum
  rationale: Definite article in Coptic; capitalization signals personified/light-of-revelation
    nuance in the treatise.
- source_word: ϫⲏⲕ/ϫⲱⲕ
  chosen: complete
  alternatives:
