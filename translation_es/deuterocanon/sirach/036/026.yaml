revisions:
- from: El que adquiere una esposa comienza una adquisición, una ayuda correspondiente a él y una columna de reposo.
  to: El que adquiere una esposa comienza una adquisición, una ayudante correspondiente a él y un pilar de reposo.
  rationale: Se reemplaza «ayuda» por «ayudante» para reflejar mejor el referente personal de βοηθὸν, y «columna» por «pilar» para seguir más de cerca στύλον y la decisión léxica del audit trail. El resto del texto preserva adecuadamente el sentido, la sintaxis proverbial y el juego cognado del griego.
