base_translation:
  language: en
  yaml_path: translation/ot/genesis/001/020.yaml
  text: And God said[a], “Let the waters swarm with swarms of living creatures[c][b], and let birds fly above the earth across the face of the expanse of the heavens.”
  footnotes:
  - marker: a
    text: Or “Let the waters teem with living creatures.” The Hebrew uses a verb and cognate noun (“swarm with swarms”), emphasizing abundant life.
    reason: lexical_alternative
  - marker: b
    text: Or “flying creatures” for “birds.” The Hebrew עוֹף can be broader than strictly birds.
    reason: lexical_alternative
  - marker: c
    text: “Expanse” may also be rendered “firmament” or “vault.”
    reason: lexical_alternative
