translation:
  language: es
  text: A estos se repartirá la tierra como heredad, según el número de nombres[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «según el número de personas»; literalmente, «según el número de nombres».
    reason: lexical_alternative
lexical_decisions:
- source_word: לָאֵלֶּה
  english_pob_choice: To these
  chosen_spanish: A estos
  alternatives_spanish:
  - Para estos
  - Entre estos
  lexicon: HALOT
  rationale: El ל con demostrativo plural indica los destinatarios del reparto. «A estos» conserva la referencia direccional/dativa de forma natural en español, sin perder el sentido de asignación.
- source_word: תֵּחָלֵק
  english_pob_choice: shall be divided
  chosen_spanish: se repartirá
  alternatives_spanish:
  - será dividida
  - se dividirá
  - será repartida
  lexicon: HALOT
  rationale: La nifal imperfecta de חלק expresa una acción pasiva de distribución. «Se repartirá» comunica bien la división/apartición territorial en español bíblico moderno y encaja con el contexto de heredad.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  lexicon: HALOT
  rationale: En el contexto de las porciones tribales, «la tierra» es la forma más natural y fiel en español para הארץ.
- source_word: בְּנַחֲלָה
  english_pob_choice: as an inheritance
  chosen_spanish: como heredad
  alternatives_spanish:
  - como herencia
  - como posesión
  lexicon: HALOT
  rationale: נחלה denota propiedad heredada y porción asignada. «Heredad» mantiene el matiz técnico y bíblico de la distribución por herencia sin sonar forzado.
- source_word: בְּמִסְפַּר
  english_pob_choice: according to the number of
  chosen_spanish: según el número de
  alternatives_spanish:
  - conforme al número de
  - de acuerdo con el número de
  lexicon: HALOT
  rationale: La preposición ב aquí expresa medida o norma de distribución. «Según el número de» reproduce con claridad esa relación cuantitativa.
- source_word: שֵׁמוֹת
  english_pob_choice: names
  chosen_spanish: nombres
  alternatives_spanish:
  - personas
  - los inscritos por nombre
  lexicon: HALOT
  rationale: El hebreo dice literalmente «nombres». Se conserva el sustantivo «nombres» para no borrar la formulación censal del texto.
translation_notes:
  revision_awareness: 'La versión sigue de cerca el hebreo y la decisión auditada en inglés: destinatarios marcados por ל + demostrativo, pasiva de reparto para תֵּחָלֵק, y conservación de «nombres» con una nota para la alternativa interpretativa en contexto censal. No se detectaron revisiones posteriores que alteren el sentido.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y digno, evitando calcos innecesarios.
  - «Heredad» se usó para נחלה por su valor técnico-covenantal en español bíblico.
  - La nota al pie preserva la tensión entre la literalidad («nombres») y la interpretación contextual («personas»).
