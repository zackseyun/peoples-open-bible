translation:
  text: |-
    “Since,” I say, “sir,[6] I have not understood at all about the time of deception and delight[1] and torment,[2] make it more plain to me.”
    
    He answered me and says, “Your foolishness is persistent, and you are unwilling to cleanse your heart and to serve God. Watch out lest the time be fulfilled, and you be found a fool. Listen then,” he says, “as you desire, so that you may understand these things.
    
    “The person who delights and is deceived for a single day and does what he wants has clothed himself with much foolishness and does not perceive the deed he is doing; for on the next day he forgets what he did the day before. For delight and deception have no memory because of the foolishness with which he has clothed himself. But when punishment and torment cling to a person for one day, he is punished and tormented for up to a year; for punishment and torment have great memory.
    
    “So, being tormented and punished the whole year, he at last[5] remembers the delight and the deception, and he knows that because of them he suffers the evil things. Every person who delights and is deceived is tormented in this way, because, though they had life, they have handed themselves over to death.”
    
    “What delights, sir,” I say, “are harmful?”
    
    He says, “Every deed is a delight to a person, whatever he does with pleasure. For even the hot‑tempered man, by giving his own passion its fill, takes delight; and the adulterer and the drunkard and the slanderer and the liar and the greedy person and the defrauder and the one doing things like these gives his own disease its fill; he therefore delights in his act. All these delights are harmful to the slaves of God.[3] Therefore, because of these deceptions, those who are punished and tormented suffer.
    
    “But there are also delights that save people; for many, by doing good things, take delight, being carried along by their own pleasure. This delight, therefore, is beneficial for the slaves of God, and it secures life for such a person;[6] but the harmful delights previously mentioned procure torments and punishments for them; and if they persist and do not repent,[4] they procure death for themselves.”
