base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/016/001.yaml
  text: And Yahweh said to Samuel[a], “How long will you grieve over Saul, since I have rejected him from being king over Israel? Fill your horn with oil and go; I am sending you to Jesse the Bethlehemite, for I have provided for myself a king among his sons.”
  footnotes:
  - marker: a
    text: Or, 'for I have provided for myself a king among his sons.' The Hebrew verb is literally 'seen,' but in context it can imply selection or provision.
    reason: lexical_alternative
