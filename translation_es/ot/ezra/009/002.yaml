    rationale: Aunque formalmente cercana al hebreo, en español actual ‘semilla’ aquí suena extraña y puede distraer del sentido de linaje/descendencia de pacto. ‘La descendencia santa’ conserva el lenguaje genealógico sin introducir lectura racial y sigue la alternativa ya documentada.
  - severity: medium
    issue: ‘los jefes’ no refleja con precisión סגנים / ‘deputies’
    rationale: ‘Jefes’ es demasiado genérico. ‘Diputados’ o ‘subgobernadores’ comunica mejor un cargo administrativo subordinado. Dado el POB inglés auditado, ‘diputados’ es la correspondencia más directa y clara.
  - severity: medium
    issue: ‘ha sido la primera’ suena antinatural y no expresa bien la responsabilidad principal
    rationale: En español, aplicado a ‘la mano’, ‘la primera’ suena forzado y puede leerse solo en sentido secuencial. ‘Fue la principal’ comunica mejor la idea de primacía culpable, manteniendo el modismo de ‘mano’.
  - severity: low
    issue: La nota c repite exactamente la redacción del texto alternativo
    rationale: La nota debería explicar el sentido idiomático con una alternativa más esclarecedora, por ejemplo ‘fue la principal responsable’, en vez de repetir una frase poco natural.
