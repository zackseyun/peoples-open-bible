translation:
  language: es
  text: Aun en tus faldones[a] se halló la sangre de las vidas de los pobres inocentes. Yo no los hallé en un robo por boquete[b], sino por todas estas cosas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en las orillas de tu vestido»; literalmente, «en tus alas».'
    reason: lexical_alternative
  - marker: b
    text: «Robo por boquete» traduce un término para una burglaría realizada abriendo una brecha, por ejemplo perforando una pared; compárese Éxodo 22:2.
    reason: cross_reference
  - marker: c
    text: 'La cláusula hebrea final es elíptica y difícil; alternativamente: «no porque los hallé entrando a robar, sino por todas estas cosas».'
    reason: alternative_reading
lexical_decisions:
- source_word: בִּכְנָפַיִךְ
  english_pob_choice: on your skirts
  chosen_spanish: en los faldones de tu ropa
  alternatives_spanish:
  - en tus alas
  - en los dobladillos de tu ropa
  - en las orillas de tu vestido
  lexicon: HALOT
  rationale: כָּנָף puede significar ala, borde, extremo o faldón según el contexto. Aquí el sentido forense e imagístico apunta a la orla de la prenda, no a ‘alas’ en sentido literal. ‘Faldones’ mantiene la imagen textil y suena natural en español bíblico sin perder concreción.
- source_word: נִמְצְאוּ
  english_pob_choice: is found
  chosen_spanish: se halló
  alternatives_spanish:
  - se encontraron
  - fue hallada
  - se encuentra
  lexicon: HALOT
  rationale: El verbo hebreo está en plural, pero en español ‘la sangre’ funciona naturalmente como sujeto colectivo/singular. ‘Se halló’ conserva la voz pasiva de descubrimiento y la fuerza de evidencia encontrada.
- source_word: דַּם נַפְשׁוֹת
  english_pob_choice: the blood of the lives of
  chosen_spanish: la sangre de las vidas de
  alternatives_spanish:
  - la sangre de las personas de
  - la sangre de los seres de
  - la sangre vital de
  lexicon: HALOT
  rationale: La construcción hebrea es inusual y enfática. ‘De las vidas de’ preserva la relación entre sangre y נֶפֶשׁ como ‘vida/persona’, sin reducirla prematuramente a una expresión idiomática más suave.
- source_word: אֶבְיוֹנִים נְקִיִּים
  english_pob_choice: innocent poor people
  chosen_spanish: los pobres inocentes
  alternatives_spanish:
  - los necesitados inocentes
  - los pobres sin culpa
  - los menesterosos inocentes
  lexicon: HALOT
  rationale: אֶבְיוֹן denota al pobre o necesitado, y נְקִיִּים significa inocentes/limpios de culpa. En español, ‘pobres inocentes’ reproduce ambas cualidades con naturalidad y evita una nominalización pesada.
- source_word: לֹא בַמַּחְתֶּרֶת
  english_pob_choice: in a break-in
  chosen_spanish: en un allanamiento
  alternatives_spanish:
  - en una ruptura
  - en una intrusión
  - en un robo por perforación
  lexicon: HALOT
  rationale: מַחְתֶּרֶת alude a un robo o entrada furtiva mediante excavación/perforación. ‘Allanamiento’ comunica bien la idea jurídica de intrusión ilícita en español moderno; se prefiere por claridad, sin ocultar que el término original evoca el acto de irrumpir/abrir paso.
- source_word: מְצָאתִים
  english_pob_choice: I did not find them
  chosen_spanish: Yo no los hallé
  alternatives_spanish:
  - no los encontré
  - yo no los encontré
  - no los hallé
  lexicon: HALOT
  rationale: La forma hebrea es primera persona singular con objeto plural; por eso conserva la voz del hablante divino. ‘Los hallé’ corresponde bien al matiz de ‘encontrar/hallar’ en un contexto judicial.
- source_word: כִּי עַל כָּל אֵלֶּה
  english_pob_choice: but on account of all these things
  chosen_spanish: sino a causa de todas estas cosas
  alternatives_spanish:
  - pero a causa de todas estas cosas
  - porque a causa de todas estas cosas
  - sino por todas estas cosas
  lexicon: HALOT
  rationale: La cláusula es elíptica y difícil. En español, ‘sino’ expresa mejor el contraste con la cláusula anterior que un simple ‘pero’. ‘A causa de todas estas cosas’ conserva el valor causal de עַל y deja abierta la referencia a las prácticas ya denunciadas en el contexto.
theological_decisions:
- issue: Identidad del hablante en la cláusula media
  english_pob_reading: 'The LORD speaks in first person: ''I did not find them in a break-in.'''
  chosen_spanish_reading: 'Dios habla en primera persona: ''Yo no los hallé en un allanamiento.'''
  alternative_spanish_readings:
  - No los hallaste en un allanamiento
  - Ellos no fueron hallados en un allanamiento
  rationale: La puntuación masorética favorece la primera persona singular con objeto plural. Mantener esa lectura preserva la acusación forense divina y evita una emendación innecesaria hacia segunda persona.
  doctrine_reference: Forensic speech of Yahvé; textual fidelity to the Masoretic Text
- issue: Relación entre la sangre derramada y la justificación legal del robo
  english_pob_reading: The innocent poor were not found in a break-in, but the blood is blamed on Judah's broader sins.
  chosen_spanish_reading: La sangre no se explica como resultado de capturar ladrones en un allanamiento, sino como consecuencia de otras culpas denunciadas en el contexto.
  alternative_spanish_readings:
  - La sangre fue derramada en defensa contra un ladrón
  - No se halló a esos hombres en un allanamiento
  rationale: El texto distingue entre sangre injusta y una supuesta acción defensiva frente a intrusos. La lectura conservada evita convertir el versículo en una justificación de violencia y mantiene la acusación profética.
  doctrine_reference: Prophetic indictment; justice and innocence in covenant litigation
translation_notes:
  revision_awareness: Se tomó en cuenta el audit trail inglés y la revisión más reciente, que no propuso cambios sustanciales. Se mantuvo la lectura mayoritaria del hebreo masorético y se preservó la tensión interpretativa de la cláusula final, explicitándola en nota en lugar de suavizarla en el texto principal.
  spanish_consistency_notes:
  - Se usó «Yahvé» para el nombre divino en el marco del proyecto, aunque este versículo no lo incluye explícitamente.
  - Se prefirió «pobres inocentes» frente a «necesitados inocentes» por naturalidad y porque conserva ambas dimensiones semánticas.
  - Se eligió «allanamiento» por su valor jurídico moderno, pero la nota aclara que el hebreo alude a una ruptura o perforación para entrar.
  - Se mantuvo la primera persona singular en la cláusula media para respetar la sintaxis del hebreo masorético.
  - ‘Sangre’ se dejó en singular colectivo, coherente con el español bíblico y con el sujeto implícito del hallazgo.
