id: JOB.18.13
reference: Job 18:13
source:
  edition: WLC
  text: יֹ֭אכַל בַּדֵּ֣י עוֹר֑/וֹ יֹאכַ֥ל בַּ֝דָּ֗י/ו בְּכ֣וֹר מָֽוֶת׃
translation:
  text: It devours the limbs of his skin[a]; the firstborn of death devours his limbs.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'death’s firstborn,' possibly a poetic personification for the deadliest affliction or death’s chief agent.
    reason: alternative_reading
lexical_decisions:
- source_word: יֹאכַל
  chosen: it devours
  alternatives:
  - it eats
  - he devours
  - is consumed
  lexicon: HALOT
  rationale: Qal imperfect 3ms of אכל, here used metaphorically of destructive consumption. English present 'devours' fits the poetic vividness better than the more literal but weaker 'eats.' The subject is left impersonal/indefinite in English because Hebrew supplies no explicit subject in the first colon.
- source_word: בַּדֵּי
  chosen: the limbs of
  alternatives:
  - parts of
  - members of
  - branches of
  lexicon: HALOT
  rationale: בַּדִּים can denote parts, members, or limbs. In context with skin/body imagery, 'limbs of' best conveys bodily members rather than literal branches.
- source_word: עוֹרוֹ
  chosen: his skin
  alternatives:
  - his hide
  lexicon: HALOT
  rationale: עוֹר normally means skin/hide. 'His skin' is the natural idiomatic rendering in this bodily affliction context.
- source_word: בַּדָּיו
  chosen: his limbs
  alternatives:
  - his members
  - his parts
  lexicon: HALOT
  rationale: Same lemma as earlier in the verse; rendered consistently as 'limbs' for bodily members. The suffix makes the phrase more direct in the second colon.
- source_word: בְּכוֹר מָוֶת
  chosen: the firstborn of death
  alternatives:
  - death's firstborn
  - the foremost offspring of death
  lexicon: HALOT
  rationale: A striking genitive expression in Hebrew poetry. A relatively formal rendering preserves the metaphor and ambiguity rather than flattening it into an interpretive paraphrase such as 'the deadliest disease.'
