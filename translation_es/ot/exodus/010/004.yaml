translation:
  language: es
  text: Porque si te niegas a dejar ir a mi pueblo, he aquí, mañana traeré langostas[a] dentro de tu territorio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo אַרְבֶּה está en forma singular, pero se usa colectivamente; por eso en español se traduce «langostas».
    reason: lexical_alternative
  - marker: b
    text: O «dentro de tus fronteras».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: For if
  chosen_spanish: Porque si
  alternatives_spanish:
  - Pero si
  - Porque en verdad si
  lexicon: HALOT
  rationale: La combinación introduce una advertencia condicional enlazada con la declaración anterior. «Porque si» conserva la fuerza continuativa y condicional sin volver la frase demasiado rígida.
- source_word: מָאֵן
  english_pob_choice: refuse
  chosen_spanish: te niegas
  alternatives_spanish:
  - rehúsas
  - rechazas
  lexicon: HALOT
  rationale: En este contexto, el verbo expresa una negativa voluntaria y obstinada. «Te niegas» comunica bien esa resistencia personal en español.
- source_word: לְשַׁלֵּחַ
  english_pob_choice: to let ... go
  chosen_spanish: dejar ir
  alternatives_spanish:
  - enviar lejos
  - liberar
  lexicon: HALOT
  rationale: En el contexto del Éxodo, con el pueblo como objeto, la expresión idiomática natural en español es «dejar ir». Mantiene el sentido sin sonar mecánico.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: a mi pueblo
  alternatives_spanish:
  - a mi gente
  - a mi pueblo, mi pueblo
  lexicon: HALOT
  rationale: «Mi pueblo» conserva el pose­sivo del pacto y la referencia corporativa al grupo de Israel. Se antepone la preposición exigida por el español con el infinitivo «dejar ir».
- source_word: הִנְנִי
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - he aquí
  - mira bien
  - he aquí que
  lexicon: HALOT
  rationale: La partícula marca solemnidad e inmediatez. «Mira» transmite la fuerza de llamada atenta en un español natural, sin perder el tono de advertencia.
- source_word: מֵבִיא
  english_pob_choice: I will bring
  chosen_spanish: traeré
  alternatives_spanish:
  - estoy trayendo
  - voy a traer
  lexicon: HALOT
  rationale: Aunque formalmente es un participio, con הִנְנִי expresa acción inminente. «Traeré» comunica claramente el futuro de amenaza, apoyado por «mira» y «mañana».
- source_word: מָחָר
  english_pob_choice: tomorrow
  chosen_spanish: mañana
  alternatives_spanish:
  - al día siguiente
  lexicon: HALOT
  rationale: Adverbio temporal directo; «mañana» es la correspondencia natural y precisa.
- source_word: אַרְבֶּה
  english_pob_choice: locusts
  chosen_spanish: langostas
  alternatives_spanish:
  - una plaga de langostas
  - saltamontes
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular, funciona colectivamente. En español, el plural colectivo «langostas» reproduce con naturalidad el sentido de invasión plaga.
- source_word: בִּגְבֻלֶךָ
  english_pob_choice: into your territory
  chosen_spanish: dentro de tu territorio
  alternatives_spanish:
  - dentro de tus fronteras
  - en tu tierra
  lexicon: HALOT
  rationale: גְּבוּל alude a límite o territorio. «Dentro de tu territorio» expresa la entrada de la plaga y preserva la idea de ámbito delimitado.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el contexto auditado en inglés y la lectura hebrea, sin cambios respecto del último pase señalado como de alta concordancia. Se mantuvo la equivalencia óptima: se conserva la advertencia solemne, la inminencia de «mañana» y el valor colectivo de אַרְבֶּה.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - «Pueblo» se usa para עַם en sentido corporativo del pacto.
  - La construcción «dejar ir» se mantiene idiomática y cercana al hebreo sin caer en calco duro.
  - «Langostas» se marca con nota porque el singular hebreo tiene valor colectivo.
  - «Territorio» traduce el ámbito delimitado de גְּבוּל sin forzar un tecnicismo bíblico tradicional.
