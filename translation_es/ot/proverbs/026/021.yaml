  glossary_alignment: 'No hay términos del glosario principal en juego. Las decisiones léxicas son en general fieles al rationale del POB: «carbón» distingue bien de «brasas»; «pendenciero» comunica «hombre de contiendas»; «encender la contienda» preserva la metáfora. La excepción importante es que la nota literal requerida para מדונים no se conservó, y en su lugar se añadió una nota incorrecta sobre «madera».'
