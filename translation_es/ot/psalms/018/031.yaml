translation:
  language: es
  text: En cuanto a Dios, su camino es íntegro; la palabra de Yahvé es refinada[a]; él es un escudo para todos los que en él se refugian[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «probada» o «purificada». El hebreo evoca metal refinado en el fuego, subrayando la pureza comprobada de la palabra de Yahvé.
    reason: lexical_alternative
  - marker: b
    text: O «los que confían en él». El hebreo dice más literalmente «los que se refugian en él», conservando la imagen de amparo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֵל
  english_pob_choice: As for God
  chosen_spanish: En cuanto a Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: El hebreo con artículo y posición inicial tiene fuerza temática o de enfoque. «En cuanto a Dios» conserva ese valor discursivo mejor que un simple «Dios», y suena natural en español bíblico actual.
- source_word: תָּמִים
  english_pob_choice: blameless
  chosen_spanish: íntegro
  alternatives_spanish:
  - sin defecto
  - perfecto
  - intachable
  lexicon: HALOT
  rationale: Aplicado al camino de Dios, תָּמִים comunica plenitud e integridad, con el matiz de ausencia de defecto. «Íntegro» expresa bien esa idea en español sin cargarla con la posible confusión moderna de «perfecto».
- source_word: דַּרְכּוֹ
  english_pob_choice: his way
  chosen_spanish: su camino
  alternatives_spanish:
  - su senda
  - su proceder
  - su conducta
  lexicon: HALOT
  rationale: דֶּרֶךְ/דַּרְכּוֹ es literalmente «camino», y aquí apunta a la manera de actuar de Dios. «Su camino» mantiene el valor literal e idiomático.
- source_word: אִמְרַת יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el dicho de Yahvé
  - la declaración de Yahvé
  - la promesa de Yahvé
  lexicon: HALOT
  rationale: אִמְרָה denota palabra, dicho u oráculo. «La palabra de Yahvé» es la opción más natural y fiel en español, y preserva el nombre divino según la política de la obra.
- source_word: צְרוּפָה
  english_pob_choice: refined
  chosen_spanish: refinada
  alternatives_spanish:
  - probada
  - purificada
  lexicon: HALOT
  rationale: El verbo evoca metal refinado en el fuego. «Refinada» conserva la metáfora metalúrgica mejor que una traducción más interpretativa como «probada».
- source_word: מָגֵן
  english_pob_choice: a shield
  chosen_spanish: escudo
  alternatives_spanish:
  - protección
  - defensa
  - escudo protector
  lexicon: HALOT
  rationale: El sustantivo es literalmente «escudo». En español, el predicado nominal «él es escudo» suena más sobrio y fiel que añadir un artículo innecesario.
- source_word: לְכֹל
  english_pob_choice: to all
  chosen_spanish: para todos
  alternatives_spanish:
  - a todos
  - en favor de todos
  lexicon: HALOT
  rationale: La preposición ל expresa relación o beneficio. Con «escudo» en español, «para todos» comunica bien el alcance protectivo.
- source_word: הַחֹסִים בּוֹ
  english_pob_choice: who take refuge in him
  chosen_spanish: los que en él se refugian
  alternatives_spanish:
  - los que buscan refugio en él
  - los que confían en él
  - los que se acogen a él
  lexicon: HALOT
  rationale: חסה conserva la imagen concreta de buscar refugio, no solo la idea abstracta de confiar. «Se refugian» mantiene ese cuadro de protección y cobijo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La política de la obra pide traducir יְהוָה como «Yahvé» en el texto principal. Se conserva así el nombre personal divino en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Imagen de refugio en חסה
  english_pob_reading: who take refuge in him
  chosen_spanish_reading: los que en él se refugian
  alternative_spanish_readings:
  - los que confían en él
  - los que buscan refugio en él
  rationale: La POB inglesa preserva la metáfora de refugio y la nota alternativa «trust in him». En español se mantiene la imagen concreta de protección; la confianza queda implícita sin borrar el valor figurado del verbo hebreo.
  doctrine_reference: HALOT; English POB lexical note on חסה
translation_notes:
  revision_awareness: 'El borrador sigue el paquete fuente hebreo y el audit trail inglés sin cambios de revisión pendientes. Se conservan las tres tensiones léxicas señaladas por la POB: תָּמִים como integridad/blamelessness, צְרוּפָה como refinado metalúrgico, y חסה como refugiarse más que confiarse en abstracto.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en vez de una sustitución por título para el tetragrámaton.
  - «Íntegro» preserva un registro solemne y evita la ambigüedad de «perfecto».
  - «Se refugian» conserva la metáfora de resguardo y no la diluye en una paráfrasis psicológica.
  - El orden «En cuanto a Dios» refleja el énfasis tópico del hebreo sin forzar el español.
