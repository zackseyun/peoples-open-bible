translation:
  language: es
  text: Y desde aquel día en adelante[a], la mitad de mis jóvenes[b] estaban haciendo la obra, y la otra mitad de ellos sostenían las lanzas, los escudos, los arcos y la armadura[c]; y los oficiales estaban detrás de toda la casa de Judá[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde aquel día».
    reason: stylistic_alternative
  - marker: b
    text: O «mis siervos» o «mis servidores» para «mis jóvenes» (נְעָרַי), porque el término hebreo puede referirse a jóvenes, sirvientes o retenedores según el contexto.
    reason: lexical_alternative
  - marker: c
    text: O «las cotas de malla» o «las corazas» para «la armadura»; el término hebreo se refiere a protección corporal.
    reason: lexical_alternative
  - marker: d
    text: «Los oficiales estaban detrás de toda la casa de Judá» puede implicar apoyo militar o una posición de supervisión detrás de los trabajadores de Judá.
    reason: cultural_note
lexical_decisions:
- source_word: נְעָרַי
  english_pob_choice: my young men
  chosen_spanish: mis jóvenes
  alternatives_spanish:
  - mis siervos
  - mis servidores
  - mis muchachos
  lexicon: HALOT
  rationale: נַעַר puede referirse a jóvenes, servidores o retenedores según el contexto. En español, «mis jóvenes» conserva la amplitud del término sin forzar una lectura servil que el contexto no exige.
- source_word: עֹשִׂים בַּמְּלָאכָה
  english_pob_choice: were doing the work
  chosen_spanish: estaba haciendo la obra
  alternatives_spanish:
  - estaban trabajando en la labor
  - estaban ocupados en la obra
  lexicon: HALOT
  rationale: La construcción verbal indica participación activa en la tarea. «Haciendo la obra» mantiene la concreción y suena natural en español bíblico contemporáneo.
- source_word: מַחֲזִיקִים
  english_pob_choice: were holding
  chosen_spanish: sostenía
  alternatives_spanish:
  - agarraba
  - llevaba
  - empuñaba
  lexicon: HALOT
  rationale: El participio aquí describe que llevaban o tenían en mano armas. «Sostenía» conserva el sentido básico de tener en las manos, sin precisar más de lo que el hebreo obliga.
- source_word: הָרְמָחִים
  english_pob_choice: the spears
  chosen_spanish: las lanzas
  alternatives_spanish:
  - las espadas largas
  - los venablos
  lexicon: HALOT
  rationale: רֹמַח designa un arma de asta, usualmente «lanza» o «lanza arrojadiza». «Lanzas» es claro, natural y suficientemente preciso para el inventario militar.
- source_word: הַמָּגִנִּים
  english_pob_choice: the shields
  chosen_spanish: los escudos
  alternatives_spanish:
  - los broqueles
  lexicon: HALOT
  rationale: מָגֵן es el término común para escudo. «Escudos» mantiene la referencia directa y evita un término más arcaico como «broqueles».
- source_word: הַקְּשָׁתוֹת
  english_pob_choice: the bows
  chosen_spanish: los arcos
  alternatives_spanish:
  - las armas de arco
  lexicon: HALOT
  rationale: קֶשֶׁת significa «arco»; en plural, «los arcos» es la forma más directa y natural en español.
- source_word: הַשִּׁרְיֹנִים
  english_pob_choice: the armor
  chosen_spanish: la armadura
  alternatives_spanish:
  - las corazas
  - los coseletes
  - las cotas de malla
  lexicon: HALOT
  rationale: שִׁרְיוֹן se refiere a la protección corporal. «Armadura» es una traducción amplia y fiel; alternativas más específicas pueden sugerir un tipo de protección que el hebreo no precisa.
- source_word: הַשָּׂרִים
  english_pob_choice: the officers were behind
  chosen_spanish: los oficiales estaban detrás
  alternatives_spanish:
  - los jefes estaban detrás
  - los comandantes estaban detrás
  lexicon: HALOT
  rationale: שַׂר puede significar oficial, jefe o comandante. En este contexto organizativo-militar, «oficiales» comunica bien su función sin cargar el término con matices monárquicos.
- source_word: אַחֲרֵי כָּל בֵּית יְהוּדָה
  english_pob_choice: behind all the house of Judah
  chosen_spanish: detrás de toda la casa de Judá
  alternatives_spanish:
  - detrás de toda la familia de Judá
  - apoyando a toda la casa de Judá
  lexicon: HALOT
  rationale: אַחֲרֵי es espacialmente «detrás/tras». La frase conserva la expresión corporativa «casa de Judá», y «detrás» refleja el valor espacial que el texto hebreo permite sin eliminar la posible idea de apoyo u observación.
theological_decisions:
- issue: Posición de los oficiales respecto al pueblo
  english_pob_reading: the officers were behind all the house of Judah may imply military support or supervisory positioning behind the Judean workers.
  chosen_spanish_reading: los oficiales estaban detrás de toda la casa de Judá, dejando abierta la idea de apoyo u निरी监督 sin explicitarla en el texto principal
  alternative_spanish_readings:
  - los oficiales apoyaban a toda la casa de Judá
  - los oficiales estaban al respaldo de toda la casa de Judá
  rationale: 'El hebreo usa una expresión espacial breve. La traducción española conserva la ambigüedad útil: los oficiales están «detrás», lo que puede sugerir protección, supervisión o cobertura militar, pero sin añadir una interpretación no explicitada por el original.'
  doctrine_reference: Nehemías 4:10; nota cultural del POB en inglés
- issue: Ámbito de נְעָרַי en contexto de trabajo y defensa
  english_pob_reading: my young men, with a note that it can also mean my servants or my attendants depending on context.
  chosen_spanish_reading: mis jóvenes
  alternative_spanish_readings:
  - mis siervos
  - mis servidores
  - mis atendientes
  rationale: Se evita imponer «siervos» como lectura principal porque el contexto combina trabajo y defensa, y el término hebreo admite varias posibilidades. «Mis jóvenes» mantiene la indeterminación sin perder la referencia al grupo de Nehemías.
  doctrine_reference: HALOT; Nehemías 4:10
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que cambió «stood behind» por «were behind» para ajustarse más de cerca al hebreo. Por eso el español usa «estaban detrás» y no añade un verbo de postura no presente en el original. También se preservó la enumeración de armas y la relación distributiva entre la mitad que trabajaba y la mitad que sostenía armas.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el nombre divino según la norma POB, aunque este versículo no lo contiene de forma explícita aparte de la frase «casa de Judá».
  - Se conservó «casa de Judá» como expresión corporativa, no reducida a «pueblo de Judá», para respetar el hebreo.
  - 'La concordancia verbal en español se ajusta al sujeto compuesto implícito: «la mitad» / «la otra mitad».'
  - Se eligió «armadura» como término general fiel y comprensible, sin especificar «cota de malla» o «coraza» en el texto principal.
