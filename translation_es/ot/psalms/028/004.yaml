revisions:
- from: Dales según su obra[a], y según la maldad de sus hechos; según la obra de sus manos, dales; retribúyeles su debido.
  to: Dales según su obra, y según la maldad de sus hechos; según la obra de sus manos, dales; retribúyeles la retribución que merecen[a].
  rationale: Se reemplaza 'su debido' por 'la retribución que merecen' para expresar de manera natural y clara el sentido de גְּמוּלָם en español. También se mueve la nota al segmento final, donde realmente aplica la alternativa léxica documentada en la auditoría inglesa.
