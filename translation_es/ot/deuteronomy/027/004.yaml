revisions:
- from: Y cuando crucen el Jordán[a], levantarán estas piedras, que yo les ordeno hoy, en el monte Ebal, y las recubrirás con yeso.
  to: Y cuando crucen el Jordán[a], levantarán estas piedras, que yo les ordeno hoy, en el monte Ebal, y las recubrirán con cal.
  rationale: Se corrige la discordancia verbal pasando todo el versículo a plural, en línea con el resto del borrador y con una lectura natural del mandato dirigido al pueblo. También se sustituye 'yeso' por 'cal' para reflejar con mayor fidelidad בַּשִּׂיד y la decisión léxica auditada en inglés ('lime'). Se mantiene la nota textual sobre Gerizim/Ebal sin cambios sustanciales.
