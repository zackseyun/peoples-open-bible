translation:
  language: es
  text: Bendigan al Señor, escarchas[a] y nieves; canten himnos y exáltenlo en gran manera para siempre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'escarcha' para πάχναι.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'por los siglos'.
