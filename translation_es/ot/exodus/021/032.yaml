translation:
  language: es
  text: Si el buey cornea a un esclavo o a una esclava[a], dará treinta siclos de plata a su amo, y el buey será apedreado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a un esclavo, hombre o mujer». El hebreo distingue un esclavo varón (עֶבֶד) y una esclava (אָמָה).
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶבֶד
  english_pob_choice: male slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  lexicon: HALOT
  rationale: En este contexto legal, el estatus servil es central. En español, «esclavo» conserva la fuerza jurídica y social del término mejor que «siervo», y evita suavizar indebidamente la categoría. El hebreo masculino singular queda suficientemente expresado por el sujeto genérico de la cláusula, mientras que la referencia inclusiva queda explícita en la nota por la pareja con אָמָה.
- source_word: אָמָה
  english_pob_choice: female slave
  chosen_spanish: esclava
  alternatives_spanish:
  - criada
  - sirvienta
  - muchacha
  lexicon: HALOT
  rationale: La pareja léxica con עֶבֶד pide una traducción explícita de sexo y estatus. «Esclava» mantiene la correspondencia semántica y jurídica con el texto hebreo y evita atenuar el sentido a «criada» o «sirvienta».
- source_word: יִגַּח
  english_pob_choice: gores
  chosen_spanish: es corneado
  alternatives_spanish:
  - cornea
  - embiste con los cuernos
  lexicon: HALOT
  rationale: El verbo en los textos de ley sobre el buey se refiere al acto de herir con los cuernos. En español, «cornear» sería más directo, pero «ser corneado por el buey» conserva bien la voz pasiva del casus y la imagen del daño; además evita una formulación demasiado dura como para perder fluidez.
- source_word: כֶּסֶף שְׁלֹשִׁים שְׁקָלִים
  english_pob_choice: thirty shekels of silver
  chosen_spanish: treinta siclos de plata
  alternatives_spanish:
  - treinta siclos de plata fina
  - treinta piezas de plata
  lexicon: HALOT
  rationale: «Siclos» comunica el peso monetario del hebreo sin convertirlo en una moneda moderna; «de plata» preserva el material explícito del original. Esta opción es la más cercana y natural en español bíblico contemporáneo.
- source_word: יִתֵּן
  english_pob_choice: he shall give
  chosen_spanish: dará
  alternatives_spanish:
  - deberá dar
  - tendrá que dar
  lexicon: HALOT
  rationale: El imperfecto casuístico expresa obligación legal. En español, «dará» reproduce con sobriedad la forma normativa sin sobreexplicar con perífrasis modales.
- source_word: לַאדֹנָיו
  english_pob_choice: to his master
  chosen_spanish: a su amo
  alternatives_spanish:
  - a su señor
  - a su dueño
  lexicon: HALOT
  rationale: El sufijo posesivo se entiende naturalmente como referido al esclavo mencionado antes. «Amo» es el equivalente español más natural para la relación de dominio en este contexto legal; «señor» podría sonar honorífico o teológico, y «dueño» desplaza demasiado la relación personal-jurídica.
- source_word: יִסָּקֵל
  english_pob_choice: shall be stoned
  chosen_spanish: será apedreado
  alternatives_spanish:
  - será lapidado
  - será muerto a pedradas
  lexicon: HALOT
  rationale: El pasivo legal de סקל en español se entiende bien como «apedreado». «Lapidado» es válido pero más técnico y menos llano; «será muerto a pedradas» explicita el resultado, pero añade más de lo que el hebreo dice aquí.
translation_notes:
  revision_awareness: La versión española sigue de cerca el hebreo legal y coincide sustancialmente con la decisión inglesa auditada, pero evita calcar su sintaxis cuando el español requiere una estructura más natural. Mantiene la distinción sexual explícita del par עֶבֶד / אָמָה y conserva el registro jurídico del casuístico.
  spanish_consistency_notes:
  - Se mantiene «esclavo/esclava» como término base por coherencia con la fuerza legal del pasaje.
  - Se usa «amo» para לַאדֹנָיו en contexto de posesión/esclavitud; no se emplea «Señor» porque aquí no corresponde al nombre divino ni a un tratamiento honorífico.
  - «Apedreado» se reserva para la ejecución prescrita por la ley, sin añadir glosa interpretativa al cuerpo del texto.
