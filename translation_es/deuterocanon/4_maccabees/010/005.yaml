translation:
  language: es
  text: Pero, resentidos amargamente por la audacia[a] del hombre, le dislocaron las manos y los pies con instrumentos para desencajar las articulaciones, y, haciendo palanca para sacarlos de sus articulaciones[b], lo desmembraron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «habiendo soportado amargamente la audacia del hombre»; es decir, reaccionaron con amargo resentimiento ante su habla valiente y sin temor.
    reason: lexical_alternative
  - marker: b
    text: El griego usa vocabulario raro para instrumentos aplicados a las articulaciones y para arrancar los miembros, subrayando la brutalidad de la tortura.
    reason: cultural_note
lexical_decisions:
- source_word: πικρῶς
  english_pob_choice: bitterly
  chosen_spanish: amargamente
  alternatives_spanish:
  - con amargura
  - ásperamente
  lexicon: LSJ
  rationale: El adverbio expresa una reacción hostil intensa, no solo severidad externa. «Amargamente» conserva el matiz emocional de πικρῶς en español natural.
- source_word: ἐνέγκαντες
  english_pob_choice: resented
  chosen_spanish: al soportar
  alternatives_spanish:
  - al resentir
  - al tolerar
  lexicon: LSJ
  rationale: El verbo básico es «soportar / تحمل / bear», pero en este contexto, unido a πικρῶς y a τὴν παρρησίαν, señala que no pudieron soportar la franqueza del hombre. «Al soportar amargamente» mantiene la tensión semántica sin perder el valor idiomático observado en el inglés POB.
- source_word: παρρησίαν
  english_pob_choice: boldness
  chosen_spanish: la franqueza
  alternatives_spanish:
  - la valentía de hablar
  - la osadía
  - la libertad de palabra
  lexicon: BDAG
  rationale: En contexto, παρρησία implica franqueza valiente y habla sin temor. «Franqueza» preserva el componente de habla abierta; el adjetivo implícito en la frase completa transmite la audacia requerida.
- source_word: ἀρθρεμβόλοις ὀργάνοις
  english_pob_choice: with joint-wrenching instruments
  chosen_spanish: con instrumentos para desencajar las articulaciones
  alternatives_spanish:
  - con útiles para dislocar las articulaciones
  - con instrumentos que arrancan las coyunturas
  lexicon: LSJ
  rationale: La expresión es rara y describe herramientas dirigidas contra las articulaciones. «Desencajar las articulaciones» es una forma española clara que conserva la imagen mecánica y la violencia del original.
- source_word: ἐξήρθρουν
  english_pob_choice: they dislocated
  chosen_spanish: le dislocaban
  alternatives_spanish:
  - le desencajaban
  - le sacaban de las coyunturas
  lexicon: LSJ
  rationale: El verbo significa poner fuera de articulación/dislocar. «Dislocaban» es el equivalente médico más directo y comprensible en español moderno.
- source_word: ἐξ ἁρμῶν
  english_pob_choice: out of their sockets
  chosen_spanish: de sus coyunturas
  alternatives_spanish:
  - de sus articulaciones
  - de sus junturas
  lexicon: LSJ
  rationale: ἁρμός puede significar coyuntura o unión. «Coyunturas» mantiene la referencia anatómica y se ajusta al campo semántico del pasaje sin forzar una imagen demasiado específica.
- source_word: ἀναμοχλεύοντες
  english_pob_choice: prying them out
  chosen_spanish: haciendo palanca para sacarlos
  alternatives_spanish:
  - haciendo palanca para desencajarlos
  - levantándolos con fuerza
  lexicon: LSJ
  rationale: El participio sugiere hacer palanca, mover violentamente y aflojar. «Haciendo palanca para sacarlos» comunica bien la acción instrumental y brutal.
- source_word: ἐξέμελιζον
  english_pob_choice: dismembered him
  chosen_spanish: lo desmembraban
  alternatives_spanish:
  - lo descuartizaban
  - le arrancaban los miembros
  lexicon: LSJ
  rationale: El verbo expresa arrancar miembro a miembro, desmembrar. «Desmembraban» conserva la crudeza y corresponde al resultado total de la tortura descrita.
theological_decisions:
- issue: Preservar la intensidad corporal de la tortura
  english_pob_reading: Render the torture in explicit bodily terms ('dislocated,' 'out of their sockets,' 'dismembered him')
  chosen_spanish_reading: Conservar la descripción corporal explícita de la tortura («dislocaban», «coyunturas», «lo desmembraban»)
  alternative_spanish_readings:
  - Suavizar con «mutilaban» o «lo maltrataban»
  - Generalizar con «lo dañaban gravemente»
  rationale: El griego detalla articulaciones, manos, pies y separación violenta; por tanto, la traducción debe mantener la dureza y concreción del martirio, no atenuarla.
  doctrine_reference: Principios POB de equivalencia óptima y fidelidad al registro histórico-literario
- issue: Mantener la tensión entre ἐνέγκαντες y el sentido contextual de rechazo
  english_pob_reading: '''having bitterly borne'' / ''resented'' the man''s boldness'
  chosen_spanish_reading: «al soportar amargamente la franqueza del hombre»
  alternative_spanish_readings:
  - «al resentir la franqueza del hombre»
  - «al no poder tolerar la franqueza del hombre»
  rationale: El participio admite un sentido literal de ‘soportar’, pero el contexto demanda una reacción hostil ante el habla franca. «Soportar amargamente» conserva la tensión lexical y evita borrar la ambigüedad documentada por el POB inglés.
  doctrine_reference: Principios POB de tensión lexical preservada y lectura contextual
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés POB al preferir una construcción participial («al soportar amargamente») y al traducir ἐξέμελιζον con un verbo resultativo fuerte («lo desmembraban») en vez de una paráfrasis más suave.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se usa «Mesías/Cristo» según corresponda; este versículo no incluye esa terminología.
  - La frase «la franqueza del hombre» preserva el valor de παρρησία sin introducir un giro eclesiástico tradicional no atestado en el griego.
