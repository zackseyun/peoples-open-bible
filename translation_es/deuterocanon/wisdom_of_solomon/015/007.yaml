  - severity: medium
    issue: «el alfarero lo juzga» no refleja con la mejor naturalidad κριτὴς ὁ πηλουργός
    rationale: La cláusula griega significa que el alfarero es el árbitro o quien decide el uso de cada vasija. «Lo juzga» en español suena a que juzga un objeto particular, mientras que el sentido es más bien determinativo. «El alfarero es quien decide» comunica mejor la función de κριτής.
