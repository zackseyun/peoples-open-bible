translation:
  language: es
  text: El que maldice a su padre o a su madre[a] ciertamente será condenado a muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «y a su madre»; en esta fórmula legal, el sentido es distributivo y se refiere a maldecir a cualquiera de los padres.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמְקַלֵּל
  english_pob_choice: Whoever curses
  chosen_spanish: El que maldice
  alternatives_spanish:
  - Quien maldice
  - 'El que maldice, '
  lexicon: HALOT
  rationale: El participio hebreo funciona de modo sustantivo y legal-generic en esta ley casuística. «El que maldice» conserva esa fuerza general y suena natural en español jurídico-bíblico. Se elige «maldice» para reflejar la acción verbal de pronunciar una maldición contra alguien, como en el valor legal de קלל.
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: a su padre
  alternatives_spanish:
  - a su padre
  lexicon: HALOT
  rationale: El sufijo posesivo de 3ms se expresa naturalmente en español con «su». En este contexto legal genérico, el posesivo mantiene el referente singular del transgresor sin necesidad de repetir «su» en la segunda pareja por economía estilística.
- source_word: וְאִמּוֹ
  english_pob_choice: or his mother
  chosen_spanish: o a su madre
  alternatives_spanish:
  - y a su madre
  lexicon: HALOT
  rationale: 'Aunque el hebreo tiene waw («y»), el sentido jurídico es distributivo: se trata de maldecir a cualquiera de los dos padres. En español, «o» comunica mejor esa alternativa legal sin depender de una coordinación que podría sonar inclusiva en exceso.'
- source_word: מ֥וֹת יוּמָֽת
  english_pob_choice: shall surely be put to death
  chosen_spanish: ciertamente morirá
  alternatives_spanish:
  - morirá sin falta
  - será muerto
  - será ejecutado
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + verbo finito intensifica la sentencia. En español, «ciertamente morirá» preserva la solemnidad y la fuerza enfática, aunque evita un giro más pesado como «será muerto», que sería menos idiomático. La idea de pena capital queda implícita por el contexto legal.
theological_decisions:
- issue: Sentido distributivo de la pareja padre/madre
  english_pob_reading: The offense applies to cursing either parent individually, rendered with 'or his mother.'
  chosen_spanish_reading: La falta se aplica a maldecir a cualquiera de los padres individualmente, expresado con «o a su madre».
  alternative_spanish_readings:
  - «y a su madre»
  - «y a su madre» en forma más literal
  rationale: El hebreo usa waw, pero en este tipo de formulación casuística la intención legal es distributiva. El español «o» comunica con claridad la protección de cualquiera de los dos padres sin perder el alcance normativo del mandato.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
- issue: Formulación de la pena capital
  english_pob_reading: Use 'shall surely be put to death' to reflect a judicial sentence.
  chosen_spanish_reading: «ciertamente morirá» como fórmula de sentencia judicial reforzada por la construcción hebrea.
  alternative_spanish_readings:
  - «será puesto a muerte»
  - «será ejecutado»
  - «deberá morir»
  rationale: La construcción hebrea expresa una pena impuesta con énfasis. En español, «ciertamente morirá» conserva la solemnidad y la intensidad sin introducir una perífrasis forzada. El contexto legal permite entender que se trata de una sentencia, no de una mera consecuencia natural.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores; el pasaje mantiene la lectura aprobada de alta concordancia sin cambios respecto del audit trail inglés.
  spanish_consistency_notes:
  - Se conserva el registro jurídico breve y solemne adecuado a una ley casuística.
  - Se evita «SEÑOR» u otra sustitución teológica no pertinente, pues el versículo no contiene el nombre divino.
  - Se prefirió una solución idiomática en español para la disyunción distributiva, siguiendo el razonamiento auditado del inglés POB.
