translation:
  language: es
  text: 'Y dijo: «Bendita seas por Yahvé, hija mía. Has hecho que esta última bondad[a] sea mayor que la primera, al no ir detrás de los jóvenes, ya fueran pobres o ricos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lealtad», «amor leal» o «fidelidad pactal» para חֶסֶד, traducido aquí como «bondad».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרוּכָה אַתְּ לַיהוָה
  english_pob_choice: May you be blessed by Yahweh
  chosen_spanish: Bendita seas ante Yahvé
  alternatives_spanish:
  - Que seas bendita por Yahvé
  - Bendita eres de parte de Yahvé
  lexicon: HALOT
  rationale: La forma hebrea funciona como fórmula de bendición dirigida a una mujer. En español, «Bendita seas» conserva el valor exhortativo/benedictivo mejor que un simple enunciado descriptivo. «Ante Yahvé» evita sustituir el nombre divino por un título y mantiene la relación con el destinatario de la bendición.
- source_word: בִּתִּי
  english_pob_choice: my daughter
  chosen_spanish: hija mía
  alternatives_spanish:
  - mi hija
  - mi niña
  lexicon: HALOT
  rationale: Es un vocativo afectuoso y de superioridad social/edad de Booz hacia Rut. «Hija mía» conserva la cercanía y la metáfora familiar sin sonar demasiado infantil.
- source_word: הֵיטַבְתְּ
  english_pob_choice: You have made ... greater
  chosen_spanish: Has mostrado más bondad
  alternatives_spanish:
  - Has hecho mejor
  - Has hecho más
  lexicon: HALOT
  rationale: El verbo compara el acto presente con uno anterior. En español, «has mostrado más bondad» transmite la valoración comparativa de modo natural y evita una construcción áspera como «hecho mayor».
- source_word: חַסְדֵּךְ
  english_pob_choice: kindness
  chosen_spanish: bondad
  alternatives_spanish:
  - lealtad
  - amor leal
  - misericordia
  lexicon: HALOT
  rationale: חֶסֶד abarca una lealtad bondadosa con matiz relacional. «Bondad» funciona bien en español narrativo y deja abierto el trasfondo de fidelidad pactal que la nota documenta.
- source_word: הָאַחֲרוֹן מִן הָרִאשׁוֹן
  english_pob_choice: this last ... than the first
  chosen_spanish: esta última que la primera
  alternatives_spanish:
  - la postrera que la primera
  - la última ... de la primera
  lexicon: HALOT
  rationale: La comparación temporal entre dos actos de bondad se expresa con naturalidad mediante «esta última ... que la primera», manteniendo el contraste sin sobrecargar el español.
- source_word: לְבִלְתִּי לֶכֶת אַחֲרֵי
  english_pob_choice: by not going after
  chosen_spanish: al no ir detrás de
  alternatives_spanish:
  - por no seguir a
  - al no seguir tras
  lexicon: HALOT
  rationale: La construcción infinitiva explica en qué consiste la bondad mayor. «Al no ir detrás de» preserva la imagen de perseguir una opción matrimonial, sin imponer una paráfrasis interpretativa más fuerte.
- source_word: הַבַּחוּרִים
  english_pob_choice: the young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los jóvenes varones
  lexicon: HALOT
  rationale: «Los jóvenes» es idiomático en español y reproduce el grupo de varones elegibles al que se alude en el contexto narrativo.
- source_word: אִם דַּל וְאִם עָשִׁיר
  english_pob_choice: whether poor or rich
  chosen_spanish: fuera pobre o rico
  alternatives_spanish:
  - ya fuera pobre o rico
  - sea pobre o rico
  lexicon: HALOT
  rationale: El hebreo presenta un merismo económico. «Fuera pobre o rico» reproduce la amplitud de la expresión y su relación con la búsqueda matrimonial, sin añadir elementos ajenos.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton en español. «Yahvé» preserva el nombre propio divino y evita la sustitución por un título.
theological_decisions:
- issue: Valor de חֶסֶד en la valoración de Rut
  english_pob_reading: kindness
  chosen_spanish_reading: bondad
  alternative_spanish_readings:
  - amor leal
  - lealtad pactal
  - misericordia
  rationale: La escena destaca la decisión concreta de Rut de buscar el bien de la familia de Noemí. «Bondad» comunica la evaluación positiva directa en español, mientras las alternativas conservan el trasfondo relacional y pactal documentado en la nota.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el nombre propio de Dios, no un título genérico. Mantenerlo como «Yahvé» preserva la distinción teológica y la transparencia textual del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el audit trail inglés: se mantiene la estructura benedictiva, el paralelismo comparativo, el matiz relacional de חֶסֶד en documentación, y el nombre divino como Yahvé. No se registran revisiones aplicadas en el paquete fuente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se conserva un registro natural de la bendición hebrea sin calco rígido.
  - La nota de pie de página explica la amplitud semántica de חֶסֶד sin cargar el cuerpo principal.
  - «Fuera pobre o rico» mantiene el merismo económico sin introducir una glosa doctrinal.
