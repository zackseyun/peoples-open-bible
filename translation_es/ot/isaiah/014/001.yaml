  yaml_path: translation/ot/isaiah/014/001.yaml
  text: For Yahweh will have compassion on Jacob and will again choose Israel[a], and he will settle them on their own land. The foreigner will join them[b], and they will attach themselves to the house of Jacob.
  footnotes:
  - marker: a
    text: Or 'the sojourner' or 'the resident alien.' The Hebrew גֵּר often refers to a non-native living among Israel, not merely a passing outsider.
    reason: lexical_alternative
  - marker: b
    text: Or 'will be joined to the house of Jacob.'
    reason: alternative_reading
