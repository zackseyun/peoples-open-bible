base_translation:
  language: en
  yaml_path: translation/ot/leviticus/024/005.yaml
  text: And you shall take fine flour and bake it into twelve loaves[b][a]; each loaf shall be of two-tenths of an ephah.
  footnotes:
  - marker: a
    text: Literally, 'two tenths.' In priestly measurement language this means two-tenths of an ephah for each loaf.
    reason: cultural_note
  - marker: b
    text: Or 'twelve cakes.' The Hebrew term can denote baked bread units used in ritual settings; 'loaves' is chosen for clear modern English.
    reason: lexical_alternative
