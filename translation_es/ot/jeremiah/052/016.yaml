translation:
  language: es
  text: Pero de los más pobres de la tierra, Nebuzaradán, el capitán de la guardia[a], dejó a algunos como viñadores y labradores[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el jefe de los verdugos’; el título hebreo significa literalmente ‘jefe de los matadores/carniceros’, probablemente un cargo oficial de la corte o del ejército.
    reason: lexical_alternative
  - marker: b
    text: O ‘agricultores’ o ‘trabajadores del campo’; el término también puede referirse más específicamente a quienes aran la tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ/דַּלּוֹת
  english_pob_choice: But some of the poorest
  chosen_spanish: Pero de los más pobres
  alternatives_spanish:
  - Y de los pobres
  - Pero de los pobres
  - Pero algunos de los más pobres
  lexicon: HALOT
  rationale: La construcción hebrea expresa un partitivo desde ‘los pobres’ en contexto de deportación. En español, ‘de los más pobres’ conserva bien la idea sin forzar una traducción demasiado literal. ‘Pero’ refleja el contraste con el contexto previo de destrucción y deportación.
- source_word: הָ/אָרֶץ
  english_pob_choice: of the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - del país
  - de la región
  - de la tierra del país
  lexicon: HALOT
  rationale: Aquí ‘tierra’ comunica de modo natural la tierra de Judá. ‘País’ también sería posible, pero ‘tierra’ sigue más de cerca el uso bíblico y el contexto territorial.
- source_word: הִשְׁאִיר
  english_pob_choice: left
  chosen_spanish: dejó
  alternatives_spanish:
  - dejó allí
  - permitió que quedaran
  - dejó restantes
  lexicon: HALOT
  rationale: El verbo hifil de שׁאר significa ‘dejar, dejar quedar’. ‘Dejó’ es breve y fiel. No se añade una idea de misericordia o intención que el hebreo no exige.
- source_word: נְבוּזַרְאֲדָ֖ן
  english_pob_choice: Nebuzaradan
  chosen_spanish: Nebuzaradán
  alternatives_spanish:
  - Nebuzaradán
  - Nebuzaradán
  lexicon: transliteración estándar
  rationale: Se translitera el nombre propio al español con la forma usual Nebuzaradán, manteniendo la identificación histórica.
- source_word: רַב טַבָּחִים
  english_pob_choice: the captain of the guard
  chosen_spanish: el capitán de la guardia
  alternatives_spanish:
  - el jefe de los verdugos
  - el jefe de los ejecutores
  - el jefe de los carniceros
  lexicon: HALOT
  rationale: Aunque el hebreo es literalmente ‘jefe de los matadores/carniceros’, el POB inglés opta por el título funcional y conocido. ‘Capitán de la guardia’ transmite el cargo oficial sin un literalismo engañoso.
- source_word: לְ/כֹרְמִ֖ים
  english_pob_choice: as vinedressers
  chosen_spanish: como viñadores
  alternatives_spanish:
  - como viñadores
  - como trabajadores de viñas
  - como viticultores
  lexicon: HALOT
  rationale: ‘Viñadores’ conserva el sentido de quienes trabajan en viñas y es un equivalente natural en español bíblico contemporáneo.
- source_word: וּ/לְ/יֹגְבִים
  english_pob_choice: and farmers
  chosen_spanish: y a otros como labradores
  alternatives_spanish:
  - y como agricultores
  - y a otros como campesinos
  - y como trabajadores del campo
  lexicon: HALOT
  rationale: El revisado inglés amplía el matiz a ‘farmers’ para reflejar el sentido agrícola general. ‘Labradores’ mantiene la amplitud rural y el valor de trabajo de la tierra, sin reducirse solo a ‘agricultores’ modernos ni forzar ‘labradores’ como arcaísmo.
translation_notes:
  revision_awareness: El borrador sigue el estado más reciente del audit trail inglés, que retiene ‘the captain of the guard’ y revisa el final desde ‘plowmen’ a ‘farmers’. En español, ‘labradores’ preserva ese sentido amplio de trabajadores agrícolas, mientras se mantiene la equivalencia funcional del título oficial.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ solo cuando aparece el nombre divino; este versículo no lo contiene.
  - ‘Nebuzaradán’ sigue la transliteración española habitual del nombre propio.
  - Se evitó ‘siervos’ u otras opciones no presentes en el original; el versículo habla de trabajo agrícola asignado, no de un estatus servil explícito.
  - ‘Dejó a unos como… y a otros como…’ hace explícito el reparto implícito del hebreo para una lectura española natural sin añadir contenido no sustentado.
