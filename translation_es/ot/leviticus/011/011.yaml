    rationale: Aunque no es imposible, en español bíblico y general 'cadáver' suele evocar más naturalmente cuerpos humanos. En un contexto de pureza animal y dieta, 'carcasas' es más preciso y coincide mejor con el rationale léxico auditado.
  - severity: low
    issue: '''Serán para ustedes cosa detestable'' suena algo forzado'
    rationale: La frase conserva el sentido, pero 'les serán detestables' o 'serán detestables para ustedes' ofrece español más natural sin añadir ni quitar contenido.
  - severity: low
    issue: '''Nada de su carne'' es menos idiomático que otras opciones'
    rationale: Expresa el partitivo bajo negación, pero 'nada de la carne de esos animales' fluye mejor y evita una referencia posesiva algo áspera en español.
  revised_spanish_text: Y les serán detestables; no comerán nada de la carne de esos animales[a], y tendrán por detestables sus carcasas.
