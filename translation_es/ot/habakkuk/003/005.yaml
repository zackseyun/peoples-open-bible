translation:
  language: es
  text: Delante de él va la peste, y la plaga[a] sale a sus pies[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «plaga ardiente», «fiebre», o posiblemente «Reshef», nombre de una deidad de la plaga aludida en imaginería poética.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «a sus pies»; la frase también puede sugerir «detrás de él» o «en su séquito».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְפָנָיו
  english_pob_choice: Before him
  chosen_spanish: Delante de él
  alternatives_spanish:
  - Ante él
  - Frente a él
  lexicon: HALOT
  rationale: La preposición ל con פָּנִים más sufijo posesivo expresa posición delante de alguien. «Delante de él» conserva la imagen espacial y suena natural en español sin perder el matiz de precedencia en la marcha divina.
- source_word: יֵלֶךְ
  english_pob_choice: goes
  chosen_spanish: va
  alternatives_spanish:
  - camina
  - procede
  lexicon: HALOT
  rationale: El imperfecto transmite acción en curso o vívida en poesía. «Va» es breve, claro y reproduce bien el movimiento continuo del verso.
- source_word: דָּבֶר
  english_pob_choice: pestilence
  chosen_spanish: la peste
  alternatives_spanish:
  - la pestilencia
  - la plaga
  - la enfermedad
  lexicon: HALOT
  rationale: דָּבֶר denota enfermedad devastadora, especialmente en contextos de juicio. «La peste» comunica ese peso destructivo en español con registro elevado y evita confundirlo con רֶשֶׁף, que va en paralelo.
- source_word: וְיֵצֵא
  english_pob_choice: and ... comes out
  chosen_spanish: y la plaga sale
  alternatives_spanish:
  - y sale
  - y sale fuera
  - y sale de allí
  lexicon: HALOT
  rationale: 'יצא significa salir o ir fuera. «Sale» conserva el paralelismo poético con el primer colon y permite que la frase siguiente precise el lugar: «a sus pies».'
- source_word: רֶשֶׁף
  english_pob_choice: plague
  chosen_spanish: la plaga
  alternatives_spanish:
  - fiebre
  - ardor
  - Reshef
  lexicon: HALOT
  rationale: רֶשֶׁף puede significar ardor, fiebre, plaga o aludir al nombre Resheph. Siguiendo la lectura auditada del POB, el texto principal mantiene un sustantivo común que exprese fuerza destructiva sin introducir una identificación mítica en la línea principal.
- source_word: לְרַגְלָיו
  english_pob_choice: at his feet
  chosen_spanish: a sus pies
  alternatives_spanish:
  - tras él
  - detrás de él
  - a la altura de sus pasos
  lexicon: HALOT
  rationale: La expresión es literalmente «a/para sus pies». «A sus pies» mantiene la imagen concreta; en español también puede sugerir lo que acompaña su avance, como en la nota inglesa que menciona la posible idea de ir en su séquito.
theological_decisions:
- issue: Posible trasfondo mitológico de רֶשֶׁף
  english_pob_reading: Render as a common noun ('plague') rather than as the proper name 'Resheph' in the main text.
  chosen_spanish_reading: Traducirlo como sustantivo común («la plaga») en el texto principal, sin incorporar «Reshef/Resheph» al cuerpo del verso.
  alternative_spanish_readings:
  - Reshef
  - Resheph
  rationale: Aunque el término puede aludir al nombre de una deidad de la plaga en poesía antigua, la forma hebrea puntuada y el paralelismo inmediato con דָּבֶר favorecen una lectura de fuerza destructiva común. La versión española conserva esa tensión en nota, pero no la impone en la línea principal.
  doctrine_reference: Poética bíblica / imaginería teofánica; evitar sobrelectura mitológica en el texto principal
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el dictamen auditado del POB. Se mantiene la decisión de no convertir רֶשֶׁף en nombre propio en el cuerpo principal, y se preserva la posible lectura espacial de לְרַגְלָיו mediante nota. No se detectaron cambios de revisión posteriores relevantes en el paquete fuente.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto, pero este versículo no contiene el tetragrámaton.
  - Se prefiere «la peste / la plaga» para mantener la diferencia semántica entre דָּבֶר y רֶשֶׁף.
  - Se evita «SEÑOR» como sustituto del nombre divino porque no aparece aquí y porque la imaginería es de marcha teofánica, no de cita explícita del nombre.
  - El registro es poético, digno y publicable, sin arcaísmos innecesarios.
