translation:
  language: es
  text: Él trazó un círculo sobre la superficie de las aguas[a], en el límite de la luz y la oscuridad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Él puso un límite sobre la faz de las aguas, en el confín donde se encuentran la luz y la oscuridad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֹק
  english_pob_choice: inscribed
  chosen_spanish: trazó
  alternatives_spanish:
  - marcó
  - dibujó
  - delimitó
  lexicon: HALOT
  rationale: En este giro poético, חֹק no funciona como «estatuto», sino como la acción de fijar o marcar un límite. «Trazó» conserva la imagen concreta de trazar una línea o forma, sin convertirla en una mera declaración abstracta.
- source_word: חָג
  english_pob_choice: a circle
  chosen_spanish: un círculo
  alternatives_spanish:
  - un aro
  - un horizonte
  - una circunferencia
  lexicon: HALOT
  rationale: La raíz expresa la idea de círculo o circuito. «Círculo» es la equivalencia más directa y conserva la imagen cosmológica del texto.
- source_word: עַל פְּנֵי מָיִם
  english_pob_choice: on the surface of the waters
  chosen_spanish: sobre la superficie de las aguas
  alternatives_spanish:
  - sobre la faz de las aguas
  - encima de las aguas
  - en la superficie de las aguas
  lexicon: HALOT
  rationale: פְּנֵי comunica la imagen de la superficie o faz visible. «Sobre la superficie de las aguas» mantiene la concreción espacial y resulta natural en español.
- source_word: עַד
  english_pob_choice: at
  chosen_spanish: hasta
  alternatives_spanish:
  - al
  - unto
  - a
  lexicon: HALOT
  rationale: Aquí עַד introduce el alcance o punto final del trazo. «Hasta» expresa bien la idea de límite alcanzado por el círculo.
- source_word: תַּכְלִית
  english_pob_choice: the boundary
  chosen_spanish: el límite
  alternatives_spanish:
  - el extremo
  - la frontera
  - el fin
  lexicon: HALOT
  rationale: El sustantivo señala un punto terminal o límite. «Límite» preserva esa fuerza sin añadir una imagen más específica de la que exige el hebreo.
- source_word: אוֹר עִם חֹשֶׁךְ
  english_pob_choice: between light and darkness
  chosen_spanish: de la luz con la oscuridad
  alternatives_spanish:
  - entre la luz y la oscuridad
  - de la luz y la oscuridad
  - donde se encuentran la luz y la oscuridad
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «luz con oscuridad». En español, «el límite de la luz con la oscuridad» conserva la relación textual sin ocultar la yuxtaposición original. No se optó por «entre» en el texto principal para no suavizar la forma hebrea, aunque permanece como alternativa interpretativa.
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó 'between light and darkness' a 'of light and darkness' para acercarse a la formulación hebrea «light with darkness». La versión española sigue ese ajuste y evita introducir «entre» en el texto principal, aunque lo reconoce como posibilidad interpretativa en la nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «aguas» en plural para reflejar el sustantivo hebreo colectivo y la formulación poética.
  - «Límite» conserva la ambigüedad entre borde, frontera y extremo, sin añadir precisión no atestiguada.
