translation:
  language: es
  text: Después de tomar ropa de ellos[a], los sacerdotes visten a sus esposas y a sus hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, de los ídolos; el pronombre remite a las imágenes descritas en el contexto circundante.
    reason: cross_reference
lexical_decisions:
- source_word: ἀπὸ
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - desde
  - a partir de
  lexicon: BDAG
  rationale: La preposición griega expresa separación o procedencia; en español, «de» comunica de manera natural la idea de tomar algo de un origen o fuente.
- source_word: τοῦ ἱματισμοῦ
  english_pob_choice: garments
  chosen_spanish: vestidos
  alternatives_spanish:
  - vestiduras
  - ropa
  - atuendos
  lexicon: BDAG
  rationale: ἱματισμός nombra prendas de vestir en conjunto. «Vestidos» suena más concreto y natural en español que «ropa», sin perder el sentido colectivo.
- source_word: αὐτῶν
  english_pob_choice: them
  chosen_spanish: ellos
  alternatives_spanish:
  - los ídolos
  - esas imágenes
  lexicon: BDAG
  rationale: El pronombre griego se mantiene de forma pronominal en el texto, y el contexto inmediato permite que el lector entienda que se refiere a los ídolos sin sobrecargar el versículo con una expansión explicativa.
- source_word: ἀφελόμενοι
  english_pob_choice: after taking
  chosen_spanish: después de tomar
  alternatives_spanish:
  - habiendo tomado
  - tras quitar
  lexicon: BDAG
  rationale: El participio aoristo marca una acción anterior a la principal; «después de tomar» refleja bien la secuencia temporal en español y conserva la relación de anterioridad.
- source_word: οἱ ἱερεῖς
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los presbíteros
  lexicon: BDAG
  rationale: «Sacerdotes» es la correspondencia directa y más clara para ἱερεῖς en este contexto de culto idolátrico.
- source_word: ἐνδύουσιν
  english_pob_choice: clothe
  chosen_spanish: visten
  alternatives_spanish:
  - ponen vestidos a
  - revisten
  lexicon: BDAG
  rationale: El verbo significa poner ropa sobre alguien. «Visten» es breve, idiomático y mantiene la acción directa sobre las personas receptoras.
- source_word: τὰς γυναίκας αὐτῶν
  english_pob_choice: their wives
  chosen_spanish: a sus mujeres
  alternatives_spanish:
  - a sus esposas
  lexicon: BDAG
  rationale: La frase griega designa a las mujeres de los sacerdotes. «Mujeres» sigue de cerca el término de base y evita introducir un matiz más formal que no está en el griego; el posesivo se mantiene porque el contexto lo exige.
- source_word: τὰ παιδία
  english_pob_choice: children
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus niños
  - a sus hijas e hijos
  lexicon: BDAG
  rationale: παιδία significa «niños/niños pequeños» en plural amplio; aquí «hijos» funciona bien en español para incluir a los descendientes en general dentro del grupo familiar.
theological_decisions:
- issue: Referente de αὐτῶν en «de ellos»
  english_pob_reading: The pronoun refers to the idols' garments, i.e., the priests strip clothing from the idols and use it for their families.
  chosen_spanish_reading: El pronombre se deja referido de manera implícita a los ídolos del contexto; la traducción no lo explicita en el cuerpo del verso, pero la nota sí aclara el referente.
  alternative_spanish_readings:
  - de los ídolos
  - de esas imágenes
  rationale: El griego usa solo un pronombre, y el audit trail inglés preserva esa sobriedad textual. En español, una nota puede resolver la referencia sin sustituir la forma breve del original en el texto principal.
  doctrine_reference: Primacía del texto original y conservación de las alusiones del contexto inmediato; claridad explicativa por nota cuando el referente no aparece explícito en el versículo.
translation_notes:
  revision_awareness: 'Sigo la revisión más reciente del audit trail inglés: se mantuvo la construcción sencilla sin añadir intensificación innecesaria en el posesivo, y se preservó la referencia pronominal implícita mediante nota. La redacción española busca equivalencia óptima, con un verbo natural («visten») y un sustantivo concreto («vestidos») que reflejan el acto de quitar ropa de los ídolos para vestir a la familia de los sacerdotes.'
  spanish_consistency_notes:
  - Uso «sacerdotes» para οἱ ἱερεῖς, en coherencia con el registro bíblico y con el contexto idolátrico.
  - Conservo la referencia pronominal ambigua en el cuerpo del texto y la resuelvo en nota, siguiendo la práctica auditada del POB inglés.
  - «Mujeres» y «hijos» mantienen la naturalidad del español y corresponden al grupo familiar del griego sin ampliar el contenido.
