  language: en
  yaml_path: translation/ot/joshua/020/003.yaml
  text: so that a manslayer who strikes down a person unintentionally[a], without knowledge, may flee there[b], and they shall be for you a refuge from the avenger of blood.
  footnotes:
  - marker: a
    text: Or 'killer' or 'slayer'; the Hebrew term is qualified here by 'unintentionally' and 'without knowledge,' so it does not mean a deliberate murderer in this verse.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the blood avenger'; the Hebrew phrase refers to the person responsible for avenging a death within Israel's kinship-based legal system.
    reason: cultural_note
