translation:
  language: es
  text: Y el rey examinó[a] a los dos eunucos[b], y después de que confesaron, fueron conducidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «interrogó»; el griego puede denotar una pesquisa formal.
    reason: lexical_alternative
  - marker: b
    text: O «oficiales de la corte»; sin embargo, el griego dice específicamente «eunucos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξήτασεν
  english_pob_choice: examined
  chosen_spanish: examinó
  alternatives_spanish:
  - interrogó
  - investigó
  lexicon: LSJ
  rationale: El griego indica una pesquisa o examen formal. «Examinó» conserva la iniciativa del rey sin cargar el verbo con un matiz penal más fuerte que «interrogó», y sin volverlo demasiado abstracto con «investigó».
- source_word: εὐνούχους
  english_pob_choice: eunuchs
  chosen_spanish: eunucos
  alternatives_spanish:
  - oficiales de la corte
  - camareros de la corte
  lexicon: LSJ
  rationale: El término griego es literal y designa eunucos. Aunque en contexto palaciego podían desempeñar funciones de oficiales, la forma más fiel y transparente en español es «eunucos».
- source_word: ὁμολογήσαντες
  english_pob_choice: after they confessed
  chosen_spanish: después de que confesaron
  alternatives_spanish:
  - habiendo admitido
  - después de reconocerlo
  lexicon: LSJ
  rationale: El participio expresa admisión o confesión en respuesta al examen. «Después de que confesaron» preserva la secuencia narrativa y el sentido de reconocimiento de culpa.
- source_word: ἀπήχθησαν
  english_pob_choice: they were led away
  chosen_spanish: fueron llevados lejos
  alternatives_spanish:
  - fueron retirados
  - fueron conducidos
  lexicon: LSJ
  rationale: El pasivo señala remoción bajo autoridad. «Fueron llevados lejos» comunica esa acción custodial en español natural sin añadir detalles no presentes en el griego.
