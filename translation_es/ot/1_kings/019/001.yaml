translation:
  language: es
  text: Acab le contó a Jezabel todo lo que Elías había hecho[a], y todo lo referente a que había matado a todos los profetas con la espada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, los profetas de Baal en el contexto inmediatamente anterior (véase 1 Reyes 18:40).
    reason: cross_reference
lexical_decisions:
- source_word: וַיַּגֵּד
  english_pob_choice: told
  chosen_spanish: llevó a conocer / contó
  alternatives_spanish:
  - contó
  - informó
  lexicon: HALOT
  rationale: El verbo hiphil de נגד expresa dar a conocer o informar. En español, 'contó' resulta natural en narrativa; aquí se opta por 'llevó a Jezabel todo lo que...' como una forma idiomática breve de comunicar la acción de informar sin perder el movimiento narrativo.
- source_word: אַחְאָב
  english_pob_choice: Ahab
  chosen_spanish: Acab
  alternatives_spanish:
  - Ahab
  lexicon: convención bíblica española
  rationale: En español bíblico es común 'Acab'. Se mantiene la forma tradicional inteligible para lectores de iglesia en español.
- source_word: לְאִיזֶבֶל
  english_pob_choice: to Jezebel
  chosen_spanish: a Jezabel
  alternatives_spanish:
  - para Jezabel
  lexicon: uso sintáctico español
  rationale: La lamed marca complemento indirecto; en español natural se expresa con 'a Jezabel'.
- source_word: כָּל אֲשֶׁר עָשָׂה
  english_pob_choice: all that ... had done
  chosen_spanish: todo lo que ... había hecho
  alternatives_spanish:
  - todo cuanto ... había hecho
  lexicon: equivalencia semántica general
  rationale: '''Todo lo que'' conserva la amplitud de כָּל אֲשֶׁר. El pluscuamperfecto español refleja la relación temporal retrospectiva del informe.'
- source_word: אֵלִיָּהוּ
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Elias
  lexicon: convención bíblica española
  rationale: Nombre propio bíblico estándar en español.
- source_word: וְאֵת כָּל אֲשֶׁר הָרַג
  english_pob_choice: and all that he had killed
  chosen_spanish: y todo lo que había matado
  alternatives_spanish:
  - y todo cuanto había matado
  - y todo lo que había matado a
  lexicon: HALOT
  rationale: La repetición de כָּל אֲשֶׁר se conserva con 'todo lo que'. El verbo הרג se vierte con 'había matado' por claridad directa y fuerza léxica.
- source_word: כָּל הַנְּבִיאִים
  english_pob_choice: all the prophets
  chosen_spanish: a todos los profetas
  alternatives_spanish:
  - todos los profetas
  lexicon: uso de objeto directo español
  rationale: El hebreo presenta un objeto directo marcado; en español, el objeto personal plural se expresa naturalmente con 'a'. Se conserva el carácter totalizador de 'todos los profetas'.
- source_word: בֶּחָרֶב
  english_pob_choice: with the sword
  chosen_spanish: con la espada
  alternatives_spanish:
  - por medio de la espada
  - por la espada
  lexicon: HALOT
  rationale: '''Espada'' es la equivalencia natural de חרב en español bíblico. ''Con la espada'' mantiene el valor instrumental del beth.'
theological_decisions:
- issue: Identificación de 'los profetas'
  english_pob_reading: all the prophets without specifying 'of Baal' in the main text
  chosen_spanish_reading: todos los profetas, sin añadir 'de Baal' en el cuerpo del versículo
  alternative_spanish_readings:
  - todos los profetas de Baal
  rationale: El texto hebreo de este versículo no especifica 'de Baal'. La nota puede aclarar el contexto inmediato sin introducirlo en la línea principal.
  doctrine_reference: Primacía del texto fuente; no importar especificaciones contextuales al cuerpo cuando no están expresas.
- issue: Repetición de כָּל אֲשֶׁר
  english_pob_reading: revised to reflect the repeated 'all that' rather than interpreting it as 'how'
  chosen_spanish_reading: se mantiene la repetición con 'todo lo que... y todo lo que...'
  alternative_spanish_readings:
  - y cómo había matado
  rationale: La segunda cláusula repite la estructura del hebreo. Se conserva para no suavizar la repetición retórica ni reinterpretarla como explicación ('cómo').
  doctrine_reference: Fidelidad estructural al hebreo; evitar condensación interpretativa innecesaria.
translation_notes:
  revision_awareness: La versión inglesa revisó una formulación tipo 'and how he had killed' para volver a la repetición literal de 'all that' en el hebreo. Esta propuesta española sigue esa revisión y conserva ambas cláusulas paralelas. También evita insertar 'de Baal' en el texto principal, pero lo aclara en nota como referencia contextual.
  spanish_consistency_notes:
  - Se usa 'Acab', 'Jezabel' y 'Elías' conforme a la tradición bíblica española.
  - Se prefiere 'espada' para חרב por naturalidad y correspondencia bíblica.
  - Se mantiene la repetición de 'todo lo que' para reflejar el paralelismo del hebreo.
