translation:
  language: es
  text: Mientras Judas aún decía estas cosas en voz baja, apareció algo[a], saliendo del monte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego literalmente, «cierta parte» o «alguna parte»; probablemente se refiere a una porción de la fuerza enemiga que empezó a verse desde el monte.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔτι
  english_pob_choice: while ... was still
  chosen_spanish: aún
  alternatives_spanish:
  - todavía
  - mientras seguía
  lexicon: LSJ
  rationale: ἔτι marca simultaneidad y continuidad de la acción anterior; «aún» conserva esa simultaneidad de modo natural en español, sin perder el matiz de continuidad.
- source_word: ὑποφθεγγομένου
  english_pob_choice: saying ... in a low voice
  chosen_spanish: decía ... en voz baja
  alternatives_spanish:
  - hablaba en voz baja
  - murmuraba
  - pronunciaba en voz baja
  lexicon: LSJ
  rationale: El verbo sugiere hablar en un tono bajo o contenido. «Decía ... en voz baja» reproduce el matiz de habla atenuada sin cargarlo con la posible connotación de queja de «murmuraba».
- source_word: Ἰούδου
  english_pob_choice: Judas
  chosen_spanish: Judas
  lexicon: transliteration
  rationale: Nombre propio estándar en español para Ἰούδας en este contexto histórico deuterocanónico.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas palabras
  - esto
  lexicon: LSJ
  rationale: El demonstrativo retoma las palabras previas de Judas; «estas cosas» es una equivalencia directa y natural, y preserva la amplitud del griego.
- source_word: ὤφθη
  english_pob_choice: appeared
  chosen_spanish: apareció
  alternatives_spanish:
  - fue visto
  - salió a la vista
  - se dejó ver
  lexicon: LSJ
  rationale: La forma pasiva tiene sentido intransitivo en el contexto narrativo; «apareció» expresa la irrupción visual repentina de manera idiomática en español.
- source_word: μέρος τι
  english_pob_choice: a certain part
  chosen_spanish: cierta parte
  alternatives_spanish:
  - alguna parte
  - una parte determinada
  - un destacamento
  lexicon: LSJ
  rationale: Literalmente es «alguna cierta parte». Como el griego no especifica «del ejército enemigo», conviene no añadir ese contenido. «Cierta parte» mantiene la indefinición del original y sugiere un sector o porción sin explicitar más de lo que dice el texto.
- source_word: ἐκκύπτον
  english_pob_choice: coming out
  chosen_spanish: saliendo
  alternatives_spanish:
  - emergiendo
  - asomando
  - saliendo afuera
  lexicon: LSJ
  rationale: El participio describe algo que surge o sale desde la montaña. «Saliendo» conserva el movimiento de salida de forma directa y clara en español.
- source_word: ἐκ τοῦ ὄρους
  english_pob_choice: from the mountain
  chosen_spanish: del monte
  alternatives_spanish:
  - de la montaña
  - del monte/cerro
  lexicon: LSJ
  rationale: «ὄρος» puede renderizarse como «montaña» o «monte». Aquí «del monte» suena más natural en español narrativo y conserva el referente geográfico elevado sin forzar un tecnicismo.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior incluyendo el marcador de nota [a] directamente en el texto traducido. Además, se evitó añadir contenido no presente en el griego, especialmente cualquier aclaración sobre un ejército enemigo.
  spanish_consistency_notes:
  - Se mantuvo «Judas» como nombre propio estándar y «apareció» para ὤφθη, siguiendo una equivalencia natural en español.
  - Se eligió «cierta parte» para μέρος τι, sin expandirlo a «fuerza enemiga» porque el griego no lo dice explícitamente.
  - «Del monte» se prefirió sobre «de la montaña» por fluidez, pero sin perder el valor de ὄρος.
  - La nota al pie queda anclada explícitamente en «voz baja[a]» para cumplir con la validación de marcadores.
