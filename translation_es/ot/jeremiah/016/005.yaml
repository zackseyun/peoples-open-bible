translation:
  language: es
  text: 'Porque así dice Yahvé: No entres en casa de duelo[a], ni vayas a hacer duelo ni a mostrarles condolencia[b]; porque he quitado mi paz[c] de este pueblo, declara Yahvé: el amor fiel y la compasión.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'casa de banquete'. El término hebreo מַרְזֵחַ puede referirse a un contexto de fiesta o banquete en otros pasajes, pero aquí el entorno de luto favorece 'casa de duelo'.
    reason: lexical_alternative
  - marker: b
    text: O 'consolarlos'. El verbo hebreo puede referirse a gestos de condolencia o consuelo hacia quienes están de duelo.
    reason: lexical_alternative
  - marker: c
    text: '''Paz'' aquí probablemente incluye bienestar, plenitud y prosperidad, no solo la ausencia de conflicto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: nombre divino (Tetragrámaton)
  rationale: Se sigue el nombre divino no velado, conforme al principio del proyecto. En español, 'Yahvé' mantiene la referencia al Tetragrámaton sin sustituirlo por un título.
- source_word: בֵּית מַרְזֵחַ
  english_pob_choice: a house of mourning
  chosen_spanish: casa de duelo
  alternatives_spanish:
  - casa de luto
  - casa de banquete
  lexicon: HALOT
  rationale: El contexto inmediato de lamento y condolencia favorece el sentido funerario. 'Casa de duelo' es natural en español y conserva la ambigüedad secundaria del término mejor que una glosa más amplia.
- source_word: לִסְפּוֹד
  english_pob_choice: to mourn
  chosen_spanish: lamentar
  alternatives_spanish:
  - guardar luto
  - llorar por los muertos
  lexicon: HALOT
  rationale: El verbo apunta al acto de lamento en contexto funerario. 'Lamentar' preserva esa acción sin sobrecargarla con un matiz demasiado técnico o repetitivo respecto de 'duelo'.
- source_word: תָּנֹד לָהֶם
  english_pob_choice: show sympathy for them
  chosen_spanish: consolarlos
  alternatives_spanish:
  - mostrarles simpatía
  - hacer duelo con ellos
  lexicon: HALOT
  rationale: La POB inglesa entiende aquí gestos de condolencia/simpatía. En español, 'consolarlos' comunica de manera clara la función social del gesto; aunque no agota toda la gama, el contexto de duelo lo justifica. La nota mantiene la alternativa de 'mostrarles simpatía'.
- source_word: שְׁלוֹמִי
  english_pob_choice: my peace
  chosen_spanish: mi paz
  alternatives_spanish:
  - mi bienestar
  - mi plenitud
  lexicon: HALOT
  rationale: '''Paz'' es el equivalente directo y deja abierta la amplitud covenantal de שָׁלוֹם. Se evita expandir demasiado el término en el texto principal.'
- source_word: אָסַפְתִּי אֶת שְׁלוֹמִי
  english_pob_choice: I have taken away my peace
  chosen_spanish: he quitado mi paz
  alternatives_spanish:
  - he retirado mi paz
  - he apartado mi paz
  lexicon: HALOT
  rationale: '''He quitado'' refleja bien el valor de retirar/quitar asociado con אָסַף en este contexto y suena natural en español actual.'
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética solemne con una opción contemporánea y clara. 'Declara Yahvé' reproduce el peso formal del hebreo sin sonar arcaico.
- source_word: הַחֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: la bondad amorosa
  alternatives_spanish:
  - el amor constante
  - la fidelidad amorosa
  lexicon: HALOT
  rationale: Para español, 'bondad amorosa' comunica el componente relacional y benigno de חֶסֶד sin imponer de entrada una sola glosa doctrinal. Se evita 'misericordia' porque el término siguiente ya cubre compasión/entrañas de misericordia y aquí el par hebreo apunta a cualidades del favor divino retirado.
- source_word: הָרַחֲמִים
  english_pob_choice: compassion
  chosen_spanish: la compasión
  alternatives_spanish:
  - las misericordias
  - la ternura
  lexicon: HALOT
  rationale: El plural hebreo funciona como abstracción plural; 'compasión' mantiene el sentido global y empareja bien con 'bondad amorosa'.
theological_decisions:
- issue: Relación entre 'mi paz' y los sustantivos finales ('חֶסֶד' y 'רַחֲמִים')
  english_pob_reading: The final accusatives are appositional to 'my peace,' specifying what God has withdrawn.
  chosen_spanish_reading: 'Los sustantivos finales se leen como especificación de lo que Yahvé ha quitado: su paz, es decir, su bondad amorosa y su compasión.'
  alternative_spanish_readings:
  - He quitado mi paz de este pueblo, y también la bondad amorosa y la compasión.
  - 'He quitado mi paz de este pueblo: la bondad amorosa y la compasión.'
  rationale: El hebreo permite entender los últimos dos acusativos como explicación/apposición de lo retirado. La puntuación con dos puntos preserva esa relación sin añadir verbos inexistentes ni borrar la tensión semántica.
  doctrine_reference: Lectura sintáctica del paralelismo hebreo en Jeremías 16:5; coherente con la observación del POB inglés sobre la aposición final.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés: se mantuvo el valor funerario de בֵּית מַרְזֵחַ, se optó por un verbo natural para לִסְפּוֹד y se preservó la clausula final como especificación de lo retirado por Yahvé. La puntuación y el léxico español se ajustaron para sonar naturales sin perder la estructura semítica del versículo.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el Tetragrámaton, conforme al estándar del proyecto.
  - Se evitó 'SEÑOR' como sustituto del nombre divino.
  - '''Paz'' conserva la amplitud covenantal del hebreo שָׁלוֹם.'
  - '''Compasión'' se usa para רַחֲמִים como plural abstracto; no se singulariza a ''misericordia'' para no perder el paralelismo con חֶסֶד.'
  - La frase final se mantiene con dos puntos para reflejar la apposición semántica sin sobreexplicar.
