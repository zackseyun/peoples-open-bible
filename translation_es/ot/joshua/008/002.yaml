base_translation:
  language: en
  yaml_path: translation/ot/joshua/008/002.yaml
  text: And you shall do to Ai and its king as you did to Jericho and its king[a]. Only its spoil and its livestock you may plunder for yourselves[b]. Set an ambush for yourself behind the city.
  footnotes:
  - marker: a
    text: Or 'you shall plunder for yourselves.' The Hebrew form can be read as a straightforward future or as an authorized instruction; the main text uses 'may plunder' to reflect the contrast with Jericho, where plunder was forbidden.
    reason: lexical_alternative
  - marker: b
    text: Or 'set men in ambush behind the city.' The Hebrew singular participle can denote the ambush as a unit or the ambushing force collectively.
    reason: lexical_alternative
