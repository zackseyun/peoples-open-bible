translation:
  language: es
  text: 'Entonces dijo Memucán delante del rey y de los funcionarios[a]: «La reina Vasti no ha obrado mal solo contra el rey, sino contra todos los funcionarios y contra todos los pueblos que están en todas las provincias del rey Asuero».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La reina Vasti no ha obrado mal solo contra el rey, sino también contra todos los funcionarios y contra todos los pueblos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces dijo
  alternatives_spanish:
  - Y dijo
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración; «Entonces» conserva la secuencia y suena natural en español sin perder el valor de continuación narrativa.
- source_word: מומכן
  english_pob_choice: Memucan
  chosen_spanish: Memucán
  alternatives_spanish:
  - Memucan
  lexicon: Transliteración estándar
  rationale: Se mantiene el nombre propio con adaptación gráfica al español mediante acento prosódico, sin alterar la forma identificable del personaje.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  lexicon: HALOT
  rationale: La expresión indica comparecencia y habla ante la autoridad; «delante de» es natural y preserva la relación pública de la escena.
- source_word: הַשָּׂרִים
  english_pob_choice: the officials
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los príncipes
  - los nobles
  lexicon: HALOT
  rationale: En el contexto persa, שָׂרִים designa altos funcionarios de corte. «Oficiales» evita el arcaísmo de «príncipes» y refleja el rango administrativo.
- source_word: לֹא עַל הַמֶּלֶךְ לְבַדּוֹ
  english_pob_choice: not against the king alone
  chosen_spanish: no ... solo contra el rey
  alternatives_spanish:
  - no ... contra el rey únicamente
  lexicon: HALOT
  rationale: El hebreo usa עַל con sentido de afrenta o daño dirigido contra alguien; «contra» explicita esa relación. «Solo» mantiene el contraste con la cláusula siguiente.
- source_word: עָוְתָה
  english_pob_choice: has done wrong
  chosen_spanish: ha obrado mal
  alternatives_spanish:
  - ha hecho lo malo
  - ha actuado perversamente
  lexicon: HALOT
  rationale: El verbo expresa conducta torcida o incorrecta. «Ha obrado mal» es idiomático y moralmente claro en español, sin reducirlo a una mera ofensa social.
- source_word: וַשְׁתִּי הַמַּלְכָּה
  english_pob_choice: Queen Vashti
  chosen_spanish: la reina Vasti
  alternatives_spanish:
  - Vasti, la reina
  lexicon: HALOT
  rationale: Se sigue el orden natural del español con título + nombre, conservando el valor titular de הַמַּלְכָּה.
- source_word: כִּי
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - más bien
  lexicon: HALOT
  rationale: Aquí la partícula introduce corrección tras la negación anterior; «sino» reproduce mejor el contraste exclusivocorrectivo que «pero».
- source_word: עַל כָּל הַשָּׂרִים וְעַל כָּל הָעַמִּים
  english_pob_choice: against all the officials and all the peoples
  chosen_spanish: contra todos los oficiales y contra todos los pueblos
  alternatives_spanish:
  - contra todos los príncipes y contra todos los pueblos
  - contra todos los oficiales y contra toda la gente
  lexicon: HALOT
  rationale: Se repite «contra» para reflejar la paralelismo de עַל ... וְעַל. «Pueblos» conserva el plural de עַמִּים y la amplitud imperial del pasaje.
- source_word: אֲשֶׁר בְּכָל מְדִינוֹת
  english_pob_choice: who are in all the provinces
  chosen_spanish: que están en todas las provincias
  alternatives_spanish:
  - que se encuentran en todas las provincias
  - que están por todas las provincias
  lexicon: HALOT
  rationale: La relativa describe ubicación dentro del imperio; «están en» es directo y fiel. «Provincias» es el equivalente más claro para מְדִינוֹת en Ester.
- source_word: הַמֶּלֶךְ אֲחַשְׁוֵרוֹשׁ
  english_pob_choice: King Ahasuerus
  chosen_spanish: el rey Asuero
  alternatives_spanish:
  - el rey Jerjes
  lexicon: HALOT
  rationale: Se conserva el título real y se translitera el nombre según la tradición española habitual en este libro, sin sustituirlo por una identificación interpretativa.
theological_decisions:
- issue: 'Alcance de la falta de Vasti: solo el rey o también todo el orden imperial'
  english_pob_reading: Vashti has done wrong not against the king alone, but against all the officials and all the peoples.
  chosen_spanish_reading: La reina Vasti no ha obrado mal solo contra el rey, sino contra todos los oficiales y contra todos los pueblos.
  alternative_spanish_readings:
  - La reina Vasti no ha obrado mal solo contra el rey, sino también contra todos los oficiales y contra todos los pueblos.
  - Vasti la reina no ha obrado mal contra el rey solo, sino contra todos los oficiales y los pueblos.
  rationale: 'El hebreo presenta una expansión correctiva: no únicamente el rey, sino también la élite y los pueblos del imperio. «Sino» preserva esa tensión inclusiva sin suavizarla a una simple adición. La puntuación mantiene la secuencia argumentativa del consejero.'
  doctrine_reference: No doctrinal issue; court-political rhetoric in the narrative.
translation_notes:
  revision_awareness: El texto sigue de cerca el sentido del hebreo y la solución inglesa auditada. No se perciben revisiones sustantivas frente al pasaje base; la principal decisión española afecta la partícula כִּי, donde se opta por «sino» para reproducir mejor el giro correctivo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto hebreo lo exige explícitamente; aquí no aparece.
  - Se mantiene «Asuero» como forma española estable del nombre propio persa en Ester.
  - «Oficiales» traduce שָׂרִים conforme al criterio contextual de corte imperial.
  - «Pueblos» conserva el plural de עַמִּים y evita singularizar indebidamente la referencia colectiva.
