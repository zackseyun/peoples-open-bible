translation:
  language: es
  text: y en Bet-marcabot[a], y en Hazar-susim[b], y en Bet-biri[c], y en Saaraim[d]. Estas eran sus ciudades hasta que David reinó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Bet-marcabot puede entenderse más literalmente como "Casa de carros", pero aquí se toma como nombre de lugar.
    reason: lexical_alternative
  - marker: b
    text: Hazar-susim puede entenderse más literalmente como "Patio de caballos" o "Villa de caballos", pero aquí se toma como nombre de lugar.
    reason: lexical_alternative
  - marker: c
    text: Bet-biri también puede escribirse "Bet-birei" en algunas tradiciones de transliteración.
    reason: alternative_reading
  - marker: d
    text: Saaraim puede reflejar un sentido etimológico como "Dos puertas", pero aquí se toma como nombre de lugar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/בֵית מַרְכָּבוֹת
  english_pob_choice: Beth-marcaboth
  chosen_spanish: Bet-marcabot
  alternatives_spanish:
  - Casa de Carros
  - Bet-markabot
  lexicon: HALOT
  rationale: En el contexto de una lista de poblaciones, el hebreo funciona como topónimo y conviene preservarlo como nombre propio. Se mantiene la forma transliterada; la opción literal "Casa de Carros" queda como alternativa semántica pero no se impone en el texto principal.
- source_word: וּ/בַ/חֲצַר סוּסִים
  english_pob_choice: Hazar-susim
  chosen_spanish: Hazar-susim
  alternatives_spanish:
  - Patio de Caballos
  - Villa de Caballos
  lexicon: HALOT
  rationale: También se trata de un nombre de lugar dentro del listado. Se conserva la transliteración para respetar el valor toponímico, aunque el sentido componente puede entenderse como "patio" o "villa" de caballos.
- source_word: וּ/בְ/בֵית בִּרְאִי
  english_pob_choice: Beth-biri
  chosen_spanish: Bet-biri
  alternatives_spanish:
  - Bet-birei
  - Casa de Biri
  lexicon: HALOT
  rationale: Se sigue la decisión de tratarlo como topónimo. En español, "Bet-biri" reproduce la transliteración de forma clara y breve; se conserva la posibilidad de una vocalización alternativa en la tradición transliterada, pero no se traduce el elemento nominal.
- source_word: וּֽ/בְ/שַׁעֲרָ֑יִם
  english_pob_choice: Shaaraim
  chosen_spanish: Saaraim
  alternatives_spanish:
  - Shaaraim
  - Dos Puertas
  lexicon: HALOT
  rationale: El contexto de listado geográfico favorece leerlo como nombre propio. Aunque la etimología sugiere "dos puertas", esa traducción se deja como alternativa y no sustituye al topónimo en el texto principal.
- source_word: אֵ֥לֶּה
  english_pob_choice: These
  chosen_spanish: Estas
  alternatives_spanish:
  - Estas localidades
  lexicon: HALOT
  rationale: El demostrativo en plural femenino concuerda naturalmente con "ciudades". "Estas" reproduce el valor deíctico sin añadir material ajeno al hebreo.
- source_word: עָרֵי/הֶ֖ם
  english_pob_choice: were their cities
  chosen_spanish: sus ciudades
  alternatives_spanish:
  - sus poblados
  - sus villas
  lexicon: HALOT
  rationale: Se conserva la relación posesiva y el sustantivo básico "ciudades", adecuado al registro territorial de Crónicas. La cópula se expresa de modo natural en español con la cláusula final completa.
- source_word: עַד מְלֹךְ דָּוִיד
  english_pob_choice: until David reigned
  chosen_spanish: hasta que David reinó
  alternatives_spanish:
  - hasta el reinado de David
  - hasta que David comenzó a reinar
  lexicon: HALOT
  rationale: El infinitivo constructo con עד marca límite temporal. En español, "hasta que David reinó" preserva la fuerza verbal de la cláusula y suena natural; no se explicita más de lo que el hebreo exige.
translation_notes:
  revision_awareness: El borrador sigue de cerca el audit trail inglés de la POB para mantener el tratamiento toponímico de los cuatro nombres de lugares y la clausula temporal final, sin introducir reinterpretaciones no atestiguadas. Se adapta la transliteración al español con formas breves y legibles.
  spanish_consistency_notes:
  - Se usa "Bet" para בית en lugar de "Beth" por naturalidad ortográfica en español, manteniendo la transliteración reconocible.
  - Se conserva el patrón de nombres propios con guion para reflejar la segmentación habitual de los topónimos semíticos.
  - No se traduce el valor etimológico de los nombres en el texto principal, en coherencia con la decisión auditada de la POB inglesa.
