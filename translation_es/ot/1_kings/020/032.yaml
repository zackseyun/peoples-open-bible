review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la secuencia narrativa, la súplica de Ben-adad y la ambigüedad de «mi hermano». Sin embargo, no preserva con precisión una nota clave del rastro inglés: la nota [a] sobre «Please let me live / Spare my life» fue anclada erróneamente a «sacos» en vez de a la súplica «me dejes vivir». Además, «sacos» suena menos fiel e idiomático que «tela áspera de duelo» o similar para שַׂקִּים en este contexto de humillación.'
  spanish_quality_summary: El español es generalmente legible y digno, pero la colocación de las notas es defectuosa y crea confusión. También conviene mejorar «se ciñeron sacos» a una formulación más natural en español contemporáneo eclesial, como «se ataron tela áspera de duelo a la cintura», que comunica mejor el gesto sin sonar extraño.
  glossary_alignment: No hay conflicto con los términos de proyecto mayores. «Tu siervo» para עַבְדְּךָ y «mi hermano» para אָחִי están bien justificados. El nombre «Ben-adad» es aceptable en español, aunque la forma del rastro inglés es «Ben-hadad»; no requiere adjudicación. La principal desviación está en la implementación de notas y en la elección menos adecuada de «sacos» para שַׂקִּים.
  issues:
  - severity: high
    issue: La nota [a] está anclada a «sacos» pero su contenido explica la súplica «Te ruego que me dejes vivir».
    rationale: Esto rompe la correspondencia entre marcador y texto requerida por el proyecto y distorsiona la evidencia lexical documentada.
  - severity: medium
    issue: «Se ciñeron sacos» suena poco natural y puede malentender שַׂקִּים como objetos en lugar de vestimenta/material de luto.
    rationale: El hebreo apunta al uso de tela de saco/cilicio como señal de humillación; en español neutral conviene una formulación más clara.
  - severity: low
    issue: La nota sobre «sogas sobre la cabeza» es útil, pero no estaba preservada como nota inglesa obligatoria.
    rationale: Puede mantenerse si sigue ayudando a la claridad en español, siempre que no desplace notas más importantes ni viole el anclaje.
  revised_spanish_text: 'Así que se ataron tela áspera de duelo a la cintura y sogas sobre la cabeza[a], y fueron al rey de Israel y dijeron: «Tu siervo Ben-adad dice: “Por favor, déjame vivir[b]”». Y él dijo[c]: «¿Aún vive? Él es mi hermano».'
