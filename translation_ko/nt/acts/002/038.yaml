id: ACT.2.38
reference: Acts 2:38
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Πέτρος δὲ ⸂πρὸς αὐτούς· Μετανοήσατε⸃, καὶ βαπτισθήτω ἕκαστος ὑμῶν ⸀ἐπὶ τῷ ὀνόματι Ἰησοῦ Χριστοῦ εἰς ἄφεσιν ⸀τῶν ἁμαρτιῶν ⸀ὑμῶν, καὶ λήμψεσθε τὴν δωρεὰν τοῦ ἁγίου πνεύματος·
base_translation:
  language: en
  yaml_path: translation/nt/acts/002/038.yaml
  text: And Peter said to them[a], “Repent, and let each of you be baptized in the name of Jesus Messiah for the forgiveness of your sins[b], and you will receive the gift of the Holy Spirit.”
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.' The Greek title Χριστός can be rendered either 'Messiah' or 'Christ'; here 'Messiah' is used to preserve the title's meaning in Peter's proclamation.
    reason: alternative_reading
  - marker: b
    text: The phrase 'for the forgiveness of your sins' translates the Greek directly. Interpreters differ on how baptism relates to forgiveness here; the translation does not resolve that debate beyond the wording of the text.
    reason: lexical_alternative
translation:
  language: ko
  text: 베드로가 그들에게 말하였습니다. 「회개하십시오. 그리고 여러분 각자는 죄 사함을 받기 위하여 예수 메시아의 이름으로[a] 세례를 받으십시오. 그리하면 성령의 선물을 받게 될 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ἐπὶ τῷ ὀνόματι Ἰησοῦ Χριστοῦ. Χριστοῦ는 칭호로 기능하므로 「메시아」로 옮긴다. 「세례를 받는 것과 죄 사함의 관계」에 대한 신학적 논쟁은 본문 표현 이상으로 결정하지 않는다.
    reason: lexical_alternative
theological_decisions:
- issue: 2:38의 세례 정식에서 Χριστός 처리 및 「죄 사함을 위하여」 구절
  chosen_reading: 예수 메시아의 이름으로 세례를 받으십시오, 죄 사함을 받기 위하여
  alternative_readings:
  - 예수 그리스도의 이름으로
  rationale: 2:36에서 정립된 칭호 「메시아」를 세례 정식에서도 일관되게 유지한다. εἰς ἄφεσιν 구절의 신학적 해석은 본문 단어 이상의 해소를 시도하지 않는다.
  doctrine_reference: 'DOCTRINE.md: Translate titles; Contested terms table for Χριστός'
