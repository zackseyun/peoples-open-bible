id: GEN.35.26
reference: Genesis 35:26
source:
  edition: WLC
  text: וּ/בְנֵ֥י זִלְפָּ֛ה שִׁפְחַ֥ת לֵאָ֖ה גָּ֣ד וְ/אָשֵׁ֑ר אֵ֚לֶּה בְּנֵ֣י יַעֲקֹ֔ב אֲשֶׁ֥ר יֻלַּד ל֖/וֹ בְּ/פַדַּ֥ן אֲרָֽם־׃
translation:
  text: 'And the sons of Zilpah[a], Leah’s servant: Gad and Asher[b]. These are the sons of Jacob who were born to him in Paddan-aram.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'female servant' could also be rendered 'maidservant' or, more starkly, 'slave woman/slave-girl,' depending on how one chooses to represent the social status denoted by שִׁפְחָה.
    reason: lexical_alternative
  - marker: b
    text: Although the verse says these sons were born to Jacob 'in Paddan-aram,' Benjamin was born later in Canaan (vv. 16–18). The statement summarizes the sons associated with Jacob's Aramean household period and excludes Benjamin from this location note.
    reason: cross_reference
lexical_decisions:
- source_word: וּבְנֵי
  chosen: And the sons of
  alternatives:
  - And the children of
  lexicon: HALOT
  rationale: בְּנֵי is the construct plural of 'sons.' In this genealogical listing, 'sons of' is the most direct and natural rendering; 'children of' would be broader than the Hebrew form.
- source_word: זִלְפָּה
  chosen: Zilpah
  rationale: Personal name transliterated according to standard English convention, following the translation philosophy to transliterate names.
- source_word: שִׁפְחַת
  chosen: female servant
  alternatives:
  - maidservant
  - slave-girl
  - servant
  lexicon: HALOT
  rationale: שִׁפְחָה denotes a female servant/slave. 'Female servant' preserves the gender and social status without sounding archaic. 'Maidservant' is traditional but dated; 'slave-girl' may sound too juvenile in this context.
- source_word: לֵאָה
  chosen: Leah’s
  rationale: Rendered as possessive in English to reflect the construct relationship 'servant of Leah' idiomatically.
- source_word: גָּד
  chosen: Gad
  rationale: Personal name transliterated by standard convention.
- source_word: וְאָשֵׁר
  chosen: and Asher
  rationale: Simple conjunction plus personal name; transliterated by standard convention.
- source_word: אֵלֶּה
  chosen: These
  alternatives:
  - These ones
  lexicon: HALOT
  rationale: Standard demonstrative introducing the summary statement; 'These' is idiomatic and sufficient.
- source_word: בְּנֵי יַעֲקֹב
  chosen: the sons of Jacob
  alternatives:
  - the children of Jacob
  lexicon: HALOT
  rationale: Again, the Hebrew specifically says 'sons,' and the context is a list of Jacob's male offspring.
- source_word: אֲשֶׁר יֻלַּד לוֹ
  chosen: who were born to him
  alternatives:
  - whom she bore to him
  - who were fathered by him
  lexicon: HALOT
  rationale: The passive יֻלַּד with לּוֹ is naturally rendered 'were born to him.' Although the broader context includes sons born through different mothers, the Hebrew here summarizes them from Jacob's perspective. 'Whom she bore to him' would import an explicit feminine subject not present in this clause.
- source_word: בְּפַדַּן אֲרָם
  chosen: in Paddan-aram
  alternatives:
  - in Paddan Aram
  - in the plain of Aram
  lexicon: HALOT
  rationale: Place name retained in transliterated form. Hyphenation reflects common English convention for this toponym. A more interpretive rendering like 'plain of Aram' is possible etymologically but less certain and less standard for a proper place name.
