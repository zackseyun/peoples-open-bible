translation:
  language: es
  text: Entonces el rey dijo que así se hiciera. Se promulgó un decreto en Susa, y fueron colgados[a] los diez hijos de Amán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fueron impalados». El verbo hebreo puede referirse a colgar cuerpos en una estaca o poste, no necesariamente al ahorcamiento por el cuello en el sentido moderno.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - mandó
  - ordenó
  lexicon: HALOT
  rationale: אָמַר normalmente significa 'decir'. Aquí introduce la autorización del rey sin convertirla de forma explícita en una orden, porque la acción oficial aparece en la cláusula siguiente con el decreto.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: El hebreo usa el título con artículo, no el nombre propio. 'El rey' reproduce esa referencia de forma natural en español.
- source_word: לְהֵעָשׂוֹת כֵּן
  english_pob_choice: that it should be done so
  chosen_spanish: que así se hiciera
  alternatives_spanish:
  - que se hiciera de ese modo
  - que se realizara así
  lexicon: HALOT
  rationale: El infinitivo pasivo con כן pide una expresión española que conserve el sentido de 'ser hecho' y el valor adverbial de כֵּן. 'Así se hiciera' mantiene la pasiva implícita sin sonar forzada.
- source_word: וַתִּנָּתֵן דָּת
  english_pob_choice: A decree was issued
  chosen_spanish: Se promulgó un decreto
  alternatives_spanish:
  - Se emitió un decreto
  - Se dio un decreto
  lexicon: HALOT
  rationale: La combinación נתן + דת es un giro administrativo persa. 'Promulgar' comunica la expedición oficial mejor que un calco de 'dar', y conserva el carácter jurídico del término.
- source_word: בְּשׁוּשָׁן
  english_pob_choice: in Susa
  chosen_spanish: en Susa
  alternatives_spanish:
  - en Susa la capital
  - en Shushán
  lexicon: HALOT
  rationale: Sigue la convención moderna para el nombre de la ciudad. 'Susa' es claro y estándar en español bíblico contemporáneo.
- source_word: עֲשֶׂרֶת בְּנֵי הָמָן
  english_pob_choice: the ten sons of Haman
  chosen_spanish: los diez hijos de Amán
  alternatives_spanish:
  - los diez hijos de Haman
  lexicon: HALOT
  rationale: Se conserva la cadena posesiva simple y el nombre propio en forma española tradicional y ampliamente reconocible. El artículo y la numeración se expresan naturalmente en español.
- source_word: תָּלוּ
  english_pob_choice: were hanged
  chosen_spanish: fueron colgados
  alternatives_spanish:
  - fueron ahorcados
  - fueron colgados en una estaca
  lexicon: HALOT
  rationale: תלה puede referirse a colgar un cadáver o exhibirlo en un poste/estaca, no necesariamente al ahorcamiento por el cuello. 'Fueron colgados' mantiene abierta esa tensión lexical, como el pie de nota del inglés.
theological_decisions:
- issue: Método de ejecución de los diez hijos de Amán
  english_pob_reading: were hanged; the Hebrew verb can refer to hanging bodies on a stake or pole, not necessarily hanging by the neck in the modern sense.
  chosen_spanish_reading: fueron colgados
  alternative_spanish_readings:
  - fueron ahorcados
  - fueron impalados
  rationale: El hebreo תלה permite una ambigüedad real entre colgar un cuerpo y una ejecución/exhibición en un poste. 'Colgados' conserva esa tensión sin decidir indebidamente por una imagen moderna de ahorcamiento ni por 'impalados', que sería más interpretativo.
  doctrine_reference: Est. 9:14; uso léxico de תלה en contexto persa
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el hilo de decisión del POB en inglés: mantiene la secuencia narrativa, preserva el matiz administrativo de דָּת, y conserva abierta la ambigüedad de תָּלוּ. También incorpora la revisión inglesa que prefería un valor directo de כֵּן (''so'') con una construcción española equivalente (''así'').'
  spanish_consistency_notes:
  - Se usó 'Yahvé' como norma del proyecto solo cuando corresponda; aquí no aparece el nombre divino.
  - '''Amán'' sigue la forma española usual del nombre propio.'
  - El registro es bíblico contemporáneo, sin arcaísmos innecesarios.
  - La nota al pie se ancla solo en 'colgados', donde existe la ambigüedad lexical relevante.
