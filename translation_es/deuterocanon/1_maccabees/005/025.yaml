translation:
  language: es
  text: Y se encontraron con los nabateos[a], y los saludaron en paz, y les contaron todo lo que les había sucedido a sus hermanos en Galaad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los saludaron pacíficamente» o «salieron a recibirlos en paz». El verbo griego puede significar salir al encuentro o recibir, y el adverbio subraya la intención pacífica.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήντησαν
  english_pob_choice: met
  chosen_spanish: se encontraron con
  alternatives_spanish:
  - se reunieron con
  - se toparon con
  lexicon: BDAG
  rationale: El verbo griego expresa el encuentro narrativo sin añadir matiz hostil; «se encontraron con» comunica el hecho de manera natural en español y preserva la simple acción.
- source_word: Ναβαταίοις
  english_pob_choice: Nabateans
  chosen_spanish: nabateos
  alternatives_spanish:
  - nabateos
  - nabatéos
  lexicon: LSJ
  rationale: Se mantiene el etnónimo con la forma española más reconocible y transparente, en minúscula por tratarse de un sustantivo étnico común en español bíblico.
- source_word: ὑπήντησαν αὐτοῖς εἰρηνικῶς
  english_pob_choice: they greeted them peaceably
  chosen_spanish: les dieron un saludo pacífico
  alternatives_spanish:
  - los saludaron pacíficamente
  - les salieron al encuentro en paz
  lexicon: BDAG
  rationale: La combinación verbal-adverbial puede implicar salir al encuentro o recibir. En español, «les dieron un saludo pacífico» conserva el valor de acogida no hostil sin forzar una sola de las dos posibilidades inglesas documentadas.
- source_word: διηγήσαντο
  english_pob_choice: they told
  chosen_spanish: les contaron
  alternatives_spanish:
  - les relataron
  - les narraron
  lexicon: BDAG
  rationale: El verbo indica relatar o contar detalladamente. «Les contaron» es idiomático y suficiente, mientras que el objeto «todo» conserva el alcance completo del relato.
- source_word: ἅπαντα τὰ συμβεβηκότα
  english_pob_choice: everything that had happened
  chosen_spanish: todo lo que les había sucedido
  alternatives_spanish:
  - todo lo acontecido
  - todo lo que había pasado
  lexicon: BDAG
  rationale: La expresión totalizadora se vierte con una construcción natural en español que conserva el sentido global de lo ocurrido sin perder la referencia a acontecimientos concretos.
- source_word: τοῖς ἀδελφοῖς αὐτῶν
  english_pob_choice: their brothers
  chosen_spanish: a sus hermanos
  alternatives_spanish:
  - a sus hermanos
  - a sus parientes
  lexicon: BDAG
  rationale: Se conserva el lenguaje de parentesco literal del griego. En este contexto étnico-militar, «hermanos» mantiene la fuerza comunitaria sin imponer una glosa interpretativa.
- source_word: ἐν τῇ Γαλααδίτιδι
  english_pob_choice: in Gilead
  chosen_spanish: en Galaad
  alternatives_spanish:
  - en la región de Galaad
  - en la tierra de Galaad
  lexicon: LSJ
  rationale: El topónimo se traduce con la forma española habitual «Galaad», concisa y fiel al referente geográfico.
theological_decisions:
- issue: Valor de «hermanos» en contexto de parentesco comunitario
  english_pob_reading: their brothers
  chosen_spanish_reading: a sus hermanos
  alternative_spanish_readings:
  - a sus hermanos y parientes
  - a sus correligionarios
  rationale: No se explicita una reinterpretación étnica en el texto principal, porque el griego usa ἀδελφοί y el audit trail inglés preserva la literalidad. La opción elegida mantiene la tensión entre parentesco literal y referencia comunitaria.
  doctrine_reference: Lenguaje bíblico de solidaridad del pueblo; no requiere ajuste doctrinal
translation_notes:
  revision_awareness: La revisión inglesa cambió «received them peaceably» por «greeted them peaceably» para afinar ὑπήντησαν αὐτοῖς εἰρηνικῶς. La versión española evita elegir una sola glosa estrecha y usa una formulación que conserva la amplitud semántica documentada.
  spanish_consistency_notes:
  - Se conserva el etnónimo como «nabateos», coherente con transliteración bíblica estándar.
  - «Galaad» mantiene la toponimia habitual en español y evita perífrasis innecesarias.
  - No se introduce «Cristo», «Señor» ni otros términos teológicos ajenos al versículo.
  - La puntuación reproduce una cadencia narrativa clara y publicable en español contemporáneo.
