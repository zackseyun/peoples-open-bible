  source_alignment_summary: 'El borrador español transmite bien el sentido básico del hebreo: contrasta a los de corazón moralmente torcido con los íntegros en su conducta, mantiene «Yahvé» para יהוה, conserva «corazón» y expresa correctamente תּוֹעֲבַת y וּרְצוֹנוֹ. Sin embargo, la nota al pie no preserva fielmente la alternativa documentada en el rastro inglés: allí la alternativa es «the perverse of heart» para «the crooked in heart», mientras que la nota española actual presenta más bien una explicación interpretativa del texto principal. Además, el anclaje [a] está puesto en «Yahvé», pero la nota trata sobre «corazón torcido»; eso desajusta la referencia. También falta reflejar en español la nota inglesa sobre «the blameless of way» / «those whose conduct is whole or upright», que sigue siendo útil en español para aclarar «íntegros en su camino».'
