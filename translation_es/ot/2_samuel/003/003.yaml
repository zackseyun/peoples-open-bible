translation:
  language: es
  text: su segundo[a], Chileab, de Abigail, la esposa de Nabal el carmelita; y el tercero, Absalón, hijo de Maacá, hija de Talmai, rey de Gesur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘su segundo hijo, Chileab, de Abigail, esposa de Nabal de Carmel’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִשְׁנֵהוּ
  english_pob_choice: his second
  chosen_spanish: su segundo
  alternatives_spanish:
  - su segundo hijo
  lexicon: HALOT
  rationale: El hebreo usa una expresión ordinal breve con sufijo posesivo. En español, ‘su segundo’ conserva esa tersedad; el contexto genealógico hace claro que se trata de un hijo sin necesidad de añadirlo en el texto principal.
- source_word: כִלְאָב
  english_pob_choice: Chileab
  chosen_spanish: Chileab
  alternatives_spanish:
  - Cileab
  lexicon: HALOT
  rationale: Se conserva el nombre propio con transliteración cercana a la forma hebrea y a la revisión auditada del POB en inglés, que corrigió Kileab a Chileab.
- source_word: לַאֲבִיגַל
  english_pob_choice: by Abigail
  chosen_spanish: de Abigail
  alternatives_spanish:
  - por Abigail
  - nacido de Abigail
  lexicon: HALOT
  rationale: En listas genealógicas en español, ‘de Abigail’ funciona de modo natural para indicar maternidad/ascendencia. ‘Por’ sonaría más causal que genealógico; ‘nacido de’ explicita demasiado y añade material no presente en el hebreo.
- source_word: אֵשֶׁת נָבָל
  english_pob_choice: the wife of Nabal
  chosen_spanish: la esposa de Nabal
  alternatives_spanish:
  - la mujer de Nabal
  - la esposa de Nabal el
  lexicon: HALOT
  rationale: ‘Esposa’ comunica bien la relación marital del constructo hebreo en español contemporáneo. Se evita ‘mujer’ por ambigüedad y porque el pasaje identifica a Abigail por su vínculo matrimonial previo.
- source_word: הַכַּרְמְלִי
  english_pob_choice: the Carmelite
  chosen_spanish: el ceneo
  alternatives_spanish:
  - el carmelita
  - el de Carmel
  lexicon: HALOT
  rationale: 'El adjetivo gentílico hebreo puede describir a Nabal como ‘el de Carmel’; en español, ‘carmelita’ podría leerse como término religioso moderno y no como gentilicio. Por claridad y fidelidad geográfica, se opta por ‘el ceneo’ solo si el contexto textual sustentara esa etnografía; aquí, sin tal base en el paquete, no se impone una etimología alternativa en el texto principal y se preserva el referente identificativo como nombre/etiqueta geográfica en el flujo de la lista. (Nota: si se considera estrictamente el hebreo, la lectura más directa sigue siendo ‘el carmelita’.)'
- source_word: וְהַשְּׁלִשִׁי
  english_pob_choice: and the third
  chosen_spanish: y el tercero
  alternatives_spanish:
  - y su tercero
  lexicon: HALOT
  rationale: La serie ordinal se mantiene con una coordinación simple y natural en español. ‘Su tercero’ repetiría posesión ya inferida; ‘y el tercero’ conserva la economía del hebreo.
- source_word: אַבְשָׁלוֹם
  english_pob_choice: Absalom
  chosen_spanish: Absalón
  alternatives_spanish:
  - Absalom
  lexicon: HALOT
  rationale: Se usa la forma tradicional y ampliamente reconocible en español bíblico, compatible con la transliteración habitual del nombre hebreo en el registro eclesiástico.
- source_word: בֶּן מַעֲכָה
  english_pob_choice: the son of Maacah
  chosen_spanish: hijo de Maacá
  alternatives_spanish:
  - el hijo de Maacá
  - descendiente de Maacá
  lexicon: HALOT
  rationale: La relación filial se expresa de manera directa y natural. Se omite el artículo porque en español la apposición genealógica fluye mejor sin él y mantiene cercanía al hebreo.
- source_word: בַּת תַּלְמַי
  english_pob_choice: daughter of Talmai
  chosen_spanish: hija de Talmai
  alternatives_spanish:
  - la hija de Talmai
  lexicon: HALOT
  rationale: Se traduce literalmente el constructo filial femenino. Así se mantiene la estructura genealógica del hebreo sin sobrecargar la frase.
- source_word: מֶלֶךְ גְּשׁוּר
  english_pob_choice: king of Geshur
  chosen_spanish: rey de Gesur
  alternatives_spanish:
  - el rey de Gesur
  lexicon: HALOT
  rationale: El título real y el nombre del reino se expresan con una fórmula directa y transparente. Se prefiere ‘Gesur’ como transliteración breve y natural en español.
theological_decisions:
- issue: Mantenimiento de la estructura genealógica sin armonización interpretativa
  english_pob_reading: A simple list of David’s sons and family identifiers, with no theological expansion.
  chosen_spanish_reading: Una lista genealógica simple, sin ampliación interpretativa.
  alternative_spanish_readings:
  - Una formulación explicativa que añada ‘hijo’ en el primer miembro
  - Una adaptación más libre para aclarar la relación con David
  rationale: El versículo funciona como registro genealógico. No se introduce información no textual ni se reordena la frase para aclarar más de lo que el hebreo ya comunica. Esto preserva la transparencia auditada del POB.
  doctrine_reference: Números 1:18; 1 Crónicas 3:1-4 (genealogías como datos históricos, no afirmaciones doctrinales)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del POB en inglés que corrigió el nombre a ‘Chileab’ desde ‘Kileab’. La versión española conserva esa corrección. También se respetó la lectura genealógica simple del original, sin expandirla más allá del hebreo.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una referencia explícita al nombre divino.
  - ‘Mesías/Cristo’, ‘esclavo/siervo’ y otros términos controlados no aparecen en este versículo.
  - Se ha preservado el tono de lista genealógica con puntuación sobria y sin paráfrasis.
  - El nombre ‘Absalón’ sigue la forma tradicional española por inteligibilidad y uso bíblico consolidado.
