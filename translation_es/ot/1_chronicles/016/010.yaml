translation:
  language: es
  text: Gloríense en su santo nombre[a]; alégrense los corazones de los que buscan a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH» (el nombre divino); tradicionalmente se traduce «el SEÑOR», pero aquí se vierte como «Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: הִתְהַלְלוּ
  english_pob_choice: Boast
  chosen_spanish: Gloríense
  alternatives_spanish:
  - Bóstrense
  - Exulten
  - Gloríense/Boástense
  lexicon: HALOT
  rationale: El hitpael imperativo plural aquí expresa jactarse o gloriarse en algo/alguien. En español, «gloríense» conserva el valor exhortativo y refleja la relación con el objeto introducido por בְּ sin sonar forzado. «Boast» en inglés se corresponde mejor aquí con «gloriarse» que con un simple «alardear».
- source_word: בְּשֵׁם
  english_pob_choice: in ... name
  chosen_spanish: en ... nombre
  alternatives_spanish:
  - en torno al ... nombre
  - por ... nombre
  lexicon: HALOT
  rationale: La preposición בְּ con «nombre» se vierte naturalmente como «en», manteniendo visible la construcción hebrea y la idea de esfera o base de la acción.
- source_word: קָדְשׁוֹ
  english_pob_choice: his holy
  chosen_spanish: su santo
  alternatives_spanish:
  - su sagrado
  - su santo y apartado
  lexicon: HALOT
  rationale: «Santo» reproduce de forma directa el adjetivo קָדֹשׁ aplicado al nombre. «Sagrado» es posible, pero «santo nombre» es más idiomático y fiel al registro bíblico.
- source_word: יִשְׂמַח
  english_pob_choice: let ... rejoice
  chosen_spanish: gócese
  alternatives_spanish:
  - alégrese
  - que se goce
  - regocíjese
  lexicon: HALOT
  rationale: Aunque formalmente es imperfecto, en este contexto poético funciona con fuerza exhortativa. En español, un jussivo reverente como «gócese» preserva el tono de mandato/ánimo y la alegría interior.
- source_word: לֵב
  english_pob_choice: the heart
  chosen_spanish: el corazón
  alternatives_spanish:
  - el corazón interior
  - el alma
  lexicon: HALOT
  rationale: «Corazón» conserva la metáfora hebrea del centro interior de la persona. En español singular funciona bien, aunque el sujeto colectivo implícito en la línea exige entenderlo distributivamente.
- source_word: מְבַקְשֵׁי
  english_pob_choice: those who seek
  chosen_spanish: de los que buscan
  alternatives_spanish:
  - de los buscadores de
  - de quienes buscan
  lexicon: HALOT
  rationale: El participio substantivado denota personas caracterizadas por buscar a Yahvé. «Los que buscan» es natural en español y mantiene el valor durativo/habitual.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se mantiene el nombre divino como «Yahvé» conforme al criterio del proyecto, evitando la sustitución por un título. «Yahvé» es la forma española tradicional del transliterado y comunica el Tetragrámaton de modo reconocible.
theological_decisions:
- issue: Nombre divino יְהוָה en el canto exhortativo
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El verso contiene el Tetragrámaton directamente. La traducción mantiene el nombre personal del pacto en lugar de una sustitución titular, conforme a la política del proyecto y al valor de testimonio del texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor exhortativo del imperfecto יִשְׂמַח
  english_pob_reading: let the hearts ... rejoice
  chosen_spanish_reading: gócese el corazón
  alternative_spanish_readings:
  - que el corazón se alegre
  - alégrese el corazón
  rationale: Aunque la forma verbal es imperfecta, el contexto poético la hace funcionar como exhortación. En español, el jussivo «gócese» preserva el tono deseativo/imperativo sin perder la naturalidad.
  doctrine_reference: Gramática poética hebrea; jussivo contextual
translation_notes:
  revision_awareness: El audit trail inglés revisó «the heart» por «the hearts» para concordar con el plural de «those who seek». En español, la estructura distributiva «el corazón de los que buscan» ya comunica naturalmente ese sentido colectivo sin necesitar pluralizar «corazón».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma fija para el Tetragrámaton, coherente con la política del proyecto.
  - «Gloríense» y «gócese» conservan el paralelismo exhortativo del hebreo.
  - La construcción singular «el corazón» se entiende colectivamente respecto de «los que buscan», sin perder la fuerza distributiva.
