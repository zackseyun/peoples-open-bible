translation:
  language: es
  text: lo que Yahvé habló contra nosotros, todos estos males que vinieron sobre nosotros[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todas estas calamidades» o «todos estos desastres». El griego «males» aquí se refiere a los juicios dolorosos que vinieron sobre el pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριος
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  lexicon: BDAG
  rationale: Aunque el audit trail inglés usa 'Lord' por la forma griega κύριος, en español la política del proyecto pide representar el nombre divino como 'Yahvé' cuando el contexto lo identifica como el hablante del juicio. Aquí el hablante es el Señor de Israel, y 'contra nosotros' mantiene el matiz adversativo del pasaje.
- source_word: ἐλάλησεν
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - declaró
  lexicon: BDAG
  rationale: '''Habló'' reproduce de manera natural el acto verbal de λαλέω sin añadir un matiz técnico de decreto que el texto griego no exige.'
- source_word: ἐφ᾽ ἡμᾶς
  english_pob_choice: against us
  chosen_spanish: contra nosotros
  alternatives_spanish:
  - sobre nosotros
  - acerca de nosotros
  lexicon: BDAG
  rationale: En este contexto de juicio, la preposición con un verbo de habla comunica una carga adversativa. 'Contra nosotros' conserva ese valor y evita suavizarlo a una mera referencia temática.
- source_word: πάντα τὰ κακὰ ταῦτα
  english_pob_choice: all these evils
  chosen_spanish: todos estos males
  alternatives_spanish:
  - todas estas calamidades
  - todos estos desastres
  lexicon: BDAG
  rationale: '''Males'' conserva la cercanía léxica con κακά y mantiene la tensión teológica del texto: el pasaje llama a estos hechos ''males'' mientras el contexto los presenta como juicios. ''Calamidades'' o ''desastres'' explicitan el resultado, pero interpretan más.'
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - llegaron
  - cayeron
  lexicon: BDAG
  rationale: El verbo griego en singular se adapta en español de forma natural a un sujeto plural implícito en 'todos estos males'. 'Vinieron sobre nosotros' mantiene la imagen dinámica y la conexión con el preposición ἐπί.
theological_decisions:
- issue: 'Cómo traducir τὰ κακά en un contexto de juicio divino: ''males'' frente a ''calamidades/desastres'''
  english_pob_reading: Rendered as 'evils' in the main text, with a footnote allowing 'calamities' or 'disasters.'
  chosen_spanish_reading: '''males'' en el texto principal, con nota que permita ''calamidades'' o ''desastres''.'
  alternative_spanish_readings:
  - calamidades
  - desastres
  rationale: '''Males'' conserva la ambigüedad significativa del griego y la tensión teológica: lo que viene sobre el pueblo es a la vez un mal experimentado y un juicio anunciado por Yahvé. La nota ofrece equivalentes interpretativos sin borrar esa tensión.'
  doctrine_reference: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.
translation_notes:
  revision_awareness: El pasaje fue revisado en la capa de override normalizada y el último pase reporta 'unchanged'; por eso no se introducen cambios textuales más allá de la adaptación española auditada. La versión inglesa también mantiene la nota lexical alternativa para τὰ κακά, que se refleja aquí.
  spanish_consistency_notes:
  - Se preserva el contraste entre el verbo de habla ('habló') y la dirección adversativa ('contra nosotros').
  - '''Yahvé'' sigue la convención del proyecto para el nombre divino en español, aun cuando el inglés POB conserva ''Lord''.'
  - '''Males'' se usa de manera consistente con la literalidad griega y con la nota que abre la lectura a ''calamidades'' o ''desastres''.'
