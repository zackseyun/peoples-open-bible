    text: 'O: «habitará contigo ... donde le parezca mejor».'
    reason: lexical_alternative
  - marker: b
    text: «Dentro de una de tus puertas» es un hebraísmo que se refiere al asentamiento dentro de una de tus ciudades o comunidades.
    reason: cultural_note
  revision_rationale: Se cambia únicamente 'donde le sea bueno' por 'donde le parezca mejor' para expresar de manera natural y fiel el sentido de בַּטּוֹב לוֹ en español. Se conservan el modismo 'dentro de una de tus puertas', la nota cultural correspondiente, la fuerza legal de 'no lo oprimirás', y el masculino singular de la fuente.
