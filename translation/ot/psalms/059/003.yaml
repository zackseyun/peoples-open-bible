id: PSA.59.3
reference: Psalms 59:3
source:
  edition: WLC
  text: הַ֭צִּילֵ/נִי מִ/פֹּ֣עֲלֵי אָ֑וֶן וּֽ/מֵ/אַנְשֵׁ֥י דָ֝מִ֗ים הוֹשִׁיעֵֽ/נִי׃
translation:
  text: Deliver me from workers of wickedness[b][a], and save me from men of blood.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'evildoers' for 'workers of wickedness.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'men of blood,' that is, bloodthirsty men or men guilty of bloodshed.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצִּילֵנִי
  chosen: Deliver me
  alternatives:
  - Rescue me
  lexicon: HALOT
  rationale: Imperative of נצל in a plea for rescue. 'Deliver me' is natural English and preserves the sense of being snatched away from danger.
- source_word: מִפֹּעֲלֵי
  chosen: from workers of
  alternatives:
  - from those who do
  - from evildoers
  lexicon: HALOT
  rationale: Participle of פעל with prefixed preposition, literally 'from workers/doers of.' Keeping 'workers of' preserves the Hebrew construction more closely than collapsing immediately to 'evildoers'.
- source_word: אָוֶן
  chosen: wickedness
  alternatives:
  - evil
  - trouble
  - iniquity
  lexicon: HALOT
  rationale: אָוֶן can denote wickedness, trouble, or iniquity depending on context. Here, paired with violent men, it describes moral evil; 'wickedness' is clear modern English and fits the ethical sense.
- source_word: וּמֵאַנְשֵׁי
  chosen: and from men of
  alternatives:
  - and from people of
  lexicon: HALOT
  rationale: אַנְשֵׁי is the construct plural of 'men.' Per the translation philosophy, gender-accurate rendering is preferred where the source is masculine; here it refers to male violent opponents, so 'men of' is retained.
- source_word: דָמִים
  chosen: blood
  alternatives:
  - bloodshed
  - violence
  lexicon: HALOT
  rationale: Plural 'bloods' is an idiom for bloodguilt or bloodshed. 'Men of blood' is a recognizable biblical expression in English and preserves the metaphor; alternatives are possible but less formally aligned.
- source_word: הוֹשִׁיעֵנִי
  chosen: save me
  alternatives:
  - give me victory
  - rescue me
  lexicon: HALOT
  rationale: Imperative of ישׁע, a broad salvation/deliverance term. In this immediate context of danger from enemies, 'save me' is idiomatic and faithful without over-specifying military victory.
