translation:
  language: es
  text: 'Pero el Rabsaqué dijo[a]: «¿Acaso mi señor me envió a tu señor y a ti para hablar estas palabras? ¿No me envió a los hombres que están sentados sobre la muralla, para comer su propio estiércol y beber su propia orina con ustedes?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo usa un lenguaje deliberadamente grosero de asedio: literalmente, «para comer su estiércol y beber su orina». La forma escrita de «orina» refleja un eufemismo gráfico para una expresión más cruda.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַב שָׁקֵה
  english_pob_choice: the Rabshakeh
  chosen_spanish: el Rabsaqué
  alternatives_spanish:
  - Rabsaqué
  - el Rab-shakeh
  lexicon: HALOT
  rationale: Se conserva el título/nombre asirio como transliteración histórica, sin traducir el cargo. «Rabsaqué» mantiene la forma reconocible en español y evita explicar indebidamente el oficio en el texto corrido.
- source_word: אֲדֹנֶיךָ
  english_pob_choice: your master
  chosen_spanish: tu señor
  alternatives_spanish:
  - tu amo
  - tu soberano
  lexicon: HALOT
  rationale: En este contexto político, el término designa al superior del interlocutor, no a Dios. «Señor» comunica jerarquía sin introducir una alusión divina que el hebreo no exige aquí.
- source_word: אֲדֹנִי
  english_pob_choice: my master
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi amo
  - mi soberano
  lexicon: HALOT
  rationale: La relación es de subordinación política; «mi señor» reproduce ese vínculo mejor que una traducción más doméstica o más solemne.
- source_word: לְדַבֵּר אֶת הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: to speak these words
  chosen_spanish: para hablar estas palabras
  alternatives_spanish:
  - para decir estas cosas
  - para pronunciar estas palabras
  lexicon: HALOT
  rationale: Se conserva la concreción de «palabras» y el valor de finalidad del infinitivo con לְ. «Hablar» resulta natural en español sin perder el contenido verbal del hebreo.
- source_word: הֲלֹא
  english_pob_choice: Has he not
  chosen_spanish: ¿Acaso no... ?
  alternatives_spanish:
  - ¿No... ?
  - ¿No es cierto que... ?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera respuesta afirmativa. En español, «¿acaso no...?» preserva bien ese tono sin volverlo excesivamente interpretativo.
- source_word: הָאֲנָשִׁים הַיֹּשְׁבִים עַל הַחוֹמָה
  english_pob_choice: the men sitting on the wall
  chosen_spanish: los hombres que están sentados sobre la muralla
  alternatives_spanish:
  - los hombres sentados sobre la muralla
  - los hombres que se sientan sobre la muralla
  lexicon: HALOT
  rationale: Se mantiene el masculino plural y la imagen de los defensores en la muralla. «Están sentados» expresa el participio de manera idiomática en español y evita una rigidez innecesaria.
- source_word: לֶאֱכֹל ... וְלִשְׁתּוֹת
  english_pob_choice: to eat ... and drink ...
  chosen_spanish: para comer ... y beber ...
  alternatives_spanish:
  - a comer ... y beber ...
  - para que coman ... y beban ...
  lexicon: HALOT
  rationale: Se conserva la construcción infinitiva directa del hebreo, sin añadir una consecuencia explícita que el texto no formula. En español, «para» reproduce la relación de finalidad/resultado implícita en la secuencia.
- source_word: חראיהם
  english_pob_choice: their own dung
  chosen_spanish: su estiércol
  alternatives_spanish:
  - sus excrementos
  - su inmundicia
  lexicon: HALOT
  rationale: El hebreo usa lenguaje deliberadamente grosero de asedio. «Estiércol» mantiene la crudeza del insulto de manera comprensible en español, sin suavizarlo excesivamente con un eufemismo.
- source_word: שיניהם
  english_pob_choice: their own urine
  chosen_spanish: su orina
  alternatives_spanish:
  - su pis
  - su micción
  lexicon: HALOT
  rationale: La forma escrita refleja un eufemismo ortográfico para una expresión más cruda. «Orina» conserva el sentido con dignidad léxica, y permite señalar en nota la aspereza deliberada del original.
- source_word: עִמָּכֶם
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - con vosotros
  - junto con ustedes
  lexicon: HALOT
  rationale: Se usa una forma natural de español latinoamericano para el plural de segunda persona. «Con ustedes» mantiene la referencia a los oyentes compartiendo la humillación del sitio.
theological_decisions:
- issue: Tratamiento del título asirio רַב שָׁקֵה
  english_pob_reading: the Rabshakeh
  chosen_spanish_reading: el Rabsaqué
  alternative_spanish_readings:
  - el jefe de copas
  - el copero mayor
  rationale: No se traduce el cargo porque el relato funciona con el título histórico como designación fija del emisario asirio. La transliteración preserva el valor identificador del texto sin introducir una explicación que no aparece aquí.
  doctrine_reference: historia bíblica / fidelidad al referente histórico
- issue: Lenguaje escatológico o de resultado en la amenaza de asedio
  english_pob_reading: to eat their own dung and drink their own urine with you
  chosen_spanish_reading: para comer su estiércol y beber su orina con ustedes
  alternative_spanish_readings:
  - comiendo su estiércol y bebiendo su orina con ustedes
  - para que coman su estiércol y beban su orina con ustedes
  rationale: Se evita añadir la interpretación de que están «destinados» a hacerlo, porque el hebreo presenta una taunt cruel en forma directa, no una glosa explicativa. La construcción con «para» conserva el valor verbal del hebreo y la aspereza del insulto.
  doctrine_reference: principio de cercanía al texto / no añadir contenido implícito
translation_notes:
  revision_awareness: 'La versión inglesa revisada eliminó una glosa interpretativa («who are doomed to») para volver al infinitivo directo del hebreo. Esta redacción española sigue esa decisión: evita añadir una consecuencia explícita y conserva la estructura de amenaza cruda con finalidad/resultado implícito.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en este proyecto cuando el texto lo requiera, pero aquí no aparece ninguna referencia al nombre divino.
  - Se usa «señor» en sentido político-relacional, no como sustituto reverencial de un nombre divino.
  - «Rabsaqué» se conserva como transliteración estable del título asirio.
  - 'Se mantiene el paralelismo verbal del hebreo: hablar estas palabras / comer / beber.'
  - El registro procura ser claro y bíblico a la vez, sin suavizar el insulto del original.
