  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en los puntos principales: ''comparezca'' refleja adecuadamente ἀπαντήσωσιν en contexto legal; ''dentro de dos o tres días'' expresa bien el plazo; ''será excluido'' transmite bien ἀλλοτριωθήσεται. Sin embargo, hay un desajuste importante en las notas: el marcador [a] está anclado al plazo temporal, pero la nota [a] explica la alternativa para τὰ κτήνη / ἀνιερωθήσονται (''sus bienes serán confiscados''), mientras que el marcador [b] está anclado a ''ganados'' pero la nota [b] trata de ''la comunidad de los cautivos'', que corresponde al final del versículo. Además, ''ganados'' suena menos natural que el singular colectivo ''ganado'' en español bíblico general.'
  spanish_quality_summary: El español es claro y digno, pero requiere ajuste menor para naturalidad y para la colocación correcta de notas. 'Ancianos que presiden' es inteligible; 'ancianos dirigentes' o 'ancianos que presiden' ambos sirven, pero no es necesario cambiarlo. 'Asamblea de la cautividad' es comprensible, aunque algo rígido; puede mantenerse por cercanía al griego. El cambio principal necesario es usar 'su ganado' en vez de 'sus ganados', y reubicar los marcadores de nota donde realmente corresponden.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. Las decisiones 'comparezca', 'juicio', 'consagrados' y 'excluido' son defendibles y coherentes con el expediente inglés. La elección de 'consagrados' preserva el matiz léxico de ἀνιερωθήσονται, con la fuerza confiscatoria en nota. 'Ganado' alinea mejor con κτήνη como colectivo que 'ganados'.
  issues:
  - severity: high
    issue: Marcadores de notas mal anclados
    rationale: La nota [a] sobre confiscación pertenece a 'su ganado será consagrado', no a 'dos o tres días'; la nota [b] sobre 'comunidad de los cautivos' pertenece a 'asamblea de la cautividad', no a 'ganados'. Esto rompe la correspondencia exigida entre texto y notas.
  - severity: medium
    issue: '''Sus ganados'' suena poco natural'
    rationale: 'En español general y eclesial, κτήνη se expresa mejor como colectivo singular: ''su ganado''. ''Sus ganados'' no es incorrecto en todos los contextos, pero aquí resulta tosco.'
  revised_spanish_text: Y cualquiera que no comparezca dentro de dos o tres días, conforme al juicio de los ancianos que presiden, su ganado[a] será consagrado, y él mismo será excluido de la asamblea de la cautividad[b].
