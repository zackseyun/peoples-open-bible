base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/008/010.yaml
  text: Then he said to them[a], “Go, eat rich food and drink sweet drinks, and send portions to anyone for whom nothing is prepared, for this day is holy to our Lord. And do not be grieved[c][b], for the joy of Yahweh is your stronghold.”
  footnotes:
