translation:
  language: es
  text: 'Pero los hombres de Israel dijeron al heveo: «Quizá tú vives entre nosotros[a]; ¿cómo, entonces, haría yo un pacto contigo[b]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «en mi medio»; la forma singular probablemente refleja un hablante representativo de Israel.
    reason: lexical_alternative
  - marker: b
    text: Hebreo literalmente, «cortar un pacto contigo».
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ יִשְׂרָאֵל
  english_pob_choice: the men of Israel
  chosen_spanish: los hombres de Israel
  alternatives_spanish:
  - el hombre de Israel
  - los israelitas
  lexicon: HALOT
  rationale: El hebreo usa un singular de forma con valor colectivo. En español, «los hombres de Israel» conserva el matiz colectivo y masculino del sustantivo sin volverlo innecesariamente singular ni diluirlo en un plural más generalizado.
- source_word: הַחִוִּי
  english_pob_choice: the Hivite
  chosen_spanish: al heveo
  alternatives_spanish:
  - al hivita
  - a los heveos
  lexicon: HALOT
  rationale: El hebreo presenta singular definido. En español, «heveo» reproduce la referencia singular al interlocutor representativo; se prefiere esta forma para mantener la correspondencia formal con el texto fuente.
- source_word: אוּלַי
  english_pob_choice: Perhaps
  chosen_spanish: Quizá
  alternatives_spanish:
  - Tal vez
  - Quizás
  lexicon: HALOT
  rationale: «Quizá» comunica bien la incertidumbre o sospecha implícita en la partícula hebrea con un registro natural y sobrio en español.
- source_word: בְּקִרְבִּי
  english_pob_choice: among us
  chosen_spanish: entre nosotros
  alternatives_spanish:
  - en medio de nosotros
  - en nuestro interior
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «en mi medio», el contexto es corporativo y habla Israel como grupo. «Entre nosotros» preserva el sentido relacional y geográfico sin perder naturalidad en español.
- source_word: יוֹשֵׁב
  english_pob_choice: are living
  chosen_spanish: estás habitando
  alternatives_spanish:
  - vives
  - estás viviendo
  lexicon: HALOT
  rationale: El participio hebreo expresa una condición de residencia continua. «Estás habitando» mantiene ese aspecto durativo con un tono más fiel al verbo original que un simple presente puntual.
- source_word: וְאֵיךְ
  english_pob_choice: how then could
  chosen_spanish: ¿cómo, entonces,
  alternatives_spanish:
  - ¿y cómo podría
  - ¿cómo podría, entonces,
  lexicon: HALOT
  rationale: La secuencia introduce una consecuencia lógica. «¿Cómo, entonces,» conserva la fuerza inferencial del hebreo y prepara naturalmente la pregunta retórica.
- source_word: אכרות ... בְרִית
  english_pob_choice: make a covenant
  chosen_spanish: haría yo un pacto
  alternatives_spanish:
  - cortaría un pacto
  - concertaría un pacto
  - haría un pacto
  lexicon: HALOT
  rationale: El hebreo dice literalmente «cortar un pacto». En español, «hacer un pacto» es claro y digno; se mantiene «pacto» como equivalente de בְרִית, y la nota explica el giro idiomático original.
- source_word: לְךָ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con usted
  - para ti
  lexicon: HALOT
  rationale: El complemento preposicional de pacto se expresa de forma idiomática en español con «contigo», que transmite relación directa sin rigidez sintáctica.
theological_decisions:
- issue: Uso del singular representativo en la voz de Israel
  english_pob_reading: The singular forms are rendered with collective English where the speaker represents Israel as a group
  chosen_spanish_reading: Se conserva el plural colectivo en «los hombres de Israel» y se mantiene el singular verbal en «haría yo», reflejando la voz representativa hebrea.
  alternative_spanish_readings:
  - «el hombre de Israel ... haría yo»
  - «los israelitas ... haríamos»
  rationale: 'El hebreo mezcla forma singular y referencia colectiva. El español debe dejar visible esa tensión: la asamblea habla por medio de un representante, sin convertir el texto en una pluralización plana ni en un singular engañoso.'
  doctrine_reference: Translation philosophy §§3, 4, 6
- issue: Pacto como acto verbal idiomático
  english_pob_reading: cut a covenant
  chosen_spanish_reading: pacto, con nota sobre el hebreo literal «cortar un pacto»
  alternative_spanish_readings:
  - alianza
  - convenio
  rationale: «Pacto» comunica con claridad la institución bíblica; la nota mantiene auditable la imagen hebrea de «cortar», sin imponer un calco que suene forzado en español.
  doctrine_reference: Lexical transparency and covenantal idiom policy
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin depender mecánicamente de él: se respetó la forma singular colectiva del hebreo, la imagen idiomática del pacto y el valor durativo del participio, manteniendo una redacción española natural y publicable. No se requirieron revisiones adicionales según el registro de revisión más reciente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al Tetragrámaton; este versículo no lo contiene.
  - Se mantiene «pacto» para בְרִית según la pauta del proyecto y la nota explicita el hebreo literal.
  - «heveo» conserva la referencia singular del texto fuente; si el contexto editorial prefiriera etnónimo plural, debería justificarse aparte.
