translation:
  language: es
  text: para hacer justicia al huérfano[a] y al oprimido[b], de modo que el hombre desde la tierra[c] ya no vuelva a aterrorizar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el sin padre».
    reason: lexical_alternative
  - marker: b
    text: O «el aplastado» o «el afligido».
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «hombre de la tierra»; es decir, un ser humano meramente terrenal y mortal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִשְׁפֹּט
  english_pob_choice: to give justice
  chosen_spanish: hacer justicia
  alternatives_spanish:
  - juzgar
  - vindicar
  lexicon: HALOT
  rationale: El infinitivo señala la acción judicial a favor de los vulnerables. En español, "hacer justicia" comunica mejor ese acto que el simple "juzgar", sin perder el sentido legal.
- source_word: יָתוֹם
  english_pob_choice: the fatherless
  chosen_spanish: el huérfano
  alternatives_spanish:
  - el padreless (sin padre)
  - el huérfano de padre
  lexicon: HALOT
  rationale: Aunque el inglés POB prefirió "fatherless" por su matiz jurídico-social, en español "huérfano" es el equivalente natural y comprensible. Mantiene la referencia al vulnerable sin forzar una perífrasis poco idiomática.
- source_word: דַּךְ
  english_pob_choice: the oppressed
  chosen_spanish: el oprimido
  alternatives_spanish:
  - el aplastado
  - el afligido
  - el abatido
  lexicon: HALOT
  rationale: El término hebreo describe al que está aplastado o postrado por opresión. "Oprimido" conserva bien el peso social y experiencial, y es más transparente que una traducción demasiado literal.
- source_word: בַּל יוֹסִיף עוֹד
  english_pob_choice: so that ... no more
  chosen_spanish: de modo que ... no siga ... nunca más
  alternatives_spanish:
  - para que ... no vuelva a ...
  - de manera que ... no continúe ...
  lexicon: HALOT
  rationale: La construcción expresa resultado o propósito negativo. En español, "de modo que" junto con "no siga ... nunca más" reproduce la fuerza aspectual de la negación sin caer en calco.
- source_word: לַעֲרֹץ
  english_pob_choice: terrify
  chosen_spanish: aterrorizando
  alternatives_spanish:
  - amedrentando
  - causando terror
  lexicon: HALOT
  rationale: El verbo hebreo implica infundir terror o pavor. "Aterrorizar" conserva esa fuerza con naturalidad en español y evita confundirlo con "oprimir", que ya corresponde a דַּךְ.
- source_word: אֱנוֹשׁ
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el ser humano
  - el mortal
  lexicon: HALOT
  rationale: El hebreo usa un singular masculino genérico. "El hombre" conserva esa forma y la ironía retórica de un ser humano limitado que pretende causar terror.
- source_word: מִן הָאָרֶץ
  english_pob_choice: man from the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra
  - terrenal
  - de la tierra mortal
  lexicon: HALOT
  rationale: 'La preposición puede leerse de manera relacional: el hombre procedente de la tierra. "De la tierra" es natural en español y deja entrever la fragilidad mortal implícita en el giro hebreo.'
theological_decisions:
- issue: Sustitución de 'fatherless' por 'huérfano'
  english_pob_reading: the fatherless
  chosen_spanish_reading: el huérfano
  alternative_spanish_readings:
  - el sin padre
  - el huérfano de padre
  rationale: La lectura inglesa preserva la categoría social del vulnerable. En español, "huérfano" comunica esa misma realidad de forma idiomática y bíblicamente reconocible, sin introducir una expresión extraña.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Lectura de אֱנוֹשׁ como singular genérico
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la humanidad
  - los mortales
  rationale: Se mantiene el singular genérico masculino del hebreo, que funciona retóricamente para contrastar al ser humano terrenal con la justicia de Dios. No se universaliza a plural ni se vuelve abstracto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Valor de מִן הָאָרֶץ
  english_pob_reading: man from the earth
  chosen_spanish_reading: de la tierra
  alternative_spanish_readings:
  - terrenal
  - de la tierra mortal
  rationale: La revisión inglesa reciente optó por "from the earth" por naturalidad. En español, "de la tierra" conserva esa naturalidad y el matiz de procedencia/finitud sin recurrir a una expresión más interpretativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La versión inglesa revisada cambió de 'man of the earth' a 'man from the earth' para una representación más natural de מִן־הָאָרֶץ. La redacción española adopta esa misma naturalidad con 'de la tierra', manteniendo el contraste entre la fragilidad humana y la acción justa de Dios.
  spanish_consistency_notes:
  - Se usó 'Dios' implícito en el contexto del salmo; el versículo mismo no lo repite, así que no se añadió en la línea principal.
  - Se evitó 'SEÑOR' o 'Yahvé' porque este versículo depende sintácticamente del infinitivo y no contiene el tetragrámaton explícito.
  - '''Aterrorizando'' conserva el valor de לַעֲרֹץ sin mezclarlo con ''oprimir'', que ya expresa דַּךְ.'
  - Se optó por español natural y litúrgicamente sobrio, con una puntuación que refleja la clausula de resultado/propósito del hebreo.
