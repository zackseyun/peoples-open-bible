  - severity: medium
    issue: Las notas [b] y [c] están ancladas al lugar equivocado
    rationale: La nota sobre «Dios» debe ir con «Dios», y la nota sobre la alternativa «mi alma» debe ir con «mi vida». Tal como está, ambas aparecen al final de la oración y crean ambigüedad.
