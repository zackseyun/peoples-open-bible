  english_pob_choice: the Holy Spirit
  chosen_korean: 성령
  alternatives_korean:
  - 거룩하신 영
  lexicon: BDAG
  rationale: '글로사리 기본값: πνεῦμα ἅγιον→성령.'
theological_decisions:
- issue: '이사야 6:9-10 인용을 통한 거부의 메시지의 신학적 무게'
  chosen_reading: 성령께서 예언자 이사야를 통해 … 옳게 말씀하셨습니다
  alternative_readings:
  - 성령께서 예언자 이사야의 입을 통해 … 정확히 말씀하셨습니다
  rationale: 사도행전 종결 단락의 신학적 중심. 「옳게」(Καλῶς)를 보존하여 이사야 인용이 단순한 설명이 아니라 청자들의 거부 행위 자체에 대한 적실한 예언적 판결임을 드러낸다.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve prophetic force'
