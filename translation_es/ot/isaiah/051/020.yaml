review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del hebreo: desmayo/colapso, estar tendidos, ubicación en las calles, símil del animal atrapado, y la doble expresión del juicio divino. Conserva correctamente «Yahvé» para יְהוָה. Sin embargo, introduce dos problemas importantes: (1) la nota [a] altera indebidamente el sentido al ofrecer «Tus hijas», alternativa no respaldada por el hebreo ni por el POB inglés; (2) «del reprendo de tu Dios» no es español natural ni una buena equivalencia de גַּעֲרַת, donde corresponde algo como «la reprensión» o «el reproche»/«la reprensión severa». También conviene ajustar la nota sobre «a la cabecera de todas las calles», pues el POB inglés preserva la alternativa «en cada esquina» para esa frase, no para «Yahvé».'
  spanish_quality_summary: El texto es mayormente legible y digno, pero «reprendo» resulta anómalo y poco eclesial; afecta seriamente la naturalidad y claridad. «A la cabecera de todas las calles» es comprensible, aunque algo rígido; puede mantenerse si se explica la alternativa idiomática en nota. La puntuación y el registro son adecuados.
  glossary_alignment: Buena alineación con terminología del proyecto en «Yahvé», «Dios», «ira», y la elección principal «antílope». Debe corregirse la nota de «hijos», que contradice la decisión inglesa documentada («sons»), y reemplazarse «reprendo» por «reprensión» para reflejar mejor גַּעֲרָה sin barbarismo.
  issues:
  - severity: high
    issue: La nota [a] ofrece «Tus hijas» como alternativa para בָּנַיִךְ.
    rationale: El hebreo significa «tus hijos»/«tus hijos varones» o de forma inclusiva «tus hijos» como descendencia; no respalda «tus hijas». La nota introduce una alternativa infundada y contraria al audit trail inglés.
  - severity: high
    issue: «del reprendo de tu Dios» es una formulación defectuosa para גַּעֲרַת אֱלֹהָיִךְ.
    rationale: «Reprendo» no funciona bien como sustantivo en español bíblico general y suena incorrecto o muy marcado. «La reprensión de tu Dios» preserva la fuerza judicial y es natural.
  - severity: medium
    issue: Falta una nota para la expresión «a la cabecera de todas las calles».
    rationale: El POB inglés conserva la alternativa «at every street corner» para בְּרֹאשׁ כָּל חוּצוֹת. En español conviene preservar esa alternativa con una nota en el punto correspondiente.
  revised_spanish_text: Tus hijos se han desmayado; yacen a la cabecera[a] de todas las calles, como un antílope[b] en una red, llenos de la ira de Yahvé, de la reprensión[c] de tu Dios.
  revised_footnotes:
