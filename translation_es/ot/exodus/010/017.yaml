base_translation:
  language: en
  yaml_path: translation/ot/exodus/010/017.yaml
  text: So now[a], please forgive my sin just this once, and plead with Yahweh your God[b], that he may remove from me this death only.
  footnotes:
  - marker: a
    text: Or 'bear away my sin' or 'pardon my sin.' The Hebrew idiom literally uses 'lift/bear' with 'sin' as its object.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''this death.'' Pharaoh likely refers to the present deadly plague and its effects.'
    reason: lexical_alternative
