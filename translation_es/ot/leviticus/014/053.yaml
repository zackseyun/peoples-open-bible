translation:
  language: es
  text: Entonces soltará el ave viva fuera de la ciudad, al campo abierto. Así hará expiación por la casa[a], y quedará limpia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «purgará la casa» o «hará expiación por la casa». El hebreo usa aquí lenguaje sacerdotal de expiación en un contexto de limpieza ritual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁלַּח
  english_pob_choice: Then he shall release
  chosen_spanish: Entonces enviará
  alternatives_spanish:
  - y enviará
  - entonces soltará
  - y dejará ir
  lexicon: HALOT
  rationale: El piel de שלח aquí expresa la acción ritual de dejar ir el ave. «Enviará» conserva el valor básico de movimiento dirigido y funciona bien en español bíblico sin volver la frase pesada; «Entonces» reproduce el waw secuencial del contexto.
- source_word: הַצִּפֹּר הַחַיָּה
  english_pob_choice: the live bird
  chosen_spanish: la ave viva
  alternatives_spanish:
  - el ave viva
  - el pájaro vivo
  - el ave que está viva
  lexicon: HALOT
  rationale: Se mantiene el contraste ritual con el ave previamente muerta. «Ave viva» conserva la relación semántica con el texto y su registro más formal; «ave» evita un posible tono demasiado coloquial de «pájaro».
- source_word: אֶל מִחוּץ לָעִיר
  english_pob_choice: outside the city
  chosen_spanish: fuera de la ciudad
  alternatives_spanish:
  - al exterior de la ciudad
  - más allá de la ciudad
  - fuera del poblado
  lexicon: HALOT
  rationale: La expresión indica el desplazamiento a un lugar fuera de los límites urbanos. «Fuera de la ciudad» es natural, claro y fiel al hebreo.
- source_word: אֶל פְּנֵי הַשָּׂדֶה
  english_pob_choice: into the open field
  chosen_spanish: hacia la llanura abierta
  alternatives_spanish:
  - hacia el campo abierto
  - al frente del campo
  - hacia la faz del campo
  lexicon: HALOT
  rationale: La expresión idiomática hebrea literalmente «a la faz del campo» apunta al campo abierto. «Llanura abierta» comunica el sentido de espacio abierto sin calco duro; se prefiere una formulación natural en español que preserve la idea de campo despejado.
- source_word: וְכִפֶּר עַל הַבַּיִת
  english_pob_choice: he shall make atonement for the house
  chosen_spanish: Así hará expiación por la casa
  alternatives_spanish:
  - así hará expiación para la casa
  - así hará expiación por la vivienda
  - así purgará la casa
  lexicon: HALOT
  rationale: Se conserva el lenguaje sacerdotal de כפר en contexto ritual. «Hará expiación» refleja mejor la fuerza técnica del verbo que una simple limpieza; «por la casa» mantiene el valor relacional de עַל en este marco ceremonial.
- source_word: וְטָהֵר
  english_pob_choice: and it shall be clean
  chosen_spanish: y quedará limpia
  alternatives_spanish:
  - y será limpia
  - y será purificada
  - y quedará purificada
  lexicon: HALOT
  rationale: El resultado ritual recae sobre la casa. «Quedará limpia» expresa el estado resultante con claridad en español moderno; mantiene la dimensión de pureza ritual sin forzar un matiz doctrinal adicional.
theological_decisions:
- issue: כפר en un contexto de purificación ritual de una casa
  english_pob_reading: make atonement for the house
  chosen_spanish_reading: hacer expiación por la casa
  alternative_spanish_readings:
  - hacer expiación para la casa
  - purgar la casa
  - hacer atonamiento por la casa
  rationale: El pasaje usa lenguaje de expiación propio del ritual sacerdotal, aun cuando el objeto sea una casa. En español, «expiación» preserva la tensión teológica sin reducirla a mera higiene ritual ni introducir una teoría doctrinal ajena al texto.
  doctrine_reference: 'Levítico 14:53; traducción POBO: preservar el lenguaje ritual-teológico sin resolverlo doctrinalmente'
- issue: Resultado final de טהר en un rito de casa
  english_pob_reading: and it shall be clean
  chosen_spanish_reading: y quedará limpia
  alternative_spanish_readings:
  - y será limpia
  - y será purificada
  - y quedará purificada
  rationale: El hebreo presenta el estado final de la casa después del rito. «Limpia» es la forma más transparente para el lector moderno; «purificada» sería posible, pero puede sonar más técnica y menos inmediata en español.
  doctrine_reference: Levítico 14; pureza ritual en la Torá
- issue: Relación espacial de אֶל פְּנֵי הַשָּׂדֶה
  english_pob_reading: into the open field
  chosen_spanish_reading: hacia la llanura abierta
  alternative_spanish_readings:
  - hacia el campo abierto
  - hacia la faz del campo
  - al campo abierto
  rationale: La frase hebrea es idiomática. «Llanura abierta» intenta conservar la idea de espacio despejado sin calco semítico excesivo; evita oscurecer el sentido para el lector español.
  doctrine_reference: Principio de claridad idiomática sin perder la imagen original
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, que sustituyó «In this way» por «Thus» para un registro más formal. En español se reflejó con «Así», manteniendo brevedad y solemnidad; también se evitó una paráfrasis explicativa innecesaria en la clausula final.
  spanish_consistency_notes:
  - Se usa «Yahvé» como término habitual de la serie para el tetragrámaton, pero este versículo no lo contiene.
  - Se mantiene «expiación» para כפר en concordancia con el léxico sacerdotal de Levítico.
  - Se prefiere «limpia»/«quedará limpia» para טהר por claridad, sin perder el contexto de pureza ritual.
  - El sintagma espacial se adapta a un español natural, pero conserva la imagen de un lugar abierto fuera de la ciudad.
