translation:
  language: es
  text: No fortaleciste[a] a las débiles, ni sanaste a las enfermas, ni vendaste a las quebradas, ni hiciste volver a las descarriadas[b], ni buscaste a las perdidas; sino que las gobernaste con fuerza y con dureza[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las enfermas' para 'las débiles'; el término hebreo puede abarcar debilidad o enfermedad, pero aquí se usa 'las débiles' para distinguirlo de la frase siguiente, 'las enfermas'.
    reason: lexical_alternative
  - marker: b
    text: O 'las apartadas' para 'las descarriadas'. El hebreo puede enfatizar tanto el apartarse como el haber sido alejadas.
    reason: lexical_alternative
  - marker: c
    text: O 'con crueldad'. El término hebreo denota severidad áspera y aplastante.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנַּחְלוֹת
  english_pob_choice: the weak
  chosen_spanish: las débiles
  alternatives_spanish:
  - las enfermas
  - las debilitadas
  lexicon: HALOT
  rationale: Sigo la decisión del POB inglés de distinguir este término del siguiente ('the sick'). En español, 'débiles' comunica mejor la idea de flaqueza o debilitamiento sin repetir 'enfermas', y mantiene el contraste retórico con 'sanaste'.
- source_word: חִזַּקְתֶּם
  english_pob_choice: have strengthened
  chosen_spanish: fortaleciste
  alternatives_spanish:
  - has fortalecido
  - has hecho fuertes
  lexicon: HALOT
  rationale: El verbo חזק en piel significa fortalecer. 'Fortaleciste' es natural en español y conserva el sentido de acción no realizada por los pastores/dirigentes.
- source_word: הַחוֹלָה
  english_pob_choice: the sick
  chosen_spanish: las enfermas
  alternatives_spanish:
  - las dolientes
  - las enfermas de enfermedad
  lexicon: HALOT
  rationale: Aquí el POB inglés reserva 'sick' para el segundo término; en español 'enfermas' mantiene ese contraste claro con 'débiles' y sigue bien el campo semántico de enfermedad.
- source_word: רִפֵּאתֶם
  english_pob_choice: have healed
  chosen_spanish: sanaste
  alternatives_spanish:
  - curaste
  - restauraste
  lexicon: HALOT
  rationale: רפא se traduce de manera natural por 'sanar'. 'Sanaste' es idiomático y conserva el registro de cuidado pastoral del pasaje.
- source_word: לַנִּשְׁבֶּרֶת
  english_pob_choice: the broken
  chosen_spanish: las heridas
  alternatives_spanish:
  - las quebradas
  - las lesionadas
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'la quebrada/la rota', en español 'las heridas' evita una expresión demasiado literal que sonaría extraña en este contexto y transmite la imagen de daño que requiere vendaje. Mantiene la metáfora de ovejas lastimadas sin desviarse del sentido.
- source_word: חֲבַשְׁתֶּם
  english_pob_choice: have bound up
  chosen_spanish: vendaste
  alternatives_spanish:
  - has curado con vendaje
  - has amarrado
  lexicon: HALOT
  rationale: חבש en contexto médico-pastoral implica vendar. 'Vendaste' es la equivalencia española más natural y explícita para la acción de atender una herida.
- source_word: הַנִּדַּחַת
  english_pob_choice: the strayed
  chosen_spanish: las descarriadas
  alternatives_spanish:
  - las extraviadas
  - las apartadas
  lexicon: HALOT
  rationale: El POB inglés conserva el matiz de ovejas que se han desviado. 'Descarriadas' expresa bien el resultado de apartarse o extraviarse y es fluido en español; además mantiene la imagen pastoral.
- source_word: הֲשֵׁבֹתֶם
  english_pob_choice: have brought back
  chosen_spanish: hiciste volver
  alternatives_spanish:
  - has traído de vuelta
  - restauraste
  lexicon: HALOT
  rationale: La forma causativa de שוב pide un verbo transitive de retorno. 'Hiciste volver' reproduce con claridad la idea de traer de regreso a la oveja apartada.
- source_word: הָאֹבֶדֶת
  english_pob_choice: the lost
  chosen_spanish: las perdidas
  alternatives_spanish:
  - las extraviadas
  - las que se han perdido
  lexicon: HALOT
  rationale: אבד aquí encaja bien con 'perdidas'. En español, el plural femenino concuerda con las ovejas implícitas y conserva la secuencia de estados de las ovejas del rebaño.
- source_word: בִקַּשְׁתֶּם
  english_pob_choice: have sought
  chosen_spanish: buscaste
  alternatives_spanish:
  - has buscado
  - has procurado
  lexicon: HALOT
  rationale: בקש significa buscar/solicitar. 'Buscaste' es la opción más natural en español y mantiene la omisión pastoral del cuidado debido.
- source_word: וּבְחָזְקָה
  english_pob_choice: with force
  chosen_spanish: con fuerza
  alternatives_spanish:
  - con poder
  - con violencia
  lexicon: HALOT
  rationale: Sigo el valor básico del sustantivo y la decisión inglesa de no intensificar de más. 'Con fuerza' expresa coerción sin añadir una interpretación excesiva.
- source_word: רְדִיתֶם
  english_pob_choice: have ruled
  chosen_spanish: gobernaste
  alternatives_spanish:
  - dominaste
  - reinaste
  lexicon: HALOT
  rationale: רדה en este contexto es ejercer dominio sobre el rebaño. 'Gobernaste' mantiene la idea de ejercicio de autoridad, y el tono negativo queda reforzado por los modificadores finales.
- source_word: וּבְפָרֶךְ
  english_pob_choice: with harshness
  chosen_spanish: con dureza
  alternatives_spanish:
  - con crueldad
  - con severidad
  lexicon: HALOT
  rationale: פרך denota severidad opresiva y aplastante. 'Con dureza' comunica bien ese trato áspero en español; 'crueldad' sería posible, pero añade más carga moral explícita que el sustantivo por sí solo.
theological_decisions:
- issue: Mantenimiento de la metáfora de pastoreo
  english_pob_reading: Preserve the sheep/shepherd imagery while using natural English descriptors ('weak,' 'sick,' 'broken,' 'strayed,' 'lost').
  chosen_spanish_reading: Conservar la imagen de rebaño y pastores, con descripciones naturales de las ovejas dañadas ('débiles', 'enfermas', 'heridas', 'descarriadas', 'perdidas').
  alternative_spanish_readings:
  - Reducir el verso a lenguaje puramente político sobre 'el pueblo'
  - Parafrasear todas las categorías como 'lesionadas'/'dispersas'
  rationale: El oráculo reprende a los líderes mediante una metáfora pastoral sostenida. El español conserva esa imagen sin volverla artificial, para preservar el impacto profético e intertextual del texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Fuerza opresiva del cierre
  english_pob_reading: Express oppression through the adverbial phrases 'with force and with harshness' rather than intensifying the verb itself.
  chosen_spanish_reading: Expresar la opresión con los modificadores 'con fuerza y con dureza' junto al verbo 'gobernaste'.
  alternative_spanish_readings:
  - '''dominaste brutalmente'''
  - '''los sometiste con violencia y crueldad'''
  rationale: El hebreo coloca el matiz opresivo en las frases preposicionales. Mantener el verbo de gobierno y explicitar la dureza en los modificadores sigue más de cerca la estructura fuente y evita sobrerrepresentar el grado de violencia.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La versión auditada en inglés quedó sin cambios en la última pasada; esta propuesta sigue esa lectura de alta concordancia y conserva las mismas distinciones léxicas clave (weak/sick; strayed/lost; force/harshness) en español.
  spanish_consistency_notes:
  - Se mantiene el paralelismo de cinco acciones negadas seguido por el contraste adversativo final.
  - Se preserva el contraste entre 'débiles' y 'enfermas' para reflejar la decisión del POB inglés entre 'weak' y 'sick'.
  - Se usa 'las' repetido por concordancia con un sujeto implícito femenino plural ('ovejas'), sin explicitarlo en el texto.
  - La puntuación sigue el ritmo coordinado del hebreo y del POB inglés, con coma antes de 'sino que'.
