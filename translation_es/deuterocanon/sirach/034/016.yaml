translation:
  language: es
  text: Puso señales de favor[a], y un clamor apresuró a la nube.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «¿Y quién es su sostén?». El testimonio griego difiere de manera marcada del hebreo conservado aquí, lo que sugiere una forma textual sustancialmente distinta.'
    reason: textual_variant
lexical_decisions:
- source_word: תמרורי
  english_pob_choice: signs
  chosen_spanish: señales
  alternatives_spanish:
  - marcas
  - indicios
  - omens
  lexicon: HALOT
  rationale: En el contexto poético, el sustantivo indica señales visibles o marcadores. «Señales» conserva esa amplitud y es natural en español; «omens» introduciría una lectura interpretativa que el hebreo no exige.
- source_word: רצון
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - benevolencia
  - buena voluntad
  - aceptación
  lexicon: HALOT
  rationale: «Favor» comunica bien la idea de benevolencia o buena disposición con concisión y en un registro bíblico claro.
- source_word: הניחה
  english_pob_choice: set down
  chosen_spanish: puso
  alternatives_spanish:
  - colocó
  - depositó
  - puso allí
  lexicon: HALOT
  rationale: El verbo expresa la acción concreta de colocar/poner. «Puso» es más natural que «puso abajo» o «depositó», y mantiene la fuerza verbal sin sobrecargar el verso.
- source_word: וצעקה
  english_pob_choice: and a cry
  chosen_spanish: y un clamor
  alternatives_spanish:
  - y un grito
  - y un alarido
  - y un clamor
  lexicon: HALOT
  rationale: La forma nominal introduce el segundo hemistiquio. «Clamor» reproduce mejor la elevación y el tono poético que un simple «grito».
- source_word: ענן
  english_pob_choice: the cloud
  chosen_spanish: la nube
  alternatives_spanish:
  - una nube
  - la nube
  lexicon: HALOT
  rationale: En español, el artículo definido resulta fluido en una construcción poética condensada y sigue la lectura concreta del sustantivo.
- source_word: חשתה
  english_pob_choice: made ... hasten
  chosen_spanish: hizo apresurarse
  alternatives_spanish:
  - hizo hastarse
  - hizo darse prisa
  - apresuró
  lexicon: HALOT
  rationale: La raíz expresa prisa o rapidez de movimiento. «Hizo apresurarse» conserva la idea causal con naturalidad en español y evita una forma más literal pero menos idiomática.
theological_decisions:
- issue: Discrepancia textual fuerte entre el hebreo conservado y el paralelo griego
  english_pob_reading: 'The main text follows the surviving Hebrew, with the Greek variant preserved in a footnote: ''And who is his support?'''
  chosen_spanish_reading: 'El texto principal sigue el hebreo conservado, y la nota preserva la variante griega: «¿Y quién es su sostén?»'
  alternative_spanish_readings:
  - ¿Y quién es su apoyo?
  - ¿Y quién lo sostiene?
  rationale: Como el hebreo está disponible pero el griego difiere radicalmente, conviene traducir honestamente el hebreo como texto base y señalar la alternativa griega porque cambia de forma notable el sentido. Esto preserva la tensión textual en vez de suavizarla.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando se conserva; usar el paralelo griego como testimonio real y mantener explícita la incertidumbre textual.'
translation_notes:
  revision_awareness: La redacción sigue la última revisión del inglés, que cambió «hurry» por «hasten» para un registro más formal; por eso se eligió «apresurarse» en lugar de una expresión más coloquial. También se mantuvo la solución del inglés para reflejar la dificultad sintáctica del hebreo sin añadir elementos no atestiguados.
  spanish_consistency_notes:
  - Se usó «favor» para רצון, conforme al valor léxico documentado y a la terminología POB en contextos de benevolencia divina.
  - Se evitó traducir mecánicamente desde el inglés; la construcción española busca reproducir la imagen poética y la causalidad del hebreo.
  - La nota de pie conserva explícitamente la tensión hebreo-griego para no borrar la discrepancia textual documentada.
