    issue: «tabernáculo de reunión» en el texto principal para אֹהֶל מוֹעֵד
    rationale: El audit trail inglés escogió deliberadamente «tent of meeting» en vez de «tabernacle» por primacía del original y transparencia. La justificación del borrador contradice esa decisión y reintroduce una forma tradicional menos literal en el texto principal.
  - severity: medium
