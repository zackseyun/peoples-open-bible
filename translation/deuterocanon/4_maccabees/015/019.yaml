translation:
  text: Nor[a], as a third son was breathing his last, did you weep when you saw the eyes of each one, bull-like, looking upon the tortures and the same torment[c][b], and their nostrils foretelling death.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Nor, with a third dying, did you weep …' The Greek opening is elliptical and depends on the surrounding context about the mother's sons.
    reason: lexical_alternative
  - marker: b
    text: The expression 'like bulls' likely describes the fierce, steadfast way the sons looked at the tortures before them.
    reason: cultural_note
  - marker: c
    text: Or 'their nostrils foretelling death.' The Greek image is vivid and may refer to the visible breathing of those near death.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδὲ τρίτος ἀποψύχων
  chosen: Nor, as a third son was breathing his last
  alternatives:
  - Nor when a third was expiring
  - Nor with the third dying
  lexicon: LSJ
  rationale: ἀποψύχω denotes expiring or breathing out one's life. The Greek is elliptical, continuing the prior rhetorical sequence; supplying 'son' is contextually required from the surrounding passage about the mother's sons, while 'breathing his last' gives natural English without losing the vividness of the participle.
- source_word: θεωροῦσα
  chosen: when you saw
  alternatives:
  - while watching
  - beholding
  lexicon: LSJ
  rationale: The participle expresses the mother's act of observing. 'When you saw' fits the rhetorical question introduced by οὐκ ἔκλαυσας and yields idiomatic English.
- source_word: ταυρηδὸν
  chosen: like bulls
  alternatives:
  - in bull-like fashion
  - fiercely like bulls
  lexicon: LSJ
  rationale: The adverb literally evokes bull-like manner. 'Like bulls' preserves the simile compactly. It most naturally modifies the sons' manner of looking, conveying fierce, steadfast resolve under torture.
- source_word: ἐπὶ τῶν βασάνων ὁρῶντας
  chosen: looking upon the tortures
  alternatives:
  - seeing the torments
  - gazing at the instruments of torture
  lexicon: LSJ
  rationale: βάσανοι can denote tortures or torments, and ἐπί with the genitive here indicates the object before their eyes. 'Looking upon the tortures' stays close to the Greek while remaining readable.
- source_word: τὸν αὐτὸν αἰκισμόν
  chosen: the same torment
  alternatives:
  - the same abuse
  - the same torture
  lexicon: LSJ
  rationale: αἰκισμός refers to maltreatment or torture. 'The same torment' captures that each son faced the same cruel treatment already inflicted on the others.
- source_word: τοὺς μυκτῆρας προσημειουμένους αὐτῶν τὸν θάνατον
  chosen: their nostrils signaling death
  alternatives:
  - their nostrils foretelling death
  - their noses indicating death was near
  lexicon: LSJ
  rationale: μυκτῆρες means nostrils/nose; προσημειόω means to indicate beforehand or signal. The phrase likely describes the visible breathing pattern of the dying sons as a bodily sign of impending death. 'Nostrils signaling death' is literal enough to preserve the striking image.
- source_word: οὐκ ἔκλαυσας
  chosen: did you weep
  alternatives:
  - did you cry
  - did you lament
  lexicon: LSJ
  rationale: κλαίω is the ordinary verb for weeping. 'Did you weep' best fits the direct rhetorical address.
