translation:
  language: es
  text: Porque, así como el razonamiento de nuestro padre Eleazar era un excelente timonel, que guiaba con el timón la nave de la piedad[a] en el mar de las pasiones[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la nave de la devoción a Dios'. El griego εὐσέβεια puede designar la devoción reverente hacia Dios expresada en conducta fiel.
    reason: lexical_alternative
  - marker: b
    text: El griego πάθη aquí probablemente significa 'pasiones' o emociones desordenadas, un tema clave en 4 Macabeos, más que simplemente 'sufrimientos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὥσπερ γὰρ
  english_pob_choice: For just as
  chosen_spanish: Porque, así como
  alternatives_spanish:
  - Pues, así como
  - Así como
  lexicon: LSJ
  rationale: La partícula comparativa y conectiva pide en español una forma que enlace con lo anterior y mantenga la comparación. 'Porque, así como' conserva el valor explicativo y comparativo sin sonar rígido.
- source_word: ἄριστος
  english_pob_choice: excellent
  chosen_spanish: excelente
  alternatives_spanish:
  - óptimo
  - muy diestro
  - el mejor
  lexicon: LSJ
  rationale: En el símil, el adjetivo califica la habilidad del timonel. 'Excelente' comunica destreza o calidad superior sin convertirlo en una afirmación absoluta como 'el mejor'.
- source_word: κυβερνήτης
  english_pob_choice: helmsman
  chosen_spanish: piloto
  alternatives_spanish:
  - timonel
  - capitán
  - navegante
  lexicon: LSJ
  rationale: La imagen náutica requiere un término funcional en español. 'Piloto' es natural y comprensible; en combinación con el verbo 'gobernaba' mantiene la metáfora de dirección de la nave.
- source_word: ὁ ... λογισμός
  english_pob_choice: the reasoning
  chosen_spanish: el razonamiento
  alternatives_spanish:
  - la razón
  - el juicio racional
  - la mente racional
  lexicon: LSJ
  rationale: En 4 Macabeos, λογισμός es la facultad que dirige y ordena frente a las pasiones. 'El razonamiento' conserva ese sentido activo y operativo, y evita tecnicismos no garantizados por el texto.
- source_word: τοῦ πατρὸς ἡμῶν Ἐλεαζάρου
  english_pob_choice: of our father Eleazar
  chosen_spanish: de nuestro padre Eleazar
  alternatives_spanish:
  - de Eleazar nuestro padre
  lexicon: LSJ
  rationale: Se conserva el orden reverente y familiar del original. 'Nuestro padre' reproduce el tono honorífico del narrador sin añadir contenido doctrinal.
- source_word: πηδαλιουχῶν
  english_pob_choice: was steering
  chosen_spanish: que gobernaba
  alternatives_spanish:
  - que timoneaba
  - que guiaba con el timón
  - que dirigía
  lexicon: LSJ
  rationale: El participio verbal expresa acción continua en la metáfora marítima. 'Gobernaba' en español puede significar dirigir una nave y suena natural junto a 'nave' y 'mar'.
- source_word: τὴν τῆς εὐσεβείας ναῦν
  english_pob_choice: the ship of godliness
  chosen_spanish: la nave de la piedad
  alternatives_spanish:
  - la nave de la devoción a Dios
  - la nave de la reverencia
  - la nave de la piedad hacia Dios
  lexicon: LSJ
  rationale: Se mantiene el sustantivo abstracto tradicional 'piedad' porque εὐσέβεια en este contexto denota devoción reverente hacia Dios. 'Nave' preserva el registro metafórico y solemne del griego.
- source_word: ἐν τῷ τῶν παθῶν πελάγει
  english_pob_choice: on the sea of the passions
  chosen_spanish: en el mar de las pasiones
  alternatives_spanish:
  - en el mar de los afectos
  - en el océano de las pasiones
  - en el mar de los padecimientos
  lexicon: LSJ
  rationale: πάθη en 4 Macabeos se refiere primariamente a las pasiones desordenadas, no simplemente a sufrimientos externos. 'Mar' comunica el πέλαγος como mar abierto, y 'pasiones' conserva la tensión filosófica del libro.
theological_decisions:
- issue: Valor de εὐσέβεια en un contexto de fidelidad religiosa
  english_pob_reading: godliness
  chosen_spanish_reading: piedad
  alternative_spanish_readings:
  - devoción a Dios
  - reverencia
  - religiosidad
  rationale: En español, 'piedad' puede expresar la devoción reverente y obediente que el término griego sugiere. Se evita 'religiosidad' por su posible matiz externo o peyorativo; 'devoción a Dios' sería más explicativo, pero menos conciso.
  doctrine_reference: Translation philosophy §6
- issue: Sentido de πάθη en la metáfora del mar
  english_pob_reading: passions
  chosen_spanish_reading: pasiones
  alternative_spanish_readings:
  - sufrimientos
  - afectos desordenados
  - emociones
  rationale: 4 Macabeos desarrolla el dominio de la razón sobre los impulsos internos. 'Pasiones' preserva el tema filosófico-moral; 'sufrimientos' reduciría indebidamente el campo semántico.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: La redacción sigue de cerca la estructura del griego y el criterio de la revisión inglesa más reciente, que conserva la metáfora náutica y la oposición entre razón y pasiones. Se ha ajustado el español para hacerlo publicable sin perder la tensión léxica documentada.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como término por defecto cuando el original lo requiera, pero este versículo no contiene el nombre divino.
  - '''Pasiones'' se conserva como término filosófico-moral coherente con 4 Macabeos, evitando neutralizarlo como ''sufrimientos''.'
  - '''Piedad'' se usa aquí como equivalente funcional de εὐσέβεια, en continuidad con la nota de alternativa documentada.'
  - 'La metáfora náutica se mantiene íntegra: razonamiento/piloto/nave/mar.'
