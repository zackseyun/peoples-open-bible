translation:
  language: es
  text: 'Y un ángel del Señor[a] dijo a Habacuc: «Lleva la comida[b] que tienes a Babilonia, a Daniel en el foso de los leones[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el ángel del Señor». El griego no lleva artículo delante de ἄγγελος, por lo que también puede leerse de manera indefinida o definida.
    reason: alternative_reading
  - marker: b
    text: O «el alimento», «la cena» o «la comida del mediodía»; el término griego designa una comida y no especifica por sí mismo la hora del día.
    reason: lexical_alternative
  - marker: c
    text: Tradicionalmente, «la guarida de los leones». El griego dice más literalmente «el foso de los leones».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄγγελος Κυρίου
  english_pob_choice: an angel of the Lord
  chosen_spanish: un ángel del Señor
  alternatives_spanish:
  - el ángel del Señor
  - un mensajero del Señor
  lexicon: BDAG
  rationale: El griego carece de artículo ante ἄγγελος, así que el indefinido «un ángel» refleja bien la forma. Κυρίου se vierte como «del Señor» siguiendo la convención del proyecto para κύριος cuando designa a Dios.
- source_word: Ἀμβακοὺμ
  english_pob_choice: Habakkuk
  chosen_spanish: Habacuc
  alternatives_spanish:
  - Habacuc
  lexicon: Transliteración estándar bíblica en español
  rationale: Se usa la forma bíblica estable en español para el nombre del profeta.
- source_word: Ἀπένεγκε
  english_pob_choice: Carry
  chosen_spanish: Lleva
  alternatives_spanish:
  - Trae
  - Transporta
  lexicon: BDAG
  rationale: El imperativo pide trasladar algo de un lugar a otro; «lleva» es natural en español y conserva la concreción del movimiento sin sobredeterminar la dirección más allá del contexto inmediato.
- source_word: τὸ ἄριστον
  english_pob_choice: the meal
  chosen_spanish: el alimento
  alternatives_spanish:
  - la comida
  - la comida del mediodía
  - la ración
  lexicon: LSJ
  rationale: ἄριστον puede referirse a una comida/almuerzo; «el alimento» mantiene amplitud semántica en español y evita precisar indebidamente la hora del día. La referencia al texto inglés y al griego permite también la nota sobre «meal».
- source_word: ὃ ἔχεις
  english_pob_choice: that you have
  chosen_spanish: que tienes
  alternatives_spanish:
  - que llevas contigo
  - que tienes contigo
  lexicon: BDAG
  rationale: La cláusula relativa se vierte de modo directo y natural en español, sin añadir información que el griego no exige.
- source_word: εἰς Βαβυλῶνα
  english_pob_choice: to Babylon
  chosen_spanish: a Babilonia
  alternatives_spanish:
  - hacia Babilonia
  - hasta Babilonia
  lexicon: BDAG
  rationale: Con nombre de lugar, εἰς expresa dirección; «a Babilonia» es la opción más natural en español.
- source_word: εἰς τὸν λάκκον τῶν λεόντων
  english_pob_choice: in the lions’ pit
  chosen_spanish: en el foso de los leones
  alternatives_spanish:
  - en la cisterna de los leones
  - en el pozo de los leones
  - en la fosa de los leones
  lexicon: LSJ
  rationale: λάκκος es literalmente un hoyo/foso/fosa. «Foso» preserva mejor la imagen concreta que «den», y mantiene la tensión lexical documentada por la POB inglesa.
theological_decisions:
- issue: κύριος como título divino en una narrativa deuterocanónica griega
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Dueño
  - Maestro
  rationale: Aquí κύριος forma parte de la expresión fija «ángel del Señor» y se refiere al Dios de Israel; «Señor» conserva ese valor sin introducir una paráfrasis menos precisa.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: El texto inglés auditado fue ajustado mínimamente en la revisión para añadir «that»; no altera la estructura ni la fuerza semántica del griego. La versión española sigue directamente el griego normalizado y conserva la decisión auditada de traducir λάκκος por una imagen concreta de «foso» en lugar de la tradicional «den».
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en la expresión fija «ángel del Señor».
  - Se preserva «Habacuc» como forma bíblica estable en español.
  - «Foso de los leones» conserva la tensión entre la imagen literal del griego y la formulación tradicional en español.
  - El sintagma «el alimento» evita especificar indebidamente la clase exacta de comida, acorde con la amplitud de ἄριστον.
