translation:
  language: es
  text: Desde los treinta años de edad y hasta los cincuenta años, los contarás, todo el que viene para hacer el servicio[a], para hacer la obra en la tienda de reunión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'a prestar servicio'; el hebreo usa lenguaje de tipo militar de forma metafórica para el servicio organizado del tabernáculo.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבֶּן ... וָמַעְלָה
  english_pob_choice: From thirty years old and upward
  chosen_spanish: Desde los treinta años de edad y hasta los cincuenta años
  alternatives_spanish:
  - Desde los treinta años y más
  - Desde los treinta años de edad y arriba
  lexicon: HALOT
  rationale: La construcción idiomática hebrea indica rango de edad, no filiación literal. En español, 'desde los treinta años de edad' comunica de forma natural el inicio del rango, y se completa con la cláusula de límite superior.
- source_word: עַד בֶּן חֲמִשִּׁים שָׁנָה
  english_pob_choice: to fifty years old
  chosen_spanish: hasta los cincuenta años
  alternatives_spanish:
  - hasta los cincuenta años de edad
  - hasta llegar a los cincuenta años
  lexicon: HALOT
  rationale: Conserva el límite superior del rango de edad de manera breve y clara, sin añadir matices no presentes en el hebreo.
- source_word: תִּפְקֹד אוֹתָם
  english_pob_choice: you shall count them
  chosen_spanish: los contarás
  alternatives_spanish:
  - los registrarás
  - los censarás
  lexicon: HALOT
  rationale: En contexto administrativo/censal, פקד puede significar contar o registrar. 'Contarás' sigue la lectura de la POB inglesa y es comprensible en español, sin perder el sentido de evaluación o enumeración oficial.
- source_word: כָּל הַבָּא
  english_pob_choice: everyone who comes
  chosen_spanish: todos los que vienen
  alternatives_spanish:
  - todo el que viene
  - todos los que se presentan
  lexicon: HALOT
  rationale: El participio sustantivado con כָּל expresa un grupo distributivo. 'Todos los que vienen' preserva la amplitud inclusiva y suena natural en español.
- source_word: לִצְבֹא צָבָא
  english_pob_choice: to do the service
  chosen_spanish: para hacer el servicio
  alternatives_spanish:
  - para desempeñar el servicio
  - para hacer el deber
  lexicon: HALOT
  rationale: La expresión cognada conserva un matiz de servicio organizado y asignado, con trasfondo de lenguaje militar pero aplicado al tabernáculo. 'Hacer el servicio' mantiene esa formalidad sin convertirlo en lenguaje bélico literal.
- source_word: לַעֲבֹד עֲבֹדָה
  english_pob_choice: to do the work
  chosen_spanish: para hacer la obra
  alternatives_spanish:
  - para realizar la obra
  - para hacer el trabajo
  lexicon: HALOT
  rationale: La construcción intensiva con verbo y sustantivo cognados se refleja bien con 'hacer la obra', que conserva la repetición y el sentido de labor asignada.
- source_word: בְּאֹהֶל מוֹעֵד
  english_pob_choice: in the tent of meeting
  chosen_spanish: en la tienda de reunión
  alternatives_spanish:
  - en el tabernáculo de reunión
  - en la tienda del encuentro
  lexicon: HALOT
  rationale: '''Tienda de reunión'' es una opción española clara y fiel al nombre del santuario móvil. Se evita ''tabernáculo'' por no ser necesario aquí y para mantener la transparencia del término hebreo.'
theological_decisions:
- issue: Cómo reflejar el lenguaje de צבא sin volverlo militar en sentido literal
  english_pob_reading: Cultic service language ('do the service') rather than literal military wording
  chosen_spanish_reading: Lenguaje de servicio cultual ('hacer el servicio') sin cargarlo de militarismo explícito
  alternative_spanish_readings:
  - hacer el servicio militar
  - cumplir guardia
  rationale: En Números 4 el contexto es el servicio levítico del tabernáculo. La elección conserva el trasfondo organizado y asignado de צבא, pero evita sugerir combate real, que el pasaje no describe.
  doctrine_reference: Números 4; cf. servicio levítico en el santuario
translation_notes:
  revision_awareness: La redacción inglesa más reciente cambió 'perform service' por 'do the service' para reflejar con mayor directitud לִצְבֹא צָבָא. La versión española sigue ese ajuste con 'hacer el servicio', manteniendo además el paralelismo con 'hacer la obra'.
  spanish_consistency_notes:
  - Se usa 'tienda de reunión' para בְּאֹהֶל מוֹעֵד, consistente con un registro bíblico transparente y comprensible.
  - Se conserva el verbo 'contar' para תִּפְקֹד, en línea con la decisión inglesa de priorizar la función censal/administrativa inmediata.
  - No se introduce 'señor', 'sacerdotal' ni lenguaje militar explícito que no esté exigido por el hebreo o el audit trail inglés.
