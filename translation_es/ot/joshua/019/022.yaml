review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura general del hebreo y conserva las dos notas léxicas principales. Sin embargo, en la fórmula territorial וְהָיוּ תֹּצְאוֹת גְּבוּלָם הַיַּרְדֵּן, la redacción «las salidas de su límite estuvieron en el Jordán» suena poco natural y además cambia el posesivo plural («su» por «sus») del hebreo y de la auditoría inglesa («their border»). También «Bet-semes» es una transliteración poco estable en español; «Bet-semes» además omite la h de la forma tradicional de apoyo al original שֶׁמֶשׁ, y «Sahazuma» se aparta innecesariamente de la forma auditada Shahazumah sin una convención española clara.
  spanish_quality_summary: 'La frase es comprensible, pero presenta varios puntos de legibilidad y consistencia mejorables: «las salidas de su límite estuvieron» es torpe en español; «Bet-semes» no es una forma toponímica suficientemente clara; y conviene armonizar el plural posesivo con el hebreo. Una reparación menor puede mantener la fidelidad al original y mejorar la fluidez: «y el extremo de su límite[a] fue el Jordán» o, mejor aún para preservar la nota existente, «y las salidas de sus límites[b] fueron el Jordán» no suena ideal; por eso conviene usar una formulación idiomática en texto y dejar la literalidad en la nota, como hace el inglés.'
  glossary_alignment: 'No hay términos teológicos mayores en juego. El borrador respeta en general la política de transliterar topónimos, pero las formas «Sahazuma» y sobre todo «Bet-semes» deberían ajustarse a transliteraciones españolas más reconocibles y más cercanas a la evidencia auditada: «Shahazuma»/«Sahazumá» es debatible, pero «Bet-semes» conviene revisar a «Bet-semesh».'
  issues:
  - severity: medium
    issue: La fórmula de frontera «las salidas de su límite estuvieron en el Jordán» es poco idiomática en español.
    rationale: Aunque intenta conservar la literalidad de תֹּצְאוֹת, el resultado suena forzado. El inglés POB opta por una formulación dinámica en el texto y deja la literalidad en nota. El español debería hacer lo mismo para claridad y fidelidad funcional.
  - severity: medium
    issue: 'El posesivo cambia de plural a singular: «su límite» en vez de «sus límites» o «su frontera» referido a «ellos».'
    rationale: El hebreo tiene גְּבוּלָם, 'su/sus borde(s)' de 3mp. En español puede expresarse como «su límite» en sentido colectivo, pero aquí la combinación con «las salidas» y la nota literal hace más visible la discordancia. Conviene una redacción que no cree choque gramatical.
  - severity: low
    issue: «Bet-semes» es una transliteración deficiente o al menos poco clara.
    rationale: Para בית שמש, una forma como «Bet-semesh» es más transparente y mejor alineada con la base consonántica y con usos bíblicos modernos en español. «Casa del Sol» no corresponde a la política del proyecto.
  - severity: low
    issue: «Sahazuma» puede considerarse aceptable, pero queda algo alejada de la forma auditada «Shahazumah».
    rationale: No exige adjudicación mayor, pero una forma como «Shahazuma» preserva mejor la audit trail sin dejar de ser legible en español.
  revised_spanish_text: 'Y el límite tocó Tabor[a], Shahazuma y Bet-semesh; y el extremo de su límite fue el Jordán[b]: dieciséis ciudades con sus aldeas.'
  revised_footnotes:
  - marker: a
    text: O «alcanzó» o «se encontró con»; el verbo hebreo puede indicar que una línea de frontera entra en contacto con un lugar.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «las salidas de su límite fueron el Jordán», fórmula de frontera que señala el extremo o alcance del límite.
    reason: lexical_alternative
  revision_rationale: 'Se revisa la fórmula territorial para que el texto principal sea natural en español, siguiendo la misma estrategia funcional del inglés POB: texto idiomático y nota con la literalidad. También se corrige la transliteración de topónimos para mayor claridad y mejor alineación con la auditoría fuente.'
