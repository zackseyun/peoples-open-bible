translation:
  language: es
  text: los demonios inmundos comenzaron a extraviar a los hijos de los hijos de Noé, y a hacerlos errar y destruirlos.”
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: unclean demons
  english_pob_choice: the unclean demons
  chosen_spanish: los demonios inmundos
  alternatives_spanish:
  - los espíritus inmundos
  - los demonios impuros
  lexicon: demonios / inmundos
  rationale: Conserva el sentido de seres espirituales malignos y la cualidad de impureza ritual/moral expresada por el inglés 'unclean'. 'Inmundos' es natural en español bíblico y mantiene la carga semántica sin suavizarla.
- source_word: lead astray
  english_pob_choice: began to lead astray
  chosen_spanish: comenzaron a desviar
  alternatives_spanish:
  - comenzaron a extraviar
  - comenzaron a hacer caer en error
  lexicon: desviar
  rationale: '''Desviar'' reproduce bien la idea de apartar del camino correcto. Se evita una paráfrasis más larga que diluya la progresión verbal del original.'
- source_word: children of the sons of Noah
  english_pob_choice: the children of the sons of Noah
  chosen_spanish: a los hijos de los hijos de Noé
  alternatives_spanish:
  - a los descendientes de los hijos de Noé
  - a los hijos de los descendientes de Noé
  lexicon: hijos / hijos de los hijos
  rationale: La cadena genealógica del inglés se conserva de manera directa porque el texto no dice simplemente 'descendientes'. Aunque suena repetitivo, mantiene la estructura del source y su énfasis familiar/genealógico.
- source_word: make them err and destroy them
  english_pob_choice: and to make them err and destroy them
  chosen_spanish: y a hacerlos errar y destruirlos
  alternatives_spanish:
  - y a hacer que se extraviaran y los destruyeran
  - y a hacerlos cometer errores y destruirlos
  lexicon: errar / destruir
  rationale: '''Errar'' conserva el verbo fuerte de desviarse/andar fuera de camino sin convertirlo en una explicación. ''Destruirlos'' sigue el paralelismo del inglés y mantiene la amenaza final.'
theological_decisions:
- issue: Naturaleza de los agentes malignos
  english_pob_reading: the unclean demons
  chosen_spanish_reading: los demonios inmundos
  alternative_spanish_readings:
  - los espíritus inmundos
  - los demonios impuros
  rationale: Se mantiene 'demonios' porque el inglés POB ya lo fija como lectura principal. 'Inmundos' conserva la noción de impureza sin introducir una reinterpretación más abstracta.
  doctrine_reference: Angelología/demonología bíblica
- issue: Objeto del engaño
  english_pob_reading: the children of the sons of Noah
  chosen_spanish_reading: a los hijos de los hijos de Noé
  alternative_spanish_readings:
  - a los descendientes de los hijos de Noé
  rationale: Se preserva la ambigüedad/rareza genealógica del original en vez de normalizarla teológicamente a 'descendientes'. Esto respeta la forma del testimonio recibido.
  doctrine_reference: Transmisión genealógica en literatura del Segundo Templo
- issue: Secuencia de daño espiritual y ruina
  english_pob_reading: lead astray ... make them err and destroy them
  chosen_spanish_reading: desviar ... hacerlos errar y destruirlos
  alternative_spanish_readings:
  - extraviar ... hacerlos caer en error y destruirlos
  rationale: 'La triple progresión se mantiene: apartar, hacer errar, destruir. No se atenúa el juicio del texto ni se reordena su intensidad.'
  doctrine_reference: Responsabilidad moral y corrupción por agentes espirituales
translation_notes:
  revision_awareness: El pasaje en Geez no está disponible en el paquete de fuente (texto vacío), así que la draft se basa en el texto inglés auditado de la POB y en su lectura estable sin revisiones aplicadas. No se introducen enmiendas textuales adicionales.
  spanish_consistency_notes:
  - Se usa 'Noé' con acento estándar español.
  - Se conserva el orden semántico del inglés para evitar perder la cadena de acciones.
  - No se introduce 'SEÑOR' ni otros términos no presentes en el versículo.
