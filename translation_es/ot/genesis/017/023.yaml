  language: en
  yaml_path: translation/ot/genesis/017/023.yaml
  text: So Abraham took Ishmael his son[a], and all those born in his house, and all those bought with his money, every male among the men of Abraham’s household, and circumcised the flesh of their foreskin on that very day[d][c][b], just as God had spoken to him.
