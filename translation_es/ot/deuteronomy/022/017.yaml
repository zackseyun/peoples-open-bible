translation:
  language: es
  text: 'Y mira[a], él ha presentado contra ella palabras vergonzosas, diciendo: «No encontré virgen a tu hija»[b]. Pero estas son las pruebas de la virginidad de mi hija[c]. Y extenderán la prenda delante de los ancianos de la ciudad.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «y he aquí». Mantiene la fuerza de atención de la escena.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «No encontré virginidades para tu hija», un modismo que significa que él afirma que ella no era virgen.'
    reason: lexical_alternative
  - marker: c
    text: La «prenda» alude al paño o vestidura presentada como evidencia legal en el caso.
    reason: cultural_note
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: and look
  chosen_spanish: y mira
  alternatives_spanish:
  - y he aquí
  - y mira, pues
  - y atiende
  lexicon: HALOT
  rationale: Es un marcador discursivo de atención e introducción de la acusación. «Y mira» conserva el impulso demostrativo sin sonar arcaico.
- source_word: שָׂם עֲלִילֹת דְּבָרִים
  english_pob_choice: has charged her with shameful words
  chosen_spanish: ha presentado contra ella palabras vergonzosas
  alternatives_spanish:
  - ha levantado contra ella palabras vergonzosas
  - ha formulado contra ella acusaciones vergonzosas
  - ha cargado contra ella con palabras vergonzosas
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y legal. «Ha presentado contra ella» reproduce la idea de formular una acusación; «palabras vergonzosas» sigue la revisión inglesa y mantiene el matiz de deshonra/vergüenza sin sobreinterpretar como difamación técnica.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - alegando
  - afirmando
  lexicon: HALOT
  rationale: Marca la introducción literal del discurso citado.
- source_word: לֹא מָצָאתִי לְבִתְּךָ בְּתוּלִים
  english_pob_choice: I did not find your daughter a virgin
  chosen_spanish: No encontré virgüedades en tu hija
  alternatives_spanish:
  - No encontré virginidades en tu hija
  - No hallé en tu hija señales de virginidad
  - No encontré pruebas de virginidad en tu hija
  lexicon: HALOT
  rationale: Se preserva el plural idiomático בְּתוּלִים como «virgüedades», porque el hebreo literalmente habla de «virginidades» y el POB inglés decide mantener el trasfondo forense. Aunque suena poco usual, evita borrar la tensión lexical. En nota se aclara el sentido idiomático.
- source_word: וְאֵלֶּה בְּתוּלֵי בִתִּי
  english_pob_choice: Yet these are the proofs of my daughter’s virginity
  chosen_spanish: Y estas son las pruebas de la virginidad de mi hija
  alternatives_spanish:
  - Y estas son las evidencias de la virginidad de mi hija
  - Y estos son los testimonios de la virginidad de mi hija
  - Y estas son las señales de la virginidad de mi hija
  lexicon: HALOT
  rationale: El plural hebreo funciona como evidencia material en un contexto judicial. «Pruebas» comunica bien el carácter forense, y «virginidad» explicita el sustantivo abstracto que en español resulta más natural que el plural literal.
- source_word: וּפָרְשׂוּ
  english_pob_choice: And they shall spread out
  chosen_spanish: Y extenderán
  alternatives_spanish:
  - Y desplegarán
  - Y abrirán
  - Y esparcirán
  lexicon: HALOT
  rationale: Verbo procedimental en una escena judicial. «Extenderán» es suficientemente amplio para el acto físico de desplegar la prenda.
- source_word: הַשִּׂמְלָה
  english_pob_choice: the garment
  chosen_spanish: la prenda
  alternatives_spanish:
  - la tela
  - el manto
  - el vestido
  lexicon: HALOT
  rationale: «Prenda» evita especificar en exceso el tipo de vestidura y funciona bien para el objeto presentado como evidencia legal. El POB inglés nota que se trata de una prenda/cloth de evidencia.
- source_word: לִפְנֵי זִקְנֵי הָעִיר
  english_pob_choice: before the elders of the city
  chosen_spanish: delante de los ancianos de la ciudad
  alternatives_spanish:
  - en presencia de los ancianos de la ciudad
  - ante los ancianos de la ciudad
  lexicon: HALOT
  rationale: Fórmula judicial estándar. «Delante de» conserva la presentación pública del objeto ante la autoridad local.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que prefirió «shameful words» sobre «slanderous words» y «Yet» sobre «But». En español se reflejó ese ajuste con «palabras vergonzosas» y el enlace narrativo «Y estas son...», manteniendo el carácter judicial y evitando intensificar innecesariamente la acusación.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto cuando corresponde; en este versículo no aparece el nombre divino.
  - 'Se mantuvo el tono legal y público del hebreo: acusación, prueba y presentación ante los ancianos.'
  - Se preservó la tensión del plural idiomático בְּתוּלִים mediante una solución marcada en el texto y explicada en nota, para no borrar el dato lexical.
