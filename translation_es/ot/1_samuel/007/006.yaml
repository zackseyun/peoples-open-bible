translation:
  language: es
  text: 'Entonces se reunieron en Mizpa[a], sacaron agua y la derramaron delante de Yahvé[b]. Ayunaron aquel día y dijeron allí: “Hemos pecado contra Yahvé.” Y Samuel juzgó a los hijos de Israel en Mizpa.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse “a Mizpa” en la primera mención, porque la forma hebrea incluye un sufijo direccional.
    reason: lexical_alternative
  - marker: b
    text: El derramamiento de agua delante de Yahvé es un acto ritual de arrepentimiento o lamento, aunque el texto no explica explícitamente su simbolismo.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּקָּבְצוּ
  english_pob_choice: they gathered
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se congregaron
  - se juntaron
  lexicon: HALOT
  rationale: El nifal de קבץ expresa reunión o congregación; en español, “se reunieron” comunica bien la acción colectiva sin forzar una dirección que el hebreo no exige en este punto.
- source_word: הַמִּצְפָּתָה / בַּמִּצְפָּה
  english_pob_choice: at Mizpah
  chosen_spanish: en Mizpa
  alternatives_spanish:
  - a Mizpa
  - a Mizpah
  - en Mizpah
  lexicon: HALOT
  rationale: El sufijo direccional del primer lugar puede sugerir “a Mizpa”, pero en español la frase funciona mejor como lugar de reunión. El cierre “en Mizpa” confirma el valor locativo del pasaje.
- source_word: וַיִּשְׁאֲבוּ מַיִם
  english_pob_choice: drew water
  chosen_spanish: sacaron agua
  alternatives_spanish:
  - acarrearon agua
  - tomaron agua
  lexicon: HALOT
  rationale: שׁאב es “sacar/dar agua” en sentido de extracción o acopio. “Sacaron agua” conserva la acción concreta y evita una construcción demasiado técnica.
- source_word: וַיִּשְׁפְּכ֣וּ לִפְנֵי יְהוָה
  english_pob_choice: poured it out before Yahweh
  chosen_spanish: la derramaron delante de Yahvé
  alternatives_spanish:
  - la vertieron delante de Yahvé
  - la derramaron en presencia de Yahvé
  lexicon: HALOT
  rationale: שׁפך se rinde naturalmente con “derramar”. “Delante de Yahvé” conserva לִפְנֵי como orientación espacial/ritual, y sigue el uso del nombre divino pedido por el proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el término base del proyecto para el Tetragrámaton. “Yahvé” mantiene el nombre personal divino sin sustitución por un título.
- source_word: וַיָּצוּמוּ
  english_pob_choice: They fasted
  chosen_spanish: Ayunaron
  alternatives_spanish:
  - guardaron ayuno
  - se abstuvieron de comida
  lexicon: HALOT
  rationale: צום corresponde directamente a ayunar; “Ayunaron” es la forma española más clara y digna.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - ese día
  - en aquel día
  lexicon: HALOT
  rationale: La expresión temporal se naturaliza como “aquel día”, que conserva el valor de referencia puntual.
- source_word: חָטָאנוּ לַיהוָה
  english_pob_choice: We have sinned against Yahweh
  chosen_spanish: Hemos pecado contra Yahvé
  alternatives_spanish:
  - Hemos pecado delante de Yahvé
  - Hemos faltado contra Yahvé
  lexicon: HALOT
  rationale: חטא con ל expresa pecado dirigido contra alguien; “hemos pecado contra Yahvé” mantiene la fuerza confesional y el sentido relacional del hebreo.
- source_word: וַיִּשְׁפֹּט
  english_pob_choice: judged
  chosen_spanish: juzgó
  alternatives_spanish:
  - gobernó
  - administró justicia
  lexicon: HALOT
  rationale: שׁפט en el marco de Samuel incluye la función de juez y líder. “Juzgó” conserva el lenguaje bíblico habitual sin perder la idea de autoridad judicial.
- source_word: אֶת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: a los hijos de Israel
  alternatives_spanish:
  - a los israelitas
  - al pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la correspondencia más cercana con בְּנֵי יִשְׂרָאֵל. “Hijos de Israel” mantiene el eco genealógico y colectivo del hebreo.
theological_decisions:
- issue: Sentido del derramamiento de agua delante de Yahvé
  english_pob_reading: Retain the action literally without interpreting its symbolism in the main text.
  chosen_spanish_reading: Mantener el gesto literalmente sin explicarlo en el cuerpo principal.
  alternative_spanish_readings:
  - como signo de arrepentimiento
  - como libación ritual
  - como símbolo de lamentación
  rationale: El hebreo relata el gesto pero no aclara su simbolismo. La traducción conserva la tensión interpretativa y evita fijar un sentido no explicitado por el texto.
  doctrine_reference: Translation philosophy §3
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se preserva el nombre propio de Dios conforme al criterio del proyecto y a la transliteración establecida para el Tetragrámaton.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo, a la vez que incorpora el ajuste auditado del POB inglés: mantener el acta ritual sin interpretación añadida y conservar la designación más literal “hijos de Israel” para בְּנֵי יִשְׂרָאֵל.'
  spanish_consistency_notes:
  - Se usa “Yahvé” de manera consistente para יְהוָה.
  - Se mantiene “Mizpa” como topónimo y se conserva el matiz locativo con la nota.
  - Se evita “SEÑOR” para no enmascarar el nombre divino.
  - La confesión verbal y el ayuno se presentan con lenguaje sobrio y bíblicamente reconocible.
