  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del griego: propósito público, difusión de deshonra contra la nación, erección de una στήλη y grabado de una inscripción. Sin embargo, la localización ἐπὶ τοῦ κατὰ τὴν αὐλὴν πύργου se acerca mejor a «en la torre junto al patio/recinto» que a «sobre la torre junto al atrio», y «atrio» estrecha innecesariamente αὐλή frente a la nota inglesa, que deja abierto court/courtyard/palace court.'
  spanish_quality_summary: El español es claro y digno, pero «sobre la torre» sugiere colocación encima de la torre más que ubicación asociada a ella, y «atrio» puede sonar demasiado eclesiástico o arquitectónicamente específico. Una leve revisión mejora la naturalidad y la fidelidad espacial sin perder el tono.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. «Estela» está bien alineado con στήλη, y «nación» con ἔθνους. «Oprobio» es aceptable para ψόγον, aunque la nota ya preserva alternativas útiles.
  issues:
  - severity: medium
    issue: «Atrio» para αὐλή puede ser demasiado específico
    rationale: La evidencia y la nota inglesa señalan un patio/corte/recinto, incluso potencialmente de palacio. «Atrio» en español puede evocar un espacio eclesiástico o una antesala particular, reduciendo el rango semántico.
  - severity: medium
    issue: «Sobre la torre» puede sonar espacialmente impreciso
    rationale: La frase griega con ἐπὶ + genitivo locativo aquí se vierte mejor como ubicación en/por la torre. «Sobre la torre» suena más como ‘encima de’ la torre, lo que puede desviar la imagen.
  - severity: low
    issue: La nota [a] sobre «oprobio» no es necesaria para reproducir el aparato inglés
    rationale: El audit trail inglés solo conserva nota para στήλη y αὐλή. No es incorrecta, pero no aporta una ambigüedad nueva indispensable en español.
  revised_spanish_text: Se propuso públicamente difundir oprobio contra la nación; habiendo levantado una estela[a] en la torre junto al patio[b], grabó una inscripción.
