translation:
  language: es
  text: y los dos riñones, y la grasa que está sobre ellos, la que está sobre los lomos, y el apéndice[a] sobre el hígado, con los riñones, lo quitará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el lóbulo del hígado». El término hebreo para este rasgo anatómico es incierto; «apéndice» es una traducción prudente.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁתֵּי הַכְּלָיֹת
  english_pob_choice: the two kidneys
  chosen_spanish: los dos riñones
  alternatives_spanish:
  - el par de riñones
  - las dos glándulas
  lexicon: HALOT
  rationale: En este contexto sacrificial el hebreo nombra literalmente dos órganos concretos. «Riñones» es la correspondencia natural y clara en español, y conserva la concreción anatómica del texto.
- source_word: הַחֵלֶב
  english_pob_choice: the fat
  chosen_spanish: la grasa
  alternatives_spanish:
  - la gordura
  - el sebo
  lexicon: HALOT
  rationale: Aquí חֵלֶב designa la porción grasa reservada para el rito. «Grasa» comunica bien el sentido en español moderno y evita un tecnicismo menos transparente.
- source_word: אֲשֶׁר עֲלֵיהֶן
  english_pob_choice: that is on them
  chosen_spanish: que está sobre ellos
  alternatives_spanish:
  - que está encima de ellos
  - que está sobre estas
  lexicon: HALOT
  rationale: La expresión relativa modifica la grasa y remite a los riñones. «Sobre ellos» mantiene la relación espacial del hebreo sin volver la frase pesada en español.
- source_word: הַכְּסָלִים
  english_pob_choice: the loins
  chosen_spanish: los lomos
  alternatives_spanish:
  - los riñones
  - los flancos
  lexicon: HALOT
  rationale: En este pasaje anatómico-ritual, el hebreo se refiere a la zona de los lomos o flancos. «Lomos» es una equivalencia natural y suficientemente tradicional para este contexto.
- source_word: הַיֹּתֶרֶת עַל הַכָּבֵד
  english_pob_choice: the appendage on the liver
  chosen_spanish: el apéndice del hígado
  alternatives_spanish:
  - el lóbulo del hígado
  - el apéndice sobre el hígado
  lexicon: HALOT
  rationale: יֹתֶרֶת es un término anatómico incierto. La POB inglesa opta por una traducción cautelosa; en español, «apéndice del hígado» mantiene esa cautela y la transparencia, sin fijar indebidamente la anatomía exacta.
- source_word: עַל הַכְּלָיוֹת
  english_pob_choice: with the kidneys
  chosen_spanish: con los riñones
  alternatives_spanish:
  - junto con los riñones
  - sobre los riñones
  lexicon: HALOT
  rationale: Aunque la preposición es literalmente «sobre», en la fórmula sacrificial la idea es que el apéndice se retire conjuntamente con los riñones. «Con los riñones» refleja la función ritual de la frase.
- source_word: יְסִירֶנָּה
  english_pob_choice: he shall remove it
  chosen_spanish: lo quitará
  alternatives_spanish:
  - lo removerá
  - lo apartará
  lexicon: HALOT
  rationale: El verbo expresa la acción de retirar estas partes del animal. «Quitar» es claro y formal en español, y «lo quitará» conserva el tono procedural del mandato.
translation_notes:
  revision_awareness: El texto base inglés fue revisado desde «appendage of the liver, along with the kidneys» a «appendage on the liver, with the kidneys» para reflejar mejor la preposición hebrea y mantener el valor formal de la fórmula. La versión española sigue esa revisión con «apéndice del hígado, con los riñones», sin sobreespecificar la anatomía.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término de norma para el nombre divino en la serie, aunque este versículo no lo contiene.
  - 'Se conservó el registro legal-sacrificial con verbos sencillos y concretos: «está sobre», «quitará».'
  - Se evitó «sebo» porque en español puede sonar más técnico o regional; «grasa» sigue mejor la equivalencia usada en la base inglesa.
  - La nota al pie se ancla en «apéndice» porque ahí está la ambigüedad léxica principal.
