translation:
  language: es
  text: Pero la carne del toro[a], y su piel, y su estiércol, quemarás todo eso con fuego fuera del campamento; es una ofrenda por el pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrenda de purificación». El hebreo חַטָּאת puede denotar tanto el pecado como la ofrenda ofrecida en relación con el pecado; en contextos sacrificiales como este, muchos traducen «ofrenda por el pecado», mientras que algunos prefieren «ofrenda de purificación» para resaltar la función limpiadora del rito.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּשַׂר
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - flesh
  - carne del animal
  lexicon: HALOT
  rationale: En contexto sacrificial, בָּשָׂר nombra la carne del animal, no comida; en español bíblico contemporáneo, 'carne' conserva esa concreción ritual mejor que 'carne' entendida en sentido culinario. Se evita 'carne del toro' como añadido explicativo excesivo.
- source_word: הַפָּר
  english_pob_choice: the bull
  chosen_spanish: el toro
  alternatives_spanish:
  - el buey
  - el novillo
  lexicon: HALOT
  rationale: פָּר designa un toro/bull para el sacrificio. 'Toro' es claro y natural en español; 'novillo' introduce edad no explícita en el hebreo, y 'buey' sugiere animal castrado.
- source_word: עֹרוֹ
  english_pob_choice: its hide
  chosen_spanish: su piel
  alternatives_spanish:
  - su cuero
  - su hide
  lexicon: HALOT
  rationale: Aunque 'hide' en inglés es más técnico, en español 'piel' comunica directamente el cuerpo del animal. 'Cuero' suena procesado y no corresponde al cadáver sacrificial. Se mantiene la referencia concreta al animal.
- source_word: פִּרְשׁוֹ
  english_pob_choice: its dung
  chosen_spanish: su estiércol
  alternatives_spanish:
  - sus excrementos
  - su suciedad
  lexicon: HALOT
  rationale: פֶּרֶשׁ denota excremento/desecho orgánico. 'Estiércol' es el equivalente más directo y digno en español; 'excrementos' es posible pero más clínico, y 'suciedad' diluye el sentido.
- source_word: תִּשְׂרֹף
  english_pob_choice: you shall burn
  chosen_spanish: quemarás
  alternatives_spanish:
  - lo quemarás
  - deberás quemarlo
  lexicon: HALOT
  rationale: El imperfecto jussivo/instructivo se expresa de manera natural en español con futuro de mandato. Se omite el pronombre explícito porque el objeto ya queda claro en la enumeración previa.
- source_word: בָּאֵשׁ
  english_pob_choice: with fire
  chosen_spanish: con fuego
  alternatives_spanish:
  - en el fuego
  - por medio del fuego
  lexicon: HALOT
  rationale: La preposición hebrea aquí es instrumental; 'con fuego' conserva la idea de medio empleado para quemar, y es idiomático en español.
- source_word: מִחוּץ לַמַּחֲנֶה
  english_pob_choice: outside the camp
  chosen_spanish: fuera del campamento
  alternatives_spanish:
  - afuera del campamento
  - fuera del real
  lexicon: HALOT
  rationale: Es la fórmula habitual para la zona exterior al campamento de Israel en la legislación del desierto. 'Campamento' es claro y ampliamente entendible.
- source_word: חַטָּאת
  english_pob_choice: sin offering
  chosen_spanish: una ofrenda por el pecado
  alternatives_spanish:
  - una ofrenda por el pecado / una ofrenda de purificación
  - una ofrenda por el pecado
  lexicon: HALOT
  rationale: En español, 'ofrenda por el pecado' comunica el sentido sacrificial sin reducir חַטָּאת al concepto abstracto de pecado. Se evita fijar exclusivamente 'ofrenda por el pecado' como terminología litúrgica rígida cuando el término hebreo puede abarcar también la función purificadora del rito.
- source_word: הוּא
  english_pob_choice: it is
  chosen_spanish: es
  alternatives_spanish:
  - es esto
  - ello es
  lexicon: HALOT
  rationale: El hebreo identifica el sacrificio de manera copulativa; en español la frase natural es 'es una ofrenda...'. La omisión del pronombre explícito evita redundancia y suena idiomática.
- source_word: וְאֶת ... וְאֶת ... וְאֶת
  english_pob_choice: and ... and ... and
  chosen_spanish: y ... y ... y
  alternatives_spanish:
  - además ... y ... y
  - y ... y ... y
  lexicon: HALOT
  rationale: Se conserva la coordinación repetida para reflejar la enumeración hebrea de las partes del animal que deben ser quemadas.
theological_decisions:
- issue: Sentido de חַטָּאת en contexto sacrificial
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda de purificación
  - ofrenda por el pecado
  rationale: El contexto cultual inmediato exige el sentido sacrificial, no el pecado abstracto. En español, 'ofrenda por el pecado' mantiene esa lectura reconocible y deja abierta la tensión lexical con la posible función de purificación del rito, sin forzar una equivalencia doctrinal cerrada.
  doctrine_reference: DOCTRINE.md § Translation philosophy (preserve theological tension rather than resolve it); consistency of key terms, or documented exception
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto inglés mantiene la lectura de alta concordancia. La versión española sigue esa decisión principal y conserva la alternativa léxica en nota para no borrar la tensión del término חַטָּאת.
  spanish_consistency_notes:
  - Se mantiene Yahvé en el proyecto general, pero este versículo no contiene el Tetragrámaton ni κύριος.
  - Se conserva la lista coordinada con 'y' para reflejar la enumeración hebrea.
  - '''Toro'' y ''campamento'' siguen el registro legal-sacrificial y son comprensibles en español bíblico moderno.'
  - Se evita 'siervo', 'purificación' como texto principal y 'SEÑOR' por coherencia con las normas del proyecto y el contexto léxico.
