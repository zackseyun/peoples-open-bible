revisions:
- from: Entonces me llevó al atrio interior de la casa de Yahvé[a]; y he aquí, a la entrada del templo de Yahvé, entre el pórtico y el altar, había como veinticinco hombres, con sus espaldas vueltas hacia el templo de Yahvé[b] y sus rostros hacia el oriente; y se postraban hacia el oriente delante del sol.
  to: Entonces me llevó al atrio interior de la casa de Yahvé; y he aquí, a la entrada del templo de Yahvé, entre el pórtico y el altar, había como veinticinco hombres, con sus espaldas hacia el templo de Yahvé y sus rostros hacia el oriente; y se postraban hacia el oriente al sol[a].
  rationale: Se corrigen las notas para que coincidan con una alternativa real y con un anclaje válido en el texto. Además, se ajusta «delante del sol» a «al sol» para reflejar mejor el objeto de la postración, en línea con el hebreo y con la decisión auditada en inglés, y se aligera la frase de orientación corporal para mayor naturalidad en español.
  reviewer_model: gpt-5.4
