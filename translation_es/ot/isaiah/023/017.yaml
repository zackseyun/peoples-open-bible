  text: וְ/הָיָ֞ה מִ/קֵּ֣ץ שִׁבְעִ֣ים שָׁנָ֗ה יִפְקֹ֤ד יְהוָה֙ אֶת צֹ֔ר וְ/שָׁבָ֖ה לְ/אֶתְנַנָּ֑/ה וְ/זָֽנְתָ֛ה אֶת כָּל מַמְלְכ֥וֹת הָ/אָ֖רֶץ עַל פְּנֵ֥י הָ/אֲדָמָֽה׀־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/023/017.yaml
  text: And it will happen at the end of seventy years that Yahweh will attend to Tyre[c][b][a], and she will return to her wages and prostitute herself with all the kingdoms of the earth on the face of the earth.
  footnotes:
  - marker: a
    text: Or 'the LORD will visit Tyre'; the Hebrew verb can also imply punitive or restorative intervention depending on context.
    reason: lexical_alternative
  - marker: b
    text: '''Her wages'' refers to the hire of a prostitute, continuing the oracle''s metaphor of Tyre as a prostitute among the nations.'
    reason: cultural_note
  - marker: c
    text: 'Or ''on the face of the earth.'' The Hebrew uses two related but distinct terms in this verse: ''earth/land'' and ''ground.'''
    reason: lexical_alternative
