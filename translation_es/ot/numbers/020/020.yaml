review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: una negativa tajante, seguida por la salida de Edom para enfrentar el avance de Israel. Sin embargo, omite un equivalente explícito de «through/atravesar» en לֹא תַעֲבֹר y sustituye «to meet him» por «a recibirlo», que en español suena demasiado acogedor y no conserva bien la neutralidad contextual del hebreo. También «con un pueblo numeroso» es menos natural y menos preciso que una expresión como «con una gran multitud» o «con una gran fuerza».'
  spanish_quality_summary: El texto es legible, pero «a recibirlo» introduce una connotación de bienvenida impropia del contexto hostil. «Con un pueblo numeroso» suena algo torpe en español bíblico natural. «Con mano fuerte» es aceptable y conserva el modismo, aunque conviene acompañarlo con nota aclaratoria, como ya se hace.
  glossary_alignment: No hay términos del glosario mayor en juego. La decisión sobre «mano fuerte» respeta bien la preferencia del proyecto por conservar la imagen hebrea cuando es inteligible. La revisión propuesta mantiene la neutralidad de לִקְרָאתוֹ con «a su encuentro» y mejora la naturalidad de בְּעַם כָּבֵד con «una gran multitud», preservando la nota sobre el literal «pueblo pesado».
  issues:
  - severity: medium
    issue: «No pasarás» no explicita del todo la idea de atravesar el territorio
    rationale: עָבַר aquí significa pasar por/atravesar la tierra de Edom. En español, «No pasarás» puede funcionar, pero «No pasarás por aquí» o «No pasarás por nuestra tierra» preservaría mejor el matiz. Dado que el contexto inmediato ya trata del paso por el territorio, «No pasarás por aquí» mejora la fidelidad sin añadir demasiada interpretación.
  - severity: high
    issue: «a recibirlo» distorsiona לִקְרָאתוֹ
    rationale: 'El hebreo es neutral: «salir al encuentro». «Recibir» en español normalmente sugiere bienvenida o acogida, lo cual contradice el contexto de rechazo. Debe cambiarse por «a su encuentro» o «a enfrentarlo»; la opción más fiel al criterio POB es «a su encuentro», con nota opcional sobre el matiz hostil.'
  - severity: medium
    issue: «con un pueblo numeroso» es poco natural y menos idiomático
    rationale: Aunque «pueblo» reproduce el literal, en español aquí no suena claro. El inglés POB optó por el sentido idiomático principal en el texto y dejó el literal en nota. Una solución como «con una gran multitud» comunica mejor la idea de un cuerpo numeroso/imponente sin forzar una lectura excesivamente militar.
  revised_spanish_text: 'Pero él dijo: «No pasarás por aquí». Entonces Edom salió a su encuentro[a] con una gran multitud[b] y con mano fuerte[c].'
  revised_footnotes:
