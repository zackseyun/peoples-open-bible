translation:
  language: es
  text: Si hay una disputa entre hombres[a], y vienen a juicio[b], y los jueces deciden entre ellos, entonces absolverán al justo y condenarán al culpable[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cuando hay una disputa entre hombres».'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «al juicio»; es decir, a procedimientos judiciales o ante el tribunal.'
    reason: lexical_alternative
  - marker: c
    text: '«Absolver» y «condenar» traducen términos de tribunal: literalmente, «declarar justo» y «declarar impío/culpable».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: En este contexto casuístico legal, el hebreo introduce una condición. «Si» reproduce mejor la fuerza condicional en español que una lectura meramente temporal, aunque «cuando» sigue siendo posible.
- source_word: יִהְיֶה
  english_pob_choice: there is
  chosen_spanish: hay
  alternatives_spanish:
  - ocurre
  - surge
  lexicon: HALOT
  rationale: 'Con רִיב, el verbo tiene valor existencial: «hay una disputa». En español, «hay» es la forma más natural y fiel para esa construcción.'
- source_word: רִיב
  english_pob_choice: dispute
  chosen_spanish: disputa
  alternatives_spanish:
  - caso
  - pleito
  - controversia
  lexicon: HALOT
  rationale: En contexto jurídico, רִיב designa una disputa o caso legal. «Disputa» es claro y no introduce un tecnicismo innecesario.
- source_word: בֵּין אֲנָשִׁים
  english_pob_choice: between men
  chosen_spanish: entre hombres
  alternatives_spanish:
  - entre personas
  - entre individuos
  lexicon: HALOT
  rationale: El hebreo usa plural masculino y, en este marco legal, se refiere a litigantes varones. Se conserva esa precisión de género como en el audit trail inglés.
- source_word: וְנִגְּשׁוּ
  english_pob_choice: and they come
  chosen_spanish: y ellos vienen
  alternatives_spanish:
  - y se acercan
  - y comparecen
  lexicon: HALOT
  rationale: El verbo significa acercarse o venir. «Vienen» mantiene la sencillez del movimiento hacia el tribunal; «comparecen» sería más interpretativo.
- source_word: אֶל הַמִּשְׁפָּט
  english_pob_choice: to court
  chosen_spanish: al juicio
  alternatives_spanish:
  - a juicio
  - ante el tribunal
  - a la corte
  lexicon: HALOT
  rationale: La expresión apunta a procedimientos judiciales, no solo a la idea abstracta de juicio. «Al juicio» conserva el campo jurídico sin forzar un equivalente institucional moderno.
- source_word: וּשְׁפָטוּם
  english_pob_choice: and the judges decide between them
  chosen_spanish: y los jueces juzgan entre ellos
  alternatives_spanish:
  - y los jueces deciden entre ellos
  - y se pronuncia juicio sobre ellos
  lexicon: HALOT
  rationale: El hebreo tiene verbo activo plural con sufijo objeto; en español se explicita el sujeto «los jueces» para que la frase sea natural. «Juzgan entre ellos» conserva la estructura relacional del hebreo.
- source_word: וְהִצְדִּיקוּ אֶת הַצַּדִּיק
  english_pob_choice: they shall acquit the righteous
  chosen_spanish: absolverán al justo
  alternatives_spanish:
  - declararán justo al justo
  - vindicarán al justo
  lexicon: HALOT
  rationale: En contexto forense, צדק en hifil expresa declarar en lo correcto, absolver/vindicar. «Absolverán» recoge la fuerza judicial de manera idiomática; «justo» mantiene el paralelo con el hebreo.
- source_word: וְהִרְשִׁיעוּ אֶת הָרָשָׁע
  english_pob_choice: and condemn the wicked
  chosen_spanish: y condenarán al impío
  alternatives_spanish:
  - y declararán culpable al culpable
  - y condenarán al malvado
  lexicon: HALOT
  rationale: El hifil de רשע en contexto legal significa declarar culpable o condenar. «Impío» sigue la opción bíblica tradicional para רָשָׁע y preserva el contraste con «justo», aunque el sentido aquí es judicial.
theological_decisions:
- issue: Sentido forense de צדק/רשע en un caso judicial
  english_pob_reading: 'Judicial declaration: ''acquit the righteous'' and ''condemn the wicked'''
  chosen_spanish_reading: 'Declaración judicial: ''absolver al justo'' y ''condenar al impío'''
  alternative_spanish_readings:
  - lectura moral sin matiz judicial
  - «declarar justo» y «declarar culpable»
  rationale: El contexto inmediato habla de litigio y juicio; por eso la pareja verbal describe veredictos judiciales, no transformación moral. Se conserva el contraste legal del hebreo y la tensión entre justo/impío sin suavizarla.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'La versión española sigue el pasaje hebreo de cerca y toma en cuenta el audit trail inglés: condición casuística con Si, valor existencial de hay, y términos forenses para צדיק/רשע. No se registraron revisiones textuales posteriores que alteren la decisión principal.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se conserva el lenguaje jurídico explícito para evitar diluir el contraste forense del hebreo.
  - «Justo» e «impío» reflejan el paralelismo bíblico; en la nota se aclara la equivalencia forense de absolver/condenar.
