  yaml_path: translation/ot/job/004/009.yaml
  text: By the breath of God they perish[c][b][a], and by the blast of his anger they come to an end.
  footnotes:
  - marker: a
    text: Or 'from the breath of God they perish.' The Hebrew preposition can be understood as source or instrument; here it is rendered instrumentally in English.
    reason: lexical_alternative
  - marker: b
    text: '''Blast'' translates Hebrew ruach, which can also mean ''wind,'' ''breath,'' or ''spirit.'' In this context the sense is a destructive outflow associated with his anger.'
    reason: lexical_alternative
  - marker: c
    text: Or 'they are consumed.'
    reason: lexical_alternative
