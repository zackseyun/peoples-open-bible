translation:
  language: es
  text: Efraín era una novilla[a] entrenada, que amaba trillar, y yo le perdoné su hermoso cuello.[b] Unciré a Efraín; Judá arará; Jacob pasará la rastra[c] para él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «becerra». El hebreo presenta un animal joven de trabajo; «novilla» busca mantener el matiz natural en español.
    reason: lexical_alternative
  - marker: b
    text: O, «pero pasé por alto su hermoso cuello». El hebreo de esta cláusula es difícil; el texto principal refleja la idea de que Efraín había sido preservado antes de una carga más pesada.
    reason: alternative_reading
  - marker: c
    text: «Pasará la rastra» se refiere al trabajo posterior al arado para deshacer y alisar el suelo; alternativamente, «desmenuzará los terrones».
    reason: cultural_note
lexical_decisions:
- source_word: עֶגְלָה מְלֻמָּדָה
  english_pob_choice: a trained heifer
  chosen_spanish: una novilla entrenada
  alternatives_spanish:
  - una becerra entrenada
  - una novilla amaestrada
  - una novilla enseñada
  lexicon: HALOT
  rationale: «Novilla» comunica mejor que «becerra» la imagen de un animal joven apto para el trabajo, y «entrenada» conserva la idea de adiestramiento/disciplinamiento sin volverlo artificioso.
- source_word: אֹהַבְתִּי לָדוּשׁ
  english_pob_choice: that loved to thresh
  chosen_spanish: que amaba trillar
  alternatives_spanish:
  - que le gustaba trillar
  - amante de trillar
  - que disfrutaba trillar
  lexicon: HALOT
  rationale: «Amaba trillar» reproduce el matiz de gusto habitual por la tarea, y «trillar» es el verbo agrícola natural en español para esta acción.
- source_word: וַאֲנִי עָבַרְתִּי עַל טוּב צַוָּארָהּ
  english_pob_choice: and I spared her fair neck
  chosen_spanish: y yo respeté su hermoso cuello
  alternatives_spanish:
  - y pasé por alto su hermoso cuello
  - y tuve consideración por su hermoso cuello
  - y perdoné su cuello hermoso
  lexicon: HALOT
  rationale: La frase hebrea es difícil e idiomática; «respeté» intenta conservar la idea de no imponer una carga más dura, sin borrar la tensión textual entre «pasar sobre/pasar por alto» y la noción de haber sido preservado.
- source_word: אַרְכִּיב אֶפְרַיִם
  english_pob_choice: I will harness Ephraim
  chosen_spanish: pondré a Efraín bajo el yugo
  alternatives_spanish:
  - aprestaré a Efraín
  - harnesaré a Efraín
  - montaré a Efraín
  lexicon: HALOT
  rationale: Aunque el verbo hebreo es literalmente «hacer montar/causar a cabalgar», el contexto agrícola exige explicitar la imagen de sujeción laboral; «bajo el yugo» conserva la fuerza disciplinaria del hebreo y mantiene la relación con el trabajo del animal.
- source_word: יַחֲרֹשׁ
  english_pob_choice: will plow
  chosen_spanish: arará
  alternatives_spanish:
  - ará
  - labrará
  lexicon: HALOT
  rationale: El futuro «arará» es claro y directo en español; conserva el sentido agrícola estándar sin exceso de paráfrasis.
- source_word: יְשַׂדֶּד
  english_pob_choice: will harrow
  chosen_spanish: hará el rastreo
  alternatives_spanish:
  - harará
  - desmenuzará los terrones
  - pasará la rastra
  lexicon: HALOT
  rationale: «Hará el rastreo» expresa en español el trabajo de rastra/rastrillado posterior al arado. Se evita un tecnicismo poco transparente y se mantiene la secuencia agrícola precisa.
- source_word: לּוֹ יַעֲקֹב
  english_pob_choice: Jacob will harrow for him
  chosen_spanish: Jacob hará el rastreo para él
  alternatives_spanish:
  - Jacob hará el rastreo para sí
  - Jacob desmenuzará los terrones para él
  - Jacob pasará la rastra para él
  lexicon: HALOT
  rationale: «Para él» preserva el sufijo pronominal sin resolverlo de modo excesivo; mantiene la ambigüedad relacional del hebreo y la correspondencia con la decisión inglesa de no forzar el referente.
theological_decisions:
- issue: Imagen de juicio agrícola sobre Efraín, Judá y Jacob
  english_pob_reading: The verse is rendered as an image of God moving Ephraim from easier work to harder imposed labor, with Judah and Jacob likewise assigned field work.
  chosen_spanish_reading: 'El versículo se entiende como una imagen de disciplina: Dios pasa de una carga suave o ya tolerada a un sometimiento más duro bajo el yugo, con Judá y Jacob igualmente incorporados al trabajo impuesto.'
  alternative_spanish_readings:
  - Puede leerse solo como descripción agrícola sin matiz punitivo.
  - Puede suavizarse como simple cuidado del cuello de Efraín sin implicar juicio.
  rationale: El contexto inmediato de Oseas 10 es de juicio y llamado implícito al arrepentimiento; por eso la imagen debe conservar su fuerza disciplinaria sin convertirla en una afirmación doctrinal ajena al texto.
  doctrine_reference: Mantener la tensión teológica del pasaje sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB: se mantuvo la conjunción coordinante en la primera mitad del versículo y se prefirió una formulación más directa para la imagen del yugo/harness. En español, la solución sigue esa línea, pero explicita la metáfora con «bajo el yugo» para que el lector capte la función disciplinaria del verbo hebreo sin perder la imagen agrícola.'
  spanish_consistency_notes:
  - Se mantiene «Efraín», «Judá» y «Jacob» como nombres propios transliterados de uso bíblico estándar en español.
  - Se usa léxico agrícola concreto y comprensible, evitando sustituir la imagen por una explicación abstracta.
  - La nota de [a] preserva la alternativa de traducción donde el hebreo es difícil.
  - La nota de [b] aclara la decisión entre una traducción literal del verbo y la explicitación del sentido contextual.
  - La nota de [c] conserva la precisión técnica del segundo laboreo sin sobrecargar el texto principal.
