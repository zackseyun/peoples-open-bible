translation:
  language: es
  text: No te alegres[a] de mí, enemiga mía; aunque he caído, me levantaré[b]. Aunque esté sentado en tinieblas, Yahvé será luz para mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «No te burles de mí, enemiga mía». El verbo hebreo significa «alegrarse/regocijarse»; «burlarse» expresa mejor el matiz hostil, pero es más interpretativo.
    reason: lexical_alternative
  - marker: b
    text: 'Los verbos perfectos hebreos aquí se usan en contexto poético para expresar una reversión confiada: literalmente, «he caído, me he levantado». Muchos traductores expresan el segundo verbo con sentido futuro: «me levantaré».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No hagas
  - Nunca
  lexicon: HALOT
  rationale: La partícula negativa funciona como prohibición; en español, «No» seguido del verbo en subjuntivo expresa con naturalidad la orden negativa.
- source_word: תִּשְׂמְחִי
  english_pob_choice: rejoice
  chosen_spanish: te alegres
  alternatives_spanish:
  - goces
  - te regocijes
  - te burles
  lexicon: HALOT
  rationale: שׂמח significa alegrarse o regocijarse. «Te alegres» conserva el sentido léxico sin intensificarlo a «burlarte», que sería más interpretativo.
- source_word: אֹיַבְתִּי
  english_pob_choice: my enemy
  chosen_spanish: enemiga mía
  alternatives_spanish:
  - mi enemiga
  - mi enemiga hostil
  - mi adversaria
  lexicon: HALOT
  rationale: El hebreo tiene forma femenina singular con sufijo de 1ª persona. «Enemiga mía» refleja la vocación directa y conserva el matiz de confrontación personal.
- source_word: לִי
  english_pob_choice: over me
  chosen_spanish: de mí
  alternatives_spanish:
  - sobre mí
  - a costa de mí
  - contra mí
  lexicon: HALOT
  rationale: Después de un verbo de regocijo, la relación es de hostilidad dirigida al hablante. En español, «de mí» con «alegrarse» transmite de manera natural la idea de alegrarse por la caída del otro.
- source_word: כִּי
  english_pob_choice: though
  chosen_spanish: aunque
  alternatives_spanish:
  - porque
  - pues
  - cuando
  lexicon: HALOT
  rationale: 'Aquí introduce una idea concesiva: el enemigo no debe alegrarse a pesar de la caída. «Aunque» reproduce mejor esa fuerza discursiva que una causal simple.'
- source_word: נָפַלְתִּי
  english_pob_choice: I have fallen
  chosen_spanish: he caído
  alternatives_spanish:
  - caí
  - he sucumbido
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una situación real presente como resultado de la caída. «He caído» suena natural en español y conserva ese valor aspectual.
- source_word: קָמְתִּי
  english_pob_choice: I will rise
  chosen_spanish: me levantaré
  alternatives_spanish:
  - me he levantado
  - me levanto
  lexicon: HALOT
  rationale: Aunque la forma es perfecta, en este paralelismo poético expresa reversión confiada y futura. «Me levantaré» comunica la restauración esperada de forma idiomática.
- source_word: אֵשֵׁב
  english_pob_choice: I sit
  chosen_spanish: me siente
  alternatives_spanish:
  - me quede
  - habite
  - permanezca
  lexicon: HALOT
  rationale: ישׁב puede significar sentarse o permanecer. Aquí la imagen concreta de «sentarse» en tinieblas se conserva en español con «me siente».
- source_word: בַּחֹשֶׁךְ
  english_pob_choice: in darkness
  chosen_spanish: en tinieblas
  alternatives_spanish:
  - en la oscuridad
  - en sombra
  - en oscuridad
  lexicon: HALOT
  rationale: «Tinieblas» es un equivalente bíblico y poético natural para חֹשֶׁךְ, manteniendo el contraste con «luz» sin sonar arcaico en exceso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el estándar español del proyecto para el Tetragrámaton: «Yahvé», preservando el nombre propio divino en vez de sustituirlo por un título.'
- source_word: אוֹר
  english_pob_choice: a light
  chosen_spanish: luz
  alternatives_spanish:
  - una luz
  - iluminación
  lexicon: HALOT
  rationale: El predicado nominal describe lo que Yahvé es para el hablante. En español, «ser luz» es una metáfora estable y clara; el artículo indefinido no es necesario en esta construcción.
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: para mí
  alternatives_spanish:
  - a mí
  - por mí
  lexicon: HALOT
  rationale: Con «ser luz», «para mí» expresa bien beneficio y relación personal. «A mí» sería menos idiomático en español contemporáneo.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Nombre divino. El proyecto español mantiene ese nombre como «Yahvé» para no ocultarlo tras un título y para conservar la referencia al pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor concesivo de כִּי en la segunda y tercera cola
  english_pob_reading: though
  chosen_spanish_reading: aunque
  alternative_spanish_readings:
  - porque
  - pues
  - cuando
  rationale: El hebreo encadena dos cláusulas concesivas que sostienen la confianza del hablante pese a la caída y la oscuridad. «Aunque» preserva mejor esa tensión que una causal simple.
  doctrine_reference: Micah 7:8 discourse force
- issue: Imagen de caída y levantamiento en perfecto hebreo
  english_pob_reading: I have fallen / I will rise
  chosen_spanish_reading: he caído / me levantaré
  alternative_spanish_readings:
  - caí / me levanté
  - he caído / me he levantado
  rationale: La combinación refleja el estado real de aflicción y la certeza de restauración. Se evita borrar la tensión poética entre lo ya ocurrido y lo esperado con confianza.
  doctrine_reference: Poetic aspect and prophetic confidence in Hebrew
translation_notes:
  revision_awareness: La revisión reciente del POB inglés no introdujo cambios; se mantiene la lectura con alta concordancia. La traducción española sigue el mismo perfil de equivalencia óptima, conservando la concesión de כִּי, la tensión aspectual de los perfectos y el Nombre divino explícito.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma española del Tetragrámaton.
  - Se preserva la voz directa femenina «enemiga mía» acorde con el hebreo.
  - «Tinieblas» se usa como equivalente bíblico natural de חֹשֶׁךְ.
  - La nota textual alternativa de «burlarse» se conserva porque el contexto hostil la hace posible, aunque no sea la primera opción.
  - La construcción «ser luz para mí» mantiene la metáfora sin añadir explicaciones no presentes en el hebreo.
