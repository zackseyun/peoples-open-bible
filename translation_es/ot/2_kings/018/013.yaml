translation:
  language: es
  text: Ahora, en el año catorce del rey Ezequías, Senaquerib, rey de Asiria, subió contra todas las ciudades fortificadas de Judá y las capturó.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּבְאַרְבַּע עֶשְׂרֵה שָׁנָה
  english_pob_choice: Now in the fourteenth year
  chosen_spanish: Ahora, en el año catorce
  alternatives_spanish:
  - Y en el año catorce
  - En el año catorce
  lexicon: HALOT
  rationale: La fórmula hebrea introduce una nueva etapa narrativa con valor temporal. «Ahora» reproduce bien el enlace discursivo del inglés POB sin perder la secuencia; «en el año catorce» comunica de forma natural la referencia regnal.
- source_word: לַמֶּלֶךְ חִזְקִיָּה
  english_pob_choice: of King Hezekiah
  chosen_spanish: de Ezequías rey
  alternatives_spanish:
  - del rey Ezequías
  - de Ezequías, el rey
  lexicon: HALOT
  rationale: El hebreo expresa un año de reinado y la relación posesiva se puede verter en español con una construcción breve. Se conserva «rey» para mantener el valor regnal explícito; el orden «Ezequías rey» evita añadir un artículo que no está en el hebreo.
- source_word: עָלָה
  english_pob_choice: came up against
  chosen_spanish: subió ... contra
  alternatives_spanish:
  - marchó contra
  - avanzó contra
  lexicon: HALOT
  rationale: El verbo hebreo mantiene el idiomático «subir» en contexto militar, con la preposición «contra» para el sentido de ataque. Esta opción conserva el movimiento ascendente del hebreo sin sonar forzado en español.
- source_word: סַנְחֵרִיב
  english_pob_choice: Sennacherib
  chosen_spanish: Senaquerib
  alternatives_spanish:
  - Sennacherib
  lexicon: transliteración estándar en español
  rationale: «Senaquerib» es la forma usual y reconocible en español bíblico. Mantiene la identidad del nombre propio sin depender de la grafía inglesa.
- source_word: מֶלֶךְ אַשּׁוּר
  english_pob_choice: king of Assyria
  chosen_spanish: rey de Asiria
  alternatives_spanish:
  - el rey de Asiria
  lexicon: HALOT
  rationale: La cadena constructa se vierte con una relación posesiva natural en español. Se conserva el título real y el nombre del reino con la forma geográfica estándar «Asiria».
- source_word: עַל כָּל עָרֵי יְהוּדָה הַבְּצֻרוֹת
  english_pob_choice: against all the fortified cities of Judah
  chosen_spanish: contra todas las ciudades fortificadas de Judá
  alternatives_spanish:
  - contra todas las ciudades defendidas de Judá
  - contra todas las ciudades fortificadas de Judá
  lexicon: HALOT
  rationale: «Ciudades fortificadas» es la equivalencia militar más directa de הַבְּצֻרוֹת. Se conserva el nombre territorial «Judá» y la preposición «contra» para el valor bélico del pasaje.
- source_word: וַיִּתְפְּשֵׂם
  english_pob_choice: and captured them
  chosen_spanish: y las capturó
  alternatives_spanish:
  - y las tomó
  - y las aprehendió
  lexicon: HALOT
  rationale: El verbo describe la toma efectiva de las ciudades en un contexto de conquista. «Las capturó» mantiene la fuerza militar del inglés POB y el referente plural femenino de «ciudades».
theological_decisions:
- issue: Referente plural de «las» en el cierre
  english_pob_reading: captured them
  chosen_spanish_reading: las capturó
  alternative_spanish_readings:
  - los capturó
  - las tomó
  rationale: El pronombre retoma «ciudades», que es femenino plural en español. Mantener «las» evita una ambigüedad de concordancia y preserva el referente territorial del hebreo.
  doctrine_reference: No aplica; decisión gramatical y referencial.
translation_notes:
  revision_awareness: Se siguió el sentido del texto hebreo y se alineó con el audit trail inglés sin depender mecánicamente de la redacción inglesa. No se detectaron variantes textuales ni decisiones doctrinales disputadas en este versículo.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general del proyecto cuando corresponda; este versículo no contiene el tetragrámaton.
  - Se prefirió «Asiria» y «Judá» como nombres geográficos normalizados en español bíblico.
  - Se mantuvo el tono narrativo sobrio y publication-readable, sin paráfrasis añadidas.
