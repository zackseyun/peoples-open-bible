translation:
  language: es
  text: Jonatán regresó con los que estaban con él[a], llevando mucho botín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «volvió ... llevando muchos despojos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: στρεψεν
  english_pob_choice: returned
  chosen_spanish: regresó
  alternatives_spanish:
  - volvió
  - dio la vuelta
  lexicon: LSJ
  rationale: En este contexto narrativo, el aoristo de στρέφω expresa un movimiento de retorno. «Regresó» comunica ese valor de manera natural en español y evita una calca demasiado literal de «giró» o «se volvió».
- source_word: σὺν τοῖς παρʼ αὐτοῦ
  english_pob_choice: with those who were with him
  chosen_spanish: con los que estaban con él
  alternatives_spanish:
  - con sus hombres
  - junto con los que iban con él
  lexicon: LSJ
  rationale: La frase griega es literal­mente «con los de a su lado / de junto a él». «Los que estaban con él» conserva la referencia al grupo acompañante sin añadir la especificación militar que el griego no dice de forma explícita.
- source_word: ἔχοντες
  english_pob_choice: carrying
  chosen_spanish: llevando
  alternatives_spanish:
  - teniendo
  - trayendo
  lexicon: LSJ
  rationale: El participio funciona como circunstancia concomitante y en español se expresa con naturalidad como «llevando» cuando el objeto es el botín material.
- source_word: σκῦλα πολλά
  english_pob_choice: much plunder
  chosen_spanish: mucho botín
  alternatives_spanish:
  - muchos despojos
  - gran cantidad de botín
  lexicon: LSJ
  rationale: σκῦλα es el botín tomado en combate. «Botín» es el equivalente más claro y digno en español moderno; «despojos» conserva más de cerca el plural, pero suena menos natural. «Mucho» refleja πολλά.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el griego de Swete y el criterio auditado de la POB inglesa: retorno de Jonathan, grupo acompañante no especificado más allá del texto, participio circunstancial y referencia a botín de guerra. No se requieren ajustes doctrinales ni variantes textuales adicionales.'
  spanish_consistency_notes:
  - Se mantiene el nombre «Jonatán» con acento gráfico en español.
  - «Botín» conserva el sentido de σκῦλα sin introducir matices ajenos.
  - La nota alternativa recoge la opción más literal «despojos» para preservar la tensión léxica del plural griego.
