translation:
  language: es
  text: Ellos juzgarán a las naciones y gobernarán a los pueblos[a], y el Señor reinará sobre ellos[b] para siempre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tendrán poder sobre» para «gobernarán a»; el verbo griego puede denotar ejercer poder o prevalecer.
    reason: lexical_alternative
  - marker: b
    text: El pronombre «ellos» puede referirse en contexto a los justos, aunque algunos pueden entenderlo más ampliamente como las naciones y los pueblos recién mencionados.
    reason: alternative_reading
  - marker: c
    text: O «por los siglos» en lugar de «para siempre»; el griego habla literalmente de perdurar a través de los siglos.
    reason: lexical_alternative
lexical_decisions:
- source_word: κρινοῦσιν
  english_pob_choice: will judge
  chosen_spanish: juzgarán
  alternatives_spanish:
  - gobernarán
  - regirán
  lexicon: BDAG
  rationale: El futuro de κρίνω aquí mantiene su sentido judicial primario. En español, «juzgarán» conserva esa fuerza, sin perder que en contexto sapiencial también puede implicar autoridad de gobierno.
- source_word: ἔθνη
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - los pueblos
  lexicon: BDAG
  rationale: «Naciones» es el equivalente más natural y no introduce un contraste judío/gentil que el griego no explicita. Además preserva la diferencia con λαῶν en la segunda mitad del verso.
- source_word: κρατήσουσι
  english_pob_choice: will rule over
  chosen_spanish: dominarán sobre
  alternatives_spanish:
  - prevalecerán sobre
  - tendrán poder sobre
  lexicon: BDAG
  rationale: κρατέω puede expresar ejercer poder o prevalecer. En paralelismo con «juzgarán», «dominarán sobre» comunica la autoridad efectiva del verbo sin volverlo demasiado interpretativo.
- source_word: λαῶν
  english_pob_choice: peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las poblaciones
  - las gentes
  lexicon: BDAG
  rationale: «Los pueblos» mantiene la distinción léxica frente a ἔθνη («naciones») y suena natural en español bíblico contemporáneo.
- source_word: βασιλεύσει
  english_pob_choice: will reign
  chosen_spanish: reinará
  alternatives_spanish:
  - será rey
  - reinará como rey
  lexicon: BDAG
  rationale: El futuro de βασιλεύω se expresa de forma directa con «reinará», que es idiomático y fiel al verbo real griego.
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  lexicon: BDAG
  rationale: 'Se conserva la terminología POB para κύριος en este contexto: «el Señor». Dado que el texto griego usa el título divino, el artículo se expresa de manera natural en español.'
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por los siglos
  - por las edades
  lexicon: BDAG
  rationale: «Para siempre» transmite con claridad la duración perpetua del modismo griego. Es una equivalencia natural en español y evita una formulación demasiado literal que sonaría menos fluida.
theological_decisions:
- issue: Referente de αὐτῶν en «reinará sobre ellos»
  english_pob_reading: The pronoun refers most naturally to the righteous described in the immediate context, though it could be heard more broadly as the nations/peoples just mentioned.
  chosen_spanish_reading: El pronombre se deja abierto como «sobre ellos», permitiendo la referencia más inmediata a los justos del contexto y, a la vez, la posible lectura más amplia de las naciones y pueblos mencionados.
  alternative_spanish_readings:
  - «sobre los justos»
  - «sobre las naciones y los pueblos»
  rationale: El contexto inmediato de Sabiduría 3 habla de los justos, pero el antecedente gramatical más cercano en el versículo incluye también a las naciones y pueblos. La traducción no resuelve la tensión y mantiene la ambigüedad del original.
  doctrine_reference: Preservar la tensión textual sin cerrarla artificialmente.
translation_notes:
  revision_awareness: 'Concordancia alta con la auditoría inglesa: se conservan las opciones léxicas principales («juzgarán», «las naciones», «dominarán sobre», «los pueblos», «reinará», «el Señor», «para siempre») y la ambigüedad del pronombre final. No hubo revisiones aplicadas en el pass más reciente del texto fuente inglés.'
  spanish_consistency_notes:
  - Se evita «Mesías» porque el verso no contiene Χριστός/משיח sino κύριος.
  - Se evita «SEÑOR» en versalitas porque el proyecto pide «Yahvé» para יהוה, pero aquí el griego es κύριος y la auditoría inglesa opta por «the Lord».
  - La pareja «naciones / pueblos» preserva la distinción del griego entre ἔθνη y λαῶν.
  - «Para siempre» mantiene la lectura idiomática de εἰς τοὺς αἰῶνας sin borrar la alternativa más literal «por los siglos».
