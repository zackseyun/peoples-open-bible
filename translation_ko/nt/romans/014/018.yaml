  lexicon: BDAG
  rationale: 앞 절(의·평화·기쁨)을 회수하는 방식적 ἐν. 「이와 같이」가 자연스럽다.
- source_word: δουλεύων τῷ Χριστῷ
  english_pob_choice: serves the Messiah
  chosen_korean: 메시아를 섬기다
