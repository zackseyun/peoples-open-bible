translation:
  language: es
  text: Y algunos de los que habían seguido se acercaron para marcar el camino[a], pero no pudieron encontrarlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «marcar la senda» o «marcar la ruta»; el griego ὁδός puede significar camino, senda o ruta según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσελθόντες
  english_pob_choice: came near
  chosen_spanish: se acercaron
  alternatives_spanish:
  - se aproximaron
  - vinieron cerca
  lexicon: LSJ
  rationale: El participio aoristo expresa movimiento hacia el lugar buscado. «Se acercaron» conserva esa dirección de manera natural en español sin añadir matices innecesarios.
- source_word: τινὲς τῶν συνακολουθούντων
  english_pob_choice: some of those who had followed
  chosen_spanish: algunos de los que habían seguido
  alternatives_spanish:
  - algunos de los acompañantes
  - algunos de los que venían siguiendo
  lexicon: LSJ
  rationale: La construcción partitiva se mantiene con claridad. «Habían seguido» refleja el participio con valor de acompañamiento previo sin convertirlo en un sustantivo interpretativo como «compañeros».
- source_word: ὥστε ἐπισημήνασθαι τὴν ὁδόν
  english_pob_choice: to mark the way
  chosen_spanish: para marcar el camino
  alternatives_spanish:
  - para marcar la senda
  - para señalar la ruta
  lexicon: LSJ
  rationale: ὥστε con infinitivo expresa propósito aquí. «Marcar el camino» conserva la imagen de señalar o dejar huella para volver a ubicar el trayecto; «camino» es idiomático en español y compatible con τὴν ὁδόν.
- source_word: οὐκ ἠδυνήθησαν
  english_pob_choice: they were not able
  chosen_spanish: no pudieron
  alternatives_spanish:
  - no fueron capaces de
  - no les fue posible
  lexicon: LSJ
  rationale: Aunque el inglés POB explicita la idea de incapacidad, en español «no pudieron» es la forma más natural y conserva el valor verbal de imposibilidad.
- source_word: εὑρεῖν
  english_pob_choice: to find it
  chosen_spanish: encontrarlo
  alternatives_spanish:
  - hallarlo
  - encontrar el camino
  lexicon: LSJ
  rationale: El infinitivo depende de ἠδυνήθησαν y el objeto está implícito por el contexto. «Encontrarlo» reproduce esa referencia anafórica de manera fluida y evita sobreespecificar.
translation_notes:
  revision_awareness: El texto griego y el audit trail en inglés presentan alta concordancia; no se observan revisiones sustantivas. Se conserva la decisión inglesa de traducir ὁδός de forma flexible, pero en español se eligió «camino» por naturalidad y amplitud semántica.
  spanish_consistency_notes:
  - Se evita «SEÑOR» o terminología litúrgica no presente en el versículo.
  - «Camino» se usa como equivalente principal de ὁδός, con nota de alternativas por la amplitud semántica del término griego.
  - El registro es sobrio y bíblico, sin arcaísmos innecesarios.
