translation:
  language: es
  text: 'Jael salió al encuentro de Sisera y le dijo[a]: «Desvíate, mi señor; desvíate hacia mí. No temas». Él se desvió hacia ella, dentro de la tienda,[b] y ella lo cubrió con una manta.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Entra, mi señor, entra hacia mí». El verbo hebreo dice literalmente «desviarse» o «apartarse del camino», conservando la imagen de abandonar la ruta para buscar refugio.'
    reason: lexical_alternative
  - marker: b
    text: El término hebreo puede también referirse a una estera, alfombra u otra tela de cobertura.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - se salió
  - salió afuera
  lexicon: BDB/HALOT
  rationale: El hebreo expresa movimiento hacia afuera; «salió» es natural en español y conserva el sentido direccional sin añadir matices innecesarios.
- source_word: לִקְרַאת
  english_pob_choice: to meet
  chosen_spanish: al encuentro de
  alternatives_spanish:
  - para encontrar
  - a encontrarse con
  lexicon: BDB/HALOT
  rationale: La construcción marca movimiento intencional hacia una persona. «Al encuentro de» mantiene esa orientación narrativa con buena fluidez en español.
- source_word: סוּרָה
  english_pob_choice: Turn aside
  chosen_spanish: desvíate
  alternatives_spanish:
  - apártate
  - vuelve aparte
  - entra
  lexicon: BDB/HALOT
  rationale: El verbo סור conserva la imagen de apartarse del camino. «Desvíate» preserva mejor esa metáfora que una traducción más interpretativa como «entra».
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - señor mío
  - mi amo
  - mi amo y señor
  lexicon: BDB/HALOT
  rationale: Es un tratamiento respetuoso para un varón socialmente superior. «Mi señor» refleja el tono deferente sin convertirlo en un título divino ni en «amo», que sería demasiado fuerte.
- source_word: אַל תִּירָא
  english_pob_choice: do not be afraid
  chosen_spanish: no temas
  alternatives_spanish:
  - no tengas miedo
  - no te asustes
  lexicon: BDB/HALOT
  rationale: La fórmula de exhortación negativa se expresa de forma concisa y natural con «no temas», manteniendo el valor imperativo del hebreo.
- source_word: וַיָּסַר
  english_pob_choice: turned aside
  chosen_spanish: se desvió
  alternatives_spanish:
  - se apartó
  - entró aparte
  - se fue hacia ella
  lexicon: BDB/HALOT
  rationale: Conviene mantener la misma raíz conceptual que en el mandato de Jael. «Se desvió» reproduce el gesto de apartarse del camino hacia su espacio.
- source_word: הָאֹהֱלָה
  english_pob_choice: into the tent
  chosen_spanish: hacia la tienda
  alternatives_spanish:
  - dentro de la tienda
  - a la tienda
  lexicon: BDB/HALOT
  rationale: El sufijo direccional sugiere movimiento hacia el interior. En español, «hacia la tienda» conserva la dirección implícita sin forzar una preposición que el hebreo no exige de manera explícita.
- source_word: וַתְּכַסֵּהוּ
  english_pob_choice: she covered him
  chosen_spanish: lo cubrió
  alternatives_spanish:
  - lo tapó
  - lo ocultó
  - lo envolvió
  lexicon: BDB/HALOT
  rationale: El núcleo léxico es simplemente «cubrir». «Lo cubrió» es la correspondencia más directa y menos interpretativa.
- source_word: בַּשְּׂמִיכָה
  english_pob_choice: with a blanket
  chosen_spanish: con una manta
  alternatives_spanish:
  - con una cobija
  - con una frazada
  - con una cubierta
  lexicon: HALOT
  rationale: שׂמיכה designa una pieza de cobertura textil; «manta» es clara, sobria y suficientemente amplia para no reducir el objeto a una sola clase moderna.
theological_decisions:
- issue: Tratamiento deferencial de אָדוֹן / אֲדֹנִי en boca de Jael
  english_pob_reading: my lord
  chosen_spanish_reading: mi señor
  alternative_spanish_readings:
  - señor mío
  - mi amo
  rationale: El contexto es cortesía hacia un varón de rango superior, no un título divino. «Mi señor» conserva la deferencia y evita trasladar una carga jerárquica o religiosa no asegurada por el texto.
  doctrine_reference: Uso de títulos honoríficos en traducción bíblica; distinción entre respeto social y lenguaje divino.
- issue: Conservación de la imagen verbal de סור / turn aside
  english_pob_reading: Turn aside
  chosen_spanish_reading: desvíate
  alternative_spanish_readings:
  - apártate
  - entra
  rationale: La escena depende de la invitación verbal a apartarse del camino. Mantener la imagen evita diluir la estrategia narrativa de Jael y respeta la repetición verbal del hebreo.
  doctrine_reference: Principio de preservación de metáfora y reiteración léxica en traducción bíblica.
translation_notes:
  revision_awareness: 'Se siguió el estado más reciente del archivo fuente: la revisión está marcada como sin cambios y el cotejo cruzado muestra alta concordancia (agree 1.0). No se requieren ajustes respecto del texto auditado en inglés, salvo su adaptación al español con mantenimiento de la metáfora de סור y de la ambigüedad del objeto de cobertura.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto solo cuando el nombre divino aparece; en este versículo no aparece explícitamente.
  - Se prefirió «mi señor» por ser un tratamiento humano de respeto, no «Señor» con mayúscula.
  - Se conservó la repetición de la raíz de «desviarse» en dos lugares para reflejar el paralelismo del hebreo.
  - «Manta» queda suficientemente abierto para cubrir la posible gama semántica de שׂמיכה sin sobrerrestringirla.
