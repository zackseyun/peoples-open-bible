translation:
  language: es
  text: porque temía a la gran multitud, y el desprecio de los clanes[a] me aterraba; así que guardé silencio y no salí por la puerta[b]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la burla de las familias». מִשְׁפָּחוֹת puede referirse a familias extensas o a grupos de parentesco más amplios; «clanes» intenta reflejar ese alcance social.'
    reason: lexical_alternative
  - marker: b
    text: 'El verso forma parte del juramento de inocencia de Job. El hebreo es elíptico; el sentido global es: «si temía la opinión pública..., así que guardé silencio y me quedé dentro».'
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - si
  lexicon: HALOT
  rationale: Aquí כִּי introduce la relación causal o explicativa del motivo temido en la secuencia del juramento de inocencia. «Porque» es la opción más natural y fiel en español para esa relación, sin forzar una lectura mecánica condicional.
- source_word: אֶעֱרוֹץ
  english_pob_choice: I feared
  chosen_spanish: temía
  alternatives_spanish:
  - dreadí
  - me aterraba
  - temblaba ante
  lexicon: HALOT
  rationale: El verbo ערץ expresa temor, pavor o estremecimiento. «Temía» conserva ese sentido con buena fluidez en español; en combinación con «me aterraba» en la segunda cola se mantiene la progresión de intensidad del verso.
- source_word: הָמוֹן רַבָּה
  english_pob_choice: the great multitude
  chosen_spanish: la gran multitud
  alternatives_spanish:
  - la gran muchedumbre
  - la gran multitud de gente
  - el gran gentío
  lexicon: HALOT
  rationale: «Multitud» preserva el sentido de הָמוֹן como masa o aglomeración social, y «gran» refleja רַבָּה. Se mantiene el matiz de presión pública que el contexto exige.
- source_word: וּבוּז מִשְׁפָּחוֹת
  english_pob_choice: and the contempt of clans
  chosen_spanish: y el desprecio de los clanes
  alternatives_spanish:
  - y el escarnio de las familias
  - y el desprecio de las familias
  - y la burla de los clanes
  lexicon: HALOT
  rationale: בּוּז es «desprecio» o «escarnio»; aquí «desprecio» conserva el tono. מִשְׁפָּחוֹת puede ser «familias» o grupos de parentesco más amplios; «clanes» refleja mejor el trasfondo social antiguo que la sola familia nuclear.
- source_word: יְחִתֵּנִי
  english_pob_choice: terrified me
  chosen_spanish: me aterraba
  alternatives_spanish:
  - me aterrorizaba
  - me atemorizaba
  - me disuadía por miedo
  lexicon: HALOT
  rationale: 'El hiphil de חתת tiene fuerza causativa: hacer temer, desanimar o quebrantar el ánimo. «Me aterraba» expresa bien esa fuerza y armoniza con el paralelismo del verso.'
- source_word: וָאֶדֹּם
  english_pob_choice: so that I kept silent
  chosen_spanish: así que guardé silencio
  alternatives_spanish:
  - y permanecí callado
  - y me quedé callado
  - así que me callé
  lexicon: HALOT
  rationale: דמם indica estar callado o en silencio. El valor secuencial/resultativo del waw se refleja bien con «así que», mostrando el efecto del temor sobre la conducta.
- source_word: לֹא אֵצֵא פָתַח
  english_pob_choice: and did not go out the door
  chosen_spanish: y no salí por la puerta
  alternatives_spanish:
  - y no salí a la puerta
  - y no salí del umbral
  - y no salí por la entrada
  lexicon: HALOT
  rationale: La combinación de salir y פתח apunta a la puerta o entrada. «Por la puerta» es idiomático en español y preserva la imagen de no salir al exterior por temor.
theological_decisions:
- issue: Estructura elíptica del juramento de inocencia en Job 31
  english_pob_reading: The verse is part of Job's oath of innocence. The wording is elliptical in Hebrew; the sense is, 'if I feared public opinion ... so that I kept silent and stayed indoors.'
  chosen_spanish_reading: El verso se traduce de modo directo, manteniendo la elipsis implícita sin expandirla en una paráfrasis explícita.
  alternative_spanish_readings:
  - si temía la opinión pública...
  - si me intimidaba el juicio de la gente...
  rationale: La fuente hebrea es elíptica y la traducción inglesa conserva esa tensión. En español conviene no desarrollar demasiado la condición subentendida; la secuencia causal/resultativa deja ver el sentido sin sobreinterpretarlo.
  doctrine_reference: Job 31:33-34; discurso de inocencia / juramento judicial
translation_notes:
  revision_awareness: Coincide con el último pase de revisión en inglés, que dejó el texto sin cambios tras un veredicto de alta concordancia. La versión española mantiene esa línea, conservando la elipsis y la progresión causal del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» en este proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - «Clanes» se emplea por consistencia con el valor social amplio de מִשְׁפָּחוֹת, evitando reducirlo a la familia nuclear.
  - Se preserva el tono sobrio y forense del contexto de juramento de Job 31.
