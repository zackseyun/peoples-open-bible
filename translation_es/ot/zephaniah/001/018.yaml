  to: Ni su plata ni su oro podrán librarlos en el día de la ira de Yahvé[a], y en el fuego de sus celos[b] será consumida toda la tierra; porque él pondrá un fin completo, sí, repentino[c], a todos los habitantes de la tierra.
  rationale: Se corrige el error gramatical 'su celos' a 'sus celos', se reemplaza el giro poco idiomático 'hará un fin completo' por 'pondrá un fin completo', y se ajustan las notas para evitar una alternativa engañosa en [a] y para reflejar mejor la ambigüedad de אֶרֶץ, en línea con el expediente del POB en inglés.
