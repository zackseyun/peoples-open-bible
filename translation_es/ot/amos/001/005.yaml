translation:
  language: es
  text: «Romperé el cerrojo de Damasco, y cortaré al habitante del Valle de Aven[a] y al que sostiene el cetro de Bet-edén[b]; y el pueblo de Aram irá al exilio a Kir», dice Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo אָוֶן puede evocar una palabra que significa «iniquidad», «mal» o «desgracia»; probablemente funciona aquí como nombre de lugar con posible juego profético de palabras.
    reason: lexical_alternative
  - marker: b
    text: Bet-edén también puede leerse literalmente «casa de Edén»; algunos la identifican históricamente con Bit-Adini.
    reason: alternative_reading
lexical_decisions:
- source_word: וְשָׁבַרְתִּי
  english_pob_choice: I will break
  chosen_spanish: Romperé
  alternatives_spanish:
  - quebraré
  - haré pedazos
  lexicon: HALOT
  rationale: El verbo hebreo expresa ruptura en sentido fuerte. 'Romperé' conserva la imagen sin sonar forzado en español, y encaja con el contexto de fortificación militar.
- source_word: בְּרִיחַ
  english_pob_choice: gate-bar
  chosen_spanish: cerrojo
  alternatives_spanish:
  - barra
  - pasador de la puerta
  lexicon: HALOT
  rationale: El término designa el elemento que asegura la puerta o portón. 'Cerrojo' comunica bien la idea de cierre defensivo en español moderno; 'barra' o 'pasador' son alternativas más literales, pero menos naturales aquí.
- source_word: דַּמֶּשֶׂק
  english_pob_choice: Damascus
  chosen_spanish: Damasco
  lexicon: HALOT
  rationale: Nombre propio geográfico estándar en español.
- source_word: וְהִכְרַתִּי
  english_pob_choice: I will cut off
  chosen_spanish: cortaré
  alternatives_spanish:
  - eliminaré
  - exterminaré
  lexicon: HALOT
  rationale: La forma hebrea conserva la metáfora de 'cortar' con sentido de remover decisivamente. 'Cortaré' preserva esa fuerza verbal sin explicitar más de lo que dice el texto.
- source_word: יוֹשֵׁב
  english_pob_choice: the inhabitant
  chosen_spanish: el habitante
  alternatives_spanish:
  - el que habita
  - el residente
  lexicon: HALOT
  rationale: Participio singular con valor colectivo o representativo. 'El habitante' es el equivalente más directo y mantiene la amplitud del referente.
- source_word: מִבִּקְעַת אָוֶן
  english_pob_choice: from the Valley of Aven
  chosen_spanish: del Valle de Aven
  alternatives_spanish:
  - de la hondonada de Aven
  - del valle de la iniquidad
  lexicon: HALOT
  rationale: El hebreo probablemente funciona como topónimo con posible juego de palabras. Se mantiene el nombre en la línea principal para no resolver prematuramente la ambigüedad; el sentido lexical alternativo queda indicado en la nota.
- source_word: וְתוֹמֵךְ שֵׁבֶט
  english_pob_choice: the one who holds the scepter
  chosen_spanish: el que sostiene el cetro
  alternatives_spanish:
  - el portador del cetro
  - el que ejerce autoridad
  lexicon: HALOT
  rationale: שֵׁבֶט puede ser vara de mando/cetro; תמך significa sostener o sujetar. 'Sostiene el cetro' preserva la imagen concreta del poder real o gubernativo.
- source_word: מִבֵּית עֶדֶן
  english_pob_choice: from Beth-eden
  chosen_spanish: de Bet-edén
  alternatives_spanish:
  - de la casa de Edén
  - de Bit-Adini
  lexicon: HALOT
  rationale: Se conserva como nombre de lugar en la forma más transparente para español. La alternativa literal 'casa de Edén' y la identificación histórica posible se reservan como opciones, no como resolución del texto principal.
- source_word: וְגָלוּ
  english_pob_choice: will go into exile
  chosen_spanish: irá al exilio
  alternatives_spanish:
  - será llevado al exilio
  - será deportado
  lexicon: HALOT
  rationale: El verbo expresa ir/caminar al exilio o ser exiliado. 'Irá al exilio' es idiomático y conserva el tema del destierro sin añadir agencia explícita.
- source_word: עַם אֲרָם
  english_pob_choice: the people of Aram
  chosen_spanish: el pueblo de Aram
  alternatives_spanish:
  - el pueblo de Siria
  lexicon: HALOT
  rationale: Se mantiene 'Aram' como etnónimo/topónimo hebreo, evitando sustituirlo por 'Siria', que es un equivalente geopolítico posterior y menos preciso para el texto bíblico.
- source_word: קִירָה
  english_pob_choice: to Kir
  chosen_spanish: a Kir
  alternatives_spanish:
  - hacia Kir
  - a Quir
  lexicon: HALOT
  rationale: La terminación direccional indica movimiento hacia el lugar. 'Kir' es la transliteración estándar; 'a' transmite la dirección en español de manera natural.
- source_word: אָמַר יְהוָה
  english_pob_choice: says Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - declara Yahvé
  - dice el Yahvé
  lexicon: HALOT
  rationale: Se adopta 'Yahvé' como decisión terminológica del proyecto para יְהוָה. 'Dice' conserva la fórmula profética en presente, fluida y fiel al hebreo.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa explícitamente el Tetragrámaton. Siguiendo el criterio del proyecto, la forma principal en español es 'Yahvé', que preserva el nombre propio del pacto en lugar de ocultarlo con un título sustituto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH → Yahvé'
- issue: Posible juego de palabras en אָוֶן
  english_pob_reading: Aven may echo 'wickedness' or 'trouble' but is likely a place name
  chosen_spanish_reading: Aven como topónimo con posible eco de 'iniquidad' o 'desgracia'
  alternative_spanish_readings:
  - valle de iniquidad
  - valle de la desgracia
  rationale: 'La línea principal conserva ''Aven'' como nombre propio, porque esa es la lectura más sobria del texto. No se borra, sin embargo, la tensión semántica documentada: el nombre puede resonar con un significado lexical despectivo.'
  doctrine_reference: Amos 1:5 lexical note; propetic wordplay on אָוֶן
- issue: Beth-eden como nombre propio o lectura transparente
  english_pob_reading: Beth-eden may also be rendered 'house of Eden'; some identify it historically with Bit-Adini
  chosen_spanish_reading: Bet-edén como nombre propio, con la lectura literal 'casa de Edén' reconocida como alternativa
  alternative_spanish_readings:
  - casa de Edén
  - Bit-Adini
  rationale: Se evita forzar una identificación histórica en el texto principal. La traducción mantiene el topónimo y deja constancia de la alternativa transparente, preservando la ambigüedad heredada del hebreo y del audit trail inglés.
  doctrine_reference: Amos 1:5 onomastic ambiguity / historical identification
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete fuente; el último pase de revisión indicó que no hacía falta cambiar nada, con acuerdo alto entre los revisores.
  spanish_consistency_notes:
  - Se conserva Yahvé para יְהוָה, conforme al criterio terminológico del proyecto.
  - Se mantiene Aram como etnónimo bíblico y no se sustituye por Siria.
  - Se usa una puntuación y un registro bíblico claros y contemporáneos, sin calco excesivo.
  - 'Los nombres propios toponímicos se mantienen transliterados de forma consistente: Damasco, Aven, Bet-edén, Kir.'
