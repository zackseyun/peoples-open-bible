translation:
  language: es
  text: Sea para él como una prenda que se envuelve[a], y como un cinturón que siempre se ciñe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Sea para él como ropa que se pone, y como una faja que continuamente se ciñe».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּהִי
  english_pob_choice: May it be
  chosen_spanish: Sea
  alternatives_spanish:
  - Que sea
  - Sea para él
  lexicon: HALOT
  rationale: El qal jussivo expresa deseo o imprecación. En español, el subjuntivo exhortativo 'Sea' comunica de forma natural esa voluntad, sin volverlo una simple predicción.
- source_word: ל֭וֹ
  english_pob_choice: for him
  chosen_spanish: para él
  alternatives_spanish:
  - a él
  - por él
  lexicon: HALOT
  rationale: La preposición con sufijo marca relación respecto de la persona maldita. 'Para él' mantiene esa referencia en español y encaja con la construcción resultante.
- source_word: כְּבֶגֶד
  english_pob_choice: like a garment
  chosen_spanish: como un vestido
  alternatives_spanish:
  - como una prenda
  - como un manto
  lexicon: HALOT
  rationale: בגד es un término general para ropa/vestidura. 'Vestido' es un equivalente claro y digno en español; 'manto' sería más específico de lo que el hebreo exige.
- source_word: יַעְטֶה
  english_pob_choice: he wraps around himself
  chosen_spanish: que se pone
  alternatives_spanish:
  - que se cubre con
  - que se envuelve con
  lexicon: HALOT
  rationale: עטה puede significar cubrirse o vestirse. En español, 'se pone' conserva la idea de colocarse una prenda de modo natural, sin perder la imagen de algo que lo envuelve.
- source_word: וּלְמֵזַח
  english_pob_choice: and like a belt
  chosen_spanish: y como un cinturón
  alternatives_spanish:
  - y como un cinto
  - y como una faja
  lexicon: HALOT
  rationale: מֵזַח designa una pieza para ceñir. 'Cinturón' es la equivalencia moderna más transparente; 'cinto' o 'faja' serían posibles pero menos neutrales para lectura pública.
- source_word: תָּמִיד
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - continuamente
  - constantemente
  lexicon: HALOT
  rationale: El adverbio expresa continuidad. 'Siempre' es la opción más natural en español y conserva la idea de permanencia habitual.
- source_word: יַחְגְּרֶהָ
  english_pob_choice: he always girds on
  chosen_spanish: se ciñe
  alternatives_spanish:
  - lo ciñe
  - se lo pone ceñido
  lexicon: HALOT
  rationale: חגר es ceñir o ajustar una prenda/cinturón. 'Se ciñe' reproduce bien el gesto de ajustarlo al cuerpo y preserva el verbo técnico del hebreo sin sonar forzado.
theological_decisions:
- issue: Fuerza imprecatoria del jussivo
  english_pob_reading: 'Render as a wish/prayer: ''May it be...'''
  chosen_spanish_reading: 'Renderizar como deseo o imprecación: ''Sea...'''
  alternative_spanish_readings:
  - Será...
  - Que sea...
  rationale: El contexto del Salmo 109 es de maldición/imprecación, no mera predicción. El subjuntivo exhortativo en español conserva mejor esa fuerza volitiva.
  doctrine_reference: 'Principio de traducción: preservar el valor ilocutivo del texto fuente sin introducir interpretación doctrinal ajena.'
translation_notes:
  revision_awareness: La redacción sigue el ajuste final del POB inglés que reemplazó una expresión más general por el verbo técnico 'girds on'. En español, 'se ciñe' mantiene ese matiz específico mejor que 'se pone' aplicado al cinturón, y conserva la imagen paralela de vestidura + ceñidura.
  spanish_consistency_notes:
  - Se mantiene 'como' en ambos miembros para conservar el paralelismo poético.
  - '''Vestido'' se usa en sentido amplio de prenda/vestidura, no como género gramatical de ropa femenina.'
  - '''Cinturón'' y ''se ciñe'' preservan el campo semántico de חגר sin recurrir a ''girda'' o arcaísmos.'
