translation:
  language: es
  text: 'Y ella llamó su nombre José[a], diciendo: «Que Yahvé me añada otro hijo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: José refleja el nombre hebreo Yosef y conserva el juego de palabras con el verbo יסף, «añadir» o «hacer aumentar».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּקְרָא
  english_pob_choice: And she called
  chosen_spanish: Y ella llamó
  alternatives_spanish:
  - Entonces llamó
  - Así llamó
  lexicon: HALOT
  rationale: El wayyiqtol introduce la acción narrativa siguiente; en español, «Y ella llamó» mantiene la secuencia y el acto de nombrar sin añadir interpretación.
- source_word: אֶת שְׁמוֹ
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - el nombre de él
  - a su nombre
  lexicon: HALOT
  rationale: La expresión hebrea es la fórmula nominal de imposición de nombre. «Su nombre» conserva esa estructura y suena natural en español.
- source_word: יוֹסֵף
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - Joséf
  lexicon: convención onomástica española
  rationale: Los nombres propios bíblicos se adaptan según la convención española establecida; «José» es la forma reconocible y estándar de Joseph.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - con estas palabras
  lexicon: HALOT
  rationale: El infinitivo quotativo introduce la explicación del nombre. «Diciendo» conserva la relación directa con la cita siguiente.
- source_word: יֹסֵף
  english_pob_choice: May ... add
  chosen_spanish: añada
  alternatives_spanish:
  - añada más
  - sume
  lexicon: HALOT
  rationale: El verbo hiphil de יסף expresa la idea de aumentar o añadir; en este contexto nominal funciona como una petición o deseo. El subjuntivo español «añada» expresa bien esa fuerza optativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La norma del proyecto para el Tetragrámaton es «Yahvé». Se preserva el nombre propio divino en lugar de sustituirlo por un título.
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - para mí
  - a mí
  lexicon: HALOT
  rationale: En español, el dativo ético o de destinatario se expresa con naturalidad mediante «me» en una petición como esta, sin perder el valor de beneficio o referencia personal.
- source_word: בֵּן אַחֵר
  english_pob_choice: another son
  chosen_spanish: otro hijo
  alternatives_spanish:
  - un hijo más
  - un hijo adicional
  lexicon: HALOT
  rationale: בֵּן es «hijo» en español bíblico natural; «otro hijo» comunica fielmente אַחֵר como ‘otro/uno más’. Mantiene el paralelo del deseo de descendencia.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se sigue la directriz del proyecto de transliterar el Nombre divino como «Yahvé», preservando el Tetragrámaton como nombre personal de Dios y no como sustituto reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza verbal del nombre/juego de palabras con יסף
  english_pob_reading: May Yahweh add to me another son.
  chosen_spanish_reading: Yahvé me añada otro hijo.
  alternative_spanish_readings:
  - Que Yahvé me añada otro hijo.
  - Yahvé me añadirá otro hijo.
  rationale: El hebreo permite una lectura desiderativa en el marco del nombre José/Joséf. El subjuntivo en español conserva mejor la petición implícita que un futuro o un indicativo.
  doctrine_reference: HALOT; contexto narrativo de Génesis 30:24
translation_notes:
  revision_awareness: El texto coincide con el sentido y la estructura del original hebreo y con el audit trail inglés. No se detectan revisiones posteriores que alteren la elección principal; se mantiene el juego de palabras entre el nombre José y el verbo «añadir» mediante la nota lexical.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del Nombre divino en todo el proyecto.
  - Se usa el nombre propio adaptado «José» según la convención española, con nota para preservar el juego etimológico.
  - La sintaxis conserva la fórmula narrativa de nombramiento sin introducir explicaciones ajenas al verso.
