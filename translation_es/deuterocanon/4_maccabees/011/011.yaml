translation:
  language: es
  text: de esta manera también[a], con su espíritu siendo constreñido y su cuerpo siendo sofocado[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su aliento siendo constreñido» para «su espíritu siendo constreñido».
    reason: lexical_alternative
  - marker: b
    text: O «siendo estrangulado» para «siendo sofocado».
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ τοῦτον τὸν τρόπον
  english_pob_choice: in this way also
  chosen_spanish: de esta manera también
  alternatives_spanish:
  - así también
  - de este modo también
  lexicon: LSJ
  rationale: La expresión griega introduce continuidad o comparación; «de esta manera también» conserva el valor conectivo de καί y suena natural en español sin sobretraducir.
- source_word: πνεῦμα
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - aliento
  - respiración
  - mente
  lexicon: LSJ
  rationale: En este contexto martirial, πνεῦμα apunta al principio interior de vida o dimensión anímica de la persona. «Espíritu» mantiene el peso antropológico sin reducirlo a «aliento» ni psicologizarlo como «mente».
- source_word: στενοχωρούμενος
  english_pob_choice: being constricted
  chosen_spanish: constriñéndose
  alternatives_spanish:
  - siendo constreñido
  - siendo oprimido
  - siendo apretado
  lexicon: LSJ
  rationale: El participio sugiere estar apretado o reducido a estrechez. «Constriñéndose» conserva la imagen concreta de presión y estrechamiento y permite la lectura de aflicción implícita.
- source_word: σῶμα
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - carne
  - persona
  lexicon: LSJ
  rationale: La referencia corporal es directa y formal; «cuerpo» es el equivalente más natural y fiel.
- source_word: ἀγχόμενος
  english_pob_choice: being choked
  chosen_spanish: siendo ahogado
  alternatives_spanish:
  - siendo estrangulado
  - siendo sofocado
  lexicon: LSJ
  rationale: El verbo apunta a constricción que lleva a la asfixia. «Siendo ahogado» conserva la imagen de sofocación continua y evita especificar más de lo que el participio exige.
theological_decisions:
- issue: Distinción antropológica entre πνεῦμα y σῶμα
  english_pob_reading: Render the pair distinctly as 'spirit' and 'body'
  chosen_spanish_reading: Traducir el par de forma distinta como «espíritu» y «cuerpo»
  alternative_spanish_readings:
  - «mente» y «cuerpo»
  - «aliento» y «cuerpo»
  rationale: El griego contrapone dimensión interior y exterior del sufrimiento. Mantener «espíritu» y «cuerpo» preserva la tensión antropológica sin resolverla doctrinalmente.
  doctrine_reference: Preservar la tensión teológica sin suavizarla.
translation_notes:
  revision_awareness: El texto inglés revisado reemplazó «hemmed in» por «constricted» para στενοχωρούμενος; la versión española sigue esa decisión con «constriñéndose», y mantiene la estructura participial y la imagen física de ἀγχόμενος con «siendo ahogado».
  spanish_consistency_notes:
  - Se conserva el paralelismo entre «espíritu» y «cuerpo» para reflejar la antropología del pasaje.
  - Se evita «SEÑOR» u այլ equivalentes porque el versículo no contiene el nombre divino.
  - «Constriñéndose» mantiene el matiz de presión/estrechez del participio griego mejor que una paráfrasis emocional.
