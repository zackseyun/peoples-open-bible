base_translation:
  language: en
  yaml_path: translation/ot/1_kings/018/026.yaml
  text: So they took the bull that had been given to them[a], prepared it, and called on the name of Baal from morning until noon, saying, “O Baal, answer us!” But there was no voice, and no one answered. And they limped around the altar that had been made.
  footnotes:
  - marker: a
    text: Or “they danced around” or “they leaped around the altar.” The Hebrew verb likely denotes a limping or hopping ritual movement and may intentionally echo Elijah’s later use of the same root in verse 21.
    reason: lexical_alternative
