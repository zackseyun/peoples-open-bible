base_translation:
  language: en
  yaml_path: translation/ot/ecclesiastes/002/021.yaml
  text: For there is a man whose labor is with wisdom and with knowledge and with skill[a], yet he must give his portion to a man who has not labored in it[b]. This also is vapor and a great evil.
  footnotes:
  - marker: a
    text: Or 'his toil.' The Hebrew עָמָל often carries the sense of wearisome toil in Ecclesiastes.
    reason: lexical_alternative
  - marker: b
    text: Or 'This too is vanity.' Traditional English versions often render הֶבֶל as 'vanity'; the translation 'vapor' preserves the Hebrew image of something fleeting and insubstantial.
    reason: lexical_alternative
