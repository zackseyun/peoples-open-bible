translation:
  language: es
  text: Ella también, cuando las naciones fueron arrojadas a la confusión en su conspiración malvada[a], halló al justo[b], y lo mantuvo irreprochable delante de Dios, y lo mantuvo fuerte frente a su compasión por su hijo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en malvada unanimidad» o «en mala concordia». La expresión describe el propósito común y perverso de las naciones.
    reason: lexical_alternative
  - marker: b
    text: «El justo» probablemente se refiere a Abraham en el contexto, pero el griego no lo nombra aquí.
    reason: cross_reference
  - marker: c
    text: O «frente a su tierno afecto por su hijo». El griego habla de afectos internos o compasión por un hijo.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὕτη
  english_pob_choice: She
  chosen_spanish: Ella
  alternatives_spanish:
  - Esta
  - Esa
  lexicon: LSJ
  rationale: El demostrativo femenino se refiere a la Sabiduría personificada en el contexto inmediato. En español, "Ella" conserva con naturalidad esa referencia personal sin repetir el antecedente.
- source_word: ἐν ὁμονοίᾳ πονηρίᾳ
  english_pob_choice: in their wicked conspiracy
  chosen_spanish: en su conspiración malvada
  alternatives_spanish:
  - en su acuerdo perverso
  - en su malvada unanimidad
  - en su malvada concordia
  lexicon: LSJ
  rationale: ὁμονοία expresa unidad de mente o concordia; con πονηρίᾳ describe una unidad orientada al mal. "Conspiración malvada" comunica bien el carácter común y el propósito perverso del grupo en español natural, sin borrar la fuerza colectiva del griego.
- source_word: ἐθνῶν συγχυθέντων
  english_pob_choice: when the nations were thrown into confusion
  chosen_spanish: cuando las naciones fueron confundidas
  alternatives_spanish:
  - cuando las naciones fueron puestas en confusión
  - en medio de la confusión de las naciones
  - cuando las naciones fueron trastornadas
  lexicon: LSJ
  rationale: El participio en genitivo absoluto marca circunstancia. συγχέω aquí sugiere confusión, desorden o turbación. "Fueron confundidas" es breve y fiel, y mantiene la posible alusión a Babel sin explicitarla de más.
- source_word: εὗρεν τὸν δίκαιον
  english_pob_choice: found the righteous man
  chosen_spanish: halló al justo
  alternatives_spanish:
  - halló al hombre justo
  - halló al justo varón
  - encontró al justo
  lexicon: LSJ
  rationale: δίκαιος funciona sustantivamente. "El justo" preserva esa fuerza nominal y suena más fluido en español que una perífrasis más pesada.
- source_word: ἐτήρησεν αὐτὸν ἄμεμπτον θεῷ
  english_pob_choice: kept him blameless before God
  chosen_spanish: lo mantuvo irreprochable delante de Dios
  alternatives_spanish:
  - lo preservó irreprochable ante Dios
  - lo guardó sin mancha delante de Dios
  - lo mantuvo sin culpa delante de Dios
  lexicon: LSJ
  rationale: τηρέω se traduce aquí como mantener/guardar/preservar. ἄμεμπτος se expresa bien con "irreprochable" en registro bíblico cuidadoso. El dativo θεῷ se vierte relacionalmente como "delante de Dios", evitando forzar una formulación menos natural en español.
- source_word: ἐπὶ τέκνου σπλάγχνοις
  english_pob_choice: against his compassion for his child
  chosen_spanish: frente a su compasión por su hijo
  alternatives_spanish:
  - frente a su tierno afecto por su hijo
  - contra sus entrañas por su hijo
  - ante su compasión por su hijo
  lexicon: LSJ
  rationale: σπλάγχνα suele denotar afectos internos, ternura o compasión. En este contexto la lectura auditada entiende la tensión emocional del padre. "Frente a" conserva la idea de resistencia o firmeza sin convertir el texto en una explicación interpretativa excesiva.
- source_word: ἰσχυρὸν ἐφύλαξεν
  english_pob_choice: kept him strong
  chosen_spanish: lo mantuvo fuerte
  alternatives_spanish:
  - lo preservó firme
  - lo guardó fuerte
  - lo sostuvo fuerte
  lexicon: LSJ
  rationale: φυλάσσω es guardar/velar por; ἰσχυρός funciona predicativamente. "Lo mantuvo fuerte" conserva tanto protección como firmeza interior en un español claro.
theological_decisions:
- issue: Identificación del justo
  english_pob_reading: The phrase is rendered generically as 'the righteous man' without naming Abraham in the main text.
  chosen_spanish_reading: La frase se vierte como 'el justo' sin nombrar a Abraham en el texto principal.
  alternative_spanish_readings:
  - Abraham
  - el hombre justo
  rationale: El contexto literario apunta a Abraham, pero el griego no lo nombra. Para respetar la primacía del texto fuente, se mantiene la designación descriptiva y se deja la identificación contextual implícita.
  doctrine_reference: Primacía del texto original; no introducir más identificación de la que el griego afirma explícitamente.
- issue: Sentido de la cláusula final respecto al hijo
  english_pob_reading: The clause is rendered as Wisdom keeping him strong against his compassion for his child.
  chosen_spanish_reading: La cláusula se vierte como que Sabiduría lo mantuvo fuerte frente a su compasión por su hijo.
  alternative_spanish_readings:
  - lo mantuvo firme a pesar de su tierno afecto por su hijo
  - lo preservó fuerte en lo relativo a su hijo
  rationale: El texto evoca una prueba de obediencia con fuerte tensión afectiva, sin describirla de manera totalmente explícita. La traducción conserva esa tensión sin resolverla ni especificarla más allá del griego.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla artificialmente.
translation_notes:
  revision_awareness: El texto español sigue la lectura revisada más reciente del audit trail inglés, especialmente la decisión de renderizar ὁμονοίᾳ πονηρίᾳ como una unidad colectiva malvada natural en contexto. Se ha evitado mecanizar el inglés y se ha atendido directamente al griego de Swete 1909, manteniendo la tensión entre el reconocimiento contextual de Abraham y la referencia nominal genérica del texto.
  spanish_consistency_notes:
  - Se mantiene 'Sabiduría' implícita mediante el pronombre femenino 'Ella', coherente con la personificación previa.
  - Se usa 'el justo' como sustantivo, en paralelo con el griego τὸν δίκαιον.
  - '''Delante de Dios'' conserva la relación del dativo θεῷ sin sobrecargar el español.'
  - '''Lo mantuvo fuerte'' traduce el valor predicativo de ἰσχυρόν sin añadir explicación doctrinal.'
  - La puntuación y el registro son aptos para lectura pública e impresión.
