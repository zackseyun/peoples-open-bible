translation:
  language: es
  text: De él saldrá la piedra angular, de él la estaca de la tienda, de él el arco de guerra[a]; de él saldrá todo gobernante[b], juntos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Piedra angular», «estaca de la tienda» y «arco de guerra» son imágenes metafóricas de estabilidad, apoyo y fuerza militar que brotan de Judá.
    reason: cultural_note
  - marker: b
    text: O «todo opresor» o «todo capataz». El término hebreo puede denotar a quien presiona o exige trabajo o tributo, pero aquí también puede referirse más ampliamente a un gobernante que surge de Judá.
    reason: alternative_reading
lexical_decisions:
- source_word: מִמֶּנּוּ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - de él
  - de ello
  - de ellos
  lexicon: HALOT
  rationale: El sufijo pronominal es singular masculino en la forma hebrea; el español conserva esa singularidad con «de él». Dado el contexto restaurador y colectivo del pasaje, esta forma puede referirse al sujeto representativo anunciado en el entorno literario, sin forzar el plural.
- source_word: פִנָּה
  english_pob_choice: cornerstone
  chosen_spanish: la piedra angular
  alternatives_spanish:
  - la piedra de esquina
  - la piedra principal
  - la piedra angular principal
  lexicon: HALOT
  rationale: El sustantivo puede significar esquina o piedra angular. En una cadena de imágenes de estabilidad y fuerza, «piedra angular» comunica mejor el valor metafórico de fundamento y sostén sin añadir más de lo que exige el hebreo.
- source_word: יָתֵד
  english_pob_choice: tent peg
  chosen_spanish: la estaca de la tienda
  alternatives_spanish:
  - la estaca
  - el clavo
  - el poste
  lexicon: HALOT
  rationale: יַתֵד designa una clavija o estaca, con frecuencia la de una tienda. «Estaca de la tienda» preserva la imagen concreta y la función de firmeza y apoyo, evitando el falso matiz arquitectónico de «clavo».
- source_word: קֶשֶׁת מִלְחָמָה
  english_pob_choice: the battle bow
  chosen_spanish: el arco de guerra
  alternatives_spanish:
  - el arco de batalla
  - el arco guerrero
  - el arco para la guerra
  lexicon: HALOT
  rationale: La construcción nominal indica un arco usado para la guerra. «Arco de guerra» es natural en español y mantiene el sentido militar sin expandir la imagen.
- source_word: יֵצֵא
  english_pob_choice: will go out
  chosen_spanish: saldrá
  alternatives_spanish:
  - saldrá
  - saldrá adelante
  - vendrá
  lexicon: HALOT
  rationale: יצא significa básicamente «salir». «Saldrá» conserva el movimiento verbal simple del hebreo y evita una elevación interpretativa innecesaria.
- source_word: כָל נוֹגֵשׂ
  english_pob_choice: every ruler
  chosen_spanish: todo gobernante
  alternatives_spanish:
  - todo opresor
  - todo recaudador
  - todo taskmaster
  - todo comandante
  lexicon: HALOT
  rationale: Aunque נֹגֵשׂ puede tener sentidos más duros como opresor o capataz, en este contexto de imágenes positivas de fortaleza y gobierno conviene la lectura de autoridad. «Todo gobernante» preserva el campo semántico sin imponer una carga negativa no asegurada por el contexto inmediato.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntamente
  alternatives_spanish:
  - juntamente
  - a una
  - en conjunto
  lexicon: HALOT
  rationale: El adverbio expresa colectividad. «Juntamente» suena natural y solemne en español bíblico contemporáneo, y mantiene abierta la precisión del vínculo entre los gobernantes o figuras mencionadas.
theological_decisions:
- issue: Valor de כָל נוֹגֵשׂ en un contexto de restauración
  english_pob_reading: 'positive/neutral leadership sense: ''every ruler'''
  chosen_spanish_reading: 'sentido positivo/neutral de autoridad: «todo gobernante»'
  alternative_spanish_readings:
  - 'sentido negativo: «todo opresor»'
  - 'sentido administrativo: «todo capataz»'
  - 'sentido militar: «todo comandante»'
  rationale: El versículo encadena imágenes de solidez, apoyo y fuerza militar procedentes de Judá. Traducir נֹגֵשׂ como «opresor» introduciría una nota negativa discordante sin señal suficiente en el contexto inmediato. Se conserva la ambigüedad semántica en las alternativas para no borrar la tensión léxica del hebreo.
  doctrine_reference: Preservar la tensión textual y registrar alternativas cuando el término puede oscilar entre autoridad y opresión.
translation_notes:
  revision_awareness: El pasaje presenta un alto acuerdo textual con revisiones previas y no requiere cambios sustanciales. Se mantuvo la decisión contextual de leer נֹגֵשׂ en sentido de autoridad positiva/neutral, y se conservó la imaginería metafórica del hebreo sin diluirla.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo exija; en este versículo no aparece.
  - Se mantuvo la equivalencia singular de los sufijos pronominales con «de él».
  - Se prefirió «piedra angular» frente a formulaciones eclesiásticas más técnicas para respetar la metáfora hebrea.
  - Se evitó «siervo» y otras soluciones no pertinentes al léxico de este versículo.
  - «Juntamente» se eligió por su tono bíblico y su claridad sintáctica en español.
  - La puntuación conserva la serie de imágenes y el cierre adverbial sin sobreinterpretación.
