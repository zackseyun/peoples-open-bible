revisions:
- from: Entonces el ángel de Yahvé vino y se sentó debajo de la encina[a] que estaba en Ofra, la cual pertenecía a Joás, padre del abiezerita[b]; y Gedeón, su hijo, estaba golpeando trigo[c] en el lagar para esconderlo de Madián.
  to: Entonces el ángel de Yahvé vino y se sentó debajo de la encina[a] que estaba en Ofra, la cual pertenecía a Joás el abiezerita[b], mientras Gedeón, su hijo, estaba golpeando trigo[c] en el lagar para esconderlo de Madián.
