review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo: עִמּוֹ = «Con él», los gentilicios colectivos = «los rubenitas y los gaditas», נַחֲלָתָם = «su herencia», y conserva correctamente «Yahvé». También mantiene la nota cultural sobre «al otro lado del Jordán…». Sin embargo, la cláusula final «tal como Moisés, siervo de Yahvé, les dio» omite explícitamente el objeto ya implícito en español y suena incompleta; además, conviene mantener una sintaxis más fluida sin perder la repetición enfática del hebreo.'
  spanish_quality_summary: 'El español es claro y digno, pero la frase final resulta poco natural y ligeramente abrupta. Una reparación mínima mejora la legibilidad: «tal como se la dio Moisés, siervo de Yahvé». Esto conserva la referencia a la herencia y evita una construcción truncada.'
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: «Yahvé» para יהוה y «siervo» para עֶבֶד en el título honorífico de Moisés. «Herencia» preserva bien נחלה. No hay conflicto relevante con el glosario, salvo la necesidad de pulir la sintaxis final.'
  issues:
  - severity: medium
    issue: 'Cláusula final española suena incompleta: «tal como Moisés, siervo de Yahvé, les dio».'
    rationale: Aunque el hebreo repite simplemente «les dio», en español esa repetición sin objeto explícito queda forzada y menos idiomática. Añadir «se la» aclara que se trata de la herencia ya mencionada sin alterar el sentido.
  revised_spanish_text: Con él[a], los rubenitas y los gaditas recibieron su herencia, que Moisés les dio al otro lado del Jordán, hacia el oriente, tal como se la dio Moisés, siervo de Yahvé.
