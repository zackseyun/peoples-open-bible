translation:
  language: es
  text: Porque la ira del hombre[a] te alabará; con el resto de la ira te ceñirás[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hombre» aquí significa la humanidad en general.
    reason: lexical_alternative
  - marker: b
    text: O, «el resto de la ira lo refrenarás». El hebreo de la cláusula final es difícil; el texto principal sigue más de cerca la redacción masorética y conserva su metáfora.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque
  lexicon: HALOT
  rationale: Introduce la base o explicación de lo dicho antes; «porque» preserva bien la fuerza causal/explanatoria y suena natural en español bíblico contemporáneo.
- source_word: חֲמַת אָדָם
  english_pob_choice: the wrath of man
  chosen_spanish: la ira del hombre
  alternatives_spanish:
  - la ira humana
  - el furor del hombre
  - la ira de la humanidad
  lexicon: HALOT
  rationale: חֵמָה expresa ira/ardor/rabia; «ira» comunica con claridad el registro poético. אָדָם aquí es genérico, y «del hombre» mantiene la construcción singular y la lectura de humanidad general sin volverlo abstracto en exceso.
- source_word: תּוֹדֶךָּ
  english_pob_choice: will praise you
  chosen_spanish: te alabará
  alternatives_spanish:
  - te dará gracias
  - te reconocerá
  - te confesará
  lexicon: HALOT
  rationale: El hifil de ידה puede significar dar gracias o alabar; en este contexto poético el resultado de la ira humana es que termina redundando en alabanza a Dios. «Alabará» es más idiomático en español y conserva esa fuerza.
- source_word: שְׁאֵרִית
  english_pob_choice: the remnant
  chosen_spanish: el resto
  alternatives_spanish:
  - el remanente
  - lo que queda
  - el residuo
  lexicon: HALOT
  rationale: El sustantivo designa lo que queda o permanece. «El resto» es natural en español y mantiene la imagen de lo sobrante; «remanente» sería posible, pero suena más técnico o eclesial.
- source_word: חֵמֹת
  english_pob_choice: wrath
  chosen_spanish: las iras
  alternatives_spanish:
  - la ira
  - los ardores
  - los furores
  lexicon: HALOT
  rationale: Aunque el hebreo está en plural, en español puede reflejarse con plural para no suavizar el dato morfológico. Aquí se conserva la pluralidad de la imagen con «iras», sin forzar un singular masivo.
- source_word: תַּחְגֹּר
  english_pob_choice: you will gird yourself
  chosen_spanish: te ceñirás
  alternatives_spanish:
  - te ceñirás con
  - te ajustarás
  - te armarás con
  lexicon: HALOT
  rationale: חגר significa ceñir o ajustarse una prenda/arma. «Te ceñirás» preserva el verbo metafórico sin decidir demasiado entre vestirse, rodearse o armarse con lo restante; así se mantiene la tensión del hebreo.
theological_decisions:
- issue: Sentido del sujeto y del final de la cláusula קשה/ambigua
  english_pob_reading: God is the subject of the verb and metaphorically 'girds himself' with the remaining wrath.
  chosen_spanish_reading: 'Dios es el sujeto implícito del verbo: la ira restante no se resuelve en una paráfrasis de restricción, sino que se conserva la metáfora de ceñirse.'
  alternative_spanish_readings:
  - con el resto de la ira te la refrenarás
  - con el resto de las iras la restringirás
  - con el remanente de ira te ceñirás
  rationale: La forma verbal de segunda persona singular favorece entender a Dios como sujeto. Dado que el hebreo es difícil, la traducción española conserva la imagen de ceñirse en vez de explicar el verso como simple restricción; esto preserva la tensión textual documentada en el audit trail.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla por paráfrasis.'
translation_notes:
  revision_awareness: El borrador sigue el texto masorético y la lectura auditable del POB en inglés, manteniendo el paralelismo y la metáfora final difícil sin emendarla ni resolverla interpretativamente. No se aplicaron revisiones adicionales.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito por el pronombre verbal de segunda persona, acorde con la lectura del POB en inglés.
  - Se conserva «ira» en lugar de un término eclesial más suave como «furor» o «enojo» para reflejar mejor חֵמָה.
  - Se usa «ceñir» para reproducir el hebreo חגר con una metáfora reconocible en español bíblico.
  - La pluralidad de חֵמֹת se refleja con «iras» para no borrar el matiz morfológico del original.
