revisions:
- from: Yahvé te entregará derrotado[a] delante de tus enemigos. Saldrás contra ellos por un camino, y por siete caminos huirás delante de ellos; y serás horror para todos los reinos de la tierra.
  to: Yahvé te entregará como derrotado delante de tus enemigos. Saldrás contra ellos por un camino, y por siete caminos huirás delante de ellos; y serás horror[a] para todos los reinos de la tierra.
  rationale: Se corrigió el anclaje de la nota para que corresponda a ‘horror’, que es el término hebreo comentado en la evidencia y en el POB en inglés. Además, se hizo una leve mejora de naturalidad en ‘te entregará como derrotado’, que expresa mejor la idea de ser entregado a una condición de derrota.
  reviewer_model: gpt-5.4
