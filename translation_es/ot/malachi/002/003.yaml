source:
  edition: WLC
  text: הִנְ/נִ֨י גֹעֵ֤ר לָ/כֶם֙ אֶת הַ/זֶּ֔רַע וְ/זֵרִ֤יתִי פֶ֨רֶשׁ֙ עַל פְּנֵי/כֶ֔ם פֶּ֖רֶשׁ חַגֵּי/כֶ֑ם וְ/נָשָׂ֥א אֶתְ/כֶ֖ם אֵלָֽי/ו־־׃
base_translation:
  language: en
  yaml_path: translation/ot/malachi/002/003.yaml
  text: Look[a], I am rebuking your seed[c][b], and I will spread dung on your faces—the dung of your festivals—and you will be carried away with it.
  footnotes:
  - marker: a
    text: Or 'your seed'; some take this as a reference to grain or crops rather than offspring.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'the dung of your festivals'; this likely refers to the refuse from animals offered at the festivals.
    reason: lexical_alternative
  - marker: c
    text: The final clause is difficult. It likely means that the priests will be removed along with the dung/offal to an unclean place.
    reason: alternative_reading
