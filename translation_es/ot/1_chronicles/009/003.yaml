revisions:
- from: Y en Jerusalén habitaban algunos de los hijos de Judá[a], y algunos de los hijos de Benjamín, y algunos de los hijos de Efraín y de Manasés.
  to: Y en Jerusalén habitaban allí algunos de los hijos de Judá[a], y algunos de los hijos de Benjamín, y algunos de los hijos de Efraín y Manasés.
  rationale: Se añade «allí» para dar un cierre idiomático natural en español y reflejar la explicitación de residencia ya documentada en el English POB («lived there»), sin alterar el sentido del hebreo. Se mantiene «hijos de» para preservar el idiomatismo tribal de Crónicas y se conserva la nota léxica con redacción pulida.
