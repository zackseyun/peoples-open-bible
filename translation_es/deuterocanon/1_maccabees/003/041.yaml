  yaml_path: translation/deuterocanon/1_maccabees/003/041.yaml
  text: And the merchants of the land heard their fame[a], and they took a great amount of silver and gold, and fetters, and came into the camp to take the sons of Israel as slaves[c][b]. And forces from Syria and from the land of foreigners were added to them.
  footnotes:
