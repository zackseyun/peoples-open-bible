  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Ayuno», «maldad», «yugo», «oprímidos/libres» encajan bien. La principal cuestión es de precisión léxica contextual: חַרְצֻבּוֹת se representó en la auditoría inglesa final con un término más amplio que «chains»; en español, «ataduras» preserva mejor esa amplitud, mientras que «cadenas» puede quedar como alternativa en nota.'
