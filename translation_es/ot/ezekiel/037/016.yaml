base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/037/016.yaml
  text: And you[a], son of man, take for yourself one stick and write on it, ‘For Judah and for the sons of Israel, his companions.’ Then take one stick and write on it, ‘For Joseph, the stick of Ephraim, and all the house of Israel[c][b], his companions.’
  footnotes:
  - marker: a
    text: Or 'the children of Israel.' The Hebrew is literally 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his associates,' 'those joined with him,' or 'his allies.'
    reason: lexical_alternative
  - marker: c
    text: '''Stick'' could also be rendered ''piece of wood'' or, more interpretively, ''wooden tablet.'''
    reason: lexical_alternative
