translation:
  language: es
  text: Entonces escojan[a] al mejor y más recto de entre los hijos de su señor, pónganlo en el trono de su padre, y luchen por la casa de su señor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «miren / consideren al bueno y recto entre los hijos de su señor». El verbo hebreo significa literalmente «ver», pero aquí implica seleccionar tras examinar.'
    reason: lexical_alternative
  - marker: b
    text: Aquí «casa» significa la casa real o dinastía, no solo un edificio.
    reason: cultural_note
lexical_decisions:
- source_word: וּרְאִיתֶם
  english_pob_choice: choose
  chosen_spanish: escoge
  alternatives_spanish:
  - ve
  - mira
  - elige
  - considera
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'y veréis', pero en este contexto funciona como una instrucción para examinar y seleccionar después de considerar. 'Escoge' comunica de forma natural esa acción de selección sin perder el valor inferido del verbo.
- source_word: הַטּוֹב וְהַיָּשָׁר
  english_pob_choice: the best and most upright
  chosen_spanish: el mejor y más recto
  alternatives_spanish:
  - el bueno y recto
  - el bueno y el justo
  - el más bueno y recto
  lexicon: HALOT
  rationale: La pareja de adjetivos describe al candidato más apto y moralmente recto. En español, 'el mejor y más recto' conserva la fuerza evaluativa y la cualidad ética sin sonar forzado.
- source_word: מִבְּנֵי אֲדֹנֵיכֶם
  english_pob_choice: of your master's sons
  chosen_spanish: de los hijos de tu señor
  alternatives_spanish:
  - de entre los hijos de tu señor
  - de los hijos de tu amo
  - de entre los hijos de tu amo
  lexicon: HALOT
  rationale: Aquí אֲדֹנֵיכֶם se refiere a un superior humano en el relato, no a Dios; por eso 'señor' expresa la relación de dominio sin introducir el título divino. 'Hijos de tu señor' refleja el genitivo de pertenencia y mantiene la referencia dinástica.
- source_word: וְשַׂמְתֶּם עַל כִּסֵּא אָבִיו
  english_pob_choice: set him on his father's throne
  chosen_spanish: ponlo en el trono de su padre
  alternatives_spanish:
  - colócalo en el trono de su padre
  - siéntalo en el trono de su padre
  - ponedlo sobre el trono de su padre
  lexicon: HALOT
  rationale: El hebreo usa una expresión idiomática de entronización. 'Ponlo en el trono de su padre' es claro en español y conserva la imagen real y sucesoria sin añadir explicación interpretativa innecesaria.
- source_word: וְהִלָּחֲמ֖וּ עַל בֵּ֥ית אֲדֹנֵיכֶם
  english_pob_choice: fight for your master's house
  chosen_spanish: pelea por la casa de tu señor
  alternatives_spanish:
  - pelead por la casa de vuestro señor
  - luchad por la casa de vuestro señor
  - pelea por la dinastía de tu señor
  lexicon: HALOT
  rationale: '''Casa'' conserva el sentido dinástico del hebreo, como en la POB inglesa. ''Pelea por la casa de tu señor'' mantiene la imagen textual y evita sustituirla por una paráfrasis más explicativa que la fuente no exige.'
theological_decisions:
- issue: Renderización de אֲדֹנֵיכֶם en un contexto humano
  english_pob_reading: master
  chosen_spanish_reading: señor
  alternative_spanish_readings:
  - amo
  - dueño
  - Señor
  rationale: Aunque la POB inglesa usa 'master' para distinguir un referente humano del título divino, en español 'señor' es el equivalente más natural y respetuoso para un superior real en este contexto. Se evita 'Señor' con mayúscula para no sugerir el nombre divino, y 'amo' sonaría más duro o servil que el tono narrativo pide.
  doctrine_reference: 'DOCTRINE.md: distinción de títulos divinos y humanos; el referente no es Yahvé, sino un rey humano.'
translation_notes:
  revision_awareness: 'Se siguió de cerca el texto hebreo y el audito inglés: el verbo de ''ver'' se tradujo con un valor de selección, se mantuvo la pareja adjetival evaluativa, se preservó el sentido dinástico de ''casa'' y se evitó capitalizar ''Señor'' para no confundir al referente humano con el título divino. No hubo revisiones aplicadas en el pase inglés, y el verificador cruzado mostró alto acuerdo.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico natural y moderno, sin arcaísmos innecesarios.
  - '''Casa'' se usa en sentido dinástico, coherente con la POB inglesa.'
  - No se introduce 'Cristo', 'SEÑOR' ni otros sustitutos no sustentados por el hebreo en este versículo.
  - La elección de singular ('escoge', 'ponlo', 'pelea') sigue el sentido del mandato dirigido al grupo para actuar sobre un candidato singular.
