translation:
  language: es
  text: Lo persuadió[a] de que llegara a un arreglo sobre todas las reclamaciones justas, y de que también persuadiría al rey, obligándolo a hacerse amigo de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «llegara a un acuerdo», «se reconciliara» o «hiciera un arreglo»; el griego συλλύεσθαι es una expresión condensada y puede entenderse como alcanzar una acomodación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔπεισεν
  english_pob_choice: He persuaded
  chosen_spanish: Lo persuadió
  alternatives_spanish:
  - Lo convenció
  - Lo ganó para su causa
  lexicon: LSJ
  rationale: πείθω en aoristo aquí expresa persuasión efectiva; «lo persuadió» es natural en español y conserva la iniciativa personal del sujeto sin añadir matices ajenos.
- source_word: συλλύεσθαι
  english_pob_choice: to come to terms
  chosen_spanish: llegara a un arreglo
  alternatives_spanish:
  - se reconciliara
  - hiciera una negociación
  - llegara a un acuerdo
  lexicon: LSJ
  rationale: El infinitivo medio en este contexto diplomático apunta a una acomodación o arreglo; «llegara a un arreglo» comunica bien la idea de transacción política sin forzar un giro eclesiástico o moral.
- source_word: ἐπὶ πᾶσι τοῖς δικαίοις
  english_pob_choice: on all the just demands
  chosen_spanish: sobre todas las demandas justas
  alternatives_spanish:
  - respecto de todos los asuntos justos
  - sobre todas las reclamaciones justas
  - en cuanto a todas las exigencias justas
  lexicon: LSJ
  rationale: τὰ δίκαια en un marco de negociación denota lo justo o debido; «demandas justas» mantiene el carácter concreto de las pretensiones en disputa.
- source_word: διότι καὶ τὸν βασιλέα πείσει
  english_pob_choice: that he would also persuade the king
  chosen_spanish: y también para que persuadiera al rey
  alternatives_spanish:
  - y que también persuadiría al rey
  - y que además convencería al rey
  lexicon: LSJ
  rationale: διότι aquí introduce el contenido complementario de la persuasión, no una simple causalidad; por eso se refleja con una estructura de propósito/contenido en español, manteniendo el valor futuro de πείσει mediante el subjuntivo en discurso indirecto.
- source_word: φίλον αὐτοῖς
  english_pob_choice: their friend
  chosen_spanish: hacerse amigo de ellos
  alternatives_spanish:
  - serles amigo
  - volverse su amigo
  - ser favorable a ellos
  lexicon: LSJ
  rationale: La construcción predicativa con γενέσθαι expresa llegar a ser amigo/favorable; «hacerse amigo de ellos» es idiomático y conserva la relación personal y política.
- source_word: ἀναγκάζων γενέσθαι
  english_pob_choice: compelling him to become
  chosen_spanish: obligándolo a hacerse
  alternatives_spanish:
  - forzándolo a ser
  - presionándolo para que se hiciera
  lexicon: LSJ
  rationale: ἀναγκάζω denota coacción; «obligándolo» conserva la fuerza del verbo sin sobrerretraducir con violencia física explícita.
theological_decisions:
- issue: τοῖς δικαίοις en contexto político-legal
  english_pob_reading: just demands
  chosen_spanish_reading: demandas justas
  alternative_spanish_readings:
  - asuntos justos
  - reclamaciones justas
  - derechos justos
  rationale: No se trata de justicia como virtud teológica, sino de lo que es justo o debido en una negociación. «Demandas justas» evita cargar el texto con un tono doctrinal que el griego aquí no exige.
  doctrine_reference: 'DOCTRINE.md: consistency of key terms, documented exception for political/legal contexts'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que cambió «because» por «that» para reflejar mejor διότι como introducción del contenido de la persuasión. La versión española evita una causalidad explícita y usa una estructura coordinada de finalidad/contenido («y también para que...»), manteniendo la tensión diplomática del original.
  spanish_consistency_notes:
  - Se usa «Dios/Jesús/Mesías» según los lineamientos generales del proyecto, pero este versículo no contiene esos términos.
  - Se evitó «reconciliara» como traducción principal para no imponer una lectura exclusivamente interpersonal o religiosa; el contexto es diplomático.
  - «Demandas justas» conserva la concreción jurídica de τὰ δίκαια y la opción inglesa auditada.
  - Se mantuvo un español neutro y publicable, sin calcos excesivamente literales que oscurezcan la cláusula griega compacta.
