translation:
  language: es
  text: Entonces bajé a la casa del alfarero, y allí estaba[a], trabajando en el torno[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La partícula hebrea introduce una observación vívida, casi «y he aquí». En español se traduce «y allí estaba» para mantener ese tono narrativo sin arcaísmo.
    reason: spanish_style_note
  - marker: b
    text: O «y he aquí, estaba trabajando sobre las ruedas». El término hebreo se refiere al aparato del alfarero y está en forma dual, literalmente «las ruedas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֵרֵד
  english_pob_choice: So I went down
  chosen_spanish: Entonces bajé
  alternatives_spanish:
  - Y bajé
  - Luego bajé
  lexicon: HALOT
  rationale: El wayyiqtol narra una acción siguiente en la secuencia; «entonces» conserva la continuidad narrativa en español sin forzar un calco innecesario.
- source_word: בֵּית הַיּוֹצֵר
  english_pob_choice: to the potter’s house
  chosen_spanish: a la casa del alfarero
  alternatives_spanish:
  - a la casa del potero
  - a la casa del ceramista
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «casa del alfarero». En español, «casa del alfarero» mantiene la relación posesiva de manera natural y fiel.
- source_word: הַיּוֹצֵר
  english_pob_choice: the potter
  chosen_spanish: el alfarero
  alternatives_spanish:
  - el potero
  - el ceramista
  lexicon: HALOT
  rationale: «Alfarero» es el término más natural y preciso en español bíblico para el artesano que modela barro/arcilla; preserva la imagen del pasaje.
- source_word: וְהִנֵּהוּ
  english_pob_choice: and there he was
  chosen_spanish: y allí estaba
  alternatives_spanish:
  - y he aquí que estaba
  - y allí lo vi
  lexicon: HALOT
  rationale: La partícula introduce una señal de presencia repentina o vívida. «Y allí estaba» reproduce bien esa fuerza deíctica en español moderno y digno.
- source_word: עֹשֶׂה מְלָאכָה
  english_pob_choice: doing work
  chosen_spanish: trabajando
  alternatives_spanish:
  - haciendo trabajo
  - ocupado en su labor
  - haciendo una obra
  lexicon: HALOT
  rationale: El participio con el sustantivo expresa actividad en curso; «trabajando» es más natural en español y no añade contenido ajeno al hebreo.
- source_word: עַל הָאָבְנָיִם
  english_pob_choice: on the wheel
  chosen_spanish: en el torno
  alternatives_spanish:
  - sobre el torno
  - en la rueda del alfarero
  - sobre las ruedas
  lexicon: HALOT
  rationale: La referencia apunta al aparato del alfarero. «Torno» comunica el instrumento en español actual; evita una pluralización que el propio auditorio hispano entendería con menos naturalidad. La decisión sigue la revisión inglesa que prefirió «wheel» por naturalidad, sin perder el sentido del artefacto.
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió «wheels» a «wheel» por mayor naturalidad. Esta versión española refleja esa misma tendencia con «torno», que comunica el aparato del alfarero de forma natural y fiel al contexto, sin perder la posible alusión al mecanismo de rueda/torno.
  spanish_consistency_notes:
  - Se mantiene el mismo sujeto implícito de la narración en primera persona («bajé»), coherente con el hebreo.
  - «Alfarero» se usa de manera consistente para הַיּוֹצֵר en este pasaje.
  - «Torno» evita la impresión de un único objeto moderno distinto del aparato artesanal, pero preserva el sentido del instrumento de alfarería.
  - No se introduce terminología doctrinal ni sustituciones litúrgicas ajenas al hebreo.
