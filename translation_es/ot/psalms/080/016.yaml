translation:
  language: es
  text: y la cepa[a] que tu mano derecha plantó, y el hijo[b] que fortaleciste para ti—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'retoño', 'rama' o 'pie de vid' para 'cepa'. El término hebreo es raro y aparece aquí en la imagen de la viña del salmo.
    reason: lexical_alternative
  - marker: b
    text: O 'la rama' en lugar de 'el hijo'. El hebreo dice 'hijo', pero algunos entienden la expresión de modo metafórico dentro de la imagen de la viña o en sentido corporativo de Israel.
    reason: alternative_reading
lexical_decisions:
- source_word: כַנָּה
  english_pob_choice: stock
  chosen_spanish: vástago
  alternatives_spanish:
  - retoño
  - estaca
  - cepa
  - raíz
  lexicon: HALOT
  rationale: El hebreo es un término raro en la imagen de la vid; 'vástago' mantiene la metáfora vegetal sin fijar indebidamente si se trata de un brote, rama o base de la planta. En español suena natural en contexto bíblico y conserva la ambigüedad documentada por la POB inglesa.
- source_word: נָטְעָה
  english_pob_choice: planted
  chosen_spanish: plantó
  alternatives_spanish:
  - sembró
  - estableció
  lexicon: HALOT
  rationale: נטע normalmente significa plantar. 'Plantó' preserva la imagen agrícola de manera directa y concordante con el contexto de la viña.
- source_word: יְמִינֶךָ
  english_pob_choice: your right hand
  chosen_spanish: tu mano derecha
  alternatives_spanish:
  - tu poder
  - tu diestra
  lexicon: HALOT
  rationale: Se mantiene la imagen corporal concreta del hebreo. 'Tu mano derecha' comunica la acción poderosa de Dios sin abstraerla en 'poder'; 'diestra' sería posible, pero 'mano derecha' es más transparente para lectura pública moderna.
- source_word: בֵּן
  english_pob_choice: son
  chosen_spanish: hijo
  alternatives_spanish:
  - rama
  - vástago
  - muchacho
  lexicon: HALOT
  rationale: La POB inglesa conserva 'son' para no resolver la ambigüedad botánica/metafórica. En español 'hijo' es el equivalente más directo y preserva la tensión teológica/corporativa del texto, especialmente dentro de la imagen de Israel como hijo.
- source_word: אִמַּצְתָּה
  english_pob_choice: made strong
  chosen_spanish: fortaleciste
  alternatives_spanish:
  - hiciste fuerte
  - afirmaste
  - robusteciste
  lexicon: HALOT
  rationale: El piel de אמץ expresa fortalecer o hacer firme. 'Fortaleciste' es natural en español, mantiene la fuerza causativa y evita un giro demasiado literal o artificial.
- source_word: לָּךְ
  english_pob_choice: for yourself
  chosen_spanish: para ti
  alternatives_spanish:
  - para ti mismo
  - en favor de ti
  lexicon: HALOT
  rationale: El dativo refleja finalidad o relación respecto de Dios. 'Para ti' reproduce la fuerza reflexiva de manera idiomática en español.
theological_decisions:
- issue: Ambigüedad de 'el hijo' en la metáfora de la vid
  english_pob_reading: Retain 'the son' as a literal translation within the corporate metaphor, without specifying a messianic referent in the main text.
  chosen_spanish_reading: Conservar 'el hijo' sin resolver la figura como 'rama' ni introducir una referencia mesiánica explícita en el texto principal.
  alternative_spanish_readings:
  - la rama
  - el brote
  - el Hijo
  rationale: El hebreo dice literalmente 'hijo'. Traducirlo por un término botánico eliminaría la tensión textual; traducirlo por 'el Hijo' introduciría una mayúscula cristológica no pedida por el pasaje. La versión española mantiene la ambigüedad para permitir la lectura corporativa de Israel y otras lecturas teológicas posteriores sin imponerlas.
  doctrine_reference: Preservar la tensión teológica y la polisemia metafórica del texto.
translation_notes:
  revision_awareness: El borrador sigue el estado de revisión más reciente indicado como sin cambios; no se requirieron ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene 'tu' para el sufijo posesivo de segunda persona singular.
  - Se preserva el paralelismo poético con dos miembros coordinados por 'y'.
  - Se evita 'SEÑOR' porque el hebreo de este versículo no contiene el tetragrámaton explícito.
  - La puntuación con raya final conserva el cierre incompleto/poético del verso.
