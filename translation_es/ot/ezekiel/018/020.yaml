translation:
  language: es
  text: La persona que peca[a]—esa misma morirá. El hijo no llevará[b] la iniquidad del padre, ni el padre llevará[b] la iniquidad del hijo. La justicia del justo será sobre él, y la maldad del malvado será sobre él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «El alma que peca, esa morirá». Aquí «alma» (hebreo נֶפֶשׁ, nefesh) se refiere al individuo responsable.'
    reason: lexical_alternative
  - marker: b
    text: «Llevar la iniquidad» es un modismo jurídico hebreo que puede abarcar tanto culpa como la responsabilidad que conlleva.
    reason: cultural_note
lexical_decisions:
- source_word: הַנֶּפֶשׁ
  english_pob_choice: the person
  chosen_spanish: la persona
  alternatives_spanish:
  - el alma
  lexicon: HALOT
  rationale: En este contexto legal-moral, נֶפֶשׁ se refiere al individuo mismo, no a una parte inmaterial. 'La persona' comunica ese sentido con naturalidad en español y evita sobrecargas antropológicas.
- source_word: הַחֹטֵאת
  english_pob_choice: who sins
  chosen_spanish: que peca
  alternatives_spanish:
  - que está pecando
  - la que peca
  lexicon: HALOT
  rationale: El participio describe al que comete pecado de manera caracterizada. 'Que peca' es directo y conserva el valor genérico/continuado sin volverlo más explicativo de lo que permite el hebreo.
- source_word: הִיא תָמוּת
  english_pob_choice: he shall die
  chosen_spanish: esa morirá
  alternatives_spanish:
  - morirá
  - ella morirá
  lexicon: HALOT
  rationale: El pronombre femenino concuerda gramaticalmente con נֶפֶשׁ; en español, 'esa' permite mantener la referencia al antecedente sin imponer un género masculino genérico donde el hebreo no lo usa aquí.
- source_word: בֵּן
  english_pob_choice: a son
  chosen_spanish: El hijo
  alternatives_spanish:
  - Un hijo
  - El muchacho
  lexicon: HALOT
  rationale: '''Hijo'' preserva la relación padre-hijo y la formulación legal del original. En español, el artículo definido mantiene mejor el tono proverbial del hebreo que un artículo indefinido en este miembro paralelo.'
- source_word: יִשָּׂא בַּעֲוֺן
  english_pob_choice: shall not bear the iniquity
  chosen_spanish: no llevará la iniquidad
  alternatives_spanish:
  - no cargará con la culpa
  - no sufrirá por la iniquidad
  lexicon: HALOT
  rationale: Se conserva el giro jurídico hebreo 'llevar la iniquidad', que puede abarcar culpa y responsabilidad. 'Culpa' o 'sufrir por' estrecharían el alcance del idiomismo.
- source_word: הָאָב
  english_pob_choice: the father
  chosen_spanish: del padre
  alternatives_spanish:
  - de su padre
  lexicon: HALOT
  rationale: El genitivo español reproduce con claridad la relación posesiva del hebreo. 'El padre' mantiene el paralelismo formal en la frase.
- source_word: וְאָב
  english_pob_choice: and a father
  chosen_spanish: ni el padre
  alternatives_spanish:
  - y un padre
  - ni un padre
  lexicon: HALOT
  rationale: El hebreo coordina el segundo miembro con valor recíproco; en español, 'ni el padre' completa mejor la correlación negativa con 'ni...'. Mantiene el paralelismo y evita una construcción menos natural.
- source_word: הַבֵּן
  english_pob_choice: the son
  chosen_spanish: del hijo
  alternatives_spanish:
  - de su hijo
  lexicon: HALOT
  rationale: Sigue el mismo patrón genitivo que en la cláusula anterior, conservando la simetría del hebreo.
- source_word: צִדְקַת הַצַּדִּיק
  english_pob_choice: the righteousness of the righteous
  chosen_spanish: La justicia del justo
  alternatives_spanish:
  - La rectitud del justo
  - La justicia del hombre justo
  lexicon: HALOT
  rationale: '''Justicia'' mantiene la correspondencia con צִדְקָה y su fuerza legal/covenantal; ''del justo'' conserva el juego cognado con צַדִּיק sin sonar forzado en español.'
- source_word: עָלָיו תִּהְיֶה
  english_pob_choice: shall be upon him
  chosen_spanish: será sobre él
  alternatives_spanish:
  - reposará sobre él
  - estará sobre él
  lexicon: HALOT
  rationale: '''Será sobre él'' reproduce de forma sobria la preposición עַל y su sentido de imputación/atribución personal. ''Reposará'' sería más interpretativo.'
- source_word: וְרִשְׁעַת רָשָׁע
  english_pob_choice: and the wickedness of the wicked
  chosen_spanish: y la maldad del malvado
  alternatives_spanish:
  - y la iniquidad del impío
  - y la perversidad del perverso
  lexicon: HALOT
  rationale: '''Maldad'' expresa bien רִשְׁעָה en español moderno sin perder el peso moral; ''malvado'' preserva el paralelismo de sustantivo/adjetivo y evita una reescritura más doctrinal.'
theological_decisions:
- issue: Sentido antropológico de נֶפֶשׁ
  english_pob_reading: Rendered as 'person' rather than 'soul'
  chosen_spanish_reading: la persona
  alternative_spanish_readings:
  - el alma
  rationale: En una fórmula judicial-profética, נֶפֶשׁ señala al individuo responsable. 'La persona' evita sugerir una doctrina del alma que el versículo no está tratando directamente.
  doctrine_reference: Translation philosophy §1, §6
- issue: Uso representativo del masculino gramatical
  english_pob_reading: Used 'he' and 'son/father' in the main text
  chosen_spanish_reading: Mantuvo 'hijo/padre' y el referente singular con 'esa/él' donde corresponde
  alternative_spanish_readings:
  - ellos
  - persona/padre/madre
  - ser humano
  rationale: El hebreo emplea formas masculinas singulares en un dicho legal representativo. En español se preserva esa estructura sin neutralizarla más allá de lo que el texto permite.
  doctrine_reference: Translation philosophy §4
- issue: Idiomático jurídico de 'bear iniquity'
  english_pob_reading: Retained 'bear the iniquity' language
  chosen_spanish_reading: no llevará la iniquidad
  alternative_spanish_readings:
  - no cargará con la culpa
  - no sufrirá por la iniquidad
  rationale: La expresión hebrea conserva responsabilidad y posible culpa. Mantener el idioma jurídico evita reducirlo a una sola consecuencia punitiva.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: La redacción coincide con el acuerdo alto del expediente inglés y no requiere revisiones sustantivas; se han ajustado las soluciones al español para conservar el paralelismo jurídico, la referencia individual de נֶפֶשׁ y el idiomatismo de 'llevar la iniquidad'.
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva un registro sobrio y bíblico sin calcos excesivos, pero con transparencia suficiente para auditoría.
  - '''Justicia'' se usa para צִדְקָה por su fuerza legal y relacional; ''maldad'' para רִשְׁעָה por claridad natural en español.'
