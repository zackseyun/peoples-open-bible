review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: acercarse al rey y pedir que se les permita regresar. Sin embargo, «para volver» introduce un matiz final no expresado directamente por εἰς τὰ ἴδια, y «su liberación» puede sonar más fuerte o más abstracto que ἀπόλυσις en este contexto de dejarlos ir. Una formulación más ceñida sería «pidiendo que los dejaran ir a sus propios hogares».'
  spanish_quality_summary: El español es claro y natural, pero «su liberación para volver» resulta algo pesado y menos idiomático que una construcción verbal directa. Además, «sus propios hogares» es comprensible, aunque «sus hogares» ya suele bastar; se puede conservar «propios» para reflejar τὰ ἴδια y mantener la nota léxica.
  glossary_alignment: No hay términos de glosario teológicamente sensibles en este versículo. La nota sobre εἰς τὰ ἴδια está bien preservada y conviene mantenerla con anclaje en la frase correspondiente.
  issues:
  - severity: medium
    issue: «su liberación» para ἀπόλυσις
    rationale: Aunque posible, «liberación» en español puede sugerir emancipación más amplia. En este contexto narrativo, el sentido es más concretamente que se les permita marcharse o ser dejados ir.
  - severity: low
    issue: «para volver a» añade un matiz de finalidad
    rationale: El griego dice literalmente su liberación/partida «a lo suyo», no explícitamente «para volver». No es una gran desviación, pero una redacción más directa preserva mejor la sintaxis y el sentido.
  revised_spanish_text: Y se acercaron al rey, pidiendo que los dejaran ir a sus propios hogares[a].
  revised_footnotes:
  - marker: a
    text: O «a sus propios lugares». La expresión griega εἰς τὰ ἴδια puede referirse de manera más amplia a lo que pertenece a alguien; aquí probablemente significa volver a casa.
    reason: lexical_alternative
  revision_rationale: Se ajusta ἀπόλυσις a una expresión verbal más natural y más precisa en contexto («que los dejaran ir») y se ancla la nota léxica directamente en «sus propios hogares», que es donde surge la alternativa de εἰς τὰ ἴδια. No se requiere adjudicación adicional.
