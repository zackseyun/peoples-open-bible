id: JHN.15.22
reference: 'John 15:22'
language:
  code: ko
  name: Korean
  variant: '표준어 / modern formal-polite (합쇼체)'
source:
  edition: SBLGNT
  text: εἰ μὴ ἦλθον καὶ ἐλάλησα αὐτοῖς, ἁμαρτίαν οὐκ ⸀εἴχοσαν· νῦν δὲ πρόφασιν οὐκ ἔχουσιν περὶ τῆς ἁμαρτίας αὐτῶν.
base_translation:
  language: en
  yaml_path: translation/nt/john/015/022.yaml
  text: If I had not come and spoken to them[a], they would not have sin[c][b]; but now they have no excuse for their sin.
  footnotes:
  - marker: a
    text: Or, 'they would not be guilty of sin' or 'they would not have guilt.' The Greek more literally says, 'they would not have sin.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'they have no pretext' for their sin.
    reason: lexical_alternative
  - marker: c
    text: Or 'concerning their sin'.
    reason: previous_rendering
translation:
  language: ko
  text: 내가 와서 그들에게 말하지 않았더라면, 그들에게 죄가 없었을 것입니다. 그러나 이제 그들에게는 자기 죄에 대한 변명이 없습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그들이 죄에 대해 책임이 없었을 것이다」, 「그들에게 죄책이 없었을 것이다」. 헬라어는 더 문자적으로 「그들이 죄를 가지지 않았을 것이다」.
    reason: lexical_alternative
  - marker: b
    text: 또는 「자기 죄에 대한 핑계」.
    reason: lexical_alternative
  - marker: c
    text: 또는 「그들의 죄에 관하여」.
    reason: lexical_alternative
