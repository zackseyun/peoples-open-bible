review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: una explicación de juicio con dos símiles paralelos, árbol de hoja marchita y jardín sin agua. También preserva correctamente la alternativa léxica de אֵלָה en nota. Sin embargo, «marchita en su hoja» no representa de manera natural ni precisa עָלֶהָ ‘su hoja / cuya hoja’; el hebreo apunta a la hoja del árbol como elemento que se marchita, no a una condición ‘en su hoja’.'
  spanish_quality_summary: El español es claro en general, pero «una encina marchita en su hoja» suena forzado y poco idiomático. Una formulación relativa como «cuya hoja se marchita» o «cuya hoja está marchita» es más natural, fiel y digna. El resto del verso lee bien en español bíblico contemporáneo.
  glossary_alignment: No hay términos del glosario mayor en juego salvo la consistencia general. La elección «encina» es aceptable con nota para «terebinto/roble». «Jardín» y «agua» están bien. No hay conflicto teológico ni terminológico de proyecto.
  issues:
