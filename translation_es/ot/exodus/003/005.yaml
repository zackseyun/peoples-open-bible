translation:
  language: es
  text: 'Entonces dijo[a]: «No te acerques aquí. Quítate las sandalias de tus pies, porque el lugar donde estás de pie es tierra santa[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No te aproximes aquí.»'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «tierra de santidad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then he said
  chosen_spanish: Entonces él dijo
  alternatives_spanish:
  - Y dijo
  - Luego dijo
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; «Entonces» conserva esa secuencia con español natural y digno. Se mantiene el sujeto explícito para claridad en el diálogo.
- source_word: אַל תִּקְרַב
  english_pob_choice: Do not come near
  chosen_spanish: No te acerques
  alternatives_spanish:
  - No te acerques aquí
  - No te aproximes
  lexicon: HALOT
  rationale: El verbo קרב expresa acercarse físicamente. «No te acerques» reproduce la prohibición de manera natural; el adverbio local se expresa después con «aquí».
- source_word: הֲלֹם
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - hasta aquí
  - a este lugar
  lexicon: HALOT
  rationale: La partícula indica el punto espacial inmediato. «Aquí» es la equivalencia clara y directa en español.
- source_word: שַׁל
  english_pob_choice: Remove
  chosen_spanish: Quítate
  alternatives_spanish:
  - Sácate
  - Retira
  lexicon: HALOT
  rationale: El imperativo pide desprender el calzado. En español, con prendas o calzado, «quítate» es la forma natural y fiel al valor directivo del hebreo.
- source_word: נְעָלֶיךָ
  english_pob_choice: your sandals
  chosen_spanish: las sandalias
  alternatives_spanish:
  - el calzado
  - los zapatos
  lexicon: HALOT
  rationale: El término hebreo designa sandalias/calzado antiguo. «Sandalias» preserva mejor el concreto cultural del escenario que un término más genérico o moderno.
- source_word: מֵעַל רַגְלֶיךָ
  english_pob_choice: from your feet
  chosen_spanish: de los pies
  alternatives_spanish:
  - de tus pies
  - de sobre tus pies
  lexicon: HALOT
  rationale: La construcción indica retirar algo que está sobre los pies. «De los pies» funciona bien en español con «quítate» y evita una literalidad rígida.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: HALOT
  rationale: Aquí introduce la razón de la prohibición; «porque» expresa con claridad la relación causal.
- source_word: הַמָּקוֹם
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - este lugar
  - el sitio
  lexicon: HALOT
  rationale: El sustantivo se refiere al sitio concreto donde Moisés está de pie. «El lugar» es fiel y sobrio.
- source_word: עוֹמֵד עָלָיו
  english_pob_choice: you are standing
  chosen_spanish: estás parado
  alternatives_spanish:
  - estás de pie
  - te encuentras de pie
  lexicon: HALOT
  rationale: El participio con la preposición describe la posición actual del interlocutor. «Estás parado» es comprensible y directo en español, aunque «estás de pie» también sería posible.
- source_word: אַדְמַת קֹדֶשׁ
  english_pob_choice: holy ground
  chosen_spanish: tierra santa
  alternatives_spanish:
  - suelo santo
  - terreno santo
  lexicon: HALOT
  rationale: La construcción literal es «tierra/suelo de santidad». «Tierra santa» comunica con naturalidad la sacralidad del lugar sin perder el peso del sustantivo hebreo. Se evita «tierra de santidad» por sonar poco idiomático en español.
theological_decisions:
- issue: Cómo expresar la santidad del lugar sin añadir explicación interpretativa
  english_pob_reading: Render the statement descriptively as 'the place where you are standing is holy ground' without adding explanation.
  chosen_spanish_reading: «el lugar donde estás parado es tierra santa»
  alternative_spanish_readings:
  - «el lugar donde estás de pie es tierra santa»
  - «el lugar donde estás parado es suelo santo»
  rationale: El texto afirma la santidad del lugar, pero no explica aquí su causa. La traducción conserva esa afirmación de forma descriptiva, sin añadir que la santidad proviene de la presencia divina, aunque eso sea coherente con el contexto inmediato.
  doctrine_reference: Éxodo 3:5; filosofía de traducción §1, §3
- issue: Preferencia terminológica para אדמת קדש
  english_pob_reading: Literally, 'ground of holiness.'
  chosen_spanish_reading: «tierra santa»
  alternative_spanish_readings:
  - «suelo santo»
  - «tierra de santidad»
  rationale: La nota inglesa preserva la literalidad subyacente; en español, «tierra santa» mantiene la relación semántica y suena natural y reverente. No se usa «sagrada» para no sustituir innecesariamente el matiz de qōdeš por un equivalente más abstracto.
  doctrine_reference: HALOT; Éxodo 3:5
translation_notes:
  revision_awareness: La redacción inglesa revisada cambió de «Take your sandals off your feet» a «Remove your sandals from your feet» para lograr un registro más natural y formal. La versión española sigue esa misma intención con «Quítate las sandalias de los pies», que conserva la acción de retirar el calzado sin calco rígido.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no lo nombra explícitamente.
  - Se elige «tierra santa» para אַדְמַת קֹדֶשׁ por ser la equivalencia idiomática más fiel y reconocible en español.
  - «No te acerques aquí» refleja la alternativa léxica inglesa sin necesidad de oscurecer el imperativo principal.
  - El tono es reverente pero directo, acorde con una advertencia divina breve y solemne.
