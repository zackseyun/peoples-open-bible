translation:
  language: es
  text: Y todos los confines de la tierra sabrán que tú eres el Dios eterno.[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La tradición griega lee: «Los que temen al Señor hallarán juicio, y encenderán obras justas como luz». El testimonio hebreo aquí preserva una línea sustancialmente diferente.'
    reason: textual_variant
  - marker: b
    text: O «el Dios perpetuo» / «el Dios sempiterno».
    reason: lexical_alternative
lexical_decisions:
- source_word: וידעו
  english_pob_choice: will know
  chosen_spanish: sabrán
  alternatives_spanish:
  - conocerán
  - llegarán a saber
  lexicon: HALOT
  rationale: El hebreo expresa un resultado futuro en contexto sapiencial/profético; 'sabrán' reproduce ese valor con naturalidad en español y conserva el sentido declarativo del texto.
- source_word: כל אפסי ארץ
  english_pob_choice: all the ends of the earth
  chosen_spanish: todos los confines de la tierra
  alternatives_spanish:
  - todos los extremos de la tierra
  - toda la tierra hasta sus extremos
  lexicon: HALOT
  rationale: '''Confin(es) de la tierra'' es un equivalente natural y formal de la expresión idiomática hebrea para los lugares más remotos del mundo, sin perder el matiz geográfico universal.'
- source_word: אלהי עולם
  english_pob_choice: the eternal God
  chosen_spanish: el Dios eterno
  alternatives_spanish:
  - el Dios de eternidad
  - el Dios perpetuo
  - el Dios para siempre
  lexicon: HALOT
  rationale: La construcción hebrea literalmente dice 'Dios de eternidad/para siempre', pero el audit trail inglés ya decidió 'the eternal God' por naturalidad formal. En español, 'el Dios eterno' preserva el sentido sin forzar una perífrasis menos idiomática.
- source_word: אתה
  english_pob_choice: you are
  chosen_spanish: tú eres
  alternatives_spanish:
  - eres tú
  - tú eres, sí
  lexicon: HALOT
  rationale: El pronombre explícito del hebreo se conserva con 'tú eres', manteniendo el énfasis personal sin añadir elementos como 'solo' que no están en el texto.
theological_decisions:
- issue: Prioridad del testimonio hebreo frente al paralelo griego divergente
  english_pob_reading: Translate the extant Hebrew as primary, while noting the Greek preserves a substantially different line.
  chosen_spanish_reading: Traducir el hebreo conservado como texto principal, y señalar que el griego transmite una línea sustancialmente distinta.
  alternative_spanish_readings:
  - 'Alinear el texto principal con el griego: ''Los que temen al Señor hallarán juicio...'''
  - Fusionar hebreo y griego en una sola redacción conciliada
  rationale: En Sirácides, cuando el hebreo existe de forma fiable, debe tener primacía textual. Aquí el griego no es una equivalencia verbal cercana del hebreo disponible, por lo que no conviene armonizarlo en el cuerpo principal; la diferencia debe preservarse como variante textual.
  doctrine_reference: 'PHILOSOPHY.md: el Sirácides hebreo se traduce desde el hebreo donde se conserva; el griego paralelo se usa como control real de consistencia, no como sustituto automático del hebreo.'
translation_notes:
  revision_awareness: La redacción española sigue la revisión final del audit trail inglés, que prefirió 'the eternal God' por naturalidad formal sin perder el sentido de אלהי עולם. También conserva la nota de divergencia textual con el griego, ya que la variante es sustancial y no debe armonizarse en el texto principal.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אלהים y 'eterno' para עולם, evitando una paráfrasis más libre que borraría la estructura nominal hebrea.
  - '''Confin(es) de la tierra'' conserva el carácter idiomático de אפסי ארץ y su alcance universal.'
  - No se introduce 'Señor' en el texto principal porque el hebreo base de este versículo no lo requiere; el griego queda registrado solo en nota.
  - La puntuación y mayúsculas siguen el uso editorial español contemporáneo y hacen legible una clausula de tipo sapiencial/profético.
