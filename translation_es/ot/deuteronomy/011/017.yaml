translation:
  language: es
  text: Entonces la ira de Yahvé[a] se encenderá contra ustedes, y cerrará los cielos para que no haya lluvia; y la tierra no dará su fruto, y ustedes perecerán pronto al ser quitados de la buena tierra que Yahvé les da.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «la nariz/ira de Yahvé se encenderá contra ustedes»; literalmente, «la nariz de Yahvé se encenderá contra ustedes», un modismo hebreo para ira intensa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחָרָה אַף יְהוָה בָּכֶם
  english_pob_choice: Then Yahweh’s anger will burn against you
  chosen_spanish: Entonces la ira de Yahvé[a] se encenderá contra ustedes
  alternatives_spanish:
  - Entonces Yahvé se enojará con ustedes
  - Entonces el enojo de Yahvé se encenderá contra ustedes
  - Entonces la nariz/ira de Yahvé se encenderá contra ustedes
  lexicon: HALOT
  rationale: חָרָה con אַף expresa una imagen idiomática de ira que arde o se enciende. En español, «la ira ... se encenderá» conserva la metáfora sin sonar forzado. Se prefiere «ira» sobre una paráfrasis neutra para no borrar la fuerza del hebreo. Se mantiene Yahvé como nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El Tetragrámaton se representa en la POB española como «Yahvé», siguiendo el criterio del proyecto de transparentar el nombre propio divino en lugar de sustituirlo por un título.
- source_word: וְעָצַר אֶת הַשָּׁמַיִם
  english_pob_choice: and he will shut up the heavens
  chosen_spanish: y cerrará los cielos
  alternatives_spanish:
  - y restringirá los cielos
  - y cerrará el cielo
  lexicon: HALOT
  rationale: עָצַר aquí describe la acción de retener la lluvia mediante el cierre de los cielos. «Cerrará los cielos» es natural en español y conserva la imagen agrícola-covenantal.
- source_word: וְלֹא יִהְיֶה מָטָר
  english_pob_choice: so that there will be no rain
  chosen_spanish: para que no haya lluvia
  alternatives_spanish:
  - y no habrá lluvia
  - de modo que no habrá lluvia
  lexicon: HALOT
  rationale: La cláusula expresa resultado. «Para que» funciona bien en español para marcar el efecto de cerrar los cielos sin añadir información ajena al hebreo.
- source_word: וְהָאֲדָמָה לֹא תִתֵּן אֶת יְבוּלָהּ
  english_pob_choice: and the ground will not yield its produce
  chosen_spanish: y la tierra no dará su fruto
  alternatives_spanish:
  - y el suelo no dará su produce
  - y la tierra no producirá su cosecha
  - y el terreno no dará su cosecha
  lexicon: HALOT
  rationale: אֲדָמָה puede ser «tierra/suelo». Aquí, por contraste con הָאָרֶץ del final del verso, «la tierra» comunica bien el ámbito cultivable y mantiene un español fluido. יְבוּלָהּ se vierte como «su fruto», una forma idiomática que conserva la idea de rendimiento agrícola.
- source_word: וַאֲבַדְתֶּם מְהֵרָה
  english_pob_choice: and you will perish quickly
  chosen_spanish: y ustedes perecerán pronto
  alternatives_spanish:
  - y ustedes perecerán rápidamente
  - y ustedes serán destruidos pronto
  - y ustedes desaparecerán pronto
  lexicon: HALOT
  rationale: אבד en este contexto apunta a perecer bajo juicio y a ser removidos del lugar de bendición. «Perecerán» mantiene la gravedad sin especificar más de lo que el hebreo dice. «Pronto» traduce מְהֵרָה con claridad.
- source_word: מֵעַל הָאָרֶץ הַטֹּבָה
  english_pob_choice: from the good land
  chosen_spanish: de la buena tierra
  alternatives_spanish:
  - de sobre la buena tierra
  - de la tierra buena
  - de la tierra excelente
  lexicon: HALOT
  rationale: מֵעַל puede sugerir separación o remoción desde la superficie, pero en español «de la buena tierra» comunica con naturalidad la pérdida de permanencia en esa tierra. Se mantiene «buena» como equivalente directo de הַטֹּבָה.
- source_word: אֲשֶׁר יְהוָה נֹתֵן לָכֶם
  english_pob_choice: that Yahweh is giving you
  chosen_spanish: que Yahvé les da
  alternatives_spanish:
  - que Yahvé les está dando
  - que Yahvé les da a ustedes
  - que Yahvé les concede
  lexicon: HALOT
  rationale: El participio נֹתֵן puede expresarse en presente. «Les da» es natural en español y conserva la idea de don presente y activo, apropiada en el contexto del pacto.
theological_decisions:
- issue: Nombre divino en el texto principal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La política del proyecto pide transparentar יְהוָה como «Yahvé», preservando el nombre del pacto y evitando la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Metáfora de ira que se enciende
  english_pob_reading: the LORD’s anger will burn against you
  chosen_spanish_reading: la ira de Yahvé se encenderá contra ustedes
  alternative_spanish_readings:
  - Yahvé se enojará contra ustedes
  - la cólera de Yahvé arderá contra ustedes
  rationale: Se conserva la imagen de fuego/encendido presente en el hebreo. Esto evita suavizar el juicio del texto y mantiene la tensión idiomática documentada por la POB inglesa.
  doctrine_reference: Hebrew idiom of divine anger; lexical not doctrinal dispute
translation_notes:
  revision_awareness: La auditoría inglesa revisó la frase final de «from off the good land» a «from the good land» por naturalidad; en español se reflejó esa misma naturalidad con «de la buena tierra», sin introducir la matiz literal de «sobre/off» que sonaría forzado. No hubo otras revisiones que afectaran la sustancia del verso.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se usó «ira» y no un eufemismo para conservar la metáfora hebrea.
  - «Tierra» traduce aquí el ámbito agrícola/covenantal de אֲדָמָה, en contraste con «tierra» final para הָאָרֶץ; en español ambas pueden coincidir, pero se decidió priorizar fluidez y paralelismo semántico.
  - Se evitó «fruto/cosecha/producirá» como calcos excesivos; «no dará su fruto» suena natural y mantiene el valor agrícola de יְבוּל.
