translation:
  language: es
  text: Los egipcios persiguieron y entraron tras ellos hasta el interior del mar[b]—todos los caballos[a] de Faraón, sus carros y sus jinetes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «todo caballo de Faraón». El hebreo usa un singular colectivo; en español se expresa naturalmente con el plural «caballos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en medio del mar». El hebreo destaca que entraron al interior del mar, no solo en dirección a él.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְדְּפוּ
  english_pob_choice: pursued
  chosen_spanish: persiguieron
  alternatives_spanish:
  - los siguieron
  - cazaron
  lexicon: HALOT
  rationale: רדף expresa persecución; en español, «persiguieron» conserva el valor narrativo y militar del verbo sin suavizarlo.
- source_word: מִצְרַיִם
  english_pob_choice: The Egyptians
  chosen_spanish: Los egipcios
  alternatives_spanish:
  - Egipto
  lexicon: HALOT
  rationale: La forma plural verbal y el contexto militar señalan al pueblo/ejército egipcio, no a la tierra; por eso se traduce con el sujeto colectivo personal.
- source_word: וַיָּבֹאוּ אַחֲרֵיהֶם
  english_pob_choice: went in after them
  chosen_spanish: se metieron tras ellos
  alternatives_spanish:
  - entraron tras ellos
  - fueron detrás de ellos
  lexicon: HALOT
  rationale: בוא indica movimiento de entrada; «se metieron tras ellos» mantiene la secuencia narrativa y el seguimiento inmediato, con español natural.
- source_word: אֶל תּוֹךְ הַיָּם
  english_pob_choice: into the midst of the sea
  chosen_spanish: hacia el interior del mar
  alternatives_spanish:
  - al medio del mar
  - dentro del mar
  lexicon: HALOT
  rationale: תּוֹךְ añade interioridad; «hacia el interior del mar» conserva esa idea de penetrar en la parte interna, evitando reducirlo a un simple «entraron en el mar».
- source_word: כֹּל סוּס פַּרְעֹה
  english_pob_choice: all Pharaoh’s horses
  chosen_spanish: todos los caballos de Faraón
  alternatives_spanish:
  - todo caballo de Faraón
  - toda la caballería de Faraón
  lexicon: HALOT
  rationale: El hebreo usa un singular colectivo tras כֹּל; en español, el plural «caballos» comunica de modo natural el sentido colectivo conservando la fuerza del conjunto.
- source_word: רִכְבּוֹ
  english_pob_choice: his chariots
  chosen_spanish: sus carros
  alternatives_spanish:
  - su carro de guerra
  - su carrocería
  lexicon: HALOT
  rationale: רֶכֶב/רִכְבּוֹ en este contexto militar se refiere a carros de guerra; «sus carros» es conciso y fiel en español bíblico contemporáneo.
- source_word: וּפָרָשָׁיו
  english_pob_choice: and his horsemen
  chosen_spanish: y sus jinetes
  alternatives_spanish:
  - y su caballería
  - y sus caballeros
  lexicon: HALOT
  rationale: פָּרָשִׁים son hombres montados; «jinetes» preserva la concreción militar y evita el tecnicismo «caballería» cuando el hebreo nombra a las personas.
theological_decisions:
- issue: Identidad de «מִצְרַיִם» en contexto narrativo
  english_pob_reading: The Egyptians
  chosen_spanish_reading: Los egipcios
  alternative_spanish_readings:
  - Egipto
  rationale: La lectura personal evita una personificación extraña de la tierra y corresponde al sujeto que ejecuta la persecución; no hay tensión doctrinal, solo precisión referencial.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente, que indica que no hubo cambios necesarios y que el acuerdo con la auditoría es alto. La redacción española conserva la estructura narrativa, la imagen militar y la interioridad de תּוֹךְ sin depender mecánicamente del inglés.
  spanish_consistency_notes:
  - Se mantuvo «Faraón» como forma tradicional y claramente reconocible en español.
  - Se prefirió «caballos» en plural por el colectivo hebreo, pero se conservó la nota para transparentar el singular de base.
  - «Jinetes» traduce a las personas montadas, manteniendo la lista militar diferenciada de carros y caballos.
  - El registro es bíblico contemporáneo, sin arcaísmos innecesarios.
