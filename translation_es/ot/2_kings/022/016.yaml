translation:
  language: es
  text: 'Así dice Yahvé: He aquí[a], yo voy a traer calamidad sobre este lugar y sobre sus habitantes, todas las palabras del libro que ha leído el rey de Judá.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘desastre’; el hebreo רָעָה aquí se refiere a juicio o calamidad, no a mal moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - De esta manera
  - Así es como
  lexicon: HALOT
  rationale: Introduce la fórmula profética con naturalidad en español y conserva el tono solemne de anuncio sin volverla explicativa.
- source_word: אָמַר יְהוָה
  english_pob_choice: says Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - dijo Yahvé
  - afirma Yahvé
  lexicon: HALOT
  rationale: El hebreo usa una fórmula profética estable; en español, el presente mantiene el valor de proclamación directa. Se conserva el nombre divino como Yahvé según el estándar del proyecto.
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Aquí estoy
  lexicon: HALOT
  rationale: Expresa la solemnidad e inmediatez del anuncio divino sin añadir contenido interpretativo.
- source_word: מֵבִיא
  english_pob_choice: I am bringing
  chosen_spanish: traigo
  alternatives_spanish:
  - estoy trayendo
  - voy a traer
  lexicon: HALOT
  rationale: En español, el presente simple suena más natural en la fórmula profética y sigue comunicando acción inminente o ya en curso.
- source_word: רָעָה
  english_pob_choice: disaster
  chosen_spanish: calamidad
  alternatives_spanish:
  - desastre
  - maldad
  lexicon: HALOT
  rationale: En contexto judicial/profético, רָעָה no describe mal moral en Dios sino un juicio catastrófico. 'Calamidad' preserva ese valor y evita una lectura teológicamente engañosa.
- source_word: אֶל הַמָּקוֹם הַזֶּה
  english_pob_choice: on this place
  chosen_spanish: sobre este lugar
  alternatives_spanish:
  - contra este lugar
  - a este lugar
  lexicon: HALOT
  rationale: '''Sobre'' comunica mejor en español la dirección del juicio que recae sobre el lugar, alineándose con el valor idiomático del inglés POB sin perder la referencia espacial.'
- source_word: וְעַל יֹשְׁבָיו
  english_pob_choice: and on its inhabitants
  chosen_spanish: y sobre sus habitantes
  alternatives_spanish:
  - y sobre los que habitan en él
  - y sobre sus moradores
  lexicon: HALOT
  rationale: '''Habitantes'' es un equivalente claro y formal para el participio sustantivado; ''sobre'' mantiene el paralelismo con el objeto del juicio.'
- source_word: אֵת כָּל דִּבְרֵי הַסֵּפֶר
  english_pob_choice: all the words of the book
  chosen_spanish: todas las palabras del libro
  alternatives_spanish:
  - todo lo escrito en el libro
  - todas las cosas del libro
  lexicon: HALOT
  rationale: Se conserva la cercanía formal al hebreo y al audit trail inglés. 'Palabras' mantiene la referencia al contenido del libro sin volverla más interpretativa.
- source_word: אֲשֶׁר קָרָא
  english_pob_choice: that ... has read
  chosen_spanish: que ha leído
  alternatives_spanish:
  - que leyó
  - que fue leído
  lexicon: HALOT
  rationale: El perfecto español transmite la relevancia inmediata de la acción pasada. No se explicita 'en voz alta' porque el hebreo no lo dice de forma directa en esta cláusula.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: the king of Judah
  chosen_spanish: el rey de Judá
  alternatives_spanish:
  - el rey judío
  - el monarca de Judá
  lexicon: HALOT
  rationale: La construcción es directa y transparente; se mantiene el nombre geográfico-político sin reinterpretación.
theological_decisions:
- issue: שימוש de רָעָה en contexto de juicio divino
  english_pob_reading: disaster, not moral evil
  chosen_spanish_reading: calamidad, no maldad moral
  alternative_spanish_readings:
  - desastre
  - ruina
  rationale: En este oráculo el término apunta al castigo anunciado por Yahvé. 'Calamidad' preserva el sentido de juicio adverso sin sugerir que Dios comete mal moral.
  doctrine_reference: 'Principio POB: distinguir cuidadosamente entre juicio/calamidad y mal moral en el léxico profético.'
- issue: Fórmula profética con el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, preservando el nombre del pacto en lugar de ocultarlo tras una convención tipográfica.
  doctrine_reference: 'DOCTRINE.md: יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La redacción inglesa auditada fue afinada para quitar el guion y usar una coma antes de la apposición; en español se refleja esa misma relación sintáctica con coma: ''..., todas las palabras del libro...''. No se introdujo una pausa mayor ni se alteró el contenido léxico.'
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה, conforme al estándar del proyecto.
  - Se eligió 'calamidad' para רָעָה por su valor de juicio adverso en contexto profético.
  - Se conservó el orden y paralelismo básico del hebreo sin añadir 'en voz alta' a 'ha leído'.
