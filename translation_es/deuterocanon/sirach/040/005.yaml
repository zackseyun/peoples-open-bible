translation:
  language: es
  text: Pero la envidia[a], la ansiedad y el temor, y el pavor de la muerte, provocan mucha contienda; y al tiempo de su reposo en su lecho[b], el sueño de la noche cambia su miseria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión del primer miembro es comprimida en el hebreo, y el griego paralelo enumera de manera más explícita impulsos como ira, celo, tumulto y disputa. La traducción principal mantiene una formulación general de contienda sin ampliar el texto en el cuerpo principal.
    reason: alternative_reading
  - marker: b
    text: 'O: «altera su aflicción» o «cambia su desdicha». El hebreo parece referirse a la condición sufriente de la persona, no a maldad moral.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קנאה / ζῆλος
  english_pob_choice: envy
  chosen_spanish: envidia
  alternatives_spanish:
  - celos
  - celo
  lexicon: HALOT / Liddell-Scott-Jones
  rationale: En este contexto de pasiones perturbadoras, el valor negativo es el que mejor corresponde. "Envidia" comunica de manera natural en español la inquietud interior que el texto enumera, y evita el sentido positivo de "celo". "Celos" es posible, pero en español puede sonar más relacional que afectivo-general.
- source_word: דאגה / ταραχὴ
  english_pob_choice: anxiety
  chosen_spanish: ansiedad
  alternatives_spanish:
  - preocupación
  - angustia
  lexicon: HALOT / Liddell-Scott-Jones
  rationale: El sustantivo designa una inquietud aflictiva; "ansiedad" preserva bien el tono moderno y el peso emocional. "Preocupación" es más débil y "angustia" añade una intensidad que no siempre está explícita en el término.
- source_word: פחד / φόβος
  english_pob_choice: fear
  chosen_spanish: miedo
  alternatives_spanish:
  - temor
  - terror
  lexicon: HALOT / Liddell-Scott-Jones
  rationale: '"Miedo" es la correspondencia más directa y clara en español contemporáneo. "Temor" también sería válido, pero suena más formal; "terror" intensifica demasiado el término.'
- source_word: אימת מות / φόβος θανάτου
  english_pob_choice: the dread of death
  chosen_spanish: el pavor de la muerte
  alternatives_spanish:
  - el terror de la muerte
  - el temor de la muerte
  lexicon: HALOT / Liddell-Scott-Jones
  rationale: La construcción expresa una ansiedad intensa ante la muerte. "Pavor" conserva esa fuerza sin convertirla en exageración; también mantiene la cercanía semántica con la griega φόβος θανάτου y con la hebrea אימה.
- source_word: תחרה ורב / μηνίαμα καὶ ἔρις
  english_pob_choice: bring contention in abundance
  chosen_spanish: provocan mucha contienda
  alternatives_spanish:
  - suscitan gran contienda
  - traen mucha disputa
  lexicon: HALOT / Liddell-Scott-Jones
  rationale: 'El hebreo es comprimido y difícil, y la versión inglesa capta una causalidad plural: estas pasiones producen conflicto. "Provocan mucha contienda" mantiene la idea de causación y cantidad sin sobreexplicar. "Contienda" también permite armonizar con la lista griega de ira y disputa sin imponer una expansión textual en el cuerpo principal.'
- source_word: ועת נוחו / ἐν καιρῷ ἀναπαύσεως
  english_pob_choice: and at the time of his rest
  chosen_spanish: y al tiempo de su reposo
  alternatives_spanish:
  - y cuando descansa
  - y en el tiempo de su descanso
  lexicon: HALOT / Liddell-Scott-Jones
  rationale: '"Al tiempo de su reposo" sigue de cerca la estructura temporal del hebreo y suena natural en español bíblico moderno. Conserva la idea de un momento de descanso, no solo de dormir.'
- source_word: על משכבו / ἐπὶ κοίτης
  english_pob_choice: upon his bed
  chosen_spanish: sobre su lecho
  alternatives_spanish:
  - en su cama
  - en su lecho
  lexicon: HALOT / Liddell-Scott-Jones
  rationale: '"Lecho" conserva el registro literario y bíblico del hebreo/greco, mientras que "sobre" refleja la preposición de manera fiel. "Cama" sería más cotidiano, pero menos elevado.'
- source_word: שינת לילה / ὕπνος νυκτὸς
  english_pob_choice: the sleep of night
  chosen_spanish: el sueño de la noche
  alternatives_spanish:
  - el dormir de la noche
  - el sueño nocturno
  lexicon: HALOT / Liddell-Scott-Jones
  rationale: '"Sueño de la noche" reproduce la construcción genitiva sin forzar un giro extraño. "Sueño nocturno" sería más fluido, pero suaviza demasiado la formulación semítica.'
- source_word: תשנה / ἀλλοιοῖ
  english_pob_choice: changes
  chosen_spanish: cambia
  alternatives_spanish:
  - altera
  - trastorna
  - modifica
  lexicon: HALOT / Liddell-Scott-Jones
  rationale: El verbo señala un cambio real de condición; "cambia" es la opción más directa y suficientemente amplia. En español, "altera" o "trastorna" podrían sugerir una carga interpretativa mayor que la del término base.
- source_word: רעתו / γνῶσιν αὐτοῦ
  english_pob_choice: his misery
  chosen_spanish: su miseria
  alternatives_spanish:
  - su aflicción
  - su desgracia
  - su mal
  lexicon: HALOT / Liddell-Scott-Jones
  rationale: Siguiendo el sentido de condición afligida señalado por el audit trail, "miseria" comunica una situación de padecimiento más que maldad moral. Es una opción fuerte, comprensible y acorde con el paralelismo griego y hebreo.
theological_decisions:
- issue: Base textual hebrea con apoyo del griego para una cláusula difícil
  english_pob_reading: Translate from the extant Hebrew, while allowing the Greek to clarify the compressed phrase and final clause.
  chosen_spanish_reading: Traducir desde el hebreo conservado, dejando que el griego ilumine la idea de contienda y el cambio de la condición afligida.
  alternative_spanish_readings:
  - 'Expandir la lista según el griego: ira, celo, tumulto, etc.'
  - Seguir solo el hebreo de forma más literal y opaca.
  rationale: La fuente primaria disponible para este versículo es el hebreo de Kahana, y el griego funciona como paralelo de control. La redacción española mantiene la concisión del hebreo, pero adopta un término general de contienda que es compatible con el trasfondo griego sin introducir elementos no presentes en la base hebrea.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where Sirach survives; use Greek parallel as actual input'
- issue: Valor de רעה/γνῶσις en la cláusula final
  english_pob_reading: the sleep of night changes his misery
  chosen_spanish_reading: el sueño de la noche cambia su miseria
  alternative_spanish_readings:
  - el sueño de la noche cambia su aflicción
  - el sueño de la noche altera su mal
  rationale: El audit trail indica que el término apunta a la condición afligida del sujeto, no a maldad moral. "Miseria" preserva esa lectura de sufrimiento humano y evita una traducción moralizante.
  doctrine_reference: english_lexical_decisions for רעתו; morphology and parallel Greek ἀλλοιοῖ
translation_notes:
  revision_awareness: 'Se respetó el último pase revisado como sin cambios, pero se atendió el nivel de revisión que señaló asuntos mayores: la solución española evita una ampliación excesiva del griego en el texto principal y mantiene la base hebrea con apoyo del paralelo griego en las notas y decisiones léxicas.'
  spanish_consistency_notes:
  - Se usó "Yahvé" solo cuando no aplica; este versículo no contiene el nombre divino.
  - '"Contienda" se emplea como término amplio para mantener la tensión textual entre el hebreo comprimido y el griego más enumerativo.'
  - 'Se prefirió un registro bíblico moderno y digno: "lecho", "reposo", "miseria".'
  - Las notas usan marcadores únicos y apareados en el texto, sin reutilización.
