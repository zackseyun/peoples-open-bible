id: PHP.2.28
reference: Philippians 2:28
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: σπουδαιοτέρως οὖν ἔπεμψα αὐτὸν ἵνα ἰδόντες αὐτὸν πάλιν χαρῆτε κἀγὼ ἀλυπότερος ὦ.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/002/028.yaml
  text: 'Therefore I sent him all the more eagerly, so that when you see him again you may rejoice, and I may be less distressed.'
translation:
  language: ko
  text: 그러므로 내가 더욱 간절한 마음으로 그를 보냈습니다. 여러분이 그를 다시 보고 기뻐하며, 나도 슬픔이 덜하게 되도록 함입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: σπουδαιοτέρως
  english_pob_choice: all the more eagerly
  chosen_korean: 더욱 간절한 마음으로
  alternatives_korean:
  - 더욱 열심으로
  - 더욱 서둘러
  - 더 큰 긴급함으로
  lexicon: BDAG
  rationale: σπουδαίως의 비교급. 간절함·신속함의 의미를 함께 담는 「더욱 간절한 마음으로」가 한국어로 자연스럽고 그 비교적 강조를 보존한다.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_korean: 그러므로
  alternatives_korean:
  - 그래서
  - 그러니
  lexicon: BDAG
  rationale: 추론·연속을 표시. 「그러므로」가 한국어 담론 흐름에서 자연스럽다.
- source_word: ἔπεμψα
  english_pob_choice: I sent
  chosen_korean: 보내다
  alternatives_korean:
  - 보냈다
  lexicon: BDAG
  rationale: 부정과거. 한국어 단순 과거 「보냈습니다」가 자연스럽다.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_korean: ~ 함입니다
  alternatives_korean:
  - ~하도록
  - ~하기 위함입니다
  lexicon: BDAG
  rationale: 목적을 도입. 한국어 「~함입니다」가 합쇼체에 자연스럽다.
- source_word: ἰδόντες
  english_pob_choice: when you see
  chosen_korean: 보고
  alternatives_korean:
  - 봄으로써
  - 본 뒤에
  lexicon: BDAG
  rationale: ἵνα + 종속절 안의 부정과거 분사를 한국어 연결 어미 「~고」로 자연스럽게 옮긴다.
- source_word: πάλιν
  english_pob_choice: again
  chosen_korean: 다시
  alternatives_korean:
  - 또
  lexicon: BDAG
  rationale: 표준 부사. 「다시」가 자연스럽다.
- source_word: χαρῆτε
  english_pob_choice: you may rejoice
  chosen_korean: 기뻐하다
  alternatives_korean:
  - 즐거워하다
  - 기뻐할 수 있다
  lexicon: BDAG
  rationale: 빌립보서의 「기쁨」 주제를 보존한다.
- source_word: κἀγὼ
  english_pob_choice: and I
  chosen_korean: 나도
  alternatives_korean:
  - 나 또한
  - 그래서 나도
  lexicon: BDAG
  rationale: καί + ἐγώ의 크라시스. 「나도」가 간결하고 자연스럽다.
- source_word: ἀλυπότερος
  english_pob_choice: less distressed
  chosen_korean: 슬픔이 덜하다
  alternatives_korean:
  - 덜 괴롭다
  - 덜 슬프다
  lexicon: BDAG
  rationale: 「슬픔이 덜한 상태」를 가리키는 비교 형용사. 한국어 「슬픔이 덜하다」가 그 비교 의미를 자연스럽게 표현한다.
- source_word: ὦ
  english_pob_choice: I may be
  chosen_korean: 되다
  alternatives_korean:
  - 있다
  lexicon: BDAG
  rationale: εἰμί의 현재 가정법. ἵνα 절의 결과적 의미를 「~게 되다」로 자연스럽게 옮긴다.
