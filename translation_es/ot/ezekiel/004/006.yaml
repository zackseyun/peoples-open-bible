    issue: «esto» por אֵלֶּה
    rationale: El hebreo usa plural («estas cosas»/«estos»). Aunque «esto» puede sonar natural, reduce levemente la referencia a los signos/días anteriores. «estas cosas» preserva mejor el número y el matiz formal.
  - severity: high
    issue: Anclaje incorrecto de la nota al pie
    rationale: La nota explica la repetición «un día por un año, un día por un año», pero el marcador [a] está colocado en «esto». Según las instrucciones, el marcador debe aparecer exactamente en la palabra o frase relevante.
