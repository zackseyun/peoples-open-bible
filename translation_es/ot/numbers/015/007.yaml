translation:
  language: es
  text: y vino para la ofrenda de libación[a], un tercio de un hin[b], ofrecerás, un aroma agradable[c] a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como libación»; el término hebreo se refiere a una ofrenda líquida derramada que acompañaba el sacrificio.
    reason: lexical_alternative
  - marker: b
    text: El hin era una antigua medida de capacidad para líquidos.
    reason: cultural_note
  - marker: c
    text: O «un aroma calmante» o «un aroma de grato olor».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/יַיִן
  english_pob_choice: and wine
  chosen_spanish: y vino
  alternatives_spanish:
  - y con vino
  - y, además, vino
  lexicon: HALOT
  rationale: יַיִן designa el vino común; el prefijo conjuntivo une esta cláusula con las instrucciones sacrificiales anteriores, por lo que ‘y vino’ transmite fielmente la adición sin sobrecargar el español.
- source_word: לַ/נֶּסֶךְ
  english_pob_choice: for the drink offering
  chosen_spanish: para la ofrenda líquida
  alternatives_spanish:
  - para la libación
  - como libación
  lexicon: HALOT
  rationale: נֶסֶךְ alude a una ofrenda derramada junto con el sacrificio. ‘Ofrenda líquida’ conserva la referencia cultual y suena más natural en español bíblico moderno que ‘ofrenda de bebida’, mientras que ‘libación’ es válido pero menos transparente para lectores generales.
- source_word: שְׁלִשִׁית הַ/הִין
  english_pob_choice: a third of a hin
  chosen_spanish: una tercera parte de un hin
  alternatives_spanish:
  - un tercio de un hin
  lexicon: HALOT
  rationale: La expresión cuantifica la ofrenda. Mantener ‘hin’ conserva la medida antigua; ‘una tercera parte de’ reproduce bien la relación fraccionaria sin forzar una equivalencia moderna.
- source_word: תַּקְרִיב
  english_pob_choice: you shall present
  chosen_spanish: ofrecerás
  alternatives_spanish:
  - presentarás
  - traerás
  lexicon: HALOT
  rationale: En contexto sacrificial, el verbo de קרב expresa la acción cultual de presentar u ofrecer. ‘Ofrecerás’ es claro y natural en español, sin perder el sentido ritual.
- source_word: רֵֽיחַ נִיחֹ֖חַ
  english_pob_choice: a pleasing aroma
  chosen_spanish: un aroma agradable
  alternatives_spanish:
  - un aroma placentero
  - un aroma apacible
  lexicon: HALOT
  rationale: La expresión fija sacrificial describe aceptación agradable ante Dios. ‘Aroma agradable’ evita literalismos extraños y preserva la imagen olfativa sin añadir una paráfrasis teológica no requerida.
- source_word: לַ/יהוָֽה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  lexicon: HALOT
  rationale: El Tetragrámaton se traduce aquí con ‘Yahvé’ según la convención del proyecto. La preposición לְ puede expresar dirección/relación cultual; ‘a Yahvé’ conserva la relación de ofrenda dirigida a él.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Nombre divino. En español, ‘Yahvé’ preserva esa forma sin sustituirla por un título, siguiendo la política del proyecto y evitando la convención de ocultarlo con mayúsculas.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de רֵיחַ נִיחֹחַ en lenguaje sacrificial
  english_pob_reading: a pleasing aroma
  chosen_spanish_reading: un aroma agradable
  alternative_spanish_readings:
  - un aroma soothing / calmante
  - un aroma de grato olor
  rationale: La frase hebrea es una expresión cultual estable. ‘Aroma agradable’ conserva la imagen y la aceptación implícita sin introducir una explicación que el hebreo no exige; la construcción funciona bien en español como aposición al acto de ofrecer.
  doctrine_reference: 'POB sacrificial idiom: fixed offering formula; preserve acceptability language without over-literalizing anthropomorphism'
translation_notes:
  revision_awareness: La redacción sigue el ajuste del audit trail inglés que separa con coma la acción de ofrecer y la cláusula de ‘aroma agradable’, reflejando mejor la estructura apposicional del hebreo. Se preserva además la equivalencia cultual de נֶסֶךְ y la medida antigua ‘hin’.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para יהוה, conforme al estándar del proyecto.
  - Se mantiene ‘ofrenda líquida’ para נֶסֶךְ en coherencia con el valor de libación/derramamiento.
  - ‘Aroma agradable’ conserva la fórmula sacrificial sin pasar a un lenguaje explicativo más largo.
  - La puntuación coloca una coma antes de la frase final para reflejar la estructura del hebreo y del pasaje auditado en inglés.
