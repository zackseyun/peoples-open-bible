translation:
  language: es
  text: No te inclinarás ante sus dioses, ni los servirás, ni harás conforme a sus obras; más bien, ciertamente los derribarás y ciertamente harás pedazos sus pilares[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus piedras erguidas» o «sus piedras sagradas». El hebreo se refiere a monumentos de piedra vinculados al culto.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִשְׁתַּחֲוֶה
  english_pob_choice: bow down
  chosen_spanish: te inclinarás
  alternatives_spanish:
  - te postrarás
  - te inclinarás en adoración
  lexicon: HALOT
  rationale: El verbo describe un acto físico de reverencia/prostración. «Te inclinarás» conserva la acción concreta sin convertirla de antemano en el sentido más amplio de «adorar», aunque el contexto claramente lo implica.
- source_word: לֵאלֹהֵיהֶם
  english_pob_choice: to their gods
  chosen_spanish: ante sus dioses
  alternatives_spanish:
  - a sus dioses
  - delante de sus dioses
  lexicon: HALOT
  rationale: Después de «inclinarse», «ante» expresa con naturalidad la dirección o presencia del acto en español. «Dioses» en minúscula conserva que se trata de deidades de las naciones, no del Dios de Israel.
- source_word: תָעָבְדֵם
  english_pob_choice: serve them
  chosen_spanish: los servirás
  alternatives_spanish:
  - los adorarás
  - les rendirás servicio
  lexicon: HALOT
  rationale: עבד aquí puede abarcar servicio cultual. «Servir» preserva con más precisión la fuerza léxica y la distinción entre este verbo y el anterior.
- source_word: תַעֲשֶׂה כְּמַעֲשֵׂיהֶם
  english_pob_choice: do according to their deeds
  chosen_spanish: harás conforme a sus obras
  alternatives_spanish:
  - actuarás como ellos
  - harás como ellos hacen
  - seguirás sus prácticas
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «hacer conforme a sus obras/acciones». «Harás conforme a sus obras» mantiene la correspondencia formal y el sentido de imitación de las prácticas de las naciones.
- source_word: כִּי
  english_pob_choice: rather
  chosen_spanish: más bien
  alternatives_spanish:
  - porque
  - sino
  - en cambio
  lexicon: HALOT
  rationale: Aquí introduce un contraste fuerte con lo prohibido antes. «Más bien» reproduce mejor ese giro adversativo en español que un simple «porque».
- source_word: הָרֵס תְּהָרְסֵם
  english_pob_choice: you shall surely tear them down
  chosen_spanish: los derribarás sin falta
  alternatives_spanish:
  - los destruirás por completo
  - los demolerás completamente
  lexicon: HALOT
  rationale: La construcción con infinitivo absoluto intensifica el mandato. «Sin falta» transmite bien la fuerza enfática sin añadir una paráfrasis excesiva. El objeto puede referirse a los ídolos o a sus monumentos cultuales por metonimia.
- source_word: וְשַׁבֵּר תְּשַׁבֵּר
  english_pob_choice: and surely shatter
  chosen_spanish: y quebrarás sin falta
  alternatives_spanish:
  - y harás pedazos
  - y romperás completamente
  lexicon: HALOT
  rationale: También aquí hay intensificación por infinitivo absoluto más verbo. «Quebrarás sin falta» conserva el énfasis y prepara el objeto concreto que sigue.
- source_word: מַצֵּבֹתֵיהֶם
  english_pob_choice: their pillars
  chosen_spanish: sus pilares
  alternatives_spanish:
  - sus piedras erguidas
  - sus piedras sagradas
  - sus estelas
  lexicon: HALOT
  rationale: מַצֵּבָה designa una piedra erguida o pilar cultual. «Pilares» es breve, legible y compatible con el uso cultual del término; las opciones más explicativas quedan como alternativas.
theological_decisions:
- issue: Alcance de los dos primeros mandatos contra la idolatría
  english_pob_reading: The verse forbids both acts of reverence ('bow down') and cultic allegiance ('serve'), without collapsing the two into a single English term.
  chosen_spanish_reading: El versículo prohíbe tanto el acto externo de inclinarse como el servicio cultual, sin fundir ambos verbos en una sola idea.
  alternative_spanish_readings:
  - No te inclinarás ni adorarás
  - No te postrarás ni les rendirás culto
  rationale: 'El hebreo usa dos verbos distintos, y el español debe conservar esa doble fuerza: reverencia física y servicio religioso continuado. Unificarlos en «adorar» ocultaría la repetición retórica y la amplitud del mandato.'
  doctrine_reference: Translation philosophy items 1 and 5
- issue: Referencia de los mandatos de destrucción
  english_pob_reading: The commands target the nations' cultic objects and symbols associated with their gods, culminating explicitly in 'their pillars.'
  chosen_spanish_reading: Los mandatos apuntan a los objetos e hitos cultuales asociados con los dioses de las naciones, culminando explícitamente en «sus pilares».
  alternative_spanish_readings:
  - Los mandatos se refieren directamente a los dioses en sentido figurado
  - Los mandatos apuntan solo a los ídolos
  rationale: El texto pasa de los dioses y sus obras a la destrucción de objetos tangibles de culto. El español debe evitar sugerir la destrucción literal de deidades, pero conservar el lenguaje enérgico contra la idolatría.
  doctrine_reference: Translation philosophy items 1 and 6
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el borrador actual se alinea con el pasaje auditado y con el alto grado de concordancia del control cruzado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto cuando el texto lo requiera, pero en este versículo no aparece el nombre divino.
  - «Dioses» se deja en minúscula por tratarse de deidades ajenas al Dios de Israel.
  - Se conserva la distinción entre «inclinarse» y «servir» para reflejar los dos verbos hebreos.
  - «Pilares» traduce מַצֵּבֹתֵיהֶם con un término claro y digno; la nota mantiene las alternativas cultuales documentadas.
