    text: O, tradicionalmente, «Satanás». El hebreo usa el título «el Acusador».
    reason: alternative_reading
  - marker: b
    text: O «un tizón rescatado del fuego».
    reason: lexical_alternative
  revision_rationale: 'Se conserva el contenido del borrador, pero se corrigen dos detalles: se mueve la nota [b] al lugar correspondiente según el rastro auditado y se suaviza el vocativo a un español más natural. También se añade ''Sí,'' para reflejar mejor el valor enfático de la repetición hebrea introducida por וְ sin perder fluidez.'
