review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia del griego: genitivo absoluto inicial, verbo principal de exhortación, participio de entregarse al banquete, y el giro final de destinar una parte a la alegría. Sin embargo, «los exhortaba» cambia innecesariamente el aspecto verbal de παρῄνει hacia una acción iterativa/imperfectiva no marcada en español en este contexto narrativo, y «la parte presente del convite» resulta demasiado calcado y poco natural para expresar τὸ παρὸν ... μέρος. Además, falta la nota léxica que el rastro inglés conserva para el giro idiomático καταθέσθαι μέρος.'
  spanish_quality_summary: 'El español es generalmente digno y comprensible, pero contiene rigidez innecesaria: «parte presente» suena poco idiomático y «convite» aquí es menos natural que «banquete» para un registro bíblico amplio. «Los exhortaba» también suena algo más sermónico que «los instó/urgió». Conviene pulir para lograr español más natural sin perder la forma solemne.'
  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. La revisión propuesta mantiene la equivalencia léxica central: συμποσία como «banquete», γεραιρομένους como «honrada desde hace mucho», y καταθέσθαι μέρος con un español idiomático apoyado por nota.'
  issues:
  - severity: medium
    issue: «los exhortaba» suena aspectualmente y estilísticamente menos adecuado que una forma narrativa puntual
    rationale: παρῄνει se tradujo en el POB inglés como «he urged». En español narrativo, «los instó» refleja mejor una acción puntual y evita el tono demasiado homilético de «exhortaba».
  - severity: medium
    issue: «la parte presente del convite» es un calco poco natural
    rationale: Aunque intenta reflejar μέρος y τὸ παρόν, en español amplio «la parte actual de este banquete» o «la presente parte del banquete» es más inteligible. «Convite» además suena más marcado regionalmente/literario que «banquete».
  - severity: low
    issue: Falta la nota alternativa para el giro idiomático καταθέσθαι μέρος
    rationale: El expediente inglés preserva una alternativa léxica importante; debe mantenerse en español por transparencia, especialmente porque el giro griego es comprimido e idiomático.
