revisions:
- from: Así se derramaron mi ira y mi enojo[a], y ardieron en las ciudades de Judá y en las calles de Jerusalén[b], y quedaron en ruina y en desolación, como están hoy.
  to: Así se derramaron mi ira[a] y mi enojo, y ardieron en las ciudades de Judá y en las calles de Jerusalén[b], y se convirtieron en ruina y desolación, como están hoy.
  rationale: Se reubica la nota [a] para que comente el término correcto y se ajusta 'quedaron en' a 'se convirtieron en' para reflejar mejor el sentido resultativo del hebreo, sin cambiar el significado general del borrador.
  reviewer_model: gpt-5.4
