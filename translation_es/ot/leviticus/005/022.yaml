translation:
  language: es
  text: o encuentra un objeto perdido y miente sobre ello[a] y jura en falso, acerca de cualquiera de las cosas que una persona[b] pueda hacer para pecar por ellas—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘lo niega’. El verbo hebreo puede llevar el sentido de una negación falsa en una disputa legal.
    reason: lexical_alternative
  - marker: b
    text: Hebreo ‘el hombre’, usado aquí en sentido genérico legal para cualquier persona.
    reason: cultural_note
lexical_decisions:
- source_word: אֽוֹ
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - u
  lexicon: HALOT
  rationale: Partícula disyuntiva que introduce otra conducta posible dentro de la lista legal.
- source_word: מָצָא אֲבֵדָה
  english_pob_choice: finds lost property
  chosen_spanish: encuentra un objeto perdido
  alternatives_spanish:
  - encuentra una cosa perdida
  - halla un objeto perdido
  lexicon: HALOT
  rationale: El hebreo se refiere a algo perdido hallado en el contexto legal. 'Objeto perdido' mantiene claridad moderna y conserva la referencia jurídica sin sonar demasiado coloquial.
- source_word: וְכִחֶשׁ בָּהּ
  english_pob_choice: and lies about it
  chosen_spanish: y miente acerca de ello
  alternatives_spanish:
  - y lo niega
  - y actúa falsamente respecto de ello
  lexicon: HALOT
  rationale: כחש puede implicar mentir, negar o tratar falsamente. Como el POB inglés preserva la tensión entre mentira y negación, 'miente acerca de ello' mantiene amplitud semántica sin cerrar la lectura a una sola opción.
- source_word: וְנִשְׁבַּע עַל שָׁקֶר
  english_pob_choice: and swears falsely
  chosen_spanish: y jura en falso
  alternatives_spanish:
  - y jura falsamente
  - y presta juramento falso
  lexicon: HALOT
  rationale: Expresión idiomática para prestar un juramento falso; 'jura en falso' es natural en español y conserva la fuerza forense.
- source_word: עַל אַחַת מִכֹּל
  english_pob_choice: about any one of all the things
  chosen_spanish: acerca de cualquiera de todas las cosas
  alternatives_spanish:
  - en cualquiera de todas las cosas
  - sobre cualquiera de todas las cosas
  lexicon: HALOT
  rationale: La construcción distributiva resume las ofensas previas. Se conservó 'cualquiera de todas las cosas' para reflejar la combinación de singular distributivo y totalidad del hebreo, aunque suene algo redundante en español.
- source_word: הָאָדָם
  english_pob_choice: a person
  chosen_spanish: el hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El hebreo usa אָדָם en singular genérico y el POB inglés registró el valor genérico con nota. En español se mantiene 'el hombre' como forma representativa del texto legal, con nota para aclarar su sentido inclusivo; se evita suavizarlo a 'persona' para no perder la huella del original.
- source_word: לַחֲטֹא בָהֵנָּה
  english_pob_choice: to sin by them
  chosen_spanish: para pecar por ellas
  alternatives_spanish:
  - para pecar con ellas
  - para pecar mediante ellas
  lexicon: HALOT
  rationale: El infinitivo con preposición expresa resultado o propósito dentro de la fórmula legal. 'Pecar por ellas' reproduce la relación instrumental sin añadir interpretación excesiva.
theological_decisions:
- issue: Valor genérico de הָאָדָם en una formulación legal
  english_pob_reading: a person
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - una persona
  - alguien
  rationale: Aunque el POB inglés revisado prefirió 'a person' por naturalidad, el hebreo conserva la forma masculina singular אָדָם con valor representativo. En español se retiene 'el hombre' para preservar la huella formal del texto fuente, entendiendo que funciona de manera genérica en la ley.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; tabla de términos controvertidos para אָדָם
- issue: Posible doble sentido de כחש entre negar y mentir
  english_pob_reading: lies about it
  chosen_spanish_reading: miente acerca de ello
  alternative_spanish_readings:
  - lo niega
  - actúa falsamente respecto de ello
  rationale: La evidencia léxica admite tanto 'negar' como 'tratar falsamente'. El español elegido conserva la amplitud del campo semántico y no borra la tensión documental que el POB inglés anotó en su nota alternativa.
  doctrine_reference: HALOT; nota textual/lexical del POB
- issue: Lenguaje de juramento falso
  english_pob_reading: swears falsely
  chosen_spanish_reading: jura en falso
  alternative_spanish_readings:
  - jura falsamente
  - presta juramento falso
  rationale: La forma breve española transmite un acto forense ilícito sin diluir el carácter jurídico del texto.
  doctrine_reference: HALOT; uso legal en Levítico
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que ajustó 'a man' a 'a person' por naturalidad. En español se decidió conservar 'el hombre' para reflejar con mayor transparencia la forma hebrea אָדָם, sin perder el valor genérico legal; se mantuvo también la alternativa semántica de כחש en nota, como hizo el expediente inglés.
  spanish_consistency_notes:
  - Se usó Yahvé como término base en este proyecto solo cuando aparezca el Tetragrámaton; aquí no aparece.
  - Se mantuvo un registro jurídico sobrio y directo, adecuado al tono de Levítico.
  - Se evitó 'SEÑOR' y 'Cristo' por no corresponder al pasaje.
  - La puntuación con raya larga sigue la segmentación casuística del inglés POB y del hebreo.
