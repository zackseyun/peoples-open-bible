translation:
  language: es
  text: Los anillos estaban frente al marco[a], como receptáculos[b] para las varas, para llevar la mesa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "junto al marco"; לְעֻמַּת puede señalar una posición correspondiente o enfrentada respecto de algo cercano.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, "casas para las varas"; es decir, receptáculos o soportes para ellas.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְעֻמַּת
  english_pob_choice: opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - opuesto a
  - correspondiente a
  - junto a
  lexicon: HALOT
  rationale: El hebreo expresa una relación espacial de correspondencia o enfrentamiento. En español, "frente a" comunica bien esa relación sin fijar demasiado la geometría. "Opuesto a" queda como alternativa más literal, pero "frente a" suena más natural en un contexto de descripción de mobiliario sagrado.
- source_word: הַמִּסְגֶּרֶת
  english_pob_choice: the frame
  chosen_spanish: el marco
  alternatives_spanish:
  - el marco estructural
  - el borde
  - la moldura
  lexicon: HALOT
  rationale: En este contexto de utensilio del tabernáculo, el término designa la estructura perimetral de la mesa. "Marco" es un equivalente claro y amplio en español; evita imponer un matiz decorativo que tendría "moldura".
- source_word: הַטַּבָּעֹת
  english_pob_choice: the rings
  chosen_spanish: los anillos
  alternatives_spanish:
  - los aros
  lexicon: HALOT
  rationale: El referente son los aros o anillos de transporte unidos al mueble. "Anillos" es la forma española más estable y transparente en este contexto.
- source_word: בָּתִּים
  english_pob_choice: holders
  chosen_spanish: alojamientos
  alternatives_spanish:
  - soportes
  - receptáculos
  - huecos
  lexicon: HALOT
  rationale: Literalmente significa "casas", pero aquí funciona idiomáticamente como receptáculos para las varas. "Alojamientos" conserva la idea de lugar preparado para recibirlas y evita una traducción demasiado coloquial o demasiado técnica.
- source_word: לַבַּדִּים
  english_pob_choice: for the poles
  chosen_spanish: para las varas
  alternatives_spanish:
  - para los palos
  - para las pértigas
  lexicon: HALOT
  rationale: בַּדִּים son las varas usadas para transportar el mobiliario sagrado. "Varas" es un término bíblico claro en español y encaja mejor que "palos" en este contexto cultual.
- source_word: לָשֵׂאת
  english_pob_choice: to carry
  chosen_spanish: para llevar
  alternatives_spanish:
  - para transportar
  - para cargar
  lexicon: HALOT
  rationale: La infinitiva expresa propósito. "Llevar" es natural en español; "transportar" sería más técnico, pero menos idiomático en una descripción narrativa breve.
- source_word: אֶת הַשֻּׁלְחָן
  english_pob_choice: the table
  chosen_spanish: la mesa
  alternatives_spanish:
  - la mesa de la proposición
  - la mesa
  lexicon: HALOT
  rationale: El hebreo dice simplemente "la mesa". Mantener "la mesa" evita añadir una especificación que no está en este versículo y respeta la referencia inmediata al objeto ya conocido por el contexto.
translation_notes:
  revision_awareness: La revisión inglesa pasó de 'beside' a 'opposite' para reflejar con más precisión לְעֻמַּת como relación de correspondencia/enfrentamiento. La versión española adopta una solución intermedia y natural, 'frente al marco', y conserva la alternativa literal en nota. También se mantiene la idea funcional de 'holders' mediante 'alojamientos', con nota explicativa sobre la literalidad hebrea.
  spanish_consistency_notes:
  - Se usa "varas" para בַּדִּים, acorde con el uso bíblico en mobiliario del tabernáculo.
  - Se usa "mesa" sin expansión interpretativa, ya que el hebreo del versículo es genérico y el contexto identifica el objeto.
  - Se evita "SEÑOR" o sustituciones no pertinentes porque no aparecen nombres divinos en este versículo.
