id: LUK.8.43
reference: Luke 8:43
source:
  edition: SBLGNT
  text: καὶ γυνὴ οὖσα ἐν ῥύσει αἵματος ἀπὸ ἐτῶν δώδεκα, ἥτις ⸂ἰατροῖς προσαναλώσασα ὅλον τὸν βίον⸃ οὐκ ἴσχυσεν ⸀ἀπ’ οὐδενὸς θεραπευθῆναι,
translation:
  text: And a woman who had been in a flow of blood for twelve years[a], and who had spent her whole livelihood on physicians, was not able to be healed by anyone[c][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with a discharge of blood' or more dynamically 'suffering from bleeding.'
    reason: lexical_alternative
  - marker: b
    text: Greek βίος here means her means of living or resources, not her biological 'life.'
    reason: lexical_alternative
  - marker: c
    text: Some manuscripts, reflected in the Textus Receptus and thus the KJV tradition, add that she 'could not be healed by any' after stating that she had spent all her livelihood on physicians; the SBLGNT text includes the inability clause but not the stronger implication that the physicians failed her by explicit addition beyond this wording.
    reason: textual_variant
lexical_decisions:
- source_word: γυνὴ οὖσα
  chosen: a woman who had been
  alternatives:
  - a woman being
  - a woman who was
  lexicon: BDAG
  rationale: The participial construction is rendered idiomatically in English as a relative clause with past perfect/progressive force to fit the narrative backgrounding function.
- source_word: ἐν ῥύσει αἵματος
  chosen: in a flow of blood
  alternatives:
  - with a discharge of blood
  - suffering from bleeding
  lexicon: BDAG
  rationale: A relatively formal rendering preserves the concrete Greek expression without over-paraphrasing. 'Flow of blood' is natural enough in English while retaining the physical specificity of the condition.
- source_word: ἀπὸ ἐτῶν δώδεκα
  chosen: for twelve years
  alternatives:
  - from twelve years
  - for a period of twelve years
  lexicon: BDAG
  rationale: This prepositional phrase expresses duration in context; 'for twelve years' is the idiomatic English equivalent.
- source_word: ἥτις
  chosen: and who
  alternatives:
  - who
  - which woman
  lexicon: BDAG
  rationale: The relative pronoun introduces additional descriptive information about the woman. 'And who' reflects the additive narrative flow after the comma.
- source_word: ἰατροῖς
  chosen: on physicians
  alternatives:
  - on doctors
  - with physicians
  lexicon: BDAG
  rationale: With προσαναλώσασα, the dative marks those on whom her resources were spent. 'Physicians' is slightly more formal and fits the narrative register, though 'doctors' is a viable modern alternative.
- source_word: προσαναλώσασα
  chosen: had spent
  alternatives:
  - having spent
  - had used up
  - had exhausted
  lexicon: BDAG
  rationale: The aorist participle denotes prior action relative to the main verb. 'Had spent' is concise and idiomatic; 'used up' is possible but slightly more interpretive.
- source_word: ὅλον τὸν βίον
  chosen: her whole livelihood
  alternatives:
  - her whole life
  - all her means
  - all she had to live on
  lexicon: BDAG
  rationale: βίος here refers not to biological life but means of living or possessions/resources. 'Her whole livelihood' captures that sense clearly and avoids the misleading 'whole life.'
- source_word: οὐκ ἴσχυσεν
  chosen: was not able
  alternatives:
  - could not
  - did not have the strength
  lexicon: BDAG
  rationale: The verb expresses inability. 'Was not able' is slightly more formal and preserves the explicit notion of incapacity.
- source_word: ἀπ’ οὐδενὸς
  chosen: by anyone
  alternatives:
  - from no one
  - by no one
  lexicon: BDAG
  rationale: Although the form is grammatically neuter/genitive in the table, in context the phrase means 'by no one/anyone.' English idiom prefers 'by anyone' under the negated main verb.
- source_word: θεραπευθῆναι
  chosen: to be healed
  alternatives:
  - to be cured
  - to receive healing
  lexicon: BDAG
  rationale: The passive infinitive denotes being healed/cured. 'To be healed' is the most natural biblical English and preserves the passive sense.
