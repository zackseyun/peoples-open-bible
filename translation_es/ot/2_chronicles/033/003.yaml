translation:
  language: es
  text: Porque reconstruyó los lugares altos[a] que Ezequías, su padre, había derribado, y levantó altares a los Baales[b], e hizo postes de Aserá[c], y se postró[a] a todo el ejército de los cielos[d] y les sirvió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «volvió a edificar»; el hebreo usa dos verbos, literalmente «volvió y edificó», para expresar que restauró lo que había sido quitado.
    reason: lexical_alternative
  - marker: b
    text: «Los Baales» conserva el plural hebreo, probablemente en referencia a múltiples manifestaciones locales o imágenes de Baal; algunas traducciones simplifican a «Baal».
    reason: lexical_alternative
  - marker: c
    text: O simplemente «Aserás»; el término hebreo puede referirse a postes o símbolos cúlticos asociados con la diosa Aserá.
    reason: lexical_alternative
  - marker: d
    text: Aquí «ejército de los cielos» se refiere a cuerpos celestes como objetos de adoración; compárese con 2 Reyes 21:3.
    reason: cross_reference
lexical_decisions:
- source_word: וַיָּשָׁב וַיִּבֶן
  english_pob_choice: he rebuilt
  chosen_spanish: reconstruyó
  alternatives_spanish:
  - volvió a edificar
  - edificó de nuevo
  lexicon: HALOT
  rationale: La secuencia hebrea de volver + construir expresa restauración de algo destruido. «Reconstruyó» comunica naturalmente esa idea en español sin perder el valor restitutivo del doble verbo.
- source_word: הַבָּמוֹת
  english_pob_choice: the high places
  chosen_spanish: los lugares altos
  alternatives_spanish:
  - los altos lugares
  - los santuarios en los lugares altos
  lexicon: HALOT
  rationale: «Lugares altos» conserva el término cultual bíblico y su referencia histórica. Se evita simplificarlo a «santuarios» o «ídolos» para no borrar el dato geográfico-cultual del hebreo.
- source_word: נִתַּץ
  english_pob_choice: had torn down
  chosen_spanish: había derribado
  alternatives_spanish:
  - había demolido
  - había destruido
  lexicon: HALOT
  rationale: El verbo denota derribar estructuras. «Había derribado» es idiomático y fiel a la imagen física del texto.
- source_word: לַבְּעָלִים
  english_pob_choice: the Baals
  chosen_spanish: los Baales
  alternatives_spanish:
  - Baal
  - los baales
  lexicon: HALOT
  rationale: Se conserva el plural hebreo para reflejar la forma del original y la posible referencia a manifestaciones locales o imágenes múltiples. «Baales» es comprensible en español bíblico y mantiene esa tensión lexical.
- source_word: אֲשֵׁרוֹת
  english_pob_choice: Asherah poles
  chosen_spanish: postes de Aserá
  alternatives_spanish:
  - asherás
  - pilares de Aserá
  - imágenes de Aserá
  lexicon: HALOT
  rationale: El término puede referirse a objetos cúlticos asociados con Aserá. «Postes de Aserá» sigue la decisión POB de concretar el objeto sin reducirlo a una paráfrasis general; se preserva el nombre de la deidad en su forma española habitual.
- source_word: וַיִּשְׁתַּחוּ
  english_pob_choice: bowed down
  chosen_spanish: se postró
  alternatives_spanish:
  - se inclinó
  - adoró
  lexicon: HALOT
  rationale: El verbo expresa postración corporal. «Se postró» mantiene el gesto físico y deja que el verbo siguiente complete la idea de culto.
- source_word: לְכָל צְבָא הַשָּׁמַיִם
  english_pob_choice: to all the host of heaven
  chosen_spanish: ante todo el ejército de los cielos
  alternatives_spanish:
  - ante todo el hoste del cielo
  - ante toda la hueste del cielo
  - ante todo el ejército celestial
  lexicon: HALOT
  rationale: «Ejército de los cielos» conserva la imagen bíblica del conjunto astral objeto de adoración. «Ante» refleja el movimiento de postración en español y evita confundir esta expresión con ángeles.
- source_word: וַיַּעֲבֹד אֹתָם
  english_pob_choice: served them
  chosen_spanish: les sirvió
  alternatives_spanish:
  - los sirvió
  - los adoró
  - les rindió culto
  lexicon: HALOT
  rationale: עבד en contexto cúltico puede significar servir o rendir culto. «Les sirvió» preserva la distinción lexica respecto de «se postró» y mantiene una fuerza concreta sin sustituirla por una abstracción interpretativa.
theological_decisions:
- issue: Conservación de términos cúlticos específicos frente a generalizaciones interpretativas
  english_pob_reading: Retain specific terms 'high places,' 'the Baals,' and 'Asherah poles'
  chosen_spanish_reading: Conservar «lugares altos», «los Baales» y «postes de Aserá»
  alternative_spanish_readings:
  - «ídolos»
  - «falsos dioses»
  - «santuarios paganos»
  rationale: El versículo enumera actos concretos de apostasía. Mantener los términos específicos preserva el detalle histórico y cultual del hebreo, en lugar de resumir teológicamente la escena.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Sentido de la expresión astral «host of heaven»
  english_pob_reading: Render as celestial host rather than angelic beings
  chosen_spanish_reading: Entenderla como conjunto celestial/astral, no como ángeles
  alternative_spanish_readings:
  - «hueste celestial» entendida como ángeles
  - «hueste del cielo» con posible sentido angélico
  rationale: En este contexto de culto ilícito junto a Baales y Aserá, la referencia más probable es a cuerpos celestes como objetos de adoración. Traducirlo de modo astral evita introducir una lectura angélica no exigida por el pasaje.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: La traducción inglesa auditada quedó sin cambios en la última revisión y recibió acuerdo alto en la verificación cruzada; esta versión española sigue esa misma lectura estable, conservando los términos cultuales específicos y la distinción entre postración y servicio.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma de referencia divina en el proyecto, pero este versículo no contiene el tetragrámaton ni requiere su inserción.
  - «Baales» se conserva en plural para reflejar el hebreo y evitar la simplificación a singular.
  - «Aserá» se usa como nombre propio cultual en español, con explicación en nota para el objeto asociado.
  - «Se postró» y «les sirvió» se distinguen para reproducir el doble gesto cúltico del hebreo.
  - «Ejército de los cielos» se formula de manera que no sugiera ángeles en este contexto.
