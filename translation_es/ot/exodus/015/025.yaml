  glossary_alignment: Alinea bien con el glosario del proyecto en «Yahvé». No hay conflicto con otros términos teológicos mayores. Conviene acercar חֹק a «estatuto» para mantener la racionalidad léxica documentada, y conservar מִשְׁפָּט como «juicio».
