translation:
  language: es
  text: Tu pueblo santo lo[a] poseyó por poco tiempo[b]; nuestros adversarios han pisoteado tu santuario.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo deja sin expresar el objeto de «poseyó»; el contexto sugiere la tierra o la heredad, no necesariamente el santuario mismo.
    reason: alternative_reading
  - marker: b
    text: O «brevemente»; el hebreo puede expresar brevedad temporal o pequeña extensión.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמִּצְעָר
  english_pob_choice: for a little while
  chosen_spanish: por poco tiempo
  alternatives_spanish:
  - por un poco de tiempo
  - brevemente
  - por breve tiempo
  lexicon: HALOT
  rationale: La forma con ל expresa aquí duración/alcance reducido; en español, «por poco tiempo» comunica de manera natural la brevedad temporal sin añadir una idea de intensidad que el hebreo no exige.
- source_word: יָרְשׁוּ
  english_pob_choice: possessed it
  chosen_spanish: lo poseyó
  alternatives_spanish:
  - lo heredó
  - tomó posesión de ello
  - lo poseyó
  lexicon: HALOT
  rationale: El verbo ירשׁ puede significar heredar, poseer o tomar posesión. En este lamento, «poseyó» conserva el matiz de tenencia/inherencia breve; se mantiene el objeto implícito con «lo», como hace el inglés al suplirlo contextualmente.
- source_word: עַם קָדְשֶׁךָ
  english_pob_choice: your holy people
  chosen_spanish: tu pueblo santo
  alternatives_spanish:
  - el pueblo de tu santidad
  - tu pueblo consagrado
  - tu nación santa
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «el pueblo de tu santidad». «Tu pueblo santo» preserva la pertenencia al pacto («tu») y la cualidad de consagración («santo») con una formulación idiomática en español.
- source_word: צָרֵינוּ
  english_pob_choice: our adversaries
  chosen_spanish: nuestros adversarios
  alternatives_spanish:
  - nuestros enemigos
  - nuestros foes
  lexicon: HALOT
  rationale: צָרֵינוּ denota hostilidad o enemistad. «Adversarios» mantiene un registro elevado y abarcar tanto oposición militar como hostilidad en general, sin estrecharlo innecesariamente a «enemigos».
- source_word: בּוֹסְסוּ
  english_pob_choice: have trampled
  chosen_spanish: han pisoteado
  alternatives_spanish:
  - han aplastado bajo sus pies
  - han hollado
  - han pisado
  lexicon: HALOT
  rationale: בוסס expresa pisar con fuerza, triturar o profanar al pasar. «Han pisoteado» reproduce bien el daño y la irreverencia del acto en español contemporáneo.
- source_word: מִקְדָּשֶׁךָ
  english_pob_choice: your sanctuary
  chosen_spanish: tu santuario
  alternatives_spanish:
  - tu santuario
  - tu lugar santo
  - tu templo
  lexicon: HALOT
  rationale: מקדש es un lugar santo o santuario. «Santuario» conserva el lenguaje de espacio sagrado sin limitarse demasiado a una sola edificación, aunque el templo de Jerusalén está implícito en el contexto.
theological_decisions:
- issue: Objeto implícito de יָרְשׁוּ
  english_pob_reading: Supply 'it' in English, referring contextually to the land/inheritance associated with the holy people.
  chosen_spanish_reading: Conservar un objeto implícito mediante «lo», remitiendo al terreno o heredad del contexto, no al santuario del segundo miembro.
  alternative_spanish_readings:
  - «Tu pueblo santo lo poseyó» sin objeto explícito pero con antecedente lejano
  - «Tu pueblo santo poseyó la tierra»
  rationale: El hebreo no explicita el objeto; el inglés suplió «it» y la lectura contextual apunta a la heredad/tierra. En español, «lo» mantiene la referencia general y evita fusionar indebidamente el primer hemistiquio con «tu santuario» del segundo.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sentido de לַמִּצְעָר
  english_pob_reading: 'Temporal/adverbial: ''for a little while.'''
  chosen_spanish_reading: 'Temporal/adverbial: «por poco tiempo».'
  alternative_spanish_readings:
  - «en pequeña medida»
  - «brevemente»
  - «por un poco de tiempo»
  rationale: En el contexto del lamento, la idea es que la posesión fue breve. «Por poco tiempo» expresa con claridad esa duración limitada sin introducir la idea cuantitativa de «pequeña medida» ni requerir una nota explicativa extensa.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés en dos puntos clave: (1) se mantuvo la temporalidad breve de לַמִּצְעָר sin añadir «solo»; (2) se conservó la separación entre el primer hemistiquio (posesión breve de la heredad) y el segundo (profanación del santuario), evitando identificar ambos objetos. La elección «lo poseyó» sigue la decisión inglesa de suplir un objeto implícito, pero en español se deja igualmente general para no sobreespecificar.'
  spanish_consistency_notes:
  - «Yahvé» no aparece aquí porque el versículo no contiene el nombre divino.
  - Se usa «santuario» para מִקְדָּשׁ, coherente con el registro de espacio sagrado en POB.
  - «Adversarios» conserva un tono lamentativo elevado y evita una simplificación excesiva.
  - La puntuación con punto y coma refleja bien la paralelidad antitética del hebreo.
