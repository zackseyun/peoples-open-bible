translation:
  language: es
  text: 'Entonces el rey dijo[a]: «Que Kimham cruce conmigo, y yo haré por él lo que te parezca bien; y todo lo que escojas poner sobre mí, lo haré por ti».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todo lo que me pidas, lo haré por ti». La expresión hebrea es algo elíptica, literalmente: «todo lo que escojas sobre mí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר הַמֶּלֶךְ
  english_pob_choice: Then the king said
  chosen_spanish: Entonces el rey dijo
  alternatives_spanish:
  - Y el rey dijo
  - Luego el rey dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutivo pide avance secuencial; «Entonces» conserva esa progresión en español sin perder naturalidad.
- source_word: אִתִּי יַעֲבֹר כִּמְהָם
  english_pob_choice: Let Kimham cross over with me
  chosen_spanish: Que Kimham cruce conmigo
  alternatives_spanish:
  - Kimham cruzará conmigo
  - Que Kimham pase conmigo
  lexicon: HALOT
  rationale: El imperfecto funciona con valor jussivo en discurso directo. «Que ... cruce» expresa invitación/decisión y conserva la idea de מעבר/עבר como «cruzar».
- source_word: כִּמְהָם
  english_pob_choice: Kimham
  chosen_spanish: Kimham
  alternatives_spanish:
  - Quimham
  lexicon: Convención de transliteración
  rationale: Se conserva el nombre propio transliterado. En español bíblico puede aparecer «Quimham», pero «Kimham» sigue mejor la forma usada en el audit trail inglés.
- source_word: וַאֲנִי אֶעֱשֶׂה לוֹ
  english_pob_choice: and I will do for him
  chosen_spanish: y yo haré por él
  alternatives_spanish:
  - y yo haré para él
  - y yo actuaré a su favor
  lexicon: HALOT
  rationale: עשה es amplio; «haré por él» mantiene la apertura semántica sin especificar más de lo que el hebreo dice.
- source_word: אֶת הַטּוֹב בְּעֵינֶיךָ
  english_pob_choice: what seems good in your eyes
  chosen_spanish: lo que sea bueno a tus ojos
  alternatives_spanish:
  - lo que parezca bueno a tus ojos
  - lo que es bueno a tus ojos
  - lo que te parezca bien
  lexicon: HALOT
  rationale: La expresión idiomática se vierte de manera comprensible en español, conservando la imagen «a tus ojos». «Sea bueno» refleja el valor potencial/indefinido del hebreo.
- source_word: וְכֹל אֲשֶׁר תִּבְחַר עָלַי
  english_pob_choice: whatever you choose to lay on me
  chosen_spanish: y todo lo que escojas poner sobre mí
  alternatives_spanish:
  - y todo lo que escojas sobre mí
  - y todo lo que pidas de mí
  - y todo lo que decidas cargar sobre mí
  lexicon: HALOT
  rationale: בחר con עלי es elíptico. «Poner sobre mí» preserva la preposición על («sobre/upon mí») y la idea de imponer o asumir una carga/obligación, sin convertirla prematuramente en «pedir».
- source_word: אֶעֱשֶׂה לָּךְ
  english_pob_choice: I will do for you
  chosen_spanish: lo haré por ti
  alternatives_spanish:
  - lo haré para ti
  - haré eso por ti
  - haré por ti
  lexicon: HALOT
  rationale: El español necesita un objeto implícito natural; «lo haré por ti» reproduce la promesa final sin añadir contenido ajeno al hebreo.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético de 2 Samuel 19:39 y coincide con el audit trail inglés en su lectura del jussivo, del hebraísmo con עַל, y de la imagen idiomática «a tus ojos». No se registraron revisiones sustantivas en el pass más reciente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda; este versículo no contiene el nombre divino.
  - Se usa «cruce» para עבר en sentido de atravesar/cruzar el Jordán, manteniendo la continuidad contextual del pasaje.
  - La nota al pie preserva la alternativa semántica de la elipsis hebrea sin sustituirla por una paráfrasis interpretativa en el texto principal.
