translation:
  language: es
  text: 'Entonces Safán, el escriba, vino al rey y le dio un informe, y dijo: «Tus siervos[a] han vaciado la plata que fue hallada en la casa[b] y la han entregado en manos de los obreros, los encargados de la casa de Yahvé»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habían vaciado la plata»; el verbo hebreo también puede entenderse más literalmente como «habían derramado» o «habían vertido».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, el templo; literalmente, «la casa».
    reason: cultural_note
lexical_decisions:
- source_word: שָׁפָן הַסֹּפֵר
  english_pob_choice: Shaphan the scribe
  chosen_spanish: Safán, el escriba
  alternatives_spanish:
  - Safán, el secretario
  lexicon: HALOT
  rationale: סֹפֵר puede significar escriba o secretario real. 'Escriba' preserva mejor la forma léxica y suena natural en español en este contexto cortesano.
- source_word: וַיָּשֶׁב ... דָּבָר
  english_pob_choice: brought back word
  chosen_spanish: le llevó un informe
  alternatives_spanish:
  - le comunicó un mensaje
  - le dio respuesta
  lexicon: HALOT
  rationale: El hebreo usa un giro idiomático de regresar con una palabra o informe. 'Le llevó un informe' conserva la idea de traer noticia al rey sin sonar forzado en español.
- source_word: הִתִּיכוּ
  english_pob_choice: have emptied out
  chosen_spanish: han vaciado
  alternatives_spanish:
  - han derramado
  - han fundido
  lexicon: HALOT
  rationale: En este contexto de manejo de fondos, el verbo no apunta a fundir metal sino a vaciar o volcar la plata desde un recipiente. 'Han vaciado' refleja bien la imagen y el sentido administrativo.
- source_word: הַכֶּסֶף
  english_pob_choice: the silver
  chosen_spanish: la plata
  alternatives_spanish:
  - el dinero
  lexicon: HALOT
  rationale: כֶּסֶף significa literalmente 'plata' y puede extenderse a 'dinero'. Aquí se conserva el valor más literal porque se trata de los fondos recolectados.
- source_word: הַנִּמְצָא בַבַּיִת
  english_pob_choice: that was found in the house
  chosen_spanish: que fue hallada en la casa
  alternatives_spanish:
  - que fue hallada en el templo
  lexicon: HALOT
  rationale: '''Casa'' reproduce el hebreo בַּיִת; el contexto posterior aclara que se trata de la casa de Yahvé. Mantener ''casa'' evita anticipar una aclaración que el texto no formula aquí.'
- source_word: וַיִּתְּנֻהוּ עַל יַד
  english_pob_choice: have delivered it into the hand of
  chosen_spanish: la han entregado en manos de
  alternatives_spanish:
  - la han puesto en manos de
  - la han confiado a
  lexicon: HALOT
  rationale: El hebreo expresa la entrega colocando algo 'en la mano' de otro. 'Han entregado en manos de' conserva esa imagen y comunica claramente la transferencia de responsabilidad.
- source_word: עֹשֵׂי הַמְּלָאכָה
  english_pob_choice: the workmen
  chosen_spanish: los obreros
  alternatives_spanish:
  - los trabajadores
  - los que hacen la obra
  lexicon: HALOT
  rationale: La expresión se refiere a quienes realizaban las reparaciones. 'Obreros' es natural en español y mantiene el sentido laboral del pasaje.
- source_word: הַמֻּפְקָדִים
  english_pob_choice: who are appointed over
  chosen_spanish: los encargados de
  alternatives_spanish:
  - los puestos sobre
  - los que están a cargo de
  lexicon: HALOT
  rationale: El participio pasivo de פקד indica estar designado o puesto a cargo. 'Encargados de' comunica bien esa función supervisora en español.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  lexicon: HALOT
  rationale: Se conserva la expresión literal 'casa de Yahvé' y el nombre divino según la directriz del proyecto, sin sustituirlo por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se rinde como 'Yahvé' conforme a la terminología del proyecto, preservando el nombre propio del Dios del pacto.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton, y la guía del proyecto pide transliterarlo como 'Yahvé'. Se mantiene el nombre personal de Dios en vez de un sustituto litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Referencia de 'la casa'
  english_pob_reading: That is, the temple; literally 'the house.'
  chosen_spanish_reading: la casa
  alternative_spanish_readings:
  - el templo
  rationale: Se conserva el sustantivo literal del hebreo en el cuerpo del texto, dejando que el contexto inmediato identifique que se trata de la casa de Yahvé. Esto respeta la tensión entre literalidad y referencia contextual.
  doctrine_reference: Nota cultural/lexical sobre בַּיִת en contextos del templo
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que prefirió 'emptied out' frente a 'poured out' y 'delivered it' frente a 'put it', por lo que el español usa 'han vaciado' y 'han entregado' para reflejar mejor el movimiento de transferencia y la naturalidad del contexto administrativo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יְהוָה.
  - Se conserva 'casa' en el cuerpo principal y se aclara su referencia en nota.
  - '''Escriba'' se usa para שָׁפָן הַסֹּפֵר, siguiendo el valor léxico más directo.'
  - Se evita sustituir 'plata' por 'dinero' para no perder la literalidad del término hebreo.
