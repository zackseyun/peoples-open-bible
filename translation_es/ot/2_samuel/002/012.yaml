translation:
  language: es
  text: Entonces Abner hijo de Ner[a] y los siervos de Is-bóset hijo de Saúl salieron de Mahanaim hacia Gabaón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo “Ish-bosheth”; el mismo hombre es llamado “Esh-baal” en 1 Crónicas 8:33; 9:39.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: Then ... went out
  chosen_spanish: Entonces ... salieron
  alternatives_spanish:
  - Y ... salieron
  - Partieron
  lexicon: WLC / HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» conserva ese empuje narrativo en español. Aunque el verbo hebreo está en singular, el sujeto coordinado en español funciona de manera natural en plural, como en el inglés auditado.
- source_word: אַבְנֵר בֶּן נֵר
  english_pob_choice: Abner son of Ner
  chosen_spanish: Abner hijo de Ner
  alternatives_spanish:
  - Abner, hijo de Ner
  lexicon: WLC
  rationale: Se mantiene la forma propia del nombre y el patronímico literal «hijo de» por fidelidad al hebreo y a la práctica del POB.
- source_word: וְעַבְדֵי
  english_pob_choice: the servants of
  chosen_spanish: los esclavos de
  alternatives_spanish:
  - los siervos de
  - los servidores de
  lexicon: HALOT
  rationale: El POB inglés eligió «servants» para conservar el vínculo léxico con עבד sin especificar demasiado el rango. En español, «esclavos» preserva mejor esa fuerza léxica que «siervos», aunque sigue siendo una elección contextual; aquí se entiende como dependientes/retén militar-political de Is-bóset.
- source_word: אִישׁ בֹּשֶׁת
  english_pob_choice: Ish-bosheth
  chosen_spanish: Is-bóset
  alternatives_spanish:
  - Ish-bóset
  - Esh-baal
  lexicon: Convención onomástica bíblica; cf. 2 Sam 2:10-12
  rationale: Se conserva la forma hebrea del nombre en español y se refleja la misma decisión auditada del inglés, que en esta perícopa mantiene la lectura masorética de Samuel.
- source_word: בֶּן שָׁאוּל
  english_pob_choice: son of Saul
  chosen_spanish: hijo de Saúl
  alternatives_spanish:
  - descendiente de Saúl
  lexicon: WLC
  rationale: Se traduce literalmente el patronímico para identificar a Is-bóset dentro del linaje narrativo.
- source_word: מִמַּחֲנַיִם
  english_pob_choice: from Mahanaim
  chosen_spanish: de Mahanaim
  alternatives_spanish:
  - desde Mahanaim
  lexicon: WLC
  rationale: La preposición מִן admite «de» o «desde»; se usa «de» para una salida de origen más fluida en español, sin añadir énfasis espacial no requerido.
- source_word: גִּבְעוֹנָה
  english_pob_choice: to Gibeon
  chosen_spanish: hacia Gabaón
  alternatives_spanish:
  - a Gabaón
  - a Gibeón
  lexicon: WLC
  rationale: La he direccional indica movimiento hacia el lugar. «Hacia» reproduce bien ese valor de orientación sin forzar una preposición demasiado cerrada. Se usa «Gabaón» como forma española ampliamente reconocible.
theological_decisions:
- issue: Nombre de Is-bóset frente a la variante Esh-baal
  english_pob_reading: The verse uses Ish-bosheth, with a footnote noting the Chronicles variant Eshbaal.
  chosen_spanish_reading: Se usa Is-bóset, con nota que remite a la variante Esh-baal en Crónicas.
  alternative_spanish_readings:
  - Ish-bóset con nota
  - Esh-baal
  rationale: La decisión sigue el hebreo masorético de Samuel y preserva la tensión textual documentada por el POB inglés entre la forma de Samuel y la variante de Crónicas. No se armoniza artificialmente el nombre.
  doctrine_reference: 2 Samuel 2:10-12; 1 Crónicas 8:33; 9:39
translation_notes:
  revision_awareness: 'El pasaje coincide con la revisión más reciente del POB inglés: no hubo cambios necesarios y se mantiene la lectura masorética, la estructura narrativa y la nota sobre la variante onomástica.'
  spanish_consistency_notes:
  - Se mantiene el tono narrativo sobrio y directo propio del POB.
  - Se usa «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva la distinción entre nombres propios transliterados y topónimos españoles ampliamente establecidos, como Gabaón.
