review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: giro/búsqueda alrededor, ausencia de ayudante, búsqueda de apoyo y negación final. Sin embargo, la nota al pie no preserva con suficiente fidelidad la nota del POB en inglés: allí se explica que el hebreo puede leerse como «busqué apoyo» y que el griego explicita «ayuda de los hombres». En español, la nota actual solo comenta «me volví», cuando el problema textual principal documentado recae en la segunda cola. También conviene hacer más natural «no había ninguno» en relación con «apoyo».'
  spanish_quality_summary: El texto es legible y digno, pero «no había ninguno» suena algo rígido y menos idiomático con un sustantivo abstracto como «apoyo». «No había» reproduce mejor la tersura hebrea y suena más natural en español bíblico actual. Además, el anclaje de la nota está puesto en «Me volví», aunque el contenido de la nota debería ir con la frase de «busqué apoyo».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones «me volví», «me ayudara» y «apoyo» son defendibles. La principal corrección necesaria es de nota crítica y de naturalidad sintáctica, no de glosario teológico.
  issues:
  - severity: medium
    issue: La nota al pie está anclada y formulada sobre la primera cláusula, pero la evidencia y la nota inglesa se centran en la segunda cláusula («busqué apoyo» / ayuda humana en el griego).
    rationale: 'El POB inglés documenta explícitamente: «Hebrew: ‘I looked for support’; the Greek parallel reads more explicitly…». La nota española actual dice «Hebreo: ‘me volví’…», lo cual desplaza indebidamente el foco textual.'
  - severity: medium
    issue: «No había ninguno» es poco natural con «apoyo».
    rationale: En español, con un abstracto como «apoyo», la negación existencial breve «y no había» suena más idiomática y conserva mejor la concisión del hebreo וְאָיִן.
  - severity: low
    issue: La supresión de «alrededor» en el texto principal es aceptable, pero no debe compensarse con una nota mal enfocada.
    rationale: «Me volví» puede implicar el giro; no hace falta corregirlo necesariamente. El verdadero ajuste requerido está en la nota y en la clausula final.
  revised_spanish_text: Me volví y no había quien me ayudara; busqué apoyo[a], y no había.
