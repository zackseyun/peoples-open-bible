  to: Pero cierto Dositeo, uno de los de Bacenor, hombre montado y fuerte, tenía sujeto a Gorgias; y, al tomar su capa, lo iba arrastrando con fuerza, queriendo tomar vivo a aquel maldito, cuando uno de los jinetes tracios se lanzó contra él y le dejó destrozado el hombro[a], y Gorgias escapó a Marisá.
