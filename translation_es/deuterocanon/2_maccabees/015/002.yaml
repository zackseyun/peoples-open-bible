translation:
  language: es
  text: 'Pero cuando los judíos que estaban siendo obligados a acompañarlo dijeron: «No los destruyas[a] de manera tan salvaje y bárbara; más bien, da[b] honor al día que ha sido especialmente honrado en santidad por el que vela por todo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No los mates de manera tan salvaje y bárbara». El verbo griego puede significar matar o destruir.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «da/asigna honor a». La expresión indica el respeto debido al día sagrado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τῶν ... Ἰουδαίων
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeos
  - los habitantes de Judea
  lexicon: LSJ
  rationale: Ἰουδαῖοι aquí funciona como designación del pueblo judío en general, no solo como gentilicio geográfico. «Los judíos» es la forma natural y fiel en español.
- source_word: κατὰ ἀνάγκην συνεπομένων αὐτῷ
  english_pob_choice: who were being compelled to accompany him
  chosen_spanish: que iban siendo obligados a acompañarlo
  alternatives_spanish:
  - que eran forzados a ir con él
  - que lo seguían bajo compulsión
  lexicon: LSJ
  rationale: La frase expresa coacción y compañía forzada. «Iban siendo obligados a acompañarlo» conserva el matiz de presión externa y el sentido de ir con él.
- source_word: Μηδαμῶς
  english_pob_choice: Do not ... in any way
  chosen_spanish: No ... de manera tan ...
  alternatives_spanish:
  - De ningún modo ...
  - No ... en absoluto
  lexicon: LSJ
  rationale: Es una prohibición enfática. En español, el refuerzo natural se integra con «de manera tan...», que mantiene el tono urgente del ruego.
- source_word: ἀγρίως καὶ βαρβάρως
  english_pob_choice: in so savage and barbarous a way
  chosen_spanish: de manera tan salvaje y bárbara
  alternatives_spanish:
  - de forma tan cruel y bárbara
  - tan salvaje y brutalmente
  lexicon: LSJ
  rationale: Los dos adverbios intensifican la brutalidad del acto propuesto. «Salvaje y bárbara» preserva la duplicación retórica sin suavizarla.
- source_word: ἀπολέσῃς
  english_pob_choice: destroy
  chosen_spanish: destruyas
  alternatives_spanish:
  - mates
  - aniquiles
  lexicon: LSJ
  rationale: ἀπόλλυμι puede significar destruir o matar según el contexto. «Destruyas» sigue la elección inglesa y deja abierta la amplitud semántica documentada.
- source_word: δόξαν δὲ ἀπομέρισον
  english_pob_choice: rather, assign honor
  chosen_spanish: más bien, da honor
  alternatives_spanish:
  - más bien, asigna honor
  - más bien, distribuye gloria
  lexicon: LSJ
  rationale: δόξα aquí se entiende como honor debido, no como «gloria» teológica abstracta. En español, «da honor» comunica la idea de respetar el día sagrado de forma idiomática.
- source_word: τῇ προτετιμημένῃ ... ἡμέρᾳ
  english_pob_choice: the day that has been specially honored
  chosen_spanish: al día que ha sido especialmente honrado
  alternatives_spanish:
  - al día que ha sido preferido
  - al día que ha sido puesto por encima de otros
  lexicon: LSJ
  rationale: προτετιμημένῃ expresa una preferencia o distinción ya otorgada. «Especialmente honrado» conserva esa idea de un día con estatuto distinguido.
- source_word: ὑπὸ τοῦ πάντα ἐφορῶντος
  english_pob_choice: by the One who watches over all
  chosen_spanish: por el que vigila sobre todo
  alternatives_spanish:
  - por el que ve todas las cosas
  - por el que supervisa todo
  lexicon: LSJ
  rationale: El participio articular es una circunlocución reverente para Dios. «Vigila sobre todo» mantiene el matiz providencial y reverente, con español natural.
- source_word: μεθʼ ἁγιότητος
  english_pob_choice: in holiness
  chosen_spanish: en santidad
  alternatives_spanish:
  - con santidad
  - como algo santo
  lexicon: LSJ
  rationale: La frase modifica la manera en que el día ha sido distinguido. «En santidad» conserva el ámbito cultual/sacro sin sobreinterpretar.
theological_decisions:
- issue: Circunlocución reverente para Dios en τοῦ πάντα ἐφορῶντος
  english_pob_reading: the One who watches over all
  chosen_spanish_reading: el que vigila sobre todo
  alternative_spanish_readings:
  - el que ve todas las cosas
  - el Vigilante de todo
  rationale: El griego alude reverentemente a Dios sin nombrarlo directamente. La traducción mantiene esa referencia personal y providente sin introducir terminología más confesional de la que el texto exige.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Estado del día señalado
  english_pob_reading: the day that has been specially honored in holiness
  chosen_spanish_reading: el día que ha sido especialmente honrado en santidad
  alternative_spanish_readings:
  - el día santificado de modo especial
  - el día distinguido en santidad
  rationale: El griego subraya la condición distinguida del día, pero no usa un verbo finito que obligue a «santificado». «Honrado en santidad» conserva la fuerza sacra y la relación con la santidad sin exceder la forma verbal del original.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La versión española sigue el último estado revisado del POB inglés, que ajustó la cláusula final de «preferred in holiness» a «specially honored in holiness». Se conservó la doble fuerza adverbial de ἀγρίως καὶ βαρβάρως y la ambigüedad léxica de ἀπολέσῃς con una nota alternativa en español.
  spanish_consistency_notes:
  - Se usa «judíos» como término étnico-religioso estándar, coherente con el contexto de 2 Macabeos.
  - Se traduce el nombre divino circunlocutorio con una perífrasis reverente y no con un título eclesiástico añadido.
  - «Santidad» se reserva para el campo cultual; no se reemplaza por «santidad»/«sagrado» de manera inconsistente dentro del versículo.
  - Se mantiene un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
