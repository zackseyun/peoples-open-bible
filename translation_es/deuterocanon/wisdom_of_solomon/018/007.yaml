translation:
  language: es
  text: Así, tu pueblo esperaba[a] tanto la salvación[b] de los justos como la destrucción de sus enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aguardaba» o «recibía con expectación»; el verbo griego puede denotar espera ansiosa o espera receptiva.
    reason: lexical_alternative
  - marker: b
    text: O «liberación» de los justos.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσεδέχθη
  english_pob_choice: expected
  chosen_spanish: esperaba
  alternatives_spanish:
  - aguardaba
  - recibía con expectación
  lexicon: LSJ
  rationale: El verbo προσδέχομαι puede expresar esperar con anticipación o aguardar. «Esperaba» conserva la expectativa activa del contexto y suena natural en español, sin debilitar el matiz de espera confiada.
- source_word: λαοῦ σου
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu nación
  - tu gente
  lexicon: LSJ
  rationale: λαός se refiere al pueblo colectivo en relación con Dios. «Tu pueblo» reproduce bien la dirección posesiva y el sentido bíblico-covenantal sin introducir una palabra menos precisa como «nación».
- source_word: σωτηρία
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  - rescate
  lexicon: LSJ
  rationale: «Salvación» mantiene el peso teológico del término y sigue siendo apropiado en este contexto de rescate histórico y juicio. «Liberación» sería posible, pero reduce el registro teológico.
- source_word: δικαίων
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos de corazón
  lexicon: LSJ
  rationale: δικαίων es genitivo plural de «justos/rectos». «Los justos» es la equivalencia más natural y fiel en español para la categoría moral del texto.
- source_word: ἐχθρῶν
  english_pob_choice: their enemies
  chosen_spanish: sus enemigos
  alternatives_spanish:
  - los enemigos
  - enemigos
  lexicon: LSJ
  rationale: El griego presenta simplemente «de enemigos» en contraste con «de justos». En español, «sus enemigos» hace explícita la relación implícita con el pueblo de Dios y coincide con la decisión auditada del POB inglés.
- source_word: ἀπωλία
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - perdición
  lexicon: LSJ
  rationale: ἀπωλία denota destrucción o ruina. «Destrucción» preserva mejor el contraste directo con «salvación» y mantiene la fuerza judicial del pasaje.
theological_decisions:
- issue: Mantener el paralelismo de dos resultados divinos sin suavizar el juicio
  english_pob_reading: 'The verse is rendered as a paired expectation: salvation for the righteous and destruction for their enemies.'
  chosen_spanish_reading: 'El versículo queda como una expectativa doble: salvación para los justos y destrucción para sus enemigos.'
  alternative_spanish_readings:
  - liberación para los justos y ruina para sus enemigos
  - salvación de los justos y perdición de sus enemigos
  rationale: El griego estructura una contraposición explícita con μὲν...δὲ. La redacción española conserva ese paralelismo y la tensión entre rescate y juicio, sin atenuar ninguno de los dos polos.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: 'No se requieren revisiones respecto del texto inglés auditado: el griego y la traducción inglesa coinciden en la lectura de una expectativa doble, con el matiz lexical de προσδέχομαι preservado en español mediante «esperaba».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero aquí no aparece el tetragrámaton en el texto griego de esta unidad.
  - Se eligió «salvación» en vez de «liberación» para conservar el registro teológico que el POB inglés documentó como preferente.
  - «Justos» se usa como equivalente estable de δικαίων; evita la perífrasis y conserva la antítesis con «enemigos».
  - La nota de «sus enemigos» refleja la relación implícita que el griego deja elíptica y que el inglés auditado hizo explícita por claridad.
