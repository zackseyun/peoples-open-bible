revisions:
- from: Así que todos los ancianos de Israel fueron al rey en Hebrón[a], y el rey David hizo un pacto con ellos en Hebrón, delante de Yahvé[b], y ungieron a David como rey sobre Israel.
  to: Entonces todos los ancianos de Israel vinieron al rey en Hebrón, y el rey David hizo un pacto[a] con ellos en Hebrón, delante de Yahvé[b], y ungieron a David como rey sobre Israel.
  rationale: Se ajusta 'fueron' a 'vinieron' para reflejar mejor וַיָּבֹאוּ en este contexto; se reemplaza 'Así que' por 'Entonces' para una secuencia narrativa más natural; y se corrige la nota [a] para que documente la idiomaticidad de כרת ברית, en línea con el rastro auditado inglés, mientras se conserva la nota alternativa sobre לִפְנֵי יְהוָה.
