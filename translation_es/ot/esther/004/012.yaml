lexical_decisions:
- source_word: וַיַּגִּידוּ
  english_pob_choice: And they told
  chosen_spanish: Y se lo dijeron
  alternatives_spanish:
  - Y le informaron
  - Y le comunicaron
  lexicon: HALOT
  rationale: El verbo הִגִּיד en esta forma narrativa introduce la siguiente acción con un sujeto plural no especificado. En español, «decirlo» reproduce de manera natural la comunicación directa y mantiene el tono narrativo simple del hebreo.
- source_word: לְמָרְדֳּכָי
  english_pob_choice: Mordecai
  chosen_spanish: a Mardoqueo
  alternatives_spanish:
  - a Mordejai
  lexicon: Nombre propio bíblico
  rationale: El dativo hebreo se expresa con la preposición «a». Se usa la forma tradicional y ampliamente reconocible «Mardoqueo» para la recepción eclesial en español, sin perder la identificación del personaje.
- source_word: דִּבְרֵי
  english_pob_choice: words
  chosen_spanish: las palabras
  alternatives_spanish:
  - el mensaje
  - la respuesta
  lexicon: HALOT
  rationale: El constructo plural de דָּבָר puede significar «palabras», «mensaje» o «respuesta». Se conserva «palabras» por su mayor transparencia formal y porque el hebreo enfatiza el contenido verbal concreto de Ester.
- source_word: אֶסְתֵּר
  english_pob_choice: Esther’s
  chosen_spanish: de Ester
  alternatives_spanish:
  - de Esther
  lexicon: Nombre propio bíblico
  rationale: La relación de constructo se expresa de forma natural en español con «de Ester». Evita sobreinterpretar si se trata de «mensaje» o «respuesta» y mantiene la ambigüedad lexicográfica documentada en el audit trail.
translation_notes:
  revision_awareness: El texto sigue el consenso alto del audit trail inglés, sin cambios revisionales reportados; se mantiene la misma estructura narrativa y la misma ambigüedad léxica documentada para דִּבְרֵי.
  spanish_consistency_notes:
  - Se conserva un registro bíblico claro y sobrio, con «Mardoqueo» como forma estable en español.
  - Se evita una paráfrasis excesiva y se mantiene la relación de constructo mediante «las palabras de Ester».
  - La nota textual en pie de página preserva las alternativas semánticas reconocidas por el POB en inglés.
