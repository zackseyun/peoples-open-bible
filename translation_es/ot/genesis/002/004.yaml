translation:
  language: es
  text: Estas son las generaciones[a] de los cielos y la tierra cuando fueron creados, en el día en que[b] Yahvé[c] Dios hizo la tierra y los cielos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo toledot, frecuente como fórmula de sección en Génesis; también puede significar «relato», «historia» u «orígenes».
    reason: lexical_alternative
  - marker: b
    text: La expresión hebrea «en el día en que» es un modismo que significa «cuando» o «al tiempo que».
    reason: lexical_alternative
  - marker: c
    text: El nombre divino hebreo es YHWH; en esta traducción se vierte como «Yahvé».
    reason: alternative_reading
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Esta es
  lexicon: HALOT
  rationale: El demostrativo plural introduce una fórmula de encabezado. En español, "Estos son" conserva el plural explícito del hebreo y suena natural en un registro bíblico claro.
- source_word: תוֹלְדוֹת
  english_pob_choice: generations
  chosen_spanish: descendientes
  alternatives_spanish:
  - generaciones
  - historia
  - relato
  - orígenes
  lexicon: HALOT
  rationale: Aquí el término funciona como fórmula estructural de Génesis y puede referir a lo que procede de algo o a su registro. "Descendientes" conserva la idea de procedencia/engendramiento y evita un español demasiado calcado o ambiguo en este encabezado.
- source_word: הַשָּׁמַיִם וְהָאָרֶץ
  english_pob_choice: the heavens and the earth
  chosen_spanish: los cielos y de la tierra
  alternatives_spanish:
  - el cielo y la tierra
  - los cielos y la tierra
  lexicon: HALOT
  rationale: '"Cielos" mantiene el plural hebreo de שָׁמַיִם y el merismo de la creación; "tierra" refleja אָרֶץ. Se repite la preposición para una coordinación española fluida sin perder el paralelismo del original.'
- source_word: בְּהִבָּרְאָם
  english_pob_choice: when they were created
  chosen_spanish: cuando fueron creados
  alternatives_spanish:
  - al ser creados
  - cuando fueron traídos a existencia
  lexicon: HALOT
  rationale: La construcción temporal con בְּ más infinitivo se vierte naturalmente como "cuando". El pasivo de ברא se conserva con "fueron creados", que es claro y fiel.
- source_word: בְּיוֹם
  english_pob_choice: in the day that
  chosen_spanish: en el día en que
  alternatives_spanish:
  - cuando
  - al tiempo que
  lexicon: HALOT
  rationale: Se conserva el valor idiomático de la expresión hebrea y su tono literario, pero con una forma española natural. "En el día en que" mantiene el enlace temporal sin sonar forzado.
- source_word: עֲשׂוֹת
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - creó
  - formó
  lexicon: HALOT
  rationale: El infinitivo de עשה con el giro temporal se traduce de forma directa. "Hizo" es el equivalente más neutro y preciso para el verbo en esta cláusula.
- source_word: יְהוָה אֱלֹהִים
  english_pob_choice: the LORD God
  chosen_spanish: Yahvé Dios
  alternatives_spanish:
  - el SEÑOR Dios
  - Yahweh Dios
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para יְהוָה: "Yahvé" en el texto principal, sin la convención de máscara "SEÑOR". "Dios" conserva el segundo miembro del nombre compuesto.'
- source_word: אֶרֶץ וְשָׁמָיִם
  english_pob_choice: earth and heavens
  chosen_spanish: la tierra y los cielos
  alternatives_spanish:
  - la tierra y el cielo
  - la tierra y los cielos
  lexicon: HALOT
  rationale: Se mantiene el orden invertido del hebreo final y se añaden artículos para reflejar con precisión la referencia definida del original. "Cielos" preserva el plural hebreo.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: El paquete fuente y la política del proyecto para español requieren preservar el nombre divino como "Yahvé" en el texto principal. Esto evita la convención litúrgica de sustitución y hace visible el Tetragrámaton en la traducción.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de תוֹלְדוֹת en una fórmula de encabezado
  english_pob_reading: generations
  chosen_spanish_reading: descendientes
  alternative_spanish_readings:
  - generaciones
  - historia
  - orígenes
  rationale: La palabra puede indicar descendencia y también la sección o registro resultante. "Descendientes" conserva la tensión entre genealogía y encabezado estructural sin imponer una sola lectura interpretativa.
  doctrine_reference: Génesis 2:4 fórmula de toledot; lexical note
translation_notes:
  revision_awareness: El texto inglés auditado pasó por una revisión que añadió los artículos definidos en la cláusula final («the earth and the heavens») para reflejar mejor el hebreo. La versión española también conserva esa definición con «la tierra y los cielos», y mantiene el orden invertido del último miembro para reflejar la estructura del original.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al criterio del proyecto para español.
  - Se mantiene «cielos» en plural para reflejar el hebreo שָׁמַיִם en ambos miembros del versículo.
  - La fórmula temporal se vierte con un giro natural en español («en el día en que»), sin perder el paralelismo del hebreo.
