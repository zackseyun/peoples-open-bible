translation:
  language: es
  text: Pero Ezequías se humilló[a] por la altivez de su corazón, él y los habitantes de Jerusalén, y no vino sobre ellos la ira de Yahvé en los días de Ezequías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a causa de la altivez de su corazón». La expresión hebrea dice literalmente «en/por la altura de su corazón», un modismo para orgullo o arrogancia interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכָּנַע
  english_pob_choice: humbled himself
  chosen_spanish: se humilló
  alternatives_spanish:
  - se sometió
  - se rebajó
  lexicon: HALOT
  rationale: El nifal de כנע tiene sentido reflexivo/medio en este contexto. «Se humilló» comunica con naturalidad la acción voluntaria de Ezequías, sin perder el matiz de autoabajamiento implícito en el hebreo.
- source_word: בְּגֹבַהּ לִבּוֹ
  english_pob_choice: for the pride of his heart
  chosen_spanish: por la altivez de su corazón
  alternatives_spanish:
  - por el orgullo de su corazón
  - a causa de la exaltación de su corazón
  lexicon: HALOT
  rationale: La expresión hebrea literalmente alude a la «altura» del corazón, es decir, orgullo o haughtiness. «Altivez» conserva mejor la imagen de elevación y el tono moral que una paráfrasis más suave.
- source_word: הוּא וְיֹשְׁבֵי יְרוּשָׁלָם
  english_pob_choice: he and the inhabitants of Jerusalem
  chosen_spanish: él y los habitantes de Jerusalén
  alternatives_spanish:
  - él y los residentes de Jerusalén
  - él mismo y los moradores de Jerusalén
  lexicon: HALOT
  rationale: «Habitantes» reproduce de forma estándar el sentido civil de יֹשְׁבֵי. Se mantiene el pronombre enfático «él» para reflejar que Ezequías está explícitamente incluido junto con el pueblo.
- source_word: קֶצֶף יְהוָה
  english_pob_choice: the wrath of Yahweh
  chosen_spanish: la ira de Yahvé
  alternatives_spanish:
  - el furor de Yahvé
  - la indignación de Yahvé
  lexicon: HALOT
  rationale: En contextos de juicio, קֶצֶף expresa ira/indignación divina. «Ira» es el equivalente español más directo y digno; se conserva «Yahvé» conforme al criterio del proyecto para יְהוָה.
- source_word: וְלֹא בָא עֲלֵיהֶם
  english_pob_choice: did not come upon them
  chosen_spanish: y no vino sobre ellos
  alternatives_spanish:
  - y no cayó sobre ellos
  - y no se abatió sobre ellos
  lexicon: HALOT
  rationale: La locución בוא על comunica que algo sobreviene a personas, a menudo en sentido de juicio. «Vino sobre ellos» mantiene la imagen verbal sin sobreinterpretar.
- source_word: בִּימֵי יְחִזְקִיָּהוּ
  english_pob_choice: in the days of Hezekiah
  chosen_spanish: en los días de Ezequías
  alternatives_spanish:
  - durante los días de Ezequías
  - en tiempos de Ezequías
  lexicon: HALOT
  rationale: Es la forma idiomática normal en español bíblico para indicar el período de su reinado o vida, sin precisar más de lo que permite el hebreo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. En coherencia con el criterio del proyecto, se preserva el nombre divino con «Yahvé» y no se lo reemplaza por un título enmascarado.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'El pasaje coincide ampliamente con la auditoría inglesa: se conserva la lectura reflexiva de וַיִּכָּנַע, el valor idiomático de בְּגֹבַהּ לִבּוֹ como orgullo interior, la inclusión enfática de Ezequías junto con Jerusalén, y la decisión de traducir el Tetragrámaton por «Yahvé». No se detectan cambios de revisión que alteren la redacción de fondo.'
  spanish_consistency_notes:
  - Se mantiene un español bíblico moderno y claro, sin recurrir a «el SEÑOR».
  - Se conserva la tensión semántica de «altura»/orgullo mediante «altivez» y la nota alternativa.
  - «Habitantes de Jerusalén» evita una paráfrasis excesiva y mantiene el referente colectivo.
  - La puntuación separa con claridad la cláusula causal y la cláusula resultativa.
  - El nombre propio Ezequías se conserva en su forma española estándar.
