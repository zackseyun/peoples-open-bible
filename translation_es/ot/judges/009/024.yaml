translation:
  language: es
  text: para que recaiga[a] la violencia cometida contra los setenta hijos de Jerubaal, y su sangre sea cargada sobre[b] Abimelec, su hermano, que los mató, y sobre los líderes de Siquem[c], que fortalecieron sus manos[d] para matar a sus hermanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ‘que venga’; la expresión apunta al resultado o la consecuencia del crimen, es decir, que recaiga sobre los culpables.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘su sangre sea puesta sobre’; es un modismo para atribuir culpa o responsabilidad por el derramamiento de sangre.'
    reason: lexical_alternative
  - marker: c
    text: O ‘los señores de Siquem’; el hebreo se refiere a los hombres principales o detentadores de poder de la ciudad.
    reason: lexical_alternative
  - marker: d
    text: 'Hebreo: ‘fortalecieron sus manos’, es decir, lo apoyaron o respaldaron.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָבֹוא
  english_pob_choice: might come
  chosen_spanish: venga
  alternatives_spanish:
  - viniera
  - pudiera venir
  - llegue
  lexicon: HALOT
  rationale: El infinitivo con ל expresa aquí finalidad o resultado. En español, el subjuntivo ‘venga’ conserva esa fuerza de propósito sin sonar forzado, y mantiene la imagen de que algo ‘viene’ sobre los culpables.
- source_word: חֲמַס
  english_pob_choice: the violence done to
  chosen_spanish: la violencia hecha a
  alternatives_spanish:
  - la violencia
  - el agravio hecho a
  - la injusticia hecha a
  lexicon: HALOT
  rationale: חמס denota violencia o agravio violento. ‘La violencia hecha a’ conserva el objeto de la acción y evita suavizar el término, al mismo tiempo que suena natural en español.
- source_word: שִׁבְעִים בְּנֵי יְרֻבָּעַל
  english_pob_choice: the seventy sons of Jerubbaal
  chosen_spanish: los setenta hijos de Jerubaal
  alternatives_spanish:
  - los setenta hijos de Jerobaal
  - los setenta hijos de Jerobaal
  lexicon: HALOT
  rationale: Se conserva el nombre propio como transliteración. ‘Hijos’ traduce de forma directa בְּנֵי, y el número se mantiene explícito como en el hebreo.
- source_word: וְדָמָם לָשׂוּם עַל
  english_pob_choice: and their blood be laid on
  chosen_spanish: y su sangre sea puesta sobre
  alternatives_spanish:
  - y su sangre sea echada sobre
  - y su sangre sea cargada sobre
  - y su sangre sea atribuida a
  lexicon: HALOT
  rationale: Se conserva el giro idiomático de poner/colocar la sangre sobre alguien, que en contexto implica responsabilidad por derramamiento de sangre. ‘Sea puesta sobre’ mantiene la imagen hebrea sin resolverla del todo en una paráfrasis jurídica.
- source_word: אֲבִימֶלֶךְ אֲחִיהֶם
  english_pob_choice: Abimelech their brother
  chosen_spanish: Abimelec, su hermano
  alternatives_spanish:
  - Abimelec, el hermano de ellos
  - Abimelec, hermano de ellos
  lexicon: HALOT
  rationale: La aposición se conserva con claridad natural en español. La coma refuerza que Abimelec es identificado como el hermano de los asesinados.
- source_word: הָרַג
  english_pob_choice: killed
  chosen_spanish: mató
  alternatives_spanish:
  - sintió muerte a
  - asesinó
  - dio muerte a
  lexicon: HALOT
  rationale: El verbo básico הָרַג se traduce con ‘mató’, que es directo y fiel sin introducir un matiz legal más fuerte que el del léxico hebreo.
- source_word: בַּעֲלֵי שְׁכֶם
  english_pob_choice: the leaders of Shechem
  chosen_spanish: los líderes de Siquem
  alternatives_spanish:
  - los señores de Siquem
  - los principales de Siquem
  - los dueños de Siquem
  lexicon: HALOT
  rationale: בַּעֲלֵי aquí apunta a los hombres principales o detentadores de poder en la ciudad. ‘Líderes’ comunica bien ese sentido político-social en español actual, sin cargar la expresión con una lectura de ‘señores’ que podría sonar más feudal o ambigua.
- source_word: חִזְּקוּ אֶת יָדָיו
  english_pob_choice: strengthened his hands
  chosen_spanish: fortalecieron sus manos
  alternatives_spanish:
  - lo apoyaron
  - lo respaldaron
  - le dieron apoyo
  lexicon: HALOT
  rationale: Se preserva el hebraísmo ‘fortalecer las manos’, que el contexto explica como apoyo o respaldo. En español resulta suficientemente transparente y conserva la textura original.
- source_word: לַהֲרֹג אֶת אֶחָיו
  english_pob_choice: to kill his brothers
  chosen_spanish: para matar a sus hermanos
  alternatives_spanish:
  - para dar muerte a sus hermanos
  - para asesinar a sus hermanos
  lexicon: HALOT
  rationale: El infinitivo expresa propósito y ‘matar’ reproduce el verbo común del hebreo. ‘Hermanos’ es la correspondencia directa para אֶחָיו.
theological_decisions:
- issue: Idiom of blood laid on someone
  english_pob_reading: Retain 'their blood be laid on' in the main text
  chosen_spanish_reading: su sangre sea puesta sobre
  alternative_spanish_readings:
  - su sangre sea cargada a
  - su sangre sea imputada a
  - se les cargue la sangre
  rationale: La frase hebrea conserva el lenguaje de sangre derramada como responsabilidad judicial y moral. En español, ‘sea puesta sobre’ mantiene la metáfora y la tensión teológica sin explicarla por completo, igual que la versión inglesa auditada.
  doctrine_reference: Translation philosophy §3, §5
- issue: Meaning of בעלי שכם
  english_pob_reading: the leaders of Shechem / lords of Shechem
  chosen_spanish_reading: los líderes de Siquem
  alternative_spanish_readings:
  - los señores de Siquem
  - los jefes de Siquem
  rationale: El hebreo puede referirse a los hombres principales o poseedores de poder de la ciudad. ‘Líderes’ evita una sobrerreligiosización o un feudalismo implícito, y conserva el referente sociopolítico documentado por el audit trail.
  doctrine_reference: Translation philosophy §2, §4
- issue: Preserving the strengthened-hands idiom
  english_pob_reading: strengthened his hands
  chosen_spanish_reading: fortalecieron sus manos
  alternative_spanish_readings:
  - lo apoyaron
  - lo respaldaron
  rationale: La metáfora corporal es parte del estilo hebreo y se entiende en español con ayuda del contexto. Mantenerla evita borrar la imagen original de apoyo y cooperación en el crimen.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el paquete fuente y el audit trail inglés, sin cambios textuales respecto al sentido ya revisado como de alta concordancia. Se preservan dos hebraísmos relevantes: ‘su sangre sea puesta sobre’ y ‘fortalecieron sus manos’, con notas para transparentar su valor idiomático. No se introducen variantes doctrinales adicionales ni se suaviza el lenguaje de responsabilidad por sangre.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como convención del proyecto solo cuando el tetragrámaton aparece explícitamente; aquí no aparece.
  - Se mantiene ‘Jerubaal’ y ‘Abimelec’ como transliteraciones consistentes con el registro bíblico en español del proyecto.
  - ‘Siquem’ conserva la forma española tradicional del topónimo.
  - ‘Líderes’ funciona como equivalente contextual de בעלי sin imponer una traducción eclesiástica o feudal.
