revisions:
- from: Bendecirás a los justos[a], y no los llamarás a cuentas[b] por las cosas en que pecaron; y tu bondad es para con los que pecan en arrepentimiento[c].
  to: Bendecirás a los justos, y no los llamas a cuentas por las cosas en que pecaron; y tu bondad es hacia los que pecan en arrepentimiento[a].
  rationale: Se corrigió «no los llamarás» a «no los llamas» para seguir la forma presente de οὐκ εὐθύνεις, ya adjudicada en el rastro inglés, preservando el contraste con el futuro «bendecirás». Se reubicó la única nota pertinente al sintagma «en arrepentimiento», eliminando el anclaje erróneo sobre «justos» y la duplicación de notas. También se suavizó «para con» a «hacia» para mejorar la naturalidad sin apartarse del sentido fuente.
