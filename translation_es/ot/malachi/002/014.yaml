review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura del hebreo y la línea del POB en casi todo: «Pero ustedes dicen», «¿Por qué?», «Porque Yahvé ha sido testigo», «la esposa de tu juventud», el matiz concesivo «aunque», y el énfasis de pacto en la cláusula final. Sin embargo, hay dos fallas relevantes. Primero, la nota [a] está anclada a «dicen», pero su contenido explica el verbo בגדתה בה («has sido infiel / has actuado deslealmente»), no וַאֲמַרְתֶּם. Segundo, «a quien has sido infiel» es español incorrecto; debe ser «a quien le has sido infiel» o reformularse. Además, hay una mezcla de tratamiento plural/singular («ustedes dicen ... entre tú y ... tu»), que puede mantenerse por fidelidad gramatical al hebreo, pero en español conviene suavizarlo para legibilidad.'
  spanish_quality_summary: La redacción general es clara y digna, pero la sintaxis «a quien has sido infiel» suena antinatural e incorrecta. También conviene reubicar las notas para que expliquen las palabras correctas. «La esposa de tu pacto» es comprensible, aunque «tu esposa por pacto» sonaría más idiomático; aun así, puede mantenerse una formulación más literal si se preserva el peso covenantal.
  glossary_alignment: 'Alineado con el glosario del proyecto en el punto principal: יְהוָה se traduce correctamente como «Yahvé». El lenguaje de pacto se preserva con «pacto». No hay conflictos con otros términos doctrinales del glosario. La principal desalineación no es terminológica sino de aparato crítico: las notas están intercambiadas respecto de sus anclas.'
  issues:
  - severity: high
    issue: La nota [a] está anclada al verbo «dicen», pero explica el verbo hebreo בגדתה בה.
    rationale: Esto invierte el aparato crítico y desinforma al lector. La alternativa «con quien has actuado deslealmente» corresponde a la cláusula de infidelidad, no a «Pero ustedes dicen».
  - severity: high
    issue: La frase «a quien has sido infiel» es gramaticalmente deficiente en español.
    rationale: En español natural debe decirse «a quien le has sido infiel» o reformularse como «con quien has actuado deslealmente». Tal como está, afecta la legibilidad y precisión.
  - severity: medium
    issue: Las notas [a] y [b] quedaron cruzadas respecto del modelo inglés y de las frases a las que deberían referirse.
    rationale: La nota sobre «esposa de pacto» debería anclarse en la última frase, mientras que la nota sobre deslealtad debe anclarse en «le has sido infiel».
  - severity: low
    issue: Hay mezcla de segunda persona plural y singular («ustedes dicen ... tú ... tu»).
    rationale: Proviene del hebreo, donde el discurso pasa del plural al singular colectivo. No es un error de fidelidad, pero puede sentirse abrupto en español. No requiere adjudicación compleja.
