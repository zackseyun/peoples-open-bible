translation:
  language: es
  text: Porque oyó que querían entregar la fortaleza[a] a los del partido de Demetrio, puso allí una guarnición para que la guardaran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Fortaleza» traduce ὀχύρωμα de manera más natural en español; «fortificación» o «fuerte» también serían posibles, pero «fortaleza» comunica mejor el sentido de un sitio militar defendido.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤκουσεν
  english_pob_choice: he heard
  chosen_spanish: oyó
  alternatives_spanish:
  - se enteró
  - recibió la noticia
  lexicon: BDAG
  rationale: El aoristo de ἀκούω introduce la causa de la acción siguiente. «Oyó» mantiene la relación directa con el griego y suena natural en español sin agregar más de lo que el texto dice.
- source_word: βούλονται
  english_pob_choice: they intended
  chosen_spanish: querían
  alternatives_spanish:
  - intentaban
  - pensaban entregar
  lexicon: BDAG
  rationale: En este contexto político-militar, la idea es una voluntad o propósito concreto. «Querían» conserva esa intención sin volverla demasiado técnica o inferida.
- source_word: τὸ ὀχύρωμα
  english_pob_choice: the stronghold
  chosen_spanish: la fortaleza
  alternatives_spanish:
  - la fortificación
  - el fuerte
  lexicon: LSJ
  rationale: ὀχύρωμα designa un lugar fortificado. «Fortaleza» comunica bien el sentido militar en español actual y es clara para un lector general.
- source_word: παραδοῦναι
  english_pob_choice: to hand over
  chosen_spanish: entregar
  alternatives_spanish:
  - poner en manos de
  - someter
  lexicon: BDAG
  rationale: Aquí παραδίδωμι expresa ceder el control de un lugar. «Entregar» es el equivalente más natural y no añade matices de rendición que el griego no exige.
- source_word: τοῖς παρὰ Δημητρίου
  english_pob_choice: to those on Demetrius's side
  chosen_spanish: a los del partido de Demetrio
  alternatives_spanish:
  - a los hombres de Demetrio
  - a los partidarios de Demetrio
  lexicon: LSJ
  rationale: La frase señala afiliación o pertenencia a Demetrio. «Del partido de Demetrio» expresa bien esa lealtad política; «partidarios» también sería posible, pero «partido» conserva más directamente el matiz de grupo alineado con él.
- source_word: ἔθετο
  english_pob_choice: he stationed
  chosen_spanish: puso allí
  alternatives_spanish:
  - apostó allí
  - colocó allí
  lexicon: BDAG
  rationale: Con φρουράν como objeto, el verbo indica colocar una fuerza de guardia. «Puso allí» es simple y fiel; el complemento «guarnición» ya concreta la acción militar.
- source_word: φρουράν
  english_pob_choice: a garrison
  chosen_spanish: una guarnición
  alternatives_spanish:
  - una guardia
  - tropas
  lexicon: LSJ
  rationale: φρουρά puede referirse a una fuerza de guardia dejada en un lugar. «Guarnición» es el término militar español más preciso y estándar.
- source_word: ὅπως φυλάσσωσιν αὐτήν
  english_pob_choice: so that they might guard it
  chosen_spanish: para que la guardaran
  alternatives_spanish:
  - a fin de que la custodiaran
  - para protegerla
  lexicon: BDAG
  rationale: ὅπως con subjuntivo expresa propósito. «Para que la guardaran» reproduce con claridad el fin de la acción y mantiene el pronombre femenino singular para la fortaleza.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo, sin revisiones aplicadas ni notas textuales adicionales. La versión española sigue de cerca la estructura causal y final del original, conservando el referente femenino de αὐτήν y el matiz de afiliación política en τοῖς παρὰ Δημητρίου.
  spanish_consistency_notes:
  - Se mantuvo un español moderno y eclesialmente legible, evitando calcos innecesarios.
  - No se introdujo terminología tradicional de iglesia; el lenguaje es militar y político según el pasaje.
  - El pronombre «la» en «para que la guardaran» conserva el antecedente femenino singular de «fortaleza».
