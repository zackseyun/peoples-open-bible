  timestamp: '2026-05-07T21:49:22Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: Dios habla a Balaam, le prohíbe ir con los mensajeros y maldecir al pueblo, y da la razón causal final. Sin embargo, la cláusula final «porque bendito es» no suena natural en español y deja ambiguo el referente de «es». El hebreo בָרוּךְ הוּא usa singular con un colectivo («el pueblo»), y el rastro inglés documenta que conviene expresar ese valor colectivo de manera idiomática.'
  spanish_quality_summary: '«Y Dios dijo a Balaam» y las dos prohibiciones son claras y dignas. El principal problema es de legibilidad y naturalidad en la última cláusula: «bendito es» resulta forzado y poco idiomático en español bíblico contemporáneo. «Porque es un pueblo bendito» comunica con claridad la razón, conserva la idea colectiva y evita un cierre abrupto o ambiguo.'
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto: אֱלֹהִים -> «Dios» está bien; no aparecen Yahvé/Mesías/Cristo ni otros términos sensibles del glosario. «Maldecir» para אָרַר es correcto. La mejora propuesta afecta la representación del singular colectivo en בָרוּךְ הוּא, no la terminología troncal.'
  issues:
  - severity: medium
    issue: La frase final «porque bendito es» es poco idiomática y ambigua en español.
    rationale: Aunque intenta reflejar el singular hebreo, en español deja implícito un sujeto poco claro y suena artificial. La traducción debe preservar el sentido colectivo sin sacrificar inteligibilidad.
  - severity: low
    issue: Falta una nota para documentar la tensión entre el singular hebreo y la expresión española más natural.
    rationale: El expediente inglés ya documenta esta cuestión gramatical. En español conviene conservar esa información mediante nota si se opta por una formulación idiomática que no reproduzca literalmente el singular predicativo.
  revised_spanish_text: 'Y Dios dijo a Balaam[a]: «No irás con ellos. No maldecirás al pueblo, porque es un pueblo bendito[b]»'
  revised_footnotes:
  - marker: a
    text: Balaam también puede transliterarse «Bileam».
    reason: nombre_propio_alternativo
  - marker: b
    text: 'Hebreo literalmente: «porque bendito es», con singular gramatical referido al pueblo como colectivo.'
    reason: alternativa_lexica_y_gramatical
  revision_rationale: Se mantiene el contenido y tono del original, pero se reemplaza la formulación final por una opción española natural que expresa claramente el referente colectivo. Se añade nota para preservar el dato importante del singular hebreo documentado en el expediente inglés. También se conserva la nota onomástica del POB sobre Balaam/Bileam, ya que aparece en la traducción inglesa auditada.
