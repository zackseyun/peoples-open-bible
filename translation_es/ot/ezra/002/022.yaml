lexical_decisions:
- source_word: אַנְשֵׁי
  english_pob_choice: the men of
  chosen_spanish: los hombres de
  alternatives_spanish:
  - la gente de
  - los varones de
  lexicon: HALOT
  rationale: El constructo plural de אִישׁ en listas censales o genealógicas señala a los varones representativos del lugar. «Los hombres de» conserva esa fuerza masculina y sigue de cerca la decisión auditada en inglés.
- source_word: נְטֹפָה
  english_pob_choice: Netophah
  chosen_spanish: Netofá
  alternatives_spanish:
  - Netofa
  lexicon: HALOT
  rationale: Es un topónimo; se translitera en lugar de traducirse. «Netofá» mantiene la forma reconocible en español y evita una adaptación excesivamente anglicada.
- source_word: חֲמִשִּׁים וְשִׁשָּׁה
  english_pob_choice: fifty-six
  chosen_spanish: cincuenta y seis
  alternatives_spanish:
  - cincuenta y seis
  - cincuenta y seis personas
  lexicon: HALOT
  rationale: La frase cardinal designa 56. En español, el cardinal normal y más claro es «cincuenta y seis»; «cincuenta y seis personas» añadiría un sustantivo no presente en el hebreo.
translation_notes:
  revision_awareness: El texto inglés POB no fue revisado y recibió acuerdo alto; por eso la versión española sigue de cerca la sintaxis breve del hebreo y conserva el valor enumerativo sin expansión interpretativa.
  spanish_consistency_notes:
  - Se conservó el carácter de lista censal mediante una estructura nominal breve.
  - No se introdujo una equivalencia neutralizada como «gente» para no perder la referencia masculina del constructo hebreo.
  - El topónimo se translitera de forma coherente con el español bíblico contemporáneo.
