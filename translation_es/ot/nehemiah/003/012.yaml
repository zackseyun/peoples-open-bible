translation:
  language: es
  text: Junto a él[a], Sallún hijo de Hallohés, gobernador de la mitad del distrito de Jerusalén, hizo reparaciones; él y sus hijas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Y junto a él … hizo reparaciones». El hebreo usa un modismo que literalmente se refiere a trabajar ‘a/sobre su mano’, es decir, junto al tramo anterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל יָדוֹ
  english_pob_choice: Next to him
  chosen_spanish: Junto a él
  alternatives_spanish:
  - Y junto a él
  - A su lado
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de proximidad y orden en el trabajo, no una referencia literal a la mano. «Junto a él» conserva la idea topográfica y el encadenamiento de los tramos de muro en un español natural.
- source_word: הֶחֱזִיק
  english_pob_choice: made repairs
  chosen_spanish: hizo reparaciones
  alternatives_spanish:
  - fortaleció
  - reparó
  lexicon: HALOT
  rationale: En Nehemías 3, el verbo en hifil describe la participación en la reconstrucción del muro. «Hizo reparaciones» refleja bien el sentido contextual sin introducir un matiz más técnico o más limitado que el hebreo pide.
- source_word: שַׁלּוּם
  english_pob_choice: Shallum
  chosen_spanish: Sallún
  alternatives_spanish:
  - Salún
  - Sallum
  lexicon: transliteración tradicional adaptada
  rationale: Se translitera el nombre propio para lectura castellana, adaptando la forma al uso bíblico en español. La vocalización final se ajusta para una pronunciación natural en español sin cambiar la identidad del nombre.
- source_word: בֶּן הַלּוֹחֵשׁ
  english_pob_choice: son of Hallohesh
  chosen_spanish: hijo de Hallohés
  alternatives_spanish:
  - hijo de Hallohesh
  - hijo de Halohés
  lexicon: transliteración propia
  rationale: El patronímico se conserva como nombre propio. «Hallohés» busca una representación castellana legible de las consonantes hebreas, manteniendo la referencia familiar y sin traducirla.
- source_word: שַׂר חֲצִי פֶּלֶךְ יְרוּשָׁלִָם
  english_pob_choice: ruler of half the district of Jerusalem
  chosen_spanish: gobernador de la mitad del distrito de Jerusalén
  alternatives_spanish:
  - gobernante de la mitad del distrito de Jerusalén
  - oficial de la mitad del distrito de Jerusalén
  lexicon: HALOT
  rationale: «שַׂר» puede ser un oficial o gobernante, y «פֶּלֶךְ» en este contexto administrativo alude a un distrito. «Gobernador» comunica de forma clara la función jerárquica sin exagerar el alcance territorial, conservando la tensión administrativa del original.
- source_word: הוּא וּבְנוֹתָיו
  english_pob_choice: he and his daughters
  chosen_spanish: él y sus hijas
  alternatives_spanish:
  - él, junto con sus hijas
  - él y sus hijas también
  lexicon: HALOT
  rationale: La frase destaca de manera enfática a los participantes. «Él y sus hijas» preserva la sencillez del hebreo y mantiene el dato notable de que también participaron sus hijas.
translation_notes:
  revision_awareness: 'El texto coincide con el sentido confirmado por la auditoría inglesa: ubicación adyacente, participación en reparaciones, patronímico conservado y mención explícita de las hijas. No se aplicaron revisiones posteriores.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y cualquier terminología teológica ajena al versículo.
  - Se mantuvo una formulación clara y sobria, adecuada para una lista de constructores en Nehemías 3.
  - «Hizo reparaciones» conserva el valor contextual del verbo en la sección sin forzar un tecnicismo de reconstrucción.
