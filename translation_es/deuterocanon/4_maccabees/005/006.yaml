translation:
  language: es
  text: 'Antes de empezar los tormentos contra ti, anciano, yo te aconsejaría esto: para que, después de probar la carne de cerdo[a], te libraras. Porque respeto tu edad y tu canicie, aunque, después de haberla tenido por tanto tiempo[b], no me parece que filosofes por practicar la religión de los judíos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por probar la carne de cerdo, pudieras preservar tu vida».'
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente «filosofar», conservando el lenguaje recurrente del libro sobre la filosofía y la razón.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὶν ἄρξασθαι
  english_pob_choice: Before I begin
  chosen_spanish: Antes de empezar
  alternatives_spanish:
  - Antes de comenzar
  - Antes de iniciar
  lexicon: LSJ
  rationale: La construcción temporal con πρίν se vierte de manera natural en español como una subordinada temporal breve. «Empezar» conserva el marco en primera persona y suena idiomático y digno.
- source_word: τῶν κατὰ σοῦ βασάνων
  english_pob_choice: the tortures against you
  chosen_spanish: los tormentos contra ti
  alternatives_spanish:
  - las torturas contra ti
  - los suplicios contra ti
  lexicon: LSJ
  rationale: βάσανοι aquí alude a tormentos infligidos a la persona, no a sufrimiento interno. «Tormentos» comunica bien el valor punitivo; «contra ti» refleja κατὰ σοῦ.
- source_word: ὦ πρεσβῦτα
  english_pob_choice: old man
  chosen_spanish: viejo
  alternatives_spanish:
  - anciano
  - viejo hombre
  lexicon: LSJ
  rationale: El vocativo es directo y algo áspero. «Viejo» mantiene la fuerza interpelativa sin volverlo honorífico, como en el contexto retórico del tirano.
- source_word: συμβουλεύσαιμʼ ἂν σοι ταῦτα
  english_pob_choice: I would advise you of this
  chosen_spanish: yo te aconsejaría esto
  alternatives_spanish:
  - te daría este consejo
  - yo te aconsejaría estas cosas
  lexicon: LSJ
  rationale: El optativo con ἄν expresa propuesta cortés o tentativa. «Yo te aconsejaría esto» conserva el matiz retórico y suena natural en español.
- source_word: ὅπως ἀπογευσάμενος τῶν ὑείων σώζοιο
  english_pob_choice: so that by tasting the pork you might save yourself
  chosen_spanish: para que, después de probar la carne de cerdo, te salvaras
  alternatives_spanish:
  - para que, al probar la carne de cerdo, pudieras salvarte
  - a fin de que, después de probar el cerdo, te salvaras
  lexicon: LSJ
  rationale: ὅπως introduce finalidad; el participio se vierte con una subordinada temporal/participial natural en español. «Carne de cerdo» explicita ὑείων con precisión. El optativo σώζοιο se refleja con «te salvaras», preservando el matiz potencial de auto-preservación física.
- source_word: αἰδοῦμαι γάρ σου τὴν ἡλικίαν καὶ τὴν πολιάν
  english_pob_choice: For I respect your age and your gray hair
  chosen_spanish: Porque respeto tu edad y tu canicie
  alternatives_spanish:
  - Porque reverencio tu edad y tu canicie
  - Porque respeto tu vejez y tus canas
  lexicon: LSJ
  rationale: αἰδοῦμαι puede significar respeto/reverencia. «Canicie» conserva el rasgo de «cabello blanco/gris» sin alargar la frase, y corresponde bien a πολιάν.
- source_word: ἣν μετὰ τοσοῦτον ἔχων χρόνον
  english_pob_choice: though, after having had it for so long a time
  chosen_spanish: aunque, después de haberla tenido por tanto tiempo
  alternatives_spanish:
  - aunque, después de poseerla por tanto tiempo
  - aunque, habiéndola tenido por tanto tiempo
  lexicon: LSJ
  rationale: La relativa se refiere naturalmente a la canicie mencionada antes. «Por tanto tiempo» traduce el valor temporal de χρόνον; la referencia implícita se mantiene sin forzarla.
- source_word: οὔ μοι δοκεῖς φιλοσοφεῖν
  english_pob_choice: you do not seem to me to be philosophizing
  chosen_spanish: no me pareces filosofar
  alternatives_spanish:
  - no me pareces estar filosofando
  - no me pareces practicar la filosofía
  lexicon: LSJ
  rationale: Conviene conservar la raíz filosófica de 4 Macabeos sin una paráfrasis como «ser sabio». «No me pareces filosofar» reproduce el valor verbal con naturalidad en español.
- source_word: τῇ Ἰουδαίων χρωμένῃ θρησκείᾳ
  english_pob_choice: by practicing the religion of the Jews
  chosen_spanish: practicando la religión de los judíos
  alternatives_spanish:
  - observando la religión de los judíos
  - usando la religión de los judíos
  lexicon: LSJ
  rationale: χρῶμαι con dativo puede significar practicar o servirse de. Aquí «practicando» comunica bien la observancia religiosa; «religión de los judíos» sigue de cerca θρησκεία sin imponer un término eclesiástico tradicional.
theological_decisions:
- issue: Sentido de σώζοιο
  english_pob_reading: physical self-preservation from impending torture/death
  chosen_spanish_reading: auto-preservación física inmediata frente a tormentos inminentes
  alternative_spanish_readings:
  - salvación espiritual
  - ser salvo en sentido religioso
  rationale: En el contexto el hablante intenta que el anciano coma carne prohibida para evitar el castigo. Por eso «te salvaras» se entiende como librarse físicamente del tormento, no como salvación espiritual.
  doctrine_reference: 'Translation philosophy: original-language primacy; no importar un sentido doctrinal ajeno al contexto.'
- issue: Valor de φιλοσοφεῖν en 4 Macabeos
  english_pob_reading: retain explicit philosophy language
  chosen_spanish_reading: mantener el lenguaje de filosofar
  alternative_spanish_readings:
  - ser sabio
  - actuar con sensatez
  rationale: 4 Macabeos trabaja deliberadamente con el vocabulario de razón y filosofía para describir la fidelidad judía. Traducirlo como «filosofar» conserva esa textura temática.
  doctrine_reference: Consistency of key terms; preserve recurring book-level discourse.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la última revisión del inglés POB: se mantuvo la finalidad de ὅπως con «para que», se reflejó el matiz optativo de σώζοιο con «te salvaras», se tradujo χρόνον con «por tanto tiempo» y se preservó φιλοσοφεῖν con «filosofar».'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se conservó «religión de los judíos» para seguir de cerca θρησκεία y el criterio POB de vocabulario auditable.
  - «Carne de cerdo» se eligió como equivalente claro de τῶν ὑείων, evitando una paráfrasis más amplia.
  - El tono general mantiene la aspereza retórica del interlocutor sin añadir suavizaciones interpretativas.
