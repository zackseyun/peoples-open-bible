translation:
  language: es
  text: No desprecies a tu esposa[a], y no confíes en la mujer que odias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «¿Tienes una esposa conforme a tu deseo? No la eches fuera.» El hebreo conservado y el griego difieren notablemente en este versículo; por eso el texto principal sigue el hebreo y esta nota preserva la alternativa griega.'
    reason: alternative_reading
lexical_decisions:
- source_word: אִשָּׁה
  english_pob_choice: wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  lexicon: HALOT
  rationale: En el contexto de לְךָ ('para ti / que es tuya'), el referente es marital; 'esposa' comunica mejor esa relación que el más general 'mujer'.
- source_word: לְךָ
  english_pob_choice: who is yours
  chosen_spanish: que es tuya
  alternatives_spanish:
  - para ti
  - de ti
  lexicon: HALOT
  rationale: La frase marca pertenencia o relación personal. 'Que es tuya' mantiene el valor relacional sin volver la expresión artificial en español.
- source_word: אַל תְּתַעֲבֶהָ
  english_pob_choice: do not despise
  chosen_spanish: No desprecies
  alternatives_spanish:
  - No aborrezcas
  - No la aborrezcas
  lexicon: HALOT
  rationale: El verbo expresa rechazo fuerte. 'Despreciar' es el equivalente natural y conserva la fuerza exhortativa de la instrucción sapiencial.
- source_word: וּשְׂנוּאָה
  english_pob_choice: one you hate
  chosen_spanish: una que odias
  alternatives_spanish:
  - una mujer odiada
  - una mujer que odias
  lexicon: HALOT
  rationale: La forma hebrea permite una lectura relacional; el contexto del paralelismo favorece la mujer hacia la cual el destinatario tiene odio. 'Una que odias' conserva esa relación sin forzar un pasivo impersonal.
- source_word: אַל תַּאֲמֵן בָּהּ
  english_pob_choice: do not trust one you hate
  chosen_spanish: no confíes en una que odias
  alternatives_spanish:
  - no confíes en ella
  - no pongas tu confianza en ella
  lexicon: HALOT
  rationale: El hifil de אמן con ב comunica confiar o depositar confianza. En español, 'confiar en una que odias' resulta demasiado abstracto; 'no confíes en una que odias' conserva la advertencia relacional y el paralelo antitético.
theological_decisions:
- issue: Divergencia textual entre el hebreo conservado y el paralelo griego
  english_pob_reading: 'Main text follows the Hebrew witness; Greek note preserves: ''Do you have a wife after your own desire? Do not cast her out.'''
  chosen_spanish_reading: El texto principal sigue el hebreo; la alternativa griega queda preservada en nota.
  alternative_spanish_readings:
  - «¿Tienes una esposa conforme a tu deseo? No la eches fuera.»
  rationale: Sirácide presenta una diferencia real entre testigos. Dado que el hebreo está disponible y el proyecto prioriza ese testigo donde existe, el texto principal sigue el hebreo, pero la lectura griega se conserva para auditabilidad y para no borrar la tensión textual.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserve; usar el paralelo griego como entrada real de traducción'
translation_notes:
  revision_awareness: La redacción española sigue la revisión final del audit trail inglés al eliminar cualquier añadido no presente en el hebreo. Se mantuvo la oposición entre 'una esposa que es tuya' y 'una que odias', con una nota que preserva la lectura griega alternativa.
  spanish_consistency_notes:
  - Se usó 'esposa' en vez de 'mujer' por el matiz marital exigido por לְךָ y por el paralelo griego con γυνή.
  - Se evitó 'SEÑOR' u otros equivalentes de mask translation porque el versículo no contiene el tetragrámaton ni un equivalente divino.
  - Se eligió un tono sapiencial sobrio y directo, adecuado para un proverbio breve.
  - La negación se expresó con subjuntivo exhortativo ('No desprecies', 'no confíes') para una lectura natural en español.
