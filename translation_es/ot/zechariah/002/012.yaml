revisions:
- from: 'Porque así ha dicho Yahvé de los ejércitos: Tras la gloria me envió[a] a las naciones que os despojan, porque el que toca en vosotros toca la niña[b] de su ojo.'
  to: 'Porque así ha dicho Yahvé de los ejércitos: Tras la gloria me envió[a] a las naciones que los despojan, porque quien los toca toca la pupila[b] de su ojo.'
  rationale: Se corrige el registro pronominal al español latinoamericano amplio, se elimina el calco poco natural 'toca en vosotros', y se ajusta el idiomático ocular a una forma fiel y clara que además sigue mejor la preferencia léxica documentada del POB inglés. Se mantienen Yahvé, 'de los ejércitos', la ambigüedad de 'me envió' y la dificultad de 'Tras la gloria'.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:39:48Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura del hebreo, mantiene Yahvé, preserva la ambigüedad de ''me envió'' y de ''su ojo'', y retiene la dificultad de אַחַר כָּבוֹד con ''Tras la gloria''. Sin embargo, dos decisiones no representan bien el sentido en español actual: ''os despojan'' mezcla voseo peninsular con la meta de español latinoamericano amplio, y ''toca en vosotros'' calca innecesariamente בָכֶם de manera poco natural. Además, ''la niña de su ojo'' no es la forma idiomática española estable; debe ser ''la niña de sus ojos'' o mejor ''la pupila de su ojo'' si se sigue el POB inglés.'
  spanish_quality_summary: La redacción general es digna, pero no plenamente natural para español neutro latinoamericano. 'Vosotros/os' desentona con el registro objetivo; 'toca en vosotros' suena forzado y poco legible; y 'la niña de su ojo' resulta extraña en español. Conviene unificar en 'ustedes/los' y usar una construcción fluida como 'quien los toca'.
  glossary_alignment: '''Yahvé'' está correctamente alineado. ''De los ejércitos'' es aceptable para צְבָאוֹת. La tensión de ''Tras la gloria'' se preserva bien y la nota alternativa también. Para בְּבָבַת עֵינוֹ, la preferencia documentada inglesa es ''the pupil of his eye''; en español, ''la pupila de su ojo'' refleja mejor esa decisión que el idiomático tradicional ''la niña de sus ojos'', que además cambia número y puede introducir un modismo distinto.'
  issues:
  - severity: medium
    issue: Registro pronominal no acorde con el objetivo de español latinoamericano amplio
    rationale: El borrador usa 'os' y 'vosotros', formas asociadas al español peninsular, mientras el proyecto pide español neutral latinoamericano/broadly church-readable. 'Los/ustedes' es más adecuado.
  - severity: medium
    issue: Construcción 'toca en vosotros' poco natural
    rationale: Aunque intenta reflejar literalmente בָכֶם, en español moderno esa construcción suena calcada. 'Quien los toca' o 'el que los toca' preserva el sentido y la repetición verbal sin perder fidelidad.
  - severity: medium
    issue: Expresión 'la niña de su ojo' no es idiomática en español
    rationale: La locución estable es 'la niña de sus ojos'; pero dado que el POB privilegia la transparencia de 'pupil', 'la pupila de su ojo' es más fiel al razonamiento léxico auditado y evita una forma extraña.
  - severity: low
    issue: Nota b invierte la preferencia principal y la alternativa del POB
    rationale: El texto principal inglés usa 'pupil of his eye' y deja 'apple of his eye' como alternativa. En español conviene reflejar eso con 'la pupila de su ojo' en el texto y 'la niña de sus ojos' como alternativa idiomática.
  revised_spanish_text: 'Porque así ha dicho Yahvé de los ejércitos: Tras la gloria me envió[a] a las naciones que los despojan, porque quien los toca toca la pupila[b] de su ojo.'
  revised_footnotes:
  - marker: a
    text: O 'Tras la gloria me ha enviado a las naciones que los despojan'. La expresión hebrea 'Tras la gloria' es difícil y puede expresar propósito, secuencia o relación con el honor o la gloria.
    reason: alternative_reading
  - marker: b
    text: O 'la niña de sus ojos'. El modismo hebreo designa la parte más sensible y cuidadosamente protegida del ojo.
    reason: lexical_alternative
  revision_rationale: Se corrige el registro pronominal al español latinoamericano amplio, se elimina el calco poco natural 'toca en vosotros', y se ajusta el idiomático ocular a una forma fiel y clara que además sigue mejor la preferencia léxica documentada del POB inglés. Se mantienen Yahvé, 'de los ejércitos', la ambigüedad de 'me envió' y la dificultad de 'Tras la gloria'.
