id: GEN.48.22
reference: Genesis 48:22
source:
  edition: WLC
  text: וַ/אֲנִ֞י נָתַ֧תִּֽי לְ/ךָ֛ שְׁכֶ֥ם אַחַ֖ד עַל אַחֶ֑י/ךָ אֲשֶׁ֤ר לָקַ֨חְתִּי֙ מִ/יַּ֣ד הָֽ/אֱמֹרִ֔י בְּ/חַרְבִּ֖/י וּ/בְ/קַשְׁתִּֽ/י־׃פ
translation:
  text: And I give you one portion above your brothers[a], which I took from the hand of the Amorite with my sword and with my bow.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew שְׁכֶם (shekhem) can also be understood as 'portion,' and may echo the place-name Shechem; the line may intentionally suggest both an extra share and the site later associated with Joseph.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  chosen: And I myself
  alternatives:
  - And I
  - Now I
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis beyond the verbal subject already present in נָתַתִּי, so 'I myself' preserves the emphatic force.
- source_word: נָתַתִּי
  chosen: give
  alternatives:
  - have given
  - gave
  lexicon: HALOT
  rationale: Although morphologically perfect, in direct speech this can function as a present performative or immediate declaration. 'Give' fits Jacob's testamentary blessing context in natural English while preserving the force of a formal bestowal.
- source_word: שְׁכֶם אַחַד
  chosen: one ridge
  alternatives:
  - one portion
  - Shechem, one portion
  lexicon: HALOT
  rationale: שְׁכֶם can denote 'shoulder, ridge, slope' and likely forms a wordplay with the place-name Shechem. Rendering it as 'ridge' preserves the lexical sense in context with אַחַד ('one'), while the place-name association is worth preserving in a footnote.
- source_word: עַל אַחֶיךָ
  lemma: עַל
  chosen: above your brothers
  alternatives:
  - more than your brothers
  - over your brothers
  lexicon: HALOT
  rationale: The preposition עַל here marks advantage or addition. 'Above your brothers' preserves the comparative sense without over-paraphrasing; contextually it indicates an extra share beyond the brothers.
- source_word: אֲשֶׁר לָקַחְתִּי
  chosen: which I took
  alternatives:
  - that I seized
  - which I acquired
  lexicon: HALOT
  rationale: A straightforward relative clause with לקח. 'Took' is the most direct and leaves the manner of acquisition to the following phrase.
- source_word: מִיַּד הָאֱמֹרִי
  chosen: from the hand of the Amorite
  alternatives:
  - from the Amorites
  - out of the Amorite's hand
  lexicon: HALOT
  rationale: '''From the hand of'' is a common Hebrew idiom for taking from someone''s power or possession. Singular ''the Amorite'' is retained as in the Hebrew, likely collective or representative.'
- source_word: בְּחַרְבִּי וּבְקַשְׁתִּי
  chosen: with my sword and with my bow
  alternatives:
  - by my sword and my bow
  lexicon: HALOT
  rationale: The paired weapons are rendered literally. Repeating 'with' reflects the Hebrew prepositions and keeps the martial imagery explicit.
