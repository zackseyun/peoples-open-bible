translation:
  language: es
  text: El rey habló con ellos[a], y entre todos ellos no se halló ninguno como Daniel, Ananías, Misael y Azarías; así quedaron ante el rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y entraron al servicio del rey». El hebreo dice literalmente «quedaron ante el rey», una expresión de corte para servir en su presencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר אִתָּם
  english_pob_choice: spoke with them
  chosen_spanish: habló con ellos
  alternatives_spanish:
  - conversó con ellos
  - les habló
  lexicon: HALOT
  rationale: דבר con אִתָּם indica conversación directa; en español, «habló con ellos» conserva la relación conversacional sin añadir la idea más interpretativa de una entrevista.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Es la equivalencia natural y precisa de מֶלֶךְ; se mantiene el artículo definido del hebreo.
- source_word: וְלֹא נִמְצָא מִכֻּלָּם
  english_pob_choice: and among them all no one was found
  chosen_spanish: y entre todos ellos no se halló ninguno
  alternatives_spanish:
  - y de entre todos ellos no se encontró a nadie
  - y entre todos ellos no fue hallado ninguno
  lexicon: HALOT
  rationale: El nifal de מצא se expresa naturalmente con «se halló» en español; «entre todos ellos» transmite el matiz comparativo de מִכֻּלָּם.
- source_word: כְּדָנִיֵּאל חֲנַנְיָה מִישָׁאֵל וַעֲזַרְיָה
  english_pob_choice: like Daniel, Hananiah, Mishael, and Azariah
  chosen_spanish: como Daniel, Ananías, Misael y Azarías
  alternatives_spanish:
  - igual que Daniel, Ananías, Misael y Azarías
  lexicon: HALOT
  rationale: כְ marca comparación, por lo que «como» es la opción más directa. Los nombres se transliteran de forma estándar al español, sin traducirlos.
- source_word: וַיַּעַמְדוּ
  english_pob_choice: so they stood
  chosen_spanish: así estuvieron
  alternatives_spanish:
  - y se pusieron de pie
  - y quedaron
  lexicon: HALOT
  rationale: Aunque עמד es literalmente «estar de pie», en este contexto cortesano sugiere presentarse para servicio. «Así estuvieron» conserva la imagen básica sin introducir una paráfrasis más fuerte que el hebreo.
- source_word: לִפְנֵי הַמֶּלֶךְ
  english_pob_choice: before the king
  chosen_spanish: delante del rey
  alternatives_spanish:
  - en presencia del rey
  - ante el rey
  lexicon: HALOT
  rationale: «Delante de» reproduce bien לִפְנֵי y mantiene la concreción espacial y cortesana del hebreo.
translation_notes:
  revision_awareness: El texto base y el audit trail inglés coinciden plenamente; no se registran revisiones sustantivas aplicadas. La redacción española sigue de cerca el hebreo y conserva el matiz cortesano de «estar delante del rey» sin explicitarlo en el cuerpo principal.
  spanish_consistency_notes:
  - Se mantiene «el rey» para הַמֶּלֶךְ, siguiendo el artículo definido del original.
  - Se conserva la comparación explícita con «como» para כְּ.
  - La fórmula final «delante del rey» se deja en el texto principal y se aclara en nota por su posible valor idiomático de servicio cortesano.
  - 'Los nombres propios se presentan en formas españolas habituales: Daniel, Ananías, Misael y Azarías.'
