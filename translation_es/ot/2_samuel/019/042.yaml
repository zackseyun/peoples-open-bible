  to: 'Y he aquí[a], todos los hombres de Israel vinieron al rey y dijeron al rey: «¿Por qué nuestros hermanos, los hombres de Judá, te han robado[b] y han hecho cruzar el Jordán al rey, a su casa[c], y a todos los hombres de David con él[d]?».'
  rationale: 'La revisión corrige errores de sentido y mejora la naturalidad sin apartarse del hebreo ni del rastro inglés: restaura el objeto singular «te» en גְּנָבוּךָ, reemplaza el singular torpe «todo hombre de Israel» por el colectivo natural «todos los hombres de Israel», usa «vinieron» para una secuencia narrativa clara, expresa el causativo de וַיַּעֲבִרוּ con «han hecho cruzar», y aclara el sentido contextual de בֵּיתוֹ. También se reordena la nota cultural para reflejar la documentación del POB inglés y se eliminan notas de poco valor como «Hebreo: el Jordán».'
