translation:
  language: es
  text: Pero todo esto no vale nada para mí cada vez que veo a Mardoqueo el judío[a][b] sentado en la puerta del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y todo esto no tiene valor para mí cada vez que veo a Mardoqueo el judío sentado en la puerta del rey».'
    reason: lexical_alternative
  - marker: b
    text: «El judío» también puede traducirse «el judeano»; aquí probablemente destaca la identidad judía de Mardoqueo dentro de la corte persa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כָל זֶה
  english_pob_choice: Yet all this
  chosen_spanish: Sin embargo, todo esto
  alternatives_spanish:
  - Y todo esto
  - Pero todo esto
  lexicon: HALOT
  rationale: El hebreo usa וְ con fuerza adversativa en este contexto. «Sin embargo» expresa la contraposición natural en español sin perder la referencia a «todo esto».
- source_word: אֵינֶנּוּ שֹׁוֶה לִי
  english_pob_choice: is worth nothing to me
  chosen_spanish: no vale nada para mí
  alternatives_spanish:
  - no me aprovecha
  - no tiene valor para mí
  - no me sirve de nada
  lexicon: HALOT
  rationale: El giro hebreo combina negación con שׁוה en sentido de «valer, ser de provecho, tener valor». «No vale nada para mí» conserva el juicio evaluativo y resulta idiomático en español.
- source_word: בְּ/כָל עֵת אֲשֶׁר
  english_pob_choice: whenever
  chosen_spanish: cada vez que
  alternatives_spanish:
  - siempre que
  - en toda ocasión que
  - cada ocasión en que
  lexicon: HALOT
  rationale: La construcción expresa repetición temporal. «Cada vez que» reproduce bien la idea de acción recurrente y se ajusta al flujo natural del español.
- source_word: רֹאֶה
  english_pob_choice: I see
  chosen_spanish: veo
  alternatives_spanish:
  - mire
  - estoy viendo
  - lo veo
  lexicon: HALOT
  rationale: El participio con אֲנִי señala una acción repetida u ընթացiva. «Veo» es la forma más natural en español para este contexto.
- source_word: מָרְדֳּכַי
  english_pob_choice: Mordecai
  chosen_spanish: Mardoqueo
  alternatives_spanish:
  - Mordecai
  lexicon: Nombre propio
  rationale: Se usa la forma española asentada del nombre propio, más clara para lectura eclesial en español.
- source_word: הַיְּהוּדִי
  english_pob_choice: the Jew
  chosen_spanish: el judío
  alternatives_spanish:
  - el judeano
  - el de Judá
  lexicon: HALOT
  rationale: En Ester el término funciona como designación étnica en el entorno persa. «El judío» mantiene el valor identitario que subraya el relato.
- source_word: יוֹשֵׁב
  english_pob_choice: sitting
  chosen_spanish: sentado
  alternatives_spanish:
  - sitting there
  - permaneciendo sentado
  - estando sentado
  lexicon: HALOT
  rationale: El participio describe postura o ubicación de Mordecai. «Sentado» conserva la imagen concreta y fluida en español.
- source_word: בְּ/שַׁעַר הַ/מֶּלֶךְ
  english_pob_choice: at the king’s gate
  chosen_spanish: a la puerta del rey
  alternatives_spanish:
  - en la puerta del rey
  - junto a la puerta del rey
  - a la puerta real
  lexicon: HALOT
  rationale: «שער» puede referirse a la puerta o al acceso administrativo asociado al palacio. «A la puerta del rey» sigue de cerca el hebreo y conserva la referencia narrativa al lugar de administración.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo masorético y coincide con la lectura del POB en inglés, manteniendo la fuerza adversativa inicial, el valor idiomático de שׁוה, la repetición temporal y la designación étnica de Mardoqueo. No se detectaron revisiones textuales relevantes respecto del pasaje base.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se conservó «el judío» como etiqueta identitaria en coherencia con la lectura POB y se añadió nota por la alternativa «judeano».
  - La expresión espacial «a la puerta del rey» refleja el hebreo sin sobreinterpretar el lugar como un solo umbral físico, dejando abierta su función administrativa.
