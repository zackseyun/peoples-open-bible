translation:
  language: es
  text: y Jacob escuchó[a] a su padre y a su madre, y fue a Padán-aram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘obedeció a su padre y a su madre’. El verbo hebreo puede significar tanto oír como atender u obedecer, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: listened
  chosen_spanish: escuchó
  alternatives_spanish:
  - oyó
  - obedeció
  lexicon: HALOT
  rationale: שׁמע con אֶל puede expresar tanto oír como atender/heder. En español, 'escuchó' conserva la idea de prestar atención a la instrucción parental sin forzar de entrada 'obedeció', aunque esa lectura sigue siendo posible.
- source_word: אֶל אָבִיו וְאֶל אִמּוֹ
  english_pob_choice: to his father and his mother
  chosen_spanish: a su padre y a su madre
  alternatives_spanish:
  - a su padre y madre
  - a su padre y a su madre
  lexicon: HALOT
  rationale: Las dos preposiciones אֶל se reflejan naturalmente con 'a' ante cada miembro de la pareja parental. 'Su padre y su madre' preserva los sufijos posesivos y resulta claro en español.
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - se fue
  - viajó
  lexicon: HALOT
  rationale: הלך se traduce de modo directo con 'fue'. En este contexto narrativo, comunica el desplazamiento sin añadir matices no presentes en el hebreo.
- source_word: פַּדֶּנָה אֲרָם
  english_pob_choice: to Paddan-aram
  chosen_spanish: Padan-aram
  alternatives_spanish:
  - Padán-aram
  - la llanura de Aram
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado. El hebreo incluye dirección con el sufijo local, pero en español el destino ya queda claro por el verbo de movimiento y no requiere expansión adicional.
- source_word: וַ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - entonces
  - y entonces
  lexicon: HALOT
  rationale: La waw narrativa introduce la secuencia del relato; 'y' mantiene la continuidad sintáctica de forma natural en español.
theological_decisions:
- issue: Valor de שׁמע entre 'oír', 'escuchar' y 'obedecer'
  english_pob_reading: The Hebrew verb can mean both hearing and heeding in context.
  chosen_spanish_reading: '''escuchó'' deja abierta la fuerza de atender a la instrucción, sin cerrar el sentido únicamente en ''obedeció''.'
  alternative_spanish_readings:
  - '''obedeció'''
  - '''oyó'''
  rationale: El contexto favorece una respuesta a la instrucción paterna y materna; sin embargo, el hebreo no exige escoger exclusivamente un matiz. 'Escuchó' conserva la tensión auditiva y volitiva.
  doctrine_reference: Lexical nuance in narrative obedience
- issue: Relación entre desplazamiento y respuesta filial
  english_pob_reading: and went to Paddan-aram
  chosen_spanish_reading: '''y fue a Padan-aram'' mantiene el avance narrativo como respuesta concreta.'
  alternative_spanish_readings:
  - '''y se fue a Padan-aram'''
  - '''y viajó a Padan-aram'''
  rationale: No hay contenido doctrinal explícito, pero la secuencia muestra la obediencia práctica de Jacob al salir. La traducción no debe exagerar ni moralizar más de lo que el verso dice.
  doctrine_reference: Narrative obedience
translation_notes:
  revision_awareness: 'El texto sigue el audit trail inglés sin depender mecánicamente de él: se conserva la tensión de שׁמע mediante ''escuchó'' y se mantiene el topónimo transliterado. No se detectaron revisiones aplicadas en el paquete fuente; por eso no se introducen cambios de última hora.'
  spanish_consistency_notes:
  - Se usa 'Padan-aram' como transliteración coherente del topónimo, evitando traducirlo como 'llanura de Aram' salvo nota alternativa.
  - Se mantiene el paralelismo 'a su padre y a su madre' para reflejar los dos complementos hebreos.
  - El estilo es sobrio y publicable, con puntuación española estándar y sin arcaísmos innecesarios.
