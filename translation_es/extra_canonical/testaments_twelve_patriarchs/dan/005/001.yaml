id: T12P.DAN.5.1
reference: Testament of Dan 5:1
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 201-213, Dan source-fix v2)
  text: V. Φυλάξατε¹ οὖν, *τέκνα μου², *τὴν ἐντολὴν³ τοῦ⁴ Κυρίου καὶ τὸν νόμον αὐτοῦ τηρήσατε⁵· ἀπόστητε⁶ ἀπὸ τοῦ⁷ θυμοῦ⁸, καὶ μισήσατε⁹ τὸ ψεῦδος, ἵνα¹⁰ *Κύριος κατοικήσει ἐν ὑμῖν¹¹ καὶ φεύξεται¹² *ἀφ᾽ ὑμῶν¹³ ὁ Βελίαρ.
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/005/001.yaml
  text: Therefore, my children, keep the commandment of the Lord, and keep his law. Depart from anger, and hate falsehood, so that the Lord may dwell in you and Beliar may flee from you.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:35Z'
    unchanged: false
    changes_summary: Revised 'observe' to 'keep' for consistency with the two imperative verbs; changed 'Stand away from anger' to 'Depart from anger' for more natural and accurate rendering of ἀπόστητε; changed 'dwell among you' to 'dwell in you' to reflect ἐν ὑμῖν more closely.
translation:
  language: es
  text: Por tanto, hijos míos, guarden el mandamiento del Señor, y guarden su ley. Apártense de la ira, y aborrezcan la falsedad, para que el Señor habite en ustedes y Beliar huya de ustedes.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Φυλάξατε ... τηρήσατε
  english_pob_choice: keep ... keep
  chosen_spanish: guarden ... guarden
  alternatives_spanish:
  - observen ... observen
  - obedezcan ... obedezcan
  lexicon: LSJ
  rationale: Sigue la revisión inglesa que armoniza ambos imperativos como 'keep'; en español 'guardar' funciona para ambos.
- source_word: ἀπόστητε ἀπὸ τοῦ θυμοῦ
  english_pob_choice: Depart from anger
  chosen_spanish: Apártense de la ira
  alternatives_spanish:
  - Aléjense de la ira
  - Retírense del enojo
  lexicon: LSJ
  rationale: Refleja la revisión inglesa más natural y precisa para ἀπόστητε.
- source_word: μισήσατε τὸ ψεῦδος
  english_pob_choice: hate falsehood
  chosen_spanish: aborrezcan la falsedad
  alternatives_spanish:
  - odien la mentira
  lexicon: LSJ
  rationale: '''Aborrecer'' es el verbo elevado y ético tradicional en español para μισέω en contextos morales.'
- source_word: κατοικήσει ἐν ὑμῖν
  english_pob_choice: dwell in you
  chosen_spanish: habite en ustedes
  alternatives_spanish:
  - more en ustedes
  lexicon: LSJ
  rationale: Refleja la revisión inglesa de 'among you' a 'in you'; ἐν ὑμῖν admite ambas, pero la revisión opta por la interna.
- source_word: Βελίαρ
  english_pob_choice: Beliar
  chosen_spanish: Beliar
  alternatives_spanish:
  - Belial
  lexicon: Greek witness tradition
  rationale: Consistencia con el cap. 4.
translation_notes:
  revision_awareness: 'El inglés POB pasó por: ''observe'' → ''keep'', ''Stand away from anger'' → ''Depart from anger'', ''dwell among you'' → ''dwell in you''. El español sigue todos estos cambios.'
  spanish_consistency_notes:
  - θυμός → ira; ψεῦδος → falsedad.
  - Κύριος → Señor; Βελίαρ → Beliar.
  - φυλάσσω y τηρέω ambos → 'guardar' (siguiendo la armonización inglesa).
