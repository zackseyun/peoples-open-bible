translation:
  language: es
  text: 'Pero los hombres que habían subido con él dijeron[a]: «No podemos subir contra el pueblo[b], porque es más fuerte que nosotros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: literalmente, “subir al pueblo”; en contexto militar, la frase significa “subir contra el pueblo”.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo tiene singular: “el pueblo… es más fuerte que nosotros”; el español puede entenderlo como colectivo sin necesidad de pluralizarlo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָאֲנָשִׁים
  english_pob_choice: But the men
  chosen_spanish: Pero los hombres
  alternatives_spanish:
  - Y los hombres
  - Pero los hombres
  lexicon: HALOT
  rationale: El ו inicial introduce contraste discursivo con el informe de Caleb; por eso “Pero” comunica mejor la oposición que un simple “Y”. “Hombres” mantiene el referente concreto del hebreo sin volverlo genérico.
- source_word: אֲשֶׁר עָלוּ עִמּוֹ
  english_pob_choice: who had gone up with him
  chosen_spanish: que habían subido con él
  alternatives_spanish:
  - que subieron con él
  - que habían subido con él
  lexicon: HALOT
  rationale: El pluscuamperfecto español ayuda a situar la subida como acción anterior a “dijeron”, igual que en la solución inglesa. “Subido” conserva el valor literal de עלה sin perder la referencia al viaje conjunto.
- source_word: אָמְרוּ
  english_pob_choice: said
  chosen_spanish: dijeron
  alternatives_spanish:
  - dijeron
  - estaban diciendo
  lexicon: HALOT
  rationale: El perfecto simple es el equivalente narrativo natural en español para el qatal en esta secuencia histórica.
- source_word: לֹא נוּכַל
  english_pob_choice: We are not able
  chosen_spanish: No podemos
  alternatives_spanish:
  - No somos capaces
  - No podemos
  lexicon: HALOT
  rationale: “Podemos” expresa con claridad la incapacidad; en español suena más natural que una formulación pesada como “no somos capaces”, aunque esa también sería posible.
- source_word: לַעֲלוֹת
  english_pob_choice: to go up
  chosen_spanish: subir
  alternatives_spanish:
  - subir
  - ir contra
  lexicon: HALOT
  rationale: El hebreo dice literalmente “subir”; en español, “subir” preserva ese valor básico y la inferencia militar queda sostenida por el contexto. No se introduce “atacar” en el texto principal porque el original no lo expresa de forma explícita.
- source_word: אֶל הָעָם
  english_pob_choice: against the people
  chosen_spanish: contra el pueblo
  alternatives_spanish:
  - al pueblo
  - contra el pueblo
  lexicon: HALOT
  rationale: La preposición hebrea aquí tiene fuerza adversativa en contexto militar; “contra” reproduce esa dirección de enfrentamiento. “Pueblo” mantiene el sustantivo colectivo.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Introduce la causa de su afirmación, y “porque” es la forma más clara y directa en español.
- source_word: חָזָק הוּא מִמֶּנּוּ
  english_pob_choice: they are stronger than we are
  chosen_spanish: es más fuerte que nosotros
  alternatives_spanish:
  - es más fuerte que nosotros
  - son más fuertes que nosotros
  lexicon: HALOT
  rationale: El hebreo usa singular con sustantivo colectivo; en español puede conservarse el singular “es” para reflejar ese rasgo formal, mientras que “más fuerte que nosotros” mantiene la comparación de מִן. Se evita pluralizar de manera obligatoria, aunque el colectivo puede sugerir múltiples habitantes.
theological_decisions:
- issue: Uso del singular colectivo en חָזָק הוּא מִמֶּנּוּ
  english_pob_reading: English renders the collective sense as plural, 'they are stronger than we are.'
  chosen_spanish_reading: Mantener “es más fuerte que nosotros” con sujeto colectivo implícito en “el pueblo”.
  alternative_spanish_readings:
  - son más fuertes que nosotros
  - es más fuerte que nosotros
  rationale: El hebreo conserva singular con הָעָם como colectivo. El español puede reflejar esa forma sin perder comprensión, y así se deja visible la tensión entre la forma gramatical singular y el sentido colectivo. La comparación sigue siendo claramente de superioridad de fuerza.
  doctrine_reference: Observación gramatical del texto hebreo; no implica una cuestión doctrinal.
translation_notes:
  revision_awareness: Se siguió la lectura auditada del POB en inglés sin cambios revisionales posteriores; la versión española conserva la misma estructura de contraste, incapacidad y comparación de fuerza, manteniendo la literalidad de “subir” y explicando en nota el valor militar de la construcción.
  spanish_consistency_notes:
  - Se usa “Yahvé” solo cuando el texto fuente lo exige; este versículo no contiene el nombre divino.
  - Se mantiene “pueblo” para הָעָם por consistencia con el contexto narrativo colectivo.
  - Se evita “atacar” en el cuerpo del texto para no sobreinterpretar לַעֲלוֹת; la nota explica la lectura contextual.
  - No se pluraliza obligatoriamente el predicado de fuerza, para respetar la forma singular del hebreo.
