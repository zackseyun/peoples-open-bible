translation:
  language: es
  text: En una columna de nube les habló[a]; ellos guardaron sus testimonios y el estatuto que les dio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Desde una columna de nube les habló». La preposición hebrea puede entenderse con matiz locativo o de procedencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּעַמּוּד עָנָן
  english_pob_choice: In a pillar of cloud
  chosen_spanish: En una columna de nube
  alternatives_spanish:
  - Desde una columna de nube
  - En el pilar de nube
  lexicon: HALOT
  rationale: La preposición ב admite valor locativo e instrumental. "En una columna de nube" conserva la imagen y sigue de cerca la opción inglesa, con español natural y digno. "Columna" comunica bien עַמּוּד sin necesidad de una paráfrasis.
- source_word: יְדַבֵּר
  english_pob_choice: he spoke
  chosen_spanish: habló
  alternatives_spanish:
  - hablaba
  - hablaría
  lexicon: HALOT
  rationale: En este contexto poético-histórico, el yiqtol resume una acción pasada de Yahvé. "Habló" resulta natural en español y preserva el valor retrospectivo sin forzar un aspecto progresivo.
- source_word: אֲלֵיהֶם
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - les
  - a ellos y a ellas
  lexicon: HALOT
  rationale: Se mantiene el referente inmediato del contexto anterior y se conserva la referencia explícita del hebreo. "A ellos" es claro y transparente en español bíblico contemporáneo.
- source_word: שָׁמְרוּ
  english_pob_choice: they kept
  chosen_spanish: guardaron
  alternatives_spanish:
  - observaron
  - cumplieron
  lexicon: HALOT
  rationale: Aunque שׁמר puede ser "observar" o "guardar", el español "guardaron" refleja adecuadamente la idea de preservar/atenerse a los mandamientos, sin perder la fuerza de obediencia del hebreo.
- source_word: עֵדֹתָיו
  english_pob_choice: his testimonies
  chosen_spanish: sus testimonios
  alternatives_spanish:
  - sus decretos
  - sus testimonios del pacto
  lexicon: HALOT
  rationale: '"Testimonios" conserva la terminología distintiva de עֵדֹת y evita nivelarla con חֹק. El posesivo se entiende como el de Yahvé, conforme al contexto.'
- source_word: וְחֹק
  english_pob_choice: and the statute
  chosen_spanish: y la estatuta
  alternatives_spanish:
  - y el estatuto
  - y el decreto
  - y la ordenanza
  lexicon: HALOT
  rationale: חֹק es singular y legal-covenantal. En español, "estatuto" es la opción más natural y fiel; la forma "estatuta" no es idiomática, por lo que se evita en el texto principal. Se distingue de עֵדֹתָיו manteniendo un término jurídico diferente.
- source_word: נָתַן לָמוֹ
  english_pob_choice: he gave them
  chosen_spanish: que les dio
  alternatives_spanish:
  - que él les dio
  - que les había dado
  lexicon: HALOT
  rationale: El hebreo conecta naturalmente la cláusula con "la estatuto/estatuto". En español, "que les dio" integra la relación sin recargar la sintaxis y preserva el sentido de donación divina.
theological_decisions:
- issue: Referente de "él" y "ellos" en el contexto inmediato
  english_pob_reading: '"He" refers to the LORD, and "them" refers to Moses, Aaron, and Samuel named in the preceding verse.'
  chosen_spanish_reading: '"Habló" y "les dio" se refieren a Yahvé; "a ellos" y "les" remiten a los personajes nombrados en el versículo anterior.'
  alternative_spanish_readings:
  - '"A ellos" podría generalizarse a Israel por medio de sus representantes.'
  - '"Les" podría dejarse implícito sin pronombre explícito.'
  rationale: El contexto inmediato nombra a Moisés, Aarón y Samuel, y el verso continúa la descripción de la relación de Yahvé con ellos. La traducción conserva los pronombres explícitos del hebreo y no amplía el referente en el texto principal.
  doctrine_reference: Salmo 99:6-7; coherencia contextual del referente pronominal.
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia entre el texto hebreo, la traducción inglesa auditada y la revisión más reciente, sin cambios pendientes relevantes. Se mantiene la distinción léxica entre עֵדֹתָיו y חֹק, y se conserva la ambigüedad de בְּעַמּוּד עָנָן con nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino según el estándar del proyecto.
  - Se conserva la distinción entre «testimonios» y «estatuto» para reflejar dos términos hebreos distintos.
  - La nota a cubre la ambigüedad de la preposición hebrea sin alterar el texto principal.
  - Se evita el calco poco natural «estatuta» en la línea principal; se documenta la alternativa preferible «estatuto» en la nota.
