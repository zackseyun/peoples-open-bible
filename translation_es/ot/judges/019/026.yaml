translation:
  language: es
  text: La mujer llegó cuando estaba amaneciendo[b] y cayó a la entrada de la casa del hombre donde estaba su amo[a], hasta que amaneció.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Su amo» conserva el sentido de autoridad del hebreo אֲדוֹנֶיהָ; no se explicita aquí «su marido».
    reason: lexical_alternative
  - marker: b
    text: «Cuando estaba amaneciendo» traduce la idiomática idea hebrea de «al girar la mañana» o «hacia el amanecer».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּבֹא
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - arribó
  lexicon: HALOT
  rationale: בוא expresa movimiento y llegada. En español, «llegó» comunica con naturalidad la acción de entrar en escena sin añadir un matiz de retorno que el verbo hebreo no exige por sí mismo.
- source_word: לִפְנוֹת הַבֹּקֶר
  english_pob_choice: as morning was dawning
  chosen_spanish: cuando estaba amaneciendo
  alternatives_spanish:
  - al amanecer
  - cuando despuntaba la mañana
  - antes del alba
  lexicon: HALOT
  rationale: La construcción idiomática señala el giro/approach del amanecer. «Cuando estaba amaneciendo» preserva el valor temporal e idiomático en español sin volverlo mecánico ni perder la referencia al inicio de la mañana.
- source_word: וַתִּפֹּל
  english_pob_choice: fell
  chosen_spanish: cayó
  alternatives_spanish:
  - se desplomó
  - se derrumbó
  - se cayó
  lexicon: HALOT
  rationale: נפל significa básicamente «caer». «Cayó» conserva la sobriedad y crudeza del hebreo; formas como «se desplomó» interpretan más de lo que el verbo por sí solo dice.
- source_word: פֶּתַח בֵּית
  english_pob_choice: at the entrance of the house
  chosen_spanish: a la entrada de la casa
  alternatives_spanish:
  - en el umbral de la casa
  - a la puerta de la casa
  - en la entrada de la casa
  lexicon: HALOT
  rationale: פֶּתַח es «apertura/entrada». «A la entrada de la casa» reproduce bien la relación espacial del hebreo con una formulación natural en español.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el varón
  - el dueño de la casa
  lexicon: HALOT
  rationale: אִישׁ es el sustantivo común «hombre». Mantenerlo así evita precisar indebidamente la identidad del personaje más allá de lo que el hebreo dice en esta cláusula.
- source_word: אֲדוֹנֶיהָ
  english_pob_choice: her master
  chosen_spanish: su amo
  alternatives_spanish:
  - su señor
  - su dueño
  - su marido
  lexicon: HALOT
  rationale: אדון con sufijo de 3.ª femenina singular expresa autoridad o señorío. En esta narrativa, el vínculo social es de dominio sobre ella; «su amo» preserva esa fuerza léxica mejor que suavizarlo como «marido».
- source_word: שָּׁם
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - allí donde
  - en ese lugar donde
  lexicon: HALOT
  rationale: Con אֲשֶׁר, שָׁם funciona adverbialmente y puede expresarse de manera natural con «donde». Así se conserva la relación de ubicación sin recurrir a un calco duro como «allí».
- source_word: עַד הָאוֹר
  english_pob_choice: until it was light
  chosen_spanish: hasta que hubo luz
  alternatives_spanish:
  - hasta que amaneció
  - hasta que clareó
  - hasta la luz
  lexicon: HALOT
  rationale: La frase marca duración hasta que comenzó la claridad del día. «Hasta que hubo luz» mantiene el umbral temporal sin sobreespecificar más que el hebreo y sin perder la referencia al comienzo de la claridad.
theological_decisions:
- issue: Término de autoridad en אֲדוֹנֶיהָ
  english_pob_reading: her master; not explicitly her husband
  chosen_spanish_reading: su amo; término de autoridad, no una identificación explícita como marido
  alternative_spanish_readings:
  - su señor
  - su dueño
  - su esposo
  rationale: El hebreo usa un término de señorío/autoridad. En español conviene conservar esa tensión porque el texto no dice directamente «esposo»; eso evita suavizar la relación social que el narrador presenta.
  doctrine_reference: Éxodo 21:5-6; uso bíblico de אדון como relación de dominio
- issue: Implicación narrativa de la caída y el amanecer
  english_pob_reading: the woman came as morning was dawning and fell... until it was light
  chosen_spanish_reading: la mujer llegó cuando estaba amaneciendo y cayó... hasta que hubo luz
  alternative_spanish_readings:
  - llegó al amanecer y cayó... hasta que amaneció
  - llegó antes del alba y cayó... hasta la luz
  rationale: 'La escena mantiene el tono sobrio y trágico del hebreo: llegada al amanecer, caída en la entrada, permanencia allí hasta que hubo luz. No se añade explicativamente una causa o intensidad que el texto no explicita.'
  doctrine_reference: No doctrinal issue; narrative fidelity to the Hebrew text
translation_notes:
  revision_awareness: La traducción sigue la revisión inglesa más reciente, que prefirió una formulación más natural para el momento temporal («as morning was dawning») en vez de una calca más rígida. El español adopta una solución equivalente y natural, manteniendo el valor idiomático del hebreo y la sobriedad narrativa del texto.
  spanish_consistency_notes:
  - Se usa «Yahvé» en esta sección no porque aparezca en el versículo, sino como convención general del proyecto cuando corresponda.
  - Se conserva «amo» para reflejar la relación de autoridad indicada por אֲדוֹנֶיהָ, en línea con la decisión inglesa de no leer automáticamente «marido».
  - «Cayó» mantiene el verbo básico sin intensificarlo innecesariamente; el contexto ya sugiere la gravedad de la escena.
  - La expresión final «hasta que hubo luz» busca ser idiomática en español y, al mismo tiempo, respetar el límite temporal del hebreo.
