translation:
  language: es
  text: Y ellos cargarán con su castigo[a]; el castigo del que consulta será el mismo que el castigo del profeta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y ellos cargarán con su culpa/iniquidad; la culpa del que consulta será como la culpa del profeta». El hebreo puede referirse a iniquidad, culpa o al castigo que resulta de la culpa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָשְׂאוּ
  english_pob_choice: And they will bear
  chosen_spanish: Y ellos cargarán
  alternatives_spanish:
  - Y ellos llevarán
  - Y ellos soportarán
  lexicon: HALOT
  rationale: נשא con עון expresa la idea de cargar o llevar la culpa/pena. «Cargarán» conserva la imagen idiomática y funciona de manera natural en español.
- source_word: עֲוֺנָם
  english_pob_choice: their punishment
  chosen_spanish: su castigo
  alternatives_spanish:
  - su culpa
  - su iniquidad
  lexicon: HALOT
  rationale: En este contexto judicial, el hebreo puede abarcar culpa, iniquidad o la pena resultante. «Castigo» comunica con claridad el efecto penal que el POB inglés destacó, sin borrar que el término hebreo también tiene un trasfondo moral.
- source_word: כַּעֲוֺן
  english_pob_choice: the punishment ... will be the same as the punishment
  chosen_spanish: el castigo ... será el mismo que el castigo
  alternatives_spanish:
  - la culpa ... será como la culpa
  - la iniquidad ... será como la iniquidad
  lexicon: HALOT
  rationale: El prefijo comparativo כ pide una equivalencia entre ambas partes. «Será el mismo que» explicita la comparación en español sin añadir interpretación ajena al hebreo.
- source_word: הַדֹּרֵשׁ
  english_pob_choice: the one who inquires
  chosen_spanish: el que consulta
  alternatives_spanish:
  - el que inquiere
  - el que busca
  lexicon: HALOT
  rationale: Aquí דרש se refiere a quien busca consulta u oráculo de un profeta. «Consulta» es más idiomático en español y mantiene el sentido de preguntar buscando respuesta profética.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  lexicon: HALOT
  rationale: Correspondencia directa y estándar de נביא.
- source_word: יִהְיֶה
  english_pob_choice: will be
  chosen_spanish: será
  alternatives_spanish:
  - estará
  lexicon: HALOT
  rationale: El verbo copulativo futuro queda mejor en español con «será» para una predicación de equivalencia entre ambos castigos.
theological_decisions:
- issue: Sentido de עון en una sentencia judicial
  english_pob_reading: Rendered as 'punishment' rather than 'iniquity' or 'guilt' in the main text.
  chosen_spanish_reading: «castigo» en el texto principal, con la alternativa de «culpa/iniquidad» preservada en la nota.
  alternative_spanish_readings:
  - «Y ellos cargarán su culpa; la culpa del que consulta será la misma que la culpa del profeta.»
  - «Y ellos cargarán su iniquidad; la iniquidad del que consulta será la misma que la iniquidad del profeta.»
  rationale: En la fórmula «cargar עון», el hebreo puede señalar tanto la culpa moral como la pena consecuente. El POB inglés eligió «punishment» por claridad judicial; el español sigue esa decisión para el texto principal, pero mantiene abiertas las otras dos posibilidades porque también están justificadas por el valor semántico del término.
  doctrine_reference: 'Translation philosophy §5: consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: El registro inglés no muestra revisiones aplicadas y el paso más reciente quedó sin cambios; por tanto, esta propuesta sigue de cerca la decisión establecida en el audit trail y solo la adapta al español con equivalencia óptima.
  spanish_consistency_notes:
  - Se mantiene «castigo» como término principal para עון en este versículo, conforme a la lectura judicial del contexto.
  - Se conserva la simetría entre «el que consulta» y «el profeta», reflejando la estructura comparativa del hebreo.
  - La nota al pie preserva la tensión semántica entre culpa, iniquidad y pena, sin resolverla de forma reductiva.
