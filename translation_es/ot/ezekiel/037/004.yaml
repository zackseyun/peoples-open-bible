translation:
  language: es
  text: 'Entonces me dijo: “Profetiza sobre estos huesos, y diles: ‘Huesos secos, oigan la palabra de Yahvé[a].’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלַי
  english_pob_choice: Then he said to me
  chosen_spanish: Entonces me dijo
  alternatives_spanish:
  - Y me dijo
  - Luego me dijo
  lexicon: HALOT
  rationale: La secuencia narrativa del waw-consecutivo se expresa naturalmente en español con 'Entonces', manteniendo el avance del relato sin forzar un calco.
- source_word: הִנָּבֵא
  english_pob_choice: Prophesy
  chosen_spanish: Profetiza
  alternatives_spanish:
  - Profetiza como profeta
  - Habla proféticamente
  lexicon: HALOT
  rationale: El imperativo de נבא se vierte con el verbo directo 'profetiza', que conserva el valor técnico y bíblico del mandato.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - contra
  - acerca de
  - a
  lexicon: HALOT
  rationale: Con נבא, la preposición pide una relación de dirección/objeto. 'Sobre' reproduce bien la imagen del acto profético dirigido a los huesos y evita el matiz indebido de confrontación que tendría 'contra'.
- source_word: הָעֲצָמֹת הָאֵלֶּה
  english_pob_choice: these bones
  chosen_spanish: estos huesos
  alternatives_spanish:
  - estos huesos mismos
  lexicon: HALOT
  rationale: El demostrativo se expresa de forma simple y natural. No se añade 'secos' aquí porque el adjetivo aparece explícitamente en el vocativo siguiente.
- source_word: וְאָמַרְתָּ אֲלֵיהֶם
  english_pob_choice: and say to them
  chosen_spanish: y diles
  alternatives_spanish:
  - y diles a ellos
  - y habla con ellos
  lexicon: HALOT
  rationale: אמר se traduce con 'decir'; el imperativo indirecto 'diles' concentra la orden en español y conserva la fuerza directa.
- source_word: הָעֲצָמוֹת הַיְבֵשׁוֹת
  english_pob_choice: Dry bones
  chosen_spanish: Huesos secos
  alternatives_spanish:
  - ¡Huesos secos!
  - Oh huesos secos
  lexicon: HALOT
  rationale: El hebreo funciona como vocativo. En español, la lectura más natural y fiel es 'Huesos secos' sin añadir material exclamativo que no está en el texto.
- source_word: שִׁמְעוּ
  english_pob_choice: hear
  chosen_spanish: oigan
  alternatives_spanish:
  - escuchen
  lexicon: HALOT
  rationale: Para un imperativo plural dirigido directamente al vocativo, 'oigan' mantiene la orden audible y solemne. 'Escuchen' es posible, pero 'oigan' preserva mejor la resonancia bíblica de שמע en este contexto.
- source_word: דְּבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la palabra del Señor
  lexicon: HALOT
  rationale: דבר en la fórmula profética se vierte como 'palabra'. Se mantiene 'Yahvé' en lugar de una sustitución eclesiástica, conforme al criterio del proyecto para יהוה.
theological_decisions:
- issue: Representación del Tetragrámaton יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el nombre divino; la política del proyecto pide reflejarlo en la traducción principal con 'Yahvé', no con una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto inglés no presenta revisiones textuales ni cambios de última pasada; se mantiene la lectura estable con la única decisión relevante de nombre divino y formulación natural del imperativo profético en español.
  spanish_consistency_notes:
  - Se conserva el tono profético directo y la secuencia narrativa breve del hebreo.
  - '''Yahvé'' se usa de manera consistente para יהוה, en línea con la terminología del proyecto.'
  - '''Profetiza'' y ''oigan'' mantienen el registro bíblico sin arcaizar excesivamente el español.'
