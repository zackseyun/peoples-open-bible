lexical_decisions:
- source_word: וַ/אֲחֵי/הֶם
  english_pob_choice: and their brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus parientes
  - y sus hermanos de clan
  lexicon: HALOT
  rationale: El término con sufijo posesivo plural se refiere de manera natural a varones emparentados o asociados dentro de la lista del pacto. 'Hermanos' conserva la relación familiar/grupal inmediata sin ampliar innecesariamente a un sentido más interpretativo como 'parientes'.
- source_word: שְׁבַנְיָה
  english_pob_choice: Shebaniah
  chosen_spanish: Sebenías
  alternatives_spanish:
  - Shebanías
  - Sebanías
  lexicon: transliteración convencional al español bíblico
  rationale: Nombre propio; se adapta a la fonética y ortografía usual del español bíblico. La forma con -ías refleja de modo natural el final teofórico hebreo -yāh/-yāhû sin alterar el referente.
- source_word: הֽוֹדִיָּה
  english_pob_choice: Hodiah
  chosen_spanish: Hodías
  alternatives_spanish:
  - Jodías
  - Hodiah
  lexicon: transliteración convencional al español bíblico
  rationale: Nombre propio; se mantiene la transliteración estándar al español. Se prefiere 'Hodías' por legibilidad y por conservar la terminación nominal esperable en nombres hebreos.
- source_word: קְלִיטָא
  english_pob_choice: Kelita
  chosen_spanish: Quelita
  alternatives_spanish:
  - Kelita
  lexicon: transliteración convencional al español bíblico
  rationale: Nombre propio; el inicio con qu- representa mejor el valor oclusivo velar ante e/i en ortografía española, manteniendo una lectura natural para el público hispanohablante.
- source_word: פְּלָאיָה
  english_pob_choice: Pelaiah
  chosen_spanish: Pelaías
  alternatives_spanish:
  - Pelaía
  - Pelayas
  lexicon: transliteración convencional al español bíblico
  rationale: Nombre propio; se conserva el elemento teofórico final con -ías, que en español bíblico comunica adecuadamente la terminación ligada a Yahvé. La forma evita una pérdida de la señal teológica del nombre.
- source_word: חָנָן
  english_pob_choice: Hanan
  chosen_spanish: Janán
  alternatives_spanish:
  - Hanan
  lexicon: transliteración convencional al español bíblico
  rationale: Nombre propio; se usa j- para reflejar la aspiración hebrea inicial con ortografía natural del español. La forma aguda con tilde ayuda a mantener la pronunciación correcta.
