review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la estructura y el sentido general del hebreo: la concesión retórica de חָטָאתִי, la incapacidad en מָה אֶפְעַל לָךְ, la queja contra Dios como observador de la humanidad, la imagen de Job como objeto de ataque, y la lectura masorética difícil ''una carga para mí mismo''. Sin embargo, algunos giros no preservan con suficiente precisión la elección léxica del POB inglés ni la naturalidad del español.'
  spanish_quality_summary: El texto es comprensible y digno, pero 'guardián' inclina demasiado hacia protección frente a la ambigüedad vigilante/escrutadora de נֹצֵר, y 'como blanco para ti' suena algo forzado en español. También conviene añadir la nota de lectura alternativa sobre la cláusula final, ya que el inglés POB la conserva y el español actualmente no.
  glossary_alignment: No hay conflictos con términos troncales del proyecto como Yahvé, Mesías, etc. La decisión sobre אדם como 'la humanidad' es aceptable en español. La revisión recomendada ajusta נֹצֵר a 'vigilante' para conservar mejor la ambigüedad contextual, y formula לְמִפְגָּע לָךְ de manera más idiomática como 'tu blanco' mientras preserva en nota la alternativa 'blanco para ti'.
  issues:
  - severity: medium
    issue: '''guardián de la humanidad'' debilita la ambigüedad de נֹצֵר'
    rationale: El hebreo puede sugerir tanto guardar como vigilar/escrutar; en este contexto de queja, 'guardián' suena más benévolo de lo que el tono permite. 'Vigilante' o similar conserva mejor la tensión del original y del inglés 'watcher'.
  - severity: medium
    issue: '''me has puesto como blanco para ti'' es poco idiomático'
    rationale: Aunque intenta reflejar el dativo לָךְ, en español resulta rígido. 'Me has hecho tu blanco' transmite mejor la fuerza de la imagen y coincide con la decisión principal del POB, dejando 'blanco para ti' como alternativa en nota.
  - severity: medium
    issue: Falta la nota sobre la variante antigua en la cláusula final
    rationale: El inglés POB conserva en nota que algunas versiones antiguas reflejan 'una carga para ti'. El español debería mantener esa información para preservar el rastro auditado y la lectura textual alternativa.
  - severity: low
    issue: La nota a sobrecarga el texto con una alternativa idéntica a la principal
    rationale: 'La nota actual dice ''O: «si he pecado»'' cuando esa ya es la lectura principal. Conviene reformularla para explicar que alternativamente podría leerse como afirmación directa ''He pecado''.'
