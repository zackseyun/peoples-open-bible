revisions:
- from: Mantén lejos de mí[a] la falsedad y las palabras mentirosas; no me des pobreza ni riquezas[b]; susténtame con el pan asignado para mí.
  to: Aparta de mí la falsedad y las palabras mentirosas[a]; no me des pobreza ni riquezas; susténtame con el pan que me corresponde[b].
  rationale: Se ajustó la apertura a "Aparta de mí" por mayor naturalidad oracional en español; se corrigió la nota [a] para reflejar la alternativa léxica documentada; y se reemplazó "el pan asignado para mí" por "el pan que me corresponde", que expresa mejor la idea de porción adecuada/allotted y suena más idiomático sin introducir la asociación litúrgica como texto principal.
