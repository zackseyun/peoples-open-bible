translation:
  language: es
  text: Si lo ofrece como ofrenda de acción de gracias[a], entonces ofrecerá con el sacrificio de acción de gracias tortas sin levadura mezcladas con aceite, obleas sin levadura untadas[b] con aceite, y tortas de flor de harina bien mezclada[c] con aceite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "ofrenda de agradecimiento". El hebreo תּוֹדָה se refiere a una ofrenda presentada en acción de gracias.
    reason: lexical_alternative
  - marker: b
    text: O "ungidas con aceite". Aquí la expresión describe aceite aplicado a las obleas sin levadura como parte de la preparación del alimento, no una unción ritual de personas u objetos.
    reason: lexical_alternative
  - marker: c
    text: La preparación exacta sugerida por el término hebreo traducido "bien mezclada" es incierta; puede referirse a tortas hechas de flor de harina trabajada o mezclada cuidadosamente con aceite.
    reason: cultural_note
lexical_decisions:
- source_word: תּוֹדָה
  english_pob_choice: thanksgiving offering
  chosen_spanish: ofrenda de acción de gracias
  alternatives_spanish:
  - ofrenda de agradecimiento
  - ofrenda de gracias
  lexicon: HALOT
  rationale: En este contexto sacrificial, תּוֹדָה denota una ofrenda caracterizada por la gratitud o acción de gracias. "Ofrenda de acción de gracias" conserva el matiz semántico y suena natural en español contemporáneo sin perder el valor cultual del término.
- source_word: יַקְרִיבֶנּוּ
  english_pob_choice: he offers it
  chosen_spanish: lo ofrece
  alternatives_spanish:
  - lo presenta
  - lo acerca
  lexicon: HALOT
  rationale: El hifil de קרב en contextos sacrificiales significa presentar u ofrecer una víctima. "Lo ofrece" es la forma más natural y clara en español, y mantiene el sentido ritual explícito.
- source_word: זֶבַח הַתּוֹדָה
  english_pob_choice: the sacrifice of thanksgiving
  chosen_spanish: el sacrificio de acción de gracias
  alternatives_spanish:
  - el sacrificio de agradecimiento
  - el sacrificio de la ofrenda de acción de gracias
  lexicon: HALOT
  rationale: זֶבַח nombra el acto sacrificial o la víctima ofrecida, y הַתּוֹדָה especifica su tipo. "Sacrificio de acción de gracias" refleja con transparencia la relación constructa hebrea.
- source_word: חַלּוֹת מַצּוֹת
  english_pob_choice: unleavened loaves
  chosen_spanish: tortas sin levadura
  alternatives_spanish:
  - panes sin levadura
  - tortas ázimas
  lexicon: HALOT
  rationale: חַלּוֹת son tortas o panes preparados; מַצּוֹת indica que no llevan levadura. "Tortas sin levadura" es claro y adecuado para español bíblico actual, sin introducir un tecnicismo innecesario.
- source_word: בְּלוּלֹת בַּשֶּׁמֶן
  english_pob_choice: mixed with oil
  chosen_spanish: mezcladas con aceite
  alternatives_spanish:
  - mezcladas en aceite
  - amasadas con aceite
  lexicon: HALOT
  rationale: El participio de בלל comunica mezcla de ingredientes. "Mezcladas con aceite" es idiomático y suficiente para expresar la preparación culinaria requerida.
- source_word: רְקִיקֵי מַצּוֹת
  english_pob_choice: unleavened wafers
  chosen_spanish: hojuelas sin levadura
  alternatives_spanish:
  - galletas sin levadura
  - tortas delgadas sin levadura
  lexicon: HALOT
  rationale: רְקִיקִים son piezas delgadas, tipo wafer. "Hojuelas sin levadura" comunica la delgadez del alimento de manera natural en español y distingue esta preparación de las tortas anteriores.
- source_word: מְשֻׁחִים בַּשָּׁמֶן
  english_pob_choice: anointed with oil
  chosen_spanish: ungidas con aceite
  alternatives_spanish:
  - untadas con aceite
  - embadurnadas con aceite
  lexicon: HALOT
  rationale: Aunque en español "ungir" suele sugerir uso ceremonial, aquí sigue de cerca el valor léxico de משׁח tal como lo refleja la auditoría inglesa, y es aceptable para describir una preparación aplicada sobre las hojuelas.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina selecta
  lexicon: HALOT
  rationale: סֹלֶת es harina fina o de mejor calidad usada en ofrendas. "Flor de harina" es una equivalencia bíblica estable y comprensible para lectores de iglesia, manteniendo el valor cultual del término.
- source_word: מֻרְבֶּכֶת
  english_pob_choice: well mixed
  chosen_spanish: bien mezclada
  alternatives_spanish:
  - bien trabajada
  - amasada con esmero
  lexicon: HALOT
  rationale: La preparación exacta es incierta; el término apunta a una mezcla o elaboración cuidadosa, probablemente con aceite. "Bien mezclada" conserva la cautela exegética de la POB inglesa sin sobreespecificar el proceso.
- source_word: חַלֹּת
  english_pob_choice: cakes
  chosen_spanish: tortas
  alternatives_spanish:
  - panes
  - pasteles
  lexicon: HALOT
  rationale: En la tercera unidad, חַלֹּת alude a piezas preparadas de harina. "Tortas" mantiene coherencia con el primer elemento y evita la ambigüedad de "panes" en español.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, que prefirió "anointed with oil" frente a "spread with oil" por mayor precisión léxica. En español se conserva esa decisión con "ungidas con aceite". También se mantiene la cautela interpretativa de "well mixed" mediante "bien mezclada".
  spanish_consistency_notes:
  - Se tradujo יהוה como Yahvé según la norma del proyecto; este versículo no lo contiene.
  - 'Se mantuvo una terminología sacrificial consistente: ofrenda / sacrificio / tortas / hoquillas (hojuelas) sin introducción de vocabulario devocional no atestiguado.'
  - '"Ungidas" se usa aquí por fidelidad al matiz léxico de משׁח y por coherencia con la auditoría inglesa, aunque el contexto es culinario.'
  - Se evitó "Cristo" y otras equivalencias no pertinentes; tampoco aparece lenguaje doctrinal que requiera aclaración adicional.
