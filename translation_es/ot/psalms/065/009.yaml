base_translation:
  language: en
  yaml_path: translation/ot/psalms/065/009.yaml
  text: Those who dwell at the ends of the earth fear because of your signs[b][a]; you make the dawn and the evening shout for joy.
  footnotes:
  - marker: a
    text: Or 'stand in awe because of your signs.' The Hebrew verb can express fear, dread, or reverent awe.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the outgoings of morning and evening.' The phrase poetically refers to dawn and dusk, or to the places/times where morning and evening emerge.
    reason: lexical_alternative
