    issue: La cláusula final traduce וַיָּחֶל como 'quedó muy angustiado' en lugar de la lectura principal auditada 'fue/quedó gravemente herido'.
    rationale: Aunque el hebreo es difícil, el POB inglés documentó como elección principal 'he was greatly wounded' por el contexto inmediato y el paralelo en 1 Crónicas 10:3, dejando la angustia como alternativa en nota. El español no debe invertir esa decisión sin necesidad fuerte.
  - severity: high
