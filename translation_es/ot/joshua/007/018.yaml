translation:
  language: es
  text: Entonces hizo acercarse a su familia, hombre por hombre[a], y Acan, hijo de Carmi, hijo de Zabdi, hijo de Zera, de la tribu de Judá, fue tomado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por los hombres»; la frase hebrea es breve y puede describir que el grupo doméstico fue presentado en subdivisiones masculinas para el proceso del sorteo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְרֵב
  english_pob_choice: Then he brought ... near
  chosen_spanish: Entonces hizo acercar
  alternatives_spanish:
  - Entonces presentó
  - Entonces hizo traer
  lexicon: HALOT
  rationale: El hifil de קרב expresa hacer que algo se acerque o presentarlo. En español, «hizo acercar» conserva la idea causal y el tono procedimental del pasaje sin volverlo demasiado interpretativo.
- source_word: בֵּיתוֹ
  english_pob_choice: his household
  chosen_spanish: su casa[a]
  alternatives_spanish:
  - su hogar
  - su familia
  - su casa
  lexicon: HALOT
  rationale: בַּיִת puede significar casa, casa-hogar o casa en sentido de linaje/hogar doméstico. Aquí el contexto de presentación para sorteo sugiere el grupo doméstico. Se usa «su casa» porque refleja mejor la literalidad hebrea y permite en la nota aclarar el valor de conjunto doméstico, manteniendo la tensión entre edificio y unidad familiar.
- source_word: לַגְּבָרִים
  english_pob_choice: man by man
  chosen_spanish: a los hombres
  alternatives_spanish:
  - de hombre en hombre
  - por los hombres
  - varón por varón
  lexicon: HALOT
  rationale: La frase es breve y algo elíptica; en este contexto probablemente señala la presentación por subdivisiones masculinas o por los hombres del grupo. «A los hombres» conserva el plural masculino y la función procedimental sin forzar una expansión excesiva; la nota recoge la alternativa más literal.
- source_word: וַיִּלָּכֵד
  english_pob_choice: was taken
  chosen_spanish: fue tomado
  alternatives_spanish:
  - fue capturado
  - quedó prendido
  - fue escogido
  lexicon: HALOT
  rationale: El nifal de לכד significa literalmente ser tomado/capturado. «Fue tomado» mantiene la forma pasiva y la repetición del motivo narrativo, evitando traducirlo como «escogido», que ya interpretaría el proceso de la suerte.
- source_word: עָכָן
  english_pob_choice: Achan
  chosen_spanish: Acan
  alternatives_spanish:
  - Aján
  - Achan
  lexicon: Onomástica bíblica
  rationale: Se adopta la forma española usual «Acan» para el nombre propio, sin perder la identificación del personaje.
- source_word: בֶּן כַּרְמִי בֶן זַבְדִּי בֶן זֶרַח
  english_pob_choice: son of Carmi, son of Zabdi, son of Zerah
  chosen_spanish: hijo de Carmi, hijo de Zabdi, hijo de Zera
  alternatives_spanish:
  - hijo de Carmi, hijo de Zabdi, hijo de Zerah
  - descendiente de Carmi, de Zabdi y de Zera
  lexicon: HALOT
  rationale: Se preserva la cadena genealógica con «hijo de» para mantener la formalidad y la estructura del hebreo. «Zera» adapta la transliteración al español más natural, sin alterar el referente.
- source_word: לְמַטֵּה יְהוּדָה
  english_pob_choice: of the tribe of Judah
  chosen_spanish: de la tribu de Judá
  alternatives_spanish:
  - perteneciente a la tribu de Judá
  - de la tribu de Judá
  lexicon: HALOT
  rationale: מַטֶּה en contexto tribal significa «tribu». «De la tribu de Judá» es la equivalencia natural y fiel al valor social-tribal del término.
theological_decisions:
- issue: Alcance de בֵּיתוֹ en un contexto de sorteo
  english_pob_reading: his household
  chosen_spanish_reading: su casa
  alternative_spanish_readings:
  - su familia
  - su hogar
  rationale: La forma hebrea es ambigua entre edificio y unidad doméstica. En este contexto de acercamiento para el sorteo, la lectura doméstica es la más probable; sin embargo, se conserva la literalidad de «casa» en el texto principal para no borrar la tensión semántica.
  doctrine_reference: Ninguno; decisión semántica y narrativa.
- issue: Valor de וַיִּלָּכֵד en el procedimiento del sorteo
  english_pob_reading: was taken
  chosen_spanish_reading: fue tomado
  alternative_spanish_readings:
  - fue capturado
  - fue escogido
  rationale: El hebreo usa una forma de «capturar/tomar» para expresar el resultado del sorteo. «Fue tomado» preserva la fórmula sin convertirla en una interpretación más explícita del mecanismo de elección.
  doctrine_reference: Ninguno; fidelidad lexical al relato.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el estado de alta concordancia del registro inglés: no hay revisiones aplicadas y el pasaje se mantiene estable. La traducción española sigue esa misma lectura, conservando la estructura narrativa, la genealogía completa y el valor pasivo de «fue tomado».'
  spanish_consistency_notes:
  - Se mantiene el nombre propio «Acan» en forma española coherente con una transliteración bíblica estándar.
  - Se conserva «de la tribu de Judá» como fórmula estable para מַטֶּה en contexto tribal.
  - Se evita sustituir «fue tomado» por una expresión más interpretativa que diluya el eco del hebreo.
