translation:
  language: es
  text: Yahvé dispuso[a] un gran pez[c] para que se tragara a Jonás; y Jonás estuvo en el vientre del pez[b] tres días y tres noches[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «preparó» o «proveyó» un gran pez.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en las partes interiores del pez»; se vierte idiomáticamente como «en el vientre del pez».'
    reason: lexical_alternative
  - marker: c
    text: El hebreo dice «pez grande», no específicamente «ballena».
    reason: alternative_reading
  - marker: d
    text: La expresión «tres días y tres noches» se traduce tal como está, sin resolver la cuestión del cómputo inclusivo.
    reason: cross_reference
lexical_decisions:
- source_word: וַיְמַן / appointed
  english_pob_choice: appointed
  chosen_spanish: asignó
  alternatives_spanish:
  - apuntó
  - preparó
  - proveyó
  lexicon: HALOT
  rationale: El verbo hebreo expresa una acción soberana y deliberada de Yahvé. «Asignó» comunica bien esa determinación sin sonar tan técnico o menos natural que «apuntó», y evita perder la fuerza de iniciativa divina presente en el texto.
- source_word: יְהוָה / Yahweh
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre divino del tetragrámaton como «Yahvé», siguiendo la convención del proyecto y evitando la sustitución por un título.
- source_word: דָּג גָּדוֹל
  english_pob_choice: a great fish
  chosen_spanish: un gran pez
  alternatives_spanish:
  - un pez grande
  - una gran criatura marina
  - una ballena
  lexicon: HALOT
  rationale: El hebreo dice literalmente «pez» y no especifica ballena. «Gran pez» mantiene la indeterminación del original y suena natural en español.
- source_word: לִבְלֹעַ
  english_pob_choice: to swallow
  chosen_spanish: que se tragara
  alternatives_spanish:
  - para tragarse
  - para devorara
  - para engullir
  lexicon: HALOT
  rationale: El infinitivo expresa la acción de tragar de forma directa. En español, «tragarse» conserva esa fuerza verbal con un registro claro y bíblicamente sobrio.
- source_word: בִּמְעֵי הַדָּג
  english_pob_choice: in the belly of the fish
  chosen_spanish: en el vientre del pez
  alternatives_spanish:
  - en el interior del pez
  - en las entrañas del pez
  - en la panza del pez
  lexicon: HALOT
  rationale: El hebreo habla literalmente de las «entrañas/inward parts». «Vientre» reproduce la imagen corporal de manera idiomática y digna en español, como la POB inglesa lo hizo con «belly».
- source_word: שְׁלֹשָׁה יָמִים וּשְׁלֹשָׁה לֵילוֹת
  english_pob_choice: three days and three nights
  chosen_spanish: tres días y tres noches
  alternatives_spanish:
  - durante tres días y tres noches
  - por tres días y tres noches
  lexicon: HALOT
  rationale: Se conserva la expresión temporal exactamente como está en hebreo. No se resuelve en la traducción la cuestión del cómputo inclusivo, para mantener la tensión textual documentada.
theological_decisions:
- issue: Cómo rendir el nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrammaton directamente; por fidelidad al original y consistencia del proyecto, se traduce como «Yahvé» y no se lo enmascara con un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Especificidad del animal
  english_pob_reading: great fish
  chosen_spanish_reading: gran pez
  alternative_spanish_readings:
  - ballena
  - pez grande
  rationale: El hebreo nombra un pez de gran tamaño, no una ballena. «Gran pez» evita introducir una identificación más precisa que el texto no da.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §1: Original-language primacy over translation tradition'
- issue: Expresión temporal 'three days and three nights'
  english_pob_reading: three days and three nights
  chosen_spanish_reading: tres días y tres noches
  alternative_spanish_readings:
  - parte de tres días
  - por tres días
  rationale: Se mantiene la formulación hebrea sin armonizarla con explicaciones posteriores sobre cómputo inclusivo, preservando la tensión interpretativa del pasaje.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta ningún cambio; esta propuesta mantiene el acuerdo alto del control cruzado y conserva las decisiones lexicográficas y teológicas documentadas en el expediente inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה.
  - Se conserva «pez» y no «ballena», siguiendo la primacía del hebreo.
  - La imagen corporal se traduce con «vientre» para reflejar el modismo sin perder naturalidad.
  - 'La secuencia temporal permanece literal: «tres días y tres noches».'
