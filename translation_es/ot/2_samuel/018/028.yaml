  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo y del POB inglés en casi todos los puntos: «¡Paz!» conserva שָׁלוֹם con nota alternativa; «Bendito sea Yahvé, tu Dios» respeta בָּרוּךְ יְהוָה אֱלֹהֶיךָ; «ha entregado» para סִגַּר y «alzaron su mano contra» para נָשְׂאוּ אֶת יָדָם mantienen adecuadamente el valor léxico. Sin embargo, «se inclinó» queda algo corto frente a וַיִּשְׁתַּחוּ, especialmente al ir seguido de «con el rostro en tierra», donde el hebreo describe una postración plena. Además, «llamó» para וַיִּקְרָא es menos preciso que «llamó en voz alta» o «exclamó», dado el contexto de anuncio al rey.'
