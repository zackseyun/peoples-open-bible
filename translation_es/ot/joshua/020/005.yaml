translation:
  language: es
  text: Y si el vengador de la sangre lo persigue, no entregarán al homicida en su mano, porque golpeó a su prójimo sin intención y no le había odiado antes, de ayer o de anteayer[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «de ayer y de anteayer», un modismo hebreo que significa «antes» o «anteriormente».
    reason: lexical_alternative
lexical_decisions:
- source_word: גֹּאֵל הַדָּם
  english_pob_choice: the avenger of blood
  chosen_spanish: el vengador de la sangre
  alternatives_spanish:
  - el redentor de la sangre
  - el vengador de la sangre derramada
  lexicon: HALOT
  rationale: La fórmula legal de Josué 20 preserva la figura del pariente que exige justicia por sangre. «Vengador de la sangre» mantiene la fuerza técnica del término sin introducir lenguaje eclesiástico ajeno al contexto.
- source_word: יִרְדֹּף
  english_pob_choice: pursues
  chosen_spanish: persigue
  alternatives_spanish:
  - da caza a
  - sigue
  lexicon: HALOT
  rationale: El verbo expresa una acción de persecución dentro de un marco jurídico. «Persigue» es natural en español y conserva el matiz continuo de la acción.
- source_word: וְלֹא יַסְגִּרוּ
  english_pob_choice: they shall not hand ... over
  chosen_spanish: no entregarán
  alternatives_spanish:
  - no lo entregarán
  - no lo pondrán en manos de
  lexicon: HALOT
  rationale: El hiphil de סגר implica poner a alguien en poder de otro. «No entregarán» comunica bien la acción legal; se conserva luego la imagen de «en su mano» para reflejar el hebreo.
- source_word: הָרֹצֵחַ
  english_pob_choice: the manslayer
  chosen_spanish: el homicida
  alternatives_spanish:
  - el matador
  - el asesino
  lexicon: HALOT
  rationale: En este contexto no se trata de un asesino culpable sino de alguien que ha causado una muerte y ha huido a una ciudad de refugio. «Homicida» mantiene esa distinción mejor que «asesino».
- source_word: בְּיָדוֹ
  english_pob_choice: into his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - en su poder
  - en sus manos
  lexicon: HALOT
  rationale: La expresión conserva el hebraísmo legal de quedar sometido al poder del vengador. «En su mano» sigue de cerca el original sin perder inteligibilidad.
- source_word: בִּבְלִי דַעַת
  english_pob_choice: without intent
  chosen_spanish: sin intención
  alternatives_spanish:
  - sin saberlo
  - sin conocimiento
  - involuntariamente
  lexicon: HALOT
  rationale: La idea principal es la ausencia de intención culpable, más que la simple ignorancia. «Sin intención» refleja mejor el sentido jurídico del texto.
- source_word: הִכָּה
  english_pob_choice: struck
  chosen_spanish: hirió
  alternatives_spanish:
  - golpeó
  - hirió de muerte
  lexicon: HALOT
  rationale: Aunque el verbo básico es «golpear»/«herir», en español «hirió a su prójimo» comunica con claridad el hecho de causar daño físico en este contexto legal, sin añadir explícitamente más de lo que el hebreo dice aquí.
- source_word: רֵעֵהוּ
  english_pob_choice: his neighbor
  chosen_spanish: a su prójimo
  alternatives_spanish:
  - a su vecino
  - a su compañero
  - a su semejante
  lexicon: HALOT
  rationale: «Prójimo» es un equivalente natural y bíblico para רֵעַ, y expresa la relación interpersonal sin limitarla a cercanía geográfica.
- source_word: וְלֹא שֹׂנֵא הוּא לוֹ
  english_pob_choice: and had not hated him
  chosen_spanish: y no le había odiado
  alternatives_spanish:
  - y no era su enemigo
  - y no le tenía odio
  lexicon: HALOT
  rationale: La frase subraya ausencia de enemistad previa. «No le había odiado» conserva bien la relación personal y la dimensión retrospectiva del motivo legal.
- source_word: מִתְּמוֹל שִׁלְשׁוֹם
  english_pob_choice: from yesterday or the day before
  chosen_spanish: de ayer o de anteayer
  alternatives_spanish:
  - desde ayer o anteayer
  - de ayer y de anteayer
  - anteriormente
  lexicon: HALOT
  rationale: El hebreo es un modismo temporal. Se mantiene la literalidad idiomática en español con «de ayer o de anteayer», como apoyo auditable al sentido de tiempo reciente.
theological_decisions:
- issue: Distinción legal entre culpabilidad y homicidio no intencional
  english_pob_reading: Render as 'manslayer' rather than 'murderer'
  chosen_spanish_reading: Traducir הָרֹצֵחַ como «el homicida» en un sentido legal no concluyente de asesinato
  alternative_spanish_readings:
  - el asesino
  - el matador
  rationale: El verso forma parte del procedimiento sobre ciudades de refugio y distingue explícitamente entre muerte no intencional y odio previo. «Homicida» permite mantener la seriedad del acto sin imponer automáticamente la idea de asesinato premeditado.
  doctrine_reference: Translation philosophy §1, §5
- issue: Valor de בִּבְלִי דַעַת
  english_pob_reading: without intent
  chosen_spanish_reading: sin intención
  alternative_spanish_readings:
  - sin saberlo
  - sin conocimiento
  - involuntariamente
  rationale: La frase legal apunta a falta de intención, no solo a falta de información. «Sin intención» preserva ese punto jurídico y evita debilitar la responsabilidad diferenciada del contexto.
  doctrine_reference: Translation philosophy §1, §6
- issue: Expresión temporal final
  english_pob_reading: before, from yesterday or the day before
  chosen_spanish_reading: antes, de ayer o de anteayer
  alternative_spanish_readings:
  - anteriormente
  - antes de ayer
  - desde ayer o anteayer
  rationale: La combinación hebrea intensifica la noción de ausencia de enemistad previa. Mantener el modismo temporal ayuda a no borrar la fórmula legal completa y su valor retrospectivo.
  doctrine_reference: Applied revisions / latest_revision_pass
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión del inglés POB al conservar la cláusula temporal completa al final: no solo «antes», sino la forma idiomática «de ayer o de anteayer», para reflejar plenamente el hebreo. También se respetó la distinción legal de la ciudad de refugio mediante «el homicida» y «sin intención».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió «vengador de la sangre» para conservar el término técnico del contexto jurídico.
  - Se evitó «asesino» porque el pasaje explícitamente restringe la culpa por falta de intención y ausencia de odio previo.
  - La puntuación sigue el español moderno, con una sola oración condicional amplia, adecuada al tono legal del texto.
