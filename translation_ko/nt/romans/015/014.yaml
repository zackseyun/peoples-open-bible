id: ROM.15.14
reference: Romans 15:14
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Πέπεισμαι δέ, ἀδελφοί μου, καὶ αὐτὸς ἐγὼ περὶ ὑμῶν, ὅτι καὶ αὐτοὶ μεστοί ἐστε ἀγαθωσύνης, πεπληρωμένοι ⸀πάσης γνώσεως, δυνάμενοι καὶ ⸀ἀλλήλους νουθετεῖν.
base_translation:
  language: en
  yaml_path: translation/nt/romans/015/014.yaml
  text: And I myself am convinced about you, my brothers, that you yourselves also are full of goodness, filled with all knowledge, and able also to instruct one another.
translation:
  language: ko
  text: 나의 형제 여러분, 나 자신도 여러분에 관하여 확신합니다. 여러분 자신이 선함으로 가득하고 모든 지식으로 충만하며 서로를 권면할[a] 수 있다는 것을 말입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 νουθετέω는 「마음에 두게 하다」 곧 권면·훈계함을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πέπεισμαι
  english_pob_choice: I ... am convinced
  chosen_korean: 확신하다
  lexicon: BDAG
  rationale: 완료 시제. 14:14와 어휘 일관.
- source_word: ἀδελφοί μου
  english_pob_choice: my brothers
  chosen_korean: 나의 형제 여러분
  lexicon: BDAG
  rationale: 호칭 표현. 합쇼체에 「여러분」 보충.
- source_word: μεστοί ἀγαθωσύνης
  english_pob_choice: full of goodness
  chosen_korean: 선함으로 가득
  alternatives_korean:
  - 선으로 가득
  lexicon: BDAG
  rationale: 추상명사. 「선함」이 자연스러움.
- source_word: πεπληρωμένοι πάσης γνώσεως
  english_pob_choice: filled with all knowledge
  chosen_korean: 모든 지식으로 충만
  lexicon: BDAG
  rationale: 완료 분사. 「충만」이 정형.
- source_word: νουθετεῖν
  english_pob_choice: to instruct
  chosen_korean: 권면하다
  alternatives_korean:
  - 훈계하다
  - 충고하다
  lexicon: BDAG
  rationale: 마음에 새기게 하는 권면.
