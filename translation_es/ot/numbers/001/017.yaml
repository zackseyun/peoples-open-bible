translation:
  language: es
  text: Entonces Moisés y Aarón tomaron a estos hombres, que habían sido designados por sus nombres[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nombrados por nombre», es decir, «identificados específicamente».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomaron
  alternatives_spanish:
  - tomaron en su poder
  - recibieron
  - llamaron
  lexicon: HALOT
  rationale: El perfecto narrativo de לקח en este contexto administrativo se expresa de forma natural con «tomaron». Conserva el sentido verbal simple del hebreo sin introducir una interpretación más fuerte que la requerida por el contexto.
- source_word: מֹשֶׁה וְאַהֲרֹן
  english_pob_choice: Moses and Aaron
  chosen_spanish: Moisés y Aarón
  alternatives_spanish:
  - Moisés y Aaron
  lexicon: Convención onomástica bíblica
  rationale: Se conservan los nombres propios en su forma bíblica usual en español. La acentuación distingue la forma castellana estándar y mantiene legibilidad eclesial amplia.
- source_word: הָאֲנָשִׁים הָאֵלֶּה
  english_pob_choice: these men
  chosen_spanish: estos hombres
  alternatives_spanish:
  - estas personas
  - estos varones
  lexicon: HALOT
  rationale: אֲנָשִׁים es masculino plural y aquí alude a varones específicos ya identificados. «Hombres» preserva la precisión de género y evita suavizar el referente con un término más general.
- source_word: נִקְּבוּ בְּשֵׁמוֹת
  english_pob_choice: had been designated by name
  chosen_spanish: habían sido designados por nombre
  alternatives_spanish:
  - habían sido nombrados por nombre
  - habían sido especificados por nombre
  - habían sido llamados por nombre
  lexicon: HALOT
  rationale: La combinación nifal de נקב con בְּשֵׁמוֹת comunica identificación explícita o designación nominal. «Designados por nombre» conserva el matiz formal de selección/identificación que la POB inglesa destacó con «designated», sin perder el idiomatismo del hebreo.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo de Números 1:17 y mantiene la decisión auditable de la POB inglesa de entender נִקְּבוּ בְּשֵׁמוֹת como identificación formal. No se introducen cambios doctrinales ni variantes textuales.
  spanish_consistency_notes:
  - Se usa «Moisés» y «Aarón» con la ortografía bíblica estándar en español.
  - Se conserva «designados por nombre» para reflejar la estructura idiomática del hebreo y la decisión léxica inglesa.
  - 'El orden de la frase reproduce el sentido narrativo simple: sujetos, acción, objeto y cláusula relativa.'
