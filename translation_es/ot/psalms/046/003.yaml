    text: 'O: «aunque la tierra sea cambiada» o «cuando la tierra cambie». El verbo hebreo puede denotar cambio o alteración; en este contexto describe la desestabilización de la tierra.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «aunque los montes se tambaleen al corazón de los mares».'
    reason: lexical_alternative
  revision_rationale: Se reubica la nota [b] al verbo/cláusula que realmente modifica, se ajusta [a] para reflejar con mayor fidelidad las alternativas preservadas en el audit trail inglés y se mejora levemente la naturalidad direccional con «al corazón de los mares».
