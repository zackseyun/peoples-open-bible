review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo: el corazón de Faraón se endurece/se hace firme, no deja ir a los hijos de Israel, y esto ocurre conforme a lo que Yahvé había hablado por medio de Moisés. También preserva correctamente la tensión teológica sobre la causalidad del endurecimiento y usa ''Yahvé'' conforme al proyecto.'
  spanish_quality_summary: 'El texto principal es claro, natural y fiel. Sin embargo, hay un problema de correspondencia de notas: la nota [a] explica una alternativa para el verbo ''se endureció'', pero en la auditoría inglesa la nota con alternativa sobre el verbo corresponde a la dureza del corazón, mientras la nota sobre ''los hijos de Israel'' también debe preservar la alternativa ''los israelitas / los hijos de Israel''. Además, conviene pulir la redacción de las notas para que sigan mejor el patrón POB y evitar comillas/apóstrofes innecesarios al inicio.'
  glossary_alignment: 'Alineado en general con la terminología del proyecto: יְהוָה -> ''Yahvé''; בְּנֵי יִשְׂרָאֵל -> ''los hijos de Israel'' en el texto principal; בְּיַד מֹשֶׁה -> ''por medio de Moisés''. No hay conflictos glosariales sustanciales. La revisión propuesta solo mejora la precisión y el paralelismo de las notas.'
  issues:
  - severity: medium
    issue: Las notas no reflejan con máxima precisión el reparto de alternativas del expediente inglés.
    rationale: La auditoría inglesa distingue claramente la alternativa para וַיֶּחֱזַק ('grew hard') y la transparencia lexical de 'sons of Israel'. El borrador español es aceptable, pero puede alinearse mejor si la nota del verbo menciona explícitamente 'también puede traducirse' y la de 'hijos de Israel' preserva el contraste con 'los israelitas'.
  - severity: low
    issue: Estilo menor en las notas.
    rationale: 'La nota [a] empieza con comillas y apóstrofe innecesarios (''O: ...''). Una redacción más limpia mejora legibilidad y consistencia editorial sin afectar el sentido.'
  revised_spanish_text: Así el corazón de Faraón se endureció[a], y no dejó ir a los hijos de Israel[b], tal como Yahvé había hablado por medio de Moisés[c].
  revised_footnotes:
  - marker: a
    text: O, 'el corazón de Faraón se puso firme'. El verbo hebreo puede significar 'hacerse fuerte' o 'hacerse firme'; aquí, en el sentido de endurecimiento obstinado.
    reason: alternative_reading
  - marker: b
    text: Literalmente, 'los hijos de Israel'. También puede traducirse 'los israelitas'.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'por la mano de Moisés', un hebraísmo que significa 'por medio de Moisés'.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural, pero se ajustan las notas para reflejar con mayor exactitud la documentación inglesa y mejorar la consistencia editorial del aparato de notas.
