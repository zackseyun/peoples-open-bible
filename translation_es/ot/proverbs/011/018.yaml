    text: 'O: «hace una obra de falsedad»; la expresión hebrea puede enfatizar tanto una ganancia engañosa como un trabajo que resulta vacío o falso.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «una recompensa segura» o «una recompensa confiable»; literalmente, «salario/recompensa de verdad».'
    reason: lexical_alternative
  revision_rationale: Se ajusta la primera cola a un español natural que aún refleja el sentido contextual de עֹשֶׂה פְעֻלַּת שָׁקֶר como ganancia/paga engañosa. Se cambia «justicia» por «rectitud» para alinearse mejor con la decisión auditada de «righteousness» y con el valor moral-personal del término en este proverbio. Se conservan las dos notas léxicas del POB inglés con anclajes claros y no duplicados.
