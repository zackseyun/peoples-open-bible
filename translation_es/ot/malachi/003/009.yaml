translation:
  language: es
  text: 'Con maldición están ustedes malditos[a], porque a mí me están robando: toda la nación de ustedes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Bajo una maldición están ustedes, porque me están robando: toda la nación de ustedes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּמְּאֵרָה
  english_pob_choice: with a curse
  chosen_spanish: Con maldición
  alternatives_spanish:
  - bajo una maldición
  - con una maldición
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo con prefijo ב que expresa estado o medio; en español, «con maldición» conserva la repetición enfática con el participio siguiente. «Bajo una maldición» es posible, pero suaviza la estructura paralela del hebreo.
- source_word: נֵאָרִים
  english_pob_choice: are cursed
  chosen_spanish: están ustedes malditos
  alternatives_spanish:
  - son malditos
  - están malditos
  lexicon: HALOT
  rationale: El participio pasivo describe un estado presente/resultante. «Están malditos» sería la opción más directa; «están ustedes malditos» preserva el énfasis de la segunda persona plural. Se eligió «malditos» porque en español comunica con claridad el estado de estar bajo maldición.
- source_word: וְאֹתִי
  english_pob_choice: yet you are robbing me
  chosen_spanish: porque a mí me están robando
  alternatives_spanish:
  - y me están robando
  - pues me están robando
  lexicon: HALOT
  rationale: El contexto y la revisión inglesa apoyan el valor causal de la conjunción. En español, «porque» expresa mejor esa relación que un simple «y». Se conserva el objeto enfático «a mí me» para reflejar el marcado énfasis del hebreo.
- source_word: קֹבְעִים
  english_pob_choice: are robbing
  chosen_spanish: me están robando
  alternatives_spanish:
  - me están defraudando
  - me están despojando
  lexicon: HALOT
  rationale: En este pasaje el verbo significa robar o defraudar en el contexto del diezmo retenido. «Me están robando» es el equivalente más claro y directo en español, y mantiene la fuerza acusatoria del texto.
- source_word: הַגּוֹי כֻּלּוֹ
  english_pob_choice: the whole nation of you
  chosen_spanish: toda la nación
  alternatives_spanish:
  - toda la nación de ustedes
  - todo el pueblo
  lexicon: HALOT
  rationale: La expresión hebrea señala al conjunto corporativo. En español, «toda la nación» comunica bien la totalidad colectiva sin forzar una construcción poco natural. El sentido de segunda persona plural ya queda marcado por el resto de la frase.
theological_decisions:
- issue: Alcance corporativo del juicio
  english_pob_reading: 'The verse addresses the covenant people corporately: the entire nation is under the curse because the whole community is robbing God.'
  chosen_spanish_reading: 'El versículo acusa al pueblo en conjunto: toda la nación está bajo maldición porque la comunidad entera roba a Dios.'
  alternative_spanish_readings:
  - El texto puede leerse solo como una acusación a individuos dentro del pueblo, sin resaltar la dimensión nacional.
  rationale: La expresión final del hebreo es colectiva. La traducción española conserva esa dimensión corporativa sin añadir categorías teológicas ajenas al texto.
  doctrine_reference: Mantener el alcance corporativo cuando el hebreo lo exige; no resolver tensiones interpretativas más allá de lo que el texto permite.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del inglés POB al reflejar el valor causal de la conjunción hebrea con «porque», en lugar de una lectura adversativa. También conserva el cierre enfático colectivo del original.
  spanish_consistency_notes:
  - Se mantuvo «maldición/maldito» para reproducir el juego léxico del hebreo entre el sustantivo y el participio pasivo.
  - Se prefirió un español natural pero con énfasis explícito en la segunda persona plural mediante «ustedes».
  - «Toda la nación» preserva la dimensión corporativa del hebreo sin añadir explicaciones interpretativas al cuerpo del verso.
