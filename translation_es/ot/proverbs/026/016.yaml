translation:
  language: es
  text: Un perezoso se cree más sabio a sus propios ojos que siete que responden con discernimiento[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''que siete que pueden dar una respuesta sensata''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָכָם
  english_pob_choice: wiser
  chosen_spanish: más sabio
  alternatives_spanish:
  - sabio
  lexicon: HALOT
  rationale: El hebreo funciona en grado comparativo por la construcción con מִן implícito en la comparación. En español, ‘más sabio’ conserva ese valor comparativo de forma natural.
- source_word: עָצֵל
  english_pob_choice: sluggard
  chosen_spanish: perezoso
  alternatives_spanish:
  - holgazán
  - vago
  lexicon: HALOT
  rationale: El término sapiencial apunta a una persona caracterizada por la pereza. ‘Perezoso’ es claro y ampliamente inteligible; ‘holgazán’ o ‘vago’ serían opciones posibles, pero ‘perezoso’ mantiene mejor la sobriedad del proverbio.
- source_word: בְּעֵינָיו
  english_pob_choice: in his own eyes
  chosen_spanish: en su propia opinión
  alternatives_spanish:
  - a sus propios ojos
  - en sus propios ojos
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para autoevaluación o autopercepción. En español, ‘en su propia opinión’ comunica con naturalidad el sentido reflexivo sin perder la tensión del proverbio.
- source_word: מִשִּׁבְעָה
  english_pob_choice: than seven
  chosen_spanish: que siete
  alternatives_spanish:
  - más que siete
  lexicon: HALOT
  rationale: 'El מִ comparativo se expresa de modo directo con ‘que’ en español: ‘más sabio … que siete’. Se evita añadir ‘más’ sobre ‘siete’ porque la comparación ya está marcada por ‘más sabio’.'
- source_word: מְשִׁיבֵי
  english_pob_choice: who answer
  chosen_spanish: que responden
  alternatives_spanish:
  - que contestan
  - que dan respuesta
  lexicon: HALOT
  rationale: El participio de שוב aquí tiene el valor de responder. ‘Responden’ preserva el sentido verbal y suena natural en español bíblico contemporáneo.
- source_word: טָעַם
  english_pob_choice: discernment
  chosen_spanish: discernimiento
  alternatives_spanish:
  - buen juicio
  - entendimiento
  - sensatez
  lexicon: HALOT
  rationale: En este contexto sapiential, טעם no alude al gusto físico sino a juicio sensato o discernimiento. ‘Discernimiento’ reproduce bien esa cualidad de una respuesta ponderada.
theological_decisions:
- issue: Valor proverbial de la comparación entre autoevaluación y sabiduría real
  english_pob_reading: A sluggard is wiser in his own eyes than seven who answer with discernment.
  chosen_spanish_reading: Un perezoso se cree más sabio en su propia opinión que siete que responden con discernimiento.
  alternative_spanish_readings:
  - Un perezoso es más sabio en su propia opinión que siete que responden con discernimiento.
  - Un perezoso se tiene por más sabio que siete que responden con discernimiento.
  rationale: El hebreo denuncia la autoilusión del perezoso; ‘se cree’ explicita esa falsa autopercepción sin convertir el dicho en una afirmación objetiva de sabiduría. Así se conserva la ironía sapiencial del proverbio.
  doctrine_reference: Prov. 26:12; Prov. 26:16; sabiduría proverbial sobre soberbia y autoengaño
translation_notes:
  revision_awareness: El texto base en inglés no requirió cambios de revisión; la lectura fue confirmada como de alta concordancia. La versión española sigue el mismo juicio léxico y mantiene la comparación proverbial sin introducir suavizaciones innecesarias.
  spanish_consistency_notes:
  - Se conserva ‘discernimiento’ para טָעַם, coherente con el valor sapiential documentado.
  - ‘Más sabio’ refleja el comparativo implícito del hebreo y evita una lectura estática de ‘sabio’.
  - ‘Se cree’ expresa la autoevaluación implícita en בְּעֵינָיו y mantiene la ironía del proverbio.
  - No se usa ‘SEÑOR’ ni terminología confesional ajena al versículo; no hay referencias directas al nombre divino en este texto.
