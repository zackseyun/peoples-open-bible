translation:
  language: es
  text: ¡Mira[a], el nombre de Yahvé viene de lejos, ardiendo con su ira, y con humo denso[b]; sus labios están llenos de furor, y su lengua es como fuego consumidor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «he aquí». La partícula hebrea introduce la escena con un llamado de atención.
    reason: lexical_alternative
  - marker: b
    text: O «y densa humareda»; la frase hebrea es difícil y también puede entenderse más literalmente como «y pesadez de elevación».
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - He aquí
  - Mira
  lexicon: HALOT
  rationale: La partícula introduce una escena vívida y exige atención. «¡Mira!» transmite bien ese valor deíctico en español actual sin caer en un tono demasiado arcaico.
- source_word: שֵׁם יְהוָה
  english_pob_choice: the name of Yahweh
  chosen_spanish: el nombre de Yahvé
  alternatives_spanish:
  - el nombre de Yahweh
  - el nombre del SEÑOR
  lexicon: HALOT
  rationale: Se conserva «nombre» para no borrar la tensión bíblica entre presencia/reputación/manifestación y el sujeto divino. Se usa «Yahvé» conforme al criterio del proyecto para el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton. «Yahvé» preserva el nombre de pacto y evita la sustitución por un título genérico.
- source_word: בָּא מִמֶּרְחָק
  english_pob_choice: comes from afar
  chosen_spanish: viene de lejos
  alternatives_spanish:
  - viene de un lugar distante
  - viene desde lejos
  lexicon: HALOT
  rationale: «Viene de lejos» es natural en español y mantiene la escena profética de procedencia distante sin añadir matices no presentes en el hebreo.
- source_word: בֹּעֵר אַפּוֹ
  english_pob_choice: burning with his anger
  chosen_spanish: ardiendo con su ira
  alternatives_spanish:
  - quemando con su ira
  - ardiendo de ira
  lexicon: HALOT
  rationale: Se conserva la metáfora del ardor y el sentido idiomático de אַף como ira. «Ardiendo con su ira» mantiene la imagen y la fuerza judicial del texto.
- source_word: וְכֹבֶד מַשָּׂאָה
  english_pob_choice: with dense smoke
  chosen_spanish: con densa humareda
  alternatives_spanish:
  - con humo denso
  - con espesa humareda
  - con pesada elevación
  lexicon: HALOT
  rationale: La frase es difícil; la opción de la POB inglesa entendió una imagen de humo denso. «Humareda» comunica mejor en español esa masa visible de humo sin forzar una abstracción. Se conserva la dificultad del hebreo sin resolverla por completo.
- source_word: שְׂפָתָיו מָלְאוּ זַעַם
  english_pob_choice: his lips are full of wrath
  chosen_spanish: sus labios están llenos de furor
  alternatives_spanish:
  - sus labios están llenos de ira
  - sus labios se han llenado de furor
  lexicon: HALOT
  rationale: Se mantiene la metáfora literal de labios llenos y se opta por «furor» para un registro elevado y concordante con juicio profético. El presente describe la escena vívida del verso.
- source_word: וּלְשׁוֹנוֹ כְּאֵשׁ אֹכָלֶת
  english_pob_choice: and his tongue is like a consuming fire
  chosen_spanish: y su lengua es como fuego consumidor
  alternatives_spanish:
  - y su lengua es como fuego que consume
  - y su lengua como fuego devorador
  lexicon: HALOT
  rationale: Se conserva el símil directo y la cualidad activa de אֹכָלֶת. «Fuego consumidor» es una expresión natural y bíblicamente resonante en español.
theological_decisions:
- issue: Cómo renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  - SEÑOR
  rationale: La base del proyecto exige «Yahvé» para el Tetragrámaton. Se evita «SEÑOR» porque aquí el texto y el audit trail preservan el nombre propio, no solo un título reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Si traducir o preservar la expresión «el nombre de Yahvé»
  english_pob_reading: Retain 'the name of the LORD' rather than simplifying to 'the LORD'
  chosen_spanish_reading: Conservar «el nombre de Yahvé»
  alternative_spanish_readings:
  - Yahvé viene de lejos
  - el SEÑOR viene de lejos
  rationale: El hebreo dice literalmente que «el nombre» viene. Mantenerlo conserva la tensión teológica entre la identidad divina y su presencia manifestada en juicio, en vez de aplanarla a un sujeto simple.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
- issue: Cómo entender וְכֹבֶד מַשָּׂאָה
  english_pob_reading: with dense smoke
  chosen_spanish_reading: con densa humareda
  alternative_spanish_readings:
  - con humo denso
  - con pesada elevación
  - con densidad de humo
  rationale: La construcción hebrea es oscura. La POB inglesa optó por una imagen de humo denso; en español «humareda» preserva esa lectura imaginativa y sugiere una masa espesa de humo, sin afirmar más de lo que el texto permite.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del texto inglés, que prefirió «with dense smoke» sobre una formulación más literal como «heavy rising smoke». La redacción española sigue esa resolución con «densa humareda», manteniendo el nivel formal y la ambigüedad controlada del hebreo.
  spanish_consistency_notes:
  - Se usa sistemáticamente «Yahvé» para el Tetragrámaton.
  - Se conserva «nombre de Yahvé» para no perder la tensión teológica del hebreo.
  - Se mantiene un registro profético elevado pero natural en español.
  - Se prefirió «furor/ira» y «fuego consumidor» por su fuerza semántica y resonancia bíblica.
