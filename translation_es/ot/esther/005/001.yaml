revisions:
- from: Y al tercer día[a], Ester se vistió de regia majestad y se quedó de pie en el patio interior de la casa del rey, frente a la casa del rey; y el rey estaba sentado en su trono real, en la casa del reino[b], frente a la entrada de la casa.
  to: Y al tercer día[a], Ester se vistió con vestiduras reales y se puso de pie en el patio interior de la casa del rey, frente a la casa del rey, mientras el rey estaba sentado en su trono real, en la casa real[b], frente a la entrada de la casa.
  rationale: La revisión corrige dos problemas semánticos importantes. Primero, reemplaza 'regia majestad' por 'vestiduras reales', que comunica el sentido contextual concreto de מַלְכוּת y coincide con la decisión principal del POB, mientras la nota preserva la alternativa más literal. Segundo, cambia 'casa del reino' por 'casa real', que mantiene el referente edilicio/cortesano sin introducir la idea de 'reino' como dominio político. Además, 'se puso de pie' y 'mientras' mejoran la naturalidad del español sin apartarse del hebreo.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:12:18Z'
