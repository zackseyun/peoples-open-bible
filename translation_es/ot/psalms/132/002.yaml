    issue: «prometió» no refleja con suficiente precisión נָדַר
    rationale: El hebreo distingue entre jurar (נִשְׁבַּע) y hacer voto (נָדַר). «Prometió» es demasiado amplio y atenúa el matiz de voto solemne.
  - severity: medium
    issue: Marcador de nota al pie mal anclado
    rationale: La nota explica «Yahvé», pero el marcador [a] está colocado en «Poderoso». Esto crea desalineación entre texto y nota.
