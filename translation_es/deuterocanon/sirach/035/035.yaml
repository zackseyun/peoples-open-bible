translation:
  language: es
  text: Un yugo y una correa doblarán el cuello, y al esclavo[a] malvado le corresponden potros y torturas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sirviente malvado'. El griego οἰκέτης puede denotar a un sirviente doméstico, pero el contexto coercitivo favorece 'esclavo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ζυγός
  english_pob_choice: yoke
  chosen_spanish: yugo
  alternatives_spanish:
  - canga
  - arado
  lexicon: LSJ
  rationale: El sentido concreto de un instrumento de sujeción es claro por la imagen de doblar el cuello; 'yugo' conserva la metáfora física y es el equivalente natural en español.
- source_word: ἱμάς
  english_pob_choice: strap
  chosen_spanish: correa
  alternatives_spanish:
  - tira
  - látigo
  - correa de cuero
  lexicon: LSJ
  rationale: El término designa una tira o correa de cuero; 'correa' comunica la idea de restricción con naturalidad en español, sin añadir el matiz punitivo de 'látigo'.
- source_word: κάμψουσιν
  english_pob_choice: will bend
  chosen_spanish: doblarán
  alternatives_spanish:
  - inclinarán
  - forzarán a doblar
  lexicon: LSJ
  rationale: El futuro activo mantiene la acción física directa. 'Doblarán' reproduce la imagen sin exagerar el grado de coerción.
- source_word: τράχηλον
  english_pob_choice: the neck
  chosen_spanish: el cuello
  alternatives_spanish:
  - el pescuezo
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente 'cuello/nuco', 'cuello' es el término más natural y digno en español contemporáneo.
- source_word: οἰκέτῃ
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - sirviente
  - criado
  - siervo doméstico
  lexicon: LSJ
  rationale: El contexto es coercitivo y punitivo; por eso conviene conservar la fuerza servil de la palabra con 'esclavo', siguiendo la decisión auditada del POB inglés.
- source_word: κακούργῳ
  english_pob_choice: wicked
  chosen_spanish: malo
  alternatives_spanish:
  - malvado
  - criminal
  - malhechor
  lexicon: LSJ
  rationale: '''Κακούργος'' puede abarcar a alguien moralmente malo o de conducta dañina. ''Malo'' es breve y fiel; ''malvado'' intensificaría más de lo que el griego exige.'
- source_word: στρέβλαι
  english_pob_choice: racks
  chosen_spanish: potros
  alternatives_spanish:
  - racks
  - cepos
  - instrumentos de tortura
  lexicon: LSJ
  rationale: El término apunta a instrumentos de tortura, especialmente el potro de tormento. 'Potros' conserva la concreción del plural y sugiere correctamente el aparato de suplicio.
- source_word: βάσανοι
  english_pob_choice: tortures
  chosen_spanish: torturas
  alternatives_spanish:
  - tormentos
  - suplicios
  lexicon: LSJ
  rationale: En este contexto penal, 'torturas' es la equivalencia más directa y transparente para el lector español.
theological_decisions:
- issue: Renderización de οἰκέτῃ como término servil bajo coerción
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - sirviente
  - criado
  - siervo
  rationale: 'La imagen del verso no es neutral ni doméstica: habla de sujeción física y castigo. ''Esclavo'' preserva esa tensión y evita suavizarla con un término más benigno.'
  doctrine_reference: 'DOCTRINE.md: términos serviles contestados; preferencia por ''slave'' cuando el estatus ligado y coercitivo es saliente'
- issue: Diferencia entre instrumento de sujeción y pena corporal
  english_pob_reading: racks and tortures
  chosen_spanish_reading: potros y torturas
  alternative_spanish_readings:
  - racks y torturas
  - instrumentos de tortura y suplicios
  rationale: La pareja griega mantiene el concreto plural de instrumentos de tormento más la noción general de tortura. 'Potros y torturas' conserva esa distinción y resulta comprensible en español.
  doctrine_reference: LSJ; principio de equivalencia optimal con preservación de concreción léxica
translation_notes:
  revision_awareness: El expediente inglés pasó por una revisión que cambió 'slave' a 'servant', pero la corrección posterior restableció 'slave' por coherencia doctrinal y contextual. La versión española sigue ese estado final restaurado y conserva la dureza del contexto punitivo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, aunque este versículo no contiene el tetragrámaton.
  - '''Esclavo'' se usa en consonancia con la política del proyecto para términos serviles cuando el estatus coercitivo es relevante.'
  - '''Potros'' se eligió para reflejar el plural concreto de στρέβλαι; no se suaviza a ''instrumentos'' porque el griego es más específico.'
  - El registro es bíblico contemporáneo, sin arcaísmos innecesarios ni calco excesivo.
