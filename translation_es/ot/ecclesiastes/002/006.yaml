    issue: La nota [b] está anclada y explicada sobre «estanques de agua», pero en el expediente inglés [b] corresponde a לְהַשְׁקוֹת («to water / to irrigate»).
    rationale: Esto altera el rastro de auditoría y documenta una alternativa distinta de la preservada por POB.
  - severity: medium
