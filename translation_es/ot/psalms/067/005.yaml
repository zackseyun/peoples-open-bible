translation:
  language: es
  text: Que las naciones se alegren y canten con júbilo[a], porque tú juzgas a los pueblos con equidad y guías a las naciones en la tierra[b]. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «canten con gritos de alegría». El verbo puede designar canto jubiloso o exclamaciones resonantes de gozo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «guías a las naciones en el país», si se toma אֶרֶץ en un sentido más local; aquí se traduce «en la tierra» porque el salmo tiene alcance universal.'
    reason: alternative_reading
lexical_decisions:
- source_word: יִשְׂמְחוּ
  english_pob_choice: Let ... be glad
  chosen_spanish: Que ... se alegren
  alternatives_spanish:
  - Que ... estén alegres
  - Que ... se regocijen
  lexicon: HALOT
  rationale: El qal imperfecto 3mp de שמח funciona aquí con matiz exhortativo o desiderativo. En español, «Que ... se alegren» expresa bien ese valor volitivo en un registro poético natural. «Regocijarse» es posible, pero «alegrarse» es más claro y menos marcado.
- source_word: וִירַנְּנוּ
  english_pob_choice: and sing for joy
  chosen_spanish: y canten con júbilo
  alternatives_spanish:
  - y den gritos de alegría
  - y griten de gozo
  lexicon: HALOT
  rationale: El piel imperfecto de רנן puede denotar exclamaciones jubilosas o canto gozoso. «Canten con júbilo» conserva el tono celebrativo y vocal sin forzar una imagen exclusivamente musical; también deja espacio al matiz de aclamación jubilosa que el inglés POB preserva.
- source_word: לְאֻמִּים
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  lexicon: HALOT
  rationale: «Naciones» encaja con el alcance universal del salmo y mantiene la correspondencia con la segunda ocurrencia del mismo término. «Pueblos» es legítimo, pero en este contexto puede suavizar el contraste internacional que el hebreo sostiene.
- source_word: תִשְׁפֹּט
  english_pob_choice: you judge
  chosen_spanish: tú juzgas
  alternatives_spanish:
  - tú juzgarás
  - tú gobiernas
  lexicon: HALOT
  rationale: El imperfecto 2ms de שׁפט puede ser futuro, habitual o performativo. Se mantiene «tú juzgas» como presente gnómico/habitual, siguiendo el valor litúrgico del salmo y sin desplazar el sentido judicial básico hacia «gobiernas».
- source_word: עַמִּים
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  lexicon: HALOT
  rationale: Se distingue de לְאֻמִּים con «pueblos», preservando la variación lexical del hebreo. En español, «pueblos» comunica mejor la idea de colectivos humanos sometidos al juicio divino.
- source_word: מִישׁוֹר
  english_pob_choice: with equity
  chosen_spanish: con equidad
  alternatives_spanish:
  - con rectitud
  - con justicia
  lexicon: HALOT
  rationale: El sustantivo denota llanura/rectitud y por extensión imparcialidad o equidad. «Con equidad» es la forma española más natural en un contexto judicial y conserva la fuerza ética del término sin volverlo demasiado abstracto.
- source_word: וּלְאֻמִּים
  english_pob_choice: and guide the nations
  chosen_spanish: y guías a las naciones
  alternatives_spanish:
  - y conduces a las naciones
  - y pastoreas a las naciones
  lexicon: HALOT
  rationale: El הִפעיל de נחה significa conducir, guiar o llevar. «Guías» se ajusta bien al paralelo con el juicio de Dios y no introduce la connotación más fuerte de «pastoreas», que no está exigida por el término.
- source_word: בָּאָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - en el país
  lexicon: HALOT
  rationale: Se conserva el alcance amplio del inglés POB con «en la tierra», que en español bíblico suena natural y abarca el sentido universal de אֶרֶץ en este salmo. «En el país» estrecharía indebidamente el referente.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  lexicon: HALOT
  rationale: Se translitera sin glosa porque su función exacta sigue siendo incierta y la tradición textual en español suele preservar el término.
theological_decisions:
- issue: Alcance de אֶרֶץ
  english_pob_reading: global 'earth' rather than local 'land'
  chosen_spanish_reading: «en la tierra» con alcance universal
  alternative_spanish_readings:
  - «en la tierra de Israel»
  - «en el país»
  rationale: El salmo enfatiza repetidamente a las naciones y los pueblos; por eso, en este versículo, «la tierra» se entiende en sentido global. Así se evita restringir el horizonte del texto sin apoyo contextual.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
- issue: Valor de los imperfectos hebreos
  english_pob_reading: jussive/present-habitual sense ('Let ... be glad ... for you judge ... and guide')
  chosen_spanish_reading: subjuntivo exhortativo en la primera cola y presente gnómico en la segunda
  alternative_spanish_readings:
  - 'futuro: «se alegrarán ... juzgarás ... guiarás»'
  - imperativos directos
  rationale: La primera línea funciona naturalmente como llamada litúrgica al gozo; la segunda formula el carácter habitual de la acción divina como base del júbilo. Esta solución conserva la tensión entre exhortación y descripción teológica.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Coincide con el último pase auditado: no se registraron revisiones aplicadas y la lectura aprobada mantiene el alcance universal de אֶרֶץ, el valor exhortativo de los imperfectos iniciales y el sentido judicial de שׁפט con מִישׁוֹר como equidad.'
  spanish_consistency_notes:
  - Se mantiene la distinción entre «naciones» y «pueblos», como en el hebreo y en el inglés auditado.
  - «Selah» se conserva sin traducir por coherencia con la práctica del proyecto y por la incertidumbre semántica del término.
  - El registro es poético y reverente, pero evita arcaísmos innecesarios como «regocíjense» o «juzgáis», para mejor inteligibilidad contemporánea.
