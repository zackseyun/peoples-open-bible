translation:
  language: es
  text: Derrama tu pan sobre la tumba de los justos[a], y no des a los pecadores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «junto a la tumba de los justos». La frase puede referirse a un acto funerario o a una limosna memorial, pero aquí se mantiene la imagen literal del griego.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔκχεον
  english_pob_choice: Pour out
  chosen_spanish: Derrama
  alternatives_spanish:
  - Vierte
  - Echa
  lexicon: LSJ
  rationale: El imperativo griego expresa una acción concreta de derramar o verter. En español, "derrama" conserva la imagen física y suena más natural que un calco rígido, sin perder la fuerza del mandamiento.
- source_word: τοὺς ἄρτους σου
  english_pob_choice: your bread
  chosen_spanish: tu pan
  alternatives_spanish:
  - tus panes
  - tu alimento
  lexicon: LSJ
  rationale: Aunque el plural griego es literal, en español bíblico y natural "pan" funciona como singular colectivo para alimento. "Tu pan" conserva la concreción sin sonar artificial.
- source_word: ἐπὶ τὸν τάφον τῶν δικαίων
  english_pob_choice: on the grave of the righteous
  chosen_spanish: sobre la tumba de los justos
  alternatives_spanish:
  - en la tumba de los justos
  - junto a la tumba de los justos
  lexicon: LSJ
  rationale: τάφος se refiere directamente a una tumba o sepulcro; "tumba" es la equivalencia más transparente en español. "Sobre" mantiene la imagen espacial de ἐπὶ sin interpretarla demasiado.
- source_word: τῶν δικαίων
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justificados
  lexicon: LSJ
  rationale: '"Justos" es la forma bíblica más directa en español para δικαίων y mantiene el sentido moral-religioso del término mejor que opciones más explicativas.'
- source_word: καὶ μὴ δῷς
  english_pob_choice: and give none
  chosen_spanish: y no des
  alternatives_spanish:
  - y no des nada
  - pero no des
  lexicon: LSJ
  rationale: La conjunción καὶ se refleja con "y" de manera más directa, tal como indica la revisión inglesa. El imperativo negativo se expresa naturalmente como "no des" en español.
- source_word: τοῖς ἁμαρτωλοῖς
  english_pob_choice: to sinners
  chosen_spanish: a los pecadores
  alternatives_spanish:
  - a los que pecan
  - a los malvados
  lexicon: LSJ
  rationale: '"Pecadores" es el equivalente bíblico estándar de ἁμαρτωλοῖς y conserva la carga moral y teológica del término sin suavizarla.'
theological_decisions:
- issue: Interpretación de la acción funeraria
  english_pob_reading: The main text preserves the literal image of giving bread on the grave of the righteous rather than converting it into an explanatory paraphrase about funeral meals or memorial almsgiving.
  chosen_spanish_reading: El texto principal conserva la imagen literal de derramar pan sobre la tumba de los justos, sin convertirla en una paráfrasis explicativa sobre comidas funerarias o limosna memorial.
  alternative_spanish_readings:
  - Da tu pan en el entierro de los justos
  - Comparte alimento en duelo por los justos
  rationale: La expresión griega es concreta y algo inusual. Como el trasfondo cultural exacto es debatido, conviene mantener la imagen literal en el texto principal y no resolver la ambigüedad en la traducción.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Alcance de la prohibición respecto de los pecadores
  english_pob_reading: 'The text is rendered as a direct prohibition: ''give none to sinners.'''
  chosen_spanish_reading: 'La segunda cláusula se traduce como una prohibición directa: ''y no des a los pecadores''.'
  alternative_spanish_readings:
  - y no des de ello a los pecadores
  - y no compartas ese pan con los pecadores
  rationale: El griego deja implícito el objeto en la segunda cláusula. En español, expresar simplemente 'no des' conserva la concisión del original y mantiene claro el contraste sin añadir más de lo que el texto dice.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: La revisión inglesa sustituyó "but" por "and" para reflejar más directamente καὶ; por eso el español usa "y" en lugar de un contraste más fuerte. También se mantuvo la imagen concreta de ἔκχεον y ἐπὶ τὸν τάφον, siguiendo el criterio de transparencia del POB.
  spanish_consistency_notes:
  - Se mantiene "justos" para δικαίων y "pecadores" para ἁμαρτωλοῖς, en línea con la terminología bíblica estándar del proyecto.
  - '"Tumba" se usa como equivalente natural de τάφος en un contexto funerario; no se introduce "sepulcro" porque "tumba" es más claro para lectores amplios.'
  - La puntuación y el orden de las cláusulas reproducen la simplicidad del griego sin añadir conectores interpretativos.
