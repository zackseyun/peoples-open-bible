translation:
  language: es
  text: 'Porque así ha dicho Yahvé: He aquí[a], te haré un terror para ti mismo y para todos los que te aman[b]; caerán a espada de sus enemigos mientras tus ojos miran. Y entregaré a todo Judá en mano del rey de Babilonia, y él los llevará al destierro a Babilonia[c] y los herirá con espada.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo magor, «terror» o «pavor»; aquí retoma el nombre simbólico dado a Pashjur en el contexto cercano, a menudo traducido «Terror por todas partes».
    reason: cross_reference
  - marker: b
    text: O «tus amigos»; el hebreo se refiere a los que te aman y puede incluir allegados cercanos o aliados.
    reason: lexical_alternative
  - marker: c
    text: O «los exiliará a Babilonia».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: DOCTRINE.md / término consistente del POB para el Nombre divino
  rationale: Se conserva el Nombre divino del Tetragrama con la forma ya establecida en español del POB, sin sustituirlo por un título. "Yahvé" mantiene la referencia personal y covenantal del original.
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - He aquí que
  lexicon: HALOT
  rationale: La fórmula profética deíctica se vierte con una expresión solemne y natural en español. "He aquí" conserva el tono anunciativo sin volverlo coloquial.
- source_word: נֹתֶנְךָ
  english_pob_choice: I am making you
  chosen_spanish: te convierto
  alternatives_spanish:
  - te hago
  - te pongo
  lexicon: HALOT
  rationale: El hebreo usa נתן con un complemento idiomático que expresa una asignación/constitución. En español, "te convierto en" comunica bien la acción performativa y evita una literalidad torpe.
- source_word: לְמָגוֹר
  english_pob_choice: a terror
  chosen_spanish: terror
  alternatives_spanish:
  - espanto
  - pavor
  lexicon: HALOT
  rationale: מָגוֹר denota terror/dread. Se conserva el sustantivo simple para mantener el eco contextual con el nombre simbólico de Pashjur en Jeremías.
- source_word: לְךָ
  english_pob_choice: to yourself
  chosen_spanish: para ti
  alternatives_spanish:
  - para ti mismo
  - a ti
  lexicon: HALOT
  rationale: El dativo se expresa de manera natural en español con "para ti"; el contexto ya hace claro que el efecto recae sobre la propia persona.
- source_word: וּלְכָל אֹהֲבֶיךָ
  english_pob_choice: and to all your loved ones
  chosen_spanish: y para todos tus seres amados
  alternatives_spanish:
  - y para todos los que te aman
  - y para todos tus amigos
  lexicon: HALOT
  rationale: אֹהֲבִים/אֹהֲבֶיךָ designa a quienes aman a la persona, con posible alcance de allegados o aliados. "Seres amados" es amplio, natural y evita restringir el término solo a "amigos".
- source_word: וְנָפְלוּ בְּחֶרֶב אֹיְבֵיהֶם
  english_pob_choice: and they will fall by the sword of their enemies
  chosen_spanish: caerán a espada de sus enemigos
  alternatives_spanish:
  - caerán por la espada de sus enemigos
  - serán muertos por la espada de sus enemigos
  lexicon: HALOT
  rationale: La locución hebrea "caer a espada" es una equivalencia tradicional y fiel que preserva la imagen idiomática de muerte violenta sin sobreexplicarla.
- source_word: וְעֵינֶיךָ רֹאוֹת
  english_pob_choice: while your eyes look on
  chosen_spanish: mientras tus ojos lo ven
  alternatives_spanish:
  - mientras tus ojos miran
  - y tus ojos lo verán
  lexicon: HALOT
  rationale: La expresión enfatiza que el destinatario será testigo directo. "Mientras tus ojos lo ven" conserva la simultaneidad y la fuerza experiencial del hebreo.
- source_word: אֶתֵּן בְּיַד
  english_pob_choice: I will give ... into the hand of
  chosen_spanish: pondré ... en mano de
  alternatives_spanish:
  - entregaré ... en manos de
  - daré ... en mano de
  lexicon: HALOT
  rationale: Se conserva la metáfora semítica de dominio/poder con una construcción española clara. "En mano de" mantiene la imagen de entrega bajo control ajeno.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: the king of Babylon
  chosen_spanish: el rey de Babilonia
  alternatives_spanish:
  - el rey babilonio
  lexicon: HALOT
  rationale: Se mantiene la referencia histórica directa y reconocible, sin adjetivar innecesariamente.
- source_word: וְהִגְלָם בָּבֶלָה
  english_pob_choice: and he will carry them away to Babylon
  chosen_spanish: y lo exiliará a Babilonia
  alternatives_spanish:
  - y los llevará cautivos a Babilonia
  - y los deportará a Babilonia
  lexicon: HALOT
  rationale: El verbo גלה en hifil expresa exilio/deportación. Como en español el referente colectivo ya está introducido, se puede usar un singular colectivo en la oración para una lectura fluida; la nota conserva la alternativa explícita de plural/captividad.
- source_word: וְהִכָּם בֶּחָרֶב
  english_pob_choice: and strike them with the sword
  chosen_spanish: y los herirá con espada
  alternatives_spanish:
  - y los golpeará con la espada
  - y los matará con espada
  lexicon: HALOT
  rationale: נכה significa herir/golpear y el contexto muestra violencia mortal. "Herirá con espada" preserva la amplitud del verbo y su fuerza narrativa.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue la decisión doctrinal del POB de no ocultar el Nombre propio. "Yahvé" es la forma establecida en español para el Tetragrama dentro de este proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de לְמָגוֹר en el contexto de Jeremías 20
  english_pob_reading: a terror to yourself
  chosen_spanish_reading: terror para ti
  alternative_spanish_readings:
  - espanto para ti
  - objeto de terror para ti
  rationale: La frase mantiene la tensión contextual con el sobrenombre simbólico de Pashjur, sin introducir explícitamente la glosa interpretativa en el cuerpo del texto. La resonancia se preserva de forma sobria.
  doctrine_reference: Contexto inmediato de Jeremías 20:3-4 / nota cruzada en el audit trail
- issue: Exilio a Babilonia
  english_pob_reading: he will carry them away to Babylon
  chosen_spanish_reading: lo exiliará a Babilonia
  alternative_spanish_readings:
  - los deportará a Babilonia
  - los llevará cautivos a Babilonia
  rationale: El hebreo permite una formulación de exilio/deportación. En español, una lectura colectiva con singular de tratamiento fluye bien en la secuencia y conserva el sentido de llevarlos al cautiverio.
  doctrine_reference: Uso contextual del colectivo en narración profética
translation_notes:
  revision_awareness: Pasaje revisado con alta concordancia y sin cambios sustanciales en la última pasada; se mantiene la decisión de conservar el nombre divino, la resonancia de מגור y la frase idiomática de exilio con fluidez española.
  spanish_consistency_notes:
  - Se usa sistemáticamente «Yahvé» para יְהוָה.
  - Se mantiene una distinción entre el sustantivo de terror y la acción de exilio sin fusionar ambos sentidos.
  - 'Se conserva el paralelismo y la progresión verbal del hebreo: anuncio divino, efecto sobre el destinatario, juicio sobre Judá, exilio y golpe final.'
