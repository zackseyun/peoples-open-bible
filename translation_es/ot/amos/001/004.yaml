translation:
  language: es
  text: Así enviaré fuego sobre la casa de Hazael[a], y consumirá las ciudadelas[b] de Ben-hadad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Casa» puede referirse a la dinastía o al linaje real de Hazael, no solo a una construcción física.
    reason: theological_note
  - marker: b
    text: O «palacios»; el hebreo puede designar edificios palaciegos o fortificados.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁלַּחְתִּי
  english_pob_choice: So I will send
  chosen_spanish: Así enviaré
  alternatives_spanish:
  - Y enviaré
  - Enviaré
  lexicon: HALOT
  rationale: El verbo hebreo expresa acción futura de enviar; «así» mantiene el valor consecutivo del waw en un español natural, equivalente al «so» del texto inglés, sin perder el enlace con el anuncio previo de juicio.
- source_word: אֵשׁ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - incendio
  - llamas
  lexicon: HALOT
  rationale: אֵשׁ es el sustantivo común para «fuego». Conviene conservar la imagen concreta de juicio destructivo sin volverla paráfrasis.
- source_word: בְּבֵית חֲזָאֵל
  english_pob_choice: upon the house of Hazael
  chosen_spanish: sobre la casa de Hazael
  alternatives_spanish:
  - contra la casa de Hazael
  - en la casa de Hazael
  lexicon: HALOT
  rationale: «Sobre la casa de» reproduce de forma natural en español el valor de ataque/jucio del hebreo y preserva el alcance dinástico o real de «casa».
- source_word: חֲזָאֵל
  english_pob_choice: Hazael
  chosen_spanish: Hazael
  alternatives_spanish:
  - Hazazael
  lexicon: transliteración estándar
  rationale: Se mantiene el nombre propio como transliteración estable en español.
- source_word: וְאָכְלָה
  english_pob_choice: and it will consume
  chosen_spanish: y consumirá
  alternatives_spanish:
  - y devorará
  - y comerá
  lexicon: HALOT
  rationale: Con fuego como sujeto, אכל tiene fuerza idiomática de «consumir/devorar». «Consumirá» es claro, digno y fiel a la imagen.
- source_word: אַרְמְנוֹת
  english_pob_choice: the citadels
  chosen_spanish: los palacios[b]
  alternatives_spanish:
  - las fortalezas
  - los citadeles
  lexicon: HALOT
  rationale: El término puede referirse a palacios o edificios fortificados. Siguiendo la nota auditada del inglés, «palacios» comunica bien la esfera real y urbana; se marca la alternativa semántica en nota porque el hebreo también puede abarcar fortalezas o ciudadelas.
- source_word: בֶּן הֲדָד
  english_pob_choice: Ben-hadad
  chosen_spanish: Ben-adad
  alternatives_spanish:
  - Ben-hadad
  lexicon: transliteración estándar
  rationale: Se conserva el nombre propio con ortografía española fluida. La forma «Ben-adad» representa de manera directa la secuencia hebrea al adaptar la aspiración inicial del segundo elemento al español.
theological_decisions:
- issue: Naturaleza de «la casa de Hazael»
  english_pob_reading: dynastic/royal house under judgment
  chosen_spanish_reading: casa dinástica o real bajo juicio
  alternative_spanish_readings:
  - palacio literal de Hazael
  - familia de Hazael
  rationale: En lenguaje profético, «casa» abarca el linaje y el poder real, no solo un edificio. La traducción conserva esa amplitud sin reducirla a una mera estructura material.
  doctrine_reference: Juicio profético sobre reinos y dinastías
- issue: Imagen del fuego
  english_pob_reading: retain literal 'fire' as prophetic judgment imagery
  chosen_spanish_reading: mantener la imagen literal de fuego como juicio profético
  alternative_spanish_readings:
  - expresar solo destrucción militar
  - parafrasear como castigo divino
  rationale: El texto hebreo usa una imagen concreta; mantenerla evita interpretar de más y preserva la fuerza profética del anuncio.
  doctrine_reference: Lenguaje figurado en los oráculos proféticos
translation_notes:
  revision_awareness: La redacción sigue de cerca el paquete original hebreo y la decisión inglesa de mantener la imagen concreta de fuego. Se adopta «palacios» como opción española principal, pero se preserva en nota la amplitud semántica de אַרְמְנוֹת. También se mantiene la referencia dinástica de «casa de Hazael» sin reducirla a un edificio literal.
  spanish_consistency_notes:
  - Se emplea «Hazael» como transliteración estable del nombre propio.
  - Se prefirió «consumirá» para reflejar el valor idiomático de אכל con fuego como sujeto.
  - Se optó por «Ben-adad» para una forma española legible, aunque la nota y los datos de decisión reconocen la grafía alternativa «Ben-hadad».
