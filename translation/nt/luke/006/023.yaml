theological_decisions:
- issue: Nature of the promised recompense
  chosen_reading: your reward is great in heaven
  alternative_readings:
  - your reward is great with God in heaven
  rationale: The text states the location/sphere of the reward as 'in heaven' without expanding into a more interpretive theological paraphrase. This preserves the text's wording and eschatological tension without importing additional claims.
  doctrine_reference: Translation philosophy items 1 and 3
- issue: Reference of 'their fathers'
  chosen_reading: their fathers
  alternative_readings:
  - their ancestors
  rationale: The phrase likely refers to the forefathers of the persecutors, aligning present opposition with historic rejection of the prophets. The translation keeps the literal familial term rather than softening it, preserving the prophetic indictment without overexplaining.
  doctrine_reference: Translation philosophy items 1 and 5
