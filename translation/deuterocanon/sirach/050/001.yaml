translation:
  text: Simon son of Yohanan the priest was the glory of his brothers and the splendor of his people[a]; in his generation the house was repaired[b], and in his days the temple was strengthened.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek parallel: ''Simon son of Onias, the great priest'' (or ''high priest''). The Hebrew witness here reads ''Simon son of Yohanan the priest.'''
    reason: alternative_reading
  - marker: b
    text: Or 'the house was attended to/restored.' The Hebrew verb can denote being cared for or repaired; the Greek parallel points specifically to building work on the house.
    reason: lexical_alternative
lexical_decisions:
- source_word: גְּדוֹל
  chosen: was the glory of
  alternatives:
  - great among
  - greater than
  - chief among
  lexicon: HALOT
  rationale: The Hebrew phrase גְּדוֹל אֶחָיו is literally 'great of his brothers/brothers,' but in apposition with וְתִפְאֶרֶת עַמּוֹ it functions as elevated praise. The Greek μεγας likewise supports 'great.' Rendering the whole clause as 'was the glory of his brothers' gives idiomatic English while preserving the honorific force and parallelism.
- source_word: אֶחָיו
  chosen: his brothers
  alternatives:
  - his brethren
  - his kinsmen
  - his fellow priests
  lexicon: HALOT
  rationale: The plain sense is 'his brothers.' Although context could broaden this to kin or peers, the Hebrew does not specify priests here. Per translation philosophy, the gendered form is retained rather than neutralized.
- source_word: תִפְאֶרֶת
  chosen: splendor
  alternatives:
  - glory
  - beauty
  - ornament
  lexicon: HALOT
  rationale: תִפְאֶרֶת denotes beauty, honor, or splendor. 'Splendor' preserves the elevated poetic register and avoids repeating 'glory' immediately after the first clause.
- source_word: עַמּוֹ
  chosen: his people
  alternatives:
  - his nation
  lexicon: HALOT
  rationale: The common covenantal/social sense of עַם is 'people.' 'Nation' would sound more political than the Hebrew requires.
- source_word: שִׁמְעוֹן בֶּן יוֹחָנָן
  chosen: Simon son of Yohanan
  alternatives:
  - Simeon son of Johanan
  - Simon son of John
  rationale: Personal names are transliterated by standard conventions. 'Simon' is the conventional English form for שִׁמְעוֹן, and 'Yohanan' preserves the Hebrew name more directly than the anglicized 'John.'
- source_word: הַכֹּהֵן
  chosen: the priest
  alternatives:
  - the high priest
  lexicon: HALOT
  rationale: The Hebrew witness reads simply 'the priest,' while the Greek parallel has 'the great priest' (high priest). Because the primary Hebrew source is extant, the main text follows it; the stronger Greek title is preserved in a footnote.
- source_word: נִפְקַד הַבָּיִת
  chosen: the house was repaired
  alternatives:
  - the house was cared for
  - the house was visited/attended to
  - the house was restored
  lexicon: HALOT
  rationale: The Niphal of פקד can mean to be attended to, mustered, or visited. In context with the temple/building language and the Greek ὑπέραψεν οἶκον ('roofed/covered a house'), the sense is architectural restoration or repair. 'Repaired' is clear English that reflects the likely building context without over-specifying the exact work.
- source_word: הַבָּיִת
  chosen: the house
  alternatives:
  - the temple
  - the house of God
  lexicon: HALOT
  rationale: Literally 'the house.' Since the next colon uses הֵיכָל ('temple/sanctuary'), retaining 'house' here preserves the Hebrew variation while still clearly referring to the temple complex in context.
- source_word: חֻזַּק
  chosen: was strengthened
  alternatives:
  - was fortified
  - was made firm
  lexicon: HALOT
  rationale: The passive of חזק means 'was strengthened' or 'made strong.' This fits the building context and aligns well with the Greek ἐστερέωσεν.
- source_word: הֵיכָל
  chosen: temple
  alternatives:
  - sanctuary
  - palace
  lexicon: HALOT
  rationale: In this context הֵיכָל refers to the temple sanctuary. 'Temple' is the most natural and clear English rendering.
