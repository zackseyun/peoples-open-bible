base_translation:
  language: en
  yaml_path: translation/ot/jonah/001/005.yaml
  text: Then the sailors were afraid[a], and each cried out to his god. They threw the cargo that was in the ship into the sea to lighten it for them. But Jonah had gone down into the innermost parts of the vessel[b], and he lay down and fell fast asleep.
  footnotes:
  - marker: a
    text: Or 'the ship's equipment' or 'the articles.' The Hebrew term is broad, but in context likely refers to cargo or gear thrown overboard to lighten the ship.
    reason: lexical_alternative
  - marker: b
    text: Or 'the recesses of the ship' or 'the hold of the ship.'
    reason: lexical_alternative
