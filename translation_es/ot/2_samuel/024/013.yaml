translation:
  language: es
  text: 'Entonces Gad vino a David y le informó[a], y le dijo: «¿Te vendrán siete años de hambruna en tu tierra? ¿O huirás tres meses delante de tus adversarios[b], mientras ellos te persiguen? ¿O habrá tres días de peste[c] en tu tierra? Ahora, sabe y mira qué respuesta debo llevar al que me envió».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo de 1 Crónicas 21:12 lee «tres años de hambre» en vez de «siete años».
    reason: textual_variant
  - marker: b
    text: O «tus enemigos» para «tus adversarios».
    reason: lexical_alternative
  - marker: c
    text: «Peste» también puede traducirse «pestilencia» o «plaga».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: fue
  alternatives_spanish:
  - vino
  - llegó
  lexicon: HALOT
  rationale: El hebreo expresa movimiento narrativo hacia David; en español, «fue a David» suena natural y conserva la dirección del desplazamiento sin perder el sentido de aproximación al destinatario.
- source_word: וַיַּגֶּד
  english_pob_choice: told
  chosen_spanish: le dijo
  alternatives_spanish:
  - le informó
  - le declaró
  lexicon: HALOT
  rationale: נגד en hifil suele introducir un informe o comunicación directa. Como el versículo repite inmediatamente «y dijo», en español conviene usar dos formulaciones naturales de habla directa para no sonar pesado, manteniendo el doble movimiento de comunicar y luego hablar.
- source_word: הֲתָבוֹא
  english_pob_choice: Shall ... come
  chosen_spanish: ¿Te vendrán...
  alternatives_spanish:
  - ¿Vendrán... sobre ti?
  - ¿Te sobrevendrán...?
  lexicon: HALOT
  rationale: El hebreo usa una forma femenina singular para la calamidad implícita. En español, «te vendrán» preserva el valor prospectivo e impersonal de la desgracia que se acerca, sin forzar una sustantivación innecesaria.
- source_word: שֶׁבַע שָׁנִים רָעָב
  english_pob_choice: seven years of famine
  chosen_spanish: siete años de hambre
  alternatives_spanish:
  - siete años de hambre devastadora
  - siete años de escasez
  lexicon: HALOT
  rationale: רָעָב puede ser «hambre» o «famine». Aquí «hambre» comunica bien la calamidad en español bíblico contemporáneo; se conserva la fuerza sin introducir un término demasiado técnico. La variante cronística queda preservada en una nota textual.
- source_word: בְּאַרְצֶךָ
  english_pob_choice: in your land
  chosen_spanish: en tu tierra
  alternatives_spanish:
  - en tu país
  - en tu territorio
  lexicon: HALOT
  rationale: «Tierra» reproduce de manera natural el uso territorial de אֶרֶץ en este contexto y encaja con el registro bíblico en español.
- source_word: אִם שְׁלֹשָׁה חֳדָשִׁים נֻסְךָ לִפְנֵי צָרֶיךָ
  english_pob_choice: Or will you flee three months before your adversaries
  chosen_spanish: ¿O huirás tres meses delante de tus adversarios?
  alternatives_spanish:
  - ¿O estarás huyendo tres meses delante de tus enemigos?
  - ¿O huirás durante tres meses ante tus adversarios?
  lexicon: HALOT
  rationale: El hebreo es elíptico; el sentido básico es la huida bajo amenaza. «Delante de» conserva la preposición espacial de לִפְנֵי y evita un giro demasiado interpretativo.
- source_word: צָרֶיךָ
  english_pob_choice: your adversaries
  chosen_spanish: tus adversarios
  alternatives_spanish:
  - tus enemigos
  - tus opositores
  lexicon: HALOT
  rationale: «Adversarios» mantiene la hostilidad del término sin obligar a la repetición de «enemigos» y sigue la decisión auditada del inglés.
- source_word: וְהוּא רֹדְפֶךָ
  english_pob_choice: while they pursue you
  chosen_spanish: mientras ellos te persiguen
  alternatives_spanish:
  - y él te persigue
  - con ellos persiguiéndote
  lexicon: HALOT
  rationale: Aunque el hebreo presenta un singular, el referente probable es colectivo. En español se conserva el sentido colectivo con «ellos», como hizo la traducción auditada en inglés, para evitar una discordancia extraña en el flujo del relato.
- source_word: וְאִם הֱיוֹת שְׁלֹשֶׁת יָמִים דֶּבֶר
  english_pob_choice: Or shall there be three days of pestilence
  chosen_spanish: ¿O habrá tres días de peste en tu tierra?
  alternatives_spanish:
  - ¿O habrá tres días de pestilencia en tu tierra?
  - ¿O serán tres días de plaga en tu tierra?
  lexicon: HALOT
  rationale: דֶּבֶר puede designar peste, pestilencia o plaga. «Peste» es claro y digno en español moderno; «pestilencia» queda como alternativa más cercana al registro tradicional.
- source_word: עַתָּה דַּע וּרְאֵה
  english_pob_choice: Now know and see
  chosen_spanish: Ahora, conoce y mira
  alternatives_spanish:
  - Ahora, entiende y mira
  - Ahora, reflexiona y mira
  lexicon: HALOT
  rationale: La pareja imperativa exige atención y discernimiento. «Conoce y mira» preserva la forma directa del hebreo; «ahora» traduce con naturalidad עַתָּה.
- source_word: מָה אָשִׁיב שֹׁלְחִי דָּבָר
  english_pob_choice: what answer I should return to the one who sent me
  chosen_spanish: qué respuesta debo llevar al que me envió
  alternatives_spanish:
  - qué respuesta debo devolver al que me envió
  - qué palabra debo llevar de vuelta al que me envió
  lexicon: HALOT
  rationale: השיב דבר es un modismo para «dar respuesta». «Llevar» transmite el acto de regresar con un informe, mientras «respuesta» expresa el contenido de ese informe de manera idiomática y clara en español.
theological_decisions:
- issue: Discrepancia numérica con 1 Crónicas 21:12
  english_pob_reading: Translate the Masoretic Text of 2 Samuel as 'seven years of famine' in the main text
  chosen_spanish_reading: Traducir el Texto Masorético de 2 Samuel como «siete años de hambre» en el texto principal
  alternative_spanish_readings:
  - tres años de hambre
  rationale: La base textual es el Texto Masorético de 2 Samuel, que aquí lee siete años. Para mantener la transparencia textual y no armonizar artificialmente con el paralelo de Crónicas, la variante cronística se conserva en nota como lectura alternativa/canonical parallel, no como sustitución del texto base.
  doctrine_reference: Primacía del original; conservación de tensiones textuales en lugar de resolverlas por armonización
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del control cruzado más reciente, que lo declaró de alta concordancia y sin cambios necesarios. Se mantuvo la lectura masorética de «siete años» y la distinción entre la doble mención verbal («le dijo» / «y dijo») para reflejar el estilo del hebreo sin sobrecargar el español.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto cuando corresponda; aquí no aparece el tetragrámaton.
  - Se usa «adversarios» para צָרִים conforme a la decisión auditada, con «enemigos» como alternativa en nota.
  - Se evita «Cristo/Mesías» porque no hay tal término en el versículo.
  - Se mantiene un registro bíblico moderno y digno, con puntuación española estándar y comillas angulares.
  - Los marcadores de nota [a], [b], [c] aparecen en el texto exactamente donde corresponden.
