lexical_decisions:
- source_word: Δημήτριος ὁ βασιλεύς
  english_pob_choice: King Demetrius
  chosen_spanish: el rey Demetrio
  alternatives_spanish:
  - Rey Demetrio
  - Demetrio el rey
  lexicon: BDAG
  rationale: En español, el título regnal suele ir antes del nombre para sonar natural y mantener claridad referencial, sin perder el valor del título real.
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: le envió
  alternatives_spanish:
  - le mandó
  - lo envió
  lexicon: BDAG
  rationale: «Envíó» es el equivalente directo y natural para el acto de mandar un mensaje o carta en este contexto narrativo.
- source_word: κατὰ τοὺς λόγους τούτους
  english_pob_choice: according to these words
  chosen_spanish: conforme a estas palabras
  alternatives_spanish:
  - según estas palabras
  - de acuerdo con estas palabras
  lexicon: BDAG
  rationale: Se conserva la fórmula de correspondencia con el contenido precedente sin convertirla en una paráfrasis más libre; «conforme a» refleja bien la relación formal del griego.
- source_word: ἀπεκρίθη αὐτῷ
  english_pob_choice: answered him
  chosen_spanish: le respondió
  alternatives_spanish:
  - le contestó
  - le dio respuesta
  lexicon: BDAG
  rationale: A diferencia del inglés auditado, el español puede mantener el verbo literal «responder» sin sonar forzado; conserva la tensión epistolar del griego sin sobreexplicarla.
- source_word: ἔγραψεν αὐτῷ ἐπιστολήν
  english_pob_choice: wrote him a letter
  chosen_spanish: le escribió una carta
  alternatives_spanish:
  - le escribió una carta a él
  - le redactó una carta
  lexicon: BDAG
  rationale: Es una equivalencia directa e idiomática en español para la acción epistolar expresada por el griego.
- source_word: τοιαύτην
  english_pob_choice: like this
  chosen_spanish: como esta
  alternatives_spanish:
  - de esta clase
  - tal como esta
  lexicon: BDAG
  rationale: Introduce de manera natural el texto de la carta que sigue, preservando la deixis del griego.
translation_notes:
  revision_awareness: La revisión inglesa restauró el verbo explícito «answered him» y ajustó la frase para reflejar más plenamente los elementos del griego («to him», «according to these words»). El español conserva ambos rasgos con «le respondió» y «conforme a estas palabras», evitando omisiones.
  spanish_consistency_notes:
  - Se mantiene un registro narrativo bíblico claro y contemporáneo.
  - No se usaron convenciones de mayúsculas litúrgicas innecesarias; el texto es una carta dentro de la narración.
  - La frase final termina con dos puntos para señalar la continuación inmediata del contenido epistolar.
