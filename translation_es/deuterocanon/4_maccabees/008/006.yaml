translation:
  language: es
  text: Les ruego que estén de acuerdo conmigo[a] y disfruten de mi amistad[b]; porque, así como tengo poder para castigar a los que desobedecen mis mandatos, así también para hacer bien a los que me obedecen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cediendo ante mí' o 'consintiendo conmigo'; el participio griego es algo difícil, pero claramente pide conformidad con el hablante.
    reason: lexical_alternative
  - marker: b
    text: O 'mi favor', en sentido regio y patronal.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρακαλῶ
  english_pob_choice: I urge
  chosen_spanish: Les ruego
  alternatives_spanish:
  - Les exhorto
  - Les insto
  - Les suplico
  lexicon: BDAG
  rationale: En este contexto de habla real y apelación directa, el verbo introduce una petición fuerte más que una simple solicitud. 'Les ruego' conserva el tono persuasivo y resulta natural en español moderno sin perder dignidad.
- source_word: συνείξαντάς μοι
  english_pob_choice: by agreeing with me
  chosen_spanish: que estén de acuerdo conmigo
  alternatives_spanish:
  - que cedan ante mí
  - que consientan conmigo
  - que se unan a mí
  lexicon: LSJ
  rationale: El participio es difícil y parece expresar asentimiento o conformidad respecto del hablante. 'Que estén de acuerdo conmigo' comunica bien la idea de compliance/assent sin forzar una construcción extraña en español.
- source_word: τῆς ἐμῆς ἀπολαῦσαι φιλίας
  english_pob_choice: to enjoy my friendship
  chosen_spanish: y disfruten de mi amistad
  alternatives_spanish:
  - y gocen de mi amistad
  - y participen de mi amistad
  - y disfruten de mi favor
  lexicon: LSJ
  rationale: ἀπολαύω sugiere gozar o disfrutar, y φιλία puede tener un matiz personal y también patronal. 'Amistad' conserva el sentido léxico básico; 'disfruten de' refleja el valor de ἀπολαῦσαι.
- source_word: δύναμιν
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - autoridad
  - capacidad
  lexicon: BDAG
  rationale: El hablante reclama una capacidad respaldada por su posición. 'Poder' cubre tanto la fuerza efectiva como la autoridad implicada en el contexto.
- source_word: κολάζειν
  english_pob_choice: to punish
  chosen_spanish: castigar
  alternatives_spanish:
  - corregir
  - disciplinar
  - reprender
  lexicon: BDAG
  rationale: El contexto es punitivo y regio. 'Castigar' es la opción más clara y fuerte en español para κολάζειν aquí.
- source_word: τοὺς ἀπειθοῦντάς μου τοῖς ἐπιτάγμασιν
  english_pob_choice: those who disobey my commands
  chosen_spanish: a los que desobedecen mis mandatos
  alternatives_spanish:
  - a los que desobedecen mis órdenes
  - a los que rehúsan mis decretos
  - a los que no obedecen mis mandatos
  lexicon: BDAG
  rationale: ἀπειθέω con dativo expresa desobediencia; ἐπιτάγματα son mandatos/órdenes. 'Mandatos' mantiene un registro sobrio y comunica bien la relación de obediencia exigida por el texto.
- source_word: εὐεργετεῖν
  english_pob_choice: to do good to
  chosen_spanish: hacer bien a
  alternatives_spanish:
  - beneficiar a
  - favorecer a
  - hacer el bien a
  lexicon: BDAG
  rationale: El verbo indica conferir beneficios. 'Hacer bien a' es una equivalencia idiomática sobria y amplia, sin precisar indebidamente la forma concreta del beneficio.
- source_word: τοὺς εὐπειθοῦντάς μου
  english_pob_choice: those who obey me
  chosen_spanish: a los que me obedecen
  alternatives_spanish:
  - a los que me obedecen de buen grado
  - a los que son dóciles conmigo
  - a los que me obedecen bien
  lexicon: LSJ
  rationale: El compuesto sugiere receptividad obediente; sin embargo, la revisión inglesa simplificó la idea a 'those who obey me'. En español, 'me obedecen' sigue de cerca el sentido más seguro y evita introducir un matiz adverbial demasiado interpretativo.
theological_decisions:
- issue: Naturaleza de la φιλία ofrecida por el soberano
  english_pob_reading: '''My friendship'' is retained in the main text, while a footnote allows a royal-patronal sense of ''favor.'''
  chosen_spanish_reading: Se mantiene 'mi amistad' en el texto principal, con nota que permite leer también 'mi favor'.
  alternative_spanish_readings:
  - mi favor
  - mi benevolencia
  - mi goodwill
  rationale: El texto presenta una oferta personal ligada a la obediencia. 'Amistad' preserva el valor léxico de φιλία, mientras que la nota reconoce el trasfondo patronal o regio sin reemplazarlo en la línea principal.
  doctrine_reference: Principio POB de primacía del original y conservación de tensiones léxicas relevantes
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente en dos puntos: abre con una apelación más natural al participio griego (''que estén de acuerdo conmigo'') y simplifica la última cláusula a ''a los que me obedecen'', evitando un matiz adverbial innecesario. También conserva la decisión auditada de no sustituir ''amistad'' por ''favor'' en el texto principal, pero sí explicarlo en nota.'
  spanish_consistency_notes:
  - Se mantiene un registro solemne pero claro, apto para lectura pública.
  - Se evita el calco rígido del participio griego mediante una construcción subordinada natural en español.
  - '''Mandatos'' y ''obedecen'' conservan la relación de autoridad sin introducir lenguaje eclesiástico ajeno al pasaje.'
  - La nota sobre φιλία preserva la tensión entre amistad personal y favor regio, sin borrar ninguna de las dos posibilidades.
