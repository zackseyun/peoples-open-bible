translation:
  language: es
  text: Porque él apartará a tu hijo de seguirme[a], y servirán[b] a otros dioses; entonces la ira de Yahvé[c] se encenderá contra ustedes, y te destruirá pronto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «de detrás de mí», un modismo que significa «de seguirme».'
    reason: lexical_alternative
  - marker: b
    text: O «y él servirá a otros dioses»; el hebreo cambia del singular («tu hijo») al plural («servirán»), lo que puede ampliar la advertencia a la línea familiar resultante o a la comunidad.
    reason: alternative_reading
  - marker: c
    text: «Yahvé» traduce el nombre divino YHWH.
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: HALOT
  rationale: Introduces la explicación o motivo del mandato anterior. «Porque» conserva la fuerza causal/explanatoria de כִּי en español natural.
- source_word: יָסִיר
  english_pob_choice: will turn ... away
  chosen_spanish: apartará
  alternatives_spanish:
  - hará apartar
  - desviará
  lexicon: HALOT
  rationale: 'El hiphil expresa causa: alguien provoca el alejamiento. «Apartará» comunica bien esa acción causativa sin sonar forzado en español.'
- source_word: בִּנְךָ
  english_pob_choice: your son
  chosen_spanish: tu hijo
  alternatives_spanish:
  - tu hijo varón
  - tu descendiente
  lexicon: HALOT
  rationale: El hebreo es singular masculino. Se conserva esa precisión con «tu hijo», como en el contexto inmediato de las prohibiciones matrimoniales.
- source_word: מֵאַחֲרַי
  english_pob_choice: from following me
  chosen_spanish: de seguirme
  alternatives_spanish:
  - de ir tras de mí
  - de seguir detrás de mí
  lexicon: HALOT
  rationale: La expresión idiomática «de seguirme» transmite el sentido de fidelidad/caminar tras Yahvé, manteniendo el valor relacional del hebreo.
- source_word: וְעָבְדוּ
  english_pob_choice: and they will serve
  chosen_spanish: y servirán
  alternatives_spanish:
  - y él servirá
  - y adorarán
  lexicon: HALOT
  rationale: Se conserva el plural del hebreo, que amplía el alcance de la advertencia más allá de un solo hijo a la descendencia o al grupo resultante.
- source_word: אֱלֹהִים אֲחֵרִים
  english_pob_choice: other gods
  chosen_spanish: otros dioses
  alternatives_spanish:
  - dioses ajenos
  - dioses extraños
  lexicon: HALOT
  rationale: Traducción directa y estándar que mantiene el contraste con la exclusiva lealtad a Yahvé.
- source_word: וְחָרָה אַף יְהוָה
  english_pob_choice: then the anger of Yahweh will burn
  chosen_spanish: entonces la ira de Yahvé se encenderá
  alternatives_spanish:
  - entonces se encenderá el enojo de Yahvé
  - entonces la ira de Yahvé arderá
  lexicon: HALOT
  rationale: La imagen hebrea es la de ira que se inflama. «Se encenderá» conserva la metáfora con español natural y mantiene el nombre divino «Yahvé».
- source_word: בָּכֶם
  english_pob_choice: against you
  chosen_spanish: contra ustedes
  alternatives_spanish:
  - sobre ustedes
  - en su contra
  lexicon: HALOT
  rationale: Con חרה אף, la preposición indica el objeto de la ira. En español, «contra ustedes» expresa mejor esa dirección hostil que una forma más neutra.
- source_word: וְהִשְׁמִידְךָ
  english_pob_choice: and he will quickly destroy you
  chosen_spanish: y los destruirá
  alternatives_spanish:
  - y te destruirá
  - y los aniquilará
  lexicon: HALOT
  rationale: Se conserva la idea de destrucción. Se opta por «los» para reflejar el valor colectivo que el hebreo y la nota inglesa reconocen, aunque el sufijo verbal es singular en la forma base.
- source_word: מַהֵר
  english_pob_choice: quickly
  chosen_spanish: pronto
  alternatives_spanish:
  - rápidamente
  - de inmediato
  lexicon: HALOT
  rationale: «Pronto» comunica la rapidez del juicio con naturalidad en español bíblico contemporáneo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé» en el texto principal, en vez de sustituirlo por un título.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה / YHWH'
- issue: Alcance del sujeto en la cláusula final
  english_pob_reading: the warning broadens from one son to the resulting family line or community
  chosen_spanish_reading: los destruirá pronto
  alternative_spanish_readings:
  - te destruirá pronto
  - los destruirá rápidamente
  rationale: 'El hebreo presenta una oscilación de número: de «tu hijo» singular a «servirán» plural. La versión española conserva el plural implícito con «los», para no borrar la advertencia ampliada que la nota inglesa documenta.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 4
translation_notes:
  revision_awareness: La versión inglesa auditada mantiene la lectura óptima sin cambios en la última revisión; la traducción española sigue esa misma línea, conservando el sentido idiomático de מֵאַחֲרַי, el plural de וְעָבְדוּ y la referencia explícita al nombre divino.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para YHWH, conforme al estándar del proyecto.
  - Se conserva el plural en «servirán» y el alcance colectivo en «los destruirá» para no suavizar la tensión numérica del hebreo.
  - «De seguirme» evita calco pesado y mantiene el valor relacional del modismo hebreo.
