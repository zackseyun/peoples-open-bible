review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura legal del hebreo: prohibición de acercarse a un difunto, seguida por una excepción para ciertos parientes cercanos, y mantiene correctamente el valor permisivo final de יִטַּמָּאוּ. También conserva la cláusula sobre la hermana no vinculada a un hombre en matrimonio con una nota idiomática. Sin embargo, la redacción «por padre o madre» suena incompleta en español sin artículo, y «que no haya pertenecido a un hombre» resulta más dura y posesiva de lo que exige el hebreo relacional/eufemístico.'
  spanish_quality_summary: 'La frase es mayormente clara y digna, pero requiere un ajuste menor para mejorar naturalidad y precisión. «A un muerto» funciona bien; «para contaminarse» y «podrán contaminarse» son comprensibles y preservan el campo ritual. Los principales problemas son de idiomaticidad: en la lista de parentescos, el español pide «por su padre o su madre...» o artículos definidos; además, «pertenecido a un hombre» puede resultar poco natural y más fuerte que la intención del texto.'
  glossary_alignment: No hay conflictos con la terminología global del proyecto. La decisión de usar «contaminarse» para la impureza ritual es aceptable en este contexto. La nota léxica sobre «hermana soltera» está bien mantenida y anclada correctamente.
  issues:
  - severity: medium
    issue: 'Lista de parentescos sin determinación suficiente: «por padre o madre, por hijo o hija...»'
    rationale: Aunque el hebreo puede omitir posesivos, en español esta serie suena abrupta e incompleta. «Por su padre o su madre...» comunica con mayor naturalidad que se trata de sus propios familiares, sin añadir sentido indebido.
  - severity: medium
    issue: «Que no haya pertenecido a un hombre» es demasiado duro y poco idiomático
    rationale: La cláusula hebrea expresa relación matrimonial/no matrimonial, no propiedad en sentido fuerte. En español, «pertenecer a un hombre» puede sonar más posesivo que el original y menos legible. Una formulación como «que no haya estado unida a un hombre» preserva mejor el matiz relacional.
  revised_spanish_text: Y no se acercarán a un muerto para contaminarse; pero sí por su padre o su madre, por su hijo o su hija, por su hermano, o por una hermana que no haya estado unida a un hombre[a], podrán contaminarse.
  revised_footnotes:
  - marker: a
    text: O, más idiomáticamente, «una hermana soltera».
    reason: lexical_alternative
  revision_rationale: Se hicieron ajustes menores para mejorar la naturalidad del español y reflejar con más precisión el matiz relacional del hebreo. Se añadieron posesivos implícitos en la lista de familiares para una lectura idiomática, y se reemplazó «pertenecido a un hombre» por «estado unida a un hombre», que conserva mejor la idea de vínculo matrimonial sin introducir una noción de propiedad demasiado fuerte. Se mantiene la nota alternativa ya documentada.
