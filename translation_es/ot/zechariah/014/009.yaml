review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura y el sentido básico del hebreo: Yahvé será rey universal, y en aquel día Yahvé/ su nombre serán «uno». Conserva correctamente «Yahvé», «rey», «sobre toda la tierra» y la formulación compacta de אֶחָד como «uno». Sin embargo, la nota [a] no refleja el rastro de auditoría inglés ni la evidencia léxica: desplaza la alternativa desde אֶחָד hacia «solo rey» y además contradice la cláusula hebrea, que no ofrece una variante sobre «rey sobre toda la tierra» sino sobre el sentido de «uno»/exclusividad. La nota [b] también quedó incompleta, porque en inglés la alternativa relevante para la primera ocurrencia de אֶחָד pertenece a «Yahvé será uno», no a «su nombre uno».'
  spanish_quality_summary: 'El texto principal suena natural y bíblicamente claro en español neutral: «Yahvé será rey sobre toda la tierra. En aquel día Yahvé será uno, y su nombre uno». La compresión final «su nombre uno» es algo tersa, pero es defendible y fiel al paralelismo hebreo, especialmente dado el principio del proyecto de no sobreinterpretar. La principal necesidad de reparación está en las notas, no en la redacción principal.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; לְמֶלֶךְ → «rey»; עַל כָּל הָאָרֶץ → «sobre toda la tierra»; בַּיּוֹם הַהוּא → «En aquel día»; אֶחָד → «uno» preservando la tensión teológica. La única desalineación importante es documental/lexical en las notas, donde la alternativa de exclusividad debe anclarse a «uno», no a la frase de reinado.'
  issues:
  - severity: high
    issue: La nota [a] está anclada y formulada incorrectamente
    rationale: El inglés POB pone la alternativa «the LORD will be alone» como nota a «all the earth[a]», pero explica que el hebreo dice «one» y que expresa exclusividad/unicidad. El borrador español cambió esto por «Yahvé será solo rey», que introduce «rey» en la alternativa y no refleja fielmente la evidencia léxica de אֶחָד.
  - severity: medium
    issue: Falta una nota para la primera cláusula con אֶחָד
    rationale: El rastro inglés documenta explícitamente una alternativa para «Yahweh will be one». En español conviene preservarla con una nota anclada a «uno» en la primera aparición, para que el lector vea que «uno» también puede implicar «solo» o «único».
  - severity: low
    issue: La nota [b] debería explicitar mejor la tensión semántica de אֶחָד
    rationale: Aunque «y su nombre solo / único» va en buena dirección, es preferible mantener el paralelo con la documentación inglesa y aclarar que se trata de una alternativa léxica a «uno», no de una paráfrasis libre.
  revised_spanish_text: Yahvé será rey sobre toda la tierra. En aquel día Yahvé será uno[a], y su nombre uno[b].
  revised_footnotes:
  - marker: a
    text: O «Yahvé será solo» o «Yahvé será único»; el hebreo dice «uno», que puede expresar exclusividad o singularidad además de unidad.
    reason: lexical_alternative
  - marker: b
    text: O «y su nombre solo» o «y su nombre único».
    reason: lexical_alternative
  revision_rationale: Se conserva intacto el texto principal salvo el reanclaje de las notas, porque la traducción base es fiel y natural. Se elimina la nota errónea sobre «solo rey» y se restauran las alternativas léxicas documentadas para ambas ocurrencias de אֶחָד, alineando el español con la evidencia hebrea y el audit trail inglés.
