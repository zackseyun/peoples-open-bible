    issue: «las alturas eternas» para בָּמוֹת עוֹלָם
    rationale: Aunque sigue la revisión inglesa «everlasting heights», en español «eternas» sugiere con fuerza eternidad absoluta y suena menos idiomático para relieves territoriales. El razonamiento léxico auditado destaca la alternativa «ancient high places»; «alturas antiguas» comunica mejor la idea contextual de antigüedad/perduración del territorio.
  - severity: medium
