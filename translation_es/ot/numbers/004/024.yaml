translation:
  language: es
  text: Este es el servicio de las familias de los gersonitas, para servir y para llevar[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y para cargar» o «y para portar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  english_pob_choice: This is
  chosen_spanish: Esta es
  alternatives_spanish:
  - Esta
  lexicon: HALOT
  rationale: El demostrativo femenino singular introduce una cláusula nominal. En español, 'Esta es' reproduce de manera natural la copulativa implícita del hebreo y conserva el carácter declarativo.
- source_word: עֲבֹדַת
  english_pob_choice: the service
  chosen_spanish: la obra
  alternatives_spanish:
  - el servicio
  - la labor
  - el trabajo
  lexicon: HALOT
  rationale: עֲבֹדָה puede abarcar servicio, labor u oficio. Dado el contexto levítico, 'obra' evita reducirlo a mera actividad manual y mantiene una referencia funcional y digna, sin perder el sentido de encargo.
- source_word: מִשְׁפְּחֹת
  english_pob_choice: of the families
  chosen_spanish: de las familias
  alternatives_spanish:
  - de los clanes
  lexicon: HALOT
  rationale: El constructo plural refiere a agrupaciones familiares dentro de los gersonitas. 'Familias' es transparente y suficientemente literal en español; 'clanes' sería posible, pero menos directo.
- source_word: הַגֵּרְשֻׁנִּי
  english_pob_choice: the Gershonites
  chosen_spanish: los gersonitas
  alternatives_spanish:
  - la familia gersonita
  - el clan gersonita
  lexicon: HALOT
  rationale: El gentilic colectivo se vierte naturalmente en plural en español. 'Gersonitas' conserva la referencia étnica/tribal sin forzar un singular colectivo poco idiomático.
- source_word: לַעֲבֹד
  english_pob_choice: for serving
  chosen_spanish: para servir
  alternatives_spanish:
  - para el servicio
  - para atender
  lexicon: HALOT
  rationale: El infinitivo constructo con ל expresa propósito. 'Para servir' reproduce la función sin sobrecargar el verso con sustantivación innecesaria.
- source_word: וּלְמַשָּׂא
  english_pob_choice: and for carrying
  chosen_spanish: y para llevar
  alternatives_spanish:
  - y para cargar
  - y para portar
  - y para el transporte
  lexicon: HALOT
  rationale: מַשָּׂא puede significar carga, porte o lo que se lleva. En este contexto ritual/logístico, 'para llevar' es breve, fiel y mantiene la paralela con 'para servir', sin introducir 'cargas' que el hebreo no explicita aquí.
theological_decisions:
- issue: Terminología levítica de función y carga
  english_pob_reading: service ... and for carrying
  chosen_spanish_reading: obra ... para servir y para llevar
  alternative_spanish_readings:
  - servicio ... para servir y para cargar
  - labor ... para el servicio y para el porte
  rationale: El versículo enumera tareas asignadas a una familia levítica, no una categoría doctrinal compleja. 'Obra' y 'para llevar' preservan el carácter funcional del texto y evitan ampliar 'מַשָּׂא' con una glosa interpretativa innecesaria.
  doctrine_reference: Números 4:24; función levítica en el tabernáculo
- issue: Riesgo de espiritualizar el término עֲבֹדָה
  english_pob_reading: the service
  chosen_spanish_reading: la obra
  alternative_spanish_readings:
  - el servicio
  - el ministerio
  rationale: '''Ministerio'' introduciría un registro eclesiástico posterior que no está en el hebreo. ''Obra'' conserva la idea de tarea asignada y mantiene abierta la amplitud semántica de עֲבֹדָה.'
  doctrine_reference: 'Éxodo/Números: léxico de trabajo y servicio levítico'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del POB inglés que redujo 'carrying loads' a 'carrying' para acercarse más al hebreo, que simplemente dice 'para carga/porte'. Por eso el español evita añadir 'cargas' y usa 'para llevar'.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' por defecto solo cuando el hebreo nombra explícitamente el nombre divino; aquí no aparece, así que no se introduce.
  - '''Gersonitas'' mantiene coherencia con el etnónimo bíblico plural usado en español.'
  - Se evita 'siervo' porque el contexto describe una tarea asignada, no la relación de esclavitud/servidumbre en este verso.
