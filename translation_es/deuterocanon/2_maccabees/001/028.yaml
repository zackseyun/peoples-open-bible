translation:
  language: es
  text: Atormenta[a] a los que nos oprimen y nos ultrajan en su soberbia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Castiga» o «Aflige» a los que nos oprimen y nos ultrajan en soberbia.
    reason: lexical_alternative
lexical_decisions:
- source_word: βάσανισον
  english_pob_choice: Torment
  chosen_spanish: Tortura
  alternatives_spanish:
  - Atormenta
  - Aflicción
  - Castiga
  lexicon: LSJ
  rationale: El imperativo aoristo de βασανίζω expresa causar gran sufrimiento o aflicción severa. «Tortura» conserva la intensidad de «Torment» en español moderno sin suavizar indebidamente la súplica.
- source_word: τοὺς καταδυναστεύοντας
  english_pob_choice: those who oppress us
  chosen_spanish: a los que nos oprimen
  alternatives_spanish:
  - a los que nos tiranizan
  - a los que nos dominan
  lexicon: LSJ
  rationale: καταδυναστεύω denota ejercer poder opresivo sobre otros. «Oprimen» es natural y fiel; mantengo el objeto explícito «nos» porque el contexto de plegaria comunitaria lo requiere, igual que en la versión inglesa auditada.
- source_word: ἐξυβρίζοντας
  english_pob_choice: insolently abuse us
  chosen_spanish: nos ultrajan
  alternatives_spanish:
  - nos insultan con insolencia
  - nos agravian
  - nos ofenden con arrogancia
  lexicon: LSJ
  rationale: ἐξυβρίζω implica tratar con insolencia desmedida, abuso u ultraje. «Ultrajan» recoge bien ese valor fuerte en español; el sujeto ya lleva el primer verbo, y el objeto «nos» se conserva para el paralelismo con el griego y el contexto.
- source_word: ἐν ὑπερηφανίᾳ
  english_pob_choice: in pride
  chosen_spanish: en su soberbia
  alternatives_spanish:
  - en arrogancia
  - con soberbia
  - en orgullo
  lexicon: LSJ
  rationale: ὑπερηφανία expresa orgullo arrogante. «Soberbia» es la correspondencia más natural y teológicamente densa en español; el posesivo «su» se añade para fluidez idiomática sin alterar el sentido relacional del pasaje.
theological_decisions:
- issue: Súplica imprecatoria dirigida a Dios
  english_pob_reading: A prayer asking God to inflict severe distress or punishment
  chosen_spanish_reading: Una súplica para que Dios castigue severamente a los opresores
  alternative_spanish_readings:
  - Una oración para que Dios los aflija
  - Una petición para que Dios los castigue
  rationale: El imperativo no describe una acción humana, sino una petición dirigida a Dios dentro de una oración comunitaria. «Tortura» mantiene la fuerza del ruego sin convertirlo en un mandato ético general.
  doctrine_reference: Salmos imprecatorios; traducción fiel del valor jussivo del imperativo en contexto de oración
translation_notes:
  revision_awareness: Se corrigió el error anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español. La redacción sigue de cerca el griego y conserva el paralelismo de los dos participios con el objeto explícito «nos».
  spanish_consistency_notes:
  - Se evita «SEÑOR» como sustituto del nombre divino porque aquí no aparece el tetragrámaton ni κύριος.
  - «Soberbia» se usa para ὑπερηφανία, preservando el matiz moral de arrogancia elevada.
  - La nota a pie de página solo ofrece alternativas léxicas ya documentadas y ancladas al término principal.
