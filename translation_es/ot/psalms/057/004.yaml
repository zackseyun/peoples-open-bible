translation:
  language: es
  text: Él enviará desde el cielo y me salvará; reprocha al que jadea tras mí[a]. Selah[b]. Dios enviará su amor constante y su fidelidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «mi perseguidor me reprocha» o «se burla de mí», si se toma al enemigo como sujeto de «reprocha».
    reason: alternative_reading
  - marker: b
    text: «El que jadea tras mí» también puede entenderse de modo más interpretativo como «mi perseguidor» o «el que quiere devorarme».
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׁלַח
  english_pob_choice: He will send
  chosen_spanish: Él enviará
  alternatives_spanish:
  - Él mandará
  - Él enviará con rapidez
  lexicon: HALOT
  rationale: El imperfecto qal de שלח en este contexto poético expresa una acción futura segura; en español, «enviará» conserva bien la proyección confiada del hebreo sin sobreinterpretar.
- source_word: מִשָּׁמַיִם
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - desde los cielos
  lexicon: HALOT
  rationale: «Cielo» es una solución natural en español para el origen de la intervención divina y mantiene el sentido idiomático del hebreo sin forzar un plural técnico.
- source_word: וְיוֹשִׁיעֵנִי
  english_pob_choice: and save me
  chosen_spanish: y me salvará
  alternatives_spanish:
  - y me librará
  - y me rescatará
  lexicon: HALOT
  rationale: El hiphil de ישׁע con sufijo de 1ª persona expresa rescate/salvación. «Salvará» es amplio, claro y adecuado al registro del salmo.
- source_word: חֵרֵף
  english_pob_choice: he reproaches / he taunts
  chosen_spanish: reprocha
  alternatives_spanish:
  - taunta
  - afrenta
  lexicon: HALOT
  rationale: Se conserva el valor verbal directo de חֵרֵף, evitando resolver la ambigüedad en favor de un resultado interpretativo. «Reprocha» mantiene el golpe polémico del verbo y deja abierta la relación sintáctica con el complemento siguiente.
- source_word: שֹׁאֲפִי
  english_pob_choice: the one who pants after me
  chosen_spanish: al que jadea tras mí
  alternatives_spanish:
  - al que anhela mi ruina
  - a mi perseguidor
  lexicon: HALOT
  rationale: La imagen literal de שאף se conserva con «jadea tras mí», que suena natural en español y retiene la metáfora de persecución ansiosa. Se evita sustituirlo por una interpretación más explicativa en el texto principal.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  lexicon: HALOT
  rationale: Se translitera porque su función precisa es incierta y no conviene aparentar certeza traduciendo el término.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: El título divino se traduce de manera directa y natural en español; el contexto deja claro el sujeto de la acción.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor constante
  alternatives_spanish:
  - su amor leal
  - su misericordia
  lexicon: HALOT
  rationale: «חסד» combina lealtad pactual, misericordia y amor fiel. «Amor constante» comunica la continuidad y firmeza del término sin perder su carga relacional.
- source_word: וַאֲמִתּוֹ
  english_pob_choice: and his faithfulness
  chosen_spanish: y su fidelidad
  alternatives_spanish:
  - y su verdad
  - y su confiabilidad
  lexicon: HALOT
  rationale: En la pareja חסד/אמת, «fidelidad» reproduce bien el sentido de אמת como confiabilidad y lealtad veraz, especialmente en lenguaje pactual.
theological_decisions:
- issue: Ambigüedad de חֵרֵף שֹׁאֲפִי
  english_pob_reading: The Hebrew is compressed and allows more than one construal; the POB preserves the ambiguity with a note about either God reproaching the pursuer or the pursuer reproaching/taunting.
  chosen_spanish_reading: 'Se mantiene la ambigüedad: Dios «reprocha al que jadea tras mí», sin convertir el verbo en un resultado interpretativo como «lo avergüenza».'
  alternative_spanish_readings:
  - «mi perseguidor reprocha/taunta»
  - «me libra del reproche del que jadea tras mí»
  rationale: El hebreo permite más de una relación sintáctica. La redacción española conserva el verbo directo y deja abierta la tensión textual, en línea con la revisión POB que prefirió reflejar más de cerca חֵרֵף.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión textual y no resolverla prematuramente.'
- issue: Función de חסד y אמת como par pactual
  english_pob_reading: steadfast love and faithfulness
  chosen_spanish_reading: amor constante y fidelidad
  alternative_spanish_readings:
  - amor leal y verdad
  - misericordia y fidelidad
  rationale: La pareja hebrea expresa lealtad pactual y fiabilidad. «Amor constante» y «fidelidad» mantienen el paralelismo sin caer en fórmulas demasiado eclesiásticas o demasiado abstractas.
  doctrine_reference: Teología bíblica del pacto en el AT; uso responsable de pares חסד/אמת.
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB, que prefirió reflejar directamente חֵרֵף con «reprocha» en vez de convertirlo en un resultado interpretativo como «poner en vergüenza». Se conserva además la nota de ambigüedad sobre el sujeto y se mantiene la pareja חסד/אמת con un paralelismo claro en español.
  spanish_consistency_notes:
  - Se usó «Dios» para אֱלֹהִים, conforme al estándar del proyecto.
  - Se evitó «Señor» como sustituto de YHWH porque este versículo no contiene el tetragrámaton.
  - «Selah» se mantuvo transliterado por consistencia con el estilo POB.
  - Se prefirió «amor constante» para חסד por ser idiomático y conservar el matiz pactual.
  - Se prefirió «fidelidad» para אמת por su fuerza relacional y su naturalidad en español.
  - La construcción «al que jadea tras mí» conserva la imagen hostil sin imponer una explicación única en el texto principal.
