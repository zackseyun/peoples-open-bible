    issue: Verbo singular donde el hebreo usa plural
    rationale: הֵבִיאוּ es 3cp («trajeron»/«presentaron»). Aunque en español el sujeto «la asamblea» suele llevar singular, la decisión léxica debería al menos reconocer que el hebreo usa un verbo plural con colectivo.
  - severity: medium
    issue: Frase final poco natural en español
    rationale: «para holocausto para Yahvé» reproduce dos ל consecutivas de manera demasiado literal. «como holocausto para Yahvé» expresa mejor finalidad y destinatario sin perder sentido.
  revised_spanish_text: Y el número de los holocaustos que la asamblea trajo fue de setenta toros, cien carneros y doscientos corderos; todos estos fueron como holocausto para Yahvé.
  revision_rationale: 'Se conserva la mayor parte del borrador porque refleja bien el inventario sacrificial y la terminología clave. Se ajusta la cláusula final a un español más natural y fiel al valor de dedicación de לְעֹלָה לַיהוָה: «como holocausto para Yahvé». No se añaden notas porque no hay ambigüedad nueva que exija explicación en español. Aunque el plural hebreo de הֵבִיאוּ merece observación crítica, en español el sujeto colectivo «la asamblea» se expresa idiomáticamente con verbo singular, por lo que no requiere una reconstrucción más pesada en el texto principal.'
