revisions:
- from: Por tanto, como sus decretos eran despreciados por el pueblo, él mismo, por torturas, obligaba a cada uno y a todos los del pueblo, después de probar alimentos que contaminan[a], a renunciar al judaísmo[b].
  to: Por tanto, como sus decretos eran despreciados por el pueblo, él mismo obligaba, mediante torturas, a cada uno de la nación, después de probar alimentos que contaminan[a], a renunciar al judaísmo[b].
  rationale: Se corrigió la frase distributiva para reflejar con más precisión y naturalidad ἕνα ἕκαστον τοῦ ἔθνους, evitando la construcción forzada «a cada uno y a todos». También se cambió «por torturas» a «mediante torturas» para un español más idiomático en valor instrumental. Se conservaron las notas y las demás decisiones léxicas porque representan fielmente el sentido fuente y la justificación del POB.
