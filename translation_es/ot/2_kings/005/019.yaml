translation:
  language: es
  text: 'Y le dijo: «Ve en paz». Y él se alejó de su presencia cierta[a] distancia.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alguna distancia». La expresión hebrea denota un tramo de camino sin especificar una medida exacta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y le dijo
  alternatives_spanish:
  - Entonces le dijo
  - Y habló
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol se conserva naturalmente en español con una coordinación simple. «Le dijo» mantiene el avance narrativo sin añadir matices que el hebreo no exige.
- source_word: ל֖/וֹ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - lo
  lexicon: HALOT
  rationale: El pronombre dativo español reproduce el objeto indirecto referido a Naamán de manera fluida y adecuada al registro.
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Marcha
  lexicon: HALOT
  rationale: El imperativo de הלך se expresa de forma breve y natural con «Ve».
- source_word: לְשָׁלוֹם
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - con paz
  - pacíficamente
  lexicon: HALOT
  rationale: La locución idiomática hebrea se vierte con la bendición/dismissal equivalente en español, «en paz», que conserva el tono formulístico sin explicitar una interpretación adicional.
- source_word: וַיֵּ֥לֶךְ
  english_pob_choice: So he went
  chosen_spanish: Y él se fue
  alternatives_spanish:
  - Y se fue
  - Entonces se fue
  lexicon: HALOT
  rationale: Se mantiene la secuencia narrativa con una forma natural en español. «Se fue» comunica el apartarse de la presencia de Eliseo.
- source_word: מֵ/אִתּ֖/וֹ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - de su lado
  - alejado de él
  lexicon: HALOT
  rationale: La preposición con sufijo indica separación de la presencia de Eliseo; «de él» es formalmente cercano y suficientemente claro en contexto.
- source_word: כִּבְרַת אָֽרֶץ
  english_pob_choice: some distance
  chosen_spanish: cierta distancia
  alternatives_spanish:
  - alguna distancia
  - un trecho
  - una distancia considerable
  lexicon: HALOT
  rationale: La expresión designa una extensión de camino sin medida precisa. «Cierta distancia» refleja esa indeterminación sin exagerar ni convertirla en un término técnico.
theological_decisions:
- issue: El sentido de la despedida «Ve en paz» después de la petición de Naamán sobre la casa de Rimón
  english_pob_reading: Render the Hebrew benediction/dismissal simply as 'Go in peace' without expanding it into explicit approval or disapproval.
  chosen_spanish_reading: Traducirla simplemente como «Ve en paz», sin convertirla en aprobación explícita ni en rechazo explícito.
  alternative_spanish_readings:
  - «Ve con aprobación»
  - «Vete tranquilamente, sin implicación moral»
  rationale: El hebreo presenta una fórmula breve de despedida/bendición. La traducción debe preservar esa tensión teológica y no resolver por adelantado si hay aprobación, mera cortesía o ambas cosas.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del POB inglés, que ajustó la distancia de «a considerable distance» a «some distance» para no exagerar el alcance de כִּבְרַת אָרֶץ. La versión española refleja esa misma cautela con «cierta distancia».
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma principal del nombre divino en este proyecto, pero este versículo no lo contiene.
  - «En paz» conserva el valor fórmulico de לְשָׁלוֹם sin introducir «paz» como estado interior no explicitado.
  - «Cierta distancia» evita sobrerregularizar la expresión hebrea en una medida exacta.
