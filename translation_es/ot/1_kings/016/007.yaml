base_translation:
  language: en
  yaml_path: translation/ot/1_kings/016/007.yaml
  text: And also through Jehu son of Hanani the prophet[a], the word of Yahweh came against Baasha and against his house, both because of all the evil that he did in the sight of Yahweh, provoking him to anger by the work of his hands, by becoming like the house of Jeroboam, and because he struck him down.
  footnotes:
  - marker: a
    text: Or 'and because he struck him down.' The Hebrew suffix is singular masculine and may refer either to Jeroboam personally or, more likely in context, to his house/dynasty as a collective.
    reason: alternative_reading
