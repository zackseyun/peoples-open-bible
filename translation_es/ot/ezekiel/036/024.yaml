translation:
  language: es
  text: Porque yo los tomaré de las naciones[a], los reuniré de todas las tierras[b] y los traeré a su propia tierra[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de entre las naciones».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «de todos los países».'
    reason: lexical_alternative
  - marker: c
    text: Lit. «a su tierra»; «su propia tierra» expresa el matiz posesivo del hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַחְתִּי
  english_pob_choice: I will take
  chosen_spanish: los tomaré
  alternatives_spanish:
  - los tomaré consigo
  - los recogeré
  lexicon: HALOT
  rationale: לקח expresa aquí una acción deliberada de Yahvé sobre el pueblo. En español, «tomar» conserva bien ese valor directo y activo; el futuro simple mantiene la forma profética del original.
- source_word: מִן הַגּוֹיִם
  english_pob_choice: from the nations
  chosen_spanish: de entre las naciones
  alternatives_spanish:
  - de las naciones
  - de en medio de las naciones
  lexicon: HALOT
  rationale: El hebreo puede significar una extracción desde el interior del conjunto. «De entre» preserva mejor la idea de ser sacados de medio de los pueblos, sin perder el sentido geopolítico de «naciones».
- source_word: וְקִבַּצְתִּי
  english_pob_choice: and gather
  chosen_spanish: los reuniré
  alternatives_spanish:
  - los juntaré
  - los congregaré
  lexicon: HALOT
  rationale: קבץ es un verbo de restauración y reunión de dispersos. «Reunir» comunica naturalmente esa acción en español y conserva el matiz de restaurar un pueblo esparcido.
- source_word: מִכָּל הָאֲרָצוֹת
  english_pob_choice: from all the lands
  chosen_spanish: de todas las tierras
  alternatives_spanish:
  - de todos los países
  - de todas las tierras
  lexicon: HALOT
  rationale: אֲרָצוֹת es plural de «tierra/land» y aquí señala los lugares de dispersión. «Tierras» es más literal que «países» y encaja con el lenguaje profético de regreso.
- source_word: וְהֵבֵאתִי
  english_pob_choice: and bring
  chosen_spanish: los traeré
  alternatives_spanish:
  - los llevaré
  - los haré venir
  lexicon: HALOT
  rationale: El causativo de בוא se expresa de forma natural con «traer». Mantiene la iniciativa divina sin añadir el matiz de retorno explícito que no está verbalizado en hebreo.
- source_word: אֶל אַדְמַתְכֶם
  english_pob_choice: into your own land
  chosen_spanish: a su propia tierra
  alternatives_spanish:
  - a su tierra
  - a la tierra que les pertenece
  lexicon: HALOT
  rationale: אַדְמָה puede significar tierra, suelo o territorio. El sufijo posesivo, en este contexto de restauración, se vierte con «su propia tierra» para conservar el valor posesivo y covenantal de manera natural en español.
theological_decisions:
- issue: Restauración del exilio y fuerza posesiva del destino
  english_pob_reading: into your own land
  chosen_spanish_reading: a su propia tierra
  alternative_spanish_readings:
  - a su tierra
  - a la tierra que les pertenece
  rationale: La frase no solo indica destino, sino restitución a la tierra vinculada al pueblo por pacto. «Su propia tierra» mantiene esa fuerza posesiva sin resolverla en un sistema teológico posterior ni suavizarla a simple ubicación geográfica.
  doctrine_reference: Preservar la tensión lexical y covenantal del texto; priorizar el hebreo sobre una tradición de traducción estabilizada.
translation_notes:
  revision_awareness: El pasaje no muestra revisiones textuales o editoriales relevantes en el audit trail proporcionado; la redacción española sigue de cerca el hebreo y coincide con la decisión inglesa de preservar el valor posesivo de la tierra.
  spanish_consistency_notes:
  - Se usó «tierras» para אֲרָצוֹת por coherencia con el plural distributivo y con el estilo bíblico en español.
  - Se evitó «Gentiles» porque el contexto es el de las naciones entre las cuales está disperso Israel, no una categoría étnico-religiosa cristiana.
  - 'Se mantuvo el orden de tres acciones divinas paralelas: tomar, reunir y traer, para reflejar la sintaxis del hebreo.'
