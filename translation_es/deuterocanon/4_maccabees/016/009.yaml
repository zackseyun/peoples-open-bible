review_pass:
  verdict: revise
  source_alignment_summary: 'La mayor parte del borrador refleja bien el griego: «hijos míos», «solteros», «casados, pero sin hijos», y «No veré a los hijos de ustedes» preservan correctamente el lamento materno y el contraste entre los no casados y los casados sin descendencia. Sin embargo, la última cláusula no conserva el sentido de κληθεῖσα μακαρισθήσομαι, que no significa simplemente «ser llamada abuela», sino «ser tenida por dichosa / considerada bendita al ser llamada abuela».'
  spanish_quality_summary: 'El español es en general claro y natural, pero la última frase resulta redundante y algo torpe: «ni seré llamada abuela cuando se me llame así». Además, pierde el matiz valorativo central del verbo μακαρισθήσομαι. Una reformulación breve puede restaurar el sentido y mejorar la fluidez.'
  glossary_alignment: No hay términos teológicos del glosario principal en juego. Las decisiones léxicas sobre «solteros», «casados», «sin hijos» y «abuela» son adecuadas. La única desalineación importante está en no reflejar «ser considerada dichosa/bienaventurada» para μακαρισθήσομαι.
  issues:
  - severity: high
    issue: La cláusula final omite el sentido de μακαρισθήσομαι.
    rationale: El griego expresa que la madre no será considerada o proclamada dichosa al ser llamada abuela. El borrador reduce esto a una repetición vacía de «ser llamada abuela», perdiendo el componente semántico principal.
  - severity: medium
    issue: La frase «cuando se me llame así» es redundante y poco natural.
    rationale: En español, después de «ser llamada abuela», añadir «cuando se me llame así» no aporta contenido y suena artificial. La revisión debe decir directamente «cuando me llamen abuela».
  revised_spanish_text: '¡Oh, hijos míos: unos solteros y otros casados, pero sin hijos[a]! No veré a los hijos de ustedes, ni seré considerada dichosa cuando me llamen abuela.'
