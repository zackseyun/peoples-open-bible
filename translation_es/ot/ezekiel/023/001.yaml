translation:
  language: es
  text: Y la palabra de Yahvé vino a mí[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se vierte «el SEÑOR» en muchas traducciones inglesas y españolas.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y ... vino
  alternatives_spanish:
  - Y ... sucedió
  - Y ... aconteció
  lexicon: HALOT
  rationale: La forma narrativa con waw-consecutiva introduce la secuencia profética. En español, «vino» reproduce de modo natural la llegada de la palabra divina sin perder el valor discursivo introductorio.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - una palabra
  lexicon: HALOT
  rationale: En la fórmula profética, דבר designa la palabra/mensaje divino. «La palabra» conserva el giro establecido y su relación constructa con el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino en la forma base del proyecto español, «Yahvé», en lugar de sustituirlo por un título como «SEÑOR». Esto preserva el valor del Tetragrámaton como nombre personal del pacto.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - hacia mí
  - para mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona expresa dirección hacia el profeta. «A mí» es exacto y natural en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - con estas palabras
  lexicon: HALOT
  rationale: El infinitivo constructo introduce el discurso siguiente. «Diciendo» es el equivalente conciso y usual en español bíblico contemporáneo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El hebreo usa explícitamente el Tetragrámaton. La tradición editorial POB evita la sustitución por un título y refleja el nombre revelado; en español, la forma adoptada es «Yahvé», coherente con el criterio del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto inglés y la evaluación cruzada muestran alta concordancia y sin cambios necesarios; el español sigue directamente la fórmula profética del hebreo, conservando el nombre divino y la estructura introductoria sin añadir matices no sustentados.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente con el estándar español del proyecto.
  - Se prefirió «la palabra» para mantener la fórmula profética estable.
  - «Diciendo» conserva la apertura de discurso sin sobreinterpretar el hebreo.
