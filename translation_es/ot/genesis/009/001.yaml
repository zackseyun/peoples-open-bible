  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Dios» y «Noé» están bien. «Sus hijos» es aceptable para בָּנָיו. «La tierra» es una equivalencia española natural para הָאָרֶץ en este contexto; conviene mantener la nota para explicar que aquí el alcance es ‘la tierra/el mundo’ y no una tierra local. La nota actual, sin embargo, está mal formulada porque ofrece como alternativa exactamente la misma expresión que el texto principal.
