translation:
  language: es
  text: 'Pero Joás dijo a todos los que se habían puesto contra él: «¿Van ustedes a contender por Baal? ¿Lo van a salvar? El que contienda por él será ejecutado para mañana. Si es un dios, que contienda por sí mismo, porque su altar ha sido derribado.»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר / וַיֹּאמֶר יוֹאָשׁ
  english_pob_choice: But Joash said
  chosen_spanish: Pero Joás dijo
  alternatives_spanish:
  - Y Joás dijo
  - Entonces Joás dijo
  lexicon: HALOT
  rationale: El hebreo continúa la narración con valor contrastivo en contexto; «Pero» comunica bien la respuesta de Joás frente a los acusadores sin añadir más interpretación.
- source_word: עָמְדוּ עָלָיו
  english_pob_choice: stood against him
  chosen_spanish: se habían puesto contra él
  alternatives_spanish:
  - estaban contra él
  - se habían levantado contra él
  - se habían puesto de pie contra él
  lexicon: HALOT
  rationale: La expresión es idiomática y adversativa, no meramente espacial. «Se habían puesto contra él» transmite oposición concreta en español natural.
- source_word: תְּרִיבוּן / יָרִיב / יָרֶב
  english_pob_choice: contend / contends / let him contend
  chosen_spanish: contender / contienda / contienda
  alternatives_spanish:
  - pleitear / pleitee / pleitee
  - disputar / dispute / dispute
  - luchar / luche / luche
  lexicon: HALOT
  rationale: Se conserva la repetición del verbo ריב con «contender», que en español puede abarcar disputa legal o confrontación combativa sin fijar indebidamente uno de los matices.
- source_word: תּוֹשִׁיעוּן
  english_pob_choice: save
  chosen_spanish: salvar
  alternatives_spanish:
  - librar
  - rescatar
  lexicon: HALOT
  rationale: '«Salvar» reproduce de forma directa el valor del hifil de ישׁע y mantiene la ironía del pasaje: ¿van a salvar a Baal?'
- source_word: יוּמַת
  english_pob_choice: shall be put to death
  chosen_spanish: será muerto
  alternatives_spanish:
  - será ejecutado
  - morirá
  lexicon: HALOT
  rationale: El pasivo causativo del hebreo se expresa de modo claro y conciso con «será muerto», preservando la fuerza judicial de la amenaza.
- source_word: עַד הַבֹּקֶר
  english_pob_choice: by morning
  chosen_spanish: antes de mañana
  alternatives_spanish:
  - para la mañana
  - al amanecer
  lexicon: HALOT
  rationale: «Antes de mañana» comunica el límite temporal con naturalidad en español y refleja la idea de plazo inminente del hebreo.
- source_word: אֱלֹהִים הוּא
  english_pob_choice: he is a god
  chosen_spanish: es un dios
  alternatives_spanish:
  - es Dios
  - es divino
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים se refiere a Baal como pretendida deidad; el artículo indefinido en español evita confundirlo con el Dios verdadero.
- source_word: יָרִיב לוֹ
  english_pob_choice: let him contend for himself
  chosen_spanish: que contienda por sí mismo
  alternatives_spanish:
  - que pleitee por sí mismo
  - que defienda su propia causa
  lexicon: HALOT
  rationale: Se mantiene la reciprocidad del verbo ריב y la idea de autodefensa judicial/polémica sin sobreexplicar.
- source_word: נָתַץ אֶת מִזְבְּחוֹ
  english_pob_choice: because his altar has been torn down
  chosen_spanish: porque su altar ha sido derribado
  alternatives_spanish:
  - porque su altar ha sido destruido
  - porque han derribado su altar
  lexicon: HALOT
  rationale: «Derribado» reproduce bien נָתַץ y evita introducir un sujeto explícito que el hebreo no da.
theological_decisions:
- issue: Referencia de אֱלֹהִים aplicada a Baal
  english_pob_reading: Rendered as 'a god' rather than 'God'
  chosen_spanish_reading: «un dios» en minúscula e indefinido
  alternative_spanish_readings:
  - «Dios»
  - «un ser divino»
  rationale: El hablante trata a Baal como supuesto dios, no como el Dios de Israel. La minúscula y el artículo indefinido preservan esa distinción teológica.
  doctrine_reference: Principio de primacía del texto original; evitar confusión doctrinal en la referencia a una deidad falsa.
translation_notes:
  revision_awareness: 'Se atendió la corrección editorial más reciente del POB en inglés: se mantuvo la frase causal sin sujeto añadido, reflejando simplemente que el altar «ha sido derribado».'
  spanish_consistency_notes:
  - Se usó «Baal» como nombre propio sin artículo, en armonía con el uso consagrado y con el registro del pasaje.
  - Se eligió «contender» para conservar la repetición retórica del hebreo ריב en toda la línea.
  - «Será muerto» mantiene el tono formal/jurídico del pasaje sin convertir la amenaza en una paráfrasis interpretativa.
