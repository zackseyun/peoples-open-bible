lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: Then she said
  chosen_spanish: Entonces ella le dijo
  alternatives_spanish:
  - Y ella dijo
  - Entonces dijo
  lexicon: HALOT
  rationale: La forma consecutiva avanza la narración; «Entonces» conserva la secuencia y «le dijo» expresa con naturalidad el complemento pronominal dirigido al interlocutor.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - al hombre
  lexicon: HALOT
  rationale: El destinatario ya está claro por el contexto; en español, el dativo átono evita redundancia y conserva la relación directa con él.
- source_word: גַּם ... גַּם ... גַּם
  english_pob_choice: both ... and also
  chosen_spanish: tanto ... como ... y también
  alternatives_spanish:
  - también ... también ... también
  - además ... además ... además
  lexicon: HALOT
  rationale: La repetición de גַּם expresa adición acumulativa. «Tanto ... como ...» reproduce bien la coordinación de los dos primeros elementos, y «y también» conserva el valor añadido del tercer miembro.
- source_word: תֶּבֶן
  english_pob_choice: straw
  chosen_spanish: paja
  alternatives_spanish:
  - rastrojo
  lexicon: HALOT
  rationale: En este contexto de hospitalidad y forraje, «paja» es el equivalente natural y claro en español.
- source_word: מִסְפּוֹא
  english_pob_choice: fodder
  chosen_spanish: forraje
  alternatives_spanish:
  - alimento para animales
  - pienso
  lexicon: HALOT
  rationale: Se refiere a alimento para animales; «forraje» mantiene precisión léxica y funciona bien en español bíblico contemporáneo.
- source_word: רַב
  english_pob_choice: plenty of
  chosen_spanish: en abundancia
  alternatives_spanish:
  - mucho
  - abundante
  lexicon: HALOT
  rationale: El adjetivo modifica la cantidad disponible; «en abundancia» expresa el sentido cuantitativo sin forzar una construcción poco natural.
- source_word: עִמָּנוּ
  english_pob_choice: we have
  chosen_spanish: con nosotros
  alternatives_spanish:
  - tenemos
  - junto a nosotros
  lexicon: HALOT
  rationale: Aunque el inglés POB lo vuelve idiomáticamente «we have», el hebreo dice literalmente «con nosotros». En español, «con nosotros» conserva la imagen original y sigue siendo natural en este contexto de disponibilidad compartida.
- source_word: מָקוֹם
  english_pob_choice: a place
  chosen_spanish: un lugar
  alternatives_spanish:
  - espacio
  - sitio
  lexicon: HALOT
  rationale: «Un lugar» reproduce el sentido general del sustantivo sin especificarlo de más.
- source_word: לָלוּן
  english_pob_choice: to spend the night
  chosen_spanish: para pasar la noche
  alternatives_spanish:
  - para alojarse
  - para pernoctar
  lexicon: HALOT
  rationale: El infinitivo indica pasar la noche; «para pasar la noche» es natural y fiel, sin el registro más marcado de «pernoctar».
