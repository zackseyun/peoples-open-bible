id: NUM.3.22
reference: Numbers 3:22
source:
  edition: WLC
  text: פְּקֻדֵי/הֶם֙ בְּ/מִסְפַּ֣ר כָּל זָכָ֔ר מִ/בֶּן חֹ֖דֶשׁ וָ/מָ֑עְלָ/ה פְּקֻ֣דֵי/הֶ֔ם שִׁבְעַ֥ת אֲלָפִ֖ים וַ/חֲמֵ֥שׁ מֵאֽוֹת־־׃
translation:
  text: Their numbered ones[a], according to the number of every male from a month old and upward, were seven thousand five hundred.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those counted among them' for 'their numbered ones'; the Hebrew uses the same census term twice in the verse.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּקֻדֵיהֶם
  chosen: their numbered ones
  alternatives:
  - those counted among them
  - their enrollment
  lexicon: HALOT
  rationale: From פקד in the passive/participle-like nominal form referring to those who were counted in the census. 'Their numbered ones' preserves the census/register sense and matches the repetition in the Hebrew clause.
- source_word: בְּמִסְפַּר
  chosen: by the number of
  alternatives:
  - according to the number of
  - in number
  lexicon: HALOT
  rationale: Introduces the basis of the count. 'By the number of' is natural English while staying close to the Hebrew construction.
- source_word: כָּל זָכָר
  chosen: every male
  alternatives:
  - all the males
  - every male person
  lexicon: HALOT
  rationale: The Hebrew is grammatically and semantically male-specific in a census context. 'Every male' is gender-accurate and concise.
- source_word: מִבֶּן חֹדֶשׁ וָמָעְלָה
  chosen: from a month old and upward
  alternatives:
  - from one month old and above
  - from the age of one month and up
  lexicon: HALOT
  rationale: Standard age-threshold formula in census passages. 'A month old and upward' is idiomatic and faithful to the Hebrew expression.
- source_word: שִׁבְעַת אֲלָפִים וַחֲמֵשׁ מֵאוֹת
  chosen: seven thousand five hundred
  alternatives:
  - 7,500
  lexicon: HALOT
  rationale: Cardinal number rendered in standard English words for readability in running biblical prose.
