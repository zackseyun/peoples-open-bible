translation:
  language: es
  text: Los impíos volverán a Sheol[a]—todas las naciones que olvidan a Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'se volverán a Sheol'. El verbo hebreo puede significar 'volver' o 'volverse de regreso'.
    reason: lexical_alternative
  - marker: b
    text: Sheol es el término hebreo para el ámbito o reino de los muertos; no es idéntico al concepto posterior, más específico, de infierno.
    reason: cultural_note
lexical_decisions:
- source_word: יָשׁוּבוּ
  english_pob_choice: will return
  chosen_spanish: volverán
  alternatives_spanish:
  - retornarán
  - volverán atrás
  lexicon: HALOT / שוב
  rationale: El hebreo qal imperfecto de שוב puede expresar 'volver' o 'dar la vuelta'. 'Volverán' es natural en español y conserva el movimiento hacia Sheol sin añadir una interpretación más fuerte que la del verbo.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los perversos
  lexicon: HALOT / רשע
  rationale: '''Impíos'' comunica bien la cualidad moral y religiosa del término en contexto poético y encaja con el contraste del versículo. ''Los malvados'' también sería posible, pero ''impíos'' mantiene mejor la idea de falta de piedad hacia Dios.'
- source_word: לִשְׁאוֹל
  english_pob_choice: to Sheol
  chosen_spanish: a Sheol
  alternatives_spanish:
  - al sepulcro
  - al reino de los muertos
  - al sepulcro de los muertos
  lexicon: HALOT / שאול
  rationale: Se conserva la transliteración 'Sheol' para no sustituir el término hebreo por una equivalencia doctrinal posterior. En español, 'a Sheol' mantiene la referencia al ámbito de los muertos sin resolverla como 'infierno' ni reducirla a 'sepulcro'.
- source_word: כָּל גּוֹיִם
  english_pob_choice: all the nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todas las gentes
  - todas las naciones gentiles
  lexicon: HALOT / גוים
  rationale: '''Naciones'' es la correspondencia más directa para גּוֹיִם. Se mantiene el alcance total de כָּל con ''todas''.'
- source_word: שְׁכֵחֵי אֱלֹהִים
  english_pob_choice: that forget God
  chosen_spanish: que se olvidan de Dios
  alternatives_spanish:
  - que olvidan a Dios
  - olvidadoras de Dios
  lexicon: HALOT / שכח + אלהים
  rationale: La construcción participial describe una característica continua. 'Que se olvidan de Dios' suena natural y conserva el sentido relacional del olvido, no solo un acto mental puntual.
theological_decisions:
- issue: Sentido de Sheol en un contexto de juicio
  english_pob_reading: Sheol is rendered by transliteration rather than interpreted as 'hell.'
  chosen_spanish_reading: Se translitera 'Sheol' en lugar de traducirlo como 'infierno' o 'sepulcro'.
  alternative_spanish_readings:
  - infierno
  - sepulcro
  - reino de los muertos
  rationale: El hebreo no obliga al sentido posterior de 'infierno', y 'sepulcro' estrecha demasiado el campo semántico. La transliteración preserva la tensión teológica y permite que el lector distinga el término bíblico del concepto doctrinal posterior.
  doctrine_reference: 'Translation philosophy: primacía del original y preservación de la tensión teológica.'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y el audit trail inglés: se conserva la transliteración de Sheol, se mantiene el valor aspectual del verbo שוב con un futuro natural en español, y se deja intacta la estructura poética de dos miembros con pausa intermedia.'
  spanish_consistency_notes:
  - Se usa 'Dios' para אֱלֹהִים, conforme al estándar del proyecto.
  - Se evita 'SEÑOR' porque el hebreo aquí dice אֱלֹהִים, no el tetragrámaton.
  - La puntuación con raya refuerza la cesura poética sin alterar el contenido.
  - '''Impíos'' se elige por su fuerza moral-religiosa en español bíblico sin caer en arcaísmo excesivo.'
