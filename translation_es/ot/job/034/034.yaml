translation:
  language: es
  text: Los hombres de entendimiento me dirán[a], y un hombre sabio que me oye,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «hombres de corazón», un modismo para personas de entendimiento o discernimiento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי לֵבָב
  english_pob_choice: men of understanding
  chosen_spanish: los hombres de entendimiento
  alternatives_spanish:
  - los hombres de corazón
  - los hombres de discernimiento
  - los hombres sensatos
  lexicon: HALOT
  rationale: El hebreo literalmente dice «hombres de corazón», pero en español «corazón» aquí no comunica con claridad la facultad de discernir. «Entendimiento» conserva el valor idiomático de capacidad interior de juicio, siguiendo la decisión inglesa de expresar el sentido y no la metáfora literal.
- source_word: יֹאמְרוּ לִי
  english_pob_choice: will say to me
  chosen_spanish: me dirán
  alternatives_spanish:
  - dirán a mí
  - me dirán que
  - dirán
  lexicon: HALOT
  rationale: El imperfecto hebreo admite valor prospectivo; el español natural y directo es futuro simple. «Me dirán» mantiene la orientación verbal y la relación personal del discurso.
- source_word: וְגֶבֶר חָכָם
  english_pob_choice: and a wise man
  chosen_spanish: y un hombre sabio
  alternatives_spanish:
  - y un varón sabio
  - y un hombre de sabiduría
  - e incluso un sabio
  lexicon: HALOT
  rationale: גֶבֶר puede sugerir varón adulto o hombre fuerte, pero el paralelismo aquí favorece simplemente «hombre». Se conserva «sabio» de forma directa, sin sobrecargar el matiz.
- source_word: שֹׁמֵעַ לִי
  english_pob_choice: who hears me
  chosen_spanish: que me oye
  alternatives_spanish:
  - que me escucha
  - oyéndome
  - que escucha mi voz
  lexicon: HALOT
  rationale: El participio funciona de manera atributiva. «Que me oye» es cercano al hebreo y mantiene la sobriedad del paralelismo; «me escucha» sería también posible, pero un poco más interpretativo en español.
translation_notes:
  revision_awareness: La revisión inglesa más reciente solo añadió una coma final para reflejar la pausa hebrea antes del siguiente versículo; en español se conservó la misma estructura pausada con coma final, sin introducir cambios de sentido.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «SEÑOR» como máscara confesional; no aplica aquí.
  - Se prefirió el valor idiomático de לֵבָב como entendimiento, no como emoción ni como 'corazón' literal en el cuerpo.
  - La puntuación final con coma refleja la pausa del hemistiquio y prepara la continuación del versículo siguiente.
