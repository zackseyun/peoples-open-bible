translation:
  language: es
  text: El malvado toma prestado y no devuelve, pero el justo es bondadoso[a] y da[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muestra favor» o «es generoso». El verbo hebreo lleva el sentido de mostrar gracia o favor, expresado aquí en una acción benéfica.
    reason: lexical_alternative
  - marker: b
    text: O «y presta». El hebreo dice simplemente «y da»; algunos intérpretes entienden este dar como un préstamo generoso en contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹוֶה
  english_pob_choice: borrows
  chosen_spanish: toma prestado
  alternatives_spanish:
  - pide prestado
  - se endeuda
  lexicon: HALOT
  rationale: El verbo qal describe a quien recibe prestado; en español, «toma prestado» expresa con naturalidad la acción sin cargar el texto con una formulación técnica innecesaria.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el malvado
  alternatives_spanish:
  - el impío
  - el perverso
  lexicon: HALOT
  rationale: El sustantivo funciona aquí de manera representativa y contrastiva. «El malvado» es claro y natural en español, aunque «el impío» también sería posible en registro más tradicional.
- source_word: לֹא יְשַׁלֵּם
  english_pob_choice: does not repay
  chosen_spanish: no paga
  alternatives_spanish:
  - no repaga
  - no devuelve
  lexicon: HALOT
  rationale: El piel de שלם en este contexto se refiere a saldar lo debido. «No paga» conserva la idea central de incumplir la deuda en forma breve y proverbial; «no devuelve» resalta más el acto de regresar lo recibido, pero es algo menos preciso para la obligación de pago.
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el righteous person
  - el hombre justo
  lexicon: HALOT
  rationale: Como término sustantivado de contraste sapiencial, «el justo» preserva el valor de clase representativa del hebreo y suena natural en español bíblico contemporáneo.
- source_word: חוֹנֵן
  english_pob_choice: is gracious
  chosen_spanish: es bondadoso
  alternatives_spanish:
  - es misericordioso
  - muestra favor
  - es generoso
  lexicon: HALOT
  rationale: El participio de חנן lleva la idea de mostrar gracia/favor. «Es bondadoso» comunica en español la disposición benévola del justo sin sobrecargar el versículo con un matiz eclesiástico más técnico. Se conserva la tensión entre gracia y acción benéfica sin reducirla solo a «generoso».
- source_word: וְנוֹתֵן
  english_pob_choice: and gives
  chosen_spanish: y da
  alternatives_spanish:
  - y entrega
  - y presta
  lexicon: HALOT
  rationale: נתן significa básicamente «dar». En este proverbio, el contexto permite pensar en dar liberalmente, pero el verbo no debe restringirse a «prestar» sin base suficiente; por eso se mantiene la amplitud de «da».
theological_decisions:
- issue: 'Contraste representativo: singular de clase en hebreo'
  english_pob_reading: Retain singular class terms as 'the wicked' and 'the righteous' rather than neutralizing to plural or explicitly inclusive paraphrase.
  chosen_spanish_reading: 'Mantener los singulares representativos: «el malvado» y «el justo».'
  alternative_spanish_readings:
  - los malvados ... los justos
  - un malvado ... un justo
  rationale: El hebreo usa sustantivos/adjetivos masculinos singulares con valor proverbial y representativo. El español debe conservar ese contraste sin pluralizarlo ni convertirlo en paráfrasis explicativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 4
- issue: 'חוֹנֵן: gracia/favor frente a generosidad'
  english_pob_reading: '''is gracious'' with footnoted alternatives ''shows favor'' or ''is generous.'''
  chosen_spanish_reading: «es bondadoso», con nota que abre alternativas de gracia/favor y generosidad.
  alternative_spanish_readings:
  - es gracioso
  - muestra favor
  - es generoso
  - es misericordioso
  rationale: El hebreo tiene una raíz de gracia/favor, pero el paralelismo del verso también apunta a acción benéfica concreta. «Bondadoso» permite comunicar ambas dimensiones sin imponer una equivalencia demasiado técnica o devocional.
  doctrine_reference: HALOT; POB lexical note on חנן
translation_notes:
  revision_awareness: La revisión más reciente no cambió el sentido de base ni requirió ajustes; el consenso de auditoría es de alta concordancia, por lo que la redacción española sigue de cerca la lectura inglesa auditada y el hebreo subyacente.
  spanish_consistency_notes:
  - Se conservó el contraste proverbial entre dos tipos humanos con artículo definido singular («el malvado / el justo»).
  - Se evitó traducir חנן como mero «dar limosna» o «ser misericordioso» para no estrechar indebidamente el campo semántico.
  - Se mantuvo «da» en paralelo con la nota sobre posible sentido de «presta», respetando la amplitud del verbo נתן.
  - La puntuación refleja la antítesis hebrea con coma y contraste por «pero».
