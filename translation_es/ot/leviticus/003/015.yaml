review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja en general la secuencia sacrificial del hebreo: los dos riñones, la grasa sobre ellos, la referencia a los lomos, la pieza asociada al hígado y la acción final de quitarla. Sin embargo, introduce dos desajustes con la auditoría POB: (1) coloca una nota [a] en ''los dos riñones'' aunque la nota inglesa sobre la incertidumbre léxica corresponde a הַיֹּתֶרֶת, no a los riñones; (2) omite la nota que explica que עַל הַכְּלָיֹת es literalmente ''sobre los riñones'' y que en contexto probablemente significa ''con los riñones''. Además, ''del hígado'' suaviza demasiado עַל הַכָּבֵד, que en la POB se mantuvo como ''on the liver''; en español conviene conservar ''sobre el hígado'' o equivalente más literal.'
  spanish_quality_summary: El español es mayormente claro y legible, pero la puntuación con repetidos 'y' suena un poco pesada; aun así, esto sigue de cerca el hebreo y es aceptable en ley ritual. 'Apéndice del hígado' suena natural, pero pierde la relación espacial. 'Lo quitará' es comprensible, aunque 'la quitará' concuerda mejor con el referente inmediato femenino ('la grasa' / 'la parte') y evita una leve ambigüedad.
  glossary_alignment: No hay términos teológicos de glosario mayor en juego. Anatómicamente, 'riñones', 'grasa', 'lomos' y 'apéndice' concuerdan bien con las decisiones léxicas documentadas. La principal alineación pendiente es respetar la cautela documentada sobre יוֹתֶרֶת y conservar la nota sobre la literalidad de עַל הַכְּלָיֹת.
  issues:
  - severity: medium
    issue: La nota [a] está anclada a 'los dos riñones' pero no aporta una alternativa real ni corresponde a una incertidumbre del original.
    rationale: שְׁתֵּי הַכְּלָיֹת es léxicamente claro. La nota inglesa marcada a corresponde en realidad a הַיֹּתֶרֶת/appendage, no a 'kidneys'.
  - severity: medium
    issue: Falta una nota para 'con los riñones' que preserve la alternativa literal 'sobre los riñones'.
    rationale: La auditoría inglesa documenta explícitamente que עַל הַכְּלָיֹת es literalmente 'on the kidneys' y que en contexto probablemente significa que se quita junto con ellos.
  - severity: low
    issue: '''del hígado'' interpreta más de lo debido frente a עַל הַכָּבֵד.'
    rationale: La POB inglesa conservó 'on the liver' por cautela. En español 'sobre el hígado' mantiene mejor la relación formal del hebreo.
  - severity: low
    issue: '''lo quitará'' tiene concordancia menos precisa que ''la quitará''.'
    rationale: יְסִירֶנָּה lleva sufijo femenino singular; en español, dado que el referente inmediato es una pieza/parte femenina, 'la quitará' suena más ajustado.
  revised_spanish_text: y los dos riñones, y la grasa que está sobre ellos, que está sobre los lomos, y el apéndice[a] sobre el hígado, con los riñones[b], la quitará.
