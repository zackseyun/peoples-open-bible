review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: una advertencia vigilante ante una persona mala que maquina el mal y puede causarte deshonra duradera. Sin embargo, la nota al pie introduce una alternativa inglesa (''evildoer'') impropia en una edición española y debe ajustarse a alternativas españolas documentadas por el expediente inglés.'
  spanish_quality_summary: 'El español principal es claro, natural y digno: «Mantente alerta contra el malhechor, porque trama el mal, no sea que te acarree deshonra para siempre». La sintaxis y el tono sapiencial funcionan bien. El único problema relevante está en la legibilidad/editorial de la nota, no en el texto base.'
  glossary_alignment: No hay términos del glosario principal especialmente activados aquí. «Malhechor», «trama el mal» y «deshonra» concuerdan bien con κακούργου, τεκταίνεται/πονηρά y μῶμον. La elección «Mantente alerta» para πρόσεχε es fiel y natural.
  issues:
  - severity: medium
    issue: La nota al pie usa la palabra inglesa «evildoer» dentro de una nota española.
    rationale: Las notas deben servir al lector hispanohablante y preservar las alternativas léxicas en español, no mezclar innecesariamente inglés. Además, el expediente inglés ofrece alternativas conceptuales ('Beware...', 'plots wicked things', 'reproach'), pero la nota española debe formularlas idiomáticamente en español.
  revised_spanish_text: Mantente alerta contra el malhechor[a], porque trama el mal, no sea que te acarree deshonra para siempre.
  revised_footnotes:
  - marker: a
    text: O «Cuídate de un malhechor, porque maquina cosas malas; no sea que te cause reproche para siempre»
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel, idiomático y acorde con el expediente griego-inglés. Solo se corrige la nota al pie para que presente alternativas léxicas y sintácticas en español, no en inglés, y para reflejar mejor las alternativas auditadas ('beware', 'plots wicked things', 'reproach').
