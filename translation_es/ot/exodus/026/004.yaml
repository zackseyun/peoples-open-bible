base_translation:
  language: en
  yaml_path: translation/ot/exodus/026/004.yaml
  text: And you shall make loops of blue on the edge of the one curtain at the end of the first set joined together[c][b][a]; and so you shall do on the edge of the outermost curtain in the second set joined together.
  footnotes:
  - marker: a
    text: Or 'blue' or 'violet'; the Hebrew תְּכֵלֶת denotes the characteristic dyed blue material used in the tabernacle.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew terms for 'set joined together' (חֹבָרֶת / מַחְבֶּרֶת) refer to a grouping of curtains coupled into one unit; traditionally, 'coupling' is also used.
    reason: lexical_alternative
  - marker: c
    text: Or 'endmost curtain' for 'outermost curtain.'
    reason: lexical_alternative
