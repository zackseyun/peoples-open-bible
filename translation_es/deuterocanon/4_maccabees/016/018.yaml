translation:
  language: es
  text: No dejen que los más jóvenes se aterroricen por las torturas. Recuerden que, por causa del Dios del mundo[a], ustedes han participado de esto y han disfrutado de la vida;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «por causa del Dios del mundo». La expresión probablemente significa Dios como soberano sobre el mundo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοὺς νεωτέρους
  english_pob_choice: the younger men
  chosen_spanish: los hombres más jóvenes
  alternatives_spanish:
  - los más jóvenes
  - los jóvenes
  lexicon: LSJ
  rationale: El plural masculino comparativo νεώτεροι se refiere a los varones más jóvenes dentro del grupo. "Hombres más jóvenes" conserva el rasgo masculino y el matiz comparativo sin sonar forzado en español.
- source_word: καταπλαγῆναι
  english_pob_choice: be terrified
  chosen_spanish: se aterroricen
  alternatives_spanish:
  - se llenen de miedo
  - se atemoricen
  - queden aterrados
  lexicon: LSJ
  rationale: El infinitivo aoristo pasivo expresa quedar sobrecogidos por miedo o shock. En español, "se aterroricen" transmite con naturalidad esa reacción intensa y el tono exhortativo.
- source_word: τὰς βασάνους
  english_pob_choice: the tortures
  chosen_spanish: los tormentos
  alternatives_spanish:
  - las torturas
  - los suplicios
  - las pruebas
  lexicon: LSJ
  rationale: βάσανοι puede referir a torturas judiciales o a sufrimientos extremos. "Tormentos" es un equivalente natural en español que mantiene la dureza del contexto sin restringirse demasiado a la técnica legal de "torturas".
- source_word: ἀναμνήσθητε
  english_pob_choice: Remember
  chosen_spanish: Recuerden
  alternatives_spanish:
  - Recuerden bien
  - Traigan a la memoria
  - No olviden
  lexicon: LSJ
  rationale: El imperativo aoristo llama a una rememoración deliberada. "Recuerden" es claro, natural y adecuado para una exhortación directa en plural.
- source_word: διὰ τὸν θεὸν τοῦ κόσμου
  english_pob_choice: for the sake of the God of the world
  chosen_spanish: por causa del Dios del mundo[a]
  alternatives_spanish:
  - por causa de Dios, el soberano del mundo
  - por el bien del Dios del mundo
  - a causa del Dios del mundo
  lexicon: LSJ
  rationale: Se conserva de forma cercana la construcción griega con διὰ + acusativo como causal/purposiva. "Dios del mundo" refleja con mayor literalidad el genitivo τοῦ κόσμου que la paráfrasis interpretativa "soberano del mundo"; el sentido de soberanía queda explicado en la nota.
- source_word: μετελάβετε
  english_pob_choice: you have partaken of this
  chosen_spanish: han participado de esto
  alternatives_spanish:
  - han compartido esto
  - han tomado parte en esto
  - han recibido parte de esto
  lexicon: LSJ
  rationale: μεταλαμβάνω significa compartir, participar o tomar parte. Dado que el objeto es implícito en el griego conservado, "han participado de esto" preserva la ambigüedad sin añadir un objeto no expresado.
- source_word: τοῦ βίου ἀπελαύσατε
  english_pob_choice: have enjoyed life
  chosen_spanish: han disfrutado de la vida
  alternatives_spanish:
  - han gozado de la vida
  - han tenido el disfrute de la vida
  - han tenido la vida
  lexicon: LSJ
  rationale: ἀπολαύω con genitivo significa disfrutar o tener el beneficio de algo. "Han disfrutado de la vida" reproduce bien la idea de haber recibido el bien de la existencia terrenal.
theological_decisions:
- issue: Sentido de διὰ τὸν θεὸν τοῦ κόσμου
  english_pob_reading: for the sake of the God of the world
  chosen_spanish_reading: por causa del Dios del mundo
  alternative_spanish_readings:
  - por causa de Dios, el soberano del mundo
  - por el Dios del mundo
  rationale: En español, "Dios del mundo" puede sonar literalmente extraño, pero sigue más de cerca la forma griega y evita introducir una explicación interpretativa en el cuerpo del texto. La referencia a la soberanía divina se deja para la nota, donde se aclara que la expresión exalta a Dios como soberano sobre el mundo.
  doctrine_reference: Principio de primacía del original; preservar la tensión lexical y explicar el matiz en nota.
- issue: Objeto implícito de μετελάβετε
  english_pob_reading: you have partaken of this
  chosen_spanish_reading: han participado de esto
  alternative_spanish_readings:
  - han participado de ello
  - han compartido de esto
  - han tomado parte en ello
  rationale: El griego presenta el verbo sin un objeto explícito conservado en esta forma textual. En español, "esto" mantiene la referencia deíctica mínima sin inventar contenido específico.
  doctrine_reference: Principio de no sobretraducir ni completar más allá de lo que el texto conserva.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego de Swete y toma en cuenta el audit trail inglés: se conserva la exhortación negativa, el paralelismo entre temor ante los tormentos y el recuerdo motivador, y la frase teológicamente cargada τοῦ θεοῦ τοῦ κόσμου. A diferencia de la revisión inglesa, se evita una paráfrasis explicativa en el texto principal y se traslada la aclaración sobre soberanía a una nota, manteniendo la literalidad útil para el lector español.'
  spanish_consistency_notes:
  - Se usa «Dios» para θεός y se evita «SEÑOR» porque el texto no contiene κύριος.
  - Se mantiene «Dios del mundo» en el texto principal para reflejar el genitivo griego, con nota explicativa sobre el sentido de soberanía.
  - «Participado de esto»/«participado de ello» se evita en favor de un español más natural («han participado de esto») sin perder la ambigüedad del objeto implícito.
  - Se elige el plural masculino «hombres más jóvenes» para reflejar τοὺς νεωτέρους en este contexto de varones dentro del grupo martirial.
