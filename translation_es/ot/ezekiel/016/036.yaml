review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura causal del hebreo y conserva adecuadamente la mayoría de las imágenes: la desnudez descubierta, las prostituciones, los amantes, los ídolos y la sangre de los hijos dados a ellos. También respeta la decisión del proyecto de usar ''Yahvé'' para יהוה. Sin embargo, la frase inicial ''el Señor Yahvé'' no refleja con suficiente naturalidad ni precisión el doble título אֲדֹנָי יְהוִה en español; ''el Señor Dios Yahvé'' preserva mejor la combinación sin ocultar el nombre divino. Además, el punto final debe ser coma para reflejar que el versículo continúa en la siguiente línea.'
  spanish_quality_summary: 'El español es claro y legible, con tono digno y moderno. ''Quedó descubierta tu desnudez'' y ''en tus prostituciones con tus amantes'' suenan naturales. Hay pequeños ajustes de estilo y fidelidad: la nota b tiene comillas y formato algo torpes; la puntuación final debe quedar abierta; y la fórmula titular inicial conviene afinar para una lectura bíblica más estable y transparente.'
  glossary_alignment: 'Buen alineamiento general con el glosario: יהוה como ''Yahvé'', תַזְנוּתַיִךְ como ''prostituciones'', y el lenguaje sacrificial conservado literalmente con nota explicativa. La principal excepción necesaria es אֲדֹנָי יְהוִה, donde ''Señor Yahvé'' resulta incompleto para el doble título; ''Señor Dios Yahvé'' se alinea mejor con la terminología del proyecto y con la forma fija de Ezequiel.'
  issues:
  - severity: medium
    issue: Renderización de אֲדֹנָי יְהוִה como 'el Señor Yahvé'
    rationale: Aunque preserva 'Yahvé', no representa plenamente el doble título. En español bíblico legible, 'el Señor Dios Yahvé' comunica mejor אֲדֹנָי + יהוה sin enmascarar el nombre divino.
  - severity: low
    issue: Puntuación final con punto en lugar de coma
    rationale: El hebreo continúa en el versículo siguiente; la traducción auditada en inglés también deja la cláusula abierta. Conviene mantener coma final.
  - severity: low
    issue: Redacción/formato de la nota b
    rationale: 'La nota comienza con una comilla innecesaria y puede expresarse con español más limpio: ''Hebreo: "los ídolos de tus abominaciones"...''.'
