translation:
  language: es
  text: Porque los levitas dejaron sus tierras de pasto[a] y sus posesiones, y se fueron a Judá y a Jerusalén, porque Jeroboam y sus hijos los habían excluido[b] de servir como sacerdotes para Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «sus tierras comunes» o «sus tierras de pastoreo». El hebreo se refiere al terreno abierto adjunto a las ciudades levíticas.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los habían rechazado de ministrar como sacerdotes para Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: מִגְרְשֵׁיהֶם
  english_pob_choice: their pasturelands
  chosen_spanish: sus tierras de pasto
  alternatives_spanish:
  - sus tierras comunes
  - sus tierras de pastoreo
  - sus terrenos abiertos
  lexicon: HALOT
  rationale: מִגְרָשׁ designa el terreno abierto ligado a las ciudades levíticas, a menudo para pastoreo. En español, «tierras de pasto» conserva el sentido concreto y el uso territorial sin sonar técnico ni anacrónico.
- source_word: וַאֲחֻזָּתָם
  english_pob_choice: their possessions
  chosen_spanish: sus posesiones
  alternatives_spanish:
  - sus bienes
  - sus propiedades
  - su heredad
  lexicon: HALOT
  rationale: אֲחֻזָּה puede referirse a una posesión o tenencia, especialmente territorial. «Posesiones» mantiene la amplitud del término y sigue de cerca la decisión inglesa revisada desde «property» a «possessions».
- source_word: וַיֵּלְכוּ לִיהוּדָה וְלִירוּשָׁלִָם
  english_pob_choice: and went to Judah and Jerusalem
  chosen_spanish: y se fueron a Judá y a Jerusalén
  alternatives_spanish:
  - y fueron a Judá y a Jerusalén
  - y marcharon a Judá y a Jerusalén
  lexicon: HALOT
  rationale: El verbo הלך con ל indica movimiento hacia un destino. «Se fueron a» es natural en español narrativo y conserva la dirección geográfica sin añadir matices no presentes.
- source_word: הִזְנִיחָם
  english_pob_choice: had rejected them
  chosen_spanish: los habían rechazado
  alternatives_spanish:
  - los habían excluido
  - los habían desechado
  - los habían abandonado
  lexicon: HALOT
  rationale: El hifil de זנח expresa rechazo, desestimación o expulsión. «Los habían rechazado» reproduce bien la fuerza relacional e institucional del acto, y encaja con la frase siguiente sobre el sacerdocio.
- source_word: מִכַּהֵן
  english_pob_choice: from serving as priests
  chosen_spanish: de servir como sacerdotes
  alternatives_spanish:
  - de ministrar como sacerdotes
  - de ejercer como sacerdotes
  lexicon: HALOT
  rationale: La construcción con מן + infinitivo de כהן indica impedir el ejercicio sacerdotal. «Servir como sacerdotes» es claro, digno y suficientemente cercano al hebreo.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - de Yahvé
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: «Yahvé» en el texto principal. Con כהן, «para Yahvé» comunica con naturalidad la orientación cultual del servicio sacerdotal.'
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: the LORD / Yahweh in audit context
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa directamente el Tetragrámaton. Conforme al estándar del proyecto, se conserva el nombre divino como «Yahvé» en vez de ocultarlo con un título. Esto mantiene la transparencia textual y la coherencia con la política doctrinal del POB en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Función de la cláusula final sobre el sacerdocio
  english_pob_reading: had rejected them from serving as priests to Yahweh
  chosen_spanish_reading: los habían rechazado de servir como sacerdotes para Yahvé
  alternative_spanish_readings:
  - los habían excluido de ministrar como sacerdotes para Yahvé
  - los habían apartado de ejercer como sacerdotes para Yahvé
  rationale: La cláusula expresa una exclusión efectiva del ministerio sacerdotal. «Rechazado» preserva la fuerza del hifil de זנח y deja visible que no es solo una separación social, sino una negación de acceso a la función cultual.
  doctrine_reference: HALOT; contexto inmediato de 2 Crónicas 11:13–15
translation_notes:
  revision_awareness: Seguí la revisión más reciente del POB en inglés, que prefirió «possessions» frente a «property» por mayor naturalidad y precisión para las tenencias de los levitas. En español, por eso se eligió «posesiones» y se mantuvo intacta la estructura del resto del versículo, con adaptación idiomática mínima necesaria.
  spanish_consistency_notes:
  - Se usó «Yahvé» para el Tetragrámaton conforme al estándar del proyecto, evitando «SEÑOR».
  - Se eligió «sacerdotes» para כהן porque aquí el contexto es explícitamente cultual; «siervos» no sería preciso.
  - «Se fueron a» conserva movimiento narrativo natural sin borrar la dirección indicada por ל.
  - 'La duplicación de «porque» refleja los dos כִּי del hebreo: explicación general y razón causal inmediata.'
