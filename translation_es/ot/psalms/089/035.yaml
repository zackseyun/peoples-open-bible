    rationale: El audit trail inglés selecciona «violate» como renderizado preferido y deja «profane» como alternativa. En español, «violaré» transmite mejor la idea de incumplir o tratar como inviolable el pacto, sin sonar tan cultual como «profanaré».
  - severity: low
