    text: Or 'surrounded the city' for ἐκύκλωσεν; the chosen rendering keeps the vivid circular image of the Greek.
    reason: lexical_alternative
  - marker: b
    text: The Greek verb behind 'closed in' can suggest joining together or pressing in; here it refers to the ships tightening the siege from the sea.
    reason: lexical_alternative
