  yaml_path: translation/deuterocanon/2_maccabees/010/005.yaml
  text: But when he entered Judea and came near Bethsura[a], a fortified place about five schoeni from Jerusalem[b], he was pressing it hard.
  footnotes:
  - marker: a
    text: A schoenus was an ancient unit of distance; the exact modern equivalent varied, so the Greek measure is retained rather than converted with false precision.
    reason: cultural_note
  - marker: b
    text: Or, 'he was besieging it.' The Greek says literally 'he was pressing it,' which can describe military pressure on a fortified place.
    reason: lexical_alternative
