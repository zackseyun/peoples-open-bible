translation:
  language: es
  text: Porque aun si ustedes abatieran a todo el ejército de los caldeos[a] que combaten contra ustedes, y solo quedaran entre ellos hombres heridos[b], cada uno en su tienda, se levantarían y prenderían fuego a esta ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «babilonios». El hebreo dice «los caldeos», el término étnico usado con frecuencia para las fuerzas babilónicas en Jeremías.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «hombres atravesados» o «hombres perforados».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: For even if
  chosen_spanish: Porque aun si
  alternatives_spanish:
  - Pues si
  - Y aunque
  lexicon: HALOT
  rationale: La combinación introduce una concesión hipotética fuerte. «Porque» conserva el valor explicativo de כִּי y «aun si» reproduce la fuerza enfática de אִם en un español natural.
- source_word: הִכִּיתֶם
  english_pob_choice: you were to strike down
  chosen_spanish: ustedes abatieran
  alternatives_spanish:
  - ustedes golpearan
  - ustedes derrotaran
  - ustedes derribaran
  lexicon: HALOT
  rationale: En contexto militar, נכה expresa derrotar o herir gravemente. «Abatieran» comunica derrota/derribo en forma hipotética sin sonar arcaico.
- source_word: כָּל חֵיל כַּשְׂדִּים
  english_pob_choice: the whole army of the Chaldeans
  chosen_spanish: todo el ejército de los caldeos
  alternatives_spanish:
  - todo el ejército de los caldeos
  - toda la fuerza de los caldeos
  - todo el ejército babilonio
  lexicon: HALOT
  rationale: חֵיל en contexto bélico es «ejército» o «fuerza militar». Se conserva «caldeos» como equivalente directo del etnónimo hebreo, siguiendo la prioridad de la fuente; «babilonio» queda como alternativa contextual.
- source_word: הַנִּלְחָמִים אִתְּכֶם
  english_pob_choice: who are fighting against you
  chosen_spanish: que pelea contra ustedes
  alternatives_spanish:
  - que lucha contra ustedes
  - que está en guerra con ustedes
  lexicon: HALOT
  rationale: La preposición con לחם aquí es hostil; por eso se traduce explícitamente «contra ustedes». Se usa singular colectivo («pelea») para concordar con «ejército».
- source_word: וְנִשְׁאֲרוּ בָם
  english_pob_choice: and only ... remained among them
  chosen_spanish: y aunque solo quedaran entre ellos
  alternatives_spanish:
  - y quedaran solo entre ellos
  - y solo quedaran de ellos
  lexicon: HALOT
  rationale: El verbo indica quedar/remanecer. «Aunque solo quedaran» mantiene la concesión y la restricción implícita del escenario de derrota total.
- source_word: אֲנָשִׁים מְדֻקָּרִים
  english_pob_choice: wounded men
  chosen_spanish: hombres heridos
  alternatives_spanish:
  - hombres atravesados
  - hombres atravesados por la espada
  - hombres apuñalados
  lexicon: HALOT
  rationale: מְדֻקָּרִים significa literalmente «perforados/atravesados». «Hombres heridos» comunica el estado resultante de forma idiomática en español; las alternativas más literales se conservan como opciones.
- source_word: אִישׁ בְּאָהֳלוֹ
  english_pob_choice: each in his tent
  chosen_spanish: cada uno en su tienda
  alternatives_spanish:
  - cada hombre en su tienda
  - cada uno en su carpa
  lexicon: HALOT
  rationale: El singular distributivo אִישׁ se refleja bien con «cada uno». «Su tienda» preserva el posesivo singular masculino implícito y mantiene la imagen original.
- source_word: יָקֻמוּ
  english_pob_choice: they would rise up
  chosen_spanish: se levantarían
  alternatives_spanish:
  - se alzarían
  - se pondrían de pie
  lexicon: HALOT
  rationale: El verbo continúa la consecuencia hipotética. «Se levantarían» es una forma natural en español y preserva la imagen de pasar de reposo a acción.
- source_word: וְשָׂרְפוּ אֶת הָעִיר הַזֹּאת בָּאֵשׁ
  english_pob_choice: and burn this city with fire
  chosen_spanish: y prenderían fuego a esta ciudad
  alternatives_spanish:
  - y quemarían esta ciudad con fuego
  - y pondrían fuego a esta ciudad
  lexicon: HALOT
  rationale: שָׂרַף con בָּאֵשׁ puede expresarse de manera idiomática como «prender fuego». Así se evita la redundancia «con fuego» sin perder el sentido instrumental.
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el texto fuente y con la auditoría inglesa. Se mantuvo la lectura concesiva fuerte («aun si»), el etnónimo «caldeos» y la imagen de hombres heridos/perforados, ajustando solo la formulación para que suene natural en español sin perder precisión.
  spanish_consistency_notes:
  - Se conservó «caldeos» en el texto principal y se documentó «babilonios» como alternativa lexical, en línea con la nota inglesa.
  - Se evitó «SEÑOR» o terminología no pertinente, pues el verso no contiene referencias divinas explícitas.
  - «Hombres heridos» resume el valor de מְדֻקָּרִים; la nota mantiene la tensión entre sentido idiomático y literal.
  - Se eligió una estructura condicional concesiva fluida en español para reflejar el doble valor de כִּי אִם.
