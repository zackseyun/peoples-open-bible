translation:
  language: es
  text: 'Entonces Huram, rey de Tiro, respondió en una carta que envió a Salomón: «Porque Yahvé ama a su pueblo[a][b][c], te ha puesto por rey sobre ellos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Huram; tradicionalmente Hiram.
    reason: alternative_reading
  - marker: b
    text: 'O: «Por el amor de Yahvé a su pueblo».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «dijo en una carta, y la envió a Salomón».'
    reason: previous_rendering
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... answered
  chosen_spanish: respondió
  alternatives_spanish:
  - dijo
  - contestó
  lexicon: HALOT
  rationale: En este contexto narrativo y epistolar, el verbo introduce una réplica a la petición de Salomón; por eso ‘respondió’ comunica mejor la función discursiva que un simple ‘dijo’, sin alejarse del hebreo.
- source_word: חוּרָם
  english_pob_choice: Huram
  chosen_spanish: Huram
  alternatives_spanish:
  - Hiram
  lexicon: HALOT
  rationale: La forma consonántica del versículo es חוּרָם; ‘Huram’ conserva esa forma. ‘Hiram’ es la variante tradicional, pero no refleja exactamente la grafía de este texto.
- source_word: מֶלֶךְ צֹר
  english_pob_choice: king of Tyre
  chosen_spanish: rey de Tiro
  alternatives_spanish:
  - el rey de Tiro
  lexicon: HALOT
  rationale: La construcción de estado constructo identifica su cargo y su reino. ‘Rey de Tiro’ es la forma natural y fiel en español.
- source_word: בִּכְתָב
  english_pob_choice: in a letter
  chosen_spanish: en una carta
  alternatives_spanish:
  - por escrito
  - en escrito
  lexicon: HALOT
  rationale: El sustantivo indica un documento escrito; ‘en una carta’ expresa bien el medio concreto y enlaza naturalmente con el verbo siguiente.
- source_word: וַיִּשְׁלַח אֶל שְׁלֹמֹה
  english_pob_choice: and sent it to Solomon
  chosen_spanish: que envió a Salomón
  alternatives_spanish:
  - y la envió a Salomón
  - y envió a Salomón
  lexicon: HALOT
  rationale: El objeto implícito es la carta mencionada; en español, una relativa breve evita la repetición pesada y mantiene explícita la relación con el documento.
- source_word: בְּאַהֲבַת
  english_pob_choice: Because ... loves
  chosen_spanish: Porque ... ama
  alternatives_spanish:
  - A causa del amor de
  - Por el amor de
  lexicon: HALOT
  rationale: El prefijo ב con el sustantivo puede tener valor causal aquí. ‘Porque ... ama’ expresa la relación causal con claridad y sin forzar una paráfrasis.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La norma del proyecto en español es ‘Yahvé’ para el Tetragrama, preservando el nombre divino en lugar de sustituirlo por un título.
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: a su pueblo
  alternatives_spanish:
  - a su nación
  - a su gente
  lexicon: HALOT
  rationale: El sufijo posesivo se refiere a Yahvé, no a Salomón. ‘Su pueblo’ es la expresión de pacto más natural y precisa.
- source_word: נְתָנְךָ
  english_pob_choice: he has made you
  chosen_spanish: te ha puesto
  alternatives_spanish:
  - te ha hecho
  - te ha nombrado
  lexicon: HALOT
  rationale: Con una función real, נתן suele equivaler a ‘poner/colocar/nombrar’. ‘Te ha puesto’ reproduce bien la idea de investidura sin perder la fuerza del verbo.
- source_word: עֲלֵיהֶם מֶלֶךְ
  english_pob_choice: king over them
  chosen_spanish: por rey sobre ellos
  alternatives_spanish:
  - como rey sobre ellos
  - rey sobre ellos
  lexicon: HALOT
  rationale: La preposición על señala gobierno sobre el pueblo. ‘Por rey sobre ellos’ comunica investidura y dominio, y conserva el matiz de nombramiento.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El versículo usa el Tetragrama directamente. La política del proyecto en español pide transliterar el nombre divino como ‘Yahvé’ en lugar de sustituirlo por ‘SEÑOR’.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La redacción sigue el ajuste de la POB inglesa que prefiere un verbo de respuesta contextual (‘answered/respondió’) y subordina el envío de la carta para evitar la dureza de dos acciones coordinadas. Se conserva la referencia causal del hebreo בְּאַהֲבַת y el nombre divino en forma transliterada.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para יְהוָה, conforme a la terminología del proyecto.
  - Se usa ‘carta’ para בִּכְתָב, ya que el contexto menciona explícitamente un escrito enviado.
  - ‘Te ha puesto por rey’ preserva el matiz de investidura real de נָתַן con un complemento de cargo.
  - La puntuación con dos puntos introduce correctamente la cita directa en español.
