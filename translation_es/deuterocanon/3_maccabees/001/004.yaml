base_translation:
  language: en
  yaml_path: translation/deuterocanon/3_maccabees/001/004.yaml
  text: And when the battle had become fierce and affairs were turning more strongly in Antiochus’s favor[a], Arsinoe went among the troops and earnestly urged them, with pity and tears, her hair let down, to help themselves and their children and wives courageously, promising to give two minas of gold to each one if they won.
  footnotes:
  - marker: a
    text: A mina was an ancient unit of weight and money; the text promises each soldier two minas of gold upon victory.
    reason: cultural_note
