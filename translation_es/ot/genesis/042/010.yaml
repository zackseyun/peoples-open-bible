translation:
  language: es
  text: 'Pero ellos le dijeron[a]: «No, mi señor; tus siervos han venido a comprar alimento».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a comprar grano». El hebreo dice «a comprar alimento», aunque en el contexto de hambre probablemente se trata de grano.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: But they said
  chosen_spanish: Pero ellos le dijeron
  alternatives_spanish:
  - Y dijeron
  - Y ellos dijeron
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración y, en este contexto de respuesta directa a la acusación previa, «pero» comunica bien el contraste discursivo sin perder la secuencia narrativa. «Le dijeron» refleja el objeto pronominal «a él» de אֵלָיו.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a José
  lexicon: HALOT
  rationale: El sufijo pronominal indica que la respuesta va dirigida a José. En español, el clítico dativo «le» es natural y evita una repetición pesada del referente.
- source_word: לֹא
  english_pob_choice: 'No'
  chosen_spanish: 'No'
  alternatives_spanish:
  - De ninguna manera
  - No, señor
  lexicon: HALOT
  rationale: La negación introduce un rechazo enfático en el discurso directo. «No» conserva la fuerza simple y directa del hebreo sin añadir matices no presentes en el texto.
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - señor mío
  - mi amo
  - señor
  lexicon: HALOT
  rationale: Como fórmula respetuosa dirigida a un oficial egipcio, «mi señor» preserva la jerarquía social y el tono deferente. «Señor» solo sería menos explícito respecto de la relación de subordinación.
- source_word: וַעֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus esclavos
  - tus servidores
  lexicon: HALOT
  rationale: El hebreo עֲבָדֶיךָ puede ser «siervos» o «esclavos». En esta autoidentificación cortesana, el énfasis está en la fórmula de humildad y dependencia, no en describir su estatus legal; por eso «siervos» es más natural y fiel al registro de respeto. «Esclavos» sería demasiado duro en español para este contexto.
- source_word: לִשְׁבָּר
  english_pob_choice: to buy
  chosen_spanish: a comprar
  alternatives_spanish:
  - para comprar
  - a adquirir
  lexicon: HALOT
  rationale: La raíz שׁבר aquí tiene el sentido comercial de abastecerse/comprar en contexto de hambre. En español, «a comprar» reproduce con naturalidad la finalidad del movimiento en la frase.
- source_word: אֹכֶל
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - comida
  - alimentos
  - grano
  lexicon: HALOT
  rationale: אֹכֶל significa de manera amplia «alimento». «Alimento» conserva ese alcance general mejor que «grano», que sería una especificación interpretativa más estrecha, aunque plausible por el contexto de hambre.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético de Génesis 42:10 y toma en cuenta la auditoría inglesa POB: mantiene el valor discursivo de וַיֹּאמְרוּ, el destinatario pronominal de אֵלָיו, la fórmula de respeto de אֲדֹנִי, y la ambigüedad léxica de לִשְׁבָּר/אֹכֶל con una nota que conserva la alternativa «grano» sin sobrespecificarla en el cuerpo principal.'
  spanish_consistency_notes:
  - Se prefirió «mi señor» para אֲדֹנִי por coherencia con una fórmula de respeto jerárquico, no como título divino.
  - Se prefirió «siervos» para עֲבָדֶיךָ porque en este contexto funciona como auto-humillación cortesana; no se leyó como afirmación técnica de esclavitud.
  - Se mantuvo «alimento» en el texto principal para respetar la amplitud de אֹכֶל, con nota para la lectura probable «grano» en el contexto de la hambruna.
