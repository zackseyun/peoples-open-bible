translation:
  language: es
  text: El que se refugia en su sombra del calor, y habita en sus refugios.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo más de cerca el paralelo griego: «será resguardado por ella del calor abrasador, y se alojará en su gloria». El hebreo dice «en sus refugios», mientras que el griego tiene «en su gloria».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְחוֹסֶה
  english_pob_choice: He takes refuge
  chosen_spanish: El que se refugia
  alternatives_spanish:
  - y se refugia
  - el que busca refugio
  - queda protegido
  lexicon: HALOT; חסה
  rationale: El participio hebreo expresa una acción/proposición proverbial; en español, 'el que se refugia' conserva ese valor genérico sin forzar un presente narrativo. 'Busca refugio' es posible, pero debilita la idea de protección efectiva que el paralelo griego también refuerza.
- source_word: בְּצִלָּהּ
  english_pob_choice: in its shade
  chosen_spanish: en su sombra
  alternatives_spanish:
  - bajo su sombra
  - en su sombra
  lexicon: HALOT; צל
  rationale: '''Sombra'' es el equivalente natural en español para צל en este contexto de protección contra el calor. Se mantiene el posesivo femenino implícito en el hebreo con ''su'', sin convertirlo en una personificación más explícita de lo que exige el texto.'
- source_word: מֵחֹרֶב
  english_pob_choice: from the heat
  chosen_spanish: del calor
  alternatives_spanish:
  - del calor abrasador
  - del ardor
  - del bochorno
  lexicon: HALOT; חרב
  rationale: Aunque חרב puede abarcar sequedad o calor abrasador, el griego καύματος confirma la idea de calor/burning heat. 'Del calor' es breve y fiel; 'calor abrasador' sería más interpretativo.
- source_word: וּבִמְעוֹנוֹתֶיהָ
  english_pob_choice: in its shelters
  chosen_spanish: habita en sus refugios
  alternatives_spanish:
  - vive en sus moradas
  - se aloja en sus moradas
  - habita en sus moradas
  lexicon: HALOT; מעונות
  rationale: מעונות son lugares de morada/estancia; en este marco protector, 'refugios' transmite la función con naturalidad. 'Moradas' sería más literal, pero menos expresivo en español moderno. Mantengo la idea de permanencia con 'habita'.
- source_word: יִשְׁכֹּן
  english_pob_choice: he dwells
  chosen_spanish: habita
  alternatives_spanish:
  - mora
  - vive
  - se aloja
  lexicon: HALOT; שכן
  rationale: '''Habita'' conserva el tono sapiencial y la continuidad del verbo hebreo. ''Mora'' es más literario; ''se aloja'' seguiría más de cerca el matiz de posada del griego, pero no es necesario si el hebreo es la base primaria.'
theological_decisions:
- issue: Antecedente personificado con sufijos femeninos
  english_pob_reading: Render feminine Hebrew suffixes with 'its' rather than 'her' in English.
  chosen_spanish_reading: Mantener un posesivo neutro-contextual ('su') en español, sin convertirlo en 'suya' o 'ella' explícitos.
  alternative_spanish_readings:
  - en su sombra... y habita en sus refugios
  - en su sombra... y mora en sus moradas
  - bajo su sombra... y habita en sus refugios
  rationale: El hebreo usa sufijos femeninos ligados al antecedente personificado; en español, 'su' preserva la referencia sin imponer género pronominal innecesario. Así se respeta la tensión entre imagen arbórea/protectora y personificación sapiencial.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
- issue: Sujeto genérico singular
  english_pob_reading: Use 'he' for the singular generic subject.
  chosen_spanish_reading: Usar 'el que' para conservar el singular genérico en español.
  alternative_spanish_readings:
  - quien se refugia
  - el que se refugia
  - la persona que se refugia
  rationale: '''El que'' mantiene el valor proverbial singular del hebreo sin introducir pluralización ni neutralización excesiva. Es idiomático y suficientemente inclusivo en español bíblico moderno.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Paralelo hebreo/griego en la segunda cola
  english_pob_reading: Hebrew reads 'in its shelters,' while the Greek has 'in its glory.'
  chosen_spanish_reading: 'Seguir el hebreo en el texto principal: ''habita en sus refugios'', con nota del paralelo griego.'
  alternative_spanish_readings:
  - y habita en su gloria
  - y se aloja en su gloria
  - y mora en sus refugios
  rationale: El testimonio hebreo es primario y es claro aquí. El griego ofrece una variante importante ('gloria') que no debe borrarse, por lo que se documenta en nota en vez de incorporarla al cuerpo del texto.
  doctrine_reference: Sirach 14:27 parallel sources / textual variant
translation_notes:
  revision_awareness: El borrador sigue la lectura hebrea principal de Kahana/Sefaria, pero registra la variante griega de Sirácida 14:27, como hace la POB en inglés. La primera cola refleja la protección contra el calor; la segunda conserva 'refugios' del hebreo y documenta la alternativa 'gloria' del griego. Se ha evitado una calca rígida, pero también se ha evitado diluir la tensión textual entre ambas tradiciones.
  spanish_consistency_notes:
  - Se mantiene 'sombra' para צל y 'calor' para חרב, en línea con el campo semántico de protección térmica.
  - '''Habita'' conserva el tono sapiencial y la continuidad verbal, evitando un giro demasiado narrativo.'
  - El posesivo 'su' resuelve de manera natural la referencia femenina del antecedente sin forzar 'her/ella' en español.
  - Se usa 'refugios' para מעונות por su función protectora en este contexto; no se reemplaza por 'moradas' en el texto principal, aunque sigue siendo una alternativa válida.
