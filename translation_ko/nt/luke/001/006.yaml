id: LUK.1.6
reference: Luke 1:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἦσαν δὲ δίκαιοι ἀμφότεροι ⸀ἐναντίον τοῦ θεοῦ, πορευόμενοι ἐν πάσαις ταῖς ἐντολαῖς καὶ δικαιώμασιν τοῦ κυρίου ἄμεμπτοι.
base_translation:
  language: en
  yaml_path: translation/nt/luke/001/006.yaml
  text: And both of them were righteous before God[b][a], walking blamelessly in all the commandments and ordinances of the Lord.
  footnotes:
  - marker: a
    text: Or "in the sight of God."
    reason: lexical_alternative
  - marker: b
    text: Or "walking blameless in all the commandments and ordinances of the Lord."
    reason: lexical_alternative
translation:
  language: ko
  text: 이 두 사람은 야훼[a] 앞에서 의로웠으며, 주의 모든 계명과 규례를 따라 흠 없이 살았습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 본문의 헬라어 θεοῦ는 구약의 야훼(יהוה)를 가리키는 누가복음 1장의 칠십인역적 어조와 맞물려 있다. DOCTRINE.md의 신명 표기 원칙에 따라 「야훼」로 옮긴다.
    reason: alternative_reading
lexical_decisions:
- source_word: τοῦ κυρίου
  english_pob_choice: of the Lord
  chosen_korean: 주의
  alternatives_korean:
  - 야훼의
  lexicon: BDAG
  rationale: 같은 절 안에서 「θεοῦ」를 「야훼」로 옮겼으므로, 뒤따르는 κυρίου는 동일 지시 대상의 또 다른 호칭임을 드러내기 위해 「주」를 유지한다. 누가 1-2장 LXX 풍 본문에서 두 명칭이 한 절 안에서 함께 나타날 때의 일반 처리.
theological_decisions:
- issue: 누가복음 1-2장의 OT 색채 본문에서 κύριος/θεός를 어떻게 옮길 것인가
  chosen_reading: 문맥이 명백히 OT의 야훼를 가리킬 때 「야훼」로 옮기고 각주로 표시한다
  alternative_readings:
  - 전부 「주」로 옮긴다
  - 「주 하나님」으로 옮긴다
  rationale: 누가의 출생 내러티브는 LXX의 칠십인역 양식을 직접 차용하며, 1:9, 1:11, 1:15-17, 1:25, 1:28, 1:32, 1:38, 1:45-46, 1:58, 1:66, 1:68, 1:76 등에서 κύριος는 명백히 יהוה를 가리킨다. 한국 전통의 「주(主)」 마스킹은 본문의 OT적 무게를 가린다. DOCTRINE.md의 신명 정책에 따라 야훼로 명시한다.
  doctrine_reference: 'DOCTRINE.md: Divine name policy — YHWH'
