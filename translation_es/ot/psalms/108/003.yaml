translation:
  language: es
  text: ¡Despierta[a], arpa y lira; yo despertaré el alba!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «despertaré el amanecer» o «haré despertar la mañana». El hebreo presenta una imagen poética vívida: levantarse antes del amanecer para alabar a Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עוּרָה
  english_pob_choice: Awake
  chosen_spanish: ¡Despierten!
  alternatives_spanish:
  - ¡Despierta!
  - ¡Despiértense!
  - ¡Despiértense, instrumentos!
  lexicon: HALOT
  rationale: El hebreo usa un imperativo singular dirigido poéticamente a instrumentos coordinados; en español, el plural imperativo expresado con vocativo implícito suena natural y conserva el tono exhortativo. Se evita una forma reflexiva porque no añade nada al hebreo.
- source_word: הַנֵּבֶל
  english_pob_choice: harp
  chosen_spanish: arpa
  alternatives_spanish:
  - lira
  - salterio
  lexicon: HALOT
  rationale: נֵבֶל designa un instrumento de cuerdas; 'arpa' es el equivalente moderno más transparente para el lector español. 'Salterio' sería más tradicional pero menos claro.
- source_word: וְכִנּוֹר
  english_pob_choice: lyre
  chosen_spanish: lira
  alternatives_spanish:
  - arpa
  lexicon: HALOT
  rationale: כִּנּוֹר suele corresponder a 'lyre'; en español, 'lira' preserva mejor la distinción entre ambos instrumentos que repetir 'arpa'.
- source_word: אָעִירָה
  english_pob_choice: I will awaken
  chosen_spanish: yo despertaré
  alternatives_spanish:
  - despertaré
  - yo rousaré
  lexicon: HALOT
  rationale: La forma cohortativa/imperfectiva expresa intención deliberada. 'Yo despertaré' conserva el compromiso del hablante y la repetición del campo léxico de עור en la línea.
- source_word: שָּׁחַר
  english_pob_choice: the dawn
  chosen_spanish: el alba
  alternatives_spanish:
  - la aurora
  - el amanecer
  lexicon: HALOT
  rationale: שַׁחַר refiere al alba/daybreak. 'El alba' es idiomático en español y conserva la imagen poética de despertar antes de que amanezca.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético y la solución inglesa auditada: mantiene el paralelismo entre los dos imperativos y la imagen poética de ‘despertar’ el alba, sin suavizarla ni convertirla en una paráfrasis.'
  spanish_consistency_notes:
  - Se usó 'arpa' y 'lira' para conservar la distinción de dos instrumentos distintos.
  - Se mantuvo 'despertar' como traducción común del mismo radical hebreo en ambos miembros.
  - '''Alba'' se eligió por naturalidad poética en español y por equivalencia funcional con ''dawn''.'
