    issue: «Aparten de mi pueblo sus expulsiones» es poco natural y confuso en español.
    rationale: Aunque intenta conservar la relación sintáctica del hebreo, en español suena invertido y dificulta entender que las «expulsiones» son acciones ejercidas contra el pueblo. Conviene reordenar la frase.
  - severity: low
    issue: «practiquen la justicia y la rectitud» interpreta más de lo necesario.
    rationale: עֲשׂוּ es simplemente «hagan». «Practiquen» no es incorrecto, pero añade un matiz de habitualidad no explícito en el original.
  - severity: low
    issue: Repetición de «Aparten» en dos imperativos sucesivos.
    rationale: No es error semántico, pero en español estilísticamente mejora variar el segundo verbo para reflejar mejor הָרִימוּ y evitar pesadez.
