    reason: lexical_alternative
  - marker: b
    text: O «les advertí» o «protesté». El verbo hebreo puede expresar una advertencia solemne o testimonio contra una mala acción.
    reason: lexical_alternative
  - marker: c
    text: O «víveres» o «caza». La palabra hebrea puede referirse más específicamente a alimento de caza, pero aquí probablemente significa provisiones que se vendían.
    reason: lexical_alternative
  revision_rationale: 'Se corrigen tres puntos principales: (1) הָעֲרֵמוֹת se vierte como ''montones'' en vez de ''gavillas'', con nota que preserva la alternativa y la aclaración contextual del inglés POB; (2) וָאָעִיד se expresa como ''testifiqué contra ellos'', que sí comunica la fuerza judicial/profética documentada; (3) se ajusta la redacción para mayor naturalidad y coherencia referencial, manteniendo la repetición del sábado y la decisión auditada ''provisiones'' para צָיִד.'
