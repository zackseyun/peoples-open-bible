base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/017/001.yaml
  text: And Jehoshaphat his son became king in his place[b][a], and he strengthened himself over Israel.
  footnotes:
  - marker: a
    text: Or 'established himself against Israel.' The Hebrew verb is reflexive and can carry the sense of strengthening or consolidating oneself.
    reason: lexical_alternative
  - marker: b
    text: Here 'Israel' refers to the northern kingdom, in contrast to Judah.
    reason: cultural_note
