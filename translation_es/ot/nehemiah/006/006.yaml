translation:
  language: es
  text: 'Estaba escrito en ella[a]: «Se informa entre las naciones —y Gashmu también lo dice— que tú y los judíos piensan rebelarse. Por eso estás reconstruyendo el muro, y según estas palabras llegarás a ser su rey».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: Gashmu. Muchas versiones en inglés lo vierten como Geshem.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּתוּב בָּהּ
  english_pob_choice: It was written in it
  chosen_spanish: Estaba escrito en ella
  alternatives_spanish:
  - Está escrito en ella
  - Escrito estaba en ella
  lexicon: HALOT
  rationale: La construcción pasiva participial introduce el contenido de una carta o informe recibido; en español narrativo, el imperfecto/pasado compuesto evita sonar proverbial y conserva el marco epistolar.
- source_word: בַּגּוֹיִם נִשְׁמָע
  english_pob_choice: It is reported among the nations
  chosen_spanish: Se ha informado entre las naciones
  alternatives_spanish:
  - Se oye entre las naciones
  - Circula un informe entre las naciones
  lexicon: HALOT
  rationale: נִשְׁמָע expresa algo que se oye o se reporta. 'Se ha informado' mantiene el valor pasivo y comunica con naturalidad la idea de rumor circulante.
- source_word: וְגַשְׁמוּ אֹמֵר
  english_pob_choice: and Geshem also says it
  chosen_spanish: y Gashmu también lo dice
  alternatives_spanish:
  - y Geshem también lo dice
  - y Gashmu dice esto
  lexicon: HALOT
  rationale: Se conserva la forma hebrea Gashmu en el texto principal por cercanía al consonántico, siguiendo la nota inglesa sobre la variante más familiar 'Geshem'. 'También' refleja la partícula coordinante וְ.
- source_word: חֹשְׁבִים לִמְרוֹד
  english_pob_choice: are planning to rebel
  chosen_spanish: están pensando rebelarse
  alternatives_spanish:
  - están planeando rebelarse
  - pretenden rebelarse
  - están tramando rebelión
  lexicon: HALOT
  rationale: חשׁב + infinitivo expresa intención o plan. 'Están pensando rebelarse' conserva el matiz de propósito sin intensificarlo indebidamente a una acusación de complot.
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por consiguiente
  - De modo que
  lexicon: HALOT
  rationale: Marca la supuesta inferencia del rumor hacia la obra de reconstrucción. 'Por eso' es natural y fiel al valor consecutivo.
- source_word: בוֹנֶה הַחוֹמָה
  english_pob_choice: you are rebuilding the wall
  chosen_spanish: estás reconstruyendo el muro
  alternatives_spanish:
  - estás edificando el muro
  - estás levantando el muro
  lexicon: HALOT
  rationale: En el contexto de Nehemías, la obra es de restauración; 'reconstruyendo' refleja mejor ese sentido que un simple 'edificando'. 'Muro' es la opción más natural en español para חוֹמָה.
- source_word: וְאַתָּה הֹוֶה לָהֶם לְמֶלֶךְ
  english_pob_choice: you are to become their king
  chosen_spanish: vas a ser su rey
  alternatives_spanish:
  - llegarás a ser su rey
  - serás su rey
  - vas a convertirte en su rey
  lexicon: HALOT
  rationale: הֹוֶה + ל con sustantivo comunica convertirse en/ser. 'Vas a ser' preserva el valor prospectivo o proyectado de la acusación sin añadir una interpretación más fuerte que el texto.
- source_word: כַּדְּבָרִים הָאֵלֶּה
  english_pob_choice: according to these words
  chosen_spanish: según estas palabras
  alternatives_spanish:
  - conforme a estas palabras
  - según estos dichos
  - de acuerdo con estas cosas
  lexicon: HALOT
  rationale: דְבָרִים aquí remite a las afirmaciones citadas. 'Palabras' mantiene la literalidad adecuada al contexto epistolar; 'según' expresa la relación inferencial del pasaje.
theological_decisions:
- issue: El título real atribuido a Nehemías en una denuncia hostil
  english_pob_reading: you are to become their king
  chosen_spanish_reading: vas a ser su rey
  alternative_spanish_readings:
  - serás su rey
  - llegarás a ser su rey
  rationale: No hay necesidad de suavizar ni explicar teológicamente la acusación; el texto presenta una denuncia política hostil. Se conserva la formulación prospectiva para reflejar que es un cargo imputado, no una afirmación del narrador.
  doctrine_reference: Narrative framing and speech report; no doctrinal assertion.
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado del POB en inglés, especialmente la revisión que prefirió 'is reported' frente a 'is being reported' y 'according to these words' frente a 'according to these reports'. En español, se conservó ese ajuste hacia un registro más natural, mientras se mantuvo la literalidad de 'palabras' para reflejar כדברים האלה.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se mantuvo 'Gashmu' en el texto principal y se anotó la variante 'Geshem' por coherencia con la nota auditada en inglés.
  - '''Muro'' funciona mejor en español que una transliteración o un calco de ''wall'' en este contexto narrativo.'
