translation:
  language: es
  text: y la tierra responderá el grano, el vino nuevo y el aceite, y éstos responderán a Jezreel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Jezreel suena como “Dios siembra” y funciona simbólicamente en Oseas, además de ser un lugar y un nombre propio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָאָרֶץ
  english_pob_choice: and the earth
  chosen_spanish: y la tierra
  alternatives_spanish:
  - y la tierra
  - y el país
  lexicon: HALOT
  rationale: אֶרֶץ puede significar 'tierra' o 'país'. Aquí la cadena poética culmina en la respuesta de la tierra y sus productos, por lo que 'la tierra' preserva bien la imagen amplia de la creación. 'País' sería posible en algunos contextos, pero aquí debilitaría la resonancia cósmica del pasaje.
- source_word: תַּעֲנֶה / יַעֲנוּ
  english_pob_choice: will answer
  chosen_spanish: responderá / responderán
  alternatives_spanish:
  - contestará / contestarán
  - dará respuesta / darán respuesta
  lexicon: HALOT
  rationale: ענה transmite la idea de responder a una llamada o a otra voz en la cadena literaria. 'Responder' conserva la repetición verbal del hebreo y evita convertir el verso en una simple afirmación causal.
- source_word: הַדָּגָן
  english_pob_choice: the grain
  chosen_spanish: el grano
  alternatives_spanish:
  - el cereal
  - el trigo
  lexicon: HALOT
  rationale: דָּגָן designa el grano o cereal en general. 'Grano' es natural en español y mantiene la amplitud del término sin especificarlo indebidamente.
- source_word: הַתִּירוֹשׁ
  english_pob_choice: the new wine
  chosen_spanish: el vino nuevo
  alternatives_spanish:
  - el mosto
  - el vino fresco
  lexicon: HALOT
  rationale: תִּירוֹשׁ se refiere al vino nuevo o joven, asociado con la cosecha. 'Vino nuevo' es claro en español y conserva el matiz agrícola del término.
- source_word: הַיִּצְהָר
  english_pob_choice: the oil
  chosen_spanish: el aceite
  alternatives_spanish:
  - el aceite de oliva
  - el aceite fresco
  lexicon: HALOT
  rationale: יִצְהָר designa aceite producido como fruto agrícola, normalmente de oliva. 'Aceite' sigue de cerca la revisión inglesa más reciente y evita añadir especificación que el hebreo no exige.
- source_word: וְהֵם
  english_pob_choice: and they
  chosen_spanish: y ellos
  alternatives_spanish:
  - y éstas
  - y éstos
  lexicon: HALOT
  rationale: El pronombre retoma colectivamente los tres productos mencionados. 'Ellos' mantiene la personificación y la estructura paralela del verso.
- source_word: יִזְרְעֶאל
  english_pob_choice: Jezreel
  chosen_spanish: Jezreel
  alternatives_spanish:
  - Yizreel
  lexicon: HALOT
  rationale: Como nombre propio, debe transliterarse. 'Jezreel' es la forma reconocible en español y preserva el juego de palabras sin reemplazar el nombre por una glosa.
theological_decisions:
- issue: Mantener la personificación de la respuesta en vez de convertirla en una frase meramente agrícola
  english_pob_reading: Preserve the repeated 'answer' language throughout the verse
  chosen_spanish_reading: Conservar la repetición de 'responder' en todo el verso
  alternative_spanish_readings:
  - la tierra producirá el grano, el vino nuevo y el aceite, y ellos proveerán para Jezreel
  - la tierra dará el grano, el vino nuevo y el aceite, y ellos darán a Jezreel
  rationale: El contexto de Oseas construye una cadena de respuesta entre cielo, tierra y cosecha. 'Responder' en español conserva la interrelación poética y teológica mejor que una paráfrasis de provisión.
  doctrine_reference: 'Translation philosophy #3 y #5'
- issue: Cómo tratar el nombre Jezreel y su carga simbólica
  english_pob_reading: Keep 'Jezreel' in the main text as a transliterated name
  chosen_spanish_reading: Mantener 'Jezreel' en el texto principal y explicar su sentido en nota
  alternative_spanish_readings:
  - Dios siembra
  - el que Dios siembra
  - semilla de Dios
  rationale: El hebreo usa el nombre propio con valor simbólico, pero no debe sustituirse en el texto por una glosa. La transliteración respeta el nombre y la nota preserva el juego semántico.
  doctrine_reference: 'Translation philosophy #2'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que ajustó יִצְהָר de 'fresh oil' a 'oil' por mayor precisión léxica. Por eso el español usa 'aceite' y evita añadir 'fresco' o 'de oliva' en el texto principal.
  spanish_consistency_notes:
  - Se usó 'tierra' para אֶרֶץ, coherente con el marco poético de la respuesta de la creación.
  - Se mantuvo la repetición de 'responder' para תַּעֲנֶה / יַעֲנוּ.
  - Se eligió 'grano', 'vino nuevo' y 'aceite' para reflejar la tríada agrícola sin sobreespecificar.
  - Se transliteró el nombre propio 'Jezreel' y se añadió una nota explicativa con anclaje en el texto.
