- from: Y les dijo a Judá que buscaran a Yahvé[a], el Dios de sus padres[b], y que observaran la ley y el mandamiento.
  to: Y dijo a Judá que buscaran a Yahvé[a], el Dios de sus padres[b], y que observaran la ley y el mandamiento.
  rationale: Se corrige la frase inicial para eliminar la discordancia de «les dijo a Judá» sin expandir innecesariamente el sujeto colectivo. También se ajusta la nota a para que presente una alternativa léxica real al verbo principal, conforme al rastro de auditoría inglés y al valor semántico de דרש.
