review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido general del hebreo: fe/credibilidad ante Dios, proclamación de ayuno, vestirse de cilicio y el merismo totalizador final. También conserva adecuadamente la nota sobre אמן + ב. Sin embargo, ''desde el mayor hasta el menor'' pierde el matiz posesivo/distributivo de מִגְּדוֹלָם וְעַד קְטַנָּם (''de entre ellos / de los suyos''), y ''los habitantes de Nínive'' es aceptable pero algo más sociológico que el inglés auditado ''the people of Nineveh'' y el hebreo colectivo.'
  spanish_quality_summary: 'El español es claro y eclesialmente legible. ''Creyeron a Dios'' y ''se vistieron de cilicio'' suenan naturales en registro bíblico moderno. La mejora necesaria es menor: ajustar el tramo final para expresar mejor la totalidad interna del grupo. También conviene preferir ''la gente de Nínive'' por cercanía al audit trail inglés y fluidez natural, evitando un tono administrativo de ''habitantes''.'
  glossary_alignment: 'No hay conflicto con la terminología troncal del proyecto: ''Dios'' para אֱלֹהִים está bien; no aparece Yahvé ni Mesías. ''Cilicio'' es una elección válida y tradicional para שַׂקִּים en este contexto. La nota léxica sobre ''creyeron a Dios / creyeron en Dios'' está bien alineada con la racionalidad documentada.'
  issues:
  - severity: medium
    issue: El merismo final omite el matiz posesivo/distributivo
    rationale: מִגְּדוֹלָם וְעַד קְטַנָּם incluye sufijos pronominales ('sus grandes... sus pequeños'). 'Desde el mayor hasta el menor' comunica totalidad, pero no tan claramente 'desde los más importantes de entre ellos hasta los menos importantes de entre ellos'. 'Desde sus más grandes hasta sus más pequeños' sería demasiado literal; una solución natural es 'desde el más importante de ellos hasta el menos importante'.
  - severity: low
    issue: '''Los habitantes de Nínive'' suena más administrativo que narrativo'
    rationale: Aunque transmite el sentido colectivo, se aleja un poco del tono del inglés auditado 'the people of Nineveh' y del hebreo corporativo. 'La gente de Nínive' suena más natural y narrativo en español bíblico contemporáneo.
  revised_spanish_text: Y la gente de Nínive creyó a Dios[a], y proclamó un ayuno y se vistió de cilicio, desde el más importante de ellos hasta el menos importante.
  revised_footnotes:
  - marker: a
    text: O «creyó en Dios». La construcción hebrea puede expresar tanto creer a Dios como confiar en él.
    reason: lexical_alternative
  revision_rationale: Se ajusta el sujeto a una expresión colectiva más natural ('la gente de Nínive') y se mejora el merismo final para reflejar mejor los sufijos pronominales del hebreo. También se armoniza la concordancia verbal con el sujeto singular colectivo en español. La nota léxica se mantiene con leve ajuste de concordancia.
