  timestamp: '2026-05-07T21:28:42Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la sintaxis y el sentido general del hebreo: condición contrastiva, permanencia de la lesión en su sitio, ausencia de propagación y dictamen ritual del sacerdote. También preserva correctamente el valor declarativo de וְטִהֲרוֹ. Sin embargo, הַשְּׁחִין corresponde mejor a «forúnculo» o «úlcera/hervido» que a «hinchazón», y «hinchazón» debilita la conexión léxica con el caso previo y con el inglés auditado «boil».'
  spanish_quality_summary: 'El español es claro y natural. «Pero si…» y «permanece en su lugar» funcionan bien, y la nota [a] está bien formulada. La principal debilidad es léxica: «la cicatriz de la hinchazón» suena menos precisa y menos idiomática en este contexto legal-diagnóstico que «la cicatriz del forúnculo».'
  glossary_alignment: No hay conflictos con los términos teológicos troncales del proyecto. Se mantiene adecuadamente «sacerdote» y la distinción ritual en «lo declarará limpio». La revisión propuesta solo ajusta הַשְּׁחִין a un equivalente español más fiel al campo semántico de «boil».
  issues:
  - severity: medium
    issue: «la hinchazón» para הַשְּׁחִין
    rationale: El hebreo שְׁחִין en Levítico 13 se refiere a un «boil», una lesión cutánea inflamatoria específica, no a una mera hinchazón genérica. «Hinchazón» reduce precisión diagnóstica y rompe la continuidad con la auditoría inglesa.
  - severity: low
    issue: Coherencia terminológica interna del pasaje
    rationale: En una sección de inspección sacerdotal de afecciones cutáneas, usar un término más concreto como «forúnculo» ayuda a distinguir entre la marca visible (בַּהֶרֶת) y la lesión original (שְׁחִין).
  revised_spanish_text: Pero si la mancha permanece en su lugar y no se ha extendido[a], es la cicatriz del forúnculo, y el sacerdote lo declarará limpio.
  revised_footnotes:
  - marker: a
    text: O «debajo de ella»; el hebreo idiomático significa que la mancha permanece donde está, en vez de extenderse.
    reason: lexical_alternative
  revision_rationale: Se conserva la redacción general del borrador porque refleja bien el hebreo y la decisión inglesa sobre el modismo «en su lugar». Solo se corrige הַשְּׁחִין de «hinchazón» a «forúnculo» para mantener la precisión léxica del contexto de Levítico 13 y la alineación con el audit trail inglés («boil»), sin introducir paráfrasis innecesaria.
