translation:
  language: es
  text: Y será[a], si de veras me escuchan, declara Yahvé, no trayendo carga[b] por las puertas de esta ciudad en sábado, sino santificando el sábado, sin hacer en él ningún trabajo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si de veras me obedecen». El hebreo repite «escuchar» para dar énfasis y puede llevar el sentido de oír con obediencia.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «un peso» o «una carga pesada». El hebreo también puede significar «un fardo» o «una carga»; aquí se refiere a algo transportado por las puertas de la ciudad en sábado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it shall be
  chosen_spanish: Y será
  alternatives_spanish:
  - Y acontecerá
  - Y sucederá
  lexicon: HALOT
  rationale: La fórmula introduce una consecuencia condicional en estilo profético. "Y será" conserva el arranque hebreo sin sonar excesivamente arcaico en español.
- source_word: אִם שָׁמֹעַ תִּשְׁמְעוּן
  english_pob_choice: if you truly listen
  chosen_spanish: si de veras me escuchan
  alternatives_spanish:
  - si escuchan con diligencia
  - si en verdad me obedecen
  lexicon: HALOT
  rationale: La construcción intensiva hebrea refuerza la escucha con obediencia implícita. "De veras" preserva la intensificación sin fijar de entrada una paráfrasis de "obedecer" en el cuerpo principal.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  - a mí, obedeciéndome
  lexicon: HALOT
  rationale: En español, con "escuchar" el complemento directo indirecto se integra naturalmente como "me escuchan"; la relación personal del mandato queda clara sin añadir verbo no presente en el hebreo.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética y el nombre divino según la norma del proyecto. "Declara" mantiene el peso formal de la introducción oracular.
- source_word: לְבִלְתִּי הָבִיא מַשָּׂא
  english_pob_choice: not bringing a load
  chosen_spanish: no traer carga
  alternatives_spanish:
  - no introducir carga
  - no llevar carga
  lexicon: HALOT
  rationale: El hebreo expresa la prohibición concreta de introducir/transportar carga. "Carga" es el equivalente natural de מַשָּׂא en este contexto sabático y evita la posible ambigüedad metafórica de "peso" o "burden".
- source_word: בְּשַׁעֲרֵי הָעִיר הַזֹּאת
  english_pob_choice: through the gates of this city
  chosen_spanish: por las puertas de esta ciudad
  alternatives_spanish:
  - a través de las puertas de esta ciudad
  - por las puertas de la ciudad
  lexicon: HALOT
  rationale: '"Puertas" comunica el acceso urbano que en español bíblico suele expresarse de manera natural con la preposición "por"; el sentido de entrada mediante las puertas queda preservado sin forzar un calco.'
- source_word: בְּיוֹם הַשַּׁבָּת
  english_pob_choice: on the Sabbath day
  chosen_spanish: en el día de reposo
  alternatives_spanish:
  - en el sábado
  - en el día del sábado
  lexicon: HALOT
  rationale: '"Día de reposo" expresa el valor semántico de שׁבת con claridad para lectores cristianos y judíos de español. Se evita uniformar automáticamente como "sábado" porque el énfasis del texto está en el día sabático como institución.'
- source_word: וּלְקַדֵּשׁ אֶת יוֹם הַשַּׁבָּת
  english_pob_choice: but keeping the Sabbath day holy
  chosen_spanish: sino santificar el día de reposo
  alternatives_spanish:
  - sino consagrar el día de reposo
  - sino guardar santo el día de reposo
  lexicon: HALOT
  rationale: קדשׁ aquí significa tratar el día como santo. "Santificar" conserva la relación verbal con el hebreo; el contraste con la cláusula anterior se expresa con "sino" como en la revisión inglesa.
- source_word: לְבִלְתִּי עֲשׂוֹת בּוֹ כָּל מְלָאכָה
  english_pob_choice: not doing any work on it
  chosen_spanish: no haciendo en él ninguna obra
  alternatives_spanish:
  - no haciendo en él ningún trabajo
  - sin hacer en él ninguna labor
  lexicon: HALOT
  rationale: מְלָאכָה abarca trabajo/ocupación, pero en el marco sabático conviene "obra" para reflejar el término con amplitud sin perder inteligibilidad. "En él" preserva el referente pronominal del día de reposo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. La línea editorial del proyecto exige su transliteración como "Yahvé" en el texto principal, preservando el nombre del pacto en lugar de ocultarlo bajo un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de שׁמע en contexto pactual
  english_pob_reading: if you truly listen
  chosen_spanish_reading: si de veras me escuchan
  alternative_spanish_readings:
  - si me obedecen de veras
  - si escuchan con diligencia
  rationale: El hebreo intensivo incluye escucha y obediencia. El español principal mantiene "escuchar" para no borrar el verbo fuente, mientras que "de veras" conserva la fuerza enfática; la obediencia queda inferida por el conjunto de las cláusulas siguientes.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 y #3'
- issue: מַשָּׂא en el contexto de la puerta de la ciudad
  english_pob_reading: a load
  chosen_spanish_reading: carga
  alternative_spanish_readings:
  - peso
  - bulto
  rationale: En este mandato sabático se refiere a algo transportado o introducido por las puertas de la ciudad. "Carga" es la opción más natural y mantiene la referencia concreta sin introducir una connotación meramente figurada.
  doctrine_reference: HALOT, מַשָּׂא
- issue: Traducción de שׁבת
  english_pob_reading: Sabbath day
  chosen_spanish_reading: día de reposo
  alternative_spanish_readings:
  - día de sábado
  - sábado
  rationale: '"Día de reposo" comunica la institución sabática de forma clara y neutral en español. Evita reducir el término a un simple día semanal y preserva el matiz de descanso consagrado del contexto.'
  doctrine_reference: Uso contextual de שַׁבָּת en la ley profética
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente, que ajustó la secuencia de infinitivos para sonar más directa: ''not bringing ... but keeping ... not doing ...''. La versión española sigue ese mismo movimiento sintáctico con ''no traer ... sino santificar ... no haciendo ...'', manteniendo la progresión y el contraste del hebreo.'
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" en lugar de una sustitución por "Señor" para ser coherente con el estándar del proyecto.
  - Se tradujo שׁבת como "día de reposo" de manera consistente con el valor semántico del mandamiento sabático.
  - Se usó una única cadena verbal negativa para reproducir el encadenamiento de infinitivos del hebreo sin añadir conectores inexistentes.
  - El verbo "escuchar" se conservó para no borrar el campo léxico de שׁמע, aunque el contexto implica obediencia.
