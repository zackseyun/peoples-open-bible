  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Sacerdote», «grasa» y «altar» están bien. La nota léxica sobre פִּדְרוֹ se preserva adecuadamente. La excepción principal es de estilo/lexicografía española, no de glosario teológico.
