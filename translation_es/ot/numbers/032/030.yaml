- from: Pero si no cruzan armados[a] con ustedes, entonces recibirán una posesión entre ustedes en la tierra de Canaán.
  to: Pero si no cruzan armados con ustedes, entonces recibirán una heredad[a] entre ustedes en la tierra de Canaán.
  rationale: Se mejora la naturalidad del español con «heredad» en vez de «posesión» y se reubica la nota al verbo/resultado territorial correcto, preservando la alternativa léxica documentada para וְנֹאחֲזוּ en la auditoría inglesa.
