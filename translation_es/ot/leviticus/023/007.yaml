translation:
  language: es
  text: El primer día habrá para ustedes una convocación santa[a]; no harán ningún trabajo ordinario[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «una asamblea sagrada» o «una asamblea santa».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «trabajo de labor/servicio»; es decir, labor ordinaria. Tradicionalmente: «trabajo servil».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הָרִאשׁוֹן
  english_pob_choice: On the first day
  chosen_spanish: El primer día
  alternatives_spanish:
  - En el primer día
  - El día primero
  lexicon: HALOT
  rationale: La expresión hebrea introduce un marco temporal. En español, «El primer día» conserva el sentido natural e idiomático sin añadir información ajena.
- source_word: מִקְרָא קֹדֶשׁ
  english_pob_choice: a holy convocation
  chosen_spanish: una asamblea santa
  alternatives_spanish:
  - una convocatoria santa
  - una asamblea sagrada
  lexicon: HALOT
  rationale: «מִקְרָא» en contexto cultual apunta a una reunión convocada; en español, «asamblea» comunica bien esa idea. «Santa» reproduce קֹדֶשׁ con el matiz de consagración/reverencia.
- source_word: יִהְיֶה לָכֶם
  english_pob_choice: there shall be ... for you
  chosen_spanish: habrá para ustedes
  alternatives_spanish:
  - será para ustedes
  - les corresponderá
  lexicon: HALOT
  rationale: La construcción hebrea expresa lo que ese día será para el pueblo. «Habrá para ustedes» mantiene la estructura impersonal y el valor declarativo sin volverse rígido.
- source_word: כָּל ... לֹא תַעֲשׂוּ
  english_pob_choice: you shall do no
  chosen_spanish: no harán ningún
  alternatives_spanish:
  - no harán ninguna
  - no deben hacer
  lexicon: HALOT
  rationale: La negación totalizante de כָּל con לֹא se vierte de forma natural como «ningún» en español, conservando el alcance prohibitivo.
- source_word: מְלֶאכֶת עֲבֹדָה
  english_pob_choice: laborious work
  chosen_spanish: trabajo laborioso
  alternatives_spanish:
  - trabajo ordinario
  - trabajo servil
  lexicon: HALOT
  rationale: La combinación designa trabajo de tipo ordinario/laboral. «Trabajo laborioso» conserva el registro serio y la fuerza lexical sin depender de la fórmula tradicional «servil», que en español puede sonar opaca.
theological_decisions:
- issue: Alcance de la prohibición en מְלֶאכֶת עֲבֹדָה
  english_pob_reading: The text prohibits ordinary labor associated with work/service, not every conceivable action.
  chosen_spanish_reading: El texto prohíbe el trabajo laborioso u ordinario asociado con labores comunes, no toda actividad posible.
  alternative_spanish_readings:
  - Prohíbe todo trabajo sin excepción
  - Prohíbe toda clase de actividad
  rationale: La frase hebrea es más específica que una prohibición absoluta de cualquier acción. La traducción debe preservar esa restricción lexical sin ampliarla indebidamente.
  doctrine_reference: Levítico 23:7; ver también el uso festivo de מְלֶאכֶת עֲבֹדָה en textos paralelos de legislación cultual.
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo directamente y conserva la distinción léxica de מְלֶאכֶת עֲבֹדָה; además, se corrigió la anclaje de notas para que cada marcador aparezca exactamente en el texto español.
  spanish_consistency_notes:
  - Se usa «asamblea» para מִקְרָא en lugar de una paráfrasis más libre, manteniendo el registro cultual.
  - Se evita «SEÑOR» porque en este versículo no aparece el Tetragrámaton ni una cita de κύριος.
  - Se conserva la prohibición con «no harán ningún» para reflejar el valor totalizante de כָּל + לֹא.
  - Los marcadores de nota [a] y [b] aparecen ambos en el lugar correspondiente del texto, sin reutilización.
