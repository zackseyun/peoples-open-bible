translation:
  language: es
  text: Entonces los árboles del bosque cantarán de alegría[a] delante de Yahvé, porque viene[b] a juzgar la tierra[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'gritarán de alegría'. El verbo hebreo puede denotar un clamor jubiloso, ya sea cantado o exclamado.
    reason: lexical_alternative
  - marker: b
    text: O 'está por venir a juzgar la tierra'. La forma verbal hebrea puede expresar una acción venidera con certeza vívida en contexto poético.
    reason: lexical_alternative
  - marker: c
    text: O 'la tierra', en sentido más local. Aquí el contexto amplio favorece 'la tierra' en sentido universal.
    reason: alternative_reading
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Marca consecuencia temporal de forma natural en español y conserva el tono poético del hebreo sin añadir interpretación.
- source_word: יְרַנְּנ֖וּ
  english_pob_choice: will sing for joy
  chosen_spanish: cantarán de gozo
  alternatives_spanish:
  - estallarán en júbilo
  - gritarán de gozo
  lexicon: HALOT
  rationale: El verbo hebreo expresa un júbilo sonoro, ya sea cantado o clamado. 'Cantarán de gozo' mantiene el valor celebrativo y poético, y evita reducirlo a un mero 'alegrarse'.
- source_word: עֲצֵי הַיָּעַר
  english_pob_choice: the trees of the forest
  chosen_spanish: los árboles del bosque
  alternatives_spanish:
  - los árboles del monte
  - los árboles del monte
  lexicon: HALOT
  rationale: La construcción posesiva se expresa con naturalidad en español como 'los árboles del bosque', conservando la personificación poética del original.
- source_word: מִלִּפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: En español, 'delante de' comunica bien la idea de estar en la presencia de Yahvé sin sonar mecánico. Mantiene el matiz espacial y relacional del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue la convención del proyecto para el Tetragrámaton, usando la forma española 'Yahvé' como transliteración reverente y transparente del nombre divino.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del canto cósmico; 'porque' expresa con claridad la relación causal en español bíblico moderno.
- source_word: בָא
  english_pob_choice: he comes
  chosen_spanish: viene
  alternatives_spanish:
  - está viniendo
  - ha venido
  lexicon: HALOT
  rationale: El qatal profético puede expresar una acción segura e inminente. 'Viene' conserva la vividez del presente profético sin forzar un pasado o un futuro perifrástico.
- source_word: לִשְׁפּוֹט
  english_pob_choice: to judge
  chosen_spanish: a juzgar
  alternatives_spanish:
  - para juzgar
  - a sentenciar
  lexicon: HALOT
  rationale: En español, la construcción 'venir a + infinitivo' reproduce bien la finalidad/propósito del hebreo. 'Juzgar' preserva la carga judicial del término.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el mundo
  - la tierra habitada
  lexicon: HALOT
  rationale: Aunque 'earth' en inglés POB se toma en sentido cósmico, en español 'la tierra' mantiene esa amplitud y suena más idiomático que 'la tierra' con artículo puede abarcar el ámbito total del juicio.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa el nombre propio divino, no un título sustitutivo. La forma española 'Yahvé' preserva transparencia, audibilidad litúrgica y la decisión doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Scope of הָאָרֶץ
  english_pob_reading: the earth
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el país
  - la tierra prometida
  rationale: El contexto inmediato es un himno cósmico donde la creación entera responde a Yahvé; por eso 'la tierra' se entiende aquí en sentido universal, no local.
  doctrine_reference: Contexto poético-cósmico de 1 Crónicas 16:33
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no eran necesarios cambios; la redacción española conserva las decisiones clave del audit trail inglés: verbos de júbilo para יְרַנְּנ֖וּ, presente profético para בָא, y sentido universal de הָאָרֶץ.'
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma española del nombre divino, coherente con la norma del proyecto.
  - Se evita 'SEÑOR' como sustituto del Tetragrámaton para preservar transparencia textual.
  - '''La tierra'' se usa con valor cósmico en concordancia con ''juzgar la tierra'' y el paralelismo poético.'
  - El tono es bíblico-formal sin calcos innecesarios del inglés.
