translation:
  language: es
  text: Así, los hijos de Israel dieron a los levitas[a], de su heredad, según el mandato de Yahvé[b], estas ciudades y sus pastizales[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O "los israelitas". Hebreo: "los hijos de Israel".'
    reason: lexical_alternative
  - marker: b
    text: 'O "por mandato de Yahvé". Literalmente: "según la boca de Yahvé".'
    reason: lexical_alternative
  - marker: c
    text: Es decir, el terreno abierto o de pastoreo perteneciente a las ciudades.
    reason: cultural_note
lexical_decisions:
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Conserva la expresión familiar masculina del hebreo sin neutralizarla; en español, 'hijos de Israel' es idiomático y sigue de cerca la forma מקור, mientras 'israelitas' suaviza la imagen filial que el texto usa.
- source_word: לַלְוִיִּם
  english_pob_choice: to the Levites
  chosen_spanish: a los levitas
  alternatives_spanish:
  - para los levitas
  lexicon: HALOT
  rationale: El dativo receptor del hebreo se expresa naturalmente con 'a' en español. 'Levitas' es el equivalente estándar y preciso de לְוִיִּם.
- source_word: מִנַּחֲלָתָם
  english_pob_choice: from their inheritance
  chosen_spanish: de su heredad
  alternatives_spanish:
  - de su herencia asignada
  - de su posesión hereditaria
  lexicon: HALOT
  rationale: Aquí נַחֲלָה se refiere al reparto heredado de tierra tribal. 'Heredad' comunica bien el sentido bíblico y evita una frase más pesada; 'herencia' también es posible, pero 'heredad' mantiene mejor el registro bíblico.
- source_word: אֶל פִּי יְהוָה
  english_pob_choice: at the command of Yahweh
  chosen_spanish: por mandato de Yahvé
  alternatives_spanish:
  - según el mandato de Yahvé
  - conforme a la palabra de Yahvé
  - según la boca de Yahvé
  lexicon: HALOT
  rationale: El giro hebreo אֶל־פִּי expresa autorización u orden. En español, 'por mandato de Yahvé' comunica el sentido con claridad y dignidad, sin ocultar la referencia al nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre del pacto según la norma del proyecto, en lugar de sustituirlo por un título. Esto preserva la identidad del texto hebreo y la decisión auditada del POB en inglés.
- source_word: הֶעָרִים הָאֵלֶּה
  english_pob_choice: these cities
  chosen_spanish: estas ciudades
  alternatives_spanish:
  - las ciudades siguientes
  - estos pueblos
  lexicon: HALOT
  rationale: La frase demostrativa se vierte de forma directa. 'Ciudades' es el equivalente normal de עָרִים en listas de repartición territorial.
- source_word: מִגְרְשֵׁיהֶן
  english_pob_choice: their pasturelands
  chosen_spanish: sus tierras de pasto
  alternatives_spanish:
  - sus ejidos
  - sus terrenos abiertos
  - sus pastizales
  lexicon: HALOT
  rationale: מִגְרָשׁ en contextos de ciudades levíticas apunta al terreno abierto asociado a la ciudad, frecuentemente para pastoreo. 'Tierras de pasto' conserva la función práctica sin introducir una tecnicidad regional como 'ejidos'.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. La traducción conserva el nombre propio de Dios como marca teológica y narrativa, siguiendo la política del POB y evitando la sustitución reverencial por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Preservación de la fórmula masculina 'sons of Israel'
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: La expresión hebrea es una fórmula étnica masculina explícita. Se conserva la imagen filial porque forma parte de la textura del texto y no hay necesidad contextual de neutralizarla.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y el cotejo cruzado mostró alta concordancia. Por ello, este borrador mantiene la lectura auditada sin introducir variantes innecesarias.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יהוה.
  - '''Heredad'' se usa para נחלה en sentido territorial, en armonía con el registro bíblico.'
  - '''Levitas'' y ''ciudades'' siguen el uso normal y transparente del castellano bíblico.'
  - Las notas a pie preservan alternativas relevantes donde el español puede sugerir matices distintos sin alterar el sentido básico.
