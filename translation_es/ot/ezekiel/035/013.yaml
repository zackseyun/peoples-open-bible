translation:
  language: es
  text: Y con su boca se engrandecieron contra mí[a], y multiplicaron sus palabras contra mí[b]; yo mismo he oído.
  philosophy: optimal-equivalence
  footnotes: &id001
  - marker: a
    text: 'O: «se jactaron contra mí»; el hebreo dice literalmente que se hicieron grandes contra Dios.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «amontonaron sus palabras contra mí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּגְדִּילוּ
  english_pob_choice: you magnified yourselves
  chosen_spanish: se engrandecieron
  alternatives_spanish:
  - se jactaron
  - se hicieron grandes
  lexicon: HALOT
  rationale: El hebreo con גדל en forma intensiva expresa hacerse grande o engrandecerse en actitud hostil ante Dios. «Se engrandecieron» conserva la imagen verbal y la fuerza adversativa del contexto; «se jactaron» aclara la actitud, pero desplaza la metáfora del texto.
- source_word: עָלַי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - sobre mí
  - acerca de mí
  lexicon: HALOT
  rationale: En este contexto de habla ofensiva, עַל no es meramente temático sino hostil. «Contra mí» comunica mejor la oposición directa que «acerca de mí» o «sobre mí».
- source_word: בְּפִיכֶם
  english_pob_choice: with your mouth
  chosen_spanish: con su boca
  alternatives_spanish:
  - con vuestra boca
  - con la boca
  lexicon: HALOT
  rationale: Se conserva la concreción del hebreo, pero en español suena más natural decir «con su boca» dentro de la segunda persona plural del discurso divino. Mantiene la imagen física sin volverla una paráfrasis abstracta como «con sus palabras».
- source_word: וְהַעְתַּרְתֶּם
  english_pob_choice: multiplied
  chosen_spanish: multiplicaron
  alternatives_spanish:
  - amontonaron
  - acumularon
  lexicon: HALOT
  rationale: El verbo aquí sugiere abundancia o acumulación de habla. «Multiplicaron» refleja esa idea de añadir y amontonar palabras sin salir de la forma bastante transparente del original.
- source_word: דִּבְרֵיכֶם
  english_pob_choice: your words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - sus dichos
  - sus discursos
  lexicon: HALOT
  rationale: דבר se mantiene de manera directa como «palabras», que encaja con la acusación de habla repetida y ofensiva. «Dichos» o «discursos» serían más interpretativos.
- source_word: אֲנִי
  english_pob_choice: I myself
  chosen_spanish: yo mismo
  alternatives_spanish:
  - yo, por mi parte
  - yo
  lexicon: HALOT
  rationale: El pronombre independiente es enfático. «Yo mismo» reproduce esa insistencia de manera natural en español y prepara el cierre judicial del versículo.
- source_word: שָׁמָעְתִּי
  english_pob_choice: have heard
  chosen_spanish: he oído
  alternatives_spanish:
  - he escuchado
  - oí
  lexicon: HALOT
  rationale: 'El perfecto hebreo expresa aquí una constatación vigente: Dios ya ha oído y lo sabe. «He oído» conserva ese valor resultativo sin forzar el tiempo simple.'
theological_decisions:
- issue: Naturaleza de la acusación divina contra el discurso humano
  english_pob_reading: The verse is a direct accusation of hostile, boastful speech against God, not merely speech about God.
  chosen_spanish_reading: El versículo presenta una acusación directa de habla hostil y arrogante contra Dios, no solo de hablar acerca de él.
  alternative_spanish_readings:
  - hablar orgullosamente acerca de él
  - pronunciar palabras altivas sobre él
  rationale: La repetición de עָלַי y el paralelismo entre «boca» y «palabras» muestran oposición directa. «Contra mí» mantiene la gravedad judicial sin suavizarla en una mera referencia temática.
  doctrine_reference: Ezequiel 35:13; traducción orientada al sentido discursivo del hebreo
- issue: Valor enfático del pronombre independiente
  english_pob_reading: I myself have heard.
  chosen_spanish_reading: «Yo mismo he oído» preserva el énfasis divino del hebreo.
  alternative_spanish_readings:
  - «He oído»
  - «Yo he oído»
  rationale: El אֲנִי inicial no es redundante; introduce una afirmación enfática. En español, «yo mismo» comunica esa insistencia con naturalidad y sin añadir contenido doctrinal.
  doctrine_reference: Ezequiel 35:13; énfasis pronominal en hebreo bíblico
translation_notes:
  revision_awareness: Se revisó la redacción frente al registro inglés auditado y no se detectaron cambios necesarios en la lectura base. La solución española conserva la imagen de auto-engrandecimiento, la repetición hostil de contra mí y el énfasis final de «yo mismo he oído».
  spanish_consistency_notes:
  - Se mantuvo «contra mí» para עָלַי por su valor adversativo en habla hostil.
  - Se prefirió «he oído» como perfecto resultativo, coherente con el tono judicial del pasaje.
  - Se conservó la concreción de «boca/palabras» en lugar de abstraerla a una formulación más interpretativa.
