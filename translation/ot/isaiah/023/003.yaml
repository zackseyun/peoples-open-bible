id: ISA.23.3
reference: Isaiah 23:3
source:
  edition: WLC
  text: וּ/בְ/מַ֤יִם רַבִּים֙ זֶ֣רַע שִׁחֹ֔ר קְצִ֥יר יְא֖וֹר תְּבֽוּאָתָ֑/הּ וַ/תְּהִ֖י סְחַ֥ר גּוֹיִֽם׃
translation:
  text: On many waters was the grain of Shihor[a], the harvest of the Nile, her revenue[b]; and she became the merchant of nations.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Shihor likely refers to the Nile or a branch of it; alternatively, 'the grain of the Nile.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the merchandise/trade of nations.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְמַיִם רַבִּים
  chosen: On many waters
  alternatives:
  - By many waters
  - Across many waters
  lexicon: HALOT
  rationale: The preposition ב with מים here is locative/instrumental in a maritime-commercial context. 'On many waters' is idiomatic and preserves the image of Tyre's trade routes over the sea. 'By many waters' is possible but can sound merely spatial rather than commercial-maritime.
- source_word: זֶרַע
  chosen: grain
  alternatives:
  - seed
  - offspring
  lexicon: HALOT
  rationale: In agricultural-economic context with 'harvest' and 'revenue,' זרע refers to produce/crop rather than literal seed for sowing or offspring. 'Grain' communicates the commodity sense clearly in English.
- source_word: שִׁחֹר
  chosen: Shihor
  alternatives:
  - the Nile
  lexicon: HALOT
  rationale: This is a proper name and, per translation philosophy, names are transliterated. In context it refers to the Nile or an eastern branch associated with Egypt, but the main text preserves the Hebrew toponym. The more interpretive equivalent 'the Nile' is preserved as an alternative in a footnote.
- source_word: קְצִיר יְאֹר
  chosen: the harvest of the Nile
  alternatives:
  - the Nile's harvest
  - the harvest of the River
  lexicon: HALOT
  rationale: יְאֹר commonly denotes the Nile or Nile-channel in Egyptian contexts. 'The harvest of the Nile' is natural English and makes explicit the genitival relation. 'River' is more formally possible, but here the Egyptian setting favors 'Nile'.
- source_word: תְּבוּאָתָהּ
  chosen: her revenue
  alternatives:
  - her produce
  - her income
  - its produce
  lexicon: HALOT
  rationale: The noun can mean produce/yield, but in this oracle against Tyre the sense extends to commercial gain from imported agricultural goods. The 3fs suffix refers to the city (Tyre), so 'her revenue' best captures the economic force in context.
- source_word: וַתְּהִי
  chosen: and she became
  alternatives:
  - and it became
  - and she was
  lexicon: HALOT
  rationale: The verb marks resultant state. Because the suffix and city imagery are feminine singular, 'she' is appropriate for Tyre as a city. 'Became' better reflects the verbal force than a simple copula.
- source_word: סְחַר גּוֹיִם
  chosen: the marketplace of nations
  alternatives:
  - the merchandise of nations
  - the trade of nations
  - the gain of nations
  lexicon: HALOT
  rationale: סחר can denote trade, merchandise, or commercial traffic. In context describing Tyre's international commercial role, 'marketplace of nations' communicates function rather than merely goods. This is slightly dynamic but fits optimal equivalence and the broader oracle's mercantile imagery.
