translation:
  language: es
  text: A grandes aguas[a] te llevaron tus remeros; el viento del oriente te quebró en el corazón de los mares[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en grandes aguas' o 'sobre muchas aguas'. La preposición hebrea puede traducirse de varias maneras, pero el movimiento implícito en 'te llevaron' favorece 'a grandes aguas'.
    reason: lexical_alternative
  - marker: b
    text: O 'en medio de los mares'. 'Corazón de los mares' es un hebraísmo que designa la parte interior o el centro.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/מַיִם רַבִּים
  english_pob_choice: into great waters
  chosen_spanish: en aguas grandes
  alternatives_spanish:
  - en grandes aguas
  - hacia aguas grandes
  - dentro de aguas grandes
  lexicon: HALOT
  rationale: El hebreo permite varias lecturas de la preposición ב; el contexto de movimiento con הֱבִיאוּךְ favorece una traducción espacial que conserve el desplazamiento sin forzar un calco pesado. 'Aguas grandes' mantiene la idea de amplitud/abundancia del hebreo רַבִּים y suena natural en español bíblico.
- source_word: הֱבִיאוּךְ
  english_pob_choice: brought you
  chosen_spanish: te llevaron
  alternatives_spanish:
  - te trajeron
  - te condujeron
  - te llevaron hacia
  lexicon: HALOT
  rationale: El Hifil de בוא/הביא expresa hacer venir o llevar. En el cuadro náutico y poético, 'llevar' comunica bien el movimiento de la nave/personificación sin perder el sentido causativo.
- source_word: הַשָּׁטִים
  english_pob_choice: your rowers
  chosen_spanish: tus remeros
  alternatives_spanish:
  - los remeros
  - los que reman
  - tus marineros
  lexicon: HALOT
  rationale: El participio en este contexto náutico se refiere a quienes impulsan la embarcación. 'Remeros' es el equivalente más preciso en español y conserva la relación posesiva implícita en el sufijo de segunda femenina singular.
- source_word: רוּחַ הַקָּדִים
  english_pob_choice: the east wind
  chosen_spanish: el viento del oriente
  alternatives_spanish:
  - el viento de oriente
  - el viento oriental
  - un viento del oriente
  lexicon: HALOT
  rationale: '''Oriente'' expresa el punto cardinal con naturalidad bíblica en español y evita la ambigüedad de ''este'' como adjetivo direccional. Se mantiene el artículo definido, como en el hebreo, por tratarse del viento característico y destructivo del pasaje.'
- source_word: שְׁבָרֵךְ
  english_pob_choice: shattered you
  chosen_spanish: te quebró
  alternatives_spanish:
  - te destrozó
  - te rompió
  - te hizo pedazos
  lexicon: HALOT
  rationale: El verbo שׁבר transmite ruptura violenta. 'Quebró' conserva la fuerza del golpe sin exagerar con una imagen más moderna que pudiera ir más allá del hebreo.
- source_word: בְּ/לֵב יַמִּים
  english_pob_choice: in the heart of the seas
  chosen_spanish: en el corazón de los mares
  alternatives_spanish:
  - en medio de los mares
  - en lo profundo de los mares
  - en el centro de los mares
  lexicon: HALOT
  rationale: Se preserva la metáfora 'corazón' porque el hebreo usa לֵב como imagen del interior o centro. 'Mares' mantiene el plural del original y el tono poético del oráculo.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el dictamen de alta concordancia del pasaje: no hubo revisiones aplicadas y la lectura final coincide con el audit trail inglés en sentido y en las dos notas léxicas principales.'
  spanish_consistency_notes:
  - Se mantiene el pronombre enclítico de segunda persona femenina singular ('te', 'tus') para reflejar el destinatario personificado del hebreo.
  - Se conserva la imaginería marítima ('remeros', 'viento del oriente', 'corazón de los mares') sin sustituirla por vocabulario eclesiástico o explicativo.
  - La traducción evita 'SEÑOR' u otras convenciones no presentes en el verso, ya que el texto no contiene el Tetragrámaton.
