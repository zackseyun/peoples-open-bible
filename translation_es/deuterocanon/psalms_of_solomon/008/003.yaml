translation:
  language: es
  text: 'Y dije en mi corazón[a]: «¿Dónde, entonces, lo juzgará Dios?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «dije a mi corazón».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπα τῇ καρδίᾳ μου
  english_pob_choice: I said in my heart
  chosen_spanish: dije en mi corazón
  alternatives_spanish:
  - dije a mi corazón
  - me dije a mí mismo
  lexicon: BDAG
  rationale: La imagen griega es literalmente «dije a mi corazón», pero en español «dije en mi corazón» conserva el movimiento interior y la referencia al corazón como sede del pensamiento sin sonar forzado. «Dije a mi corazón» es más literal, pero menos natural; «me dije a mí mismo» aclara el sentido, pero pierde la imagen del corazón.
- source_word: Ποῦ ἄρα
  english_pob_choice: Where then
  chosen_spanish: ¿Dónde entonces
  alternatives_spanish:
  - ¿Dónde, pues?
  - ¿Dónde, entonces?
  lexicon: BDAG
  rationale: «Ποῦ» pide «dónde» y «ἄρα» añade matiz inferencial o reflexivo. «Entonces» reproduce bien ese valor, con un español claro y sobrio. «Pues» también sería posible, pero puede sonar más discursivo que el griego aquí.
- source_word: κρινεῖ
  english_pob_choice: will judge
  chosen_spanish: juzgará
  alternatives_spanish:
  - condenará
  - llevará a juicio
  lexicon: BDAG
  rationale: El verbo básico es «juzgar». Aunque el contexto puede insinuar juicio punitivo, la forma más fiel y transparente es «juzgará». «Condenará» estrecha demasiado el sentido; «llevará a juicio» explicita más de lo que el verbo exige.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: a él
  alternatives_spanish:
  - a este hombre
  - a él mismo
  lexicon: BDAG
  rationale: El pronombre es masculino singular en acusativo. En español, «a él» preserva la referencia directa sin añadir información interpretativa. «A este hombre» es posible, pero explicita demasiado.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: El sustantivo con artículo se vierte naturalmente como «Dios» en español. No hay aquí un problema de título especial que requiera otra forma.
translation_notes:
  revision_awareness: El texto griego y el inglés POB coinciden estrechamente en sentido; la única tensión lexical relevante es la imagen idiomática de «hablar al corazón», que en español se conserva con una formulación natural. No se observan revisiones posteriores que alteren la decisión de traducción.
  spanish_consistency_notes:
  - Se mantiene «Dios» para ὁ θεός, conforme al uso estándar del proyecto.
  - Se conserva el valor inferencial de ἄρα con «entonces», sin añadir una interpretación más fuerte.
  - La nota al pie refleja la alternativa literal documentada en el audit trail inglés y queda anclada solo en la expresión afectada.
