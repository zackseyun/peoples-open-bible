translation:
  language: es
  text: Pero a Yahvé su Dios[a] deben temer, y él los librará de la mano de todos sus enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «de la mano de todos sus enemigos», un modismo que significa de su poder o dominio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sino que
  - Solo que
  - Más bien
  lexicon: HALOT
  rationale: La combinación aquí es adversativa/exclusiva frente a la prohibición anterior; «Pero» comunica bien el contraste en español sin volverlo demasiado pesado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton con la forma de proyecto «Yahvé», conforme al criterio POB de no ocultarlo tras un título.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - vuestro Dios
  - sus dioses
  lexicon: HALOT
  rationale: Aunque la forma hebrea lleva sufijo plural de segunda persona, el referente es singular y directo a la comunidad; en español «su Dios» evita un posesivo más marcado y suena natural en registro bíblico.
- source_word: תִּירָאוּ
  english_pob_choice: you shall fear
  chosen_spanish: temerán
  alternatives_spanish:
  - temeréis
  - deberán temer
  - reverenciarán
  lexicon: HALOT
  rationale: El hebreo expresa una exhortación fuerte con valor de instrucción. En español se opta por una forma de mandato exhortativo impersonal/plural de cortesía bíblica; el verbo «temer» conserva el peso reverencial del original mejor que «reverenciar».
- source_word: יַצִּיל
  english_pob_choice: will deliver
  chosen_spanish: los librará
  alternatives_spanish:
  - los entregará en libertad
  - los rescatará
  - los salvará
  lexicon: HALOT
  rationale: «Librar» en español bíblico expresa bien la acción de sacar de peligro o dominio. Mantiene el sentido de liberación/rescate sin introducir matices soteriológicos más amplios que los exigidos por el versículo.
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - de la autoridad de
  - de las manos de
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática hebrea de «mano» como poder o control. «De la mano de» sigue siendo transparente en español y reproduce la metáfora auditada por la POB inglesa.
- source_word: כָּל אֹיְבֵיכֶם
  english_pob_choice: all your enemies
  chosen_spanish: todos sus enemigos
  alternatives_spanish:
  - todos sus adversarios
  - cada uno de sus enemigos
  lexicon: HALOT
  rationale: La cuantificación total se conserva con «todos». El posesivo se ajusta al referente de segunda persona plural implícito en español bíblico formal.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo emplea el nombre propio divino. La forma española de proyecto «Yahvé» preserva esa identidad personal sin sustituirla por un título, en coherencia con la política POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza del verbo ירא en contexto de pacto
  english_pob_reading: you shall fear
  chosen_spanish_reading: temerán
  alternative_spanish_readings:
  - reverenciarán
  - deberán temer
  rationale: El contexto no suaviza el verbo hacia mera admiración; conserva una reverencia obediente y seria ante Dios. «Temerán» mantiene esa tensión mejor que «reverenciarán», que podría atenuarla.
  doctrine_reference: Lexical-theological note on covenantal fear of Yahweh
- issue: Expresión idiomática מִיַּד
  english_pob_reading: from the hand of
  chosen_spanish_reading: de la mano de
  alternative_spanish_readings:
  - del poder de
  - de la autoridad de
  rationale: La metáfora de la mano como dominio se mantiene en español para no borrar la imagen hebrea. El sentido de poder/control queda implícito sin necesidad de explicitarlo en el texto principal.
  doctrine_reference: 'Hebrew idiom note: idiomatic hand = power/control'
translation_notes:
  revision_awareness: 'El texto coincide con el audit trail inglés en las decisiones clave: contraste adversativo, nombre divino, verbo de temor reverente, entrega/liberación e idiomática de «la mano de». No se detectan revisiones posteriores que exijan ajustar el borrador.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conserva la imagen bíblica de «mano» en vez de sustituirla por una abstracción.
  - El posesivo y la concordancia verbal se adaptan al español natural sin perder la referencia comunitaria plural.
  - El verbo «temer» se usa con valor reverencial y no meramente emocional.
