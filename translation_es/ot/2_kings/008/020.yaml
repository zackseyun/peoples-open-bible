translation:
  language: es
  text: En sus días, Edom se rebeló de debajo de la mano de Judá y se nombraron un rey[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más dinámica: «Edom se rebeló contra el control de Judá». El hebreo dice literalmente: «se rebeló de debajo de la mano de Judá»; y luego, «hicieron rey sobre sí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיָמָיו
  english_pob_choice: In his days
  chosen_spanish: En sus días
  alternatives_spanish:
  - Durante su tiempo
  - En aquel tiempo
  lexicon: HALOT
  rationale: La expresión hebrea es un idiomatismo temporal que sitúa el hecho dentro del periodo de vida o reinado del rey aludido. «En sus días» conserva con naturalidad ese giro tradicional sin volverlo rígido ni explicativo de más.
- source_word: פָּשַׁע
  english_pob_choice: rebelled
  chosen_spanish: se rebeló
  alternatives_spanish:
  - se sublevó
  - se levantó en rebelión
  lexicon: HALOT
  rationale: En este contexto político, el verbo no describe transgresión moral sino ruptura de sujeción. «Se rebeló» comunica bien la acción de Edom y mantiene el valor histórico del verbo.
- source_word: אֱדוֹם
  english_pob_choice: Edom
  chosen_spanish: Edom
  alternatives_spanish:
  - Edomitas
  lexicon: Standard proper-name usage
  rationale: Se mantiene el nombre propio del pueblo y territorio como forma estándar y reconocible en español bíblico.
- source_word: מִתַּחַת יַד יְהוּדָה
  english_pob_choice: from under the hand of Judah
  chosen_spanish: de debajo de la mano de Judá
  alternatives_spanish:
  - de la autoridad de Judá
  - del control de Judá
  lexicon: HALOT
  rationale: 'La imagen hebrea es concreta: salir de «debajo de la mano» expresa liberación de dominio o control. Se conserva la metáfora corporal en el texto principal para respetar la fuente, sin impedir la comprensión en español.'
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judah
  lexicon: Standard proper-name usage
  rationale: Se usa la forma española tradicional y transparente del nombre del reino/tribu.
- source_word: וַיַּמְלִכוּ
  english_pob_choice: made
  chosen_spanish: pusieron
  alternatives_spanish:
  - nombraron
  - establecieron
  - hicieron rey
  lexicon: HALOT
  rationale: El causativo de מלך aquí expresa que establecieron a alguien como rey. En español, «pusieron» es conciso y natural para la instalación de un monarca.
- source_word: עֲלֵיהֶם
  english_pob_choice: over themselves
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - sobre sí mismos
  - sobre ellos mismos
  lexicon: HALOT
  rationale: El pronombre retoma a los edomitas; en español, «sobre ellos» evita una formulación reflexiva que sonaría menos natural y mantiene la idea de un rey instalado sobre el pueblo.
- source_word: מֶלֶךְ
  english_pob_choice: a king
  chosen_spanish: un rey
  alternatives_spanish:
  - rey
  lexicon: HALOT
  rationale: El sustantivo indefinido en hebreo se refleja de forma natural con «un rey», indicando la instalación de un monarca sin identificarlo.
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo masorético y está alineado con la lectura ya validada en el audit trail inglés; no se identificaron revisiones textuales ni cambios de sentido que requieran nota adicional.
  spanish_consistency_notes:
  - Se mantiene «Judá» para el reino/polidad histórica y «Edom» como nombre propio no traducido.
  - Se conserva la metáfora «debajo de la mano» en el cuerpo del texto, con nota alternativa para lectores que prefieran una versión más dinámica.
  - Se usa pasado simple narrativo en español para reflejar la secuencia histórica breve del hebreo.
  - No se introduce terminología eclesiástica ni se suaviza el valor político del verbo de rebelión.
