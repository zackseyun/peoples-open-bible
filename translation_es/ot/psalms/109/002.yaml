revisions:
- from: Porque la boca del malvado y la boca del engaño se han abierto contra mí[a]; han hablado conmigo con lengua mentirosa[b].
  to: Porque la boca del malvado y la boca del engaño han abierto contra mí[a]; me han hablado con lengua mentirosa[b].
  rationale: 'La revisión corrige el único problema sustancial de fidelidad: «me han hablado» refleja mejor la decisión contextual de la POB para אִתִּי que «han hablado conmigo». También se mejora la naturalidad con «han abierto» y se reescriben las notas para que apoyen, en lugar de contradecir, el texto principal. Se conserva la repetición de «boca» y la imagen de «lengua mentirosa», en línea con la fuente hebrea y la auditoría inglesa.'
