revisions:
- from: Porque, al pensar que permanecerían ocultos en sus pecados secretos[a], quedaron dispersos bajo el oscuro velo del olvido, terriblemente aterrados y sacudidos por apariciones.
  to: Porque, pensando que estaban ocultos en sus pecados secretos, quedaron dispersos bajo el oscuro velo del olvido, terriblemente sobrecogidos y sacudidos por apariciones[a].
  rationale: Se ajustó la primera cláusula para reflejar con mayor naturalidad y fidelidad la idea de que ellos se creían ocultos, sin introducir un matiz futuro/condicional innecesario. También se cambió «aterrados» por «sobrecogidos» para preservar mejor el valor de θαμβούμενοι como estupor espantado, no solo miedo. La nota al pie se reancló correctamente en «apariciones», que es el término al que explica.
