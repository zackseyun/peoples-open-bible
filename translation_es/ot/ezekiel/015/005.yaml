translation:
  language: es
  text: Mira[a], cuando estaba íntegro, no se hacía para ningún trabajo. Cuánto menos[b], cuando el fuego lo ha consumido y está chamuscado[c], ¿puede todavía hacerse para trabajo alguno?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sano» o «intacto» para «íntegro». El hebreo describe la madera antes de ser dañada por el fuego.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «cuánto menos», un argumento de lo menor a lo mayor; si era inútil cuando estaba intacta, con más razón después de arder.'
    reason: lexical_alternative
  - marker: c
    text: O «carbonizado» para «chamuscado».
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Observa
  - He aquí
  lexicon: HALOT
  rationale: La interjección introduce la declaración con fuerza deíctica. «Mira» conserva el impulso de atención de manera natural en español actual y evita la rigidez de «He aquí».
- source_word: בִּהְיוֹתוֹ תָמִים
  english_pob_choice: when it was whole
  chosen_spanish: cuando estaba íntegro
  alternatives_spanish:
  - cuando estaba sano
  - cuando estaba completo
  - cuando estaba intacto
  lexicon: HALOT
  rationale: En contexto de madera de vid, תָמִים describe que no había sido dañada. «Íntegro» preserva la idea de totalidad/indemne sin sugerir una valoración moral.
- source_word: לֹא יֵעָשֶׂה לִמְלָאכָה
  english_pob_choice: it was not made for any work
  chosen_spanish: no se hacía para ningún trabajo
  alternatives_spanish:
  - no se hacía para obra alguna
  - no podía hacerse para ningún trabajo
  - no era apto para ningún trabajo
  lexicon: HALOT
  rationale: El nifal de עשה tiene aquí valor pasivo/resultativo. «No se hacía» mantiene el paralelismo verbal del hebreo y «para ningún trabajo» reproduce el alcance amplio de מְלָאכָה.
- source_word: אַף כִּי
  english_pob_choice: How much less
  chosen_spanish: ¡Cuánto menos
  alternatives_spanish:
  - y mucho menos
  - con mayor razón no
  - cuánto más
  lexicon: HALOT
  rationale: La locución introduce argumento de menor a mayor con sentido enfático negativo. «¡Cuánto menos!» expresa bien la fuerza de la inferencia y conserva la retórica del texto.
- source_word: אֵשׁ אֲכָלַתְהוּ
  english_pob_choice: the fire has consumed it
  chosen_spanish: el fuego lo ha consumido
  alternatives_spanish:
  - el fuego lo ha devorado
  - el fuego se lo ha comido
  - el fuego lo ha devorado por completo
  lexicon: HALOT
  rationale: «Consumido» es una equivalencia idiomática digna para el verbo de comer/devorar aplicado al fuego, sin perder el sentido de destrucción completa.
- source_word: וַיֵּחָר
  english_pob_choice: it is charred
  chosen_spanish: está quemado
  alternatives_spanish:
  - está carbonizado
  - está chamuscado
  - está ennegrecido
  lexicon: HALOT
  rationale: El término apunta al estado del objeto tras el fuego. «Está quemado» es claro y fiel; otras opciones afinan más el matiz de tostado o carbonizado, pero pueden sonar más técnicas o más fuertes de lo necesario.
- source_word: וְנַעֲשָׂה עוֹד לִמְלָאכָה
  english_pob_choice: can it still be made for any work
  chosen_spanish: puede aún hacerse para ningún trabajo
  alternatives_spanish:
  - puede aún hacerse para algún trabajo
  - puede todavía hacerse útil para trabajo
  - puede aún volver a hacerse para trabajo
  lexicon: HALOT
  rationale: La frase final conserva el sentido interrogativo-retórico del hebreo. «Aún» corresponde a עוֹד y «para ningún trabajo» mantiene el mismo campo semántico que la primera mitad del verso.
theological_decisions:
- issue: Preservación de la metáfora sin explicitar su referente histórico
  english_pob_reading: Translate the verse as a rhetorical statement about the uselessness of burned vine wood, without importing allegorical interpretation into the verse itself.
  chosen_spanish_reading: Traducir la imagen de la madera inútil tras el fuego sin incorporar en el verso la identificación con Jerusalén o Judá.
  alternative_spanish_readings:
  - hacer explícito en el texto principal que la madera representa a Jerusalén/Judá
  - parafrasear la imagen como una sentencia directa sobre el pueblo
  rationale: La referencia histórica pertenece al contexto amplio, no a la formulación de este versículo. Mantener la imagen permite que la interpretación surja del pasaje y evita sobretraducir.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Seguí la revisión más reciente del inglés POB, que ajustó la segunda mitad a «for any work» para acercarse más al paralelismo repetido del hebreo. En español, mantuve esa repetición con «para ningún trabajo» en ambas cláusulas.
  spanish_consistency_notes:
  - Conservé el campo semántico de מְלָאכָה como «trabajo» para mantener uniformidad en el versículo.
  - Usé «Mira» para הִנֵּה, coherente con un registro moderno y solemne.
  - Mantuve la estructura comparativa y retórica del hebreo para que el argumento de menor a mayor quede claro en español.
