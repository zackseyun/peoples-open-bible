  glossary_alignment: 'No hay términos teológicos de proyecto en juego. Las decisiones léxicas principales concuerdan con el audit trail: «harán oír» para הִשְׁמִיעוּ, «sobre ti» para עָלַיִךְ en contexto de lamento, «clamarán» para זעק, y «polvo/ceniza» para עפר/אפר. Conviene mantener la alternativa documentada para יִתְפַּלָּשׁוּ como nota en la cláusula final, no en «sus cabezas».'
