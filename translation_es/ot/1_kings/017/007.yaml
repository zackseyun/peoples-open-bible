review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: transición narrativa (וַיְהִי), lapso indefinido (''al cabo de algunos días''), secamiento del curso de agua, y causa por falta de lluvia. Sin embargo, ''en la tierra'' no preserva tan bien como ''en la tierra/land'' el valor contextual de בָּאָרֶץ en este relato; en español bíblico actual ''en la tierra'' puede sonar más cósmico o genérico. ''En la tierra'' además se aparta del razonamiento auditado del POB inglés, que aquí entiende ''the land/region'' y no ''earth''.'
  spanish_quality_summary: El español es claro y digno. 'Y aconteció que' suena natural en registro bíblico. 'El wadi' puede mantenerse con nota, pero la nota actual mejora la inteligibilidad. El ajuste principal es cambiar 'en la tierra' por 'en la región' o 'en la tierra' según contexto; aquí 'en la región' suena más natural y evita ambigüedad. También conviene simplificar levemente la nota para alinear mejor con la explicación inglesa de 'seasonal streambed or wadi'.
  glossary_alignment: 'No hay términos teológicos mayores en juego. La conservación de ''wadi'' con nota está alineada con la decisión léxica del POB inglés. No hay conflicto con los defaults del proyecto. La única desalineación relevante es אֶרֶץ: aquí debe reflejar ''la tierra/la región'' en sentido local, y en español ''la región'' comunica mejor ese valor contextual que ''la tierra''.'
  issues:
  - severity: medium
    issue: '''en la tierra'' para בָּאָרֶץ'
    rationale: Aunque posible literalmente, en este contexto narrativo español puede sugerir 'en el mundo' o sonar menos natural. El POB inglés documenta explícitamente 'in the land' como referencia regional/local en la historia de Elías.
  - severity: low
    issue: Nota de 'wadi' algo expandida respecto de la audit trail inglesa
    rationale: 'La nota española es correcta, pero puede acercarse más a la formulación auditada: ''cauce estacional'' o ''arroyo'' como alternativa, sin introducir contraste con ''río permanente'' que no es necesario para este versículo.'
  revised_spanish_text: Y aconteció que, al cabo de algunos días, el wadi[a] se secó, porque no había lluvia en la región.
  revised_footnotes:
  - marker: a
    text: O ‘arroyo’. El hebreo se refiere a un cauce estacional o wadi.
    reason: lexical_alternative
  revision_rationale: Se cambia 'en la tierra' por 'en la región' para reflejar mejor el valor contextual de בָּאָרֶץ como territorio afectado por la sequía, en línea con la decisión auditada del POB inglés ('in the land'). Se mantiene 'wadi' por precisión geográfica, con una nota más ceñida a la explicación inglesa.
