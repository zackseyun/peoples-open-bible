  glossary_alignment: No hay conflictos con los términos globales del proyecto. 'Ofrenda vegetal' para מִנְחָה es coherente con la terminología documentada. La revisión propuesta mejora la correspondencia léxica de רְקִיקֵי y מְשֻׁחִים sin apartarse de la claridad del español.
