translation:
  language: es
  text: Recuerden cómo nuestros padres fueron salvados en el mar Rojo, cuando Faraón los persiguió con fuerza[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el mar Rojo»; alternativamente, algunos prefieren «en el mar de Juncos» para reflejar el trasfondo hebreo de la tradición del Éxodo.
    reason: lexical_alternative
lexical_decisions:
- source_word: μνήσθητε
  english_pob_choice: Remember
  chosen_spanish: Recuerden
  alternatives_spanish:
  - Acuérdense
  - Recuerden esto
  lexicon: BDAG
  rationale: El imperativo aoristo pide una exhortación directa a la memoria activa. «Recuerden» es natural en español y conserva el tono exhortativo del griego.
- source_word: ἐσώθησαν
  english_pob_choice: were saved
  chosen_spanish: fueron salvados
  alternatives_spanish:
  - fueron librados
  - fueron rescatados
  lexicon: BDAG
  rationale: Se mantiene el verbo de salvación para conservar la resonancia bíblica de σῴζω, sin forzar un matiz doctrinal ajeno al contexto histórico de liberación.
- source_word: οἱ πατέρες ἡμῶν
  english_pob_choice: our fathers
  chosen_spanish: nuestros padres
  alternatives_spanish:
  - nuestros antepasados
  lexicon: BDAG
  rationale: El griego es masculino plural y alude a los padres/fundadores de Israel. «Nuestros padres» conserva esa precisión sin neutralizarla.
- source_word: ἐν θαλάσσῃ ἐρυθρᾷ
  english_pob_choice: in the Red Sea
  chosen_spanish: en el mar Rojo
  alternatives_spanish:
  - junto al mar Rojo
  - en el mar de Juncos
  lexicon: BDAG
  rationale: La frase griega es la expresión bíblica convencional para el mar Rojo; «en el mar Rojo» sigue de cerca la preposición ἐν y es la forma más clara en español. La alternativa «mar de Juncos» no refleja el sentido directo de este testimonio griego.
- source_word: ἐδίωξεν
  english_pob_choice: pursued
  chosen_spanish: los persiguió
  alternatives_spanish:
  - los siguió de cerca
  - los acosó
  lexicon: BDAG
  rationale: «Persiguió» reproduce bien διώκω en un contexto narrativo y militar, con registro natural y formal.
- source_word: ἐν δυνάμει
  english_pob_choice: with force
  chosen_spanish: con fuerza
  alternatives_spanish:
  - con poder
  - con gran fuerza
  - con un ejército
  lexicon: BDAG
  rationale: «Con fuerza» preserva la idea de poder efectivo o presión militar sin especificar más de lo que dice el griego. En español suena natural y mantiene la ambigüedad útil del término.
theological_decisions:
- issue: Lenguaje de salvación en un contexto histórico de liberación
  english_pob_reading: were saved
  chosen_spanish_reading: fueron salvados
  alternative_spanish_readings:
  - fueron librados
  - fueron rescatados
  rationale: Aunque el episodio es histórico, el verbo σῴζω lleva un valor real de salvación/liberación. «Fueron salvados» conserva esa red bíblica sin imponer desarrollos doctrinales posteriores.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Marcación masculina en el referente ancestral
  english_pob_reading: our fathers
  chosen_spanish_reading: nuestros padres
  alternative_spanish_readings:
  - nuestros antepasados
  rationale: Se conserva el referente masculino explícito del griego, conforme a la política de precisión de género del proyecto, sin convertirlo en un plural genérico neutro.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Posible tensión entre 'mar Rojo' y la alternativa etimológica 'mar de Juncos'
  english_pob_reading: in the Red Sea
  chosen_spanish_reading: en el mar Rojo
  alternative_spanish_readings:
  - en el mar de Juncos
  rationale: El testimonio griego aquí usa la expresión tradicional equivalente a 'mar Rojo'. Dado que el texto fuente no adopta el giro etimológico hebreo, se mantiene la lectura directa y se reserva la alternativa como nota.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
translation_notes:
  revision_awareness: El pasaje revisado coincide sustancialmente con el audio-trail inglés; no se detectaron cambios sustantivos en la última pasada de revisión. La decisión principal a sostener en español es conservar la expresión bíblica «mar Rojo» del griego, dejando la alternativa etimológica en nota.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de segunda persona plural exhortativa con «Recuerden», coherente con el plural del imperativo griego.
  - Se conserva «fueron salvados» para enlazar con la red de salvación bíblica sin diluir el hecho histórico.
  - Se evita la calca «en fuerza»; «con fuerza» es el equivalente natural en español.
  - No se introduce «Mesías» ni terminología cristológica ajena al versículo.
