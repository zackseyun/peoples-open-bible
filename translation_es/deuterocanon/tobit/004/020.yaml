translation:
  language: es
  text: Y ahora te muestro los diez talentos de plata que deposité con Gabael, hijo de Gabrias, en Ragés de Media[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te hago saber» para ἐπιδεικνύω; el verbo puede significar señalar o dar a conocer, no solo mostrar físicamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιδεικνύω
  english_pob_choice: am showing
  chosen_spanish: te muestro
  alternatives_spanish:
  - te estoy mostrando
  - te hago saber
  - te doy a conocer
  lexicon: LSJ
  rationale: El griego puede significar tanto ‘mostrar’ como ‘dar a conocer’. En español, «te muestro» conserva el presente enfático y suena natural sin perder la idea de señalar o poner de manifiesto la existencia del dinero.
- source_word: τὰ δέκα τάλαντα τοῦ ἀργυρίου
  english_pob_choice: the ten talents of silver
  chosen_spanish: los diez talentos de plata
  alternatives_spanish:
  - los diez talentos de dinero
  - los diez talentos en plata
  lexicon: LSJ
  rationale: Se conserva la unidad antigua «talentos» y el metal «plata» de forma transparente. «De plata» es más natural en español que una construcción más literal como «de la plata» o «en plata».
- source_word: παρεθέμην
  english_pob_choice: I deposited
  chosen_spanish: deposité
  alternatives_spanish:
  - confié
  - dejé en depósito
  - entregué para custodia
  lexicon: LSJ
  rationale: El contexto es financiero y de custodia, por lo que «deposité» expresa bien la acción de poner el dinero en resguardo sin diluirla en un sentido más general de confianza.
- source_word: Γαβαήλῳ
  english_pob_choice: Gabael
  chosen_spanish: Gabael
  alternatives_spanish:
  - Gabel
  lexicon: transliteration
  rationale: Se mantiene la transliteración habitual del nombre propio, conforme al texto griego y a la práctica del proyecto.
- source_word: τῷ τοῦ Γαβρεία
  english_pob_choice: son of Gabrias
  chosen_spanish: hijo de Gabrias
  alternatives_spanish:
  - de la familia de Gabrias
  - descendiente de Gabrias
  lexicon: LSJ
  rationale: La construcción griega identifica a la persona por su padre; en español, «hijo de» reproduce con claridad esa relación genealógica.
- source_word: ἐν Ῥάγοις τῆς Μηδείας
  english_pob_choice: in Rages of Media
  chosen_spanish: en Ragés de Media
  alternatives_spanish:
  - en Rages de Media
  - en Ragas de Media
  lexicon: transliteration
  rationale: Se adopta «Ragés» para reflejar la forma griega Ῥάγοις con una transliteración más natural en español. «De Media» conserva el complemento geográfico del genitivo.
