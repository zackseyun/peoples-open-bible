translation:
  language: es
  text: He abandonado mi casa; he abandonado mi heredad[c]; he entregado al amado[a] de mi alma en manos[b] de sus enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el amado de mi alma», «el que mi alma ama» o «mi muy amado». La expresión hebrea es una frase íntima de afecto.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en la palma/mano de sus enemigos», un modismo que significa quedar bajo su poder o control.'
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo usa un sufijo femenino: «sus enemigos» puede entenderse como «los enemigos de ella». El referente puede ser la heredad, Judá/Jerusalén personificada, o el amado/la amada; el texto no lo precisa más.'
    reason: alternative_reading
lexical_decisions:
- source_word: עָזַבְתִּי
  english_pob_choice: I have forsaken
  chosen_spanish: he abandonado
  alternatives_spanish:
  - he dejado
  - he desamparado
  lexicon: HALOT
  rationale: El hebreo perfecto 1cs expresa una acción completa desde la perspectiva del hablante. En español, "he abandonado" comunica bien la solemnidad del acto y su sentido relacional, sin resultar tan arcaico como "he forsaken" en inglés. "He dejado" es posible, pero pierde fuerza; "he desamparado" sería más interpretativo.
- source_word: בֵּיתִי
  english_pob_choice: my house
  chosen_spanish: mi casa
  alternatives_spanish:
  - mi casa
  - mi hogar
  - mi casa/mi templo
  lexicon: HALOT
  rationale: בַּיִת significa literalmente "casa". "Mi casa" conserva la imagen directa y permite la resonancia contextual con hogar/casa de Yahvé sin fijarla de más. "Mi hogar" suaviza la metáfora; "mi templo" añade especificación no explícita en el hebreo.
- source_word: נָטַשְׁתִּי
  english_pob_choice: I have abandoned
  chosen_spanish: he dejado
  alternatives_spanish:
  - he abandonado
  - he rechazado
  - he desechado
  lexicon: HALOT
  rationale: El segundo verbo refuerza el paralelismo y no repite exactamente el primero. "He dejado" mantiene la idea de soltar o abandonar sin sobrecargar la línea con dos equivalentes demasiado idénticos. "He abandonado" también sería válido, pero aquí se reserva la variación para preservar el paralelismo español.
- source_word: נַחֲלָתִי
  english_pob_choice: my inheritance
  chosen_spanish: mi heredad
  alternatives_spanish:
  - mi herencia
  - mi posesión
  - mi patrimonio
  lexicon: HALOT
  rationale: נַחֲלָה suele referirse a una posesión heredada, especialmente en lenguaje pactal y territorial. "Heredad" es un equivalente bíblico claro en español, más natural aquí que "herencia" y más preciso que "posesión"; además conserva el tono teológico de pertenencia recibida.
- source_word: נָתַתִּי
  english_pob_choice: I have given
  chosen_spanish: he entregado
  alternatives_spanish:
  - he dado
  - he puesto
  - he dejado
  lexicon: HALOT
  rationale: Aunque el verbo básico es "dar", en esta construcción la fuerza en español se expresa mejor con "entregado", que comunica cesión bajo control ajeno. "He dado" es más literal pero menos idiomático; "he entregado" prepara bien la imagen de quedar en poder de enemigos.
- source_word: יְדִד֥וּת נַפְשִׁ֖י
  english_pob_choice: the beloved of my soul
  chosen_spanish: el amado de mi alma
  alternatives_spanish:
  - el amado de mi alma
  - el amor de mi alma
  - el que ama mi alma
  lexicon: HALOT
  rationale: La expresión hebrea es íntima y afectiva. "El amado de mi alma" conserva el paralelo semántico de affection y mantiene la transparencia formal. "Amor de mi alma" suena más libre; "el que ama mi alma" cambia el sentido del constructo.
- source_word: בְּכַף
  english_pob_choice: into the hand of
  chosen_spanish: en mano de
  alternatives_spanish:
  - en la mano de
  - en poder de
  - en la palma de
  lexicon: HALOT
  rationale: El hebreo usa una expresión idiomática de transferencia a control ajeno. "En mano de" reproduce ese idiom a la vez que suena bíblico y claro en español. "En poder de" explicita el sentido, pero pierde la imagen corporal; "en la palma de" es demasiado literal.
- source_word: אֹיְבֶיהָ
  english_pob_choice: her enemies
  chosen_spanish: sus enemigos
  alternatives_spanish:
  - sus enemigos
  - sus adversarios
  - los enemigos de ella
  lexicon: HALOT
  rationale: El sufijo femenino 3fs puede referirse a la casa/heredad/personificación implícita, pero el español suele resolver mejor con un posesivo neutro-personal. "Sus enemigos" preserva la ambigüedad gramatical sin forzar una personificación explícita. "Her enemies" en inglés se volvió "sus enemigos" para evitar una personificación excesiva que el español no necesita.
theological_decisions:
- issue: Ambigüedad del referente femenino en "sus enemigos"
  english_pob_reading: Retain the feminine-personified rendering 'her enemies' without specifying whether the referent is Judah, Jerusalem, the inheritance, or the beloved one.
  chosen_spanish_reading: Mantener la ambigüedad referencial con "sus enemigos", sin decidir si el referente es la casa, la heredad, Judá/Jerusalén personificada o el amado de mi alma.
  alternative_spanish_readings:
  - sus enemigos
  - los enemigos de Judá
  - los enemigos de Jerusalén
  - sus enemigos (de ella)
  rationale: El hebreo conserva la referencia implícita mediante sufijo femenino. En español, "sus enemigos" permite mantener esa indeterminación poética y teológica sin añadir una interpretación que el texto no exige. Así se preserva la tensión documentada por el POB en vez de resolverla.
  doctrine_reference: Preservar la tensión textual y la ambigüedad poética del original.
translation_notes:
  revision_awareness: 'Se siguió el estado más reciente del auditor inglés (sin revisiones adicionales): acuerdo alto, sin cambios pendientes. La versión española conserva el paralelismo del hebreo, la ambigüedad del sufijo femenino y el tono afectivo de la frase final, con equivalencias naturales para lectura pública.'
  spanish_consistency_notes:
  - Se mantiene "casa" para בַּיִת y "heredad" para נַחֲלָה, distinguiendo ambos términos.
  - Se conserva el registro bíblico de "en mano de" para el modismo de posesión/control.
  - Se evitó resolver interpretativamente el referente de "sus enemigos".
  - '"Amado de mi alma" se mantiene como frase afectiva principal, en paralelo con la auditable tradición del POB.'
