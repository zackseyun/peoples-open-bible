review_pass:
  verdict: revise
  source_alignment_summary: 'La estructura y el sentido general del arameo están bien preservados: ''Estos ... que son cuatro ... son cuatro reyes que surgirán de la tierra'' refleja adecuadamente el demostrativo, la cláusula relativa, el número, ''reyes'' y el verbo de surgimiento. También se mantiene correctamente la decisión teológica de no sustituir ''reyes'' por ''reinos''. Sin embargo, el borrador se aparta de la decisión léxica auditada en חֵיוָתָא al usar ''animales'' en lugar de una forma que conserve mejor la fuerza apocalíptica de ''beasts''.'
  spanish_quality_summary: 'El español es claro y natural, pero ''grandes animales'' suena demasiado neutro para Daniel 7 y debilita el tono visionario. ''Grandes bestias'' es plenamente inteligible en español bíblico moderno y refleja mejor el registro del pasaje. La nota al pie además está mal anclada: el marcador [a] aparece en ''animales'', pero la nota explica la alternativa de אַרְעָא (''tierra''/''país''), por lo que debe moverse a ''tierra''.'
  glossary_alignment: 'No hay conflicto con los términos teológicos principales del proyecto. La decisión clave aquí es léxica: חֵיוָתָא debe alinearse mejor con ''beasts'' y con la rationale del POB inglés; ''bestias'' es preferible a ''animales'' en este contexto apocalíptico. ''Cuatro reyes'' se mantiene correctamente. ''Tierra'' también concuerda con la decisión inglesa, con nota sobre ''país/land''.'
  issues:
