lexical_decisions:
- source_word: ἀπαρνησάσθω ἑαυτὸν
  english_pob_choice: let him deny himself
  chosen_korean: 자기 자신을 부인하고
  alternatives_korean:
  - 자기 자신을 거부하고
  lexicon: BDAG
  rationale: ἀπαρνέομαι의 명령형. 한국 성경 정착어 「부인하다」가 자기에 대한 단호한 거부의 의미를 살린다.
- source_word: ἀράτω τὸν σταυρὸν αὐτοῦ
  english_pob_choice: take up his cross
  chosen_korean: 자기 십자가를 지고
  lexicon: BDAG
  rationale: αἴρω는 「들다·짊어지다」. 한국어에서는 「짊어지다」보다 「지다」가 더 자연스럽고 한국 성경 정착어이다.
