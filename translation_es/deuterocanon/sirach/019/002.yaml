translation:
  language: es
  text: El vino y las mujeres desvían el corazón[a], y un alma temeraria destruye a su dueño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «El vino y las mujeres apartarán a los de entendimiento, y el que se aferra a prostitutas se volverá más temerario». El testimonio hebreo difiere sustancialmente en la segunda línea.'
    reason: alternative_reading
lexical_decisions:
- source_word: יַיִן
  english_pob_choice: Wine
  chosen_spanish: vino
  alternatives_spanish:
  - Vino
  lexicon: HALOT
  rationale: Término directo y natural para el producto fermentado; se conserva el primer elemento de la advertencia sin suavizarlo.
- source_word: נָשִׁים
  english_pob_choice: women
  chosen_spanish: mujeres
  alternatives_spanish:
  - esposas
  - mujeres casadas
  lexicon: HALOT
  rationale: El hebreo פשוט plural indica 'mujeres' en general; no hay base suficiente para restringirlo a 'esposas'.
- source_word: יַפְחִיזוּ
  english_pob_choice: lead ... astray
  chosen_spanish: desvían
  alternatives_spanish:
  - desenfrenan
  - vuelven errante
  - hacen errar
  lexicon: HALOT
  rationale: El verbo expresa hacer apartar o volver inestable. 'Desvían' conserva la idea de apartar del buen camino sin añadir más de lo que el hebreo exige.
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  - corazón interior
  lexicon: HALOT
  rationale: En español bíblico, 'corazón' comunica el centro interior de pensamiento y deseo, manteniendo la antropología hebrea que POB preserva.
- source_word: עָזָה
  english_pob_choice: bold
  chosen_spanish: audaz
  alternatives_spanish:
  - atrevida
  - arrojada
  - temeraria
  lexicon: HALOT
  rationale: '''Audaz'' refleja la fuerza/atrevimiento del adjetivo y permite una carga negativa implícita sin convertirla en un término más fuerte que el texto.'
- source_word: תַשְׁחִית
  english_pob_choice: destroys
  chosen_spanish: destruye
  alternatives_spanish:
  - arruina
  - corrompe
  - causa ruina a
  lexicon: HALOT
  rationale: Verbo fuerte y directo que reproduce la severidad del hebreo; no se atenúa a 'arruina' porque el contexto moral es contundente.
- source_word: בְעָלֶיהָ
  english_pob_choice: its owner
  chosen_spanish: a su dueño
  alternatives_spanish:
  - a quien la posee
  - a su propietario
  - a su amo
  lexicon: HALOT
  rationale: La relación posesiva del hebreo se expresa de forma natural en español con 'su dueño'; 'amo' sonaría excesivamente servil en este contexto.
theological_decisions:
- issue: 'Base textual principal: hebreo frente a paralelo griego'
  english_pob_reading: Translate the extant Hebrew directly, while allowing the Greek to confirm the general sense of moral deflection/recklessness.
  chosen_spanish_reading: Traducir directamente el hebreo conservado, dejando que el griego funcione como paralelo de control y como lectura alternativa documentada.
  alternative_spanish_readings:
  - 'Un enfoque guiado por el griego: ''El vino y las mujeres apartarán a los de entendimiento, y el que se aferra a prostitutas se volverá más temerario''.'
  rationale: El testimonio hebreo existente es la base principal de la línea publicada. El paralelo griego aporta una variante sustancial en la segunda cola y se conserva en nota, sin armonizarlo dentro del texto principal.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; usar el paralelo griego como dato real sin desplazar el testimonio principal.'
translation_notes:
  revision_awareness: Se siguió el testimonio hebreo de Kahana como texto principal, tal como indica el contexto auditado, y se mantuvo la diferencia sustancial del griego en nota sin armonizarla. No se introdujeron términos eclesiásticos ajenos al hebreo; 'dueño' conserva la relación posesiva de בְעָלֶיהָ sin volverla técnica ni doctrinal.
  spanish_consistency_notes:
  - Se mantuvo 'vino' y 'mujeres' de forma literal y neutral, conforme al hebreo.
  - '''Corazón'' se usa en sentido antropológico hebreo, no solo emocional.'
  - '''Audaz'' preserva la fuerza moral del adjetivo sin exagerarla como ''temeraria'' en el texto principal.'
  - La nota al pie usa un marcador único [a] y recoge la lectura griega alternativa, conforme al aparato auditado.
