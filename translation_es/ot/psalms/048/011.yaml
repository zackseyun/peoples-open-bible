translation:
  language: es
  text: Como es tu nombre, oh Dios, así tu alabanza llega hasta los confines de la tierra[a]; tu diestra está llena de rectitud[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu alabanza está sobre los confines de la tierra». La preposición hebrea es literalmente «sobre/encima de», y el verso puede traducirse de manera más formal.
    reason: lexical_alternative
  - marker: b
    text: O «justicia». El hebreo צֶדֶק puede denotar rectitud o justicia.
    reason: alternative_reading
lexical_decisions:
- source_word: כְּשִׁמְךָ
  english_pob_choice: As your name
  chosen_spanish: Como tu nombre
  alternatives_spanish:
  - Así como tu nombre
  - Tal como tu nombre
  lexicon: HALOT
  rationale: El prefijo כ expresa comparación. «Como tu nombre» conserva la relación comparativa con el paralelo «así» y mantiene el sustantivo concreto «nombre», que en hebreo puede implicar fama o renombre sin obligar a explicarlo en el texto principal.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - ¡oh, Dios!
  lexicon: HALOT
  rationale: El contexto es vocativo; en español, «oh Dios» reproduce la apelación directa en registro poético y reverente sin alterar el sentido.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de igual modo
  - de la misma manera
  lexicon: HALOT
  rationale: «Así» preserva la correlación con el primer cola comparativo y suena natural en español bíblico contemporáneo.
- source_word: תְּהִלָּתְךָ
  english_pob_choice: your praise
  chosen_spanish: tu alabanza
  alternatives_spanish:
  - tu fama
  - la alabanza que recibes
  lexicon: HALOT
  rationale: Aunque el sustantivo puede sugerir fama o renombre, la noción más directa es «alabanza». «Tu alabanza» es fiel y evita introducir una interpretación más amplia que el texto no exige.
- source_word: עַל קַצְוֵי אֶרֶץ
  english_pob_choice: reaches to the ends of the earth
  chosen_spanish: llega hasta los confines de la tierra
  alternatives_spanish:
  - se extiende sobre los confines de la tierra
  - está sobre los confines de la tierra
  lexicon: HALOT
  rationale: La preposición עַל admite «sobre/encima», pero el contexto poético favorece la idea de alcance. «Llega hasta» expresa bien la extensión y conserva la imagen universal sin forzar un calco.
- source_word: צֶדֶק
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia y rectitud
  lexicon: HALOT
  rationale: El inglés POB preserva la tensión entre «righteousness» y «justice». En español, «justicia» es una opción legítima y natural; además, evita que el verso suene redundante con un término demasiado devocionalizado. Se conserva la alternativa en nota por su valor semántico.
- source_word: יְמִינֶךָ
  english_pob_choice: your right hand
  chosen_spanish: tu diestra
  alternatives_spanish:
  - tu mano derecha
  - tu mano diestra
  lexicon: HALOT
  rationale: «Diestra» es el equivalente bíblico y poético más natural en español para la imagen de poder y acción de la mano derecha.
- source_word: מָלְאָה
  english_pob_choice: is full
  chosen_spanish: está llena
  alternatives_spanish:
  - está llena de
  - se halla llena
  lexicon: HALOT
  rationale: El perfecto hebreo describe un estado resultante presente. «Está llena» mantiene la imagen y sigue de cerca la revisión inglesa que prefirió «full» frente a «filled» por naturalidad.
theological_decisions:
- issue: Cómo traducir צֶדֶק aplicado a la diestra de Dios
  english_pob_reading: righteousness, with 'justice' preserved as a footnote alternative
  chosen_spanish_reading: justicia, con «rectitud» preservado como alternativa en nota
  alternative_spanish_readings:
  - rectitud
  - justicia y rectitud
  rationale: El término hebreo abarca justicia judicial y rectitud moral. Para español, «justicia» comunica bien el campo semántico y suena natural en la imagen de la diestra divina; la nota conserva una alternativa válida para no perder la tensión léxica.
  doctrine_reference: 'DOCTRINE.md Contested terms: terms spanning moral/legal nuance should preserve both poles where possible; applied here to Hebrew צֶדֶק.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que prefirió «full of righteousness» frente a «filled with righteousness» por naturalidad. En español se reflejó con «está llena de justicia», manteniendo el estado resultante sin introducir una formulación más pesada.
  spanish_consistency_notes:
  - Se usó «oh Dios» para el vocativo, coherente con el valor apelativo del hebreo.
  - Se mantuvo «nombre» sin sustituirlo por «renombre» en el texto principal para respetar la concreción del hebreo.
  - «Con fines de la tierra» se evitó en favor de «confin(es) de la tierra» dentro de la equivalencia poética natural.
  - Se eligió «diestra» como término bíblico estable para יְמִינֶךָ.
  - La nota de a fue anclada en «justicia» porque la alternativa de la cláusula inicial ya quedó integrada en la línea principal, y la ambigüedad principal que se desea preservar en español es la de la preposición עַל.
