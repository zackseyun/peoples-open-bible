  text: 날이 저물기 시작하니, 열둘이 다가와 예수께 말하였습니다. 「무리를 보내시어, 그들이 주위의 마을과 들로 가서 묵을 곳과 먹을 것을 얻게 하소서. 우리가 여기 외딴 곳에 있기 때문입니다.」
