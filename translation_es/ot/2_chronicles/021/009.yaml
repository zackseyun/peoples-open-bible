translation:
  language: es
  text: Entonces Yoram cruzó con sus comandantes y con todos los carros que estaban con él. Y aconteció que se levantó de noche e hirió a Edom, que lo había rodeado, y a los comandantes de los carros[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Otra posibilidad: «los comandantes de carros» o «los jefes del cuerpo de carros»; la frase hebrea puede referirse específicamente a oficiales encargados de la fuerza de carros.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבֹר
  english_pob_choice: crossed over
  chosen_spanish: pasó
  alternatives_spanish:
  - cruzó
  - pasó al otro lado
  - atravesó
  lexicon: HALOT
  rationale: עבר puede expresar simplemente pasar o cruzar. En español, "pasó" conserva la acción de desplazarse sin añadir una meta que el hebreo no especifica explícitamente en este versículo.
- source_word: שָׂרָיו
  english_pob_choice: his commanders
  chosen_spanish: sus comandantes
  alternatives_spanish:
  - sus príncipes
  - sus oficiales
  - sus capitanes
  lexicon: HALOT
  rationale: שַׂר puede abarcar gobernante, oficial o líder militar. En este contexto de guerra y carros, "comandantes" comunica bien la función militar sin introducir una jerarquía más precisa de la que el texto exige.
- source_word: הָרֶכֶב
  english_pob_choice: the chariots
  chosen_spanish: los carros
  alternatives_spanish:
  - la fuerza de carros
  - los carros de guerra
  - la caballería
  lexicon: HALOT
  rationale: רֶכֶב designa el conjunto de carros de guerra o carrocería militar. "Carros" mantiene cercanía formal al hebreo y es natural en español bíblico; "caballería" sería demasiado interpretativo.
- source_word: וַיְהִי קָם לַיְלָה
  english_pob_choice: And it happened that he arose by night
  chosen_spanish: Y aconteció que se levantó de noche
  alternatives_spanish:
  - Entonces se levantó de noche
  - Se levantó de noche
  - Y sucedió que se alzó de noche
  lexicon: HALOT
  rationale: La fórmula narrativa וַיְהִי + participio se reproduce con "aconteció que", una solución reverente y natural en español que conserva el matiz de transición narrativa. "Se levantó de noche" evita agregar explicaciones ajenas al hebreo.
- source_word: וַיַּךְ
  english_pob_choice: struck
  chosen_spanish: atacó
  alternatives_spanish:
  - hirió
  - golpeó
  - derrotó
  - mató
  lexicon: HALOT
  rationale: 'נכה es amplio: golpear, herir, atacar o derrotar. Dado que el objeto es Edom en un contexto militar, "atacó" comunica la acción bélica sin afirmar más de lo que el verbo por sí solo garantiza. Se evita "derrotó" porque sería más conclusivo que el hebreo aquí.'
- source_word: אֱדוֹם
  english_pob_choice: Edom
  chosen_spanish: Edom
  alternatives_spanish:
  - Idumea
  lexicon: HALOT
  rationale: Nombre propio nacional; se conserva la forma transliterada estándar."},{
translation_notes:
  revision_awareness: Se siguió la lectura inglesa de alta concordancia, pero se ajustó el tramo final para reflejar de forma más directa el hebreo, manteniendo la ambigüedad de נכה sin cargarlo con un resultado no explicitado. También se evitó ampliar el alcance de רֶכֶב con «caballería» y se conservó la fórmula narrativa con un castellano natural.
  spanish_consistency_notes:
  - Se mantuvo el nombre propio «Yoram» en lugar de «Jehoram» para una transliteración más cercana al hebreo, aunque la traducción inglesa usa «Jehoram»; si la serie española del proyecto prefiere una forma histórica uniforme, esto debería armonizarse en revisión editorial.
  - «Carros» se usó como equivalente general de רֶכֶב, coherente con el contexto militar del pasaje.
  - La nota [a] se ancla en «atacó» para señalar la amplitud de נכה y no cerrar prematuramente el sentido.
