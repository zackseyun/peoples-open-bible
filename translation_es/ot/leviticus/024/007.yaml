revisions:
- from: Y pondrás sobre la hilera incienso puro[a]; y será para el pan como porción memorial[b], ofrenda encendida para Yahvé.
  to: Y pondrás sobre cada hilera[a] olíbano puro, y será para el pan como porción memorial[b], una ofrenda por fuego para Yahvé.
  rationale: Se ajusta הַמַּעֲרֶכֶת a 'cada hilera' para reflejar el distributivo documentado; se precisa לְבֹנָה como 'olíbano puro'; y se mejora la naturalidad cultual de אִשֶּׁה con 'ofrenda por fuego', preservando en nota la alternativa del English POB 'food offering' como 'ofrenda alimentaria'.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:28:35Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: mandato ritual, colocación sobre la disposición del pan, función cultual del incienso respecto del pan, y cierre sacrificial dirigido a Yahvé. Sin embargo, hay dos desajustes relevantes con la evidencia fuente y el rastro POB: הַמַּעֲרֶכֶת se auditó como distributivo ''cada hilera'', no simplemente singular ''la hilera''; y לְבֹנָה es más precisamente ''olíbano'' o ''incienso aromático/frankincense'', mientras que ''incienso'' en español puede sonar demasiado genérico o incluso al producto ya quemado.'
  spanish_quality_summary: El español es claro y digno, pero 'incienso puro' es menos preciso de lo deseable en un contexto levítico técnico, y 'ofrenda encendida' suena algo poco idiomática frente a la alternativa establecida 'ofrenda por fuego'. 'Como porción memorial' funciona bien. La puntuación con punto y coma es aceptable, aunque el flujo mejora sin exceso de literalismo.
  glossary_alignment: Se alinea correctamente con 'Yahvé' para יהוה. No hay conflicto mayor con otras políticas del glosario. La principal mejora terminológica es preferir 'olíbano puro' para לְבֹנָה זַכָּה y hacer explícito el valor distributivo de הַמַּעֲרֶכֶת como 'cada hilera', conforme al audit trail inglés.
  issues:
  - severity: medium
    issue: הַמַּעֲרֶכֶת se tradujo 'la hilera' en vez de un distributivo explícito.
    rationale: El English POB documenta que el singular colectivo hebreo aquí funciona distributivamente en el contexto de las dos hileras del pan. 'Cada hilera' preserva mejor esa decisión auditada y evita ambigüedad.
  - severity: medium
    issue: לְבֹנָה se vertió como 'incienso', término demasiado general.
    rationale: En este contexto sacrificial el referente léxico específico es frankincense, que en español bíblico se expresa mejor como 'olíbano'. 'Incienso' puede perder precisión material y cultual.
  - severity: low
    issue: אִשֶּׁה como 'ofrenda encendida' resulta menos natural.
    rationale: Aunque comprensible, no es la formulación española más idiomática para el tecnicismo sacerdotal. 'Ofrenda por fuego' es más transparente y ya está preservada como alternativa significativa en la nota inglesa.
  revised_spanish_text: Y pondrás sobre cada hilera[a] olíbano puro, y será para el pan como porción memorial[b], una ofrenda por fuego para Yahvé.
  revised_footnotes:
  - marker: a
    text: O «el arreglo»; en este contexto se refiere a las hileras ordenadas del pan.
    reason: lexical_alternative
  - marker: b
    text: O «una ofrenda alimentaria».
    reason: lexical_alternative
  revision_rationale: Se ajusta הַמַּעֲרֶכֶת a 'cada hilera' para reflejar el distributivo documentado; se precisa לְבֹנָה como 'olíbano puro'; y se mejora la naturalidad cultual de אִשֶּׁה con 'ofrenda por fuego', preservando en nota la alternativa del English POB 'food offering' como 'ofrenda alimentaria'.
