revisions:
- from: Pero si hay en la calva[a] o en la frente calva[b] una lesión rojiblanca, es una sarna que brota en su calva o en su frente calva.
  to: Pero si hay en la calva[a] o en la frente calva una lesión rojiblanca, es una enfermedad cutánea[b] que brota en su calva o en su frente calva.
  rationale: Se reemplaza «sarna» por «enfermedad cutánea» para reflejar con fidelidad el alcance más amplio de צָרַעַת según la auditoría inglesa y evitar una identificación médica errónea. Se corrigen los anclajes de las notas al pie para que la nota cultural quede en «calva» y la nota léxica sobre «lepra» quede en el término que traduce צָרַעַת. Se conserva la distinción «calva / frente calva» y la imagen verbal «que brota».
  reviewer_model: gpt-5.4
