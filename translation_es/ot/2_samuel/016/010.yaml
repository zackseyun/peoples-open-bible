revisions:
- from: 'Pero el rey dijo[a]: «¿Qué tengo yo que ver con ustedes, hijos de Saruía? Si él está maldiciendo, porque Yahvé le ha dicho: “Maldice a David”, entonces ¿quién puede decir: “¿Por qué has hecho así?”»'
  to: 'Pero el rey dijo[a]: «¿Qué tengo yo que ver con ustedes, hijos de Saruía? Si él está maldiciendo, porque Yahvé le ha dicho: “Maldice a David”, entonces ¿quién puede decir: “¿Por qué has actuado así?”»'
  rationale: Se mantiene la traducción base porque es fiel al hebreo y a la POB inglesa, pero se sustituye «¿Por qué has hecho así?» por «¿Por qué has actuado así?» para lograr un español más natural y legible sin perder la fuerza retórica ni el sentido del original.
