review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura del versículo, conserva correctamente Yahvé para יְהוָה, mantiene la tríada legal y refleja el modismo final con nota. Sin embargo, falla en una concordancia gramatical importante: ''las estatutos'' debe ser ''los estatutos''. Además, ''entre él y los hijos de Israel'' es entendible, pero ''entre sí y los hijos de Israel'' sería poco natural; la forma actual es aceptable. El resto se alinea suficientemente con el hebreo y con la auditoría inglesa.'
  spanish_quality_summary: 'La calidad general es buena y legible, con registro digno y claro. El problema principal es morfosintáctico: el artículo femenino en ''las estatutos'' vuelve el texto incorrecto en español. Conviene también pulir la nota b quitando comillas innecesarias de estilo YAML, pero eso es menor. ''Por mano de Moisés'' suena algo formal, pero es defendible y queda aclarado por la nota.'
  glossary_alignment: Cumple con la terminología del proyecto en 'Yahvé', 'hijos de Israel' y el mantenimiento del modismo 'por mano de Moisés' con nota explicativa. 'Leyes' para תּוֹרוֹת y 'juicios' para מִשְׁפָּטִים son coherentes con la base auditada. No hay conflicto doctrinal relevante.
  issues:
  - severity: high
    issue: Concordancia incorrecta en 'las estatutos'
    rationale: '''Estatutos'' es masculino plural; la forma correcta es ''los estatutos''. Tal como está, el texto español es gramaticalmente defectuoso.'
  - severity: low
    issue: Puntuación/estilo de la nota b
    rationale: 'La nota aparece con comillas externas innecesarias: ''Hebreo: ...''. No afecta el sentido, pero conviene normalizarla para una presentación editorial limpia.'
  revised_spanish_text: Estos son los estatutos, los juicios y las leyes que Yahvé dio entre él y los hijos de Israel en el monte Sinaí por mano de Moisés[a][b].
  revised_footnotes:
  - marker: a
    text: O “los israelitas”.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: “por mano de Moisés”, un modismo que significa “por medio de Moisés”.'
    reason: cultural_note
  revision_rationale: Se corrigió la concordancia gramatical cambiando 'las estatutos' por 'los estatutos' y, para mantener la concordancia deíctica más natural en la apertura, 'Estas son' por 'Estos son'. También se normalizó la puntuación editorial de la nota b. No se requieren cambios de fondo en la exégesis ni en la terminología del proyecto.
