review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del arameo: una cláusula identificativa seguida de otra sobre el decreto del Altísimo que ha venido sobre el rey. Conserva adecuadamente «interpretación», «decreto», «el Altísimo», «ha venido sobre» y «mi señor el rey». La única desviación relevante está en la nota: el texto principal ya dice «el Altísimo», así que la nota «O «el Altísimo»» no preserva la alternativa inglesa documentada, que era «el Más Alto / el Ser Altísimo / el Supremo» equivalente a «the Highest One».'
  spanish_quality_summary: El español es claro, digno y natural para un registro bíblico. «oh rey» y «mi señor el rey» son legibles y apropiados. La sintaxis funciona bien. Solo necesita corregirse la nota para que no repita la lectura principal y para que ofrezca una alternativa real y útil en español.
  glossary_alignment: 'Alineado con la terminología del proyecto: no aparecen términos conflictivos; «el Altísimo» corresponde correctamente a עִלָּיָא. No hay conflicto con Yahvé/Mesías ni otras políticas globales. La decisión léxica principal está bien documentada; la excepción está únicamente en el contenido de la nota alternativa.'
  issues:
  - severity: medium
    issue: La nota al pie repite la lectura principal en vez de ofrecer una alternativa real.
    rationale: El inglés auditado tiene la alternativa «the Highest One». En español, la nota actual «O «el Altísimo»» no añade información porque es idéntica al texto principal. Debe reflejar una alternativa como «el Ser Altísimo» o «el Más Alto», manteniendo la explicación teológica.
  revised_spanish_text: 'Esta es[a] la interpretación, oh rey, y es un decreto del Altísimo que ha venido sobre mi señor el rey:'
  revised_footnotes:
  - marker: a
    text: O «el Ser Altísimo». El título arameo designa a Dios como supremo sobre todos los gobernantes.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel al arameo y suena natural en español bíblico moderno. Solo se corrige la nota al pie para que preserve la alternativa léxica documentada en el audit trail inglés, en lugar de repetir la lectura principal.
