translation:
  language: es
  text: un macho cabrío como ofrenda por el pecado;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: שְׂעִיר
  english_pob_choice: male goat
  chosen_spanish: macho cabrío
  alternatives_spanish:
  - cabra macho
  - chivo
  lexicon: HALOT, BDB
  rationale: En el contexto sacrificial, שְׂעִיר designa un macho de la especie caprina. “Macho cabrío” comunica el sexo del animal y suena natural en español bíblico sin perder precisión ritual.
- source_word: עִזִּים
  english_pob_choice: male goat
  chosen_spanish: macho cabrío
  alternatives_spanish:
  - de cabras
  lexicon: HALOT, BDB
  rationale: La construcción hebrea refuerza que se trata de un caprino macho dentro del tipo de animal ofrecido. En español, repetir “de cabras” resultaría forzado; “macho cabrío” condensa fielmente la expresión idiomática.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - un solo
  lexicon: HALOT, BDB
  rationale: אֶחָד expresa el número del animal ofrecido. “Uno” mantiene el estilo enumerativo de la lista ritual en Números 7.
- source_word: לְחַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: como ofrenda por el pecado
  alternatives_spanish:
  - para ofrenda por el pecado
  - como sacrificio por el pecado
  lexicon: HALOT, BDB
  rationale: En un inventario sacrificial, חַטָּאת nombra la categoría de ofrenda, no el pecado en abstracto. “Ofrenda por el pecado” conserva el valor cultual; “como” refleja bien la función listativa del hebreo.
theological_decisions:
- issue: Terminología sacrificial de חַטָּאת
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda expiatoria
  - sacrificio por el pecado
  rationale: El contexto de Números 7 es una lista de ofrendas prescritas. “Ofrenda por el pecado” evita reducir el término a una noción moral vaga y mantiene la categoría ritual, en consonancia con la lectura inglesa auditada.
  doctrine_reference: 'Translation philosophy: original-language primacy; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: La revisión inglesa final no introdujo cambios; el texto sigue el acuerdo alto del control cruzado y por eso la versión española mantiene la equivalencia óptima sin añadir matices no sustentados por el hebreo.
  spanish_consistency_notes:
  - Se preserva el valor cultual de חַטָּאת como categoría sacrificial.
  - No se fuerza una distinción entre “macho cabrío” y “chivo” que el hebreo no exige en este versículo.
  - Se mantiene el tono conciso de una lista de ofrendas, adecuado al estilo de Números 7.
