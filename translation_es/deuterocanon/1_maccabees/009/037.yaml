  - severity: low
    issue: La coordinación «..., y que llevaban...» suena algo pesada.
    rationale: Tras «se informó ... que», el segundo verbo puede coordinarse sencillamente con «y llevaban»; esto mejora la fluidez sin cambiar la estructura semántica.
