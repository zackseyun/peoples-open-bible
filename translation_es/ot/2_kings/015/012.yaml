translation:
  language: es
  text: 'Esta fue la palabra de Yahvé que le habló a Jehú, diciendo: «Tus hijos hasta la cuarta generación se sentarán en el trono de Israel». Y así sucedió.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: הוּא
  english_pob_choice: This was
  chosen_spanish: Esta fue
  alternatives_spanish:
  - Fue
  - Esto fue
  lexicon: HALOT
  rationale: El hebreo usa un pronombre demostrativo que retoma el cumplimiento de lo dicho antes. En español, «Esta fue» conserva ese valor retrospectivo con una formulación natural y lecturales.
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la palabra del Señor
  lexicon: HALOT
  rationale: דְבַר aquí designa una declaración hablada o promesa divina. «Palabra» preserva el giro bíblico y su peso de revelación; «Yahvé» mantiene el nombre propio divino conforme al criterio del proyecto.
- source_word: אֲשֶׁר דִּבֶּר אֶל יֵהוּא
  english_pob_choice: that he spoke to Jehu
  chosen_spanish: que él habló a Jehú
  alternatives_spanish:
  - que había hablado a Jehú
  - que dijo a Jehú
  lexicon: HALOT
  rationale: La cláusula relativa es directa. «Habló a» corresponde bien a דִּבֶּר אֶל y conserva el vínculo formal con el oráculo citado.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - cuando dijo
  lexicon: HALOT
  rationale: Es el introductor estándar de cita. «Diciendo» es la equivalencia más transparente y mantiene la continuidad del discurso.
- source_word: בְּנֵי רְבִיעִים
  english_pob_choice: Your sons to the fourth generation
  chosen_spanish: Tus hijos hasta la cuarta generación
  alternatives_spanish:
  - Tus descendientes hasta la cuarta generación
  - Tus hijos, de la cuarta generación
  lexicon: HALOT
  rationale: La expresión idiomática apunta a la continuación de la línea de Jehú por cuatro generaciones. «Hijos» conserva el lenguaje filial del hebreo, y «hasta la cuarta generación» expresa la extensión temporal de modo natural en español.
- source_word: יֵשְׁבוּ לְךָ
  english_pob_choice: shall sit
  chosen_spanish: se sentarán
  alternatives_spanish:
  - reinarán
  - ocuparán el trono
  lexicon: HALOT
  rationale: Con «sentarse en el trono» se conserva la metáfora dinástica del hebreo. En español, el futuro de indicativo comunica la promesa; «reinarán» sería más interpretativo y menos pegado al verbo usado.
- source_word: עַל כִּסֵּא יִשְׂרָאֵל
  english_pob_choice: on the throne of Israel
  chosen_spanish: en el trono de Israel
  alternatives_spanish:
  - sobre el trono de Israel
  - en el trono de Israel
  lexicon: HALOT
  rationale: 'La imagen real es concreta: el trono. «En el trono de Israel» es la forma más natural en español para este giro de entronización.'
- source_word: וַיְהִי כֵן
  english_pob_choice: And so it happened
  chosen_spanish: Y así sucedió
  alternatives_spanish:
  - Y así fue
  - Y aconteció así
  lexicon: HALOT
  rationale: La fórmula señala cumplimiento. «Y así sucedió» transmite de forma natural el resultado realizado sin perder el valor narrativo de cumplimiento.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Siguiendo la norma del proyecto, se traduce por el nombre propio «Yahvé», no por una sustitución titulada como «SEÑOR», para preservar la referencia al nombre revelado de Dios.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Se mantuvo la lectura de alta concordancia del audit trail inglés sin cambios relevantes. La versión española sigue de cerca el hebreo, conservando el paralelismo entre la promesa divina y su cumplimiento narrativo.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - «Jehú» sigue la forma castellana habitual del nombre propio, equivalente a Jehu.
  - Se mantuvo el valor idiomático de «sentarse en el trono» para no sustituirlo por una glosa interpretativa como «reinar».
