revisions:
- from: Así que Abraham tomó a Ismael, su hijo[a], y a todos los nacidos en su casa, y a todos los comprados con su dinero, a todo varón entre los hombres de la casa de Abraham, y circuncidó la carne de su prepucio en aquel mismo día[b][d], tal como Dios le había hablado[c].
  to: Entonces Abraham tomó a Ismael, su hijo, y a todos los nacidos en su casa, y a todos los comprados con su dinero[a], a todo varón entre los hombres de la casa de Abraham[b], y circuncidó la carne de sus prepucios ese mismo día[c], tal como Dios le había hablado[d].
  rationale: 'La revisión corrige tres problemas principales: (1) reubica la nota sobre «adquiridos con su plata» en la frase correcta; (2) ajusta «su prepucio» a plural para reflejar el hebreo; y (3) elimina la nota duplicada y normaliza el modismo a «ese mismo día». También cambia «Así que» por «Entonces» para un registro más bíblico-natural. Se mantiene la correspondencia con el hebreo y con las decisiones léxicas del POB.'
