translation:
  language: es
  text: Cuando se acabó el agua del odre[a], ella arrojó[b] al niño debajo de uno de los arbustos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «del pellejo» o «de la piel». El hebreo se refiere a un recipiente hecho de piel de animal.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «tiró». El verbo hebreo es más fuerte que un simple «poner» o «colocar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּכְלוּ
  english_pob_choice: was gone
  chosen_spanish: se acabó
  alternatives_spanish:
  - se terminó
  - se agotó
  - se consumió
  lexicon: HALOT
  rationale: כלה expresa que algo llega a su fin o se agota. En español, «se acabó» comunica de forma natural la idea de agotamiento del agua sin cargar el texto con literalidad rígida.
- source_word: הַמַּיִם
  english_pob_choice: the water
  chosen_spanish: el agua
  alternatives_spanish:
  - las aguas
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural, aquí funciona como sustantivo de masa. En español, el singular «el agua» es la equivalencia natural y fiel al uso narrativo.
- source_word: מִן הַחֵמֶת
  english_pob_choice: in the skin
  chosen_spanish: del odre
  alternatives_spanish:
  - del pellejo
  - de la bolsa de piel
  - del recipiente de cuero
  lexicon: HALOT
  rationale: חֵמֶת designa un recipiente hecho de piel de animal. «Odre» es el término español tradicional y comprensible que conserva la imagen concreta del contenedor de piel.
- source_word: וַתַּשְׁלֵךְ
  english_pob_choice: she cast
  chosen_spanish: arrojó
  alternatives_spanish:
  - tiró
  - echó
  lexicon: HALOT
  rationale: La raíz שלך tiene fuerza de lanzar/arrojar. «Arrojó» mantiene esa acción brusca y evita suavizarla con verbos demasiado débiles como «colocó».
- source_word: אֶת הַיֶּלֶד
  english_pob_choice: the boy
  chosen_spanish: al niño
  alternatives_spanish:
  - al muchacho
  - al hijo
  lexicon: HALOT
  rationale: יֶלֶד se refiere a un niño o muchacho. Aquí «niño» es claro, natural y mantiene la referencia masculina sin introducir un matiz más interpretativo que el hebreo.
- source_word: תַּחַת
  english_pob_choice: under
  chosen_spanish: debajo de
  alternatives_spanish:
  - bajo
  lexicon: HALOT
  rationale: La preposición indica ubicación inferior. «Debajo de» suena natural en español narrativo y expresa con claridad la posición del niño.
- source_word: אַחַד הַשִּׂיחִם
  english_pob_choice: one of the bushes
  chosen_spanish: uno de los arbustos
  alternatives_spanish:
  - uno de los matorrales
  - uno de los arbustos del desierto
  lexicon: HALOT
  rationale: שִׂיחַ puede referirse a arbusto o mata. «Arbustos» es una opción clara y pública en español, suficientemente amplia para el contexto sin exagerar la especificidad.
translation_notes:
  revision_awareness: Texto revisado contra el pasaje hebreo masorético y el rastro auditado en inglés; se mantuvo la fuerza verbal de וַתַּשְׁלֵךְ y la imagen concreta del recipiente de piel. No se requirieron revisiones textuales adicionales.
  spanish_consistency_notes:
  - Se prefirió «odre» como equivalente transparente de חֵמֶת por ser un término español establecido para un recipiente de piel.
  - Se mantuvo el tono narrativo sobrio y directo, acorde con el hebreo.
  - «Arrojó» conserva la intensidad del verbo original sin volverlo coloquial en exceso.
