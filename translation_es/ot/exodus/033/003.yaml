translation:
  language: es
  text: a una tierra que fluye con leche y miel. Porque no subiré en medio de ti[a], pues eres un pueblo de cerviz dura, no sea que te consuma[b] en el camino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre ustedes» o «contigo» para «en medio de ti».
    reason: lexical_alternative
  - marker: b
    text: O «te destruya» para «te consuma».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶל אֶרֶץ
  english_pob_choice: to a land
  chosen_spanish: a una tierra
  alternatives_spanish:
  - a la tierra
  lexicon: HALOT
  rationale: El hebreo con אֶל expresa dirección hacia un destino; en español, «a una tierra» conserva ese movimiento y el carácter no marcado del indefinido, que en contexto apunta a la tierra prometida sin necesidad de hacerla explícita.
- source_word: זָבַת חָלָב וּדְבָשׁ
  english_pob_choice: flowing with milk and honey
  chosen_spanish: que fluye con leche y miel
  alternatives_spanish:
  - rebosante de leche y miel
  - manando leche y miel
  lexicon: HALOT
  rationale: «Fluye» mantiene la imagen idiomática de abundancia sin volverla demasiado literal o áspera en español. «Leche y miel» conserva la fórmula tradicional y la metáfora de fertilidad y prosperidad.
- source_word: בְּקִרְבְּךָ
  english_pob_choice: in your midst
  chosen_spanish: en medio de ti
  alternatives_spanish:
  - entre ustedes
  - con ustedes
  lexicon: HALOT
  rationale: En español, «en medio de ti» reproduce bien la idea espacial y comunitaria de la presencia divina dentro del pueblo. Se evita «con ustedes» porque suaviza la tensión teológica del texto; «entre ustedes» es posible, pero menos literal a la imagen de interioridad comunitaria.
- source_word: עַם
  english_pob_choice: people
  chosen_spanish: un pueblo
  alternatives_spanish:
  - una nación
  lexicon: HALOT
  rationale: «Pueblo» es el equivalente más natural y fiel para ישראל como colectivo del pacto en este contexto; «nación» introduciría un matiz político más fuerte que el hebreo no exige aquí.
- source_word: קְשֵׁה עֹרֶף
  english_pob_choice: stiff-necked
  chosen_spanish: de cerviz dura
  alternatives_spanish:
  - duro de cerviz
  - terco
  - de cuello rígido
  lexicon: HALOT
  rationale: La expresión literal «de cerviz dura» conserva el hebraísm o metafórico y la fuerza idiomática del original. «Stiff-necked» en inglés suele verterse así en español bíblico; se evita «terco» porque aplana la imagen corporal del hebreo.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - o si no
  lexicon: HALOT
  rationale: «No sea que» expresa en español el valor precautorio de פֶּן, es decir, la prevención de un resultado temido. Es más natural que un calco directo y mantiene la advertencia del texto.
- source_word: אֲכֶלְךָ
  english_pob_choice: I consume you
  chosen_spanish: te consuma
  alternatives_spanish:
  - te destruya
  - te aniquile
  lexicon: HALOT
  rationale: «Consumir» preserva la imagen verbal de כָּלָה y la severidad de juicio sin especificar un modo más concreto que el hebreo. En español, el complemento enclítico «te» hace que la frase sea natural y directa.
- source_word: בַּדָּרֶךְ
  english_pob_choice: on the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - durante el viaje
  - a lo largo del camino
  lexicon: HALOT
  rationale: «En el camino» es claro y idiomático en español para la ruta de la travesía. «Camino» conserva la concreción espacial del hebreo sin añadir ideas ajenas.
theological_decisions:
- issue: La presencia divina en medio del pueblo
  english_pob_reading: I will not go up in your midst
  chosen_spanish_reading: no subiré en medio de ti
  alternative_spanish_readings:
  - no subiré entre ustedes
  - no subiré con ustedes
  rationale: 'Se conserva la tensión teológica del texto: la presencia de Yahvé en medio de un pueblo rebelde es peligrosa, no solo acompañante. «En medio de ti» mantiene esa cercanía amenazante sin resolverla.'
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
- issue: El posible juicio expresado por אֲכֶלְךָ
  english_pob_reading: lest I consume you
  chosen_spanish_reading: no sea que te consuma
  alternative_spanish_readings:
  - no sea que te destruya
  - no sea que te aniquile
  rationale: «Consumir» conserva el lenguaje de juicio del hebreo y la posibilidad de una destrucción causada por la santidad divina, sin añadir una forma de castigo no explícita en el texto.
  doctrine_reference: Translation philosophy §1 Original-language primacy over translation tradition
translation_notes:
  revision_awareness: La redacción sigue de cerca el consenso del audit trail inglés, incluyendo la relación causal de כִּי como «Porque». Se preserva la imagen idiomática de «fluye con leche y miel», la presencia divina «en medio de ti» y el verbo de juicio «consuma», manteniendo las alternativas documentadas en notas breves.
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando el contexto lo requiera en la obra completa; en este versículo no aparece el tetragrámaton de forma explícita en el segmento entregado, por lo que no se añade aquí.
  - Se prefirió «pueblo» sobre «nación» para mantener la referencia corporativa del pacto.
  - «Cerviz dura» se mantiene como hebraísmo reconocible en registro bíblico, coherente con una traducción fuente-auditada.
  - «En medio de ti» conserva el singular colectivo del hebreo, dirigido al pueblo como unidad.
