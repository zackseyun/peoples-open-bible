base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/015/023.yaml
  text: 'But each in his own order: Messiah the firstfruits[b][a], then those who belong to Messiah at his coming.'
  footnotes:
  - marker: a
    text: Or 'Christ' for 'the Messiah' (Χριστός). The Greek title means 'Anointed One.'
    reason: alternative_reading
  - marker: b
    text: Or 'presence' or 'arrival' for 'coming' (παρουσία), though in this context it refers to his future advent.
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 각자가 자기 차례에 살게 됩니다. 첫 열매는 메시아이시고, 그 다음에는 그분의 강림 때에 메시아께 속한 자들입니다.
  philosophy: optimal-equivalence
