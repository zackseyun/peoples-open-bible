translation:
  language: es
  text: Yo los traje a una tierra fértil[a], para comer su fruto y su bondad[b]; pero, cuando entraron, profanaron mi tierra e hicieron de mi heredad una abominación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una tierra de Carmel», es decir, una tierra ricamente cultivada o fructífera.'
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como «su abundancia» o «sus cosas buenas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאָבִיא
  english_pob_choice: I brought
  chosen_spanish: Yo los traje
  alternatives_spanish:
  - Yo los llevé
  - Yo los hice entrar
  lexicon: HALOT
  rationale: El causativo de בוא en este contexto se expresa naturalmente en español con «traer», que preserva la iniciativa divina. «Llevar» también es posible, pero «traje» sigue mejor el movimiento hacia la tierra prometida.
- source_word: אֶרֶץ הַכַּרְמֶל
  english_pob_choice: a fertile land
  chosen_spanish: una tierra fértil
  alternatives_spanish:
  - una tierra de cultivo abundante
  - la tierra de Carmel
  lexicon: HALOT
  rationale: El sentido contextual favorece el sustantivo común «caramel/כרמל» como tierra cultivada y fructífera, no el nombre propio. «Tierra fértil» comunica bien esa idea sin perder la referencia a una tierra productiva.
- source_word: לֶאֱכֹל פִּרְיָהּ וְטוּבָהּ
  english_pob_choice: to eat its fruit and its goodness
  chosen_spanish: para comer su fruto y su bondad
  alternatives_spanish:
  - para comer su fruto y su abundancia
  - para disfrutar su fruto y sus cosas buenas
  lexicon: HALOT
  rationale: «Fruto» conserva el sentido literal de פְּרִי. Para טוּב, «bondad» mantiene el alcance amplio de la palabra hebrea, aunque en español puede evocar también «bounty» o «good things»; se evita estrechar el sentido a un solo aspecto agrícola.
- source_word: וַתָּבֹאוּ
  english_pob_choice: when you came in
  chosen_spanish: ustedes entraron
  alternatives_spanish:
  - cuando ustedes entraron
  - pero ustedes llegaron
  lexicon: HALOT
  rationale: El waw consecutivo avanza la acción y contrasta con la acción previa de Yahvé. En español, «entraron» es suficiente y natural; el matiz temporal se sostiene por la coordinación con la frase siguiente.
- source_word: וַתְּטַמְּאוּ
  english_pob_choice: you defiled
  chosen_spanish: contaminaron
  alternatives_spanish:
  - mancharon
  - profanaron
  lexicon: HALOT
  rationale: Aunque «profanaron» podría reflejar el peso cultual, «contaminaron» comunica la idea de volver impura la tierra y mantiene la fuerza moral-cultual de טמא. «Mancharon» es posible, pero más débil.
- source_word: אַרְצִי
  english_pob_choice: my land
  chosen_spanish: mi tierra
  alternatives_spanish:
  - mi país
  - mi territorio
  lexicon: HALOT
  rationale: «Tierra» es la forma más natural y fiel para אַרֶץ en este contexto de posesión divina.
- source_word: נַחֲלָתִי
  english_pob_choice: my inheritance
  chosen_spanish: mi heredad
  alternatives_spanish:
  - mi herencia
  - mi posesión
  lexicon: HALOT
  rationale: «Heredad» conserva el valor covenantal y posesivo de נַחֲלָה con un registro bíblico claro en español. «Herencia» también es posible, pero puede sonar más abstracta; «heredad» refleja mejor la idea de posesión recibida.
- source_word: לְתוֹעֵבָה
  english_pob_choice: made ... an abomination
  chosen_spanish: una abominación
  alternatives_spanish:
  - algo detestable
  - algo abominable
  lexicon: HALOT
  rationale: «Abominación» preserva la severidad del término תוֹעֵבָה y su registro bíblico. En español, funciona bien como complemento predicativo tras «hicieron de».
theological_decisions:
- issue: Sentido de אֶרֶץ הַכַּרְמֶל
  english_pob_reading: 'common noun: ''fertile land'''
  chosen_spanish_reading: tierra fértil
  alternative_spanish_readings:
  - tierra de Carmel
  - tierra cultivada y fructífera
  rationale: El contexto inmediato habla de comer el fruto y la bondad de la tierra; eso favorece un sustantivo común descriptivo. La lectura como nombre propio no encaja tan bien con la imagen de fertilidad general.
  doctrine_reference: Lexical/contextual sense of the Hebrew text; no doctrinal issue.
- issue: Fuerza de טוּב aplicada a la tierra
  english_pob_reading: retain broad term 'goodness' in the main text
  chosen_spanish_reading: bondad
  alternative_spanish_readings:
  - abundancia
  - buenas cosas
  rationale: «Bondad» conserva el rango semántico amplio de טוּב y evita reducirlo solo a producción agrícola. En español, esta elección mantiene también la idea de la tierra como don benéfico de Yahvé.
  doctrine_reference: Lexical/contextual sense of the Hebrew text; stewardship and gift of the land.
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y no requirió cambios sustantivos; se mantuvieron la lectura contextual de אֶרֶץ הַכַּרְמֶל como «tierra fértil» y la amplitud semántica de טוּב mediante «bondad».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino según el estándar del proyecto en español, aunque este versículo no lo explicite en el texto hebreo.
  - Se usa «heredad» para נַחֲלָה por su resonancia bíblica y posesiva, coherente con el audit trail inglés.
  - «Contaminaron» se eligió por claridad moderna sin perder la carga cultual de טמא; «profanaron» queda como alternativa implícita en la nota lexical.
