lexical_decisions:
- source_word: διέβησαν
  english_pob_choice: crossed
  chosen_spanish: cruzaron
  alternatives_spanish:
  - pasaron
  - atravesaron
  lexicon: LSJ
  rationale: El aoristo de διαβαίνω en un relato de desplazamiento expresa el paso de un lado a otro; «cruzaron» es natural en español y conserva la acción de atravesar un curso de agua.
- source_word: τὸν Ἰορδάνην
  english_pob_choice: the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - el río Jordán
  lexicon: LSJ
  rationale: El griego usa el nombre propio con artículo; en español bíblico «el Jordán» es claro y fiel, sin añadir innecesariamente «río».
- source_word: εἰς τὸ πεδίον τὸ μέγα
  english_pob_choice: into the great plain
  chosen_spanish: hacia la gran llanura
  alternatives_spanish:
  - a la gran llanura
  - en la gran llanura
  lexicon: LSJ
  rationale: πεδίον denota una llanura o región llana. «Llanura» comunica mejor que una traducción más literal pero menos natural, y «hacia» mantiene el sentido de movimiento del εἰς del relato.
- source_word: κατὰ πρόσωπον
  english_pob_choice: opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - en frente de
  - opuesto a
  - delante de
  lexicon: LSJ
  rationale: En descripciones geográficas, la locución indica estar de cara a o en posición enfrente de un lugar. «Frente a» es la opción más natural en español y preserva la relación espacial.
- source_word: Βαισάν
  english_pob_choice: Baisan
  chosen_spanish: Baisán
  alternatives_spanish:
  - Baisan
  - Beisán
  lexicon: LSJ
  rationale: Se conserva la forma transliterada del griego. En español se adapta la acentuación gráfica para lectura natural, manteniendo la misma referencia toponímica sin sustituirla por una forma hebraizada.
translation_notes:
  revision_awareness: El texto griego y el paquete de auditoría inglesa concuerdan de manera alta; no se registran revisiones sustantivas ni variantes textuales relevantes para esta línea.
  spanish_consistency_notes:
