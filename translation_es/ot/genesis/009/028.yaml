translation:
  language: es
  text: Después del diluvio, Noé vivió trescientos cincuenta años.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְחִי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - continuó viviendo
  - sobrevivió
  lexicon: HALOT
  rationale: En este contexto genealógico, חיה en wayyiqtol señala la duración de la vida de Noé después del diluvio. «Vivió» conserva el valor temporal y natural en español; «sobrevivió» enfatizaría la preservación más que la extensión de la vida.
- source_word: נֹחַ
  english_pob_choice: Noah
  chosen_spanish: Noé
  alternatives_spanish:
  - Noah
  lexicon: Nombre propio bíblico estándar
  rationale: El nombre propio se adapta a la forma castellana usual «Noé», que es la equivalente bíblica natural y ampliamente reconocible en español.
- source_word: אַחַר
  english_pob_choice: after
  chosen_spanish: después de
  alternatives_spanish:
  - tras
  - luego de
  lexicon: HALOT
  rationale: La preposición temporal expresa secuencia inmediata o posterior. «Después de» es claro, idiomático y fiel al valor temporal del hebreo.
- source_word: הַמַּבּוּל
  english_pob_choice: the flood
  chosen_spanish: el diluvio
  alternatives_spanish:
  - el flood
  - la inundación
  lexicon: HALOT
  rationale: «מַבּוּל» alude al evento narrativo conocido del diluvio de Noé. En español bíblico, «diluvio» comunica bien la referencia histórica y conserva el matiz solemne; «inundación» sería demasiado general.
- source_word: שְׁלֹשׁ מֵאוֹת שָׁנָה וַחֲמִשִּׁים שָׁנָה
  english_pob_choice: three hundred and fifty years
  chosen_spanish: trescientos cincuenta años
  alternatives_spanish:
  - trescientos y cincuenta años
  - trescientos cincuenta años de edad
  lexicon: HALOT
  rationale: La construcción numérica hebrea suma 300 + 50 años. En español, la forma natural y precisa es «trescientos cincuenta años»; agregar «de edad» no aporta al sentido y haría menos directa la frase.
theological_decisions:
- issue: Naturaleza del evento «הַמַּבּוּל»
  english_pob_reading: the flood
  chosen_spanish_reading: el diluvio
  alternative_spanish_readings:
  - la inundación
  - el cataclismo
  rationale: El texto no introduce aquí una valoración doctrinal adicional; simplemente ubica la duración de la vida de Noé después del evento del diluvio. «Diluvio» es la forma bíblica estándar y no borra la referencia narrativa concreta.
  doctrine_reference: Génesis 6–9
translation_notes:
  revision_awareness: El texto inglés POB y el cotejo de revisión muestran acuerdo alto y ningún cambio aplicado; por eso se mantiene la estructura simple de cronología y duración sin añadir notas textuales o alternativas innecesarias.
  spanish_consistency_notes:
  - Se usó el nombre bíblico castellanizado «Noé» de manera consistente con el uso eclesial y bíblico en español.
  - Se preservó la secuencia temporal explícita del hebreo con «Después de» para reflejar אַחַר sin sobreinterpretación.
  - Se mantuvo un registro sobrio y narrativo, apropiado para genealogías y resúmenes cronológicos.
