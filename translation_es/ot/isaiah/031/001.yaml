    text: O «confían en caballos»; el hebreo presenta la imagen de apoyarse sobre algo para sostenerse.
    reason: lexical_alternative
  - marker: b
    text: O «caballería» para «jinetes».
    reason: lexical_alternative
  - marker: c
    text: Hebreo YHWH, el nombre divino, aquí traducido «Yahvé».
    reason: lexical_alternative
  revision_rationale: 'Se corrigen dos problemas de fidelidad editorial en las notas: el anclaje de [a] ahora corresponde al verbo שׁען, y [c] explica con precisión la relación entre יְהוָה/YHWH y la traducción «Yahvé». Además, se mejora la naturalidad de «para ayuda» a «en busca de ayuda» sin alterar el sentido fuente.'
