translation:
  language: es
  text: 'Pero él les dijo: «Entonces devuelvan[a] al César las cosas que son del César, y a Dios las cosas que son de Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «den» o «paguen». El verbo puede significar dar, pagar o devolver lo debido.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ εἶπεν
  english_pob_choice: But he said
  chosen_spanish: Pero él les dijo
  alternatives_spanish:
  - Y él dijo
  - Entonces él dijo
  lexicon: BDAG
  rationale: δέ tiene aquí valor continuativo con matiz ligeramente adversativo; «Pero» reproduce bien el giro del diálogo. Se explicita «les» por el dativo de dirección πρὸς αὐτούς en un habla natural en español.
- source_word: πρὸς αὐτούς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - hacia ellos
  lexicon: BDAG
  rationale: Con un verbo de decir, el complemento indirecto español transmite de forma natural la relación de destinatarios que expresa πρὸς αὐτούς.
- source_word: Τοίνυν
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Por tanto
  - Así que
  - Pues bien
  lexicon: BDAG
  rationale: Τοίνυν introduce una conclusión o respuesta inferida; «Entonces» conserva ese valor discursivo con naturalidad en español sin volverlo demasiado formal.
- source_word: ἀπόδοτε
  english_pob_choice: give back
  chosen_spanish: den[a]
  alternatives_spanish:
  - devuelvan
  - paguen
  - rindan
  lexicon: BDAG
  rationale: ἀποδίδωμι puede significar dar, pagar o devolver lo debido. En este contexto, el imperativo plural en español puede expresarse con «den» para abarcar la idea amplia de entregar lo que corresponde sin fijarla solo en pago monetario. La nota preserva la alternativa semántica de «devolver/rendir».
- source_word: τὰ Καίσαρος Καίσαρι
  english_pob_choice: to Caesar the things that are Caesar’s
  chosen_spanish: al César las cosas que son del César
  alternatives_spanish:
  - al César lo que es del César
  - a César lo que pertenece a César
  lexicon: BDAG
  rationale: El neutro plural artículo + genitivo se vierte de forma idiomática como «las cosas que son de...». «Al César» conserva el dativo destinatario y «las cosas» mantiene la amplitud del alcance sin restringirlo solo a impuestos.
- source_word: Καίσαρ
  english_pob_choice: Caesar
  chosen_spanish: César
  alternatives_spanish:
  - el emperador
  lexicon: BDAG
  rationale: Καῖσαρ es un título propio imperial; en español la forma establecida y reconocible es «César», que mantiene el nombre/título sin interpretarlo como «emperador».
- source_word: τὰ τοῦ θεοῦ τῷ θεῷ
  english_pob_choice: to God the things that are God’s
  chosen_spanish: a Dios las cosas que son de Dios
  alternatives_spanish:
  - a Dios lo que es de Dios
  - a Dios lo que pertenece a Dios
  lexicon: BDAG
  rationale: Se conserva el paralelo con la cláusula de César y el sentido amplio de pertenencia expresado por el genitivo. «Dios» se usa sin sustitución por una forma de ocultamiento del nombre divino porque aquí el griego tiene θεός, no el Tetragrámaton.
theological_decisions:
- issue: Alcance político-teológico de la respuesta de Jesús
  english_pob_reading: The translation preserves the parallel obligation to civil authority and to God without specifying the exact limits of either sphere.
  chosen_spanish_reading: La traducción conserva la obligación paralela respecto de la autoridad civil y de Dios, sin definir los límites exactos de cada esfera.
  alternative_spanish_readings:
  - Una separación rígida entre religión y estado
  - Una legitimación de la autoridad estatal sin límites
  - Una referencia solo al pago de impuestos
  rationale: El griego presenta un principio de dar a cada uno lo que le corresponde, pero no desarrolla por sí mismo una teoría política completa. La redacción española debe mantener esa tensión y amplitud interpretativa.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador [a] aparece explícitamente en el texto de traducción junto al verbo correspondiente.
  spanish_consistency_notes:
  - Se mantiene «César» como transliteración estable del título propio imperial, conforme al paralelo de la fuente griega.
  - Se conserva «Dios» para θεός sin sustituciones por «Señor», porque el texto griego no usa κύριος.
  - La cláusula neutra plural τὰ se traduce de modo amplio como «las cosas», preservando el alcance no restringido del original.
  - El imperativo plural se expresa en un registro natural de español bíblico contemporáneo, sin perder la fuerza de obligación.
