revisions:
- from: o con cualquier piedra con la cual alguien pudiera morir[a], sin ver, la arrojó sobre él, y murió; aunque no era su enemigo ni estaba buscando su mal—
  to: o con cualquier piedra con la cual alguien pudiera morir[a], sin ver, la dejó caer sobre él, de modo que murió, aunque no era su enemigo ni estaba buscando su daño—
  rationale: Se ajusta el verbo causativo para reflejar mejor el hebreo sin implicar un lanzamiento más fuerte de lo necesario; se mejora la naturalidad y precisión jurídica de רָעָה con «daño»; y se simplifica la nota para alinearla más estrechamente con la justificación del POB inglés, manteniendo la literalidad de «sin ver».
