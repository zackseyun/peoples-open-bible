translation:
  language: es
  text: Ellos se lanzarán sobre el hombro[a] de los filisteos hacia el occidente; juntos saquearán a los hijos del oriente[b]. Edom y Moab estarán bajo la extensión de su mano[c], y los hijos de Amón les obedecerán[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el hombro de los filisteos», probablemente su flanco o la región filistea al oeste.'
    reason: cultural_note
  - marker: b
    text: O «el pueblo del oriente» o «los orientales».
    reason: lexical_alternative
  - marker: c
    text: O «Edom y Moab estarán bajo su mano» o «les echarán la mano encima».
    reason: lexical_alternative
  - marker: d
    text: O «los amonitas les estarán sujetos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָפוּ
  english_pob_choice: they will swoop down
  chosen_spanish: se lanzarán
  alternatives_spanish:
  - descenderán
  - se abalanzarán
  lexicon: HALOT
  rationale: El verbo hebreo sugiere movimiento rápido e தாக்கing, con imagen de ave; en español, «se lanzarán» comunica bien el ataque súbito sin perder dignidad ni claridad.
- source_word: בְּכָתֵף פְּלִשְׁתִּים
  english_pob_choice: on the shoulder of the Philistines
  chosen_spanish: sobre el hombro de los filisteos
  alternatives_spanish:
  - sobre el flanco de los filisteos
  - sobre la franja de los filisteos
  lexicon: HALOT
  rationale: Se conserva «hombro» para mantener cerca la metáfora del hebreo, como hace la POB en inglés, aunque en español también puede sugerir el flanco o la zona del territorio.
- source_word: יָמָּה
  english_pob_choice: toward the west
  chosen_spanish: hacia el occidente
  alternatives_spanish:
  - hacia el oeste
  - occidentalmente
  lexicon: HALOT
  rationale: «Occidente» es una equivalencia natural y elevada para la dirección geográfica; mantiene el sentido direccional sin sonar rígido.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - a la vez
  - en unidad
  lexicon: HALOT
  rationale: Adverbio simple de acción unida; «juntos» es claro y fiel.
- source_word: יָבֹזּוּ
  english_pob_choice: they will plunder
  chosen_spanish: saquearán
  alternatives_spanish:
  - despojarán
  - botarán
  lexicon: HALOT
  rationale: El verbo denota saqueo en contexto militar; «saquearán» es el equivalente más directo y natural en español.
- source_word: בְּנֵי קֶדֶם
  english_pob_choice: the sons of the east
  chosen_spanish: a los hijos del oriente
  alternatives_spanish:
  - al pueblo del oriente
  - a los orientales
  lexicon: HALOT
  rationale: Se mantiene la forma literal «hijos del oriente» para conservar la textura idiomática del hebreo, como en la POB inglesa.
- source_word: מִשְׁלוֹחַ יָדָם
  english_pob_choice: will be under the putting forth of their hand
  chosen_spanish: estarán bajo el alcance de su mano
  alternatives_spanish:
  - estarán bajo su mano
  - les extenderán la mano
  lexicon: HALOT
  rationale: La expresión nominal hebrea es idiomática y señala dominio/acción ejercida. «Bajo el alcance de su mano» preserva la imagen de extensión de la mano y el sentido de sujeción, sin volverla excesivamente torpe en español.
- source_word: מִשְׁמַעְתָּם
  english_pob_choice: will obey them
  chosen_spanish: les obedecerán
  alternatives_spanish:
  - estarán sujetos a ellos
  - les estarán sometidos
  lexicon: HALOT
  rationale: El sustantivo vinculado a שׁמע expresa obediencia/hechimiento; «les obedecerán» es la traducción más clara y directa, conservando la relación de autoridad.
- source_word: אֱדוֹם וּמוֹאָב
  english_pob_choice: Edom and Moab
  chosen_spanish: Edom y Moab
  alternatives_spanish:
  - Idumea y Moab
  lexicon: HALOT
  rationale: Se conservan los nombres propios tradicionales transliterados por ser la forma estándar y más reconocible.
- source_word: וּבְנֵי עַמּוֹן
  english_pob_choice: the sons of Ammon
  chosen_spanish: los hijos de Amón
  alternatives_spanish:
  - los amonitas
  lexicon: HALOT
  rationale: Se retiene la forma literal «hijos de Amón» para reflejar el paralelismo con «hijos del oriente» y mantener la huella semítica del texto.
theological_decisions:
- issue: Conservar el lenguaje explícito de conquista y sometimiento
  english_pob_reading: Retain explicit military/subjugation language ('swoop down,' 'plunder,' 'obey them')
  chosen_spanish_reading: Mantener lenguaje explícito de ataque, saqueo y obediencia
  alternative_spanish_readings:
  - suavizar a lenguaje de influencia política
  - interpretar como mera supremacía simbólica
  rationale: El hebreo presenta verbos e imágenes de agresión militar y subordinación. La traducción española no debe atenuar esa fuerza, aunque el pasaje esté dentro de un contexto profético de restauración.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción sigue el ajuste de la POB inglesa más reciente, que prefirió «toward the west» para יָמָּה y añadió «under» en la cláusula de משלוח ידם. En español se reflejó ese mismo matiz con «hacia el occidente» y «bajo el alcance de su mano», manteniendo el registro formal y la imagen nominal del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; este versículo no lo contiene.
  - Se conserva «hijos de» en las expresiones idiomáticas para mantener paralelo estructural con el hebreo.
  - Se evita «SEÑOR» y otras sustituciones de encubrimiento, conforme a la política del proyecto.
  - 'Los nombres propios siguen la transliteración habitual en español bíblico: filisteos, Edom, Moab, Amón.'
