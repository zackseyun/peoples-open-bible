translation:
  language: es
  text: Recubrió el piso de la casa con oro,[a][b] por dentro y por fuera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O “el piso del templo”. El hebreo dice literalmente: “el piso de la casa”.'
    reason: lexical_alternative
  - marker: b
    text: La frase “por dentro y por fuera” probablemente describe el piso como recubierto de oro en toda su extensión, desde la parte interior hasta la exterior.
    reason: cultural_note
lexical_decisions:
- source_word: קַרְקַע
  english_pob_choice: floor
  chosen_spanish: piso
  alternatives_spanish:
  - suelo
  - pavimento
  lexicon: HALOT
  rationale: En el contexto de la construcción del templo, קַרְקַע se refiere a la superficie inferior del edificio. 'Piso' comunica de manera natural esa idea arquitectónica en español sin perder precisión.
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  - la casa
  lexicon: HALOT
  rationale: El hebreo dice 'la casa'; en este contexto designa el edificio del templo, pero el texto fuente conserva el término literal. 'Casa' preserva esa forma base sin introducir de inmediato la glosa interpretativa 'templo'.
- source_word: צִפָּה
  english_pob_choice: overlaid
  chosen_spanish: recubrió
  alternatives_spanish:
  - forró
  - cubrió
  - revistió
  lexicon: HALOT
  rationale: El verbo expresa cubrir una superficie con otro material. 'Recubrió' mantiene la imagen de aplicar una capa de oro y suena natural en español moderno.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro fino
  - oro
  lexicon: HALOT
  rationale: Es el material mencionado de forma directa. 'Oro' es la equivalencia normal y suficientemente precisa.
- source_word: לִפְנִימָה
  english_pob_choice: on the inside
  chosen_spanish: por dentro
  alternatives_spanish:
  - por la parte interior
  - en el interior
  lexicon: HALOT
  rationale: La forma indica la orientación interior. 'Por dentro' es una expresión clara y fiel para el contraste espacial del verso.
- source_word: וְלַחִיצוֹן
  english_pob_choice: and on the outside
  chosen_spanish: por fuera
  alternatives_spanish:
  - en el exterior
  - hacia afuera
  lexicon: HALOT
  rationale: Corresponde al contraste con 'por dentro' y transmite la extensión exterior de manera idiomática en español.
translation_notes:
  revision_awareness: Se corrigió la validación anterior incorporando un único pie de nota, y su marcador [a] aparece ahora exactamente en el texto principal. No se añadieron notas no ancladas.
  spanish_consistency_notes:
  - Se mantuvo el contraste espacial del hebreo con la pareja 'por dentro / por fuera'.
  - Se evitó sustituir 'la casa' por 'el templo' en el cuerpo principal para conservar la forma literal del texto fuente, dejando esa opción en la nota.
  - No se introdujo puntuación o división adicional que altere el flujo breve del verso.
