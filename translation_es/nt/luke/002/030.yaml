translation:
  language: es
  text: porque mis ojos han visto tu salvación[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu Salvador». El griego dice «tu salvación», pero en el contexto la salvación de Dios está presente en la persona de Jesús.
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque
  lexicon: BDAG
  rationale: En este contexto introduce la razón de la declaración anterior; «porque» expresa con naturalidad el valor causal en español y conserva la relación lógica del griego.
- source_word: εἶδον
  english_pob_choice: have seen
  chosen_spanish: han visto
  alternatives_spanish:
  - vieron
  - he visto
  - han visto
  lexicon: BDAG
  rationale: El aoristo griego presenta la acción como completa. En español, el presente perfecto «han visto» comunica mejor la vigencia del hecho para el hablante en este contexto litúrgico/narrativo que un simple pretérito.
- source_word: οἱ ὀφθαλμοί μου
  english_pob_choice: my eyes
  chosen_spanish: mis ojos
  alternatives_spanish:
  - yo
  - mis ojos
  lexicon: BDAG
  rationale: El griego dice literalmente «mis ojos», una imagen corporal que vale la pena conservar. No se reduce a «yo» para no perder la concreción del texto.
- source_word: τὸ σωτήριόν σου
  english_pob_choice: your salvation
  chosen_spanish: tu salvación
  alternatives_spanish:
  - tu acto salvador
  - tu salvación
  - tu Salvador
  lexicon: BDAG
  rationale: La forma neutra σωτήριον designa más naturalmente «salvación» o «liberación» que un nombre personal. «Tu salvación» respeta la forma del griego y deja abierta la tensión teológica que en el contexto apunta a Jesús sin decirlo de manera interpretativa en la traducción principal.
theological_decisions:
- issue: Si σωτήριον debe personalizarse como «Salvador» a la luz del niño presente
  english_pob_reading: your salvation, with a note that contextually God's salvation is present in the person of Jesus
  chosen_spanish_reading: tu salvación, con nota que reconoce la posible referencia contextual a Jesús
  alternative_spanish_readings:
  - tu Salvador
  - tu liberador
  rationale: El griego no usa σωτήρ, sino σωτήριον. Por eso la traducción principal mantiene «salvación», preservando la redacción de Lucas y la tensión entre el término abstracto y su realización concreta en Jesús. La personalización queda para una nota, no para el texto base.
  doctrine_reference: Translation philosophy §1 (primacía del idioma original), §3 (preservar tensión teológica)
- issue: Valor aspectual del aoristo εἶδον en un contexto de confesión inmediata
  english_pob_reading: have seen
  chosen_spanish_reading: han visto
  alternative_spanish_readings:
  - vi
  - he visto
  rationale: «Han visto» mantiene la idea de un hecho completado con relevancia presente. Aunque el griego no marca perfecto en sentido estricto, este recurso español expresa bien el momento culminante de reconocimiento de Simeón sin endurecer la frase.
  doctrine_reference: Principio de equivalencia óptima y claridad natural en español
translation_notes:
  revision_awareness: 'Concordante con el audit trail inglés: se conserva la estructura causal, la imagen corporal de «mis ojos» y el sustantivo abstracto «salvación», evitando una interpretación más explícita en el cuerpo del texto. No se registraron revisiones posteriores que alteren estas decisiones.'
  spanish_consistency_notes:
  - Se mantiene «salvación» en lugar de «Savior/Salvador» para respetar el valor lexical de σωτήριον.
  - Se usa «porque» como conector causal natural en español bíblico moderno.
  - La nota al pie recoge la alternativa personalizante sin desplazar el sentido principal.
  - La formulación es breve y apta para lectura pública, sin sacrificar la precisión del griego.
