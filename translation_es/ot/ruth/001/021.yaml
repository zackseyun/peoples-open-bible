translation:
  language: es
  text: Yo me fui llena, pero Yahvé me ha hecho volver vacía. ¿Por qué me llaman Noemí, si Yahvé ha testificado contra mí[a] y el Todopoderoso me ha traído calamidad[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ha dado testimonio contra mí». El verbo hebreo puede tener el sentido forense de responder o testificar contra alguien.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «me ha hecho daño». La expresión hebrea habla de calamidad o adversidad traída sobre Noemí.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְלֵאָה
  english_pob_choice: full
  chosen_spanish: llena
  alternatives_spanish:
  - completa
  - repleta
  lexicon: HALOT
  rationale: El adjetivo predicativo describe el estado anterior de Noemí y crea contraste con «vacía». En español, «llena» suena natural y conserva la antítesis sin añadir matices ajenos.
- source_word: הָלַכְתִּי
  english_pob_choice: I went away
  chosen_spanish: me fui
  alternatives_spanish:
  - me fui de allí
  - partí
  lexicon: HALOT
  rationale: El verbo base es «ir/caminar», pero el contexto expresa salida. «Me fui» comunica la partida de forma natural y equivalente en español.
- source_word: וְרֵיקָם
  english_pob_choice: empty
  chosen_spanish: vacía
  alternatives_spanish:
  - sin nada
  - con las manos vacías
  lexicon: HALOT
  rationale: Aunque el hebreo tiene un matiz adverbial de «vacío/empty-handed», «vacía» preserva el contraste fuerte con «llena» y evita una expansión explicativa innecesaria. La alternativa «con las manos vacías» sería más interpretativa.
- source_word: הֱשִׁיבַנִי
  english_pob_choice: has brought me back
  chosen_spanish: me ha hecho volver
  alternatives_spanish:
  - me ha traído de vuelta
  - me ha devuelto
  lexicon: HALOT
  rationale: El causativo de שוב expresa que Yahvé hizo que volviera. «Me ha hecho volver» conserva la agencia divina y suena idiomático en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para el Tetragrámaton: «Yahvé» como nombre divino, no una sustitución por título.'
- source_word: לָמָּה תִקְרֶאנָה לִי נָעֳמִי
  english_pob_choice: Why do you call me Naomi
  chosen_spanish: ¿Por qué me llaman Naomi?
  alternatives_spanish:
  - ¿Por qué deberían llamarme Naomi?
  - ¿Por qué me llaman Noemí?
  lexicon: HALOT
  rationale: La pregunta retórica va dirigida a las mujeres. Se mantiene el nombre propio transliterado como en el audit trail inglés; «Naomi» evita variar una forma ya fijada en la fuente auditada.
- source_word: עָנָה בִי
  english_pob_choice: has testified against me
  chosen_spanish: ha testificado contra mí
  alternatives_spanish:
  - ha respondido contra mí
  - ha dado testimonio contra mí
  lexicon: HALOT
  rationale: Se conserva el sentido forense/auditivo que el inglés POB documenta. «Ha testificado contra mí» es claro en español y no diluye la tensión jurídica del hebreo.
- source_word: שַׁדַּי
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - Shaddai
  - el Omnipotente
  lexicon: HALOT
  rationale: El título divino se traduce por su sentido recibido en español bíblico. «Todopoderoso» comunica el título sin introducir un nombre propio nuevo.
- source_word: הֵרַע לִי
  english_pob_choice: has brought calamity on me
  chosen_spanish: me ha traído calamidad
  alternatives_spanish:
  - me ha hecho daño
  - me ha causado desgracia
  lexicon: HALOT
  rationale: El causativo de רעע aquí expresa traer mal/daño/calamidad. «Me ha traído calamidad» conserva la fuerza del hebreo sin implicar que Dios haga moralmente el mal.
theological_decisions:
- issue: Agencia divina en el sufrimiento de Noemí
  english_pob_reading: 'Retain strong language of divine agency: ''the LORD has testified against me'' and ''the Almighty has brought calamity on me.'''
  chosen_spanish_reading: 'Conservar el lenguaje fuerte de la agencia divina: «Yahvé ha testificado contra mí» y «el Todopoderoso me ha traído calamidad».'
  alternative_spanish_readings:
  - Yahvé ha permitido esto en mi vida
  - el Todopoderoso ha permitido calamidad sobre mí
  - Yahvé me ha afligido
  rationale: El hebreo atribuye directamente a Yahvé y a Shaddai la situación amarga de Noemí. La traducción debe preservar esa tensión teológica, no suavizarla. Al mismo tiempo, «calamidad» evita sugerir mal moral en Dios y mantiene el valor adversativo del verbo.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: El contexto inglés auditado mantiene una lectura de alta concordancia y no registra revisiones aplicadas; por eso el borrador español sigue de cerca las decisiones léxicas y teológicas ya validadas, sin introducir suavizaciones ni explicaciones extensas en el texto principal.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה en coherencia con la norma del proyecto.
  - Se mantiene «Naomi» como nombre propio tal como aparece en el audit trail inglés; si se requiere uniformidad editorial con otras secciones, podría evaluarse «Noemí», pero aquí se privilegia la continuidad con la fuente auditada.
  - «Todopoderoso» traduce שַׁדַּי por sentido, no por transliteración, siguiendo el criterio documentado del inglés POB.
  - Se preserva la tensión entre la agencia divina y el lenguaje de calamidad, sin convertirlo en mera permisión.
