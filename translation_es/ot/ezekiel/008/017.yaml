    text: 'O, siguiendo algunos testigos antiguos: «están poniendo la rama a mi nariz». El texto hebreo dice «su nariz».'
    reason: textual_variant
  revision_rationale: Se ajusta «provocarme» para no añadir «ira» que el hebreo no explicita; se cambia «llevando» por «poniendo» para seguir la decisión léxica auditada sobre el gesto físico oscuro; y se mejora la naturalidad de «¿Es cosa demasiado trivial...?» a «¿Es demasiado poca cosa...?» sin perder la fuerza retórica. Se conserva la nota de variante textual y el registro solemne de «Y he aquí».
