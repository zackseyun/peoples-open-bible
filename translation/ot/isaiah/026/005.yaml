- issue: Whether the verse should identify the 'lofty city' with a specific historical city or power
  chosen_reading: Keep the reference generic as 'the lofty city'
  alternative_readings:
  - Babylon
  - human pride in general
  - any hostile exalted city
  rationale: The Hebrew text itself does not name the city. A translation should preserve the poetic generality and not import a specific identification that belongs to interpretation.
