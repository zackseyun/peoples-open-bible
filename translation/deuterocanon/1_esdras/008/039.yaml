translation:
  text: 'From the sons of Adoniakim[a], the last ones, and these are their names: Eliphala son of Geuel, and Shemaiah[b],'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek: ''the last ones.'' The phrase may mean the final subgroup or later descendants within the family line; the wording is kept close to the source because the exact nuance is uncertain.'
    reason: lexical_alternative
  - marker: b
