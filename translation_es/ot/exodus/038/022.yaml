translation:
  language: es
  text: Y Bezalel, hijo de Uri[a], hijo de Hur, de la tribu de Judá, hizo todo lo que Yahvé había mandado por medio de Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/בְצַלְאֵל
  english_pob_choice: And Bezalel
  chosen_spanish: Y Bezalel
  alternatives_spanish:
  - Ahora Bezalel
  - Bezalel
  lexicon: HALOT
  rationale: Se conserva la conjunción narrativa inicial con «Y» para reflejar la conexión del relato; el nombre propio se translitera de forma estándar en español bíblico.
- source_word: בֶּן ... בֶן
  english_pob_choice: son of ... son of
  chosen_spanish: hijo de ... hijo de
  alternatives_spanish:
  - descendiente de ... descendiente de
  lexicon: HALOT
  rationale: En una fórmula genealógica inmediata, «hijo de» es la equivalencia natural y más transparente en español, manteniendo la línea de ascendencia directa.
- source_word: לְ/מַטֵּה יְהוּדָה
  english_pob_choice: of the tribe of Judah
  chosen_spanish: de la tribu de Judá
  alternatives_spanish:
  - perteneciente a la tribu de Judá
  - de la tribu de Judá
  lexicon: HALOT
  rationale: מַטֶּה en contexto tribal significa «tribu»; la relación marcada por ל se expresa idiomáticamente con «de la tribu de».
- source_word: עָשָׂה
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - fabricó
  - realizó
  lexicon: HALOT
  rationale: En español, «hizo» mantiene la amplitud de עשה sin forzar un término demasiado técnico; el contexto de construcción tabernacular admite esta naturalidad.
- source_word: אֵת כָּל אֲשֶׁר
  english_pob_choice: all that
  chosen_spanish: todo lo que
  alternatives_spanish:
  - todo cuanto
  - todo aquello que
  lexicon: HALOT
  rationale: «Todo lo que» comunica bien la totalidad de la cláusula relativa y suena natural en español contemporáneo.
- source_word: צִוָּה
  english_pob_choice: had commanded
  chosen_spanish: había mandado
  alternatives_spanish:
  - había ordenado
  - mandó
  lexicon: HALOT
  rationale: Se usa pluscuamperfecto para reflejar con claridad que el mandato de Yahvé precede a la acción de Bezalel, tal como hace la traducción inglesa auditada.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio POB de traducir el Tetragrámaton como «Yahvé», preservando el nombre divino en lugar de sustituirlo por un título.
- source_word: אֶת מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: Aunque el inglés omite explícitamente la preposición, en español «mandar a alguien» expresa con naturalidad la relación verbal del hebreo en esta construcción.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton; la decisión española mantiene el nombre propio divino, conforme al criterio doctrinal auditado, evitando la sustitución por «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; se sigue el estado más reciente sin cambios y el alto acuerdo de revisión externa.
  spanish_consistency_notes:
  - 'Se conserva la fórmula genealógica con paralelismo claro: «hijo de … hijo de».'
  - Se mantiene la distinción entre nombre divino propio («Yahvé») y títulos comunes.
  - El verbo «hizo» se eligió para equilibrar naturalidad española y fidelidad al campo semántico de עשה.
  - La nota al pie preserva la alternativa tradicional sin adoptarla en el texto principal.
