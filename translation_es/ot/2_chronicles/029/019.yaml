translation:
  language: es
  text: Y todos los vasos[a] que el rey Acaz había dejado de lado durante su reinado, en su infidelidad[b], los hemos preparado y consagrado; y he aquí, están delante del altar de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'utensilios' u 'objetos'. El hebreo כֵּלִים es un término amplio; 'vasos' se usa aquí por su adecuación al contexto del templo.
    reason: lexical_alternative
  - marker: b
    text: O 'en su traición' o 'en su falta de fidelidad'. El hebreo resalta la quiebra de fidelidad de Acaz.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֵּלִים
  english_pob_choice: the vessels
  chosen_spanish: los utensilios
  alternatives_spanish:
  - los vasos
  - los objetos
  - los implementos
  lexicon: HALOT
  rationale: כֵּלִים es un término amplio para objetos o instrumentos. En contexto del templo, en español 'utensilios' comunica bien la idea de implementos sagrados sin forzar una terminología más técnica como 'vasos', que puede sonar más limitada o referirse solo a recipientes.
- source_word: הִזְנִיחַ
  english_pob_choice: cast aside
  chosen_spanish: había descartado
  alternatives_spanish:
  - había dejado de lado
  - había desechado
  - había arrojado a un lado
  lexicon: HALOT
  rationale: El verbo expresa abandonar o apartar algo con desprecio práctico. 'Había descartado' mantiene ese valor activo y encaja con el español actual; 'había dejado de lado' sería más suave y menos preciso.
- source_word: בְּמַלְכוּתוֹ
  english_pob_choice: during his reign
  chosen_spanish: durante su reinado
  alternatives_spanish:
  - en su reinado
  - mientras reinó
  lexicon: HALOT
  rationale: La preposición con 'su reinado' funciona temporalmente. 'Durante su reinado' es la forma más natural y clara en español.
- source_word: בְּמַעֲלוֹ
  english_pob_choice: in his unfaithfulness
  chosen_spanish: por su infidelidad
  alternatives_spanish:
  - en su infidelidad
  - por su traición
  - por su falta de fidelidad
  lexicon: HALOT
  rationale: מַעַל denota quebrantamiento de confianza o infidelidad, especialmente en un marco religioso. 'Infidelidad' conserva ese peso moral y cultual; 'traición' sería más fuerte en lo político, y 'falta de fidelidad' explica más pero suena menos terso.
- source_word: הֵכַנּוּ
  english_pob_choice: we have prepared
  chosen_spanish: los hemos preparado
  alternatives_spanish:
  - los hemos dispuesto
  - los hemos dejado listos
  - los hemos puesto en orden
  lexicon: HALOT
  rationale: כּוּן en hiphil aquí expresa dejar listo o preparar. 'Los hemos preparado' es fiel y natural; 'puesto en orden' sería viable, pero menos directo.
- source_word: וְהִקְדָּשְׁנוּ
  english_pob_choice: consecrated
  chosen_spanish: consagrado
  alternatives_spanish:
  - santificado
  - dedicado
  - apartado como santo
  lexicon: HALOT
  rationale: En contexto de templo, 'consagrado' es el equivalente cultual más claro en español. 'Santificado' puede funcionar, pero suena más abstracto; 'apartado como santo' explica demasiado.
- source_word: וְהִנָּם
  english_pob_choice: and behold, they are
  chosen_spanish: y he aquí, están
  alternatives_spanish:
  - y mirad, están
  - y ved, están
  - y aquí están
  lexicon: HALOT
  rationale: La partícula enfática llama la atención sobre la presencia visible de los utensilios. 'He aquí' conserva bien la deíxis solemne del hebreo y la referencia inmediata a su ubicación.
- source_word: לִפְנֵי מִזְבַּח יְהוָה
  english_pob_choice: before the altar of Yahweh
  chosen_spanish: delante del altar de Yahvé
  alternatives_spanish:
  - ante el altar de Yahvé
  - frente al altar de Yahvé
  lexicon: HALOT
  rationale: לִפְנֵי significa 'delante de' o 'ante'. 'Delante del altar de Yahvé' es claro, reverente y mantiene el nombre divino según la norma del proyecto.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrama, por lo que se mantiene el nombre divino visible en español. 'Yahvé' sigue la convención del proyecto y evita la sustitución litúrgica por 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor moral-religioso de בְּמַעֲלוֹ
  english_pob_reading: in his unfaithfulness
  chosen_spanish_reading: por su infidelidad
  alternative_spanish_readings:
  - en su infidelidad
  - por su pecado
  - por su traición
  rationale: El hebreo apunta a una quiebra de fidelidad, no solo a un error administrativo. 'Infidelidad' preserva el matiz de ruptura covenantal que el contexto de restauración del templo hace relevante.
  doctrine_reference: HALOT on מַעַל; covenantal breach in temple restoration context
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de 'discarded' a 'cast aside' para ajustar el matiz verbal. En español se refleja ese valor activo con 'había descartado', que conserva naturalidad y evita suavizar el desprecio implícito. Se mantiene también la decisión revisada de traducir el Tetragrama de forma explícita.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se traduce כֵּלִים de manera amplia como 'utensilios' para evitar restringir innecesariamente el campo semántico.
  - '''Consagrado'' se usa en sentido cultual, coherente con el contexto del altar y la purificación del templo.'
  - La puntuación divide claramente la referencia temporal ('durante su reinado') y la causal/moral ('por su infidelidad') para reflejar la estructura del hebreo.
