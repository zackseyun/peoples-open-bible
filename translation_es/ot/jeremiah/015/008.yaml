translation:
  language: es
  text: Sus viudas han llegado a ser más numerosas para mí que la arena de los mares[a]. He traído contra ellos un destructor al mediodía, contra la madre de un joven[b]; de repente he hecho caer sobre ella la ciudad[c] y terrores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “sus viudas se han multiplicado más allá de la arena del mar”.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo difícil: la frase puede aludir a una madre privada de su hijo; algunos la entienden de otro modo.'
    reason: alternative_reading
  - marker: c
    text: El hebreo de la cláusula final es difícil. El Texto Masorético dice literalmente “ciudad y terrores”; algunos lo interpretan o emendan de otro modo, dando un sentido como “angustia y terrores”.
    reason: textual_variant
lexical_decisions:
- source_word: עָצְמוּ
  english_pob_choice: have become more numerous
  chosen_spanish: han llegado a ser más numerosas
  alternatives_spanish:
  - se han multiplicado
  - han sido más numerosas
  lexicon: HALOT
  rationale: En el contexto de “viudas” y la comparación con la arena, el verbo expresa aumento en número más que fuerza. “Han llegado a ser más numerosas” conserva ese matiz y suena natural en español.
- source_word: אַלְמְנֹתָיו
  english_pob_choice: their widows
  chosen_spanish: sus viudas
  alternatives_spanish:
  - las viudas de él
  - las viudas de ellos
  lexicon: HALOT
  rationale: El sufijo hebreo permite una referencia corporativa al pueblo. En español, “sus viudas” mantiene esa referencia colectiva sin forzar un singular que resultaría menos claro.
- source_word: מֵחוֹל יַמִּים
  english_pob_choice: than the sand of the seas
  chosen_spanish: que la arena de los mares
  alternatives_spanish:
  - que la arena del mar
  - que la arena de los mares
  lexicon: HALOT
  rationale: La forma plural “mares” sigue de cerca el hebreo y preserva la imagen poética de abundancia. “Arena de los mares” es suficientemente natural en español bíblico moderno.
- source_word: הֵבֵאתִי
  english_pob_choice: I have brought
  chosen_spanish: He traído
  alternatives_spanish:
  - Traje
  - He llevado
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción divina ya ejecutada con efecto presente. El pretérito perfecto compuesto en español transmite bien esa relevancia actual.
- source_word: עַל אֵם בָּחוּר
  english_pob_choice: against the mother of a young man
  chosen_spanish: contra la madre de un joven
  alternatives_spanish:
  - sobre la madre de un joven
  - contra la madre de un muchacho
  - contra la madre del joven
  lexicon: HALOT
  rationale: La construcción es difícil, pero “madre de un joven” preserva la sintaxis básica sin interpretar más de lo que el hebreo exige. “Contra” mantiene el valor hostil del juicio divino que aporta el contexto y el inglés POB.
- source_word: שֹׁדֵד
  english_pob_choice: a destroyer
  chosen_spanish: un destructor
  alternatives_spanish:
  - un devastador
  - un saqueador
  lexicon: HALOT
  rationale: El participio designa a quien arrasa o devasta. “Destructor” comunica la idea de agente devastador de manera clara y natural en español.
- source_word: בַּצָּהֳרָיִם
  english_pob_choice: at noon
  chosen_spanish: al mediodía
  alternatives_spanish:
  - a pleno día
  - a mediodía
  lexicon: HALOT
  rationale: “Al mediodía” es la equivalencia idiomática normal y conserva el contraste de un ataque en una hora inesperada.
- source_word: הִפַּלְתִּי
  english_pob_choice: I have made ... fall
  chosen_spanish: he hecho caer
  alternatives_spanish:
  - he causado que caiga
  - he derribado
  lexicon: HALOT
  rationale: El hiphil es causativo; “he hecho caer” conserva esa fuerza sin perder fluidez en español.
- source_word: עָלֶיהָ
  english_pob_choice: upon her
  chosen_spanish: sobre ella
  alternatives_spanish:
  - contra ella
  - encima de ella
  lexicon: HALOT
  rationale: El sufijo femenino singular remite a la madre mencionada. “Sobre ella” respeta la imagen de algo que cae y permite la continuidad con la siguiente frase.
- source_word: פִּתְאֹם
  english_pob_choice: suddenly
  chosen_spanish: de repente
  alternatives_spanish:
  - repentinamente
  - súbitamente
  lexicon: HALOT
  rationale: “De repente” es el equivalente moderno más claro para la irrupción inesperada del juicio.
- source_word: עִיר
  english_pob_choice: city
  chosen_spanish: ciudad
  alternatives_spanish:
  - poblado
  - ciudadanía
  lexicon: HALOT
  rationale: Se conserva la lectura del Texto Masorético en la traducción principal, como hace el inglés POB en la base textual, aunque la frase sea difícil. “Ciudad” respeta el sustantivo hebreo sin emendarlo en el cuerpo del texto.
- source_word: וּבֶהָלוֹת
  english_pob_choice: and terrors
  chosen_spanish: y terrores
  alternatives_spanish:
  - y espantos
  - y pánicos
  lexicon: HALOT
  rationale: El plural abstracto expresa sobresalto y pavor. “Terrores” es una opción sobria y fiel al campo semántico.
theological_decisions:
- issue: Tratamiento de la cláusula final difícil (עִיר וּבֶהָלוֹת)
  english_pob_reading: The English POB revised from 'city and terrors' to 'anguish and terrors' in the main text, while noting the Hebrew difficulty and textual/interpretive possibilities.
  chosen_spanish_reading: Se conserva “ciudad y terrores” en el texto principal, con nota para la dificultad textual.
  alternative_spanish_readings:
  - angustia y terrores
  - la ciudad y terrores
  - calamidad y terrores
  rationale: Como draft fuente-textual, la prioridad es no ocultar la lectura masorética ni resolver de antemano una dificultad que el propio aparato inglés documenta. “Ciudad” mantiene el MT; la nota permite mencionar la interpretación alternativa sin imponerla en el texto principal.
  doctrine_reference: Principios POB de primacía del original y transparencia textual
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de un reordenamiento más literal a una redacción más natural, y luego de 'city and terrors' a 'anguish and terrors' en la lectura principal. En español se decidió mantener la transparencia hacia el MT con 'ciudad y terrores' y documentar la alternativa interpretativa en nota, sin perder la fluidez del resto del verso.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando aparezca en este capítulo/segmento; aquí el versículo no contiene el Tetragrámaton explícito en la superficie traducida.
  - Se mantiene 'destructor' para שֹׁדֵד, coherente con el valor de agente devastador que el inglés POB documenta.
  - Se conserva el orden sintáctico español natural, pero sin borrar la dificultad de la cláusula final.
  - No se normaliza 'ciudad' a una lectura interpretativa en el cuerpo principal para preservar la transparencia del texto fuente.
