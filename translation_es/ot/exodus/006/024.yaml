translation:
  language: es
  text: 'Los hijos de Coré: Asir, Elcaná y Abiasaf. Estos son los clanes de los coreítas[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «familias de los coreítas». El hebreo puede designar agrupaciones de parentesco más amplias dentro de una tribu; «clanes» se usa aquí para reflejar con mayor precisión el contexto genealógico.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Y los hijos de
  - Los descendientes de
  lexicon: HALOT
  rationale: En una genealogía, בְּנֵי se rinde con naturalidad y precisión como «hijos de». Mantiene el valor genealógico directo sin sobreinterpretar como «descendientes», que sería más general.
- source_word: קֹרַח
  english_pob_choice: Korah
  chosen_spanish: Coré
  alternatives_spanish:
  - Korah
  lexicon: HALOT
  rationale: Nombre propio; en español bíblico de lectura eclesial es más reconocible «Coré». No altera el referente del hebreo y conserva claridad para el lector.
- source_word: אַסִּיר
  english_pob_choice: Assir
  chosen_spanish: Assir
  alternatives_spanish:
  - Asir
  lexicon: HALOT
  rationale: Nombre propio en la genealogía. Se conserva una transliteración cercana al hebreo; «Asir» sería una adaptación ortográfica posible, pero menos transparente al valor consonántico.
- source_word: וְאֶלְקָנָה
  english_pob_choice: Elkanah
  chosen_spanish: Elcaná
  alternatives_spanish:
  - Elcana
  - Elkaná
  lexicon: HALOT
  rationale: Nombre propio. «Elcaná» refleja una forma castellana más fluida y ampliamente inteligible, sin perder la identificación del nombre hebreo.
- source_word: וַאֲבִיאָסָף
  english_pob_choice: Abiasaph
  chosen_spanish: Abiasaf
  alternatives_spanish:
  - Abiasaf
  - Abiásaf
  lexicon: HALOT
  rationale: Nombre propio. Se prefiere una forma castellana estable y sencilla; la terminación en -f conserva mejor la consonante final del hebreo que -ph de la transliteración inglesa.
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Éstos son
  - Estos eran
  lexicon: HALOT
  rationale: La demostrativa introduce una cláusula identificativa; en español, «Estos son» reproduce con naturalidad la copula implícita del hebreo.
- source_word: מִשְׁפְּחֹת
  english_pob_choice: the clans of
  chosen_spanish: los clanes de
  alternatives_spanish:
  - las familias de
  - los linajes de
  lexicon: HALOT
  rationale: En contexto tribal/genealógico, מִשְׁפָּחָה designa subdivisiones de parentesco más amplias que una familia nuclear. «Clanes» preserva esa fuerza social.
- source_word: הַקָּרְחִי
  english_pob_choice: the Korahites
  chosen_spanish: los coreítas
  alternatives_spanish:
  - los coraítas
  - la casa de Coré
  lexicon: HALOT
  rationale: El gentilicio indica pertenencia a la línea de Coré. «Coreítas» es la forma española más directa y natural para el grupo étnico-genealógico.
theological_decisions:
- issue: Grupo genealógico vs. familia nuclear en מִשְׁפְּחֹת
  english_pob_reading: the clans of the Korahites
  chosen_spanish_reading: los clanes de los coreítas
  alternative_spanish_readings:
  - las familias de los coreítas
  - los linajes de los coreítas
  rationale: La lectura inglesa ya señaló que el término puede abarcar agrupaciones de parentesco dentro de una tribu. En español, «clanes» conserva mejor esa amplitud que «familias», que podría reducir indebidamente el alcance sociológico.
  doctrine_reference: Números 26:11; 1 Crónicas 6:22-23
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador de nota [a] ahora aparece exactamente en el texto español. La redacción se mantiene fiel al registro genealógico del hebreo y al criterio auditado del POB en inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «Coré» y «coreítas» por ser las formas españolas eclesialmente reconocibles y consistentes entre sí.
  - Se preservó «clanes» para מִשְׁפְּחֹת conforme al audit trail en inglés, evitando reducirlo a «familias» en el texto principal.
