id: MAT.23.37
reference: Matthew 23:37
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἰερουσαλὴμ Ἰερουσαλήμ, ἡ ⸀ἀποκτείνουσα τοὺς προφήτας καὶ λιθοβολοῦσα τοὺς ἀπεσταλμένους πρὸς αὐτήν— ποσάκις ἠθέλησα ἐπισυναγαγεῖν τὰ τέκνα σου, ὃν τρόπον ⸂ὄρνις ἐπισυνάγει⸃ τὰ νοσσία ⸀αὐτῆς ὑπὸ τὰς πτέρυγας, καὶ οὐκ ἠθελήσατε;
base_translation:
  language: en
  yaml_path: translation/nt/matthew/023/037.yaml
  text: Jerusalem[a], Jerusalem, the one who kills the prophets and stones those sent to her—how often I wanted to gather your children together, the way a hen gathers her chicks under her wings[b], and you were not willing!
  footnotes:
  - marker: a
    text: Or 'who kills the prophets and stones those sent to her.'
    reason: lexical_alternative
  - marker: b
    text: '''A hen'' translates a Greek word that can mean ''bird'' more generally, but the context of gathering young under wings points specifically to a hen.'
    reason: lexical_alternative
translation:
  language: ko
  text: 예루살렘아, 예루살렘아, 예언자들을 죽이고 자기에게 보내심을 받은 자들을 돌로 치는 자여 — 암탉이 자기 새끼를 날개 아래에 모으듯이, 내가 네 자녀를 모으려 한 적이 얼마였더냐! 그러나 너희가 원하지 않았다.
  philosophy: optimal-equivalence
theological_decisions:
- issue: 23:37 예루살렘에 대한 탄식의 정서적 무게 보존
  chosen_reading: 「예루살렘아, 예루살렘아 … 그러나 너희가 원하지 않았다」 — 부르심·통탄·거절의 삼중 구조 유지
  alternative_readings:
  - 설명적 산문화
  rationale: 본 절은 23장의 진노 선언 직후에 예수의 통곡으로 분위기가 전환되는 핵심 본문이다. 호격의 반복(Ἰερουσαλὴμ Ἰερουσαλήμ), 어머니 새의 비유, 마지막의 「οὐκ ἠθελήσατε」(너희가 원하지 않았다)의 단호함을 한국어에서도 그 정서적 무게 그대로 살린다. 「원하지 않았다」를 「듣지 않았다」 등으로 부드럽게 옮기지 않는다.
  doctrine_reference: 'DOCTRINE.md §5: render true and powerful meaning'
