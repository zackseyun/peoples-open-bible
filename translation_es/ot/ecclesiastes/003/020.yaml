translation:
  language: es
  text: Todo va a un solo lugar. Todo vino del polvo[a], y todo vuelve al polvo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Todo era del polvo». El hebreo dice más literalmente «todo era del polvo», pero «vino del polvo» expresa de forma más natural en español la idea de origen.'
    reason: lexical_alternative
  - marker: b
    text: «Polvo» evoca la mortalidad humana y recuerda Génesis 3:19.
    reason: cross_reference
lexical_decisions:
- source_word: הַכֹּל
  english_pob_choice: all
  chosen_spanish: todo
  alternatives_spanish:
  - todo lo creado
  - todas las cosas
  lexicon: HALOT
  rationale: El sustantivo con artículo tiene alcance comprehensivo. En español, «todo» es natural y conserva la universalidad breve del hebreo sin añadir una especificación que el contexto no exige.
- source_word: הוֹלֵךְ
  english_pob_choice: go
  chosen_spanish: va
  alternatives_spanish:
  - está yendo
  - camina
  - se dirige
  lexicon: HALOT
  rationale: El participio expresa una realidad general/proverbial. «Va» reproduce bien esa atemporalidad en español sin recargar la frase.
- source_word: מָקוֹם אֶחָד
  english_pob_choice: one place
  chosen_spanish: un mismo lugar
  alternatives_spanish:
  - un lugar
  - el mismo lugar
  - un solo lugar
  lexicon: HALOT
  rationale: Aunque el inglés auditado usa «one place», en español «un mismo lugar» comunica con mayor claridad la idea de destino común y conserva la economía del original sin sobreinterpretarlo.
- source_word: הָיָה מִן הֶעָפָר
  english_pob_choice: came from the dust
  chosen_spanish: vino del polvo
  alternatives_spanish:
  - era del polvo
  - salió del polvo
  - provenía del polvo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «era/estaba desde el polvo», pero el sentido de origen se expresa de forma más natural en español con «vino del polvo», siguiendo la equivalencia óptima documentada en el POB inglés.
- source_word: עָפָר
  english_pob_choice: dust
  chosen_spanish: polvo
  alternatives_spanish:
  - tierra
  - polvo de la tierra
  lexicon: HALOT
  rationale: «Polvo» mantiene la resonancia bíblica y la alusión a la mortalidad humana; en español es la correspondencia más directa y reconocible.
- source_word: שָׁב אֶל הֶעָפָר
  english_pob_choice: return to the dust
  chosen_spanish: vuelve al polvo
  alternatives_spanish:
  - regresa al polvo
  - retorna al polvo
  - vuelve a la tierra
  lexicon: HALOT
  rationale: «Vuelve» preserva la idea de retorno de שוב y mantiene el paralelismo con el origen. «Al polvo» conserva el mismo término del miembro anterior, como en el hebreo y en el audit trail inglés.
theological_decisions:
- issue: Alcance de «todo» en el contexto de mortalidad compartida
  english_pob_reading: The verse states the shared mortality of humans and animals without making a further doctrinal claim about the afterlife.
  chosen_spanish_reading: El versículo afirma la condición compartida de mortandad sin resolver más allá la cuestión del más allá.
  alternative_spanish_readings:
  - El versículo habla solo de los seres humanos en sentido general
  - El versículo enseña una postura materialista sobre el fin de toda diferencia tras la muerte
  rationale: En el contexto inmediato de Eclesiastés 3:18–21, la observación es comparativa y sapiencial. La traducción conserva esa tensión sin introducir una afirmación doctrinal que el texto no desarrolla explícitamente.
  doctrine_reference: Preservar la tensión teológica sin resolverla
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje tal como está confirmado por el auditor inglés: sin cambios textuales relevantes y con acuerdo alto entre las revisiones. Se conserva la equivalencia óptima del POB inglés, especialmente en el par origen/retorno («vino del polvo» / «vuelve al polvo»).'
  spanish_consistency_notes:
  - Se mantiene «polvo» de manera uniforme en ambos miembros para reproducir el paralelismo del hebreo.
  - Se evita «SEÑOR» y otros sustitutos no pertinentes porque el verso no contiene el nombre divino.
  - La frase «un mismo lugar» se usa para hacer explícita en español la idea de destino común sin agregar contenido doctrinal.
