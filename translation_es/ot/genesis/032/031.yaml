    reason: alternative_reading
  - marker: c
    text: O «mi alma ha sido librada», donde «alma» significa aquí «vida» o «yo mismo».
    reason: lexical_alternative
  revision_rationale: Se reemplaza el calco poco natural «llamó el nombre del lugar» por «llamó al lugar», que sigue siendo fiel al sentido de nombrar. También se reubican las notas para anclarlas exactamente a «Dios» y «mi vida», conforme a su contenido.
