translation:
  language: es
  text: 'Porque la palabra de un rey es autoridad[a], y ¿quién puede decirle: «Qué haces?»?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque donde está la palabra del rey, allí hay autoridad». El hebreo inicial puede construirse de manera más literal en ese sentido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּאֲשֶׁר
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Cuando
  lexicon: HALOT
  rationale: La partícula compuesta introduce aquí una base explicativa para la afirmación precedente. En español, «Porque» transmite con naturalidad ese valor causal/explicativo sin forzar un calco de «donde» o «en cuanto que».
- source_word: דְּבַר
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - orden
  - decreto
  - mandato
  lexicon: HALOT
  rationale: «Palabra» conserva el sustantivo básico del hebreo y mantiene abierta la fuerza de palabra real como dicha que lleva peso normativo, sin anticipar en exceso el matiz jurídico que lo desarrolla el predicado siguiente.
- source_word: מֶלֶךְ
  english_pob_choice: a king
  chosen_spanish: un rey
  alternatives_spanish:
  - el rey
  lexicon: HALOT
  rationale: El hebreo carece de artículo; «un rey» preserva el carácter general y proverbial del enunciado en Eclesiastés mejor que una referencia definida.
- source_word: שִׁלְטוֹן
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - poder
  - dominio
  - gobierno
  lexicon: HALOT
  rationale: El término señala poder rector o autoridad de gobierno. «Autoridad» reproduce mejor el valor predicativo de la frase y su fuerza de legitimidad vinculante en español.
- source_word: וּמִי
  english_pob_choice: and who
  chosen_spanish: ¿y quién
  alternatives_spanish:
  - ¿quién
  - ¿y quién es el que
  lexicon: HALOT
  rationale: La combinación de conjunción e interrogativo se vierte de forma directa para conservar el giro retórico y la transición a la pregunta desafiante.
- source_word: יֹאמַר לוֹ
  english_pob_choice: may say to him
  chosen_spanish: le dirá
  alternatives_spanish:
  - puede decirle
  - se atreverá a decirle
  lexicon: HALOT
  rationale: 'En esta pregunta retórica, el sentido es de posibilidad real o desafío posible. «Le dirá» en futuro simple funciona bien en español para la pregunta general: «¿quién le dirá...?».'
- source_word: מַה תַּעֲשֶׂה
  english_pob_choice: What are you doing?
  chosen_spanish: ¿Qué haces?
  alternatives_spanish:
  - ¿Qué estás haciendo?
  - ¿Qué haces tú?
  lexicon: HALOT
  rationale: El hebreo expresa un desafío directo. «¿Qué haces?» es la forma más natural y sobria en español para esa reprensión, sin añadir un progresivo que el original no exige.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés con acuerdo alto y sin revisiones aplicadas. Se optó por una equivalencia óptima en español: se mantuvo la estructura proverbial y la pregunta retórica, pero se eligieron formas naturales («Porque», «autoridad», «¿Qué haces?») en lugar de calcos más ásperos.'
  spanish_consistency_notes:
  - Se conserva «rey» como traducción general de מֶלֶךְ, coherente con el valor proverbial del versículo.
  - «Autoridad» mantiene el campo semántico de gobierno/poder señalado por el audit trail inglés.
  - La nota al pie preserva la alternativa de lectura literal del hebreo inicial sin imponerla en el texto principal.
