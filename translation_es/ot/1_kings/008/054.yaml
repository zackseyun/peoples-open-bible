translation:
  language: es
  text: Y cuando Salomón terminó de orar a Yahvé toda esta oración y súplica[a], se levantó de delante del altar de Yahvé, de estar arrodillado sobre sus rodillas, con sus manos extendidas hacia el cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «petición ferviente». El hebreo תְּחִנָּה denota una súplica intensa, a menudo con matiz de pedir misericordia o favor.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כְּכַלּוֹת
  english_pob_choice: And when Solomon had finished
  chosen_spanish: Y aconteció que, cuando Salomón terminó de orar
  alternatives_spanish:
  - Y cuando Salomón hubo terminado de orar
  - Y sucedió que, al terminar Salomón de orar
  lexicon: HALOT
  rationale: La construcción temporal hebrea se expresa de forma natural en español con una subordinada introducida por «cuando»; «Y aconteció que» conserva el valor narrativo de וַיְהִי sin sonar excesivamente arcaico.
- source_word: לְהִתְפַּלֵּל
  english_pob_choice: praying
  chosen_spanish: orar
  alternatives_spanish:
  - orar
  - hacer oración
  - rezar
  lexicon: HALOT
  rationale: El verbo hebreo se refiere a la acción de dirigir una oración a Dios; «orar» es claro, digno y estándar en español bíblico sin forzar el sentido.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino revelado en el hebreo, conforme al criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: אֵת כָּל הַתְּפִלָּה וְהַתְּחִנָּה הַזֹּאת
  english_pob_choice: all this prayer and plea
  chosen_spanish: toda esta oración y esta súplica
  alternatives_spanish:
  - toda esta oración y esta petición
  - toda esta oración y esta intercesión
  lexicon: HALOT
  rationale: תְּפִלָּה se traduce naturalmente por «oración». Para תְּחִנָּה, el inglés POB reduce a «plea» tras su revisión; en español, «súplica» conserva el valor de petición ferviente sin añadir la especificación «favor» que el texto no exige explícitamente.
- source_word: קָם
  english_pob_choice: he rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se levantó
  - se puso de pie
  - se alzó
  lexicon: HALOT
  rationale: La idea es un cambio de postura después de la oración; «se levantó» es idiomático en español y compatible con el hebreo.
- source_word: מִלִּפְנֵי מִזְבַּח יְהוָה
  english_pob_choice: from before the altar of Yahweh
  chosen_spanish: de delante del altar de Yahvé
  alternatives_spanish:
  - de delante del altar de Yahvé
  - de la presencia del altar de Yahvé
  - de frente al altar de Yahvé
  lexicon: HALOT
  rationale: «De delante de» preserva la relación espacial formal de לִפְנֵי sin suavizarla demasiado; se mantiene «altar de Yahvé» para reflejar el nombre divino del texto.
- source_word: מִכְּרֹעַ עַל בִּרְכָּיו
  english_pob_choice: from kneeling on his knees
  chosen_spanish: de haberse arrodillado sobre sus rodillas
  alternatives_spanish:
  - de haberse arrodillado
  - desde sus rodillas
  - de estar arrodillado
  lexicon: HALOT
  rationale: El hebreo es enfático; «arrodillado sobre sus rodillas» reproduce esa explicitud. Se opta por una formulación natural en español que conserva la redundancia del original.
- source_word: וְכַפָּיו פְּרֻשׂוֹת הַשָּׁמָיִם
  english_pob_choice: with his hands spread out toward heaven
  chosen_spanish: con sus manos extendidas hacia los cielos
  alternatives_spanish:
  - con sus manos extendidas hacia el cielo
  - con sus palmas extendidas hacia los cielos
  - con sus manos abiertas hacia los cielos
  lexicon: HALOT
  rationale: Aunque כַּף puede precisar «palma», el propio audit trail inglés revisado eligió «hands» por naturalidad. En español, «manos extendidas» mantiene fluidez y la dirección «hacia los cielos» conserva el plural hebreo sin necesidad de singularizarlo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: Se conserva el nombre propio del pacto, según la decisión doctrinal del proyecto, evitando la sustitución por un título impersonal. En este versículo no hay mediación por κύριος, sino uso directo del Tetragrama.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahweh/Yahvé'
- issue: תְּחִנָּה como petición ferviente
  english_pob_reading: plea
  chosen_spanish_reading: súplica
  alternative_spanish_readings:
  - plegaria
  - petición ferviente
  - súplica
  rationale: El hebreo puede abarcar una petición de favor o misericordia. «Súplica» comunica bien la intensidad sin forzar una explicación interpretativa que el texto hebreo no explicita en esta línea.
  doctrine_reference: 'HALOT: תְּחִנָּה = earnest plea/supplication'
translation_notes:
  revision_awareness: 'La redacción inglesa auditada fue revisada para volver más directa la cláusula de tiempo, reducir la especificación de תְּחִנָּה a «plea» y cambiar «palms» por «hands». La versión española toma como base esa última intención: conserva la simplicidad sintáctica, evita añadir un especificador innecesario a תְּחִנָּה y prefiere «manos extendidas» por naturalidad, aunque mantiene una nota para el matiz semántico de «súplica».'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera uniforme para יְהוָה.
  - «Orar/oración» se emplea para לְהִתְפַּלֵּל / תְּפִלָּה, reservando «súplica» para תְּחִנָּה.
  - La formulación «de delante del altar» conserva el valor espacial del hebreo sin reemplazarlo por una locución más interpretativa.
  - «Cielos» se mantiene en plural para reflejar el hebreo הַשָּׁמָיִם, aunque en español también sería posible el singular estilístico «cielo».
