translation:
  language: es
  text: El rico se acuesta, pero no será reunido[a]; abre los ojos, y ya no está[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no será reunido con sus padres», o más generalmente «no será reunido»; el hebreo es breve y puede aludir a la muerte y a la sepultura sin decirlo explícitamente.'
    reason: alternative_reading
  - marker: b
    text: 'Literalmente: «y no es»; un modismo que significa que se ha ido o que ya no está.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָשִׁיר
  english_pob_choice: rich
  chosen_spanish: el rico
  alternatives_spanish:
  - un hombre rico
  - el adinerado
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo/adjetivo sustantivado de valor predicativo. «El rico» conserva la concisión poética sin añadir «hombre», y suena natural en español bíblico moderno.
- source_word: יִשְׁכַּב
  english_pob_choice: lies down
  chosen_spanish: se acuesta
  alternatives_spanish:
  - se recuesta
  - yace
  lexicon: HALOT
  rationale: La idea básica es «acostarse/yacer». «Se acuesta» mantiene la imagen corporal de forma clara en español; «yace» sería más solemne, pero menos natural aquí.
- source_word: וְלֹא יֵאָסֵף
  english_pob_choice: but he will not be gathered
  chosen_spanish: pero no será reunido
  alternatives_spanish:
  - pero no será recogido
  - pero no será reunido con sus padres
  - pero no será juntado
  lexicon: HALOT
  rationale: שׁasaf en nifal significa «ser reunido». En español, «ser reunido» conserva la tersedad del hebreo y deja abierta la alusión a muerte y sepultura sin explicarla de más.
- source_word: עֵינָיו פָּקַח
  english_pob_choice: he opens his eyes
  chosen_spanish: abre sus ojos
  alternatives_spanish:
  - abre los ojos
  - sus ojos se abren
  lexicon: HALOT
  rationale: La construcción hebrea es idiomática y breve. «Abre sus ojos» reproduce la imagen inmediata y mantiene el paralelismo con la línea siguiente.
- source_word: וְאֵינֶנּוּ
  english_pob_choice: and he is gone
  chosen_spanish: y ya no está
  alternatives_spanish:
  - y no está
  - y es desaparecido
  - y no es
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente «y no es». «Ya no está» comunica de modo natural la desaparición repentina sin borrar la fuerza idiomática.
theological_decisions:
- issue: Elipsis sobre muerte y sepultura en «no será reunido»
  english_pob_reading: The Hebrew is terse and may allude to death and burial without stating it explicitly.
  chosen_spanish_reading: El hebreo es breve y puede aludir a muerte y sepultura sin decirlo explícitamente.
  alternative_spanish_readings:
  - No será reunido con sus padres
  - No será recogido
  rationale: Se conserva la ambigüedad documentada en la POB inglesa. En español, «reunido» permite tanto una lectura funeraria como una más general de desaparición sin imponer una interpretación secundaria.
  doctrine_reference: Job 27:19; nota de la POB inglesa sobre אָסף en nifal como idiomático para muerte/sepultura
- issue: Idiomático «y no es» en וְאֵינֶנּוּ
  english_pob_reading: Literally, 'and he is not'; an idiom meaning that he is gone or no more.
  chosen_spanish_reading: Literalmente, «y no es»; un modismo que significa que se ha ido o que ya no está.
  alternative_spanish_readings:
  - y no existe
  - y es como si no fuera
  rationale: 'Se mantiene la tensión entre literalidad e idiomatismo: el sentido directo «no es» y la equivalencia natural «ya no está».'
  doctrine_reference: Job 27:19; nota de la POB inglesa sobre וְאֵינֶנּוּ
translation_notes:
  revision_awareness: Alineado con la pasada de revisión más reciente (sin cambios), que consideró el acuerdo alto y no requirió ajustes. Se preserva la tersura del hebreo y la ambigüedad documentada en la nota inglesa.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; aquí no aparece.
  - Se evita introducir «Cristo/Mesías» o terminología interpretativa ajena al verso.
  - Se mantiene «reunido» para אָסף según el valor léxico principal, dejando la alusión funeraria en nota.
  - La frase final «ya no está» traduce el modismo hebreo sin perder su fuerza de desaparición repentina.
