  lexicon: BDAG
  rationale: ἐγκακέω는 「용기를 잃다·지치다」. 「낙심하다」가 지속적 선행 가운데 마음이 풀리는 의미를 한국어로 자연스럽게 표현한다.
- source_word: καλοποιοῦντες
  english_pob_choice: in doing good
  chosen_korean: 선을 행하다가
  alternatives_korean:
  - 선행을 하면서
  - 선을 행하는 가운데
  lexicon: BDAG
  rationale: 분사의 동반적·지속적 의미를 「~하다가」로 자연스럽게 표현한다.
theological_decisions:
