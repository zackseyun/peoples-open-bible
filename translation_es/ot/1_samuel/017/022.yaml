  text: וַ/יִּטֹּשׁ֩ דָּוִ֨ד אֶת הַ/כֵּלִ֜ים מֵ/עָלָ֗י/ו עַל יַד֙ שׁוֹמֵ֣ר הַ/כֵּלִ֔ים וַ/יָּ֖רָץ הַ/מַּעֲרָכָ֑ה וַ/יָּבֹ֕א וַ/יִּשְׁאַ֥ל לְ/אֶחָ֖י/ו לְ/שָׁלֽוֹם־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/017/022.yaml
  text: So David left the supplies in the care of the keeper of the supplies[a], and ran to the battle line[c][b]. He came and asked his brothers about their welfare.
  footnotes:
  - marker: a
    text: Or 'the baggage' / 'the equipment' for 'the supplies' (Hebrew כֵּלִים), a broad term for articles or gear. Here it likely refers to the provisions David was carrying.
    reason: lexical_alternative
  - marker: b
    text: Or 'the ranks' for 'the battle line' (Hebrew מַעֲרָכָה), referring to the arranged line or formation of troops.
    reason: lexical_alternative
  - marker: c
    text: Literally 'asked his brothers for peace'; this Hebrew idiom means he inquired about their welfare or well-being.
    reason: lexical_alternative
