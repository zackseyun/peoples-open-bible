id: T12P.LEV.15
reference: Testament of Levi 15
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: XV. Διὰ¹ τοῦτο² *ὁ ναός³, ὃν⁴ ἐκλέξεται⁵ κύριος⁶, *ἔρημος ἔσται⁷ *ἐν τῇ ἀκαθαρσίᾳ ὑμῶν⁸, καὶ ὑμεῖς αἰχμάλωτοι ἔσεσθε εἰς πάντα τὰ ἔθνη. 2. Καὶ *ἔσεσθε βδέλυγμα⁹ αὐτοῖς¹⁰, καὶ λήψεσθε¹¹ ὄνειδος¹² καὶ αἰσχύνην αἰώνιον παρὰ *τῆς δικαιοκρισίας¹³ τοῦ Θεοῦ. 3. Καὶ πάντες οἱ μισοῦντες¹⁴ ὑμᾶς *χαρήσονται ἐπὶ τῇ ἀπωλείᾳ¹⁵ ὑμῶν¹⁶. 4. Καὶ¹⁷ εἰ μὴ¹⁸ δι᾽ Ἀβραὰμ καὶ Ἰσαὰκ καὶ Ἰακὼβ *τῶν πατέρων ἡμῶν ἔλεος λήψεσθε¹⁹, εἷς²⁰ ἐκ τοῦ σπέρματος²¹ ὑμῶν²² *οὐ μὴ²³ καταλειφθῇ²⁴ ἐπὶ τῆς γῆς.
  language: Greek
  source_pages:
  - 124
  - 125
translation:
  text: Therefore the temple which the Lord will choose will become desolate in your uncleanness[a], and you will be taken captive among all the nations. And you will be an abomination to them, and you will receive reproach and everlasting shame from the righteous judgment of God. And all who hate you will rejoice over your destruction. And if it were not for Abraham and Isaac and Jacob our fathers, you would receive no mercy[b][c]; not one from your seed would be left upon the earth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sanctuary'; the Greek ναός specifically denotes the holy temple.
    reason: lexical_alternative
    anchor_ref: '15:1'
  - marker: c
    text: '''Righteous judgment'' could also be rendered ''just judgment.'''
    reason: lexical_alternative
    anchor_ref: '15:2'
  - marker: b
    text: The Greek uses 'seed,' a covenantal lineage term; 'offspring' or 'descendants' would be smoother English.
    reason: lexical_alternative
    anchor_ref: '15:4'
lexical_decisions:
- source_word: ναός
  chosen: temple
  alternatives:
  - sanctuary
  - shrine
  lexicon: LSJ
  rationale: In this Jewish testamentary context ναός refers to the Jerusalem temple as the holy sanctuary chosen by God. 'Temple' is the natural and sufficiently specific English rendering.
- source_word: ἐκλέξεται
  chosen: will choose
  alternatives:
  - will elect
  - will select
  lexicon: LSJ
  rationale: The future middle points to the Lord's choosing of the place of worship. 'Will choose' preserves the covenantal allusion without sounding technical.
- source_word: ἔρημος ἔσται
  chosen: will become desolate
  alternatives:
  - will be deserted
  - will be laid waste
  lexicon: LSJ
  rationale: The phrase expresses devastation and abandonment as judgment. 'Will become desolate' preserves prophetic diction and suits the warning tone.
- source_word: ἀκαθαρσία
  chosen: uncleanness
  alternatives:
  - impurity
  - defilement
  lexicon: LSJ
  rationale: Because the context is cultic and moral pollution leading to temple desolation, 'uncleanness' keeps the impurity language vivid and biblically resonant.
- source_word: αἰχμάλωτοι ἔσεσθε
  chosen: you will be taken captive
  alternatives:
  - you will become captives
  - you will go into captivity
  lexicon: LSJ
  rationale: This rendering is idiomatic English while preserving the passive force of being handed over into exile.
- source_word: βδέλυγμα
  chosen: abomination
  alternatives:
  - detestable thing
  - object of loathing
  lexicon: LSJ
  rationale: '''Abomination'' preserves the strong covenantal and moral force of the Greek, especially in a judgment oracle.'
- source_word: ὄνειδος
  chosen: reproach
  alternatives:
  - disgrace
  - insult
  lexicon: LSJ
  rationale: '''Reproach'' fits the elevated register and pairs well with ''everlasting shame'' in a prophetic denunciation.'
- source_word: αἰσχύνην αἰώνιον
  chosen: everlasting shame
  alternatives:
  - eternal shame
  - perpetual disgrace
  lexicon: LSJ
  rationale: This keeps the solemn, enduring sense of the phrase and echoes biblical judgment language.
- source_word: δικαιοκρισίας
  chosen: righteous judgment
  alternatives:
  - just judgment
  - judgment in righteousness
  lexicon: LSJ
  rationale: The compound emphasizes judgment characterized by righteousness. 'Righteous judgment' is concise and theologically weighty.
- source_word: ἀπωλείᾳ
  chosen: destruction
  alternatives:
  - ruin
  - perdition
  lexicon: LSJ
  rationale: In context it refers to national downfall rather than abstract damnation. 'Destruction' is clear and strong.
- source_word: ἔλεος λήψεσθε
  chosen: you would receive mercy
  alternatives:
  - you would obtain mercy
  - you would find compassion
  lexicon: LSJ
  rationale: The conditional warning is best expressed in natural English with 'receive mercy,' preserving divine compassion as something granted, not assumed.
- source_word: οὐ μὴ καταλειφθῇ
  chosen: not one ... would be left
  alternatives:
  - would certainly not be left
  - would by no means remain
  lexicon: LSJ
  rationale: The emphatic negation is represented by 'not one ... would be left,' which communicates totality in idiomatic English.
- source_word: σπέρματος
  chosen: seed
  alternatives:
  - offspring
  - descendants
  lexicon: LSJ
  rationale: I retained 'seed' because the patriarchal testament setting favors covenantal lineage language; the phrase remains intelligible in English.
