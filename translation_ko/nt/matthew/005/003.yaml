lexical_decisions:
- source_word: Μακάριοι
  english_pob_choice: Blessed
  chosen_korean: 복이 있습니다
  alternatives_korean:
  - 복되도다
  - 복 있는 자
  - 행복하다
  lexicon: BDAG
  rationale: μακάριος의 선언적 무게를 살리되, 합쇼체 본문 흐름에서 「복이 있습니다」를 채택해 현대적 가독성과 선언적 격조를 함께 살린다. 「복되도다」는 강한 시적 격조이나 합쇼체와의 어조 단절이 크다. 본 번역은 5:3-11 전체에서 「…한 사람은 복이 있습니다」 정형을 일관되게 반복해 마태의 동일 어두 반복(μακάριοι… μακάριοι… μακάριοι)을 한국어에서 동일 어말 반복으로 살린다.
- source_word: οἱ πτωχοὶ τῷ πνεύματι
  english_pob_choice: the poor in spirit
  chosen_korean: 영이 가난한 사람
  alternatives_korean:
  - 심령이 가난한 자
  - 마음이 가난한 사람
  lexicon: BDAG
  rationale: πνεῦμα(영)의 무게를 보존해 「영이 가난한」으로 옮긴다. 한국 전통의 「심령이 가난한 자」도 통용되나, 「마음이 가난한」은 πτωχοὶ τῇ καρδίᾳ(없는 구문)와 혼동될 수 있다.
theological_decisions:
- issue: 팔복의 카덴스 — μακάριοι 반복의 한국어 재현
  chosen_reading: …한 사람은 복이 있습니다 (5:3-11 일관)
  alternative_readings:
  - 복되도다 …한 자여 (어두형 시적 반복)
  - 행복합니다 …한 사람은
  rationale: 마태의 팔복은 같은 어두(μακάριοι)로 시작하는 9회 반복으로 시청각적 카덴스를 만든다. 한국어에서 어두 반복을 살리려면 「복이 있는…」 정형이 가능하나 자연스럽지 못하다. 어말 반복(「…복이 있습니다」)이 합쇼체 본문과도 어울리고, 같은 정형의 9회 반복으로 청각적 카덴스를 살린다. 「복되도다」 같은 시적 격조는 본 번역의 현대 합쇼체 원칙과 어조가 어긋난다.
  doctrine_reference: Korean pipeline register policy; preserve liturgical cadence within modern 합쇼체
- issue: 산상수훈 도입 발화 — 합쇼체
  chosen_reading: …있습니다 …것이기 때문입니다
  alternative_readings:
  - …있다 …것이다
  rationale: '본 번역 원칙: 예수의 청중을 향한 직접 발화는 합쇼체. 산상수훈 전체를 합쇼체로 옮겨 권위 있는 가르침의 격조를 보존한다.'
  doctrine_reference: Korean pipeline policy
