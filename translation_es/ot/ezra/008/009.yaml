translation:
  language: es
  text: 'De los hijos de Joab: Obadías hijo de Jehiel[a], y con él 218 varones.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «doscientos dieciocho».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִ/בְּנֵ֣י
  english_pob_choice: From the sons of
  chosen_spanish: De los hijos de
  alternatives_spanish:
  - De entre los hijos de
  - De los descendientes de
  lexicon: HALOT
  rationale: La construcción con מִן + בְּנֵי introduce un subgrupo dentro de la lista de retornados. «De los hijos de» conserva bien ese valor partitivo y el tono genealógico/listado sin forzar una interpretación biológica estricta.
- source_word: יוֹאָב
  english_pob_choice: Joab
  chosen_spanish: Joab
  lexicon: convención onomástica bíblica
  rationale: Nombre propio transliterado de manera estándar en español bíblico.
- source_word: עֹבַדְיָה
  english_pob_choice: Obadiah
  chosen_spanish: Obadías
  alternatives_spanish:
  - Obadía
  lexicon: convención onomástica bíblica
  rationale: Se adopta la forma española bíblica más reconocible y readable, manteniendo la identificación del nombre propio.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - el hijo de
  lexicon: HALOT
  rationale: El marcador filial hebreo se expresa con la fórmula natural «hijo de» en una nota genealógica.
- source_word: יְחִיאֵל
  english_pob_choice: Jehiel
  chosen_spanish: Jehiel
  alternatives_spanish:
  - Jehiél
  lexicon: convención onomástica bíblica
  rationale: Nombre propio conservado en transliteración española tradicional y ampliamente inteligible.
- source_word: וְ/עִמּוֹ
  english_pob_choice: and with him
  chosen_spanish: y con él
  alternatives_spanish:
  - con él
  lexicon: HALOT
  rationale: El hebreo coordina la frase con וְ; en español, «y con él» refleja esa coordinación y mantiene el estilo enumerativo del pasaje.
- source_word: מָאתַ֛יִם וּ/שְׁמֹנָ֥ה עָשָׂ֖ר
  english_pob_choice: '218'
  chosen_spanish: '218'
  alternatives_spanish:
  - doscientos dieciocho
  lexicon: HALOT
  rationale: En un contexto de lista, el número en dígitos mejora la legibilidad sin alterar el contenido semántico. La opción escrita sigue siendo válida, pero aquí se conserva el valor numérico como en el audit trail inglés.
- source_word: הַ/זְּכָרִֽים
  english_pob_choice: males
  chosen_spanish: varones
  alternatives_spanish:
  - males
  - hombres
  lexicon: HALOT
  rationale: «Varones» comunica el rasgo sexual/género marcado por el hebreo sin sonar tan técnico como «males» en español; evita además suavizarlo indebidamente con «hombres», que puede sugerir solo adultos.
translation_notes:
  revision_awareness: 'El texto coincide sustancialmente con el audit trail inglés: mantiene la estructura partitiva, el nombre propio, la relación filial, el acompañamiento numérico y la designación de sexo. La única adaptación estilística relevante es usar «Obadías» y «varones» para una publicación española más natural, sin perder el sentido original.'
  spanish_consistency_notes:
  - Se mantiene «Joab» y «Jehiel» como nombres propios transliterados, sin adaptar innecesariamente la onomástica.
  - Se conserva el orden breve de lista genealógica del hebreo.
  - La nota textual del número se ancla en el propio numeral para reflejar la alternativa léxica documentada en el audit trail.
