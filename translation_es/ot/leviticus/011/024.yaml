    text: 'O: «Y respecto de estas ustedes se volverán impuros». La frase inicial puede introducir la categoría siguiente de manera general, no solo instrumental.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo dice literalmente «su cadáver»: sustantivo singular con sufijo plural. En español también podría entenderse «sus cadáveres».'
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'Y con estas cosas' por 'Y por estas' para reflejar con más precisión el demostrativo hebreo sin añadir 'cosas' y para conservar mejor el matiz instrumental documentado en el POB inglés. Se mantienen el resto de las formulaciones y notas porque son sustancialmente fieles y claras en español.
