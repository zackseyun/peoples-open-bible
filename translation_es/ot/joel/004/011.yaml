translation:
  language: es
  text: Dense prisa y vengan[a], todas las naciones de todas partes, y reúnanse allí. Haz descender a tus poderosos[b], Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Apresúrense y vengan … y reúnanse allí».
    reason: lexical_alternative
  - marker: b
    text: O «Envía abajo, Yahvé, a tus poderosos». El hebreo «tus poderosos» puede referirse de modo general a agentes poderosos de Yahvé, sin especificar si son humanos o celestiales.
    reason: alternative_reading
lexical_decisions:
- source_word: ע֣וּשׁוּ
  english_pob_choice: Hasten
  chosen_spanish: Apresuraos
  alternatives_spanish:
  - Daos prisa
  - Apresuraos rápidamente
  lexicon: HALOT
  rationale: El imperativo expresa urgencia de movimiento; en español, «apresuraos» conserva esa fuerza sin sonar tan abstracto como una paráfrasis.
- source_word: וָ/בֹ֧אוּ
  english_pob_choice: and come
  chosen_spanish: y venid
  alternatives_spanish:
  - y llegad
  - y venid aquí
  lexicon: HALOT
  rationale: Se mantiene la coordinación con el primer imperativo para reproducir el impulso retórico del hebreo.
- source_word: כָֽל הַ/גּוֹיִ֛ם
  english_pob_choice: all you nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todas ustedes, naciones
  - todas las naciones de ustedes
  lexicon: HALOT
  rationale: El hebreo se dirige a las naciones en conjunto; en español la fuerza vocativa queda suficientemente clara sin forzar un «ustedes» explícito que suene poco natural.
- source_word: מִ/סָּבִ֖יב
  english_pob_choice: from every side
  chosen_spanish: desde cada lado
  alternatives_spanish:
  - de alrededor
  - desde todos lados
  lexicon: HALOT
  rationale: «Desde cada lado» conserva la imagen de convergencia circundante de manera idiomática y transparente.
- source_word: וְ/נִקְבָּ֑צוּ
  english_pob_choice: and gather yourselves
  chosen_spanish: y reúneos
  alternatives_spanish:
  - y congregaos
  - y reuníos
  lexicon: HALOT
  rationale: El verbo puede reflejar una reunión auto-convocada o pasiva; «reúneos» preserva el matiz reflexivo sin añadir términos eclesiásticos ajenos.
- source_word: הַֽנְחַ֥ת
  english_pob_choice: Bring down
  chosen_spanish: Haz descender
  alternatives_spanish:
  - Envía abajo
  - Baja
  lexicon: HALOT
  rationale: La forma causativa pide una acción de hacer bajar; «haz descender» es fiel y natural en español, sin perder el movimiento vertical del verbo.
- source_word: יְהוָ֖ה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - oh Yahvé
  - SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino en su forma acordada para el proyecto, sin sustituirlo por un título. En español, la vocalización «Yahvé» es la forma publicada preferida.
- source_word: גִּבּוֹרֶֽי/ךָ
  english_pob_choice: your mighty ones
  chosen_spanish: tus poderosos
  alternatives_spanish:
  - tus poderosos guerreros
  - tus valientes
  lexicon: HALOT
  rationale: «Poderosos» preserva la amplitud semántica del hebreo sin decidir prematuramente si se trata de guerreros humanos o de agentes celestiales.
theological_decisions:
- issue: Identidad de los «gibborim» de Yahvé
  english_pob_reading: your mighty ones
  chosen_spanish_reading: tus poderosos
  alternative_spanish_readings:
  - tus guerreros
  - tus héroes
  - tus poderosos guerreros
  rationale: El hebreo no especifica si se trata de seres humanos, mensajeros celestiales o simplemente agentes poderosos pertenecientes a Yahvé. La traducción conserva esa amplitud y no resuelve la tensión interpretativa.
  doctrine_reference: Preservar la tensión lexical y teológica del texto sin sobreespecificar.
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - oh Yahvé
  - SEÑOR
  rationale: Se sigue la convención del proyecto de transliterar el Tetragrama como «Yahvé», manteniendo el nombre personal de Dios en lugar de reemplazarlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La formulación española sigue el trazado revisado del inglés POB, que mantiene la secuencia de imperativos y coloca la invocación divina al final de la cláusula. También conserva la apertura semántica de גִּבּוֹרֶיךָ y la decisión del proyecto de traducir יְהוָה como Yahvé.
  spanish_consistency_notes:
  - Se usa «Yahvé» en lugar de «SEÑOR» por consistencia con la terminología del proyecto.
  - Se prefirió «poderosos» para no cerrar indebidamente la referencia de גִּבּוֹרֶיךָ.
  - La puntuación reproduce el empuje imperativo del hebreo con dos cláusulas breves y simétricas.
