translation:
  language: es
  text: Y Yahvé salvará primero las tiendas de Judá[a], para que la gloria de la casa de David y la gloria de los habitantes de Jerusalén no se engrandezca[b] por encima de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Tiendas» puede entenderse también como «moradas» o «asentamientos» de Judá. El hebreo dice literalmente «las tiendas de Judá», probablemente contrastando las poblaciones periféricas con Jerusalén y la casa de David.
    reason: lexical_alternative
  - marker: b
    text: 'O: «no sea exaltada por encima de Judá». El hebreo también puede expresarse como «no sea engrandecida sobre Judá», pero aquí la idea es que no se eleve en honor por encima de Judá.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/הוֹשִׁיעַ
  english_pob_choice: will save
  chosen_spanish: salvará
  alternatives_spanish:
  - librará
  - rescatará
  lexicon: HALOT
  rationale: El hifil de ישׁע expresa salvar/liberar. «Salvará» es natural en español y conserva el peso teológico del rescate divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto fuente usa el nombre propio divino; en español del POB se conserva como «Yahvé» para no sustituirlo por un título.
- source_word: אָהֳלֵי יְהוּדָה
  english_pob_choice: the tents of Judah
  chosen_spanish: las tiendas de Judá
  alternatives_spanish:
  - las moradas de Judá
  - los campamentos de Judá
  lexicon: HALOT
  rationale: «Tiendas» preserva la imagen literal del hebreo y la posible contraposición social con Jerusalén y la casa de David.
- source_word: בָּרִאשֹׁנָה
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - en primer lugar
  - al principio
  lexicon: HALOT
  rationale: El adverbio señala prioridad temporal; «primero» es breve y fiel.
- source_word: תִגְדַּל
  english_pob_choice: may not be magnified
  chosen_spanish: no sea engrandecida
  alternatives_spanish:
  - no sea exaltada
  - no crezca
  lexicon: HALOT
  rationale: גדל, aplicado a «gloria», admite la idea de ser engrandecida/exaltada. «Engrandecida» mantiene la imagen de elevación sin perder el matiz comparativo.
- source_word: תִּפְאֶרֶת
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  - honor
  lexicon: HALOT
  rationale: «Gloria» encaja con la paralelística del versículo y refleja el valor de תפארת sin reducirlo a mera vanagloria.
- source_word: בֵּית דָּוִיד
  english_pob_choice: the house of David
  chosen_spanish: la casa de David
  alternatives_spanish:
  - la dinastía de David
  - el linaje de David
  lexicon: HALOT
  rationale: La expresión es la forma estándar para la casa real davídica; «casa» conserva la formulación del original y su sentido dinástico.
- source_word: יֹשֵׁב יְרוּשָׁלִַם
  english_pob_choice: the inhabitants of Jerusalem
  chosen_spanish: los habitantes de Jerusalén
  alternatives_spanish:
  - el que habita en Jerusalén
  - los moradores de Jerusalén
  lexicon: HALOT
  rationale: Aunque el hebreo usa un singular participial colectivo, el español fluye mejor en plural colectivo, tal como la revisión inglesa reciente también lo reconoce.
- source_word: עַל יְהוּדָה
  english_pob_choice: over Judah
  chosen_spanish: sobre Judá
  alternatives_spanish:
  - por encima de Judá
  - contra Judá
  lexicon: HALOT
  rationale: «Sobre» conserva la relación de superioridad o elevación implicada por עַל, sin concretarla indebidamente como hostilidad.
theological_decisions:
- issue: Contraste social y honor dentro del pueblo de Dios
  english_pob_reading: The verse emphasizes that the LORD gives priority to Judah's vulnerable/outlying communities so that neither the Davidic house nor Jerusalem's inhabitants are exalted over Judah.
  chosen_spanish_reading: El versículo resalta que Yahvé concede prioridad a las comunidades más periféricas de Judá, de modo que ni la casa davídica ni los habitantes de Jerusalén se eleven en honor por encima de Judá.
  alternative_spanish_readings:
  - El versículo solo indica el orden cronológico de la salvación, sin énfasis social.
  - La frase se refiere únicamente a Jerusalén como centro religioso, sin contraste con Judá.
  rationale: La mención de «las tiendas de Judá» frente a «la casa de David» y «los habitantes de Jerusalén», junto con la cláusula final, sugiere más que una mera secuencia temporal. La traducción mantiene esa tensión social y honorífica sin sobredeterminarla.
  doctrine_reference: Zacarías 12:7; lectura del contraste interno del pueblo de Dios
translation_notes:
  revision_awareness: La versión inglesa revisada cambió el singular colectivo de «the inhabitant of Jerusalem» a «the inhabitants of Jerusalem». La draft española adopta desde el inicio el plural colectivo, que suena más natural y sigue el sentido colectivo del participio hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton, conforme al estándar del proyecto.
  - Se usa «gloria» para תִּפְאֶרֶת en ambos miembros del paralelismo para conservar el equilibrio semántico.
  - «Tiendas de Judá» reproduce la imagen concreta del hebreo y no la suaviza a «moradas» en el texto principal.
  - «Sobre Judá» conserva la ambigüedad de superioridad/elevación sin resolverla en exceso.
