  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura y el sentido general del hebreo: modo de vida por la espada, servicio al hermano y posterior ruptura del yugo. También preserva la tensión interpretativa de תָּרִיד con nota. Sin embargo, el anclaje de la nota está colocado en «vivirás[a]» cuando corresponde a la cláusula «cuando te libres», que distorsiona la evidencia fuente y la auditoría inglesa.'
  spanish_quality_summary: El español es mayormente claro y digno. «Y por tu espada vivirás» y «servirás a tu hermano» son naturales y fieles. La expresión «de sobre tu cuello» es entendible pero algo rígida; «de tu cuello» suena más natural, aunque no es imprescindible corregirla. La reparación necesaria es mover la nota al lugar correcto y pulir levemente la nota misma.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé/Mesías. «Servirás» para עבד y «yugo» para עֹל concuerdan con las decisiones auditadas. La elección «te libres» para תָּרִיד es aceptable si se conserva la alternativa en nota.
  issues:
  - severity: high
    issue: La nota [a] está anclada en «vivirás» en lugar de la cláusula que traduce תָּרִיד.
    rationale: La nota explica la dificultad léxica de תָּרִיד ('break loose' / 'grow restless'), no de תִחְיֶה. Debe aparecer junto a «cuando te libres» para preservar la relación exacta con el fuente y la auditoría inglesa.
  - severity: low
    issue: La redacción de la nota comienza con una comilla innecesaria y puede simplificarse.
    rationale: '«''O: ...» no sigue una puntuación española limpia. Conviene normalizar la nota sin cambiar su contenido sustancial.'
  revised_spanish_text: Y por tu espada vivirás, y servirás a tu hermano; pero cuando te libres[a], romperás su yugo de sobre tu cuello.
  revised_footnotes:
  - marker: a
    text: 'O: «cuando te inquietes». El verbo hebreo תָּרִיד es difícil; el contexto de romper el yugo favorece «cuando te libres», pero también es posible un sentido como «cuando te inquietes» o «cuando te vuelvas restivo».'
    reason: alternative_reading
  revision_rationale: 'Se requiere una corrección menor pero importante: trasladar la nota al segmento que traduce תָּרִיד. Así se alinea correctamente el texto español con el hebreo y con la auditoría inglesa, sin necesidad de reescribir sustancialmente la traducción.'
