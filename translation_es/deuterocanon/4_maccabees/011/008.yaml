translation:
  language: es
  text: 'Ahora, mira: siendo ajeno[a] a Dios, haces guerra a los que son devotos de Dios.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «siendo extraño a Dios» o «siendo apartado de Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: νῦν
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - En este momento
  - Pues ahora
  lexicon: BDAG
  rationale: Marca el giro discursivo y la reprensión presente. «Ahora» es natural en español y conserva la inmediatez del reproche.
- source_word: ἰδὲ
  english_pob_choice: look
  chosen_spanish: mira
  alternatives_spanish:
  - mira aquí
  - ve
  lexicon: BDAG
  rationale: Imperativo de atención y confrontación. «Mira» transmite la llamada directa sin arcaísmo.
- source_word: ἀλλότριος ὢν θεοῦ
  english_pob_choice: being alien to God
  chosen_spanish: siendo ajeno a Dios
  alternatives_spanish:
  - siendo extraño a Dios
  - estando alejado de Dios
  - siendo extranjero respecto de Dios
  lexicon: BDAG
  rationale: «Ajeno a Dios» conserva la separación relacional y moral del griego ἀλλότριος con el genitivo, sin cargar el texto con una formulación doctrinal posterior. «Siendo» refleja directamente el participio ὢν.
- source_word: πολεμεῖς
  english_pob_choice: you are making war against
  chosen_spanish: haces guerra contra
  alternatives_spanish:
  - luchas contra
  - peleas contra
  - estás haciendo guerra contra
  lexicon: BDAG
  rationale: El verbo expresa hostilidad activa en términos bélicos. «Haces guerra contra» mantiene la intensidad militar en español y suena más natural que una calca rígida.
- source_word: τοὺς εὐσεβοῦντας
  english_pob_choice: those who are devout
  chosen_spanish: los que son devotos
  alternatives_spanish:
  - los piadosos
  - los que practican piedad
  - los fieles
  lexicon: BDAG
  rationale: El participio presente indica una disposición/acción continua de reverencia. «Los que son devotos» preserva el carácter descriptivo del grupo sin convertirlo en un título eclesiástico fijo.
- source_word: εἰς τὸν θεόν
  english_pob_choice: toward God
  chosen_spanish: hacia Dios
  alternatives_spanish:
  - para con Dios
  - a Dios
  - respecto de Dios
  lexicon: BDAG
  rationale: El griego usa una dirección relacional de devoción. «Hacia Dios» conserva esa orientación mejor que un simple «a Dios» en español.
theological_decisions:
- issue: Fuerza relacional de ἀλλότριος θεοῦ
  english_pob_reading: The phrase is rendered as alienation/estrangement from God, not merely ethnic or social foreignness.
  chosen_spanish_reading: La frase se traduce como ajenidad/extrañeza respecto de Dios, no como simple extranjería étnica o social.
  alternative_spanish_readings:
  - extraño a Dios
  - alejado de Dios
  - perteneciente a otro y no a Dios
  rationale: En el contexto, la madre reprende la impiedad y la oposición a los fieles; por eso el sentido es relacional y moral. «Ajeno a Dios» conserva esa tensión sin introducir terminología doctrinal ajena al texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego y el audit trail inglés: νῦν/ἰδὲ como apertura discursiva y llamada de atención; ἀλλότριος ὢν θεοῦ como participio relacional directo; πολεμεῖς con intensidad bélica; y εὐσεβοῦντας εἰς τὸν θεόν como orientación devota hacia Dios. Se evita una traducción meramente calcada del inglés y se conserva la tensión semántica de ἀλλότριος.'
  spanish_consistency_notes:
  - Se emplea «Dios» para θεοῦ según el estándar del proyecto.
  - Se usa «devotos» para εὐσεβοῦντας por su valor participial y descriptivo; no se reemplaza por un término eclesiástico técnico.
  - «Ajeno a Dios» mantiene la diferencia entre separación relacional y una idea más fuerte de condena o exclusión que el griego no explicita.
