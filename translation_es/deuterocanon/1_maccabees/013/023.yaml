translation:
  language: es
  text: Pero cuando se acercó a Baskama, mató a Jonatán, y fue sepultado allí.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὡς δὲ
  english_pob_choice: But when
  chosen_spanish: Pero cuando
  alternatives_spanish:
  - Y cuando
  - Ahora bien, cuando
  lexicon: LSJ
  rationale: La secuencia introduce el siguiente acontecimiento con continuidad narrativa y un matiz leve de contraste; «Pero cuando» reproduce bien ese giro en un español natural.
- source_word: ἤγγισεν
  english_pob_choice: he came near to
  chosen_spanish: se acercó a
  alternatives_spanish:
  - llegó cerca de
  - se aproximó a
  lexicon: LSJ
  rationale: El verbo expresa acercamiento hacia un lugar; «se acercó a» es claro, idiomático y mantiene la dirección del movimiento.
- source_word: τῆς Βασκαμά
  english_pob_choice: Baskama
  chosen_spanish: Baskama
  alternatives_spanish:
  - Bascama
  - Baskamah
  lexicon: transliteration
  rationale: Se conserva el nombre propio transliterado, sin traducirlo, conforme a la convención del proyecto para topónimos.
- source_word: ἀπέκτεινεν
  english_pob_choice: he killed
  chosen_spanish: mató a
  alternatives_spanish:
  - dio muerte a
  - lo mató
  lexicon: LSJ
  rationale: El verbo significa matar o dar muerte. «Mató a» es directo, natural y fiel al valor básico del griego sin cargarlo de matiz judicial.
- source_word: τὸν Ἰωναθάν
  english_pob_choice: Jonathan
  chosen_spanish: Jonatán
  alternatives_spanish:
  - Jonathan
  lexicon: transliteration
  rationale: Se usa la forma española habitual del nombre propio, «Jonatán», para una lectura fluida y reconocible.
- source_word: ἐτάφη
  english_pob_choice: he was buried
  chosen_spanish: fue sepultado
  alternatives_spanish:
  - fue enterrado
  - fue enterrado allí
  lexicon: LSJ
  rationale: El pasivo aoristo de θάπτω indica ser enterrado/sepultado. «Fue sepultado» es formal y natural en español bíblico contemporáneo.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: LSJ
  rationale: El adverbio de lugar se vierte con «allí», que conserva la referencia espacial de forma simple y directa.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el texto español se apoya directamente en el griego de Swete y en las decisiones léxicas auditadas del POB en inglés, sin necesidad de ajustes textuales adicionales.
  spanish_consistency_notes:
