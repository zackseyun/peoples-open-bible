translation:
  language: es
  text: Que tu misericordia, oh Señor, esté sobre todos los que te aman.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: γένοιτο
  english_pob_choice: may ... be
  chosen_spanish: Que ... esté
  alternatives_spanish:
  - Que ... sea
  - Ojalá ... esté
  lexicon: BDAG
  rationale: El optativo aoristo expresa un deseo o petición. En español, la construcción desiderativa con 'Que' + subjuntivo transmite con naturalidad la fuerza orante de la frase sin endurecerla ni volverla mecánica.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - oh Señor
  lexicon: BDAG
  rationale: En este registro de oración dirigida a Dios, el proyecto usa 'Yahvé' para el nombre divino. Aunque el griego tiene Κύριε, aquí funciona como vocativo para Dios; por eso se evita una máscara reverencial genérica y se mantiene la identificación del referente divino.
- source_word: τὸ ἔλεός σου
  english_pob_choice: your mercy
  chosen_spanish: tu misericordia
  alternatives_spanish:
  - tu compasión
  - tu misericordia fiel
  lexicon: BDAG
  rationale: ἔλεος se vierte de forma directa como 'misericordia', que es el equivalente más claro y natural en español. 'Compasión' es posible, pero 'misericordia' conserva mejor el valor bíblico y orante del término.
- source_word: ἐπὶ πάντας
  english_pob_choice: upon all
  chosen_spanish: sobre todos
  alternatives_spanish:
  - sobre todos
  - para todos
  lexicon: BDAG
  rationale: Con esta construcción de petición, ἐπί con acusativo expresa dirección hacia o reposo sobre. 'Sobre' conserva esa imagen mejor que una paráfrasis más abstracta.
- source_word: τοὺς ἀγαπῶντάς σε
  english_pob_choice: all who love you
  chosen_spanish: los que te aman
  alternatives_spanish:
  - todos los que te aman
  - los que te aman a ti
  lexicon: BDAG
  rationale: El participio articular presente designa a un grupo caracterizado por amar a Dios. En español, 'los que te aman' es idiomático y fiel; el 'todos' de la versión inglesa queda implícito por 'sobre todos' en la oración.
theological_decisions:
- issue: Vocativo divino en Κύριε
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  rationale: La línea es una súplica dirigida a Dios. Dado el criterio del proyecto de representar el nombre divino como 'Yahvé', se aplica aquí aunque el texto griego use Κύριε como vocativo reverencial. Esto mantiene la referencia teológica sin ocultar el nombre en español.
  doctrine_reference: 'Project default: יהוה / YHWH -> Yahvé'
translation_notes:
  revision_awareness: El texto coincide con el sentido del griego de Swete 1909 y con la traducción inglesa auditada; no se detectan revisiones ni tensiones textuales adicionales en esta unidad.
  spanish_consistency_notes:
  - Se mantiene el tono de oración breve y directa.
  - '''Misericordia'' conserva el léxico bíblico habitual sin desplazar el sentido de ἔλεος.'
  - No se añade puntuación explicativa innecesaria; la cadencia sigue el carácter optativo del original.
