revisions:
- from: Y Baruc leyó en el rollo las palabras de Jeremías, en la casa de Yahvé[a], en la cámara de Gemarías hijo de Safán, el escriba, en el atrio superior, a la entrada de la puerta nueva de la casa de Yahvé, en oído de todo el pueblo.
  to: Y Baruc leyó del rollo las palabras de Jeremías en la casa de Yahvé[a], en la cámara de Gemarías hijo de Safán, el escriba, en el atrio superior, a la entrada de la puerta nueva de la casa de Yahvé, a oídos de todo el pueblo.
  rationale: Se ajusta 'en el rollo' a 'del rollo' para un español más natural con el verbo 'leer' y para reflejar mejor el valor idiomático del hebreo con קרא. Se corrige 'en oído de todo el pueblo' a 'a oídos de todo el pueblo', que preserva la fuerza de בְּאָזְנֵי sin producir una expresión antinatural en español. Se conserva el resto de la redacción porque es fiel al hebreo y alineada con la terminología del proyecto.
