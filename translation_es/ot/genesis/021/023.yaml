translation:
  language: es
  text: Ahora, júrame aquí por Dios que no obrarás con falsedad conmigo, ni con mi descendencia, ni con mi posteridad. Según la bondad[a] que te he mostrado, así la mostrarás conmigo y con la tierra donde has habitado como extranjero[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lealtad», «amor de pacto» o «misericordia». El hebreo חֶסֶד puede expresar bondad relacional y fidelidad comprometida.
    reason: lexical_alternative
  - marker: b
    text: O «donde has vivido como residente extranjero». El hebreo indica la situación de un forastero que vive en una tierra ajena.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִשָּׁבְעָה
  english_pob_choice: swear
  chosen_spanish: júrame
  alternatives_spanish:
  - hazme jurar
  - jura
  lexicon: HALOT
  rationale: En contexto de pacto y juramento, el imperativo pide un acto de jurar; en español, «júrame» es natural y directo, y conserva la fuerza interpersonal del hebreo.
- source_word: בֵאלֹהִים
  english_pob_choice: by God
  chosen_spanish: por Dios
  alternatives_spanish:
  - ante Dios
  - en Dios
  lexicon: HALOT
  rationale: La preposición funciona aquí como fórmula de juramento; «por Dios» es la equivalencia española más natural y fiel a esa función.
- source_word: הֵנָּה
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - ahora
  - en este lugar
  lexicon: HALOT
  rationale: Es un deíctico de ubicación inmediata; «aquí» reproduce el valor situacional del encuentro.
- source_word: אִם תִּשְׁקֹר לִי
  english_pob_choice: that you will not deal falsely with me
  chosen_spanish: que no obrarás con falsedad conmigo
  alternatives_spanish:
  - que no me mentirás
  - que no faltarás a tu palabra conmigo
  lexicon: HALOT
  rationale: En contexto de juramento, שקר no es solo «mentir», sino actuar con engaño o falsedad en la relación; «obrar con falsedad» preserva ese alcance relacional.
- source_word: נִין
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - linaje
  - hijos
  lexicon: HALOT
  rationale: El término señala la primera línea generacional siguiente; «descendencia» mantiene el valor genealógico sin restringirlo a hijos literales.
- source_word: נֶכֶד
  english_pob_choice: posterity
  chosen_spanish: posteridad
  alternatives_spanish:
  - descendientes
  - linaje
  lexicon: HALOT
  rationale: En la pareja נין/נכד, el segundo término amplía la referencia a generaciones posteriores; «posteridad» conserva ese sentido más amplio y solemne.
- source_word: כַּחֶסֶד
  english_pob_choice: According to the kindness
  chosen_spanish: Según la bondad
  alternatives_spanish:
  - Conforme a la lealtad
  - Según la misericordia
  lexicon: HALOT
  rationale: חסד puede abarcar bondad, lealtad o amor de pacto. «Bondad» funciona bien en español y evita sobrecargar el texto con una glosa teológica no explícita en la frase misma; la ambigüedad permanece abierta.
- source_word: תַּעֲשֶׂה עִמָּדִי
  english_pob_choice: you shall show to me
  chosen_spanish: mostrarás tú conmigo
  alternatives_spanish:
  - harás conmigo
  - tratarás conmigo
  lexicon: HALOT
  rationale: 'Se conserva el eco del verbo עשה enlazado con חסד: el español necesita un verbo relacional natural; «mostrarás» refleja la reciprocidad de trato y evita endurecer la frase.'
- source_word: וְעִם הָאָרֶץ
  english_pob_choice: and to the land
  chosen_spanish: y con la tierra
  alternatives_spanish:
  - y con el país
  - y con la región
  lexicon: HALOT
  rationale: El hebreo usa «con la tierra», una metonimia del territorio habitado; «con la tierra» mantiene esa imagen. En español, «tierra» es mejor que «tierra»/«país» según contexto rural y territorial.
- source_word: גַּרְתָּה בָּהּ
  english_pob_choice: where you have lived as a foreigner
  chosen_spanish: donde has habitado como extranjero
  alternatives_spanish:
  - donde has residido como forastero
  - donde has vivido como forastero
  lexicon: HALOT
  rationale: גור expresa residencia de no nativo. «Habitado como extranjero» comunica el estatus social sin usar un término demasiado técnico o arcaico; «extranjero» mantiene la distinción del residente forastero.
theological_decisions:
- issue: Sentido de חֶסֶד en un juramento recíproco
  english_pob_reading: kindness
  chosen_spanish_reading: bondad
  alternative_spanish_readings:
  - lealtad
  - amor de pacto
  - misericordia
  rationale: La escena exige una respuesta recíproca de trato fiel. «Bondad» conserva la cualidad benévola sin fijar excesivamente la interpretación en un tecnicismo covenantal que el verso no explicita por sí solo.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Alcance de נִין y נֶכֶד
  english_pob_reading: offspring / posterity
  chosen_spanish_reading: descendencia / posteridad
  alternative_spanish_readings:
  - hijos / nietos
  - descendientes / posteridad
  rationale: Los dos términos no son idénticos y apuntan a generaciones sucesivas. La combinación «descendencia / posteridad» conserva la progresión y evita limitar el segundo vocablo a una relación familiar demasiado específica.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca el último estado revisado del texto inglés, pero ajusta las equivalencias a español natural: mantiene la fórmula de juramento, conserva la doble referencia generacional con términos distintos, y refleja la metonimia «la tierra» junto con el estatus de extranjero residente. No se adopta una solución eclesiástica tradicional que oscurezca el nombre divino ni se neutraliza la tensión de חֶסֶד.'
  spanish_consistency_notes:
  - Se usa «Dios» en la fórmula de juramento, coherente con el original hebreo בֵאלֹהִים.
  - Se evita traducir נין y נכד con pares familiares demasiado concretos que reducirían el alcance generacional.
  - «Bondad» se mantiene como opción principal para חֶסֶד, con nota de alternativas, para no perder la amplitud semántica.
  - «Extranjero» se usa para גַּרְתָּה בָּהּ en sentido de residente forastero, no como simple turista o visitante.
