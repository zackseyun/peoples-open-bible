translation:
  language: es
  text: 'Entonces respondió el levita[a], el esposo de la mujer que había sido asesinada, y dijo: «Yo llegué a Gabaa, que pertenece a Benjamín, con mi concubina, para pasar la noche.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que está en Benjamín».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: HALOT
  rationale: En español, «respondió» conserva bien la fórmula narrativa hebrea de introducción del habla. «Contestó» sería posible, pero menos neutro; «respondió y dijo» sería más pesado sin añadir sentido.
- source_word: הָאִישׁ הַלֵּוִי
  english_pob_choice: the Levite
  chosen_spanish: el levita
  alternatives_spanish:
  - el hombre levita
  - el levítico
  lexicon: HALOT
  rationale: El término funciona aquí como identificación personal por condición tribal/cultual. «El levita» es la forma natural y fiel en español; «el levítico» suena más adjetival y menos personal.
- source_word: אִישׁ הָאִשָּׁה
  english_pob_choice: the husband of the woman
  chosen_spanish: el esposo de la mujer
  alternatives_spanish:
  - el hombre de la mujer
  - el marido de la mujer
  lexicon: HALOT
  rationale: La construcción hebrea literalmente dice «hombre de la mujer», pero el contexto relacional apunta al vínculo marital/pareja. «Esposo» comunica bien la relación sin la aspereza de un calco. «Marido» también sería válido, pero «esposo» mantiene un registro más sobrio.
- source_word: הַנִּרְצָחָה
  english_pob_choice: who had been murdered
  chosen_spanish: que había sido asesinada
  alternatives_spanish:
  - que había sido muerta
  - la asesinada
  lexicon: HALOT
  rationale: El participio pasivo de רצח expresa muerte violenta con matiz de homicidio. En español, «asesinada» preserva esa gravedad de mejor modo que el más general «muerta». La forma relativa suena más natural que un sintagma nominal puro.
- source_word: וַיֹּאמַר
  english_pob_choice: said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y habló
  lexicon: HALOT
  rationale: La fórmula narrativa estándar en español es «y dijo». «Habló» es correcto, pero menos idiomático para introducir discurso directo.
- source_word: הַגִּבְעָתָה
  english_pob_choice: to Gibeah
  chosen_spanish: a Gabaa
  alternatives_spanish:
  - en Gabaa
  - hacia Gabaa
  lexicon: HALOT
  rationale: El hé-direccional marca movimiento hacia el lugar; «a Gabaa» reproduce esa orientación de modo natural. Se usa la forma castellana de topónimo «Gabaa» para evitar transliteración híbrida.
- source_word: אֲשֶׁר לְבִנְיָמִן
  english_pob_choice: which belongs to Benjamin
  chosen_spanish: que pertenece a Benjamín
  alternatives_spanish:
  - que está en Benjamín
  - que es de Benjamín
  lexicon: HALOT
  rationale: La frase expresa adscripción territorial o tribal. «Pertenece a Benjamín» es clara y recoge bien la relación; «está en Benjamín» también es posible, pero deja más implícita la pertenencia. Se mantiene la ambigüedad entre pertenencia y ubicación en el texto principal sin forzarla.
- source_word: בָּאתִי אֲנִי
  english_pob_choice: I came
  chosen_spanish: yo llegué
  alternatives_spanish:
  - yo vine
  - yo mismo llegué
  lexicon: HALOT
  rationale: El perfecto con pronombre explícito enfatiza la acción del hablante. «Yo llegué» es natural en español y reproduce el foco personal. «Yo vine» es posible, pero «llegué» encaja mejor con el movimiento hacia un lugar específico.
- source_word: וּפִילַגְשִׁי
  english_pob_choice: my concubine
  chosen_spanish: mi concubina
  alternatives_spanish:
  - mi mujer secundaria
  - mi compañera
  lexicon: HALOT
  rationale: «Concubina» es el equivalente léxico directo y el que preserva mejor la institución social antigua sin suavizarla. Las alternativas son interpretativas o eufemísticas.
- source_word: לָלוּן
  english_pob_choice: to spend the night
  chosen_spanish: para pasar la noche
  alternatives_spanish:
  - para pernoctar
  - para alojarnos
  lexicon: HALOT
  rationale: El infinitivo indica hospedarse durante la noche. «Para pasar la noche» es claro, natural y fiel. «Pernoctar» sería más técnico; «alojarnos» introduce una idea de alojamiento quizá más específica de lo necesario.
theological_decisions:
- issue: Tribal/territorial relation of Gibeah to Benjamin
  english_pob_reading: which belongs to Benjamin
  chosen_spanish_reading: que pertenece a Benjamín
  alternative_spanish_readings:
  - que está en Benjamín
  - que es de Benjamín
  rationale: El hebreo permite una relación de pertenencia o localización tribal. La POB inglesa opta por «belongs to Benjamin», y el español principal sigue esa lectura sin cerrar del todo la posibilidad de localización territorial, que se conserva como alternativa lexical.
  doctrine_reference: Ninguna; decisión de referencia geográfica/tribal.
translation_notes:
  revision_awareness: La redacción sigue de cerca el paquete fuente hebreo y coincide con la decisión auditada de la POB inglesa de mantener la fórmula narrativa «answered and said», la relación de parentesco/pareja y el matiz territorial de Gibea respecto de Benjamín. No hubo revisiones aplicadas en el control inglés, por lo que se conserva la lectura base sin cambios textuales relevantes.
  spanish_consistency_notes:
  - Se usa «Yahvé» como término de referencia divina en este proyecto, pero en este versículo no aparece el nombre divino.
  - «Levita» se emplea como sustantivo de identidad, no como adjetivo.
  - Se preserva «concubina» por fuerza lexical; no se suaviza a un término moderno más genérico.
  - El topónimo se castellaniza como «Gabaa» para lectura fluida en español bíblico estándar.
