translation:
  language: es
  text: En aquellos días y en aquel tiempo[a], declara Yahvé, se buscará la iniquidad de Israel, pero no habrá ninguna; se buscarán los pecados de Judá, pero no se hallarán[b], porque perdonaré a los que deje como remanente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se buscará la iniquidad de Israel, y no habrá ninguna».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «porque perdonaré a los que deje» o «a los que preserve».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיָּמִים הָהֵם וּבָעֵת הַהִיא
  english_pob_choice: In those days and at that time
  chosen_spanish: En aquellos días y en aquel tiempo
  alternatives_spanish:
  - En aquellos días, y en aquel tiempo
  - En aquellos días y en esa ocasión
  lexicon: HALOT
  rationale: Fórmula profética temporal fija; «en aquellos días y en aquel tiempo» conserva el paralelismo y suena natural en español contemporáneo sin perder solemnidad.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se vierte con un verbo declarativo solemne. Se mantiene el nombre divino «Yahvé» según la guía del proyecto.
- source_word: יְבֻקַּשׁ
  english_pob_choice: will be sought
  chosen_spanish: se buscará
  alternatives_spanish:
  - será buscada
  - se indagará
  lexicon: HALOT
  rationale: El pasivo refleja que hay un agente implícito que investiga o busca la culpa; «se buscará» es conciso y conserva la imagen judicial/de pesquisa.
- source_word: עֲוֺן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - culpa
  - maldad
  lexicon: HALOT
  rationale: «Iniquidad» corresponde de manera más cercana al término hebreo y preserva el matiz de culpa/maldad moral que puede ser buscada y luego no hallada.
- source_word: וְאֵינֶנּוּ
  english_pob_choice: but there will be none
  chosen_spanish: pero no habrá ninguna
  alternatives_spanish:
  - y no habrá ninguna
  - pero no existirá
  lexicon: HALOT
  rationale: La negación existencial se adapta al español con naturalidad, manteniendo la idea de ausencia total de aquello que se busca.
- source_word: חַטֹּאת
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - faltas
  - transgresiones
  lexicon: HALOT
  rationale: El plural moral es claro en el contexto; «pecados» preserva la relación con la culpa de Israel y el paralelismo con Judá.
- source_word: תִמָּצֶאינָה
  english_pob_choice: they will not be found
  chosen_spanish: no se hallarán
  alternatives_spanish:
  - no serán hallados
  - no se encontrarán
  lexicon: HALOT
  rationale: «Hallarse» reproduce bien la imagen de búsqueda e inexistencia resultante; además, encaja con el español bíblico sin sonar arcaico.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: 'Introduce la causa de la desaparición de la culpa y los pecados: el perdón divino.'
- source_word: אֶסְלַח
  english_pob_choice: I will forgive
  chosen_spanish: perdonaré
  alternatives_spanish:
  - le perdonaré
  - daré perdón
  lexicon: HALOT
  rationale: «Perdonaré» es el equivalente directo y claro en español para el acto divino de absolver/pardonar.
- source_word: לַאֲשֶׁר אַשְׁאִיר
  english_pob_choice: those whom I leave as a remnant
  chosen_spanish: a los que deje como remanente
  alternatives_spanish:
  - a los que deje
  - a los que preserve
  lexicon: HALOT
  rationale: La forma verbal significa «dejar / dejar sobre / dejar como resto»; «remanente» explicita el matiz de supervivientes/resto sin salir del alcance del hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente; el proyecto establece «Yahvé» como forma principal para no ocultar el nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Distinción entre עֲוֺן y חַטֹּאת
  english_pob_reading: 'Different but related terms: ''iniquity'' for עֲוֺן and ''sins'' for חַטֹּאת'
  chosen_spanish_reading: «iniquidad» para עֲוֺן y «pecados» para חַטֹּאת
  alternative_spanish_readings:
  - «culpa» y «pecados»
  - «iniquidad» y «faltas»
  rationale: 'Se conserva una distinción semántica: el primer término apunta a culpa/iniquidad, y el segundo a actos pecaminosos concretos. Esto refleja mejor la textura del hebreo.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve theological tension rather than resolve it'
- issue: La cláusula final sobre el remanente
  english_pob_reading: those whom I leave as a remnant
  chosen_spanish_reading: a los que deje como remanente
  alternative_spanish_readings:
  - a los que deje
  - a los que perdone
  rationale: El verbo hebreo significa dejar/quedar/restar; en este contexto profético, «remanente» explicita el sentido restaurativo sin forzar el texto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del POB inglés, que prefirió «iniquity» para עֲוֺן y mantuvo «those whom I leave as a remnant»; la versión española conserva esa distinción y hace explícito el matiz de remanente con una formulación natural.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con la política del proyecto para יְהוָה.
  - Se distingue «iniquidad» de «pecados» para reflejar dos términos hebreos relacionados pero no idénticos.
  - «Remanente» se emplea en sentido profético, no como simple resto material.
  - La sintaxis mantiene el paralelismo buscado/hallado del hebreo sin calco excesivo.
