review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura condicional del hebreo y el sentido general del caso legal. Sin embargo, se aparta en dos puntos clave del rastro auditado y del hebreo: (1) יֻתַּן fue revisado en inglés a un presente legal simple (''is put''), y en español ''se ha puesto'' introduce anterioridad no necesaria; (2) נְבֵלָה en este contexto de pureza animal se preserva mejor como ''cadáver animal'' o ''carcasa'' que como ''cadáver'', porque en español ''cadáver'' suele asociarse a humano y pierde el matiz zoológico del contexto. La fórmula final también suena más fiel como presente declarativo (''es impura para ustedes'') que como futuro.'
  spanish_quality_summary: El español es claro y digno, pero 'cualquiera de sus cadáveres' resulta algo rígido y poco natural en este contexto legal sobre animales. 'Alguno de sus cadáveres animales' o similar mejora precisión. 'Se ha puesto' y 'será impura' hacen la frase más pesada de lo necesario; un presente legal simple fluye mejor y corresponde mejor al estilo casuístico del versículo.
  glossary_alignment: No hay términos del glosario mayor en disputa. La decisión teológica de usar 'impura' para lenguaje de pureza ritual es aceptable. La principal corrección léxica requerida es mantener para נְבֵלָה una referencia explícita a carcasa/cadáver animal, conforme a la nota inglesa y al contexto de Levítico 11.
  issues:
  - severity: medium
    issue: Tiempo verbal de יֻתַּן
    rationale: El español 'se ha puesto' añade una noción de anterioridad/resultado que no hace falta aquí. El inglés auditado quedó en 'is put' por naturalidad en un caso legal; en español 'se pone' o 'se echa' sería más natural, pero para conservar cercanía semántica con 'put' y el pasivo/reflejo, 'se pone' funciona bien.
  - severity: high
    issue: Renderizado de נְבֵלָה como 'cadáveres' sin matiz animal
    rationale: En español bíblico general, 'cadáver' tiende a evocar cuerpos humanos. El hebreo aquí se refiere a carcasa/cadáver de animal inmundo en un contexto de pureza alimentaria/ritual. Conviene explicitar 'cadáveres animales' en el texto o usar 'carcasas'; la nota inglesa documenta precisamente ese matiz.
  - severity: medium
    issue: Fórmula final 'será impura para ustedes'
    rationale: Aunque no es erróneo, el futuro suena más distante y menos directo que la fórmula declarativa habitual. 'Es impura para ustedes' reproduce mejor el hebreo nominal טָמֵא הוּא לָכֶם y se alinea con el inglés auditado 'it is unclean to you'.
  revised_spanish_text: Pero si se pone agua sobre la semilla, y cae sobre ella alguno de sus cadáveres animales[a], es impura para ustedes.
  revised_footnotes:
  - marker: a
    text: O «alguna de sus carcasas» o «alguno de sus cuerpos muertos». El hebreo נְבֵלָה denota el cadáver de un animal; aquí «cadáveres animales» mantiene explícito ese sentido en el contexto de pureza ritual.
    reason: lexical_alternative
