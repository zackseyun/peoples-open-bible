source:
  edition: SBLGNT
  text: ⸀δυσφημούμενοι παρακαλοῦμεν· ὡς περικαθάρματα τοῦ κόσμου ἐγενήθημεν, πάντων περίψημα ἕως ἄρτι.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/004/013.yaml
  text: 'When slandered[a], we appeal; we have become like the world''s refuse, the scum of all things[b], until now.'
  footnotes:
  - marker: a
    text: 'Or ''when defamed, we entreat.'' The Greek verb can mean ''appeal,'' ''urge,'' or ''encourage''; here it likely describes a gentle, non-retaliatory response to abuse.'
    reason: lexical_alternative
  - marker: b
    text: 'The paired terms translated ''refuse'' and ''scum'' are rare and very strong, traditionally rendered ''filth'' and ''offscouring.'' They may also echo what is scraped off in cleansing, underscoring extreme social contempt.'
    reason: cultural_note
translation:
  language: ko
  text: 비방을 받으면 부드럽게 응답합니다. 우리는 지금까지 세상의 쓰레기처럼, 만물의 찌꺼기처럼 되었습니다.
  philosophy: optimal-equivalence
