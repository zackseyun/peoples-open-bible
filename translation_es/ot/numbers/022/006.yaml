  text: וְ/עַתָּה֩ לְכָ/ה נָּ֨א אָֽרָ/ה לִּ֜/י אֶת הָ/עָ֣ם הַ/זֶּ֗ה כִּֽי עָצ֥וּם הוּא֙ מִמֶּ֔/נִּי אוּלַ֤י אוּכַל֙ נַכֶּה בּ֔/וֹ וַ/אֲגָרְשֶׁ֖/נּוּ מִן הָ/אָ֑רֶץ כִּ֣י יָדַ֗עְתִּי אֵ֤ת אֲשֶׁר תְּבָרֵךְ֙ מְבֹרָ֔ךְ וַ/אֲשֶׁ֥ר תָּאֹ֖ר יוּאָֽר־־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/022/006.yaml
  text: So now[a], please come and curse this people for me, because they are too mighty for me. Perhaps I will be able to strike them and drive them out of the land, for I know that whoever you bless is blessed[b], and whoever you curse is cursed.
  footnotes:
  - marker: a
    text: Hebrew 'this people' uses a singular collective; English could also be rendered 'these people.'
    reason: lexical_alternative
  - marker: b
    text: Or 'strike it' / 'drive it out'; the Hebrew refers to the people as a singular collective, though English commonly uses the plural 'them.'
    reason: lexical_alternative
