    text: 'O: «¿Para qué me sirven sus muchos sacrificios?» El hebreo dice literalmente: «¿Por qué a mí la multitud de sus sacrificios?»'
    reason: lexical_alternative
  - marker: b
    text: «Machos cabríos» traduce un término que más específicamente significa ‘cabros’ o ‘cabras macho’.
    reason: lexical_alternative
  revision_rationale: Se corrigió la apertura para que el español suene natural y preserve mejor la fuerza retórica del hebreo y del audit trail inglés. También se reubicó la nota b al término correcto ('machos cabríos'), que es donde pertenece la observación léxica sobre 'male goats/he-goats'. No se requieren cambios doctrinales ni una relectura compleja del original.
