    issue: Marcador de nota al pie reutilizado incorrectamente en el texto
    rationale: El texto español coloca [a] tanto después de «ochenta hombres» como después de «ustedes», pero solo existe una nota, y su contenido explica la fórmula final «su vida por su vida». Esto incumple la disciplina requerida de marcadores únicos y anclaje exacto.
  - severity: medium
    issue: «Puso para sí afuera a ochenta hombres» es poco natural en español
    rationale: Aunque es formalmente cercano a שָׂם לוֹ, en este contexto de guardia exterior el español pide un verbo como «apostó» o «colocó». La traducción actual suena forzada y reduce legibilidad.
  - severity: low
    issue: «en manos de ustedes» puede mejorarse a «en sus manos»
    rationale: Ambas opciones son fieles, pero «en sus manos» es más idiomática en español general y conserva el hebraísmo sin aspereza innecesaria.
