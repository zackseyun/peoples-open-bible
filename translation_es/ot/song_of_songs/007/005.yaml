translation:
  language: es
  text: Tu cuello es como una torre de marfil; tus ojos, como estanques en Hesbón, junto a la puerta de Bat-rabín[a]. Tu nariz[b] es como la torre del Líbano, mirando hacia Damasco[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «junto a la puerta de la ciudad populosa» o «junto a la puerta de muchas». La expresión hebrea «Bat-rabín» puede ser un nombre de lugar o tener un sentido descriptivo.
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «nariz». La imagen probablemente alaba el perfil noble de la amada más que aislar un rasgo de manera extraña para el español moderno.'
    reason: cultural_note
  - marker: c
    text: O «mirando a Damasco» o «frente a Damasco».
    reason: lexical_alternative
lexical_decisions:
- source_word: צַוָּארֵךְ
  english_pob_choice: your neck
  chosen_spanish: tu cuello
  alternatives_spanish:
  - tu cuello
  - tu garganta
  lexicon: HALOT
  rationale: En este contexto poético, צַוָּאר es el cuello; «cuello» es natural en español y conserva la imagen del blasonado amoroso. «Garganta» sería menos preciso aquí.
- source_word: כְּמִגְדַּל הַשֵּׁן
  english_pob_choice: is like a tower of ivory
  chosen_spanish: como una torre de marfil
  alternatives_spanish:
  - como una torre de marfil
  - como una torre de hueso
  lexicon: HALOT
  rationale: El hebreo usa literalmente «torre de marfil» en sentido imagético; «marfil» reproduce la equivalencia establecida por el contexto, no una glosa de «diente».
- source_word: עֵינַיִךְ
  english_pob_choice: your eyes
  chosen_spanish: tus ojos
  alternatives_spanish:
  - tus ojos
  lexicon: HALOT
  rationale: La forma dual/plural se vierte de manera directa y natural como «ojos».
- source_word: בְּרֵכוֹת
  english_pob_choice: pools
  chosen_spanish: estanques
  alternatives_spanish:
  - estanques
  - pools
  lexicon: HALOT
  rationale: «Estanques» comunica bien en español la idea de aguas quietas y refleja la imagen sin sonar artificial; «pools» no es idiomático en el registro meta.
- source_word: בְּחֶשְׁבּוֹן
  english_pob_choice: in Heshbon
  chosen_spanish: en Hesbón
  alternatives_spanish:
  - en Hesbón
  lexicon: HALOT
  rationale: Se translitera el topónimo al español con forma asentada y legible.
- source_word: עַל שַׁעַר בַּת רַבִּים
  english_pob_choice: by the gate of Bath-rabbim
  chosen_spanish: junto a la puerta de Bat-rabín
  alternatives_spanish:
  - junto a la puerta de Bat-rabín
  - junto a la puerta de la ciudad populosa
  - junto a la puerta de muchas gentes
  lexicon: HALOT
  rationale: El inglés POB preserva Bath-rabbim como posible nombre propio y anota la alternativa descriptiva; en español conviene mantener la transliteración en el texto principal y traducir locativamente «junto a» para עַל en este uso.
- source_word: אַפֵּךְ
  english_pob_choice: your nose
  chosen_spanish: tu nariz
  alternatives_spanish:
  - tu nariz
  - tu perfil
  lexicon: HALOT
  rationale: Aunque la imagen apunta al perfil noble del rostro, el sustantivo hebreo es «nariz»; se conserva la fuerza léxica sin suavizarla en exceso. El sentido de perfil queda sugerido por el contexto poético.
- source_word: כְּמִגְדַּל הַלְּבָנוֹן
  english_pob_choice: is like the tower of Lebanon
  chosen_spanish: como la torre del Líbano
  alternatives_spanish:
  - como la torre del Líbano
  - como una torre en el Líbano
  lexicon: HALOT
  rationale: La construcción admite una referencia definida; «la torre del Líbano» sigue de cerca el hebreo y mantiene la imagen concreta que el POB inglés preserva.
- source_word: צוֹפֶה פְּנֵי דַמָּשֶׂק
  english_pob_choice: looking toward Damascus
  chosen_spanish: mirando hacia Damasco
  alternatives_spanish:
  - mirando hacia Damasco
  - frente a Damasco
  - con vista a Damasco
  lexicon: HALOT
  rationale: El participio expresa orientación visual; «mirando hacia» es la forma más clara y fiel en español.
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente indicado como sin cambios y de alta concordancia; no se incorporaron enmiendas adicionales.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente directo.
  - Se conservó la imaginería poética del texto hebreo sin convertirla en paráfrasis interpretativa.
  - Se transliteraron Heshbon/Hesbón, Bath-rabbim/Bat-rabín y Damascus/Damasco como topónimos reconocibles en español.
  - Las notas preservan la ambigüedad de Bath-rabbim y la rareza percibida de «nariz» sin borrar la fuerza del hebreo.
