theological_decisions:
- issue: Referent of 'the house'
  chosen_reading: the temple is meant, but rendered literally as 'the house'
  alternative_readings:
  - the temple
  rationale: This is not a major doctrinal crux, but it affects translation style. Following the project's preference for source-text primacy and transparency, the literal term is retained while allowing readers to recognize the temple reference from context.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Force of the clause involving the king of Israel
  chosen_reading: temporal-historical sense ('before the time of a great and mighty king of Israel')
  alternative_readings:
  - instrumental sense ('by a great and mighty king of Israel')
  rationale: The transmitted Greek is syntactically difficult. A strictly instrumental rendering is possible but yields a less coherent sentence in context. The chosen reading best accounts for the temporal phrase and the likely allusion to the first temple under Solomon, while avoiding overconfident reconstruction.
  doctrine_reference: Translation philosophy §§1, 3
