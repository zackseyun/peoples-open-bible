translation:
  language: es
  text: Tomaron a Lot[a], sobrino de Abram, y sus posesiones, y se fueron[b]. Ahora habitaba en Sodoma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hijo del hermano de Abram». Es decir, Lot era sobrino de Abram.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «a Lot y sus posesiones, hijo del hermano de Abram,».'
    reason: previous_rendering
lexical_decisions:
- source_word: וַיִּקְחוּ
  english_pob_choice: They took
  chosen_spanish: Tomaron
  alternatives_spanish:
  - Y tomaron
  - Se llevaron
  lexicon: HALOT
  rationale: El hebreo wayyiqtol de לקח expresa la acción narrativa normal de ‘tomar’. En español, ‘tomaron’ es natural y fiel; ‘se llevaron’ añadiría un matiz más específico de traslado que el contexto no exige.
- source_word: ל֧וֹט
  english_pob_choice: Lot
  chosen_spanish: Lot
  alternatives_spanish:
  - Lot
  lexicon: Nombre propio
  rationale: Se conserva el nombre propio sin adaptación.
- source_word: בֶּן אֲחִ֥י אַבְרָ֖ם
  english_pob_choice: Abram’s nephew
  chosen_spanish: sobrino de Abram
  alternatives_spanish:
  - hijo del hermano de Abram
  - el sobrino de Abram
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente ‘hijo del hermano de Abram’, el valor relacional equivalente y ya reconocido por la tradición textual es ‘sobrino’. En español mantiene claridad y no pierde la relación de parentesco documentada por la POB inglesa.
- source_word: רְכֻשׁ֛וֹ
  english_pob_choice: his possessions
  chosen_spanish: sus posesiones
  alternatives_spanish:
  - sus bienes
  - su propiedad
  lexicon: HALOT
  rationale: רְכוּשׁ designa bienes/posesiones materiales; ‘posesiones’ es natural en español y conserva la amplitud del término.
- source_word: וַיֵּלֵ֑כוּ
  english_pob_choice: and went away
  chosen_spanish: y se fueron
  alternatives_spanish:
  - y fueron
  - y partieron
  lexicon: HALOT
  rationale: ‘Se fueron’ transmite de modo idiomático el valor de alejamiento/departida que la POB inglesa destacó con ‘went away’. 'Partieron' también sería posible, pero ‘se fueron’ es más directo y sobrio.
- source_word: וְה֥וּא יֹשֵׁ֖ב בִּסְדֹֽם
  english_pob_choice: Now he was dwelling in Sodom
  chosen_spanish: Ahora él habitaba en Sodoma
  alternatives_spanish:
  - Y él habitaba en Sodoma
  - Ahora estaba habitando en Sodoma
  - Mientras él habitaba en Sodoma
  lexicon: HALOT
  rationale: יֹשֵׁב expresa residencia/habitación continua. ‘Habitaba’ suena más natural y digna que una perífrasis progresiva en español, y ‘Ahora’ conserva el matiz explicativo de trasfondo que la POB inglesa introdujo con ‘Now’.
theological_decisions:
- issue: 'Parentesco de Lot con Abram: literalidad vs. equivalencia natural'
  english_pob_reading: 'Abram’s nephew; literal note: ‘Abram’s brother’s son’'
  chosen_spanish_reading: sobrino de Abram
  alternative_spanish_readings:
  - hijo del hermano de Abram
  - Lot, sobrino de Abram
  rationale: El hebreo conserva una expresión genealógica literal (‘hijo del hermano de Abram’), pero la POB inglesa juzgó legítimo explicitarla como ‘nephew’. En español, ‘sobrino de Abram’ comunica correctamente la relación sin confusión, y la nota preserva la forma literal subyacente.
  doctrine_reference: Génesis 11–14; uso genealógico descriptivo sin implicación doctrinal específica
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió la formulación desde una expresión literal más pesada a ‘Abram’s nephew’. El español sigue esa decisión interpretativa, pero conserva en la nota la lectura literal del hebreo para mantener la trazabilidad del vínculo de parentesco.
  spanish_consistency_notes:
  - Se mantiene ‘Abram’ en vez de ‘Abrán’ para coherencia con el estándar POB en nombres propios bíblicos según el inglés auditado.
  - Se usa ‘Sodoma’ como forma española estable del topónimo.
  - No se introduce ‘SEÑOR’ ni otras sustituciones teológicas ajenas al versículo.
  - La puntuación y el orden español priorizan legibilidad sin desplazar el antecedente de ‘sobrino de Abram’.
