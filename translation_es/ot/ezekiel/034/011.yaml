translation:
  language: es
  text: 'Porque así ha dicho el Señor Yahvé: He aquí, yo mismo buscaré mis ovejas y las buscaré[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las atenderé», «las inspeccionaré» o «cuidaré de ellas». El verbo hebreo también puede expresar la idea de velar personalmente por las ovejas, además de salir a buscarlas.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahveh
  lexicon: HALOT
  rationale: Se conserva el doble título divino sin ocultar el nombre propio. «Señor» comunica אֲדֹנָי y «Yahvé» representa יְהוָה según la pauta del proyecto; «Dios» sería posible, pero pierde la distinción entre el título y el nombre.
- source_word: הִנְנִי אָנִי
  english_pob_choice: Behold, I myself
  chosen_spanish: He aquí, yo mismo
  alternatives_spanish:
  - Mira, yo mismo
  - Aquí estoy, yo mismo
  lexicon: HALOT
  rationale: «He aquí» conserva el registro profético de הִנְנִי, y «yo mismo» reproduce el énfasis de אָנִי sin añadir explicación ajena al texto.
- source_word: וְדָרַשְׁתִּי
  english_pob_choice: will search for
  chosen_spanish: buscaré
  alternatives_spanish:
  - buscaré diligentemente
  - iré en busca de
  lexicon: HALOT
  rationale: En el contexto pastoral, דרש expresa búsqueda activa. «Buscaré» es natural en español y suficiente para la acción de salir a localizar a las ovejas.
- source_word: צֹאנִי
  english_pob_choice: my sheep
  chosen_spanish: mis ovejas
  alternatives_spanish:
  - mi rebaño
  - mis ovejas
  lexicon: HALOT
  rationale: «Ovejas» mantiene la imagen concreta del rebaño y el paralelo con los verbos de búsqueda; «rebaño» es posible, pero atenúa la referencia individualizada.
- source_word: וּבִקַּרְתִּים
  english_pob_choice: and seek them out
  chosen_spanish: y las haré volver
  alternatives_spanish:
  - y las buscaré
  - y cuidaré de ellas
  - y las atenderé
  lexicon: HALOT
  rationale: El verbo בקר en este marco puede implicar atender, inspeccionar o cuidar. Dado el contexto de restauración en Ezequiel 34, «las haré volver» traduce el movimiento pastoral que el texto persigue y hace explícito el resultado implícito de la búsqueda y el cuidado.
theological_decisions:
- issue: Nombre divino יְהוָה en español
  english_pob_reading: The English POB note acknowledges the divine name and renders it as Yahweh in doctrine, while the verse text uses a conventional English title.
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: El proyecto pide usar «Yahvé» en el texto principal. Aquí se preserva el nombre del pacto junto con el título «Señor» que traduce אֲדֹנָי, evitando la sustitución por una forma enmascarada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de וּבִקַּרְתִּים en un oráculo de restauración pastoral
  english_pob_reading: 'The English POB keeps the phrase broad: ''seek them out,'' with a note that it can also mean attend to, inspect, or care for them.'
  chosen_spanish_reading: «las haré volver» como realización pastoral de la búsqueda
  alternative_spanish_readings:
  - «las buscaré»
  - «las atenderé»
  - «las cuidaré»
  rationale: El hebreo permite un rango semántico que no se agota en la búsqueda. En español, «las haré volver» expresa el efecto restaurador que encaja con el contexto de pastor que rescata y reúne a sus ovejas, sin perder la idea de acción personal de Dios.
  doctrine_reference: HALOT; contexto de Ezequiel 34
translation_notes:
  revision_awareness: 'El inglés POB mantiene amplio el valor de בקר con «seek them out» y nota alternativas; para español se optó por una solución de sentido restaurador («las haré volver») que encaja con el contexto de Ezequiel 34 y con el énfasis del versículo en la iniciativa divina. También se ajustó el nombre divino a la terminología del proyecto: Yahvé para יְהוָה, junto con «Señor» para אֲדֹנָי.'
  spanish_consistency_notes:
  - Se mantiene el nombre divino «Yahvé» conforme al criterio del proyecto.
  - «Señor» traduce אֲדֹנָי como título, no como sustituto del nombre propio.
  - La imagen pastoral se conserva con «ovejas» en lugar de una abstracción como «rebaño».
  - Se evita una traducción demasiado literal de בקר que oscurecería el sentido restaurador del contexto.
