theological_decisions:
- issue: Person and suffix shifts within the verse
  chosen_reading: 'Retain the Masoretic shifts: third person (''He will...''), then second person address (''You will cast''), and final third person plural suffix (''their sins'').'
  alternative_readings:
  - 'Smooth to consistent third person: ''He will again have compassion on us... and he will cast all our sins into the depths of the sea.'''
  rationale: The Hebrew text as given contains real shifts in person and pronominal reference. In keeping with the translation philosophy of preserving tension rather than resolving it, the draft keeps these shifts in the main text rather than harmonizing them. Because many readers will expect a smoother line, the harmonized alternative is preserved in a footnote.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
