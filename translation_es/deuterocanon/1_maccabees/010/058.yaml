translation:
  language: es
  text: Y el rey Alejandro salió a recibirlo y le dio a su hija Cleopatra[a] en matrimonio, y celebró su boda en Ptolemaida, como hacen los reyes[b], con gran esplendor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "le dio a Cleopatra, su hija". El verbo griego lleva explícitamente el sentido de dar en matrimonio en este contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "a la manera de los reyes" o "como suelen hacerlo los reyes".'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπήντησεν
  english_pob_choice: met
  chosen_spanish: lo salió a recibir
  alternatives_spanish:
  - lo recibió
  - se encontró con él
  lexicon: LSJ
  rationale: El verbo griego puede significar 'salir al encuentro' o 'encontrarse con'. En español, 'lo salió a recibir' conserva la idea de encuentro público y responde mejor al tono narrativo que un simple 'se encontró con él'.
- source_word: ἐξέδοτο
  english_pob_choice: gave
  chosen_spanish: le dio
  alternatives_spanish:
  - le dio en matrimonio
  - se la dio en matrimonio
  lexicon: LSJ
  rationale: En este contexto matrimonial, el verbo implica entregar a una hija en matrimonio. 'Le dio' mantiene la brevedad del original y deja que el contexto de la boda explicite el sentido marital, como hace la versión inglesa auditada.
- source_word: Κλεοπάτραν τὴν θυγατέρα αὐτοῦ
  english_pob_choice: Cleopatra his daughter
  chosen_spanish: Cleopatra, su hija
  alternatives_spanish:
  - su hija Cleopatra
  - a Cleopatra, su hija
  lexicon: LSJ
  rationale: El griego presenta el nombre seguido de la aposición. En español, 'Cleopatra, su hija' conserva esa relación y suena natural sin perder la identificación de la persona.
- source_word: ἐποίησεν τὸν γάμον αὐτῆς
  english_pob_choice: he held her wedding
  chosen_spanish: celebró su boda
  alternatives_spanish:
  - hizo su boda
  - celebró su matrimonio
  lexicon: LSJ
  rationale: ποιέω con γάμος indica celebrar o realizar la boda. 'Celebró su boda' es idiomático y refleja el evento ceremonial mejor que una traducción literal de 'hizo'.
- source_word: ἐν Πτολεμαΐδι
  english_pob_choice: in Ptolemais
  chosen_spanish: en Ptolemaida
  alternatives_spanish:
  - en Ptolemais
  lexicon: LSJ
  rationale: Se conserva el topónimo con una forma castellana ampliamente reconocible. 'Ptolemaida' mantiene la referencia geográfica sin cargarla de explicación innecesaria.
- source_word: καθὼς οἱ βασιλεῖς
  english_pob_choice: as kings do
  chosen_spanish: como hacen los reyes
  alternatives_spanish:
  - como suelen hacerlo los reyes
  - a la manera de los reyes
  lexicon: LSJ
  rationale: La frase expresa costumbre o manera real. 'Como hacen los reyes' reproduce bien la comparación y su naturalidad en español.
- source_word: ἐν δόξῃ μεγάλῃ
  english_pob_choice: with great splendor
  chosen_spanish: con gran esplendor
  alternatives_spanish:
  - con gran gloria
  - con gran pompa
  lexicon: LSJ
  rationale: δώξα aquí describe magnificencia ceremonial, no una afirmación doctrinal sobre gloria divina. 'Con gran esplendor' comunica la solemnidad regia con claridad y sin sobrerreligiosizar el término.
theological_decisions:
- issue: δόξα como magnificencia ceremonial, no 'gloria' teológica
  english_pob_reading: with great splendor
  chosen_spanish_reading: con gran esplendor
  alternative_spanish_readings:
  - con gran gloria
  - con gran pompa
  rationale: En este versículo el contexto es una boda real. 'Esplendor' preserva la idea de magnificencia pública sin introducir una resonancia teológica que el pasaje no exige.
  doctrine_reference: No doctrinal; lectura contextual narrativa.
translation_notes:
  revision_awareness: 'Coincido con el criterio del expediente inglés: no se requieren cambios revisivos respecto del sentido base. Mantengo la equivalencia óptima, conservando el matiz matrimonial de ἐξέδοτο y el valor ceremonial de δόξα sin forzar un registro eclesiástico.'
  spanish_consistency_notes:
  - Uso 'Y el rey Alejandro' para respetar el orden narrativo del griego y el estilo del corpus.
  - Mantengo 'Ptolemaida' como topónimo transliterado en forma española coherente con lectura pública.
  - La construcción 'lo salió a recibir' conserva el dinamismo del encuentro sin añadir información ajena al texto.
