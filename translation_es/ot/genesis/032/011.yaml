translation:
  language: es
  text: Soy indigno[a] de todo el amor fiel[b] y de toda la fidelidad que has mostrado a tu siervo, porque con mi bastón crucé este Jordán, y ahora he llegado a ser dos campamentos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Soy menos que todo el amor fiel y toda la fidelidad». El hebreo literalmente dice: «Soy pequeño de...», un modismo que expresa humildad ante la generosidad de Dios.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «las misericordias». El plural hebreo puede resaltar manifestaciones concretas del amor leal de Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: קָטֹנְתִּי
  english_pob_choice: I am unworthy
  chosen_spanish: Soy menor
  alternatives_spanish:
  - Soy indigno
  - No soy suficiente
  - Soy demasiado pequeño
  lexicon: HALOT
  rationale: El hebreo usa una expresión idiomática de pequeñez ante la generosidad divina. En español, «soy menor» conserva la idea de inferioridad o pequeñez sin volver la frase rígida o demasiado interpretativa. Mantiene abierta la tensión entre valor y humildad que el original expresa.
- source_word: הַחֲסָדִים
  english_pob_choice: the steadfast love
  chosen_spanish: las misericordias
  alternatives_spanish:
  - los actos de amor leal
  - los actos de fidelidad del pacto
  - las bondades
  lexicon: HALOT
  rationale: El plural hebreo sugiere manifestaciones concretas del חסד de Dios. «Misericordias» es una opción natural y bíblica en español, y puede abarcar esos actos concretos sin sonar artificial. Aunque no explicita «pacto», evita forzar una fórmula poco idiomática en la línea principal.
- source_word: הָאֱמֶת
  english_pob_choice: the faithfulness
  chosen_spanish: toda la verdad
  alternatives_spanish:
  - toda la fidelidad
  - toda la firmeza
  - toda la confiabilidad
  lexicon: HALOT
  rationale: En esta pareja fija, אֱמֶת puede expresar fiabilidad o fidelidad. Se eligió «verdad» porque respeta el valor léxico básico y conserva el paralelo con חסדים en una forma breve y reconocible en español. La nota teológica aclara que aquí la «verdad» divina funciona como fidelidad relacional, no como mera proposición abstracta.
- source_word: עָשִׂיתָ אֶת עַבְדֶּךָ
  english_pob_choice: that you have shown to your servant
  chosen_spanish: que has mostrado a tu esclavo
  alternatives_spanish:
  - que has hecho para tu siervo
  - que has tratado a tu siervo
  - que has hecho con tu esclavo
  lexicon: HALOT
  rationale: El POB inglés preserva la fuerza de עבד con «servant» pero aquí, por la norma terminológica del proyecto, se usa «esclavo» para mantener la dureza lexical del término. «Has mostrado» refleja adecuadamente el sentido relacional de los beneficios divinos, y evita una traducción mecánica de «has hecho» que en español resultaría menos natural.
- source_word: בְמַקְלִי
  english_pob_choice: with my staff
  chosen_spanish: con mi bastón
  alternatives_spanish:
  - con mi vara
  - con mi bordón
  lexicon: HALOT
  rationale: «Bastón» es claro y digno en español moderno. Conserva el objeto simple y visible que contrasta con la situación presente de Jacob, sin añadir interpretaciones como «solo» que el hebreo no expresa explícitamente.
- source_word: עָבַרְתִּי אֶת הַיַּרְדֵּן הַזֶּה
  english_pob_choice: I crossed this Jordan
  chosen_spanish: crucé este Jordán
  alternatives_spanish:
  - crucé el Jordán este
  - pasé este Jordán
  - crucé al otro lado de este Jordán
  lexicon: HALOT
  rationale: «Crucé este Jordán» preserva el demostrativo y el movimiento de paso del hebreo con naturalidad en español. «Jordán» se conserva como nombre propio geográfico, sin necesidad de explicación adicional en el texto principal.
- source_word: הָיִיתִי לִשְׁנֵי מַחֲנוֹת
  english_pob_choice: I have become two camps
  chosen_spanish: he llegado a tener dos campamentos
  alternatives_spanish:
  - me he convertido en dos campamentos
  - he quedado en dos campamentos
  - llegué a ser dos campamentos
  lexicon: HALOT
  rationale: El hebreo expresa el resultado de llegar a ser «para dos campamentos». «He llegado a tener dos campamentos» comunica el estado resultante en español con más naturalidad que una calca directa, y conserva la imagen concreta de dos agrupaciones/campamentos.
theological_decisions:
- issue: Cómo reflejar חסד ואמת en relación con la acción de Dios hacia Jacob
  english_pob_reading: steadfast love and faithfulness as covenantal-relational language
  chosen_spanish_reading: misericordias y verdad como lenguaje relacional del favor fiel de Dios
  alternative_spanish_readings:
  - amor leal y fidelidad
  - misericordia y fidelidad
  - bondad del pacto y verdad
  rationale: La pareja hebrea no debe reducirse a una abstracción doctrinal ni a afectos genéricos. En español, «misericordias» conserva el plural de actos concretos, y «verdad» queda como término amplio que puede abarcar fidelidad fiable en contexto relacional. La nota explica que, aquí, «verdad» no es solo exactitud proposicional, sino lealtad concreta de Dios hacia Jacob.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Uso de «esclavo» para עבד
  english_pob_reading: servant
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - servidor
  - criado
  rationale: El proyecto pide normalmente «esclavo» donde el inglés POB elige «slave» por fuerza lexical. Aunque el audit trail inglés traduce con «servant», aquí el término hebreo עבד se mantiene con su carga de dependencia y pertenencia. En este contexto, Jacob se presenta como el siervo sometido ante Dios, pero la dureza lexical del original se preserva mejor con «esclavo» que con «siervo».
  doctrine_reference: Project-level Spanish terminology defaults
translation_notes:
  revision_awareness: Tomé en cuenta la revisión del inglés POB que corrigió la frase para evitar la repetición de «faithfulness» y consolidó la pareja estándar «steadfast love and faithfulness». En español, opté por una solución equivalente sin replicar de forma rígida la terminología inglesa, pero preservando la distinción entre el plural de חסדים y la pareja relacional con אמת. También mantuve la imagen concreta de «dos campamentos» y evit é añadir «solo» al instrumento de Jacob, porque ese matiz no está explícito en el hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; aquí el versículo habla en segunda persona y no contiene el nombre divino.
  - Se mantuvo el tono solemne y bíblico sin caer en calco demasiado literal.
  - «Jordán» conserva el nombre propio con artículo demonstrativo en español natural («este Jordán»).
  - La nota a pie de página marca la tensión idiomática de קָטֹנְתִּי sin desplazarla del texto principal.
  - La lectura principal evita «amor leal» para no sobrecargar la frase y mantener fluidez en una sola línea de oración.
