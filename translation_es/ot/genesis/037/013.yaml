translation:
  language: es
  text: 'Entonces Israel dijo a José: «¿No están tus hermanos pastoreando[a] en Siquem? Ven, y te enviaré a ellos». Y él le dijo: «Aquí estoy».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «apacentando» o «cuidando el rebaño» para «pastoreando».
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Jacob
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre/título «Israel», no «Jacob». Se conserva la forma del original y la prioridad del texto fuente; «Jacob» no se adopta porque no es la forma presente en este versículo.
- source_word: אֶל יוֹסֵף
  english_pob_choice: to Joseph
  chosen_spanish: a José
  alternatives_spanish:
  - para José
  lexicon: HALOT
  rationale: La preposición hebrea marca destino o destinatario del habla. En español natural y fiel, «a José» expresa la dirección del discurso sin añadir matiz indebido.
- source_word: הֲלֹא
  english_pob_choice: Are not
  chosen_spanish: ¿No…?
  alternatives_spanish:
  - ¿Acaso no…?
  - ¿No es cierto que…?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera asentimiento. En español, «¿No…?» conserva bien ese valor interrogativo y resulta natural.
- source_word: אַחֶיךָ
  english_pob_choice: your brothers
  chosen_spanish: tus hermanos
  alternatives_spanish:
  - tus parientes
  - tu familia
  lexicon: HALOT
  rationale: El sustantivo en plural con sufijo de 2ms se refiere específicamente a los hermanos de José. «Tus hermanos» es la equivalencia más directa y precisa.
- source_word: רֹעִים
  english_pob_choice: shepherding
  chosen_spanish: pastoreando
  alternatives_spanish:
  - apacentando
  - cuidando el rebaño
  lexicon: HALOT
  rationale: El participio denota la acción de atender/guardar rebaños. «Pastoreando» preserva el verbo pastoral de manera natural; «apacentando» sería igualmente posible, pero puede sonar más marcado en registros bíblicos tradicionales.
- source_word: בִּשְׁכֶם
  english_pob_choice: at Shechem
  chosen_spanish: en Siquem
  alternatives_spanish:
  - en Shequem
  - a Siquem
  lexicon: HALOT
  rationale: El hebreo con ב admite sentido locativo amplio («en/at»). En español, «en Siquem» es natural para ubicar el lugar sin perder la referencia geográfica.
- source_word: לְכָה
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Vamos
  - Anda
  lexicon: HALOT
  rationale: El imperativo funciona como invitación o convocatoria. «Ven» es el equivalente más directo y natural en español; «Vamos» introduciría un matiz inclusivo no presente.
- source_word: וְאֶשְׁלָחֲךָ
  english_pob_choice: and I will send you
  chosen_spanish: y yo te enviaré
  alternatives_spanish:
  - y te enviaré
  - y te mandaré
  lexicon: HALOT
  rationale: La forma cohortativa/volitiva del primer singular después de la invitación se expresa bien con futuro simple en español. «Yo» explicita el sujeto implícito del hebreo y mantiene la fuerza de comisión.
- source_word: אֲלֵיהֶם
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - hasta ellos
  - a tus hermanos
  lexicon: HALOT
  rationale: El pronombre remite a los hermanos mencionados antes. «A ellos» es fiel y suficientemente claro en contexto; «a tus hermanos» sería una repetición interpretativa.
- source_word: הִנֵּנִי
  english_pob_choice: Here I am
  chosen_spanish: Heme aquí
  alternatives_spanish:
  - Aquí estoy
  - Aquí me tienes
  lexicon: HALOT
  rationale: La fórmula de autocomparecencia narrativa se conserva con su resonancia bíblica. «Heme aquí» es breve, idiomática y fiel al valor formular del hebreo; «Aquí estoy» sería más llano, pero menos marcadamente literario.
translation_notes:
  revision_awareness: 'Se corrigió la falta previa de anclaje del marcador de nota: el texto ahora incluye [a] junto a «José», de modo que la única nota queda correctamente vinculada al pasaje. Se mantuvo la elección principal «pastoreando» y se conservó la fórmula narrativa «Heme aquí».'
  spanish_consistency_notes:
  - Se conserva «Israel» como nombre propio, coherente con la prioridad del hebreo en esta escena.
  - «Siquem» se usa como topónimo bíblico transliterado de manera estándar en español.
  - La construcción «y yo te enviaré» mantiene la comisión explícita del hebreo sin sobreinterpretar el movimiento.
  - La respuesta «Heme aquí» preserva el tono narrativo y ceremonial de הִנֵּנִי.
