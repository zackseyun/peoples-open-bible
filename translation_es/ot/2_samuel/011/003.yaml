translation:
  language: es
  text: 'Entonces David envió y preguntó por la mujer, y dijo: «¿No es esta Betsabé, hija de Eliam, esposa de Urías el hitita?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: שׁלח en esta secuencia narrativa expresa el acto de enviar. «Envió» conserva la sencillez del hebreo y funciona naturalmente en español sin añadir un objeto explícito que el texto no da.
- source_word: וַיִּדְרֹשׁ
  english_pob_choice: inquired about
  chosen_spanish: indagó acerca de
  alternatives_spanish:
  - preguntó acerca de
  - investigó sobre
  lexicon: HALOT
  rationale: דרש con ל + persona tiene sentido de buscar información o preguntar por alguien. «Indagó acerca de» preserva el matiz de averiguación y evita reducirlo a una simple pregunta casual.
- source_word: לָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - una mujer
  lexicon: HALOT
  rationale: El artículo hebreo señala una mujer específica, ya identificable por el contexto visual y narrativo. «La mujer» refleja esa definitud.
- source_word: וַיֹּאמֶר
  english_pob_choice: he said
  chosen_spanish: él dijo
  alternatives_spanish:
  - dijo
  - y dijo
  lexicon: HALOT
  rationale: Aunque el verbo es singular, el hablante no queda identificado de manera explícita en el contexto inmediato. El español puede conservar la forma singular con «él dijo» sin introducir una ambigüedad nueva.
- source_word: הֲלוֹא
  english_pob_choice: Is this not
  chosen_spanish: ¿No es... ?
  alternatives_spanish:
  - ¿Acaso no es... ?
  - ¿No será... ?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera confirmación. «¿No es... ?» comunica bien esa fuerza interrogativa en español contemporáneo.
- source_word: זֹאת
  english_pob_choice: this
  chosen_spanish: esta
  alternatives_spanish:
  - ésta
  lexicon: HALOT
  rationale: El demostrativo femenino singular retoma a la mujer mencionada. «Esta» es la forma más natural en español moderno.
- source_word: בַּת שֶׁבַע
  english_pob_choice: Bathsheba
  chosen_spanish: Betsabé
  alternatives_spanish:
  - Batseba
  lexicon: HALOT
  rationale: Se conserva el nombre propio en su transliteración española estándar. «Betsabé» es la forma establecida y legible para público amplio.
- source_word: בַּת אֱלִיעָם
  english_pob_choice: the daughter of Eliam
  chosen_spanish: hija de Eliam
  alternatives_spanish:
  - la hija de Eliam
  lexicon: HALOT
  rationale: La construcción en hebreo identifica por filiación. En español, el artículo puede omitirse dentro de la apposición para lograr mayor fluidez sin perder el sentido.
- source_word: אֵשֶׁת אוּרִיָּה
  english_pob_choice: the wife of Uriah
  chosen_spanish: esposa de Urías
  alternatives_spanish:
  - mujer de Urías
  - la esposa de Urías
  lexicon: HALOT
  rationale: La relación marital es crucial para el peso narrativo. «Esposa de Urías» transmite claramente que pertenece al marco conyugal; «esposa» es preferible aquí a «mujer» por claridad en español.
- source_word: הַחִתִּי
  english_pob_choice: the Hittite
  chosen_spanish: el hitita
  alternatives_spanish:
  - hitita
  lexicon: HALOT
  rationale: El etnónimo con artículo se mantiene con la forma normal en español, «hitita». El artículo explícito en español ayuda a reproducir la identificación étnica del hebreo.
theological_decisions:
- issue: Conservar la carga moral de la identificación final
  english_pob_reading: Retained the full appositional identification 'the daughter of Eliam, the wife of Uriah the Hittite' without compression.
  chosen_spanish_reading: 'Se mantiene la identificación completa: ''hija de Eliam, esposa de Urías el hitita''.'
  alternative_spanish_readings:
  - Betsabé, la mujer de Urías
  - Betsabé, esposa de Urías
  rationale: El hebreo acumula identificadores y culmina en su estado matrimonial. Mantenerlos en español conserva el peso narrativo y ético sin suavizar el dato central de que se trata de la mujer de otro hombre.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la revisión más reciente del inglés: se preserva el sujeto singular implícito con ''él dijo'' en vez de una formulación impersonal, y se conserva la identificación completa de la mujer para no debilitar el forcejeo narrativo del versículo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto hebreo lo requiera; aquí no aparece el tetragrámaton.
  - «Hitita» se mantiene como etnónimo en minúscula por ser adjetivo gentilicio en español.
  - Se eligió «Betsabé» como transliteración estándar española de בַּת שֶׁבַע.
  - Se mantuvo un registro formal y bíblico, pero con sintaxis española natural.
