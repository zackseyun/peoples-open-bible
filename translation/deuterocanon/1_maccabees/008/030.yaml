translation:
  text: But if[a], after these terms, these people and those decide to add or to remove anything, they will do so by their own choice[b], and whatever they add or remove will be valid.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the one party and the other'; the Greek literally repeats demonstratives, referring to both sides of the agreement.
    reason: lexical_alternative
  - marker: b
    text: '''Valid'' could also be rendered ''binding'' or ''in force'' in this legal context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λόγους
  chosen: terms
  alternatives:
  - words
  - clauses
  - articles
  lexicon: LSJ
  rationale: In treaty/legal context, λόγοι refers to the stated provisions or terms rather than merely spoken 'words.' 'Terms' best conveys the formal sense in natural English.
- source_word: βουλεύσωνται
  chosen: decide
  alternatives:
  - deliberate
  - resolve
  - take counsel
  lexicon: LSJ
  rationale: The verb denotes taking counsel or forming a plan. In this conditional legal sentence, 'decide' captures the resulting determination in clear English without over-paraphrasing.
- source_word: οὗτοι καὶ οὗτοι
  chosen: these people and those
  alternatives:
  - the one party and the other
  - these and those
  lexicon: LSJ
  rationale: The repeated demonstratives refer to the two treaty parties. 'These people and those' preserves the bilateral reference more literally than an interpretive expansion, while remaining intelligible.
- source_word: προσθεῖναι ἢ ἀφελεῖν
  chosen: to add or to remove
  alternatives:
  - to add or subtract
  - to add to or take away
  lexicon: LSJ
  rationale: This pair is standard for modifying legal terms. 'Add or remove' is straightforward modern English and fits the treaty context.
- source_word: ἐξ αἱρέσεως αὐτῶν
  chosen: by their own choice
  alternatives:
  - at their own discretion
  - on their own authority
  - from their own decision
  lexicon: LSJ
  rationale: αἵρεσις here carries the sense of choice or decision, not sect/party. The phrase indicates that the action proceeds from the parties' own decision. 'By their own choice' is clear and sufficiently literal.
- source_word: κύρια
  chosen: valid
  alternatives:
  - binding
  - authoritative
  - in force
  lexicon: LSJ
  rationale: In legal context, κύριος means having force or validity. 'Valid' is concise and idiomatic for an amendment to treaty terms; 'binding' is possible but slightly more interpretive.
