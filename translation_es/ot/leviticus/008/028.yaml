revisions:
- from: Entonces Moisés los tomó de sus palmas[a] y los hizo arder sobre el altar, encima del holocausto. Eran una ofrenda de investidura[b], como aroma agradable, una ofrenda que se quema[c] para Yahvé.
  to: Entonces Moisés los tomó de sus palmas[a] y los quemó sobre el altar, encima del holocausto. Eran una ofrenda de investidura[b] para aroma agradable, una ofrenda por fuego[c] para Yahvé.
  rationale: 'Se ajusta la fórmula sacrificial para reflejar mejor el hebreo y el audit trail: «para aroma agradable» en vez de «como aroma agradable»; «ofrenda por fuego» en vez de la paráfrasis libre «ofrenda que se quema»; y «los quemó» por mayor naturalidad en español. También se corrige la nota de «palmas» para que funcione como alternativa real y no como pseudo-literal redundante.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:45:50Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia hebrea básica: Moisés toma las porciones de las palmas/manos de Aarón y sus hijos, las quema sobre el altar, encima del holocausto, y las identifica como מִלֻּאִים para Yahvé. Sin embargo, dos decisiones debilitan la fidelidad al sentido fuente y al audit trail: «como aroma agradable» no refleja bien לְרֵיחַ נִיחֹחַ, que aquí funciona mejor como finalidad/resultado cultual («para aroma agradable» o equivalente), y «una ofrenda que se quema» es demasiado parafrástica para אִשֶּׁה, donde conviene una etiqueta sacrificial más estable como «ofrenda por fuego», manteniendo la alternativa en nota.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «los hizo arder» suena algo forzado en registro narrativo bíblico; «los quemó» es más natural y suficientemente cultual dado el complemento «sobre el altar». «De sus palmas» es fiel, aunque la nota como «Lit.» no funciona bien porque el texto principal ya usa «palmas». «Como aroma agradable» suena menos idiomático y menos exacto que «para aroma agradable».
  glossary_alignment: 'Se alinea bien con «Yahvé» y conserva adecuadamente «holocausto». «Ofrenda de investidura» es defendible para מִלֻּאִים, aunque «ofrenda de ordenación» estaría más cerca del audit trail inglés; no exige cambio. La principal desalineación terminológica está en אִשֶּׁה: el proyecto pide preservar el valor léxico y las alternativas documentadas, por lo que «ofrenda por fuego» en el texto principal con nota alternativa es preferible a una paráfrasis libre.'
  issues:
  - severity: medium
    issue: «como aroma agradable» para לְרֵיחַ נִיחֹחַ
    rationale: La preposición לְ aquí expresa mejor finalidad/resultante cultual. «Como» introduce un matiz comparativo que no está en el hebreo y debilita la fórmula sacrificial fija.
  - severity: medium
    issue: «una ofrenda que se quema» para אִשֶּׁה
    rationale: Es comprensible, pero demasiado explicativa y menos técnica que el término sacrificial hebreo. La nota inglesa preserva «offering by fire» como alternativa formal; en español conviene reflejar ese valor con «ofrenda por fuego».
  - severity: low
    issue: «los hizo arder» suena poco natural
    rationale: Aunque intenta reflejar el matiz de קטר, en español bíblico natural «los quemó sobre el altar» comunica mejor la acción ritual sin perder precisión.
  - severity: low
    issue: La nota [a] está formulada como literal cuando el texto principal ya dice «palmas»
    rationale: La nota debe explicar la elección o dar una alternativa, no presentar como literal algo ya incorporado en el texto.
  revised_spanish_text: Entonces Moisés los tomó de sus palmas[a] y los quemó sobre el altar, encima del holocausto. Eran una ofrenda de investidura[b] para aroma agradable, una ofrenda por fuego[c] para Yahvé.
  revised_footnotes:
