translation:
  language: es
  text: Hizo para la casa ventanas con marcos rehundidos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los términos hebreos de esta frase son arquitectónicamente raros y su sentido exacto es incierto. También podría entenderse como «ventanas con marcos biselados», «ventanas de jambas estrechadas» o «ventanas anchas por dentro y estrechas por fuera».
