translation:
  language: es
  text: Y los hijos de Israel hicieron así, y José les dio carros conforme al mandato de Faraón[a], y les dio provisiones para el camino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «según la boca de Faraón», un modismo que significa «conforme al mandato de Faraón».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ כֵן
  english_pob_choice: did so
  chosen_spanish: hicieron así
  alternatives_spanish:
  - lo hicieron así
  - hicieron de ese modo
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y remite a que actuaron conforme a lo dicho. «Hicieron así» conserva la brevedad y naturalidad del giro sin añadir interpretación.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Jacob
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se mantiene el valor literal de descendencia masculina del hebreo. En español, «hijos de Israel» es claro y más natural que una traducción rígida de «sons».
- source_word: עֲגָלֹות
  english_pob_choice: wagons
  chosen_spanish: carros
  alternatives_spanish:
  - carretas
  - carros de transporte
  lexicon: HALOT
  rationale: El término designa vehículos con ruedas para transportar personas o carga. «Carros» comunica bien la función narrativa en español sin forzar un tecnicismo moderno.
- source_word: עַל פִּי פַרְעֹה
  english_pob_choice: according to Pharaoh’s command
  chosen_spanish: conforme al mandato de Faraón
  alternatives_spanish:
  - según la orden de Faraón
  - de acuerdo con el mandato de Faraón
  lexicon: HALOT
  rationale: El hebreo dice literalmente «según la boca de Faraón», un modismo para autoridad/orden. «Conforme al mandato» preserva el sentido de obediencia a la orden real y evita la literalidad extraña en español.
- source_word: צֵדָה
  english_pob_choice: provisions
  chosen_spanish: provisiones
  alternatives_spanish:
  - víveres
  - suministros
  lexicon: HALOT
  rationale: En contexto de viaje, la palabra abarca abastecimiento para el trayecto, no solo comida. «Provisiones» expresa ese alcance amplio de manera natural.
- source_word: לַדָּרֶךְ
  english_pob_choice: for the journey
  chosen_spanish: para el camino
  alternatives_spanish:
  - para el viaje
  - para la jornada
  lexicon: HALOT
  rationale: El hebreo indica propósito relacionado con el desplazamiento. «Para el camino» conserva la imagen concreta del texto y funciona bien en español bíblico contemporáneo.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y que el texto inglés mantiene alta concordancia con la fuente hebrea; por eso la versión española sigue de cerca la lectura literal idiomática, sin introducir variantes textuales ni explicaciones doctrinales.
  spanish_consistency_notes:
  - Se mantuvo el nombre «Faraón» y el antropónimo «José» de forma consistente con el español bíblico estándar.
  - Se optó por «hijos de Israel» para reflejar el hebreo masculino plural sin recurrir a un giro más eclesiástico o menos preciso.
  - «Provisiones» y «para el camino» conservan el sentido de abastecimiento para viaje sin sobreespecificar el contenido.
