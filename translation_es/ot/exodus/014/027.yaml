translation:
  language: es
  text: Entonces Moisés extendió su mano sobre el mar, y hacia la mañana el mar volvió a su lugar habitual[a], mientras los egipcios huían hacia él. Y Yahvé arrojó[b] a los egipcios en medio del mar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a su plena fuerza» o «a su estado anterior». La expresión hebrea indica que el mar volvió a su condición normal y estable.
    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo literalmente puede significar «sacudió» o «sacudió fuera», una imagen vívida de Yahvé arrojando a los egipcios al mar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּט
  english_pob_choice: stretched out
  chosen_spanish: extendió
  alternatives_spanish:
  - estiró
  - tendió
  lexicon: HALOT
  rationale: נטה con la mano expresa extender o tender la mano. En español, «extendió su mano» comunica el gesto con naturalidad y conserva el movimiento físico sin volverlo innecesariamente rígido.
- source_word: הַיָּם
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el mar
  - el mar Rojo
  lexicon: HALOT
  rationale: El hebreo usa el sustantivo común «mar». En español bíblico, «mar» es el equivalente más directo; no se añade un nombre propio que el verso no explícita.
- source_word: וַיָּשָׁב הַיָּם
  english_pob_choice: the sea returned
  chosen_spanish: el mar volvió
  alternatives_spanish:
  - el mar retornó
  - el mar se volvió
  lexicon: HALOT
  rationale: שׁוב aquí indica volver a un estado anterior. «Volvió» conserva ese sentido y suena más natural que un calco más pesado.
- source_word: לִפְנוֹת בֹּקֶר
  english_pob_choice: toward morning
  chosen_spanish: hacia la mañana
  alternatives_spanish:
  - al despuntar la mañana
  - al acercarse la mañana
  - de mañana
  lexicon: HALOT
  rationale: La expresión es temporal e idiomática. «Hacia la mañana» mantiene la idea de aproximación al amanecer sin forzar una formulación demasiado interpretativa.
- source_word: לְאֵיתָנוֹ
  english_pob_choice: to its usual place
  chosen_spanish: a su lugar habitual
  alternatives_spanish:
  - a su estado normal
  - a su condición habitual
  - a su lugar de siempre
  lexicon: HALOT
  rationale: El contexto exige la idea de restauración del mar a su estado ordinario. «Lugar habitual» sigue la revisión inglesa más reciente y comunica el regreso a la condición normal del mar sin perder la fuerza idiomática.
- source_word: נָסִים לִקְרָאתוֹ
  english_pob_choice: were fleeing toward it
  chosen_spanish: huían hacia él
  alternatives_spanish:
  - huían a su encuentro
  - huían contra él
  lexicon: HALOT
  rationale: El participio expresa acción en curso; לקראת indica dirección hacia. «Huían hacia él» reproduce ambas cosas con claridad, sin interpretar de más el movimiento.
- source_word: וַיְנַעֵר
  english_pob_choice: threw ... into
  chosen_spanish: arrojó ... en
  alternatives_spanish:
  - echó ... en
  - lanzó ... en
  - sacudió ... en
  lexicon: HALOT
  rationale: נער tiene la imagen de sacudir o sacudir fuera, pero el audit trail inglés revisado opta por una formulación más natural. «Arrojó» conserva la acción contundente de Yahvé sobre los egipcios; «en medio de» completa el complemento locativo del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se mantiene la convención POB para el Tetragrámaton: transliterar el nombre divino como «Yahvé», no sustituirlo por un título.'
- source_word: בְּתוֹךְ הַיָּם
  english_pob_choice: into the midst of the sea
  chosen_spanish: en medio del mar
  alternatives_spanish:
  - en medio del mar
  - dentro del mar
  lexicon: HALOT
  rationale: תוך significa medio/interior. En español, «en medio del mar» reproduce de manera clara la localización del hebreo y encaja con el verbo «arrojó».
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. La política POB exige preservar el nombre divino, no sustituirlo por un título tradicional. En español, «Yahvé» es la forma de referencia del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Imagen verbal de וַיְנַעֵר
  english_pob_reading: threw ... into the midst of the sea
  chosen_spanish_reading: arrojó ... en medio del mar
  alternative_spanish_readings:
  - sacudió ... en medio del mar
  - lo sacudió en medio del mar
  rationale: El verbo hebreo conserva una imagen vívida de sacudir o derramar. El inglés POB revisado privilegia una forma natural en su idioma; en español, «arrojó» comunica con fuerza el acto divino sin perder el efecto de juicio y dominio.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy — preserve vivid metaphor when intelligible in receptor language'
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje hebreo directamente y toma en cuenta la revisión inglesa más reciente del audit trail: se adopta la idea de que el mar volvió a su lugar habitual, y se prefiere una formulación española natural para el verbo final, conservando la fuerza de la imagen hebrea sin calcarla mecánicamente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene «mar» para הַיָּם sin introducir «Mar Rojo» porque el verso no lo explicita.
  - Se conserva el tiempo narrativo pasado simple en español para la secuencia de acciones.
  - No se introduce un término doctrinal adicional donde el hebreo solo describe la acción concreta de Dios sobre los egipcios.
