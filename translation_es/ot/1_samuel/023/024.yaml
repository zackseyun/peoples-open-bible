  to: Se levantaron y fueron a Zif delante de Saúl. Ahora David y sus hombres estaban en el desierto de Maón, en la Arabá, al sur del Jesimón[a][b].
  rationale: Se corrigieron los anclajes de las notas para que correspondan a la frase y al topónimo que explican; se uniformó la forma española «Jesimón» en la nota; y se ajustó «Y David…» a «Ahora David…» para reflejar mejor el cambio de escena indicado en la auditoría inglesa, sin alterar el sentido del hebreo.
