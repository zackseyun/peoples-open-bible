    issue: כְנָפֶךָ fue traducido como «tu manto» en vez de mantener la imagen principal «tu ala»
    rationale: El expediente inglés documenta expresamente que el texto principal debe conservar «wing» para preservar la doble resonancia entre protección y gesto matrimonial. «Manto» adelanta una interpretación y no reproduce la elección auditada.
