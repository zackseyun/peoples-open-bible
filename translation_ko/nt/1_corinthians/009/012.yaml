  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἰ ἄλλοι τῆς ⸂ὑμῶν ἐξουσίας⸃ μετέχουσιν, οὐ μᾶλλον ἡμεῖς; Ἀλλ’ οὐκ ἐχρησάμεθα τῇ ἐξουσίᾳ ταύτῃ, ἀλλὰ πάντα στέγομεν ἵνα μή ⸂τινα ἐγκοπὴν⸃ δῶμεν τῷ εὐαγγελίῳ τοῦ Χριστοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/009/012.yaml
  text: If others share in this right over you[a], do not we even more? But we have not made use of this right; instead[b], we endure everything so that we may give no hindrance to the gospel of the Messiah.
  footnotes:
  - marker: a
    text: Or 'this claim on you' / 'this authority in relation to you.' The Greek phrase likely refers to the apostles' right to receive material support from the Corinthians.
    reason: lexical_alternative
  - marker: b
    text: Greek 'the gospel of the Christ'; here 'Messiah' is used because Χριστός functions as a title. Traditional English often has 'Christ.'
    reason: alternative_reading
translation:
  language: ko
  text: 다른 사람들이 여러분에 대한 이 권리에 참여한다면, 하물며 우리는 더욱 그렇지 않겠습니까? 그러나 우리는 이 권리를 사용하지 않았습니다. 도리어 메시아의 복음에 어떤 장애도 끼치지 않으려고 모든 것을 견딥니다.
  philosophy: optimal-equivalence
