revisions:
- from: Lo confirmó[a] para Jacob como estatuto, para Israel como pacto eterno[b].
  to: Lo confirmó[a] a Jacob como estatuto,[b] a Israel como pacto eterno.
  rationale: Se ajustan las preposiciones a 'a Jacob / a Israel' para reflejar mejor el ל hebreo y la decisión documentada en el POB inglés, preservando además el paralelismo poético. Se corrige la nota b para eliminar la alternativa duplicada y dejar una alternativa léxica real y natural en español. El resto del verso puede mantenerse.
