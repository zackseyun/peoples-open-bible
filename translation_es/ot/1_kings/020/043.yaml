translation:
  language: es
  text: Entonces el rey de Israel se fue a su casa, malhumorado y enojado[a], y llegó a Samaria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «resentido y enojado». El par hebreo סַר וְזָעֵף combina una disposición interior de disgusto con una vexación visible.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: se fue
  alternatives_spanish:
  - fue
  - partió
  - se marchó
  lexicon: HALOT
  rationale: El wayyiqtol narra una acción simple y consecutiva; en español, «se fue» comunica bien el desplazamiento sin sobrecargar el verso. Mantiene el valor narrativo directo del hebreo.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: the king of Israel
  chosen_spanish: el rey de Israel
  alternatives_spanish:
  - el rey de Israel
  - Israel, su rey
  lexicon: HALOT
  rationale: La cadena constructa se expresa de forma natural como «el rey de Israel», que conserva la identificación del sujeto sin alterar el orden semítico más de lo necesario.
- source_word: עַל בֵּיתוֹ
  english_pob_choice: to his house
  chosen_spanish: a su casa
  alternatives_spanish:
  - a su hogar
  - a su palacio
  - a su residencia
  lexicon: HALOT
  rationale: La preposición con verbo de movimiento indica destino; «a su casa» reproduce la imagen del hebreo y evita interpretar de antemano «palacio» o «residencia», que el texto no explicita.
- source_word: סַר
  english_pob_choice: sullen
  chosen_spanish: triste
  alternatives_spanish:
  - malhumorado
  - sorbeado
  - de mal semblante
  lexicon: HALOT
  rationale: El término hebreo apunta a una disposición interior de desagrado o abatimiento. En español, «triste» comunica esa disposición interna, aunque por sí solo no agota la nota de disgusto; por eso va unido a «enojado» para reflejar el par hebreo.
- source_word: וְזָעֵף
  english_pob_choice: angry
  chosen_spanish: enojado
  alternatives_spanish:
  - airado
  - irritado
  - resentido
  lexicon: HALOT
  rationale: «Enojado» es la forma más clara y natural para el segundo miembro del par, preservando la tensión emocional externa/visible que el hebreo añade al estado interior.
- source_word: וַיָּבֹא
  english_pob_choice: and he came
  chosen_spanish: y llegó
  alternatives_spanish:
  - y vino
  - y arribó
  - y entró
  lexicon: HALOT
  rationale: «Llegó» expresa de manera natural la continuación narrativa y el arribo a Samaria, sin forzar un matiz de entrada que el verbo no exige.
- source_word: שֹׁמְרוֹנָה
  english_pob_choice: to Samaria
  chosen_spanish: a Samaria
  alternatives_spanish:
  - hasta Samaria
  - en dirección a Samaria
  lexicon: HALOT
  rationale: El he direccional se traduce con «a Samaria» para mantener la indicación de movimiento hacia la ciudad de forma idiomática en español.
translation_notes:
  revision_awareness: Se siguió el contexto auditado de 1 Reyes 20:43 en la POB inglesa, que entiende el par hebreo como dos matices complementarios de desagrado. La redacción española conserva esa duplicidad con un adjetivo interior («triste») y uno más manifiesto («enojado»), sin introducir lectura doctrinal ni ampliar el contenido del verso.
  spanish_consistency_notes:
  - Se mantiene «Samaria» como topónimo propio sin artículo.
  - Se evitó «SEÑOR» u այլ terminología no pertinente porque el verso no contiene el nombre divino.
  - La puntuación refleja una sola cláusula narrativa principal con participios/adjetivos coordinados, conforme al hebreo.
  - La nota al pie preserva la alternativa semántica auditada del inglés («resentido y enojado»).
