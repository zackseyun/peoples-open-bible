translation:
  language: es
  text: Con el fiel, te muestras fiel[a]; con el hombre intachable, te muestras intachable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''Con el leal / piadoso, te muestras leal''; el hebreo usa términos cognados de la misma raíz (חסד), destacando una lealtad pactual recíproca.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חָסִיד
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - leal
  - piadoso
  - misericordioso / lleno de amor leal
  lexicon: HALOT
  rationale: חָסִיד designa a alguien caracterizado por lealtad pactual y piedad. En español, 'fiel' conserva bien ese campo semántico y mantiene visible el juego con תִּתְחַסָּד. 'Piadoso' es posible, pero desplaza el énfasis hacia religiosidad; 'misericordioso' sería demasiado restrictivo.
- source_word: תִּתְחַסָּד
  english_pob_choice: you show yourself faithful
  chosen_spanish: te muestras fiel
  alternatives_spanish:
  - te muestras leal
  - te comportas con fidelidad
  - actúas fielmente
  lexicon: HALOT
  rationale: 'El hitpael de חסד aquí es reflexivo/resultativo: Dios se manifiesta conforme a חסד hacia el חָסִיד. ''Te muestras fiel'' conserva la reciprocidad y el eco cognado con ''fiel'' mejor que una paráfrasis más explicativa.'
- source_word: גְּבַר
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  - varón
  - guerrero
  lexicon: HALOT
  rationale: גְּבַר es un sustantivo masculino singular que significa 'hombre', con matiz de fuerza. En español, 'hombre' mantiene esa referencia masculina y evita neutralizar indebidamente el término.
- source_word: תָּמִים
  english_pob_choice: blameless
  chosen_spanish: intachable
  alternatives_spanish:
  - íntegro
  - sin mancha
  - impecable
  lexicon: HALOT
  rationale: תָּמִים expresa integridad/entereza y, en contextos éticos, inocencia o falta de culpa. 'Intachable' es natural en español bíblico contemporáneo y conserva bien la idea moral sin sugerir perfección metafísica.
- source_word: תִּתַּמָּם
  english_pob_choice: you show yourself blameless
  chosen_spanish: te muestras intachable
  alternatives_spanish:
  - te muestras íntegro
  - te comportas con integridad
  - te muestras sin mancha
  lexicon: HALOT
  rationale: El verbo derivado de תמם repite el campo léxico de תָּמִים. 'Te muestras intachable' preserva el paralelismo verbal y la correspondencia semántica sin borrar la relación morfológica visible en hebreo.
theological_decisions:
- issue: Descripción recíproca del carácter de Dios en respuesta al carácter humano
  english_pob_reading: Render the verse as describing God showing himself in corresponding covenant faithfulness and blamelessness, without implying that God's nature changes or is morally conditioned by humans.
  chosen_spanish_reading: Traducir el versículo como una descripción de Dios que se muestra fiel e intachable en correspondencia pactual, sin sugerir que su naturaleza cambie o quede moralmente determinada por los seres humanos.
  alternative_spanish_readings:
  - '''Eres fiel con el fiel / intachable con el intachable'''
  - '''Te comportas fielmente con el fiel / intachablemente con el intachable'''
  rationale: El hebreo usa formas reflexivas que respaldan una traducción con 'te muestras...'. Esto conserva la reciprocidad poética y evita convertir el verso en una afirmación simplista de que Dios adopta pasivamente la conducta humana. También mantiene visible el paralelismo léxico.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente; el consenso de revisión fue alto y sin objeciones, por lo que esta propuesta sigue de cerca la lectura aprobada en inglés mientras la expresa con español natural y auditable.
  spanish_consistency_notes:
  - Se mantiene 'fiel' para חָסִיד y 'te muestras fiel' para תִּתְחַסָּד con el fin de conservar el juego de palabras de la raíz חסד.
  - Se traduce תָּמִים / תִּתַּמָּם con 'intachable' / 'te muestras intachable' para preservar el paralelismo verbal y evitar una noción de perfección metafísica no exigida por el contexto.
  - '''Hombre'' se conserva por la fuerza masculina explícita de גְּבַר y por la política del proyecto de no neutralizar innecesariamente el término.'
