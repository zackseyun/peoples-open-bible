translation:
  language: es
  text: El sendero de la vida va hacia arriba para el prudente, a fin de apartarse del Seol[a] abajo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «la tumba» o «el reino de los muertos». Hebreo: «Seol».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֹרַח
  english_pob_choice: path
  chosen_spanish: sendero
  alternatives_spanish:
  - camino
  - ruta
  lexicon: HALOT
  rationale: אֹרַח designa un camino o trayectoria; en español, «sendero» conserva la metáfora de una vía de vida sin sonar tan técnico o abstracto como «camino» en este proverbio.
- source_word: חַיִּים
  english_pob_choice: life
  chosen_spanish: de la vida
  alternatives_spanish:
  - de vidas
  - viviente
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural, funciona idiomáticamente como singular en este contexto constructo; «de la vida» refleja el valor idiomático y la lectura proverbial natural.
- source_word: לְמַעְלָה
  english_pob_choice: leads upward
  chosen_spanish: es hacia arriba
  alternatives_spanish:
  - sube
  - va hacia arriba
  - conduce hacia arriba
  lexicon: HALOT
  rationale: El hebreo presenta una dirección adverbial sin verbo finito explícito. En español, «es hacia arriba» mantiene la imagen de elevación sin forzar un verbo interpretativo demasiado fuerte.
- source_word: לְמַשְׂכִּיל
  english_pob_choice: for the prudent
  chosen_spanish: para el prudente
  alternatives_spanish:
  - para el sabio
  - para el entendido
  - para el perspicaz
  lexicon: HALOT
  rationale: La forma participial alude a quien actúa con discernimiento y prudencia. «Prudente» conserva el tono sapiencial y la fuerza práctica del término.
- source_word: לְמַעַן
  english_pob_choice: that he may
  chosen_spanish: a fin de
  alternatives_spanish:
  - para que
  - con el fin de
  - a fin de que
  lexicon: HALOT
  rationale: La partícula expresa propósito. «A fin de» comunica una finalidad formal y clara, cercana al matiz del hebreo y al ajuste revisado en la POB inglesa.
- source_word: סוּר
  english_pob_choice: turn away
  chosen_spanish: apartarse
  alternatives_spanish:
  - desviarse
  - volver aparte
  - alejarse
  lexicon: HALOT
  rationale: El infinitivo expresa apartarse o desviarse. «Apartarse» preserva el movimiento concreto y el sentido moral de alejarse de un destino peligroso.
- source_word: מִשְּׁאוֹל
  english_pob_choice: from Sheol
  chosen_spanish: del Seol
  alternatives_spanish:
  - de la tumba
  - del sepulcro
  - del reino de los muertos
  lexicon: HALOT
  rationale: Se mantiene la transliteración «Seol» para conservar el concepto hebreo del ámbito de los muertos, siguiendo la decisión de la POB inglesa de no colapsarlo prematuramente en «infierno».
- source_word: מָטָּה
  english_pob_choice: below
  chosen_spanish: abajo
  alternatives_spanish:
  - debajo
  - hacia abajo
  - en lo bajo
  lexicon: HALOT
  rationale: La partícula adverbial contrasta con «hacia arriba». «Abajo» ofrece un paralelismo limpio y natural en español.
theological_decisions:
- issue: Tratamiento de שְׁאוֹל
  english_pob_reading: Sheol is preserved as a transliteration, with a footnote offering grave / realm of the dead alternatives.
  chosen_spanish_reading: Seol se conserva como transliteración, con nota que ofrece alternativas como «tumba» o «reino de los muertos».
  alternative_spanish_readings:
  - la tumba
  - el reino de los muertos
  - el infierno
  rationale: El término hebreo designa el ámbito de los muertos en la concepción veterotestamentaria. Conservar «Seol» evita importar una carga doctrinal posterior asociada a «infierno» y mantiene visible la tensión conceptual del texto fuente.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que afinó la cláusula de propósito de una forma más directa. En español se reflejó con «a fin de», sin añadir conectores explicativos que debiliten la concisión sapiencial del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Seol» como transliteración estable para שְׁאוֹל.
  - «Prudente» conserva el registro sapiencial y evita reducir לְמַשְׂכִּיל a mera inteligencia.
  - Se preserva el paralelismo direccional arriba/abajo del proverbio.
  - La cláusula final expresa propósito sin convertirla en consecuencia.
