translation:
  language: es
  text: ¡Lejos de mí declarar que ustedes tienen razón[a]; hasta que muera, no apartaré mi integridad[b] de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «declararlos justos» o «justificarlos». El verbo hebreo es forense: significa declarar a alguien en lo correcto.'
    reason: lexical_alternative
  - marker: b
    text: O «mi rectitud intachable» o «mi irreprochabilidad». El término hebreo puede denotar integridad moral o condición irreprochable en la defensa de Job.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָלִילָה לִּי
  english_pob_choice: Far be it from me
  chosen_spanish: ¡Lejos de mí!
  alternatives_spanish:
  - ¡Ni pensarlo!
  - ¡Abominable sería para mí!
  lexicon: HALOT
  rationale: La expresión hebrea es una repulsa idiomática fuerte. «Lejos de mí» reproduce bien la fuerza de rechazo sin volver el español torpe o excesivamente literal.
- source_word: אִם אַצְדִּיק אֶתְכֶם
  english_pob_choice: to declare you right
  chosen_spanish: declarar que ustedes tienen razón
  alternatives_spanish:
  - justificarlos
  - declararlos justos
  lexicon: HALOT
  rationale: 'El hifil de צדק aquí es forense: declarar en lo correcto. En español, «tener razón» comunica con naturalidad ese veredicto sin cargar el verso con terminología teológica ajena al contexto de disputa.'
- source_word: עַד אֶגְוָע
  english_pob_choice: until I die
  chosen_spanish: hasta que muera
  alternatives_spanish:
  - hasta que expire
  - hasta que dé mi último aliento
  lexicon: HALOT
  rationale: גוע se refiere a morir o expirar. «Hasta que muera» conserva solemnidad y claridad en español contemporáneo.
- source_word: לֹא אָסִיר
  english_pob_choice: I will not put away
  chosen_spanish: no apartaré
  alternatives_spanish:
  - no quitaré
  - no dejaré
  lexicon: HALOT
  rationale: El verbo transmite la idea de mover o apartar algo de uno mismo. «Apartaré» mantiene esa imagen concreta y sigue bien la revisión inglesa hacia una formulación natural.
- source_word: תֻּמָּתִי
  english_pob_choice: my integrity
  chosen_spanish: mi integridad
  alternatives_spanish:
  - mi blamelessness
  - mi inocencia
  lexicon: HALOT
  rationale: En Job, תם/תֻמָּה puede denotar integridad moral o blamelessness. «Integridad» es natural en español y preserva la afirmación de rectitud sin convertirla en una declaración absoluta de impecabilidad.
- source_word: מִמֶּנִּי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - de mi lado
  - para mí
  lexicon: HALOT
  rationale: La preposición marca separación desde la persona que habla. «De mí» reproduce esa relación de manera breve y fiel al hebreo.
theological_decisions:
- issue: El alcance moral de la afirmación de Job
  english_pob_reading: Render תֻּמָּתִי as 'my integrity' rather than a stronger absolute claim such as 'my righteousness.'
  chosen_spanish_reading: Traducir תֻּמָּתִי como «mi integridad», no como «mi justicia» ni «mi inocencia».
  alternative_spanish_readings:
  - mi justicia
  - mi inocencia
  - mi blamelessness
  rationale: 'El verso expresa la negativa de Job a ceder ante la acusación de sus amigos. «Integridad» preserva la tensión teológica del libro: Job defiende su rectitud sin que el verso obligue a leer una impecabilidad absoluta.'
  doctrine_reference: Conservar la tensión literaria y teológica de Job; no resolver la cuestión del sufrimiento mediante una traducción más fuerte de lo que el hebreo exige.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al preferir una formulación natural para el cierre («hasta que muera») y una imagen verbal congruente con el hebreo para la negativa final («no apartaré mi integridad de mí»), sin perder la fuerza idiomática inicial de repudio.
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según corresponda; en este versículo no aparecen.
  - Se evita «Cristo» y otra terminología no presente en el texto.
  - «Integridad» se mantiene como término principal para תֻּמָּה, coherente con el campo semántico de Job.
  - La puntuación de exclamación inicial refleja la fuerza idiomática de חָלִילָה לִּי.
