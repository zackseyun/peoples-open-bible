translation:
  language: es
  text: Y toda la tierra buscaba la presencia de Salomón[a], para oír su sabiduría que Dios había puesto en su corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «buscaba el rostro de Salomón», un modismo para buscar su presencia o tener audiencia con él.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל הָאָרֶץ
  english_pob_choice: And all the earth
  chosen_spanish: Y toda la tierra
  alternatives_spanish:
  - Y todo el país
  - Y el mundo entero
  lexicon: HALOT
  rationale: La expresión hebrea es colectiva y amplia; en este contexto real y de alcance hiperbólico se refiere a la gente de la tierra conocida. «Toda la tierra» conserva la formulación del original y mantiene ese alcance sin reducirlo a una región local.
- source_word: מְבַקְשִׁים
  english_pob_choice: sought
  chosen_spanish: buscaba
  alternatives_spanish:
  - estaba buscando
  - buscaban
  lexicon: HALOT
  rationale: El participio hebreo expresa acción continua o habitual. En español, el imperfecto «buscaba» comunica bien esa búsqueda reiterada o continua en el marco narrativo.
- source_word: אֶת פְּנֵי שְׁלֹמֹה
  english_pob_choice: the presence of Solomon
  chosen_spanish: el rostro de Salomón
  alternatives_spanish:
  - la presencia de Salomón
  - una audiencia con Salomón
  lexicon: HALOT
  rationale: 'He mantenido la imagen hebrea «rostro» para no borrar el giro idiomático documentado: «buscar el rostro de» equivale a buscar acceso o audiencia. La nota explica el sentido idiomático sin reemplazarlo por una expresión más interpretativa en el texto principal.'
- source_word: לִשְׁמֹעַ
  english_pob_choice: to hear
  chosen_spanish: para oír
  alternatives_spanish:
  - para escuchar
  lexicon: HALOT
  rationale: El infinitivo de propósito se expresa de forma natural con «para oír». «Escuchar» sería posible, pero aquí «oír» reproduce con más precisión la relación con el sustantivo «sabiduría».
- source_word: חָכְמָתוֹ
  english_pob_choice: his wisdom
  chosen_spanish: su sabiduría
  alternatives_spanish:
  - la sabiduría que tenía
  - su conocimiento sabio
  lexicon: HALOT
  rationale: «Sabiduría» es la equivalencia directa y digna para חָכְמָה. El posesivo español «su» conserva el sufijo pronominal hebreo y mantiene el foco en la sabiduría de Salomón.
- source_word: אֲשֶׁר נָתַן אֱלֹהִים
  english_pob_choice: that God had put
  chosen_spanish: que Dios había puesto
  alternatives_spanish:
  - que Dios había dado
  - que Dios dio
  lexicon: HALOT
  rationale: El hebreo dice literalmente «dio», pero el audit trail inglés ya documenta que, con «en su corazón», el español natural es «poner». «Había puesto» conserva el valor de donación y la ubicación interna sin volver la frase pesada o menos idiomática.
- source_word: בְּלִבּוֹ
  english_pob_choice: in his heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - dentro de él
  - en su mente
  lexicon: HALOT
  rationale: «Corazón» preserva la antropología hebrea del לֵב como centro interior de pensamiento, voluntad y decisión. «Mente» estrecharía indebidamente el campo semántico.
theological_decisions:
- issue: Uso de אֱלֹהִים frente a un nombre del pacto
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - el Señor
  - Yahvé
  rationale: El texto hebreo usa אֱלֹהִים y no יהוה. Por eso corresponde «Dios», manteniendo la distinción léxica y evitando introducir un nombre divino no presente en este versículo.
  doctrine_reference: 'DOCTRINE.md: Primacía del original y distinción de nombres divinos'
translation_notes:
  revision_awareness: El audit trail inglés coincide plenamente con el hebreo en el sentido general y en las decisiones léxicas principales. No hay revisiones aplicadas en la fuente inglesa; se conserva la misma lectura, con adaptación natural al español y sin atenuar el modismo de «buscar el rostro».
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים, en coherencia con el texto fuente.
  - Se usa «corazón» para לֵב, siguiendo la antropología bíblica del original.
  - «Rostro» se conserva en el texto principal para reflejar el hebraísmo documentado; la nota aclara el sentido idiomático.
  - La puntuación y el orden sintáctico buscan una lectura fluida en español sin apartarse del contenido del hebreo.
