translation:
  language: es
  text: Bendigan a Yahvé[a], Ananías, Azarías y Misael; cántenle alabanzas y exáltenlo en gran manera por siempre. Porque nos ha librado del Hades, y nos ha salvado de la mano de la muerte, y nos ha rescatado de en medio de la llama ardiente, y nos ha redimido del fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘del sepulcro’. El griego dice ‘del Hades’, es decir, del reino de los muertos.
    reason: alternative_reading
lexical_decisions:
- source_word: εὐλογεῖτε
  english_pob_choice: Bless
  chosen_spanish: Bendecid
  alternatives_spanish:
  - Bendigan
  - Alaben
  lexicon: BDAG
  rationale: Imperativo plural dirigido al grupo; ‘bendecid’ conserva el valor litúrgico de invocar bendición sobre Yahvé/ el Señor, sin reducirlo a una mera alabanza genérica.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Maestro
  - a Yahvé
  lexicon: BDAG
  rationale: Sigue el sentido de κύριος en este himno judío-griego como título divino. En español, ‘Señor’ es la forma natural y reverente; el artículo se mantiene por la función doxológica del sintagma.
- source_word: ὑμνεῖτε
  english_pob_choice: sing praise
  chosen_spanish: cantadle alabanzas
  alternatives_spanish:
  - entoad un himno
  - cantadlo en alabanza
  lexicon: BDAG
  rationale: El verbo implica cantar un himno o cántico de alabanza; ‘cantadle alabanzas’ comunica la dimensión musical sin sonar forzado como verbo simple ‘himnadar’ o ‘himno’.
- source_word: ὑπερυψοῦτε
  english_pob_choice: highly exalt
  chosen_spanish: exaltadlo
  alternatives_spanish:
  - exaltadlo sobremanera
  - levantadlo en alto
  lexicon: BDAG
  rationale: El compuesto intensifica la exaltación. En español, el adverbio implícito puede quedar absorbido en la secuencia junto con ‘por siempre’, evitando una sobrecarga poco natural sin perder la fuerza del mandato.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por siempre
  alternatives_spanish:
  - por los siglos
  - para siempre
  lexicon: BDAG
  rationale: Equivale de manera idiomática al valor durativo doxológico; ‘por siempre’ es claro, natural y suficientemente estable para el registro litúrgico.
- source_word: ἐξείλετο
  english_pob_choice: has delivered
  chosen_spanish: ha librado
  alternatives_spanish:
  - ha salvado
  - ha rescatado
  lexicon: BDAG
  rationale: Aoristo medio de ἐξαιρέω, con sentido de sacar/liberar de peligro. ‘Librado’ conserva la idea de liberación efectiva y funciona bien junto a los verbos sucesivos de rescate.
- source_word: ἐξ ᾅδου
  english_pob_choice: from Hades
  chosen_spanish: del Hades
  alternatives_spanish:
  - del sepulcro
  - de la tumba
  - del mundo de los muertos
  lexicon: BDAG
  rationale: Se mantiene el término griego transliterado, como en el inglés POB, para preservar la transparencia léxica y la tensión teológica; no se resuelve prematuramente como ‘sepulcro’ o ‘tumba’.
- source_word: ἔσωσεν
  english_pob_choice: saved
  chosen_spanish: nos ha salvado
  alternatives_spanish:
  - nos ha librado
  - nos ha preservado
  lexicon: BDAG
  rationale: Es el equivalente directo de σώζω. Aunque el contexto es rescate físico, ‘salvado’ mantiene la amplitud semántica del verbo y el paralelismo con el resto del verso.
- source_word: ἐκ χειρὸς θανάτου
  english_pob_choice: from the hand of death
  chosen_spanish: de la mano de la muerte
  alternatives_spanish:
  - del poder de la muerte
  - del dominio de la muerte
  lexicon: BDAG
  rationale: Se conserva el hebraísmo ‘mano de’ presente en el griego, que personifica la muerte como agente opresor. ‘Muerte’ en femenino funciona naturalmente en español sin alterar la imagen.
- source_word: ἐρρύσατο
  english_pob_choice: rescued
  chosen_spanish: nos ha rescatado
  alternatives_spanish:
  - nos ha librado
  - nos ha salvado
  lexicon: BDAG
  rationale: ῥύομαι expresa sacar de peligro. ‘Rescatado’ distingue este verbo de los anteriores y transmite con viveza el movimiento de extracción desde el peligro inmediato.
- source_word: ἐκ μέσου καιομένης φλογός
  english_pob_choice: from the midst of the burning flame
  chosen_spanish: de en medio de la llama ardiente
  alternatives_spanish:
  - del centro de la llama que ardía
  - de entre las llamas ardientes
  lexicon: BDAG
  rationale: ‘De en medio de’ refleja ἐκ μέσου con precisión; ‘llama ardiente’ conserva la imagen de la llama en proceso de quemar sin convertirla en una paráfrasis más amplia como ‘horno’ o ‘incendio’.
- source_word: ἐκ τοῦ πυρὸς
  english_pob_choice: from the fire
  chosen_spanish: del fuego
  alternatives_spanish:
  - de la hoguera
  - de las llamas
  lexicon: BDAG
  rationale: Traducción directa y sobria de πῦρ. ‘Fuego’ evita añadir especificaciones no presentes en el griego y mantiene el contraste con ‘llama ardiente’.
- source_word: ἐλυτρώσατο
  english_pob_choice: redeemed
  chosen_spanish: nos ha redimido
  alternatives_spanish:
  - nos ha liberado
  - nos ha rescatado
  lexicon: BDAG
  rationale: λυτρόω tiene connotación de liberar mediante rescate/redención. ‘Redimido’ conserva esa resonancia teológica y distingue este cierre del verbo anterior de rescate físico.
theological_decisions:
- issue: Cómo renderizar ᾅδης en un cántico de liberación física y no de enseñanza escatológica sistemática
  english_pob_reading: from Hades
  chosen_spanish_reading: del Hades
  alternative_spanish_readings:
  - del sepulcro
  - de la tumba
  - del mundo de los muertos
  rationale: El texto griego nombra ᾅδης explícitamente. Para no aplanar la carga léxica ni resolver la tensión con un equivalente interpretativo, el español conserva ‘Hades’, con la misma estrategia transparente que el POB en inglés.
  doctrine_reference: Primacía del texto fuente y preservación de la tensión semántica; no armonizar de forma prematura con lenguaje tradicional.
translation_notes:
  revision_awareness: 'Se siguió el estado revisado sin cambios del audit trail en inglés: la elección principal se mantuvo estable en toda la cadena, y la única variación sensible es la adaptación natural al español manteniendo la transparencia de Hades y la secuencia de verbos de liberación.'
  spanish_consistency_notes:
  - 'Se conservaron los imperativos plurales de dirección litúrgica: ‘Bendecid... cantadle... exaltadlo’.'
  - Se mantuvo el paralelismo verbal del griego con una cadena de perfectos compuestos en español para reflejar acciones completadas con valor actual en el himno.
  - ‘Hades’ se preservó como término transliterado para respetar la decisión auditada del POB inglés; la alternativa interpretativa queda en nota.
  - No se sustituyó ‘redimido’ por ‘liberado’ para conservar el matiz redentivo que el audit trail documenta al final del verso.
