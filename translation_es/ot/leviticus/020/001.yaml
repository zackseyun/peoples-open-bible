lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - le habló
  lexicon: HALOT
  rationale: En esta fórmula narrativa de introducción del discurso, el hebreo usa el verbo de habla para marcar el inicio de una comunicación divina. En español, «habló» conserva ese carácter formal y natural; «dijo» sería posible, pero atenúa el matiz de introducción solemne del discurso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se rinde como el nombre propio divino, no como un título. «Yahvé» preserva el valor de nombre personal del texto fuente y sigue el criterio del proyecto para יְהוָה.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición introduce el complemento indirecto del discurso. En español, «a» es la correspondencia natural y sobria para este marco verbal.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moshé
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español. «Moisés» es la forma clara y reconocible para lectura eclesial.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - y le dijo
  lexicon: HALOT
  rationale: El infinitivo constructo funciona como continuación convencional de la fórmula de habla. «Diciendo» preserva la estructura hebrea sin forzar una paráfrasis.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo contiene directamente el Nombre divino, y el proyecto evita sustituirlo por un título. En español, «Yahvé» mantiene el mismo principio de transparencia que «Yahweh» en inglés.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El control de revisión indica alta concordancia y sin cambios requeridos; no hay revisiones aplicadas al contenido base. La draft española sigue la misma lectura auditada, ajustando solo la formulación natural en español y la transliteración del Nombre divino según la terminología del proyecto.
  spanish_consistency_notes:
  - 'Se mantiene el orden y la función sintáctica de la fórmula hebrea: sujeto divino + verbo de habla + destinatario + gerundio introductorio.'
  - Se evita «SEÑOR» como máscara editorial en la línea principal, conforme al criterio del proyecto para el Tetragrámaton.
  - «Diciendo» conserva el cierre formular del hebreo sin añadir contenido interpretativo.
