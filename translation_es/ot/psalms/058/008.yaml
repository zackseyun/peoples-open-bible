translation:
  language: es
  text: Que se derritan como agua que se va[a]; cuando él tienda su arco, que sus flechas[b] sean como si estuvieran cortadas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que fluye y desaparece». La expresión hebrea presenta el agua moviéndose y perdiéndose de vista.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «su flecha» (singular); en español también puede expresarse colectivamente como «sus flechas».
    reason: lexical_alternative
  - marker: c
    text: La cláusula final es textual y léxicamente difícil; también puede entenderse como «que sean desafiladas» o «que se marchiten».
    reason: alternative_reading
lexical_decisions:
- source_word: יִמָּאֲסוּ
  english_pob_choice: let them melt away
  chosen_spanish: Hagan que se derritan
  alternatives_spanish:
  - Que se derritan
  - Que se desvanezcan
  - Que se disuelvan
  lexicon: HALOT
  rationale: El verbo se entiende en el contexto como desgaste o desintegración. «Se derritan» conserva la imagen poética de pérdida de consistencia y mantiene el sentido jussivo.
- source_word: כְמוֹ מַיִם
  english_pob_choice: like water
  chosen_spanish: como agua
  alternatives_spanish:
  - como las aguas
  - así como agua
  lexicon: HALOT
  rationale: La comparación es directa y simple; «como agua» reproduce la imagen con naturalidad en español.
- source_word: יִתְהַלְּכוּ לָמוֹ
  english_pob_choice: that runs off
  chosen_spanish: que se va
  alternatives_spanish:
  - que fluye y desaparece
  - que corre lejos
  lexicon: HALOT
  rationale: El hebreo sugiere moverse y alejarse hasta desaparecer. «Que se va» mantiene el valor de dispersión sin volver pesada la frase en español.
- source_word: יִדְרֹךְ
  english_pob_choice: when he bends
  chosen_spanish: cuando él doble su arco
  alternatives_spanish:
  - cuando tense su arco
  - cuando prepare su arco
  lexicon: HALOT
  rationale: Con el objeto implícito del arco, el verbo se refiere a ponerlo tenso para disparar. «Doblar su arco» conserva la imagen física y el sentido del original.
- source_word: חצו
  english_pob_choice: his arrows
  chosen_spanish: sus flechas
  alternatives_spanish:
  - su flecha
  lexicon: HALOT
  rationale: El texto consonántico admite singular, pero el contexto poético admite también un valor colectivo. En español, «sus flechas» suena natural sin perder la posibilidad singular, que queda reflejada en la nota.
- source_word: כמו יתמללו
  english_pob_choice: let them be as though cut off
  chosen_spanish: que sean como cortadas
  alternatives_spanish:
  - que sean como desafiladas
  - que se marchiten
  - que queden truncadas
  lexicon: HALOT
  rationale: La última cláusula es difícil y probablemente alude a quedar ineficaces o cortadas. «Como cortadas» preserva la dureza y la ambigüedad lexical sin decidir demasiado el matiz.
translation_notes:
  revision_awareness: La redacción sigue de cerca el paquete fuente hebreo y la revisión inglesa más reciente, que corrigió el verbo de la segunda cláusula para reflejar ‘doblar su arco’. Se evitó traducir mecánicamente el inglés, y se mantuvo la dificultad de la cláusula final en forma breve y audit-able.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponde; este versículo no lo contiene.
  - Se mantuvo un tono poético-jussivo coherente con la imprecación del salmo.
  - Se conservó la ambigüedad del singular/plural en la referencia a las flechas mediante nota.
  - No se introdujeron términos eclesiásticos no presentes en el texto fuente.
