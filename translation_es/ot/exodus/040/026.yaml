revisions:
- from: Y puso el altar de oro en el tabernáculo de reunión[a], delante del velo.
  to: Y puso el altar de oro en la tienda de reunión, delante del velo[a].
  rationale: Se revisa «tabernáculo de reunión» a «tienda de reunión» para alinearse mejor con בְּאֹהֶל מוֹעֵד y con la decisión auditada del POB en inglés. Se mantiene «velo» con nota alternativa «cortina», pero se reubica el marcador junto al término anotado para anclar la nota exactamente en la palabra relevante.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:44:42Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador comunica correctamente la acción de colocar el altar de oro delante del velo, y la nota sobre «velo/cortina» refleja bien la evidencia léxica de הַפָּרֹכֶת. Sin embargo, la traducción de בְּאֹהֶל מוֹעֵד como «en el tabernáculo de reunión» no preserva con suficiente fidelidad la expresión fuente ni la decisión auditada en inglés, que distingue aquí «tent of meeting».
  spanish_quality_summary: El español es claro y bíblicamente legible, pero «tabernáculo de reunión» introduce una formulación más interpretativa y menos directa que «tienda de reunión». En este versículo descriptivo del mobiliario, «tienda de reunión» es natural, preciso y más cercano al hebreo.
  glossary_alignment: 'No hay conflicto con los términos teológicos principales del proyecto. «Velo» está bien elegido con nota alternativa «cortina». La principal desalineación es terminológica: אֹהֶל מוֹעֵד debe reflejarse preferentemente como «tienda de reunión» aquí, no «tabernáculo de reunión», salvo razón contextual fuerte, que en este caso no supera la primacía de la fuente.'
  issues:
  - severity: medium
    issue: «tabernáculo de reunión» para בְּאֹהֶל מוֹעֵד
    rationale: 'El hebreo dice literalmente «en la tienda de reunión» y el English POB audit trail eligió «in the tent of meeting». «Tabernáculo» puede ampliar o institucionalizar el referente más allá de la forma léxica inmediata. En este contexto no hace falta apartarse de «tienda». '
  revised_spanish_text: Y puso el altar de oro en la tienda de reunión, delante del velo[a].
  revised_footnotes:
  - marker: a
    text: O «la cortina». El término hebreo designa la partición interior del tabernáculo.
    reason: lexical_alternative
  revision_rationale: Se revisa «tabernáculo de reunión» a «tienda de reunión» para alinearse mejor con בְּאֹהֶל מוֹעֵד y con la decisión auditada del POB en inglés. Se mantiene «velo» con nota alternativa «cortina», pero se reubica el marcador junto al término anotado para anclar la nota exactamente en la palabra relevante.
