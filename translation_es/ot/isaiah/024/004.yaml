    rationale: אמל denota languidecer, debilitarse, consumirse. «Desvanecerse» en español suele sugerir desparecer o volverse tenue, no tanto agotarse o marchitarse. «Languidece» distingue bien este verbo de נבל sin perder naturalidad poética.
  revised_spanish_text: La tierra gime y se marchita; el mundo languidece y se marchita; los encumbrados[a] de la tierra languidecen.
