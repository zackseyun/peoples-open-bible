translation:
  language: es
  text: 'Y dijo Judá[a]: «La fuerza de los cargadores ha fallado, y hay muchos escombros[b], y no podemos construir el muro».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el pueblo de Judá». El nombre propio singular «Judá» probablemente representa a la comunidad en conjunto.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «polvo»; en contexto, probablemente se refiere a los escombros o restos de la ciudad destruida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - el pueblo de Judá
  - los judaitas
  lexicon: HALOT
  rationale: Se conserva el nombre propio como en el hebreo. En este contexto puede funcionar metonímicamente por la comunidad, pero el texto base no lo explicita, así que el cuerpo principal mantiene «Judá».
- source_word: כָּשַׁל
  english_pob_choice: has failed
  chosen_spanish: ha fallado
  alternatives_spanish:
  - ha tropezado
  - ha flaqueado
  - se ha debilitado
  lexicon: HALOT
  rationale: El verbo expresa tropiezo o fracaso; con «fuerza» como sujeto en español, «ha fallado» transmite bien la idea de que la capacidad ha cedido sin añadir interpretación.
- source_word: כֹּחַ
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - poder
  - capacidad
  lexicon: HALOT
  rationale: «Fuerza» es la correspondencia natural en español para la capacidad física de trabajo en este contexto de agotamiento.
- source_word: הַסַּבָּל
  english_pob_choice: the burden-bearers
  chosen_spanish: los que cargaban
  alternatives_spanish:
  - los cargadores
  - los portadores de cargas
  - los cargadores de peso
  lexicon: HALOT
  rationale: En español, un sustantivo compuesto como «cargadores de cargas» suena forzado; «los que cargaban» preserva el sentido concreto de personas que llevan peso sin introducir un término eclesiástico o demasiado técnico.
- source_word: הֶעָפָר
  english_pob_choice: rubble
  chosen_spanish: escombro
  alternatives_spanish:
  - polvo
  - escombros
  - debris
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «polvo/tierra», el contexto de ruina urbana y reconstrucción exige una equivalencia contextual. «Escombro» comunica el material derruido de manera natural en español y mantiene la nota de la POB inglesa.
- source_word: הַרְבֵּה
  english_pob_choice: there is much
  chosen_spanish: hay mucho
  alternatives_spanish:
  - abunda
  - es mucho
  lexicon: HALOT
  rationale: La construcción impersonal «hay mucho» reproduce con naturalidad la idea de abundancia presente en el hebreo.
- source_word: לֹא נוּכַל
  english_pob_choice: we are not able
  chosen_spanish: no podremos
  alternatives_spanish:
  - no podemos
  - no somos capaces
  lexicon: HALOT
  rationale: El hebreo expresa incapacidad; «no podremos» sigue la lectura de la POB inglesa y suena natural en español dentro del discurso directo de desaliento. Mantiene el matiz de imposibilidad práctica sin sugerir negativa moral.
- source_word: לִבְנוֹת
  english_pob_choice: to build
  chosen_spanish: edificar
  alternatives_spanish:
  - construir
  - reedificar
  - levantar
  lexicon: HALOT
  rationale: «Edificar» es una opción bíblica y clara en español para una obra de construcción sólida. Dado que el contexto es la reconstrucción del muro, funciona bien sin forzar el verbo a un sentido litúrgico.
- source_word: בַּחוֹמָה
  english_pob_choice: the wall
  chosen_spanish: el muro
  alternatives_spanish:
  - la muralla
  - la pared
  lexicon: HALOT
  rationale: «Muro» comunica fielmente la estructura defensiva en español moderno; «muralla» sería igualmente posible, pero «muro» mantiene la sobriedad del hebreo sin sobreactuar el carácter militar.
theological_decisions:
- issue: Lectura colectiva de «Judá» como nombre propio metonímico
  english_pob_reading: The singular proper name 'Judah' likely represents the community collectively.
  chosen_spanish_reading: «Judá» se mantiene como nombre propio en el texto, con la posibilidad implícita de que designe a la comunidad.
  alternative_spanish_readings:
  - «el pueblo de Judá»
  - «los judaitas»
  rationale: El hebreo singular no obliga a expandir el sujeto en la línea principal. La nota permite al lector entender la referencia colectiva sin borrar la forma original.
  doctrine_reference: Ninguna; decisión de referencia y estilo, no doctrinal.
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB inglés, que prefirió el plural colectivo «burden-bearers» y simplificó la cláusula final a una construcción más natural; por eso el español usa una perífrasis colectiva («los que cargaban») y evita sobreespecificar el complemento verbal.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto cuando aparezca el tetragrámaton; aquí no aparece.
  - «Judá» se mantiene como nombre propio, y la nota aclara la posible referencia colectiva.
  - Se evita «Cristo», «siervo» o vocabulario litúrgico porque no corresponde al léxico del versículo.
  - «Escombro» se eligió por equivalencia contextual a «rubble», no por traducción literal de עפר.
  - La negación «no podremos» refleja incapacidad, no falta de voluntad.
