translation:
  language: es
  text: Pero ellos velan alrededor de él, y cada uno no puede irse y hacer su trabajo, ni le desobedecen.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τηροῦσιν
  english_pob_choice: keep watch
  chosen_spanish: velan
  alternatives_spanish:
  - guardan
  - están vigilando
  lexicon: LSJ
  rationale: En este contexto de custodia alrededor del rey, el verbo expresa vigilancia activa; «velan» conserva el sentido de atención continua sin sonar rígido. «Guardan» también es posible, pero puede sonar más estático.
- source_word: κύκλῳ περὶ αὐτόν
  english_pob_choice: around him
  chosen_spanish: alrededor de él
  alternatives_spanish:
  - en derredor de él
  - rodeándolo
  lexicon: LSJ
  rationale: La frase describe una disposición espacial de vigilancia en torno al rey. «Alrededor de él» es natural en español y mantiene la imagen sin añadir interpretación.
- source_word: οὐ δύνανται
  english_pob_choice: cannot
  chosen_spanish: no puede
  alternatives_spanish:
  - no pueden
  - no es posible que
  lexicon: BDAG
  rationale: Se conserva la idea de incapacidad. En español, el sujeto distributivo «cada uno» permite el singular «no puede» sin perder el sentido colectivo.
- source_word: ἕκαστος
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada cual
  - uno por uno
  lexicon: BDAG
  rationale: El valor distributivo queda claro con «cada uno», que reproduce la responsabilidad individual de los servidores.
- source_word: ἀπελθεῖν
  english_pob_choice: go away
  chosen_spanish: irse
  alternatives_spanish:
  - salir
  - apartarse
  lexicon: BDAG
  rationale: El infinitivo indica alejarse de la presencia del rey. «Irse» es breve y natural; en combinación con el resto de la frase conserva la idea de ausentarse.
- source_word: ποιεῖν τὰ ἔργα αὐτοῦ
  english_pob_choice: do his work
  chosen_spanish: hacer su trabajo
  alternatives_spanish:
  - cumplir sus tareas
  - atender a sus labores
  lexicon: BDAG
  rationale: «Trabajo» mantiene el sentido básico de ocupación o deber asignado. No se expande a «negocios» o «asuntos» porque el griego habla de έργα, obras o labores.
- source_word: παρακούουσιν
  english_pob_choice: disobey
  chosen_spanish: desobedecerle
  alternatives_spanish:
  - no le obedecen
  - desatienden sus órdenes
  lexicon: BDAG
  rationale: El verbo expresa falta de obediencia frente a una autoridad. «Desobedecerle» conserva con precisión la relación jerárquica del contexto.
theological_decisions:
- issue: Relación de servicio y obediencia ante el rey
  english_pob_reading: The attendants keep watch around him and do not disobey him.
  chosen_spanish_reading: Los servidores permanecen vigilantes alrededor del rey y no se ausentan ni desobedecen.
  alternative_spanish_readings:
  - Los guardias rodean al rey y cumplen sin falta sus órdenes.
  - Los asistentes se mantienen atentos y obedientes.
  rationale: El pasaje no introduce una enseñanza doctrinal explícita; describe orden cortesano y disciplina de servicio. La traducción conserva la fuerza de vigilancia y obediencia sin convertirla en lenguaje religioso ajeno al contexto.
  doctrine_reference: No aplica; texto narrativo de corte.
translation_notes:
  revision_awareness: La revisión inglesa reciente prefirió «keep watch» sobre «stand guard» para reflejar con más directitud τηροῦσιν. Por eso el español usa «velan», que sigue el mismo matiz de vigilancia activa y continua.
  spanish_consistency_notes:
  - Se mantuvo «él» para el referente del rey, en concordancia con el contexto inmediato.
  - Se evitó «siervo» o «criado» porque el griego y el audit trail destacan vigilancia y obediencia funcional, no un término técnico de esclavitud.
  - Se conservó un registro sobrio y literal en la línea con la filosofía de equivalencia óptima del POB inglés.
