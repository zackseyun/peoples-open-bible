base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/011/001.yaml
  text: Then the Spirit lifted me up and brought me to the east gate of the house of Yahweh[a], which faces eastward. And behold, at the entrance of the gate were twenty-five men, and I saw among them Jaazaniah son of Azzur and Pelatiah son of Benaiah[c][b], leaders of the people.
  footnotes:
  - marker: a
    text: Or 'a spirit lifted me up'; Hebrew רוּחַ can also mean 'wind' or 'spirit,' but in Ezekiel's vision context it most likely refers to the divine Spirit.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the gate of the house of the LORD'; that is, the temple gate.
    reason: cultural_note
  - marker: c
    text: Or 'princes of the people' or 'officials of the people.'
    reason: lexical_alternative
