base_translation:
  language: en
  yaml_path: translation/ot/exodus/032/001.yaml
  text: When the people saw that Moses delayed coming down from the mountain[a], the people gathered around Aaron and said to him, “Get up, make gods for us that will go before us, because this Moses, the man who brought us up from the land of Egypt—we do not know what has become of him.”
  footnotes:
  - marker: a
    text: Or 'a god ... that will go before us.' Some understand אֱלֹהִים here in a singular sense because the narrative soon focuses on a single calf image, but the Hebrew form and the following verb are plural.
    reason: alternative_reading
