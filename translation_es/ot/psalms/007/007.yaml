review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: tres imperativos dirigidos a Dios (''Levántate... álzate... despierta''), mantiene Yahvé para יְהוָה y conserva el marco judicial de מִשְׁפָּט. Sin embargo, no preserva toda la evidencia auditada del POB inglés: falta la nota alternativa en el tramo final sobre ''el juicio que has ordenado/mandado'', y la nota [a] introduce una paráfrasis (''levántate con poder'') que no corresponde a la alternativa documentada (''sé exaltado/álzate'').'
  spanish_quality_summary: El español es claro, digno y ampliamente legible. '¡Levántate... álzate... despierta...!' funciona bien poéticamente. No obstante, la exclamación inicial es innecesaria en una serie de imperativos y la nota [c] suena algo torpe ('en favor de mí'). Además, conviene alinear mejor las notas con el sentido léxico real y con la auditoría inglesa.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה -> ''Yahvé'' correctamente; lenguaje antropomórfico preservado; מִשְׁפָּט -> ''juicio'' adecuado. No hay conflictos doctrinales. La principal corrección es de aparato de notas y de precisión léxica, no de glosario principal.'
  issues:
  - severity: medium
    issue: Falta una nota para la cláusula final מִשְׁפָּט צִוִּיתָ
    rationale: El POB inglés preserva la alternativa 'the judgment you have commanded'. El español debe reflejar esa alternativa relevante, especialmente porque 'has decretado juicio' también puede entenderse como 'el juicio que has ordenado'.
  - severity: medium
    issue: La nota [a] ofrece una alternativa no respaldada por la auditoría léxica principal
    rationale: '''Levántate con poder'' para קוּמָה añade una idea interpretativa (''con poder'') que no está en el hebreo ni en la nota inglesa. La alternativa adecuada es ''Álzate'' o ''Levántate''/''Sé exaltado'' según el matiz.'
  - severity: low
    issue: La nota [c] usa una formulación poco natural en español
    rationale: La explicación 'en favor de mí' suena antinatural. 'A mi favor' o 'en mi favor' expresa mejor el benefactivo de אֵלַי en español.
  - severity: low
    issue: La exclamación inicial puede omitirse
    rationale: No es incorrecta, pero una serie solemne de imperativos con comas y punto y coma suena más natural y más cercana al tono del verso sin marcar solo el primer verbo con exclamación.
