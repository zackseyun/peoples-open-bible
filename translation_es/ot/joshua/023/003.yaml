translation:
  language: es
  text: Y ustedes mismos han visto todo lo que Yahvé su Dios ha hecho a todas estas naciones de delante de ustedes[a], porque Yahvé su Dios es quien ha combatido por ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «de delante de ustedes», un modismo para indicar que las naciones fueron expulsadas de la presencia de Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתֶּם
  english_pob_choice: And you yourselves
  chosen_spanish: Y ustedes mismos
  alternatives_spanish:
  - Y ustedes
  - Ahora ustedes
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis; «ustedes mismos» conserva esa fuerza de manera natural en español. Se mantiene la conjunción inicial para reflejar la continuidad del discurso.
- source_word: רְאִיתֶם
  english_pob_choice: have seen
  chosen_spanish: han visto
  alternatives_spanish:
  - vieron
  lexicon: HALOT
  rationale: El perfecto hebreo comunica una experiencia ya cumplida con vigencia en el presente del discurso de Josué; el pretérito perfecto compuesto lo expresa bien en español.
- source_word: אֵת כָּל אֲשֶׁר
  english_pob_choice: all that
  chosen_spanish: todo lo que
  alternatives_spanish:
  - todo cuanto
  - todas las cosas que
  lexicon: HALOT
  rationale: La combinación marca el alcance total del objeto directo; «todo lo que» es idiomático y mantiene la amplitud sin sobretraducir.
- source_word: עָשָׂה
  english_pob_choice: has done
  chosen_spanish: ha hecho
  alternatives_spanish:
  - hizo
  - ha obrado
  lexicon: HALOT
  rationale: El verbo es amplio («hacer/obrar»). «Ha hecho» sigue de cerca el sentido básico sin especificar en exceso la acción contra las naciones.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre propio divino con la forma establecida en este proyecto, evitando la sustitución por un título. «Yahvé» mantiene la referencia directa al Tetragrámaton.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios (de ustedes)
  - su Dios de ustedes
  lexicon: HALOT
  rationale: La segunda persona plural se expresa de manera natural con «su» en español de respeto/broad readership; el contexto deja claro que se trata del Dios del pueblo al que Josué habla.
- source_word: לְכָל הַגּוֹיִם הָאֵלֶּה
  english_pob_choice: to all these nations
  chosen_spanish: a todas estas naciones
  alternatives_spanish:
  - contra todas estas naciones
  - sobre todas estas naciones
  lexicon: HALOT
  rationale: Con עשה, la preposición ל puede marcar el objeto afectado por la acción. En español, «a» funciona como objeto directo con naturalidad; el sentido de juicio/expulsión queda en el contexto.
- source_word: מִפְּנֵיכֶם
  english_pob_choice: before you
  chosen_spanish: delante de ustedes
  alternatives_spanish:
  - de delante de ustedes
  - de su presencia
  lexicon: HALOT
  rationale: El hebreo dice literalmente «de delante de ustedes». «Delante de ustedes» conserva la imagen espacial y la nota de expulsión queda sugerida por el contexto.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la afirmación previa; «porque» resulta claro y formal en español bíblico moderno.
- source_word: הוּא הַנִּלְחָם
  english_pob_choice: is the one who has fought
  chosen_spanish: es quien ha peleado
  alternatives_spanish:
  - es el que ha peleado
  - es quien pelea
  lexicon: HALOT
  rationale: El participio con artículo funciona sustantivamente; en este contexto retrospectivo, «es quien ha peleado» comunica la acción ya demostrada sin perder la cualidad de agente principal.
- source_word: לָכֶם
  english_pob_choice: for you
  chosen_spanish: por ustedes
  alternatives_spanish:
  - a favor de ustedes
  - en favor de ustedes
  lexicon: HALOT
  rationale: La preposición expresa beneficio o representación; en contexto militar, «por ustedes» suena natural y conserva la idea de actuar en su favor.
theological_decisions:
- issue: Nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se conserva el nombre propio del pacto y no se sustituye por un título. «Yahvé» es la forma establecida en el proyecto para el Tetragrámaton, conforme al criterio de transliteración auditada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto coincide con el estado auditado final y la observación externa señaló solo cuestiones menores, sin requerir ajustes sustantivos.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con la terminología del proyecto para יהוה.
  - Se eligió el plural formal/inclusivo «ustedes» para reflejar el hebreo plural de segunda persona.
  - «Delante de ustedes» conserva la imagen espacial del hebreo מִפְּנֵי־כֶם sin atenuar el trasfondo de expulsión.
  - «ha peleado» refleja el sentido bélico de הַנִּלְחָם en este contexto, evitando un calco demasiado literal como «está peleando» que desdibujaría la retrospectiva.
