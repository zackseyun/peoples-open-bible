review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: contraste temporal en el séptimo año, descanso sabático intensificado para la tierra, dedicación a Yahvé, y las dos prohibiciones agrícolas. También sigue correctamente la decisión doctrinal de usar ‘Yahvé’. Sin embargo, ‘habrá’ sin artículo produce una construcción algo menos natural y menos precisa para ‘שַׁבַּת שַׁבָּתוֹן יִהְיֶה לָאָרֶץ’; conviene explicitar ‘habrá para la tierra’ con artículo en el predicado nominal para mejor español.'
  spanish_quality_summary: 'La redacción es mayormente clara y digna. El principal ajuste es de naturalidad y precisión: ‘habrá un sábado de completo reposo para la tierra’ suena aceptable, pero ‘habrá para la tierra un sábado de completo reposo’ o ‘la tierra tendrá...’ refleja mejor la relación del descanso con la tierra. Además, en español bíblico y agrícola ‘viña’ funciona bien, pero ‘campo’ + ‘viña’ mantiene buen paralelismo. El resto es legible y fiel.'
  glossary_alignment: 'Alineación general buena con la terminología del proyecto: יהוה → ‘Yahvé’ correctamente; שבת conservado como ‘sábado’; זרע → ‘sembrar’; זמר → ‘podar’. No hay conflicto relevante de glosario. La nota léxica sobre ‘solemne reposo’ está bien mantenida.'
  issues:
  - severity: medium
    issue: Construcción existencial algo rígida en ‘habrá un sábado de completo reposo para la tierra’
    rationale: 'Aunque comprensible, en español suena más natural y más cercano al hebreo destacar primero la relación con la tierra: ‘habrá para la tierra un sábado de completo reposo’. Así se preserva mejor יִהְיֶה לָאָרֶץ.'
  - severity: low
