review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo base: «¡Ay del corazón… que no confía… no se mantendrá en pie!», y conserva en nota la variante griega sobre el corazón flojo y no ser protegido. Sin embargo, la nota y una decisión léxica introducen matices no del todo precisos: «flojo» debilita «slack»/παρειμένῃ, y «se mantendrá en pie» en la explicación no refleja tan directamente el futuro simple del hebreo como «no se sostendrá/no se mantendrá en pie» en el texto principal. El sentido principal está correctamente preservado.'
  spanish_quality_summary: El español es claro, digno y legible. La frase principal funciona bien. Aun así, «porque tampoco» suena un poco explicativo de más; «pues tampoco» fluye mejor en registro sapiencial. La nota puede afinarse para sonar más natural y exacta en español, especialmente con «flojo» y «cubierto/protegido».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «corazón» y «confía» están bien elegidos conforme al hebreo y al razonamiento auditado. No intervienen términos sensibles como Yahvé/Mesías/espíritu/etc.
  issues:
  - severity: medium
    issue: Conector «porque tampoco» algo forzado
    rationale: El hebreo וְאַף הוּא añade énfasis/consecuencia, y el inglés auditado lo refleja como «for it also». En español, «pues tampoco» o «porque él también» preservan mejor la relación sin sonar tan mecánico. «Porque tampoco» no es incorrecto, pero resulta menos natural en estilo bíblico sapiencial.
  - severity: low
    issue: La nota usa «corazón flojo» para la variante griega
    rationale: «Flojo» es comprensible, pero para παρειμένῃ puede sonar demasiado coloquial o físico. «decaído» o «desfallecido» refleja mejor la idea de laxitud/desánimo del corazón en contexto sapiencial.
  - severity: low
    issue: La nota puede formular con más precisión la alternativa griega
    rationale: «No será cubierto/protegido» es aceptable, pero suena algo tosco. «No será resguardado» o «no será protegido» sería más natural. Como el inglés ya preserva la doble opción sheltered/protected, conviene mantener una formulación española limpia y fiel.
  revised_spanish_text: ¡Ay del corazón que no confía[a], pues tampoco se mantendrá en pie!
  revised_footnotes:
  - marker: a
    text: 'Griego: «¡Ay del corazón decaído, porque no cree; por eso no será protegido!». El hebreo dice «corazón» y «no se mantendrá en pie».'
    reason: alternative_reading
  revision_rationale: 'Se hace una reparación menor para mejorar la naturalidad y precisión: «pues tampoco» refleja mejor el enlace enfático del hebreo en español, y la nota cambia «flojo» por «decaído» y simplifica la variante griega a «no será protegido», más idiomático y fiel al sentido auditado.'
