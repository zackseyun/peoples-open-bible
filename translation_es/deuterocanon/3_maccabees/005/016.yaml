translation:
  language: es
  text: Cuando el rey consideró esto y se entregó a beber, ordenó a los que habían acudido al banquete que se recostaran alrededor de él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La última frase es difícil en el griego transmitido, tanto textual como sintácticamente. Alude a los comensales tomando su lugar en postura de recostarse en relación con el rey; «alrededor de él» es una traducción contextual. Otras posibilidades son «cerca de él» o «en su puesto a la mesa».
    reason: textual_variant
lexical_decisions:
- source_word: λογισάμενος
  english_pob_choice: considered this
  chosen_spanish: consideró esto
  alternatives_spanish:
  - habiendo reflexionado sobre esto
  - habiendo tomado esto en cuenta
  lexicon: LSJ
  rationale: El participio aoristo medio de λογίζομαι señala una consideración mental previa a la acción. «Consideró esto» reproduce esa secuencia con naturalidad en español y conserva el objeto implícito del contexto.
- source_word: τραπεὶς εἰς τὸν πότον
  english_pob_choice: turned to drinking
  chosen_spanish: se volvió al beber
  alternatives_spanish:
  - se dedicó a beber
  - se volvió al vino
  lexicon: LSJ
  rationale: El giro indica un cambio de conducta hacia la bebida. «Se volvió al beber» mantiene el movimiento verbal sin añadir más de lo que el griego exige; evita restringir πότος a «vino» y conserva su sentido más amplio de beber o convite bebedor.
- source_word: παραγεγονότας
  english_pob_choice: those who had come
  chosen_spanish: los que habían acudido
  alternatives_spanish:
  - los presentes
  - los que habían llegado
  lexicon: LSJ
  rationale: El participio perfecto conserva la idea de personas que ya habían llegado y estaban presentes. «Habían acudido» mantiene la fuerza verbal y suena natural en español.
- source_word: ἐπὶ τὴν συμποσίαν
  english_pob_choice: to the banquet
  chosen_spanish: al banquete
  alternatives_spanish:
  - a la bebida compartida
  - al convite
  lexicon: LSJ
  rationale: συμποσία puede referirse a un banquete o a un convivio de bebida. Dado el contexto inmediato de beber, «banquete» comunica bien el marco social y festivo sin forzar una interpretación demasiado técnica.
- source_word: ὑπὲρ ἀνακλίνα αὐτοῦ
  english_pob_choice: to recline around him
  chosen_spanish: que se recostaran alrededor de él
  alternatives_spanish:
  - que se recostaran cerca de él
  - que tomaran su lugar de recostarse junto a su lecho
  lexicon: LSJ
  rationale: La frase transmitida es difícil y apunta al lenguaje de recostarse a la mesa. «Alrededor de él» conserva la relación espacial probable sin resolver de manera indebida la sintaxis incierta del griego.
translation_notes:
  revision_awareness: He seguido el testimonio griego de Swete 1909 y el audit trail inglés, manteniendo la dificultad final de la frase sobre la disposición a la mesa sin suavizarla en exceso. No hay revisiones posteriores que alteren el sentido transmitido.
  spanish_consistency_notes:
  - He preferido «Yahvé» solo cuando el texto lo exija; aquí no aparece.
  - He mantenido «banquete» para συμποσία por coherencia con el contexto de bebida y la lectura inglesa auditada.
  - He evitado «vino» porque πότος es más amplio que una bebida específica.
  - La construcción final conserva la ambigüedad espacial del original y la explica en nota.
