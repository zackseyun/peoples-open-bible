    text: 'O: «una descendencia de hombres pecadores» o «un aumento de hombres pecadores». El hebreo תַּרְבּוּת puede denotar aumento o progenie; se escogió «prole» para conservar el tono de reprensión del contexto.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «sobre el ardor de la nariz de Yahvé», un modismo hebreo para una ira intensa.
    reason: lexical_alternative
