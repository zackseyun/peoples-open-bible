translation:
  language: es
  text: Porque el Señor es bondadoso con los que lo invocan con perseverancia[a]; él obra conforme a su misericordia para con sus piadosos[b], para que permanezcan continuamente delante de él en fortaleza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'con paciencia'.
    reason: lexical_alternative
  - marker: b
    text: O 'sus fieles'.
    reason: lexical_alternative
lexical_decisions:
- source_word: χρηστὸς
  english_pob_choice: kind
  chosen_spanish: bondadoso
  alternatives_spanish:
  - bueno
  - amable
  - benigno
  lexicon: BDAG
  rationale: χρηστός expresa aquí una disposición favorable y benévola. 'Bondadoso' conserva el valor relacional y suena natural en español bíblico sin endurecerse en un calco de 'good'.
- source_word: ἐπικαλουμένοις
  english_pob_choice: those who call on
  chosen_spanish: los que lo invocan
  alternatives_spanish:
  - los que lo llaman
  - los que claman a él
  lexicon: BDAG
  rationale: El participio se refiere a dirigirse a Dios en súplica o oración. 'Invocar' preserva bien ese matiz cultual y devocional en español.
- source_word: ἐν ὑπομονῇ
  english_pob_choice: with endurance
  chosen_spanish: con perseverancia
  alternatives_spanish:
  - con paciencia
  - con constancia
  lexicon: BDAG
  rationale: ὑπομονή incluye aguante bajo presión y permanencia fiel. 'Perseverancia' comunica mejor ese aspecto que 'paciencia' en español actual, aunque esta última queda como alternativa válida.
- source_word: ποιῆσαι κατὰ τὸ ἔλεος αὐτοῦ
  english_pob_choice: to act according to his mercy
  chosen_spanish: para obrar conforme a su misericordia
  alternatives_spanish:
  - para actuar conforme a su misericordia
  - para hacer según su misericordia
  lexicon: BDAG
  rationale: El infinitivo ποιῆσαι admite una formulación compacta. 'Obrar conforme a su misericordia' conserva la relación entre la acción divina y el estándar de su misericordia sin forzar una perífrasis demasiado interpretativa.
- source_word: τοῖς ὁσίοις αὐτοῦ
  english_pob_choice: his holy ones
  chosen_spanish: sus piadosos
  alternatives_spanish:
  - sus fieles
  - sus santos
  lexicon: BDAG
  rationale: En el contexto de los Salmos de Salomón, ὅσιοι designa un grupo sectario/covenantal de los 'piadosos' o 'fieles', no simplemente 'santos' en sentido genérico. 'Piadosos' sigue la revisión documentada del archivo y distingue mejor este término de ἅγιοι.
- source_word: παρεστᾶναι
  english_pob_choice: stand
  chosen_spanish: estar
  alternatives_spanish:
  - permanecer
  - estar en pie
  - comparecer
  lexicon: BDAG
  rationale: El verbo expresa estar presente ante Dios; en español, 'estar continuamente delante de él' comunica esa presencia estable sin introducir una imagen forzada. La idea de 'estar en pie' queda implícita en el contexto, pero no es la forma más natural aquí.
- source_word: διὰ παντὸς
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - sin cesar
  lexicon: BDAG
  rationale: '''Continuamente'' reproduce bien la duración ininterrumpida y encaja con el tono litúrgico del pasaje.'
- source_word: ἐν ἰσχύι
  english_pob_choice: in strength
  chosen_spanish: en fortaleza
  alternatives_spanish:
  - con fuerza
  - en poder
  lexicon: BDAG
  rationale: '''Fortaleza'' mantiene la fuerza nominal del griego y sugiere capacidad sostenida para permanecer ante Dios. ''Con fuerza'' sería más idiomático, pero menos cercano a la construcción original.'
theological_decisions:
- issue: Valor sociológico y covenantal de ὅσιοι en Psalmos de Salomón
  english_pob_reading: The English audit trail recognizes that 'holy ones' is standard but notes a revision to 'pious ones' because the term in this book denotes a specific group of the pious/faithful.
  chosen_spanish_reading: sus piadosos
  alternative_spanish_readings:
  - sus santos
  - sus fieles
  rationale: La revisión del archivo señala explícitamente que ὅσιοι en esta obra designa un grupo sociológico concreto. 'Piadosos' conserva esa identidad y evita borrar la tensión entre una traducción más estándar ('santos') y la más contextual ('piadosos').
  doctrine_reference: Uso sectario/covenantal del término ὅσιοι en el contexto de los Salmos de Salomón
translation_notes:
  revision_awareness: La base inglesa pasó por una revisión que inicialmente prefería 'pious ones' para ὅσιοι y luego volvió a 'holy ones' por estándar de traducción. Aquí se sigue la anotación contextual más específica del libro, no la redacción más general, porque el paquete de revisión documenta que el término tiene un sentido sociológico particular en Psalmos de Salomón. También se conserva la estructura infinitival del griego mediante 'para obrar... para estar...', sin convertirla en una paráfrasis explicativa.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' como máscara; se usa 'el Señor' para κύριος en este contexto, que no es una cita explícita de YHWH en el texto griego dado.
  - '''Invocar'' se usa como término devocional, no meramente vocal.'
  - '''Perseverancia'' se prefiere sobre ''paciencia'' por el matiz de resistencia activa de ὑπομονή.'
  - '''Piadosos'' refleja el término técnico contextual de la obra para ὅσιοι.'
  - '''Fortaleza'' se mantiene como sustantivo para respetar ἐν ἰσχύι.'
