  source_alignment_summary: 'El borrador refleja bien el hebreo: וְנָתַתִּי + עֲלֵיכֶם se capta adecuadamente con una imposición ‘sobre ustedes’; חֶרְפַּת y וּכְלִמּוּת se distinguen con dos sustantivos de deshonra; עוֹלָם se mantiene con valor duradero/perpetuo; y לֹא תִשָּׁכֵחַ se traduce correctamente como pasiva. La única falla relevante está en la nota, que no presenta una alternativa real al texto principal sino que repite la misma formulación.'
  spanish_quality_summary: 'El español es claro y digno. ‘Oprobio perpetuo’ y ‘vergüenza perpetua’ son legibles y adecuados. ‘Que no será olvidada’ suena natural. La corrección necesaria es solo editorial: ajustar la nota para que ofrezca una alternativa genuina, en línea con el expediente inglés. También conviene usar comillas españolas en la nota.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparece el nombre divino ni términos cristológicos sensibles. Las decisiones léxicas ‘oprobio’, ‘vergüenza’ y ‘perpetuo’ concuerdan con la racionalidad documentada.
  issues:
  - severity: medium
    issue: La nota al pie repite esencialmente el mismo texto principal en vez de dar una alternativa léxica real.
    rationale: El inglés documenta como alternativa ‘perpetual’ frente a ‘everlasting’. En español, si el texto principal usa ‘perpetuo’, la nota debe ofrecer otra opción como ‘sempiterno’ o cambiar el texto principal. Tal como está, ‘O oprobio perpetuo y vergüenza perpetua’ no aporta variante significativa.
  - severity: low
    issue: Puntuación tipográfica de la nota mejorable.
    rationale: En español convienen comillas angulares o comillas dobles estándar, no comillas tipográficas inglesas simples.
  revised_spanish_text: Y pondré sobre ustedes oprobio perpetuo y vergüenza perpetua[a], que no será olvidada.
  revised_footnotes:
