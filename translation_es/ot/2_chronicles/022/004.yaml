translation:
  language: es
  text: Hizo lo malo a los ojos de Yahvé[a], como la casa de Acab, porque ellos eran sus consejeros después de la muerte de su padre, para su destrucción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para su ruina» o «para destruirlo». La expresión hebrea puede indicar tanto el resultado del consejo como su propósito destructivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He did
  chosen_spanish: Él hizo
  alternatives_spanish:
  - Y él hizo
  - Hizo
  lexicon: HALOT
  rationale: La forma wayyiqtol narra una acción sucesiva. En español, «Él hizo» conserva la acción verbal y mantiene explícito el sujeto sin volver la frase rígida.
- source_word: הָרַע
  english_pob_choice: what was evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - el mal
  - lo que era malo
  lexicon: HALOT
  rationale: El artículo con רַע funciona como una evaluación sustantivada. «Lo malo» reproduce bien el valor idiomático de una conducta evaluada negativamente.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the sight of Yahweh
  chosen_spanish: a los ojos de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en la vista de Yahvé
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de evaluación divina. «A los ojos de Yahvé» suena natural en español y mantiene el sentido de juicio moral.
- source_word: כְּבֵית אַחְאָב
  english_pob_choice: like the house of Ahab
  chosen_spanish: como la casa de Acab
  alternatives_spanish:
  - como la familia de Acab
  - como la dinastía de Acab
  lexicon: HALOT
  rationale: «Casa de Acab» conserva el valor dinástico del hebreo, no solo el individuo. Se usa «Acab» como forma española usual del nombre.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: La partícula introduce la razón de la evaluación anterior. «Porque» expresa con claridad la relación causal en español.
- source_word: הֵמָּה הָיוּ לוֹ יוֹעֲצִים
  english_pob_choice: they were his counselors
  chosen_spanish: ellos habían sido sus consejeros
  alternatives_spanish:
  - eran sus consejeros
  - fueron sus consejeros
  lexicon: HALOT
  rationale: Se mantiene la idea nominal de consejeros y se añade el pluscuamperfecto para reflejar la relación temporal con «después de la muerte de su padre», sin cambiar el valor básico del hebreo.
- source_word: אַחֲרֵי מוֹת אָבִיו
  english_pob_choice: after the death of his father
  chosen_spanish: después de la muerte de su padre
  alternatives_spanish:
  - tras la muerte de su padre
  - después de que murió su padre
  lexicon: HALOT
  rationale: La construcción se vierte de modo formal y claro. «Despuués de la muerte de su padre» mantiene la relación constructa sin añadir matices interpretativos.
- source_word: לְמַשְׁחִית לוֹ
  english_pob_choice: to his destruction
  chosen_spanish: para su destrucción
  alternatives_spanish:
  - para su ruina
  - a su destrucción
  - para destruirlo
  lexicon: HALOT
  rationale: La לְ con מַשְׁחִית admite valor de resultado o propósito con desenlace destructivo. «Para su destrucción» conserva esa tensión sin imponer demasiado la intención de los consejeros.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Según el estándar del proyecto, se traduce como «Yahvé» y no como una sustitución reverencial impersonal.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo masorético y armoniza con la auditoría inglesa: mantiene el juicio evaluativo, la metáfora de «los ojos de Yahvé», la referencia dinástica a la casa de Acab y la ambigüedad de לְמַשְׁחִית לוֹ mediante una nota alternativa.'
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al estándar español del proyecto.
  - «Casa de Acab» conserva la referencia dinástica del hebreo.
  - «Consejeros» mantiene el sustantivo verbal de יוֹעֲצִים sin convertirlo en una paráfrasis de acción.
  - La nota de pie recoge la ambigüedad semántica de לְמַשְׁחִית לוֹ sin sobreexplicarla en el cuerpo del texto.
