- from: No presentarán a Yahvé[a] nada con testículos magullados, aplastados, arrancados o cortados, ni en su tierra harán eso.
  to: No presentarán a Yahvé nada con testículos magullados, aplastados, arrancados o cortados[a], y en su tierra no harán esto.
