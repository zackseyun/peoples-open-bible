  text: לָ/כֵ֞ן כֹּֽה אָמַ֣ר יְהוָ֗ה אֶל יְהוֹיָקִ֤ים בֶּן יֹאשִׁיָּ֨הוּ֙ מֶ֣לֶךְ יְהוּדָ֔ה לֹא יִסְפְּד֣וּ ל֔/וֹ ה֥וֹי אָחִ֖/י וְ/ה֣וֹי אָח֑וֹת לֹא יִסְפְּד֣וּ ל֔/וֹ ה֥וֹי אָד֖וֹן וְ/ה֥וֹי הֹדֹֽ/ה־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/022/018.yaml
  text: 'Therefore thus says Yahweh concerning Jehoiakim son of Josiah[a], king of Judah: They will not lament for him, saying, “Alas, my brother!” or “Alas, sister!” They will not lament for him, saying, “Alas, lord!” or “Alas[d][c][b], his majesty!”'
  footnotes:
  - marker: a
    text: Or “They will not mourn for him.” The Hebrew verb refers especially to formal funeral lamentation.
    reason: lexical_alternative
  - marker: b
    text: “Alas, sister!” The Hebrew lacks the explicit “my” found in “my brother,” though some English renderings supply it for parallelism.
    reason: lexical_alternative
  - marker: c
    text: Or “Alas, lord!” for “Alas, master!” The Hebrew title can denote a superior, owner, or ruler.
    reason: lexical_alternative
  - marker: d
    text: Or “Alas, his splendor!” The Hebrew expression refers to royal majesty or splendor.
    reason: lexical_alternative
