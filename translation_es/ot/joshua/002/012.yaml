translation:
  language: es
  text: Y ahora, por favor júrenme por Yahvé que, así como yo he mostrado bondad con ustedes, también ustedes mostrarán bondad a la casa de mi padre y me darán una señal segura[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «una señal verdadera», «una señal segura» o «una prenda fiable».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Conserva la transición discursiva del hebreo y el valor conjuntivo de ו, manteniendo el impulso urgente de la petición.
- source_word: הִשָּׁבְעוּ נָא
  english_pob_choice: please swear
  chosen_spanish: por favor júrenme
  alternatives_spanish:
  - júrenme, por favor
  - por favor, háganme juramento
  lexicon: HALOT
  rationale: El imperativo plural pide un juramento, y נָא aporta ruego/cortesía. En español, 'júrenme' comunica la acción de jurar dentro del marco de una petición formal.
- source_word: לִי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: HALOT
  rationale: Con 'júrenme', el dativo español se expresa naturalmente con objeto indirecto 'me'.
- source_word: בַּיהוָה
  english_pob_choice: by Yahweh
  chosen_spanish: por Yahvé
  alternatives_spanish:
  - por Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino como Yahvé, según el criterio del proyecto para יהוה, y la preposición de juramento se expresa de manera natural con 'por'.
- source_word: עָשִׂיתִי עִמָּכֶם חָסֶד
  english_pob_choice: I have shown kindness to you
  chosen_spanish: yo he mostrado bondad a ustedes
  alternatives_spanish:
  - yo les he mostrado bondad
  - yo he actuado con bondad hacia ustedes
  - yo he tenido misericordia de ustedes
  lexicon: HALOT
  rationale: חֶסֶד aquí conserva el matiz de bondad leal/benévola; 'bondad' evita cargar el texto con una equivalencia doctrinal más fuerte que la escena inmediata permite. La preposición עִם se vuelve de forma idiomática 'a' en español para el receptor de la acción.
- source_word: וַעֲשִׂיתֶם גַּם אַתֶּם
  english_pob_choice: you also will show
  chosen_spanish: también ustedes mostrarán
  alternatives_spanish:
  - ustedes también harán
  - también ustedes harán
  lexicon: HALOT
  rationale: El valor consecutivo/futuro de la forma verbal se expresa de modo natural como futuro en la petición-juramento. Se mantiene el énfasis de גַּם אַתֶּם con 'también ustedes'.
- source_word: עִם בֵּית אָבִי חֶסֶד
  english_pob_choice: kindness to my father's house
  chosen_spanish: bondad a la casa de mi padre
  alternatives_spanish:
  - bondad con la casa de mi padre
  - bondad para la casa de mi padre
  - bondad leal a la casa de mi padre
  lexicon: HALOT
  rationale: La expresión hebrea conserva el mismo sustantivo חֶסֶד; en español 'bondad' mantiene la claridad sin perder el peso ético-relacional. 'Casa de mi padre' preserva el idiomático בֵּית אָבִי.
- source_word: בֵּית אָבִי
  english_pob_choice: my father's house
  chosen_spanish: la casa de mi padre
  alternatives_spanish:
  - mi casa paterna
  - mi familia
  lexicon: HALOT
  rationale: Se mantiene el idiomático hebreo de hogar/linaje sin sustituirlo por una paráfrasis más general como 'familia'.
- source_word: וּנְתַתֶּם לִי
  english_pob_choice: and give me
  chosen_spanish: y me darán
  alternatives_spanish:
  - y me daréis
  - y denme
  lexicon: HALOT
  rationale: En contexto de súplica y compromiso jurado, el futuro con valor volitivo en español refleja bien la secuencia solicitada bajo juramento.
- source_word: אוֹת
  english_pob_choice: sign
  chosen_spanish: señal
  alternatives_spanish:
  - signo
  - prueba
  - marca
  lexicon: HALOT
  rationale: '''Señal'' es transparente y natural en español bíblico para un indicio confirmatorio o garantía visible.'
- source_word: אֱמֶת
  english_pob_choice: sure / true / reliable
  chosen_spanish: segura
  alternatives_spanish:
  - verdadera
  - firme
  - confiable
  lexicon: HALOT
  rationale: La combinación אוֹת אֱמֶת se vierte como 'señal segura' para preservar el sentido de certeza/fiabilidad sin sobreinterpretar 'verdad' como una cualidad abstracta separada del signo mismo.
theological_decisions:
- issue: Rendering the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: Se sigue la convención del proyecto para el Tetragrámaton, preservando el nombre del pacto en vez de enmascararlo como 'Señor'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Force of חֶסֶד in an interpersonal oath context
  english_pob_reading: kindness
  chosen_spanish_reading: bondad
  alternative_spanish_readings:
  - bondad leal
  - misericordia
  - lealtad
  rationale: En esta escena, חֶסֶד funciona como favor benévolo comprometido entre partes; 'bondad' conserva el valor relacional sin introducir un tecnicismo teológico que el contexto inmediato no exige.
  doctrine_reference: 'DOCTRINE.md: Lexical precision — חֶסֶד / covenant kindness'
- issue: Nature of אֱמֶת in אוֹת אֱמֶת
  english_pob_reading: sure sign / true sign / reliable pledge
  chosen_spanish_reading: señal segura
  alternative_spanish_readings:
  - señal verdadera
  - prenda segura
  - prueba fiable
  rationale: El hebreo admite la idea de una señal verdadera, segura o fiable. 'Señal segura' mantiene la ambigüedad útil del original y coincide con la revisión inglesa más reciente que prefirió 'sure sign'.
  doctrine_reference: 'DOCTRINE.md: lexical equivalence under oath/pledge language'
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa, que prefirió 'a sure sign' sobre 'a trustworthy sign' para evitar sobrerinterpretación de אוֹת אֱמֶת. En español se adoptó 'señal segura' como equivalente natural y fiel.
  spanish_consistency_notes:
  - Se conserva Yahvé para יהוה conforme a la terminología del proyecto.
  - Se traduce חֶסֶד de forma contextual como 'bondad', manteniendo el valor relacional sin exceder el alcance de la escena.
  - '''Señal segura'' refleja la tensión lexical de אֱמֶת sin clausurar otras posibilidades semánticas.'
  - La sintaxis mantiene el tono de súplica y compromiso jurado propio del verso.
