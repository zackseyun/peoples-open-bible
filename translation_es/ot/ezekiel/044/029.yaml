    reason: lexical_alternative
  revision_rationale: Se ajusta מִנְחָה a ‘ofrenda de cereal’ para reflejar mejor la decisión léxica documentada (‘grain offering’) y el uso cúltico establecido en español. Se mejora חֵרֶם a ‘todo lo dedicado’ por naturalidad y precisión, y se corrige la nota defectuosa eliminando ‘devotada’ e incorporando la explicación teológica/lexical del término técnico. No hace falta nota para מִנְחָה, porque el texto principal ya expresa bien el sentido y la alternativa no es necesaria para evitar ambigüedad en español.
