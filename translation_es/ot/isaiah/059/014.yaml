translation:
  language: es
  text: La justicia es hecha retroceder, y la rectitud queda lejos; porque la verdad tropieza en la calle[a], y la rectitud no puede entrar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la verdad ha caído en la plaza pública».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «lo recto no puede entrar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֻסַּג
  english_pob_choice: is turned back
  chosen_spanish: es echada atrás
  alternatives_spanish:
  - es apartada hacia atrás
  - es empujada hacia atrás
  - es retirada
  lexicon: HALOT
  rationale: El pasivo de הסג expresa ser movido o hecho retroceder. «Es echada atrás» conserva el valor pasivo y la imagen de desplazamiento, con una construcción natural en español.
- source_word: אָחוֹר
  english_pob_choice: back
  chosen_spanish: atrás
  alternatives_spanish:
  - hacia atrás
  - al fondo
  - a la retaguardia
  lexicon: HALOT
  rationale: Como complemento adverbial de retroceso, «atrás» transmite de forma idiomática la dirección del movimiento sin añadir matices no presentes en el hebreo.
- source_word: מִשְׁפָּט
  english_pob_choice: Justice
  chosen_spanish: la justicia
  alternatives_spanish:
  - el juicio
  - el derecho
  - la rectitud legal
  lexicon: HALOT
  rationale: En este contexto profético-social, משפט se refiere a la justicia pública y al orden recto en la comunidad. «La justicia» mantiene ese sentido sin reducirlo a una sentencia judicial aislada.
- source_word: צְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: la rectitud
  alternatives_spanish:
  - la justicia
  - la recta conducta
  - la equidad
  lexicon: HALOT
  rationale: Para preservar la distinción con משפט, «rectitud» comunica la dimensión moral y relacional de צדקה sin fusionarla con «justicia». En español, esta pareja resulta clara y distinguible.
- source_word: מֵרָחוֹק תַּעֲמֹד
  english_pob_choice: stands far off
  chosen_spanish: queda lejos
  alternatives_spanish:
  - permanece a distancia
  - se mantiene lejos
  - está lejos
  lexicon: HALOT
  rationale: La construcción presenta la rectitud como algo mantenido a distancia. «Queda lejos» es breve, natural y conserva la idea de permanencia distante.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque en efecto
  lexicon: HALOT
  rationale: Aquí introduce la razón de la situación anterior. «Porque» es la opción más directa y transparente en español.
- source_word: כָשְׁלָה
  english_pob_choice: has stumbled
  chosen_spanish: tropieza
  alternatives_spanish:
  - ha tropezado
  - ha caído
  - vacila
  lexicon: HALOT
  rationale: El verbo expresa tropezar o vacilar. «Tropieza» mantiene la imagen proverbial y funciona bien con el sujeto personificado «la verdad».
- source_word: בָרְחוֹב
  english_pob_choice: in the street
  chosen_spanish: en la calle
  alternatives_spanish:
  - en la plaza pública
  - en el espacio público
  - en la plaza
  lexicon: HALOT
  rationale: רחוב alude a un lugar público abierto. «En la calle» es una equivalencia clara y contemporánea que conserva el ámbito visible y social del tropiezo.
- source_word: אֱמֶת
  english_pob_choice: truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - la fidelidad
  - la fiabilidad
  lexicon: HALOT
  rationale: En este contexto de colapso moral y social, «verdad» capta mejor la realidad pública personificada que «fidelidad», aunque esta última sigue siendo una posibilidad semántica.
- source_word: נְכֹחָה
  english_pob_choice: uprightness
  chosen_spanish: la honradez
  alternatives_spanish:
  - la rectitud
  - lo recto
  - la integridad
  lexicon: HALOT
  rationale: נכֹחה expresa lo recto, lo derecho, lo correcto. «Honradez» comunica bien en español la cualidad moral de alguien o algo confiable y recto, y evita repetir «rectitud» de forma pesada en el verso.
- source_word: לֹא תוּכַל לָבוֹא
  english_pob_choice: cannot enter
  chosen_spanish: no puede entrar
  alternatives_spanish:
  - no logra entrar
  - no puede venir
  - no le es posible entrar
  lexicon: HALOT
  rationale: La cláusula imagina a la honradez impedida de acceder al ámbito público. «No puede entrar» preserva la imagen de exclusión con naturalidad en español.
theological_decisions:
- issue: Diferenciar מִשְׁפָּט y צְדָקָה sin colapsarlos
  english_pob_reading: Justice ... righteousness
  chosen_spanish_reading: la justicia ... la rectitud
  alternative_spanish_readings:
  - la justicia ... la justicia
  - el juicio ... la rectitud
  rationale: Siguiendo la lectura del POB, mantengo dos términos relacionados pero distintos para preservar el paralelismo hebreo. «Justicia» y «rectitud» comunican una dimensión social-jurídica y otra moral sin borrar la tensión lexical.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5'
- issue: Renderizar אֱמֶת y נְכֹחָה como cualidades públicas personificadas
  english_pob_reading: truth ... uprightness
  chosen_spanish_reading: la verdad ... la honradez
  alternative_spanish_readings:
  - la verdad ... la rectitud
  - la fidelidad ... lo recto
  rationale: El verso personifica virtudes que quedan excluidas del espacio público. «Verdad» y «honradez» conservan esa personificación en un español fluido, sin reducir el texto a una mera abstracción filosófica.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el POB inglés, sin cambios relevantes respecto del control reciente: se conserva la pasiva de retroceso, la distinción entre משפט y צדקה, y la imagen pública del tropiezo de la verdad. Se ajustó el segundo hemistiquio para un español más natural.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma reservada para el Tetragrámaton cuando aparezca; este versículo no lo contiene.
  - Se evitó «SEÑOR» y también fórmulas litúrgicas tradicionales no motivadas por el hebreo.
  - Se preserva la personificación de cualidades abstractas, conforme al paralelo hebreo.
  - «Honradez» se eligió por claridad contextual; si se prefiere una duplicación más literal, «rectitud» sería una alternativa válida pero menos idiomática en el cierre.
