translation:
  language: es
  text: Pero Roboam reinó sobre los israelitas que habitaban en las ciudades de Judá.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּ/בְנֵי יִשְׂרָאֵל
  english_pob_choice: the Israelites
  chosen_spanish: los israelitas
  alternatives_spanish:
  - los hijos de Israel
  - los hijos de Israel
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hijos de Israel», pero el sentido nacional/étnico aquí es el de un grupo de israelitas residente en Judá. «Los israelitas» conserva ese valor colectivo de forma natural en español y evita una traducción excesivamente rígida.
- source_word: הַ/יֹּשְׁבִים
  english_pob_choice: who lived
  chosen_spanish: que habitaban
  alternatives_spanish:
  - que vivían
  - que residían
  lexicon: HALOT
  rationale: El participio de ישב expresa residencia continua. «Habitaban» mantiene la idea de asentamiento estable y suena digno y bíblicamente natural en español.
- source_word: בְּ/עָרֵי יְהוּדָה
  english_pob_choice: in the cities of Judah
  chosen_spanish: en las ciudades de Judá
  alternatives_spanish:
  - en las ciudades de Judá
  - en las ciudades de Judá
  lexicon: HALOT
  rationale: La preposición y el sustantivo se traducen de manera directa. «Ciudades de Judá» conserva el referente territorial sin sobreinterpretarlo.
- source_word: וַ/יִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - gobernó
  - ejerció el reinado
  lexicon: HALOT
  rationale: מלך en este contexto narrativo expresa ejercicio de la realeza. «Reinó» es la correspondencia más natural y fiel en español.
- source_word: עֲלֵי/הֶם
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - sobre ellos
  - sobre su pueblo
  lexicon: HALOT
  rationale: El complemento preposicional indica dominio o realeza sobre un grupo. En español, «sobre» transmite bien esa relación de gobierno.
- source_word: רְחַבְעָם
  english_pob_choice: Rehoboam
  chosen_spanish: Roboam
  alternatives_spanish:
  - Rehoboam
  lexicon: standard transliteration
  rationale: Se usa la transliteración española habitual «Roboam», correspondiente al nombre propio bíblico en castellano.
- source_word: וּ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: HALOT
  rationale: La conjunción tiene fuerza adversativa en el contexto inmediato, porque contrasta con la rebelión de las tribus del norte. «Pero» reproduce esa relación de contraste.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado y quedó sin cambios; la presente versión española sigue de cerca esa lectura con ajustes naturales de estilo en castellano.
  spanish_consistency_notes:
  - Se mantuvo el sentido colectivo de «los israelitas» en lugar de una calca literal que sonaría menos natural en español.
  - Se prefirió «habitaban» para reflejar residencia continua sin introducir matices no presentes en el hebreo.
  - Se usó «Roboam», forma española estándar del nombre, en lugar de una transliteración más cruda.
