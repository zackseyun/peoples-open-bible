translation:
  language: es
  text: Y hubo lluvia sobre la tierra cuarenta días y cuarenta noches[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más interpretativa, «Y la lluvia cayó sobre la tierra cuarenta días y cuarenta noches». El hebreo usa una construcción narrativa idiomática con «y fue/hubo»; aquí se traduce «hubo lluvia» para conservar el sentido del original en un español natural.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: was
  chosen_spanish: estuvo
  alternatives_spanish:
  - fue
  - había
  - se mantuvo
  lexicon: HALOT
  rationale: En este giro narrativo con הַגֶּשֶׁם, el hebreo expresa la ocurrencia/continuación del estado de la lluvia sobre la tierra. «Estuvo» conserva esa relación de presencia prolongada con un español natural, sin introducir la imagen más interpretativa de «cayó».
- source_word: הַגֶּשֶׁם
  english_pob_choice: the rain
  chosen_spanish: la lluvia
  alternatives_spanish:
  - la lluvia caída
  - el aguacero
  - la precipitación
  lexicon: HALOT
  rationale: El sustantivo designa lluvia; «la lluvia» es la forma directa y transparente en español. Se evita «aguacero» por intensificar el matiz sin base explícita en el texto.
- source_word: עַל הָאָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra
  - en la tierra
  - sobre el mundo
  lexicon: HALOT
  rationale: «עַל» pide una relación locativa de sobre/en. En el contexto del diluvio, «la tierra» comunica bien el alcance global del hebreo, y mantiene la concreción del original.
- source_word: אַרְבָּעִים יוֹם
  english_pob_choice: forty days
  chosen_spanish: cuarenta días
  alternatives_spanish:
  - por cuarenta días
  lexicon: HALOT
  rationale: Expresión numérica directa; se mantiene sin ampliar con preposición de duración, porque el hebreo ya establece la duración de forma idiomática.
- source_word: וְאַרְבָּעִים לָיְלָה
  english_pob_choice: and forty nights
  chosen_spanish: y cuarenta noches
  alternatives_spanish:
  - y cuarenta madrugadas
  lexicon: HALOT
  rationale: Se preserva el paralelismo semítico «días y noches» con el equivalente natural en español, manteniendo la fórmula completa y su ritmo narrativo.
translation_notes:
  revision_awareness: La revisión inglesa reciente pasó de «fell on» a «was on» para reflejar con mayor fidelidad la construcción hebrea; por eso el español sigue el valor locativo/estativo de וַיְהִי con «estuvo» en vez de una paráfrasis causal o dinámica.
  spanish_consistency_notes:
  - Se mantuvo «tierra» para אֶרֶץ en coherencia con el contexto cósmico del diluvio y con la decisión inglesa «earth».
  - No se introdujo lenguaje litúrgico ni eufemístico; el verso conserva el paralelismo simple del hebreo.
  - La nota al pie marca la alternativa más literal sin contradecir el texto principal.
