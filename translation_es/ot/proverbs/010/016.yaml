translation:
  language: es
  text: La labor del justo lleva a la vida[a]; el fruto[b] del malvado lleva al pecado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «para vida» o «resulta en vida», porque la preposición hebrea puede indicar finalidad o resultado.
    reason: lexical_alternative
  - marker: b
    text: O «producción», «rendimiento» o «cosecha» para «fruto».
    reason: lexical_alternative
  - marker: c
    text: En este versículo, חַטָּאת significa «pecado»; en contextos sacrificiales también puede significar «ofrenda por el pecado».
    reason: alternative_reading
lexical_decisions:
- source_word: פְּעֻלַּת
  english_pob_choice: labor
  chosen_spanish: labor
  alternatives_spanish:
  - trabajo
  - obra
  - salario
  lexicon: HALOT
  rationale: פְּעֻלָּה puede referirse al trabajo realizado o al resultado de ese trabajo. En el paralelismo proverbial con תְּבוּאַת, «labor» conserva el sentido de actividad con su efecto sin reducirlo a «salario».
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el recto
  - la persona justa
  - los justos
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivamente. «El justo» es natural en español y mantiene la figura representativa singular sin forzar género ni pluralizar indebidamente.
- source_word: לְחַיִּים
  english_pob_choice: leads to life
  chosen_spanish: lleva a la vida
  alternatives_spanish:
  - es para vida
  - resulta en vida
  - conduce a la vida
  lexicon: HALOT
  rationale: La preposición ל expresa aquí finalidad o resultado. «Lleva a la vida» comunica bien el movimiento/resultación del proverbio y mantiene el paralelismo con la segunda línea.
- source_word: תְּבוּאַת
  english_pob_choice: produce
  chosen_spanish: fruto
  alternatives_spanish:
  - producción
  - rendimiento
  - cosecha
  lexicon: HALOT
  rationale: תְּבוּאָה puede significar producto, rendimiento o cosecha. «Fruto» es idiomático en español, conserva la idea de lo que se obtiene de una actividad y funciona bien en contraste con «labor».
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el malvado
  alternatives_spanish:
  - el impío
  - el perverso
  - el culpable
  lexicon: HALOT
  rationale: Como sustantivo adjetival singular, describe al tipo de persona en contraste con «el justo». «El malvado» transmite el valor moral de forma clara y comprensible en español.
- source_word: לְחַטָּאת
  english_pob_choice: leads to sin
  chosen_spanish: lleva al pecado
  alternatives_spanish:
  - es para pecado
  - resulta en pecado
  - lleva a la culpa
  lexicon: HALOT
  rationale: En Proverbios, חַטָּאת aquí expresa el sentido moral de «pecado», no el de «ofrenda por el pecado». «Lleva al pecado» conserva la fuerza resultativa del ל y el contraste ético del paralelismo.
theological_decisions:
- issue: Sentido de חַטָּאת
  english_pob_reading: sin
  chosen_spanish_reading: pecado
  alternative_spanish_readings:
  - ofrenda por el pecado
  - expiación
  rationale: 'El contexto sapiencial contrasta dos resultados morales: vida frente a pecado. No hay marco sacrificial que justifique «ofrenda por el pecado».'
  doctrine_reference: Proverbios 10:16; uso contextual de חַטָּאת en literatura sapiencial
translation_notes:
  revision_awareness: 'El borrador sigue el texto hebreo WLC y coincide con el audit trail inglés en las decisiones principales: פְּעֻלַּת como un término de labor/actividad, לְחַיִּים y לְחַטָּאת como marcadores resultativos, תְּבוּאַת como producto/rendimiento y חַטָּאת en sentido moral. No se introdujeron cambios textuales respecto del consenso del expediente, solo una adaptación natural al español.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o lenguaje de sustitución porque no aparece el Tetragrámaton en este versículo.
  - Se prefirió «el justo / el malvado» para mantener el paralelismo proverbial con singular representativo.
  - «Fruto» se eligió por naturalidad en español, sin estrechar el hebreo a un campo exclusivamente agrícola.
  - No se usó «Cristo» ni terminología cristológica, pues no corresponde al texto.
  - La puntuación conserva el paralelismo binario con una pausa fuerte entre los dos hemistiquios.
