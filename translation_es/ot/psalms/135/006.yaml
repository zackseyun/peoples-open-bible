translation:
  language: es
  text: Yahvé hace todo lo que quiere[a], en los cielos y en la tierra[b], en los mares y todos los abismos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Todo cuanto Yahvé desea, lo ha hecho».'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «en los cielos».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «y todas las profundidades», refiriéndose a las aguas profundas o al abismo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל אֲשֶׁר
  english_pob_choice: whatever
  chosen_spanish: todo lo que
  alternatives_spanish:
  - todo cuanto
  - todo lo que sea
  lexicon: HALOT
  rationale: La combinación expresa alcance total. «Todo lo que» es natural en español y conserva la amplitud de la construcción sin forzar una paráfrasis.
- source_word: חָפֵץ
  english_pob_choice: he pleases
  chosen_spanish: quiere
  alternatives_spanish:
  - desea
  - se complace en
  - hace su voluntad
  lexicon: HALOT
  rationale: En este contexto de soberanía divina, el verbo comunica voluntad eficaz y no solo gusto subjetivo. «Quiere» mantiene esa fuerza de manera breve y fiel en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se preserva el nombre divino personal del tetragrámaton con la forma establecida para este proyecto en español: «Yahvé».'
- source_word: עָשָׂה
  english_pob_choice: does
  chosen_spanish: hace
  alternatives_spanish:
  - ha hecho
  - hizo
  - obra
  lexicon: HALOT
  rationale: El qatal expresa aquí una verdad general o gnómica. En español, el presente «hace» comunica mejor la acción habitual y soberana de Dios que un pasado puntual.
- source_word: בַּשָּׁמַיִם
  english_pob_choice: in heaven
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  - en los cielos
  lexicon: HALOT
  rationale: El hebreo es plural. «Los cielos» conserva mejor la forma y el paralelo cósmico con «la tierra» que un singular meramente idiomático.
- source_word: וּבָאָרֶץ
  english_pob_choice: and on earth
  chosen_spanish: y en la tierra
  alternatives_spanish:
  - y sobre la tierra
  - y en el mundo
  lexicon: HALOT
  rationale: «Tierra» reproduce el par tradicional cielo/tierra y mantiene el alcance universal del versículo.
- source_word: בַּיַּמִּים
  english_pob_choice: in the seas
  chosen_spanish: en los mares
  alternatives_spanish:
  - en los océanos
  - en el mar
  lexicon: HALOT
  rationale: El plural hebreo se conserva con «mares», que corresponde mejor al alcance poético de la expresión.
- source_word: וְכָל תְּהוֹמוֹת
  english_pob_choice: and all the depths
  chosen_spanish: y en todos los abismos
  alternatives_spanish:
  - y en todas las profundidades
  - y en todos los abismos acuosos
  lexicon: HALOT
  rationale: תְּהוֹמוֹת puede referirse a las profundidades acuáticas o al abismo. «Abismos» conserva la imagen fuerte del hebreo y la amplitud cósmica del paralelo.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El hebreo usa el Tetragrammaton directamente. Se evita la sustitución por un título y se mantiene el nombre propio divino conforme al criterio del proyecto en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor gnómico de עָשָׂה
  english_pob_reading: present-tense English ('does')
  chosen_spanish_reading: presente gnómico en español ('hace')
  alternative_spanish_readings:
  - pasado perfecto ('ha hecho')
  - pretérito ('hizo')
  rationale: El texto no describe solo un acto pasado, sino la capacidad/acción soberana de Yahvé de modo general. El presente español preserva ese valor sin añadir matices ajenos.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source plain sense'
translation_notes:
  revision_awareness: Coincide con la revisión más reciente marcada como sin cambios; no se detectan revisiones aplicadas adicionales ni tensiones textuales pendientes en el paquete fuente.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con la terminología base del proyecto.
  - Se conserva el paralelismo cósmico cielo/tierra/mares/abismos sin suavizar la imaginería hebrea.
  - La puntuación respeta la enumeración poética y separa los miembros con comas para claridad publicable.
