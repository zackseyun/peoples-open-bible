translation:
  language: es
  text: Y los [a]ejidos[a] de las ciudades que ustedes den a los levitas serán desde el muro de la ciudad hacia afuera, mil codos alrededor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tierras comunes» o «terreno abierto» para el terreno que rodea las ciudades.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «desde el muro de la ciudad»; algunos entienden esto de manera más general como «desde el límite de la ciudad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִגְרְשֵׁי
  english_pob_choice: pasture lands
  chosen_spanish: ejidos
  alternatives_spanish:
  - tierras comunes
  - terrenos abiertos
  - pastizales
  lexicon: HALOT
  rationale: מִגְרָשׁ designa el terreno abierto que rodea una ciudad y queda asociado a su uso periférico. En español, «ejidos» comunica bien la idea de tierras comunales o anejas al poblado sin reducirlo solo a pasto; «pastizales» sería demasiado restrictivo para el contexto de Levítico/municipio.
- source_word: הֶעָרִים
  english_pob_choice: the cities
  chosen_spanish: las ciudades
  alternatives_spanish:
  - los poblados
  - las villas
  lexicon: HALOT
  rationale: עִיר se conserva como «ciudad» para mantener la terminología del pasaje sobre ciudades levíticas y su perímetro.
- source_word: אֲשֶׁר תִּתְּנוּ
  english_pob_choice: that you give
  chosen_spanish: que darán
  alternatives_spanish:
  - que den
  - que ustedes darán
  - que ustedes entregarán
  lexicon: HALOT
  rationale: El hebreo expresa una cláusula relativa con fuerza instructiva futura. En español, «que darán» mantiene el valor prospectivo sin sonar forzado; el sujeto se entiende por el contexto de la orden a Israel.
- source_word: לַלְוִיִּם
  english_pob_choice: to the Levites
  chosen_spanish: a los levitas
  alternatives_spanish:
  - a los levitas
  - para los levitas
  lexicon: HALOT
  rationale: «A los levitas» reproduce de modo directo el destinatario de la donación. «Para los levitas» es posible, pero «a» refleja mejor la estructura del verbo dar.
- source_word: מִקִּיר הָעִיר
  english_pob_choice: from the wall of the city
  chosen_spanish: desde el muro de la ciudad
  alternatives_spanish:
  - desde la muralla de la ciudad
  - desde el límite de la ciudad
  lexicon: HALOT
  rationale: קִיר es literalmente «muro» o «pared». «Muro de la ciudad» es más transparente en español que «muralla» y sigue de cerca el sentido lexical; se conserva la posibilidad de entenderlo como borde urbano en nota.
- source_word: וָחוּצָה
  english_pob_choice: outward
  chosen_spanish: hacia afuera
  alternatives_spanish:
  - al exterior
  - afuera
  lexicon: HALOT
  rationale: La forma indica dirección hacia el exterior. «Hacia afuera» expresa la dirección con naturalidad y evita añadir matices no presentes en el hebreo.
- source_word: אֶלֶף אַמָּה
  english_pob_choice: a thousand cubits
  chosen_spanish: mil codos
  alternatives_spanish:
  - mil codos
  - mil medidas de codo
  lexicon: HALOT
  rationale: Se conserva la unidad antigua de medida como en el texto fuente; «codos» es el equivalente estándar en español bíblico.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - en derredor
  - por todos lados
  lexicon: HALOT
  rationale: «Alrededor» comunica el valor distributivo perimetral sin elevar el registro ni volver la frase pesada.
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca la revisión más reciente del POB inglés: se evita ampliar el verbo con «se extenderán» y se conserva la relación simple «serán desde...», trasladada en español con «serán desde». También se preserva la opción de notas para la alternativa léxica del terreno periférico y para la posible comprensión de «muro» como «límite».'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el hebreo lo requiera; este versículo no contiene el nombre divino.
  - Se mantuvo «levitas» como término técnico uniforme.
  - Se conservó la medida antigua «codos» en lugar de convertirla a metros para no perder la forma textual.
  - La traducción evita «SEÑOR» como sustituto reverencial porque no aplica al verso y porque el proyecto prefiere transparencia con el hebreo.
