    rationale: El griego ἐπλήθυνεν indica hacer más numerosos; en español, ‘aumentó’ o ‘incrementó’ suele sonar más fluido para el inventario de vasos sagrados, mientras que ‘multiplicó’ puede sonar más matemático o enfático de lo necesario.
