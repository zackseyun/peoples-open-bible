translation:
  language: es
  text: y del tributo de Celesiria y Fenicia, se dará cuidadosamente una provisión[a] a estos hombres para sacrificio a Yahvé, a Zorobabel, el gobernador, para toros, carneros y corderos[c][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una asignación debe darse» o «debe hacerse provisión». σύνταξιν δίδοσθαι se refiere a una asignación oficial o provisión tomada de los ingresos provinciales.
    reason: lexical_alternative
  - marker: b
    text: «Celesiria» es el nombre griego convencional de la región; literalmente, el término significa «Siria hueca».
    reason: cultural_note
  - marker: c
    text: La sintaxis alrededor de «a Zorobabel, el gobernador» es comprimida en griego y puede indicar tanto al destinatario o administrador de la provisión como una identificación appositiva dentro del decreto.
    reason: alternative_reading
lexical_decisions:
- source_word: φορολογίας
  english_pob_choice: tribute
  chosen_spanish: tributo
  alternatives_spanish:
  - impuesto
  - recaudación
  - tributación
  lexicon: LSJ
  rationale: φορολογίας en este contexto denota ingresos provinciales de carácter fiscal. «Tributo» conserva el marco imperial-administrativo y comunica bien la idea de fondos públicos asignados.
- source_word: κοίλης Συρίας
  english_pob_choice: Coele-Syria
  chosen_spanish: Celesiria
  alternatives_spanish:
  - Coele-Siria
  - Hollow Syria
  lexicon: LSJ
  rationale: Es un nombre geográfico fijo de uso helenístico. En español, la transliteración tradicional «Celesiria» preserva el referente sin volverlo una descripción literal.
- source_word: Φοινίκης
  english_pob_choice: Phoenicia
  chosen_spanish: Fenicia
  alternatives_spanish:
  - Fenícia
  lexicon: LSJ
  rationale: El topónimo tiene forma establecida en español como «Fenicia». Mantiene claridad y correspondencia histórica/geográfica.
- source_word: ἐπιμελῶς
  english_pob_choice: carefully
  chosen_spanish: cuidadosamente
  alternatives_spanish:
  - con diligencia
  - con cuidado
  lexicon: LSJ
  rationale: El adverbio enfatiza atención y esmero en la administración. «Cuidadosamente» reproduce ese matiz con español natural y digno.
- source_word: σύνταξιν δίδοσθαι
  english_pob_choice: support is to be given
  chosen_spanish: se dará provisión
  alternatives_spanish:
  - se dará apoyo
  - se hará provisión
  - se asignará una provisión
  lexicon: LSJ
  rationale: σύνταξις aquí apunta a una asignación o provisión oficial; δίδοσθαι marca la idea de ser entregada. «Se dará provisión» conserva la función administrativa sin especificar más de lo que el griego exige.
- source_word: τούτοις τοῖς ἀνθρώποις
  english_pob_choice: these men
  chosen_spanish: a estos hombres
  alternatives_spanish:
  - a estas personas
  - a estos hombres y funcionarios
  lexicon: LSJ
  rationale: El griego usa masculino plural y probablemente refiere al personal/autoridades judías vinculadas al templo. «Estos hombres» respeta la forma gramatical y la referencia masculina del original.
- source_word: εἰς θυσίαν τῷ κυρίῳ
  english_pob_choice: for sacrifice to the Lord
  chosen_spanish: para sacrificio al Señor
  alternatives_spanish:
  - para un sacrificio al Señor
  - para ofrenda al Señor
  lexicon: LSJ
  rationale: La finalidad es sacrificial. En este pasaje, el español «Señor» representa de manera natural y reverente al κύριος del texto griego, sin enmascarar la referencia cultual.
- source_word: Ζοροβάβελ ἐπάρχῳ
  english_pob_choice: to Zerubbabel the governor
  chosen_spanish: a Zorobabel, el gobernador
  alternatives_spanish:
  - para Zorobabel, el gobernador
  - Zorobabel, el gobernador
  lexicon: LSJ
  rationale: La construcción dativa/complementaria es comprimida en griego y puede señalar al funcionario asociado con la administración de la provisión. La puntuación con comas mantiene esa relación y la apposición.
- source_word: ταύρους καὶ κριοὺς καὶ ἄρνας
  english_pob_choice: bulls and rams and lambs
  chosen_spanish: toros, carneros y corderos
  alternatives_spanish:
  - bueyes, carneros y corderos
  - toros y carneros y corderos
  lexicon: LSJ
  rationale: Son animales para sacrificio, enumerados individualmente. «Toros» rinde ταύρους en un registro claro; «carneros» y «corderos» conservan la secuencia sacrificial y la gradación natural en español.
theological_decisions:
- issue: Renderización de κύριος en contexto sacrificial del judaísmo del período persa/helénico
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - el Señor
  - Yahvé
  rationale: El texto griego dice κυρίῳ. En este contexto, «Señor» es la forma española reverente y directa, sin imponer una máscara tipográfica distinta ni añadir una identificación explícita con el Tetragrámaton que el griego aquí no formula.
  doctrine_reference: 'DOCTRINE.md contested terms: κύριος → Lord / Señor'
- issue: Interpretación del dativo con Ζοροβάβελ ἐπάρχῳ
  english_pob_reading: to Zerubbabel the governor
  chosen_spanish_reading: a Zorobabel, el gobernador
  alternative_spanish_readings:
  - para Zorobabel, el gobernador
  - Zorobabel, el gobernador
  rationale: La sintaxis griega es compacta y puede leerse como destinatario/administrador de la provisión o como identificación apposicional. La versión española conserva esa tensión con una formulación simple y puntuación appositiva.
  doctrine_reference: POB revision note on compressed syntax / alternative reading
- issue: Referencia étnico-administrativa a los receptores de la provisión
  english_pob_reading: these men
  chosen_spanish_reading: estos hombres
  alternative_spanish_readings:
  - estas personas
  rationale: Se conserva el masculino plural del griego, que en contexto apunta a dirigentes o personal del templo. No se neutraliza el género donde el original es explícitamente masculino.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB en inglés, que eliminó el guion largo y restableció una apposición sencilla con comas para reflejar mejor la sintaxis griega. La traducción española conserva esa estructura y mantiene «provisión» para σύνταξις, junto con el matiz de «cuidadosamente» para ἐπιμελῶς.
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κυρίῳ de acuerdo con el criterio del POB, sin sustituirlo por una convención tipográfica de mayúsculas.
  - Se usó «Zorobabel» como forma española habitual del nombre propio.
  - Se preservó la secuencia enumerativa de los animales sacrificiales sin añadir conectores interpretativos.
  - La frase «se dará provisión» busca equilibrar el sentido administrativo de σύνταξις con una formulación natural en español.
  - Los marcadores de nota se colocaron solo donde había una verdadera alternativa o aclaración necesaria.
