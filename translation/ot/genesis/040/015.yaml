id: GEN.40.15
reference: Genesis 40:15
source:
  edition: WLC
  text: כִּֽי גֻנֹּ֣ב גֻּנַּ֔בְתִּי מֵ/אֶ֖רֶץ הָ/עִבְרִ֑ים וְ/גַם פֹּה֙ לֹא עָשִׂ֣יתִֽי מְא֔וּמָה כִּֽי שָׂמ֥וּ אֹתִ֖/י בַּ/בּֽוֹר־־־־׃
translation:
  text: For I was indeed kidnapped from the land of the Hebrews[b][a], and even here I have done nothing that they should put me in the pit.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'I was surely stolen' or 'I was stolen away.' The Hebrew uses an infinitive absolute with the finite verb for emphasis.
    reason: lexical_alternative
  - marker: b
    text: '''Pit'' can refer to a dungeon or prison cell in context.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Indeed
  - Because
  lexicon: HALOT
  rationale: Introduces Joseph's explanation to the cupbearer. 'For' fits the causal/explanatory force in context.
- source_word: גֻנֹּב גֻּנַּבְתִּי
  chosen: I was indeed kidnapped
  alternatives:
  - I was surely stolen
  - I was stolen away
  lexicon: HALOT
  rationale: 'The infinitive absolute plus finite verb intensifies the passive idea: Joseph was forcibly taken. In English, ''kidnapped'' best conveys abduction of a person, more naturally than the literal ''stolen'' while preserving the sense.'
- source_word: מֵאֶרֶץ הָעִבְרִים
  chosen: from the land of the Hebrews
  alternatives:
  - out of the land of the Hebrews
  - from the Hebrews' land
  lexicon: HALOT
  rationale: A straightforward genitival phrase. 'Land of the Hebrews' preserves the ethnic designation עִבְרִים without overinterpreting a precise geopolitical entity.
- source_word: וְגַם פֹּה
  chosen: and even here
  alternatives:
  - and also here
  - and here too
  lexicon: HALOT
  rationale: 'Conveys additive emphasis: not only was Joseph abducted, but also in Egypt he is innocent.'
- source_word: לֹא עָשִׂיתִי מְאוּמָה
  chosen: I have done nothing
  alternatives:
  - I did nothing at all
  - I have not done anything
  lexicon: HALOT
  rationale: מְאוּמָה means 'anything'/'anything at all.' 'I have done nothing' is idiomatic and preserves the absolute denial.
- source_word: כִּי שָׂמוּ אֹתִי
  chosen: for them to put me
  alternatives:
  - that they should put me
  - that they put me
  lexicon: HALOT
  rationale: The clause explains the basis of Joseph's innocence relative to his imprisonment. English idiom is best served by 'for them to put me,' expressing lack of cause or justification.
- source_word: בַּבּוֹר
  lemma: בּוֹר
  chosen: in the pit
  alternatives:
  - in the dungeon
  - in the prison
  lexicon: HALOT
  rationale: בּוֹר literally means 'pit' or 'cistern.' In this narrative it refers to the prison holding place, but 'pit' preserves the Hebrew image and lexical continuity with Joseph's earlier confinement imagery.
