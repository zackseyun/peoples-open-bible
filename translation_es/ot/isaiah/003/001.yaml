review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo y del POB inglés: mantiene la conexión causal («Porque»), la señal de atención («he aquí»), el nombre divino «Yahvé», el título «de los Ejércitos», el participio con valor inminente/progresivo («está quitando») y la repetición enfática de «todo apoyo de…». Sin embargo, la nota [a] no corresponde a una alternativa significativa preservada en el POB inglés: el inglés usa [a] para la pareja hebrea מַשְׁעֵן וּמַשְׁעֵנָה («staff and stay»), mientras que el borrador español la desplazó a «he aquí». Además, el anclaje [b] está puesto sobre «sustento», pero su contenido explica la cláusula posterior «todo apoyo de pan y todo apoyo de agua», por lo que conviene moverlo al lugar pertinente.'
  spanish_quality_summary: La redacción es clara, digna y ampliamente legible en español eclesial contemporáneo. «Apoyo y sustento» funciona bien para la pareja retórica hebrea. El principal problema es de aparato crítico y anclaje de notas, no de fluidez del texto principal. También conviene normalizar «de los ejércitos» en minúscula por convención ortográfica española, salvo que el proyecto capitalice deliberadamente títulos divinos; aquí la minúscula es más natural y suficiente.
  glossary_alignment: 'Buena alineación general con el glosario del proyecto: יְהוָה -> «Yahvé» está correctamente preservado; הָאָדוֹן -> «el Señor» es adecuado como título distinto del nombre; צְבָאוֹת -> «de los ejércitos» conserva la fuerza marcial mejor que «de las huestes». No hay conflictos terminológicos mayores. La revisión propuesta restaura la nota léxica tradicional sobre מַשְׁעֵן וּמַשְׁעֵנָה y corrige la nota explicativa sobre el pan y el agua.'
  issues:
  - severity: medium
    issue: La nota [a] está asignada al elemento equivocado.
    rationale: En el POB inglés, la nota [a] preserva la alternativa tradicional «staff and stay» para מַשְׁעֵן וּמַשְׁעֵנָה. El borrador español la colocó sobre «he aquí», lo que rompe la trazabilidad del aparato y omite la alternativa léxica más relevante del versículo.
  - severity: medium
    issue: La nota [b] está anclada en «sustento», pero explica otra frase.
    rationale: El contenido de la nota [b] comenta «todo apoyo de pan y todo apoyo de agua», no «apoyo y sustento». Debe anclarse en la cláusula correspondiente para evitar confusión.
  - severity: low
    issue: Capitalización de «Ejércitos».
    rationale: En español general, «de los ejércitos» suele escribirse con minúscula dentro del título divino. No es error doctrinal, pero la minúscula mejora la naturalidad ortográfica.
  revised_spanish_text: Porque he aquí, el Señor, Yahvé de los ejércitos, está quitando de Jerusalén y de Judá apoyo y sustento[a], todo apoyo de pan y todo apoyo de agua[b].
  revised_footnotes:
  - marker: a
    text: O «bastón y sostén», una traducción tradicional de la pareja de términos hebreos para formas de apoyo o sustento.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «todo apoyo de pan y todo apoyo de agua»; es decir, toda provisión básica de alimento y bebida.'
    reason: lexical_alternative
  revision_rationale: 'El texto principal solo necesita una reparación menor: reubicar y corregir las notas para que reflejen fielmente el aparato del POB inglés y el lugar exacto del hebreo comentado. También se normaliza «ejércitos» en minúscula para mejor español editorial.'
