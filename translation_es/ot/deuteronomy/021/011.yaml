lexical_decisions:
- source_word: וְ/רָאִיתָ
  english_pob_choice: and you see
  chosen_spanish: y ves
  alternatives_spanish:
  - y miras y ves
  - y percibes
  lexicon: HALOT
  rationale: El hebreo expresa una acción directa en esta secuencia legal; en español, el presente 'ves' comunica bien la condición legal implícita en el contexto sin volverla innecesariamente perifrástica.
- source_word: בַּ/שִּׁבְיָה
  english_pob_choice: among the captives
  chosen_spanish: entre los cautivos
  alternatives_spanish:
  - entre los prisioneros de guerra
  - en el cautiverio
  lexicon: HALOT
  rationale: '''Cautivos'' reproduce el grupo de personas tomadas en guerra y ''entre'' conserva la relación locativa del hebreo sin introducir una frase más explicativa de lo que pide el texto.'
- source_word: אֵשֶׁת יְפַת תֹּאַר
  english_pob_choice: a woman beautiful in form
  chosen_spanish: una mujer hermosa de [a] aspecto
  alternatives_spanish:
  - una mujer hermosa en su forma
  - una mujer de bello aspecto
  lexicon: HALOT
  rationale: Se mantiene la fuerza física/visible del sintagma hebreo. 'De aspecto' preserva el matiz de תֹּאַר como apariencia externa, mientras 'hermosa' expresa el valor adjetival natural en español.
- source_word: תֹּאַר
  english_pob_choice: form
  chosen_spanish: aspecto
  alternatives_spanish:
  - forma
  - apariencia
  - figura
  lexicon: HALOT
  rationale: '''Aspecto'' comunica en español la idea de apariencia externa con claridad y naturalidad; evita la rigidez de ''forma'' y conserva la referencia al atractivo visible más que a una cualidad moral.'
- source_word: וְ/חָשַׁקְתָּ בָהּ
  english_pob_choice: and you desire her
  chosen_spanish: y la deseas
  alternatives_spanish:
  - y te sientes atraído por ella
  - y pones tu deseo en ella
  lexicon: HALOT
  rationale: '''Desear'' es el equivalente más directo y fuerte para חָשַׁק en este contexto. Mantiene la tensión ética del pasaje sin suavizarla a mera preferencia o atracción leve.'
- source_word: וְ/לָקַחְתָּ לְ/ךָ לְ/אִשָּׁה
  english_pob_choice: and take her for yourself as a wife
  chosen_spanish: y la tomas para ti como esposa
  alternatives_spanish:
  - y la tomas por esposa
  - y te la casas
  lexicon: HALOT
  rationale: La construcción idiomática se conserva sin traducirla por un equivalente demasiado interpretativo. 'Para ti como esposa' refleja el valor reflexivo de לְךָ y el uso legal de 'tomar' como fórmula de matrimonio.
theological_decisions:
- issue: No suavizar un escenario legal moralmente tenso ni añadir juicio explícito ausente del hebreo
  english_pob_reading: Retain the plain legal description of desire and taking as wife
  chosen_spanish_reading: Mantener la descripción legal directa de ver, desear y tomar como esposa
  alternative_spanish_readings:
  - hacer explícita coerción o aprobación
  - reformular como 'elegirla para esposa'
  rationale: El texto presenta un caso jurídico de guerra sin resolver su tensión moral. La traducción debe conservar esa franqueza y no suplir evaluaciones que el hebreo no formula.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no se requieren cambios adicionales respecto del texto hebreo ni del audit trail inglés; se conserva la lectura alta de acuerdo y la equivalencia óptima del pasaje.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, aunque este versículo no lo contiene.
  - Se evita 'casarte con ella' en el cuerpo para no perder el modismo hebreo de 'tomar para ti como esposa'.
  - Se conserva la tensión ética del texto sin añadir términos como 'forzar' o 'consentir', que no están explícitos en el hebreo.
