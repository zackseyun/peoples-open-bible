translation:
  language: es
  text: 'Hablaron contra Dios; dijeron[a]: “¿Puede Dios preparar una mesa en el desierto?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "hablaron acerca de Dios". La construcción hebrea puede traducirse de manera más neutral, pero aquí el contexto favorece el sentido adversativo, resaltando la queja de Israel contra él.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבְּרוּ
  english_pob_choice: They spoke
  chosen_spanish: Hablaban
  alternatives_spanish:
  - Hablaron
  - Hablaban diciendo
  lexicon: HALOT
  rationale: El verbo דבר en este contexto introduce la queja del pueblo. En español, el imperfecto narrativo "Hablaban" comunica el trasfondo repetido o sostenido de la protesta y suena natural en un salmo retrospectivo.
- source_word: בֵּאלֹהִים
  english_pob_choice: against God
  chosen_spanish: contra Dios
  alternatives_spanish:
  - acerca de Dios
  - a Dios
  lexicon: HALOT
  rationale: La preposición con דבר puede ser adversativa por el contexto. "Contra Dios" conserva la fuerza rebelde y acusatoria que el audit trail inglés señaló como decisiva.
- source_word: אָמְרוּ
  english_pob_choice: they said
  chosen_spanish: dijeron
  alternatives_spanish:
  - decían
  - diciendo
  lexicon: HALOT
  rationale: Es el verbo introductorio estándar del discurso directo. "Dijeron" mantiene la transición clara hacia la pregunta citada.
- source_word: הֲיוּכַל
  english_pob_choice: Can
  chosen_spanish: ¿Puede... ?
  alternatives_spanish:
  - ¿Sería capaz de... ?
  - ¿Podrá... ?
  lexicon: HALOT
  rationale: La forma interrogativa expresa capacidad. "¿Puede... ?" es la manera más directa y sobria de conservar el desafío implícito a la capacidad divina.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Poderoso
  - El
  lexicon: HALOT
  rationale: Aunque אֵל puede matizar poder, aquí funciona en paralelo con אֱלֹהִים como designación de Dios. "Dios" es la opción más clara y fiel para el lector español.
- source_word: לַעֲרֹךְ
  english_pob_choice: prepare
  chosen_spanish: preparar
  alternatives_spanish:
  - disponer
  - poner en orden
  lexicon: HALOT
  rationale: Con שֻׁלְחָן, ערך significa disponer o preparar una mesa. "Preparar" conserva el sentido de provisión sin sobreexplicar.
- source_word: שֻׁלְחָן
  english_pob_choice: a table
  chosen_spanish: una mesa
  alternatives_spanish:
  - un banquete
  - una comida
  lexicon: HALOT
  rationale: Se mantiene la imagen concreta de la mesa, como en el inglés POB, porque el texto presenta la provisión de manera figurada pero literal.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto silvestre
  - en el yermo
  lexicon: HALOT
  rationale: En español bíblico, "desierto" comunica bien el lugar de la peregrinación de Israel. Aunque "wilderness" puede ser más amplio, aquí el contraste de provisión en lugar inhóspito se entiende de forma natural con "desierto".
theological_decisions:
- issue: Tono de la protesta del pueblo hacia Dios
  english_pob_reading: Render בֵּאלֹהִים as 'against God' to show rebellious, accusatory speech.
  chosen_spanish_reading: contra Dios
  alternative_spanish_readings:
  - acerca de Dios
  - a Dios
  rationale: La escena no es una mención neutral, sino una queja incrédula. "Contra Dios" preserva la carga de rebelión señalada en el audit trail inglés y no atenúa la tensión teológica del pasaje.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: Se siguió el dictamen de alta concordancia del audit trail inglés; no hubo revisiones aplicadas en la última pasada y no se identificaron cambios necesarios para esta sección.
  spanish_consistency_notes:
  - Se mantuvo "Dios" para אֱלֹהִים/אֵל, en línea con los convenios del proyecto.
  - Se preservó la imagen concreta de "mesa" en lugar de generalizar a "comida" o "banquete".
  - Se optó por "desierto" como equivalente idiomático de מִדְבָּר en español bíblico-readable.
