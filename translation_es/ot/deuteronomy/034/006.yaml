review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: mantiene el sujeto implícito de וַיִּקְבֹּר, traduce בַגַּיְ como «en el valle», conserva «la tierra de Moab» y expresa correctamente מוּל con «frente a». También comunica adecuadamente la cláusula final «nadie conoce ... hasta el día de hoy». Sin embargo, hay dos desajustes con el expediente auditado: (1) la nota [b] está anclada a «Moab», pero su contenido trata de Bet-peor y además reemplaza indebidamente la nota inglesa sobre «no man/no one knows»; (2) «su sepulcro» es comprensible, pero «su lugar de sepultura» preserva mejor el valor contextual de קְבֻרָתוֹ como ubicación del entierro, no necesariamente una tumba identificable o construida.'
  spanish_quality_summary: El español es claro, natural y de registro digno. La sintaxis con punto y coma funciona, aunque una coma también bastaría. «Frente a Bet-peor» suena natural. La principal reparación necesaria es de notas y un leve ajuste léxico para mayor precisión contextual.
  glossary_alignment: No aparecen términos del glosario mayor salvo Yahvé en nota, usado correctamente. La transliteración «Bet-peor» es adecuada. El mantenimiento del sujeto implícito concuerda con la decisión teológica documentada. El uso de «nadie» es aceptable según la revisión inglesa auditada.
  issues:
  - severity: high
    issue: La nota [b] está mal ubicada y no corresponde al contenido auditado.
    rationale: En el texto, [b] está anclada a «Bet-peor», pero la nota inglesa b documenta una alternativa para וְלֹא יָדַע אִישׁ («no one knows / no man knows»), no una explicación etimológica de Bet-peor. Esto altera el rastro de auditoría y crea una nota ajena al expediente.
  - severity: medium
    issue: «Su sepulcro» puede estrechar demasiado el sentido de קְבֻרָתוֹ.
    rationale: El hebreo apunta al lugar del entierro («his burial place» en el POB inglés). «Sepulcro» en español puede sugerir tumba/monumento o recinto funerario concreto. «Lugar de sepultura» conserva mejor la referencia locativa sin sobreespecificar.
  - severity: low
    issue: La nota sobre el sujeto implícito está anclada a «Moab», no al verbo pertinente.
    rationale: Aunque el contenido de la nota [a] es correcto, su anclaje ideal debería aparecer en «lo enterró», ya que allí surge la ambigüedad. Esto mejora la legibilidad y la precisión editorial.
  revised_spanish_text: Y lo enterró[a] en el valle, en la tierra de Moab, frente a Bet-peor; y nadie[b] conoce su lugar de sepultura hasta el día de hoy.
  revised_footnotes:
  - marker: a
    text: El sujeto de «lo enterró» no se nombra en este versículo; el contexto inmediato apunta a Yahvé.
    reason: alternative_reading
  - marker: b
    text: O «ningún hombre conoce». El hebreo dice literalmente «no ha conocido un hombre».
    reason: lexical_alternative
  revision_rationale: 'Se corrigen las notas para alinearlas con el expediente inglés y con los puntos reales de ambigüedad del hebreo: la nota [a] se ancla al verbo de sujeto implícito, y la nota [b] pasa a documentar la alternativa literal de אִישׁ genérico. Además, «su lugar de sepultura» refleja mejor קְבֻרָתוֹ como ubicación del entierro que «su sepulcro».'
