translation:
  language: es
  text: Abram tomó a Sarai, su esposa, y a Lot, hijo de su hermano, y todos sus bienes que habían adquirido, y las personas[a] que habían adquirido en Harán; y salieron para ir a la tierra de Canaán, y llegaron a la tierra de Canaán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las personas que habían adquirido»; o, de forma más literal, «las almas que habían hecho» en Harán. El modismo hebreo probablemente se refiere a miembros de la casa reunidos u obtenidos allí.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - llevó
  - tomó consigo
  lexicon: HALOT
  rationale: לקח en narración de viaje expresa el acto de tomar consigo; en español, 'tomó' comunica el movimiento sin sobrecargar con una paráfrasis.
- source_word: אִשְׁתּוֹ
  english_pob_choice: his wife
  chosen_spanish: su esposa
  alternatives_spanish:
  - su mujer
  lexicon: HALOT
  rationale: En contexto matrimonial, אשה con sufijo posesivo significa 'esposa'. 'Esposa' es claro y digno en español.
- source_word: בֶּן אָחִיו
  english_pob_choice: his brother’s son
  chosen_spanish: hijo de su hermano
  alternatives_spanish:
  - sobrino
  lexicon: HALOT
  rationale: La forma hebrea es literalmente 'hijo de su hermano'; se conserva esa relación de parentesco en lugar del equivalente idiomático 'sobrino' para no borrar la transparencia del hebreo.
- source_word: רְכוּשָׁם
  english_pob_choice: their possessions
  chosen_spanish: sus bienes
  alternatives_spanish:
  - sus posesiones
  - su propiedad
  lexicon: HALOT
  rationale: רכוש denota bienes/posesiones materiales. 'Bienes' es natural en español y abarca el sentido general sin estrecharlo.
- source_word: רָכָשׁוּ
  english_pob_choice: had acquired
  chosen_spanish: habían adquirido
  alternatives_spanish:
  - habían ganado
  - habían reunido
  lexicon: HALOT
  rationale: El verbo señala obtención o adquisición de bienes. 'Habían adquirido' mantiene el paralelo con el sustantivo 'bienes'.
- source_word: הַנֶּפֶשׁ אֲשֶׁר עָשׂוּ
  english_pob_choice: the people whom they had acquired
  chosen_spanish: las personas que habían adquirido
  alternatives_spanish:
  - los seres que habían adquirido
  - las almas que habían hecho
  lexicon: HALOT
  rationale: נפש aquí refiere a personas, no a 'alma' en sentido antropológico abstracto. 'Las personas que habían adquirido' preserva la tensión idiomática sin sugerir creación literal.
- source_word: בְחָרָן
  english_pob_choice: in Haran
  chosen_spanish: en Harán
  alternatives_spanish:
  - en Jarán
  lexicon: HALOT
  rationale: Topónimo transliterado de forma estable al español bíblico como 'Harán'.
- source_word: וַיֵּצְאוּ לָלֶכֶת
  english_pob_choice: they set out to go
  chosen_spanish: salieron para ir
  alternatives_spanish:
  - partieron para ir
  - salieron con intención de ir
  lexicon: HALOT
  rationale: La secuencia verbal hebrea expresa salida con propósito. 'Salieron para ir' conserva la construcción y el sentido direccional sin forzar una frase más interpretativa.
- source_word: אַרְצָה כְּנַעַן
  english_pob_choice: to the land of Canaan
  chosen_spanish: a la tierra de Canaán
  alternatives_spanish:
  - hacia la tierra de Canaán
  - a Canaán
  lexicon: HALOT
  rationale: El sufijo direccional -ה está mejor reflejado por 'a la tierra de Canaán'. Se conserva 'tierra' porque el hebreo repite el sustantivo הארץ.
- source_word: וַיָּבֹאוּ אַרְצָה כְּנָעַן
  english_pob_choice: they came to the land of Canaan
  chosen_spanish: llegaron a la tierra de Canaán
  alternatives_spanish:
  - vinieron a la tierra de Canaán
  - entraron en la tierra de Canaán
  lexicon: HALOT
  rationale: בוא en este contexto indica llegada. 'Llegaron' reproduce bien la progresión narrativa y la repetición enfática del destino.
theological_decisions:
- issue: ¿Cómo traducir הַנֶּפֶשׁ אֲשֶׁר עָשׂוּ en una forma que respete el hebreo sin imponer una lectura doctrinal ajena?
  english_pob_reading: the people whom they had acquired
  chosen_spanish_reading: las personas que habían adquirido
  alternative_spanish_readings:
  - las almas que habían hecho
  - las personas que habían reunido
  rationale: El hebreo usa נפש en sentido de personas/vidas dentro de un idiomático difícil. Se evita 'almas' como equivalente principal porque en español puede sonar doctrinalmente cargado o demasiado abstracto; sin embargo, se mantiene la idea de 'adquirir' para no diluir la tensión del texto.
  doctrine_reference: Antropología bíblica; uso idiomático de נפש en narrativa patriarcal.
translation_notes:
  revision_awareness: Se siguió la lectura revisada del audit trail inglés que mantiene 'the people whom they had acquired' y 'set out to go to the land of Canaan'. La versión española evita calcar torpemente el hebreo, pero preserva la repetición final de 'a la tierra de Canaán' y la tensión léxica de 'adquirieron' para רכוש / רכש / נפש.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como nombre divino por consistencia POB general, pero este versículo no lo contiene.
  - Se eligió 'hijo de su hermano' en vez de 'sobrino' para mantener la transparencia del parentesco hebreo.
  - Se mantuvo la repetición de 'la tierra de Canaán' en ambas cláusulas finales, como en el hebreo, para conservar el énfasis narrativo.
