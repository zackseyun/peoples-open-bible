translation:
  language: es
  text: 'Pero los hijos[a] se rebelaron contra mí. No anduvieron en mis estatutos, ni guardaron mis juicios para practicarlos: los juicios que, si un hombre[b] los hace, vivirá por ellos. Profanaron mis sábados. Entonces dije que derramaría mi furor sobre ellos, para agotar mi ira contra ellos en el desierto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las generaciones siguientes'. El hebreo dice literalmente 'los hijos', con sentido colectivo.
    reason: lexical_alternative
  - marker: b
    text: O 'si una persona los hace, vivirá por ellos'. El hebreo 'el hombre' es un singular genérico para un ser humano. Esta cláusula recuerda Levítico 18:5.
    reason: lexical_alternative_and_cross_reference
lexical_decisions:
- source_word: וַיַּמְרוּ בִי
  english_pob_choice: rebelled against me
  chosen_spanish: se rebelaron contra mí
  alternatives_spanish:
  - fueron rebeldes contra mí
  - se alzaron contra mí
  lexicon: HALOT
  rationale: מרה con ב expresa rebelión dirigida contra la persona mencionada. 'Se rebelaron contra mí' conserva el peso pactual y suena natural en español.
- source_word: הַבָּנִים
  english_pob_choice: the children
  chosen_spanish: los hijos
  alternatives_spanish:
  - los niños
  - la descendencia
  lexicon: HALOT
  rationale: En este contexto contrasta a la generación posterior de Israel; 'los hijos' mantiene el vínculo con la familia/pueblo y el matiz colectivo más que 'niños'.
- source_word: בְּחֻקּוֹתַי לֹא הָלָכוּ
  english_pob_choice: did not walk in my statutes
  chosen_spanish: No anduvieron en mis estatutos
  alternatives_spanish:
  - No siguieron mis estatutos
  - No caminaron en mis estatutos
  lexicon: HALOT
  rationale: Se conserva el modismo bíblico 'andar en' porque es claro en español y refleja la imagen de conducta habitual.
- source_word: מִשְׁפָּטַי
  english_pob_choice: my judgments
  chosen_spanish: mis decretos
  alternatives_spanish:
  - mis juicios
  - mis ordenanzas
  lexicon: HALOT
  rationale: Aquí מִשְׁפָּטִים tiene fuerza normativa/jurídica. 'Decretos' comunica bien la idea de disposiciones establecidas para obedecer, evitando un 'juicios' que en español puede sonar más a sentencia abstracta.
- source_word: לֹא שָׁמְרוּ לַעֲשׂוֹת אוֹתָם
  english_pob_choice: they did not keep my judgments to do them
  chosen_spanish: ni guardaron mis decretos para ponerlos por obra
  alternatives_spanish:
  - ni los guardaron para hacerlos
  - ni los observaron para practicarlos
  lexicon: HALOT
  rationale: שׁמר + infinitivo de עשׂה pide conservar la doble idea de guardar y ejecutar. 'Ponerlos por obra' preserva bien el aspecto práctico del hebreo.
- source_word: אֲשֶׁר יַעֲשֶׂה אוֹתָם הָאָדָם וָחַי בָּהֶם
  english_pob_choice: the judgments that, if a man does them, he will live by them
  chosen_spanish: los decretos que, si un hombre los hace, por ellos vivirá
  alternatives_spanish:
  - los decretos que, si una persona los hace, vivirá por ellos
  - los decretos que quien los haga vivirá por ellos
  lexicon: HALOT
  rationale: Se conserva el singular genérico הָאָדָם como 'un hombre', en línea con la política de fidelidad morfológica del proyecto. 'Por ellos vivirá' reproduce la preposición hebrea y la fórmula bíblica de vida vinculada a obediencia.
- source_word: אֶת שַׁבְּתוֹתַי חִלֵּלוּ
  english_pob_choice: They profaned my Sabbaths
  chosen_spanish: Profanaron mis sábados
  alternatives_spanish:
  - Profanaron mis días de reposo
  - Desecraron mis sábados
  lexicon: HALOT
  rationale: חִלֵּל expresa profanar/desecrar lo sagrado. 'Sábados' conserva la forma tradicional del plural hebreo, entendible en español y ligada a las prescripciones cultuales.
- source_word: וָאֹמַר לִשְׁפֹּךְ חֲמָתִי עֲלֵיהֶם
  english_pob_choice: So I said I would pour out my wrath on them
  chosen_spanish: Entonces dije que derramaría mi furor sobre ellos
  alternatives_spanish:
  - Y dije que derramaría mi ira sobre ellos
  - 'Entonces dije: Derramaré mi furia sobre ellos'
  lexicon: HALOT
  rationale: חֵמָה admite 'furor' o 'ira'; 'furor' mantiene el tono ardiente de la imagen de derramamiento y evita suavizar el término.
- source_word: לְכַלּוֹת אַפִּי בָּם
  english_pob_choice: to exhaust my anger against them
  chosen_spanish: para consumir mi ira contra ellos
  alternatives_spanish:
  - para agotar mi ira contra ellos
  - para acabar mi ira contra ellos
  lexicon: HALOT
  rationale: כּלה con אַף implica llevar la ira a su plena consumación. 'Consumir mi ira' preserva el carácter intensivo y funciona con naturalidad en español.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto árido
  - en el yermo
  lexicon: HALOT
  rationale: En español bíblico 'desierto' es la opción más transparente para el contexto del éxodo, aunque 'wilderness' pudiera equivaler a 'desierto' o 'región silvestre'.
theological_decisions:
- issue: Singular genérico en הָאָדָם
  english_pob_reading: a man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - una persona
  - alguien
  rationale: El hebreo usa un singular genérico. Se mantiene 'un hombre' para respetar la forma fuente y la observación del audit trail, sin negar que el sentido sea genérico.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4; contested forms on generic singulars'
- issue: Tensión entre justicia pactal y vida por obediencia
  english_pob_reading: the judgments that, if a man does them, he will live by them
  chosen_spanish_reading: los decretos que, si un hombre los hace, por ellos vivirá
  alternative_spanish_readings:
  - los decretos que, si un hombre los cumple, vivirá por ellos
  - los decretos que, si una persona los hace, por ellos vivirá
  rationale: Se conserva la conexión con Levítico 18:5 y la formulación de vida vinculada a la obediencia, sin suavizarla a una paráfrasis moral general.
  doctrine_reference: Levítico 18:5; Ezequiel 20:11, 13, 21
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la última revisión inglesa del POB: mantiene ''to do them'' como ''para ponerlos por obra'' y ''exhaust my anger'' como ''consumir mi ira'', a la vez que adapta con naturalidad el registro bíblico al español.'
  spanish_consistency_notes:
  - Se conserva un tono bíblico contemporáneo sin arcaísmo excesivo.
  - '''Hijos'' / ''hombre'' mantienen el singular o colectivo del hebreo donde el audit trail lo señaló.'
  - '''Profanaron mis sábados'' conserva el lenguaje cultual de la fuente.'
  - Se evita sustituir 'furor/ira' por un término más débil como 'enojo'.
