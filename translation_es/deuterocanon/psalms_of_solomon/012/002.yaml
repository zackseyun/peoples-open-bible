translation:
  language: es
  text: Las palabras de la lengua de un hombre malvado están llenas de giros torcidos[a]; su belleza[b] es como un fuego que se enciende entre un pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en variedad de giros' o 'en variedad de vuelta'; el griego describe un habla marcada por cambios y vueltas retorcidas.
    reason: lexical_alternative
  - marker: b
    text: O 'encanto'; el término griego también puede señalar un atractivo que seduce, no solo belleza en sentido físico.
    reason: lexical_alternative
lexical_decisions:
- source_word: ποικιλίᾳ
  english_pob_choice: with twisted turns / full of twisted turns
  chosen_spanish: con giros torcidos
  alternatives_spanish:
  - en variedad de giros
  - con vueltas diversas
  - lleno de giros torcidos
  lexicon: LSJ
  rationale: El dativo con ἐν indica la cualidad de la expresión. En español, 'con giros torcidos' conserva la idea de multiplicidad y movimiento retorcido sin volver la frase demasiado abstracta o pesada.
- source_word: στροφῆς
  english_pob_choice: twisted turns
  chosen_spanish: giros torcidos
  alternatives_spanish:
  - vueltas torcidas
  - giros evasivos
  - torcimientos
  lexicon: LSJ
  rationale: στροφή sugiere giro o vuelta, y en contexto una forma de hablar desviada o engañosa. 'Giros torcidos' mantiene la imagen del giro y comunica la connotación moral negativa.
- source_word: οἱ λόγοι τῆς γλώσσης
  english_pob_choice: the words of the tongue
  chosen_spanish: las palabras de la lengua
  alternatives_spanish:
  - las palabras de la boca
  - el hablar de la lengua
  - las palabras de su lengua
  lexicon: LSJ
  rationale: Se conserva la concreción de 'lengua' y 'palabras' sin reducirlo a un abstracto como 'discurso'. 'Lengua' suena natural en español y refleja el cuerpo-metáfora del griego.
- source_word: ἀνδρὸς πονηροῦ
  english_pob_choice: of an evil man
  chosen_spanish: de un hombre malvado
  alternatives_spanish:
  - de un hombre impío
  - de un hombre perverso
  - de un hombre malo
  lexicon: LSJ
  rationale: πονηρός aquí es moral, no solo dañino. 'Malvado' transmite mejor esa fuerza moral que 'malo', y preserva la singularidad masculina del griego.
- source_word: καλλονὴ
  english_pob_choice: beauty
  chosen_spanish: belleza
  alternatives_spanish:
  - hermosura
  - atractivo
  - encanto
  lexicon: LSJ
  rationale: La revisión inglesa corrigió 'charm' por 'beauty' para acercarse a καλλονή. En español, 'belleza' es el equivalente más directo y evita una suavización interpretativa.
- source_word: πῦρ ἀνάπτον
  english_pob_choice: a fire kindling
  chosen_spanish: un fuego que se enciende
  alternatives_spanish:
  - un fuego que prende
  - un fuego encendido
  - un fuego que va ardiendo
  lexicon: LSJ
  rationale: El participio presente activo expresa un fuego en proceso de prender, no ya terminado. 'Que se enciende' respeta ese valor progresivo y fluye bien en español.
- source_word: ἐν λαῷ
  english_pob_choice: among a people
  chosen_spanish: entre un pueblo
  alternatives_spanish:
  - entre la gente
  - en medio de un pueblo
  - entre un pueblo de personas
  lexicon: LSJ
  rationale: Aunque el inglés mantiene 'among a people', en español 'entre un pueblo' expresa mejor el sentido colectivo sin forzar una construcción extraña. Conserva la imagen de propagación social del fuego.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audio-trail: evita expandir el sentido de ποικιλίᾳ a ''lleno de'', conserva la relación concreta de ''lengua'' con ''palabras'', y refleja la corrección de καλλονή como ''belleza'' en vez de ''encanto''. También mantiene el aspecto presente de ἀνάπτον con una forma verbal progresiva en español.'
  spanish_consistency_notes:
  - Se usa 'lengua' de manera concreta para no desmaterializar la metáfora.
  - Se elige 'malvado' para mantener la fuerza moral de πονηροῦ.
  - '''Fuego que se enciende'' preserva el proceso activo indicado por el participio presente.'
  - No se introduce terminología cristiana tradicional que no esté en el griego del pasaje.
