translation:
  language: es
  text: Y tú, hijo de hombre, toma para ti una espada afilada; tómala como una navaja de barbero, y pásala sobre tu cabeza y sobre tu barba. Luego toma para ti balanzas para pesar, y haz divisiones[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La última cláusula representa un verbo hebreo con objeto plural implícito, referido a lo que fue cortado al afeitarse; el texto no añade explícitamente 'cabellos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - mortal
  - ser humano
  lexicon: HALOT
  rationale: Conserva el giro profético fijo de Ezequiel y traduce de manera literal y reconocible el hebreo idiomático. 'Hijo de hombre' es la forma española más transparente para este llamamiento repetido.
- source_word: חֶרֶב חַדָּה
  english_pob_choice: a sharp sword
  chosen_spanish: una espada afilada
  alternatives_spanish:
  - una espada aguda
  - una espada afilada y bien cortante
  lexicon: HALOT
  rationale: '''Afilada'' comunica de forma natural la cualidad de חַדָּה sin perder la imagen concreta de una espada preparada para cortar.'
- source_word: תַּעַר הַגַּלָּבִים
  english_pob_choice: a barber’s razor
  chosen_spanish: una navaja de barbero
  alternatives_spanish:
  - una navaja de los barberos
  - una rasuradora de barbero
  lexicon: HALOT
  rationale: 'La frase constructa indica función comparativa: la espada debe servir como herramienta de rasurado. ''Navaja de barbero'' es la opción española más natural y conserva la referencia funcional sin volverla explicativa en exceso.'
- source_word: תִּקָּחֶנָּה לָּךְ
  english_pob_choice: take it for yourself
  chosen_spanish: tómala
  alternatives_spanish:
  - tómala para ti
  - tómala para tu uso
  lexicon: HALOT
  rationale: El hebreo repite 'tomar' en contexto de acción, no solo de posesión. En español, 'tómala' mantiene la fuerza imperativa y la conexión con el verbo repetido; el sentido de uso se sobreentiende por el contexto inmediato.
- source_word: וְהַעֲבַרְתָּ עַל רֹאשְׁךָ וְעַל זְקָנֶךָ
  english_pob_choice: and pass it over your head and over your beard
  chosen_spanish: y pásala sobre tu cabeza y sobre tu barba
  alternatives_spanish:
  - y pásala por encima de tu cabeza y de tu barba
  - y hazla pasar sobre tu cabeza y sobre tu barba
  lexicon: HALOT
  rationale: El verbo hifil de עבר con עַל describe el movimiento de pasar la herramienta sobre la superficie. 'Pásala sobre' reproduce bien la imagen en español y evita añadir una explicación ajena al texto.
- source_word: מֹאזְנֵי מִשְׁקָל
  english_pob_choice: scales for weighing
  chosen_spanish: balanzas para pesar
  alternatives_spanish:
  - balanzas de pesaje
  - pesas y balanzas
  lexicon: HALOT
  rationale: La POB inglesa deja abierta la imagen de balanzas/scales. 'Balanzas para pesar' es el equivalente español claro y conserva la función concreta del instrumento. En español, 'balanzas' puede abarcar el sentido práctico de 'scales' sin volverlo técnico de más.
- source_word: וְחִלַּקְתָּם
  english_pob_choice: divide them
  chosen_spanish: divídelos
  alternatives_spanish:
  - repártelos
  - divídelos en partes
  lexicon: HALOT
  rationale: El sufijo plural remite a los cabellos/sobras implicados por el contexto, pero el hebreo no explicita el objeto nominal. 'Divídelos' preserva esa referencia implícita sin introducir 'cabellos' en el texto principal.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del inglés POB: se reflejó el imperativo repetido con ''toma/tómala'', se expresó el movimiento de ''pasar'' sobre la cabeza y la barba, y se evitó añadir un sustantivo explícito para el objeto de ''dividirlos'', respetando el plural implícito del hebreo.'
  spanish_consistency_notes:
  - Se mantuvo 'hijo de hombre' para el vocativo profético de Ezequiel, en coherencia con el valor idiomático del hebreo.
  - Se usó 'balanzas' en lugar de términos eclesiásticos o técnicos innecesarios para conservar la concreción del instrumento de pesaje.
  - Se evitó 'SEÑOR' u otra sustitución reverencial porque no aparece aquí el Tetragrámaton ni un caso de κύριος griego.
  - La secuencia verbal en español sigue de cerca la sintaxis hebrea sin forzar un calco antinatural.
