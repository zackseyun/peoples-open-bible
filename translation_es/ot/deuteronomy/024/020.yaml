  to: Cuando golpees tu olivo, no lo repasarás[a]; será para el forastero[b], para el huérfano[c] y para la viuda.
  rationale: Se revisa la prohibición agrícola a una expresión más natural en español («no lo repasarás»), se ajusta גֵּר a «forastero» para conservar mejor el matiz legal-social del hebreo y del inglés auditado, y se corrigen las notas, especialmente la alternativa de יָתוֹם y el anclaje de la nota léxica principal.
