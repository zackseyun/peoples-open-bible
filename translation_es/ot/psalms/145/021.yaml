translation:
  language: es
  text: Mi boca hablará la alabanza de Yahvé, y toda carne[a] bendecirá su santo nombre para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todas las personas» o «todo ser viviente»; el hebreo dice «toda carne», una expresión poética para todos los seres mortales.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּהִלַּת
  english_pob_choice: the praise of
  chosen_spanish: la alabanza de
  alternatives_spanish:
  - la alabanza
  - la gloria de
  - el elogio de
  lexicon: HALOT
  rationale: El constructo hebreo expresa alabanza perteneciente a Yahvé o dirigida a él. «La alabanza de» conserva la relación constructiva, pero en español «alabanza» funciona con mayor naturalidad que un calco más rígido.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del texto hebreo, conforme al estándar del proyecto en español. «Yahvé» evita la sustitución por un título y conserva el nombre propio del pacto.
- source_word: יְדַבֶּר
  english_pob_choice: will speak
  chosen_spanish: hablará
  alternatives_spanish:
  - dirá
  - declarará
  - hablará
  lexicon: HALOT
  rationale: El imperfecto en contexto poético expresa una acción futura o comprometida. «Hablará» transmite bien ese valor sin sobrecargar el verso.
- source_word: פִּי
  english_pob_choice: My mouth
  chosen_spanish: Mi boca
  alternatives_spanish:
  - mis labios
  - yo
  lexicon: HALOT
  rationale: Se conserva la imagen concreta del hebreo. «Mi boca» refleja con fidelidad el sustantivo con sufijo de primera persona.
- source_word: וִיבָרֵךְ
  english_pob_choice: will bless
  chosen_spanish: bendecirá
  alternatives_spanish:
  - alabará
  - bendecirá
  - glorificará
  lexicon: HALOT
  rationale: En este contexto, ברך aplicado a Dios comunica bendición como acto de alabanza. «Bendecirá» reproduce el sentido estándar del verbo y mantiene el paralelismo con el inglés auditado.
- source_word: כָּל בָּשָׂר
  english_pob_choice: all flesh
  chosen_spanish: toda carne
  alternatives_spanish:
  - toda humanidad
  - todas las personas
  - todo ser viviente
  lexicon: HALOT
  rationale: Se conserva la expresión idiomática literal del hebreo, que en poesía abarca a todos los seres humanos mortales. «Toda carne» mantiene la fuerza universal y la imagen corporal del original.
- source_word: שֵׁם קָדְשׁוֹ
  english_pob_choice: his holy name
  chosen_spanish: su santo nombre
  alternatives_spanish:
  - su nombre santo
  - su nombre sagrado
  lexicon: HALOT
  rationale: La colocación hebrea es una expresión teológica estable para el nombre revelado de Dios. «Su santo nombre» es la forma más natural en español y conserva el matiz de santidad/reverencia.
- source_word: לְעוֹלָם וָעֶד
  english_pob_choice: forever and ever
  chosen_spanish: por siempre y para siempre
  alternatives_spanish:
  - para siempre
  - eternamente
  - por los siglos de los siglos
  lexicon: HALOT
  rationale: La fórmula intensiva hebrea exige una expresión duplicada. «Por siempre y para siempre» reproduce la acumulación enfática sin recurrir a una fórmula eclesiástica menos transparente.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. En español se adopta «Yahvé» para preservar el nombre personal de Dios y evitar la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Scope of כָּל בָּשָׂר
  english_pob_reading: all flesh
  chosen_spanish_reading: toda carne
  alternative_spanish_readings:
  - toda humanidad
  - todas las personas
  - todo ser viviente
  rationale: La expresión hebrea es deliberadamente amplia y poética. «Toda carne» retiene la tensión entre literalidad e inclusión universal sin reducirla de antemano a una sola paráfrasis.
  doctrine_reference: Psalmic poetic idiom; lexical note in English POB audit trail
translation_notes:
  revision_awareness: 'El pasaje presenta alto acuerdo entre el texto fuente y el recorrido auditado en inglés; no se registraron revisiones aplicadas en la pasada más reciente. La versión española sigue de cerca las decisiones léxicas consolidadas: nombre divino, paralelismo verbal futuro, y conservación del modismo «toda carne» con nota aclaratoria.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de manera consistente con la norma del proyecto para el Tetragrámaton.
  - Se preservó la expresión poética «toda carne» y se añadió nota para evitar una lectura demasiado restrictiva o demasiado literal sin explicación.
  - Se usó «por siempre y para siempre» para reproducir el énfasis duplicado de לְעוֹלָם וָעֶד.
  - Se evitó «SEÑOR» como sustituto del nombre divino, conforme a la política del proyecto.
