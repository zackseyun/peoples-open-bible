translation:
  language: es
  text: Te alabaré[a], Señor, mi Dios, con todo mi corazón, y glorificaré tu nombre para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘Te daré gracias’; el verbo hebreo puede expresar tanto agradecimiento como alabanza en contextos de adoración.
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹדְךָ
  english_pob_choice: I will praise you
  chosen_spanish: Te alabaré
  alternatives_spanish:
  - Te daré gracias
  - Te confesaré
  lexicon: HALOT
  rationale: El verbo הודה en este contexto de oración y alabanza puede expresar tanto agradecimiento como alabanza. En español, "alabaré" comunica con naturalidad el sentido doxológico del versículo, manteniendo la tensión léxica indicada por el audit trail; por eso se conserva una nota alternativa para "daré gracias".
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - mi Señor
  - Soberano Señor
  lexicon: HALOT
  rationale: El título divino אֲדֹנָי se vierte de forma reverente y estándar como "Señor". En combinación con "mi Dios", el español suena natural sin perder la relación personal del vocativo.
- source_word: אֱלֹהַי
  english_pob_choice: my God
  chosen_spanish: mi Dios
  alternatives_spanish:
  - Dios mío
  lexicon: HALOT
  rationale: El sufijo posesivo de primera persona se conserva explícitamente con "mi Dios". Esta forma mantiene el paralelismo con "Señor" y evita añadir un giro más exclamativo que el hebreo no exige.
- source_word: בְּכָל לְבָבִי
  english_pob_choice: with all my heart
  chosen_spanish: con todo mi corazón
  alternatives_spanish:
  - con mi corazón entero
  - de todo corazón
  lexicon: HALOT
  rationale: La expresión hebrea señala entrega interior total. "Con todo mi corazón" es el equivalente español más idiomático y conserva la imagen del corazón como centro de la persona.
- source_word: וַאֲכַבְּדָה
  english_pob_choice: and I will glorify
  chosen_spanish: y glorificaré
  alternatives_spanish:
  - y honraré
  - y daré gloria a
  lexicon: HALOT
  rationale: El Piel de כבד, cuando el objeto es "tu nombre", expresa dar honra o glorificar. "Glorificaré" conserva el registro elevado y el paralelismo con la primera cláusula, sin debilitar el valor cultual del verbo.
- source_word: שִׁמְךָ
  english_pob_choice: your name
  chosen_spanish: tu nombre
  lexicon: HALOT
  rationale: Se conserva el sustantivo literalmente, porque en hebreo "nombre" funciona de manera metonímica para la reputación y carácter revelado de Dios. El español lo entiende bien sin necesidad de paráfrasis.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: '"Para siempre" comunica de forma clara y natural la idea de duración perpetua en español contemporáneo, manteniendo el tono votivo del versículo.'
theological_decisions:
- issue: Tensión entre "alabar" y "dar gracias" para אוֹדְךָ
  english_pob_reading: I will praise you; footnote allows 'I will thank you'
  chosen_spanish_reading: 'Te alabaré; nota alternativa: ''Te daré gracias'''
  alternative_spanish_readings:
  - Te daré gracias
  - Te confesaré
  rationale: El hebreo admite ambas lecturas en contexto de adoración. Como el versículo continúa con la glorificación del nombre divino, "alabaré" representa mejor la orientación litúrgica global, pero la nota preserva la alternativa de agradecimiento sin borrar la tensión.
  doctrine_reference: HALOT; uso cultual de ידה
- issue: Tratamiento del título divino doble אֲדֹנָי אֱלֹהַי
  english_pob_reading: Lord my God
  chosen_spanish_reading: Señor, mi Dios
  alternative_spanish_readings:
  - Señor mi Dios
  - Oh Señor, mi Dios
  rationale: 'El hebreo es un vocativo compuesto con dos títulos divinos y un sufijo posesivo. El español más natural y reverente es con coma vocativa: "Señor, mi Dios". Esto preserva la relación personal sin expandir indebidamente el texto.'
  doctrine_reference: Translate titles; preserve address structure
- issue: Sentido de כבד en relación con el nombre divino
  english_pob_reading: I will glorify your name
  chosen_spanish_reading: glorificaré tu nombre
  alternative_spanish_readings:
  - honraré tu nombre
  - daré gloria a tu nombre
  rationale: En contexto de adoración, כבד puede significar honrar o glorificar. "Glorificaré" refleja bien el registro de culto y la elevación semántica del objeto "tu nombre", sin perder la idea de honor.
  doctrine_reference: HALOT; semantic range of כבד
translation_notes:
  revision_awareness: El draft sigue de cerca el texto hebreo y el audit trail inglés, sin cambios de revisión aplicados. Se conserva la ambigüedad léxica principal de אוֹדְךָ mediante nota, y se mantiene la estructura paralela del versículo.
  spanish_consistency_notes:
  - Se usa "Señor" para אֲדֹנָי conforme al estilo POB, no "Yahvé", porque aquí el título hebreo es אֲדֹנָי y no el Tetragrámaton.
  - Se mantiene "tu nombre" literalmente para conservar la fuerza metonímica de שֵׁם.
  - '"Glorificaré" y "alabaré" sostienen un registro culto pero natural en español.'
  - La coma en "Señor, mi Dios" refleja mejor el vocativo doble del hebreo en español que una mera yuxtaposición.
