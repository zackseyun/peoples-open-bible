revisions:
- from: Pero contra cualquiera de los hijos de Israel[a], ni un perro aguzará su lengua, ni contra hombre ni contra animal; para que sepáis que Yahvé hace distinción entre Egipto e Israel.
  to: Pero contra cualquiera de los hijos de Israel[a], ni un perro aguzará su lengua, desde el hombre hasta la bestia, para que sepan que Yahvé hace distinción entre Egipto e Israel.
  rationale: Se corrige el merismo para reflejar fielmente «desde el hombre hasta la bestia» en vez de introducir una segunda idea de hostilidad con «contra». También se sustituye «sepáis» por «sepan» para ajustarse mejor al español neutral latinoamericano sin cambiar el sentido. Se conserva «aguzará su lengua» y la nota alternativa porque reproducen la decisión léxica documentada en la POB inglesa.
