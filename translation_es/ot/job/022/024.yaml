translation:
  language: es
  text: Y pon el oro en el polvo[a], y el oro de Ofir entre las piedras de los torrentes[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y coloca oro en el polvo». El hebreo puede referirse al oro o al metal precioso en bruto, no solo al oro refinado.
    reason: lexical_alternative
  - marker: b
    text: '«Torrentes» traduce el sentido de wadi: cauces o quebradas estacionales, a menudo secos fuera de la lluvia.'
    reason: cultural_note
  - marker: c
    text: Ofir es un lugar famoso en la Biblia por su oro fino; por eso el sentido es «el oro de Ofir».
    reason: cross_reference
lexical_decisions:
- source_word: וְשִׁית
  english_pob_choice: and lay
  chosen_spanish: y pon
  alternatives_spanish:
  - y coloca
  - y ponlo
  - y deposita
  lexicon: HALOT
  rationale: שׁית expresa poner, colocar o disponer. En español, «pon» conserva la fuerza imperativa y la brevedad poética del hebreo, con una secuencia coordinada natural.
- source_word: עַל
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - sobre
  - encima de
  lexicon: HALOT
  rationale: Aunque עַל suele ser «sobre», el contexto poético de arrojar tesoros al suelo hace que «en el polvo» comunique mejor la imagen de echarlo al suelo.
- source_word: עָפָר
  english_pob_choice: the dust
  chosen_spanish: el polvo
  alternatives_spanish:
  - el polvo de la tierra
  - la tierra suelta
  lexicon: HALOT
  rationale: עָפָר designa polvo o tierra suelta. «El polvo» preserva el valor concreto e imagístico sin añadir explicación innecesaria.
- source_word: בָּצֶר
  english_pob_choice: gold
  chosen_spanish: el oro
  alternatives_spanish:
  - el metal precioso
  - el mineral
  - el oro en bruto
  lexicon: HALOT
  rationale: En este contexto, בצר puede referirse a oro o metal precioso. Se eligió «oro» porque es la equivalencia más clara y natural para el paralelismo con Ofir, sin forzar una glosa técnica.
- source_word: וּבְצוּר
  english_pob_choice: among the stones
  chosen_spanish: entre las piedras
  alternatives_spanish:
  - en la roca
  - entre las rocas
  - sobre las peñas
  lexicon: HALOT
  rationale: צוּר es «roca», pero la construcción con «wadis» sugiere un entorno pedregoso de cauces secos. «Entre las piedras» reproduce la imagen de dispersión con naturalidad en español.
- source_word: נְחָלִים
  english_pob_choice: of the wadis
  chosen_spanish: de los torrentes
  alternatives_spanish:
  - de los wadi
  - de los cauces
  - de las quebradas
  lexicon: HALOT
  rationale: נחל suele designar un cauce estacional o torrente. «Torrentes» es un término comprensible y suficientemente cercano; se evita dejar el arabismo «wadi» en el texto principal.
- source_word: אוֹפִיר
  english_pob_choice: the gold of Ophir
  chosen_spanish: el oro de Ofir
  alternatives_spanish:
  - Ofir
  - el metal de Ofir
  lexicon: HALOT
  rationale: Ofir es un topónimo asociado con oro fino. La formulación «el oro de Ofir» mantiene el paralelismo poético y explicita el valor implícito del nombre como en el audit trail inglés.
theological_decisions:
- issue: Sentido exhortativo de la imagen sobre la riqueza
  english_pob_reading: The verse is rendered as a call to cast aside reliance on material wealth, not as an instruction to store treasure safely.
  chosen_spanish_reading: El verso se entiende como una exhortación a desechar la confianza en las riquezas materiales, no como una instrucción para guardar el tesoro con seguridad.
  alternative_spanish_readings:
  - Una instrucción para depositar el tesoro en un lugar natural seguro
  - Una descripción neutral de colocar oro en un terreno pedregoso
  rationale: El contexto inmediato hace que la imagen funcione como renuncia simbólica al tesoro terrenal. La traducción debe conservar esa tensión literaria y no convertirla en una sugerencia de resguardo.
  doctrine_reference: Translation philosophy §3; preservar la tensión contextual y la función retórica del poema
translation_notes:
  revision_awareness: La revisión inglesa más reciente eliminó el posesivo no atestiguado («your») y mantuvo la lectura de que el verso exhorta a desechar la riqueza. Esta versión española evita añadir posesivos y conserva el paralelismo poético con una glosa mínima solo donde el español necesita claridad contextual.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el nombre divino aparece explícitamente; aquí no corresponde.
  - Se evita «Cristo/Mesías» porque el verso no contiene lenguaje mesiánico.
  - «Oro» se usa para בצר siguiendo el audit trail, pero la nota mantiene abierta la alternativa de metal precioso o mineral.
  - «Torrentes» funciona como equivalente cercano de נְחָלִים y se explica en nota para lectores que no conozcan el trasfondo geográfico.
  - La puntuación conserva el paralelismo hebreo con dos miembros coordinados y final enfático.
