translation:
  language: es
  text: Después de esto, hubo otra vez guerra con los filisteos en Gob, y entonces Sibecai el husatita derribó a Saf[a], que era de entre los descendientes de Rapha[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «Saf»; el paralelo en 1 Crónicas 20:4 tiene el nombre «Sippai».
    reason: textual_variant
  - marker: b
    text: O «el gigante»; el hebreo puede referirse al ancestro llamado Rapha o a la línea de los refaítas.
    reason: alternative_reading
lexical_decisions:
- source_word: אַחֲרֵי כֵן
  english_pob_choice: After this
  chosen_spanish: Después de esto
  alternatives_spanish:
  - Después
  - Más tarde
  - Después de aquellas cosas
  lexicon: HALOT
  rationale: La expresión introduce una transición temporal narrativa sencilla. «Después de esto» conserva el orden del relato sin añadir matices innecesarios.
- source_word: וַתְּהִי עוֹד הַמִּלְחָמָה
  english_pob_choice: there was again war
  chosen_spanish: hubo otra vez guerra
  alternatives_spanish:
  - hubo guerra de nuevo
  - siguió habiendo guerra
  - hubo nuevamente guerra
  lexicon: HALOT
  rationale: El hebreo expresa repetición del conflicto. «Hubo otra vez guerra» mantiene ese valor repetitivo con español natural y sobrio.
- source_word: בְּגֹב
  english_pob_choice: at Gob
  chosen_spanish: en Gob
  alternatives_spanish:
  - en Gob
  - junto a Gob
  - en la localidad de Gob
  lexicon: HALOT
  rationale: Con un topónimo de batalla, «en Gob» es la opción más directa y transparente en español.
- source_word: הִכָּה
  english_pob_choice: struck down
  chosen_spanish: hirió
  alternatives_spanish:
  - golpeó
  - derribó
  - mató
  lexicon: HALOT
  rationale: El verbo נכה puede abarcar golpear con fuerza y, por contexto bélico, dejar al enemigo vencido o muerto. «Hirió» conserva el golpe violento sin cerrar de antemano si se enfatiza la acción o su resultado final; el contexto narrativo sigue comunicando la derrota.
- source_word: סִבְּכַי הַחֻשָׁתִי
  english_pob_choice: Sibbecai the Hushathite
  chosen_spanish: Sibecai el husatita
  alternatives_spanish:
  - Sibbecai el husatita
  - Sibcai el husatita
  lexicon: HALOT
  rationale: Los nombres propios se transliteran. «Sibecai» adapta de forma legible la forma hebrea סִבְּכַי, y el gentilicio se conserva como «el husatita» para mantener la identificación étnico-toponímica.
- source_word: סַף
  english_pob_choice: Saph
  chosen_spanish: Saf
  alternatives_spanish:
  - Saf
  - Saph
  lexicon: HALOT
  rationale: La forma hebrea permite una transliteración breve y consistente al español. «Saf» evita la grafía inglesa «ph» y respeta mejor la pronunciación esperable en español.
- source_word: אֲשֶׁר בִּילִדֵי הָרָפָה
  english_pob_choice: who was among the descendants of Rapha
  chosen_spanish: que era de entre los descendientes de Rapha
  alternatives_spanish:
  - que estaba entre los descendientes de Rapha
  - que era uno de los descendientes de Rapha
  - que estaba entre los hijos de Rapha
  lexicon: HALOT
  rationale: La construcción hebrea indica pertenencia a un linaje o grupo. «De entre los descendientes de Rapha» preserva la relación genealógica sin introducir en el texto principal la interpretación explicativa «gigante».
theological_decisions:
- issue: Tratamiento de הָרָפָה como nombre propio o como apelativo interpretativo
  english_pob_reading: 'proper name/clan ancestor: ''Rapha'''
  chosen_spanish_reading: 'nombre propio/linal: «Rapha»'
  alternative_spanish_readings:
  - «el gigante»
  - «el refaíta»
  - «de la estirpe del gigante»
  rationale: En esta frase genealógica, el hebreo funciona mejor como referencia de linaje. Por eso el texto principal conserva «Rapha»; así no se impone una glosa interpretativa. La lectura tradicional «el gigante» puede seguir señalándose como alternativa sin desplazar la base hebrea.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: El borrador sigue la lectura estable del texto base sin cambios de revisión necesarios; se mantiene la decisión del audit trail inglés de conservar el nombre «Rapha» en el cuerpo y registrar la variante textual de «Saf/Sippai» en nota.
  spanish_consistency_notes:
  - Se usó «filisteos» con minúscula en sentido étnico, conforme al uso normal en español.
  - Se mantuvo la secuencia narrativa con «Después de esto» y «entonces» para reflejar la progresión del hebreo.
  - Se eligió una transliteración española legible de los nombres propios y se evitó introducir «Cristo», «SEÑOR» u այլ terminología ajena al pasaje.
