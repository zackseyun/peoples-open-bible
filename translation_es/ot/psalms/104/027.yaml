revisions:
- from: Todos ellos esperan de ti[a], para que les des su alimento a su tiempo[b].
  to: Todos ellos esperan que tú les des su alimento a su tiempo[a][b].
  rationale: Se ajusta la sintaxis para representar de manera más natural y fiel la dependencia expectante expresada por אֵלֶיךָ יְשַׂבֵּרוּן לָתֵת, evitando el giro poco idiomático «esperan de ti» y el matiz final excesivo de «para que». Se conservan las alternativas léxicas del POB en notas.
