  text: 베드로가 일어나 그들과 함께 갔습니다. 그가 이르자 사람들이 그를 다락방으로 데리고 올라갔는데, 모든 과부가 그의 곁에 서서 울면서 도르가가 자기들과 함께 있을 때 만든 속옷과 겉옷들을 보여 주었습니다.
