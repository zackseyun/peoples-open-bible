translation:
  language: es
  text: 'Y vino la palabra de Yahvé[a] a mí, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR» en muchas versiones españolas.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y vino
  alternatives_spanish:
  - Y aconteció
  - Y sucedió
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea se expresa de manera natural en español con 'Y vino', que conserva el movimiento secuencial y el ingreso de la revelación sin forzar un calco como 'aconteció'.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - una palabra
  lexicon: HALOT
  rationale: En la fórmula profética, 'דְבַר יְהוָה' designa una comunicación divina concreta; 'la palabra' reproduce con precisión esa referencia específica y la terminología estable del texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como transliteración del Tetragrámaton, conforme al criterio POB en español. 'Yahvé' preserva el nombre personal de Dios en vez de ocultarlo tras un título.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - hacia mí
  - para mí
  lexicon: HALOT
  rationale: La combinación preposición+sufijo de primera persona singular se vierte de forma directa y natural como 'a mí'.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - así
  lexicon: HALOT
  rationale: '''Diciendo'' conserva la función introductoria del infinitivo constructo y prepara la cita del discurso divino con estilo bíblico claro en español.'
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: La línea editorial del proyecto exige transliterar el Nombre divino. 'Yahvé' es la forma española correspondiente al criterio doctrinal establecido y evita la sustitución tradicional por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se revisó el antecedente inglés y su nota sobre el Tetragrámaton. No se requieren cambios textuales adicionales: la versión española preserva la fórmula profética breve y la decisión nominal de POB, con la nota anclada en el texto.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' de forma consistente con el criterio POB para el Nombre divino.
  - Se mantuvo 'la palabra' en singular para reflejar la fórmula profética fija.
  - Se eligió 'diciendo' para conservar el tono introducctorio sin añadir contenido no presente en el hebreo.
