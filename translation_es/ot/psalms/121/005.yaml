translation:
  language: es
  text: Yahvé es el que te guarda; Yahvé es tu sombra[a] a tu derecha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu sombra protectora». La imagen hebrea es la de Yahvé como sombra que te protege muy cerca de ti, a tu lado.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: Tetragrámaton / nombre divino
  rationale: El texto hebreo usa el nombre propio del pacto, no un título. En español se conserva como «Yahvé» para mantener la misma decisión auditable de la POB inglesa y evitar la sustitución por un título genérico.
- source_word: שֹׁמְרֶךָ
  english_pob_choice: your keeper
  chosen_spanish: tu guardador
  alternatives_spanish:
  - el que te guarda
  - tu protector
  - tu custodio
  lexicon: participio de שׁמר
  rationale: El participio expresa acción continua de guardar/proteger. «Guardador» conserva el valor nominal y la recurrencia temática de «guardar» en el salmo, sin diluirlo en una paráfrasis.
- source_word: צִלְּךָ
  english_pob_choice: your shade
  chosen_spanish: tu sombra
  alternatives_spanish:
  - tu sombra protectora
  - tu refugio
  - tu sombra de protección
  lexicon: HALOT
  rationale: Aunque la POB inglesa prefirió «shade» para destacar la imagen de protección cercana, en español «sombra» es la equivalencia más natural y mantiene la metáfora física. No se explicita «protección» en el cuerpo para no abandonar la imagen concreta.
- source_word: עַל יַד יְמִינֶךָ
  english_pob_choice: at your right hand
  chosen_spanish: a tu derecha
  alternatives_spanish:
  - junto a tu mano derecha
  - a tu mano derecha
  - junto a ti, a tu derecha
  lexicon: HALOT
  rationale: La construcción expresa cercanía o posición al lado de la derecha. «A tu derecha» comunica esa proximidad de forma idiomática en español, preservando la imagen de presencia inmediata.
theological_decisions:
- issue: Nombre divino YHWH en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La POB inglesa traduce el Tetragrámaton como nombre propio. En español se mantiene la misma decisión teológica y textual con «Yahvé», preservando el nombre revelado y no una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Imagen de protección en צל
  english_pob_reading: your shade
  chosen_spanish_reading: tu sombra
  alternative_spanish_readings:
  - tu protección
  - tu abrigo
  rationale: La imagen bíblica no se abstrae a una idea general; se conserva la metáfora de sombra cercana que sugiere resguardo. «Tu sombra» mantiene la tensión poética y la concreción del hebreo.
  doctrine_reference: HALOT / imagen poética del Salmo 121
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el paquete fuente. La traducción sigue el último pase con estatus de alta concordancia y mantiene las decisiones léxicas auditadas sin introducir cambios no motivados por el texto hebreo ni por la POB inglesa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se preserva el paralelismo del verso con dos cláusulas breves y el mismo sujeto explícito.
  - Se evita introducir «SEÑOR» o «protección» en el cuerpo principal para no neutralizar la imaginería del hebreo.
  - El marcador [a] está anclado en «guardador» para la nota sobre la alternativa «sombra» en la segunda cláusula.
