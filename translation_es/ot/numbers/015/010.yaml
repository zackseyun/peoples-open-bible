translation:
  language: es
  text: Y presentarás vino para la libación, la mitad de un hin, una ofrenda hecha por fuego[a], aroma agradable para Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «una ofrenda de fuego».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/יַיִן
  english_pob_choice: And ... wine
  chosen_spanish: Y presentarás vino
  alternatives_spanish:
  - Y vino
  - Y en cuanto al vino
  lexicon: HALOT
  rationale: יַיִן significa de manera directa ‘vino’. En español conviene integrar la conjunción con un verbo explícito para que la frase sacrificial suene natural sin perder el valor del sustantivo.
- source_word: תַּקְרִיב
  english_pob_choice: you shall present
  chosen_spanish: presentarás
  alternatives_spanish:
  - ofrecerás
  - acercarás
  lexicon: HALOT
  rationale: El hifil de קרב expresa traer/presentar una ofrenda. ‘Presentarás’ conserva la idea cultual de llevar ante Dios sin introducir un término demasiado general como ‘dar’.
- source_word: לַ/נֶּסֶךְ
  english_pob_choice: for the drink offering
  chosen_spanish: para la libación
  alternatives_spanish:
  - para la ofrenda de bebida
  - como libación
  lexicon: HALOT
  rationale: נֶסֶךְ es la ofrenda líquida derramada junto con el sacrificio. ‘Libación’ es el equivalente más preciso y mantiene el sentido ritual; ‘ofrenda de bebida’ sería más explicativa pero menos técnica.
- source_word: חֲצִי הַ/הִין
  english_pob_choice: half a hin
  chosen_spanish: la mitad de un hin
  alternatives_spanish:
  - medio hin
  lexicon: HALOT
  rationale: La expresión da la medida de la libación. ‘La mitad de un hin’ suena natural en español y preserva la unidad antigua sin convertirla a una medida moderna.
- source_word: אִשֵּׁה
  english_pob_choice: an offering made by fire
  chosen_spanish: una ofrenda encendida
  alternatives_spanish:
  - una ofrenda hecha por fuego
  - una ofrenda de fuego
  lexicon: HALOT
  rationale: El término tiene fuerza cultual ligada al fuego del altar. ‘Ofrenda encendida’ comunica bien el vínculo con el fuego y es más idiomática que una construcción demasiado literal.
- source_word: רֵיחַ נִיחֹחַ
  english_pob_choice: a pleasing aroma
  chosen_spanish: aroma agradable
  alternatives_spanish:
  - aroma placentero
  - olor grato
  lexicon: HALOT
  rationale: La fórmula fija expresa aceptación ante Dios. ‘Aroma agradable’ mantiene la imagen olfativa sin sugerir que Dios dependa literalmente del olor.
- source_word: לַ/יהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el Yahvé
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino. ‘Para’ conserva la dirección de la ofrenda en español y encaja con el lenguaje sacrificial.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El proyecto pide traducir יהוה como ‘Yahvé’. Se mantiene esa decisión para ser transparente con el nombre propio divino y evitar el sustituto litúrgico ‘SEÑOR’.
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH → Yahvé'
- issue: Término sacrificial אִשֵּׁה
  english_pob_reading: an offering made by fire
  chosen_spanish_reading: una ofrenda encendida
  alternative_spanish_readings:
  - una ofrenda hecha por fuego
  - una ofrenda de fuego
  rationale: El contexto levítico apunta a una ofrenda consumida en el altar. ‘Ofrenda encendida’ conserva esa tensión entre la forma tradicional y una expresión clara en español.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El texto inglés revisado sustituyó ‘food offering’ por ‘an offering made by fire’ para ajustar con mayor precisión אִשֵּׁה. La versión española sigue esa corrección y evita una lectura desalineada con el fuego del altar.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ según el estándar del proyecto para יהוה.
  - Se prefirió ‘libación’ por precisión cultual; en español bíblico es más transparente que ‘ofrenda de bebida’.
  - ‘Ofrenda encendida’ mantiene la imagen de fuego sin caer en un calco demasiado pesado.
  - Se conservó la unidad antigua ‘hin’ sin convertirla a equivalentes modernos.
