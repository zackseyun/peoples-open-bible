    rationale: Aunque intenta castellanizar el nombre, «Joiarib» no refleja tan bien la forma bíblica reconocible en español. «Joyarib» ofrece una adaptación española más natural y más cercana al uso onomástico bíblico; alternativamente podría retenerse una forma más transliterada, pero la actual es la menos recomendable.
  revised_spanish_text: 'Y de los sacerdotes: Jedaías, Joyarib y Jakin.'
