revisions:
- from: Y huirán por el valle de mis montes[a], porque el valle de los montes llegará hasta Azal. Sí, huirán como huyeron de delante del terremoto en los días de Uzías, rey de Judá. Entonces Yahvé mi Dios vendrá[b], y todos los seres santos con él.
  to: Y huirán por el valle de mis montes[a], porque el valle de los montes llegará hasta Azal. Sí, huirán como huyeron de delante del terremoto en los días de Uzías, rey de Judá. Entonces Yahvé mi Dios vendrá, y todos los santos[b] con él.
  rationale: 'Se hace una reparación menor para mejorar la fidelidad idiomática y léxica en español: «todos los seres santos» se reemplaza por «todos los santos», que es más natural y mantiene mejor el registro bíblico. La nota conserva explícitamente la amplitud interpretativa documentada por el POB inglés, de modo que no se resuelve indebidamente si se trata de santos, asistentes celestiales o ángeles.'
