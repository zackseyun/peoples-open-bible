revisions:
- from: 'Los hijos de Efraín: Shutélah[a], y Bered, su hijo, y Tahat, su hijo, y Elada, su hijo, y Tahat, su hijo.'
  to: 'Los hijos de Efraín: Shutelá[a], y Bered, su hijo, y Tahat, su hijo, y Eleadá, su hijo, y Tahat, su hijo.'
