translation:
  language: es
  text: Y amargó a muchos reyes[a], y alegró a Jacob con sus obras, y su recuerdo es para bendición para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, ‘su memoria es bendita para siempre’. El griego usa literalmente una fórmula de bendición: ‘su recuerdo es para bendición para siempre’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπίκρανεν
  english_pob_choice: embittered
  chosen_spanish: amargó
  alternatives_spanish:
  - amargó profundamente
  - los llenó de amargura
  - los entristeció
  lexicon: LSJ
  rationale: El verbo griego significa literalmente ‘hacer amargo’. En español, ‘amargó’ conserva la metáfora con la misma fuerza breve y verbal que ‘embittered’ en inglés, sin suavizarla hacia una interpretación más débil.
- source_word: βασιλεῖς πολλούς
  english_pob_choice: many kings
  chosen_spanish: a muchos reyes
  alternatives_spanish:
  - a muchos gobernantes
  - a numerosos reyes
  lexicon: LSJ
  rationale: βασιλεῖς significa de manera directa ‘reyes’; por eso se conserva ‘reyes’ y se mantiene ‘muchos’ como cuantificador. El orden español se ajusta para sonar natural sin perder precisión.
- source_word: ηὔφρανεν
  english_pob_choice: made glad
  chosen_spanish: alegró
  alternatives_spanish:
  - hizo alegrar
  - dio alegría a
  - llenó de alegría
  lexicon: LSJ
  rationale: El griego expresa la causa de gozo o alegría. ‘Alegró’ es una forma natural y concisa en español que mantiene el sentido causativo sin añadir matices ajenos.
- source_word: τὸν Ἰακώβ
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Israel
  lexicon: LSJ
  rationale: Se conserva ‘Jacob’ porque el texto griego nombra así al pueblo de forma colectiva y pactal. Cambiarlo por ‘Israel’ borraría esa elección léxica documentada.
- source_word: ἐν τοῖς ἔργοις αὐτοῦ
  english_pob_choice: by his deeds
  chosen_spanish: con sus obras
  alternatives_spanish:
  - por sus obras
  - mediante sus obras
  - con sus hechos
  lexicon: LSJ
  rationale: La frase puede expresar medio o ámbito. ‘Con sus obras’ comunica de modo natural que Jacob fue alegrado a causa de la acción de Judas, conservando la relación instrumental sin forzar una construcción más pesada.
- source_word: τὸ μνημόσυνον αὐτοῦ
  english_pob_choice: his remembrance
  chosen_spanish: su recuerdo
  alternatives_spanish:
  - su memoria
  - su recordación
  - su memorial
  lexicon: LSJ
  rationale: μνημόσυνον puede ser ‘recuerdo’, ‘memoria’ o ‘memorial’. ‘Su recuerdo’ funciona bien en español y mantiene la idea de rememoración, aunque sin sonar tan nominalmente marcado como ‘su remembranza’.
- source_word: εἰς εὐλογίαν
  english_pob_choice: for blessing
  chosen_spanish: para bendición
  alternatives_spanish:
  - en bendición
  - como bendición
  - para ser bendición
  lexicon: LSJ
  rationale: La fórmula griega es nominal y expresa orientación hacia la bendición. ‘Para bendición’ reproduce esa construcción idiomática con fidelidad y conserva el tono bíblico.
- source_word: ἕως τοῦ αἰῶνος
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: LSJ
  rationale: El idiomismo significa duración perpetua. ‘Para siempre’ es la equivalencia española más natural y transparente.
theological_decisions:
- issue: Nombre colectivo 'Jacob'
  english_pob_reading: Retain 'Jacob' as the text's covenantal name for the people rather than substituting 'Israel.'
  chosen_spanish_reading: Conservar ‘Jacob’ como nombre colectivo y pactal del pueblo, en vez de reemplazarlo por ‘Israel’.
  alternative_spanish_readings:
  - Israel
  rationale: La lectura griega usa explícitamente ‘Jacob’. Mantenerlo evita aplanar el registro bíblico y respeta la elección del texto fuente; además, preserva la tensión entre nombre ancestral y referente colectivo.
  doctrine_reference: Translation philosophy §1, §2
- issue: Fórmula final de bendición
  english_pob_reading: Render the idiom as 'his remembrance is for blessing forever.'
  chosen_spanish_reading: Traducir la fórmula como ‘su recuerdo queda para bendición para siempre’.
  alternative_spanish_readings:
  - su memoria será bendita para siempre
  - su recuerdo es para bendición para siempre
  - su memorial es bendición para siempre
  rationale: El griego presenta una fórmula nominal de bendición, no un verbo explícito de pasivo. ‘Queda para bendición’ conserva el carácter formular y la permanencia del enunciado, evitando convertirlo en una paráfrasis más libre o en una pasiva interpretativa.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El texto sigue el estado revisado más reciente del expediente inglés, que indica alta concordancia y sin cambios sustanciales. La versión española mantiene la misma estructura semítica y la misma decisión sobre ‘Jacob’ y la fórmula de bendición, adaptándolas con español natural y auditable.
  spanish_consistency_notes:
  - Se mantiene ‘Jacob’ de forma consistente como designación colectiva del pueblo, en paralelo al expediente inglés.
  - Se conserva el paralelismo de tres miembros con ‘y... y... y...’, respetando la cadencia del griego.
  - ‘Para bendición para siempre’ preserva la fórmula bíblica sin sustituirla por una pasiva interpretativa.
  - No se introduce ‘Mesías’, ‘SEÑOR’ ni otras sustituciones terminológicas no presentes en el versículo.
