translation:
  language: es
  text: Las montañas altas son para las cabras monteses[a]; las peñas son refugio para los damanes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «íbices» o «cabras de monte» para «cabras monteses».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «hyraxes»; el inglés tradicional «conies» es arcaico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרִים
  english_pob_choice: mountains
  chosen_spanish: montañas
  alternatives_spanish:
  - cerros
  - montes
  lexicon: HALOT
  rationale: הָרִים designa elevaciones del terreno; 'montañas' conserva el sentido general y suena natural en español contemporáneo.
- source_word: הַגְּבֹהִים
  english_pob_choice: high
  chosen_spanish: altas
  alternatives_spanish:
  - elevadas
  - altas y escarpadas
  lexicon: HALOT
  rationale: El adjetivo modifica a 'montañas'; 'altas' es la forma más directa y clara para el lector español.
- source_word: לַיְּעֵלִים
  english_pob_choice: for the wild goats
  chosen_spanish: para las cabras monteses
  alternatives_spanish:
  - para los íbices
  - para las cabras salvajes
  lexicon: HALOT
  rationale: יְּעֵלִים alude a cabras salvajes de montaña / íbices. 'Cabras monteses' comunica bien la imagen sin ser demasiado técnico.
- source_word: סְלָעִים
  english_pob_choice: the rocks
  chosen_spanish: las peñas
  alternatives_spanish:
  - las rocas
  - los riscos
  lexicon: HALOT
  rationale: El plural hebreo señala formaciones rocosas. 'Peñas' conserva el carácter de refugio rocoso con una tonalidad poética natural en español.
- source_word: מַחְסֶה
  english_pob_choice: a refuge
  chosen_spanish: refugio
  alternatives_spanish:
  - amparo
  - abrigo
  lexicon: HALOT
  rationale: El sustantivo expresa un lugar de protección; 'refugio' reproduce bien el valor físico y poético del término.
- source_word: לַשְׁפַנִּים
  english_pob_choice: for the rock badgers
  chosen_spanish: para los damanes
  alternatives_spanish:
  - para los hyraxes
  - para los conejos de roca
  lexicon: HALOT
  rationale: שְׁפַנִּים se identifica con el hyrax o damán. 'Damanes' es el equivalente moderno más preciso y evita el arcaísmo de 'conejos/conies'.
translation_notes:
  revision_awareness: Se corrigió el problema anterior anclando ambos marcadores de nota directamente en el texto español; no se añadieron notas sin anclaje. La redacción sigue el hebreo y el expediente inglés, manteniendo el paralelismo poético y la identificación zoológica.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo sintáctico A / B: ''Las montañas altas ...; las peñas ...''.'
  - Se prefirió 'damanes' por precisión zoológica y claridad moderna, en línea con la decisión inglesa de evitar el arcaísmo.
  - Se evitó 'SEÑOR' u otra sustitución teológica porque el verso no contiene el Nombre divino.
