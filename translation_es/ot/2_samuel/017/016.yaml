base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/017/016.yaml
  text: Now send quickly and tell David[a], saying, ‘Do not stay tonight at the fords of the wilderness, but be sure to cross over, lest the king and all the people who are with him be swallowed up.’
  footnotes:
  - marker: a
    text: Or 'in the plains of the wilderness.' The Hebrew phrase can denote desert lowlands/plains; here 'fords' is chosen because the immediate context stresses crossing over and imminent danger near a crossing point.
    reason: lexical_alternative
