translation:
  language: es
  text: Entonces Jehú tensó su arco al máximo y hirió a Joram entre sus brazos[a], y la flecha salió por su corazón, y cayó en su carro de guerra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'entre sus hombros' / 'entre sus omóplatos'. El hebreo dice literalmente 'entre sus brazos', lo que puede referirse idiomáticamente a la parte alta de la espalda o la zona de los hombros.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/יֵה֞וּא
  english_pob_choice: And Jehu
  chosen_spanish: Y Jehú
  alternatives_spanish:
  - Entonces Jehú
  - Y luego Jehú
  lexicon: WLC/HALOT
  rationale: Se conserva el nombre propio y el enlace narrativo con 'Y'. El hebreo avanza la acción de forma secuencial; 'Y' mantiene esa fluidez sin añadir interpretación.
- source_word: מִלֵּ֧א יָד֣/וֹ בַ/קֶּ֗שֶׁת
  english_pob_choice: drew his bow full
  chosen_spanish: tensó su arco al máximo
  alternatives_spanish:
  - cargó su mano con el arco
  - tensó plenamente su arco
  lexicon: HALOT
  rationale: 'El hebreo es idiomático: literalmente ''llenó su mano con el arco'', es decir, lo tensó por completo para disparar. En español, ''tensó su arco al máximo'' comunica el mismo sentido con naturalidad y sin perder la fuerza física de la imagen.'
- source_word: וַ/יַּ֤ךְ
  english_pob_choice: struck
  chosen_spanish: hirió
  alternatives_spanish:
  - golpeó
  - hizo blanco en
  lexicon: HALOT
  rationale: נכה puede ser 'golpear' o 'herir'. Aquí el contexto de flecha mortal favorece 'hirió', que preserva el acto de impacto sin convertirlo en un mero sinónimo técnico de disparar.
- source_word: בֵּ֣ין זְרֹעָ֔י/ו
  english_pob_choice: between his arms
  chosen_spanish: entre sus brazos
  alternatives_spanish:
  - entre sus hombros
  - entre sus omóplatos
  lexicon: HALOT
  rationale: Se mantiene la literalidad básica de זְרוֹעַ ('brazo') como en el audit trail inglés. 'Entre sus brazos' es una forma clara en español; no se sustituye por una anatomía más interpretativa en el texto principal, aunque la expresión puede implicar la zona alta de la espalda o los hombros.
- source_word: וַ/יֵּצֵ֥א הַ/חֵ֖צִי מִ/לִּבּ֑/וֹ
  english_pob_choice: the arrow came out through his heart
  chosen_spanish: la flecha salió por su corazón
  alternatives_spanish:
  - la flecha salió de su corazón
  - la flecha atravesó su corazón
  lexicon: HALOT
  rationale: לֵב puede funcionar como corazón físico en un contexto de herida mortal. 'Salió por su corazón' expresa el paso atravesante de la flecha sin añadir más detalle del que da el hebreo.
- source_word: וַ/יִּכְרַ֖ע
  english_pob_choice: he collapsed
  chosen_spanish: cayó
  alternatives_spanish:
  - se desplomó
  - se dobló
  lexicon: HALOT
  rationale: כרע literalmente es 'doblarse/ponerse de rodillas', pero en este contexto narrativo describe el derrumbe corporal después del impacto fatal. 'Cayó' es conciso y natural en español; 'se desplomó' sería más enfático, pero aquí no es necesario.
- source_word: בְּ/רִכְבּֽ/וֹ
  english_pob_choice: in his chariot
  chosen_spanish: en su carro
  alternatives_spanish:
  - en su carro de guerra
  - en el carro
  lexicon: HALOT
  rationale: El término hebreo designa el carro de combate o carroza de guerra en contexto bélico. 'Carro' es el equivalente español directo y sobrio; evita sobreespecificar si el texto no lo hace explícitamente.
theological_decisions:
- issue: Descripción de la muerte por herida de flecha y colapso final
  english_pob_reading: The verse presents a fatal, bodily wound without softening the violence.
  chosen_spanish_reading: El verso presenta una herida mortal y un derrumbe corporal sin suavizar la violencia.
  alternative_spanish_readings:
  - El verso atenúa la violencia
  - El verso espiritualiza la muerte
  rationale: No hay motivo para atenuar el realismo narrativo. La traducción mantiene el carácter físico y violento del episodio conforme al hebreo y al POB inglés.
  doctrine_reference: Narrativa histórica; fidelidad al texto sin eufemismo doctrinal
- issue: Entre sus brazos / entre sus hombros
  english_pob_reading: The Hebrew literally says 'between his arms,' which may idiomatically refer to the upper back or shoulder area.
  chosen_spanish_reading: Se conserva 'entre sus brazos' en el texto principal, con nota sobre la posible referencia idiomática a hombros/espalda alta.
  alternative_spanish_readings:
  - entre sus hombros
  - entre sus omóplatos
  rationale: 'La tensión lexical debe quedar visible: el hebreo dice literalmente ''brazos'', aunque el sentido anatómico probable puede ser la parte alta de la espalda o los hombros. La nota preserva esa alternativa sin imponerla en el texto principal.'
  doctrine_reference: Fidelidad semántica y transparencia textual
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios sustanciales: el sentido de mִלֵּא יָדוֹ בַּקֶּשֶׁת se vertió idiomáticamente, se mantuvo la literalidad de בין זרועיו con nota, y se conservó el desenlace corporal del verbo כרע sin añadir una reinterpretación más fuerte de la caída.'
  spanish_consistency_notes:
  - Jehú/Joram se mantienen con la grafía usual en español bíblico contemporáneo.
  - Se eligió 'carro' por ser el término más natural y suficientemente preciso para el contexto bélico.
  - No se usó 'SEÑOR' ni terminología litúrgica ajena, porque el versículo no contiene el tetragrámaton ni un título divino.
  - Se evitó 'Cristo' y cualquier terminología cristológica, ya que no aparece en el pasaje.
  - La puntuación conserva una sola secuencia narrativa con comas, acorde con el flujo hebreo y el estilo POB.
