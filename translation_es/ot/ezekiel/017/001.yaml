    rationale: 'Si se preserva la alternativa más literal de וַיְהִי, en español necesita «que»: «Y aconteció que la palabra de Yahvé vino a mí, diciendo».'
  revised_spanish_text: 'La palabra de Yahvé vino a mí[a], diciendo:'
