id: COL.1.6
reference: Colossians 1:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τοῦ παρόντος εἰς ὑμᾶς, καθὼς καὶ ἐν παντὶ τῷ ⸀κόσμῳ ἐστὶν καρποφορούμενον καὶ αὐξανόμενον καθὼς καὶ ἐν ὑμῖν, ἀφ’ ἧς ἡμέρας ἠκούσατε καὶ ἐπέγνωτε τὴν χάριν τοῦ θεοῦ ἐν ἀληθείᾳ·
base_translation:
  language: en
  yaml_path: translation/nt/colossians/001/006.yaml
  text: which has come to you, just as also in all the world it is bearing fruit and growing, just as also among you, from the day you heard and came to know the grace of God in truth.
translation:
  language: ko
  text: 이 복음이 여러분에게 이르렀고, 또한 온 세상에서도 열매를 맺으며 자라나고 있는 것처럼, 여러분 가운데서도 그러합니다. 곧 여러분이 하나님의 은혜를 듣고 진리 안에서[a] 깨달은 그 날부터 그러합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「참으로」. 헬라어 ἐν ἀληθείᾳ는 「진리의 영역 안에서」와 「참되게」 두 의미를 함께 담을 수 있다.
    reason: alternative_reading
lexical_decisions:
- source_word: τοῦ παρόντος εἰς ὑμᾶς
  english_pob_choice: which has come to you
  chosen_korean: 이 복음이 여러분에게 이르렀고
  alternatives_korean:
  - 여러분에게 임한
  - 여러분에게 와 있는
  lexicon: BDAG
  rationale: πάρειμι는 「도착·임재」를 가리킨다. 「이르렀고」는 복음이 골로새 교회에 도달한 사건을 자연스럽게 표현하며, 다음 절과 연결이 매끄럽다.
- source_word: ἐν παντὶ τῷ κόσμῳ
  english_pob_choice: in all the world
  chosen_korean: 온 세상에서
  alternatives_korean:
  - 전 세계에서
  - 온 세상 가운데
  lexicon: BDAG
  rationale: κόσμος는 거주된 세계를 가리키는 광의적·수사적 표현이다. 「온 세상」이 한국어에서 가장 자연스러우며 보편적 확장의 어감을 살린다.
- source_word: καρποφορούμενον καὶ αὐξανόμενον
  english_pob_choice: bearing fruit and growing
  chosen_korean: 열매를 맺으며 자라나고
  alternatives_korean:
  - 열매를 맺고 자라며
  - 결실하고 성장하고
  lexicon: BDAG
  rationale: 현재 분사들의 진행적 양상을 살려 「~며 자라나고 있는」으로 옮긴다. 농경적 비유를 보존한다.
- source_word: καθὼς καὶ ἐν ὑμῖν
  english_pob_choice: just as also among you
  chosen_korean: 여러분 가운데서도 그러합니다
  alternatives_korean:
  - 여러분 안에서도
  - 여러분 가운데서와 같이
  lexicon: BDAG
  rationale: ἐν ὑμῖν은 공동체적 「가운데」로 옮겨 회중 전체의 경험을 표현한다. 「~도 그러합니다」로 한국어 비교 구조를 마무리한다.
- source_word: ἀφ’ ἧς ἡμέρας
  english_pob_choice: from the day
  chosen_korean: 그 날부터
  alternatives_korean:
  - ~날 이래
  lexicon: BDAG
  rationale: 시점적 기점을 「그 날부터」로 간결하게 표현한다.
- source_word: ἠκούσατε καὶ ἐπέγνωτε
  english_pob_choice: you heard and came to know
  chosen_korean: 듣고 깨달은
  alternatives_korean:
  - 듣고 알게 된
  - 듣고 충분히 안
  lexicon: BDAG
  rationale: ἐπιγινώσκω는 「깊이·경험적으로 앎」을 가리킨다. 「깨달은」은 경험적 인식을 자연스럽게 담는다.
- source_word: τὴν χάριν τοῦ θεοῦ
  english_pob_choice: the grace of God
  chosen_korean: 하나님의 은혜
  alternatives_korean:
  - 신적 은총
  lexicon: BDAG
  rationale: 바울 신학의 핵심 구문을 한국 교회의 정립된 표현으로 옮긴다.
- source_word: ἐν ἀληθείᾳ
  english_pob_choice: in truth
  chosen_korean: 진리 안에서
  alternatives_korean:
  - 참으로
  - 진리 가운데
  lexicon: BDAG
  rationale: ἐν ἀληθείᾳ는 「방식(참으로)」과 「영역(진리 안에서)」 두 의미를 모두 담을 수 있다. 영어 POB가 「in truth」로 모호성을 보존한 결정을 따라 한국어도 「진리 안에서」로 옮긴다.
theological_decisions:
- issue: ἐν ἀληθείᾳ의 번역
  chosen_reading: 진리 안에서
  alternative_readings:
  - 참으로
  - 진리 가운데
  rationale: 헬라어 표현은 「참되게(방식)」와 「진리의 영역 안에서」 두 가지로 모두 읽힐 수 있다. 본 번역은 모호성을 해소하지 않고 보존하는 원칙에 따라 「진리 안에서」로 옮긴다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
