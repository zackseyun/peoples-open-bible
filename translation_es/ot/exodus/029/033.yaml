review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: mandato de comer las porciones sacrificiales, referencia instrumental de אֲשֶׁר כֻּפַּר בָּהֶם, propósito doble de ordenación/consagración, prohibición para el no autorizado, y razón final de santidad. Sin embargo, la selección principal ''se hizo expiación'' se aparta innecesariamente del English POB principal, que fijó ''atonement'' en el texto y dejó ''expiation'' como alternativa. Además, falta una nota para preservar esa alternativa documentada.'
  spanish_quality_summary: 'El español es claro y digno. ''Comerán aquellas cosas'' y ''porque son santas'' son naturales. ''Un extraño'' funciona, aunque depende de la nota cultural para evitar lectura étnica; eso ya está bien resuelto. El principal ajuste de calidad/proyecto es terminológico: en este proyecto conviene mantener ''se hizo expiación/atonamiento'' según auditoría; como ''atonamiento'' no es idiomático, en español la mejor solución fiel y legible es usar ''se hizo expiación'' con nota que preserve la alternativa ''se hizo expiación por ellas / con ellas'', o mejor ajustar a ''se hizo expiación con ellas'' si se quisiera hacer más explícito el instrumental. Pero dado el English POB principal, la mejor reparación es mantener fluidez y añadir la alternativa ausente.'
  glossary_alignment: Alineación general buena con terminología del proyecto, salvo que el rastro auditado en inglés privilegia 'atonement' como lectura principal de כפר y 'expiation' como alternativa. En español, 'expiación' es aceptable y probablemente más idiomática que 'atonamiento', pero debe explicarse como decisión de claridad y conservarse la alternativa instrumental documentada. El resto ('consagrarlos', nota sobre 'llenar su mano', y valor cultual de זר) está bien alineado.
  issues:
  - severity: medium
    issue: Falta la nota alternativa correspondiente a la decisión inglesa sobre אֲשֶׁר כֻּפַּר בָּהֶם.
    rationale: El English POB preserva una alternativa lexical ('through which expiation was made for them'). En español no se conserva ninguna nota para la variación instrumental/destinataria, pese a que el pasaje puede generar ambigüedad.
  - severity: medium
    issue: La nota [a] está anclada en 'expiación' pero su contenido explica 'llenar su mano'.
    rationale: La nota misma es válida, pero el anclaje más natural debe ir sobre 'ordenarlos' o frase equivalente, donde corresponde el modismo לְמַלֵּא אֶת יָדָם. Tal como está, el lector podría pensar que la nota comenta 'expiación'.
  - severity: low
    issue: '''Un extraño'' puede sonar étnico en español sin apoyo inmediato.'
    rationale: La nota cultural lo corrige adecuadamente, así que no exige cambio fuerte; no obstante, conviene conservar esa nota y, si se revisa, considerar formulación más precisa como 'un no autorizado' o 'un ajeno' solo si no se sacrifica naturalidad.
  revised_spanish_text: Comerán aquellas cosas por las cuales se hizo expiación[b], para ordenarlos[a] y para consagrarlos; pero un extraño no las comerá[c], porque son santas.
  revised_footnotes:
  - marker: a
    text: Literalmente, 'llenar su mano', un modismo hebreo para la ordenación o investidura sacerdotal.
    reason: lexical_alternative
  - marker: b
    text: O 'con las cuales se hizo expiación por ellos'.
    reason: lexical_alternative
  - marker: c
    text: '''Extraño'' aquí significa alguien no autorizado para participar en el rito sacerdotal, no necesariamente un extranjero por etnia.'
    reason: cultural_note
  revision_rationale: Se reubicó la nota del modismo sacerdotal al lugar correcto ('ordenarlos') y se añadió la alternativa lexical faltante para la frase de expiación, preservando mejor el rastro de auditoría en inglés y la posible ambigüedad instrumental del hebreo. Se mantuvo el texto principal casi intacto porque es fiel y natural en español.
