  text: וַ/תָּשֹׁ֣בְנָה הֶ/עָרִ֡ים אֲשֶׁ֣ר לָֽקְחוּ פְלִשְׁתִּים֩ מֵ/אֵ֨ת יִשְׂרָאֵ֤ל לְ/יִשְׂרָאֵל֙ מֵ/עֶקְר֣וֹן וְ/עַד גַּ֔ת וְ/אֶ֨ת גְּבוּלָ֔/ן הִצִּ֥יל יִשְׂרָאֵ֖ל מִ/יַּ֣ד פְּלִשְׁתִּ֑ים וַ/יְהִ֣י שָׁל֔וֹם בֵּ֥ין יִשְׂרָאֵ֖ל וּ/בֵ֥ין הָ/אֱמֹרִֽי־׀־־׃
