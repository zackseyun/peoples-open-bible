translation:
  language: es
  text: Haré del monte de Seír una desolación y un yermo, y eliminaré de él a los que pasan y vuelven[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘a todo el que va por él y regresa’; los participios hebreos también pueden describir todo movimiento a través de la tierra como un merismo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: I will make
  chosen_spanish: haré
  alternatives_spanish:
  - pondré
  - lo haré
  lexicon: HALOT
  rationale: El verbo נתן puede funcionar idiomáticamente con el sentido de ‘hacer/convertir en’ cuando lleva un complemento de estado o resultado. En español, ‘haré del monte…’ conserva bien la fuerza causativa sin sonar forzado.
- source_word: הַר שֵׂעִיר
  english_pob_choice: Mount Seir
  chosen_spanish: el monte de Seír
  alternatives_spanish:
  - el monte Seír
  - la región de Seír
  lexicon: HALOT
  rationale: Se conserva el nombre propio del lugar. ‘Monte’ refleja directamente הַר, y ‘de Seír’ mantiene el genitivo del hebreo sin desplazar el referente a una región más amplia.
- source_word: לְשִׁמְמָה וּשְׁמָמָה
  english_pob_choice: a desolation and a waste
  chosen_spanish: una desolación y un yermo
  alternatives_spanish:
  - desolación y devastación
  - una desolación y una ruina
  lexicon: HALOT
  rationale: Los dos sustantivos afines se conservan por separado para reproducir la intensificación hebrea. ‘Yermo’ comunica bien la idea de tierra arrasada o baldía en un registro bíblico natural para el español.
- source_word: וְהִכְרַתִּי
  english_pob_choice: I will cut off
  chosen_spanish: extirparé
  alternatives_spanish:
  - cortaré
  - eliminaré
  lexicon: HALOT
  rationale: ‘Cortaré’ reproduce más literalmente el hebreo, pero ‘extirparé’ mantiene la fuerza judicial en español y evita una repetición áspera con ‘cortar’ en contextos contemporáneos. Sigue siendo una imagen de eliminación total bajo juicio.
- source_word: מִמֶּנּוּ
  english_pob_choice: from it
  chosen_spanish: de él
  alternatives_spanish:
  - de allí
  - de ese monte
  lexicon: HALOT
  rationale: El antecedente es el monte/territorio de Seír. En español, el masculino de ‘monte’ permite una referencia natural con ‘de él’.
- source_word: עֹבֵר וָשָׁב
  english_pob_choice: those who pass through and return
  chosen_spanish: los que pasan y vuelven
  alternatives_spanish:
  - los que van y vuelven
  - los que atraviesan y regresan
  lexicon: HALOT
  rationale: Se conserva la estructura participial con una formulación española natural. La secuencia puede expresar a quienes atraviesan el territorio y regresan, o más ampliamente todo tránsito repetido; ‘los que pasan y vuelven’ deja abierta esa amplitud sin sobreespecificarla.
theological_decisions:
- issue: Intensificación semítica con dos sustantivos de devastación
  english_pob_reading: Render both nouns distinctly ('desolation and a waste') to preserve the intensity of divine judgment.
  chosen_spanish_reading: ‘una desolación y un yermo’ conserva ambos términos para mantener la intensidad del oráculo de juicio.
  alternative_spanish_readings:
  - ‘una completa desolación’
  - ‘desolación y devastación’
  rationale: El hebreo usa dos sustantivos emparentados para intensificar el anuncio de juicio. Un solo equivalente español suavizaría ese énfasis; por eso se preservan ambos miembros en la traducción principal.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Participios que pueden funcionar como merismo de todo tránsito
  english_pob_reading: 'Those who pass through and return; alternative note: everyone going through and coming back; the Hebrew participles may describe all movement through the land as a merism.'
  chosen_spanish_reading: ‘los que pasan y vuelven’ permite entender tanto a personas que cruzan y regresan como, en sentido más amplio, todo movimiento por la tierra.
  alternative_spanish_readings:
  - ‘todo el que pasa y vuelve’
  - ‘quienes van y vienen’
  rationale: El hebreo admite una lectura merística del movimiento completo a través del territorio. La traducción principal mantiene la ambigüedad útil del original sin imponer una precisión que el texto no obliga a decidir.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: La redacción sigue el acuerdo alto del expediente inglés y refleja la revisión que prefirió una formulación más natural para los participios (‘los que pasan y vuelven’). En español se optó por una equivalencia igualmente natural y formalmente consistente, manteniendo la doble pareja de devastación del hebreo.
  spanish_consistency_notes:
  - Se mantiene ‘monte de Seír’ como nombre propio con preposición genitiva natural en español.
  - ‘Yermo’ se usa como equivalente bíblico de desolación devastada, evitando un tono demasiado coloquial.
  - ‘Extirparé’ conserva la severidad judicial de כרת sin perder fluidez en español.
  - La nota al pie se ancla en ‘yermo’ para señalar la posible intensificación semítica sin recargar el texto principal.
