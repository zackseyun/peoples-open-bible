lexical_decisions:
- source_word: κρυπτῶς
  english_pob_choice: secretly
  chosen_spanish: en secreto
  alternatives_spanish:
  - secretamente
  - a escondidas
  lexicon: LSJ
  rationale: El adverbio expresa acción oculta o clandestina. «En secreto» conserva bien la idea de ocultamiento sin sonar forzado en español contemporáneo.
- source_word: κατόπισθεν
  english_pob_choice: behind
  chosen_spanish: por detrás de
  alternatives_spanish:
  - detrás de
  - tras
  lexicon: LSJ
  rationale: En este contexto espacial y militar, la expresión natural en español es «por detrás de», que mantiene el valor locativo de «behind» y la relación con el grupo referido.
- source_word: αὐτῶν
  english_pob_choice: them
  chosen_spanish: de ellos
  alternatives_spanish:
  - de ellas
  - de ellos mismos
  lexicon: Greek grammar
  rationale: El pronombre griego es plural; «de ellos» respeta el referente plural sin añadir precisión no indicada por el texto.
- source_word: ἔγνω
  english_pob_choice: knew
  chosen_spanish: supo
  alternatives_spanish:
  - conoció
  - reconoció
  - se dio cuenta
  lexicon: LSJ
  rationale: Aunque el verbo base puede rendirse por «conoció» o «reconoció», en español narrativo «supo» transmite con naturalidad el hecho de que Jonatán llegó a tener conocimiento de la situación.
- source_word: ἔνεδρον
  english_pob_choice: an ambush
  chosen_spanish: una emboscada
  alternatives_spanish:
  - un cerco
  - una trampa
  - un grupo emboscado
  lexicon: LSJ
  rationale: El término militar griego designa una emboscada o a los que acechan. «Emboscada» es el equivalente español más preciso y natural.
