translation:
  language: es
  text: De día me consumía el calor[a], y de noche la escarcha; y mi sueño huía de mis ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yo era: de día me consumía el calor, y de noche la escarcha». El hebreo comienza con «yo era», pero en español se integra de modo más natural en la cláusula principal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָיִיתִי
  english_pob_choice: '[implied in the clause structure]'
  chosen_spanish: me consumía
  alternatives_spanish:
  - yo era
  - estaba
  lexicon: HALOT
  rationale: El hebreo comienza con una forma de «yo era/estaba», pero en español su fuerza se integra mejor en la estructura de la queja. «Me consumía» conserva la condición descrita sin introducir una cópula pesada y mantiene la fluidez poética del verso.
- source_word: בַיּוֹם
  english_pob_choice: By day
  chosen_spanish: De día
  alternatives_spanish:
  - en el día
  - durante el día
  lexicon: HALOT
  rationale: Es una expresión temporal natural en español y preserva el contraste con «de noche».
- source_word: אֲכָלַנִי
  english_pob_choice: consumed me
  chosen_spanish: me consumía
  alternatives_spanish:
  - me devoraba
  - me comía
  lexicon: HALOT
  rationale: El verbo hebreo es figurado y expresa desgaste por las duras condiciones. «Me consumía» mantiene la imagen de ser desgastado sin sonar forzado en español.
- source_word: חֹרֶב
  english_pob_choice: the heat
  chosen_spanish: el calor
  alternatives_spanish:
  - el calor abrasador
  - el bochorno
  lexicon: HALOT
  rationale: En este paralelismo con la escarcha nocturna, el término apunta al calor ardiente del día. «El calor» es claro y fiel; «abrasador» sería una ampliación interpretativa.
- source_word: וְקֶרַח
  english_pob_choice: and the frost
  chosen_spanish: la escarcha
  alternatives_spanish:
  - el hielo
  - el frío
  lexicon: HALOT
  rationale: «Escarcha» reproduce el valor concreto de la palabra hebrea y conserva mejor el contraste con «el calor».
- source_word: בַּלָּיְלָה
  english_pob_choice: by night
  chosen_spanish: de noche
  alternatives_spanish:
  - por la noche
  - en la noche
  lexicon: HALOT
  rationale: Equivale naturalmente a la contraparte temporal de «de día» y sostiene el paralelismo del verso.
- source_word: וַתִּדַּד
  english_pob_choice: fled
  chosen_spanish: huía
  alternatives_spanish:
  - se alejaba
  - se escapaba
  lexicon: HALOT
  rationale: El verbo raro personifica el sueño como algo que se aparta. «Huía» conserva ese movimiento y la imagen literaria sin sobreexplicar.
- source_word: שְׁנָתִי
  english_pob_choice: my sleep
  chosen_spanish: el sueño
  alternatives_spanish:
  - mi sueño
  - mi dormir
  lexicon: HALOT
  rationale: En español, «el sueño» funciona bien como sustantivo de estado y evita una literalidad torpe; el sentido sigue siendo el de no poder dormir.
- source_word: מֵעֵינָי
  english_pob_choice: from my eyes
  chosen_spanish: de mis ojos
  alternatives_spanish:
  - de mis párpados
  lexicon: HALOT
  rationale: La expresión hebrea es una imagen idiomática de insomnio. «De mis ojos» la conserva de forma directa y comprensible.
translation_notes:
  revision_awareness: 'La versión coincide con el sentido del hebreo y con la solución óptima del audit trail inglés: conservar la antítesis día/noche, calor/escarcha y la personificación del sueño que se aparta de los ojos, integrando de manera natural el הָיִיתִי inicial.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - 'Se preserva el paralelismo poético con pares breves: «de día / de noche», «calor / escarcha», «el sueño / de mis ojos».'
  - Se evita una traducción demasiado mecánica de «me comió» para no romper el registro literario en español, aunque la metáfora subyacente sigue presente.
