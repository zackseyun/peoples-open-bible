review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del hebreo: entrega de la plata ya cuantificada, a personas responsables del trabajo en la casa de Yahvé, y posterior desembolso a oficios de construcción. Sin embargo, dos decisiones debilitan la fidelidad: (1) עֹשֵׂי הַמְּלָאכָה son los que hacen la obra, es decir, obreros/trabajadores, no primariamente «los encargados»; la noción de supervisión viene después en הַפְּקֻדִים. (2) וְלַבֹּנִים significa «a los constructores/edificadores», y «albañiles» estrecha demasiado el sentido. Además, «en mano de» suena menos natural que «en manos de» o una formulación equivalente, aunque la nota puede preservar el literal.'
  spanish_quality_summary: El español es claro y digno, pero «en mano de los encargados sobre la casa de Yahvé» suena algo forzado y poco natural. Una redacción como «en manos de los obreros que estaban puestos a cargo de la casa de Yahvé» conserva mejor el sentido y mejora la fluidez. «La pagaron» es aceptable, pero «la desembolsaron» sería más técnico; aun así, «la pagaron» puede mantenerse por claridad. El texto revisado mejora naturalidad sin perder textura hebrea.
  glossary_alignment: Se alinea bien con la política del proyecto al usar «Yahvé». «La plata pesada» corresponde adecuadamente a הַכֶּסֶף הַמְתֻכָּן. La principal desalineación terminológica está en haber trasladado la idea de supervisión a עֹשֵׂי הַמְּלָאכָה («los encargados») en vez de reservarla para הַפְּקֻדִים; y en usar «albañiles» donde el POB auditado prefirió «builders» por no restringir el campo semántico.
  issues:
  - severity: high
    issue: «los encargados» para עֹשֵׂי הַמְּלָאכָה
    rationale: El hebreo dice literalmente «los que hacen la obra / los obreros». La idea de nombramiento o supervisión aparece en הַפְּקֻדִים, no en este sintagma. La versión actual desplaza el énfasis semántico.
  - severity: medium
    issue: «albañiles» para וְלַבֹּנִים
    rationale: בֹּנִים es más amplio que albañiles. «Constructores» o «edificadores» preserva mejor el alcance del original y sigue la decisión inglesa auditada.
  - severity: low
    issue: «en mano de» suena rígido en español
    rationale: Aunque refleja el modismo עַל יַד, en español natural «en manos de» funciona mejor. La nota puede conservar el literal «en la mano de».
  revised_spanish_text: Y entregaron la plata pesada en manos[a] de los obreros que estaban puestos a cargo de la casa de Yahvé[b], y la pagaron a los carpinteros y a los constructores que trabajaban en la casa de Yahvé.
  revised_footnotes:
  - marker: a
    text: Literalmente, «en la mano de»; el giro hebreo expresa entrega a la custodia o responsabilidad de alguien.
    reason: lexical_alternative
  - marker: b
    text: Hebreo YHWH, el nombre divino; aquí se traduce «Yahvé» en lugar de sustituirlo por un título.
    reason: alternative_reading
  revision_rationale: 'La revisión corrige la distribución semántica del hebreo: «obreros» traduce עֹשֵׂי הַמְּלָאכָה, mientras «puestos a cargo de» recoge הַפְּקֻדִים. También amplía «albañiles» a «constructores» para no estrechar indebidamente בֹּנִים. Se mantiene «plata pesada» y «Yahvé», y se mejora la naturalidad de עַל יַד con «en manos», preservando el literal en nota.'
