  to: Y sus posesiones y sus asentamientos fueron Betel y sus aldeas[b], y al oriente Naarán[a], y al occidente Gezer y sus aldeas, y Siquem y sus aldeas, hasta Ayyah[c] y sus aldeas.
  rationale: Se reemplaza 'lugares de habitación' por 'asentamientos' para mejorar la naturalidad y precisión territorial. Se restaura la nota requerida sobre la lectura alternativa de Naarán/Naarah, se mantiene una sola nota cultural para el modismo 'aldeas hijas', y se conserva la variante textual de Ayyah/Gaza en el lugar correspondiente.
