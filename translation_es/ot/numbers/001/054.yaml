translation:
  language: es
  text: Los hijos de Israel hicieron conforme a todo lo que Yahvé había mandado a Moisés[a]; así hicieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los israelitas’ o ‘los hijos de Israel’. El hebreo dice literalmente ‘los hijos de Israel’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  english_pob_choice: did
  chosen_spanish: hicieron
  alternatives_spanish:
  - obraron
  - cumplieron
  - realizaron
  lexicon: HALOT / עשה
  rationale: El verbo עשה es amplio (‘hacer’/‘obrar’/‘cumplir’). En este contexto resumido de obediencia, ‘hicieron’ es natural en español y conserva el valor de acción realizada sin añadir matices no presentes en el hebreo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  - los niños de Israel
  lexicon: HALOT / בן
  rationale: El hebreo es literalmente masculino plural constructo. Se conserva ‘los hijos de Israel’ por fidelidad formal y por la fuerza del término bíblico, sin neutralizarlo a ‘israelitas’.
- source_word: כְּכֹל אֲשֶׁר
  english_pob_choice: according to all that
  chosen_spanish: conforme a todo lo que
  alternatives_spanish:
  - según todo lo que
  - de acuerdo con todo lo que
  - tal como todo lo que
  lexicon: HALOT
  rationale: La secuencia expresa conformidad completa con la orden recibida. ‘Conforme a todo lo que’ comunica bien la correspondencia total y suena natural en español bíblico contemporáneo.
- source_word: צִוָּה
  english_pob_choice: had commanded
  chosen_spanish: había mandado
  alternatives_spanish:
  - había ordenado
  - había comandado
  lexicon: HALOT / צוה
  rationale: צוה aquí es una orden divina previa a la acción de Israel. ‘Había mandado’ refleja bien la anterioridad verbal y evita un tono demasiado administrativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se mantiene el nombre divino en forma auditable y reconocible para el español, siguiendo la convención del proyecto para YHWH y evitando la sustitución por un título.
- source_word: אֶת מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: 'El marcador אֶת señala el objeto directo del verbo ‘mandar’. En español se expresa con la preposición ‘a’: ‘mandado a Moisés’.'
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de ese modo
  - de esa manera
  - entonces
  lexicon: HALOT
  rationale: כֵּן retoma y enfatiza la correspondencia exacta entre mandato y cumplimiento. ‘Así’ conserva la repetición enfática con fluidez en español.
- source_word: עָשׂוּ
  english_pob_choice: they did
  chosen_spanish: hicieron
  alternatives_spanish:
  - lo hicieron
  - cumplieron
  - actuaron
  lexicon: HALOT / עשה
  rationale: La repetición final reproduce el cierre enfático del hebreo. En español, repetir ‘hicieron’ mantiene la estructura sin recargar el verso.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa directamente el Tetragrámaton. La convención española del proyecto es ‘Yahvé’, conservando el nombre personal del Dios del pacto en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Formulación de obediencia total
  english_pob_reading: according to all that ... so they did
  chosen_spanish_reading: conforme a todo lo que ... así hicieron
  alternative_spanish_readings:
  - según todo lo que ... así hicieron
  - de acuerdo con todo lo que ... así hicieron
  rationale: El versículo enfatiza conformidad completa entre mandato y ejecución. ‘Conforme a todo lo que’ + ‘así hicieron’ preserva la repetición y la obediencia integral sin suavizarla.
  doctrine_reference: 'Éxodo/Números: fidelidad a la orden divina en narrativas legales y cultuales'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el inglés auditado, pero reexpresa la sintaxis para español natural: ‘conforme a todo lo que’ por ‘according to all that’, ‘había mandado’ por el pluscuamperfecto inglés, y ‘Yahvé’ como forma española del nombre divino según la convención del proyecto. No se detectan cambios sustantivos requeridos respecto del pass más reciente.'
  spanish_consistency_notes:
  - Se conserva la repetición enfática final del hebreo con ‘así hicieron’.
  - Se mantiene el masculino plural explícito ‘los hijos de Israel’ por fidelidad al original.
  - No se neutraliza el nombre divino ni se sustituye por ‘SEÑOR’.
  - La preposición ‘a’ en ‘mandado a Moisés’ refleja el objeto directo marcado en hebreo.
