review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del arameo: inferencia inicial, compra con los fondos, lista sacrificial, y ofrenda sobre el altar en Jerusalén. Sin embargo, se aparta innecesariamente de una decisión léxica importante del POB auditado en בְּכַסְפָּא דְנָה al poner «dinero» en el texto principal, cuando el inglés preservó deliberadamente «silver/plata» y relegó «money/dinero» a nota. También falta en español la nota sobre el matiz de אָסְפַּרְנָא («diligentemente / cuidadosamente / exactamente»), que el audit trail consideró significativa.'
  spanish_quality_summary: El español es claro, natural y de registro bíblico moderno. «Toros, carneros, corderos» y «la casa de tu Dios» funcionan bien. «Libaciones» es aceptable y culto. No obstante, «diligentemente» suena algo rígido; «con diligencia» sería más idiomático, aunque no indispensable. La reparación principal es terminológica y de notas, no de legibilidad general.
  glossary_alignment: 'No hay conflictos con términos teológicos mayores del glosario del proyecto. Sí hay desalineación con la política de preservar la literalidad significativa documentada en el audit trail: «silver» debe reflejarse como «plata» en el texto principal con nota alternativa para «dinero». También conviene conservar la nota léxica sobre el adverbio intensivo.'
  issues:
  - severity: medium
    issue: «con este dinero» en lugar de «con esta plata»
    rationale: El source dice literalmente «plata», y el English POB escogió preservarlo en el texto principal por valor lexical. Pasarlo a «dinero» en el texto principal invierte la decisión auditada; la función monetaria puede quedar en nota.
  - severity: low
    issue: Falta nota sobre «diligentemente»
    rationale: El audit trail inglés marcó como significativa la amplitud semántica de אָסְפַּרְנָא («carefully/exactly»). El español debería conservar esa alternativa, ya que también en español el adverbio puede requerir aclaración.
  - severity: low
    issue: Orden y anclaje de notas mejorables
    rationale: Las notas actuales solo anclan «dinero» y «Jerusalén», pero al revisar «plata» conviene reordenarlas secuencialmente y anclar cada nota en el punto relevante del texto.
