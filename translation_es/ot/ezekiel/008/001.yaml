  text: וַ/יְהִ֣י בַּ/שָּׁנָ֣ה הַ/שִּׁשִּׁ֗ית בַּ/שִּׁשִּׁי֙ בַּ/חֲמִשָּׁ֣ה לַ/חֹ֔דֶשׁ אֲנִי֙ יוֹשֵׁ֣ב בְּ/בֵיתִ֔/י וְ/זִקְנֵ֥י יְהוּדָ֖ה יוֹשְׁבִ֣ים לְ/פָנָ֑/י וַ/תִּפֹּ֤ל עָלַ/י֙ שָׁ֔ם יַ֖ד אֲדֹנָ֥/י יְהֹוִֽה׀׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/008/001.yaml
  text: And it happened in the sixth year[a], in the sixth month, on the fifth day of the month, as I was sitting in my house and the elders of Judah were sitting before me[b], that the hand of the Lord GOD fell upon me there.
  footnotes:
  - marker: a
    text: 'Hebrew: ''there the hand of the Lord GOD fell upon me.'' Some translations render ''there'' as ''then,'' but the Hebrew adverb is literally locative.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the Lord Yahweh'; Hebrew אֲדֹנָי יְהוִה, a title-plus-divine-name combination traditionally rendered 'Lord GOD.'
    reason: alternative_reading
