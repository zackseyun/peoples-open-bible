source:
  edition: SBLGNT
  text: ἄρατε τὸν ζυγόν μου ἐφ’ ὑμᾶς καὶ μάθετε ἀπ’ ἐμοῦ, ὅτι πραΰς εἰμι καὶ ταπεινὸς τῇ καρδίᾳ, καὶ εὑρήσετε ἀνάπαυσιν ταῖς ψυχαῖς ὑμῶν·
base_translation:
  language: en
  yaml_path: translation/nt/matthew/011/029.yaml
  text: 'Take my yoke upon you and learn from me[a], because I am gentle and humble in heart, and you will find rest for your souls.'
  footnotes:
  - marker: a
    text: Or 'meek and lowly in heart.'
    reason: lexical_alternative
translation:
  language: ko
  text: '내 멍에를 너희 위에 메고 내게 배워라. 나는 마음이 온유하고 겸손하기 때문이다. 그러면 너희가 너희 영혼이 쉴 안식을 얻을 것이다.'
  philosophy: optimal-equivalence
theological_decisions:
- issue: 11:29 「멍에」의 비유 — 율법 학습 전통과 그리스도의 멍에
  chosen_reading: 「내 멍에를 너희 위에 메고 ... 배워라」
  alternative_readings:
  - 「내 가르침을 받으라」 식의 완화
  rationale: 제2성전기 유대 전통에서 「토라의 멍에」는 율법 학습과 순종을 가리키는 정형 표현이다. 본문은 그 전통을 의도적으로 사용하면서, 「내 멍에」로 그리스도의 가르침과 인격에 대한 결속으로 옮긴다. 한국어 「멍에를 메고 ... 배워라」로 직역하여 이 비유 구조를 보존한다.
  doctrine_reference: 'DOCTRINE.md: §1 원어 우선'
