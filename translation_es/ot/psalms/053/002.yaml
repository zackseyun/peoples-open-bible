    rationale: La auditoría inglesa documenta explícitamente «injustice» como opción elegida para mantener la dimensión ética-social del sustantivo. «Iniquidad» no es imposible, pero desplaza el matiz y se aparta de la razón léxica aprobada sin necesidad.
  - severity: medium
    issue: La nota al pie [a] está anclada en «corazón» aunque su contenido trata la cláusula «abominable injusticia».
    rationale: El proyecto exige que cada nota esté anclada en la palabra o frase pertinente dentro de `spanish_text`. Tal como está, el marcador induce al lector a pensar que la variante afecta «en su corazón», lo cual es incorrecto.
  - severity: low
    issue: «Han cometido iniquidad abominable» es menos natural en español e introduce una construcción algo rígida.
    rationale: Una formulación como «cometen injusticia abominable» o «cometen injusticia detestable» suena más directa y refleja mejor la combinación verbal nominal del hebreo y la decisión del POB inglés.
  revised_spanish_text: 'El necio dice en su corazón: «No hay Dios». Ellos se han corrompido; cometen injusticia abominable[a]; no hay quien haga el bien.'
