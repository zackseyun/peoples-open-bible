  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה se vierte correctamente como «Yahvé»; no hay conflictos con otros términos doctrinales del glosario. La decisión de mantener el modismo «mano de Yahvé» es correcta. La cláusula final puede mantenerse como «fueron consumidos», pero debe documentarse con nota por las alternativas «llegaron a su fin» / «perecieron», ya presentes en el inglés auditado.'
