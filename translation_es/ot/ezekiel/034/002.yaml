translation:
  language: es
  text: '«Hijo de hombre, profetiza contra los pastores de Israel; profetiza y diles, a los pastores[b]: “Así dice el Señor, Yahvé: ¡Ay de los pastores de Israel que se han apacentado[a] a sí mismos! ¿No deberían los pastores apacentar al rebaño[b]?”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que se alimentan a sí mismos». El verbo hebreo es el mismo verbo pastoral usado en todo el versículo; el sentido es que los líderes de Israel se cuidaban a sí mismos en lugar de al rebaño.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «las ovejas». Se vierte «el rebaño» por el sentido colectivo y por la continuidad de la imagen pastoral.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - ser humano
  - hijo de Adán
  lexicon: HALOT
  rationale: Conserva el vocativo idiomático de Ezequiel y su fuerza singular, sin explicarlo como una frase genérica que perdería el tono profético.
- source_word: הִנָּבֵא
  english_pob_choice: prophesy
  chosen_spanish: profetiza
  alternatives_spanish:
  - habla proféticamente
  lexicon: HALOT
  rationale: Es el imperativo profético natural en español y mantiene la repetición enfática del hebreo.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - acerca de
  - sobre
  lexicon: HALOT
  rationale: En un oráculo de juicio, la preposición tiene valor adversativo; 'contra' comunica mejor la dirección del reproche.
- source_word: רוֹעֵי יִשְׂרָאֵל / לָרֹעִים / הָרֹעִים
  english_pob_choice: the shepherds of Israel / the shepherds / the shepherds
  chosen_spanish: los pastores de Israel / los pastores
  alternatives_spanish:
  - los dirigentes de Israel
  - los pastores
  lexicon: HALOT
  rationale: Se conserva la metáfora de pastor para no aplanar el texto en 'dirigentes'; el verso desarrolla el campo léxico con 'rebaño' y 'apacentar'.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para יְהוִה: ''Yahvé'' en el texto principal. ''Señor'' traduce אֲדֹנָי como título distinto del nombre divino.'
- source_word: הוֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de
  alternatives_spanish:
  - ¡Ay!
  - ¡Pobre de
  lexicon: HALOT
  rationale: Introduce el oráculo de juicio con la misma carga profética que 'Woe' en inglés.
- source_word: אֲשֶׁר הָיוּ רֹעִים אוֹתָם
  english_pob_choice: who have been shepherding themselves
  chosen_spanish: que se han estado apacentando a sí mismos
  alternatives_spanish:
  - que se apacientan a sí mismos
  - que se pastorean a sí mismos
  lexicon: HALOT
  rationale: El hebreo mantiene el verbo de pastoreo con sentido reflexivo. 'Apacentando' preserva mejor la imagen pastoral que una simple paráfrasis de 'cuidarse'.
- source_word: הֲלוֹא
  english_pob_choice: Should not
  chosen_spanish: ¿No deberían
  alternatives_spanish:
  - ¿Acaso no deben?
  - ¿No deben acaso?
  lexicon: HALOT
  rationale: Mantiene la pregunta retórica con expectativa afirmativa y un español natural.
- source_word: הַצֹּאן
  english_pob_choice: the flock
  chosen_spanish: el rebaño
  alternatives_spanish:
  - las ovejas
  - el ganado
  lexicon: HALOT
  rationale: Aunque literalmente alude a 'las ovejas', 'el rebaño' preserva el sentido colectivo y armoniza con la metáfora pastoral del versículo.
- source_word: יִרְעוּ
  english_pob_choice: shepherd
  chosen_spanish: apacentar
  alternatives_spanish:
  - pastorear
  - cuidar
  lexicon: HALOT
  rationale: En español, 'apacentar' mantiene el verbo pastoral y su relación con 'pastores'; además permite conservar el juego verbal del hebreo sin forzar 'pastorear' en una pregunta retórica.
theological_decisions:
- issue: Nombre divino en la fórmula אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: El proyecto establece Yahvé para YHWH; como אֲדֹנָי también está presente, 'Señor Yahvé' expresa ambos elementos sin ocultar el nombre divino ni redundar en 'Señor Señor'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Si traducir la metáfora de 'pastores' como 'dirigentes'
  english_pob_reading: Retain 'shepherds' metaphor in the main text
  chosen_spanish_reading: Retener 'pastores' en el texto principal
  alternative_spanish_readings:
  - los dirigentes de Israel
  - los líderes de Israel
  rationale: La figura pastoral estructura todo el versículo; traducirla como 'dirigentes' debilitaría la coherencia literaria y la tensión acusatoria del pasaje.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #5'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios sustantivos. La cruz de control informó acuerdo alto y sin observaciones, así que se preservan tanto la metáfora pastoral como el nombre divino Yahvé en la fórmula profética.'
  spanish_consistency_notes:
  - Se mantiene el vocativo bíblico «Hijo de hombre» para Ezequiel, coherente con el registro profético.
  - Se usa «Yahvé» para YHWH y «Señor» para אֲדֹנָי, evitando confundir título y nombre divino.
  - Se conserva el campo léxico pastoral con «pastores», «apacentar» y «rebaño».
  - La puntuación reproduce el tono oracular y la separación de la cita profética.
  - Las notas usan marcadores únicos y están ancladas en el texto donde corresponde.
