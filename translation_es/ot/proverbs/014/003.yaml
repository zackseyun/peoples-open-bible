translation:
  language: es
  text: En la boca del necio hay una vara de orgullo[a], pero los labios de los sabios los guardarán[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «un brote de orgullo». El hebreo חֹטֶר puede significar «vara», pero en otros contextos también «brote» o «rama»; aquí se ha preferido «vara» por encajar mejor con el tono de advertencia del proverbio.
    reason: lexical_alternative
  - marker: b
    text: El pronombre «los» probablemente se refiere a los sabios, es decir, los labios de los sabios guardan a sus dueños. El hebreo deja esa referencia de forma comprimida, y la traducción conserva esa ambigüedad.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּפִי
  english_pob_choice: In the mouth of
  chosen_spanish: En la boca de
  alternatives_spanish:
  - Por la boca de
  - De la boca de
  lexicon: HALOT
  rationale: La preposición ב con פֶּה funciona aquí de manera locativa, indicando lo que está dentro o sale de la boca del necio. «En la boca de» conserva la imagen hebrea y la forma proverbial sin volverlo explicativo en exceso.
- source_word: אֱוִיל
  english_pob_choice: a fool
  chosen_spanish: el necio
  alternatives_spanish:
  - un necio
  - el tonto
  - una persona necia
  lexicon: HALOT
  rationale: אֱוִיל es el término sapiencial para una persona moralmente torpe o rebelde, más que simplemente poco inteligente. «Nececio» transmite mejor esa carga en español bíblico contemporáneo que «tonto».
- source_word: חֹטֶר
  english_pob_choice: a rod
  chosen_spanish: una vara
  alternatives_spanish:
  - un brote
  - una rama
  - un cetro
  lexicon: HALOT
  rationale: Aunque חֹטֶר puede significar «brote» o «rama», en este proverbio la imagen funciona mejor como un objeto de castigo o de autoridad. «Vara» conserva la fuerza metafórica del hebreo y el matiz admonitorio que la POB inglesa resolvió con «rod».
- source_word: גַּאֲוָה
  english_pob_choice: of pride
  chosen_spanish: de orgullo
  alternatives_spanish:
  - de arrogancia
  - de soberbia
  lexicon: HALOT
  rationale: גַּאֲוָה puede expresar orgullo, altivez o arrogancia. «Orgullo» es la equivalencia más directa y natural aquí; mantiene el genitivo compacto del hebreo sin ampliar el sentido más de lo necesario.
- source_word: וְשִׂפְתֵי
  english_pob_choice: but the lips of
  chosen_spanish: pero los labios de
  alternatives_spanish:
  - y los labios de
  lexicon: HALOT
  rationale: Aunque ו puede ser simplemente «y», el paralelismo proverbial aquí es claramente contrastivo. «Pero» reproduce mejor el contraste entre la primera y la segunda línea que un simple «y».
- source_word: חֲכָמִים
  english_pob_choice: the wise
  chosen_spanish: los sabios
  alternatives_spanish:
  - los мудios
  - los prudentes
  - la gente sabia
  lexicon: HALOT
  rationale: El plural adjetival funciona sustantivamente. «Los sabios» es idiomático en español y conserva la referencia de clase representativa sin explicitar de más.
- source_word: תִּשְׁמוּרֵם
  english_pob_choice: will guard them
  chosen_spanish: los guardarán
  alternatives_spanish:
  - los protegerán
  - los preservarán
  - guardarán a sus dueños
  lexicon: HALOT
  rationale: El verbo שׁמר significa guardar, proteger o preservar. El sufijo pronominal de 3ª plural es directo, pero su antecedente es comprimido en hebreo. «Los guardarán» respeta esa concisión y mantiene la ambigüedad heredada del original, sin resolverla de manera más interpretativa de lo que el texto exige.
translation_notes:
  revision_awareness: El texto hebreo y la auditoría inglesa están en alto acuerdo; no se aplicaron revisiones. La traducción española sigue la decisión inglesa de mantener «rod/vara» frente a «shoot/brote» por razones contextuales, y preserva la ambigüedad del pronombre final.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se mantiene el lenguaje sapiencial con «necio» y «sabios», consistente con el registro del libro de Proverbios.
  - Se conserva el contraste proverbial con «pero» para reflejar la antítesis semítica entre los dos miembros.
  - La ambigüedad del objeto de «los guardarán» se deja abierta, como en el audit trail inglés.
