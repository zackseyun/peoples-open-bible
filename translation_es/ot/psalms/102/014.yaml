translation:
  language: es
  text: Tú te levantarás y tendrás compasión de Sion, porque es tiempo de mostrarle favor[a], porque ha llegado el tiempo señalado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «serle favorable» o «serle propicio».
    reason: lexical_alternative
  - marker: b
    text: O «el tiempo fijado ha llegado».
    reason: lexical_alternative
lexical_decisions:
- source_word: תָקוּם
  english_pob_choice: you will arise
  chosen_spanish: tú te levantarás
  alternatives_spanish:
  - te levantarás
  - tú surgirás
  - te alzarás
  lexicon: HALOT
  rationale: 'Qal imperfecto 2ms de קום: en este contexto expresa una acción futura dirigida a Dios. «Te levantarás» conserva la imagen antropomórfica y la fuerza verbal, igual que el inglés POB «you will arise», sin volverla una paráfrasis más explicativa.'
- source_word: תְּרַחֵם
  english_pob_choice: have compassion
  chosen_spanish: tendrás compasión
  alternatives_spanish:
  - tendrás misericordia
  - mostrarás compasión
  - te compadecerás
  lexicon: HALOT
  rationale: Piel imperfecto 2ms de רחם comunica acto de compasión/clemencia. «Tendrás compasión» es natural en español y preserva el matiz afectivo; «tendrás misericordia» sería posible, pero puede sonar más teológico-tradicional y menos directo.
- source_word: צִיּוֹן
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Zion
  - Jerusalén
  lexicon: HALOT
  rationale: Se conserva el nombre propio como referente textual. En español bíblico es común «Sion»; no se reemplaza por «Jerusalén» porque el hebreo nombra Sion de forma explícita.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque, en efecto
  lexicon: HALOT
  rationale: La conjunción introduce la base o razón de la expectativa. «Porque» expresa con claridad la relación explicativa en español y permite mantener la doble cláusula causal del hebreo.
- source_word: עֵת
  english_pob_choice: it is time
  chosen_spanish: es tiempo
  alternatives_spanish:
  - ha llegado el momento
  - es el momento
  - ya es tiempo
  lexicon: HALOT
  rationale: עֵת significa «tiempo/momento». «Es tiempo» reproduce de manera idiomática la estructura impersonal del inglés POB y comunica el giro decisivo del pasaje sin añadir contenido ajeno.
- source_word: לְחֶנְנָהּ
  english_pob_choice: to show her favor
  chosen_spanish: de mostrarle favor
  alternatives_spanish:
  - de serle favorable
  - de serle gracioso
  - de tener misericordia de ella
  lexicon: HALOT
  rationale: El infinitivo constructo de חנן con sufijo femenino se refiere a Sion. «Mostrarle favor» conserva el sentido de benevolencia/gracia sin forzar el giro tradicional «serle gracioso», que en español resulta menos natural. Se mantiene «favor» para preservar la amplitud semántica documentada por el POB.
- source_word: בָא
  english_pob_choice: has come
  chosen_spanish: ha llegado
  alternatives_spanish:
  - ha venido
  - ha venido ya
  - llegó
  lexicon: HALOT
  rationale: 'Perfecto 3ms de בוא: el tiempo señalado se presenta como ya arribado. «Ha llegado» expresa bien el valor perfectivo y el efecto presente de la llegada.'
- source_word: מוֹעֵד
  english_pob_choice: the appointed time
  chosen_spanish: el tiempo señalado
  alternatives_spanish:
  - el tiempo fijado
  - el tiempo назначado
  - el plazo establecido
  lexicon: HALOT
  rationale: מוֹעֵד denota tiempo señalado/apuntado por designación. «Tiempo señalado» suena natural en español y preserva tanto la idea de fijación como la de designación; se evita «set time» calco del inglés por resultar menos idiomático.
theological_decisions:
- issue: Cómo expresar el objeto de la compasión divina sin interpretarlo
  english_pob_reading: Retain 'Zion' as the named object of divine compassion.
  chosen_spanish_reading: Mantener «Sion» como objeto nombrado de la compasión divina.
  alternative_spanish_readings:
  - Jerusalén
  - el pueblo de Dios
  rationale: El hebreo nombra Sion directamente. Aunque puede tener resonancias más amplias, la traducción debe preservar el referente textual y dejar que las asociaciones canónicas surjan del contexto, no de una explicitación interpretativa en el cuerpo del versículo.
  doctrine_reference: Principio de primacía del texto original; transliteración de nombres propios; evitar expansión interpretativa sin base textual.
translation_notes:
  revision_awareness: 'Revisión acorde con el paquete de fuente y la auditoría inglesa: no se detectaron cambios posteriores aplicados al texto base; se mantiene la lectura alta-agreement y la equivalencia óptima del POB inglés.'
  spanish_consistency_notes:
  - Se usa «Sion» como nombre propio bíblico, coherente con el texto hebreo y la práctica del POB de retener nombres.
  - «Favor» se conserva en nota para reflejar la amplitud de חנן junto con la opción principal «mostrarle favor».
  - «Tiempo señalado» mantiene la idea de un momento fijado/determinado sin introducir una terminología litúrgica no presente en el hebreo.
  - La puntuación reproduce la progresión causal del hebreo con dos cláusulas introducidas por «porque».
