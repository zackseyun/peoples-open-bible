review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: una instrucción escrita para dar provisión a los levitas hasta la finalización de la casa y la edificación de Jerusalén. Conserva correctamente «la casa» con nota alternativa a «el templo», y también la nota sobre «reedificada».'
  spanish_quality_summary: El español es claro y digno, pero la secuencia verbal «se terminara ... fuera construida» suena menos natural y menos paralela de lo deseable en español bíblico moderno. «Fuera construida» además resulta algo forzado frente a «fuera edificada» o una construcción con subjuntivo activo/pasivo refleja. Conviene una leve reparación estilística manteniendo la literalidad.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Levitas» y «la casa» están bien. «Sustento» es aceptable para χορηγία, aunque «provisión» también sería posible; no requiere cambio. No hay términos teológicos sensibles aquí.
  issues:
  - severity: medium
    issue: Paralelismo verbal poco natural en «se terminara la casa ... y Jerusalén fuera construida».
    rationale: Ambas cláusulas dependen del mismo marco temporal; en español suena más natural y equilibrado usar dos formas paralelas, p. ej. «se terminara ... y Jerusalén fuera edificada». Esto preserva el sentido sin alterar la base griega.
  - severity: low
    issue: «Construida» es correcto pero menos idiomático en este contexto de ciudad restaurada.
    rationale: Aunque el griego dice simplemente ‘ser construida’, en registro bíblico español «edificada» suele sonar más natural para ciudad/obra urbana, y mantiene la cercanía léxica con οἰκοδομηθῆναι sin introducir explícitamente ‘re-’.
  revised_spanish_text: Y escribió que se diera sustento a los levitas hasta el día en que se terminara la casa[a] y Jerusalén fuera edificada[b].
  revised_footnotes:
  - marker: a
    text: O «el templo» para «la casa»; el griego dice literalmente «la casa», una manera común de referirse al templo en este contexto.
    reason: lexical_alternative
  - marker: b
    text: O «Jerusalén fuera reedificada». El contexto es de restauración, aunque el verbo griego simplemente dice «ser edificada».
    reason: lexical_alternative
  revision_rationale: 'Se hace una reparación menor de estilo y naturalidad: «edificada» representa bien οἰκοδομηθῆναι, suena más idiomático en este contexto y mejora el paralelismo con «se terminara», sin apartarse de la decisión inglesa de no forzar explícitamente la idea de ‘re-’ en el texto principal.'
