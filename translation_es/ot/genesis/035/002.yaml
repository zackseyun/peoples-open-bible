translation:
  language: es
  text: 'Entonces Jacob dijo a su casa y a todos los que estaban con él: «Quiten los dioses ajenos[a] que hay entre ustedes, purifíquense[b] y cambien sus vestidos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'dioses extraños' o 'dioses de los extranjeros'.
    reason: lexical_alternative
  - marker: b
    text: '''Purifíquense'' puede referirse a una limpieza ritual en preparación para acercarse a Dios.'
    reason: cultural_note
lexical_decisions:
- source_word: בֵּיתוֹ
  english_pob_choice: his household
  chosen_spanish: su casa
  alternatives_spanish:
  - su familia
  - su casa y su gente
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'su casa', pero aquí designa al grupo doméstico de Jacob, no el edificio. 'Su casa' conserva la forma de la fuente y en español puede abarcar ese colectivo; se complementa con 'todos los que estaban con él' para hacer explícito el referente humano.
- source_word: כָּל אֲשֶׁר עִמּוֹ
  english_pob_choice: all who were with him
  chosen_spanish: todos los que estaban con él
  alternatives_spanish:
  - toda la gente que iba con él
  - todos los que iban con él
  lexicon: HALOT
  rationale: La frase apunta a las personas que acompañaban a Jacob. 'Estaban con él' es natural en español y mantiene el sentido personal sin añadir detalles que el hebreo no expresa.
- source_word: הָסִרוּ
  english_pob_choice: Put away
  chosen_spanish: Quiten
  alternatives_spanish:
  - Aparten
  - Retiren
  lexicon: HALOT
  rationale: El imperativo exige sacar de en medio objetos ilícitos. 'Quiten' expresa bien la orden de removerlos y funciona con naturalidad en español moderno.
- source_word: אֱלֹהֵי הַנֵּכָר
  english_pob_choice: the foreign gods
  chosen_spanish: los dioses ajenos
  alternatives_spanish:
  - los dioses extranjeros
  - los dioses de los extranjeros
  - los dioses extraños
  lexicon: HALOT
  rationale: POB opta por 'foreign gods' para el contraste con Yahvé; en español 'ajenos' conserva la idea de pertenencia extraña y resulta idiomático. 'Extranjeros' podría sonar más geográfico que cultual, y 'extraños' puede sugerir rareza más que alteridad.
- source_word: בְּתֹכְכֶם
  english_pob_choice: that are among you
  chosen_spanish: que hay entre ustedes
  alternatives_spanish:
  - que están en medio de ustedes
  - que están entre ustedes
  lexicon: HALOT
  rationale: La expresión hebrea significa 'en medio de ustedes/entre ustedes' y puede incluir presencia y posesión. 'Que hay entre ustedes' conserva esa amplitud y suena natural después de 'los dioses ajenos'.
- source_word: וְהִטַּהֲרוּ
  english_pob_choice: purify yourselves
  chosen_spanish: purifíquense
  alternatives_spanish:
  - límpiense
  - háganse puros
  lexicon: HALOT
  rationale: El verbo hitpael tiene fuerza reflexiva y, por el contexto de preparación para acercarse a Dios, conviene mantener una resonancia ritual. 'Purifíquense' reproduce esa carga mejor que 'límpiense', que en español podría sonar demasiado general.
- source_word: וְהַחֲלִיפוּ
  english_pob_choice: change
  chosen_spanish: cambien
  alternatives_spanish:
  - pongan otros
  - reemplazen
  lexicon: HALOT
  rationale: Con el objeto directo 'vestidos', el verbo significa cambiar de ropa. 'Cambien' es la equivalencia más directa y natural en español.
- source_word: שִׂמְלֹתֵיכֶם
  english_pob_choice: your clothes
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - su ropa
  - sus prendas
  - sus vestiduras
  lexicon: HALOT
  rationale: '''Vestidos'' mantiene el sentido de prendas exteriores y es suficientemente digno para un texto bíblico. ''Vestiduras'' sería más solemne, pero menos transparente para el lector contemporáneo; ''ropa'' es más general.'
theological_decisions:
- issue: Alcance de la purificación
  english_pob_reading: Render the command in a way that preserves possible ritual/covenantal purification without specifying more than the text states.
  chosen_spanish_reading: Mantener un mandato de purificación con posible trasfondo ritual o de preparación para presentarse ante Dios, sin precisar un rito concreto.
  alternative_spanish_readings:
  - '''Límpiense'' con un sentido más general'
  - '''Santifíquense'' con mayor especificidad cultual'
  rationale: El contexto inmediato combina la eliminación de ídolos con una exhortación a purificarse y cambiar de ropa, lo que sugiere preparación ritual. 'Purifíquense' conserva esa tensión sin convertirla en un término teológico más técnico de lo que el verso exige.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y coincide con la línea de revisión final del inglés POB, sin cambios requeridos por la auditoría cruzada de alta concordancia.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma predeterminada en el proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - '''Dioses ajenos'' evita la traducción eclesiástica tradicional que podría suavizar el contraste cultual del hebreo.'
  - '''Vestidos'' se eligió por claridad moderna y tono digno, sin perder el matiz de prendas exteriores.'
