theological_decisions:
- issue: Cultic terminology for Israel's temple rites
  chosen_reading: Retain specific sacrificial categories ('whole burnt offerings,' 'sacrifices,' 'drink offerings') rather than flattening them into generic worship language.
  alternative_readings:
  - Use broader terms such as 'offerings' or 'acts of worship'
  rationale: The verse catalogs concrete temple practices being suppressed. Preserving the distinctions reflects the source text's concern with the dismantling of Israel's sacrificial system, without importing later theological claims.
  doctrine_reference: Translation philosophy §§1, 5
