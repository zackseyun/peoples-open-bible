  text: But from those who were reputed to be something—whatever they once were makes no difference to me[a]; God shows no partiality—to me, indeed[c][b], those of reputation added nothing.
  footnotes:
  - marker: a
    text: 'Or ''those who seemed to be something.'''
    reason: lexical_alternative
  - marker: b
    text: 'Literally, ''God does not receive the face of a man,'' an idiom meaning ''God shows no partiality.'''
    reason: cultural_note
  - marker: c
    text: 'Or ''imposed nothing further on me.'''
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 무엇인가 인정받는 이들에게서—그들이 한때 어떠했든 나에게는 아무 차이가 없습니다. 하나님은 사람의 얼굴을 보지 않으십니다[a]—사실 그 인정받는 이들은 나에게 아무것도 더해 주지 않았습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 직역하면 「하나님은 사람의 얼굴을 받지 않으신다」. 「하나님은 사람의 외모를 보지 않으신다」는 뜻의 관용 표현이다.
    reason: idiom
