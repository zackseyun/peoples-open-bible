translation:
  language: es
  text: Allanaron caminos ásperos antes de su entrada[a]; abrieron puertas para Jerusalén[b]; coronaron sus muros[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde su entrada». El griego usa una expresión algo abrupta; aquí se entiende como preparación previa a su entrada.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «hacia Jerusalén».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «guirnaldearon sus muros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡμάλισαν
  english_pob_choice: made ... smooth
  chosen_spanish: aplanaron
  alternatives_spanish:
  - alisaron
  - allanaron
  lexicon: BDAG
  rationale: El verbo expresa hacer liso o nivelado un camino. «Aplanaron» conserva la imagen concreta de preparar una vía y suena natural en español.
- source_word: ὁδοὺς τραχείας
  english_pob_choice: rough roads
  chosen_spanish: caminos ásperos
  alternatives_spanish:
  - caminos escabrosos
  - rutas ásperas
  lexicon: BDAG
  rationale: «Caminos ásperos» mantiene la combinación sustantivo-adjetivo y refleja la aspereza/dureza del terreno sin forzar un calco rígido.
- source_word: ἀπὸ εἰσόδου αὐτοῦ
  english_pob_choice: before his entrance
  chosen_spanish: antes de su entrada
  alternatives_spanish:
  - desde su entrada
  - para su entrada
  lexicon: BDAG
  rationale: La preposición griega es difícil si se vierte literalmente. En contexto, la frase expresa preparación previa a la entrada del personaje, por eso «antes de su entrada» reproduce mejor el sentido que un «desde» demasiado extraño.
- source_word: ἤνοιξαν πύλας
  english_pob_choice: they opened gates
  chosen_spanish: abrieron puertas
  alternatives_spanish:
  - abrieron las puertas
  - abrieron portones
  lexicon: BDAG
  rationale: «Puertas» comunica de manera clara y bíblica la imagen de acceso urbano; el griego no exige artículo definido en español.
- source_word: ἐπὶ Ἰερουσαλήμ
  english_pob_choice: for Jerusalem
  chosen_spanish: para Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  - en favor de Jerusalén
  lexicon: BDAG
  rationale: Con «puertas», ἐπί expresa orientación o relación final. «Para Jerusalén» conserva esa dirección funcional y sigue la revisión auditada del inglés.
- source_word: ἐστεφάνωσαν
  english_pob_choice: crowned
  chosen_spanish: coronaron
  alternatives_spanish:
  - guirnaldearon
  - rodearon
  lexicon: BDAG
  rationale: El verbo es literalmente «coronar». Mantenerlo preserva la imagen triunfal y ceremonial del texto.
- source_word: τείχη αὐτῆς
  english_pob_choice: her walls
  chosen_spanish: sus muros
  alternatives_spanish:
  - los muros de ella
  - los muros de Jerusalén
  lexicon: BDAG
  rationale: El pronombre femenino remite a Jerusalén personificada. «Sus muros» conserva la referencia natural en español sin perder la personificación.
translation_notes:
  revision_awareness: Se siguió el tramo final del audit trail inglés, que corrigió la relación de ἀπὸ εἰσόδου αὐτοῦ hacia un sentido de preparación previa («before his entrance»). Para el segundo hemistiquio se mantuvo la orientación funcional de ἐπὶ Ἰερουσαλήμ como relación respecto de Jerusalén, no una lectura puramente literal de movimiento sobre/contra.
  spanish_consistency_notes:
  - 'Se preservó el paralelismo de tres miembros: caminos, puertas, muros.'
  - Se evitó la máscara litúrgica de «SEÑOR» porque no aparece el Tetragrámaton en este versículo.
  - «Jerusalén» se trató como ciudad personificada, coherente con «sus muros».
  - El español mantiene un tono bíblico claro sin depender de formulaciones tradicionales fijas cuando el griego permite una expresión más directa.
