theological_decisions:
- issue: Characterization of the people's speech toward God
  chosen_reading: Rendered the verb phrase as hostile complaint ('spoke against God and against Moses') rather than neutral speech.
  alternative_readings:
  - spoke to God and to Moses
  - spoke about God and Moses
  rationale: The immediate quotation is accusatory and resentful, so a neutral rendering would understate the rebellion. This is a contextual lexical decision, not a doctrinal expansion.
  doctrine_reference: Translation philosophy §1, §3
