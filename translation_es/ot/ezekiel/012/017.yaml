lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y vino
  alternatives_spanish:
  - Y sucedió
  - Y aconteció
  lexicon: HALOT
  rationale: El waw consecutivo introduce aquí una fórmula narrativa/secuencial estándar. En español, 'Y vino' conserva el movimiento verbal del original sin caer en un calco pesado como 'y sucedió' o 'y aconteció'.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - un mensaje
  - la voz
  lexicon: HALOT
  rationale: En la fórmula profética דְבַר יְהוָה, 'la palabra' es la equivalencia más precisa y establecida para una comunicación divina específica, no indefinida.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: La convención del proyecto en español es usar 'Yahvé' para el Tetragrámaton, preservando el nombre propio divino en lugar de sustituirlo por un título.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona singular expresa dirección hacia el receptor de la revelación. 'A mí' es natural y directo en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - con estas palabras
  lexicon: HALOT
  rationale: El infinitivo constructo introduce el habla directa. 'Diciendo' preserva la estructura formular y prepara la cita siguiente sin añadir paráfrasis.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Jehová
  rationale: El texto hebreo usa explícitamente el nombre propio divino. Mantener 'Yahvé' conserva esa distinción y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca en el texto español junto a la referencia al nombre divino. No se hicieron cambios de sentido respecto del flujo auditado; solo se ajustó la anclación de la nota y la convención española para el Tetragrámaton.
  spanish_consistency_notes:
  - Se usó 'Yahvé' de forma consistente con la convención del proyecto para יְהוָה.
  - Se mantuvo la fórmula profética breve y directa, sin expandirla a una paráfrasis.
  - '''La palabra'' conserva el carácter técnico de la expresión profética.'
  - '''Diciendo'' refleja el לֵאמֹר como introducción a discurso directo.'
