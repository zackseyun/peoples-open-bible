base_translation:
  language: en
  yaml_path: translation/ot/genesis/022/013.yaml
  text: Then Abraham lifted up his eyes and looked[a], and behold, behind him was a ram caught in the thicket by its horns[b]. And Abraham went and took the ram and offered it up as a burnt offering instead of his son.
  footnotes:
