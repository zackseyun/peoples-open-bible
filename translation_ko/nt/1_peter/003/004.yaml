id: 1PE.3.4
reference: 1 Peter 3:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀλλ’ ὁ κρυπτὸς τῆς καρδίας ἄνθρωπος ἐν τῷ ἀφθάρτῳ τοῦ πραέως καὶ ἡσυχίου πνεύματος, ὅ ἐστιν ἐνώπιον τοῦ θεοῦ πολυτελές.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/003/004.yaml
  text: 'but the hidden person of the heart, in the imperishable beauty of a gentle and quiet spirit, which is very precious before God.'
translation:
  language: ko
  text: '도리어 마음에 감춰진 사람으로, 곧 온유하고 조용한 영의 썩지 아니하는 아름다움으로 단장하십시오. 그것이 하나님 앞에서 매우 값진 것입니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὁ κρυπτὸς τῆς καρδίας ἄνθρωπος
  english_pob_choice: the hidden person of the heart
  chosen_korean: 마음에 감춰진 사람
  alternatives_korean:
  - 마음의 숨은 사람
  - 속사람
  lexicon: BDAG
  rationale: 셈어식 속격 「마음의 ~한 사람」을 그대로 보존. 「속사람」으로 평이화할 수도 있으나 본문의 표현을 살린다.
- source_word: ἐν τῷ ἀφθάρτῳ
  english_pob_choice: in the imperishable beauty
  chosen_korean: 썩지 아니하는 아름다움으로
  alternatives_korean:
  - 부패하지 않는 것으로
  - 영원한 아름다움으로
  lexicon: BDAG
  rationale: 1:4·1:18·1:23의 ἄφθαρτος와 어휘 일관성을 위해 「썩지 아니하는」으로 옮긴다. 본문에 명시되지 않은 「아름다움」을 함의로 추가하되 자연스러운 한국어를 위함.
- source_word: τοῦ πραέως καὶ ἡσυχίου πνεύματος
  english_pob_choice: a gentle and quiet spirit
  chosen_korean: 온유하고 조용한 영
  alternatives_korean:
  - 부드럽고 평온한 마음
  - 온순하고 잔잔한 영
  lexicon: BDAG
  rationale: πραΰς(온유한)와 ἡσύχιος(조용한)를 그대로 옮긴다. 「온유함」은 마 5:5와 동일 어휘로 약함이 아니라 「길들여진 강함」의 함의가 있다.
- source_word: πολυτελές
  english_pob_choice: very precious
  chosen_korean: 매우 값진
  alternatives_korean:
  - 큰 값어치 있는
  - 매우 귀한
  lexicon: BDAG
  rationale: πολυτελής의 「큰 값을 매길 만한」을 「매우 값진」으로 옮긴다.
