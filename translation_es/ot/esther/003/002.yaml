    issue: '''siervos'' para עַבְדֵי en este contexto cortesano'
    rationale: Aunque es posible en registro bíblico, aquí puede sugerir una relación más servil o arcaizante de la que pretende el POB inglés con 'servants'. 'Servidores del rey' conserva dignidad y contexto de personal cortesano.
