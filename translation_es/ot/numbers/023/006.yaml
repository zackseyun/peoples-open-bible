  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: no hay nombres divinos ni términos cristológicos en juego; «holocausto» para עֹלָה es apropiado en contexto sacrificial; «príncipes» concuerda con la preferencia documentada, con alternativas en nota. No hay conflictos teológicos ni glosariales significativos.'
