    text: Or, “If this is your desire” or “If you are willing.” The Hebrew idiom is literally, “If there is your soul.”
    reason: lexical_alternative
  - marker: b
    text: 'Traditionally, “the Syrians.” Hebrew: “Arameans.”'
    reason: lexical_alternative
