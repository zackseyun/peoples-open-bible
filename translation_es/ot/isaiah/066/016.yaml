translation:
  language: es
  text: Porque por fuego Yahvé ejecutará juicio[a], y por su espada, contra toda carne[b]; y serán muchos los muertos por Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé juzgará contra toda carne con fuego y con su espada». El verbo hebreo también puede traducirse más compactamente como «juzgará» o más explícitamente como «entrará en juicio».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «toda carne», un idiomatismo profético para toda la humanidad en su condición creatural y mortal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación o consecuencia del contexto anterior; en español, «Porque» conserva la fuerza conjuntiva de forma natural y solemne.
- source_word: בָאֵשׁ
  english_pob_choice: by fire
  chosen_spanish: por fuego
  alternatives_spanish:
  - con fuego
  - en fuego
  lexicon: HALOT
  rationale: El ב instrumental indica medio; «por fuego» comunica el instrumento del juicio sin añadir explicación interpretativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como nombre propio, conforme al criterio del proyecto; «Yahvé» preserva el Tetragrámaton sin sustituirlo por un título.
- source_word: נִשְׁפָּט
  english_pob_choice: will execute judgment
  chosen_spanish: ejecutará juicio
  alternatives_spanish:
  - juzgará
  - entrará en juicio
  lexicon: HALOT
  rationale: La forma nifal expresa aquí acción judicial en contexto. «Ejecutará juicio» sigue la decisión inglesa revisada y mantiene el carácter forense con español natural.
- source_word: וּבְחַרְבּוֹ
  english_pob_choice: and by his sword
  chosen_spanish: y por su espada
  alternatives_spanish:
  - y con su espada
  lexicon: HALOT
  rationale: Conserva el segundo medio instrumental del hebreo; «por su espada» mantiene paralelismo con «por fuego».
- source_word: אֶת כָּל בָּשָׂר
  english_pob_choice: against all flesh
  chosen_spanish: contra toda carne
  alternatives_spanish:
  - contra toda la humanidad
  - con toda carne
  lexicon: HALOT
  rationale: Se preserva el idiomatismo profético «toda carne» para conservar la amplitud y la textura del hebreo. «Contra» refleja el valor judicial/adversativo del conjunto.
- source_word: וְרַבּוּ
  english_pob_choice: and many will be
  chosen_spanish: y serán muchos
  alternatives_spanish:
  - y muchos serán
  - y abundarán
  lexicon: HALOT
  rationale: La idea es de multiplicidad resultante; «serán muchos» es fluido en español y mantiene la cuantificación enfática.
- source_word: חַלְלֵי יְהוָה
  english_pob_choice: those slain by Yahweh
  chosen_spanish: los heridos de Yahvé
  alternatives_spanish:
  - los muertos por Yahvé
  - los muertos de Yahvé
  lexicon: HALOT
  rationale: חֲלָלִים designa caídos/heridos de muerte, a menudo como víctimas de violencia. «Heridos» conserva la fuerza de los caídos abatidos, aunque el contexto implica muerte; se deja la tensión semántica sin suavizarla en exceso.
theological_decisions:
- issue: Nombre divino Tetragrammaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue la política del proyecto de no enmascarar יְהוָה con un título. «Yahvé» es la forma española establecida para el nombre propio divino en este texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de כָּל בָּשָׂר
  english_pob_reading: all flesh
  chosen_spanish_reading: toda carne
  alternative_spanish_readings:
  - toda la humanidad
  - todas las personas
  rationale: «Toda carne» preserva el idiomatismo hebreo y su peso profético sobre la humanidad en su condición mortal. Se evita des-idiomatizar la frase a menos que el contexto obligue.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #5'
- issue: Valor de חַלְלֵי יְהוָה
  english_pob_reading: those slain by Yahweh
  chosen_spanish_reading: los heridos de Yahvé
  alternative_spanish_readings:
  - los muertos de Yahvé
  - los caídos de Yahvé
  rationale: El hebreo puede referir a abatidos/heridos de muerte; la versión española conserva esa zona semántica sin convertirla de antemano en una parapráfrasis teológica más explícita.
  doctrine_reference: HALOT s.v. חָלָל; contexto profético del versículo
translation_notes:
  revision_awareness: Se incorporó la revisión del audit trail que prefirió «ejecutará juicio» como traducción más natural y precisa de נִשְׁפָּט en este contexto. También se conservó la tensión léxica de חַלְלֵי יְהוָה sin resolverla por completo hacia un sinónimo más interpretativo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה según el estándar del proyecto.
  - Se preservó el paralelismo instrumental «por fuego / por su espada».
  - Se conservó la frase idiomática «toda carne» con nota explicativa.
  - «Heridos de Yahvé» deja abierta la relación entre caer herido y morir, reflejando la ambigüedad del hebreo.
