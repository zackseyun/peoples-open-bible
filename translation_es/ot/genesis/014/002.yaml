translation:
  language: es
  text: Les hicieron la guerra[a] a Bera, rey de Sodoma, Birsha, rey de Gomorra, Sinab, rey de Admá, Seméber, rey de Zeboím[b], y al rey de Bela (es decir, Zoar).
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «entablaron guerra contra».'
    reason: lexical_alternative
  - marker: b
    text: También puede escribirse «Zeboim».
    reason: lexical_alternative
lexical_decisions:
- source_word: עָשׂוּ מִלְחָמָה
  english_pob_choice: they made war
  chosen_spanish: hicieron guerra
  alternatives_spanish:
  - hicieron la guerra
  - entablaron guerra
  - sostuvieron guerra
  lexicon: HALOT
  rationale: El hebreo usa la expresión literal 'hacer guerra'. En español, 'hicieron guerra' conserva bien la estructura y la fuerza idiomática sin volverla artificial. Se evita suavizarla con una formulación más interpretativa.
- source_word: אֶת ... וְאֶת
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - contra todos ellos
  - en contra de
  - frente a
  lexicon: HALOT
  rationale: El marcador de objeto introduce a los destinatarios de la acción bélica. 'Contra' expresa naturalmente ese valor adversativo en español y permite mantener la lista paralela de reyes como objetos de la acción.
- source_word: בֶּרַע
  english_pob_choice: Bera
  chosen_spanish: Bera
  alternatives_spanish:
  - Bera
  lexicon: transliteración estándar
  rationale: Nombre propio transliterado de manera directa, sin traducirlo.
- source_word: מֶלֶךְ סְדֹם
  english_pob_choice: king of Sodom
  chosen_spanish: rey de Sodoma
  alternatives_spanish:
  - rey de Sodoma
  lexicon: HALOT
  rationale: La cadena constructa se vierte con el título seguido del topónimo. 'Sodoma' es la forma bíblica usual y clara en español.
- source_word: בִּרְשַׁע
  english_pob_choice: Birsha
  chosen_spanish: Birsa
  alternatives_spanish:
  - Birsa
  - Birsha
  lexicon: transliteración estándar
  rationale: Se adapta la transliteración a una forma española más natural, preservando el nombre propio. La sonoridad final en -a resulta más fluida en español.
- source_word: עֲמֹרָה
  english_pob_choice: Gomorrah
  chosen_spanish: Gomorra
  alternatives_spanish:
  - Gomorra
  lexicon: uso bíblico español establecido
  rationale: Se usa la forma bíblica asentada en español, equivalente al inglés POB 'Gomorrah'.
- source_word: שִׁנְאָב
  english_pob_choice: Shinab
  chosen_spanish: Sinab
  alternatives_spanish:
  - Sinab
  - Shinab
  lexicon: transliteración estándar
  rationale: Se translitera el nombre propio con una grafía española más natural, sin alterar su identidad onomástica.
- source_word: אַדְמָה
  english_pob_choice: Admah
  chosen_spanish: Admá
  alternatives_spanish:
  - Admá
  lexicon: transliteración estándar
  rationale: Se conserva el nombre propio con acento gráfico según la pronunciación española esperable.
- source_word: שֶׁמְאֵבֶר
  english_pob_choice: Shemeber
  chosen_spanish: Seméber
  alternatives_spanish:
  - Seméber
  - Shemeber
  lexicon: transliteración estándar
  rationale: Se adapta la transliteración al español, manteniendo la secuencia consonántica reconocible y la pronunciación fluida.
- source_word: צביים
  english_pob_choice: Zeboiim
  chosen_spanish: Zeboím
  alternatives_spanish:
  - Zeboím
  - Zeboiím
  lexicon: uso bíblico español establecido / transliteración estándar
  rationale: Se vierte el topónimo con una forma española comprensible y cercana a la vocalización hebrea. El acento evita una lectura errónea en español.
- source_word: מֶלֶךְ בֶּלַע
  english_pob_choice: the king of Bela
  chosen_spanish: el rey de Bela
  alternatives_spanish:
  - el rey de Bela
  lexicon: HALOT
  rationale: Se conserva la estructura de título y lugar. No se añade una aclaración interpretativa aquí, porque el hebreo simplemente identifica al rey por su ciudad.
- source_word: הִיא צֹעַר
  english_pob_choice: that is, Zoar
  chosen_spanish: es decir, Zoar
  alternatives_spanish:
  - o sea, Zoar
  - esto es, Zoar
  lexicon: HALOT
  rationale: La construcción parentética funciona como identificación explicativa de Bela con Zoar. 'Es decir' transmite bien esa relación aclaratoria en español moderno.
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión importante en la articulación de la lista: la lectura más clara trata a los cinco reyes como una sola serie gobernada por la misma relación adversativa, en vez de sugerir dos grupos distintos. La versión española sigue esa decisión y usa un solo ''contra'' para toda la lista, evitando la ambigüedad observada en la revisión aplicada. También se mantiene la identificación final ''es decir, Zoar'' como equivalencia explicativa, sin ampliar el texto más allá del hebreo.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' fuera del versículo porque no aparece el nombre divino en este texto.
  - Se usa 'Gomorra' y 'Sodoma' con las formas bíblicas habituales en español, mientras que otros nombres se transliteran más directamente para conservar la forma del hebreo.
  - La puntuación sigue el valor explicativo del hebreo final con una coma antes de 'es decir, Zoar'.
  - Se preserva la lista de reyes como una unidad sintáctica para reflejar la estructura hebrea del versículo.
