translation:
  language: es
  text: En el desierto pondré cedro, acacia, mirto y olivo[a]; en la estepa colocaré ciprés, plátano y pino juntos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O ‘árbol de aceite’ para ‘olivo’ (hebreo: ‘árbol de aceite’).'
    reason: lexical_alternative
  - marker: b
    text: La identificación exacta de ‘ciprés’, ‘plátano’ y ‘pino’ es incierta; entre las alternativas posibles están ‘junípero’ o ‘abeto’, ‘olmo’ y ‘boj’, respectivamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶתֵּן
  english_pob_choice: I will put
  chosen_spanish: pondré
  alternatives_spanish:
  - daré
  - colocaré
  lexicon: HALOT
  rationale: נתן puede significar ‘dar’ o ‘poner/colocar’; en este contexto de plantar árboles en un lugar, ‘pondré’ conserva la acción concreta y fluye naturalmente en español.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto salvaje
  - en el yermo
  lexicon: HALOT
  rationale: El hebreo מִדְבָּר abarca más que arena; puede referirse a tierra abierta e inculta. En español, ‘desierto’ es la equivalencia más natural y comprensible para este paralelismo poético.
- source_word: אֶרֶז
  english_pob_choice: cedar
  chosen_spanish: cedro
  alternatives_spanish:
  - cedro del Líbano
  lexicon: HALOT
  rationale: ‘Cedro’ es el nombre botánico y bíblico usual en español. El especificador ‘del Líbano’ no está explícito en el hebreo de este versículo.
- source_word: שִׁטָּה
  english_pob_choice: acacia
  chosen_spanish: acacia
  alternatives_spanish:
  - shittá
  lexicon: HALOT
  rationale: El término hebreo designa la acacia; la transliteración no aporta claridad en español y no es necesaria.
- source_word: וַהֲדַס
  english_pob_choice: myrtle
  chosen_spanish: mirto
  alternatives_spanish:
  - arrayán
  lexicon: HALOT
  rationale: ‘Mirto’ es la equivalencia estándar y más fiel; ‘arrayán’ puede sonar más regional o botánicamente menos directo según el contexto.
- source_word: וְעֵץ שָׁמֶן
  english_pob_choice: olive tree
  chosen_spanish: árbol de aceite
  alternatives_spanish:
  - olivo
  - árbol de oliva
  lexicon: HALOT
  rationale: Aquí se conserva la tensión lexical del hebreo literal ‘árbol de aceite’. La tradición inglesa POB opta por ‘olive tree’ con nota; en español, ‘árbol de aceite’ mantiene más visible la literalidad del original, y ‘olivo’ queda como lectura interpretativa implícita.
- source_word: אָשִׂים
  english_pob_choice: I will set
  chosen_spanish: colocaré
  alternatives_spanish:
  - pondré
  - estableceré
  lexicon: HALOT
  rationale: El verbo comparte el sentido de poner/colocar. ‘Colocaré’ evita repetir ‘pondré’ y conserva la idea de disponer árboles en un sitio.
- source_word: בָּעֲרָבָה
  english_pob_choice: in the desert
  chosen_spanish: en la estepa
  alternatives_spanish:
  - en la Arabá
  - en la llanura árida
  lexicon: HALOT
  rationale: עֲרָבָה puede ser nombre propio regional o un sustantivo común para llanura árida/estepa. Dado el paralelismo con ‘desierto’, ‘estepa’ comunica la franja seca y abierta sin introducir una geografía técnica innecesaria.
- source_word: בְּרוֹשׁ
  english_pob_choice: cypress
  chosen_spanish: ciprés
  alternatives_spanish:
  - junípero
  - abeto
  lexicon: HALOT
  rationale: La identificación exacta es incierta; ‘ciprés’ es una equivalencia común y readable en español, coherente con la decisión inglesa.
- source_word: תִּדְהָר
  english_pob_choice: plane tree
  chosen_spanish: plátano
  alternatives_spanish:
  - plátano de sombra
  - olmo
  lexicon: HALOT
  rationale: La especie es incierta. ‘Plátano’ es la opción estándar en español para ‘plane tree’; se evita forzar una precisión botánica que el hebreo no garantiza.
- source_word: תְאַשּׁוּר
  english_pob_choice: pine
  chosen_spanish: pino
  alternatives_spanish:
  - abeto
  - boj
  lexicon: HALOT
  rationale: La identificación exacta sigue siendo incierta. ‘Pino’ expresa adecuadamente un conífero conocido en español y se alinea con la lectura inglesa, aunque otras posibilidades permanecen abiertas.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: todos juntos
  alternatives_spanish:
  - juntos
  - en conjunto
  lexicon: HALOT
  rationale: יַחְדָּו enfatiza la acción conjunta. ‘Todos juntos’ transmite con claridad el adverbio colectivo y su fuerza enfática en esta lista acumulativa.
translation_notes:
  revision_awareness: 'El pasaje muestra alta concordancia con el audit trail inglés: se mantuvo la imagen poética de plantación en dos paralelos y se preservaron en nota las incertidumbres botánicas documentadas. La única decisión más sensible fue reflejar literalmente עֵץ שָׁמֶן como ‘árbol de aceite’ en el texto español para no borrar la tensión lexical indicada por el hebreo y por la nota inglesa, en vez de normalizarlo directamente como ‘olivo’ en el cuerpo principal.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo entre 'en el desierto' y 'en la estepa' para reflejar מִדְבָּר / עֲרָבָה sin sobreinterpretar la geografía.
  - 'Se evitó mezclar ''poner'' y ''colocar'' de manera inconsistente: ''pondré'' / ''colocaré'' reproduce la variación verbal del hebreo y del audit trail.'
  - '''Árbol de aceite'' conserva la literalidad del hebreo donde la POB inglesa anotó la posibilidad interpretativa de ''olive tree'' / ''oil tree''.'
  - Se usaron nombres comunes de árboles en español y no transliteraciones, salvo en la nota explicativa, para mantener legibilidad pública sin perder trazabilidad.
