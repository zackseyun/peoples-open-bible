base_translation:
  language: en
  yaml_path: translation/ot/1_kings/022/035.yaml
  text: And the battle intensified that day[a], and the king remained standing in the chariot facing Aram, and he died in the evening[c][b]; and the blood from the wound flowed into the bottom of the chariot.
  footnotes:
  - marker: a
    text: Or 'the battle grew' or more literally 'the battle went up' that day.
    reason: lexical_alternative
  - marker: b
    text: Or 'the king stood in the chariot'; the Hebrew form may imply that he was made to remain standing or was kept upright.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'into the bosom/lap of the chariot,' an idiom for the inner or lower part of the chariot.
    reason: lexical_alternative
