translation:
  language: es
  text: Moisés solo se acercará a Yahvé[a], pero ellos no se acercarán, y el pueblo no subirá con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «a Yahvé». El texto principal sigue la convención del proyecto de renderizar el nombre divino como «Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְנִגַּשׁ
  english_pob_choice: shall come near
  chosen_spanish: se acercará
  alternatives_spanish:
  - se aproximará
  - deberá acercarse
  lexicon: HALOT
  rationale: נגשׁ expresa la idea de acercarse o presentarse. En español, «se acercará» conserva la cercanía física y la fuerza directiva del contexto sin sonar forzado.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: nombre propio bíblico
  rationale: Nombre propio estándar en español bíblico.
- source_word: לְבַדּוֹ
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - por sí solo
  lexicon: HALOT
  rationale: לבדו enfatiza exclusividad. «Solo» comunica de forma natural que únicamente Moisés puede acercarse.
- source_word: אֶל יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé
  - a YHWH
  lexicon: HALOT
  rationale: El texto hebreo nombra directamente a יהוה. Siguiendo el criterio del proyecto, se mantiene «Yahvé» en el texto principal en lugar de enmascararlo como «el SEÑOR».
- source_word: וְהֵם
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - los demás
  - aquellos
  lexicon: HALOT
  rationale: El pronombre contrasta con Moisés y remite al grupo restante del contexto. «Ellos» es la forma más directa y mantiene el contraste.
- source_word: לֹא יִגָּשׁוּ
  english_pob_choice: shall not come near
  chosen_spanish: no se acercarán
  alternatives_spanish:
  - no se aproximarán
  - no deberán acercarse
  lexicon: HALOT
  rationale: Repite el mismo verbo נגשׁ, por lo que conviene conservar la misma raíz verbal en español para mantener la oposición con Moisés.
- source_word: וְהָעָם
  english_pob_choice: and the people
  chosen_spanish: y el pueblo
  alternatives_spanish:
  - y el pueblo de Israel
  lexicon: HALOT
  rationale: עָם designa al pueblo como colectivo; el hebreo no añade «de Israel» aquí, así que la forma breve es la más fiel.
- source_word: לֹא יַעֲלוּ
  english_pob_choice: shall not go up
  chosen_spanish: no subirá
  alternatives_spanish:
  - no ascenderá
  - no subirán
  lexicon: HALOT
  rationale: עלה significa subir o ascender. En español, «subirá» transmite el movimiento hacia el monte con naturalidad. Se usa singular colectivo por «el pueblo».
- source_word: עִמּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  lexicon: HALOT
  rationale: Preposición directa y transparente que refiere a Moisés.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El paquete fuente y la norma del proyecto indican que יהוה debe transliterarse como «Yahvé» en el texto principal. Esto preserva el nombre del pacto y evita el sustituto litúrgico «el SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
translation_notes:
  revision_awareness: El inglés auditado mantiene el mismo contenido sintáctico y léxico, con una nota sobre la opción alternativa «to Yahweh» frente al estándar previo «the LORD». No se registran revisiones sustantivas; el acuerdo entre controles es alto.
  spanish_consistency_notes:
  - Se conservó la repetición de נגשׁ con la misma raíz española «acercarse» para reflejar el contraste del versículo.
  - Se optó por «subirá» en singular colectivo porque el sujeto inmediato es «el pueblo», tratado como conjunto.
  - Se mantuvo «Yahvé» como forma consistente con el criterio terminológico del proyecto para יהוה.
