translation:
  language: es
  text: 'De los hijos de Banías: Salimot hijo de Josafías[a], y con él ciento sesenta hombres.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo hebreo en Esdras 8:8 difiere de manera sustancial aquí, nombrando otra línea familiar, otro jefe y otro número. Como 1 Esdras se traduce desde el testigo griego, el texto principal sigue el griego: «hijos de Banías ... Salimot hijo de Josafías ... ciento sesenta hombres».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκ τῶν υἱῶν Βανίας
  english_pob_choice: From the sons of Bani
  chosen_spanish: De los hijos de Banías
  alternatives_spanish:
  - De los descendientes de Banías
  - De la familia de Banías
  lexicon: LSJ
  rationale: υἱῶν en listas genealógicas puede equivaler a miembros de una línea familiar. En español, «hijos de» preserva el giro genealógico formal y es tan natural como el inglés POB «sons of». «Banías» sigue la forma griega Βανίας, que es la fuente primaria para 1 Esdras.
- source_word: Σαλειμὼθ
  english_pob_choice: Salimoth
  chosen_spanish: Salimot
  alternatives_spanish:
  - Salimoth
  - Sallimot
  lexicon: LSJ
  rationale: Se translitera directamente la forma griega, pero con adaptación ortográfica española mínima para fluidez («-ot» final) sin cambiar el nombre. La prioridad es seguir el testigo griego, no armonizar con el paralelo aproximado hebreo.
- source_word: Ἰωσαφίου
  english_pob_choice: son of Josaphias
  chosen_spanish: hijo de Josafías
  alternatives_spanish:
  - de Josafías
  - hijo de Josafias
  lexicon: LSJ
  rationale: El genitivo se entiende naturalmente como relación filial en este contexto genealógico. «Hijo de» mantiene la explicitud del inglés POB y la función listal del griego.
- source_word: καὶ μετʼ αὐτοῦ
  english_pob_choice: and with him
  chosen_spanish: y con él
  alternatives_spanish:
  - y junto con él
  - y con él estaban
  lexicon: LSJ
  rationale: La frase es breve y elíptica en griego. «Y con él» conserva esa concisión sin añadir información no presente en el texto fuente.
- source_word: ἄνδρες
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - varones
  - hombres adultos
  lexicon: LSJ
  rationale: ἄνδρες designa varones/hombres, no personas en general. «Hombres» es el equivalente natural y preciso en español para una lista censal.
- source_word: ἑκατὸν ἑξήκοντα
  english_pob_choice: one hundred sixty
  chosen_spanish: ciento sesenta
  alternatives_spanish:
  - ciento y sesenta
  lexicon: LSJ
  rationale: Es la cardinal simple. «Ciento sesenta» es la forma moderna normal en español y mantiene claridad y brevedad.
theological_decisions:
- issue: Diferencia con el paralelo hebreo de Esdras 8:8
  english_pob_reading: The Hebrew parallel at Ezra 8:8 differs substantially here, naming a different family line, leader, and number. Because 1 Esdras is translated from the Greek witness, the main text follows the Greek.
  chosen_spanish_reading: El texto principal sigue el testigo griego y no armoniza con el paralelo hebreo; por eso conserva Banías, Salimot, Josafías y ciento sesenta hombres.
  alternative_spanish_readings:
  - 'Armonizar con el paralelo hebreo: Shafatías / Zebadías hijo de Micael / ochenta varones'
  - Mencionar en el texto principal la lectura del hebreo
  rationale: 'La decisión no es doctrinal sino textual: 1 Esdras se traduce desde el griego recibido, que aquí difiere del paralelo hebreo. Mantener la lectura griega evita borrar una tensión textual documentada.'
  doctrine_reference: Crítica textual / fidelidad al testigo primario
translation_notes:
  revision_awareness: No se requirieron cambios de revisión respecto del expediente inglés; la versión española mantiene la misma base textual griega y conserva la tensión documentada con el paralelo hebreo sin armonizarla.
  spanish_consistency_notes:
  - Se mantiene «hijos de» para el giro genealógico, en paralelo con la opción inglesa «sons of».
  - Se evita «SEÑOR» u otro término teológico ajeno, porque el verso no contiene el nombre divino ni títulos cristológicos.
  - Los nombres propios siguen la base griega del testigo de 1 Esdras, no una normalización hacia el hebreo paralelo.
  - La puntuación reproduce el estilo de lista breve del original griego.
