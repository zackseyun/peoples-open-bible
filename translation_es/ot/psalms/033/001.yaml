revisions:
- from: ¡Canten con júbilo a Yahvé[a], ustedes, los justos[b]; alabar es apropiado para los rectos.
  to: ¡Griten de alegría en Yahvé[a], ustedes, los justos! La alabanza[b] es apropiada para los rectos.
  rationale: Se restaura la prioridad semántica de רַנְּנוּ con una exhortación más fuerte y audible («Griten de alegría»), se conserva el nombre divino «Yahvé», y se devuelve תְהִלָּה a un sustantivo natural en español («la alabanza»). También se corrigen las notas para que documenten las alternativas léxicas realmente pertinentes al hebreo y al expediente inglés.
