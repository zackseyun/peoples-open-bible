  text: א֣וֹ כִ֤י יִגַּע֙ בְּ/טֻמְאַ֣ת אָדָ֔ם לְ/כֹל֙ טֻמְאָת֔/וֹ אֲשֶׁ֥ר יִטְמָ֖א בָּ֑/הּ וְ/נֶעְלַ֣ם מִמֶּ֔/נּוּ וְ/ה֥וּא יָדַ֖ע וְ/אָשֵֽׁם׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/005/003.yaml
  text: Or if he touches human uncleanness—any uncleanness by which one becomes unclean—and it is hidden from him[a], and he comes to know it[b], then he is guilty.
  footnotes:
  - marker: a
    text: Or 'human impurity.' The Hebrew term refers to ritual uncleanness in this legal context.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'and it is hidden from him'; that is, he was unaware of it at the time.
    reason: lexical_alternative
