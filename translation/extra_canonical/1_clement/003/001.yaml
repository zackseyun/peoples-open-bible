id: 1CLEM.3.1
reference: 1 Clement 3:1
unit: verse
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Πᾶσα δόξα καὶ πλατυσμὸς ἐδόθη ὑμῖν καὶ ἐτελέσθη τὸ γεγραμμένον· Ἔφαγεν καὶ ἔπιεν, καὶ ἐπλατύνθη καὶ ἐπαχύνθη, καὶ ἀπελάκτισεν ὁ ἠγαπημένος. 2. Ἐκ τούτου ζῆλος καὶ φθόνος, ἔρις καὶ στάσις, διωγμὸς καὶ ἀκαταστασία, πόλεμος καὶ αἰχμαλωσία. 3. οὕτως ἐπηγέρθησαν οἱ ἄτιμοι ἐπὶ τοὺς ἐντίμους, οἱ ἄδοξοι ἐπὶ τοὺς ἐνδόξους, οἱ ἄφρονες ἐπὶ τοὺς φρονίμους, οἱ νέοι ἐπὶ τοὺς πρεσβυτέρους. 4. διὰ τοῦτο πόρρω ἀπέστη ἡ δικαιοσύνη καὶ εἰρήνη, ἐν τῷ ἀπολιπεῖν ἕκαστον τὸν φόβον τοῦ θεοῦ καὶ ἐν τῇ πίστει αὐτοῦ ἀμβλυωπῆσαι, μηδὲ ἐν τοῖς νομίμοις τῶν προσταγμάτων αὐτοῦ πορεύεσθαι μηδὲ πολιτεύεσθαι κατὰ τὸ καλῆκον τῷ Χριστῷ, ἀλλὰ ἕκαστον βαδίζειν κατὰ τὰς ἐπιθυμίας τῆς καρδίας αὐτοῦ τῆς πονηρᾶς, ζῆλον ἄδικον καὶ ἀσεβῆ ἀνειληφότας, δι' οὗ καὶ θάνατος εἰσῆλθεν εἰς τὸν κόσμον.
  language: Greek
  pages:
  - 265
  note: This chapter comes from the normalized Funk 1901 OCR layer.
  verse: 1
translation:
  text: 'All glory and abundance were given to you, and what is written was fulfilled: “He ate and drank, and became broad and fat, and the beloved one kicked back.”'
  philosophy: optimal-equivalence
status: revised
lexical_decisions:
- source_word: πλατυσμός
  chosen: abundance
  alternatives:
  - prosperity
  - enlargement
  - expansion
  lexicon: LSJ
  rationale: In context with δόξα and the allusion to Deut 32:15, the term points to a state of enlarged prosperity rather than literal spatial breadth. “Abundance” is idiomatic English while preserving the idea of being made expansive/prosperous.
- source_word: ἐπλατύνθη
  chosen: became broad
  alternatives:
  - grew large
  - prospered
  - waxed fat
  lexicon: LSJ
  rationale: The verb is kept concrete to preserve the scriptural cadence of the citation. “Became broad” echoes the Greek image and pairs with “fat” without collapsing both into one English term.
- source_word: ἀπελάκτισεν
  chosen: kicked back
  alternatives:
  - kicked
  - rebelled
  - grew insolent
  lexicon: LSJ
  rationale: The verb is metaphorical but vivid, drawn from the scriptural allusion. “Kicked back” preserves the image of recalcitrant rejection better than a flattened abstract rendering like “rebelled.”
- source_word: ζῆλος
  chosen: jealousy
  alternatives:
  - zeal
  - envy
  lexicon: BDAG
  rationale: Here the vice list pairs ζῆλος with φθόνος, so a negative sense is required. “Jealousy” distinguishes it from φθόνος while preserving the moral force.
- source_word: φθόνος
  chosen: envy
  alternatives:
  - jealousy
  lexicon: BDAG
  rationale: Chosen to maintain a distinction from ζῆλος in the paired vices.
- source_word: στάσις
  chosen: faction
  alternatives:
  - sedition
  - division
  - uprising
  lexicon: LSJ
  rationale: The context concerns internal communal rupture. “Faction” captures partisan division without overstating to full-scale revolt.
- source_word: ἀκαταστασία
  chosen: disorder
  alternatives:
  - confusion
  - instability
  - tumult
  lexicon: BDAG
  rationale: “Disorder” is clear modern English and fits the vice-catena's social consequences.
- source_word: ἄτιμοι
  chosen: the dishonored
  alternatives:
  - the base
  - the despised
  - the ignoble
  lexicon: LSJ
  rationale: A participial/substantival adjective is best mirrored by an English substantive phrase. “Dishonored” preserves the honor-shame texture.
- source_word: ἄδοξοι
  chosen: the inglorious
  alternatives:
  - the obscure
  - the unrenowned
  - the dishonorable
  lexicon: LSJ
  rationale: This keeps the δόξα wordplay audible with “glory/glorious/inglorious” across the chapter.
- source_word: φρονίμους
  chosen: the prudent
  alternatives:
  - the wise
  - the sensible
  lexicon: BDAG
  rationale: “Prudent” better reflects practical wisdom in contrast with ἄφρονες than the broader “wise.”
- source_word: πρεσβυτέρους
  chosen: the elders
  alternatives:
  - older men
  - seniors
  lexicon: BDAG
  rationale: Given the ecclesial texture of 1 Clement, “elders” preserves both age and possible communal-respect resonance better than a merely demographic term.
- source_word: πόρρω ἀπέστη
  chosen: have withdrawn far away
  alternatives:
  - departed far off
  - stood far away
  lexicon: LSJ
  rationale: This renders the vivid personification of righteousness and peace as having receded from the community.
- source_word: ἀμβλυωπῆσαι
  chosen: became dim-sighted
  alternatives:
  - grew blind
  - lost clear sight
  - became short-sighted
  lexicon: LSJ
  rationale: The verb suggests impaired spiritual vision rather than total blindness. “Dim-sighted” preserves the metaphor and gravity.
- source_word: πίστει
  chosen: faith
  alternatives:
  - faithfulness
  - trust
  lexicon: BDAG
  rationale: The default project rendering is “faith.” In this context it denotes the believers' stance toward God, though “faithfulness” remains a plausible nuance.
- source_word: νομίμοις
  chosen: lawful ways
  alternatives:
  - ordinances
  - requirements
  - what is prescribed
  lexicon: LSJ
  rationale: The dative phrase is somewhat compressed; “lawful ways” communicates conduct ordered by what God has prescribed without sounding overly technical.
- source_word: πολιτεύεσθαι
  chosen: conducting himself
  alternatives:
  - living as a citizen
  - ordering one's life
  - behaving
  lexicon: BDAG
  rationale: The verb carries civic-ethical force, but in English “conducting himself” best fits the paraenetic context and preserves moral seriousness.
- source_word: κατὰ τὸ καλῆκον τῷ Χριστῷ
  chosen: in a manner fitting for the Messiah
  alternatives:
  - as is worthy of the Messiah
  - according to what befits Christ
  lexicon: LSJ
  rationale: The phrase expresses conduct appropriate to relation with Christ. Per project philosophy, Χριστός is rendered “Messiah” where title is active.
- source_word: ἀνειληφότας
  chosen: having taken up
  alternatives:
  - having embraced
  - having assumed
  lexicon: LSJ
  rationale: The participle suggests actively taking on or adopting jealousy as a disposition.
- source_word: ζῆλον ἄδικον καὶ ἀσεβῆ
  chosen: unjust and ungodly jealousy
  alternatives:
  - unrighteous and impious jealousy
  - wicked jealousy
  lexicon: BDAG
  rationale: This preserves the moral double characterization without reducing it to a single adjective.
- source_word: δι' οὗ καὶ θάνατος εἰσῆλθεν εἰς τὸν κόσμον
  chosen: through which death also entered into the world
  alternatives:
  - by which death came into the world
  lexicon: NA/NT usage; BDAG
  rationale: The wording intentionally echoes familiar scriptural phrasing while remaining anchored to the Greek. The relative pronoun refers back to jealousy/envy as the instrument of death's entrance, likely evoking the Cain narrative and broader biblical theology.
theological_decisions:
- issue: Rendering Χριστῷ
  chosen_reading: the Messiah
  alternative_readings:
  - Christ
  rationale: Following project policy, titles are translated where the titular sense is active. Here the phrase concerns conduct befitting relation to the anointed one, so “Messiah” preserves meaning rather than inherited church transliteration.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
- issue: Sense of πίστει αὐτοῦ
  chosen_reading: his faith in him
  alternative_readings:
  - his faithfulness to him
  - faith toward him
  rationale: The phrase most naturally refers to each person's faith directed toward God. Because πίστις can shade toward faithfulness, the alternative is preserved in a footnote.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
- issue: Referent of 'through which death also entered into the world'
  chosen_reading: Jealousy/envy is presented as the means by which death entered the world
  alternative_readings:
  - A broader reference to evil desire generally
  - An allusion specifically to envy in the Cain story
  rationale: The immediate antecedent is unjust and ungodly jealousy, and 1 Clement soon develops examples of envy leading to violence. The wording also resonates with biblical entrance-of-death language, so the translation keeps the phrase broad enough to preserve the allusive texture.
