review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el paralelismo y el sentido básico del hebreo: un corazón/centro interior discerniente adquiere conocimiento, y la oreja/oído de los sabios busca conocimiento. Mantiene la repetición de דָּעַת como «conocimiento» y traduce יִקְנֶה / תְּבַקֶּשׁ con verbos adecuados. Sin embargo, «entendido» para נָבוֹן suena menos natural y menos preciso en español bíblico actual que «entendimiento» o «discernimiento» como adjetivo perifrástico; además, la nota [b] está anclada en «conocimiento» cuando en realidad explica «el oído de los sabios».'
  spanish_quality_summary: La frase es mayormente clara y digna, pero «Un corazón entendido» resulta algo forzado en español contemporáneo y puede sugerir ‘informado’ más que ‘discerniente’. «Un corazón entendido» también pierde algo de la fuerza sapiencial que sí expresa mejor «un corazón con entendimiento». Asimismo, la nota cultural debe anclarse en la expresión que comenta para evitar confusión de lectura.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. «Corazón», «conocimiento», «los sabios» y «busca» están bien alineados con las decisiones del POB. La principal mejora léxica es ajustar נָבוֹן a una formulación española más idiomática y fiel en contexto sapiencial.
  issues:
  - severity: medium
    issue: «entendido» para נָבוֹן suena poco idiomático y algo ambiguo
    rationale: Aunque es defendible, en español general «entendido» puede significar ‘experto’ o ‘enterado’. En Proverbios, נָבוֹן apunta a discernimiento perceptivo; «con entendimiento» comunica mejor ese matiz sin perder naturalidad.
  - severity: medium
    issue: La nota [b] está colocada sobre «conocimiento» pero explica «el oído de los sabios»
    rationale: Las notas deben anclarse en la palabra o frase relevante. Tal como está, el lector puede pensar que la nota comenta «conocimiento» en vez de la imagen singular/colectiva de «el oído».
  - severity: low
    issue: La razón de la nota [a] no corresponde del todo a su contenido
    rationale: El contenido de [a] explica la metáfora de «corazón», no una alternativa léxica. No impide la comprensión, pero conviene mayor coherencia documental.
  revised_spanish_text: Un corazón con entendimiento[a] adquiere conocimiento, y el oído[b] de los sabios busca conocimiento.
