  to: Entonces Josías se volvió y vio las sepulturas[a] que estaban allí en el monte, y envió a sacar los huesos de las sepulturas, y los quemó sobre el altar y lo profanó, conforme a la palabra de Yahvé que el hombre de Dios proclamó[b], el cual proclamó estas cosas.
  rationale: Se corrige la acción verbal principal para reflejar mejor el hebreo 'envió y tomó', evitando la paráfrasis interpretativa 'mandó traer'. También se afina la nota léxica sobre קרא para mantener el matiz de proclamación pública fuerte documentado en la auditoría inglesa. El resto del texto puede conservarse.
