revisions:
- from: Esperé hasta la mañana[a]; como un león, así me rompe[b] todos los huesos. De día hasta la noche me llevas a mi fin.
  to: Esperé hasta la mañana[a]; como un león, así quiebra[b] todos mis huesos. Del día a la noche me llevas a mi fin.
  rationale: Se ajusta la cláusula central para que el español sea más natural y refleje mejor el objeto explícito del hebreo ('todos mis huesos'). También se pule la expresión temporal final para una lectura más fluida sin cambiar el sentido. Se conserva la nota sobre la dificultad del verbo inicial y la nota sobre el cambio de tercera a segunda persona.
