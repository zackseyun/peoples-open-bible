base_translation:
  language: en
  yaml_path: translation/deuterocanon/2_maccabees/002/037.yaml
  text: Just as Moses prayed to the Lord[a], and fire came down from heaven and consumed the things of the sacrifice, so also Solomon prayed to the Lord[b], and the fire came down and consumed the whole burnt offerings.
  footnotes:
  - marker: a
    text: Greek literally has a broader expression, 'the things of the sacrifice,' which may refer to the sacrificial materials or offerings associated with the sacrifice.
    reason: lexical_alternative
  - marker: b
    text: Or 'burnt offerings.' The Greek term specifically denotes offerings wholly burned up.
    reason: lexical_alternative
