    reason: lexical_alternative
  revision_rationale: Se corrige únicamente el término botánico para alinearlo con la decisión léxica auditada («balsam trees») y se conserva la incertidumbre en una nota. Se elimina la nota sobre «Yahvé/Yahveh» por ser innecesaria dentro de la norma terminológica del proyecto. El resto del texto preserva adecuadamente el sentido hebreo y su legibilidad en español.
