id: GEN.44.29
reference: Genesis 44:29
source:
  edition: WLC
  text: וּ/לְקַחְתֶּ֧ם גַּם אֶת זֶ֛ה מֵ/עִ֥ם פָּנַ֖/י וְ/קָרָ֣/הוּ אָס֑וֹן וְ/הֽוֹרַדְתֶּ֧ם אֶת שֵׂיבָתִ֛/י בְּ/רָעָ֖ה שְׁאֹֽלָ/ה־־־׃
translation:
  text: If you also take this one from me[a], and harm happens to him, then you will bring my gray hair down to Sheol in misery.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the grave' or 'the realm of the dead.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְקַחְתֶּם
  chosen: if you also take
  alternatives:
  - and you take
  - when you take
  lexicon: HALOT
  rationale: The waw + perfect here continues a conditional sequence in Jacob's speech; in English, 'if you also take' best conveys the sense naturally in context rather than a simple coordinate 'and you take.'
- source_word: גַּם
  chosen: also
  alternatives:
  - too
  - even
  lexicon: HALOT
  rationale: Marks addition to the prior loss of Joseph/Simeon; 'also' is the most straightforward contextual rendering.
- source_word: מֵעִם פָּנַי
  chosen: from before me
  alternatives:
  - from me
  - away from my presence
  lexicon: HALOT
  rationale: Literally 'from with my face/presence.' 'From before me' preserves the idiomatic Hebrew flavor while remaining understandable in English.
- source_word: וְקָרָהוּ
  chosen: harm happens to him
  alternatives:
  - disaster befalls him
  - some tragedy happens to him
  lexicon: HALOT
  rationale: The verb means 'happen, befall.' Combined with אָסוֹן, the clause expresses calamity overtaking Benjamin. 'Harm happens to him' is concise and natural.
- source_word: אָסוֹן
  chosen: harm
  alternatives:
  - disaster
  - tragedy
  - misfortune
  lexicon: HALOT
  rationale: Refers to serious injury or calamity. 'Harm' fits the immediate paternal fear and works idiomatically with 'happens to him'; stronger alternatives are possible but slightly more interpretive.
- source_word: וְהוֹרַדְתֶּם
  chosen: you will bring down
  alternatives:
  - you will cause to go down
  lexicon: HALOT
  rationale: Hiphil of ירד is causative. 'Bring down' is the standard, natural English equivalent and preserves the metaphor of descent to the realm of the dead.
- source_word: שֵׂיבָתִי
  chosen: my gray hair
  alternatives:
  - my gray head
  - my old age
  lexicon: HALOT
  rationale: Literally refers to gray hair, a metonym for old age. 'My gray hair' preserves the Hebrew image used repeatedly in this narrative.
- source_word: בְּרָעָה
  chosen: in misery
  alternatives:
  - in sorrow
  - in grief
  - in distress
  lexicon: HALOT
  rationale: The noun רָעָה can denote trouble, misery, or distress here rather than moral evil. 'In misery' captures the state in which Jacob imagines descending to death.
- source_word: שְׁאֹלָה
  chosen: to Sheol
  alternatives:
  - to the grave
  - to the realm of the dead
  lexicon: HALOT
  rationale: Sheol is the Hebrew term for the underworld/realm of the dead. Per source-language primacy, retaining 'Sheol' avoids flattening the concept to merely 'grave'; an explanatory alternative is preserved in a footnote.
