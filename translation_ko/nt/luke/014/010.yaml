  text: 「오히려 초대를 받거든 가서 끝자리에 앉으라. 그러면 너를 초대한 자가 와서 「벗이여, 윗자리로 올라오시오」 할 것이다. 그때에 너와 함께 앉은 모든 사람 앞에서 너에게 영광이 있으리라.」
