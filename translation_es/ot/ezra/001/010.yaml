translation:
  language: es
  text: 30 tazones de oro, 410 tazones de plata de una segunda clase[a], y otras 1.000 vasijas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tazones de plata, dobles: 410». El término hebreo vertido aquí «de una segunda clase» es incierto en este contexto inventarial y puede indicar una segunda categoría, duplicados o una forma doblada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּפוֹרֵי
  english_pob_choice: bowls
  chosen_spanish: tazones
  alternatives_spanish:
  - cuencos
  - bowls
  - vasijas
  lexicon: HALOT
  rationale: El término designa un tipo de recipiente. En español, 'tazones' comunica bien la forma general sin sobreespecificar. Se evita 'vasijas', que es más genérico, y 'bowls', que no es idiomático en un texto bíblico español.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: de oro
  alternatives_spanish:
  - de oro fino
  - de oro
  lexicon: HALOT
  rationale: 'Se conserva el valor material simple y directo del hebreo: el recipiente está hecho de oro o está caracterizado por ese material.'
- source_word: שְׁלֹשִׁים
  english_pob_choice: '30'
  chosen_spanish: '30'
  alternatives_spanish:
  - treinta
  lexicon: HALOT
  rationale: En un inventario, la forma numérica mejora la legibilidad y corresponde al patrón del POB en inglés.
- source_word: כְּפוֹרֵי כֶסֶף
  english_pob_choice: silver bowls
  chosen_spanish: tazones de plata
  alternatives_spanish:
  - cuencos de plata
  - vasijas de plata
  lexicon: HALOT
  rationale: Se mantiene el mismo sustantivo que en la primera mitad del versículo para reflejar la repetición del hebreo y la coherencia del inventario.
- source_word: מִשְׁנִים
  english_pob_choice: of a second kind
  chosen_spanish: de una segunda clase
  alternatives_spanish:
  - de una segunda especie
  - dobles
  - duplicados
  lexicon: HALOT
  rationale: El término es incierto en este contexto. 'De una segunda clase' preserva la distinción inventarial sin decidir prematuramente entre 'doble', 'duplicado' o una categoría secundaria.
- source_word: אַרְבַּע מֵאוֹת וַעֲשָׂרָה
  english_pob_choice: '410'
  chosen_spanish: '410'
  alternatives_spanish:
  - cuatrocientos diez
  lexicon: HALOT
  rationale: Se conserva el número en formato numérico por claridad en una lista de conteo.
- source_word: כֵּלִים
  english_pob_choice: vessels
  chosen_spanish: utensilios
  alternatives_spanish:
  - vasijas
  - objetos
  - recipientes
  lexicon: HALOT
  rationale: Es un término amplio para objetos o implementos, especialmente de uso cultual. 'Utensilios' funciona bien en español y permite abarcar el campo semántico sin restringirlo demasiado.
- source_word: אֲחֵרִים
  english_pob_choice: other
  chosen_spanish: otros
  alternatives_spanish:
  - restantes
  - adicionales
  lexicon: HALOT
  rationale: Equivale de modo directo al hebreo y mantiene la oposición con los grupos ya enumerados.
- source_word: אָלֶף
  english_pob_choice: 1,000
  chosen_spanish: '1.000'
  alternatives_spanish:
  - mil
  lexicon: HALOT
  rationale: Se usa la forma numérica por consistencia con el resto del inventario y por legibilidad tipográfica en español.
translation_notes:
  revision_awareness: La traducción sigue el sentido del texto hebreo y coincide con la lectura auditada del POB en inglés. Se conserva la misma ambigüedad léxica de מִשְׁנִים mediante una nota, sin forzar una precisión que el contexto no garantiza.
  spanish_consistency_notes:
  - 'Se mantiene una terminología uniforme para los recipientes: ''tazones'' para כְּפוֹרֵי y ''utensilios'' para כֵּלִים.'
  - Los números se presentan en formato aritmético, como en el POB inglés, por tratarse de una lista de inventario.
  - Se evita introducir vocabulario litúrgico tradicional no sustentado por el contexto, como 'vasos sagrados', porque el hebreo aquí solo enumera objetos.
