translation:
  language: es
  text: con un rostro humano hacia la palmera de un lado[a], y con un rostro de león joven hacia la palmera del otro lado. Fueron hechos por todo el templo, alrededor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el rostro de un hombre … el rostro de un león joven».
    reason: lexical_alternative
lexical_decisions:
- source_word: פְנֵי אָדָם
  english_pob_choice: a human face
  chosen_spanish: un rostro humano
  alternatives_spanish:
  - el rostro de un hombre
  - un rostro de hombre
  lexicon: HALOT
  rationale: En este contexto de decoración tallada, אָדָם describe una figura representacional. «Rostro humano» conserva el contraste con el león sin imponer masculinidad específica y sigue de cerca la decisión inglesa auditada.
- source_word: הַתִּמֹרָה
  english_pob_choice: the palm tree
  chosen_spanish: la palmera
  alternatives_spanish:
  - la palma
  - el motivo de la palmera
  lexicon: HALOT
  rationale: El contexto inmediato habla de relieves o tallas arquitectónicas del templo, por lo que «palmera» comunica naturalmente el motivo ornamental. «Palma» podría sonar más abstracto en español y perder claridad.
- source_word: מִפּוֹ
  english_pob_choice: on one side / on the other side
  chosen_spanish: de un lado / del otro lado
  alternatives_spanish:
  - a un lado / al otro lado
  - por un lado / por el otro
  lexicon: HALOT
  rationale: La expresión hebrea señala lados opuestos del motivo. En español, «de un lado… del otro lado» mantiene la relación espacial sin traducir de forma rígida «desde aquí».
- source_word: פְנֵי כְפִיר
  english_pob_choice: a young lion’s face
  chosen_spanish: un rostro de cachorro de león
  alternatives_spanish:
  - el rostro de un león joven
  - un rostro de león joven
  lexicon: HALOT
  rationale: כְפִיר designa un león joven. «Cachorro de león» es natural en español y conserva la fuerza imagística; alternativamente, «león joven» sería más literal pero menos idiomático.
- source_word: עָשׂוּי
  english_pob_choice: They were made
  chosen_spanish: Estaban hechos
  alternatives_spanish:
  - Fueron hechos
  - Estaban tallados
  lexicon: HALOT
  rationale: El participio pasivo resume el estado/resultado de la obra ornamental. «Estaban hechos» refleja bien el plural entendido por la revisión inglesa, sin forzar un tiempo verbal más marcado de lo que permite el hebreo.
- source_word: אֶל כָּל הַבַּיִת
  english_pob_choice: the whole temple
  chosen_spanish: toda la casa
  alternatives_spanish:
  - todo el templo
  - toda la casa del templo
  lexicon: HALOT
  rationale: בית en este pasaje puede referirse a la casa/edificio del templo. «Toda la casa» sigue más de cerca el término fuente; en el flujo español, el adverbio final «por todos lados» aclara la extensión total.
- source_word: סָבִיב סָבִיב
  english_pob_choice: all around
  chosen_spanish: por todos lados
  alternatives_spanish:
  - alrededor de todo
  - en derredor
  lexicon: HALOT
  rationale: La duplicación hebrea intensifica la idea de rodear completamente. «Por todos lados» transmite esa amplitud de forma natural en español y complementa «alrededor de toda la casa».
theological_decisions:
- issue: 'ÁDAM como figura ornamental: humano o varón'
  english_pob_reading: human face
  chosen_spanish_reading: rostro humano
  alternative_spanish_readings:
  - rostro de hombre
  - rostro de varón
  rationale: La escena describe tallas simbólicas, no una persona concreta. «Rostro humano» conserva la referencia a la humanidad sin introducir una lectura masculina innecesaria; esto sigue el criterio auditado de evitar especificidad de género no exigida por el contexto.
  doctrine_reference: 'DOCTRINE.md: אָדָם puede ser hombre / humanidad según el contexto; aquí el contexto es ornamental y contrastivo con el león.'
translation_notes:
  revision_awareness: 'La revisión inglesa corrigió el sujeto implícito de singular a plural: «It was made» → «They were made». En español se reflejó con «Estaban hechos», manteniendo el valor colectivo del plural ornamental y evitando un singular impersonal que oscurecería la descripción de los relieves.'
  spanish_consistency_notes:
  - Se mantuvo «rostro» para פְנֵי en ambos miembros, siguiendo la consistencia léxica del paralelismo hebreo.
  - Se evitó «SEÑOR» u otros términos de sustitución porque el versículo no contiene el nombre divino.
  - «Casa» se conserva para בַּיִת por fidelidad al texto fuente, aunque el contexto deja claro que se trata del templo; el español añade «por todos lados» para reforzar la extensión total.
  - «Palmera» se eligió por claridad visual y concordancia con el motivo arquitectónico del pasaje.
