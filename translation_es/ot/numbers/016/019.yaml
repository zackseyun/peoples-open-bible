translation:
  language: es
  text: Y Coré reunió contra ellos a toda la congregación a la entrada de la tienda de reunión[a], y la gloria de Yahvé apareció a toda la congregación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se vierte «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּקְהֵל
  english_pob_choice: assembled
  chosen_spanish: reunió
  alternatives_spanish:
  - convocó
  - juntó
  lexicon: HALOT
  rationale: 'El hiphil de קהל es causativo: Coré hizo que la comunidad se reuniera. «Reunió» transmite bien la acción activa y resulta natural en español sin perder el matiz de convocatoria.'
- source_word: עֲלֵיהֶם
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - ante ellos
  - sobre ellos
  lexicon: HALOT
  rationale: Con el contexto de rebelión, la preposición tiene fuerza adversativa. «Contra ellos» conserva con claridad la orientación hostil de la reunión.
- source_word: כָּל הָעֵדָה
  english_pob_choice: the whole congregation
  chosen_spanish: toda la congregación
  alternatives_spanish:
  - toda la comunidad
  - toda la asamblea
  lexicon: HALOT
  rationale: עֵדָה designa a la comunidad reunida como cuerpo pactal. «Congregación» es fiel al uso habitual en Números; «toda» conserva כָּל.
- source_word: אֶל פֶּתַח אֹהֶל מוֹעֵד
  english_pob_choice: at the entrance to the tent of meeting
  chosen_spanish: a la entrada de la tienda del encuentro
  alternatives_spanish:
  - en la entrada de la tienda del encuentro
  - a la puerta de la tienda del encuentro
  lexicon: HALOT
  rationale: פֶּתַח es la abertura o entrada. «A la entrada de» expresa naturalmente el lugar de reunión en español y mantiene la precisión espacial.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda del encuentro
  alternatives_spanish:
  - la tienda de reunión
  lexicon: HALOT
  rationale: Se conserva la denominación literal y tradicional del tabernáculo en el Pentateuco. «Encuentro» refleja el sentido de מוֹעֵד como lugar señalado de cita/encuentro.
- source_word: וַיֵּרָא
  english_pob_choice: appeared
  chosen_spanish: se apareció
  alternatives_spanish:
  - apareció
  - fue visto
  lexicon: HALOT
  rationale: El nifal de ראה describe una manifestación visible. «Se apareció» comunica la manifestación divina de manera idiomática y conserva el aspecto reflexivo de la escena.
- source_word: כְבוֹד יְהוָה
  english_pob_choice: the glory of Yahweh
  chosen_spanish: la gloria de Yahvé
  alternatives_spanish:
  - la gloria de Yahweh
  - la gloria de Yahvéh
  lexicon: HALOT
  rationale: כָּבוֹד aquí es la manifestación visible y pesada de la presencia divina. Según la norma del proyecto, יְהוָה se vierte «Yahvé».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio, sin sustituirlo por un título. «Yahvé» es la forma establecida para este proyecto en español.
- source_word: אֶל כָּל הָעֵדָה
  english_pob_choice: to the whole congregation
  chosen_spanish: a toda la congregación
  alternatives_spanish:
  - ante toda la congregación
  - para toda la congregación
  lexicon: HALOT
  rationale: La preposición marca el destinatario o el ámbito de la manifestación. «A toda la congregación» conserva el movimiento direccional y fluye bien en español.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: La fuente hebrea usa el Tetragrámaton directamente. Conforme a la política del proyecto, se preserva como nombre propio divino en español, no como sustitución por «Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete de origen; la presente redacción sigue el texto hebreo y el criterio auditado del POB inglés con ajuste natural al español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה, coherente con la terminología del proyecto.
  - «Tienda del encuentro» conserva el nombre del אֹהֶל מוֹעֵד de manera literal y readable en español.
  - Se eligió «congregación» para עֵדָה por consistencia con Números y con la carga comunitaria/pactual del término.
  - La nota al pie se ancla solo en el nombre divino porque esa es la única alternativa de traducción documentada en el audit trail.
