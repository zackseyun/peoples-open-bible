translation:
  language: es
  text: Porque ellos persiguen al que heriste, y relatan el dolor de tus heridos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el dolor de tus muertos». El hebreo חֲלָלֶיךָ también puede significar «tus muertos» o «tus atravesados/heridos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón del clamor o juicio anterior. En español, "Porque" conserva bien el valor causal sin sonar forzado.
- source_word: אַתָּה אֲשֶׁר הִכִּיתָ
  english_pob_choice: the one you struck
  chosen_spanish: al que heriste
  alternatives_spanish:
  - al que golpeaste
  - al que has herido
  lexicon: HALOT
  rationale: El hebreo es singular y remite a una persona afectada por la acción divina. "Heriste" mantiene la fuerza de daño físico y funciona naturalmente con el relativo implícito.
- source_word: רָדָפוּ
  english_pob_choice: they persecute
  chosen_spanish: persiguen
  alternatives_spanish:
  - persiguen con hostilidad
  - acosan
  lexicon: HALOT
  rationale: En este contexto poético de hostilidad, "persiguen" comunica la acción básica del verbo sin añadir interpretación excesiva; la nota teológica/poética del hostigamiento queda en el contexto.
- source_word: מַכְאוֹב
  english_pob_choice: the pain
  chosen_spanish: el dolor
  alternatives_spanish:
  - el sufrimiento
  - la aflicción
  lexicon: HALOT
  rationale: '"Dolor" es la equivalencia más directa y natural en español para מַכְאוֹב, manteniendo el paralelismo con la herida previa.'
- source_word: חֲלָלֶיךָ
  english_pob_choice: those you wounded
  chosen_spanish: tus heridos
  alternatives_spanish:
  - tus muertos
  - los que has herido
  - tus heridos y caídos
  lexicon: HALOT
  rationale: La forma admite el campo semántico de heridos/pierced ones y, en algunos contextos, muertos. Dado el paralelo con "dolor", "tus heridos" preserva la lectura de personas aún ligadas al sufrimiento; el posesivo se conserva de forma natural en español.
- source_word: יְסַפֵּרוּ
  english_pob_choice: they recount
  chosen_spanish: cuentan
  alternatives_spanish:
  - relatan
  - narran
  - hablan de
  lexicon: HALOT
  rationale: '"Cuentan" expresa de modo claro y fiel la acción de narrar/referir. Evita una solemnidad excesiva y mantiene el matiz de exposición del sufrimiento.'
theological_decisions:
- issue: 'Valor de חֲלָלֶיךָ: heridos vs. muertos'
  english_pob_reading: those you wounded
  chosen_spanish_reading: tus heridos
  alternative_spanish_readings:
  - tus muertos
  - los que has herido
  - tus heridos y caídos
  rationale: La forma hebrea puede referirse a heridos, atravesados o, en ciertos contextos, muertos. La traducción principal conserva la tensión sin resolverla hacia "muertos", porque el verso habla de dolor y de una persecución que sigue afectando a las víctimas.
  doctrine_reference: Preservar la ambigüedad léxica documentada del hebreo; no suavizarla con una opción más cerrada.
translation_notes:
  revision_awareness: Esta propuesta sigue el acuerdo alto del cotejo previo y mantiene la tensión léxica documentada para חֲלָלֶיךָ, evitando resolverla de manera definitiva en el texto principal.
  spanish_consistency_notes:
  - Se usó «heriste» para reflejar el pasado perfecto simple natural en español y la acción puntual del hebreo.
  - Se prefirió «persiguen» frente a un término más interpretativo para no cerrar el matiz de רדף.
  - Se mantuvo el posesivo «tus» en la segunda cola para conservar el paralelismo del hebreo.
  - La nota a pie de página ofrece la alternativa «muertos» sin convertirla en lectura principal.
