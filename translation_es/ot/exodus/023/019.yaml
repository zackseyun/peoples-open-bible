translation:
  language: es
  text: Las primeras primicias de tu suelo[a] traerás a la casa de Yahvé, tu Dios. No hervirás un cabrito[b] en la leche de su madre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'de tu tierra'.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'un cabrito'; es decir, una cría joven de cabra.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֵאשִׁית
  english_pob_choice: the first
  chosen_spanish: las primicias
  alternatives_spanish:
  - lo primero
  - la primera parte
  lexicon: HALOT
  rationale: En el sintagma constructo con בִּכּוּרֵי, la idea es la porción inicial/ofrecida primero. 'Primicias' reproduce bien el valor cultual y conserva la relación con el ofrecimiento agrícola sin introducir una paráfrasis.
- source_word: בִּכּוּרֵי
  english_pob_choice: firstfruits
  chosen_spanish: los primeros frutos
  alternatives_spanish:
  - las primicias
  - los frutos primeros
  lexicon: HALOT
  rationale: '''Primicias'' es el equivalente cultual natural en español; en la frase completa, ''las primicias de los primeros frutos'' refleja la doble fuerza del hebreo y mantiene la concreción agrícola del término.'
- source_word: אַדְמָתְךָ
  english_pob_choice: your ground
  chosen_spanish: tu suelo
  alternatives_spanish:
  - tu tierra
  - tu terreno
  lexicon: HALOT
  rationale: '''Suelo'' conserva la referencia a la tierra cultivable, más concreta que ''tierra'' cuando se habla del producto agrícola. ''Tierra'' queda como alternativa posible, pero ''suelo'' preserva el matiz de cultivo.'
- source_word: תָּבִיא
  english_pob_choice: you shall bring
  chosen_spanish: traerás
  alternatives_spanish:
  - deberás traer
  - llevarás
  lexicon: HALOT
  rationale: El imperfecto jussivo/legislativo se vierte naturalmente en español con futuro de mandato. 'Traerás' conserva la fuerza normativa sin sobrecargarla con auxiliares.
- source_word: בֵּית יְהוָה אֱלֹהֶיךָ
  english_pob_choice: the house of Yahweh your God
  chosen_spanish: la casa de Yahvé, tu Dios
  alternatives_spanish:
  - la casa de Yahvé tu Dios
  - la casa de Yahvé, tu Dios
  lexicon: HALOT
  rationale: Se mantiene 'casa' en vez de 'templo' porque el hebreo habla de בית en contexto de santuario/culto y no exige una estructura posterior. 'Yahvé' sigue la convención del proyecto para el nombre divino.
- source_word: לֹא תְבַשֵּׁל
  english_pob_choice: you shall not boil
  chosen_spanish: No cocerás
  alternatives_spanish:
  - No hervirás
  - No cocinarás
  lexicon: HALOT
  rationale: '''Cocer'' comunica la prohibición culinaria en un español amplio y natural. Aunque ''hervir'' es más literal para ''boil'', en español bíblico puede sonar demasiado restrictivo; ''cocer'' mantiene la acción de cocinar en líquido/calor.'
- source_word: גְּדִי
  english_pob_choice: a young goat
  chosen_spanish: un cabrito
  alternatives_spanish:
  - un chivito
  - una cría de cabra
  lexicon: HALOT
  rationale: '''Cabrito'' es la forma natural y precisa en español para un animal joven de la cabra. Preserva el sentido léxico sin necesidad de añadir ''joven'' explícitamente.'
- source_word: בַּחֲלֵב אִמּוֹ
  english_pob_choice: in its mother’s milk
  chosen_spanish: en la leche de su madre
  alternatives_spanish:
  - en la leche de su madre
  - en leche materna
  lexicon: HALOT
  rationale: '''En la leche de su madre'' reproduce la estructura literal del hebreo y conserva la imagen legal con claridad. ''Leche materna'' sería más idiomático, pero pierde la referencia directa a la madre del animal.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: La norma del proyecto exige 'Yahvé' como forma principal en español. Se preserva así el nombre del pacto revelado en el texto hebreo, evitando la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Prohibición de cocer un cabrito en la leche de su madre
  english_pob_reading: Retain the literal prohibition without importing a later doctrinal or ritual explanation into the translation.
  chosen_spanish_reading: Mantener la prohibición literal sin explicar en el cuerpo del texto su trasfondo ritual o moral.
  alternative_spanish_readings:
  - Añadir una paráfrasis explicativa sobre idolatría o crueldad
  - Sugerir una separación alimentaria ritual
  rationale: El hebreo formula la prohibición de manera directa y no desarrolla su motivo. La traducción conserva esa tensión interpretativa, evitando resolverla con una explicación que el verso no da.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior incluyendo cada marcador de nota exactamente en el texto español: [a], [b] y [c]. La redacción también ajusta la estructura para que las notas anclen en palabras presentes en la traducción.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה.
  - Se prefirió 'cocer' como equivalente natural de 'boil' en español bíblico; no se amplió a una explicación doctrinal.
  - La secuencia 'las primicias de los primeros frutos' conserva la duplicación hebrea רֵאשִׁית / בִּכּוּרֵי sin borrar su posible matiz enfático.
  - '''Suelo'' mantiene la concreción agrícola de אַדְמָה.'
