translation:
  language: es
  text: Y pondrán sobre él una cubierta de cuero fino[a], y extenderán sobre ella un paño completamente azul, y pondrán sus varas en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo תַּחַשׁ (tahash) es incierto; puede referirse a una piel animal concreta (tradicionalmente se ha propuesto «piel de cabra», «piel de marsopa» o «piel de dugongo»).
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתְנוּ
  english_pob_choice: they shall put
  chosen_spanish: pondrán
  alternatives_spanish:
  - y pondrán
  - y colocarán
  - y pondrán sobre
  lexicon: HALOT
  rationale: El verbo en instrucciones procedimentales futuras admite fuerza modal en español; «pondrán» conserva el sentido de colocar sin cargar de explicaciones innecesarias.
- source_word: עָלָיו
  english_pob_choice: over it
  chosen_spanish: sobre él
  alternatives_spanish:
  - encima de él
  - sobre ello
  lexicon: HALOT
  rationale: El sufijo masculino singular se refiere al objeto ritual mencionado en el contexto; «sobre él» reproduce la relación espacial de capas sin introducir paráfrasis.
- source_word: כְּסוּי
  english_pob_choice: a covering
  chosen_spanish: una cobertura
  alternatives_spanish:
  - una cubierta
  - un recubrimiento
  - una cobertura
  lexicon: HALOT
  rationale: El sustantivo designa una capa protectora; «cobertura» conserva el valor funcional y suena natural en español bíblico actual.
- source_word: עוֹר תַּחַשׁ
  english_pob_choice: fine leather
  chosen_spanish: cuero fino
  alternatives_spanish:
  - piel de tahash
  - cuero de tahash
  - piel fina
  lexicon: HALOT
  rationale: El término תַּחַשׁ es incierto; la POB inglesa opta por una solución descriptiva. En español, «cuero fino» comunica una cubierta durable sin fingir identificar el animal.
- source_word: וּפָרְשׂוּ
  english_pob_choice: and spread
  chosen_spanish: y extenderán
  alternatives_spanish:
  - y desplegarán
  - y tenderán
  lexicon: HALOT
  rationale: Para una tela o paño, «extenderán» expresa adecuadamente el acto de colocar una capa sobre otra.
- source_word: בֶגֶד
  english_pob_choice: a cloth
  chosen_spanish: una tela
  alternatives_spanish:
  - un paño
  - una prenda
  - un tejido
  lexicon: HALOT
  rationale: Aunque el hebreo puede significar «vestidura», aquí el objeto se coloca como capa sobre el arca; «tela» refleja mejor su función material.
- source_word: כְּלִיל
  english_pob_choice: wholly
  chosen_spanish: totalmente
  alternatives_spanish:
  - completamente
  - enteramente
  - por completo
  lexicon: HALOT
  rationale: El adverbio destaca totalidad; «totalmente» preserva la fuerza de cobertura íntegra sin sonar arcaico.
- source_word: תְּכֵלֶת
  english_pob_choice: blue
  chosen_spanish: azul
  alternatives_spanish:
  - azul púrpura
  - azul violáceo
  - azul
  lexicon: HALOT
  rationale: En el contexto cultual, el color se entiende como azul característico; «azul» es claro y fiel, sin ampliar indebidamente a un matiz específico no exigido por el texto.
- source_word: מִלְמָעְלָה
  english_pob_choice: over that
  chosen_spanish: sobre ella
  alternatives_spanish:
  - por encima
  - desde arriba
  - sobre eso
  lexicon: HALOT
  rationale: La expresión marca la posición superior de la capa azul respecto de la anterior; «sobre ella» conserva la secuencia estratificada en español natural.
- source_word: וְשָׂמוּ
  english_pob_choice: and they shall put
  chosen_spanish: y pondrán
  alternatives_spanish:
  - y colocarán
  - y situarán
  - y pondrán
  lexicon: HALOT
  rationale: Se mantiene la misma solución verbal que al inicio para conservar el estilo procedimental del versículo.
- source_word: בַּדָּיו
  english_pob_choice: its poles in place
  chosen_spanish: sus varas en su lugar
  alternatives_spanish:
  - sus varas
  - sus varas de transporte
  - las varas
  lexicon: HALOT
  rationale: בַּדִּים se refiere a las varas de transporte del arca; «varas» es el equivalente español más transparente, y «en su lugar» explicita la acción implícita de instalarlas.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético y concuerda con la auditoría inglesa: mantiene el orden de las capas, conserva la incertidumbre de תַּחַשׁ mediante una solución descriptiva y refleja la instalación de las varas como acción ritual final.'
  spanish_consistency_notes:
  - Se preservó el paralelismo de acciones mediante verbos futuros simples («pondrán», «extenderán»), acorde con el estilo procedimental del pasaje.
  - Se evitó «SEÑOR» y otras sustituciones teológicas porque el versículo no contiene el tetragrámaton.
  - Se usó «azul» como término estándar para תְּכֵלֶת, sin introducir un matiz cromático no documentado en la auditoría.
  - «Varas» mantiene la referencia funcional al equipo de transporte cultual, más directa que una paráfrasis explicativa excesiva.
