translation:
  language: es
  text: No hagas nada sin consejo[a], y después de tus hechos[b], no te disgustes[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin deliberación»; la expresión puede abarcar tanto recibir consejo como actuar con prudente reflexión.
    reason: lexical_alternative
  - marker: b
    text: El paralelo griego conservado para este versículo no coincide con la redacción hebrea; por eso la traducción sigue principalmente el testimonio hebreo existente.
    reason: textual_variant
  - marker: c
    text: 'Más literalmente, «no te irrites» o «no te enojes». Aquí se expresa el sentido probable en este contexto sapiencial: no quedar disgustado ni con pesar después de actuar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בלא עצה
  english_pob_choice: without counsel
  chosen_spanish: sin consejo
  alternatives_spanish:
  - sin asesoría
  - sin deliberación
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente 'sin consejo/advice'. En español, 'sin consejo' conserva el registro sapiencial y comunica tanto la falta de consulta como la de reflexión prudente.
- source_word: אל תפעל
  english_pob_choice: do nothing
  chosen_spanish: No hagas nada
  alternatives_spanish:
  - No actúes
  - No emprendas nada
  lexicon: HALOT
  rationale: Con דבר como objeto implícito o amplio, la prohibición abarca cualquier acción. 'No hagas nada' es natural en español y mantiene el alcance general del imperativo.
- source_word: ואחר מעשיך
  english_pob_choice: after your deeds
  chosen_spanish: después de tus obras
  alternatives_spanish:
  - después de tus hechos
  - tras tus acciones
  lexicon: HALOT
  rationale: '''מעשיך'' es literalmente ''tus obras/hechos''. ''Obras'' respeta la forma nominal y el paralelismo de sabiduría, sin convertirlo en una paráfrasis más dinámica.'
- source_word: אל תתקצף
  english_pob_choice: do not be regretful
  chosen_spanish: no te aflijas
  alternatives_spanish:
  - no te arrepientas
  - no te irrites
  - no te irrites por ello
  lexicon: HALOT
  rationale: El hebreo puede expresar irritación, disgusto o turbación interior después de la acción. En español, 'no te aflijas' evita añadir un objeto y conserva la idea de pesar o desazón posterior; se mantiene la tensión semántica con alternativas más literales.
translation_notes:
  revision_awareness: Se siguió el hebreo como fuente principal, en línea con el audit trail inglés. La nota griega disponible no coincide con el hebreo de esta unidad, por lo que no se incorporó al texto principal. Se mantuvo la corrección de la revisión inglesa que acerca la segunda cola a 'después de tus obras' y evita añadir un objeto explícito en la clausula final.
  spanish_consistency_notes:
  - Se prefirió 'consejo' para conservar el registro sapiencial.
  - '''Obras'' mantiene el sustantivo plural del hebreo y su cadencia proverbial.'
  - '''No te aflijas'' preserva la ambigüedad afectiva del verbo sin imponer solo una lectura de enojo o arrepentimiento.'
