translation:
  language: es
  text: Entonces volverá su rostro hacia las costas[a] y capturará a muchos. Pero un comandante pondrá fin a su oprobio, sin que su propio oprobio[b] vuelva contra él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a las islas». El término hebreo puede referirse a islas o, de manera más amplia, a regiones costeras o marítimas.
    reason: lexical_alternative
  - marker: b
    text: El hebreo de las cláusulas finales es difícil. También puede significar que un comandante «pondrá fin a su oprobio contra él» y que ese oprobio le será devuelto; es decir, que la afrenta recaerá de vuelta sobre quien la causó.
    reason: alternative_reading
lexical_decisions:
- source_word: וישב פניו
  english_pob_choice: he will turn his face
  chosen_spanish: volverá su rostro
  alternatives_spanish:
  - volverá su atención
  - pondrá su rostro
  - se dirigirá
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y conserva la imagen concreta de “rostro”. En español, “volverá su rostro” mantiene esa imaginería sin sonar tan forzado como una traducción más literal y comunica bien la orientación hacia un objetivo.
- source_word: לאיים
  english_pob_choice: to the coastlands
  chosen_spanish: hacia las costas
  alternatives_spanish:
  - a las islas
  - hacia las tierras marítimas
  lexicon: HALOT
  rationale: El término puede referirse a islas o, más ampliamente, a regiones costeras o marítimas. “Costas” conserva esa amplitud y evita decidir indebidamente por “islas” cuando el contexto admite un referente más amplio.
- source_word: ולכד רבים
  english_pob_choice: and capture many
  chosen_spanish: y capturará a muchos
  alternatives_spanish:
  - y aprehenderá a muchos
  - y se apoderará de muchos
  lexicon: HALOT
  rationale: לכד expresa capturar o apresar en contexto militar. “Capturará” es natural en español y conserva la fuerza de conquista del texto.
- source_word: רבים
  english_pob_choice: many
  chosen_spanish: a muchos
  alternatives_spanish:
  - muchos
  - muchas personas
  - muchos pueblos
  lexicon: HALOT
  rationale: El hebreo deja el sustantivo implícito. “A muchos” reproduce esa tersura y mantiene abierta la referencia, que puede abarcar personas, territorios o grupos sometidos.
- source_word: והשבית
  english_pob_choice: will put an end to
  chosen_spanish: pondrá fin a
  alternatives_spanish:
  - hará cesar
  - detendrá
  lexicon: HALOT
  rationale: El hifil de שבת indica hacer cesar. “Pondrá fin a” comunica con claridad ese valor causativo y encaja de forma natural en español.
- source_word: קצין
  english_pob_choice: a commander
  chosen_spanish: un comandante
  alternatives_spanish:
  - un jefe
  - un oficial
  - un capitán
  lexicon: HALOT
  rationale: קצין designa un dirigente o funcionario militar. “Comandante” es adecuado al marco bélico de Daniel 11 y refleja bien la función del personaje.
- source_word: חרפתו לו
  english_pob_choice: his reproach against him
  chosen_spanish: su oprobio
  alternatives_spanish:
  - su reproche
  - su insulto
  - su afrenta
  lexicon: HALOT
  rationale: חֶרְפָּה puede abarcar oprobio, reproche, afrenta o insulto. “Oprobio” conserva el peso de vergüenza/deshonra y funciona con dignidad en español; aquí la construcción se simplifica para mantener legible la frase sin resolver en exceso la sintaxis difícil.
- source_word: בלתי חרפתו ישיב לו
  english_pob_choice: without his own reproach being turned back on him
  chosen_spanish: sin que su oprobio sea devuelto sobre él
  alternatives_spanish:
  - sin que su afrenta le sea devuelta
  - sin que su reproche vuelva sobre él
  - sin que se le devuelva su insulto
  lexicon: HALOT
  rationale: La clausula final es sintácticamente difícil y el inglés POB la entendió en el sentido de que el oprobio no se vuelve sobre el comandante. “Sin que… sea devuelto sobre él” conserva esa cautela interpretativa y la relación de reversión/retribución que admite יָשִׁיב.
theological_decisions:
- issue: Sentido de las dos cláusulas finales y referencia del oprobio
  english_pob_reading: A military commander stops the king's reproach and turns that reproach back on him; the final clause is difficult and may imply the reproach is not returned on the commander.
  chosen_spanish_reading: Un comandante pone fin al oprobio y ese oprobio no vuelve sobre él.
  alternative_spanish_readings:
  - Un comandante quita su propio oprobio
  - Un comandante devuelve el oprobio al rey
  - Un comandante hace cesar la afrenta del rey sin represalia
  rationale: 'El hebreo es difícil y no conviene cerrar la interpretación más allá de lo que sostiene el texto. La redacción española conserva la ambigüedad clave: hay un oprobio que cesa y una posible reversión de ese oprobio que no recae sobre el comandante. Así se evita imponer una identificación histórica o una resolución sintáctica demasiado precisa.'
  doctrine_reference: Preservar la tensión del texto original; primacía del hebreo sobre la armonización interpretativa.
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó las cláusulas finales para reflejar con mayor cercanía la dificultad sintáctica del hebreo, evitando una lectura demasiado interpretada de ‘recompensar’ o ‘devolver’ el reproche. La propuesta española sigue esa revisión y conserva la ambigüedad controlada del original.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ en el proyecto cuando corresponde al nombre divino, pero este verso no lo contiene.
  - Se eligió ‘Mesías’ como norma del proyecto cuando aplica; este verso no contiene Χριστός/Mesías.
  - Se mantuvo un registro bíblico claro y contemporáneo, evitando arcaísmos innecesarios.
  - Se prefirió ‘oprobio’ para חֶרְפָּה por su capacidad de abarcar reproche, afrenta y deshonra sin perder dignidad estilística.
