translation:
  language: es
  text: ¿Dónde[a], entonces, están tus sabios? Que te lo digan, por favor; que sepan lo que Yahvé de los Ejércitos ha dispuesto contra Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, 'el SEÑOR de los ejércitos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַיָּם
  english_pob_choice: Where ... are
  chosen_spanish: ¿Dónde ... están?
  alternatives_spanish:
  - ¿Dónde están ellos?
  - ¿Dónde, pues, están?
  lexicon: HALOT
  rationale: El hebreo usa una interrogación idiomática de ubicación; en español, '¿Dónde ... están?' conserva la fuerza natural de la pregunta retórica sin sobrecargar el orden.
- source_word: אֵפוֹא
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - pues
  - ahora
  - en verdad
  lexicon: HALOT
  rationale: La partícula añade énfasis inferencial en una reprensión retórica. 'Entonces' reproduce mejor ese matiz que un 'ahora' arcaico o un 'en verdad' excesivo.
- source_word: חֲכָמֶיךָ
  english_pob_choice: your wise men
  chosen_spanish: tus sabios
  alternatives_spanish:
  - tus hombres sabios
  - tus consejeros sabios
  lexicon: HALOT
  rationale: '''Sabios'' es breve y natural en español, y preserva el sentido de la élite de consejeros/entendidos de Egipto sin especificar más allá de lo que el hebreo exige.'
- source_word: וְיַגִּידוּ
  english_pob_choice: Let them tell
  chosen_spanish: Que te lo digan
  alternatives_spanish:
  - Que declaren
  - Que lo reporten
  lexicon: HALOT
  rationale: El imperfecto jussivo en contexto expresa desafío y exhortación. 'Que te lo digan' comunica la invitación desafiante en español actual.
- source_word: נָא
  english_pob_choice: please
  chosen_spanish: por favor
  alternatives_spanish:
  - te ruego
  - ahora
  lexicon: HALOT
  rationale: La partícula de ruego/urgencia se vierte naturalmente como 'por favor', manteniendo el tono irónico o desafiante del pasaje.
- source_word: וְיֵדְעוּ
  english_pob_choice: let them know
  chosen_spanish: que sepan
  alternatives_spanish:
  - que lleguen a saber
  - que entiendan
  lexicon: HALOT
  rationale: El verbo ידע en forma jussiva pide no solo información sino reconocimiento consciente. 'Que sepan' es el equivalente más directo y fluido en español.
- source_word: מַה יָּעַץ
  english_pob_choice: what ... has purposed
  chosen_spanish: lo que Yahvé de los Ejércitos ha dispuesto
  alternatives_spanish:
  - lo que ... ha planeado
  - lo que ... ha aconsejado
  lexicon: HALOT
  rationale: יעץ expresa consejo, plan o determinación. 'Ha dispuesto' comunica bien una resolución deliberada de Dios sin perder la tensión de decreto/propósito presente en el contexto de juicio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino en transliteración, según la terminología del proyecto, en lugar de sustituirlo por un título. 'Yahvé' es la forma estándar del POB en español.
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los ejércitos
  - de las huestes
  lexicon: HALOT
  rationale: El término plural designa las huestes/ejércitos celestiales o militares. En español bíblico del proyecto, 'de los Ejércitos' conserva la mayúscula titular y la transparencia semántica.
- source_word: עַל מִצְרַיִם
  english_pob_choice: against Egypt
  chosen_spanish: contra Egipto
  alternatives_spanish:
  - acerca de Egipto
  - sobre Egipto
  lexicon: HALOT
  rationale: En este contexto judicial, על marca la dirección hostil del propósito divino; 'contra Egipto' expresa con precisión el sentido adversativo.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo emplea el Tetragrama y la política del proyecto es transliterarlo como 'Yahvé'. Esto preserva el nombre personal de Dios y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering יְהוָה צְבָאוֹת
  english_pob_reading: Yahweh of Armies
  chosen_spanish_reading: Yahvé de los Ejércitos
  alternative_spanish_readings:
  - Yahvé de los ejércitos
  - Yahvé de las huestes
  rationale: La expresión funciona como título divino. 'De los Ejércitos' sigue la elección inglesa 'of Armies' y conserva el sentido militar/celestial sin recurrir al tradicional 'de los ejércitos' en minúscula, que perdería parte del valor titular.
  doctrine_reference: DOCTRINE.md Translation philosophy §2, §6
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje permanece en alta concordancia con el control cruzado y sin observaciones sustantivas que requieran ajuste de sentido.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino y 'de los Ejércitos' para el título צְבָאוֹת, en coherencia con el estándar español del proyecto.
  - '''Sabios'' se usa como equivalente idiomático de חֲכָמֶיךָ sin sobreespecificar la función de consejeros o magos.'
  - La estructura interrogativa y el ruego exhortativo se conservan como desafío retórico, no como petición genuina de información.
