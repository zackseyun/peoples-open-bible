    rationale: La nota explica la alternativa de בַּת לֵוִי («una mujer levita»), no el complemento matrimonial implícito en וַיִּקַּח. Debe aparecer sobre la frase a la que comenta para preservar la trazabilidad léxica.
  - severity: low
    issue: El orden «tomó por esposa a...» sería más natural que «tomó por esposa[a] a...».
    rationale: 'El español fluye mejor si el marcador de nota acompaña directamente al sintagma alternativo: «tomó por esposa a una hija de Leví[a]». Así se evita asociar la nota con «esposa».'
  - severity: low
    issue: La redacción de la nota puede normalizarse sin comilla inicial sobrante.
    rationale: 'La forma actual comienza con una comilla antes de «O:», lo cual resulta tipográficamente torpe. Puede simplificarse a «O bien: “una mujer levita”.»'
