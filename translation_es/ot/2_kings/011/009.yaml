translation:
  language: es
  text: Así hicieron los jefes de centenas conforme a todo lo que Jehoyadá, el sacerdote, mandó. Cada uno tomó a sus hombres,[a] los que entraban el sábado junto con los que salían el sábado, y fueron a Jehoyadá, el sacerdote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que venían el sábado ... los que salían el sábado». El hebreo puede traducirse de forma más literal, pero el contexto sugiere los relevos de entrada y salida.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֵי הַמֵּאוֹת
  english_pob_choice: the commanders of hundreds
  chosen_spanish: los jefes de centenas
  alternatives_spanish:
  - los comandantes de centenas
  - los capitanes de centenas
  lexicon: HALOT
  rationale: שָׂרִים designa jefes o funcionarios con autoridad; en este contexto militar, 'jefes de centenas' conserva la estructura del hebreo y su fuerza de mando sin volverlo arcaico.
- source_word: כְּכֹל אֲשֶׁר
  english_pob_choice: according to all that
  chosen_spanish: conforme a todo lo que
  alternatives_spanish:
  - según todo lo que
  - de acuerdo con todo lo que
  lexicon: HALOT
  rationale: La fórmula expresa conformidad total con la orden dada; 'conforme a todo lo que' suena natural en español y conserva el alcance completo.
- source_word: צִוָּה
  english_pob_choice: commanded
  chosen_spanish: había mandado
  alternatives_spanish:
  - había ordenado
  - había instruido
  lexicon: HALOT
  rationale: El verbo implica mandato autoritativo; el pluscuamperfecto refleja bien la acción previa de Jehoyadá respecto de la obediencia narrada.
- source_word: אִישׁ אֶת־אֲנָשָׁיו
  english_pob_choice: Each took his men
  chosen_spanish: Cada uno tomó a sus hombres
  alternatives_spanish:
  - Cada hombre tomó a sus hombres
  - Cada uno tomó a los hombres bajo su mando
  lexicon: HALOT
  rationale: El singular distributivo 'אִישׁ' requiere una expresión distributiva en español. 'Sus hombres' comunica la pertenencia funcional sin añadir más de lo que el texto da.
- source_word: בָּאֵי הַשַּׁבָּת
  english_pob_choice: those coming on the Sabbath
  chosen_spanish: los que entraban el sábado
  alternatives_spanish:
  - los que entraban en sábado
  - los que venían el sábado
  lexicon: HALOT
  rationale: El hebreo habla literalmente de 'los que vienen/entran'; se evita 'de servicio' para no ampliar el sentido más allá del texto, aunque el contexto sí sugiere el relevo de turno.
- source_word: יֹצְאֵי הַשַּׁבָּת
  english_pob_choice: those going out on the Sabbath
  chosen_spanish: los que salían el sábado
  alternatives_spanish:
  - los que salían en sábado
  - los que se iban el sábado
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con 'entraban' y la literalidad del participio, dejando que el contexto explique el relevo de guardia.
- source_word: עִם
  english_pob_choice: together with
  chosen_spanish: junto con
  alternatives_spanish:
  - con
  - en compañía de
  lexicon: HALOT
  rationale: '''Junto con'' expresa la unión de ambos grupos con claridad y sin introducir matices ajenos.'
- source_word: וַיָּבֹאוּ אֶל
  english_pob_choice: and they came to
  chosen_spanish: y vinieron a
  alternatives_spanish:
  - y fueron a
  - y llegaron a
  lexicon: HALOT
  rationale: '''Vinieron a'' conserva el movimiento narrativo del hebreo y funciona de forma natural en español bíblico contemporáneo.'
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote
  lexicon: HALOT
  rationale: Título sacerdotal directo; se conserva la designación simple sin sustituirla por una fórmula eclesiástica distinta.
theological_decisions:
- issue: Relevancia del relevo en sábado versus literalidad del hebreo
  english_pob_reading: those coming on the Sabbath together with those going out on the Sabbath
  chosen_spanish_reading: los que entraban el sábado junto con los que salían el sábado
  alternative_spanish_readings:
  - los que entraban de turno el sábado junto con los que salían de turno el sábado
  - los que entraban en sábado junto con los que salían en sábado
  rationale: Se preserva la literalidad básica del participio y la referencia al sábado, sin convertir la frase en una explicación interpretativa. El contexto militar/templeario deja ver el relevo de guardia.
  doctrine_reference: Ninguna; decisión contextual y sintáctica.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que volvió la expresión a una formulación más literal ('coming on'/'going out') para evitar ampliación interpretativa. Por eso la traducción española mantiene 'entraban'/'salían' y no añade 'de turno' en el texto principal, dejando la inferencia contextual en la nota.
  spanish_consistency_notes:
  - Se usa 'Jehoyadá' para el nombre propio de forma consistente con la transliteración habitual del proyecto.
  - '''sábado'' traduce tanto הַשַּׁבָּת como el valor contextual de cambio de guardia, sin añadir ''de turno'' en el cuerpo principal.'
  - Se conserva 'el sacerdote' para הַכֹּהֵן, en paralelo con el inglés audit trail.
  - La nota [a] está anclada explícitamente en el texto para cumplir la validación y ofrecer la alternativa literal documentada.
