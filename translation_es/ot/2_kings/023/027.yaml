    reason: lexical_alternative
  revision_rationale: 'Se corrigen los anclajes de las notas para que correspondan exactamente a los elementos que explican en el texto fuente y en la auditoría inglesa: la alternativa aspectual se ancla en «rechazaré», y la alternativa léxica se ancla en «la casa». También se mejora la puntuación de la aposición «Jerusalén» para un español más natural y una correspondencia más clara con la estructura identificativa del hebreo.'
