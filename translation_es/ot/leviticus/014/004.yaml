review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura fuente: el sacerdote da la orden, los elementos deben ser tomados, y la lista de objetos para la purificación está completa. Sin embargo, dos decisiones no preservan con suficiente fidelidad el matiz documentado: לַמִּטַּהֵר se acerca mejor a una voz pasiva/procesual como «para el que está siendo purificado» o «para la persona que está siendo purificada» que a «para el que se purifica», que en español puede sonar más reflexivo/voluntario; y שְׁנִי תוֹלַעַת no debe reducirse en el texto principal a solo el color «carmesí», porque la evidencia y la auditoría inglesa retienen explícitamente la idea de material/hilo.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «carmesí» aislado en una lista de objetos suena incompleto en español, como si faltara el sustantivo del material. Además, «el que se purifica» es comprensible, pero menos natural y menos preciso que una formulación pasiva de proceso ritual. Una redacción levemente ajustada mejora fidelidad y fluidez.
  glossary_alignment: No hay conflicto con los términos troncales del proyecto. «Hisopo» está bien con nota; «aves», «madera de cedro» y «limpias» son adecuados. La principal desviación es que el inglés POB fijó «scarlet yarn» con alternativa «scarlet thread», y el español debería reflejar material teñido («hilo escarlata» o similar) en el texto principal, no solo un adjetivo cromático.
  issues:
  - severity: medium
    issue: «carmesí» en el texto principal omite el referente material de שְׁנִי תוֹלַעַת
    rationale: La expresión hebrea denota material teñido de escarlata; el POB inglés eligió «scarlet yarn». En español, «carmesí» solo nombra color y deja la lista de objetos ritualmente incompleta o extraña.
  - severity: medium
    issue: «para el que se purifica» debilita el matiz pasivo/procesual de לַמִּטַּהֵר
    rationale: El participio hitpael aquí apunta a la persona en proceso de ser purificada ritualmente. «Se purifica» puede entenderse como reflexivo activo; «está siendo purificada» o equivalente preserva mejor el sentido.
  - severity: low
    issue: La nota [a] no encaja del todo con el texto principal actual
    rationale: Si el texto principal dice solo «carmesí», la nota que contrapone «hilo escarlata» funciona, pero la relación entre texto y alternativa queda menos clara que si el principal ya expresa un material concreto y la nota preserve otra forma posible.
  revised_spanish_text: Entonces el sacerdote mandará que se tomen, para la persona que está siendo purificada, dos aves vivas y limpias, madera de cedro, hilo escarlata[a] e hisopo[b].
  revised_footnotes:
