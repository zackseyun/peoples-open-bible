  glossary_alignment: No hay conflicto con los términos troncales del proyecto. El pronombre dirigido a Dios se conserva correctamente. Las decisiones léxicas principales son compatibles con la auditoría inglesa, salvo la necesidad de limpiar y normalizar las notas alternativas.
