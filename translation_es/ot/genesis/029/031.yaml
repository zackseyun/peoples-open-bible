revisions:
- from: Cuando Yahvé vio que Lea era odiada[a], le abrió el vientre, pero Raquel era estéril.
  to: Cuando Yahvé vio que Lea no era amada[a], le abrió la matriz, pero Raquel era estéril.
  rationale: Se ajusta שְׂנוּאָה al expediente POB inglés vigente con 'no era amada', manteniendo en nota tanto la opción más fuerte ('odiada') como la comparativa ('menos amada'). También se mejora la naturalidad y dignidad del hebraísmo con 'le abrió la matriz'.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:21:01Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura del hebreo: Yahvé como nombre divino, ''vio que'', la apertura del vientre/útero de Lea y el contraste con la esterilidad de Raquel. Sin embargo, el manejo de שְׂנוּאָה y de la nota no preserva del todo el expediente auditado en inglés: el texto español principal usa ''odiada'', mientras que la versión POB inglesa vigente suavizó a ''unloved'' y conserva alternativas en nota; además, la nota española omite la alternativa ''no amada''.'
  spanish_quality_summary: El español es claro y legible, pero 'le abrió el vientre' suena algo menos idiomático y más corporal de lo necesario en registro bíblico contemporáneo. 'Le abrió la matriz' o 'abrió su matriz' preserva mejor la metáfora sin sonar brusco. También conviene alinear la nota con el texto principal para evitar una tensión innecesaria entre traducción y aparato.
  glossary_alignment: Se alinea correctamente con la terminología del proyecto en 'Yahvé'. No hay conflicto con otros términos doctrinales mayores. El punto principal es la consistencia con la decisión léxica/auditada para שְׂנוּאָה en este versículo y una formulación española más natural para רַחְמָהּ.
  issues:
  - severity: medium
    issue: La traducción principal de שְׂנוּאָה como 'odiada' no sigue la lectura POB inglesa vigente ('unloved')
    rationale: Aunque el hebreo fuerte permite 'odiada', el expediente auditado muestra una revisión deliberada a 'unloved'. En español, 'no amada' preserva mejor esa decisión editorial sin borrar la nota alternativa comparativa.
  - severity: medium
    issue: La nota al pie está incompleta respecto al expediente inglés
    rationale: La nota inglesa preserva 'unloved' y 'loved less' como alternativas. En español, al menos debe reflejar 'no amada' y 'menos amada' para conservar el abanico semántico documentado.
  - severity: low
    issue: '''Le abrió el vientre'' suena menos natural en registro bíblico digno'
    rationale: Aunque es comprensible, 'abrir la matriz' es más idiomático y preciso en español eclesial/general para el hebraísmo de abrir el vientre.
  revised_spanish_text: Cuando Yahvé vio que Lea no era amada[a], le abrió la matriz, pero Raquel era estéril.
  revised_footnotes:
  - marker: a
    text: O 'odiada' o 'menos amada', reflejando el sentido comparativo que el término puede tener en algunos contextos.
    reason: lexical_alternative
  revision_rationale: Se ajusta שְׂנוּאָה al expediente POB inglés vigente con 'no era amada', manteniendo en nota tanto la opción más fuerte ('odiada') como la comparativa ('menos amada'). También se mejora la naturalidad y dignidad del hebraísmo con 'le abrió la matriz'.
