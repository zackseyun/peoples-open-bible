review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: un amigo cambia de relación y luego divulga un conflicto de manera deshonrosa. También conserva correctamente la nota sobre el sustantivo abstracto ἔχθραν. Sin embargo, la frase española ''se vuelve enemistad'' es demasiado literal y suena poco idiomática, casi incoherente, aunque intenta preservar la abstracción del griego. El segundo hemistiquio es básicamente fiel, pero ''descubrirá'' aquí suena menos natural que ''sacará a la luz'' o ''revelará'' en un contexto de exposición hostil.'
  spanish_quality_summary: La legibilidad necesita una reparación menor. 'Y hay un amigo que se vuelve enemistad' no es español natural; conviene reformular sin perder el matiz abstracto, por ejemplo 'que se vuelve hostil' con nota, o 'que se convierte en causa de enemistad', aunque esto último añade contenido. En la segunda mitad, 'sacará a la luz una disputa para tu vergüenza' fluye mejor y comunica mejor ἀποκαλύψει en contexto hostil. El resto del registro es digno y claro.
  glossary_alignment: No hay términos teológicos de proyecto en juego. Léxicamente, 'amigo' para φίλος y 'disputa' para μάχην están bien. Debe ajustarse la representación de εἰς ἔχθραν para evitar un calco infeliz en español, conservando la explicación en nota de que el griego usa un abstracto, no 'enemigo'.
  issues:
  - severity: high
    issue: La expresión 'se vuelve enemistad' es antinatural en español.
    rationale: Aunque intenta copiar la abstracción del griego εἰς ἔχθραν, en español no funciona bien predicativamente con una persona. Esto perjudica la inteligibilidad y la calidad literaria.
  - severity: medium
    issue: '''Descubrirá'' es menos idiomático que otras opciones en este contexto.'
    rationale: Para ἀποκαλύψει en un contexto de divulgación vergonzosa, 'sacará a la luz' o 'revelará' expresa mejor la idea de exponer algo oculto con efecto deshonroso.
  - severity: low
    issue: La nota a sobre alternativa podría anclarse a una formulación más natural del texto principal.
    rationale: Si el texto principal usa una solución idiomática como 'se vuelve hostil', la nota puede seguir preservando que el griego dice 'enemistad' en abstracto.
  revised_spanish_text: Y hay un amigo que se vuelve hostil[a], y sacará a la luz una disputa para tu vergüenza[b].
  revised_footnotes:
