translation:
  language: es
  text: Pero yo he oído acerca de ti que puedes dar interpretaciones y resolver dificultades[a]. Ahora, si puedes leer la escritura y darme a conocer su interpretación, te vestirán de púrpura, pondrán una cadena de oro alrededor de tu cuello, y gobernarás como tercero en el reino[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Arameo literalmente: «desatar nudos», un modismo para resolver asuntos difíciles o despejar perplejidades.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «serás el tercer gobernante en el reino». La frase probablemente se refiere al tercer rango en el reino.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַאֲנָה
  english_pob_choice: But I
  chosen_spanish: Pero yo
  alternatives_spanish:
  - Y yo
  - Ahora yo
  lexicon: HALOT
  rationale: La partícula conjuntiva con pronombre independiente marca un giro discursivo personal y contrastivo. En español, 'Pero yo' conserva mejor esa transición que un simple 'Y yo'.
- source_word: שִׁמְעֵת
  english_pob_choice: have heard
  chosen_spanish: he oído
  alternatives_spanish:
  - oí
  - he escuchado
  lexicon: HALOT
  rationale: El perfecto arameo expresa una noticia ya recibida con relevancia presente; el perfecto español 'he oído' refleja bien esa actualidad.
- source_word: עֲלָיִךְ
  english_pob_choice: about you
  chosen_spanish: acerca de ti
  alternatives_spanish:
  - sobre ti
  - de ti
  lexicon: HALOT
  rationale: La preposición introduce el contenido del reporte sobre Daniel; 'acerca de ti' es natural y mantiene el matiz relacional sin endurecerlo.
- source_word: דִּי תוכל
  english_pob_choice: that you are able
  chosen_spanish: que puedes
  alternatives_spanish:
  - que eres capaz de
  - que puedes ser capaz de
  lexicon: HALOT
  rationale: El giro reportativo introduce la capacidad atribuida a Daniel. En español, 'puedes' conserva la fuerza de capacidad sin alargar innecesariamente la frase.
- source_word: פִּשְׁרִין לְמִפְשַׁר
  english_pob_choice: to give interpretations
  chosen_spanish: dar interpretaciones
  alternatives_spanish:
  - interpretar
  - dar la interpretación
  lexicon: HALOT
  rationale: La combinación sustantivo-verbo en arameo es idiomática. 'Dar interpretaciones' conserva la pluralidad del sustantivo y suena natural en español.
- source_word: וְקִטְרִין לְמִשְׁרֵא
  english_pob_choice: to solve difficulties
  chosen_spanish: resolver dificultades
  alternatives_spanish:
  - desatar nudos
  - resolver problemas
  - explicar enigmas
  lexicon: HALOT
  rationale: El trasfondo literal es 'desatar nudos', pero el sentido idiomático es resolver asuntos difíciles. 'Resolver dificultades' comunica el valor semántico sin perder la tensión lexical, que se preserva en la nota.
- source_word: כְּעַן
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Pues ahora
  - Entonces
  lexicon: HALOT
  rationale: Marca el paso de la referencia previa a la oferta inmediata; 'Ahora' es breve y plenamente idiomático.
- source_word: הֵן תוכל
  english_pob_choice: if you are able
  chosen_spanish: si puedes
  alternatives_spanish:
  - si eres capaz
  - si en verdad puedes
  lexicon: HALOT
  rationale: La cláusula condicional enfatiza la capacidad requerida. 'Si puedes' es la forma más natural en español y mantiene el énfasis.
- source_word: כְּתָבָא
  english_pob_choice: the writing
  chosen_spanish: la escritura
  alternatives_spanish:
  - la inscripción
  - el escrito
  lexicon: HALOT
  rationale: En el contexto narrativo del texto misterioso en la pared, 'la escritura' es clara y fiel, y evita especificar más de lo que el hebreo/arameo exige.
- source_word: לְמִקְרֵא
  english_pob_choice: to read
  chosen_spanish: leer
  alternatives_spanish:
  - proclamar
  - leer en voz alta
  lexicon: HALOT
  rationale: El sentido básico es leer el mensaje escrito de manera inteligible. 'Leer' es directo y suficiente.
- source_word: וּפִשְׁרֵהּ לְהוֹדָעוּתַנִי
  english_pob_choice: and make its interpretation known to me
  chosen_spanish: y hacerme conocer su interpretación
  alternatives_spanish:
  - y darme a conocer su interpretación
  - y revelarme su interpretación
  lexicon: HALOT
  rationale: Se conserva el verbo causativo de 'hacer conocer' y el sustantivo 'interpretación'. La formulación española es natural sin perder precisión.
- source_word: אַרְגְּוָנָא תִלְבַּשׁ
  english_pob_choice: you shall be clothed with purple
  chosen_spanish: te vestirán de púrpura
  alternatives_spanish:
  - serás vestido de púrpura
  - vestirás púrpura
  lexicon: HALOT
  rationale: El honor se expresa mediante la imposición de la ropa púrpura. En español, la pasiva personal 'te vestirán de púrpura' transmite mejor la acción honorífica.
- source_word: וְהַמּוֹנְכָא דִי דַהֲבָא עַל צַוְּארָךְ
  english_pob_choice: and a chain of gold shall be put around your neck
  chosen_spanish: y pondrán una cadena de oro sobre tu cuello
  alternatives_spanish:
  - y una cadena de oro será puesta sobre tu cuello
  - y una cadena de oro alrededor de tu cuello
  lexicon: HALOT
  rationale: '''Cadena de oro'' expresa el ornamento de honor. ''Pondrán'' conserva la idea de bestowal implícita en el pasaje, mientras que ''sobre tu cuello'' sigue de cerca la preposición del original.'
- source_word: וְתַלְתָּא בְמַלְכוּתָא תִּשְׁלַט
  english_pob_choice: and you shall rule as third in the kingdom
  chosen_spanish: y gobernarás como tercero en el reino
  alternatives_spanish:
  - y serás el tercer gobernante en el reino
  - y tendrás el tercer lugar en el reino
  lexicon: HALOT
  rationale: La frase apunta a rango/autoridad en tercer lugar dentro del reino. 'Gobernarás como tercero' conserva la ambigüedad entre cargo y rango, tal como la nota inglesa.
theological_decisions:
- issue: 'Alcance de la oferta de Beltsasar: rango o gobernante literal de tercer nivel'
  english_pob_reading: The phrase likely refers to third rank in the realm.
  chosen_spanish_reading: la frase apunta al tercer rango o a la tercera autoridad en el reino
  alternative_spanish_readings:
  - gobernarás como tercero en el reino
  - serás el tercer gobernante en el reino
  rationale: El arameo permite entender una oferta de rango/autoridad, no necesariamente un título técnico exacto. La formulación española mantiene esa ambigüedad sin cerrarla en exceso.
  doctrine_reference: Historia/lexicografía bíblica; nota de sentido contextual
translation_notes:
  revision_awareness: Se siguió el audit trail inglés de alta concordancia sin cambios revisados; la principal adaptación fue hacer más natural en español la oferta honorífica y la cláusula condicional, manteniendo las tensiones léxicas documentadas en las notas.
  spanish_consistency_notes:
  - Se usa 'púrpura' como término honorífico estable en español bíblico.
  - Se mantiene 'interpretación' como sustantivo técnico para פִּשְׁרָא / פשר.
  - Se evita 'SEÑOR' u otra terminología no presente; el verso no contiene referencias al Nombre divino.
  - La nota de 'desatar nudos' se preserva como alternativa léxica porque el modismo arameo es relevante para la exégesis.
