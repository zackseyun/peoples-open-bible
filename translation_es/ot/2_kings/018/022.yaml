revisions:
- from: 'Pero si me decís: ‘En Yahvé nuestro Dios hemos confiado’, ¿no es él a quien Ezequías ha quitado sus lugares altos y sus altares, y dijo a Judá y a Jerusalén: ‘Delante de este altar adorarán[a] en Jerusalén’?'
  to: 'Pero si me dicen: «En Yahvé nuestro Dios hemos confiado», ¿no es él cuyos lugares altos y cuyos altares Ezequías ha quitado, y dijo a Judá y a Jerusalén: «Adoren[a] delante de este altar en Jerusalén»?'
  rationale: Se corrige el relativo para reflejar fielmente el posesivo hebreo («cuyos lugares altos y cuyos altares»), se reemplaza «me decís» por «me dicen» para un español neutral más amplio, y se corrige la persona verbal de la cita final a 2.ª plural natural («Adoren»), manteniendo la nota con la alternativa más literal de postración. No se requiere adjudicación adicional porque los cambios son claros y mecánicos a partir del hebreo y de la auditoría inglesa.
  reviewer_model: gpt-5.4
