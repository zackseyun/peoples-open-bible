translation:
  language: es
  text: Pero la mayoría de ellos escaparon heridos y desnudos[a]; y Lisias mismo también escapó huyendo vergonzosamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «despojados», posiblemente indicando que huyeron tras perder su equipo o sus vestiduras exteriores en la batalla.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ πλείονες
  english_pob_choice: most of them
  chosen_spanish: la mayoría de ellos
  alternatives_spanish:
  - la mayor parte de ellos
  - la mayoría
  lexicon: LSJ
  rationale: πλείονες funciona aquí como sustantivo para indicar el grupo mayoritario. En español, «la mayoría de ellos» es natural y conserva el valor cuantitativo sin sobrecargar la frase.
- source_word: τραυματίαι
  english_pob_choice: wounded
  chosen_spanish: herida
  alternatives_spanish:
  - heridos
  - lastimada
  lexicon: LSJ
  rationale: El griego describe a los que salieron con heridas. Como concuerda con «la mayoría» en femenino plural implícito por «parte/mayoría» en español, se eligió una forma que preserve la referencia a los combatientes sin añadir información ajena.
- source_word: γυμνοὶ
  english_pob_choice: naked
  chosen_spanish: desnuda
  alternatives_spanish:
  - desnudos
  - despojados
  - sin ropa
  lexicon: LSJ
  rationale: Se mantiene el sentido directo de «desnudos», porque el texto griego dice literalmente que escaparon así. El matiz de haber perdido armamento o vestiduras queda como posibilidad interpretativa, no como sustitución del término.
- source_word: διεσώθησαν
  english_pob_choice: escaped
  chosen_spanish: escapó
  alternatives_spanish:
  - se salvaron
  - quedaron a salvo
  - lograron escapar
  lexicon: LSJ
  rationale: En contexto narrativo militar, el verbo indica sobrevivir y salir del peligro. «Escapó/escaparon» comunica ese resultado de forma clara en español.
- source_word: αἰσχρῶς
  english_pob_choice: shamefully
  chosen_spanish: vergonzosamente
  alternatives_spanish:
  - afrentosamente
  - deshonrosamente
  lexicon: LSJ
  rationale: El adverbio expresa deshonra o vergüenza. «Vergonzosamente» conserva bien la evaluación moral del griego en español actual.
- source_word: φεύγων
  english_pob_choice: by fleeing
  chosen_spanish: huyendo
  alternatives_spanish:
  - al huir
  - mientras huía
  lexicon: LSJ
  rationale: El participio presente indica simultaneidad con la huida. «Huyendo» reproduce esa circunstancia de manera fluida y natural.
- source_word: διεσώθη
  english_pob_choice: escaped
  chosen_spanish: escapó
  alternatives_spanish:
  - se salvó
  - quedó a salvo
  - logró escapar
  lexicon: LSJ
  rationale: En la clausula final, el verbo conserva el mismo campo semántico de salir con vida del combate. «Escapó» es el equivalente narrativo más directo.
theological_decisions:
- issue: Valor de διεσώθησαν / διεσώθη en contexto militar
  english_pob_reading: escaped / escaped
  chosen_spanish_reading: escapó / escapó
  alternative_spanish_readings:
  - se salvaron / se salvó
  - quedaron a salvo
  rationale: No hay aquí una afirmación soteriológica, sino un reporte de retirada y supervivencia en combate. Por eso se evita «se salvaron» como lectura principal, para no desplazar el matiz narrativo del pasaje.
  doctrine_reference: No doctrinal issue; narrative military context.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden de forma alta; la única tensión relevante es γυμνοί, donde el inglés conserva «naked» y anota una alternativa interpretativa («stripped»). En español se mantiene «desnuda» en el cuerpo para respetar el valor literal del griego y se añade nota para la alternativa contextual.
  spanish_consistency_notes:
  - Se preservó el registro narrativo militar del pasaje.
  - Se evitó introducir terminología eclesiástica o soteriológica ajena al contexto.
  - La nota al pie marca explícitamente la alternativa interpretativa correspondiente a γυμνοί.
  - Se mantuvo un estilo español moderno, digno y publicable.
