revisions:
- from: Tú dijiste que se construyera un templo en tu santo monte[a], y un altar en la ciudad de tu morada, una copia del santo tabernáculo que preparaste desde el principio.
  to: Tú dijiste edificar un templo en tu santo monte, y un altar en la ciudad de tu morada, una copia del santo tabernáculo[a] que preparaste desde el principio.
  rationale: Se corrige la sintaxis de εἶπας οἰκοδομῆσαι con «dijiste edificar», que preserva mejor el vínculo directo entre el verbo principal y el infinitivo griego sin introducir un mandato explícito ajeno al texto. También se reubica la nota léxica al término «tabernáculo», que es el elemento al que realmente corresponde la alternativa de σκηνή. No se requieren cambios doctrinales ni de terminología principal.
