  rationale: Se ajustó «a una puerta» a «junto a una puerta» para reflejar mejor παρὰ θύραν en español natural y fiel. Se suavizó la sintaxis inicial a «Es falta de disciplina en un hombre...» para conservar el sentido del genitivo sin una construcción forzada. Se eliminó la nota sobre «prudente» por innecesaria; se mantuvo solo la nota que preserva la literalidad y la implicación contextual del acto de escuchar a la puerta. No se requiere adjudicación adicional.
