translation:
  language: es
  text: 'Mencionaré a Rahab y a Babilonia entre los que me conocen[a]; he aquí a Filistea y Tiro, junto con Cus[b]: este nació allí[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Rahab es un nombre poético para Egipto.
    reason: alternative_reading
  - marker: b
    text: 'O: «a los que me conocen». La frase hebrea puede indicar inclusión entre quienes reconocen al hablante.'
    reason: lexical_alternative
  - marker: c
    text: Es decir, en Sion, por el contexto del salmo.
    reason: cross_reference
lexical_decisions:
- source_word: אַזְכִּיר
  english_pob_choice: I will mention
  chosen_spanish: Mencionaré
  alternatives_spanish:
  - Haré mención de
  - Recordaré
  lexicon: HALOT
  rationale: El hifil de זכר expresa aquí hacer mención. «Mencionaré» conserva el valor verbal y el tono poético sin sonar rígido en español.
- source_word: רַהַב
  english_pob_choice: Rahab
  chosen_spanish: Rahab
  alternatives_spanish:
  - Egipto
  lexicon: HALOT
  rationale: Se conserva el nombre poético transliterado en el texto principal, como en la tradición auditable de la POB. El referente histórico-geográfico se mantiene para nota.
- source_word: וּבָבֶל
  english_pob_choice: and Babylon
  chosen_spanish: y a Babilonia
  alternatives_spanish:
  - y Babilonia
  lexicon: HALOT
  rationale: Nombre propio de lugar; en español la preposición «a» hace natural la coordinación con el objeto directo de «mencionar».
- source_word: לְיֹדְעָי
  english_pob_choice: among those who know me
  chosen_spanish: entre los que me conocen
  alternatives_spanish:
  - a los que me conocen
  - entre quienes me conocen
  lexicon: HALOT
  rationale: La preposición ל con el participio y sufijo 1cs admite una inclusión en un grupo. «Entre los que me conocen» expresa bien esa pertenencia sin perder la relación de primera persona.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - he ahí
  lexicon: HALOT
  rationale: «He aquí» reproduce el llamado de atención del hebreo en un registro digno y bíblico, adecuado para poesía.
- source_word: פְלֶשֶׁת
  english_pob_choice: Philistia
  chosen_spanish: Filistea
  alternatives_spanish:
  - la tierra de los filisteos
  - los filisteos
  lexicon: HALOT
  rationale: El hebreo nombra la región; «Filistea» preserva el paralelismo de nombres propios con Tiro y Cus.
- source_word: וְצוֹר
  english_pob_choice: and Tyre
  chosen_spanish: y Tiro
  alternatives_spanish:
  - y la ciudad de Tiro
  lexicon: HALOT
  rationale: Nombre propio estándar en español.
- source_word: עִם כּוּשׁ
  english_pob_choice: along with Cush
  chosen_spanish: junto con Cus
  alternatives_spanish:
  - con Cus
  - junto a Cus
  lexicon: HALOT
  rationale: עִם marca acompañamiento. «Junto con» mantiene la relación de agrupación con naturalidad en español.
- source_word: כּוּשׁ
  english_pob_choice: Cush
  chosen_spanish: Cus
  alternatives_spanish:
  - Cush
  - Etiopía
  lexicon: HALOT
  rationale: Se adopta la forma española «Cus», ampliamente reconocible y fiel al nombre propio, evitando la posible sobreinterpretación histórica de «Etiopía».
- source_word: זֶה
  english_pob_choice: this one
  chosen_spanish: este
  alternatives_spanish:
  - esta persona
  - uno
  lexicon: HALOT
  rationale: El demostrativo es singular masculino. En español, «este» puede funcionar sustantivamente y mantiene la brevedad poética sin introducir «hombre» u otro sustantivo no explicitado.
- source_word: יֻלַּד שָׁם
  english_pob_choice: was born there
  chosen_spanish: nació allí
  alternatives_spanish:
  - fue nacido allí
  - ha nacido allí
  lexicon: HALOT
  rationale: El pasivo de ילד con שָׁם expresa nacimiento en ese lugar; «nació allí» es la formulación más natural en español y conserva el hecho declarado.
theological_decisions:
- issue: Identidad del hablante en la primera persona
  english_pob_reading: Retain the first-person pronoun without specifying the speaker in the translation.
  chosen_spanish_reading: Conservar la primera persona sin identificar explícitamente al hablante en la línea.
  alternative_spanish_readings:
  - El hablante es Yahvé
  - El hablante es Sion personificada
  rationale: El contexto del salmo orienta la interpretación, pero la línea misma no nombra al hablante. La traducción conserva la ambigüedad literaria del hebreo sin imponer una glosa interpretativa.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla en el texto principal.
- issue: Referente de «allí»
  english_pob_reading: Leave 'there' implicit, referring contextually to Zion.
  chosen_spanish_reading: Mantener «allí» como referencia contextual a Sion/Zion.
  alternative_spanish_readings:
  - allí = en Sion
  - allí = en la ciudad de Dios
  rationale: El adverbio espacial funciona por contexto poético. Se preserva en español sin sustituirlo por una explicación dentro del versículo.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla.
- issue: Uso de «Yahvé» versus un título velado
  english_pob_reading: POB default renders יהוה as Yahvé.
  chosen_spanish_reading: No aparece יהוה explícito en este versículo; por tanto no se introduce ningún equivalente divino en el texto.
  alternative_spanish_readings:
  - SEÑOR
  - Yahvé
  rationale: La decisión terminológica general de la POB para יהוה no se activa aquí, porque el versículo no contiene el nombre divino; el español conserva la referencia pronominal de primera persona del hebreo.
  doctrine_reference: Consistencia terminológica con el proyecto.
translation_notes:
  revision_awareness: 'La redacción sigue la lectura auditada de la POB en inglés y su ajuste de puntuación: lista de naciones con dos puntos antes de la declaración final. Se conservan los nombres propios y la ambigüedad contextual sobre el hablante y el lugar de referencia.'
  spanish_consistency_notes:
  - Se usó «Cus» como forma española breve y estable del nombre propio.
  - Se mantuvo la enumeración poética con coma y dos puntos para reflejar la estructura del hebreo y de la POB inglesa.
  - Se evitó reemplazar «los que me conocen» por una glosa doctrinal, dejando la posible lectura alternativa en nota.
  - No se introdujo «SEÑOR» porque el nombre divino no está presente en el versículo.
  - La elección de «Filistea» mantiene el paralelo de topónimos con Babilonia, Tiro y Cus.
