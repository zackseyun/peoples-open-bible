translation:
  language: es
  text: los que absuelven al impío por un soborno[a], y privan a los justos de su justicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que justifican al impío a causa de un soborno, y les quitan la justicia a los justos».'
    reason: alternative_reading
lexical_decisions:
- source_word: מַצְדִּיקֵי
  english_pob_choice: who acquit
  chosen_spanish: los que absuelven
  alternatives_spanish:
  - los que justifican
  - los que declaran justo
  lexicon: HALOT
  rationale: En un contexto judicial, el hifil de צדק expresa declarar inocente o dar por justo en sentido forense. «Absuelven» transmite bien la acción judicial sin confundirla con una justificación moral interior.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: al impío
  alternatives_spanish:
  - al malvado
  - al culpable
  lexicon: HALOT
  rationale: El sustantivo/adjetivo singular funciona aquí como clase. «Impío» conserva el contraste moral del hebreo y suena natural en español bíblico contemporáneo.
- source_word: עֵקֶב
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - debido a
  - por motivo de
  lexicon: HALOT
  rationale: En la construcción con שֹׁחַד, el sentido es causal. «Por» es breve y idiomático en español, y puede cubrir tanto la idea de causa como de motivo del acto judicial.
- source_word: שֹׁחַד
  english_pob_choice: a bribe
  chosen_spanish: un soborno
  alternatives_spanish:
  - un cohecho
  - un pago
  - una dádiva
  lexicon: HALOT
  rationale: El sustantivo designa un soborno. «Soborno» es claro y preciso en español actual; «cohecho» es más técnico y menos transparente para lectura general.
- source_word: צִדְקַת
  english_pob_choice: the righteousness
  chosen_spanish: su justicia
  alternatives_spanish:
  - su rectitud
  - su derecho
  - su justicia/rectitud
  lexicon: HALOT
  rationale: El término puede abarcar justicia o rectitud, y aquí el paralelismo con la absolución injusta sugiere la privación de lo que corresponde al justo. «Su justicia» mantiene la fuerza del sustantivo y el vínculo con צדק, sin resolver demasiado la tensión entre justicia y derecho.
- source_word: צַדִּיקִים
  english_pob_choice: the righteous
  chosen_spanish: al justo
  alternatives_spanish:
  - a los justos
  - a los inocentes
  - a los rectos
  lexicon: HALOT
  rationale: Aunque el hebreo es plural, el sufijo singular final permite una lectura distributiva. En español, el singular colectivo «al justo» suena natural y conserva la referencia al grupo de personas justas, entendidas distributivamente.
- source_word: יָסִירוּ
  english_pob_choice: deprive of
  chosen_spanish: privan de
  alternatives_spanish:
  - quitan
  - remueven
  - despojan de
  lexicon: HALOT
  rationale: El hifil de סור tiene el sentido de retirar o quitar. «Privan de» expresa bien la acción de despojar a alguien de lo que le pertenece en un contexto legal y moral.
- source_word: מִמֶּנּוּ
  english_pob_choice: from him
  chosen_spanish: de su
  alternatives_spanish:
  - de él
  - de ellos
  - de la persona
  lexicon: HALOT
  rationale: El sufijo masculino singular del hebreo puede entenderse distributivamente con el plural precedente. En español, «de su justicia» evita una construcción pesada y deja implícita la referencia distributiva al justo.
theological_decisions:
- issue: Campo semántico de צִדְקָה en denuncia judicial
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - derecho
  rationale: La POB inglesa preserva la tensión entre moral y foro legal con «righteousness». En español, «justicia» conserva la amplitud semántica del hebreo y encaja con la denuncia de corrupción judicial, sin reducir el término a mera piedad interior.
  doctrine_reference: 'DOCTRINE.md: consistencia terminológica y preservación de tensiones textuales'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo masorético y el audit trail inglés: mantiene el contexto forense de מַצְדִּיקֵי, conserva el valor causal de עֵקֶב, y refleja la variante final con un pronombre distributivo implícito en español. Se eligió una formulación natural en español que no borra la tensión entre justicia, rectitud y derecho.'
  spanish_consistency_notes:
  - Se mantiene «justicia» para צִדְקָה, coherente con el uso legal-ético del pasaje y con la preferencia POB de no resolver en exceso el matiz.
  - «Soborno» se usa como equivalente transparente de שֹׁחַד.
  - El plural hebreo con sufijo singular final se rinde de forma distributiva en español mediante un singular colectivo y pronombre posesivo contextual.
  - Se evita «SEÑOR» y no hay nombres divinos en este versículo.
