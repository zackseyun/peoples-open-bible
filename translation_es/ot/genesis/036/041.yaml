    issue: Transliteración de אָהֳלִיבָמָה como «Oholibamá»
    rationale: La tilde final no es necesaria y la forma se aleja tanto de la transliteración fuente como del uso bíblico reconocible. «Oholibama» preserva mejor el nombre sin imponer una adaptación dudosa.
  - severity: medium
    issue: Transliteración de אֵלָה como «Elá»
    rationale: La forma con tilde final es poco natural y menos reconocible. «Ela» o «Elah» serían más fieles; «Ela» es una adaptación española sencilla y clara.
  - severity: low
    issue: Uso de mayúscula en «Jefe» al inicio
    rationale: En listas nominales españolas, el título común no requiere valor de nombre propio. «jefe» en minúscula mantiene mejor el estilo de enumeración del hebreo y del POB inglés.
