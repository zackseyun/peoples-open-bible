review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia peticional del hebreo y conserva las decisiones clave del POB: ''en el cielo'', ''el lugar donde habitas'', ''perdona'', ''actúa'', ''da a cada hombre'', ''según todos sus caminos'', ''cuyo corazón conoces'' y la cláusula final sobre el conocimiento exclusivo de Dios del corazón humano. Sin embargo, la nota [a] no corresponde al mismo tipo de nota del rastro inglés: allí la nota se ancla a ''heaven'' pero explica ''all the sons of man''. En español, la nota sobre ''en el cielo'' es innecesaria y desplaza la aclaración importante sobre la expresión antropológica final.'
  spanish_quality_summary: El español es claro y digno, pero la apertura 'entonces, oye' suena más a imperativo directo que a súplica reverente; 'entonces, escucha' o una formulación con subjuntivo sería más natural. Además, la puntuación con punto y coma antes de 'porque' es algo pesada. 'Solo tú' fluye mejor que 'tú solo' en este contexto enfático. En conjunto, requiere un ajuste menor de estilo y de notas, no una reescritura mayor.
  glossary_alignment: No aparecen términos del glosario principal como Yahvé/Mesías. La conservación de 'cada hombre' y 'hijos del hombre' concuerda con la política de precisión de género documentada. 'Corazón' para לֵבָב y 'actúa' para וְעָשִׂיתָ están alineados con la justificación lexical del POB.
  issues:
  - severity: medium
    issue: La nota [a] explica 'en el cielo' en vez de la expresión antropológica final.
    rationale: 'El rastro inglés conserva una sola nota, anclada de manera algo indirecta, para aclarar ''all the sons of man''. En español conviene preservar esa aclaración donde pertenece semánticamente: ''todos los hijos del hombre''. Mantener una nota sobre ''en el cielo'' introduce información no priorizada por el POB auditado.'
  - severity: low
    issue: '''Oye'' puede sonar demasiado brusco en español litúrgico-bíblico.'
    rationale: Aunque semánticamente es defendible como petición, 'escucha' suena más natural y reverente en oración dirigida a Dios, sin perder el valor peticional del imperfecto hebreo.
  - severity: low
    issue: '''tú solo'' es menos idiomático que ''solo tú'' en esta cláusula enfática.'
    rationale: Ambas son posibles, pero 'porque solo tú conoces...' suena más natural en español contemporáneo y expresa mejor la exclusividad adverbial de לְבַדְּךָ.
  revised_spanish_text: entonces, escucha en el cielo, el lugar donde habitas, perdona, actúa y da a cada hombre según todos sus caminos, cuyo corazón conoces, porque solo tú conoces el corazón de todos los hijos del hombre[a].
  revised_footnotes:
  - marker: a
    text: 'Hebreo: “todos los hijos del hombre”, un modismo que designa a todos los seres humanos.'
    reason: lexical_alternative
  revision_rationale: Se elimina la nota innecesaria sobre 'en el cielo' y se conserva la aclaración importante sobre la expresión hebrea 'todos los hijos del hombre'. Además, se mejora levemente la naturalidad y el tono de la súplica con 'escucha' y 'solo tú', sin alterar las decisiones léxicas y teológicas del POB.
