base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/012/044.yaml
  text: On that day men were appointed over the storerooms for the contributions[a], for the firstfruits, and for the tithes, to gather into them from the fields of the cities the portions required by the law for the priests and for the Levites[c][b], for Judah rejoiced over the priests and over the Levites who were serving.
  footnotes:
  - marker: a
    text: Or 'the chambers' for 'the storerooms.' The Hebrew term can denote rooms or chambers, but here the storage function is prominent.
    reason: lexical_alternative
  - marker: b
    text: Literally 'the portions of the law,' that is, the shares prescribed by the Torah for the priests and Levites.
    reason: lexical_alternative
  - marker: c
    text: Literally 'who were standing.' In this temple context, the expression refers to standing in attendance, that is, serving or ministering.
    reason: lexical_alternative
