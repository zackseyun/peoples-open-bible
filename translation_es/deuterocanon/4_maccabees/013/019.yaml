translation:
  language: es
  text: Y no ignoráis los afectos de la naturaleza humana[a], que la providencia divina y sapientísima distribuyó a los que nacen mediante los padres, habiéndolos plantado por medio del vientre materno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los afectos naturales de la humanidad' o 'los vínculos humanos'. El griego φίλτρα expresa aquí vínculos afectivos intensos, no encantos mágicos literales.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐκ ἀγνοεῖτε
  english_pob_choice: you are not ignorant
  chosen_spanish: no ignoráis
  alternatives_spanish:
  - no desconocéis
  - no sois ignorantes
  lexicon: BDAG
  rationale: Conservo el tono exhortativo directo del griego. En español, 'no ignoráis' mantiene la dignidad retórica y la cercanía al valor de 'you are not ignorant' sin volverlo torpe.
- source_word: τὰ τῆς ἀνθρωπότητος φίλτρα
  english_pob_choice: the affections of human nature
  chosen_spanish: los afectos de la naturaleza humana
  alternatives_spanish:
  - los afectos humanos
  - los vínculos afectivos de la humanidad
  - los lazos de la naturaleza humana
  lexicon: LSJ
  rationale: '''Afectos'' conserva la fuerza de φίλτρα como vínculos afectivos intensos, no como ''encantos''. ''Naturaleza humana'' transmite el genitivo de ἀνθρωπότης mejor que una abstracción como ''humanidad'' en este contexto.'
- source_word: θεία καὶ πάνσοφος πρόνοια
  english_pob_choice: the divine and all-wise providence
  chosen_spanish: la providencia divina y sapientísima
  alternatives_spanish:
  - la providencia divina y sumamente sabia
  - la providencia divina, de toda sabiduría
  - la divina y sapientísima providencia
  lexicon: LSJ
  rationale: '''Providencia'' es la equivalencia natural en este contexto teológico-filosófico. ''Sapientísima'' conserva el superlativo de πάνσοφος con un registro elevado y sobrio.'
- source_word: ἔμερισεν
  english_pob_choice: apportioned
  chosen_spanish: distribuyó
  alternatives_spanish:
  - repartió
  - asignó
  - apportionó
  lexicon: LSJ
  rationale: '''Distribuyó'' expresa la idea de asignar según medida sin sonar artificial en español. Evita tanto la frialdad técnica de ''apportionó'' como una suavización excesiva.'
- source_word: τοῖς γεννωμένοις
  english_pob_choice: to those who are born
  chosen_spanish: a los que nacen
  alternatives_spanish:
  - a los que son nacidos
  - a los nacidos
  - a quienes nacen
  lexicon: LSJ
  rationale: La forma española 'los que nacen' reproduce el participio con claridad y naturalidad. Mantiene el sentido pasivo/originario de los seres humanos en proceso de nacer.
- source_word: διὰ τῶν πατέρων
  english_pob_choice: through the fathers
  chosen_spanish: por medio de los padres
  alternatives_spanish:
  - a través de los padres
  - por los padres
  - mediante los padres
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente 'por medio de los padres', en español 'padres' comunica mejor la referencia generativa que solo 'padres' en el sentido de varones; además evita oscurecer el paralelismo con el vientre materno.
- source_word: φυτεύσασα
  english_pob_choice: planted
  chosen_spanish: habiéndolos plantado
  alternatives_spanish:
  - plantándolos
  - habiendo plantado
  - implantándolos
  lexicon: LSJ
  rationale: El participio se conserva como acción concomitante. 'Plantar' mantiene la metáfora de origen/vitalidad sin convertirla en una paráfrasis biológica más extensa.
- source_word: διὰ τῆς μητρῴας φυτεύσασα γαστρός
  english_pob_choice: through a mother's womb
  chosen_spanish: a través del vientre materno
  alternatives_spanish:
  - por medio del vientre materno
  - a través del seno materno
  - por el vientre de la madre
  lexicon: LSJ
  rationale: '''Vientre materno'' es una expresión clara y reverente para γαστήρ en este marco. ''Materno'' preserva la relación con μητρῴας sin volver el español rígido o redundante.'
theological_decisions:
- issue: Valor de πρόνοια en un contexto judaico-helenístico
  english_pob_reading: providence
  chosen_spanish_reading: providencia
  alternative_spanish_readings:
  - previsión
  - cuidado providente
  rationale: '''Providencia'' recoge mejor la noción de gobierno ordenado y sabio que ''previsión'', y evita introducir matices modernos ajenos al texto. El adjetivo ''divina'' mantiene explícito el origen del actuar.'
  doctrine_reference: Translation philosophy §§1, 6
- issue: Distinción entre referencia paterna y maternal en la generación
  english_pob_reading: retain distinct references to fathers and a mother's womb
  chosen_spanish_reading: mantener la referencia a los padres y al vientre materno
  alternative_spanish_readings:
  - generalizar a los progenitores
  - unificar en 'los padres' sin distinción
  - suavizar a 'por medio de sus padres'
  rationale: El griego conserva una distinción intencional entre el medio paterno y el maternal. La traducción española la mantiene para no borrar la estructura del argumento ni la imagen de generación ordenada.
  doctrine_reference: Translation philosophy §§1, 4, 5
- issue: Sentido de φίλτρα como vínculos afectivos, no como 'encantos'
  english_pob_reading: the affections of human nature
  chosen_spanish_reading: los afectos de la naturaleza humana
  alternative_spanish_readings:
  - los lazos afectivos de la naturaleza humana
  - los vínculos de la naturaleza humana
  - los afectos humanos
  rationale: En español, 'afectos' comunica tanto apego como vínculo emocional, conservando el peso de φίλτρα sin sugerir magia ni sentimentalismo débil. La nota aclara la amplitud semántica del término.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del texto inglés: conserva el participio concomitante con ''habiéndolos plantado'' y mantiene la correspondencia cercana entre generación paterna y vientre materno. También respeta el ajuste de la revisión para no suavizar la acción verbal final.'
  spanish_consistency_notes:
  - Se usó 'naturaleza humana' para ἀνθρωπότης conforme al uso del POB inglés y para evitar una abstracción menos precisa como 'humanidad' sola.
  - Se prefirió 'providencia' frente a 'previsión' por coherencia con el marco teológico-filosófico del libro.
  - Se mantuvo un registro digno y formal, con puntuación y sintaxis naturales para español bíblico contemporáneo.
