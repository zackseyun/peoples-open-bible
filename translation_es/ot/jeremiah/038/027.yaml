translation:
  language: es
  text: Entonces todos los oficiales vinieron a Jeremías y lo interrogaron[a], y él les contó todas estas palabras que el rey había mandado. Así que guardaron silencio delante de él, porque el asunto no había llegado a oídos de nadie.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «le preguntaron» o «inquirieron de él». El hebreo sugiere una indagación formal, no una simple pregunta casual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשָּׂרִים
  english_pob_choice: the officials
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los príncipes
  - los comandantes
  - los funcionarios
  lexicon: HALOT
  rationale: שַׂר en este contexto cortesano se refiere mejor a autoridades de la administración real. «Oficiales» conserva el valor de cargos/autoridad sin forzar un rango militar ni introducir un tono arcaico.
- source_word: וַיִּשְׁאֲלוּ אֹתוֹ
  english_pob_choice: questioned him
  chosen_spanish: lo interrogaron
  alternatives_spanish:
  - le preguntaron
  - lo inquirieron
  lexicon: HALOT
  rationale: Aquí el verbo no describe una pregunta casual, sino una indagación sobre el asunto. «Lo interrogaron» refleja mejor la presión investigativa del contexto judicial/cortesano.
- source_word: וַיַּגֵּד לָהֶם
  english_pob_choice: he told them
  chosen_spanish: les contó
  alternatives_spanish:
  - les dijo
  - les informó
  - les declaró
  lexicon: HALOT
  rationale: נגד en hifil es hacer saber o narrar. «Les contó» transmite de manera natural que Jeremías repitió el contenido indicado por el rey.
- source_word: כְּכָל הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: all these words
  chosen_spanish: todas estas palabras
  alternatives_spanish:
  - todas estas cosas
  - todo esto
  lexicon: HALOT
  rationale: «Palabras» conserva el énfasis verbal del hebreo, ya que Jeremías está repitiendo una fórmula de respuesta. Aunque דְּבָרִים puede abarcar «cosas/asuntos», el contexto favorece una traducción verbal.
- source_word: אֲשֶׁר צִוָּה הַמֶּלֶךְ
  english_pob_choice: that the king had commanded
  chosen_spanish: que el rey había mandado
  alternatives_spanish:
  - que el rey había ordenado
  - según había mandado el rey
  lexicon: HALOT
  rationale: צוה expresa mandato con autoridad. «Había mandado» mantiene el valor de orden real y su anterioridad narrativa.
- source_word: וַיַּחֲרִשׁוּ מִמֶּנּוּ
  english_pob_choice: they were silent before him
  chosen_spanish: guardaron silencio delante de él
  alternatives_spanish:
  - se quedaron callados ante él
  - no le dijeron más
  lexicon: HALOT
  rationale: חרשׁ en esta construcción idiomática significa callar o cesar de hablar. «Guardaron silencio delante de él» reproduce bien el sentido y conserva la relación espacial/relacional implícita en מִמֶּנּוּ.
- source_word: כִּי לֹא נִשְׁמַע הַדָּבָר
  english_pob_choice: for the matter had not been heard
  chosen_spanish: porque el asunto no había sido oído
  alternatives_spanish:
  - porque la conversación no había sido escuchada
  - porque el asunto no se había dado a conocer
  lexicon: HALOT
  rationale: El pasivo de שׁמע permite entender que el asunto no había llegado a oídos de otros. «Asunto» funciona bien para דָּבָר en este contexto, manteniendo la amplitud semántica sin perder claridad.
translation_notes:
  revision_awareness: Se tuvo en cuenta el estado más reciente del audit trail inglés, especialmente la revisión que cambió «said no more to him» por «were silent before him» para reflejar con más precisión וַיַּחֲרִשׁוּ מִמֶּנּוּ. La versión española adopta ese mismo sentido con una formulación natural en español.
  spanish_consistency_notes:
  - Se mantuvo «Jeremías» para el nombre propio.
  - Se evitó «SEÑOR» para no introducir una convención de ocultamiento del nombre divino que no aparece en este versículo.
  - «Oficiales» se usó de manera consistente con el contexto cortesano del pasaje.
  - La relación entre דָּבָר y «asunto» se conservó en la nota y en la traducción principal para evitar una lectura demasiado estrecha.
