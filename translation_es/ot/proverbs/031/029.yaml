translation:
  language: es
  text: Muchas hijas[a] han obrado con nobleza[b], pero tú las superas a todas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «hijas» puede usarse idiomáticamente en un sentido más amplio para mujeres o jóvenes mujeres.
    reason: lexical_alternative
  - marker: b
    text: O «Muchas mujeres han actuado con excelencia, pero tú las superas a todas». El término hebreo también puede transmitir sentidos como fuerza, valor o excelencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַבּוֹת
  english_pob_choice: Many
  chosen_spanish: Muchas
  alternatives_spanish:
  - Numerosas
  - Muchas de
  lexicon: HALOT
  rationale: El hebreo usa un adjetivo de cantidad en posición enfática. «Muchas» reproduce de forma natural la cuantificación sin sobrecargar el verso.
- source_word: בָּנוֹת
  english_pob_choice: daughters
  chosen_spanish: mujeres
  alternatives_spanish:
  - hijas
  - jóvenes
  lexicon: HALOT
  rationale: Aunque el sentido literal es «hijas», en este refrán sapiencial el término puede funcionar idiomáticamente para mujeres. En español, «mujeres» comunica mejor el alcance amplio preservando el sentido destacado en la nota inglesa.
- source_word: עָשׂוּ
  english_pob_choice: have done
  chosen_spanish: han obrado
  alternatives_spanish:
  - han hecho
  - han actuado
  lexicon: HALOT
  rationale: El perfecto plural expresa acción realizada. «Han obrado» suena más idiomático en español con la idea de conducta y logro que exige el contexto.
- source_word: חָיִל
  english_pob_choice: nobly
  chosen_spanish: con nobleza
  alternatives_spanish:
  - con excelencia
  - valientemente
  - con valor
  lexicon: HALOT
  rationale: חָיִל abarca fuerza, valor y excelencia. «Con nobleza» mantiene el matiz de excelencia moral y vigor sin reducir el término a una sola dimensión militar o social.
- source_word: וְאַתְּ
  english_pob_choice: but you
  chosen_spanish: pero tú
  alternatives_spanish:
  - y tú
  lexicon: HALOT
  rationale: 'El contexto es claramente contrastivo: muchas han obrado bien, pero la destinataria sobresale. «Pero tú» reproduce esa oposición.'
- source_word: עָלִית
  english_pob_choice: surpass
  chosen_spanish: las superas
  alternatives_spanish:
  - las sobrepasas
  - sobresales por encima de ellas
  lexicon: HALOT
  rationale: La raíz literalmente significa «subir/ascender», pero con עַל aquí tiene fuerza comparativa. En español, «las superas» expresa de manera natural ese valor de exceder.
- source_word: עַל כֻּלָּנָה
  english_pob_choice: them all
  chosen_spanish: a todas
  alternatives_spanish:
  - por encima de todas
  - a todas ellas
  lexicon: HALOT
  rationale: La frase hebrea indica superioridad sobre el conjunto. «A todas» mantiene brevedad y claridad en español, y el verbo «superar» ya aporta la relación de superioridad.
translation_notes:
  revision_awareness: 'El borrador sigue el sentido del hebreo masorético y coincide en sustancia con la auditoría inglesa: contraste entre muchas mujeres que obran con excelencia y una mujer que las supera a todas. Se conserva la tensión lexical de חָיִל mediante una expresión española amplia («nobleza») y se mantiene la nota sobre el alcance idiomático de «hijas»/«mujeres».'
  spanish_consistency_notes:
  - Se evita «Cristo», «SEÑOR» u այլ terminología ajena porque el versículo no contiene nombres divinos ni títulos cristológicos.
  - Se preserva el contraste poético del hebreo con «pero tú» en lugar de coordinar simplemente con «y».
  - La traducción busca ser publicable y natural en español, sin borrar la amplitud semántica de חָיִל, que puede incluir fuerza, valor y excelencia.
