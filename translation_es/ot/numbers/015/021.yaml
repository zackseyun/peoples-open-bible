translation:
  language: es
  text: De la primera parte de su masa[a] darán a Yahvé una contribución[b] por todas sus generaciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus artesas»; el hebreo puede referirse a la masa o, por asociación, al recipiente de amasado.
    reason: lexical_alternative
  - marker: b
    text: O «una ofrenda» o, tradicionalmente, «una ofrenda alzada».
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵרֵאשִׁית
  english_pob_choice: From the first of
  chosen_spanish: De las primicias de
  alternatives_spanish:
  - De la primera parte de
  - Del comienzo de
  lexicon: HALOT
  rationale: רֵאשִׁית señala la porción inicial o primera. En este contexto ritual, la idea no es un comienzo temporal abstracto, sino la primera parte apartada para Yahvé. «Primicias de» comunica con naturalidad ese valor de porción inicial sin perder el matiz cultual.
- source_word: עֲרִסֹתֵיכֶם
  english_pob_choice: your dough
  chosen_spanish: vuestra masa
  alternatives_spanish:
  - vuestras artesas
  - vuestros recipientes de amasado
  lexicon: HALOT
  rationale: El término puede referirse a la masa o, por metonimia, al recipiente de amasado. Aquí la ofrenda se toma de una porción concreta para entregarla a Yahvé, por lo que «masa» refleja mejor la sustancia de la que se separa la contribución. En nota se preserva la alternativa del recipiente.
- source_word: תִּתְּנוּ
  english_pob_choice: you shall give
  chosen_spanish: daréis
  alternatives_spanish:
  - presentaréis
  - ofreceréis
  lexicon: HALOT
  rationale: נתן es el verbo común «dar». Aunque el contexto es ritual, «daréis» conserva la sencillez y la fuerza directa del mandato hebreo mejor que un verbo más litúrgico.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahweh
  - al SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como «Yahvé», conforme al criterio del proyecto para יְהוָה, en lugar de ocultarlo tras un título genérico.
- source_word: תְּרוּמָה
  english_pob_choice: a contribution
  chosen_spanish: una contribución
  alternatives_spanish:
  - una ofrenda
  - una ofrenda alzada
  lexicon: HALOT
  rationale: תְּרוּמָה es una porción apartada y levantada para Dios o para uso sacerdotal. «Contribución» es claro en español moderno y específico sin caer en el tecnicismo de «ofrenda alzada».
- source_word: לְדֹרֹתֵיכֶם
  english_pob_choice: throughout your generations
  chosen_spanish: por todas vuestras generaciones
  alternatives_spanish:
  - a través de vuestras generaciones
  - para vuestras generaciones
  lexicon: HALOT
  rationale: La fórmula expresa una obligación continua a lo largo de generaciones sucesivas. «Por todas vuestras generaciones» reproduce ese alcance duradero de forma idiomática en español.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene directamente el Tetragrámaton. Siguiendo el estándar del proyecto, se lo vierte como «Yahvé» para preservar el nombre pactal revelado a Israel, en vez de reemplazarlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Naturaleza de תְּרוּמָה en contexto ritual
  english_pob_reading: a contribution
  chosen_spanish_reading: una contribución
  alternative_spanish_readings:
  - una ofrenda
  - una ofrenda alzada
  rationale: La palabra puede abarcar una porción apartada para entrega sagrada. «Contribución» mantiene el valor de algo separado y entregado, sin forzar una lectura sacrificial más específica de la que exige el hebreo aquí.
  doctrine_reference: HALOT; uso ritual de תְּרוּמָה
translation_notes:
  revision_awareness: 'El borrador sigue el consenso alto del control cruzado y mantiene sin cambios sustantivos la lectura auditada: porción inicial de la masa, verbo simple de dar, nombre divino explícito y término ritual traducido como contribución. Se conserva en nota la ambigüedad léxica de עֲרִסֹתֵיכֶם y la fórmula generacional durativa.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera coherente con la terminología del proyecto para יְהוָה.
  - Se evita «SEÑOR» como convención de ocultamiento del nombre divino.
  - «Contribución» se mantiene como término cultual claro y no se sustituye por «ofrenda» en el texto principal.
  - Las notas usan marcadores únicos y aparecen ancladas en el texto principal.
