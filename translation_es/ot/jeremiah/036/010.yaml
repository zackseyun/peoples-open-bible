translation:
  language: es
  text: Y Baruc leyó del rollo las palabras de Jeremías en la casa de Yahvé[a], en la cámara de Gemarías hijo de Safán, el escriba, en el atrio superior, a la entrada de la puerta nueva de la casa de Yahvé, a oídos de todo el pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el templo de Yahvé» para «la casa de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: read
  chosen_spanish: leyó
  alternatives_spanish:
  - leyó en voz alta
  - leyó públicamente
  lexicon: HALOT
  rationale: El contexto inmediato con בַּסֵּפֶר indica lectura de un texto escrito; en español, 'leyó' comunica naturalmente esa acción sin añadir contenido. La publicidad de la lectura queda suficientemente expresada por el cierre 'en oído de todo el pueblo'.
- source_word: בַּסֵּפֶר
  english_pob_choice: from the scroll
  chosen_spanish: en el rollo
  alternatives_spanish:
  - desde el rollo
  - del rollo
  lexicon: HALOT
  rationale: סֵפֶר aquí se refiere al rollo escrito, no a un 'libro' en sentido moderno. Con קרא, el hebreo usa ב de manera idiomática; en español, 'en el rollo' mantiene la referencia al soporte textual sin sonar forzado. No se introduce 'desde' porque el verbo ya comunica la acción de lectura.
- source_word: דִּבְרֵי יִרְמְיָהוּ
  english_pob_choice: the words of Jeremiah
  chosen_spanish: las palabras de Jeremías
  alternatives_spanish:
  - las palabras de Jeremías
  lexicon: HALOT
  rationale: Construcción de posesión sencilla y formal. 'Las palabras de Jeremías' preserva la relación nominal sin paráfrasis.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of the LORD
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del Señor
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea 'casa de Yahvé' en vez de sustituirla por 'templo', siguiendo la decisión de traducir יְהוָה por 'Yahvé' y manteniendo el paralelismo del texto. 'Casa' refleja el término base בֵּית.
- source_word: בְּלִשְׁכַּת
  english_pob_choice: in the chamber of
  chosen_spanish: en la cámara de
  alternatives_spanish:
  - en el aposento de
  - en la sala de
  lexicon: HALOT
  rationale: לִשְׁכָּה designa una cámara o dependencia dentro del recinto, a menudo administrativa. 'Cámara' es el equivalente más natural y sobrio en español bíblico.
- source_word: גְּמַרְיָהוּ בֶן שָׁפָן
  english_pob_choice: Gemariah son of Shaphan
  chosen_spanish: Gemarías hijo de Safán
  alternatives_spanish:
  - Gemarías, hijo de Safán
  lexicon: HALOT
  rationale: Los nombres propios se transliteran de forma coherente al español. Se mantiene 'hijo de' para el patronímico, y 'Gemarías/Safán' refleja adaptación ortográfica usual sin ocultar los nombres hebreos.
- source_word: הַסֹּפֵר
  english_pob_choice: the scribe
  chosen_spanish: el escriba
  alternatives_spanish:
  - el secretario
  - el escribano
  lexicon: HALOT
  rationale: סֹפֵר aquí funciona como título oficial; 'escriba' es la opción más fiel y ampliamente inteligible en español, sin reducirlo a un oficio moderno de redacción.
- source_word: בֶּחָצֵר הָעֶלְיוֹן
  english_pob_choice: in the upper court
  chosen_spanish: en el atrio superior
  alternatives_spanish:
  - en el patio superior
  - en la corte superior
  lexicon: HALOT
  rationale: חָצֵר en contexto del templo se expresa bien como 'atrio' en español bíblico y arquitectónico. 'Superior' traduce הָעֶלְיוֹן con claridad.
- source_word: פֶּתַח
  english_pob_choice: at the entrance of
  chosen_spanish: a la entrada de
  alternatives_spanish:
  - en la entrada de
  - junto a la entrada de
  lexicon: HALOT
  rationale: פֶּתַח indica el punto de acceso o abertura; 'a la entrada de' funciona naturalmente con la mención siguiente de la puerta.
- source_word: שַׁעַר ... הֶחָדָשׁ
  english_pob_choice: the new gate
  chosen_spanish: la puerta nueva
  alternatives_spanish:
  - la puerta nueva
  - la puerta recién construida
  lexicon: HALOT
  rationale: שַׁעַר se vierte como 'puerta' en español por claridad, aunque el término puede abarcar la puerta y su portal. 'Nueva' traduce el adjetivo sin ampliarlo.
- source_word: בְּאָזְנֵי כָּל הָעָם
  english_pob_choice: in the hearing of all the people
  chosen_spanish: en oído de todo el pueblo
  alternatives_spanish:
  - a oídos de todo el pueblo
  - en presencia de todo el pueblo
  lexicon: HALOT
  rationale: Se conserva el giro semítico de forma bastante literal, 'en oído de', para reflejar el idioma hebreo 'en los oídos de'. La alternativa más natural sería 'a oídos de', pero la forma elegida preserva mejor el paralelismo con el original sin volverse oscura.
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo reunido
  - toda la gente
  lexicon: HALOT
  rationale: עָם aquí designa al pueblo reunido; 'todo el pueblo' es la equivalencia natural y suficientemente amplia.
theological_decisions:
- issue: Render of the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el Señor
  rationale: El texto hebreo usa explícitamente el Tetragrámaton, y la práctica del proyecto es verterlo como 'Yahvé' en el cuerpo principal. Esto mantiene visible el nombre pactal sin sustituirlo por una convención de ocultamiento.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: Temple-house wording for בֵּית יְהוָה
  english_pob_reading: the house of Yahweh
  chosen_spanish_reading: la casa de Yahvé
  alternative_spanish_readings:
  - el templo de Yahvé
  - la casa del Señor
  rationale: Aunque el referente es el complejo del templo, el hebreo dice literalmente 'casa de Yahvé'. Traducirlo como 'casa de Yahvé' preserva la forma de la expresión y evita reemplazarla por un término interpretativo no exigido por el texto.
  doctrine_reference: 'DOCTRINE.md: translation principles — preserve source expressions where intelligible'
translation_notes:
  revision_awareness: No se detectaron revisiones textuales ni cambios recientes que obliguen a ajustar la lectura; la versión inglesa auditada permanece en alta concordancia y se sigue su decisión principal, adaptándola a terminología española coherente con la política del proyecto.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en ambas ocurrencias de יהוה.
  - '''Casa de Yahvé'' se usa de manera consistente para בֵּית יְהוָה.'
  - '''Cámara'' y ''atrio'' conservan el registro arquitectónico del templo sin modernizar en exceso.'
  - 'Los nombres propios se adaptan al español bíblico de forma consistente: Baruc, Jeremías, Gemarías, Safán.'
