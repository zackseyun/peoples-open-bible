translation:
  language: es
  text: 'Cuando Jacob los vio, dijo: «Esto es el campamento de Dios». Y le puso por nombre a aquel lugar Mahanaim[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Mahanaim suena como «dos campamentos» o «campamento doble», y hace eco de las palabras de Jacob: «Esto es el campamento de Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - respondió
  - exclamó
  lexicon: HALOT
  rationale: El verbo אמר en narrativa se vierte de manera directa y natural con «dijo». No se añade destinatario ni matiz reflexivo que el hebreo no exprese.
- source_word: כַּאֲשֶׁר
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Al
  - Después que
  lexicon: HALOT
  rationale: La partícula introduce el momento de la declaración de Jacob después de ver lo mencionado en el contexto inmediato; «Cuando» conserva bien ese valor temporal.
- source_word: רָאָם
  english_pob_choice: saw them
  chosen_spanish: los vio
  alternatives_spanish:
  - los observó
  - los contempló
  lexicon: HALOT
  rationale: El sufijo plural masculino remite al referente plural previo. En español, «los vio» comunica con precisión la referencia pronominal y mantiene la concisión del hebreo.
- source_word: מַחֲנֵה
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento
  - campo
  - alojamiento
  lexicon: HALOT
  rationale: El sustantivo designa un campamento o conjunto acampado. «Campamento» suena natural en español bíblico moderno y preserva el campo semántico necesario para el juego de palabras con Mahanaim.
- source_word: אֱלֹהִים
  english_pob_choice: God’s
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios
  - divino
  - del Dios
  lexicon: HALOT
  rationale: En esta construcción posesiva, el sentido es el campamento perteneciente a Dios. «De Dios» evita la ambigüedad de «divino» y conserva la relación genitiva.
- source_word: זֶה
  english_pob_choice: This is
  chosen_spanish: Esto es
  alternatives_spanish:
  - Este es
  - He aquí
  lexicon: HALOT
  rationale: 'El demostrativo funciona predicativamente. En español se requiere cópula explícita: «Esto es...» reproduce con naturalidad el valor deíctico sin expandir el sentido.'
- source_word: וַיִּקְרָא שֵׁם
  english_pob_choice: he called the name
  chosen_spanish: llamó al lugar
  alternatives_spanish:
  - dio nombre al lugar
  - nombró al lugar
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «llamó el nombre», el español fluye mejor con «llamó al lugar»; el objeto «el lugar» está explícito en el hebreo siguiente y la construcción evita dureza sin perder transparencia.
- source_word: הַמָּקוֹם הַהוּא
  english_pob_choice: that place
  chosen_spanish: el lugar aquel
  alternatives_spanish:
  - aquel lugar
  - ese lugar
  lexicon: HALOT
  rationale: El demostrativo señala un sitio específico recién identificado. «Aquel» conserva distancia/deixis y suena más bíblico que «ese» sin caer en arcaísmo excesivo.
- source_word: מַחֲנָיִם
  english_pob_choice: Mahanaim
  chosen_spanish: Mahanaim
  alternatives_spanish:
  - Dos campamentos
  - Doble campamento
  lexicon: HALOT
  rationale: Como nombre propio, se translitera en el texto principal. El posible eco semántico de «dos campamentos» se preserva en la nota textual/lexical, no en la traducción principal.
theological_decisions:
- issue: Referencia a אֱלֹהִים como Dios singular
  english_pob_reading: God’s camp
  chosen_spanish_reading: el campamento de Dios
  alternative_spanish_readings:
  - el campamento divino
  - el campamento del Dios
  rationale: El contexto inmediato identifica a los ángeles de Dios; aquí אֱלֹהִים funciona como referencia singular al Dios de Israel. La traducción mantiene esa lectura sin neutralizarla.
  doctrine_reference: Monoteísmo bíblico; uso singular de אֱלֹהִים en contexto.
- issue: Juego de palabras entre el nombre Mahanaim y la afirmación de Jacob
  english_pob_reading: Mahanaim sounds like “two camps” or “double camp,” echoing Jacob’s words
  chosen_spanish_reading: Mahanaim suena como “dos campamentos” o “campamento doble”, y hace eco de las palabras de Jacob
  alternative_spanish_readings:
  - Mahanaim evoca dos campamentos
  - Mahanaim alude a un doble campamento
  rationale: El nombre propio se mantiene por fidelidad al texto, pero la resonancia semántica se explica para no perder el efecto literario del hebreo.
  doctrine_reference: Poética y etimología bíblica; no implica una doctrina específica.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo WLC y el audit trail inglés de la POB, sin cambios textuales relevantes respecto de la última pasada; se conservó el nombre propio Mahanaim y se explicitó su posible juego etimológico en nota, como en el inglés.
  spanish_consistency_notes:
  - Se usó «Dios» de manera consistente para אֱלֹהִים en contexto singular.
  - Se mantuvo «Mahanaim» como nombre propio transliterado, con la resonancia etimológica en nota.
  - Se prefirió un español bíblico moderno y natural, evitando calcos como «llamó el nombre» en el cuerpo principal.
