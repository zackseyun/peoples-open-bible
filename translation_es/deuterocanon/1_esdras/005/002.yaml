lexical_decisions:
- source_word: συναπέστειλεν
  english_pob_choice: sent with
  chosen_spanish: envió con
  alternatives_spanish:
  - envió junto con
  - despachó con
  lexicon: LSJ
  rationale: El compuesto expresa envío acompañante, no solo envío independiente. «Envió con» conserva ese sentido de acompañamiento de manera natural en español.
- source_word: ἱππεῖς χιλίους
  english_pob_choice: a thousand horsemen
  chosen_spanish: mil jinetes
  alternatives_spanish:
  - mil caballeros
  - mil hombres de a caballo
  lexicon: LSJ
  rationale: ἱππεῖς designa tropas montadas. «Jinetes» es la forma más clara y directa en español, y mantiene el valor militar sin sonar rebuscado.
- source_word: ἕως τοῦ ἀποκαταστῆσαι
  english_pob_choice: until they had brought them back
  chosen_spanish: hasta que los llevaron de vuelta
  alternatives_spanish:
  - hasta que los trajeron de vuelta
  - hasta que los restituyeron
  lexicon: LSJ
  rationale: La construcción marca duración hasta completar el regreso. «Llevaron de vuelta» expresa con naturalidad el movimiento de retorno implícito en el contexto sin forzar un matiz técnico de «restaurar».
- source_word: μετʼ εἰρήνης
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - con paz
  - seguramente
  lexicon: LSJ
  rationale: La expresión griega puede implicar seguridad y ausencia de daño. «En paz» preserva la formulación idiomática y su amplitud semántica.
- source_word: μετὰ μουσικῶν
  english_pob_choice: with music
  chosen_spanish: con música
  alternatives_spanish:
  - con músicos
  - con celebración musical
  lexicon: LSJ
  rationale: La forma griega puede referirse a música o a músicos. «Con música» sigue el texto transmitido; la alternativa de «con músicos» queda recogida en nota.
translation_notes:
  revision_awareness: El inglés de referencia fue revisado de «restored them» a «brought them back» para reflejar mejor ἀποκαταστῆσαι en este contexto. La versión española sigue esa decisión con una formulación de retorno natural («los llevaron de vuelta»).
  spanish_consistency_notes:
  - Se usa «Darío» como nombre propio transliterado habitual.
  - Se conserva «Jerusalén» según la forma española estándar.
  - No se introduce «Mesías», «Yahvé» ni otra terminología no presente en el versículo.
  - La nota se ancla solo en «música[s]», donde existe la ambigüedad léxica documentada.
