translation:
  text: For the elements[a], changing among themselves, as in a harp the notes of the melody alter the name, while always remaining in the sound[b], as may be accurately inferred from the sight of what happened.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the notes of the measure change their designation.' The Greek expression is compressed and somewhat difficult; the translation keeps the literal 'name' to preserve the image.
    reason: lexical_alternative
  - marker: b
    text: Or, 'from observing the events.' The final clause explains that the comparison is drawn from what was seen in the events just described.
    reason: lexical_alternative
lexical_decisions:
- source_word: στοιχεῖα
  chosen: elements
  alternatives:
  - basic elements
  - elemental forces
  lexicon: LSJ
  rationale: In Wisdom 19 the context is the created order and the transformations of nature in the exodus plagues; 'elements' best captures the physical constituents of the world without overinterpreting as personal cosmic powers.
- source_word: μεθαρμοζόμενα
  chosen: changing among themselves
  alternatives:
  - being re-adjusted among themselves
  - being transformed one into another
  lexicon: LSJ
  rationale: The verb conveys re-harmonizing or re-adjustment. 'Changing among themselves' preserves the image of mutual reconfiguration in context and reads naturally in English.
- source_word: ψαλτηρίῳ
  chosen: harp
  alternatives:
  - psaltery
  - stringed instrument
  lexicon: LSJ
  rationale: A generic but concrete modern equivalent is preferable to the less familiar 'psaltery.' The comparison is to a stringed instrument producing varied notes within one musical whole.
- source_word: φθόγγοι
  chosen: notes
  alternatives:
  - tones
  - sounds
  lexicon: LSJ
  rationale: In the musical simile, 'notes' is the clearest idiomatic rendering for distinct sounded pitches.
- source_word: τοῦ ῥυθμοῦ
  chosen: of the rhythm
  alternatives:
  - of the melody
  - of the measure
  lexicon: LSJ
  rationale: The Greek points to ordered musical patterning. 'Rhythm' is the most direct rendering, though the exact ancient musical nuance may overlap with measured arrangement more broadly.
- source_word: τὸ ὄνομα διαλλάσσουσιν
  chosen: alter the name
  alternatives:
  - change their designation
  - vary their character
  lexicon: LSJ
  rationale: The Greek literally speaks of changing the 'name.' Though somewhat unusual in English, retaining 'name' preserves the author's conceptual point that the notes are differently identified while the underlying sound remains continuous.
- source_word: πάντοτε μένοντα ἤχῳ
  chosen: while always remaining in the sound
  alternatives:
  - while always remaining in tone
  - while always continuing in resonance
  lexicon: LSJ
  rationale: This difficult phrase is kept relatively close to the Greek. The sense is that despite variation, there is continuity at the level of sound/tone. 'In the sound' preserves that continuity without forcing a more interpretive paraphrase.
- source_word: ὅπερ ἐστὶν εἰκάσαι
  chosen: this may be accurately inferred
  alternatives:
  - which it is possible to conjecture
  - which one may discern
  lexicon: LSJ
  rationale: The clause comments on the analogy as something that can be recognized or inferred. 'May be accurately inferred' fits the following adverb ἀκριβῶς and the reflective tone.
- source_word: ἐκ τῆς τῶν γεγονότων ὄψεως
  chosen: from the sight of what happened
  alternatives:
  - from the appearance of the events
  - from observing what took place
  lexicon: LSJ
  rationale: The phrase grounds the inference in observation of the narrated events. 'What happened' is natural English for τῶν γεγονότων, and 'sight' preserves the visual language of ὄψις.
