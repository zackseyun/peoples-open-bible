base_translation:
  language: en
  yaml_path: translation/deuterocanon/judith/009/008.yaml
  text: Lord is your name[a]; you, shatter their strength in your power, and break their might in your wrath; for they planned to profane your holy things, to defile the tabernacle, the resting place of your glorious name[b], and to cast down with the sword the horn of your altar.
  footnotes:
