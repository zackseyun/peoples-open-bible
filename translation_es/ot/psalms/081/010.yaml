translation:
  language: es
  text: No habrá en ti ningún dios ajeno[a], y no te postrarás ante un dios ajeno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «dios extraño». El hebreo usa dos expresiones casi sinónimas en paralelo: «dios ajeno» y «dios extraño».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִהְיֶה
  english_pob_choice: There shall not be
  chosen_spanish: No habrá
  alternatives_spanish:
  - No existirá
  - No se hallará
  lexicon: HALOT
  rationale: El hebreo usa una construcción existencial negativa; en español, «no habrá» comunica de forma natural la prohibición/covenio sin forzar una paráfrasis.
- source_word: בְּךָ
  english_pob_choice: in you
  chosen_spanish: en ti
  alternatives_spanish:
  - entre ustedes
  - en medio de ustedes
  lexicon: HALOT
  rationale: El texto hebreo usa 2ms singular, y «en ti» conserva esa forma de dirección al pueblo como entidad corporativa, como hizo el POB inglés con «in you».
- source_word: אֵל
  english_pob_choice: god
  chosen_spanish: dios
  alternatives_spanish:
  - deidad
  - ser divino
  lexicon: HALOT
  rationale: En paralelo con la prohibición de culto, אֵל se refiere aquí a una deidad; «dios» es el equivalente español más directo y no mitiga la referencia a un falso dios.
- source_word: זָר
  english_pob_choice: foreign
  chosen_spanish: ajeno
  alternatives_spanish:
  - extranjero
  - foráneo
  lexicon: HALOT
  rationale: «Ajeno» transmite bien la idea de algo no perteneciente al pacto y evita un calco demasiado social o étnico. Conserva el matiz de alteridad sin perder naturalidad en español.
- source_word: תִּשְׁתַּחֲוֶה
  english_pob_choice: you shall not bow down
  chosen_spanish: no te postrarás
  alternatives_spanish:
  - no te inclinarás
  - no adorarás
  lexicon: HALOT
  rationale: El verbo implica inclinarse/prostrarse en contexto de adoración. «Postrarás» preserva el gesto corporal y cultual mejor que un verbo más general como «adorar».
- source_word: לְאֵל
  english_pob_choice: to a ... god
  chosen_spanish: ante un dios
  alternatives_spanish:
  - a un dios
  - delante de un dios
  lexicon: HALOT
  rationale: En español, con «postrarse», «ante» comunica con claridad la dirección del gesto ritual y evita una construcción menos natural.
- source_word: נֵכָר
  english_pob_choice: foreign
  chosen_spanish: extraño
  alternatives_spanish:
  - ajeno
  - foráneo
  lexicon: HALOT
  rationale: Para la segunda colonización poética se conserva una variación léxica que refleja el paralelo hebreo de זָר y נֵכָר. «Extraño» mantiene la idea de no pertenencia, como el POB inglés alternó inicialmente con «strange/foreign» antes de unificar.
theological_decisions:
- issue: El hebreo usa dos expresiones casi sinónimas en paralelo para prohibir la idolatría
  english_pob_reading: foreign god / foreign god (with footnote noting 'strange god' as an alternative)
  chosen_spanish_reading: dios ajeno / dios extraño
  alternative_spanish_readings:
  - dios extranjero / dios extranjero
  - dios ajeno / dios ajeno
  rationale: Conviene conservar la fuerza poética del paralelismo hebreo sin aplanarlo del todo. Mantener dos matices cercanos ayuda a mostrar que el texto acumula dos descripciones de la misma realidad idolátrica.
  doctrine_reference: Deuteronomio 6:14; Éxodo 20:3; Teología bíblica de la exclusividad de Yahvé
translation_notes:
  revision_awareness: El POB inglés revisó el primer miembro desde «among you» a «in you» para reflejar más de cerca בְּךָ, y unificó ambas expresiones como «foreign». La versión española sigue la cercanía semántica de «en ti» y conserva una variación poética controlada («ajeno» / «extraño») para reflejar el paralelismo hebreo sin borrar su tensión léxica.
  spanish_consistency_notes:
  - Se usa «en ti» para respetar el singular corporativo del hebreo, no para individualizar el mandato.
  - «Postrarse» se emplea con valor cultual, no meramente físico.
  - «Dios» va en minúscula por referirse a deidades falsas.
  - «Ajeno» y «extraño» se eligen como parejas cercanas y naturales en español para preservar el paralelismo semántico del hebreo.
