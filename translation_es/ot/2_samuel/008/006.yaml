translation:
  language: es
  text: Y David puso guarniciones[a] en Aram de Damasco, y Aram llegó a ser siervos de David, trayendo tributo[b]. Y Yahvé dio a David victoria[c] dondequiera que iba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘en Siria de Damasco’. El hebreo dice ‘Aram’, que esta traducción normalmente preserva en vez de reemplazar por la forma tradicional ‘Siria’.
    reason: lexical_alternative
  - marker: b
    text: O ‘llevando tributo’ o ‘trayendo regalos’. El término hebreo puede significar regalo, ofrenda o tributo; aquí probablemente se refiere al pago de vasallaje.
    reason: lexical_alternative
  - marker: c
    text: O ‘salvó/libró a David adondequiera que iba’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  english_pob_choice: placed
  chosen_spanish: puso
  alternatives_spanish:
  - colocó
  - puso en posición
  lexicon: HALOT
  rationale: En narrativa militar, שׂים puede expresarse naturalmente como ‘poner’. ‘Puso’ es idiomático en español y mantiene la acción de establecer algo en un lugar sin sobrecargar el verbo.
- source_word: נְצִבִים
  english_pob_choice: garrisons
  chosen_spanish: guarniciones
  alternatives_spanish:
  - puestos militares
  - destacamentos
  - prefectos
  lexicon: HALOT
  rationale: El contexto es de control territorial tras conquistas; ‘guarniciones’ conserva el sentido militar de tropas o instalaciones estacionadas. En español es más natural que un calco como ‘garrisons’ y evita el sentido administrativo de ‘prefectos’.
- source_word: בַּאֲרַם דַּמֶּשֶׂק
  english_pob_choice: in Aram of Damascus
  chosen_spanish: en Aram de Damasco
  alternatives_spanish:
  - en Siria de Damasco
  - en Aram, de Damasco
  - en Aram, en Damasco
  lexicon: HALOT
  rationale: Se conserva ‘Aram’ porque el POB inglés preserva el nombre hebreo y no lo sustituye por ‘Syria’. ‘De Damasco’ refleja la relación geográfica/política del constructo sin forzar una paráfrasis.
- source_word: וַתְּהִי אֲרָם לְדָוִד לַעֲבָדִים
  english_pob_choice: Aram became servants to David
  chosen_spanish: Aram llegó a ser siervo de David
  alternatives_spanish:
  - Aram llegó a ser servidor de David
  - Aram quedó sometido a David
  - Aram llegó a ser esclavo de David
  lexicon: HALOT
  rationale: ‘עֲבָדִים’ en este contexto político expresa vasallaje/subordinación. ‘Siervo’ permite mantener la raíz de ‘servant’ del POB inglés sin importar necesariamente la dureza de ‘esclavo’; se usa en singular colectivo para un sujeto nacional colectivo en español fluido.
- source_word: נוֹשְׂאֵי מִנְחָה
  english_pob_choice: bringing tribute
  chosen_spanish: trayendo tributo
  alternatives_spanish:
  - llevando tributo
  - trayendo regalos
  - presentando tributo
  lexicon: HALOT
  rationale: ‘מִנְחָה’ puede ser ofrenda, regalo o tributo; en este marco de vasallaje internacional, ‘tributo’ es la opción más precisa. ‘Trayendo’ sigue la forma participial del hebreo de modo idiomático.
- source_word: וַיֹּשַׁע
  english_pob_choice: gave ... victory
  chosen_spanish: dio ... victoria
  alternatives_spanish:
  - salvó
  - libró
  - concedió éxito
  lexicon: HALOT
  rationale: El hiphil de ישׁע en contexto militar puede entenderse como librar/salvar con éxito bélico. ‘Dio ... victoria’ reproduce bien la lectura del POB inglés y suena natural en español, sin reducir el sentido a mera ‘ayuda’.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de traducir el Tetragrámaton como ‘Yahvé’, preservando el nombre divino en vez de sustituirlo por un título. Se evita ‘SEÑOR’ por ser una convención de ocultamiento que el POB no adopta.
- source_word: בְּכֹל אֲשֶׁר הָלָךְ
  english_pob_choice: wherever he went
  chosen_spanish: en todo lo que iba
  alternatives_spanish:
  - dondequiera que iba
  - en todo lugar adonde iba
  - cada vez que iba
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y amplia. ‘En todo lo que iba’ conserva la idea de totalidad en el recorrido/campaña de David y mantiene una cercanía formal al hebreo, aunque en español suene algo menos idiomático que ‘dondequiera que iba’.
theological_decisions:
- issue: Nombre divino יְהוָה en un contexto de victoria militar
  english_pob_reading: Yahweh gave David victory
  chosen_spanish_reading: Yahvé dio a David victoria
  alternative_spanish_readings:
  - Yahvé salvó a David
  - Yahvé libró a David
  rationale: El hebreo usa el Tetragrámaton directamente; el español debe preservarlo como nombre propio. La acción divina se expresa como ‘dio victoria’, siguiendo el valor de salvación eficaz en combate que el POB inglés documenta.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: עֲבָדִים como relación política de subordinación
  english_pob_reading: Aram became servants to David
  chosen_spanish_reading: Aram llegó a ser siervo de David
  alternative_spanish_readings:
  - Aram quedó sujeto a David
  - Aram llegó a ser esclavo de David
  - Aram se sometió a David
  rationale: La frase describe vasallaje nacional más que esclavitud individual. ‘Siervo’ conserva el enlace léxico con el campo semántico de עבד sin forzar ‘esclavo’, pero tampoco lo disuelve en el más interpretativo ‘sujeto’.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo masorético y concuerda con el audit trail inglés sin aplicar revisiones posteriores; no se identifican cambios aplicados en la pasada más reciente.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ de forma consistente para יְהוָה.
  - Se conserva ‘Aram’ y no ‘Siria’, conforme al criterio del proyecto y al POB inglés.
  - ‘Tributo’ se usa con el matiz político de vasallaje, no como ofrenda cultual.
  - Se emplea una construcción verbal española fluida, sin perder la secuencia narrativa del hebreo.
