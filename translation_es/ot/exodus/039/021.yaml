translation:
  language: es
  text: Sujetaron el pectoral por sus anillos a los anillos del efod con un cordón azul[a], para que estuviera sobre la banda tejida del efod, y para que el pectoral no se desprendiera del efod[b], tal como Yahvé había mandado a Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con un cordón azul».'
    reason: alternative_reading
  - marker: b
    text: 'O: «la banda tejida del efod»; el término hebreo se refiere a la banda decorada unida al efod.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְכְּסוּ
  english_pob_choice: They fastened
  chosen_spanish: Sujetaron
  alternatives_spanish:
  - Fijaron
  - Aseguraron
  lexicon: HALOT
  rationale: El verbo expresa unir o asegurar firmemente piezas entre sí. «Sujetaron» comunica esa acción de fijación en un contexto de vestiduras sacerdotales sin sonar mecánico en español.
- source_word: הַחֹשֶׁן
  english_pob_choice: the breastpiece
  chosen_spanish: el pectoral
  alternatives_spanish:
  - la pieza del pecho
  - el pectoral del pecho
  lexicon: HALOT
  rationale: En este contexto cultual se trata de la pieza ornamental del pecho, no de una armadura. «Pectoral» es preciso y establecido en español bíblico para esta pieza.
- source_word: מִטַּבְּעֹתָיו ... אֶל טַבְּעֹת הָאֵפֹד
  english_pob_choice: by its rings to the rings of the ephod
  chosen_spanish: por sus anillos a los anillos del efod
  alternatives_spanish:
  - con sus anillos a los anillos del efod
  - desde sus anillos a los anillos del efod
  lexicon: HALOT
  rationale: Las preposiciones describen la unión mediante los anillos de ambas piezas. «Por ... a» conserva la relación instrumental y direccional de manera natural en español.
- source_word: בִּפְתִיל תְּכֵלֶת
  english_pob_choice: with a blue cord
  chosen_spanish: con un cordón azul
  alternatives_spanish:
  - con una cuerda azul
  - con un hilo azul
  lexicon: HALOT
  rationale: «Cordón» expresa mejor que «hilo» una ligadura suficiente para sujetar las piezas, y conserva el matiz de lazos o cordeles de sujeción.
- source_word: חֵשֶׁב הָאֵפֹד
  english_pob_choice: the skillfully woven band of the ephod
  chosen_spanish: la banda tejida del efod
  alternatives_spanish:
  - la banda hábilmente tejida del efod
  - el cinturón tejido del efod
  lexicon: HALOT
  rationale: חֵשֶׁב designa la banda decorada o tejida del efod. «Banda tejida» mantiene la referencia técnica sin sobrecargar el texto; la cualidad de tejido está atestiguada por el contexto sin necesidad de expandirla demasiado.
- source_word: וְלֹא יִזַּח
  english_pob_choice: would not come loose
  chosen_spanish: no se desprendiera
  alternatives_spanish:
  - no se soltara
  - no se aflojara
  lexicon: HALOT
  rationale: El sentido es que la pieza no se separara ni se aflojara de su lugar. «No se desprendiera» refleja bien la idea de separarse de la otra pieza en un español claro.
- source_word: מֵעַל הָאֵפֹד
  english_pob_choice: from the ephod
  chosen_spanish: del efod
  alternatives_spanish:
  - de sobre el efod
  - desde encima del efod
  lexicon: HALOT
  rationale: Aunque el hebreo incluye el matiz de «de encima de», en español la forma más natural y fiel en este contexto es «del efod», sin perder la relación de pertenencia y separación ya expresada por «se desprendiera».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue el estándar del proyecto para el Nombre divino, en español «Yahvé», preservando el nombre personal del pacto y evitando la sustitución por un título.
theological_decisions:
- issue: Representación del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa el Tetragrámaton de manera directa. En la tradición del proyecto, se traslada al español como «Yahvé» para mantener visible el nombre revelado a Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Relación entre el pectoral y el efod
  english_pob_reading: so that the breastpiece would not come loose from the ephod
  chosen_spanish_reading: para que el pectoral no se desprendiera del efod
  alternative_spanish_readings:
  - para que el pectoral no se soltara del efod
  - para que el pectoral no se aflojara del efod
  rationale: El hebreo enfatiza la permanencia firme de la pieza en su sitio. «No se desprendiera» expresa esa estabilidad sin introducir una interpretación adicional.
  doctrine_reference: Uso contextual del texto cultual; sin implicación doctrinal controvertida
translation_notes:
  revision_awareness: 'El draft sigue de cerca el consenso auditado del inglés POB y adopta las revisiones más recientes: usa una expresión más natural para la sujeción («con un cordón azul») y simplifica la relación espacial de la pieza para que el español fluya sin perder precisión.'
  spanish_consistency_notes:
  - Se mantiene «efod» como término técnico transliterado, en consonancia con el uso bíblico especializado.
  - Se usa «pectoral» para הַחֹשֶׁן por ser el equivalente español más preciso y reconocido en este contexto cultual.
  - Se conserva el nombre divino como «Yahvé», siguiendo la terminología del proyecto y evitando sustituciones por títulos.
