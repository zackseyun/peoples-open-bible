translation:
  language: es
  text: 'Y Rafael le dijo a Tobías[a]: «¿No sabes, hermano, cómo dejaste a tu padre?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿No recuerdas en qué condición dejaste a tu padre?» La tradición semítica paralela hace explícita la ceguera del padre, pero el texto griego lo expresa de manera más breve.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ εἶπεν Ῥαφαὴλ πρὸς Τωβείαν
  english_pob_choice: And Raphael said to Tobiah
  chosen_spanish: Y Rafael le dijo a Tobías
  alternatives_spanish:
  - Entonces Rafael dijo a Tobías
  - Y Rafael habló a Tobías
  lexicon: BDAG; uso narrativo del griego koiné
  rationale: Se mantiene la coordinación narrativa simple de Καὶ con «Y». El nombre propio se adapta a la forma española habitual «Rafael» y «Tobías» para legibilidad eclesial, sin cambiar el referente ni añadir contenido.
- source_word: Οὐ γινώσκεις
  english_pob_choice: Do you not know
  chosen_spanish: ¿No sabes
  alternatives_spanish:
  - ¿No recuerdas
  - ¿No te das cuenta
  lexicon: BDAG
  rationale: «γινώσκω» suele ser «saber/conocer». «¿No sabes?» conserva la forma breve de la pregunta griega y deja que el contexto sugiera la alusión a la situación del padre. «¿No recuerdas?» explicita más de lo que dice el griego.
- source_word: ἀδελφέ
  english_pob_choice: brother
  chosen_spanish: hermano
  alternatives_spanish:
  - amigo
  - hermano mío
  lexicon: BDAG
  rationale: El vocativo se traduce literalmente como «hermano», preservando el tono cercano y familiar del griego sin convertirlo en una fórmula más libre.
- source_word: πῶς
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - en qué condición
  - de qué manera
  lexicon: BDAG
  rationale: «πῶς» puede referirse al modo o a la condición. «Cómo» reproduce la compactación del griego y evita introducir explícitamente la ceguera del padre, que el texto griego no nombra aquí.
- source_word: ἀφῆκες τὸν πατέρα σου
  english_pob_choice: you left your father
  chosen_spanish: dejaste a tu padre
  alternatives_spanish:
  - abandonaste a tu padre
  - dejaste atrás a tu padre
  lexicon: BDAG
  rationale: «ἀφίημι» aquí expresa dejar a alguien en cierto estado o situación. «Dejaste» es la equivalencia natural y suficientemente amplia; «abandonaste» sería más fuerte que el griego.
theological_decisions:
- issue: Relación entre el griego breve y la tradición semítica paralela sobre la ceguera del padre
  english_pob_reading: Retain the Greek's concise rhetorical question without importing the fuller explanatory wording from the Semitic parallel.
  chosen_spanish_reading: Conservar la pregunta breve del griego sin introducir en el texto principal la ceguera del padre.
  alternative_spanish_readings:
  - «¿No sabes, hermano, en qué condición dejaste a tu padre ciego?»
  - «¿No recuerdas en qué estado dejaste a tu padre?»
  rationale: La tradición paralela semítica aclara la condición del padre, pero el ancla primaria es el griego de Swete. Por fidelidad textual, el español principal mantiene la concisión del original y no reemplaza la insinuación por una explicación explícita.
  doctrine_reference: Principio de primacía del texto fuente y preservación honesta de la ambigüedad/implicación textual.
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: no se requieren cambios respecto del juicio de alta concordancia; se mantiene la brevedad del griego y se deja la expansión semítica solo como nota alternativa.'
  spanish_consistency_notes:
  - Se usa «Tobías» en lugar de «Tobiah» por norma española de nombres bíblicos.
  - Se mantiene «Y» inicial para reflejar la continuidad narrativa del griego.
  - No se introduce «SEÑOR» ni terminología teológica ajena al versículo.
  - La nota al pie se ancla en «Tobías[a]» para preservar la alternativa de traducción sin duplicar marcadores.
