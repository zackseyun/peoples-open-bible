translation:
  language: es
  text: Él hace mis pies como los de las ciervas[a], y me pone sobre mis alturas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como las ciervas»; el hebreo usa un femenino plural que evoca hembras de ciervo y su paso seguro y ágil.
    reason: lexical_alternative
  - marker: b
    text: O «sobre mis lugares altos»; el hebreo puede entenderse literalmente como 'alturas' o 'lugares altos'.
    reason: alternative_reading
lexical_decisions:
- source_word: מְשַׁוֶּה
  english_pob_choice: makes
  chosen_spanish: hace
  alternatives_spanish:
  - me hace
  - me vuelve
  - me pone
  lexicon: HALOT
  rationale: El participio piel de שוה expresa causar que algo sea como otra cosa. En español, 'hace' reproduce de modo natural la idea causativa sin añadir una explicación ajena al texto.
- source_word: רַגְלַי
  english_pob_choice: my feet
  chosen_spanish: mis pies
  alternatives_spanish:
  - mis piernas
  - mis pasos
  lexicon: HALOT
  rationale: רֶגֶל significa 'pie/pies' en este contexto de agilidad y apoyo. 'Mis pies' conserva la imagen corporal directa del hebreo.
- source_word: כָּאַיָּלוֹת
  english_pob_choice: like the deer’s
  chosen_spanish: como los de las ciervas
  alternatives_spanish:
  - como de ciervas
  - como los de las venadas
  - como los de los ciervos
  lexicon: HALOT
  rationale: אַיָּלוֹת es un plural femenino que apunta a hembras de ciervo. 'Ciervas' mantiene el matiz femenino señalado por el inglés POB y evita el masculino genérico; 'como los de...' permite un español fluido y literal a la vez.
- source_word: בָּמוֹתַי
  english_pob_choice: my heights
  chosen_spanish: mis alturas
  alternatives_spanish:
  - mis lugares altos
  - mis altas cumbres
  - mis altos lugares
  lexicon: HALOT
  rationale: בָּמוֹת literalmente significa 'alturas/lugares altos'. 'Mis alturas' conserva el sufijo posesivo y el tono poético sin cargar de inmediato una lectura cultual que el contexto no exige aquí.
- source_word: יַעֲמִידֵנִי
  english_pob_choice: sets me on my heights
  chosen_spanish: me pone sobre
  alternatives_spanish:
  - me hace estar sobre
  - me establece sobre
  - me coloca sobre
  lexicon: HALOT
  rationale: 'El hifil de עמד es causativo: ''hacer estar/poner''. ''Me pone sobre'' expresa con sencillez la acción de situar al salmista en un lugar elevado, sin añadir la palabra ''seguro'' que el texto hebreo no explicita.'
theological_decisions:
- issue: Imagen poética de agilidad y firmeza
  english_pob_reading: The verse is rendered as poetic description of God giving the psalmist sure-footedness and secure standing, without importing a specific military or spiritualized interpretation into the main text.
  chosen_spanish_reading: La frase conserva la imagen poética de pies ágiles de cierva y de ser colocado en alturas, sin explicitar en el cuerpo del texto una interpretación militar o espiritualizada.
  alternative_spanish_readings:
  - 'Una traducción más formal podría decir: ''me hace estar sobre mis alturas''.'
  - Algunos intérpretes ven aquí una resonancia militar más marcada en el contexto del salmo.
  rationale: El hebreo presenta una comparación de agilidad y una acción de ser puesto en lugares altos. La versión española mantiene esa imagen sin ampliar el sentido más allá de lo que el verso dice explícitamente.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y la última revisión inglesa: se evita añadir ''seguro'' u otra explicación no explícita, pero se conserva la imagen poética completa de pies como de ciervas y de ser puesto sobre las alturas.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando aparece, pero en este versículo el sujeto está implícito por el contexto poético y no requiere inserción explícita.
  - '''Ciervas'' refleja el femenino plural del hebreo; se prefirió esta opción frente a ''ciervos'' para no perder la marca de género del original.'
  - '''Alturas'' mantiene la ambigüedad entre elevación física y posible trasfondo figurado, sin forzar una glosa interpretativa en el texto principal.'
