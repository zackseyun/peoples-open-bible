revisions:
- from: Su muerte es una muerte malvada[a], y su Hades[b] es más ventajoso.
  to: Su muerte es una muerte funesta[a], y su Hades[b] es más ventajoso.
  rationale: Se ajusta πονηρός de «malvada» a «funesta» para reflejar mejor el sentido contextual de una muerte ruinosa o terrible en español natural. Se corrige la nota [a] para que ofrezca una alternativa genuina basada en la referencia femenina («de ella»). Se suaviza la nota [b] para evitar una personificación innecesaria del referente, manteniendo la alternativa comparativa documentada en el expediente inglés. Se conserva «Hades» y la estructura enfática del original griego.
