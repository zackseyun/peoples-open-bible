review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la secuencia narrativa («Entonces dije»), la súplica de cese y la pregunta retórica sobre la supervivencia de Jacob. Sin embargo, el tratamiento de אֲדֹנָי יְהוִה como «Yahvé, Señor» invierte de manera infiel el orden y suena poco natural en español; además, la nota asociada repite esa inversión. También «deja» es demasiado coloquial y algo ambiguo para חֲדַל נָא en este contexto de intercesión; «cesa» o «detente» refleja mejor el ruego solemne.
  spanish_quality_summary: El español es en general legible, pero «Yahvé, Señor» resulta extraño para lectura eclesial y no refleja bien el compuesto divino. «Por favor, deja» suena menos digno y menos preciso que el registro esperado. La cláusula «¿Cómo podrá estar en pie Jacob?» es aceptable y natural. «Porque es pequeño» funciona, aunque conviene explicitar en nota la posible alternativa más literal del hebreo terso.
  glossary_alignment: Debe mantenerse «Yahvé» para יְהוִה, pero en el compuesto אֲדֹנָי יְהוִה la forma española más fiel y natural es «Señor Yahvé», no «Yahvé, Señor». Se preserva «Jacob» y «pequeño». Para חֲדַל נָא, «cesa, por favor» o «por favor, cesa» alinea mejor con el valor imperativo y el tono solemne que el proyecto espera.
  issues:
  - severity: high
    issue: El título divino «Yahvé, Señor» traduce de forma inadecuada אֲדֹנָי יְהוִה.
    rationale: El hebreo presenta primero אֲדֹנָי y luego יְהוִה. En español, «Yahvé, Señor» invierte el orden, introduce una pausa no presente en la fuente y produce una expresión poco idiomática. «Señor Yahvé» conserva ambos elementos y su orden.
  - severity: medium
    issue: «Por favor, deja» es demasiado coloquial y semánticamente impreciso para חֲדַל נָא.
    rationale: En contexto de súplica profética, חֲדַל pide cesar o desistir. «Deja» puede entenderse como ‘permite’ o ‘abandona’, mientras que «cesa» comunica mejor el pedido de detener el juicio.
  - severity: low
    issue: La nota a invierte también el compuesto divino y se centra innecesariamente en la POB inglesa.
    rationale: La nota debe explicar la forma hebrea y la decisión española, no justificar una convención inglesa ajena al texto meta.
