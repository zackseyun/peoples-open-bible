translation:
  language: es
  text: 'Dijo[a]: «Yo seré señor de la tierra y del mar», y no supo que Dios es grande[b], poderoso en su gran fuerza.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tierra y mar».
    reason: lexical_alternative
  - marker: b
    text: O «poderoso en su gran poder».
    reason: lexical_alternative
lexical_decisions:
- source_word: κύριος
  english_pob_choice: lord
  chosen_spanish: señor
  alternatives_spanish:
  - amo
  - dueño
  lexicon: BDAG
  rationale: En este contexto el hablante humano se jacta de dominio; en español, «señor» conserva mejor ese reclamo de autoridad sin convertirlo en un título divino. «Amo» o «dueño» suenan más duros o patrimoniales y cambian el matiz de la jactancia.
- source_word: γῆς
  english_pob_choice: land
  chosen_spanish: tierra
  alternatives_spanish:
  - país
  - suelo
  - mundo
  lexicon: BDAG
  rationale: La pareja «tierra y mar» reproduce bien el contraste geográfico del griego. «Tierra» es la opción más natural y fiel en español; «mundo» sería demasiado amplio, y «país» restringe indebidamente el alcance.
- source_word: οὐκ ἔγνω
  english_pob_choice: did not know
  chosen_spanish: no supo
  alternatives_spanish:
  - no conoció
  - no entendió
  - no reconoció
  lexicon: BDAG
  rationale: El sentido básico es falta de reconocimiento consciente. «No supo» mantiene la sencillez del griego y la ironía moral; «no reconoció» sería posible, pero introduce una explicitación interpretativa que no exige el texto.
- source_word: κραταιὸς
  english_pob_choice: mighty
  chosen_spanish: poderoso
  alternatives_spanish:
  - mighty
  - fuerte
  - poderosísimo
  lexicon: BDAG
  rationale: «Poderoso» transmite la fuerza soberana de Dios en español con tono digno y claro. «Fuerte» queda corto para la elevación retórica del pasaje; «poderosísimo» intensifica más de lo que el griego requiere.
- source_word: ἐν ἰσχύϊ αὐτοῦ τῇ μεγάλῃ
  english_pob_choice: in his great strength
  chosen_spanish: en su gran fuerza
  alternatives_spanish:
  - en su gran poder
  - por su gran fuerza
  - en su gran potencia
  lexicon: BDAG
  rationale: «Fuerza» conserva la conexión léxica con ἰσχύς y refleja bien la intensificación por τῇ μεγάλῃ. «Poder» o «potencia» serían válidos, pero «fuerza» es más cercana al campo semántico del original y mantiene la repetición enfática.
theological_decisions:
- issue: Cómo traducir ὁ θεὸς μέγας, κραταιὸς... sin convertirlo en un título distinto ni suavizar la afirmación
  english_pob_reading: that God is great, mighty in his great strength
  chosen_spanish_reading: que Dios es grande, poderoso en su gran fuerza
  alternative_spanish_readings:
  - que el Dios es grande y poderoso
  - que Dios, el Grande y el Poderoso, tiene gran fuerza
  rationale: El griego funciona como una afirmación directa sobre Dios en contraste con el orgullo humano anterior. Mantener la cláusula simple preserva esa oposición sin añadir un título formular ni una paráfrasis devocional. «Dios es grande» y «poderoso» comunica la teología del pasaje con fidelidad y naturalidad en español.
  doctrine_reference: Afirmación de la grandeza y omnipotencia de Dios; contraste entre soberbia humana y poder divino.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego de Swete (1909) y coincide con la lectura auditada del inglés POB en la estructura y los matices principales. Se conservaron las dos alternativas notables del aparato inglés: γῆς como «tierra» y ἰσχύϊ como «fuerza», evitando una mecanización que oscureciera el contraste retórico.'
  spanish_consistency_notes:
  - Se usó «Yahvé» para el nombre divino solo cuando corresponde; aquí el texto dice θεός, por lo que se traduce «Dios».
  - Se prefirió un español sobrio y publicable, con comillas angulares y notas breves de alternativa léxica.
  - No se introdujo lenguaje eclesiástico tradicional no exigido por el griego; se mantuvo el contraste entre la jactancia humana y la grandeza de Dios.
