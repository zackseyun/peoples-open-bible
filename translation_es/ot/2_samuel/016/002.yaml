revisions:
- from: 'Entonces el rey dijo a Ziba[a]: «¿Para qué son estas cosas?». Y Ziba dijo: «Los asnos son para la casa del rey, para montar; el pan y la fruta de verano[b] son para que los jóvenes[c] coman; y el vino es para los cansados en el desierto, para beber».'
  to: 'Entonces el rey dijo a Ziba[a]: «¿Para qué son estas cosas?». Y Ziba dijo: «Los asnos son para la casa real, para montar en ellos; el pan y la fruta de verano[b] son para que los jóvenes[c] coman; y el vino es para que el que esté cansado en el desierto beba».'
  rationale: Se ajustó «casa del rey» a «casa real» para reflejar mejor el sentido de household; se mejoró la fluidez de «para montar» con «para montar en ellos»; y se reemplazó «los cansados» por «el que esté cansado» para representar mejor el singular genérico hebreo. Se conservaron las notas léxicas existentes porque siguen siendo pertinentes y están bien ancladas.
