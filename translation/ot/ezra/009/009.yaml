theological_decisions:
- issue: Rendering of חֶסֶד
  chosen_reading: covenant faithfulness
  alternative_readings:
  - steadfast love
  - kindness
  - favor
  rationale: The verse highlights God's loyal mercy toward his covenant people even in exile. 'Covenant faithfulness' preserves the theological depth of חֶסֶד better than a thinner term like 'kindness,' while remaining readable. Because this is a significant lexical-theological choice, alternatives are preserved in a footnote.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Metaphorical sense of גָדֵר
  chosen_reading: a wall
  alternative_readings:
  - a protective enclosure
  - a hedge
  rationale: The term may function metaphorically for protection or security granted by Persian favor, not only a literal fortification. The main text keeps the concrete image 'wall' and a footnote preserves the broader protective nuance, maintaining the text's tension rather than resolving it too narrowly.
  doctrine_reference: Translation philosophy §3
