    text: Or “cursed is the ground on your account”; the Hebrew can be rendered more formally this way.
    reason: lexical_alternative
  - marker: d
    text: The Hebrew term can also be rendered “in sorrow” or “with pain”; here it refers to hardship in labor for food.
    reason: lexical_alternative
  - marker: e
