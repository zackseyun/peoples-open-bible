translation:
  language: es
  text: Antes que nacieran los montes, y tú diste a luz[a] la tierra y el mundo, desde la eternidad hasta la eternidad tú eres Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «trajiste a luz la tierra y el mundo»; el verbo hebreo lleva imaginería de trabajo de parto/nacimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּטֶרֶם
  english_pob_choice: Before
  chosen_spanish: Antes que
  alternatives_spanish:
  - Antes de que
  - Antes
  lexicon: HALOT
  rationale: La partícula temporal introduce una prioridad absoluta respecto de la creación; «Antes que» es natural en español y conserva el sentido temporal del hebreo sin endurecer el verso.
- source_word: הָרִים
  english_pob_choice: the mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - las montañas
  - los montes
  lexicon: HALOT
  rationale: El hebreo usa un plural definido. «Montes» es una opción poética y bíblica en español; mantiene la imagen primordial con un registro digno.
- source_word: יֻלָּדוּ
  english_pob_choice: were born
  chosen_spanish: nacieran
  alternatives_spanish:
  - fueran nacidos
  - nacieron
  lexicon: HALOT
  rationale: El pasivo de ילד conserva la metáfora de nacimiento aplicada a los montes. En español, una subordinada temporal con subjuntivo («nacieran») suena natural y refleja la anterioridad poética del hebreo.
- source_word: וַתְּחוֹלֵל
  english_pob_choice: you brought forth
  chosen_spanish: dieras a luz
  alternatives_spanish:
  - engendraras
  - hicieras nacer
  - dieras a luz
  lexicon: HALOT
  rationale: El verbo expresa imagen de parto/labor. «Dieras a luz» preserva esa fuerza figurada en español y evita aplanarla en «crear» o «hacer», que perderían el matiz corporal presente en el hebreo.
- source_word: אֶרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el país
  lexicon: HALOT
  rationale: En paralelo con תבל y en contexto cósmico, «la tierra» comunica bien el ámbito creado sin restringirlo a un territorio local.
- source_word: וְתֵבֵל
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el mundo
  - el orbe
  lexicon: HALOT
  rationale: «Mundo» refleja de forma natural el sentido de תבל como mundo habitado/ordenado; es idiomático y suficientemente amplio para el contexto de creación.
- source_word: וּמֵעוֹלָם עַד עוֹלָם
  english_pob_choice: from everlasting to everlasting
  chosen_spanish: desde la eternidad hasta la eternidad
  alternatives_spanish:
  - desde la eternidad hasta la eternidad
  - de eternidad a eternidad
  - desde siempre y para siempre
  lexicon: HALOT
  rationale: La fórmula hebrea expresa duración sin límite en ambas direcciones. «Desde la eternidad hasta la eternidad» preserva el paralelismo y es claro en español contemporáneo.
- source_word: אַתָּה
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - tú
  lexicon: HALOT
  rationale: 'Se conserva el pronombre explícito para enfatizar la identidad divina del sujeto: «tú eres Dios».'
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios
  - el Poderoso
  - el Dios fuerte
  lexicon: HALOT
  rationale: Aquí אֵל funciona como designación divina general. «Dios» es la opción más clara y natural en español, sin añadir matices no exigidos por el versículo.
theological_decisions:
- issue: Mantener la metáfora de nacimiento/labor en la creación
  english_pob_reading: Retain the birth metaphor for both the mountains and God's bringing forth of earth/world, but in idiomatic English.
  chosen_spanish_reading: Conservar la metáfora de parto/nacimiento tanto para los montes como para la tierra y el mundo, pero con español idiomático.
  alternative_spanish_readings:
  - Aplanar la imagen con «creaste» o «hiciste»
  - Reforzar demasiado la imagen con una paráfrasis amplia
  rationale: El hebreo no solo afirma creación, sino que la describe con lenguaje de parto. La versión española debe preservar esa tensión poética sin volverse extraña ni doctrinalmente más específica de lo que el texto permite.
  doctrine_reference: Poética bíblica; teología de la creación en lenguaje figurado
- issue: Expresar la eternidad divina sin filosofizar la frase
  english_pob_reading: from everlasting to everlasting you are God
  chosen_spanish_reading: desde la eternidad hasta la eternidad tú eres Dios
  alternative_spanish_readings:
  - desde siempre y para siempre tú eres Dios
  - de eternidad a eternidad tú eres Dios
  rationale: La fórmula resalta la existencia ilimitada de Dios antes y después de la creación. «Desde la eternidad hasta la eternidad» mantiene el paralelismo y evita convertir la expresión en una abstracción filosófica más fuerte que el hebreo.
  doctrine_reference: Aseidad y eternidad de Dios; Salmo 90:2
- issue: Tomar אַתָּה como pronombre enfático
  english_pob_reading: you are God
  chosen_spanish_reading: tú eres Dios
  alternative_spanish_readings:
  - eres Dios
  - tú eres el Dios
  rationale: El pronombre explícito refuerza la afirmación final. En español, conservar «tú» ayuda a reproducir ese énfasis retórico y la clausura confesional del verso.
  doctrine_reference: Confesión de la identidad divina en poesía hebrea
translation_notes:
  revision_awareness: La redacción sigue la revisión auditada que corrigió la coordinación hebrea a «y»; en español se reflejó con «y» entre las dos proposiciones principales. También se mantuvo la metáfora de nacimiento/labor que el audit trail inglés preserva, en lugar de suavizarla a un verbo genérico de creación.
  spanish_consistency_notes:
  - Se usó «Dios» para אֵל conforme al valor designativo del término en este contexto.
  - Se prefirió «la eternidad» para mantener un registro claro y bíblico en español, equivalente funcional de «everlasting» sin introducir un tecnicismo.
  - El vocativo/pronombre final quedó como «tú eres Dios», manteniendo el orden natural del español y el énfasis del hebreo.
