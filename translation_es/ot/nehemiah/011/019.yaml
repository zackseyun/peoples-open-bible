    issue: La nota al pie [a] está anclada en «porteros» en vez de «sus hermanos».
    rationale: La nota explica la alternativa de וַאֲחֵיהֶם («sus hermanos» / «sus parientes»), no de הַשּׁוֹעֲרִים («porteros»). Esto desinforma al lector sobre qué término está siendo aclarado.
  - severity: medium
    issue: «En las puertas» es menos idiomático que «a las puertas» en este contexto.
    rationale: בַּשְּׁעָרִים señala el lugar de servicio de guardias apostados. En español, «a las puertas» comunica mejor la idea de estar de guardia en los accesos, sin apartarse del sentido fuente.
