  yaml_path: translation/deuterocanon/tobit/014/007.yaml
  text: And all the nations will bless the Lord[a]. And his people will give thanks to God, and the Lord will exalt his people; and all who love the Lord God in truth and righteousness will rejoice[c][b], showing mercy to our brothers.
