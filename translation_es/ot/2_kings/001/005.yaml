translation:
  language: es
  text: 'Los mensajeros regresaron a él, y él les dijo: «¿Por qué han regresado?[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «¿Qué es esto? Ustedes han regresado». Es un modismo que significa «¿Por qué han regresado?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשׁוּבוּ
  english_pob_choice: returned
  chosen_spanish: regresaron
  alternatives_spanish:
  - volvieron
  - regresaron de vuelta
  lexicon: HALOT
  rationale: שוב expresa volver o regresar. En español, «regresaron» suena natural y conserva el movimiento de vuelta al remitente sin añadir matices innecesarios.
- source_word: הַמַּלְאָכִים
  english_pob_choice: the messengers
  chosen_spanish: los mensajeros
  alternatives_spanish:
  - los ángeles
  - los enviados
  lexicon: HALOT
  rationale: En este contexto narrativo se trata de agentes humanos enviados por el rey; «mensajeros» evita la lectura de seres celestiales que sugeriría «ángeles».
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - de vuelta a él
  - hacia él
  lexicon: HALOT
  rationale: La preposición indica dirección hacia la persona mencionada; en español basta «a él» porque el verbo «regresaron» ya comunica el retorno.
- source_word: וַיֹּאמֶר אֲלֵיהֶם
  english_pob_choice: and he said to them
  chosen_spanish: y él les dijo
  alternatives_spanish:
  - y les preguntó
  - y les respondió
  lexicon: HALOT
  rationale: El hebreo usa el verbo general «decir». Aunque el contenido es interrogativo, mantener «les dijo» conserva la forma narrativa sin convertirlo interpretativamente en «les preguntó».
- source_word: מַה זֶּה שַׁבְתֶּם
  english_pob_choice: Why have you returned?
  chosen_spanish: ¿Por qué han regresado?
  alternatives_spanish:
  - '¿Qué es esto: que han regresado?'
  - ¿Cuál es la razón de que hayan regresado?
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y significa la razón del regreso. «¿Por qué han regresado?» transmite el sentido con claridad en español sin perder la tensión semántica del hebreo.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo WLC y el audit trail en inglés POB. Se mantiene la estructura narrativa, el referente humano de «mensajeros» y el valor idiomático de la pregunta final, sin depender de una paráfrasis libre.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque este versículo no contiene el tetragrámaton.
  - Se usa «mensajeros» para מלאכים por el contexto histórico-narrativo, no «ángeles».
  - La pregunta final se vierte de modo idiomático, pero la nota conserva la literalidad hebrea relevante.
