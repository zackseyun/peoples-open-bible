translation:
  language: es
  text: 'Y dijo[a]: «Tu nombre ya no será Jacob, sino Israel, porque has luchado con Dios y con hombres[b], y has prevalecido».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con seres divinos»; el hebreo אֱלֹהִים puede referirse, según el contexto, a Dios, a dioses o a seres celestiales. Aquí la lectura principal sigue «Dios» por el contexto narrativo.'
    reason: alternative_reading
  - marker: b
    text: 'O: «con personas» o «con humanos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֵאָמֵר
  english_pob_choice: shall ... be called
  chosen_spanish: se dirá
  alternatives_spanish:
  - será llamado
  - será nombrado
  lexicon: HALOT
  rationale: La forma pasiva del אמר en una fórmula de nombramiento suena más natural en español como «se dirá» dentro de este anuncio. Conserva la declaración formal sin forzar un giro demasiado literal.
- source_word: עוֹד
  english_pob_choice: no longer
  chosen_spanish: más
  alternatives_spanish:
  - ya no
  - nunca más
  lexicon: HALOT
  rationale: En el cambio de nombre, עוד marca la cesación del nombre anterior. La combinación «no ... más» reproduce bien ese valor y mantiene un español fluido y solemne.
- source_word: כִּי אִם
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - excepto
  lexicon: HALOT
  rationale: En fórmulas de contraste al renombrar, כי אם funciona adversativamente. «Sino» expresa con precisión «no X, sino Y» y preserva la estructura de exclusión y reemplazo.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: nombre propio / política del proyecto
  rationale: Los nombres propios se transliteran. El juego explicativo no se traslada al nombre mismo, sino a la cláusula causal que sigue.
- source_word: שָׂרִיתָ
  english_pob_choice: have striven
  chosen_spanish: has luchado
  alternatives_spanish:
  - has contendido
  - has peleado
  - has batallado
  lexicon: HALOT
  rationale: El verbo expresa contienda/striving y en español «has luchado» comunica bien el esfuerzo intenso y la idea de enfrentamiento que explica el nombre Israel. «Has contendido» sería más cercano al matiz conceptual, pero resulta menos natural para lectura pública.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dioses
  - seres divinos
  lexicon: HALOT
  rationale: En este contexto narrativo el referente singular es el más probable y coincide con el peso teológico de la escena. «Dios» preserva la fuerza del relato y no resuelve prematuramente la tensión interpretativa.
- source_word: אֲנָשִׁים
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  - humanos
  lexicon: HALOT
  rationale: La forma hebrea es masculina plural y el contraste retórico con Dios se mantiene mejor con «hombres». Es la opción más fiel al dato léxico y al paralelo del audit trail en inglés.
- source_word: וַתּוּכָל
  english_pob_choice: have prevailed
  chosen_spanish: has prevalecido
  alternatives_spanish:
  - has vencido
  - has salido victorioso
  - has podido
  lexicon: HALOT
  rationale: El verbo יכל aquí señala resultado exitoso en la lucha. «Has prevalecido» conserva el valor de éxito/triunfo sin añadir la idea de aniquilación total.
theological_decisions:
- issue: Referente de אֱלֹהִים en la cláusula explicativa
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - seres divinos
  - ser divino
  - dioses
  rationale: La escena narrativa presenta el encuentro de Jacob como una experiencia real de Dios, aunque siga habiendo misterio en la identidad del interlocutor. Traducir אֱלֹהִים como «Dios» preserva esa tensión teológica en lugar de rebajarla a una lectura más débil o resolverla de forma prematura.
  doctrine_reference: Preservar la tensión teológica del pasaje
- issue: Valor de אֲנָשִׁים en contraste con Dios
  english_pob_reading: men
  chosen_spanish_reading: hombres
  alternative_spanish_readings:
  - personas
  - humanos
  rationale: El hebreo usa el plural masculino de איש y probablemente establece el contraste retórico «con Dios y con hombres». Mantener «hombres» respeta la forma del original y sigue la preferencia del proyecto por precisión de género cuando el texto lo marca.
  doctrine_reference: Precisión de género frente a neutralización
- issue: Fórmula de renombramiento negativa-contrastiva
  english_pob_reading: no longer ... but
  chosen_spanish_reading: no se dirá más ... sino
  alternative_spanish_readings:
  - ya no ... sino
  - no será llamado más ... sino
  rationale: La estructura hebrea niega el nombre anterior y lo reemplaza por el nuevo. «No se dirá más ... sino ...» reproduce la cadencia del decreto y su carácter performativo.
  doctrine_reference: Fidelidad a la fórmula de nombramiento
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete de origen; el último pase indica que no hubo cambios y la concordancia de revisión fue alta.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים en la línea principal, conforme al valor narrativo-teológico del contexto.
  - Se conserva la transliteración «Israel» como nombre propio, dejando el juego de palabras en la cláusula explicativa.
  - Se usa «hombres» para אֲנָשִׁים por fidelidad al plural masculino del hebreo y para respetar el contraste retórico con Dios.
  - La puntuación reproduce el discurso directo con cierre de comillas españolas y marca de nota anclada en el verbo introductorio.
