translation:
  language: es
  text: Y en la cuarta generación volverán aquí, porque la iniquidad de los amorreos[a] todavía no está completa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el amorreo», con «amorreo» usado colectivamente para el pueblo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «hasta aquí»; el sentido es que la iniquidad de los amorreos no ha alcanzado todavía su medida plena hasta ese tiempo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/ד֥וֹר
  english_pob_choice: And in the ... generation
  chosen_spanish: Y en la ... generación
  alternatives_spanish:
  - Y la ... generación
  - Entonces, en la ... generación
  lexicon: HALOT
  rationale: דּוֹר designa una generación; en español, la preposición 'en' conserva con naturalidad la relación temporal. La conjunción inicial וְ se reproduce con 'Y' para mantener el enlace discursivo sin forzar una construcción arcaica.
- source_word: רְבִיעִ֖י
  english_pob_choice: fourth
  chosen_spanish: cuarta
  alternatives_spanish:
  - cuarto
  - de cuarta
  lexicon: HALOT
  rationale: Es un ordinal femenino que concuerda con 'generación'. 'Cuarta' es la forma natural y precisa en español.
- source_word: יָשׁוּבוּ
  english_pob_choice: they will return
  chosen_spanish: volverán
  alternatives_spanish:
  - regresarán
  - volverán de nuevo
  lexicon: HALOT
  rationale: שׁוּב expresa volver/regresar. 'Volverán' comunica bien el retorno al lugar prometido y suena más natural que una calca más literal.
- source_word: הֵנָּה
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - hasta aquí
  - a este lugar
  lexicon: HALOT
  rationale: El adverbio deíctico marca destino o ubicación. 'Aquí' conserva la referencia espacial de forma clara y breve.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la demora. 'Porque' expresa de manera transparente la relación causal en español bíblico contemporáneo.
- source_word: לֹא שָׁלֵם
  english_pob_choice: is not yet complete
  chosen_spanish: todavía no está completa
  alternatives_spanish:
  - aún no ha alcanzado su plenitud
  - no está completa todavía
  lexicon: HALOT
  rationale: שָׁלֵם aquí comunica integridad o medida plena. En español, 'todavía no está completa' preserva la idea de un estado no concluido sin sobrerinterpretar.
- source_word: עֲוֺן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - culpa
  - pecado
  lexicon: HALOT
  rationale: עוֹן puede abarcar culpa e iniquidad. 'Iniquidad' mantiene el peso moral objetivo del término y coincide con la elección auditada del inglés.
- source_word: הָ/אֱמֹרִי
  english_pob_choice: the Amorites
  chosen_spanish: los amorreos
  alternatives_spanish:
  - el amorreo
  - los amoritas
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular colectiva, el plural etnónimo es natural en español para el pueblo. Se conserva así el valor colectivo señalado por la nota auditada.
- source_word: עַד הֵֽנָּה
  english_pob_choice: until here
  chosen_spanish: todavía
  alternatives_spanish:
  - hasta aquí
  - hasta ahora
  - hasta entonces
  lexicon: HALOT
  rationale: La expresión idiomática subraya que la iniquidad no ha llegado al punto esperado. 'Todavía' integra ese matiz temporal en una frase española fluida; el valor más literal queda indicado en nota.
theological_decisions:
- issue: Momento de la vuelta de los descendientes de Abram
  english_pob_reading: The verse states that Israel's return is delayed until the Amorites' iniquity reaches its full measure, without specifying a broader theory of providence beyond this stated reason.
  chosen_spanish_reading: El regreso de sus descendientes se pospone hasta el momento señalado, sin añadir una explicación doctrinal más amplia que la que da el propio versículo.
  alternative_spanish_readings:
  - La demora expresa la paciencia divina con los amorreos
  - La demora sirve principalmente para la formación de Israel en Egipto
  rationale: La frase hebrea vincula el regreso con una condición moral concreta. La traducción conserva esa relación causal y evita resolver la tensión teológica con explicaciones que el texto no formula explícitamente.
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del enunciado del texto.
translation_notes:
  revision_awareness: El borrador sigue de cerca el pasaje hebreo y armoniza con el audit trail inglés aprobado; no se registraron revisiones posteriores relevantes y el consenso de revisión fue de alta concordancia.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como estándar de POB cuando no aparece explícitamente en este versículo.
  - '''Amorreos'' mantiene el valor colectivo del hebreo singular.'
  - '''Todavía no está completa'' preserva el matiz de no haber alcanzado una medida plena sin sobreexplicar el trasfondo.'
  - El orden y la puntuación buscan ser publicables en español sin perder la cadencia bíblica.
