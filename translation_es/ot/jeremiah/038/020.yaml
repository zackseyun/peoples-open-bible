translation:
  language: es
  text: 'Jeremías dijo[a]: «No te entregarán. Por favor, escucha la voz de Yahvé[b] en lo que te estoy diciendo, y te irá bien, y tu vida vivirá[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No te darán».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «escucha la voz de Yahvé», un giro que significa prestar atención y atender a lo que Yahvé dice.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «tu vida/alma vivirá». Aquí se refiere a la preservación de la vida física.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא יִתֵּנוּ
  english_pob_choice: They will not hand you over
  chosen_spanish: No te entregarán
  alternatives_spanish:
  - No te darán
  - No te pondrán en sus manos
  - No serás entregado
  lexicon: HALOT
  rationale: El verbo hebreo en 3. plural tiene objeto implícito por el contexto; en español, «entregar» comunica de forma natural la idea de pasar a alguien al poder de otro. Se mantiene la fuerza de amenaza/salvación sin volverlo excesivamente literal.
- source_word: שְׁמַע נָא
  english_pob_choice: Please listen
  chosen_spanish: Por favor, escucha
  alternatives_spanish:
  - Escucha, por favor
  - Por favor, oye
  lexicon: HALOT
  rationale: La imperativa con נָא expresa ruego insistente; «Por favor, escucha» conserva la súplica y el tono urgente con español natural.
- source_word: בְּקוֹל יְהוָה
  english_pob_choice: to the voice of Yahweh
  chosen_spanish: la voz de Yahvé
  alternatives_spanish:
  - la voz de Yahvé a la que debes atender
  - lo que dice Yahvé
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de «escuchar la voz de» en vez de reducirla a «obedecer». En el texto principal se usa «Yahvé» conforme al criterio del proyecto para יְהוָה.
- source_word: לַאֲשֶׁר אֲנִי דֹּבֵר אֵלֶיךָ
  english_pob_choice: in what I am speaking to you
  chosen_spanish: en lo que yo te hablo
  alternatives_spanish:
  - en lo que estoy hablándote
  - acerca de lo que te hablo
  lexicon: HALOT
  rationale: La frase conecta la voz de Yahvé con el habla profética. «En lo que yo te hablo» mantiene la relación estrecha entre escuchar a Yahvé y atender el mensaje que Jeremías transmite, sin sustituir el matiz por una mera orden abstracta.
- source_word: וְיִיטַב לְךָ
  english_pob_choice: and it will go well with you
  chosen_spanish: y te irá bien
  alternatives_spanish:
  - y te irá mejor
  - y todo te irá bien
  - y te resultará favorable
  lexicon: HALOT
  rationale: Es una expresión hebrea de resultado favorable. «Te irá bien» es idiomático y conserva el valor de bienestar/éxito sin exceder el alcance del hebreo.
- source_word: וּתְחִי נַפְשֶׁךָ
  english_pob_choice: and your life will live
  chosen_spanish: y tu vida vivirá
  alternatives_spanish:
  - y tu alma vivirá
  - y seguirás con vida
  - y tu vida será preservada
  lexicon: HALOT
  rationale: En este contexto נֶפֶשׁ refiere a la vida concreta, no a una noción espiritual separada. Se conserva la literalidad relativa del hebreo con una frase comprensible en español, siguiendo la revisión inglesa que evitó una paráfrasis más interpretativa.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El original hebreo contiene el Tetragrámaton. En español se adopta «Yahvé» como forma del nombre divino, coherente con la política terminológica del proyecto y sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de נֶפֶשׁ en un contexto de amenaza a la vida
  english_pob_reading: your life will live
  chosen_spanish_reading: tu vida vivirá
  alternative_spanish_readings:
  - tu alma vivirá
  - se te preservará la vida
  - tu vida será salvada
  rationale: Aquí נֶפֶשׁ expresa la vida física de la persona; por eso «vida» es preferible a «alma». La traducción evita imponer una antropología que el contexto de Jeremías 38:20 no exige.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #6'
- issue: Conservación del idiomático hebreo «escuchar la voz de Yahvé»
  english_pob_reading: listen to the voice of Yahweh
  chosen_spanish_reading: escucha la voz de Yahvé
  alternative_spanish_readings:
  - obedece a Yahvé
  - atiende a la voz de Yahvé
  rationale: Se conserva la metáfora auditiva del hebreo, que subraya tanto oír como atender. Traducir directamente por «obedece» borraría una tensión lexical que el texto original sí presenta.
  doctrine_reference: Jeremiah 38:20 source text and English POB lexical note
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió acercarse más al hebreo en la cláusula final con «your life will live» en vez de la paráfrasis más interpretativa «your life may be spared». Por eso se conserva en español «tu vida vivirá», sin suavizarlo a una formulación más explicativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, en línea con la política terminológica del proyecto.
  - Se conserva el valor idiomático de «escuchar la voz de» para no borrar la metáfora hebrea.
  - «Vida» se usa para נֶפֶשׁ en sentido de preservación física, evitando «alma» por ser más restrictivo teológicamente.
  - El estilo general busca ser publicable y natural en español, sin alejarse del paralelismo semítico del original.
