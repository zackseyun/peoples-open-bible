  rationale: La traducción base es sólida, pero requiere una corrección editorial importante en la colocación y contenido de las notas. Reubico [a] en ‘trama’, [b] en ‘lino’ y dejo [c] en ‘cuero’, además de corregir la explicación errónea de [a] y naturalizar [b] en español. No hace falta cambiar la redacción principal fuera de los anclajes de notas.
