translation:
  language: es
  text: Y los esclavizaron hasta este día[a]. Y a los reinos restantes y a las islas, a cuantos alguna vez se les resistieron, los destruyeron[b] y los esclavizaron para sí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta el día de hoy».
    reason: lexical_alternative
  - marker: b
    text: O «los devastaron» o «los arruinaron»; el verbo griego puede denotar una ruina severa.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατεδουλώσαντο
  english_pob_choice: enslaved
  chosen_spanish: esclavizaron
  alternatives_spanish:
  - sometieron
  - subyugaron
  - hicieron esclavos de
  lexicon: LSJ
  rationale: El verbo griego expresa llevar a esclavitud o a completa sujeción. En un contexto político-militar, "esclavizaron" conserva la fuerza de la dominación sin suavizarla indebidamente.
- source_word: ἕως τῆς ἡμέρας ταύτης
  english_pob_choice: to this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - hasta hoy
  - hasta el día de hoy
  lexicon: LSJ
  rationale: La expresión idiomática comunica una condición que continuó hasta el presente del autor. "Hasta este día" mantiene ese valor durativo y es natural en español bíblico actual.
- source_word: τὰς ἐπιλοίπους βασιλείας
  english_pob_choice: the remaining kingdoms
  chosen_spanish: los reinos restantes
  alternatives_spanish:
  - los demás reinos
  - el resto de los reinos
  lexicon: LSJ
  rationale: ἐπίλοιπος significa lo que queda o permanece. "Los reinos restantes" reproduce el sentido enumerativo del griego con claridad.
- source_word: τὰς νήσους
  english_pob_choice: the islands
  chosen_spanish: las islas
  alternatives_spanish:
  - los territorios insulares
  lexicon: LSJ
  rationale: νήσοι significa de manera directa "islas". No hace falta ampliar el término.
- source_word: ὅσοι ποτὲ ἀντέστησαν αὐτοῖς
  english_pob_choice: as many as ever resisted them
  chosen_spanish: a cuantos alguna vez se les resistieron
  alternatives_spanish:
  - quienes en cualquier momento se opusieron a ellos
  - todos los que alguna vez les resistieron
  lexicon: LSJ
  rationale: La construcción es amplia e indefinida. "A cuantos" preserva el alcance colectivo; "alguna vez" refleja el matiz enfático de ποτέ; "se les resistieron" conserva el régimen del verbo con un español natural.
- source_word: κατέφθειραν
  english_pob_choice: they destroyed
  chosen_spanish: los destruyeron
  alternatives_spanish:
  - los devastaron
  - los arruinaron
  lexicon: LSJ
  rationale: El verbo puede significar destruir, devastar o arruinar. Aquí, en paralelo con la esclavización, "destruyeron" es el equivalente más directo y concordante con la revisión del POB inglés.
- source_word: ἐδούλωσαν αὐτοῖς
  english_pob_choice: enslaved to them
  chosen_spanish: los esclavizaron para ellos
  alternatives_spanish:
  - los sometieron a ellos
  - los hicieron esclavos de ellos
  lexicon: LSJ
  rationale: El dativo αὐτοῖς indica el destinatario de la sujeción. "Para ellos" conserva ese valor relacional de forma transparente, aunque ligeramente literal; en español suena más claro que una repetición pesada de "a ellos".
theological_decisions:
- issue: Conservación del lenguaje de esclavitud en un contexto político-militar
  english_pob_reading: Use 'enslaved' rather than a softer term like 'subjected' or 'made tributary.'
  chosen_spanish_reading: Usar "esclavizaron" en vez de "sometieron" o "subyugaron".
  alternative_spanish_readings:
  - sometieron
  - subyugaron
  - los hicieron tributarios
  rationale: Aunque no es un término doctrinal polémico en este contexto, la elección debe preservar la dureza del dominio expresado por δουλόω/καταδουλόω. "Esclavizaron" refleja mejor la severidad del griego y la línea de traducción auditada del POB.
  doctrine_reference: 'DOCTRINE.md: contested terms on δοῦλος; translation philosophy on preserving bonded-force terms'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión auditada del POB inglés, que sustituyó ''ruined'' por ''destroyed'' para κατέφθειραν y mantuvo la fuerza de ''enslaved to them'' para ἐδούλωσαν αὐτοῖς. La puntuación en español refleja ese mismo encadenamiento: primera cláusula con continuidad temporal y segunda con enumeración y resultado.'
  spanish_consistency_notes:
  - Se mantiene "esclavizaron" para la familia δουλόω en vez de suavizarla con "sometieron".
  - Se usa "Yahvé" como norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - '"Hasta este día" se conserva como idiomatismo temporal, con nota alternativa para la variante natural "hasta este día".'
  - '"Los destruyeron" se alinea con la revisión inglesa más reciente del POB y evita la ambigüedad de "arruinaron".'
