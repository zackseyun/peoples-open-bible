translation:
  language: es
  text: Y cuando estas señales te vengan, haz lo que tu mano halle que hacer[a], porque Dios está contigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo que esté a tu alcance hacer». El hebreo dice literalmente: «lo que tu mano halle».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה כִּי
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y sucederá que cuando
  - Y será que cuando
  lexicon: HALOT
  rationale: La construcción introduce una circunstancia futura. En español, «Y cuando» conserva la relación temporal de manera natural y sobria sin forzar una fórmula arcaica.
- source_word: תבאינה
  english_pob_choice: come
  chosen_spanish: sucedan
  alternatives_spanish:
  - vengan
  - lleguen
  - acontezcan
  lexicon: HALOT
  rationale: Con «señales», el verbo hebreo expresa la llegada o realización de esos signos. «Sucedan» preserva el valor resultativo/eventual sin sonar mecánico; evita personificar demasiado las señales.
- source_word: הָאֹתוֹת הָאֵלֶּה
  english_pob_choice: these signs
  chosen_spanish: estas señales
  alternatives_spanish:
  - estos signos
  - estas señales estas
  - estos indicios
  lexicon: HALOT
  rationale: אות suele referirse a una señal portentosa o confirmatoria. «Señales» es el equivalente más claro y bíblicamente reconocible en español moderno.
- source_word: לָךְ
  english_pob_choice: to you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  - para ti
  lexicon: HALOT
  rationale: El sufijo pronominal apunta a la persona interpelada; en español el clítico «te» expresa con naturalidad la dirección del evento hacia Saúl.
- source_word: עֲשֵׂה
  english_pob_choice: do
  chosen_spanish: haz
  alternatives_spanish:
  - obra
  - actúa
  lexicon: HALOT
  rationale: El imperativo simple pide acción. «Haz» es directo y fiel al tono exhortativo del hebreo.
- source_word: לְךָ
  english_pob_choice: for yourself
  chosen_spanish: —
  alternatives_spanish:
  - para ti
  - por tu cuenta
  lexicon: HALOT
  rationale: Aunque el hebreo añade un matiz personal/reflexivo, el audit trail inglés revisado eliminó «for yourself» por sonar innecesario. En español también se omite para evitar una redundancia no exigida por el contexto.
- source_word: אֲשֶׁר תִּמְצָא יָדֶךָ
  english_pob_choice: whatever your hand finds to do
  chosen_spanish: lo que tu mano halle que hacer
  alternatives_spanish:
  - lo que tu mano encuentre que hacer
  - todo cuanto esté a tu alcance
  - lo que tus manos alcancen a hacer
  lexicon: HALOT
  rationale: Se conserva el idiomático «tu mano halle» para reflejar la imagen hebrea de aquello que está al alcance o en capacidad de Saúl. Se evita explicitar de más la interpretación de poder/capacidad, para no borrar la tensión léxica del hebreo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón del mandato. «Porque» expresa de forma clara y natural la relación causal.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: HALOT
  rationale: Aunque el hebreo lleva artículo, en este contexto la referencia es inequívoca al Dios de Israel. «Dios» comunica mejor la fuerza teológica sin calco artificial.
- source_word: עִמָּךְ
  english_pob_choice: is with you
  chosen_spanish: está contigo
  alternatives_spanish:
  - está con tú
  - está a tu lado
  lexicon: HALOT
  rationale: La frase expresa presencia y apoyo divinos. «Está contigo» es la formulación española más natural y fiel.
theological_decisions:
- issue: Presencia divina afirmada al final de la instrucción
  english_pob_reading: for God is with you
  chosen_spanish_reading: porque Dios está contigo
  alternative_spanish_readings:
  - pues Dios está contigo
  - porque el Dios está contigo
  rationale: Se mantiene la afirmación de presencia divina como motivo para la acción de Saúl. No se añade énfasis doctrinal extra; solo se conserva la garantía de acompañamiento divino que fundamenta el mandato.
  doctrine_reference: Presencia y asistencia de Dios en el llamamiento y la misión
- issue: Valor del hebraísmo de la mano
  english_pob_reading: whatever your hand finds to do
  chosen_spanish_reading: lo que tu mano halle que hacer
  alternative_spanish_readings:
  - lo que esté a tu alcance
  - lo que puedas hacer
  rationale: Se preserva el hebraísmo en vez de reemplazarlo por una paráfrasis totalmente explicativa. Así se mantiene la tensión entre imagen corporal y sentido de capacidad/oportunidad, tal como el texto y la nota inglesa la documentan.
  doctrine_reference: Fidelidad al lenguaje figurado del texto bíblico
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó «for yourself» por considerarlo innecesario y algo torpe; por eso el español también evita una explicitación reflexiva. Se conservó la imagen idiomática de «tu mano halle» como equivalente al inglés auditado, con una nota alternativa para el valor semántico de alcance o capacidad.
  spanish_consistency_notes:
  - Se usó «señales» para אותות, en armonía con el valor portentoso del término.
  - Se mantuvo «Dios» sin artículo, conforme al uso español para la referencia definida al Dios de Israel.
  - Se evitó «Cristo», «SEÑOR» u otras sustituciones no presentes en el original.
  - La puntuación y el registro buscan ser bíblicos y publicables en español moderno, sin arcaísmo excesivo.
