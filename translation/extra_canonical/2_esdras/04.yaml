  edition: Bensly 1895 (Texts and Studies III.2) + Bensly 1875 Missing Fragment, cleaned Latin
  text: '1 Et respondit ad me angelus, qui missus est ad me, cui nomen Vriel,

    2 Et dixit mihi : excedens excessit cor tuum in saeculo hoc, et comprehendere cogitas uiam altissimi?

    3 Et dixi ; ita, dominus meus. et respondit mihi et dixit : tres uias missus sum ostendere tibi, et tres similitudines proponere coram te ;

    4 De quibus si mihi renunciaueris unam ex his, et ego tibi demonstrabo uiam quam desideras uidere, et doceam te quare cor malignum.

    5 Et dixi : loquere, dominus meus. et dixit ad me : uade, pondera mihi ignis pondus, aut mensura mihi satum uenti, aut reuoca mihi diem quae praeteriit.

    6 Et respondi et dixi : quis natorum poterit hoc facere, ut me interroges de his ?

    7 Et dixit ad me : si eram interrogans te dicens : quantae habitationes sunt in corde maris, aut quantae uenae sunt in principio abyssi, aut quantae uiae sunt super firmamentum, aut qui sunt exitus paradisi ;

    8 Dicebas fortassis mihi : in abyssum non descendi, neque in infernum adhuc, neque in caelis unquam ascendi.

    9 Nunc autem non interrogaui te nisi de igne et uento et die, per quae transisti, et sine quibus esse non potes, et non respondisti mihi de eis.

    10 tecum coaſdulescentia non potes cognoſcere, Et quomodo poterit

    11 uas tuum capere altissimi uiam, et iam exteritus corrupto saeculo intelligere incorruptionem? et cum haec audissem, cecidi in faciem meam, Et dixi illi: melius erat nos non adesse,

    12 quam aduenientes uiuere in impietatibus, et pati et non intelligere de qua re. Et respondit ad me et dixit: proficiscens

    13 profectus sum ad siluam lignorum campi, et cogitauerunt cogitationem, Et dixerunt: uenite et eamus et faciamus ad

    14 mare bellum, ut recedat coram nos, et faciamus nobis alias siluas. Et similiter fluctus maris et ipsi cogitauerunt cogita-

    15 tionem et dixerunt: uenite ascendentes debellemus siluam campi, ut et ibi consum[memus] nobismetipsis aliam regionem. Et factus est cogitatus siluae in uano, uenit enim ignis et con-

    16 sumpsit eam; Similiter et cogitatus fluctuum maris, stetit enim

    17 harena et prohibuit eos. Si enim eras iudex horum, quem

    18 incipiebas iustificare, aut quem condemnare? Et respondi et

    19 dixi: utrique uanam cogitationem cogitauerunt, terra enim data est siluae, et maris locus portare fluctus suos. Et respondit

    20 ad me et dixit: bene tu iudicasti, et quare non iudicasti tibi

    21 metipso? Quemadmodum enim terra siluae data est et mare fluctibus suis, sic et qui super terram inhabitant quae sunt super terram intellegere solummodo possunt, et qui super caelos

    22 quae super altitudinem caelorum. Et respondi et dixi: deprecor te, domine, ut quid mihi datus est sensus intellegendi?

    23 Non enim uolui interrogare de superioribus uiis, sed de his quae pertranseunt per nos cotidie: propter quod, Israel datus est in obprobrium gentibus, quem dilexisti populum datus est tribubus impiis, et lex patrum nostrorum in inritum deducta

    24 est, et dispositionis scriptae nusquam sunt. Et pertransimus de saeculo ut locustae, et uita nostra ut uapor, et nec digni sumus,

    25 misericordiam consequi. Sed quid faciet nomini suo quod

    26 inuocatum est super nos? de his interrogaui. Et respondit ad me et dixit: si fueris uidebis, et si uixeris frequenter miraberis,

    27 quoniam festinans festinat saeculum pertransire; Non enim capiet portare quae in temporibus iustis repromissa sunt, quoniam plenum mesticia est saeculum hoc et infirmitatibus.

    28 Seminatum est enim malum, de quo me interrogas de eo, et necdum uenit destrictio ipsius. Si ergo non messum fuerit

    29 quod seminatum est, et discesserit locus ubi seminatum est malum, non ueniet ager ubi seminatum est bonum. Quoniam

    30 granum seminis mali seminatum est in corde Adam ab initio, et quantum impietatis generauit usque nunc et generabit usque cum ueniat area. Aestima autem apud te granum mali

    31 seminis quantum fructum impietatis generauerit. Quando

    32 seminatae fuerint spicae quarum non est numerus, quam magnam aream incipient facere! Et respondit et dixi: usque-

    33 quo et quando haec? quare modici et mali anni nostri? Et

    34 respondit ad me et dixit: non festinas tu super altissimum, tu enim festinas propter temetipsum, nam excelsus pro multis. Nonne de his interrogauerunt animae iustorum in promptuariis

    35 suis dicentes, usquequo spero sic? et quando uenit fructus areae mercedis nostrae? Et respondit ad eas Hieremiel

    36 archangelus et dixit: quando impletus fuerit numerus similium uobis, quoniam in statera ponderauit saeculum, Et mensura

    37 mensurauit tempora, et numero numerauit tempora, et non commouebit nec excitabit usque dum impleatur praedicta

    38 mensura. Et respondi et dixi: O dominator domine, sed et

    39 nos omnes pleni sumus impietatem. Et ne forte propter nos prohibeatur iustorum area, propter peccata inhabitantium

    40 super terram. Et respondit ad me et dixit: uade et interroga praegnantem, si quando impleuerit nouem menses suos adhuc

    41 poterit matrix eius retinere foetum in semetipsa. Et dixi: non potest, domine, et dixit ad me: in inferno prumptuaria

    42 animarum matrici adsimilata sunt. Quemadmodum enim festinabit quae parit effugere necessitatem partus, sic et haec

    43 festinant reddere ea quae commendata sunt ab initio. Tunc tibi demonstrabitur de his, quae concupiscis uidere.

    44 Et respondi et dixi: si inueni gratiam ante oculos tuos, et si

    45 possibile est, et si idoneus sum, Demonstra mihi et hoc, si plus quam praeteriit habet uenire, aut plura pertransierunt super

    46 nos; Quoniam quod pertransiuit scio, quid autem futurum sit

    47 ignoro. Et dixit ad me: sta super dexteram partem et

    48 demonstrabo tibi interpretationem similitudinis. Et steti et uidi, et ecce fornax ardens transiit coram me, et factum est cum

    49 transisset flamma et uidi et ecce superauit fumus. Et post hoc transiit coram me nubs plena aquae et inmisit pluuiam impetu multam, et cum transisset impetus pluuiae superauerunt in ea guttae. Et dixit ad me ; cogita tibi ; sicut enim crescit pluuia amplius quam guttae et ignis amplius quam fumus, sic superhabundauit quae transiuit mensura, superauerunt autem guttae et fumus. Et oraui et dixi : putas uiuo usque in diebus illis ? uel quis erit in diebus illis ? Respondit ad me et dixit : de signis de quibus me interrogas, ex parte possum tibi dicere, de uita autem tua non sum missus dicere tibi, sed nescio.

    50 et dixit ad me: cogita tibi. sicut enim crescit pluvia amplius quam guttae, et ignis amplius quam fumus, sic superabundavit quae transivit mensura, superaverunt autem guttae et fumus.

    51 et oravi et dixi: putas vivo usque in diebus illis, vel quiserit in diebus illis? respondit ad me et dixit: de signis de quibus me

    52 perrogas, ex parte possum tibi dicere, de vita autem tua non sum missus dicere tibi, sed nescio.'
