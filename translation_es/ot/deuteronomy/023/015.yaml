base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/023/015.yaml
  text: For Yahweh your God walks in the midst of your camp to deliver you and to give your enemies before you[a]. Therefore your camp must be holy[c][b], so that he may not see in you anything indecent and turn away from you.
  footnotes:
  - marker: a
    text: Or, more literally, 'to give your enemies before you.' The Hebrew idiom means to hand them over into your power.
    reason: lexical_alternative
  - marker: b
    text: Or 'some indecent matter.' The Hebrew expression is broad and can refer to anything shameful or unclean that would defile the camp.
    reason: lexical_alternative
  - marker: c
    text: Or 'turn away from you.' More literally, 'turn back from behind you,' picturing the LORD no longer accompanying the camp.
    reason: lexical_alternative
