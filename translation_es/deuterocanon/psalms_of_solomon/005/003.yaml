translation:
  language: es
  text: Pero si clamo a ti[a], no guardes silencio ante mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: “si he clamado a ti, no pases sobre mí en silencio”.'
