translation:
  language: es
  text: Porque yo conozco[a] sus obras y sus pensamientos. Se acerca el tiempo de reunir a todas las naciones y lenguas[b], y vendrán y verán mi gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo aquí es abrupto y difícil. También puede entenderse con un sentido más literal como: «Y yo, sus obras y sus pensamientos, vengo a reunir a todas las naciones y las lenguas».'
    reason: alternative_reading
  - marker: b
    text: O «idiomas». El hebreo dice literalmente «lenguas», en referencia a grupos definidos por su lengua.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָנֹכִי
  english_pob_choice: For I / And I
  chosen_spanish: Porque yo
  alternatives_spanish:
  - Y yo
  - Pues yo
  lexicon: HALOT
  rationale: אָנֹכִי conserva el énfasis de la primera persona; en español, «yo» expresa ese énfasis de forma natural. «Porque» refleja la lectura contextual adoptada por la revisión inglesa («For I know…») sin perder la conexión discursiva con el verso anterior.
- source_word: מַעֲשֵׂיהֶם
  english_pob_choice: their works
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus obras
  - sus hechos
  lexicon: HALOT
  rationale: «Obras» reproduce bien el campo semántico de מעשה y mantiene el paralelo con «pensamientos». «Hechos» es posible, pero «obras» conserva mejor la formulación bíblica y la amplitud moral del término.
- source_word: וּמַחְשְׁבֹתֵיהֶם
  english_pob_choice: their thoughts
  chosen_spanish: sus pensamientos
  alternatives_spanish:
  - sus pensamientos
  - sus planes
  - sus intenciones
  lexicon: HALOT
  rationale: «Pensamientos» es el equivalente más directo y amplio para מחשבות. Se evita reducirlo a «planes» o «intenciones», porque el contexto de conocimiento/divino juicio admite una referencia más general a la interioridad.
- source_word: בָּאָה
  english_pob_choice: The time is coming / am coming
  chosen_spanish: Viene el tiempo
  alternatives_spanish:
  - Está llegando el tiempo
  - Llega el tiempo
  lexicon: HALOT
  rationale: El hebreo es sintácticamente abrupto; la revisión inglesa lo suaviza con «The time is coming». En español, «Viene el tiempo» mantiene ese ajuste interpretativo sin añadir demasiado, y prepara naturalmente el infinitivo «de reunir».
- source_word: לְקַבֵּץ
  english_pob_choice: to gather
  chosen_spanish: reunir
  alternatives_spanish:
  - juntar
  - convocar
  lexicon: HALOT
  rationale: «Reunir» comunica con claridad la acción de קבץ en un registro bíblico sobrio. «Juntar» suena más coloquial, y «convocar» introduce una implicación más formal o jurídica que el hebreo no exige.
- source_word: כָּל־הַגּוֹיִם
  english_pob_choice: all the nations
  chosen_spanish: a todas las naciones
  alternatives_spanish:
  - a todos los pueblos
  - a todas las naciones
  lexicon: HALOT
  rationale: «Naciones» preserva el alcance internacional de גוים sin trasladarlo al marco más técnico de «gentiles». El complemento con «a» corresponde a la construcción española con verbos de reunión.
- source_word: וְהַלְּשֹׁנוֹת
  english_pob_choice: and tongues
  chosen_spanish: y lenguas
  alternatives_spanish:
  - y idiomas
  - y lenguajes
  lexicon: HALOT
  rationale: La POB inglesa conserva «tongues»; en español, «lenguas» mantiene ese paralelismo literal y sigue siendo inteligible. «Idiomas» aclara el sentido, pero pierde la textura bíblica de la expresión.
- source_word: וּבָאוּ
  english_pob_choice: they will come
  chosen_spanish: vendrán
  alternatives_spanish:
  - y vendrán
  - y vendrán ellos
  lexicon: HALOT
  rationale: El verbo expresa una llegada futura dentro de la secuencia profética. «Vendrán» es natural en español y evita la redundancia innecesaria del sujeto, ya implícito en el verbo.
- source_word: וְרָאוּ
  english_pob_choice: and see
  chosen_spanish: verán
  alternatives_spanish:
  - y verán
  - y contemplarán
  lexicon: HALOT
  rationale: «Verán» traduce de manera directa ראה. «Contemplarán» sería más interpretativo y más elevado de lo que el hebreo exige.
- source_word: כְּבוֹדִי
  english_pob_choice: my glory
  chosen_spanish: mi gloria
  alternatives_spanish:
  - mi gloria
  - mi esplendor
  - mi honor
  lexicon: HALOT
  rationale: «Gloria» conserva el peso teológico de כבוד en Isaías y su resonancia como manifestación visible de la presencia divina. «Esplendor» o «honor» pueden ser contextualmente válidos, pero aquí estrechan o desplazan el valor bíblico del término.
theological_decisions:
- issue: Cómo resolver el inicio abrupto del versículo sin borrar la tensión del hebreo
  english_pob_reading: 'The text is difficult; the English POB chooses a smooth sense: ''For I know their works and their thoughts. The time is coming to gather all the nations and tongues.'''
  chosen_spanish_reading: «Porque yo conozco sus obras y sus pensamientos. Viene el tiempo de reunir a todas las naciones y lenguas.»
  alternative_spanish_readings:
  - «Y yo, sus obras y sus pensamientos, vengo a reunir…»
  - «Porque sus obras y sus pensamientos… viene el tiempo de reunir…»
  rationale: 'El hebreo es elíptico y la revisión inglesa ya opta por una lectura interpretativa. En español se sigue esa decisión para producir un texto publicable y claro, pero sin perder el carácter difícil del original: por eso se mantiene una formulación sobria y se deja constancia de la alternativa más literal en nota.'
  doctrine_reference: Preservar la dificultad del texto sin forzar una reconstrucción innecesaria
- issue: Cómo rendir הַגּוֹיִם y הַלְּשׁוֹנוֹת en un contexto de alcance universal
  english_pob_reading: all the nations and tongues
  chosen_spanish_reading: todas las naciones y lenguas
  alternative_spanish_readings:
  - todos los pueblos y idiomas
  - todas las naciones y idiomas
  rationale: «Naciones» conserva la referencia internacional sin replantearla como categorías eclesiásticas. «Lenguas» mantiene el paralelismo hebreo con «naciones» y puede abarcar grupos humanos definidos por idioma, tal como sugiere el original.
  doctrine_reference: Universalidad de la convocatoria divina sin anular la textura étnico-lingüística del hebreo
translation_notes:
  revision_awareness: Tomé como punto de partida la revisión inglesa más reciente, que reemplaza la construcción abrupta por una lectura interpretativa clara («For I know their works and their thoughts. The time is coming…»). En español, opté por reflejar esa misma interpretación para producir una línea fluida y publicable, pero manteniendo la nota sobre la dificultad del hebreo y la posibilidad de una lectura más literal. También conservé el paralelismo entre «naciones» y «lenguas», y la clausula final con el valor de gloria divina.
  spanish_consistency_notes:
  - «Yahvé» no aparece en este versículo.
  - Se mantuvo «naciones» en lugar de «gentiles» para conservar el alcance universal del hebreo.
  - «Lenguas» sigue la imagen bíblica del texto fuente; se aclara con nota que puede equivaler a «idiomas».
  - «Gloria» se conserva por su peso teológico en Isaías y por coherencia con el POB inglés.
