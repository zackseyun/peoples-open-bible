id: JOS.19.51
reference: Joshua 19:51
source:
  edition: WLC
  text: אֵ֣לֶּה הַ/נְּחָלֹ֡ת אֲשֶׁ֣ר נִחֲל֣וּ אֶלְעָזָ֣ר הַ/כֹּהֵ֣ן וִ/יהוֹשֻׁ֪עַ בִּן נ֟וּן וְ/רָאשֵׁ֣י הָֽ/אָב֣וֹת לְ/מַטּוֹת֩ בְּנֵי יִשְׂרָאֵ֨ל בְּ/גוֹרָ֤ל בְּ/שִׁלֹה֙ לִ/פְנֵ֣י יְהוָ֔ה פֶּ֖תַח אֹ֣הֶל מוֹעֵ֑ד וַ/יְכַלּ֕וּ מֵֽ/חַלֵּ֖ק אֶת הָ/אָֽרֶץ׀־־׀׀־׃פ
translation:
  text: These are the inheritances that Eleazar the priest[a], Joshua son of Nun, and the heads of the fathers’ houses of the tribes of the sons of Israel apportioned by lot at Shiloh before Yahweh, at the entrance of the tent of meeting. So they finished dividing the land.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''the sons of Israel''; many English versions simplify this to ''Israel'' or ''the Israelites.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנְּחָלֹת
  chosen: the inheritances
  alternatives:
  - the portions
  - the allotments
  lexicon: HALOT
  rationale: נַחֲלָה commonly denotes an inherited possession or allotted inheritance. Here it refers to the tribal land portions distributed in Joshua, so 'inheritances' preserves both the legal and covenantal sense better than the flatter 'portions.'
- source_word: נִחֲלוּ
  chosen: assigned
  alternatives:
  - apportioned
  - allotted
  - distributed
  lexicon: HALOT
  rationale: The Niphal of נחל in this context refers to causing the inheritances to be received/allocated. English 'assigned' communicates the administrative action performed by Eleazar, Joshua, and the leaders, while fitting naturally with the object 'inheritances.'
- source_word: אֶלְעָזָר הַכֹּהֵן
  chosen: Eleazar the priest
  lexicon: HALOT
  rationale: Straightforward title-plus-name construction; 'the priest' is the natural rendering of הַכֹּהֵן.
- source_word: וְרָאשֵׁי הָאָבוֹת
  chosen: the heads of the fathers’ houses
  alternatives:
  - the heads of the ancestral houses
  - the family heads
  lexicon: HALOT
  rationale: This phrase refers to clan or household heads. 'Fathers’ houses' preserves the Hebrew social structure more transparently than a fully flattened dynamic rendering, while remaining understandable in English.
- source_word: לְמַטּוֹת בְּנֵי יִשְׂרָאֵל
  chosen: of the tribes of the sons of Israel
  alternatives:
  - of the tribes of Israel
  - for the tribes of the Israelites
  lexicon: HALOT
  rationale: מַטּוֹת here means 'tribes.' בְּנֵי יִשְׂרָאֵל is rendered more formally as 'the sons of Israel' to reflect the Hebrew expression and maintain gender-accurate translation philosophy, though idiomatic English could shorten it to 'Israel.'
- source_word: בְּגוֹרָל
  chosen: by lot
  alternatives:
  - by casting lots
  lexicon: HALOT
  rationale: This is the standard idiomatic rendering for allocation through lots. It is concise and faithful.
- source_word: בְּשִׁלֹה
  chosen: at Shiloh
  alternatives:
  - in Shiloh
  lexicon: HALOT
  rationale: English idiom prefers 'at Shiloh' for a named cultic location in this narrative setting.
- source_word: לִפְנֵי יְהוָה
  chosen: before the LORD
  alternatives:
  - in the presence of the LORD
  lexicon: HALOT
  rationale: The phrase denotes covenantal presence before God. Per doctrine, יְהוָה is rendered 'the LORD.' 'Before the LORD' is the standard and sufficiently transparent rendering.
- source_word: פֶּתַח אֹהֶל מוֹעֵד
  chosen: at the entrance of the tent of meeting
  alternatives:
  - at the doorway of the tent of meeting
  lexicon: HALOT
  rationale: פֶּתַח is 'entrance/opening.' 'Tent of meeting' is the established transparent rendering of אֹהֶל מוֹעֵד.
- source_word: וַיְכַלּוּ
  chosen: So they finished
  alternatives:
  - And they finished
  - Thus they completed
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'So they finished' gives natural English flow while preserving the resultative sense.
- source_word: מֵחַלֵּק אֶת הָאָרֶץ
  chosen: dividing the land
  alternatives:
  - apportioning the land
  - distributing the land
  lexicon: HALOT
  rationale: The infinitive from חלק here refers to the process of dividing/apportioning the land among the tribes. 'Dividing the land' is clear, natural, and contextually precise.
