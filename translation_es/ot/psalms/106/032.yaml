translation:
  language: es
  text: Ellos provocaron ira en las aguas de Meribá[a][b], y le fue mal a Moisés por causa de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Meribá significa «contienda» o «disputa».
    reason: cultural_note
  - marker: b
    text: 'O: «Ellos los irritaron en las aguas de Meribá». El hebreo no declara explícitamente el objeto de la provocación en esta línea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְצִיפוּ
  english_pob_choice: They provoked anger
  chosen_spanish: provocaron ira
  alternatives_spanish:
  - lo irritaron
  - provocaron enojo
  - desataron ira
  lexicon: HALOT
  rationale: El causativo de קצף expresa que el pueblo hizo surgir ira. «Provocaron ira» conserva ese valor causativo sin añadir un objeto explícito que el hebreo no dice.
- source_word: עַל
  english_pob_choice: at
  chosen_spanish: junto a
  alternatives_spanish:
  - en
  - junto con
  - sobre
  lexicon: HALOT
  rationale: En español, «junto a» funciona naturalmente con un lugar/escena y evita una traducción rígida de la preposición. Mantiene la referencia al episodio en las aguas de Meribá.
- source_word: מֵי מְרִיבָה
  english_pob_choice: the waters of Meribah
  chosen_spanish: las aguas de Meribá
  alternatives_spanish:
  - las aguas de la contienda
  - las aguas de la riña
  - las aguas de Meribah
  lexicon: HALOT
  rationale: Meribá es nombre propio de lugar y se translitera. «Aguas» reproduce el constructo hebreo de modo directo y natural en español.
- source_word: וַיֵּרַע
  english_pob_choice: it went badly
  chosen_spanish: le fue mal
  alternatives_spanish:
  - le sobrevino mal
  - hubo mal para él
  - le resultó adverso
  lexicon: HALOT
  rationale: El verbo impersonal expresa un resultado adverso. «Le fue mal» es una equivalencia idiomática breve y fiel en español, sin insinuar más de lo que el verso afirma.
- source_word: לְמֹשֶׁה
  english_pob_choice: for Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - para Moisés
  - en Moisés
  lexicon: HALOT
  rationale: Con la expresión impersonal española «le fue mal», el dativo se expresa naturalmente con «a Moisés», manteniendo a Moisés como el afectado.
- source_word: בַּעֲבוּרָם
  english_pob_choice: because of them
  chosen_spanish: por causa de ellos
  alternatives_spanish:
  - a causa de ellos
  - debido a ellos
  - por ellos
  lexicon: HALOT
  rationale: La preposición indica causalidad. «Por causa de ellos» es clara y conserva el sentido de responsabilidad causal del pueblo en el desenlace negativo.
theological_decisions:
- issue: Objeto de la provocación y alcance del juicio narrado
  english_pob_reading: The verse states that the people's provocation resulted in a bad outcome for Moses, without specifying in this line the full theological explanation.
  chosen_spanish_reading: El verso afirma que el pueblo provocó ira y que a Moisés le fue mal por causa de ellos, sin precisar aquí toda la explicación teológica del episodio.
  alternative_spanish_readings:
  - El pueblo enfureció a Yahvé en Meribá, y por eso Moisés sufrió las consecuencias.
  - El pueblo irritó a Moisés en Meribá, y a él le fue mal por ellos.
  rationale: El hebreo no explicita en esta línea quién es el objeto directo de la provocación; por eso la traducción mantiene la ambigüedad con «provocaron ira». También conserva el resultado adverso para Moisés sin resolver si el foco recae primariamente en la culpa del pueblo, en el fallo de Moisés, o en ambos. La tensión se deja para el contexto más amplio.
  doctrine_reference: Preservar la tensión teológica sin resolverla prematuramente.
translation_notes:
  revision_awareness: 'Alineado con la última revisión sin cambios: se conserva la ambigüedad del hebreo sobre el objeto de la provocación, se mantiene la causalidad de בַּעֲבוּרָם, y se evita resolver el pasaje con lenguaje interpretativo adicional.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí no aparece el nombre divino.
  - «Meribá» se translitera de forma consistente como nombre propio.
  - «Provocaron ira» conserva la fuerza causativa del hebreo sin introducir un sujeto/objeto no explicitado.
  - «Le fue mal» mantiene el valor impersonal de וַיֵּרַע en español contemporáneo.
