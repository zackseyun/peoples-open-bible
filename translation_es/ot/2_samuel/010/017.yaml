review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia narrativa hebrea: informe a David, reunión de todo Israel, cruce del Jordán, llegada a Helam, despliegue militar de Aram y combate. Sin embargo, hay un desajuste gramatical importante: el sujeto de וַיַּעַרְכוּ ... וַיִּלָּחֲמוּ es plural en hebreo aunque אֲרָם sea colectivo; en español, tras «Aram se dispuso», «y peleó» rompe la concordancia y suena menos natural. Además, «Cuando se informó a David» es comprensible, pero «Cuando se le informó a David» preserva mejor la impersonalidad y suena más idiomático.'
  spanish_quality_summary: El español es claro y de registro digno. Las decisiones «reunió a todo Israel», «cruzó el Jordán» y «llegó a Helam» son buenas. Conviene ajustar la primera cláusula para mayor naturalidad y cambiar el verbo final a plural para concordar con el colectivo «Aram» entendido como tropas arameas. También es preferible «combatieron con él» frente a «peleó con él», porque combina mejor con el sujeto colectivo y mantiene la nota aclaratoria sobre el modismo hostil.
  glossary_alignment: No hay términos del glosario mayor en juego. «Aram» se conserva conforme al hebreo y al POB inglés. No hay conflictos teológicos ni terminológicos de proyecto.
  issues:
  - severity: medium
    issue: La cláusula inicial «Cuando se informó a David» suena menos idiomática en español que «Cuando se le informó a David».
    rationale: El hebreo usa una pasiva impersonal sin agente. En español, el dativo explícito mejora la naturalidad y evita una lectura en que David fuera quien informó.
  - severity: high
    issue: «Aram ... y peleó con él» presenta discordancia de número y debilita la representación del verbo hebreo plural.
    rationale: 'Los verbos וַיַּעַרְכוּ y וַיִּלָּחֲמוּ están en plural. Aunque «Aram» puede mantenerse como colectivo singular, en español la segunda acción debe concordar mejor con el sentido colectivo: «combatieron con él» o reestructurarse con «los arameos». Dado que el proyecto retiene «Aram», lo mejor es ajustar el segundo verbo.'
  - severity: low
    issue: «Peleó con él» es algo coloquial y ambiguo en español moderno.
    rationale: La nota resuelve la ambigüedad, pero «combatieron con él» mantiene mejor el tono bíblico-literario y el contexto militar.
  revised_spanish_text: Cuando se le informó a David, reunió a todo Israel, cruzó el Jordán y llegó a Helam. Entonces Aram se dispuso en formación de batalla para salir al encuentro de David y combatieron con él[a].
  revised_footnotes:
  - marker: a
    text: O «y combatieron contra él». El hebreo dice literalmente «combatieron con él», un modismo para indicar combate contra un adversario.
    reason: lexical_alternative
  revision_rationale: 'Se hicieron reparaciones menores para mejorar la naturalidad del español y la fidelidad gramatical al hebreo sin alterar el sentido ni la línea del POB inglés: se añadió el dativo en «se le informó a David» y se ajustó el verbo final a plural semántico/colectivo con «combatieron con él», manteniendo «Aram» y la nota sobre el modismo hebreo.'
