  glossary_alignment: No hay conflictos mayores con la terminología base. 'Aleluya' es una buena forma española de ἀλληλουιά. El pronombre para αὐτόν debe seguir implícito en el texto principal, con nota que aclare que probablemente se refiere a Dios. 'Se retiraron' es aceptable para ἀνέλυσαν, pero no requiere nota aquí.
