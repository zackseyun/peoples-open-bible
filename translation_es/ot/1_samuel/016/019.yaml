translation:
  language: es
  text: 'Entonces Saúl envió mensajeros a Isaí y dijo[a]: «Mándame a tu hijo David, que está con el rebaño».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que está entre el rebaño».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: El wayyiqtol de שׁלח expresa una acción narrativa simple. «Envió» es la equivalencia natural en español y conserva el valor de acción pasada sin añadir matiz administrativo que «despachó» podría sugerir.
- source_word: מַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - enviados
  - embajadores
  lexicon: HALOT
  rationale: En contexto humano, מַלְאָכִים significa «mensajeros». «Mensajeros» es transparente en español y evita cargar el término con un rango diplomático que el hebreo no exige.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición marca dirección hacia Isaí; en español, «a» es la equivalencia directa y natural.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - le dijo
  lexicon: HALOT
  rationale: El verbo אמר introduce el discurso directo. «Dijo» mantiene la estructura narrativa y la introducción de cita de manera sobria y fiel.
- source_word: שִׁלְחָה
  english_pob_choice: Send
  chosen_spanish: Mándame
  alternatives_spanish:
  - Envíame
  - Manda a mí
  lexicon: HALOT
  rationale: Es un imperativo dirigido a Isaí. «Mándame» comunica con naturalidad la petición urgente y conserva el valor imperativo; «envíame» sería igualmente posible, pero en español suena un poco más neutro en una solicitud de este tipo.
- source_word: אֵלַי
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: HALOT
  rationale: Después de un imperativo de envío, «me» es idiomático en español y preserva la función de dativo/objeto indirecto sin pesadez.
- source_word: אֶת דָּוִד
  english_pob_choice: your son David
  chosen_spanish: a tu hijo David
  alternatives_spanish:
  - a David, tu hijo
  lexicon: HALOT
  rationale: El marcador objeto directo no se traduce; el hebreo presenta a David como el hijo de Isaí. «A tu hijo David» reproduce la apposición de forma natural en español.
- source_word: בִּנְךָ
  english_pob_choice: your son
  chosen_spanish: tu hijo
  alternatives_spanish:
  - tu muchacho
  lexicon: HALOT
  rationale: בן con sufijo posesivo identifica a David relacionalmente como hijo de Isaí. «Tu hijo» es la traducción directa y clara.
- source_word: אֲשֶׁר בַּצֹּאן
  english_pob_choice: who is with the flock
  chosen_spanish: que está con el rebaño
  alternatives_spanish:
  - que está entre el rebaño
  - que está con las ovejas
  lexicon: HALOT
  rationale: El hebreo literalmente puede leerse como «en/entre/con el rebaño». La revisión inglesa prefirió «with the flock»; en español, «con el rebaño» o «está con el rebaño» conserva esa decisión y suena natural, sin precisar más de lo que el texto permite.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada de «with the sheep» a «with the flock» para reflejar mejor בַּצֹּאן sin sobrerinterpretar la espacialidad. La propuesta española sigue esa revisión con «con el rebaño», manteniendo la apertura semántica del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija; este versículo no contiene el nombre divino.
  - «Mensajeros» conserva el sentido humano de מַלְאָכִים sin introducir formalidad diplomática adicional.
  - «Rebaño» sigue la revisión auditada de «flock» y evita restringir el sentido a solo ovejas.
  - La cita directa se conserva con puntuación española estándar y sin expansión interpretativa.
