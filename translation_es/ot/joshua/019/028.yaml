translation:
  language: es
  text: Ebrón[a], Rehob, Hamón y Kaná, hasta la gran Sidón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Ebrón»; algunas tradiciones textuales y traducciones leen «Abdón».'
    reason: textual_variant
lexical_decisions:
- source_word: עֶבְרֹן
  english_pob_choice: Ebron
  chosen_spanish: Ebrón
  alternatives_spanish:
  - Abdón
  lexicon: HALOT
  rationale: Se conserva el nombre propio como topónimo transliterado. La forma hebrea masorética favorece Ebrón; la alternativa Abdón se anota como tradición textual/identificación distinta, no como lectura principal.
- source_word: רְחֹב
  english_pob_choice: Rehob
  chosen_spanish: Rehob
  alternatives_spanish:
  - Rejob
  lexicon: HALOT
  rationale: Topónimo transliterado. En español, Rehob es legible y mantiene la forma habitual del nombre bíblico sin forzar una equivalencia semántica no indicada por el contexto.
- source_word: חַמּוֹן
  english_pob_choice: Hammon
  chosen_spanish: Hamón
  alternatives_spanish:
  - Jamón
  lexicon: HALOT
  rationale: Topónimo transliterado. Se adapta la acentuación al español para facilitar la lectura, sin alterar la identidad del nombre.
- source_word: קָנָה
  english_pob_choice: Kanah
  chosen_spanish: Caná
  alternatives_spanish:
  - Kaná
  lexicon: HALOT
  rationale: Topónimo transliterado. Se usa C inicial por la convención española para reflejar /k/ y porque resulta más natural en un nombre bíblico; se conserva la acentuación final para marcar el hiato/acentuación propia del nombre.
- source_word: עַד
  english_pob_choice: as far as
  chosen_spanish: hasta
  alternatives_spanish:
  - hasta el límite de
  - hasta llegar a
  lexicon: HALOT
  rationale: La preposición marca límite territorial. 'Hasta' transmite con naturalidad el alcance de frontera que expresa el hebreo y corresponde bien al valor auditable del inglés POB.
- source_word: צִידוֹן רַבָּה
  english_pob_choice: Great Sidon
  chosen_spanish: Sidón la Grande
  alternatives_spanish:
  - la gran Sidón
  - Sidón la grande
  lexicon: HALOT
  rationale: Se mantiene el valor descriptivo del epíteto y la colocación appositiva. 'Sidón la Grande' conserva la fuerza del hebreo/inglés POB sin invertir la referencia ni suavizar el matiz honorífico/geográfico.
translation_notes:
  revision_awareness: 'El texto sigue la lectura masorética del hebreo proporcionado y mantiene la misma resolución del audit trail inglés: transliteración de los topónimos, límite territorial con ''hasta'' y epíteto geográfico de Sidón como designación distintiva. No se aplicaron revisiones posteriores ni cambios sustantivos en la tradición textual base.'
  spanish_consistency_notes:
  - Se preserva la transliteración de los nombres propios en todo el verso.
  - Se evita 'SEÑOR' u otras equivalencias no pertinentes, porque el versículo es puramente geográfico.
  - La mayúscula en 'Sidón la Grande' sigue el uso de nombre propio + epíteto.
  - '''Hamón'' y ''Caná'' se adaptan a ortografía española sin perder la forma subyacente hebrea.'
