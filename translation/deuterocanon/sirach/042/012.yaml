theological_decisions:
- issue: Use of gender-specific language in a wisdom admonition
  chosen_reading: Retain 'man' and 'women' as gender-specific terms
  alternative_readings:
  - Retain 'male' and 'women' more formally
  - Use gender-neutral language such as 'people'
  rationale: The Hebrew is explicitly gendered (זכר; נשים), and the translation philosophy prefers gender-accurate renderings over neutralization. The verse addresses conduct in relation to men and women specifically, so the English should preserve that specificity.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Reconciling difficult Hebrew with Greek parallel
  chosen_reading: Translate primarily from the Hebrew while allowing the Greek to clarify the obscure final verb
  alternative_readings:
  - Follow the Hebrew more woodenly despite obscurity
  - Translate wholly from the Greek parallel
  rationale: For Sirach, surviving Hebrew is primary where extant, but the task instructions require the Greek parallel to be used as actual translation input. Here the Hebrew's final clause is lexically uncertain, and the Greek provides a stable sense ('do not sit/keep company among women'), which helps produce an auditable and defensible English rendering without abandoning the Hebrew base.
  doctrine_reference: PHILOSOPHY.md 'Original-language primacy' and Sirach source policy
