translation:
  language: es
  text: 'Preguntó a los hombres de su lugar, diciendo: «¿Dónde está la prostituta cultual[a] que estaba en Enaim[b], junto al camino?». Pero ellos dijeron: «No ha habido aquí ninguna prostituta cultual».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «prostituta del templo». El término hebreo se refiere a una prostituta asociada con práctica cultual; «prostituta cultual» es más amplio y evita implicar un edificio de templo específico.
    reason: lexical_alternative
  - marker: b
    text: Enaim es un nombre de lugar; la forma hebrea se relaciona con la palabra «ojos» o quizá con «fuentes».
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁאַל
  english_pob_choice: He asked
  chosen_spanish: Le preguntó
  alternatives_spanish:
  - Preguntó
  - Le hizo una pregunta
  lexicon: HALOT
  rationale: שׁאל en este contexto introduce una indagación narrativa normal; en español, «le preguntó» conserva el valor relacional del objeto indirecto implícito y suena natural sin perder el sentido de la acción.
- source_word: אַנְשֵׁי מְקֹמָהּ
  english_pob_choice: the men of her place
  chosen_spanish: los hombres de su lugar
  alternatives_spanish:
  - los hombres de aquel lugar
  - la gente de su lugar
  - los hombres del lugar
  lexicon: HALOT
  rationale: Se conserva la relación posesiva del hebreo con «su lugar», que refleja la forma 3fs del sufijo. «Los hombres de su lugar» mantiene el vínculo formal con el texto fuente mejor que suavizarlo demasiado a «los locales».
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - preguntando
  lexicon: HALOT
  rationale: El infinitivo introductorio se reproduce con la fórmula narrativa «diciendo», que mantiene la estructura del discurso directo sin añadir interpretación.
- source_word: אַיֵּה
  english_pob_choice: Where is
  chosen_spanish: ¿Dónde está... ?
  alternatives_spanish:
  - ¿Dónde se halla... ?
  - ¿Dónde queda... ?
  lexicon: HALOT
  rationale: La pregunta de ubicación se expresa de forma natural en español con «¿Dónde está...?», que preserva la fuerza interrogativa y evita un calco innecesario.
- source_word: הַקְּדֵשָׁה
  english_pob_choice: the cult prostitute
  chosen_spanish: la mujer dedicada al culto
  alternatives_spanish:
  - la prostituta cultual
  - la prostituta de culto
  - la prostituta sagrada
  lexicon: HALOT
  rationale: Se evita «templo prostituta» y también una formulación demasiado técnica o chocante para lectura pública. «Mujer dedicada al culto» intenta conservar la asociación cultual del término hebreo y su ambigüedad histórica, aunque es más suave que el original; por eso se documenta la alternativa más literal en nota.
- source_word: הִוא
  english_pob_choice: who was
  chosen_spanish: que estaba
  alternatives_spanish:
  - que era
  - quien estaba
  lexicon: HALOT
  rationale: El pronombre independiente se integra como relativa natural en español. «Que estaba» sigue el contexto locativo del hebreo sin convertirlo en una definición estática.
- source_word: בָעֵינַיִם
  english_pob_choice: at Enaim
  chosen_spanish: en Enaim
  alternatives_spanish:
  - en Enaim
  - junto a Enaim
  lexicon: HALOT
  rationale: Se translitera el topónimo conforme al uso del POB en inglés y a la inteligibilidad española. La forma no se traduce literalmente como «ojos» o «fuentes» porque aquí funciona como nombre de lugar.
- source_word: עַל הַדָּרֶךְ
  english_pob_choice: by the road
  chosen_spanish: junto al camino
  alternatives_spanish:
  - al borde del camino
  - junto a la ruta
  - por el camino
  lexicon: HALOT
  rationale: «Junto al camino» expresa adecuadamente la localización adyacente indicada por עַל + דרך, con un registro natural y claro en español.
- source_word: לֹא הָיְתָה בָזֶה קְדֵשָׁה
  english_pob_choice: There has been no cult prostitute here
  chosen_spanish: No ha habido aquí ninguna mujer dedicada al culto
  alternatives_spanish:
  - No hubo aquí ninguna prostituta cultual
  - Aquí no había ninguna mujer dedicada al culto
  - No ha estado aquí ninguna mujer dedicada al culto
  lexicon: HALOT
  rationale: El hebreo niega la presencia/existencia de esa figura en ese lugar. Se usa el perfecto compuesto español para reflejar la réplica en diálogo con valor actual y se conserva «aquí» para בָזֶה. La misma decisión de suavizar el tecnicismo se mantiene para coherencia interna.
theological_decisions:
- issue: Sentido del término קְדֵשָׁה (estatus cultual y carga sexual)
  english_pob_reading: the Hebrew term refers to a prostitute associated with cultic practice; 'cult prostitute' is broader and avoids implying a specific temple structure.
  chosen_spanish_reading: mujer dedicada al culto / prostituta cultual, con nota que explica la asociación cultual del término
  alternative_spanish_readings:
  - prostituta del templo
  - prostituta sagrada
  - prostituta cultual
  rationale: 'No hay necesidad de atenuar ni de especificar de más el trasfondo. El español principal busca ser publicable y comprensible, mientras la nota conserva la tensión lexical: el término hebreo apunta a una prostitución vinculada al culto, pero no obliga a pensar en un edificio de templo concreto.'
  doctrine_reference: Ninguna doctrina específica; decisión lexical-histórica sobre un término cultural del AT
translation_notes:
  revision_awareness: 'Se tomó en cuenta el alta concordancia del expediente inglés y la ausencia de revisiones aplicadas. La principal decisión de la versión española fue cómo rendir קְדֵשָׁה: se optó por una expresión comprensible y publicable, con nota que preserva la alternativa más literal y el matiz cultual del original.'
  spanish_consistency_notes:
  - Se mantuvo la transliteración Enaim para el topónimo, coherente con el tratamiento auditado en inglés.
  - Se conservó la relación posesiva de 'su lugar' para reflejar el sufijo hebreo femenino singular.
  - La fórmula de discurso directo sigue de cerca la sintaxis narrativa del hebreo sin caer en calco excesivo.
  - La nota a identifica la alternativa más literal para no borrar la tensión semántica del término קְדֵשָׁה.
