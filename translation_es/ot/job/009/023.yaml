translation:
  language: es
  text: Si un azote mata de repente, se burla de la calamidad[a] de los inocentes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se ríe de la prueba de los inocentes» o «se burla del deshacerse de los inocentes». El sustantivo hebreo puede denotar prueba o deshacerse/desfallecimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: La partícula introduce una condición o hipótesis; «Si» conserva con claridad esa fuerza directa sin convertirla en una afirmación temporal más interpretativa.
- source_word: שׁוֹט
  english_pob_choice: a scourge
  chosen_spanish: un azote
  alternatives_spanish:
  - un látigo
  - una plaga
  - un azote devastador
  lexicon: HALOT
  rationale: El sustantivo puede referirse a un látigo/azote y, por extensión, a una aflicción punitiva. «Azote» mantiene la imagen concreta y también funciona en español para calamidad o castigo severo.
- source_word: יָמִית
  english_pob_choice: kills
  chosen_spanish: mata
  alternatives_spanish:
  - da muerte
  - hiere de muerte
  - da muerte repentinamente
  lexicon: HALOT
  rationale: El hiphil de מות expresa causar la muerte. «Mata» es el equivalente moderno más natural y conserva la fuerza verbal directa del hebreo.
- source_word: פִּתְאֹם
  english_pob_choice: suddenly
  chosen_spanish: de repente
  alternatives_spanish:
  - súbitamente
  - en un instante
  lexicon: HALOT
  rationale: Adverbio de sorpresa e inmediatez. «De repente» es la forma más idiomática y clara en español.
- source_word: לְמַסַּת
  english_pob_choice: the calamity
  chosen_spanish: la calamidad
  alternatives_spanish:
  - la prueba
  - el desmoronamiento
  - la desdicha
  lexicon: HALOT
  rationale: El sustantivo derivado de מסס puede señalar prueba, colapso o derrumbe. El audit trail inglés revisó «despair» por «calamity» para reflejar mejor el sentido de desastre/prueba; «calamidad» en español conserva esa amplitud sin reducirlo a una emoción interna.
- source_word: נְקִיִּם
  english_pob_choice: the innocent
  chosen_spanish: los inocentes
  alternatives_spanish:
  - los irreprensibles
  - los sin culpa
  - los limpios
  lexicon: HALOT
  rationale: Designa a quienes están libres de culpa. «Los inocentes» es natural, bíblicamente comprensible y mantiene la referencia a personas no culpables.
- source_word: יִלְעָג
  english_pob_choice: he mocks
  chosen_spanish: se burla
  alternatives_spanish:
  - se mofa
  - se ríe de
  - se burla de
  lexicon: HALOT
  rationale: El verbo significa burlarse o escarnecer. «Se burla» reproduce bien la aspereza del término sin sonar arcaico. Se añade «de» para completar la construcción natural en español.
theological_decisions:
- issue: Sujeto implícito de «se burla»
  english_pob_reading: Implicitly God is the subject in Job's accusation; the Hebrew leaves the subject ambiguous while the context points toward divine governance.
  chosen_spanish_reading: Mantener la ambigüedad del sujeto, sin nombrarlo explícitamente en el texto.
  alternative_spanish_readings:
  - Dios se burla
  - él se burla
  - el azote se burla
  rationale: El contexto de Job 9 apunta a la gobernanza divina, pero el hebreo no nombra explícitamente al sujeto. La redacción española conserva esa tensión teológica sin resolverla de modo interpretativo; así queda abierta la lectura contextual sin añadir una palabra que el versículo no dice.
  doctrine_reference: Preservar la tensión teológica del texto en vez de resolverla prematuramente.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del auditorio inglés, que reemplazó una idea de «desesperación» por «calamidad» para reflejar mejor el valor del sustantivo hebreo como prueba, desastre o derrumbe. Por eso el español usa «calamidad» y no un término emotivo interno.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del texto porque el versículo no lo nombra explícitamente; la ambigüedad del sujeto se preserva mediante la tercera persona verbal.
  - Se evitó «SEÑOR» como sustituto del nombre divino, conforme al criterio general del proyecto.
  - «Azote» se prefirió a «látigo» por su doble valor de instrumento y aflicción punitiva en español bíblico contemporáneo.
