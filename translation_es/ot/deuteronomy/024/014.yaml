revisions:
- from: No oprimirás al jornalero pobre y necesitado[a], sea uno de tus hermanos o uno de tus forasteros[b] que está en tu tierra, dentro de tus puertas.
  to: No oprimirás al jornalero pobre y necesitado[a], sea uno de tus hermanos o uno de tus residentes forasteros que está en tu tierra, dentro de tus puertas[b].
  rationale: Se reemplaza 'forasteros' por 'residentes forasteros' para reflejar mejor la categoría de גֵּר como no nativo que reside dentro de la comunidad y está bajo su protección legal, en línea con la justificación léxica y teológica del POB inglés. También se ancla explícitamente la nota [b] en 'dentro de tus puertas', ya que la nota cultural debe aparecer en el texto donde corresponde.
