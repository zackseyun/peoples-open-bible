translation:
  language: es
  text: Confió en Yahvé[a], el Dios de Israel. Después de él no hubo nadie como él entre todos los reyes de Judá, ni entre los que lo precedieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en Yahvé». Se conserva el Nombre divino en la forma española adoptada por el proyecto, en lugar de sustituirlo por una mayúscula de reverencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיהוָה
  english_pob_choice: in the LORD / in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en el Señor
  - en Yahvéh
  lexicon: HALOT
  rationale: 'El hebreo בְּ con בטח expresa el objeto de la confianza: ''en''. Para יְהוָה se adopta ''Yahvé'', conforme a la pauta española del proyecto para el Nombre divino, manteniendo el carácter propio del texto fuente.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  - Dios de Israel
  lexicon: HALOT
  rationale: La cadena constructa identifica a Yahvé como el Dios perteneciente a Israel; en español, 'el Dios de Israel' conserva con claridad la relación posesiva/covenantal sin añadir glosa.
- source_word: בָּטָח
  english_pob_choice: trusted
  chosen_spanish: confió
  alternatives_spanish:
  - tuvo confianza
  - se apoyó
  lexicon: HALOT
  rationale: El qal perfecto de בטח denota confiar/fiarse. 'Confió' es natural en español y preserva la fuerza verbal del hebreo sin diluirla en una perífrasis.
- source_word: וְאַחֲרָיו
  english_pob_choice: After him
  chosen_spanish: Después de él
  alternatives_spanish:
  - Y después de él
  - Tras él
  lexicon: HALOT
  rationale: La expresión temporal se vierte de forma directa y fluida en español. Se omite el 'y' inicial por estilo, como hizo el inglés POB, sin perder el valor temporal.
- source_word: לֹא הָיָה כָמֹהוּ
  english_pob_choice: there was none like him
  chosen_spanish: no hubo otro como él
  alternatives_spanish:
  - no había otro como él
  - nadie fue como él
  lexicon: HALOT
  rationale: La comparación idiomática hebrea expresa singularidad. 'No hubo otro como él' comunica bien el sentido superlativo y resulta idiomático en español, manteniendo el sujeto implícito del predicado existencial.
- source_word: בְּכֹל מַלְכֵי יְהוּדָה
  english_pob_choice: among all the kings of Judah
  chosen_spanish: entre todos los reyes de Judá
  alternatives_spanish:
  - en todos los reyes de Judá
  - entre los reyes de Judá
  lexicon: HALOT
  rationale: El ב distributivo/comparativo se expresa mejor con 'entre' en español para indicar comparación dentro del grupo de los reyes de Judá.
- source_word: וַאֲשֶׁר הָיוּ לְפָנָיו
  english_pob_choice: nor among those who were before him
  chosen_spanish: ni entre los que fueron antes de él
  alternatives_spanish:
  - ni entre los que estaban antes de él
  - ni entre los anteriores a él
  lexicon: HALOT
  rationale: La cláusula relativa amplía la comparación a los reyes previos. 'Fueron antes de él' mantiene la referencia temporal del hebreo con un español claro y sobrio.
theological_decisions:
- issue: Nombre divino יְהוָה en la traducción española
  english_pob_reading: Yahweh / LORD (with footnote in English audit trail)
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: 'El audit trail inglés documenta el Nombre divino y la elección de una forma auditable. Para el español del POB se sigue el estándar del proyecto: ''Yahvé'' reproduce el Tetragrama en una forma reconocible y consistente, evitando el enmascaramiento por ''SEÑOR''.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se tomó como base el texto hebreo masorético de 2 Reyes 18:5 y el audit trail inglés. No hay variantes textuales relevantes en el paquete proporcionado; la revisión consistió en ajustar a español natural la comparación hebrea y mantener la decisión auditada sobre el Nombre divino.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' de forma uniforme para יְהוָה.
  - Se eligió 'confió' para בטח por ser verbal y natural en español.
  - 'Se conservó la doble comparación del hebreo: reyes de Judá y reyes anteriores.'
  - El marcador de nota [a] aparece solo sobre el Nombre divino, donde está anclada la decisión lexical.
