translation:
  language: es
  text: ¿Por qué dices, Jacob, y hablas, Israel, «Mi camino está escondido de Yahvé, y mi justicia[a] es desatendida por mi Dios»?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi derecho» o «mi causa». El hebreo mishpati puede referirse a la justicia, el derecho legal o la causa de vindicación de una persona.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Para qué razón?
  - ¿Por qué motivo?
  lexicon: HALOT
  rationale: Expresa con naturalidad la pregunta retórica y conserva la fuerza de desafío del hebreo.
- source_word: תֹאמַר
  english_pob_choice: do you say
  chosen_spanish: dices
  alternatives_spanish:
  - estás diciendo
  - dices tú
  lexicon: HALOT
  rationale: El presente directo suena natural en español y mantiene la interpelación en segunda persona.
- source_word: וּתְדַבֵּר
  english_pob_choice: and speak
  chosen_spanish: y hablas
  alternatives_spanish:
  - y dices
  - y pronuncias
  lexicon: HALOT
  rationale: Conserva la distinción entre אמר y דבר sin forzar un calco; 'hablas' comunica bien el acto de expresarlo.
- source_word: יַעֲקֹב / יִשְׂרָאֵל
  english_pob_choice: Jacob / Israel
  chosen_spanish: Jacob / Israel
  alternatives_spanish:
  - Jacobo / Israel
  lexicon: Nombre propio
  rationale: Se conservan los nombres covenantales tradicionales y reconocibles en español, sin alterar la referencia al pueblo.
- source_word: נִסְתְּרָה
  english_pob_choice: is hidden
  chosen_spanish: está escondido
  alternatives_spanish:
  - está oculto
  - ha quedado oculto
  lexicon: HALOT
  rationale: '''Está escondido'' preserva el sentido pasivo de algo que no se ve o no se percibe, con español natural.'
- source_word: דַרְכִּי
  english_pob_choice: My way
  chosen_spanish: mi camino
  alternatives_spanish:
  - mi senda
  - mi ruta
  - mi curso
  lexicon: HALOT
  rationale: '''Camino'' es la forma más idiomática en español para דרך y mantiene la metáfora de la condición o curso de vida.'
- source_word: מֵיְהוָה
  english_pob_choice: from Yahweh
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - desde Yahvé
  lexicon: DOCTRINE.md contested terms
  rationale: Se preserva el nombre divino 'Yahvé' en vez de ocultarlo tras 'SEÑOR', conforme al criterio del proyecto.
- source_word: וּמֵאֱלֹהַי
  english_pob_choice: and from my God
  chosen_spanish: y mi justicia es desatendida por mi Dios
  alternatives_spanish:
  - y ante mi Dios
  - y de mi Dios
  lexicon: HALOT
  rationale: El hebreo vincula la segunda proposición con la primera mediante la preposición repetida; en español, la pasiva perifrástica 'es desatendida' expresa el matiz de ser pasada por alto o ignorada, como en la revisión inglesa, sin perder la relación con Dios.
- source_word: מִשְׁפָּטִי
  english_pob_choice: my justice
  chosen_spanish: mi justicia
  alternatives_spanish:
  - mi derecho
  - mi causa
  lexicon: HALOT
  rationale: '''Justicia'' conserva la fuerza lexical de משפט y deja abierta la tensión entre justicia, derecho o causa vindicable.'
- source_word: יַעֲבוֹר
  english_pob_choice: passes by / is disregarded
  chosen_spanish: es desatendida
  alternatives_spanish:
  - es pasada por alto
  - es ignorada
  - pasa de largo
  lexicon: HALOT
  rationale: La revisión inglesa aclaró el sentido de 'disregarded'; 'es desatendida' comunica bien la idea de ser pasada por alto o no atendida, sin eliminar la ambigüedad del hebreo.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton, y la política del proyecto pide 'Yahvé' en el texto principal para no enmascarar el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Sentido de מִשְׁפָּטִי y del verbo final יַעֲבוֹר
  english_pob_reading: my justice is disregarded by my God
  chosen_spanish_reading: mi justicia es desatendida por mi Dios
  alternative_spanish_readings:
  - mi derecho es ignorado por mi Dios
  - mi causa es pasada por alto por mi Dios
  - mi justicia pasa de largo ante mi Dios
  rationale: 'Se conserva la tensión del reclamo: no se resuelve ''mishpati'' solo como derecho o causa, sino como justicia/causa de vindicación que parece no recibir atención. La pasiva en español comunica mejor el matiz de ''disregarded'' que una traducción demasiado literal de ''pasar''.'
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it; §5 Consistency of key terms
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del audit trail inglés, que reemplazó una traducción demasiado literal de יַעֲבוֹר por una formulación que expresa mejor la idea de ser desatendida o ignorada. En español se optó por una pasiva natural ('es desatendida') para conservar esa precisión sin borrar la ambigüedad lexical de מִשְׁפָּטִי.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente con el estándar del proyecto.
  - '''Justicia'' se mantiene como término principal para מִשְׁפָּט, con alternativas explicadas en nota.'
  - Se conserva el paralelismo de Jacob/Israel y el tono de reprensión retórica del original.
  - La puntuación con comillas angulares mantiene legible el discurso citado dentro de la pregunta.
