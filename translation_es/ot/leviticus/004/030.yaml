  text: וְ/לָקַ֨ח הַ/כֹּהֵ֤ן מִ/דָּמָ/הּ֙ בְּ/אֶצְבָּע֔/וֹ וְ/נָתַ֕ן עַל קַרְנֹ֖ת מִזְבַּ֣ח הָ/עֹלָ֑ה וְ/אֶת כָּל דָּמָ֣/הּ יִשְׁפֹּ֔ךְ אֶל יְס֖וֹד הַ/מִּזְבֵּֽחַ־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/004/030.yaml
  text: And the priest shall take some of its blood with his finger and put it on the horns of the altar of burnt offering[c][b][a], and he shall pour out all its blood at the base of the altar.
  footnotes:
  - marker: a
    text: 'Or ''from its blood.'' The Hebrew expression is literally ''from its blood'' and here likely has a partitive sense: the priest takes a portion for application to the altar.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the horns of the altar of burnt offering'—the horn-like projections at the altar's corners.
    reason: cultural_note
  - marker: c
    text: Although the text says 'all its blood,' the sequence implies that the remaining blood is poured out after some has been applied with the finger.
    reason: lexical_alternative
