translation:
  text: |-
    1. And he answered and said to me, “Because the revelation of this vision has been made plain as you prayed, hear the word of the Most High, so that you may know what will happen to you after these things.
    2. For you shall surely depart from this earth—but not unto death; rather, you shall be kept for the appointed times.
    3. Therefore go up to the summit of that mountain, and the regions of that land shall pass before you, and the form of the inhabited world, and the tops of the mountains, and the depths of the valleys, and the depths of the seas, and the number of the rivers, so that you may see what you are leaving and where you are going.
    4. And this shall be after forty days.
    5. Go therefore now, during these days, and instruct the people as much as you are able, so that they may learn, lest they die at the last time, but may learn so that they may live at the last time.”
