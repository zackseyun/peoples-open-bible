review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y la línea del POB inglés en la mayor parte del versículo: mantiene la imagen de ''cubrir'', el registro elevado de ''bestias'', el singular del destinatario (''te''), y la cadena causal final. Sin embargo, hay dos desajustes importantes con la evidencia auditada: (1) las notas al pie a/b están invertidas respecto a sus anclajes y contenidos documentados; [a] está puesto en ''Líbano'' pero la nota a del POB trata de ''blood of man'', mientras que [b] está puesto en ''te cubrirá'' pero la nota b del POB trata de ''will cover you / overwhelm you''; (2) la primera nota española no preserva la alternativa significativa del POB inglés. Además, ''por la sangre de hombre'' es gramaticalmente torpe en español; conviene conservar el singular representativo con ''por la sangre del hombre'' y añadir nota léxica para la posible lectura ''sangre humana''.'
  spanish_quality_summary: El español es generalmente claro y digno, pero presenta detalles mejorables. 'Violencia hecha al Líbano' suena algo calcado; 'violencia hecha contra el Líbano' o mejor 'violencia hecha al Líbano' puede tolerarse, pero la repetición posterior con 'contra la tierra' rompe la consistencia victimaria explicitada por el POB. 'Por la sangre de hombre' resulta poco natural; 'por la sangre del hombre' conserva el singular hebreo y suena mejor en español bíblico moderno. La puntuación y cadencia general son buenas.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. Los términos clave se manejan bien: חמס como ''violencia'', בְּהֵמוֹת como ''bestias'', יְכַסֶּךָּ como ''te cubrirá''. La decisión sobre אָדָם debe mantenerse en singular representativo, pero en español se expresa mejor como ''del hombre''. También conviene alinear la segunda ocurrencia de חמס con la rationale inglesa (''violencia hecha a la tierra'') en vez de ''contra la tierra'', para reflejar más claramente el sentido de víctima padecida.'
  issues:
  - severity: high
    issue: Las notas al pie no corresponden a los anclajes ni al contenido auditado del POB inglés.
    rationale: En el POB inglés, la nota a comenta 'because of the blood of man' y la nota b comenta 'will cover you'. En el borrador español, [a] aparece en 'Líbano' con una nota redundante, y [b] sí está en 'te cubrirá' pero la nota a faltante priva al lector de la alternativa léxica preservada por el POB.
  - severity: medium
    issue: '''Por la sangre de hombre'' es poco idiomático en español.'
    rationale: Aunque intenta conservar el singular representativo de אָדָם, la construcción sin artículo suena forzada. 'Por la sangre del hombre' mantiene mejor la forma singular y la dignidad del registro; la alternativa inclusiva puede ir en nota.
  - severity: medium
    issue: '''La violencia contra la tierra'' debilita el matiz victimario explicitado por el POB.'
    rationale: La rationale inglesa entiende ambos חמס como violencia infligida a las entidades afectadas. 'Hecha a la tierra' o 'hecha contra la tierra' es más fiel a esa decisión que 'contra la tierra' a secas, que suena más genérico y menos paralelo con la primera cláusula.
  - severity: low
    issue: La primera nota al pie es redundante y no aporta una alternativa significativa.
    rationale: Dice prácticamente lo mismo que el texto principal y no responde a una ambigüedad relevante del hebreo ni del audit trail.
  revised_spanish_text: Porque la violencia hecha al Líbano te cubrirá[b], y la destrucción de las bestias te aterrorizará, por la sangre del hombre[a] y la violencia hecha a la tierra, a la ciudad y a todos los que habitan en ella.
  revised_footnotes:
