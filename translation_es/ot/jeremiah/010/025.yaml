translation:
  language: es
  text: Derrama tu ira sobre las naciones que no te conocen, y sobre los clanes que no invocan tu nombre; porque han devorado a Jacob, sí, lo han devorado y consumido, y han asolado su morada.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: שְׁפֹךְ
  english_pob_choice: Pour out
  chosen_spanish: Derrama
  alternatives_spanish:
  - Vierte
  - Vacía
  lexicon: HALOT
  rationale: En español, ‘derramar’ conserva la imagen de verter con fuerza y funciona con naturalidad en lenguaje de oración imprecatoria; evita el calco pesado de ‘vierte’ y mantiene el tono intenso del hebreo.
- source_word: חֲמָתְךָ
  english_pob_choice: your wrath
  chosen_spanish: tu furor
  alternatives_spanish:
  - tu ira
  - tu enojo
  lexicon: HALOT
  rationale: ‘Furor’ expresa bien la fuerza ardiente de חֵמָה en este contexto judicial. Aunque ‘ira’ también es posible, ‘furor’ suena más enfático en español bíblico sin perder claridad.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: ‘Naciones’ es la correspondencia más natural y precisa para גּוֹיִם en este contexto de pueblos extranjeros hostiles.
- source_word: אֲשֶׁר לֹא יְדָעוּךָ
  english_pob_choice: that do not know you
  chosen_spanish: que no te conocen
  alternatives_spanish:
  - que no te han conocido
  - que no te reconocen
  lexicon: HALOT
  rationale: ‘Conocer’ conserva la relación personal y de reconocimiento implícita en יָדַע con Dios como objeto. La forma directa ‘te conocen’ es idiomática en español.
- source_word: מִשְׁפָּחוֹת
  english_pob_choice: the clans
  chosen_spanish: las familias
  alternatives_spanish:
  - los clanes
  - los linajes
  lexicon: HALOT
  rationale: Aunque ‘clanes’ reproduce bien la idea de grupos de parentesco, ‘familias’ es más natural en español y sigue siendo fiel al sentido amplio de unidades de parentesco. Se evita un término más técnico que podría sonar forzado.
- source_word: בְּשִׁמְךָ לֹא קָרָאוּ
  english_pob_choice: that do not call on your name
  chosen_spanish: que no invocan tu nombre
  alternatives_spanish:
  - que no llaman tu nombre
  - que no claman a tu nombre
  lexicon: HALOT
  rationale: ‘Invocar tu nombre’ comunica mejor en español el uso cultual y orante de קרא בשם que la traducción literal ‘llamar tu nombre’.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: En español, ‘porque’ introduce con claridad la causa de la petición y mantiene la relación lógica del hebreo.
- source_word: אָכְלוּ אֶת יַעֲקֹב
  english_pob_choice: they have devoured Jacob
  chosen_spanish: han devorado a Jacob
  alternatives_spanish:
  - han comido a Jacob
  - han consumido a Jacob
  lexicon: HALOT
  rationale: ‘Devorar’ preserva la metáfora de consumo violento y es más fuerte y natural que ‘comer’ en español.
- source_word: וַאֲכָלֻהוּ
  english_pob_choice: they have devoured him
  chosen_spanish: lo han devorado
  alternatives_spanish:
  - lo han consumido
  - lo han comido
  lexicon: HALOT
  rationale: Se mantiene la repetición enfática del verbo con el mismo equivalente español para no suavizar la insistencia retórica del hebreo.
- source_word: וַיְכַלֻּהוּ
  english_pob_choice: and consumed him
  chosen_spanish: y consumido
  alternatives_spanish:
  - y terminado con él
  - y destruido por completo
  lexicon: HALOT
  rationale: ‘Consumido’ conserva la idea de llevar algo hasta su fin y permite mantener el paralelismo con el verbo anterior. La omisión explícita del sujeto verbal se evita en español mediante la continuidad del predicado compuesto.
- source_word: נָוֵהוּ
  english_pob_choice: his habitation
  chosen_spanish: su morada
  alternatives_spanish:
  - su habitación
  - su vivienda
  - su habitación
  lexicon: HALOT
  rationale: ‘Morada’ traduce bien נָוֶה como lugar donde habita alguien y suena más bíblico y digno que ‘vivienda’. Mantiene la amplitud semántica sin forzar la imagen pastoril.
- source_word: הֵשַׁמּוּ
  english_pob_choice: they have laid waste
  chosen_spanish: han asolado
  alternatives_spanish:
  - han devastado
  - han desolado
  lexicon: HALOT
  rationale: ‘Asolar’ expresa adecuadamente el sentido de hacer desolado o arrasar, con un registro natural en español bíblico contemporáneo.
theological_decisions:
- issue: Imprecatory petition against foreign peoples
  english_pob_reading: Retain the direct prayer for divine wrath without softening it
  chosen_spanish_reading: Conservar la súplica directa para que Dios derrame su furor sobre las naciones y familias culpables, sin suavizarla
  alternative_spanish_readings:
  - Convertirlo en una simple afirmación de juicio
  - Reducir ‘furor’ a una expresión débil de disgusto
  rationale: El versículo es una oración de imprecación que pide juicio por la violencia cometida contra Jacob. La traducción debe mantener esa tensión teológica y no neutralizar la petición.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La versión inglesa más reciente corrigió el término final de ‘pasture’ a ‘habitation’. En español se ha seguido esa revisión con ‘morada’, evitando una imagen pastoril que no encaja bien en el contexto de נָוֶה aquí. También se preservó la repetición verbal (‘han devorado… lo han devorado y consumido’) para reflejar la intensificación hebrea.
  spanish_consistency_notes:
  - Se mantiene ‘Jacob’ como nombre propio, no ‘Israel’, siguiendo el hebreo y la tradición del pasaje.
  - Se eligió ‘furor’ en vez de ‘ira’ para conservar una fuerza más enfática, coherente con el tono imprecatorio.
  - Se prefirió ‘morada’ para נָוֶה por su amplitud y dignidad en español, en línea con la revisión inglesa hacia ‘habitation’.
