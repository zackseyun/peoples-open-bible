id: T12P.LEV.09
reference: Testament of Levi 9
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: IX. *Καὶ μεθ’ ἡμέρας¹ δύο ἀνέβην² ἐγὼ καὶ Ἰούδας *μετὰ τοῦ πατρὸς ἡμῶν Ἰακὼβ πρὸς Ἰσαὰκ³ Γτὸν προπάτορα ἡμῶν⁴⁾. 2. Καὶ εὐλόγησέν με *⁵ὁ πατὴρ τοῦ πατρός μου⁵ κατὰ⁶ *τῶν ὁραμάτων ὧν⁷ εἶδον· *καὶ οὐκ ἠθέλησε πορευθῆναι μεθ’ ἡμῶν εἰς Βεθήλ⁸. 3. ΓὩς δὲ ἤλθομεν εἰς Βεθήλ⁹⁾, εἶδεν¹⁰ ὁ πατήρ μου Ἰακώβ¹¹ ὅραμα¹² περὶ ἐμοῦ, ὅτι ἔσομαι αὐτοῖς εἰς ἱερέα¹³. 4. Καὶ ἀναστὰς¹⁴ *τῷ πρωὶ¹⁵ *ἀπεδεκάτωσε πάντα¹⁶ δι’ ἐμοῦ ῾τῷ Κυρίῳ’¹⁷. 5. Καὶ Γοὕτως’¹⁸ ἤλθομεν εἰς Χεβρὼν τοῦ καταμεῖναι¹⁹ ἐκεῖ²⁰. 6. Καὶ ὁ²¹ Ἰσαὰκ ἐκάλει με συνεχῶς *τοῦ ὑπομνῆσαί²² *με νόμον²³ Κυρίου²⁴, καθὼς *ἔδειξέ μοι²⁵ ὁ ἄγγελος²⁶. 7. Καὶ ἐδίδασκέ *με²⁷ νόμον ἱερωσύνης²⁸, *θυσιῶν, ὁλοκαυτωμάτων²⁹, *ἀπαρχῶν ἑκουσίου, σωτηρίου³⁰. 8. *Καὶ ἦν καθ᾽ ἑκάστην ἡμέραν συνετίζων με³¹, *καὶ ἀσχολούμενος εἰς ἐμὲ³² *ἔλεγέ μοι³³. 9. Πρόσεχε³⁴ σεαυτῷ³⁵ ἀπὸ τοῦ πνεύματος τῆς πορνείας. τοῦτο γὰρ³⁶ †ἐνδελεχῆ ἐστιν†³⁷ *καὶ μέλλει μιαίνειν³⁸ διὰ³⁹ τοῦ σπέρματός σου⁴⁰ *τὰ ἅγια⁴¹. 10. *Λαβὲ οὖν σεαυτῷ⁴² *γυναῖκα, ἔτι⁴³ νέος ὤν, *μὴ ἔχουσαν μῶμον μήτε βεβηλωμένην, μήτε ἀπὸ γένους⁴⁴ ἀλλοφύλων⁴⁵ ἐθνῶν. 11. Καὶ πρὸ⁴⁶ τοῦ εἰσελθεῖν σε⁴⁷ εἰς τὰ ἅγια, λούου· καὶ ἐν τῷ θύειν σε⁴⁸, νίπτου⁴⁹· καὶ ἀπαρτίζων πάλιν⁵⁰ τὴν θυσίαν, νίπτου. 12. *Δώδεκα οὖν δένδρων ἐχόντων φύλλα⁵¹ ἀνάγαγε⁵² τῷ⁵³ Κυρίῳ⁵⁴ *ὡς κἀμὲ⁵⁵ Ἀβραὰμ ἐδίδαξε. 13. Καὶ ἐκ⁵⁶ παντὸς ζώου καθαροῦ⁵⁷ Γκαὶ πετεινοῦ⁵⁸⁾ πρόσφερε θυσίαν *τῷ Κυρίῳ⁵⁹. 14. Καὶ *παντὸς πρωτογεννήματός σου⁶⁰ καὶ οἴνου⁶¹ πρόσφερε *ἀπαρχὰς εἰς θυσίαν Κυρίῳ⁶² Γτῷ θεῷ⁶³⁾. *Καὶ πᾶσαν θυσίαν ἅλατι ἁλιεῖς⁶⁴.
  language: Greek
