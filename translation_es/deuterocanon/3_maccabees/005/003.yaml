translation:
  language: es
  text: Así, el que había recibido estas órdenes se entregó al festín[a], reuniendo a los que entre sus amigos y entre la tropa eran más hostiles hacia los judíos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «se volvió al banquete».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ μὲν τάδε προσταχθεὶς
  english_pob_choice: the one who had been given these orders
  chosen_spanish: el que había recibido estas órdenes
  alternatives_spanish:
  - el que había sido mandado en estas cosas
  - el que había sido ordenado así
  lexicon: BDAG
  rationale: El participio articular pasivo se refiere al mismo personaje que acaba de recibir mandatos. «Había recibido estas órdenes» conserva el valor pasivo y suena natural en español sin perder la referencia retrospectiva.
- source_word: ἐτρέπετο
  english_pob_choice: turned to
  chosen_spanish: se dirigió a
  alternatives_spanish:
  - se volcó a
  - se entregó a
  lexicon: LSJ
  rationale: El imperfecto medio expresa orientación hacia una actividad. «Se dirigió a» conserva la idea de encaminarse a esa acción y funciona bien con el sustantivo siguiente en español.
- source_word: πρὸς τὴν εὐωχίαν
  english_pob_choice: feasting
  chosen_spanish: el banquete
  alternatives_spanish:
  - la fiesta
  - la comilona
  lexicon: LSJ
  rationale: Aunque el sustantivo puede abarcar el comer y beber festivo, en este contexto español «el banquete» expresa el evento convivial sin volverlo demasiado genérico. Se mantiene la posibilidad de la nota alternativa porque el inglés POB también preservó la lectura más formal.
- source_word: συναγαγὼν
  english_pob_choice: gathering
  chosen_spanish: reuniendo
  alternatives_spanish:
  - habiendo reunido
  - agrupando
  lexicon: BDAG
  rationale: El participio acompaña a la acción principal. «Reuniendo» mantiene la simultaneidad y evita una construcción excesivamente pesada en español.
- source_word: τοὺς μάλιστα τῶν φίλων καὶ τῆς στρατιᾶς
  english_pob_choice: those of his friends and of the army who were most
  chosen_spanish: a los que entre sus amigos y entre la tropa eran más
  alternatives_spanish:
  - a los más destacados entre sus amigos y entre la tropa
  - a los principales de sus amigos y de la tropa
  lexicon: LSJ
  rationale: La frase identifica un subconjunto tomado de sus amigos y del cuerpo militar. «Entre sus amigos y entre la tropa» refleja esa procedencia doble y conserva el matiz de selección implícito en μάλιστα.
- source_word: ἀπεχθῶς ἔχοντας πρὸς τοὺς Ἰουδαίους
  english_pob_choice: hostile toward the Jews
  chosen_spanish: hostiles hacia los judíos
  alternatives_spanish:
  - mal dispuestos hacia los judíos
  - enemistados con los judíos
  lexicon: LSJ
  rationale: La locución expresa una disposición de enemistad. «Hostiles hacia» es claro, sobrio y reproduce la fuerza negativa sin intensificarla más allá del griego.
translation_notes:
  revision_awareness: 'Se mantiene alta concordancia con el texto griego y con la auditoría inglesa: comando pasivo + movimiento hacia el festín + reunión de un subgrupo hostil. La única decisión de estilo relevante es usar «el banquete» en el texto principal, dejando la equivalencia más amplia («feasting») sugerida en la nota.'
  spanish_consistency_notes:
  - Se usa «judíos» para τοὺς Ἰουδαίους, en continuidad con la práctica estándar de POB en contextos históricos.
  - «Tropa» se elige para στρατιᾶς como equivalente neutral y militar; no se introduce terminología eclesiástica o interpretativa.
  - No hay decisiones teológicas explícitas en este versículo; el registro es narrativo e histórico.
