translation:
  language: es
  text: Tomaron algunas de sus hijas como esposas para ellos y para sus hijos, y la semilla santa[a] fue mezclada con las naciones extranjeras de la tierra; y los dirigentes y los nobles participaron en esta transgresión de la ley[b] desde el comienzo del asunto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la descendencia santa» o «la línea santa». El griego dice literalmente «la semilla santa», una metáfora de pacto para el pueblo apartado para Dios.
    reason: lexical_alternative
  - marker: b
    text: O «participaron en esta iniquidad». El griego dice literalmente «compartieron en esta transgresión de la ley»; también puede expresarse «esta ilegalidad» o «esta falta de ley», pero aquí se preserva mejor la fuerza de ἀνομία como violación legal-covenantal.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνῴκισαν
  english_pob_choice: took ... as wives
  chosen_spanish: tomaron ... como esposas
  alternatives_spanish:
  - se casaron con
  - convivieron con
  lexicon: LSJ
  rationale: El verbo apunta a unión matrimonial o convivencia; en este contexto de matrimonios mixtos, “tomaron ... como esposas” expresa con naturalidad el sentido marital sin perder la relación con el griego.
- source_word: τινας τῶν θυγατέρων αὐτῶν
  english_pob_choice: some of their daughters
  chosen_spanish: algunas de sus hijas
  alternatives_spanish:
  - ciertas de sus hijas
  lexicon: LSJ
  rationale: Es una construcción partitiva simple; “algunas de sus hijas” conserva la restricción del alcance y suena natural en español.
- source_word: καὶ αὐτοὶ καὶ οἱ υἱοὶ αὐτῶν
  english_pob_choice: for themselves and for their sons
  chosen_spanish: para ellos y para sus hijos
  alternatives_spanish:
  - ellos mismos y sus hijos
  - tanto ellos como sus hijos
  lexicon: LSJ
  rationale: El griego coordina a los hombres y a sus hijos como participantes. El español aclara el sentido relacional con “como esposas para ellos y para sus hijos” sin añadir contenido ajeno.
- source_word: ἐπεμίγη
  english_pob_choice: was mixed
  chosen_spanish: fue mezclada
  alternatives_spanish:
  - se mezcló
  - se entremezcló
  lexicon: LSJ
  rationale: La pasiva conserva la metáfora de mezcla sin interpretarla demasiado. En español, el femenino concuerda con “la descendencia santa” y mantiene el efecto del original.
- source_word: τὸ σπέρμα τὸ ἅγιον
  english_pob_choice: the holy seed
  chosen_spanish: la descendencia santa
  alternatives_spanish:
  - la semilla santa
  - la línea santa
  lexicon: LSJ
  rationale: “Descendencia” comunica en español la fuerza genealógica y comunitaria del hebraísmo subyacente, mientras conserva la cualidad de apartamiento de “santa”. Se evita mecanizar “seed” como “semilla”, que en español puede sonar biológicamente reducido.
- source_word: εἰς τὰ ἀλλογενῆ ἔθνη τῆς γῆς
  english_pob_choice: with the foreign nations of the land
  chosen_spanish: con las naciones extranjeras de la tierra
  alternatives_spanish:
  - entre los pueblos extranjeros de la tierra
  - en las naciones extrañas de la tierra
  lexicon: LSJ
  rationale: 'Aunque εἰς puede ser literalmente “en/para/into”, el contexto de mezcla pide en español una relación de asociación: “con”. “Extranjeras” conserva la idea de alteridad de ἀλλογενῆ y “de la tierra” mantiene el marco local.'
- source_word: μετεῖχον
  english_pob_choice: shared in
  chosen_spanish: participaron en
  alternatives_spanish:
  - tuvieron parte en
  - compartieron
  lexicon: LSJ
  rationale: El verbo denota participación culpable; “participaron en” mantiene esa fuerza y evita suavizar el reproche.
- source_word: οἱ προηγούμενοι καὶ οἱ μεγιστᾶνες
  english_pob_choice: the leaders and the nobles
  chosen_spanish: los dirigentes y los nobles
  alternatives_spanish:
  - los líderes y los nobles
  - los principales y los nobles
  lexicon: LSJ
  rationale: “Dirigentes” expresa la idea de quienes iban al frente y funciona bien junto a “los nobles”, preservando la distinción entre autoridad y estatus.
- source_word: τῆς ἀνομίας ταύτης
  english_pob_choice: this lawlessness
  chosen_spanish: esta iniquidad
  alternatives_spanish:
  - esta transgresión
  - esta falta de ley
  lexicon: LSJ
  rationale: Aunque “lawlessness” podría traducirse literalmente como “ilegalidad” o “falta de ley”, “iniquidad” conserva en español un registro bíblico fuerte y condenatorio, cercano al peso moral del griego en este contexto. Se mantiene el deíctico “esta”.
- source_word: ἀπὸ τῆς ἀρχῆς τοῦ πράγματος
  english_pob_choice: from the beginning of the matter
  chosen_spanish: desde el comienzo del asunto
  alternatives_spanish:
  - desde el principio del asunto
  - desde el inicio de la cuestión
  lexicon: LSJ
  rationale: “Asunto” o “cuestión” son naturales en español para πράγματος aquí; “comienzo” preserva el valor temporal de ἀρχῆς sin recargar la frase.
theological_decisions:
- issue: Sentido de τὸ σπέρμα τὸ ἅγιον en un contexto de matrimonios mixtos
  english_pob_reading: Retain the covenantal phrase 'the holy seed' without expanding it into a doctrinal explanation.
  chosen_spanish_reading: Conservar la idea covenantal como “la descendencia santa”, sin explicarla más allá del texto.
  alternative_spanish_readings:
  - la semilla santa
  - la línea santa
  rationale: El griego usa un lenguaje metafórico de pertenencia y separación. “Descendencia santa” preserva la tensión entre genealogía y consagración sin convertirla en glosa doctrinal.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Caracterización moral de la falta
  english_pob_reading: Render ἀνομία as 'lawlessness.'
  chosen_spanish_reading: Renderizar ἀνομία como “iniquidad” en este contexto.
  alternative_spanish_readings:
  - transgresión
  - falta de ley
  rationale: El texto condena la acción con fuerza moral. En español, “iniquidad” transmite una reprobación bíblica fuerte y fluida, aunque no sea un calco formal de “lawlessness”.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de Swete y mantiene las decisiones auditadas del inglés POB, con adaptación natural al español. Se atendió la tensión entre la metáfora literal de σπέρμα y una equivalencia española más idiomática (“descendencia”), y entre ἀνομία y un término bíblico de condena (“iniquidad”) que conserva la carga moral del pasaje.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ cuando corresponda a lo largo del proyecto; este versículo no contiene el nombre divino.
  - Se mantiene el registro bíblico pero en español actual, evitando arcaísmos innecesarios.
  - Las notas a pie conservan alternativas relevantes donde el español introduce una nueva ambigüedad o donde el inglés auditado preservó una alternativa lexical.
