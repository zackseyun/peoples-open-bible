revisions:
- from: Porque no dejó a Joacaz gente alguna, sino cincuenta jinetes[a], diez carros y diez mil soldados de a pie, pues el rey de Aram los había destruido y los había hecho como polvo para trillarlo.
  to: Porque no dejó a Joacaz gente alguna, sino cincuenta jinetes, diez carros de guerra y diez mil soldados de a pie, pues el rey de Aram los había destruido y los había dejado como polvo al trillar[a].
  rationale: Se corrige la cláusula final para reflejar fielmente לָדוּשׁ sin añadir un objeto inexistente, y se explicita «carros de guerra» para mayor claridad militar en español. También se traslada a nota la alternativa léxica relevante de la imagen de trilla, en línea con el rastro POB.
