translation:
  language: es
  text: Los persas se estremecieron por su audacia[a], y los medos fueron sacudidos por su osadía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego emplea dos términos muy cercanos para la fuerza temible de Judith: τόλμα y θράσος. Se varían en español con «audacia» y «osadía» para conservar el paralelismo sin repetir la misma palabra.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφριξαν
  english_pob_choice: shuddered
  chosen_spanish: se estremecieron
  alternatives_spanish:
  - temblaron
  - se sacudieron
  lexicon: LSJ
  rationale: ἔφριξαν, de φρίσσω, expresa una reacción corporal intensa ante el temor. En español, «se estremecieron» conserva mejor esa respuesta visceral que un simple «temblaron».
- source_word: Πέρσαι
  english_pob_choice: the Persians
  chosen_spanish: los persas
  alternatives_spanish:
  - persas
  lexicon: LSJ
  rationale: Es un plural étnico sustantivado; el artículo definido da naturalidad en español y mantiene la referencia colectiva.
- source_word: τὴν τόλμαν
  english_pob_choice: her boldness
  chosen_spanish: su audacia
  alternatives_spanish:
  - su valentía
  - su osadía
  lexicon: LSJ
  rationale: τόλμα puede significar valentía, audacia o atrevimiento. «Audacia» preserva la fuerza del término sin suavizarlo en exceso, y evita convertirlo en una valoración demasiado piadosa.
- source_word: Μῆδοι
  english_pob_choice: the Medes
  chosen_spanish: los medos
  alternatives_spanish:
  - medos
  lexicon: LSJ
  rationale: Plural étnico sustantivado; la forma con artículo es idiomática en español.
- source_word: τὸ θράσος
  english_pob_choice: her daring
  chosen_spanish: su osadía
  alternatives_spanish:
  - su audacia
  - su atrevimiento
  - su insolencia
  lexicon: LSJ
  rationale: θράσος suele tener el matiz de osadía o atrevimiento, a veces con tono más fuerte que τόλμα. «Osadía» conserva ese matiz sin llegar necesariamente a «insolencia».
- source_word: ἐρράχθησαν
  english_pob_choice: were shaken
  chosen_spanish: fueron sacudidos
  alternatives_spanish:
  - se turbaron
  - quedaron desconcertados
  - se vieron sacudidos
  lexicon: LSJ
  rationale: El pasivo aoristo indica haber sido perturbados o sacudidos. «Fueron sacudidos» mantiene la imagen fuerte y el paralelismo con la primera cláusula.
theological_decisions:
- issue: Cómo reflejar la valoración de la valentía de Judith sin suavizar el registro retórico del griego.
  english_pob_reading: The Persians shuddered at her boldness, and the Medes were shaken by her daring.
  chosen_spanish_reading: Los persas se estremecieron por su audacia, y los medos fueron sacudidos por su osadía.
  alternative_spanish_readings:
  - Los persas se estremecieron por su valentía, y los medos fueron sacudidos por su atrevimiento.
  - Los persas temblaron ante su coraje, y los medos quedaron turbados por su audacia.
  rationale: El griego usa dos sustantivos cercanos pero no idénticos, con un efecto retórico de paralelismo intensificado. La traducción distingue «audacia» y «osadía» para conservar esa tensión léxica sin borrar el matiz fuerte del pasaje.
  doctrine_reference: Ninguna; decisión retórica y léxica del texto.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente inglés; el texto griego y la lectura inglesa coinciden sustancialmente, con la única variación estilística de distinguir los dos términos cercanos mediante vocablos españoles diferentes.
  spanish_consistency_notes:
  - Se mantiene «persas» y «medos» como etnónimos comunes en español.
  - Se evita «SEÑOR» o equivalentes porque el versículo no contiene el nombre divino ni una cita de κύριος.
  - Se preserva la paralelidad del original con dos sustantivos distintos para la reacción ante Judith.
