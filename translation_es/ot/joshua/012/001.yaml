base_translation:
  language: en
  yaml_path: translation/ot/joshua/012/001.yaml
  text: Now these are the kings of the land whom the sons of Israel struck down and whose land they took possession of beyond the Jordan[a], toward the sunrise, from the Wadi Arnon as far as Mount Hermon[d][c][b], and all the Arabah eastward.
  footnotes:
  - marker: a
    text: Or 'the Israelites'; Hebrew 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'toward the rising of the sun,' that is, eastward.
    reason: lexical_alternative
  - marker: c
    text: '''Wadi'' refers to a streambed or torrent valley; some translations render ''brook'' or ''valley of the Arnon.'''
    reason: cultural_note
  - marker: d
    text: Or 'the plain'; 'Arabah' is a specific geographic term for the rift valley region.
    reason: lexical_alternative
