translation:
  language: es
  text: Contaminó Jerusalén y las cosas santificadas en el nombre de Dios[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las cosas santas» o «las cosas consagradas».
    reason: lexical_alternative
  - marker: b
    text: O «consagradas al nombre de Dios»; la frase puede expresar dedicación o consagración en relación con el nombre de Dios.
    reason: lexical_theological_clarification
lexical_decisions:
- source_word: ἐμίανεν
  english_pob_choice: defiled
  chosen_spanish: profanó
  alternatives_spanish:
  - contaminó
  - manchó
  lexicon: BDAG
  rationale: El verbo μίανω expresa hacer impuro o tratado como impuro, con fuerte matiz cultual. En español, «profanó» comunica mejor la violación de lo sagrado que «contaminó», sin sonar meramente físico. Mantiene la tensión ritual del original.
- source_word: Ἰερουσαλήμ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: transliteración estándar
  rationale: Nombre propio geográfico establecido en español bíblico y lectura natural para la audiencia hispanohablante.
- source_word: τὰ ἡγιασμένα
  english_pob_choice: the things sanctified
  chosen_spanish: las cosas santificadas
  alternatives_spanish:
  - las cosas consagradas
  - las cosas santas
  lexicon: BDAG
  rationale: El participio perfecto pasivo sustantivado conserva la idea de objetos hechos santos. «Santificadas» mantiene la voz pasiva y la relación con ἁγιάζω; «consagradas» es viable, pero menos transparente a la forma griega.
- source_word: τῷ ὀνόματι τοῦ θεοῦ
  english_pob_choice: in the name of God
  chosen_spanish: para el nombre de Dios
  alternatives_spanish:
  - en el nombre de Dios
  - al nombre de Dios
  lexicon: dativo de dedicación
  rationale: La revisión del registro inglés indica que el dativo es de dedicación, no instrumental. En español, «para el nombre de Dios» expresa mejor destino/dedicación que «en el nombre de Dios», que podría sonar instrumental o formularia. Aunque menos idiomático, refleja con más precisión la relación de consagración.
theological_decisions:
- issue: Relación entre τῷ ὀνόματι y la consagración de las cosas santificadas
  english_pob_reading: sanctified in the name of God / revised from 'by the name of God' with a dedication nuance in the audit trail
  chosen_spanish_reading: santificadas para el nombre de Dios
  alternative_spanish_readings:
  - santificadas en el nombre de Dios
  - santificadas al nombre de Dios
  rationale: El griego y la revisión auditada favorecen una relación de dedicación del objeto sagrado al nombre de Dios, no una mera acción hecha 'en' su nombre. La forma española elegida preserva esa dirección teleológica y evita borrar la tensión cultual del texto.
  doctrine_reference: Dedicación de objetos y lugares sagrados; lenguaje cultual del templo en la tradición bíblica
translation_notes:
  revision_awareness: El texto base inglés pasó de 'sanctified to the name of God' a 'sanctified in the name of God'; la evidencia griega, junto con la revisión inicial, muestra una dative de dedicación. La traducción española conserva esa idea con 'para el nombre de Dios' y mantiene el participio sustantivado plural.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεοῦ, sin sustituir por una fórmula litúrgica más tradicional que enmascare la relación gramatical.
  - '''Profanó'' preserva mejor la oposición sagrado/impuro que una simple ''contaminó''.'
  - El marcador de nota [a] aparece en el texto exactamente donde la alternativa léxica es relevante.
