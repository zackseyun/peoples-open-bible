  source_alignment_summary: 'El borrador español refleja fielmente el hebreo: בְּקוּם se vierte bien como cláusula temporal («Cuando se levantan»), רְשָׁעִים como categoría moral plural («los impíos»), יִסָּתֵר con el sentido medio/reflexivo preferido («se esconde») y con nota que preserva la alternativa pasiva, אָדָם como singular proverbial representativo («un hombre») con nota aclaratoria, וּבְאָבְדָם como segunda cláusula temporal antitética («pero cuando perecen»), e יִרְבּוּ צַדִּיקִים como aumento/florecimiento de los justos («los justos aumentan»).'
