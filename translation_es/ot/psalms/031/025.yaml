translation:
  language: es
  text: Sean fuertes, y que su corazón sea valiente, todos los que esperan[a] a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que ponen su esperanza en Yahvé». El participio hebreo puede expresar tanto esperar como esperar con esperanza.
    reason: lexical_alternative
lexical_decisions:
- source_word: חִזְקוּ
  english_pob_choice: Be strong
  chosen_spanish: Sean fuertes
  alternatives_spanish:
  - Cobren fuerzas
  - Tengan ánimo
  lexicon: HALOT
  rationale: El imperativo plural exhorta a la fortaleza. En español, «Sean fuertes» conserva el mandato directo y suena natural en registro bíblico sin volverse arcaico.
- source_word: וְיַאֲמֵץ
  english_pob_choice: and let ... be courageous
  chosen_spanish: y que ... sea valiente
  alternatives_spanish:
  - y que ... tome valor
  - y que ... cobre ánimo
  lexicon: HALOT
  rationale: El verbo en forma causativa/jussiva continúa la exhortación. «Que su corazón sea valiente» preserva el paralelismo con «Sean fuertes» y evita una repetición excesiva.
- source_word: לְבַבְכֶם
  english_pob_choice: your heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su interior
  - su ser interior
  lexicon: HALOT
  rationale: «Corazón» es el equivalente español más claro para לֵבָב en este contexto poético, donde incluye centro de ánimo, voluntad y valentía.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos los que
  alternatives_spanish:
  - cada uno de los que
  lexicon: HALOT
  rationale: La partícula introduce al grupo destinatario completo. «Todos los que» reproduce bien el valor colectivo del participio siguiente.
- source_word: הַמְיַחֲלִים
  english_pob_choice: who wait
  chosen_spanish: esperan
  alternatives_spanish:
  - aguardan
  - esperan con confianza
  lexicon: HALOT
  rationale: El participio de יחל puede expresar esperar o tener esperanza. «Esperan» conserva la imagen verbal y deja la noción de confianza implícita sin recargar el verso.
- source_word: לַיהוָה
  english_pob_choice: for Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - por Yahvé
  - para Yahvé
  lexicon: HALOT
  rationale: 'En español, con יחל, la preposición se entiende de modo natural como esfera de confianza: «esperan en Yahvé». Se mantiene «Yahvé» según el criterio del proyecto para יהוה.'
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo contiene el Tetragrámaton. El proyecto pide verterlo como «Yahvé» en el texto principal, conservando el nombre pactual sin enmascararlo con un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor semántico de הַמְיַחֲלִים
  english_pob_reading: who wait / who hope
  chosen_spanish_reading: los que esperan
  alternative_spanish_readings:
  - los que aguardan
  - los que esperan con esperanza
  rationale: La forma participial admite tanto espera como esperanza. «Esperan» mantiene la tensión léxica sin forzar una paráfrasis doctrinal. Si el lector percibe también la esperanza, eso está dentro del campo semántico del verbo.
  doctrine_reference: HALOT יחל
translation_notes:
  revision_awareness: El contexto inglés POB ya había optado por una lectura que distingue entre la fuerza del primer imperativo y el valor/coraje del segundo, y por preservar la ambigüedad de יחל con una nota alternativa «wait/hope». La revisión reciente no introdujo cambios textuales; la versión española sigue ese mismo trazado semántico, ajustándolo a una sintaxis natural en español y al criterio del proyecto para יהוה.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה, conforme al estándar del proyecto.
  - Se conserva la distinción entre fortaleza física/moral («fuertes») y valor del corazón («valiente»).
  - «Esperan» refleja el campo de יחל sin perder la posible lectura de esperanza, que queda implícita y documentada en la nota.
