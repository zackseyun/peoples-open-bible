translation:
  language: es
  text: Y los persiguieron por la bajada de Bet-horón hasta la llanura[a]; y unos ochocientos de ellos cayeron; pero los demás huyeron a la tierra de los filisteos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «unos ochocientos hombres cayeron de entre ellos». El giro griego puede vertirse con un matiz más literal, haciendo explícito el sustantivo «hombres».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδίωκον
  english_pob_choice: pursued
  chosen_spanish: persiguieron
  alternatives_spanish:
  - iban persiguiendo
  - dieron caza a
  lexicon: LSJ
  rationale: El imperfecto griego expresa acción continua en la narración; «persiguieron» mantiene el avance narrativo natural en español sin perder el sentido de persecución sostenida.
- source_word: ἐν τῇ καταβάσει
  english_pob_choice: down the descent
  chosen_spanish: por la bajada
  alternatives_spanish:
  - en la bajada
  - por el descenso
  lexicon: LSJ
  rationale: κατάβασις nombra una bajada o ruta descendente. «Por la bajada» conserva el rasgo topográfico y sugiere el movimiento del ataque en español idiomático.
- source_word: Βαιθωρὼν
  english_pob_choice: Beth-horon
  chosen_spanish: Bet-horón
  alternatives_spanish:
  - Bet-Horón
  - Beth-horon
  lexicon: transliteración estándar
  rationale: Se usa una transliteración reconocible y natural en español bíblico; se conserva el nombre propio sin traducir.
- source_word: ἕως τοῦ πεδίου
  english_pob_choice: as far as the plain
  chosen_spanish: hasta la llanura
  alternatives_spanish:
  - hasta el llano
  - hasta la planicie
  lexicon: LSJ
  rationale: πέδιον significa llanura o terreno llano. «Hasta la llanura» reproduce bien el límite espacial marcado por ἕως y la oposición entre la bajada y el terreno llano.
- source_word: ἔπεσον ἀπʼ αὐτῶν
  english_pob_choice: about eight hundred of them fell
  chosen_spanish: cayeron de ellos unos ochocientos hombres
  alternatives_spanish:
  - cayeron de ellos alrededor de ochocientos hombres
  - murieron de ellos unos ochocientos hombres
  lexicon: LSJ
  rationale: La construcción indica bajas procedentes del grupo perseguido. «Cayeron de ellos» preserva el matiz idiomático del griego, y «unos ochocientos hombres» mantiene la cifra aproximada y explicita el sustantivo que el griego desarrolla.
- source_word: εἰς ἄνδρας ὀκτακοσίους
  english_pob_choice: about eight hundred
  chosen_spanish: unos ochocientos hombres
  alternatives_spanish:
  - cerca de ochocientos hombres
  - unos ochocientos
  lexicon: LSJ
  rationale: La expresión griega cuantifica a los varones que cayeron. En español es más claro mantener «hombres» para hacer explícito lo que el griego nombra directamente.
- source_word: οἱ δὲ λοιποὶ
  english_pob_choice: but the rest
  chosen_spanish: pero los demás
  alternatives_spanish:
  - y los restantes
  - pero los restantes
  lexicon: LSJ
  rationale: δέ introduce contraste con los que cayeron; «pero los demás» preserva esa oposición de manera breve y natural.
- source_word: ἔφυγον εἰς γῆν Φυλιστιείμ
  english_pob_choice: fled into the land of the Philistines
  chosen_spanish: huyeron a la tierra de los filisteos
  alternatives_spanish:
  - escaparon a la tierra de los filisteos
  - huyeron a Filistea
  lexicon: LSJ
  rationale: El griego refiere literalmente la tierra de los filisteos. Se conserva esa forma transparente en lugar de sustituirla por un nombre más resumido, para seguir de cerca el sentido histórico-geográfico del texto.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior insertando el marcador [a] directamente en el texto de traducción, anclado en «llanura[a]», y se mantuvo la nota solo para esa alternativa lexical documentada en el audit trail.
  spanish_consistency_notes:
  - Se mantuvo un registro neutral latinoamericano y bíblico en «Bet-horón», «filisteos» y «tierra de los filisteos».
  - Se evitó «SEÑOR» u otro término teológico irrelevante, ya que el versículo no contiene el Tetragrámaton ni κύριος.
  - La cifra se expresó como «unos ochocientos hombres» para reflejar la aproximación idiomática del griego sin forzar una interpretación exacta.
