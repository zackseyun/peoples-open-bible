source:
  edition: WLC
  text: עַל כֵּ֡ן לֹֽא יֹאכְל֨וּ בְנֵֽי יִשְׂרָאֵ֜ל אֶת גִּ֣יד הַ/נָּשֶׁ֗ה אֲשֶׁר֙ עַל כַּ֣ף הַ/יָּרֵ֔ךְ עַ֖ד הַ/יּ֣וֹם הַ/זֶּ֑ה כִּ֤י נָגַע֙ בְּ/כַף יֶ֣רֶךְ יַעֲקֹ֔ב בְּ/גִ֖יד הַ/נָּשֶֽׁה־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/032/033.yaml
  text: Therefore[a], to this day the sons of Israel do not eat the sinew of the hip, which is on the socket of the thigh[d][c][b], because he touched the socket of Jacob’s thigh at the sinew of the hip.
  footnotes:
  - marker: a
    text: Or “the Israelites”; Hebrew “the sons of Israel.”
    reason: lexical_alternative
  - marker: b
    text: The Hebrew expression traditionally refers to a specific sinew near the hip/thigh area; some identify it more specifically as the sciatic nerve or tendon.
    reason: cultural_note
  - marker: c
    text: Or 'the sinew of the hip that is on the socket of the thigh'.
    reason: previous_rendering
  - marker: d
    text: Or 'thigh,,'.
    reason: previous_rendering
