translation:
  language: es
  text: y para que los muros de Jerusalén sean reconstruidos y fortificados por todos lados[a], el gasto será pagado por disposición del rey, y para que también sean reconstruidos los muros de Judea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «el gasto será pagado de los fondos del rey». La frase griega «del λόγος del rey» puede llevar un sentido administrativo o de autoridad oficial; el texto principal adopta «por disposición del rey» para reflejar esa ambigüedad sin excluir el matiz financiero.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκοδομηθῆναι
  english_pob_choice: to be rebuilt
  chosen_spanish: sean reconstruidos
  alternatives_spanish:
  - sean edificados de nuevo
  - sean construidos de nuevo
  lexicon: LSJ
  rationale: El infinitivo pasivo en contexto de restauración defensiva expresa reconstrucción; «sean reconstruidos» preserva el sentido de rehacer unas estructuras ya existentes sin volverlo demasiado técnico o paraprástico.
- source_word: τείχη
  english_pob_choice: walls
  chosen_spanish: muros
  alternatives_spanish:
  - murallas
  - paredes
  lexicon: LSJ
  rationale: En un contexto urbano y defensivo, «muros» es claro y natural en español; «murallas» también sería posible, pero «muros» mantiene una correspondencia más directa y sobria.
- source_word: ὀχυρῶσαι
  english_pob_choice: fortified
  chosen_spanish: fortificados
  alternatives_spanish:
  - fortalecidos
  - hechos seguros
  lexicon: LSJ
  rationale: El verbo expresa hacer seguro o defender; «fortificados» conserva la fuerza militar-defensiva del griego y funciona bien con «por todos lados».
- source_word: κυκλόθεν
  english_pob_choice: all around
  chosen_spanish: por todos lados
  alternatives_spanish:
  - alrededor
  - en torno
  lexicon: LSJ
  rationale: La locución adverbial comunica la extensión envolvente del refuerzo; «por todos lados» es idiomática y transmite la cobertura completa del perímetro.
- source_word: δαπάνη
  english_pob_choice: expense
  chosen_spanish: el gasto
  alternatives_spanish:
  - el costo
  - la erogación
  lexicon: LSJ
  rationale: En un contexto de financiación de obras, «gasto» comunica con claridad el desembolso requerido. «Erogación» sería más administrativa, pero menos accesible.
- source_word: δοθήσεται
  english_pob_choice: will be paid
  chosen_spanish: será pagado
  alternatives_spanish:
  - será dado
  - será provisto
  lexicon: LSJ
  rationale: Aunque literalmente significa «será dado», en relación con δαπάνη el sentido financiero domina; «será pagado» expresa con precisión el suministro de fondos para la obra.
- source_word: ἐκ τοῦ λόγου τοῦ βασιλέως
  english_pob_choice: from the king’s treasury
  chosen_spanish: de la tesorería del rey
  alternatives_spanish:
  - por orden del rey
  - de la cuenta del rey
  - de la palabra del rey
  lexicon: LSJ
  rationale: Sigo la decisión inglesa revisada de entender λόγος en un marco administrativo-financiero. «Tesorería» no traduce literalmente λόγος, pero en español formal comunica mejor la fuente del dinero sin introducir una expresión extraña como «cuenta».
- source_word: Ἰουδαίᾳ
  english_pob_choice: Judea
  chosen_spanish: Judea
  alternatives_spanish:
  - la región de Judea
  - Judá
  lexicon: LSJ
  rationale: El topónimo se refiere al territorio helenístico de Judea; mantener «Judea» evita confundirlo con Judá como designación tribal o más antigua.
theological_decisions:
- issue: Sentido de λόγος aplicado al rey
  english_pob_reading: the expense will be paid from the king’s treasury; the phrase can also suggest payment by the king’s decree/order
  chosen_spanish_reading: el gasto será pagado de la tesorería del rey, con la posibilidad implícita de una orden real de financiación
  alternative_spanish_readings:
  - el gasto será provisto por orden del rey
  - el gasto será pagado de la cuenta del rey
  rationale: No hay una cuestión doctrinal directa, pero sí una ambigüedad semántica relevante. El español principal sigue el matiz financiero de la lectura inglesa, mientras la nota preserva la alternativa de autoridad/decreto para no borrar la tensión del griego.
  doctrine_reference: none
translation_notes:
  revision_awareness: 'El borrador sigue la revisión inglesa más reciente en dos puntos: traduce la fuente del gasto con lenguaje de tesorería y conserva la cláusula final como infinitivo de propósito («para que los muros en Judea sean reconstruidos»), en lugar de convertirla en un añadido explicativo. También evita forzar una equivalencia mecánica de λόγος como «palabra» en el texto principal, pero mantiene la ambigüedad en nota.'
  spanish_consistency_notes:
  - Se conserva un registro formal y bíblico, sin arcaísmos innecesarios.
  - «Judea» se mantiene como topónimo geográfico estándar.
  - La repetición de «sean reconstruidos» refleja las dos cláusulas paralelas del griego.
  - «Fortificados por todos lados» preserva el complemento adverbial de cobertura total.
  - La nota al pie usa un marcador único y corresponde exactamente al término con ambigüedad semántica.
