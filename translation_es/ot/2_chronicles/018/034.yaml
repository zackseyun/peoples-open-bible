translation:
  language: es
  text: Y la batalla se intensificó aquel día, y el rey de Israel permaneció en pie en el carro de guerra, frente a Aram, hasta el atardecer; y murió al tiempo de la puesta del sol[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al ponerse el sol» o «cuando se ponía el sol».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעַל
  english_pob_choice: intensified
  chosen_spanish: se intensificó
  alternatives_spanish:
  - subió
  - arreció
  - se hizo más fuerte
  lexicon: HALOT
  rationale: El hebreo con ‘la batalla’ como sujeto expresa aumento de intensidad, no solo movimiento espacial. ‘Se intensificó’ conserva ese sentido natural en español sin perder el valor narrativo del verbo.
- source_word: הַמִּלְחָמָה
  english_pob_choice: the battle
  chosen_spanish: la batalla
  alternatives_spanish:
  - el combate
  - la guerra
  - el enfrentamiento
  lexicon: HALOT
  rationale: En este contexto se trata del episodio bélico concreto, por lo que ‘batalla’ es preciso y claro en español.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - ese día
  - en aquel día
  lexicon: HALOT
  rationale: La expresión temporal hebrea se naturaliza bien como ‘aquel día’, que conserva la referencia demostrativa y suena idiomático.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: the king of Israel
  chosen_spanish: el rey de Israel
  alternatives_spanish:
  - el rey de Israel
  - el monarca de Israel
  lexicon: HALOT
  rationale: Construcción nominal directa; ‘rey de Israel’ reproduce con fidelidad la relación posesiva y mantiene el registro bíblico.
- source_word: הָיָה מַעֲמִיד
  english_pob_choice: remained standing
  chosen_spanish: permanecía en pie
  alternatives_spanish:
  - seguía en pie
  - quedaba en pie
  - estaba manteniéndose en pie
  lexicon: HALOT
  rationale: La construcción con היה + participio expresa continuidad de acción/estado. ‘Permanecía en pie’ preserva la duración y comunica en español la idea de mantenerse erguido en el carro.
- source_word: בַּמֶּרְכָּבָה
  english_pob_choice: in the chariot
  chosen_spanish: en el carro
  alternatives_spanish:
  - en el carro de guerra
  - en su carro
  - en la carroza
  lexicon: HALOT
  rationale: ‘מֶרְכָּבָה’ aquí se refiere al carro de guerra; ‘carro’ es la forma más sobria y reconocible en español bíblico, sin añadir posesivo no explícito.
- source_word: נֹכַח אֲרָם
  english_pob_choice: facing Aram
  chosen_spanish: frente a Aram
  alternatives_spanish:
  - enfrentando a Aram
  - opuesto a Aram
  - ante Aram
  lexicon: HALOT
  rationale: ‘נֹכַח’ indica estar frente/opuesto. ‘Frente a Aram’ comunica la orientación espacial y el matiz de confrontación sin sobreespecificar.
- source_word: עַד הָעָרֶב
  english_pob_choice: until the evening
  chosen_spanish: hasta el atardecer
  alternatives_spanish:
  - hasta la tarde
  - hasta el anochecer
  - hasta la noche
  lexicon: HALOT
  rationale: ‘Hasta el atardecer’ refleja bien el límite temporal y evita ambigüedad entre tarde y noche.
- source_word: וַיָּמָת
  english_pob_choice: and he died
  chosen_spanish: y murió
  alternatives_spanish:
  - y falleció
  - y expiró
  lexicon: HALOT
  rationale: Verbo narrativo directo, equivalente al avance secuencial del waw consecutivo, sin agregar matices no presentes.
- source_word: לְעֵת בּוֹא הַשָּׁמֶשׁ
  english_pob_choice: at the time of the sun’s going down
  chosen_spanish: al tiempo de la puesta del sol
  alternatives_spanish:
  - cuando se ponía el sol
  - al ponerse el sol
  - al atardecer
  lexicon: HALOT
  rationale: La expresión hebrea es un poco más explícita que ‘atardecer’. ‘Al tiempo de la puesta del sol’ conserva el carácter verbal de ‘la llegada/caída del sol’ y sigue siendo publicable en español.
translation_notes:
  revision_awareness: El texto inglés auditado mantuvo la lectura de intensificación de la batalla, conservó ‘Aram’ como nombre propio y expresó la muerte con una referencia temporal algo más explícita que ‘sunset’. La redacción española sigue esas decisiones, ajustando la sintaxis para que suene natural en español sin perder el valor semántico del hebreo.
  spanish_consistency_notes:
  - Se conservó ‘Aram’ como nombre propio, en continuidad con la política de transliteración del proyecto.
  - Se usó ‘Yahvé’ solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - ‘Carro’ se prefirió a ‘carroza’ por su adecuación al contexto militar bíblico.
  - La nota textual se ancló en la frase temporal porque ahí reside la única alternativa lexical relevante del audit trail.
