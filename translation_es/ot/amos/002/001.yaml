translation:
  language: es
  text: 'Así dice Yahvé: «Por tres transgresiones[a] de Moab, y por cuatro, no lo revocaré[b], porque quemó los huesos del rey de Edom hasta reducirlos a cal[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Transgresiones» conserva el matiz de rebelión o ruptura grave mejor que «delitos».
    reason: lexical_alternative
  - marker: b
    text: 'O: «no lo haré volver atrás»; es decir, no revertiré el juicio anunciado.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «en cal» o «en yeso»; el hebreo se refiere a quemar los huesos tan completamente que quedaron reducidos a cal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así dice el SEÑOR
  - Esto dice Yahvé
  - Así ha dicho Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se conserva de manera natural en español con «Así dice». Se mantiene «Yahvé» para el nombre divino, conforme al criterio del proyecto y al testimonio directo del hebreo יְהוָה.
- source_word: עַל שְׁלֹשָׁה פִּשְׁעֵי מוֹאָב וְעַל אַרְבָּעָה
  english_pob_choice: For three transgressions of Moab, and for four
  chosen_spanish: Por tres transgresiones de Moab, y por cuatro
  alternatives_spanish:
  - A causa de tres transgresiones de Moab, y aun de cuatro
  - Por tres delitos de Moab, y por cuatro
  lexicon: HALOT
  rationale: «Transgresiones» conserva el matiz moral y de rebelión de פֶּשַׁע mejor que «delitos». La secuencia numérica se mantiene como fórmula retórica hebrea, sin explicitar más de lo que el texto dice.
- source_word: לֹא אֲשִׁיבֶנּוּ
  english_pob_choice: I will not revoke it
  chosen_spanish: no lo revocaré
  alternatives_spanish:
  - no lo retiraré
  - no lo revertiré
  - no me retractaré de ello
  lexicon: HALOT
  rationale: El hebreo significa literalmente «no lo haré volver atrás». En contexto profético, se refiere a no anular ni revertir el juicio anunciado. «Revocar» comunica bien esa fuerza en español y permite conservar el objeto pronominal.
- source_word: עַל שָׂרְפוֹ
  english_pob_choice: because he burned
  chosen_spanish: porque quemó
  alternatives_spanish:
  - porque él quemó
  - a causa de que quemó
  - por haber quemado
  lexicon: HALOT
  rationale: La preposición עַל introduce aquí la base causal del juicio. Se mantiene el sujeto singular implícito con «quemó», respetando la forma verbal singular del hebreo y la personificación/corporación de Moab.
- source_word: עַצְמוֹת מֶלֶךְ אֱדוֹם
  english_pob_choice: the bones of the king of Edom
  chosen_spanish: los huesos del rey de Edom
  alternatives_spanish:
  - los huesos del rey edomita
  - los huesos del monarca de Edom
  lexicon: HALOT
  rationale: La cadena constructa es directa; «rey de Edom» conserva la relación nominal sin añadir glosas. «Huesos» mantiene el objeto de la profanación con claridad.
- source_word: לַשִּׂיד
  english_pob_choice: to lime
  chosen_spanish: a cal
  alternatives_spanish:
  - hasta cal
  - para cal
  - hasta reducirlos a cal
  lexicon: HALOT
  rationale: שִׂיד designa cal o material calcáreo; en español, dentro de la expresión «reducirlos a cal» se evita un calco áspero y se mantiene la imagen de destrucción extrema. La frase completa «hasta reducirlos a cal» hace explícito el resultado inferido por el contexto.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrama. Conforme al estándar del proyecto, se traduce con «Yahvé» en lugar de la convención de ocultarlo con mayúsculas o reemplazarlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de la fórmula de juicio «no lo revocaré»
  english_pob_reading: I will not revoke it
  chosen_spanish_reading: no lo revocaré
  alternative_spanish_readings:
  - no lo retiraré
  - no lo anularé
  - no me retractaré de ello
  rationale: En el contexto de Amos, la frase expresa la irrevocabilidad del juicio divino ya anunciado. «No lo revocaré» preserva esa tensión entre literalidad e interpretación contextual sin diluir la fuerza judicial del oráculo.
  doctrine_reference: Amós 2:1; fórmula profética de juicio irreversible
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo WLC y concuerda con el audit trail inglés: se conserva la fórmula profética, el valor causal de עַל, el singular verbal de אֲשִׁיבֶנּוּ y el resultado extremo de לַשִּׂיד. Se ajusta el nombre divino al estándar español del proyecto («Yahvé») en coherencia con el texto fuente y con la política terminológica dada.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo numérico «Por tres..., y por cuatro» sin explicitar «pecados» ni «crímenes».
  - «Transgresiones» conserva el peso moral de פִּשְׁעֵי.
  - «No lo revocaré» usa un verbo jurídico-natural en español para el hebreo idiomático de no revertir la sentencia.
  - «Hasta reducirlos a cal» traduce el resultado de לַשִּׂיד con naturalidad y sin perder la idea de extrema profanación.
  - Se usa «Yahvé» consistentemente para יְהוָה, según la política del proyecto.
