  text: מְזָוֵ֣י/נוּ מְלֵאִים֮ מְפִיקִ֥ים מִ/זַּ֗ן אֶ֫ל זַ֥ן צֹאונֵ֣/נוּ מַ֭אֲלִיפוֹת מְרֻבָּב֗וֹת בְּ/חוּצוֹתֵֽי/נוּ־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/144/013.yaml
  text: May our storehouses be full[a], providing every kind of produce; may our flocks be multiplied by thousands, by tens of thousands[b], in our streets.
  footnotes:
  - marker: a
    text: Literally, 'from kind to kind.' The phrase expresses abundance in many varieties of produce.
    reason: lexical_alternative
  - marker: b
    text: Or 'in our streets.' The Hebrew term can refer to open places outside or within a settlement; here the pastoral context may favor 'open fields' or 'outskirts.'
    reason: lexical_alternative
