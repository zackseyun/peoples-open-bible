id: 1JN.3.17
reference: 1 John 3:17
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὃς δ’ ἂν ἔχῃ τὸν βίον τοῦ κόσμου καὶ θεωρῇ τὸν ἀδελφὸν αὐτοῦ χρείαν ἔχοντα καὶ κλείσῃ τὰ σπλάγχνα αὐτοῦ ἀπ’ αὐτοῦ, πῶς ἡ ἀγάπη τοῦ θεοῦ μένει ἐν αὐτῷ;
base_translation:
  language: en
  yaml_path: translation/nt/1_john/003/017.yaml
  text: But whoever has the world's goods and sees his brother in need[c][b][a], yet closes his heart against him—how does the love of God remain in him?
  footnotes:
  - marker: a
    text: Or 'brother or sister'; the Greek says 'brother' and may refer representatively to a fellow believer.
    reason: lexical_alternative
  - marker: b
    text: Or 'shuts his compassion from him'; literally, 'closes his inward parts from him,' an idiom for withholding heartfelt compassion.
    reason: lexical_alternative
  - marker: c
    text: '''The love of God'' may mean God''s love present in him, or his love for God.'
    reason: alternative_reading
translation:
  language: ko
  text: 그러나 누구든지 세상의 생활 수단을 가지고 있으면서 자기 형제가 궁핍한 것을 보고도 그에게 자기 마음을 닫는다면, 어떻게 하나님의 사랑이 그 사람 안에 머물 수 있겠습니까?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὸν βίον τοῦ κόσμου
  english_pob_choice: world's goods
  chosen_korean: 세상의 생활 수단
  alternatives_korean:
  - 세상의 재물
  - 이 세상의 생계
  lexicon: BDAG
  rationale: βίος는 외적 삶·생계의 수단(소유). 「생활 수단」으로 옮겨 단순 「재물」보다 일상적 자원의 함의를 살린다.
- source_word: τὰ σπλάγχνα αὐτοῦ
  english_pob_choice: his heart / inward affections
  chosen_korean: 자기 마음
  alternatives_korean:
  - 자기 동정
  - 자기 긍휼
  lexicon: BDAG
  rationale: σπλάγχνα는 본래 「내장」 — 깊은 동정·긍휼의 자리. 한국어 관용으로 「마음」이 가장 자연스럽다(「창자」는 어색).
