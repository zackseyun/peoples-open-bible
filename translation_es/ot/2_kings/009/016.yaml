translation:
  language: es
  text: Así que Jehú montó y fue a Jezreel, porque Joram estaba acostado allí, y Ahazías, rey de Judá, había bajado a ver[a] a Joram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «a ver a Joram»; es decir, para visitarlo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְכַּב
  english_pob_choice: mounted up
  chosen_spanish: montó
  alternatives_spanish:
  - subió
  - se montó
  lexicon: HALOT
  rationale: El hebreo expresa la acción concreta de montar un medio de transporte; en español, «montó» comunica esa acción con naturalidad. Se evita una paráfrasis como «subió» que perdería precisión, y no se añade «arriba» porque no es necesario en español.
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - partió
  - se encaminó
  lexicon: HALOT
  rationale: הלך es el verbo básico de ir. «Fue» es la correspondencia más directa y natural en español, manteniendo la secuencia narrativa sin exagerar el matiz del desplazamiento.
- source_word: יִזְרְעֶאלָה
  english_pob_choice: to Jezreel
  chosen_spanish: a Jezreel
  alternatives_spanish:
  - hacia Jezreel
  - para Jezreel
  lexicon: HALOT
  rationale: La he direccional marca movimiento hacia el lugar. En español, la preposición «a» transmite bien esa dirección de manera idiomática.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la causa de la ida de Jehú. «Porque» conserva la relación causal de forma clara y directa.
- source_word: שֹׁכֵב
  english_pob_choice: was lying
  chosen_spanish: estaba allí
  alternatives_spanish:
  - estaba acostado allí
  - yací­a allí
  lexicon: HALOT
  rationale: El participio literalmente significa «estar acostado/estar tendido». En este contexto, la idea relevante para el movimiento de Jehú es que Joram seguía presente en el lugar. «Estaba allí» mantiene la referencia locativa sin forzar un español rígido; la nota conserva la alternativa más literal «estar tendido/acostado» implícita en el original.
- source_word: שָׁמָּה
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: Adverbio locativo simple. «Allí» reproduce de manera natural la referencia al lugar ya mencionado.
- source_word: יָרַד
  english_pob_choice: had gone down
  chosen_spanish: había bajado
  alternatives_spanish:
  - bajó
  - había descendido
  lexicon: HALOT
  rationale: El perfecto hebreo aquí funciona como acción anterior respecto de la ida de Jehú; el pluscuamperfecto español «había bajado» refleja bien esa anterioridad y conserva el matiz topográfico de ירד.
- source_word: לִרְאוֹת אֶת
  english_pob_choice: to see
  chosen_spanish: a ver
  alternatives_spanish:
  - para ver
  - a visitar
  lexicon: HALOT
  rationale: Literalmente es «ver a». Aunque el contexto sugiere una visita, el español puede preservar el valor más directo con «a ver», que sigue siendo idiomático y deja que el contexto comunique el propósito de la visita.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  lexicon: HALOT
  rationale: Cadena constructa estándar; se traduce de manera directa y transparente.
- source_word: יֵהוּא / יוֹרָם / אֲחַזְיָה / יִזְרְעֶאל / יְהוּדָה
  english_pob_choice: Jehu / Joram / Ahaziah / Jezreel / Judah
  chosen_spanish: Jehú / Joram / Ahazías / Jezreel / Judá
  alternatives_spanish:
  - Jehú / Jehoram / Ocozías / Jezreel / Judá
  lexicon: Transliteración estándar
  rationale: Se conservan los nombres propios en formas españolas reconocibles y consistentes con la tradición bíblica en español. Se mantiene «Joram» para יוֹרָם, siguiendo la forma convencional utilizada aquí; «Jehoram» es una alternativa posible pero no necesaria en este pasaje.
translation_notes:
  revision_awareness: El borrador sigue el pasaje hebreo masorético y concuerda con la lectura auditada en inglés POB; no se requieren revisiones textuales ni ajustes por variantes en esta unidad.
  spanish_consistency_notes:
  - Se usa «Jehú», «Joram», «Ahazías», «Jezreel» y «Judá» de forma consistente con la transliteración española usual.
  - 'Se preserva el orden narrativo del hebreo: montaje de Jehú, marcha a Jezreel, explicación causal, y antecedente temporal de Ahazías.'
  - La nota de pie sobre «a ver» mantiene la alternativa semántica de «visitar» sin imponerla en el texto principal.
