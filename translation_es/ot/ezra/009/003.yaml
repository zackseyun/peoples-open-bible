translation:
  language: es
  text: En cuanto oí este asunto[a], rasgué mi ropa y mi manto, me arranqué algunos cabellos de mi cabeza y de mi barba[b], y me senté consternado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cuando oí este informe, rasgué mi ropa y mi manto ... y quedé atónito»'
    reason: lexical_alternative
  - marker: b
    text: Rasgar las vestiduras y arrancarse el cabello eran expresiones habituales de duelo, horror o luto.
    reason: cultural_note
lexical_decisions:
- source_word: וּכְשָׁמְעִי
  english_pob_choice: As soon as I heard
  chosen_spanish: Y cuando oí
  alternatives_spanish:
  - En cuanto oí
  - Tan pronto como oí
  lexicon: HALOT
  rationale: El hebreo introduce una cláusula temporal inmediata. En español, 'y cuando oí' mantiene la secuencia narrativa y la reacción súbita sin forzar una fórmula demasiado interpretativa.
- source_word: הַדָּבָר הַזֶּה
  english_pob_choice: this matter
  chosen_spanish: este asunto
  alternatives_spanish:
  - esta cosa
  - este reporte
  - esta palabra
  lexicon: HALOT
  rationale: דָּבָר puede significar 'palabra', 'cosa' o 'asunto'. Aquí se trata de una situación referida, no de un dicho aislado; 'asunto' preserva el alcance semántico y suena natural en español.
- source_word: קָרַעְתִּי
  english_pob_choice: I tore
  chosen_spanish: rasgué
  alternatives_spanish:
  - desgarré
  - rompí
  lexicon: HALOT
  rationale: El verbo describe el desgarramiento de ropa como gesto de duelo o horror. 'Rasgué' comunica bien la acción ritual y solemne en español contemporáneo.
- source_word: בִּגְדִי
  english_pob_choice: my garment
  chosen_spanish: mi ropa
  alternatives_spanish:
  - mi vestido
  - mis prendas
  lexicon: HALOT
  rationale: Aunque el hebreo singular puede conservarse, en español 'mi ropa' transmite de forma natural la prenda rasgada sin sonar artificial. La pareja con 'mi manto' mantiene la distinción de vestiduras.
- source_word: וּמְעִילִי
  english_pob_choice: my robe
  chosen_spanish: mi manto
  alternatives_spanish:
  - mi capa
  - mi sobrerropa
  lexicon: HALOT
  rationale: מְעִיל suele referirse a un manto o vestidura exterior. 'Manto' es una equivalencia sobria y transparente, más adecuada que 'robe' como préstamo semántico.
- source_word: וָאֶמְרְטָה
  english_pob_choice: pulled out
  chosen_spanish: me arranqué
  alternatives_spanish:
  - me saqué
  - me plumé
  lexicon: HALOT
  rationale: El verbo expresa la remoción forzada del cabello. 'Me arranqué' conserva la violencia del gesto y funciona de manera idiomática en español.
- source_word: מִשְּׂעַר רֹאשִׁי וּזְקָנִי
  english_pob_choice: some of the hair of my head and my beard
  chosen_spanish: algunos cabellos de la cabeza y de la barba
  alternatives_spanish:
  - cabellos de mi cabeza y de mi barba
  - parte del cabello de mi cabeza y de mi barba
  lexicon: HALOT
  rationale: El prefijo מִן sugiere extracción desde entre el cabello, no necesariamente todo el cabello. 'Algunos cabellos' explicita ese matiz partitivo sin añadir más de lo que el texto permite.
- source_word: וָאֵשְׁבָה
  english_pob_choice: and sat
  chosen_spanish: y me senté
  alternatives_spanish:
  - y quedé sentado
  - y permanecí sentado
  lexicon: HALOT
  rationale: El verbo es el común 'sentarse'. 'Me senté' conserva la progresión narrativa directa y sencilla.
- source_word: מְשׁוֹמֵם
  english_pob_choice: appalled
  chosen_spanish: desolado
  alternatives_spanish:
  - consternado
  - horrorizado
  - atónito
  lexicon: HALOT
  rationale: El participio puede expresar devastación, desolación o shock. 'Desolado' recoge el estado interior resultante en un español digno; no se reduce a mera sorpresa, como podría hacerlo 'atónito'.
theological_decisions:
- issue: Gestos de duelo y horror como práctica cultural expresiva
  english_pob_reading: Tearing garments and pulling out hair were customary expressions of grief, horror, or mourning.
  chosen_spanish_reading: Rasgar la ropa y arrancarse cabellos se entiende como una expresión cultural de duelo, horror o luto.
  alternative_spanish_readings:
  - Solo describe una reacción emocional espontánea
  - Se trata de un rito penitencial formal
  rationale: El texto hebreo narra acciones corporales convencionales asociadas al dolor extremo. Conviene preservar su valor cultural sin convertirlas en un rito técnico ni despojarse de su fuerza emocional.
  doctrine_reference: Antropología bíblica y expresiones corporales del duelo en el AT
translation_notes:
  revision_awareness: Se ha mantenido la lectura de alta concordancia del texto fuente y del audit trail inglés. No se aplicaron revisiones posteriores al contenido base; la traducción conserva la secuencia verbal, el paralelismo de las vestiduras y el valor expresivo de la última forma participial.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el hebreo contiene el nombre divino; aquí no aparece.
  - Se mantiene una traducción sobria de los gestos de luto sin suavizarlos ni tecnificarlos.
  - '''Manto'' se usa para מְעִיל como vestidura exterior, coherente con el registro bíblico en español.'
  - '''Desolado'' conserva la tensión entre devastación interior y shock inmediato, evitando un mero ''asombrado''.'
