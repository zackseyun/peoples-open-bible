- from: El Señor se volvió como enemigo; tragó a Israel. Tragó todas sus habitaciones[a]; destruyó sus fortalezas, y multiplicó en la Hija de Judá duelo y lamento.
  to: El Señor se volvió como enemigo; tragó a Israel. Tragó todos sus palacios; destruyó sus fortalezas[a], y multiplicó en la Hija de Judá duelo y lamento.
