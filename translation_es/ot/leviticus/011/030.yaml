translation:
  language: es
  text: la salamanquesa[a], el varano, el lagarto, el lagarto de arena y el camaleón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La identificación exacta de varios animales en este versículo es incierta. Entre las propuestas tradicionales y modernas se incluyen: para «salamanquesa», quizá «comadreja» o «musaraña»; para «varano», quizá «camaleón»; para «lagarto de arena», quizá «eslizón» o, en la tradición antigua, «caracol»; para «camaleón», quizá «topo» u otro tipo de lagarto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֲנָקָה
  english_pob_choice: the gecko
  chosen_spanish: la salamanquesa
  alternatives_spanish:
  - el gecko
  - la salamanquesa gecko
  - la lagartija
  lexicon: HALOT, BDB
  rationale: El hebreo designa un animal reptiliano de identificación incierta. En español, «salamanquesa» es una opción natural y reconocible para un pequeño reptil trepador, sin forzar una precisión zoológica que la evidencia no garantiza. Mantiene el carácter de criatura reptiliana del contexto mejor que un mamífero o una transliteración cruda.
- source_word: הַכֹּחַ
  english_pob_choice: the monitor lizard
  chosen_spanish: el varano
  alternatives_spanish:
  - el monitor
  - el lagarto monitor
  - el camaleón
  lexicon: HALOT, BDB
  rationale: La POB inglesa opta por una especie grande de lagarto, pero reconoce incertidumbre. «Varano» conserva el valor de lagarto grande y distingue este término de los otros reptiles de la lista, sin imponer una identificación más precisa de la que permite el hebreo.
- source_word: הַלְּטָאָה
  english_pob_choice: the lizard
  chosen_spanish: el lagarto
  alternatives_spanish:
  - la lagartija
  - el lagarto común
  - la salamanquesa
  lexicon: HALOT, BDB
  rationale: Aquí el inglés usa un término genérico. En español, «lagarto» comunica bien la categoría amplia de reptil del texto sin añadir especificación innecesaria. «Lagartija» sería posible, pero puede sonar demasiado pequeño o específico frente al valor genérico del término.
- source_word: הַחֹמֶט
  english_pob_choice: the sand lizard
  chosen_spanish: el lagarto de arena
  alternatives_spanish:
  - el eslizón
  - el lagarto arenal
  - la salamanquesa
  lexicon: HALOT, BDB
  rationale: La POB inglesa conserva una identificación zoológica probable pero no segura. «Lagarto de arena» sigue esa línea y refleja adecuadamente el matiz descriptivo sin introducir una certeza que el hebreo no impone.
- source_word: הַתִּנְשָׁמֶת
  english_pob_choice: the chameleon
  chosen_spanish: el camaleón
  alternatives_spanish:
  - el topo
  - otro tipo de lagarto
  lexicon: HALOT, BDB
  rationale: En este contexto de reptiles, la lectura como reptil es la que mejor encaja. «Camaleón» sigue la decisión inglesa y es inteligible para el lector español, preservando la incertidumbre taxonómica general mediante nota.
theological_decisions:
- issue: Identificación incierta de los animales enumerados
  english_pob_reading: The exact identification of several animals in this verse is uncertain...
  chosen_spanish_reading: La identificación exacta de varios animales de este versículo es incierta...
  alternative_spanish_readings:
  - La identificación precisa de varios animales de este versículo no puede determinarse con certeza...
  - No se conoce con exactitud qué animales son varios de los mencionados aquí...
  rationale: El valor del texto no depende de una taxonomía moderna segura, sino de la lista de criaturas impuras. La traducción debe conservar esa incertidumbre y no resolverla de manera dogmática. La nota recoge alternativas tradicionales y modernas, como hace la POB inglesa.
  doctrine_reference: Principio de cautela exegética y honestidad textual; no aplica una doctrina específica, sino una decisión hermenéutica sobre terminología zoológica.
translation_notes:
  revision_awareness: 'Coincide con el pasaje base en el estado más reciente del proyecto: el audit trail inglés indica que no hubo revisiones aplicadas y que el revisor final marcó alta concordancia. Por eso se mantiene la misma estrategia de cautela léxica y se preserva la incertidumbre zoológica en nota.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el tetragrámaton aparezca; aquí no aplica.
  - Se mantiene el registro nominal de una lista zoológica, sin añadir conectores explicativos fuera de la fuente.
  - Se evita «SEÑOR» o una paráfrasis interpretativa, porque el versículo no contiene el nombre divino.
  - La secuencia de cinco términos se conserva completa y en el mismo orden del hebreo y de la POB inglesa.
