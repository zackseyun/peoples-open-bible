translation:
  language: es
  text: No segarás lo que crezca por sí solo de tu cosecha[a], ni vendimiarás las uvas de tu vid sin podar[b]; será un año de completo reposo[c] para la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "crecimiento espontáneo" o "rebrote" para "lo que crezca por sí solo".'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: "las uvas de tu vid separada/sin podar"; el hebreo se refiere a una vid dejada sin cultivar durante el año sabático.'
    reason: lexical_alternative
  - marker: c
    text: 'O: "un año sabático" o "un año de reposo solemne".'
    reason: lexical_alternative
lexical_decisions:
- source_word: סְפִיחַ
  english_pob_choice: aftergrowth
  chosen_spanish: brote
  alternatives_spanish:
  - crecimiento espontáneo
  - rebrote
  - producción espontánea
  lexicon: HALOT
  rationale: El término se refiere a lo que brota por sí mismo después de la cosecha, no a un cultivo sembrado deliberadamente. 'Brote' conserva la idea de crecimiento espontáneo y es natural en español, aunque no agota por sí solo la matiz de 'aftergrowth'.
- source_word: קְצִירְךָ
  english_pob_choice: your harvest
  chosen_spanish: tu cosecha
  alternatives_spanish:
  - tu siega
  - tu recolección
  lexicon: HALOT
  rationale: '''Cosecha'' comunica de manera clara y general el campo productivo referido por el constructo. ''Siega'' sería más estrecha y algo más técnica; ''recolección'' suena menos agrícola en este contexto.'
- source_word: תִקְצֹר
  english_pob_choice: reap
  chosen_spanish: cosecharás
  alternatives_spanish:
  - segarás
  - siegares
  - recogerás
  lexicon: HALOT
  rationale: Aunque 'reap' suele corresponder a 'segar', en español 'cosechar' resulta más natural y abarca el acto agrícola exigido por el contexto. Se evita un calco forzado que sonaría menos idiomático.
- source_word: עִנְּבֵי
  english_pob_choice: the grapes of
  chosen_spanish: las uvas de
  alternatives_spanish:
  - los racimos de
  - las uvas de entre
  lexicon: HALOT
  rationale: El sustantivo designa uvas; 'las uvas de' conserva la relación constructa sin introducir precisión no atestiguada por el hebreo.
- source_word: נְזִירֶךָ
  english_pob_choice: your unpruned vine
  chosen_spanish: tu vid sin podar
  alternatives_spanish:
  - tu vid no podada
  - tu vid dejada aparte
  - tu vid apartada
  lexicon: HALOT
  rationale: En este contexto agrícola el término alude a la vid dejada sin cultivar/podar durante el año sabático. 'Sin podar' expresa bien el sentido práctico y evita la falsa asociación con 'nazareo'.
- source_word: תִבְצֹר
  english_pob_choice: gather
  chosen_spanish: vendimiarás
  alternatives_spanish:
  - recogerás
  - cortarás
  - juntarás
  lexicon: HALOT
  rationale: El verbo se usa específicamente para la recolección de uvas. 'Vendimiar' conserva la especificidad vitivinícola mejor que un verbo más general.
- source_word: שְׁנַת שַׁבָּתוֹן
  english_pob_choice: a year of complete rest
  chosen_spanish: un año de completo reposo
  alternatives_spanish:
  - un año de reposo total
  - un año de descanso solemne
  - un año sabático
  lexicon: HALOT
  rationale: '''שַׁבָּתוֹן'' intensifica la idea de reposo sabático. ''Completo reposo'' transmite esa fuerza sin convertir la expresión en una mera etiqueta calendárica.'
- source_word: לָאָרֶץ
  english_pob_choice: for the land
  chosen_spanish: para la tierra
  alternatives_spanish:
  - para el país
  - para el suelo
  lexicon: HALOT
  rationale: En Levítico 25 el referente es la tierra cultivable. 'Tierra' es la correspondencia más natural en español y mantiene el sentido agrícola concreto.
theological_decisions:
- issue: Terminología del año sabático sin sustituir el matiz intensificado de שַׁבָּתוֹן
  english_pob_reading: a year of complete rest for the land
  chosen_spanish_reading: un año de completo reposo para la tierra
  alternative_spanish_readings:
  - un año sabático para la tierra
  - un año de reposo solemne para la tierra
  rationale: La opción mantiene la idea de reposo sabático y refleja el énfasis de שַׁבָּתוֹן sin reducirlo a una simple etiqueta litúrgica. 'Reposo' conserva mejor la resonancia bíblica del mandamiento que 'descanso' en este marco legal.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: El pasaje coincide con la revisión más reciente sin cambios sustantivos; se mantiene la lectura auditada de alto acuerdo entre el hebreo, la propuesta inglesa y el control de revisión.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' por defecto del proyecto solo cuando el texto lo requiera; este versículo no lo contiene.
  - '''Vid'' se usa para נְזִירֶךָ por ser el término natural en el contexto vitícola.'
  - Se preserva la fuerza sabática con 'reposo' y no se rebaja a un simple descanso común.
  - 'La sintaxis sigue el paralelismo del hebreo: prohibición de recolección de campos y de viñas, seguida de la cláusula de estado para la tierra.'
