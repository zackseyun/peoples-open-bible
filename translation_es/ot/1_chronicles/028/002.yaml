translation:
  language: es
  text: 'Entonces el rey David se puso de pie y dijo: «Escúchenme, mis hermanos[a] y mi pueblo. Estaba en mi corazón construir una casa de reposo[b] para el arca del pacto de Yahvé, y para el estrado[c] de nuestro Dios, e hice preparativos para construirla».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo dice literalmente «mis hermanos», una forma masculina plural usada en una dirección pública; también puede entenderse en sentido amplio como parientes o compatriotas.
    reason: lexical_alternative
  - marker: b
    text: «Casa de reposo» también puede traducirse «lugar de reposo», refiriéndose a una morada estable para el arca.
    reason: lexical_alternative
  - marker: c
    text: Es decir, el arca se describe como el estrado asociado a la presencia de nuestro Dios; compárese con Salmo 132:7. La imagen hebrea subyacente es la del apoyo de los pies.
    reason: cross_reference
lexical_decisions:
- source_word: וַיָּקָם ... עַל רַגְלָיו
  english_pob_choice: rose to his feet
  chosen_spanish: se puso de pie
  alternatives_spanish:
  - se levantó
  - se alzó sobre sus pies
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática; en español, «se puso de pie» comunica el acto de levantarse para hablar con naturalidad y mantiene la solemnidad narrativa.
- source_word: שְׁמָעוּנִי
  english_pob_choice: Hear me
  chosen_spanish: Escúchenme
  alternatives_spanish:
  - Óiganme
  - Atiéndanme
  lexicon: HALOT
  rationale: El imperativo plural con sufijo de 1.ª persona exige un plural respetuoso. «Escúchenme» conserva el tono de exhortación pública.
- source_word: אַחַי
  english_pob_choice: my brothers
  chosen_spanish: mis hermanos
  alternatives_spanish:
  - mis parientes
  - mis hermanos y hermanas
  lexicon: HALOT
  rationale: Se conserva el plural masculino del hebreo, como en la lectura inglesa auditada, sin neutralizarlo. En un discurso público puede abarcar al grupo masculino representativo; el matiz familiar queda intacto.
- source_word: וְעַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  - mi nación
  lexicon: HALOT
  rationale: «Pueblo» es la correspondencia más directa y solemne para el colectivo nacional del hebreo.
- source_word: אֲנִי עִם לְבָבִי
  english_pob_choice: It was in my heart
  chosen_spanish: Yo tenía en el corazón
  alternatives_spanish:
  - Estaba en mi corazón
  - Yo lo llevaba en mi corazón
  lexicon: HALOT
  rationale: La locución hebrea expresa intención interior o propósito. En español, «tener en el corazón» transmite esa resolución interna sin forzar una paráfrasis.
- source_word: לִבְנוֹת
  english_pob_choice: to build
  chosen_spanish: construir
  alternatives_spanish:
  - edificar
  - levantar
  lexicon: HALOT
  rationale: «Construir» es claro y moderno para un proyecto arquitectónico o sagrado; evita arcaísmos innecesarios.
- source_word: בֵּית מְנוּחָה
  english_pob_choice: a house of rest
  chosen_spanish: una casa de reposo
  alternatives_spanish:
  - un lugar de reposo
  - una morada de reposo
  lexicon: HALOT
  rationale: Se conserva la metáfora cultual de manera bastante literal. «Casa de reposo» corresponde bien a la frase hebrea y a la lectura auditada inglesa.
- source_word: לַאֲרוֹן בְּרִית יְהוָה
  english_pob_choice: for the ark of the covenant of Yahweh
  chosen_spanish: para el arca del pacto de Yahvé
  alternatives_spanish:
  - para el arca del pacto de Yahweh
  - para el arca del pacto de Yahvé
  lexicon: HALOT
  rationale: «Arca del pacto» sigue de cerca el constructo hebreo; «Yahvé» mantiene el nombre divino según el estándar del proyecto. No se usa «SEÑOR» porque el nombre no está velado en el texto fuente.
- source_word: וְלַהֲדֹם רַגְלֵי אֱלֹהֵינוּ
  english_pob_choice: and for the footstool of our God
  chosen_spanish: y para el estrado de los pies de nuestro Dios
  alternatives_spanish:
  - y para el escabel de los pies de nuestro Dios
  - y para el estrado de nuestro Dios
  lexicon: HALOT
  rationale: El hebreo usa una imagen concreta de apoyo para los pies; «estrado de los pies» preserva el valor metafórico sin explicitar demasiado la identificación con el arca. «Estrado» evita el matiz demasiado doméstico de «escabel».
- source_word: וַהֲכִינוֹתִי
  english_pob_choice: and I made preparations
  chosen_spanish: y había hecho preparativos
  alternatives_spanish:
  - y preparé
  - y había preparado
  lexicon: HALOT
  rationale: El verbo causativo expresa preparación previa. En español, la forma compuesta hace explícita la anterioridad implícita en la secuencia narrativa y suena natural.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: La política del proyecto exige traducir YHWH como «Yahvé» en el texto principal. Se preserva así el nombre de pacto sin la convención de ocultarlo como «SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Imagen del arca como «footstool/estrado de los pies»
  english_pob_reading: and for the footstool of our God
  chosen_spanish_reading: y para el estrado de los pies de nuestro Dios
  alternative_spanish_readings:
  - y para el estrado de nuestro Dios
  - y para el piecero de nuestro Dios
  rationale: La frase puede entenderse como descripción del arca en relación con la presencia divina. Se conserva la metáfora corporal completa («de los pies») para no suavizar el símbolo bíblico.
  doctrine_reference: Psalm 132:7; 1 Chronicles 28:2
translation_notes:
  revision_awareness: 'La versión española sigue la revisión final del audit trail inglés: mantiene «It was in my heart» como una intención interior natural, refleja la imagen cultual de «house of rest» y conserva la relación apposicional entre el arca y el «footstool/estrado». También toma en cuenta la decisión revisionada de expresar el propósito con una construcción temporal anterior («había hecho preparativos») para la preparación previa implícita.'
  spanish_consistency_notes:
  - Se usó «Yahvé» para יְהוָה, conforme al estándar del proyecto, y «Dios» para אֱלֹהֵינוּ.
  - Se prefirió «casa de reposo» para preservar la metáfora cultual, en paralelo con el inglés auditado «house of rest».
  - La expresión «estrado de los pies» conserva el paralelismo con el hebreo sin reemplazar la imagen por un glosa interpretativa.
  - Se mantuvo el registro solemne y público del discurso de David con verbos y sintaxis naturales para el español.
  - No se introdujeron marcadores de nota sin anclaje en el texto principal.
