lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then ... spoke
  chosen_spanish: Entonces ... habló
  alternatives_spanish:
  - Y ... habló
  - Y dijo
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; en español, 'Entonces' mantiene la secuencia natural. 'Habló' conserva el matiz de דבר como acto de habla, y prepara la fórmula introductoria de לֵאמֹר.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton con la forma española proyectada por el proyecto, evitando la sustitución titular 'el SEÑOR'.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición direccional normal en español es 'a' cuando introduce destinatario de habla.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico en su forma habitual en español, clara y reconocible para lectores de iglesia.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - para decir
  lexicon: HALOT
  rationale: La fórmula infinitiva introduce el discurso siguiente; 'diciendo' preserva la estructura hebrea sin paraphrasear.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene directamente el Nombre divino. Se evita el sustituto tradicional 'el SEÑOR' para conservar la transparencia y la lectura documental del nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior: el marcador de nota [a] ahora aparece anclado en el texto español en Yahvé[a]. La redacción sigue de cerca el hebreo y el auditable English POB, sin añadir contenido ajeno.'
  spanish_consistency_notes:
  - 'Se mantiene el orden narrativo simple: ''Entonces Yahvé habló a Moisés, diciendo,'' conforme a la fórmula hebrea.'
  - Se usa 'Yahvé' de forma consistente con la terminología del proyecto para יְהוָה.
  - '''Moisés'' y ''diciendo'' son formas estándar, claras y fieles al patrón de introducción de discurso.'
