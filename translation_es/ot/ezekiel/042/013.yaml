translation:
  language: es
  text: 'Entonces me dijo: «Las cámaras del norte, las cámaras del sur, que están frente al área separada[a], son las cámaras santas, donde los sacerdotes que se acercan a Yahvé comerán las cosas santísimas. Allí pondrán las cosas santísimas, la ofrenda de cereal, la ofrenda por el pecado y la ofrenda por la culpa[d][c][b], porque el lugar es santo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «que dan al área separada». El hebreo señala orientación espacial: estas cámaras están situadas ante o enfrente de la zona restringida del complejo del templo.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «las cosas santísimas», es decir, ofrendas o cosas de santidad suprema; aquí no se refiere al recinto llamado el Lugar Santísimo.'
    reason: lexical_alternative
  - marker: c
    text: O «ofrenda de purificación» para «ofrenda por el pecado».
    reason: alternative_reading
  - marker: d
    text: O «ofrenda de reparación» para «ofrenda por la culpa».
    reason: alternative_reading
lexical_decisions:
- source_word: לִשְׁכּוֹת
  english_pob_choice: chambers
  chosen_spanish: cámaras
  alternatives_spanish:
  - aposentos
  - cuartos
  lexicon: HALOT
  rationale: En este contexto arquitectónico del templo, el término designa recintos construidos y funcionales. «Cámaras» comunica bien la idea de espacios especializados sin sonar doméstico como «cuartos»; «aposentos» es posible pero menos natural en español actual para un complejo cultual.
- source_word: הַצָּפוֹן / הַדָּרוֹם
  english_pob_choice: the north chambers, the south chambers
  chosen_spanish: las cámaras del norte, las cámaras del sur
  alternatives_spanish:
  - las cámaras norteñas, las cámaras sureñas
  - las cámaras septentrionales, las cámaras meridionales
  lexicon: HALOT
  rationale: Conservo el valor direccional del hebreo con una construcción natural en español. «Del norte/del sur» mantiene claridad y evita un adjetivo demasiado técnico o literario que podría sonar menos fluido.
- source_word: אֶל־פְּנֵי הַגִּזְרָה
  english_pob_choice: opposite the separate area
  chosen_spanish: frente al área separada
  alternatives_spanish:
  - enfrente del área separada
  - opuestas al sector separado
  lexicon: HALOT
  rationale: El hebreo indica orientación espacial. «Frente a» conserva la idea de estar situado ante/opuesto a esa zona restringida. «Área separada» sigue la decisión del POB inglés para הַגִּזְרָה como término técnico del complejo del templo.
- source_word: לִשְׁכּוֹת הַקֹּדֶשׁ
  english_pob_choice: the holy chambers
  chosen_spanish: las cámaras santas
  alternatives_spanish:
  - las cámaras sagradas
  - las cámaras del santuario
  lexicon: HALOT
  rationale: «Santas» reproduce de forma directa el valor de קֹדֶשׁ y mantiene la cadencia del pasaje. «Sagradas» es viable, pero «santas» encaja mejor con el lenguaje bíblico de consagración cultual.
- source_word: קְרוֹבִים לַיהוָה
  english_pob_choice: who draw near to Yahweh
  chosen_spanish: que se acercan a Yahvé
  alternatives_spanish:
  - que se acercan a Yahvé para servirle
  - que se allegan a Yahvé
  lexicon: HALOT
  rationale: «Se acercan» conserva el matiz ritual de acceso sacerdotal sin volverlo meramente físico. Mantengo «Yahvé» según la pauta del proyecto para el nombre divino.
- source_word: קָדְשֵׁי הַקֳּדָשִׁים
  english_pob_choice: the most holy things
  chosen_spanish: las cosas santísimas
  alternatives_spanish:
  - las cosas más santas
  - las cosas sacratísimas
  lexicon: HALOT
  rationale: La expresión hebrea es superlativa y no se refiere aquí al Lugar Santísimo, sino a ofrendas/objetos de máxima santidad. «Cosas santísimas» preserva ese grado absoluto sin confundir al lector con el recinto interior del templo.
- source_word: יֹאכְלוּ שָׁם
  english_pob_choice: shall eat ... there
  chosen_spanish: comerán ... allí
  alternatives_spanish:
  - han de comer ... allí
  - comerán allí
  lexicon: HALOT
  rationale: La forma verbal expresa una disposición futura en una instrucción visionaria. «Comerán allí» es la forma más natural y sigue el orden y el sentido del hebreo.
- source_word: יַנִּיחוּ
  english_pob_choice: they shall place
  chosen_spanish: pondrán
  alternatives_spanish:
  - depositarán
  - colocarán
  lexicon: HALOT
  rationale: El verbo indica poner o colocar en un sitio designado. «Pondrán» es claro y directo; «colocarán» es posible pero algo más pesado, y «depositarán» suena demasiado administrativo.
- source_word: הַמִּנְחָה
  english_pob_choice: the grain offering
  chosen_spanish: la ofrenda de cereal
  alternatives_spanish:
  - la ofrenda de grano
  - la ofrenda vegetal
  lexicon: HALOT
  rationale: Prefiero «cereal» para conservar la categoría cultual sin restringir innecesariamente el producto a una sola especie. Es una solución ya comprensible en español y adecuada al contexto sacrificial.
- source_word: הַחַטָּאת
  english_pob_choice: the sin offering
  chosen_spanish: la ofrenda por el pecado
  alternatives_spanish:
  - la ofrenda por el pecado / la ofrenda de purificación
  - la ofrenda de expiación
  lexicon: HALOT
  rationale: Sigo la opción inglesa «sin offering» con una forma española clara. «Ofrecenda de purificación» puede ser una alternativa válida, pero aquí el contexto enumerativo de sacrificios favorece la designación tradicional sin eliminar la tensión semántica; la explico en nota.
- source_word: הָאָשָׁם
  english_pob_choice: the guilt offering
  chosen_spanish: la ofrenda por la culpa
  alternatives_spanish:
  - la ofrenda de reparación
  - la ofrenda por la culpa
  lexicon: HALOT
  rationale: «Ofrenda por la culpa» reproduce bien la relación semántica de אָשָׁם en este contexto. «Ofrenda de reparación» también es posible, pero es menos familiar y desplaza el énfasis jurídico/relacional que el texto permite.
- source_word: כִּי הַמָּקוֹם קָדֹשׁ
  english_pob_choice: for the place is holy
  chosen_spanish: porque el lugar es santo
  alternatives_spanish:
  - pues el lugar es santo
  - porque el sitio es santo
  lexicon: HALOT
  rationale: «Porque» expresa la razón dada por el hebreo. «Santo» mantiene el lenguaje de consagración del pasaje y armoniza con «cámaras santas».
theological_decisions:
- issue: Nombre divino יהוה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El hebreo usa el Tetragrámaton y el proyecto pide traducirlo directamente como «Yahvé» en el texto principal. Mantengo esa decisión para preservar la visibilidad del nombre del pacto y no ocultarlo tras una convención tipográfica.
  doctrine_reference: 'Project default: יהוה / YHWH -> Yahvé'
- issue: Sentido de קָדְשֵׁי הַקֳּדָשִׁים
  english_pob_reading: the most holy things
  chosen_spanish_reading: las cosas santísimas
  alternative_spanish_readings:
  - el Lugar Santísimo
  - las cosas más santas
  - las ofrendas santísimas
  rationale: Aquí la frase nombra ofrendas/objetos de máxima santidad, como confirma la lista que sigue. No debe confundirse con el recinto llamado el Lugar Santísimo. «Cosas santísimas» conserva la superlación y la ambigüedad cultual sin borrar el referente.
  doctrine_reference: Cultic holiness categories in Ezekiel 42:13
- issue: הַחַטָּאת
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda de purificación
  - ofrenda por el pecado
  rationale: La frase puede enfatizar tanto el pecado como la purificación. En una enumeración cultual, «ofrenda por el pecado» es clara y fiel, mientras que la alternativa «ofrenda de purificación» puede ayudar a recordar la dimensión ritual sin imponerla como única lectura.
  doctrine_reference: Sacrificial terminology in priestly law
- issue: הָאָשָׁם
  english_pob_reading: guilt offering
  chosen_spanish_reading: ofrenda por la culpa
  alternative_spanish_readings:
  - ofrenda de reparación
  - ofrenda por la culpa
  rationale: El término cubre culpa, reparación y satisfacción relacional. «Ofrenda por la culpa» conserva el vínculo con la culpa sin eliminar la posibilidad de reparación, que puede señalarse como alternativa semántica.
  doctrine_reference: Sacrificial terminology in priestly law
translation_notes:
  revision_awareness: 'Alineado con el último pase de revisión: se mantiene alta concordancia con la lectura inglesa auditada y no se detectan cambios necesarios respecto al sentido base. La única adaptación principal es la normalización al español de los equivalentes cultuales y del nombre divino según la política del proyecto.'
  spanish_consistency_notes:
  - He mantenido «Yahvé» de forma consistente con el estándar del proyecto para יהוה.
  - Conservo la distinción entre «cámaras» como espacios arquitectónicos y «cámaras santas» como espacios consagrados.
  - He evitado traducir קָדְשֵׁי הַקֳּדָשִׁים como «Lugar Santísimo» para no confundir categoría de objetos/ofrendas con el recinto interior.
  - Las notas distinguen entre el sentido tradicional y las alternativas cultuales posibles en español sin borrar la tensión léxica.
  - El estilo general sigue un registro bíblico moderno y digno, sin calcos innecesarios del inglés.
