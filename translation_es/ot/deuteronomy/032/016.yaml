revisions:
- from: Ellos lo hicieron celoso con extraños[a]; con abominaciones lo provocaron a ira.
  to: Ellos le provocaron celos con extraños[a]; con abominaciones provocaron su ira.
  rationale: 'Se ajustan dos expresiones para un español más natural y fiel al valor causativo del hebreo: «le provocaron celos» en lugar de «lo hicieron celoso», y «provocaron su ira» en lugar de «lo provocaron a ira». Se conserva la decisión principal de traducir בְּזָרִים literalmente como «extraños», con nota que ofrece la interpretación contextual «dioses extraños/extranjeros».'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:51:15Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y la auditoría inglesa: conserva la literalidad de בְּזָרִים como «extraños» con nota alternativa, mantiene «abominaciones» para תּוֹעֵבֹת y refleja el paralelismo de los dos verbos causativos. Sin embargo, «lo hicieron celoso» en español suena más a cambio de carácter que a provocación relacional, y «lo provocaron a ira» es menos idiomático que una formulación equivalente y fiel.'
  spanish_quality_summary: 'La redacción es entendible, pero dos giros resultan poco naturales en español bíblico actual: «lo hicieron celoso» y «lo provocaron a ira». Una revisión ligera mejora la legibilidad sin perder literalidad ni fuerza poética.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparece Yahvé en este versículo. La decisión de mantener «extraños» en texto principal y reservar «dioses extraños/extranjeros» para nota concuerda con la rationale documentada.
  issues:
  - severity: medium
    issue: «lo hicieron celoso» suena poco idiomático y puede sugerir un rasgo permanente de personalidad.
    rationale: El hebreo hiphil de קנא aquí expresa provocar celos/celo en él. En español, «le provocaron celos» o «despertaron sus celos» transmite mejor la acción causativa y el matiz relacional/covenantal.
  - severity: medium
    issue: «lo provocaron a ira» es una construcción forzada en español.
    rationale: Aunque intenta reflejar el causativo de כעס, en español natural y digno es preferible «lo provocaron a ira» -> «provocaron su ira» o «lo provocaron a enojo». «Provocaron su ira» conserva bien el sentido y el tono.
  - severity: low
    issue: La nota «extraños/foráneos» mezcla un término algo técnico o menos eclesial.
    rationale: «Forasteros» o «extranjeros» sería más natural que «foráneos» en una nota bíblica, aunque no es un error grave.
  revised_spanish_text: Ellos le provocaron celos con extraños[a]; con abominaciones provocaron su ira.
  revised_footnotes:
  - marker: a
    text: O «con dioses extraños» o «con dioses extranjeros»; el hebreo dice literalmente «con extraños/extranjeros».
    reason: alternative_reading
  revision_rationale: 'Se ajustan dos expresiones para un español más natural y fiel al valor causativo del hebreo: «le provocaron celos» en lugar de «lo hicieron celoso», y «provocaron su ira» en lugar de «lo provocaron a ira». Se conserva la decisión principal de traducir בְּזָרִים literalmente como «extraños», con nota que ofrece la interpretación contextual «dioses extraños/extranjeros».'
