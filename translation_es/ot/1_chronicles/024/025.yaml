lexical_decisions:
- source_word: אֲחִי
  english_pob_choice: The brother of
  chosen_spanish: El hermano de
  alternatives_spanish:
  - Hermano de
  - El hermano de él
  lexicon: HALOT
  rationale: Es un constructo de אָח en una lista genealógica. En español, «el hermano de» conserva la relación familiar y suena natural en este contexto breve y enumerativo.
- source_word: מִיכָה
  english_pob_choice: Micah
  chosen_spanish: Micah
  alternatives_spanish:
  - Mica
  lexicon: HALOT
  rationale: Nombre propio transliterado según la forma estándar en español y coherente con el flujo genealógico.
- source_word: יִשִּׁיָּה
  english_pob_choice: Isshiah
  chosen_spanish: Isshiah
  alternatives_spanish:
  - Ishiah
  - Jeshiah
  lexicon: HALOT
  rationale: Nombre propio. Se conserva «Isshiah» por reflejar de manera directa la forma hebrea y mantener consistencia interna; se documentan variantes tradicionales en la nota.
- source_word: לִבְנֵי
  english_pob_choice: of the sons of
  chosen_spanish: de los hijos de
  alternatives_spanish:
  - para los hijos de
  - perteneciente a los hijos de
  lexicon: HALOT
  rationale: En este contexto genealógico, ל + «hijos de» expresa pertenencia o afiliación de linaje, por lo que «de los hijos de» transmite mejor la relación que una traducción direccional.
- source_word: זְכַרְיָהוּ
  english_pob_choice: Zechariah
  chosen_spanish: Zechariah
  alternatives_spanish:
  - Zacarías
  - Zekaryahu
  lexicon: HALOT
  rationale: Nombre propio. Se conserva la transliteración «Zechariah» para reflejar la forma del texto base y mantener continuidad con la nomenclatura inglesa auditada; en español, «Zacarías» sería una adaptación tradicional posible, pero aquí se prefiere la forma transliterada para no homogeneizar indebidamente el registro de nombres.
translation_notes:
  revision_awareness: El texto fuente y la auditoría inglesa muestran alta concordancia y no registran revisiones aplicadas; por tanto, la versión española sigue de cerca la disposición genealógica del hebreo sin añadir elementos interpretativos.
  spanish_consistency_notes:
  - Se mantuvo la estructura breve y nominal del hebreo, con dos segmentos separados por dos puntos, como en la edición inglesa auditada.
  - Se conservaron los nombres propios en transliteración donde el contexto no exige adaptación tradicional, y se documentó la variante del nombre Isshiah en nota.
  - No se añadió artículo antes de los nombres propios para evitar sobrerrepresentar la fluidez inglesa cuando el hebreo presenta una secuencia genealógica compacta.
