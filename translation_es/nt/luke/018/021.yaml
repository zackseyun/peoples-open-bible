translation:
  language: es
  text: 'Y él dijo: «He guardado todas estas cosas[a] desde mi juventud».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente por el contexto: «todos estos mandamientos». El griego dice simplemente «todas estas cosas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ εἶπεν
  english_pob_choice: And he said
  chosen_spanish: Y él dijo
  alternatives_spanish:
  - Pero él dijo
  - Entonces dijo
  lexicon: BDAG
  rationale: δέ es un conector leve; en español, «Y él dijo» mantiene la continuidad narrativa sin cargar contraste que el griego no exige. El sujeto explícito («él») sigue el valor pronominal del contexto y suena natural en español.
- source_word: Ταῦτα πάντα
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - todas estas
  - todos estos mandamientos
  lexicon: BDAG
  rationale: La expresión griega es literalmente «estas cosas todas». En español, «todas estas cosas» conserva la amplitud indeterminada del original. «Mandamientos» solo está implícito por el contexto previo, no aparece en esta cláusula.
- source_word: ἐφύλαξα
  english_pob_choice: I have kept
  chosen_spanish: he guardado
  alternatives_spanish:
  - guardé
  - he observado
  - he obedecido
  lexicon: BDAG
  rationale: φυλάσσω puede significar guardar, observar o cumplir. En este contexto legal/moral, «he guardado» comunica la idea de observar normas sin añadir una glosa interpretativa. El perfecto español refleja bien la declaración del hablante hasta el presente.
- source_word: ἐκ νεότητος μου
  english_pob_choice: from my youth
  chosen_spanish: desde mi juventud
  alternatives_spanish:
  - desde mi niñez
  - de mi juventud
  lexicon: BDAG
  rationale: ἐκ con genitivo indica punto de inicio temporal. «Desde mi juventud» es una equivalencia natural en español y conserva el inicio y la duración implícitos del griego.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada y quedó sin cambios; esta propuesta sigue esa lectura estable y no introduce ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se mantiene «desde mi juventud» como fórmula temporal estable para ἐκ + genitivo.
  - No se introduce «mandamientos» en el texto principal para no sobreinterpretar Ταῦτα πάντα; se reserva esa aclaración para la nota.
  - «He guardado» conserva la fuerza de φυλάσσω sin reemplazarla por un término eclesiástico más interpretativo.
