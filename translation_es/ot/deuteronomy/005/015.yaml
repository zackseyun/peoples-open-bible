translation:
  language: es
  text: Y recuerda que fuiste esclavo en la tierra de Egipto, y Yahvé tu Dios te sacó de allí con mano poderosa[a] y brazo extendido; por eso Yahvé tu Dios te mandó guardar el día de reposo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con mano fuerte». La expresión hebrea es un modismo que enfatiza el poderoso acto de liberación de Yahvé.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «hacer el día de reposo». El modismo hebreo significa guardarlo u observarlo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזָכַרְתָּ
  english_pob_choice: And remember
  chosen_spanish: Y recuerda
  alternatives_spanish:
  - Y acuérdate
  - Recuerda
  lexicon: HALOT
  rationale: El hebreo funciona como exhortación directa; en español, «recuerda» conserva la fuerza imperativa sin volverlo rígido. Se mantiene la conjunción inicial para reflejar la continuidad discursiva.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Introduce el contenido recordado, no una causalidad independiente. «Que» es la forma más natural en español para esa función.
- source_word: עֶבֶד
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - servidor
  lexicon: HALOT
  rationale: El contexto es de servidumbre opresiva en Egipto y liberación; «esclavo» preserva esa fuerza semántica y la razón teológica del mandamiento del sábado.
- source_word: בְּאֶרֶץ מִצְרַיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  lexicon: HALOT
  rationale: «Tierra de Egipto» sigue de cerca la expresión hebrea y conserva el matiz concreto del país como ámbito de esclavitud.
- source_word: וַיֹּצִאֲךָ
  english_pob_choice: brought you out
  chosen_spanish: te sacó
  alternatives_spanish:
  - te hizo salir
  - te sacó fuera
  lexicon: HALOT
  rationale: En español, «sacar» expresa de manera natural la liberación del éxodo; evita una construcción más pesada y mantiene la acción de rescate.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue el estándar del proyecto para el Nombre divino, preservando la referencia pactual sin sustituirla por una máscara litúrgica.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Creador
  lexicon: HALOT
  rationale: Es la equivalencia directa y mantiene la relación de pacto con el destinatario singular.
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - desde allí
  - de ese lugar
  lexicon: HALOT
  rationale: «De allí» reproduce la referencia deíctica a Egipto de manera fluida y breve.
- source_word: בְּיָד חֲזָקָה
  english_pob_choice: with a mighty hand
  chosen_spanish: con mano poderosa
  alternatives_spanish:
  - con mano fuerte
  - con mano robusta
  lexicon: HALOT
  rationale: «Mano poderosa» comunica el hebraísmo con naturalidad en español y conserva el énfasis en el poder efectivo de Yahvé.
- source_word: וּבִזְרֹעַ נְטוּיָה
  english_pob_choice: and an outstretched arm
  chosen_spanish: y brazo extendido
  alternatives_spanish:
  - y con brazo extendido
  - y brazo alzado
  lexicon: HALOT
  rationale: La imagen corporal del hebreo se conserva; «brazo extendido» es transparente y adecuada para el lenguaje bíblico.
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por tanto
  - así que
  lexicon: HALOT
  rationale: Marca la consecuencia lógica entre la liberación y el mandato sobre el sábado con una fórmula natural en español.
- source_word: צִוְּךָ
  english_pob_choice: commanded you
  chosen_spanish: te mandó
  alternatives_spanish:
  - te ordenó
  - te dio mandato
  lexicon: HALOT
  rationale: «Mandó» es breve y fiel; conserva el carácter de precepto divino sin sonar forzado.
- source_word: לַעֲשׂוֹת אֶת יוֹם הַשַּׁבָּת
  english_pob_choice: to keep the Sabbath day
  chosen_spanish: guardar el día de reposo
  alternatives_spanish:
  - observar el día de reposo
  - hacer el día de reposo
  lexicon: HALOT
  rationale: El hebreo literalmente dice «hacer» el día de sábado, pero el sentido idiomático es observarlo/guardarlo. «Guardar» mantiene el valor tradicional y el significado operativo sin traducir mecánicamente.
- source_word: הַשַּׁבָּת
  english_pob_choice: the Sabbath day
  chosen_spanish: el día de reposo
  alternatives_spanish:
  - el sábado
  - el día de sábado
  lexicon: HALOT
  rationale: «Día de reposo» comunica la función del término en español bíblico común y evita ambigüedad con el nombre del día común de la semana.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El versículo usa el Tetragrámaton, y el proyecto pide mantener el Nombre divino en la traducción principal. «Yahvé» preserva la identidad pactual y evita el ocultamiento por sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Rendering of עֶבֶד in the exodus context
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - servidor
  rationale: La liberación del esclavitud egipcia fundamenta el mandamiento del sábado; «esclavo» retiene la severidad de la condición y la conexión teológica con la redención.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms analogy for bonded-status language
- issue: Idiomatic rendering of לַעֲשׂוֹת אֶת יוֹם הַשַּׁבָּת
  english_pob_reading: to keep the Sabbath day
  chosen_spanish_reading: guardar el día de reposo
  alternative_spanish_readings:
  - observar el día de reposo
  - hacer el día de reposo
  rationale: Aunque el hebreo es literalmente «hacer», el sentido en el contexto es observar/guardar el sábado. «Guardar» comunica el mandato con fidelidad y mantiene una formulación sobria y entendible.
  doctrine_reference: English audit trail lexical note on לַעֲשׂוֹת; Deut 5:15 contextual idiom
translation_notes:
  revision_awareness: La versión inglesa revisada del POB pasó de «strong hand» a «mighty hand» y de «observe the Sabbath day» a «keep the Sabbath day». En español se optó por «mano poderosa» como equivalente natural del hebraísmo y por «guardar» para reflejar mejor el sentido idiomático de לַעֲשׂוֹת, conservando la formalidad y la claridad.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - «Dios» traduce אֱלֹהֶיךָ en ambas apariciones como forma de pacto directa y natural.
  - «Esclavo» se conserva para עֶבֶד por la carga histórica y teológica del contexto exódico.
  - «Día de reposo» se usa para הַשַּׁבָּת por claridad en español y por su función normativa en el pasaje.
  - La coordinación «mano poderosa y brazo extendido» conserva la imaginería corporal hebrea sin sobreexplicarla en el texto principal.
