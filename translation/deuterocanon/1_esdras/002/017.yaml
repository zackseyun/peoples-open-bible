translation:
  text: And now let it be known to my lord the king that the Judeans who came up from you to us have come to Jerusalem and are living in that rebellious and wicked city[a]; they are repairing its marketplaces and walls[c][b], and are laying the foundation of a temple.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Jews.' The Greek Ἰουδαῖοι can denote Judeans in an ethnogeographic sense or Jews more broadly.
    reason: lexical_alternative
  - marker: b
    text: Greek 'marketplaces' or 'public squares'; some parallel traditions in Ezra emphasize the rebuilding of the city rather than specifically its market areas.
    reason: alternative_reading
  - marker: c
    text: Or 'are undertaking/rebuilding the temple.' The Greek phrase is somewhat compressed and may refer to beginning temple construction, especially laying its substructure.
    reason: lexical_alternative
lexical_decisions:
- source_word: γνωστὸν ἔστω
  chosen: let it be known
  alternatives:
  - be it known
  - may it be known
  lexicon: LSJ
  rationale: Standard epistolary/official formula in Greek correspondence; 'let it be known' is natural modern English while preserving the formal register.
- source_word: τῷ κυρίῳ βασιλεῖ
  chosen: to my lord the king
  alternatives:
  - to the lord king
  - to the king my lord
  lexicon: LSJ
  rationale: The dative phrase functions as the addressee of the formal notice. Although κύριος often defaults to 'Lord,' here it is a courtly title for the human monarch, and English idiom is best represented by 'my lord the king,' matching the deferential tone.
- source_word: Ἰουδαῖοι
  chosen: the Judeans
  alternatives:
  - the Jews
  lexicon: LSJ
  rationale: In this Persian-period setting the term is ethnogeographic, referring to people of Judah/Judea. 'Judeans' preserves that historical sense better than the more anachronistically religious-sounding 'Jews,' though the latter remains a viable alternative.
- source_word: ἀναβάντες παρ' ὑμῶν πρὸς ἡμᾶς
  chosen: who came up from you to us
  alternatives:
  - who went up from you to us
  - who came up from you among us
  lexicon: LSJ
  rationale: ἀναβαίνω commonly reflects travel 'up' to Jerusalem or the region; retaining 'came up' preserves the directional nuance. The phrase παρ' ὑμῶν πρὸς ἡμᾶς is somewhat awkward in English, but 'from you to us' best reflects the Greek and the administrative complaint context.
- source_word: τὴν πόλιν τὴν ἀποστάτιν καὶ πονηρὰν
  chosen: that rebellious and wicked city
  alternatives:
  - that apostate and evil city
  - the rebellious and bad city
  lexicon: LSJ
  rationale: ἀποστάτις denotes revolt/rebellion rather than specifically religious apostasy in this political accusation; 'rebellious' fits the imperial context. πονηρά is rendered 'wicked' to preserve the hostile moral coloring of the charge.
- source_word: οἰκοῦσιν
  chosen: are living
  alternatives:
  - dwell
  - inhabit
  lexicon: LSJ
  rationale: Present tense with ongoing force; 'are living' is readable modern English without losing the sense of settled residence.
- source_word: ἀγοράς
  chosen: marketplaces
  alternatives:
  - streets
  - open squares
  lexicon: LSJ
  rationale: ἀγορά ordinarily denotes marketplace/public square. Some parallel traditions speak of streets, but the Greek witness here specifically points to public market areas or squares, so that sense is retained.
- source_word: θεραπεύουσιν
  chosen: are repairing
  alternatives:
  - restore
  - attend to
  - rebuild
  lexicon: LSJ
  rationale: The verb can mean attend to, care for, or restore. In context with marketplaces and walls, 'are repairing' best captures practical restoration work without overstating to full rebuilding.
- source_word: ναὸν ὑποβάλλονται
  chosen: are laying the foundation of a temple
  alternatives:
  - are undertaking a temple
  - are rebuilding the temple
  - are founding a temple
  lexicon: LSJ
  rationale: The phrase is somewhat idiomatic and can suggest beginning/substructing temple work. 'Are laying the foundation of a temple' makes explicit the likely construction sense while staying close to the Greek. The anarthrous ναόν is rendered 'a temple' formally, though context clearly refers to the Jerusalem temple project.
