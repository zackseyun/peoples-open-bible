translation:
  language: es
  text: Moisés, el siervo de Yahvé, y los hijos de Israel[a] los derrotaron; y Moisés, el siervo de Yahvé, la dio como herencia a los rubenitas, a los gaditas y a la media tribu de Manasés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más idiomáticamente, «los israelitas». El hebreo dice «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: עֶבֶד
  english_pob_choice: servant
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - servidor
  lexicon: HALOT
  rationale: El POB en inglés tomó el valor léxico fuerte de עֶבֶד como 'slave' en sentido amplio, pero en este contexto honorífico del título mosaico conviene 'esclavo' para mantener la fuerza del término sin borrar la relación de pertenencia y servicio. 'Siervo' suaviza demasiado el matiz lexical.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa directamente el Nombre divino; por la norma del proyecto se translitera como 'Yahvé', preservando el nombre propio y no sustituyéndolo por un título.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos del pueblo de Israel
  lexicon: HALOT
  rationale: La forma hebrea es literalmente masculina y colectiva; 'los hijos de Israel' reproduce de cerca la construcción del original y evita neutralizarla sin base textual.
- source_word: הִכּוּם
  english_pob_choice: struck them down
  chosen_spanish: los derrotaron
  alternatives_spanish:
  - los golpearon
  - los hirieron
  lexicon: HALOT
  rationale: En un resumen militar, el verbo נכה puede significar derrotar. En español, 'los derrotaron' comunica con naturalidad el resultado bélico sin introducir conjeturas sobre el grado físico de la acción.
- source_word: וַיִּתְּנָהּ
  english_pob_choice: gave it
  chosen_spanish: lo dio
  alternatives_spanish:
  - lo entregó
  - lo asignó
  lexicon: HALOT
  rationale: El sufijo femenino singular apunta al territorio implícito; en español se expresa con 'lo' por concordancia con 'territorio' o 'posesión' subentendido. 'Dio' sigue de cerca נתן.
- source_word: יְרֻשָּׁה
  english_pob_choice: as an inheritance
  chosen_spanish: como herencia
  alternatives_spanish:
  - como posesión heredada
  - en heredad
  lexicon: HALOT
  rationale: '''Herencia'' comunica la posesión recibida por derecho de legado, manteniendo el sentido de tierra asignada por pacto. ''Como herencia'' reproduce bien la función predicativa del hebreo.'
- source_word: לָרֻאוּבֵנִי
  english_pob_choice: to the Reubenites
  chosen_spanish: a los rubenitas
  alternatives_spanish:
  - a los descendientes de Rubén
  - a la tribu de Rubén
  lexicon: HALOT
  rationale: El gentilicio singular funciona colectivamente; 'rubenitas' es el equivalente natural y fiel al referente tribal.
- source_word: לַגָּדִי
  english_pob_choice: the Gadites
  chosen_spanish: a los gaditas
  alternatives_spanish:
  - a los descendientes de Gad
  - a la tribu de Gad
  lexicon: HALOT
  rationale: Se conserva el paralelismo con 'rubenitas' y el valor colectivo del gentilicio para el grupo tribal.
- source_word: חֲצִי שֵׁבֶט הַמְנַשֶּׁה
  english_pob_choice: the half-tribe of Manasseh
  chosen_spanish: la media tribu de Manasés
  alternatives_spanish:
  - la mitad de la tribu de Manasés
  - la media tribu de Manasés
  lexicon: HALOT
  rationale: La construcción hebrea designa la división tribal asentada al este del Jordán. 'Media tribu' es la expresión española tradicional y precisa para este caso.
theological_decisions:
- issue: Renderización del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El verso contiene el Tetragrámaton y el proyecto exige preservar el Nombre propio. 'Yahvé' mantiene la transparencia frente al hebreo y evita la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de la expresión corporativa masculina בְנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos del pueblo de Israel
  rationale: Se conserva la forma masculina explícita del hebreo. La alternativa 'los israelitas' sería más idiomática, pero menos transparente al texto fuente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Sentido militar de הִכּוּם
  english_pob_reading: struck them down
  chosen_spanish_reading: los derrotaron
  alternative_spanish_readings:
  - los golpearon
  - los hirieron
  rationale: En este contexto narrativo el verbo expresa victoria militar. 'Derrotaron' evita una lectura excesivamente física que no aporta más precisión en español y mantiene el sentido de subyugación del enemigo.
  doctrine_reference: HALOT, נכה en contextos bélicos
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y que no eran necesarios cambios sustanciales. Esta versión conserva esa lectura, ajustando únicamente la terminología española para mantener la transparencia al hebreo y la coherencia con la política del proyecto sobre el Nombre divino.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יְהוָה.
  - Se preserva la expresión tribal 'rubenitas', 'gaditas' y 'media tribu de Manasés' para reflejar los gentilicios colectivos del hebreo.
  - '''Derrotaron'' traduce el sentido bélico de הִכּוּם sin añadir detalles no explícitos en el texto.'
  - La nota al pie marca la alternativa idiomática de 'los israelitas' porque el hebreo literal es 'los hijos de Israel'.
