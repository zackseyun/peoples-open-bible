translation:
  language: es
  text: Y en la grandeza de tu majestad derribas a los que se levantan contra ti[a]; envías tu ardiente enojo[b]; los consume como paja.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con la abundancia de tu majestad».
    reason: lexical_alternative
  - marker: b
    text: O «tu ira ardiente». El hebreo literalmente se refiere a «tu ardiente enojo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/רֹב
  english_pob_choice: And in the greatness of
  chosen_spanish: Y en la grandeza de
  alternatives_spanish:
  - Y con la abundancia de
  - Y por la grandeza de
  lexicon: HALOT
  rationale: El hebreo permite un valor de esfera o medio con בְ; «en la grandeza de» conserva la fuerza idiomática sin volverla rígida. «Y» refleja la conjunción inicial.
- source_word: גְּאוֹנְךָ
  english_pob_choice: your majesty
  chosen_spanish: tu majestad
  alternatives_spanish:
  - tu exaltación
  - tu grandeza
  - tu excelencia
  lexicon: HALOT
  rationale: גָּאוֹן puede expresar exaltación, esplendor regio o majestad. En este himno de victoria, «majestad» comunica dignidad y superioridad soberana con naturalidad en español.
- source_word: תַּהֲרֹס
  english_pob_choice: you overthrow
  chosen_spanish: derribas
  alternatives_spanish:
  - destruyes
  - demueles
  - derrocas
  lexicon: HALOT
  rationale: הרס suele significar derribar o demoler. Aquí el contexto bélico-poético favorece «derribas», que conserva el gesto de abatir a un adversario sin limitarlo a edificios.
- source_word: קָמֶיךָ
  english_pob_choice: those who rise up against you
  chosen_spanish: a los que se levantan contra ti
  alternatives_spanish:
  - a tus adversarios
  - a los que se ponen contra ti
  lexicon: HALOT
  rationale: El participio de קום conserva el sentido verbal de levantarse en hostilidad. «Se levantan contra ti» mantiene ese impulso y la oposición directa al destinatario divino.
- source_word: תְּשַׁלַּח
  english_pob_choice: you send out
  chosen_spanish: envías
  alternatives_spanish:
  - envías fuera
  - desatas
  - lanzas
  lexicon: HALOT
  rationale: שׁלח significa «enviar». En español, el complemento «tu ardiente enojo» ya aporta la imagen dinámica; «envías» es fiel y fluido.
- source_word: חֲרֹנְךָ
  english_pob_choice: your burning anger
  chosen_spanish: tu ardiente enojo
  alternatives_spanish:
  - tu ira ardiente
  - tu ardor de ira
  - tu furor ardiente
  lexicon: HALOT
  rationale: חָרוֹן designa un enojo encendido; «ardiente enojo» preserva el calor figurado y evita aplanar la imagen en una simple «ira». Se mantiene la tensión entre emoción y juicio.
- source_word: יֹאכְלֵמוֹ
  english_pob_choice: it consumes them
  chosen_spanish: los consume
  alternatives_spanish:
  - los devora
  - los come
  - los devora y consume
  lexicon: HALOT
  rationale: El verbo usaría un singular colectivo con sufijo plural. «Los consume» es natural en español y conserva la idea de consumición total sin añadir intensidad no exigida.
- source_word: כַּ/קַּֽשׁ
  english_pob_choice: like stubble
  chosen_spanish: como hojarasca
  alternatives_spanish:
  - como paja
  - como rastrojo
  - como estopa
  lexicon: HALOT
  rationale: קַשׁ alude a restos secos de tallos o paja corta. «Hojarasca» comunica bien lo seco, frágil y fácilmente consumible en español, aunque el término no sea técnico agrícola.
theological_decisions:
- issue: Lenguaje de juicio divino sin suavizar la metáfora
  english_pob_reading: you send out your burning anger; it consumes them like stubble
  chosen_spanish_reading: envías tu ardiente enojo; los consume como hojarasca
  alternative_spanish_readings:
  - desatas tu ira; los devora como paja
  - envías tu furor; los consume como rastrojo
  rationale: El hebreo atribuye directamente a Dios una acción de juicio destructivo en lenguaje poético. La versión española mantiene esa fuerza sin explicarla en exceso ni atenuarla.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Dirección en segunda persona a Dios
  english_pob_reading: your majesty ... against you ... your burning anger
  chosen_spanish_reading: tu majestad ... contra ti ... tu ardiente enojo
  alternative_spanish_readings:
  - su majestad ... contra él ... su ira
  rationale: El canto se dirige a Dios en segunda persona. Conservar «tu/ti» mantiene el carácter de alabanza y confesión del poema.
  doctrine_reference: Second-person address in hymnody and direct prayer
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el consenso del audit trail inglés: mantiene la estructura poética, conserva la metáfora de ira/ardor y no introduce una lectura doctrinal adicional. No se registran revisiones textuales en la fuente inglesa, y la concordancia general es alta.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando el nombre divino aparece explícitamente; aquí el verso está en segunda persona directa y no requiere sustitución nominal.
  - Se conserva el paralelismo poético con verbos en presente («derribas / envías / consume») para reflejar el hebreo sin forzar un tiempo narrativo.
  - «Ardiente enojo» preserva la imagen de calor del sustantivo חֲרוֹן, mientras que «hojarasca» mantiene la vulnerabilidad del material combustible.
