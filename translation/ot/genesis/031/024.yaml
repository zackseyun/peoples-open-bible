id: GEN.31.24
reference: Genesis 31:24
source:
  edition: WLC
  text: וַ/יָּבֹ֧א אֱלֹהִ֛ים אֶל לָבָ֥ן הָ/אֲרַמִּ֖י בַּ/חֲלֹ֣ם הַ/לָּ֑יְלָה וַ/יֹּ֣אמֶר ל֗/וֹ הִשָּׁ֧מֶר לְ/ךָ֛ פֶּן תְּדַבֵּ֥ר עִֽם יַעֲקֹ֖ב מִ/טּ֥וֹב עַד רָֽע־־־־׃
translation:
  text: But God came to Laban the Aramean in a dream at night and said to him[c][b][a], “Be careful not to speak to Jacob either good or bad.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, “from good to bad,” an idiom meaning anything at all, whether favorable or unfavorable.
    reason: lexical_alternative
  - marker: b
    text: Traditionally “Laban the Syrian”; the Hebrew ethnonym is “Aramean.”
    reason: alternative_reading
  - marker: c
    text: Or 'speak to Jacob either good or bad'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַיָּבֹא
  chosen: came
  alternatives:
  - went
  - appeared
  lexicon: HALOT
  rationale: The verb בוא in the wayyiqtol narrative form is most naturally rendered 'came.' 'Appeared' is interpretive and better reserved for explicit appearance language; 'went' is less idiomatic in English with God as subject here.
- source_word: אֱלֹהִים
  chosen: God
  lexicon: HALOT
  rationale: With a singular verb and in this narrative context, אֱלֹהִים clearly refers to the one God, so 'God' is the natural English rendering.
- source_word: לָבָן הָאֲרַמִּי
  chosen: Laban the Aramean
  alternatives:
  - Laban the Syrian
  lexicon: HALOT
  rationale: אֲרַמִּי denotes an Aramean. 'Syrian' reflects older tradition via later geographical terminology, but 'Aramean' better matches the Hebrew ethnonym and source-language primacy.
- source_word: בַּחֲלֹם הַלָּיְלָה
  chosen: in a dream by night
  alternatives:
  - in a dream at night
  - in the night dream
  lexicon: HALOT
  rationale: The phrase literally combines 'in a dream' with 'the night.' 'In a dream by night' preserves the Hebrew flavor while remaining natural English. 'At night' is possible, but 'by night' better reflects the compact adverbial force.
- source_word: הִשָּׁמֶר לְךָ
  chosen: Be careful
  alternatives:
  - Take care
  - Watch yourself
  - Guard yourself
  lexicon: HALOT
  rationale: The Niphal imperative of שמר with לְךָ is an idiomatic warning formula. 'Be careful' is clear modern English and preserves the force of caution without over-literal awkwardness.
- source_word: פֶּן תְּדַבֵּר
  chosen: that you do not speak
  alternatives:
  - lest you speak
  - not to speak
  lexicon: HALOT
  rationale: פֶּן introduces a warning against an action. 'That you do not speak' communicates the prohibition naturally in contemporary English; 'lest' is accurate but archaic.
- source_word: עִם יַעֲקֹב
  chosen: to Jacob
  alternatives:
  - with Jacob
  lexicon: HALOT
  rationale: Although עִם commonly means 'with,' with דבר it often yields the idiomatic sense 'speak to/with.' Here 'to Jacob' fits the warning context in English more naturally than 'with Jacob.'
- source_word: מִטּוֹב עַד רָע
  chosen: either good or bad
  alternatives:
  - from good to bad
  - anything, good or bad
  lexicon: HALOT
  rationale: This idiom marks the full range of speech and in context means not to say anything at all to Jacob, whether favorable or hostile. 'Either good or bad' preserves the polarity and reads naturally. A more expansive interpretive rendering is possible but less formally transparent.
