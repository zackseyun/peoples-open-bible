- from: Y cuando Israel se fortaleció, puso a los cananeos[a] a trabajo forzado[b], pero no los expulsó por completo.
  to: Y cuando Israel se fortaleció, sometió a los cananeos[a] a trabajos forzados[b], pero no los expulsó por completo.
