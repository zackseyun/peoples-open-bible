review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la sintaxis y el sentido general del hebreo: futuro de promesa («Sabrás»), contenido introducido por «que», conservación de la imagen literal «tu tienda», inspección de la morada, y lectura no moral de וְלֹא תֶחֱטָא. Sin embargo, la nota al pie no preserva correctamente la alternativa léxica documentada: presenta como alternativa principal «y no te faltará nada», que en realidad ya es la traducción adoptada, cuando la alternativa preservada por el audit trail inglés es «y no pecarás».'
  spanish_quality_summary: El español es claro, natural y digno. «Tu tienda está en paz» y «cuando examines tu morada» son plenamente legibles. «No te faltará nada» comunica bien el sentido contextual, aunque «no hallarás nada faltante» sería más cercano a la escena de inspección; no es necesario cambiar el texto principal. La reparación requerida es de precisión editorial en la nota.
  glossary_alignment: No hay términos del glosario principal en conflicto. Las decisiones «tienda», «morada», «en paz» y la lectura contextual no moral de חטא están alineadas con el expediente. La excepción necesaria es que la nota debe registrar la alternativa «no pecarás» como opción léxica del hebreo.
  issues:
  - severity: medium
    issue: La nota al pie identifica incorrectamente la alternativa léxica.
    rationale: 'La nota actual dice «O: “y no te faltará nada”», pero esa ya es la traducción del texto principal. Según el audit trail inglés, la alternativa que debe preservarse es «y no pecarás». Esto afecta la fidelidad del aparato de notas, aunque no el sentido del texto principal.'
  revised_spanish_text: Sabrás que tu tienda está en paz[a], y cuando examines tu morada, no te faltará nada.
  revised_footnotes:
  - marker: a
    text: 'O: «y no pecarás». El verbo hebreo puede significar «pecar», pero en este contexto probablemente expresa la idea de que nada estará faltando o perdido.'
    reason: lexical_alternative
  revision_rationale: 'Se mantiene intacto el texto principal porque es fiel y natural en español. Se corrige únicamente la nota al pie para que preserve la alternativa léxica real del hebreo y del audit trail inglés: «y no pecarás».'
