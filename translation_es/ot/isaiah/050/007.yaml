translation:
  language: es
  text: Pero el Señor Yahvé[a] me ayuda; por eso no he sido avergonzado[b]. Por eso he puesto mi rostro como pedernal[c], y sé que no seré avergonzado[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el Señor Yahvé», es decir, la combinación de אֲדֹנָי con el nombre divino יְהוִה.'
    reason: alternative_reading
  - marker: b
    text: 'También: «no he sido humillado» o «no he sido deshonrado».'
    reason: lexical_alternative
  - marker: c
    text: Expresión idiomática de resolución firme ante la oposición.
    reason: cultural_note
  - marker: d
    text: 'O: «no me avergonzaré».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: Yahvé, el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor DIOS
  - Yahvé, el Señor DIOS
  lexicon: HALOT
  rationale: El hebreo combina el título אֲדֹנָי con el nombre divino יְהוִה. Según el criterio del proyecto, יְהוִה se vierte como «Yahvé», y אֲדֹנָי como «el Señor». En español, «Yahvé, el Señor» conserva ambos elementos sin recurrir a una máscara tipográfica ni producir un giro artificial como «Señor Yahvé».
- source_word: יַעֲזָר לִי
  english_pob_choice: helps me
  chosen_spanish: me ayuda
  alternatives_spanish:
  - me ayudará
  - me socorre
  - me viene en ayuda
  lexicon: HALOT
  rationale: El imperfecto expresa una ayuda continua o segura. «Me ayuda» funciona bien en español y conserva esa confianza sin forzar un futuro explícito que el hebreo no exige.
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por tanto
  - así que
  - por consiguiente
  lexicon: HALOT
  rationale: La expresión marca consecuencia lógica y aparece dos veces. «Por eso» es natural en español y mantiene la relación inferencial del texto.
- source_word: נִכְלָמְתִּי
  english_pob_choice: I have not been disgraced
  chosen_spanish: no he sido avergonzado
  alternatives_spanish:
  - no he sido humillado
  - no he sido deshonrado
  - no he quedado en vergüenza
  lexicon: HALOT
  rationale: El nifal de כלם puede referirse a vergüenza, humillación o deshonra. «Avergonzado» comunica bien la pasiva/resultativa en español y permite sostener la tensión con la siguiente cláusula de «avergonzado»/«avergonzado» sin borrar el paralelismo.
- source_word: שַׂמְתִּי פָנַי
  english_pob_choice: I have set my face
  chosen_spanish: puse mi rostro
  alternatives_spanish:
  - fijé mi rostro
  - afirmé mi rostro
  - puse mi semblante
  lexicon: HALOT
  rationale: La expresión es idiomática y denota determinación firme. «Puse mi rostro» preserva la imagen hebrea con una construcción natural en español, y el contexto aclara la idea de resolución.
- source_word: כַּחַלָּמִישׁ
  english_pob_choice: like flint
  chosen_spanish: como pedernal
  alternatives_spanish:
  - como sílex
  - como piedra dura
  - como pedernal duro
  lexicon: HALOT
  rationale: חַלָּמִישׁ designa una piedra muy dura; en español, «pedernal» comunica esa dureza de forma clara y sobria. Se conserva la metáfora de firmeza del hebreo.
- source_word: וָאֵדַע
  english_pob_choice: and I know
  chosen_spanish: y sé
  alternatives_spanish:
  - y he sabido
  - y estoy seguro
  - y llego a saber
  lexicon: HALOT
  rationale: La forma con waw consecutiva avanza la afirmación con certeza asentada. «Y sé» reproduce bien la convicción presente del hablante en español.
- source_word: לֹא אֵבוֹשׁ
  english_pob_choice: I will not be put to shame
  chosen_spanish: no seré avergonzado
  alternatives_spanish:
  - no quedaré avergonzado
  - no seré puesto en vergüenza
  - no me avergonzaré
  lexicon: HALOT
  rationale: בוש expresa ser avergonzado o quedar en vergüenza. «No seré avergonzado» mantiene la pasiva/resultativa que el inglés POB también buscó preservar con «be put to shame».
theological_decisions:
- issue: Renderizado del nombre divino en la combinación אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Yahvé, el Señor
  alternative_spanish_readings:
  - el Señor Yahvé
  - el Señor DIOS
  rationale: El texto hebreo contiene directamente el Tetragrámaton. Conforme a la convención doctrinal del proyecto, se usa «Yahvé» en lugar de ocultarlo tras «SEÑOR». Al mismo tiempo, se conserva «el Señor» para אֲדֹנָי, de modo que la combinación refleje ambos componentes del hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El pasaje coincide con el estado de revisión más reciente: no hubo cambios aplicados y el veredicto de revisión fue de alta concordancia. La redacción española sigue esa lectura estable, preservando las tensiones léxicas principales de נכלם / בוש y la imagen idiomática de «poner el rostro».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוִה en coherencia con la terminología del proyecto.
  - Se usa «el Señor» para אֲדֹנָי, diferenciándolo del nombre divino.
  - Se preserva la repetición de «por eso» para reflejar el paralelismo hebreo.
  - Se conserva la imagen corporal de «rostro» para פָנַי, en vez de interpretarla como «actitud» o «decisión».
  - Se distingue entre «avergonzado» y «avergonzado»/«ser avergonzado» como dos formulaciones relacionadas, para no borrar el paralelismo semántico entre נִכְלָמְתִּי y אֵבֽוֹשׁ.
