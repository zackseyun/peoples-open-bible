translation:
  language: es
  text: La Roca[a], perfecta es su obra, porque todos sus caminos son justicia. Dios de fidelidad[b] y sin injusticia alguna[c], justo y recto es él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la roca». El hebreo הַצּוּר puede leerse como título metafórico del Dios de Israel.
    reason: lexical_alternative
  - marker: b
    text: O «firmeza», «constancia» o, menos directamente en este contexto, «verdad».
    reason: lexical_alternative
  - marker: c
    text: O «no hay injusticia en él» / «sin iniquidad». El hebreo עָוֶל abarca injusticia, mal moral o iniquidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַצּוּר
  english_pob_choice: The Rock
  chosen_spanish: La Roca
  alternatives_spanish:
  - la roca
  - la peña
  - el peñasco
  lexicon: HALOT
  rationale: צור funciona aquí como título/metáfora para Dios en el Cántico de Moisés. En español, «La Roca» conserva ese valor titular y poético sin explicar en exceso la imagen.
- source_word: תָּמִים
  english_pob_choice: perfect
  chosen_spanish: perfecta
  alternatives_spanish:
  - sin defecto
  - íntegra
  - completa
  lexicon: HALOT
  rationale: Describe la integridad o totalidad de la obra de Dios. «Perfecta» comunica bien esa plenitud en un registro elevado y natural en español.
- source_word: פָּעֳלוֹ
  english_pob_choice: his work
  chosen_spanish: su obra
  alternatives_spanish:
  - su trabajo
  - su acción
  - lo que hace
  lexicon: HALOT
  rationale: El sustantivo singular con sufijo posesivo abarca la obra/actividad de Dios. «Obra» preserva la forma nominal y su sentido colectivo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque en efecto
  lexicon: HALOT
  rationale: Introduce la base explicativa de la afirmación anterior. En español, «porque» expresa con claridad esa relación causal o fundamentadora.
- source_word: כָל־דְּרָכָיו
  english_pob_choice: all his ways
  chosen_spanish: todos sus caminos
  alternatives_spanish:
  - todas sus sendas
  - todos sus modos de obrar
  - todos sus proceder
  lexicon: HALOT
  rationale: El hebreo usa un idiomatismo para conducta o manera de actuar. «Caminos» conserva la metáfora bíblica y es idiomático en español.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - sentencia justa
  - rectitud judicial
  lexicon: HALOT
  rationale: Aquí califica todos los caminos de Dios como conformes a la justicia. «Justicia» mantiene el sentido ético-jurídico y evita forzar «juicio» en español moderno.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios poderoso
  - el Dios fuerte
  lexicon: HALOT
  rationale: Se refiere al Dios de Israel. «Dios» es la equivalencia natural y suficiente en este contexto poético.
- source_word: אֱמוּנָה
  english_pob_choice: faithfulness
  chosen_spanish: fidelidad
  alternatives_spanish:
  - firmeza
  - constancia
  - verdad
  lexicon: HALOT
  rationale: El sustantivo expresa confiabilidad, firmeza y lealtad divina. «Fidelidad» en español preserva bien ese peso relacional y moral; «fidelidad» también evita reducirlo a mera «verdad» proposicional.
- source_word: וְאֵין עָוֶל
  english_pob_choice: and without injustice
  chosen_spanish: y sin injusticia
  alternatives_spanish:
  - y no hay maldad en él
  - y sin iniquidad
  - y no hay torcedura
  lexicon: HALOT
  rationale: La frase niega cualquier torcedura o injusticia en Dios. «Sin injusticia» sigue de cerca la fuerza del hebreo y su paralelismo con los atributos anteriores.
- source_word: צַדִּיק
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - righteous
  lexicon: HALOT
  rationale: En este encadenamiento adjetival, «justo» comunica naturalmente la rectitud moral y judicial de Dios en español, en paralelismo con «recto».
- source_word: וְיָשָׁר
  english_pob_choice: upright
  chosen_spanish: recto
  alternatives_spanish:
  - upright
  - íntegro
  - honrado
  lexicon: HALOT
  rationale: Yashar denota linealidad moral, rectitud y ausencia de desviación. «Recto» reproduce bien esa imagen y complementa «justo».
- source_word: הוּא
  english_pob_choice: is he
  chosen_spanish: es él
  alternatives_spanish:
  - él es
  - es él mismo
  lexicon: HALOT
  rationale: El orden final del hebreo enfatiza el predicado. «Es él» conserva, en la medida posible, el cierre enfático del verso.
theological_decisions:
- issue: La metáfora titulada de Dios en הַצּוּר
  english_pob_reading: Render as 'The Rock' with capitalization
  chosen_spanish_reading: «La Roca» con mayúscula inicial
  alternative_spanish_readings:
  - la roca
  - la peña
  rationale: El hebreo presenta una metáfora-título para el Dios de Israel. La mayúscula ayuda al lector español a percibir su fuerza titular sin perder la imagen de roca firme.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve metaphorical divine titles without masking them'
- issue: La fuerza de אֱמוּנָה como atributo divino
  english_pob_reading: faithfulness
  chosen_spanish_reading: fidelidad
  alternative_spanish_readings:
  - verdad
  - constancia
  - firmeza
  rationale: El contexto exalta la confiabilidad, lealtad y constancia moral de Dios. «Fidelidad» conserva esa densidad teológica mejor que una simple «verdad» abstracta.
  doctrine_reference: 'Translation philosophy: preserve theological weight; avoid narrowing covenantal reliability to propositional truth'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso de control cruzado fue alto, con solo observaciones menores. Por ello, esta redacción sigue de cerca el sentido del hebreo y mantiene las decisiones léxicas clave del audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología por defecto del proyecto solo cuando el texto fuente lo requiere explícitamente; en este versículo aparece un título divino metafórico, no el tetragrámaton.
  - 'Se preserva la trilogía de atributos finales con paralelismo claro: «fidelidad» / «sin injusticia» / «justo y recto».'
  - «Caminos» conserva la metáfora bíblica de conducta y acción divina en lugar de una paráfrasis explicativa.
  - No se sustituye «justicia» por «juicio» en el texto principal, aunque la nota reconoce esa alternativa semántica.
