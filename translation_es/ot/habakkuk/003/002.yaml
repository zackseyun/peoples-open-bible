  - severity: medium
    issue: '''Hazla conocer'' es poco natural en español para תּוֹדִיעַ.'
    rationale: Aunque formalmente posible, suena forzado. 'Dala a conocer' comunica mejor el hifil 'make it known' y es idiomático en español amplio.
  - severity: medium
    issue: '''Tu noticia'' suena poco idiomático y puede malentenderse.'
    rationale: Para שִׁמְעֲךָ el sentido es 'el reporte acerca de ti' o 'lo que se ha oído de ti', no una 'noticia' posesiva en español usual. Conviene una formulación más natural sin perder la amplitud semántica.
