review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del griego y del POB inglés: la construcción impersonal de imposibilidad, el matiz de παριδεῖν como «pasar por alto», la idea de ἡγεμονία como función rectora, y el contraste entre pasión interior y dolores exteriores. Sin embargo, «gobierno de la razón» suena algo político o abstracto en español bíblico/literario; «dominio de la razón» comunica mejor la idea de regencia o poder rector sobre las pasiones sin apartarse del campo semántico de ἡγεμονία.'
  spanish_quality_summary: El texto es claro y digno, pero una mejora leve aumentaría su naturalidad y fuerza idiomática. «Pasar por alto el dominio de la razón» lee con más fluidez que «pasar por alto el gobierno de la razón». El resto del verso es sólido; «prevalecieron sobre la pasión y los dolores» conserva bien el registro filosófico y el paralelismo.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Razón» para διάνοια sigue correctamente la decisión auditada, con nota alternativa «mente». No aparecen términos sensibles del glosario principal que requieran ajuste.
  issues:
  - severity: medium
    issue: «el gobierno de la razón» resulta menos idiomático y más institucional de lo deseable
    rationale: Aunque ἡγεμονία puede significar gobierno o dominio, en español «gobierno de la razón» puede sugerir administración o régimen político. «dominio de la razón» o «autoridad rectora de la razón» expresa mejor la idea filosófica de control sobre las pasiones preservada por el contexto de 4 Macabeos.
  revised_spanish_text: Es imposible pasar por alto el dominio de la razón[a], pues prevalecieron sobre la pasión y los dolores.
  revised_footnotes:
  - marker: a
    text: O «de la mente» para διάνοια. El término griego puede denotar mente o entendimiento; aquí probablemente destaca la facultad racional que gobierna las pasiones.
    reason: lexical_alternative
