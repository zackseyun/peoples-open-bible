  text: ἡ δὲ ἐκ πίστεως δικαιοσύνη οὕτως λέγει· Μὴ εἴπῃς ἐν τῇ καρδίᾳ σου· Τίς ἀναβήσεται εἰς τὸν οὐρανόν; τοῦτ’ ἔστιν Χριστὸν καταγαγεῖν·
base_translation:
  language: en
  yaml_path: translation/nt/romans/010/006.yaml
  text: 'But the righteousness from faith speaks in this way: “Do not say in your heart[a], ‘Who will ascend into heaven?’” (that is[c][b], to bring Messiah down).'
  footnotes:
  - marker: a
    text: Or 'justice from faith.' Paul’s δικαιοσύνη can carry both 'righteousness' and 'justice' in context.
    reason: lexical_alternative
  - marker: b
    text: Greek 'Christ'; rendered 'Messiah' here because Χριστός functions as a title rather than a name-like designation.
    reason: lexical_alternative
  - marker: c
    text: Paul is echoing Deuteronomy 30:12 and applying it to the Messiah.
    reason: cross_reference
translation:
  language: ko
  text: '그러나 믿음에서 난 의는 이렇게 말합니다: 「네 마음으로 ''누가 하늘로 올라가겠는가?'' 하지 말라.」 — 이는 메시아를 끌어내리려는 것입니다 —'
  philosophy: optimal-equivalence
