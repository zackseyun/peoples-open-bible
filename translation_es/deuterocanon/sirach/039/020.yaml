translation:
  language: es
  text: De eternidad[a] a eternidad, él observa, y nada es demasiado maravilloso ni demasiado fuerte para él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego paralelo dice: «de siglo en siglo miró, y nada es maravilloso ante él», sin el añadido hebreo «ni demasiado fuerte».'
    reason: textual_variant
lexical_decisions:
- source_word: מעולם ועד עולם
  english_pob_choice: From eternity to eternity
  chosen_spanish: De eternidad en eternidad
  alternatives_spanish:
  - De siglo en siglo
  - De eternidad a eternidad
  - De siempre a siempre
  lexicon: HALOT
  rationale: La expresión hebrea abarca un horizonte absoluto de tiempo; en español, «de eternidad en eternidad» conserva el tono elevado y la amplitud temporal sin calcar de manera extraña la forma hebrea. También armoniza bien con el paralelo griego ἀπὸ τοῦ αἰῶνος εἰς τὸν αἰῶνα.
- source_word: יביט
  english_pob_choice: he looks on
  chosen_spanish: él mira
  alternatives_spanish:
  - él ve
  - él observa
  - él contempla
  lexicon: HALOT
  rationale: El verbo expresa una mirada atenta o una observación continua. En español, «mira» mantiene la acción simple y gnómica que pide la sabiduría, sin convertirla en una paráfrasis más interpretativa.
- source_word: נפלא
  english_pob_choice: too wondrous
  chosen_spanish: demasiado maravilloso
  alternatives_spanish:
  - demasiado admirable
  - demasiado portentoso
  - maravilloso
  lexicon: HALOT
  rationale: El hebreo señala lo extraordinario o maravilloso; en una construcción negativa, «demasiado maravilloso» reproduce con naturalidad la idea de que nada queda fuera de su alcance. Esto mantiene la correspondencia con θαυμάσιον del griego.
- source_word: חזק
  english_pob_choice: too strong
  chosen_spanish: demasiado fuerte
  alternatives_spanish:
  - demasiado poderoso
  - demasiado vigoroso
  - demasiado robusto
  lexicon: HALOT
  rationale: El hebreo añade explícitamente la noción de fuerza/poder. «Demasiado fuerte» preserva ese segundo predicado sin neutralizarlo en «maravilloso» ni convertirlo en una explicación doctrinal.
- source_word: ממנו
  english_pob_choice: for him
  chosen_spanish: para él
  alternatives_spanish:
  - delante de él
  - frente a él
  - ante él
  lexicon: HALOT
  rationale: 'En español, la estructura negativa pide una frase natural: «nada es demasiado ... para él». Esto conserva la relación de límite/potencia implicada por el hebreo y el griego, sin forzar un comparativo ajeno al sentido.'
theological_decisions:
- issue: Sujeto implícito referido a Dios
  english_pob_reading: Render the subject as 'he,' referring to God from the surrounding context
  chosen_spanish_reading: Mantener el sujeto implícito en un «él» explícito, referido a Dios por el contexto
  alternative_spanish_readings:
  - Repetir «Dios»
  - Dejar el sujeto totalmente omitido
  rationale: El hebreo no nombra al sujeto, pero el contexto sapiencial y la lógica de la frase remiten a Dios. En español conviene explicitar «él» para que la oración sea idiomática y siga conservando la tersura del original sin añadir el nombre divino innecesariamente.
  doctrine_reference: Primacía del texto fuente y preservación de la sobriedad referencial; no sobre-explicitar donde el contexto ya identifica al sujeto.
translation_notes:
  revision_awareness: El borrador sigue la última revisión estable, sin cambios sustantivos respecto del consenso auditado; conserva la tensión textual entre el hebreo, que añade «ni demasiado fuerte», y el paralelo griego, que solo menciona lo maravilloso. No se introducen armonizaciones que borren esa diferencia.
  spanish_consistency_notes:
  - Se mantiene «eternidad» como equivalente reverente del idiomático hebreo de duración absoluta.
  - Se usa «él» para el referente divino por continuidad contextual, sin sustituirlo por un nombre explícito en el texto principal.
  - «Demasiado maravilloso» y «demasiado fuerte» conservan la doble afirmación del hebreo y la nota explica la variante griega.
  - La puntuación separa las dos cláusulas de manera natural en español bíblico contemporáneo.
