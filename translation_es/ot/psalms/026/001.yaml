base_translation:
  language: en
  yaml_path: translation/ot/psalms/026/001.yaml
  text: Of David[a]. Vindicate me, O Yahweh, for I have walked in my integrity, and I have trusted in Yahweh[c][b]; I will not slip.
  footnotes:
  - marker: a
    text: Or 'Judge me, O LORD.' The Hebrew verb can mean 'judge,' but here likely carries the sense 'vindicate' or 'give judgment in my favor.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in my blamelessness.' The Hebrew term denotes integrity, wholeness, or blameless conduct.
    reason: lexical_alternative
  - marker: c
    text: Or 'I shall not totter' or 'I shall not waver.' The Hebrew image is of slipping or losing footing.
    reason: lexical_alternative
