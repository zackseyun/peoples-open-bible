translation:
  language: es
  text: 'Entonces llamó a Giezi y dijo[a]: «Llama a esta sunamita». Así que la llamó, y ella se acercó a él. Entonces dijo: «Toma a tu hijo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esta sunamita». El hebreo usa un gentilicio femenino, literalmente «esta sunamita [mujer]».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: Then he called
  chosen_spanish: Entonces llamó
  alternatives_spanish:
  - Y llamó
  - Luego llamó
  lexicon: HALOT
  rationale: El wayyiqtol hebreo marca secuencia narrativa; «entonces» mantiene esa sucesión con fluidez natural en español sin perder el avance del relato.
- source_word: גֵּיחֲזִי
  english_pob_choice: Gehazi
  chosen_spanish: Giezi
  alternatives_spanish:
  - Gehazi
  lexicon: Transliteración tradicional adaptada
  rationale: Se conserva el nombre propio con una adaptación gráfica frecuente en español bíblico para facilitar lectura y pronunciación, sin alterar la referencia al personaje.
- source_word: קְרָא
  english_pob_choice: Call
  chosen_spanish: Llama
  alternatives_spanish:
  - Llama
  - Haz llamar
  - Convoca
  lexicon: HALOT
  rationale: El imperativo de קרא en este contexto es una orden directa a Gehazi; «llama» reproduce la orden con naturalidad. «Convoca» sería más formal y menos cercano al uso narrativo.
- source_word: הַשֻּׁנַמִּית הַזֹּאת
  english_pob_choice: this Shunammite woman
  chosen_spanish: esta sunamita
  alternatives_spanish:
  - esta sunamita mujer
  - esta mujer de Sunem
  - esta sunamita [mujer]
  lexicon: HALOT
  rationale: El hebreo usa un gentilicio femenino con artículo y demostrativo; en español «sunamita» ya funciona como sustantivo femenino y no requiere añadir «mujer» para ser claro. Se conserva «esta» para reflejar הַזֹּאת.
- source_word: וַיִּקְרָאֶהָ
  english_pob_choice: So he called her
  chosen_spanish: Así que la llamó
  alternatives_spanish:
  - Y la llamó
  - Entonces la llamó
  lexicon: HALOT
  rationale: Se mantiene la repetición explícita de קרא, que en el hebreo narra la obediencia de Gehazi. «La llamó» conserva el objeto directo femenino del pronombre hebreo.
- source_word: וַתָּבֹא אֵלָיו
  english_pob_choice: and she came to him
  chosen_spanish: y ella vino a él
  alternatives_spanish:
  - y fue hacia él
  - y se acercó a él
  - y vino a él
  lexicon: HALOT
  rationale: El movimiento בוא + אֶל expresa venir hacia una persona; «vino a él» sigue de cerca el sentido. Se mantiene «ella» por claridad, aunque el sujeto ya está implícito.
- source_word: שְׂאִי
  english_pob_choice: Take up
  chosen_spanish: Levanta
  alternatives_spanish:
  - Toma
  - Alza
  - Recibe
  lexicon: HALOT
  rationale: El imperativo femenino singular de נשׂא aquí pide levantar o alzar al hijo. «Levanta» es natural en español y conserva la fuerza de la acción ordenada.
- source_word: בְנֵךְ
  english_pob_choice: your son
  chosen_spanish: tu hijo
  alternatives_spanish:
  - tu hijo varón
  - tu niño
  lexicon: HALOT
  rationale: בן con sufijo femenino singular significa específicamente «tu hijo». «Hijo» preserva la precisión léxica mejor que «niño».
theological_decisions:
- issue: El tratamiento del nombre divino no aparece en este versículo, pero sí el registro narrativo de obediencia y restauración.
  english_pob_reading: No theological footnote needed in the English POB for this verse.
  chosen_spanish_reading: No se añade nota teológica; el versículo presenta una orden y su cumplimiento narrativo.
  alternative_spanish_readings:
  - Añadir una nota sobre obediencia y restauración
  rationale: El texto no contiene una tensión doctrinal explícita. La prioridad es conservar la secuencia narrativa y la precisión léxica sin sobrerinterpretar.
  doctrine_reference: Narrative context; no doctrinal claim requiring annotation
translation_notes:
  revision_awareness: El borrador sigue el estado revisado más reciente del POB en inglés, con acuerdo alto y sin cambios aplicados; por eso se preserva la estructura narrativa, la repetición de «llamar» y la referencia explícita a la mujer sunamita.
  spanish_consistency_notes:
  - Se usa «sunamita» en femenino como gentilicio sustantivado, coherente con el hebreo.
  - Se mantiene la repetición de «llamar» para reflejar la obediencia de Gehazi.
  - «Tu hijo» conserva la especificidad de בן frente a opciones más generales.
  - La puntuación en español sigue el estilo bíblico moderno con comillas angulares no requeridas; se usan comillas latinas simples para legibilidad.
  - El nombre propio se adapta a una forma española ampliamente reconocible sin alterar la identidad del personaje.
