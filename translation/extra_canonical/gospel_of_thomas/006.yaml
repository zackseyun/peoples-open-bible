      text: 'POxy 654 appears to read ‘… [all things will be] … truth be[fore heaven].’
        The Coptic carries a concrete uncovering image: ‘they will all be stripped
        out from their covering … before heaven.’ I translate the Coptic; ‘in truth’
        is a possible Greek nuance.'
      reason: textual_variant
    - marker: '2'
      text: The final cola use paired verbs for concealment and disclosure (ϩⲱⲡ/ϭⲱⲗⲡ;
        ϩⲱⲃⲥ/ϭⲱⲗⲡ). The last phrase literally reads ‘will not come out without being
        uncovered.’
      reason: dialect_note
    - marker: '3'
      text: ‘What shall we observe when we eat?’ renders ⲡⲁⲣⲁⲧⲏⲣⲉⲓ ⲉⲟⲩ ⲛϭⲓⲛⲟⲩⲱⲙ, literally
        ‘what shall we observe concerning a meal?’; ‘what diet shall we observe?’
        is a viable alternative.
      reason: lexical_alternative
    - marker: '4'
      text: ‘Do not tell lies’ translates ϫⲓϭⲟⲗ with negative imperative; ‘do not
        lie’ or ‘do not speak falsehood’ are possible alternatives.
      reason: lexical_alternative
    - marker: a
      text: Or 'will be stripped out from their covering and exposed before heaven'.
      reason: previous_rendering
    - marker: b
      text: Or 'what shall we observe when we eat?'.
      reason: previous_rendering
