translation:
  language: es
  text: Y cuando llegó allí el tercer día, la plata y el oro fueron pesados y entregados en la casa de Yahvé a Marmotí hijo de Uarías[a] el sacerdote; y con él estaba Eleazar hijo de Fineés; y con ellos estaban Josabees hijo de Jesús y Moet hijo de Sabano, los levitas, por número y por peso, todo ello; y todo el peso quedó registrado en aquel mismo momento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Las formas de los nombres aquí difieren de la tradición paralela del texto hebreo/masorético, que presenta formas como Meremot hijo de Urías, Eleazar hijo de Finees, y levitas correspondientes a Jonatán hijo de Jesúa y Noadías hijo de Binúi. El texto principal sigue el testimonio griego de 1 Esdras.
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ γενομένης αὐτόθι ἡμέρας τρίτης
  english_pob_choice: when the third day came there
  chosen_spanish: cuando llegó allí el tercer día
  alternatives_spanish:
  - al llegar allí el tercer día
  - cuando se cumplió allí el tercer día
  lexicon: LSJ
  rationale: La construcción genitiva absoluta expresa circunstancia temporal; en español conviene una frase natural que mantenga la idea de llegada del día y el matiz locativo de αὐτόθι ('allí').
- source_word: αὐτόθι
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - en ese lugar
  - ahí
  lexicon: LSJ
  rationale: Indica ubicación; 'allí' conserva el valor espacial de manera directa y fluida.
- source_word: σταθὲν τὸ ἀργύριον καὶ τὸ χρυσίον
  english_pob_choice: the silver and the gold were weighed
  chosen_spanish: la plata y el oro fueron pesados
  alternatives_spanish:
  - la plata y el oro fueron medidos por peso
  - la plata y el oro fueron pesados y contabilizados
  lexicon: LSJ
  rationale: El participio pasivo refleja que los metales fueron sometidos a pesaje previo a la entrega. 'Fueron pesados' es fiel y natural; no añado 'entregados' al verbo de pesaje porque ya lo expresa el contexto siguiente.
- source_word: παρεδόθη
  english_pob_choice: handed over
  chosen_spanish: entregados
  alternatives_spanish:
  - fueron entregados
  - fueron confiados
  lexicon: LSJ
  rationale: El verbo describe una transferencia formal de custodia. En español, 'entregados' mantiene el acto administrativo sin sobreinterpretarlo.
- source_word: ἐν τῷ οἴκῳ Κυρίου
  english_pob_choice: in the house of the Lord
  chosen_spanish: en la casa de Yahvé
  alternatives_spanish:
  - en la casa del Señor
  - en el templo de Yahvé
  lexicon: LSJ
  rationale: Se sigue el criterio del proyecto para יהוה/YHWH → 'Yahvé'. 'Casa de Yahvé' conserva la fórmula bíblica y evita el enmascaramiento con 'SEÑOR'.
- source_word: Μαρμωθὶ Οὐρείᾳ ἱερεῖ
  english_pob_choice: to Marmothi son of Ourias the priest
  chosen_spanish: a Marmotí hijo de Uarías el sacerdote
  alternatives_spanish:
  - a Marmotí, hijo de Uarías, el sacerdote
  - a Meremot hijo de Urías el sacerdote
  lexicon: LSJ
  rationale: Los nombres se transliteran desde el testimonio griego principal. Mantengo la relación patronímica con 'hijo de' y el oficio con 'el sacerdote'. La forma 'Uarías' refleja la adaptación del griego Οὐρείᾳ, sin normalizarla al paralelo hebreo.
- source_word: Ἐλεαζὰρ ὁ τοῦ Φεινεές
  english_pob_choice: Eleazar son of Phinehas
  chosen_spanish: Eleazar hijo de Fineés
  alternatives_spanish:
  - Eleazar, hijo de Fineés
  - Eleazar el hijo de Fineés
  lexicon: LSJ
  rationale: La construcción con artículo y genitivo expresa filiación; 'hijo de' es la forma castellana clara y estándar.
- source_word: Ἰωσαβεὲς Ἰησοῦς καὶ Μωὲθ Σαβάννου
  english_pob_choice: Josabees son of Jesous and Moeth son of Sabannus
  chosen_spanish: Josabees hijo de Jesús y Moet hijo de Sabano
  alternatives_spanish:
  - Josabees hijo de Jesús y Moet hijo de Sabannus
  - Josabees hijo de Jesús y Moet hijo de Sabano
  lexicon: LSJ
  rationale: Se preservan las formas griegas de los nombres propios principales, ajustadas a una ortografía española legible. 'Jesús' se usa para Ἰησοῦς por consistencia con el nombre propio en español.
- source_word: οἱ Λευεῖται
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levitas allí
  - los levitas presentes
  lexicon: LSJ
  rationale: Traducción directa y convencional del etnónimo sacerdotal.
- source_word: πρὸς ἀριθμὸν καὶ ὁλκὴν πάντα
  english_pob_choice: by number and by weight, all of it
  chosen_spanish: por número y por peso, todo ello
  alternatives_spanish:
  - según número y peso, todo
  - con número y peso exactos, todo ello
  lexicon: LSJ
  rationale: 'La frase expresa control administrativo doble: conteo y pesaje. ''Por número y por peso'' conserva la estructura de la fuente; ''todo ello'' mantiene el alcance total sin añadir explicación.'
- source_word: ἐγράφη πᾶσα ἡ ὁλκὴ αὐτῇ τῇ ὥρᾳ
  english_pob_choice: the whole weight was recorded at that very time
  chosen_spanish: todo el peso fue escrito en aquel mismo momento
  alternatives_spanish:
  - todo el peso fue registrado en aquel mismo momento
  - se escribió el peso total en aquel mismo momento
  lexicon: LSJ
  rationale: ἐγράφη indica que quedó consignado por escrito. 'Fue escrito' mantiene la literalidad administrativa; 'registrado' sería una equivalencia explicativa posible, pero menos cercana a la forma verbal del griego.
theological_decisions:
- issue: Tratamiento del nombre divino en la fórmula del templo
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: Aunque el inglés POB usa 'Lord' por convención de traducción, el proyecto establece Yahvé para יהוה/YHWH. La expresión 'casa de Yahvé' preserva la referencia cultual y evita la sustitución por una convención tipográfica opaca.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה / YHWH → Yahvé'
- issue: Nombres propios griegos frente a formas más conocidas del paralelo hebreo
  english_pob_reading: Transliterate the Greek forms in the main text
  chosen_spanish_reading: Transliterar las formas griegas en el texto principal
  alternative_spanish_readings:
  - Normalizar a las formas del paralelo hebreo (Meremot, Urías, etc.)
  - Usar equivalentes castellanos tradicionales
  rationale: El testimonio base es el griego de 1 Esdras. Por eso se conservan las formas griegas transliteradas en español, aun cuando el paralelo hebreo ofrezca variantes más familiares. Esto mantiene la primacía de la fuente original y la auditabilidad textual.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy; Translate titles, transliterate names'
- issue: Uso de 'hijo de' para relaciones patronímicas
  english_pob_reading: son of
  chosen_spanish_reading: hijo de
  alternative_spanish_readings:
  - de
  - descendiente de
  rationale: La filiación griega se expresa con artículo + genitivo; 'hijo de' reproduce con claridad la relación de parentesco sin introducir ambigüedad genealógica adicional.
  doctrine_reference: DOCTRINE.md Names and kinship expressions
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la última revisión del audit trail inglés, que simplificó ''weighed out'' a ''weighed'' por ser una representación más directa del griego. En español se refleja esa directitud con ''fueron pesados'', sin añadir matices de salida o distribución que no están en el verbo fuente. También se preservó el carácter administrativo del pasaje: pesaje, entrega, presencia de testigos levitas y registro escrito inmediato.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino conforme al estándar del proyecto.
  - Los nombres propios griegos se transliteran de manera consistente en el cuerpo principal.
  - '''Hijo de'' se usa uniformemente para los patronímicos.'
  - '''Fue escrito'' conserva el registro administrativo del griego ἐγράφη.'
  - La puntuación separa claramente las cláusulas de acción, testigos y registro final.
