  to: Pero nosotros mismos nos armaremos con rapidez delante de los hijos de Israel[a], hasta que los hayamos llevado a su lugar; y nuestros pequeños[b] quedarán en las ciudades fortificadas a causa de los habitantes de la tierra.
  rationale: Se reemplaza «nos alistaremos» por «nos armaremos» para ajustarse mejor al valor reflexivo-militar de נֵחָלֵץ y a la decisión léxica documentada por el POB. Se corrige el anclaje de la nota b para que acompañe a «nuestros pequeños», que es el elemento que la nota explica. También se suaviza «por causa de» a «a causa de», una formulación más natural en español sin cambio de sentido.
