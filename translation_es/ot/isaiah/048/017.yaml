    issue: La nota [a] está anclada en 'Yahvé' pero su contenido trata de 'el que te enseña para tu provecho'.
    rationale: 'Esto viola la disciplina requerida de notas: el marcador debe aparecer en la palabra o frase relevante. Además, no hay ninguna nota sobre el nombre divino en el expediente inglés.'
  - severity: medium
