lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los hijos de
  - Los descendientes de
  lexicon: HALOT
  rationale: En un encabezado genealógico, el hebreo בְּנֵי introduce una lista de descendencia. En español, «los hijos de» conserva la relación filial y el marco genealógico sin volver la frase innecesariamente pesada. «Descendientes» ampliaría el sentido más allá del parentesco directo y perdería parte del paralelismo del hebreo.
- source_word: אַבְרָהָם
  english_pob_choice: Abraham
  chosen_spanish: Abraham
  alternatives_spanish:
  - Abrahán
  lexicon: HALOT
  rationale: Nombre propio bíblico; se mantiene la forma más reconocible y estándar en español bíblico y eclesial.
- source_word: יִצְחָק
  english_pob_choice: Isaac
  chosen_spanish: Isaac
  lexicon: HALOT
  rationale: Nombre propio bíblico con equivalencia estable en español.
- source_word: וְ/יִשְׁמָעֵאל
  english_pob_choice: and Ishmael
  chosen_spanish: e Ismael
  alternatives_spanish:
  - y Ismael
  lexicon: HALOT
  rationale: La conjunción hebrea וְ se expresa naturalmente como «e» ante palabra que inicia con /i/ para evitar hiato, siguiendo el uso normal del español. El nombre propio se traduce con la forma estable «Ismael».
translation_notes:
  revision_awareness: El texto base inglés fue revisado y quedó sin cambios; el punto decisivo es la elección española para בְּנֵי en un contexto genealógico, manteniendo la relación filial sin diluirla.
  spanish_consistency_notes:
  - Se conserva el orden directo y la puntuación del encabezado genealógico.
  - Se usa «e» por eufonía antes de Ismael, sin alterar el valor semántico de la conjunción.
  - No hay decisiones teológicas adicionales en este versículo; el peso recae en la formulación genealógica.
