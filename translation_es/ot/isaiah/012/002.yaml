  glossary_alignment: Alinea correctamente YHWH como «Yahvé» y conserva «Yah» para יָהּ. Usa «Dios», «salvación», «fuerza» y «cántico» de manera coherente con la terminología del proyecto. No hay conflicto teológico importante; la principal mejora es de aparato de notas y de naturalidad estilística en la cláusula final.
