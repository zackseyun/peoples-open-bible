translation:
  language: es
  text: Y mirarás la aflicción[a] de la morada, en todo el bien que él hará a Israel, y en tu casa no habrá ningún hombre que llegue a viejo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un adversario en la morada», «aflicción en el santuario» o similar; la expresión hebrea es difícil.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהִבַּטְתָּ
  english_pob_choice: you will look on
  chosen_spanish: mirarás
  alternatives_spanish:
  - verás
  - contemplarás
  - mirarás con atención
  lexicon: HALOT
  rationale: El imperfecto con prefijo וְ expresa una acción futura; en español, "mirarás" conserva la sencillez y la inmediatez del hebreo sin cargar una interpretación emocional que el texto no exige.
- source_word: צַר מָעוֹן
  english_pob_choice: the distress of the dwelling
  chosen_spanish: la aflicción de la morada
  alternatives_spanish:
  - el adversario de la morada
  - la angustia del santuario
  - el conflicto de la morada
  lexicon: HALOT
  rationale: La combinación es difícil y admite varias lecturas. "Aflicción" mantiene el campo semántico de צר sin decidirse por una persona adversaria específica, y "morada" conserva מָעוֹן como lugar de habitación sin imponer una identificación más precisa que el hebreo no garantiza.
- source_word: בְּכֹל אֲשֶׁר יֵיטִיב אֶת יִשְׂרָאֵל
  english_pob_choice: in all the good that he does for Israel
  chosen_spanish: en todo el bien que él hará a Israel
  alternatives_spanish:
  - en todo el bien que haga para Israel
  - mientras haga bien a Israel
  - en toda la bondad que otorgue a Israel
  lexicon: HALOT
  rationale: La frase retiene la sintaxis amplia del hebreo y deja el sujeto implícito como en el original, aunque el contexto apunta naturalmente a Dios. "Bien" reproduce היטיב de forma sobria y comprensible.
- source_word: זָקֵן
  english_pob_choice: an old man
  chosen_spanish: anciano
  alternatives_spanish:
  - hombre viejo
  - viejo
  - un hombre de edad avanzada
  lexicon: HALOT
  rationale: Aquí זָקֵן describe edad, no oficio. "Anciano" comunica bien la idea en español bíblico actual sin sonar tan áspero como "hombre viejo" y sin convertirlo en un cargo eclesiástico o civil.
- source_word: בְּבֵיתְךָ
  english_pob_choice: in your house
  chosen_spanish: en tu casa
  alternatives_spanish:
  - en tu familia
  - en tu casa-hogar
  - en tu linaje
  lexicon: HALOT
  rationale: '"Casa" preserva el hebraísmo de בית y permite oír el sentido de casa/linaje en contexto, sin sobreexplicar ni reemplazarlo por un término más interpretativo.'
- source_word: כָּל הַיָּמִים
  english_pob_choice: all the days
  chosen_spanish: todos los días
  alternatives_spanish:
  - siempre
  - por todos los días
  - todos sus días
  lexicon: HALOT
  rationale: La elección sigue de cerca la expresión idiomática hebrea y refleja el matiz formal del inglés POB "all the days". "Todos los días" mantiene la cadencia solemne sin añadir una absolutización extra.
theological_decisions:
- issue: Interpretación de צַר מָעוֹן
  english_pob_reading: distress of the dwelling
  chosen_spanish_reading: la aflicción de la morada
  alternative_spanish_readings:
  - el adversario de la morada
  - la aflicción del santuario
  - la angustia de la morada
  rationale: La expresión hebrea es ambigua y el propio audit trail inglés preserva esa dificultad. En español conviene mantener la tensión sin resolverla artificialmente hacia un enemigo personal o hacia una lectura más precisa del santuario que el texto no obliga a adoptar.
  doctrine_reference: Translation philosophy §3
- issue: Referencia implícita del bien hecho a Israel
  english_pob_reading: he does for Israel
  chosen_spanish_reading: él hará a Israel
  alternative_spanish_readings:
  - él hace a Israel
  - Dios hace bien a Israel
  - él otorga bien a Israel
  rationale: Se conserva la referencia implícita del sujeto, que en contexto se entiende como Dios, sin introducir explícitamente un nombre que el hebreo de esta cláusula no expresa. Esto respeta la economía del original y la coherencia con la lectura inglesa.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión reciente del inglés POB que sustituyó "never" por "not ... all the days" para reflejar con más fidelidad el hebreo. Por eso se evitó cualquier adverbio absoluto en español como "nunca" o "siempre", y se conservó la estructura formal de duración: "todos los días".'
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" como forma base para el Tetragrámaton solo cuando el texto lo exigiera; en este versículo no aparece.
  - Se prefirió "anciano" para זָקֵן por edad, no por función, evitando el uso de "presbítero" o "anciano" en sentido eclesiástico.
  - '"Morada" se eligió para no fijar prematuramente si el referente es la casa sacerdotal o el santuario mismo; la nota aclara la ambigüedad.'
  - Se conservó el paralelismo sobrio del versículo con sintaxis española natural, sin suavizar la severidad del anuncio.
