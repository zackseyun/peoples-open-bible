revisions:
- from: Después de esto, edificó un muro exterior para la ciudad de David[a], al oeste de Gihón, en el valle, hasta la entrada de la puerta de los Peces; y rodeó el Ofel[b], y lo elevó mucho. También puso comandantes militares en todas las ciudades fortificadas de Judá.
  to: Después de esto, edificó una muralla exterior para la ciudad de David, al oeste de Gihón en el valle, hasta la entrada[a] de la Puerta de los Peces; rodeaba Ofel[b], y la hizo muy alta[c]. También puso comandantes militares en todas las ciudades fortificadas en Judá.
  rationale: Se revisa para reflejar la decisión auditada clave de que el muro, no Manasés, es el que rodea Ofel. También se reubica la nota [a] donde corresponde, se añade la alternativa léxica omitida para el verbo relacionado con Ofel, se mejora la capitalización del topónimo «Puerta de los Peces» y se ajusta «en Judá» para conservar el valor locativo del hebreo.
