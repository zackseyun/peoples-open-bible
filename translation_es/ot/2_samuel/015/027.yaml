  to: 'Entonces el rey dijo a Sadoc el sacerdote: «¿Eres un vidente[a]? Vuelve a la ciudad en paz, y tus dos hijos contigo, Ahimaaz tu hijo y Jonatán hijo de Abiatar».'
  rationale: 'Se corrige la única falla sustancial del borrador: la forma «un[a]» en el texto principal. Se reemplaza por «un» para reflejar el masculino singular del hebreo dirigido a Sadoc y para mantener un español natural, digno y eclesialmente legible. Se conserva «vidente» como mejor equivalente de la lectura principal de הֲרוֹאֶה, y se mantiene la nota para la alternativa interrogativa sobre ver/percibir.'
