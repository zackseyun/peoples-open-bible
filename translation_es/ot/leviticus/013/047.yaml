translation:
  language: es
  text: Y si una prenda tiene en ella una afección de lepra[a], sea una prenda de lana o una prenda de lino,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo tsaraat, tradicionalmente traducido 'lepra', se refiere aquí a una categoría más amplia de condiciones enfermizas o contaminantes, incluso las que afectan prendas, no específicamente a la enfermedad de Hansen moderna.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבֶּגֶד
  english_pob_choice: a garment
  chosen_spanish: una prenda
  alternatives_spanish:
  - un vestido
  - una ropa
  - un vestido o prenda
  lexicon: HALOT
  rationale: בגד designa una pieza de vestimenta o prenda. En español, "prenda" conserva el sentido genérico y funciona mejor que "vestido" o "ropa" en un registro legal-litúrgico. Se evita el artículo definido porque el hebreo aquí es genérico/casuístico.
- source_word: כִּי יִהְיֶה ב֖וֹ
  english_pob_choice: if ... has in it
  chosen_spanish: si ... tiene en ella
  alternatives_spanish:
  - cuando ... tiene en ella
  - si ... hay en ella
  - si ... presenta
  lexicon: HALOT
  rationale: La construcción legal introduce un caso hipotético; "si" comunica bien ese valor. Para בוֹ se preserva la localización interna con "en ella", concordando con "prenda" en español.
- source_word: נֶגַע
  english_pob_choice: an outbreak
  chosen_spanish: una plaga
  alternatives_spanish:
  - una marca
  - una lesión
  - una afección
  lexicon: HALOT
  rationale: En Levítico 13, נגע es el término técnico para una afección visible/contaminante. "Plaga" mantiene la fuerza tradicional y amplia del término mejor que opciones demasiado clínicas; además, encaja con el uso bíblico de una condición ritual más que dermatológica.
- source_word: צָרָעַת
  english_pob_choice: leprosy
  chosen_spanish: tzaraat
  alternatives_spanish:
  - lepra
  - enfermedad de la lepra
  - afección de tzaraat
  lexicon: HALOT
  rationale: Se conserva la transliteración "tzaraat" para no reducir el término al concepto moderno de lepra/Hansen, siguiendo la preocupación auditable de la POB por la amplitud semántica y ritual del hebreo. Esto evita borrar la tensión lexical entre el término tradicional y su sentido más amplio.
- source_word: בְּבֶגֶד צֶמֶר
  english_pob_choice: in a wool garment
  chosen_spanish: una prenda de lana
  alternatives_spanish:
  - una prenda de lana
  - una prenda hecha de lana
  - en una prenda de lana
  lexicon: HALOT
  rationale: צמר se refiere al material, por lo que "de lana" es natural y fiel. Se omite repetir la preposición "en" antes del material para que el español sea idiomático, manteniendo el sentido de especificación material.
- source_word: אוֹ בְּבֶגֶד פִּשְׁתִּים
  english_pob_choice: whether ... or ... a linen garment
  chosen_spanish: sea ... o ... una prenda de lino
  alternatives_spanish:
  - o una prenda de lino
  - sea una prenda de lino
  - o en una prenda de lino
  lexicon: HALOT
  rationale: La disyuntiva hebrea se refleja con "sea ... o ...", que conserva el valor casuístico de la cláusula y evita una simple enumeración menos precisa. "Lino" es el equivalente natural de פשתים como tejido acabado.
theological_decisions:
- issue: Amplitud ritual de צָרָעַת frente a la lepra moderna
  english_pob_reading: The English POB retains 'leprosy' while noting in a footnote that Hebrew tsaraath is a broader category, not modern Hansen's disease.
  chosen_spanish_reading: Se translitera "tzaraat" en el texto principal y se aclara en nota que se trata de una categoría ritual amplia, no de la lepra moderna.
  alternative_spanish_readings:
  - lepra
  - enfermedad de la piel
  - afección ritual
  rationale: La transliteración evita imponer una equivalencia médica moderna que estrecha indebidamente el hebreo. Dado que el versículo habla de prendas, no de enfermedad humana, mantener el término técnico con nota preserva la tensión lexical y teológica documentada por la POB.
  doctrine_reference: Levítico 13; distinción entre impureza ritual y enfermedad clínica moderna
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó una repetición pesada por la forma casuística 'whether ... or ...'. En español se reflejó con la estructura 'sea ... o ...', que mantiene el paralelismo legal sin calco incómodo. También se atendió al comentario de la POB sobre la amplitud de tsaraath evitando traducirlo mecánicamente como 'lepra' en el texto principal.
  spanish_consistency_notes:
  - Se usa "Yahvé" para el Tetragrámaton cuando aparezca; en este versículo no ocurre.
  - Se mantiene el registro legal conciso y paralelístico propio de Levítico.
  - '"Prenda" se usa de forma consistente como equivalente genérico de בגד.'
  - La transliteración "tzaraat" evita una colisión semántica con el concepto médico moderno de lepra.
