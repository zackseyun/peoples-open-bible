translation:
  language: es
  text: Los ancianos de la hija de Sion[b] se sientan en tierra, en silencio[a]; echan polvo sobre sus cabezas y se ciñen de cilicio; las vírgenes de Jerusalén inclinan sus cabezas hasta la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «callados». El hebreo expresa silencio o quietud en el duelo; aquí se mantiene la formulación adverbial para conservar la postura y el estado anímico.'
    reason: lexical_alternative
  - marker: b
    text: «Hija de Sion» es una personificación poética de Sion/Jerusalén, conservada aquí por fidelidad al hebreo.
    reason: cultural_note
lexical_decisions:
- source_word: יֵשְׁבוּ
  english_pob_choice: sit
  chosen_spanish: se sientan
  alternatives_spanish:
  - se sientan
  - se sientan allí
  - toman asiento
  lexicon: HALOT
  rationale: ישׁב expresa la postura concreta de sentarse; en este lamento, el presente español mantiene la vividez descriptiva sin añadir duración no explicitada.
- source_word: לָאָרֶץ
  english_pob_choice: on the ground
  chosen_spanish: en tierra
  alternatives_spanish:
  - en el suelo
  - sobre la tierra
  - en el suelo, en tierra
  lexicon: HALOT
  rationale: La combinación con ישׁב indica ubicación/postura; «en tierra» es natural en español bíblico y conserva el paralelismo con el contexto de duelo.
- source_word: יִדְּמוּ
  english_pob_choice: in silence
  chosen_spanish: en silencio
  alternatives_spanish:
  - callados
  - en quietud
  - sin decir palabra
  lexicon: HALOT
  rationale: דמם aquí comunica silencio o quietud por duelo; en español funciona mejor como modificador adverbial que como verbo independiente.
- source_word: זִקְנֵי בַת צִיּוֹן
  english_pob_choice: the elders of daughter Zion
  chosen_spanish: los ancianos de la hija de Sion
  alternatives_spanish:
  - los ancianos de la hija de Sion
  - los ancianos de la hija de Jerusalén
  - los ancianos de Sion
  lexicon: HALOT
  rationale: Se conserva la personificación poética «hija de Sion» sin diluirla en una referencia más plana a Sion/Jerusalén.
- source_word: הֶעֱלוּ עָפָר עַל רֹאשָׁם
  english_pob_choice: have thrown dust on their heads
  chosen_spanish: echaron polvo sobre sus cabezas
  alternatives_spanish:
  - echaron polvo sobre sus cabezas
  - arrojaron polvo sobre sus cabezas
  - pusieron polvo sobre sus cabezas
  lexicon: HALOT
  rationale: El gesto de duelo se expresa de forma directa; «polvo» reproduce el sustantivo hebreo con claridad y «echaron» es idiomático en español.
- source_word: חָגְרוּ שַׂקִּים
  english_pob_choice: put on sackcloth
  chosen_spanish: se ciñeron de cilicio
  alternatives_spanish:
  - se ciñeron de cilicio
  - llevaron cilicio
  - se vistieron de cilicio
  lexicon: HALOT
  rationale: חגר con שׂקּים conserva la imagen de ceñirse con la prenda de duelo; «cilicio» es el equivalente tradicional y comprensible en español eclesial.
- source_word: הוֹרִידוּ לָאָרֶץ רֹאשָׁן
  english_pob_choice: have bowed their heads to the ground
  chosen_spanish: han inclinado su cabeza hasta la tierra
  alternatives_spanish:
  - han inclinado su cabeza hasta la tierra
  - han bajado la cabeza hasta el suelo
  - han inclinado sus cabezas hasta la tierra
  lexicon: HALOT
  rationale: El hebreo describe el descenso de la cabeza como gesto de humillación y lamento; «hasta la tierra» conserva el alcance literal sin redundancia.
- source_word: בְּתוּלֹת יְרוּשָׁלִָם
  english_pob_choice: the virgins of Jerusalem
  chosen_spanish: las vírgenes de Jerusalén
  alternatives_spanish:
  - las vírgenes de Jerusalén
  - las doncellas de Jerusalén
  - las jóvenes de Jerusalén
  lexicon: HALOT
  rationale: בְּתוּלֹת apunta de manera específica a «vírgenes»; se preserva la fuerza léxica que el audit trail inglés también retuvo.
theological_decisions:
- issue: Preservación de la personificación poética «hija de Sion»
  english_pob_reading: daughter Zion is a poetic personification preserved from the Hebrew rather than paraphrased away.
  chosen_spanish_reading: «la hija de Sion» se mantiene como personificación poética, no como una referencia simplificada a la ciudad.
  alternative_spanish_readings:
  - «Sion»
  - «la ciudad de Sion»
  - «Jerusalén»
  rationale: El hebreo usa un título poético con carga afectiva y comunitaria; suprimirlo borraría una tensión literaria importante del lamento.
  doctrine_reference: Poética bíblica y personificación profética
translation_notes:
  revision_awareness: Se incorporó la revisión inglesa más reciente eliminando cualquier redundancia equivalente a «down» en la clausula final. El español refleja ese ajuste con «hasta la tierra», sin duplicar la idea de descenso.
  spanish_consistency_notes:
  - Se mantiene «Sion» y no «Sión» para coherencia toponímica interna si el proyecto opta por la forma sin tilde en nombres transliterados.
  - «cilicio» comunica la prenda de duelo con naturalidad en español bíblico y preserva la imagen de ceñirse con ella.
  - 'La sintaxis respeta el paralelismo del hebreo: ancianos / polvo / cilicio / vírgenes, sin añadir elementos explicativos.'
