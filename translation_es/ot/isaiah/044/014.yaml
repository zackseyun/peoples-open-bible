translation:
  language: es
  text: Corta cedros para sí, o toma un ciprés[a] o un roble y lo elige entre los árboles del bosque[b]. Planta un pino[c], y la lluvia lo hace crecer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo תִּרְזָה: identificación botánica incierta; posibles renderizaciones incluyen ciprés, encina, terebinto u olmo.'
    reason: lexical_alternative
  - marker: b
    text: O «y lo fortalece para sí entre los árboles del bosque»; la cláusula hebrea es difícil y también puede describir el cultivo del árbol o la selección de uno robusto de entre los árboles del bosque.
    reason: alternative_reading
  - marker: c
    text: 'Hebreo אֹרֶ: identificación botánica incierta; posibles renderizaciones incluyen pino, abeto, fresno o laurel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִכְרָת
  english_pob_choice: He cuts down
  chosen_spanish: Él corta
  alternatives_spanish:
  - Él derriba
  - Corta
  lexicon: HALOT
  rationale: El infinitivo con ל expresa la acción del leñador; en español un verbo finito en presente mantiene la vividez descriptiva del contexto anti-idolátrico. «Corta» comunica la acción sin añadir matices no presentes.
- source_word: לּוֹ
  english_pob_choice: for himself
  chosen_spanish: para sí
  alternatives_spanish:
  - para él
  - para su propio uso
  lexicon: HALOT
  rationale: El dativo marca beneficio o propósito personal. «Para sí» es natural en español y conserva la idea de que la madera se obtiene para el proyecto del artesano.
- source_word: אֲרָזִים
  english_pob_choice: cedars
  chosen_spanish: cedros
  alternatives_spanish:
  - cedros
  lexicon: HALOT
  rationale: «Cedros» es el equivalente directo y natural para el plural hebreo.
- source_word: תִּרְזָה
  english_pob_choice: a cypress tree
  chosen_spanish: un ciprés
  alternatives_spanish:
  - una especie de árbol incierta
  - un terebinto
  - un olmo
  - una encina de tipo incierto
  lexicon: HALOT
  rationale: La identificación botánica es incierta; en español «ciprés» es una renderización común y comprensible. Se conserva la incertidumbre en nota, como en el audit trail inglés.
- source_word: וְאַלּוֹן
  english_pob_choice: an oak
  chosen_spanish: un roble
  alternatives_spanish:
  - una encina
  - un roble
  lexicon: HALOT
  rationale: אַלּוֹן corresponde con claridad a un árbol del tipo «oak»; «roble» es la opción más natural en español. La conjunción puede entenderse aquí de modo disyuntivo en la lista de posibles maderas.
- source_word: וַיְאַמֶּץ לּוֹ
  english_pob_choice: and chooses it from among the trees of the forest
  chosen_spanish: y lo elige entre los árboles del bosque
  alternatives_spanish:
  - y lo fortalece para sí entre los árboles del bosque
  - y lo escoge de entre los árboles del bosque
  lexicon: HALOT
  rationale: El verbo אמץ es semánticamente difícil en este contexto. Siguiendo la revisión inglesa, se prefiere un sentido de selección, no de fortalecimiento literal, porque el paralelismo apunta a escoger una pieza de madera entre árboles del bosque.
- source_word: בַּעֲצֵי יָעַר
  english_pob_choice: among the trees of the forest
  chosen_spanish: entre los árboles del bosque
  alternatives_spanish:
  - entre la madera del bosque
  - entre los árboles del bosque
  lexicon: HALOT
  rationale: La expresión localiza la elección dentro del bosque. «Entre los árboles del bosque» conserva la imagen sin forzar un castellano artificioso.
- source_word: נָטַע
  english_pob_choice: He plants
  chosen_spanish: Planta
  alternatives_spanish:
  - Él planta
  - Plantó
  lexicon: HALOT
  rationale: El verbo introduce otra acción típica y presente del artesano. El presente castellano mantiene el tono descriptivo general.
- source_word: אֹרֶ
  english_pob_choice: a pine
  chosen_spanish: un pino
  alternatives_spanish:
  - un abeto
  - un laurel
  - un fresno
  lexicon: HALOT
  rationale: La especie exacta es incierta; «pino» es una opción común y plausible en español, mientras la nota preserva la incertidumbre lexical.
- source_word: וְגֶשֶׁם יְגַדֵּל
  english_pob_choice: and the rain makes it grow
  chosen_spanish: y la lluvia lo hace crecer
  alternatives_spanish:
  - y la lluvia lo hace crecer
  - y la lluvia lo engrandece
  lexicon: HALOT
  rationale: La cláusula subraya el crecimiento ordinario provisto por la lluvia. «Lo hace crecer» es claro y recoge el causativo sin sobrerelaborar el hebreo.
theological_decisions:
- issue: Descripción satírica de la fabricación de ídolos a partir de madera común
  english_pob_reading: 'Translate the verse as a sequence of ordinary actions by the idol-maker: cutting or taking timber, choosing a strong tree among forest trees, planting another tree, and rain causing growth.'
  chosen_spanish_reading: 'Traducir la secuencia como acciones ordinarias del artesano: corta cedros, toma un ciprés o un roble, lo elige entre los árboles del bosque, planta un pino, y la lluvia lo hace crecer.'
  alternative_spanish_readings:
  - Traducirlo de forma más literal y marcada con perfectivos consecutivos
  - Entender que la frase final sugiere algún cultivo especial del árbol
  rationale: 'No hay una controversia doctrinal aquí, sino una sátira profética: el material del ídolo procede de árboles comunes que crecen por la lluvia ordinaria. La lectura elegida preserva ese contraste y evita introducir una interpretación excesiva en la cláusula קשה/difícil.'
  doctrine_reference: Transparencia textual y cautela exegética; Isaías 44:9-20 en contexto
- issue: Valor de וַיְאַמֶּץ לוֹ בַּעֲצֵי יָעַר
  english_pob_reading: The Hebrew clause is difficult and may describe either cultivating the tree or selecting a strong tree from the forest.
  chosen_spanish_reading: «Y lo elige entre los árboles del bosque»
  alternative_spanish_readings:
  - «y lo fortalece para sí entre los árboles del bosque»
  - «y lo escoge de entre los árboles del bosque»
  rationale: 'Se conserva la tensión lexical: el hebreo es comprimido y ambiguo. La solución sigue la revisión inglesa más reciente y evita una frase que sugiera, sin base suficiente, que el árbol fue ‘fortalecido’ allí.'
  doctrine_reference: Principios de traducción de la POB §1, §3, §6
translation_notes:
  revision_awareness: La redacción sigue el último pase de revisión del audit trail inglés, que corrigió la lectura de וַיְאַמֶּץ לּוֹ בַּעֲצֵי יָעַר desde una idea de ‘hacerlo fuerte’ hacia ‘escogerlo de entre los árboles del bosque’. También preserva la incertidumbre lexical de תִּרְזָה y אֹרֶ mediante notas, tal como el inglés POB.
  spanish_consistency_notes:
  - Se usó «Yahvé» no corresponde aquí porque el versículo no contiene el tetragrámaton.
  - Se mantuvo un registro descriptivo en presente para reflejar la escena general, como en el inglés POB.
  - Se prefirió «roble» para אַלּוֹן por naturalidad en español; «encina» quedaría como alternativa válida en nota si se quisiera enfatizar una identificación distinta.
  - La lista de árboles se presenta con disyunción/alternancia implícita («o») para reproducir el valor enumerativo del hebreo y la solución inglesa optimizada.
