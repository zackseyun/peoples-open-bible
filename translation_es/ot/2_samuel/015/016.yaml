translation:
  language: es
  text: Así salió el rey[a], y toda su gente detrás de él a pie; y el rey dejó diez mujeres, concubinas, para cuidar la casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «y toda su casa a sus pies». El modismo hebreo comunica que iban tras él a pie.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - salió afuera
  - se fue
  lexicon: HALOT
  rationale: יצא en la narración expresa salida o partida. «Salió» conserva el movimiento concreto y es natural en español; evita sobreinterpretar como abandono total.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: El hebreo usa el título con artículo, no el nombre propio. «El rey» mantiene el referente y el registro del original.
- source_word: וְכָל בֵּיתוֹ
  english_pob_choice: and all his household
  chosen_spanish: y toda su casa
  alternatives_spanish:
  - y toda su familia
  - y toda su casa real
  lexicon: HALOT
  rationale: בַּיִת con sufijo puede referirse al conjunto de personas de la casa. «Toda su casa» conserva la imagen hebrea y funciona con naturalidad en español; «hogar» sonaría demasiado doméstico.
- source_word: בְּרַגְלָיו
  english_pob_choice: after him on foot
  chosen_spanish: detrás de él a pie
  alternatives_spanish:
  - a sus pies
  - a pie detrás de él
  lexicon: HALOT
  rationale: El hebreo literalmente dice «en/sobre sus pies», un modismo que indica que iban caminando tras él. «Detrás de él a pie» comunica el sentido idiomático sin perder la imagen de seguimiento.
- source_word: וַיַּעֲזֹב
  english_pob_choice: left
  chosen_spanish: dejó
  alternatives_spanish:
  - abandonó
  - dejó atrás
  lexicon: HALOT
  rationale: עָזַב aquí significa dejar atrás o dejar en un lugar. «Dejó» es fiel y menos cargado que «abandonó», que insinuaría una fuerza emocional o moral no explícita.
- source_word: עֶשֶׂר נָשִׁים פִּלַגְשִׁים
  english_pob_choice: ten women, concubines
  chosen_spanish: diez mujeres, concubinas
  alternatives_spanish:
  - diez concubinas
  - diez mujeres que eran concubinas
  lexicon: HALOT
  rationale: El hebreo presenta una apposición con ambos sustantivos. Mantener «mujeres, concubinas» conserva la duplicación del original y evita simplificar demasiado la estructura.
- source_word: לִשְׁמֹר
  english_pob_choice: to keep
  chosen_spanish: para cuidar
  alternatives_spanish:
  - para guardar
  - para vigilar
  lexicon: HALOT
  rationale: שׁמר puede significar guardar, vigilar o cuidar. «Para cuidar la casa» expresa de forma natural la función encomendada en español, sin excluir la idea de custodia.
- source_word: הַבָּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el palacio
  - la residencia
  lexicon: HALOT
  rationale: Aquí בַּיִת se refiere al lugar físico dejado atrás. «La casa» preserva el término hebreo y evita una expansión interpretativa como «palacio».
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el sentido confirmado por el audit trail inglés y el hebreo: salida del rey, su casa siguiendo a pie, y el encargo de dejar a diez concubinas para custodiar la casa. No se requiere revisión adicional según el control de concordancia.'
  spanish_consistency_notes:
  - Se mantiene «rey» en lugar del nombre propio porque el hebreo usa el título.
  - Se conserva «casa» tanto para בַּיִת como para בֵּיתוֹ, distinguiendo por contexto entre la casa/household y la casa física mediante la sintaxis.
  - La nota al pie recoge el modismo de בְּרַגְלָיו sin duplicar la imagen en el cuerpo principal.
