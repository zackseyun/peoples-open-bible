revisions:
- from: Y si escuchan o se niegan a hacerlo[a] —porque casa rebelde son[b]—, sabrán que hubo un profeta entre ellos[c].
  to: Y, escuchen o se rehúsen[a] —porque son una casa rebelde[b]—, sabrán que ha habido un profeta entre ellos[c].
  rationale: Se corrigió una inversión poco idiomática ('casa rebelde son') a un español natural sin perder la metáfora hebrea; se simplificó 'se niegan a hacerlo' a 'se rehúsen' para mayor claridad y cercanía al contraste hebreo; y se reemplazó 'hubo' por 'ha habido' para reflejar mejor la presencia del profeta entre ellos con relevancia resultante, en línea con la decisión documentada de la POB inglesa.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:26:59Z'
