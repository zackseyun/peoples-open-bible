translation:
  language: es
  text: No prosperes por la herencia de un hombre malvado[a], no sea que termines quemado por las chispas de su fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testigo griego (Swete/LXX) tiene aquí una sentencia diferente: «No litigues con un juez, porque juzgarán a su favor según su prestigio». En cambio, el texto hebreo de la Geniza de El Cairo advierte contra la participación en la herencia de un hombre malvado.'
    reason: textual_variant
lexical_decisions:
- source_word: אַל תִּצְלַח
  english_pob_choice: Do not prosper
  chosen_spanish: No prosperes
  alternatives_spanish:
  - No tengas éxito
  - No te vaya bien
  lexicon: HALOT
  rationale: El verbo hebreo צלח expresa idea de prosperar o tener éxito. En español, «prosperes» conserva esa fuerza poco común en un consejo sapiencial y evita suavizar el aviso a una mera prohibición genérica.
- source_word: בְּנַחֲלַת
  english_pob_choice: in the inheritance of
  chosen_spanish: en la herencia de
  alternatives_spanish:
  - en la posesión de
  - en el patrimonio de
  - en el patrimonio heredado de
  lexicon: HALOT
  rationale: נחלה designa herencia, patrimonio o posesión hereditaria. «Herencia» es la correspondencia más directa y mantiene la imagen concreta de un bien heredado o un caudal ligado al malvado.
- source_word: רָשָׁע
  english_pob_choice: a wicked man
  chosen_spanish: un hombre malvado
  alternatives_spanish:
  - un perverso
  - el malvado
  - una persona malvada
  lexicon: HALOT
  rationale: El hebreo está en singular masculino. «Hombre malvado» refleja esa forma y conserva el tono sapiencial de una figura representativa, sin convertirla en un abstracto pluralizado.
- source_word: פֶּן תְּבֹעַר
  english_pob_choice: lest you be burned
  chosen_spanish: no sea que seas quemado
  alternatives_spanish:
  - para que no seas quemado
  - no vaya a ser que te quemes
  - no sea que te consumas
  lexicon: HALOT
  rationale: בער en esta construcción transmite la idea de quedar quemado o consumido por el fuego. «No sea que seas quemado» conserva el valor preventivo de פן y la pasividad del daño padecido.
- source_word: בִּשְׁבִיב
  english_pob_choice: by the sparks of
  chosen_spanish: por las chispas de
  alternatives_spanish:
  - por las brasas de
  - por los destellos de
  - por las chispas
  lexicon: HALOT
  rationale: שביב puede significar chispa, destello o llama breve. «Chispas» es natural en español y retiene la imagen de un daño que proviene incluso de efectos secundarios del fuego.
- source_word: אִשּׁוֹ
  english_pob_choice: his fire
  chosen_spanish: su fuego
  alternatives_spanish:
  - el fuego de él
  - su llama
  lexicon: HALOT
  rationale: El sufijo masculino singular se refiere al malvado. «Su fuego» preserva la metáfora posesiva y mantiene la imagen de una fuente destructiva ligada a esa persona.
theological_decisions:
- issue: Divergencia textual entre el hebreo conservado y el testigo griego
  english_pob_reading: The English POB follows the Hebrew warning about the inheritance of a wicked man, while preserving the Greek reading as a footnoted variant.
  chosen_spanish_reading: Seguir el hebreo conservado como texto principal y anotar la variante griega como lectura alternativa textual.
  alternative_spanish_readings:
  - 'Traducir la sentencia griega: «No litigues con un juez, pues juzgan por él según su prestigio».'
  - Intentar armonizar ambas lecturas en una sola frase.
  rationale: Para Sirácides, cuando el hebreo está preservado con suficiente confianza, la política del proyecto da primacía a ese testimonio. La lectura griega es sustancialmente distinta y debe quedar visible como variante, no absorbida por una paráfrasis conciliadora.
  doctrine_reference: 'PHILOSOPHY.md: primacía del hebreo en Sirácides cuando hay testimonio hebreo suficiente; el griego se conserva como paralela textual.'
translation_notes:
  revision_awareness: 'Concordante con la revisión más reciente: no se requieren cambios adicionales respecto del pasaje hebreo base y la nota de variante griega se preserva de forma transparente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conserva el tono sapiencial imperativo negativo con una construcción española natural y no eclesiástica.
  - No se introduce terminología tradicional ajena al testimonio base; la imagen de «herencia» y «fuego/chispas» se mantiene de modo transparente.
