translation:
  language: es
  text: Y maquinaban quitar a la descendencia de Jacob[a] que estaba entre ellos[b], y comenzaron a matar y a exterminar a los que estaban entre el pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la raza de Jacob» o «el pueblo de Jacob». El griego γένος subraya descendencia o parentesco.
    reason: lexical_alternative
  - marker: b
    text: O «entre ellos». La frase griega ἐν μέσῳ αὐτῶν es locativa y sitúa a ese grupo en medio de los demás pueblos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐβουλεύοντο
  english_pob_choice: were plotting
  chosen_spanish: maquinaban
  alternatives_spanish:
  - conspiraban
  - planeaban
  - deliberaban
  lexicon: LSJ
  rationale: El imperfecto medio expresa una acción continua y hostil; «maquinaban» comunica bien el matiz de intriga maliciosa sin volverse demasiado coloquial.
- source_word: ἆραι
  english_pob_choice: to remove
  chosen_spanish: quitar
  alternatives_spanish:
  - remover
  - retirar
  - eliminar
  lexicon: LSJ
  rationale: Aquí el infinitivo expresa la intención de apartar o hacer desaparecer a un grupo. «Quitar» conserva la idea de remoción sin añadir todavía el matiz pleno de exterminio, que aparece en los verbos siguientes.
- source_word: τὸ γένος Ἰακώβ
  english_pob_choice: the offspring of Jacob
  chosen_spanish: la descendencia de Jacob
  alternatives_spanish:
  - la raza de Jacob
  - la familia de Jacob
  - el pueblo de Jacob
  lexicon: LSJ
  rationale: γένος remite a linaje, descendencia o estirpe. «Descendencia de Jacob» conserva la referencia genealógica y pactal, evitando «raza», que en español moderno puede ser equívoca.
- source_word: τοὺς ὄντας ἐν μέσῳ αὐτῶν
  english_pob_choice: who were among them
  chosen_spanish: que estaba entre ellos
  alternatives_spanish:
  - que vivía en medio de ellos
  - que se hallaba entre ellos
  - que estaban en medio de ellos
  lexicon: LSJ
  rationale: La frase identifica al grupo como los judíos que se encontraban entre los otros pueblos. En español, «que estaba entre ellos» es natural y mantiene la referencia locativa sin sobretraducción.
- source_word: ἤρξαντο τοῦ θανατοῦν
  english_pob_choice: they began to kill
  chosen_spanish: comenzaron a matar
  alternatives_spanish:
  - empezaron a matar
  - comenzaron a dar muerte
  - empezaron a asesinar
  lexicon: LSJ
  rationale: La construcción con ἄρχομαι + infinitivo marca inicio de la acción. «Comenzaron a matar» es claro y fiel al progresivo aumento de violencia.
- source_word: ἐν τῷ λαῷ
  english_pob_choice: those among the people
  chosen_spanish: a los que estaban entre el pueblo
  alternatives_spanish:
  - entre el pueblo
  - en el pueblo
  - a los del pueblo
  lexicon: LSJ
  rationale: La expresión griega es compacta y puede entenderse locativa o partitiva. En español, «a los que estaban entre el pueblo» refleja mejor el objetivo humano de la persecución sin perder la ambigüedad de base.
- source_word: ἐξαίρειν
  english_pob_choice: wipe out
  chosen_spanish: exterminar
  alternatives_spanish:
  - aniquilar
  - arrasar
  - acabar con
  lexicon: LSJ
  rationale: En este contexto violento, ἐξαίρειν intensifica la matanza hacia la erradicación. «Exterminar» transmite esa fuerza mejor que un simple «eliminar» o «quitar».
theological_decisions:
- issue: Designación de Israel por linaje en τὸ γένος Ἰακώβ
  english_pob_reading: the offspring of Jacob
  chosen_spanish_reading: la descendencia de Jacob
  alternative_spanish_readings:
  - la raza de Jacob
  - la familia de Jacob
  - el pueblo de Jacob
  rationale: La traducción preserva la identidad étnico-covenantal del grupo sin introducir connotaciones modernas problemáticas asociadas con «raza».
  doctrine_reference: Translation philosophy §1, §6
- issue: Escalada de violencia en ἆραι ... θανατοῦν ... ἐξαίρειν
  english_pob_reading: remove ... kill ... wipe out
  chosen_spanish_reading: quitar ... matar ... exterminar
  alternative_spanish_readings:
  - remover ... matar ... aniquilar
  - retirar ... matar ... acabar con
  rationale: 'La secuencia verbal mantiene la progresión del texto: intención de remover, ejecución de matar y propósito de exterminar. No se atenúa la dureza del pasaje.'
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se incorporó la corrección del tramo final para reflejar ἐν τῷ λαῷ con una formulación más natural en español, manteniendo la distinción entre matar y exterminar. También se alineó el cierre con la revisión más reciente del audit trail.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general, pero este versículo no contiene el nombre divino.
  - Se prefirió «descendencia» para γένος por su valor genealógico y pactal.
  - 'Se conservó la progresión semántica del pasaje: quitar/remover, matar, exterminar.'
  - Se evitó «siervo» y «Cristo», pues no aplican al texto.
  - La puntuación y el ritmo buscan una lectura pública clara y digna en español.
