revisions:
- from: Y Josué los hirió[a] desde Cades-barnea hasta Gaza, y toda la tierra de Gosén, hasta Gabaón.
  to: Y Josué los derrotó[a] desde Cades-barnea hasta Gaza, y toda la tierra de Gosén, hasta Gabaón.
  rationale: Se reemplaza «los hirió» por «los derrotó» para reflejar mejor el uso militar de נכה en español natural, evitando la sugerencia demasiado física de una herida corporal. La nota preserva una alternativa más concreta cercana al hebreo. No se requieren otros cambios sustanciales.
