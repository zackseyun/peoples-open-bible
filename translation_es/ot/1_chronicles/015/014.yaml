review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: los sacerdotes y los levitas realizan una preparación ritual reflexiva con el fin de trasladar el arca de Yahvé, el Dios de Israel. También conserva correctamente el nombre divino como «Yahvé». Sin embargo, «para subir el arca» no reproduce con suficiente naturalidad ni precisión el hiphil לְהַעֲלוֹת en este contexto narrativo; aquí la idea es «hacer subir / llevar hacia arriba», y en español bíblico natural «para hacer subir el arca» o «para subir con el arca» no son equivalentes. La opción más fiel y clara es «para subir el arca»? No: debe explicitarse el objeto causado a subir. Por eso conviene revisar a «para hacer subir el arca» o mejor «para llevar el arca hacia arriba». Dado el patrón del English POB («to bring up»), «para subir el arca» queda demasiado calcado e idiomáticamente débil.'
  spanish_quality_summary: 'El español es claro y digno en casi todo el versículo. «Así, los sacerdotes y los levitas se consagraron…» suena natural. La principal debilidad es verbal: «subir el arca» puede entenderse, pero en español estándar suena menos idiomático que «hacer subir» o «llevar… hacia arriba» cuando el verbo hebreo es causativo. Además, el anclaje de la nota al término «arca» no corresponde al asunto léxico documentado, que es «se consagraron».'
  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: יהוה → «Yahvé», אֱלֹהֵי יִשְׂרָאֵל → «el Dios de Israel», כהנים → «sacerdotes», לוים → «levitas». La decisión «se consagraron» para וַיִּתְקַדְּשׁוּ concuerda con la auditoría inglesa. La única corrección necesaria es una mejor representación de לְהַעֲלוֹת y reubicar la nota léxica a la palabra/frase pertinente.'
  issues:
  - severity: medium
    issue: «para subir el arca» es una representación insuficiente de לְהַעֲלוֹת
    rationale: 'El hebreo usa hiphil de עלה, con sentido causativo: «hacer subir / llevar hacia arriba / subir» algo. En este contexto de traslado del arca, el English POB eligió «to bring up». En español, «subir el arca» resulta menos natural y puede sonar demasiado literal; «para llevar el arca hacia arriba» comunica mejor la acción.'
  - severity: medium
    issue: La nota [a] está anclada a «arca», pero su contenido explica «se consagraron»
    rationale: Las instrucciones exigen que el marcador aparezca en la palabra o frase relevante. La nota trata el valor léxico de וַיִּתְקַדְּשׁוּ, no de אֲרוֹן.
  revised_spanish_text: Así, los sacerdotes y los levitas se consagraron[a] para llevar el arca de Yahvé, el Dios de Israel, hacia arriba.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «se consagraron»; alternativamente, «se santificaron».'
    reason: lexical_alternative
  revision_rationale: Se revisa «para subir el arca» a «para llevar el arca … hacia arriba» para reflejar con más claridad el hiphil causativo לְהַעֲלוֹת y la elección auditada «to bring up». También se mueve el marcador de nota a «se consagraron», que es el elemento léxico realmente comentado por la nota. Se mantiene «Yahvé» según la norma del proyecto.
