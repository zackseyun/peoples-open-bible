translation:
  language: es
  text: Y harás un propiciatorio[a] de oro puro; su longitud será de dos codos y medio, y su anchura de un codo y medio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cubierta de expiación». El hebreo כַּפֹּרֶת nombra la cubierta de oro colocada sobre el arca y está relacionado con la raíz de expiación כפר.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַפֹּרֶת
  english_pob_choice: mercy seat
  chosen_spanish: propiciatorio
  alternatives_spanish:
  - asiento de misericordia
  - cubierta de expiación
  - cubierta
  lexicon: HALOT
  rationale: El término hebreo nombra la cubierta de oro colocada sobre el arca y está ligado a la raíz כפר. En español, «propiciatorio» conserva el valor cultual y tradicional del objeto sin reducirlo a una simple «cubierta». También permite reflejar la carga teológica del término, mientras una nota documenta la alternativa etimológica más transparente.
- source_word: זָהָב טָהוֹר
  english_pob_choice: of pure gold
  chosen_spanish: de oro puro
  alternatives_spanish:
  - de oro fino
  - oro puro
  lexicon: HALOT
  rationale: La construcción de material más cualidad se expresa con naturalidad en español como «de oro puro», manteniendo tanto la sustancia como la calidad ritual del material.
- source_word: אַמָּתַיִם וָחֵצִי
  english_pob_choice: two cubits and a half
  chosen_spanish: dos codos y medio
  alternatives_spanish:
  - dos codos y medio exactos
  - dos y medio codos
  lexicon: HALOT
  rationale: La medida hebrea se conserva sin modernizarla, y en español la forma más natural y fiel es «dos codos y medio», que reproduce la cantidad sin alterar la unidad antigua.
- source_word: וְ/אַמָּה וָ/חֵצִי
  english_pob_choice: and a cubit and a half
  chosen_spanish: y de un codo y medio
  alternatives_spanish:
  - y un codo y medio
  - y de codo y medio
  lexicon: HALOT
  rationale: Se mantiene el paralelismo de la segunda medida y la preposición «de» ayuda a enlazar naturalmente la dimensión en español con el sustantivo implícito de la pieza.
- source_word: אָרְכָּהּ
  english_pob_choice: its length shall be
  chosen_spanish: su longitud será
  alternatives_spanish:
  - su largo será
  - su extensión será
  lexicon: HALOT
  rationale: El sufijo femenino de tercera persona se refiere a la pieza mencionada. «Su longitud será» expresa de forma directa y sobria la dimensión en un registro bíblico claro.
- source_word: רָחְבָּהּ
  english_pob_choice: its width
  chosen_spanish: su anchura
  alternatives_spanish:
  - su ancho
  - su largura
  lexicon: HALOT
  rationale: «Anchura» conserva la precisión formal del sustantivo hebreo y armoniza con «longitud» en el paralelo de medidas.
- source_word: וְעָשִׂיתָ
  english_pob_choice: And you shall make
  chosen_spanish: Y harás
  alternatives_spanish:
  - Y harás tú
  - Y deberás hacer
  lexicon: HALOT
  rationale: En instrucciones cultuales, el perfecto con waw funciona como mandato/futuro. «Y harás» mantiene la fuerza directiva sin volver la frase pesada o demasiado perifrástica en español.
theological_decisions:
- issue: Rendición de כַפֹּרֶת en un objeto cultual cargado teológicamente
  english_pob_reading: mercy seat
  chosen_spanish_reading: propiciatorio
  alternative_spanish_readings:
  - cubierta de expiación
  - cubierta
  rationale: La pieza es la cubierta de oro del arca y está relacionada con la expiación. «Propiciatorio» conserva la referencia cultual tradicional en español y no disimula la densidad teológica del término; la nota mantiene visible la alternativa más literal vinculada a כפר.
  doctrine_reference: Éxodo 25:17; decisiones léxicas POB sobre términos cultuales con carga expiatoria.
translation_notes:
  revision_awareness: 'Coincide con la última revisión del texto fuente inglés: no se registraron cambios posteriores al pasaje auditado, y la formulación española se ha construido directamente desde el hebreo con apoyo del rastro inglés para documentar la elección de כַפֹּרֶת y las medidas.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento reverente y sobrio propio de instrucciones del tabernáculo.
  - Se conservan las unidades antiguas («codos») en lugar de convertirlas para no borrar el dato original.
  - La puntuación y el orden de las medidas siguen el paralelismo del hebreo, con una sintaxis natural en español.
  - «Propiciatorio» se usa como término técnico, no como paráfrasis devocional.
