base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/010/025.yaml
  text: Then Samuel told the people the custom of the kingship[a], and he wrote it in the book and laid it before Yahweh. Then Samuel sent all the people away[b], each man to his house.
  footnotes:
