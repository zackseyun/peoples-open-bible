revisions:
- from: El ardor de la ira de Yahvé no volverá[a] hasta que haya hecho esto y hasta que haya establecido los propósitos de su corazón. En los últimos días lo entenderán.
  to: El ardor de la ira de Yahvé no se volverá atrás hasta que lo haya hecho y hasta que haya establecido los propósitos de su corazón. En los últimos días[a] lo entenderán.
  rationale: Se corrige el anclaje de la nota al pie para que corresponda a בְּאַחֲרִית הַיָּמִים, se evita la explicitación excesiva de «esto» en עֲשֹׂתוֹ usando «lo haya hecho», y se mejora la precisión semántica de יָשׁוּב con «no se volverá atrás», manteniendo el sentido de la auditoría inglesa y la naturalidad del español bíblico moderno.
