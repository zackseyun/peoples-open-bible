    text: Or 'to worship there'; the Hebrew verb can denote both the bodily act of bowing and the act of worship.
    reason: lexical_alternative
  - marker: b
    text: '''House of Rimmon'' refers to the temple or shrine of the Syrian god Rimmon.'
    reason: cultural_note
