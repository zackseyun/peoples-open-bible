  text: If[a], then, any pestilent men have escaped from their land to us, hand them over to Simon the high priest[b], so that he may punish them according to their law.
  footnotes:
  - marker: a
    text: Or 'pernicious men,' 'troublemakers,' or more literally 'pestilent men.' The Greek λοιμοί is a harsh term for dangerous or troublesome persons.
    reason: lexical_alternative
  - marker: b
    text: Or 'may exact justice on them' or 'may avenge them.' The Greek can carry either punitive or avenging force, but the legal phrase 'according to their law' favors a judicial sense here.
    reason: alternative_reading
