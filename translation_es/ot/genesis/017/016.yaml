review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del hebreo: conserva la doble repetición de «bendeciré», el matiz enfático de וְגַם con «además», la promesa de un hijo procedente de Sara, la formulación fuerte de «ser/venir a ser naciones», y la distinción entre «naciones» (גוים) y «pueblos» (עמים). También respeta la decisión teológica de no introducir «madre de» en el texto principal.'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero «te daré por ella un hijo» suena poco natural en español y puede sugerir intercambio o mediación impropia. «Por medio de ella» expresa mejor la procedencia materna sin perder fidelidad. Además, la nota [b] repite innecesariamente el texto principal en vez de reflejar la alternativa documentada en inglés («ella será/llegará a ser naciones» o simplemente la observación de traducción previa).
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Bendecir», «naciones», «pueblos» y la preservación del lenguaje corporativo son adecuados. La revisión propuesta solo mejora la naturalidad de la frase sobre el hijo y ajusta la nota para que sirva realmente como alternativa aclaratoria.
  issues:
  - severity: medium
    issue: «te daré por ella un hijo» es poco idiomático en español
    rationale: Aunque intenta reflejar «by her», en español neutro eclesial suena forzado y ambiguo. «Te daré un hijo por medio de ella» conserva la procedencia materna y es más claro.
  - severity: low
    issue: La nota [b] no aporta una alternativa real
    rationale: Actualmente solo repite casi exactamente el texto principal. Conviene usarla para reflejar la variante de formulación «será/llegará a ser naciones» o su carácter más literal, según el rastro de auditoría inglés.
  revised_spanish_text: Yo la bendeciré[a], y además te daré un hijo por medio de ella. La bendeciré, y ella vendrá a ser naciones[b]; de ella saldrán reyes de pueblos.
