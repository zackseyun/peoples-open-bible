translation:
  language: es
  text: 'Estas cosas son gravosas para un hombre que tiene discernimiento: la reprensión del hogar y el oprobio de un acreedor[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pesadas ... la reprensión de una casa y el reproche de un prestamista». El griego también admite formas más literales como «pesadas» y «casa»; «acreedor» y «prestamista» representan dos maneras válidas de expresar al que presta, pero el texto principal busca un español claro sin perder la imagen de carga y deshonra.
    reason: lexical_alternative
lexical_decisions:
- source_word: βαρέα
  english_pob_choice: grievous
  chosen_spanish: gravosas
  alternatives_spanish:
  - pesadas
  - penosas
  - difíciles de soportar
  lexicon: LSJ
  rationale: El adjetivo griego literalmente es «pesadas», pero en este dicho expresa algo que pesa moral y socialmente sobre la persona. «Gravosas» conserva la imagen de carga y suena natural en español actual.
- source_word: ἀνθρώπῳ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - un ser humano
  lexicon: LSJ
  rationale: El singular es genérico y representativo. «Un hombre» preserva esa forma sin convertirla en plural abstracto, en línea con la decisión inglesa auditada.
- source_word: ἔχοντι φρόνησιν
  english_pob_choice: who has understanding
  chosen_spanish: que tiene discernimiento
  alternatives_spanish:
  - que tiene entendimiento
  - que tiene prudencia
  - que es sensato
  lexicon: LSJ
  rationale: φρόνησις puede abarcar prudencia, sensatez y comprensión práctica. «Discernimiento» comunica capacidad de evaluar y distinguir, con buen equilibrio entre sentido y naturalidad.
- source_word: ἐπιτίμησις
  english_pob_choice: reproach / rebuke
  chosen_spanish: reprensión
  alternatives_spanish:
  - reproche
  - reprueba
  - censura
  lexicon: LSJ
  rationale: La palabra griega denota reprensión o censura. «Reprensión» conserva el matiz disciplinario y es suficientemente formal para el registro sapiencial.
- source_word: οἰκίας
  english_pob_choice: of a household
  chosen_spanish: de una casa
  alternatives_spanish:
  - de una familia
  - del hogar
  - de una casa-hogar
  lexicon: LSJ
  rationale: Aquí la frase puede referirse a la casa como unidad doméstica y social; la versión inglesa optó por «household», pero en español «casa» mantiene la correspondencia con el griego y evita sonar explicativa de más. El sentido doméstico queda implícito por el contexto.
- source_word: ὀνειδισμὸς
  english_pob_choice: reproach
  chosen_spanish: oprobio
  alternatives_spanish:
  - reproche
  - deshonra
  - vergüenza
  lexicon: LSJ
  rationale: ὀνειδισμός apunta a vergüenza pública, afrenta u oprobio. «Oprobio» transmite mejor la carga de deshonra social que un simple «reproche» en español.
- source_word: δανιστοῦ
  english_pob_choice: a lender
  chosen_spanish: un prestamista
  alternatives_spanish:
  - un acreedor
  - uno que presta
  lexicon: LSJ
  rationale: El término griego designa al que presta dinero, es decir, un prestamista. «Prestamista» es transparente en español y conserva el vínculo económico-social del original.
theological_decisions:
- issue: Tono sapiencial de vergüenza y carga social sin intensificar el sentido jurídico
  english_pob_reading: 'The verse highlights what is grievous to a discerning man: the rebuke/reproach of a household and the reproach of a lender.'
  chosen_spanish_reading: 'El versículo resalta lo que pesa para un hombre con discernimiento: la reprensión de una casa y el oprobio de un prestamista.'
  alternative_spanish_readings:
  - la reprensión de una familia y la deshonra de un acreedor
  - la reprensión del hogar y el reproche de un prestamista
  rationale: No hay un desarrollo doctrinal directo, pero sí una tensión entre vergüenza social y sanción verbal. La traducción conserva ambos planos sin convertirlos en un juicio legal más fuerte de lo que permite el griego.
  doctrine_reference: Sabiduría bíblica; honra y vergüenza en contexto social
- issue: Distinción entre los dos términos de censura
  english_pob_reading: rebuke of a household ... reproach of a lender
  chosen_spanish_reading: reprensión de una casa ... oprobio de un prestamista
  alternative_spanish_readings:
  - reproche de una casa ... reproche de un prestamista
  - reprensión de una casa ... reproche de un prestamista
  rationale: El griego usa ἐπιτίμησις y ὀνειδισμός, términos emparentados pero no idénticos. En español se diferencia «reprensión» de «oprobio» para respetar esa variación léxica y la progresión de la línea.
  doctrine_reference: Precisión léxica; preservación de matices del texto fuente
translation_notes:
  revision_awareness: 'El texto inglés auditado evolucionó para distinguir mejor ἐπιτίμησις de ὀνειδισμός: primero se discutió ''rebuke'' frente a ''reproach'', y luego se mantuvo la separación semántica. La versión española refleja esa distinción con ''reprensión'' y ''oprobio'', evitando colapsar ambos términos en un solo equivalente. También se atendió la opción entre ''household'' y ''house/casa''; en español se prefirió ''casa'' por cercanía al griego y porque el contexto ya sugiere el ámbito doméstico-social.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' por consistencia del proyecto, aunque este versículo no lo contiene.
  - Se evitó 'SEÑOR' y otras máscaras confesionales porque no hay un término divino en el texto.
  - '''Prestamista'' se eligió como equivalente estable de δανιστής, coherente con el campo semántico económico del griego.'
