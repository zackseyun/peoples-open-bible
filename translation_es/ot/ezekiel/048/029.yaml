translation:
  language: es
  text: Esta es la tierra que ustedes repartirán como herencia a las tribus de Israel[a], y estas son sus porciones, declara el Señor Dios, Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sus divisiones» o «sus repartos»; «sus porciones» expresa la idea de las partes de tierra asignadas a cada tribu.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  english_pob_choice: This is
  chosen_spanish: Esta es
  alternatives_spanish:
  - Esta
  lexicon: HALOT
  rationale: 'El demostrativo introduce una afirmación resumida; en español resulta natural suplir la cópula: «Esta es la tierra».'
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el territorio
  - la tierra/territorio
  lexicon: HALOT
  rationale: En este contexto de reparto territorial, «tierra» comunica bien el sentido concreto de la porción asignada.
- source_word: תַּפִּילוּ
  english_pob_choice: you shall assign
  chosen_spanish: asignarán
  alternatives_spanish:
  - aportarán
  - repartirán
  - echarán por suerte
  lexicon: HALOT
  rationale: El hiphil de נפל en contextos de distribución de tierra expresa asignar o repartir. «Asignarán» mantiene la idea distributiva sin forzar la imagen idiomática en español.
- source_word: מִנַּחֲלָה
  english_pob_choice: as an inheritance
  chosen_spanish: como herencia
  alternatives_spanish:
  - como posesión
  - en herencia
  lexicon: HALOT
  rationale: נַחֲלָה se refiere a una posesión heredada o asignada; «como herencia» es claro y fiel al uso de reparto tribal.
- source_word: לְשִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: to the tribes of Israel
  chosen_spanish: a las tribus de Israel
  alternatives_spanish:
  - para las tribus de Israel
  lexicon: HALOT
  rationale: Marca a los destinatarios de la asignación. «A las tribus de Israel» es la formulación más directa y natural.
- source_word: וְאֵלֶּה
  english_pob_choice: and these are
  chosen_spanish: y estas son
  alternatives_spanish:
  - y estas
  lexicon: HALOT
  rationale: El deíctico plural introduce la segunda cláusula; en español conviene suplir la cópula para mayor claridad.
- source_word: מַחְלְקוֹתָם
  english_pob_choice: their portions
  chosen_spanish: sus porciones
  alternatives_spanish:
  - sus divisiones
  - sus repartos
  - sus asignaciones
  lexicon: HALOT
  rationale: La palabra hebrea puede significar divisiones, repartos o porciones. «Porciones» conserva la idea de lotes o partes asignadas de tierra, como refleja la traducción inglesa.
- source_word: נְאֻם
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - oráculo de
  - dice
  lexicon: HALOT
  rationale: Fórmula profética de validación del dicho divino. «Declara» es una manera sobria y legible de reproducirla.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - Señor Yahvé
  - el Señor Dios
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se conserva el nombre divino como «Yahvé» en vez del ocultamiento convencional «SEÑOR», según la política del proyecto. En el título compuesto, «el Señor Yahvé» reproduce ambos elementos de forma reverente y legible en español.
theological_decisions:
- issue: Rendering of the divine name in the compound title אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - Señor Yahvé
  - el Señor Dios
  rationale: El hebreo contiene directamente el Tetragrámaton. Siguiendo la norma del proyecto, se traduce como «Yahvé» y no se sustituye por una máscara litúrgica. El compuesto con אֲדֹנָי se expresa de manera natural en español como «el Señor Yahvé».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Translation of מַחְלְקוֹתָם in the allotment context
  english_pob_reading: their portions
  chosen_spanish_reading: sus porciones
  alternative_spanish_readings:
  - sus divisiones
  - sus repartos
  - sus asignaciones
  rationale: En el contexto de reparto tribal de tierra, el término alude a las partes asignadas a cada tribu. «Porciones» mantiene la referencia a los lotes heredados sin introducir una interpretación más técnica de la necesaria.
  doctrine_reference: Lexical note from English POB footnote a
translation_notes:
  revision_awareness: La revisión inglesa más reciente se mantuvo sin cambios; la redacción española sigue de cerca el texto hebreo y la resolución léxica auditada en el POB inglés, conservando la tensión semántica de מַחְלְקוֹתָם con una solución natural en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino según la política terminológica del proyecto.
  - Se evita «SEÑOR» como máscara tipográfica y también «Cristo», que no pertenece al versículo.
  - «Porciones» se emplea como equivalente funcional de repartos/asignaciones de tierra, no en sentido abstracto.
