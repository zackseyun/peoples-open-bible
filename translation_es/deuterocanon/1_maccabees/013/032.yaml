review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y el rastro POB en la sucesión real, la imagen concreta de ponerse la insignia real y la idea de daño severo. Sin embargo, la nota [a] está anclada al lugar equivocado: la alternativa inglesa documentada para [a] corresponde a «la diadema/el diadema» sobre τὸ διάδημα, no a «en su lugar» sobre ἀντʼ αὐτοῦ. Además, «sobre la tierra» suena menos natural en este contexto histórico-político que «en la tierra», y la nota alternativa sobre la calamidad debería preservarse como en el POB inglés.'
  spanish_quality_summary: El español es mayormente claro y digno, pero requiere un ajuste menor de naturalidad y consistencia editorial. «Reinó en su lugar» y «se puso la corona de Asia» funcionan bien. «Infligió un gran golpe sobre la tierra» es comprensible, pero «en la tierra» lee mejor en español bíblico moderno y evita una imagen espacial algo rígida. También conviene alinear las notas con sus anclajes reales y con las alternativas documentadas.
  glossary_alignment: 'No hay términos teológicos de proyecto especialmente implicados. Las decisiones léxicas principales («reinó», «corona», «Asia», «gran golpe») son compatibles con el expediente. La excepción a corregir es la gestión de notas: debe conservarse la alternativa «diadema» para διάδημα y añadirse la alternativa de sentido para ἐποίησεν πληγὴν μεγάλην ἐπὶ τῆς γῆς.'
  issues:
  - severity: high
    issue: La nota [a] está asignada a la frase equivocada.
    rationale: En el POB inglés, la nota a corresponde a τὸ διάδημα («the crown» / «the diadem»), no a ἀντʼ αὐτοῦ. El borrador español desplaza esa nota a «en su lugar», alterando la trazabilidad del expediente.
  - severity: medium
    issue: Falta una nota para la alternativa semántica de la última cláusula.
    rationale: El POB inglés preserva una alternativa para «inflicted a great blow on the land» como devastación severa. El español no refleja esa alternativa, pese a que el griego admite ese matiz y el expediente lo documenta.
  - severity: low
    issue: «Sobre la tierra» es menos natural que «en la tierra» en este contexto.
    rationale: Aunque ἐπὶ puede calcarse como «sobre», en español la combinación con «infligir un gran golpe» suena más idiomática como «en la tierra» para expresar daño al país/la tierra.
  revised_spanish_text: Y reinó en su lugar, y se puso la corona[a] de Asia, e infligió un gran golpe[b] en la tierra.
  revised_footnotes:
  - marker: a
    text: O «la diadema». El término griego διάδημα designa específicamente la insignia real o banda de realeza.
    reason: lexical_alternative
  - marker: b
    text: O «causó gran devastación en la tierra». El griego dice literalmente «hizo un gran golpe sobre la tierra», una expresión idiomática de daño o calamidad severa.
    reason: lexical_alternative
  revision_rationale: Se corrige la ubicación de la nota sobre διάδημα para que quede anclada en «corona», se añade la alternativa documentada para la expresión idiomática de calamidad, y se mejora la naturalidad de la última frase con «en la tierra». No se requieren cambios doctrinales ni una reformulación mayor.
