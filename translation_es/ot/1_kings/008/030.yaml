translation:
  language: es
  text: Y escucha la súplica de tu siervo y de tu pueblo Israel, cuando oren hacia este lugar[a]. Y escucha en el cielo, lugar de tu morada[b]; escucha y perdona.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a este lugar». El hebreo puede traducirse más literalmente así, pero «hacia este lugar» expresa mejor que la oración va dirigida al templo.
    reason: lexical_alternative
  - marker: b
    text: O «el lugar de tu morada en el cielo».
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּחִנַּת
  english_pob_choice: plea
  chosen_spanish: súplica
  alternatives_spanish:
  - plegaria
  - ruego
  - petición ferviente
  lexicon: HALOT
  rationale: תְּחִנָּה expresa una petición urgente y suplicante por favor o misericordia. 'Súplica' conserva ese matiz de ruego insistente en un español natural y digno.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: En una oración dirigida a Dios, עֶבֶד funciona como autodesignación humilde y de lealtad. 'Siervo' preserva el registro reverente sin imponer 'esclavo', que aquí sonaría más duro de lo que exige el contexto.
- source_word: וְעַמְּךָ יִשְׂרָאֵל
  english_pob_choice: your people Israel
  chosen_spanish: tu pueblo Israel
  alternatives_spanish:
  - tu pueblo, Israel
  - tu pueblo, que es Israel
  lexicon: HALOT
  rationale: La construcción posesiva identifica a Israel como el pueblo perteneciente a Yahvé. 'Tu pueblo Israel' mantiene la relación de pertenencia y el nombre propio sin sobreexplicar.
- source_word: יִתְפַּלְלוּ
  english_pob_choice: they pray
  chosen_spanish: oren
  alternatives_spanish:
  - recen
  - hagan oración
  - se pongan a orar
  lexicon: HALOT
  rationale: El hitpael de פלל es el verbo normal para orar. 'Oren' es claro, idiomático y mantiene el acto de oración sin añadir matices ajenos.
- source_word: אֶל הַמָּקוֹם הַזֶּה
  english_pob_choice: toward this place
  chosen_spanish: hacia este lugar
  alternatives_spanish:
  - a este lugar
  - en este lugar
  lexicon: HALOT
  rationale: El hebreo marca dirección, no mera localización. 'Hacia este lugar' conserva el sentido orientado de la oración dirigida al templo, tal como refleja la decisión inglesa.
- source_word: מְקוֹם שִׁבְתְּךָ
  english_pob_choice: the place of your dwelling
  chosen_spanish: el lugar de tu morada
  alternatives_spanish:
  - tu morada
  - el lugar donde moras
  lexicon: HALOT
  rationale: Se conserva la relación constructa entre 'lugar' y 'morada', con un español sobrio y transparente. 'Morada' mantiene el tono elevado sin perder claridad.
- source_word: אֶל הַשָּׁמַיִם
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - desde el cielo
  - hacia el cielo
  lexicon: HALOT
  rationale: Aunque la preposición es literalmente direccional, el contexto aclara que se trata del ámbito donde Dios habita. 'En el cielo' traduce de forma idiomática el sentido locativo preservando la tensión entre el lugar hacia el que se ora y la morada divina.
- source_word: וְשָׁמַעְתָּ
  english_pob_choice: hear
  chosen_spanish: escucha
  alternatives_spanish:
  - oye
  - atiende
  lexicon: HALOT
  rationale: En castellano, en una súplica dirigida a Dios, el imperativo de petición 'escucha' reproduce mejor la función oracional del hebreo que un simple 'oye'.
- source_word: וְסָלָחְתָּ
  english_pob_choice: forgive
  chosen_spanish: perdona
  alternatives_spanish:
  - disculpa
  - absuelve
  - concede perdón
  lexicon: HALOT
  rationale: סלח es el verbo estándar para el perdón divino. 'Perdona' es la equivalencia más directa y transparente en español moderno.
theological_decisions:
- issue: Tensión entre el templo como lugar de oración y el cielo como morada divina
  english_pob_reading: Rendered both the temple-oriented prayer ('toward this place') and God's true dwelling ('in heaven') without harmonizing or diminishing either.
  chosen_spanish_reading: 'Se conservan ambos polos: oración dirigida hacia este lugar y respuesta de Dios en el cielo, el lugar de su morada.'
  alternative_spanish_readings:
  - cuando oren en este templo
  - escucha desde el cielo
  rationale: El versículo mantiene en paralelo la orientación hacia el templo y la trascendencia de la morada divina. La traducción no resuelve esa tensión; la deja visible en español como en el hebreo y en el texto inglés auditado.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al evitar repeticiones innecesarias y al conservar la relación entre el lugar de la oración y el cielo como morada de Dios, sin fusionarlos ni explicarlos de más.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar cuando corresponda; en este versículo el texto no nombra explícitamente el tetragrámaton.
  - '''Siervo'' se usa aquí por el registro reverente de la oración real dirigida a Dios, no como debilitamiento de la fuerza de עֶבֶד.'
  - '''Escucha'' se repite para reflejar la triple insistencia del hebreo.'
  - Se preserva 'el cielo' en lugar de una paráfrasis como 'desde el cielo' para no desplazar la formulación locativa del texto base.
