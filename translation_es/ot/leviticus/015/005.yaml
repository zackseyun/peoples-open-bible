translation:
  language: es
  text: Y el que toque su cama[a] lavará su ropa y se bañará en agua[b], y quedará impuro hasta el atardecer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘su lugar de reposo’. El término hebreo puede referirse de manera más amplia al lugar donde él yació, no solo a una cama construida.
    reason: lexical_alternative
  - marker: b
    text: Es decir, impuro en el sentido de las regulaciones de pureza ritual.
    reason: cultural_note
lexical_decisions:
- source_word: וְאִישׁ
  english_pob_choice: And a man
  chosen_spanish: Y el hombre
  alternatives_spanish:
  - Y un hombre
  - Y cualquiera
  lexicon: HALOT
  rationale: אִישׁ es un sustantivo masculino singular; en esta ley puede tener alcance genérico, pero se conserva la forma masculina singular como en el audit trail inglés, sin neutralizarla innecesariamente.
- source_word: אֲשֶׁר
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - quien
  lexicon: HALOT
  rationale: La partícula relativa introduce la cláusula definitoria; en español, 'que' resulta natural y preciso en este contexto legal.
- source_word: יִגַּע
  english_pob_choice: touches
  chosen_spanish: toque
  alternatives_spanish:
  - entre en contacto con
  - toca
  lexicon: HALOT
  rationale: נגע expresa contacto; 'toque' mantiene el valor de contacto ritual sin sobrerregularizarlo ni ampliar el sentido.
- source_word: בְּמִשְׁכָּבוֹ
  english_pob_choice: his bed
  chosen_spanish: su cama
  alternatives_spanish:
  - su lecho
  - su lugar donde yace
  lexicon: HALOT
  rationale: מִשְׁכָּב puede significar 'cama' o, más ampliamente, 'lugar de reposo'. Se escoge 'cama' por claridad y naturalidad en español, preservando la nota alternativa donde corresponde.
- source_word: יְכַבֵּס
  english_pob_choice: shall wash
  chosen_spanish: lavará
  alternatives_spanish:
  - deberá lavar
  - lavará sus prendas
  lexicon: HALOT
  rationale: כִּבֵּס se refiere específicamente al lavado de ropa; 'lavará' refleja la acción sobre 'sus vestidos' y conserva el registro legal futuro.
- source_word: בְּגָדָיו
  english_pob_choice: his clothes
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - sus ropas
  - sus prendas
  lexicon: HALOT
  rationale: בֶּגֶד admite 'vestido/ropa/vestidura'. Se elige 'vestidos' como término bíblico inteligible y algo más formal que 'ropa', sin llegar a una calca rígida.
- source_word: וְרָחַץ
  english_pob_choice: and bathe
  chosen_spanish: y se bañará
  alternatives_spanish:
  - y se lavará
  - y lavará su cuerpo
  lexicon: HALOT
  rationale: רחץ aquí se refiere al lavado del cuerpo; 'se bañará' comunica con naturalidad la ablución ritual mejor que un simple 'lavarse'.
- source_word: בַּמַּיִם
  english_pob_choice: in water
  chosen_spanish: en agua
  alternatives_spanish:
  - con agua
  lexicon: HALOT
  rationale: La preposición con מים puede rendirse como 'en' o 'con'; 'en agua' mantiene la imagen concreta del acto ritual y sigue de cerca el hebreo.
- source_word: וְטָמֵא
  english_pob_choice: and he shall be unclean
  chosen_spanish: y será inmundo
  alternatives_spanish:
  - y quedará impuro
  - y será impuro
  lexicon: HALOT
  rationale: טָמֵא aquí señala impureza ritual, no culpa moral. 'Inmundo' conserva la terminología tradicional y la categoría cultual; la nota aclara su alcance ritual.
- source_word: עַד הָעָרֶב
  english_pob_choice: until the evening
  chosen_spanish: hasta la tarde
  alternatives_spanish:
  - hasta el atardecer
  - hasta la noche
  lexicon: HALOT
  rationale: La expresión temporal hebrea se refiere al final del día; 'tarde' es un equivalente bíblico claro y breve en español, y evita una especificación interpretativa excesiva.
theological_decisions:
- issue: Naturaleza de טָמֵא en legislación de pureza
  english_pob_reading: Rendered as ritual impurity ('unclean') without importing moral guilt language.
  chosen_spanish_reading: Se traduce como 'inmundo' entendido como impureza ritual, no como culpa moral.
  alternative_spanish_readings:
  - impuro
  - ceremonialmente impuro
  rationale: El contexto levítico trata de estado cultual por contacto, no de pecado moral. 'Inmundo' mantiene la categoría tradicional y el contraste ritual, mientras la nota evita una lectura moralizante.
  doctrine_reference: Principio de primacía de la fuente y preservación de categorías textuales sin añadir afirmaciones doctrinales no presentes en el versículo.
- issue: Alcance de מִשְׁכָּב
  english_pob_reading: '''his bed'' with note that it can also mean ''his lying place.'''
  chosen_spanish_reading: '''su cama'' con nota de que también puede entenderse como ''su lugar de reposo''.'
  alternative_spanish_readings:
  - su lecho
  - su lugar donde yace
  rationale: El sustantivo hebreo puede abarcar más que una cama construida. El texto principal usa una forma clara y natural, y la nota conserva la alternativa léxica documentada por el POB inglés.
  doctrine_reference: Principio de transparencia léxica y preservación de alternativas relevantes cuando el término hebreo es más amplio que una sola equivalencia española.
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con el audit trail inglés y no requiere revisión sustantiva; se mantiene la distinción ritual de טָמֵא y la alternativa léxica de מִשְׁכָּב documentada en la nota.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' no aplica aquí porque el versículo no contiene el nombre divino.
  - Se mantiene un registro legal sobrio y bíblico, evitando tanto tecnicismos innecesarios como parafraseo expansivo.
  - '''Inmundo'' se usa en sentido cultual, coherente con el término ''unclean'' del POB inglés.'
  - 'La puntuación y el flujo respetan el paralelismo hebreo: contacto, lavado de ropa, ablución, estado de impureza hasta el anochecer.'
