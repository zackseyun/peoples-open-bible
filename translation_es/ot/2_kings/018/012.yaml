translation:
  language: es
  text: porque no escucharon la voz de Yahvé su Dios[a], sino que transgredieron su pacto[b], todo lo que Moisés, siervo de Yahvé, mandó[c]; no escucharon ni lo hicieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «obedecieron la voz de Yahvé su Dios». El hebreo «escuchar la voz» suele implicar obediencia.
    reason: lexical_alternative
  - marker: b
    text: O «quebrantaron su pacto» o «violaron su pacto».
    reason: lexical_alternative
  - marker: c
    text: La repetición de «no escucharon» en el versículo refleja el hebreo para énfasis, subrayando una negativa persistente, no un solo acto de desobediencia.
    reason: cultural_note
lexical_decisions:
- source_word: עַל אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - a causa de que
  - debido a que
  lexicon: HALOT
  rationale: La expresión introduce la causa de lo dicho en el contexto inmediato. «Porque» comunica esa relación causal de modo natural y fiel, sin añadir matices interpretativos innecesarios.
- source_word: שָׁמְעוּ בְּקוֹל
  english_pob_choice: listen to the voice of
  chosen_spanish: escucharon la voz de
  alternatives_spanish:
  - oyeron la voz de
  - obedecieron la voz de
  lexicon: HALOT
  rationale: El hebreo ‘escuchar la voz de’ conserva una imagen concreta que puede implicar obediencia. En español, «escucharon la voz de» mantiene esa formulación sin reducirla de entrada a «obedecieron», aunque el contexto sí apunta a desobediencia.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: «Yahvé» como forma española del nombre divino, en vez de sustituirlo por un título.'
- source_word: וַיַּעַבְרוּ
  english_pob_choice: transgressed
  chosen_spanish: transgredieron
  alternatives_spanish:
  - violaron
  - quebraron
  lexicon: HALOT
  rationale: En contexto de pacto, עבר expresa la infracción del pacto. «Transgredieron» conserva ese valor legal/covenantal sin perder la fuerza moral del verbo.
- source_word: בְּרִיתוֹ
  english_pob_choice: his covenant
  chosen_spanish: su pacto
  alternatives_spanish:
  - su alianza
  - su convenio
  lexicon: HALOT
  rationale: «Pacto» es el equivalente más sobrio y bíblicamente reconocible en español para בְּרִית; mantiene la relación formal establecida por Dios.
- source_word: מֹשֶׁה עֶבֶד יְהוָה
  english_pob_choice: Moses the servant of Yahweh
  chosen_spanish: Moisés, el esclavo de Yahvé
  alternatives_spanish:
  - Moisés, el siervo de Yahvé
  - Moisés, el servidor de Yahvé
  lexicon: HALOT
  rationale: Aquí se conserva la fuerza léxica de עֶבֶד como «esclavo», que es el valor que la POB inglesa preserva cuando busca fuerza lexical. Aunque en español «siervo» es más tradicional, aquí suaviza el término y puede ocultar su peso semántico.
- source_word: וְלֹא שָׁמְעוּ
  english_pob_choice: they neither listened
  chosen_spanish: no escucharon
  alternatives_spanish:
  - no obedecieron
  - no hicieron caso
  lexicon: HALOT
  rationale: La repetición al final del versículo intensifica la negativa. «No escucharon» mantiene el eco del hebreo y deja visible el paralelismo con la cláusula anterior; la obediencia queda implicada por el contexto.
- source_word: וְלֹא עָשׂוּ
  english_pob_choice: nor did it
  chosen_spanish: ni lo hicieron
  alternatives_spanish:
  - ni lo cumplieron
  - ni lo ejecutaron
  lexicon: HALOT
  rationale: El pronombre neutro «lo» recoge de manera colectiva «todo lo que» había sido mandado. «Ni lo hicieron» es breve, natural y fiel a la idea de cumplimiento efectivo.
theological_decisions:
- issue: Cómo representar el nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo presenta el Tetragrámaton de forma explícita. Siguiendo la política del proyecto, se conserva el nombre propio divino en español («Yahvé») para no ocultar la referencia del texto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Si ‘escuchar la voz de’ debe resolverse como obediencia explícita
  english_pob_reading: listen to the voice of / would not listen
  chosen_spanish_reading: escucharon la voz de / no escucharon
  alternative_spanish_readings:
  - obedecieron la voz de / no obedecieron
  - oyeron la voz de / no oyeron
  rationale: El hebreo puede implicar obediencia, pero el versículo ya añade la transgresión del pacto y el rechazo final. Mantener «escuchar» conserva la expresión hebrea y la repetición enfática sin sobretraducir el matiz.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
- issue: Valor de עֶבֶד aplicado a Moisés
  english_pob_reading: the servant of Yahweh
  chosen_spanish_reading: el esclavo de Yahvé
  alternative_spanish_readings:
  - el siervo de Yahvé
  - el servidor de Yahvé
  rationale: La POB inglesa eligió «servant» para no perder por completo la fuerza del término, aunque en inglés suene menos duro que 'slave'. En español, «esclavo» preserva esa tensión léxica; no se sustituye por «siervo» salvo con razón contextual específica.
  doctrine_reference: DOCTRINE.md lexical force / contested terms
- issue: Repetición final de la negativa
  english_pob_reading: they neither listened nor did it
  chosen_spanish_reading: no escucharon ni lo hicieron
  alternative_spanish_readings:
  - ni escucharon ni lo hicieron
  - no escucharon ni cumplieron
  rationale: La clausula final intensifica la negativa y resume la desobediencia. «No escucharon ni lo hicieron» mantiene la doble negación y el paralelismo con el hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §5
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión final del audit trail inglés: mantiene la estructura causal inicial, la cláusula de transgresión del pacto, la enumeración amplia de lo mandado por Moisés y el cierre paralelo de negativa repetida. Se ajustó el final para reflejar el doble negativo hebreo de manera natural en español.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה.
  - Se conserva «pacto» para בְּרִית en coherencia con el registro bíblico del texto.
  - Se mantiene «escucharon» para שׁמע para no neutralizar el eco retórico del hebreo.
  - Se usa «esclavo» para עֶבֶד siguiendo la fuerza léxica documentada; la nota explica la posible alternativa más tradicional.
  - La puntuación sigue una cadencia formal equivalente a la revisión inglesa final, con coma antes de la cláusula contrastiva y punto y coma antes del cierre repetitivo.
