  rationale: La revisión reincorpora en el texto principal la noción esencial de 'sin fuerzas' exigida por מִכֹּחַ, mejora la representación de עָמְדוּ como estado de quedar inmóviles, y corrige el anglicismo en la nota c, manteniendo a la vez la imaginería poética y las alternativas documentadas en el rastro POB.
