translation:
  language: es
  text: ¡Saqueen la plata! ¡Saqueen el oro! No hay fin al tesoro[a], abundancia de toda clase de cosas preciosas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «depósito» o «reserva». El sustantivo hebreo es raro y puede subrayar bienes acumulados o almacenados más que «tesoro» en sentido abstracto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «de todo objeto deseable». La expresión hebrea puede abarcar de manera amplia artículos valiosos, no solo vasos o recipientes en sentido estricto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֹּזּוּ
  english_pob_choice: Plunder!
  chosen_spanish: ¡Plunden!
  alternatives_spanish:
  - ¡Saqueen!
  - ¡Despojen!
  lexicon: HALOT
  rationale: Es un imperativo plural en contexto militar de saqueo. «Plunden» conserva la fuerza del mandato y suena natural en español bíblico contemporáneo.
- source_word: כֶסֶף
  english_pob_choice: silver
  chosen_spanish: la plata
  alternatives_spanish:
  - el dinero
  lexicon: HALOT
  rationale: La referencia literal al metal precioso mantiene el paralelismo con «oro» y el contexto de botín.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: el oro
  lexicon: HALOT
  rationale: Equivalente literal y directo en paralelo con la plata.
- source_word: וְאֵין קֵצֶה
  english_pob_choice: There is no end
  chosen_spanish: No hay fin
  alternatives_spanish:
  - No hay límite
  lexicon: HALOT
  rationale: Expresa con naturalidad la negación existencial y la idea de abundancia inconmensurable.
- source_word: תְּכוּנָה
  english_pob_choice: treasure
  chosen_spanish: tesoro
  alternatives_spanish:
  - depósito
  - reserva
  lexicon: HALOT
  rationale: El sustantivo es raro y puede implicar bienes acumulados o almacenados. «Tesoro» comunica bien la idea de riqueza guardada sin exagerar la especificidad.
- source_word: כָּבֹד
  english_pob_choice: wealth
  chosen_spanish: abundancia
  alternatives_spanish:
  - riqueza
  - esplendor
  lexicon: HALOT
  rationale: En este contexto material, el término apunta a la magnitud o peso de los bienes. «Abundancia» preserva la fuerza cuantitativa sin forzar una equivalencia teológica con «gloria».
- source_word: מִכֹּל כְּלִי חֶמְדָּה
  english_pob_choice: from every precious vessel / an abundance of every precious thing
  chosen_spanish: de toda cosa preciosa
  alternatives_spanish:
  - de todo artículo precioso
  - de todo objeto deseable
  lexicon: HALOT
  rationale: La frase es amplia y puede referirse a objetos valiosos de toda clase. «Toda cosa preciosa» mantiene la amplitud semántica y evita especificar indebidamente «vasos» o «recipientes».
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que corrigió la última cláusula para acercarla más al valor léxico de תְּכוּנָה y כָּבֹד מִכֹּל כְּלִי חֶמְדָּה, evitando una traducción demasiado interpretativa como «riqueza de cada precioso vaso».
  spanish_consistency_notes:
  - Se mantuvo el imperativo plural repetido para conservar el énfasis poético del hebreo.
  - Se eligió «plata» y «oro» como metales literales, en concordancia con el paralelismo del versículo.
  - «Tesoro» se usó como equivalente principal de תְּכוּנָה, con nota de posible matiz de depósito o reserva.
  - «Abundancia» traduce el valor cuantitativo de כָּבֹד en un contexto de botín material.
  - «Toda cosa preciosa» preserva la amplitud de כְּלִי חֶמְדָּה sin estrecharla a utensilios o vasos específicos.
