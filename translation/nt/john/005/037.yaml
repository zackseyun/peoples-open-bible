id: JHN.5.37
reference: John 5:37
source:
  edition: SBLGNT
  text: καὶ ὁ πέμψας με πατὴρ ⸀ἐκεῖνος μεμαρτύρηκεν περὶ ἐμοῦ. οὔτε φωνὴν αὐτοῦ ⸂πώποτε ἀκηκόατε⸃ οὔτε εἶδος αὐτοῦ ἑωράκατε,
translation:
  text: And the Father who sent me—that one has testified about me[a]. You have neither ever heard his voice nor seen his form[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'he himself has testified about me.' The Greek demonstrative ἐκεῖνος adds emphasis after 'the Father who sent me.'
    reason: lexical_alternative
  - marker: b
    text: Or 'his appearance.' The Greek εἶδος can denote visible form or appearance.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ πέμψας με πατὴρ
  chosen: the Father who sent me
  alternatives:
  - the Father, having sent me
  - my sending Father
  lexicon: BDAG
  rationale: 'The articular aorist participle πέμψας functions attributively with πατήρ, naturally rendered in English as a relative clause: ''the Father who sent me.'' This preserves the identifying force without awkward literalism.'
- source_word: ἐκεῖνος
  chosen: that one
  alternatives:
  - he
  - he himself
  lexicon: BDAG
  rationale: ἐκεῖνος is emphatic here, resuming and highlighting 'the Father.' Rendering it as 'that one' preserves the demonstrative emphasis more clearly than a simple 'he.' In English style it is joined by a dash to avoid stiffness while retaining the emphasis.
- source_word: μεμαρτύρηκεν
  chosen: has testified
  alternatives:
  - has borne witness
  - has given testimony
  lexicon: BDAG
  rationale: The perfect tense indicates a completed testimony with abiding relevance. 'Has testified' is clear modern English; 'has borne witness' is also possible but slightly more idiomatic-churchly. The legal/witness sense of μαρτυρέω is preserved.
- source_word: περὶ ἐμοῦ
  chosen: about me
  alternatives:
  - concerning me
  - regarding me
  lexicon: BDAG
  rationale: περί with the genitive here means 'about/concerning.' 'About me' is the most natural contemporary rendering and does not lose meaning.
- source_word: οὔτε ... οὔτε
  chosen: neither ... nor
  alternatives:
  - not ... and not
  lexicon: BDAG
  rationale: This correlative negation is best represented by standard English 'neither ... nor.'
- source_word: φωνὴν αὐτοῦ
  chosen: his voice
  alternatives:
  - the sound of him
  - his sound
  lexicon: BDAG
  rationale: φωνή commonly means 'voice' here, especially in a context of hearing. This is the straightforward lexical equivalent.
- source_word: πώποτε
  chosen: ever
  alternatives:
  - at any time
  - never yet
  lexicon: BDAG
  rationale: 'With the negated perfect, πώποτε conveys ''ever at any time.'' In idiomatic English after ''neither,'' ''ever'' best captures the force: ''neither ever heard.'''
- source_word: ἀκηκόατε
  chosen: have heard
  alternatives:
  - heard
  lexicon: BDAG
  rationale: The perfect tense is retained with 'have heard,' matching the Greek aspect of a past experience extending to the present state.
- source_word: εἶδος αὐτοῦ
  chosen: his form
  alternatives:
  - his appearance
  - his shape
  lexicon: BDAG
  rationale: εἶδος denotes visible form/appearance. 'Form' preserves the lexical breadth and echoes biblical diction without becoming archaic. 'Appearance' is possible, but 'form' better matches the contrast with 'voice' and the Johannine emphasis on perceiving God.
- source_word: ἑωράκατε
  chosen: have seen
  alternatives:
  - seen
  lexicon: BDAG
  rationale: The perfect is again best represented by English present perfect, paralleling ἀκηκόατε.
