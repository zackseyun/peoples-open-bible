translation:
  language: es
  text: Porque ¿qué le importa su casa[b] después de él[a], cuando el número de sus meses se acaba?[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque ¿cuál es su deleite en su casa después de él?»'
    reason: lexical_alternative
  - marker: b
    text: «Casa» también puede implicar «hogar», «familia» o «linaje»
    reason: lexical_alternative
  - marker: c
    text: 'O: «y el número de sus meses es determinado/asignado»'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o explicación del argumento anterior; en español, 'Porque' conserva esa función causal/discursiva de manera natural.
- source_word: מַה
  english_pob_choice: what
  chosen_spanish: qué
  alternatives_spanish:
  - cómo
  - por qué
  lexicon: HALOT
  rationale: Interrogativo retórico que expresa desinterés o falta de preocupación; 'qué' mantiene la fuerza de la pregunta.
- source_word: חֶפְצוֹ
  english_pob_choice: does he care
  chosen_spanish: le importa a él
  alternatives_spanish:
  - es su deleite
  - es su placer
  - lo desea
  lexicon: HALOT
  rationale: חֵפֶץ puede expresar deleite, deseo o preocupación. En este contexto, 'le importa' comunica bien el sentido idiomático y retórico sin volverlo forzado.
- source_word: בְּבֵיתוֹ
  english_pob_choice: about his house
  chosen_spanish: su casa
  alternatives_spanish:
  - su hogar
  - su familia
  - su casa/hogar
  lexicon: HALOT
  rationale: Se conserva 'casa' por fidelidad al término base, permitiendo la posible extensión semántica a casa/linaje/hogar sin imponerla en el texto principal.
- source_word: אַחֲרָיו
  english_pob_choice: after him
  chosen_spanish: después de él
  alternatives_spanish:
  - tras su muerte
  - cuando él haya partido
  lexicon: HALOT
  rationale: La preposición y el sufijo apuntan a lo que ocurre una vez que él ya no está; 'después de él' mantiene la ambigüedad y la literalidad.
- source_word: וּמִסְפַּר
  english_pob_choice: when the number
  chosen_spanish: cuando el número
  alternatives_spanish:
  - y el número
  - mientras el número
  lexicon: HALOT
  rationale: Aunque formalmente es 'y', el enlace temporal/explanatorio en español fluye mejor con 'cuando', reflejando la relación con el final de la vida.
- source_word: חֳדָשָׁיו
  english_pob_choice: of his months
  chosen_spanish: de sus meses
  alternatives_spanish:
  - de su vida
  - de sus días
  lexicon: HALOT
  rationale: Se preserva el término concreto 'meses', que en hebreo funciona como medida de la duración de la vida.
- source_word: חֻצָּצוּ
  english_pob_choice: is cut off
  chosen_spanish: es cortado
  alternatives_spanish:
  - es determinado
  - es asignado
  - se da por terminado
  lexicon: HALOT
  rationale: El pasivo verbal aquí expresa que el número/límite de meses llega a su fin o es interrumpido; 'es cortado' conserva la fuerza lexical del verbo y el matiz de terminación.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que todos los marcadores de nota estén anclados exactamente en el texto español mediante [c][b][a].
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque el versículo no contiene el nombre divino.
  - Se mantuvo 'casa' en sentido base, sin forzar una paráfrasis mayor.
  - La secuencia final conserva la imagen de un límite vital 'cortado' para reflejar el hebreo pasivo.
