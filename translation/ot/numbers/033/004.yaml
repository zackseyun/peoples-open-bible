theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Reference of 'their gods'
  chosen_reading: retain 'their gods' as the text's claim without reinterpretation
  alternative_readings:
  - their rulers
  - their idols
  rationale: The Hebrew אֱלֹהִים here straightforwardly refers to Egypt's gods in the context of Exodus judgment traditions. The translation preserves the text's wording and does not reduce it to a metaphor for human authorities or merely explanatory 'idols.'
  doctrine_reference: Translation philosophy §1, §3
