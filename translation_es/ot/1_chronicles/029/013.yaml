  glossary_alignment: No hay conflicto con la terminología del proyecto. «Dios» para אֱלֹהֵינוּ es correcto. No aparecen términos sensibles adicionales. La elección de mantener «nombre» y «gloria» respeta tanto la teología del texto como la racionalidad léxica del POB.
