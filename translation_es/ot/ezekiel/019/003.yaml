revisions:
- from: Ella crió[a] a uno de sus cachorros; se hizo un león joven, y aprendió a desgarrar la presa; devoró a la gente.
  to: Ella crió a uno de sus cachorros; llegó a ser un león joven, y aprendió a desgarrar presas; devoró a la gente[a].
  rationale: Se eliminó la nota innecesaria en «crió», se mejoró la naturalidad de la progresión con «llegó a ser», se ajustó la expresión depredadora a una genericidad más fiel con «desgarrar presas», y se añadió una nota en «la gente» para conservar el dato léxico importante de que אָדָם está en singular en hebreo, tal como hace la auditoría inglesa.
