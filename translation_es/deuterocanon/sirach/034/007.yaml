review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido básico del griego: los sueños extravían a muchos y quienes ponen su esperanza en ellos caen. Sin embargo, la sintaxis española actual no preserva con claridad esa relación porque «Pues muchos los han extraviado los sueños» es gramaticalmente torpe y puede dificultar la identificación de «los sueños» como sujeto. También conviene alinear mejor la nota alternativa con el inglés auditado: la alternativa principal para ἐπλάνησεν es «han desviado / llevado por mal camino», no una formulación híbrida no idiomática.'
  spanish_quality_summary: 'La calidad del español necesita una reparación menor pero importante: el orden de palabras del primer miembro suena antinatural y confuso. «Pues los sueños han extraviado a muchos[a]» es claro, digno y plenamente natural. El segundo miembro ya es bueno; «y los que esperaban en ellos han caído[b]» mejora levemente la fluidez al adelantar el sujeto explícito. El conjunto queda más legible para un lector eclesial hispanohablante sin perder literalidad.'
  glossary_alignment: 'No hay términos del glosario mayor en juego. «Sueños», «han extraviado», «han caído» y «esperaban en ellos» concuerdan con las decisiones léxicas auditadas. La única corrección relevante es idiomática: evitar una construcción española defectuosa y ajustar la alternativa de la nota para reflejar mejor «led astray».'
  issues:
  - severity: high
    issue: Sintaxis no idiomática en «Pues muchos los han extraviado los sueños»
    rationale: Aunque intenta reflejar el orden griego, en español suena incorrecto o muy forzado. Puede hacer tropezar al lector y oscurecer quién actúa sobre quién. La traducción debe conservar el sentido fuente con español natural.
  - severity: medium
    issue: La nota [a] no ofrece la alternativa más natural en español
    rationale: «Han llevado por mal camino» es comprensible, pero como alternativa a «han extraviado» conviene una opción más directa y elegante como «han desviado a muchos» o «han llevado a muchos por mal camino». Además, la decisión léxica interna contiene el anglicismo accidental «astray».
  revised_spanish_text: Pues los sueños han extraviado a muchos[a], y los que esperaban en ellos han caído[b].
