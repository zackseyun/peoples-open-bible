translation:
  language: es
  text: Así que ahora, escucha su voz; solo que debes advertirles solemnemente y decirles la justicia[a] del rey que reinará sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la manera del rey'; el hebreo מִשְׁפַּט también puede significar 'derecho legal' o 'práctica acostumbrada'.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמַע בְּקוֹלָם
  english_pob_choice: listen to their voice
  chosen_spanish: escucha su voz
  alternatives_spanish:
  - óyelos
  - hazles caso
  - obedece su voz
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y puede significar oír con atención o atender a alguien. En español, 'escucha su voz' conserva la imagen sin sonar forzado. 'Obedece' sería posible, pero en este contexto puede cerrar demasiado el matiz y sonar más interpretativo que el hebreo.
- source_word: אַךְ כִּי
  english_pob_choice: only
  chosen_spanish: pero
  alternatives_spanish:
  - solo que
  - únicamente
  - sin embargo
  lexicon: HALOT
  rationale: La partícula marca una fuerte restricción o corrección frente a lo anterior. 'Pero' comunica bien la transición adversativa en español; el matiz restrictivo queda reforzado por 'debes' y 'solemnemente' en la segunda cláusula.
- source_word: הָעֵד תָּעִיד
  english_pob_choice: you must solemnly warn
  chosen_spanish: debes amonestarlos solemnemente
  alternatives_spanish:
  - debes advertirles solemnemente
  - debes darles una solemne advertencia
  - debes testificarles en serio
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito intensifica la acción. 'Amonestar' expresa bien la fuerza formal y preventiva del hebreo, y 'solemnemente' preserva la seriedad jurídica y profética del mandato.
- source_word: בָּהֶם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - contra ellos
  - sobre ellos
  lexicon: HALOT
  rationale: En esta construcción el destinatario del aviso está claro; el español natural pide un objeto directo. Se evita añadir 'contra' porque el hebreo permite la advertencia dirigida a ellos sin obligar a un matiz polémico explícito.
- source_word: וְהִגַּדְתָּ לָהֶם
  english_pob_choice: and tell them
  chosen_spanish: y decirles
  alternatives_spanish:
  - y declararles
  - y hacerles saber
  - y comunicarles
  lexicon: HALOT
  rationale: '''Decirles'' es la opción más directa y fiel en español contemporáneo. Mantiene el paralelismo con el imperativo anterior sin sobrecargar el verso con un verbo más técnico de lo necesario.'
- source_word: מִשְׁפַּט הַמֶּלֶךְ
  english_pob_choice: the justice of the king
  chosen_spanish: la justicia del rey
  alternatives_spanish:
  - el derecho del rey
  - la norma del rey
  - la manera del rey
  lexicon: HALOT
  rationale: El POB inglés revisó su lectura hacia 'justice' para reflejar más directamente mishpat como juicio/justicia/derecho. En español, 'justicia del rey' mantiene esa opción y evita diluirla en 'costumbre' o 'manera'. Conserva la tensión del término sin resolverla hacia una legitimación política explícita.
- source_word: אֲשֶׁר יִמְלֹךְ עֲלֵיהֶם
  english_pob_choice: who will reign over them
  chosen_spanish: que reinará sobre ellos
  alternatives_spanish:
  - que gobernará sobre ellos
  - que será rey sobre ellos
  - que gobernará a ellos
  lexicon: HALOT
  rationale: '''Reinará sobre ellos'' preserva la referencia real específica del verbo מלך. ''Gobernará'' es más amplio, pero puede perder el eco monárquico del hebreo.'
theological_decisions:
- issue: Cómo rendir מִשְׁפַּט הַמֶּלֶךְ sin imponer una valoración teológica ajena al pasaje
  english_pob_reading: the justice of the king
  chosen_spanish_reading: la justicia del rey
  alternative_spanish_readings:
  - el derecho del rey
  - la costumbre del rey
  - la manera del rey
  rationale: El texto introduce el cargo real en un contexto de advertencia. 'La justicia del rey' sigue la revisión del POB inglés y mantiene la ambigüedad de mishpat entre justicia, derecho y juicio, sin convertirlo en una aprobación moral del sistema monárquico. Las opciones 'derecho' o 'costumbre' explicitan otras facetas, pero pueden inclinar demasiado la lectura.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: El inglés POB pasó de 'custom of the king' a 'justice of the king' en una revisión posterior, precisamente para reflejar mishpat con mayor cercanía a 'judgment/justice/right'. Esta versión española sigue esa lectura revisada y no vuelve a la opción anterior, aunque mantiene visible la tensión semántica del término.
  spanish_consistency_notes:
  - Se usó 'Yahvé' por coherencia con el estándar del proyecto, aunque este versículo no contiene el nombre divino.
  - '''Escucha su voz'' conserva el idiomatismo hebreo de שׁמע בקול, sin forzar ''obedecer'' como única lectura.'
  - '''Amonestarlos solemnemente'' intenta reflejar la intensificación del infinitivo absoluto más verbo finito.'
  - '''Justicia del rey'' se mantiene como término deliberadamente tenso, no como legitimación del poder real.'
