revisions:
- from: Hacemos saber al rey que, si esta ciudad es reedificada y sus murallas son completadas, entonces, por esto, no tendrás[a] parte[b] al otro lado del Río[c].
  to: Hacemos saber al rey que, si esta ciudad es reconstruida y sus murallas quedan terminadas, por esto no tendrás parte[a] Más allá del Río[b].
  rationale: Se eliminó la nota que introducía el matiz no atestiguado «ya». Se sustituyeron expresiones calcadas por formulaciones más naturales en español («reconstruida», «quedan terminadas»). Se ajustó la designación regional a «Más allá del Río», que funciona mejor como título histórico y sigue la nota cultural del POB sin añadir «provincia» al texto principal.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:11:51Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura condicional y el sentido global del arameo: una notificación formal al rey de que, si la ciudad se reconstruye y sus murallas se terminan, él no tendrá חֲלָק en בַּעֲבַר נַהֲרָא. Sin embargo, hay pequeños problemas de fidelidad idiomática y de apoyo en el texto: «reedificada» es posible pero menos natural que «reconstruida»; «son completadas» suena calcado; y la nota [a] («no tendrás ya») introduce un matiz de ‘ya/no longer’ que el inglés auditado descartó y que el arameo no exige.'
  spanish_quality_summary: 'El texto es comprensible, pero varias expresiones suenan poco naturales en español bíblico moderno: «son completadas» y «entonces, por esto» se sienten mecánicas. «Más allá del Río» funciona mejor como designación semititulada que «al otro lado del Río» para esta frase histórica. También conviene corregir «trans-eufrates» a «trans-Eufrates».'
  glossary_alignment: No hay términos teológicos mayores en juego. La revisión propuesta mantiene el registro formal y preserva la decisión POB de no añadir «provincia». Se conserva «parte» para חֲלָק con nota alternativa a «porción» y posible sentido administrativo.
  issues:
  - severity: medium
    issue: La nota [a] añade «ya» sin base suficiente en el texto fuente.
    rationale: El arameo לָא אִיתַי לָךְ expresa posesión negativa (‘no tendrás / no habrá para ti’), no necesariamente ‘ya no tendrás’. El audit trail inglés también rechazó esa sobrelectura.
  - severity: medium
    issue: «Son completadas» es un calco poco natural en español.
    rationale: Aunque formalmente posible, en español moderno y digno suena mejor «queden terminadas» o «se terminen», manteniendo el sentido de obra llevada a su fin.
  - severity: low
    issue: «Al otro lado del Río» es menos adecuado que «Más allá del Río» para la designación persa.
    rationale: La nota cultural ya explica el carácter de nombre oficial; «Más allá del Río» reproduce mejor la formulación convencional del topónimo histórico.
  - severity: low
    issue: 'Error ortográfico/estilístico en la nota cultural: «trans-eufrates».'
    rationale: Debe escribirse «trans-Eufrates» en español con mayúscula en el nombre propio.
  revised_spanish_text: Hacemos saber al rey que, si esta ciudad es reconstruida y sus murallas quedan terminadas, por esto no tendrás parte[a] Más allá del Río[b].
  revised_footnotes:
  - marker: a
    text: O «porción»; más específicamente en este contexto, «participación» o incluso «ingreso». El arameo חֲלָק puede abarcar la idea de parte, porción o cuota según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «Más allá del Río», nombre oficial persa de la provincia trans-Eufrates.
    reason: cultural_note
  revision_rationale: Se eliminó la nota que introducía el matiz no atestiguado «ya». Se sustituyeron expresiones calcadas por formulaciones más naturales en español («reconstruida», «quedan terminadas»). Se ajustó la designación regional a «Más allá del Río», que funciona mejor como título histórico y sigue la nota cultural del POB sin añadir «provincia» al texto principal.
