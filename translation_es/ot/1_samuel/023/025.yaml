    text: «Peña» traduce un término hebreo que también puede entenderse como «roca», «peñasco» o «risco»; probablemente se refiere a una formación rocosa notable o a un refugio natural.
    reason: lexical_alternative
  revision_rationale: Se reubica correctamente la nota en «peña», se simplifica וַיַּגִּדוּ לְדָוִד con una formulación más directa y natural en español narrativo, y se ajusta el conector inicial para una mejor fluidez bíblica sin alterar el sentido. Se añade «que Saúl venía» para explicitar el contenido implícito de la información comunicada, coherente con el contexto inmediato y con «lo oyó» en la cláusula siguiente.
