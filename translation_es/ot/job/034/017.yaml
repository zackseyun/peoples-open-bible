    rationale: El hebreo presenta dos adjetivos/substantivos («justo», «poderoso/grande»). En español, capitalizar ambos crea un título poco natural y más interpretativo de lo necesario.
  - severity: medium
    issue: La nota b no refleja con precisión las alternativas del POB inglés
    rationale: El inglés da «the just mighty one» o «the righteous great one». «el grande y poderoso» introduce una estructura coordinada ajena al hebreo y pierde la alternativa «justo/grande».
  - severity: low
