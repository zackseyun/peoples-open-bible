translation:
  language: es
  text: Él adiestra[a] mis manos para la batalla, y mis brazos pueden doblar un arco de bronce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más literal: «y mis brazos son capaces de doblar un arco de bronce». El hebreo de la cláusula es difícil y puede verterse con un matiz más pasivo o más literal.'
    reason: alternative_reading
lexical_decisions:
- source_word: מְלַמֵּד
  english_pob_choice: trains
  chosen_spanish: adiestra
  alternatives_spanish:
  - entrena
  - enseña
  lexicon: HALOT
  rationale: En este contexto bélico, למד expresa preparación práctica para la acción. «Adiestra» comunica esa formación concreta mejor que «enseña», y mantiene la idea de capacitación para la batalla que el hebreo sugiere.
- source_word: יָדַי
  english_pob_choice: my hands
  chosen_spanish: mis manos
  alternatives_spanish:
  - mis manos
  lexicon: HALOT
  rationale: Se conserva el plural corporal literal. En español, «manos» es natural y mantiene la imagen concreta de destreza para combatir.
- source_word: לַמִּלְחָמָה
  english_pob_choice: for battle
  chosen_spanish: para la batalla
  alternatives_spanish:
  - para la guerra
  lexicon: HALOT
  rationale: «Batalla» suena más idiomático en español con el verbo de capacitación y conserva el campo militar de מלחמה sin endurecer innecesariamente el verso.
- source_word: וְנִחֲתָה
  english_pob_choice: can bend
  chosen_spanish: pueden doblar
  alternatives_spanish:
  - es doblado
  - ha sido doblado
  - se dobla
  lexicon: HALOT
  rationale: El hebreo es sintácticamente difícil. Siguiendo la lectura de capacidad habilitada por Dios, «pueden doblar» transmite la fuerza resultante sin fijar de modo excesivo una pasiva literal que el contexto no obliga a adoptar.
- source_word: קֶשֶׁת
  english_pob_choice: a bow
  chosen_spanish: un arco
  alternatives_spanish:
  - un arco
  lexicon: HALOT
  rationale: En español, «arco» es el término natural para el arma de tiro; conserva el singular del hebreo y la imagen poética.
- source_word: נְחוּשָׁה
  english_pob_choice: of bronze
  chosen_spanish: de bronce
  alternatives_spanish:
  - de cobre
  lexicon: HALOT
  rationale: «Bronce» es la equivalencia más estable y comprensible en español bíblico para נחושה en este tipo de arma resistente.
- source_word: זְרוֹעֹתָי
  english_pob_choice: my arms
  chosen_spanish: mis brazos
  alternatives_spanish:
  - mis brazos
  lexicon: HALOT
  rationale: «Brazos» preserva el plural literal y resulta natural en español para la imagen de fuerza física que dobla el arco.
theological_decisions:
- issue: Sentido de la cláusula difícil וְנִחֲתָה קֶשֶׁת נְחוּשָׁה זְרוֹעֹתָי
  english_pob_reading: 'The clause expresses enabled ability: ''my arms can bend a bow of bronze.'''
  chosen_spanish_reading: 'La cláusula expresa capacidad habilitada: «mis brazos pueden doblar un arco de bronce».'
  alternative_spanish_readings:
  - «y un arco de bronce es doblado por mis brazos»
  - «mis brazos doblan un arco de bronce»
  rationale: Se preserva la tensión del hebreo sin resolverla de forma excesivamente interpretativa. La formulación elegida mantiene el énfasis en la fuerza concedida por Dios y coincide con el paralelismo del versículo, evitando convertir la dificultad sintáctica en una lectura más cerrada de lo que permite el texto.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El control cruzado indica alta concordancia y no hubo cambios necesarios en la revisión más reciente; esta versión sigue la lectura aprobada y conserva la ambigüedad del hebreo en la cláusula final.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo exija; este versículo no lo contiene.
  - «Arco de bronce» preserva la imaginería militar concreta sin introducir glosa explicativa innecesaria.
  - La solución verbal «pueden doblar» intenta reflejar la capacidad otorgada, alineada con la auditable lectura inglesa, sin borrar la dificultad del hebreo.
