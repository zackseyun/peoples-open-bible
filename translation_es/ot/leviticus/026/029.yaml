translation:
  language: es
  text: Y ustedes comerán la carne de sus hijos, y comerán la carne de sus hijas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַאֲכַלְתֶּם
  english_pob_choice: you will eat
  chosen_spanish: comerán
  alternatives_spanish:
  - ustedes comerán
  - y comerán
  - entonces comerán
  lexicon: HALOT
  rationale: El verbo אכל en qal 2mp expresa aquí una acción futura en el marco de una sentencia de juicio. «Comerán» comunica bien la fuerza predictiva sin introducir un matiz arcaizante como «comeréis» ni explicar más de lo que el texto dice. El valor consecutivo de la waw se refleja de forma natural en la coordinación inicial del español.
- source_word: בְּשַׂר
  english_pob_choice: the flesh
  chosen_spanish: la carne
  alternatives_spanish:
  - carne
  - la carne
  - el cuerpo
  lexicon: HALOT
  rationale: בָּשָׂר se traduce mejor como «carne» para conservar el sentido crudo y literal del pasaje. «Carne» es más fiel y menos suavizante que «cuerpo» o «carne» en sentido alimentario ambiguo. El artículo se mantiene por la fluidez natural del español, en paralelo con la primera cláusula.
- source_word: בְּנֵיכֶם
  english_pob_choice: of your sons
  chosen_spanish: de sus hijos
  alternatives_spanish:
  - de sus hijos varones
  - de sus hijos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «de sus hijos» en masculino plural; en español, «hijos» funciona de manera natural y puede abarcar el masculino específico del texto. Se evita generalizar a «hijos e hijas» porque la pareja se desdobla en la cláusula siguiente.
- source_word: וּבְשַׂר
  english_pob_choice: and the flesh
  chosen_spanish: y la carne
  alternatives_spanish:
  - y carne
  - y la carne
  lexicon: HALOT
  rationale: Se conserva la repetición del sustantivo para reproducir el paralelismo y la cadencia sombría del hebreo y de la solución inglesa auditada. La coordinación «y la carne» evita omitir el segundo miembro o suavizar la repetición.
- source_word: בְּנֹתֵיכֶם
  english_pob_choice: of your daughters
  chosen_spanish: de sus hijas
  alternatives_spanish:
  - de sus hijas
  - de sus hijas mujeres
  lexicon: HALOT
  rationale: «Hijas» es la correspondencia directa y natural de בְּנֹתֵיכֶם. Se conserva el paralelismo con «hijos» y se evita cualquier expansión innecesaria que debilite la contundencia del texto.
- source_word: תֹּאכֵלוּ
  english_pob_choice: you will eat
  chosen_spanish: comerán
  alternatives_spanish:
  - ustedes comerán
  - comerán
  lexicon: HALOT
  rationale: El segundo verbo repite la misma forma verbal y debe repetirse también en español para preservar la insistencia del hebreo. «Comerán» mantiene la previsión judicial y la estructura paralela del verso.
theological_decisions:
- issue: Traducción directa de una maldición de pacto con canibalismo
  english_pob_reading: 'A direct predictive judgment statement: ''you will eat the flesh of your sons ... daughters'''
  chosen_spanish_reading: 'Una afirmación directa y predictiva de juicio: «comerán la carne de sus hijos ... hijas»'
  alternative_spanish_readings:
  - Una versión eufemística o atenuada
  - Una interpretación explicativa del juicio
  rationale: El pasaje es una advertencia literal de maldición del pacto y no debe suavizarse. Mantener la formulación directa preserva la gravedad del juicio divino y respeta la fuerza retórica del hebreo, en continuidad con la lectura auditada en inglés.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; por eso este borrador sigue de cerca la solución auditada en inglés, ajustando solo la naturalidad del español sin alterar el sentido literal del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «carne» para בָּשָׂר en ambas cláusulas, preservando el paralelismo.
  - Se conservó la repetición del verbo «comerán» en ambas mitades del verso.
  - Se optó por un español sobrio y directo, sin eufemismos, dado el carácter de juicio del texto.
