translation:
  language: es
  text: Antes de que sus ollas sientan la zarza espinosa[a], ya sea verde o en llamas, él se las llevará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo difícil: «Antes de que sus ollas perciban la zarza espinosa, como verde, como ardor/ira, él las/lo arremoline». La idea probable es una remoción repentina antes de que el fuego alcance para calentar las ollas. Algunos entienden la frase final como «él los barrerá en ira».'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּטֶרֶם
  english_pob_choice: Before
  chosen_spanish: Antes de que
  alternatives_spanish:
  - Antes
  - Antes que
  lexicon: HALOT
  rationale: Marca temporal previa a la acción siguiente. En español, «Antes de que» comunica con naturalidad la prioridad temporal y conserva la brusquedad del hebreo.
- source_word: יָבִינוּ
  english_pob_choice: can feel
  chosen_spanish: sientan
  alternatives_spanish:
  - perciban
  - entiendan
  - noten
  lexicon: HALOT
  rationale: Aunque el verbo suele significar «entender/percebir», aquí el sujeto inanimado («ollas») favorece una sensación de captar el calor o el efecto del fuego. «Sientan» mantiene la rareza poética sin volverla demasiado explicativa.
- source_word: סִּירֹתֵיכֶם
  english_pob_choice: your pots
  chosen_spanish: sus ollas
  alternatives_spanish:
  - sus potes
  - sus cazuelas
  - sus calderos
  lexicon: HALOT
  rationale: El referente son recipientes de cocción. «Ollas» es el equivalente más natural y legible en español moderno, y preserva el plural exigido por el contexto revisado en inglés.
- source_word: אָטָד
  english_pob_choice: the thornbush
  chosen_spanish: la retama
  alternatives_spanish:
  - la zarza
  - el espino
  - el matorral espinoso
  lexicon: HALOT
  rationale: אָטָד designa un arbusto espinoso usado como combustible rápido. «Retama» puede funcionar como equivalente de arbusto combustible y es más idiomática que una glosa demasiado abstracta; se mantiene la referencia vegetal concreta.
- source_word: כְּמוֹ חַי
  english_pob_choice: whether green
  chosen_spanish: ya sea verde
  alternatives_spanish:
  - como verde
  - esté verde
  - todavía verde
  lexicon: HALOT
  rationale: En el contexto del combustible, el contraste es entre leña fresca y leña ya preparada. «Ya sea verde» conserva la oposición y evita sobreinterpretar «vivo» de forma innecesaria.
- source_word: כְּמוֹ חָרוֹן
  english_pob_choice: or burning
  chosen_spanish: o en llamas
  alternatives_spanish:
  - o ardiendo
  - o quemándose
  - o en ardor
  lexicon: HALOT
  rationale: En paralelo con «verde», el término apunta al estado del combustible en el fuego. «En llamas» expresa el valor térmico de forma clara, sin introducir en el texto principal la lectura de «ira» que el hebreo también podría sugerir.
- source_word: יִשְׂעָרֶנּוּ
  english_pob_choice: he will sweep them away
  chosen_spanish: él las barrerá
  alternatives_spanish:
  - él las arrasará
  - él las arrebatará
  - él las llevará como un torbellino
  lexicon: HALOT
  rationale: El verbo tiene la idea de agitar/arrastrar violentamente, como por tormenta. «Barrerá» es idiomático en español y comunica la remoción súbita; el complemento plural «las» sigue la revisión inglesa que corrigió el singular.
theological_decisions:
- issue: Imagen poética sumamente difícil en Salmos 58:10
  english_pob_reading: The wicked are suddenly swept away before their plans come to fruition, using the image of pots not yet heated by thornbush fuel, whether the brush is still green or already burning.
  chosen_spanish_reading: El verso presenta una interrupción súbita antes de que el fuego llegue a calentar las ollas; la imagen conserva la rapidez del juicio y el lenguaje doméstico del poema.
  alternative_spanish_readings:
  - Antes de que sus ollas perciban la retama, ya sea verde o en llamas, él las barrerá en ira.
  - Antes de que sus ollas sientan el espino, ya verde o ardiendo, él las arremolinará.
  rationale: El hebreo es sintáctica y semánticamente difícil. La traducción principal conserva la imagen concreta y la desaparición repentina, sin resolver de manera excesiva las ambigüedades del término final ni forzar en el texto principal una lectura explícita de «ira» para חָרוֹן. Se preserva la tensión interpretativa que la tradición auditada también reconoce.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue la revisión auditada que corrigió el objeto singular por plural en inglés («them» en lugar de «it»), por lo que se mantiene el plural en español («las barrerá»). También conserva la decisión principal de no resolver excesivamente la dificultad de חָרוֹן en el texto base.
  spanish_consistency_notes:
  - Se mantiene un estilo bíblico moderno y digno, sin calco mecánico.
  - «Ollas» traduce el plural de סִּירֹתֵיכֶם y evita perder la concordancia.
  - Se conserva una solución léxica concreta para אָטָד, con nota de ambigüedad textual.
  - La nota de pie de página recoge la alternativa de lectura sin sobrecargar el texto principal.
