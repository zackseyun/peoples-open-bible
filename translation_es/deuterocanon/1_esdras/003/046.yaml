translation:
  language: es
  text: Y un hombre toma su espada y sale para ir de campaña[a], saquear y hurtar, y para navegar por el mar y ríos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «marchar», «hacer una expedición», o en sentido más amplio «hacer la guerra» para el griego ἐξοδεύειν.
    reason: lexical_alternative
lexical_decisions:
- source_word: λαμβάνει
  english_pob_choice: takes
  chosen_spanish: toma
  alternatives_spanish:
  - recibe
  - agarra
  lexicon: LSJ
  rationale: En este contexto narrativo, el verbo expresa la acción simple de tomar el arma; «toma» preserva esa naturalidad sin añadir matices demasiado coloquiales como «agarra» ni un sentido inadecuado como «recibe».
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: LSJ
  rationale: El griego es singular y masculino; «un hombre» mantiene esa forma representativa como en la traducción inglesa auditada.
- source_word: ῥομφαίαν
  english_pob_choice: sword
  chosen_spanish: espada
  alternatives_spanish:
  - arma
  - sable
  lexicon: LSJ
  rationale: ῥομφαία puede referir una espada grande o sable, pero «espada» es la equivalencia española más clara y natural sin sobreespecificar el tipo de arma.
- source_word: ἐκπορεύεται
  english_pob_choice: goes out
  chosen_spanish: sale
  alternatives_spanish:
  - sale afuera
  - se va
  lexicon: LSJ
  rationale: «Sale» conserva el movimiento concreto del verbo griego y encaja bien con la serie de infinitivos que sigue.
- source_word: ἐξοδεύειν
  english_pob_choice: to campaign
  chosen_spanish: hacer campaña
  alternatives_spanish:
  - marchar
  - hacer una expedición
  - ir a la guerra
  lexicon: LSJ
  rationale: La redacción española debe reflejar el matiz de expedición o campaña militar. «Hacer campaña» es la opción más natural y cercana al valor que la POB inglesa decidió fijar como «to campaign», sin intensificar indebidamente hacia «ir a la guerra».
- source_word: λῃστεύειν
  english_pob_choice: to plunder
  chosen_spanish: saquear
  alternatives_spanish:
  - robar
  - asaltar
  lexicon: LSJ
  rationale: El verbo describe actuar como ladrón o bandido; en este contexto bélico/través de territorio, «saquear» comunica mejor el despojo violento que «robar».
- source_word: κλέπτειν
  english_pob_choice: to steal
  chosen_spanish: robar
  alternatives_spanish:
  - hurtar
  - tomar secretamente
  lexicon: LSJ
  rationale: En español, «robar» es la forma más directa y natural para κλέπτειν. Distingue bien este verbo del anterior («saquear»), aunque ambos pertenecen al campo del hurto/rapiña.
- source_word: εἰς τὴν θάλασσαν πλεῖν
  english_pob_choice: to sail on the sea
  chosen_spanish: navegar por el mar
  alternatives_spanish:
  - navegar en el mar
  - ir por mar
  lexicon: LSJ
  rationale: La construcción griega con πλεῖν pide un verbo de navegación; «navegar por el mar» suena natural en español y conserva la idea de desplazamiento marítimo sin forzar «hacia el mar».
- source_word: ποταμούς
  english_pob_choice: rivers
  chosen_spanish: los ríos
  alternatives_spanish:
  - ríos
  - los cauces
  lexicon: LSJ
  rationale: El plural simple se expresa de forma natural como «los ríos». Añadir artículo en español ayuda a la fluidez coordinada con «el mar».
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada de «to go on campaigns» a «to campaign» para naturalidad; en español se optó por una solución igualmente natural, «hacer campaña», que preserva el mismo alcance semántico de ἐξοδεύειν. No se introducen lecturas doctrinales ni variantes textuales adicionales, y se mantiene la serie verbal acumulativa del griego.
  spanish_consistency_notes:
  - 'Se preserva la coordinación seriada del original: toma... sale... para... para... y para...'
  - Se evita suavizar los verbos de violencia; «saquear» y «robar» mantienen la tensión léxica entre λῃστεύειν y κλέπτειν.
  - «Navegar por el mar y los ríos» mantiene la doble referencia geográfica sin añadir elementos ausentes en el griego.
  - El tono es bíblico y sobrio, pero con español moderno y lectura fluida.
