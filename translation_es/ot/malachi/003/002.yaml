translation:
  language: es
  text: Pero ¿quién podrá soportar el día de su venida, y quién podrá mantenerse en pie cuando él se manifieste? Porque él es como fuego refinador y como jabón de lavanderos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como jabón de fulleros». El hebreo se refiere a un álcali fuerte usado para lavar telas.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְכַלְכֵּל
  english_pob_choice: can endure
  chosen_spanish: podrá soportar
  alternatives_spanish:
  - podrá resistir
  - podrá aguantar
  - podrá endurar
  lexicon: HALOT
  rationale: El verbo expresa la capacidad de sobrellevar una prueba pesada. 'Podrá soportar' comunica de manera natural la idea de resistir una carga o juicio, y conserva el matiz de posibilidad del interrogante retórico.
- source_word: יוֹם בּוֹאוֹ
  english_pob_choice: the day of his coming
  chosen_spanish: el día de su venida
  alternatives_spanish:
  - el día cuando él venga
  - el día de su llegada
  lexicon: HALOT
  rationale: '''Venida'' preserva el sustantivo verbal del hebreo y su peso profético. ''Llegada'' sonaría más neutral; ''cuando él venga'' explicita demasiado la construcción.'
- source_word: הָעֹמֵד
  english_pob_choice: can stand
  chosen_spanish: podrá mantenerse en pie
  alternatives_spanish:
  - podrá estar firme
  - podrá permanecer de pie
  lexicon: HALOT
  rationale: La imagen de permanecer de pie en una prueba encaja bien con el paralelismo y conserva la fuerza idiomática de 'stand' sin sonar forzada en español.
- source_word: בְּהֵרָאוֹתוֹ
  english_pob_choice: when he appears
  chosen_spanish: cuando él se manifieste
  alternatives_spanish:
  - cuando aparezca
  - cuando sea visto
  lexicon: HALOT
  rationale: La forma niphal de ראה apunta a hacerse visible / manifestarse. 'Se manifieste' mantiene la pasividad/reflexividad del hebreo mejor que un simple 'aparezca'.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la pregunta retórica. 'Porque' da claridad causal en español y conserva la relación explicativa del hebreo.
- source_word: כְּאֵשׁ מְצָרֵף
  english_pob_choice: like a refiner’s fire
  chosen_spanish: como fuego de refinador
  alternatives_spanish:
  - como fuego de fundidor
  - como fuego para refinar
  lexicon: HALOT
  rationale: '''Fuego de refinador'' reproduce la metáfora laboral del hebreo y el sentido purificador del contexto. ''Fundidor'' sería posible, pero ''refinador'' corresponde mejor al inglés auditado y al uso bíblico tradicional sin perder claridad.'
- source_word: וּכְבֹרִית מְכַבְּסִים
  english_pob_choice: like launderers’ soap
  chosen_spanish: como jabón de lavadores
  alternatives_spanish:
  - como jabón de lavanderos
  - como álcali de lavadores
  - como lejía de lavadores
  lexicon: HALOT
  rationale: '''בֹרִית'' designa una sustancia limpiadora fuerte. ''Jabón de lavadores'' sigue la decisión inglesa de un término moderno y comprensible, pero conserva la imagen de limpieza intensa. ''Lavadores'' evita cargar el verso con terminología artesanal arcaica.'
theological_decisions:
- issue: El alcance de la acción purificadora/judicial de la figura venidera
  english_pob_reading: Render the imagery in terms of purifying and testing severity without importing a narrower doctrinal category such as only destruction or only sanctification.
  chosen_spanish_reading: Mantener la imagen como severidad probadora y purificadora, sin reducirla solo a destrucción ni solo a santificación.
  alternative_spanish_readings:
  - principalmente juicio destructivo
  - principalmente purificación sacerdotal
  rationale: Las dos comparaciones, fuego de refinador y jabón de lavadores, exigen conservar la tensión entre prueba severa y limpieza. El español evita cerrar el sentido en una sola categoría doctrinal.
  doctrine_reference: Preservar la tensión teológica del texto.
translation_notes:
  revision_awareness: El pasaje coincide ampliamente con el audit trail inglés y no requiere revisión adicional. Se ha conservado la tensión entre juicio y purificación, y se ha optado por vocabulario español transparente y reverente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «venida» para el sustantivo verbal de בוא y «se manifieste» para reflejar la voz/valencia de הֵרָאוֹת.
  - «Jabón de lavadores» traduce la imagen de un agente limpiador fuerte sin recurrir a un calco arcaico difícil de entender.
