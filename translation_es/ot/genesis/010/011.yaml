translation:
  language: es
  text: De aquella tierra salió Ashur[a] y edificó Nínive, Rehobot-Ir y Calaj.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «De aquella tierra salió a Asiria y edificó Nínive, Rehobot-Ir y Calaj», entendiendo que el sujeto es Nimrod del versículo anterior y que אַשּׁוּר se refiere a la región de Asiria, no a la persona Ashur.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִן הָ/אָ֥רֶץ הַ/הִ֖וא
  english_pob_choice: From that land
  chosen_spanish: Desde aquella tierra
  alternatives_spanish:
  - De aquella tierra
  - Desde aquel territorio
  lexicon: HALOT
  rationale: מִן expresa origen o procedencia; en español, ‘desde’ comunica con naturalidad el punto de partida. אֶרֶץ aquí tiene sentido geográfico de territorio o tierra, por eso ‘tierra’ conserva el valor territorial sin volverlo demasiado técnico.
- source_word: יָצָ֣א
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - se fue
  - partió
  lexicon: HALOT
  rationale: El verbo יצא indica salida o desplazamiento desde un lugar. ‘Salió’ es la equivalencia natural y mantiene la sencillez narrativa del hebreo.
- source_word: אַשּׁ֑וּר
  english_pob_choice: Asshur
  chosen_spanish: Ashur
  alternatives_spanish:
  - Asiria
  lexicon: HALOT
  rationale: Se conserva la transliteración del nombre propio en la lectura principal, porque el hebreo permite leerlo como persona. ‘Asiria’ queda como alternativa interpretativa en la nota, ya que el texto es genuinamente ambiguo.
- source_word: וַ/יִּ֨בֶן֙
  english_pob_choice: built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - fundó
  lexicon: HALOT
  rationale: בנה puede traducirse por ‘construir’ o ‘edificar’. ‘Edificó’ mantiene dignidad literaria y sigue siendo fiel al acto de establecer ciudades; ‘fundó’ sería más interpretativo.
- source_word: נִ֣ינְוֵ֔ה
  english_pob_choice: Nineveh
  chosen_spanish: Nínive
  alternatives_spanish:
  - Ninive
  lexicon: HALOT
  rationale: Nombre propio tradicionalmente reconocido en español. Se usa la forma con tilde por la acentuación del español.
- source_word: רְחֹבֹ֥ת עִ֖יר
  english_pob_choice: Rehoboth-Ir
  chosen_spanish: Rehobot-Ir
  alternatives_spanish:
  - Rehobot-Ir
  - los anchos de la ciudad
  lexicon: HALOT
  rationale: En este contexto genealógico se entiende mejor como topónimo. La forma española conserva la composición del nombre sin convertirlo en una frase explicativa. Se ajusta la transliteración al español con ‘h’ omitida en la secuencia habitual de nombres bíblicos, manteniendo la identificación del lugar.
- source_word: כָּֽלַח
  english_pob_choice: Calah
  chosen_spanish: Calaj
  alternatives_spanish:
  - Calah
  lexicon: HALOT
  rationale: Se translitera al español con ‘j’ para reflejar la pronunciación adaptada en castellano y evitar la grafía inglesa del audit trail. Es un nombre propio de ciudad.
theological_decisions:
- issue: 'Identidad de אַשּׁוּר: sujeto personal o región Asiria'
  english_pob_reading: 'Asshur is the subject: ''Asshur went out'''
  chosen_spanish_reading: 'Ashur como sujeto: «Ashur salió»'
  alternative_spanish_readings:
  - «salió a Asiria» con Nimrod como sujeto implícito
  - «desde aquella tierra salió a Asiria»
  rationale: 'El hebreo permite ambas lecturas. La versión principal sigue la lectura más directa de la sintaxis: un sujeto explícito con verbo de movimiento. La alternativa regional se preserva porque la ambigüedad es real y no debe resolverse sin señalarla.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador [a] aparezca dentro del texto principal exactamente donde corresponde al nombre ambiguo.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ como norma del proyecto, pero este versículo no contiene el tetragrámaton ni un equivalente contextual.
  - Se prefirió ‘salió’ por naturalidad y fidelidad narrativa, evitando una paráfrasis interpretativa.
  - Los nombres propios se conservaron como topónimos reconocibles en español, con transliteración adaptada cuando corresponde.
