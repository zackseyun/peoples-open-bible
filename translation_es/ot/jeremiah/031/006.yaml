    text: 'Hebreo נֹצְרִים: también puede entenderse «guardianes» o «guardias».'
    reason: lexical_alternative
  revision_rationale: Se ajusta «clamarán» a «llamarán» para reflejar mejor la convocatoria pública de קָרְאוּ, y «sobre la región montañosa» a «en la región montañosa» para un español más natural y fiel al sentido geográfico. Se armoniza la nota léxica con las alternativas auditadas.
