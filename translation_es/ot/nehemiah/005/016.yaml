translation:
  language: es
  text: Y yo también me apliqué[a] a la obra de este muro, y no compramos ningún campo, y todos mis hombres[b] estaban reunidos allí para la obra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me ocupé en», «me dediqué a», o «me hice cargo de» la obra de este muro.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mis servidores» o «mis asistentes»; el hebreo נְעָרַי puede referirse a hombres jóvenes del séquito o a personal subordinado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: And I also
  chosen_spanish: Y yo también
  alternatives_spanish:
  - Y también
  - Además, yo también
  lexicon: HALOT
  rationale: Conserva el valor aditivo de גַם y el enlace con el contexto previo; el pronombre explícito refuerza la primera persona singular marcada por el verbo hebreo.
- source_word: בִּמְלֶאכֶת
  english_pob_choice: to the work on
  chosen_spanish: a la obra de
  alternatives_spanish:
  - en la obra de
  - para la obra de
  lexicon: HALOT
  rationale: מְלָאכָה aquí se refiere a la labor u obra en curso; en español, 'obra de este muro' suena natural y fiel al ámbito de trabajo, evitando un calco pesado.
- source_word: הַחוֹמָה הַזֹּאת
  english_pob_choice: this wall
  chosen_spanish: este muro
  alternatives_spanish:
  - esta muralla
  - este muro de la ciudad
  lexicon: HALOT
  rationale: '''Muro'' comunica bien la estructura defensiva en un registro bíblico claro; ''muralla'' es posible, pero ''muro'' evita sobreespecificar y sigue siendo natural en español.'
- source_word: הֶחֱזַקְתִּי
  english_pob_choice: applied myself
  chosen_spanish: me apliqué[a]
  alternatives_spanish:
  - me dediqué
  - me esforcé
  - tomé parte
  lexicon: HALOT
  rationale: La POB inglesa revisó la idea desde 'devoted myself' a 'applied myself' para hacer más directa la fuerza verbal; 'me apliqué' conserva esa autoimplicación personal sin suavizarla en exceso.
- source_word: וְשָׂדֶה לֹא קָנִינוּ
  english_pob_choice: and we did not buy any field
  chosen_spanish: y no compramos ningún campo
  alternatives_spanish:
  - y no adquirimos ningún campo
  - y no compramos campo alguno
  lexicon: HALOT
  rationale: Se mantiene el plural 'compramos' como en el hebreo ('nosotros'); 'campo' traduce שָׂדֶה de forma clara y natural, con 'ningún' reflejando el valor negativo del sintagma.
- source_word: נְעָרַי
  english_pob_choice: my young men
  chosen_spanish: mis jóvenes[b]
  alternatives_spanish:
  - mis servidores
  - mis sirvientes
  - mis asistentes
  lexicon: HALOT
  rationale: נַעַר puede significar joven, siervo o asistente; la POB inglesa optó por 'young men' para no imponer servidumbre. En español, 'mis jóvenes' preserva esa neutralidad léxica, aunque la nota mantiene las alternativas contextuales.
- source_word: קְבוּצִים שָׁם
  english_pob_choice: were gathered there
  chosen_spanish: estaban reunidos allí
  alternatives_spanish:
  - estaban congregados allí
  - estaban agrupados allí
  lexicon: HALOT
  rationale: 'El participio pasivo comunica estado: estaban ya reunidos. ''Reunidos'' es el equivalente español más natural y preciso, y conserva la referencia espacial de ''allí''.'
- source_word: עַל הַמְּלָאכָה
  english_pob_choice: for the work
  chosen_spanish: para la obra
  alternatives_spanish:
  - en la obra
  - para el trabajo
  lexicon: HALOT
  rationale: La preposición עַל en contexto laboral expresa ocupación/encargo; 'para la obra' comunica finalidad y pertenencia a la tarea sin perder el matiz de labor concreta.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que prefirió 'applied myself' por encima de 'devoted myself', y conserva la lectura de participación personal directa en la obra, con el plural 'compramos' y la nota sobre נְעָרַי para no borrar su ambigüedad contextual.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general de la serie, pero este versículo no contiene el nombre divino.
  - Se usa 'obra' para מְלָאכָה en coherencia con un registro bíblico sobrio y con la POB inglesa 'work' en sentido de labor concreta.
  - No se introduce 'siervo' como predeterminado para נְעָרַי, siguiendo la cautela lexical de la POB inglesa.
  - El texto conserva primera persona singular en 'me apliqué' y plural en 'compramos', respetando la alternancia morfológica del hebreo.
