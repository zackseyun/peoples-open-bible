translation:
  language: es
  text: 'Entonces Noemí dijo a Rut, su nuera[a]: «Es bueno, hija mía, que salgas con sus muchachas, para que no te salgan al encuentro en otro campo».


    [a] O «para que no te hagan daño/molesten en otro campo». El verbo hebreo puede indicar un simple encuentro o uno hostil; el contexto de la preocupación de Noemí favorece un matiz negativo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para que no te hagan daño/molesten en otro campo». El verbo hebreo puede indicar un simple encuentro o uno hostil; el contexto de la preocupación de Noemí favorece un matiz negativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: WLC/relato narrativo
  rationale: El waw consecutivo marca avance narrativo; «Entonces» conserva la secuencia en español con naturalidad y sin perder el encadenamiento de la escena.
- source_word: כַּלָּתָהּ
  english_pob_choice: her daughter-in-law
  chosen_spanish: su nuera
  alternatives_spanish:
  - su yerno
  - su hija política
  lexicon: HALOT
  rationale: El hebreo identifica de forma explícita la relación de parentesco entre Noemí y Rut; «nuera» es la equivalencia directa y clara en español.
- source_word: טוֹב
  english_pob_choice: It is good
  chosen_spanish: Es bueno
  alternatives_spanish:
  - Es conveniente
  - Es mejor
  lexicon: HALOT
  rationale: Se mantiene la evaluación simple y predicativa del hebreo, sin intensificarla a un superlativo ni convertirla en consejo más fuerte de lo que el texto dice.
- source_word: בִּתִּי
  english_pob_choice: my daughter
  chosen_spanish: hija mía
  alternatives_spanish:
  - mi hija
  - hija
  lexicon: HALOT
  rationale: La fórmula expresa afecto y cercanía relacional. En español, «hija mía» suena natural y conserva el matiz de ternura social del hebreo.
- source_word: תֵצְאִי
  english_pob_choice: you go out
  chosen_spanish: salgas
  alternatives_spanish:
  - vayas
  - salgas a recoger
  lexicon: HALOT
  rationale: 'El verbo básico es «salir»; no se añade «a recoger» porque el hebreo aquí no lo expresa de manera directa. El subjuntivo en la subordinada final se ajusta a la sintaxis española: «que salgas».'
- source_word: נַעֲרוֹתָי/ו
  english_pob_choice: his young women
  chosen_spanish: sus jóvenes
  alternatives_spanish:
  - sus muchachas
  - sus muchachas sirvientas
  - sus trabajadoras jóvenes
  lexicon: HALOT
  rationale: El hebreo designa al grupo femenino asociado con Boaz sin precisar más su estatus en este versículo. «Jóvenes» evita añadir una relación laboral más específica que la forma hebrea no exige.
- source_word: יִפְגְּעוּ בָךְ
  english_pob_choice: so that they do not come upon you
  chosen_spanish: para que no te encuentren
  alternatives_spanish:
  - para que no den contigo
  - para que no se crucen contigo
  - para que no te hagan daño
  lexicon: HALOT
  rationale: פגע puede abarcar desde «encontrar/encounter» hasta un encuentro hostil. «No te encuentren» conserva la ambigüedad del hebreo sin forzar un sentido de agresión que el texto no verbaliza explícitamente.
- source_word: בְּשָׂדֶה אַחֵר
  english_pob_choice: in another field
  chosen_spanish: en otro campo
  alternatives_spanish:
  - en otro terreno
  - en otro sembrado
  lexicon: HALOT
  rationale: «Campo» es un equivalente bíblico claro, pero «campo» en español moderno puede sonar más general; «campo» se mantiene por su precisión y por el uso consolidado en traducciones bíblicas, sin cargar el texto con tecnicismos.
theological_decisions:
- issue: 'El sentido de יִפְגְּעוּ: encuentro neutral o encuentro dañino'
  english_pob_reading: The Hebrew verb can denote a meeting that is merely meeting or one that is harmful; the context of Naomi's concern for Ruth's safety suggests a negative sense.
  chosen_spanish_reading: 'El verbo queda en una forma ambigua de encuentro: «no te encuentren».'
  alternative_spanish_readings:
  - para que no te hagan daño
  - para que no te asalten
  - para que no te molesten
  rationale: El contexto sugiere preocupación por la seguridad de Rut, pero el hebreo no obliga a especificar violencia. La redacción española preserva esa tensión, dejando abierta la posibilidad de un encuentro hostil sin añadirlo como si fuera explícito.
  doctrine_reference: Principio de cautela exegética; no ampliar el alcance semántico más allá del texto base.
translation_notes:
  revision_awareness: Se siguió el flujo narrativo del hebreo con «Entonces», se conservó la relación explícita «su nuera», y se mantuvo la ambigüedad de יִפְגְּעוּ sin traducirla de forma demasiado fuerte. No se necesitó introducir nombres propios adicionales ni glosas interpretativas.
  spanish_consistency_notes:
  - Se usa «Noemí» y «Rut» de forma consistente con la tradición bíblica española y con la forma inglesa auditada.
  - «Campo» se mantuvo para בְּשָׂדֶה por ser el equivalente bíblico directo y legible en español.
  - La nota al pie se ancla en «nuera» para conservar el detalle relacional sin recargar el cuerpo del texto.
