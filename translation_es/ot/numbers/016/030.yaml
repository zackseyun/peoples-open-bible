base_translation:
  language: en
  yaml_path: translation/ot/numbers/016/030.yaml
  text: But if Yahweh creates something new[a], and the ground opens its mouth and swallows them and all that belongs to them, and they go down alive to Sheol[b], then you will know that these men have despised Yahweh.
  footnotes:
  - marker: a
    text: Or 'creates a new thing' or 'creates a creation.' The Hebrew uses a cognate noun and verb for emphasis on an extraordinary act of God.
    reason: lexical_alternative
  - marker: b
    text: Sheol is the Hebrew term for the realm of the dead; alternatively, 'the grave' in a more concrete sense.
    reason: lexical_alternative
