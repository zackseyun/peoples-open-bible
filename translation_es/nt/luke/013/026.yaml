translation:
  language: es
  text: 'Entonces comenzarán a decir[a]: «Comimos y bebimos en tu presencia, y enseñaste en nuestras calles».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en nuestras plazas públicas»; el griego puede referirse a calles anchas o a lugares públicos abiertos dentro de una ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: τότε
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En aquel momento
  lexicon: BDAG
  rationale: Marca secuencia temporal en el discurso. «Entonces» es la equivalencia natural y concisa en español para mantener el avance narrativo.
- source_word: ἄρξεσθε λέγειν
  english_pob_choice: you will begin to say
  chosen_spanish: comenzarán a decir
  alternatives_spanish:
  - empezarán a decir
  - dirán
  lexicon: BDAG
  rationale: El futuro de ἄρχω con infinitivo expresa inicio de la acción. «Comenzarán a decir» conserva el matiz ingresivo mejor que un simple «dirán».
- source_word: Ἐφάγομεν
  english_pob_choice: We ate
  chosen_spanish: Comimos
  alternatives_spanish:
  - Hemos comido
  lexicon: BDAG
  rationale: El aoristo en discurso directo se vierte naturalmente con pretérito simple en español.
- source_word: ἐνώπιόν σου
  english_pob_choice: in your presence
  chosen_spanish: en tu presencia
  alternatives_spanish:
  - delante de ti
  - frente a ti
  lexicon: BDAG
  rationale: La expresión idiomática señala cercanía y asociación personal, no solo ubicación espacial. «En tu presencia» reproduce bien ese valor.
- source_word: ἐπίομεν
  english_pob_choice: drank
  chosen_spanish: bebimos
  alternatives_spanish:
  - hemos bebido
  lexicon: BDAG
  rationale: Se mantiene el paralelismo con «Comimos» y el valor de aoristo como acción pasada simple.
- source_word: ἐν ταῖς πλατείαις ἡμῶν
  english_pob_choice: in our streets
  chosen_spanish: en nuestras calles
  alternatives_spanish:
  - en nuestras plazas públicas
  - en nuestras plazas
  lexicon: BDAG
  rationale: πλατεῖαι puede referirse a calles anchas o vías públicas dentro de una ciudad. «Calles» es la opción más natural y amplia en español; «plazas» restringiría demasiado el sentido.
- source_word: ἐδίδαξας
  english_pob_choice: you taught
  chosen_spanish: enseñaste
  alternatives_spanish:
  - estabas enseñando
  lexicon: BDAG
  rationale: El aoristo se expresa con pretérito simple. El texto subraya el hecho histórico de la enseñanza pública de Jesús.
theological_decisions:
- issue: La apelación de los hablantes a su cercanía con Jesús
  english_pob_reading: The translation preserves their claim of outward association with Jesus without implying true saving relationship.
  chosen_spanish_reading: La traducción preserva la apelación externa de los hablantes a su cercanía con Jesús sin validar una relación salvadora.
  alternative_spanish_readings:
  - La traducción podría sonar como si Jesús reconociera una relación salvadora
  - Una formulación más libre podría suavizar la tensión
  rationale: La frase mantiene el reclamo externo de cercanía («en tu presencia», «en nuestras calles») sin convertirlo en validación espiritual. Así se preserva la tensión teológica del pasaje.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con la última pasada del inglés: no se necesitó revisión adicional. La redacción española sigue el mismo análisis aspectual y mantiene la alternativa léxica para πλατεῖαι mediante nota.'
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé» según corresponda en este proyecto; aquí no aparece.
  - Se mantiene el trato directo con segunda persona singular («tu», «te») porque el original usa singular.
  - 'Se conserva el paralelismo verbal simple pasado: «Comimos» / «bebimos» / «enseñaste» para reflejar los aoristos griegos.'
  - La nota [a] se ancla solo en «calles», donde surge la ambigüedad léxica de πλατεῖαι.
