translation:
  language: es
  text: y la matanza de nuestros hermanos, y el cautiverio de la tierra, y la desolación de nuestra herencia, volverá[a] sobre nuestras cabezas entre las naciones donde serviremos como esclavos allí[b]; y seremos piedra de tropiezo y oprobio delante de quienes nos poseen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «caerá sobre nuestras cabezas». El verbo griego es singular, pero la cláusula no expresa de manera explícita el sujeto.
    reason: alternative_reading
  - marker: b
    text: O, «donde serviremos». En este contexto de cautiverio, el verbo puede significar simplemente «servir», pero probablemente implica servicio forzado o esclavitud.
    reason: lexical_alternative
lexical_decisions:
- source_word: φόνον
  english_pob_choice: slaughter
  chosen_spanish: matanza
  alternatives_spanish:
  - matanza sangrienta
  - muerte
  - asesinato
  lexicon: LSJ
  rationale: φόνος puede significar muerte violenta o derramamiento de sangre. «Matanza» conserva la violencia del término y encaja bien en el contexto bélico sin restringirlo a una acusación jurídica de «asesinato».
- source_word: ἀδελφῶν
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - parientes
  - compatriotas
  lexicon: LSJ
  rationale: El griego está en masculino plural. «Hermanos» preserva la forma del original y la referencia comunitaria amplia que probablemente apunta al pueblo.
- source_word: αἰχμαλωσίαν
  english_pob_choice: captivity
  chosen_spanish: cautiverio
  alternatives_spanish:
  - captividad
  - exilio
  - esclavitud
  lexicon: LSJ
  rationale: El término describe el estado de haber sido hechos cautivos. «Cautiverio» es natural en español y mantiene el sentido de captura sin reducirlo solo a deportación o esclavitud formal.
- source_word: γῆς
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra del país
  lexicon: LSJ
  rationale: En este contexto nacional, γῆ se refiere al territorio del pueblo. «La tierra» es la equivalencia más directa y suficientemente clara en español.
- source_word: ἐρήμωσιν
  english_pob_choice: desolation
  chosen_spanish: desolación
  alternatives_spanish:
  - devastación
  - ruina
  lexicon: LSJ
  rationale: «Desolación» conserva la idea de quedar arrasado o desierto y mantiene el registro solemne del pasaje.
- source_word: κληρονομίας
  english_pob_choice: inheritance
  chosen_spanish: herencia
  alternatives_spanish:
  - patrimonio
  - posesión
  - heredad
  lexicon: LSJ
  rationale: El griego tiene resonancias pactales y territoriales. «Herencia» comunica esa idea en un español claro y bíblicamente reconocible.
- source_word: ἐπιστρέψει εἰς κεφαλὴν ἡμῶν
  english_pob_choice: will return upon our own heads
  chosen_spanish: volverá sobre nuestras cabezas
  alternatives_spanish:
  - recaerá sobre nuestras cabezas
  - volverá sobre su propia cabeza
  - caerá sobre nosotros
  lexicon: LSJ
  rationale: La expresión reproduce el idioma de retribución que «vuelve» sobre uno. En español, «volverá sobre nuestras cabezas» conserva la imagen sin añadir un sujeto explícito que el griego no da.
- source_word: ἐν τοῖς ἔθνεσιν
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - entre los gentiles
  lexicon: LSJ
  rationale: «Entre las naciones» sigue de cerca el griego y evita cargar el texto con una interpretación adicional como «gentiles».
- source_word: δουλεύσωμεν
  english_pob_choice: serve as slaves
  chosen_spanish: serviremos como esclavos
  alternatives_spanish:
  - serviremos
  - seremos esclavos
  - serviremos en servidumbre
  lexicon: LSJ
  rationale: El verbo puede significar simplemente servir, pero en este contexto de cautiverio la fuerza servil es relevante. «Serviremos como esclavos» hace visible esa coerción sin perder la forma verbal futura.
- source_word: πρόσκομμα
  english_pob_choice: stumbling block
  chosen_spanish: piedra de tropiezo
  alternatives_spanish:
  - tropiezo
  - obstáculo
  - escándalo
  lexicon: LSJ
  rationale: «Piedra de tropiezo» transmite la metáfora con naturalidad en español bíblico y conserva la idea de algo contra lo cual se tropieza.
- source_word: ὄνειδος
  english_pob_choice: reproach
  chosen_spanish: oprobio
  alternatives_spanish:
  - reproche
  - vergüenza
  - deshonra
  lexicon: LSJ
  rationale: «Oprobio» refleja bien la carga de deshonra pública y vergüenza ante otros.
- source_word: κτωμένων ἡμᾶς
  english_pob_choice: those who possess us
  chosen_spanish: quienes nos poseen
  alternatives_spanish:
  - nuestros dueños
  - quienes nos han adquirido
  - los que nos poseen
  lexicon: LSJ
  rationale: El participio de κτάομαι indica adquirir o poseer. «Quienes nos poseen» sigue de cerca el griego y mantiene la imagen de dominio sin introducir «dueños» como interpretación más fuerte.
theological_decisions:
- issue: Sujeto implícito de ἐπιστρέψει
  english_pob_reading: Renderized without identifying the subject by name; the English revision finally preferred an impersonal 'will return'.
  chosen_spanish_reading: 'Se traduce impersonalmente: «volverá sobre nuestras cabezas», sin nombrar sujeto.'
  alternative_spanish_readings:
  - «él volverá sobre nuestras cabezas»
  - «Dios volverá sobre nuestras cabezas»
  rationale: El griego presenta un verbo singular sin sujeto explícito. En español, la forma impersonal conserva la tensión textual y evita introducir una identificación no expresada en la cláusula.
  doctrine_reference: Preservar la ambigüedad del sujeto cuando el texto no lo explicita.
- issue: Fuerza de δουλεύσωμεν en contexto de cautiverio
  english_pob_reading: '''serve as slaves'' with an explicit lexical note that the forced-service sense is likely in this context.'
  chosen_spanish_reading: «serviremos como esclavos»
  alternative_spanish_readings:
  - «serviremos»
  - «seremos esclavos»
  - «serviremos en servidumbre»
  rationale: La elección mantiene el matiz de servicio forzado que el contexto de cautiverio exige, sin borrar la posibilidad semántica más amplia del verbo.
  doctrine_reference: Conservar el peso léxico cuando el contexto lo restringe con claridad.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: se evitó identificar un sujeto explícito para ἐπιστρέψει y se prefirió una forma futura que refleje mejor la construcción griega. La versión española conserva esa misma cautela, manteniendo la imagen de retribución sin resolver la ambigüedad del sujeto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino explícito.
  - Se mantiene «esclavos» para δουλεύω en este contexto porque el pasaje describe cautiverio y dominio extranjero.
  - «Oprobio» se eligió para ὄνειδος por su tono bíblico-formal y su relación con vergüenza pública.
  - La expresión «piedra de tropiezo» conserva la metáfora de πρόσκομμα sin explicarla de más.
