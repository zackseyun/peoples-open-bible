translation:
  language: es
  text: Tú que habitas junto a muchas aguas[a], abundante en tesoros, ha llegado tu fin[b], la medida de tu ganancia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sobre muchas aguas».'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «la medida de tu ganancia»; el hebreo también puede sugerir la idea de límite o alcance fijado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שכנתי
  english_pob_choice: You who dwell
  chosen_spanish: Tú que habitas
  alternatives_spanish:
  - Oh habitante
  - Tú que moras
  lexicon: HALOT
  rationale: La forma participial femenina singular funciona como apelación directa a una figura personificada de ciudad/reino. «Tú que habitas» conserva el valor vocativo y la continuidad de la acción mejor que un sustantivo aislado.
- source_word: עַל מַיִם רַבִּים
  english_pob_choice: by many waters
  chosen_spanish: junto a muchas aguas
  alternatives_spanish:
  - sobre muchas aguas
  - en muchas aguas
  lexicon: HALOT
  rationale: עַל admite varios matices espaciales. En español, «junto a» expresa de manera natural la ubicación de una ciudad asociada con muchas aguas, sin perder la imagen geográfica.
- source_word: רַבַּת אֹצָרוֹת
  english_pob_choice: abundant in treasures
  chosen_spanish: abundante en tesoros
  alternatives_spanish:
  - rica en tesoros
  - grande en tesoros
  lexicon: HALOT
  rationale: La construcción transmite abundancia. «Abundante en tesoros» sigue de cerca el valor del adjetivo sin añadir una connotación más interpretativa como «rica».
- source_word: בָּא קִצֵּךְ
  english_pob_choice: your end has come
  chosen_spanish: ha llegado tu fin
  alternatives_spanish:
  - tu fin ha venido
  - tu fin ha llegado
  lexicon: HALOT
  rationale: El perfecto verbal expresa la llegada segura del juicio. «Ha llegado tu fin» es idiomático en español y mantiene la fuerza de conclusión inminente.
- source_word: אַמַּת
  english_pob_choice: the measure of
  chosen_spanish: la medida de
  alternatives_spanish:
  - el codo de
  - la extensión de
  lexicon: HALOT
  rationale: Aunque literalmente puede ser «codo», en este contexto la POB inglesa ya documenta el sentido de medida/limitación. «La medida de» preserva ese valor sin forzar una literalidad poco clara en español.
- source_word: בִּצְעֵךְ
  english_pob_choice: your gain
  chosen_spanish: tu ganancia
  alternatives_spanish:
  - tu ganancia injusta
  - tu provecho
  lexicon: HALOT
  rationale: El término puede abarcar ganancia obtenida por lucro o por medios reprobables. Dado el ajuste auditado del inglés hacia un sentido más neutro, «ganancia» mantiene la ambigüedad moral sin perder el matiz de beneficio acumulado.
theological_decisions:
- issue: Dirección personificada a Babilonia
  english_pob_reading: The verse addresses Babylon directly as a feminine singular city figure.
  chosen_spanish_reading: El versículo se dirige directamente a Babilonia como figura femenina singular de ciudad/reino.
  alternative_spanish_readings:
  - Una habitante femenina genérica
  - la población en conjunto
  rationale: Las formas femeninas singulares del hebreo encajan con la convención profética de personificar la ciudad. En español conviene conservar esa apelación directa para no borrar la figura retórica del texto.
  doctrine_reference: Jeremías 51:13; personificación profética de ciudades en los profetas
translation_notes:
  revision_awareness: 'He seguido la última revisión del inglés POB: se mantiene «abundant in treasures» y se evita una traducción moralizante de בִּצְעֵךְ como «ganancia injusta», preservando el sentido más neutral que el auditor final prefirió. También se conserva la alternativa literal de ubicación espacial para עַל mediante nota.'
  spanish_consistency_notes:
  - «Yahvé» no aparece en este versículo.
  - Se mantiene «tesoros» para אֹצָרוֹת, en coherencia con el valor concreto del sustantivo plural.
  - «Ganancia» conserva la amplitud semántica que el inglés final dejó abierta entre beneficio y lucro.
  - La puntuación reproduce el encadenamiento profético breve del hebreo con una pausa fuerte antes de la cláusula final.
