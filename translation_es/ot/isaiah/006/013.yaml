base_translation:
  language: en
  yaml_path: translation/ot/isaiah/006/013.yaml
  text: And though a tenth remains in it[a], it will again be for burning, like a terebinth or like an oak whose stump remains when it is felled. The holy seed is its stump.
  footnotes:
