base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/003/012.yaml
  text: Then Abner sent messengers to David on his behalf[a], saying, “To whom does the land belong?” saying, “Make your covenant with me, and behold[b], my hand is with you to bring all Israel over to you.”
  footnotes:
