lexical_decisions:
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: —
  rationale: La conjunción repetida conserva la estructura enumerativa hebrea y el ritmo del listado territorial. Se usa 'y' porque el siguiente topónimo no exige la forma 'e' por eufonía fuerte.
- source_word: שַׁעֲלַבִּין
  english_pob_choice: Shaalabbin
  chosen_spanish: Shaalabín
  alternatives_spanish:
  - Shaalabbin
  - Shaalabim
  - Shaalabín
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre propio como topónimo. 'Shaalabín' adapta de modo legible la forma hebrea al español, preservando la identificación con la variante inglesa documentada sin imponer una forma eclesiástica fija.
- source_word: אַיָּלוֹן
  english_pob_choice: Aijalon
  chosen_spanish: Ayalón
  alternatives_spanish:
  - Aijalón
  - Ayalón
  lexicon: HALOT
  rationale: El nombre propio se translitera, pero en español 'Ayalón' refleja mejor la pronunciación probable y evita una grafía inglesa innecesaria. Se conserva el valor toponímico sin traducirlo.
- source_word: יִתְלָה
  english_pob_choice: Ithlah
  chosen_spanish: Itla
  alternatives_spanish:
  - Ithla
  - Itla
  - Jetla
  lexicon: HALOT
  rationale: Topónimo transliterado directamente desde el hebreo. 'Itla' es una forma española breve y natural que conserva la consonancia del nombre; 'Jetla' reproduce la variante inglesa tradicional, pero no es necesaria en el texto principal.
