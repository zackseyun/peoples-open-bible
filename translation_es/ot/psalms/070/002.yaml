    issue: El vocativo inicial en español queda submarcado
    rationale: אֱלֹהִים aquí funciona como invocación directa. Aunque «Dios, líbrame» es posible, «¡Oh, Dios!» o equivalente refleja mejor el tono suplicante del hebreo y del POB inglés («O God»).
  - severity: medium
