id: ISA.48.21
reference: Isaiah 48:21
source:
  edition: WLC
  text: וְ/לֹ֣א צָמְא֗וּ בָּ/חֳרָבוֹת֙ הֽוֹלִיכָ֔/ם מַ֥יִם מִ/צּ֖וּר הִזִּ֣יל לָ֑/מוֹ וַ/יִּ֨בְקַע צ֔וּר וַ/יָּזֻ֖בוּ מָֽיִם־׃
translation:
  text: They did not thirst when he led them through the deserts[a]; he made water flow for them from the rock; he split the rock[b], and water gushed out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “in the deserts” or “through the dry places.”
    reason: lexical_alternative
  - marker: b
    text: The verse echoes the LORD’s provision of water from the rock in the wilderness (for example, Exod 17:6; Num 20:11).
    reason: cross_reference
lexical_decisions:
- source_word: צָמְאוּ
  chosen: did not thirst
  alternatives:
  - were not thirsty
  lexicon: HALOT
  rationale: The verb denotes experiencing thirst. 'Did not thirst' is a natural English rendering that preserves the verbal force better than the adjectival 'were not thirsty.'
- source_word: בָּחֳרָבוֹת
  chosen: through the wastelands
  alternatives:
  - in the deserts
  - through the dry places
  lexicon: HALOT
  rationale: The plural noun refers to desolate, dry regions. 'Wastelands' captures the barren setting without overcommitting to a specific topography, while 'through' fits the sense with the following verb of leading.
- source_word: הוֹלִיכָם
  chosen: he led them
  alternatives:
  - he caused them to go
  - he guided them
  lexicon: HALOT
  rationale: The Hiphil of הלך here means to lead or cause to go. 'He led them' is idiomatic and preserves the causative sense without awkwardness.
- source_word: הִזִּיל
  chosen: he made water flow
  alternatives:
  - he caused water to run
  - he poured out water
  lexicon: HALOT
  rationale: 'The Hiphil of נזל is causative: he caused water to flow. ''Made water flow'' keeps the causative nuance explicit and reads naturally in English.'
- source_word: מִצּוּר
  chosen: from the rock
  alternatives:
  - from a rock
  lexicon: HALOT
  rationale: The singular noun with prefixed preposition points to the rock as the source. 'The rock' fits the Hebrew form and the allusive reference to the wilderness provision narrative.
- source_word: וַיִּבְקַע צוּר
  chosen: he split the rock
  alternatives:
  - he cleft the rock
  - he broke open the rock
  lexicon: HALOT
  rationale: בקע commonly means split or cleave. 'Split the rock' is clear modern English and preserves the concrete imagery.
- source_word: וַיָּזֻבוּ מָיִם
  chosen: water gushed out
  alternatives:
  - waters flowed out
  - water streamed out
  lexicon: HALOT
  rationale: The verb conveys flowing or gushing. 'Water gushed out' gives vivid, idiomatic English while matching the sudden abundance implied by the context.
