theological_decisions:
- issue: Rendering of הָבֶל in Ecclesiastes
  chosen_reading: vapor
  alternative_readings:
  - vanity
  - breath
  - meaningless
  rationale: Ecclesiastes uses הָבֶל as a thematic metaphor for what is fleeting, elusive, and insubstantial. 'Vapor' preserves the metaphorical tension without collapsing it into a single interpretive claim such as 'meaningless.' This is a lexical-theological choice because the book's message is often distorted by overly interpretive renderings.
  doctrine_reference: Translation philosophy §§1, 3, 5
