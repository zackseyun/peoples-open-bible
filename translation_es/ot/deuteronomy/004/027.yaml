translation:
  language: es
  text: Y Yahvé los dispersará entre los pueblos, y serán pocos en número entre las naciones adonde Yahvé los expulsará[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los llevará allí'. El verbo hebreo puede significar 'llevar' o 'expulsar'; aquí se eligió 'expulsar' porque el contexto es de juicio y exilio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵפִיץ
  english_pob_choice: will scatter
  chosen_spanish: dispersará
  alternatives_spanish:
  - esparcirá
  - esparcirá y dispersará
  lexicon: HALOT
  rationale: El hifil de פוץ expresa dispersión causada. En español, "dispersará" comunica bien esa acción sin sonar mecánico y conserva el tono de juicio y exilio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue el principio del POB de preservar el nombre divino, no sustituirlo por un título. En español, "Yahvé" es la forma establecida en el proyecto para el Tetragrámaton.
- source_word: בָּעַמִּים
  english_pob_choice: among the peoples
  chosen_spanish: entre los pueblos
  alternatives_spanish:
  - entre las gentes
  - entre las naciones
  lexicon: HALOT
  rationale: '"Pueblos" mantiene la distinción frente a גּוֹיִם, que aparece después y se vierte como "naciones". "Entre" expresa mejor la dispersión dentro de esos grupos.'
- source_word: וְנִשְׁאַרְתֶּם
  english_pob_choice: you will be left
  chosen_spanish: quedarán
  alternatives_spanish:
  - serán dejados
  - permanecerán
  lexicon: HALOT
  rationale: 'El nifal tiene sentido resultativo pasivo: después del juicio, sólo quedará un remanente. "Quedarán" suena natural en español y conserva ese resultado.'
- source_word: מְתֵי מִסְפָּר
  english_pob_choice: few in number
  chosen_spanish: en pequeño número
  alternatives_spanish:
  - pocos en número
  - muy pocos
  lexicon: HALOT
  rationale: El modismo expresa escasez extrema y contabilidad reducida. "En pequeño número" conserva la idea sin forzar una literalidad poco idiomática.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los gentiles
  - entre los pueblos
  lexicon: HALOT
  rationale: En este contexto deuteronómico, גּוֹיִם designa naciones extranjeras. "Naciones" distingue este término del anterior "pueblos".
- source_word: אֲשֶׁר יְנַהֵג
  english_pob_choice: where ... will drive
  chosen_spanish: adonde ... los llevará
  alternatives_spanish:
  - adonde ... los conducirá
  - adonde ... los guiará
  lexicon: HALOT
  rationale: Aunque נהג puede significar "llevar/guiar", en contexto de juicio el inglés POB optó por "drive" por la fuerza del exilio. En español, "los llevará" preserva la direccionalidad sin introducir una imagen demasiado dura o artificial; el matiz de traslado forzado queda claro por el contexto inmediato.
- source_word: שָׁמָּה
  english_pob_choice: there
  chosen_spanish: adonde
  alternatives_spanish:
  - allí
  - hasta allí
  lexicon: HALOT
  rationale: El adverbio locativo queda absorbido en la construcción relativa española "adonde..."; así se evita redundancia y se mantiene la referencia al lugar del destierro.
theological_decisions:
- issue: Nombre divino en español para יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio del pacto en lugar de una sustitución litúrgica. La elección "Yahvé" sigue la convención del proyecto para el Tetragrámaton y evita ocultar el nombre revelado en el texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Matiz de juicio en יְנַהֵג
  english_pob_reading: drive
  chosen_spanish_reading: llevará
  alternative_spanish_readings:
  - conducirá
  - guiará
  rationale: El inglés POB documenta la tensión semántica entre 'lead' y 'drive' y elige 'drive' por el contexto de exilio. En español, "llevará" mantiene la acción de traslado sin perder la ambigüedad registrada; el contexto de dispersión y juicio conserva el matiz coercitivo.
  doctrine_reference: Uso contextual del verbo de movimiento en pasajes de juicio y exilio; no requiere decisión doctrinal, sino lexical-teológica del pasaje.
translation_notes:
  revision_awareness: El pasaje fue revisado recientemente sin cambios sustantivos; el consenso de alta coincidencia confirma la lectura principal. La versión española mantiene la distinción lexical entre עַמִּים y גּוֹיִם, y conserva el nombre divino según la política del POB.
  spanish_consistency_notes:
  - Se usa "Yahvé" para יְהוָה, conforme al estándar del proyecto.
  - Se distingue "pueblos" de "naciones" para reflejar עַמִּים / גּוֹיִם.
  - '"Quedarán en pequeño número" traduce el modismo sin caer en calco rígido.'
  - El verbo "llevará" conserva el movimiento impuesto por Yahvé sin perder legibilidad en español.
