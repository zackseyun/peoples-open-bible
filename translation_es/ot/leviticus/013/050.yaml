translation:
  language: es
  text: Y el sacerdote examinará[a] la lesión[b], y la aislará[c] durante siete días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘inspeccionará’. El verbo hebreo implica aquí una revisión oficial del caso, no solo una mirada casual.
    reason: lexical_alternative
  - marker: b
    text: O ‘la mancha’, ‘la infección’ o, de manera más tradicional, ‘la plaga’. El hebreo señala el área afectada bajo examen sacerdotal, no necesariamente una categoría médica moderna.
    reason: lexical_alternative
  - marker: c
    text: O ‘la pondrá en aislamiento’ o, más literalmente, ‘la encerrará’. El sentido es un confinamiento temporal para observación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/רָאָה
  english_pob_choice: shall examine
  chosen_spanish: examinará
  alternatives_spanish:
  - verá
  - inspeccionará
  - mirará
  lexicon: HALOT
  rationale: En el contexto sacerdotal de Levítico 13, el verbo de ‘ver’ funciona como una inspección oficial; ‘examinará’ comunica ese valor procedimental de modo natural en español.
- source_word: הַ/כֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  - el presbítero
  lexicon: HALOT
  rationale: ‘כֹּהֵן’ se traduce de forma estándar como ‘sacerdote’; conserva el oficio levítico sin añadir matices eclesiales ajenos al contexto.
- source_word: הַ/נָּגַע / הַ/נֶּגַע
  english_pob_choice: the diseased area
  chosen_spanish: la lesión
  alternatives_spanish:
  - la infección
  - la mancha
  - la plaga
  - la afección
  lexicon: HALOT
  rationale: El término hebreo señala el área afectada bajo examen sacerdotal. ‘Lesión’ evita ‘plaga’ por su carga tradicional y también evita restringirlo a una categoría médica moderna que el texto no exige.
- source_word: וְ/הִסְגִּיר
  english_pob_choice: shall isolate
  chosen_spanish: la aislará
  alternatives_spanish:
  - la pondrá en aislamiento
  - la encerrará
  - la recluirá
  lexicon: HALOT
  rationale: La forma hiphil expresa la acción de confinar o apartar para observación. ‘Aislarla’ transmite bien la idea temporal de apartamiento diagnósticos sin el arcaísmo de ‘encerrar’ como formulación principal.
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: for seven days
  chosen_spanish: por siete días
  alternatives_spanish:
  - durante siete días
  - siete días
  lexicon: HALOT
  rationale: ‘Por siete días’ expresa la duración establecida por el hebreo de manera idiomática y clara en español.
theological_decisions:
- issue: Naturaleza del término נגע en Levítico 13
  english_pob_reading: the diseased area; not necessarily a modern disease category
  chosen_spanish_reading: la lesión; un área afectada bajo examen sacerdotal
  alternative_spanish_readings:
  - la plaga
  - la infección
  - la afección
  rationale: 'Se preserva la tensión semántica: el hebreo describe un estado o marca afectada, no necesariamente una enfermedad moderna. ‘Lesión’ mantiene amplitud y evita una medicalización excesiva.'
  doctrine_reference: Levítico 13; distinción ritual entre impureza y diagnóstico médico moderno
- issue: Valor del verbo הִסְגִּיר en contexto ritual
  english_pob_reading: isolate / shut up for observation
  chosen_spanish_reading: aislará
  alternative_spanish_readings:
  - confinará
  - pondrá en aislamiento
  - encerrará
  rationale: El verbo expresa apartamiento temporal para observación ritual; ‘aislará’ conserva la función sin introducir connotaciones penales o carcelarias demasiado fuertes.
  doctrine_reference: Levítico 13:4-8, 13:50; procedimiento de observación ritual
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de ‘quarantine’ a ‘isolate’ para reflejar con mayor formalidad el valor de ‘shut up/confine’. La redacción española sigue esa revisión con ‘aislará’, evitando un término más administrativo o técnico que desplace el matiz ritual del hebreo.
  spanish_consistency_notes:
  - Se mantiene una sola base léxica para נגע dentro del versículo, aquí resuelta como ‘lesión’, y se deja constancia de alternativas válidas en nota.
  - ‘Sacerdote’ se conserva como traducción estable de כֹּהֵן en contexto levítico.
  - La puntuación y el orden de cláusulas siguen el hebreo y el inglés auditado sin forzar calcos innecesarios.
