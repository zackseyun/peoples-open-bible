lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - volvió de regreso
  lexicon: HALOT
  rationale: El wayyiqtol de שוב expresa una acción pasada concluida. En español, «volvió» comunica de forma natural el movimiento de retorno sin sobrecargar el verso.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - ese día
  - ese mismo día
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente «en aquel día». «Aquel día» conserva bien el valor temporal y suena natural en español bíblico contemporáneo.
- source_word: עֵשָׂו
  english_pob_choice: Esau
  chosen_spanish: Esaú
  alternatives_spanish:
  - Esaú
  lexicon: convención onomástica bíblica
  rationale: Se transcribe el nombre propio según la forma habitual en español bíblico.
- source_word: לְדַרְכּוֹ
  english_pob_choice: on his way
  chosen_spanish: por su camino
  alternatives_spanish:
  - en su camino
  - siguiendo su camino
  lexicon: HALOT
  rationale: Literalmente es «hacia su camino/por su ruta». «Por su camino» mantiene la idea de desplazamiento y resuena de modo natural en español; evita una calca como «a su camino».
- source_word: שֵׂעִירָה
  english_pob_choice: to Seir
  chosen_spanish: a Seir
  alternatives_spanish:
  - hacia Seir
  - para Seir
  lexicon: HALOT
  rationale: La terminación direccional hebrea indica movimiento hacia el lugar. En español, «a Seir» expresa esa dirección de forma directa y sobria.
translation_notes:
  revision_awareness: 'Coincide con el texto hebreo consonántico/vocalizado y con el audit trail inglés: movimiento de retorno, referencia temporal y dirección hacia Seir. No se documentan tensiones textuales o teológicas en este verso.'
  spanish_consistency_notes:
  - Se mantiene el nombre propio «Esaú» de manera consistente con la convención bíblica en español.
  - Se usa «aquel día» como equivalente idiomático de בַּיּוֹם הַהוּא, mientras la nota preserva la literalidad.
  - La preposición direccional «a» en «a Seir» refleja la idea de movimiento hacia el destino, en línea con el valor del hebreo.
