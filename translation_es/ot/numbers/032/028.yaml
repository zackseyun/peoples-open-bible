- from: Así que Moisés mandó a Eleazar el sacerdote[a], a Josué hijo de Nun y a los jefes de las casas paternas de las tribus de Israel[b] acerca de ellos.
  to: Así que Moisés mandó a Eleazar el sacerdote, a Josué hijo de Nun y a los jefes de las casas paternas de las tribus de los hijos de Israel[b] acerca de ellos[a].
  rationale: Se corrigió «de Israel» a «de los hijos de Israel» para preservar mejor el matiz genealógico y tribal del hebreo y del audit trail inglés. Se movió la nota sobre la alternativa de לָהֶם al lugar correcto, junto a «acerca de ellos», y se pulió su redacción. Se mantuvo el resto del texto, que es fiel y natural en español.
