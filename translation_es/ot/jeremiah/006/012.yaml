review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y preserva el nombre divino como «Yahvé». Sin embargo, en dos puntos se aparta de la decisión auditada: (1) וְנָשִׁים, en este contexto de pérdida de casa/campos/familia, fue documentado como probablemente «wives» y conviene reflejarlo como «esposas» en el texto principal, dejando «mujeres» como alternativa; (2) יֹשְׁבֵי הָאָרֶץ fue decidido en el POB inglés como sentido local «inhabitants of the land», por lo que en español debe preferirse «habitantes del país» o equivalente local, no «de la tierra», que sugiere más fácilmente alcance universal.'
  spanish_quality_summary: El español es claro y digno, pero la nota [a] está anclada en «otros» cuando en realidad comenta «mujeres/esposas», lo cual viola la disciplina de anclaje. Además, los guiones largos alrededor de «declara Yahvé» son aceptables pero innecesarios; la coma habitual fluye mejor en español bíblico moderno.
  glossary_alignment: Alineado con el glosario en «Yahvé». No hay otros términos doctrinales controvertidos aquí. La principal desalineación es con la decisión contextual documentada para נָשִׁים («esposas») y para הָאָרֶץ en este versículo («país»/«tierra» en sentido local).
  issues:
  - severity: high
    issue: La nota [a] está colocada sobre «otros», pero su contenido trata de «mujeres/esposas».
    rationale: Las notas deben anclarse exactamente en la palabra o frase pertinente del texto español. Tal como está, el lector entiende erróneamente que la variante afecta «otros».
  - severity: medium
    issue: «sus mujeres» no sigue la decisión contextual más probable documentada para וְנָשִׁים.
    rationale: Aunque «mujeres» es lexicamente posible, el POB inglés documentó que en este contexto de pérdida del hogar y propiedades «wives/esposas» es más probable; el español principal debe reflejar esa decisión y relegar «mujeres» a nota.
  - severity: medium
    issue: «los habitantes de la tierra» debilita la lectura local preferida de הָאָרֶץ.
    rationale: En español, «la tierra» puede sonar global («la tierra/el mundo»). Dado que la decisión auditada prefiere el sentido local por el contexto de juicio sobre Judá, «del país» comunica mejor esa restricción contextual, con nota para la alternativa «tierra».
  revised_spanish_text: Sus casas serán entregadas a otros, junto con sus campos y sus esposas[a]; porque extenderé mi mano contra los habitantes del país[b], declara Yahvé.
  revised_footnotes:
  - marker: a
    text: O «mujeres». El hebreo נָשִׁים puede significar «mujeres» o «esposas»; en este contexto de pérdida de casa y bienes, «esposas» parece más probable.
    reason: lexical_alternative
  - marker: b
    text: O «los habitantes de la tierra». El hebreo הָאָרֶץ puede significar «país» o «tierra»; aquí el sentido local parece más probable por el contexto de juicio sobre Judá.
    reason: alternative_reading
  revision_rationale: La revisión corrige el anclaje de la nota léxica, ajusta וְנָשִׁים a la opción contextual preferida («esposas») con nota de alternativa, y alinea יֹשְׁבֵי הָאָרֶץ con la lectura local documentada («habitantes del país»), manteniendo un español natural y la fórmula profética con «Yahvé».
