  - severity: medium
    issue: Forma del nombre propio 'Hosaías'
    rationale: El hebreo הוֹשַׁעְיָה se representa mejor mediante una transliteración más directa como 'Hosaya'. 'Hosaías' suena a adaptación a otro patrón onomástico español y puede sugerir una equivalencia tradicional no sustentada aquí.
