review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la secuencia del hebreo: salida desde עִיִּים y acampada en דִיבֹן גָּד. «Partieron» para וַיִּסְעוּ, «de» para מֵ, «acamparon» para וַיַּחֲנוּ y «en Dibon-gad» para בְּדִיבֹן גָּד son fieles al sentido del texto fuente y al rastro léxico inglés.'
  spanish_quality_summary: 'El español principal es natural y claro. Sin embargo, la nota [a] no funciona como alternativa léxica, porque repite exactamente «acamparon», mientras que la nota inglesa ofrece la alternativa más formal «encamped». Conviene ajustar la nota al español con una verdadera alternativa: «acamparon» / «acamparon en campamento» sería torpe, pero «acamparon» / «acamparon» no sirve; la opción adecuada es que el texto diga «acamparon» y la nota diga «O «acamparon en campamento»» tampoco mejora. Lo mejor es conservar el texto principal y usar «O «acamparon»» solo si el texto principal fuera «acamparon» no tiene sentido. Por tanto, la reparación correcta es cambiar la nota a «O «acamparon»»? No. Mejor: usar «y asentaron el campamento» como alternativa explicativa, manteniendo el texto principal. Así se preserva la intención del inglés de señalar el matiz de instalar campamento.'
  glossary_alignment: No hay términos teológicos sensibles en este versículo. La transliteración de topónimos es coherente con el proyecto. «Iyim» es aceptable en español, y la nota con «Iyyim» / «Iim» preserva las variantes documentadas.
  issues:
