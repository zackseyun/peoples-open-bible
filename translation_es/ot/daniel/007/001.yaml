revisions:
- from: En el primer año de Belsasar, rey de Babilonia, Daniel vio un sueño y visiones de su cabeza[a], mientras estaba en su cama. Entonces escribió el sueño y dijo el resumen de las palabras.
  to: En el primer año de Belsasar, rey de Babilonia, Daniel vio un sueño y visiones en su cabeza[a], estando en su cama. Entonces escribió el sueño y expuso la suma del asunto[b].
  rationale: Se ajusta «visiones de su cabeza» a «visiones en su cabeza» para lograr un español natural manteniendo una nota con la literalidad aramea. Se rehace la cláusula final como «expuso la suma del asunto», que refleja mejor el valor idiomático de רֵאשׁ מִלִּין אֲמַר y coincide con la intención del POB inglés auditado. También se añade la nota lexical_alternative correspondiente, ya presente en el inglés.
