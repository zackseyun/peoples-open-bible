translation:
  language: es
  text: '¿Acaso yo concebí a todo este pueblo? ¿Acaso yo lo di a luz, para que me digas: «Llévalo en tu seno, como un cuidador[a] lleva al niño que mama, a la tierra que juraste a sus padres»?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una nodriza»; el hebreo también puede referirse a un cuidador o guardián que lleva al niño.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶאָנֹכִי
  english_pob_choice: Did I
  chosen_spanish: ¿Acaso yo…?
  alternatives_spanish:
  - ¿Fui yo quien…?
  - ¿Yo acaso…?
  lexicon: HALOT
  rationale: La partícula interrogativa con אָנֹכִי introduce una pregunta retórica enfática. En español, «¿Acaso yo…?» comunica bien la negación implícita sin forzar una construcción demasiado literal.
- source_word: הָרִיתִי
  english_pob_choice: conceive
  chosen_spanish: concebí
  alternatives_spanish:
  - quedé encinta de
  - engendré
  lexicon: HALOT
  rationale: El verbo hebreo expresa la acción de concebir dentro de la metáfora maternal. «Concebí» es natural en español y conserva el sentido biológico sin introducir más explicación de la necesaria.
- source_word: כָּל הָעָם הַזֶּה
  english_pob_choice: all this people
  chosen_spanish: todo este pueblo
  alternatives_spanish:
  - todo este gente
  - toda esta nación
  lexicon: HALOT
  rationale: עָם es un singular colectivo; «pueblo» en español permite mantener ese valor colectivo con naturalidad. «Todo este pueblo» sigue de cerca la fuerza del hebreo.
- source_word: יְלִדְתִּיהוּ
  english_pob_choice: Did I give birth to them
  chosen_spanish: lo di a luz
  alternatives_spanish:
  - lo parí
  - lo alumbré
  lexicon: HALOT
  rationale: El verbo ילד en primera persona continúa la imagen del parto. Se usa el objeto singular «lo» porque el hebreo trata al pueblo como colectivo singular; así se conserva la tensión documental del original y el enlace con el sujeto colectivo.
- source_word: כִּי תֹאמַר אֵלַי
  english_pob_choice: that you should say to me
  chosen_spanish: para que me digas
  alternatives_spanish:
  - que me digas
  - cuando me digas
  lexicon: HALOT
  rationale: כִּי aquí introduce la consecuencia del reproche implícito. «Para que me digas» transmite la relación causal/consecutiva del hebreo dentro de una pregunta retórica en español.
- source_word: שָׂאֵהוּ
  english_pob_choice: Carry them
  chosen_spanish: Llévalo
  alternatives_spanish:
  - cárgalo
  - llévalo contigo
  lexicon: HALOT
  rationale: נשא puede significar llevar/cargar. «Llévalo» funciona de manera natural en español dentro de la imagen de cuidado del niño, sin perder la idea de sostener/cargar.
- source_word: בְחֵיקֶךָ
  english_pob_choice: in your bosom
  chosen_spanish: en tu seno
  alternatives_spanish:
  - en tu regazo
  - en tu pecho
  lexicon: HALOT
  rationale: חֵיק designa el seno/regazo/pecho en sentido corporal íntimo. «En tu seno» preserva la imagen concreta y la resonancia bíblica, siendo idiomático en español.
- source_word: הָאֹמֵן
  english_pob_choice: a guardian
  chosen_spanish: una nodriza
  alternatives_spanish:
  - un cuidador
  - un tutor
  - una criadora
  lexicon: HALOT
  rationale: El participio denota a quien cuida y lleva al niño; en esta comparación la opción más directa y asentada es «nodriza». Aunque el hebreo puede abarcar a un cuidador más general, aquí la imagen de crianza justifica esta elección, y la nota preserva la alternativa léxica.
- source_word: הַיֹּנֵק
  english_pob_choice: the nursing child
  chosen_spanish: al niño que mama
  alternatives_spanish:
  - al lactante
  - al niño lactante
  lexicon: HALOT
  rationale: El participio indica un niño en etapa de lactancia. «El niño que mama» reproduce esa etapa con claridad y mantiene el movimiento de la comparación.
- source_word: עַל הָאֲדָמָה
  english_pob_choice: to the land
  chosen_spanish: a la tierra
  alternatives_spanish:
  - sobre la tierra
  - en la tierra
  lexicon: HALOT
  rationale: En este contexto de desplazamiento hacia el destino prometido, עַל se entiende idiomáticamente como dirección. «A la tierra» conserva la meta del viaje y la referencia pactal.
- source_word: אֲשֶׁר נִשְׁבַּעְתָּ
  english_pob_choice: that you swore
  chosen_spanish: que juraste
  alternatives_spanish:
  - que prometiste con juramento
  - a la cual juraste
  lexicon: HALOT
  rationale: El verbo implica hacer un juramento. «Juraste» es el equivalente más directo y natural en español, manteniendo el lenguaje de pacto.
- source_word: לַאֲבֹתָיו
  english_pob_choice: to their fathers
  chosen_spanish: a sus padres
  alternatives_spanish:
  - a sus antepasados
  - a sus padres (de ellos)
  lexicon: HALOT
  rationale: El sufijo es singular en el hebreo por el colectivo; en español, «sus padres» resulta natural y puede abarcar la referencia colectiva sin oscurecer el destinatario de la promesa.
theological_decisions:
- issue: El pueblo como singular colectivo frente a pronombres más naturales en español
  english_pob_reading: Preserve the collective singular idea behind 'all this people' and the embedded maternal metaphor
  chosen_spanish_reading: Mantener «todo este pueblo» y singularizar el objeto implícito con «lo» en «lo di a luz»
  alternative_spanish_readings:
  - todo este pueblo… los di a luz
  - todo este pueblo… les di a luz
  rationale: El hebreo trata a ישראל/pueblo como unidad colectiva con referencias singulares. Aunque el español permite pluralizar por fluidez, aquí conviene conservar la tensión del original y la imagen de un solo pueblo concebido y alumbrado.
  doctrine_reference: Consistencia terminológica y primacía del original en la traducción
- issue: Renderizar הָאֹמֵן en una comparación de crianza
  english_pob_reading: The term can mean guardian/nurse/caretaker; English documented 'guardian' with a lexical footnote for 'nurse'
  chosen_spanish_reading: Usar «una nodriza» en el texto principal
  alternative_spanish_readings:
  - una guardiana
  - un cuidador
  - una criadora
  rationale: Aquí la comparación explícita con el amamantamiento del niño favorece una figura de crianza más concreta. «Nodriza» preserva el campo semántico de cuidado infantil y evita una abstracción excesiva en español.
  doctrine_reference: Primacía del texto fuente y preservación de la metáfora original
- issue: Dirección de עַל הָאֲדָמָה en el marco de la promesa
  english_pob_reading: to the land that you swore to their fathers
  chosen_spanish_reading: a la tierra que juraste a sus padres
  alternative_spanish_readings:
  - sobre la tierra que juraste a sus padres
  - en la tierra que juraste a sus padres
  rationale: El contexto exige destino/objetivo, no mera ubicación. La lectura «a la tierra» sigue la dinámica del movimiento prometido y mantiene el vínculo con la herencia pactal.
  doctrine_reference: Claridad contextual sin perder la imagen geográfica-pactual
translation_notes:
  revision_awareness: Se corrigió la validación previa anclando la nota de alternativa léxica con [a] en el texto español. También se optó por una redacción que conserva el singular colectivo del hebreo y la metáfora maternal, sin depender mecánicamente del inglés.
  spanish_consistency_notes:
  - Se mantuvo «pueblo» para עָם como colectivo singular.
  - Se preservó la metáfora de concebir/parto/lactancia sin convertirla en paráfrasis explicativa.
  - Se usó «Yahvé» no aplicable aquí, pues el verso no contiene el nombre divino.
  - Se evitó «Cristo/Mesías» y otras terminologías no pertinentes.
  - La nota [a] está anclada directamente en «nodriza[a]» para cumplir la validación.
