translation:
  language: es
  text: Entonces Jerubaal hijo de Joás fue y habitó en su casa[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue y se asentó en su casa» o «fue y moró en su casa». El verbo hebreo puede denotar residencia o asentamiento, no solo la acción física de sentarse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - partió
  - se fue
  lexicon: HALOT
  rationale: El verbo narrativo הלך aquí expresa avance de la acción; en español, «fue» conserva el movimiento sin añadir una dirección no explícita como «volvió».«Se fue» sería posible, pero «fue» mantiene mejor la brevedad del hebreo.
- source_word: יְרֻבַּעַל
  english_pob_choice: Jerubbaal
  chosen_spanish: Jerubaal
  alternatives_spanish:
  - Jerobaal
  - Gedeón
  lexicon: HALOT
  rationale: El texto hebreo presenta el nombre propio יְרֻבַּעַל. En español, se translitera como «Jerubaal» para reflejar el nombre que está efectivamente en el hebreo, no el nombre alterno más conocido.
- source_word: בֶּן יוֹאָשׁ
  english_pob_choice: son of Joash
  chosen_spanish: hijo de Joás
  alternatives_spanish:
  - hijo de Joash
  lexicon: HALOT
  rationale: La construcción filiativa se vierte de manera directa y natural en español con «hijo de». «Joás» respeta la forma española establecida para el nombre propio.
- source_word: וַיֵּשֶׁב
  english_pob_choice: lived
  chosen_spanish: habitó
  alternatives_spanish:
  - vivió
  - se asentó
  - moró
  lexicon: HALOT
  rationale: ישב puede significar habitar, residir o asentarse. En combinación con «en su casa», «habitó» comunica residencia de forma sobria y fiel, preservando la amplitud semántica sin reducirlo a «se sentó».
- source_word: בְּבֵיתוֹ
  english_pob_choice: in his house
  chosen_spanish: en su casa
  alternatives_spanish:
  - en su propio hogar
  - en su casa propia
  - en su morada
  lexicon: HALOT
  rationale: La expresión literal es «en su casa». En español, «casa» mantiene la concreción del hebreo sin introducir matices interpretativos adicionales como «hogar».
- source_word: וַ...וַ
  english_pob_choice: Then ... went and lived
  chosen_spanish: Entonces ... fue y habitó
  alternatives_spanish:
  - Y ... fue y habitó
  - Entonces ... se fue y vivió
  lexicon: HALOT
  rationale: La secuencia narrativa con waw consecutivos se refleja con «Entonces» al inicio y la coordinación «fue y habitó», reproduciendo el avance del relato de manera fluida y fiel.
translation_notes:
  revision_awareness: Se mantuvo sin cambios el sentido básico del hebreo y la decisión del POB inglés de traducir וַיֵּשֶׁב con un verbo de residencia. La versión española conserva la referencia al nombre propio presente en el hebreo (Jerubaal) y la secuencia narrativa simple del versículo.
  spanish_consistency_notes:
  - Se evitó sustituir el nombre hebreo Jerubaal por Gedeón, siguiendo el texto fuente.
  - Se usó «habitó» para preservar el campo semántico de ישב en contexto de residencia.
  - La puntuación y la cadencia buscan ser publicables en español bíblico moderno, sin arcaísmos innecesarios.
