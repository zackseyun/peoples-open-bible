  rationale: Se reemplaza «Vosotros trastornáis todo» por «Ustedes lo ponen todo al revés» para ajustarse al español neutral solicitado y conservar la fuerza exclamativa del hebreo. Se corrige la nota para que sí preserve la alternativa más literal documentada (lectura nominal/exclamativa) y la opción «perversidad». Se cambia «No entiende» a «No tiene entendimiento» para reflejar mejor la decisión léxica del POB inglés.
