translation:
  language: es
  text: ¿Por qué te abates[a], alma mía, y por qué te turbas dentro de mí? Espera en Dios, porque aún he de alabarlo[b], la salvación de mi semblante y mi Dios[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «te inclinas» o «te encorvas hacia abajo»; el verbo expresa estar abatida o hundida.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «aún lo alabaré»; el verbo también puede implicar dar gracias.'
    reason: lexical_alternative
  - marker: c
    text: El hebreo dice literalmente algo como «las salvaciones de su/mi rostro/semblante» según la forma textual discutida; aquí se conserva la imagen facial del texto masorético revisado. «Semblante» comunica mejor en español el valor poético de countenance que «rostro».
    reason: theological_note
lexical_decisions:
- source_word: תִּשְׁתּוֹחֲחִי
  english_pob_choice: are you cast down
  chosen_spanish: te abates
  alternatives_spanish:
  - te hundes
  - te inclinas hacia abajo
  lexicon: HALOT
  rationale: El verbo expresa quedar humillada, abatida o deprimida. «Te abates» conserva la imagen de descenso interior sin sonar forzado en español.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: alma mía
  alternatives_spanish:
  - mi alma
  - mi ser
  lexicon: HALOT
  rationale: En este contexto poético, la vocación directa a la interioridad se expresa naturalmente con «alma mía», manteniendo la fuerza introspectiva de נֶפֶשׁ.
- source_word: וַתֶּהֱמִי
  english_pob_choice: are you in turmoil
  chosen_spanish: te turbas
  alternatives_spanish:
  - estás en tumulto
  - te agitas
  lexicon: HALOT
  rationale: El verbo puede denotar agitación, rumor o tumulto interior. «Te turbas» comunica bien la inquietud anímica y guarda el paralelismo con «te abates».
- source_word: עָלַי
  english_pob_choice: within me
  chosen_spanish: dentro de mí
  alternatives_spanish:
  - sobre mí
  - en mí
  lexicon: HALOT
  rationale: Aunque literalmente es «sobre mí», aquí la imagen es de agitación interna. «Dentro de mí» transmite el sentido contextual sin perder la referencia personal.
- source_word: הוֹחִילִי
  english_pob_choice: Hope
  chosen_spanish: Espera
  alternatives_spanish:
  - Pon tu esperanza
  - Confía aguardando
  lexicon: HALOT
  rationale: En este imperativo, la idea combina confianza y espera expectante. «Espera en Dios» es idiomático en español y suficientemente fiel al llamado exhortativo.
- source_word: לֵאלֹהִים
  english_pob_choice: in God
  chosen_spanish: en Dios
  alternatives_spanish:
  - para Dios
  - hacia Dios
  lexicon: HALOT
  rationale: La preposición con el verbo pide el objeto de la espera/esperanza. «En Dios» conserva la relación de confianza indicada por el hebreo.
- source_word: עוֹד
  english_pob_choice: yet
  chosen_spanish: aún
  alternatives_spanish:
  - todavía
  - a la vez
  lexicon: HALOT
  rationale: Marca continuidad futura pese a la aflicción presente. «Aún» mantiene el tono esperanzado y anticipador del verso.
- source_word: אוֹדֶנּוּ
  english_pob_choice: I will yet praise him
  chosen_spanish: he de alabarlo
  alternatives_spanish:
  - lo alabaré todavía
  - le daré gracias aún
  lexicon: HALOT
  rationale: El Hiphil de ידה puede implicar alabar o dar gracias. «He de alabarlo» expresa una resolución futura con naturalidad y mantiene el matiz de gratitud cultual.
- source_word: יְשׁוּעוֹת
  english_pob_choice: the salvation
  chosen_spanish: la salvación
  alternatives_spanish:
  - las salvaciones
  - la ayuda
  lexicon: HALOT
  rationale: Aunque el plural hebreo es significativo, en español la forma singular funciona como abstracto colectivo y evita una redundancia poco natural.
- source_word: פָּנָיו
  english_pob_choice: his presence / face / countenance
  chosen_spanish: mi rostro
  alternatives_spanish:
  - su rostro
  - su presencia
  - su semblante
  lexicon: HALOT
  rationale: El texto hebreo final se relaciona con פני/פנים y la revisión auditada señala que el cierre debe reflejar también el matiz de 'mi countenance'. En español, «mi rostro» preserva el enlace con la imagen facial del hebreo y con la revisión más reciente del POB en inglés, sin forzar «presencia» donde el texto masorético destaca el rostro/semblante.
- source_word: וֵאלֹהָי / ואלהי
  english_pob_choice: and my God
  chosen_spanish: y mi Dios
  alternatives_spanish:
  - y Dios mío
  - y el Dios mío
  lexicon: HALOT
  rationale: El final coordinado añade la confesión personal del hablante. «Y mi Dios» es directo, reverente y acorde con la sintaxis española del salmo.
theological_decisions:
- issue: 'Valor del cierre: rostro/semblante frente a presencia'
  english_pob_reading: the salvation of my countenance and my God
  chosen_spanish_reading: la salvación de mi rostro y mi Dios
  alternative_spanish_readings:
  - la salvación de su presencia
  - la ayuda de su rostro
  - la salvación de mi semblante y mi Dios
  rationale: El hebreo masorético incluye פני/ו y el cierre coordinado con «mi Dios». Dado el ajuste revisado en el POB inglés, la versión española debe reflejar explícitamente el rostro/semblante del hablante y no sustituirlo por una abstracción de 'presencia'.
  doctrine_reference: Salmo 42:6; revisión auditada del cierre masorético
translation_notes:
  revision_awareness: 'Tomé en cuenta la revisión auditada del cierre del verso: el POB inglés pasó de una lectura centrada en la presencia/rostro de Dios a una que refleja más completamente el texto masorético con «my countenance and my God». Por eso el español mantiene el paralelismo final con «mi rostro y mi Dios», y no suaviza el cierre hacia «presencia».'
  spanish_consistency_notes:
  - Usé «Dios» para אֱלֹהִים y «alabarlo» para el Hiphil de ידה, manteniendo registro bíblico natural.
  - Conservé un tono poético directo, con segunda persona dirigida al alma, como en el hebreo.
  - Evité «SEÑOR» porque el verso usa אֱלֹהִים, no el Tetragrámaton.
