translation:
  language: es
  text: 'Entonces los filisteos llamaron a los sacerdotes y a los adivinos, diciendo: «¿Qué haremos con el arca de Yahvé? Dígannos con qué[a] debemos enviarla a su lugar».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «con qué / por qué medio»; la pregunta pide el medio o instrumento con que deben enviar el arca.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרְאוּ
  english_pob_choice: called for
  chosen_spanish: llamaron a
  alternatives_spanish:
  - convocaron a
  - llamaron
  lexicon: HALOT
  rationale: El hebreo expresa una convocatoria de especialistas para consulta. «Llamaron a» conserva la idea de hacerlos venir de manera natural en español, sin añadir una formalidad más fuerte que el texto no exige.
- source_word: פְלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - filisteos
  lexicon: HALOT
  rationale: Se mantiene el nombre del pueblo con artículo, como sujeto narrativo definido en español.
- source_word: לַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: a los sacerdotes
  alternatives_spanish:
  - a los sacerdotes cultuales
  - a los sacerdotes
  lexicon: HALOT
  rationale: El hebreo tiene artículo definido y el objeto es de consulta. «Sacerdotes» es el equivalente más claro; no se añade un calificativo como «filisteos» porque el contexto ya los identifica como tales.
- source_word: וְלַקֹּסְמִים
  english_pob_choice: the diviners
  chosen_spanish: a los adivinos
  alternatives_spanish:
  - a los adivinos
  - a los hechiceros
  - a los agoreros
  lexicon: HALOT
  rationale: קֹסְמִים se refiere a practicantes de adivinación. «Adivinos» es claro y relativamente neutral en español; «hechiceros» sería más interpretativo y «agoreros» menos preciso.
- source_word: מַה נַּעֲשֶׂה
  english_pob_choice: What shall we do
  chosen_spanish: ¿Qué haremos
  alternatives_spanish:
  - ¿Qué debemos hacer
  - ¿Qué vamos a hacer
  lexicon: HALOT
  rationale: La forma deliberativa se expresa de modo natural con futuro de primera persona plural en español. «¿Qué haremos?» conserva el tono consultivo sin sonar forzado.
- source_word: לַאֲרוֹן יְהוָה
  english_pob_choice: with the ark of Yahweh
  chosen_spanish: con el arca de Yahvé
  alternatives_spanish:
  - respecto del arca de Yahvé
  - con el arca de Yahvé
  lexicon: HALOT
  rationale: Aunque el hebreo usa לַ, el sentido en español se expresa idiomáticamente con «con» en la pregunta de tratamiento. Se mantiene «arca» y el nombre divino «Yahvé» conforme al criterio del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: «Yahvé» como forma española de transmisión del nombre divino, en lugar de sustituirlo por un título.'
- source_word: הוֹדִעֻנוּ
  english_pob_choice: Tell us
  chosen_spanish: Háganos saber
  alternatives_spanish:
  - Díganos
  - Infórmenos
  lexicon: HALOT
  rationale: El imperativo intensivo de ידע pide «hacer saber». «Háganos saber» reproduce esa fuerza con español reverente y natural; se evita «Díganos» porque puede sonar menos exacto respecto de «hacer conocer».
- source_word: בַּמֶּה
  english_pob_choice: with what
  chosen_spanish: con qué
  alternatives_spanish:
  - de qué manera
  - por qué medio
  lexicon: HALOT
  rationale: La revisión inglesa dejó claro que la idea es instrumental, no solo modal. «Con qué» refleja directamente el valor de medio del hebreo y mantiene la pregunta abierta sobre el instrumento o modo concreto.
- source_word: נְשַׁלְּחֶנּוּ
  english_pob_choice: we should send it
  chosen_spanish: la enviaremos
  alternatives_spanish:
  - la mandaremos
  - la enviaremos de vuelta
  lexicon: HALOT
  rationale: El Piel imperfecto con sufijo expresa el acto de enviar el arca. «La enviaremos» es claro y formal; no se añade «de vuelta» porque eso está implícito por el contexto narrativo pero no explícito en el verbo.
- source_word: לִמְקוֹמוֹ
  english_pob_choice: to its place
  chosen_spanish: a su lugar
  alternatives_spanish:
  - a su sitio
  - a su lugar propio
  lexicon: HALOT
  rationale: «Lugar» es el equivalente directo y digno; «su lugar» mantiene el referente del arca sin sobreinterpretar el matiz con «propio».
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme al criterio del proyecto, se preserva el nombre divino en vez de sustituirlo por un título reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH / יְהוָה → Yahvé'
- issue: Referencia a los oficiales cultuales filisteos
  english_pob_reading: the priests and the diviners
  chosen_spanish_reading: los sacerdotes y los adivinos
  alternative_spanish_readings:
  - los sacerdotes y los hechiceros
  - los sacerdotes y los agoreros
  rationale: El hebreo nombra especialistas rituales y de adivinación vinculados a los filisteos. «Adivinos» conserva la categoría lexical sin cargar el término con una valoración adicional que el versículo no explicita.
  doctrine_reference: HALOT / uso contextual del término קֹסְמִים
translation_notes:
  revision_awareness: La versión inglesa fue revisada de «how we should send it» a «with what we should send it» para reflejar mejor el instrumental בַּמֶּה. En español se siguió esa revisión con «con qué», y se mantuvo la idea de envío sin añadir explícitamente «de vuelta» porque no está en el verbo, aunque el contexto lo sugiera.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se prefirió «adivinos» para קֹסְמִים por claridad y neutralidad, evitando términos más arcaicos o más cargados.
  - «Con qué» reproduce mejor el matiz instrumental del hebreo que una simple paráfrasis de manera.
  - Se mantuvo el orden narrativo natural del español con «Entonces…», equivalente de inicio discursivo del wayyiqtol.
