translation:
  language: es
  text: Y cuando el faraón se negó obstinadamente a dejarnos ir, Yahvé mató a todo primogénito en la tierra de Egipto, desde el primogénito del hombre[a] hasta el primogénito de la bestia. Por tanto, yo sacrifico a Yahvé todo macho que abre el vientre, pero a todo primogénito de mis hijos varones lo redimo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'desde el primogénito de la humanidad hasta el primogénito del ganado'.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִקְשָׁה
  english_pob_choice: stubbornly refused
  chosen_spanish: se endureció para no dejarnos ir
  alternatives_spanish:
  - se negó obstinadamente a dejarnos ir
  - se puso terco para no dejarnos ir
  lexicon: HALOT
  rationale: En este contexto, el valor verbal expresa resistencia obstinada frente a la liberación de Israel. 'Se endureció' conserva la idea de obstinación y encaja con el patrón narrativo del Éxodo; la cláusula final explicita el efecto de esa resistencia.
- source_word: לְשַׁלְּחֵנוּ
  english_pob_choice: to let us go
  chosen_spanish: dejarnos ir
  alternatives_spanish:
  - soltarnos
  - liberarnos
  - enviarnos fuera
  lexicon: HALOT
  rationale: שׁלח aquí tiene el sentido de dejar salir o despedir a Israel. 'Dejarnos ir' es la forma natural en español y conserva el matiz narrativo sin volverlo técnico o eclesiástico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el término base del proyecto para el nombre divino, en español 'Yahvé', manteniendo la convención de transparencia textual y evitando el reemplazo por una máscara litúrgica.
- source_word: בְּכוֹר
  english_pob_choice: firstborn
  chosen_spanish: primogénito
  alternatives_spanish:
  - primero nacido
  - primer nacido
  lexicon: HALOT
  rationale: '''Primogénito'' es el equivalente asentado en español bíblico y comunica con precisión el rango de nacimiento exigido por el hebreo.'
- source_word: מִבְּכֹר אָדָם וְעַד בְּכוֹר בְּהֵמָה
  english_pob_choice: from the firstborn of man to the firstborn of beast
  chosen_spanish: desde el primogénito del hombre hasta el primogénito de la bestia
  alternatives_spanish:
  - desde el primogénito de la humanidad hasta el primogénito del ganado
  - desde el primogénito de las personas hasta el primogénito de los animales
  lexicon: HALOT
  rationale: Se conserva la estructura contrastiva del hebreo entre humanos y animales. 'Del hombre' mantiene el valor genérico del término en este contraste, y 'bestia' reproduce el registro conciso del original y del audit trail en inglés.
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Marca la inferencia causal entre la matanza de los primogénitos y la práctica ritual de Israel. 'Por tanto' es formal y transparente.
- source_word: זֹבֵחַ
  english_pob_choice: I sacrifice
  chosen_spanish: yo sacrifico
  alternatives_spanish:
  - yo ofrezco en sacrificio
  - yo inmolo
  lexicon: HALOT
  rationale: El verbo denota acción sacrificial. 'Yo sacrifico' es directo y suficiente en el contexto cultual, sin añadir explicaciones interpretativas.
- source_word: פֶּטֶר רֶחֶם
  english_pob_choice: that opens the womb
  chosen_spanish: el que abre el vientre
  alternatives_spanish:
  - el que abre el seno materno
  - el primer nacido del vientre
  lexicon: HALOT
  rationale: La expresión es idiomática y legal-sacral. 'El que abre el vientre' preserva la imagen hebrea con claridad natural en español, evitando una paráfrasis más libre.
- source_word: הַזְּכָרִים
  english_pob_choice: every male
  chosen_spanish: los varones
  alternatives_spanish:
  - todos los machos
  - cada macho
  lexicon: HALOT
  rationale: El participio nominal restringe la ofrenda a los ejemplares masculinos. 'Los varones' transmite esa restricción de forma digna y evita un tecnicismo zoológico en español.
- source_word: בָּנַי
  english_pob_choice: my sons
  chosen_spanish: mis hijos
  alternatives_spanish:
  - mis hijos varones
  - mis hijos varones primogénitos
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'mis hijos', en español 'mis hijos' puede abarcar varones y funciona con naturalidad en el registro legal-familiar del versículo. Se evita sobrecargar la frase y se mantiene el sentido de descendencia propia susceptible de redención.
- source_word: אֶפְדֶּה
  english_pob_choice: I redeem
  chosen_spanish: yo lo redimo
  alternatives_spanish:
  - yo lo rescato
  - yo lo compro de vuelta
  lexicon: HALOT
  rationale: פדה en este marco cultual y jurídico expresa redención por sustitución o pago. 'Redimo' conserva la fuerza teológica y la relación con la práctica de consagrar y rescatar al primogénito.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se mantiene la decisión del proyecto de transparentar el Tetragrámaton como nombre propio de Dios, evitando la sustitución por un título. En español, 'Yahvé' es la forma establecida en este marco editorial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Contraste אָדָם / בְּהֵמָה
  english_pob_reading: from the firstborn of man to the firstborn of beast
  chosen_spanish_reading: del hombre ... de la bestia
  alternative_spanish_readings:
  - de la humanidad ... del ganado
  - de las personas ... de los animales
  rationale: El contraste humano/animal forma parte del alcance de la plaga. 'Del hombre' conserva la forma genérica y contrastiva del hebreo; 'bestia' mantiene el registro breve y solemne del original.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם → man / humankind (context)'
- issue: פֶּטֶר רֶחֶם como fórmula sacrificial/legal
  english_pob_reading: that opens the womb
  chosen_spanish_reading: el que abre el vientre
  alternative_spanish_readings:
  - el que abre el seno materno
  - el primer nacido del vientre
  rationale: La frase designa al primer nacido que abre el vientre materno y se usa en un marco legal-sacral. La traducción conserva la imagen sin suavizarla en exceso.
  doctrine_reference: HALOT; contexto cultual de Éxodo 13
- issue: אֶפְדֶּה y la noción de redención
  english_pob_reading: I redeem
  chosen_spanish_reading: yo lo redimo
  alternative_spanish_readings:
  - yo lo rescato
  - yo lo compro de vuelta
  rationale: La acción no es meramente económica, sino de rescate consagrado. 'Redimo' preserva el valor teológico y ritual del verbo en este pasaje.
  doctrine_reference: HALOT; marco cultual de redención del primogénito
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando toda nota a pie de página no anclada. La redacción mantiene la sustancia del audit trail inglés y ajusta el español para una lectura publicable y fiel al hebreo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יהוה.
  - Se conserva 'primogénito' para בְּכוֹר en todo el versículo.
  - Se mantiene el contraste humano/animal sin neutralizarlo.
  - No se introducen notas a pie de página, para evitar marcadores sin ancla en el texto.
