translation:
  language: es
  text: Porque aun cuando una terrible furia de bestias salvajes cayó sobre ellos, y los iban destruyendo las mordeduras de serpientes torcidas[a], tu ira no permaneció hasta el fin;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «serpientes torcidas» o «serpientes enroscadas». El adjetivo griego significa literalmente «torcido» o «curvo»; aquí probablemente describe la forma sinuosa de las serpientes, no una cualidad moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: δεινὸς
  english_pob_choice: terrible
  chosen_spanish: terrible
  alternatives_spanish:
  - espantosa
  - dreadful
  - severa
  lexicon: LSJ
  rationale: «δεινὸς» expresa intensidad amenazante; «terrible» conserva el tono solemne y la fuerza del griego sin exagerar el sentido.
- source_word: θηρίων θυμός
  english_pob_choice: fury of wild beasts
  chosen_spanish: furia de bestias salvajes
  alternatives_spanish:
  - furia de fieras
  - rabia de bestias salvajes
  lexicon: LSJ
  rationale: «θηρίων» apunta a bestias salvajes y «θυμός» a un ímpetu violento; «furia de bestias salvajes» sigue de cerca el valor léxico y suena natural en español formal.
- source_word: ἐπῆλθεν
  english_pob_choice: came upon
  chosen_spanish: cayó sobre
  alternatives_spanish:
  - vino sobre
  - se abatió sobre
  lexicon: LSJ
  rationale: En contexto de calamidad o ataque, «cayó sobre» comunica bien la idea de algo que irrumpe y afecta a las víctimas.
- source_word: δήγμασίν
  english_pob_choice: bites
  chosen_spanish: mordeduras
  alternatives_spanish:
  - mordidas
  - picaduras
  lexicon: LSJ
  rationale: El sustantivo se refiere a mordeduras; «mordeduras» preserva el carácter físico y agresivo del término.
- source_word: σκολιῶν ὄφεων
  english_pob_choice: crooked serpents
  chosen_spanish: serpientes torcidas
  alternatives_spanish:
  - serpientes curvas
  - serpientes enroscadas
  - serpientes sinuosas
  lexicon: LSJ
  rationale: «σκολιός» significa literalmente torcido, curvo o retorcido. «Serpientes torcidas» mantiene la imagen del griego y evita una interpretación moral.
- source_word: διεφθείροντο
  english_pob_choice: were being destroyed
  chosen_spanish: eran destruidos
  alternatives_spanish:
  - se iban destruyendo
  - perecían
  lexicon: LSJ
  rationale: El imperfecto pasivo describe una acción continua; «eran destruidos» comunica ese proceso sin añadir matices ajenos.
- source_word: οὐ μέχρι τέλους ἔμεινεν
  english_pob_choice: did not remain to the end
  chosen_spanish: no permaneció hasta el fin
  alternatives_spanish:
  - no permaneció hasta el final
  - no duró hasta el fin
  - no siguió hasta el final
  lexicon: LSJ
  rationale: La frase griega afirma que la ira de Dios no se mantuvo hasta el término. «No permaneció hasta el fin» conserva la estructura y la tensión teológica.
- source_word: ἡ ὀργή σου
  english_pob_choice: your wrath
  chosen_spanish: tu ira
  alternatives_spanish:
  - tu furia
  - tu indignación
  lexicon: LSJ
  rationale: «ὀργή» puede ser «ira» o «ira/indignación»; aquí «tu ira» es claro, solemne y suficientemente fuerte para el contexto judicial-divino.
theological_decisions:
- issue: Duración limitada de la ira divina
  english_pob_reading: your wrath did not remain to the end
  chosen_spanish_reading: tu ira no permaneció hasta el fin
  alternative_spanish_readings:
  - tu ira no continuó hasta el final
  - tu ira no duró hasta el fin
  - el castigo no fue definitivo
  rationale: El griego afirma directamente que la ira de Dios no se extendió al término. La traducción conserva esa tensión teológica sin suavizarla en una paráfrasis explicativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del contexto inglés: se optó por un registro formal y fiel a los matices de θυμός y σκολιῶν ὄφεων. En español, se mantuvo esa preferencia con «furia de bestias salvajes» y «serpientes torcidas», evitando una paráfrasis interpretativa.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como forma regular para el nombre divino, pero aquí el verso usa «tu ira», correspondiente a ἡ ὀργή σου.
  - Se mantuvo un registro bíblico formal sin recurrir a calcos innecesarios.
  - Se evitó «SEÑOR» como sustituto del nombre divino porque el versículo no contiene el tetragrámaton; el foco está en «tu ira».
