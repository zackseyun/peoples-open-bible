translation:
  language: es
  text: Presentarás el toro[a] delante de la tienda de reunión, y Aarón y sus hijos pondrán sus manos sobre la cabeza del toro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «harás acercar» o «traerás» el toro delante de la tienda de reunión.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרַבְתָּ
  english_pob_choice: You shall bring
  chosen_spanish: Harás llegar
  alternatives_spanish:
  - Presentarás
  - Harás acercar
  lexicon: HALOT
  rationale: El hebreo en hifil de קרב tiene aquí el valor ritual de hacer acercar/presentar el animal. «Harás llegar» conserva ese matiz de acercamiento sin sonar rígido ni perder el sentido sacrificial.
- source_word: הַפָּר
  english_pob_choice: the bull
  chosen_spanish: el toro
  alternatives_spanish:
  - el novillo
  - el toro joven
  lexicon: HALOT
  rationale: פָּר designa un bovino macho apto para sacrificio. En español, «toro» es una equivalencia natural y suficientemente precisa en este contexto; «novillo» introduce una especificación no explícita en el hebreo.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: La preposición indica ubicación frente a un lugar sagrado. «Delante de» comunica bien la relación espacial y ritual en español moderno.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - la tienda del encuentro
  - el tabernáculo de reunión
  lexicon: HALOT
  rationale: La expresión cultual tradicional se puede verter naturalmente como «tienda de reunión». «Reunión» mantiene el sentido de cita/encuentro señalado por מוֹעֵד sin imponer una paráfrasis.
- source_word: וְסָמַךְ
  english_pob_choice: shall lay
  chosen_spanish: pondrán
  alternatives_spanish:
  - apoyarán
  - impondrán
  lexicon: HALOT
  rationale: El gesto ritual de סמך con las manos sobre la víctima se expresa con naturalidad como «poner las manos». «Pondrán» es claro y evita sobrecargar el texto con una glosa interpretativa.
- source_word: יְדֵיהֶם
  english_pob_choice: their hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - las manos de ellos
  lexicon: HALOT
  rationale: 'El plural hebreo se conserva de forma directa: Aarón y sus hijos actúan colectivamente. «Sus manos» es idiomático y mantiene el número plural.'
- source_word: עַל רֹאשׁ הַפָּר
  english_pob_choice: on the head of the bull
  chosen_spanish: sobre la cabeza del toro
  alternatives_spanish:
  - encima de la cabeza del toro
  lexicon: HALOT
  rationale: «Sobre la cabeza» reproduce con fidelidad la relación física del rito. «Cabeza» es el equivalente natural de רֹאשׁ en español.
theological_decisions:
- issue: El gesto de imposición de manos en el rito sacrificial
  english_pob_reading: shall lay their hands on the head of the bull
  chosen_spanish_reading: pondrán sus manos sobre la cabeza del toro
  alternative_spanish_readings:
  - apoyarán sus manos sobre la cabeza del toro
  - impondrán sus manos sobre la cabeza del toro
  rationale: El versículo describe el acto ritual concreto sin explicar su simbolismo. «Pondrán sus manos» preserva la acción visible sin añadir una interpretación doctrinal sobre transferencia de culpa que el texto no explicita.
  doctrine_reference: Preservar la tensión teológica del rito sin resolverla por adición interpretativa.
translation_notes:
  revision_awareness: El borrador sigue de cerca la concordancia alta entre el texto hebreo y la traducción inglesa POB auditada. Se preserva la secuencia ritual, el plural de «sus manos» y el sentido cultual de «tienda de reunión», sin introducir explicaciones no presentes en el versículo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; en este versículo no aparece.
  - Se evita «SEÑOR» como sustituto del nombre divino porque aquí no hay el tetragrama.
  - «Toro» se mantiene como equivalente natural de פָּר en un contexto sacrificial.
  - «Tienda de reunión» conserva el término cultual estándar y es coherente con el registro bíblico del proyecto.
  - La nota al pie se ancla en «Harás llegar» para reflejar la alternativa semántica del hebreo הִקְרַבְתָּ.
