translation:
  language: es
  text: No aceptarán rescate por la vida de un homicida[a][b], que es culpable de muerte, porque ciertamente se le dará muerte[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'compensación' o 'pago de redención'. El hebreo כֹּפֶר se refiere a un pago destinado a evitar una pena o a obtener liberación.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'por la vida/persona de un homicida'. El sentido es que no puede aceptarse ningún pago para salvarle la vida.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'porque ciertamente será puesto a muerte', una construcción hebrea enfática que expresa una sentencia judicial obligatoria.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִקְחוּ
  english_pob_choice: accept
  chosen_spanish: aceptar
  alternatives_spanish:
  - tomar
  - recibir
  lexicon: HALOT
  rationale: En contexto jurídico con כֹּפֶר, el verbo no significa simplemente 'tomar', sino aceptar un pago que pretende evitar la pena. 'Aceptar' comunica bien ese valor legal en español.
- source_word: כֹּפֶר
  english_pob_choice: ransom
  chosen_spanish: rescate
  alternatives_spanish:
  - compensación
  - pago de rescate
  - redención
  lexicon: HALOT
  rationale: '''Rescate'' preserva el sentido de un pago para librar de pena o liberar a alguien. En este contexto legal, evita reducir el término a una simple compensación o soborno.'
- source_word: לְנֶפֶשׁ רֹצֵחַ
  english_pob_choice: for the life of a murderer
  chosen_spanish: por la vida de un homicida
  alternatives_spanish:
  - por un homicida
  - por la vida de un asesino
  - a favor de un homicida
  lexicon: HALOT
  rationale: נֶפֶשׁ aquí funciona como 'vida'. 'Por la vida de' conserva la construcción hebrea y su fuerza jurídica. 'Homicida' es preferible a 'asesino' por ser más neutral y amplio en español jurídico, aunque sigue marcando culpabilidad.
- source_word: רֹצֵחַ
  english_pob_choice: murderer
  chosen_spanish: homicida
  alternatives_spanish:
  - asesino
  - matador
  - asesino culpable
  lexicon: HALOT
  rationale: En el capítulo 35 se distingue entre muerte accidental y homicidio culpable. 'Homicida' mantiene esa distinción sin sonar tan coloquial o cargado como 'asesino'.
- source_word: רָשָׁע לָמוּת
  english_pob_choice: guilty of death
  chosen_spanish: culpable de muerte
  alternatives_spanish:
  - reo de muerte
  - digno de muerte
  - condenado a muerte
  lexicon: HALOT
  rationale: La frase hebrea expresa responsabilidad legal para la pena capital. 'Culpable de muerte' conserva la fuerza forense sin añadir todavía la idea de sentencia ya ejecutada.
- source_word: כִּי מוֹת יוּמָת
  english_pob_choice: for he must surely be put to death
  chosen_spanish: porque ciertamente morirá
  alternatives_spanish:
  - porque ciertamente se le dará muerte
  - porque sin duda será muerto
  - porque debe morir
  lexicon: HALOT
  rationale: La construcción enfática hebrea insiste en certeza/obligación. En español, 'ciertamente morirá' reproduce la solemnidad y la inevitabilidad del juicio; el pasivo queda implícito por el contexto legal del versículo.
theological_decisions:
- issue: Prohibición de conmutar la pena capital por dinero
  english_pob_reading: The verse states a binding judicial requirement that a murderer liable to death may not have the sentence commuted by payment.
  chosen_spanish_reading: El versículo prohíbe explícitamente aceptar un pago para anular o conmutar la pena de un homicida culpable de muerte.
  alternative_spanish_readings:
  - El versículo solo describe una práctica legal antigua.
  - No se debe tomar rescate, pero sin implicar necesariamente una sentencia capital obligatoria.
  rationale: La negación inicial y la cláusula enfática final muestran una orden jurídica obligatoria, no una mera observación histórica. La traducción conserva esa fuerza normativa.
  doctrine_reference: Numbers 35:31; cf. Deuteronomy 19:11–13
translation_notes:
  revision_awareness: 'Coincide sustancialmente con el audit trail en inglés: se mantiene la prohibición jurídica, se conserva la fuerza enfática de מוֹת יוּמָת y se evita suavizar כֹּפֶר a un mero ''pago'' sin matiz redentivo. No se requirieron revisiones respecto al pasaje fuente.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparece el tetragrámaton; este versículo no lo contiene.
  - '''Homicida'' se eligió por precisión jurídica en español; ''asesino'' quedaría más interpretativo.'
  - La estructura 'por la vida de...' conserva el hebreo נֶפֶשׁ sin volverla una paráfrasis libre.
