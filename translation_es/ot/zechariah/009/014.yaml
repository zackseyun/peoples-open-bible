translation:
  language: es
  text: Entonces Yahvé aparecerá sobre ellos, y su flecha saldrá como relámpago; y el Señor Yahvé hará sonar el cuerno[a] y marchará en los torbellinos del sur[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo shofar, un cuerno de carnero usado como señal de guerra o trompeta ceremonial.
    reason: cultural_note
  - marker: b
    text: 'O: «en los torbellinos de Temán». «Temán» puede entenderse como nombre propio o como «el sur».'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte con el nombre divino transliterado, no con una sustitución titular. En español, 'Yahvé' es el equivalente natural del 'Yahweh' de la auditoría inglesa y preserva el nombre personal del pacto.
- source_word: עֲלֵיהֶם
  english_pob_choice: over them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - contra ellos
  - encima de ellos
  lexicon: HALOT
  rationale: '''Sobre ellos'' conserva el valor espacial de עַל y la imagen teofánica sin decidir en exceso si el matiz es de protección, aparición o juicio.'
- source_word: יֵרָאֶה
  english_pob_choice: will appear
  chosen_spanish: se aparecerá
  alternatives_spanish:
  - será visto
  - se revelará
  lexicon: HALOT
  rationale: El nifal de ראה admite 'aparecer' o 'ser visto'. 'Se aparecerá' comunica de forma idiomática en español la manifestación divina futura.
- source_word: וְיָצָא
  english_pob_choice: will go out
  chosen_spanish: saldrá
  alternatives_spanish:
  - irá hacia fuera
  - emergerá
  lexicon: HALOT
  rationale: El verbo conserva la imagen de movimiento/proyección del arma. 'Saldrá' es la forma más natural en español para una flecha que parte o se lanza.
- source_word: כַבָּרָק
  english_pob_choice: like lightning
  chosen_spanish: como relámpago
  alternatives_spanish:
  - como luz
  - como un rayo
  lexicon: HALOT
  rationale: '''Relámpago'' reproduce bien la rapidez y el destello del símil. ''Como un rayo'' también es posible, pero ''relámpago'' se ajusta mejor al paralelismo poético.'
- source_word: חִצּוֹ
  english_pob_choice: his arrow
  chosen_spanish: su flecha
  alternatives_spanish:
  - su saeta
  - su dardo
  lexicon: HALOT
  rationale: '''Flecha'' es el equivalente más claro y natural en español contemporáneo; mantiene la imagen militar sin arcaísmo innecesario.'
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvé
  lexicon: HALOT
  rationale: La combinación de אֲדֹנָי con YHWH exige distinguir los dos elementos sin crear una fórmula chocante. 'El Señor Yahvé' preserva la doble referencia del hebreo y evita la sustitución tradicional que ocultaría el nombre divino.
- source_word: בַּשּׁוֹפָר
  english_pob_choice: the trumpet
  chosen_spanish: el cuerno
  alternatives_spanish:
  - la trompeta
  - el shofar
  lexicon: HALOT
  rationale: '''Shofar'' es el término cultural específico, pero en el texto principal ''cuerno'' comunica de manera directa el instrumento hebreo y su función de señal de guerra; el término técnico se preserva en nota.'
- source_word: יִתְקָע
  english_pob_choice: will sound
  chosen_spanish: hará sonar
  alternatives_spanish:
  - tocará
  - soplará
  lexicon: HALOT
  rationale: Con un instrumento como objeto, el verbo significa hacerlo sonar. 'Haré sonar' / 'hará sonar' es idiomático en español y refleja la acción del cuerno.
- source_word: וְהָלַךְ
  english_pob_choice: and march
  chosen_spanish: y marchará
  alternatives_spanish:
  - y andará
  - y avanzará
  lexicon: HALOT
  rationale: En el contexto bélico-teofánico, 'marchará' expresa mejor el avance deliberado que un simple 'irá' o 'andará'.
- source_word: בְּסַעֲרוֹת
  english_pob_choice: in the whirlwinds
  chosen_spanish: en los torbellinos
  alternatives_spanish:
  - en las tempestades
  - en los remolinos
  lexicon: HALOT
  rationale: '''Torbellinos'' corresponde de cerca a סערות y conserva la fuerza del plural; evita suavizar la imagen con un término demasiado genérico.'
- source_word: תֵּימָן
  english_pob_choice: of the south
  chosen_spanish: del sur
  alternatives_spanish:
  - de Temán
  - del viento del sur
  lexicon: HALOT
  rationale: La lectura 'del sur' sigue la opción principal de la auditoría inglesa para el sentido poético del pasaje. En español se entiende con claridad como dirección/sur, sin excluir la posible alusión geográfica a Temán.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La política del proyecto pide preservar el nombre del pacto en lugar de ocultarlo tras un título. 'Yahvé' mantiene esa decisión en español y armoniza con la forma inglesa 'Yahweh'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Tratamiento de אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yavé
  rationale: El hebreo combina un título de soberanía con el nombre del pacto. Traducir ambos elementos de forma visible preserva la tensión lingüística y teológica del original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — divine-name combinations'
- issue: Sentido de תֵּימָן y בְּסַעֲרוֹת
  english_pob_reading: the whirlwinds of the south
  chosen_spanish_reading: los torbellinos del sur
  alternative_spanish_readings:
  - los torbellinos de Temán
  - las tempestades del sur
  rationale: La auditoría inglesa deja abierta la posibilidad de leer תֵּימָן como 'sur' o como 'Temán'. En el texto principal, 'del sur' encaja mejor con la imagen meteorológica; la alternativa geográfica queda preservada en nota.
  doctrine_reference: 'POB lexical policy: preserve meaningful alternatives where the source allows them'
translation_notes:
  revision_awareness: La auditoría inglesa mantuvo el nombre divino como 'Yahweh', tradujo עֲלֵיהֶם como 'over them', eligió 'like lightning' para כַּבָּרָק, 'the trumpet' para בַּשּׁוֹפָר con nota cultural, y conservó la ambigüedad de תֵּימָן mediante una nota alternativa entre 'the south' y 'Teman'. Esta versión española sigue esas decisiones, adaptando la formulación a un español natural y manteniendo las alternativas significativas en notas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en lugar de 'SEÑOR' para el Tetragrámaton, conforme a la política del proyecto.
  - '''El Señor Yahvé'' conserva la doble referencia de אֲדֹנָי יְהוִה sin recurrir a una sustitución opaca.'
  - '''Cuerno'' en el texto principal se complementa con nota para recuperar el valor cultural de shofar.'
  - La imagen poética final se mantiene con 'torbellinos del sur', en paralelo con la opción principal de la auditoría inglesa.
  - La estructura del versículo respeta el paralelismo y la secuencia teofánica del hebreo.
