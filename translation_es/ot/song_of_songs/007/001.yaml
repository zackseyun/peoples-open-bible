base_translation:
  language: en
  yaml_path: translation/ot/song_of_songs/007/001.yaml
  text: Return[a], return, O Shulammite; return, return, that we may look at you[b]. Why do you look at the Shulammite as at the dance of Mahanaim?
  footnotes:
  - marker: a
    text: Or, 'What do you see in the Shulammite?—like the dance of Mahanaim.' The Hebrew of this clause is difficult, and some translations construe the question with 'what' rather than 'why.'
    reason: alternative_reading
  - marker: b
    text: Mahanaim is likely the place name Mahanaim; the name itself may mean 'two camps.'
    reason: cultural_note
