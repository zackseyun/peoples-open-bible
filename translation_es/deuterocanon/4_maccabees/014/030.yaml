revisions:
- from: Pero aun así[a], aunque tantos impulsos de amor maternal estaban atrayendo a la madre hacia la compasión[b], los torturosos y muy variados tormentos no pudieron, por ninguno de ellos, desviar su razón.
  to: Pero aun así[a], aunque tantos impulsos de amor maternal[b] estaban atrayendo a la madre hacia la compasión, los muy variados tormentos no pudieron por ninguno de ellos desviar su razón.
  rationale: Se movió la nota [b] a «amor maternal» para que coincida con la explicación léxica de φιλοτεκνία, y se simplificó «los torturosos y muy variados tormentos» a «los muy variados tormentos» para reflejar mejor αἱ παντοίκιλοι βάσανοι en un español natural y digno. Se mantuvo «su razón» para λογισμός por fidelidad al hilo filosófico de 4 Macabeos.
