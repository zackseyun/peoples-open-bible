revisions:
- from: ¿A quién has reprochado y blasfemado? ¿Contra quién has alzado tu voz y elevado tus ojos en lo alto? Contra el Santo de Israel[a][b].
  to: ¿A quién has reprochado y blasfemado? ¿Contra quién has alzado tu voz y has levantado tus ojos en alto? Contra el Santo de Israel[a][b].
  rationale: Se conserva la fidelidad al hebreo y al audit trail inglés, pero se reemplaza «elevado tus ojos en lo alto» por «has levantado tus ojos en alto», que suena más natural en español y mantiene mejor la imagen idiomática de altivez. Se mantienen las notas con marcadores correctos y coherentes con el texto revisado.
