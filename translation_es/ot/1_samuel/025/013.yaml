translation:
  language: es
  text: 'Entonces David dijo a sus hombres: «Ciñan cada uno su espada». Y cada uno se ciñó su espada, y también David se ciñó su espada. Unos cuatrocientos hombres subieron tras David, y doscientos se quedaron con los pertrechos[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con el equipaje» o «por el equipo».
    reason: lexical_alternative
lexical_decisions:
- source_word: לַאֲנָשָׁיו
  english_pob_choice: to his men
  chosen_spanish: a sus hombres
  alternatives_spanish:
  - a sus servidores
  - a su gente
  lexicon: HALOT
  rationale: En este contexto militar, אֲנָשִׁים se refiere a los combatientes de David, no a servidores domésticos ni a un grupo genérico. «Hombres» conserva el sentido relacional y militar con naturalidad en español.
- source_word: חִגְרוּ
  english_pob_choice: strap on
  chosen_spanish: Ciñan
  alternatives_spanish:
  - Pónganse
  - Atense
  lexicon: HALOT
  rationale: El verbo חגר en contexto bélico alude a ceñir o ajustar un arma al cuerpo. «Ciñan» es más fiel al valor léxico que una paráfrasis más libre, y mantiene un registro digno y bíblico en español.
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - uno cada uno
  lexicon: HALOT
  rationale: La construcción distributiva requiere expresar la acción individualmente. «Cada uno» comunica bien la distribución sin imponer innecesariamente una repetición rígida de «hombre» en español.
- source_word: חַרְבּוֹ
  english_pob_choice: his sword
  chosen_spanish: su espada
  alternatives_spanish:
  - su arma
  - su sable
  lexicon: HALOT
  rationale: חֶרֶב designa específicamente una espada, no un arma genérica. En español, el posesivo implícito en «su espada» corresponde al hebreo singular distributivo.
- source_word: וַיַּעֲלוּ אַחֲרֵי דָוִד
  english_pob_choice: went up after David
  chosen_spanish: subieron tras David
  alternatives_spanish:
  - fueron detrás de David
  - subieron siguiendo a David
  lexicon: HALOT
  rationale: «Subieron» conserva el valor de עלה y «tras David» mantiene la idea de seguir detrás. Esta combinación evita una traducción demasiado explicativa y refleja ambas direcciones semánticas.
- source_word: כְאַרְבַּע מֵאוֹת אִישׁ
  english_pob_choice: about four hundred men
  chosen_spanish: Aproximadamente cuatrocientos hombres
  alternatives_spanish:
  - como cuatrocientos hombres
  - unos cuatrocientos hombres
  lexicon: HALOT
  rationale: El prefijo כ en números puede indicar aproximación. «Aproximadamente» expresa con claridad esa vaguedad numérica sin perder la precisión narrativa.
- source_word: יָשְׁבוּ
  english_pob_choice: stayed
  chosen_spanish: se quedaron
  alternatives_spanish:
  - permanecieron
  - se sentaron
  lexicon: HALOT
  rationale: Aunque el verbo literalmente puede significar «sentarse», aquí el contexto exige la idea de permanecer atrás. «Se quedaron» es idiomático en español y preserva el sentido narrativo.
- source_word: עַל הַכֵּלִים
  english_pob_choice: with the supplies
  chosen_spanish: con los pertrechos
  alternatives_spanish:
  - con el equipaje
  - con los suministros
  lexicon: HALOT
  rationale: כֵּלִים abarca objetos, equipo o bagaje. En un contexto de marcha militar, «pertrechos» recoge el conjunto de equipo y provisiones con un registro adecuado; se mantiene la alternativa semántica en la nota.
translation_notes:
  revision_awareness: La versión inglesa más reciente no necesitó cambios tras la revisión, con alta concordancia del revisor. Por eso, el español sigue de cerca las decisiones auditadas, especialmente en el léxico militar y la aproximación numérica.
  spanish_consistency_notes:
  - Se mantuvo «David» sin transliteración ni forma tradicional alterna.
  - Se conservó el imperativo plural con valor distributivo («Ciñan cada uno...»), alineado con el hebreo.
  - Se evitó «SEÑOR» u otros reemplazos teológicos porque el versículo no contiene el nombre divino.
  - «Pertrechos» se eligió por claridad militar, mientras la nota preserva alternativas posibles para כֵּלִים.
  - El orden de las cláusulas sigue de cerca el hebreo sin sonar forzado en español.
