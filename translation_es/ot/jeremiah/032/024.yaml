    text: Or 'the siegeworks' or 'the mounds.' The Hebrew refers to earthworks built up in a siege to assault a city.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Babylonians.' The Hebrew says 'the Chaldeans,' the people identified with the Neo-Babylonian power.
    reason: lexical_alternative
  - marker: c
    text: Or 'pestilence.'
    reason: lexical_alternative
