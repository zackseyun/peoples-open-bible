translation:
  language: es
  text: Que un acreedor[a] se apodere de todo lo que le pertenece, y que extraños saqueen el fruto de su trabajo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tienda una trampa'; el verbo hebreo puede significar poner una trampa o atrapar, aunque aquí probablemente alude a que el acreedor reclama y se apodera de sus bienes.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְנַקֵּשׁ
  english_pob_choice: seize
  chosen_spanish: se apodere
  alternatives_spanish:
  - atrape
  - tienda una trampa
  - se apodere de
  lexicon: HALOT
  rationale: El piʿel de נקש puede expresar la idea de tender una trampa o capturar; en este contexto con נֹשֶׁה y el objeto 'todo lo que le pertenece', la idea es de apropiación agresiva. 'Se apodere' comunica bien en español la acción de tomar posesión/embargar con fuerza sin perder del todo la posible resonancia de captura.
- source_word: נ֭וֹשֶׁה
  english_pob_choice: creditor
  chosen_spanish: acreedor
  alternatives_spanish:
  - prestamista
  - usurero
  - el que presta
  lexicon: HALOT
  rationale: El sustantivo designa a quien presta y exige el pago. 'Acreedor' es el equivalente natural y suficientemente amplio en español; evita cargar el término con matices no explícitos del hebreo.
- source_word: לְכָל אֲשֶׁר לוֹ
  english_pob_choice: all that belongs to him
  chosen_spanish: todo lo que le pertenece
  alternatives_spanish:
  - todo lo que tiene
  - todo lo que es suyo
  - todo cuanto posee
  lexicon: HALOT
  rationale: La frase abarca de manera total sus bienes o posesiones. 'Todo lo que le pertenece' conserva la amplitud posesiva y suena idiomático en español moderno.
- source_word: וְיָבֹזּוּ
  english_pob_choice: plunder
  chosen_spanish: saqueen
  alternatives_spanish:
  - despojen
  - despojen de sus bienes
  - roben
  lexicon: HALOT
  rationale: בזז expresa tomar botín por la fuerza. 'Saqueen' conserva el matiz violento y predatorio mejor que alternativas más neutras o arcaizantes.
- source_word: זָרִים
  english_pob_choice: strangers
  chosen_spanish: extraños
  alternatives_spanish:
  - forasteros
  - forasteros ajenos
  - extranjeros
  lexicon: HALOT
  rationale: El término apunta a quienes están fuera del círculo propio, sin precisar etnia o nacionalidad. 'Extraños' mantiene ese valor relacional y el registro poético.
- source_word: יְגִיעוֹ
  english_pob_choice: the fruit of his labor
  chosen_spanish: el fruto de su trabajo
  alternatives_spanish:
  - su labor
  - su esfuerzo
  - lo que ganó con su trabajo
  lexicon: HALOT
  rationale: יְגִיעַ puede referirse al resultado del trabajo, no solo al acto mismo. 'El fruto de su trabajo' explicita el producto de la labor y sigue siendo una expresión natural en español.
theological_decisions:
- issue: Fuerza jussiva/imprecativa de los verbos
  english_pob_reading: 'Render the verbs as wishes/prayers: ''May ... seize ... and may ... plunder ...'''
  chosen_spanish_reading: Que ... se apodere ... y que ... saqueen ...
  alternative_spanish_readings:
  - Acreedor se apoderará ... y extraños saquearán ...
  - Acreedor que se apodere ... y extraños que saqueen ...
  rationale: En el marco imprecatorio del Salmo 109, los yiqtol se entienden mejor como expresiones volitivas/de deseo, no como simple futuro narrativo. El español con 'Que ...' preserva esa fuerza de ruego/maldición sin convertirlo en mera predicción.
  doctrine_reference: Translation philosophy §3; preserve tension where present
translation_notes:
  revision_awareness: 'El texto sigue de cerca la solución auditada en inglés y mantiene la tensión léxica principal de יְנַקֵּשׁ: se traduce de manera contextual como apropiación/agresión, sin perder la posibilidad semántica de ''tender una trampa''. No hubo revisiones posteriores que alteren la decisión.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como terminología estándar del proyecto cuando el Tetragrámaton sea pertinente; este versículo no lo contiene.
  - '''Acreedor'' conserva el campo semántico económico sin introducir un matiz interpretativo más fuerte como ''usurero''.'
  - '''Extraños'' sigue la decisión del inglés POB de no especificar nacionalidad, manteniendo el contraste poético de los de fuera.'
