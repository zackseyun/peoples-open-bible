revisions:
- from: Y descendieron a Egipto[a], porque un hambre cubrió la faz de la tierra de Canaán, y allí habitaron como forasteros hasta que fueron proveídos; y allí llegaron a ser una multitud muy grande, y no había número para su descendencia.
  to: Y descendieron a Egipto, porque una hambruna cubrió la faz de la tierra de Canaán, y allí habitaron como forasteros hasta que fueron sustentados; y allí llegaron a ser una multitud muy grande, y no había número de su descendencia[a].
  rationale: Se ajusta «un hambre» a «una hambruna» para reflejar mejor λιμός en contexto histórico; se reemplaza «fueron proveídos» por «fueron sustentados» por naturalidad y fidelidad a διετράφησαν; y se corrige la nota para preservar la alternativa léxica de γένος sin invertir el sentido de «no había número». No se requiere adjudicación adicional porque los cambios son claros y de bajo riesgo doctrinal.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:05:02Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido general del griego: descenso a Egipto, causa por hambre en Canaán, residencia temporal, multiplicación y carácter incontable del grupo. Sin embargo, dos elecciones debilitan la fidelidad léxica: λιμός pide más bien «hambre/famine» en sentido de calamidad colectiva, que en español se expresa mejor como «hambruna» o «hambre extrema», y «fueron proveídos» no es la forma natural ni más clara para διετράφησαν. Además, la nota al pie actual no preserva correctamente la alternativa inglesa, porque convierte «no había número de su linaje/pueblo» en una paráfrasis distinta.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero presenta detalles mejorables: «fueron proveídos» suena forzado y poco idiomático; «un hambre» es comprensible, pero menos natural que «una hambruna» en narrativa histórica; y la nota al pie necesita una formulación más precisa y natural. «Descendieron», «la faz de la tierra», «habitaron como forasteros» y «su descendencia» son lecturas aceptables y legibles.'
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. La decisión «su descendencia» para γένος concuerda con la revisión inglesa y evita «raza». «Habitaron como forasteros» conserva bien el matiz de παρῴκησαν. La principal mejora necesaria es estilística y de precisión léxica en «hambruna» y «fueron sustentados».
  issues:
  - severity: medium
    issue: «un hambre» para λιμός
    rationale: Aunque comprensible, en español bíblico y narrativo «hambruna» expresa mejor una calamidad de hambre sobre la tierra, más cercano a «famine».
  - severity: medium
    issue: «fueron proveídos» para διετράφησαν
    rationale: La forma es poco natural en español general y eclesial. «Fueron sustentados» o «recibieron sustento» transmite mejor la pasiva de ser mantenidos/provistos.
  - severity: medium
    issue: Nota al pie no corresponde a la alternativa preservada
    rationale: La nota actual dice «hubo un número interminable», que invierte el sentido de οὐκ ἦν ἀριθμός. Debe conservar una alternativa como «no había número de su linaje/pueblo».
  revised_spanish_text: Y descendieron a Egipto, porque una hambruna cubrió la faz de la tierra de Canaán, y allí habitaron como forasteros hasta que fueron sustentados; y allí llegaron a ser una multitud muy grande, y no había número de su descendencia[a].
  revised_footnotes:
  - marker: a
    text: O «de su linaje» o «de su pueblo»; el griego γένος puede denotar descendencia, linaje, grupo de parentesco o pueblo descendiente de un antepasado común.
    reason: lexical_alternative
  revision_rationale: Se ajusta «un hambre» a «una hambruna» para reflejar mejor λιμός en contexto histórico; se reemplaza «fueron proveídos» por «fueron sustentados» por naturalidad y fidelidad a διετράφησαν; y se corrige la nota para preservar la alternativa léxica de γένος sin invertir el sentido de «no había número». No se requiere adjudicación adicional porque los cambios son claros y de bajo riesgo doctrinal.
