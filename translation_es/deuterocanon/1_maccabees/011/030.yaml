  - severity: low
    issue: '''salud'' es menos natural en español contemporáneo que ''saludos'' para χαίρειν.'
    rationale: Aunque 'salud' puede funcionar como fórmula epistolar tradicional, 'saludos' comunica la salutación de manera más clara y natural en español moderno sin sobreparáfrasis.
  revised_spanish_text: El rey Demetrio a Jonatán su hermano, saludos, y a la nación de los judíos[a].
