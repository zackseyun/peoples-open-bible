id: 1PE.2.20
reference: 1 Peter 2:20
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ποῖον γὰρ κλέος εἰ ἁμαρτάνοντες καὶ κολαφιζόμενοι ὑπομενεῖτε; ἀλλ’ εἰ ἀγαθοποιοῦντες καὶ πάσχοντες ὑπομενεῖτε, τοῦτο χάρις παρὰ θεῷ.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/002/020.yaml
  text: 'For what credit is it if, when you are sinning and being beaten, you endure? But if, when you are doing good and suffering, you endure, this is grace before God.'
translation:
  language: ko
  text: '여러분이 죄를 짓고 매를 맞을 때에 견딘다면 무슨 자랑이 되겠습니까? 그러나 여러분이 선을 행하다가 고난당하면서 견딘다면, 이것이 하나님 앞에서의 은혜로운 일입니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: κλέος
  english_pob_choice: credit
  chosen_korean: 자랑
  alternatives_korean:
  - 칭찬
  - 명예
  lexicon: BDAG
  rationale: κλέος의 「영예·자랑거리」 의미를 평이하게 「자랑」으로 옮긴다.
- source_word: κολαφιζόμενοι
  english_pob_choice: being beaten
  chosen_korean: 매를 맞을 때
  alternatives_korean:
  - 주먹으로 맞을 때
  - 구타당할 때
  lexicon: BDAG
  rationale: κολαφίζω는 주먹·손바닥으로 가격하는 폭력. 「매를 맞다」로 옮긴다.
- source_word: ὑπομενεῖτε
  english_pob_choice: endure
  chosen_korean: 견딘다
  alternatives_korean:
  - 참는다
  - 인내한다
  lexicon: BDAG
  rationale: ὑπομένω의 「버티어 견딤」을 「견디다」로 옮긴다.
- source_word: χάρις παρὰ θεῷ
  english_pob_choice: grace before God
  chosen_korean: 하나님 앞에서의 은혜로운 일
  alternatives_korean:
  - 하나님 보시기에 은혜로운 일
  - 하나님께 받으심직한 일
  lexicon: BDAG
  rationale: 2:19와 통일하여 χάρις를 「은혜로운 일」로 옮긴다.
