translation:
  language: es
  text: 'Así dice Yahvé acerca de este pueblo: Así han amado vagar[a]; no han refrenado sus pies. Por tanto, Yahvé no los acepta[b]. Ahora recordará su iniquidad y castigará sus pecados[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «amaron vagar» o «han amado andar vagando».'
    reason: lexical_alternative
  - marker: b
    text: O, «Yahvé no se complace en ellos».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «recordará su iniquidad y visitará sus pecados sobre ellos», un modismo hebreo de poner el pecado en cuenta en juicio.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto y no se sustituye por un título. En español, 'Yahvé' es la forma transparente y acorde con la política del proyecto.
- source_word: לָעָם הַזֶּה
  english_pob_choice: concerning this people
  chosen_spanish: acerca de este pueblo
  alternatives_spanish:
  - con respecto a este pueblo
  - sobre este pueblo
  lexicon: HALOT
  rationale: La preposición ל introduce el objeto del dicho profético. 'Acerca de' comunica bien el alcance del oráculo en español sin volverlo demasiado literal o pesado.
- source_word: כֵּן
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - De esta manera
  - Entonces
  lexicon: HALOT
  rationale: כֵּן aquí retoma el modo o la manera. 'Así' mantiene la brevedad y evita duplicación artificial con el comienzo del versículo.
- source_word: אָהֲבוּ לָנוּעַ
  english_pob_choice: they have loved to wander
  chosen_spanish: han amado andar errantes
  alternatives_spanish:
  - han amado vagar
  - han amado andar de un lado a otro
  lexicon: HALOT
  rationale: Se conserva el valor afectivo de אָהַב + infinitivo y el matiz de נוּעַ como errancia o inestabilidad. 'Andar errantes' suena natural y mantiene la imagen moral.
- source_word: לָנוּעַ
  english_pob_choice: to wander
  chosen_spanish: andar errantes
  alternatives_spanish:
  - vagar
  - desviarse
  lexicon: HALOT
  rationale: En este contexto, נוּעַ no es simple movimiento físico sino conducta de desvío/restless roaming. 'Andar errantes' comunica la idea sin perder el verbo de movimiento.
- source_word: רַגְלֵיהֶם לֹא חָשָׂכוּ
  english_pob_choice: they have not restrained their feet
  chosen_spanish: no han refrenado sus pies
  alternatives_spanish:
  - no han detenido sus pies
  - no han contenido sus pasos
  lexicon: HALOT
  rationale: Se conserva la imagen de los pies como metonimia del caminar y la conducta. 'Refrenar' es un equivalente claro para חָשַׂךְ en este contexto.
- source_word: לֹא רָצָם
  english_pob_choice: does not accept them
  chosen_spanish: no los acepta
  alternatives_spanish:
  - no se complace en ellos
  - no los favorece
  lexicon: HALOT
  rationale: רָצָה aquí expresa aceptación/favor divino. 'No los acepta' mantiene el sentido relacional y covenantal que el inglés POB también privilegia.
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - En este momento
  - Pues ahora
  lexicon: HALOT
  rationale: Marca la consecuencia presente del comportamiento anterior. 'Ahora' es la opción más directa y natural en español.
- source_word: יִזְכֹּר עֲוֺנָם
  english_pob_choice: he will remember their iniquity
  chosen_spanish: recordará su iniquidad
  alternatives_spanish:
  - recordará su culpa
  - traerá a la memoria su iniquidad
  lexicon: HALOT
  rationale: Se mantiene el verbo 'recordar' como lenguaje judicial de memoria divina, no mera rememoración. 'Iniquidad' conserva el peso moral del hebreo.
- source_word: וְיִפְקֹד חַטֹּאתָם
  english_pob_choice: and punish their sins
  chosen_spanish: y castigará sus pecados
  alternatives_spanish:
  - y visitará sus pecados sobre ellos
  - y cobrará cuentas de sus pecados
  lexicon: HALOT
  rationale: פָּקַד en contexto judicial puede traducirse como castigar. 'Castigará' es idiomático en español y evita una expresión demasiado literal que podría oscurecer el juicio.
- source_word: עֲוֺנָם / חַטֹּאתָם
  english_pob_choice: their iniquity / their sins
  chosen_spanish: su iniquidad / sus pecados
  alternatives_spanish:
  - su culpa / sus faltas
  - su maldad / sus transgresiones
  lexicon: HALOT
  rationale: Se conserva la distinción entre עָוֺן y חַטָּאת para no nivelar el paralelismo hebreo. 'Iniquidad' y 'pecados' son términos reconocibles y teológicamente cargados en español.
theological_decisions:
- issue: Lenguaje de juicio en la última cola
  english_pob_reading: Now he will remember their iniquity and punish their sins
  chosen_spanish_reading: Ahora recordará su iniquidad y castigará sus pecados
  alternative_spanish_readings:
  - Ahora recordará su iniquidad y visitará sus pecados sobre ellos
  - Ahora traerá a cuenta su iniquidad y sus pecados
  rationale: El hebreo usa un modismo judicial de memoria y visita/castigo. 'Castigará' expresa claramente la acción de juicio sin ocultar la fuerza teológica del texto. La alternativa más literal puede preservarse como nota si se desea visibilizar el modismo.
  doctrine_reference: Mantener la tensión judicial-covenantal del texto sin sobreexplicar ni suavizar la advertencia profética.
- issue: Nombre divino en el discurso profético
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se preserva el nombre revelado de Dios conforme a la política del proyecto y al audit trail inglés. No se sustituye por una convención litúrgica que oculte el Tetragrámaton.
  doctrine_reference: Transparencia del nombre divino; evitar sustitución por título.
translation_notes:
  revision_awareness: Tomé como referencia el audit trail inglés más reciente, que prefirió una forma directa de כֵן como 'Thus' y mantuvo el final en lenguaje de juicio claro. En español, opté por 'Así' para el paralelismo inicial y por 'Por tanto' para reproducir la consecuencia lógica de la cláusula siguiente sin perder el registro profético. También conservé la distinción entre 'iniquidad' y 'pecados' y mantuve el nombre divino 'Yahvé'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en todo el versículo, conforme al estándar del proyecto.
  - '''Andar errantes'' preserva el valor de movimiento desviado sin sonar arcaizante.'
  - '''No los acepta'' evita una paráfrasis demasiado libre y refleja el rechazo/favor divino implícito en רָצָה.'
  - 'La última cola conserva el paralelismo hebreo con dos términos distintos: ''iniquidad'' y ''pecados''.'
