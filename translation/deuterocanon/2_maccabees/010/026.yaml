  text: εὖ οὖν ποιήσεις διαπεμψάμενος πρὸς αὐτοὺς καὶ δοὺς δεξιάς, ὅπως εἰδότες τὴν ἡμετέραν προαίρεσιν εὔθυμοί τε ὦσιν, καὶ ἡδέως διαγίνωνται πρὸς τῇ τῶν ἰδίων ἀντιλήψει.
