translation:
  language: es
  text: Y pondré un lugar para mi pueblo Israel, y los plantaré; y habitarán en su propio lugar y no serán perturbados nunca más. Y los hijos de maldad[a] no seguirán desgastándolos, como al principio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'malhechores'.
    reason: lexical_alternative
  - marker: b
    text: O 'como antes' o 'como antiguamente'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתִּי
  english_pob_choice: I will appoint
  chosen_spanish: pondré
  alternatives_spanish:
  - estableceré
  - apartaré
  - designaré
  lexicon: HALOT
  rationale: שׂוּם significa literalmente 'poner/colocar', pero con מָקוֹם y el pueblo como objeto transmite la idea de asignar o establecer un lugar. 'Pondré' conserva el valor básico del verbo y en español resulta natural sin perder la iniciativa divina.
- source_word: מָקוֹם
  english_pob_choice: a place
  chosen_spanish: un lugar
  alternatives_spanish:
  - un sitio
  - una morada
  - un asentamiento
  lexicon: HALOT
  rationale: El sentido básico es 'lugar'. 'Un lugar' es la opción más directa y comprensible; no hace falta ampliar el término más allá de lo que el hebreo exige.
- source_word: לְעַמִּי יִשְׂרָאֵל
  english_pob_choice: for my people Israel
  chosen_spanish: para mi pueblo Israel
  alternatives_spanish:
  - para Israel, mi pueblo
  - para mi pueblo, Israel
  lexicon: HALOT
  rationale: Se preserva la relación de pacto y la posesión divina. 'Mi pueblo Israel' refleja bien el hebreo sin forzar un giro más marcadamente litúrgico.
- source_word: וּנְטַעְתִּיהוּ
  english_pob_choice: and plant them
  chosen_spanish: lo plantaré
  alternatives_spanish:
  - los plantaré
  - y lo estableceré
  - y lo asentaré
  lexicon: HALOT
  rationale: La raíz נטע es 'plantar'. Aunque el sufijo es singular, el referente es colectivo; en español, el pronombre singular neutro 'lo' permite conservar la forma del hebreo sin perder la referencia corporativa a Israel.
- source_word: וְשָׁכַן
  english_pob_choice: and they will dwell
  chosen_spanish: habitará
  alternatives_spanish:
  - y habitarán
  - y morará
  - y permanecerá
  lexicon: HALOT
  rationale: La forma hebrea es singular, pero se refiere colectivamente a Israel. 'Habitará' mantiene el paralelismo y el sentido de asentamiento estable; el singular funciona en español para el sujeto corporativo.
- source_word: תַּחְתָּיו
  english_pob_choice: in their own place
  chosen_spanish: en su propio lugar
  alternatives_spanish:
  - bajo él
  - en su lugar
  - en su propio asiento
  lexicon: HALOT
  rationale: Aunque literalmente es 'debajo de él/ello', en este contexto idiomático expresa seguridad y permanencia en el sitio concedido. 'En su propio lugar' comunica esa idea con claridad en español.
- source_word: יִרְגַּז
  english_pob_choice: be disturbed
  chosen_spanish: será perturbado
  alternatives_spanish:
  - se estremecerá
  - será agitado
  - será sacudido
  lexicon: HALOT
  rationale: El verbo puede indicar agitación o conmoción. En contexto de seguridad nacional, 'ser perturbado' expresa bien la pérdida de tranquilidad provocada por enemigos o inestabilidad.
- source_word: עוֹד
  english_pob_choice: no more
  chosen_spanish: más
  alternatives_spanish:
  - ya
  - nunca más
  - de nuevo
  lexicon: HALOT
  rationale: Con negación, el adverbio señala cese continuo hacia el futuro. En español, 'no será perturbado más' mantiene la idea de cese definitivo sin añadir solemnidad innecesaria.
- source_word: בְנֵי עַוְלָה
  english_pob_choice: the sons of wickedness
  chosen_spanish: los hijos de maldad
  alternatives_spanish:
  - los hijos de injusticia
  - los malvados
  - los malhechores
  lexicon: HALOT
  rationale: Se conserva el giro hebreo 'hijos de…' para mantener la fuerza retórica. 'Maldad' es una equivalencia transparente que respeta el paralelismo y evita aplanar el idiomático hebraísmo.
- source_word: לְבַלֹּתוֹ
  english_pob_choice: wear them down
  chosen_spanish: desgastándolo
  alternatives_spanish:
  - consumirlo
  - afligirlo
  - oprimirlo
  lexicon: HALOT
  rationale: בלה en este contexto comunica desgaste prolongado. 'Desgastándolo' reproduce la idea de daño sostenido y acumulativo con buena naturalidad en español.
- source_word: כַּאֲשֶׁר בָּרִאשׁוֹנָה
  english_pob_choice: as at the first
  chosen_spanish: como al principio
  alternatives_spanish:
  - como antes
  - como en un principio
  - como antiguamente
  lexicon: HALOT
  rationale: La expresión mira hacia un período anterior en la historia de Israel. 'Como al principio' es breve, clara y cercana al hebreo, manteniendo el tono elevado del texto.
theological_decisions:
- issue: Referencia colectiva a Israel en formas singulares
  english_pob_reading: Render the collective references with plural English pronouns ('them,' 'they') for clarity while preserving Israel as a corporate people.
  chosen_spanish_reading: Conservar el referente corporativo de Israel con singular gramatical donde el español lo permite, sin perder el sentido colectivo.
  alternative_spanish_readings:
  - usar plural constante ('los plantaré', 'habitarán')
  - usar singular estricto con 'ello' para el lugar
  rationale: El hebreo alterna formas singulares colectivas. En español, el singular puede sonar natural para un pueblo como sujeto corporativo; en 'lo plantaré' y 'habitará' se conserva la cohesión del texto sin introducir una pluralidad innecesaria que desdibuje la estructura hebrea.
  doctrine_reference: Translation philosophy §1, §6
- issue: Interpretación idiomática de תַּחְתָּיו
  english_pob_reading: Translate idiomatically as settled possession/security ('in their own place').
  chosen_spanish_reading: Traducir idiomáticamente la seguridad de posesión como 'en su propio lugar'.
  alternative_spanish_readings:
  - '''debajo de él/ello'''
  - '''en su lugar'''
  - '''bajo él'''
  rationale: La literalidad de 'debajo de él' sería oscura y puede confundir. El contexto promete estabilidad y asentamiento seguro; por eso se prioriza una expresión española clara que conserve la intención del hebreo.
  doctrine_reference: Translation philosophy §1, §6
- issue: Construcción verbal con בנה/נטע y el asentamiento del pueblo
  english_pob_reading: I will plant them
  chosen_spanish_reading: lo plantaré
  alternative_spanish_readings:
  - los plantaré
  - lo estableceré
  - lo asentaré
  rationale: La metáfora de plantar se mantiene porque es parte del modo bíblico de hablar de la estabilidad de Israel. El singular 'lo' evita una concordancia forzada con 'pueblo' y preserva la referencia corporativa.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y la auditoría inglesa: conserva el paralelismo ''poner un lugar / plantar / habitar'', refleja el valor colectivo de Israel y mantiene la expresión idiomática ''no será perturbado más'' y ''como al principio''. También se respetó la revisión inglesa que añadió ''will'' antes de ''plant'' con una secuencia verbal española fluida y consistente.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' por norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece directamente.
  - '''Pueblo Israel'' mantiene el orden semítico y la relación de pacto.'
  - '''Hijos de maldad'' conserva la fuerza idiomática hebrea sin sustituirla por una paráfrasis demasiado interpretativa.'
  - Se evita 'SEÑOR' o 'Cristo' porque no corresponden al hebreo de este versículo.
  - El singular gramatical en 'lo plantaré' y 'habitará' se usa como colectivo, en coherencia con el hebreo y con el estilo del español bíblico formal.
