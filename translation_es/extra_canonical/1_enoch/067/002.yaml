base_translation:
  language: en
  yaml_path: translation/extra_canonical/1_enoch/067/002.yaml
  text: And now the angels are making a wooden structure[a]; and when the angels have finished that, I will place my hand upon it and guard it, and from it there will come the seed of life, and a transformation will occur[e][d][c][b], so that the dry ground may not remain barren.
  footnotes:
  - marker: a
    text: The Ge'ez of this verse is difficult in several places, especially the clause involving 'my hands upon it' and the expression rendered 'wooden vessels.' The translation keeps the imagery visible rather than smoothing it into a more certain paraphrase.
    reason: textual_variant
  - marker: b
    text: Or 'woodwork,' 'wooden structures,' possibly even 'trees,' depending on how the underlying noun is taken.
    reason: lexical_alternative
  - marker: c
    text: '''Seed of life'' is rendered literally. It may refer to life-giving offspring, generative power, or renewed fertility.'
    reason: lexical_alternative
  - marker: d
    text: Or 'and when they have finished all this, the angels will place my hands upon it and keep watch over it'.
    reason: previous_rendering
  - marker: e
    text: Or 'wooden vessels'.
    reason: previous_rendering
