review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: la adición enfática («Y también»), el relativo («lo que no pediste»), los dos dones («riquezas» y «honra/honor»), y la comparación final con אִישׁ preservada como «hombre». Sin embargo, la nota al pie no corresponde al lugar anclado en el texto y documenta una alternativa para la cláusula final, no para «lo que no pediste».'
  spanish_quality_summary: El español es claro y digno. La frase principal suena natural. No obstante, en español bíblico general «honor» resulta más natural y ampliamente legible que «honra» aquí, sin pérdida de sentido. Además, conviene explicitar «tanto ... como ...» para reflejar mejor la repetición de גַּם. La nota debe reanclarse donde realmente aplica.
  glossary_alignment: No hay conflicto con los términos del proyecto. No aparece Yahvé en este versículo. La preservación de אִישׁ como «hombre» está bien alineada con la política de exactitud de género. El ajuste de «honra» a «honor» responde a legibilidad española, no a cambio teológico.
  issues:
  - severity: medium
    issue: La nota al pie está anclada en «pediste[a]», pero su contenido ofrece una alternativa para la cláusula final comparativa.
    rationale: Esto rompe la correspondencia requerida entre marcador y lugar relevante del texto. La nota debe ir junto a la cláusula «de modo que...», no junto a «lo que no pediste».
  - severity: low
    issue: «honra» es posible, pero «honor» es más natural y ampliamente comprensible en español neutro contemporáneo.
    rationale: Ambas opciones son fieles a כָּבוֹד en este contexto; «honor» mejora la legibilidad sin perder el matiz de prestigio real.
  - severity: low
    issue: La secuencia «riquezas y honra» no refleja tan claramente el doble גַּם como podría hacerlo «tanto riquezas como honor».
    rationale: El hebreo marca dos beneficios distintos con repetición aditiva. «Tanto ... como ...» conserva mejor esa fuerza en español idiomático.
  revised_spanish_text: 'Y también te he dado lo que no pediste: tanto riquezas como honor, de modo que no ha habido hombre como tú entre los reyes todos tus días[a].'
  revised_footnotes:
  - marker: a
    text: 'O: «para que no haya habido hombre como tú entre los reyes todos tus días».'
    reason: alternative_reading
  revision_rationale: Se corrige la ubicación de la nota para que corresponda a la cláusula que realmente comenta; se mejora la legibilidad con «honor»; y se refuerza la doble adición de גַּם con «tanto ... como ...», manteniendo intacto el sentido fuente y la preservación de «hombre» por אִישׁ.
