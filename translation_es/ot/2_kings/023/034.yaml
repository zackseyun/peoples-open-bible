revisions:
- from: Y el faraón Necao hizo rey a Eliaquim, hijo de Josías, en lugar de Josías su padre[a], y cambió su nombre a Joacim. Pero tomó a Joacaz[b], y éste vino a Egipto y murió allí.
  to: Y el faraón Necao hizo rey a Eliaquim, hijo de Josías, en lugar de Josías su padre, y cambió su nombre a Joacim. Pero tomó a Joacaz[b], y él vino[a] a Egipto y murió allí.
  rationale: Se reubica la nota textual al verbo «vino», donde realmente pertenece, y se corrige su contenido para reflejar el alternativo documentado («fue»). También se suaviza «éste» a «él» para una lectura más natural sin perder la claridad del cambio de sujeto.
