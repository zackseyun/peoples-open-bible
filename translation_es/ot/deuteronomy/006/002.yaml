translation:
  language: es
  text: 'para que temas a Yahvé tu Dios[a], guardando todos sus estatutos y sus mandamientos que yo te mando: tú, tu hijo y tu nieto[b], todos los días de tu vida, y para que tus días se prolonguen.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «reverencies a Yahvé tu Dios». El verbo hebreo puede incluir reverencia y asombro además de temor.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «tú, tu hijo y el hijo de tu hijo».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: HALOT
  rationale: Expresa la finalidad del hebreo con naturalidad en español y conserva el valor de propósito/resultadoreal sin sobrecarga formal.
- source_word: תִּירָא
  english_pob_choice: you may fear
  chosen_spanish: temas
  alternatives_spanish:
  - reverencies
  - tengas temor de
  lexicon: HALOT
  rationale: «Temas» conserva el peso de ירא en contexto pactual; en español bíblico moderno puede sonar más natural que una perífrasis con «miedo», pero mantiene la tensión reverencial sin suavizarla a simple respeto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención POB de transliterar el Tetragrámaton como «Yahvé», preservando el nombre propio divino en vez de sustituirlo por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  - tu Dios
  lexicon: HALOT
  rationale: La forma posesiva directa refleja el pacto personal del hebreo sin añadir matices no presentes en el texto.
- source_word: לִשְׁמֹר
  english_pob_choice: by keeping
  chosen_spanish: guardando
  alternatives_spanish:
  - observando
  - para guardar
  lexicon: HALOT
  rationale: El infinitivo constriñe la manera en que se expresa el temor; «guardando» suena natural en español y mantiene el vínculo entre temor y obediencia.
- source_word: חֻקֹּתָיו
  english_pob_choice: his statutes
  chosen_spanish: sus estatutos
  alternatives_spanish:
  - sus decretos
  - sus ordenanzas
  lexicon: HALOT
  rationale: «Estatutos» distingue este término de «mandamientos» y conserva el registro legal-covenantal.
- source_word: מִצְוֺתָיו
  english_pob_choice: his commandments
  chosen_spanish: sus mandamientos
  alternatives_spanish:
  - sus órdenes
  - sus preceptos
  lexicon: HALOT
  rationale: «Mandamientos» mantiene la distinción semántica con חֻקֹּתָיו y es claro para lectores actuales.
- source_word: אֲשֶׁר אָנֹכִי מְצַוֶּךָ
  english_pob_choice: that I am commanding you
  chosen_spanish: que yo te mando
  alternatives_spanish:
  - que yo te estoy mandando
  - que yo te ordeno
  lexicon: HALOT
  rationale: El participio hebreo expresa acción en curso; en español «te mando» comunica la fuerza presente del hablante sin forzar una perífrasis poco natural.
- source_word: אַתָּה וּבִנְךָ וּבֶן בִּנְךָ
  english_pob_choice: you—you and your son and your grandson
  chosen_spanish: tú, y tu hijo, y el hijo de tu hijo
  alternatives_spanish:
  - tú, y tu hijo, y tu nieto
  - tú y tus hijos y nietos
  lexicon: HALOT
  rationale: Se conserva la explicitud del hebreo «hijo de tu hijo»; «nieto» sería idiomático, pero la formulación analítica evita nivelar la imagen genealógica del texto.
- source_word: כֹּל יְמֵי חַיֶּיךָ
  english_pob_choice: all the days of your life
  chosen_spanish: todos los días de tu vida
  alternatives_spanish:
  - toda tu vida
  - durante toda tu vida
  lexicon: HALOT
  rationale: Reproduce la distribución literal de «días» sin perder fluidez en español.
- source_word: וּלְמַעַן
  english_pob_choice: and so that
  chosen_spanish: y para que
  alternatives_spanish:
  - y a fin de que
  - así que
  lexicon: HALOT
  rationale: Mantiene la segunda cláusula final unida a la anterior con una conjunción explícita, como en el hebreo.
- source_word: יַאֲרִכֻן יָמֶיךָ
  english_pob_choice: your days may be prolonged
  chosen_spanish: tus días se alarguen
  alternatives_spanish:
  - se prolonguen tus días
  - tengas larga vida
  lexicon: HALOT
  rationale: La imagen hebrea de días ‘alargados’ se conserva de forma idiomática; «se alarguen» evita convertirla en una paráfrasis interpretativa.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa יהוה. La POB en inglés lo translitera como «Yahweh»; en español, la forma equivalente y ya adoptada en el proyecto es «Yahvé», que preserva el nombre propio divino y evita la sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Sentido de ירא respecto de Dios
  english_pob_reading: fear
  chosen_spanish_reading: temas
  alternative_spanish_readings:
  - reverencies
  - tengas reverencia
  rationale: «Temer» mantiene la tensión bíblica de reverencia, awe y temor real ante Dios. No se suaviza a «respetar» para no perder el peso teológico del mandato.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: preserve theological tension rather than resolve it'
- issue: Relación entre temor y obediencia
  english_pob_reading: by keeping all his statutes and his commandments
  chosen_spanish_reading: guardando todos sus estatutos y sus mandamientos
  alternative_spanish_readings:
  - observando todos sus estatutos y sus mandamientos
  - cumpliendo todos sus estatutos y sus mandamientos
  rationale: El hebreo vincula el temor de Yahvé con la obediencia concreta. «Guardando» conserva esa relación causal/manifestativa sin introducir un matiz más moralizante que el del texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: 'El inglés auditado pasó por una revisión menor de puntuación: se añadió una coma después de ''your God'' para claridad sintáctica, sin alterar el contenido. La formulación española preserva esa misma estructura causal con una pausa natural antes del gerundio y no introduce elementos ausentes del hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar POB para יהוה.
  - Se distingue «estatutos» de «mandamientos» para conservar la duplicidad legal del hebreo.
  - Se traduce el participio presente con presente español («te mando») sin importar 'hoy', que no aparece en este versículo.
  - Se conserva la secuencia generacional explícita («tu hijo... el hijo de tu hijo») en lugar de generalizar a 'descendientes'.
  - No se añaden notas al pie porque la redacción española no crea una ambigüedad nueva necesaria para la publicación en este caso.
