  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: וְנִשְׁמַד = «será destruido», מוֹאָב = «Moab», כִּי = «porque», יְהוָה = «Yahvé», y הִגְדִּיל עַל־יְהוָה se capta correctamente como autoexaltación hostil «contra Yahvé». El punto mejorable es מֵעָם, donde «como pueblo» es comprensible pero menos natural en español que una formulación que exprese con más claridad la pérdida de condición nacional.'
  spanish_quality_summary: El español es claro y digno, pero «será destruido como pueblo» suena algo calcado. «Será destruido como nación» o «dejará de existir como pueblo» fluye mejor; dado el valor categorial de מֵעָם, «como nación» comunica con naturalidad la idea de entidad nacional distinta sin alejarse del sentido. También conviene limpiar la puntuación de la nota al pie, quitando comillas innecesarias iniciales.
  glossary_alignment: 'Alineado con la terminología del proyecto: יְהוָה se traduce correctamente «Yahvé»; no hay conflicto con otros términos clave. La decisión «se engrandeció» para הִגְדִּיל mantiene bien el matiz de autoexaltación arrogante y está bien respaldada por la nota.'
  issues:
