translation:
  language: es
  text: 'Y las dos esposas de David habían sido tomadas cautivas: Ahinoam la jezreelita[a] y Abigail[b], la esposa de Nabal el carmelita.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Esto significa una mujer de Jezreel o procedente de Jezreel.
    reason: lexical_alternative
  - marker: b
    text: Aquí "carmelita" significa un hombre de Carmel, no un miembro de una orden religiosa posterior.
    reason: cultural_note
lexical_decisions:
- source_word: וּשְׁתֵּי נְשֵׁי דָוִד
  english_pob_choice: And David’s two wives
  chosen_spanish: Y las dos esposas de David
  alternatives_spanish:
  - Y las dos mujeres de David
  - Y las dos mujeres casadas con David
  lexicon: WLC / HALOT
  rationale: El hebreo expresa una relación posesiva simple en plural constructo; en español, "esposas" comunica con naturalidad el vínculo matrimonial sin perder el sentido del original. "Mujeres" sería demasiado vago en este contexto.
- source_word: נִשְׁבּוּ
  english_pob_choice: had been taken captive
  chosen_spanish: habían sido tomadas cautivas
  alternatives_spanish:
  - fueron tomadas cautivas
  - habían sido capturadas
  lexicon: WLC / HALOT
  rationale: 'El nifal perfecto indica estado resultante: ya estaban cautivas cuando se relata el hecho. "Tomadas cautivas" conserva la fuerza del verbo de cautiverio mejor que solo "capturadas".'
- source_word: אֲחִינֹעַם
  english_pob_choice: Ahinoam
  chosen_spanish: Ahinoam
  alternatives_spanish:
  - Ajinoam
  lexicon: Transliteración propia
  rationale: Se mantiene el nombre propio en forma reconocible y cercana al uso bíblico en español; "Ajinoam" sería una adaptación fonética posible, pero menos estable en lectura eclesial amplia.
- source_word: הַיִּזְרְעֵלִית
  english_pob_choice: the Jezreelitess
  chosen_spanish: la jezreelita
  alternatives_spanish:
  - la mujer de Jezreel
  - la jezreelense
  lexicon: HALOT / gentilic feminine
  rationale: El adjetivo gentilicio femenino señala origen o procedencia. En español, "jezreelita" reproduce bien la función del hebreo y evita la ambigüedad explicativa de una paráfrasis.
- source_word: וַאֲבִיגַיִל
  english_pob_choice: and Abigail
  chosen_spanish: y Abigail
  alternatives_spanish:
  - e Abigail
  lexicon: Transliteración propia
  rationale: Se conserva el nombre propio con la conjunción simple, que es la forma natural en este contexto.
- source_word: אֵשֶׁת נָבָל
  english_pob_choice: the wife of Nabal
  chosen_spanish: la esposa de Nabal
  alternatives_spanish:
  - la mujer de Nabal
  - la esposa de Nabal
  lexicon: WLC / HALOT
  rationale: El hebreo usa un constructo identificador. "Esposa" es claro y preciso en español; aunque "la mujer de Nabal" es posible, puede sonar menos formal y menos específico.
- source_word: הַכַּרְמְלִי
  english_pob_choice: the Carmelite
  chosen_spanish: el carmelita
  alternatives_spanish:
  - el hombre de Carmel
  - el de Carmel
  lexicon: HALOT
  rationale: Aquí el gentilicio indica procedencia geográfica, no la orden religiosa posterior. En español, "carmelita" mantiene la concisión del hebreo y requiere la nota aclaratoria para evitar malentendido.
theological_decisions:
- issue: Estado resultante de la captura
  english_pob_reading: had been taken captive
  chosen_spanish_reading: habían sido tomadas cautivas
  alternative_spanish_readings:
  - fueron tomadas cautivas
  - estaban cautivas
  rationale: La forma compuesta en español comunica mejor que la condición de cautividad precede al relato inmediato. No introduce doctrina; solo preserva la secuencia narrativa del hebreo.
  doctrine_reference: Narrativa histórica / aspecto verbal
- issue: Gentilicio de Carmel sin lectura monástica
  english_pob_reading: the Carmelite here means a man from Carmel, not a member of a later religious order.
  chosen_spanish_reading: el carmelita como gentilicio geográfico
  alternative_spanish_readings:
  - el hombre de Carmel
  - el carmelitano
  rationale: Se evita proyectar el sentido religioso posterior sobre el texto antiguo. El término se entiende como procedencia, no como identidad monástica.
  doctrine_reference: Contexto histórico-lingüístico
translation_notes:
  revision_awareness: 'Concordancia alta con el texto hebreo y con la auditoría inglesa. Se preservan las decisiones principales del POB: captividad como estado resultante, gentilicio femenino para Ahinoam y gentilicio geográfico para Nabal. Se adapta la redacción a un español natural y publicable sin diluir la precisión léxica.'
  spanish_consistency_notes:
  - Se usa "tomadas cautivas" para mantener el matiz de cautiverio del nifal hebreo.
  - Se mantiene "jezreelita" como gentilicio femenino breve y reconocible.
  - Se conserva "carmelita" con nota aclaratoria para evitar la lectura monástica posterior.
  - No se introduce "Mesías", "SEÑOR" ni otras terminologías no presentes en el verso.
