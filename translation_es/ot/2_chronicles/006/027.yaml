review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: oír/perdonar/enseñar/enviar lluvia, mantiene «siervos», «tu pueblo Israel», «cuando» para כִּי, y conserva la idea pactual de «herencia». También preserva la nota sobre el modismo de oír desde el cielo. Sin embargo, hay un desajuste de tiempo verbal en español: el hebreo expresa una petición/jusivo dentro de la oración de Salomón, y «oirás... perdonarás... enviarás» suena más a afirmación futura que a súplica. Además, «los cielos» en el texto principal es menos natural aquí que «el cielo», mientras la alternativa literal plural puede quedar en nota.'
  spanish_quality_summary: 'El español es claro y digno, pero conviene ajustar el registro oracional para que suene como petición: «oye... perdona... enseña... envía» o «que oigas... perdones...». También es preferible «desde el cielo» en el texto principal por naturalidad bíblica en español. «En que han de andar» es entendible, pero «por el que deben andar» o «en el cual deben andar» fluye mejor con «camino»; aun así, no es un error grave. El resto es legible y fiel.'
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Siervos» está justificado contextualmente para עֲבָדֶיךָ. No aparece el nombre divino ni otros términos sensibles del glosario. «Herencia» preserva bien נחלה.
  issues:
  - severity: high
    issue: Los verbos principales están en futuro indicativo («oirás... perdonarás... enviarás») en vez de reflejar la fuerza peticional de la oración.
    rationale: En contexto, el hebreo forma parte de una súplica de Salomón; en español, el futuro simple puede sonar predictivo, no volitivo. Conviene usar imperativo reverente o subjuntivo exhortativo para preservar la función del texto.
  - severity: medium
    issue: «Desde los cielos» en el texto principal suena menos natural que «desde el cielo».
    rationale: Aunque הַשָּׁמַיִם es formalmente plural, en español bíblico y natural este modismo suele expresarse como «desde el cielo». La nota ya puede conservar la alternativa más literal «los cielos/el cielo».
  - severity: low
    issue: «en que han de andar» es algo tieso con «camino».
    rationale: No es infiel, pero «por el que deben andar» o «en el cual deben andar» suena más natural en español actual y mantiene la metáfora de conducta.
  revised_spanish_text: entonces oye[a] desde el cielo y perdona el pecado de tus siervos y de tu pueblo Israel, cuando les enseñes el buen camino por el que deben andar, y envía lluvia sobre tu tierra, que has dado a tu pueblo como herencia.
