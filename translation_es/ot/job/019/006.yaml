translation:
  language: es
  text: Sepan, pues, que Dios me ha agraviado[a] y me ha rodeado con su red[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me ha tratado injustamente» o «ha pervertido la justicia contra mí». El verbo hebreo puede expresar torcer, distorsionar o actuar con injusticia.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «su trampa» o «su red de caza».'
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּעוּ
  english_pob_choice: Know
  chosen_spanish: Sepan
  alternatives_spanish:
  - Sepan, pues
  - Conozcan
  - Reconozcan
  lexicon: HALOT / ידע
  rationale: El imperativo plural pide una apelación directa a los oyentes. «Sepan» comunica con naturalidad la exhortación a admitir un hecho, manteniendo el tono enfático del hebreo.
- source_word: אֵפוֹ
  english_pob_choice: then
  chosen_spanish: pues
  alternatives_spanish:
  - entonces
  - ahora
  - por tanto
  lexicon: HALOT / partícula discursiva
  rationale: La partícula refuerza la inferencia o insistencia del llamado. «Pues» funciona bien en español para dar ese empuje discursivo sin volver la frase pesada.
- source_word: אֱלוֹהַּ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios Todopoderoso
  lexicon: HALOT / אֱלוֹהַּ
  rationale: El término es el título singular para Dios; «Dios» conserva el valor básico sin añadir especificidad que el hebreo aquí no expresa.
- source_word: עִוְּתָנִי
  english_pob_choice: has wronged me
  chosen_spanish: me ha agraviado
  alternatives_spanish:
  - me ha hecho injusticia
  - ha pervertido la justicia contra mí
  - me ha tratado injustamente
  lexicon: HALOT / עות
  rationale: El verbo puede abarcar torcer, distorsionar o tratar injustamente. «Agraviado» preserva la carga de daño e injusticia en un español digno y natural, sin neutralizar la acusación de Job.
- source_word: מְצוּדוֹ
  english_pob_choice: his net
  chosen_spanish: su red
  alternatives_spanish:
  - su trampa
  - su red de caza
  lexicon: HALOT / מְצוּדָה
  rationale: El sustantivo puede referirse a una red o trampa de caza. «Red» mantiene la imagen concreta y la brevedad poética; la alternativa «trampa» sigue siendo posible, pero menos precisa a la metáfora principal.
- source_word: הִקִּיף עָלַי
  english_pob_choice: has surrounded me with
  chosen_spanish: me ha rodeado con
  alternatives_spanish:
  - me ha cercado con
  - ha cerrado sobre mí con
  lexicon: HALOT / הקיף
  rationale: El verbo expresa rodear o encerrar. «Me ha rodeado con» reproduce bien la construcción y mantiene la imagen de quedar cercado por la red.
theological_decisions:
- issue: La acusación directa de Job contra Dios
  english_pob_reading: Retain Job's direct claim that God 'has wronged me' without softening it.
  chosen_spanish_reading: 'Conservar la acusación directa: «Dios me ha agraviado».'
  alternative_spanish_readings:
  - Dios me ha afligido
  - Dios se ha vuelto contra mí
  - Dios me ha tratado injustamente
  rationale: El hebreo presenta una queja fuerte de injusticia o distorsión del derecho. La traducción mantiene esa tensión teológica sin resolverla ni atenuarla, en línea con la filosofía de la POB.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto base en inglés fue revisado y confirmado sin cambios en el último pase; el cotejo cruzado informa alta concordancia, por lo que esta versión española sigue de cerca el juicio léxico ya auditado.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלוֹהַּ, sin introducir «SEÑOR» ni «Yahvé», porque el hebreo aquí usa el título genérico singular para Dios.
  - Se conserva la metáfora concreta de la «red», siguiendo la decisión inglesa de mantener la imagen de caza y no sustituirla por una abstracción.
  - «Me ha agraviado» retiene la fuerza de injusticia del verbo sin suavizar la queja de Job.
