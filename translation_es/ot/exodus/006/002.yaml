review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja fielmente el hebreo: mantiene los dos verbos de habla («habló» / «dijo»), identifica correctamente a Dios como sujeto singular de אֱלֹהִים, conserva a Moisés como destinatario, y traduce יְהוָה como «Yahvé» conforme al proyecto. La única objeción es la nota al pie: en el rastro inglés se presenta como alternativa de forma del nombre divino, mientras que la nota española actual introduce una explicación doctrinal/traslativa no anclada a una alternativa textual específica.'
  spanish_quality_summary: 'El español es claro, natural y digno: «Dios habló a Moisés y le dijo: “Yo soy Yahvé”». La sintaxis es idiomática y no presenta calcos problemáticos. Puede mantenerse sin cambios en el texto principal.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: אֱלֹהִים → «Dios»; יְהוָה → «Yahvé» en texto principal, no «SEÑOR». No hay conflicto terminológico en el cuerpo del versículo. Se ajusta la nota para reflejar mejor la práctica documentada de alternativa de forma («YHWH» / «Yahweh») sin sobreexplicar.'
  issues:
  - severity: medium
    issue: La nota al pie no corresponde bien al tipo de nota del rastro inglés.
    rationale: 'La nota inglesa marca una alternativa de representación del nombre divino («Hebrew: YHWH; alternatively rendered ‘Yahweh.’»). La española actual dice «se traduce como “Yahvé” para preservar el nombre divino propio», lo cual es más una justificación doctrinal que una alternativa o aclaración textual. Conviene armonizarla con el audit trail.'
  revised_spanish_text: 'Dios habló a Moisés y le dijo[a]: «Yo soy Yahvé».'
  revised_footnotes:
  - marker: a
    text: 'Hebreo: YHWH; alternativamente, «Yahweh».'
    reason: alternative_reading
  revision_rationale: 'Se conserva el texto principal porque es fiel al hebreo y al estilo meta. Solo se repara la nota al pie para alinearla con la función y el contenido de la nota del audit trail inglés: registrar la forma hebrea y una representación alternativa del nombre divino, en vez de añadir una explicación doctrinal adicional.'
