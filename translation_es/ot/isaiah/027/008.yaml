translation:
  language: es
  text: Con medida[a], al enviarla lejos[b], tú contendiste con ella; él la alejó con su viento recio, en el día del viento del oriente[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con restricción» o «en medida exacta»; el hebreo es raro y probablemente indica que el juicio fue limitado, no aniquilador.
    reason: lexical_alternative
  - marker: b
    text: El hebreo conserva el pronombre femenino; probablemente personifica a Sion/Israel/el pueblo como mujer.
    reason: alternative_reading
  - marker: c
    text: El «viento del oriente» es una imagen fija para un viento ardiente y destructivo que viene del desierto.
    reason: cultural_note
lexical_decisions:
- source_word: בְּסַּאסְּאָה
  english_pob_choice: By measure
  chosen_spanish: Con medida[a]
  alternatives_spanish:
  - Con restricción[a]
  - En medida exacta[a]
  lexicon: HALOT
  rationale: La forma es rara y probablemente expresa una acción limitada o medida, no una destrucción total. «Con medida» conserva la concisión del hebreo y la misma ambigüedad significativa; por eso se añade una nota con alternativas posibles en español.
- source_word: בְּשַׁלְחָהּ
  english_pob_choice: by sending her away
  chosen_spanish: al despedirla
  alternatives_spanish:
  - al enviarla lejos
  - al expulsarla
  lexicon: HALOT
  rationale: El sufijo femenino debe mantenerse como «la/ella». «Despedirla» comunica la idea de apartarla o hacerla salir sin fijar demasiado el matiz jurídico de «divorciarla» ni el de una expulsión más violenta de lo que el hebreo exige en esta cláusula.
- source_word: תְּרִיבֶנָּה
  english_pob_choice: you contended with her
  chosen_spanish: tú contendiste con ella
  alternatives_spanish:
  - tú disputaste con ella
  - tú pleiteaste con ella
  lexicon: HALOT
  rationale: ריב conserva el valor de contender/entrar en disputa, con trasfondo de litigio. «Contendiste con ella» mantiene ese tono sin forzar un tecnicismo legal que no aparece explícitamente en la forma verbal.
- source_word: הָגָה
  english_pob_choice: he drove her away
  chosen_spanish: la ahuyentó
  alternatives_spanish:
  - la expulsó
  - la removió
  lexicon: HALOT
  rationale: En el contexto de juicio y viento destructor, el verbo comunica un alejar o expulsar con fuerza. «Ahuyentó» preserva la acción de hacerla salir/huir y encaja con la imagen del viento.
- source_word: בְּרוּחוֹ
  english_pob_choice: with his wind
  chosen_spanish: con su viento
  alternatives_spanish:
  - con su aliento
  - por su viento
  lexicon: HALOT
  rationale: רוּחַ puede ser viento, aliento o espíritu. Aquí el paralelo con «viento del oriente» favorece «viento» en sentido literal; se conserva el posesivo para reflejar la referencia divina implícita del sujeto.
- source_word: הַקָּשָׁה
  english_pob_choice: harsh
  chosen_spanish: recio
  alternatives_spanish:
  - duro
  - áspero
  lexicon: HALOT
  rationale: El adjetivo expresa severidad/intensidad. «Recio» es natural con «viento» en español y comunica fuerza destructiva sin sonar demasiado abstracto.
- source_word: בְּיוֹם קָדִים
  english_pob_choice: on the day of the east wind
  chosen_spanish: en el día del viento del oriente[c]
  alternatives_spanish:
  - el día del viento del oriente[c]
  - en el día del viento oriental[c]
  lexicon: HALOT
  rationale: קדים es el viento del oriente, imagen asociada en la Biblia con sequedad y destrucción. «Viento del oriente» mantiene el giro bíblico y deja la carga cultural para la nota.
theological_decisions:
- issue: Referente femenino de los sufijos
  english_pob_reading: Retain the feminine pronouns without specifying the referent in the main text.
  chosen_spanish_reading: Mantener «la/ella» sin identificar de forma explícita a quién se refiere.
  alternative_spanish_readings:
  - Israel
  - Sion
  - la viña o el pueblo de Dios personificado
  rationale: El contexto cercano personifica al pueblo del pacto en femenino, pero el versículo no lo nombra. Conservar la referencia femenina respeta la textura poética y evita resolver una tensión interpretativa que el hebreo deja abierta.
  doctrine_reference: Preservar la tensión interpretativa del texto original.
- issue: Cambio de persona entre la segunda y la tercera persona
  english_pob_reading: Preserve the Hebrew's shift with 'you contended' and 'he drove her out.'
  chosen_spanish_reading: 'Conservar el cambio: «tú contendiste» y luego «la ahuyentó».'
  alternative_spanish_readings:
  - Suavizar ambas cláusulas a segunda persona
  - Unificar la tercera persona como sujeto impersonal
  rationale: El hebreo presenta un cambio notable de persona. Mantenerlo en español respeta la forma del texto y evita armonizar un rasgo posiblemente intencional de la poesía.
  doctrine_reference: Primacía del original sobre la nivelación estilística.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión más reciente del audit trail inglés: mantiene la idea de medida limitada, refleja la cláusula de gerundio/infinitivo con «al despedirla», conserva el cambio de persona, y traduce el segundo hemistiquio con un verbo de expulsión y un viento descrito como recio. También preserva el valor cultural de «viento del oriente» sin expandirlo en el texto principal.'
  spanish_consistency_notes:
  - Se usó «viento» y no «espíritu» porque el paralelo con «viento del oriente» exige la lectura meteorológica.
  - Se mantuvo el femenino singular («la/ella») para reflejar el sufijo hebreo y la personificación implícita.
  - Se prefirió «con medida» como base semántica breve y auditable; las variantes se dejaron en nota.
  - La puntuación conserva la bipartición poética del verso y el contraste entre la acción de contienda y la acción de expulsión.
