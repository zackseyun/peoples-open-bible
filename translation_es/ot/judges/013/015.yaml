revisions:
- from: 'Entonces Manoah dijo al ángel de Yahvé[a]: «Por favor, déjanos detenerte[b], y prepararemos delante de ti un cabrito de cabras».'
  to: 'Entonces Manoa dijo al ángel de Yahvé[a]: «Por favor, déjanos retenerte, y prepararemos delante de ti[b] un cabrito».'
  rationale: Se corrige «Manoah» a «Manoa» para adecuarlo al uso español. Se reemplaza «detenerte» por «retenerte» para expresar mejor una invitación hospitalaria sin matiz innecesariamente coercitivo. Se simplifica «un cabrito de cabras» a «un cabrito», que transmite fielmente גדי עזים en español natural. Además, se mueve la nota [b] para que ancle correctamente la frase «delante de ti», que es lo que la nota explica.
