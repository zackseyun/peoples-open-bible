id: JHN.13.25
reference: John 13:25
source:
  edition: SBLGNT
  text: ⸀ἀναπεσὼν ἐκεῖνος οὕτως ἐπὶ τὸ στῆθος τοῦ Ἰησοῦ λέγει αὐτῷ· Κύριε, τίς ἐστιν;
translation:
  text: So he[a], leaning back in this way against Jesus' chest, says to him, “Lord, who is it?”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'reclining on Jesus' breast.' The Greek reflects the posture of dining while lying back at table.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναπεσὼν
  lemma: ἀναπίπτω
  chosen: leaning back
  alternatives:
  - reclining
  - leaning
  lexicon: BDAG
  rationale: The participle from ἀναπίπτω in meal contexts commonly refers to reclining at table. In this immediate context, with ἐπὶ τὸ στῆθος, the action is specifically a backward lean toward Jesus, so 'leaning back' captures both the dining posture and the motion more naturally than the more formal 'reclining.'
- source_word: ἐκεῖνος
  chosen: that disciple
  alternatives:
  - he
  - that one
  lexicon: BDAG
  rationale: 'Although ἐκεῖνος literally means ''that one,'' English style benefits from making the referent explicit from context: the beloved disciple previously mentioned. ''That disciple'' preserves the demonstrative force better than a bare ''he.'''
- source_word: οὕτως
  chosen: So
  alternatives:
  - thus
  - in this way
  lexicon: BDAG
  rationale: οὕτως links this action to the immediately preceding description of position at the meal. 'So' is idiomatic modern English and preserves the connective sense without sounding stiff.
- source_word: ἐπὶ τὸ στῆθος
  chosen: against Jesus' chest
  alternatives:
  - on Jesus' breast
  - upon the chest of Jesus
  lexicon: BDAG
  rationale: στῆθος denotes the chest/breast area. 'Chest' is clearer and more natural in contemporary English than 'breast,' while 'against' fits the physical posture implied by the reclining scene.
- source_word: λέγει αὐτῷ
  chosen: said to him
  alternatives:
  - says to him
  lexicon: BDAG
  rationale: The Greek uses the historical present λέγει, but English narrative normally renders this as a simple past for readability unless the present is especially significant. 'Said to him' communicates the sense naturally.
- source_word: Κύριε
  chosen: Lord
  alternatives:
  - Sir
  - Master
  lexicon: BDAG
  rationale: Per doctrine, κύριος defaults to 'Lord.' In direct address to Jesus this can also carry respectful address, but 'Lord' best preserves Johannine usage and the title's theological resonance without overinterpreting.
- source_word: τίς ἐστιν;
  chosen: who is it?
  alternatives:
  - who is he?
  lexicon: BDAG
  rationale: The question asks for the identity of the person Jesus indicated. English idiom prefers 'who is it?' in this context, even though the Greek is literally 'who is [it/he]?'
