    issue: «eres honrado» para נִכְבַּדְתָּ
    rationale: Aunque es posible, en español «honrado» suele oírse como ‘íntegro’ o ‘decente’, no tanto ‘tenido en honra/estimado’. «Eres estimado» o «eres honorable» comunica mejor el valor pasivo-relacional del nifal en este contexto.
  - severity: medium
    issue: «en trueque por ti» para תַּחְתֶּיךָ
    rationale: «Trueque» transmite intercambio, pero suena rígido y poco natural en español contemporáneo de lectura eclesial. «A cambio de ti» conserva la sustitución/exchange del hebreo y mejora la fluidez.
  revised_spanish_text: Porque eres precioso[a] a mis ojos, eres estimado, y yo te amo; doy hombres a cambio de ti[b], y pueblos en lugar de tu vida.
  revised_footnotes:
  - marker: a
    text: O, «Porque eras precioso a mis ojos, eras estimado, y te he amado». Los verbos hebreos pueden entenderse con fuerza pasada o presente según el contexto.
