translation:
  language: es
  text: Sin embargo, dejaré un remanente[a], cuando haya entre ustedes sobrevivientes de la espada entre las naciones, cuando sean dispersados por las tierras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sobrevivientes de la espada' o 'los que escapan de la espada'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹתַרְתִּי
  english_pob_choice: Yet I will leave a remnant
  chosen_spanish: Sin embargo, dejaré un remanente
  alternatives_spanish:
  - Y dejaré un resto
  - Pero dejaré algunos sobrevivientes
  lexicon: HALOT
  rationale: El verbo hifil de יתר expresa dejar algo sobrante, preservar o dejar con vida; en este contexto de juicio, 'dejaré un remanente' comunica con naturalidad la preservación de algunos sin perder la fuerza de juicio del pasaje. 'Sin embargo' reproduce el valor adversativo del inglés POB y del contexto inmediato.
- source_word: בִּהְיוֹת
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - al haber
  - mientras haya
  lexicon: HALOT
  rationale: El infinitivo constructo con ב introduce una cláusula temporal. 'Cuando' es la equivalencia más natural en español para esta relación temporal.
- source_word: לָכֶם
  english_pob_choice: some of you / you have
  chosen_spanish: tengáis
  alternatives_spanish:
  - para vosotros
  - os haya
  lexicon: HALOT
  rationale: El dativo marca la relación de pertenencia/existencia respecto del pueblo dirigido. En español, la forma verbal 'tengáis' permite expresar de manera idiomática que existan entre ellos sobrevivientes, sin introducir un sujeto nuevo.
- source_word: פְּלִיטֵי חֶרֶב
  english_pob_choice: survivors of the sword
  chosen_spanish: sobrevivientes de la espada
  alternatives_spanish:
  - escapados de la espada
  - los que escapan de la espada
  lexicon: HALOT
  rationale: פְּלִיטִים designa fugados, escapados o sobrevivientes; con 'espada' se trata de quienes quedan con vida tras la guerra. 'Sobrevivientes de la espada' mantiene la fuerza lexical y la claridad pública del pasaje.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - entre los gentiles
  lexicon: HALOT
  rationale: גּוֹיִם se refiere aquí a los pueblos extranjeros entre los cuales Israel será dispersado. 'Entre las naciones' conserva el uso bíblico habitual sin recurrir a un término eclesiástico menos transparente.
- source_word: בְּהִזָּרוֹתֵיכֶם
  english_pob_choice: when you are scattered
  chosen_spanish: cuando seáis dispersados
  alternatives_spanish:
  - cuando os disperséis
  - en vuestro ser dispersados
  lexicon: HALOT
  rationale: La forma verbal comunica la dispersión del pueblo; en español, la pasiva 'seáis dispersados' expresa con naturalidad el evento sin adjudicar explícitamente el agente dentro de la cláusula.
- source_word: בָּאֲרָצוֹת
  english_pob_choice: through the lands
  chosen_spanish: por las tierras
  alternatives_spanish:
  - por los países
  - en las tierras
  lexicon: HALOT
  rationale: אֲרָצוֹת está en plural y apunta a varias tierras de exilio. 'Por las tierras' conserva la amplitud geográfica y evita modernizar excesivamente el referente con 'países'.
theological_decisions:
- issue: Tensión entre juicio total y preservación de un remanente
  english_pob_reading: Yet I will leave a remnant
  chosen_spanish_reading: Sin embargo, dejaré un remanente
  alternative_spanish_readings:
  - Pero dejaré un resto
  - Sin embargo, dejaré algunos sobrevivientes
  rationale: 'La frase mantiene la tensión teológica del oráculo: Dios anuncia juicio, pero también preservación de algunos. ''Remanente'' es la forma más cargada bíblicamente y no resuelve la tensión diluyéndola en un mero ''resto''.'
  doctrine_reference: Preservar la tensión revelada del texto; no armonizarla prematuramente con una síntesis doctrinal posterior.
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de una formulación más interpretativa ('some of you become escapees from the sword') a 'you have survivors of the sword', afinando la exactitud léxica. La redacción española sigue esa revisión al usar una estructura natural y precisa, sin perder la idea de remanente ni la referencia a los sobrevivientes de la espada.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando corresponda; este versículo no contiene el tetragrámaton explícito.
  - '''Espada'' se conserva literalmente para חֶרֶב, sin sustituirla por una paráfrasis de guerra.'
  - '''Remanente'' se usa de forma consistente con el valor bíblico-teológico del término en contextos de juicio y preservación.'
