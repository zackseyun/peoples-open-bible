translation:
  language: es
  text: Entonces sus hermanos y toda la casa de su padre bajaron, lo llevaron, lo subieron y lo sepultaron entre Zoraa y Estaol, en el sepulcro de Manoa, su padre. Y él juzgó a Israel veinte años.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: וַיֵּרְדוּ
  english_pob_choice: came down
  chosen_spanish: bajaron
  alternatives_spanish:
  - descendieron
  - vinieron abajo
  lexicon: HALOT
  rationale: ירד expresa movimiento hacia abajo; en español 'bajaron' conserva la dirección física sin sonar forzado. Mantiene la perspectiva narrativa del relato.
- source_word: אֶחָיו
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes cercanos
  lexicon: HALOT
  rationale: El hebreo normalmente designa hermanos biológicos; no hay presión contextual para ampliarlo. 'Hermanos' es la equivalencia más directa.
- source_word: כָּל בֵּית אָבִיהוּ
  english_pob_choice: all his father’s household
  chosen_spanish: toda la casa de su padre
  alternatives_spanish:
  - toda la familia de su padre
  - toda la casa paterna
  lexicon: HALOT
  rationale: La expresión hebrea apunta al grupo doméstico/paternal. 'Casa de su padre' conserva la imagen idiomática bíblica con naturalidad en español.
- source_word: וַיִּשְׂאוּ אֹתוֹ
  english_pob_choice: carried him away
  chosen_spanish: lo llevaron
  alternatives_spanish:
  - lo cargaron
  - lo transportaron
  lexicon: HALOT
  rationale: נשא en contexto funerario implica cargar el cuerpo; 'lo llevaron' comunica el acto en español de forma sobria y natural. 'Lo cargaron' sería más literal, pero menos idiomático.
- source_word: וַיַּעֲלוּ
  english_pob_choice: brought him up
  chosen_spanish: lo subieron
  alternatives_spanish:
  - subieron con él
  - lo llevaron arriba
  lexicon: HALOT
  rationale: עלה marca movimiento ascendente/topográfico. Como el objeto sigue siendo el cuerpo, 'lo subieron' mantiene el sentido y la fluidez.
- source_word: וַיִּקְבְּרוּ אֹתוֹ
  english_pob_choice: buried him
  chosen_spanish: lo sepultaron
  alternatives_spanish:
  - lo enterraron
  lexicon: HALOT
  rationale: '''Sepultar'' reproduce bien el registro bíblico y funerario; ''enterrar'' también sería correcto, pero algo menos solemne.'
- source_word: בֵּין צָרְעָה וּבֵין אֶשְׁתָּאֹל
  english_pob_choice: between Zorah and Eshtaol
  chosen_spanish: entre Zoraa y Estaol
  alternatives_spanish:
  - entre Zorah y Eshtaol
  lexicon: HALOT
  rationale: Se conservan los topónimos con transliteración española común. 'Zora' y 'Estaol' son formas más adaptadas al español bíblico latinoamericano que las inglesas; se ancla la nota para reflejar la variante textual/toponímica posible y la adaptación ortográfica.
- source_word: בְּקֶבֶר מָנוֹחַ אָבִיו
  english_pob_choice: in the tomb of Manoah his father
  chosen_spanish: en el sepulcro de Manoa, su padre
  alternatives_spanish:
  - en la tumba de Manoa, su padre
  - en el sepulcro de Manoa, su padre
  lexicon: HALOT
  rationale: קבר puede ser 'sepulcro' o 'tumba'. 'Sepulcro' conserva el tono bíblico y funerario. Se mantiene la aposición 'su padre' para no perder la relación familiar explícita.
- source_word: וְהוּא שָׁפַט אֶת־יִשְׂרָאֵל
  english_pob_choice: And he judged Israel
  chosen_spanish: Y él juzgó a Israel
  alternatives_spanish:
  - Y juzgó a Israel
  - Y él gobernó a Israel
  lexicon: HALOT
  rationale: שפט es el verbo técnico recurrente en Jueces. 'Juzgó' preserva esa terminología; no se sustituye por 'gobernó' para no borrar el matiz judicial/deliverer del libro.
- source_word: עֶשְׂרִים שָׁנָה
  english_pob_choice: twenty years
  chosen_spanish: veinte años
  lexicon: HALOT
  rationale: La expresión cardinal es directa y no requiere ajuste.
theological_decisions:
- issue: Valor retrospectivo o resumitivo de 'Y él juzgó a Israel veinte años'
  english_pob_reading: And he judged Israel twenty years
  chosen_spanish_reading: Y él juzgó a Israel veinte años
  alternative_spanish_readings:
  - Ahora bien, había juzgado a Israel veinte años
  - Y había juzgado a Israel veinte años
  rationale: El hebreo permite una lectura retrospectiva del cierre narrativo. Se mantiene el pasado simple para conservar la fórmula característica de Jueces y no resolver la tensión temporal que el texto deja abierta.
  doctrine_reference: Translation philosophy §3, preserve tension rather than resolve it
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece en el texto principal exactamente en el topónimo correspondiente. La nota de pie de página se limita a una alternativa ortográfica/toponímica anclada en el propio término, sin agregar un marcador no usado.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó 'sepulcro' para conservar el tono bíblico y funerario, coherente con el registro de POB.
  - Se preservó 'juzgó' como terminología técnica de Jueces.
  - Los nombres propios se presentaron en transliteración española sobria y legible para audiencia latinoamericana.
