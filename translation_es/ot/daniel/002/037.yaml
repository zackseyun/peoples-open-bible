  to: Tú[a], oh rey, eres el rey de reyes, a quien el Dios del cielo ha dado el reino, la fuerza, el poder y la gloria[b].
  rationale: Se conserva el sentido general del borrador, pero se corrige la secuencia léxica final para alinearla con las decisiones auditadas del POB y con una distinción española natural entre «fuerza» y «poder». También se mantiene la puntuación vocativa correcta en «oh rey». No se requieren cambios teológicos ni notas adicionales.
