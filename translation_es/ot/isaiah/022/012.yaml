translation:
  language: es
  text: En aquel día el Señor Dios, Yahvé de los ejércitos, llamó[a] al llanto, al lamento, a la calvicie y a ponerse cilicio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a afeitarse la cabeza» o «a raparse»; el término hebreo traducido «calvicie» alude a una práctica de duelo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called for
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - llamó para
  lexicon: HALOT
  rationale: El verbo קרא aquí introduce una convocatoria o llamada a prácticas concretas de duelo. En español, «llamó» expresa bien la acción, y el contexto de la lista de lamentos ya comunica la idea de una convocatoria sin forzar un giro más largo.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Yahvé Dios
  - el Señor, Yahvé
  lexicon: HALOT
  rationale: 'Se mantiene la distinción del título compuesto: אֲדֹנָי como «Señor» y YHWH como «Yahvé», según el estándar del proyecto en español. Esto preserva el nombre divino sin recurrir a la convención de enmascararlo como «SEÑOR».'
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de las huestes
  - de los ejércitos celestiales
  lexicon: HALOT
  rationale: Aunque «hosts» es el equivalente tradicional en inglés, en español «ejércitos» es claro y fiel. Mantiene la fuerza del título divino sin sonar arcaico o ambiguo para lectores actuales.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: In that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - Aquel día
  lexicon: HALOT
  rationale: Es la fórmula profética habitual. «En aquel día» conserva el registro profético y suena natural en español.
- source_word: לִבְכִי
  english_pob_choice: for weeping
  chosen_spanish: al llanto
  alternatives_spanish:
  - para llorar
  - para el llanto
  lexicon: HALOT
  rationale: El ל de finalidad o contenido se expresa de manera natural con «al» en esta serie de convocatorias. «Llanto» funciona mejor que el infinitivo «llorar» dentro del paralelo con los otros sustantivos.
- source_word: וּלְמִסְפֵּד
  english_pob_choice: for mourning
  chosen_spanish: al lamento
  alternatives_spanish:
  - al duelo
  - a la lamentación
  lexicon: HALOT
  rationale: מִסְפֵּד denota lamentación/duelo por los muertos o por una desgracia pública. «Lamento» es claro y conserva el valor de expresión dolorosa sin sobrerreligiosizar el término.
- source_word: וּלְקָרְחָה
  english_pob_choice: for baldness
  chosen_spanish: a la calvicie
  alternatives_spanish:
  - al rapado
  - a la rapadura
  - a afeitarse la cabeza
  lexicon: HALOT
  rationale: Se mantiene la equivalencia formal cercana al sustantivo hebreo. «Calvicie» preserva el resultado visible del rito de duelo, y la nota explica la posible referencia al rapado de la cabeza.
- source_word: וְלַחֲגֹר שָׂק
  english_pob_choice: for putting on sackcloth
  chosen_spanish: a ponerse cilicio
  alternatives_spanish:
  - a ceñirse cilicio
  - a vestirse de cilicio
  lexicon: HALOT
  rationale: חגר comunica la acción de ceñir o ponerse alrededor del cuerpo. «Ponerse cilicio» es el equivalente español más transparente y tradicional para la prenda de duelo, y conserva la concreción del acto.
theological_decisions:
- issue: Representación del nombre divino YHWH en el título compuesto אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Yahvé Dios
  - el Señor Dios
  rationale: El texto hebreo contiene el Tetragrámaton, y la práctica del proyecto en español es traducirlo como «Yahvé». En este compuesto se conserva también אֲדֹנָי como «Señor», de modo que no se aplana la tensión del título ni se oculta el nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El borrador sigue de cerca el hebreo y el desglose auditado en inglés, pero adapta la sintaxis para que la lista de acciones de duelo suene natural en español. Se conserva la tensión lexical de קָרְחָה con una nota alternativa, y se mantiene el nombre divino YHWH como Yahvé conforme al estándar del proyecto.
  spanish_consistency_notes:
  - «Yahvé» se usa para YHWH incluso dentro del título compuesto con Adonay, según la política del proyecto.
  - «Cilicio» se mantiene como término bíblico ampliamente reconocible para שָׂק.
  - La serie de complementos con «a/al» reproduce el paralelismo del hebreo sin añadir elementos interpretativos.
  - «Señor» se capitaliza solo como título divino en el texto principal.
