translation:
  language: es
  text: 'Regresa y dile a Ezequías, el líder de mi pueblo: «Así dice Yahvé, el Dios de David, tu padre: He escuchado tu oración; he visto tus lágrimas. Mira, yo te sanaré[a]. Al tercer día subirás a la casa de Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «yo te estoy sanando». El hebreo dice más literalmente: «Mira, estoy sanándote», usando un participio con הִנְנִי, que puede expresar una acción inminente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוּב
  english_pob_choice: Go back
  chosen_spanish: Regresa
  alternatives_spanish:
  - Vuelve
  - Retrocede
  lexicon: HALOT
  rationale: El imperativo pide a Isaías volver adonde está Ezequías. «Regresa» conserva el movimiento de retorno con español natural y digno.
- source_word: וְאָמַרְתָּ
  english_pob_choice: and say
  chosen_spanish: y dile
  alternatives_spanish:
  - y di
  - y dirás
  lexicon: HALOT
  rationale: El hebreo encadena la acción de volver con la de comunicar el mensaje; «dile» hace explícito el destinatario y fluye bien en español.
- source_word: נְגִיד עַמִּי
  english_pob_choice: the leader of my people
  chosen_spanish: el líder de mi pueblo
  alternatives_spanish:
  - el príncipe de mi pueblo
  - el gobernante de mi pueblo
  lexicon: HALOT
  rationale: נָגִיד denota un jefe o dirigente. «Líder» evita el matiz aristocrático de «príncipe» y el posible exceso político de «gobernante».
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Esto dice Yahvé
  - Así ha dicho Yahvé
  lexicon: HALOT
  rationale: 'Se conserva la fórmula profética clásica y el nombre divino según la norma del proyecto: «Yahvé» en lugar de una máscara como «SEÑOR».'
- source_word: אֱלֹהֵי דָּוִד אָבִיךָ
  english_pob_choice: the God of David your father
  chosen_spanish: el Dios de David, tu padre
  alternatives_spanish:
  - el Dios de tu padre David
  lexicon: HALOT
  rationale: La disposición sigue de cerca el hebreo y mantiene claro el vínculo davídico sin forzar una reordenación menos transparente.
- source_word: שָׁמַעְתִּי אֶת תְּפִלָּתֶךָ
  english_pob_choice: I have heard your prayer
  chosen_spanish: He escuchado tu oración
  alternatives_spanish:
  - He oído tu oración
  lexicon: HALOT
  rationale: «Escuchado» conserva la respuesta atenta y personal de Dios. «Oración» es el equivalente directo de תְּפִלָּה.
- source_word: רָאִיתִי אֶת דִּמְעָתֶךָ
  english_pob_choice: I have seen your tears
  chosen_spanish: he visto tus lágrimas
  alternatives_spanish:
  - he contemplado tus lágrimas
  lexicon: HALOT
  rationale: El plural español «lágrimas» expresa naturalmente la imagen hebrea de la lágrima/s. Se mantiene el paralelismo con la línea anterior.
- source_word: הִנְנִי
  english_pob_choice: Look,
  chosen_spanish: Mira,
  alternatives_spanish:
  - He aquí
  - Mira bien
  lexicon: HALOT
  rationale: La partícula introduce una acción divina inmediata y enfática. «Mira» es claro, sobrio y evita un registro arcaizante.
- source_word: רֹפֶא לָךְ
  english_pob_choice: I am healing you / I will heal you
  chosen_spanish: yo te sanaré
  alternatives_spanish:
  - yo te estoy sanando
  - yo te voy a sanar
  lexicon: HALOT
  rationale: El participio con הִנְנִי permite una acción inminente o en curso. En español, el futuro simple comunica bien la promesa divina sin perder solemnidad; se mantiene la tensión documentada entre inmediatez y futuro.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  english_pob_choice: On the third day
  chosen_spanish: Al tercer día
  alternatives_spanish:
  - En el tercer día
  - Para el tercer día
  lexicon: HALOT
  rationale: Es la forma idiomática y natural en español para indicar el momento señalado.
- source_word: תַּעֲלֶה
  english_pob_choice: you shall go up
  chosen_spanish: subirás
  alternatives_spanish:
  - irás a subir
  - ascenderás
  lexicon: HALOT
  rationale: «Subir» conserva el valor literal y cultual de עלה, especialmente en relación con la casa de Yahvé. El futuro encaja con la promesa.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la expresión hebrea «casa de Yahvé», preferida por su transparencia y por no sustituir el original por un equivalente interpretativo.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. La norma del proyecto pide transliterarlo como «Yahvé», preservando el nombre del pacto en lugar de una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor aspectual de רֹפֶא לָךְ
  english_pob_reading: I will heal you
  chosen_spanish_reading: yo te sanaré
  alternative_spanish_readings:
  - yo te estoy sanando
  - te sanaré
  rationale: El hebreo usa un participio con הִנְנִי, que puede expresar acción inminente. El español futuro simple mantiene la promesa divina y la solemnidad, sin negar la cercanía de la acción anunciada.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it; §5 Consistency of key terms, or documented exception
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo y toma en cuenta el expediente inglés más reciente, que optó por una forma futura solemne para רֹפֶא לָךְ. Se preserva la tensión entre la lectura aspectual del participio y su sentido promisorio en contexto.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - «casa de Yahvé» conserva la fórmula hebrea sin interpretarla como «templo».
  - Se mantuvo el paralelismo entre «He escuchado tu oración» y «he visto tus lágrimas».
  - El tono profético se conserva con «Así dice Yahvé».
