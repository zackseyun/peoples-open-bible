translation:
  language: es
  text: Porque la tierra está llena de adúlteros; a causa de la maldición[a] la tierra se lamenta, y los pastizales del desierto se han secado. Su curso[b] es malo, y su poder no es recto[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por el juramento»; el hebreo אָלָה puede denotar un juramento, especialmente uno que invoca una maldición.
    reason: lexical_alternative
  - marker: b
    text: O «su correr» o «su manera de andar»; el término hebreo es metafórico para la conducta o curso de vida.
    reason: lexical_alternative
  - marker: c
    text: O «no es así» / «no es justo»; el hebreo es breve y elíptico.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְנָאֲפִים
  english_pob_choice: adulterers
  chosen_spanish: adúlteros
  alternatives_spanish:
  - los que cometen adulterio
  - infieles
  lexicon: HALOT
  rationale: El participio plural designa a personas caracterizadas por el adulterio. «Adúlteros» conserva esa fuerza moral de forma breve y natural en español. No se reduce a «infieles» para no suavizar el sentido lexical directo, aunque el contexto profético puede sugerir infidelidad de pacto.
- source_word: מָלְאָה הָאָרֶץ
  english_pob_choice: the land is full
  chosen_spanish: la tierra está llena
  alternatives_spanish:
  - la tierra está repleta
  - la tierra está colmada
  lexicon: HALOT
  rationale: אֶרֶץ puede ser «tierra» o «país/territorio»; en Jeremías, el contexto es la tierra de Judá, por lo que «la tierra» comunica bien el referente sin forzar «mundo».
- source_word: מִפְּנֵי אָלָה
  english_pob_choice: because of the curse
  chosen_spanish: a causa de la maldición
  alternatives_spanish:
  - por causa del juramento
  - a causa del juramento de maldición
  - a causa de la maldición jurada
  lexicon: HALOT
  rationale: אָלָה puede significar juramento, especialmente uno ligado a una maldición, o la maldición misma. En este contexto, la desolación de la tierra encaja mejor con el efecto de una maldición/castigo, así que «maldición» preserva la lectura contextual sin cerrar la ambigüedad de forma indebida.
- source_word: אָבְלָה
  english_pob_choice: mourns
  chosen_spanish: se lamenta
  alternatives_spanish:
  - mourns
  - llora
  - está de luto
  lexicon: HALOT
  rationale: El verbo implica duelo o lamento; aplicado a la tierra, es una personificación. «Se lamenta» transmite el lamento sin sonar artificial en español. «Está de luto» sería más interpretativo y menos verbal.
- source_word: יָבְשׁוּ
  english_pob_choice: are dried up
  chosen_spanish: se secan
  alternatives_spanish:
  - se han secado
  - están secos
  - se marchitan
  lexicon: HALOT
  rationale: El perfecto hebreo describe un estado resultante. «Se secan» en presente mantiene la imagen de desecación en curso y suena natural en español; «se han secado» sería posible, pero enfatiza más el resultado acabado.
- source_word: נְאוֹת מִדְבָּר
  english_pob_choice: the pastures of the wilderness
  chosen_spanish: los pastizales del desierto
  alternatives_spanish:
  - los pastos del desierto
  - los pastizales del desierto/estepa
  - las moradas del desierto
  lexicon: HALOT
  rationale: נְאוֹת designa lugares de pasto o de habitación para el ganado; en este contexto, «pastizales» comunica la idea pastoral. «Desierto» traduce מִדְבָּר, aunque «estepa» también podría ser viable; se prefirió «desierto» por claridad bíblica y porque mantiene el contraste con tierra fértil.
- source_word: מְרֻצָתָם
  english_pob_choice: their course
  chosen_spanish: su curso
  alternatives_spanish:
  - su carrera
  - su correr
  - su manera de andar
  lexicon: HALOT
  rationale: El sustantivo procede de «correr» y funciona metafóricamente para la conducta o trayectoria. «Su curso» preserva esa metáfora y es suficientemente idiomático en español. Se evita «su carrera» por posibles connotaciones modernas no deseadas.
- source_word: רָעָה
  english_pob_choice: evil
  chosen_spanish: malo
  alternatives_spanish:
  - malvado
  - malvado/evil
  - perverso
  lexicon: HALOT
  rationale: Aquí califica el «curso»; en español, «malo» suena natural y reproduce la valoración moral mínima del hebreo. «Malvado» sería más fuerte y puede personalizar en exceso la abstracción.
- source_word: גְבוּרָתָם
  english_pob_choice: their might
  chosen_spanish: su poder
  alternatives_spanish:
  - su fuerza
  - su vigor
  - su valentía
  lexicon: HALOT
  rationale: גְבוּרָה puede ser fuerza, poder o valentía. «Poder» resume bien la capacidad/fortaleza implicada y encaja con la frase final breve. «Fuerza» también sería posible, pero «poder» conserva mejor la amplitud semántica.
- source_word: לֹא כֵן
  english_pob_choice: is not right
  chosen_spanish: no es así
  alternatives_spanish:
  - no es recto
  - no es justo
  - no está bien
  lexicon: HALOT
  rationale: La expresión es breve y elíptica. El inglés POB opta por «is not right» para expresar la negación moral sin sobreinterpretar; en español, «no es así» conserva la tersura y la ambigüedad, y puede leerse como una valoración negativa no explicitada.
theological_decisions:
- issue: Si מְנָאֲפִים debe traducirse literalmente o como infidelidad de pacto
  english_pob_reading: Render it literally as 'adulterers' in the main text, letting prophetic context suggest wider covenant unfaithfulness.
  chosen_spanish_reading: Se traduce literalmente como «adúlteros» en el cuerpo del texto, dejando que el contexto profético sugiera la infidelidad de pacto.
  alternative_spanish_readings:
  - los infieles
  - los que son infieles al pacto
  rationale: El hebreo nombra adulterio de manera directa. Aunque Jeremías puede cargar el término con resonancias de infidelidad de pacto, no hay marca explícita aquí para convertirlo en una paráfrasis; por eso se conserva el valor lexical literal y se deja la tensión interpretativa abierta.
  doctrine_reference: Preservar la tensión teológica/lexical en vez de resolverla prematuramente.
- issue: Sentido de אָלָה en este contexto
  english_pob_reading: Rendered as 'the curse' while preserving the alternative 'the oath' in a footnote.
  chosen_spanish_reading: Se traduce como «la maldición», con nota alternativa sobre «juramento».
  alternative_spanish_readings:
  - el juramento
  - el juramento de maldición
  - la maldición jurada
  rationale: Aunque אָלָה puede significar juramento, aquí el efecto descrito sobre la tierra apunta al juicio/castigo. «Maldición» comunica mejor ese resultado contextual. La ambigüedad lexical se conserva en la nota para no borrar la alternativa documentada.
  doctrine_reference: Primacía de la evidencia original; conservar ambigüedad real donde existe.
- issue: Cómo reflejar la frase final לֹא כֵן
  english_pob_reading: Their might is not right / not so / not upright; the Hebrew is terse and elliptical.
  chosen_spanish_reading: Se mantiene la tersura con «no es así», dejando la frase final deliberadamente sobria.
  alternative_spanish_readings:
  - no es recto
  - no es justo
  - no está bien
  rationale: La clausula es abrupta y elíptica. Traducirla con una expresión demasiado explicativa podría borrar la dureza del hebreo. «No es así» conserva la brevedad y permite al lector percibir la tensión de la formulación original.
  doctrine_reference: No suavizar la elipsis; preservar la densidad del original.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del POB inglés: se mantuvo la coordinación explícita con «y» antes de los pastizales, y se reflejó la cláusula breve final como una negación simple, sin añadir aspecto verbal no presente en el hebreo.'
  spanish_consistency_notes:
  - Se mantuvo «tierra» para אֶרֶץ por coherencia con el contexto de Judá, no «mundo».
  - Se usó «maldición» para אָלָה, con nota de la alternativa «juramento».
  - Se eligió «adúlteros» en sentido literal, preservando la tensión profética sin explicitar «infidelidad de pacto» en el texto principal.
  - Se evitó «SEÑOR» porque este versículo no contiene el Tetragrámaton ni una cita directa de κύριος.
