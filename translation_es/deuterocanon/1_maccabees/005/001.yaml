translation:
  language: es
  text: Y sucedió que, cuando las naciones de alrededor oyeron que el altar había sido reconstruido y el santuario rededicado como antes, se enojaron mucho.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ ἐγένετο ὅτε
  english_pob_choice: And it happened that when
  chosen_spanish: Y sucedió que, cuando
  alternatives_spanish:
  - Y aconteció que, cuando
  - Y pasó que, cuando
  lexicon: LSJ
  rationale: La fórmula narrativa semítica-griega pide en español una transición formal sin sonar forzada. «Y sucedió que, cuando» conserva el arranque histórico y el enlace temporal del original, en línea con la decisión inglesa de mantener la fórmula.
- source_word: τὰ ἔθνη
  english_pob_choice: the surrounding nations
  chosen_spanish: las naciones de alrededor
  alternatives_spanish:
  - las naciones vecinas
  - los gentiles alrededor
  lexicon: LSJ
  rationale: El griego dice literalmente «las naciones» y el contexto las sitúa geográficamente alrededor de Judea. «Naciones de alrededor» preserva esa referencia sin introducir el matiz confesional posterior de «gentiles».
- source_word: κυκλόθεν
  english_pob_choice: surrounding
  chosen_spanish: de alrededor
  alternatives_spanish:
  - alrededor
  - circundantes
  lexicon: LSJ
  rationale: El adverbio expresa localización alrededor. «De alrededor» es natural en español y conserva la indicación espacial.
- source_word: ᾠκοδομήθη
  english_pob_choice: had been rebuilt
  chosen_spanish: había sido reconstruido
  alternatives_spanish:
  - había sido edificado de nuevo
  - había sido reedificado
  lexicon: LSJ
  rationale: En este contexto de restauración del altar, «reconstruido» comunica bien la idea de edificar de nuevo. «Reedificado» es posible, pero «reconstruido» resulta más claro en español actual.
- source_word: τὸ θυσιαστήριον
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - el altar del sacrificio
  lexicon: LSJ
  rationale: El término designa directamente el altar; no hace falta ampliar con «del sacrificio» porque el contexto cultual ya lo determina.
- source_word: ἐνεκαινίσθη
  english_pob_choice: rededicated
  chosen_spanish: rededicado
  alternatives_spanish:
  - dedicado de nuevo
  - renovado
  lexicon: LSJ
  rationale: El verbo indica renovación o dedicación de nuevo en contexto del templo. «Rededicado» reproduce con precisión la decisión inglesa y evita perder el matiz cultual específico.
- source_word: τὸ ἁγίασμα
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el lugar santo
  - el recinto sagrado
  lexicon: LSJ
  rationale: «Santuario» es el equivalente más natural y preciso en español para el área sagrada del templo, manteniendo la concreción del sustantivo griego.
- source_word: ὡς τὸ πρότερον
  english_pob_choice: as before
  chosen_spanish: como antes
  alternatives_spanish:
  - como anteriormente
  - como en otro tiempo
  lexicon: LSJ
  rationale: La expresión señala restauración al estado previo; «como antes» es idiomático y fiel.
- source_word: ὠργίσθη σφόδρα
  english_pob_choice: they became very angry
  chosen_spanish: se irritaron mucho
  alternatives_spanish:
  - se enfurecieron mucho
  - se llenaron de gran ira
  lexicon: LSJ
  rationale: El verbo expresa ira intensa. «Se irritaron mucho» preserva la fuerza sin sobredramatizar, y funciona bien para un sujeto colectivo en español.
theological_decisions:
- issue: Identificación de τὰ ἔθνη en un contexto judío histórico deuterocanónico
  english_pob_reading: the surrounding nations
  chosen_spanish_reading: las naciones de alrededor
  alternative_spanish_readings:
  - los gentiles de alrededor
  - los pueblos vecinos
  rationale: La lectura mantiene el valor geográfico y étnico del griego sin trasladarlo a un uso eclesial posterior de «gentiles». En 1 Macabeos el contraste es histórico-político y culto-restaurativo, no una categoría dogmática posterior.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; lexical consistency'
translation_notes:
  revision_awareness: El texto inglés fue revisado a alta concordancia y no contiene notas; la versión española sigue de cerca esa línea, pero vuelve al griego para mantener la fórmula narrativa, el valor espacial de κυκλόθεν y el matiz cultual de ἐνεκαινίσθη.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - 'Se evita «gentiles» para τὰ ἔθνη porque el contexto de 1 Macabeos pide una referencia histórica más neutral: «naciones de alrededor».'
  - «Rededicado» se usa como término cultual técnico, paralelo al inglés POB, para no diluir el sentido de restauración del santuario.
