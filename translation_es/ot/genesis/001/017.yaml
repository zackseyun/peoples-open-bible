translation:
  language: es
  text: Y Dios los puso en la expansión de los cielos para dar luz sobre la tierra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en el firmamento de los cielos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: set
  chosen_spanish: los puso
  alternatives_spanish:
  - los colocó
  - los situó
  - los puso allí
  lexicon: HALOT
  rationale: נתן en este contexto expresa la acción de colocar deliberadamente los astros en su lugar. «Los puso» conserva esa idea de ubicación intencional en un español natural y digno, sin volverlo mecánico.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - les
  - a ellos
  lexicon: Pronombre objeto directo
  rationale: El pronombre refiere a la lumbrera mayor, la lumbrera menor y las estrellas del versículo anterior. «Los» mantiene la referencia plural y directa con fluidez en español.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios mismo
  lexicon: Uso bíblico general
  rationale: En Génesis 1, אֱלֹהִים lleva verbo singular y designa al único Creador; «Dios» es la equivalencia normal y fiel en español.
- source_word: בִּרְקִיעַ
  english_pob_choice: in the expanse
  chosen_spanish: en la expanse
  alternatives_spanish:
  - en la expansión
  - en la bóveda
  - en el firmamento
  lexicon: HALOT
  rationale: Se conserva «expanse» como término técnico ya adoptado en la POB inglesa para רָקִיעַ, evitando tanto la tradición más interpretativa de «firmamento» como una paráfrasis cosmológica. Aunque es un préstamo poco usual, mantiene la decisión auditada de no borrar la tensión léxica del hebreo.
- source_word: הַשָּׁמָיִם
  english_pob_choice: of the heavens
  chosen_spanish: de los cielos
  alternatives_spanish:
  - del cielo
  - de los cielos
  lexicon: Plural hebreo
  rationale: El hebreo es plural y mantiene un registro elevado; «los cielos» preserva mejor esa forma que el singular «cielo».
- source_word: לְהָאִיר
  english_pob_choice: to give light
  chosen_spanish: para dar luz
  alternatives_spanish:
  - para alumbrar
  - para iluminar
  lexicon: HALOT
  rationale: 'El hifil de אור tiene valor causativo: no solo «brillar», sino hacer que haya luz. «Para dar luz» transmite esa función de manera natural en español.'
- source_word: עַל הָאָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra
  - a la tierra
  lexicon: Preposición עַל
  rationale: «Sobre» comunica bien la relación espacial de עַל y sugiere el alcance de la iluminación hacia la superficie terrestre. «Tierra» es la equivalencia más idiomática en español bíblico contemporáneo.
theological_decisions:
- issue: Rָקִיעַ y su carga cosmológica
  english_pob_reading: Rendered as 'the expanse' rather than 'firmament' or a more interpretive modern scientific equivalent.
  chosen_spanish_reading: Se mantiene un término técnico equivalente a «expanse», sin adoptar «firmamento» ni una paráfrasis científica.
  alternative_spanish_readings:
  - firmamento
  - bóveda del cielo
  - expansión
  rationale: La decisión busca preservar el sentido espacial amplio del hebreo y la neutralidad cosmológica de la POB inglesa. En español, esto requiere una solución que no disuelva el término en tradición eclesial ni lo modernice en exceso.
  doctrine_reference: Principio de primacía del texto original y equivalencia óptima; evitar imponer una cosmología explicativa al texto.
translation_notes:
  revision_awareness: 'El pasaje coincide con la revisión inglesa más reciente: no hubo cambios en la decisión de traducir רָקִיעַ como ''expanse'' ni en las demás opciones léxicas. La versión española sigue esa misma línea auditada, con adaptación mínima al español.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים en contexto creador singular.
  - Se conserva el plural «los cielos» para reflejar el hebreo.
  - «Para dar luz» sigue la fuerza causativa del hifil de אור.
  - La nota alternativa evita sustituir el término técnico principal y conserva la tensión léxica del original.
