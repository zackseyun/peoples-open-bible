translation:
  language: es
  text: Yahvé los entregó en manos de Israel, y los derrotaron y los persiguieron hasta la gran Sidón y hasta Misrefot-maim[a] y hasta el valle de Mizpe al oriente; y los derrotaron hasta no dejarles ningún sobreviviente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Misrefot-maim es un nombre de lugar; el hebreo puede significar «quemazones de aguas».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton con la forma establecida en el proyecto en español, sin sustituirlo por un título.
- source_word: וַיִּתְּנֵם
  english_pob_choice: gave them
  chosen_spanish: los entregó
  alternatives_spanish:
  - los dio
  - los puso
  lexicon: HALOT
  rationale: En contexto militar, נתן comunica la entrega de un enemigo al poder de otro. «Entregó» expresa mejor esa idea en español que un simple «dio».
- source_word: בְּיַד יִשְׂרָאֵל
  english_pob_choice: into the hand of Israel
  chosen_spanish: en manos de Israel
  alternatives_spanish:
  - en la mano de Israel
  - al poder de Israel
  lexicon: HALOT
  rationale: 'La imagen hebrea de «mano» como poder o dominio se conserva de manera natural en plural: «en manos de Israel».'
- source_word: וַיַּכּוּם
  english_pob_choice: they struck them down
  chosen_spanish: los hirieron
  alternatives_spanish:
  - los golpearon
  - los derrotaron
  lexicon: HALOT
  rationale: נכה en combate puede abarcar golpear/derrotar con fuerza. «Hirieron» mantiene la violencia del golpe sin sobrerinterpretar el resultado.
- source_word: וַיִּרְדְּפוּם
  english_pob_choice: pursued them
  chosen_spanish: los persiguieron
  alternatives_spanish:
  - los siguieron
  - los dieron caza
  lexicon: HALOT
  rationale: «Perseguir» reproduce el verbo estándar para la acción militar de ir tras un enemigo.
- source_word: צִידוֹן רַבָּה
  english_pob_choice: Great Sidon
  chosen_spanish: Sidón la Grande
  alternatives_spanish:
  - Gran Sidón
  - Sidón la grande
  lexicon: HALOT
  rationale: Se conserva el topónimo con el adjetivo pospuesto de forma comprensible y sobria en español. La inversión refleja bien el hebreo sin perder naturalidad.
- source_word: מִשְׂרְפֹת מַיִם
  english_pob_choice: Misrephoth-maim
  chosen_spanish: Misrefot-maim
  alternatives_spanish:
  - Misrefot-mayim
  - «quemazones de aguas»
  lexicon: HALOT
  rationale: Se translitera el nombre propio como topónimo. Se evita traducirlo en el texto principal para no borrar la ambigüedad lexical documentada.
- source_word: בִּקְעַת מִצְפֶּה
  english_pob_choice: the Valley of Mizpeh
  chosen_spanish: el valle de Mizpe
  alternatives_spanish:
  - el valle de Mizpa
  - la llanura de Mizpe
  lexicon: HALOT
  rationale: בִּקְעָה se rinde de manera natural como «valle». «Mizpe» conserva el nombre propio con una forma breve y reconocible en español.
- source_word: מִזְרָחָה
  english_pob_choice: to the east
  chosen_spanish: al oriente
  alternatives_spanish:
  - hacia el este
  - al este
  lexicon: HALOT
  rationale: La forma direccional se expresa de manera idiomática con «al oriente», que es clara y digna en español bíblico contemporáneo.
- source_word: וַיַּכֻּם
  english_pob_choice: they struck them down
  chosen_spanish: los hirieron
  alternatives_spanish:
  - los golpearon
  - los derrotaron
  lexicon: HALOT
  rationale: Se mantiene la misma traducción para el verbo repetido, preservando la consistencia léxica del verso.
- source_word: עַד בִּלְתִּי הִשְׁאִיר לָהֶם שָׂרִיד
  english_pob_choice: until they had left them no survivor
  chosen_spanish: hasta no dejarles ningún sobreviviente
  alternatives_spanish:
  - hasta no dejarles ningún remanente
  - hasta que no les dejaron sobreviviente
  lexicon: HALOT
  rationale: La construcción expresa la eliminación total de supervivientes. «Sobreviviente» es más natural que «remanente» en español, pero conserva el alcance total del hebreo.
theological_decisions:
- issue: Nombre divino en Joshua 11:8
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa יְהוָה directamente; se conserva el nombre divino revelado, conforme a la política del proyecto, sin masking por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: 'Gramática del cierre: sujeto plural de la acción final'
  english_pob_reading: they had left them no survivor
  chosen_spanish_reading: hasta no dejarles ningún sobreviviente
  alternative_spanish_readings:
  - hasta que no les dejaron sobreviviente
  - hasta que no les dejó ningún sobreviviente
  rationale: El hebreo y la revisión del POB favorecen el sujeto plural implícito en la secuencia narrativa. La frase española evita un singular que no corresponde al verbo y mantiene el sentido colectivo.
  doctrine_reference: English revision awareness on Joshua 11:8
translation_notes:
  revision_awareness: Se respetó la revisión más reciente del POB que corrigió el sujeto final al plural («they had left»). En español se evitó una forma singular equivalente y se optó por una redacción colectiva natural. También se mantuvo la decisión del POB de transliterar Misrephoth-maim como topónimo, sin perder la alternativa lexical en una nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» como nombre divino principal, coherente con el proyecto.
  - Se conserva la repetición verbal con «los hirieron» para reflejar la repetición del hebreo.
  - Los topónimos se tratan con transliteración sobria y adaptada a la ortografía española.
  - «Al oriente» mantiene la dirección del hebreo de forma idiomática.
  - No se introduce vocabulario eclesiástico ajeno al pasaje ni se suaviza la violencia del texto.
