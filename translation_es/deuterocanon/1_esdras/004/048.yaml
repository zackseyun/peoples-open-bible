translation:
  language: es
  text: Y escribió cartas a todos los gobernadores[a] en Celesiria[b] y Fenicia, y a los del Líbano, para que llevaran madera de cedro[c] desde el Líbano hasta Jerusalén, para que edificaran la ciudad con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gobernantes de distrito» o «gobernantes locales», por el griego «toparcas».
    reason: lexical_alternative
  - marker: b
    text: «Celesiria» conserva el nombre histórico regional del griego.
    reason: cultural_note
  - marker: c
    text: La expresión griega se refiere a madera de cedro como material de construcción.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοπάρχαις
  english_pob_choice: governors
  chosen_spanish: gobernadores
  alternatives_spanish:
  - gobernantes de distrito
  - gobernantes locales
  - toparcas
  lexicon: LSJ
  rationale: El término griego designa funcionarios o autoridades regionales sobre distritos. «Gobernadores» comunica con claridad la función administrativa en español moderno sin recurrir a una transliteración opaca.
- source_word: ἐν κοίλῃ Συρίᾳ
  english_pob_choice: in Coele-Syria
  chosen_spanish: en Celesiria
  alternatives_spanish:
  - en Siria Hueca
  - en Siria
  lexicon: LSJ
  rationale: Es un nombre geográfico histórico propio, no una descripción libre. «Celesiria» conserva el topónimo tradicional y evita aplanarlo a «Siria».
- source_word: Φοινίκῃ
  english_pob_choice: Phoenicia
  chosen_spanish: Fenicia
  alternatives_spanish:
  - Fenice
  lexicon: LSJ
  rationale: «Fenicia» es el equivalente español estándar del nombre regional.
- source_word: τοῖς ἐν τῷ Λιβάνῳ
  english_pob_choice: those in Lebanon
  chosen_spanish: a los que estaban en el Líbano
  alternatives_spanish:
  - a los que estaban sobre el Líbano
  - a los del Líbano
  lexicon: LSJ
  rationale: El griego presenta una referencia amplia, sin precisar cargos. En español, «los que estaban en el Líbano» conserva esa amplitud y refleja la estructura con el segundo «a» implícito en el original.
- source_word: μεταφέρειν
  english_pob_choice: to bring
  chosen_spanish: llevar
  alternatives_spanish:
  - transportar
  - traer
  lexicon: BDAG
  rationale: En este encargo de envío, «llevar» es natural en español y conserva la idea de trasladar materiales de un lugar a otro.
- source_word: ξύλα κέδρινα
  english_pob_choice: cedar timber
  chosen_spanish: madera de cedro
  alternatives_spanish:
  - madera de cedro
  - troncos de cedro
  - cedro para construcción
  lexicon: LSJ
  rationale: La expresión apunta a material de construcción; «madera de cedro» es idiomática y fiel, sin añadir más especificación de la que da el griego.
- source_word: ὅπως οἰκοδομήσωσιν
  english_pob_choice: so that they might build
  chosen_spanish: para que edificaran
  alternatives_spanish:
  - para que construyeran
  - a fin de que edificaran
  - para que pudieran edificar
  lexicon: BDAG
  rationale: La cláusula expresa finalidad. «Para que edificaran» mantiene el valor de propósito sin forzar una modalización innecesaria.
- source_word: μετʼ αὐτοῦ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  - con él mismo
  lexicon: BDAG
  rationale: La frase indica cooperación con él; «con él» es la forma más directa y natural en español.
- source_word: τὴν πόλιν
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  - la población
  lexicon: BDAG
  rationale: El texto griego dice literalmente «la ciudad». Se conserva ese referente sin armonizarlo con otros pasajes de restauración que hablan del templo.
theological_decisions:
- issue: Objeto de la construcción
  english_pob_reading: the city
  chosen_spanish_reading: la ciudad
  alternative_spanish_readings:
  - el templo
  - la casa de Dios
  rationale: El griego usa τὴν πόλιν, no un término para templo o casa. Se mantiene el foco explícito del pasaje y se evita importar por armonización un énfasis distinto.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del texto inglés, especialmente la segunda preposición antes de «los que estaban en el Líbano» y la cláusula final de propósito introducida por «so that». La versión española refleja esa estructura sin añadir elementos no presentes en el griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el nombre divino; aquí no ocurre.
  - Se usa «Mesías/Cristo» no pertinente en este versículo.
  - Se preserva el nombre geográfico «Celesiria» por ser topónimo histórico.
  - La clausula final se traduce con propósito explícito («para que») conforme al griego ὅπως.
  - No se introduce armonización con textos paralelos de Esdras sobre el templo.
