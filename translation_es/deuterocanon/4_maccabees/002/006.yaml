translation:
  language: es
  text: Y sin embargo[a], cuando la ley nos ha dicho que no deseemos, mucho más podría persuadirlos de que la razón es capaz de dominar los deseos, así como también las pasiones que obstaculizan la rectitud[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que no codiciemos». El verbo griego puede evocar el mandato contra la codicia, pero el argumento del autor se aplica más ampliamente a los deseos.
    reason: lexical_alternative
  - marker: b
    text: O «las pasiones que obstaculizan la justicia». δικαιοσύνη puede significar «rectitud» o «justicia» según el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: καίτοι
  english_pob_choice: And yet
  chosen_spanish: Y, sin embargo
  alternatives_spanish:
  - No obstante
  - Y aun así
  lexicon: LSJ
  rationale: Expresa bien el giro concesivo y adversativo del argumento. «Y, sin embargo» conserva el contraste retórico sin sonar rígido en español.
- source_word: ὅτε
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: LSJ
  rationale: Aquí introduce la circunstancia en que habla la ley. «Cuando» mantiene la relación temporal y el encuadre del mandato.
- source_word: μὴ ἐπιθυμεῖν
  english_pob_choice: not to desire
  chosen_spanish: que no deseemos
  alternatives_spanish:
  - que no codiciemos
  - que no tengamos deseos
  lexicon: BDAG
  rationale: «Deseemos» conserva el alcance amplio de ἐπιθυμεῖν, como en la lectura auditada del inglés POB. «Codiciemos» sería más estrecho y demasiado pegado a la formulación de un mandamiento específico.
- source_word: εἴρηκεν
  english_pob_choice: has told
  chosen_spanish: nos ha dicho
  alternatives_spanish:
  - nos ha mandado
  - ha dicho
  lexicon: BDAG
  rationale: El perfecto resalta una declaración ya hecha con vigencia presente. «Nos ha dicho» refleja esa forma sin sobredeterminar el verbo como mandato explícito.
- source_word: ὁ νόμος
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  - la Torá
  lexicon: BDAG
  rationale: En este contexto alude a la ley mosaica como instrucción moral. «La ley» es natural y fiel al término griego.
- source_word: πολὺ πλέον
  english_pob_choice: much more
  chosen_spanish: con mucha más razón
  alternatives_spanish:
  - mucho más
  - con mucho más motivo
  lexicon: LSJ
  rationale: La expresión introduce un argumento a fortiori. «Con mucha más razón» comunica mejor en español la fuerza persuasiva de la comparación.
- source_word: πείσαιμ᾽ ἂν ὑμᾶς
  english_pob_choice: I could ... persuade you
  chosen_spanish: podría persuadiros
  alternatives_spanish:
  - podría convenceros
  - os persuadiría
  lexicon: BDAG
  rationale: El optativo potencial con ἄν expresa posibilidad/capacidad retórica. «Podría persuadiros» conserva esa apertura y el tono argumentativo.
- source_word: τῶν ἐπιθυμιῶν κρατεῖν
  english_pob_choice: to master desires
  chosen_spanish: dominar los deseos
  alternatives_spanish:
  - controlar los deseos
  - señorear sobre los deseos
  lexicon: BDAG
  rationale: κρατεῖν indica ejercer dominio o control. «Dominar» es natural en español y mantiene el sentido de gobierno interior.
- source_word: ὁ λογισμός
  english_pob_choice: reason
  chosen_spanish: la razón
  alternatives_spanish:
  - el raciocinio
  - la facultad racional
  lexicon: LSJ
  rationale: En 4 Macabeos λογισμός es la facultad racional que gobierna la conducta. «La razón» es concisa, comprensible y adecuada al registro filosófico del pasaje.
- source_word: ὥσπερ καὶ
  english_pob_choice: just as it also
  chosen_spanish: así como también
  alternatives_spanish:
  - igual que también
  - del mismo modo que también
  lexicon: LSJ
  rationale: Mantiene el paralelo comparativo con valor aditivo. La fórmula española suena fluida y conserva la relación entre ambos miembros.
- source_word: τῶν κωλυτικῶν τῆς δικαιοσύνης παθῶν
  english_pob_choice: the passions that hinder righteousness
  chosen_spanish: las pasiones que obstaculizan la justicia
  alternatives_spanish:
  - las pasiones que impiden la justicia
  - las pasiones que obstaculizan la rectitud
  lexicon: BDAG; LSJ
  rationale: κωλυτικῶν expresa algo que estorba o impide; πάθη son «pasiones»; δικαιοσύνη puede ser «justicia» o «rectitud». Aquí se conserva «justicia» como alternativa plenamente válida y bien sustentada por el contexto moral.
theological_decisions:
- issue: Renderización de δικαιοσύνη en un contexto moral-filosófico judío
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia
  rationale: El inglés POB prefirió «righteousness» pero preservó «justice» como alternativa. En español, «justicia» funciona bien y mantiene abierta la dimensión ética y jurídica del término sin perder la tensión interpretativa del griego.
  doctrine_reference: 'DOCTRINE.md: δικαιοσύνη puede rendirse como «justicia» o «rectitud» según el contexto; aquí la alternativa debe preservarse'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que reforzó el perfecto de εἴρηκεν («has told»). En español se reflejó con «nos ha dicho». También se preservó la estructura argumentativa concesiva, el a fortiori de πολὺ πλέον y la ambigüedad controlada de ἐπιθυμεῖν y δικαιοσύνη mediante notas.
  spanish_consistency_notes:
  - Se mantuvo «la ley» para νόμος, en línea con el uso POB auditado.
  - Se tradujo λογισμός como «la razón», consistente con el sentido filosófico del pasaje.
  - Se evitó «SEÑOR» u այլ sustituciones no pertinentes, ya que no aparece el nombre divino en este versículo.
  - Se conservó una sintaxis española natural sin perder el paralelismo retórico del griego.
