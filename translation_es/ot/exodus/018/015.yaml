translation:
  language: es
  text: 'Moisés dijo a su suegro[a]: «Porque el pueblo viene a mí para buscar a Dios[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a su pariente por matrimonio».
    reason: lexical_alternative
  - marker: b
    text: O «para inquirir de Dios»; o «para pedir un fallo a Dios». El modismo hebreo también puede incluir la idea de consultar a Dios para recibir guía o juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - respondió
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol de אמר se traduce con el pasado simple natural en español. «Dijo» conserva el valor introductorio del discurso directo sin añadir matices que el hebreo no exige.
- source_word: לְחֹתְנוֹ
  english_pob_choice: to his father-in-law
  chosen_spanish: a su suegro
  alternatives_spanish:
  - a su pariente político
  - a su suegro Jetró
  lexicon: HALOT
  rationale: חֹתֵן en este contexto se refiere claramente al suegro de Moisés. «Suegro» es la equivalencia idiomática directa y clara en español.
- source_word: כִּי
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Aquí introduce la explicación causal de Moisés; «porque» reproduce esa relación de causa de manera natural en español.
- source_word: יָבֹא אֵלַי הָעָם
  english_pob_choice: the people come to me
  chosen_spanish: el pueblo viene a mí
  alternatives_spanish:
  - la gente viene a mí
  - el pueblo se me acerca
  lexicon: HALOT
  rationale: El verbo בוא con אֶל expresa movimiento hacia Moisés. «Viene a mí» conserva la dirección del hebreo y funciona bien en una explicación directa.
- source_word: לִדְרֹשׁ
  english_pob_choice: to seek
  chosen_spanish: para consultar
  alternatives_spanish:
  - para buscar
  - para pedir
  lexicon: HALOT
  rationale: En esta construcción, דָּרַשׁ con אֱלֹהִים puede significar consultar a Dios para recibir orientación o decisión. «Consultar» comunica bien el valor idiomático en español sin cerrar la amplitud del hebreo.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - de Dios
  lexicon: HALOT
  rationale: Se mantiene el referente explícito a Dios, como en el hebreo y en la traducción inglesa auditada. En español, «consultar a Dios» es natural y preserva el objeto personal de la búsqueda.
theological_decisions:
- issue: El alcance del modismo לִדְרֹשׁ אֱלֹהִים
  english_pob_reading: to seek God
  chosen_spanish_reading: consultar a Dios
  alternative_spanish_readings:
  - buscar a Dios
  - inquirir de Dios
  - consultar a Dios para recibir un fallo
  rationale: El hebreo puede referirse tanto a buscar a Dios en sentido general como a pedirle orientación o juicio en un caso concreto. «Consultar a Dios» mantiene esa amplitud y, a la vez, deja abierta la connotación judicial sin forzarla en el texto principal.
  doctrine_reference: Translation philosophy §3, preservar la tensión lexical y teológica en vez de resolverla prematuramente.
translation_notes:
  revision_awareness: La auditoría inglesa indica acuerdo alto y sin revisiones aplicadas; no hay cambios sustantivos posteriores que afecten esta línea. La versión española sigue la misma lectura base, pero opta por «consultar a Dios» como equivalente idiomático natural del modismo hebreo, manteniendo abierta la alternativa de buscar/inquirir al final de la nota.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים, conforme a la terminología base del proyecto.
  - «Suegro» preserva el parentesco específico de חֹתֵן sin introducir nombre propio no presente en el verso.
  - El discurso directo respeta la puntuación española con comillas angulares.
  - Se evita «SEÑOR» porque aquí el texto hebreo no usa el nombre divino יהוה sino אֱלֹהִים.
