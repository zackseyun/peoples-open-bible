base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/014/019.yaml
  text: Have you utterly rejected Judah? Does your soul loathe Zion? Why have you struck us so that there is no healing for us? We hoped for peace[a], but there was no good, and for a time of healing, but behold[b], terror.
  footnotes:
