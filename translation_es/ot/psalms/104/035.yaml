review_pass:
  verdict: revise
  source_alignment_summary: 'La base semántica está mayormente bien: mantiene la imprecación sobre personas (''pecadores'', ''impíos''), conserva ''de la tierra'', ''Yahvé'' y la doxología final. También preserva la alternativa léxica de יִתַּמּוּ y la nota sobre הַלְלוּ יָהּ. Sin embargo, la cláusula ''Bendice, Yahvé, alma mía'' altera la sintaxis y el sentido natural del hebreo בָּרֲכִי נַפְשִׁי אֶת־יְהוָה, donde ''alma mía'' es vocativo y ''Yahvé'' es objeto directo. En español debe quedar claro ''Bendice a Yahvé, alma mía'' o equivalente.'
  spanish_quality_summary: El borrador es generalmente legible, pero 'sean acabados' suena poco natural y algo calcado en español contemporáneo; 'se acaben' o 'lleguen a su fin' es más idiomático y sigue siendo fiel. La coma en 'Bendice, Yahvé, alma mía' produce una lectura confusa, como si Yahvé fuera vocativo. El resto del verso tiene buen registro poético y eclesial.
  glossary_alignment: 'Alinea bien con la terminología del proyecto en ''Yahvé'', ''pecadores'', y ''¡Aleluya!''. No hay conflicto doctrinal serio. El principal ajuste es sintáctico: con ברך + objeto divino, el español requiere marcar a Yahvé como objeto (''a Yahvé'').'
  issues:
  - severity: high
    issue: La frase 'Bendice, Yahvé, alma mía' asigna erróneamente a 'Yahvé' función de vocativo/aposición en vez de objeto directo.
    rationale: 'El hebreo בָּרֲכִי נַפְשִׁי אֶת־יְהוָה significa ''Bendice a Yahvé, alma mía''. La versión actual puede entenderse como si se dirigiera a Yahvé: ''Bendice, Yahvé, [a] alma mía'', lo cual no refleja el original.'
  - severity: medium
    issue: '''sean acabados'' es una formulación poco idiomática en español actual.'
    rationale: Aunque intenta reflejar 'be finished', en español suena forzada y menos natural que 'se acaben' o 'lleguen a su fin'. El contexto imprecatorio queda bien conservado con una opción más fluida.
  revised_spanish_text: Que los pecadores[a] se acaben de la tierra, y los impíos ya no existan. Bendice a Yahvé, alma mía[b]. ¡Aleluya!
  revised_footnotes:
  - marker: a
    text: 'O: «lleguen a su fin»; el verbo hebreo puede expresar llegar a término, no solo ser destruido.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «¡Alaben a Yah!». «Aleluya» es la forma tradicional en español de esta doxología.'
    reason: lexical_alternative
  revision_rationale: Se corrigió la sintaxis de la segunda cláusula para que 'Yahvé' sea claramente el objeto de 'Bendice', como en el hebreo. También se cambió 'sean acabados' por 'se acaben' para lograr un español más natural sin perder el sentido de llegar al fin/remoción. Se mantuvieron las notas existentes porque siguen siendo pertinentes.
