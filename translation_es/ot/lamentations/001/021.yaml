base_translation:
  language: en
  yaml_path: translation/ot/lamentations/001/021.yaml
  text: They have heard that I groan[a]; there is no one to comfort me. All my enemies have heard of my trouble; they rejoice that you have done it. You have brought the day you proclaimed[c][b]; let them become like me.
  footnotes:
  - marker: a
    text: Or 'my calamity' or 'my misery' for 'my trouble.' The Hebrew term can denote disaster or affliction.
    reason: lexical_alternative
  - marker: b
    text: Or 'You have brought the day you announced.' The verb can mean 'proclaimed' or 'announced' in this context.
    reason: lexical_alternative
  - marker: c
    text: Or 'and they will be like me.' The Hebrew form may be read as a wish ('let them become like me') or as a future statement, though the wish fits the lament context well.
    reason: alternative_reading
