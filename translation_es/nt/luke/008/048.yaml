translation:
  language: es
  text: 'Pero él le dijo[a]: «Hija, tu fe te ha salvado; ve en paz».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu fe te ha hecho bien» o «tu fe te ha sanado». El verbo griego puede referirse tanto a sanar como a salvar.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ δὲ εἶπεν αὐτῇ
  english_pob_choice: But he said to her
  chosen_spanish: Pero él le dijo
  alternatives_spanish:
  - Y él le dijo
  - Entonces él le dijo
  lexicon: BDAG
  rationale: δέ marca una transición leve; «pero» mantiene esa continuidad con tono natural en español. Se explicita el sujeto con «él» para claridad, aunque el griego lo expresa por la forma verbal. El dativo αὐτῇ se vierte naturalmente como «le».
- source_word: Θυγάτηρ
  english_pob_choice: Daughter
  chosen_spanish: Hija
  alternatives_spanish:
  - Querida hija
  - Mujer
  lexicon: BDAG
  rationale: El vocativo literal conserva la ternura y la relación implícita del griego. «Hija» es directo y fiel; «mujer» perdería el matiz afectivo del vocativo.
- source_word: ἡ πίστις σου
  english_pob_choice: your faith
  chosen_spanish: tu fe
  alternatives_spanish:
  - tu confianza
  - tu fidelidad
  lexicon: BDAG
  rationale: πίστις se traduce por defecto como «fe» en coherencia con la terminología bíblica habitual y el valor teológico del término. «Confianza» es posible en contexto, pero «fe» preserva mejor la continuidad lexical.
- source_word: σέσωκέν σε
  english_pob_choice: has saved you
  chosen_spanish: te ha salvado
  alternatives_spanish:
  - te ha hecho bien
  - te ha sanado
  - te ha curado
  lexicon: BDAG
  rationale: σῴζω tiene un campo semántico amplio que puede abarcar salvación y sanidad. «Te ha salvado» conserva esa amplitud y la resonancia teológica, mientras que las alternativas estrechan el sentido a curación física.
- source_word: πορεύου
  english_pob_choice: go
  chosen_spanish: ve
  alternatives_spanish:
  - vete
  - sigue tu camino
  lexicon: BDAG
  rationale: El imperativo es breve y natural; «ve» comunica la orden sin añadir matices no presentes en el griego.
- source_word: εἰς εἰρήνην
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - hacia la paz
  - con paz
  lexicon: BDAG
  rationale: La expresión idiomática se vierte de manera natural como «en paz». «Hacia la paz» sería demasiado literal; «con paz» suena menos idiomático en este cierre de despedida.
theological_decisions:
- issue: Alcance de σῴζω en un contexto de sanidad
  english_pob_reading: Rendered broadly as 'has saved you' in the main text, with healing alternatives in a footnote
  chosen_spanish_reading: Traducido ampliamente como «te ha salvado», con la nota de que también puede entenderse como sanarte o hacerte bien
  alternative_spanish_readings:
  - te ha sanado
  - te ha hecho bien
  - te ha curado
  rationale: La escena trata una sanidad, pero σῴζω conserva un valor más amplio que no debe reducirse. El español «salvar» mantiene la tensión entre sanidad física y sentido salvífico, y la nota permite al lector ver las alternativas sin perder la amplitud del verbo.
  doctrine_reference: Translation philosophy §3; tabla de términos controvertidos para πίστις y σῴζω
translation_notes:
  revision_awareness: Se corrigió la validación anterior añadiendo el ancla de nota [a] en el texto español y manteniendo la misma decisión de traducción amplia para σῴζω.
  spanish_consistency_notes:
  - Se mantiene «fe» para πίστις según el uso bíblico estándar del proyecto.
  - Se conserva «salvado» para σῴζω para no reducir el verbo al aspecto físico.
  - El vocativo «Hija» sigue el tono afectuoso y literal del griego.
  - «En paz» reproduce la despedida idiomática del original con español natural.
