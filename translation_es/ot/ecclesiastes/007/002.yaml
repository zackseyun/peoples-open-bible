revisions:
- from: Mejor es ir a una casa de duelo que ir a una casa de banquete[a], porque ese es el fin de toda persona, y el que vive debe ponerlo en su corazón.
  to: Mejor es ir a una casa de duelo que ir a una casa de banquete[a], porque ese es el fin de toda persona, y los que viven deben tomarlo a pecho.
  rationale: Se revisa únicamente la última cláusula para reemplazar un calco poco natural («ponerlo en su corazón») por un modismo español claro y fiel al sentido de interiorizar seriamente la lección. También se ajusta el sujeto genérico a «los que viven» para una lectura más natural en español, manteniendo el sentido colectivo de וְהַחַי. La nota se conserva y se pule levemente para mayor claridad.
