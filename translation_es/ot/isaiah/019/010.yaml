translation:
  language: es
  text: Y sus cimientos[a] serán aplastados; todos los que trabajan por salario estarán afligidos en el alma[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo difícil. 'Sus cimientos' también puede entenderse como 'sus pilares' o 'sus soportes'; algunos han propuesto 'sus tejedores'.
    reason: alternative_reading
  - marker: b
    text: La frase final es oscura en hebreo. Literalmente algo como 'estanques de alma' o 'marismas de apetito/vida'; muchos la entienden de modo idiomático como aflicción o abatimiento interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁתֹתֶיהָ
  english_pob_choice: her foundations
  chosen_spanish: sus cimientos
  alternatives_spanish:
  - sus pilares
  - sus soportes
  - sus tejedores
  lexicon: HALOT
  rationale: La forma es rara y discutida. En el contexto de una estructura social/económica que cae, 'cimientos' comunica la idea de soporte básico con naturalidad en español. Se preserva en nota la posibilidad de 'pilares/soportes' y la lectura alternativa 'tejedores' documentada en el audit trail.
- source_word: מְדֻכָּאִים
  english_pob_choice: will be crushed
  chosen_spanish: serán aplastados
  alternatives_spanish:
  - serán quebrantados
  - serán oprimidos
  lexicon: HALOT
  rationale: El participio pasivo expresa quedar aplastado o quebrado por la ruina; 'aplastados' conserva con fuerza la imagen de devastación y es idiomático en español.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos los
  alternatives_spanish:
  - todos
  lexicon: HALOT
  rationale: Mantiene el valor distributivo y el alcance total del grupo siguiente.
- source_word: עֹשֵׂי שֶׂכֶר
  english_pob_choice: who work for wages
  chosen_spanish: los que trabajan por salario
  alternatives_spanish:
  - los asalariados
  - los que laboran por paga
  - los trabajadores a sueldo
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'hacedores de salario', pero el sentido idiomático es gente que trabaja a cambio de paga. 'Trabajan por salario' conserva cercanía semántica y claridad.
- source_word: אַגְמֵי נָפֶשׁ
  english_pob_choice: grieved in soul
  chosen_spanish: afligidos en el alma
  alternatives_spanish:
  - abatidos en el alma
  - entristecidos en el alma
  - hundidos en el alma
  lexicon: HALOT
  rationale: La frase final es oscura en hebreo. El POB la entiende como un estado interior de aflicción; 'afligidos en el alma' transmite esa lectura sin borrar la rareza textual ni volverla excesivamente interpretativa.
theological_decisions:
- issue: Tratamiento del nombre divino en un versículo donde no aparece explícitamente YHWH
  english_pob_reading: No special theological rendering is required in this verse; the line describes judgment on Egypt's structures and workers.
  chosen_spanish_reading: No se introduce ninguna equivalencia teológica adicional; la frase se mantiene descriptiva y judicial.
  alternative_spanish_readings:
  - Añadir una alusión implícita al juicio de Yahvé
  - Explicitar al agente divino donde el hebreo no lo nombra
  rationale: El hebreo de este verso no contiene el Tetragrámaton ni un título divino explícito. Por fidelidad al texto, la traducción no debe insertar un sujeto teológico que el verso no expresa.
  doctrine_reference: Fidelidad textual / evitar sobrerinterpretación
- issue: Sentido de la frase final oscura
  english_pob_reading: many understand it idiomatically as inward grief or dejection
  chosen_spanish_reading: se mantiene la lectura de aflicción interior sin convertir la oscuridad hebrea en una explicación exhaustiva
  alternative_spanish_readings:
  - 'Dejar la frase más literal: ''estanques de alma'''
  - Parafrasear libremente como 'llenos de tristeza'
  rationale: La POB opta por una equivalencia óptima que comunica el sentido probable. En español, 'afligidos en el alma' conserva la lectura interna y la tensión lexical sin caer en una paráfrasis demasiado libre.
  doctrine_reference: Crítica textual y semántica hebrea
translation_notes:
  revision_awareness: El audit trail inglés revisó la puntuación para reflejar mejor la estructura del verso; la traducción española mantiene una pausa fuerte con punto y coma entre las dos cláusulas principales. Se preservó además la nota sobre la oscuridad de la frase final y la discusión léxica del primer sintagma.
  spanish_consistency_notes:
  - Se usó 'cimientos' como traducción principal de שָׁתֹתֶיהָ, con nota para las alternativas documentadas.
  - Se eligió 'afligidos en el alma' para representar la lectura idiomática del final oscuro, conservando la ambigüedad con nota.
  - No se introdujo 'SEÑOR'; el verso no contiene referencia explícita al nombre divino.
  - La puntuación con punto y coma sigue la revisión del inglés POB y ayuda a separar las dos mitades del versículo.
