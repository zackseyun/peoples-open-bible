  glossary_alignment: No hay conflicto con la terminología base del proyecto. «dios» en minúscula está bien en esta fórmula exclusiva. «Juzgaste» preserva κρίνω correctamente. La principal mejora léxica necesaria es reemplazar «te ocupas de» por una opción de cuidado más idiomática y fiel al matiz de μέλει.
