translation:
  language: es
  text: Todas las naciones que has hecho vendrán y se postrarán delante de ti[a], Señor[b], y honrarán tu nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y adorarán delante de ti»; el verbo hebreo puede denotar tanto la postración reverente como, por extensión, la adoración.
    reason: lexical_alternative
  - marker: b
    text: O «y glorificarán tu nombre».
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Todas
  alternatives_spanish:
  - Todas las
  - Todas las naciones
  lexicon: HALOT
  rationale: El cuantificador incluye a la totalidad del sustantivo plural siguiente. En español, «Todas» abre la frase de manera natural y conserva el alcance universal.
- source_word: גּוֹיִם
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - pueblos
  - gentiles
  lexicon: HALOT
  rationale: En este salmo, el término designa a las naciones en sentido amplio. «Naciones» reproduce mejor el paralelismo y evita introducir un contraste más específico de «gentiles» que el versículo no exige.
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - las cuales
  lexicon: HALOT
  rationale: Introduce la cláusula relativa de manera idiomática en español y mantiene la relación directa con «naciones».
- source_word: עָשִׂיתָ
  english_pob_choice: you have made
  chosen_spanish: has hecho
  alternatives_spanish:
  - has creado
  - hiciste
  lexicon: HALOT
  rationale: עָשָׂה significa primariamente «hacer». «Has hecho» sigue el valor verbal básico y refleja el perfecto con relevancia vigente, sin forzar «crear».
- source_word: יָבֹאוּ
  english_pob_choice: will come
  chosen_spanish: vendrán
  alternatives_spanish:
  - vendrán a ti
  - vendrán
  lexicon: HALOT
  rationale: El imperfecto se expresa naturalmente como futuro en esta escena de expectativa adoradora. «Vendrán» es breve y fiel.
- source_word: וְיִשְׁתַּחֲווּ
  english_pob_choice: and bow down
  chosen_spanish: y se postrarán
  alternatives_spanish:
  - y adorarán
  - y se inclinarán
  lexicon: HALOT
  rationale: El verbo incluye la idea física de inclinarse o postrarse en reverencia. «Se postrarán» conserva mejor esa fuerza que «adorarán», aunque la adoración está implícita.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - en tu presencia
  - ante ti
  lexicon: HALOT
  rationale: La expresión hebrea idiomática se vierte de forma natural con «delante de ti», manteniendo la idea de estar frente a la presencia de Dios.
- source_word: אֲדֹנָי
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Mi Señor
  - Dueño
  lexicon: HALOT
  rationale: Como título divino, «Señor» es la equivalencia española más clara y reverente. Aunque morfológicamente puede sugerir «mi Señor», el uso aquí funciona como apelativo reverencial a Dios.
- source_word: וִיכַבְּדוּ
  english_pob_choice: and they will honor
  chosen_spanish: y honrarán
  alternatives_spanish:
  - y glorificarán
  - y darán honor a
  lexicon: HALOT
  rationale: כבד en piel comunica la idea de dar peso, honra o gloria. «Honrarán» conserva ese sentido y encaja bien con el objeto «tu nombre».
- source_word: לִשְׁמֶךָ
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - a tu nombre
  - tu reputación
  lexicon: HALOT
  rationale: Se mantiene la referencia al nombre como identidad revelada y reputación de Dios. En español, la frase directa «tu nombre» es la más natural y fiel.
theological_decisions:
- issue: Alcance universal de «todas las naciones»
  english_pob_reading: A future universal acknowledgment and worship of the Lord by all nations
  chosen_spanish_reading: Una respuesta futura y universal de reconocimiento reverente por parte de todas las naciones
  alternative_spanish_readings:
  - Una alabanza hiperbólica que no exige cada nación sin excepción
  - Una referencia limitada a muchas naciones
  rationale: La redacción española preserva el alcance amplio del hebreo sin reducirlo a un grupo parcial. «Se postrarán» y «honrarán» mantienen la idea de reconocimiento reverente que el contexto sugiere.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Función de אֲדֹנָי como título divino
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  - Mi Señor
  rationale: Se traduce el título divino con el equivalente español común y reverente. Esto evita una transliteración innecesaria y conserva la lectura devocional del pasaje.
  doctrine_reference: Translation philosophy §2; Contested terms table
translation_notes:
  revision_awareness: El texto inglés auditado ya fue revisado y quedó sin cambios en el último pase; la presente propuesta sigue ese consenso de alta concordancia, manteniendo la misma estructura semántica y las mismas dos alternativas léxicas documentadas para los verbos clave.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como traducción por defecto cuando aparezca el tetragrámaton; aquí no ocurre, porque el hebreo usa אֲדֹנָי como título.
  - Se mantiene la distinción entre postración reverente y adoración explícita mediante nota, en paralelo con la decisión inglesa de no colapsar ambos sentidos en el texto principal.
  - «Señor» se usa como título divino, no como tratamiento humano.
  - El posesivo «tu nombre» preserva la referencia bíblica al nombre como identidad y reputación reveladas.
