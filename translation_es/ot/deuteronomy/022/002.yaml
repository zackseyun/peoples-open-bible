review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo y sigue de cerca la POB inglesa: conserva ''tu hermano'', la proximidad física, el desconocimiento del dueño, la acción de llevar el objeto a casa, su permanencia contigo y la devolución final. Sin embargo, la nota alternativa final quedó invertida respecto al rastro inglés: el texto principal usa ''devolverás'' y la alternativa documentada debe ser ''restituirás'', pero anclada como alternativa de ''restore''/''return'' sin confusión. Además, conviene ajustar levemente la puntuación/fluidez del español para mayor naturalidad.'
  spanish_quality_summary: 'El español es claro y legible. ''Pero si tu hermano no está cerca de ti'' suena natural, y ''permanecerá contigo'' está bien. La principal mejora es estilística mínima: ''entonces lo llevarás a tu casa'' puede mantenerse, pero ''lo recogerás y lo llevarás a tu casa'' añadiría demasiado; no hace falta. Sí conviene normalizar la redacción de las notas, quitando comillas torpes y dejando un español editorial más limpio.'
  glossary_alignment: No hay términos del glosario mayor en juego salvo la conservación de 'tu hermano', que está bien alineada con la decisión de mantener el lenguaje de parentesco y explicarlo en nota. No hay conflictos con Yahvé/Mesías/etc.
  issues:
  - severity: medium
    issue: Redacción editorial deficiente en las notas al pie
    rationale: 'La nota b y la nota c usan comillas y puntuación poco naturales (''O: ''''...''''''), lo que reduce la calidad editorial aunque el contenido sea básicamente correcto.'
  - severity: low
    issue: La alternativa final debe presentarse con mayor claridad
    rationale: La POB inglesa tiene texto principal 'restore it to him' con alternativa 'return it to him'. En español, el texto principal 'se lo devolverás' es bueno, y la alternativa 'se lo restituirás' también; pero la nota debe formularse limpiamente para evitar torpeza y mantener correspondencia clara con la decisión léxica.
  revised_spanish_text: Pero si tu hermano no está cerca de ti[a], y no lo conoces[b], entonces lo llevarás a tu casa, y permanecerá contigo hasta que tu hermano lo busque; entonces se lo devolverás[c].
  revised_footnotes:
  - marker: a
    text: Hebreo 'tu hermano' probablemente se refiere en sentido amplio a un miembro del pueblo del pacto, no solo a un hermano biológico.
    reason: cultural_note
  - marker: b
    text: 'O: ''no sabes de quién es''; literalmente, ''no lo conoces''.'
    reason: lexical_alternative
  - marker: c
    text: 'O: ''se lo restituirás''.'
    reason: lexical_alternative
  revision_rationale: El texto principal puede conservarse tal como está porque representa fielmente el hebreo y la POB inglesa. Se revisan únicamente las notas al pie para corregir la redacción editorial y dejar más clara la alternativa léxica final.
