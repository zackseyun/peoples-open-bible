translation:
  language: es
  text: '¿Hasta cuándo[a], Yahvé, clamaré por ayuda y no escucharás? Clamo a ti: «¡Violencia!», y no salvas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¿Hasta cuándo, Yahvé, clamaré por ayuda...?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד אָנָה
  english_pob_choice: How long
  chosen_spanish: ¿Hasta cuándo
  alternatives_spanish:
  - ¿Hasta cuándo no?
  - ¿Hasta cuándo será esto?
  lexicon: HALOT
  rationale: La fórmula hebrea de lamento pide una expresión temporal natural en español. «¿Hasta cuándo?» conserva la urgencia y el tono de queja mejor que una versión más literal como «¿Hasta cuándo, o cuándo?». El marcador [a] ancla la nota sobre la alternativa más literal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé». Esto preserva el nombre propio divino en lugar de sustituirlo por un título.'
- source_word: שִׁוַּעְתִּי
  english_pob_choice: shall I cry for help
  chosen_spanish: clamaré por ayuda
  alternatives_spanish:
  - he clamado por ayuda
  - he gritado pidiendo ayuda
  lexicon: HALOT
  rationale: El verbo expresa clamor de socorro en aflicción. En español, «clamar por ayuda» mantiene el sentido de súplica desesperada y encaja con el valor lamentativo del hebreo.
- source_word: וְלֹא תִשְׁמָע
  english_pob_choice: and you do not hear
  chosen_spanish: y no escucharás
  alternatives_spanish:
  - y no oyes
  - y no prestas atención
  lexicon: HALOT
  rationale: «Escuchar» conserva en español la idea de oír con respuesta implícita en contextos de oración. Se mantiene el tono directo del reproche/lamento sin suavizarlo.
- source_word: אֶזְעַק
  english_pob_choice: I cry out
  chosen_spanish: Clamo
  alternatives_spanish:
  - grito
  - exclamo
  lexicon: HALOT
  rationale: זעק denota un grito intenso de angustia. «Clamo» reproduce la solemnidad y el carácter de súplica con un registro natural en español bíblico contemporáneo.
- source_word: אֵלֶיךָ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - hacia ti
  lexicon: HALOT
  rationale: 'La preposición con sufijo se expresa de manera directa y natural en español: «a ti».'
- source_word: חָמָס
  english_pob_choice: Violence
  chosen_spanish: ¡Violencia!
  alternatives_spanish:
  - ¡Injusticia violenta!
  - ¡Abuso!
  lexicon: HALOT
  rationale: «Violencia» es la equivalencia directa más establecida para חָמָס y preserva el choque retórico del texto. No se diluye en una paráfrasis más general.
- source_word: וְלֹא תוֹשִׁיעַ
  english_pob_choice: and you do not save
  chosen_spanish: y no salvas
  alternatives_spanish:
  - y no libras
  - y no rescatas
  lexicon: HALOT
  rationale: El causativo de ישׁע significa salvar/librar. «Salvar» mantiene la fuerza teológica y la concisión del hebreo; «rescatar» sería posible, pero desplaza ligeramente el matiz.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La política del proyecto exige traducir el Tetragrámaton como «Yahvé». Esto preserva el nombre personal de Dios revelado a Israel y evita la sustitución litúrgica tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Force of the lament clause with imperfect verbs
  english_pob_reading: shall I cry for help and you do not hear?
  chosen_spanish_reading: clamaré por ayuda y no escucharás
  alternative_spanish_readings:
  - clamo por ayuda y no escuchas
  - he clamado por ayuda y no has escuchado
  rationale: El hebreo formula una queja insistente con valor de lamento continuo. En español, el futuro simple puede expresar aquí la persistencia esperada/continuada del acto, conservando el tono retórico sin volverlo mecánico.
  doctrine_reference: POB revision awareness on temporal-lament idiom עַד־אָנָה
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión más reciente del POB en inglés, que ajustó la primera cláusula hacia una construcción de lamento más natural («shall I cry for help...»). La versión española refleja ese mismo ajuste con un futuro simple retórico: «clamaré por ayuda», manteniendo el valor de queja prolongada del hebreo עַד־אָנָה y evitando una traducción demasiado perfecta o estática. También se preservó el nombre divino como Yahvé, conforme a la política del proyecto.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente con la terminología del proyecto para יְהוָה.
  - «Clamar» y «gritar» son posibles, pero se prefirió «clamar» por su mejor adecuación al registro bíblico y a la súplica.
  - «Salvar» se mantuvo para תוֹשִׁיעַ por coherencia con el campo semántico de ישׁע en el corpus poético/profético.
  - Se conservó el paralelismo entre «clamaré por ayuda» y «Clamo a ti» sin añadir elementos explicativos ajenos al hebreo.
