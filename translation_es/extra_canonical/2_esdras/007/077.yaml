review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del latín: la cláusula sobre quienes despreciaron, la exhortación a no contarse entre los atormentados, y la reserva de un tesoro de obras con el Altísimo hasta el tiempo final. «Junto al Altísimo» era menos fiel para apud Altissimum que «con el Altísimo», y «los últimos tiempos» fue mejorado a «los tiempos postreros» para un registro más natural y digno. La nota [a] fue eliminada por innecesaria.'
  spanish_quality_summary: El español revisado es claro, natural y digno. «Han despreciado» es más directo que «han mostrado desprecio» sin perder sentido. «Con el Altísimo» es más idiomático que «junto al Altísimo» para apud en este contexto de custodia. «Tiempos postreros» da registro escatológico más natural.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Altísimo» es adecuado. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: «junto al Altísimo» para apud Altissimum era poco idiomático
    rationale: Corregido a «con el Altísimo» para reflejar mejor la relación de custodia/depósito implícita en apud.
  - severity: low
    issue: Nota [a] innecesaria eliminada
    rationale: La alternativa «los que han despreciado» no preservaba una ambigüedad relevante del original.
  - severity: low
    issue: «han mostrado desprecio» simplificado a «han despreciado»
    rationale: Más natural y directo en español bíblico moderno sin pérdida semántica.
  revised_spanish_text: los que han despreciado, y no te cuentes entre los que son atormentados. Porque para ti está guardado un tesoro de obras con el Altísimo, pero no te será mostrado hasta los tiempos postreros.
