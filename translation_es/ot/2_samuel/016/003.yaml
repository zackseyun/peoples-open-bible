  to: 'Entonces el rey dijo: «¿Y dónde está el hijo de tu señor?». Ziba dijo al rey: «Mira, se está quedando[a] en Jerusalén, porque dijo: “Hoy la casa de Israel me devolverá el reino de mi padre”»'
  rationale: Se ajusta la puntuación dialogal al uso español, se cambia 'está residiendo' por 'se está quedando' para una expresión más natural del participio יוֹשֵׁב en contexto, y se conserva el resto del sentido. Aunque la cláusula final sigue con verbo singular por naturalidad española con el sujeto colectivo 'la casa de Israel', el borrador queda estilísticamente mejor y fiel en el sentido principal.
