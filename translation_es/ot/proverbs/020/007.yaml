review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura hebrea y las decisiones del POB: mantiene la metáfora de ''caminar'', expresa תֻּם como ''integridad'', conserva el masculino representativo con ''el justo'', y traduce אַחֲרָיו de forma directa. Sin embargo, la ubicación de las notas [a][b] en ''integridad'' no corresponde a los elementos anotados: una nota trata de אַשְׁרֵי (''dichosos'') y la otra de בָּנָיו (''hijos/children'').'
  spanish_quality_summary: 'El español es claro, natural y digno. ''El justo camina en su integridad; dichosos sus hijos después de él'' suena proverbial y legible. La principal reparación necesaria es técnica y editorial: mover las marcas de nota al lugar correcto. Además, conviene ajustar la nota sobre ''hijos'' para reflejar con mayor precisión la decisión inglesa auditada, que apunta a ''children'' como descendencia/offspring, no simplemente a una ampliación difusa de ''hijos''.'
  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. 'El justo', 'integridad' y 'dichosos' son coherentes con el registro sapiencial. La nota sobre 'hijos' debe expresar mejor que el hebreo puede funcionar genéricamente para 'children/descendencia'.
  issues:
  - severity: medium
    issue: Las marcas de nota están ancladas en la palabra equivocada.
    rationale: La nota [a] explica אַשְׁרֵי ('dichosos/felices') y la [b] explica בָּנָיו ('hijos/children'), pero ambas están colocadas después de 'integridad', donde no corresponden al lector ni al texto fuente.
  - severity: low
    issue: La formulación de la nota sobre 'hijos' puede alinearse mejor con la auditoría inglesa.
    rationale: La decisión inglesa aclara que 'sons' funciona genéricamente y por eso se traduce 'children'. En español, si se mantiene 'hijos', la nota debe dejar más claro que puede referirse genéricamente a la descendencia o a los hijos en sentido inclusivo, no solo repetir la literalidad.
  - severity: low
    issue: 'Detalle menor en la documentación léxica del borrador: aparece ''blamelessness'' sin traducir en alternativas españolas.'
    rationale: No afecta el texto principal, pero es una inconsistencia editorial en los metadatos del borrador.
  revised_spanish_text: El justo camina en su integridad; dichosos[a] sus hijos[b] después de él.
  revised_footnotes:
