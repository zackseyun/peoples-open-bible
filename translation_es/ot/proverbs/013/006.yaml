translation:
  language: es
  text: La rectitud guarda al íntegro en el camino, pero la maldad derriba al pecador[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al pecado». El hebreo חַטָּאת puede entenderse aquí como «pecado» en sentido abstracto o como referencia a una persona pecadora.'
    reason: alternative_reading
lexical_decisions:
- source_word: צְדָקָה
  english_pob_choice: Righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia recta
  lexicon: HALOT
  rationale: צְדָקָה aquí nombra una cualidad moral que protege. En español, «justicia» conserva bien ese campo semántico y encaja naturalmente en el paralelismo sapiencial; «rectitud» también es posible, pero «justicia» comunica mejor la fuerza ética del término sin perder fidelidad.
- source_word: תִּצֹּר
  english_pob_choice: guards
  chosen_spanish: guarda
  alternatives_spanish:
  - protege
  - vigila
  - preserva
  lexicon: HALOT
  rationale: El verbo נצר expresa guardar, custodiar o vigilar. «Guarda» es breve, natural y conserva la imagen de protección activa que el hebreo transmite.
- source_word: תָּם
  english_pob_choice: the blameless
  chosen_spanish: al íntegro
  alternatives_spanish:
  - al blameless
  - al de integridad
  - al inocente
  lexicon: HALOT
  rationale: תָּם en Proverbios suele describir a la persona completa, íntegra o sin culpa moral. «Íntegro» evita una noción absoluta de impecabilidad y suena idiomático en español bíblico moderno.
- source_word: דָּרֶךְ
  english_pob_choice: in the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - en su camino
  - en la senda
  - en la vía
  lexicon: HALOT
  rationale: La construcción hebrea es condensada y apunta al ámbito del andar moral. «En el camino» mantiene la metáfora de conducta sin añadir un pronombre no explicitado en el texto.
- source_word: וְרִשְׁעָה
  english_pob_choice: but wickedness
  chosen_spanish: pero la maldad
  alternatives_spanish:
  - pero la impiedad
  - y la maldad
  - pero la perversidad
  lexicon: HALOT
  rationale: La conjunción se entiende adversativamente por el contraste del proverbio. «Maldad» es una equivalencia clara para רִשְׁעָה y suena natural en español.
- source_word: תְּסַלֵּף
  english_pob_choice: overthrows
  chosen_spanish: trastorna
  alternatives_spanish:
  - pervierte
  - desvía
  - derriba
  lexicon: HALOT
  rationale: El piel de סלח/סלף comunica torcer, pervertir o arruinar. «Trastorna» conserva la idea de desorden destructivo sin sobreinterpretar la imagen en exceso.
- source_word: חַטָּאת
  english_pob_choice: the sinner
  chosen_spanish: al pecador
  alternatives_spanish:
  - al que peca
  - al culpable
  - al hombre pecador
  lexicon: HALOT
  rationale: Aunque la forma léxica puede significar «pecado», aquí el paralelismo y el audit trail inglés favorecen entenderla como la persona caracterizada por el pecado. «Al pecador» preserva esa lectura sin perder la tensión interpretativa.
theological_decisions:
- issue: Valor de חַטָּאת en el segundo hemistiquio
  english_pob_reading: The English POB preserves the interpretive tension but ultimately revises to 'the sinner' in the main text, with a note that the Hebrew can be understood as sin or sinful person.
  chosen_spanish_reading: «al pecador» en el texto principal, con nota que reconoce la posibilidad de entenderlo como «pecado».
  alternative_spanish_readings:
  - «al pecado»
  - «al hombre pecador»
  - «al que peca»
  rationale: La frase hebrea es breve y ambigua. En español, traducir literalmente como «pecado» produciría una construcción poco natural y oscurecería el paralelismo. La lectura «pecador» refleja mejor el sentido contextual que la propia revisión inglesa ya adjudica, sin borrar que el término hebreo puede leerse de manera más abstracta.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión más reciente del audit trail: se evitó añadir un pronombre posesivo inexistente en el hebreo («su») y se adoptó la lectura personal de חַטָּאת como «pecador», tal como indica la revisión inglesa final, en lugar de «pecado» abstracto.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general cuando el texto fuente remite al nombre divino; aquí no aparece.
  - Se prefirió «justicia» para צְדָקָה por coherencia con la terminología poética y ética del proyecto.
  - «Íntegro» se usa para תָּם por ser una solución sobria y comprensible en español bíblico contemporáneo.
  - La nota conserva la ambigüedad de דָּרֶךְ sin añadir glosa interpretativa excesiva.
  - La lectura de חַטָּאת como persona está reflejada en el texto principal, en línea con el pasaje auditado.
