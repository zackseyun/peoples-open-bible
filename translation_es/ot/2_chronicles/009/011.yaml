translation:
  language: es
  text: Y el rey hizo con la madera de algum escaleras[a] para la casa de Yahvé y para la casa del rey, y también liras y arpas para los cantores. Nunca antes se había visto nada semejante a ellas en la tierra de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gradas» para la casa de Yahvé y para la casa del rey; el término hebreo puede referirse a accesos arquitectónicos o a escaleras.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲצֵי הָאַלְגּוּמִּים
  english_pob_choice: the algum wood
  chosen_spanish: la madera de algum
  alternatives_spanish:
  - la madera de almug
  - los árboles de algum
  - la madera de alguna especie llamada algum
  lexicon: HALOT
  rationale: El hebreo nombra una madera rara y valiosa con una forma propia de Crónicas. Se conserva la transliteración 'algum' para no identificarla especulativamente ni perder la relación con el texto hebreo y la nota de paralelo con Reyes.
- source_word: מְסִלּוֹת
  english_pob_choice: stairways
  chosen_spanish: escaleras
  alternatives_spanish:
  - escalinatas
  - caminos elevados
  - terrazas
  lexicon: HALOT
  rationale: En este contexto arquitectónico, el término designa construcciones de acceso hechas con esa madera. 'Escaleras' comunica con claridad la lectura adoptada en la POB inglesa, sin imponer una interpretación más técnica de la forma exacta.
- source_word: לְבֵית יְהוָה וּלְבֵית הַמֶּלֶךְ
  english_pob_choice: for the house of Yahweh and for the king’s house
  chosen_spanish: para la casa de Yahvé y para la casa del rey
  alternatives_spanish:
  - para el templo de Yahvé y para el palacio del rey
  - para la casa de Yahvé y para el palacio real
  lexicon: HALOT
  rationale: Se conserva el hebraísmo 'casa' para בַּיִת, porque es el sentido directo del texto y evita sustituirlo por interpretaciones como 'templo' o 'palacio' que, aunque posibles, son más explicativas.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el nombre divino, evitando la sustitución por 'SEÑOR' y preservando el Tetragrámaton como nombre propio en español.
- source_word: כִנֹּרוֹת
  english_pob_choice: lyres
  chosen_spanish: liras
  alternatives_spanish:
  - arpas
  - citras
  lexicon: HALOT
  rationale: כִּנּוֹר designa un instrumento de cuerdas más cercano a 'lira' que a 'arpa'. 'Liras' mantiene mejor la distinción con נְבָלִים.
- source_word: נְבָלִים
  english_pob_choice: harps
  chosen_spanish: arpas
  alternatives_spanish:
  - lutes
  - salterios
  lexicon: HALOT
  rationale: Se opta por 'arpas' como equivalente claro y natural en español, reconociendo que la identificación exacta del instrumento sigue siendo incierta.
- source_word: לַשָּׁרִים
  english_pob_choice: for the singers
  chosen_spanish: para los cantores
  alternatives_spanish:
  - para los cantantes
  - para los músicos
  lexicon: HALOT
  rationale: El participio deriva de 'cantar' y puede traducirse de forma natural como 'cantores'. Este término conserva el vínculo con el servicio musical sin expandir indebidamente el grupo a 'músicos'.
- source_word: וְלֹא נִרְאוּ כָהֵם לְפָנִים
  english_pob_choice: Nothing like them had been seen before
  chosen_spanish: Nunca antes se habían visto cosas como ellas
  alternatives_spanish:
  - No se había visto nunca nada semejante a ellas
  - No se habían visto antes cosas semejantes
  lexicon: HALOT
  rationale: Se reproduce el valor idiomático de unprecedentedad del hebreo sin volverlo demasiado literal. 'Nunca antes' y 'se habían visto' conservan la fuerza superlativa del original.
- source_word: בְּאֶרֶץ יְהוּדָה
  english_pob_choice: in the land of Judah
  chosen_spanish: en la tierra de Judá
  alternatives_spanish:
  - en Judá
  - en el territorio de Judá
  lexicon: HALOT
  rationale: Se mantiene 'tierra' porque el hebreo incluye explícitamente el sustantivo 'land', con un tono más formal y bíblico que 'territorio'.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto usa directamente el nombre del pacto. La política del proyecto pide expresarlo como 'Yahvé' en el texto principal, preservando el nombre propio divino sin enmascararlo con un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La base inglesa pasó de 'into walkways' a 'stairways' para מְסִלּוֹת, priorizando la exactitud léxica en un contexto arquitectónico. La redacción española sigue esa decisión, pero usa 'escaleras' por ser la opción más natural y transparente en español, manteniendo la nota de alternativa para reflejar la incertidumbre del término. Se conserva la transliteración 'algum' conforme al tratamiento inglés y a la forma de Crónicas, y se mantiene la diferencia entre כִּנּוֹרוֹת y נְבָלִים con 'liras' y 'arpas'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en vez de 'SEÑOR' por consistencia con el estándar del proyecto.
  - Se conserva 'casa' para בַּיִת en lugar de 'templo' o 'palacio' para evitar interpretación añadida.
  - Se mantiene la distinción instrumental entre 'liras' y 'arpas' para reflejar dos términos hebreos distintos.
  - '''Cantores'' se prefiere a ''cantantes'' por su tono bíblico y porque reproduce bien la referencia a los encargados del canto.'
