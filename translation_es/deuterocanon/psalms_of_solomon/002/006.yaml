    rationale: Aunque busca reflejar literalmente πονηρᾷ, en español esta combinación suena torpe y puede distraer del sentido. Una opción como «cautiverio funesto» conserva gravedad y evita una paráfrasis fuerte como «cruel».
  - severity: medium
    issue: «su cuello en un sello» oscurece innecesariamente la imagen
    rationale: La compresión del griego debe sentirse, pero esta formulación en español roza lo ininteligible. «Sus cuellos bajo sello» o «con sello» preserva la imagen sin deshacerla por completo.
