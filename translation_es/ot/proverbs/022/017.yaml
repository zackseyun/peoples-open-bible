    rationale: La combinación no fluye bien en español y difumina el valor concreto de תָּשִׁית ('poner/dirigir'). 'Pon tu corazón en mi conocimiento' conserva mejor la metáfora y la fuerza volitiva del hebreo, sin abandonar la antropología de 'corazón'.
