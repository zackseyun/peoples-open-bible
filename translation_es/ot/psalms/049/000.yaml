translation:
  language: es
  text: Para el director del coro[a]. De los hijos de Coré[b]. Salmo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘Al director del coro’. La preposición hebrea puede rendirse de ambas maneras en los encabezados de los salmos.
    reason: lexical_alternative
  - marker: b
    text: O ‘para’ o ‘por’ los hijos de Coré. El encabezado probablemente indica asociación con el grupo corita, sin precisar con más exactitud si se trata de autoría, ejecución o colección.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Al director del coro
  - Para el maestro de coro
  - Para el músico principal
  lexicon: HALOT
  rationale: En los encabezados de los Salmos, la expresión señala dirección o dedicación musical. ‘Director del coro’ comunica bien la función litúrgica en español sin imponer una interpretación más específica que la permitida por el hebreo.
- source_word: לִבְנֵי
  english_pob_choice: Of the sons of
  chosen_spanish: De los hijos de
  alternatives_spanish:
  - Para los hijos de
  - Por los hijos de
  lexicon: HALOT
  rationale: La preposición ל en estos encabezados puede expresar pertenencia, asociación o atribución. ‘De los hijos de’ preserva mejor esa ambigüedad que resolverla como autoría o destinatario.
- source_word: קֹרַח
  english_pob_choice: Korah
  chosen_spanish: Coré
  alternatives_spanish:
  - Korah
  lexicon: convención bíblica española
  rationale: En español bíblico, el nombre propio suele aparecer como ‘Coré’. Es una transliteración tradicional y reconocible para lectores de iglesia, sin alterar la referencia al linaje korahita.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Un salmo
  - Cántico
  lexicon: HALOT
  rationale: מִזְמוֹר es la etiqueta genérica del género. En español, ‘Salmo’ funciona de manera natural en un encabezado breve y respeta el valor literario/musical del término.
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: no se registran cambios necesarios y el consenso de auditoría muestra alta concordancia.'
  spanish_consistency_notes:
