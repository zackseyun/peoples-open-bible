translation:
  language: es
  text: Hizo dos capiteles[a] de bronce fundido para poner sobre la parte superior de las columnas. La altura de un capitel era de cinco codos, y la altura del segundo capitel era de cinco codos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «coronas» para «capiteles»; el término hebreo designa la sección ornamental superior de una columna.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹתָרֹת / הַכֹּתֶרֶת
  english_pob_choice: capitals / capital
  chosen_spanish: capiteles / capitel
  alternatives_spanish:
  - coronas
  - chapiteles
  lexicon: HALOT
  rationale: En contexto arquitectónico sobre columnas, el término designa la pieza ornamental superior. «Capitel» es el equivalente moderno claro y fiel; «coronas» sería demasiado literal y podría desorientar, y «chapiteles» es arcaico.
- source_word: עָשָׂה
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - fabricó
  - construyó
  lexicon: HALOT
  rationale: El verbo hebreo es simple y narrativo; «hizo» conserva esa sobriedad sin añadir matiz técnico innecesario.
- source_word: לָתֵת
  english_pob_choice: to set
  chosen_spanish: para poner
  alternatives_spanish:
  - para colocar
  - para situar
  lexicon: HALOT
  rationale: La finalidad es situarlos sobre las columnas. En español, «poner» comunica con naturalidad la acción de colocarlos; no conviene sobredetallar el gesto con un tecnicismo más fuerte que el hebreo.
- source_word: רָאשֵׁי הָעַמּוּדִים
  english_pob_choice: the tops of the pillars
  chosen_spanish: las cabezas de las columnas
  alternatives_spanish:
  - las cimas de las columnas
  - las partes superiores de las columnas
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente «cabezas». En español, «cabezas de las columnas» mantiene esa imagen sin perder el sentido arquitectónico; además, evita diluir el paralelismo del texto. «Columnas» se usa por el mismo valor arquitectónico que «pillars» en inglés.
- source_word: מֻצַק נְחֹשֶׁת
  english_pob_choice: of cast bronze
  chosen_spanish: de bronce fundido
  alternatives_spanish:
  - de bronce vaciado
  - de bronce colado
  lexicon: HALOT
  rationale: La frase describe bronce trabajado por fundición. «Bronce fundido» es natural en español y preserva el sentido de material/proceso; «vaciado» o «colado» son posibles, pero menos estándar para una lectura pública.
- source_word: חָמֵשׁ אַמּוֹת
  english_pob_choice: five cubits
  chosen_spanish: cinco codos
  alternatives_spanish:
  - cinco codos de altura
  lexicon: HALOT
  rationale: Se conserva la unidad antigua «codos» para transparencia textual, como en el inglés POB.
- source_word: קוֹמַת
  english_pob_choice: the height of
  chosen_spanish: La altura de
  alternatives_spanish:
  - La estatura de
  lexicon: HALOT
  rationale: En este contexto de medidas arquitectónicas, «altura» es la equivalencia precisa y natural.
- source_word: הָאֶחָת
  english_pob_choice: the one
  chosen_spanish: un capitel
  alternatives_spanish:
  - el uno
  - el primero
  lexicon: HALOT
  rationale: El hebreo distingue «el uno» sin decir explícitamente «el primero». En español, la primera mención se vuelve naturalmente «un capitel»; el paralelo posterior mantiene la pareja con «el segundo capitel». Se evita introducir «primero» sin necesidad.
- source_word: הַשֵּׁנִית
  english_pob_choice: the second
  chosen_spanish: el segundo capitel
  alternatives_spanish:
  - el otro capitel
  lexicon: HALOT
  rationale: El hebreo marca de manera explícita el segundo elemento de la pareja. «El segundo capitel» conserva esa precisión.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el trazado del texto hebreo y coincide con el audit trail inglés en las decisiones arquitectónicas principales: dos capiteles, bronce fundido, colocados sobre las cabezas de las columnas, con cinco codos de altura cada uno. Se conserva la unidad antigua «codos» y la distinción entre el uno y el segundo elemento sin forzar una ordinalidad no explícita en el hebreo.'
  spanish_consistency_notes:
  - Se mantiene «capiteles» para כֹתָרֹת y «capitel» para הַכֹּתֶרֶת, en coherencia terminológica.
  - Se conserva el lenguaje arquitectónico concreto («cabezas de las columnas») para reflejar la imagen del hebreo.
  - La única nota al pie ofrece la alternativa tradicional «coronas» sin sustituir el término principal.
