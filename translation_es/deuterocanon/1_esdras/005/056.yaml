review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien el sentido general del griego y del rastro POB en la asignación de los levitas, la lista de nombres, la función de supervisión y la distinción entre «casa» y «templo». Sin embargo, no preserva del todo la terminología de proyecto para κύριος, y una nota y una decisión léxica introducen problemas formales.
  spanish_quality_summary: El español es mayormente claro y digno. Aun así, conviene ajustar «Señor» a «Yahvé» según la política del proyecto, corregir la conjunción «u» a «o» ante «supervisan», y pulir un pequeño error tipográfico/contaminación de caracteres en la decisión léxica de ἐργοδιῶκται. El texto revisado mejora coherencia terminológica y fluidez sin alterar el contenido.
  glossary_alignment: 'Desalineación principal: κύριος aparece tres veces y, según los defaults del proyecto, debe verterse «Yahvé» en el texto principal; aquí el borrador usa «Señor». Los nombres Kadmiel y Henadad sí siguen la racionalidad documentada. La preservación de plural «obras» también está bien. No hay otros choques mayores con el glosario del proyecto.'
  issues:
  - severity: high
    issue: κύριος se traduce como «Señor» en vez de «Yahvé» en el texto principal
    rationale: La política de proyecto dada para español establece Yahvé como forma principal para יהוה / YHWH, y pide explicar excepciones cuando el griego κύριος cite o aluda al nombre divino. En este contexto de templo y con paralelo hebreo, no hay razón suficiente para apartarse del default en la traducción principal.
  - severity: medium
    issue: La nota c dice «dirigen u supervisan»
    rationale: Ante «supervisan» corresponde «o», no «u», porque la palabra no empieza con sonido /i/. Es un problema menor de corrección lingüística en español.
  - severity: medium
    issue: La decisión léxica de ἐργοδιῶκται contiene texto corrupto («ओverseen»)
    rationale: Aunque está en metadatos y no en el texto bíblico, revela un problema de limpieza editorial y conviene corregirlo en la revisión general.
  revised_spanish_text: Y pusieron a los levitas[a] desde los veinte años en adelante sobre las obras de Yahvé. Y se levantó Jesúa con sus hijos y hermanos, y Kadmiel su hermano, y los hijos de Jesúa hijo de Henadad[b], y los hijos de Judá hijo de Eliadún, junto con sus hijos y hermanos; todos los levitas, unidos, como supervisores de la obra[c], llevando adelante las obras[d] en la casa de Yahvé. Y los constructores edificaron el templo de Yahvé.
  revised_footnotes:
