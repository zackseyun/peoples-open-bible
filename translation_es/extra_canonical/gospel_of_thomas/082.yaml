base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/082.yaml
  text: Jesus said[a], “The one who is near me is near the fire[c][b], and the one who is far from me is far from the kingdom.”
  footnotes:
  - marker: a
    text: ‘Kingdom’ translates Coptic ⲙⲛⲧⲣⲣⲟ, which can also mean ‘kingship’ or ‘royal rule.’
    reason: lexical_alternative
  - marker: b
    text: The manuscript has ‘to me’ (ⲉⲣⲟⲓ) / ‘from me’ (ⲙ̄ⲙⲟⲓ); Dilley normalizes these with independent pronouns. The article with ‘kingdom’ varies (ⲧ-/ⲡ-).
    reason: textual_variant
  - marker: c
    text: Compare the ‘fire’ imagery in Luke 12:49 for thematic resonance, though the saying here is distinct.
    reason: cross_reference
