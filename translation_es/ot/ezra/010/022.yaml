  rationale: El hebreo combina la partícula conjuntiva con la preposición partitiva y el constructo plural de בן. En español, «Y de los hijos de» conserva la relación de pertenencia y la función partitiva sin volver la frase pesada.
- source_word: פַּשְׁחוּר
