review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: dos imperativos plurales dirigidos a asistentes femeninas o colectivas, seguidos de la razón causal, y conserva correctamente la imagen de alimentos restauradores y la declaración de estar enferma de amor. Sin embargo, dos elementos no preservan adecuadamente el registro meta del proyecto ni la alternativa léxica inglesa documentada.'
  spanish_quality_summary: El texto es legible, poético y fiel en líneas generales, pero «Sostenedme / refrescadme» introduce un voseo peninsular/aracaizante poco acorde con el estilo español neutral latinoamericano solicitado. Además, la nota [c] «amorosamente enferma» no representa la alternativa inglesa «love-sick»; en español la forma natural y fiel es «enamorada hasta enfermar» o mejor «enferma de amor» en texto principal y «enamorada hasta enfermar» no es exacta. La alternativa más directa es «enamorada y enferma» tampoco es precisa. Lo mejor es usar «enamorada hasta enfermar» como nota si se quiere reflejar el compuesto, aunque el español idiomático más cercano es «enamorada» no suficiente. Por eso conviene reformular la nota como «O ‘enamorada hasta enfermar’» o «O ‘mal de amores’»; la primera es más transparente aunque menos idiomática.
  glossary_alignment: 'No hay términos del glosario mayor implicados. «Enferma de amor» encaja bien para חוֹלַת אַהֲבָה. «Manzanas» con nota de incertidumbre botánica también sigue la decisión POB. Se requiere ajustar el registro verbal al español meta: «Sosténganme / refrésquenme» en vez de formas en -d.'
