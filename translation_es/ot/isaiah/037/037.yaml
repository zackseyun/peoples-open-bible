translation:
  language: es
  text: Así Senaquerib, rey de Asiria, se retiró, fue y volvió[a], y habitó en Nínive.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «residió en Nínive». El verbo hebreo puede denotar habitar, residir o vivir.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסַּע
  english_pob_choice: departed
  chosen_spanish: se retiró
  alternatives_spanish:
  - partió
  - salió
  - se marchó
  lexicon: HALOT
  rationale: En este contexto narrativo de movimiento y retirada, «se retiró» comunica el desplazamiento sin añadir la imagen específica de levantar campamento, que no está explícita en el hebreo.
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - anduvo
  - se fue
  - iba
  lexicon: HALOT
  rationale: El hebreo encadena verbos simples de movimiento; «fue» conserva esa secuencia breve y directa en español sin sobrecargarla con una glosa explicativa.
- source_word: וַיָּשָׁב
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - dio la vuelta
  - retornó
  lexicon: HALOT
  rationale: «Volvió» refleja el valor normal de שׁוב en un contexto de viaje y regreso. Es natural en español y mantiene la progresión narrativa hacia el retorno.
- source_word: מֶלֶךְ אַשּׁוּר
  english_pob_choice: king of Assyria
  chosen_spanish: rey de Asiria
  alternatives_spanish:
  - el rey de Asiria
  lexicon: HALOT
  rationale: La construcción posesiva/titulativa se vierte de forma idiomática como «rey de Asiria», preservando el título real y el ámbito político sin alterar el sentido.
- source_word: וַיֵּשֶׁב
  english_pob_choice: dwelt
  chosen_spanish: habitó
  alternatives_spanish:
  - vivió
  - residió
  - moró
  lexicon: HALOT
  rationale: El verbo ישׁב puede significar habitar, residir o vivir. Dado el tono formal del pasaje y la decisión inglesa de conservar un registro elevado, «habitó» mantiene dignidad y amplitud semántica sin sonar arcaizante como «moró».
- source_word: בְּנִינְוֵה
  english_pob_choice: in Nineveh
  chosen_spanish: en Nínive
  alternatives_spanish:
  - en la ciudad de Nínive
  lexicon: HALOT
  rationale: Es una indicación locativa directa; «Nínive» es la transliteración estándar en español y no requiere expansión.
translation_notes:
  revision_awareness: El inglés POB pasó de «lived» a «dwelt» para elevar el registro, y eliminó una partícula innecesaria en la secuencia verbal. La versión española sigue esa preferencia por un registro formal y conserva la cadena simple de movimientos, sin añadir elementos no presentes en el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Asiria» y «Nínive» con la transliteración tradicional española.
  - 'Se preserva la secuencia verbal hebrea con tres acciones breves: se retiró, fue y volvió.'
  - «Habitó» se eligió para reflejar el valor de residencia continua de ישׁב en un registro digno.
  - No se introduce ninguna expansión interpretativa sobre la retirada de Senaquerib más allá del texto hebreo.
