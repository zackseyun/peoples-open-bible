translation:
  language: es
  text: 'Pero ella dijo[a]: «Me fue dado como regalo, además de mi salario». Pero no le creí, y le dije que lo devolviera a sus dueños[b]; y me avergoncé ante ella[c]. Entonces ella respondió y me dijo: «¿Dónde están tus obras de misericordia y tus obras de justicia? Mira[d], todo acerca de ti es conocido».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «junto con mi salario» / «como parte de mi salario». El griego puede indicar algo dado en relación con el pago; el contexto favorece la idea de un regalo aparte del salario.
    reason: lexical_alternative
  - marker: b
    text: Griego «a sus señores» (κυρίοις); aquí se traduce «dueños» porque el contexto trata de devolver un bien disputado a quienes lo poseían.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, el verbo alude a ponerse rojo o sonrojarse; en contexto expresa vergüenza o bochorno.
    reason: lexical_alternative
  - marker: d
    text: O «He aquí». También puede entenderse «todo lo tuyo es conocido».
    reason: alternative_reading
lexical_decisions:
- source_word: Δῶρον
  english_pob_choice: gift
  chosen_spanish: regalo
  alternatives_spanish:
  - don
  - obsequio
  lexicon: LSJ
  rationale: En este contexto doméstico, δῶρον refiere a un objeto recibido gratuitamente. «Regalo» es natural en español y conserva la idea de algo añadido, no del salario mismo.
- source_word: δέδοταί
  english_pob_choice: it was given
  chosen_spanish: me fue dado
  alternatives_spanish:
  - me ha sido dado
  - fue dado a mí
  lexicon: LSJ
  rationale: El perfecto pasivo indica que el objeto llegó a ella desde otra fuente. «Me fue dado» conserva la pasividad y suena idiomático en español.
- source_word: ἐπὶ τῷ μισθῷ
  english_pob_choice: in addition to my wages
  chosen_spanish: además de mi salario
  alternatives_spanish:
  - junto con mi salario
  - como parte de mi salario
  - para mi salario
  lexicon: LSJ
  rationale: La frase expresa algo dado en conexión con la paga, pero distinto de ella. «Además de» refleja mejor la distinción que hace la mujer entre regalo y salario.
- source_word: οὐκ ἐπίστευον αὐτῇ
  english_pob_choice: I did not believe her
  chosen_spanish: no le creí
  alternatives_spanish:
  - no confié en ella
  - no le daba crédito
  lexicon: LSJ
  rationale: El imperfecto narrativo de πιστεύω se vierte de modo directo y natural. «No le creí» preserva la desconfianza puntual del relato.
- source_word: ἀποδιδόναι
  english_pob_choice: to give it back
  chosen_spanish: lo devolviera
  alternatives_spanish:
  - lo regresara
  - lo restituyera
  lexicon: LSJ
  rationale: La idea es devolver el objeto a quien corresponde. En español, «devolver» transmite bien la restitución sin necesidad de tecnicismo.
- source_word: τοῖς κυρίοις
  english_pob_choice: its owners
  chosen_spanish: sus dueños
  alternatives_spanish:
  - sus propietarios
  - sus amos
  lexicon: LSJ
  rationale: Aunque κυρίοις puede significar «señores» o «amos», aquí el contexto trata de la devolución de un bien disputado. «Dueños» evita una resonancia teológica ajena y mantiene la propiedad como cuestión central.
- source_word: ἠρυθρίων
  english_pob_choice: I was embarrassed
  chosen_spanish: me llené de vergüenza
  alternatives_spanish:
  - me avergoncé
  - me ruboricé
  - me sentí avergonzado
  lexicon: LSJ
  rationale: El verbo alude literalmente a enrojecer o sonrojarse, pero en contexto expresa vergüenza ante la reprensión. «Me llené de vergüenza» conserva ese valor social y moral.
- source_word: ἐλεημοσύναι
  english_pob_choice: acts of mercy
  chosen_spanish: obras de misericordia
  alternatives_spanish:
  - limosnas
  - actos de caridad
  - obras caritativas
  lexicon: LSJ
  rationale: El término puede referirse específicamente a limosnas, pero aquí funciona como resumen ético de la piedad de Tobit. «Obras de misericordia» mantiene la fuerza religiosa sin sonar arcaico.
- source_word: δικαιοσύναι
  english_pob_choice: righteous deeds
  chosen_spanish: obras de justicia
  alternatives_spanish:
  - obras justas
  - actos de justicia
  - obras de rectitud
  lexicon: LSJ
  rationale: El plural apunta a acciones concretas, no a una abstracción doctrinal. «Obras de justicia» conserva el paralelismo con las «obras de misericordia» y el valor ético de δικαιοσύναι.
- source_word: γνωστὰ πάντα μετὰ σοῦ
  english_pob_choice: everything about you is known
  chosen_spanish: todo lo que hay en ti es conocido
  alternatives_spanish:
  - todo acerca de ti es conocido
  - todo lo tuyo es evidente
  - todo te es conocido
  lexicon: LSJ
  rationale: La frase griega es breve e idiomática. «Todo lo que hay en ti es conocido» preserva la acusación abierta sin especificar más de lo que dice el texto.
theological_decisions:
- issue: Plural ethical language in ἐλεημοσύναι καὶ δικαιοσύναι
  english_pob_reading: acts of mercy and righteous deeds
  chosen_spanish_reading: obras de misericordia y obras de justicia
  alternative_spanish_readings:
  - limosnas y obras de justicia
  - obras de caridad y obras justas
  rationale: El pasaje usa plurales concretos para acciones pías, no conceptos abstractos. La traducción mantiene esa concreción y no reduce ἐλεημοσύναι a un término meramente económico.
  doctrine_reference: 'DOCTRINE.md: δικαιοσύνη/ἐλεημοσύνη; translation philosophy #5'
- issue: The force of the final rebuke
  english_pob_reading: Behold, everything about you is known
  chosen_spanish_reading: Mira, todo lo que hay en ti es conocido
  alternative_spanish_readings:
  - He aquí, todo acerca de ti es conocido
  - Pues todo es conocido respecto de ti
  rationale: La frase final debe sonar como reprensión, no como explicación neutra. «Mira» reproduce el golpe discursivo del griego sin cargarlo de interpretación adicional.
  doctrine_reference: 'DOCTRINE.md: preserve ambiguity and rhetorical force'
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del audit trail, prefiriendo un registro formal y sobrio; por eso se evitó un calco mecánico de «Look» y se mantuvo la idea de vergüenza de ἠρυθρίων con una expresión natural en español. También se preservó la tensión del griego entre regalo y salario, y entre obras concretas de misericordia/justicia y la acusación final.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton.
  - Se mantuvo el paralelismo de plurales éticos («obras de misericordia» / «obras de justicia») para reflejar ἐλεημοσύναι y δικαιοσύναι.
  - Se evitó «señores» en el texto principal para no introducir resonancias teológicas ajenas al contexto doméstico del pasaje.
  - El cierre conserva un tono de reprensión pública y no explicita más de lo que dice el griego.
