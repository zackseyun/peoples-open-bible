translation:
  language: es
  text: Todos los habitantes de las costas[a] están consternados ante ti, y sus reyes se estremecen intensamente[b]; sus rostros están turbados[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los habitantes de las islas'. El hebreo אִיִּים puede referirse a islas o, más ampliamente, a costas y regiones marítimas.
    reason: lexical_alternative
  - marker: b
    text: Hebreo literalmente, 'se estremecen con un estremecimiento', una expresión intensiva de horror extremo.
    reason: lexical_alternative
  - marker: c
    text: La última cláusula es difícil; también puede entenderse como 'sus rostros tiemblan' o 'sus rostros están contorsionados'.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל
  english_pob_choice: All
  chosen_spanish: Todos
  alternatives_spanish:
  - Toda la gente
  - La totalidad de
  lexicon: HALOT
  rationale: El cuantificador expresa totalidad del grupo mencionado; en español, 'Todos' es natural y fiel al alcance global del hebreo.
- source_word: יֹשְׁבֵי הָאִיִּים
  english_pob_choice: the inhabitants of the coastlands
  chosen_spanish: los habitantes de las costas
  alternatives_spanish:
  - los habitantes de las islas
  - los que habitan en las islas
  - los habitantes de las tierras marítimas
  lexicon: HALOT
  rationale: אִיִּים puede significar islas o regiones marítimas costeras. Dado el contexto profético sobre Tiro y la navegación, 'las costas' comunica bien el valor amplio sin sonar forzado en español.
- source_word: שָׁמְמ֖וּ
  english_pob_choice: are appalled
  chosen_spanish: están consternados
  alternatives_spanish:
  - están atónitos
  - están desolados
  - quedan pasmados
  lexicon: HALOT
  rationale: El verbo puede expresar quedar sobrecogido/atónito; en este contexto de reacción ante la ruina de Tiro, 'consternados' reproduce el impacto emocional sin sugerir desolación literal.
- source_word: עָלָ֑יִךְ
  english_pob_choice: at you
  chosen_spanish: por ti
  alternatives_spanish:
  - ante ti
  - a causa de ti
  - contra ti
  lexicon: HALOT
  rationale: La preposición marca el objeto o la ocasión de la conmoción. En español, 'por ti' expresa de modo natural la reacción causada por la caída de Tiro.
- source_word: וּמַלְכֵיהֶם
  english_pob_choice: and their kings
  chosen_spanish: y sus reyes
  alternatives_spanish:
  - y los reyes de ellos
  - y sus soberanos
  lexicon: HALOT
  rationale: El sufijo de tercera persona plural se conserva de forma simple y directa con 'sus reyes'.
- source_word: שָׂעֲרוּ
  english_pob_choice: shudder greatly
  chosen_spanish: se estremecen grandemente
  alternatives_spanish:
  - tiemblan con violencia
  - se horrorizan
  - se agitan intensamente
  lexicon: HALOT
  rationale: El verbo tiene un matiz de agitación violenta; 'se estremecen' conserva la reacción física y 'grandemente' refleja el intensivo del hebreo sin añadir interpretación ajena.
- source_word: שַׂעַר
  english_pob_choice: greatly
  chosen_spanish: grandemente
  alternatives_spanish:
  - muchísimo
  - con gran estremecimiento
  lexicon: HALOT
  rationale: La construcción cognada intensifica la acción. 'Grandemente' es una solución sobria y formal que preserva esa intensificación en español bíblico contemporáneo.
- source_word: רָעֲמ֖וּ פָּנִים
  english_pob_choice: their faces are troubled
  chosen_spanish: sus rostros están turbados
  alternatives_spanish:
  - sus rostros tiemblan
  - sus rostros se contraen
  - sus rostros están contorsionados
  lexicon: HALOT
  rationale: La expresión final es difícil. 'Turbados' mantiene el sentido de perturbación visible en el rostro sin forzar una imagen médica o demasiado interpretativa.
translation_notes:
  revision_awareness: 'La versión inglesa más reciente ajustó la segunda cláusula de ''shudder with horror'' a ''shudder greatly'' y ''their faces are convulsed'' a ''their faces are troubled'' para reflejar con más precisión el hebreo sin sobrerinterpretación. La redacción española sigue esa revisión: conserva la intensificación del verbo y opta por ''turbados'' para la cláusula final, manteniendo la dificultad del original.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no aplicable aquí; el versículo no contiene el tetragrámaton.
  - Se eligió 'costas' para אָיִּים en vez de 'islas' para reflejar el uso profético amplio y el contexto marítimo.
  - '''Grandemente'' traduce el intensivo hebreo de manera formal y sobria.'
  - La cláusula final se deja en un nivel de claridad moderado, sin resolver en exceso una frase hebrea reconocidamente difícil.
