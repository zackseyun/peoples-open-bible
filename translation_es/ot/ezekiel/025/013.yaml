revisions:
- from: 'Por tanto, así dice el Señor Yahvé: Extenderé mi mano contra Edom[a], y cortaré de él al hombre y al animal; lo convertiré en una desolación; desde Temán hasta Dedán caerán a espada.'
  to: 'Por tanto, así dice el Señor Yahvé: extenderé mi mano contra Edom[a], y cortaré de ella al hombre y al animal; la convertiré en desolación; desde Temán hasta Dedán caerán a espada.'
  rationale: Se corrige la referencia pronominal para reflejar el femenino singular hebreo ('de ella'), se mejora la concordancia y naturalidad de la cláusula de desolación, y se ajusta la capitalización conforme al uso normal del español. Se conservan el sentido, la terminología del proyecto y la nota lexical sobre Dedán.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:45:37Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo: fórmula profética, gesto de juicio contra Edom, eliminación de humanos y animales, desolación del territorio, y extensión geográfica desde Temán hasta Dedán. También conserva correctamente la nota sobre el valor de extensión de וּדְדָנֶה. Sin embargo, hay ajustes de fidelidad y estilo: el pronombre de מִמֶּנָּה es femenino, por lo que conviene evitar ''de él'' y usar una formulación natural como ''de ella''. Además, ''lo convertiré en una desolación'' no concuerda naturalmente con Edom como entidad territorial en español; ''la convertiré en desolación'' o una reestructuración equivalente refleja mejor el referente.'
  spanish_quality_summary: 'La redacción es mayormente clara y digna, pero presenta dos roces de naturalidad: ''cortaré de él'' suena poco idiomático en español bíblico actual, y la cadena ''lo convertiré en una desolación'' resulta menos natural por la concordancia con Edom/tierra. También es preferible minúscula tras dos puntos: ''así dice el Señor Yahvé: extenderé...'' El resto, incluyendo ''caerán a espada'', es plenamente legible y de registro adecuado.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יהוה -> ''Yahvé'' se preserva incluso en אֲדֹנָי יהוה mediante ''el Señor Yahvé''; topónimos ''Temán'' y ''Dedán'' se transliteran correctamente; ''desolación'' mantiene bien חָרְבָּה. La pareja ''hombre y animal'' es aceptable, aunque ''ser humano y animal'' sería menos idiomático aquí; se puede mantener ''hombre y animal'' por la fórmula tradicional. No hay conflicto doctrinal que requiera adjudicación mayor.'
  issues:
  - severity: medium
    issue: Uso de 'de él' para מִמֶּנָּה
    rationale: El hebreo lleva sufijo femenino singular ('de ella'), referido a Edom/territorio. 'De él' no refleja esa referencia y además suena menos natural en español.
  - severity: medium
    issue: '''Lo convertiré en una desolación'' presenta concordancia y estilo mejorables'
    rationale: Con Edom como nación/tierra, en español suena más natural 'la dejaré desolada' o 'la convertiré en desolación'. La formulación actual es comprensible, pero menos idiomática.
  - severity: low
    issue: Mayúscula innecesaria tras dos puntos en discurso continuo
    rationale: 'En español corresponde ''así dice el Señor Yahvé: extenderé...'' salvo que se opte por punto seguido o comillas.'
  revised_spanish_text: 'Por tanto, así dice el Señor Yahvé: extenderé mi mano contra Edom[a], y cortaré de ella al hombre y al animal; la convertiré en desolación; desde Temán hasta Dedán caerán a espada.'
  revised_footnotes:
  - marker: a
    text: O “hasta Dedán”. La expresión hebrea señala el alcance de la devastación desde Temán hasta Dedán.
    reason: lexical_alternative
  revision_rationale: Se corrige la referencia pronominal para reflejar el femenino singular hebreo ('de ella'), se mejora la concordancia y naturalidad de la cláusula de desolación, y se ajusta la capitalización conforme al uso normal del español. Se conservan el sentido, la terminología del proyecto y la nota lexical sobre Dedán.
