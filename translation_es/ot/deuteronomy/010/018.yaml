    reason: lexical_alternative
  - marker: b
    text: O «el residente extranjero» o «el forastero residente». Hebreo גֵּר designa a un no nativo que vive entre Israel, no meramente a un extraño pasajero.
    reason: lexical_alternative
  - marker: c
    text: Lit. «pan». En esta pareja, «pan y ropa» expresa la provisión básica de sustento y vestido.
    reason: lexical_alternative
