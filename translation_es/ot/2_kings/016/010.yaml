  text: וַ/יֵּ֣לֶךְ הַ/מֶּ֣לֶךְ אָחָ֡ז לִ֠/קְרַאת תִּגְלַ֨ת פִּלְאֶ֤סֶר מֶֽלֶךְ אַשּׁוּר֙ דּוּמֶּ֔שֶׂק וַ/יַּ֥רְא אֶת הַ/מִּזְבֵּ֖חַ אֲשֶׁ֣ר בְּ/דַמָּ֑שֶׂק וַ/יִּשְׁלַח֩ הַ/מֶּ֨לֶךְ אָחָ֜ז אֶל אוּרִיָּ֣ה הַ/כֹּהֵ֗ן אֶת דְּמ֧וּת הַ/מִּזְבֵּ֛חַ וְ/אֶת תַּבְנִית֖/וֹ לְ/כָֽל מַעֲשֵֽׂ/הוּ־־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_kings/016/010.yaml
  text: Then King Ahaz went to meet Tiglath-pileser king of Assyria at Damascus[a], and he saw the altar that was at Damascus. And King Ahaz sent to Uriah the priest the likeness of the altar and its pattern[b], according to all its workmanship.
  footnotes:
