revisions:
- from: Hasta en los faldones[a] de tu ropa se halló la sangre de las vidas de los pobres inocentes. Yo no los hallé en un allanamiento[b], sino a causa de todas estas cosas[c].
  to: Aun en tus faldones[a] se halló la sangre de las vidas de los pobres inocentes. Yo no los hallé en un robo por boquete[b], sino por todas estas cosas[c].
