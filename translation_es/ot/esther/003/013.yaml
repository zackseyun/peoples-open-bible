base_translation:
  language: en
  yaml_path: translation/ot/esther/003/013.yaml
  text: Letters were sent by the hand of the couriers to all the provinces of the king[a], to destroy, to kill, and to annihilate all the Jews, from young to old, children and women, in one day, on the thirteenth day of the twelfth month, that is, the month Adar[d][c][b], and to plunder their possessions.
  footnotes:
