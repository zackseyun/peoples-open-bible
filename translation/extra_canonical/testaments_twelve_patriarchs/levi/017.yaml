id: T12P.LEV.17
reference: Testament of Levi 17
source:
  edition: Charles 1908 Greek Versions (Levi source-fix v2)
  text: XVII. *Καὶ ὅτι ἠκούσατε¹ περὶ τῶν ἑβδομήκοντα² ἑβδομάδων³, ἀκούσατε καὶ⁴ περὶ τῆς ἱερωσύνης⁵. 2. Καθ’ ἕκαστον γὰρ ἰωβηλαῖον⁶ ἔσται ἱερωσύνη⁷. Καὶ⁸ ἐν τῷ⁹ πρώτῳ ἰωβηλαίῳ ὁ *χριόμενος πρῶτος¹⁰ εἰς ἱερωσύνην *ἔσται μέγας¹¹, καὶ λαλήσει¹² Θεῷ ὡς πατρί· καὶ ἡ ἱερωσύνη αὐτοῦ πλήρης μετὰ¹³ κυρίου· [καὶ ἐν ἡμέραις¹⁴ χαρᾶς αὐτοῦ¹⁵ *ἐπὶ σωτηρίᾳ¹⁶ κόσμου *αὐτὸς ἀναστήσεται]¹⁷. 3. Ἐν¹⁸ τῷ δευτέρῳ ἰωβηλαίῳ ὁ¹⁹ χριόμενος ἐν πένθει ἀγαπητοῦ²⁰ συλληφθήσεται²¹ *καὶ ἔσται²² ἡ ἱερωσύνη αὐτοῦ τιμία²³, καὶ παρὰ πάντων²⁴ δοξασθήσεται. 4. Ὁ δὲ τρίτος ἱερεὺς²⁵ λύπῃ παραληφθήσεται²⁶. 5. Καὶ²⁷ ὁ τέταρτος ἐν ὀδύναις²⁸ ἔσται· ὅτι²⁹ προσθήσει³⁰ *ἐπ’ αὐτῷ³¹ *ἡ ἀδικία³² *εἰς πλῆθος³³, καὶ πᾶς Ἰσραὴλ μισήσουσιν³⁴ ἕκαστος³⁵ τὸν³⁶ πλησίον αὐτοῦ. 6. Ὁ πέμπτος ἐν σκότει³⁷ παραληφθήσεται³⁸. 7. Ὡσαύτως³⁹ καὶ ὁ ἕκτος καὶ ὁ ἕβδομος⁴⁰. 8. *Ἐν δὲ τῷ ἑβδόμῳ²⁷ ἔσται μιασμός⁴¹, ὃν οὐ δύναμαι⁴² εἰπεῖν ἐνώπιον⁴³ ἀνθρώπων· ὅτι αὐτοὶ γνώσονται οἱ ποιοῦντες αὐτά. 9. Διὰ τοῦτο ἐν αἰχμαλωσίᾳ καὶ ἐν προνομῇ ἔσονται· καὶ ἡ γῆ αὐτῶν⁴⁴ καὶ *ἡ ὕπαρξις⁴⁵ ἀφανισθήσεται⁴⁶. 10. *Καὶ ἐν τῇ πέμπτῃ⁴⁷ ἑβδομάδι⁴⁸ ἐπιστρέψουσιν εἰς γῆν ἐρημώσεως αὐτῶν, καὶ⁴⁹ ἀνακαινοποιήσουσιν οἶκον κυρίου⁵⁰.
  language: Greek
  source_pages:
  - 127
  - 128
translation:
  text: 'And since you have heard about the seventy weeks[1], hear also about the priesthood. For in each jubilee there will be a priesthood. In the first jubilee, the one first anointed for the priesthood will be great, and he will speak to God as to a father; and his priesthood will be complete with the Lord. [And in the days of his joy he will arise for the salvation of the world.]


    In the second jubilee, the one anointed will be conceived in the sorrow of a beloved one, and his priesthood will be honored, and he will be glorified by all.


    But the third priest will be taken in grief. And the fourth will be in pains, because unrighteousness will increase upon him in abundance, and all Israel will hate, each one, his neighbor. The fifth will be taken in darkness. Likewise also the sixth and the seventh.


    But in the seventh there will be a defilement which I cannot speak of before men, for those who do these things will know them. Therefore they will be in captivity and in plundering, and their land and their possessions will be destroyed.


    And in the fifth week they will return to the land of their desolation[4][3][2], and they will renew the house of the Lord.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: The clause 'And in the days of his joy he will rise for the salvation of the world' is textually uncertain in the witness used here and may reflect a later expansion; it is therefore retained in brackets.
    reason: textual_variant
  - marker: '2'
    text: '''Seventy weeks'' echoes apocalyptic chronological language known from Daniel; the text assumes the audience has already heard that earlier explanation.'
    reason: cross_reference
  - marker: '3'
    text: '''Defilement'' can carry both cultic and moral force here, especially in a passage about the corruption of the priesthood.'
    reason: lexical_alternative
  - marker: '4'
    text: '''They will renew the house of the Lord'' may imply restoration or rebuilding of the temple after devastation.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑβδομήκοντα ἑβδομάδων
  chosen: seventy weeks
  alternatives:
  - seventy sevens
  lexicon: LSJ
  rationale: Retains the apocalyptic phrasing familiar from Danielic chronology while remaining natural English. 'Weeks' is the plain sense of ἑβδομάδες here.
- source_word: ἱερωσύνη
  chosen: priesthood
  alternatives:
  - priestly office
  lexicon: LSJ
  rationale: Standard and contextually precise rendering for the office/institution under discussion throughout the chapter.
- source_word: ἰωβηλαῖον
  chosen: jubilee
  alternatives:
  - jubilee period
  lexicon: LSJ
  rationale: Direct rendering of the calendrical term; preserves the structured prophetic sequence.
- source_word: χριόμενος
  chosen: the one anointed
  alternatives:
  - the anointed one
  - the one being anointed
  lexicon: LSJ
  rationale: A participial form referring to the priest installed by anointing. 'The one anointed' is transparent and avoids importing messianic overtones beyond the immediate priestly context.
- source_word: λαλήσει Θεῷ ὡς πατρί
  chosen: he will speak to God as to a father
  alternatives:
  - he will speak with God as with a father
  lexicon: LSJ
  rationale: Preserves the striking filial comparison without softening it into vague intimacy.
- source_word: πλήρης μετὰ κυρίου
  chosen: complete with the Lord
  alternatives:
  - full with the Lord
  - fulfilled with the Lord
  lexicon: LSJ
  rationale: The phrase is somewhat compressed in Greek. 'Complete with the Lord' preserves the sense of fullness/completion in relation to the Lord without over-interpreting.
- source_word: ἐπὶ σωτηρίᾳ κόσμου
  chosen: for the salvation of the world
  alternatives:
  - for world-salvation
  - unto the salvation of the world
  lexicon: LSJ
  rationale: Natural English rendering of the prepositional phrase. Because this bracketed clause may be secondary, it is translated plainly and flagged in a note.
- source_word: συλληφθήσεται
  chosen: will be conceived
  alternatives:
  - will be received
  - will be seized
  lexicon: LSJ
  rationale: In this context, with 'in the sorrow of a beloved one,' the birth/conception sense best fits the succession formula about priests.
- source_word: ἐν πένθει ἀγαπητοῦ
  chosen: in the sorrow of a beloved one
  alternatives:
  - in mourning for a beloved one
  - in grief of one beloved
  lexicon: LSJ
  rationale: Keeps the genitival ambiguity and pathos without forcing a specific referent.
- source_word: τιμία
  chosen: honored
  alternatives:
  - precious
  - esteemed
  lexicon: LSJ
  rationale: Applied to the priesthood, 'honored' best conveys public esteem in idiomatic English.
- source_word: παραληφθήσεται
  chosen: will be taken
  alternatives:
  - will be received
  lexicon: LSJ
  rationale: A deliberately restrained rendering that preserves ambiguity; the context suggests being overtaken/marked by grief or darkness rather than simple appointment.
- source_word: ὀδύναις
  chosen: pains
  alternatives:
  - anguishes
  - torments
  lexicon: LSJ
  rationale: Concrete enough to preserve the severity, but broad enough to include distress rather than only physical pain.
- source_word: ἡ ἀδικία εἰς πλῆθος
  chosen: unrighteousness will be multiplied in abundance
  alternatives:
  - injustice will increase greatly
  - lawlessness will abound
  lexicon: LSJ
  rationale: ἀδικία can be rendered either morally or socially; 'unrighteousness' keeps the ethical-religious force. 'Multiplied in abundance' reflects the emphatic increase.
- source_word: σκότει
  chosen: darkness
  alternatives:
  - gloom
  lexicon: LSJ
  rationale: Preserves the prophetic and moral resonance of the image.
- source_word: μιασμός
  chosen: defilement
  alternatives:
  - pollution
  - contamination
  lexicon: LSJ
  rationale: Best captures cultic and moral impurity together, fitting the priestly setting.
- source_word: ἐνώπιον ἀνθρώπων
  chosen: before men
  alternatives:
  - before people
  lexicon: LSJ
  rationale: Retains the elevated testamentary register. The phrase is generic, not male-exclusive in force, but 'before men' suits the solemn tone.
- source_word: αἰχμαλωσίᾳ
  chosen: captivity
  alternatives:
  - exile
  lexicon: LSJ
  rationale: A direct rendering that preserves the force of being carried away; exile is related but slightly less vivid.
- source_word: προνομῇ
  chosen: plundering
  alternatives:
  - spoil
  - being plundered
  lexicon: LSJ
  rationale: Conveys the state of being given over to pillage in concise English.
- source_word: ὕπαρξις
  chosen: possessions
  alternatives:
  - property
  - substance
  lexicon: LSJ
  rationale: Clear modern English for material holdings; paired naturally with 'land.'
- source_word: ἀνακαινοποιήσουσιν οἶκον κυρίου
  chosen: they will renew the house of the Lord
  alternatives:
  - they will rebuild the house of the Lord
  - they will restore the house of the Lord
  lexicon: LSJ
  rationale: The compound verb suggests making new again. 'Renew' preserves that nuance better than the more interpretive 'rebuild,' while still fitting temple restoration.
