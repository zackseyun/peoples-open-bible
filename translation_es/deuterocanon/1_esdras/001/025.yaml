    reason: lexical_alternative
  - marker: b
    text: O 'apresurándome' o 'acelerándome'. El participio griego indica que Yahvé impulsa activamente la campaña hacia adelante.
    reason: lexical_alternative
  revision_rationale: Se corrige un calco poco natural ('el Dios'), se mejora la expresión de la localización de la campaña, se sustituye un participio español poco idiomático por uno más natural, y se reubica la nota [b] para que corresponda al término griego correcto. Los cambios son menores y no alteran la decisión exegética básica del borrador.
