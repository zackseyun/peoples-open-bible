  yaml_path: translation/ot/1_kings/003/011.yaml
  text: And God said to him[a], “Because you have asked this thing, and have not asked for yourself many days, and have not asked for yourself riches, and have not asked for the life of your enemies[c][b], but have asked for yourself understanding to hear judgment,”
