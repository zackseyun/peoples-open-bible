  rationale: Se hizo una reparación menor para mejorar la naturalidad del español sin apartarse del sentido del hebreo ni de la nota auditada. «De su hombro[a]» es idiomático y la nota conserva la literalidad de מֵעָלֶיהָ. «Entonces bebí» refleja mejor la progresión narrativa que «Y bebí yo».
