translation:
  language: es
  text: Y, habiendo sido animados por las muy nobles palabras de Judas, capaces de impulsarlos a la virtud y de hacer viriles las almas de los jóvenes[a][b], resolvieron no limitarse a emprender la campaña[c], sino avanzar con valentía y, trabándose en combate con toda bravura, decidir el asunto[d], porque la ciudad, las cosas santas y el templo también estaban en peligro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego conserva una imaginería masculina explícita para el valor. «Viriles» mantiene esa fuerza, aunque puede sonar marcada en algunos registros del español.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «hacer viriles las almas de los jóvenes». La frase conserva el paralelismo retórico del griego.
    reason: lexical_alternative
  - marker: c
    text: La expresión no significa que decidieran no pelear, sino que no se limitarían a una campaña ordinaria; querían llevar el conflicto a un desenlace decisivo.
    reason: alternative_reading
  - marker: d
    text: El griego distingue «las cosas santas» de «el templo», por eso ambas quedan representadas por separado.
    reason: lexical_alternative
lexical_decisions:
- source_word: Παρακληθέντες
  english_pob_choice: having been encouraged
  chosen_spanish: habiendo sido animados
  alternatives_spanish:
  - habiendo sido exhortados
  - habiendo sido consolados
  lexicon: BDAG
  rationale: En este contexto militar, παρακαλέω expresa un impulso que fortalece y mueve a la acción. «Animados» comunica bien ese efecto sin perder el matiz exhortativo.
- source_word: πάνυ καλοῖς
  english_pob_choice: very noble
  chosen_spanish: tan nobles
  alternatives_spanish:
  - muy nobles
  - sumamente nobles
  lexicon: LSJ
  rationale: καλός aquí tiene valor moral elevado, no solo estético. «Nobles» conserva esa dignidad ética en español.
- source_word: δυναμένοις ἐπ' ἀρετὴν παρορμῆσαι
  english_pob_choice: able to stir them on to virtue
  chosen_spanish: capaces de impulsarlos a la virtud
  alternatives_spanish:
  - capaces de urgirlos a la excelencia
  - capaces de incitarlos a la valentía
  lexicon: LSJ
  rationale: ἀρετή puede ser virtud, excelencia o valor. En español, «virtud» mantiene el alcance moral general del griego, mientras el contexto ya es marcadamente bélico.
- source_word: ψυχὰς νέων ἐπανδρῶσαι
  english_pob_choice: to make the souls of young men manly
  chosen_spanish: hacer viriles las almas de los jóvenes
  alternatives_spanish:
  - darles coraje a los jóvenes
  - hacer valerosas las almas de los jóvenes
  lexicon: LSJ
  rationale: ἐπανδρόω conserva una imaginería masculina explícita. «Viriles» preserva esa fuerza semántica en español sin oscurecer el sentido de arrojo/coraje.
- source_word: διέγνωσαν μὴ στρατεύεσθαι
  english_pob_choice: they resolved not merely to campaign
  chosen_spanish: resolvieron no solo salir en campaña
  alternatives_spanish:
  - determinaron no simplemente marchar
  - resolvieron no solo emprender la campaña
  lexicon: LSJ
  rationale: El griego no significa que decidieran evitar la lucha, sino que no se limitarían a una simple expedición militar. «No solo salir en campaña» conserva esa tensión contextual.
- source_word: γενναίως δὲ ἐφέρεσθαι
  english_pob_choice: to press on bravely
  chosen_spanish: avanzar con valentía
  alternatives_spanish:
  - proceder con nobleza
  - seguir adelante con coraje
  lexicon: LSJ
  rationale: ἐφέρεσθαι aquí sugiere moverse hacia adelante o conducirse en acción. «Avanzar con valentía» transmite bien el impulso activo.
- source_word: μετὰ πάσης εὐανδρείας
  english_pob_choice: with all valor
  chosen_spanish: con toda bravura
  alternatives_spanish:
  - con todo valor
  - con plena valentía
  lexicon: LSJ
  rationale: εὐανδρία conlleva idea de virilidad/coraje. «Bravura» comunica intensidad y resolución en un registro natural de español.
- source_word: ἐμπλακέντες
  english_pob_choice: engaging
  chosen_spanish: trabándose en combate
  alternatives_spanish:
  - entablando combate
  - entrándose en la lucha
  lexicon: LSJ
  rationale: En contexto militar, el participio describe entrar activamente en el conflicto. «Trabándose en combate» es idiomático y preciso.
- source_word: κρῖναι τὰ πράγματα
  english_pob_choice: decide the matter
  chosen_spanish: decidir el asunto
  alternatives_spanish:
  - resolver el asunto
  - decidir el caso
  lexicon: LSJ
  rationale: La expresión idiomática implica llevar la situación a un desenlace decisivo. «Decidir el asunto» conserva el sentido formal y directo.
- source_word: τὴν πόλιν καὶ τὰ ἅγια καὶ τὸ ἱερὸν
  english_pob_choice: the city and the holy things and the temple
  chosen_spanish: la ciudad, las cosas santas y el templo
  alternatives_spanish:
  - la ciudad, los lugares santos y el templo
  - la ciudad, el santuario y el templo
  lexicon: LSJ
  rationale: El griego distingue τὰ ἅγια de τὸ ἱερόν; por eso no se colapsan en una sola idea. «Las cosas santas» preserva esa distinción de forma auditable.
- source_word: κινδυνεύειν
  english_pob_choice: were also in danger
  chosen_spanish: estaban en peligro
  alternatives_spanish:
  - corrían peligro
  - estaban amenazados
  lexicon: BDAG
  rationale: La cláusula causal explica por qué resolvieron actuar. «Estaban en peligro» es una formulación natural que mantiene el valor explicativo.
theological_decisions:
- issue: Lenguaje masculino explícito en ψυχὰς νέων ἐπανδρῶσαι y εὐανδρείας
  english_pob_reading: Retain explicit masculine imagery with 'young men' and 'manly' in the main text.
  chosen_spanish_reading: Conservar la imaginería masculina explícita con «viriles» y «los jóvenes».
  alternative_spanish_readings:
  - darles coraje a los jóvenes
  - hacerlos valerosos
  rationale: El griego usa un lenguaje marcadamente masculino para la valentía militar. La traducción debe preservar ese rasgo retórico en lugar de neutralizarlo.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
- issue: Sentido de μὴ στρατεύεσθαι en contraste con los infinitivos siguientes
  english_pob_reading: Render as 'not merely to campaign' rather than 'not to campaign/fight.'
  chosen_spanish_reading: Renderizar como «no solo salir en campaña», no como una negativa absoluta a pelear.
  alternative_spanish_readings:
  - no combatir
  - no marchar a campaña
  rationale: El contexto inmediato muestra que no se trata de evitar la guerra, sino de no limitarse a una expedición ordinaria; más bien avanzan hasta un desenlace decisivo.
  doctrine_reference: DOCTRINE.md §1 Original-language primacy over translation tradition
translation_notes:
  revision_awareness: 'Tomé en cuenta la revisión más reciente del POB inglés, que afinó la sintaxis hacia una relación más estrecha con el griego: participio de estado («habiendo sido animados»), resolución explícita («resolvieron»), matiz de campaña no meramente negativa, y distinción entre τὰ ἅγια y τὸ ἱερόν. También atendí la observación de acuerdo moderado sobre ajustes menores.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece.
  - «Mesías/Cristo» no aplica en este versículo.
  - Se mantuvo la distinción entre «las cosas santas» y «el templo» para reflejar el griego.
  - Se preservó el lenguaje masculino explícito del original en un registro español entendible.
  - Los corchetes de nota aparecen solo donde hay nota correspondiente y en el mismo orden de los marcadores.
