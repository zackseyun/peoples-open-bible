translation:
  language: es
  text: No te alegres cuando caiga tu enemigo[a], ni exulte tu corazón cuando tropiece.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No te pongas contento cuando caiga tu enemigo, ni se regocije tu corazón cuando tropiece». El hebreo usa dos términos de alegría relacionados pero distintos: שׂמח («alegrarse, ponerse contento») y גיל («exultar, regocijarse intensamente»).'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּנְפֹל
  english_pob_choice: when your enemy falls
  chosen_spanish: cuando caiga
  alternatives_spanish:
  - al caer
  - en el caer
  lexicon: HALOT
  rationale: El valor temporal de la preposición con el infinitivo se expresa de manera natural en español con «cuando». «Caiga» conserva el evento de caída sin volverla una formulación mecánica.
- source_word: אֹיְבֶיךָ
  english_pob_choice: your enemy
  chosen_spanish: tu enemigo
  alternatives_spanish:
  - tu adversario
  - tu enemigo(s)
  lexicon: HALOT
  rationale: «Enemigo» es el equivalente directo y más sobrio para איב. El sufijo singular del verbo siguiente apoya el sentido singular/colectivo en español.
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - Nunca
  - No debes
  lexicon: HALOT
  rationale: Con verbos en subjuntivo o perífrasis exhortativa, el español requiere la prohibición simple «No» para reflejar adecuadamente אַל.
- source_word: תִּשְׂמָח
  english_pob_choice: rejoice
  chosen_spanish: te alegres
  alternatives_spanish:
  - te regocijes
  - te goces
  lexicon: HALOT
  rationale: שמַח expresa alegría/regocijo. «Alegrarte» en forma pronominal es natural en español y comunica el contenido sin calco pesado.
- source_word: וּבִכָּשְׁלוֹ
  english_pob_choice: when he stumbles
  chosen_spanish: cuando tropiece
  alternatives_spanish:
  - al tropezar
  - cuando vacile
  lexicon: HALOT
  rationale: '«Tropiece» preserva el matiz distinto de כשל frente a נפל: no es mera caída, sino tropiezo o traspié. La partícula temporal vuelve a expresarse con «cuando».'
- source_word: יָגֵל
  english_pob_choice: exult
  chosen_spanish: de júbilo
  alternatives_spanish:
  - se regocije
  - salte de gozo
  lexicon: HALOT
  rationale: גיל denota un gozo más intenso que שמח. En español, «dejúbilo» comunica esa elevación emocional sin repetir «alegrarse» y mantiene la distinción lexical del hebreo.
- source_word: לִבֶּךָ
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu interior
  - tu ser
  lexicon: HALOT
  rationale: «Corazón» preserva la antropología hebrea del centro interior de pensamiento y emoción, y es transparente para el lector español.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo y mantiene la distinción entre los dos verbos de alegría señalada en el audit trail inglés (שמח / גיל). No se introdujeron cambios textuales respecto del sentido base; solo se ajustó la formulación al español natural.
  spanish_consistency_notes:
  - Se mantuvo «enemigo» en singular, en armonía con el verbo singular del segundo hemistiquio.
  - Se conservó la oposición lexical entre una alegría ordinaria («alegres») y un gozo exaltado («de júbilo»), como en el inglés POB.
  - Se evitó «corazón» como mero emotivo, usándolo como equivalente bíblico del centro interior de la persona.
  - La puntuación reproduce la estructura paralela de dos prohibiciones con cláusulas temporales.
