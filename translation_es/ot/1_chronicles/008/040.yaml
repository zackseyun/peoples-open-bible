revisions:
- from: Los hijos de Ulam eran hombres valientes, tiradores del arco[a], y tuvieron muchos hijos y nietos, ciento cincuenta[c]. Todos estos eran de los hijos de Benjamín[b].
  to: Los hijos de Ulam eran hombres valientes, los que tensan el arco[a], y tenían muchos hijos y nietos, ciento cincuenta[c]. Todos estos eran de los hijos de Benjamín[b].
  rationale: Se ajustó el verbo a un valor descriptivo más fiel al hebreo genealógico ('tenían'), se reemplazó 'tiradores del arco' por 'los que tensan el arco' para conservar mejor la imagen léxica de דֹּרְכֵי קֶשֶׁת en español natural, y se corrigieron las notas para que presenten alternativas reales y coherentes con la auditoría inglesa.
