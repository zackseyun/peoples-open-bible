    text: 'El hebreo repite la petición para dar énfasis: «y la obra de nuestras manos, confírmala».'
    reason: lexical_alternative
  - marker: c
    text: O «y confirma la obra de nuestras manos para nosotros».
    reason: previous_rendering
  revision_rationale: 'La revisión corrige el error principal de fuente al verter אֲדֹנָי como «el Señor» en lugar de «Yahvé». También mejora la naturalidad del español con «Sea sobre nosotros...», manteniendo el tono de súplica y la imagen de על. Se conserva «sobre nosotros» en la segunda cláusula para respetar la repetición hebrea y el dictamen final del audit trail inglés, pero se añade una nota con la alternativa «para nosotros» por claridad. No se requiere adjudicación adicional: la corrección es directa y de bajo riesgo doctrinal una vez distinguido אדני de יהוה.'
