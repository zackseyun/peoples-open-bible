review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro de auditoría inglés en los puntos principales: mantiene ''Yahvé'', conserva el doble lenguaje cultual ''sacerdotes / ministros'', traduce literalmente ''comerán'' para תֹּאכֵלוּ, y refleja el valor debatido de תִּתְיַמָּרוּ con nota. Sin embargo, ''se les llamará los ministros de nuestro Dios'' suena menos natural en español que una formulación activa y puede entenderse como impersonal indirecto algo pesado; además, ''se jactarán'' comunica un matiz demasiado negativo para un contexto restaurador donde el inglés POB eligió ''boast'' con alternativa ''exult''.'
  spanish_quality_summary: El español es claro y digno, pero admite una mejora de naturalidad y registro. 'Los llamarán ministros de nuestro Dios' fluye mejor que 'se les llamará los ministros de nuestro Dios'. También conviene cambiar 'se jactarán' por 'se gloriarán' en el texto principal, porque en español bíblico y eclesial 'gloriarse' preserva mejor la ambigüedad entre gloria/boast y evita una connotación de fanfarronería vulgar. La nota puede mantener 'se jactarán' como alternativa.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יהוה -> ''Yahvé'', אֱלֹהֵינוּ -> ''nuestro Dios'', términos cultuales preservados, y כבוד -> ''gloria''. La única tensión léxica relevante está en תִּתְיַמָּרוּ: ''se jactarán'' no es erróneo, pero ''se gloriarán'' se ajusta mejor al paralelismo con ''gloria'' y al registro bíblico español.'
  issues:
  - severity: medium
    issue: 'Construcción impersonal poco natural: ''se les llamará los ministros de nuestro Dios'''
    rationale: Aunque comprensible, en español suena más torpe que 'los llamarán ministros de nuestro Dios' o 'serán llamados ministros de nuestro Dios'. El hebreo permite la idea impersonal, pero la meta pide español natural, no calco innecesario.
  - severity: medium
    issue: '''Se jactarán'' introduce un matiz demasiado peyorativo'
    rationale: El verbo hebreo final es raro y debatido; el inglés POB dejó 'boast' con nota alternativa. En español, 'jactarse' suele sonar moralmente negativo, mientras que 'gloriarse' conserva mejor el vínculo con כבוד y el registro profético sin cerrar el sentido.
  revised_spanish_text: Pero ustedes serán llamados los sacerdotes de Yahvé; los llamarán ministros de nuestro Dios. Comerán la riqueza de las naciones, y en su gloria se gloriarán[a].
  revised_footnotes:
  - marker: a
    text: O “en su esplendor se jactarán”. El verbo final es raro y su matiz se debate; el texto principal sigue un sentido común de gloriarse o presumir de esa gloria.
    reason: lexical_alternative
  revision_rationale: Se ajusta la segunda cláusula para un español más natural sin perder el valor impersonal del hebreo, y se cambia el verbo final a 'se gloriarán' para conservar mejor el registro bíblico, el vínculo léxico con 'gloria' y la ambigüedad documentada, dejando la alternativa más áspera en nota.
