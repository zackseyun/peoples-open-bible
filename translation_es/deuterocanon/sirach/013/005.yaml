translation:
  language: es
  text: Si tienes algo[a], te hablará con amabilidad, y te despojará sin que le duela.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Si eres útil, obrará en ti; y si te falta, te dejará». Esto refleja una forma del versículo materialmente distinta de la del hebreo conservado.'
    reason: alternative_reading
lexical_decisions:
- source_word: אִם שַלְּךָ
  english_pob_choice: If you have something
  chosen_spanish: Si tienes algo
  alternatives_spanish:
  - Si tienes medios
  - Si eres útil
  - Si tienes riquezas
  lexicon: HALOT
  rationale: La forma hebrea transmitida es difícil y refleja una tensión textual con el paralelo griego. En español, «algo» preserva la amplitud del hebreo tal como está conservado, sin cerrar la lectura a riqueza material solamente; a la vez, deja abierta la posible idea de tener medios o ser de utilidad.
- source_word: יֵיטִיב דְּבָרָיו עִמָּךְ
  english_pob_choice: he will speak kindly with you
  chosen_spanish: él hablará amablemente contigo
  alternatives_spanish:
  - él hará buenos sus palabras contigo
  - él te tratará con palabras agradables
  - él hablará con benevolencia contigo
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y apunta a hablar de manera favorable o halagüeña. «Hablará amablemente contigo» comunica el acto verbal y el tono de adulación sin sonar demasiado literal en español.
- source_word: וִירֹשֶׁשְׁךָ
  english_pob_choice: he will strip you bare
  chosen_spanish: te despojará
  alternatives_spanish:
  - te empobrecerá
  - te despojará por completo
  - te arruinará
  lexicon: HALOT
  rationale: El verbo transmite la idea de desposeer o dejar sin recursos. «Despojará» conserva la fuerza predatoria del hebreo y encaja bien con el contexto; «empobrecerá» sería más explícito, pero algo menos vívido.
- source_word: וְלֹא יִכְאַב לוֹ
  english_pob_choice: without feeling pain
  chosen_spanish: sin sentir dolor
  alternatives_spanish:
  - y no le dolerá
  - y no se afligirá por ello
  - sin que le duela
  lexicon: HALOT
  rationale: La cláusula expresa la falta de dolor o molestia interior ante el daño causado. «Sin sentir dolor» reproduce esa idea de insensibilidad moral de manera natural en español y mantiene la ambigüedad entre dolor físico y sufrimiento interior.
theological_decisions:
- issue: Manejo de la divergencia entre el hebreo conservado y el paralelo griego
  english_pob_reading: Main text follows the surviving Hebrew, with the Greek divergence preserved in a footnote.
  chosen_spanish_reading: El texto principal sigue el hebreo conservado; la lectura griega divergente se preserva en nota.
  alternative_spanish_readings:
  - 'Traducir directamente el griego: «Si eres útil, él obrará en ti; y si te falta, te dejará».'
  - Combinar las dos tradiciones en el texto principal.
  rationale: En Sirácida, cuando el hebreo sobrevive, se le da primacía como testimonio principal, pero el griego se usa como dato real de traducción. Dado que aquí hay una diferencia material, el texto español principal se ancla al hebreo y la nota registra la alternativa griega para no borrar la tensión textual.
  doctrine_reference: 'PHILOSOPHY.md: traducir del hebreo donde sobrevive; usar el paralelo griego como insumo real'
translation_notes:
  revision_awareness: No hubo cambios en la revisión más reciente; el borrador se mantiene alineado con la evaluación de acuerdo moderado y con la observación de diferencias menores.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y otras sustituciones no presentes, porque este versículo no contiene el nombre divino.
  - Se mantuvo un registro claro de la tensión hebreo-griego mediante nota, sin mezclar ambas lecturas en el cuerpo principal.
  - «Despojará» conserva una fuerza más concreta que una paráfrasis suave, acorde con el tono del contexto.
