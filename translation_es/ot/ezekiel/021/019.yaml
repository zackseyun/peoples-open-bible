    text: O ‘aplaude’; el hebreo dice literalmente ‘golpea palma contra palma’, describiendo un gesto profético.
    reason: lexical_alternative
  - marker: b
    text: O ‘triplicada’. La expresión hebrea puede indicar una espada intensificada por un tercer golpe o hecha triple.
    reason: lexical_alternative
  - marker: c
    text: O ‘la que penetra en ellos’. El participio final puede transmitir el efecto de la espada al penetrar, presionar o cercar.
    reason: lexical_alternative
  revision_rationale: 'Se corrigen dos desalineaciones mayores con el hebreo y el audit trail del POB: ''gran herido'' pasa a ''gran caído'' para reflejar חָלָל como alguien abatido/muerto, y ''se cierne sobre ellos'' pasa a ''irrumpe sobre ellos'' para conservar la idea de penetración o presión hostil de הַחֹדֶרֶת לָהֶם. También se ajusta ''muertos'' a ''caídos'' para una correspondencia más precisa con חֲלָלִים. Se mantiene el resto del borrador por ser fiel y natural en español.'
