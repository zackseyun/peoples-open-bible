revisions:
- from: 'Además, hicieron esto contra mí: profanaron mi santuario en aquel mismo día, y profanaron mis sábados.'
  to: 'Además, me hicieron esto: contaminaron mi santuario en aquel mismo día, y profanaron mis sábados.'
  rationale: Se corrige el verbo del santuario para reflejar טִמְּאוּ con un término de impurificación cultual distinto de «profanaron», reservado para חִלֵּלוּ. También se suaviza «contra mí» a «me hicieron esto» para conservar el agravio personal de לִי en un español más natural y fiel al matiz del original. No se requieren notas al pie.
