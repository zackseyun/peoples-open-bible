revisions:
- from: En el mes tercero comenzaron a poner el fundamento de los montones[a][b], y en el mes séptimo los terminaron.
  to: En el tercer mes comenzaron a echar los cimientos de los montones[a][b], y en el séptimo mes los terminaron.
  rationale: Se ajustó el orden de los sintagmas temporales a un español más natural ('en el tercer/séptimo mes') y se reemplazó 'poner el fundamento' por 'echar los cimientos', que suena más idiomático y refleja mejor la revisión inglesa auditada y el sentido del infinitivo לְיִסּוֹד. También se pulieron las notas para mayor claridad y naturalidad en español.
