translation:
  text: For your substance displayed your sweetness toward your children[a]; and, serving the desire of the one who partook of it[b], it changed into whatever each one wished.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'your nature displayed your sweetness toward your children.' The Greek ὑπόστασις can mean 'substance,' 'nature,' or 'underlying reality.'
    reason: lexical_alternative
  - marker: b
    text: The final clause means that the food adapted itself to each person's preference.
    reason: cultural_note
lexical_decisions:
- source_word: ὑπόστασίς
  chosen: substance
  alternatives:
  - nature
  - essence
  - underlying reality
  lexicon: LSJ
  rationale: In this context referring back to the manna's material constitution or underlying substance, 'substance' best preserves the concrete yet somewhat philosophical sense without over-systematizing it as later theological 'essence.'
- source_word: γλυκύτητα
  chosen: sweetness
  alternatives:
  - kindness
  - pleasantness
  lexicon: LSJ
  rationale: The noun can denote sweetness literally and figuratively. Here, in the manna context with sensory adaptation, 'sweetness' preserves both the gustatory image and God's benevolent disposition.
- source_word: τέκνα
  chosen: children
  alternatives:
  - sons
  lexicon: LSJ
  rationale: The term is not restricted to males here; 'children' is the natural gender-accurate rendering for God's people as recipients of care.
- source_word: τοῦ προσφερομένου
  chosen: the one who received it
  alternatives:
  - the one to whom it was offered
  - the eater
  - the recipient
  lexicon: LSJ
  rationale: The participle is passive/middle in sense from 'offer/present.' In context of manna being provided for consumption, 'the one who received it' is idiomatic English that preserves the recipient focus better than a more wooden 'the one to whom it was offered.'
- source_word: ἐπιθυμίᾳ
  chosen: desire
  alternatives:
  - craving
  - wish
  lexicon: LSJ
  rationale: The word denotes desire or longing. 'Desire' is broad enough to fit the verse's point that the food accommodated individual preference.
- source_word: ὑπηρετῶν
  chosen: serving
  alternatives:
  - ministering to
  - attending to
  lexicon: LSJ
  rationale: The participle expresses responsive service to the recipient's desire. 'Serving' is concise and natural in English.
- source_word: μετεκιρνᾶτο
  chosen: changed itself into
  alternatives:
  - was transformed into
  - was blended into
  - was adapted into
  lexicon: LSJ
  rationale: The verb suggests changing mixture or composition. 'Changed itself into' communicates the manna's adaptive transformation to suit each person's wish without sounding overly technical.
- source_word: πρὸς ὃ τις ἐβούλετο
  chosen: into whatever each one wished
  alternatives:
  - according to what anyone wanted
  - into whatever one desired
  lexicon: LSJ
  rationale: This clause emphasizes individualized adaptation. 'Whatever each one wished' preserves both the distributive sense and the volitional nuance of ἐβούλετο.
