translation:
  text: Jesus said[f][e][d][c][b][a], “The one who will come to know the father and
    the mother—they will call him ‘the son of a prostitute.’”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Relative future literally reads “the one who will come to know,” not simply
      “who knows.”
    reason: lexical_alternative
  - marker: b
    text: The epithet could be rendered idiomatically as “son of a prostitute”; this
      draft preserves the double definiteness of the Coptic.
    reason: lexical_alternative
  - marker: c
    text: ϣⲏⲣⲉ can mean ‘child’; chosen as ‘son’ here due to the masculine article
      and conventional idiom.
    reason: lexical_alternative
  - marker: d
    text: ⲙⲟⲩⲧⲉ may also be translated “name” (“they will name him”).
    reason: lexical_alternative
  - marker: e
    text: Some English versions use “whore” for ⲡⲟⲣⲛⲏ; “prostitute” is chosen for
      precision and register.
    reason: lexical_alternative
  - marker: f
    text: Or 'Jesus said, “The one who will come to know the father and the mother—they
      will call him ‘the son of the prostitute.’”'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲥⲟⲟⲩⲛ
  chosen: come to know
  alternatives:
  - know
  - recognize
  lexicon: Crum, s.v. ⲥⲟⲟⲩⲛ; Layton, Grammar §181 on future ⲉⲣⲉ … ⲛⲁ + infinitive
  rationale: The construction ⲡⲉⲧⲉⲣⲉ ⲛⲁ ⲥⲟⲟⲩⲛ is a relative future; rendering “come
    to know” preserves the prospective nuance rather than a timeless “knows.”
- source_word: ⲡⲉⲓⲱⲧ
  chosen: the father
  alternatives:
  - Father
  lexicon: Crum, s.v. ⲓⲱⲧ
  rationale: Definite article ⲡ- is present; retained lower-case to avoid interpretive
    capitalization.
- source_word: ⲡⲙⲁⲁⲩ
  chosen: the mother
  alternatives:
  - Mother
  lexicon: Crum, s.v. ⲙⲁⲁⲩ
  rationale: Definite article ⲡ- is present (with feminine noun via generic ⲡ- in
    construct); retained lower-case to avoid interpretive capitalization.
- source_word: ⲛⲧⲟⲟⲩ ⲛⲁ ⲙⲟⲩⲧⲉ ⲉⲛⲧⲟϥ
  chosen: they will call him
  alternatives:
  - they will name him
  - he will be called
  lexicon: Crum, s.v. ⲙⲟⲩⲧⲉ; Layton, Grammar §213 on future with ⲛⲁ + infinitive and
    3pl subject pronoun
  rationale: Surface syntax is active with explicit 3pl subject pronoun ⲛⲧⲟⲟⲩ; “call”
    is the common sense of ⲙⲟⲩⲧⲉ in onomastic/epithet contexts.
- source_word: ⲡϣⲏⲣⲉ
  chosen: the son
  alternatives:
  - the child
  lexicon: Crum, s.v. ϣⲏⲣⲉ
  rationale: While ϣⲏⲣⲉ can mean ‘child,’ the masculine article ⲡ- and idiom with
    a maternal genitive favor ‘son’ in English for the epithet.
- source_word: ⲡⲟⲣⲛⲏ
  chosen: the prostitute
  alternatives:
  - a prostitute
  - the whore
  lexicon: Loan from Gk πόρνη; see Crum s.v. (loanwords) and Lambdin, §84
  rationale: Kept the article carried in the Coptic genitive; “prostitute” maintains
    semantic value without introducing pejorative slang (“whore”).
- source_word: ⲡϣⲏⲣⲉ ⲛⲡⲟⲣⲛⲏ (genitive phrase)
  chosen: the son of the prostitute
  alternatives:
  - son of a prostitute
  lexicon: Layton, Grammar §69–73 on genitive with articles
  rationale: Both head and genitive carry articles; preserving double definiteness
    yields a starker, marked English phrase, matching Thomas’s sharp diction. Idiomatic
    English often makes the genitive indefinite, but we avoid smoothing.
textual_note: 'Dialect: Standard Sahidic constructions with no significant Lycopolitan
  influence affecting sense here. The saying is intact in NH II, with no lacunae or
  restorations in Dilley’s edition. Grammar notes: (1) ⲡⲉⲧⲉⲣⲉ … ⲛⲁ ⲥⲟⲟⲩⲛ is a relative
  future (“the one who will come to know”). (2) ⲛⲧⲟⲟⲩ is the 3rd plural subject pronoun
  introducing the future with ⲛⲁ + infinitive ⲙⲟⲩⲧⲉ; ⲉⲛⲧⲟϥ is the dative ‘to him.’
  (3) ⲡⲟⲣⲛⲏ is a Greek loan (πόρνη), feminine ‘prostitute.’ The genitive ⲡϣⲏⲣⲉ ⲛⲡⲟⲣⲛⲏ
  shows double definiteness; English definiteness is debated, but the draft preserves
  it to reflect the Coptic form.'
