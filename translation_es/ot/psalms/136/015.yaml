translation:
  language: es
  text: y sacudió a Faraón y a su ejército en el mar Rojo[a], porque su amor fiel permanece para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «mar de los Juncos» o «mar de las Cañas». La traducción tradicional es «mar Rojo».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/נִעֵר
  english_pob_choice: shook off
  chosen_spanish: sacudió
  alternatives_spanish:
  - arrojó
  - despojó
  - derribó
  lexicon: HALOT
  rationale: נָעַר expresa la imagen concreta de sacudir o sacudir fuera/de encima. En español, «sacudió» conserva ese movimiento vívido sin forzar un calco torpe. «Derribó» o «arrojó» captan el resultado, pero pierden la metáfora del verbo hebreo.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - Faraón, rey de Egipto
  lexicon: transliteración estable en español bíblico
  rationale: «Faraón» es la forma natural y reconocible en español para el nombre/título. Añadir «rey de Egipto» sería explicativo, no requerido por el hebreo aquí.
- source_word: וְ/חֵיל/וֹ
  english_pob_choice: and his army
  chosen_spanish: y a su ejército
  alternatives_spanish:
  - y a su hueste
  - y a su fuerza
  lexicon: HALOT
  rationale: חֵיל en contexto militar designa tropa o fuerza armada. «Ejército» es la equivalencia clara y actual en español; «hueste» sería más tradicional pero menos transparente para lectores modernos.
- source_word: בְ/יַם סוּף
  english_pob_choice: into the Red Sea
  chosen_spanish: en el mar Rojo[a]
  alternatives_spanish:
  - en el mar de los Juncos
  - en el mar de Cañas
  lexicon: HALOT
  rationale: El inglés POB conserva «Red Sea» en el texto principal por tradición receptiva y añade la alternativa «Sea of Reeds». En español, «mar Rojo» es la forma estable y litúrgicamente reconocible. Se preserva la tensión auditiva mediante la nota sobre la lectura más literal del hebreo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: uso conjuntivo bíblico
  rationale: En este refrán, כִּי introduce la base para la afirmación de alabanza. «Porque» expresa con claridad esa relación causal sin sonar arcaico.
- source_word: לְ/עוֹלָם
  english_pob_choice: endures forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: El hebreo usa una fórmula adverbial fija del refrán. En español, la construcción natural es «para siempre»; el verbo implícito de permanencia no necesita ser añadido de forma forzada.
- source_word: חַסְדּ/וֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su misericordia
  alternatives_spanish:
  - su amor leal
  - su amor fiel
  - su misericordia constante
  lexicon: HALOT
  rationale: חֶסֶד combina lealtad, amor pactal y misericordia. Dado que el refrán litúrgico en español suele requerir una sola palabra sobria y plenamente legible, «misericordia» comunica la benevolencia duradera sin cargar el verso con una perífrasis pesada. Se conserva en notas la posibilidad de «amor leal/fiel» como matiz alternativo.
theological_decisions:
- issue: Lectura de יַם סוּף
  english_pob_reading: 'Red Sea in the main text, with footnote: Hebrew may mean ''Sea of Reeds'' or ''Reed Sea'''
  chosen_spanish_reading: mar Rojo en el texto principal, con nota sobre la lectura literal posible del hebreo
  alternative_spanish_readings:
  - mar de los Juncos
  - mar de las Cañas
  rationale: La tradición receptiva identifica este lugar como el mar Rojo, pero la fuente hebrea admite una lectura más literal relacionada con 'reeds'. Mantener «mar Rojo» en el cuerpo del texto conserva la reconocibilidad canónica, mientras la nota preserva la transparencia textual.
  doctrine_reference: Transparencia textual y auditable original-language primacy; preservar alternativa significativa sin borrar la forma tradicional.
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con la auditoría inglesa: se mantiene la estructura del refrán y la elección tradicional para יַם סוּף, mientras se adapta la formulación a un español natural y reverente. No se requieren revisiones adicionales.'
  spanish_consistency_notes:
  - Se preserva el paralelismo del refrán con una cadencia litúrgica natural en español.
  - «Misericordia» se emplea como equivalente breve y digno de חֶסֶד en este contexto, sin negar el matiz de amor leal indicado en las notas.
  - La nota textual sobre יַם סוּף evita ocultar la tensión entre la lectura tradicional y la literal hebrea.
