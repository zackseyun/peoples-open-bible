    text: 'O: «tu simiente contigo»; el sustantivo hebreo está en forma singular, pero tiene sentido colectivo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «heredes la tierra donde has residido como forastero».'
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'peregrinaciones' por una expresión que refleja mejor la idea hebrea de residencia como forastero, y se corrige la nota b para preservar la alternativa léxica documentada en el POB inglés sobre 'heredar'.
