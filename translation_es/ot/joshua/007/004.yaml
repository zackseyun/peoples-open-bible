translation:
  language: es
  text: Entonces subieron allí del pueblo unos tres mil hombres, pero huyeron ante los hombres de Hai.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעֲלוּ
  english_pob_choice: went up
  chosen_spanish: subieron
  alternatives_spanish:
  - fueron
  - ascendieron
  - subieron contra
  lexicon: HALOT
  rationale: עלה expresa movimiento ascendente o de subida. En español, «subieron» conserva la imagen direccional sin añadir de forma explícita la noción militar que el verbo hebreo no lleva por sí mismo.
- source_word: מִן הָעָם
  english_pob_choice: from the people
  chosen_spanish: desde el pueblo
  alternatives_spanish:
  - de entre el pueblo
  - del pueblo
  - de la gente
  lexicon: HALOT
  rationale: עָם se refiere literalmente al pueblo. «Desde el pueblo» mantiene la referencia a un contingente salido del conjunto del pueblo, con naturalidad en español narrativo.
- source_word: שָׁמָּה
  english_pob_choice: there
  chosen_spanish: hasta allí
  alternatives_spanish:
  - allí
  - a ese lugar
  lexicon: HALOT
  rationale: El adverbio señala el destino del movimiento. «Hasta allí» reproduce la dirección hacia el lugar ya mencionado y suena natural en español.
- source_word: כִּשְׁלֹשֶׁת אֲלָפִים אִישׁ
  english_pob_choice: about three thousand men
  chosen_spanish: unos tres mil hombres
  alternatives_spanish:
  - aproximadamente tres mil hombres
  - como tres mil hombres
  - unos tres mil soldados
  lexicon: HALOT
  rationale: כִּ aporta aproximación, por eso «unos». אִישׁ después del número funciona como clasificador de personas; «hombres» sigue de cerca el valor del hebreo sin convertirlo en un término militar más específico de lo que el texto exige.
- source_word: וַיָּנֻסוּ
  english_pob_choice: they fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - salieron huyendo
  - escaparon
  lexicon: HALOT
  rationale: נוס significa huir o escapar. «Huyeron» es el equivalente narrativo más directo y formal en español.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: En un contexto de huida, la preposición indica la relación de retirada frente al enemigo. «Delante de» expresa bien esa relación en español sin sonar arcaico.
- source_word: אַנְשֵׁי הָעָי
  english_pob_choice: the men of Ai
  chosen_spanish: los hombres de Hai
  alternatives_spanish:
  - los varones de Hai
  - la gente de Hai
  - los hombres de la ciudad de Hai
  lexicon: HALOT
  rationale: אַנְשֵׁי es el constructo plural de אִישׁ y designa a los varones/defensores de la ciudad. Se translitera el topónimo como «Hai», forma usual en español bíblico, y se mantiene «hombres» para reflejar el sustantivo hebreo.
translation_notes:
  revision_awareness: La traducción inglesa auditada es estable y sin notas; no se registran revisiones aplicadas. La redacción española sigue de cerca el hebreo y la solución inglesa aprobada, manteniendo la aproximación numérica, el movimiento ascendente y la huida frente a los hombres de la ciudad.
  spanish_consistency_notes:
  - Se conserva la transliteración «Hai» para el topónimo, en coherencia con el uso bíblico en español.
  - Se evita introducir vocabulario militar no presente en el hebreo, como «tropas» o «soldados», salvo en las alternativas documentadas.
  - «Delante de» refleja la función relacional de לִפְנֵי en la escena de huida sin alterar el sentido básico.
