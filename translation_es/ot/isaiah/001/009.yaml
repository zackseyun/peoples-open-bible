    issue: La nota al pie no conserva la alternativa completa documentada en el POB inglés.
    rationale: La auditoría inglesa ofrece 'If the LORD of hosts had not preserved for us a few survivors.' La nota española solo dice 'unos pocos sobrevivientes', sin reflejar la alternativa verbal 'no hubiera preservado para nosotros' ni el sujeto completo.
  revised_spanish_text: Si Yahvé de los ejércitos no nos hubiera dejado un[a] remanente muy pequeño, habríamos quedado como Sodoma; habríamos sido semejantes a Gomorra.
