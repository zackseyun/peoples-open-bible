translation:
  language: es
  text: y la maldición[a], si no escuchan los mandamientos de Yahvé su Dios, y se apartan del camino que yo les ordeno hoy, para ir tras otros dioses que no han conocido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «obedecen los mandamientos de Yahvé su Dios». El verbo hebreo para «escuchar» suele incluir la idea de obediencia en contextos de pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַקְּלָלָה
  english_pob_choice: and the curse
  chosen_spanish: y la maldición
  alternatives_spanish:
  - y la maldición
  - y el maleficio
  lexicon: HALOT
  rationale: El hebreo presenta un sustantivo definido con conjunción, en paralelo con la bendición del versículo anterior. «Maldición» conserva el contraste pactual natural en español y evita cargar el texto con una explicación interpretativa.
- source_word: תִשְׁמְעוּ אֶל
  english_pob_choice: listen to
  chosen_spanish: escuchan
  alternatives_spanish:
  - obedecen
  - oyen
  lexicon: HALOT
  rationale: «Escuchar» reproduce bien el valor básico de שׁמע con אֶל. En contexto de pacto implica obediencia, pero el texto fuente no la explicita; el sentido obediencial queda disponible sin resolver la tensión léxica en la traducción principal.
- source_word: מִצְוֺת
  english_pob_choice: the commandments
  chosen_spanish: los mandamientos
  alternatives_spanish:
  - los preceptos
  - las órdenes
  lexicon: HALOT
  rationale: El plural de מִצְוָה se rinde con el término bíblico común «mandamientos», suficientemente solemne y preciso para el contexto deuteronómico.
- source_word: יְהוָה אֱלֹהֵיכֶם
  english_pob_choice: Yahweh your God
  chosen_spanish: Yahvé su Dios
  alternatives_spanish:
  - Yahvé vuestro Dios
  - el SEÑOR su Dios
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se preserva el nombre divino como «Yahvé» según el criterio del proyecto. «Su Dios» refleja la segunda persona plural del hebreo; en español neutral, el posesivo de cortesía colectiva puede ser «su» cuando el contexto ya identifica a los destinatarios.
- source_word: וְסַרְתֶּם
  english_pob_choice: and turn aside
  chosen_spanish: y se apartan
  alternatives_spanish:
  - y se desvían
  - y se apartan del camino
  lexicon: HALOT
  rationale: סוּר expresa desviarse o apartarse de una trayectoria prescrita. «Se apartan» conserva la idea de desviación del camino sin forzar una imagen demasiado mecánica.
- source_word: מִן הַדֶּרֶךְ
  english_pob_choice: from the way
  chosen_spanish: del camino
  alternatives_spanish:
  - de la senda
  - de la ruta
  lexicon: HALOT
  rationale: «Camino» mantiene la metáfora bíblica de conducta/pauta de vida y es la opción más natural en español para esta redacción deuteronómica.
- source_word: אֲשֶׁר אָנֹכִי מְצַוֶּה אֶתְכֶם הַיּוֹם
  english_pob_choice: that I am commanding you today
  chosen_spanish: que yo les mando hoy
  alternatives_spanish:
  - que yo les ordeno hoy
  - que hoy les estoy mandando
  lexicon: HALOT
  rationale: El participio מְצַוֶּה se vierte de manera natural con presente en español. «Mando» conserva la autoridad imperativa y la inmediatez del discurso sin introducir una perífrasis innecesaria.
- source_word: לָלֶכֶת אַחֲרֵי
  english_pob_choice: to go after
  chosen_spanish: para ir tras
  alternatives_spanish:
  - para seguir
  - para caminar tras
  lexicon: HALOT
  rationale: La expresión idiomática hebrea se conserva con una imagen de seguimiento. «Ir tras» transmite mejor el matiz de adhesión/seguimiento que un simple «seguir» en este contexto.
- source_word: אֱלֹהִים אֲחֵרִים
  english_pob_choice: other gods
  chosen_spanish: otros dioses
  alternatives_spanish:
  - dioses ajenos
  - otras deidades
  lexicon: HALOT
  rationale: La fórmula deuteronómica estándar se mantiene como «otros dioses», la forma más directa y reconocible en español, sin suavizar la polémica monoteísta del pasaje.
- source_word: אֲשֶׁר לֹא יְדַעְתֶּם
  english_pob_choice: that you have not known
  chosen_spanish: que no han conocido
  alternatives_spanish:
  - que ustedes no han conocido
  - que no conocieron
  lexicon: HALOT
  rationale: El perfecto hebreo se expresa con un perfecto español que mantiene el valor de experiencia previa negada. «Han conocido» conserva la referencia a una relación personal/religiosa no establecida.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se sigue el criterio del proyecto de traducir el Tetragrammaton como «Yahvé», evitando la sustitución tradicional por un título y preservando el nombre de pacto del texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de שׁמע en contexto pactual
  english_pob_reading: listen to
  chosen_spanish_reading: escuchar
  alternative_spanish_readings:
  - obedecer
  - hacer caso
  rationale: El verbo hebreo puede implicar obediencia, pero la frase fuente dice literalmente «escuchar los mandamientos». La traducción principal conserva esa base léxica y deja que el contexto pactual aporte la fuerza obediencial.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El cotejo con la versión inglesa auditada muestra acuerdo general alto y sin revisiones aplicadas en el último pase. Se han respetado las decisiones consolidadas: el nombre divino como Yahvé, la conservación de la metáfora del camino y la no-explicitación interpretativa de שׁמע como «obedecer» en el texto principal.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estable para יְהוָה.
  - «Mandamientos» conserva el tono legal/pactual del pasaje.
  - «Camino» e «ir tras» preservan la metáfora de orientación moral sin sustituirla por paráfrasis.
  - La nota a pie de texto ofrece la alternativa obediencial documentada sin desplazar la lectura principal.
