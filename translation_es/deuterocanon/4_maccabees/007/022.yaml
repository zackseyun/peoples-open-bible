translation:
  language: es
  text: Y sabiendo que es bienaventurado soportar todo dolor por amor a la virtud, ¿no prevalecería sobre las pasiones por amor a la piedad?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εἰδώς
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - como sabe
  - ya que sabe
  lexicon: BDAG
  rationale: El participio introduce la base de la pregunta retórica. «Sabiendo» conserva la relación causal compacta sin volverla demasiado explícita.
- source_word: διὰ τὴν ἀρετήν
  english_pob_choice: for the sake of virtue
  chosen_spanish: por causa de la virtud
  alternatives_spanish:
  - por virtud
  - a causa de la excelencia
  lexicon: LSJ
  rationale: ἀρετή aquí apunta a excelencia moral/virtud. «Por causa de la virtud» mantiene la relación final/causal y suena natural en español.
- source_word: πάντα πόνον
  english_pob_choice: every pain
  chosen_spanish: todo dolor
  alternatives_spanish:
  - todo sufrimiento
  - toda penuria
  lexicon: LSJ
  rationale: πόνος puede abarcar dolor, fatiga o penuria. «Todo dolor» conserva el valor amplio y la forma compacta del griego, sin forzar una abstracción excesiva.
- source_word: ὑπομένειν
  english_pob_choice: to endure
  chosen_spanish: soportar
  alternatives_spanish:
  - aguantar
  - perseverar en
  lexicon: BDAG
  rationale: El verbo expresa permanecer bajo la prueba con firmeza. «Soportar» es idiomático y fiel en este contexto exhortativo.
- source_word: μακάριόν ἐστιν
  english_pob_choice: it is blessed
  chosen_spanish: es bienaventurado
  alternatives_spanish:
  - es bendito
  - es dichoso
  lexicon: BDAG
  rationale: μακάριος expresa bienaventuranza, no mera suerte. «Bienaventurado» conserva el tono evaluativo-religioso, más preciso que «feliz».
- source_word: περικρατήσειεν
  english_pob_choice: would ... prevail over
  chosen_spanish: prevalecería sobre
  alternatives_spanish:
  - dominaría sobre
  - vencería sobre
  lexicon: LSJ
  rationale: El verbo sugiere ganar dominio o vencer. «Prevalecería sobre» reproduce bien la pregunta retórica y evita un tono demasiado técnico o militar.
- source_word: τῶν παθῶν
  english_pob_choice: the passions
  chosen_spanish: las pasiones
  alternatives_spanish:
  - los impulsos
  - las emociones desordenadas
  lexicon: LSJ
  rationale: En 4 Macabeos, πάθη es un término ético-filosófico para los impulsos/pasiones desordenadas. «Las pasiones» preserva ese sentido técnico.
- source_word: διὰ τὴν εὐσέβειαν
  english_pob_choice: for the sake of godliness
  chosen_spanish: por causa de la piedad
  alternatives_spanish:
  - por causa de la devoción
  - por causa de la reverencia
  lexicon: BDAG
  rationale: εὐσέβεια aquí expresa piedad o devoción reverente hacia Dios. «Piedad» es la equivalencia española más directa y tradicional sin perder el matiz religioso.
theological_decisions:
- issue: Tensión entre virtud ética y piedad religiosa
  english_pob_reading: Translate ἀρετή as 'virtue,' πάθη as 'the passions,' and εὐσέβεια as 'godliness' to preserve the work's moral and religious vocabulary.
  chosen_spanish_reading: Traducir ἀρετή como «virtud», πάθη como «las pasiones» y εὐσέβεια como «piedad» para mantener el vocabulario moral y religioso del pasaje.
  alternative_spanish_readings:
  - «excelencia» para ἀρετή
  - «impulsos» o «emociones» para πάθη
  - «devoción» para εὐσέβεια
  rationale: El texto articula una ética helenística integrada con la fidelidad a Dios. En español, «virtud» y «piedad» conservan esa tensión sin diluirla en términos más psicológicos o más abstractos.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: El borrador sigue de cerca el sentido del griego y el audit trail inglés, con ajuste estilístico mínimo para español natural. No se requirieron revisiones textuales adicionales en el contexto provisto.
  spanish_consistency_notes:
  - Se mantuvo «virtud» para ἀρετή por coherencia con el registro ético del libro.
  - Se mantuvo «las pasiones» para πάθη como término técnico moral-filosófico.
  - Se prefirió «piedad» para εὐσέβεια por claridad bíblica en español, sin borrar su carácter de reverencia hacia Dios.
