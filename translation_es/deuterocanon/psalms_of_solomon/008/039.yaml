translation:
  language: es
  text: Que haya favor para nosotros y para nuestros hijos para siempre[a]; oh Señor, nuestro Salvador, ya no volveremos a ser sacudidos jamás[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Favor» aquí traduce εὐδοκία; también puede entenderse como «buena voluntad» o «beneplácito».
    reason: lexical_alternative
  - marker: b
    text: 'El griego dice literalmente: «no seremos sacudidos todavía por tiempo eterno», una manera enfática de afirmar estabilidad duradera.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐδοκία
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - buena voluntad
  - beneplácito
  lexicon: BDAG
  rationale: En este contexto de súplica/confianza comunitaria, εὐδοκία expresa aprobación o benevolencia concedida. «Favor» reproduce bien ese valor y suena natural en español bíblico actual sin perder el matiz relacional.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: El vocativo de κύριος dirigido a Dios se vierte de forma estable como «Señor» en español, manteniendo el tono litúrgico y la dirección de la oración.
- source_word: σωτὴρ
  english_pob_choice: Savior
  chosen_spanish: Salvador
  alternatives_spanish:
  - libertador
  - salvador
  lexicon: BDAG
  rationale: σωτήρ funciona aquí como título. «Salvador» preserva ese valor titular y es la forma natural y reverente en español.
- source_word: σαλευθησόμεθα
  english_pob_choice: be shaken
  chosen_spanish: seremos sacudidos
  alternatives_spanish:
  - seremos movidos
  - seremos removidos
  - seremos inestables
  lexicon: BDAG
  rationale: El pasivo futuro comunica ser desestabilizados. «Seremos sacudidos» conserva la imagen del griego y la fuerza de una estabilidad amenazada.
- source_word: τὸν αἰῶνα χρόνον
  english_pob_choice: for all time
  chosen_spanish: para siempre
  alternatives_spanish:
  - por todo tiempo
  - por toda la eternidad
  lexicon: LSJ
  rationale: La expresión doble intensifica duración indefinida y total. En español, «para siempre» comunica esa intensificación de modo directo y digno; se mantiene además el refuerzo final «nunca más, para siempre» para reflejar la acumulación temporal del griego.
- source_word: ἡμῖν καὶ τοῖς τέκνοις ἡμῶν
  english_pob_choice: For us and our children
  chosen_spanish: para nosotros y para nuestros hijos
  alternatives_spanish:
  - para nosotros y para nuestros niños
  - a nosotros y a nuestros hijos
  lexicon: BDAG
  rationale: τέκνα es inclusivo y no se restringe a varones. «Hijos» es el equivalente natural en español bíblico para ‘children’ en este contexto de descendencia/covenio, y la repetición de «para» conserva la función dativa de beneficio.
theological_decisions:
- issue: 'Alcance de la cláusula inicial de εὐδοκία: ¿petición o afirmación?'
  english_pob_reading: May favor be upon us and our children forever
  chosen_spanish_reading: Que haya favor para nosotros y para nuestros hijos para siempre
  alternative_spanish_readings:
  - Que el favor esté sobre nosotros y sobre nuestros hijos para siempre
  - Nuestro favor será para nosotros y nuestros hijos para siempre
  rationale: El griego es una cláusula nominal/dativa que admite tanto lectura de benevolencia otorgada como de deseo/súplica. En español, la forma desiderativa «Que haya...» respeta esa ambigüedad sin forzar una afirmación explícita ni añadir un posesivo no presente.
  doctrine_reference: Salmo de súplica/confianza; no implica una formulación doctrinal específica.
- issue: Valor de la cláusula final de estabilidad continua
  english_pob_reading: we shall never again be shaken forever
  chosen_spanish_reading: no seremos sacudidos nunca más, para siempre
  alternative_spanish_readings:
  - no seremos movidos nunca más, para siempre
  - no volveremos a ser sacudidos jamás
  rationale: El griego οὐ σαλευθησόμεθα ἔτι τὸν αἰῶνα χρόνον intensifica la negación y la duración. «Nunca más, para siempre» reproduce la doble fuerza temporal sin suavizarla, y «seremos sacudidos» conserva la imagen física de inestabilidad.
  doctrine_reference: Esperanza de estabilidad divina/pactual; sin desarrollo doctrinal adicional.
translation_notes:
  revision_awareness: Se siguió el audit trail inglés, pero se evitó trasladar mecánicamente la construcción inglesa inicial. La cláusula nominal griega se resolvió en español con un desiderativo natural («Que haya...»), mientras que el cierre temporal se reforzó con una duplicación española equivalente a la intensidad del griego. También se mantuvo la dirección litúrgica de la vocación («oh Señor, nuestro Salvador») sin introducir posesivos no explícitos.
  spanish_consistency_notes:
  - Se usó «Señor» para Κύριε y «Salvador» para σωτήρ, en línea con la terminología POB y el tono de oración.
  - Se prefirió «hijos» como equivalente inclusivo de τέκνα, evitando una restricción a varones.
  - Se conservó «favor» para εὐδοκία, ya que «buena voluntad» o «beneplácito» sonarían más técnicos y menos naturales en este salmo.
  - Se evitó «Cristo» porque no hay χριστός en el texto y el vocativo es claramente a Dios.
  - La duplicación «nunca más, para siempre» intenta reflejar la intensificación del griego sin añadir contenido doctrinal nuevo.
