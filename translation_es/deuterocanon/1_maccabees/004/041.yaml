review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego y el rastro inglés: τότε/ἐπέταξεν = «Entonces… ordenó»; πολεμεῖν = «pelear/combatir»; τοὺς ἐν τῇ ἄκρᾳ = «los que estaban en la ciudadela» con nota sobre «Acra»; ἕως καθαρίσῃ τὰ ἅγια = propósito/límite temporal hasta la purificación del santuario. La única desviación relevante es sintáctica-estilística en español: «ordenó a hombres que pelearan» es comprensible, pero suena poco natural y algo calcado. Conviene «ordenó a unos hombres combatir…» o «ordenó a hombres combatir…».'
  spanish_quality_summary: El español es claro y fiel, pero «a hombres» suena áspero en registro bíblico-natural; también «pelearan contra» puede mejorarse a «combatir a» para un tono más digno y directo. El resto, incluyendo «ciudadela», «santuario» y la nota sobre «Acra», es legible y adecuado.
  glossary_alignment: No hay términos del glosario mayor en conflicto. «Santuario» para τὰ ἅγια está bien documentado. La nota conserva correctamente la alternativa histórica «Acra».
  issues:
  - severity: medium
    issue: Construcción «ordenó a hombres que pelearan» poco idiomática
    rationale: 'Aunque refleja el griego de cerca, en español suena forzada. El infinitivo dependiente tras «ordenó» reproduce mejor la sintaxis con naturalidad: «ordenó a unos hombres combatir…».'
  - severity: low
    issue: «Pelearan contra» es menos digno que «combatir a» en este contexto
    rationale: No es infiel, pero «combatir» encaja mejor con el registro narrativo-militar de 1 Macabeos y mantiene la concisión del infinitivo griego πολεμεῖν.
  revised_spanish_text: Entonces Judas ordenó a unos hombres combatir a los que estaban en la ciudadela[a], hasta que hubiera purificado el santuario.
  revised_footnotes:
  - marker: a
    text: O «los del Acra», la fortaleza amurallada de Jerusalén.
    reason: alternative_reading
  revision_rationale: Se ajusta la sintaxis para un español más natural y digno sin perder la literalidad esencial del griego ni la decisión léxica del POB. «A unos hombres combatir» preserva ἀνδράσιν sin sobredeterminar «soldados» y evita un calco torpe; «combatir» refleja bien πολεμεῖν. Se conserva la nota histórica sobre «Acra».
