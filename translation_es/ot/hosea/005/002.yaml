revisions:
- from: Los rebeldes[a] se han hundido profundamente en la matanza, pero yo soy reprensión[b] para todos ellos.
  to: Los rebeldes[a] se han hundido profundamente hasta la matanza, pero yo soy un reproche[b] para todos ellos.
  rationale: Se ajusta 'en la matanza' a 'hasta la matanza' para reflejar mejor la intensificación/direccionalidad defendida en el expediente fuente, y se cambia 'reprensión' por 'un reproche' para lograr un español más natural y alineado con la revisión inglesa 'a rebuke', manteniendo en nota las alternativas de מוּסָר.
