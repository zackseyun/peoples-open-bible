revisions:
- from: No se acercarán a mí para ejercer el sacerdocio para mí[a], ni se acercarán a ninguna de mis cosas santas, a las cosas santísimas; sino que llevarán su vergüenza y las abominaciones que han cometido.
  to: No se acercarán a mí para servir como sacerdotes para mí[a], ni para acercarse a ninguna de mis cosas sagradas, las cosas santísimas; sino que cargarán con su vergüenza y con las abominaciones que han cometido.
  rationale: Se ajustó 'ejercer el sacerdocio' a 'servir como sacerdotes' para reflejar mejor לְכַהֵן en español natural. Se eliminó la repetición torpe de 'a' antes de 'las cosas santísimas', siguiendo la mejora ya registrada en el audit trail inglés. También se cambió 'llevarán' por 'cargarán con' para expresar más claramente el valor de נָשְׂאוּ con vergüenza/culpa, y se añadió el segundo 'con' para una coordinación más idiomática en español.
