translation:
  language: es
  text: Conforme a todas estas palabras y conforme a toda esta visión[a], así habló Natán a David.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «revelación» para «visión». El término hebreo alude a una revelación profética, a menudo recibida en forma de visión.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּכֹל
  english_pob_choice: According to all
  chosen_spanish: Conforme a todas
  alternatives_spanish:
  - De acuerdo con todas
  - Según todas
  lexicon: HALOT
  rationale: El prefijo comparativo כְ expresa correspondencia; en español, «conforme a» reproduce bien la idea de ajuste o conformidad sin perder el tono formal del hebreo.
- source_word: הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas cosas
  - estos asuntos
  lexicon: HALOT
  rationale: דְּבָרִים puede significar «palabras» o «asuntos». Aquí el contexto es un informe del mensaje divino, por lo que «palabras» conserva el contenido verbal de la revelación.
- source_word: וּכְכֹל
  english_pob_choice: and according to all
  chosen_spanish: y conforme a toda
  alternatives_spanish:
  - e igualmente conforme a toda
  - y de acuerdo con toda
  lexicon: HALOT
  rationale: Se mantiene la repetición enfática del hebreo con «y conforme a», evitando fusionar las dos cláusulas y conservando el paralelismo.
- source_word: הַחִזָּיוֹן הַזֶּה
  english_pob_choice: this vision
  chosen_spanish: esta visión
  alternatives_spanish:
  - esta revelación
  - esta visión profética
  lexicon: HALOT
  rationale: חִזָּיוֹן refiere a una visión o manifestación revelatoria. «Visión» es la traducción más directa y preserva el matiz profético sin explicarlo de más.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - de esa manera
  lexicon: HALOT
  rationale: «Así» comunica de manera natural en español la relación conclusiva y correspondiente del hebreo כֵּן.
- source_word: דִּבֶּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El verbo דבר se rinde con «habló» para mantener el registro narrativo y el vínculo con las «palabras» mencionadas al inicio.
- source_word: נָתָן
  english_pob_choice: Nathan
  chosen_spanish: Natán
  alternatives_spanish:
  - Nathan
  lexicon: standard transliteration
  rationale: Se usa la forma habitual en español bíblico, con acento gráfico, para facilitar la lectura y la pronunciación.
- source_word: אֶל דָּוִד
  english_pob_choice: to David
  chosen_spanish: a David
  alternatives_spanish:
  - para David
  lexicon: HALOT
  rationale: אֶל marca dirección hacia una persona; «a David» es la equivalencia natural y fiel en español.
theological_decisions:
- issue: Naturaleza de חִזָּיוֹן como revelación profética
  english_pob_reading: Render as 'vision' in the main text.
  chosen_spanish_reading: Mantener «visión» en el texto principal.
  alternative_spanish_readings:
  - revelación
  - visión profética
  rationale: El hebreo emplea el término técnico de una percepción revelatoria. Traducirlo como «visión» conserva la afirmación del texto sin diluirla en una paráfrasis interpretativa.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El borrador sigue el estado revisado sin cambios del testimonio inglés: se conserva la repetición de las dos expresiones paralelas («conforme a todas... conforme a toda...»), y no se introducen expansiones doctrinales ni lecturas alternativas no respaldadas por el audit trail.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo hebreo con dos miembros coordinados por «y».
  - Se usa «Natán» con acento y «David» como nombres propios estándar en español.
  - La puntuación final respeta el tono narrativo y declarativo del versículo.
  - La nota al pie está anclada a «visión» para reflejar la alternativa lexical documentada en el inglés POB.
