translation:
  language: es
  text: Las aguas que descendían desde arriba se detuvieron[a]; se levantaron en un solo montón, muy lejos, en Adam, la ciudad junto a Zaretán. Y las que descendían hacia el mar del Arabá, el mar de la Sal[b], fueron completamente cortadas, y el pueblo pasó frente a Jericó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se levantaron en un solo montón». La imagen hebrea enfatiza que las aguas se amontonaron como una sola barrera.'
    reason: lexical_alternative
  - marker: b
    text: «El mar de la Sal» es el cuerpo de agua que después se llamó comúnmente mar Muerto.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעַמְדוּ
  english_pob_choice: stood still
  chosen_spanish: se detuvieron
  alternatives_spanish:
  - se quedaron quietas
  - se pararon
  lexicon: HALOT
  rationale: עמד, en este contexto, expresa que las aguas cesaron su movimiento. «Se detuvieron» comunica la interrupción del flujo sin sonar mecánico.
- source_word: הַמַּיִם הַיֹּרְדִים מִלְמַעְלָה
  english_pob_choice: the waters flowing down from above
  chosen_spanish: las aguas que descendían desde arriba
  alternatives_spanish:
  - las aguas que bajaban desde arriba
  - las aguas que fluían desde arriba
  lexicon: HALOT
  rationale: El participio indica aguas en descenso desde una altura. «Descendían desde arriba» conserva la dirección y mantiene un español natural.
- source_word: קָמוּ נֵד אֶחָד
  english_pob_choice: they rose up in one heap
  chosen_spanish: se levantaron en un solo montón
  alternatives_spanish:
  - se alzaron como un solo montón
  - se levantaron en un solo muro
  lexicon: HALOT
  rationale: קום con נֵד presenta las aguas acumulándose como una masa elevada. «Un solo montón» conserva la imagen concreta sin suavizarla.
- source_word: הַרְחֵק מְאֹד
  english_pob_choice: very far away
  chosen_spanish: muy lejos
  alternatives_spanish:
  - a mucha distancia
  - muy distante
  lexicon: HALOT
  rationale: La expresión intensifica la distancia. «Muy lejos» es la forma más directa y comprensible en español.
- source_word: בְאָדָם
  english_pob_choice: at Adam
  chosen_spanish: en Adam
  alternatives_spanish:
  - en la ciudad de Adam
  - junto a Adam
  lexicon: HALOT
  rationale: Aquí אדם es nombre propio de lugar. Se translitera como topónimo y se conserva el valor locativo con «en».
- source_word: הָעִיר אֲשֶׁר מִצַּד צָרְתָן
  english_pob_choice: the city beside Zarethan
  chosen_spanish: la ciudad junto a Zaretán
  alternatives_spanish:
  - la ciudad al lado de Zaretán
  - la ciudad cerca de Zaretán
  lexicon: HALOT
  rationale: מִצַּד expresa proximidad lateral. «Junto a» refleja bien la relación espacial con una construcción natural en español.
- source_word: וְהַיֹּרְדִים עַל יָם הָעֲרָבָה
  english_pob_choice: And those flowing down toward the Sea of the Arabah
  chosen_spanish: Y las que descendían hacia el mar del Arabá
  alternatives_spanish:
  - Y las que bajaban hacia el mar del Arabá
  - Y las aguas que descendían hacia el mar del Arabá
  lexicon: HALOT
  rationale: El participio retoma las aguas que siguen fluyendo en dirección al mar. «Mar del Arabá» conserva la relación constructa sin expandir innecesariamente.
- source_word: יָם הַמֶּלַח
  english_pob_choice: the Salt Sea
  chosen_spanish: el mar de la Sal
  alternatives_spanish:
  - el mar Salado
  - el mar de Sal
  lexicon: HALOT
  rationale: Se traduce de manera directa el designativo hebreo. «Mar de la Sal» mantiene el sentido literal y la referencia geográfica.
- source_word: תַּמּוּ נִכְרָתוּ
  english_pob_choice: were completely cut off
  chosen_spanish: quedaron completamente cortadas
  alternatives_spanish:
  - fueron totalmente cortadas
  - se acabaron por completo
  lexicon: HALOT
  rationale: La secuencia verbal intensifica la cesación total del flujo. «Quedaron completamente cortadas» preserva la fuerza resultativa del hebreo y suena idiomático en español.
- source_word: וְהָעָם עָבְרוּ
  english_pob_choice: and the people crossed over
  chosen_spanish: y el pueblo pasó
  alternatives_spanish:
  - y el pueblo cruzó
  - y el pueblo pasó de largo
  lexicon: HALOT
  rationale: עבר en este contexto narra el cruce del Jordán. «Pasó» es fiel y natural; el contexto ya determina el sentido de cruce.
- source_word: נֶגֶד יְרִיחוֹ
  english_pob_choice: opposite Jericho
  chosen_spanish: frente a Jericó
  alternatives_spanish:
  - en frente de Jericó
  - opuesto a Jericó
  lexicon: HALOT
  rationale: נגד indica posición enfrente u opuesta. «Frente a» conserva la relación espacial con una forma corriente en español.
theological_decisions:
- issue: Imagen de las aguas acumuladas en una sola masa
  english_pob_reading: they rose up in one heap
  chosen_spanish_reading: se levantaron en un solo montón
  alternative_spanish_readings:
  - se alzaron como un solo montón
  - se levantaron en un solo muro
  rationale: No se suaviza la imagen física del texto. «Un solo montón» conserva la tensión visual de la barrera de agua sin convertirla en interpretación explicativa.
  doctrine_reference: Ex 14:21-22; Jos 3:13-17
- issue: Designación del cuerpo de agua como "Salt Sea"
  english_pob_reading: The Salt Sea is the body of water later commonly called the Dead Sea.
  chosen_spanish_reading: el mar de la Sal
  alternative_spanish_readings:
  - el mar Salado
  - el mar Muerto
  rationale: Se mantiene la designación hebrea literal en el texto principal; la identificación tradicional queda implícita para nota o contexto, sin reemplazar el término fuente.
  doctrine_reference: Jos 3:16; cf. Gn 14:3
- issue: Cierre total del flujo aguas abajo
  english_pob_reading: were completely cut off
  chosen_spanish_reading: quedaron completamente cortadas
  alternative_spanish_readings:
  - fueron totalmente cortadas
  - se interrumpieron por completo
  rationale: La doble expresión hebrea comunica cese total, no mera disminución. La traducción conserva ese énfasis sin diluirlo en una frase menos fuerte.
  doctrine_reference: Jos 3:16
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparezca explícitamente en el texto español. La redacción mantiene la línea del registro inglés auditado y conserva las imágenes concretas del hebreo sin añadir glosas innecesarias.
  spanish_consistency_notes:
  - Se usó «Yahvé» como terminología por defecto no aplicable en este versículo porque el tetragrámaton no aparece aquí.
  - Se mantuvo el topónimo «Adam» como nombre propio, no como sustantivo común.
  - Se tradujo «Salt Sea» literalmente como «mar de la Sal» para conservar la forma hebrea del texto, con posible identificación contextual con el Mar Muerto en nota o estudio.
  - Se evitó «SEÑOR» o equivalentes de ocultamiento, conforme a la política del proyecto.
  - Se mantuvo un registro sobrio y narrativo, adecuado para lectura bíblica pública.
