revisions:
- from: 'Y de entre los sacerdotes: los hijos de Hobaía[a], los hijos de Hacoz, los hijos de Barzilai, que había tomado por esposa a una de las hijas de Barzilai el galaadita, y fue llamado por su nombre.'
  to: 'Y de entre los sacerdotes: los hijos de Hobaía[a], los hijos de Hacoz, los hijos de Barzilai, que había tomado por esposa a una de las hijas de Barzilai el galaadita, y fue llamado por el nombre de ellos.'
  rationale: 'Se corrige el punto principal de fidelidad al hebreo: el sufijo plural en «su nombre» debe preservarse. «Fue llamado por el nombre de ellos» mantiene de cerca el sentido de וַיִּקָּרֵא עַל שְׁמָם sin introducir una paráfrasis más amplia. La nota también se ajusta para conservar la idea de nombramiento por referencia a esa familia, no por la acción directa de «ellos».'
