  to: 'Porque así dice Yahvé[a], el Dios de Israel: «La tinaja[b] de harina no se agotará, y la vasija[c] de aceite no se agotará[d], hasta el día en que Yahvé dé lluvia sobre la superficie de la tierra[e]».'
  rationale: Se mantiene la fidelidad al hebreo y al POB, pero se reemplaza «no disminuirá» por «no se agotará» para lograr un español más natural y claro en contexto de provisión doméstica. La nota léxica conserva las alternativas cercanas al sentido de חסר. El resto del versículo está bien alineado con la terminología y el razonamiento del proyecto.
