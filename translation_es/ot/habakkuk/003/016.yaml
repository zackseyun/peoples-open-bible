translation:
  language: es
  text: Oí, y mis entrañas temblaron; al sonido mis labios se estremecieron. La podredumbre entra en mis huesos, y debajo de mí tiemblo, mientras espero en silencio[a] el día de la angustia, ante la venida del pueblo que nos invadirá[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «para que repose para el día de la angustia» o «que descanse para el día de la angustia». El verbo hebreo puede significar «reposar» o «estar quieto»; aquí se traduce «espero en silencio» porque el contexto enfatiza una espera callada ante la angustia venidera.'
    reason: alternative_reading
  - marker: b
    text: 'O: «el pueblo que nos atacará» o «el pueblo que hará incursiones contra nosotros». El verbo hebreo se refiere a invadir o hacer incursiones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַעְתִּי
  english_pob_choice: I heard
  chosen_spanish: Oí
  alternatives_spanish:
  - He oído
  lexicon: HALOT
  rationale: El perfecto hebreo abre la reacción del profeta en un contexto poético/narrativo; en español, el pretérito simple suena natural y conserva la inmediatez del impacto.
- source_word: וַתִּרְגַּז בִּטְנִי
  english_pob_choice: my inward parts trembled
  chosen_spanish: mis entrañas temblaron
  alternatives_spanish:
  - mi vientre tembló
  - mis partes internas temblaron
  lexicon: HALOT
  rationale: בטן puede referirse literalmente al vientre, pero aquí expresa el centro visceral de la persona. 'Entrañas' mantiene la fuerza corporal y la resonancia poética del hebreo.
- source_word: לְקוֹל
  english_pob_choice: at the sound
  chosen_spanish: al sonido
  alternatives_spanish:
  - a la voz
  - al oír
  lexicon: HALOT
  rationale: קול puede ser 'voz' o 'sonido'; en este contexto la reacción es ante una manifestación audible, y 'al sonido' es amplio y fiel.
- source_word: צָלֲלוּ שְׂפָתַי
  english_pob_choice: my lips quivered
  chosen_spanish: mis labios se estremecieron
  alternatives_spanish:
  - mis labios temblaron
  - mis labios vibraron
  lexicon: HALOT
  rationale: El verbo sugiere una reacción temblorosa/quebrada. 'Se estremecieron' comunica el efecto corporal en español sin perder la imagen de las labios afectados por el temor.
- source_word: יָבֹא רָקָב בַּעֲצָמַי
  english_pob_choice: Rot enters into my bones
  chosen_spanish: La podredumbre entra en mis huesos
  alternatives_spanish:
  - La corrupción entra en mis huesos
  - La descomposición entra en mis huesos
  lexicon: HALOT
  rationale: רקב denota podredumbre/putrefacción. 'Podredumbre' conserva el sentido material y la intensidad de deterioro físico de la metáfora.
- source_word: וְתַחְתַּי אֶרְגָּז
  english_pob_choice: and beneath me I tremble
  chosen_spanish: y debajo de mí tiemblo
  alternatives_spanish:
  - y bajo mí tiemblo
  - y me estremezco por debajo
  lexicon: HALOT
  rationale: תחתַי significa 'debajo de mí/beneath me'. 'Debajo de mí tiemblo' preserva la imagen de inestabilidad bajo el cuerpo, aun cuando el español obliga a una formulación algo más natural.
- source_word: אֲשֶׁר אָנֻוּחַ
  english_pob_choice: as I wait quietly
  chosen_spanish: mientras espero en silencio
  alternatives_spanish:
  - cuando reposo
  - mientras descanso
  lexicon: HALOT
  rationale: נוח puede significar descansar, asentarse o estar quieto. Siguiendo la decisión auditada de evitar un reposo más fuerte que el contexto, 'espero en silencio' conserva la quietud expectante.
- source_word: לְיוֹם צָרָה
  english_pob_choice: for the day of distress
  chosen_spanish: el día de la angustia
  alternatives_spanish:
  - el día de la aflicción
  - el día del afán
  lexicon: HALOT
  rationale: צָרָה abarca angustia, aflicción y angustia opresiva. 'Angustia' transmite bien la gravedad sin forzar una especificación adicional.
- source_word: לַעֲלוֹת
  english_pob_choice: for the coming up
  chosen_spanish: por la subida
  alternatives_spanish:
  - por la llegada
  - por el avance
  lexicon: HALOT
  rationale: עלה conserva la imagen de 'subir/ascender' en sentido militar. 'Subida' mantiene el movimiento ascendente del hebreo, aun siendo una expresión menos común en español contemporáneo.
- source_word: לְעַם יְגוּדֶנּוּ
  english_pob_choice: of the people who will invade us
  chosen_spanish: del pueblo que nos invadirá
  alternatives_spanish:
  - del pueblo que nos atacará
  - del pueblo que nos asaltará
  - del pueblo que nos raerá
  lexicon: HALOT
  rationale: 'גדד se refiere a invadir o hacer incursiones. ''Invadirá'' comunica el carácter agresivo y colectivo del grupo, en línea con la lectura auditada que entiende el sufijo como primera persona plural: ''nos''.'
theological_decisions:
- issue: Sentido de אֲשֶׁר אָנֻוּחַ en el contexto
  english_pob_reading: The prophet speaks of quiet waiting for the appointed day of distress rather than restful relief.
  chosen_spanish_reading: El profeta habla de esperar en silencio para el día señalado de angustia, no de una promesa explícita de alivio.
  alternative_spanish_readings:
  - que yo descanse en el día de la angustia
  - aunque yo tenga descanso en el día de la angustia
  rationale: El contexto inmediato describe temor corporal ante el juicio venidero y luego una espera contenida. Traducir con 'espero en silencio' preserva esa tensión entre miedo y confianza sin convertir el texto en una afirmación más fuerte de reposo.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el trazado auditado del POB inglés y los datos hebreos: conserva la secuencia de reacciones corporales, mantiene la imagen militar de עלה/גדד y reproduce la tensión interpretativa de אָנֻוּחַ sin resolverla hacia un descanso más fuerte de lo que el contexto exige. No hay revisiones aplicadas en el expediente inglés más allá de confirmarse el texto vigente.'
  spanish_consistency_notes:
  - Se prefiere «Yahvé» solo cuando el texto lo requiera explícitamente; en este versículo no aparece el nombre divino.
  - Se mantiene un registro poético sobrio, con vocabulario corporal fuerte («entrañas», «podredumbre», «huesos») para reflejar el hebreo sin suavizarlo.
  - «Espero en silencio» intenta sonar natural en español y a la vez conservar la quietud expectante del verbo נוח en este contexto.
