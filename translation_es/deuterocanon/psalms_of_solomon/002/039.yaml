translation:
  language: es
  text: y tener misericordia del justo de la humillación del pecador[a][b][c], y retribuir al pecador por lo que hizo al justo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tener misericordia del justo desde la humillación del pecador». El griego es compacto; el texto principal conserva esa compresión, aunque la construcción probablemente implica rescate o liberación.
    reason: lexical_alternative
  - marker: b
    text: «Humillación» también puede traducirse como «aflicción», «abatimiento» u «opresión».
    reason: lexical_alternative
  - marker: c
    text: O «y tener misericordia del justo, rescatándolo de la humillación infligida por el pecador, y retribuir al pecador por lo que hizo al justo».
    reason: previous_rendering
lexical_decisions:
- source_word: ἐλεῆσαι
  english_pob_choice: to show mercy
  chosen_spanish: tener misericordia
  alternatives_spanish:
  - mostrar misericordia
  - compadecerse
  lexicon: BDAG
  rationale: El infinitivo aoristo expresa una acción de misericordia; en español bíblico y actual, «tener misericordia» comunica bien ese acto sin sonar artificial.
- source_word: δίκαιον
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el recto
  - el hombre justo
  - los justos
  lexicon: BDAG
  rationale: El singular griego apunta a una persona justa de manera genérica. «El justo» conserva esa categoría moral y encaja mejor con el paralelismo.
- source_word: ἀπὸ ταπεινώσεως
  english_pob_choice: from the humiliation
  chosen_spanish: de la humillación
  alternatives_spanish:
  - de la aflicción
  - de la opresión
  - del abatimiento
  lexicon: BDAG
  rationale: «Humillación» sigue de cerca el valor léxico de ταπείνωσις y mantiene el matiz social/moral que el contexto sugiere.
- source_word: ἁμαρτωλοῦ / ἁμαρτωλῷ
  english_pob_choice: the sinner
  chosen_spanish: el pecador
  alternatives_spanish:
  - el culpable
  - el impío
  - el malvado
  lexicon: BDAG
  rationale: El sustantivo es singular y personal en ambas cláusulas. «El pecador» reproduce de modo directo la contraposición con «el justo».
- source_word: ἀποδοῦναι
  english_pob_choice: to repay
  chosen_spanish: retribuir
  alternatives_spanish:
  - pagar
  - recompensar
  - pagar de vuelta
  lexicon: BDAG
  rationale: «Retribuir» expresa con claridad la idea de devolución retributiva sin añadir más contenido interpretativo del necesario.
- source_word: ἀνθʼ ὧν
  english_pob_choice: for what
  chosen_spanish: por lo que
  alternatives_spanish:
  - a causa de lo que
  - en pago de lo que
  lexicon: BDAG
  rationale: La frase introduce la base de la retribución. «Por lo que» es natural en español y preserva el sentido causal-retributivo.
- source_word: ἐποίησεν δικαίῳ
  english_pob_choice: he did to the righteous
  chosen_spanish: hizo al justo
  alternatives_spanish:
  - hizo contra el justo
  - hizo al justo
  lexicon: BDAG
  rationale: El dativo admite en español una construcción simple con «a». Aquí se mantiene la concreción de la acción sin intensificarla más allá del griego.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que redujo la expansión interpretativa y prefirió una equivalencia más directa de ταπεινώσεως como «humiliation». En español se preserva ese ajuste con «humillación» y se evita añadir explicaciones ajenas al bicolon, aunque se deja constancia de la posible lectura de rescate implícito en las notas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se usa «el justo» y «el pecador» para conservar el paralelismo nominal singular del griego.
  - Se evita «siervo» porque no hay base para δοῦλος en este pasaje.
  - La puntuación intenta reflejar dos miembros paralelos con un giro causal-retributivo final.
