translation:
  language: es
  text: 'Y Moisés hizo como Yahvé le había mandado: tomó a Josué y lo puso delante de Eleazar el sacerdote y delante de toda la congregación[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo puso en pie delante»; el verbo hebreo también puede traducirse «lo presentó».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - actuó
  - cumplió
  lexicon: HALOT
  rationale: El verbo עשה aquí expresa la ejecución obediente de una orden previa. En español, 'hizo' conserva esa sobriedad y naturalidad sin añadir matices ajenos.
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  lexicon: HALOT
  rationale: La relación comparativa y de conformidad entre la acción de Moisés y el mandato divino se expresa de manera idiomática con 'como'.
- source_word: צִוָּה
  english_pob_choice: had commanded
  chosen_spanish: había mandado
  alternatives_spanish:
  - había ordenado
  - mandó
  lexicon: HALOT
  rationale: '''Mandado'' comunica bien el carácter directivo del verbo y el pluscuamperfecto mantiene la anterioridad del mandato respecto de la acción de Moisés.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se conserva el nombre propio divino con la forma española de uso estable en esta tradición, 'Yahvé', en lugar de sustituirlo por un título.
- source_word: וַיִּקַּח אֶת־יְהוֹשֻׁעַ
  english_pob_choice: he took Joshua
  chosen_spanish: tomó a Josué
  alternatives_spanish:
  - llevó a Josué
  - tomó a Josué consigo
  lexicon: HALOT
  rationale: לקח literalmente es 'tomar'. En este contexto de presentación pública, 'tomó a Josué' es fiel y comprensible sin sobreinterpretar el movimiento.
- source_word: וַיַּעֲמִדֵהוּ
  english_pob_choice: set him
  chosen_spanish: lo puso
  alternatives_spanish:
  - lo hizo estar en pie
  - lo presentó
  lexicon: HALOT
  rationale: El causativo de עמד puede implicar poner de pie o presentar formalmente. 'Lo puso' mantiene la imagen básica y permite que el contexto de delante de autoridades complete el sentido ceremonial.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: '''Delante de'' es una equivalencia natural y clara en español para la ubicación pública y ceremonial indicada por לפני.'
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiarte
  - el ministro sacerdotal
  lexicon: HALOT
  rationale: '''El sacerdote'' es la forma más transparente y sobria para el cargo de Eleazar, sin introducir terminología eclesiástica ajena.'
- source_word: כָּל־הָעֵדָה
  english_pob_choice: all the congregation
  chosen_spanish: toda la congregación
  alternatives_spanish:
  - toda la asamblea
  - toda la comunidad
  lexicon: HALOT
  rationale: עֵדָה designa aquí al pueblo reunido. 'Congregación' conserva el valor colectivo tradicional, mientras 'toda' refleja bien el alcance total del grupo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrama. La forma española 'Yahvé' preserva el nombre propio y evita la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de וַיַּעֲמִדֵהוּ en la escena de investidura
  english_pob_reading: 'set him before; footnote: Or ''set him standing before''; the Hebrew verb can also be rendered ''presented him.'''
  chosen_spanish_reading: lo puso delante
  alternative_spanish_readings:
  - lo hizo estar en pie delante
  - lo presentó delante
  rationale: La construcción permite tanto la idea física de colocarlo de pie como la presentación formal ante autoridades. El cuerpo principal usa una solución breve y natural, y la nota preserva la alternativa lexical significativa.
  doctrine_reference: HALOT sobre עמד causativo; audit trail POB en inglés
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del texto base auditado; se conserva la misma lectura de mandato previo, presentación ceremonial y el nombre divino Yahvé en español.'
  spanish_consistency_notes:
  - Se mantiene el nombre divino como «Yahvé», conforme al criterio del proyecto para יְהוָה.
  - «Congregación» conserva el valor colectivo de עֵדָה en contexto pentateucal y evita una paráfrasis sociológica.
  - La nota [a] conserva la ambigüedad legítima del verbo causativo de עמד sin duplicar el sentido del texto principal.
