translation:
  language: es
  text: En el año dieciocho del rey Jeroboam[a], Abías comenzó a reinar sobre Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Abías es llamado «Abijam» en el pasaje paralelo de 1 Reyes 15:1; aquí Crónicas lee «Abías».
    reason: cross_reference
lexical_decisions:
- source_word: בִּ/שְׁנַת
  english_pob_choice: In the ... year of
  chosen_spanish: En el ... año de
  alternatives_spanish:
  - Durante el ... año de
  - En el año de
  lexicon: HALOT
  rationale: La fórmula hebrea introduce una datación regnal. En español, 'En el ... año de' conserva la estructura y suena natural en una cronología histórica.
- source_word: שְׁמוֹנֶה עֶשְׂרֵה
  english_pob_choice: eighteenth
  chosen_spanish: dieciocho
  alternatives_spanish:
  - decimoctavo
  lexicon: HALOT
  rationale: En español, dentro de una fórmula cronológica regnal, el cardinal 'dieciocho' es más natural que el ordinal; la equivalencia sigue el valor dativo de la expresión sin endurecer la sintaxis.
- source_word: לַ/מֶּלֶךְ
  english_pob_choice: of King
  chosen_spanish: de
  alternatives_spanish:
  - del rey
  - del monarca
  lexicon: HALOT
  rationale: La preposición con 'el rey' señala el reinado cuyo año se cuenta. En español, la posesión se expresa de manera más natural con 'de' en esta fórmula.
- source_word: יָרָבְעָם
  english_pob_choice: Jeroboam
  chosen_spanish: Jeroboam
  alternatives_spanish:
  - Yeroboam
  lexicon: transliteration
  rationale: Se conserva la transliteración estándar del nombre propio bíblico en español.
- source_word: וַ/יִּמְלֹךְ
  english_pob_choice: became king
  chosen_spanish: comenzó a reinar
  alternatives_spanish:
  - reinó
  - llegó a reinar
  lexicon: HALOT
  rationale: El valor ingrésivo del wayyiqtol de מלך apunta al inicio del reinado. 'Comenzó a reinar' preserva ese matiz mejor que un simple 'reinó'.
- source_word: אֲבִיָּה
  english_pob_choice: Abijah
  chosen_spanish: Abías
  alternatives_spanish:
  - Abías
  - Abijam
  lexicon: transliteration
  rationale: Se adopta la forma española habitual 'Abías' para אֲבִיָּה. Se evita 'Abijam' porque corresponde a la forma paralela de 1 Reyes 15:1, no a esta lectura de Crónicas.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - sobre el
  - en
  lexicon: HALOT
  rationale: Con מלך, עַל indica dominio o gobierno sobre un territorio o pueblo. 'Sobre' mantiene esa relación de autoridad.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judea
  lexicon: transliteration
  rationale: Se usa el nombre propio bíblico habitual en español para el reino del sur.
translation_notes:
  revision_awareness: 'El texto sigue de cerca la fórmula regnal hebrea y concuerda con el audit trail inglés: datación en el año dieciocho, valor ingresivo de מלך y uso de la forma de Crónicas para el nombre del rey.'
  spanish_consistency_notes:
  - Se mantuvo un registro cronológico sobrio y bíblico, evitando adornos explicativos no presentes en el hebreo.
  - La elección de 'Abías' se alinea con la forma de Crónicas y deja constancia en nota de la variante paralela.
  - '''Comenzó a reinar'' conserva el inicio del reinado sin forzar un calco semítico en español.'
