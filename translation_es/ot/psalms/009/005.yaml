translation:
  language: es
  text: Porque has defendido mi justicia y mi causa[a]; te has sentado en el trono, juzgando con rectitud[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi juicio y mi caso» o «mi derecho y mi causa». El hebreo usa términos legales emparejados para expresar vindicación.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «justamente». El sustantivo hebreo «rectitud» funciona aquí de manera adverbial: «juzgando con rectitud».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la afirmación precedente. En español, 'Porque' conserva el valor causal de manera natural y directa.
- source_word: עָשִׂיתָ
  english_pob_choice: have upheld
  chosen_spanish: has hecho justicia
  alternatives_spanish:
  - has mantenido
  - has vindicado
  - has ejecutado
  lexicon: HALOT
  rationale: 'El verbo básico es ''hacer'', pero con מִשְׁפָּט y דִין el sentido es forense: actuar para vindicar. ''Has hecho justicia'' comunica la acción judicial sin perder la base verbal.'
- source_word: מִשְׁפָּטִי
  english_pob_choice: my justice
  chosen_spanish: mi justicia
  alternatives_spanish:
  - mi juicio
  - mi derecho
  - mi causa
  lexicon: HALOT
  rationale: En este contexto מִשְׁפָּט combina la idea de sentencia/justicia/valor legal. 'Mi justicia' preserva el peso moral-jurídico que la POB inglesa quiso retener.
- source_word: וְדִינִי
  english_pob_choice: my cause
  chosen_spanish: mi causa
  alternatives_spanish:
  - mi juicio
  - mi caso
  - mi derecho
  lexicon: HALOT
  rationale: דִין aquí remite al caso o pleito legal. 'Mi causa' mantiene la imagen de una reclamación judicial distinta de מִשְׁפָּט.
- source_word: יָשַׁבְתָּ
  english_pob_choice: you sat
  chosen_spanish: te has sentado
  alternatives_spanish:
  - has tomado asiento
  - te sentaste
  - has ocupado
  lexicon: HALOT
  rationale: El perfecto puede expresar el hecho de entronización ya establecido. 'Te has sentado' suena natural en español y conserva la imagen del juez entronizado.
- source_word: לְכִסֵּא
  english_pob_choice: on the throne
  chosen_spanish: en el trono
  alternatives_spanish:
  - sobre el trono
  - en tu trono
  - sobre tu trono
  lexicon: HALOT
  rationale: La preposición y el sustantivo forman la escena de entronización judicial. 'En el trono' es idiomático y suficientemente preciso para el contexto.
- source_word: שׁוֹפֵט
  english_pob_choice: judging
  chosen_spanish: juzgando
  alternatives_spanish:
  - como juez
  - que juzga
  lexicon: HALOT
  rationale: El participio describe la acción continua del entronizado. 'Juzgando' mantiene la fuerza verbal y el paralelismo con la frase anterior.
- source_word: צֶדֶק
  english_pob_choice: righteously
  chosen_spanish: con rectitud
  alternatives_spanish:
  - justamente
  - con justicia
  lexicon: HALOT
  rationale: El sustantivo funciona adverbialmente. 'Con rectitud' conserva la relación con 'justicia' sin forzar un adverbio moderno menos transparente para esta imagen.
theological_decisions:
- issue: Imagen judicial divina y vindicación del salmista
  english_pob_reading: The verse presents God as enthroned judge who vindicates the psalmist's legal right and cause.
  chosen_spanish_reading: El versículo presenta a Dios como juez entronizado que vindica la justicia y la causa del salmista.
  alternative_spanish_readings:
  - Dios simplemente ha actuado a favor del salmista
  - Dios ha resuelto su caso
  rationale: Los términos משפט y דִין, junto con 'trono' y 'juzgando', exigen conservar el marco forense. La traducción evita suavizarlo hacia una ayuda general y mantiene la vindicación legal.
  doctrine_reference: Salmos 9:5; traducción POB §§1, 3, 6
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no hubo cambios necesarios. Se conserva el paralelismo legal de los dos sustantivos hebreos y la imagen de entronización judicial sin ampliar el sentido más allá del texto.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' implícito por el sujeto de la segunda cláusula, siguiendo el hebreo y la economía poética del verso.
  - '''Justicia'' y ''causa'' distinguen las dos piezas del par legal sin colapsarlas en un solo término.'
  - '''Con rectitud'' se eligió para reflejar el adverbial hebreo sin imponer un tono litúrgico arcaizante.'
