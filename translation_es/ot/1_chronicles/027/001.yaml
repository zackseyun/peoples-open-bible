translation:
  language: es
  text: 'Ahora los hijos de Israel, según su número —los jefes de las casas paternas[a], y los comandantes de miles y de cientos, y sus oficiales que servían al rey en todo asunto de las divisiones que entraban y salían mes tras mes durante todos los meses del año—: cada división era de veinticuatro mil.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «jefes de las casas paternas», un término administrativo basado en la estructura de parentesco del clan.'
    reason: cultural_note
lexical_decisions:
- source_word: וּבְנֵי יִשְׂרָאֵל
  english_pob_choice: Now the sons of Israel
  chosen_spanish: Ahora los hijos de Israel
  alternatives_spanish:
  - Los israelitas
  - Y los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión literal בני ישראל con una formulación española natural. 'Hijos' mantiene la correspondencia formal; 'Ahora' suaviza la partícula conjuntiva inicial en un nuevo encabezado seccional.
- source_word: לְמִסְפָּרָם
  english_pob_choice: according to their number
  chosen_spanish: según su número
  alternatives_spanish:
  - de acuerdo con su número
  - por su número
  lexicon: HALOT
  rationale: La preposición expresa ordenamiento según un censo o conteo; 'según su número' es idiomático y fiel al sentido administrativo.
- source_word: רָאשֵׁי הָאָבוֹת
  english_pob_choice: the heads of fathers’ houses
  chosen_spanish: los jefes de las casas paternas
  alternatives_spanish:
  - los cabezas de las casas paternas
  - los jefes de los clanes paternos
  lexicon: HALOT
  rationale: '''Casas paternas'' conserva la estructura social hebrea y evita borrar el matiz técnico de la expresión. ''Jefes'' transmite liderazgo administrativo.'
- source_word: וְשָׂרֵי הָאֲלָפִים וְהַמֵּאוֹת
  english_pob_choice: the commanders of thousands and of hundreds
  chosen_spanish: los comandantes de millares y de centenas
  alternatives_spanish:
  - los capitanes de millares y centenas
  - los jefes de millares y centenas
  lexicon: HALOT
  rationale: En contexto militar-administrativo, 'comandantes' es preciso y claro. 'Millares' y 'centenas' preservan la estructura numérica del hebreo.
- source_word: וְשֹׁטְרֵיהֶם
  english_pob_choice: their officers
  chosen_spanish: sus oficiales
  alternatives_spanish:
  - sus administradores
  - sus inspectores
  lexicon: HALOT
  rationale: שטרים puede abarcar oficiales/administradores. 'Oficiales' es conciso y adecuado al contexto de servicio organizado al rey.
- source_word: הַמְשָׁרְתִים אֶת הַמֶּלֶךְ
  english_pob_choice: who served the king
  chosen_spanish: que servían al rey
  alternatives_spanish:
  - que atendían al rey
  - que ministraban al rey
  lexicon: HALOT
  rationale: El participio expresa servicio continuo. 'Servían al rey' es natural en español y suficientemente amplio para el servicio real administrativo y militar.
- source_word: לְכֹל דְּבַר הַמַּחְלְקוֹת
  english_pob_choice: in every matter of the divisions
  chosen_spanish: en todo asunto de las divisiones
  alternatives_spanish:
  - en cada asunto de las divisiones
  - para todo asunto de las divisiones
  lexicon: HALOT
  rationale: דבר aquí significa asunto, materia o negocio. 'Todo asunto' reproduce el alcance comprehensivo del texto sin expandirlo innecesariamente.
- source_word: הַבָּאָה וְהַיֹּצֵאת
  english_pob_choice: that came in and went out
  chosen_spanish: que entraban y salían
  alternatives_spanish:
  - que venían y salían
  - que entraban y partían
  lexicon: HALOT
  rationale: La pareja verbal describe la rotación de turnos. 'Entraban y salían' es una equivalencia natural en español que conserva el movimiento concreto.
- source_word: חֹדֶשׁ בְּחֹדֶשׁ
  english_pob_choice: month by month
  chosen_spanish: mes tras mes
  alternatives_spanish:
  - mes a mes
  - de mes en mes
  lexicon: HALOT
  rationale: El hebreo usa un distributivo idiomático; 'mes tras mes' es la forma española más fluida y equivalente.
- source_word: לְכֹל חָדְשֵׁי הַשָּׁנָה
  english_pob_choice: throughout all the months of the year
  chosen_spanish: durante todos los meses del año
  alternatives_spanish:
  - a lo largo de todos los meses del año
  - por todos los meses del año
  lexicon: HALOT
  rationale: '''Durante'' expresa bien la duración cíclica anual de las rotaciones. Mantiene el sentido de totalidad temporal del hebreo.'
- source_word: הַמַּחֲלֹקֶת הָאַחַת
  english_pob_choice: each division
  chosen_spanish: cada división
  alternatives_spanish:
  - la división única
  - una división
  lexicon: HALOT
  rationale: Aunque literalmente es 'la una división', el sentido distributivo en contexto es 'cada división'. Esta equivalencia evita una literalidad opaca en español.
- source_word: עֶשְׂרִים וְאַרְבָּעָה אָלֶף
  english_pob_choice: twenty-four thousand
  chosen_spanish: veinticuatro mil
  alternatives_spanish:
  - '24.000'
  - veinticuatro mil hombres
  lexicon: HALOT
  rationale: Número cardinal directo; 'mil' preserva la cifra total sin añadir 'hombres', que no está en el hebreo.
translation_notes:
  revision_awareness: El texto español sigue de cerca el arreglo sintáctico del hebreo y el POB inglés auditado. Se evitó la sustitución por 'israelitas' para conservar la forma literal 'hijos de Israel', y se resolvió el distributivo final con 'cada división' como en la revisión inglesa confirmada.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se usa 'hijos de Israel' de manera literal y no la alternativa colectiva 'israelitas', siguiendo la decisión auditada.
  - Se conservan los términos administrativos 'jefes', 'comandantes' y 'oficiales' sin domesticar a vocabulario eclesiástico.
  - La nota [a] está anclada explícitamente en 'casas paternas' para evitar marcadores huérfanos.
