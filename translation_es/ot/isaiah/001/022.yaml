translation:
  language: es
  text: Tu plata se ha vuelto escoria; tu vino está diluido con agua.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu vino está mezclado con agua». El término hebreo puede referirse más generalmente a una bebida embriagante, aunque aquí el contexto favorece «vino».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּסְפֵּךְ
  english_pob_choice: your silver
  chosen_spanish: tu plata
  alternatives_spanish:
  - tu dinero
  - tu plata
  lexicon: HALOT
  rationale: כֶּסֶף denota literalmente plata, y en la imagen profética el metal conserva mejor el contraste con la escoria. En español, 'plata' es natural y fiel al paralelo metálico; 'dinero' debilitaría la metáfora.
- source_word: הָיָה
  english_pob_choice: has become
  chosen_spanish: se ha vuelto
  alternatives_spanish:
  - ha llegado a ser
  - se convirtió
  lexicon: HALOT
  rationale: El perfecto expresa un estado resultante. 'Se ha vuelto' comunica en español una condición ya producida, sin perder la fuerza de transformación del hebreo.
- source_word: לְסִיגִים
  english_pob_choice: dross
  chosen_spanish: escoria
  alternatives_spanish:
  - dross
  - impurezas
  - residuos
  lexicon: HALOT
  rationale: סִיגִים es el residuo impuro separado al refinar metal. 'Escoria' conserva el campo metalúrgico y la imagen profética de corrupción mejor que un término más general como 'impurezas'.
- source_word: סָבְאֵךְ
  english_pob_choice: your wine
  chosen_spanish: tu vino
  alternatives_spanish:
  - tu bebida
  - tu licor
  - tu vino
  lexicon: HALOT
  rationale: Aunque el término hebreo puede abarcar bebida embriagante en general, el audit trail inglés opta por 'wine' por precisión lexical. En español, 'vino' transmite bien la imagen concreta y mantiene el paralelismo con el metal sin sobre-ampliar el alcance.
- source_word: מָהוּל
  english_pob_choice: diluted
  chosen_spanish: mezclado
  alternatives_spanish:
  - diluido
  - adulterado
  - mezclado
  lexicon: HALOT
  rationale: La forma pasiva indica algo mezclado con agua; 'mezclado' reproduce directamente el hecho verbal. 'Diluido' sería correcto, pero 'mezclado' encaja mejor con el complemento explícito 'con agua'.
- source_word: בַּמָּיִם
  english_pob_choice: with water
  chosen_spanish: con agua
  alternatives_spanish:
  - en agua
  - por agua
  lexicon: HALOT
  rationale: 'La preposición funciona de modo instrumental/associativo: la bebida está adulterada mediante agua. ''Con agua'' es la equivalencia española más natural y precisa.'
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió 'drink' por 'wine' para reflejar con mayor precisión סָבְאֵךְ; la presente redacción sigue esa revisión y, al mismo tiempo, conserva la metáfora metalúrgica de 'escoria' para לְסִיגִים. No se han detectado tensiones doctrinales en este versículo.
  spanish_consistency_notes:
  - Se preservó el paralelismo poético con dos cláusulas breves coordinadas por punto y coma.
  - Se evitó 'SEÑOR' u otras sustituciones no presentes en el texto; no aplica nomenclatura divina aquí.
  - '''Plata'' y ''escoria'' mantienen el contraste material del hebreo.'
  - La nota conserva la ambigüedad lexical de סָבְאֵךְ sin borrar la elección principal de 'vino'.
