translation:
  language: es
  text: Y si un hombre causa una lesión a su semejante[a], tal como hizo, así se le hará a él.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «da un defecto/lesión a su compañero».
    reason: lexical_alternative
  - marker: b
    text: O «vecino» o «compañero» para «semejante».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ
  english_pob_choice: And if a man
  chosen_spanish: Y si un hombre
  alternatives_spanish:
  - Y un hombre
  - Si un hombre
  lexicon: HALOT
  rationale: אִישׁ es singular masculino y en esta formulación legal introduce un caso. En español, «si un hombre» expresa con naturalidad la construcción condicional y conserva el valor legal del hebreo.
- source_word: כִּי
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  lexicon: HALOT
  rationale: En la casuística legal, כִּי introduce una situación hipotética. «Si» preserva mejor la fuerza condicional que «cuando».
- source_word: יִתֵּן מוּם
  english_pob_choice: inflicts an injury
  chosen_spanish: hiere
  alternatives_spanish:
  - causa una lesión
  - da un defecto
  - deja una marca
  lexicon: HALOT
  rationale: מוּם literalmente es «defecto/defecto físico, mancha, lesión». En este contexto de ley sobre daño corporal, «hiere» comunica de forma natural el acto lesivo sin perder el sentido de daño físico.
- source_word: מוּם
  english_pob_choice: injury
  chosen_spanish: lesión implícita en «hiere»
  alternatives_spanish:
  - defecto
  - mancha
  - injuria
  lexicon: HALOT
  rationale: El sustantivo expresa una alteración o daño físico. En español, el verbo «hiere» permite conservar ese contenido sin forzar una repetición pesada; la nota textual mantiene la alternativa literal.
- source_word: בַּעֲמִיתוֹ
  english_pob_choice: on his fellow
  chosen_spanish: a su prójimo[a]
  alternatives_spanish:
  - a su semejante
  - a su compañero
  - a su vecino
  lexicon: HALOT
  rationale: עָמִית designa a un asociado, compañero o miembro del mismo grupo comunitario. «Prójimo» comunica bien esa relación cercana en español, pero en la nota se preserva la alternativa más literal «fellow/compañero» y la posibilidad de «vecino».
- source_word: כַּאֲשֶׁר עָשָׂה
  english_pob_choice: just as he has done
  chosen_spanish: tal como hizo
  alternatives_spanish:
  - como hizo
  - según lo que hizo
  lexicon: HALOT
  rationale: La cláusula comparativa marca correspondencia estricta entre acto y retribución. «Tal como hizo» mantiene la equivalencia sin añadir matices interpretativos.
- source_word: כֵּן יֵעָשֶׂה לּוֹ
  english_pob_choice: so it shall be done to him
  chosen_spanish: así se le hará a él
  alternatives_spanish:
  - de este modo se le hará
  - así le será hecho
  lexicon: HALOT
  rationale: El niphal expresa una acción pasiva/legal impersonal. «Se le hará» conserva el sentido judicial y evita una formulación demasiado arcaica; «a él» explicita el complemento pronominal del hebreo.
theological_decisions:
- issue: Principio de retribución proporcional en ley civil
  english_pob_reading: Rendered the verse as a judicial principle of proportionate recompense without expanding it into personal vengeance.
  chosen_spanish_reading: La cláusula se vierte como una norma judicial de correspondencia proporcional, no como permiso para venganza privada.
  alternative_spanish_readings:
  - una orden de represalia personal
  - una descripción meramente moral sin fuerza legal
  rationale: El hebreo formula una disposición casuística legal. La traducción española mantiene el tono jurídico y la reciprocidad medida implícita en el texto, sin convertirla en exhortación a la venganza.
  doctrine_reference: Lex talionis; justicia retributiva proporcional en la legislación mosaica
translation_notes:
  revision_awareness: 'El borrador sigue la lectura revisada del inglés POB, que ya optó por una equivalencia óptima: lenguaje legal natural en inglés sin perder la referencia concreta a un daño físico. En español se conserva esa decisión, pero con un verbo más directo («hiere») para evitar sobrecargar la frase y respetar la brevedad casuística del hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el nombre divino aparezca; en este versículo no aplica.
  - Se preserva el registro jurídico breve del hebreo, evitando ampliar la norma con explicaciones interpretativas en el cuerpo principal.
  - «Prójimo» se usa aquí por claridad natural en español, mientras la nota preserva la alternativa más literal del campo semántico de עָמִית.
