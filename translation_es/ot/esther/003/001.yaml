revisions:
- from: Después[a] de estas cosas, el rey Asuero promovió a Amán, hijo de Hamedata, el agagueo; lo exaltó[b], y puso su trono por encima de todos los oficiales que estaban con él.
  to: Después[a] de estas cosas, el rey Asuero promovió a Amán, hijo de Hamedata, el agagueo[b], lo exaltó y puso su trono[c] por encima de todos los oficiales que estaban con él.
  rationale: La revisión conserva el sentido del hebreo y del POB inglés, pero restaura la nota cultural omitida sobre «el agagueo», mueve la nota de alternativa léxica al término «trono», donde realmente corresponde, y suaviza la puntuación para un español más natural.
