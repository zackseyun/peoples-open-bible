translation:
  language: es
  text: que tus ojos estén abiertos a la súplica de tu siervo y a la súplica de tu pueblo Israel[a], para escucharlos[b] cada vez que clamen a ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «plegaria». El término hebreo denota una petición fervorosa de favor o misericordia.
    reason: lexical_alternative
  - marker: b
    text: O «oírlos». El verbo hebreo puede significar «oír», «escuchar» o «prestar atención», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינֶיךָ פְתֻחוֹת
  english_pob_choice: your eyes may be open
  chosen_spanish: tus ojos estén abiertos
  alternatives_spanish:
  - tus ojos puedan estar abiertos
  - tus ojos abiertos
  lexicon: HALOT
  rationale: Conserva la imagen antropomórfica de atención divina sin volverla rígida ni explicarla en exceso. En español, el subjuntivo con «estén abiertos» expresa adecuadamente el valor de petición/purpose.
- source_word: תְּחִנַּת
  english_pob_choice: plea
  chosen_spanish: súplica
  alternatives_spanish:
  - plea
  - petición
  - ruego
  lexicon: HALOT
  rationale: «תְּחִנָּה» denota una petición intensa de favor o misericordia. «Súplica» conserva el registro reverente y la carga de urgencia mejor que «plea» en español.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: Aquí el hablante se presenta en una oración real ante Dios; en español eclesial, «siervo» comunica la relación subordinada con naturalidad. «Esclavo» preserva fuerza léxica, pero suena menos idiomático en este registro oracional.
- source_word: עַמְּךָ יִשְׂרָאֵל
  english_pob_choice: your people Israel
  chosen_spanish: tu pueblo Israel
  alternatives_spanish:
  - tu pueblo, Israel
  - tu pueblo, el Israel
  lexicon: HALOT
  rationale: Refleja la construcción posesiva con nombre propio sin añadir una pausa que no exige el hebreo. «Israel» funciona como apposición identificadora del pueblo de Dios.
- source_word: לִשְׁמֹעַ אֲלֵיהֶם
  english_pob_choice: to listen to them
  chosen_spanish: para escucharlos
  alternatives_spanish:
  - para oírlos
  - para prestarles oído
  lexicon: HALOT
  rationale: «שׁמע» puede significar oír, escuchar o atender. En este contexto de oración, «escucharlos» mantiene la idea de atención activa sin sonar demasiado técnica.
- source_word: בְּכֹל קָרְאָם אֵלֶיךָ
  english_pob_choice: whenever they call to you
  chosen_spanish: en todo cuanto clamen a ti
  alternatives_spanish:
  - cada vez que te clamen
  - cuando clamen a ti en todo caso
  lexicon: HALOT
  rationale: El valor temporal de בְּ + כֹּל se expresa de forma natural con «en todo cuanto»; «clamen» conserva el matiz de invocación intensa de קרא en contexto de oración.
theological_decisions:
- issue: Lenguaje antropomórfico de los ojos de Yahvé
  english_pob_reading: Retain the anthropomorphic metaphor in the main text
  chosen_spanish_reading: Mantener la metáfora de los ojos abiertos de Yahvé en el texto principal
  alternative_spanish_readings:
  - parafrasear como «que atiendas»
  - explicitar «que estés atento»
  rationale: El hebreo usa imaginería corporal para expresar atención y disposición a oír. La traducción la conserva para no borrar la textura literaria y teológica del pasaje.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés coinciden en un alto grado; no se registran revisiones sustantivas en la última pasada. Esta versión mantiene la metáfora antropomórfica, la fuerza de תְּחִנָּה y el valor contextual de שׁמע sin añadir explicaciones interpretativas.
  spanish_consistency_notes:
  - Se usa «Yahvé» en contextos donde el hebreo subyacente refiere al nombre divino; aquí el versículo no contiene el Tetragrámaton de forma explícita, pero la petición está dirigida a Dios en continuidad con el contexto inmediato.
  - Se evita «SEÑOR» como sustituto automático del nombre divino.
  - «Súplica» y «escucharlos» mantienen un registro bíblico digno y moderno, sin caer en un calco mecánico del inglés.
