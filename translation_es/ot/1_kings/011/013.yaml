translation:
  language: es
  text: Pero no arrancaré todo el reino; daré una tribu a tu hijo[a], por amor de David, mi siervo, y por amor de Jerusalén, que he escogido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Solo que no arrancaré todo el reino».'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  english_pob_choice: Yet
  chosen_spanish: Pero no
  alternatives_spanish:
  - Solo
  - Sin embargo
  - No obstante
  lexicon: HALOT
  rationale: La partícula introduce restricción y contraste con el juicio previo. En español, «pero no» comunica bien la limitación adversativa sin sonar forzado; «solo» podía leerse como simple exclusión, y «sin embargo/no obstante» resultan más pesados aquí.
- source_word: כָּל הַמַּמְלָכָה
  english_pob_choice: the whole kingdom
  chosen_spanish: todo el reino
  alternatives_spanish:
  - el reino entero
  - todo el reino
  lexicon: HALOT
  rationale: «Reino» expresa de modo natural el ámbito político-royal del hebreo כאן. «Todo el reino» conserva la totalidad de כָּל sin necesidad de perífrasis adicionales.
- source_word: אֶקְרָע
  english_pob_choice: I will tear away
  chosen_spanish: arrancaré
  alternatives_spanish:
  - romperé
  - rasgaré
  - arrancaré de
  lexicon: HALOT
  rationale: El verbo hebreo es vívido y metafórico; en este contexto político, «arrancaré» comunica la remoción de una parte del reino de manera idiomática en español. Se evita un calco demasiado literal que sonaría extraño.
- source_word: שֵׁבֶט אֶחָד
  english_pob_choice: one tribe
  chosen_spanish: una tribu
  alternatives_spanish:
  - una sola tribu
  - un solo tribu
  - un bastón/tribu
  lexicon: HALOT
  rationale: Aquí שֵׁבֶט designa una unidad tribal, no un bastón. «Una tribu» es la equivalencia política natural en español y conserva el sentido del reparto del reino.
- source_word: אֶתֵּן לִבְנֶךָ
  english_pob_choice: I will give to your son
  chosen_spanish: daré a tu hijo
  alternatives_spanish:
  - daré a tu hijo
  - lo daré a tu hijo
  - concederé a tu hijo
  lexicon: HALOT
  rationale: El hebreo expresa un don futuro directo. Se antepone el objeto verbal español de forma natural («daré a tu hijo») y se mantiene la relación posesiva con el rey destinatario.
- source_word: לְמַעַן דָּוִד עַבְדִּי
  english_pob_choice: for the sake of David my servant
  chosen_spanish: por amor de David, mi esclavo
  alternatives_spanish:
  - por causa de David, mi esclavo
  - por consideración a David, mi esclavo
  - a causa de David, mi siervo
  lexicon: HALOT
  rationale: El motivo es relacional y de consideración. Se conserva el valor causal/motivacional con «por amor de». Además, se mantiene «esclavo» porque el POB inglés documenta la fuerza léxica de δοῦλος/עֶבֶד como subordinación real; «siervo» suavizaría esa tensión. El posesivo en primera persona se mantiene como en el hebreo.
- source_word: יְרוּשָׁלַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalén
  lexicon: HALOT
  rationale: Topónimo estándar en español. No requiere adaptación adicional.
- source_word: אֲשֶׁר בָּחָרְתִּי
  english_pob_choice: which I have chosen
  chosen_spanish: que he escogido
  alternatives_spanish:
  - que he elegido
  - que escogí
  lexicon: HALOT
  rationale: El perfecto hebreo mantiene vigencia respecto a la elección divina. «He escogido» conserva esa relevancia presente y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: Razón de la preservación parcial del reino
  english_pob_reading: The verse grounds the partial preservation of the kingdom in God's regard for David and Jerusalem, without specifying a broader doctrinal mechanism beyond covenantal election and divine choice.
  chosen_spanish_reading: La preservación parcial del reino se fundamenta en la consideración divina hacia David y Jerusalén, sin explicar un mecanismo doctrinal más amplio que la elección y la memoria pactal de Dios.
  alternative_spanish_readings:
  - La preservación se debe solo al pacto davídico
  - La preservación se debe principalmente al templo o a la ciudad
  rationale: 'El hebreo presenta dos motivos paralelos: David, el siervo de Dios, y Jerusalén, la ciudad escogida. La traducción debe mantener ambos sin fusionarlos ni resolver la tensión entre pacto davídico y elección de Jerusalén.'
  doctrine_reference: Preservar la tensión teológica; no armonizar de más.
- issue: Término para עֶבֶד
  english_pob_reading: my servant
  chosen_spanish_reading: mi esclavo
  alternative_spanish_readings:
  - mi siervo
  - mi servidor
  rationale: Se conserva la dureza lexical que el proyecto POB documenta cuando el término apunta a subordinación real y lealtad total. En este contexto, suavizar a «siervo» podría borrar la fuerza de la relación entre Yahvé y David.
  doctrine_reference: Lexical force of עֶבֶד / δοῦλος.
translation_notes:
  revision_awareness: 'La revisión auditada coincide en que no se requieren cambios al sentido base; la versión española mantiene la restricción inicial, la remoción parcial del reino, la concesión de una tribu al hijo de Salomón y las dos motivaciones paralelas: David y Jerusalén escogida.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto, pero este versículo no contiene el nombre divino explícito en el texto base; por eso no aparece aquí.
  - Se conserva «mi esclavo» por coherencia con la decisión léxica del proyecto cuando el hebreo עבד tiene fuerza de servidumbre y subordinación.
  - «Daré» y «arrancaré» mantienen el futuro profético con naturalidad en español.
  - La nota al pie refleja la alternativa léxica documentada en el POB inglés sin duplicar el sentido principal.
