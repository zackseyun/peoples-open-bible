revisions:
- from: ¡Callen delante de Yahvé, el Señor Dios[a], porque el día de Yahvé está cerca; porque Yahvé ha preparado un sacrificio; ha consagrado a sus invitados[b].
  to: ¡Guarden silencio ante el Señor Yahvé, porque el día de Yahvé está cerca! Porque Yahvé ha preparado un sacrificio; ha consagrado a sus invitados[a].
  rationale: Se corrige el título divino para reflejar explícitamente יְהוָה como «Yahvé», en conformidad con la fuente y la terminología del proyecto. También se mejora la naturalidad del mandato inicial en español. Se conserva la ambigüedad deliberada de «sus invitados» y su nota léxica.
  reviewer_model: gpt-5.4
