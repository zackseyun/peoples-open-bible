translation:
  language: es
  text: 'Ve y proclama a oídos de Jerusalén[a], diciendo: «Así dice Yahvé: Recuerdo para ti[b] el amor fiel[c] de tu juventud, el amor de tu desposorio, cuando ibas tras mí en el desierto, en una tierra no sembrada»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «en los oídos de Jerusalén». La imagen hebrea conserva la idea de proclamación pública dirigida a la ciudad/pueblo.
    reason: lexical_alternative
  - marker: b
    text: O «me acuerdo de ti». El hebreo incluye un dativo («para ti / respecto de ti») que en español puede expresarse de distintas maneras.
    reason: lexical_alternative
  - marker: c
    text: O «amor constante». El término hebreo חֶסֶד combina afecto, lealtad y fidelidad de pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָלֹךְ וְקָרָאתָ
  english_pob_choice: Go and proclaim
  chosen_spanish: Anda y proclama
  alternatives_spanish:
  - Ve y proclama
  - Anda y clama
  lexicon: HALOT
  rationale: El infinitivo absoluto con el verbo finito intensifica la orden. «Anda y proclama» conserva el movimiento y el acto público de anuncio profético sin sonar excesivamente solemne ni perder claridad.
- source_word: בְּאָזְנֵי יְרוּשָׁלִַם
  english_pob_choice: in the hearing of Jerusalem
  chosen_spanish: en los oídos de Jerusalén
  alternatives_spanish:
  - ante Jerusalén
  - a oídos de Jerusalén
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente «en los oídos de Jerusalén». Se conserva la metáfora auditiva, que en español suena natural en un mandato de proclamación profética.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino en forma transliterada según el criterio del proyecto en español. «Yahvé» es la forma más asentada en español bíblico académico y evita sustituir el nombre por un título.
- source_word: זָכַרְתִּי לָךְ
  english_pob_choice: I remember for you
  chosen_spanish: Yo me acuerdo de ti
  alternatives_spanish:
  - Yo recuerdo para ti
  - Yo me acuerdo para ti
  lexicon: HALOT
  rationale: El hebreo expresa recuerdo dirigido a la destinataria; en español «me acuerdo de ti» comunica con naturalidad ese foco relacional. Se evita un «para ti» forzado, aunque el pronombre dativo queda reflejado implícitamente en el contexto.
- source_word: חֶסֶד
  english_pob_choice: faithful love
  chosen_spanish: amor fiel
  alternatives_spanish:
  - amor leal
  - amor constante
  - misericordia
  lexicon: HALOT
  rationale: חֶסֶד abarca lealtad de pacto y afecto. «Amor fiel» conserva esa carga relacional y de constancia; se preserva la tensión entre cariño y fidelidad covenantal sin reducirlo a «misericordia».
- source_word: נְעוּרַיִךְ
  english_pob_choice: your youth
  chosen_spanish: tu juventud
  alternatives_spanish:
  - tus años mozos
  - tu temprana juventud
  lexicon: HALOT
  rationale: Es una referencia temporal directa a la etapa inicial de la relación de Israel con Yahvé. «Tu juventud» es transparente y fiel.
- source_word: אַהֲבַת כְּלוּלֹתָיִךְ
  english_pob_choice: the love of your betrothal
  chosen_spanish: el amor de tu desposorio
  alternatives_spanish:
  - el amor de tus desposorios
  - el amor de tus días de novia
  - el amor de tus bodas
  lexicon: HALOT
  rationale: Se preserva la metáfora nupcial sin decidir más de lo que el hebreo obliga. «Desposorio» mantiene el campo semántico de compromiso matrimonial y permite la tensión entre desposorio, boda y etapa bridal.
- source_word: לֶכְתֵּךְ אַחֲרַי
  english_pob_choice: when you went after me
  chosen_spanish: cuando andabas en pos de mí
  alternatives_spanish:
  - cuando me seguías
  - cuando ibas detrás de mí
  lexicon: HALOT
  rationale: «Andar en pos de» reproduce el giro bíblico tradicional y el sentido de seguimiento disciplinado, sin borrar la imagen de peregrinación obediente.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en la estepa
  - en el yermo
  lexicon: HALOT
  rationale: Aquí «desierto» es el equivalente más natural en español para el contexto del éxodo. Aunque «wilderness» puede ser más amplio, el referente bíblico en español se entiende bien con esta forma.
- source_word: בְאֶרֶץ לֹא זְרוּעָה
  english_pob_choice: in a land not sown
  chosen_spanish: en tierra no sembrada
  alternatives_spanish:
  - en una tierra no sembrada
  - en tierra sin sembrar
  lexicon: HALOT
  rationale: La construcción mantiene la imagen agrícola de una tierra no cultivada/sembrada. «Tierra no sembrada» es breve, fiel y fluida en español.
theological_decisions:
- issue: Metáfora nupcial de la relación entre Yahvé e Israel
  english_pob_reading: Retain nuptial language ('the love of your betrothal') without over-interpreting whether this refers strictly to betrothal, wedding, or early marriage.
  chosen_spanish_reading: Conservar la metáfora nupcial con «el amor de tu desposorio», sin precisar si se trata de desposorio, boda o etapa nupcial temprana.
  alternative_spanish_readings:
  - el amor de tus días de novia
  - el amor de tus bodas
  rationale: El hebreo presenta una imagen de pacto-amor entre Yahvé e Israel. La traducción deja abierta la tensión histórica y metafórica en vez de resolverla a una sola fase matrimonial.
  doctrine_reference: Preservar la tensión teológica y metafórica del texto.
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios y que el acuerdo con la auditoría inglesa es alto. Se mantuvo la decisión de preservar el nombre divino como transliteración, el valor de חֶסֶד como amor fiel, y la metáfora nupcial sin estrecharla.
  spanish_consistency_notes:
  - Se conserva «Yahvé» de acuerdo con la terminología del proyecto en español.
  - Se mantiene «amor fiel» para חֶסֶד, coherente con el audit trail inglés y con el tono de pacto del pasaje.
  - Se preserva la imaginería nupcial mediante «desposorio», evitando reemplazarla por vocabulario más eclesiástico o más interpretativo.
  - La fórmula profética se adapta a un español natural sin perder el énfasis del hebreo.
