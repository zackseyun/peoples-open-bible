  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὅσαι γὰρ ἐπαγγελίαι θεοῦ, ἐν αὐτῷ τὸ Ναί· ⸀διὸ καὶ ⸂δι’ αὐτοῦ⸃ τὸ Ἀμὴν τῷ θεῷ πρὸς δόξαν δι’ ἡμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/001/020.yaml
  text: For however many promises of God there are, in him is the Yes. Therefore also through him is the Amen to God for glory through us.
  footnotes:
  - marker: a
    text: Or, more explicitly, 'in him they have their Yes.'
    reason: alternative_reading
  - marker: b
    text: '''Amen'' is a transliterated affirmation meaning something like ''truly'' or ''so be it.'''
    reason: cultural_note
  - marker: c
    text: Or 'to the glory of God through us,' if πρὸς δόξαν is taken more explicitly with God as the goal of the praise.
    reason: alternative_reading
translation:
  language: ko
  text: 하나님의 약속이 얼마나 많든지, 그분 안에서 「예」가 됩니다. 그러므로 그분으로 말미암아 우리도 「아멘」으로 하나님께 영광을 돌립니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπαγγελίαι
  english_pob_choice: promises
  chosen_korean: 약속
  alternatives_korean:
