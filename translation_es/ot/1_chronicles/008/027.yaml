lexical_decisions:
- source_word: יַעֲרֶשְׁיָה
  english_pob_choice: Jareshiah
  chosen_spanish: Jaresías
  alternatives_spanish:
  - Jareshías
  - Jareseías
  lexicon: Transliteración de nombre propio
  rationale: Se conserva el nombre propio con una transliteración española natural. Se adapta la terminación para que sea legible en español, manteniendo la cercanía auditiva con la forma hebrea y con la convención inglesa documentada.
- source_word: אֵלִיָּה
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Eliyah
  - Eliías
  lexicon: Transliteración de nombre propio
  rationale: Aunque la forma inglesa auditada usa 'Elijah', en español la correspondencia establecida y más inteligible es 'Elías'. No se traduce ni se parafrasea el nombre; se usa la forma española convencional del mismo antropónimo.
- source_word: זִכְרִי
  english_pob_choice: Zichri
  chosen_spanish: Zicri
  alternatives_spanish:
  - Zichri
  lexicon: Transliteración de nombre propio
  rationale: Se prefiere una forma española transparente y breve. 'Zicri' mantiene el valor fonético básico del nombre hebreo y evita una grafía inglesa innecesaria en el texto español.
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - descendientes de
  - hijos/descendientes de
  lexicon: HALOT
  rationale: En este pasaje genealógico hay tres nombres masculinos inmediatos, por lo que 'hijos de' refleja de manera directa el valor constructo de בְּנֵי. Se conserva la relación genealógica específica sin ampliar innecesariamente a 'descendientes' en el texto principal.
- source_word: יְרֹחָם
  english_pob_choice: Jeroham
  chosen_spanish: Jeroham
  alternatives_spanish:
  - Jeroam
  lexicon: Transliteración de nombre propio
  rationale: Se conserva el nombre propio con la forma española ya reconocible 'Jeroham', cercana a la convención inglesa auditada y apta para lectura pública.
