translation:
  language: es
  text: Así habló Moisés a los hijos de Israel, pero ellos no escucharon a Moisés por el desaliento[a] y la dura esclavitud[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «por estrechez de espíritu».
    reason: lexical_alternative
  - marker: b
    text: O «y el duro trabajo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - habló
  lexicon: HALOT
  rationale: El verbo piel דִּבֵּר aquí introduce discurso narrado; en español, «habló» comunica bien la acción de pronunciar un mensaje y mantiene un registro sobrio y natural.
- source_word: כֵּן
  english_pob_choice: thus
  chosen_spanish: así
  alternatives_spanish:
  - así
  - de este modo
  lexicon: HALOT
  rationale: כֵּן remite al contenido previo del mensaje; «así» reproduce esa referencia resumidora de forma idiomática en español y evita un calco innecesario.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Se conserva la forma formal del hebreo con «hijos de Israel», más transparente respecto al original que «israelitas», y equivalente al registro del POB inglés.
- source_word: שָׁמְעוּ אֶל
  english_pob_choice: did not listen to
  chosen_spanish: no escucharon a
  alternatives_spanish:
  - no escucharon a
  - no obedecieron a
  - no hicieron caso de
  lexicon: HALOT
  rationale: La construcción שמע אל suele expresar oír/atender con respuesta. «No escucharon a» es natural en español y permite conservar la relación personal con Moisés.
- source_word: מִקֹּצֶר רוּחַ
  english_pob_choice: because of discouragement
  chosen_spanish: a causa de la angustia de espíritu
  alternatives_spanish:
  - a causa de la angustia de espíritu
  - por el desaliento
  - por la falta de aliento
  lexicon: HALOT
  rationale: La expresión literal es «de la brevedad/estrechez de espíritu», un modismo de abatimiento interior. «Angustia de espíritu» conserva la tensión del hebreo sin reducirla a un único matiz psicológico; se acompaña de una nota para señalar la alternativa «desaliento».
- source_word: וּמֵעֲבֹדָה קָשָׁה
  english_pob_choice: harsh slavery
  chosen_spanish: de la dura esclavitud
  alternatives_spanish:
  - de la dura esclavitud
  - y del duro trabajo
  - y de la servidumbre dura
  lexicon: HALOT
  rationale: עֲבֹדָה puede ser «trabajo/labor/servicio», pero en este contexto la opresión de Egipto es claramente servil. «Dura esclavitud» preserva esa fuerza histórica y moral sin imponer un giro más interpretativo que el inglés auditado.
theological_decisions:
- issue: 'Naturaleza de la causa del no escuchar: emocional/espiritual y opresiva'
  english_pob_reading: because of discouragement and harsh slavery
  chosen_spanish_reading: a causa de la angustia de espíritu y de la dura esclavitud
  alternative_spanish_readings:
  - por el desaliento y la dura esclavitud
  - por la angustia interior y el duro trabajo
  rationale: 'El texto vincula dos causas: una interior (קֹצֶר רוּחַ) y otra externa (עֲבֹדָה קָשָׁה). La versión española mantiene ambas sin diluir la tensión entre abatimiento interno y opresión concreta, y evita reemplazar la carga del segundo miembro por un mero «trabajo» menos fuerte.'
  doctrine_reference: Principio de primacía del texto fuente; mantenimiento de la fuerza semántica de los modismos hebreos
translation_notes:
  revision_awareness: 'Tomé en cuenta el pasaje revisado del POB inglés: se prefirió una correspondencia más cercana para כֵּן y una equivalencia más natural para קֹצֶר רוּחַ. La redacción española sigue esa dirección: «así» para כֵּן y una fórmula comprensible que conserva el peso idiomático de «קֹצֶר רוּחַ», sin caer en una paráfrasis libre. También mantuve la fuerza de עֲבֹדָה קָשָׁה como opresión esclava, coherente con la lectura auditada de «harsh slavery».'
  spanish_consistency_notes:
  - He usado «hijos de Israel» para armonizar con el hebreo formal y la práctica POB.
  - He evitado «SEÑOR» o equivalentes de sustitución porque aquí no aparece el nombre divino.
  - He preferido «escucharon a» para conservar el complemento personal de שׁמע אל.
  - La combinación «angustia de espíritu» + «dura esclavitud» busca mantener el paralelismo causal del original.
