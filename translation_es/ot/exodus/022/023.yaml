translation:
  language: es
  text: Entonces mi ira se encenderá, y los mataré a espada[a]; sus esposas quedarán viudas y sus hijos varones quedarán sin padre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por la espada'. El hebreo puede expresar el medio o el instrumento.
    reason: lexical_alternative
  - marker: b
    text: O 'huérfanos'; el hebreo denota más específicamente a quienes quedan sin padre.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחָרָה אַפִּי
  english_pob_choice: my anger will burn
  chosen_spanish: mi ira se encenderá
  alternatives_spanish:
  - mi enojo arderá
  - mi furor se encenderá
  - mi nariz se encenderá
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo antropomórfico de ira que se enciende. En español, 'mi ira se encenderá' conserva la imagen y comunica el sentido sin volverlo literal de manera extraña. 'Ira' mantiene el registro digno y bíblico; 'enojo' sería más llano.
- source_word: וְהָרַגְתִּי
  english_pob_choice: I will kill
  chosen_spanish: los mataré
  alternatives_spanish:
  - los mataré a ellos
  - los haré morir
  - los degollaré
  lexicon: HALOT
  rationale: הרג es el verbo común para matar. 'Los mataré' es el equivalente más natural y fiel en español; evita arcaísmo y no añade matiz que el hebreo no exige.
- source_word: בֶּחָרֶב
  english_pob_choice: with the sword
  chosen_spanish: a espada
  alternatives_spanish:
  - con la espada
  - por la espada
  - mediante la espada
  lexicon: HALOT
  rationale: La preposición hebrea indica instrumento o medio. 'A espada' es una construcción española natural y tradicional que preserva la concisión del hebreo. 'Con la espada' también sería posible, pero 'a espada' suena más idiomático en este contexto de juicio.
- source_word: נְשֵׁיכֶם אַלְמָנוֹת
  english_pob_choice: your wives will become widows
  chosen_spanish: sus esposas quedarán viudas
  alternatives_spanish:
  - sus mujeres quedarán viudas
  - vuestras esposas quedarán viudas
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'sus esposas' y el estado resultante es viudez. 'Quedarán viudas' expresa bien el resultado y mantiene el paralelismo con el juicio. Se eligió 'esposas' por claridad relacional; 'mujeres' sería demasiado amplio.
- source_word: וּבְנֵיכֶם יְתֹמִים
  english_pob_choice: your sons fatherless
  chosen_spanish: sus hijos quedarán sin padre
  alternatives_spanish:
  - sus hijos quedarán huérfanos
  - sus hijos serán huérfanos de padre
  - sus hijos quedarán huérfanos
  lexicon: HALOT
  rationale: El hebreo usa un término que en este contexto legal-social señala especialmente la condición de quedar sin padre. 'Sin padre' refleja con más precisión esa carga específica que 'huérfanos', que en español puede sonar más general.
theological_decisions:
- issue: Idiom of divine anger with anthropomorphic imagery
  english_pob_reading: Rendered the idiom as 'my anger will burn' rather than a literal body-part expression.
  chosen_spanish_reading: Se tradujo como 'mi ira se encenderá' para preservar el sentido del modismo sin literalizar 'mi nariz'.
  alternative_spanish_readings:
  - mi nariz se encenderá
  - mi furor se encenderá
  rationale: El hebreo emplea un antropomorfismo idiomático. En español, traducir literalmente 'nariz' oscurecería el significado; 'ira' comunica el juicio divino con fidelidad y naturalidad. No se suavizó la severidad del pasaje.
  doctrine_reference: Principios de primacía del original y de claridad receptiva; el texto mantiene el lenguaje de juicio divino sin reinterpretarlo.
- issue: Specificity of the filial term
  english_pob_reading: Retained 'your sons' in the main text.
  chosen_spanish_reading: Se mantuvo la especificidad de 'sus hijos' y se explicó la pérdida como quedar 'sin padre'.
  alternative_spanish_readings:
  - sus niños
  - sus descendientes
  - sus hijos quedarán huérfanos
  rationale: El hebreo se refiere específicamente a hijos varones, pero en español bíblico y natural 'hijos' puede abarcar el grupo filial. Para conservar la precisión del efecto social, se añadió 'sin padre', que reproduce la fuerza del término hebreo sin neutralizarlo por completo.
  doctrine_reference: Principio de precisión léxica y de conservación del impacto social del texto.
translation_notes:
  revision_awareness: 'El texto inglés final muestra alta concordancia y no presenta revisiones aplicadas; se mantuvo la lectura estable del pasaje, con atención a los dos puntos de ambigüedad principales: el modismo de la ira divina y la construcción instrumental de ''a espada''.'
  spanish_consistency_notes:
  - Se usó 'ira' de forma consistente para el modismo de אַף en contexto judicial.
  - Se evitó 'SEÑOR' o sustituciones devocionales, porque el pasaje no contiene el nombre divino explícito en esta forma.
  - Se preservó el tono de juicio sin intensificarlo más allá del hebreo.
  - '''Sus hijos'' mantiene la referencia filial del hebreo; la nota explicativa recupera la especificidad social de yātôm sin introducir ''huérfanos'' en el texto principal.'
