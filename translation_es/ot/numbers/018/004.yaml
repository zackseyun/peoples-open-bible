translation:
  language: es
  text: Se unirán a ti y guardarán el encargo[a] del tabernáculo de reunión para todo el servicio del tabernáculo; pero ninguna persona ajena[b] se acercará a ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘la custodia’. El hebreo מִשְׁמֶרֶת puede referirse a un encargo o deber asignado, y también a una guarda o custodia establecida.
    reason: lexical_alternative
  - marker: b
    text: O ‘ninguna persona no autorizada’. El hebreo זָר aquí se refiere a alguien fuera del papel permitido en el santuario, no necesariamente a un extranjero por etnia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִלְוּוּ
  english_pob_choice: shall join you
  chosen_spanish: se unirán a ti
  alternatives_spanish:
  - se anexarán a ti
  - se juntarán contigo
  lexicon: HALOT
  rationale: El nifal de לוה expresa incorporarse o unirse a alguien para apoyo o servicio. 'Se unirán a ti' conserva la relación de adhesión sin volverla mecánica.
- source_word: עָלֶיךָ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - contigo
  - hacia ti
  lexicon: HALOT
  rationale: Con נלוה, la preposición marca dirección de adhesión. 'A ti' es natural en español y mantiene la orientación hacia Aarón.
- source_word: וְשָׁמְרוּ
  english_pob_choice: keep
  chosen_spanish: guardarán
  alternatives_spanish:
  - observarán
  - cumplirán
  - guardarán y cumplirán
  lexicon: HALOT
  rationale: שׁמר con מִשְׁמֶרֶת en contexto sacerdotal implica custodiar o desempeñar una encomienda. 'Guardarán' preserva ese sentido de responsabilidad asignada.
- source_word: מִשְׁמֶרֶת
  english_pob_choice: the charge
  chosen_spanish: la responsabilidad
  alternatives_spanish:
  - el encargo
  - la custodia
  - la encomienda
  lexicon: HALOT
  rationale: En español, 'cargo' o 'encargo' pueden sonar ambiguos; 'responsabilidad' comunica bien la tarea confiada, aunque con algo menos de tecnicidad cultual. Se mantiene el matiz de deber asignado.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: el tabernáculo de reunión
  alternatives_spanish:
  - la tienda de reunión
  - la tienda del encuentro
  lexicon: HALOT
  rationale: En el uso bíblico castellano, 'tabernáculo de reunión' es el equivalente más reconocible y fiel para el santuario portátil. Conserva la designación técnica del lugar.
- source_word: לְכָל עֲבֹדַת הָאֹהֶל
  english_pob_choice: for all the service of the tent
  chosen_spanish: para todo el servicio del tabernáculo
  alternatives_spanish:
  - para todo el trabajo del tabernáculo
  - para todo el servicio de la tienda
  lexicon: HALOT
  rationale: עֲבֹדָה en contexto levítico es servicio cultual, no mera labor. 'Servicio' reproduce mejor ese valor que 'trabajo'.
- source_word: וְזָר
  english_pob_choice: no outsider
  chosen_spanish: ningún extraño
  alternatives_spanish:
  - ningún forastero
  - ninguna persona no autorizada
  - ningún extraño no autorizado
  lexicon: HALOT
  rationale: La raíz designa a alguien ajeno al rol permitido en el santuario. 'Extraño' evita reducirlo a etnia, aunque en español puede sugerir extrañeza general; por eso se deja apoyado por el contexto sacerdotal.
- source_word: יִקְרַב
  english_pob_choice: shall come near
  chosen_spanish: se acercará
  alternatives_spanish:
  - se aproximará
  - vendrá cerca
  lexicon: HALOT
  rationale: קרב en legislación santuario significa aproximarse a un ámbito sagrado. 'Se acercará' es claro y mantiene la advertencia de acceso restringido.
- source_word: אֲלֵיכֶם
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - a vosotros
  - a ustedes todos
  lexicon: HALOT
  rationale: El plural hebreo probablemente incluye a Aarón y a los suyos. En español se explicita el plural con 'a ustedes' para evitar ambigüedad, sin volver la frase artificial.
theological_decisions:
- issue: Alcance de זָר en la legislación del santuario
  english_pob_reading: outsider, meaning an unauthorized person outside the permitted priestly/Levitical role
  chosen_spanish_reading: extraño, entendido como alguien ajeno y no autorizado para acercarse al servicio sagrado
  alternative_spanish_readings:
  - forastero
  - persona no autorizada
  - extranjero
  rationale: El contexto no trata de origen étnico sino de acceso cultual permitido. 'Extraño' sigue la línea del inglés POB, mientras la nota aclara que la exclusión es por autorización, no por nacionalidad.
  doctrine_reference: 'Levítico/Números: santidad y acceso restringido al santuario; primacía del contexto léxico sobre el castellano tradicional.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que simplificó ‘join themselves to you’ a ‘join you’. En español se reflejó esa naturalidad con ‘se unirán a ti’, manteniendo el sentido relacional y funcional. También se preservó la decisión de traducir זָר con una forma que señale exclusión del rol autorizado, no etnicidad.
  spanish_consistency_notes:
  - Se mantuvo 'tabernáculo de reunión' para אֹהֶל מוֹעֵד, en línea con el uso bíblico castellano más estable y comprensible.
  - '''Guardarán la responsabilidad'' intenta equilibrar fidelidad cultual y claridad moderna; la nota permite la alternativa más técnica ''custodia''.'
  - '''Ningún extraño'' conserva la tensión de זָר como persona ajena al servicio sagrado, sin convertirlo en ''extranjero'' étnico.'
  - Se usó 'a ustedes' para reflejar el plural hebreo final, aunque el referente inmediato puede ser colectivo y no estrictamente distributivo.
