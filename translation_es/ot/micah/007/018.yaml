review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo y mantiene correctamente la distinción entre ‘iniquidad’ y ‘transgresión’, así como ‘remanente’ y la idea de no retener el enojo para siempre. Sin embargo, en dos puntos significativos se aparta del rastro auditado de la POB: (1) נֹשֵׂא עָוֹן se volvió interpretativamente ‘perdona la iniquidad’ en el texto principal, cuando la POB inglesa preserva la imagen más literal ‘bearing iniquity’ y solo deja ‘forgiving’ en nota; (2) חֶסֶד se tradujo como ‘misericordia’, pero la decisión teológica auditada en inglés favorece explícitamente un equivalente que preserve la dimensión pactal de ‘steadfast love’.'
  spanish_quality_summary: El español es claro y eclesialmente legible. ‘¿Quién es un Dios como tú?’ funciona, aunque suena algo menos idiomático que ‘¿Qué Dios hay como tú?’. No obstante, es aceptable por su cercanía a la POB inglesa. La frase ‘se deleita en la misericordia’ es natural, pero teológicamente más estrecha que el hebreo y la decisión documentada. Conviene ajustar el texto principal para preservar mejor la imagen verbal y la carga pactal sin perder naturalidad.
  glossary_alignment: 'No hay conflicto con Yahvé/Mesías/etc. El problema principal de alineación terminológica está en חֶסֶד: ‘misericordia’ no sigue adecuadamente la preferencia del proyecto por reflejar la amplitud del término; ‘amor fiel’ o ‘amor constante’ encajan mejor en español. Además, dado que la POB inglesa puso la lectura interpretativa de נֹשֵׂא עָוֹן en nota, el español debe hacer lo mismo, manteniendo en el texto ‘que lleva la iniquidad’ o equivalente.'
  issues:
  - severity: high
    issue: נֹשֵׂא עָוֹן se tradujo en el texto principal como ‘que perdona la iniquidad’
    rationale: El hebreo dice más literalmente ‘que lleva/carga la iniquidad’, y la POB inglesa decidió preservar esa imagen en el texto principal, relegando ‘forgiving’ a nota. El español actual invierte esa prioridad y pierde transparencia formal frente a la evidencia fuente.
  - severity: high
    issue: חֶסֶד se tradujo como ‘misericordia’ en el texto principal
    rationale: La decisión teológica auditada en inglés eligió ‘steadfast love’ precisamente para no reducir חֶסֶד a ‘mercy’. En español, ‘misericordia’ estrecha el sentido y no preserva bien la dimensión de amor leal/pactual presente en el término.
  - severity: medium
    issue: Falta una nota para el equivalente alternativo de חֶסֶד
    rationale: La POB inglesa incluye nota explicando que חֶסֶד también puede traducirse ‘mercy’ o ‘covenant love’. El español debería conservar esa información, especialmente porque la solución principal propuesta requiere explicación léxica.
  revised_spanish_text: ¿Quién es un Dios[a] como tú, que lleva la iniquidad[b] y pasa por alto la transgresión para el remanente de su heredad? No retiene su enojo para siempre, porque se deleita en el amor fiel[c].
  revised_footnotes:
  - marker: a
    text: O ‘¿Quién es Dios como tú?’; el hebreo formula una pregunta retórica de incomparabilidad.
    reason: alternative_reading
  - marker: b
    text: O ‘que perdona la iniquidad’. El hebreo más literalmente dice ‘que lleva la iniquidad’.
    reason: lexical_alternative
  - marker: c
    text: ‘Amor fiel’ traduce el hebreo חֶסֶד, un término pactual que también puede traducirse ‘misericordia’ o ‘amor de pacto’.
    reason: lexical_alternative
  revision_rationale: 'Se revisa para alinear el español con la evidencia fuente y con las decisiones auditadas de la POB: se restaura en el texto principal la imagen hebrea de ‘llevar la iniquidad’, dejando la lectura interpretativa ‘perdonar’ en nota; y se reemplaza ‘misericordia’ por ‘amor fiel’ para reflejar mejor el valor pactual de חֶסֶד, añadiendo una nota con alternativas léxicas preservadas por la POB inglesa.'
