translation:
  language: es
  text: Ahora envía y reúne[a] a mí a todo Israel en el monte Carmelo, y a los profetas de Baal, cuatrocientos cincuenta, y a los profetas de Aserá[c], cuatrocientos, los que comen en la mesa de Jezabel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al monte Carmelo». La preposición hebrea marca movimiento hacia el lugar de reunión.
    reason: lexical_alternative
  - marker: b
    text: O «los que comen a la mesa de Jezabel», con la idea de quienes son mantenidos por su patronazgo real.
    reason: lexical_alternative
  - marker: c
    text: «Aserá» puede referirse a la diosa Aserá o, en algunos contextos, a un objeto de culto asociado con ella. Aquí el paralelo con «Baal» favorece la deidad.
    reason: cultural_note
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  lexicon: HALOT
  rationale: Funciona como marcador discursivo de transición inmediata. «Ahora» es natural en español y conserva la urgencia del llamado; «Y ahora» también es posible, pero menos directo en este contexto.
- source_word: שְׁלַח
  english_pob_choice: send
  chosen_spanish: envía
  alternatives_spanish:
  - manda
  - despacha
  lexicon: HALOT
  rationale: Imperativo dirigido a la acción de convocar o hacer salir mensajeros. «Envía» es claro, breve y fiel al tono imperativo del hebreo.
- source_word: קְבֹץ
  english_pob_choice: gather
  chosen_spanish: reúne
  alternatives_spanish:
  - congrega
  - junta
  lexicon: HALOT
  rationale: El segundo imperativo completa la acción iniciada por «envía». «Reúne» expresa bien la idea de congregar a personas en un lugar determinado sin añadir matiz excesivo.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: junto a mí
  alternatives_spanish:
  - a mí
  - ante mí
  lexicon: HALOT
  rationale: Aunque el hebreo marca dirección hacia el hablante, en español «junto a mí» transmite de manera natural el punto de reunión implicado por la escena y la función del mandato. Se mantiene la referencia personal a Elías sin volverla interpretativa de más.
- source_word: כָּל יִשְׂרָאֵל
  english_pob_choice: all Israel
  chosen_spanish: todo Israel
  alternatives_spanish:
  - todos los israelitas
  lexicon: HALOT
  rationale: Se conserva el designativo colectivo nacional. «Todo Israel» mantiene la fuerza retórica del hebreo mejor que una desagregación distributiva.
- source_word: אֶל הַר הַכַּרְמֶל
  english_pob_choice: at Mount Carmel
  chosen_spanish: en el monte Carmelo
  alternatives_spanish:
  - al monte Carmelo
  - hacia el monte Carmelo
  lexicon: HALOT
  rationale: El hebreo usa una preposición de dirección hacia el lugar de reunión. En español, para un punto convocado, «en el monte Carmelo» comunica de modo natural el sitio del encuentro; la alternativa «al monte Carmelo» queda respaldada por la nota de lectura posible.
- source_word: נְבִיאֵי הַבַּעַל
  english_pob_choice: the prophets of Baal
  chosen_spanish: los profetas de Baal
  alternatives_spanish:
  - los profetas de Baal
  lexicon: HALOT
  rationale: La construcción en genitivo se vierte de forma directa y convencional. Se mantiene el nombre propio de la deidad sin suavizarlo.
- source_word: אַרְבַּע מֵאוֹת וַחֲמִשִּׁים
  english_pob_choice: four hundred and fifty
  chosen_spanish: cuatrocientos cincuenta
  alternatives_spanish:
  - '450'
  lexicon: HALOT
  rationale: Se traduce el número en palabras para conservar el registro literario y narrativo del texto bíblico.
- source_word: נְבִיאֵי הָאֲשֵׁרָה
  english_pob_choice: the prophets of Asherah
  chosen_spanish: los profetas de Ashera
  alternatives_spanish:
  - los profetas de Ashera
  - los profetas de la Asera
  lexicon: HALOT
  rationale: Se preserva el valor de nombre propio tal como lo entendió la POB en inglés, evitando imponer en el texto principal una glosa cultual discutida. «Ashera» mantiene la transparencia del término hebreo para lectores españoles.
- source_word: אַרְבַּע מֵאוֹת
  english_pob_choice: four hundred
  chosen_spanish: cuatrocientos
  alternatives_spanish:
  - '400'
  lexicon: HALOT
  rationale: Se mantiene la misma convención numérica en palabras, por coherencia con el número anterior.
- source_word: אֹכְלֵי שֻׁלְחַן אִיזָבֶל
  english_pob_choice: who eat at Jezebel’s table
  chosen_spanish: los que comen de la mesa de Jezabel
  alternatives_spanish:
  - los que comen en la mesa de Jezabel
  - los que son mantenidos por la mesa de Jezabel
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de «la mesa» como expresión de patronazgo o sustento real. La opción principal es suficientemente literal en español y mantiene la relación de dependencia sugerida por el hebreo.
theological_decisions:
- issue: Sentido de אֲשֵׁרָה en la lista de profetas
  english_pob_reading: Asherah is rendered as the name of the deity/goddess, yielding 'the prophets of Asherah.'
  chosen_spanish_reading: 'Se traduce como nombre propio: «los profetas de Ashera».'
  alternative_spanish_readings:
  - los profetas de la Asera
  - los profetas del poste de Asera
  rationale: El paralelismo con «los profetas de Baal» favorece una referencia personal/deidad, no una reificación automática como objeto cultual en el texto principal. La forma española conserva la transparencia del hebreo y evita resolver una discusión interpretativa dentro de la línea principal.
  doctrine_reference: Translation philosophy §1, §5
- issue: Alcance de «all Israel»
  english_pob_reading: '''All Israel'' is retained as a collective national expression.'
  chosen_spanish_reading: 'Se mantiene como expresión colectiva: «todo Israel».'
  alternative_spanish_readings:
  - todos los israelitas
  rationale: La frase funciona como designación nacional retórica y no debe diluirse en una paráfrasis distributiva. «Todo Israel» reproduce esa amplitud colectiva en español.
  doctrine_reference: Translation philosophy §1, §6
- issue: Valor de la preposición en la frase del monte Carmelo
  english_pob_reading: The Hebrew preposition marks movement toward the gathering place.
  chosen_spanish_reading: Se refleja el sentido locativo con «en el monte Carmelo», dejando abierta la lectura de destino mediante la nota.
  alternative_spanish_readings:
  - al monte Carmelo
  rationale: En español, el mandamiento de reunión se formula con naturalidad como ubicación del encuentro. La nota preserva la posibilidad direccional del hebreo sin cargar el texto principal con una formulación menos idiomática.
  doctrine_reference: Translation philosophy §1, §4
translation_notes:
  revision_awareness: El pasaje coincide con el estado revisado más reciente del texto fuente en inglés; no se registran cambios aplicados en la revisión y el pasaje quedó en alta concordancia.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general, pero este versículo no contiene el Tetragrámaton.
  - «Mesías/Cristo» no aplica en este versículo.
  - Se conserva el nombre de la deidad en la forma «Ashera» en el texto principal para mantener la transparencia del término hebreo.
  - La imagen de «la mesa de Jezabel» se traduce de forma concreta para preservar la idea de sustento/patronazgo.
  - Los números se escriben con palabras para conservar el registro narrativo bíblico.
