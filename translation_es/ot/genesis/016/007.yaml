translation:
  language: es
  text: Y el ángel[a] de Yahvé la encontró junto a una fuente de agua en el desierto, junto a la fuente, en el camino a Shur.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mensajero de Yahvé». La palabra hebrea puede significar «ángel» o «mensajero».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְצָאָהּ
  english_pob_choice: found her
  chosen_spanish: la encontró
  alternatives_spanish:
  - la halló
  - se encontró con ella
  lexicon: HALOT
  rationale: El verbo narrativo מצא en este contexto expresa un hallazgo concreto; «la encontró» es natural en español y conserva el valor de encuentro narrativo sin añadir matices interpretativos.
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  - el ángel de Yavé
  lexicon: HALOT
  rationale: מַלְאַךְ admite «mensajero» o «ángel». En este relato, «ángel» es la forma más establecida y transparente en español. Se conserva «Yahvé» para el nombre divino según el criterio del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se translitera el Tetragrámaton como «Yahvé», conforme a la directriz del proyecto de preservar el nombre divino en vez de sustituirlo por un título.
- source_word: עַל עֵין הַמַּיִם
  english_pob_choice: by a spring of water
  chosen_spanish: junto a una fuente de agua
  alternatives_spanish:
  - al lado de una fuente de agua
  - junto a un manantial de agua
  lexicon: HALOT
  rationale: עַיִן puede significar «fuente/manantial» en un contexto de agua. «Junto a» refleja de modo idiomático el valor locativo de עַל en español, y «fuente de agua» reproduce bien la imagen del texto.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto árido
  - en la estepa
  lexicon: HALOT
  rationale: Aunque מִדְבָּר puede abarcar más que un desierto de arena, en español bíblico «desierto» comunica con claridad el entorno inhóspito y es plenamente inteligible; se evita una paráfrasis más técnica.
- source_word: עַל הָעַיִן
  english_pob_choice: by the spring
  chosen_spanish: junto a la fuente
  alternatives_spanish:
  - al lado de la fuente
  - junto al manantial
  lexicon: HALOT
  rationale: La repetición de עַיִן retoma la misma fuente. Se mantiene la consistencia léxica con la primera mención para preservar el enlace espacial del versículo.
- source_word: בְּדֶרֶךְ שׁוּר
  english_pob_choice: on the way to Shur
  chosen_spanish: en el camino a Shur
  alternatives_spanish:
  - por el camino a Shur
  - de camino a Shur
  lexicon: HALOT
  rationale: דֶּרֶךְ se traduce de forma natural como «camino»; la preposición «en» conserva la referencia locativa y direccional sin forzar el castellano.
theological_decisions:
- issue: Nombre divino en מַלְאַךְ יְהוָה
  english_pob_reading: the angel of Yahweh
  chosen_spanish_reading: el ángel de Yahvé
  alternative_spanish_readings:
  - el mensajero de Yahvé
  - el ángel del SEÑOR
  rationale: Se conserva el nombre propio divino «Yahvé» en el sintagma, siguiendo la directriz del proyecto. No se resuelve la posible oscilación semántica entre «ángel» y «mensajero» dentro del texto principal, porque el contexto narrativo permite la lectura tradicional de agente celestial y el auditable inglés POB ya documenta la alternativa.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y las alternativas lexicales documentadas para מַלְאַךְ'
- issue: Valor locativo de עַל en las dos frases
  english_pob_reading: by a spring of water ... by the spring
  chosen_spanish_reading: junto a una fuente de agua ... junto a la fuente
  alternative_spanish_readings:
  - al lado de una fuente de agua ... al lado de la fuente
  - junto a un manantial de agua ... junto al manantial
  rationale: No se traduce עַל de manera rígidamente literal como «sobre», porque el español exigiría una formulación distinta para expresar ubicación cercana. La repetición en español mantiene la estructura del hebreo y el efecto de localización.
  doctrine_reference: 'DOCTRINE.md: equivalencia óptima con atención a la sintaxis del receptor'
translation_notes:
  revision_awareness: Se revisó el texto inglés auditado y el paquete fuente hebreo; no hay revisiones aplicadas en el historial reciente, y la solución española mantiene la misma lectura base con adaptación idiomática mínima.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera uniforme para יְהוָה.
  - Se mantiene «fuente» para עֵין en ambas apariciones para preservar la cohesión léxica.
  - Se evita alternar entre «desierto» y «wilderness» con calcos innecesarios; el español elegido es comprensible y fiel.
  - La puntuación conserva la pausa narrativa y la repetición espacial del hebreo.
