translation:
  language: es
  text: Tuvo setecientas esposas[a] princesas y trescientas concubinas; y sus esposas apartaron su corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mujeres de rango» para «princesas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי לוֹ
  english_pob_choice: He had
  chosen_spanish: Tuvo
  alternatives_spanish:
  - Y tuvo
  - Y había para él
  lexicon: HALOT
  rationale: La construcción hebrea de היה con ל expresa posesión. En español, «tuvo» transmite de manera natural y fiel la idea de posesión sin sonar artificial.
- source_word: נָשִׁים
  english_pob_choice: wives
  chosen_spanish: esposas
  alternatives_spanish:
  - mujeres
  - mujeres casadas
  lexicon: HALOT
  rationale: En este contexto real y matrimonial, נָשִׁים se refiere a esposas, no simplemente a mujeres. «Esposas» es claro y conserva el sentido relacional.
- source_word: שָׂרוֹת
  english_pob_choice: princesses
  chosen_spanish: princesas
  alternatives_spanish:
  - mujeres de rango
  - nobles
  lexicon: HALOT
  rationale: El término señala mujeres de alto estatus. «Princesas» mantiene la fuerza social y política del término en el contexto de alianzas reales, como en la decisión inglesa.
- source_word: שְׁבַע מֵאוֹת
  english_pob_choice: seven hundred
  chosen_spanish: setecientas
  alternatives_spanish:
  - siete cientos
  lexicon: HALOT
  rationale: Es un cardinal directo. En español, la forma concordada con «esposas» es «setecientas».
- source_word: וּפִלַגְשִׁים
  english_pob_choice: and three hundred concubines
  chosen_spanish: y trescientas concubinas
  alternatives_spanish:
  - y trescientas mujeres secundarias
  - y trescientas compañeras
  lexicon: HALOT
  rationale: פִּילֶגֶשׁ se traduce con el término convencional y preciso «concubina», que conserva el rango marital inferior y la carga social del vocablo.
- source_word: שְׁלֹשׁ מֵאוֹת
  english_pob_choice: three hundred
  chosen_spanish: trescientas
  alternatives_spanish:
  - tres cientos
  lexicon: HALOT
  rationale: Número cardinal directo; concuerda con «concubinas» en género y número.
- source_word: וַיַּטּוּ
  english_pob_choice: turned away
  chosen_spanish: desviaron
  alternatives_spanish:
  - inclinaron
  - apartaron
  - desviaron el corazón
  lexicon: HALOT
  rationale: נטה en este contexto expresa apartar de una dirección recta, con matiz moral y devocional. «Desviaron» conserva ese movimiento de apartamiento sin reducirlo a emoción.
- source_word: נָשָׁיו
  english_pob_choice: his wives
  chosen_spanish: sus esposas
  alternatives_spanish:
  - sus mujeres
  - sus concubinas
  lexicon: HALOT
  rationale: El sujeto final es específicamente el grupo de esposas mencionado antes. En español, «sus esposas» es la forma más transparente y precisa.
- source_word: אֶת לִבּוֹ
  english_pob_choice: his heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su mente
  - su interior
  - su voluntad
  lexicon: HALOT
  rationale: 'לֵב/לֵבָב denota el centro interior de la persona: voluntad, pensamiento y lealtad, no solo emoción. «Corazón» mantiene la imagen bíblica y la amplitud semántica sin aplanarla.'
theological_decisions:
- issue: Sentido de «corazón» en la última cláusula
  english_pob_reading: The phrase denotes Solomon's inner loyalty, will, and devotion being turned away, especially in relation to covenant faithfulness.
  chosen_spanish_reading: La frase señala que la lealtad, voluntad y devoción interiores de Salomón fueron desviadas, especialmente respecto de la fidelidad al pacto.
  alternative_spanish_readings:
  - Una mera mudanza afectiva
  - Solo un cambio emocional
  rationale: En antropología hebrea, «corazón» incluye pensamiento, voluntad y adhesión. Mantener «corazón» en español preserva esa tensión teológica y evita reducir el texto a un cambio sentimental.
  doctrine_reference: Fidelidad al pacto; antropología bíblica del corazón.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios sustantivos; la formulación española sigue de cerca el texto hebreo y el audit trail inglés, con ajustes naturales de concordancia y sintaxis en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general, pero este versículo no contiene el nombre divino.
  - Se conserva la distinción entre «esposas» y «concubinas» sin suavizarla.
  - «Corazón» se mantiene como término bíblico amplio para no reducir el sentido antropológico y teológico.
  - La nota sobre «princesas» refleja la alternativa lexical documentada en el registro inglés.
