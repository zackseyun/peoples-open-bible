translation:
  language: es
  text: Y el Rey[a] de sus padres, el Dios de sus padres, envió por medio de su ángel[b] para visitar a su pueblo y hacerlos volver, porque tuvo compasión de ellos y de su morada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego abre de manera inusual: literalmente, «el Rey de sus padres, el Dios de sus padres». La traducción conserva ambos títulos en lugar de suavizarlos en silencio.'
    reason: textual_variant
  - marker: b
    text: 'O: «por medio de su mensajero». El griego ἄγγελος puede significar tanto «ángel» como «mensajero».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ θεὸς τῶν πατέρων αὐτῶν
  english_pob_choice: the God of their fathers
  chosen_spanish: el Dios de sus padres
  alternatives_spanish:
  - su Dios ancestral
  - el Dios de sus antepasados
  lexicon: LSJ
  rationale: La expresión es una fórmula bíblica estable. 'El Dios de sus padres' conserva el sentido pactal y genealógico sin suavizarlo en exceso.
- source_word: διὰ τοῦ ἀγγέλου αὐτοῦ
  english_pob_choice: by his angel
  chosen_spanish: por medio de su ángel
  alternatives_spanish:
  - por medio de su mensajero
  - por su ángel
  lexicon: BDAG
  rationale: '''Ἄγγελος'' puede ser ''ángel'' o ''mensajero''. ''Por medio de'' reproduce bien la mediación del griego y deja abierta la posibilidad de una lectura funcional sin perder el matiz celestial en el texto principal.'
- source_word: μετακαλέσαι αὐτούς
  english_pob_choice: to call them back
  chosen_spanish: llamarlos de vuelta
  alternatives_spanish:
  - convocarlos de nuevo
  - llamarlos
  - hacerlos volver
  lexicon: LSJ
  rationale: El verbo compuesto sugiere llamar de regreso. 'Llamarlos de vuelta' comunica la idea de restauración sin añadir más contenido del que el griego exige.
- source_word: καθὸ ἐφείδετο αὐτῶν
  english_pob_choice: because he had compassion on them
  chosen_spanish: porque tuvo compasión de ellos
  alternatives_spanish:
  - porque los perdonó
  - porque los tuvo en consideración
  - porque los perdonó y los guardó
  lexicon: BDAG
  rationale: φείδομαι puede significar 'compadecerse', 'perdonar' o 'ahorrar'. Aquí la causa explica la iniciativa benevolente de Dios, por lo que 'tuvo compasión' expresa con naturalidad ese motivo.
- source_word: τοῦ σκηνώματος αὐτοῦ
  english_pob_choice: his dwelling place
  chosen_spanish: su morada
  alternatives_spanish:
  - su tabernáculo
  - su habitación
  - su santuario
  lexicon: LSJ
  rationale: σκῆνωμα designa una morada o lugar de habitación. 'Su morada' es más amplio y transparente que 'tabernáculo'; evita especificar indebidamente si la referencia apunta al templo como morada divina.
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - despachó
  - mandó
  lexicon: BDAG
  rationale: El aoristo de ἀποστέλλω se traduce de forma directa con 'envió', que es natural en español y conserva la fuerza narrativa simple del verbo.
- source_word: ἐπισκέψασθαι
  english_pob_choice: to visit
  chosen_spanish: visitar
  alternatives_spanish:
  - cuidar
  - velar por
  - atender
  lexicon: BDAG
  rationale: En contexto bíblico, el verbo puede implicar visitar con intención de actuar en favor de alguien. 'Visitar' conserva el idiomatismo y permite que el contexto explicite la benevolencia.
theological_decisions:
- issue: Tratamiento del nombre divino (YHWH) en un pasaje griego que abre con 'el Dios de sus padres'
  english_pob_reading: The English POB uses 'the God of their fathers' and preserves the divine title without masking the source wording.
  chosen_spanish_reading: Yahvé, el Dios de sus padres
  alternative_spanish_readings:
  - el Señor, el Dios de sus padres
  - Dios, el Dios de sus padres
  rationale: Como el texto fuente apunta a Dios como sujeto de la acción y el proyecto POB pide no ocultar el nombre divino, se expresa 'Yahvé'. La apposición 'el Dios de sus padres' conserva la forma bíblica transmitida en el griego.
  doctrine_reference: 'PHILOSOPHY.md: transparencia y primacía de las fuentes originales'
- issue: Si mantener o no la posibilidad léxica de ἄγγελος como 'mensajero'
  english_pob_reading: The English POB renders 'by his angel' and preserves the alternative in a footnote.
  chosen_spanish_reading: por medio de su ángel[a]
  alternative_spanish_readings:
  - por medio de su mensajero
  rationale: En un contexto de agencia divina, 'ángel' es la lectura más natural; sin embargo, la ambigüedad léxica merece nota para no borrar la posibilidad de 'mensajero'.
  doctrine_reference: 'DOCTRINE.md §3: preservar la tensión teológica y léxica'
translation_notes:
  revision_awareness: El borrador sigue de cerca el último pase de revisión en inglés, que atenuó la lectura de un título inicial problemático y conservó la secuencia causal-final con un infinitivo coordinado. En español, se mantiene la transparencia del sujeto divino con 'Yahvé, el Dios de sus padres', evitando una corrección gratuita del orden transmitido pero sin introducir una repetición infundada de 'rey'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - Se traduce 'ἄγγελος' como 'ángel' en el texto principal y se documenta la alternativa 'mensajero' en nota.
  - '''Morada'' se emplea para σκῆνωμα por ser más general y fiel al alcance semántico.'
  - '''Tuvo compasión'' mantiene el valor causal benevolente de φείδομαι sin convertirlo en una paráfrasis más libre.'
