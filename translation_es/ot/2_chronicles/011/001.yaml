translation:
  language: es
  text: Cuando Roboam llegó a Jerusalén, reunió a la casa de Judá y de Benjamín[a], ciento ochenta mil guerreros escogidos[b], para pelear contra Israel, a fin de devolver el reino a Roboam.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Judá y Benjamín»; el hebreo dice «la casa de Judá y de Benjamín», una designación corporativa para el reino del sur.
    reason: lexical_alternative
  - marker: b
    text: O «ciento ochenta mil hombres selectos aptos para la guerra».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - arribó
  lexicon: HALOT
  rationale: El wayyiqtol de בוא expresa llegada/venida. En español, «llegó» suena natural con Jerusalén como destino y conserva el movimiento narrativo sin forzar un calco.
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: Nombre propio bíblico estándar
  rationale: Se usa la forma española usual del topónimo.
- source_word: וַיַּקְהֵל
  english_pob_choice: assembled
  chosen_spanish: reunió
  alternatives_spanish:
  - convocó
  - aglutinó
  lexicon: HALOT
  rationale: El hiphil de קהל implica juntar o convocar. «Reunió» es claro y natural en español para una reunión de tropas y de cuerpo político.
- source_word: אֶת בֵּית יְהוּדָה וּבִנְיָמִן
  english_pob_choice: the house of Judah and Benjamin
  chosen_spanish: la casa de Judá y de Benjamín
  alternatives_spanish:
  - Judá y Benjamín
  - la casa de Judá y Benjamín
  lexicon: HALOT
  rationale: «Casa de» conserva el giro hebreo y la fuerza corporativa/política de בית con un nombre tribal. Mantenerlo evita reducir la expresión a una mera lista de tribus.
- source_word: מֵאָה וּשְׁמוֹנִים אֶלֶף
  english_pob_choice: one hundred eighty thousand
  chosen_spanish: ciento ochenta mil
  alternatives_spanish:
  - ciento y ochenta mil
  lexicon: Numerales cardinales bíblicos
  rationale: Equivalente directo y idiomático en español actual.
- source_word: בָּחוּר
  english_pob_choice: chosen
  chosen_spanish: escogidos
  alternatives_spanish:
  - selectos
  - elegidos
  lexicon: HALOT
  rationale: En contexto militar, בָּחוּר suele significar tropas seleccionadas o de elite, no simplemente «jóvenes». «Escogidos» conserva la idea de selección para la guerra.
- source_word: עֹשֵׂה מִלְחָמָה
  english_pob_choice: warriors
  chosen_spanish: hombres escogidos
  alternatives_spanish:
  - guerreros
  - hombres de guerra
  lexicon: HALOT
  rationale: La secuencia completa ya queda militarizada por el contexto; en español, «hombres escogidos» junto con «para hacer guerra» preserva la fuerza de עֹשֵׂה מִלְחָמָה sin sobrecargar con un título más libre. La alternativa «guerreros» permanece viable, pero el texto busca mantenerse cercano al valor composicional del hebreo.
- source_word: לְהִלָּחֵם עִם יִשְׂרָאֵל
  english_pob_choice: to fight against Israel
  chosen_spanish: para hacer guerra contra Israel
  alternatives_spanish:
  - para pelear contra Israel
  - para combatir a Israel
  lexicon: HALOT
  rationale: El infinitivo con ל expresa propósito; el contexto hostil exige «contra». «Hacer guerra» refleja con bastante literalidad לְהִלָּחֵם sin sonar rígido.
- source_word: לְהָשִׁיב
  english_pob_choice: to restore
  chosen_spanish: restaurar
  alternatives_spanish:
  - devolver
  - hacer volver
  lexicon: HALOT
  rationale: El hiphil de שוב expresa hacer volver o devolver. En español político, «restaurar» comunica bien la idea de recuperar el reino para su legítimo receptor.
- source_word: הַמַּמְלָכָה
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - la realeza
  - el dominio real
  lexicon: HALOT
  rationale: מַמְלָכָה normalmente es «reino»; es la forma más natural y fiel en español.
- source_word: לִרְחַבְעָם
  english_pob_choice: to Rehoboam
  chosen_spanish: para Roboam
  alternatives_spanish:
  - a Roboam
  - de vuelta a Roboam
  lexicon: Nombre propio bíblico estándar
  rationale: El lamed marca destinatario/beneficiario de la restauración. «Para Roboam» comunica ese movimiento de retorno sin perder naturalidad en español.
theological_decisions:
- issue: Uso de «Israel» para el reino del norte tras la división
  english_pob_reading: Retain 'Israel' in the main text for the northern kingdom, without interpretive expansion.
  chosen_spanish_reading: Conservar «Israel» en el texto principal para el reino del norte, sin ampliarlo interpretativamente.
  alternative_spanish_readings:
  - el reino del norte
  - las tribus del norte
  - los rebeldes israelitas
  rationale: El hebreo usa «Israel» de forma deliberada para la entidad opuesta. Mantener ese término respeta la terminología del cronista y evita sustituirla por una explicación que el texto no añade.
  doctrine_reference: Terminología histórica y política del texto bíblico; cf. uso cronístico de Israel y Judá.
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail en inglés y no se introdujeron cambios sustanciales respecto de la lectura aprobada; las decisiones en español priorizan la naturalidad controlada sin perder el valor composicional hebreo, especialmente en בית + nombre tribal, בָּחוּר, y לְהִלָּחֵם.
  spanish_consistency_notes:
  - Se conservó el nombre propio «Roboam» en forma española estándar y «Jerusalén» como topónimo habitual.
  - Se mantuvo «casa de Judá» para reflejar el valor corporativo de בית, alineado con la nota inglesa.
  - «Hacer guerra contra» preserva el matiz hostil de עִם en contexto bélico.
  - No se usó «SEÑOR» ni terminología eclesiástica no presente en el versículo.
