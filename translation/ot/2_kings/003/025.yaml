id: 2KI.3.25
reference: 2 Kings 3:25
source:
  edition: WLC
  text: וְ/הֶ/עָרִ֣ים יַהֲרֹ֡סוּ וְ/כָל חֶלְקָ֣ה ט֠וֹבָה יַשְׁלִ֨יכוּ אִישׁ אַבְנ֜/וֹ וּ/מִלְא֗וּ/הָ וְ/כָל מַעְיַן מַ֤יִם יִסְתֹּ֨מוּ֙ וְ/כָל עֵֽץ ט֣וֹב יַפִּ֔ילוּ עַד הִשְׁאִ֧יר אֲבָנֶ֛י/הָ בַּ/קִּ֖יר חֲרָ֑שֶׂת וַ/יָּסֹ֥בּוּ הַ/קַּלָּעִ֖ים וַ/יַּכּֽוּ/הָ־־־־־־־׃
translation:
  text: They demolished the cities[a], and on every good piece of land each man threw his stone until they had filled it. They stopped up every spring of water and felled every good tree, until only its stones were left in Kir-hareseth[d][c][b]; then the slingers surrounded it and attacked it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'every good field.' The Hebrew חֶלְקָה refers to a parcel or portion of land.
    reason: lexical_alternative
  - marker: b
    text: Literally 'every good tree'; this may refer more specifically to valuable or productive trees.
    reason: lexical_alternative
  - marker: c
    text: Kir-hareseth is a place name, likely the principal fortified city of Moab in this context.
    reason: cultural_note
  - marker: d
    text: Or 'struck it.' The Hebrew verb is literally 'hit/strike,' here used for military assault on the city.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֶעָרִים
  chosen: the cities
  alternatives:
  - the towns
  lexicon: HALOT
  rationale: עִיר commonly denotes a city or town. 'Cities' fits the military context of fortified population centers being destroyed.
- source_word: יַהֲרֹסוּ
  chosen: they demolished
  alternatives:
  - they tore down
  - they destroyed
  lexicon: HALOT
  rationale: הרס conveys pulling down or demolishing structures. 'Demolished' preserves the concrete sense better than the broader 'destroyed'.
- source_word: חֶלְקָה טוֹבָה
  chosen: good piece of land
  alternatives:
  - good field
  - good tract of land
  lexicon: HALOT
  rationale: חֶלְקָה is a parcel or portion of land; in this agricultural devastation context, 'piece of land' is natural English while preserving the sense of each productive plot.
- source_word: יַשְׁלִיכוּ אִישׁ אַבְנוֹ
  chosen: each man threw his stone
  alternatives:
  - every man cast his stone
  - each one threw a stone
  lexicon: HALOT
  rationale: The idiom describes each soldier contributing a stone onto the fields to ruin them. Retaining the singular distributive sense ('each man ... his stone') reflects the Hebrew closely.
- source_word: וּמִלְאוּהָ
  chosen: until they had filled it
  alternatives:
  - and filled it
  - so that they filled it
  lexicon: HALOT
  rationale: The verb means 'fill' with the feminine suffix referring back to the land parcel. In English, 'until they had filled it' makes explicit the result of repeated stone-throwing in context.
- source_word: מַעְיַן מַיִם
  chosen: spring of water
  alternatives:
  - water spring
  - water source
  - fountain
  lexicon: HALOT
  rationale: מַעְיַן denotes a spring or fountain. 'Spring of water' is slightly formal but transparent and close to the Hebrew construction.
- source_word: יִסְתֹּמוּ
  chosen: they stopped up
  alternatives:
  - they blocked
  - they sealed
  lexicon: HALOT
  rationale: סתם in this context refers to obstructing water sources. 'Stopped up' is idiomatic English for wells or springs.
- source_word: עֵץ טוֹב
  chosen: good tree
  alternatives:
  - fruit tree
  - useful tree
  lexicon: HALOT
  rationale: Literally 'good tree.' The phrase likely refers to valuable/productive trees, but the Hebrew does not specify fruit-bearing here, so the main text keeps the broader wording.
- source_word: יַפִּילוּ
  chosen: felled
  alternatives:
  - cut down
  - caused to fall
  lexicon: HALOT
  rationale: In context of trees, נפל in Hiphil means to make fall. 'Felled' is concise and idiomatic for cutting down trees.
- source_word: עַד הִשְׁאִיר אֲבָנֶיהָ
  chosen: until only its stones were left
  alternatives:
  - until he left its stones
  - until its stones remained
  lexicon: HALOT
  rationale: The Hebrew shifts to singular הִשְׁאִיר, likely an impersonal or collective sense. The clause means the destruction continued until only the city's stones remained. English smooths the number shift while preserving the result.
- source_word: בַּקִּיר חֲרָשֶׂת
  chosen: in Kir-hareseth
  alternatives:
  - at Kir-hareseth
  lexicon: HALOT
  rationale: This is a place name and should be transliterated per project policy. 'In' works with the sense that only the stones remained there.
- source_word: הַקַּלָּעִים
  chosen: the slingers
  alternatives:
  - the stone-throwers
  lexicon: HALOT
  rationale: The noun denotes men using slings in battle. 'Slingers' is the standard military term.
- source_word: וַיָּסֹבּוּ
  chosen: surrounded
  alternatives:
  - went around
  - encircled
  lexicon: HALOT
  rationale: In military context, סבב means to surround or encircle. 'Surrounded' is clear and natural.
- source_word: וַיַּכּוּהָ
  chosen: attacked it
  alternatives:
  - struck it
  - beat against it
  lexicon: HALOT
  rationale: נכה is broadly 'strike.' Here the object is the city, so 'attacked it' communicates the military action more naturally than the literal but less idiomatic 'struck it'.
