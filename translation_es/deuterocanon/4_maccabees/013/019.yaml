revisions:
- from: Y no ignoráis los afectos de la naturaleza humana[a], que la providencia divina y sapientísima distribuyó a los que nacen por medio de los padres, habiéndolos plantado a través del vientre materno.
  to: Y no ignoráis los afectos de la naturaleza humana[a], que la providencia divina y sapientísima distribuyó a los que nacen mediante los padres, habiéndolos plantado por medio del vientre materno.
  rationale: Se corrige 'por medio de los padres' a 'mediante los padres' para conservar mejor la referencia distinta a los padres frente al vientre materno, sin generalizar a ambos progenitores. También se ajusta 'a través del vientre materno' a 'por medio del vientre materno' para una expresión más natural y paralela en español. El resto del texto refleja adecuadamente el griego y la justificación léxica documentada.
