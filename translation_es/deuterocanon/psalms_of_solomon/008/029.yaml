    rationale: El griego usa ἐν, y el inglés auditado fijó «in his righteousness» con nota alternativa «in his justice». En español, «en su justicia» reproduce mejor esa relación de esfera/manera. «Con su justicia» es posible, pero funciona mejor como alternativa que como lectura principal.
  revised_spanish_text: ¡Alabado sea el Señor, que juzga toda la tierra en su justicia[a]!
