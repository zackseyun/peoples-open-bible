base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/008/058.yaml
  text: And I said to them[a], “You also are holy to the Lord, and the vessels are holy, and the silver and the gold are a vow offering to the Lord[b], the Lord of our fathers.”
  footnotes:
