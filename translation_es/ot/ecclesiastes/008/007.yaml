translation:
  language: es
  text: Porque él no sabe qué será[a], pues ¿quién puede decírselo cuándo será?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse de manera más general: «quién puede decirle qué sucederá». Aquí se traduce «qué será … cuándo será» para conservar la distinción entre las dos cláusulas hebreas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Puesto que
  lexicon: HALOT
  rationale: Conecta explicativamente con la afirmación previa. «Porque» conserva la función causal/explicativa del hebreo sin sonar forzado en español.
- source_word: אֵינֶנּוּ יֹדֵעַ
  english_pob_choice: he does not know
  chosen_spanish: él no sabe
  alternatives_spanish:
  - uno no sabe
  - no sabe
  lexicon: HALOT
  rationale: El sujeto es genérico en el contexto, pero en español «él» reproduce con naturalidad la referencia impersonal que el POB inglés resolvió con un singular genérico.
- source_word: מַה שֶּׁיִּהְיֶה
  english_pob_choice: what will be
  chosen_spanish: qué será
  alternatives_spanish:
  - qué acontecerá
  - qué ocurrirá
  - qué pasará
  lexicon: HALOT
  rationale: «Qué será» sigue de cerca la idiomática hebrea y mantiene la distinción frente a la segunda cláusula, como en el audit trail inglés.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: La segunda כִּי introduce la razón del enunciado anterior; «porque» mantiene el paralelismo explicativo en español.
- source_word: כַּאֲשֶׁר יִהְיֶה
  english_pob_choice: when it will be
  chosen_spanish: cuándo será
  alternatives_spanish:
  - como será
  - cuando llegue a ser
  lexicon: HALOT
  rationale: Se sigue la revisión inglesa que entendió כַאֲשֶׁר en sentido temporal. «Cuándo será» conserva esa lectura y distingue claramente esta cláusula de «qué será».
- source_word: מִי יַגִּיד לוֹ
  english_pob_choice: who can tell him
  chosen_spanish: ¿quién le dirá?
  alternatives_spanish:
  - ¿quién podrá decirle?
  - ¿quién se lo dirá?
  lexicon: HALOT
  rationale: La pregunta retórica expresa imposibilidad, no mera futurición. «¿Quién le dirá?» es natural en español y preserva la fuerza del hebreo.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que cambió «how it will be» por «when it will be» para reflejar mejor כַאֲשֶׁר como referencia temporal. La versión española sigue esa actualización con «cuándo será» y conserva la distinción entre las dos cláusulas interrogativas.
  spanish_consistency_notes:
  - Se mantuvo «porque» para ambas ocurrencias de כִּי, siguiendo la estructura explicativa del verso.
  - Se prefirió un registro sobrio y bíblico-actual, sin reemplazar el nombre divino ni introducir terminología no presente en el versículo.
  - 'La interrogación se conservó con el ritmo retórico del original: ignorancia del contenido futuro y, aparte, de su momento/carácter.'
