translation:
  language: es
  text: Porque yo libraba al pobre que clamaba por ayuda, y al huérfano[a] que no tenía quien le ayudara.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el que no tiene padre». El hebreo designa más específicamente a quien carece de padre, una persona socialmente vulnerable.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque es que
  - Así que
  lexicon: HALOT
  rationale: La partícula introduce la explicación de la honra descrita en el contexto anterior. En español, «Porque» conserva bien el valor explicativo de «For» sin sonar artificial.
- source_word: אֲמַלֵּט
  english_pob_choice: I delivered
  chosen_spanish: yo libraba
  alternatives_spanish:
  - yo rescataba
  - yo salvaba
  - yo libré
  lexicon: HALOT
  rationale: El piel de מלט expresa una acción de intervención para sacar de peligro. «Libraba» comunica la idea de rescate/liberación de forma natural en castellano y mantiene el matiz durativo o habitual del imperfecto.
- source_word: עָנִי
  english_pob_choice: the poor
  chosen_spanish: al pobre
  alternatives_spanish:
  - al afligido
  - al necesitado
  lexicon: HALOT
  rationale: En este contexto de justicia social, «pobre» es la equivalencia más clara y consistente con la decisión inglesa. Conserva la categoría social del hebreo sin sobreinterpretarla.
- source_word: מְשַׁוֵּעַ
  english_pob_choice: who cried for help
  chosen_spanish: que clamaba por ayuda
  alternatives_spanish:
  - que gritaba
  - que pedía ayuda
  - clamando
  lexicon: HALOT
  rationale: El participio describe a una persona que está clamando. «Clamaba por ayuda» preserva la acción continua y el tono de urgencia, con un español idiomático y solemne.
- source_word: יָתוֹם
  english_pob_choice: the fatherless
  chosen_spanish: al huérfano
  alternatives_spanish:
  - al padreless
  - al huérfano de padre
  lexicon: HALOT
  rationale: Aunque el inglés optó por «the fatherless» para conservar la categoría social, en español «huérfano» es la forma natural. En este contexto puede abarcar la condición de vulnerabilidad sin necesidad de una glosa explicativa en el texto principal.
- source_word: וְלֹא עֹזֵר לוֹ
  english_pob_choice: who had no helper
  chosen_spanish: que no tenía quien le ayudara
  alternatives_spanish:
  - sin quien lo ayudara
  - que no tenía ayudador
  - y no tenía ayudador
  lexicon: HALOT
  rationale: La cláusula relativa expresa la carencia de ayuda. «Que no tenía quien le ayudara» transmite con claridad la ausencia de un auxiliador, en un español fluido y fiel al sentido.
translation_notes:
  revision_awareness: El inglés POB mantiene una traducción de alta equivalencia óptima, con «the fatherless» y una nota léxica sobre el sentido social de יָתוֹם. El presente borrador conserva la estructura y el contenido semántico, pero adapta «the fatherless» a «el huérfano» como equivalente español idiomático, añadiendo una nota para preservar la alternativa y la tensión léxica documentada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según la norma del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se conserva el tono verbal de acción pasada/habitual con «libraba», coherente con el imperfecto hebreo y la narración testimonial de Job.
  - «Clamaba por ayuda» evita reducir מְשַׁוֵּעַ a un simple «gritar», preservando la idea de súplica.
  - La nota del huérfano retiene la distinción documental entre el equivalente idiomático español y el matiz social más específico del hebreo.
