translation:
  language: es
  text: Entonces el Espíritu me levantó y me llevó a la puerta del este de la casa de Yahvé[b][a], que da hacia el este. Y he aquí, en la entrada de la puerta había veinticinco hombres, y vi entre ellos a Jaazanías hijo de Azur y a Pelatías hijo de Benaía, jefes del pueblo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un espíritu me levantó»; רוּחַ también puede significar «viento» o «espíritu», pero en el contexto de la visión de Ezequiel la referencia más probable es el Espíritu divino.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «la puerta de la casa de Yahvé»; es decir, la puerta del templo.'
    reason: cultural_note
  - marker: c
    text: O «oficiales del pueblo» o «príncipes del pueblo».
    reason: lexical_alternative
lexical_decisions:
- source_word: רוּחַ
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - un espíritu
  - el viento
  lexicon: HALOT
  rationale: En el contexto visionario de Ezequiel, el sujeto que levanta y transporta al profeta se entiende más naturalmente como el Espíritu divino. El español conserva el artículo definido para reflejar esa referencia específica y la fuerza teológica del pasaje, sin excluir que la palabra hebrea tenga otros sentidos posibles.
- source_word: וַתִּשָּׂא אֹתִי
  english_pob_choice: lifted me up
  chosen_spanish: me levantó
  alternatives_spanish:
  - me alzó
  - me cargó
  lexicon: HALOT
  rationale: נשא con un profeta transportado en visión se expresa bien con «me levantó», que es natural en español y mantiene la imagen de elevación sin añadir más de lo que el hebreo dice.
- source_word: וַתָּבֵא אֹתִי
  english_pob_choice: brought me
  chosen_spanish: me llevó
  alternatives_spanish:
  - me trajo
  - me condujo
  lexicon: HALOT
  rationale: בוא en hifil suele equivaler a «traer/llevar». «Me llevó» preserva el movimiento de traslado en una forma idiomática y clara para el español.
- source_word: שַׁעַר בֵּית יְהוָה
  english_pob_choice: the gate of the house of Yahweh
  chosen_spanish: la puerta de la casa de Yahvé
  alternatives_spanish:
  - la puerta del templo de Yahvé
  - la puerta de la casa de Yahvé
  lexicon: HALOT
  rationale: Se conserva la expresión «casa de Yahvé» por fidelidad al hebreo y a la terminología del proyecto. «Puerta» funciona naturalmente en español para שַׁעַר, aunque el referente sea la puerta del complejo del templo.
- source_word: הַקַּדְמוֹנִי
  english_pob_choice: east
  chosen_spanish: oriental
  alternatives_spanish:
  - del oriente
  - del este
  lexicon: HALOT
  rationale: Con «puerta» en español, «oriental» es una forma digna y precisa para indicar el lado este sin perder naturalidad.
- source_word: הַפּוֹנֶה קָדִימָה
  english_pob_choice: which faces eastward
  chosen_spanish: que mira hacia el oriente
  alternatives_spanish:
  - que da al oriente
  - que está orientada al oriente
  lexicon: HALOT
  rationale: La frase participial hebrea se reproduce con una fórmula española igualmente descriptiva. «Mira hacia el oriente» conserva la redundancia espacial del texto.
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y he aquí que
  lexicon: HALOT
  rationale: «Y he aquí» es un equivalente tradicional y claro del marcador discursivo, manteniendo el tono profético sin sonar arcaico en exceso.
- source_word: בְּפֶתַח הַשַּׁעַר
  english_pob_choice: at the entrance of the gate
  chosen_spanish: en la entrada de la puerta
  alternatives_spanish:
  - en el acceso de la puerta
  - junto a la entrada de la puerta
  lexicon: HALOT
  rationale: La construcción preposicional se traduce de manera directa y comprensible. «Entrada» conserva el sentido de פתח sin necesidad de reinterpretarlo.
- source_word: עֶשְׂרִים וַחֲמִשָּׁה אִישׁ
  english_pob_choice: twenty-five men
  chosen_spanish: veinticinco hombres
  alternatives_spanish:
  - veinticinco personas
  lexicon: HALOT
  rationale: אִישׁ es masculino singular usado colectivamente; «hombres» mantiene la concordancia de género y el valor colectivo del hebreo.
- source_word: בְתוֹכָם
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en medio de ellos
  lexicon: HALOT
  rationale: «Entre ellos» es la forma más natural en español para expresar la ubicación dentro del grupo, conservando el sentido de participación en la asamblea.
- source_word: שָׂרֵי הָעָם
  english_pob_choice: leaders of the people
  chosen_spanish: jefes del pueblo
  alternatives_spanish:
  - príncipes del pueblo
  - oficiales del pueblo
  - dirigentes del pueblo
  lexicon: HALOT
  rationale: שָׂרִים puede abarcar autoridades, jefes o gobernantes. «Jefes del pueblo» transmite autoridad sin cargar innecesariamente el texto con una noción nobiliaria que «príncipes» podría sugerir en español.
theological_decisions:
- issue: Identificación de רוּחַ en el transporte visionario
  english_pob_reading: the Spirit refers to the divine Spirit
  chosen_spanish_reading: el Espíritu se entiende como el Espíritu divino que transporta al profeta en visión
  alternative_spanish_readings:
  - un espíritu
  - el viento
  rationale: El contexto inmediato de Ezequiel favorece la lectura del Espíritu divino como agente del traslado. Se mantiene, sin embargo, la conciencia de que el hebreo permite otros sentidos léxicos, por lo que la decisión se basa en el contexto visionario y no en una imposición doctrinal externa.
  doctrine_reference: Mantener la fuerza teológica del contexto visionario de Ezequiel sin borrar la ambigüedad léxica de רוּחַ
translation_notes:
  revision_awareness: Se revisó la redacción inglesa más reciente y el cotejo indica alta concordancia; no se registraron revisiones aplicadas. La versión española sigue el mismo sentido, conservando la ambigüedad de רוּחַ en nota y la identificación de la puerta como parte del templo en la nota cultural.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para el nombre divino.
  - Se prefiere «Espíritu» con artículo definido por el contexto visionario.
  - «Casa de Yahvé» se conserva como expresión transparente y coherente con el proyecto.
  - «Jefes del pueblo» evita un falso matiz monárquico que no exige el hebreo.
  - Los marcadores de nota se colocan en el orden solicitado y corresponden a las notas registradas.
