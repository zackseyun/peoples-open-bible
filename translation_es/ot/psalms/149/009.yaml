translation:
  language: es
  text: para ejecutar sobre ellos el juicio escrito[a]. Esto es un honor[d] para todos sus fieles[b]. ¡Alaben a Yah[c]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el juicio escrito», es decir, el juicio ya registrado o prescrito por Dios.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «sus fieles»; tradicionalmente: «sus santos».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «Alaben a Yah» (hallelu-yah); tradicionalmente se translitera «Aleluya».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «Esto es honra».'
    reason: alternative_reading
lexical_decisions:
- source_word: לַעֲשׂוֹת
  english_pob_choice: to execute
  chosen_spanish: para ejecutar
  alternatives_spanish:
  - para hacer
  - para llevar a cabo
  lexicon: HALOT
  rationale: En este contexto, unido a מִשְׁפָּט ('juicio'), el infinitivo expresa realizar o hacer cumplir una sentencia judicial, no simplemente 'hacer' en sentido general. 'Ejecutar' conserva esa fuerza jurídica.
- source_word: בָּהֶם
  english_pob_choice: on them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - contra ellos
  - en ellos
  lexicon: HALOT
  rationale: La preposición con este verbo apunta a los destinatarios del juicio. 'Sobre ellos' expresa bien la dirección del acto judicial en español y mantiene la relación con el objeto del castigo.
- source_word: מִשְׁפָּט
  english_pob_choice: the judgment
  chosen_spanish: el juicio
  alternatives_spanish:
  - la sentencia
  - la justicia
  lexicon: HALOT
  rationale: Aquí designa una acción o decisión judicial concreta, especialmente con כָּתוּב ('escrito'). 'Juicio' conserva el valor legal y teológico del término sin forzar un tecnicismo moderno.
- source_word: כָּתוּב
  english_pob_choice: written
  chosen_spanish: escrito
  alternatives_spanish:
  - prescrito
  - decretado
  lexicon: HALOT
  rationale: El participio pasivo indica claramente que algo está escrito. 'Escrito' preserva la imagen textual y la posible alusión a una decisión divina ya registrada.
- source_word: הָדָר
  english_pob_choice: honor
  chosen_spanish: honor
  alternatives_spanish:
  - majestad
  - esplendor
  - gloria
  lexicon: HALOT
  rationale: En esta cláusula el sustantivo expresa dignidad o distinción conferida a los fieles. 'Honor' es la equivalencia más natural y fiel en español.
- source_word: חֲסִידָיו
  english_pob_choice: his faithful ones
  chosen_spanish: sus fieles
  alternatives_spanish:
  - sus santos
  - los piadosos de él
  - sus leales
  lexicon: HALOT
  rationale: חסיד comunica fidelidad leal al pacto. 'Fieles' evita la carga confesional posterior de 'santos' y transmite bien la idea de devoción leal.
- source_word: הַלְלוּ יָהּ
  english_pob_choice: Praise Yah!
  chosen_spanish: ¡Alaben a Yah!
  alternatives_spanish:
  - ¡Alaben a YAH!
  - ¡Aleluya!
  - ¡Alaben a Yahvé!
  lexicon: HALOT
  rationale: Se conserva el imperativo plural y el nombre breve divino יָהּ como 'Yah'. 'Alaben' mantiene la fuerza exhortativa; no se reemplaza por 'Aleluya' porque el hebreo aquí es una orden + nombre divino, no una transliteración litúrgica.
theological_decisions:
- issue: Nombre divino abreviado en la fórmula de alabanza final
  english_pob_reading: Praise Yah!
  chosen_spanish_reading: ¡Alaben a Yah!
  alternative_spanish_readings:
  - ¡Aleluya!
  - ¡Alaben al Señor!
  rationale: El hebreo usa יָהּ, forma breve del nombre divino, dentro de la expresión fija הַלְלוּ יָהּ. Traducirlo como 'Yah' preserva la forma presente en el texto y evita ocultarla detrás de una fórmula litúrgica tradicional o de un sustituto genérico.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; contested terms table for יְהוָה'
- issue: Valor de הָדָר como privilegio conferido
  english_pob_reading: This is an honor for all his faithful ones.
  chosen_spanish_reading: Esto es un honor para todos sus fieles.
  alternative_spanish_readings:
  - Esto es honra para todos sus fieles.
  - Esto es majestad para todos sus fieles.
  rationale: El contexto no describe una cualidad visual sino una distinción otorgada. 'Honor' mantiene el sentido de privilegio concedido a los fieles y conserva la tensión de que la ejecución del juicio también es presentada como un honor.
  doctrine_reference: HALOT; revisión inglesa 2026-04-21 sobre 'an honor'
translation_notes:
  revision_awareness: Se tomó en cuenta la última revisión inglesa que prefirió el orden natural «the written judgment» frente a «the judgment written». Por eso el español coloca «el juicio escrito» y no una inversión más literal. También se preservó la decisión inglesa de traducir הַלְלוּ יָהּ como una orden con el nombre breve divino, no como la transliteración litúrgica «Aleluya».
  spanish_consistency_notes:
  - Se mantuvo el tono jurídico de מִשְׁפָּט con «juicio», coherente con el contexto bélico-jurídico del verso.
  - «Yah» se usa como nombre divino breve de forma consistente con la política del proyecto para יָהּ, sin sustituirlo por una fórmula de ocultamiento.
  - La secuencia «sus fieles» evita la lectura eclesiástica posterior de «santos», pero deja la alternativa documentada en nota.
  - El marcador [d] se coloca en «honor» para reflejar la alternativa semántica reconocida por la revisión inglesa.
  - La estructura española mantiene dos oraciones breves, como en el hebreo y en la edición inglesa, sin expandir el contenido devocional.
