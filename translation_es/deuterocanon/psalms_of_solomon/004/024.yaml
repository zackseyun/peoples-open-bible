translation:
  language: es
  text: Y no se acordaron de Dios, y no temieron a Dios en todas estas cosas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐμνήσθησαν
  english_pob_choice: did not remember
  chosen_spanish: no se acordaron de
  alternatives_spanish:
  - no recordaron
  - no tuvieron presente
  lexicon: BDAG
  rationale: El verbo griego expresa aquí el acto de traer a la mente o mantener presente a Dios. «No se acordaron de» comunica de manera natural esa falta de memoria/consideración, sin perder la fuerza del reproche moral del texto.
- source_word: θεοῦ / τὸν θεόν
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: El texto griego usa θεοῦ y luego τὸν θεόν; en español, «Dios» es la forma más directa y natural. Mantiene el referente único y la repetición enfática del original.
- source_word: ἐφοβήθησαν
  english_pob_choice: did not fear
  chosen_spanish: no temieron
  alternatives_spanish:
  - no reverenciaron
  - no sintieron temor de
  lexicon: BDAG
  rationale: Con Dios como objeto, φοβέομαι puede incluir temor reverente. «No temieron» conserva la dureza y la ambivalencia del término sin suavizarlo prematuramente a «respetaron» o «reverenciaron».
- source_word: ἐν πᾶσι τούτοις
  english_pob_choice: in all these things
  chosen_spanish: en todas estas cosas
  alternatives_spanish:
  - entre todas estas cosas
  - en medio de todas estas cosas
  lexicon: BDAG
  rationale: La frase preposicional se traduce de modo literal y fluido. «En todas estas cosas» refleja bien el marco total de circunstancias al que alude el griego y coincide con la revisión inglesa más literal.
translation_notes:
  revision_awareness: 'La versión inglesa revisada sustituyó una formulación más interpretativa por otra más literal para ἐν πᾶσι τούτοις. La redacción española sigue esa opción literal con una sintaxis natural en español: «en todas estas cosas».'
  spanish_consistency_notes:
  - Se mantiene la repetición de «Dios» dos veces para reflejar la repetición enfática del griego.
  - Se evita «temer a Dios» con un giro explicativo añadido, para no debilitar la fuerza del verbo φοβέομαι en este contexto.
  - La frase final conserva el alcance total de la condición descrita sin añadir contenido ausente del griego.
