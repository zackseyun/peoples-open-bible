  text: בַּ/יּ֣וֹם הַ/ה֗וּא יִֽהְיֶה֙ עַל מְצִלּ֣וֹת הַ/סּ֔וּס קֹ֖דֶשׁ לַֽ/יהוָ֑ה וְ/הָיָ֤ה הַ/סִּירוֹת֙ בְּ/בֵ֣ית יְהוָ֔ה כַּ/מִּזְרָקִ֖ים לִ/פְנֵ֥י הַ/מִּזְבֵּֽחַ־׃
base_translation:
  language: en
  yaml_path: translation/ot/zechariah/014/020.yaml
  text: On that day[a], there will be on the bells of the horses[c][b], “Holy to Yahweh,” and the pots in the house of Yahweh will be like the bowls before the altar.
  footnotes:
  - marker: a
    text: Or, “Holiness to the LORD.” The Hebrew phrase echoes the inscription on the high priest’s gold plate in Exodus 28:36.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term may refer to small jingling metal pieces on horse gear; 'bells' is the most likely sense.
    reason: cultural_note
  - marker: c
    text: Or, “basins” for “bowls.” These were sacred vessels used in temple ritual.
    reason: lexical_alternative
