translation:
  language: es
  text: Por esta razón, en verdad, incluso los jóvenes, filosofando[b] según el razonamiento de la piedad[a], vencieron torturas más severas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «con el razonamiento de la piedad» o «con pía razón». El griego subraya una razón gobernada por la reverencia hacia Dios.
