translation:
  language: es
  text: Y celebraron la fiesta de los panes sin levadura durante siete días[a], alegrándose delante del Señor,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «delante del Señor»; el paralelo hebreo también presenta la celebración como gozo ante YHWH.'
    reason: cross_reference
lexical_decisions:
- source_word: ἤγαγον
  english_pob_choice: kept
  chosen_spanish: celebraron
  alternatives_spanish:
  - guardaron
  - hicieron
  - observaron
  lexicon: LSJ
  rationale: En contexto festivo, ἄγω puede significar celebrar o observar una fiesta. 'Celebraron' expresa naturalmente la acción ritual en español y conserva el sentido de observancia festiva sin sonar mecánico.
- source_word: ἑορτὴν
  english_pob_choice: Feast
  chosen_spanish: la fiesta
  alternatives_spanish:
  - la festividad
  - la celebración
  lexicon: LSJ
  rationale: ἑορτή designa una festividad religiosa. 'Fiesta' es la forma más clara y natural en español para un observancia litúrgica concreta.
- source_word: τῶν ἀζύμων
  english_pob_choice: of Unleavened Bread
  chosen_spanish: de los panes sin levadura
  alternatives_spanish:
  - de los ázimos
  - de los panes ázimos
  lexicon: LSJ
  rationale: La expresión idiomática del nombre de la fiesta en español suele explicitar el sustantivo implícito. 'Panes sin levadura' comunica directamente el hebreo paralelo y el valor del griego ἀζύμων.
- source_word: ἑπτὰ ἡμέρας
  english_pob_choice: for seven days
  chosen_spanish: durante siete días
  alternatives_spanish:
  - por siete días
  - siete días
  lexicon: LSJ
  rationale: El griego expresa duración. 'Durante siete días' mantiene la duración de manera idiomática en español.
- source_word: εὐφραινόμενοι
  english_pob_choice: rejoicing
  chosen_spanish: alegrándose
  alternatives_spanish:
  - regocijándose
  - gozándose
  lexicon: LSJ
  rationale: El participio expresa la manera concomitante de la celebración. 'Alegrándose' conserva el matiz verbal y no sobretraduce con una frase más interpretativa.
- source_word: ἔναντι Κυρίου
  english_pob_choice: before the Lord
  chosen_spanish: delante del Señor
  alternatives_spanish:
  - en presencia del Señor
  - ante el Señor
  - delante de Yahvé
  lexicon: LSJ
  rationale: ἔναντι indica estar delante o en presencia de alguien. 'Delante del Señor' reproduce bien la relación espacial/ritual. Se mantiene 'Señor' por la convención del POB para κύριος en el texto griego, con la referencia al nombre divino reservada para la nota.
theological_decisions:
- issue: Cómo representar Κυρίου en un contexto de LXX con paralelo hebreo que alude a YHWH
  english_pob_reading: before the Lord
  chosen_spanish_reading: delante del Señor
  alternative_spanish_readings:
  - delante de Yahvé
  - delante del SEÑOR
  rationale: El texto griego usa Κυρίου y el audit trail inglés opta por 'the Lord'. En español, 'Señor' sigue esa convención y evita introducir una forma de cita distinta en el cuerpo del texto. La relación con YHWH se conserva en la nota.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH → the LORD; κύριος → Lord'
translation_notes:
  revision_awareness: 'El borrador sigue el texto griego de Swete 1909 como ancla primaria y toma el inglés POB como guía auditada para los equivalentes idiomáticos: ἤγαγον → celebrar una fiesta, τῶν ἀζύμων → panes sin levadura, εὐφραινόμενοι → alegrándose, y ἔναντι Κυρίου → delante del Señor. No se detectaron revisiones posteriores que alteren el sentido.'
  spanish_consistency_notes:
  - Se mantiene 'Señor' para κύριος en el cuerpo del texto, coherente con el audit trail inglés.
  - '''Fiesta de los panes sin levadura'' es una forma natural y fiel del nombre litúrgico; evita calcos extraños como ''la fiesta de los ázimos''.'
  - '''Alegrándose'' conserva la cualidad participial del griego sin convertirla en una oración finita.'
