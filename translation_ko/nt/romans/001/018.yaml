id: ROM.1.18
reference: Romans 1:18
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἀποκαλύπτεται γὰρ ὀργὴ θεοῦ ἀπ’ οὐρανοῦ ἐπὶ πᾶσαν ἀσέβειαν καὶ ἀδικίαν ἀνθρώπων τῶν τὴν ἀλήθειαν ἐν ἀδικίᾳ κατεχόντων,
base_translation:
  language: en
  yaml_path: translation/nt/romans/001/018.yaml
  text: For the wrath of God is being revealed from heaven against all ungodliness and unrighteousness of people who suppress the truth in unrighteousness[a][b][c][d][e].
  footnotes:
  - marker: a
    text: Or "is revealed."
    reason: lexical_alternative
  - marker: b
    text: Or "men"; the Greek refers to human beings generally.
    reason: lexical_alternative
  - marker: c
    text: Or "in unrighteousness."
    reason: lexical_alternative
  - marker: d
    text: '"Suppress" may also be rendered "hold down" or "restrain" in this context.'
    reason: lexical_alternative
  - marker: e
    text: Or 'unrighteousness of people who suppress the truth by unrighteousness'.
    reason: previous_rendering
translation:
  language: ko
  text: 하나님의 진노가 모든 불경건과 사람들의 불의에 대하여 하늘로부터 계시되고 있으니, 그들은 진리를 불의로 억누르고 있습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὀργὴ θεοῦ
  english_pob_choice: wrath of God
  chosen_korean: 하나님의 진노
  alternatives_korean:
  - 하나님의 노여움
  lexicon: BDAG
  rationale: 용어집에 따라 ὀργή는 「진노」로 일관 처리한다. 「노여움」은 가벼워 보일 수 있다.
- source_word: ἀσέβεια
  english_pob_choice: ungodliness
  chosen_korean: 불경건
  alternatives_korean:
  - 경건치 않음
  lexicon: BDAG
  rationale: 용어집 기본값 「불경건」을 따른다. 하나님께 대한 잘못된 태도를 함의한다.
- source_word: ἀδικία
  english_pob_choice: unrighteousness
  chosen_korean: 불의
  alternatives_korean:
  - 부정의
  - 의롭지 못함
  lexicon: BDAG
  rationale: 용어집 기본값 「불의」를 따른다. 사람에 대한 잘못된 행위를 함의한다.
- source_word: κατεχόντων
  english_pob_choice: suppress
  chosen_korean: 억누르고
  alternatives_korean:
  - 붙들고
  - 억제하고
  lexicon: BDAG
  rationale: 진리를 「누르고 가두는」 강한 함의를 「억누르다」로 보존한다. 약한 「감추다」는 피한다.
theological_decisions:
- issue: 1:18 진노 단락의 강도와 특정성 보존
  chosen_reading: 하나님의 진노가 ... 계시되고 있으니, 그들은 진리를 불의로 억누르고 있습니다
  alternative_readings:
  - 하나님의 노여움이 드러나니 ...
  rationale: 1:18-32 진노 단락은 본문의 충격적 무게가 부각되어야 하는 부분이다. 한국 전통 번역의 완곡어법(「노여움」, 「숨기다」)을 피하고, 「진노」, 「억누르다」를 사용해 본문의 강도를 그대로 보존한다.
  doctrine_reference: 'DOCTRINE.md §1+§5 — Rom 1:18-32 wrath: do not euphemize'
