translation:
  language: es
  text: Los ancianos de Gebal[a] y sus hombres hábiles estaban en ti, reparando tus brechas[b]. Todas las naves del mar y sus marineros estaban en ti para trocar tus mercaderías[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Gebal es una ciudad fenicia, conocida más tarde en griego como Biblos.
    reason: alternative_reading
  - marker: b
    text: 'O: «tus grietas»; el hebreo puede referirse a daños estructurales, aberturas o juntas que necesitan reparación.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «para comerciar con tus mercaderías».'
    reason: lexical_alternative
lexical_decisions:
- source_word: זִקְנֵי
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - líderes
  - ancianos de edad
  lexicon: HALOT
  rationale: En este contexto de lista comercial y cívica, el hebreo designa personas de autoridad y experiencia. 'Ancianos' conserva ese valor sin sonar forzado en español.
- source_word: גְבַּל
  english_pob_choice: Gebal
  chosen_spanish: Gebal
  alternatives_spanish:
  - Biblos
  lexicon: HALOT
  rationale: Se mantiene el topónimo transliterado, como en el criterio del POB en inglés. 'Biblos' se deja como alternativa histórica en nota.
- source_word: חֲכָמֶיהָ
  english_pob_choice: her skilled men
  chosen_spanish: sus hombres sabios
  alternatives_spanish:
  - sus hombres hábiles
  - sus artesanos
  lexicon: HALOT
  rationale: El hebreo puede referirse a destreza práctica, pero la construcción literal 'hombres sabios' conserva el paralelo del texto y deja abierta la gama de habilidad especializada en el contexto náutico.
- source_word: הָיוּ בָךְ
  english_pob_choice: were within you
  chosen_spanish: estaban en ti
  alternatives_spanish:
  - estaban dentro de ti
  - estaban contigo
  lexicon: HALOT
  rationale: La preposición con el sufijo femenino se traduce de modo directo y natural en español, manteniendo la imagen de Tiro como ciudad/personificación de nave.
- source_word: מַחֲזִיקֵי
  english_pob_choice: repairing
  chosen_spanish: reparando
  alternatives_spanish:
  - restaurando
  - arreglando
  lexicon: HALOT
  rationale: Aunque el verbo base puede significar 'sostener/fortalecer', con בִּדְקֵךְ en este contexto técnico de nave expresa la acción de reparar. 'Reparando' es el equivalente español más claro.
- source_word: בִּדְקֵךְ
  english_pob_choice: your breaches
  chosen_spanish: tus brechas
  alternatives_spanish:
  - tus grietas
  - tus roturas
  - tus daños
  lexicon: HALOT
  rationale: '''Brechas'' preserva el sentido de abertura, fisura o avería sin reducirlo a una sola imagen náutica. Mantiene mejor la amplitud semántica que ''daños''.'
- source_word: כָּל אֳנִיּוֹת הַיָּם
  english_pob_choice: all the ships of the sea
  chosen_spanish: todas las naves del mar
  alternatives_spanish:
  - todos los barcos del mar
  - todas las embarcaciones del mar
  lexicon: HALOT
  rationale: '''Naves'' funciona bien en registro bíblico y marítimo, y corresponde al alcance colectivo del hebreo.'
- source_word: וּמַלָּחֵיהֶם
  english_pob_choice: their sailors
  chosen_spanish: sus marineros
  alternatives_spanish:
  - sus navegantes
  - sus tripulantes
  lexicon: HALOT
  rationale: '''Marineros'' es el equivalente más natural y claro en español para la tripulación marítima.'
- source_word: לַעֲרֹב
  english_pob_choice: to barter
  chosen_spanish: para cambiar
  alternatives_spanish:
  - para trocar
  - para intercambiar
  - para hacer trueques
  lexicon: HALOT
  rationale: El verbo en contexto comercial implica intercambio de bienes. 'Cambiar' mantiene la idea de trueque o intercambio sin introducir una perífrasis demasiado pesada.
- source_word: מַעֲרָבֵךְ
  english_pob_choice: your wares
  chosen_spanish: tus mercaderías
  alternatives_spanish:
  - tus mercancías
  - tus bienes de comercio
  lexicon: HALOT
  rationale: '''Mercaderías'' conserva el campo semántico comercial del sustantivo y evita un giro demasiado coloquial. Corresponde bien al intercambio de carga/mercancía del pasaje.'
translation_notes:
  revision_awareness: 'Se siguió de cerca la revisión inglesa más reciente, especialmente en dos puntos: בדק se reflejó como ''brechas'' en lugar de una noción más general de ''daño'', y לַעֲרֹב se entendió comercialmente como intercambio/barter. El español mantiene esa precisión sin perder fluidez ni el tono técnico del lamento mercantil.'
  spanish_consistency_notes:
  - Se preservó 'Yahvé' no porque aparezca en este versículo, sino por consistencia editorial general del proyecto cuando corresponda; aquí no aplica.
  - Se mantuvo un registro bíblico sobrio y marítimo ('naves', 'marineros', 'mercaderías') para conservar la metáfora de Tiro como puerto/comercio.
  - No se sustituyó 'Gebal' por 'Biblos' en el texto principal para respetar la transliteración preferida del proyecto y dejar la identificación histórica en nota.
