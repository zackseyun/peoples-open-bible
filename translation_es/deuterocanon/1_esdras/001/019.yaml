base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/001/019.yaml
  text: And all the kings of Israel had not kept such a Passover as Josias kept[c][b][a], and the priests and the Levites and the Judeans and all Israel who were found dwelling in Jerusalem.
  footnotes:
  - marker: a
    text: Greek Josias; the Hebrew parallel names the same king as Josiah.
    reason: cross_reference
  - marker: b
    text: Or 'had not celebrated such a Passover.' The Greek literally says 'had not led/brought a Passover such as...,' an idiom for observing it.
    reason: lexical_alternative
  - marker: c
    text: '''The Judeans'' may also be rendered ''the Jews''; here the term likely carries an ethnic-geographic sense tied to Judah/Judea.'
    reason: lexical_alternative
