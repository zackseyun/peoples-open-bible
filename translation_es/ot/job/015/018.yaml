review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general: «lo que» para אֲשֶׁר, «los sabios» para חֲכָמִים, y «declaran» para יַגִּידוּ. También preserva la ambigüedad documentada en torno a מֵאֲבוֹתָם mediante una nota. Sin embargo, la secuencia principal «no han ocultado de sus padres» no es español natural y no transmite con suficiente claridad el valor de מִן como origen/fuente en la lectura principal del POB inglés.'
  spanish_quality_summary: 'La frase «ocultado de sus padres» suena antinatural en español; con «ocultar», «de» no funciona idiomáticamente para expresar procedencia. Conviene reparar la redacción sin sobreinterpretar. «Y no lo han ocultado, recibido de sus padres» sería demasiado torpe; una solución más clara y todavía cercana al hebreo es «y no lo han ocultado de lo recibido de sus padres», pero también suena forzada. La mejor reparación es explicitar mínimamente el objeto implícito: «y no han ocultado lo recibido de sus padres», que mantiene la lectura principal auditada, lee bien en español y deja las otras posibilidades en la nota.'
  glossary_alignment: No hay conflictos con la terminología de proyecto. No aparecen nombres divinos ni términos doctrinales sensibles. «Los sabios» es aceptable en español aunque el inglés diga «wise men»; el contexto sapiencial lo sostiene. La nota alternativa debe conservar la ambigüedad sobre «sus padres».
  issues:
  - severity: high
    issue: La expresión «y no han ocultado de sus padres» es gramatical y estilísticamente deficiente en español.
    rationale: Aunque reproduce formalmente «from their fathers», en español «ocultar de» no comunica bien origen o procedencia. El lector puede no entender la frase o leerla como error.
  - severity: medium
    issue: La lectura principal española preserva la ambigüedad de forma demasiado opaca.
    rationale: La filosofía del POB pide conservar la tensión, pero no a costa de producir una construcción ininteligible. En español conviene trasladar la lectura principal a una forma comprensible y dejar la ambigüedad restante en la nota.
  revised_spanish_text: lo que declaran[a] los sabios, y no han ocultado lo recibido de sus padres—
