translation:
  language: es
  text: El que envía mensajes por mano de un necio se corta los pies y bebe violencia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «palabras» en lugar de «mensajes»; el término hebreo puede significar ambas cosas, pero aquí probablemente se refiere a una comunicación confiada a un mensajero.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְקַצֶּה
  english_pob_choice: cuts off
  chosen_spanish: se corta
  alternatives_spanish:
  - corta
  - mutila
  - se amputa
  lexicon: HALOT
  rationale: El participio de קצה en esta construcción transmite una acción fuerte de cortar o mutilar. En español, «se corta» conserva la fuerza proverbial y la imagen chocante sin añadir más de lo que el hebreo permite.
- source_word: רַגְלַיִם
  english_pob_choice: feet
  chosen_spanish: los pies
  alternatives_spanish:
  - los pies y las piernas
  - las piernas
  lexicon: HALOT
  rationale: El dual hebreo puede abarcar pies o piernas, pero «pies» es el equivalente natural y proverbial en español. Mantiene la imagen concreta del daño auto-infligido.
- source_word: חָמָס
  english_pob_choice: violence
  chosen_spanish: violencia
  alternatives_spanish:
  - daño
  - injusticia
  - agravio
  lexicon: HALOT
  rationale: «Violencia» preserva el sentido concreto de harm/destrucción que la POB ya documenta en inglés y encaja con la imagen de beber algo dañino.
- source_word: שֹׁתֶה
  english_pob_choice: drinks
  chosen_spanish: bebe
  alternatives_spanish:
  - traga
  - ingiere
  - bebe de
  lexicon: HALOT
  rationale: El verbo literal «beber» conserva la metáfora hebrea de tomar dentro de sí el mal. No se suaviza la imagen con una paráfrasis.
- source_word: שֹׁלֵחַ
  english_pob_choice: One who sends
  chosen_spanish: El que envía
  alternatives_spanish:
  - Quien envía
  - El que manda
  - Aquel que envía
  lexicon: HALOT
  rationale: «El que envía» reproduce el participio con fuerza proverbial y sugiere un sujeto genérico, como en la traducción inglesa auditada.
- source_word: דְּבָרִים
  english_pob_choice: messages
  chosen_spanish: mensajes
  alternatives_spanish:
  - palabras
  - asuntos
  - recados
  lexicon: HALOT
  rationale: Aunque literalmente puede significar «palabras», en este contexto de enviar por mano de alguien la referencia más probable es a un mensaje o comunicación confiada a un mensajero. «Mensajes» refleja esa decisión contextual.
- source_word: בְּיָד
  english_pob_choice: by the hand of
  chosen_spanish: por mano de
  alternatives_spanish:
  - por medio de
  - a través de
  - por la mano de
  lexicon: HALOT
  rationale: La expresión idiomática hebrea de agencia se conserva con una forma española clara y natural. «Por mano de» mantiene la imagen concreta sin sonar artificial.
- source_word: כְּסִיל
  english_pob_choice: a fool
  chosen_spanish: un necio
  alternatives_spanish:
  - un insensato
  - un tonto
  - un imbécil
  lexicon: HALOT
  rationale: En la literatura sapiencial, כְּסִיל no es mera falta de inteligencia sino necedad moral y práctica. «Necio» es la opción española más fiel y bíblicamente establecida para ese matiz.
translation_notes:
  revision_awareness: Se corrigió la omisión previa del marcador de nota al integrar [a] directamente en el texto principal. La redacción sigue de cerca el hebreo y la auditoría inglesa, conservando la metáfora de «beber violencia» y la ambigüedad léxica de דְּבָרִים mediante nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma de proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - «Necio» se usa como término sapiencial técnico y coherente con Proverbios.
  - La nota [a] está anclada en «mensajes» para reflejar la alternativa léxica documentada sin alterar el flujo del verso.
