  verdict: revise
  source_alignment_summary: El borrador capta bien la fuerza imprecatoria/jussiva de los yiqtol y preserva el sentido general de vergüenza y retroceso para los que odian a Sión. También conserva correctamente la nota sobre la posible lectura futura. Sin embargo, 'sean echados atrás' no refleja de la manera más fiel ni natural el hebreo וְיִסֹּגוּ אָחוֹר, que expresa retroceder/volverse atrás, no tanto ser 'echados' como objeto de expulsión.
  spanish_quality_summary: El español es comprensible, pero 'sean echados atrás' suena poco idiomático en este contexto bíblico y algo mecánico. Una formulación como 'retrocedan' mejora notablemente la naturalidad y la legibilidad, a la vez que conserva el paralelismo poético. También conviene ajustar la nota para corresponder exactamente con la redacción revisada.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Sión' es apropiado. 'Avergonzados' transmite bien בוש. El principal ajuste léxico necesario es sustituir 'echados atrás' por 'retrocedan' para representar mejor סוּג/נסוג + אָחוֹר en español natural.
  issues:
