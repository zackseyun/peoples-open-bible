- from: Y vive Yahvé[a], que me guardó en el camino por el que anduve, porque mi rostro lo engañó para su destrucción, y no cometió pecado conmigo para mancha y vergüenza.
  to: 'Y vive Yahvé[a], que me guardó en el camino por el que anduve: mi rostro lo engañó para su destrucción, y no cometió pecado conmigo para contaminación y vergüenza.'
  rationale: Se reemplaza «porque» por dos puntos para reflejar mejor la fuerza asseverativa de ὅτι en esta fórmula de juramento y mejorar la naturalidad española. Se cambia «mancha» por «contaminación» para representar con más precisión μίασμα como contaminación/impureza moral y evitar una expresión demasiado débil. Se conserva la nota sobre «mi rostro» porque preserva una literalidad importante del griego y aclara el sentido contextual.
