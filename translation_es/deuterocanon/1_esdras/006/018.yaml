  glossary_alignment: 'La decisión de usar «Yahvé» para κυρίου sigue correctamente la política española del proyecto en contextos que remiten al nombre divino. «Templo» para ναός y «se le ordenó» para ἐπετάγη αὐτῷ también están bien alineados. La única fricción terminológica es σκεύη: «utensilios» es defendible, pero «vasos» preserva mejor el registro cultual tradicional sin volverse oscuro.'
