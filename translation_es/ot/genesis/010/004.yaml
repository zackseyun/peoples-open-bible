translation:
  language: es
  text: 'Y los hijos de Javan: Elisá[a], Tarsis, Kittim y Dodanim.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos y 1 Crónicas 1:7 leen «Rodanim» en lugar de «Dodanim».
