  - marker: b
    text: O «a tu simiente». El hebreo usa un singular colectivo que puede significar descendencia o posteridad.
    reason: lexical_alternative
  revision_rationale: 'La revisión preserva mejor la evidencia fuente y el rastro léxico documentado en inglés: se recupera la doble fuerza de לֵךְ עֲלֵה con «Ve, sube de aquí», se mantiene el vínculo verbal de הֶעֱלִיתָ con «hiciste subir», y se alisa la sintaxis final para un español más natural. También se corrige la nota b para eliminar el anglicismo.'
