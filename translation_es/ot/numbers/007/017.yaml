translation:
  language: es
  text: 'y para el sacrificio de las ofrendas de paz[a]: dos cabezas de ganado, cinco carneros, cinco machos cabríos y cinco corderos de un año. Esta fue la ofrenda de Najsón hijo de Aminadab.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ofrendas de comunión' u 'ofrendas de bienestar' para el término hebreo, que suele designar un sacrificio compartido en comunión y paz.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/זֶבַח
  english_pob_choice: and for the sacrifice of
  chosen_spanish: y para el sacrificio de
  alternatives_spanish:
  - y como sacrificio de
  - y para un sacrificio de
  lexicon: HALOT
  rationale: El prefijo conjuntivo y la preposición introducen otro elemento de la lista. 'Para el sacrificio de' conserva la relación constructa sin añadir matices ajenos.
- source_word: הַשְּׁלָמִים
  english_pob_choice: peace offerings
  chosen_spanish: las ofrendas de paz
  alternatives_spanish:
  - las ofrendas de comunión
  - las ofrendas de bienestar
  lexicon: HALOT
  rationale: En español, 'ofrendas de paz' reproduce de forma breve y reconocible el término sacrificial tradicional, sin borrar que el hebreo admite matices de comunión o bienestar.
- source_word: בָּקָר שְׁנַיִם
  english_pob_choice: two cattle
  chosen_spanish: dos reses
  alternatives_spanish:
  - dos cabezas de ganado
  - dos bovinos
  lexicon: HALOT
  rationale: '''Reses'' expresa bien el colectivo hebreo para ganado vacuno en un registro bíblico-natural. Evita especificar ''toros'' u ''bueyes'' donde el hebreo no lo hace.'
- source_word: אֵילִם חֲמִשָּׁה
  english_pob_choice: five rams
  chosen_spanish: cinco carneros
  alternatives_spanish:
  - cinco rams
  - cinco machos ovinos
  lexicon: HALOT
  rationale: '''Carneros'' es el equivalente español normal y claro para ''rams''.'
- source_word: עַתּוּדִים חֲמִשָּׁה
  english_pob_choice: five male goats
  chosen_spanish: cinco machos cabríos
  alternatives_spanish:
  - cinco cabritos machos
  - cinco chivos
  lexicon: HALOT
  rationale: El hebreo designa machos cabríos; 'machos cabríos' conserva la fuerza lexical y el paralelo con las demás víctimas del inventario.
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה חֲמִשָּׁה
  english_pob_choice: five lambs a year old
  chosen_spanish: cinco corderos de un año
  alternatives_spanish:
  - cinco corderos de año
  - cinco corderos de primer año
  lexicon: HALOT
  rationale: La revisión inglesa aclaró que el hebreo no marca sexo aparte de 'corderos'. 'De un año' reproduce בני שנה con naturalidad y precisión, sin sobretraducir como 'machos'.
- source_word: זֶה קָרְבַּן
  english_pob_choice: This was the offering of
  chosen_spanish: Esta fue la ofrenda de
  alternatives_spanish:
  - Este fue el ofrecimiento de
  - Esta era la ofrenda de
  lexicon: HALOT
  rationale: '''קרבן'' es un término cultual de ''ofrenda''. En español, la formulación narrativa ''Esta fue la ofrenda de'' sigue bien el hebreo sin forzar una perífrasis más pesada.'
- source_word: נַחְשׁוֹן בֶּן עַמִּינָדָב
  english_pob_choice: Nahshon son of Amminadab
  chosen_spanish: Nahsón hijo de Aminadab
  alternatives_spanish:
  - Najsón hijo de Aminadab
  - Nahshón, hijo de Aminadab
  lexicon: HALOT
  rationale: Los nombres propios se transliteran con forma española legible. 'Hijo de' conserva el patronímico estándar.
theological_decisions:
- issue: 'דָּם/אָשָׁם/שְׁלָמִים: el valor cultual de שְׁלָמִים'
  english_pob_reading: peace offerings, with footnote allowing fellowship offerings or offerings of well-being
  chosen_spanish_reading: ofrendas de paz, con nota que permite 'ofrendas de comunión' u 'ofrendas de bienestar'
  alternative_spanish_readings:
  - ofrendas de comunión
  - ofrendas de bienestar
  rationale: El término hebreo admite un campo semántico más amplio que 'paz' en sentido moderno. Mantener 'paz' sigue la tradición y la brevedad, mientras la nota preserva las alternativas semánticas documentadas.
  doctrine_reference: Levítico 3; Números 7:17
- issue: Especificación de sexo en los corderos
  english_pob_reading: five lambs a year old
  chosen_spanish_reading: cinco corderos de un año
  alternative_spanish_readings:
  - cinco corderos machos de un año
  - cinco corderos de primer año
  rationale: 'La revisión inglesa corrige la sobreespecificación de sexo: el hebreo solo indica ''corderos, hijos de un año''. La traducción española sigue esa precisión y evita añadir un dato no presente.'
  doctrine_reference: Números 7:17; comparación textual con el hebreo
translation_notes:
  revision_awareness: El borrador sigue la última revisión inglesa que corrigió 'five male lambs a year old' a 'five lambs a year old', reconociendo que el hebreo no especifica sexo en כְּבָשִׂים בְּנֵי שָׁנָה. También mantiene la alternativa lexical para שְׁלָמִים documentada en el aparato inglés, sin traducir mecánicamente desde el inglés cuando el hebreo exige mayor precisión.
  spanish_consistency_notes:
  - Se usa 'ofrendas de paz' como término principal, con nota alternativa para preservar el campo semántico.
  - '''Reses'' evita sobreinterpretar בָּקָר como ''bueyes'' u ''toros''.'
  - Se mantiene la secuencia numérica y el paralelismo del inventario sacrificial.
  - 'Los nombres propios siguen una transliteración española consistente: Nahsón, Aminadab.'
