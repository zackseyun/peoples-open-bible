review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: deseo/jussivo inicial, magnificación del nombre divino, confesión «Yahvé de los ejércitos es Dios sobre Israel», y afirmación sobre la casa de David delante de Dios. También conserva correctamente «Yahvé» y «casa». Sin embargo, en la segunda cláusula se pierde la fuerza volitiva paralela de יִהְיֶה נָכוֹן en contexto de oración al traducirlo como futuro indicativo «será establecida» en vez de una forma desiderativa como «sea afirmada/establecida».'
  spanish_quality_summary: El español es claro y digno. «Sea engrandecido» y «para siempre» funcionan bien. La principal mejora es mantener el paralelismo oracional con «y sea afirmada/establecida». Además, el pie b está anclado en «diciendo», pero su contenido explica «casa»; el marcador debe moverse a «casa».
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; אֱלֹהִים -> «Dios»; עַל -> «sobre» defendible; בַּיִת -> «casa» con nota dinástica, adecuado. No hay conflicto doctrinal. La única desalineación significativa es gramatical: el español debería preservar mejor el valor volitivo de la segunda predicación.'
  issues:
  - severity: medium
    issue: «será establecida» convierte en futuro indicativo una cláusula que en contexto de oración funciona como deseo/volición paralela.
    rationale: Aunque יִהְיֶה puede ser formalmente imperfecto, en esta secuencia con jussivo/prayer language conviene en español una formulación como «sea afirmada» o «sea establecida» para mantener el paralelismo con «sea engrandecido» y con la traducción inglesa auditada («may ... be established»).
  - severity: medium
    issue: El marcador [b] está colocado en «diciendo», pero la nota trata sobre «casa».
    rationale: Las notas deben anclarse exactamente en la palabra o frase relevante. La nota cultural explica el sentido dinástico de «casa», no el quotativo «diciendo».
  revised_spanish_text: 'Y sea engrandecido tu nombre para siempre[a], diciendo: «Yahvé de los ejércitos es Dios sobre Israel», y sea afirmada la casa[b] de tu siervo David delante de ti.'
  revised_footnotes:
