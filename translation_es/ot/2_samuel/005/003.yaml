translation:
  language: es
  text: Entonces todos los ancianos de Israel vinieron al rey en Hebrón, y el rey David hizo un pacto[a] con ellos en Hebrón, delante de Yahvé[b], y ungieron a David como rey sobre Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, 'cortó un pacto', una expresión idiomática que significa 'hizo un pacto'.
    reason: lexical_alternative
  - marker: b
    text: O 'ante Yahvé' o 'en presencia de Yahvé'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: came
  chosen_spanish: fueron
  alternatives_spanish:
  - vinieron
  - llegaron
  lexicon: HALOT
  rationale: En este contexto narrativo, el movimiento se entiende hacia Hebrón y la frase siguiente ya identifica el lugar; en español, 'fueron' comunica bien el desplazamiento colectivo sin forzar un calco de dirección.
- source_word: כָּל זִקְנֵי יִשְׂרָאֵל
  english_pob_choice: all the elders of Israel
  chosen_spanish: todos los ancianos de Israel
  alternatives_spanish:
  - todos los dirigentes de Israel
  - todos los mayores de Israel
  lexicon: HALOT
  rationale: '''Ancianos'' conserva la referencia a liderazgo tribal/senior y mantiene la amplitud de כָּל sin suavizar el término.'
- source_word: אֶל הַמֶּלֶךְ חֶבְרוֹנָה
  english_pob_choice: to the king at Hebron
  chosen_spanish: al rey en Hebrón
  alternatives_spanish:
  - hasta el rey en Hebrón
  - al rey, en Hebrón
  lexicon: HALOT
  rationale: El sufijo direccional de Hebrón indica movimiento hacia ese lugar; 'al rey en Hebrón' suena natural en español y conserva que el rey estaba allí.
- source_word: וַיִּכְרֹת ... בְּרִית
  english_pob_choice: made a covenant
  chosen_spanish: hizo un pacto
  alternatives_spanish:
  - concertó un pacto
  - selló un pacto
  lexicon: HALOT
  rationale: '''Hizo un pacto'' transmite el idiomático כרת ברית sin la literalidad extraña de ''cortar un pacto''; en español bíblico, ''pacto'' preserva la solemnidad del acuerdo.'
- source_word: לָהֶם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - para ellos
  lexicon: HALOT
  rationale: Con כרת ברית, la relación es claramente recíproca; 'con ellos' expresa mejor el sentido que 'para ellos'.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino, y 'delante de' conserva el marco solemne/covenantal del acto sin perder naturalidad.
- source_word: וַיִּמְשְׁחוּ
  english_pob_choice: they anointed
  chosen_spanish: ungieron
  alternatives_spanish:
  - consagraron con aceite
  - lo proclamaron
  lexicon: HALOT
  rationale: '''Ungieron'' es la forma directa y precisa para el rito real; evita diluir el acto político-sacral de la unción.'
- source_word: לְמֶלֶךְ עַל יִשְׂרָאֵל
  english_pob_choice: king over Israel
  chosen_spanish: como rey sobre Israel
  alternatives_spanish:
  - rey sobre Israel
  - para ser rey sobre Israel
  lexicon: HALOT
  rationale: '''Como rey sobre Israel'' comunica la investidura real con claridad en español y refleja la función de gobierno sobre Israel.'
- source_word: הַמֶּלֶךְ דָּוִד
  english_pob_choice: King David
  chosen_spanish: el rey David
  alternatives_spanish:
  - rey David
  - David, el rey
  lexicon: HALOT
  rationale: La apposición hebrea se naturaliza en español como 'el rey David', una construcción clara y fiel.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: before Yahweh
  chosen_spanish_reading: delante de Yahvé
  alternative_spanish_readings:
  - ante Yahvé
  - en presencia de Yahvé
  rationale: Se mantiene el Tetragrámaton según la norma del proyecto, en vez de ocultarlo con 'SEÑOR'; 'delante de' conserva el valor ceremonial y testimonial del acto pactal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Naturaleza del acto de בְּרִית
  english_pob_reading: made a covenant
  chosen_spanish_reading: hizo un pacto
  alternative_spanish_readings:
  - selló un pacto
  - concertó un pacto
  rationale: '''Pacto'' preserva el peso jurídico-teológico del acuerdo entre David y los ancianos; evita términos más débiles como ''acuerdo'' o ''trato''.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El texto coincide sustancialmente con el sentido y la estructura del pasaje hebreo y con el audit trail inglés: llegada de los ancianos, pacto real en Hebrón ante Yahvé, y unción de David como rey sobre Israel. Se adoptó un español natural sin perder la fuerza ceremonial y política del episodio.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - Se eligió 'pacto' para בְּרִית por su carga bíblica y jurídica.
  - '''Ungieron'' mantiene el rito de investidura real sin paraphrasearlo.'
  - La puntuación reproduce tres miembros coordinados, como en el hebreo y en el inglés auditado.
