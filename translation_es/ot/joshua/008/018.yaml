translation:
  language: es
  text: 'Entonces Yahvé le dijo a Josué: «Extiende la jabalina[a] que está en tu mano hacia Hai, porque yo la entregaré en tu mano». Y Josué extendió la jabalina que estaba en su mano hacia la ciudad.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lanza». El hebreo כִּידוֹן puede referirse a un arma que, según el contexto, se vierte como «jabalina», «lanza» o «venablo».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: Se sigue el nombre divino explícito del hebreo y el criterio del proyecto para el Tetragrámaton. «Yahvé» preserva el nombre de pacto sin sustituirlo por una convención de máscara editorial.
- source_word: נְטֵה / וַיֵּט
  english_pob_choice: Stretch out / stretched out
  chosen_spanish: extiende / extendió
  alternatives_spanish:
  - alza / alzó
  - tiende / tendió
  - estira / estiró
  lexicon: HALOT
  rationale: El verbo expresa un gesto físico de extender o alargar. En español, «extender» comunica con naturalidad la acción sin reducirla a «señalar» ni forzar un matiz técnico de lanzamiento.
- source_word: כִּידוֹן
  english_pob_choice: javelin
  chosen_spanish: jabalina
  alternatives_spanish:
  - lanza
  - sable
  - venablo
  lexicon: HALOT
  rationale: El término hebreo designa un arma arrojadiza o de empuje, y el inglés POB optó por «javelin» para conservar esa precisión. «Jabalina» es el equivalente español más cercano y mantiene el matiz de arma ligera.
- source_word: אֲשֶׁר בְּיָדְךָ / אֲשֶׁר בְּיָדוֹ
  english_pob_choice: that is in your hand / that was in his hand
  chosen_spanish: que está en tu mano / que estaba en su mano
  alternatives_spanish:
  - que tienes en la mano / que tenía en la mano
  - en tu mano / en su mano
  lexicon: HALOT
  rationale: Se conserva la cláusula relativa explícita del hebreo. El cambio de presente en el discurso a pasado en la narración queda bien reflejado en español y evita suavizar la referencia concreta al arma.
- source_word: אֶל הָעַי
  english_pob_choice: toward Ai
  chosen_spanish: hacia Hai
  alternatives_spanish:
  - contra Hai
  - a Hai
  lexicon: HALOT
  rationale: La preposición marca dirección. «Hacia Hai» preserva el valor direccional del gesto sin añadir un matiz hostil que el hebreo no exige de por sí.
- source_word: כִּי בְיָדְךָ אֶתְּנֶנָּה
  english_pob_choice: for I will give it into your hand
  chosen_spanish: porque yo la entregaré en tu mano
  alternatives_spanish:
  - pues la pondré en tu mano
  - porque yo la daré en tu mano
  lexicon: HALOT
  rationale: Se mantiene el idiomatismo hebreo de entrega en manos de alguien. «Entregaré en tu mano» conserva la idea de poner bajo poder o dominio; el pronombre femenino se refleja con «la» por referencia a la ciudad.
- source_word: אֶל הָעִיר
  english_pob_choice: toward the city
  chosen_spanish: hacia la ciudad
  alternatives_spanish:
  - hacia Hai
  - contra la ciudad
  lexicon: HALOT
  rationale: El hebreo pasa del topónimo «Ai» a «la ciudad». Se preserva esa variación textual con «la ciudad» en lugar de armonizarla de nuevo con el nombre propio.
theological_decisions:
- issue: Rendering the divine name YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: El texto hebreo usa יְהוָה de forma directa. La elección «Yahvé» sigue la política del proyecto de conservar el nombre divino revelado, en vez de ocultarlo tras una sustitución devocional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se documentaron cambios en el pasaje inglés, y el cotejo cruzado reporta alto acuerdo. La versión española sigue la misma lectura léxica y no introduce decisiones no respaldadas por el paquete fuente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino conforme al estándar del proyecto.
  - Se conserva la distinción entre «Hai» (topónimo) y «la ciudad» (referencia descriptiva) como en el hebreo.
  - El femenino de אֶתְּנֶנָּה se refleja con «la» por la referencia a la ciudad.
  - «Jabalina» se usa de forma consistente para el arma; la nota permite la alternativa «lanza» sin imponerla en el texto principal.
