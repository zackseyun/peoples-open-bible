translation:
  language: es
  text: 'Abner se volvió y dijo[a]: «¿Eres tú, Asael?» Y él respondió: «Soy yo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¿Eres tú este, Asael?»'
