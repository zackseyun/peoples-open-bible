review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo: presenta el toro como víctima expiatoria y describe correctamente el gesto de Aarón y sus hijos poniendo las manos sobre su cabeza, sin añadir explicación teológica. Sin embargo, «hizo acercar» suena forzado en español para וַיַּגֵּשׁ; el sentido ritual se preserva mejor con «presentó», que además está documentado en la auditoría inglesa como alternativa válida.'
  spanish_quality_summary: La frase es clara, pero «Entonces él hizo acercar» es poco natural y algo calcada. «Entonces presentó» mantiene el tono digno y la legibilidad eclesial. El resto del verso fluye bien en español y conserva el registro cultual.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Toro» para פַּר y «por el pecado» para חַטָּאת en sentido sacrificial son aceptables. «Pusieron las manos» preserva el acto ritual sin interpretar su significado. La única mejora necesaria es ajustar וַיַּגֵּשׁ a un español más idiomático.
  issues:
  - severity: medium
    issue: «hizo acercar» es una formulación poco idiomática en español
    rationale: Aunque refleja de cerca «brought near», en español bíblico-natural suena rígido y menos legible. «Presentó» conserva el valor ritual de acercar/presentar la víctima sin perder fidelidad.
  - severity: low
    issue: La nota al pie principal puede simplificarse tras el cambio
    rationale: Si el texto usa «presentó», la alternativa «hizo acercar» puede quedar en nota como posibilidad, junto con «hizo traer adelante» o mejor «trajo adelante/bajo adelante» según estilo; conviene que la nota corresponda exactamente al texto revisado.
  revised_spanish_text: Entonces presentó el toro del sacrificio por el pecado[a], y Aarón y sus hijos pusieron las manos sobre la cabeza del toro del sacrificio por el pecado.
