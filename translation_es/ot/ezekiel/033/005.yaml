review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: oír la señal, no responder a la advertencia, responsabilidad personal por la muerte, y el contraste con quien sí responde y salva su vida. Sin embargo, varias elecciones españolas no preservan con suficiente fidelidad ni naturalidad las decisiones auditadas: שׁוֹפָר se aleja innecesariamente de la imagen base con ''cuerno de alarma''; נִזְהָר queda poco idiomático con ''tomó advertencia''; y דָּמוֹ בּוֹ יִהְיֶה no se expresa bien con ''su sangre caerá sobre él'', que sugiere otra imagen y además omite el matiz reflexivo/personal del hebreo y del POB inglés (''upon himself'').'
  spanish_quality_summary: 'El español es comprensible, pero contiene giros poco naturales o poco bíblicamente claros: ''tomó advertencia'' no suena idiomático en español general; ''cuerno de alarma'' es explicativo pero extraño en registro bíblico; ''su sangre caerá sobre él'' suena menos estable que el modismo tradicional y jurídico ''su sangre estará sobre él mismo'' o ''recaerá sobre él mismo''. Una redacción más natural y fiel mejora la legibilidad sin perder dignidad.'
  glossary_alignment: No hay conflicto con términos de alto nivel como Yahvé/Mesías, pero sí con la pauta de no apartarse del sentido fuente sin necesidad. Conviene mantener 'trompeta' para שׁוֹפָר en este contexto, porque es la opción ya auditada en inglés y la más clara en español eclesial. Para נִזְהָר, 'hizo caso de la advertencia' o 'atendió la advertencia' comunica mejor la respuesta responsable que el poco idiomático 'tomó advertencia'. Para נַפְשׁוֹ, 'su vida' está bien y coincide con la justificación auditada.
  issues:
  - severity: medium
    issue: '''cuerno de alarma'' para קוֹל הַשּׁוֹפָר'
    rationale: Aunque intenta reflejar la función del shofar, en español suena forzado y menos reconocible que 'trompeta'. El POB inglés auditó 'the sound of the trumpet', y 'el sonido de la trompeta' preserva mejor la construcción hebrea y la legibilidad eclesial.
  - severity: high
    issue: '''tomó advertencia'' para נִזְהָר'
    rationale: No es un giro idiomático normal en español. El hebreo expresa responder a la advertencia; 'hizo caso de la advertencia' transmite mejor el valor responsivo y la responsabilidad personal preservada en el inglés 'take warning'.
  - severity: high
    issue: '''su sangre caerá sobre él'' para דָּמוֹ בּוֹ יִהְיֶה'
    rationale: '''Caerá sobre él'' cambia la imagen y no refleja bien el modismo jurídico de responsabilidad personal. Además, el hebreo y el POB inglés apuntan a reflexividad (''upon himself''). ''Su sangre estará sobre él mismo'' conserva mejor el modismo y su fuerza moral-jurídica.'
  - severity: low
    issue: Nota [a] anclada a 'tomó advertencia' pero explica la frase de la sangre
    rationale: La nota alternativa trata sobre 'su sangre...'; por disciplina editorial, debe anclarse en la frase correspondiente, no en otra expresión distinta.
  revised_spanish_text: Oyó el sonido de la trompeta y no hizo caso de la advertencia; su sangre estará sobre él mismo[a]. Pero si hace caso de la advertencia[b], salvará su vida.
  revised_footnotes:
