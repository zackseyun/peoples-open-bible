base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/019/005.yaml
  text: They went and told David about the men[a], and he sent to meet them, because the men were greatly humiliated. And the king said, “Stay in Jericho until your beards have grown back[b], then return.”
  footnotes:
