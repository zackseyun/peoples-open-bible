  to: Lavó las entrañas[a] y las patas con agua, y Moisés quemó todo el carnero sobre el altar. Era un holocausto de aroma agradable, una ofrenda hecha por fuego para Yahvé, tal como Yahvé había mandado a Moisés.
  rationale: Se corrige הַקֶּרֶב a 'entrañas' para reflejar fielmente las partes internas del animal; se recoloca correctamente la nota; se mejora אִשֶּׁה a 'ofrenda hecha por fuego' por fidelidad léxica y naturalidad; y se pule la sintaxis sacrificial a 'holocausto de aroma agradable' y 'tal como' para mejor español sin apartarse del hebreo. No requiere adjudicación adicional porque son ajustes claros de fidelidad y estilo.
