revisions:
- from: 'En sus días, Judá será salvado[a], e Israel habitará seguro[b]; y este es el nombre por el cual será llamado: Yahvé es nuestra justicia.'
  to: 'En sus días, Judá será salvo, e Israel habitará seguro; y este es el nombre por el cual será llamado: Yahvé es nuestra rectitud[a].[b]'
  rationale: 'Se corrige el texto para alinearlo con la evidencia fuente y la auditoría inglesa: se mantiene la fórmula hebrea y el uso de «Yahvé», se mejora la naturalidad con «será salvo», y se reubican las notas para que documenten correctamente las dos alternativas preservadas por la POB inglesa, ambas relacionadas con el título final. Se elige «rectitud» como equivalente principal de צִדְקֵנוּ para reflejar mejor la preferencia auditada por «righteousness», dejando «justicia» en nota como alternativa semánticamente válida.'
