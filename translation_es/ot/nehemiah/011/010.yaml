translation:
  language: es
  text: 'De entre los sacerdotes: Jedaías hijo de Joyarib[a], Jachín.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente la lista nombra dos casas o representantes sacerdotales: «Jedaías, hijo de Joyarib; Jachín». El hebreo es muy breve y no incluye una conjunción explícita.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִן
  english_pob_choice: From
  chosen_spanish: De entre
  alternatives_spanish:
  - De
  - Entre
  lexicon: HALOT
  rationale: En una lista de personas pertenecientes a un grupo, 'de entre' expresa mejor la idea de procedencia o pertenencia dentro del conjunto que un simple 'de'. Mantiene el valor de selección de la preposición sin volverla pesada.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes-levitas
  - el sacerdocio
  lexicon: HALOT
  rationale: El sustantivo plural definido designa a los miembros del grupo sacerdotal. En español bíblico actual, 'sacerdotes' es claro y natural; 'sacerdocio' sonaría más abstracto y menos adecuado para una lista de nombres.
- source_word: יְדַעְיָה
  english_pob_choice: Jedaiah
  chosen_spanish: Jedaías
  alternatives_spanish:
  - Yedaías
  - Jedaya
  lexicon: nombre propio
  rationale: Se translitera como nombre propio con la forma española usual 'Jedaías', conservando la identificación del personaje y una lectura fluida en español.
- source_word: בֶן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En listas genealógicas y de registro, el sentido más transparente es filiación inmediata. 'Descendiente de' sería posible, pero diluye la relación directa que la fórmula corta sugiere.
- source_word: יוֹיָרִיב
  english_pob_choice: Joiarib
  chosen_spanish: Joiarib
  alternatives_spanish:
  - Joyarib
  - Yoiarib
  lexicon: nombre propio
  rationale: Nombre propio transliterado en una forma reconocible para lectores hispanohablantes, manteniendo la convención estable del inglés POB sin forzar una adaptación innecesaria.
- source_word: יָכִין
  english_pob_choice: Jachin
  chosen_spanish: Jaqín
  alternatives_spanish:
  - Jachín
  - Jachin
  lexicon: nombre propio
  rationale: Se conserva como nombre propio. La forma 'Jaqín' refleja mejor la pronunciación española con una grafía breve y consistente; el hebreo aquí funciona como nombre coordinado y no como verbo o sustantivo común.
translation_notes:
  revision_awareness: 'La revisión inglesa estandarizó el segundo nombre como ''Jachin'' sin cambiar la estructura ni el sentido. En español, se mantiene la misma apertura interpretativa del hebreo: la puntuación puede leerse como una sola línea genealógica o como dos nombres coordinados en una lista sacerdotal tersa.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma estándar para el nombre divino en el proyecto, pero este versículo no lo contiene.
  - '''Jedaías'' y ''Joiarib'' se usan como transliteraciones españolas consistentes con nombres propios hebreos.'
  - 'La nota conserva la tensión textual documentada por el POB: la ausencia de conjunción en el hebreo permite más de una lectura.'
