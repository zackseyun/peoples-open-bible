  text: וְ/יֹֽשְׁבֵי/הֶן֙ קִצְרֵי יָ֔ד חַ֖תּוּ וָ/בֹ֑שׁוּ הָי֞וּ עֵ֤שֶׂב שָׂדֶה֙ וִ֣/ירַק דֶּ֔שֶׁא חֲצִ֣יר גַּגּ֔וֹת וּ/שְׁדֵמָ֖ה לִ/פְנֵ֥י קָמָֽה־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/037/027.yaml
  text: And their inhabitants were powerless[a]; they were dismayed and put to shame. They were like the grass of the field and green growth, like grass on the housetops[c][b], and like a field before the standing grain.
  footnotes:
  - marker: a
    text: Or 'were dismayed and ashamed.' The Hebrew verbs can emphasize inward dismay as well as being broken or shattered.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'short of hand,' an idiom meaning lacking power or ability.
    reason: lexical_alternative
  - marker: c
    text: The final phrase is difficult. It likely refers to vegetation or a field blighted before the crop stands mature; compare the parallel in 2 Kings 19:26.
    reason: lexical_alternative
