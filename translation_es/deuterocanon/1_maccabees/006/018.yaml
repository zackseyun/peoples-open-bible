review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja en líneas generales el sentido del griego y del audit trail inglés: nombrar a Eupátor, describir a los de la fortaleza/ciudadela cercando a Israel en torno al área sagrada, procurando daño de manera continua y sirviendo de apoyo a las naciones. Sin embargo, varias decisiones españolas no son las más fieles ni las más naturales: «acrópolis» no comunica bien ἄκρα en este contexto macabeo, «buscando mal» suena poco idiomático en español, y la nota [a] sobre la tilde del nombre no corresponde a una alternativa preservada por el POB inglés ni es necesaria para aclarar el sentido.'
  spanish_quality_summary: 'El texto es comprensible, pero tiene giros algo rígidos o poco naturales para español bíblico claro: «los de la acrópolis» suena helenizante y menos transparente que «los de la ciudadela»; «buscando mal continuamente» es torpe; «siendo un apoyo» funciona, aunque «sirviendo de apoyo» enlaza mejor con el participio griego. «Alrededor de los lugares santos» es defendible, pero «lugares santos» puede sonar extraño; conviene mantenerlo con nota alternativa al «santuario», como ya documenta el audit trail.'
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Las naciones» para ἔθνεσιν está bien alineado con la decisión inglesa. El principal ajuste léxico es reemplazar «acrópolis» por «ciudadela» para reflejar mejor ἄκρα en 1 Macabeos y mejorar legibilidad. También conviene hacer más idiomática la expresión de ζητοῦντες κακὰ sin perder su fuerza hostil.
  issues:
  - severity: medium
    issue: «los de la acrópolis» para οἱ ἐκ τῆς ἄκρας
    rationale: Aunque etimológicamente posible, en este contexto de 1 Macabeos ἄκρα designa la fortaleza/citadela de Jerusalén. «Acrópolis» en español suena demasiado especializado y menos claro para lectores generales; «ciudadela» preserva mejor el referente histórico y coincide más de cerca con el audit trail.
  - severity: medium
    issue: «buscando mal» para ζητοῦντες κακὰ
    rationale: Es cercano al griego, pero en español resulta poco idiomático y algo opaco. Una forma como «procurando daño» o «buscando hacer daño» transmite mejor la intención hostil sin paráfrasis excesiva.
  - severity: low
    issue: Nota [a] sobre «Eupátor/Eupator» innecesaria
    rationale: El POB inglés no preserva aquí una alternativa de sentido sobre el nombre, sino solo la transliteración. La nota española introduce una explicación ortográfica secundaria que no ayuda a resolver una ambigüedad exegética o léxica relevante.
  revised_spanish_text: Le puso por nombre Eupátor. Y los de la ciudadela iban cercando a Israel alrededor de los lugares santos[a], procurando daño continuamente y sirviendo de apoyo a las naciones.
  revised_footnotes:
  - marker: a
    text: O «alrededor del santuario»; el griego dice literalmente «las cosas/lugares santos», probablemente aludiendo al área del templo.
    reason: lexical_alternative
  revision_rationale: Se ajusta «Le puso por nombre» para expresar con naturalidad el giro de asignación de nombre; se reemplaza «acrópolis» por «ciudadela» por fidelidad contextual y claridad; se mejora «buscando mal» a «procurando daño» para un español más idiomático sin perder el matiz hostil; se elimina la nota ortográfica innecesaria sobre el nombre y se conserva únicamente la nota útil sobre «los lugares santos/santuario».
