revisions:
- from: 'Entonces Moisés y Aarón reunieron a la congregación delante de la roca[a], y él les dijo: «Escuchen ahora, rebeldes: ¿sacaremos agua para ustedes de esta roca?»'
  to: 'Entonces Moisés y Aarón reunieron a la congregación delante de la roca, y les dijo: «Escuchen ahora, rebeldes: ¿sacaremos[a] agua para ustedes de esta roca?»'
