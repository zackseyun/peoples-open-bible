translation:
  language: es
  text: 'También anteriormente[a], cuando Saúl era rey sobre nosotros, tú eras el que guiaba a Israel en sus salidas y entradas[b]. Y Yahvé te dijo: «Pastorearás[c] a mi pueblo Israel, y serás gobernante[d] sobre Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «también ayer y también anteayer»; es un modismo que significa «anteriormente» o «desde hace tiempo».
    reason: lexical_alternative
  - marker: b
    text: O «sacabas a Israel y lo hacías entrar». Es un modismo hebreo para dirigir al pueblo en sus asuntos, especialmente en contexto militar.
    reason: lexical_alternative
  - marker: c
    text: O «apacentarás». El hebreo usa lenguaje de pastoreo como metáfora real para el gobierno del pueblo de Dios.
    reason: lexical_alternative
  - marker: d
    text: O «líder» o «príncipe»; el término hebreo difiere de la palabra usual para «rey».
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם אֶתְמוֹל גַּם שִׁלְשׁוֹם
  english_pob_choice: Also previously
  chosen_spanish: También anteriormente
  alternatives_spanish:
  - También antes
  - Incluso antes
  - Desde antes
  lexicon: HALOT
  rationale: El hebreo es un modismo temporal literal, ‘también ayer, también anteayer’, con sentido de ‘desde antes’ o ‘ya desde hace tiempo’. ‘También anteriormente’ conserva ese valor idiomático sin calco forzado y sin expandir demasiado el alcance temporal.
- source_word: בִּהְיוֹת שָׁאוּל מֶלֶךְ עָלֵינוּ
  english_pob_choice: when Saul was king over us
  chosen_spanish: cuando Saúl era rey sobre nosotros
  alternatives_spanish:
  - mientras Saúl era rey sobre nosotros
  - en tiempos de Saúl, cuando era rey sobre nosotros
  lexicon: HALOT
  rationale: La construcción temporal con בְּ se expresa naturalmente con ‘cuando’. ‘Era rey sobre nosotros’ preserva la relación política y el orden del hebreo.
- source_word: אַתָּה
  english_pob_choice: you were the one
  chosen_spanish: tú eras el que
  alternatives_spanish:
  - fuiste tú quien
  - tú
  lexicon: HALOT
  rationale: El pronombre independiente es enfático. ‘Tú eras el que’ mantiene el énfasis en español sin sonar artificial.
- source_word: מוציא וְהַמֵּבִיא
  english_pob_choice: led Israel out and brought them in
  chosen_spanish: sacabas a Israel y lo traías de vuelta
  alternatives_spanish:
  - sacabas a Israel y lo introducías
  - guiabas a Israel en sus salidas y entradas
  - llevabas a Israel fuera y lo traías dentro
  lexicon: HALOT
  rationale: El par verbal es un modismo de liderazgo y conducción del pueblo. ‘Sacabas... y lo traías de vuelta’ conserva la imagen de ida y regreso y resulta natural en español, sin borrar la fuerza idiomática.
- source_word: וַיֹּאמֶר יְהוָה
  english_pob_choice: And Yahweh said
  chosen_spanish: Y Yahvé te dijo
  alternatives_spanish:
  - Y Yahvé dijo
  - Y el Señor te dijo
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se conserva el nombre divino como ‘Yahvé’ según la norma del proyecto, evitando el masking litúrgico. El perfecto narrativo se vierte con ‘te dijo’ para mantener naturalidad.
- source_word: תִרְעֶה
  english_pob_choice: You shall shepherd
  chosen_spanish: pastorearás
  alternatives_spanish:
  - apacentarás
  - pastorearás a
  - serás pastor de
  lexicon: HALOT
  rationale: El verbo רעה conserva el campo metafórico de pastor/gobierno. ‘Pastorearás’ mantiene la imagen pastoral y su sentido de gobierno divinamente asignado.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: a mi pueblo
  alternatives_spanish:
  - mi pueblo
  - sobre mi pueblo
  lexicon: HALOT
  rationale: La referencia posesiva del pacto se conserva de modo directo en español con ‘mi pueblo’.
- source_word: נָגִיד
  english_pob_choice: ruler
  chosen_spanish: gobernante
  alternatives_spanish:
  - líder
  - príncipe
  - jefe
  lexicon: HALOT
  rationale: נָגִיד no coincide exactamente con el término usual para ‘rey’. ‘Gobernante’ comunica autoridad real sin introducir una equivalencia más estrecha de la que el hebreo exige.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton; por la política del proyecto se traduce como ‘Yahvé’ y no como una sustitución reverencial. Esto preserva el nombre de pacto y evita ocultar la referencia original.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Metáfora real-pastoral en תִרְעֶה
  english_pob_reading: You shall shepherd my people Israel
  chosen_spanish_reading: pastorearás a mi pueblo Israel
  alternative_spanish_readings:
  - gobernarás a mi pueblo Israel
  - serás pastor de mi pueblo Israel
  rationale: La metáfora de pastoreo para la realeza se mantiene, porque el hebreo no habla solo de administración política sino de conducción pastoral bajo mandato divino. ‘Pastorearás’ conserva esa tensión sin reducirla a ‘gobernar’.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Diferencia entre נָגִיד y el término usual para ‘rey’
  english_pob_reading: ruler
  chosen_spanish_reading: gobernante
  alternative_spanish_readings:
  - líder
  - príncipe
  rationale: נָגִיד señala una figura de autoridad designada, distinta del término normal para ‘rey’. ‘Gobernante’ preserva esa distinción sin cargar una connotación monárquica más específica de la que el hebreo presenta.
  doctrine_reference: HALOT; DOCTRINE.md lexical distinction notes
translation_notes:
  revision_awareness: 'La redacción sigue el último estado auditado en inglés, que consolidó el modismo temporal como ‘Also previously’ y mantuvo la metáfora pastoral de תִרְעֶה. En español se preserva esa misma línea: un temporal idiomático natural (‘También anteriormente’), el par verbal de conducción del pueblo, el nombre divino ‘Yahvé’ y la distinción entre la metáfora de pastoreo y el título funcional de autoridad.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ de manera consistente con la política del proyecto para יְהוָה.
  - Se mantuvo ‘Israel’ sin expansión explicativa, siguiendo el hebreo.
  - ‘Pastorearás’ conserva la metáfora; la nota ofrece la alternativa ‘apacentarás’ sin borrar el matiz pastoral.
  - ‘Gobernante’ evita igualar נָגִיד con ‘rey’, manteniendo la distinción lexical documentada.
