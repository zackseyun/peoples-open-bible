  text: וְ/לֹא יִזְבְּח֥וּ עוֹד֙ אֶת זִבְחֵי/הֶ֔ם לַ/שְּׂעִירִ֕ם אֲשֶׁ֛ר הֵ֥ם זֹנִ֖ים אַחֲרֵי/הֶ֑ם חֻקַּ֥ת עוֹלָ֛ם תִּֽהְיֶה זֹּ֥את לָ/הֶ֖ם לְ/דֹרֹתָֽ/ם־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/017/007.yaml
  text: They shall no longer sacrifice their sacrifices to the goat-demons[a], after whom they prostitute themselves[c][b]. This shall be a permanent statute for them throughout their generations.
  footnotes:
  - marker: a
    text: Or 'to the goat idols' or 'to the satyrs'; the Hebrew term refers to goat-like beings associated with illicit worship.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'after which they prostitute themselves,' a metaphor for religious unfaithfulness or idolatry.
    reason: cultural_note
  - marker: c
    text: Or 'an everlasting statute' or 'a perpetual statute.'
    reason: lexical_alternative
