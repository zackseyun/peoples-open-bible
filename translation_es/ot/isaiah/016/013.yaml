lexical_decisions:
- source_word: זֶה
  english_pob_choice: This is
  chosen_spanish: Esta es
  alternatives_spanish:
  - Esto es
  - Esta era
  lexicon: HALOT
  rationale: El demostrativo introduce una fórmula de conclusión o resumen. En español, «Esta es» conserva la fuerza deíctica presente del hebreo sin forzar un pasado innecesario.
- source_word: הַדָּבָר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el asunto
  - el mensaje
  lexicon: HALOT
  rationale: דָּבָר puede significar «palabra», «asunto» o «mensaje». Aquí funciona como introducción de un pronunciamiento profético; «la palabra» preserva el giro formal y también suena natural en español bíblico moderno.
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  lexicon: HALOT
  rationale: Es la equivalencia más natural del relativo hebreo en español contemporáneo y mantiene la relación sintáctica sin carga interpretativa adicional.
- source_word: דִּבֶּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - declaró
  lexicon: HALOT
  rationale: El verbo hebreo comunica acto de hablar. «Habló» conserva la sobriedad del original y evita añadir énfasis que «declaró» podría sugerir.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se conserva el nombre divino según la directriz del proyecto. En español, «Yahvé» reproduce la transliteración del Tetragrámaton y evita la sustitución por un título.
- source_word: אֶל מוֹאָב
  english_pob_choice: concerning Moab
  chosen_spanish: acerca de Moab
  alternatives_spanish:
  - para Moab
  - contra Moab
  lexicon: HALOT
  rationale: El hebreo אֶל, en este encabezado profético, señala referencia temática más que dirección literal. «Acerca de» expresa el sentido del oráculo sobre Moab sin añadir hostilidad no explícita.
- source_word: מֵאָז
  english_pob_choice: in time past
  chosen_spanish: en tiempo pasado
  alternatives_spanish:
  - desde entonces
  - antiguamente
  - hace tiempo
  lexicon: HALOT
  rationale: La forma adverbial marca anterioridad respecto a la enunciación actual. «En tiempo pasado» conserva el valor temporal y la apertura del original; no obliga a una lectura demasiado idiomática como «antiguamente».
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Nombre divino. La traducción mantiene su valor propio en lugar de sustituirlo por un título, siguiendo la doctrina del proyecto sobre יְהוָה.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Force of אֶל with Moab in an oracle heading
  english_pob_reading: concerning Moab
  chosen_spanish_reading: acerca de Moab
  alternative_spanish_readings:
  - a Moab
  - contra Moab
  rationale: En esta fórmula de encabezado profético, la preposición funciona de modo referencial. «Acerca de» evita convertir el matiz en dirección literal («a Moab») o en adversidad explícita («contra Moab»).
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: El registro coincide con el pasaje fuente y con la evaluación de alta concordancia del audit trail inglés; no se identificaron revisiones aplicadas en la versión base.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se usa «palabra» para דָּבָר en un contexto profético formal.
  - «Acerca de Moab» conserva el sentido referencial de אֶל sin sobrerinterpretarlo.
  - La nota al pie preserva una alternativa temporal legítima para מֵאָז.
