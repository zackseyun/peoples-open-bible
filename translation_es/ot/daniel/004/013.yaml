review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del arameo: cambio del corazón humano, entrega de corazón de bestia y transcurso de siete tiempos sobre él. También preserva la ambigüedad teológica entre transformación literal y estado bestial. Sin embargo, varias elecciones sintácticas españolas son demasiado calcadas del inglés/arameo y resultan poco naturales o menos fieles al flujo idiomático del español bíblico.'
  spanish_quality_summary: 'La comprensión es clara, pero la redacción suena rígida: «Sea cambiado su corazón de hombre», «sea dado a él» y «pasen sobre él» son construcciones comprensibles pero poco idiomáticas en español actual y eclesial. Una formulación como «Sea cambiado su corazón, de humano a bestia, y sean dados a él...» no funciona porque altera la estructura. La mejor mejora mínima es usar pasivas/reflexivas o dativo pronominal natural: «Sea cambiado su corazón, de hombre; y séale dado corazón de bestia...» tampoco es óptimo. La solución propuesta mantiene fidelidad y mejora legibilidad: «Sea cambiado su corazón, para que deje de ser de hombre, y séale dado corazón de bestia, y pasen sobre él siete tiempos».'
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Corazón» para לִבְבֵהּ, «bestia» para חֵיוָה y «tiempos» para עִדָּנִין están bien alineados. La nota sobre «tiempos/períodos/estaciones» está bien conservada y correctamente anclada. No hay términos del glosario mayor (Yahvé, Mesías, etc.) en este versículo.
  issues:
  - severity: medium
    issue: «Sea cambiado[a] su corazón de hombre» es español torpe y ambiguo
    rationale: En español, esa secuencia puede entenderse como si «corazón de hombre» fuera una sola unidad nominal mal integrada. El arameo expresa cambio desde una cualidad humana; conviene explicitarlo mejor sin sobreinterpretar.
  - severity: medium
    issue: «sea dado a él» suena calcado
    rationale: Aunque gramaticalmente posible, en español natural corresponde mejor «le sea dado» o «séale dado», preservando la pasiva y el dativo.
  - severity: low
    issue: «pasen sobre él» es literal pero algo duro
    rationale: Es aceptable y bastante fiel al giro, por lo que puede conservarse. No requiere cambio forzoso si se mantiene el registro bíblico.
  revised_spanish_text: Sea cambiado[a] su corazón para que deje de ser de hombre, y le sea dado corazón de bestia, y pasen sobre él siete tiempos.
  revised_footnotes:
  - marker: a
    text: O «períodos» o «estaciones»; el término arameo designa tiempos señalados o períodos, y aquí no se especifica la duración exacta.
    reason: lexical_alternative
  revision_rationale: Se ajusta la sintaxis para un español más natural sin perder la estructura ni la ambigüedad del arameo. «para que deje de ser de hombre» aclara el valor de מִן אֱנוֹשָׁא sin añadir una interpretación doctrinal específica; «le sea dado» corrige un calco poco idiomático. Se conserva «siete tiempos» y la nota léxica correspondiente.
