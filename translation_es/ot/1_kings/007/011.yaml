translation:
  language: es
  text: Y arriba, piedras costosas[a], labradas según las medidas, y cedro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «según las medidas de piedra labrada».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִלְמַעְלָה
  english_pob_choice: And above
  chosen_spanish: Y arriba
  alternatives_spanish:
  - Y desde arriba
  - Y por encima
  lexicon: HALOT
  rationale: La expresión hebrea indica posición superior o lo que estaba en la parte alta de la estructura. En español, 'Y arriba' mantiene la relación espacial de forma natural y concisa en un contexto arquitectónico.
- source_word: אֲבָנִים
  english_pob_choice: stones
  chosen_spanish: piedras
  alternatives_spanish:
  - piedras de sillería
  - bloques de piedra
  lexicon: HALOT
  rationale: El sustantivo común designa piedras. En español, 'piedras' conserva la correspondencia directa; los añadidos de tipo constructivo serían interpretativos y no están exigidos por el hebreo.
- source_word: יְקָרוֹת
  english_pob_choice: costly
  chosen_spanish: costosas
  alternatives_spanish:
  - preciadas
  - valiosas
  lexicon: HALOT
  rationale: En un contexto de construcción, el adjetivo apunta a materiales de alto valor o de gran calidad. 'Costosas' transmite ese matiz material mejor que 'preciosas', que en español suena más gemológico o afectivo.
- source_word: כְּמִדּוֹת
  english_pob_choice: cut according to measure
  chosen_spanish: conforme a medida
  alternatives_spanish:
  - según medida
  - de acuerdo con las medidas
  lexicon: HALOT
  rationale: La frase hebrea literalmente remite a 'según medidas'. En español, 'conforme a medida' expresa adecuadamente la idea de preparación exacta sin forzar una perífrasis excesiva.
- source_word: גָּזִית
  english_pob_choice: cut
  chosen_spanish: cortadas
  alternatives_spanish:
  - labradas
  - piedra tallada
  lexicon: HALOT
  rationale: El término se refiere a piedra labrada o tallada. Dado el miembro anterior, se entiende que las piedras fueron trabajadas a medida; 'cortadas' mantiene la concreción física del trabajo de cantera y cantería.
- source_word: וָאָרֶז
  english_pob_choice: and cedar
  chosen_spanish: y cedro
  alternatives_spanish:
  - y madera de cedro
  - y cedrowood
  lexicon: HALOT
  rationale: El hebreo nombra simplemente el material 'cedro'. En español, 'cedro' es la forma más directa y fiel; añadir 'madera' sería aclaratorio pero no necesario en el texto principal.
translation_notes:
  revision_awareness: El inglés POB revisó la frase de 'cut to measure' a 'cut according to measure' para acercarse más al hebreo. La versión española sigue esa dirección con 'conforme a medida', preservando el sentido de preparación exacta. También mantiene la nota alternativa sobre la posibilidad de entender la construcción como 'piedra labrada'.
  spanish_consistency_notes:
  - Se mantiene 'cedro' sin expandir a 'madera de cedro' para conservar la brevedad y la correspondencia con el hebreo.
  - '''Costosas'' funciona aquí en sentido material/constructivo, no moral ni ornamental.'
  - No se introduce terminología eclesiástica; el versículo es descriptivo de arquitectura y materiales.
