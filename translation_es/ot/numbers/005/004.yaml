translation:
  language: es
  text: Y los hijos de Israel así lo hicieron[a], y los enviaron fuera del campamento; tal como Yahvé había hablado a Moisés, así hicieron los hijos de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los hijos de Israel»; muchas versiones lo vierten de forma corporativa como «los israelitas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ כֵן
  english_pob_choice: did so
  chosen_spanish: lo hicieron así
  alternatives_spanish:
  - así hicieron
  - hicieron así
  lexicon: HALOT
  rationale: La expresión hebrea indica cumplimiento de lo mandado. En español, «lo hicieron así» conserva la conformidad con la instrucción previa sin sonar rígido ni añadir interpretación.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se mantiene la fórmula familiar y corporativa del hebreo בני ישראל. «Hijos» preserva mejor la imagen original que «israelitas», aunque esta última sea una alternativa posible en español.
- source_word: וַיְשַׁלְּחוּ אֹתָם
  english_pob_choice: sent them
  chosen_spanish: los enviaron
  alternatives_spanish:
  - los mandaron
  - los despidieron
  - los echaron
  lexicon: HALOT
  rationale: Aquí שׁלח expresa la acción de sacar a personas del campamento. «Los enviaron» sigue de cerca el verbo sin cargar una connotación más fuerte que el texto no exige; el complemento posterior aclara el movimiento hacia fuera.
- source_word: אֶל מִחוּץ לַמַּחֲנֶה
  english_pob_choice: outside the camp
  chosen_spanish: fuera del campamento
  alternatives_spanish:
  - afuera del campamento
  - a fuera del campamento
  lexicon: HALOT
  rationale: La frase espacial se traduce de modo natural con «fuera del campamento», que comunica bien la exclusión física y ritual implícita en el contexto.
- source_word: כַּאֲשֶׁר דִּבֶּר
  english_pob_choice: just as ... had spoken
  chosen_spanish: tal como Yahvé había hablado
  alternatives_spanish:
  - como Yahvé había dicho
  - según Yahvé había hablado
  lexicon: HALOT
  rationale: «Tal como» conserva la idea de conformidad; el pluscuamperfecto («había hablado») refleja con claridad que la palabra divina precede a la obediencia narrada.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se usa «Yahvé» como forma española habitual para el Nombre divino, conforme al criterio del proyecto de no ocultar יְהוָה tras un sustituto como «SEÑOR».
- source_word: כֵּן עָשׂוּ
  english_pob_choice: so the sons of Israel did
  chosen_spanish: así hicieron los hijos de Israel
  alternatives_spanish:
  - así lo hicieron los hijos de Israel
  - de ese modo hicieron los hijos de Israel
  lexicon: HALOT
  rationale: La clausula final repite el verbo para enfatizar obediencia efectiva. En español conviene repetir la idea de manera explícita para preservar ese cierre enfático.
theological_decisions:
- issue: Renderización del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo usa directamente el Tetragrama. Mantener el Nombre propio en español evita la sustitución por un título y conserva la relación de pacto y revelación implícita en el contexto narrativo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Coincide con la auditoría inglesa: no se requieren cambios de sentido ni de estructura. La revisión más reciente indicó que no había cambios necesarios y el control cruzado mostró acuerdo alto.'
  spanish_consistency_notes:
  - Se mantuvo la repetición final de la obediencia para reflejar el énfasis hebreo.
  - «Yahvé» se usa de forma consistente para יְהוָה según la terminología del proyecto.
  - Se eligió «hijos de Israel» por fidelidad formal; la nota registra la alternativa corporativa habitual en español.
