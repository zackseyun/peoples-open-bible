id: ISA.54.14
reference: Isaiah 54:14
source:
  edition: WLC
  text: בִּ/צְדָקָ֖ה תִּכּוֹנָ֑נִי רַחֲקִ֤י מֵ/עֹ֨שֶׁק֙ כִּֽי לֹ֣א תִירָ֔אִי וּ/מִ֨/מְּחִתָּ֔ה כִּ֥י לֹֽא תִקְרַ֖ב אֵלָֽיִ/ךְ־־׃
translation:
  text: In righteousness you will be established[a]; you will be far from oppression, for you will not fear, and from terror[b], for it will not come near you.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'By righteousness you will be established.' The Hebrew preposition may express means as well as sphere.
    reason: lexical_alternative
  - marker: b
    text: '''Terror'' may also be rendered ''destruction'' or ''ruin.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּ/צְדָקָה
  chosen: In righteousness
  alternatives:
  - By righteousness
  - In justice
  lexicon: HALOT
  rationale: The preposition ב plus צְדָקָה can denote sphere or means. 'In righteousness' preserves the Hebrew compactness and allows both moral rightness and covenantal rectitude without over-specifying instrumentality. 'Justice' is possible lexically, but in this context 'righteousness' better matches the restoration/oracle setting and keeps continuity with common biblical usage.
- source_word: תִּכּוֹנָנִי
  chosen: you will be established
  alternatives:
  - you will be firmly founded
  - you will be set up
  lexicon: HALOT
  rationale: From כון in the Niphal/Hophal-like passive-reflexive sense, the idea is being made firm or established. 'You will be established' is natural English and preserves the passive/resultative force addressed to the feminine singular Zion/Jerusalem.
- source_word: רַחֲקִי
  chosen: keep far
  alternatives:
  - be far
  - stay far away
  - distance yourself
  lexicon: HALOT
  rationale: The imperative from רחק calls for separation. 'Keep far' preserves the command force and reads smoothly with the following prepositional phrase. It avoids the slightly awkward bare 'be far' while not becoming overly interpretive like 'distance yourself.'
- source_word: מֵ/עֹשֶׁק
  chosen: from oppression
  alternatives:
  - from extortion
  - from violence
  lexicon: HALOT
  rationale: עֹשֶׁק commonly denotes oppression, exploitation, or extortion. 'Oppression' best fits the broad social and threatening sense here and is the most idiomatic pairing with the command to remain far from it.
- source_word: כִּי לֹא תִירָאִי
  chosen: for you will not fear
  alternatives:
  - for you need not fear
  - because you will not be afraid
  lexicon: HALOT
  rationale: The clause gives the reason for distancing from oppression. 'For you will not fear' is a close rendering of the imperfect and keeps the future assurance tone. 'Need not fear' is slightly more interpretive, implying permission rather than promised condition.
- source_word: וּ/מִ֨/מְּחִתָּה
  chosen: and from terror
  alternatives:
  - and from destruction
  - and from ruin
  - and from panic
  lexicon: HALOT
  rationale: מְחִתָּה can denote terror, ruin, or shattering dread. In parallel with fear and with the following 'it will not come near you,' 'terror' best captures the experiential threat rather than the event of destruction itself.
- source_word: כִּי לֹא תִקְרַב אֵלָיִךְ
  chosen: for it will not come near you
  alternatives:
  - for it will not approach you
  - for it will not draw near to you
  lexicon: HALOT
  rationale: The feminine singular verb agrees naturally with מְחִתָּה, so the threat/terror is personified as not approaching Zion. 'Come near you' is idiomatic modern English and preserves the Hebrew image.
