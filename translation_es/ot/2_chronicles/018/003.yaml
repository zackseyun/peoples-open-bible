    text: 'Or, more idiomatically, ''Your people are my people.'' The Hebrew wording is literally comparative: ''and as your people, my people.'''
    reason: lexical_alternative
  - marker: b
    text: The final clause is elliptical in Hebrew, literally 'and with you in the battle.'
    reason: lexical_alternative
