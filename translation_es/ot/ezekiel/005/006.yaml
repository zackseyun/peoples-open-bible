base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/005/006.yaml
  text: And she rebelled against my judgments with wickedness more than the nations[a], and against my statutes more than the lands that are around her; for they rejected my judgments[b], and they did not walk in my statutes.
  footnotes:
  - marker: a
    text: Or 'she changed my judgments into wickedness, more than the nations.' The verb can be understood as rebellion or as a corrupt alteration of what God gave; the main text follows the covenantal sense 'rebelled.'
    reason: lexical_alternative
  - marker: b
    text: '''Walk in'' is a Hebrew idiom meaning to live according to or follow.'
    reason: cultural_note
