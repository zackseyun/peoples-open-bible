translation:
  language: es
  text: Así que todo el pueblo se quitaron[a] los anillos[b] de oro que tenían en las orejas y los llevaron a Aarón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "arrancaron" o "se despojaron de" los anillos de oro. El verbo hebreo puede subrayar una remoción enérgica.
    reason: lexical_alternative
  - marker: b
    text: O "los aretes de oro". El término hebreo para "anillos" puede referirse aquí a adornos para las orejas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְפָּרְקוּ
  english_pob_choice: took off
  chosen_spanish: se quitó
  alternatives_spanish:
  - se arrancó
  - se desprendió
  - los removió
  lexicon: HALOT
  rationale: El hitpael de פרק puede indicar una remoción enérgica de adornos. En español, "se quitó" comunica de manera natural la acción reflexiva de despojarse de las joyas, sin perder la posibilidad de una remoción forzada que el contexto permite.
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo entero
  - toda la gente
  - la comunidad entera
  lexicon: HALOT
  rationale: La expresión colectiva se vierte de forma idiomática en español como "todo el pueblo", preservando el sentido comunitario y directo del hebreo.
- source_word: נִזְמֵי הַזָּהָב
  english_pob_choice: the gold rings
  chosen_spanish: los anillos de oro
  alternatives_spanish:
  - los aretes de oro
  - los anillos de oro
  - las joyas de oro
  lexicon: HALOT
  rationale: נֶזֶם puede referirse a un anillo u ornamento. Como el contexto inmediato especifica que estaban en las orejas, "anillos de oro" conserva la amplitud léxica y evita cerrar demasiado pronto el objeto como "aretes".
- source_word: אֲשֶׁר בְּאָזְנֵיהֶם
  english_pob_choice: that were in their ears
  chosen_spanish: que tenían en las orejas
  alternatives_spanish:
  - que estaban en sus orejas
  - que llevaban en las orejas
  - de sus orejas
  lexicon: HALOT
  rationale: '"En las orejas" reproduce con claridad la localización del hebreo y es comprensible en español contemporáneo. "Tenían" mantiene la relación posesiva/locativa sin sonar forzado.'
- source_word: וַיָּבִיאוּ אֶל אַהֲרֹן
  english_pob_choice: and brought them to Aaron
  chosen_spanish: y se los llevaron a Aarón
  alternatives_spanish:
  - y los llevaron a Aarón
  - y se los trajeron a Aarón
  - y los presentaron a Aarón
  lexicon: HALOT
  rationale: El verbo הבא significa traer/llevar según la perspectiva. En español, con movimiento hacia Aarón, "se los llevaron" conserva la referencia pronominal a los anillos y su destino final, con naturalidad narrativa.
translation_notes:
  revision_awareness: El texto base en inglés fue revisado y se mantuvo sin cambios; esta versión española sigue el mismo estado estable, pero ajusta la formulación para conservar la fuerza del verbo hebreo y la ambigüedad léxica de נִזְמֵי en un español natural.
  spanish_consistency_notes:
  - Se mantiene "Aarón" como forma estándar del nombre propio.
  - Se eligió "Yahvé" como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se preservó la ambigüedad de נִזְמֵי con una nota alternativa, en paralelo al audit trail inglés.
  - La puntuación y el orden de la cláusula siguen un estilo bíblico moderno y legible en español.
