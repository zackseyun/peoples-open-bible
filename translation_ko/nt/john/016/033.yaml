id: JHN.16.33
reference: 'John 16:33'
language:
  code: ko
  name: Korean
  variant: '표준어 / modern formal-polite (합쇼체)'
source:
  edition: SBLGNT
  text: ταῦτα λελάληκα ὑμῖν ἵνα ἐν ἐμοὶ εἰρήνην ἔχητε· ἐν τῷ κόσμῳ θλῖψιν ἔχετε, ἀλλὰ θαρσεῖτε, ἐγὼ νενίκηκα τὸν κόσμον.
base_translation:
  language: en
  yaml_path: translation/nt/john/016/033.yaml
  text: I have spoken these things to you so that in me you may have peace[a]. In the world you have tribulation, but take courage[b]; I have overcome the world.
  footnotes:
  - marker: a
    text: Or 'take heart.'
    reason: lexical_alternative
  - marker: b
    text: '''Tribulation'' may also be rendered ''trouble,'' ''affliction,'' or ''distress.'''
    reason: lexical_alternative
translation:
  language: ko
  text: 내가 이것들을 여러분에게 말한 것은, 여러분이 내 안에서 평화를 가지게 하려는 것입니다. 이 세상에서 여러분은 환난을 당합니다. 그러나 용기를 내십시오. 내가 세상을 이겼습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「담대하라」.
    reason: lexical_alternative
  - marker: b
    text: 「환난」은 「곤란」, 「고난」, 「괴로움」으로도 옮길 수 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰρήνην
  english_pob_choice: peace
  chosen_korean: 평화
  alternatives_korean:
  - 평강
  lexicon: BDAG
  rationale: εἰρήνη의 표준 한국어 등가어. 「평강」은 전통적이나 「평화」가 더 직접적이다.
- source_word: θλῖψιν
  english_pob_choice: tribulation
  chosen_korean: 환난
  alternatives_korean:
  - 고난
  - 괴로움
  lexicon: BDAG
  rationale: θλῖψις의 「압박·환난」을 옮긴다.
- source_word: θαρσεῖτε
  english_pob_choice: take courage
  chosen_korean: 용기를 내십시오
  alternatives_korean:
  - 담대하십시오
  lexicon: BDAG
  rationale: 명령형의 권유적 합쇼체.
- source_word: νενίκηκα
  english_pob_choice: have overcome
  chosen_korean: 이기다
  alternatives_korean:
  - 승리하다
  lexicon: BDAG
  rationale: 완료형의 결과적 「이미 이긴 상태」.
