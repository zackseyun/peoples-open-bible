  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה -> «Yahvé», לֵאלֹהִים -> «Dios», קְדֹשִׁים/קָדוֹשׁ -> «santos/santo». La única tensión léxica importante está en הַמַּעֲלֶה, donde la opción actual es demasiado calcada; «el que los saca de la tierra de Egipto» conserva el valor presente del participio mejor que un pasado y suena más natural en español.'
