translation:
  language: es
  text: Entonces te agradarán los sacrificios[a] de justicia, los holocaustos y las ofrendas totalmente consumidas[b]; entonces se ofrecerán toros sobre tu altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sacrificios de rectitud'.
    reason: lexical_alternative
  - marker: b
    text: O 'holocaustos completos'; el hebreo distingue aquí entre 'holocausto' y 'ofrenda completa/entera'.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחְפֹּץ
  english_pob_choice: you will delight in
  chosen_spanish: te agradarán
  alternatives_spanish:
  - te deleitarás en
  - te complacerás en
  - tendrás placer en
  lexicon: HALOT
  rationale: חפץ expresa tomar placer o agrado en algo. En español, 'te agradarán' comunica de manera natural la aceptación complacida de Yahvé sin cargar el verso con una forma demasiado literal o arcaica.
- source_word: זִבְחֵי צֶדֶק
  english_pob_choice: righteous sacrifices
  chosen_spanish: sacrificios de justicia
  alternatives_spanish:
  - sacrificios justos
  - sacrificios de rectitud
  lexicon: HALOT
  rationale: Conservo la construcción más cercana al hebreo, 'sacrificios de justicia', para mantener la relación genitiva y no diluir el valor ético/covenantal de צֶדֶק. 'Justos' sonaría más adjetival y menos transparente al original.
- source_word: עוֹלָה
  english_pob_choice: burnt offering
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas quemadas
  - ofrendas holocáusticas
  lexicon: HALOT
  rationale: En español bíblico y litúrgico, 'holocausto' es el término tradicional y claro para la ofrenda totalmente consumida por el fuego. Se conserva además la distinción con el término siguiente.
- source_word: וְכָלִיל
  english_pob_choice: whole burnt offering
  chosen_spanish: holocaustos completos
  alternatives_spanish:
  - holocaustos enteros
  - ofrendas completamente quemadas
  - holocausto entero
  lexicon: HALOT
  rationale: כָלִיל subraya la totalidad. Dado que el español 'holocausto' ya implica quemado total, se añade 'completos' para reflejar el énfasis del hebreo y mantener la distinción textual que el POB inglés documenta.
- source_word: יַעֲל֖וּ
  english_pob_choice: will be offered
  chosen_spanish: se ofrecerán
  alternatives_spanish:
  - subirán
  - serán presentados
  lexicon: HALOT
  rationale: El verbo עלה en contexto sacrificial tiene el sentido de ser llevado/ofrecido sobre el altar. 'Se ofrecerán' captura bien el valor sacrificial sin sonar forzado en español.
- source_word: מִזְבַּחֲךָ
  english_pob_choice: your altar
  chosen_spanish: tu altar
  alternatives_spanish:
  - tu altar sacrificial
  - tu altar de sacrificio
  lexicon: HALOT
  rationale: Es la manera directa y natural de expresar el altar perteneciente a Dios en segunda persona.
- source_word: פָרִים
  english_pob_choice: bulls
  chosen_spanish: toros
  alternatives_spanish:
  - bueyes
  - novillos
  lexicon: HALOT
  rationale: פָרִים se refiere a toros/bueyes sacrificiales. 'Toros' es una equivalencia directa, natural y suficientemente solemne en español.
theological_decisions:
- issue: Relación entre el rechazo previo del sacrificio y la aceptación futura del culto
  english_pob_reading: The verse speaks of restored and acceptable sacrificial worship, not a contradiction of verses 16–17.
  chosen_spanish_reading: El versículo habla de un culto sacrificial restaurado y aceptable, no de una contradicción con los versículos 16–17.
  alternative_spanish_readings:
  - El versículo corrige los versículos anteriores y vuelve a poner el sacrificio en el centro
  - El verso es una adición litúrgica que reintroduce el sacrificio como ideal
  rationale: La traducción conserva el lenguaje concreto del culto sin suavizar la tensión teológica del salmo. Primero se afirma que Dios no se complace en sacrificios vacíos; aquí se presenta el momento en que, tras la restauración, los sacrificios sí le agradan.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión reciente del inglés: mantiene el plural de los sacrificios y refleja la distinción entre עוֹלָה y כָלִיל con un recurso español que preserve la diferencia textual sin perder naturalidad.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el contexto lo requiera; este versículo no lo contiene explícitamente, por lo que no aparece aquí.
  - Se mantiene 'holocausto' como término sacrificial estable en español bíblico, en lugar de sustituirlo por una paráfrasis.
  - '''Toros'' se escogió por claridad y solemnidad; ''bueyes'' quedaría más agrícola que cultual en este contexto.'
