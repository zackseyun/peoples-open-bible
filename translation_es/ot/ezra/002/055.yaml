    issue: «servidores de Salomón» para עַבְדֵי שְׁלֹמֹה
    rationale: Aunque intenta reflejar el inglés «servants», en español bíblico-listal «servidores» suena como ocupación o función de servicio más que como designación heredada de un grupo. «Siervos de Salomón» preserva mejor la etiqueta histórica/administrativa y la legibilidad eclesial.
  revised_spanish_text: 'los hijos de los siervos de Salomón: los hijos de Sotai[a], los hijos de Hassophereth, los hijos de Peruda.'
