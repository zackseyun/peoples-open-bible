translation:
  language: es
  text: Porque un niño[a] nos ha nacido, un hijo nos ha sido dado, y el gobierno está sobre su hombro; y se le llama Consejero admirable, Dios poderoso, Padre de eternidad[b], Príncipe de Paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más tradicional en contexto profético: «Porque nos ha nacido un niño, se nos ha dado un hijo, y el gobierno estará sobre su hombro; y se le llamará ...».'
    reason: alternative_reading
  - marker: b
    text: «Padre de eternidad» sigue más literalmente la construcción hebrea; la traducción tradicional en español suele decir «Padre eterno».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque en efecto
  lexicon: HALOT
  rationale: Aquí introduce la explicación o fundamento de la esperanza anunciada en el contexto inmediato; «Porque» conserva la fuerza causal/expositiva sin sonar forzado en español.
- source_word: יֶלֶד
  english_pob_choice: child
  chosen_spanish: niño
  alternatives_spanish:
  - niño pequeño
  - hijo
  - infante
  lexicon: HALOT
  rationale: El hebreo designa a un niño o menor de manera general. «Niño» es natural en español y mantiene la referencia a la infancia sin estrecharla indebidamente.
- source_word: יֻלַּד לָנוּ
  english_pob_choice: has been born to us
  chosen_spanish: nos ha nacido
  alternatives_spanish:
  - ha nacido para nosotros
  - nos nació
  - ha sido dado a nosotros
  lexicon: HALOT
  rationale: La pasiva perfecta hebrea puede expresarse con un perfecto resultativo en español. «Nos ha nacido» conserva la idea de acontecimiento cumplido con relevancia presente y sigue la línea de la audacia poética del texto.
- source_word: בֵּן
  english_pob_choice: son
  chosen_spanish: hijo
  alternatives_spanish:
  - varón
  - hijo varón
  - niño varón
  lexicon: HALOT
  rationale: «Hijo» comunica con naturalidad la filiación masculina y evita una redundancia extraña con «niño» en español, manteniendo la distinción semántica del hebreo.
- source_word: נִתַּן לָנוּ
  english_pob_choice: has been given to us
  chosen_spanish: nos ha sido dado
  alternatives_spanish:
  - nos fue dado
  - se nos ha dado
  - ha sido dado a nosotros
  lexicon: HALOT
  rationale: Conserva la voz pasiva y el valor de don otorgado sin introducir un sujeto explícito que el hebreo no expresa. Además armoniza con «nos ha nacido».
- source_word: הַמִּשְׂרָה
  english_pob_choice: the rule
  chosen_spanish: el dominio
  alternatives_spanish:
  - el gobierno
  - la autoridad
  - el mando
  lexicon: HALOT
  rationale: El término señala autoridad real o dominio. «Dominio» es suficientemente sobrio y mantiene mejor el campo de soberanía que una opción demasiado institucional como «gobierno».
- source_word: וַתְּהִי ... עַל שִׁכְמוֹ
  english_pob_choice: is on his shoulder
  chosen_spanish: está sobre su hombro
  alternatives_spanish:
  - recae sobre su hombro
  - descansa sobre su hombro
  - está sobre su espalda
  lexicon: HALOT
  rationale: La imagen hebrea sitúa la autoridad sobre el hombro. «Está sobre su hombro» es directo, formal y sigue de cerca el audit trail inglés revisado hacia una formulación más literal.
- source_word: וַיִּקְרָא שְׁמוֹ
  english_pob_choice: his name is called
  chosen_spanish: su nombre es llamado
  alternatives_spanish:
  - se le llama
  - su nombre será llamado
  - se llamará
  lexicon: HALOT
  rationale: La fórmula nominal hebrea usa un verbo sin sujeto explícito. «Su nombre es llamado» preserva esa construcción sin forzar un agente determinado; aunque suena más solemne que una versión más idiomática, refleja con mayor transparencia la sintaxis fuente.
- source_word: פֶּלֶא יוֹעֵץ
  english_pob_choice: Wonderful Counselor
  chosen_spanish: Consejero admirable
  alternatives_spanish:
  - Consejero maravilloso
  - Consejero portentoso
  - Asesor admirable
  lexicon: HALOT
  rationale: La secuencia funciona como título compuesto. «Consejero admirable» comunica la cualidad extraordinaria del consejero sin reducirla a una simple cualidad emocional; «admirable» mantiene el valor de maravilla/portento en español culto y bíblico.
- source_word: אֵל גִּבּוֹר
  english_pob_choice: Mighty God
  chosen_spanish: Dios poderoso
  alternatives_spanish:
  - Dios fuerte
  - Dios valiente
  - Poderoso Dios
  lexicon: HALOT
  rationale: El hebreo tiene fuerza claramente divina en Isaías. «Dios poderoso» preserva esa carga sin suavizarla; se evita una atenuación como «héroe divino» porque borraría la tensión teológica documentada.
- source_word: אֲבִי עַד
  english_pob_choice: Father of Eternity
  chosen_spanish: Padre de eternidad
  alternatives_spanish:
  - Padre eterno
  - Padre para siempre
  - Padre de la eternidad
  lexicon: HALOT
  rationale: 'La construcción es literalmente un genitivo: «padre de perpetuidad/eternidad». «Padre de eternidad» sigue de cerca el hebreo y reproduce la transparencia auditada en el inglés POB; no se sustituye por la fórmula tradicional sin una razón textual.'
- source_word: שַׂר שָׁלוֹם
  english_pob_choice: Prince of Peace
  chosen_spanish: Príncipe de paz
  alternatives_spanish:
  - Gobernante de paz
  - Señor de paz
  lexicon: HALOT
  rationale: Es el equivalente más natural y reconocido para un título real. «Paz» conserva el valor pleno de shalom sin expandirlo innecesariamente.
theological_decisions:
- issue: Cómo tratar los títulos reales y su fuerza teológica en la cláusula final
  english_pob_reading: 'Treat the sequence as exalted throne titles of the child: Wonderful Counselor, Mighty God, Father of Eternity, Prince of Peace.'
  chosen_spanish_reading: 'Tomar la secuencia como títulos de entronización atribuidos al niño: Consejero admirable, Dios poderoso, Padre de eternidad, Príncipe de paz.'
  alternative_spanish_readings:
  - Entender algunos miembros como referentes a Dios aparte del niño
  - Suavizar «Dios poderoso» a una expresión no divina
  rationale: La sintaxis más natural del hebreo presenta una serie de títulos del niño. La traducción debe conservar la fuerza de «Dios poderoso» y no desactivar la tensión cristológica ni profética que el texto ya contiene.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Cómo reflejar el tiempo verbal profético de la primera mitad del versículo
  english_pob_reading: Use English present-perfect/resultative forms ('has been born,' 'has been given,' 'is called')
  chosen_spanish_reading: Usar perfectos resultativos en español ('nos ha nacido', 'nos ha sido dado', 'es llamado')
  alternative_spanish_readings:
  - Usar pasado simple ('nació', 'fue dado')
  - Usar futuro profético ('nacerá', 'será llamado')
  rationale: El hebreo profético admite diversas soluciones. En español, los perfectos resultativos expresan acontecimiento cumplido con vigencia actual y mantienen el tono de anuncio seguro que el audit trail inglés preserva.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa que prefirió «is on his shoulder» frente a una expansión interpretativa como «has come to rest on his shoulder». Por eso elegí «está sobre su hombro», más directo y cercano al hebreo. También mantuve la transparencia del título «Father of Eternity» trasladándolo como «Padre de eternidad», siguiendo la decisión auditada de evitar una paráfrasis tradicional sin base textual explícita.
  spanish_consistency_notes:
  - Conservo «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Usé «Dios poderoso» para preservar el peso teológico de אֵל גִּבּוֹר sin atenuarlo.
  - Mantuve la secuencia de títulos en estilo solemne y sin añadir puntuación que altere la cadencia del hebreo.
  - Elegí «nos ha nacido / nos ha sido dado» para reflejar la acción cumplida y la recepción comunitaria implícita en לָנוּ.
