translation:
  language: es
  text: Ben-abinadab, sobre toda la región[a] de Dor; Tafat, la hija de Salomón, fue su esposa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sobre toda la comarca de Dor». El término hebreo puede referirse a una región o distrito, y también puede aludir a un terreno elevado.'
