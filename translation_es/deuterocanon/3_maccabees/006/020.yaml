translation:
  language: es
  text: Y también el cuerpo del rey quedó sobrecogido por el estremecimiento[a], y el olvido se apoderó de su arrogancia[b] sombría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «estremecimiento» reproduce el valor corporal de ὑπόφρικον; también podría traducirse «temblor» o «escalofrío».
    reason: lexical_alternative
  - marker: b
    text: «arrogancia» toma θράσος en su sentido negativo de presunción u osadía insolente; otra posibilidad sería «audacia».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπόφρικον
  english_pob_choice: seized with shuddering
  chosen_spanish: sobrecogido por el estremecimiento
  alternatives_spanish:
  - estremecido
  - presa del estremecimiento
  - sobrecogido de temor
  lexicon: LSJ
  rationale: La palabra griega expresa una reacción corporal de temblor o escalofrío. «Sobrecogido por el estremecimiento» conserva el matiz físico y evita una abstracción demasiado débil.
- source_word: σῶμα
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - persona
  - constitución
  - figura
  lexicon: LSJ
  rationale: El griego dice explícitamente «cuerpo»; se mantiene ese énfasis en la reacción física del rey.
- source_word: λήθη
  english_pob_choice: forgetfulness
  chosen_spanish: el olvido
  alternatives_spanish:
  - la falta de memoria
  - el desvanecimiento
  - la confusión
  lexicon: LSJ
  rationale: Se conserva el sentido léxico básico de λήθη como «olvido», sin borrar la posible idea contextual de desorientación mental.
- source_word: θράσος
  english_pob_choice: boldness
  chosen_spanish: arrogancia
  alternatives_spanish:
  - audacia
  - insolencia
  - presunción
  lexicon: LSJ
  rationale: Aunque puede rendirse como «audacia», aquí el contexto sugiere una valentía presuntuosa y soberbia; «arrogancia» comunica mejor ese tono negativo sin perder la fuerza del término.
- source_word: βαρύθυμον
  english_pob_choice: grim
  chosen_spanish: sombría
  alternatives_spanish:
  - adusta
  - ceñuda
  - grave
  lexicon: LSJ
  rationale: El adjetivo apunta a un ánimo pesado, severo o lúgubre. «Sombría» comunica en español una disposición opresiva y dura, adecuada al contexto.
- source_word: ἔλαβεν
  english_pob_choice: overtook
  chosen_spanish: se apoderó de
  alternatives_spanish:
  - tomó
  - alcanzó
  - sobrevino a
  lexicon: LSJ
  rationale: El verbo es literalmente «tomó», pero en español la construcción idiomática adecuada es «se apoderó de», que expresa el carácter invasivo del olvido sobre la arrogancia del rey.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés POB, que prefirió hacer de λήθη el sujeto de la segunda cláusula («forgetfulness overtook») y mantener un matiz más negativo para θράσος. La versión española sigue ese ajuste y evita trasladar mecánicamente la anterior formulación inglesa.
  spanish_consistency_notes:
  - 'Se conserva el orden de ideas del griego: reacción física del rey, luego la acción del olvido sobre su disposición interior.'
  - No se suaviza θράσος a una neutral «valentía»; el contexto exige un matiz negativo.
  - «El olvido» mantiene la transparencia lexical de λήθη sin convertirlo en una interpretación excesiva.
  - La puntuación separa claramente las dos cláusulas coordinadas, como en el griego.
