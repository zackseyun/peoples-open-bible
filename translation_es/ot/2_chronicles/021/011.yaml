    reason: lexical_alternative
  - marker: c
    text: O «lo apartó de Yahvé»; el hebreo no dice explícitamente «de Yahvé», aunque el contexto sugiere apostasía.
    reason: alternative_reading
  revision_rationale: Se corrigió el anclaje de la nota geográfica para que recaiga sobre «región montañosa», se añadió una nota léxica para preservar la alternativa documentada del verbo וַיֶּזֶן, y se aligeró la puntuación para un español más natural sin alterar el sentido del hebreo ni las decisiones del POB inglés.
