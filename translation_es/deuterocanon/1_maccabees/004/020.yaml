translation:
  language: es
  text: Y vio que habían sido puestos en fuga[a], y que estaban incendiando el campamento; porque el humo que era visible dejaba claro lo sucedido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habían dado la vuelta» / «habían sido puestos en fuga»; el verbo griego puede denotar ser obligado a retirarse, aquí en sentido militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἴδεν
  english_pob_choice: he saw
  chosen_spanish: vio
  alternatives_spanish:
  - percibió
  - se dio cuenta
  lexicon: LSJ
  rationale: El aoristo de ὁράω pide una percepción visual directa; «vio» reproduce de manera natural la observación inicial del relato.
- source_word: τετρόπωται
  english_pob_choice: had been routed
  chosen_spanish: habían sido puestos en fuga
  alternatives_spanish:
  - habían sido derrotados
  - se habían vuelto atrás
  - habían huido
  lexicon: LSJ
  rationale: En contexto militar, el verbo expresa una retirada forzada o derrota del enemigo. «Puestos en fuga» conserva la fuerza bélica sin forzar una sola lectura de «derrotados».
- source_word: ἐνπυρίζουσιν
  english_pob_choice: were setting ... on fire
  chosen_spanish: estaban incendiando
  alternatives_spanish:
  - estaban quemando
  - estaban prendiendo fuego
  lexicon: LSJ
  rationale: El verbo indica prender fuego o incendiar; el progresivo español mantiene la acción en curso y encaja con el objeto directo «el campamento».
- source_word: τὴν παρεμβολήν
  english_pob_choice: the camp
  chosen_spanish: el campamento
  alternatives_spanish:
  - el campamento militar
  - la hueste
  lexicon: LSJ
  rationale: Es el término militar estándar y la opción más clara en español contemporáneo, sin perder el marco de batalla.
- source_word: καπνὸς
  english_pob_choice: the smoke
  chosen_spanish: el humo
  alternatives_spanish:
  - el humo levantado
  - la humareda
  lexicon: LSJ
  rationale: Traducción literal y natural del sustantivo; «humo» basta para la imagen visible del incendio.
- source_word: ὁ θεωρούμενος
  english_pob_choice: that was visible
  chosen_spanish: que era visible
  alternatives_spanish:
  - que se veía
  - visible
  lexicon: LSJ
  rationale: La participial griega subraya el carácter observable del humo. «Que era visible» conserva esa cualidad sin introducir un giro demasiado idiomático o interpretativo.
- source_word: ἐνεφάνιζε
  english_pob_choice: made ... clear
  chosen_spanish: dejaba claro
  alternatives_spanish:
  - hacía evidente
  - manifestaba
  lexicon: LSJ
  rationale: El verbo significa hacer visible o manifiesto; en español, «dejaba claro» expresa bien la función inferencial del humo sobre lo ocurrido.
- source_word: τὸ γεγονός
  english_pob_choice: what had happened
  chosen_spanish: lo sucedido
  alternatives_spanish:
  - el hecho
  - lo que había ocurrido
  lexicon: LSJ
  rationale: El participio sustantivado apunta al hecho ya consumado. «Lo sucedido» es natural y mantiene el sentido de un acontecimiento concluido.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de Swete y el audit trail en inglés. Se adopta «puesto en fuga» para reflejar el matiz militar de τετρόπωται, y «dejaba claro» para conservar la fuerza inferencial de ἐνεφάνιζε sin sonar forzado en español. Se evita traducir mecánicamente «was visible» como una perífrasis extraña; se preserva la observación del humo como evidencia del hecho consumado.
  spanish_consistency_notes:
  - Se mantiene «campamento» para παρεμβολήν en contexto militar.
  - No se introduce terminología doctrinal ajena al pasaje.
  - El marcador de nota [a] acompaña a la frase con la mayor carga léxica y ambigüedad militar.
