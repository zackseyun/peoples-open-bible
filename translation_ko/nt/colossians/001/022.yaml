  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: νυνὶ δὲ ⸀ἀποκατηλλάγητε ἐν τῷ σώματι τῆς σαρκὸς αὐτοῦ διὰ τοῦ θανάτου— παραστῆσαι ὑμᾶς ἁγίους καὶ ἀμώμους καὶ ἀνεγκλήτους κατενώπιον αὐτοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/colossians/001/022.yaml
  text: But now he has reconciled you in his body of flesh through death, to present you holy and blameless and beyond reproach before him,
translation:
  language: ko
  text: 이제 그분이 그 육체의 몸으로[a] 죽음을 통하여 여러분을 화목하게 하셨으니, 이는 여러분을 거룩하고 흠 없고 책망할 것이 없는 자로 그분 앞에 세우시기 위함입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 σάρξ는 여기서 메시아의 실제 육체적 인성을 가리키며, 「죄성」을 뜻하는 비유적 용법이 아니다.
    reason: lexical_alternative
lexical_decisions:
- source_word: νυνὶ δὲ
  english_pob_choice: But now
  chosen_korean: 이제
  alternatives_korean:
  - 그러나 이제
  - 지금은
  lexicon: BDAG
  rationale: 21절의 과거 상태와 대조되는 현재의 화목 상태로의 전환을 표현한다.
- source_word: ἀποκατηλλάγητε
  english_pob_choice: he has reconciled you
  chosen_korean: 여러분을 화목하게 하셨으니
  alternatives_korean:
  - 여러분이 화목하게 되었으니
  - 화해되었으니
  lexicon: BDAG
  rationale: 부정과거 수동이나, 문맥상 함의된 주어(하나님/그리스도)를 보존하여 한국어 능동 어형으로 옮긴다. 합쇼체 종결의 「~셨으니」가 자연스럽다.
- source_word: ἐν τῷ σώματι τῆς σαρκὸς αὐτοῦ
  english_pob_choice: in his body of flesh
  chosen_korean: 그 육체의 몸으로
  alternatives_korean:
  - 그분의 육체적 몸으로
  - 그분의 육의 몸 안에서
  lexicon: BDAG
  rationale: 「육체의 몸」으로 메시아의 실제 육신성을 보존한다. σάρξ는 글로사리 기본 「육체」를 사용한다.
- source_word: διὰ τοῦ θανάτου
  english_pob_choice: through death
  chosen_korean: 죽음을 통하여
  alternatives_korean:
  - 죽으심을 통하여
  - 죽음으로 말미암아
  lexicon: BDAG
  rationale: 수단·매개의 διά를 「통하여」로 옮긴다.
- source_word: παραστῆσαι
  english_pob_choice: to present
  chosen_korean: 세우시기
  alternatives_korean:
  - 드리시기
  - 나타내시기
  lexicon: BDAG
  rationale: 부정과거 부정사로 목적·결과를 표시한다. 「세우시기」는 제사적·재판적 문맥에서 자연스럽다.
- source_word: ἁγίους
  english_pob_choice: holy
  chosen_korean: 거룩하고
  alternatives_korean:
  - 거룩하며
  lexicon: BDAG
  rationale: 표준 등가어.
- source_word: ἀμώμους
  english_pob_choice: blameless
  chosen_korean: 흠 없고
  alternatives_korean:
  - 흠 없는
  - 결함 없는
  lexicon: BDAG
  rationale: 제사적 「흠 없음」의 어감을 보존한다.
- source_word: ἀνεγκλήτους
  english_pob_choice: beyond reproach
  chosen_korean: 책망할 것이 없는
  alternatives_korean:
  - 비난할 수 없는
  - 무흠한
  lexicon: BDAG
  rationale: 법정적 「고소받을 수 없는」 어감을 「책망할 것이 없는」으로 옮긴다.
- source_word: κατενώπιον αὐτοῦ
  english_pob_choice: before him
  chosen_korean: 그분 앞에
  alternatives_korean:
  - 그분의 면전에
  lexicon: BDAG
  rationale: 표준 등가어.
theological_decisions:
- issue: ἀποκατηλλάγητε(수동)의 한국어 처리
  chosen_reading: 함의된 주어(그분/하나님)를 명시하여 능동 어형으로 옮김
  alternative_readings:
  - 「화목하게 되었으니」(수동 유지)
  rationale: 헬라어 수동은 행위자를 함의로 두나, 문맥은 하나님(또는 그리스도)을 분명히 가리킨다. 한국어 가독성과 합쇼체 자연성을 위해 능동 어형으로 옮긴다.
  doctrine_reference: 'DOCTRINE.md: Readable modern; Original-language primacy'
- issue: σάρξ의 의미
  chosen_reading: 「육체」(실제 인성)
  alternative_readings:
  - 「죄성」
  rationale: 본 구절은 화목이 이루어진 메시아의 실제 육체적 인성을 강조한다. 「죄성」으로 옮기면 본문에 없는 바울적 신학 범주를 들여오게 된다.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for σάρξ; context-dependent'
