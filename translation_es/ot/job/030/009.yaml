    issue: «un refrán» no refleja bien לְמִלָּה / 'a byword'
    rationale: En español moderno, «refrán» suele referirse a un proverbio fijo o dicho popular sapiencial. Aquí la idea es más bien un dicho/proverbio usado sobre alguien en desprecio, es decir, objeto de habla humillante.
