base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/032/012.yaml
  text: Was it not Hezekiah himself who removed his high places and his altars[a], and said to Judah and Jerusalem, saying, ‘Before one altar you shall bow down, and on it you shall burn incense’?”
  footnotes:
