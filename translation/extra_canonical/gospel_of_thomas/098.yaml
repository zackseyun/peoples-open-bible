translation:
  text: Jesus said[a], “The Father’s kingship is like a man who wanted to kill a magnate.
    He drew the sword in his house and drove it into the wall, so that he might find
    out whether his hand would be strong enough[e][d][c][b]; then he killed the magnate.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “Kingship” renders ⲡⲙⲛⲧⲣⲣⲟ (abstract ‘rule’), not a territorial realm; “kingdom”
      is a viable alternative.
    reason: lexical_alternative
  - marker: b
    text: The Greek loan ⲙⲉⲅⲓⲥⲧⲁⲛⲟⲥ denotes a high-ranking ‘great man’; alternatives
      include “great man,” “nobleman,” or “powerful man.” “Magnate” preserves the
      social nuance and foreign flavor.
    reason: lexical_alternative
  - marker: c
    text: The clause “whether his hand could go in” translates ⲧⲱⲕ ⲉϩⲟⲩⲛ; it can also
      mean “be strong enough to enter/penetrate.”
    reason: lexical_alternative
  - marker: d
    text: Or 'whether his hand could go in'.
    reason: previous_rendering
  - marker: e
    text: Or 'a man—a magnate'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲡⲙⲛⲧⲣⲣⲟ
  chosen: kingship
  alternatives:
  - kingdom
  - reign
  lexicon: Crum; Layton
  rationale: Abstract mnt- form denotes the quality/state of ruling (sovereignty)
    rather than a territorial realm; “kingship” keeps the Thomasine nuance while remaining
    idiomatic.
- source_word: ⲉⲣⲉⲛⲧⲟⲥⲧⲟⲛⲧⲛ
  chosen: is like
  alternatives:
  - resembles
  - may be compared to
  lexicon: Layton
  rationale: Standard Coptic simile construction introducing parables; “is like” is
    concise and faithful.
- source_word: ⲟⲩⲱϣ
  chosen: wanted
  alternatives:
  - desired
  - wished
  lexicon: Crum
  rationale: Common verb for desire/intent; “wanted” conveys purpose plainly in English.
- source_word: ⲙⲟⲩ
  chosen: kill
  alternatives:
  - slay
  - put to death
  lexicon: Crum
  rationale: Basic verb for killing without added legal/moral nuance; fits the parable’s
    stark diction.
- source_word: ⲙⲉⲅⲓⲥⲧⲁⲛⲟⲥ
  chosen: magnate
  alternatives:
  - great man
  - nobleman
  - high official
  - powerful man
  lexicon: Crum
  rationale: Greek loan meaning a ‘great’ or high-ranking man; “magnate” preserves
    the social nuance and foreign color better than generic ‘strong man.’
- source_word: ϣⲱⲗⲙ
  chosen: drew (the sword)
  alternatives:
  - unsheathed
  - pulled out
  lexicon: Crum
  rationale: Verb for drawing out; “drew” is idiomatic with ‘sword’ and keeps narrative
    terseness.
- source_word: ⲥⲏϥⲉ
  chosen: sword
  alternatives: []
  lexicon: Crum
  rationale: Standard lexeme for ‘sword’.
- source_word: ϫⲟⲧⲥ ⲛⲡϫⲟ
  chosen: drove it into the wall
  alternatives:
  - stabbed the wall
  - pierced the wall
  lexicon: Crum
  rationale: ϫⲟⲧⲥ ‘to thrust/strike’ with object + ⲛⲡϫⲟ ‘the wall’; “drove it into”
    captures force and direction.
- source_word: ⲉⲓⲙⲉ
  chosen: find out/know
  alternatives:
  - know
  - learn
  lexicon: Crum
  rationale: Purpose clause ϫⲉⲕⲁⲁⲥ ⲉⲣⲉ…ⲉⲓⲙⲉ ‘in order that he might know’; “find out”
    fits the testing context.
- source_word: ⲧⲱⲕ ⲉϩⲟⲩⲛ
  chosen: be able to go in
  alternatives:
  - be strong enough to go in
  - be capable of entering
  lexicon: Crum
  rationale: ⲧⲱⲕ ‘be able, be strong’ with ⲉϩⲟⲩⲛ ‘to enter’; the literal ‘go in’ preserves
    Thomas’s odd phrasing.
- source_word: ϩⲱⲧⲙ
  chosen: killed
  alternatives:
  - slew
  - struck down
  lexicon: Crum
  rationale: Common verb for ‘kill’; plain rendering matches the parable’s bluntness.
- source_word: ⲡⲉⲓⲱⲧ
  chosen: the Father
  alternatives: []
  lexicon: Crum
  rationale: Definite ‘the Father’ (not ‘my’); standard Thomasine phrase ‘the Father’s
    kingship.’
textual_note: 'Dialect/orthography: The manuscript shows the expected Thomasine phrase
  ⲡⲙⲛⲧⲣⲣⲟ ⲛⲡⲉⲓⲱⲧ (“the Father’s kingship”), with printed orthography varying (ⲧⲙⲛ̄ⲧⲉⲣⲟ)
  but normalized as Sahidic ⲡⲙⲛⲧⲣⲣⲟ. The narrative uses the resumptive ⲁ ⲛⲧⲟϥ three
  times (printed once without ⲛⲧⲟ-), a common story-chain device. ⲙⲉⲅⲓⲥⲧⲁⲛⲟⲥ is a
  Greek loan (‘great man/magnate’). No lacunae or conjectural restorations are indicated
  in Dilley’s text for this saying. The apposition ⲟⲩⲧⲟⲩⲣⲱⲙⲉ ⲛⲙⲉⲅⲓⲥⲧⲁⲛⲟⲥ reads literally
  ‘a man, a megistanos,’ specifying the target as a high-status man. The phrase ⲧⲱⲕ
  ⲉϩⲟⲩⲛ is idiomatic ‘be able to go in/enter,’ here carried over literally to preserve
  the parable’s testing imagery.'
