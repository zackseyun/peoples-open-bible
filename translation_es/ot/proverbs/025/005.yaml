revisions:
- from: Quita al malvado[a] de delante del rey, y su trono será establecido[b] en justicia.
  to: Quita al malvado[a] de delante del rey, y su trono quedará afirmado[b] en justicia.
  rationale: Se conserva el sentido del hebreo y del POB inglés, pero se mejora la naturalidad de la cláusula resultativa en español y se corrige la nota léxica para que refleje mejor la alternativa auditada sin redundancia con el texto principal.
