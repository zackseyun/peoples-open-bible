translation:
  language: es
  text: Y Mefibóset, hijo de Saúl, descendió al encuentro del rey. No había cuidado sus pies[a], ni recortado su bigote[b], ni lavado su ropa, desde el día en que el rey partió hasta el día en que vino en paz[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «no había hecho sus pies». La expresión se refiere al descuido del cuidado o aseo normal de los pies.
    reason: lexical_alternative
  - marker: b
    text: O «ni había cuidado su bigote». El término hebreo se refiere específicamente al área del vello sobre el labio superior, no necesariamente a toda la barba.
    reason: lexical_alternative
  - marker: c
    text: O «hasta el día en que vino en paz» o «llegó sano y salvo».
    reason: lexical_alternative
lexical_decisions:
- source_word: יָרַד
  english_pob_choice: came down
  chosen_spanish: descendió
  alternatives_spanish:
  - bajó
  - vino
  lexicon: HALOT
  rationale: El verbo hebreo expresa movimiento hacia abajo. En español, «descendió» conserva el valor direccional y un registro digno, adecuado para la escena narrativa.
- source_word: לִקְרַאת הַמֶּלֶךְ
  english_pob_choice: to meet the king
  chosen_spanish: para recibir al rey
  alternatives_spanish:
  - para encontrarse con el rey
  - para salir al encuentro del rey
  lexicon: HALOT
  rationale: La idea idiomática es ir al encuentro de alguien. «Para recibir al rey» expresa bien la intención en español sin perder el matiz de acercamiento respetuoso.
- source_word: וְלֹא עָשָׂה רַגְלָיו
  english_pob_choice: He had not cared for his feet
  chosen_spanish: No había cuidado de sus pies
  alternatives_spanish:
  - No había atendido sus pies
  - No había hecho sus pies
  lexicon: HALOT
  rationale: La expresión hebrea es literal y idiomática a la vez. Se conserva el giro con «cuidado de sus pies» para reflejar el sentido de aseo/atención personal sin explicar de más en el texto principal.
- source_word: וְלֹא עָשָׂה שְׂפָמוֹ
  english_pob_choice: nor trimmed his mustache
  chosen_spanish: ni recortado su bigote
  alternatives_spanish:
  - ni cuidado su bigote
  - ni recortado su labio superior
  lexicon: HALOT
  rationale: שָׂפָם designa el área del bigote/labio superior. «Bigote» es la forma natural y precisa en español; «recortado» mantiene la idea de grooming del contexto.
- source_word: וְאֶת בְּגָדָיו לֹא כִבֵּס
  english_pob_choice: nor washed his clothes
  chosen_spanish: ni lavado sus vestidos
  alternatives_spanish:
  - ni lavado su ropa
  - ni lavado sus prendas
  lexicon: HALOT
  rationale: כיבס es lavar ropa/vestidos. «Vestidos» preserva un término más cercano al tenor bíblico que «ropa», sin sonar anticuado en exceso.
- source_word: לְמִן הַיּוֹם לֶכֶת הַמֶּלֶךְ
  english_pob_choice: from the day the king departed
  chosen_spanish: desde el día en que el rey partió
  alternatives_spanish:
  - desde el día que el rey salió
  - desde el día de la partida del rey
  lexicon: HALOT
  rationale: La construcción temporal marca el inicio del periodo. «Partió» refleja el sentido de salida/departure con un registro formal y claro.
- source_word: עַד הַיּוֹם אֲשֶׁר בָּא בְשָׁלוֹם
  english_pob_choice: until the day he came in peace
  chosen_spanish: hasta el día en que vino en paz
  alternatives_spanish:
  - hasta el día en que llegó en paz
  - hasta el día en que arribó seguro
  lexicon: HALOT
  rationale: La frase final retiene בְשָׁלוֹם como «en paz». Se evita añadir «casa» o «hogar», que no está explícito, y se conserva la ambigüedad entre paz y seguridad.
translation_notes:
  revision_awareness: La revisión más reciente del inglés POB afinó el registro de «departed» y eliminó «home» de la clausula final. El español sigue esa pauta con «partió» y «vino en paz», sin añadir «hogar» ni otra explicitación no presente en el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se usa «bigote» para שָׂפָם siguiendo el valor lexical específico del término.
  - Se conserva «en paz» para בְשָׁלוֹם, evitando ampliar a «llegó seguro» en el texto principal.
  - El estilo busca formalidad bíblica moderna sin depender de la fórmula tradicional «el rey salió» cuando «partió» expresa mejor el hebreo.
