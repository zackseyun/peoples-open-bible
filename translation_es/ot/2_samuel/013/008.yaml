translation:
  language: es
  text: Entonces Tamar fue a casa de su hermano Amnón, mientras él estaba acostado. Tomó la masa, la amasó, la moldeó en tortas[a] ante sus ojos, y coció[b] las tortas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las formó en tortas con forma de corazón»; el verbo y el sustantivo hebreos son raros y podrían aludir a una forma asociada con la palabra «corazón».
    reason: lexical_alternative
  - marker: b
    text: O «hirvió»; el verbo hebreo puede denotar específicamente hervir, aunque aquí también puede funcionar de manera más general como «cocinar».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּלֶךְ
  english_pob_choice: So ... went
  chosen_spanish: Entonces ... fue
  alternatives_spanish:
  - Y ... fue
  - Así que ... fue
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva avanza la acción; «Entonces» conserva la secuencia sin sonar rígido en español.
- source_word: בֵּית
  english_pob_choice: to the house of
  chosen_spanish: a casa de
  alternatives_spanish:
  - a la casa de
  - a la vivienda de
  lexicon: HALOT
  rationale: Con un verbo de movimiento, «a casa de» es natural en español y comunica la referencia doméstica del hebreo sin sobretraducir.
- source_word: אָחִיהָ
  english_pob_choice: her brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - su hermano mayor
  - el hermano de ella
  lexicon: HALOT
  rationale: El sufijo femenino de tercera persona se refleja con el contexto; «su hermano» es claro y fiel.
- source_word: וְהוּא שֹׁכֵב
  english_pob_choice: while he was lying down
  chosen_spanish: y él estaba acostado
  alternatives_spanish:
  - mientras él estaba acostado
  - y él yacía
  lexicon: HALOT
  rationale: El hebreo presenta una circunstancia de estado; «estaba acostado» conserva el sentido sin forzar una locución más interpretativa.
- source_word: הַבָּצֵק
  english_pob_choice: the dough
  chosen_spanish: la masa
  alternatives_spanish:
  - la masa de harina
  - la masa para hacer pan
  lexicon: HALOT
  rationale: En español culinario, «masa» es el equivalente natural de בצק en este contexto.
- source_word: וְתָלֹשׁ
  english_pob_choice: kneaded it
  chosen_spanish: la amasó
  alternatives_spanish:
  - la trabajó
  - la sobó
  lexicon: HALOT
  rationale: לוש se refiere a amasar/amasar masa; «la amasó» es preciso e idiomático.
- source_word: וַתְּלַבֵּב
  english_pob_choice: shaped it into cakes
  chosen_spanish: la moldeó en tortas
  alternatives_spanish:
  - la formó en tortas
  - la hizo tortas
  lexicon: HALOT
  rationale: El verbo es raro y el inglés POB evita comprometerse con «heart-shaped». «Moldeó en tortas» mantiene el acto de dar forma sin añadir una glosa especulativa en el texto principal.
- source_word: לְעֵינָיו
  english_pob_choice: in his sight
  chosen_spanish: ante sus ojos
  alternatives_spanish:
  - en su presencia
  - delante de él
  lexicon: HALOT
  rationale: La locución hebrea expresa visibilidad/presencia. «Ante sus ojos» es una equivalencia natural y conserva la imagen visual.
- source_word: וַתְּבַשֵּׁל
  english_pob_choice: cooked
  chosen_spanish: coció
  alternatives_spanish:
  - cocinó
  - hervió
  lexicon: HALOT
  rationale: בשל puede abarcar cocinar o hervir; «coció» es sobrio y no fuerza una especificación mayor que la del hebreo.
- source_word: הַלְּבִבוֹת
  english_pob_choice: the cakes
  chosen_spanish: las tortas
  alternatives_spanish:
  - los pasteles
  - las tortas de masa
  lexicon: HALOT
  rationale: Para este alimento preparado, «tortas» es una opción natural y suficientemente amplia. El texto no obliga a una equivalencia técnica más precisa.
translation_notes:
  revision_awareness: Coincide con el pasaje fuente y con el audio de revisión más reciente, que no indicó cambios. Se mantiene la solución del inglés POB para la rareza léxica de וַתְּלַבֵּב / לְּבִבֹת, pero en español se evita una afirmación más fuerte que la evidencia.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se mantiene un registro sobrio y narrativo, con español natural y sin calcos innecesarios del inglés.
  - Se evita «Cristo»/«Mesías» y otros términos doctrinales porque no aparecen en el versículo.
  - 'La solución culinaria sigue la cautela del audit trail: traducción clara en el texto principal y alternativa rara en nota.'
