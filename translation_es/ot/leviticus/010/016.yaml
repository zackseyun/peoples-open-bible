translation:
  language: es
  text: 'Ahora Moisés buscó con insistencia el macho cabrío de la ofrenda por el pecado[a], y he aquí que estaba quemado[b]. Entonces se enojó con Eleazar y con Itamar, los restantes hijos[c] de Aarón, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «buscó y buscó el macho cabrío de la ofrenda por el pecado». El hebreo usa un infinitivo absoluto con verbo finito para intensificar la acción.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «estaba completamente quemado». El hebreo describe el animal en un estado quemado, con posible matiz de consumido por el fuego.'
    reason: lexical_alternative
  - marker: c
    text: «Los restantes hijos» se refiere a Eleazar e Itamar, los hijos de Aarón que quedaron después de la muerte de Nadab y Abiú (Lev 10:1–2, 12).
    reason: cross_reference
lexical_decisions:
- source_word: שְׂעִיר הַחַטָּאת
  english_pob_choice: the goat of the sin offering
  chosen_spanish: el macho cabrío de la ofrenda por el pecado
  alternatives_spanish:
  - el macho cabrío para la ofrenda por el pecado
  - el macho cabrío de la expiación
  lexicon: HALOT
  rationale: שְׂעִיר designa un macho cabrío, y el constructo con הַחַטָּאת señala la categoría sacrificial. En español, "ofrenda por el pecado" comunica con claridad el sentido cultual sin forzar una paráfrasis doctrinal.
- source_word: דָּרֹשׁ דָּרַשׁ
  english_pob_choice: diligently searched for
  chosen_spanish: buscó con insistencia
  alternatives_spanish:
  - buscó diligentemente
  - buscó y buscó
  - indagó cuidadosamente
  lexicon: HALOT
  rationale: El infinitivo absoluto con verbo finito intensifica la acción. "Buscó con insistencia" conserva esa fuerza enfática en un español natural, sin caer en repetición mecánica.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y resultó que
  - y entonces
  lexicon: HALOT
  rationale: La fórmula introduce un hallazgo súbito. "Y he aquí" preserva el golpe narrativo y la solemnidad del descubrimiento.
- source_word: שֹׂרָף
  english_pob_choice: it had been burned up
  chosen_spanish: estaba quemado
  alternatives_spanish:
  - había sido quemado por completo
  - estaba consumido por el fuego
  - se había quemado
  lexicon: HALOT
  rationale: La forma participial describe el estado encontrado del animal. "Estaba quemado" mantiene el resultado visible sin añadir más de lo que exige el hebreo; las otras opciones explicitan más el consumo completo.
- source_word: וַיִּקְצֹף
  english_pob_choice: he was angry
  chosen_spanish: se enojó
  alternatives_spanish:
  - se enfureció
  - ardió en ira
  - se irritó
  lexicon: HALOT
  rationale: El verbo expresa enojo o ira. "Se enojó" es fiel y sobrio; evita intensificar innecesariamente la reacción de Moisés.
- source_word: הַנּוֹתָרִם
  english_pob_choice: remaining sons
  chosen_spanish: los hijos restantes
  alternatives_spanish:
  - los hijos que quedaban
  - los que habían quedado
  - los sobrevivientes
  lexicon: HALOT
  rationale: El participio identifica a Eleazar e Itamar como los que quedaron después de la muerte de Nadab y Abiú. "Hijos restantes" reproduce la relación de parentesco y el valor de "remaining" sin desplazarlo a un término más interpretativo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'y dijo:'
  - 'al decir:'
  - diciendo
  lexicon: HALOT
  rationale: Es el introductor estándar del discurso y enlaza con la frase que sigue en el contexto inmediato. Mantener "diciendo:" conserva la conexión sintáctica sin completar prematuramente el contenido.
theological_decisions:
- issue: Identificación de "los hijos restantes" de Aarón
  english_pob_reading: '"Aaron’s remaining sons" refers to Eleazar and Ithamar, the sons left after the death of Nadab and Abihu (Lev 10:1–2, 12).'
  chosen_spanish_reading: '"los hijos restantes de Aarón" identifica a Eleazar e Itamar como los hijos que quedaron tras la muerte de Nadab y Abiú.'
  alternative_spanish_readings:
  - los hijos que le quedaban a Aarón
  - los sobrevivientes hijos de Aarón
  - los hijos que habían quedado de Aarón
  rationale: 'La frase refleja una referencia relacional e histórica: no se trata de una categoría teológica, sino de la identificación de los dos hijos vivos de Aarón en este punto narrativo. La redacción española mantiene esa relación sin añadir explicaciones al cuerpo del versículo.'
  doctrine_reference: Levítico 10:1–2, 12
translation_notes:
  revision_awareness: El texto inglés auditado muestra un acuerdo alto y no registra revisiones aplicadas; la versión española sigue ese mismo perfil, conservando las decisiones léxicas principales y la estructura narrativa, con adaptación natural al español.
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" para el nombre divino solo cuando aparezca en el contexto; aquí no hay mención explícita.
  - Se usó "ofrenda por el pecado" para preservar la categoría sacrificial sin sustituirla por un término más eclesiástico.
  - Se conservó la intensidad del infinitivo absoluto mediante una expresión española enfática, no literal.
  - '"Hijos restantes" se eligió para reflejar la relación de parentesco y la idea de los que quedaron, evitando "siervos" u այլ desplazamientos semánticos.'
