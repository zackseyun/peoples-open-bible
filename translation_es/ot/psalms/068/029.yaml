revisions:
- from: Tu Dios ha mandado tu fuerza. Muestra fuerza[a], oh Dios, tú que has obrado por nosotros.
  to: Tu Dios ha ordenado tu fuerza. Muestra fuerza[a], oh Dios, que has obrado en favor nuestro.
  rationale: 'Se hicieron ajustes menores de estilo y precisión: «ha ordenado» expresa mejor el decreto autoritativo de צִוָּה; «en favor nuestro» refleja con más claridad el sentido benefactivo de לָנוּ; y se aligeró la cláusula relativa en español sin alterar el significado ni la ambigüedad documentada de עוּזָה.'
