  yaml_path: translation/ot/esther/003/002.yaml
  text: And all the king’s servants who were at the king’s gate were bowing down and paying homage to Haman[a], for the king had so commanded concerning him[b]. But Mordecai would not bow down or pay homage.
  footnotes:
