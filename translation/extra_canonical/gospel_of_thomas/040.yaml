translation:
  text: Jesus said[a], "A grapevine was planted outside the Father, and since it is
    not established[e][d][c][b], it will be uprooted from its root and will perish."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The noun is a Greek loan (ἄμπελος), here spelled without the nasal (ⲙ) as
      ⲃⲁⲡⲉⲗⲟⲟⲗⲉ, a dialectal/orthographic feature.
    reason: dialect_note
  - marker: b
    text: ⲥⲧⲁϫⲣⲟ could also be rendered “be firm/strong,” or idiomatically “take root.”
      “Be established” keeps the broader semantic range without adding imagery not
      stated by the verb itself.
    reason: lexical_alternative
  - marker: c
    text: Coptic uses an impersonal “they” (ⲛⲧⲟⲟⲩ) for generic agency; English could
      paraphrase with a passive (“it will be uprooted”), but the translation retains
      the active impersonal form.
    reason: lexical_alternative
  - marker: d
    text: ϩⲁ ⲡⲉⲥⲛⲟⲩⲛⲉ can be “from its root” or “by its root”; either preposition
      reflects separation/source.
    reason: lexical_alternative
  - marker: e
    text: Or 'A grapevine was planted outside the Father; and since it was not established,
      they will uproot it from its root, and it will perish.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲟⲩⲃⲁⲡⲉⲗⲟⲟⲗⲉ
  chosen: grapevine
  alternatives:
  - vine
  lexicon: Crum; Layton
  rationale: Loan from Gk ἄμπελος; the NH text shows a Lycopolitan-leaning form without
    the nasal (ampelos > bapel-). "Grapevine" keeps the agricultural specificity.
- source_word: ⲁⲩⲧⲟϭⲥ (ⲧⲱϭⲉ + -ⲥ)
  chosen: plant (planted it)
  alternatives:
  - set (it)
  - put (it) in the ground
  lexicon: Crum; Layton
  rationale: Verb ⲧⲱϭⲉ means "to plant"; here 3pl perfective with enclitic -ⲥ "it".
    Orthographic assimilation to ⲟ in the manuscript does not alter meaning.
- source_word: ⲙ̄ⲡⲥⲁ ⲛⲃⲟⲗ
  chosen: outside
  alternatives:
  - outside of
  lexicon: Layton (syntax)
  rationale: Set phrase for exterior location; rendered tersely to preserve Thomasine
    cadence.
- source_word: ⲡⲉⲓⲱⲧ
  chosen: the Father
  alternatives:
  - Father
  lexicon: Crum
  rationale: Definite article is present; not "my Father." Avoids harmonization with
    Matt 15:13.
- source_word: ⲥⲧⲁϫⲣⲟ
  chosen: be established
  alternatives:
  - be firm
  - be strong
  - be set fast
  lexicon: Crum
  rationale: In agrarian context of a vine, "be established" captures taking hold/being
    set, without adding imagery ("take root") not explicit in the verb.
- source_word: ⲛⲧⲟⲟⲩ (subject pronoun) + ⲛⲁ (future)
  chosen: they will (generic)
  alternatives:
  - (impersonal) one will
  - 'passive: will be'
  lexicon: Layton (grammar)
  rationale: Coptic uses an impersonal 3pl future; retaining "they will" preserves
    the formality and strangeness rather than smoothing to a passive.
- source_word: ⲡⲱⲣⲕ
  chosen: uproot
  alternatives:
  - root out
  - pull up by the roots
  lexicon: Crum
  rationale: Standard rendering for this verb in agricultural contexts.
- source_word: ϩⲁ ⲡⲉⲥⲛⲟⲩⲛⲉ
  chosen: from its root
  alternatives:
  - by its root
  - at the root
  lexicon: Crum
  rationale: ϩⲁ with noun expresses source/separation; "from" fits English idiom while
    preserving prepositional nuance.
- source_word: ⲧⲁⲕⲟ
  chosen: perish
  alternatives:
  - be destroyed
  - die
  lexicon: Crum
  rationale: ⲧⲁⲕⲟ has the sense of perish/come to ruin; "perish" keeps the gnomic,
    solemn tone.
textual_note: 'Dialect/orthography: The manuscript reads ⲟⲩⲃⲁⲡⲉⲗⲟⲟⲗⲉ for the Greek
  loan ἄμπελος (vine), showing loss of the nasal (ⲙ) typical in Lycopolitan-leaning
  spellings. The verb appears as ⲁⲩⲧⲟϭⲥ, an assimilated spelling for expected ⲁⲩⲧⲱϭⲉⲥ
  (3pl perfective of ⲧⲱϭⲉ ‘plant’ with enclitic -ⲥ ‘it’). The clause introduced by
  ⲉⲣⲉ … ⲁⲛ functions causally (“since/because it did not …”), here with ⲥⲧⲁϫⲣⲟ ‘be
  established/firm’. The future sequence ⲛⲧⲟⲟⲩ ⲛⲁ … retains an impersonal 3pl subject
  (“they will …”), a common Coptic idiom. No lacunae or restored text are indicated
  by Dilley for this saying.'
