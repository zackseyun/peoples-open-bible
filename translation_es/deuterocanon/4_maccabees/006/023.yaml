translation:
  language: es
  text: Pero ustedes[a], los guardias del tirano, ¿por qué tardan?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: ''portadores de lanza''; es decir, los guardias armados o escoltas del tirano.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ... δορυφόροι
  english_pob_choice: the ... bodyguards
  chosen_spanish: los guardias
  alternatives_spanish:
  - los guardaespaldas
  - los portadores de lanza
  - los escoltas armados
  lexicon: LSJ
  rationale: δoρυφόροι significa literalmente 'portadores de lanza', pero en este contexto designa a los guardias armados del tirano. 'Guardias' comunica bien la función en español y mantiene el tono coercitivo sin sonar forzado. Se evita 'guardaespaldas' por ser demasiado moderno e individualizante.
- source_word: τοῦ τυράννου
  english_pob_choice: the tyrant’s
  chosen_spanish: del tirano
  alternatives_spanish:
  - del tirano cruel
  - del déspota
  lexicon: LSJ
  rationale: El genitivo posesivo se expresa naturalmente con 'del tirano'. Se conserva la carga negativa de τύραννος sin añadir calificativos que el griego no exige.
- source_word: τί μέλλετε;
  english_pob_choice: why do you delay?
  chosen_spanish: ¿por qué tardan?
  alternatives_spanish:
  - ¿por qué se demoran?
  - ¿por qué se quedan?
  - ¿qué esperan?
  lexicon: BDAG/LSJ
  rationale: Aquí μέλλω tiene valor de demora o vacilación ante la acción. '¿Por qué tardan?' reproduce la reprensión inmediata del griego de forma natural en español. 'Demoran' sería posible, pero 'tardan' suena más directo y oral en este reproche.
- source_word: οἱ δὲ
  english_pob_choice: But you
  chosen_spanish: Pero ustedes
  alternatives_spanish:
  - Pero ustedes mismos
  - Mas ustedes
  lexicon: LSJ
  rationale: Aunque el griego usa un artículo con valor de sujeto ('los...'), el contexto de خطاب directo permite una segunda persona explícita. 'Pero ustedes' conserva el giro adversativo y la confrontación directa, como en la solución inglesa auditada.
translation_notes:
  revision_awareness: 'Se corrigió la falta del marcador en el texto: la nota [a] ahora está anclada en ''ustedes[a]'' para corresponder exactamente con la footnote. La puntuación sigue la revisión inglesa más reciente, sin guion innecesario.'
  spanish_consistency_notes:
  - Se mantuvo 'tirano' para τύραννος por su fuerza política y moral negativa.
  - Se eligió un español natural y formal, evitando calcos innecesarios como '¿qué están por hacer?' que no reflejan bien el valor de μέλλω aquí.
  - La nota usa 'portadores de lanza' como alternativa lexical, preservando la tensión entre sentido literal y funcional.
