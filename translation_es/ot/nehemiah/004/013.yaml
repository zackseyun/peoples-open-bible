translation:
  language: es
  text: 'Y dije a los nobles, a los oficiales y al resto del pueblo: «La obra es grande y extensa, y nosotros estamos separados[a] en el muro, lejos unos de otros».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «cada hombre de su hermano», un modismo hebreo que significa «unos de otros».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֹרִים
  english_pob_choice: the nobles
  chosen_spanish: los nobles
  alternatives_spanish:
  - los libres
  - los aristócratas
  lexicon: HALOT
  rationale: En este contexto nehemiano el término designa a la élite social o a los principales del pueblo. «Nobles» comunica bien ese rango en español sin volver el texto demasiado técnico.
- source_word: הַסְּגָנִים
  english_pob_choice: the officials
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los gobernantes
  - los delegados
  lexicon: HALOT
  rationale: El término apunta a líderes subordinados o administradores. «Oficiales» refleja esa función cívica de manera natural en español.
- source_word: יֶתֶר הָעָם
  english_pob_choice: the rest of the people
  chosen_spanish: el resto del pueblo
  alternatives_spanish:
  - los demás del pueblo
  - el remanente del pueblo
  lexicon: HALOT
  rationale: Es la manera más directa e idiomática de expresar que se trata de todos los demás fuera de los grupos mencionados.
- source_word: הַמְּלָאכָה
  english_pob_choice: the work
  chosen_spanish: la obra
  alternatives_spanish:
  - el trabajo
  - la labor
  lexicon: HALOT
  rationale: Aquí se trata de la reconstrucción del muro; «obra» suena natural y solemne en español para un proyecto de esta clase.
- source_word: הַרְבֵּה
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - muy grande
  - amplia
  lexicon: HALOT
  rationale: En posición predicativa expresa magnitud. «Grande» conserva la sencillez del original y del audit trail en inglés.
- source_word: וּרְחָבָה
  english_pob_choice: extensive
  chosen_spanish: extensa
  alternatives_spanish:
  - ancha
  - amplia
  lexicon: HALOT
  rationale: El hebreo añade la idea de extensión o amplitud del trabajo. «Extensa» preserva esa idea con un registro formal y claro.
- source_word: נִפְרָדִים
  english_pob_choice: separated
  chosen_spanish: separados
  alternatives_spanish:
  - dispersos
  - divididos
  lexicon: HALOT
  rationale: Describe la disposición espacial de los trabajadores a lo largo del muro, no una división relacional. «Separados» mantiene ese sentido sin exagerarlo.
- source_word: עַל הַחוֹמָה
  english_pob_choice: on the wall
  chosen_spanish: sobre el muro
  alternatives_spanish:
  - en el muro
  - a lo largo del muro
  lexicon: HALOT
  rationale: «Sobre el muro» refleja con fidelidad la preposición עַל y mantiene la imagen física del hebreo. «Muro» es más natural en español aquí que «pared».
- source_word: אִישׁ מֵאָחִיו
  english_pob_choice: far from one another
  chosen_spanish: lejos unos de otros
  alternatives_spanish:
  - cada uno de su hermano
  - uno de otro
  lexicon: HALOT
  rationale: El hebreo es un modismo recíproco, literalmente «cada hombre de su hermano». En español, «lejos unos de otros» transmite el sentido idiomático con naturalidad y evita una traducción demasiado literal.
translation_notes:
  revision_awareness: Se siguió el audit trail inglés que revisó ‘spread out’ a ‘extensive’ y ‘along the wall’ a ‘on the wall’; por eso se eligieron «extensa» y «sobre el muro». También se preservó el valor idiomático de אִישׁ מֵאָחִיו mediante una nota, anclada directamente en el texto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «muro» para conservar la imagen constructiva del contexto de Nehemías.
  - La estructura sintáctica reproduce la enumeración del hebreo sin recargarla.
  - La nota [a] está anclada en la frase correspondiente y no se deja ninguna nota sin marca.
