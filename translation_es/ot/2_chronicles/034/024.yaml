translation:
  language: es
  text: 'Así dice Yahvé: He aquí, yo traigo desastre sobre este lugar y sobre sus habitantes: todas las maldiciones escritas en el libro[a], que leyeron delante del rey de Judá.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'todas las maldiciones juradas', subrayando las sanciones del pacto evocadas por el libro de la ley.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el default del proyecto para el nombre divino, manteniendo el nombre propio del texto hebreo en vez de ocultarlo con una sustitución reverencial.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto dice
  - Así ha dicho
  lexicon: HALOT
  rationale: La fórmula profética se expresa de modo natural en español con el mismo tono solemne y declarativo de la construcción hebrea.
- source_word: הִנְנִי
  english_pob_choice: Behold, I am
  chosen_spanish: He aquí, yo
  alternatives_spanish:
  - Miren, yo
  - Mira, yo
  lexicon: HALOT
  rationale: Se preserva la fuerza deíctica y enfática de la fórmula de anuncio; 'He aquí' conserva mejor la solemnidad que equivalentes más coloquiales.
- source_word: מֵבִיא רָעָה
  english_pob_choice: am bringing disaster
  chosen_spanish: traigo desastre
  alternatives_spanish:
  - traigo calamidad
  - traigo mal
  lexicon: HALOT
  rationale: רָעָה aquí es juicio perjudicial, no mal moral. 'Desastre' comunica la idea de calamidad punitiva sin atribuir maldad ética a Dios.
- source_word: הַמָּקוֹם הַזֶּה
  english_pob_choice: this place
  chosen_spanish: este lugar
  alternatives_spanish:
  - este sitio
  lexicon: HALOT
  rationale: Es la equivalencia natural y precisa del sintagma deíctico, sin precisar más de lo que el verso dice explícitamente.
- source_word: יוֹשְׁבָיו
  english_pob_choice: its inhabitants
  chosen_spanish: sus habitantes
  alternatives_spanish:
  - los que habitan en él
  - sus moradores
  lexicon: HALOT
  rationale: La forma posesiva + participio se vierte de manera idiomática en español con 'sus habitantes', conservando el referente colectivo.
- source_word: אֵת כָּל הָאָלוֹת
  english_pob_choice: all the curses
  chosen_spanish: todas las maldiciones
  alternatives_spanish:
  - todas las maldiciones juradas
  - todas las maldiciones del pacto
  lexicon: HALOT
  rationale: Se mantiene el sentido general de אָלוֹת como maldiciones de juicio; el matiz técnico de sanciones pactales queda en nota para no sobrecargar el texto principal.
- source_word: הַכְּתוּבוֹת עַל הַסֵּפֶר
  english_pob_choice: written in the book
  chosen_spanish: escritas en el libro
  alternatives_spanish:
  - escritas en el rollo
  - escritas en el documento
  lexicon: HALOT
  rationale: '''Libro'' reproduce la elección del POB inglés y es español natural; la posible acepción de ''rollo'' se preserva como alternativa textual implícita sin imponerla en el texto principal.'
- source_word: אֲשֶׁר קָרְאוּ לִפְנֵי
  english_pob_choice: that they have read before
  chosen_spanish: que leyeron delante de
  alternatives_spanish:
  - que han leído ante
  - que se leyó delante de
  lexicon: HALOT
  rationale: El plural activo hebreo se refleja con un pasado simple fluido en español. 'Delante de' conserva la escena pública de la lectura mejor que fórmulas más pesadas.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: the king of Judah
  chosen_spanish: el rey de Judá
  alternatives_spanish:
  - el rey judío
  - el monarca de Judá
  lexicon: HALOT
  rationale: La construcción genitiva se traduce de forma directa y transparente, sin perder la referencia histórica concreta.
theological_decisions:
- issue: Sentido de רָעָה en juicio divino
  english_pob_reading: disaster
  chosen_spanish_reading: desastre
  alternative_spanish_readings:
  - mal
  - calamidad
  rationale: En este contexto, רָעָה describe la sentencia de juicio que viene de Yahvé. 'Desastre' evita entenderlo como mal moral y conserva la gravedad del castigo anunciado.
  doctrine_reference: Énfasis del texto en juicio pactal; preservación del sentido lexical sin implicar maldad ética en Dios.
- issue: Valor de הָאָלוֹת como sanciones del pacto
  english_pob_reading: curses
  chosen_spanish_reading: maldiciones
  alternative_spanish_readings:
  - maldiciones juradas
  - maldiciones del pacto
  rationale: '''Maldiciones'' es la solución principal más clara y legible en español. El matiz de sanciones solemnes del pacto se deja como alternativa porque el verso no exige una perífrasis más técnica en el texto principal.'
  doctrine_reference: Lenguaje de las maldiciones del pacto en la Torá y su aplicación profética.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la lectura final inglesa sin depender mecánicamente de ella: conserva Yahvé como nombre divino, mantiene la fórmula profética solemne, y resuelve רָעָה con un término de juicio punitivo (''desastre'') en lugar de un calco moralizante. También retiene la ambigüedad de סֵפֶר con ''libro'' en el texto principal, con nota para la alternativa más técnica.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente con el default del proyecto para יְהוָה.
  - '''He aquí'' mantiene el registro elevado y la fuerza de anuncio de הִנְנִי.'
  - '''Maldiciones'' se conserva como término principal; no se reemplaza por lenguaje eclesiástico no sustentado por el hebreo.'
  - '''Libro'' se usa en el texto principal porque es natural en español y compatible con la acepción de סֵפֶר; la alternativa ''rollo'' queda solo en la nota.'
  - La puntuación divide con dos puntos la cita profética, en concordancia con el tono oracular del hebreo.
