revisions:
- from: De varón a mujer los despedirás fuera del campamento[a]; los despedirás para que no contaminen su campamento[b], en medio del cual yo habito.
  to: De varón a mujer los enviarás fuera del campamento[a]; los enviarás fuera para que no profanen su campamento[b], en medio del cual yo habito.
  rationale: Se reemplaza «despedirás» por «enviarás fuera» para reflejar con fidelidad la repetición de שלח en contexto de exclusión ritual. Se cambia «contaminen» por «profanen» para conservar mejor la fuerza cultual de יטמאו respecto del campamento. Se mantienen las notas documentadas y la cláusula final tal como la revisión POB la encuadra en singular, con alternativa anotada.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:31:29Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en gran parte el sentido del hebreo: mantiene el rango inclusivo «de varón a mujer», la repetición verbal de שלח, la exclusión «fuera del campamento» y la cláusula final sobre la morada divina. También conserva las dos notas del rastro POB sobre la alternativa plural y la posible referencia del relativo final. Sin embargo, «despedirás» debilita y desvía el sentido de exclusión ritual; en este contexto no es despedida sino envío/expulsión fuera del campamento. Además, «contaminen» pierde algo de la fuerza cultual de יטמאו.'
  spanish_quality_summary: El texto es legible, pero «los despedirás» suena impropio en español bíblico y puede sugerir simplemente dejar ir o despedirse de alguien. «Los enviarás fuera» es más natural y fiel. También conviene «profanen» o «hagan impuro» para la contaminación ritual del campamento; «profanen» aquí suena digno y más cultual que «contaminen». El resto del verso fluye bien en español formal eclesial.
  glossary_alignment: 'No hay conflicto con los términos de proyecto mayores. La elección «varón ... mujer» es aceptable por fidelidad al par hebreo, aunque «varón ... hembra» sería más biológicamente exacto. La principal desalineación léxica está en שלח: el POB inglés documenta «send them ... send them out», no «despedir». Para טמא, la documentación favorece un término de impureza/defilement más que un simple «contaminar».'
  issues:
  - severity: high
    issue: «los despedirás» para תשלחו/תשלחום
    rationale: «Despedir» en español normalmente significa dar por terminada una relación o dejar marchar, y no comunica bien la remoción obligatoria fuera del campamento en un contexto de pureza ritual. El hebreo repetido exige una formulación de envío/salida, por ejemplo «los enviarás ... los enviarás fuera».
  - severity: medium
    issue: «contaminen» para יטמאו
    rationale: Aunque posible, «contaminar» suena más general y menos cultual. En un contexto sacerdotal sobre impureza del campamento, una forma como «profanen» o «hagan impuro» preserva mejor la fuerza ritual documentada por el POB.
  - severity: low
    issue: La nota a sobre «campamentos» es correcta, pero el texto principal singular depende de la revisión inglesa, no del hebreo base
    rationale: Esto no impide una traducción aceptable porque la nota preserva la alternativa relevante, pero conviene que la redacción principal siga sonando natural y que la nota mantenga clara la existencia del plural hebreo.
  revised_spanish_text: De varón a mujer los enviarás fuera del campamento[a]; los enviarás fuera para que no profanen su campamento[b], en medio del cual yo habito.
  revised_footnotes:
  - marker: a
    text: O «sus campamentos»; el hebreo tiene el plural «sus campamentos», posiblemente aludiendo a las divisiones o secciones del campamento.
    reason: lexical_alternative
  - marker: b
    text: O «en medio de los cuales habito». El hebreo puede referirse tanto al campamento como al pueblo asociado con él.
    reason: alternative_reading
  revision_rationale: Se reemplaza «despedirás» por «enviarás fuera» para reflejar con fidelidad la repetición de שלח en contexto de exclusión ritual. Se cambia «contaminen» por «profanen» para conservar mejor la fuerza cultual de יטמאו respecto del campamento. Se mantienen las notas documentadas y la cláusula final tal como la revisión POB la encuadra en singular, con alternativa anotada.
