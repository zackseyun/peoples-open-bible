translation:
  language: es
  text: Habla a los hijos de Israel[a], que tomen para mí una ofrenda. De todo hombre cuyo corazón lo mueva[b], ustedes tomarán mi ofrenda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los hijos de Israel», designación tradicional del pacto para el pueblo de Israel.'
    reason: cultural_note
  - marker: b
    text: 'O: «cuyo corazón lo impulse» o «cuyo corazón lo inspire». El hebreo enfatiza una disposición interior voluntaria.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דַּבֵּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Habla a
  lexicon: HALOT
  rationale: El imperativo piel de דבר se expresa naturalmente en español con «Habla». Mantiene el tono directo del mandato y funciona bien con el complemento introducido por «a».},{
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión familiar masculina del hebreo, sin neutralizarla a «israelitas». «Hijos de Israel» es la forma española más natural y fiel al valor covenantal del giro.
- source_word: וְיִקְחוּ לִי
  english_pob_choice: that they take for me
  chosen_spanish: para que tomen para mí
  alternatives_spanish:
  - y tomen para mí
  - que tomen para mí
  lexicon: HALOT
  rationale: El verbo con prefijo aquí funciona con valor exhortativo/jusivo tras el mandato. «Para que tomen» comunica bien el propósito o resultado esperado sin perder la referencia de pertenencia en «para mí».
- source_word: תְּרוּמָה
  english_pob_choice: offering
  chosen_spanish: ofrenda
  alternatives_spanish:
  - contribución
  - don
  - ofrenda elevada
  lexicon: HALOT
  rationale: En este contexto del tabernáculo, «ofrenda» transmite mejor el carácter consagrado del don. «Contribución» es una alternativa válida, pero en español suena más administrativa y menos cultual.
- source_word: מֵאֵת כָּל אִישׁ
  english_pob_choice: From every man
  chosen_spanish: De todo hombre
  alternatives_spanish:
  - De cada hombre
  - De toda persona
  lexicon: HALOT
  rationale: Se conserva el singular distributivo masculino de אִישׁ. «Todo hombre» refleja el hebreo con claridad y mantiene la precisión léxica de género presente en el texto.
- source_word: אֲשֶׁר יִדְּבֶנּוּ לִבּוֹ
  english_pob_choice: whose heart moves him
  chosen_spanish: cuyo corazón lo mueva
  alternatives_spanish:
  - cuyo corazón lo impulse
  - cuyo corazón lo inspire
  - cuyo corazón lo incite
  lexicon: HALOT
  rationale: El hebreo expresa un impulso interno voluntario; «mueva» reproduce ese dinamismo sin añadir un adverbio como «voluntariamente». Se conserva la tensión entre movimiento interior y libre disposición.
- source_word: תִּקְחוּ אֶת תְּרוּמָתִי
  english_pob_choice: you shall take my offering
  chosen_spanish: tomarán mi ofrenda
  alternatives_spanish:
  - tomarán mi ofrenda
  - tomarán mi contribución
  - recibirán mi ofrenda
  lexicon: HALOT
  rationale: «Tomarán» mantiene el vínculo léxico con לקח y refleja el mandato a los encargados de recibir la ofrenda. «Mi ofrenda» retiene el sufijo posesivo del hebreo, indicando pertenencia a Yahvé.
theological_decisions:
- issue: Cómo traducir תְּרוּמָה en un contexto de santuario sin cargarlo con lenguaje sacrificial posterior
  english_pob_reading: offering; contribution in footnote
  chosen_spanish_reading: ofrenda
  alternative_spanish_readings:
  - contribución
  - don
  rationale: La colección es para el tabernáculo por mandato de Dios; «ofrenda» preserva el carácter sagrado sin especificar más de lo que el contexto exige. Se conserva «contribución» como posible matiz, pero no se impone en el texto principal porque en español suena menos cultual.
  doctrine_reference: Translation philosophy §1, §5
- issue: Expresar la voluntad interior de manera fiel al hebreo idiomático
  english_pob_reading: whose heart moves him
  chosen_spanish_reading: cuyo corazón lo mueva
  alternative_spanish_readings:
  - cuyo corazón lo impulse
  - cuyo corazón lo inspire
  rationale: El texto no añade explícitamente un adverbio equivalente a «voluntariamente»; la disposición libre queda implicada en el mismo giro idiomático. La forma elegida preserva esa tensión sin sobreexplicar.
  doctrine_reference: Translation philosophy §2
- issue: Tratamiento del designador étnico-covenantal בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel
  rationale: Se mantiene la formulación heredada del hebreo para conservar la designación pactal y su tono formal. No se sustituye por «israelitas» porque ello suavizaría el parentesco lexical documentado en la fuente.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail al omitir cualquier adverbio equivalente a «willingly/voluntarily» y al traducir el valor jussivo de וְיִקְחוּ de forma directa con una construcción de finalidad/proyección («para que tomen»). También evita la fórmula más explicativa «contribución» en el cuerpo principal, dejando el matiz alternativo solo como posibilidad léxica implícita en las decisiones.
  spanish_consistency_notes:
  - Se mantiene la terminología POB «ofrenda» para תְּרוּמָה, coherente con el contexto sagrado del tabernáculo.
  - «Yahvé» no aparece en el versículo, por lo que no se introduce sin base textual.
  - Se conserva el paralelismo entre «tomen» y «tomarán» para reflejar la repetición de לקח.
  - La puntuación española sigue una cadencia clara de mandato + propósito + restricción distributiva.
