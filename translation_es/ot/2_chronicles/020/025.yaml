  to: Entonces Josafat y su pueblo fueron a saquear su botín[a], y hallaron entre ellos en abundancia bienes, cadáveres y objetos deseables; y tomaron para sí más de lo que podían cargar. Estuvieron tres días saqueando el botín, porque era mucho.
