review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja en general la lista cultual del hebreo: prohibición de comer localmente el diezmo, vino nuevo, aceite, primogénitos, votos/ofrendas voluntarias y la contribución de la mano. Conserva bien «dentro de tus puertas» y «vino nuevo». Sin embargo, «ninguno de tus votos que votos» no es español natural ni digno, y «la contribución de tu mano[c][b]» invierte los anclajes frente al sentido de las notas. También conviene suavizar «No podrás comer» a una formulación prohibitiva más jurídica y natural en español bíblico actual.'
  spanish_quality_summary: 'La calidad es mixta: varias decisiones son fieles, pero hay dos tropiezos importantes de legibilidad y estilo. «ninguno de tus votos que votos» suena defectuoso; la repetición hebrea debe preservarse de modo inteligible, p. ej. «ninguno de tus votos que hagas». Además, la doble nota en orden [c][b] sobre «contribución de tu mano» es confusa; la nota sobre la alternativa tradicional debe quedar como segunda nota secuencial y anclarse claramente al sintagma correspondiente. El resto del verso puede pulirse para fluidez jurídica sin perder literalidad.'
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. «Diezmo», «vino nuevo», «aceite», «ofrendas voluntarias» y la conservación de «puertas» están bien alineados. La distinción entre נדרים y נדבות debe mantenerse: en español conviene «votos que hagas» para נדריך אשר תדור, sin convertirlo en «ofrendas votivas».'
  issues:
  - severity: high
    issue: «ninguno de tus votos que votos» es gramaticalmente inaceptable en español
    rationale: Aunque intenta reflejar la repetición enfática hebrea, produce una frase defectuosa e impropia de una Biblia legible. «que hagas» conserva la construcción sin calco torpe.
  - severity: medium
    issue: «No podrás comer» suena más a imposibilidad que a prohibición legal
    rationale: El hebreo con יכל + infinitivo en contexto legal expresa prohibición. En español bíblico-jurídico, «No podrás comer» es posible, pero «No te será permitido comer» o «No podrás comer»; la primera comunica mejor la fuerza deontica. Aquí conviene la formulación más clara.
  - severity: medium
    issue: Orden y anclaje confusos de las notas [c][b]
    rationale: Las notas deben ir en orden único y corresponder con precisión al lugar del texto. La secuencia actual es técnicamente desordenada y poco clara para el lector.
  - severity: low
    issue: «ganado mayor» puede sentirse más interpretativo que necesario
    rationale: Es aceptable para בקר, pero «ganado» a secas frente a «rebaño» basta y suena más natural en registro bíblico general.
