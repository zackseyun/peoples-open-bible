lexical_decisions:
- source_word: ἐκάλεσεν
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - mandó llamar
  lexicon: BDAG
  rationale: El aoristo de καλέω aquí expresa una acción narrativa simple. «Llamó» es natural en español y conserva la idea básica sin añadir el matiz más formal de «convocó».
- source_word: τὸν ἄγγελον
  english_pob_choice: the angel
  chosen_spanish: al ángel
  alternatives_spanish:
  - al mensajero
  lexicon: BDAG
  rationale: En Tobit 12 el personaje es inequívocamente un ser celestial; por eso se mantiene «ángel» y no «mensajero».
- source_word: Λάβε
  english_pob_choice: Take
  chosen_spanish: Toma
  alternatives_spanish:
  - Recibe
  - Toma para ti
  lexicon: BDAG
  rationale: El imperativo de λαμβάνω en este contexto de ofrecimiento se expresa de forma directa con «toma», más natural y fiel al tono inmediato que «recibe».
- source_word: τὸ ἥμισυ
  english_pob_choice: half
  chosen_spanish: la mitad
  alternatives_spanish:
  - medio
  - una mitad
  lexicon: BDAG
  rationale: La expresión idiomática se vierte con «la mitad», que es la forma más clara y normal en español.
- source_word: πάντων
  english_pob_choice: of everything
  chosen_spanish: de todo
  alternatives_spanish:
  - de todo lo que
  - de todas las cosas
  lexicon: BDAG
  rationale: El genitivo plural amplio se traduce de manera compacta con «de todo», que en español cubre bien el sentido de totalidad del conjunto.
- source_word: ὧν
  english_pob_choice: that
  chosen_spanish: lo que
  alternatives_spanish:
  - que
  - lo cual
  lexicon: BDAG
  rationale: El relativo introduce una cláusula inconclusa en el fragmento conservado. «Lo que» permite dejar abierta la frase sin inventar el final y suena natural en español.
