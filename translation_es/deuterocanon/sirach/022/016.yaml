base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/022/016.yaml
  text: A wooden binding fastened into a building will not be loosened in an earthquake[c][b][a]; so a heart made firm by thoughtful counsel will not lose courage in time.
  footnotes:
  - marker: a
    text: Or 'will not come undone' for 'will not be loosened.' The Greek verb can denote being broken up or falling apart; the chosen rendering follows the fastening/building image.
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'by deliberate counsel' is compressed in Greek and may also be understood as 'upon thoughtful purpose' or 'on considered planning.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'in time'; the context suggests a time of testing or crisis.
    reason: lexical_alternative
