revisions:
- from: Porque toda víctima para aroma agradable[a] es cosa pequeña, y toda grasa para tu holocausto es muy poca; pero el que teme al Señor es grande para siempre.
  to: Porque todo sacrificio para aroma agradable es cosa pequeña, y toda grasa para tu holocausto es muy poca; pero el que teme al Señor es grande para siempre[a].
  rationale: Se reemplaza «víctima» por «sacrificio» para reflejar mejor θυσία y sonar más natural en español bíblico actual. Se mueve la nota [a] a «para siempre», que es el lugar correcto para la alternativa «siempre». No se requieren cambios doctrinales adicionales.
