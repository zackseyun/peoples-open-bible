translation:
  language: es
  text: Te arrojaré a la tierra[a]; te echaré en campo abierto, y haré posar sobre ti a toda ave del cielo; y saciaré con tu cuerpo[b] a las fieras de toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Te abandonaré en la tierra». El verbo hebreo puede expresar dejar o abandonar, además de arrojar.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «saciaré de ti a las fieras de toda la tierra», es decir, quedarán saciadas al alimentarse de ti.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּנְטַשְׁתִּיךָ
  english_pob_choice: I will cast you onto the land
  chosen_spanish: Te arrojaré a la tierra
  alternatives_spanish:
  - Te abandonaré en la tierra
  - Te dejaré en la tierra
  - Te echaré a la tierra
  lexicon: HALOT
  rationale: El verbo hebreo נטשׁ puede expresar dejar, abandonar o arrojar/castar away. En este oráculo de juicio, el contexto inmediato favorece una acción violenta y humillante; por eso «arrojaré» comunica bien la fuerza del desecho, sin perder el matiz posible de abandono.
- source_word: בָאָרֶץ
  english_pob_choice: onto the land
  chosen_spanish: a la tierra
  alternatives_spanish:
  - en la tierra
  - sobre la tierra
  lexicon: HALOT
  rationale: אֶרֶץ puede significar «tierra», «país» o «suelo/terreno» según el contexto. Aquí la imagen es la de un cuerpo arrojado al suelo, por lo que «a la tierra» suena natural en español y conserva la referencia al terreno inmediato.
- source_word: עַל פְּנֵי הַשָּׂדֶה
  english_pob_choice: on the open field
  chosen_spanish: sobre la superficie del campo
  alternatives_spanish:
  - sobre el campo abierto
  - en el campo
  - sobre la faz del campo
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente «sobre la faz/superficie del campo». En español, «superficie del campo» mantiene la imagen de exposición y evita una literalidad dura o poco natural; «campo abierto» sería más idiomático, pero aquí se preserva mejor la imagen espacial del hebreo.
- source_word: אֲטִילֶךָ
  english_pob_choice: I will throw you down
  chosen_spanish: te echaré
  alternatives_spanish:
  - te lanzar é
  - te arrebataré
  - te derribaré
  lexicon: HALOT
  rationale: El hifil de טול expresa lanzar o arrojar. Dado que «arrojaré» ya traduce el verbo anterior, aquí «echaré» evita repetición excesiva y sigue comunicando el gesto de lanzar hacia abajo en un registro bíblico natural para el español.
- source_word: וְהִשְׁכַּנְתִּי עָלֶיךָ
  english_pob_choice: I will cause every bird of the heavens to settle on you
  chosen_spanish: haré posar sobre ti a toda ave del cielo
  alternatives_spanish:
  - haré que toda ave del cielo se pose sobre ti
  - haré morar sobre ti a toda ave del cielo
  - haré descansar sobre ti a toda ave del cielo
  lexicon: HALOT
  rationale: El causativo de שכן indica hacer habitar/posar/establecer. En contexto de carroña, «haré posar» expresa de forma natural la llegada y permanencia de las aves sobre el cadáver, conservando la causalidad del hebreo.
- source_word: כָּל עוֹף הַשָּׁמַיִם
  english_pob_choice: every bird of the heavens
  chosen_spanish: toda ave del cielo
  alternatives_spanish:
  - todas las aves del cielo
  - toda ave de los cielos
  - cada ave del cielo
  lexicon: HALOT
  rationale: עוֹף es un colectivo para aves o criaturas voladoras. «Toda ave» refleja el colectivo singular del hebreo y encaja bien con el verbo en singular colectivo; «del cielo» conserva el genitivo hebreo de manera natural en español.
- source_word: וְהִשְׂבַּעְתִּי
  english_pob_choice: I will satisfy
  chosen_spanish: saciaré
  alternatives_spanish:
  - satisfaré
  - llenaré
  - daré de comer hasta saciedad
  lexicon: HALOT
  rationale: El hifil de שׂבע significa satisfacer o llenar hasta quedar colmado. En español, «saciaré» es la forma más directa y vívida para el contexto de animales carroñeros que comen del caído.
- source_word: מִמְּךָ
  english_pob_choice: with you
  chosen_spanish: con tu carne
  alternatives_spanish:
  - de ti
  - a partir de ti
  - por ti
  lexicon: HALOT
  rationale: 'Literalmente es «de ti», pero en español el contexto de alimentación pide explicitar el medio: las fieras se saciarán comiendo la carne del destinatario. «Con tu carne» hace explícita esa relación alimentaria sin alejarse del sentido del hebreo ni del audit trail inglés.'
- source_word: חַיַּת כָּל הָאָרֶץ
  english_pob_choice: the beasts of all the earth
  chosen_spanish: a las fieras de toda la tierra
  alternatives_spanish:
  - a las bestias de toda la tierra
  - a los animales salvajes de toda la tierra
  - a las fieras de toda la tierra
  lexicon: HALOT
  rationale: חַיָּה en este contexto denota animales salvajes o fieras. «Fieras» mantiene el tono profético elevado y la imagen de carroñeros. «De toda la tierra» conserva el alcance amplio de la expresión hebrea.
theological_decisions:
- issue: Matiz entre abandono y lanzamiento violento en וּנְטַשְׁתִּיךָ
  english_pob_reading: I will cast you onto the land; footnote allows 'I will abandon you on the land.'
  chosen_spanish_reading: Te arrojaré a la tierra
  alternative_spanish_readings:
  - Te abandonaré en la tierra
  - Te dejaré en la tierra
  rationale: El inglés POB mantiene la tensión entre abandono y arrojar lejos. En español, «arrojaré» comunica mejor la violencia del juicio sin eliminar el posible trasfondo de desecho o abandono, que queda preservado en la nota de alternativa.
  doctrine_reference: Oráculos proféticos de juicio; imagen de humillación y desecho, no una afirmación doctrinal independiente.
- issue: Alcance de אֶרֶץ / הָאָרֶץ en la misma frase y al final del versículo
  english_pob_reading: The first as 'land' and the final phrase as 'all the earth'
  chosen_spanish_reading: «a la tierra» al inicio y «de toda la tierra» al final
  alternative_spanish_readings:
  - a la tierra ... de toda la tierra
  - a la tierra ... de todo el país
  - a la tierra ... de toda la tierra
  rationale: 'Se conserva la distinción contextual que hace el POB inglés: el primer אֶרֶץ es el suelo o terreno inmediato; el último expresa amplitud total de las fieras. Esto ayuda a sostener la progresión imagética del texto.'
  doctrine_reference: Decisión lexical-contextual, no doctrinal.
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail en inglés y no se introdujeron cambios de sentido. Se preservó la tensión lexical de נטשׁ, la imagen concreta de עַל פְּנֵי הַשָּׂדֶה, y el valor de carroña implícito en las aves y las fieras, con una formulación española natural y publicable.
  spanish_consistency_notes:
  - Se usó «tierra» para אֶרֶץ inicial y «de toda la tierra» al final, conforme al valor contextual distinto de cada ocurrencia.
  - «Ave» se mantuvo en singular colectivo para reflejar כָּל עוֹף.
  - «Fieras» conserva el tono profético y el matiz de animales salvajes/carrozñeros.
  - No se sustituyó el lenguaje de juicio por un registro eclesiástico tradicional que suavizara la violencia del texto.
