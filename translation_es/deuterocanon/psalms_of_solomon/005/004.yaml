    text: O «despojos» en lugar de «botín».
    reason: lexical_alternative
  - marker: b
    text: O «un hombre fuerte».
    reason: lexical_alternative
  - marker: c
    text: O «Porque él no tomará botín de manos de un hombre poderoso».
    reason: previous_rendering
  revision_rationale: Se revisa para reflejar mejor παρὰ con genitivo mediante 'de manos de', usar un término más idiomático en español moderno ('botín') manteniendo 'despojos' como alternativa, y preservar la nota del rastro inglés sobre la lectura previa con sujeto explícito 'él'.
