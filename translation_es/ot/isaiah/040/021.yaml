revisions:
- from: ¿No saben? ¿No oyen? ¿No se les ha dicho desde el principio? ¿No han entendido las [a]fundaciones[b] de la tierra?
  to: ¿No saben? ¿No oyen? ¿No se les ha dicho desde el principio? ¿No han entendido desde los cimientos de la tierra?[a]
  rationale: Se corrige la cláusula final para que el texto principal siga la lectura adoptada por el English POB («desde los cimientos de la tierra») y se conserva en nota la alternativa literal viable. También se sustituye «fundaciones» por «cimientos» para una expresión española más natural y clara, manteniendo el sentido de מוֹסְדוֹת.
  reviewer_model: gpt-5.4
