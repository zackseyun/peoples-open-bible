translation:
  language: es
  text: Entonces David dio órdenes a los jóvenes, y ellos los mataron, les cortaron las manos y los pies, y los colgaron junto al estanque[a] en Hebrón. Pero tomaron la cabeza de Is-bóset y la sepultaron en la tumba de Abner en Hebrón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el estanque». La preposición hebrea puede entenderse de manera más amplia como indicación de ubicación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְצַו דָּוִד
  english_pob_choice: Then David commanded
  chosen_spanish: Entonces David dio órdenes
  alternatives_spanish:
  - Entonces David mandó
  - Luego David ordenó
  lexicon: HALOT
  rationale: צוה expresa dar mandato u orden. En español, «dio órdenes» conserva la fuerza directiva sin sonar excesivamente arcaico; «mandó» y «ordenó» son posibles, pero esta forma fluye bien en un relato narrativo.
- source_word: הַנְּעָרִים
  english_pob_choice: the young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los sirvientes
  - los asistentes
  lexicon: HALOT
  rationale: נְעָרִים puede significar jóvenes o ayudantes/siervos según el contexto. Aquí el audit trail inglés eligió «young men» para preservar el sentido léxico básico; «los jóvenes» mantiene esa opción sin imponer una función servil no explicitada en el hebreo.
- source_word: וַיַּהַרְגוּם
  english_pob_choice: they killed them
  chosen_spanish: ellos los mataron
  alternatives_spanish:
  - ellos les dieron muerte
  - ellos los ejecutaron
  lexicon: HALOT
  rationale: הרג es el verbo común de matar. «Los mataron» es directo y fiel; «ejecutaron» añade un marco judicial que el verso no formula explícitamente.
- source_word: וַיְקַצְּצוּ אֶת יְדֵיהֶם וְאֶת רַגְלֵיהֶם
  english_pob_choice: cut off their hands and their feet
  chosen_spanish: les cortaron las manos y los pies
  alternatives_spanish:
  - les amputaron las manos y los pies
  - les cortaron manos y pies
  lexicon: HALOT
  rationale: קצץ significa cortar o cortar de un golpe. En español, la construcción con dativo («les cortaron») es natural y conserva la repetición enfática de las dos partes del cuerpo. Se evita suavizar con «amputaron» porque ese término es más técnico y menos inmediato.
- source_word: וַיִּתְלוּ עַל הַבְּרֵכָה
  english_pob_choice: hung them by the pool
  chosen_spanish: los colgaron junto al estanque
  alternatives_spanish:
  - los colgaron junto al pozo
  - los colgaron sobre el estanque
  - los colgaron en el estanque
  lexicon: HALOT
  rationale: תלה es «colgar». עַל con הַבְּרֵכָה admite una lectura de ubicación más amplia; por eso «junto al estanque» conserva la ambigüedad espacial que el inglés POB anotó, sin forzar que estuvieran suspendidos literalmente sobre el agua.
- source_word: בְּחֶבְרוֹן
  english_pob_choice: at Hebron
  chosen_spanish: en Hebrón
  alternatives_spanish:
  - en Hebrón,
  - a Hebrón
  lexicon: HALOT
  rationale: La preposición hebrea admite un sentido locativo sencillo. «En Hebrón» es el equivalente natural en español y funciona en ambas menciones del verso.
- source_word: רֹאשׁ אִישׁ בֹּשֶׁת
  english_pob_choice: the head of Ish-bosheth
  chosen_spanish: la cabeza de Is-boset
  alternatives_spanish:
  - la cabeza de Ish-boset
  - el cadáver de Is-boset
  lexicon: HALOT
  rationale: La construcción señala literalmente la cabeza de la persona. Se mantiene el nombre propio en forma española tradicionalizada de transliteración («Is-boset») para la claridad lectora, sin alterar el referente.
- source_word: לָקָחוּ
  english_pob_choice: they took
  chosen_spanish: tomaron
  alternatives_spanish:
  - llevaron
  - recogieron
  lexicon: HALOT
  rationale: לקח es el verbo básico «tomar». «Tomaron» es la correspondencia más simple y fiel; no añade matices de transporte o recuperación que el hebreo no exige.
- source_word: וַיִּקְבְּרוּ בְקֶבֶר אַבְנֵר
  english_pob_choice: buried it in the tomb of Abner
  chosen_spanish: la sepultaron en la tumba de Abner
  alternatives_spanish:
  - la enterraron en la tumba de Abner
  - la sepultaron en la sepultura de Abner
  lexicon: HALOT
  rationale: קבר permite «sepultar» o «enterrar». «Sepultaron» ofrece un registro digno y claro para un lugar de entierro nombrado; el femenino «la» retoma la cabeza implícita en español. «Tumba» comunica bien קבר en un contexto funerario individual.
theological_decisions:
- issue: Descripción moral de la acción de David sin añadir juicio interpretativo
  english_pob_reading: Render the narrative description without adding evaluative language beyond the text itself.
  chosen_spanish_reading: Traducir la secuencia como relato sobrio, sin insertar calificativos morales ni judiciales que el verso no explicita.
  alternative_spanish_readings:
  - «Entonces David ejecutó a los hombres»
  - «Entonces David ordenó que los ajusticiaran»
  rationale: El hebreo presenta la acción narrativamente, no como comentario teológico. Mantener esa sobriedad preserva la tensión del texto y evita resolverla en la traducción.
  doctrine_reference: Preservar la tensión textual sin sobreinterpretación.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés: se mantuvo la lectura narrativa sobria, la ambigüedad locativa de עַל הַבְּרֵכָה y la referencia explícita a la cabeza de Is-boset, sin introducir lenguaje judicial no presente en el verso.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exige; aquí no aparece el nombre divino.
  - Se conserva un español contemporáneo y reverente, evitando arcaísmos innecesarios.
  - «Colgaron» se mantiene para תלה, mientras que la nota aclara la amplitud locativa posible.
  - «Sepultaron» se prefiere a «enterraron» por registro narrativo digno, sin cambiar el sentido.
