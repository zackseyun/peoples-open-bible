translation:
  language: es
  text: Porque la sabiduría es más móvil que cualquier movimiento[a], y por su pureza[b] atraviesa y penetra todas las cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «más activa que todo movimiento». El comparativo griego subraya la capacidad de sabiduría para moverse por encima de cualquier movimiento.
    reason: lexical_alternative
  - marker: b
    text: La gramática griega trata a «sabiduría» como femenina; por eso el posesivo «su» conserva la personificación del texto.
    reason: cultural_note
lexical_decisions:
- source_word: πάσης ... κινήσεως
  english_pob_choice: any movement
  chosen_spanish: cualquier movimiento
  alternatives_spanish:
  - todo movimiento
  - cualquier clase de movimiento
  lexicon: LSJ
  rationale: El comparativo con πάσης pide una expresión totalizante; «cualquier movimiento» suena natural en español y conserva la idea de superación respecto de todo lo que se mueve.
- source_word: κινητικώτερον
  english_pob_choice: more mobile
  chosen_spanish: más móvil
  alternatives_spanish:
  - más activa
  - más movible
  - más dinámica
  lexicon: LSJ
  rationale: El adjetivo deriva del campo de la movilidad. «Más móvil» conserva la relación con el movimiento sin añadir un matiz psicológico o moral ajeno al griego.
- source_word: σοφία
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - Sabiduría
  lexicon: LSJ
  rationale: En español «sabiduría» mantiene el sustantivo abstracto y permite la personificación del contexto sin forzar una mayúscula ontológica que el verso no exige.
- source_word: διήκει
  english_pob_choice: passes through
  chosen_spanish: atraviesa
  alternatives_spanish:
  - pasa a través de
  - se extiende a través de
  lexicon: LSJ
  rationale: El verbo expresa ir a través de algo. «Atraviesa» comunica bien la acción de pasar por dentro o por medio de otras cosas en español natural.
- source_word: χωρεῖ
  english_pob_choice: penetrates
  chosen_spanish: penetra
  alternatives_spanish:
  - se abre paso por
  - se introduce en
  lexicon: LSJ
  rationale: Para conservar la distinción con διήκει, «penetra» reproduce la segunda idea con fuerza propia y mantiene la intensidad del griego.
- source_word: διὰ πάντων
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todo cuanto existe
  lexicon: LSJ
  rationale: La fórmula es inclusiva y neutra; «todas las cosas» conserva la amplitud del plural griego y el registro elevado del texto sapiencial.
- source_word: διὰ τὴν καθαρότητα
  english_pob_choice: because of her purity
  chosen_spanish: por su pureza
  alternatives_spanish:
  - a causa de su pureza
  - debido a su pureza
  lexicon: LSJ
  rationale: La preposición causal se expresa con naturalidad en español con «por». Se mantiene «su» para reflejar la personificación femenina de σοφία sin recargar la frase.
theological_decisions:
- issue: Personificación femenina de la sabiduría
  english_pob_reading: Retain feminine personal reference ('her purity') while not capitalizing 'wisdom' as a distinct divine hypostasis.
  chosen_spanish_reading: Conservar la personificación implícita en «su pureza» sin convertir «sabiduría» en un nombre propio.
  alternative_spanish_readings:
  - por la pureza de ella
  - por su pureza, ella atraviesa y penetra todas las cosas
  rationale: El griego usa σοφία con gramática femenina, y el contexto la personifica. El español puede reflejar eso con el posesivo sin imponer una interpretación doctrinal más fuerte que la del verso.
  doctrine_reference: Preservar la tensión literaria y teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: Se tomó como base el texto griego de Swete 1909 y el rastro auditado en inglés. Se respetó la tensión léxica entre διήκει y χωρεῖ con dos verbos distintos en español. También se siguió la revisión inglesa que prefirió una formulación más natural para πάσης κινήσεως, manteniendo la comparativa fuerte sin suavizarla.
  spanish_consistency_notes:
  - Se usó «sabiduría» en minúscula para mantener el valor conceptual/personificado, no un título doctrinal fijo.
  - «Atraviesa» y «penetra» preservan dos verbos diferentes, evitando fusionar las dos ideas griegas.
  - «Por su pureza» expresa causalidad sin perder la referencia femenina implícita en el griego.
  - El registro es sobrio y bíblico, pero no arcaizante.
