    rationale: Aunque no crea dos notas distintas, es más limpio y claro anclar la nota léxica en la primera aparición relevante del término y no repetir el marcador innecesariamente.
  revised_spanish_text: Y desde el borde del suelo[a] hasta la plataforma inferior[b] habrá dos codos, con un ancho de un codo; y desde la plataforma menor hasta la plataforma mayor habrá cuatro codos[c], con un ancho de un codo.
