review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: envío de una copia de la carta, cláusula relativa sobre la carta escrita por Lasthenes, referencia a los destinatarios, y propósito final. Sin embargo, falla en un punto clave al dejar ''kinsman'' en inglés dentro del texto español, lo que no preserva adecuadamente el sentido en español ni sigue la práctica del proyecto. También conviene mejorar la colocación de ''también'' y el dativo con ''les'' para mayor naturalidad documental.'
  spanish_quality_summary: La redacción es en general clara, pero 'a nuestro[a] kinsman' es inaceptable en una Biblia española. 'También hemos escrito a ustedes' es comprensible, pero 'también les hemos escrito' o una reestructuración más natural suena mejor en español. El resto del verso es legible y de registro adecuado.
  glossary_alignment: No hay términos teológicos mayores en juego. La principal cuestión léxica es συγγενής, para el cual el inglés POB eligió 'kinsman' con nota alternativa. En español debe resolverse con un equivalente español formal y una nota léxica; 'pariente' funciona como texto principal, con nota que preserve 'pariente/compatriota/asociado de honor' como posibilidades contextuales. 'Carta', 'copia', 'acerca de ustedes' y 'para que la vean' están alineados con el origen.
  issues:
  - severity: high
    issue: Uso de 'kinsman' en inglés dentro del texto español
    rationale: El texto principal debe estar íntegramente en español. Además, el préstamo no aclara el sentido para un lector hispanohablante y contradice la instrucción de legibilidad y fidelidad idiomática.
  - severity: medium
    issue: 'Marcador de nota incrustado en una palabra no española: ''nuestro[a] kinsman'''
    rationale: El anclaje de nota debe acompañar un término español en el texto revisado. La forma actual resulta tipográficamente y lingüísticamente defectuosa.
  - severity: low
    issue: '''También hemos escrito a ustedes'' es menos natural que alternativas con clítico'
    rationale: Aunque fiel en sentido, en español bíblico moderno suena más natural 'también les hemos enviado/escrito' o una reestructuración que vincule claramente la copia con los destinatarios.
  revised_spanish_text: También les hemos escrito a ustedes una copia de la carta que Lasthenes escribió a nuestro pariente[a] acerca de ustedes, para que la vean.
  revised_footnotes:
  - marker: a
    text: O «a nuestro pariente cercano» o «a nuestro asociado/compatriota de honor». El griego συγγενής puede denotar un pariente de sangre, un pariente, o un asociado reconocido según el contexto.
    reason: lexical_alternative
  revision_rationale: Se reemplaza el anglicismo 'kinsman' por el español 'pariente', que es natural y suficientemente amplio en el texto principal, mientras la nota conserva la amplitud semántica documentada para συγγενής en contexto diplomático. También se ajusta la sintaxis a 'les hemos escrito a ustedes' para mayor naturalidad sin alterar el sentido del griego ni la lógica del inglés POB.
