id: PHP.4.20
reference: Philippians 4:20
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τῷ δὲ θεῷ καὶ πατρὶ ἡμῶν ἡ δόξα εἰς τοὺς αἰῶνας τῶν αἰώνων· ἀμήν.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/004/020.yaml
  text: Now to our God and Father be the glory forever and ever. Amen.
translation:
  language: ko
  text: 우리 하나님이시며 아버지께 영광이 영원무궁하기를 빕니다[a]. 아멘.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 직역하면 「세세토록」(εἰς τοὺς αἰῶνας τῶν αἰώνων). 「영원무궁」은 한국 교회의 정착된 송영 표현이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: Now
  chosen_korean: (생략)
  alternatives_korean:
  - 한편
  - 그런데
  lexicon: BDAG
  rationale: 송영을 도입하는 가벼운 전환 δέ는 한국어 송영문에서 자연스럽게 생략된다.
- source_word: θεῷ καὶ πατρὶ ἡμῶν
  english_pob_choice: our God and Father
  chosen_korean: 우리 하나님이시며 아버지께
  alternatives_korean:
  - 우리 하나님 곧 아버지께
  - 우리 하나님과 아버지께
  lexicon: BDAG
  rationale: 헬라어 동격 구문(한 분 하나님께서 곧 우리 아버지)을 한국어로 「~이시며 ~께」로 자연스럽게 옮긴다. 합쇼체 경어 「-시-」를 보존한다.
- source_word: ἡ δόξα
  english_pob_choice: be the glory
  chosen_korean: 영광이 ... 있기를 빕니다
  alternatives_korean:
  - 영광이 있을지어다
  - 영광이 돌려지기를 빕니다
  lexicon: BDAG
  rationale: 송영의 무동사 구문에 합쇼체 「빕니다」를 보충해 자연스러운 한국어 송영문을 만든다. 「있을지어다」(평어/보통체)는 본 번역의 합쇼체 일관성과 어긋난다.
- source_word: εἰς τοὺς αἰῶνας τῶν αἰώνων
  english_pob_choice: forever and ever
  chosen_korean: 영원무궁하기를
  alternatives_korean:
  - 영원토록
  - 세세토록
  lexicon: BDAG
  rationale: 한국 교회 정착된 송영 표현 「영원무궁」을 채택한다. 직역 「세세토록」은 각주에 둔다.
- source_word: ἀμήν
  english_pob_choice: Amen
  chosen_korean: 아멘
  lexicon: BDAG
  rationale: 송영의 고정 음역어 「아멘」을 보존한다.
