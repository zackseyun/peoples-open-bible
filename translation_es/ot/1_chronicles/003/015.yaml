  spanish_quality_summary: El español es claro y legible, pero la onomástica necesita normalización para sonar natural y eclesialmente reconocible en español. 'Johanan', 'Jehoiaquim' y 'Shallum' resultan menos propios del registro bíblico español que 'Johanán', 'Joacim' y 'Salum'. 'Sedequías' está bien. La nota también debe ajustar 'Shallum/Jehoahaz' a formas españolas ('Salum/Joacaz').
  glossary_alignment: 'No hay términos teológicos problemáticos. La principal cuestión de alineación es onomástica española: aunque el audit trail inglés translitera como Johanan/Jehoiakim/Shallum, la justificación del proyecto pide español natural y legible, no una transliteración mecánica del inglés. ''Josías'', ''Sedequías'', ''Joacim'', ''Johanán'' y ''Salum'' se ajustan mejor al uso bíblico en español sin alterar el referente.'
  issues:
