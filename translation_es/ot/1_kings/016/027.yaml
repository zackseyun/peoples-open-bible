translation:
  language: es
  text: Ahora, el resto de los hechos de Omri, lo que hizo, y su poder que demostró[a]—¿no están escritos en el Libro de las Crónicas de los reyes de Israel[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sus actos poderosos». El hebreo גְּבוּרָה puede referirse tanto al poder o fuerza como a hechos que manifiestan ese poder.'
    reason: lexical_alternative
  - marker: b
    text: «El Libro de las Crónicas de los reyes de Israel» alude a una fuente real de anales, no al libro bíblico de Crónicas.
    reason: cultural_note
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest of
  chosen_spanish: Ahora, el resto de
  alternatives_spanish:
  - Y el resto de
  - En cuanto al resto de
  lexicon: HALOT
  rationale: En la fórmula regia, יֶתֶר señala el resto o lo que queda por mencionar de la actividad del rey. 'Ahora' conserva la función de transición de וְ sin sonar forzado en español; 'el resto de' mantiene la referencia resumida a la documentación restante.
- source_word: דִּבְרֵי
  english_pob_choice: acts
  chosen_spanish: los hechos
  alternatives_spanish:
  - las palabras
  - los asuntos
  - las obras
  lexicon: HALOT
  rationale: Aunque literalmente puede ser 'palabras' o 'asuntos', en este resumen de reinado el sentido es el registro de acciones. 'Hechos' comunica esa dimensión histórica de modo natural en español y evita una traducción demasiado abstracta.
- source_word: עָמְרִי
  english_pob_choice: Omri
  chosen_spanish: Omri
  alternatives_spanish:
  - Omrí
  lexicon: Transliteración estándar del nombre propio
  rationale: Se conserva el nombre propio en transliteración habitual. 'Omri' es reconocible y estable en español bíblico; la variante con acento no es necesaria aquí.
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: what he did
  chosen_spanish: lo que hizo
  alternatives_spanish:
  - lo que realizó
  - lo que había hecho
  - lo que hizo y realizó
  lexicon: HALOT
  rationale: La cláusula relativa resume sus acciones sin añadir matiz no presente. 'Lo que hizo' es directo, cercano al hebreo y adecuado para el estilo de informe real.
- source_word: וּגְבוּרָתוֹ
  english_pob_choice: and his might that he showed
  chosen_spanish: y su poder que mostró
  alternatives_spanish:
  - y su valentía que mostró
  - y su fuerza
  - y sus hechos poderosos
  lexicon: HALOT
  rationale: גְּבוּרָה puede referirse a fuerza, poder o actos de fuerza. Se eligió 'poder' para preservar el sustantivo y 'que mostró' para reflejar el verbo repetido de la cláusula siguiente, sin reducirlo a una simple abstracción. En español, 'poder' aquí mantiene el valor de capacidad/manifestación de fuerza.
- source_word: הֲלֹא הֵם כְּתוּבִים
  english_pob_choice: are they not written
  chosen_spanish: ¿no están escritos
  alternatives_spanish:
  - ¿acaso no están escritos
  - ¿no se hallan escritos
  lexicon: HALOT
  rationale: La pregunta retórica se conserva con la misma fuerza. 'Están escritos' reproduce el pasivo resultativo del hebreo y funciona bien en español bíblico contemporáneo.
- source_word: עַל סֵפֶר
  english_pob_choice: in the Book of
  chosen_spanish: en el Libro de
  alternatives_spanish:
  - en el rollo de
  - sobre el libro de
  lexicon: HALOT
  rationale: Aunque עַל es literalmente 'sobre', en esta fórmula archivística la preposición natural en español es 'en'. 'Libro' mantiene la referencia a un registro escrito.
- source_word: דִּבְרֵי הַיָּמִים
  english_pob_choice: the Chronicles
  chosen_spanish: las Crónicas
  alternatives_spanish:
  - los anales
  - los registros de los días
  lexicon: HALOT
  rationale: El sintagma designa crónicas o anales reales. 'Crónicas' conserva la forma concisa y reconocible, sin identificarlo con el libro canónico homónimo.
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  english_pob_choice: of the Kings of Israel
  chosen_spanish: de los reyes de Israel
  alternatives_spanish:
  - para los reyes de Israel
  - de los monarcas de Israel
  lexicon: HALOT
  rationale: La relación posesiva/titular se expresa naturalmente con 'de'. 'Reyes de Israel' mantiene el sentido del archivo real correspondiente a esa monarquía.
theological_decisions:
- issue: Referencia del 'Libro de las Crónicas'
  english_pob_reading: The Book of the Chronicles of the Kings of Israel refers to a royal annalistic source, not the biblical book of Chronicles.
  chosen_spanish_reading: '''El Libro de las Crónicas de los reyes de Israel'' se entiende como una fuente real de anales, no como el libro bíblico de Crónicas.'
  alternative_spanish_readings:
  - Puede leerse como una referencia al libro canónico de Crónicas.
  - Podría tomarse simplemente como un título literario sin implicación histórica.
  rationale: El hebreo y el contexto de fórmulas regias indican un archivo histórico cortesano, no el libro bíblico posterior. La traducción mantiene el título tradicional pero, por fidelidad al contexto, la nota aclara la naturaleza de la fuente.
  doctrine_reference: Historiografía bíblica / crítica de fuentes; 1 Reyes 16:27
translation_notes:
  revision_awareness: 'La traducción inglesa auditada mantuvo la fórmula regia con una revisión menor: ''displayed'' fue ajustado a ''showed'' para un valor más directo de ''did/made''. En español se reflejó esa misma economía con ''mostró'', conservando además la repetición verbal implícita de עָשָׂה en ambas cláusulas.'
  spanish_consistency_notes:
  - Se emplea 'Yahvé' solo cuando aparece el nombre divino; este versículo no lo contiene.
  - '''Crónicas'' se usa como título de archivo histórico, no como identificación automática del libro canónico.'
  - Se mantiene 'hechos' para דִּבְרֵי dentro del resumen regnal, en coherencia con el uso contextual del POB.
  - '''Poder'' traduce גְּבוּרָה con una nota para preservar la amplitud semántica sin perder fluidez.'
  - El registro es formal pero no arcaizante, acorde con una Biblia pública contemporánea.
