review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura repetida de מִלְּבַד y preserva correctamente «Yahvé», «dones» y «ofrendas voluntarias». Sin embargo, falla en dos puntos importantes de sentido y fidelidad contextual: (1) «sus dones / sus votos / sus ofrendas» cambia indebidamente la segunda persona del hebreo («vuestros») a una tercera persona ambigua en un contexto donde la dirección al pueblo debe mantenerse; (2) «votos» en español común suele referirse a sufragios electorales y no comunica con suficiente claridad el sentido de נִדְרֵיכֶם en contexto cultual; «promesas hechas por voto» o similar sería más claro. La cláusula final con subjuntivo («que ustedes den») también suena menos natural que el presente indicativo relativo en español bíblico corriente.'
  spanish_quality_summary: 'El texto es legible, pero «sus» introduce ambigüedad referencial innecesaria frente a «sus/ustedes» mezclados. La nota [b] es claramente defectuosa: repite la misma frase y no comunica la alternativa real documentada en el inglés («los sábados de Yahvé» / «los sábados de Yahvé» en forma posesiva), que en español conviene explicar como equivalencia entre construcción con «de» y posesivo apostrofado imposible en español; por tanto esa nota no aporta una alternativa útil y debe eliminarse. También conviene suavizar «que ustedes den» a «que ustedes dan» para sonar más natural sin perder literalidad.'
  glossary_alignment: Se alinea bien con la política del proyecto al usar «Yahvé» para יְהוָה. «Aparte de» es aceptable para מִלְּבַד. «Ofrendas voluntarias» concuerda con la decisión auditada para נִדְבֹתֵיכֶם. El único desajuste léxico serio es «votos» para נִדְרֵיכֶם, que en español actual no es la mejor opción; «promesas hechas por voto» preserva el valor votivo sin introducir tecnicismo oscuro.
  issues:
  - severity: high
    issue: 'Cambio de persona en los posesivos: «sus dones / sus votos / sus ofrendas»'
    rationale: El hebreo lleva sufijo de 2.ª persona plural. En español, «sus» puede leerse como 3.ª persona; en contexto exhortativo al pueblo conviene «sus ... de ustedes» o mejor una reformulación directa como «sus dones» solo si el referente es inequívoco. Dado que luego aparece «ustedes», la mezcla resulta torpe y potencialmente ambigua.
  - severity: medium
    issue: «Votos» no comunica bien נִדְרֵיכֶם en español actual
    rationale: Aunque formalmente posible, «votos» suele entenderse como votos electorales o incluso votos religiosos formales. En este contexto cultual, una expresión como «promesas hechas por voto» o «votos que hicieron» evita ambigüedad y conserva el sentido de נדר.
  - severity: medium
    issue: La nota [b] está mal formulada y no aporta una alternativa real
    rationale: Repite esencialmente la misma expresión tres veces y no explica ninguna diferencia semántica útil para el lector hispano. Debe eliminarse si no hay una alternativa española verdaderamente distinta y provechosa.
  - severity: low
    issue: «que ustedes den» suena menos natural que «que ustedes dan»
    rationale: 'La cláusula relativa אֲשֶׁר תִּתְּנוּ se expresa naturalmente en español con indicativo: «que ustedes dan». El subjuntivo aquí suena forzado.'
  revised_spanish_text: aparte de los sábados de Yahvé[a], aparte de sus dones, aparte de todas las promesas hechas por voto de ustedes, y aparte de todas sus ofrendas voluntarias, que ustedes dan a Yahvé.
  revised_footnotes:
  - marker: a
    text: También puede traducirse «además de» o «fuera de» en cada repetición de esta expresión.
    reason: lexical_alternative
  revision_rationale: 'Se conserva la estructura repetitiva del hebreo y la política de «Yahvé», pero se corrige la claridad del español y la fidelidad contextual: se elimina la nota defectuosa [b], se mejora נִדְרֵיכֶם con una formulación inequívoca en español, y se ajusta la cláusula final a un relativo más natural. No se requiere adjudicación especial porque los cambios son de claridad y exactitud básica, no de doctrina disputada.'
