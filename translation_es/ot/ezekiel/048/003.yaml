translation:
  language: es
  text: Y junto al límite de Aser, desde el lado oriental hasta el lado occidental, Neftalí, una porción[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literal: «Neftalí, uno». «Porción» se añade por claridad a partir del contexto de distribución de la tierra en este capítulo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עַל
  english_pob_choice: And alongside
  chosen_spanish: Y junto a
  alternatives_spanish:
  - Y al lado de
  - Y junto al
  lexicon: HALOT
  rationale: En esta fórmula territorial, עַל con prefijo de conjunción introduce otra franja de tierra en relación con el límite anterior. «Junto a» comunica cercanía espacial de manera natural en español sin perder la relación con el borde de Aser.
- source_word: גְּבוּל
  english_pob_choice: border
  chosen_spanish: límite
  alternatives_spanish:
  - frontera
  - borde
  lexicon: HALOT
  rationale: El sustantivo designa la línea de demarcación territorial. «Límite» es claro en español y funciona bien en el contexto repetitivo de distribución de tierras de Ezequiel 48.
- source_word: אָשֵׁר
  english_pob_choice: Asher
  chosen_spanish: Asher
  alternatives_spanish:
  - Aser
  lexicon: nombre propio
  rationale: Se conserva el nombre tribal. «Asher» mantiene la forma usada en el texto base en inglés; «Aser» sería una adaptación española posible, pero aquí se prefiere la forma transliterada del proyecto.
- source_word: מִ/פְּאַת קָדִימָה
  english_pob_choice: from the eastern side
  chosen_spanish: desde el lado oriental
  alternatives_spanish:
  - desde el lado del este
  - desde el extremo oriental
  lexicon: HALOT
  rationale: פֵּאָה indica lado, borde o extremidad, y קָדִימָה señala la orientación al oriente. «Desde el lado oriental» conserva el valor espacial y suena natural en español.
- source_word: וְ/עַד פְּאַת יָמָּה
  english_pob_choice: to the western side
  chosen_spanish: hasta el lado occidental
  alternatives_spanish:
  - hasta el lado del mar
  - hasta el extremo occidental
  lexicon: HALOT
  rationale: עַד marca extensión y פֵּאָה vuelve a indicar lado/extremo. יָמָּה, aunque etimológicamente relacionado con «mar», funciona idiomáticamente como occidente; por eso se traduce «occidental» para reflejar la dirección, no «marítimo».
- source_word: נַפְתָּלִי
  english_pob_choice: Naphtali
  chosen_spanish: Neftalí
  alternatives_spanish:
  - Neftalí
  lexicon: nombre propio
  rationale: 'Se usa la forma española habitual del nombre tribal: «Neftalí».'
- source_word: אֶחָד
  english_pob_choice: one portion
  chosen_spanish: una porción
  alternatives_spanish:
  - una sola
  - un reparto
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «uno», en este contexto funciona elípticamente como una porción o asignación territorial. En español se explicita «porción» para preservar el sentido del reparto de tierras sin sobrerreformular.
theological_decisions:
- issue: Valor elíptico de אֶחָד en el reparto territorial
  english_pob_reading: The word 'portion' is supplied for clarity from the land-allotment context of this chapter.
  chosen_spanish_reading: Se explicita «porción» para dejar claro que se trata de una asignación territorial, no del número cardinal aislado.
  alternative_spanish_readings:
  - Neftalí, uno.
  - Neftalí, una sola.
  rationale: El contexto del capítulo es la repartición de tierras entre las tribus; por eso el numeral funciona de modo elíptico. Traducirlo con «porción» evita una lectura demasiado abrupta y mantiene el sentido distributivo del pasaje.
  doctrine_reference: Contexto literario de la distribución de la tierra en Ezequiel 48
translation_notes:
  revision_awareness: Se siguió el estado de alta concordancia del control cruzado, sin cambios respecto al último pase; la redacción española se ajusta al mismo sentido del texto hebreo y del audit trail inglés.
  spanish_consistency_notes:
  - 'Se mantiene la terminología territorial consistente con otras secciones de Ezequiel 48: límite, lado oriental, lado occidental, porción.'
  - Se conserva el nombre tribal en forma española «Neftalí» para mayor naturalidad en lectura pública.
  - La nota al pie conserva la tensión lexical del hebreo breve (אֶחָד) sin ocultarla con una paráfrasis excesiva.
