revisions:
- from: Porque tú, oh Dios, has escuchado mis votos; me has dado la herencia de los que temen tu nombre[a].
  to: Porque tú, oh Dios, has oído mis votos; has dado la herencia de los que temen tu nombre[a][b].
  rationale: Se quitó ‘me’ del texto principal para ajustarse más fielmente al hebreo y a la decisión teológica documentada de no resolver en la línea base un objeto indirecto no expreso. Esa lectura contextual se preservó en nota como alternativa. Además, se cambió ‘has escuchado’ por ‘has oído’ para una formulación más natural en español bíblico sin alterar el sentido.
