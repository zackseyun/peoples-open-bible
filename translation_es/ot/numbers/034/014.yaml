translation:
  language: es
  text: Porque la tribu de los hijos de Rubén[a], por sus casas paternas, y la tribu de los hijos de Gad, por sus casas paternas[b], y la media tribu de Manasés[c] han tomado su herencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «los rubenitas».'
    reason: lexical_alternative
  - marker: b
    text: «Casas paternas» se refiere a divisiones familiares o clánicas ancestrales dentro de cada tribu.
    reason: cultural_note
  - marker: c
    text: 'O: «la mitad de la tribu de Manasés».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduces una explicación o justificación del reparto territorial previo; en español, «Porque» conserva la relación causal/explicativa sin sonar forzado.
- source_word: מַטֵּה
  english_pob_choice: tribe
  chosen_spanish: tribu
  alternatives_spanish:
  - vara
  - bastón
  - grupo tribal
  lexicon: HALOT
  rationale: En este contexto de reparto territorial, מַטֵּה designa una unidad tribal, no un objeto físico. «Tribu» es la equivalencia natural y fiel.
- source_word: בְנֵי הָראוּבֵנִי
  english_pob_choice: the sons of Reuben
  chosen_spanish: los hijos de Rubén
  alternatives_spanish:
  - los rubenitas
  lexicon: HALOT
  rationale: Se conserva la formulación genealógica del hebreo, como hace el POB inglés, en vez de pasar al etnónimo abreviado.
- source_word: לְבֵית אֲבֹתָם
  english_pob_choice: by their fathers’ houses
  chosen_spanish: por sus casas paternas
  alternatives_spanish:
  - según sus casas paternas
  - por sus casas ancestrales
  - según sus clanes
  lexicon: HALOT
  rationale: «Casas paternas» mantiene el modismo hebreo y su referencia a subdivisiones familiares/clánicas dentro de la tribu; «por» comunica la distribución según esas unidades.
- source_word: וַחֲצִי מַטֵּה מְנַשֶּׁה
  english_pob_choice: the half-tribe of Manasseh
  chosen_spanish: la media tribu de Manasés
  alternatives_spanish:
  - la mitad de la tribu de Manasés
  - la media tribu de Manasés
  lexicon: HALOT
  rationale: «Media tribu» es el equivalente establecido en español para este giro de reparto; preserva la idea de una subdivisión tribal específica sin expandirla indebidamente.
- source_word: לָקְחוּ נַחֲלָתָם
  english_pob_choice: have taken their inheritance
  chosen_spanish: han recibido su herencia
  alternatives_spanish:
  - han tomado su herencia
  - han obtenido su herencia
  - han recibido su posesión
  lexicon: HALOT
  rationale: El hebreo usa לָקַח («tomar/recibir»), pero en este contexto de asignación territorial el sentido es la posesión ya adjudicada. «Han recibido» evita una literalidad menos natural en español sin perder la fuerza completiva.
theological_decisions:
- issue: La relación entre «tomar» y «recibir» en el verbo לָקַח dentro de un reparto de herencia territorial
  english_pob_reading: have taken their inheritance
  chosen_spanish_reading: han recibido su herencia
  alternative_spanish_readings:
  - han tomado su herencia
  - han heredado su herencia
  rationale: El contexto de Números 34 es la asignación de territorios como herencia. Aunque el verbo hebreo significa «tomar», en español «recibir» comunica mejor la recepción efectiva de una porción ya adjudicada, sin introducir un verbo ajeno al acto de asignación.
  doctrine_reference: Números 34:13; Josué 13–14
- issue: «Casas paternas» como unidad social interna de cada tribu
  english_pob_reading: Fathers’ houses refers to ancestral family/clan divisions within each tribe.
  chosen_spanish_reading: casas paternas como divisiones familiares/clánicas ancestrales
  alternative_spanish_readings:
  - casas de los padres
  - linajes patriarcales
  - clanes paternos
  rationale: Se conserva el término tradicional del marco hebreo y se entiende como una subdivisión de parentesco dentro de la tribu, no como una casa física. Esta nota ayuda a no perder la estructura social implícita en el texto.
  doctrine_reference: Éxodo 6:14; Números 1:2
translation_notes:
  revision_awareness: 'El pasaje presenta alta concordancia con el texto hebreo y el audit trail inglés: no se registraron revisiones aplicadas en la versión fuente inglesa, y el control cruzado informó acuerdo total. La redacción española sigue esa lectura estable, manteniendo la estructura enumerativa y la tensión léxica entre el verbo de ‘tomar’ y el contexto de ‘recibir’ la herencia.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva la formulación genealógica «hijos de Rubén/Gad» para reflejar el hebreo y la decisión inglesa, con alternativa idiomática en nota.
  - «Media tribu de Manasés» sigue el uso consolidado en español bíblico para וַחֲצִי מַטֵּה.
  - «Casas paternas» no se moderniza a «clanes» en el texto principal para no perder el eco del hebreo; la aclaración se ofrece en nota.
  - «Han recibido su herencia» busca equilibrio entre fidelidad al verbo hebreo y naturalidad en español de registro bíblico moderno.
