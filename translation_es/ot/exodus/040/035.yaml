translation:
  language: es
  text: Y Moisés no pudo entrar en la tienda de reunión[a], porque la nube reposó sobre ella, y la gloria de Yahvé llenó el tabernáculo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habitó sobre ella» o «se asentó sobre ella». El verbo hebreo puede llevar la idea de habitar, asentarse o reposar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לֹא
  english_pob_choice: And ... not
  chosen_spanish: Y ... no
  alternatives_spanish:
  - Pero ... no
  - Ahora ... no
  lexicon: HALOT
  rationale: La conjunción más negación continúa la narración de forma directa. «Y» conserva la secuencia hebrea sin añadir contraste que el texto no expresa.
- source_word: יָכֹל
  english_pob_choice: was not able
  chosen_spanish: no pudo
  alternatives_spanish:
  - no era capaz de
  - no fue capaz de
  lexicon: HALOT
  rationale: El verbo expresa capacidad. «No pudo» es natural en español y mantiene el sentido de incapacidad para entrar.
- source_word: לָבוֹא
  english_pob_choice: to enter
  chosen_spanish: entrar
  alternatives_spanish:
  - ir adentro
  - venir adentro
  lexicon: HALOT
  rationale: En este contexto, el movimiento hacia un recinto se expresa con claridad mediante «entrar».
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: la tienda de reunión
  alternatives_spanish:
  - la tienda del encuentro
  - la Tienda de Reunión
  lexicon: HALOT
  rationale: «Tienda de reunión» reproduce con naturalidad el nombre funcional del santuario y evita una calca rígida. Mantiene el sentido de un lugar designado para el encuentro.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí la conjunción da la razón por la cual Moisés no podía entrar. «Porque» expresa con claridad el valor causal.
- source_word: שָׁכַן
  english_pob_choice: settled
  chosen_spanish: se posó
  alternatives_spanish:
  - se asentó
  - habitó
  lexicon: HALOT
  rationale: El verbo describe la nube como asentándose sobre la tienda. «Se posó» preserva la imagen concreta del reposo de la nube sin forzar la idea de habitación en el texto principal.
- source_word: עָלָיו
  english_pob_choice: on it
  chosen_spanish: sobre ella
  alternatives_spanish:
  - encima de ella
  - sobre él
  lexicon: HALOT
  rationale: El referente inmediato es la tienda; en español, «ella» concuerda con «tienda» y mantiene la relación espacial de la preposición.
- source_word: הֶעָנָן
  english_pob_choice: the cloud
  chosen_spanish: la nube
  alternatives_spanish:
  - la nube densa
  - la nube
  lexicon: HALOT
  rationale: Se conserva el sustantivo definido y directo del texto hebreo.
- source_word: וּ/כְב֣וֹד יְהוָה
  english_pob_choice: and the glory of Yahweh
  chosen_spanish: y la gloria de Yahvé
  alternatives_spanish:
  - y la gloria de Yahvé Dios
  - y la gloria de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la relación constructa de manera natural en español con «de Yahvé». Se conserva el nombre divino «Yahvé» según la convención del proyecto.
- source_word: מָלֵא
  english_pob_choice: filled
  chosen_spanish: llenó
  alternatives_spanish:
  - había llenado
  - estaba llenando
  lexicon: HALOT
  rationale: El perfecto narra el hecho consumado en la escena. «Llenó» es la forma más natural y transparente en español.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - el santuario
  lexicon: HALOT
  rationale: «Tabernáculo» es el equivalente establecido para מִשְׁכָּן en este contexto del Éxodo y preserva la referencia al santuario portátil.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente. Conforme al estándar del proyecto en español, se vierte como «Yahvé» para preservar el nombre personal divino sin sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Yahvé'
- issue: Sentido de שָׁכַן aplicado a la nube
  english_pob_reading: settled
  chosen_spanish_reading: se posó
  alternative_spanish_readings:
  - habitó
  - se asentó
  - reposó
  rationale: En este versículo domina la escena concreta de la nube que desciende y queda sobre la tienda. «Se posó» conserva esa imagen sin perder totalmente la resonancia de permanencia asociada al verbo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'El inglés auditado mantuvo la solución estable de «settled» para שָׁכַן y de «Yahweh» para יְהוָה. La versión española sigue esas decisiones con equivalentes naturales: «se posó» para la imagen concreta de la nube y «Yahvé» para el nombre divino, sin introducir paráfrasis adicionales.'
  spanish_consistency_notes:
  - Se conserva «tabernáculo» para מִשְׁכָּן, coherente con el uso bíblico técnico en Éxodo.
  - «Tienda de reunión» traduce אֹהֶל מוֹעֵד de manera idiomática y consistente con la designación del santuario.
  - Se mantiene la concordancia pronominal femenina con «tienda» en «sobre ella».
  - El nombre divino aparece como «Yahvé», en línea con la terminología del proyecto en español.
