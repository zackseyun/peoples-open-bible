translation:
  language: es
  text: y para revelar para nosotros una lámpara[a] en la casa de Yahvé[b], para darnos alimento en el tiempo de nuestra esclavitud; y mientras estábamos esclavizados[c], no fuimos abandonados
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'revelar una luz'; el griego permite la imagen concreta de sacar a la vista una fuente de luz para el lugar santo.
    reason: lexical_alternative
  - marker: b
    text: '''La casa de Yahvé'' se refiere al templo.'
    reason: cultural_note
  - marker: c
    text: O 'en el tiempo de nuestra servidumbre' / 'mientras servíamos'. El grupo léxico de δουλεία se repite en las dos cláusulas.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνακαλύψαι
  english_pob_choice: to reveal
  chosen_spanish: revelar
  alternatives_spanish:
  - descubrir
  - desvelar
  - hacer visible
  lexicon: LSJ
  rationale: El griego conserva una imagen concreta de quitar el velo o cubrir; en español, 'revelar' comunica bien esa acción sin perder naturalidad. 'Descubrir' y 'desvelar' también serían posibles, pero 'revelar' encaja mejor con el registro bíblico y con el movimiento de traer la luz a la vista.
- source_word: φωστῆρα
  english_pob_choice: a lamp
  chosen_spanish: una lámpara
  alternatives_spanish:
  - una luz
  - un luminar
  - una antorcha
  lexicon: LSJ
  rationale: El término puede referirse a una fuente de luz. 'Lámpara' mantiene la concreción del objeto luminoso y funciona bien en el contexto del lugar de culto. 'Luz' sería más abstracto; 'luminar' resulta demasiado elevado para este verso.
- source_word: οἶκῳ τοῦ κυρίου ἡμῶν
  english_pob_choice: in the house of our Lord
  chosen_spanish: en la casa de nuestro Señor
  alternatives_spanish:
  - en el templo de nuestro Señor
  - en la casa de Yahvé
  lexicon: LSJ
  rationale: Sigo de cerca la imagen literal de 'casa' para no importar de inmediato la interpretación explicativa 'templo'. En español, 'nuestro Señor' mantiene el paralelismo con el griego κύριος y la reverencia del contexto.
- source_word: τροφὴν
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - comida
  - sustento
  - provisión
  lexicon: LSJ
  rationale: '''Alimento'' expresa la idea de comida/provisión de manera digna y bíblica sin restringirla innecesariamente a un solo tipo de comida. Conserva mejor la amplitud de la provisión que ''comida''.'
- source_word: δουλείας
  english_pob_choice: slavery
  chosen_spanish: esclavitud
  alternatives_spanish:
  - servidumbre
  - cautiverio
  - bondad
  lexicon: LSJ
  rationale: Para conservar la fuerza del grupo léxico δουλ-, 'esclavitud' es la opción más directa y consistente con la política del proyecto para términos de servidumbre forzada. 'Servidumbre' suaviza demasiado el sentido.
- source_word: ἐν τῷ δουλεύειν ἡμᾶς
  english_pob_choice: while we were enslaved
  chosen_spanish: mientras estábamos esclavizados
  alternatives_spanish:
  - mientras servíamos
  - en nuestro esclavizamiento
  - mientras nos hallábamos en servidumbre
  lexicon: LSJ
  rationale: El infinitivo articular expresa circunstancia continua; 'mientras estábamos esclavizados' conserva esa relación y mantiene el vínculo con 'esclavitud' en la cláusula anterior. 'Servíamos' diluiría la carga del término.
- source_word: ἐγκατελείφθημεν
  english_pob_choice: we were not forsaken
  chosen_spanish: no fuimos abandonados
  alternatives_spanish:
  - no fuimos desamparados
  - no fuimos dejados
  - no fuimos olvidados
  lexicon: LSJ
  rationale: '''Abandonados'' es natural en español y reproduce bien el sentido de ser dejados sin auxilio. ''Desamparados'' sería posible, pero algo más interpretativo; ''olvidados'' no es lo bastante exacto.'
theological_decisions:
- issue: Mantener el lenguaje de esclavitud frente a opciones más suaves
  english_pob_reading: slavery / enslaved
  chosen_spanish_reading: esclavitud / esclavizados
  alternative_spanish_readings:
  - servidumbre / servidores
  - cautiverio / cautivos
  - bondad / sometidos
  rationale: La POB inglesa conserva la dureza del grupo δουλ- para no atenuar la condición del pueblo. En español, 'esclavitud' y 'esclavizados' preservan mejor esa tensión que 'servidumbre', que podría sonar más neutral o voluntaria.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος *doulos*; Translation philosophy §1'
- issue: Si explicitar 'templo' en la frase 'casa de nuestro Señor'
  english_pob_reading: house of our Lord
  chosen_spanish_reading: casa de nuestro Señor
  alternative_spanish_readings:
  - templo de nuestro Señor
  - casa del Señor
  rationale: Aunque el referente es el templo, la POB inglesa conserva la expresión literal 'house'. En español, 'casa de nuestro Señor' mantiene la imagen de la fuente y deja la identificación cultual al contexto sin añadir una glosa interpretativa al texto principal.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §5'
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente que prefirió 'reveal' sobre 'uncover' por naturalidad, pero en español se conserva la imagen verbal concreta con 'revelar' para mantener fluidez y fidelidad al griego. También se respetó la decisión revisada de no reemplazar la imagen de 'house' por 'temple' en el texto principal.
  spanish_consistency_notes:
  - Se usó 'esclavitud' / 'esclavizados' de manera consistente para el grupo léxico δουλ-, siguiendo el criterio del proyecto.
  - '''Yahvé'' no aparece aquí porque el griego dice κύριος; se tradujo como ''nuestro Señor'' para reflejar el texto fuente inmediato.'
  - La puntuación y el orden sintáctico buscan ser publicables en español sin perder el paralelismo de las dos cláusulas finales.
