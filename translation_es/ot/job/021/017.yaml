translation:
  language: es
  text: ¿Con qué frecuencia se apaga la lámpara de los malvados[a][b][c], y les sobreviene su desastre? ¿Reparte dolores[d] en su ira?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿Cuántas veces se apaga la lámpara de los malvados...?». La pregunta hebrea es retórica y desafía la idea de que los malvados sean juzgados con regularidad de esta manera.
    reason: lexical_alternative
  - marker: b
    text: «Lámpara» es una metáfora de la vida de una persona, de su prosperidad o de su fortuna continua.
    reason: cultural_note
  - marker: c
    text: También puede entenderse «se extingue».
    reason: lexical_alternative
  - marker: d
    text: O «penas» o «dolores de parto» en su ira. El sustantivo hebreo puede abarcar varios sentidos relacionados.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּמָּה
  english_pob_choice: How often
  chosen_spanish: ¡Cuán a menudo!
  alternatives_spanish:
  - ¿Cuántas veces?
  - ¿Con qué frecuencia?
  lexicon: HALOT
  rationale: El hebreo introduce una pregunta retórica de frecuencia, no de cantidad. «Cuán a menudo» expresa bien ese matiz en español y conserva el tono de desafío del versículo.
- source_word: נֵר
  english_pob_choice: lamp
  chosen_spanish: lámpara
  alternatives_spanish:
  - lámpara
  - luz
  lexicon: HALOT
  rationale: נֵר designa literalmente una lámpara. «Lámpara» preserva la imagen bíblica y permite mantener el valor metafórico de vida, prosperidad o continuidad.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los malvados
  alternatives_spanish:
  - los impíos
  - los culpables
  lexicon: HALOT
  rationale: En español, «malvados» comunica de forma natural la idea moral del plural sustantivado. «Impíos» sería posible, pero «malvados» resulta más directo y claro en lectura pública.
- source_word: יִדְעָךְ
  english_pob_choice: is put out
  chosen_spanish: se apaga
  alternatives_spanish:
  - se extingue
  - se apaga
  lexicon: HALOT
  rationale: El verbo se usa para la extinción de una lámpara. «Se apaga» es idiomático en español y mantiene la imagen sin forzar una construcción más pesada.
- source_word: וְיָבֹא עָלֵימוֹ אֵידָם
  english_pob_choice: does their disaster come upon them
  chosen_spanish: y les sobreviene su desastre
  alternatives_spanish:
  - y su desastre les sobreviene
  - y les llega su calamidad
  lexicon: HALOT
  rationale: «Sobrevenir» reproduce bien la idea de calamidad que cae o irrumpe sobre ellos. «Desastre» traduce claramente אֵיד en un español actual, sin perder la fuerza del juicio inesperado.
- source_word: חֲבָלִים
  english_pob_choice: sorrows
  chosen_spanish: dolores
  alternatives_spanish:
  - dolores
  - pains / sufrimientos
  - angustias
  lexicon: HALOT
  rationale: El término puede abarcar dolores, penas o angustias; en este contexto judicial, «dolores» conserva la amplitud semántica y resulta más natural que un calco técnico. Se deja abierta la posible resonancia de «pains» del texto base inglés.
- source_word: יְחַלֵּק
  english_pob_choice: apportion
  chosen_spanish: asigna
  alternatives_spanish:
  - asigna
  - reparte
  - distribuye
  lexicon: HALOT
  rationale: El piel de חלק expresa repartir o asignar. «Asigna» comunica la idea de distribuir penas como porción decretada, con claridad y concisión en español.
- source_word: בְּאַפּוֹ
  english_pob_choice: in his anger
  chosen_spanish: en su ira
  alternatives_spanish:
  - en su ira
  - en su enojo
  - en su furor
  lexicon: HALOT
  rationale: אַף se refiere a ira/enojo/furor. «Ira» es la opción más solemne y estable en español bíblico. El sujeto implícito no se explicita, respetando la sintaxis hebrea y el contexto.
theological_decisions:
- issue: Sujeto implícito en la última cláusula
  english_pob_reading: The subject is left as 'he' in English, with the sense referring to God from context rather than being explicitly supplied as 'God.'
  chosen_spanish_reading: La traducción mantiene el sujeto implícito en «¿Les asigna dolores en su ira?», sin añadir «Dios» explícitamente.
  alternative_spanish_readings:
  - ¿Les asigna Dios dolores en su ira?
  - ¿Es Dios quien les asigna dolores en su ira?
  rationale: El hebreo no nombra el sujeto en esta cláusula. Aunque el contexto apunta a Dios, explicitarlo iría más allá de la forma del texto. Mantener la implicitud respeta la economía del original y la observación del POB inglés.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor metafórico de «lámpara»
  english_pob_reading: '''Lamp'' is a metaphor for a person''s life, prosperity, or continuing fortune.'
  chosen_spanish_reading: «Lámpara» se conserva como metáfora abierta de vida, prosperidad o continuidad.
  alternative_spanish_readings:
  - «Vida»
  - «prosperidad»
  - «fortuna»
  rationale: No se reduce la metáfora a un solo sentido, porque el hebreo funciona deliberadamente de manera amplia. Conservar «lámpara» preserva la tensión poética y permite que el lector perciba el trasfondo sapiencial.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El contexto de revisión indica estabilidad textual: no se aplicaron cambios en la última pasada y el cotejo externo señaló solo observaciones menores. La redacción española se mantiene alineada con el análisis auditado del inglés POB y del hebreo, sin introducir aclaraciones no justificadas.'
  spanish_consistency_notes:
  - Se conservó el paralelismo interrogativo con dos preguntas retóricas.
  - «Yahvé» no aparece porque este versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
  - Se prefirió «malvados» sobre «impíos» por naturalidad en español, sin alterar el valor moral del término.
  - La metáfora de la lámpara permanece sin explicación intratextual para no cerrar su alcance semántico.
  - La última cláusula conserva el sujeto implícito, como en el hebreo y en el audit trail inglés.
