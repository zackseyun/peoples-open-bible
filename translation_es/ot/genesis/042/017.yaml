review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido básico del hebreo: José puso a sus hermanos en confinamiento/custodia durante tres días. La elección de ‘puso’ para וַיֶּאֱסֹף y ‘custodia’ para מִשְׁמָר sigue bien la evidencia fuente y la auditoría inglesa. Sin embargo, la nota al pie actual introduce una formulación española menos natural (‘en custodia’) y una glosa algo torpe (‘custodia guardada’ en alternativas léxicas), por lo que conviene un ajuste menor.'
  spanish_quality_summary: 'El texto principal ‘Y los puso bajo custodia por tres días[a].’ es claro, fiel y natural en español eclesial moderno. La mejora necesaria está en la nota: debe sonar natural en español y explicar con más limpieza la idiomaticidad hebrea. También conviene evitar comillas y puntuación innecesariamente cargadas al inicio de la nota.'
  glossary_alignment: No hay términos teológicos especiales en este versículo. ‘Custodia’ concuerda con la decisión POB para מִשְׁמָר, y ‘puso’ preserva bien el valor idiomático de וַיֶּאֱסֹף en contexto. No hay conflicto con las pautas terminológicas del proyecto.
  issues:
  - severity: low
    issue: La nota al pie usa ‘en custodia’, menos natural que ‘bajo custodia’ en español.
    rationale: Aunque el inglés dice ‘in custody’, el español idiomático normal es ‘bajo custodia’. La nota debe conservar la alternativa léxica sin degradar la naturalidad del español.
  - severity: low
    issue: 'La redacción de la nota al pie es poco pulida (‘O: ...’, comillas redundantes, y explicación algo pesada).'
    rationale: La nota debe ser clara, breve y coherente con el estilo editorial; esto se corrige sin alterar el sentido.
  revised_spanish_text: Y los puso bajo custodia por tres días[a].
  revised_footnotes:
  - marker: a
    text: 'O: «Y los confinó bajo custodia por tres días». El verbo hebreo literalmente significa «reunió» o «juntó», pero aquí funciona idiomáticamente con el sentido de ponerlos bajo guardia.'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural. Se revisa únicamente la nota al pie para mejorar el español, alinear la alternativa con la locución idiomática ‘bajo custodia’ y explicar con más claridad el valor idiomático del verbo hebreo.
