translation:
  language: es
  text: ¡Cuán honrado es uno en su riqueza[a], y cuán despreciado en su pobreza!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego dispone la sentencia de otro modo: «Pero el que es honrado en la pobreza —¿cuánto más en la riqueza? Y el que no tiene honor en la riqueza —¿cuánto más en la pobreza?» Aquí se toma el testimonio hebreo como primario, y el griego como verificación de consistencia.'
    reason: alternative_reading
lexical_decisions:
- source_word: נִכְבָּד
  english_pob_choice: honored
  chosen_spanish: honrado
  alternatives_spanish:
  - honrado
  - estimado
  - glorificado
  lexicon: HALOT
  rationale: El verbo pasivo de כבד expresa ser tenido en gran estima o con honor. «Honrado» conserva el valor social de prestigio y suena natural en español bíblico actual.
- source_word: בְּעָשְׁרוֹ
  english_pob_choice: in his wealth
  chosen_spanish: en su riqueza
  alternatives_spanish:
  - en su riqueza
  - por su riqueza
  - cuando es rico
  lexicon: HALOT
  rationale: La preposición בְּ marca esfera o circunstancia. «En su riqueza» sigue de cerca la construcción hebrea y mantiene el paralelismo con «en su pobreza».
- source_word: אֵיכָכָה
  english_pob_choice: how
  chosen_spanish: cuán
  alternatives_spanish:
  - cómo
  - cuánto
  - qué tanto
  lexicon: HALOT
  rationale: La partícula interrogativa/exclamativa expresa grado. «Cuán» reproduce mejor la fuerza retórica elevada del paralelismo exclamativo que un simple «cómo».
- source_word: וְנִקְלֶה
  english_pob_choice: despised
  chosen_spanish: despreciado
  alternatives_spanish:
  - despreciado
  - deshonrado
  - tenido en poco
  lexicon: HALOT
  rationale: נקל en nifal indica ser tenido en poca estima o con desprecio. «Despreciado» refleja con claridad el contraste social y retórico con «honrado».
- source_word: בְּעָנְיוֹ
  english_pob_choice: in his poverty
  chosen_spanish: en su pobreza
  alternatives_spanish:
  - en su pobreza
  - por su pobreza
  - cuando es pobre
  lexicon: HALOT
  rationale: Como en el primer hemistiquio, la preposición señala la condición o esfera. «En su pobreza» conserva la forma paralela del hebreo y la cadencia del dicho.
- source_word: 'Greek parallel: δοξαζόμενος / ἄδοξος / ποσαχῶς'
  english_pob_choice: supported the exclamatory contrast reflected in the Hebrew
  chosen_spanish: apoyó el contraste exclamativo reflejado en el hebreo
  alternatives_spanish:
  - apoyó el contraste exclamativo del hebreo
  - confirmó el contraste entre honor y deshonor
  lexicon: BDAG
  rationale: El griego presenta el dicho con orden y énfasis distintos, pero coincide en la oposición honor/deshonor bajo pobreza y riqueza. Se deja como apoyo de consistencia, sin desplazar la primacía del hebreo.
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente, que suavizó la sintaxis a «How honored one is...» sin perder el paralelismo exclamativo. Se eligió una forma igualmente natural en español («¡Cuán honrado es uno...!») y se mantuvo la antítesis hebrea con dos miembros equilibrados.
  spanish_consistency_notes:
  - Se usó «honrado/despreciado» para preservar el contraste de estatus social del hebreo.
  - Se evitó «SEÑOR» u otros términos no pertinentes; el versículo no contiene un nombre divino.
  - Se mantuvo el paralelismo preposicional «en su riqueza / en su pobreza» para conservar la estructura semítica.
  - «Cuán» refleja mejor la exclamación de grado que una simple interrogación en español moderno.
