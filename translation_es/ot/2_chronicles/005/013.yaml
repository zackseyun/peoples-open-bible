review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura general del hebreo y preserva correctamente Yahvé, la repetición enfática «la casa, la casa de Yahvé» y la secuencia litúrgica. Sin embargo, dos elecciones no reflejan de la mejor manera el sentido fuente ni la justificación auditada: «estaban unidos» debilita la imagen de כְאֶחָד («como uno / al unísono»), y «para siempre es su misericordia» con nota principal en «misericordia» se aparta de la preferencia documentada de חֶסֶד como amor fiel/constante. También «una sola voz» puede sonar más vocal que sonora en un contexto que incluye instrumentos.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero tiene algunos giros algo rígidos o menos precisos: «trompeteros» resulta menos natural que «los que tocaban las trompetas» o «los trompetistas»; «instrumentos de canto» es comprensible pero algo forzado; y la combinación «estaban unidos ... hacer oír una sola voz» no reproduce tan bien la unidad sonora concreta del pasaje. Una revisión pequeña puede mejorar naturalidad y fidelidad sin perder solemnidad.'
  glossary_alignment: 'Alineación fuerte en «Yahvé». Alineación parcial en חֶסֶד: el proyecto inglés documenta «steadfast love» como preferencia teológica/lexical; en español conviene reflejarlo mejor como «amor fiel» o similar, dejando «misericordia» como alternativa en nota, no como texto principal. No hay otros choques graves con la terminología por defecto.'
  issues:
  - severity: medium
    issue: «estaban unidos» suaviza כְאֶחָד
    rationale: El hebreo enfatiza que actuaban «como uno», no solo que estaban unidos en general. En este contexto musical-litúrgico, «como uno» o «al unísono» conserva mejor la imagen y prepara «un solo sonido».
  - severity: medium
    issue: «para hacer oír una sola voz» puede desviar hacia voz humana en vez de sonido unificado
    rationale: להשמיע קול אחד apunta a producir un sonido unificado. Dado que el versículo menciona cantores e instrumentos, «hacer oír un solo sonido» o «hacer oír un solo son» evita ambigüedad innecesaria.
  - severity: medium
    issue: Texto principal con «misericordia» para חֶסֶד no refleja la preferencia documentada
    rationale: La auditoría inglesa justifica «steadfast love» por su fuerza pactual y durativa. En español, «amor fiel» comunica mejor ese valor que «misericordia», que puede quedar más estrecho. «Misericordia» puede mantenerse como alternativa en nota.
  - severity: low
    issue: «instrumentos de canto» suena algo poco idiomático
    rationale: Aunque cercano al hebreo, en español más natural sería «instrumentos musicales» o «instrumentos para el canto». Aquí «instrumentos musicales» mantiene claridad sin desfigurar el sentido.
  revised_spanish_text: 'Y aconteció que, cuando los que tocaban las trompetas y los cantores eran como uno[a], para hacer oír un solo sonido, al alabar y dar gracias a Yahvé, y cuando alzaban la voz con trompetas, címbalos e instrumentos musicales, y alababan a Yahvé: «Porque él es bueno, porque su amor fiel[b] es para siempre», la casa, la casa de Yahvé, se llenó de una nube.'
  revised_footnotes:
  - marker: a
    text: Lit. «como uno»; también puede entenderse «al unísono».
    reason: lexical_alternative
  - marker: b
    text: «Amor fiel» traduce aquí חֶסֶד, que a menudo denota amor leal o pactual; tradicionalmente también se ha traducido «misericordia» o «bondad amorosa».
    reason: lexical_alternative
  revision_rationale: 'La revisión corrige tres puntos principales: (1) restaura mejor la imagen hebrea de unidad con «eran como uno» en vez de «estaban unidos»; (2) aclara el resultado auditivo con «un solo sonido»; y (3) alinea חֶסֶד con la decisión teológica documentada mediante «amor fiel» en el texto principal, dejando «misericordia» como alternativa en nota. Además, se suavizan algunos giros para un español más natural y litúrgicamente legible.'
