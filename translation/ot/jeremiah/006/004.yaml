id: JER.6.4
reference: Jeremiah 6:4
source:
  edition: WLC
  text: קַדְּשׁ֤וּ עָלֶ֨י/הָ֙ מִלְחָמָ֔ה ק֖וּמוּ וְ/נַעֲלֶ֣ה בַֽ/צָּהֳרָ֑יִם א֥וֹי לָ֨/נוּ֙ כִּי פָנָ֣ה הַ/יּ֔וֹם כִּ֥י יִנָּט֖וּ צִלְלֵי עָֽרֶב־־׃
translation:
  text: Consecrate war against her; rise up[a], and let us go up at noon. Woe to us, for the day is turning away, for the shadows of evening are stretching out.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Prepare for war against her.' The Hebrew literally uses consecration language for battle.
    reason: lexical_alternative
lexical_decisions:
- source_word: קַדְּשׁוּ
  chosen: Consecrate
  alternatives:
  - Prepare
  - Sanctify
  lexicon: HALOT
  rationale: The Piel imperative of קדשׁ literally means 'set apart/consecrate.' In military contexts it can idiomatically mean to prepare or proclaim holy war. 'Consecrate' preserves the Hebrew imagery of sacral preparation for battle better than the flatter 'prepare.'
- source_word: עָלֶיהָ
  chosen: against her
  alternatives:
  - upon her
  - concerning her
  lexicon: HALOT
  rationale: With מלחמה, על commonly marks hostile direction. Since the feminine singular suffix refers to the city (Jerusalem/Zion) in context, 'against her' is the most natural English rendering.
- source_word: מִלְחָמָה
  chosen: war
  alternatives:
  - battle
  lexicon: HALOT
  rationale: '''War'' best matches the broad military sense here and fits the collocation ''consecrate war.'' ''Battle'' would narrow the scope too much.'
- source_word: קוּמוּ
  chosen: rise up
  alternatives:
  - arise
  - get up
  lexicon: HALOT
  rationale: An imperative urging immediate action. 'Rise up' is idiomatic and suitably forceful in military speech.
- source_word: וְנַעֲלֶה
  chosen: let us go up
  alternatives:
  - let us attack
  - let us march up
  lexicon: HALOT
  rationale: עלה commonly means 'go up/ascend' and is often used for advancing against a city. 'Let us go up' preserves the literal military idiom without over-paraphrasing to 'attack.'
- source_word: בַצָּהֳרָיִם
  chosen: at noon
  alternatives:
  - in the noonday
  - at midday
  lexicon: HALOT
  rationale: The noun denotes midday/noon. 'At noon' is clear modern English.
- source_word: אוֹי לָנוּ
  chosen: Woe to us
  alternatives:
  - Alas for us
  lexicon: HALOT
  rationale: A cry of distress or frustration. 'Woe to us' preserves the gravity and prophetic register.
- source_word: כִּי פָנָה הַיּוֹם
  chosen: for the day is turning away
  alternatives:
  - for the day declines
  - for the day has turned
  lexicon: HALOT
  rationale: פנה literally means 'turn.' In context it refers to the day declining toward evening. 'Is turning away' keeps the metaphor while remaining readable.
- source_word: יִנָּטוּ
  chosen: are stretching out
  alternatives:
  - lengthen
  - incline
  lexicon: HALOT
  rationale: The Niphal of נטה here describes shadows extending/lengthening. 'Are stretching out' is vivid and natural English.
- source_word: צִלְלֵי עָרֶב
  chosen: the shadows of evening
  alternatives:
  - the evening shadows
  lexicon: HALOT
  rationale: A construct phrase meaning shadows associated with evening. 'The shadows of evening' is slightly more formal and preserves the Hebrew structure.
