translation:
  language: es
  text: Cuando se eleva[a] en lo alto, se ríe de[b] el caballo y de su jinete.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo hebreo puede entenderse como «elevarse» en sentido general, o con la imagen más concreta de «alzar el vuelo» o «batir las alas». El contexto poético favorece mantener la amplitud del verbo sin cerrar la imagen.
    reason: lexical_alternative
  - marker: b
    text: «Se ríe de» también puede tener el sentido de «se burla de», «se mofa de» o «desprecia».
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּעֵת
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Al tiempo que
  - En el momento en que
  lexicon: HALOT
  rationale: La expresión introduce una circunstancia temporal; «cuando» conserva con naturalidad esa relación en español sin añadir matices innecesarios.
- source_word: בַּמָּרוֹם
  english_pob_choice: on high
  chosen_spanish: en lo alto
  alternatives_spanish:
  - en la altura
  - allá arriba
  - en las alturas
  lexicon: HALOT
  rationale: מָרוֹם denota elevación/altura. «En lo alto» mantiene el registro poético y la idea de elevación sin precisar más de lo que el hebreo dice.
- source_word: תַּמְרִיא
  english_pob_choice: lifts herself up
  chosen_spanish: se eleva
  alternatives_spanish:
  - alza su vuelo
  - se remonta
  - bate sus alas y se eleva
  lexicon: HALOT
  rationale: El hiphil del verbo puede expresar hacerse subir o tomar altura. «Se eleva» preserva la imagen general sin afirmar más de lo que el texto garantiza; por eso se evita una traducción más específica como «vuela» o «remonta».
- source_word: תִּשְׂחַק
  english_pob_choice: she laughs at
  chosen_spanish: se burla
  alternatives_spanish:
  - se ríe de
  - se mofa de
  - se desprecia a
  lexicon: HALOT
  rationale: Con la preposición que rige el objeto, el verbo expresa risa despectiva o burla. «Se burla» recoge ese valor derisorio en un español claro y natural.
- source_word: לַסּוּס
  english_pob_choice: the horse
  chosen_spanish: del caballo
  alternatives_spanish:
  - del corcel
  - del caballo
  lexicon: HALOT
  rationale: El artículo definido del hebreo permite un referente genérico; «del caballo» reproduce ese valor con sencillez y sin forzar una estilización adicional.
- source_word: וּלְרֹכְבוֹ
  english_pob_choice: and its rider
  chosen_spanish: y de su jinete
  alternatives_spanish:
  - y del que lo monta
  - y de quien lo monta
  - y de su cabalgador
  lexicon: HALOT
  rationale: El sufijo posesivo vuelve naturalmente al caballo. «Su jinete» evita ambigüedad y conserva la relación entre el animal y quien lo monta.
translation_notes:
  revision_awareness: Se ha mantenido el sentido general del texto hebreo y el enfoque poético del audit trail inglés. La elección española evita sobrerinterpretar la acción del ave y conserva la ambigüedad legítima del verbo de movimiento, además de reflejar el valor derisorio de שׂחק.
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene el registro poético con léxico moderno y digno, evitando arcaísmos innecesarios.
  - Se conserva el singular genérico «el caballo» / «su jinete» para reflejar el hebreo sin añadir determinaciones no presentes.
