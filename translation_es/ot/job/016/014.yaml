- from: Me atraviesa[a] con brecha sobre brecha[b]; corre hacia mí como un guerrero.
  to: Irrumpe contra mí con brecha sobre brecha[a]; se lanza contra mí como un guerrero[b].
  rationale: Se reemplaza «me atraviesa» por «irrumpe contra mí» para reflejar mejor el valor de פרץ como irrupción o apertura violenta contra Job. Se cambia «corre hacia mí» por «se lanza contra mí» para expresar la embestida hostil de יָרוּץ עָלַי sin perder naturalidad en español. Se conserva «brecha sobre brecha» por fidelidad a la repetición hebrea y se ajustan las notas para alinearlas con las alternativas documentadas en la POB inglesa.
