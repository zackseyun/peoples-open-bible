  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τόν ποτέ σοι ἄχρηστον νυνὶ ⸀δὲ σοὶ καὶ ἐμοὶ εὔχρηστον,
base_translation:
  language: en
  yaml_path: translation/nt/philemon/001/011.yaml
  text: who once was useless to you[a], but now is useful both to you and to me,
  footnotes:
  - marker: a
    text: Paul likely plays on the name Onesimus, which is related to the idea of being useful or beneficial.
    reason: lexical_alternative
translation:
  language: ko
  text: 그는 한때 그대에게 무익한[a] 자였으나, 이제는 그대와 나 둘 다에게 유익한 자입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 바울은 「유익」을 뜻하는 오네시모(Ὀνήσιμος)의 이름과 「무익/유익」(ἄχρηστον/εὔχρηστον)의 어휘를 의도적으로 짝지어 언어유희를 펼친다.
    reason: lexical_alternative
lexical_decisions:
- source_word: τόν
  english_pob_choice: who
  chosen_korean: 그는
  alternatives_korean:
  - 그를
  - 곧 그
  lexicon: BDAG
  rationale: 앞 절(오네시모)을 가리키는 대격 관사. 한국어에서는 새로운 문장의 주어 「그는」으로 시작하는 것이 자연스럽다.
- source_word: ποτέ
  english_pob_choice: once
  chosen_korean: 한때
  alternatives_korean:
  - 전에는
  - 예전에
  lexicon: BDAG
  rationale: νυνί와의 시간 대조를 간결히 살린다.
- source_word: σοι
  english_pob_choice: to you
  chosen_korean: 그대에게
  lexicon: BDAG
  rationale: 단수 여격, 빌레몬 합쇼체 호칭.
- source_word: ἄχρηστον
  english_pob_choice: useless
  chosen_korean: 무익한
  alternatives_korean:
  - 쓸모없는
  - 도움이 안 되는
  lexicon: BDAG
  rationale: 「무익」은 다음 절의 「유익」(εὔχρηστον)과 대조를 가장 분명히 살리며, 오네시모 이름과의 언어유희도 보존한다. 「쓸모없는」은 다소 거칠다.
- source_word: νυνὶ δὲ
  english_pob_choice: but now
  chosen_korean: 이제는
  alternatives_korean:
  - 그러나 지금은
  - 하지만 이제는
  lexicon: BDAG
  rationale: ποτέ와의 시간 대조에 δέ의 약한 대조 의미가 결합된다. 「이제는」이 그 흐름을 간결하게 살린다.
- source_word: σοὶ καὶ ἐμοὶ
  english_pob_choice: to you and to me
  chosen_korean: 그대와 나 둘 다에게
  alternatives_korean:
  - 그대에게도 나에게도
  - 그대와 나에게
  lexicon: BDAG
  rationale: 영어 POB가 「both ... and」를 보충한 흐름을 따라, 한국어에서도 「둘 다에게」로 짝의 균형을 살린다.
- source_word: εὔχρηστον
  english_pob_choice: useful
  chosen_korean: 유익한
  alternatives_korean:
  - 쓸모 있는
  - 이로운
  lexicon: BDAG
  rationale: 「유익」은 오네시모 이름의 뜻(「유익한 자」)을 그대로 반향하며 「무익」과의 정확한 대비를 이룬다.
theological_decisions:
- issue: 오네시모 이름과의 언어유희
  chosen_reading: 본문은 「무익/유익」의 단순 대비를 그대로 보존하고, 이름 언어유희는 각주에서 설명
  alternative_readings:
  - 더 해석적으로 「전혀 쓸모없던 자... 이제는 참으로 유익한 자」로 강조
  rationale: 본문 자체가 대비를 명시하므로 추가 설명 없이도 효과가 드러난다. 직역과 각주가 적합하다.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
