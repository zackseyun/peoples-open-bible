translation:
  language: es
  text: Y sucedió que[a], mientras estaba adorando en la casa de Nisroc, su dios, Adramélec y Sarézer, sus hijos, lo abatieron a espada, y escaparon a la tierra de Ararat[b][c]. Y Esar-hadón, su hijo, reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mientras se postraba»; el verbo hebreo puede enfatizar el acto corporal de adoración.
    reason: lexical_alternative
  - marker: b
    text: O «el templo de Nisroc, su dios»; el hebreo dice literalmente «la casa de Nisroc, su dios».
    reason: lexical_alternative
  - marker: c
    text: También se ve la forma «Esarhaddón».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened that
  chosen_spanish: Y sucedió que
  alternatives_spanish:
  - Y aconteció que
  - Y ocurrió que
  lexicon: HALOT
  rationale: La fórmula narrativa de wayyiqtol introduce un nuevo acontecimiento; «sucedió que» conserva esa función discursiva en español sin arcaísmo excesivo.
- source_word: מִשְׁתַּחֲוֶה
  english_pob_choice: was worshiping
  chosen_spanish: estaba adorando
  alternatives_spanish:
  - estaba postrándose
  - estaba inclinándose en adoración
  lexicon: HALOT
  rationale: En este contexto cultual con «su dios», el valor de adoración es claro. «Adorando» comunica el acto religioso sin perder el matiz corporal de postración que el verbo puede implicar.
- source_word: בֵּית
  english_pob_choice: the house of
  chosen_spanish: la casa de
  alternatives_spanish:
  - el templo de
  lexicon: HALOT
  rationale: El hebreo dice literalmente «casa de». «La casa de» mantiene cercanía formal al texto fuente y sigue siendo natural en español.
- source_word: נִסְרֹךְ אֱלֹהָיו
  english_pob_choice: Nisroch his god
  chosen_spanish: Nisroc, su dios
  alternatives_spanish:
  - Nisroc, el dios de él
  - Nisroc, su deidad
  lexicon: HALOT
  rationale: Nisroc se translitera como nombre propio, y la relación posesiva expresa que era el dios de Senaquerib. Se conserva la tensión textual de un nombre divino referido como deidad personal.
- source_word: אַדְרַמֶּלֶךְ
  english_pob_choice: Adrammelech
  chosen_spanish: Adramélec
  alternatives_spanish:
  - Adramelec
  lexicon: HALOT
  rationale: Se adapta la transliteración a una forma castellana legible; la acentuación ayuda a la pronunciación sin cambiar el nombre.
- source_word: שַׂרְאֶצֶר
  english_pob_choice: Sharezer
  chosen_spanish: Sarézer
  alternatives_spanish:
  - Sarezer
  - Sharezer
  lexicon: HALOT
  rationale: Se sigue una transliteración castellana transparente del nombre propio, conservando la sonoridad semítica sin depender de la forma inglesa.
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos
  lexicon: HALOT
  rationale: Aunque el hebreo es más específico («sus hijos» en sentido masculino), en español «hijos» comunica de manera natural la relación filial sin forzar un tecnicismo.
- source_word: הִכֻּהוּ
  english_pob_choice: struck him down
  chosen_spanish: lo hirieron
  alternatives_spanish:
  - lo golpearon
  - lo mataron
  lexicon: HALOT
  rationale: «Herir» conserva el valor básico de golpear/lesionar del verbo nכה. Se evita adelantar más de lo que el verbo dice, dejando que el contexto de la espada y la sucesión indiquen la muerte.
- source_word: בַּחֶרֶב
  english_pob_choice: with the sword
  chosen_spanish: con la espada
  alternatives_spanish:
  - por medio de la espada
  - a espada
  lexicon: HALOT
  rationale: La preposición instrumental se expresa naturalmente como «con». «Espada» en singular reproduce el instrumento colectivo del hebreo con fluidez en español.
- source_word: נִמְלְטוּ
  english_pob_choice: escaped
  chosen_spanish: escaparon
  alternatives_spanish:
  - huyeron
  - se salvaron
  lexicon: HALOT
  rationale: El nifal de מלט indica escape exitoso. «Escaparon» es la equivalencia más clara y directa en este contexto narrativo.
- source_word: אֶרֶץ אֲרָרָט
  english_pob_choice: the land of Ararat
  chosen_spanish: la tierra de Ararat
  alternatives_spanish:
  - el país de Ararat
  - la región de Ararat
  lexicon: HALOT
  rationale: «Tierra» reproduce bien אֶרֶץ y conserva la amplitud geográfica del hebreo. «Ararat» se mantiene como topónimo tradicional.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - llegó a reinar
  lexicon: HALOT
  rationale: «Reinó» es la forma más idiomática para la sucesión real. La idea de continuidad o inicio queda suficientemente clara por el contexto.
- source_word: אֵסַר חַדֹּן
  english_pob_choice: Esar-haddon
  chosen_spanish: Esar-hadón
  alternatives_spanish:
  - Esarhaddón
  - Esar-hadón
  lexicon: HALOT
  rationale: Se adapta el nombre propio a una grafía castellana legible; el acento final ayuda a la lectura en español y conserva la identidad del referente.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - tras él
  lexicon: HALOT
  rationale: El modismo de sucesión real se expresa naturalmente como «en su lugar», equivalente directo de la idea de reemplazo en el trono.
theological_decisions:
- issue: La muerte del rey por la mano de sus propios hijos y la sucesión inmediata
  english_pob_reading: struck him down ... and Esar-haddon his son reigned in his place
  chosen_spanish_reading: lo hirieron ... y Esar-hadón, su hijo, reinó en su lugar
  alternative_spanish_readings:
  - lo mataron ... y reinó en su lugar
  - lo hirieron de muerte ... y reinó en su lugar
  rationale: 'La formulación española conserva la tensión del hebreo/POB: el verbo de golpe/daño no se sustituye por un verbo interpretativo absoluto en la primera cláusula, pero el contexto narrativo deja clara la muerte y la sucesión.'
  doctrine_reference: Narrativa histórica; lectura directa del texto sin doctrinas adicionales
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés. Se mantuvo la secuencia narrativa, la identificación de Nisroc como dios de Senaquerib, el golpe con la espada, la huida a Ararat y la sucesión de Esar-hadón sin introducir expansiones interpretativas.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; aquí no aparece el tetragrámaton.
  - Se preservó el valor de acción corporal/religiosa de מִשְׁתַּחֲוֶה con una alternativa nota al pie.
  - Se mantuvo la distinción entre herir y matar para no borrar la decisión léxica del POB inglés.
  - Los nombres propios se adaptaron a grafía castellana estable sin alterar la identificación histórica.
