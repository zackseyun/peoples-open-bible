  lexicon: HALOT
  rationale: El prefijo ל introduce aquí la designación del representante en la lista censal. En español, «Para Zabulón» conserva la función de encabezado y resulta natural en la enumeración; «De Zabulón» es posible, pero menos claro para esta fórmula repetida; «Para la tribu de Zabulón» explicita el sentido, pero añade una glosa no obligada por el hebreo.
- source_word: אֱלִיאָב
  english_pob_choice: Eliab
  chosen_spanish: Eliab
  lexicon: Transliteración estándar
  rationale: Nombre propio transliterado sin traducción, conforme al valor onomástico del hebreo.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - el hijo de
  lexicon: HALOT
  rationale: La relación genealógica del constructo se expresa de forma directa y natural en español con «hijo de».
- source_word: חֵלֹן
  english_pob_choice: Helon
  chosen_spanish: Helón
  alternatives_spanish:
  - Helon
  lexicon: Transliteración estándar
  rationale: Nombre propio transliterado; se acentúa en español para lectura natural y para reflejar la prosodia del nombre en la escritura española.
translation_notes:
