translation:
  language: es
  text: Ponlo a trabajar, para que no esté ocioso;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔμβαλε
  english_pob_choice: Put ... to
  chosen_spanish: Ponlo a
  alternatives_spanish:
  - Mételo en
  - Encárgalo en
  lexicon: LSJ
  rationale: ἔμβαλε, de ἐμβάλλω, es literalmente «arroja/mete dentro», pero en esta construcción con εἰς ἐργασίαν pide en español una expresión natural de mandato. «Ponlo a trabajar» preserva el imperativo y la idea de colocar a alguien en una tarea.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - le
  - al
  lexicon: Gramática griega
  rationale: El acusativo masculino singular se refiere a un varón en el contexto. En español, el clítico de objeto directo «lo» conserva mejor esa referencia que una neutralización.
- source_word: εἰς ἐργασίαν
  english_pob_choice: to work
  chosen_spanish: a trabajar
  alternatives_spanish:
  - al trabajo
  - en labor
  - a la labor
  lexicon: LSJ
  rationale: ἐργασία significa trabajo, labor u ocupación. Tras el verbo de mandato, «poner a trabajar» es la forma más natural y fiel en español, sin volverla excesivamente literal.
- source_word: ἵνα μὴ ἀργῇ
  english_pob_choice: so that he may not be idle
  chosen_spanish: para que no esté ocioso
  alternatives_spanish:
  - para que no sea ocioso
  - a fin de que no esté ocioso
  - para que no permanezca inactivo
  lexicon: LSJ
  rationale: ἀργέω expresa estar ocioso o inactivo. «Ocioso» comunica bien esa falta de actividad en español y evita intensificar indebidamente el sentido hacia «perezoso», que sería más moralizante.
theological_decisions:
- issue: Tono del mandato sobre la subordinación laboral
  english_pob_reading: Put him to work
  chosen_spanish_reading: Ponlo a trabajar
  alternative_spanish_readings:
  - Mételo a trabajar
  - Entrégalo al trabajo
  rationale: La frase refleja una instrucción práctica y directa, sin suavizar la relación de subordinación que presenta el texto. Se conserva el carácter concreto del mandato sin añadir una valoración moral extra.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 4
- issue: Alcance de ἀργέω
  english_pob_reading: be idle
  chosen_spanish_reading: estar ocioso
  alternative_spanish_readings:
  - ser perezoso
  - estar inactivo
  rationale: «Ocioso» preserva la idea básica de inactividad. Se evita «perezoso» porque introduce una carga moral que el griego no exige directamente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa concuerdan estrechamente; no se documentan revisiones que requieran matiz adicional en español.
  spanish_consistency_notes:
  - Se usa «lo» para reflejar el objeto masculino singular.
  - Se mantiene un español claro y natural, evitando calcos como «en trabajo» o «en labor».
  - No se introduce terminología eclesiástica ajena al sentido del proverbio.
