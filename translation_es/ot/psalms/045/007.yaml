translation:
  language: es
  text: Tu trono[a], Dios, es por los siglos de los siglos[b]; el cetro de tu reino es un cetro de rectitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «Tu trono es Dios por los siglos de los siglos», o «Tu trono divino es por los siglos de los siglos». La sintaxis hebrea es debatida; el texto principal sigue la lectura vocativa.'
    reason: alternative_reading
  - marker: b
    text: 'O: «un cetro de rectitud es el cetro de tu reino».'
    reason: previous_rendering
lexical_decisions:
- source_word: כִּסְאֲךָ
  english_pob_choice: your throne
  chosen_spanish: tu trono
  alternatives_spanish:
  - tu asiento real
  - tu sede de gobierno
  lexicon: HALOT
  rationale: En contexto real, כִּסֵּא designa el trono como asiento de realeza; «trono» es el equivalente natural y preciso en español.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - tu trono es Dios
  lexicon: HALOT
  rationale: Se conserva la lectura vocativa adoptada por el POB en inglés. En español, «oh Dios» expresa el llamado directo sin resolver la tensión sintáctica del hebreo.
- source_word: עוֹלָם וָעֶד
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - para siempre y para siempre
  - por la eternidad
  lexicon: HALOT
  rationale: La locución hebrea expresa perpetuidad enfática. «Por los siglos de los siglos» es idiomática, solemne y transmite bien la repetición intensiva.
- source_word: שֵׁבֶט
  english_pob_choice: scepter
  chosen_spanish: cetro
  alternatives_spanish:
  - vara
  - bastón
  lexicon: HALOT
  rationale: En un marco monárquico, שֵׁבֶט se refiere al cetro del gobernante, no a una vara cualquiera.
- source_word: מִישֹׁר
  english_pob_choice: uprightness
  chosen_spanish: rectitud
  alternatives_spanish:
  - justicia
  - equidad
  - recta conducta
  lexicon: HALOT
  rationale: מִישֹׁר comunica rectitud/llaneza moral. «Rectitud» preserva el paralelo poético sin imponer un matiz jurídico más fuerte del que exige el hebreo.
- source_word: שֵׁבֶט מַלְכוּתֶךָ
  english_pob_choice: the scepter of your kingdom
  chosen_spanish: el cetro de tu reino
  alternatives_spanish:
  - el cetro de tu realeza
  - tu cetro real
  lexicon: HALOT
  rationale: מַלְכוּת denota reino/kingship. «El cetro de tu reino» conserva la relación constructa y el tono formal del verso.
theological_decisions:
- issue: Función sintáctica y teológica de אֱלֹהִים
  english_pob_reading: 'Vocative address: ''Your throne, O God, is forever and ever'''
  chosen_spanish_reading: 'Vocativo: «Tu trono, oh Dios...»'
  alternative_spanish_readings:
  - «Tu trono es Dios por los siglos de los siglos»
  - «Tu trono divino es por los siglos de los siglos»
  rationale: El hebreo admite debate, pero la lectura vocativa es la seguida en el POB inglés y preserva la tensión interpretativa en lugar de resolverla prematuramente. Además, encaja con la recepción canónica antigua del verso.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El inglés POB mantiene la lectura vocativa y conserva la alternativa sintáctica en nota. La revisión posterior no cambió el texto inglés; la versión española sigue esa misma decisión y traslada la nota alternativa al español con redacción idiomática.
  spanish_consistency_notes:
  - Se mantiene «Dios» con valor vocativo y no se sustituye por una paráfrasis devocional más libre.
  - «Cetro» se conserva en ambas apariciones para reflejar la repetición hebrea de שֵׁבֶט.
  - «Rectitud» se usa para מִישֹׁר, en paralelo con el criterio inglés de no sobre-especificar como «justicia» o «equidad» sin necesidad.
  - La puntuación reproduce la estructura paralela y la pausa fuerte entre los dos miembros del verso.
