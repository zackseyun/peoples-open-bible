  from: those who saw you
  to: those who have been sent
  rationale: The draft incorrectly parses ⲧⲛ̄ⲛⲟⲟⲩ as ⲧⲛ̄ (you) + ⲛⲟⲟⲩ (see). The verb
    'to see' is ⲛⲁⲩ. ⲧⲛ̄ⲛⲟⲟⲩ is the standard Coptic verb 'to send' (Crum 420a). The
    phrase ⲛⲉ-ⲛⲧ-ⲁ-ⲩ-ⲧⲛ̄ⲛⲟⲟⲩ means 'those who have been sent' (using the impersonal
    plural for the passive) or 'those who sent'.
- timestamp: '2026-04-22T23:01:49Z'
  adjudicator: auto_apply_tier2_source_grounded
  reviewer_model: gemini-2.5-pro
  source_review: state/reviews/gemini/phase10_coptic_gnostic/extra_canonical/thunder_perfect_mind/001/113.job-73516.json
  category: mistranslation
  tier: 2
  from: You yourselves alone
  to: You yourselves also
  rationale: The draft translates ϩⲱⲧ as 'alone'. However, ϩⲱⲧ ⲧⲏⲩⲧⲛ̄ is a spelling
    of ϩⲱⲱⲧⲏⲩⲧⲛ̄, from the enclitic ϩⲱⲱ= meaning 'also, too, for one's part' (Crum
    736a). The Coptic word for 'alone' is ⲙⲁⲩⲁⲁ=.
