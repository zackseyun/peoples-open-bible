translation:
  language: es
  text: El corazón de una persona cambia su rostro[a], ya sea para bien o para mal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testimonio griego conserva un paralelo notablemente distinto: habla de un «rostro alegre» como señal de un corazón que está «en cosas buenas», y añade una cláusula difícil sobre hallar parábolas con trabajo. Como el hebreo está preservado y es primario para este versículo, el texto principal sigue al hebreo; el griego confirma de modo general la relación entre interioridad y expresión externa, pero no el mismo enunciado.'
    reason: textual_variant
lexical_decisions:
- source_word: לֵב / καρδία
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  - ser interior
  lexicon: HALOT; LSJ
  rationale: En el lenguaje sapiencial, el hebreo לֵב y su paralelo griego καρδία señalan el centro interior de pensamiento y disposición. «Corazón» conserva la imagen antropológica concreta y es natural en español.
- source_word: אֱנוֹשׁ / implied human subject
  english_pob_choice: person
  chosen_spanish: una persona
  alternatives_spanish:
  - un hombre
  - el ser humano
  lexicon: HALOT
  rationale: El sustantivo hebreo tiene fuerza humana genérica; «una persona» evita restringir el proverbio a varón en español y corresponde al ajuste revisado en el inglés POB.
- source_word: יְשַׁנֵּא / changes
  english_pob_choice: changes
  chosen_spanish: cambia
  alternatives_spanish:
  - altera
  - transforma
  lexicon: HALOT
  rationale: El verbo expresa cambio o alteración del estado externo por la disposición interior. «Cambia» es directo y fiel sin sobreinterpretar el alcance.
- source_word: פָנָיו / his face
  english_pob_choice: his face
  chosen_spanish: su rostro
  alternatives_spanish:
  - su cara
  - su semblante
  lexicon: HALOT
  rationale: «Rostro» mantiene la referencia concreta a la expresión visible y suena digno en español bíblico moderno.
- source_word: אִם לְטוֹב וְאִם לְרָע
  english_pob_choice: whether for good or for evil
  chosen_spanish: ya sea para bien o para mal
  alternatives_spanish:
  - sea para bien o para mal
  - ya sea para el bien o para el mal
  lexicon: HALOT
  rationale: La pareja antitética se conserva con una formulación natural en español. «Para mal» comunica la oposición de manera clara sin endurecer innecesariamente el matiz moral de רָע.
translation_notes:
  revision_awareness: La redacción sigue el hebreo conservado en Kahana, en línea con la decisión del inglés POB de dar prioridad al testimonio hebreo en este versículo, mientras que la nota registra la divergencia importante del paralelo griego.
  spanish_consistency_notes:
  - Se mantiene «corazón» para לֵב/καρδία por coherencia con el vocabulario sapiencial.
  - Se usa «rostro» en vez de «apariencia» para conservar la imagen corporal concreta del proverbio.
  - «Para bien o para mal» refleja la polaridad del hebreo sin añadir un sentido técnico ajeno.
