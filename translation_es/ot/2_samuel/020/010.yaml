translation:
  language: es
  text: Pero Amasa no estaba alerta[a] ante la espada que estaba en la mano de Joab, y este lo hirió con ella en el vientre, y sus entrañas se derramaron a tierra; no lo hirió otra vez, y murió. Entonces Joab y Abisai, su hermano, persiguieron a Seba hijo de Bicri.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “estaba en guardia”. El hebreo expresa la idea de no estar prevenido o vigilante ante el arma de Joab.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִשְׁמַר
  english_pob_choice: was not on guard
  chosen_spanish: no estaba alerta
  alternatives_spanish:
  - no estaba en guardia
  - no se cuidó
  - no estaba vigilante
  lexicon: HALOT
  rationale: El nifal comunica falta de vigilancia o estar prevenido; en español, “no estaba alerta” expresa bien la idea sin volverlo demasiado técnico o forzado.
- source_word: חֶרֶב
  english_pob_choice: sword
  chosen_spanish: espada
  alternatives_spanish:
  - sable
  - hoja
  lexicon: HALOT
  rationale: El sentido básico es el de un arma cortante de combate; “espada” es el equivalente natural y claro en español bíblico actual.
- source_word: בְּיַד יוֹאָב
  english_pob_choice: in Joab’s hand
  chosen_spanish: en la mano de Joab
  alternatives_spanish:
  - en poder de Joab
  - sujeta por Joab
  lexicon: HALOT
  rationale: 'La imagen es concreta y espacial: el arma estaba físicamente en su mano. Mantener la construcción ayuda a conservar la escena narrativa.'
- source_word: וַיַּכֵּהוּ בָהּ
  english_pob_choice: he struck him with it
  chosen_spanish: lo hirió con ella
  alternatives_spanish:
  - lo golpeó con ella
  - lo apuñaló con ella
  lexicon: HALOT
  rationale: נכה es amplio; aquí el contexto de espada y muerte permite “hirió” sin especificar más de lo que el hebreo exige. “Apuñaló” sería más interpretativo.
- source_word: אֶל הַחֹמֶשׁ
  english_pob_choice: in the belly
  chosen_spanish: en el vientre
  alternatives_spanish:
  - en el abdomen
  - en el quinto costado
  lexicon: HALOT
  rationale: Sigue la decisión del POB inglés de reflejar el sentido probable del término en este contexto narrativo. “Vientre” es natural, grave y suficientemente concreto en español.
- source_word: וַיִּשְׁפֹּךְ מֵעָיו אַרְצָה
  english_pob_choice: his entrails spilled out to the ground
  chosen_spanish: sus entrañas se derramaron a tierra
  alternatives_spanish:
  - sus entrañas cayeron al suelo
  - sus vísceras se derramaron al suelo
  lexicon: HALOT
  rationale: “Entrañas” conserva el registro intenso del hebreo y del inglés POB, y “a tierra” reproduce bien el movimiento hacia el suelo.
- source_word: וְלֹא שָׁנָה לֹו
  english_pob_choice: he did not strike him again
  chosen_spanish: no lo hirió otra vez
  alternatives_spanish:
  - no repitió el golpe
  - no le dio un segundo golpe
  lexicon: HALOT
  rationale: El idiomático hebreo implica que no repitió la acción mortal. “No lo hirió otra vez” mantiene la naturalidad y la conexión con “hirió” del versículo.
- source_word: וַיָּמֹת
  english_pob_choice: and he died
  chosen_spanish: y murió
  alternatives_spanish:
  - y falleció
  lexicon: HALOT
  rationale: La forma narrativa simple se traduce de manera directa y sobria.
- source_word: רָדַף אַחֲרֵי
  english_pob_choice: pursued
  chosen_spanish: persiguieron a
  alternatives_spanish:
  - fueron tras
  - dieron persecución a
  lexicon: HALOT
  rationale: El lenguaje militar/narrativo pide “persiguieron”; es conciso y conserva el valor de persecución tras el fugitivo.
- source_word: שֶׁבַע בֶּן בִּכְרִי
  english_pob_choice: Sheba son of Bichri
  chosen_spanish: Seba hijo de Bicri
  alternatives_spanish:
  - Seba, hijo de Bicri
  - Seba, hijo de Bichri
  lexicon: Project transliteration standard
  rationale: Se conserva la transliteración de nombres propios en español, adaptando la grafía al uso castellano/latinoamericano estándar.
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo (WLC) y el audit trail inglés del POB. Se mantuvo la decisión contextual sobre חֹמֶשׁ como “vientre” frente a la alternativa tradicional “quinto costado/cinco costillas”, y se preservó el tono narrativo directo sin añadir interpretaciones no presentes en el original.
  spanish_consistency_notes:
  - Se usa “Joab” y “Abisai” conforme a las formas españolas habituales de estos nombres bíblicos.
  - “Entrañas” conserva el nivel de intensidad del hebreo y armoniza con el registro del POB inglés.
  - No se empleó “SEÑOR” ni terminología teológica adicional porque el versículo no contiene referencias divinas explícitas.
