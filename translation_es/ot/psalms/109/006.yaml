translation:
  language: es
  text: Designa a un hombre malvado sobre él, y que un acusador[a] esté a su diestra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Satanás». El hebreo שָׂטָן puede significar «acusador», «adversario» o, en algunos contextos, el nombre propio Satanás.'
    reason: alternative_reading
lexical_decisions:
- source_word: הַפְקֵד
  english_pob_choice: Appoint
  chosen_spanish: Pon
  alternatives_spanish:
  - Designa
  - Nombra
  - Encarga
  lexicon: HALOT
  rationale: El imperativo hiphil de פקד expresa aquí la idea de poner o asignar a alguien en una función sobre otra persona. En español, «Pon» conserva el mandato directo y suena natural en una imprecación poética sin añadir un matiz administrativo demasiado específico.
- source_word: עָלָיו
  english_pob_choice: over him
  chosen_spanish: sobre él
  alternatives_spanish:
  - contra él
  lexicon: HALOT
  rationale: Con פקד, על indica a la persona sobre la cual queda colocado alguien. «Sobre él» preserva mejor la relación de superioridad/colocación que «contra él», aunque el contexto también es adversarial.
- source_word: רָשָׁע
  english_pob_choice: a wicked man
  chosen_spanish: un hombre malvado
  alternatives_spanish:
  - un malvado
  - un hombre impío
  lexicon: HALOT
  rationale: El sustantivo/adjetivo señala a una persona culpable o perversa. «Un hombre malvado» mantiene el referente personal explícito y es natural en español; «impío» introduciría un matiz religioso no requerido aquí.
- source_word: שָׂטָן
  english_pob_choice: an accuser
  chosen_spanish: un acusador
  alternatives_spanish:
  - un adversario
  - Satanás
  lexicon: HALOT
  rationale: 'En este contexto poético y judicial, שָׂטָן funciona como sustantivo común: alguien que acusa o se opone. «Acusador» conserva la imagen forense que da sentido a la frase sin imponer de entrada el nombre propio Satanás.'
- source_word: יַעֲמֹד
  english_pob_choice: let ... stand
  chosen_spanish: se ponga
  alternatives_spanish:
  - permanezca
  - esté
  lexicon: HALOT
  rationale: 'La forma imperfecta con valor yusivo comunica un deseo o imprecación: que esa figura tome su puesto. «Se ponga» transmite ese matiz de manera idiomática en español.'
- source_word: עַל יְמִינוֹ
  english_pob_choice: at his right hand
  chosen_spanish: a su diestra
  alternatives_spanish:
  - a su derecha
  - junto a su mano derecha
  lexicon: HALOT
  rationale: La expresión idiomática bíblica de la derecha se conserva mejor con «a su diestra», que es comprensible y mantiene resonancia bíblica. También puede entenderse como posición lateral de apoyo o de acusación en un escenario legal.
theological_decisions:
- issue: Si שָׂטָן debe leerse como nombre propio o como sustantivo común
  english_pob_reading: 'common noun: ''an accuser'''
  chosen_spanish_reading: 'sustantivo común: «un acusador»'
  alternative_spanish_readings:
  - Satanás
  - un adversario
  rationale: 'El hebreo no exige un nombre propio aquí, y el contexto inmediato es forense: se pide que alguien sea colocado en posición de acusación junto al malvado. Traducirlo como «un acusador» evita adelantar una lectura demonológica que el texto, por sí solo, no obliga a adoptar. La lectura tradicional se preserva en nota.'
  doctrine_reference: Primacía de la evidencia del texto fuente; preservación de la tensión interpretativa
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo masorético de WLC y el juicio de alta concordancia del control cruzado. Mantiene la tensión documentada en שָׂטָן sin resolverla por tradición, y adapta la idiomaticidad al español con una equivalencia óptima más que literal.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto solo cuando el hebreo contiene el nombre divino; aquí no aparece, por lo que no interviene.
  - «Un acusador» mantiene el valor forense de שָׂטָן y evita confundirlo automáticamente con el nombre propio Satanás.
  - «A su diestra» es una fórmula bíblica natural en español y preserva la imagen idiomática de la derecha.
