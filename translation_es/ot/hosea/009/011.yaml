    rationale: Si el texto principal se corrige a 'nacimiento' y 'vientre', la nota debe concordar exactamente con esa redacción y mantener la explicación de la tríada.
  revised_spanish_text: Efraín—su gloria volará como un ave[a]—desde el nacimiento, desde el vientre[b] y desde la concepción.
