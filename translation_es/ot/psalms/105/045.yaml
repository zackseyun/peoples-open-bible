  glossary_alignment: Buena alineación general con la terminología del proyecto. Se preserva 'Yah' para יָהּ, lo cual concuerda con la decisión teológica documentada de no confundir la forma abreviada con YHWH/Yahvé. 'Estatutos' y 'leyes' mantienen la distinción jurídica. No hay conflicto con los glosarios principales.
