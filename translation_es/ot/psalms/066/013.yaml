translation:
  language: es
  text: Entraré en tu casa con holocaustos[a]; cumpliré mis votos[a][b] a ti[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Vendré a tu casa».'
    reason: lexical_alternative
  - marker: b
    text: «Tu casa» probablemente se refiere al santuario o templo de Dios.
    reason: cultural_note
  - marker: c
    text: 'O: «pagaré mis votos a ti».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָב֣וֹא
  english_pob_choice: I will come
  chosen_spanish: Entraré
  alternatives_spanish:
  - Iré
  - vendré
  - entraré
  lexicon: HALOT
  rationale: El verbo בוא puede expresar venir o entrar según el contexto. Como el siguiente complemento es «en tu casa», en español «entraré» reproduce con naturalidad el movimiento hacia el interior que está presente en la línea, sin perder la intención futura.
- source_word: בֵיתְ/ךָ֣
  english_pob_choice: your house
  chosen_spanish: tu casa
  alternatives_spanish:
  - tu casa
  - tu templo
  - tu santuario
  lexicon: HALOT
  rationale: Se conserva el sustantivo concreto «casa», que es la forma hebrea directa. Aunque en el contexto salmódico apunta al ámbito del santuario, el texto no dice «templo»; esa precisión se deja implícita.
- source_word: בְ/עוֹל֑וֹת
  english_pob_choice: with burnt offerings
  chosen_spanish: con holocaustos
  alternatives_spanish:
  - con ofrendas quemadas
  - con sacrificios quemados
  - con holocaustos
  lexicon: HALOT
  rationale: עוֹלָה es el sacrificio quemado total. En español bíblico contemporáneo «holocaustos» transmite el término sacrificial tradicional y preciso; «ofrendas quemadas» sería más explicativo pero menos técnico.
- source_word: אֲשַׁלֵּ֖ם
  english_pob_choice: I will fulfill
  chosen_spanish: cumpliré
  alternatives_spanish:
  - pagaré
  - cumpliré
  - saldaré
  lexicon: HALOT
  rationale: En el lenguaje de votos, שלם en piel tiene la idea de pagar/cumplir lo prometido. «Cumpliré» expresa bien el sentido idiomático en español sin reducirlo a una transacción monetaria.
- source_word: לְ/ךָ֣
  english_pob_choice: to you
  chosen_spanish: contigo
  alternatives_spanish:
  - a ti
  - para ti
  - contigo
  lexicon: HALOT
  rationale: Aunque la preposición básica es «a/para ti», el español exige una relación más natural con el verbo «cumplir votos». «Contigo» conserva la dirección personal del acto y suena idiomático en la línea poética.
- source_word: נְדָרָֽ/י
  english_pob_choice: my vows
  chosen_spanish: mis votos
  alternatives_spanish:
  - mis votos
  - mis promesas
  - mis juramentos
  lexicon: HALOT
  rationale: נדר son votos u ofrendas prometidas. «Votos» es el equivalente bíblico usual en español y conserva la carga religiosa y obligacional del término.
theological_decisions:
- issue: Cómo reflejar el matiz de בֵיתְךָ sin forzar una interpretación técnica en el cuerpo del texto
  english_pob_reading: Retain 'your house' in the main text; the house likely refers to God's sanctuary or temple
  chosen_spanish_reading: Mantener «tu casa» en el texto principal
  alternative_spanish_readings:
  - tu templo
  - tu santuario
  rationale: La evidencia hebrea dice literalmente «tu casa». En el contexto del salmo, el lector puede inferir el templo/santuario por los holocaustos, pero la traducción no necesita estrechar el sentido más de lo que el hebreo exige.
  doctrine_reference: Primacía del texto original; equivalencia óptima
translation_notes:
  revision_awareness: El pasaje coincide con la línea auditada en inglés y no requiere revisión adicional; se ha preservado la tensión entre «casa» y la referencia implícita al santuario, así como entre «cumplir» y «pagar» los votos.
  spanish_consistency_notes:
  - Se mantiene «holocaustos» para עוֹלֹת, en continuidad con el valor sacrificial técnico.
  - Se evita «SEÑOR» y se traduce implícitamente el destinatario divino mediante el poseedor «tu».
  - «Votos» conserva la terminología bíblica estándar para נדרים y permite la alternativa explicativa «pagar».
