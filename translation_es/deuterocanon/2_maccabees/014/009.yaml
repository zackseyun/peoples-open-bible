translation:
  language: es
  text: Puesto que conoces cada una de estas cosas, oh rey, presta también atención al país y a nuestra nación[a], que está acosada, conforme a la bondad benévola[b] que tienes para con todos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «nuestro pueblo que está cercado» o «nuestra nación bajo presión». El participio griego puede sugerir estar rodeado, asediado o apremiado.'
    reason: lexical_alternative
  - marker: b
    text: La expresión traduce un término raro para una benevolencia que se muestra con facilidad o una disposición favorable hacia otros.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕκαστα ... τούτων
  english_pob_choice: each of these things
  chosen_spanish: cada una de estas cosas
  alternatives_spanish:
  - todas estas cosas
  - estas cosas una por una
  lexicon: LSJ
  rationale: ἕκαστα con el genitivo τούτων conserva un valor distributivo; «cada una de estas cosas» reproduce mejor esa individualidad que una formulación colectiva.
- source_word: ἐπεγνωκώς
  english_pob_choice: know
  chosen_spanish: conoces
  alternatives_spanish:
  - has comprendido
  - has reconocido plenamente
  lexicon: LSJ
  rationale: El participio perfecto indica conocimiento ya adquirido. En español, «conoces» comunica de manera natural ese saber previo sin sobrecargar la frase.
- source_word: προσνοήθητι
  english_pob_choice: take thought for
  chosen_spanish: presta también atención a
  alternatives_spanish:
  - ten consideración por
  - piensa también en
  - ocúpate también de
  lexicon: LSJ
  rationale: El imperativo pide una atención deliberada y favorable hacia la χώρα y el γένος. «Presta también atención a» conserva el matiz de consideración activa y refleja el vínculo con δέ.
- source_word: χώρας
  english_pob_choice: country
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la región
  lexicon: LSJ
  rationale: En este ruego político, χώρα designa el territorio o tierra en disputa. «La tierra» suena natural en español y mantiene la referencia territorial sin restringirla innecesariamente.
- source_word: τοῦ περιισταμένου γένους ἡμῶν
  english_pob_choice: our nation that is hard pressed
  chosen_spanish: nuestro pueblo, que está acosado
  alternatives_spanish:
  - nuestra nación, que está asediada
  - nuestro pueblo, que está rodeado
  - nuestra nación, que está bajo presión
  lexicon: LSJ
  rationale: περιιστάμενος aquí expresa ser cercado, hostigado o apremiado por la situación; «acosado» preserva ese sentido de presión externa. γένος se vierte como «pueblo» por naturalidad en español y por la carga colectiva del contexto.
- source_word: καθ᾽ ἣν ἔχεις ... φιλανθρωπίαν
  english_pob_choice: according to the gracious kindness you have
  chosen_spanish: conforme a la benevolencia amable que tienes
  alternatives_spanish:
  - según la bondad que tienes
  - de acuerdo con la benevolencia que muestras
  - conforme a tu bondad favorable
  lexicon: LSJ
  rationale: φιλανθρωπία denota benevolencia/humanidad/kindness; «benevolencia amable» conserva el tono positivo y personal. «Conforme a» refleja la idea de medida o norma implícita en καθ᾽ ἣν.
- source_word: εὐαπάντητον
  english_pob_choice: gracious
  chosen_spanish: amable
  alternatives_spanish:
  - accesible
  - favorable
  - pronta
  lexicon: LSJ
  rationale: El adjetivo es raro y modifica la disposición benevolente. «Amable» comunica una disposición favorable y de fácil acercamiento sin introducir una explicación excesiva en el cuerpo del texto.
- source_word: πρὸς ἅπαντας
  english_pob_choice: toward all
  chosen_spanish: para con todos
  alternatives_spanish:
  - hacia todos
  - con todos
  lexicon: LSJ
  rationale: La preposición πρὸς marca dirección relacional. «Para con todos» suena natural en registro bíblico-culto y mantiene el alcance universal del elogio.
theological_decisions:
- issue: Cómo verter γένος en un contexto de petición política y comunitaria
  english_pob_reading: our nation that is hard pressed
  chosen_spanish_reading: nuestro pueblo, que está acosado
  alternative_spanish_readings:
  - nuestra nación, que está asediada
  - nuestra raza, que está acosada
  rationale: El término puede referir a un grupo étnico o colectivo nacional. «Pueblo» evita una restricción etnográfica excesiva y conserva la referencia comunitaria del pasaje.
  doctrine_reference: Traducción contextual del lenguaje colectivo; no implica una tesis doctrinal específica.
- issue: Matiz de φιλανθρωπία como virtud regia y benevolencia universal
  english_pob_reading: the gracious kindness you have toward all
  chosen_spanish_reading: la benevolencia amable que tienes para con todos
  alternative_spanish_readings:
  - la bondad que tienes para con todos
  - la benevolencia favorable que tienes para con todos
  rationale: La expresión describe una disposición de benevolencia amplia, no una virtud abstracta aislada. «Benevolencia amable» intenta retener el carácter personal, disponible y universal del elogio.
  doctrine_reference: Ética bíblica y lenguaje de virtud; sin controversia doctrinal directa.
translation_notes:
  revision_awareness: 'Se siguió el ajuste de la última revisión inglesa: se reflejó δέ con «también» y se evitó una construcción demasiado literal para la idea de φιλανθρωπία, optando por un español más natural pero todavía auditable. Se mantuvo la tensión semántica de περιισταμένου mediante «acosado» y una nota alternativa.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera de este versículo porque no aparece ningún nombre divino explícito en el griego.
  - Se evitó «Cristo»/«Mesías» porque el texto no contiene Χριστός.
  - «Pueblo» se usó para γένος por claridad contextual; no se uniformó mecánicamente como «raza» o «nación».
  - Los dos marcadores de nota aparecen exactamente en las palabras o frases correspondientes del texto.
