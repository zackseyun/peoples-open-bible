theological_decisions:
- issue: Whether to make explicit the implied referent in ἐξ ἑνὸς
  chosen_reading: from one man
  alternative_readings:
  - from one
  - from one ancestor
  rationale: The SBLGNT text lacks 'blood,' so the translation must not import that reading. However, leaving the phrase as bare 'from one' in English can sound incomplete. 'From one man' makes the implied human referent explicit while preserving Paul's point about the unity of humanity under God's creative act.
  doctrine_reference: Translation philosophy §§1, 4
- issue: Rendering ἀνθρώπων in a gender-accurate but non-flattening way
  chosen_reading: mankind
  alternative_readings:
  - men
  - humanity
  rationale: The source term is grammatically masculine but representative of the human race. 'Mankind' preserves the anthropological force better than 'men' for many modern readers, while remaining more textually textured than a fully flattened abstract rendering.
  doctrine_reference: Translation philosophy §4
