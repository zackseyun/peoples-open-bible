base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/006/002.yaml
  text: Or do you not know that the saints will judge the world? And if the world is judged by you[b][a], are you unworthy of the smallest courts?
  footnotes:
  - marker: a
    text: 'Or ''among you'': the Greek phrase can be read more literally as ''if the world is judged among you,'' but the sense in context is that the saints participate in judging the world.'
