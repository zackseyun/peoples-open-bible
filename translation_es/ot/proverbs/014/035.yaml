    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «su ira es/será para/contra el que trae vergüenza». El hebreo no añade futuridad explícita.'
    reason: lexical_alternative
  revision_rationale: Se reemplazó «benevolencia» por «favor» para seguir la decisión léxica principal del POB y mejorar la naturalidad. Se cambió «esclavo» por «siervo» porque en este proverbio el contexto es de servicio cortesano competente, en línea con la justificación documentada del inglés; «siervo» mantiene dignidad bíblica sin introducir una noción innecesariamente jurídica de esclavitud. Se ajustó la nota b para reflejar con más precisión la relación implícita del hebreo.
