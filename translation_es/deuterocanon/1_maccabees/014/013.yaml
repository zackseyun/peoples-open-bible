  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del griego: ἐξέλιπεν πολεμῶν = ''cesó de combatir'', οἱ βασιλεῖς αὐτῶν = ''sus reyes'', συνετρίβησαν = derrota decisiva. Sin embargo, ''sobre la tierra'' suena forzado en español para ἐπὶ τῆς γῆς en este contexto histórico-militar; aunque la revisión inglesa se acercó a ''on the earth'', el propio expediente léxico reconoce ''in the land'' como mejor ajuste contextual. En español, ''en la tierra'' preserva mejor la literalidad de γῆ sin la rareza idiomática de ''sobre la tierra''.'
  spanish_quality_summary: La redacción es clara, pero 'cesó de combatir contra ellos sobre la tierra' resulta poco natural y algo rígida. 'En la tierra' mejora mucho la legibilidad sin perder fidelidad. El resto del versículo es digno, comprensible y apropiado para un registro bíblico moderno. La nota al pie está bien orientada, aunque conviene pulir su redacción para que suene más natural en español.
  glossary_alignment: No hay términos del glosario mayor en disputa en este versículo. 'Combatir', 'reyes' y 'aplastados' son aceptables. La principal cuestión es idiomática y contextual en la traducción de ἐπὶ τῆς γῆς.
  issues:
  - severity: medium
    issue: '''sobre la tierra'' es un calco poco natural en español en este contexto.'
    rationale: Aunque puede corresponder formalmente a ἐπὶ τῆς γῆς, en una narración histórico-militar española suena extraño. 'En la tierra' conserva la referencia amplia a γῆ mejor que 'sobre la tierra' y lee con más naturalidad.
  - severity: low
    issue: La nota al pie puede expresarse con mayor naturalidad.
    rationale: La formulación actual ('puede explicitarse como actividad bélica continua') es correcta, pero algo técnica. Una redacción más llana mantiene el valor lexical sin sonar pesada.
