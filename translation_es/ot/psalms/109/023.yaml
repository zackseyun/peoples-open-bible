    rationale: La alternativa importante preservada en el expediente inglés para este versículo no trata de נִנְעַרְתִּי sino de אַרְבֶּה. La explicación de la pasiva puede quedar en decisiones léxicas sin cargar el texto con una nota menos relevante.
