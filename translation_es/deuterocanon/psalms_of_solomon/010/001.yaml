    rationale: El signo de exclamación no está motivado por el griego y da un tono más exclamativo que sapiencial.
  - severity: medium
    issue: ‘por medio de un látigo’ suena menos natural y menos literario para μάστιγι
    rationale: Aunque ‘látigo’ no es erróneo, ‘con un azote’ encaja mejor en español bíblico moderno y preserva mejor la fuerza disciplinaria concreta sin sonar mecánico.
  - severity: low
    issue: ‘de un camino malo’ puede mejorarse a ‘de un mal camino’
    rationale: La segunda opción es más idiomática en español y mantiene igual sentido.
  - severity: medium
