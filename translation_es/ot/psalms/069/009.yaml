translation:
  language: es
  text: He llegado a ser un extraño para mis hermanos[a], y un forastero a los hijos de mi madre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fui un extraño» / «llegué a ser un extraño». El verbo hebreo puede expresar tanto pasado simple como ingreso a una nueva condición.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los hijos de mi madre», una forma poética de referirse a familiares cercanos, especialmente a los hermanos.'
    reason: cultural_note
lexical_decisions:
- source_word: מ֭וּזָר
  english_pob_choice: a stranger
  chosen_spanish: un extraño
  alternatives_spanish:
  - un extranjero
  - un forastero
  - un aislado
  lexicon: HALOT
  rationale: En este contexto poético, מוּזָר expresa ser tratado como ajeno o extraño dentro del propio círculo familiar. «Un extraño» conserva el sentido relacional concreto y suena natural en español sin suavizar la tensión del hebreo.
- source_word: הָיִיתִי
  english_pob_choice: I have become
  chosen_spanish: He llegado a ser
  alternatives_spanish:
  - Fui
  - Me he vuelto
  - Llegué a ser
  lexicon: HALOT
  rationale: El qatal de היה aquí describe un estado resultante adquirido en la lamentación. «He llegado a ser» comunica bien la entrada en esa condición, manteniendo el matiz aspectual que la nota inglesa preserva entre pasado simple e ingresivo.
- source_word: לְאֶחָי
  english_pob_choice: to my brothers
  chosen_spanish: para mis hermanos
  alternatives_spanish:
  - a mis hermanos
  - entre mis hermanos
  - con mis hermanos
  lexicon: HALOT
  rationale: 'El hebreo usa una relación dirigida a los hermanos. En español, «para mis hermanos» funciona aquí como equivalente idiomático del efecto relacional: el hablante se percibe como ajeno respecto de ellos. Se conserva el masculino plural explícito, conforme al valor del término fuente.'
- source_word: וְנָכְרִי
  english_pob_choice: and a foreigner
  chosen_spanish: y un forastero
  alternatives_spanish:
  - y un extranjero
  - y un ajeno
  - y un desconocido
  lexicon: HALOT
  rationale: נָכְרִי indica alguien de fuera, ajeno al grupo. «Forastero» mantiene la intensificación paralela con «extraño» y evita el matiz legal de «extranjero» en ciertos contextos españoles.
- source_word: לִבְנֵי אִמִּי
  english_pob_choice: to my mother's sons
  chosen_spanish: para los hijos de mi madre
  alternatives_spanish:
  - para los hijos de mi madre
  - para los hijos de mi madre
  - para mis hermanos maternos
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «los hijos de mi madre», una forma poética de hablar de los propios hermanos cercanos. Se conserva la imagen del original, como en el audit trail inglés, sin sustituirla por una paráfrasis más general.
theological_decisions:
- issue: Lenguaje de parentesco masculino en paralelo poético
  english_pob_reading: Retain 'brothers' and 'my mother's sons' in the main text
  chosen_spanish_reading: Conservar «mis hermanos» y «los hijos de mi madre» en el texto principal
  alternative_spanish_readings:
  - hermanos y hermanas
  - familia
  - parientes
  rationale: El verso usa paralelismo con términos de parentesco masculinos explícitos. La versión española respeta esa precisión de género y, a la vez, mantiene la segunda línea como imagen poética transparente, sin neutralizar el texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La revisión más reciente no cambió el contenido; el acuerdo de revisión fue alto y estable, sin objeciones textuales pendientes.
  spanish_consistency_notes:
  - Se conservó el paralelismo de dos miembros con vocabulario relacional cercano pero no idéntico.
  - Se evitó «SEÑOR» u այլ sustituciones teológicas porque el versículo no contiene el Nombre divino.
  - Se mantuvo el masculino plural explícito de «hermanos» según el hebreo y el audit trail inglés.
  - La nota sobre el valor aspectual de היה quedó reflejada con una alternativa verbal en la nota a.
