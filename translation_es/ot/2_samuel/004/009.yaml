    rationale: Aunque la transliteración no es incorrecta, «Recab» encaja mejor con la ortografía española y la legibilidad eclesial general sin afectar el significado.
  revised_spanish_text: 'Pero David respondió a Recab y a Baaná su hermano, los hijos de Rimón el beerotita, y les dijo: «Vive Yahvé[a], que ha redimido mi vida de toda angustia»,'
  revised_footnotes:
