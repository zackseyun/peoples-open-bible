translation:
  language: es
  text: Y de otros reyes y de islas de los mares[a] vinieron a él fuerzas mercenarias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tropas mercenarias». El griego dice literalmente «fuerzas contratadas por paga».
    reason: lexical_alternative
lexical_decisions:
- source_word: βασιλέων ἑτέρων
  english_pob_choice: other kings
  chosen_spanish: otros reyes
  alternatives_spanish:
  - otros gobernantes
  lexicon: LSJ
  rationale: βασιλεύς designa normalmente a «rey»; ἑτέρων señala que son distintos de su propio ámbito. «Otros reyes» conserva la referencia directa y la pluralidad del griego.
- source_word: νήσων θαλασσῶν
  english_pob_choice: islands of the seas
  chosen_spanish: islas del mar
  alternatives_spanish:
  - islas de los mares
  - islas del mar
  lexicon: LSJ
  rationale: La expresión es semítica/Septuagintal en tono. En español, «islas del mar» mantiene la imagen y la amplitud geográfica sin forzar una calca pesada.
- source_word: δυνάμεις
  english_pob_choice: troops / forces
  chosen_spanish: fuerzas
  alternatives_spanish:
  - tropas
  - ejércitos
  lexicon: LSJ
  rationale: En contexto militar, δυνάμεις puede referirse a fuerzas armadas. «Fuerzas» preserva el sentido amplio del término griego y encaja con el plural sin sobreespecificar el tamaño del contingente.
- source_word: μισθωταί
  english_pob_choice: mercenary forces
  chosen_spanish: mercenarias
  alternatives_spanish:
  - alquiladas
  - de paga
  lexicon: LSJ
  rationale: μισθωταί significa literalmente personas contratadas por paga. Dado el ajuste revisado en el inglés POB hacia «mercenary forces», «mercenarias» comunica con claridad el rasgo lexical de servicio por salario.
- source_word: ἦλθον πρὸς αὐτόν
  english_pob_choice: came to him
  chosen_spanish: vinieron a él
  alternatives_spanish:
  - llegaron a él
  - se acercaron a él
  lexicon: LSJ
  rationale: El griego expresa movimiento hacia él sin añadir finalidad. «Vinieron a él» conserva esa sobriedad y evita introducir «ayuda» o «unión» que el texto no dice.
translation_notes:
  revision_awareness: 'El inglés auditado pasó de «hired troops» a «mercenary forces» para hacer más directo y formal μισθωταί. La versión española sigue esa revisión con «fuerzas mercenarias», manteniendo además la relación sintáctica del griego: «fuerzas» como sustantivo principal y «mercenarias» como calificativo.'
  spanish_consistency_notes:
  - Se mantiene «otros reyes» para βασιλέων ἑτέρων, conforme al valor normal de βασιλεύς.
  - Se preserva la imagen geográfica de «islas del mar» por su color septuagintal.
  - No se usa «Cristo», «SEÑOR» ni otra terminología teológica ajena al versículo.
  - La nota textual/lexical ofrece la alternativa «tropas mercenarias» para reflejar la posibilidad inglesa de «mercenary forces» frente a una formulación más literal.
