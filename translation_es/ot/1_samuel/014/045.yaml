translation:
  language: es
  text: 'Pero el pueblo dijo a Saúl: «¿Morirá Jonatán, que ha obrado esta gran liberación[a] en Israel? ¡Lejos de eso! Tan cierto como que Yahvé vive, no caerá en tierra ni un solo cabello de su cabeza, porque ha obrado con Dios este día[b]». Así el pueblo rescató[c] a Jonatán, y no murió.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esta gran salvación» o «esta gran victoria». El hebreo יְשׁוּעָה puede denotar liberación, salvación o victoria según el contexto.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «porque con Dios ha obrado/actuado este día». La redacción conserva la idea de cooperación o concurrencia con Dios.'
    reason: lexical_alternative
  - marker: c
    text: O «redimió a Jonatán» o «liberó a Jonatán». El verbo expresa la idea de sacarlo de una obligación o sentencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲיוֹנָתָן יָמוּת
  english_pob_choice: Should Jonathan die
  chosen_spanish: ¿Morirá Jonatán?
  alternatives_spanish:
  - ¿Debe morir Jonatán?
  - ¿Ha de morir Jonatán?
  lexicon: HALOT
  rationale: La forma interrogativa hebrea expresa una protesta indignada; en español, una pregunta directa con futuro conserva bien esa fuerza retórica sin volverla demasiado rígida.
- source_word: הַיְשׁוּעָה הַגְּדוֹלָה הַזֹּאת
  english_pob_choice: this great deliverance
  chosen_spanish: esta gran liberación
  alternatives_spanish:
  - esta gran salvación
  - esta gran victoria
  lexicon: HALOT
  rationale: יְשׁוּעָה puede ser liberación, salvación o victoria. En este contexto bélico y de rescate, «liberación» conserva el valor de rescate con una resonancia más amplia que «victoria».
- source_word: חָלִילָה
  english_pob_choice: Far from it
  chosen_spanish: ¡Lejos de eso!
  alternatives_spanish:
  - ¡De ninguna manera!
  - ¡Jamás!
  - ¡Que no sea así!
  lexicon: HALOT
  rationale: La expresión hebrea es una fuerte repulsa. «¡Lejos de eso!» es idiomático en español y preserva el rechazo enfático sin añadir elementos ajenos al texto.
- source_word: חַי יְהוָה
  english_pob_choice: As Yahweh lives
  chosen_spanish: ¡Vive Yahvé!
  alternatives_spanish:
  - ¡Yahvé vive!
  - ¡Por la vida de Yahvé!
  lexicon: HALOT
  rationale: Se conserva el nombre divino Yahvé conforme al criterio del proyecto. En español, la exclamación «¡Vive Yahvé!» reproduce con naturalidad la fórmula juratoria.
- source_word: אִם יִפֹּל מִשַּׂעֲרַת רֹאשׁוֹ אַרְצָה
  english_pob_choice: not one hair of his head shall fall to the ground
  chosen_spanish: no caerá en tierra ni un solo cabello de su cabeza
  alternatives_spanish:
  - no caerá al suelo ni un cabello de su cabeza
  - ni un cabello de su cabeza caerá a tierra
  lexicon: HALOT
  rationale: El hebreo usa una imagen idiomática de protección total. La formulación española mantiene el valor figurado y la negación enfática, con un orden natural en español.
- source_word: כִּי עִם אֱלֹהִים עָשָׂה
  english_pob_choice: for he has worked with God
  chosen_spanish: porque ha obrado con Dios
  alternatives_spanish:
  - porque ha actuado con Dios
  - porque ha obrado con la ayuda de Dios
  lexicon: HALOT
  rationale: Se conserva la preposición «con» para no disolver la tensión teológica del hebreo. «Obrado» traduce bien עשה en este contexto de acción decisiva.
- source_word: וַיִּפְדּוּ הָעָם אֶת יוֹנָתָן
  english_pob_choice: So the people redeemed Jonathan
  chosen_spanish: Así el pueblo rescató a Jonatán
  alternatives_spanish:
  - Así el pueblo redimió a Jonatán
  - Así el pueblo liberó a Jonatán
  lexicon: HALOT
  rationale: פדה puede expresar redimir, rescatar o liberar. «Rescató» comunica con claridad que el pueblo lo sacó de la sentencia de muerte, sin cargar el término con un matiz económico que aquí no es explícito.
- source_word: וְלֹא מֵת
  english_pob_choice: and he did not die
  chosen_spanish: y no murió
  alternatives_spanish:
  - y no fue muerto
  - y no llegó a morir
  lexicon: HALOT
  rationale: La cláusula final es simple y directa; «y no murió» suena natural en español y mantiene la conclusión del versículo.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. El criterio del proyecto exige «Yahvé» en el texto principal para preservar el nombre del pacto y evitar el ocultamiento convencional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de עִם אֱלֹהִים en la acción de Jonatán
  english_pob_reading: he has worked with God
  chosen_spanish_reading: ha obrado con Dios
  alternative_spanish_readings:
  - ha obrado con la ayuda de Dios
  - ha actuado con Dios
  rationale: Se conserva «con» para reflejar la relación de acompañamiento o concurrencia expresada por el hebreo, sin resolverla en una explicación más explícita de agencia divina que el texto no da.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés: se mantiene la forma relativa «que ha obrado» para el sujeto implícito del rescate/liberación, y se refleja la preferencia revisada por «redeemed» con un español de sentido de rescate/liberación más natural que una traducción mecánica.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en lugar de «SEÑOR» para el Tetragrámaton, conforme al estándar del proyecto.
  - «Dios» se conserva para אֱלֹהִים; no se suaviza a «la divinidad» ni se pluraliza.
  - «rescató» se emplea para פדה en un contexto de liberación de sentencia, manteniendo el matiz de intervención efectiva.
  - La puntuación y el tono buscan un registro bíblico sobrio, pero con español contemporáneo y natural.
