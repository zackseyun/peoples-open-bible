translation:
  language: es
  text: para apartar al hombre de su acción,[a] y para ocultar la soberbia del hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «quitar la acción de un hombre, y él oculta la soberbia de un hombre». El hebreo es muy comprimido, y la línea puede entenderse como apartar a un hombre de su acción o como quitarle la acción misma.'
    reason: alternative_reading
lexical_decisions:
- source_word: לְהָסִיר
  english_pob_choice: to turn ... from
  chosen_spanish: apartar ... de
  alternatives_spanish:
  - quitar
  - desviar
  lexicon: HALOT
  rationale: El infinitivo causativo expresa hacer que alguien se aleje de algo. «Apartar ... de» comunica bien esa fuerza idiomática en español sin volverlo demasiado literal o duro.
- source_word: אָדָם
  english_pob_choice: a man
  chosen_spanish: el hombre / al hombre
  alternatives_spanish:
  - la persona
  - el ser humano
  lexicon: HALOT
  rationale: Aquí el sustantivo está en singular y aparece en paralelo con גֶּבֶר; «el hombre» mantiene ese paralelismo y suena natural en español bíblico.
- source_word: מַעֲשֶׂה
  english_pob_choice: his deed
  chosen_spanish: su hecho
  alternatives_spanish:
  - su obra
  - su acción
  - su conducta
  lexicon: HALOT
  rationale: El hebreo admite el sentido de acto/hecho/obra. «Hecho» conserva la referencia concreta a una acción realizada, sin añadir más de lo que el texto exige. El posesivo se entiende por el contexto, como en la lectura inglesa auditada.
- source_word: וְגֵוָה
  english_pob_choice: pride
  chosen_spanish: la soberbia
  alternatives_spanish:
  - el orgullo
  - la altivez
  - la arrogancia
  lexicon: HALOT
  rationale: El término apunta a elevación en sentido negativo. «Soberbia» expresa bien esa carga moral en español y preserva el matiz condenatorio.
- source_word: מִגֶּבֶר
  english_pob_choice: from a man
  chosen_spanish: al hombre
  alternatives_spanish:
  - del hombre
  - a un hombre
  lexicon: HALOT
  rationale: El hebreo tiene una construcción comprimida y el verbo final puede leerse como «ocultar ... a/de». En español, para evitar una fórmula opaca, se mantiene la referencia humana con «al hombre», dejando la relación exacta abierta por la nota textual.
- source_word: יְכַסֶּה
  english_pob_choice: to conceal
  chosen_spanish: ocultar
  alternatives_spanish:
  - cubrir
  - esconder
  lexicon: HALOT
  rationale: «Ocultar» transmite bien el verbo de cobertura/velamiento y funciona de forma más natural que «cubrir» en esta línea; mantiene la imagen concreta sin perder la posibilidad de una lectura más literal.
theological_decisions:
- issue: Construcción hebrea comprimida y posible doble lectura del segundo hemistiquio
  english_pob_reading: God's purpose is to turn a man away from wrongful action and to suppress/remove pride from him.
  chosen_spanish_reading: El propósito es apartar al hombre de su hecho y ocultar la soberbia al hombre.
  alternative_spanish_readings:
  - apartar al hombre de su obra y ocultar la soberbia de un hombre
  - quitar al hombre su hecho y ocultar de un hombre la soberbia
  rationale: El contexto de Job 33:14–18 presenta la advertencia divina como medio de frenar el pecado y la soberbia. Sin embargo, el hebreo es tan comprimido que también puede leerse de manera más literal, con un objeto directo menos explícito. La traducción mantiene la tensión y la ambigüedad razonable en vez de resolverla por completo.
  doctrine_reference: 'Translation philosophy #3, preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo y el audit trail inglés, pero ajusta el segundo hemistiquio para que el español sea publicable y no mecánico. Se conservó la tensión textual señalada por la nota inglesa, especialmente en la frase comprimida de לְהָסִיר אָדָם מַעֲשֶׂה y en la relación de יְכַסֶּה con el objeto final.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda en este registro; aquí no aparece el nombre divino explícito.
  - Se prefirió «soberbia» para וְגֵוָה por su valor moral negativo en español bíblico contemporáneo.
  - Se evitó «siervo» o «Cristo», ya que no intervienen en este versículo.
  - La nota [a] marca la alternativa literal sin duplicar el comentario dentro del texto principal.
