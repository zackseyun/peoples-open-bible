base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/032/004.yaml
  text: So many people gathered together[a], and they stopped up all the springs and the stream that flowed through the land, saying[b], “Why should the kings of Assyria come and find abundant water?”
  footnotes:
