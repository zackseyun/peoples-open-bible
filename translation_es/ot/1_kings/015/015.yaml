    issue: '''cosas santas'' es una opción demasiado literal y poco natural en español para objetos dedicados'
    rationale: Aunque reproduce de cerca el inglés auditado, en español eclesial y general 'cosas santas' suele sonar forzado o ambiguo. El hebreo se refiere a bienes apartados/consagrados, no a santidad abstracta. 'Cosas consagradas' preserva el sentido cultual con mejor idiomaticidad.
  - severity: low
    issue: La nota al pie puede mantenerse, pero conviene armonizar el texto principal con un término más claro
    rationale: La nota ya documenta adecuadamente la alternativa 'había dedicado'. Con 'consagradas' en el texto principal, la relación entre texto y nota sigue siendo fiel y más comprensible para el lector.
  revised_spanish_text: Y llevó a la casa de Yahvé las cosas consagradas de su padre y sus propias cosas consagradas[a], plata, oro y utensilios.
