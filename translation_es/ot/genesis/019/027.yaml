translation:
  language: es
  text: Abraham se levantó temprano por la mañana y fue al lugar donde había estado de pie delante de Yahvé[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «ante el rostro de Yahvé», un idiomatismo que significa «delante de Yahvé» o «en la presencia de Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכֵּם
  english_pob_choice: rose early
  chosen_spanish: se levantó temprano
  alternatives_spanish:
  - se levantó de madrugada
  - se levantó muy temprano
  lexicon: HALOT
  rationale: El verbo hebreo expresa levantarse temprano; en español, 'se levantó temprano' comunica bien la idea sin añadir un matiz excesivamente interpretativo. 'De madrugada' sería posible, pero más marcado que el hebreo por sí solo.
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - a la mañana
  lexicon: HALOT
  rationale: La frase temporal conserva el valor explícito de la mañana. 'Por la mañana' suena natural en español y mantiene el énfasis temporal del hebreo junto con 'temprano'.
- source_word: אֶל הַמָּקוֹם
  english_pob_choice: to the place
  chosen_spanish: al lugar
  alternatives_spanish:
  - a la lugar
  - al sitio
  lexicon: HALOT
  rationale: מָקוֹם es 'lugar'; 'al lugar' es la forma más directa y natural en español. 'Sitio' sería aceptable, pero menos neutro en registro bíblico.
- source_word: אֲשֶׁר עָמַד שָׁם
  english_pob_choice: where he had stood
  chosen_spanish: donde había estado
  alternatives_spanish:
  - donde había permanecido
  - donde estuvo
  lexicon: HALOT
  rationale: El relativo mira hacia una acción previa. 'Había estado' mantiene el sentido retrospectivo sin forzar una postura física demasiado literal; en español cubre bien la idea de presencia en el lugar.
- source_word: אֶת־פְּנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en la presencia de
  - ante
  lexicon: HALOT
  rationale: 'La expresión hebrea es idiomática: ''estar delante de'' alguien equivale a estar en su presencia. ''Delante de'' es claro y conserva la imagen espacial sin el calco incómodo ''antes de''. '
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio del texto hebreo como 'Yahvé', conforme al criterio del proyecto para יְהוָה. 'Jehová' y 'el SEÑOR' se evitan por no reflejar con la misma transparencia el nombre revelado.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El versículo usa directamente el Tetragrámaton. En español, 'Yahvé' preserva el nombre propio divino y evita sustituirlo por un título, en consonancia con la política del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Idiomatic force of אֶת־פְּנֵי יְהוָה
  english_pob_reading: before Yahweh[a]
  chosen_spanish_reading: delante de Yahvé[a]
  alternative_spanish_readings:
  - en la presencia de Yahvé
  - ante Yahvé
  rationale: La construcción hebrea significa estar en la presencia de Yahvé. 'Delante de' conserva la imagen idiomática y, con la nota, evita perder la tensión entre literalidad e idiomatismo.
  doctrine_reference: 'Lexical idiom: עמד + אֶת־פְּנֵי = estar delante de / en la presencia de'
translation_notes:
  revision_awareness: El borrador sigue el sentido del texto hebreo y la decisión auditada del POB en inglés. Se ajustó la sintaxis para que el español suene natural sin perder el paralelismo narrativo ni la referencia idiomática a la presencia divina.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - '''Delante de'' preserva el idiomatismo hebreo, y la nota explica la alternativa semántica sin ocultar la imagen original.'
  - '''Se levantó temprano por la mañana'' mantiene los dos marcadores temporales del hebreo (levantarse temprano + mañana).'
