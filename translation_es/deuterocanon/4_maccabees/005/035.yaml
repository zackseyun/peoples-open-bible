translation:
  language: es
  text: Ni te avergonzaré, oh razón filosófica[a], ni renegaré de ti[b], sacerdocio honrado y conocimiento de la ley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «razón filosófica» o «razón filosofante». El vocativo griego φιλόσοφε λόγε es compacto y algo estilizado.
    reason: lexical_alternative
  - marker: b
    text: O «sacerdocio estimado y pericia en la ley».
    reason: lexical_alternative
lexical_decisions:
- source_word: καταισχυνῶ
  english_pob_choice: will disgrace
  chosen_spanish: avergonzaré
  alternatives_spanish:
  - deshonraré
  - avergonzaré
  lexicon: BDAG
  rationale: El futuro activo expresa aquí causar vergüenza o deshonra. En español, «avergonzar» comunica bien el campo de honor/vergüenza sin sonar forzado; «deshonrar» también sería posible, pero «avergonzar» conserva mejor el paralelismo directo con el griego.
- source_word: φιλόσοφε λόγε
  english_pob_choice: philosophical reason
  chosen_spanish: filosofía
  alternatives_spanish:
  - razón filosófica
  - filosofía filosófica
  lexicon: LSJ
  rationale: El vocativo griego es compacto y personificado. En español, «oh filosofía» mantiene la apelación directa y evita una perífrasis rígida. Se preserva la tensión entre λόγος y φιλόσοφος sin imponer una formulación excesivamente interpretativa.
- source_word: ἑξαρνήσομαί
  english_pob_choice: will renounce
  chosen_spanish: renunciaré
  alternatives_spanish:
  - negaré
  - repudiaré
  - renunciaré
  lexicon: BDAG
  rationale: El verbo sugiere una renuncia fuerte, no mera negación. «Renunciar» reproduce bien la idea de abandonar o repudiar una lealtad o compromiso en español actual.
- source_word: ἱεροσύνη
  english_pob_choice: priesthood
  chosen_spanish: sacerdocio
  alternatives_spanish:
  - sacerdocio
  - oficio sacerdotal
  lexicon: LSJ
  rationale: «Sacerdocio» es la equivalencia natural y fiel para ἱεροσύνη. «Oficio sacerdotal» sería más explicativo, pero menos directo.
- source_word: τιμία
  english_pob_choice: honored
  chosen_spanish: honrado
  alternatives_spanish:
  - honrado
  - estimado
  - preciado
  lexicon: LSJ
  rationale: El adjetivo expresa valor y honra. «Honrado» conserva la dignidad del vocativo y resulta natural en español bíblico sin caer en arcaísmo excesivo.
- source_word: νομοθεσίας ἐπιστήμη
  english_pob_choice: knowledge of the law
  chosen_spanish: conocimiento de la ley
  alternatives_spanish:
  - conocimiento de la ley
  - experticia en la ley
  - entendimiento de la ley
  lexicon: LSJ
  rationale: En contexto judío, νομοθεσία remite a la ley dada, y ἐπιστήμη a conocimiento/expertise. «Conocimiento de la ley» comunica bien la relación sin sobrecargar el texto con tecnicismos.
theological_decisions:
- issue: Vocativos personificados y su carga teológica/cultural
  english_pob_reading: The verse addresses abstract yet covenantally charged realities—philosophic reason, priesthood, and knowledge of the law—as ideals the speaker refuses to betray.
  chosen_spanish_reading: 'El versículo habla directamente a realidades personificadas y cargadas de sentido: la filosofía, el sacerdocio y el conocimiento de la ley, como ideales que el hablante no quiere avergonzar ni abandonar.'
  alternative_spanish_readings:
  - Tomar «oh filosofía» como simple abstracción sin personificación.
  - Expandir el texto hacia una paráfrasis de fidelidad a la tradición judía.
  rationale: El griego usa segunda persona en vocativo. La traducción conserva esa personificación y no diluye la fuerza retórica ni la relación entre razón filosófica, sacerdocio y ley.
  doctrine_reference: Mantener la tensión retórica y teológica del original; primacía del texto fuente sobre la tradición interpretativa.
translation_notes:
  revision_awareness: El inglés POB pasó de «reasoned philosophy» a «philosophical reason» para reflejar mejor φιλόσοφε λόγε como vocativo directo. La versión española sigue esa línea, pero opta por una formulación más natural en español manteniendo la personificación y el paralelo honor/renuncia.
  spanish_consistency_notes:
  - Se emplea «ley» para νομοθεσίας siguiendo el sentido judío del contexto, sin ampliar innecesariamente a «legislación».
  - 'Se mantiene el paralelismo entre los dos futuros negativos: «No te avergonzaré... ni te renunciaré».'
  - «Sacerdocio» conserva el término técnico básico y evita sustituirlo por una paráfrasis eclesial posterior.
