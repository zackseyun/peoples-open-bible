revisions:
- from: Guardarás lo que haya salido de tus labios y lo cumplirás, conforme a lo que hayas prometido a Yahvé tu Dios como ofrenda voluntaria, lo que hablaste con tu boca.
  to: Guardarás lo que salió de tus labios[a] y lo cumplirás, conforme a lo que votaste a Yahvé tu Dios como ofrenda voluntaria[b], lo que hablaste con tu boca.
  rationale: La revisión corrige el matiz de voto explícito en נָדַרְתָּ mediante 'votaste', mejora la naturalidad de la primera cláusula al quitar el perfecto de subjuntivo, y preserva las alternativas léxicas documentadas en el inglés POB con notas españolas claras.
