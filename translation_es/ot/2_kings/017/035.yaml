translation:
  language: es
  text: 'Yahvé hizo un pacto con ellos y les mandó, diciendo: «No temerán a otros dioses, ni se postrarán ante ellos, ni les servirán, ni les ofrecerán sacrificios a ellos».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּכְרֹת / כרת ברית
  english_pob_choice: made a covenant
  chosen_spanish: hizo un pacto
  alternatives_spanish:
  - concertó un pacto
  - cortó un pacto
  lexicon: HALOT
  rationale: La expresión hebrea כרת ברית es una fórmula idiomática de alianza. En español, «hizo un pacto» comunica de manera natural y fiel la acción de establecer una alianza; «cortó un pacto» sería más literal pero poco natural. «Pacto» conserva bien la fuerza jurídica y relacional del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrama con la forma POB «Yahvé», en vez de sustituirlo por un título. «Yahvé» es claro, reverente y coherente con el proyecto.
- source_word: אִתָּם
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - con ellas
  - junto con ellos
  lexicon: HALOT
  rationale: Preposición y pronombre directos; «con ellos» es la equivalencia natural y precisa en español.
- source_word: בְּרִית
  english_pob_choice: a covenant
  chosen_spanish: un pacto
  alternatives_spanish:
  - una alianza
  - un convenio
  lexicon: HALOT
  rationale: «Pacto» es el término más transparente y ampliamente entendido para בְּרִית en español bíblico contemporáneo. «Alianza» también es posible, pero en este contexto «pacto» mantiene mejor la formulación solemne sin sonar demasiado eclesiástico.
- source_word: וַיְצַוֵּם
  english_pob_choice: commanded them
  chosen_spanish: les mandó
  alternatives_spanish:
  - les ordenó
  - les dio este mandamiento
  lexicon: HALOT
  rationale: צוה expresa mandato directo. «Les mandó» reproduce bien la brevedad y la fuerza del verbo; «ordenó» sería válido, pero algo más administrativo, y «les dio este mandamiento» añade más material del que exige el hebreo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - 'así:'
  lexicon: HALOT
  rationale: Introducción estándar del discurso directo. «Diciendo» es formal y transparente; en español, además, permite introducir la cita con naturalidad.
- source_word: לֹא תִירְאוּ
  english_pob_choice: You shall not fear
  chosen_spanish: No temerán
  alternatives_spanish:
  - No tendrán temor de
  - No temerán a
  lexicon: HALOT
  rationale: La prohibición hebrea en forma imperfecta con לֹא se refleja con una prohibición solemne en español. «No temerán» conserva el tono legal-covenantal del texto. Se mantiene «temer» y no «adorar» porque el versículo distingue este verbo de los actos de culto posteriores.
- source_word: אֱלֹהִים אֲחֵרִים
  english_pob_choice: other gods
  chosen_spanish: a otros dioses
  alternatives_spanish:
  - dioses ajenos
  - otros dioses
  lexicon: HALOT
  rationale: «Otros dioses» es la equivalencia estándar y precisa para אֱלֹהִים אֲחֵרִים. Se añade la preposición «a» por régimen español con «temer».
- source_word: תִשְׁתַּחֲוּוּ
  english_pob_choice: bow down
  chosen_spanish: se postrarán
  alternatives_spanish:
  - se inclinarán
  - adorarán
  lexicon: HALOT
  rationale: El verbo expresa el gesto físico de postración. «Se postrarán» conserva ese valor concreto mejor que «adorarán», que podría confundirlo con el verbo siguiente de servicio. Se opta por una forma natural en español con el sentido reflexivo de la acción.
- source_word: לָהֶם
  english_pob_choice: to them
  chosen_spanish: ante ellos
  alternatives_spanish:
  - delante de ellos
  - a ellos
  lexicon: HALOT
  rationale: Con «postrarse» en español, la relación de dirección se expresa mejor con «ante ellos»; comunica la escena de humillación/prostración sin forzar una construcción poco idiomática.
- source_word: תַעַבְדֻם
  english_pob_choice: serve them
  chosen_spanish: les servirán
  alternatives_spanish:
  - los servirán
  - les rendirán servicio
  lexicon: HALOT
  rationale: עבד en este contexto cultual puede significar servir o rendir culto. Se conserva «servir» para mantener la distinción con los otros verbos del versículo, tal como hace el texto hebreo.
- source_word: תִזְבְּחוּ לָהֶם
  english_pob_choice: sacrifice to them
  chosen_spanish: les ofrecerán sacrificios
  alternatives_spanish:
  - sacrificarán a ellos
  - harán sacrificios para ellos
  lexicon: HALOT
  rationale: זבח denota sacrificio ritual. «Ofrecerán sacrificios» es una manera natural y precisa en español; se usa «les» por el régimen con el destinatario del sacrificio.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa explícitamente el Tetragrama. La forma «Yahvé» preserva el nombre personal de Dios sin sustituirlo por un título, siguiendo la política textual POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fuerza de las prohibiciones en lenguaje de pacto
  english_pob_reading: You shall not ...
  chosen_spanish_reading: No temerán ... / no se postrarán ... / no les servirán ... / no les ofrecerán sacrificios
  alternative_spanish_readings:
  - No teman ...
  - No deberán ...
  rationale: El hebreo formula prohibiciones dentro de un contexto de mandato de pacto. En español, el futuro con negación transmite bien la solemnidad y la fuerza normativa sin convertirlo en una paráfrasis libre.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source sense and theological weight'
translation_notes:
  revision_awareness: El cotejo más reciente indica que el texto hebreo y la traducción inglesa POB están en alto acuerdo, sin revisiones aplicadas; por tanto, el español se alinea directamente con la lectura establecida y conserva la estructura prohibitiva y el léxico cultual del versículo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrama.
  - Se usa «pacto» para בְּרִית y no se reemplaza por un término eclesiástico más técnico.
  - Se conserva la distinción entre «temer», «postrarse», «servir» y «ofrecer sacrificios», evitando colapsar los verbos cultuales en un solo concepto.
  - La puntuación de la cita sigue el español moderno con comillas angulares no requeridas; se emplean comillas latinas por claridad editorial.
