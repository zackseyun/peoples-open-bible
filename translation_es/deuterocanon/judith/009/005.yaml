  yaml_path: translation/deuterocanon/judith/009/005.yaml
  text: For you made the former things and those that followed[a], and the present and the coming things you planned[b], and what you planned came to be.
  footnotes:
  - marker: a
    text: Or 'you considered' / 'you purposed' for 'you planned' (διενοήθης).
    reason: lexical_alternative
  - marker: b
    text: 'The Greek piles up temporal expressions: ''the things before,'' ''those,'' ''the things afterward,'' ''the things now,'' and ''the things to come,'' stressing God''s rule over all times.'
