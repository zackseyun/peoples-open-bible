revisions:
- from: 'Y le dijo a ella[a]: «Dame a tu hijo». Entonces lo tomó de su seno, lo subió al aposento alto[b] donde él estaba alojando, y lo acostó sobre su propia cama.'
  to: 'Y le dijo: «Dame a tu hijo». Entonces lo tomó de su seno, lo subió al aposento alto[a] donde se alojaba, y lo acostó sobre su propia cama.'
  rationale: Se corrige la expresión no idiomática «donde él estaba alojando» a «donde se alojaba», que refleja bien el valor contextual de יֹשֵׁב. También se elimina la nota [a] original por innecesaria y se simplifica «Y le dijo a ella» a «Y le dijo» para un español más natural sin pérdida de sentido. Se conserva «de su seno» por fidelidad al expediente inglés revisado hacia «bosom» y por su registro digno; se mantiene la nota sobre «aposento alto».
