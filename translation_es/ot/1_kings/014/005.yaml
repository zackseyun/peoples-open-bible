  - severity: medium
    issue: '''a consultar una palabra de parte tuya'' es una formulación poco natural y algo sobreinterpretada.'
    rationale: El hebreo expresa que viene a inquirir/consultar contigo acerca de su hijo. 'Una palabra de parte tuya' introduce una construcción extraña en español y desplaza el foco de la consulta al objeto 'palabra' de manera menos clara que el original.
  - severity: medium
    issue: '''le hablarás'' es menos preciso que ''le dirás'' en una instrucción de mensaje específico.'
    rationale: Con 'así y así' el contexto apunta más directamente a el contenido de lo que Ahías debe decirle, no solo al hecho general de hablarle.
