  text: בִּ/תְחִלַּ֨ת תַּחֲנוּנֶ֜י/ךָ יָצָ֣א דָבָ֗ר וַ/אֲנִי֙ בָּ֣אתִי לְ/הַגִּ֔יד כִּ֥י חֲמוּד֖וֹת אָ֑תָּה וּ/בִין֙ בַּ/דָּבָ֔ר וְ/הָבֵ֖ן בַּ/מַּרְאֶֽה׃
base_translation:
  language: en
  yaml_path: translation/ot/daniel/009/023.yaml
  text: At the beginning of your pleas[a], a word went out, and I have come to tell you, because you are greatly beloved[b]. Therefore consider the word and understand the vision.
  footnotes:
  - marker: a
    text: Or 'a message went out.' Hebrew 'a word went out' can refer to a spoken message or an issued command.
    reason: lexical_alternative
  - marker: b
    text: Or 'you are highly esteemed.' The Hebrew expression conveys that Daniel is especially precious or beloved.
    reason: lexical_alternative
