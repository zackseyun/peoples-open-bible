translation:
  language: es
  text: Y el límite de los cananeos fue desde Sidón, en dirección a Gerar, hasta Gaza; y en dirección a Sodoma, Gomorra, Admá y Zeboím, hasta Lasa[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “Lesa”.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... was
  chosen_spanish: y ... fue
  alternatives_spanish:
  - y ... era
  - y ... estuvo
  lexicon: HALOT
  rationale: La forma narrativa con וַיְהִי introduce una afirmación de estado o extensión territorial. En español, 'fue' conserva el valor copulativo y narrativo sin forzar una perífrasis demasiado literal.
- source_word: גְּבוּל
  english_pob_choice: border
  chosen_spanish: territorio
  alternatives_spanish:
  - límite
  - frontera
  lexicon: HALOT
  rationale: En una fórmula geográfica, גְּבוּל apunta al alcance territorial descrito por los puntos cardinales. 'Territorio' comunica bien el ámbito delimitado sin sonar artificial en español; 'límite' y 'frontera' quedan como alternativas posibles, pero menos fluidas aquí.
- source_word: הַכְּנַעֲנִי
  english_pob_choice: the Canaanites
  chosen_spanish: los cananeos
  alternatives_spanish:
  - el cananeo
  lexicon: HALOT
  rationale: Aunque el hebreo es morfológicamente singular gentilicio, el contexto colectivo es étnico. En español, el plural 'los cananeos' preserva ese valor colectivo y resulta más natural que un singular genérico.
- source_word: מִצִּידֹן
  english_pob_choice: from Sidon
  chosen_spanish: desde Sidón
  alternatives_spanish:
  - de Sidón
  lexicon: HALOT
  rationale: La preposición marca el punto de partida del recorrido del límite. 'Desde' expresa mejor el origen espacial en una descripción de frontera.
- source_word: בֹּאֲכָה
  english_pob_choice: as you go toward
  chosen_spanish: en dirección a
  alternatives_spanish:
  - hacia
  - al ir a
  - cuando vas hacia
  lexicon: HALOT
  rationale: La expresión idiomática de linderos indica orientación o trayectoria hacia un lugar. 'En dirección a' transmite esa función topográfica con claridad y naturalidad en español.
- source_word: גְרָרָה
  english_pob_choice: Gerar
  chosen_spanish: Gerar
  lexicon: HALOT
  rationale: Nombre propio conservado por transliteración estándar.
- source_word: עַד
  english_pob_choice: as far as
  chosen_spanish: hasta
  alternatives_spanish:
  - así como hasta
  - al punto de
  lexicon: HALOT
  rationale: En la fórmula de fronteras, 'hasta' expresa el término del recorrido o extensión de manera natural y exacta.
- source_word: עַזָּה
  english_pob_choice: Gaza
  chosen_spanish: Gaza
  lexicon: HALOT
  rationale: Topónimo estándar en español.
- source_word: סְדֹמָה וַעֲמֹרָה וְאַדְמָה וּצְבֹיִם
  english_pob_choice: Sodom and Gomorrah and Admah and Zeboiim
  chosen_spanish: Sodoma, Gomorra, Admá y Zeboím
  alternatives_spanish:
  - Sodoma y Gomorra, y Admá y Zeboím
  lexicon: HALOT
  rationale: Se conservan los nombres propios en sus formas españolas habituales. La puntuación lista la serie de topónimos con fluidez, sin añadir interpretación.
- source_word: לָשַׁע
  english_pob_choice: Lasha
  chosen_spanish: Lasa
  alternatives_spanish:
  - Lasha
  - Lesa
  lexicon: HALOT
  rationale: El hebreo apunta a un topónimo cuya vocalización puede reflejarse en español con 'Lasa' para mantener cercanía fonética y legibilidad. La alternativa inglesa documentada ('Lesha') se deja implícitamente atendida por la variación transliteratoria; 'Lasa' evita una secuencia gráfica poco natural en español.
translation_notes:
  revision_awareness: El texto inglés POB mantiene una traducción de frontera geográfica sobria y añadió una nota lexical para el topónimo final ('Lasha' / 'Lesha'). La versión española sigue el mismo principio, preservando la fórmula topográfica y reflejando la variante del nombre final de forma legible para español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' cuando aparezca el nombre divino en otros contextos, pero este versículo no lo contiene.
  - Se usa 'los cananeos' como colectivo étnico, coherente con el valor contextual del hebreo singular gentilicio.
  - La estructura de frontera se conserva con marcadores espaciales claros ('desde', 'en dirección a', 'hasta').
  - Los topónimos se presentan en formas españolas comunes, evitando calcos innecesarios.
