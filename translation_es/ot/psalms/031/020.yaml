revisions:
- from: ¡Cuán abundante es tu bondad[a], que has guardado para los que te temen, que has obrado para los que se refugian en ti, delante de los hijos de Adán.
  to: ¡Cuán abundante es tu bondad, que has guardado para los que te temen, que has obrado para los que se refugian en ti ante los hijos del hombre[a]!
  rationale: Se corrige la expresión antropológica para reflejar mejor בְּנֵי אָדָם sin introducir la figura de Adán, se mueve la nota al lugar donde el rastro inglés preserva la alternativa significativa, y se normaliza la puntuación española. También se ajusta «delante de» a «ante» por mayor naturalidad sin cambiar el sentido.
