  to: Hijo de hombre[a], te he puesto como atalaya para la casa de Israel; y oirás una palabra de mi boca y los advertirás de mi parte[b].
  rationale: Se corrige el principal problema paratextual reubicando la nota b al segmento pertinente y reformulándola para que funcione como nota real. También se ajusta «amonestarás de parte mía» a «advertirás de mi parte», que refleja mejor la función de advertencia del contexto y el valor de מִמֶּנִּי sin sobreinterpretar. El resto del versículo puede mantenerse.
