review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura del hebreo: segunda persona dirigida a Dios, resultado perfectivo (''has hecho''), y la secuencia de humillación pública ante pueblos cercanos. ''Oprobio'', ''burla'' y ''escarnio'' representan adecuadamente חֶרְפָּה, לַעַג y קֶלֶס, y ''los que nos rodean'' capta bien לִסְבִיבוֹתֵינוּ. Sin embargo, la preposición ''para'' en ''para nuestros vecinos'' y ''para los que nos rodean'' suena menos fiel y menos idiomática que ''ante'' o ''para con''; aquí el sentido es relacional/perceptivo (''a los ojos de'', ''ante''), no finalidad.'
  spanish_quality_summary: El español es claro y digno, pero 'para nuestros vecinos' resulta algo poco natural en este contexto bíblico y puede sugerir beneficio o finalidad. 'Ante nuestros vecinos' y 'ante los que nos rodean' mejora la naturalidad y refleja mejor la relación de vergüenza pública. El resto del verso es legible y mantiene un registro eclesial adecuado.
  glossary_alignment: No hay conflictos con la terminología por defecto del proyecto. Las elecciones 'oprobio', 'burla' y 'escarnio' son compatibles con las decisiones léxicas auditadas. La nota al pie sobre חֶרְפָּה es válida, aunque conviene mantenerla anclada solo donde aparece el término.
  issues:
  - severity: medium
    issue: Uso de 'para' con ל en dos sintagmas relacionales
    rationale: En este verso לִשְׁכֵנֵינוּ y לִסְבִיבוֹתֵינוּ expresan referencia/relación ('ante nuestros vecinos', 'ante los que nos rodean'), no propósito. 'Para' no es imposible, pero en español suena menos natural y menos preciso semánticamente.
  revised_spanish_text: Tú nos has hecho un oprobio[a] ante nuestros vecinos, una burla y escarnio ante los que nos rodean.
