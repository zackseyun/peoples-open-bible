translation:
  language: es
  text: No tuvo clemencia con[a][b] los príncipes de antaño, que se rebelaron en su fuerza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «los gigantes antiguos», identificando a los «príncipes de antaño» como rebeldes primordiales.'
    reason: alternative_reading
  - marker: b
    text: El hebreo transmitido es difícil en el tramo de עוֹלָם; el paralelo griego respalda el sentido de fuerza o poder.
    reason: textual_variant
lexical_decisions:
- source_word: לֹא נָשָׁא
  english_pob_choice: did not spare
  chosen_spanish: No perdonó
  alternatives_spanish:
  - No mostró favor a
  - No tuvo clemencia con
  - No perdonó ni dejó pasar
  lexicon: HALOT
  rationale: En este contexto, נָשָׁא con negación y objeto personal expresa la idea de no conceder indulgencia o perdón. En español, «No perdonó» conserva la fuerza judicial y resulta natural y digno.
- source_word: לֲנְסִיכֵי קֶדֶם
  english_pob_choice: the princes of old
  chosen_spanish: a los príncipes de antaño
  alternatives_spanish:
  - a los príncipes de antiguo
  - a los gobernantes de antaño
  - a los antiguos príncipes
  lexicon: HALOT
  rationale: Se sigue el hebreo conservado, que habla de נסיכים, «príncipes» o «gobernantes». «De antaño» transmite קדם de forma idiomática y mantiene el matiz temporal sin imponer la lectura griega en el texto principal.
- source_word: הַמּוֹרִים
  english_pob_choice: who revolted
  chosen_spanish: que se rebelaron
  alternatives_spanish:
  - que fueron rebeldes
  - los rebeldes
  - que se alzaron
  lexicon: HALOT
  rationale: La forma participial describe una acción característica de estos sujetos. «Se rebelaron» refleja bien la fuerza de מרה en español moderno y conserva el matiz de oposición activa.
- source_word: בִּגְבוּרָתָם / τῇ ἰσχύϊ αὐτῶν
  english_pob_choice: in their might
  chosen_spanish: en su poder
  alternatives_spanish:
  - en su fuerza
  - en su poderío
  - por su fuerza
  lexicon: HALOT
  rationale: El hebreo final es difícil y el paralelo griego apoya el sentido de fuerza/might. «En su poder» permite un español fluido y amplio, sin perder el sentido de capacidad o vigor con que se rebelaron.
theological_decisions:
- issue: Identificación del grupo juzgado
  english_pob_reading: The Hebrew says 'princes of old,' while the Greek identifies them as 'ancient giants' or primeval rebels.
  chosen_spanish_reading: El texto principal conserva «los príncipes de antaño» y deja abierta la identificación precisa del grupo.
  alternative_spanish_readings:
  - No perdonó a los gigantes antiguos, que se rebelaron en su poder.
  - No perdonó a los antiguos rebeldes, que se alzaron con su fuerza.
  rationale: Sirach aquí presenta una tensión textual real entre el hebreo y el griego. El español principal sigue el hebreo donde está conservado, sin borrar la aclaración interpretativa de la tradición griega; por eso se mantiene la frase hebrea y se documenta la alternativa griega en nota.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando existe; usar el griego paralelo como testimonio de traducción e interpretación; preservar tensiones textuales en vez de resolverlas artificialmente.'
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del audit trail al preferir una formulación formal y directa; aquí se ha adaptado esa decisión al español con «se rebelaron» y se ha conservado la tensión textual hebreo/griego en notas.
  spanish_consistency_notes:
  - Se mantiene «príncipes» para נסיכים, en lugar de sustituirlo por un término eclesiástico más tradicional.
  - Se usa «poder» para reflejar el campo semántico de fuerza/might del final del verso, en armonía con el paralelo griego.
  - Las notas distinguen entre la lectura hebrea principal y la identificación interpretativa griega sin fusionarlas en el texto base.
