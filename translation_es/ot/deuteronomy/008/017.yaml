translation:
  language: es
  text: 'y dirás en tu corazón: «Mi poder y la fuerza de mi mano me han producido esta riqueza[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esta prosperidad». El hebreo חַיִל puede referirse a riqueza, recursos, fuerza o capacidad según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ
  english_pob_choice: and you say
  chosen_spanish: y dirás
  alternatives_spanish:
  - y dices
  - entonces dirás
  lexicon: HALOT
  rationale: El hebreo con וְ + perfecto en este contexto exhortativo/advertido funciona como acción futura o contingente; en español, «dirás» conserva ese valor y suena natural en una advertencia dirigida al lector/oyente.
- source_word: בִּלְבָבֶךָ
  english_pob_choice: in your heart
  chosen_spanish: en tu corazón
  alternatives_spanish:
  - para ti mismo
  - dentro de tu corazón
  lexicon: HALOT
  rationale: La metáfora hebrea apunta al pensamiento interior o al auto-habla. «En tu corazón» conserva la imagen original y es idiomático en español bíblico actual.
- source_word: כֹּחִי
  english_pob_choice: my power
  chosen_spanish: mi poder
  alternatives_spanish:
  - mi fuerza
  - mi capacidad
  lexicon: HALOT
  rationale: כֹּחַ puede abarcar poder, fuerza o capacidad. «Mi poder» mantiene la correspondencia con el paralelo siguiente y refleja la autoatribución de capacidad personal.
- source_word: וְעֹצֶם יָדִי
  english_pob_choice: and the strength of my hand
  chosen_spanish: y la fuerza de mi mano
  alternatives_spanish:
  - y el vigor de mi mano
  - y la potencia de mi mano
  lexicon: HALOT
  rationale: עֹצֶם comunica fuerza o vigor; con «mi mano» preserva la imagen concreta del hebreo. «Fuerza de mi mano» reproduce bien el paralelismo sin volverlo abstracto.
- source_word: עָשָׂה לִי
  english_pob_choice: have gotten me
  chosen_spanish: me han conseguido
  alternatives_spanish:
  - me han producido
  - me han hecho obtener
  - me han adquirido
  lexicon: HALOT
  rationale: Aunque el verbo básico es «hacer», en este contexto con el objeto «esta riqueza» expresa haberla obtenido o logrado por propio esfuerzo. En español, «me han conseguido» mantiene el sentido de adquisición atribuida a sí mismo y concuerda con el sujeto compuesto.
- source_word: הַחַיִל
  english_pob_choice: this wealth
  chosen_spanish: esta riqueza
  alternatives_spanish:
  - esta prosperidad
  - este caudal
  - esta fortuna
  lexicon: HALOT
  rationale: חַיִל puede referirse a riqueza, recursos, fuerza o capacidad según el contexto. En Deuteronomio 8, la advertencia gira en torno a la prosperidad material, por lo que «riqueza» es la opción más ajustada y clara.
- source_word: הַזֶּה
  english_pob_choice: this
  chosen_spanish: esta
  alternatives_spanish:
  - este
  lexicon: HALOT
  rationale: 'El demostrativo concuerda en género con חַיִל, por lo que en español debe ser femenino: «esta».'
theological_decisions:
- issue: Sentido de חַיִל en un contexto de advertencia del pacto
  english_pob_reading: wealth
  chosen_spanish_reading: riqueza
  alternative_spanish_readings:
  - prosperidad
  - fuerza
  rationale: El pasaje advierte contra atribuir a la propia capacidad la abundancia recibida. «Riqueza» capta mejor el foco inmediato en bienes y prosperidad material, sin limitar el hebreo a fuerza militar.
  doctrine_reference: Deuteronomio 8:11-18; dependencia de Yahvé frente a la autosuficiencia
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del POB en lectura general y decisión léxica principal: mantener el valor de advertencia, traducir בִּלְבָבֶךָ de forma idiomática, y entender חַיִל aquí como riqueza/prosperidad material. No se registran cambios relevantes en la última pasada.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en la línea editorial general, aunque este versículo no lo contiene.
  - Se conserva el tono de advertencia directa con segunda persona singular.
  - «Riqueza» se eligió como equivalente principal, dejando «prosperidad» como alternativa anotada para no borrar la amplitud semántica de חַיִל.
