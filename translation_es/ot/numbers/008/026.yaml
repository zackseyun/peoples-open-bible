translation:
  language: es
  text: Pero él podrá ministrar con sus hermanos en la tienda de reunión, para guardar el encargo[a]; pero no hará servicio[b]. Así harás con los levitas en sus deberes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'para cumplir la responsabilidad asignada'. La expresión hebrea לִשְׁמֹר מִשְׁמֶרֶת designa el cumplimiento de una tarea o encargo confiado.
    reason: lexical_alternative
  - marker: b
    text: O 'pero no hará labor'. El hebreo contrasta el ministerio permitido con el trabajo regular del que el levita mayor queda exento.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשֵׁרֵת
  english_pob_choice: But he may minister
  chosen_spanish: Pero él podrá ministrar
  alternatives_spanish:
  - Y ministrará
  - Pero podrá servir
  lexicon: HALOT
  rationale: Se conserva el matiz de servicio cultual distinguible de la 'labor' prohibida después; 'ministrar' en español eclesial mantiene esa diferenciación mejor que un genérico 'servir'.
- source_word: אֶת אֶחָיו
  english_pob_choice: with his brothers
  chosen_spanish: con sus hermanos
  alternatives_spanish:
  - junto con sus hermanos
  - con sus compañeros levitas
  lexicon: HALOT
  rationale: La relación de asociación se expresa naturalmente con 'con'; se conserva 'hermanos' para reflejar el parentesco/colectivo levítico del hebreo.
- source_word: בְּאֹהֶל מוֹעֵד
  english_pob_choice: in the tent of meeting
  chosen_spanish: en la tienda de reunión
  alternatives_spanish:
  - en el tabernáculo de reunión
  - en la tienda del encuentro
  lexicon: HALOT
  rationale: '''Tienda de reunión'' es la equivalencia más directa y estable para אֹהֶל מוֹעֵד; ''tabernáculo'' sería más interpretativo y menos literal al sustantivo hebreo ''tienda''.'
- source_word: לִשְׁמֹר מִשְׁמֶרֶת
  english_pob_choice: to keep the charge
  chosen_spanish: para guardar la carga
  alternatives_spanish:
  - para guardar la obligación
  - para cumplir la responsabilidad asignada
  - para guardar la carga encomendada
  lexicon: HALOT
  rationale: Se conserva el juego semántico de 'guardar' + sustantivo de encargo/turno/responsabilidad. 'Carga' es una opción española menos habitual pero útil para reflejar que no se trata de 'cargo' eclesiástico sino de una responsabilidad asignada; se evita 'cargo' para no perder la relación verbal con 'guardar'.
- source_word: וַעֲבֹדָה לֹא יַעֲבֹד
  english_pob_choice: but he shall do no service
  chosen_spanish: pero no hará servicio
  alternatives_spanish:
  - pero no hará labor
  - pero no trabajará
  - pero no ejercerá servicio
  lexicon: HALOT
  rationale: Se mantiene la tensión léxica entre el servicio permitido ('ministrar') y el servicio/labor regular prohibido aquí. 'Servicio' reproduce de cerca עֲבֹדָה/יַעֲבֹד sin diluir el contraste.
- source_word: כָּכָה תַּעֲשֶׂה
  english_pob_choice: Thus you shall do
  chosen_spanish: Así harás
  alternatives_spanish:
  - De esta manera harás
  - Así harás tú
  lexicon: HALOT
  rationale: La fórmula exhortativa se vuelve natural en español. Se omite el sujeto explícito porque el verbo ya lo marca y la instrucción queda clara.
- source_word: לַלְוִיִּם
  english_pob_choice: for the Levites
  chosen_spanish: con los levitas
  alternatives_spanish:
  - para los levitas
  - a los levitas
  lexicon: HALOT
  rationale: En este contexto la instrucción se aplica dentro del grupo levítico; 'con' refleja mejor el marco de implementación que un simple dativo indirecto, aunque 'para' también sería posible.
- source_word: בְּמִשְׁמְרֹתָם
  english_pob_choice: in their duties
  chosen_spanish: en sus deberes
  alternatives_spanish:
  - en sus responsabilidades
  - en sus cargas
  - en sus turnos
  lexicon: HALOT
  rationale: '''Deberes'' comunica de forma clara y digna la idea de funciones asignadas. ''Turnos'' estrecharía demasiado el sentido; ''cargas'' resultaría menos idiomático al final del versículo.'
theological_decisions:
- issue: Distinción entre ministerio permitido y labor prohibida para el levita mayor
  english_pob_reading: The verse permits continued ministerial assistance/oversight while prohibiting the regular labor of tabernacle service.
  chosen_spanish_reading: El versículo permite seguir ministrando en apoyo de la comunidad levítica, pero prohíbe la labor regular del servicio.
  alternative_spanish_readings:
  - El versículo prohíbe todo servicio después del límite de edad
  - El versículo permite solo una vigilancia restringida
  rationale: La oposición entre 'ministrar' y 'servicio' debe mantenerse en español para no borrar la tensión textual. La redacción elegida refleja una continuidad limitada, no una abolición total de toda actividad.
  doctrine_reference: Numbers 8:24-26; Levíticos/Levitical service regulation
- issue: Sentido de מִשְׁמֶרֶת como encargo/responsabilidad asignada
  english_pob_reading: The Hebrew expression refers to fulfilling an assigned responsibility.
  chosen_spanish_reading: La expresión se entiende como cumplir una responsabilidad asignada.
  alternative_spanish_readings:
  - guardar la guardia
  - cumplir el cargo
  rationale: Se evita leer la frase como mera custodia física. La opción española debe dejar abierta la dimensión de encargo cultual y de turno/responsabilidad.
  doctrine_reference: Numbers 3:7-8; 8:26
translation_notes:
  revision_awareness: La redacción sigue el pasaje ya revisado en inglés, manteniendo la distinción deliberada entre el ministerio permitido (שרת) y el servicio/labor regular prohibido (עֲבֹדָה/עבד), y adopta para מִשְׁמֶרֶת una solución española que preserve la idea de encargo asignado sin volverla meramente ceremonial.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma base solo cuando aparezca el Tetragrámaton; aquí no aparece.
  - Se conserva 'tienda de reunión' para אֹהֶל מוֹעֵד, consistente con el uso pactual/tabernacular del término.
  - Se mantiene 'levitas' en minúscula común, salvo inicio de oración, siguiendo uso español estándar.
  - Se distinguen 'ministrar' y 'servicio' para no neutralizar la oposición léxica del hebreo.
