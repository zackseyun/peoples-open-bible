translation:
  language: es
  text: Hijo mío, si tienes medios, trátate bien; y, si tienes algo, hazte bien.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בְּנִי / Τέκνον
  english_pob_choice: My son
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Hijo
  - Hijo mío, hijo
  lexicon: HALOT; LXX κύριε/τέκνον usage context
  rationale: La forma vocativa filial se conserva de manera natural en español con 'Hijo mío'. Mantiene el tono exhortativo directo y el vínculo paternal del hebreo, sin introducir un lenguaje más genérico que debilite el matiz masculino singular del testimonio hebreo principal.
- source_word: אִם יֵשׁ לְךָ / καθὼς ἐὰν ἔχῃς
  english_pob_choice: if you have / if you have the means
  chosen_spanish: si tienes medios
  alternatives_spanish:
  - si tienes
  - si cuentas con medios
  - según lo que tengas
  lexicon: HALOT; BDAG
  rationale: El hebreo y el griego apuntan a una condición de posesión o capacidad material. 'Si tienes medios' comunica el sentido práctico de recursos disponibles sin forzar un calco ni perder la interpretación confirmada por el paralelo griego.
- source_word: שָׁרֵית נַפְשֶׁךָ
  english_pob_choice: the means
  chosen_spanish: medios
  alternatives_spanish:
  - recursos
  - provisión
  - sobrante
  lexicon: HALOT
  rationale: La expresión hebrea es comprimida y no del todo transparente. 'Medios' es la forma española más clara y sobria para el campo semántico de recursos disponibles, manteniendo la ambigüedad de base sin inventar un significado más específico de lo que permiten los testigos.
- source_word: הֵיטִיב לָךְ / εὖ ποίει σεαυτόν
  english_pob_choice: do good to yourself / treat yourself well
  chosen_spanish: hazte bien a ti mismo
  alternatives_spanish:
  - hazte el bien
  - trátate bien
  - procura tu bien
  lexicon: HALOT; BDAG
  rationale: Se preserva el valor reflexivo del verbo con un castellano digno y claro. 'Hazte bien a ti mismo' mantiene la fuerza ética de la exhortación y evita suavizarla a una mera recomendación de bienestar subjetivo.
theological_decisions:
- issue: Presencia o ausencia de la cláusula sacrificial del griego
  english_pob_reading: The clause 'and present worthy offerings to the Lord' is preserved in the Greek parallel and may reflect a fuller text, but the latest revision removed it from the main line because it is absent from the extant Hebrew.
  chosen_spanish_reading: No incluir la cláusula de ofrendas en el texto principal.
  alternative_spanish_readings:
  - y presenta ofrendas dignas al Señor
  - y ofrece ofrendas adecuadas a Yahvé
  rationale: Dado que el hebreo conservado es la base principal del versículo y la revisión más reciente retiró esa cláusula por no estar en el testimonio hebreo, el español principal debe seguir esa decisión. La diferencia entre el hebreo y el griego queda documentada solo como nota textual si se necesitara, pero no se incorpora al cuerpo del texto.
  doctrine_reference: 'PHILOSOPHY.md: prefer the extant Hebrew for Sirach where it survives; revision awareness from audit trail'
- issue: Tratamiento del paralelismo hebreo/greco con doble condición
  english_pob_reading: if you have the means ... and if you have anything ...
  chosen_spanish_reading: si tienes medios ... y, si tienes algo ...
  alternative_spanish_readings:
  - si tienes recursos ... y si tienes algo
  - si posees medios ... y si posees algo
  rationale: 'El versículo parece sostener dos formulaciones cercanas: una más idiomática y otra más simple. En español, repetir exactamente la misma idea dos veces sonaría torpe; por eso se concentra el valor semántico en la primera cláusula y la segunda queda como refuerzo breve y natural. La repetición de ''hazte bien a ti mismo'' mantiene la estructura paralela de la fuente.'
  doctrine_reference: Sirach compositional style; source-critical caution on compressed Hebrew
- issue: Elección de 'medios' en lugar de 'recursos' o 'posesiones'
  english_pob_reading: the means
  chosen_spanish_reading: medios
  alternative_spanish_readings:
  - recursos
  - posesiones
  - capacidad
  rationale: '''Medios'' es suficientemente amplio para abarcar bienes, capacidad y provisión, y suena más neutral en español bíblico contemporáneo. Evita limitar la frase a bienes materiales estrictos, algo que el hebreo y el griego no obligan.'
  doctrine_reference: Lexical ambiguity in Hebrew phrase
translation_notes:
  revision_awareness: 'La auditoría inglesa muestra una revisión reciente que eliminó la cláusula griega de las ofrendas por no estar en el hebreo conservado. Por eso el borrador español sigue la línea revisada: solo conserva la exhortación de dos miembros sobre tener medios y hacerse bien a uno mismo, sin reintroducir la cláusula sacrificial.'
  spanish_consistency_notes:
  - Uso de 'Hijo mío' para el vocativo filial, coherente con el hebreo masculino singular.
  - '''Medios'' mantiene una solución amplia y transparente para la posesión o capacidad implícita.'
  - Se evita 'Señor' o 'Yahvé' porque el texto principal no incluye la cláusula griega a Κυρίῳ ni una referencia explícita al Nombre divino en el hebreo conservado.
  - '''Hazte bien a ti mismo'' conserva la reflexividad del original y es más sobrio que ''trátate bien'' en registro bíblico.'
