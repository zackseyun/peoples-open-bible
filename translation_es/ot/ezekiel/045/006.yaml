base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/045/006.yaml
  text: And as the city's property[a], you shall give an area five thousand wide and twenty-five thousand long, alongside the holy contribution[b]; it shall belong to the whole house of Israel.
  footnotes:
  - marker: a
    text: Or 'alongside the holy contribution' or 'parallel to the holy contribution.' The Hebrew expression can denote spatial alignment as well as correspondence in measure.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'house of Israel,' a collective term for the people of Israel.
    reason: cultural_note
