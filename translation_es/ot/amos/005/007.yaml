translation:
  language: es
  text: ustedes que convierten la justicia en ajenjo[a] y echan la rectitud por tierra[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'amargura' para 'ajenjo'; el hebreo nombra una planta amarga y la usa aquí de manera metafórica.
    reason: lexical_alternative
  - marker: b
    text: O 'y echan la justicia a tierra', ya que el término hebreo también puede superponerse semánticamente con 'justicia'.
    reason: alternative_reading
lexical_decisions:
- source_word: הַהֹפְכִים
  english_pob_choice: you who turn
  chosen_spanish: ustedes que convierten
  alternatives_spanish:
  - los que convierten
  - quienes convierten
  lexicon: HALOT
  rationale: El participio con artículo funciona como vocativo en el contexto profético; en español, la segunda persona plural mantiene mejor la interpelación directa que una simple relativa en tercera persona.
- source_word: לַעֲנָה
  english_pob_choice: wormwood
  chosen_spanish: ajenjo
  alternatives_spanish:
  - amargura
  lexicon: HALOT
  rationale: לענה nombra una planta amarga; 'ajenjo' conserva la imagen concreta y natural en español, mientras que 'amargura' explicita solo el valor metafórico.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: la justicia
  alternatives_spanish:
  - el juicio
  - la sentencia
  lexicon: HALOT
  rationale: En este contexto ético-social, 'justicia' transmite mejor el orden legal y comunitario debido que 'juicio', que en español puede sonar más a acto de juzgar o sentencia puntual.
- source_word: וּצְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia y rectitud
  lexicon: HALOT
  rationale: צדקה puede significar 'justicia' o 'rectitud'. Aquí, por la cercanía semántica con משפט y para evitar una solución demasiado abstracta en español, se mantiene 'justicia' en la línea principal, dejando constancia de la superposición léxica.
- source_word: לָאָרֶץ
  english_pob_choice: to the earth
  chosen_spanish: por tierra
  alternatives_spanish:
  - a tierra
  - a la tierra
  lexicon: HALOT
  rationale: La expresión comunica abatimiento o derribo. 'Por tierra' es una fórmula natural en español que conserva la imagen de echar algo abajo.
- source_word: הִנִּיחוּ
  english_pob_choice: cast ... down
  chosen_spanish: echan
  alternatives_spanish:
  - han echado
  - han puesto
  - han dejado
  lexicon: HALOT
  rationale: El hiphil de נוח aquí tiene fuerza de poner/dejar en un estado bajo o abatido. 'Echan ... por tierra' expresa con naturalidad la acción degradante sin salir del marco imagístico del hebreo.
theological_decisions:
- issue: Tensión léxica entre משפט y צדקה
  english_pob_reading: justice / righteousness preserved as distinct but related concepts
  chosen_spanish_reading: justicia / justicia con valor superpuesto de rectitud
  alternative_spanish_readings:
  - juicio / rectitud
  - justicia / rectitud
  rationale: El hebreo presenta dos términos estrechamente relacionados. En vez de colapsarlos en una sola idea, la traducción principal conserva el paralelismo con dos menciones de 'justicia', mientras las decisiones léxicas explican que צדקה también puede llevar la idea de rectitud. Esta solución es idiomática en español y mantiene visible la carga ética del verso.
  doctrine_reference: 'DOCTRINE.md: Contested terms table; principio POB de preservar tensiones semánticas donde el texto las sostiene'
translation_notes:
  revision_awareness: 'Concordancia alta con la última revisión: no se detectaron cambios necesarios en el sentido básico del versículo. La presente versión ajusta el español para lectura pública, manteniendo el contraste entre justicia y la imagen de abatimiento, y evita una calca rígida de ''to the earth'' mediante una locución natural (''por tierra'').'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiera explícitamente; aquí no aparece el tetragrámaton.
  - Se mantiene 'justicia' como término principal para ambos miembros por la superposición léxica documentada, sin borrar la tensión semántica.
  - '''Ajenjo'' conserva la concreción botánica del término hebreo; la nota ofrece la lectura metafórica alternativa.'
  - La segunda persona plural 'ustedes' sigue el valor vocativo del participio con artículo en el contexto profético.
