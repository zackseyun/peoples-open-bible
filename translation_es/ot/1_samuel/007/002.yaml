translation:
  language: es
  text: Desde el día en que el arca quedó[a] en Quiriat-jearim, los días se hicieron muchos, y fueron veinte años; y toda la casa de Israel lamentó[b] tras Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «permaneció». El hebreo expresa que el arca siguió estando allí.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «anheló a Yahvé» o «se lamentó hacia Yahvé». El hebreo dice literalmente: «lamentó tras Yahvé», un giro idiomático que puede expresar duelo y orientación hacia él.'
    reason: alternative_reading
lexical_decisions:
- source_word: שֶׁבֶת
  english_pob_choice: remained
  chosen_spanish: quedó
  alternatives_spanish:
  - permaneció
  - estuvo
  lexicon: HALOT
  rationale: El infinitivo de ישב con el arca como sujeto expresa permanencia de ubicación. En español, "quedó" comunica esa permanencia con naturalidad sin volver la frase pesada ni introducir una acción más fuerte de la que el hebreo exige.
- source_word: הָאָרוֹן
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - el arca de Dios
  - el cofre
  lexicon: HALOT
  rationale: El hebreo dice simplemente "el arca"; no añade un genitivo. "Arca" mantiene el referente narrativo preciso sin expandir el texto más allá de lo dado.
- source_word: בְּקִרְיַת יְעָרִים
  english_pob_choice: at Kiriath-jearim
  chosen_spanish: en Quiriat-jearim
  alternatives_spanish:
  - en Kiriat-jearim
  lexicon: HALOT
  rationale: Se translitera el topónimo con forma reconocible en español bíblico. "En" es la preposición locativa más natural para una ciudad o lugar en español.
- source_word: וַיִּרְבּוּ הַיָּמִים
  english_pob_choice: the days became many
  chosen_spanish: los días se multiplicaron
  alternatives_spanish:
  - pasaron muchos días
  - los días aumentaron
  lexicon: HALOT
  rationale: La frase hebrea es idiomática para el paso del tiempo. "Se multiplicaron" conserva mejor la imagen verbal del hebreo que una paráfrasis plana, y sigue siendo comprensible en español.
- source_word: וַיִּהְיוּ עֶשְׂרִים שָׁנָה
  english_pob_choice: they were twenty years
  chosen_spanish: fueron veinte años
  alternatives_spanish:
  - pasaron veinte años
  - duraron veinte años
  lexicon: HALOT
  rationale: El hebreo retoma el plural de "los días" y marca la duración alcanzada. "Fueron veinte años" mantiene esa estructura con claridad; evita sobreinterpretar el matiz temporal como una mera cifra aislada.
- source_word: וַיִּנָּהוּ
  english_pob_choice: lamented
  chosen_spanish: lamentó
  alternatives_spanish:
  - lloró
  - se lamentó
  - se dolió
  lexicon: HALOT
  rationale: El verbo נהה denota lamentación o duelo. "Lamentó" preserva ese peso afectivo y ritual sin convertirlo necesariamente en una formulación de arrepentimiento explícito que el versículo no desarrolla.
- source_word: כָּל בֵּית יִשְׂרָאֵל
  english_pob_choice: all the house of Israel
  chosen_spanish: toda la casa de Israel
  alternatives_spanish:
  - todo Israel
  - toda la nación de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión de pacto "casa de Israel" en vez de suavizarla a "todo Israel", porque el hebreo usa una fórmula identitaria específica con valor histórico y teológico.
- source_word: אַחֲרֵי יְהוָה
  english_pob_choice: after Yahweh
  chosen_spanish: tras Yahvé
  alternatives_spanish:
  - detrás de Yahvé
  - hacia Yahvé
  lexicon: HALOT
  rationale: 'El preposición "אַחֲרֵי" significa literalmente "después/detrás de". "Tras" reproduce la imagen del hebreo y deja abierta la tensión idiomática: puede expresar orientación, búsqueda o lamento dirigido a Yahvé, sin resolverla prematuramente.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración de יְהוָה, siguiendo la política del POB de no ocultar el tetragrámaton bajo una sustitución titulada. "Yahvé" es la forma establecida en español para ese nombre.
theological_decisions:
- issue: Sentido de וַיִּנָּהוּ ... אַחֲרֵי יְהוָה
  english_pob_reading: A lamenting/penitential turning toward Yahweh is expressed, without making explicit a full repentance formula not stated in this verse.
  chosen_spanish_reading: Se expresa un lamento de toda la casa de Israel orientado hacia Yahvé, sin convertirlo en una fórmula explícita de arrepentimiento.
  alternative_spanish_readings:
  - Toda la casa de Israel anheló a Yahvé
  - Toda la casa de Israel se volvió hacia Yahvé en arrepentimiento
  - Toda la casa de Israel lloró por Yahvé
  rationale: El hebreo permite un campo semántico entre duelo, añoranza y orientación religiosa. El español debe conservar esa tensión sin fijar demasiado el sentido. "Lamentó tras Yahvé" mantiene el valor verbal y la preposición problemática, dejando abierta la interpretación que el contexto más amplio pueda desarrollar.
  doctrine_reference: Preservar la tensión lexical y teológica sin resolverla de antemano.
translation_notes:
  revision_awareness: 'El borrador sigue el acuerdo alto con la revisión más reciente: conserva la estructura de tres miembros temporales y el cierre con lamento de Israel, pero adopta puntuación fluida en español (comas y punto y coma) en lugar de guiones. También mantiene el nombre divino como Yahvé, coherente con la política editorial y con la revisión que retuvo el valor lexical del hebreo.'
  spanish_consistency_notes:
  - Se usa "Yahvé" de manera consistente para יְהוָה, no "SEÑOR".
  - Se conserva "casa de Israel" como expresión de pacto, no se simplifica a "Israel".
  - '"Tras Yahvé" se mantiene para reflejar la preposición problemática אַחֲרֵי y evitar cerrar el matiz idiomático.'
  - '"Lamentó" mantiene el tono de duelo/penitencia sin sobreespecificar arrepentimiento.'
