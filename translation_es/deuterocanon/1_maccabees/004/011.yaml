translation:
  language: es
  text: Y todas las naciones sabrán que hay uno que redime y salva a Israel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que él es el que redime y salva a Israel». El griego deja implícito el sujeto.'
    reason: alternative_reading
lexical_decisions:
- source_word: γνώσονται
  english_pob_choice: will know
  chosen_spanish: sabrán
  alternatives_spanish:
  - llegarán a saber
  - reconocerán
  lexicon: BDAG
  rationale: El futuro de γινώσκω expresa llegar a conocer o reconocer un hecho. «Sabrán» es natural en español y conserva la fuerza predictiva sin añadir matices innecesarios.
- source_word: πάντα τὰ ἔθνη
  english_pob_choice: all the nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todos los gentiles
  - cada nación
  lexicon: BDAG
  rationale: En este contexto judío-griego, ἔθνη puede referirse a las naciones/Gentiles. «Todas las naciones» preserva el alcance universal y evita estrechar el sentido a una oposición interna/externa que el griego no exige aquí.
- source_word: ὅτι ἔστιν
  english_pob_choice: that there is
  chosen_spanish: que existe
  alternatives_spanish:
  - que hay
  - que es
  lexicon: BDAG
  rationale: El griego usa ἔστιν sin sujeto explícito antes de los participios sustantivados. «Que existe» mantiene el valor existencial y evita especificar en la oración principal a quién se refiere, como permite el griego.
- source_word: ὁ λυτρούμενος
  english_pob_choice: one who redeems
  chosen_spanish: uno que rescata
  alternatives_spanish:
  - uno que redime
  - el que rescata
  - el redentor
  lexicon: BDAG
  rationale: El participio presente medio con artículo funciona sustantivamente. «Uno que rescata» comunica la acción liberadora de λυτρόω en español claro; «redime» sería posible, pero «rescata» expresa bien el sentido de liberación sin sonar técnico. Se conserva la tensión entre rescate y redención sin resolverla de forma doctrinal.
- source_word: σώζων
  english_pob_choice: saves
  chosen_spanish: salva
  alternatives_spanish:
  - libra
  - rescata
  lexicon: BDAG
  rationale: σῴζω suele significar «salvar» o «librar». «Salva» empareja bien con «rescata» y mantiene la resonancia teológica del griego en un registro natural.
- source_word: τὸν Ἰσραήλ
  english_pob_choice: Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - a Israel, el pueblo de Israel
  lexicon: BDAG
  rationale: El nombre propio se conserva directamente. Se usa la preposición «a» por exigencia sintáctica del español con el objeto directo personal.
theological_decisions:
- issue: 'Sujeto implícito de los participios sustantivados: «el que rescata y salva a Israel»'
  english_pob_reading: Render existentially as 'there is one who redeems and saves Israel' without naming the referent in the main text.
  chosen_spanish_reading: 'Se expresa existencialmente: «existe uno que rescata y salva a Israel», sin nombrar al referente en el texto principal.'
  alternative_spanish_readings:
  - «él es el que rescata y salva a Israel»
  - «hay un redentor y salvador de Israel»
  rationale: El griego deja implícito el sujeto de los participios. Aunque el contexto apunta a Dios, la cláusula dice la realidad de ese rescatador/salvador sin identificarlo explícitamente. La traducción conserva esa reserva textual y la tensión teológica documentada por la POB.
  doctrine_reference: DOCTRINE.md § Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se registraron cambios necesarios y el consenso de revisión fue alto. Se mantuvo la lectura existencial e implícita del sujeto, junto con el paralelismo «rescata y salva».'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» como sustituto de Yahvé porque el texto griego aquí no contiene κύριος.
  - Se prefirió «rescata» para λυτρούμενος y «salva» para σώζων, preservando el doble matiz sin forzar un solo término técnico.
  - La preposición «a» en «a Israel» responde a la sintaxis española con objeto directo personal/propiamente nombrado.
  - La nota al pie marca únicamente la alternativa documentada por la POB inglesa y no introduce una lectura nueva.
