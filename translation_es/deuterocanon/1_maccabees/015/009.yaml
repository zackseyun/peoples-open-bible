translation:
  language: es
  text: Y cuando establezcamos nuestro reino[a], te honraremos a ti, a tu nación y al santuario con gran gloria[b][c], de modo que tu gloria llegue a ser evidente en toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando consolidemos nuestro reino». El griego καταστήσωμεν puede sugerir también la idea de dejar el reino firmemente establecido.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «con gran honor». La repetición de δόξα/δοξάζω en el griego permite ambas opciones; se ha preferido «gloria» para mantener la correspondencia léxica del pasaje.'
    reason: lexical_alternative
  - marker: c
    text: «Santuario» también puede entenderse como «templo» o «recinto sagrado», pues ἱερόν puede referirse al espacio sagrado del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: καταστήσωμεν
  english_pob_choice: establish
  chosen_spanish: establezcamos
  alternatives_spanish:
  - pongamos en orden
  - aseguremos
  lexicon: LSJ
  rationale: El verbo griego en este contexto político expresa poner el reino en condición firme o estable; en español, «establezcamos» conserva la idea de fijar o asentar el reino sin añadir una interpretación más específica.
- source_word: βασιλείαν
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - realeza
  - dominio
  lexicon: LSJ
  rationale: «Reino» es el equivalente natural en español para el ámbito político de βασιλεία y preserva el sentido institucional del texto.
- source_word: δοξάσωμέν
  english_pob_choice: will honor
  chosen_spanish: honraremos
  alternatives_spanish:
  - glorificaremos
  - daremos honor
  lexicon: LSJ
  rationale: El audit trail inglés opta por «honor» en el acto diplomático de la carta, pero la revisión posterior insiste en reflejar la red de δόξα/δοξάζω con «glory». En español, «honraremos» mantiene el valor de rendir honor y evita un exceso de tono devocional, dejando visible la relación semántica con δόξα en el resto de la cláusula.
- source_word: ἔθνος
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - etnia
  lexicon: LSJ
  rationale: Aquí se refiere al colectivo judío como entidad político-histórica; «nación» reproduce bien ese registro diplomático.
- source_word: ἱερὸν
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el templo
  - el recinto sagrado
  lexicon: LSJ
  rationale: «Santuario» conserva la referencia sagrada sin precisar indebidamente si se trata del complejo entero o de una zona sacra específica.
- source_word: δόξῃ μεγάλῃ
  english_pob_choice: with great glory
  chosen_spanish: con gran gloria
  alternatives_spanish:
  - con gran honor
  - con gran esplendor
  lexicon: LSJ
  rationale: La revisión inglesa volvió a «glory» para reflejar con más exactitud δόξῃ μεγάλῃ. En español, «con gran gloria» mantiene esa correspondencia léxica con δόξα/δοξάζω y evita diluir la repetición verbal.
- source_word: φανερὰν γενέσθαι
  english_pob_choice: may become evident
  chosen_spanish: llegue a ser evidente
  alternatives_spanish:
  - llegue a hacerse manifiesta
  - se haga evidente
  lexicon: LSJ
  rationale: La construcción de resultado μετά ὥστε se expresa de modo natural en español con «llegue a ser evidente», conservando la idea de manifestación pública.
- source_word: τὴν δόξαν ὑμῶν
  english_pob_choice: your glory
  chosen_spanish: vuestra gloria
  alternatives_spanish:
  - su gloria
  - vuestro honor
  lexicon: LSJ
  rationale: Dado que el griego repite δόξα, conviene mantener «gloria» para conservar la cohesión léxica; el posesivo plural «vuestra» sigue la forma colectiva del interlocutor.
- source_word: ἐν πάσῃ τῇ γῇ
  english_pob_choice: in all the earth
  chosen_spanish: en toda la tierra
  alternatives_spanish:
  - en toda la tierra habitada
  - en todo el país
  lexicon: LSJ
  rationale: «Tierra» reproduce la amplitud semántica de γῆ y permite la misma ambigüedad controlada entre territorio y extensión mundial que conserva el inglés.
translation_notes:
  revision_awareness: La redacción sigue el texto griego directamente y toma en cuenta la revisión del inglés POB que revirtió 'with great honor' a 'with great glory' para reflejar mejor δόξῃ μεγάλῃ y la repetición de δόξα/δοξάζω. En español se ha preservado esa decisión con «gran gloria», mientras que para δοξάσωμέν se usó «honraremos» para mantener la naturalidad del registro diplomático sin borrar la conexión léxica general del versículo.
  spanish_consistency_notes:
  - Se ha evitado traducir κύριος o el nombre divino porque este versículo no los contiene.
  - «Santuario» se usa de modo consistente con el valor de ἱερόν en el audit trail, sin fijar indebidamente «templo» en el texto principal.
  - Se mantiene la distinción entre «gloria» y «honor» según la red de palabras griegas y la revisión inglesa, aunque el verbo principal se expresa con el valor idiomático de rendir honor.
  - «Tierra» conserva la amplitud de γῆ, dejando abierta la referencia a territorio o extensión universal según el contexto histórico-literario.
