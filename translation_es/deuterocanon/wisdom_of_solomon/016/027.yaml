translation:
  language: es
  text: Pues lo que no fue destruido por el fuego, simplemente se derretía al calentarse con un breve rayo del sol.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con un rayo leve del sol». El adjetivo griego puede poner el acento en la pequeñez o la debilidad, no solo en la brevedad.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ ... μὴ φθειρόμενον
  english_pob_choice: what was not destroyed
  chosen_spanish: lo que no fue destruido
  alternatives_spanish:
  - la cosa que no era destruida
  - lo que no se corrompía
  lexicon: BDAG
  rationale: El participio con artículo funciona de modo sustantivo y alude al alimento milagroso en el contexto. 'Destruido' comunica mejor el contraste físico con el fuego y conserva la fuerza de φθείρω sin introducir la idea moral de 'corromper'.
- source_word: ὑπὸ πυρὸς
  english_pob_choice: by fire
  chosen_spanish: por el fuego
  alternatives_spanish:
  - bajo el fuego
  - a causa del fuego
  lexicon: BDAG
  rationale: Con genitivo, ὑπό expresa aquí agente/instrumento. 'Por el fuego' es natural en español y mantiene la relación causal/instrumental.
- source_word: ἁπλῶς
  english_pob_choice: simply
  chosen_spanish: simplemente
  alternatives_spanish:
  - solamente
  - apenas
  lexicon: LSJ
  rationale: '''Simplemente'' conserva el contraste retórico: aquello no fue destruido por el fuego, pero cedió ante una causa mínima. Evita un tono demasiado coloquial.'
- source_word: ὑπὸ βραχείας ἀκτῖνος ἡλίου
  english_pob_choice: by a brief ray of the sun
  chosen_spanish: con un breve rayo del sol
  alternatives_spanish:
  - con un rayo leve del sol
  - con un pequeño rayo del sol
  - por un rayo breve del sol
  lexicon: LSJ
  rationale: βραχείας puede sugerir pequeñez, brevedad o debilidad. 'Breve rayo del sol' preserva la imagen y la desproporción con el fuego, sin cerrar el matiz a una sola posibilidad.
- source_word: θερμαινόμενον
  english_pob_choice: when warmed
  chosen_spanish: al calentarse
  alternatives_spanish:
  - cuando se calentaba
  - siendo calentado
  lexicon: BDAG
  rationale: El participio se vierte temporalmente. 'Al calentarse' suena natural en español y conserva la idea de una acción leve, no necesariamente intensa.
- source_word: ἐτήκετο
  english_pob_choice: melted
  chosen_spanish: se derretía
  alternatives_spanish:
  - se derretía
  - se fundía
  lexicon: BDAG
  rationale: El imperfecto expresa proceso en curso; 'se derretía' conserva ese aspecto mejor que un pretérito puntual. 'Fundía' sería posible, pero menos transparente para lectores generales.
theological_decisions:
- issue: Descripción milagrosa sin explicación racionalizante
  english_pob_reading: Render the verse straightforwardly as describing the miraculous behavior of the food in context, without adding explanatory interpretation.
  chosen_spanish_reading: Presentar el versículo de manera directa como descripción del comportamiento milagroso del alimento, sin suavizar ni explicar el contraste.
  alternative_spanish_readings:
  - Convertirlo en un dicho general sobre cosas materiales
  - Añadir una explicación naturalista del fenómeno
  rationale: 'El griego es concreto y está ligado al relato del maná/alimento milagroso. La traducción debe conservar la paradoja: lo que no cedió ante el fuego, sí se derrite ante un rayo leve del sol. No se resuelve la tensión en comentario.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Basado en el griego de Swete LXX 1909 y en el rastro auditado inglés; no hubo revisiones aplicadas en el paquete y el control cruzado reportó alta concordancia con solo observaciones menores.
  spanish_consistency_notes:
  - Se usa 'fuego' y 'sol' sin mayúsculas teológicas porque el contexto es físico, no un título divino.
  - Se eligió 'se derretía' para conservar el imperfecto del griego y el carácter procesual de ἐτήκετο.
  - La nota mantiene abierta la ambigüedad de βραχείας entre 'breve' y 'leve', como en el inglés auditado entre 'brief' y 'slight'.
