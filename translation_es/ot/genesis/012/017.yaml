translation:
  language: es
  text: Pero Yahvé afligió a Faraón y a los de su casa con grandes plagas[a], por causa de Sarai, esposa de Abram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hirió a Faraón y a los de su casa con grandes aflicciones». El hebreo usa un verbo que puede significar «hirió» o «afligió», y un sustantivo que puede significar «aflicciones» o «plagas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְנַגַּע
  english_pob_choice: afflicted
  chosen_spanish: afligió
  alternatives_spanish:
  - hirió
  - golpeó
  - tocó
  lexicon: HALOT
  rationale: El verbo נגע puede abarcar 'tocar', 'golpear' o 'afligir'; en este contexto, junto con נְגָעִים, expresa una acción divina que produce daño real. 'Afligió' conserva el valor causativo y suena natural en español sin perder la fuerza del golpe o la plaga.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliterar el nombre divino como ''Yahvé'' en lugar de sustituirlo por un título. Esto preserva el nombre propio revelado en el texto hebreo.'
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - el faraón
  lexicon: HALOT
  rationale: '''Faraón'' es la forma natural y establecida en español para el título egipcio. No requiere artículo en esta construcción.'
- source_word: נְגָעִים גְּדֹלִים
  english_pob_choice: severe plagues
  chosen_spanish: grandes plagas
  alternatives_spanish:
  - severas plagas
  - grandes aflicciones
  - fuertes golpes
  lexicon: HALOT
  rationale: נְגָעִים puede significar 'aflicciones', 'golpes' o 'plagas'. El contexto narrativo favorece 'plagas', y גְּדֹלִים se traduce de manera más directa como 'grandes'; así se conserva la posible tensión entre la literalidad hebrea y el valor idiomático que el inglés POB resolvió como 'severe'.
- source_word: וְאֶת בֵּיתוֹ
  english_pob_choice: and his household
  chosen_spanish: y a su casa
  alternatives_spanish:
  - y a su familia
  - y a su casa/personal doméstico
  - y a su casa real
  lexicon: HALOT
  rationale: בַּיִת puede significar 'casa' o 'casa/casa doméstica' en sentido colectivo. En español, 'a su casa' comunica de forma natural el alcance doméstico sin introducir un término más interpretativo que 'hogar' o 'familia'.
- source_word: עַל דְּבַר
  english_pob_choice: because of
  chosen_spanish: por causa de
  alternatives_spanish:
  - a causa de
  - debido a
  - por razón de
  lexicon: HALOT
  rationale: La expresión marca causa. 'Por causa de' conserva la relación causal de manera clara y suficientemente formal para texto bíblico.
- source_word: שָׂרַי אֵשֶׁת אַבְרָם
  english_pob_choice: Sarai, Abram’s wife
  chosen_spanish: Sarai, esposa de Abram
  alternatives_spanish:
  - Sarai, la esposa de Abram
  - Sarai, mujer de Abram
  lexicon: HALOT
  rationale: La construcción appositiva identifica a Sarai como la esposa de Abram. 'Esposa de Abram' mantiene la relación sin añadir una redacción excesivamente pesada.
theological_decisions:
- issue: El Tetragrámaton en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se mantiene la decisión doctrinal y editorial del proyecto de usar el nombre divino en transliteración, para no ocultar el nombre propio detrás de una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de נְגָעִים en contexto narrativo de juicio
  english_pob_reading: severe plagues
  chosen_spanish_reading: grandes plagas
  alternative_spanish_readings:
  - severas plagas
  - grandes aflicciones
  rationale: El hebreo permite tanto 'aflicciones' como 'plagas'. En este pasaje el castigo divino sobre la casa de Faraón se expresa naturalmente como plagas; 'grandes' conserva el intensificador gĕdōlîm sin forzar un equivalente interpretativo distinto.
  doctrine_reference: HALOT / contexto narrativo de juicio divino en Génesis 12:17
translation_notes:
  revision_awareness: 'El borrador sigue el sentido confirmado por el contexto auditado en inglés y por el hebreo masorético: un juicio divino sobre Faraón y su casa a causa de Sarai. Se conservó la decisión editorial de nombrar a יְהוָה como Yahvé y se mantuvo la ambigüedad lexical de נְגָעִים en una nota, como en el audit trail inglés.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - '''Faraón'' se mantiene como título propio habitual en español bíblico.'
  - '''casa'' en ''su casa'' refleja el alcance colectivo de בַּיִת sin añadir interpretaciones no justificadas.'
  - La puntuación reproduce una cláusula causal clara y publicable en español moderno.
