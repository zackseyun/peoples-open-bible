lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Y los niños de
  - Y los descendientes de
  lexicon: HALOT
  rationale: En una genealogía, בְּנֵי se conserva mejor como «hijos de», que mantiene la estructura formal de linaje. Se usa «Y» para reflejar la continuidad de la lista.
- source_word: בֶכֶר
  english_pob_choice: Becher
  chosen_spanish: Becher
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar.
- source_word: זְמִירָה
  english_pob_choice: Zemirah
  chosen_spanish: Zemira
  alternatives_spanish:
  - Zemirah
  lexicon: HALOT
  rationale: Nombre propio. Se opta por «Zemira» como transliteración natural en español; la forma con -h final es una alternativa válida pero menos usual en español.
- source_word: יוֹעָשׁ
  english_pob_choice: Joash
  chosen_spanish: Joás
  alternatives_spanish:
  - Joash
  lexicon: HALOT
  rationale: Nombre bíblico adaptado a la convención española usual con acento gráfico para indicar la sílaba tónica final.
- source_word: אֱלִיעֶזֶר
  english_pob_choice: Eliezer
  chosen_spanish: Eliezer
  lexicon: HALOT
  rationale: Nombre propio conservado en transliteración usual.
- source_word: אֶלְיוֹעֵינַי
  english_pob_choice: Elioenai
  chosen_spanish: Elioenai
  alternatives_spanish:
  - Elyoenai
  lexicon: HALOT
  rationale: Se mantiene la forma bíblica tradicional más reconocible en español y cercana al uso inglés auditado.
- source_word: עָמְרִי
  english_pob_choice: Omri
  chosen_spanish: Omri
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera estándar.
- source_word: יְרֵמוֹת
  english_pob_choice: Jeremoth
  chosen_spanish: Jeremot
  alternatives_spanish:
  - Jerimot
  lexicon: HALOT
  rationale: Se representa el nombre con ortografía española natural. La auditada variación inglesa Jeremoth/Jerimoth se resuelve aquí en una forma breve y legible, sin alterar la identificación del nombre.
- source_word: אֲבִיָּה
  english_pob_choice: Abijah
  chosen_spanish: Abías
  alternatives_spanish:
  - Abijah
  lexicon: HALOT
  rationale: Nombre propio con forma tradicional española; «Abías» es más natural y reconocible para lectores en español.
- source_word: עֲנָתוֹת
  english_pob_choice: Anathoth
  chosen_spanish: Anatot
  alternatives_spanish:
  - Anathot
  lexicon: HALOT
  rationale: Nombre propio transliterado con ortografía española más fluida. Aunque también es topónimo en otros contextos, aquí se mantiene como nombre dentro de la genealogía, siguiendo el análisis del texto fuente.
- source_word: עָלָמֶת
  english_pob_choice: Alemeth
  chosen_spanish: Alemet
  alternatives_spanish:
  - Alemet
  lexicon: HALOT
  rationale: Nombre propio transliterado al español sin la -h final muda del inglés, para una lectura más natural.
- source_word: כָּל אֵלֶּה
  english_pob_choice: All these
  chosen_spanish: Todos estos
  alternatives_spanish:
  - Todos ellos
  lexicon: HALOT
  rationale: Se conserva el valor resumidor enfático del hebreo con una expresión idiomática natural en español.
- source_word: בְּנֵי בָכֶר
  english_pob_choice: were the sons of Becher
  chosen_spanish: fueron los hijos de Becher
  alternatives_spanish:
  - eran los hijos de Becher
  lexicon: HALOT
  rationale: El verbo copulativo final se expresa en pasado para reflejar la clausura de la lista genealógica. «Hijos de» preserva la forma de parentesco del original.
