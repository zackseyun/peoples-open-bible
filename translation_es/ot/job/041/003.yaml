translation:
  language: es
  text: ¿Quién me ha dado primero,[a] para que yo se lo devuelva? Todo lo que está bajo todos los cielos es mío.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «¿Quién me ha precedido, para que yo se lo devuelva?». El verbo hebreo puede significar «venir delante» o «anticipar», pero aquí probablemente expresa el acto de dar primero y poner a otro en deuda.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién es el que
  - ¿Quién ever
  lexicon: HALOT
  rationale: La forma interrogativa simple conserva el tono retórico directo del hebreo sin añadir énfasis innecesario.
- source_word: הִקְדִּימַנִי
  english_pob_choice: has first given to me
  chosen_spanish: me ha dado primero
  alternatives_spanish:
  - me ha precedido
  - me ha anticipado
  - ha hecho un favor primero
  lexicon: HALOT
  rationale: En este contexto la idea no es solo temporal, sino dar antes de modo que coloque al otro en deuda; en español, «me ha dado primero» transmite mejor esa carga idiomática que un mero «me ha precedido».
- source_word: וַאֲשַׁלֵּם
  english_pob_choice: that I should repay him
  chosen_spanish: para que yo se lo devuelva
  alternatives_spanish:
  - y yo le pagaré
  - de modo que yo le pague
  lexicon: HALOT
  rationale: 'El verbo expresa la consecuencia esperada de la supuesta dádiva: devolver/pagar una deuda. «Se lo devuelva» mantiene la idea de retribución sin sonar excesivamente mecánico.'
- source_word: תַּחַת כָּל הַשָּׁמַיִם
  english_pob_choice: under all the heavens
  chosen_spanish: debajo de todos los cielos
  alternatives_spanish:
  - bajo todo el cielo
  - debajo de todo el cielo
  lexicon: HALOT
  rationale: Se conserva la amplitud cósmica de la expresión hebrea. «Cielos» refleja el plural del original; «debajo de» resulta natural en español y comunica la totalidad del ámbito creado.
- source_word: לִי הוּא
  english_pob_choice: is mine
  chosen_spanish: es mío
  alternatives_spanish:
  - me pertenece
  - es para mí
  lexicon: HALOT
  rationale: 'La construcción dative + pronombre se vierte de manera idiomática como posesión: «es mío». Resume con claridad la afirmación de propiedad total.'
theological_decisions:
- issue: Indebtedness of God and universal ownership
  english_pob_reading: The verse denies that any creature can place God under obligation and then asserts that everything under heaven belongs to him.
  chosen_spanish_reading: El versículo niega que alguien pueda obligar a Dios a retribuirle, y afirma que todo lo que está bajo los cielos le pertenece.
  alternative_spanish_readings:
  - ¿Quién me ha precedido, para que yo se lo devuelva?
  - Todo bajo el cielo es mío.
  rationale: La secuencia del hebreo, junto con la lectura auditada en inglés, apunta a una pregunta retórica sobre dar primero para crear una deuda. La traducción mantiene esa tensión sin suavizarla en una simple prioridad temporal.
  doctrine_reference: Job 41:3; Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del texto fuente en inglés: no se registran cambios aplicados y el consenso de revisión es de alta concordancia.'
  spanish_consistency_notes:
  - Se conserva «cielos» en plural para reflejar la forma hebrea, aunque en español también existiría la opción singular.
  - Se evita «SEÑOR» porque este versículo no contiene el Tetragrámaton de forma explícita en el texto hebreo aportado.
  - «Devuelva» mantiene el valor retributivo de וַאֲשַׁלֵּם sin forzar un futuro meramente temporal.
