id: ROM.8.26
reference: Romans 8:26
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ὡσαύτως δὲ καὶ τὸ πνεῦμα συναντιλαμβάνεται ⸂τῇ ἀσθενείᾳ⸃ ἡμῶν· τὸ γὰρ τί ⸀προσευξώμεθα καθὸ δεῖ οὐκ οἴδαμεν, ἀλλὰ αὐτὸ τὸ πνεῦμα ⸀ὑπερεντυγχάνει στεναγμοῖς ἀλαλήτοις,
base_translation:
  language: en
  yaml_path: translation/nt/romans/008/026.yaml
  text: Likewise[a], the Spirit also helps in our weakness. For we do not know what we should pray for as we ought, but the Spirit himself intercedes with inexpressible groanings[b],
translation:
  language: ko
  text: 이와 같이 성령께서도 우리의 연약함을 도우십니다. 우리가 마땅히 무엇을 위해 기도해야 할지 알지 못하지만, 성령께서 친히 말로 할 수 없는 탄식으로 우리를 위해 간구하시기 때문입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: συναντιλαμβάνεται
  english_pob_choice: helps
  chosen_korean: 도우십니다
  lexicon: BDAG
  rationale: συν- + 함께 짊어짐. 「돕다」 자연스러움.
- source_word: ἀσθενείᾳ
  english_pob_choice: weakness
  chosen_korean: 연약함
  lexicon: BDAG
  rationale: 5:6 일관.
- source_word: ὑπερεντυγχάνει
  english_pob_choice: intercedes
  chosen_korean: 우리를 위해 간구하시기
  alternatives_korean:
  - 대신 중보하시기
  lexicon: BDAG
  rationale: ὑπερ- 강조 + 간구. 8:34와 일관.
- source_word: στεναγμοῖς ἀλαλήτοις
  english_pob_choice: inexpressible groanings
  chosen_korean: 말로 할 수 없는 탄식
  alternatives_korean:
  - 형언할 수 없는 신음
  - 말로 표현할 수 없는 탄식
  lexicon: BDAG
  rationale: 본 과제 정책 정확한 표현. 8:22-23의 탄식 모티프 절정.
theological_decisions:
- issue: στεναγμοῖς ἀλαλήτοις의 번역
  chosen_reading: 「말로 할 수 없는 탄식」
  alternative_readings:
  - 「형언할 수 없는 신음」
  - 「방언적 기도」(은사주의 해석)
  rationale: 본문은 성령께서 친히 신자 안에서 신자조차 말로 표현할 수 없는 깊은 탄식으로 간구하심을 묘사. 본 과제 정책에 따라 「말로 할 수 없는 탄식」 채택. 방언적 해석은 본문이 요구하지 않으므로 본문에 강요하지 않음.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension; do not import doctrinal claims'
