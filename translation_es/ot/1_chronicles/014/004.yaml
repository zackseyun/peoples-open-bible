- from: 'Y estos son los nombres de los nacidos[a] que tuvo en Jerusalén: Samúa, Sobab, Natán y Salomón.'
  to: 'Y estos son los nombres de los hijos[a] que le nacieron en Jerusalén: Samúa, Sobab, Natán y Salomón.'
  rationale: 'Se reemplaza «los nacidos que tuvo» por «los hijos que le nacieron» para lograr un español más natural sin perder el sentido posesivo-existencial de אֲשֶׁר הָיוּ לוֹ. La nota conserva la precisión léxica central del POB: el hebreo literalmente dice «los nacidos» y no el término usual para «hijos».'
