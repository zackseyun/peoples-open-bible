    issue: «al que estaba sobre el guardarropa» es un calco poco natural
    rationale: La construcción hebrea significa el encargado o responsable de la dependencia. En español natural y digno, «al que estaba a cargo del guardarropa» o «al encargado del guardarropa» preserva mejor el sentido administrativo.
  - severity: medium
    issue: «servidores de Baal» no refleja la decisión auditada principal
    rationale: La POB inglesa eligió «worshipers of Baal» para aclarar el valor cultual de עֹבְדֵי. En español, «adoradores de Baal» comunica mejor ese sentido; la literalidad de «servidores» puede conservarse en nota.
  - severity: low
    issue: Pronombre explícito innecesario en «Y él les sacó»
    rationale: El sujeto ya está claro por el contexto; «Y les sacó las vestiduras» suena más natural sin pérdida de sentido.
