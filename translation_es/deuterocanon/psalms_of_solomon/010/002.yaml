review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la estructura y el sentido general del griego: el sujeto genérico («ὁ ἑτοιμάζων»), la disposición a recibir castigo («νῶτον εἰς μάστιγας»), el resultado de limpieza/corrección («καθαρισθήσεται») y la máxima sobre el Señor y la disciplina («χρηστὸς γὰρ ὁ κύριος τοῖς ὑπομένουσιν παιδείαν»). Sin embargo, «será purificado» se aparta del inglés auditado, que prefirió «will be cleansed» con «purified» como alternativa, y en español «será limpiado» o «será limpiado/purificado» refleja mejor la amplitud del griego sin elevarlo innecesariamente. También conviene suavizar «para con» a una formulación más natural en español actual.'
  spanish_quality_summary: El texto es claro y digno, pero puede sonar algo rígido. «Porque bueno es el Señor» es aceptable, aunque «porque el Señor es bueno» suena más natural sin pérdida de solemnidad. «Para con los que soportan» es comprensible, pero algo acartonado; «con los que soportan» es más natural. Las notas son útiles, pero una nota sobre «azotes» no debería presentarse como alternativa cuando en realidad explica una decisión de continuidad léxica.
  glossary_alignment: 'La terminología principal está bien alineada: κύριος -> «Señor» es apropiado aquí; παιδεία -> «disciplina» encaja con la decisión auditada; μάστιγες -> «azotes» preserva la continuidad con el verso anterior. El único desajuste relevante es καθαρισθήσεται, donde el borrador usa como texto principal una alternativa más interpretativa («purificado») en vez de la opción base más amplia («limpiado»/«será limpiado»).'
  issues:
  - severity: medium
    issue: El texto principal usa «será purificado» para καθαρισθήσεται en vez de una opción equivalente a «will be cleansed».
    rationale: La auditoría inglesa fijó «will be cleansed» como elección principal y dejó «will be purified» como alternativa. En español, «será limpiado» conserva mejor la amplitud semántica entre limpieza moral y purificación sin cargar el texto principal.
  - severity: low
    issue: «para con los que soportan» suena poco natural en español bíblico moderno.
    rationale: El dativo griego no exige la locución «para con». «El Señor es bueno con los que soportan la disciplina» mantiene el sentido y mejora la legibilidad.
  - severity: low
    issue: La nota [a] está formulada como si fuera una alternativa, pero en realidad justifica una elección editorial.
    rationale: Conviene conservar la explicación, pero con razón de continuidad léxica, no como equivalente alternativo al texto.
  - severity: low
    issue: Aparece una alternativa corrupta en las decisiones léxicas internas («será очищado»).
    rationale: Aunque no está en el texto ni en notas visibles, indica ruido editorial y refuerza la necesidad de saneamiento menor del registro.
  revised_spanish_text: El que prepara su espalda para los azotes[a][b] será limpiado[c], porque el Señor es bueno con los que soportan la disciplina[d].
