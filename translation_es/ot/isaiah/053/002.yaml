translation:
  language: es
  text: Porque él creció como un retoño[a] delante de él[b], y como una raíz de una tierra seca. No tenía forma ni majestad para que lo miráramos[c], ni apariencia para que lo deseáramos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como un brote tierno». יוֹנֵק puede referirse a un brote o retoño tierno en esta imagen vegetal.
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «delante de él»; el referente puede entenderse como Yahvé, pero el texto no lo repite explícitamente.
    reason: alternative_reading
  - marker: c
    text: 'O más literalmente: «y lo vimos, y no había apariencia para que lo deseáramos».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַל
  english_pob_choice: grew up
  chosen_spanish: creció
  alternatives_spanish:
  - subió
  - brotó
  lexicon: HALOT
  rationale: En esta imagen vegetal, עלה comunica desarrollo o crecimiento de una planta; «creció» transmite de modo natural esa idea en español sin perder el valor figurado.
- source_word: כַּיּוֹנֵק
  english_pob_choice: like a young plant
  chosen_spanish: como un retoño
  alternatives_spanish:
  - como una planta joven
  - como un brote tierno
  lexicon: HALOT
  rationale: יוֹנֵק puede referirse a un brote tierno o retoño. «Retoño» suena natural en español y conserva la imagen botánica; no fuerza una lectura más interpretativa que el hebreo.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  - ante él
  lexicon: HALOT
  rationale: La frase hebrea es literalmente espacial y mantiene el referente masculino singular sin explicitarlo. «Delante de él» conserva esa ambigüedad textual mejor que identificarlo de forma interpretativa.
- source_word: וְכַשֹּׁרֶשׁ
  english_pob_choice: and like a root
  chosen_spanish: y como una raíz
  alternatives_spanish:
  - y como un tronco
  - y como una raíz tierna
  lexicon: HALOT
  rationale: שֹׁרֶשׁ es «raíz» de manera directa. Mantener el sustantivo concreto conserva el paralelismo vegetal del verso.
- source_word: מֵאֶרֶץ צִיָּה
  english_pob_choice: out of dry ground
  chosen_spanish: de tierra seca
  alternatives_spanish:
  - de suelo seco
  - de una tierra árida
  lexicon: HALOT
  rationale: La imagen apunta a aridez y esterilidad. «Tierra seca» es claro, idiomático y fiel al campo semántico de צִיָּה.
- source_word: לֹא תֹאַר לוֹ
  english_pob_choice: He had no form
  chosen_spanish: No tenía forma
  alternatives_spanish:
  - No tenía aspecto
  - No tenía figura
  lexicon: HALOT
  rationale: תֹאַר se refiere a forma u արտաքին visible. «Forma» preserva el énfasis en la apariencia física sin añadir belleza donde el hebreo no la nombra todavía.
- source_word: וְלֹא הָדָר
  english_pob_choice: or majesty
  chosen_spanish: ni majestad
  alternatives_spanish:
  - ni esplendor
  - ni prestancia
  lexicon: HALOT
  rationale: הָדָר puede denotar majestad, esplendor o dignidad visible. «Majestad» conserva la idea de imponencia externa y combina bien con «forma».
- source_word: וְנִרְאֵהוּ
  english_pob_choice: that we should look at him
  chosen_spanish: para que lo miráramos
  alternatives_spanish:
  - y lo vimos
  - para que lo viéramos
  lexicon: HALOT
  rationale: 'La forma consonántica admite una lectura más literal, pero en contexto funciona como cláusula de finalidad o resultado: no había nada atractivo que motivara la mirada. El español refleja ese sentido sin resolver la ambigüedad del hebreo.'
- source_word: מַרְאֶה
  english_pob_choice: and no appearance
  chosen_spanish: ni apariencia
  alternatives_spanish:
  - ni hermosura
  - ni aspecto visible
  lexicon: HALOT
  rationale: מַרְאֶה es «apariencia» o «aspecto visible». Se evita «hermosura» para no estrechar indebidamente el término a belleza física solamente.
- source_word: וְנֶחְמְדֵהוּ
  english_pob_choice: that we should desire him
  chosen_spanish: para que lo deseáramos
  alternatives_spanish:
  - para que lo apreciáramos
  - para que nos complaciera
  lexicon: HALOT
  rationale: חמד expresa deseo o deleite por algo atractivo. «Deseáramos» preserva el valor de apetencia/atracción que culmina la imagen del verso.
theological_decisions:
- issue: Referente de «delante de él» (לְפָנָיו)
  english_pob_reading: Retain the literal 'before him' without identifying the referent in the main text.
  chosen_spanish_reading: Mantener «delante de él» sin especificar quién es ese «él».
  alternative_spanish_readings:
  - delante de Yahvé
  - ante el Señor
  - delante de nosotros
  rationale: El hebreo no explicita de nuevo el antecedente y la frase admite una ambigüedad real. La versión española conserva esa tensión textual en lugar de resolverla interpretativamente.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: Alcance de la falta de forma/majestad/apariencia
  english_pob_reading: Use visible-language terms ('form,' 'majesty,' 'appearance') without expanding into social status language.
  chosen_spanish_reading: Usar «forma», «majestad» y «apariencia» en sentido visible, sin convertir el verso en una afirmación explícita sobre estatus social.
  alternative_spanish_readings:
  - sin belleza
  - sin prestancia real
  - sin dignidad social
  rationale: El hebreo describe rasgos visibles. El español conserva ese campo semántico sin añadir una explicación social que el texto no formula directamente.
  doctrine_reference: Translation philosophy §1 y §3
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registraron cambios; el paso de revisión final indicó acuerdo alto y sin observaciones. La traducción española sigue esa línea estable, manteniendo la imagen vegetal, la ambigüedad de לְפָנָיו y el énfasis en forma/majestad/apariencia sin ampliaciones interpretativas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto cuando corresponda, pero aquí el texto español conserva la ambigüedad de «él» en la cláusula correspondiente porque el hebreo no nombra explícitamente el referente.
  - Se usa un registro bíblico moderno y digno, evitando tanto calcos rígidos como reformulaciones explicativas.
  - «Retoño» y «raíz» sostienen el paralelismo botánico del verso.
  - «Forma», «majestad» y «apariencia» preservan el campo de lo visible, no una paráfrasis de dignidad social.
