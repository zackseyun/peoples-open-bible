review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: una persona que revierte de la δικαιοσύνη a la ἁμαρτία, y el Señor como agente explícito del juicio al prepararlo para la espada. Sin embargo, la elección principal «se aparta» atenúa el matiz de retorno o retroceso presente en ἐπανάγων, que el rastro inglés preserva con «turns back».'
  spanish_quality_summary: El español es claro y legible, pero puede afinarse para reflejar mejor el matiz verbal y mejorar la nota. «Se vuelve atrás» o «retrocede» expresa mejor la idea de volver de la justicia al pecado. La nota actual contiene una formulación poco natural en español («vuelve atrás de sí mismo»).
  glossary_alignment: '«justicia» para δικαιοσύνη y «pecado» para ἁμαρτία son aceptables en este contexto. «el Señor» para ὁ κύριος también es adecuado, ya que el griego tiene κύριος y no el Tetragrámaton. «espada» para ῥομφαίαν está bien. El ajuste principal necesario es en ἐπανάγων: conviene una expresión española que conserve la noción de regreso o retroceso moral.'
  issues:
  - severity: medium
    issue: «se aparta» debilita el matiz de retorno en ἐπανάγων
    rationale: El participio no solo indica desviarse, sino volver atrás o retroceder desde un camino de justicia hacia el pecado. «Se aparta» puede sonar meramente como desviación lateral, no como reversión.
  - severity: medium
    issue: 'La nota léxica usa una paráfrasis poco natural: «que vuelve atrás de sí mismo»'
    rationale: Esa redacción no suena idiomática en español y no comunica bien la alternativa documentada en inglés. Conviene una formulación como «que se hace volver» o explicar simplemente el matiz más literal de ‘hacer volver/traer de vuelta’.
  revised_spanish_text: El que vuelve atrás de la justicia al pecado, el Señor lo preparará para la espada[a].
