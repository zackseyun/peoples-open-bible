translation:
  language: es
  text: Ciertamente, un hombre anda como una sombra[a]; ciertamente, en vano están en tumulto[b]. Amontona riquezas, y no sabe quién lo recogerá[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como una imagen», «como una mera apariencia» o «como un fantasma»; la palabra hebrea significa literalmente «imagen», aquí usada para expresar la insustancialidad de la existencia humana.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «están en tumulto»; el verbo plural probablemente expresa a la humanidad en general después del singular «un hombre».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «quién los recogerá», refiriéndose a las riquezas o bienes que ha acumulado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: surely
  chosen_spanish: ciertamente
  alternatives_spanish:
  - solo
  - en verdad
  - seguramente
  lexicon: HALOT
  rationale: אַךְ funciona aquí como partícula enfática repetida. «Ciertamente» conserva el valor asertivo y el paralelismo poético en español sin volver la frase artificial.
- source_word: בְּצֶלֶם
  english_pob_choice: as a shadow
  chosen_spanish: como una sombra
  alternatives_spanish:
  - como una imagen
  - como una mera apariencia
  - como un fantasma
  lexicon: HALOT
  rationale: El hebreo puede significar literalmente «imagen», pero en este contexto poético expresa insubstancialidad humana. «Como una sombra» comunica de forma natural la imagen de fugacidad que el POB inglés también privilegia.
- source_word: יִתְהַלֶּךְ אִישׁ
  english_pob_choice: a man walks about
  chosen_spanish: un hombre anda
  alternatives_spanish:
  - un hombre camina
  - una persona anda
  - uno anda
  lexicon: HALOT
  rationale: El hitpael de הלך expresa desplazamiento o conducta continuada. «Anda» es natural en español y mantiene el matiz de movimiento repetido. «Un hombre» conserva el singular masculino representativo del hebreo אִישׁ.
- source_word: הֶבֶל
  english_pob_choice: in vain
  chosen_spanish: en vano
  alternatives_spanish:
  - vanamente
  - como aliento
  - en vaciedad
  lexicon: HALOT
  rationale: Aquí הֶבֶל funciona adverbialmente con la idea de futilidad. «En vano» es la equivalencia idiomática más clara en español y refleja la decisión inglesa de captar la función sintáctica más que el sentido léxico aislado de «vanidad» o «aliento».
- source_word: יֶהֱמָיּוּן
  english_pob_choice: they are in turmoil
  chosen_spanish: están en tumulto
  alternatives_spanish:
  - se agitan
  - andan alborotados
  - están en ruido
  lexicon: HALOT
  rationale: El verbo denota agitación, ruido y tumulto. «Están en tumulto» preserva el plural genérico del hebreo y resulta legible en español; el sujeto tácito se entiende por el verbo plural, como en el inglés POB.
- source_word: יִצְבֹּר
  english_pob_choice: he heaps up wealth
  chosen_spanish: atesora
  alternatives_spanish:
  - amontona
  - acumula
  - junta
  lexicon: HALOT
  rationale: צבר implica amontonar o acumular. «Atesora» es breve y poético, y en español puede abarcar la idea de acumular bienes, sin forzar un objeto explícito que el hebreo tampoco nombra.
- source_word: וְלֹא יֵדַע
  english_pob_choice: and does not know
  chosen_spanish: y no sabe
  alternatives_spanish:
  - y no conoce
  - pero no sabe
  - y no advierte
  lexicon: HALOT
  rationale: La coordinación hebrea se refleja con «y». «No sabe» reproduce ידע de manera directa y sobria, sin añadir matices no presentes en el verso.
- source_word: מִי אֹסְפָם
  english_pob_choice: who will gather it
  chosen_spanish: quién lo recogerá
  alternatives_spanish:
  - quién los recogerá
  - quién lo juntará
  - quién los juntará
  lexicon: HALOT
  rationale: El sufijo hebreo es plural («los»), pero en español el conjunto acumulado puede tratarse colectivamente como singular. «Recogerá» mantiene la imagen de reunir lo amontonado; el plural de sentido queda preservado en la nota.
theological_decisions:
- issue: El masculino representativo en אִישׁ
  english_pob_reading: a man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - una persona
  - uno
  rationale: Se conserva el singular masculino representativo del hebreo, siguiendo la política de traducir con fidelidad a la forma fuente cuando el masculino funciona genéricamente para la humanidad.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Plural verbal en יֶהֱמָיוּן después del singular
  english_pob_reading: they are in turmoil
  chosen_spanish_reading: están en tumulto
  alternative_spanish_readings:
  - está en tumulto
  - se agita la gente
  - la humanidad está en tumulto
  rationale: El hebreo mantiene un plural verbal que la POB inglesa conserva como plural genérico. En español se expresa con un verbo plural, sin borrar la tensión entre el singular «un hombre» y el plural de la actividad humana.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El borrador sigue de cerca el POB inglés y el hebreo consonante/masorético, sin cambios sustanciales respecto al pase de revisión más reciente; se mantiene la tensión poética entre la figura singular del hombre y el plural genérico de la agitación humana.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque este versículo no contiene el nombre divino.
  - Se prefirió «en vano» sobre «vanidad» por la función adverbial de הֶבֶל en el contexto.
  - Se mantuvo «un hombre» por fidelidad al masculino representativo del hebreo.
  - Se usó «recogerá» de modo coherente con el campo semántico de אסף y con la imagen de reunir bienes acumulados.
