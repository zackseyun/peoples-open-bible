translation:
  language: es
  text: Y Efraín no expulsó a los cananeos que vivían en Gezer, y los cananeos habitaron en medio de ellos[a] en Gezer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «en su medio», con el pronombre singular referido a Efraín como unidad tribal; la traducción expresa el sentido colectivo con «en medio de ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹרִישׁ
  english_pob_choice: drive out
  chosen_spanish: expulsó
  alternatives_spanish:
  - desposeyó
  - echó
  lexicon: HALOT
  rationale: El verbo hifil de ירשׁ expresa hacer que los habitantes pierdan su posesión o sean removidos. En español, «expulsó» comunica bien la acción de sacar a una población de un lugar sin sonar técnico o ajeno al contexto de conquista.
- source_word: אֶפְרַיִם
  english_pob_choice: Ephraim
  chosen_spanish: Efraín
  alternatives_spanish:
  - la tribu de Efraín
  lexicon: Nombre propio bíblico
  rationale: Se conserva el nombre propio en su forma habitual en español. El referente tribal queda claro por el contexto y por el posesivo colectivo implícito en el hebreo.
- source_word: הַכְּנַעֲנִי
  english_pob_choice: the Canaanites
  chosen_spanish: los cananeos
  alternatives_spanish:
  - el cananeo
  lexicon: HALOT
  rationale: Aunque el hebreo está en singular morfológico, funciona colectivamente como pueblo. En español, el plural «los cananeos» expresa mejor ese valor colectivo, como en la solución inglesa auditada.
- source_word: הַיּוֹשֵׁב
  english_pob_choice: who lived
  chosen_spanish: que habitaban
  alternatives_spanish:
  - que moraban
  - que residían
  lexicon: HALOT
  rationale: El participio marca residencia continua. «Habitaban» preserva el aspecto durativo y suena natural en español bíblico contemporáneo.
- source_word: בְּגָזֶר
  english_pob_choice: in Gezer
  chosen_spanish: en Gezer
  alternatives_spanish:
  - en Gazer
  - en Guezar
  lexicon: HALOT
  rationale: La preposición local ב se rinde de forma directa con «en». Se mantiene la transliteración común «Gezer» para el topónimo.
- source_word: וַיֵּשֶׁב
  english_pob_choice: lived
  chosen_spanish: habitaron
  alternatives_spanish:
  - vivieron
  - se establecieron
  lexicon: HALOT
  rationale: La forma narrativa continúa la idea de residencia establecida. «Habitaron» reproduce bien la continuidad y evita una paraphrase excesiva.
- source_word: בְּקִרְבּוֹ
  english_pob_choice: among them
  chosen_spanish: en medio de ellos
  alternatives_spanish:
  - dentro de él
  - en su interior
  lexicon: HALOT
  rationale: Literalmente es «en su medio», con sufijo singular que remite a Efraín como entidad colectiva. En español, «en medio de ellos» comunica con claridad la coexistencia sin perder la tensión entre el singular gramatical y el sentido colectivo.
translation_notes:
  revision_awareness: 'Se siguió la revisión auditada que sustituyó la idea causal implícita por una coordinación simple: el hebreo une las dos proposiciones con waw, así que el español mantiene «y» en lugar de introducir «así que» o «por eso».'
  spanish_consistency_notes:
  - Se conserva el paralelo repetido de «en Gezer» para reflejar la localización doble del hebreo.
  - Se evitó «SEÑOR» u otras convenciones de máscara divina porque no aparecen en este versículo.
  - Se mantuvo un registro sobrio y narrativo, compatible con una traducción bíblica pública en español.
  - La nota al pie marca la tensión entre el singular gramatical del hebreo y el sentido colectivo en español.
