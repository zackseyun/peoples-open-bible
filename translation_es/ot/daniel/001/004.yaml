base_translation:
  language: en
  yaml_path: translation/ot/daniel/001/004.yaml
  text: young men in whom there was no defect at all[a], good in appearance, skillful in all wisdom, knowing knowledge, understanding learning, and who had the ability to stand in the king’s palace[c][b], and to teach them the literature and language of the Chaldeans.
  footnotes:
  - marker: a
    text: Or 'to serve in the king’s palace' or 'to attend in the king’s court'; literally 'to stand in the king’s palace.'
    reason: lexical_alternative
  - marker: b
    text: '''Literature'' renders a term that can more literally mean ''writing,'' ''book,'' or scribal learning.'
    reason: lexical_alternative
  - marker: c
    text: '''Chaldeans'' may in context refer broadly to Babylonians, but the Hebrew specifically uses ''Chaldeans.'''
    reason: cultural_note
