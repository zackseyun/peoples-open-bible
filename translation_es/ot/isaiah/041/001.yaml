  text: הַחֲרִ֤ישׁוּ אֵלַ/י֙ אִיִּ֔ים וּ/לְאֻמִּ֖ים יַחֲלִ֣יפוּ כֹ֑חַ יִגְּשׁוּ֙ אָ֣ז יְדַבֵּ֔רוּ יַחְדָּ֖ו לַ/מִּשְׁפָּ֥ט נִקְרָֽבָה׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/041/001.yaml
  text: Be silent before me[a], coastlands; let the peoples renew their strength. Let them come near; then let them speak[c][b]. Together let us draw near for judgment.
  footnotes:
  - marker: a
    text: Or 'islands' or 'distant shores'; the Hebrew term often refers broadly to maritime lands or far-off coastlands.
    reason: lexical_alternative
  - marker: b
    text: Or 'gain new strength'; the Hebrew idiom literally involves changing or renewing strength.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew has 'let us draw near for judgment,' reflecting a legal or courtroom setting.
    reason: cultural_note
