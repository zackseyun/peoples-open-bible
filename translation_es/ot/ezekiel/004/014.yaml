base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/004/014.yaml
  text: Then I said[a], “Ah, Lord Yahweh! Look, I have never defiled myself. From my youth until now I have not eaten what dies of itself or what is torn by beasts[c][b], and no unclean meat has entered my mouth.”
  footnotes:
  - marker: a
    text: 'Hebrew: ''my soul/life is not defiled''—an idiom meaning ''I have not made myself unclean.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'carcass and torn flesh'; that is, animals that died naturally or were killed by predators, both forbidden as food under Israel's purity laws.
    reason: cultural_note
  - marker: c
    text: Or 'abominable flesh.' The Hebrew term refers to meat rendered ritually unacceptable or defiled.
    reason: lexical_alternative
