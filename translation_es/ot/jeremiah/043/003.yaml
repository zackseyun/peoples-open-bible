  to: Porque Baruc, hijo de Nerías, te está incitando[a] contra nosotros, para entregarnos[b] en manos de los caldeos, para darnos muerte y para llevarnos al exilio a Babilonia[c].
  rationale: Se revisa «llevarnos cautivos» a «llevarnos al exilio» para reflejar con mayor precisión el hifil de גלה y la decisión léxica del POB inglés. Se ajusta «matarnos» a «darnos muerte» para mantener un registro más digno y cercano a «put us to death». Se simplifica la nota c para dejar como alternativa la formulación «deportarnos a Babilonia», ya que la otra opción pasa al texto principal.
  reviewer_model: gpt-5.4
