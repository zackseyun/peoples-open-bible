translation:
  language: es
  text: 'Y así harás con ellos para purificarlos: rocía sobre ellos el agua para purificación del pecado[a], y hagan pasar una navaja sobre toda su carne[b], y laven sus ropas, y así se purificarán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el agua de purificación»; literalmente, «agua de pecado».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «hagan pasar una navaja sobre toda su carne», es decir, afeiten todo su cuerpo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֹה
  english_pob_choice: And thus
  chosen_spanish: Y así
  alternatives_spanish:
  - Y de este modo
  - Así
  lexicon: HALOT
  rationale: La fórmula introduce el procedimiento prescrito; «Y así» conserva el valor instructivo y la conexión con el contexto inmediato sin sonar rígida.
- source_word: תַעֲשֶׂה לָהֶם
  english_pob_choice: you shall do to them
  chosen_spanish: harás con ellos
  alternatives_spanish:
  - harás para ellos
  - les harás
  lexicon: HALOT
  rationale: En español, «harás con ellos» comunica de manera natural la acción ritual dirigida a las personas, manteniendo el destinatario explícito.
- source_word: לְטַהֲרָם
  english_pob_choice: to cleanse them
  chosen_spanish: para purificarlos
  alternatives_spanish:
  - para limpiarlos ritualmente
  - para limpiarlos
  lexicon: HALOT
  rationale: En contexto ritual, טהר pide un verbo de purificación cultual. «Purificarlos» conserva el valor técnico sin reducirlo a limpieza física.
- source_word: הַזֵּה
  english_pob_choice: sprinkle
  chosen_spanish: rocía
  alternatives_spanish:
  - rocía sobre
  - asperja
  lexicon: HALOT
  rationale: «Rocía» expresa de forma clara la acción ritual de salpicar el líquido; es más natural para el lector moderno que un calco técnico menos transparente.
- source_word: מֵי חַטָּאת
  english_pob_choice: the water for purification from sin
  chosen_spanish: el agua de purificación
  alternatives_spanish:
  - el agua para purificación del pecado
  - el agua de pecado
  lexicon: HALOT
  rationale: El hebreo dice literalmente algo como «agua de pecado», pero el uso ritual apunta al agua empleada para purificación. Se mantiene el sentido funcional sin imponer una lectura sacrificial no expresada aquí.
- source_word: וְהֶעֱבִירוּ תַעַר
  english_pob_choice: let them pass a razor
  chosen_spanish: hagan pasar una navaja
  alternatives_spanish:
  - pasen una navaja
  - se afeiten con navaja
  lexicon: HALOT
  rationale: La imagen concreta del hebreo se conserva con «hagan pasar una navaja», reflejando el verbo causativo sin perder inteligibilidad.
- source_word: עַל כָּל בְּשָׂרָם
  english_pob_choice: over all their flesh
  chosen_spanish: sobre toda su carne
  alternatives_spanish:
  - sobre todo su cuerpo
  - sobre toda su piel
  lexicon: HALOT
  rationale: «Carne» preserva el léxico hebreo de בשר; en este contexto corporal alude a todo el cuerpo con el vello que debía rasurarse.
- source_word: וְכִבְּסוּ בִגְדֵיהֶם
  english_pob_choice: wash their clothes
  chosen_spanish: laven sus vestidos
  alternatives_spanish:
  - laven sus ropas
  - laven sus prendas
  lexicon: HALOT
  rationale: «Vestidos» mantiene un registro bíblico digno y reconoce el objeto ritual; «ropas» sería más común pero menos marcadamente textual.
- source_word: וְהִטֶּהָרוּ
  english_pob_choice: and so cleanse themselves
  chosen_spanish: y así quedarán purificados
  alternatives_spanish:
  - y se purificarán
  - y serán purificados
  lexicon: HALOT
  rationale: La secuencia culmina en un estado resultante. «Quedarán purificados» conserva la pasiva/resultativa implícita en el hebreo y el matiz de conclusión del rito.
theological_decisions:
- issue: Naturaleza ritual de la purificación en Números 8:7
  english_pob_reading: The verse describes a concrete ritual for the Levites; avoid importing later doctrinal categories of moral cleansing alone.
  chosen_spanish_reading: Se presenta como un rito concreto de purificación, sin reducirlo a limpieza moral ni forzar una explicación sacrificial explícita.
  alternative_spanish_readings:
  - Ritual de purificación cultual con lenguaje técnico
  - Limpieza moral interior
  rationale: El hebreo describe acciones rituales visibles (rociar, rasurar, lavar) y un resultado de purificación. La traducción debe conservar ese carácter cultual y no espiritualizarlo en exceso.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no se requerían cambios: el consenso fue de alta concordancia y solo hubo observaciones menores, por lo que se mantiene una solución equivalente-optativa estable.'
  spanish_consistency_notes:
  - Se conserva el tratamiento de YHWH como «Yahvé» en el proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se mantiene «purificar/purificados» para טהר, de acuerdo con el uso ritual del pasaje.
  - «Carne» se usa como equivalente de בשר para preservar la textura hebrea sin oscurecer el sentido corporal.
  - «Vestidos» se conserva por registro bíblico y correspondencia con בגדיהם.
