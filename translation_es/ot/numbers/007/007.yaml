review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: «dio», «los dos… y los cuatro…», «a los hijos de Gersón», y «conforme a su servicio». Sin embargo, en הַבָּקָר el original y la auditoría inglesa preservan un término colectivo bovino («cattle») con nota alternativa «oxen»; el español «animales de tiro» introduce una interpretación funcional no expresada léxicamente en el hebreo. También «carros» en español suele evocar automóviles en muchos contextos; aquí conviene una opción más clara para vehículos de transporte antiguos.'
  spanish_quality_summary: El texto es legible, pero «los cuatro animales de tiro» suena algo pesado y más interpretativo de lo necesario. «Carretas» y «ganado» producen una frase más natural y más fiel al léxico base en español eclesial general. La sintaxis global es buena.
  glossary_alignment: No hay términos teológicos mayores en juego. «A los hijos de Gersón» preserva adecuadamente לִבְנֵי גֵרְשׁוֹן, y «conforme a su servicio» mantiene bien כְּפִי עֲבֹדָתָם. La principal corrección léxica es evitar que הַבָּקָר pase de un colectivo bovino a una descripción funcional.
  issues:
  - severity: medium
    issue: «animales de tiro» para הַבָּקָר
    rationale: בָּקָר significa ganado bovino/colectivo bovino, no «animales de tiro» como tal. Aunque el contexto permita inferir uso de tiro, esa función no está en la palabra y la auditoría inglesa la evitó en el texto principal.
  - severity: medium
    issue: «carros» para עֲגָלֹת
    rationale: En español neutro actual «carros» suele entenderse como automóviles. Aunque etimológicamente posible, aquí puede distraer o sonar inadecuado. «Carretas» o «carros de carga» comunica mejor el referente antiguo.
  - severity: low
    issue: Nota de alternativa de «carretas»
    rationale: 'Si el texto principal cambia a «carretas», la alternativa debe invertirse para reflejar el expediente inglés: mantener una opción secundaria equivalente, como «carros» o mejor «carros de carga», sin repetir el texto principal.'
  revised_spanish_text: Les dio las dos carretas[a] y las cuatro cabezas de ganado[b] a los hijos de Gersón, conforme a su servicio.
