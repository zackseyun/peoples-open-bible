review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo y del POB inglés: intención hostil, golpe con la mano, resultado de muerte, pena capital obligatoria, categoría legal del culpable y acción del vengador de la sangre al encontrarlo. Sin embargo, dos elecciones debilitan la precisión: «ciertamente debe morir» no expresa tan bien el pasivo legal de מוֹת יוּמַת como «ciertamente se le dará muerte», y «homicida» atenúa la distinción contextual de רֹצֵחַ como homicida intencional; «asesino» comunica mejor aquí el valor de murderer.'
  spanish_quality_summary: El español es legible y digno, pero «hará morir» suena algo forzado en español bíblico-jurídico actual, mientras que «dará muerte» es más natural y mantiene el registro legal. También conviene evitar la nota al pie b tal como está, porque repite exactamente la expresión del texto principal como alternativa y no añade valor salvo la opción explícita de parentesco.
  glossary_alignment: No hay conflictos con terminología de proyecto como Yahvé/Mesías. Para este versículo, «vengador de la sangre» es aceptable y fiel al rastro POB, con nota opcional a «pariente-vengador de la sangre». La principal alineación lexical requerida es mantener la fuerza de intentional homicide con «asesino» más que «homicida» en este contexto específico.
  issues:
  - severity: medium
    issue: «ciertamente debe morir» para מוֹת יוּמַת
    rationale: La fórmula hebrea es una pena legal en voz pasiva intensificada; en español «debe morir» puede oírse como mera consecuencia, no necesariamente como ejecución judicial. «Ciertamente se le dará muerte» preserva mejor la fuerza legal.
  - severity: medium
    issue: «homicida» para רֹצֵחַ en contexto de enemistad
    rationale: Aunque es jurídicamente amplio, en este capítulo la distinción es entre muerte accidental y homicidio intencional. «Asesino» comunica mejor la culpabilidad intencional reflejada por murderer en el POB inglés.
  - severity: low
    issue: «hará morir» suena poco natural
    rationale: Reproduce el causativo, pero en español bíblico-jurídico «dará muerte» mantiene el registro y fluye mejor.
  - severity: low
    issue: Nota b repite la frase principal como alternativa
    rationale: Si el texto principal ya dice «vengador de la sangre», no conviene ofrecer exactamente la misma frase como alternativa. Mejor conservar solo la opción explicativa de parentesco.
  revised_spanish_text: O si lo hirió con su mano, en enemistad, y murió[a], el que lo hirió ciertamente se le dará muerte; es un asesino[b]. El vengador de la sangre dará muerte al asesino cuando lo encuentre.
  revised_footnotes:
