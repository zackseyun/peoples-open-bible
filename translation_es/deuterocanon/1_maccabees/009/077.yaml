base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_maccabees/009/077.yaml
  text: He encamped three thousand cavalry and a large force[a], and went to Azotus as though passing through; at the same time he was leading them into the plain[c][b], because he had a multitude of cavalry and trusted in it.
  footnotes:
  - marker: a
    text: The Greek source line ends mid-word ('καὶ κατε-'), indicating the sentence continues in the next verse. This translation renders only the complete portion preserved in this verse unit.
    reason: textual_variant
  - marker: b
    text: Or 'as though merely passing through,' suggesting a deceptive appearance rather than a straightforward march.
    reason: lexical_alternative
  - marker: c
    text: The pronoun in 'trusted in it' is singular in Greek and may refer specifically to his force or, more particularly, to his cavalry as the basis of his confidence.
    reason: lexical_alternative
