revisions:
- from: No te harás imagen tallada[a], ni ninguna semejanza de lo que está en los cielos arriba, ni en la tierra abajo[b], ni en las aguas debajo de la tierra.
  to: No te harás una imagen tallada[a], ni ninguna semejanza[b] de lo que está en los cielos arriba, ni de lo que está en la tierra abajo, ni de lo que está en las aguas debajo de la tierra.
  rationale: 'La revisión hace tres ajustes menores pero importantes: añade el artículo indefinido para español natural (''una imagen tallada''), conserva la distinción léxica entre פֶסֶל y תְּמוּנָה, y restablece en español el paralelismo de las tres cláusulas relativas del hebreo (''de lo que está...''). No cambia el sentido teológico ni introduce interpretación adicional.'
