  - severity: medium
    issue: «Hechos perversos» es menos natural y menos preciso que «obras perversas» en este contexto bíblico.
    rationale: Aunque «hechos» no es incorrecto, «obras» encaja mejor con עֲלִלוֹת y con el registro eclesial legible en español.
  - severity: low
    issue: La relación sintáctica de «con hombres que hacen iniquidad» puede sonar algo colgante tras «para practicar hechos perversos».
    rationale: Una redacción como «al practicar obras perversas con hombres que obran iniquidad» refleja mejor la asociación expresada en hebreo y fluye mejor en español.
  revised_spanish_text: No inclines mi corazón a ninguna cosa mala[a], al practicar obras perversas con hombres que obran iniquidad[b]; y no me dejes comer de sus manjares[c].
  revised_footnotes:
