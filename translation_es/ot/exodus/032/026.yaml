    text: 'El hebreo dice literalmente: «¿Quién para Yahvé? A mí». La traducción hace explícita la invitación implícita: «Que venga a mí».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «todos los levitas». Literalmente: «todos los hijos de Leví».'
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para que recaiga sobre la expansión implícita que realmente explica; se ajusta «se puso» a «se puso de pie» para mayor naturalidad y precisión; y se reemplaza «con él» por «junto a él» para conservar mejor el movimiento hacia Moisés expresado por אֵלָיו sin volver el español torpe.
