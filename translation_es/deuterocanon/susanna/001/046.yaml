translation:
  language: es
  text: 'Y gritó[a] a gran voz: «Soy inocente de la sangre de esta mujer[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «clamó a gran voz». El griego expresa un grito fuerte y audible.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «de la sangre de esta mujer»; es lenguaje bíblico de culpabilidad por derramamiento de sangre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐβόησεν
  english_pob_choice: cried out
  chosen_spanish: gritó
  alternatives_spanish:
  - clamó
  - dio un grito
  lexicon: BDAG
  rationale: βοάω denota un clamor o grito fuerte. En español, «gritó» reproduce bien la fuerza audible sin añadir matices ajenos; «clamó» sería más solemne, pero menos directo en este contexto.
- source_word: φωνῇ μεγάλῃ
  english_pob_choice: with a loud voice
  chosen_spanish: con gran voz
  alternatives_spanish:
  - en voz alta
  - con voz fuerte
  lexicon: BDAG
  rationale: La construcción instrumental conserva mejor la imagen del grito audible. «Con gran voz» es natural, solemne y próximo al griego; «en voz alta» sería más idiomático pero menos literal.
- source_word: Ἀθῷος
  english_pob_choice: innocent
  chosen_spanish: inocente
  alternatives_spanish:
  - libre de culpa
  - sin culpa
  - inocente de
  lexicon: LSJ
  rationale: El adjetivo expresa estar libre de culpa o responsabilidad. «Inocente» comunica bien el valor moral-jurídico en español y sigue la revisión inglesa más idiomática sin perder la tensión legal.
- source_word: ἀπὸ τοῦ αἵματος ταύτης
  english_pob_choice: of this woman’s blood
  chosen_spanish: de la sangre de esta mujer
  alternatives_spanish:
  - de la sangre de esta mujer
  - de esta sangre
  - respecto de la sangre de esta mujer
  lexicon: BDAG
  rationale: El giro de sangre aquí es lenguaje de culpabilidad por derramamiento de sangre. «De la sangre de esta mujer» preserva el idiomatismo bíblico y la referencia femenina explícita de ταύτης.
theological_decisions:
- issue: Idioma de sangre y culpabilidad
  english_pob_reading: I am innocent of this woman’s blood
  chosen_spanish_reading: Soy inocente de la sangre de esta mujer
  alternative_spanish_readings:
  - Soy inocente de esta mujer
  - No tengo culpa de la muerte de esta mujer
  - Estoy libre de la sangre de esta mujer
  rationale: El griego no habla solo de pureza ritual, sino de exención de culpabilidad por su muerte. La formulación española mantiene el lenguaje bíblico de sangre sin diluir la carga legal-moral.
  doctrine_reference: 'Translation philosophy: preserve source sense in readable modern Spanish; do not paraphrase beyond the text.'
translation_notes:
  revision_awareness: La base inglesa fue revisada de «clear from» a «innocent of» para sonar más natural sin perder el sentido de ἀπὸ τοῦ αἵματος ταύτης. La versión española sigue esa decisión revisada y conserva el idioma de sangre como indicador de culpabilidad legal-moral.
  spanish_consistency_notes:
  - He mantenido «Yahvé» para el Tetragrámaton en otros contextos del proyecto, pero aquí no aparece ningún nombre divino.
  - He usado «inocente» en sentido jurídico-moral, no como simple ausencia de intención.
  - La puntuación y la apertura de comillas siguen el uso español; el orden verbal conserva la estructura narrativa breve del griego.
