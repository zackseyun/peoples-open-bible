    issue: La nota al pie repite el texto principal
    rationale: La nota dice 'O «será llamado Juan»', que no ofrece ninguna alternativa real. El inglés documenta la alternativa 'he will be called John', que en español debe distinguirse del texto principal, por ejemplo 'se le llamará Juan'.
  revised_spanish_text: 'Y su madre respondió[a]: «No; más bien, será llamado Juan».'
  revised_footnotes:
