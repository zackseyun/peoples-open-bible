- from: No temas[a] delante de ellos, porque Yahvé tu Dios está en medio de ti[b], un Dios grande y temible[c].
  to: No les tengas miedo[a], porque Yahvé tu Dios está en medio de ti[c][b], un Dios grande y temible.
