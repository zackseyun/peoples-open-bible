revisions:
- from: Se elevaban hasta los cielos; descendían a las profundidades[a]. Su alma se derretía en angustia.
  to: Subían hasta los cielos; bajaban a las profundidades. Su alma[a] se deshacía en angustia.
  rationale: Ajusté los verbos a «Subían… bajaban» para reflejar de manera más directa y natural el paralelismo hebreo sin el matiz reflexivo de «se elevaban». Cambié «se derretía» por «se deshacía» para una metáfora más idiomática en español, manteniendo la idea de colapso interior. Reubiqué la nota al pie al lugar correcto, ya que trata sobre «alma» y «en angustia», no sobre «profundidades».
