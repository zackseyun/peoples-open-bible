  text: וַ/יַּ֨עַשׂ הַ/יָּשָׁ֜ר בְּ/עֵינֵ֣י יְהוָ֗ה כְּ/כֹ֤ל אֲשֶׁר עָשָׂה֙ עֻזִּיָּ֣הוּ אָבִ֔י/ו רַ֕ק לֹא בָ֖א אֶל הֵיכַ֣ל יְהוָ֑ה וְ/ע֥וֹד הָ/עָ֖ם מַשְׁחִיתִֽים־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/027/002.yaml
  text: He did what was right in the eyes of Yahweh[a], according to all that his father Uzziah had done—except that he did not enter the temple of Yahweh[b]. But the people still acted corruptly.
  footnotes:
  - marker: a
    text: Or 'he did not go into the temple of the LORD.' The clause likely contrasts Jotham with Uzziah, who unlawfully entered the temple (see 2 Chr 26:16–21).
    reason: cross_reference
  - marker: b
    text: Or 'the people still were corrupting themselves' / 'the people still behaved corruptly.'
    reason: lexical_alternative
