translation:
  language: es
  text: ¿O quién encerró el mar con puertas cuando irrumpió desde la matriz?[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «brotó con fuerza»; el verbo hebreo sugiere una salida repentina y vigorosa.
    reason: lexical_alternative
  - marker: b
    text: El verso personifica al mar como un niño que emerge de la matriz, manteniendo la imaginería de nacimiento del poema.
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּסֶךְ
  english_pob_choice: shut in
  chosen_spanish: encerró
  alternatives_spanish:
  - cerró dentro
  - metió dentro
  - sujetó
  lexicon: HALOT
  rationale: El verbo hebreo expresa la acción de contener o poner límites al mar. «Encerró» comunica bien esa contención activa en español sin perder la imagen concreta de confinamiento que la POB quiso mantener con «shut in».
- source_word: בִּדְלָתַיִם
  english_pob_choice: with doors
  chosen_spanish: con puertas
  alternatives_spanish:
  - con portones
  - con puertas dobles
  lexicon: HALOT
  rationale: La forma dual apunta a «puertas»; en español «con puertas» conserva la metáfora arquitectónica y la fuerza imagética mejor que una explicación más técnica.
- source_word: יָם
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el mar
  - el océano
  lexicon: HALOT
  rationale: «Mar» es el equivalente natural y bíblico en español para יָם en este contexto cósmico. Mantiene la imagen de la creación y evita una modernización innecesaria.
- source_word: בְּגִיחוֹ
  english_pob_choice: when it burst out
  chosen_spanish: cuando salió con ímpetu
  alternatives_spanish:
  - cuando brotó con fuerza
  - cuando irrompió
  lexicon: HALOT
  rationale: El verbo sugiere una salida vigorosa, casi impetuosa. «Salió con ímpetu» conserva la energía del hebreo y resulta idiomático en español, sin diluir el movimiento violento sugerido por la raíz.
- source_word: מֵרֶחֶם
  english_pob_choice: from the womb
  chosen_spanish: del vientre
  alternatives_spanish:
  - del seno
  - del vientre materno
  lexicon: HALOT
  rationale: En español, «vientre» transmite bien la imagen de nacimiento. Optar por «del vientre» mantiene la personificación poética del mar como recién nacido; «vientre materno» explicita demasiado la metáfora.
theological_decisions:
- issue: Imagen poética del mar como nacido de un vientre
  english_pob_reading: Retain the metaphor of God confining the sea at its birth without converting it into a purely abstract statement about creation order.
  chosen_spanish_reading: Mantener la metáfora del mar como si naciera del vientre, con Dios como quien lo contiene al salir.
  alternative_spanish_readings:
  - Reducirlo a una afirmación abstracta sobre la creación
  - Atenuar la personificación del mar
  rationale: 'El hebreo presenta una imagen poética intensa: el mar sale del vientre y Dios lo restringe con puertas. En español conviene preservar esa personificación porque es parte del argumento y del estilo del poema, no un adorno accidental.'
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail, que elimina la repetición redundante equivalente a «cuando llegó a salir», y por eso mantiene una sola expresión de la salida: «cuando salió con ímpetu del vientre».'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo poético del hebreo con una sola cláusula temporal compacta.
  - Se evitó traducir mecánicamente «womb» como un tecnicismo forzado; «vientre» preserva la imagen bíblica en español.
  - La pregunta inicial «¿O quién...?» refleja el hebreo interrogativo retórico y el tono del pasaje.
