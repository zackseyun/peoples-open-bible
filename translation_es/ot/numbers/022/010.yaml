- from: 'Y Balaam dijo a Dios[a]: «Balac, hijo de Zipor, rey de Moab, ha enviado a mí[b]».'
  to: 'Y Balaam dijo a Dios: «Balac, hijo de Zipor, rey de Moab, me[a] ha enviado»'
  rationale: Se corrige la frase principal a un español natural y fiel («me ha enviado») mientras se conserva en nota la literalidad de שָׁלַח אֵלַי y su alternativa contextual. Se elimina la nota incorrecta que decía «le ha enviado» y se unifican las observaciones filológicas en una sola nota útil.
