revisions:
- from: 'Y dijeron[a]: «He aquí, les hemos enviado dinero; y con el dinero compren holocaustos y ofrendas por el pecado e incienso, y preparen una ofrenda vegetal y preséntenla sobre el altar de Yahvé nuestro Dios»'
  to: 'Y dijeron: «He aquí, les hemos enviado dinero; y con el dinero compren ofrendas quemadas y ofrendas por el pecado y olíbano, y preparen una ofrenda de grano[a] y ofrézcanlas sobre el altar de Yahvé nuestro Dios»'
  rationale: Se corrigió el objeto final a plural («ofrézcanlas») para reflejar fielmente ἀνοίσατε y el contexto enumerativo de varias ofrendas. Se sustituyó «holocaustos» por «ofrendas quemadas» para una lectura bíblica más natural en español moderno y más cercana al inglés POB final. Se precisó λίβανον como «olíbano» y se ajustó «ofrenda vegetal» a «ofrenda de grano», que comunica con más claridad la idea de grain offering. Se eliminó la nota mal anclada en «dijeron» y se colocó correctamente en la expresión correspondiente a μάννα.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:37:34Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del griego: envío de dinero, compra de materiales sacrificiales, preparación de una ofrenda de grano y presentación sobre el altar. Sin embargo, hay dos desajustes importantes con la evidencia fuente y el rastro POB: (1) λίβανον es más preciso como «incienso aromático/olíbano» que el genérico «incienso»; y sobre todo (2) ἀνοίσατε es plural y el inglés POB conserva el plural «offer them», mientras que el español «preséntenla» reduce indebidamente el objeto al singular femenino, como si solo se ofreciera la ofrenda vegetal. El griego naturalmente abarca el conjunto de las ofrendas recién mencionadas.'
  spanish_quality_summary: El español es claro y digno, pero «holocaustos» suena hoy cargado por asociaciones modernas y resulta menos natural que «ofrendas quemadas» o «holocaustos» en registro técnico. Dado que el inglés adjudicado ya retrocedió a «burnt offerings», conviene evitar «holocaustos» en el texto principal en español. Además, «preséntenla» necesita corrección a un plural inclusivo. «He aquí» es aceptable en registro bíblico.
  glossary_alignment: Se alinea bien con la política de «Yahvé» en el texto principal. «Ofrendas por el pecado» y «ofrenda de grano/vegetal» son compatibles con las decisiones del proyecto. La principal divergencia terminológica es «holocaustos», que aunque defensible históricamente, no es la mejor opción aquí por claridad y por la revisión inglesa a «burnt offerings».
  issues:
  - severity: high
    issue: 'El verbo final está en singular: «preséntenla».'
    rationale: El griego ἀνοίσατε es plural y, en el contexto, manda ofrecer el conjunto de las ofrendas mencionadas, no solo la ofrenda vegetal. El inglés POB auditado también preserva el plural «offer them».
  - severity: medium
    issue: «Holocaustos» no es la mejor opción para ὁλοκαυτώματα en el texto principal.
    rationale: Aunque etimológicamente exacto, en español moderno tiene asociaciones fuertemente extrabíblicas y puede entorpecer la lectura. «Ofrendas quemadas» o «holocaustos» en nota sería más claro; además el inglés final prefirió «burnt offerings» en vez de «whole burnt offerings».
  - severity: low
    issue: «Incienso» es menos específico que λίβανον.
    rationale: El griego se refiere específicamente a frankincense. En español general «incienso» puede pasar, pero «olíbano» expresa mejor la precisión léxica si se desea máxima fidelidad.
  revised_spanish_text: 'Y dijeron: «He aquí, les hemos enviado dinero; y con el dinero compren ofrendas quemadas y ofrendas por el pecado y olíbano, y preparen una ofrenda de grano[a] y ofrézcanlas sobre el altar de Yahvé nuestro Dios»'
  revised_footnotes:
