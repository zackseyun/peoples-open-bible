revisions:
- from: Y si queda algo de la carne de la ofrenda de ordenación[a] o del pan hasta la mañana, entonces quemarás lo que haya quedado en el fuego. No se comerá, porque santo es.
  to: Y si queda algo de la carne de la ofrenda de ordenación[a] o del pan hasta la mañana, entonces quemarás con fuego lo que haya quedado. No se comerá, porque es santo.
  rationale: 'Se hicieron ajustes menores de estilo y naturalidad sin cambiar el sentido: «con fuego» mejora la idiomaticidad de בָּאֵשׁ en este contexto, y «porque es santo» expresa קֹדֶשׁ הוּא con español más claro y digno. No hay cambio sustantivo en la exégesis ni en la terminología principal.'
