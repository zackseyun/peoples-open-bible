translation:
  language: es
  text: 'Así hicieron los hijos de Benjamín: tomaron esposas según su número, de entre las danzantes[a] que habían arrebatado[b]. Entonces se fueron y regresaron a su heredad, reedificaron[c] las ciudades y habitaron en ellas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de entre las que danzaban'. El participio hebreo está en femenino plural.
    reason: lexical_alternative
  - marker: b
    text: O 'que habían tomado por la fuerza' o 'que se habían llevado'. El verbo hebreo denota una toma violenta.
    reason: lexical_alternative
  - marker: c
    text: Hebreo 'edificaron las ciudades'; 'reedificaron' refleja el contexto de las ciudades devastadas de Benjamín en la narración precedente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ כֵן
  english_pob_choice: did so
  chosen_spanish: Así hicieron
  alternatives_spanish:
  - Y lo hicieron así
  - Procedieron de ese modo
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea pide una equivalencia natural en español; 'Así hicieron' conserva la referencia al plan previo sin sonar mecánico.
- source_word: בְּנֵי בִנְיָמִן
  english_pob_choice: the sons of Benjamin
  chosen_spanish: los hijos de Benjamín
  alternatives_spanish:
  - los benjaminitas
  - el pueblo de Benjamín
  lexicon: HALOT
  rationale: Mantiene la expresión tribal/familiar del hebreo. 'Hijos de Benjamín' es transparente y conserva el color del texto fuente.
- source_word: וַיִּשְׂא֤וּ נָשִׁים
  english_pob_choice: took wives
  chosen_spanish: tomaron mujeres
  alternatives_spanish:
  - tomaron esposas
  - tomaron mujeres como esposas
  lexicon: HALOT
  rationale: En español, 'tomaron mujeres' refleja el giro hebreo, pero se aclara en el contexto narrativo que se trata de esposas; evita una paráfrasis excesiva y mantiene el idioma de origen.
- source_word: לְמִסְפָּרָם
  english_pob_choice: according to their number
  chosen_spanish: según su número
  alternatives_spanish:
  - de acuerdo con su número
  - en proporción a su número
  lexicon: HALOT
  rationale: '''Según su número'' es una equivalencia clara y natural para expresar la correspondencia cuantitativa indicada por el hebreo.'
- source_word: מִן הַמְּחֹלְלוֹת
  english_pob_choice: from the dancers
  chosen_spanish: de entre las danzantes
  alternatives_spanish:
  - de entre las bailarinas
  - de entre las que danzaban
  lexicon: HALOT
  rationale: El participio femenino plural se expresa de forma explícita en español con 'danzantes', preservando el matiz de mujeres que estaban bailando.
- source_word: אֲשֶׁר גָּזָלוּ
  english_pob_choice: whom they had seized
  chosen_spanish: que habían secuestrado
  alternatives_spanish:
  - que habían arrebatado
  - que habían llevado por la fuerza
  - que habían tomado por la fuerza
  lexicon: HALOT
  rationale: El verbo hebreo denota una toma violenta; 'secuestrado' conserva esa fuerza coercitiva en español y evita suavizar el acto.
- source_word: וַיֵּלְכ֗וּ וַיָּשׁ֨וּבוּ
  english_pob_choice: Then they went and returned
  chosen_spanish: Luego fueron y regresaron
  alternatives_spanish:
  - Entonces fueron y volvieron
  - Luego salieron y regresaron
  lexicon: HALOT
  rationale: Se conservan ambos verbos para reflejar la secuencia hebrea, usando un español fluido y adecuado para narración bíblica.
- source_word: אֶל נַחֲלָתָם
  english_pob_choice: to their inheritance
  chosen_spanish: a su heredad
  alternatives_spanish:
  - a su herencia
  - a su patrimonio heredado
  lexicon: HALOT
  rationale: '''Heredad'' mantiene la connotación de porción territorial asignada por herencia, más precisa que ''territorio'' en este contexto tribal.'
- source_word: וַיִּבְנוּ אֶת הֶעָרִים
  english_pob_choice: rebuilt the cities
  chosen_spanish: reedificaron las ciudades
  alternatives_spanish:
  - construyeron las ciudades
  - restauraron las ciudades
  lexicon: HALOT
  rationale: '''Reedificaron'' comunica en español la idea contextual de reconstrucción tras la devastación previa, conservando el verbo de edificación del hebreo.'
- source_word: וַיֵּשְׁבוּ בָּהֶם
  english_pob_choice: and lived in them
  chosen_spanish: y habitaron en ellas
  alternatives_spanish:
  - y vivieron en ellas
  - y se establecieron en ellas
  lexicon: HALOT
  rationale: '''Habitaron'' preserva el registro bíblico sin resultar arcaico, y corresponde bien al sentido de asentarse y residir.'
theological_decisions:
- issue: Fuerza moral del verbo גָּזָלוּ al describir la toma de las mujeres
  english_pob_reading: 'Render with coercive force: ''whom they had seized'''
  chosen_spanish_reading: '''que habían secuestrado'''
  alternative_spanish_readings:
  - '''que habían arrebatado'''
  - '''que habían tomado por la fuerza'''
  rationale: El hebreo no suaviza la violencia del acto; 'secuestrado' mantiene la carga coercitiva y evita una lectura que suene aprobatoria o neutralizante.
  doctrine_reference: Translation philosophy 1, 3, and 6
- issue: Conservar el lenguaje tribal y de posesión territorial
  english_pob_reading: Keep 'sons of Benjamin' and 'inheritance' in the main text
  chosen_spanish_reading: '''los hijos de Benjamín'' y ''su heredad'''
  alternative_spanish_readings:
  - '''los benjaminitas'''
  - '''su territorio'''
  rationale: Estas formas preservan la textura covenantal/tribal del pasaje y evitan aplanar el texto en términos meramente modernos o administrativos.
  doctrine_reference: Translation philosophy 1, 4, and 5
translation_notes:
  revision_awareness: Corregido para eliminar marcas de nota no ancladas en el texto. Se mantuvo una solución de equivalencia óptima que conserva el valor violento de גָּזָלוּ y la secuencia narrativa, sin necesidad de notas en este versículo.
  spanish_consistency_notes:
  - '''Hijos de Benjamín'' se usa de forma consistente para בני בנימין.'
  - '''Heredad'' se mantiene para נחלה en contexto tribal.'
  - '''Danzantes'' preserva el femenino plural del participio hebreo.'
  - '''Habitaron en ellas'' corresponde al cierre narrativo de asentamiento, evitando un término demasiado técnico.'
