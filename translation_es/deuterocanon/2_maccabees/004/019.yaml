review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido global del griego y sigue de cerca el POB en los elementos principales: la condena narrativa de Jasón, el envío oficial, la procedencia/representación desde Jerusalén, la suma de dinero y el rechazo a usarla en el sacrificio pagano. Sin embargo, «como embajadores antioquianos» suena sintácticamente torpe y puede sugerir que fueron enviados en calidad de embajadores hacia Antioquía, en vez de «delegados antioquenos/antioquianos» como objeto directo. Además, «sacrificio a Heracles» es comprensible pero en español suena más natural «sacrificio para Heracles» o mejor «sacrificio a Heracles» manteniendo el culto; el punto principal a corregir es la expresión de θεωρούς + Ἀντιοχέας.'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero «envió como embajadores antioquianos» no es la formulación más natural ni más precisa en español. «Envió delegados antioquianos desde Jerusalén» o «envió emisarios antioquianos» mejora la legibilidad y preserva el valor representativo sin la sobrecarga diplomática moderna de «embajadores». El resto del verso fluye bien. La nota [a] está bien formulada y correctamente anclada.
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. El nombre Heracles se conserva correctamente. La condena de μιερὸς como «vil» está bien preservada. La principal decisión léxica a ajustar es θεωρούς: «embajadores» resulta menos adecuado que «delegados» o «emisarios» en este contexto cultual/oficial.'
  issues:
  - severity: medium
    issue: «como embajadores antioquianos» no representa con suficiente naturalidad la sintaxis griega
    rationale: θεωρούς Ἀντιοχέας se entiende mejor como «delegados/envíos antioquianos», no como una frase adverbial «como embajadores». La construcción actual suena forzada y puede desviar la relación entre «antioquianos» y «embajadores».
  - severity: medium
    issue: «embajadores» introduce una carga diplomática moderna algo excesiva
    rationale: Aunque puede transmitir representación oficial, en español bíblico y eclesial «delegados» o «emisarios» encaja mejor con θεωροί, especialmente en un contexto de festival/sacrificio, sin sugerir necesariamente embajadas estatales formales.
  revised_spanish_text: Jasón, el hombre vil, envió delegados antioquianos desde Jerusalén[a], llevando trescientas dracmas de plata para el sacrificio a Heracles; pero los que las llevaban pidieron que no se usaran para sacrificio.
  revised_footnotes:
  - marker: a
    text: O «como de Jerusalén», quizá subrayando que fueron enviados en calidad representativa desde Jerusalén.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «como embajadores antioquianos» por «delegados antioquianos» para reflejar mejor θεωρούς Ἀντιοχέας en español natural, evitar una sobrelectura diplomática moderna, y conservar el sentido de enviados oficiales. Se mantiene el resto porque transmite fielmente el griego y el rastro de auditoría inglés.
