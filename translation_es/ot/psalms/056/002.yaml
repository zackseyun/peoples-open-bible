revisions:
- from: Sé benevolente conmigo[a], oh Dios, porque el hombre jadea tras de mí; todo el día, luchando, me oprime.
  to: Sé clemente conmigo, oh Dios, porque el hombre jadea tras de mí[a]; todo el día, luchando, me oprime.
  rationale: Se reemplaza «Sé benevolente conmigo» por «Sé clemente conmigo» para lograr una súplica natural y digna en español, fiel al sentido de favor/gracia divina sin añadir indebidamente el matiz penitencial de «misericordia». Se mantiene «jadea tras de mí» por su cercanía a la imagen hebrea, pero se añade la nota léxica requerida por el audit trail inglés y se mueve al verbo correspondiente. No se requiere adjudicación adicional.
