base_translation:
  language: en
  yaml_path: translation/ot/exodus/023/012.yaml
  text: For six days you shall do your work[a], but on the seventh day you shall cease, so that your ox and your donkey may rest[c][b], and the son of your female servant and the sojourner may be refreshed.
  footnotes:
