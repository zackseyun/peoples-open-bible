    text: O «una morada de chacales».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «ningún hombre ... ningún hijo de Adán»; es decir, ningún ser humano vivirá allí.'
    reason: lexical_alternative
  revision_rationale: Se conserva la fidelidad al hebreo y a la auditoría inglesa, pero se ajusta el español para mayor naturalidad y precisión semántica. 'Hijo de Adán' reproduce de forma más idiomática la expresión hebrea בֶּן אָדָם en español bíblico, y 'morará como forastero' mantiene mejor el matiz de גוּר que 'se hospedará'.
