base_translation:
  language: en
  yaml_path: translation/deuterocanon/baruch/002/001.yaml
  text: And the Lord has confirmed his word that he spoke against us and against our judges who judged Israel[a], and against our kings and against our rulers[b], and against the people of Israel and Judah.
  footnotes:
  - marker: a
    text: Or 'has established' or 'has fulfilled his word.' The Greek verb can mean to make a word stand, that is, to confirm or carry it out.
    reason: lexical_alternative
  - marker: b
    text: Or 'the people of Israel and Judah.' The Greek uses a singular human term collectively in a compressed expression.
    reason: lexical_alternative
