  to: Todavía hoy se detendrá en Nob; sacudirá[a] su mano contra el monte de la casa de Sión[b], la colina de Jerusalén.
  rationale: Se restituye en el texto principal la lectura apoyada por el hebreo suministrado ('casa de Sión') y se conserva la alternativa interpretativa en nota. También se corrige el anclaje de la nota léxica para que recaiga sobre el verbo pertinente.
