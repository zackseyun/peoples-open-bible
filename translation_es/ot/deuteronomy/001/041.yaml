base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/001/041.yaml
  text: Then you answered and said to me[a], ‘We have sinned against Yahweh. We ourselves will go up and fight, according to all that Yahweh our God commanded us.’ Then each man strapped on his weapons of war[b], and you presumptuously set out to go up into the hill country.
  footnotes:
  - marker: a
    text: Or 'rashly went up' / 'presumptuously went up.' The Hebrew verb is rare and conveys overconfident or reckless action.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the mountain'; in this context it likely refers more broadly to the hill country.
    reason: lexical_alternative
