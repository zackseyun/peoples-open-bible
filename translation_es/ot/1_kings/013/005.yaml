translation:
  language: es
  text: Y el altar fue desgarrado, y las cenizas fueron derramadas del altar, conforme a la señal[a] que el hombre de Dios había dado por la palabra de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como la señal», «conforme al prodigio» o «según el portento». El hebreo מוֹפֵת puede significar señal, prodigio o portento.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - el altar sacrificial
  lexicon: HALOT
  rationale: מִזְבֵּחַ designa de manera directa un altar cultual. En español, «el altar» es natural y suficiente; añadir «sacrificial» sería explicativo, pero no necesario en este contexto.
- source_word: נִקְרָע
  english_pob_choice: was torn apart
  chosen_spanish: fue arrancado
  alternatives_spanish:
  - fue partido
  - fue desgarrado
  - fue roto
  lexicon: HALOT
  rationale: קרע expresa la idea de rasgar, desgarrar o partir violentamente. «Fue arrancado» transmite una ruptura fuerte y pasiva en español, cercana al valor dramático del hebreo sin sonar forzado.
- source_word: וַיִּשָּׁפֵךְ
  english_pob_choice: were poured out
  chosen_spanish: fueron derramadas
  alternatives_spanish:
  - fueron vertidas
  - se derramaron
  lexicon: HALOT
  rationale: שׁפך suele significar derramar o verter. «Fueron derramadas» sigue bien el verbo y funciona con el sustantivo colectivo siguiente en español.
- source_word: הַדֶּשֶׁן
  english_pob_choice: the ashes
  chosen_spanish: las cenizas
  alternatives_spanish:
  - la ceniza
  - el residuo graso
  lexicon: HALOT
  rationale: En el contexto del altar, דֶּשֶׁן alude a las cenizas o residuo de la ofrenda. «Las cenizas» es la opción más clara y natural para el lector español.
- source_word: כַּמּוֹפֵת
  english_pob_choice: according to the sign
  chosen_spanish: conforme a la señal[a]
  alternatives_spanish:
  - según la señal
  - como la señal
  - conforme al prodigio
  lexicon: HALOT
  rationale: מוֹפֵת puede significar señal, prodigio o portento. «Conforme a la señal» preserva la relación de correspondencia/confirmación; el pie de nota conserva la amplitud semántica que el hebreo permite.
- source_word: אֲשֶׁר נָתַן
  english_pob_choice: that ... had given
  chosen_spanish: que el hombre de Dios había dado
  alternatives_spanish:
  - que el hombre de Dios había anunciado
  - que el hombre de Dios había establecido
  lexicon: HALOT
  rationale: נתן literalmente es «dar», y en español puede conservarse con «había dado» aplicado a «señal». Esto mantiene el enlace verbal del hebreo sin sobreinterpretarlo como mera predicción.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el profeta de Dios
  lexicon: HALOT
  rationale: Se conserva el título hebreo tradicional «el hombre de Dios» en vez de sustituirlo por «profeta», que sería una interpretación más específica que el texto no exige.
- source_word: בִּדְבַר יְהוָה
  english_pob_choice: by the word of Yahweh
  chosen_spanish: por la palabra de Yahvé
  alternatives_spanish:
  - según la palabra de Yahvé
  - mediante la palabra de Yahvé
  - por mandato de Yahvé
  lexicon: HALOT
  rationale: דבר puede ser palabra, asunto o mandato. «Por la palabra de Yahvé» conserva la fórmula bíblica y la referencia al nombre divino sin sustituirla por una traducción más restrictiva como «mandato».
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton. En español se sigue la convención del proyecto de verterlo como «Yahvé», manteniendo visible el nombre propio del pacto en lugar de ocultarlo con una sustitución genérica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de כַּמּוֹפֵת
  english_pob_reading: according to the sign / as the sign / in accordance with the wonder/portent
  chosen_spanish_reading: conforme a la señal
  alternative_spanish_readings:
  - como la señal
  - conforme al prodigio
  - según el portento
  rationale: El hebreo permite tanto correspondencia con una señal como matiz de prodigio o portento. «Conforme a la señal» es una solución clara y fiel; la nota preserva la tensión semántica que el inglés auditado también documenta.
  doctrine_reference: 'DOCTRINE.md: lexical ambiguity preserved where warranted'
translation_notes:
  revision_awareness: El auditor inglés revisó נִקְרָע de «torn open» a «torn apart» por mayor naturalidad y exactitud. La redacción española adopta una ruptura fuerte con «fue arrancado», manteniendo el carácter violento del acontecimiento sin añadir elementos no presentes. También se respetó la decisión revisada de traducir יְהוָה como el nombre divino visible, aquí «Yahvé».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al criterio del proyecto.
  - Se conserva «el hombre de Dios» como título fijo.
  - «Las cenizas» traduce el residuo del altar sin tecnicismo innecesario.
  - La nota de pie conserva la ambigüedad de מוֹפֵת sin desplazar el texto principal.
