  rationale: Se reemplazó la nominalización rígida por una formulación verbal natural y proverbial en español, en línea con el razonamiento del POB inglés y con el sentido hebreo. 'La piedra es pesada ... la arena pesa ... pesa más' conserva el campo semántico común de peso/pesadez y mejora notablemente la legibilidad. Se mantuvo 'ira' y 'necio' como equivalentes adecuados.
