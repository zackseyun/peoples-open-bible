  yaml_path: translation/ot/1_chronicles/026/008.yaml
  text: All these were from the sons of Obed-edom—they and their sons and their brothers[b][a], men of ability with strength for the service—sixty-two belonging to Obed-edom.
  footnotes:
  - marker: a
    text: Or 'their kinsmen' for 'their brothers,' if the term is taken more broadly for male relatives within the clan.
    reason: lexical_alternative
  - marker: b
    text: '''Able men'' translates a Hebrew expression that can also mean ''men of valor'' or ''valiant men''; here it likely emphasizes capable, strong men fit for temple duty.'
    reason: lexical_alternative
