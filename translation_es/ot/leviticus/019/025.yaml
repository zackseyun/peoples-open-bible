translation:
  language: es
  text: Y en el quinto año podrán comer su fruto, para que su producción les aumente. Yo soy Yahvé, su Dios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּבַשָּׁנָה הַחֲמִישִׁת
  english_pob_choice: And in the fifth year
  chosen_spanish: Y en el quinto año
  alternatives_spanish:
  - Pero en el quinto año
  - En el quinto año
  lexicon: HALOT
  rationale: La secuencia con waw + preposición funciona naturalmente en español como coordinación simple. Se evita “Pero” porque el hebreo no exige contraste fuerte; “Y” conserva el flujo legal de la instrucción.
- source_word: תֹּאכְלוּ
  english_pob_choice: you may eat
  chosen_spanish: comerán
  alternatives_spanish:
  - podrán comer
  - comerán ustedes
  lexicon: HALOT
  rationale: En esta cláusula jurídica, el imperfecto expresa permiso tras la restricción previa. En español, la forma futura simple puede comunicar esa autorización de manera sobria y natural; el contexto hace evidente el valor permisivo.
- source_word: אֶת פִּרְיֹו
  english_pob_choice: its fruit
  chosen_spanish: su fruto
  alternatives_spanish:
  - su fruta
  - su fruto
  lexicon: HALOT
  rationale: פְּרִי se traduce mejor por “fruto” en este contexto agrícola y bíblico. “Su” conserva el sufijo de tercera persona masculina singular, referido al árbol o plantación.
- source_word: לְהוֹסִיף
  english_pob_choice: so that it may increase
  chosen_spanish: para que les aumente
  alternatives_spanish:
  - para aumentar
  - para que aumente
  lexicon: HALOT
  rationale: El infinitivo con ל expresa propósito o resultado. “Para que” hace explícita la relación final sin perder la fuerza causal/teleológica del hebreo. Se elige una construcción que conserve la agencia implícita del proceso.
- source_word: תְּבוּאָתוֹ
  english_pob_choice: its produce
  chosen_spanish: su cosecha
  alternatives_spanish:
  - su produce
  - su rendimiento
  - su cosecha
  lexicon: HALOT
  rationale: תְּבוּאָה abarca produce, rendimiento o cosecha. “Cosecha” es la opción más idiomática en español y mantiene la referencia agrícola amplia sin reducir el término a una fruta específica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Yahweh
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: El nombre divino se rinde con la forma española establecida por el proyecto, “Yahvé”, en lugar de sustituirlo por “SEÑOR”. Esto preserva la identidad del nombre pactual presente en el hebreo.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios
  - vuestro Dios
  lexicon: HALOT
  rationale: Se mantiene “Dios” para אֱלֹהִים y el posesivo de segunda persona plural se adapta a un español neutral de registro bíblico. “Su” evita regionalismos y conserva la referencia comunitaria.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Yahweh
  rationale: El texto hebreo usa directamente el Tetragrámaton, y el proyecto pide preservar el nombre divino en español. “Yahvé” comunica el nombre pactual sin la sustitución tradicional por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Force of תֹּאכְלוּ in legal context
  english_pob_reading: you may eat
  chosen_spanish_reading: comerán
  alternative_spanish_readings:
  - podrán comer
  - comerán
  rationale: Aunque la forma inglesa opta por permiso explícito, en español el futuro simple en una norma puede expresar autorización por contexto. No introduce obligación; respeta el marco legal de la prohibición previa y la excepción del quinto año.
  doctrine_reference: Leviticus legal instruction context
- issue: Purpose/result relation of לְהוֹסִיף
  english_pob_reading: so that it may increase
  chosen_spanish_reading: para que les aumente
  alternative_spanish_readings:
  - para aumentarles
  - para que aumente
  rationale: La relación no es meramente consecutiva; el hebreo vincula la acción con un incremento del rendimiento. “Para que les aumente” conserva la finalidad y la orientación práctica del mandato.
  doctrine_reference: Hebrew infinitive construct with ל
translation_notes:
  revision_awareness: 'El borrador sigue el sentido del hebreo y toma la traducción inglesa auditada como contexto, pero no depende mecánicamente de ella. Se preservan las decisiones clave del proyecto: el nombre divino con forma española de Yahvé, el valor permisivo del verbo en contexto legal y el matiz de finalidad de לְהוֹסִיף. No se detectaron tensiones textuales que requirieran nota crítica adicional.'
  spanish_consistency_notes:
  - Se usa “Yahvé” para יְהוָה conforme al criterio del proyecto.
  - Se mantiene un español neutral y bíblico, evitando arcaísmos innecesarios.
  - “Fruto” y “cosecha” distinguen bien entre פְּרִי y תְּבוּאָה sin sobretraducir.
  - La segunda persona plural se expresa con “les/su” en registro neutral, sin regionalismo marcados.
