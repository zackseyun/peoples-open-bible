translation:
  language: es
  text: 'Pregunten ahora y vean: ¿acaso da a luz un varón? ¿Por qué entonces veo a todo hombre con las manos sobre sus lomos, como una mujer en trabajo de parto, y todos los rostros vueltos pálidos[a]?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “con una palidez verdosa”. El término hebreo sugiere un color enfermizo, de palidez verdosa o amarillenta.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁאֲלוּ נָא
  english_pob_choice: Ask now
  chosen_spanish: Pregunta ahora
  alternatives_spanish:
  - Pregunten ahora
  - Pregunta, por favor
  - Inquieran ahora
  lexicon: HALOT
  rationale: El imperativo plural con partícula de súplica/exhortación se expresa de forma natural en español con una exhortación directa. 'Pregunta ahora' conserva la urgencia retórica; en español puede sonar singular en forma, pero en este contexto funciona como llamado general equivalente al plural hebreo.
- source_word: וּרְאוּ
  english_pob_choice: and see
  chosen_spanish: y mira
  alternatives_spanish:
  - y vean
  - y observen
  - y miren
  lexicon: HALOT
  rationale: ראה es una invitación a constatar. 'Mira' mantiene la inmediatez retórica del verso y fluye bien con el mandato inicial; el sentido es exhortativo, no meramente visual.
- source_word: אִם יֹלֵד זָכָר
  english_pob_choice: does a male give birth?
  chosen_spanish: ¿acaso da a luz un varón?
  alternatives_spanish:
  - ¿da a luz un hombre?
  - ¿acaso un varón da a luz?
  - ¿un hombre puede dar a luz?
  lexicon: HALOT
  rationale: 'Se conserva la tensión biológica del hebreo: זָכָר apunta a ''varón/macho'' y יֹלֵד a ''dar a luz''. ''Varón'' reproduce mejor el contraste con el embarazo y el parto que ''hombre'', aunque ambas opciones son posibles.'
- source_word: מַדּוּעַ
  english_pob_choice: Why then
  chosen_spanish: ¿Por qué entonces
  alternatives_spanish:
  - ¿Por qué?
  - ¿Por qué, pues?
  - ¿Entonces por qué?
  lexicon: HALOT
  rationale: Introduce la inferencia retórica a partir de la imagen imposible anterior. 'Entonces' hace explícito el enlace argumentativo sin añadir contenido ajeno al hebreo.
- source_word: רָאִיתִי
  english_pob_choice: do I see
  chosen_spanish: veo
  alternatives_spanish:
  - he visto
  - estoy viendo
  - veía
  lexicon: HALOT
  rationale: El perfecto hebreo funciona con viveza presente en este discurso profético. El presente simple en español comunica mejor la escena inmediata que un pasado compuesto.
- source_word: כָל גֶּבֶר
  english_pob_choice: every man
  chosen_spanish: todo hombre
  alternatives_spanish:
  - todo varón
  - todo guerrero
  - todo fuerte
  lexicon: HALOT
  rationale: גבר puede expresar 'hombre' en cuanto varón robusto, y en este contexto la oposición con el parto se entiende bien con 'hombre'. 'Todo hombre' es natural en español y conserva el contraste general sin sobrecargar el matiz de fuerza.
- source_word: יָדָיו עַל חֲלָצָיו
  english_pob_choice: with his hands on his loins
  chosen_spanish: con las manos sobre sus lomos
  alternatives_spanish:
  - con las manos sobre su cintura
  - con las manos sobre sus caderas
  - con las manos sobre sus riñones
  lexicon: HALOT
  rationale: חֲלָצַיִם denota 'lomos/loins', con fuerza corporal y de dolor. 'Lomos' es más fiel al campo semántico bíblico que 'cintura' o 'caderas', aunque suene menos corriente.
- source_word: כַּיּוֹלֵדָה
  english_pob_choice: like a woman in labor
  chosen_spanish: como una mujer en labor de parto
  alternatives_spanish:
  - como una mujer que da a luz
  - como una mujer en trabajo de parto
  - como una parturienta
  lexicon: HALOT
  rationale: La forma femenina evoca claramente una mujer que está pariendo. 'Labor de parto' es un español claro y digno que conserva la imagen del sufrimiento del parto sin suavizarla.
- source_word: וְנֶהֶפְכוּ
  english_pob_choice: turned
  chosen_spanish: se han vuelto
  alternatives_spanish:
  - fueron transformados
  - se cambiaron
  - quedaron
  lexicon: HALOT
  rationale: נפך en esta construcción expresa cambio de estado o color. 'Se han vuelto' transmite bien la transformación visible del rostro en español contemporáneo.
- source_word: כָל פָּנִים
  english_pob_choice: every face
  chosen_spanish: todos los rostros
  alternatives_spanish:
  - cada rostro
  - todas las caras
  - todo semblante
  lexicon: HALOT
  rationale: El plural distributivo hebreo se traduce con naturalidad como 'todos los rostros'. 'Rostros' mantiene un registro bíblico sin caer en arcaísmo excesivo.
- source_word: לְיֵרָקוֹן
  english_pob_choice: pale
  chosen_spanish: pálidos
  alternatives_spanish:
  - con palidez
  - de color amarillento
  - con palidez verdosa
  lexicon: HALOT
  rationale: El término hebreo denota palidez, con posible matiz verdoso/amarillento. 'Pálidos' es el equivalente principal en el texto; el matiz cromático más preciso queda preservado en la nota.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el texto quedó en alto acuerdo con el control cruzado; por eso se mantiene la lectura de fondo de la POB inglesa y solo se adapta la formulación al español con fidelidad semántica.
  spanish_consistency_notes:
  - Se preserva el tono retórico interrogativo del hebreo con preguntas directas en español.
  - Se mantiene el contraste biológico 'varón/da a luz' para no suavizar la imposibilidad marcada por el original.
  - '''Lomos'' se conserva por su valor léxico bíblico, aun cuando en español común sea menos frecuente.'
  - La nota explica la alternativa cromática de לְיֵרָקוֹן sin desplazar la lectura principal de 'pálidos'.
