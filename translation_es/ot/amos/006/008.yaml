    rationale: Los marcadores deben aparecer en la palabra o frase pertinente. Tal como está, el lector asociará la nota al nombre divino, no a צְבָאוֹת.
  - severity: medium
    issue: La nota [a] usa el anglicismo metatraductológico «hosts».
    rationale: En una Biblia española no debe explicarse una alternativa tradicional en inglés; debe decir «huestes» o formularse enteramente en español.
  - severity: medium
