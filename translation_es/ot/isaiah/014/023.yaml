translation:
  language: es
  text: La convertiré en posesión del erizo[a] y en estanques de agua; y la barreré con la escoba de la destrucción, declara Yahvé de los Ejércitos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo קִפֹּד probablemente nombra un animal del desierto o de las ruinas; posibles traducciones incluyen 'puercoespín', 'búho' o el tradicional 'avetoro'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתִּיהָ
  english_pob_choice: I will make her
  chosen_spanish: La convertiré
  alternatives_spanish:
  - y la pondré
  - y la haré
  lexicon: HALOT
  rationale: 'שׂוּם admite ''poner'', ''hacer'' o ''convertir en'' según el complemento. Aquí el sentido es de cambio de estado: la ciudad queda transformada en algo distinto, por eso ''la convertiré'' comunica bien la idea sin perder la fuerza del verbo.'
- source_word: לְמוֹרַשׁ
  english_pob_choice: a possession of
  chosen_spanish: en posesión de
  alternatives_spanish:
  - como posesión de
  - en heredad de
  lexicon: HALOT
  rationale: מוֹרָשׁ expresa posesión, dominio o heredad. En español, 'en posesión de' mantiene la relación posesiva y suena natural con la imagen de una ciudad abandonada a criaturas del desierto.
- source_word: קִפֹּד
  english_pob_choice: hedgehog
  chosen_spanish: el erizo
  alternatives_spanish:
  - el puercoespín
  - el búho
  - la garza
  lexicon: HALOT
  rationale: El referente zoológico es incierto, pero en el audit trail inglés se eligió 'hedgehog'. 'Erizo' es la equivalencia más directa y comprensible en español moderno, sin cerrarse a una identificación más precisa que el texto no garantiza.
- source_word: וְאַגְמֵי מָיִם
  english_pob_choice: and pools of water
  chosen_spanish: y en estanques de agua
  alternatives_spanish:
  - y en charcas de agua
  - y en lagunas de agua
  - y en pantanos
  lexicon: HALOT
  rationale: אַגַם señala una acumulación de agua estancada o un humedal. 'Estanques de agua' conserva la imagen de agua quieta y el contraste con la ruina, evitando precisar más de lo que permite el hebreo.
- source_word: וְטֵאטֵאתִיהָ
  english_pob_choice: and I will sweep her
  chosen_spanish: la barreré
  alternatives_spanish:
  - la barreré y la limpiaré
  - la echaré con la escoba
  lexicon: HALOT
  rationale: El verbo expresa barrer con vigor, no limpiar en sentido suave. 'La barreré' es la forma natural y mantiene la metáfora de expulsión o desolación.
- source_word: בְּמַטְאֲטֵא
  english_pob_choice: with the broom
  chosen_spanish: con la escoba
  alternatives_spanish:
  - con el escobón
  - con una escoba
  lexicon: HALOT
  rationale: El instrumento es literalmente una escoba o escobón. 'Con la escoba' es claro y fiel en español; el artículo definido preserva el tono enfático del hebreo.
- source_word: הַשְׁמֵד
  english_pob_choice: of destruction
  chosen_spanish: de la destrucción
  alternatives_spanish:
  - de devastación
  - que destruye
  lexicon: HALOT
  rationale: שׁמד expresa destrucción, devastación o aniquilación. 'De la destrucción' conserva la genitividad metafórica del original y evita intensificar más allá del texto.
- source_word: נְאֻם
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - oráculo de
  - dice
  lexicon: HALOT
  rationale: La fórmula profética נְאֻם se traduce bien con 'declara' en español actual, manteniendo su solemnidad sin recurrir a una fórmula más arcaica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre divino según la convención del proyecto. 'Yahvé' es la forma establecida en el texto español y preserva el nombre propio frente a una sustitución por título.
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los ejércitos
  - de las huestes
  lexicon: HALOT
  rationale: צְבָאוֹת alude a ejércitos/huestes. 'De los Ejércitos' es una traducción transparente y reverente, y conserva el título divino sin la abstracción de 'huestes'.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo usa directamente el Tetragrama, no una sustitución. En español se sigue la convención del proyecto de transliterarlo como 'Yahvé', preservando el nombre personal de Dios.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sufijos femeninos que personifican a Babilonia
  english_pob_reading: her
  chosen_spanish_reading: la
  alternative_spanish_readings:
  - ella
  rationale: Los sufijos femeninos del hebreo tratan a Babilonia como ciudad personificada. En español, el objeto directo 'la' conserva esa personificación sin forzar una repetición innecesaria del pronombre sujeto.
  doctrine_reference: Isaiah prophetic personification of cities
- issue: Referencia zoológica de קִפֹּד
  english_pob_reading: hedgehog
  chosen_spanish_reading: erizo
  alternative_spanish_readings:
  - puercoespín
  - búho
  - garza
  rationale: El término hebreo es discutido. Siguiendo el criterio del audit trail inglés, se usa una equivalencia moderna común, pero se mantiene la cautela mediante la nota de alternativa lexical.
  doctrine_reference: Lexical uncertainty in prophetic fauna imagery
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español, anclado en la frase correspondiente. No se introdujeron cambios de fondo en la lectura, solo ajustes de formato y concordancia idiomática.
  spanish_consistency_notes:
  - Se usó 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - Se prefirió 'de los Ejércitos' para צְבָאוֹת por transparencia y naturalidad en español.
  - La personificación femenina de Babilonia se conserva con 'la'.
  - La nota [a] está anclada en el término zoológico problemático para preservar la incertidumbre lexical.
