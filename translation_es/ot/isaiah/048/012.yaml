translation:
  language: es
  text: 'Escucha, Jacob, e Israel[a], a quien llamé: yo soy él[b]; yo soy el primero, y yo soy el último.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «Israel, mi llamado».
    reason: lexical_alternative
  - marker: b
    text: 'O: «yo soy el mismo» o «yo soy el que es». La expresión hebrea es una fórmula compacta de autoidentificación divina que aparece repetidamente en Isaías.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמַע
  english_pob_choice: Listen
  chosen_spanish: Escúchame
  alternatives_spanish:
  - Oye
  - Escucha
  lexicon: HALOT
  rationale: El imperativo de שׁמע pide atención obediente. «Escúchame» suena natural en español moderno y conserva la fuerza del mandato sin volverlo frío o arcaico.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  - hacia mí
  lexicon: HALOT
  rationale: Con el verbo de escucha en español, el complemento directo pronominal «me» expresa con naturalidad la dirección personal del llamado; «a mí» también sería posible, pero resulta menos fluido aquí.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Jacobo
  lexicon: N/A
  rationale: Nombre propio estándar. Se conserva «Jacob» por fidelidad y claridad intertextual con el hebreo.
- source_word: וְיִשְׂרָאֵל
  english_pob_choice: and Israel
  chosen_spanish: e Israel
  alternatives_spanish:
  - y Israel
  lexicon: N/A
  rationale: En español, «e» es la forma eufónica de «y» ante palabra inicial con sonido vocálico /i/. Mantiene el paralelismo vocativo.
- source_word: מְקֹרָאִי
  english_pob_choice: whom I called
  chosen_spanish: a quien llamé
  alternatives_spanish:
  - mi llamado
  - el que llamé
  - mi llamado por mí
  lexicon: HALOT
  rationale: El participio pasivo/resultativo con sufijo de 1ª persona se entiende mejor en contexto como referente a Israel como el llamado por Dios. «A quien llamé» sigue la lectura del POB inglés y evita la construcción menos natural «mi llamado», aunque se preserva la tensión lexical de un término que también puede sonar nominal.
- source_word: אֲנִי הוּא
  english_pob_choice: I am he
  chosen_spanish: yo soy él
  alternatives_spanish:
  - yo soy
  - yo soy el que soy
  lexicon: HALOT
  rationale: La fórmula breve de autoidentificación divina se conserva con la misma concisión. «Yo soy él» refleja mejor la tersura y ambigüedad reverente del hebreo que una expansión explicativa.
- source_word: רִאשׁוֹן
  english_pob_choice: the first
  chosen_spanish: el primero
  alternatives_spanish:
  - primero
  - el primero en el tiempo
  lexicon: HALOT
  rationale: Aquí funciona como designación sustantivada; el artículo español ayuda a conservar el valor titular y absoluto del hebreo, como en el POB inglés.
- source_word: אַף
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - también
  - incluso
  - aun
  lexicon: HALOT
  rationale: Aunque אַף puede intensificar o añadir matiz, en esta coordinación poética el español más natural es «y», que conserva el equilibrio y el paralelismo. El matiz de adición queda implícito por la estructura.
- source_word: אַחֲרוֹן
  english_pob_choice: the last
  chosen_spanish: el último
  alternatives_spanish:
  - último
  - el postrero
  lexicon: HALOT
  rationale: Se mantiene la forma sustantivada y paralela con «el primero». «El último» es claro, digno y fiel al forcejo absoluto de la expresión.
theological_decisions:
- issue: Fórmula divina אֲנִי הוּא
  english_pob_reading: I am he
  chosen_spanish_reading: yo soy él
  alternative_spanish_readings:
  - yo soy
  - yo soy el que soy
  rationale: Se conserva la fórmula compacta de autoidentificación sin convertirla en una paráfrasis doctrinal. «Yo soy él» mantiene la tensión teológica y literaria del hebreo, evitando resolverla en una expresión más explicativa.
  doctrine_reference: Preservar la tensión textual y la autodeclaración divina en Isaías.
- issue: Título temporal/ontológico en רִאשׁוֹן ... אַחֲרוֹן
  english_pob_reading: the first ... the last
  chosen_spanish_reading: el primero ... el último
  alternative_spanish_readings:
  - primero ... último
  - el primero en todo ... el último en todo
  rationale: La forma con artículo conserva el valor titular y absoluto de la expresión, sin expandirla. Así se mantiene la resonancia bíblica de la unicidad y soberanía de Dios a través del tiempo.
  doctrine_reference: Mantener la afirmación de unicidad divina sin sobreinterpretación.
translation_notes:
  revision_awareness: El borrador sigue de cerca el audit trail inglés y el hebreo masorético. No se aplicaron revisiones previas; se conservó la estructura vocativa, la fórmula divina breve y el paralelismo titular «el primero / el último», ajustando únicamente la sintaxis al español natural.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto cuando el texto hebreo contiene el nombre divino; aquí no aparece יהוה, por lo que no aplica.
  - Se preserva «Israel» como nombre propio y vocativo colectivo, sin convertirlo en paráfrasis eclesiástica.
  - Se mantiene una dicción sobria y bíblica en español, evitando tanto arcaísmos innecesarios como explicaciones que borren la ambigüedad teológica del original.
