    rationale: 'בַחֲמִשָּׁה לַחֹדֶשׁ es una expresión dataria: «en el quinto día del mes» / «a los cinco del mes», no una duración de cinco días. La redacción actual introduce una lectura temporal equivocada.'
  - severity: medium
    issue: «cautiverio» no refleja la decisión léxica auditada para גָּלוּת.
    rationale: El inglés POB eligió «exile» como referencia cronológica más amplia e idiomática, con nota para «deportation». «Cautiverio» desplaza el matiz hacia prisión/condición de cautivo y se aparta del razonamiento documentado.
  revised_spanish_text: A los cinco del mes—era el quinto año del exilio del rey Joaquín—[a]
