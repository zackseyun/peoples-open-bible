theological_decisions:
- issue: Whether the chapter’s complaint should be flattened into mere existential despair
  chosen_reading: Baruch’s speech is rendered as a moral-theological protest about divine justice, the fate of the righteous, and the apparent prosperity of sinners.
  alternative_readings:
  - a purely philosophical reflection on mortality
  - a generalized lament with no judicial emphasis
  rationale: The repeated judgment language, the contrast between sinners and righteous, and the appeal to God’s wisdom all show that Baruch is wrestling with divine moral order, not only with human frailty.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Meaning of the righteous persons’ ‘works’ kept with God
  chosen_reading: The draft preserves the imagery of works being kept with God as stored reward, without softening it into vague ‘faithfulness.’
  alternative_readings:
  - their memory is preserved with God
  - their virtue alone is in view without recompense imagery
  rationale: The chapter’s logic pairs present righteousness with future vindication. Keeping the treasury/store imagery preserves the apocalyptic moral economy of the passage.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
- issue: Human mortality in the breath simile
  chosen_reading: 'The comparison is kept literal and creaturely: humanity is like a breath that rises and vanishes.'
  alternative_readings:
  - human life is meaningless
  - human life is only metaphorically fragile
  rationale: The chapter stresses transience and limited human control, but not nihilism. A literal rendering preserves the text’s anthropology without overinterpreting it.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
