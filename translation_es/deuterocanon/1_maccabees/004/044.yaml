lexical_decisions:
- source_word: ἐβουλεύσαντο
  english_pob_choice: they deliberated
  chosen_spanish: deliberaron
  alternatives_spanish:
  - tomaron consejo
  - consultaron
  - discutieron
  lexicon: BDAG
  rationale: El medio expresa consulta o deliberación conjunta, no solo una decisión final. «Deliberaron» conserva ese matiz colectivo con un español natural y digno.
- source_word: περὶ τοῦ θυσιαστηρίου
  english_pob_choice: concerning the altar
  chosen_spanish: acerca del altar
  alternatives_spanish:
  - sobre el altar
  - en cuanto al altar
  lexicon: BDAG
  rationale: La preposición indica el tema de la deliberación. «Acerca de»/«en cuanto a» reproduce bien el valor de περί sin añadir contenido ajeno.
- source_word: τῆς ὁλοκαυτώσεως
  english_pob_choice: of burnt offering
  chosen_spanish: del holocausto
  alternatives_spanish:
  - del sacrificio entero
  - de la ofrenda quemada
  lexicon: BDAG
  rationale: En español bíblico, «holocausto» es el equivalente cultual más directo de ὁλοκαύτωσις. Mantiene la función sacrificial del altar sin convertir la expresión en una paráfrasis.
- source_word: τοῦ βεβηλωμένου
  english_pob_choice: defiled
  chosen_spanish: profanado
  alternatives_spanish:
  - contaminado
  - desecrado
  - manchado
  lexicon: BDAG
  rationale: El participio describe una violación ritual del objeto sagrado. «Profanado» conserva la fuerza cultual y la alternativa documentada en la nota inglesa sin sonar demasiado técnica.
- source_word: τί αὐτῷ ποιήσωσιν
  english_pob_choice: what they should do with it
  chosen_spanish: qué harían con él
  alternatives_spanish:
  - qué debían hacer con él
  - qué podrían hacer con él
  lexicon: BDAG
  rationale: La cláusula expresa la cuestión práctica de su disposición. En español, «qué harían con él» transmite bien la deliberación sobre el destino del altar; «con él» refleja αὐτῷ.
theological_decisions:
- issue: Estado cultual del altar
  english_pob_reading: defiled altar of burnt offering
  chosen_spanish_reading: altar del holocausto profanado
  alternative_spanish_readings:
  - altar del holocausto contaminado
  - altar del holocausto desecrado
  rationale: El griego marca un altar consagrado al holocausto que ha sido ritualmente violado. «Profanado» mantiene la tensión cultual sin suavizarla ni introducir una doctrina adicional.
  doctrine_reference: Lexical/contextual cultic translation; no doctrinal shift.
translation_notes:
  revision_awareness: El texto griego presenta una deliberación colectiva sobre el altar ya profanado y sobre su disposición; la redacción española mantiene esa secuencia sin convertir la pregunta final en una orden ni atenuar el matiz cultual de βεβηλωμένου. Se prefirió «profanado» por su fuerza religiosa y porque corresponde bien al rango de alternativas documentado en la tradición inglesa.
  spanish_consistency_notes:
  - Se conservó «holocausto» para ὁλοκαύτωσις por ser el término cultual establecido en español bíblico y por reflejar el carácter sacrificial del altar.
  - Se mantuvo el pronombre de objeto directo «él» para αὐτῷ porque el referente es el altar y el español requiere concordancia natural.
  - La estructura «del altar del holocausto profanado» sigue el orden natural del español sin perder la relación genitiva del griego.
