    rationale: 'El inglés POB conservó una nota importante: el hebreo dice simplemente «hablaron», aunque el contexto implica reportar. Esa alternativa conviene preservarse también en español.'
  - severity: low
    issue: «Habitaba» es menos natural que «vivía».
    rationale: Ambas opciones son fieles, pero «vivía» suena más claro y moderno sin perder dignidad.
