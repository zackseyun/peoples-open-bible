revisions:
- from: 'Porque así ha dicho el Alto y Sublime[a], el que habita la eternidad, cuyo nombre es Santo: «Yo habito en la altura y en la santidad, y también con el quebrantado y humilde de espíritu[b], para reavivar el espíritu de los humildes y para reavivar el corazón de los quebrantados».'
