translation:
  language: es
  text: Pero si engendra un hijo violento[a], uno que derrama sangre, y hace una de estas cosas,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Y engendra un hijo violento, uno que derrama sangre, y hace una de estas cosas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹלִיד
  english_pob_choice: But if he fathers
  chosen_spanish: Pero si engendra
  alternatives_spanish:
  - Y engendra
  - Pero si es padre de
  - Pero si procrea
  lexicon: HALOT
  rationale: הוליד expresa engendrar o hacer padre. En español, «engendra» conserva el matiz de generación paterna con un registro natural y digno. Se mantiene el valor adversativo de la conjunción en función del contraste discursivo del contexto.
- source_word: בֵּן
  english_pob_choice: a ... son
  chosen_spanish: un hijo
  alternatives_spanish:
  - un hijo varón
  - un hijo
  - un niño
  lexicon: HALOT
  rationale: בֵּן significa «hijo»; «hijo» reproduce el referente masculino singular sin sobreexplicar. «Hijo varón» sería más explícito, pero innecesario en este contexto.
- source_word: פָּרִיץ
  english_pob_choice: violent
  chosen_spanish: violento
  alternatives_spanish:
  - rudo
  - desenfrenado
  - perverso
  - sin freno
  lexicon: HALOT
  rationale: פָּרִיץ denota a alguien violento, desmedido o rapaz. «Violento» es la opción más directa y transparente en español para este campo semántico, y encaja con la cláusula siguiente sobre derramamiento de sangre.
- source_word: שֹׁפֵךְ דָּם
  english_pob_choice: one who sheds blood
  chosen_spanish: un derramador de sangre
  alternatives_spanish:
  - uno que derrama sangre
  - un que derrama sangre
  - un homicida
  lexicon: HALOT
  rationale: La construcción participial hebrea literalmente es «que derrama sangre». «Derramador de sangre» conserva la fuerza idiomática y evita restringir el sentido solo a «homicida» en términos legales, aunque incluye esa idea.
- source_word: וְעָשָׂה
  english_pob_choice: and does
  chosen_spanish: y hace
  alternatives_spanish:
  - y comete
  - y practica
  - y realiza
  lexicon: HALOT
  rationale: עָשָׂה es el verbo general «hacer». «Hace» mantiene la sencillez del hebreo y permite que el complemento implícito se concrete por el contexto.
- source_word: מֵאַחַד מֵאֵלֶּה
  english_pob_choice: of these things
  chosen_spanish: cualquiera de estas cosas
  alternatives_spanish:
  - una sola de estas cosas
  - una de estas cosas
  - alguna de estas cosas
  lexicon: HALOT
  rationale: La frase significa «de una de estas». En español, «cualquiera de estas cosas» comunica con claridad el alcance distributivo e indeterminado del hebreo. El matiz de singularidad queda expresado por «cualquiera».
theological_decisions:
- issue: Valor adversativo-condicional de la conjunción inicial
  english_pob_reading: But if he fathers
  chosen_spanish_reading: Pero si engendra
  alternative_spanish_readings:
  - Y engendra
  - Entonces engendra
  rationale: Aunque el hebreo abre con una simple conjunción, el flujo del pasaje contrapone este caso al del padre justo del versículo anterior. «Pero si» expresa bien esa transición sin añadir contenido doctrinal.
  doctrine_reference: Coherencia discursiva del texto profético; equivalencia óptima.
translation_notes:
  revision_awareness: 'Se revisó el hebreo de base y el paquete auditado en inglés. El resultado coincide sustancialmente con la lectura inglesa revisada: se mantiene la fuerza condicional-adversativa del inicio, el singular masculino de בן, el campo semántico de violencia/derramamiento de sangre, y el cierre distributivo de «una/cualquiera de estas cosas». No se detectaron cambios textuales relevantes en la última pasada del audit trail.'
  spanish_consistency_notes:
  - Se prefirió «engendra» por su transparencia semántica frente a «es padre de», que sonaría más perifrástico.
  - Se evitó «SEÑOR» u otros reemplazos litúrgicos; este versículo no contiene el nombre divino.
  - «Derramador de sangre» conserva el giro hebreo sin reducirlo de forma prematura a un tecnicismo legal.
  - El plural de referencia en «estas cosas» sigue el valor distributivo del hebreo, aunque el texto diga «una de».
