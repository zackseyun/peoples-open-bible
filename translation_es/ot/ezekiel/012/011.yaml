translation:
  language: es
  text: 'Di[a]: «Yo soy una señal para ustedes: tal como he hecho, así se hará con ellos; al destierro[b], al cautiverio irán»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Yo soy su señal» o «Yo soy un portento para ustedes». El hebreo מוֹפֵת puede denotar una señal, un portento o una maravilla simbólica.
    reason: lexical_alternative
  - marker: b
    text: Se conservan ambas expresiones, «destierro» y «cautiverio», para reflejar la duplicación enfática del hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱמֹר
  english_pob_choice: Say
  chosen_spanish: Di
  alternatives_spanish:
  - Di,
  - Diles
  lexicon: HALOT
  rationale: El imperativo singular de אמר introduce una orden profética directa. «Di» es la forma natural y fiel en español para esta apertura oracular.
- source_word: מֽוֹפֶתְכֶם
  english_pob_choice: a sign to you
  chosen_spanish: una señal para ustedes
  alternatives_spanish:
  - su señal
  - un portento para ustedes
  - una maravilla simbólica para ustedes
  lexicon: HALOT
  rationale: מוֹפֵת puede ser señal, portento o prodigio simbólico. En este contexto funciona como acto profético representativo; «señal» comunica bien esa función sin cargar el término con matices supersticiosos. «Para ustedes» sigue el valor direccional del hebreo y evita una posesión demasiado rígida.
- source_word: כַּאֲשֶׁר עָשִׂיתִי
  english_pob_choice: just as I have done
  chosen_spanish: así como yo he hecho
  alternatives_spanish:
  - como yo hice
  - según lo que yo he hecho
  lexicon: HALOT
  rationale: La comparación enlaza la acción simbólica de Ezequiel con el cumplimiento venidero. El pretérito perfecto compuesto en español conserva la fuerza de acción ya realizada con relevancia presente.
- source_word: כֵּן יֵעָשֶׂה לָהֶם
  english_pob_choice: so it shall be done to them
  chosen_spanish: así se hará con ellos
  alternatives_spanish:
  - así les será hecho
  - así lo harán con ellos
  lexicon: HALOT
  rationale: El nifal de עשה tiene sentido pasivo aquí. «Se hará con ellos» mantiene el foco en lo que les sucederá, sin introducir un agente explícito.
- source_word: בַּגּוֹלָה
  english_pob_choice: into exile
  chosen_spanish: en el destierro
  alternatives_spanish:
  - al destierro
  - en el exilio
  lexicon: HALOT
  rationale: גּוֹלָה designa la condición o situación de exilio. «Destierro» es idiomático en español y conserva el matiz de expulsión/alejamiento; se prefiere aquí a «exilio» por claridad estilística, sin perder el sentido.
- source_word: בַשְּׁבִי
  english_pob_choice: into captivity
  chosen_spanish: en el cautiverio
  alternatives_spanish:
  - al cautiverio
  - en la cautividad
  lexicon: HALOT
  rationale: שְׁבִי refiere a la condición de cautividad. «Cautiverio» mantiene la distinción con גּוֹלָה y preserva la doble formulación enfática del hebreo.
- source_word: יֵלֵכוּ
  english_pob_choice: they shall go
  chosen_spanish: irán
  alternatives_spanish:
  - se irán
  - ellos irán
  lexicon: HALOT
  rationale: El imperfecto de הלך expresa resultado futuro. «Irán» es la opción más natural y directa en español, manteniendo el tono profético.
theological_decisions:
- issue: Naturaleza de la acción profética de Ezequiel
  english_pob_reading: I am a sign to you
  chosen_spanish_reading: Yo soy una señal para ustedes
  alternative_spanish_readings:
  - Yo soy su señal
  - Yo soy un portento para ustedes
  rationale: La frase presenta la vida/acto de Ezequiel como señal profética, no solo como anuncio. «Señal» conserva esa función reveladora y evita connotaciones supersticiosas que «portento» podría sugerir en español.
  doctrine_reference: Sign-act prophetic symbolism (cf. Ezequiel 12)
- issue: Duplicación semítica de juicio
  english_pob_reading: into exile, into captivity they shall go
  chosen_spanish_reading: en el destierro, en el cautiverio irán
  alternative_spanish_readings:
  - al destierro, al cautiverio irán
  - irán al destierro, al cautiverio
  rationale: Se conserva la duplicación de dos términos cercanos pero no idénticos para reflejar la intensificación retórica del hebreo. No se fusionan en una sola idea para no perder el peso del juicio anunciado.
  doctrine_reference: Hebrew intensification / judgment formula
translation_notes:
  revision_awareness: La versión inglesa auditada revisó 'for you' a 'to you' por mayor naturalidad frente al hebreo, manteniendo el mismo sentido. Esta propuesta sigue esa revisión con «para ustedes»/«señal para ustedes», y conserva la duplicación final («destierro, cautiverio») como en el POB inglés.
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma estándar cuando aparezca el nombre divino; en este versículo no se requiere.
  - «Señal» se usa como término técnico para signo profético, coherente con otros pasajes del corpus.
  - Se preserva la distinción entre «destierro» y «cautiverio» para no aplanar la fuerza poética del hebreo.
