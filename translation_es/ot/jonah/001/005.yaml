    issue: El marcador de nota [a] está colocado en «marineros», pero la nota explica «carga/aparejos/artículos».
    rationale: 'Esto crea un error editorial objetivo: el anclaje de la nota no corresponde al término discutido en la nota ni al hebreo הַכֵּלִים.'
  - severity: medium
