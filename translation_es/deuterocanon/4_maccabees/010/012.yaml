translation:
  language: es
  text: 'Y cuando este hermano murió de manera digna de sus hermanos[a], arrastraron al cuarto hacia delante, diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «habiendo muerto de un modo digno de un hermano». La expresión significa que murió de una manera propia de uno de los hermanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: τούτου
  english_pob_choice: this one
  chosen_spanish: este
  alternatives_spanish:
  - él
  - este hombre
  lexicon: LSJ
  rationale: El demostrativo griego conserva una referencia deíctica al hermano ya mencionado. En español, «este» mantiene esa cercanía referencial sin sobrecargar el texto con un sustantivo innecesario.
- source_word: θανόντος
  english_pob_choice: had died
  chosen_spanish: murió
  alternatives_spanish:
  - habiendo muerto
  - había muerto
  lexicon: LSJ
  rationale: El genitivo absoluto expresa una acción previa; en español narrativo, «y cuando este murió» reproduce con naturalidad la secuencia anterior sin perder la relación temporal.
- source_word: ἀδελφοπρεπῶς
  english_pob_choice: in a manner worthy of his brothers
  chosen_spanish: de manera digna de sus hermanos
  alternatives_spanish:
  - fraternalmente
  - de modo hermano-digno
  - de una manera propia de un hermano
  lexicon: LSJ
  rationale: El adverbio literalmente apunta a un comportamiento adecuado a un hermano. «De manera digna de sus hermanos» conserva la fuerza honorífica y la referencia familiar sin sonar forzado en español.
- source_word: τὸν τέταρτον
  english_pob_choice: the fourth
  chosen_spanish: al cuarto
  alternatives_spanish:
  - al cuarto hermano
  - al cuarto de los hermanos
  lexicon: LSJ
  rationale: Como el contexto ya establece la serie de hermanos, el ordinal puede quedar sustantivado en español. «Al cuarto» sigue de cerca el griego y suena natural en la narración.
- source_word: ἐπεσπῶντο
  english_pob_choice: they dragged forward
  chosen_spanish: arrastraron
  alternatives_spanish:
  - trajeron a rastras
  - lo arrastraron hacia adelante
  lexicon: LSJ
  rationale: El verbo implica impulso coercitivo y físico. «Arrastraron» conserva la violencia de la acción; el complemento implícito se entiende por el contexto narrativo.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - mientras decían
  lexicon: LSJ
  rationale: El participio presente introduce el discurso directo siguiente; «diciendo» preserva la ligazón participial y la fluidez del relato.
theological_decisions:
- issue: Honor familiar y martirio
  english_pob_reading: in a manner worthy of his brothers
  chosen_spanish_reading: de manera digna de sus hermanos
  alternative_spanish_readings:
  - fraternalmente
  - como correspondía a un hermano
  rationale: No se trata de una doctrina explícita, pero sí de una carga ética y honorífica importante en el contexto macabeo. La traducción conserva la valoración de la muerte como acto digno, sin diluirla en una formulación más general.
  doctrine_reference: Ética del martirio y honor familiar en 4 Macabeos
translation_notes:
  revision_awareness: El texto griego disponible es breve y coincide sustancialmente con la auditoría inglesa, que también opta por una traducción óptima y transparente del genitivo absoluto y del adverbio ἀδελφοπρεπῶς. No se registran revisiones aplicadas; la propuesta española sigue de cerca esa lectura con naturalidad idiomática.
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según corresponda en otros contextos, pero aquí no aparece lenguaje divino.
  - Se mantiene un registro sobrio y narrativo, acorde con la prosa martirial del libro.
  - La nota conserva la alternativa literal sin introducir terminología eclesiástica ajena al pasaje.
