translation:
  language: es
  text: ¿O acaso no saben que todos los que fuimos bautizados en Mesías Jesús[a] fuimos bautizados en su muerte?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «Cristo Jesús». Griego: Χριστὸν Ἰησοῦν.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἢ
  english_pob_choice: Or
  chosen_spanish: ¿O acaso…?
  alternatives_spanish:
  - ¿O…?
  - ¿O es que…?
  lexicon: BDAG
  rationale: Conserva la transición argumentativa y el tono retórico de reprensión suave. En español, '¿O acaso no saben…?' reproduce bien el matiz interrogativo de ἢ ἀγνοεῖτε sin sonar rígido.
- source_word: ἀγνοεῖτε
  english_pob_choice: do you not know
  chosen_spanish: no saben
  alternatives_spanish:
  - ignoran
  - no están enterados
  lexicon: BDAG
  rationale: La pregunta retórica en presente se expresa de manera natural con 'no saben'. Mantiene la apelación a un conocimiento compartido sin añadir una explicación doctrinal.
- source_word: ὅσοι
  english_pob_choice: all of us who
  chosen_spanish: todos los que
  alternatives_spanish:
  - cuantos
  - nosotros los que
  lexicon: BDAG
  rationale: En español, 'todos los que' comunica de forma idiomática el alcance inclusivo del relativo plural. La primera persona plural queda reforzada por 'fuimos bautizados'.
- source_word: ἐβαπτίσθημεν
  english_pob_choice: were baptized
  chosen_spanish: fuimos bautizados
  alternatives_spanish:
  - nos bautizaron
  - recibimos el bautismo
  lexicon: BDAG
  rationale: El aoristo pasivo se vierte de forma directa y sobria. 'Fuimos bautizados' conserva el valor eventivo y evita interpretar el acto más allá de lo que dice el griego.
- source_word: εἰς
  english_pob_choice: into
  chosen_spanish: en
  alternatives_spanish:
  - hacia
  - dentro de
  - en unión con
  lexicon: BDAG
  rationale: En español, 'bautizados en' comunica la misma imagen de incorporación que 'into' en inglés. No se resuelve el mecanismo teológico del bautismo, preservando la tensión del texto.
- source_word: Χριστὸν Ἰησοῦν
  english_pob_choice: Messiah Jesus
  chosen_spanish: Mesías Jesús
  alternatives_spanish:
  - Cristo Jesús
  - Jesucristo
  lexicon: BDAG
  rationale: Se mantiene 'Mesías' para Χριστός conforme a la preferencia POB cuando funciona como título. El orden 'Mesías Jesús' reproduce el sintagma del griego sin convertirlo en un nombre fijo castellano.
- source_word: θάνατον
  english_pob_choice: death
  chosen_spanish: muerte
  alternatives_spanish:
  - muerte física
  - fallecimiento
  lexicon: BDAG
  rationale: '''Muerte'' es la equivalencia directa y suficiente para θάνατος. No se amplía el término, porque el texto solo dice ''su muerte''.'
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de él
  - propia
  lexicon: BDAG
  rationale: El posesivo español expresa naturalmente el genitivo pronominal. 'Su muerte' conserva la relación con Mesías Jesús sin añadir explicaciones.
theological_decisions:
- issue: Cómo traducir εἰς con lenguaje de bautismo sin fijar una teoría sacramental específica.
  english_pob_reading: Translated both instances of 'into' to preserve incorporation imagery while avoiding denominational resolution.
  chosen_spanish_reading: Traducir ambos εἰς con 'en' para conservar la imagen de incorporación sin resolver mecánicamente la relación entre bautismo y unión con Cristo.
  alternative_spanish_readings:
  - '''hacia'''
  - '''dentro de'''
  - '''en unión con'''
  rationale: '''En'' suena natural en español y mantiene la idea de entrar o quedar incorporado a una nueva esfera. Se evita convertir el versículo en una afirmación explícita de eficacia sacramental o en una mera metáfora simbólica.'
  doctrine_reference: Preservar la tensión teológica sin resolverla
- issue: Cómo tratar Χριστός en este contexto.
  english_pob_reading: The English audit trail restored 'Messiah Jesus' after a regression fix changed it to 'Christ Jesus'.
  chosen_spanish_reading: '''Mesías Jesús'' en vez de ''Cristo Jesús''.'
  alternative_spanish_readings:
  - '''Cristo Jesús'''
  - '''Jesucristo'''
  rationale: La política terminológica del proyecto favorece 'Mesías' cuando Χριστός actúa como título. En español, 'Mesías Jesús' conserva ese valor titular y evita el deslizamiento hacia un nombre eclesiástico más tradicional.
  doctrine_reference: Terminología de Χριστός/Mesías según la política del proyecto
translation_notes:
  revision_awareness: El audit trail inglés muestra una oscilación entre 'Messiah Jesus' y 'Christ Jesus', con restauración final de 'Messiah'. La presente versión sigue la decisión terminológica del proyecto para Χριστός como título, manteniendo 'Mesías Jesús' en el texto principal y añadiendo la alternativa tradicional en nota. También se conservó la decisión de no resolver teológicamente εἰς más allá de una incorporación expresada en español con 'en'.
  spanish_consistency_notes:
  - Se mantiene 'Mesías' como equivalente principal de Χριστός, coherente con la política del proyecto.
  - '''Bautizados en'' busca una equivalencia idiomática sin perder la fuerza de incorporación del griego.'
  - La pregunta retórica se formula con registro natural y reverente, adecuado para lectura pública.
  - No se introduce mayúscula en 'mesías' porque funciona como título en el sintagma propio 'Mesías Jesús'.
