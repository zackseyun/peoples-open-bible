base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/020/042.yaml
  text: Jonathan said to David[a], “Go in peace, since the two of us have sworn in the name of Yahweh, saying, ‘May Yahweh be between me and you[b], and between my offspring and your offspring forever.’”
  footnotes:
  - marker: a
    text: 'Or, ''The LORD will be between me and you.'' The Hebrew imperfect may be read as a simple future, though in this oath context it likely carries an invoked sense: ''May the LORD be.'''
    reason: alternative_reading
  - marker: b
    text: '''Between me and you'' implies the LORD as the one overseeing or witnessing the covenant between them.'
    reason: cultural_note
