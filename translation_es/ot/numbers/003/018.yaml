  lexicon: HALOT
  rationale: El sustantivo en estado constructo pide la relación «de» en español; «los nombres de» reproduce la estructura del hebreo con claridad.
- source_word: בְּנֵי גֵרְשׁוֹן
  english_pob_choice: the sons of Gershon
  chosen_spanish: los hijos de Gersón
  alternatives_spanish:
