  glossary_alignment: 'Cumple con las convenciones principales del proyecto. No hay conflicto con Yahvé/Mesías/etc. La cuestión terminológica clave es בְּרִיתוֹ: aunque «pacto» es posible, «alianza» se alinea mejor con el uso bíblico y eclesial en español y comunica mejor la carga relacional de בְּרִית. La nota [b] debe conservarse, pero con la razón y redacción ajustadas al audit trail inglés como alternativa de formulación previa («ha ordenado su alianza»).'
