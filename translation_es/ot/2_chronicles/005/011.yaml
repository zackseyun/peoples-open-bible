translation:
  language: es
  text: Y cuando los sacerdotes salieron del Lugar Santo—porque todos los sacerdotes que estaban presentes se habían consagrado[a], sin observar sus divisiones—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin atenerse a sus divisiones», es decir, sin observar los cursos sacerdotales normales.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y sucedió que cuando
  - Y aconteció que cuando
  lexicon: HALOT
  rationale: La forma narrativa introduce un nuevo evento en secuencia. «Y cuando» conserva la función temporal sin volver el español innecesariamente pesado.
- source_word: בְּצֵאת
  english_pob_choice: came out
  chosen_spanish: salían
  alternatives_spanish:
  - salieron
  - al salir
  lexicon: HALOT
  rationale: El infinitivo constructo con ב marca una cláusula temporal. En español, el imperfecto «salían» expresa con naturalidad la acción en desarrollo al ocurrir el siguiente hecho.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los presbíteros
  - los ministros
  lexicon: HALOT
  rationale: כהנים corresponde de forma estándar a «sacerdotes» en contexto cultual. Se evita «presbíteros», que introduce un registro eclesiástico no exigido por el texto.
- source_word: מִן־הַקֹּדֶשׁ
  english_pob_choice: of the Holy Place
  chosen_spanish: del Lugar Santo
  alternatives_spanish:
  - del santuario
  - del lugar santo
  lexicon: HALOT
  rationale: En contexto del templo, הַקֹּדֶשׁ designa el espacio sagrado concreto. «Lugar Santo» comunica el ámbito cultual con claridad y sin diluirlo en abstracción.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de lo anterior. «Porque» da la relación explicativa de modo natural en español.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno de los
  lexicon: HALOT
  rationale: Expresa el alcance total del grupo sacerdotal presente.
- source_word: הַנִּמְצְאִים
  english_pob_choice: who were present
  chosen_spanish: que estaban presentes
  alternatives_spanish:
  - que se hallaban allí
  - que estaban allí
  lexicon: HALOT
  rationale: El participio de מצא aquí significa los que estaban disponibles/en el lugar. «Que estaban presentes» es idiomático y preciso.
- source_word: הִתְקַדָּשׁוּ
  english_pob_choice: had consecrated themselves
  chosen_spanish: se habían consagrado
  alternatives_spanish:
  - se habían santificado
  - se habían hecho santos
  lexicon: HALOT
  rationale: El hitpael de קדש expresa preparación ritual. «Consagrarse» conserva el sentido cultual mejor que un término más moralizante como «santificarse».
- source_word: אֵין לִשְׁמֹר לְמַחְלְקוֹת
  english_pob_choice: without regard to divisions
  chosen_spanish: sin guardar sus divisiones
  alternatives_spanish:
  - sin atenerse a sus turnos
  - sin observar sus divisiones
  lexicon: HALOT
  rationale: Se preserva la tensión lexical de מַחְלְקוֹת como divisiones/cursos sacerdotales. «Sin guardar sus divisiones» es fiel y suficientemente claro; evita borrar la referencia a los turnos sacerdotales.
theological_decisions:
- issue: Ritual consecration versus moral sanctification
  english_pob_reading: had consecrated themselves
  chosen_spanish_reading: se habían consagrado
  alternative_spanish_readings:
  - se habían santificado
  rationale: El contexto trata de preparación cultual para el servicio del templo, no de una afirmación doctrinal sobre santificación moral. «Consagrarse» mantiene el matiz ritual y evita sobrecargar el verso con lenguaje devocional posterior.
  doctrine_reference: 'Translation philosophy: preserve source-text ritual sense; readable modern Spanish.'
- issue: Priestly divisions / courses
  english_pob_reading: without regard to divisions
  chosen_spanish_reading: sin guardar sus divisiones
  alternative_spanish_readings:
  - sin atenerse a sus turnos
  - sin observar las divisiones
  rationale: La frase explica que no se respetaron los cursos sacerdotales normales en esa ocasión. «Divisiones» conserva la correspondencia con מַחְלְקוֹת; el complemento posesivo «sus» ayuda a entender que se trata de la organización sacerdotal.
  doctrine_reference: Historical-cultic context; avoid importing later ecclesiastical terminology.
translation_notes:
  revision_awareness: La versión inglesa auditada mantiene una equivalencia óptima y no requiere correcciones textuales; el español sigue esa línea, conservando el orden narrativo, el sentido cultual de «Lugar Santo» y la referencia institucional a las divisiones sacerdotales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología por defecto, pero este versículo no contiene el tetragrámaton.
  - «Sacerdotes» se usa para כהנים en coherencia con la política terminológica del proyecto.
  - «Consagrarse» se eligió para el sentido ritual de הִתְקַדָּשׁוּ, evitando una carga moral ajena al contexto.
  - La nota al pie preserva la alternativa «turnos» porque el español introduce naturalmente esa aclaración para מַחְלְקוֹת.
