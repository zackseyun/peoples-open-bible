translation:
  language: es
  text: Porque lo he conocido[a], para que mande a sus hijos[d] y a su casa después de él, y guarden el camino de Yahvé, haciendo rectitud y justicia[c], para que Yahvé haga venir sobre Abraham lo que ha hablado acerca de él[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo he elegido». El verbo hebreo normalmente significa «conocer», pero en este contexto puede llevar el sentido de favor especial o elección.'
    reason: alternative_reading
  - marker: b
    text: 'O: «lo que le ha prometido». El hebreo dice más literalmente: «lo que ha hablado acerca de él».'
    reason: lexical_alternative
  - marker: c
    text: Es decir, la manera de vivir que Yahvé requiere.
    reason: cultural_note
  - marker: d
    text: «Hijos» es masculino en hebreo; la frase alude en primer lugar a la descendencia masculina de Abraham, aunque «su casa» amplía el alcance más allá de los hijos solamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְדַעְתִּיו
  english_pob_choice: I have known him
  chosen_spanish: lo he conocido
  alternatives_spanish:
  - lo he elegido
  - lo conozco
  lexicon: HALOT
  rationale: El verbo ידע normalmente significa «conocer». En este contexto puede implicar conocimiento relacional con connotación de elección, pero la forma básica sigue siendo «conocer»; por eso se mantiene en el texto principal la lectura más directa y se reserva la alternativa en nota.
- source_word: לְמַעַן אֲשֶׁר
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - con el fin de que
  lexicon: HALOT
  rationale: Expresa finalidad. «Para que» es natural en español y conserva el valor purposivo sin añadir paráfrasis.
- source_word: יְצַוֶּה
  english_pob_choice: he may command
  chosen_spanish: mande
  alternatives_spanish:
  - ordene
  - instriuy a
  lexicon: HALOT
  rationale: La piel de צוה expresa mandar/encargar con fuerza. «Mande» comunica bien esa fuerza en español contemporáneo.
- source_word: בָּנָיו
  english_pob_choice: his children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus descendientes
  lexicon: HALOT
  rationale: Aunque el hebreo es masculino, el audit trail en inglés adoptó «children» por el alcance contextual. En español, «hijos» puede abarcar descendencia en este contexto y evita restringirlo innecesariamente a varones.
- source_word: בֵּיתוֹ
  english_pob_choice: his household
  chosen_spanish: su casa
  alternatives_spanish:
  - su casa doméstica
  - su hogar
  lexicon: HALOT
  rationale: בית puede referirse a la unidad doméstica, no solo al edificio. «Su casa» conserva la expresión bíblica y puede incluir la esfera familiar; la nota aclara la amplitud de sentido.
- source_word: אַחֲרָיו
  english_pob_choice: after him
  chosen_spanish: después de él
  alternatives_spanish:
  - tras él
  - siguiéndolo
  lexicon: HALOT
  rationale: Refiere sucesión temporal y de ejemplo/autoridad. «Después de él» es la forma más directa y transparente en español.
- source_word: וְשָׁמְרוּ
  english_pob_choice: they may keep
  chosen_spanish: guarden
  alternatives_spanish:
  - observen
  - conserven
  lexicon: HALOT
  rationale: שׁמר con «camino» implica fidelidad sostenida. «Guarden» es natural y preserva la idea de adherirse al camino.
- source_word: דֶּרֶךְ יְהוָה
  english_pob_choice: the way of Yahweh
  chosen_spanish: el camino de Yahvé
  alternatives_spanish:
  - la senda de Yahvé
  lexicon: HALOT
  rationale: Se conserva la imagen de «camino» como modo de vida ético-pactual. Se usa «Yahvé» por la convención del proyecto para el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte según la norma del proyecto como «Yahvé», preservando el nombre propio divino y no un título sustitutivo.
- source_word: לַעֲשׂוֹת
  english_pob_choice: by doing
  chosen_spanish: haciendo
  alternatives_spanish:
  - al hacer
  - para hacer
  lexicon: HALOT
  rationale: El infinitivo explica el modo en que guardan el camino. El gerundio español expresa bien esa relación instrumental/modo.
- source_word: צְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia recta
  lexicon: HALOT
  rationale: En la pareja con משפט, צְדָקָה puede llevar la idea de rectitud/justicia. Se opta por «justicia» aquí para evitar romper la fluidez de la pareja con «rectitud» en el segundo término; la decisión se documenta para mostrar la tensión semántica.
- source_word: וּמִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: rectitud
  alternatives_spanish:
  - juicio
  - justicia
  lexicon: HALOT
  rationale: En este paralelo, מִשְׁפָּט incluye la idea de orden recto, juicio justo y práctica correcta. En español, «rectitud» permite distinguirlo de צְדָקָה sin perder el campo ético-jurídico; la pareja «justicia y rectitud» es una solución de equilibrio, no una reducción lexical.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - con el fin de que
  lexicon: HALOT
  rationale: Marca propósito/resultad0. «Para que» mantiene el enlace sintáctico claro en español.
- source_word: הָבִיא יְהוָה עַל אַבְרָהָם
  english_pob_choice: the LORD may bring upon Abraham
  chosen_spanish: Yahvé haga venir sobre Abraham
  alternatives_spanish:
  - Yahvé traiga sobre Abraham
  - Yahvé haga venir a Abraham
  lexicon: HALOT
  rationale: El hebreo con בוא + על puede expresar hacer venir sobre alguien. «Haga venir sobre Abraham» conserva la construcción y el sentido de cumplimiento/acontecimiento que recae sobre él.
- source_word: אֵת אֲשֶׁר דִּבֶּר עָלָיו
  english_pob_choice: what he has spoken concerning him
  chosen_spanish: lo que ha hablado acerca de él
  alternatives_spanish:
  - lo que le ha prometido
  - lo que ha dicho sobre él
  lexicon: HALOT
  rationale: El texto dice literalmente «lo que ha hablado acerca de él». «Acerca de él» mantiene la referencia abierta; «ha prometido» sería interpretativo, aunque contexto-sensible.
theological_decisions:
- issue: Si ידע debe verterse con sentido electivo («elegido») o relacional («conocido»).
  english_pob_reading: I have known him
  chosen_spanish_reading: lo he conocido
  alternative_spanish_readings:
  - lo he elegido
  rationale: Se preserva el valor léxico básico del verbo sin convertir en texto principal una inferencia teológica. La posible carga electiva se mantiene disponible en nota como lectura alternativa legítima.
  doctrine_reference: Translation philosophy §1, §3
- issue: Cómo representar el Tetragrámaton יְהוָה.
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  rationale: La política del proyecto exige transliterar el nombre divino, no sustituirlo por un título. «Yahvé» conserva el nombre propio revelado y evita aplanar el texto.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
- issue: Cómo entender la pareja צְדָקָה / מִשְׁפָּט.
  english_pob_reading: righteousness and justice
  chosen_spanish_reading: justicia y rectitud
  alternative_spanish_readings:
  - rectitud y justicia
  - justicia y juicio
  rationale: En español, «justicia y rectitud» transmite el campo ético del par sin sacrificar claridad. La decisión acepta una leve reordenación semántica para reflejar una distinción útil entre los dos términos hebreos, evitando la repetición plana de «justicia» en ambos.
  doctrine_reference: Translation philosophy §2, contested ethical terms
- issue: El alcance de בָּנָיו / בֵּיתוֹ en el contexto.
  english_pob_reading: his children and his household
  chosen_spanish_reading: sus hijos y su casa
  alternative_spanish_readings:
  - sus hijos y su familia
  - sus descendientes y su casa
  rationale: «Hijos» conserva el referente primario masculino, mientras «su casa» amplía la esfera doméstica. El conjunto comunica el alcance genealógico y doméstico del mandato sin forzar una neutralización completa.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: El audit trail en inglés fue revisado para preferir «children» en vez de «sons» por el alcance contextual de בנים. La versión española sigue ese ajuste con «hijos». También se mantuvo la decisión de traducir el nombre divino como «Yahvé» y de preservar el valor literal de ידע, con la lectura electiva en nota. Para el par צְדָקָה / מִשְׁפָּט, la solución española busca equilibrar claridad y distinción semántica entre ambos términos.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en todo el versículo para el Tetragrámaton.
  - Se conserva el paralelismo verbal con dos cláusulas finales de propósito introducidas por «para que».
  - La combinación «justicia y rectitud» intenta distinguir los dos miembros del par hebreo sin perder su unidad ética.
  - «Su casa» se usa en sentido doméstico/colectivo, no meramente arquitectónico.
  - Los marcadores de nota aparecen solo donde hay alternativas o aclaraciones necesarias, y no se repiten para distintas notas.
