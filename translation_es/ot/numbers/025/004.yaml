translation:
  language: es
  text: 'Yahvé dijo a Moisés: «Toma a todos los líderes del pueblo y empálalos[a] para Yahvé, a plena luz del día[b], para que se aparte de Israel el ardor de la ira de Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Toma a todos los líderes del pueblo y haz que ejecuten a los culpables ante Yahvé, a plena luz del día». El pronombre hebreo «los» se refiere más directamente a los líderes, pero algunos entienden que se les manda a ellos ejecutar el castigo.'
    reason: alternative_reading
  - marker: b
    text: 'Literalmente: «frente al sol».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino personal del Tetragrámaton, conforme al criterio del proyecto. 'Yahvé' es la forma española establecida aquí y evita la sustitución por un título.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: כָּל רָאשֵׁי הָעָם
  english_pob_choice: all the leaders of the people
  chosen_spanish: todos los líderes del pueblo
  alternatives_spanish:
  - todos los jefes del pueblo
  - todos los cabezas del pueblo
  lexicon: HALOT
  rationale: Aunque la expresión hebrea dice literalmente 'las cabezas del pueblo', el propio auditor inglés optó por 'leaders' para evitar una lectura corporal extraña en español. 'Líderes' comunica con claridad la función de autoridad sin perder el sentido colectivo del hebreo.
- source_word: וְהוֹקַע אֹתָם
  english_pob_choice: and impale them
  chosen_spanish: y cuélgalos
  alternatives_spanish:
  - e impálalos
  - y ejecútalos públicamente
  - y cuélgalos en alto
  lexicon: HALOT
  rationale: El verbo hebreo admite una ejecución/exposición pública severa; el inglés POB conservó 'impale' por fuerza lexical. En español, 'cuélgalos' es la forma más natural y reconocible para reproducir esa exposición pública, sin suavizar indebidamente la violencia ni forzar un tecnicismo menos transparente. Se conserva la tensión interpretativa del objeto pronominal.
- source_word: לַיהוָה
  english_pob_choice: for Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - para Yahvé
  - a Yahvé
  - delante de Yahvé
  lexicon: HALOT
  rationale: La preposición expresa dedicación/relación sacral; 'para Yahvé' sigue de cerca el valor indicado por el auditor inglés ('for Yahweh') y evita introducir una localización no presente en el hebreo.
- source_word: נֶגֶד הַשָּׁמֶשׁ
  english_pob_choice: in broad daylight
  chosen_spanish: a plena luz del día
  alternatives_spanish:
  - ante el sol
  - en pleno día
  - a la vista del sol
  lexicon: HALOT
  rationale: La expresión es literalmente 'frente al sol'. 'A plena luz del día' transmite en español la exposición pública diurna sin recurrir a un calco poco natural. Se preserva la fuerza de vergüenza y publicidad.
- source_word: חֲרוֹן אַף יְהוָה
  english_pob_choice: the burning anger of Yahweh
  chosen_spanish: el ardor de la ira de Yahvé
  alternatives_spanish:
  - la ira ardiente de Yahvé
  - el furor encendido de Yahvé
  - el ardor de la nariz de Yahvé
  lexicon: HALOT
  rationale: El hebreo usa una imagen idiomática de 'ardor' vinculada a la ira; 'ardor de la ira' conserva el calor metafórico sin sonar artificial. Se mantiene 'ira de Yahvé' para reproducir la referencia divina y la intensidad del juicio.
- source_word: מִיִּשְׂרָאֵל
  english_pob_choice: from Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - de Israel
  - lejos de Israel
  lexicon: HALOT
  rationale: El valor de separación se expresa en español de manera natural con 'de Israel' dentro de la construcción verbal 'se aparte'. No se añade más de lo que el hebreo exige.
theological_decisions:
- issue: Referente del pronombre objeto en וְהוֹקַע אֹתָם
  english_pob_reading: The pronoun most directly points to the leaders of the people, though some understand the leaders as the ones commanded to carry out the punishment.
  chosen_spanish_reading: 'Se conserva la ambigüedad: ''cuélgalos'' puede leerse como referencia a los líderes mismos o, según la lectura alternativa, como instrucción para que ellos ejecuten el castigo.'
  alternative_spanish_readings:
  - '''y haz que ejecuten a los culpables'''
  - '''y cuelga a los líderes'''
  rationale: El hebreo permite una tensión interpretativa real, y el auditor inglés la preserva en nota. El español no debe resolverla artificialmente; por eso la redacción principal mantiene una forma suficientemente abierta y la nota recoge la alternativa.
  doctrine_reference: Preservar tensión interpretativa documentada; no resolverla sin base textual.
- issue: Naturaleza de la sanción pública
  english_pob_reading: impale them ... in broad daylight
  chosen_spanish_reading: cuélgalos ... a plena luz del día
  alternative_spanish_readings:
  - impálalos
  - expónlos públicamente
  rationale: La intención de escarmiento público está clara en el texto; en español, 'colgar' expresa una ejecución/exhibición pública sin perder la dimensión vergonzante y visible que el hebreo subraya con 'frente al sol'.
  doctrine_reference: Mantener el carácter judicial-sacral y público del juicio divino.
translation_notes:
  revision_awareness: 'El registro inglés revisó ''heads'' por ''leaders'' para evitar una lectura corporal equivocada y cambió ''before Yahweh'' por ''for Yahweh'' por la preposición hebrea ל. La versión española sigue esa revisión: usa ''líderes'' y ''para Yahvé'', y mantiene la interpretación pública de נֶגֶד הַשָּׁמֶשׁ con una nota literal.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera uniforme para el Tetragrámaton.
  - '''Moisés'' conserva el nombre propio estándar.'
  - Se evita 'SEÑOR' como sustituto del nombre divino.
  - '''Líderes'' traduce רָאשֵׁי en armonía con la revisión inglesa y la ambigüedad contextual.'
  - La nota a conserva la alternativa interpretativa sin imponer una solución.
  - La expresión 'a plena luz del día' mantiene naturalidad en español y la nota b preserva el literal hebreo.
