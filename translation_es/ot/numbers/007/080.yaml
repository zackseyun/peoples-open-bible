lexical_decisions:
- source_word: כַּף
  english_pob_choice: dish
  chosen_spanish: vasija
  alternatives_spanish:
  - platillo
  - tazón
  - recipiente
  lexicon: HALOT
  rationale: En el contexto de ofrendas del tabernáculo, כַּף no designa la palma de la mano sino un pequeño recipiente ceremonial. En español, 'vasija' comunica un contenedor sin forzar la imagen de una cuchara moderna; 'recipiente' sería más neutro pero menos idiomático en una lista cultual.
- source_word: אַחַת
  english_pob_choice: one
  chosen_spanish: una
  alternatives_spanish:
  - uno
  lexicon: HALOT
  rationale: 'Concordancia femenina con כַּף. En español, el numeral debe ir en femenino: ''una''.'
- source_word: עֲשָׂרָה זָהָב
  english_pob_choice: of ten shekels
  chosen_spanish: de oro
  alternatives_spanish:
  - de diez siclos
  - de diez de oro
  - pesando diez siclos
  lexicon: HALOT
  rationale: El hebreo de esta fórmula inventarial en Números 7 es elíptico y en el POB inglés se suplió 'shekels' por contexto. Sin embargo, para esta línea concreta el sintagma también admite una lectura material ('oro') ligada a כַּף/זָהָב; en español, mantener 'de oro' evita introducir una unidad de peso no explicitada en el texto breve recibido y conserva la evidencia material mínima del hebreo.
- source_word: מְלֵאָה
  english_pob_choice: full of
  chosen_spanish: llena de
  alternatives_spanish:
  - colmada de
  - llena con
  lexicon: HALOT
  rationale: Predicado adjetival natural en español para indicar contenido. 'Llena de' preserva el valor descriptivo sin añadir matiz excesivo.
- source_word: קְטֹרֶת
  english_pob_choice: incense
  chosen_spanish: incienso
  alternatives_spanish:
  - perfume
  - aroma
  - incienso ritual
  lexicon: HALOT
  rationale: Término estándar para la sustancia de la ofrenda en contexto sacerdotal/tabernacular.
theological_decisions:
- issue: Valor de la medida/expresión cuantitativa en עֲשָׂרָה זָהָב
  english_pob_reading: understood as 'of ten shekels' from the offering inventory formula
  chosen_spanish_reading: se deja el texto en una forma breve que no explicita una medida, sin añadir una equivalencia doctrinal o litúrgica no presente aquí
  alternative_spanish_readings:
  - de diez siclos
  - de diez siclos de oro
  - de peso de diez siclos
  rationale: La tradición POB inglesa documenta una expansión interpretativa por la fórmula inventarial recurrente. En español, dado que el segmento hebreo transmitido es muy breve y la lectura exacta de la relación sintáctica puede formularse de más de una manera, se prefiere no fijar una medida en el cuerpo principal sin un soporte más amplio del pasaje inmediato. Esto preserva la tensión documental entre peso/material.
  doctrine_reference: Números 7:13-80; fórmula de ofrendas tribales en el capítulo
translation_notes:
  revision_awareness: Se ha tenido en cuenta la revisión inglesa más reciente, que prefirió 'golden dish' frente a 'gold dish' por naturalidad. En español, se optó por una solución igualmente natural ('vasija de oro') sin convertirla en una paráfrasis amplia. También se consideró la nota inglesa sobre la medida implícita, pero se decidió no fijarla en el texto principal debido a la brevedad y ambigüedad del segmento hebreo recibido.
  spanish_consistency_notes:
  - Se mantiene 'incienso' como término cultual estándar.
  - No se usa 'SEÑOR' ni terminología de sustitución no pertinente en este versículo.
  - Se evita 'cuchara' para כַּף por la nota lexical del POB inglés.
  - La puntuación final con punto y coma refleja el cierre parcial de esta línea inventarial.
