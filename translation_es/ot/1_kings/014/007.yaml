    rationale: La nota [a] trata la alternativa de הֲרִימֹתִיךָ (‘te levanté/te exalté’), no el nombre Jeroboam; la nota [b] trata וָאֶתֶּנְךָ נָגִיד (‘te puse/te nombré gobernante’), no ‘Yahvé’. Esto rompe la trazabilidad del audit trail y la disciplina de marcadores.
  - severity: medium
    issue: ‘jefe’ no es la mejor opción para נָגִיד en este contexto.
    rationale: Aunque comunica autoridad, en español neutral contemporáneo suena más coloquial y menos oficial que el hebreo requiere. ‘gobernante’ preserva mejor la dignidad política y la intención del inglés ‘ruler’.
