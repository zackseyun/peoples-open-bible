  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. La elección de «engendró» para ילד es adecuada en contexto genealógico. Se recomienda ajustar el nombre מְתוּשֶׁלַח a la forma española usual «Matusalén».
