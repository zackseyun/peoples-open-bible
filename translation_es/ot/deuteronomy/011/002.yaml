translation:
  language: es
  text: Y sepan hoy que no son los hijos de ustedes[a] los que no han conocido ni han visto la disciplina de Yahvé, el Dios de ustedes, su grandeza, su mano poderosa[b] y su brazo extendido—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo es elíptico: literalmente, «porque no sus hijos, que no conocieron y que no vieron…». El sentido es que Moisés se dirige a quienes ellos mismos presenciaron los actos de Yahvé, no a la siguiente generación.'
    reason: alternative_reading
  - marker: b
    text: O «su mano fuerte».
    reason: lexical_alternative
lexical_decisions:
- source_word: וִידַעְתֶּם
  english_pob_choice: And know
  chosen_spanish: Y sabrán
  alternatives_spanish:
  - Y conocerán
  - Y ustedes sabrán
  lexicon: HALOT
  rationale: El hebreo usa una forma verbal con prefijo conjuntivo en tono exhortativo/discursivo. En español, «Y sabrán» conserva la dirección al auditorio y el movimiento de la frase sin sobrecargarla con una paráfrasis explicativa.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: «Hoy» es la equivalencia natural y fiel para el valor temporal inmediato de הַיּוֹם.
- source_word: כִּי לֹא אֶת־בְּנֵיכֶם
  english_pob_choice: that it is not your children who have not known and who have not seen
  chosen_spanish: que no son sus hijos los que no han conocido ni han visto
  alternatives_spanish:
  - que no son sus hijos quienes no han conocido y no han visto
  - porque no son sus hijos los que no han conocido ni han visto
  lexicon: HALOT
  rationale: 'Sigo la lectura auditada de la elipsis: el hebreo contrasta al auditorio presente con sus hijos. En español, «no son sus hijos los que...» preserva el contraste sin introducir un verbo ajeno como «estoy hablando».'
- source_word: אֲשֶׁר לֹא יָדְעוּ
  english_pob_choice: who have not known
  chosen_spanish: los que no han conocido
  alternatives_spanish:
  - quienes no conocieron
  - los cuales no conocieron
  lexicon: HALOT
  rationale: El perfecto relacional del hebreo expresa falta de experiencia hasta el presente. «No han conocido» conserva ese valor experiencial en español.
- source_word: וַאֲשֶׁר לֹא רָאוּ
  english_pob_choice: and who have not seen
  chosen_spanish: ni han visto
  alternatives_spanish:
  - y no han visto
  - ni vieron
  lexicon: HALOT
  rationale: La coordinación negativa queda mejor en español con «ni». Mantiene el paralelismo con «no han conocido» y la experiencia acumulada negada.
- source_word: מוּסַר
  english_pob_choice: discipline
  chosen_spanish: disciplina
  alternatives_spanish:
  - instrucción
  - corrección
  - castigo
  lexicon: HALOT
  rationale: «Disciplina» conserva la amplitud de מוּסַר como formación correctiva/instructiva. Evita reducirlo solo a castigo o solo a enseñanza.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto: el Tetragrámaton se vierte como «Yahvé» para preservar el nombre propio divino en lugar de una sustitución titucional.'
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios de ustedes
  - su Dios
  lexicon: HALOT
  rationale: El posesivo de segunda persona plural se adapta a «su Dios» en un registro bíblico natural de cortesía plural en español, manteniendo la relación pactual.
- source_word: גָּדְלוֹ
  english_pob_choice: his greatness
  chosen_spanish: su grandeza
  alternatives_spanish:
  - su majestad
  - su grandeza
  lexicon: HALOT
  rationale: «Grandeza» es el equivalente directo y más transparente para גָּדְלֹו, manteniendo la referencia a la magnitud manifestada en las obras de Yahvé.
- source_word: יָדוֹ הַחֲזָקָה
  english_pob_choice: his mighty hand
  chosen_spanish: su mano poderosa
  alternatives_spanish:
  - su mano fuerte
  - su mano poderosa
  lexicon: HALOT
  rationale: La locución idiomática hebrea se rinde con un equivalente idiomático español. «Poderosa» comunica mejor la fuerza activa de la expresión que una calca rígida.
- source_word: וּזְרֹעוֹ הַנְּטוּיָה
  english_pob_choice: his outstretched arm
  chosen_spanish: su brazo extendido
  alternatives_spanish:
  - su brazo alargado
  - su brazo extendido
  lexicon: HALOT
  rationale: «Brazo extendido» preserva la imagen corporal idiomática del hebreo y es comprensible en español bíblico contemporáneo.
theological_decisions:
- issue: Elipsis hebrea en la contraposición con «sus hijos»
  english_pob_reading: Expanded the ellipsis as 'it is not your children who have not known and who have not seen...'
  chosen_spanish_reading: «no son sus hijos los que no han conocido ni han visto...»
  alternative_spanish_readings:
  - «no son sus hijos quienes no han conocido ni han visto...»
  - «porque no son sus hijos los que no han conocido ni han visto...»
  rationale: La frase hebrea es elíptica y depende del contexto inmediato. La versión española mantiene el contraste discursivo sin añadir un sujeto o verbo no atestiguado, siguiendo la primacía del original y la decisión revisada del POB inglés.
  doctrine_reference: 'Translation philosophy: optimal equivalence; transparencia del texto fuente'
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El proyecto pide mantener el nombre propio divino. «Yahvé» conserva la referencia al Tetragrámaton sin sustituirlo por un título, y respeta la política de traducción del POB.
  doctrine_reference: Tetragrámaton → Yahvé (criterio del proyecto)
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés: se eliminó la expansión explícita «I am speaking to» para ajustarse a la elipsis hebrea, y se prefirió una equivalencia más estándar para la mano divina. En español se refleja esa misma corrección estructural, manteniendo el contraste con «sus hijos» sin agregar contenido.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» según el criterio global del proyecto.
  - «Disciplina» se mantiene para מוּסַר por su amplitud formativa y correctiva.
  - El posesivo plural de cortesía se expresa naturalmente con «su» en lugar de duplicar con «de ustedes».
  - La nota a pie se ancla en «mano poderosa» porque la tradición léxica permite la variante «mano fuerte» sin alterar el sentido.
