id: JOS.21.42
reference: Joshua 21:42
source:
  edition: WLC
  text: תִּֽהְיֶ֨ינָה֙ הֶ/עָרִ֣ים הָ/אֵ֔לֶּה עִ֣יר עִ֔יר וּ/מִגְרָשֶׁ֖י/הָ סְבִיבֹתֶ֑י/הָ כֵּ֖ן לְ/כָל הֶ/עָרִ֥ים הָ/אֵֽלֶּה־׃ס
translation:
  text: Each of these cities had its surrounding pasturelands[a]; so it was for all these cities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literally, 'city by city and its pasturelands around it.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּהְיֶינָה
  chosen: were
  alternatives:
  - became
  - came to be
  lexicon: HALOT
  rationale: 'Qal imperfect 3fp of היה here functions descriptively/summarizing in context, best rendered as a past-state verb in English: ''were.'''
- source_word: הֶעָרִים הָאֵלֶּה
  chosen: these cities
  alternatives:
  - these towns
  lexicon: HALOT
  rationale: עיר commonly means 'city/town'; 'cities' is the standard and suitably formal rendering in this allotment context.
- source_word: עִיר עִיר
  chosen: each
  alternatives:
  - city by city
  - each city
  lexicon: HALOT
  rationale: The distributive repetition literally means 'city city,' indicating each individual city. English idiom is smoother with 'each,' while preserving the distributive force.
- source_word: וּמִגְרָשֶׁיהָ
  chosen: with its surrounding pasturelands
  alternatives:
  - and its pasturelands
  - and its common land
  lexicon: HALOT
  rationale: מִגְרָשׁ refers to the open land/pastureland attached to a city, especially in priestly and allotment texts. 'Pasturelands' is clearer than archaic 'suburbs' or ambiguous 'common land.' The conjunction is absorbed into idiomatic English with 'with.'
- source_word: סְבִיבֹתֶיהָ
  chosen: surrounding
  alternatives:
  - around it
  - all around it
  lexicon: HALOT
  rationale: This noun with suffix denotes what is around the city. Rendering it adjectivally in English ('surrounding') naturally modifies 'pasturelands' without loss of meaning.
- source_word: כֵּן
  chosen: so it was
  alternatives:
  - thus
  - likewise
  lexicon: HALOT
  rationale: כֵּן here draws a concluding comparison/summation. 'So it was' fits the retrospective narrative style.
- source_word: לְכָל הֶעָרִים הָאֵלֶּה
  chosen: for all these cities
  alternatives:
  - with all these cities
  - for every one of these cities
  lexicon: HALOT
  rationale: The phrase generalizes the pattern to the whole set. 'For all these cities' is concise and natural in English.
