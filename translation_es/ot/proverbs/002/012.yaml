translation:
  language: es
  text: para librarte del mal camino[a], del hombre que habla perversidades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «del hombre que habla cosas torcidas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהַצִּילְךָ
  english_pob_choice: to deliver you
  chosen_spanish: para librarte
  alternatives_spanish:
  - para rescatarte
  - para salvarte
  lexicon: HALOT
  rationale: El infinitivo causal/final de נצל expresa propósito de liberación o rescate. En español, «librarte» comunica bien la idea de ser sacado de un peligro o influencia dañina sin cargarlo con matiz soteriológico excesivo como «salvarte».
- source_word: מִדֶּרֶךְ
  english_pob_choice: from the way of
  chosen_spanish: del camino
  alternatives_spanish:
  - de la senda
  - de la ruta
  lexicon: HALOT
  rationale: דֶּרֶךְ admite «camino» y en Proverbios conserva tanto la imagen concreta como el valor moral de conducta o curso de vida. «Camino» es natural y fiel al trasfondo sapiencial.
- source_word: רָע
  english_pob_choice: evil
  chosen_spanish: malo
  alternatives_spanish:
  - malvado
  - perverso
  lexicon: HALOT
  rationale: Como adjetivo que califica «camino», en español «camino malo» suena más natural que «camino evil/evil way» y sigue el contraste moral del hebreo. Se evita forzar una abstracción («mal») que en español sería menos idiomática aquí.
- source_word: מֵאִישׁ
  english_pob_choice: from the man
  chosen_spanish: del hombre
  alternatives_spanish:
  - de un hombre
  - de la persona
  lexicon: HALOT
  rationale: אִישׁ es masculino singular y el POB inglés mantiene «the man» por precisión léxica. En español se conserva «el hombre» como referencia genérica representativa sin neutralizar el rasgo gramatical del original.
- source_word: מְדַבֵּר
  english_pob_choice: who speaks
  chosen_spanish: que habla
  alternatives_spanish:
  - que dice
  - hablando
  lexicon: HALOT
  rationale: El participio describe una característica continua del sujeto. La relativa «que habla» es la equivalencia más natural y mantiene la función descriptiva del hebreo.
- source_word: תַּהְפֻּכֽוֹת
  english_pob_choice: perverse things
  chosen_spanish: perversidades
  alternatives_spanish:
  - cosas perversas
  - cosas torcidas
  - deformidades
  lexicon: HALOT
  rationale: תַּהְפֻּכֹת denota desviaciones, distorsiones o perversidades del habla. «Perversidades» conserva el plural intensivo y el peso moral del término mejor que una simple paráfrasis.
theological_decisions:
- issue: Renderización del masculino singular אִישׁ
  english_pob_reading: from the man
  chosen_spanish_reading: del hombre
  alternative_spanish_readings:
  - de un hombre
  - de la persona
  rationale: El hebreo es masculino singular y el contexto presenta un tipo de persona concreta, no una abstracción impersonal. Se mantiene la precisión de género y número sin introducir una neutralización que el texto fuente no exige.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó «the way of evil» por «the evil way» para reflejar mejor la construcción hebrea. En español se siguió esa alineación directa con «el camino malo», manteniendo la estructura adjetival del original y la lectura moral del sintagma.
  spanish_consistency_notes:
  - 'Se preservó el paralelismo de dos complementos introducidos por una preposición de origen/separación: «del camino malo» / «del hombre que habla perversidades».'
  - Se evitó «salvarte» para no introducir connotaciones soteriológicas ajenas al contexto sapiencial.
  - «Perversidades» mantiene el plural hebreo y el matiz de habla torcida o corrupta; la nota ofrece la alternativa más literal «cosas torcidas».
  - Se mantuvo el masculino singular de «hombre» por fidelidad al hebreo y a la auditoría inglesa.
