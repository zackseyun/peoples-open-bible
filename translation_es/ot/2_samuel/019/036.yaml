translation:
  language: es
  text: Hoy tengo ochenta años[a]. ¿Puedo todavía discernir entre el bien y el mal? ¿Puede tu siervo probar lo que como y lo que bebo? ¿Puedo todavía oír la voz de cantores y cantoras? ¿Por qué, entonces, ha de ser todavía tu siervo una carga para mi señor el rey?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "¿Puedo discernir entre el bien y el mal?". La expresión hebrea puede denotar discernimiento moral o práctico; aquí el contexto de la edad y del deterioro de los sentidos favorece el sentido más amplio de juicio disminuido.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן שְׁמֹנִים שָׁנָה
  english_pob_choice: eighty years old
  chosen_spanish: Tengo ochenta años
  alternatives_spanish:
  - Tengo ochenta años de edad
  - Soy de ochenta años
  lexicon: HALOT
  rationale: La expresión hebrea es un idiomático de edad; en español suena natural expresarlo con una construcción directa de edad. Mantiene el dato sin calco forzado.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: HALOT
  rationale: '''Hoy'' conserva el valor temporal inmediato y es la opción más natural en español contemporáneo.'
- source_word: הַאֵדַע בֵּין טוֹב לְרָע
  english_pob_choice: Can I still distinguish between good and evil?
  chosen_spanish: ¿Puedo todavía discernir entre el bien y el mal?
  alternatives_spanish:
  - ¿Puedo todavía distinguir entre el bien y el mal?
  - ¿Conozco aún la diferencia entre el bien y el mal?
  lexicon: HALOT
  rationale: Se conserva la pregunta retórica y el paralelo tradicional 'bien y mal', que en español comunica de forma clara la capacidad de juicio o discernimiento. 'Discernir' refleja mejor el valor de ידע entre que 'saber'.
- source_word: אִם
  english_pob_choice: Can
  chosen_spanish: ¿Puedo
  alternatives_spanish:
  - ¿Si puedo
  - ¿Puedo acaso
  lexicon: HALOT
  rationale: En estas preguntas retóricas, 'אם' funciona como introducción interrogativa; en español se expresa de modo natural con '¿Puedo...?'.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu esclavo
  alternatives_spanish:
  - tu siervo
  - tu servidor
  lexicon: HALOT
  rationale: Se sigue la fuerza léxica que el proyecto POB suele reservar para עבד cuando el contexto lo permite. Aquí la autodesignación cortesana ante el rey admite 'esclavo' como término más cercano al hebreo, aunque en español resulte más fuerte que 'siervo'.
- source_word: אֶת אֲשֶׁר אֹכַל וְאֶת אֲשֶׁר אֶשְׁתֶּה
  english_pob_choice: what I eat and what I drink
  chosen_spanish: lo que como y lo que bebo
  alternatives_spanish:
  - lo que yo como y lo que yo bebo
  - lo que he de comer y beber
  lexicon: HALOT
  rationale: La relativa hebrea se vierte con una subordinación natural en español. Se mantiene el sentido simple y concreto de la alimentación y la bebida.
- source_word: אֶשְׁמַע עוֹד בְּקוֹל שָׁרִים וְשָׁרוֹת
  english_pob_choice: hear the voice of male singers and female singers
  chosen_spanish: oír la voz de cantores hombres y cantoras
  alternatives_spanish:
  - oír la voz de cantores y cantoras
  - oír a cantores varones y cantoras
  lexicon: HALOT
  rationale: Se preserva la distinción de género marcada en el hebreo. 'Cantores hombres' y 'cantoras' es algo menos elegante que 'cantores y cantoras', pero hace visible la oposición masculina/femenina del original sin neutralizarla.
- source_word: לְמַשָּׂא
  english_pob_choice: a burden
  chosen_spanish: una carga
  alternatives_spanish:
  - un peso
  - una molestia
  lexicon: HALOT
  rationale: '''Carga'' comunica el valor metafórico de peso/estorbo para el rey y es idiomático en español.'
- source_word: אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: my lord the king
  chosen_spanish: mi señor el rey
  alternatives_spanish:
  - mi señor, el rey
  - mi señor rey
  lexicon: HALOT
  rationale: Conserva el tratamiento cortesano y evita un giro excesivamente solemne. 'Señor' aquí refiere al rey humano, no al nombre divino.
theological_decisions:
- issue: Valor de עבד en autodesignación cortesana
  english_pob_reading: your servant
  chosen_spanish_reading: tu esclavo
  alternative_spanish_readings:
  - tu siervo
  - tu servidor
  rationale: No hay una cuestión doctrinal directa, pero sí una decisión léxica con implicaciones de estatus. Se conserva la dureza semántica del hebreo sin suavizarla a 'siervo', aunque el contexto cortesano atenúa la carga social en español.
  doctrine_reference: No aplica; decisión léxica/cultural.
- issue: Expresión 'bien y mal' como discernimiento vital
  english_pob_reading: distinguish between good and evil
  chosen_spanish_reading: discernir entre el bien y el mal
  alternative_spanish_readings:
  - distinguir entre el bien y el mal
  - discernir entre lo bueno y lo malo
  rationale: La formulación tradicional 'bien y mal' refleja bien el hebreo y evita reducir la frase a una simple capacidad sensorial. En el contexto de la vejez, comunica disminución del juicio o discernimiento, no una tesis moral abstracta adicional.
  doctrine_reference: Sabiduría práctica y discernimiento; sin carga doctrinal específica.
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió 'good and bad' a 'good and evil' para ajustarse mejor a רָע; por ello el español adopta 'bien y mal'. Se conservó la estructura interrogativa retórica, la referencia a los cantores/cantoras y el cierre cortesano sin añadir elementos ajenos al texto.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto lo requiere; aquí no aparece.
  - Se prefirió 'discernir' para ידע בין, en línea con la nota inglesa sobre juicio/discernimiento.
  - Se preserva la distinción de género de שָׁרִים וְשָׁרוֹת sin neutralizarla.
  - '''Señor'' en ''mi señor el rey'' es tratamiento humano, no título divino.'
  - No se introducen glosas interpretativas en el texto principal más allá de lo necesario para español natural.
