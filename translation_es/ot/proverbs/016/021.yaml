translation:
  language: es
  text: El sabio de corazón es llamado entendido, y la dulzura de los labios aumenta el aprendizaje[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «añade persuasión» o «aumenta la instrucción». El término hebreo puede denotar aprendizaje recibido, instrucción o el efecto de una enseñanza persuasiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַחֲכַם לֵב
  english_pob_choice: The wise of heart
  chosen_spanish: Al sabio[a] de corazón
  alternatives_spanish:
  - El sabio de corazón
  - El sabio en su corazón
  - La persona sabia de corazón
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y apunta a la sabiduría interior. En español, "sabio de corazón" conserva la imagen y es natural en estilo proverbial. Se evita expandir innecesariamente a "persona" para no diluir la forma sentenciosa del hebreo.
- source_word: יִקָּרֵא
  english_pob_choice: is called
  chosen_spanish: se le llamará
  alternatives_spanish:
  - es llamado
  - será llamado
  - se le considera
  lexicon: HALOT
  rationale: El nifal de קרא aquí funciona como pasivo/resultativo. En español, el futuro impersonal/pasivo refleja bien el valor proverbial y mantiene la fuerza general de la sentencia.
- source_word: נָבוֹן
  english_pob_choice: discerning
  chosen_spanish: entendido
  alternatives_spanish:
  - discreto
  - prudente
  - de entendimiento
  lexicon: HALOT
  rationale: '"נבון" denota una persona con entendimiento o discernimiento. "Entendido" es claro en español bíblico actual y encaja bien como predicativo después de "se le llamará". Se conserva la nota de discernimiento sin volver la frase artificial.'
- source_word: וּמֶתֶק שְׂפָתַיִם
  english_pob_choice: sweetness of lips
  chosen_spanish: la dulzura de los labios
  alternatives_spanish:
  - la suavidad de los labios
  - el hablar amable
  - la dulzura del habla
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea de "labios" para speech. "Dulzura" reproduce מֶתֶק con fidelidad, y "de los labios" mantiene la imagen verbal sin reemplazarla de inmediato por una paráfrasis.
- source_word: יֹסִיף
  english_pob_choice: increases
  chosen_spanish: aumenta
  alternatives_spanish:
  - añade
  - incrementa
  - hace crecer
  lexicon: HALOT
  rationale: El hifil de יסף expresa añadir o aumentar. "Aumenta" suena natural en español y conserva la idea de incremento progresivo en el paralelismo proverbial.
- source_word: לֶקַח
  english_pob_choice: learning
  chosen_spanish: el aprendizaje
  alternatives_spanish:
  - la enseñanza
  - la instrucción
  - la persuasión
  lexicon: HALOT
  rationale: POB opta por "learning" y preserva la posibilidad alternativa de persuasiveness/instruction. En español, "aprendizaje" transmite la recepción de enseñanza y deja abierta la gama semántica de לקח sin fijarla de manera demasiado estrecha.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador de nota [a] ahora aparece en el texto español exactamente donde corresponde. Se mantuvo la equivalencia óptima con base en el hebreo y el audit trail en inglés.'
  spanish_consistency_notes:
  - Se preservó la metáfora de "corazón" y "labios" en lugar de reemplazarla por una paráfrasis más abstracta.
  - '"Entendido" se usa como término bíblico claro y no como simple sinónimo de inteligente.'
  - '"Aprendizaje" sigue la decisión inglesa de "learning" y conserva la ambigüedad útil con instrucción/persuasión.'
  - El texto evita el uso de "SEÑOR" y no requiere notas teológicas especiales en este versículo.
