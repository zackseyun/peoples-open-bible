translation:
  language: es
  text: Si él es capaz de pelear conmigo y derribarme[a], entonces seremos sus esclavos. Pero si yo prevalezco[b] contra él y lo derribo[c], entonces ustedes serán nuestros esclavos y nos servirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo נכה puede traducirse también «matar» o «derrotar»; «derribarme» conserva la fuerza decisiva del golpe sin explicitar más de lo que el texto dice.
    reason: lexical_alternative
  - marker: b
    text: El verbo יכל en esta expresión puede leerse más literalmente como «ser capaz»; aquí se traduce «prevalezco» por el sentido de superar a alguien en combate.
    reason: lexical_alternative
  - marker: c
    text: El verbo נכה en ambas cláusulas también puede traducirse «matar» o «derrotar»; «lo derribo» preserva esa fuerza decisiva y mantiene la redacción cercana al hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: יוּכַל
  english_pob_choice: is able
  chosen_spanish: es capaz de
  alternatives_spanish:
  - puede
  - tiene poder para
  lexicon: HALOT
  rationale: Yָכַל expresa capacidad; en este desafío de combate, «es capaz de» conserva la idea de habilidad sin perder la condición retadora.
- source_word: לְהִלָּחֵם אִתִּי
  english_pob_choice: to fight with me
  chosen_spanish: de pelear conmigo
  alternatives_spanish:
  - de luchar conmigo
  - de combatir conmigo
  lexicon: HALOT
  rationale: El infinitivo con אִתִּי indica combate directo entre dos contendientes; «pelear conmigo» es natural en español y mantiene la reciprocidad del duelo.
- source_word: וְהִכָּנִי
  english_pob_choice: and strike me down
  chosen_spanish: y herirme
  alternatives_spanish:
  - y golpearme
  - y derribarme
  - y matarme
  lexicon: HALOT
  rationale: נכה puede abarcar golpear, herir o matar según el contexto. Aquí el español «herirme» conserva la fuerza del golpe sin añadir explícitamente «matar», que el hebreo no dice de forma directa.
- source_word: וְהָיִינוּ לָכֶם לַעֲבָדִים
  english_pob_choice: then we will be your slaves
  chosen_spanish: entonces seremos sus esclavos
  alternatives_spanish:
  - entonces seremos sus siervos
  lexicon: HALOT
  rationale: עֲבָדִים en este contexto de subyugación nacional y poscombate se ajusta mejor a «esclavos» que a «siervos», siguiendo la decisión léxica documentada en el audit trail.
- source_word: אֲנִי אוּכַל לוֹ
  english_pob_choice: I prevail against him
  chosen_spanish: yo prevalezco[b] contra él
  alternatives_spanish:
  - yo soy capaz contra él
  - yo puedo vencerlo
  lexicon: HALOT
  rationale: יִכַּל con ל puede expresar superar o prevalecer, no solo capacidad abstracta. «Prevalezco contra él» refleja la lectura combativa y reproduce la fuerza del inglés POB.
- source_word: וְהִכִּיתִיו
  english_pob_choice: and strike him down
  chosen_spanish: y lo hiero
  alternatives_spanish:
  - y lo golpeo
  - y lo derribo
  - y lo mato
  lexicon: HALOT
  rationale: נכה se mantiene en una gama que incluye herir, golpear o matar. Se prefirió «lo hiero» para conservar cercanía al hebreo sin sobredeterminar el resultado.
- source_word: וִהְיִיתֶם לָנוּ לַעֲבָדִים
  english_pob_choice: then you will be our slaves
  chosen_spanish: entonces ustedes serán nuestros esclavos
  alternatives_spanish:
  - entonces ustedes serán nuestros siervos
  lexicon: HALOT
  rationale: La paralelidad con la primera cláusula favorece traducir עֲבָדִים de manera consistente como «esclavos» en este marco de dominación militar.
- source_word: וַעֲבַדְתֶּם אֹתָנוּ
  english_pob_choice: and serve us
  chosen_spanish: y nos servirán
  alternatives_spanish:
  - y nos trabajarán
  - y trabajarán para nosotros
  lexicon: HALOT
  rationale: עבד como verbo expresa servicio rendido por quienes están subordinados; «nos servirán» es el equivalente natural en español y evita redundancia excesiva.
translation_notes:
  revision_awareness: 'Se tomó en cuenta el historial de revisión: la versión inglesa pasó por una corrección que restauró «slaves» frente a «servants» para לַעֲבָדִים/וַעֲבַדְתֶּם, por lo que la redacción española mantiene «esclavos» de manera consistente en ambas cláusulas. También se respetó la lectura combativa de יוּכַל/אוּכַל como capacidad de prevalecer en duelo.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo de ambas cláusulas condicionales.
  - Se usó «esclavos» de forma consistente para עֲבָדִים en el contexto de sometimiento militar.
  - Se preservó la distinción entre capacidad («es capaz») y prevalecer («prevalezco») según el matiz contextual.
  - Se evitó traducir נכה de manera demasiado fuerte en una sola dirección para no sobreinterpretar el resultado del golpe.
