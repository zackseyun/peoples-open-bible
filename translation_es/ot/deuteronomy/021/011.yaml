translation:
  language: es
  text: y ves entre los cautivos una mujer de hermoso aspecto[a], y la deseas y la tomas para ti como esposa[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'una mujer de bello aspecto'.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: "tomarla para ti como esposa", un modismo para casarte con ella.'
