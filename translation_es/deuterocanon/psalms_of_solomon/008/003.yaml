review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego: καὶ εἶπα τῇ καρδίᾳ μου se refleja adecuadamente como una expresión interior, Ποῦ ἄρα como pregunta inferencial, κρινεῖ como «juzgará», αὐτὸν como objeto masculino singular y ὁ θεός como «Dios». La nota al pie conserva correctamente la alternativa más literal «dije a mi corazón».'
  spanish_quality_summary: La frase es mayormente natural y fiel, pero «¿Dónde entonces juzgará Dios a él?» suena forzada en español por la colocación de «entonces» y, sobre todo, por «a él». En español bíblico y general, «lo juzgará» es la forma idiomática; además, «¿Dónde, entonces, lo juzgará Dios?» mantiene mejor la claridad de la pregunta.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Dios» corresponde bien a ὁ θεός. No aparece ninguna de las otras entradas sensibles del glosario. La decisión de mantener «corazón» en vez de «me dije a mí mismo» coincide con la racionalidad documentada.
  issues:
  - severity: medium
    issue: 'Objeto directo pronominal poco natural: «a él»'
    rationale: 'Aunque refleja el acusativo αὐτόν, en español estándar aquí corresponde el clítico «lo»: «lo juzgará». «Juzgará a él» resulta marcado y poco idiomático sin necesidad contextual.'
  - severity: low
    issue: Orden y puntuación menos naturales en la pregunta
    rationale: «¿Dónde entonces juzgará Dios…?» es comprensible, pero «¿Dónde, entonces, lo juzgará Dios?» suena más natural y refleja mejor el valor parentético/inferencial de ἄρα.
  revised_spanish_text: 'Y dije en mi corazón[a]: «¿Dónde, entonces, lo juzgará Dios?»'
  revised_footnotes:
