translation:
  language: es
  text: Y sucedió[a], al cabo de diez días, que la palabra de Yahvé vino a Jeremías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «al final / desde el final de diez días»; es decir, cuando habían terminado los diez días.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y pasó
  lexicon: HALOT
  rationale: La forma narrativa hebrea introduce el avance de la escena. «Y sucedió» conserva ese giro sin caer en un calco demasiado rígido ni en una fórmula arcaica.
- source_word: מִקֵּץ
  english_pob_choice: at the end of
  chosen_spanish: al cabo de
  alternatives_spanish:
  - al final de
  - después de
  lexicon: HALOT
  rationale: La construcción con מִן + קֵץ señala el cierre de un período. «Al cabo de» expresa bien la terminación del plazo en español natural, manteniendo la idea de límite temporal.
- source_word: עֲשֶׂרֶת יָמִים
  english_pob_choice: ten days
  chosen_spanish: diez días
  alternatives_spanish:
  - por diez días
  - en diez días
  lexicon: HALOT
  rationale: Es una construcción cardinal simple; «diez días» es la correspondencia directa y natural.
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la palabra del SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el giro profético estándar con el nombre divino transliterado según la convención del proyecto. «Palabra» conserva la fuerza revelatoria del hebreo דְבַר.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte con el nombre propio «Yahvé», conforme al criterio doctrinal del proyecto y evitando la sustitución por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - para
  lexicon: HALOT
  rationale: La preposición indica dirección hacia Jeremías; en español, «a» reproduce de manera natural ese movimiento.
- source_word: יִרְמְיָהוּ
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  alternatives_spanish:
  - Yirmeyahu
  lexicon: HALOT
  rationale: Se usa la forma española establecida del nombre propio para legibilidad, sin perder la identidad del referente bíblico.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. La política del proyecto pide transliterarlo como nombre propio en vez de ocultarlo con un sustituto, por lo que «Yahvé» preserva mejor la lectura teológica y textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fórmula profética «la palabra de Yahvé vino a...»
  english_pob_reading: the word of Yahweh came to Jeremiah
  chosen_spanish_reading: la palabra de Yahvé vino a Jeremías
  alternative_spanish_readings:
  - vino la palabra de Yahvé a Jeremías
  - llegó a Jeremías la palabra de Yahvé
  rationale: La frase hebrea es una fórmula profética estable. «Vino a Jeremías» reproduce bien el movimiento de revelación sin añadir matices interpretativos no presentes en el hebreo.
  doctrine_reference: Uso narrativo-profético estándar en el AT
translation_notes:
  revision_awareness: La fuente inglesa ya fijó como solución óptima «at the end of ten days» y conservó una nota que aclara la posibilidad literal de «after/from the end of ten days». No hay revisiones posteriores en el expediente; la versión española sigue esa misma decisión con una expresión idiomática equivalente («al cabo de diez días») y mantiene la nota de matiz temporal.
  spanish_consistency_notes:
  - 'Se conserva el paralelismo narrativo con dos cláusulas de וַיְהִי: una introductoria («Y sucedió») y otra que encabeza la fórmula revelatoria («que la palabra de Yahvé vino...»).'
  - Se usa «Yahvé» de forma consistente para יהוה, conforme al estándar del proyecto.
  - No se introduce puntuación o léxico que sugiera una interpretación distinta de la simple referencia temporal y del arribo de la palabra divina.
