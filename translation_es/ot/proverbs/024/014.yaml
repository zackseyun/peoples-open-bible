translation:
  language: es
  text: 'Sabe que la sabiduría es así para tu alma[a]: si la encuentras, entonces hay futuro[b], y tu esperanza no será cortada.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «para tu alma»; נֶפֶשׁ también puede significar «ser», «vida» o «persona» según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «hay un desenlace» o «hay un fin»; el hebreo אַחֲרִית puede denotar el fin, el resultado o la perspectiva futura de alguien.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּן
  english_pob_choice: thus
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - de esa manera
  - así pues
  lexicon: HALOT
  rationale: כֵּן enlaza esta línea con la comparación anterior; «así» conserva la relación analógica sin volverla explicativa en exceso.
- source_word: דְּעֶה
  english_pob_choice: Know
  chosen_spanish: Reconoce
  alternatives_spanish:
  - Conoce
  - Sabe
  - Ten por sabido
  lexicon: HALOT
  rationale: El imperativo pide atender y asimilar la afirmación. «Reconoce» mantiene el llamado directo y suena natural en español, sin perder el tono exhortativo.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - sabiduría
  lexicon: HALOT
  rationale: La equivalencia estándar en Proverbios es «sabiduría»; conserva el término clave del libro.
- source_word: לְנַפְשֶׁךָ
  english_pob_choice: for your soul
  chosen_spanish: para tu alma
  alternatives_spanish:
  - para ti
  - para tu vida
  - para tu ser
  lexicon: HALOT
  rationale: נֶפֶשׁ puede ser alma, vida o ser. Aquí la imagen personal e interior se conserva mejor con «alma», que sigue la fuerza del hebreo sin reducirla a un simple beneficio externo.
- source_word: אִם מָצָאתָ
  english_pob_choice: if you find it
  chosen_spanish: si la encuentras
  alternatives_spanish:
  - si la has encontrado
  - cuando la encuentres
  lexicon: HALOT
  rationale: El condicional hebreo se expresa naturalmente con «si»; el objeto femenino concuerda con «sabiduría».
- source_word: וְיֵשׁ אַחֲרִית
  english_pob_choice: then there is a future
  chosen_spanish: entonces hay un futuro
  alternatives_spanish:
  - entonces hay un desenlace
  - entonces hay un fin
  - entonces hay un porvenir
  lexicon: HALOT
  rationale: אַחֲרִית puede indicar fin, resultado o futuro. Siguiendo el contexto sapiencial y la lectura de la POB inglesa, «futuro» comunica la esperanza prospectiva sin borrar la posible tensión semántica.
- source_word: וְתִקְוָתְךָ
  english_pob_choice: and your hope
  chosen_spanish: y tu esperanza
  alternatives_spanish:
  - y tu expectativa
  lexicon: HALOT
  rationale: תִּקְוָה se traduce de manera directa como «esperanza»; preserva el paralelismo con «futuro».
- source_word: לֹא תִכָּרֵת
  english_pob_choice: will not be cut off
  chosen_spanish: no será cortada
  alternatives_spanish:
  - no será eliminada
  - no perecerá
  - no se extinguirá
  lexicon: HALOT
  rationale: El hebreo conserva la metáfora de cortar; «será cortada» mantiene esa imagen en español y deja visible su fuerza figurada.
theological_decisions:
- issue: Sentido de אַחֲרִית (resultado final vs. futuro)
  english_pob_reading: then there is a future
  chosen_spanish_reading: entonces hay un futuro
  alternative_spanish_readings:
  - entonces hay un desenlace
  - entonces hay un fin
  - entonces hay un porvenir
  rationale: En Proverbios, אַחֲרִית puede referirse al resultado o al destino final, pero el contexto aquí es exhortativo y de esperanza. «Futuro» sigue la elección inglesa y conserva la orientación esperanzada sin cerrar la ambigüedad hebrea.
  doctrine_reference: Sabiduría bíblica / providencia y esperanza
- issue: Metáfora de cortar aplicada a la esperanza
  english_pob_reading: your hope will not be cut off
  chosen_spanish_reading: tu esperanza no será cortada
  alternative_spanish_readings:
  - tu esperanza no perecerá
  - tu esperanza no se extinguirá
  - tu esperanza no será destruida
  rationale: La POB inglesa retiene la metáfora verbal de כרת. En español, «no será cortada» preserva la imagen textual y permite al lector percibir la fuerza idiomática del hebreo.
  doctrine_reference: Persistencia de la esperanza / preservación figurada
translation_notes:
  revision_awareness: Coincide sustancialmente con la revisión más reciente (sin cambios necesarios) y mantiene la misma solución interpretativa general de la POB inglesa, con adaptación natural al español.
  spanish_consistency_notes:
  - Se mantiene el paralelismo sabiduría/esperanza/futuro sin diluir la metáfora hebrea de «cortar».
  - Se evita sustituir «alma» por una paráfrasis más plana, porque נֶפֶשׁ conserva una densidad antropológica relevante.
  - El cierre usa futuro simple para reflejar la afirmación sapiencial sin agregar modalizaciones ajenas al hebreo.
