translation:
  language: es
  text: Por tanto, apiádense de ustedes mismos, de quienes aun yo, su enemigo, tengo compasión por causa de su edad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por causa de su juventud». El término griego puede referirse más específicamente a la etapa juvenil.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατελεήσατε
  english_pob_choice: have pity
  chosen_spanish: tengan compasión
  alternatives_spanish:
  - tengan piedad
  - apiádense
  lexicon: LSJ
  rationale: El imperativo aoristo pide un acto concreto de compasión. «Tengan compasión» conserva el valor afectivo y suena natural en español contemporáneo sin perder el tono exhortativo.
- source_word: ἑαυτούς
  english_pob_choice: yourselves
  chosen_spanish: de ustedes mismos
  alternatives_spanish:
  - a ustedes mismos
  - ustedes mismos
  lexicon: LSJ
  rationale: El reflexivo exige que la compasión recaiga sobre los propios destinatarios; «de ustedes mismos» expresa bien la relación con el verbo de compasión en español.
- source_word: οὓς
  english_pob_choice: on whom
  chosen_spanish: de quienes
  alternatives_spanish:
  - a quienes
  - sobre quienes
  lexicon: LSJ
  rationale: La relativa retoma a «ustedes mismos»; en español, «de quienes» resulta más fluido dentro de la construcción de compadecerse/tener compasión.
- source_word: ὁ πολέμιος
  english_pob_choice: your enemy
  chosen_spanish: su enemigo
  alternatives_spanish:
  - el enemigo
  - su adversario
  lexicon: LSJ
  rationale: El griego dice literalmente «el enemigo». En contexto, el hablante se identifica como tal frente a ellos; «su enemigo» explicita esa relación sin añadir contenido nuevo.
- source_word: ἔγωγε
  english_pob_choice: even I
  chosen_spanish: aun yo
  alternatives_spanish:
  - yo mismo
  - ciertamente yo
  lexicon: LSJ
  rationale: 'La forma enfática del pronombre de primera persona se mantiene con «aun yo», que reproduce la fuerza retórica: incluso el enemigo declara compasión.'
- source_word: τῆς ἡλικίας
  english_pob_choice: because of your age
  chosen_spanish: por causa de su edad
  alternatives_spanish:
  - por causa de su juventud
  - a causa de sus años
  lexicon: LSJ
  rationale: ἡλικία puede significar edad o etapa de la vida; el griego permite una referencia general a la edad, así que se conserva «edad» en el texto principal, con la alternativa contextual de «juventud» disponible.
theological_decisions:
- issue: Alcance de ἡλικία
  english_pob_reading: because of your age
  chosen_spanish_reading: por causa de su edad
  alternative_spanish_readings:
  - por causa de su juventud
  rationale: No se trata de una cuestión doctrinal, sino de precisión semántica. El texto griego admite «edad» de manera amplia; la lectura más específica «juventud» queda como alternativa sin imponerla en el cuerpo principal.
  doctrine_reference: Primacía del idioma original; conservar la amplitud léxica cuando el contexto no obliga a estrecharla.
- issue: Relación retórica del hablante como enemigo
  english_pob_reading: your enemy
  chosen_spanish_reading: su enemigo
  alternative_spanish_readings:
  - el enemigo
  - su adversario
  rationale: 'El texto presenta una apelación paradójica: quien es enemigo exhorta a la compasión. «Su enemigo» mantiene esa tensión retórica sin suavizarla a una formulación más neutra.'
  doctrine_reference: Preservación de la tensión retórica y lexical del original.
translation_notes:
  revision_awareness: El borrador sigue la redacción revisada del inglés, que elimina el guion y une la apelación en una sola frase. En español se optó por una sintaxis igualmente continua y formal, sin resolver de más la ambigüedad de ἡλικία.
  spanish_consistency_notes:
  - Se usa «compasión» para κατελεήσατε, en coherencia con el valor afectivo del imperativo.
  - Se mantiene «Yahvé» como norma del proyecto; este versículo no contiene el nombre divino.
  - «Edad» se conserva en el texto principal y «juventud» queda en nota para respetar la amplitud del griego.
  - La puntuación evita separar innecesariamente la segunda cláusula, siguiendo la revisión inglesa más reciente.
