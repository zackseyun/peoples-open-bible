review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español acierta en la mayor parte del sentido: «Mi alma anhela… desfallece», «los atrios de Yahvé», «mi corazón y mi carne», y «Dios vivo» reflejan bien el hebreo y la línea del POB. Sin embargo, el verbo יְרַנְּנוּ, en este contexto y según la propia auditoría inglesa, debe conservar mejor la idea de clamor/exclamación dirigido a Dios, no reducirse principalmente a canto. «Cantan de júbilo» estrecha el campo semántico y desajusta el matiz del contexto de anhelo intenso. Además, el intensificador וְגַם queda algo más natural en español como «sí, aun» o con raya explicativa, en vez de la formulación algo rígida «y aun».'
  spanish_quality_summary: El español es claro y digno, pero «cantan de júbilo al Dios vivo» suena más interpretativo que el original y menos ajustado al paralelismo emocional del versículo. «Mi alma anhela—sí, aun desfallece—…; mi corazón y mi carne claman de gozo al Dios vivo» mantiene mejor la fuerza poética, la naturalidad y la tensión entre anhelo y exclamación jubilosa. La puntuación con rayas también refleja mejor la intensificación del primer hemistiquio.
  glossary_alignment: 'Se cumple bien el uso de «Yahvé» para יְהוָה y de «carne» para בשר. «Dios vivo» también está bien. La principal divergencia está en יְרַנְּנוּ: la preferencia del POB inglés quedó en «cry out» con nota para las alternativas jubilosas; por tanto, el español debería elegir una base como «claman» o «claman de gozo», no «cantan de júbilo» como texto principal.'
  issues:
  - severity: medium
    issue: «cantan de júbilo» para יְרַנְּנוּ es demasiado estrecho
