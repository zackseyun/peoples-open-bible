    text: 'O: «cuyo derecho es»; también puede entenderse «a quien pertenece el juicio» o «a quien legítimamente le corresponde». Muchos intérpretes ven aquí una alusión a Génesis 49:10 y, por tanto, una referencia mesiánica.'
    reason: alternative_reading
  revision_rationale: 'Se revisa principalmente אֲשִׂימֶנָּה: «La haré» es más fiel al audit trail inglés y mucho más natural en español que «Yo la pondré». Se elimina la exclamación para mantener un tono más sobrio y cercano al énfasis retórico del hebreo por repetición. Se conservan la apertura teológica de «a quien le corresponde» y las notas existentes, que ya reflejan bien la evidencia y la racionalidad documentada.'
