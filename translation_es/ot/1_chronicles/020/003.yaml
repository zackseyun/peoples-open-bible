base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/020/003.yaml
  text: He brought out the people who were in it and put them to work with saws[a], iron tools, and axes. Thus David did to all the cities of the Ammonites[b]. Then David and all the people returned to Jerusalem.
  footnotes:
  - marker: a
    text: Or, possibly, 'put them under saws, iron threshing-sledges, and cutting tools'; some take the verse, influenced by 2 Samuel 12:31, to mean that David executed them with such instruments.
    reason: alternative_reading
  - marker: b
    text: The Hebrew terms for the tools are partly uncertain; the phrase rendered 'iron picks, and axes' may refer more generally to iron cutting implements.
    reason: lexical_alternative
