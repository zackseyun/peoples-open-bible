base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/011/010.yaml
  text: They told David[a], saying, “Uriah did not go down to his house.” So David said to Uriah[b], “Have you not come from a journey? Why did you not go down to your house?”
  footnotes:
  - marker: a
    text: Hebrew 'go down to his/your house' is a literal idiom for going home, likely from the higher elevation or official precincts to one's residence.
    reason: cultural_note
  - marker: b
    text: Or 'from the road.' The Hebrew expression means 'from a journey' or 'from traveling.'
    reason: lexical_alternative
