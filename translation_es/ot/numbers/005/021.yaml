    rationale: El rastro inglés preserva explícitamente la dificultad de יְרֵךְ/נֹפֶלֶת y la ambigüedad de בֶּטֶן. El español debería conservar esas alternativas para no perder información interpretativa relevante.
  - severity: medium
    issue: «Te haga maldición y juramento» resulta poco natural en español
    rationale: Aunque es formalmente cercano, en español suena brusco. «Te convierta en maldición y juramento» mantiene el sentido resultativo de יִתֵּן ... לְאָלָה וְלִשְׁבֻעָה con mejor legibilidad.
  - severity: low
    issue: «Se consuma» no es la mejor representación de נֹפֶלֶת
    rationale: La documentación inglesa destaca la imagen de caída/deterioro/wasting. «Se marchite» conserva mejor ese deterioro físico sin fijar un mecanismo médico.
