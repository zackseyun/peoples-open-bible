translation:
  language: es
  text: 'Entonces se acercaron y hablaron delante del rey acerca de la prohibición[a] del rey: «¿No firmaste una prohibición[a] de que todo hombre[b] que haga una petición a cualquier dios o a cualquier hombre, durante treinta días, salvo a ti, oh rey, será arrojado al foso de los leones?» El rey respondió y dijo: «El asunto es firme, conforme a la ley de los medos y de los persas, que no puede ser cambiada[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Prohibición» expresa aquí un mandato legal vinculante y restrictivo; también podría traducirse «decreto» o «interdicto».
    reason: lexical_alternative
  - marker: b
    text: «Todo hombre» refleja el singular masculino genérico del arameo en esta formulación legal; también podría traducirse «cualquier persona».
    reason: lexical_alternative
  - marker: c
    text: 'O: «que no puede ser revocada» o «que no puede ser alterada».'
    reason: alternative_reading
lexical_decisions:
- source_word: בֵּאדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Marcador discursivo narrativo; «Entonces» mantiene la secuencia y suena natural en español bíblico contemporáneo.
- source_word: קְרִיבוּ
  english_pob_choice: they came near
  chosen_spanish: se acercaron
  alternatives_spanish:
  - se aproximaron
  - vinieron cerca
  lexicon: HALOT
  rationale: El verbo expresa acercamiento físico; «se acercaron» es el equivalente natural en español.
- source_word: וְאָמְרִין קֳדָם מַלְכָּא
  english_pob_choice: and spoke before the king
  chosen_spanish: y hablaron delante del rey
  alternatives_spanish:
  - y dijeron delante del rey
  - y hablaron en presencia del rey
  lexicon: HALOT
  rationale: Conserva el acto de hablar y la escena cortesana formal indicada por קֳדָם sin volverlo demasiado rígido.
- source_word: עַל אֱסָר מַלְכָּא
  english_pob_choice: concerning the king’s injunction
  chosen_spanish: acerca de la injunción del rey
  alternatives_spanish:
  - acerca del decreto del rey
  - respecto de la prohibición del rey
  lexicon: HALOT
  rationale: Se eligió «injunción» para reflejar el valor de prohibición vinculante que el inglés auditado tomó como «injunction»; evita suavizarlo como un simple decreto.
- source_word: הֲלָא
  english_pob_choice: Did you not
  chosen_spanish: ¿No has... ?
  alternatives_spanish:
  - ¿Acaso no... ?
  - ¿No... ?
  lexicon: HALOT
  rationale: Interrogación retórica que presupone respuesta afirmativa; el perfecto compuesto es natural en español para la acción ya realizada.
- source_word: רְשַׁמְתָּ
  english_pob_choice: sign
  chosen_spanish: firmado
  alternatives_spanish:
  - registrado
  - inscrito
  lexicon: HALOT
  rationale: En contexto legal, «firmado» comunica la ratificación escrita de la orden con claridad idiomática en español.
- source_word: כָל אֱנָשׁ
  english_pob_choice: any man
  chosen_spanish: todo hombre
  alternatives_spanish:
  - cualquier hombre
  - cualquier persona
  lexicon: HALOT
  rationale: Conserva el singular genérico masculino del arameo, tal como la auditoría inglesa lo preservó.
- source_word: יִבְעֵה
  english_pob_choice: makes a petition
  chosen_spanish: haga una petición
  alternatives_spanish:
  - presente una petición
  - pida
  lexicon: HALOT
  rationale: «Haga una petición» refleja una solicitud formal y judicial, no una simple petición cotidiana.
- source_word: מִן כָּל אֱלָהּ וֶאֱנָשׁ
  english_pob_choice: to any god or man
  chosen_spanish: a cualquier dios o a hombre
  alternatives_spanish:
  - a cualquier dios o persona
  - ante cualquier dios o hombre
  lexicon: HALOT
  rationale: La construcción aramea con מִן, por la fuerza del verbo de petición, se vierte naturalmente con «a». Se conserva el masculino singular para אֱנָשׁ.
- source_word: עַד יוֹמִין תְּלָתִין
  english_pob_choice: for thirty days
  chosen_spanish: durante treinta días
  alternatives_spanish:
  - por treinta días
  - hasta treinta días
  lexicon: HALOT
  rationale: Marca con precisión la duración de la prohibición en español.
- source_word: לָהֵן מִנָּךְ
  english_pob_choice: except to you
  chosen_spanish: fuera de ti
  alternatives_spanish:
  - excepto a ti
  - salvo a ti
  lexicon: HALOT
  rationale: Expresa la excepción al destinatario del decreto con una formulación breve y fiel; «fuera de ti» conserva el matiz exceptivo sin sobreexplicar.
- source_word: יִתְרְמֵא
  english_pob_choice: shall be thrown
  chosen_spanish: será arrojado
  alternatives_spanish:
  - será echado
  - será lanzado
  lexicon: HALOT
  rationale: Pasivo de consecuencia legal; «arrojado» conserva fuerza penal y resulta idiomático.
- source_word: לְגוֹב אַרְיָותָא
  english_pob_choice: into the lions’ den
  chosen_spanish: al foso de los leones
  alternatives_spanish:
  - a la cueva de los leones
  - al pozo de los leones
  lexicon: HALOT
  rationale: «Foso» comunica el lugar de castigo con naturalidad en español y corresponde al uso tradicional de esta expresión.
- source_word: יַצִּיבָא מִלְּתָא
  english_pob_choice: The matter is certain
  chosen_spanish: La cosa es cierta
  alternatives_spanish:
  - El asunto es cierto
  - La afirmación es segura
  lexicon: HALOT
  rationale: «Cosa» reproduce de modo sobrio el valor de «matter/thing»; «cierta» refleja la afirmación de firmeza y validez.
- source_word: כְּדָת מָדַי וּפָרַס
  english_pob_choice: according to the law of the Medes and Persians
  chosen_spanish: conforme a la ley de los medos y de los persas
  alternatives_spanish:
  - según la ley de los medos y de los persas
  - conforme a la ley de Media y Persia
  lexicon: HALOT
  rationale: Mantiene el nombre de los pueblos como en la auditoría inglesa y suena natural en español.
- source_word: דִּי לָא תֶעְדֵּא
  english_pob_choice: which cannot be changed
  chosen_spanish: que no puede ser cambiada
  alternatives_spanish:
  - que no puede ser revocada
  - que no puede ser alterada
  lexicon: HALOT
  rationale: La cláusula expresa irrevocabilidad; «cambiada» es amplio y claro en español, sin perder el sentido legal.
theological_decisions:
- issue: Lexical force of אֱסָר in a royal legal context
  english_pob_reading: injunction
  chosen_spanish_reading: injunción
  alternative_spanish_readings:
  - decreto
  - prohibición
  - interdicto
  rationale: El inglés auditado escogió «injunction» para destacar una prohibición vinculante. En español, «injunción» es menos común pero mantiene esa fuerza legal mejor que «decreto», que sería demasiado genérico.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Generic masculine singular אֱנָשׁ
  english_pob_reading: any man
  chosen_spanish_reading: todo hombre
  alternative_spanish_readings:
  - cualquier persona
  - cualquier hombre
  rationale: Se conserva el masculino genérico singular presente en el arameo, siguiendo la decisión auditada de no neutralizar una fórmula legal que está formulada así en el texto fuente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Irrevocability clause דִּי לָא תֶעְדֵּא
  english_pob_reading: which cannot be changed
  chosen_spanish_reading: que no puede ser cambiada
  alternative_spanish_readings:
  - que no puede ser revocada
  - que no puede ser alterada
  rationale: La cláusula afirma la firmeza legal del edicto. «Cambiada» funciona como equivalente amplio y comunica la imposibilidad de modificación sin imponer una sola glosa técnica.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'Se siguió el estado más reciente del audit trail: no hubo revisiones aplicadas y el pase final quedó sin cambios, con acuerdo alto entre revisores. La redacción española mantiene esa misma lectura base sin introducir expansiones interpretativas.'
  spanish_consistency_notes:
  - Se conserva Yahvé para el Tetragrámaton en todo el proyecto; este versículo no lo contiene.
  - Se usa «Meses y persas» en forma normalizada de nombres de pueblos, coherente con el estándar del proyecto cuando el contexto exige el nombre étnico-histórico.
  - Se preserva el tono jurídico del pasaje sin domesticar la orden real a lenguaje devocional.
