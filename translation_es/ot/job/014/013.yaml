translation:
  language: es
  text: ¡Ojalá[a] me escondieras en Sheol, que me ocultaras hasta que tu ira se aparte[b], que me señalaras un tiempo y te acordaras de mí!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¡Oh, que…!». La expresión hebrea es optativa, no interrogativa.
    reason: lexical_alternative
  - marker: b
    text: O «hasta que tu ira vuelva atrás». El hebreo expresa el apartarse o retroceder de la ira.
    reason: alternative_reading
lexical_decisions:
- source_word: מִי יִתֵּן
  english_pob_choice: Oh, that you would
  chosen_spanish: ¡Oh, que tú me escondieras...!
  alternatives_spanish:
  - ¡Ojalá que tú me escondieras...!
  - ¡Ah, si tú me escondieras...!
  lexicon: HALOT
  rationale: La expresión hebrea es optativa, no una pregunta literal. «¡Oh, que...!» conserva el deseo intenso y evita sonar demasiado explicativa. Se mantiene la fuerza emocional del lamento.
- source_word: בִּשְׁאוֹל
  english_pob_choice: in Sheol
  chosen_spanish: en Sheol
  alternatives_spanish:
  - en el sepulcro
  - en la tumba
  - en el reino de los muertos
  lexicon: HALOT
  rationale: Se conserva «Sheol» por ser un término conceptual hebreo específico, no simplemente «sepulcro» o «tumba». La transliteración evita reducir el alcance semántico y preserva la tensión teológica del texto.
- source_word: תַּצְפִּנֵנִי
  english_pob_choice: hide me
  chosen_spanish: me escondieras
  alternatives_spanish:
  - me ocultaras
  - me guardaras escondido
  lexicon: HALOT
  rationale: «Esconder» comunica con naturalidad la imagen de ser puesto fuera de vista, y mantiene el paralelismo poético con el verbo siguiente.
- source_word: תַּסְתִּירֵנִי
  english_pob_choice: conceal me
  chosen_spanish: me ocultaras
  alternatives_spanish:
  - me escondieras
  - me encubrieras
  lexicon: HALOT
  rationale: «Ocultar» varía ligeramente respecto de «esconder» y conserva el paralelismo sin borrar la cercanía semántica entre los dos verbos hebreos.
- source_word: עַד שׁוּב אַפֶּךָ
  english_pob_choice: until your anger turns away
  chosen_spanish: hasta que tu ira se aparte
  alternatives_spanish:
  - hasta que tu ira vuelva atrás
  - hasta que tu ira pase
  - hasta que tu enojo se aparte
  lexicon: HALOT
  rationale: El hebreo expresa el retroceso/apartarse de la ira. «Se aparte» suena natural en español y conserva la idea de que la ira cesa o se retira sin borrar la imagen verbal.
- source_word: אַפֶּךָ
  english_pob_choice: your anger
  chosen_spanish: tu ira
  alternatives_spanish:
  - tu enojo
  - tu furor
  lexicon: HALOT
  rationale: «Ira» corresponde al valor idiomático del hebreo, que literalmente dice «tu nariz». Se evita la literalidad física porque en español no comunica el sentido.
- source_word: תָּשִׁית לִי חֹק
  english_pob_choice: you would appoint a time for me
  chosen_spanish: me señalaras un tiempo
  alternatives_spanish:
  - me asignaras un plazo
  - me fijaras un término
  - establecieras para mí un tiempo
  lexicon: HALOT
  rationale: חֹק puede denotar algo fijo, prescrito o establecido. En este contexto, la lectura adoptada por el audit trail apunta a un tiempo designado; «me señalaras un tiempo» conserva esa idea sin sobrecargar el verso con terminología legal o abstracta.
- source_word: חֹק
  english_pob_choice: a time / limit appointed
  chosen_spanish: tiempo
  alternatives_spanish:
  - plazo
  - término
  - límite
  lexicon: HALOT
  rationale: Aunque el sustantivo puede significar «decreto», «estatuto», «límite» o «tiempo señalado», aquí el contexto favorece una cita o momento fijado. «Tiempo» es la opción más clara en español dentro de la poesía del verso.
- source_word: וְתִזְכְּרֵנִי
  english_pob_choice: and remember me
  chosen_spanish: y te acordaras de mí
  alternatives_spanish:
  - y me recordaras
  - y pensaras en mí
  lexicon: HALOT
  rationale: «Acordarse de» es la forma natural en español para expresar el valor relacional y covenantal de recordar. Mantiene la resonancia teológica sin sonar rígido.
theological_decisions:
- issue: Tratamiento de Sheol
  english_pob_reading: Sheol
  chosen_spanish_reading: Sheol
  alternative_spanish_readings:
  - sepulcro
  - tumba
  - reino de los muertos
  rationale: Se conserva la transliteración para no importar una doctrina posterior ni reducir el término a una simple sepultura. El texto refleja el mundo conceptual hebreo sobre la muerte y el ocultamiento en el lugar de los muertos.
  doctrine_reference: Preservación del trasfondo hebreo y de la tensión teológica; no armonizar con doctrinas posteriores sobre el más allá.
- issue: Lectura de חֹק en el contexto
  english_pob_reading: appoint a time for me
  chosen_spanish_reading: me señalaras un tiempo
  alternative_spanish_readings:
  - me fijaras un límite
  - me designaras un decreto
  - me establecieras un plazo
  rationale: La edición inglesa revisada entiende que el sustantivo aquí apunta a algo fijado o prescrito, probablemente un momento señalado. «Me señalaras un tiempo» preserva esa lectura sin imponer una interpretación excesivamente técnica.
  doctrine_reference: Atención al contexto poético y al valor semántico contextual del sustantivo; evitar sobreespecificación exegética.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que prefirió «turns away» y «appoint a time». En español, esa decisión se refleja con «se aparte» y «me señalaras un tiempo», manteniendo la misma lectura contextual sin calcarlas de forma rígida.
  spanish_consistency_notes:
  - Se conserva «Sheol» de manera consistente con el criterio POB de transliteración cuando el término hebreo designa el ámbito de los muertos.
  - Se evita «SEÑOR» y se usa lenguaje directo para Dios, conforme al criterio de nombrar a Yahvé cuando el texto hebreo lo exige; en este verso no aparece el nombre divino, solo el pronombre posesivo.
  - «Ira» se eligió por ser la equivalencia natural de אַף en contexto idiomático.
  - La construcción optativa en español usa subjuntivo imperfecto para reflejar el deseo irreal o anhelante del hebreo.
