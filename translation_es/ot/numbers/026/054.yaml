  rationale: 'Se revisó la frase final para evitar el calco rígido «de él», manteniendo a la vez la referencia a los contados del grupo. Se simplificó el aparato de notas para concentrarlo en las dos decisiones realmente significativas: el distributivo de אִישׁ y la expresión concisa פְקֻדָיו.'
