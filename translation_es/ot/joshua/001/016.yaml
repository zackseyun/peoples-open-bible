translation:
  language: es
  text: 'Y respondieron a Josué[a], diciendo: «Todo lo que nos has mandado lo haremos, y adondequiera que nos envíes, iremos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «y a todo lugar al que nos envíes, iremos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲנוּ
  english_pob_choice: And they answered
  chosen_spanish: Y ellos respondieron
  alternatives_spanish:
  - Y ellos contestaron
  - Y ellos replicaron
  lexicon: HALOT
  rationale: ענה en narración introduce una respuesta formal. «Respondieron» conserva la relación discursiva y suena natural en español bíblico contemporáneo.
- source_word: אֶת יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: a Josué
  alternatives_spanish:
  - a Joshua
  lexicon: HALOT
  rationale: El marcador de objeto directo con ענה señala al destinatario de la respuesta. En español se expresa de forma idiomática con «a Josué».
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  lexicon: HALOT
  rationale: La fórmula de discurso indirecto se conserva con «diciendo», que mantiene la estructura hebrea sin volverla rígida.
- source_word: כֹּל אֲשֶׁר
  english_pob_choice: All that
  chosen_spanish: Todo lo que
  alternatives_spanish:
  - Todo cuanto
  - Todo aquello que
  lexicon: HALOT
  rationale: La construcción idiomática expresa totalidad de contenido. «Todo lo que» es la opción más natural y fiel en español.
- source_word: צִוִּיתָנוּ
  english_pob_choice: you have commanded us
  chosen_spanish: nos has mandado
  alternatives_spanish:
  - nos has ordenado
  - nos has dado mandato
  lexicon: HALOT
  rationale: צוה denota dar una orden o mandato. «Mandado» comunica la autoridad sin el tono más técnico de «ordenado»; el perfecto «has» refleja la vigencia inmediata de la instrucción, como en la lectura inglesa.
- source_word: נַעֲשֶׂה
  english_pob_choice: we will do
  chosen_spanish: lo haremos
  alternatives_spanish:
  - lo haremos cumplir
  - lo realizaremos
  lexicon: HALOT
  rationale: עשה aquí se refiere a ejecutar lo mandado. «Lo haremos» es conciso y reproduce el sentido de cumplimiento prometido.
- source_word: וְאֶל כָּל אֲשֶׁר
  english_pob_choice: and wherever
  chosen_spanish: y a dondequiera que
  alternatives_spanish:
  - y a todo lugar donde
  - y a cualquier lugar al que
  lexicon: HALOT
  rationale: La combinación con שלח y luego הלך tiene valor locativo. «A dondequiera que» conserva la dirección espacial sin perder naturalidad en español.
- source_word: תִּשְׁלָחֵנוּ
  english_pob_choice: you send us
  chosen_spanish: nos envíes
  alternatives_spanish:
  - nos mandes
  - nos despaches
  lexicon: HALOT
  rationale: שלח significa enviar. «Envíes» preserva el acto de asignación o misión sin añadir matices innecesarios.
- source_word: נֵלֵךְ
  english_pob_choice: we will go
  chosen_spanish: iremos
  alternatives_spanish:
  - iremos allá
  - marcharemos
  lexicon: HALOT
  rationale: הלך es el verbo común «ir». «Iremos» es una equivalencia natural y directa en español.
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el audit trail inglés: se mantiene la respuesta directa a Josué, la promesa de obediencia total y el matiz locativo de אל־כל אשר תשלחנו. No hubo revisiones aplicadas en el contexto inglés, por lo que la versión española sigue de cerca esa lectura sin introducir variantes no atestiguadas.'
  spanish_consistency_notes:
  - Se usa «Josué» para el nombre propio, en continuidad con la tradición bíblica española y con el contexto auditado.
  - Se conserva el futuro perifrástico en español por equivalencia natural con la promesa volitiva del hebreo.
  - «Mandado» y «enviar» mantienen la distinción entre dar una orden y enviar a un destino/función.
