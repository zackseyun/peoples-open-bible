base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/046/014.yaml
  text: And you shall prepare with it[a], morning by morning, a grain offering of a sixth of an ephah, and a third of a hin of oil to moisten the fine flour—a grain offering to Yahweh[c][b], a perpetual statute continually.
  footnotes:
  - marker: a
    text: Or 'for it' / 'upon it'; the Hebrew likely refers to the grain offering being prepared in addition to the daily lamb offering mentioned in the previous verse.
    reason: alternative_reading
  - marker: b
    text: Or 'to mix' the fine flour; the Hebrew verb is rare and suggests moistening the flour with oil.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'statutes of perpetuity continually,' an idiom stressing an enduring, regular requirement.
    reason: lexical_alternative
