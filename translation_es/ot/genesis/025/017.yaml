revisions:
- from: 'Estas fueron las vidas de Ismael: ciento treinta y siete años. Y expiró[a] y murió, y fue reunido con su pueblo.'
  to: 'Estos fueron los años de la vida de Ismael: ciento treinta y siete años. Y expiró[a] y murió, y fue reunido con su pueblo[b].'
  rationale: Se corrige el modismo de lifespan a un español fiel y natural ('los años de la vida de Ismael'), se repara la nota léxica para que ofrezca una alternativa real al verbo 'expiró', y se añade la nota cultural presente en la auditoría inglesa para el modismo funerario. El resto de la estructura y sentido del borrador se conserva.
