  text: וְ/עַמֵּ/ךְ֙ כֻּלָּ֣/ם צַדִּיקִ֔ים לְ/עוֹלָ֖ם יִ֣ירְשׁוּ אָ֑רֶץ נֵ֧צֶר מטע/ו מַעֲשֵׂ֥ה יָדַ֖/י לְ/הִתְפָּאֵֽר׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/060/021.yaml
  text: And all your people will be righteous[a]; forever they will possess the land, the shoot of my planting, the work of my hands[c][b], that I may be glorified.
  footnotes:
  - marker: a
    text: Or 'will inherit the land.' The Hebrew verb can mean 'inherit' or 'possess.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the earth.' The Hebrew אֶרֶץ can mean 'land' or 'earth'; 'land' fits the restoration context more specifically.
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew: ''the shoot of his planting.'' Some interpreters or textual traditions smooth this to ''my planting'' because the next phrase reads ''the work of my hands,'' but the main text preserves the person shift of the Masoretic Text.'
    reason: textual_variant
