translation:
  language: es
  text: Si un hombre tiene dos esposas[a], una amada y la otra no amada, y ambas, la amada y la no amada, le han dado a luz hijos varones, y el hijo primogénito pertenece a la no amada,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «odiada» para «no amada»; el término hebreo puede tener un sentido más fuerte, pero aquí probablemente señala a la esposa que no es favorecida en contraste con la esposa amada.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: En una ley casuística, la condición hebrea se expresa naturalmente en español con «Si», que conserva el valor hipotético-normativo mejor que una simple lectura temporal.
- source_word: תִהְיֶיןָ לְאִישׁ
  english_pob_choice: a man has
  chosen_spanish: un hombre tiene
  alternatives_spanish:
  - hay para un hombre
  - un hombre llega a tener
  lexicon: HALOT
  rationale: El hebreo expresa posesión/existencia en una construcción legal. «Tiene» mantiene la relación posesiva de forma idiomática en español sin perder la fuerza casuística.
- source_word: שְׁתֵּי נָשִׁים
  english_pob_choice: two wives
  chosen_spanish: dos esposas
  alternatives_spanish:
  - dos mujeres
  lexicon: HALOT
  rationale: En este contexto legal, נָשִׁים se refiere a esposas, no solo a mujeres. «Esposas» preserva el marco matrimonial e inheritable del pasaje.
- source_word: הָאַחַת אֲהוּבָה
  english_pob_choice: one loved
  chosen_spanish: una amada
  alternatives_spanish:
  - una querida
  - una amada/favorecida
  lexicon: HALOT
  rationale: «Amada» traduce el valor pasivo/adjetival de אֲהוּבָה de manera directa y natural en español, sin debilitarlo con una paráfrasis interpretativa.
- source_word: וְהָאַחַת שְׂנוּאָה
  english_pob_choice: the other unloved
  chosen_spanish: la otra no amada
  alternatives_spanish:
  - la otra odiada
  - la otra menos amada
  lexicon: HALOT
  rationale: Se evita «odiada» porque puede sobrecargar el contexto con hostilidad emocional explícita. «No amada» conserva la oposición con «amada» y permite la misma tensión semántica que el POB inglés resguarda con «unloved».
- source_word: וְיָלְדוּ ל֣/וֹ בָנִ֔ים
  english_pob_choice: have borne him sons
  chosen_spanish: le han dado hijos
  alternatives_spanish:
  - le han dado a luz hijos
  - le han dado hijos varones
  - le han nacido hijos
  lexicon: HALOT
  rationale: El hebreo dice «han dado a luz para él hijos». En español, «le han dado hijos» reproduce la relación sin sonar forzado. Aunque בָנִים es literalmente «hijos/varones», el contexto inmediato ya especifica al primogénito, y «hijos» evita una repetición rígida.
- source_word: הָאֲהוּבָה וְהַשְּׂנוּאָה
  english_pob_choice: both the loved and the unloved
  chosen_spanish: la amada y la no amada
  alternatives_spanish:
  - ambas, la amada y la no amada
  - la esposa amada y la esposa no amada
  lexicon: HALOT
  rationale: El hebreo repite los adjetivos sustantivados; en español basta mantener la oposición directa. Se omitió «ambas» por sobriedad, ya que la coordinación misma ya conserva que las dos dieron hijos.
- source_word: וְהָיָה הַבֵּן הַבְּכוֹר
  english_pob_choice: and the firstborn son
  chosen_spanish: y el hijo primogénito
  alternatives_spanish:
  - y el primogénito
  - y el hijo, el primogénito
  lexicon: HALOT
  rationale: «Primogénito» es la forma más natural y precisa para expresar el estatuto legal del primero en nacer. «Hijo primogénito» mantiene el sustantivo requerido por el contexto de herencia.
- source_word: לַשְּׂנִיאָה
  english_pob_choice: belongs to the unloved wife
  chosen_spanish: pertenece a la no amada
  alternatives_spanish:
  - es de la no amada
  - pertenece a la esposa no amada
  lexicon: HALOT
  rationale: La lamed final expresa relación/posesión. «Pertenece a la no amada» comunica el vínculo del primogénito con la madre en el marco sucesorio sin introducir vocabulario ajeno al hebreo.
theological_decisions:
- issue: Valor de שְׂנוּאָה en una ley familiar e inheritaria
  english_pob_reading: unloved rather than hated
  chosen_spanish_reading: no amada en lugar de odiada
  alternative_spanish_readings:
  - odiada
  - menos amada
  rationale: En contextos familiares, el término puede marcar desafección o preferencia negativa más que odio activo. «No amada» conserva la tensión semántica que el POB inglés protege con «unloved» y evita afirmar una hostilidad que el contexto legal no exige.
  doctrine_reference: Principios POB de precisión léxica y no-sobreinterpretación
- issue: Referencia de primogenitura y filiación
  english_pob_reading: the firstborn son belongs to the unloved wife
  chosen_spanish_reading: el hijo primogénito pertenece a la no amada
  alternative_spanish_readings:
  - el primogénito es de la no amada
  - el hijo primogénito es de la esposa no amada
  rationale: Se mantiene la relación legal de pertenencia/filiación en términos directos. «Pertenece a» reproduce la función relacional de לַשְּׂנִיאָה dentro del caso de herencia.
  doctrine_reference: Deuteronomio 21:15-17; principio de lectura legal del texto
- issue: Tratamiento del contraste amado / no amado
  english_pob_reading: loved / unloved
  chosen_spanish_reading: amada / no amada
  alternative_spanish_readings:
  - amada / odiada
  - amada / menos amada
  rationale: La pareja léxica se conserva de manera simétrica. «No amada» permite mantener el contraste sin intensificarlo a «odiada» ni debilitarlo demasiado con una glosa interpretativa.
  doctrine_reference: Lexicografía semántica y contraste textual
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail en inglés: se preservó la estructura casuística, el contraste amado/no amado, y la referencia relacional del primogénito. La decisión clave fue traducir שְׂנוּאָה como «no amada» para evitar sobrerrepresentar hostilidad, manteniendo una nota que reconoce la alternativa fuerte «odiada».'
  spanish_consistency_notes:
  - «Amada / no amada» mantiene el paralelismo con el inglés POB y la oposición del hebreo.
  - «Esposas» se usa por el contexto jurídico y de herencia, no como mero equivalente genérico de «mujeres».
  - «Primogénito» expresa con naturalidad el estatuto legal del hijo primero en nacer.
  - La nota al pie se ancla en «no amada» porque allí está la tensión léxica principal.
