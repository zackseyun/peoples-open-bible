translation:
  language: es
  text: y un hombre se acuesta con ella, con emisión de semen[a], y queda oculto a los ojos de su marido, y ella permanece escondida, y ha quedado impura, y no hay testigo contra ella[b], y no fue sorprendida[c]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «el yacer de semen», es decir, relación sexual.
    reason: lexical_alternative
  - marker: b
    text: 'O: «no hay testigo concerniente a ella».'
    reason: alternative_reading
  - marker: c
    text: 'O: «no fue apresada»; algunos entienden que esto implica: «no fue forzada».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְשָׁכַב / שָׁכַב
  english_pob_choice: lies
  chosen_spanish: se acuesta
  alternatives_spanish:
  - yace con ella
  - se echa con ella
  lexicon: HALOT
  rationale: En contexto sexual-legal, el verbo debe expresar relación sexual de manera clara sin volverse burdo. "Se acuesta con ella" comunica el idiomatismo hebreo de forma natural en español y conserva la referencia al acto.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un varón
  - alguien
  lexicon: HALOT
  rationale: El hebreo señala a un sujeto masculino singular, pertinente al caso legal. "Un hombre" es el equivalente más natural y preciso en español.
- source_word: אֹתָהּ
  english_pob_choice: with her
  chosen_spanish: con ella
  alternatives_spanish:
  - a ella
  - de ella
  lexicon: HALOT
  rationale: La construcción idiomática con שׁכב en español requiere la preposición "con" para reflejar el sentido relacional/sexual del verbo, no un simple objeto directo.
- source_word: שִׁכְבַת זֶרַע
  english_pob_choice: with an emission of seed
  chosen_spanish: con emisión de semen
  alternatives_spanish:
  - con derramamiento de semen
  - con eyaculación
  - con emisión de semilla
  lexicon: HALOT
  rationale: Se conserva el valor más literal y técnico de la expresión, como en la revisión inglesa. "Semen" evita ambigüedad y mantiene el registro legal/puritánico del pasaje.
- source_word: וְנֶעְלַם מֵעֵינֵי אִישָׁהּ
  english_pob_choice: it is hidden from the eyes of her husband
  chosen_spanish: queda oculto a los ojos de su marido
  alternatives_spanish:
  - se oculta de los ojos de su marido
  - pasa inadvertido para su marido
  lexicon: HALOT
  rationale: Se mantiene la imagen hebrea de "los ojos" sin forzar una paráfrasis. "Queda oculto" conserva la pasiva y la fórmula idiomática de modo inteligible.
- source_word: וְנִסְתְּרָה
  english_pob_choice: she is concealed
  chosen_spanish: ella permanece escondida
  alternatives_spanish:
  - ella está escondida
  - ella se mantiene oculta
  lexicon: HALOT
  rationale: El nifal puede continuar la idea de ocultamiento o reserva del caso. "Permanece escondida" conserva la ambigüedad pasiva/reflexiva sin resolverla demasiado pronto.
- source_word: וְהִיא נִטְמָאָה
  english_pob_choice: she has become unclean
  chosen_spanish: ella se ha contaminado
  alternatives_spanish:
  - ella se ha hecho impura
  - ella ha quedado impura
  - ella se ha vuelto inmunda
  lexicon: HALOT
  rationale: En español, "contaminado" funciona bien para el registro de pureza ritual y evita una lectura excesivamente moralizante. Se mantiene el valor de טמא como estado de impureza/contaminación ritual.
- source_word: וְעֵד אֵין בָּהּ
  english_pob_choice: there is no witness against her
  chosen_spanish: no hay testigo contra ella
  alternatives_spanish:
  - no hay testigo en su contra
  - no hay testigo acerca de ella
  lexicon: HALOT
  rationale: La formulación legal más natural en español es "contra ella", que expresa la fuerza acusatoria del hebreo. Se preserva la ausencia de prueba/testimonio.
- source_word: וְהִוא לֹא נִתְפָּשָׂה
  english_pob_choice: she was not caught
  chosen_spanish: no fue sorprendida
  alternatives_spanish:
  - no fue atrapada
  - no fue apresada
  - no fue forzada
  lexicon: HALOT
  rationale: '"Sorprendida" en español jurídico comunica haber sido descubierta o aprehendida en el acto. Se deja abierta la tensión semántica del hebreo entre captura/detección y posible coerción, sin imponer esta última en el texto principal.'
theological_decisions:
- issue: Lenguaje de pureza ritual en נִטְמָאָה
  english_pob_reading: she has become unclean
  chosen_spanish_reading: ella se ha contaminado
  alternative_spanish_readings:
  - ella se ha hecho impura
  - ella ha quedado impura
  rationale: El pasaje pertenece a una sección legal de pureza. "Se ha contaminado" conserva la categoría ritual sin traducirla automáticamente como pecado consumado ni atenuarla como simple mancha moral.
  doctrine_reference: Números 5:11-31; Levítico 15; filosofía de traducción §1, §6
- issue: Sentido de לֹא נִתְפָּשָׂה
  english_pob_reading: she was not caught
  chosen_spanish_reading: no fue sorprendida
  alternative_spanish_readings:
  - no fue atrapada
  - no fue apresada
  - no fue forzada
  rationale: El contexto favorece la idea de no haber sido descubierta o probada en el acto. La posible lectura de coerción se reconoce como alternativa, pero no se impone en la línea principal para no sobretraducir el verbo.
  doctrine_reference: Números 5:13; filosofía de traducción §3
translation_notes:
  revision_awareness: La redacción sigue el audit trail inglés más reciente, que volvió más literal שִׁכְבַת זֶרַע como "with an emission of seed". Por eso el español evita una paráfrasis general como "sexualmente" y conserva la referencia concreta a "emisión de semen". También se mantiene la tensión interpretativa de נִתְפָּשָׂה con una opción principal de descubrimiento/aprehensión y una nota que reconoce la posible lectura de coerción.
  spanish_consistency_notes:
  - Se usó "Yahvé" como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se prefirió "contaminado/contaminada" en el lenguaje ritual para mantener consistencia con el registro de pureza legal.
  - Se evitó "pecado" o "adulterio" en la línea principal porque el hebreo aquí describe estado ritual y ausencia de testigos, no una calificación explícita del delito.
  - La puntuación con raya final conserva el corte abierto del verso, acorde con el hebreo y el inglés auditado.
