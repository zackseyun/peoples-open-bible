revisions:
- from: Tomarán un manojo de hisopo y lo mojarán en la sangre que está en la cuenca[a], y tocarán el dintel y los dos postes con parte de la sangre que está en la cuenca. Y ninguno de ustedes saldrá de la entrada de su casa hasta la mañana.
  to: Tomarán un manojo de hisopo y lo mojarán en la sangre que está en la vasija[a], y tocarán el dintel y los dos postes de la puerta con parte de la sangre que está en la vasija. Y ninguno de ustedes saldrá de la entrada de su casa hasta la mañana.
  rationale: Se revisa «cuenca» a «vasija» por claridad y naturalidad en español neutral, manteniendo la decisión contextual de entender סף como recipiente y conservando la alternativa «umbral» en nota. También se precisa «los dos postes» como «los dos postes de la puerta» para reflejar mejor el término arquitectónico hebreo sin volver el texto rígido. No se requiere adjudicación superior porque las correcciones son léxicas y estilísticas menores dentro de una decisión ya documentada por la auditoría inglesa.
