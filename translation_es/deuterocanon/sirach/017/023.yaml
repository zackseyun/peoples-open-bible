translation:
  language: es
  text: ¿Quién alabará al Altísimo en Hades[a], en lugar de los vivos que dan gracias[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Seol' o 'la tumba'; el griego dice 'Hades', refiriéndose aquí al ámbito de los muertos.
    reason: lexical_alternative
  - marker: b
    text: «Dan gracias» también puede entenderse como «ofrecen reconocimiento» o «hacen confesión», con el sentido de alabanza agradecida en el culto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑψίστῳ
  english_pob_choice: to the Most High
  chosen_spanish: al Altísimo
  alternatives_spanish:
  - al Más Alto
  lexicon: LSJ
  rationale: El dativo marca al destinatario de la alabanza; en español, 'al Altísimo' conserva el título divino idiomático y natural, equivalente al inglés POB 'the Most High'.
- source_word: τίς
  english_pob_choice: Who will
  chosen_spanish: ¿Quién alabará...?
  alternatives_spanish:
  - ¿Quién...?
  lexicon: LSJ
  rationale: El pronombre interrogativo introduce una pregunta retórica; en español conviene explicitar el verbo para que la estructura suene natural y conserve el valor futuro/retórico del griego.
- source_word: αἰνέσει
  english_pob_choice: praise
  chosen_spanish: alabará
  alternatives_spanish:
  - dará alabanza
  - alabará con cántico
  lexicon: LSJ
  rationale: La forma verbal pide un verbo simple de alabanza. 'Alabar' es la correspondencia más directa y no añade el matiz de 'cantar' que el griego no exige.
- source_word: ἐν ᾅδου
  english_pob_choice: in Hades
  chosen_spanish: en Hades
  alternatives_spanish:
  - en el Seol
  - en la tumba
  - entre los muertos
  lexicon: LSJ
  rationale: Se conserva 'Hades' porque el texto griego usa ᾅδης de manera explícita. Esto mantiene la huella del testimonio griego sin resolverlo prematuramente en una equivalencia doctrinal como 'infierno'.
- source_word: ἀντὶ ζώντων
  english_pob_choice: instead of the living
  chosen_spanish: en lugar de los vivos
  alternatives_spanish:
  - en vez de los vivos
  - en lugar de los que viven
  lexicon: LSJ
  rationale: ἀντί expresa sustitución o contraste. 'En lugar de' comunica bien la oposición entre los muertos y los vivos en español actual.
- source_word: καὶ διδόντων ἀνθομολόγησιν
  english_pob_choice: who give thanks
  chosen_spanish: que dan gracias
  alternatives_spanish:
  - que ofrecen acción de gracias
  - que hacen confesión
  - que dan agradecimiento
  lexicon: LSJ
  rationale: ἀνθομολόγησις admite 'acción de gracias', 'confesión' o 'reconocimiento'. En este contexto litúrgico y de alabanza, 'dar gracias' reproduce mejor la lectura del POB inglés y su tono de culto.
theological_decisions:
- issue: Sentido de ᾅδης en el pasaje
  english_pob_reading: Hades as the realm of the dead, not a developed doctrine of final punishment
  chosen_spanish_reading: Hades como el ámbito de los muertos, no como una doctrina desarrollada de castigo final
  alternative_spanish_readings:
  - Seol
  - la tumba
  - el infierno
  rationale: La pregunta contrapone a los muertos con los vivos capaces de alabar y dar gracias. Mantener 'Hades' preserva la tensión del texto y evita cargarlo con una doctrina posterior que el griego aquí no exige.
  doctrine_reference: Mantener la tensión teológica; primacía del original sobre la tradición de traducción.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'sing praise to' por 'praise' para un render más directo de αἰνέσει. Esta draft española sigue esa revisión con 'alabará', evitando introducir el matiz de canto. También conserva el contraste con 'los vivos que dan gracias'.
  spanish_consistency_notes:
  - Se mantiene 'Hades' en el texto principal para reflejar el griego ᾅδης, con nota alternativa para 'Seol'/'la tumba'.
  - '''Altísimo'' se usa como título divino natural en español, coherente con el valor de Ὕψιστος.'
  - '''Dar gracias'' conserva el sentido cultual de ἀνθομολόγησις sin volverlo más doctrinal de lo que el pasaje permite.'
  - La pregunta retórica se adapta a una sintaxis española fluida sin alterar la oposición entre muertos y vivos.
