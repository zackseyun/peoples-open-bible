translation:
  language: es
  text: Porque no sé adular[a]; de otro modo, mi Hacedor[b] pronto me llevaría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «dar títulos halagadores». El verbo hebreo puede referirse a dirigirse a alguien con expresiones honoríficas de manera halagadora o parcial.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mi Hacedor pronto me quitaría». El hebreo no dice explícitamente «mataría», aunque puede implicar una remoción en juicio.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La partícula introduce la razón de la afirmación anterior; 'Porque' comunica bien el valor explicativo sin sonar mecánico en español.
- source_word: לֹא יָדַעְתִּי
  english_pob_choice: I do not know
  chosen_spanish: no sé
  alternatives_spanish:
  - no he aprendido
  - no sé cómo
  lexicon: HALOT
  rationale: En esta construcción con infinitivo implícito, el sentido es incapacidad o falta de destreza práctica; 'no sé' expresa esa fuerza de manera natural y fiel.
- source_word: אֲכַנֶּה
  english_pob_choice: to flatter
  chosen_spanish: adular
  alternatives_spanish:
  - dar títulos halagadores
  - dirigirme con halagos
  lexicon: HALOT
  rationale: El verbo en Piel aquí implica halagar/mostrar parcialidad con palabras. 'Adular' conserva el matiz negativo y es más conciso y actual que una paráfrasis más larga.
- source_word: כִּמְעַט
  english_pob_choice: soon
  chosen_spanish: pronto
  alternatives_spanish:
  - en un poco de tiempo
  - casi
  lexicon: HALOT
  rationale: En este aviso, la expresión señala inmediatez de consecuencia; 'pronto' transmite bien la urgencia temporal sin introducir una lectura excesivamente interpretativa.
- source_word: יִשָּׂאֵנִי
  english_pob_choice: would carry me away
  chosen_spanish: me apartaría
  alternatives_spanish:
  - me llevaría
  - me retiraría
  lexicon: HALOT
  rationale: נשא puede significar llevar, alzar o retirar. 'Apartaría' conserva la idea de remoción por juicio sin especificar muerte, manteniendo la tensión del hebreo y su amplitud semántica.
- source_word: עֹשֵׂנִי
  english_pob_choice: my Maker
  chosen_spanish: mi Hacedor
  alternatives_spanish:
  - el que me hizo
  - mi Creador
  lexicon: HALOT
  rationale: El participio con sufijo expresa al que me hizo; 'Hacedor' es una forma digna y fiel que preserva la relación creador-criatura y evita resolver el matiz con un término más doctrinal.
theological_decisions:
- issue: Alcance de la amenaza divina
  english_pob_reading: my Maker would soon carry me away
  chosen_spanish_reading: mi Hacedor pronto me apartaría
  alternative_spanish_readings:
  - mi Hacedor pronto me llevaría
  - mi Hacedor pronto me quitaría
  rationale: El hebreo usa un verbo amplio que no dice explícitamente 'matar'. Por eso se mantiene una formulación de remoción/apartamiento, dejando abierta la posibilidad de juicio mortal sin añadir más de lo que el texto afirma.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con la lectura auditada de la POB inglesa: se conserva el valor explicativo de כִּי, la incapacidad práctica de לֹא יָדַעְתִּי + אֲכַנֶּה, y la amplitud de יִשָּׂאֵנִי sin especificar muerte. No se detectaron revisiones aplicadas en el tramo inglés, y el consenso de revisión fue de alta concordancia.'
  spanish_consistency_notes:
  - Se usa 'Hacedor' para עֹשֵׂנִי, siguiendo la línea POB de preservar la relación creador-criatura con un término breve y solemne.
  - '''Adular'' se prefiere aquí por su valor negativo directo y su naturalidad en español, sin borrar el matiz de parcialidad presente en el hebreo.'
  - '''Apartaría'' se eligió para mantener abierta la fuerza de remoción/jucio de נשא, evitando una traducción demasiado específica como ''mataría''.'
