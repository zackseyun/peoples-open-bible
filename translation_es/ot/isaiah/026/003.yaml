    issue: Falta la nota equivalente a la nota inglesa sobre la lectura tradicional ('You keep him... whose mind...').
    rationale: El expediente inglés preserva explícitamente esa alternativa por razones de auditabilidad y de historia de traducción. Omitirla en español borra una decisión documentada importante sobre el sujeto de la cláusula.
  - severity: low
