translation:
  language: es
  text: ¡Ay de los habitantes de la costa del mar, nación de los cereteos[a]! La palabra de Yahvé está contra ustedes, Canaán, tierra de los filisteos; y te destruiré hasta que no quede habitante alguno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Cereteos» refleja el etnónimo hebreo כְּרֵתִים; también puede verse la grafía tradicional «quereteos».
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay, ay de!
  lexicon: HALOT
  rationale: Como interjección profética de juicio, «¡Ay de!» conserva el tono oracular sin sonar artificial en español. «¡Ay!» sería más breve pero menos explícito; «¡Ay, ay de!» sería más enfático de lo necesario.
- source_word: יֹשְׁבֵי
  english_pob_choice: inhabitants of
  chosen_spanish: los habitantes de
  alternatives_spanish:
  - los que habitan en
  - los moradores de
  lexicon: HALOT
  rationale: El participio sustantivado expresa a quienes residen en el lugar; «los habitantes de» es natural y fiel al valor substantivo.
- source_word: חֶבֶל הַיָּם
  english_pob_choice: the seacoast
  chosen_spanish: la costa del mar
  alternatives_spanish:
  - la región del mar
  - la costa
  lexicon: HALOT
  rationale: La expresión designa el tramo costero junto al mar. «La costa del mar» preserva la referencia geográfica con claridad y sin tecnicismos.
- source_word: גּוֹי כְּרֵתִים
  english_pob_choice: nation of the Cherethites
  chosen_spanish: nación de los cereteos
  alternatives_spanish:
  - nación de los quereteos
  - pueblo de los cereteos
  lexicon: HALOT
  rationale: Se mantiene el etnónimo como nombre propio transliterado al español. «Cereteos» sigue la forma tradicional en castellano; «quereteos» es una alternativa posible, pero menos asentada. La opción evita sustituir el etnónimo por una glosa y conserva el paralelismo de nación/pueblo.
- source_word: דְּבַר יְהוָה
  english_pob_choice: The word of Yahweh
  chosen_spanish: La palabra de Yahvé
  alternatives_spanish:
  - La palabra de Yahvé Dios
  - La palabra de Yahvé está contra ustedes
  lexicon: HALOT
  rationale: Se conserva la fórmula profética con el nombre divino «Yahvé», conforme a la norma del proyecto para יְהוָה. En español, «palabra de Yahvé» reproduce con transparencia la construcción de pertenencia.
- source_word: עֲלֵיכֶם
  english_pob_choice: is against you
  chosen_spanish: está contra ustedes
  alternatives_spanish:
  - cae sobre ustedes
  - viene contra ustedes
  lexicon: HALOT
  rationale: En contexto de juicio, la preposición expresa dirección hostil. «Está contra ustedes» comunica esa fuerza de modo natural; «cae sobre ustedes» sería más figurativo y menos directo.
- source_word: כְּנַעַן אֶרֶץ פְּלִשְׁתִּים
  english_pob_choice: Canaan, land of the Philistines
  chosen_spanish: Canaán, tierra de los filisteos
  alternatives_spanish:
  - Canaán, la tierra de los filisteos
  - ¡Oh Canaán, tierra de los filisteos!
  lexicon: HALOT
  rationale: 'Se conserva la identificación apposicional y el eco geográfico-retórico: «Canaán» seguido de «tierra de los filisteos». La forma mantiene la tensión de llamar a Filistea por el nombre de Canaán.'
- source_word: וְהַאֲבַדְתִּיךְ
  english_pob_choice: and I will destroy you
  chosen_spanish: y yo los destruiré
  alternatives_spanish:
  - y te destruiré
  - y los haré perecer
  lexicon: HALOT
  rationale: El verbo causativo de אבד expresa destrucción total. «Los destruiré» es claro y grave; se usa «los» por concordancia con el plural colectivo de la dirección previa («ustedes»).
- source_word: מֵאֵין יוֹשֵׁב
  english_pob_choice: until no inhabitant remains
  chosen_spanish: hasta que no quede habitante alguno
  alternatives_spanish:
  - hasta que no quede nadie que habite allí
  - sin que quede habitante
  lexicon: HALOT
  rationale: La frase idiomática denota despoblación total. «Hasta que no quede habitante alguno» preserva el resultado completo sin exceder el sentido literal.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. En esta edición española se adopta «Yahvé», conforme al estándar del proyecto para preservar el nombre propio del pacto y evitar la sustitución reverencial que borra la forma original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Etiqueta étnica y geográfica de Filistea
  english_pob_reading: Canaan, land of the Philistines
  chosen_spanish_reading: Canaán, tierra de los filisteos
  alternative_spanish_readings:
  - Canaán, tierra filistea
  - Canaán, país de los filisteos
  rationale: El hebreo une una designación histórica («Canaán») con la tierra identificada por sus ocupantes. Se conserva esa tensión para no domesticar el golpe retórico del oráculo, que rebaja a Filistea a su antigua pertenencia cananea.
  doctrine_reference: 'DOCTRINE.md: Translation principles — preserve rhetorical and historical identifications where present'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la revisión más reciente del audit trail: se traduce כְּרֵתִים con la forma tradicional española del etnónimo, se mantiene la fórmula profética completa y se conserva la identificación retórica «Canaán, tierra de los filisteos». La decisión principal de ajuste frente al inglés auditado es el uso de «Yahvé» en lugar de «the LORD»/«Yahweh» por la norma española del proyecto.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה en coherencia con el estándar español del proyecto.
  - Se usa «cereteos» como etnónimo español natural; la nota recoge la alternativa tradicional de grafía.
  - 'La estructura del versículo conserva el paralelismo del hebreo: interjección de juicio, vocativo geográfico/étnico, declaración de Yahvé y sentencia final de desolación.'
  - Se evita añadir pronombres o intensificadores no exigidos por el hebreo, salvo el «yo» explícito para claridad sintáctica española.
