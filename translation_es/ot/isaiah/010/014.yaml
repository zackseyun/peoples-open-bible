- from: Mi mano halló la riqueza de los pueblos, como quien halla un nido[a]; y como quien recoge huevos abandonados, yo recogí toda la tierra[b], y no hubo nadie que aleteara un ala, ni que abriera la boca, ni que piar[a].
  to: Mi mano halló la riqueza de los pueblos, como quien halla un nido; y como quien recoge huevos abandonados, yo recogí toda la tierra[a], y no hubo nadie que aleteara un ala, ni que abriera la boca, ni que piara.
  rationale: Se corrige un error gramatical importante ('ni que piar' > 'ni que piara') y se elimina la reutilización indebida del marcador [a]. Se conserva el sentido del original y del POB inglés, con una sola nota necesaria sobre ‘tierra/país’.
