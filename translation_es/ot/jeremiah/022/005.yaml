translation:
  language: es
  text: Pero si no escuchan estas palabras[a], juro por mí mismo, declara Yahvé, que esta casa se convertirá en ruina.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «este palacio»; en contexto, «esta casa» probablemente se refiere a la casa real o al palacio del rey de Judá.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Y si no
  lexicon: HALOT
  rationale: El hebreo introduce una condición con matiz adversativo en el contexto; «Pero si» mantiene ese giro natural en español sin perder la lógica condicional.
- source_word: תִשְׁמְעוּ
  english_pob_choice: you do not listen
  chosen_spanish: no escuchan
  alternatives_spanish:
  - no oyen
  - no obedecen
  lexicon: HALOT
  rationale: שמע puede abarcar oír, escuchar y obedecer. Aquí el objeto son «estas palabras», por lo que «escuchan» conserva el sentido auditivo y la respuesta debida, sin forzar demasiado «obedecen».
- source_word: הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas cosas
  - estos dichos
  lexicon: HALOT
  rationale: «Palabras» es la equivalencia más directa y natural en un contexto de advertencia profética.
- source_word: בִּי נִשְׁבַּעְתִּי
  english_pob_choice: I swear by myself
  chosen_spanish: juro por mí mismo
  alternatives_spanish:
  - he jurado por mí mismo
  - juro por mí
  lexicon: HALOT
  rationale: La fórmula de juramento divina con בי y נשבעתי se expresa naturalmente en español como «juro por mí mismo», preservando la solemnidad y el valor performativo del juramento.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la fórmula profética con el nombre divino en la forma editorial del proyecto, «Yahvé», y el verbo «declara» conserva el registro solemne de נְאֻם.
- source_word: לְחָרְבָּה
  english_pob_choice: a ruin
  chosen_spanish: ruina
  alternatives_spanish:
  - desolación
  - destrucción
  lexicon: HALOT
  rationale: El sustantivo comunica devastación o ruina resultante. En español, «ruina» funciona bien con «se convertirá en» y refleja el resultado del juicio anunciado.
- source_word: יִהְיֶה הַבַּיִת הַזֶּה
  english_pob_choice: this house will become
  chosen_spanish: esta casa se convertirá
  alternatives_spanish:
  - esta casa será
  - esta casa llegará a ser
  lexicon: HALOT
  rationale: El hebreo dice literalmente que «será» una ruina, pero en español «se convertirá en ruina» comunica con claridad el resultado sin perder el valor de cambio de estado. Se conserva «casa» porque el texto hebreo usa ese término.
theological_decisions:
- issue: Fórmula de juramento divino
  english_pob_reading: I swear by myself
  chosen_spanish_reading: juro por mí mismo
  alternative_spanish_readings:
  - he jurado por mí mismo
  - juro por mí
  rationale: La expresión enfatiza la autoimplicación de Yahvé en el juramento; «juro por mí mismo» mantiene esa fuerza directa y solemne en español.
  doctrine_reference: Juramento divino y solemnidad profética (cf. fórmulas de juramento en Jeremías)
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto sigue el consenso alto del control cruzado y conserva la equivalencia óptima ya aprobada en inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para el nombre divino.
  - Se conserva «casa» en el cuerpo principal para respetar el término hebreo, dejando la posible precisión contextual en nota.
  - La construcción verbal española busca naturalidad sin debilitar el tono de amenaza judicial del hebreo.
