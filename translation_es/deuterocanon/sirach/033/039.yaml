    text: 'O: «se vuelve enemistad» o «se vuelve hostilidad»; el griego usa el sustantivo abstracto «enemistad», no la palabra personal «enemigo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «revelará una disputa como reproche contra ti». La frase griega es compacta y puede destacar tanto la disputa misma como la vergüenza que produce.'
    reason: alternative_reading
  revision_rationale: Se corrige un calco poco natural ('se vuelve enemistad') por una formulación idiomática ('se vuelve hostil') y se preserva en nota el dato importante de que el griego usa un abstracto. También se mejora 'descubrirá' a 'sacará a la luz' para reflejar mejor una exposición deshonrosa en español natural.
