revisions:
- from: Y las cámaras superiores eran más estrechas[a], porque los pasillos[a] les quitaban espacio, más que a las inferiores y a las intermedias del edificio.
  to: Y las cámaras superiores eran más estrechas, porque las galerías[a] les quitaban espacio, más que a las inferiores y a las intermedias del edificio.
  rationale: Se reemplaza 'pasillos' por 'galerías' para ajustarse mejor a la decisión léxica auditada y al registro arquitectónico del pasaje. La nota se revisa para reflejar más fielmente las alternativas preservadas por la POB inglesa y la incertidumbre del término raro. También se elimina la duplicación del marcador de nota, dejándolo solo en el término discutido.
