translation:
  language: es
  text: Y durmió Joacaz[a] con sus padres, y lo sepultaron en Samaria. Entonces Joás, su hijo, reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"Joacaz" corresponde al nombre hebreo יְהוֹאָחָז; en algunas tradiciones también aparece como "Jehoacaz".'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: lay down
  chosen_spanish: durmió
  alternatives_spanish:
  - se acostó
  - yacía
  - descansó
  - murió
  lexicon: HALOT
  rationale: En la fórmula real de muerte con 'con sus padres', el hebreo usa un giro convencional. En español, 'durmió' conserva la imagen idiomática sin volverla demasiado interpretativa, y evita la calca poco natural 'se acostó'. El contexto deja claro que no es sueño literal.
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  - con sus padres ancestrales
  lexicon: HALOT
  rationale: '''Padres'' reproduce el término relacional y la fórmula dinástica del hebreo. ''Antepasados'' explicaría el sentido, pero debilita la correspondencia formal y la fórmula tradicional de reyes.'
- source_word: וַיִּקְבְּרֻהוּ
  english_pob_choice: they buried him
  chosen_spanish: lo sepultaron
  alternatives_spanish:
  - lo enterraron
  - fue sepultado
  lexicon: HALOT
  rationale: El verbo hebreo está en plural con objeto directo; 'lo sepultaron' conserva la acción de un sujeto implícito plural sin forzar el pasivo. 'Sepultar' mantiene un registro digno y bíblico, equivalente al acto funerario del texto.
- source_word: בְּשֹׁמְרוֹן
  english_pob_choice: in Samaria
  chosen_spanish: en Samaria
  alternatives_spanish:
  - en la ciudad de Samaria
  lexicon: HALOT
  rationale: La preposición local 'en' corresponde naturalmente al hebreo בְּ. 'Samaria' es el topónimo estándar en español y no requiere expansión.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - llegó a reinar
  lexicon: HALOT
  rationale: En la fórmula sucesoria, 'reinó' es la manera más directa y natural en español de reflejar מלך sin añadir matices no presentes. 'Comenzó a reinar' expresa el inicio, pero el hebreo puede abarcar simplemente el acto de suceder al rey anterior.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - después de él
  lexicon: HALOT
  rationale: '''En su lugar'' comunica con claridad la sucesión dinástica. Es una equivalencia idiomática fiel al valor de reemplazo del hebreo, y resulta natural en español bíblico actual.'
- source_word: יְהוֹאָחָז
  english_pob_choice: Jehoahaz
  chosen_spanish: Jehúaz
  alternatives_spanish:
  - Joacaz
  - Jehoacaz
  lexicon: Standard Spanish transliteration conventions; contextual name form
  rationale: Se adopta una transliteración castellana tradicional y reconocible para este nombre real, evitando la forma inglesa. 'Jehúaz' mantiene la huella del nombre hebreo y es apto en un registro bíblico moderno; 'Joacaz' y 'Jehoacaz' son alternativas posibles según tradición de transliteración.
- source_word: יוֹאָשׁ
  english_pob_choice: Joash
  chosen_spanish: Joás
  alternatives_spanish:
  - Jeoás
  - Joás
  lexicon: Standard Spanish transliteration conventions
  rationale: '''Joás'' es la forma española más establecida para יוֹאָשׁ y corresponde bien al nombre real. Evita la forma inglesa y conserva la identificación tradicional del personaje.'
theological_decisions:
- issue: 'Fórmula de muerte real: ''lay down with his fathers'''
  english_pob_reading: Preserves the Hebrew imagery transparently while avoiding the misleading English idiom 'slept with'.
  chosen_spanish_reading: '''Durmió con sus padres'' conserva la imagen idiomática del hebreo sin convertirla en una explicación doctrinal o biográfica.'
  alternative_spanish_readings:
  - '''murió'''
  - '''reposó con sus padres'''
  rationale: No hay una afirmación teológica adicional; se trata de una fórmula narrativa estereotipada. 'Durmió' mantiene la metáfora tradicional y la tensión entre imagen y referencia a la muerte, sin borrar el lenguaje figurado del original.
  doctrine_reference: 2 Reyes 13:9; fórmula real de muerte en narrativas históricas del Antiguo Testamento
- issue: 'Sucesión dinástica: ''reigned in his place'''
  english_pob_reading: Marks succession with 'in his place' rather than a more interpretive paraphrase.
  chosen_spanish_reading: '''reinó en su lugar'' comunica la transferencia del trono sin añadir comentarios sobre legitimidad o duración.'
  alternative_spanish_readings:
  - '''reinó después de él'''
  - '''tomó su lugar como rey'''
  rationale: El hebreo indica reemplazo sucesorio; 'en su lugar' conserva esa relación sin introducir nociones que el versículo no desarrolla. No se altera la línea dinástica del texto.
  doctrine_reference: 2 Reyes 13:9; narrativa de sucesión monárquica
- issue: Nombre divino ausente en el versículo
  english_pob_reading: No theological rendering decision is required beyond the narrative formula.
  chosen_spanish_reading: No se introduce ninguna traducción del nombre divino porque el versículo no contiene יהוה.
  rationale: El texto es puramente narrativo y funerario; no hay términos teológicamente cargados más allá de la fórmula real y los nombres propios.
  doctrine_reference: 2 Reyes 13:9
translation_notes:
  revision_awareness: 'Se siguió el contexto auditado en inglés sin traducir mecánicamente: se mantuvo la fórmula real de muerte, el pasivo/activo hebreo de sepultura se reflejó con un plural natural en español, y se preservó el valor de reemplazo de תַּחְתָּיו con ''en su lugar''. No se requirieron revisiones adicionales según el informe más reciente.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y digno, evitando tanto arcaísmos innecesarios como paráfrasis explicativas.
  - '''sepultaron'' y ''reinó'' sostienen la simetría narrativa y la brevedad del hebreo.'
  - Los nombres propios se transliteraron en forma española estable donde fue posible, con nota para el nombre real menos estandarizado.
  - No se usó 'SEÑOR' ni otro sustituto, porque este versículo no contiene el nombre divino.
