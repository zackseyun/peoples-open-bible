base_translation:
  language: en
  yaml_path: translation/ot/joshua/010/040.yaml
  text: So Joshua struck all the land—the hill country[a], the Negev, the lowland, and the slopes—and all their kings. He left no survivor, but devoted to destruction every breathing thing, just as Yahweh, the God of Israel[b], had commanded.
  footnotes:
  - marker: a
    text: Or 'all that breathed.' The Hebrew literally refers to 'all the breath' or 'every breathing thing.'
    reason: lexical_alternative
  - marker: b
    text: Or 'utterly destroyed' or 'put under the ban.' The Hebrew verb denotes devoting something irrevocably to destruction.
    reason: lexical_alternative
