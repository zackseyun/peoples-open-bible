translation:
  language: es
  text: Como Yahvé mandó a Moisés, Aarón lo puso delante del testimonio[a] para guardarlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el testimonio del pacto'. El hebreo 'testimonio' es un término técnico del tabernáculo que puede referirse más específicamente a las tablas del pacto o a lo asociado con ellas.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  english_pob_choice: As
  chosen_spanish: Como
  alternatives_spanish:
  - Tal como
  - Así como
  lexicon: HALOT
  rationale: Expresa la comparación de conformidad con lo mandado sin sonar forzado en español; conserva la relación con la acción previa.
- source_word: צִוָּה
  english_pob_choice: commanded
  chosen_spanish: había mandado
  alternatives_spanish:
  - mandó
  - había ordenado
  - había instruido
  lexicon: HALOT
  rationale: En contexto de mandato divino, 'mandar' conserva bien la fuerza autoritativa; el pluscuamperfecto refleja adecuadamente la anterioridad respecto de la acción de Aarón.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: Sigue el default del proyecto para el nombre divino, preservando el nombre propio del pacto en vez de ocultarlo bajo un título.
- source_word: אֶל מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - a Moisés
  - para Moisés
  lexicon: HALOT
  rationale: El hebreo marca el destinatario del mandato; en español se expresa con la preposición 'a' para mantener la relación sintáctica natural.
- source_word: וַיַּנִּיחֵהוּ
  english_pob_choice: placed it
  chosen_spanish: lo puso
  alternatives_spanish:
  - lo colocó
  - lo depositó
  - lo dejó
  lexicon: HALOT
  rationale: '''Poner'' es claro y neutral para el acto de colocar un objeto; conserva la sencillez del verbo hebreo sin añadir matiz excesivo.'
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  alternatives_spanish:
  - Aaron
  lexicon: HALOT
  rationale: Adaptación estándar del nombre propio en español bíblico.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: En contexto espacial/cultual, 'delante de' comunica con naturalidad la posición del objeto sin sonar litúrgicamente recargado.
- source_word: הָעֵדֻת
  english_pob_choice: the testimony
  chosen_spanish: el testimonio
  alternatives_spanish:
  - el testimonio del pacto
  - el arca del testimonio
  - las tablas del testimonio
  lexicon: HALOT
  rationale: Mantiene el término técnico de tabernáculo 'testimonio' sin desarrollar más de lo que el verso afirma; las opciones más específicas quedan como alternativas interpretativas.
- source_word: לְמִשְׁמָרֶת
  english_pob_choice: for safekeeping
  chosen_spanish: para guardarlo
  alternatives_spanish:
  - para custodia
  - para conservarlo
  - para que se guardara
  lexicon: HALOT
  rationale: Recoge el sentido de conservación/custodia con un español natural; el pronombre remite al objeto previamente mencionado, como en la estructura del original.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se conserva el nombre propio del pacto, conforme al estándar del proyecto y a la lectura directa del hebreo, evitando la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Término técnico הָעֵדֻת
  english_pob_reading: the testimony
  chosen_spanish_reading: el testimonio
  alternative_spanish_readings:
  - el testimonio del pacto
  - el testimonio del pacto-covenantal
  rationale: El hebreo usa un término técnico del tabernáculo. En español conviene mantener 'testimonio' sin ampliar innecesariamente el referente, aunque el contexto permite entender una asociación pactual.
  doctrine_reference: Pentateuch/tabernacle usage of עֵדוּת
translation_notes:
  revision_awareness: El cotejo disponible indica alto acuerdo y sin cambios de revisión pendientes; se conserva la estructura breve del hebreo, la referencia al mandato previo y el término técnico 'testimonio' sin sobrerrepresentarlo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - Se mantiene 'el testimonio' para הָעֵדֻת, con nota que preserva la alternativa técnica documentada.
  - '''Lo puso'' traduce de forma natural וַיַּנִּיחֵהוּ sin perder la idea de colocar un objeto para conservación.'
  - La puntuación y el orden buscan ser publicables en español bíblico moderno, manteniendo la concisión del verso.
