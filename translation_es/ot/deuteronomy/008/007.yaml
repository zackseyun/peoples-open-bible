translation:
  language: es
  text: Porque Yahvé tu Dios te está llevando a una buena tierra[a], una tierra de arroyos de agua[b], de manantiales y de profundidades[c] que brotan en los valles y las colinas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una tierra de cauces de agua»; el hebreo puede referirse a corrientes, torrentes o wadis.
    reason: lexical_alternative
  - marker: b
    text: O «corrientes de agua».
    reason: lexical_alternative
  - marker: c
    text: O «aguas profundas»; también «en la llanura y en las montañas».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como nombre propio transliterado, según la directriz del proyecto. En español, «Yahvé» es la forma más extendida y legible para ese propósito, evitando la sustitución por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  - tu Dios, Yahvé
  lexicon: HALOT
  rationale: La expresión de pacto con sufijo de segunda persona singular se traduce de manera directa y natural como «tu Dios».
- source_word: מְבִיאֲךָ
  english_pob_choice: is bringing you
  chosen_spanish: te está llevando
  alternatives_spanish:
  - te lleva
  - te llevará
  lexicon: HALOT
  rationale: El participio hebreo comunica acción en curso o inminente. En español, «te está llevando» preserva mejor esa vividez que un futuro simple, aunque el verbo «llevar» enfatiza la acción de conducción implícita en «bringing».
- source_word: אֶל אֶרֶץ טוֹבָה
  english_pob_choice: into a good land
  chosen_spanish: a una tierra buena
  alternatives_spanish:
  - hacia una tierra buena
  - a una buena tierra
  lexicon: HALOT
  rationale: Se mantiene la cualidad simple del hebreo sin ampliar el sentido. Se evita sobrecargar «buena tierra» con matices no explicitados por el texto.
- source_word: אֶרֶץ נַחֲלֵי מָיִם
  english_pob_choice: a land of brooks of water
  chosen_spanish: una tierra de corrientes de agua
  alternatives_spanish:
  - una tierra de arroyos de agua
  - una tierra de cauces de agua
  lexicon: HALOT
  rationale: נַחֲלֵי מָיִם puede referirse a corrientes, torrentes o cauces estacionales. «Corrientes de agua» conserva la imagen de agua fluyente sin imponer una opción demasiado técnica; se acompaña con nota para reconocer la alternativa léxica.
- source_word: עֲיָנֹת
  english_pob_choice: springs
  chosen_spanish: manantiales
  alternatives_spanish:
  - fuentes
  lexicon: HALOT
  rationale: Designa surgencias naturales de agua. «Manantiales» es claro y contemporáneo en español, y retiene mejor la idea de agua que brota desde una fuente natural que «fuentes», que en español puede sonar más ambiguo.
- source_word: וּתְהֹמֹת
  english_pob_choice: depths
  chosen_spanish: abismos
  alternatives_spanish:
  - profundidades
  - aguas profundas
  lexicon: HALOT
  rationale: El término puede aludir a profundidades acuosas o aguas subterráneas. «Abismos» conserva la fuerza lexical y la tensión poética del hebreo, mientras la nota aclara la posible referencia alternativa a «profundidades» o «aguas profundas».
- source_word: יֹצְאִים
  english_pob_choice: flowing out
  chosen_spanish: que brotan
  alternatives_spanish:
  - que salen
  - que fluyen
  lexicon: HALOT
  rationale: Aplicado al agua, el participio sugiere salir/manar desde una fuente. «Que brotan» es idiomático en español y expresa bien el carácter emergente del agua.
- source_word: בַּבִּקְעָה
  english_pob_choice: in the valleys
  chosen_spanish: en el valle
  alternatives_spanish:
  - en la llanura
  - en los valles
  lexicon: HALOT
  rationale: בִּקְעָה puede designar un valle ancho o una llanura. Aquí se opta por «el valle» para mantener el paralelismo topográfico directo; la nota recoge la alternativa «la llanura» que aparece en la tradición de traducción.
- source_word: וּבָהָר
  english_pob_choice: and hills
  chosen_spanish: y en la montaña
  alternatives_spanish:
  - y en las montañas
  - y en el monte
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular, puede funcionar colectivamente para terreno montañoso. «La montaña» conserva la referencia básica al relieve elevado; la nota explica la posibilidad alternativa de plural o de «monte» según contexto.
theological_decisions:
- issue: Nombre divino יְהוָה en un contexto de pacto
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se mantiene el nombre propio divino en lugar de sustituirlo por un título. Esto sigue la política del POB y preserva la identidad pactual del texto deuteronómico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La base inglesa revisó «streams of water» a «brooks of water» y «valley and hill country» a «valleys and hills» para afinar la correspondencia léxica y el sentido topográfico colectivo. En español se conservó esa sensibilidad: se eligió una expresión general para נַחֲלֵי מָיִם y se mantuvo una formulación topográfica simple («en el valle y en la montaña») sin convertir el singular hebreo en un plural innecesario dentro del texto principal.'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme a la convención del proyecto para יהוה.
  - Se conserva el orden y la acumulación de imágenes hidráulicas del hebreo sin fusionarlas ni explicarlas.
  - «Corrientes de agua», «manantiales» y «abismos» mantienen el contraste léxico entre cursos superficiales, surgencias y profundidades.
  - La puntuación reproduce una lectura fluida y solemne en español sin añadir conectivos ajenos al texto.
