  category: grammar
  from: his wife they brought in
  to: his wife was brought in
  rationale: In Ge'ez, the third-person plural is frequently used as an impersonal
    passive. Since the angels are speaking in the first person ('we brought him'),
    a literal 'they brought in' for the wife introduces an unidentified 'they' that
    can be confusing in English. Rendering it as a passive ('his wife was brought
    in') accurately reflects the grammatical function and improves the English flow.
