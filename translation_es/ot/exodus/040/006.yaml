translation:
  language: es
  text: Y pondrás el altar del holocausto[a] delante de la entrada del tabernáculo, la tienda de reunión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «delante de la entrada del tabernáculo, la tienda de reunión»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתָּה
  english_pob_choice: And you shall place
  chosen_spanish: Y pondrás
  alternatives_spanish:
  - Y colocarás
  - Y pondrás en su lugar
  lexicon: HALOT
  rationale: נתן puede significar 'dar', 'poner' o 'colocar'. En este contexto de instrucciones para el mobiliario del santuario, 'poner' es natural en español y conserva el sentido de ubicar físicamente el altar sin sobrecargar el texto.
- source_word: מִזְבַּח
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - el ara
  lexicon: HALOT
  rationale: מִזְבֵּחַ designa el altar sacrificial. 'Altar' es el equivalente directo, claro y estándar en español bíblico.
- source_word: הָעֹלָה
  english_pob_choice: of burnt offering
  chosen_spanish: del holocausto
  alternatives_spanish:
  - de la ofrenda quemada
  - del sacrificio quemado
  lexicon: HALOT
  rationale: עֹלָה refiere al sacrificio totalmente consumido por fuego. En español bíblico, 'holocausto' mantiene el valor cultual técnico y evita una perífrasis menos idiomática.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - frente a
  - ante
  lexicon: HALOT
  rationale: לִפְנֵי puede expresar ubicación espacial 'delante de' o 'frente a'. 'Delante de' es natural en español y conserva la relación de posición indicada por el hebreo.
- source_word: פֶּתַח
  english_pob_choice: the entrance
  chosen_spanish: la entrada
  alternatives_spanish:
  - la abertura
  - el umbral
  lexicon: HALOT
  rationale: פֶּתַח es la abertura o punto de acceso. 'Entrada' comunica bien la idea en español actual y mantiene el registro solemne.
- source_word: מִשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - el santuario portátil
  lexicon: HALOT
  rationale: מִשְׁכָּן es el término técnico para la estructura sagrada. 'Tabernáculo' es la equivalencia tradicional y precisa en español.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: el tabernáculo de reunión
  alternatives_spanish:
  - la tienda de reunión
  - el tent de reunión
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'tienda de reunión', en español la expresión fija del conjunto puede quedar mejor como aposición explicativa al 'tabernáculo'. Aquí se mantiene el sentido cultual del nombre propio del santuario, sin perder la designación de reunión.
theological_decisions:
- issue: Nombre técnico del altar sacrificial
  english_pob_reading: altar of burnt offering
  chosen_spanish_reading: altar del holocausto
  alternative_spanish_readings:
  - altar de la ofrenda quemada
  - altar del sacrificio quemado
  rationale: No hay una tensión doctrinal; la decisión busca preservar el valor técnico del tipo de sacrificio. 'Holocausto' conserva el término cultual clásico para עֹלָה y evita diluir el referente ritual.
  doctrine_reference: Cultic terminology in Exodus 40; sacrificial system terminology
- issue: Relación entre מִשְׁכָּן y אֹהֶל מוֹעֵד
  english_pob_reading: the tabernacle, the tent of meeting
  chosen_spanish_reading: el tabernáculo, el tabernáculo de reunión
  alternative_spanish_readings:
  - la tienda de reunión
  - el tabernáculo, la tienda de reunión
  rationale: El hebreo presenta una construcción nominal muy cercana al nombre fijo del santuario. En español, repetir 'tabernáculo' como glosa del nombre ayuda a reconocer la designación cultual conocida sin abandonar el valor técnico del término. Se conserva la función identificadora de 'tienda de reunión' en el conjunto.
  doctrine_reference: Sanctuary nomenclature in Exodus; fixed cultic designation
translation_notes:
  revision_awareness: 'La versión inglesa auditada no recibió cambios en su última revisión; el pasaje se mantiene estable. La redacción española sigue esa lectura con un ajuste estilístico menor: ''pondrás'' para נתן y ''delante de'' para לִפְנֵי, conservando la relación espacial y el registro instructivo.'
  spanish_consistency_notes:
  - Se mantiene 'tabernáculo' para מִשְׁכָּן, en línea con el vocabulario técnico del santuario.
  - Se usa 'holocausto' para עֹלָה por su valor cultual establecido en español bíblico.
  - '''Entrada'' traduce פֶּתַח de manera natural y no introduce interpretación adicional.'
  - La nota al pie refleja la alternativa espacial preservada en el audit trail inglés, sin añadir variantes no documentadas.
