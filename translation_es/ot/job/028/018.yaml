    text: The Hebrew term translated 'coral' is rare and uncertain; alternatives include 'mother-of-pearl' or, less likely here, a form related to 'heights.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will not be mentioned.' The Hebrew idiom likely means these treasures are insignificant by comparison with wisdom.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew word may also be rendered 'rubies,' since the exact precious stone or jewel is uncertain.
    reason: lexical_alternative
