translation:
  language: es
  text: De los primogénitos de los hijos de Israel tomó la plata[a], mil trescientos sesenta y cinco siclos[b], según el siclo del santuario.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los primogénitos de los israelitas». El hebreo dice literalmente «los primogénitos de los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «conforme al siclo del santuario». La frase especifica el estándar de peso del santuario.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵאֵת
  english_pob_choice: From
  chosen_spanish: De entre
  alternatives_spanish:
  - de
  - desde
  - de parte de
  lexicon: HALOT
  rationale: La partícula indica procedencia o extracción de un conjunto; en español, «de entre» conserva mejor la idea de tomar algo de un grupo específico sin añadir una agente explícito que el hebreo no exige.
- source_word: בְּכוֹר בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the firstborn of the sons of Israel
  chosen_spanish: los primogénitos de los hijos de Israel
  alternatives_spanish:
  - el primogénito de los hijos de Israel
  - los primogénitos de Israel
  - los primogénitos de los israelitas
  lexicon: HALOT
  rationale: El hebreo es singular en forma constructa pero funciona colectivamente. En español, el plural «los primogénitos» comunica con naturalidad el conjunto al que se refiere el contexto de rescate/censo, sin borrar el matiz de filiación masculina presente en «hijos de Israel».
- source_word: לָקַח
  english_pob_choice: he took
  chosen_spanish: tomó
  alternatives_spanish:
  - recibió
  - llevó
  lexicon: HALOT
  rationale: El verbo básico es «tomar». Aunque el contexto es financiero, «tomó» mantiene la correspondencia léxica directa y la continuidad con el verbo hebreo.
- source_word: הַכָּסֶף
  english_pob_choice: the silver
  chosen_spanish: la plata
  alternatives_spanish:
  - el dinero
  - la plata recaudada
  lexicon: HALOT
  rationale: כֶּסֶף significa literalmente «plata» y por extensión «dinero». Como el versículo ya cuantifica en siclos, «la plata» conserva el término material y evita sustituirlo prematuramente por una paráfrasis más abstracta.
- source_word: חֲמִשָּׁה וְשִׁשִּׁים וּשְׁלֹשׁ מֵאוֹת וָאֶלֶף
  english_pob_choice: one thousand three hundred sixty-five
  chosen_spanish: mil trescientos sesenta y cinco
  alternatives_spanish:
  - mil trescientos y sesenta y cinco
  lexicon: HALOT
  rationale: La serie numérica hebrea se expresa en español con el cardinal estándar para máxima claridad y naturalidad, manteniendo exactitud aritmética.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  english_pob_choice: according to the sanctuary shekel
  chosen_spanish: según el siclo del santuario
  alternatives_spanish:
  - conforme al siclo del santuario
  - según el siclo sagrado
  - de acuerdo con el siclo del santuario
  lexicon: HALOT
  rationale: La revisión inglesa privilegia «according to» para expresar el estándar de medida/peso. En español, «según» transmite esa norma con naturalidad. «Siclo» mantiene la unidad de peso monetaria, y «del santuario» preserva el referente cultual sin convertirlo en un nombre de moneda distinto.
theological_decisions:
- issue: Referencia al estándar cultual de medida en בְּשֶׁקֶל הַקֹּדֶשׁ
  english_pob_reading: according to the sanctuary shekel
  chosen_spanish_reading: según el siclo del santuario
  alternative_spanish_readings:
  - según el siclo sagrado
  - conforme al siclo del santuario
  rationale: No se trata de una cualidad moral de la plata, sino de un patrón de peso oficial ligado al santuario. La redacción elegida conserva esa función normativa y evita sugerir un objeto diferente al estándar de pesaje.
  doctrine_reference: Ex 30:13; Lv 27:25
translation_notes:
  revision_awareness: La redacción sigue la lectura revisada del audit trail inglés, que sustituyó una expresión menos natural por «according to the sanctuary shekel». En español se adoptó «según el siclo del santuario» para reflejar con precisión ese valor normativo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma habitual para el nombre divino en la serie, pero este versículo no lo contiene.
  - Se eligió «plata» en lugar de «dinero» para respetar el término material del hebreo, con la cuantificación posterior en siclos.
  - «Siclo» se usa como unidad de peso/valor coherente con el estándar cultual del texto.
