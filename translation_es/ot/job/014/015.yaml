translation:
  language: es
  text: Tú llamarías, y yo te respondería; tú anhelarías[a] la obra de tus manos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desearías intensamente» o «añorarías». El hebreo sugiere un anhelo fuerte, no solo una consideración intelectual.'
    reason: lexical_alternative
  - marker: b
    text: La expresión «la obra de tus manos» se refiere al ser humano como criatura hecha por Dios.
    reason: cultural_note
lexical_decisions:
- source_word: תִּקְרָא
  english_pob_choice: you would call
  chosen_spanish: Tú llamarías
  alternatives_spanish:
  - Tú llamarás
  - Tú llamas
  lexicon: HALOT
  rationale: El imperfecto qal en este contexto poético tiene valor modal/hipotético, no simplemente futuro. «Llamarías» conserva esa condición implícita y evita endurecer el sentido como una afirmación directa del futuro.
- source_word: וְאָנֹכִי
  english_pob_choice: and I
  chosen_spanish: y yo
  alternatives_spanish:
  - entonces yo
  - yo también
  lexicon: Contexto sintáctico del hebreo
  rationale: La conjunción más el pronombre enfático marcan la respuesta correlativa a la acción previa; «y yo» mantiene la secuencia simple y el paralelismo del hebreo sin añadir matices que el texto no exige.
- source_word: אֶעֱנֶךָּ
  english_pob_choice: would answer you
  chosen_spanish: te respondería
  alternatives_spanish:
  - te contestaría
  - te responderé
  lexicon: HALOT
  rationale: El qal imperfecto con sufijo expresa una respuesta hipotética en paralelo con el primer verbo. «Respondería» conserva la modalidad y «te» refleja directamente el sufijo de segunda persona masculina singular.
- source_word: לְמַעֲשֵׂה יָדֶיךָ
  english_pob_choice: the work of your hands
  chosen_spanish: la obra de tus manos
  alternatives_spanish:
  - el trabajo de tus manos
  - tu hechura
  lexicon: HALOT
  rationale: «Obra» es una equivalencia natural para מַעֲשֶׂה y conserva el sentido creador; «de tus manos» reproduce la imagen antropomórfica literal del hebreo. «Hechura» sería posible, pero suena más técnico y menos transparente en español.
- source_word: תִכְסֹף
  english_pob_choice: you would long for
  chosen_spanish: anhelarías
  alternatives_spanish:
  - desearías intensamente
  - añorarías
  lexicon: HALOT
  rationale: כסף aquí expresa deseo intenso, anhelo o añoranza. «Anhelarías» comunica mejor esa fuerza afectiva que un simple «desearías», y mantiene la tensión teológica de que Dios vuelva a desear a su criatura.
theological_decisions:
- issue: 'La fuerza de כסף: mera consideración vs. anhelo afectivo hacia la criatura'
  english_pob_reading: you would long for the work of your hands
  chosen_spanish_reading: tú anhelarías la obra de tus manos
  alternative_spanish_readings:
  - tú tendrías aprecio por la obra de tus manos
  - tú volverías a mirar con favor la obra de tus manos
  rationale: 'Se preserva el sentido fuerte de deseo/añoranza, no un mero reconocimiento. Esto mantiene la tensión teológica de Job: la esperanza de una restauración relacional entre Dios y su criatura.'
  doctrine_reference: Job 14:15; mantener la tensión teológica sin suavizar el verbo
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin traducir mecánicamente: se mantuvo el valor modal de los imperfectos, el paralelismo poético y la fuerza afectiva de כסף. No hubo revisiones posteriores en el paquete fuente, y el veredicto de revisión fue de alta concordancia.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo exige; aquí no aparece el tetragrámaton.
  - Se prefirió «obra de tus manos» por transparencia y porque preserva la imagen creadora sin explicar de más en el cuerpo del texto.
  - «Respondería» y «anhelarías» conservan el tono hipotético del versículo dentro del discurso poético de Job.
