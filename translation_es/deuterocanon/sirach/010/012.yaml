translation:
  language: es
  text: El comienzo del orgullo[a] de un hombre es la insolencia, y su corazón se aparta de su Hacedor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «El comienzo del orgullo de un hombre es su apartarse del Señor, y su corazón se ha apartado del que lo hizo». El hebreo es más breve en la primera cláusula y aquí se traduce según el testimonio hebreo.'
    reason: alternative_reading
lexical_decisions:
- source_word: תְּחִלַת
  english_pob_choice: The beginning of
  chosen_spanish: El comienzo de
  alternatives_spanish:
  - El principio de
  - La primera señal de
  lexicon: HALOT
  rationale: Mantiene la estructura proverbial y la idea de inicio, con una formulación natural en español.
- source_word: גְּאוֹן
  english_pob_choice: pride
  chosen_spanish: orgullo
  alternatives_spanish:
  - arrogancia
  - altivez
  - soberbia
  lexicon: HALOT
  rationale: En este contexto sapiencial, el término describe autoexaltación humana en sentido moral negativo. 'Orgullo' es la equivalencia más clara y natural en español; 'soberbia' sería posible, pero 'orgullo' preserva mejor el paralelismo con el segundo miembro sin cargarlo demasiado con matiz eclesiástico.
- source_word: אָדָם
  english_pob_choice: a man's
  chosen_spanish: de un hombre
  alternatives_spanish:
  - de una persona
  - de la humanidad
  - de alguien
  lexicon: HALOT
  rationale: Conserva el singular representativo del hebreo y su forma proverbial. Aunque es genérico, el texto usa forma masculina singular; en español, 'un hombre' refleja ese dato sin restringir el sentido a varón individual.
- source_word: מוּעָז
  english_pob_choice: defiance
  chosen_spanish: la rebeldía
  alternatives_spanish:
  - la insolencia
  - la osadía
  - la resistencia
  lexicon: HALOT
  rationale: El hebreo apunta a una autoafirmación audaz y moralmente torcida. 'Rebeldía' comunica bien la idea de apartarse de la autoridad divina, y en este verso funciona naturalmente junto con la cláusula final que explicita el alejamiento del Hacedor.
- source_word: וּמֵעֹשֶׂהוּ
  english_pob_choice: from his Maker
  chosen_spanish: de su Hacedor
  alternatives_spanish:
  - del que lo hizo
  - de su Creador
  lexicon: HALOT
  rationale: '''Hacedor'' conserva el valor reverente de ''maker/doer'' y se ajusta al paralelismo con el griego ποιήσαντος. La mayúscula no es necesaria en español en esta edición de trabajo, aunque el referente sea Dios.'
- source_word: יָסוּר לִבּוֹ
  english_pob_choice: his heart turns away
  chosen_spanish: su corazón se aparta
  alternatives_spanish:
  - su corazón se desvía
  - su corazón se aleja
  - su corazón se retira
  lexicon: HALOT
  rationale: '''Apartarse'' reproduce bien el hebreo סור y deja visible la imagen de movimiento moral hacia fuera. También armoniza con el paralelo griego, que expresa explícitamente que el corazón se apartó.'
theological_decisions:
- issue: Si el objeto de la rebeldía debe hacerse explícito como Yahvé/Señor siguiendo el paralelo griego
  english_pob_reading: The main text keeps 'defiance' without naming the Lord explicitly; the footnote cites the Greek parallel that reads 'turning away from the Lord'.
  chosen_spanish_reading: Mantener 'la rebeldía' sin explicitar el objeto en el texto principal, y dejar que la segunda cláusula sitúe el apartamiento respecto del Hacedor.
  alternative_spanish_readings:
  - El comienzo del orgullo de un hombre es el apartarse de Yahvé...
  - El comienzo del orgullo de un hombre es la rebeldía contra Yahvé...
  rationale: 'El hebreo es más breve y no nombra aquí al Señor; el griego aporta una clarificación interpretativa. La versión española preserva esa tensión textual: no introduce un objeto ausente en el hebreo, pero la segunda mitad del verso sí hace explícita la ruptura con Dios mediante ''su Hacedor''.'
  doctrine_reference: Translation philosophy §§1, 3
- issue: Cómo reflejar la relación entre el hebreo y el paralelo griego en una nota
  english_pob_reading: The English POB notes that the Greek reads more explicitly and that the Hebrew is shorter in the first clause.
  chosen_spanish_reading: 'Anotar que el griego paralelo dice: ''El comienzo del orgullo de un hombre es su apartarse del Señor, y su corazón se ha apartado del que lo hizo'', mientras que el hebreo es más breve en la primera cláusula.'
  alternative_spanish_readings:
  - Omitir la nota y traducir solo el hebreo
  - Fundir la lectura griega en el texto principal
  rationale: La POB debe hacer auditable la decisión textual. La nota preserva la variante griega sin desplazar la lectura hebrea que sirve de base principal.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: No se aplicaron revisiones adicionales; se mantiene el sentido del hebreo como texto principal y se documenta la ampliación interpretativa del griego en la nota.
  spanish_consistency_notes:
  - Se usa 'Hacedor' para mantener la correspondencia con el hebreo עֹשֶׂהוּ y el griego ποιήσαντος.
  - Se evitó 'Señor' en el texto principal porque el hebreo base no lo explicita en la primera cláusula; esa explicitación queda en la nota textual.
  - '''Orgullo'' y ''rebeldía'' conservan el tono sapiencial y moral sin introducir un registro eclesiástico más fuerte que el del original.'
