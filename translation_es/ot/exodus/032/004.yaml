translation:
  language: es
  text: 'Y lo tomó de sus manos, lo labró con un instrumento de grabado[a], y lo hizo un becerro fundido. Entonces dijeron: «Estos son tus dioses, Israel[b][c], que te hicieron subir de la tierra de Egipto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con una herramienta de grabado», «con un estilete» o «con un cincel»; el sentido exacto del hebreo es debatido.
    reason: lexical_alternative
  - marker: b
    text: Algunas tradiciones textuales leen «él dijo» en lugar de «dijeron».
    reason: textual_variant
  - marker: c
    text: 'Hebreo: «Estos son tus dioses»; tradicionalmente a menudo se traduce «Este es tu dios», probablemente por influencia de la imagen única del becerro.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקַּח מִיָּדָם
  english_pob_choice: he took it from their hands
  chosen_spanish: tomó el oro de sus manos
  alternatives_spanish:
  - lo tomó de sus manos
  - recibió el oro de sus manos
  lexicon: HALOT
  rationale: 'לקח expresa tomar/recibir. En español conviene explicitar el referente implícito por el contexto inmediato: el oro entregado por el pueblo. «De sus manos» conserva el plural del sufijo hebreo.'
- source_word: וַיָּצַר אֹתוֹ
  english_pob_choice: fashioned it / formed it
  chosen_spanish: lo labró
  alternatives_spanish:
  - lo formó
  - lo modeló
  - lo dio forma
  lexicon: HALOT
  rationale: יצר denota dar forma artesanalmente. «Labró» comunica trabajo deliberado con metal o material duro y encaja mejor con el instrumento mencionado, sin perder la idea de fabricación.
- source_word: בַּחֶרֶט
  english_pob_choice: with a graving tool
  chosen_spanish: con un instrumento de grabado
  alternatives_spanish:
  - con un grabador
  - con una herramienta de grabado
  - con un cincel
  lexicon: HALOT
  rationale: חרט designa un utensilio para grabar o trazar. «Instrumento de grabado» preserva la amplitud semántica y evita precisar indebidamente una herramienta moderna concreta.
- source_word: וַיַּעֲשֵׂהוּ עֵגֶל מַסֵּכָה
  english_pob_choice: made it into a cast calf
  chosen_spanish: lo hizo un becerro fundido
  alternatives_spanish:
  - lo hizo en un becerro fundido
  - lo convirtió en un becerro fundido
  - lo hizo una imagen de becerro fundida
  lexicon: HALOT
  rationale: עשה aquí expresa el resultado de la fabricación. «Lo hizo un becerro fundido» conserva la relación de resultado y mantiene la referencia a una imagen vaciada/moldeada en metal. «Fundido» representa מַסֵּכָה mejor que «molten» en español contemporáneo.
- source_word: וַיֹּאמְרוּ
  english_pob_choice: they said
  chosen_spanish: dijeron
  alternatives_spanish:
  - y dijeron
  - entonces dijeron
  lexicon: HALOT
  rationale: El verbo está en plural en el texto masorético, y el español debe reflejar esa pluralidad. Se conserva la atribución a la multitud, no a una sola voz.
- source_word: אֵלֶּה אֱלֹהֶיךָ
  english_pob_choice: These are your gods
  chosen_spanish: Estos son tus dioses
  alternatives_spanish:
  - Este es tu dios
  - Éste es tu dios
  lexicon: HALOT
  rationale: אֵלֶּה es plural; por eso la versión principal debe ser plural. «Tus dioses» reproduce la forma hebrea, aunque la imagen sea singular, y mantiene la tensión textual documentada por la tradición alternativa.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Oh Israel
  - ¡Israel!
  lexicon: HALOT
  rationale: El nombre propio se mantiene sin transliteración adicional. La vocación se entiende por la puntuación y el contexto.
- source_word: אֲשֶׁר הֶעֱלוּךָ
  english_pob_choice: who brought you up
  chosen_spanish: que te sacaron
  alternatives_spanish:
  - que te hicieron subir
  - que te llevaron arriba
  - que te sacaron de allí
  lexicon: HALOT
  rationale: עלה en hiphil significa literalmente «hacer subir». En español bíblico natural, «sacar» comunica bien el movimiento de salida y evita una expresión forzada, manteniendo la referencia al éxodo.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de Egipto
  - desde la tierra de Egipto
  lexicon: HALOT
  rationale: La formulación completa reproduce la cadencia solemne del hebreo y evita reducir la frase a una forma más breve cuando el texto fuente es explícito.
theological_decisions:
- issue: Pluralidad de la aclamación idolátrica
  english_pob_reading: 'Render the clause as plural: ''These are your gods, Israel'''
  chosen_spanish_reading: 'Mantener el plural: «Estos son tus dioses, Israel»'
  alternative_spanish_readings:
  - «Este es tu dios, Israel»
  - «Éste es tu dios, Israel»
  rationale: El hebreo presenta formas plurales y el POB inglés conserva esa tensión en el texto principal. El español debe reflejar la pluralidad aunque exista la lectura tradicional singular asociada al becerro único.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Agencia directa en la fabricación del ídolo
  english_pob_reading: Retain Aaron's direct agency in both forming and making the image
  chosen_spanish_reading: 'Mantener la agencia directa del sujeto en ambas acciones: labrar y hacer'
  alternative_spanish_readings:
  - suavizar la acción como mera supervisión
  - fusionar los verbos en una sola idea
  rationale: Los verbos hebreos atribuyen sin atenuación las acciones al sujeto singular. La traducción no debe rebajar esa responsabilidad ni resolver la tensión narrativa del pasaje.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: El borrador español sigue la última revisión que reordenó las acciones para respetar la secuencia del hebreo y precisó el instrumento como de grabado. Se mantuvo la pluralidad de la proclamación idolátrica y la formulación completa del éxodo, procurando una prosa española publicable sin borrar la tensión textual documentada.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general en este proyecto, pero en este versículo no aparece el nombre divino.
  - Se prefirió «dioses» en plural para corresponder a אֱלֹהֶיךָ y a אֵלֶּה, dejando constancia de la alternativa tradicional singular.
  - «Tierra de Egipto» conserva el registro solemne del hebreo; en una nota se permite la forma más breve «de Egipto».
  - Se evitó «Señor» como sustituto de YHWH porque aquí el problema textual no involucra el Tetragrámaton.
