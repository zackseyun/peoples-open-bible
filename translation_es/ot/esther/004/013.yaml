translation:
  language: es
  text: Entonces Mardoqueo mandó que respondieran a Ester[a], «No pienses dentro de ti que escaparás en la casa del rey más que todos los judíos.»
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No te imagines para ti misma que escaparás en la casa del rey más que todos los judíos.»'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then Mordecai said
  chosen_spanish: Entonces Mardoqueo mandó
  alternatives_spanish:
  - Entonces Mardoqueo dijo
  - Y Mardoqueo dijo
  lexicon: HALOT
  rationale: El hebreo introduce una nueva acción narrativa y, según el contexto auditado en inglés, no es solo una cita directa sino un mandato de enviar respuesta. En español, «mandó que respondieran» comunica mejor el causativo de לְהָשִׁיב que un simple «dijo».
- source_word: לְהָשִׁיב
  english_pob_choice: to reply
  chosen_spanish: que respondieran
  alternatives_spanish:
  - que respondieran de vuelta
  - que dieran respuesta
  lexicon: HALOT
  rationale: 'El causativo de שוב aquí es idiomático: no se trata solo de hablar, sino de hacer volver una respuesta a Ester. «Que respondieran» conserva la dirección del mensaje y evita un calco forzado.'
- source_word: אֶל אֶסְתֵּר
  english_pob_choice: to Esther
  chosen_spanish: a Ester
  alternatives_spanish:
  - para Ester
  - de parte de Ester
  lexicon: HALOT
  rationale: La preposición marca a la destinataria de la respuesta. En español, «a Ester» es natural y fiel.
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No hagas
  - No te
  lexicon: HALOT
  rationale: La partícula negativa de prohibición se expresa de manera directa con «No» en español.
- source_word: תְּדַמִּי
  english_pob_choice: imagine
  chosen_spanish: te imagines
  alternatives_spanish:
  - pienses
  - supongas
  lexicon: HALOT
  rationale: דמה aquí expresa una suposición mental. «Te imagines» mantiene el matiz de formar una falsa idea, como refleja la elección inglesa «imagine».
- source_word: בְנַפְשֵׁךְ
  english_pob_choice: in yourself
  chosen_spanish: en tu interior
  alternatives_spanish:
  - en ti misma
  - para ti
  lexicon: HALOT
  rationale: Literalmente es «en tu alma/yo mismo», pero en este contexto es un modismo de interioridad. «En tu interior» conserva el valor idiomático sin sonar artificial y evita reducirlo a una doctrina sobre el alma.
- source_word: לְהִמָּלֵט
  english_pob_choice: will escape
  chosen_spanish: escaparás
  alternatives_spanish:
  - lograrás escapar
  - serás librada
  lexicon: HALOT
  rationale: El nifal de מלט expresa escapar o librarse. «Escaparás» es claro, directo y mantiene la fuerza verbal del hebreo.
- source_word: בֵּית הַמֶּלֶךְ
  english_pob_choice: in the king’s house
  chosen_spanish: en la casa del rey
  alternatives_spanish:
  - en el palacio
  - en la casa real
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de «casa» en lugar de reemplazarla automáticamente por «palacio», porque el texto auditable de base usa esa formulación.
- source_word: מִכָּל הַיְּהוּדִים
  english_pob_choice: more than all the Jews
  chosen_spanish: más que todos los judíos
  alternatives_spanish:
  - por encima de todos los judíos
  - antes que todos los judíos
  lexicon: HALOT
  rationale: 'El מן con כל aquí expresa comparación/separación. La redacción española debe mostrar que el punto es la excepción comparativa: no pensar que escapará con una ventaja sobre el resto de los judíos.'
theological_decisions:
- issue: El modismo de בְנַפְשֵׁךְ y su posible lectura antropológica
  english_pob_reading: in yourself
  chosen_spanish_reading: en tu interior
  alternative_spanish_readings:
  - en tu alma
  - para ti misma
  rationale: La expresión no enseña aquí una tesis sobre el alma, sino una suposición interna. «En tu interior» preserva el valor idiomático y evita introducir una carga doctrinal ajena al versículo.
  doctrine_reference: Antropología bíblica; uso idiomático de נפש
- issue: La comparación implícita de מִכָּל הַיְּהוּדִים
  english_pob_reading: more than all the Jews
  chosen_spanish_reading: más que todos los judíos
  alternative_spanish_readings:
  - solo tú entre todos los judíos
  - por encima de todos los judíos
  rationale: El hebreo no afirma que Ester esté sola entre los judíos, sino que no debe asumir una excepción salvadora frente a ellos. La traducción comparativa evita sobreinterpretar y sigue la revisión auditada del inglés.
  doctrine_reference: Ética narrativa; preservación del sentido comparativo del texto
translation_notes:
  revision_awareness: 'Se siguió la revisión auditada del inglés POB que corrigió una sobreinterpretación anterior: el hebreo no dice «tú sola entre todos los judíos», sino una comparación de escape («más que todos los judíos»). También se respetó el valor causativo de לְהָשִׁיב, por lo que la frase se volvió un mandato de enviar respuesta, no solo un discurso directo.'
  spanish_consistency_notes:
  - Se usa «Mardoqueo» y «Ester» con ortografía española estándar.
  - Se mantiene «casa del rey» para conservar la imagen del hebreo.
  - «Judíos» se escribe en minúscula por ser gentilicio común.
  - La nota a preserva una alternativa española cercana al matiz de la lectura inglesa auditada.
