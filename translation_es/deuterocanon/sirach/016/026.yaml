translation:
  language: es
  text: Cuando Dios creó sus obras desde el principio[a], asignó a cada una dominio sobre sus seres vivientes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La segunda mitad del versículo es difícil en hebreo. El paralelo griego dice: «y desde su creación separó sus porciones», lo que apoya la idea de un ordenamiento o reparto de porciones dentro de la creación.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּבְרֹא
  english_pob_choice: When [he] created
  chosen_spanish: Cuando creó
  alternatives_spanish:
  - Al crear
  - Cuando estaba creando
  lexicon: HALOT
  rationale: El valor temporal del prefijo y del infinitivo se expresa de forma natural con «Cuando creó», manteniendo el marco inicial de la acción creadora sin sobreinterpretar la sintaxis.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - el Poderoso
  lexicon: HALOT
  rationale: «Dios» es la traducción directa y sobria del título divino aquí, acorde con el uso estándar del texto y sin necesidad de ampliar el título.
- source_word: מַעֲשָׂיו
  english_pob_choice: his works
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - lo que hizo
  lexicon: HALOT
  rationale: «Obras» conserva el paralelismo con lenguaje de creación y suena natural en español bíblico actual.
- source_word: מֵרֹאשׁ
  english_pob_choice: from the beginning
  chosen_spanish: desde el principio
  alternatives_spanish:
  - desde el comienzo
  - al principio
  lexicon: HALOT
  rationale: La locución española «desde el principio» reproduce bien la idea de origen temporal y corresponde a la lectura griega ἀπ’ ἀρχῆς.
- source_word: עַל חַיֵּיהֶם
  english_pob_choice: over their living things
  chosen_spanish: sobre sus seres vivientes
  alternatives_spanish:
  - para sus vidas
  - sobre sus criaturas vivientes
  lexicon: HALOT
  rationale: La frase hebrea es difícil; «seres vivientes» intenta preservar el campo semántico de vida/seres vivos sin cerrar indebidamente el sentido, y mantiene el tono de ordenamiento de la creación.
- source_word: חָלָק
  english_pob_choice: he assigned
  chosen_spanish: les asignó
  alternatives_spanish:
  - les repartió
  - les repartió porciones
  lexicon: HALOT
  rationale: El verbo comunica reparto o adjudicación. «Asignó» expresa de manera clara la idea de distribuir o conferir porción/función dentro del orden creado.
- source_word: מִשְׁטָרָם
  english_pob_choice: their dominion
  chosen_spanish: su dominio
  alternatives_spanish:
  - su gobierno
  - su autoridad
  lexicon: HALOT
  rationale: «Dominio» sigue el ajuste de la revisión inglesa desde «domains» a «dominion» y refleja el campo de rule/governance sin forzar un sentido político moderno.
theological_decisions:
- issue: Sentido del segundo hemistiquio hebreo oscuro con apoyo de la versión griega
  english_pob_reading: The Hebrew text is difficult in the second clause; the Greek parallel supports the sense of apportioning ordered domains from creation's beginning.
  chosen_spanish_reading: Se mantiene el hebreo oscuro con una formulación comprensible que conserva la idea de asignación de dominio dentro del orden creado.
  alternative_spanish_readings:
  - 'Seguir más de cerca el griego: «y desde su creación separó sus porciones»'
  - 'Reproducir más literalmente el hebreo oscuro: «sobre sus seres vivientes [les asignó] su dominio»'
  rationale: El testimonio hebreo es primario, pero la cláusula es textualmente difícil. La traducción española conserva la base hebrea y el sentido de ordenamiento/apartamiento sugerido por el paralelo griego, sin resolver en exceso la ambigüedad.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando se conserva, usando el griego como apoyo real; preservar ambigüedad cuando el hebreo es difícil'
- issue: Relación entre creación y asignación de dominio
  english_pob_reading: God created his works from the beginning and assigned their dominion over their living things.
  chosen_spanish_reading: Dios crea y ordena la creación al darle a cada ámbito su dominio dentro del conjunto de sus seres vivientes.
  alternative_spanish_readings:
  - Dios estableció desde el principio el dominio de cada criatura
  - Dios repartió las funciones y límites de la creación
  rationale: La formulación española evita añadir una explicación doctrinal no explicitada y mantiene la idea de orden creador y reparto de dominio presente en el audit trail.
  doctrine_reference: Sabiduría/orden de la creación en Sirácides; sin desarrollar más allá del texto
translation_notes:
  revision_awareness: La base inglesa pasó por una revisión que cambió «domains» por «dominion» para מִשְׁטָרָם. La versión española recoge ese ajuste con «dominio» y evita términos más políticos como «gobierno» salvo como alternativa documentada. También se respeta la ambigüedad señalada para el segundo hemistiquio, usando el paralelo griego solo como apoyo interpretativo y no como sustituto del hebreo.
  spanish_consistency_notes:
  - Se usa «Dios» para אֵל, conforme al estándar del proyecto.
  - Se mantiene «desde el principio» como equivalencia idiomática de מֵרֹאשׁ.
  - «Dominio» se usa para מִשְׁטָרָם siguiendo la revisión inglesa y el campo semántico de rule/governance.
  - La nota al pie conserva la tensión textual entre el hebreo difícil y el paralelo griego.
  - El estilo general es moderno, reverente y apto para publicación eclesial.
