  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones sobre ''celos'', ''esposa'' y ''mal'' son en principio compatibles. La excepción relevante es estilística/lexical: para חֵיק conviene ''la esposa que está en tu seno'' en lugar de ''la esposa de tu seno'', porque conserva la imaginería apoyada por el hebreo/griego sin producir un calco poco natural. También debe reflejarse en la nota c la racionalidad del POB inglés sobre la ampliación griega a instrucción/enseñanza.'
