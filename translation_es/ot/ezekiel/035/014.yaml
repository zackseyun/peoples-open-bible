revisions:
- from: 'Así dice el Señor Yahvé: Así como toda la tierra se alegró[a], yo te convertiré en desolación.'
  to: 'Así dice el Señor Yahvé: Cuando[a] toda la tierra se alegró, yo te dejaré desolada.'
  rationale: Se reemplaza 'Así como' por 'Cuando' para reflejar con mayor naturalidad en español el sentido temporal preferido en la auditoría inglesa y evitar la repetición de 'Así'. Se conserva la alternativa comparativa en nota. Se cambia 'te convertiré en desolación' por 'te dejaré desolada' para un español más idiomático, manteniendo el resultado de juicio expresado por עשה + ל + שְׁמָמָה.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:37:21Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: fórmula profética, título divino compuesto con ''Yahvé'', cláusula temporal/comparativa, y juicio de desolación. Sin embargo, la cláusula ''Así como toda la tierra se alegró'' suena más comparativa que temporal en español, mientras que la nota y la revisión inglesa favorecen más claramente el sentido temporal. Además, ''te convertiré en desolación'' es posible, pero en este contexto suena más natural y bíblico ''te dejaré desolada'', preservando el resultado sobre la destinataria femenina singular.'
  spanish_quality_summary: 'El español es claro y digno, pero ''Así dice el Señor Yahvé: Así como...'' repite ''Así'' de forma torpe. ''Toda la tierra se alegró'' es correcto, aunque conviene conservar la nota alternativa y mejorar la fluidez principal con ''Cuando''. ''Te convertiré en desolación'' es entendible, pero menos natural que una formulación resultativa idiomática en español.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: ''Yahvé'' para יהוה y mantenimiento del título compuesto. No hay conflictos mayores de glosario. La revisión propuesta solo ajusta la naturalidad y la fuerza temporal sin alterar la terminología base.'
  issues:
  - severity: medium
    issue: Repetición torpe de 'Así' en la superficie española
    rationale: La secuencia 'Así dice... Así como...' es gramatical, pero poco elegante y menos natural en español litúrgico/lecturable.
  - severity: medium
    issue: La cláusula principal favorece insuficientemente el valor temporal
    rationale: El inglés auditado y la nota exegética dan peso al sentido temporal de כִּשְׂמֹחַ; 'Así como' en español inclina más hacia comparación que hacia tiempo.
  - severity: low
    issue: '''Te convertiré en desolación'' suena algo rígido'
    rationale: Aunque semánticamente defendible, en español bíblico actual resulta más natural expresar el resultado con 'te dejaré desolada' o similar, sin pérdida de sentido.
  revised_spanish_text: 'Así dice el Señor Yahvé: Cuando[a] toda la tierra se alegró, yo te dejaré desolada.'
  revised_footnotes:
  - marker: a
    text: 'O: «Así como toda la tierra se alegró». El hebreo con כ puede entenderse también en sentido comparativo.'
    reason: alternative_reading
  revision_rationale: Se reemplaza 'Así como' por 'Cuando' para reflejar con mayor naturalidad en español el sentido temporal preferido en la auditoría inglesa y evitar la repetición de 'Así'. Se conserva la alternativa comparativa en nota. Se cambia 'te convertiré en desolación' por 'te dejaré desolada' para un español más idiomático, manteniendo el resultado de juicio expresado por עשה + ל + שְׁמָמָה.
