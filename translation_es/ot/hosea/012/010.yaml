  glossary_alignment: 'Alineación general buena con el glosario del proyecto: «Yahvé», «Dios», «tiendas» y no «SEÑOR» ni «tabernáculos» en el texto principal. No hay conflicto doctrinal importante. La principal corrección es estilístico-lexical: preferir «de la tierra de Egipto» y ajustar la nota para reflejar mejor la ambigüedad de מוֹעֵד, no para multiplicar alternativas de בָאֳהָלִים.'
