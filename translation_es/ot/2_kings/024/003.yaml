revisions:
- from: Ciertamente esto vino sobre Judá por mandato de Yahvé[a], para quitarlo de delante de su rostro, por los pecados de Manasés, conforme a todo lo que había hecho.
  to: Ciertamente esto vino sobre Judá por mandato de Yahvé[a], para quitarlos de delante de su rostro, por los pecados de Manasés, conforme a todo lo que había hecho.
  rationale: Se cambia «quitarlo» por «quitarlos» para reflejar la decisión auditada de suplir el objeto implícito como plural contextual y para evitar una ambigüedad innecesaria en español. Se mantiene el resto del texto porque preserva bien el sentido fuente, la imaginería hebrea y la terminología del proyecto.
