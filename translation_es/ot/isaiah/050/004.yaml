  text: אֲדֹנָ֣/י יְהֹוִ֗ה נָ֤תַן לִ/י֙ לְשׁ֣וֹן לִמּוּדִ֔ים לָ/דַ֛עַת לָ/ע֥וּת אֶת יָעֵ֖ף דָּבָ֑ר יָעִ֣יר בַּ/בֹּ֣קֶר בַּ/בֹּ֗קֶר יָעִ֥יר לִ/י֙ אֹ֔זֶן לִ/שְׁמֹ֖עַ כַּ/לִּמּוּדִֽים־׀׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/050/004.yaml
  text: The Lord GOD has given me the tongue of those who are taught[a], that I may know how to sustain the weary with a word. Morning by morning he awakens[c][b]; he awakens my ear to hear like those who are taught.
  footnotes:
  - marker: a
    text: Or 'the tongue of disciples' / 'the tongue of the instructed.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb rendered 'sustain' is difficult; it may also be understood as 'help' or, less likely, 'answer' the weary with a word.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'Lord GOD' represents the title אֲדֹנָי together with the divine name YHWH.
    reason: cultural_note
