translation:
  language: es
  text: Entonces hallarás favor y buen discernimiento a los ojos de Dios y de los hombres[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la humanidad» o «de la gente»; el hebreo אָדָם aquí representa a los seres humanos en contraste con Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמְצָא
  english_pob_choice: Then you will find
  chosen_spanish: Entonces hallarás
  alternatives_spanish:
  - Y hallarás
  - Así hallarás
  lexicon: HALOT
  rationale: El waw consecutivo en este contexto sapiencial expresa resultado o consecuencia de la exhortación previa. «Entonces» comunica ese valor consecutivo con naturalidad en español, y «hallarás» conserva el sentido de encontrar/obtener.
- source_word: חֵן
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - gracia
  - aceptación
  lexicon: HALOT
  rationale: חֵן suele significar favor o aceptación benevolente. «Favor» es la opción más natural aquí y evita cargar el término con un matiz doctrinal más específico que el del contexto sapiencial.
- source_word: וְשֵׂכֶל טוֹב
  english_pob_choice: good sense
  chosen_spanish: buen discernimiento
  alternatives_spanish:
  - buen juicio
  - buena inteligencia
  - buen entendimiento
  lexicon: HALOT
  rationale: שֵׂכֶל puede denotar entendimiento, prudencia o discernimiento; con טוֹב, la expresión apunta a una capacidad mental y moral aprobada. «Buen discernimiento» conserva ese valor y suena natural en español, sin reducirlo a mera «inteligencia» ni volverlo demasiado coloquial con «sentido».
- source_word: בְּעֵינֵי
  english_pob_choice: in the eyes of
  chosen_spanish: a los ojos de
  alternatives_spanish:
  - en la estima de
  - delante de
  lexicon: HALOT
  rationale: La locución idiomática se mantiene casi literalmente porque en español también comunica evaluación o aprobación. «A los ojos de» preserva la imagen hebrea.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים refiere al Dios único; por eso se traduce «Dios» en singular.
- source_word: וְאָדָם
  english_pob_choice: man
  chosen_spanish: del hombre
  alternatives_spanish:
  - de la gente
  - de la humanidad
  lexicon: HALOT
  rationale: אָדָם contrasta con Dios y representa al ser humano como contraparte en la evaluación. «Del hombre» mantiene la forma del original y la observación auditada de que el sentido es representativo/humano, no necesariamente restringido al sexo masculino.
theological_decisions:
- issue: אָדָם como representante de la humanidad frente a Dios
  english_pob_reading: man
  chosen_spanish_reading: del hombre
  alternative_spanish_readings:
  - de la gente
  - de la humanidad
  rationale: El hebreo establece el contraste convencional entre la valoración divina y la humana. Se conserva «del hombre» porque refleja directamente el término fuente y deja visible la tensión entre la forma masculina singular y el sentido genérico representativo. La nota aclara que incluye a los seres humanos en general.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested terms table for אָדָם'
translation_notes:
  revision_awareness: La base inglesa pasó de «good insight» a «good sense» en la revisión más reciente; en español se optó por «buen discernimiento» para conservar un registro digno y el campo semántico de שֵׂכֶל sin perder naturalidad. También se preservó la nota sobre אָדָם como término representativo de la humanidad.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים según la norma del proyecto.
  - Se usa «favor» para חֵן, evitando «gracia» por su carga teológica específica.
  - Se conserva la imagen idiomática «a los ojos de» para בְּעֵינֵי.
  - «Hallarás» refleja el valor consecutivo de וּמְצָא en un contexto exhortativo-sapiencial.
