revisions:
- from: Sin embargo[a], del dinero traído a la casa de Yahvé no se hicieron para la casa de Yahvé tazones de plata, apagadores[b], tazones para rociar[c], trompetas, ni ningún utensilio de oro o utensilio de plata.
  to: Sin embargo, del dinero traído a la casa de Yahvé no se hicieron para la casa de Yahvé tazones[a] de plata, apagadores[b], cuencos de aspersión[c], trompetas, ni ningún utensilio de oro o utensilio de plata.
  rationale: Se quita la nota innecesaria sobre «Sin embargo» y se restituye la alternativa léxica documentada para סִפּוֹת כֶּסֶף en el marcador [a]. Se hispaniza la nota [b] y se ajusta «tazones para rociar» a «cuencos de aspersión» para mejor naturalidad y precisión cultual, manteniendo el sentido fuente y el razonamiento del POB inglés.
