revisions:
- from: 'Samuel se levantó de madrugada para salir al encuentro de Saúl, y se informó a Samuel, diciendo: «Saúl llegó a Carmel, y he aquí que se ha erigido un monumento[a] para sí; luego se volvió, pasó y descendió a Gilgal».'
  to: 'Samuel se levantó de madrugada para salir al encuentro de Saúl, y se le informó a Samuel, diciendo: «Saúl llegó a Carmelo, y he aquí que levantó un monumento[a] para sí; luego se volvió, pasó y descendió a Gilgal».'
  rationale: La revisión corrige la voz verbal para que Saúl sea claramente el agente que levanta el monumento para sí mismo, como en el hebreo. También mejora la naturalidad con 'se le informó a Samuel' y adapta el topónimo a 'Carmelo', forma más natural en español bíblico. Se conserva la nota lexical sobre 'mano' > 'monumento'.
  reviewer_model: gpt-5.4
