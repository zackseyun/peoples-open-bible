revisions:
- from: Bendito sea Yahvé tu Dios[a], que se agradó de ti y te puso sobre su trono como rey para Yahvé tu Dios. Porque tu Dios amó a Israel para establecerlo[b] para siempre, te hizo rey sobre ellos para hacer justicia y rectitud.
  to: Bendito sea Yahvé tu Dios[a], que se agradó de ti y te puso en su trono como rey para Yahvé tu Dios. Porque tu Dios amó a Israel para establecerlo[b] para siempre, te hizo rey sobre ellos para administrar justicia y rectitud.
  rationale: 'La revisión hace reparaciones pequeñas pero importantes: mejora la naturalidad de la alternativa benedictoria en la nota [a], usa «en su trono» como español más idiomático para entronización sin perder la teología de «su trono», y cambia «hacer justicia y rectitud» por «administrar justicia y rectitud» para reflejar mejor la función real del hebreo. Se conserva el singular «establecerlo» por la decisión auditada de mantener la referencia colectiva de Israel en singular.'
  reviewer_model: gpt-5.4
