translation:
  language: es
  text: Habla, joven, si hay necesidad de que lo hagas, con mesura[a][b], dos o tres veces si te preguntan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Con mesura» refleja el sentido probable de בחזק en este contexto; el hebreo es difícil en esta línea, y el paralelo griego difiere de manera notable.
    reason: textual_variant
  - marker: b
    text: O posiblemente «brevemente» o «con cuidado»; el testimonio hebreo de este versículo es textualmente difícil.
    reason: lexical_alternative
lexical_decisions:
- source_word: דבר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Habla tú
  lexicon: HALOT
  rationale: El imperativo de דבר exige una orden directa; en español, «Habla» mantiene la naturalidad y la fuerza exhortativa sin añadir contenido.
- source_word: נער
  english_pob_choice: young man
  chosen_spanish: joven
  alternatives_spanish:
  - muchacho
  - joven varón
  lexicon: HALOT
  rationale: El hebreo es masculino singular y se refiere a un hombre joven. «Joven» conserva esa referencia con un español más fluido que «joven varón».
- source_word: אם צריך אתה
  english_pob_choice: if there is need for you to do so
  chosen_spanish: si hay necesidad de que lo hagas
  alternatives_spanish:
  - si es necesario
  - si necesitas hacerlo
  lexicon: HALOT
  rationale: La estructura expresa necesidad o conveniencia, con un matiz explícito hacia la acción del destinatario. «Si hay necesidad de que lo hagas» conserva ese valor sin volverlo rígido.
- source_word: בחזק
  english_pob_choice: with restraint
  chosen_spanish: con mesura
  alternatives_spanish:
  - brevemente
  - con cuidado
  - con firmeza
  lexicon: HALOT
  rationale: La tradición auditada lo entiende como habla medida y controlada; el hebreo es difícil y el paralelo griego no resuelve de modo seguro. «Con mesura» comunica contención y medida, sin comprometerse a una reconstrucción demasiado específica.
- source_word: פעמים ושלש
  english_pob_choice: two or three times
  chosen_spanish: dos o tres veces
  alternatives_spanish:
  - una o dos veces
  - repetidas veces
  lexicon: HALOT
  rationale: La locución idiomática limita la repetición. «Dos o tres veces» es la equivalencia natural y precisa en español.
- source_word: אם ישאלך
  english_pob_choice: if you are asked
  chosen_spanish: si se te pregunta
  alternatives_spanish:
  - si te preguntan
  - si alguien te pregunta
  lexicon: HALOT
  rationale: La construcción pasiva o impersonal del hebreo se refleja bien con «se te pregunta», que evita introducir un sujeto no explicitado.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior anclando explícitamente las notas al texto con [a] y [b]. La redacción evita añadir énfasis como «solo», en consonancia con la revisión auditada.
  spanish_consistency_notes:
  - Se mantuvo un español neutro y publicable, sin recurrir a fórmulas eclesiásticas arcaizantes.
  - Se preservó la tensión textual de בחזק mediante una opción prudente («con mesura») y una nota que reconoce la dificultad del hebreo.
  - La frase final conserva la condición del hebreo sin explicitar innecesariamente un sujeto.
