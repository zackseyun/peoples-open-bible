revisions:
- from: Si un hombre yaciere con un animal[a], ciertamente será muerto; y mataréis al animal.
  to: Si un hombre se acuesta con un animal[a], sin falta se le dará muerte, y matarán al animal.
  rationale: Se actualiza el español para que sea moderno pero digno, sin perder el sentido del hebreo ni la lógica del POB. «Se acuesta con» conserva el eufemismo del original mejor que una paráfrasis más explícita. «Sin falta se le dará muerte» reproduce el énfasis de מוֹת יוּמָת con una formulación legal natural en español. «Matarán al animal» evita un futuro arcaizante. La nota al pie se ajusta para sonar más natural en español y reflejar mejor la explicación lexical.
