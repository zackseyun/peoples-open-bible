translation:
  language: es
  text: 'Entonces Eli dijo a Samuel[a]: «Ve, acuéstate, y si él te llama, dirás: “Habla, Yahvé, porque tu siervo escucha”». Entonces Samuel fue y se acostó en su lugar.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Habla, Yahvé, porque tu siervo escucha». Algunas traducciones vierten el nombre divino aquí como «el SEÑOR» en vez de «Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then Eli said
  chosen_spanish: Entonces Eli dijo
  alternatives_spanish:
  - Y Eli dijo
  - Luego Eli dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» conserva la secuencia natural en español sin perder el valor narrativo.
- source_word: לֵךְ שְׁכָב
  english_pob_choice: Go, lie down
  chosen_spanish: Ve, acuéstate
  alternatives_spanish:
  - Ve, y acuéstate
  - Ve a acostarte
  lexicon: HALOT
  rationale: Los dos imperativos se preservan de forma directa. «Acuéstate» expresa el mandato de recostarse para dormir sin añadir información no explícita.
- source_word: וְהָיָה אִם
  english_pob_choice: and if
  chosen_spanish: y si
  alternatives_spanish:
  - y cuando
  - y acontecerá que si
  lexicon: HALOT
  rationale: La construcción introduce una condición; «y si» es la forma idiomática y no exagera la certeza del hebreo.
- source_word: יִקְרָא אֵלֶיךָ
  english_pob_choice: he calls to you
  chosen_spanish: él te llama
  alternatives_spanish:
  - alguien te llama
  - te llama
  lexicon: HALOT
  rationale: El sujeto está implícito en hebreo. En el contexto inmediato, Eli ya entiende que el que llama es Yahvé, por lo que «él» mantiene la referencia narrativa sin explicitar el nombre en la cláusula.
- source_word: וְאָמַרְתָּ
  english_pob_choice: you shall say
  chosen_spanish: dirás
  alternatives_spanish:
  - entonces dirás
  - di
  lexicon: HALOT
  rationale: La forma verbal funciona como instrucción consecuente; «dirás» conserva el mandato con naturalidad en español.
- source_word: דַּבֵּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Hablad
  lexicon: HALOT
  rationale: Imperativo breve dirigido al que llama. «Habla» es la equivalencia más directa y sobria en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino revelado, sin sustituirlo por un título. «Yahvé» sigue el criterio POB para el Tetragrámaton.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la petición. «Porque» expresa bien la causalidad en español de forma natural.
- source_word: שֹׁמֵעַ
  english_pob_choice: is listening
  chosen_spanish: escucha
  alternatives_spanish:
  - está escuchando
  - oye
  lexicon: HALOT
  rationale: El participio marca atención continua. En español, «escucha» comunica esa disponibilidad sin sonar forzado.
- source_word: עַבְדֶּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: Aquí funciona como autodesignación reverente ante Yahvé. «Siervo» preserva la deferencia; «esclavo» resultaría demasiado duro para el tono de la súplica.
- source_word: וַיֵּלֶךְ ... וַיִּשְׁכַּב
  english_pob_choice: So Samuel went and lay down
  chosen_spanish: Así Samuel fue y se acostó
  alternatives_spanish:
  - Entonces Samuel fue y se acostó
  - Y Samuel fue y se acostó
  lexicon: HALOT
  rationale: Los wayyiqtol sucesivos continúan la narración. «Así» marca el resultado de la instrucción y mantiene el flujo narrativo.
- source_word: בִּמְקוֹמוֹ
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en su sitio
  - en el lugar donde estaba
  lexicon: HALOT
  rationale: La frase indica la ubicación asignada o habitual de Samuel. «En su lugar» es fiel y comprensible en español.
theological_decisions:
- issue: Nombre divino en la orden directa
  english_pob_reading: Speak, Yahweh, for your servant is listening.
  chosen_spanish_reading: Habla, Yahvé, porque tu siervo escucha.
  alternative_spanish_readings:
  - Habla, Señor, porque tu siervo escucha.
  - Habla, SEÑOR, porque tu siervo escucha.
  rationale: El texto hebreo contiene el Tetragrámaton, y la práctica POB es trasladarlo como «Yahvé» para conservar el nombre propio divino, no reemplazarlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Sujeto implícito de «él te llama»
  english_pob_reading: if he calls to you
  chosen_spanish_reading: si él te llama
  alternative_spanish_readings:
  - si te llama
  - si alguien te llama
  rationale: El hebreo omite el sujeto explícito; el contexto narrativo hace que la referencia sea inteligible. «Él» conserva la inferencia sin sobreexplicarla.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: La versión anterior falló porque incluía una nota con el marcador [a] sin anclarlo en el texto. En esta revisión, el marcador [a] aparece exactamente en «Samuel[a]» y la nota corresponde a esa forma anclada. También se mantuvo «Yahvé» coherente con el criterio POB y se evitó cualquier pie de nota sin ancla.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para יְהוָה.
  - Se eligió «siervo» para עַבְדֶּךָ por el tono reverente del ruego.
  - «En su lugar» mantiene la referencia espacial sin añadir matiz interpretativo.
  - Se preservó la secuencia narrativa con «Entonces» y «Así» sin sobretraducir el hebreo.
