source:
  edition: SBLGNT
  text: ἐὰν οὖν συνέλθῃ ἡ ἐκκλησία ὅλη ἐπὶ τὸ αὐτὸ καὶ πάντες ⸂λαλῶσιν γλώσσαις⸃, εἰσέλθωσιν δὲ ἰδιῶται ἢ ἄπιστοι, οὐκ ἐροῦσιν ὅτι μαίνεσθε;
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/014/023.yaml
  text: Therefore[a], if the whole church comes together in one place and all speak in tongues, and uninstructed people or unbelievers enter[b], will they not say that you are out of your minds?
  footnotes:
  - marker: a
    text: Or 'speak in languages.' The Greek term can mean 'languages,' but 'tongues' preserves the established expression in this context without resolving the debated nature of the phenomenon.
    reason: alternative_reading
  - marker: b
    text: Or 'outsiders' for 'uninstructed people.' The Greek likely refers to those not informed or initiated in the congregation's practices, distinguished here from 'unbelievers.'
    reason: lexical_alternative
translation:
  language: ko
  text: 그러므로 온 교회가 한 자리에 모여 모두 방언으로 말하는데, 알지 못하는 사람들이나 믿지 않는 자들이 들어온다면, 그들이 여러분을 미쳤다고 하지 않겠습니까?
  philosophy: optimal-equivalence
lexical_decisions:
