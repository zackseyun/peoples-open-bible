lexical_decisions:
- source_word: υγιεια / υγια
  english_pob_choice: health
  chosen_spanish: salud
  alternatives_spanish:
  - buena salud
  - bienestar
  - sano/sana
  lexicon: LSJ
  rationale: El testimonio griego conservado es fragmentario y solo deja el campo semántico de 'salud' o 'estado sano'. En español, 'salud' es la correspondencia más directa y sobria; 'buena salud' añade un matiz evaluativo no exigido por el fragmento, y 'bienestar' amplía indebidamente el sentido.
- source_word: μετα / μετ
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - entre
  - después de
  lexicon: LSJ
  rationale: La variante preposicional observada en el aparato apunta naturalmente a la preposición 'con', pero el texto griego preservado en este versículo es demasiado truncado para incorporar una cláusula completa sin sobretraducción. Por eso la decisión se documenta, aunque no se expresa aparte en el texto español final.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; la versión griega de trabajo y la auditoría inglesa permanecen sin cambios, con alta concordancia entre los controles disponibles.
