review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del griego: una orden autoritativa, el cuidado protector del pueblo, la prohibición de entrar en combate con las naciones y el límite temporal hasta el regreso. Sin embargo, «Tengan cuidado de este pueblo» en español se entiende más naturalmente como cautela respecto del pueblo, no como cuidado protector hacia él, y por eso no preserva con suficiente claridad el valor de Πρόσεχετε con genitivo en este contexto.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero la frase principal suena ambigua o algo antinatural en español. «Cuiden de este pueblo» comunica mejor el sentido protector y suena natural en español eclesial general. También conviene ajustar «le dio órdenes a ellos» a «les dio órdenes» para una redacción más idiomática.
  glossary_alignment: No hay términos del glosario mayor en juego. «Las naciones» está bien alineado con el proyecto para τὰ ἔθνη. No se detectan problemas teológicos o terminológicos mayores.
  issues:
  - severity: medium
    issue: «Tengan cuidado de este pueblo» es semánticamente ambiguo en español.
    rationale: En español, «tener cuidado de alguien/algo» puede entenderse, pero «tener cuidado de este pueblo» también puede oírse como ‘tener precaución con este pueblo’. El griego aquí pide atención protectora hacia el pueblo. «Cuiden de este pueblo» o «velen por este pueblo» lo expresa mejor.
  - severity: low
    issue: «le dio órdenes a ellos» es menos idiomático que «les dio órdenes».
    rationale: No es un error de sentido, pero el clítico dativo plural normal mejora la naturalidad sin perder fuerza autoritativa.
  revised_spanish_text: 'Y les dio órdenes, diciendo: «Cuiden[a] de este pueblo, y no entablen batalla contra las naciones hasta que nosotros volvamos».'
  revised_footnotes:
  - marker: a
    text: 'O: «Velen por este pueblo». El imperativo griego puede subrayar tanto la vigilancia protectora como la prudencia general.'
    reason: lexical_alternative
  revision_rationale: Se revisa la primera orden para expresar con claridad el cuidado protector implicado por Πρόσεχετε en este contexto. «Cuiden de este pueblo» es más natural y menos ambiguo que «Tengan cuidado de este pueblo». Además, «les dio órdenes» mejora la fluidez idiomática del español.
