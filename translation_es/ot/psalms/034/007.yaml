translation:
  language: es
  text: Este pobre hombre[a] clamó, y Yahvé oyó, y lo salvó[b] de todas sus angustias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «afligido» o «pobre». El hebreo עָנִי puede denotar pobreza, aflicción o humilde bajeza.
    reason: lexical_alternative
  - marker: b
    text: O «lo libró» o «lo rescató». El verbo expresa salvar o sacar a alguien del peligro o la angustia.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֶה
  english_pob_choice: This
  chosen_spanish: Este
  alternatives_spanish:
  - Aquí está
  - Este mismo
  lexicon: HALOT
  rationale: El demonstrativo introduce al sujeto que habla el salmista; «Este» conserva la referencia directa y funciona de modo natural en español.
- source_word: עָנִי
  english_pob_choice: poor man
  chosen_spanish: pobre
  alternatives_spanish:
  - afligido
  - pobre hombre
  - humilde
  lexicon: HALOT
  rationale: El término puede abarcar pobreza, aflicción o humillación. En este contexto de clamor y rescate, «pobre» mantiene la amplitud semántica y la forma concisa del hebreo.
- source_word: קָרָא
  english_pob_choice: cried out
  chosen_spanish: clamó
  alternatives_spanish:
  - llamó
  - gritó
  lexicon: HALOT
  rationale: El verbo expresa un llamado urgente en la angustia; «clamó» comunica mejor esa súplica intensa que un simple «llamó».
- source_word: יהוה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino revelado en el texto hebreo, conforme al criterio del proyecto, en vez de sustituirlo por un título enmascarador.
- source_word: שָׁמֵעַ
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - oyó y respondió
  lexicon: HALOT
  rationale: La forma funciona aquí como perfecto narrativo/testimonial; «oyó» es idiomático en español y mantiene la acción de respuesta divina.
- source_word: מִכָּל
  english_pob_choice: from all
  chosen_spanish: de todas
  alternatives_spanish:
  - de cada una de
  - de entre todas
  lexicon: HALOT
  rationale: La preposición con «all» marca liberación respecto de la totalidad de las aflicciones; «de todas» es natural y fiel.
- source_word: צָרוֹתָיו
  english_pob_choice: his troubles
  chosen_spanish: sus angustias
  alternatives_spanish:
  - sus tribulaciones
  - sus aflicciones
  - sus problemas
  lexicon: HALOT
  rationale: El sustantivo indica estrechez, aflicción y aprieto. «Angustias» preserva el peso emocional y la situación de presión sin sonar técnico.
- source_word: הוֹשִׁיעוֹ
  english_pob_choice: saved him
  chosen_spanish: lo libró
  alternatives_spanish:
  - lo salvó
  - lo rescató
  lexicon: HALOT
  rationale: El hiphil de ישׁע incluye salvar/liberar/rescatar. En español, «lo libró» expresa con claridad la acción de sacar al sujeto del peligro o la angustia.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton, y la política del proyecto privilegia su transliteración en vez de reemplazarlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Matiz de עָנִי en contexto testimonial
  english_pob_reading: poor man
  chosen_spanish_reading: pobre
  alternative_spanish_readings:
  - afligido
  - humilde
  - pobre hombre
  rationale: La palabra hebrea puede señalar pobreza, aflicción o humillación. En una declaración de rescate, el español breve «pobre» conserva esa amplitud sin perder el tono testimonial.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Verbo de rescate הוֹשִׁיעוֹ
  english_pob_reading: saved him
  chosen_spanish_reading: lo libró
  alternative_spanish_readings:
  - lo salvó
  - lo rescató
  rationale: Aunque «salvar» es posible, aquí el paralelismo con «de todas sus angustias» resalta el acto de liberar/sacar de la aflicción; «libró» reproduce bien esa fuerza en español.
  doctrine_reference: HALOT, ישׁע; salvífico/liberador en contexto de aflicción
translation_notes:
  revision_awareness: Concordancia alta con el audit trail inglés; se mantuvieron las decisiones clave sobre el nombre divino, el valor amplio de עָנִי y el matiz de rescate de הוֹשִׁיעוֹ. No se documentaron revisiones posteriores que alteren el contenido.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con la política del proyecto para יהוה.
  - Se prefirió «clamó» sobre una traducción más neutra para preservar el sentido de súplica urgente.
  - «Angustias» recoge el campo semántico de צָרוֹת sin introducir una interpretación demasiado específica.
  - Los marcadores de nota a y b están anclados en el texto y corresponden a alternativas léxicas documentadas.
