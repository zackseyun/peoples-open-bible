review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia narrativa del hebreo: captura de los dos jefes madianitas, ejecución en dos lugares epónimos, continuación de la persecución contra Madián y entrega de las cabezas a Gedeón desde el otro lado/del otro lado del Jordán. También conserva correctamente Oreb y Zeeb como nombres propios y mantiene la nota sobre sus sentidos léxicos. Sin embargo, hay un desajuste menor con la decisión auditada de בְּצוּר / בְיֶקֶב como locativos neutrales ''at'': en español, ''en la roca'' y ''en el lagar'' pueden sugerir interioridad o contacto físico más marcado que el valor topográfico neutral del hebreo y del POB inglés.'
  spanish_quality_summary: 'El español es claro, natural y de registro digno. No obstante, ''capturaron'' suena algo menos personal con objeto humano que ''apresaron'', y sobre todo conviene ajustar ''en la roca / en el lagar'' a ''junto a'' para una lectura topográfica más natural en español. La nota b tiene comillas y puntuación sobrantes (''O también: ...'') y puede simplificarse.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Madián', 'Gedeón', 'Oreb' y 'Zeeb' están bien. 'Príncipes' sigue la decisión auditada para שָׂרֵי. No hay términos teológicos sensibles en este versículo.
  issues:
  - severity: medium
    issue: Los locativos 'en la roca de Oreb' y 'en el lagar de Zeeb' no reflejan de la manera más natural el valor topográfico neutral de בְּצוּר / בְיֶקֶב.
    rationale: El POB inglés justificó 'at the rock of' y 'at the winepress of' para evitar una lectura demasiado específica como 'on/in'. En español, 'junto a la roca de Oreb' y 'junto al lagar de Zeeb' conservan mejor ese valor locativo neutral y suenan más naturales.
  - severity: low
    issue: 'La nota b está formulada de manera torpe: ''''O también: «desde más allá del Jordán».'''''
    rationale: 'La alternativa es válida, pero la redacción debe normalizarse para claridad editorial: ''O también: «desde más allá del Jordán».'''
  - severity: low
    issue: '''Capturaron'' es aceptable, pero ''apresaron'' encaja mejor con personas en contexto militar.'
    rationale: No es un error de fidelidad, pero 'apresaron' suena algo más idiomático cuando el objeto directo son dos dirigentes humanos ya identificados.
  revised_spanish_text: Y apresaron a los dos príncipes de Madián[a], Oreb y Zeeb. Mataron a Oreb junto a la roca de Oreb, y a Zeeb lo mataron junto al lagar de Zeeb. Luego persiguieron a Madián[b], y trajeron las cabezas de Oreb y Zeeb a Gedeón desde el otro lado del Jordán.
  revised_footnotes:
