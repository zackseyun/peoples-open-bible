translation:
  language: es
  text: Pues el oro es probado en el fuego, y los hombres aceptados[a] en el horno de la aflicción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo conserva una expresión difícil en la segunda línea; el paralelo griego lee «hombres aceptados en un horno de humillación». La traducción principal sigue ese sentido, manteniendo el anclaje en el hebreo transmitido.
    reason: alternative_reading
lexical_decisions:
- source_word: יִבָּחֵן
  english_pob_choice: is tested
  chosen_spanish: es probado
  alternatives_spanish:
  - es examinado
  - es testeado
  - es refinado
  lexicon: HALOT
  rationale: El verbo hebreo בחן expresa probar o poner a prueba. «Es probado» conserva bien esa acción sin añadir la idea de resultado final que sugeriría «refinado». En español bíblico moderno suena natural y mantiene el paralelismo con el oro en el fuego.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - el oro
  lexicon: HALOT
  rationale: Correspondencia léxica directa y transparente.
- source_word: בְּנֵי אָדָם
  english_pob_choice: acceptable men
  chosen_spanish: los hombres aceptables
  alternatives_spanish:
  - seres humanos aceptables
  - las personas aceptables
  - los hombres que son aceptados
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hijos de אדם», pero el contexto y el paralelo griego apuntan a personas aceptables/aceptadas. En español, «hombres aceptables» conserva el valor genérico de אָדָם en este refrán y sigue de cerca la solución auditada del POB inglés.
- source_word: בְּכוּר עֹנִי
  english_pob_choice: furnace of affliction
  chosen_spanish: el horno de la aflicción
  alternatives_spanish:
  - el crisol de la aflicción
  - el horno de la humillación
  - el crisol de la humillación
  lexicon: HALOT
  rationale: La frase hebrea transmitida es difícil; el paralelo griego habla de «horno de humillación». «Horno de la aflicción» mantiene la metáfora de refinamiento y sigue el sentido estabilizado por el testimonio griego, sin imponer una lectura más fuerte que la atestiguada.
- source_word: καμίνῳ
  english_pob_choice: furnace
  chosen_spanish: horno
  alternatives_spanish:
  - horno de fundición
  - crisol
  - furnace
  lexicon: LSJ
  rationale: El griego usa καμίνῳ, un horno o crisol de fuego. «Horno» es la opción española más clara y natural; «crisol» sería posible pero puede desplazar la imagen desde un horno ardiente hacia un aparato técnico más específico.
theological_decisions:
- issue: Uso del paralelo griego para resolver una dificultad hebrea en la segunda línea
  english_pob_reading: Translate the second colon as referring to accepted men being tested in affliction
  chosen_spanish_reading: Traducir la segunda cola como hombres aceptables que son puestos a prueba en el horno de la aflicción
  alternative_spanish_readings:
  - 'traducir más mecánicamente: seres humanos en el crisol de la aflicción'
  - 'dejar una forma más literal: hombres en el horno de la humillación'
  - interpretar בְּכוּר como 'escogidos'
  rationale: 'La tradición hebrea preservada aquí contiene un crux en בְּכוּר עֹנִי. Siguiendo el criterio del proyecto, se traduce desde el hebreo donde es legible, pero se usa el paralelo griego como testimonio real para estabilizar el sentido. La solución española mantiene el paralelismo sapiencial: el oro y las personas son probados en fuego/aflicción.'
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde sobreviva; usar el griego paralelo como input de traducción real'
- issue: Tensión entre «aceptables» y «aceptados»
  english_pob_reading: acceptable men
  chosen_spanish_reading: hombres aceptables
  alternative_spanish_readings:
  - hombres aceptados
  - hombres aprobados
  - personas aceptables
  rationale: «Aceptables» refleja de cerca la revisión final inglesa del POB y evita cargar el verso con una noción más técnica o más pasiva de elección. En este dicho sapiencial, la idea es que ciertas personas resultan aprobadas tras la prueba.
  doctrine_reference: Sirach 2:5 audit trail revision notes
translation_notes:
  revision_awareness: La redacción española sigue la revisión final del POB inglés en la primera cola («gold is tested in fire») y refleja la solución auditada para la segunda cola, preferiendo una formulación natural en español que mantenga el paralelismo y la ambigüedad controlada del hebreo con apoyo del griego.
  spanish_consistency_notes:
  - Se conservó «oro» para זָהָב y «aflicción» para עֹנִי, porque ambos términos funcionan bien en español bíblico actual y sostienen el contraste sapiencial.
  - Se eligió «horno» en lugar de «crisol» para evitar una tecnificación innecesaria del símbolo.
  - Se mantuvo el plural genérico «los hombres» para reflejar el valor colectivo de בְּנֵי אָדָם, en línea con la política terminológica del proyecto.
