base_translation:
  language: en
  yaml_path: translation/ot/malachi/002/014.yaml
  text: But you say[a], “Why?” Because Yahweh has been a witness between you and the wife of your youth, to whom you have been unfaithful[b], though she is your companion and your wife by covenant.
  footnotes:
  - marker: a
    text: Or, “with whom you have dealt faithlessly.” The Hebrew verb can denote treachery, betrayal, or faithless dealing, especially in covenant contexts.
    reason: lexical_alternative
  - marker: b
    text: Or, “your covenant wife” or “the wife of your covenant.”
    reason: lexical_alternative
