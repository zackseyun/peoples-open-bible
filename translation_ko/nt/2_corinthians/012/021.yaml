id: 2CO.12.21
reference: '2 Corinthians 12:21'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: μὴ πάλιν ⸂ἐλθόντος μου⸃ ⸀ταπεινώσῃ ⸀με ὁ θεός μου πρὸς ὑμᾶς, καὶ πενθήσω πολλοὺς τῶν προημαρτηκότων καὶ μὴ μετανοησάντων ἐπὶ τῇ ἀκαθαρσίᾳ καὶ πορνείᾳ καὶ ἀσελγείᾳ ᾗ ἔπραξαν.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/012/021.yaml
  text: I fear that when I come again[a], my God may humble me before you[d][c][b], and I will mourn over many who have sinned before and have not repented of the impurity and sexual immorality and sensuality
    that they practiced.
translation:
  language: ko
  text: 내가 다시 갈 때에 나의 하나님이 여러분 앞에서 나를 낮추실까, 그리고 전에 죄를 지어 놓고 자기들이 행한 부정함과 음행과 방탕을 회개하지 않은 많은 이들 때문에 내가 슬퍼하게 될까 두렵습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ταπεινώσῃ
  english_pob_choice: humble
  chosen_korean: 낮추실까
  lexicon: BDAG
  rationale: '10:1, 11:7과 호응.'
- source_word: πενθήσω
  english_pob_choice: mourn
  chosen_korean: 슬퍼하게 될까
  lexicon: BDAG
  rationale: 동사. 「슬퍼하다」 표준.
- source_word: ἀκαθαρσίᾳ
  english_pob_choice: impurity
  chosen_korean: 부정함
  lexicon: BDAG
  rationale: 성적·종교적 부정함. 「부정함」 표준.
  alternatives_korean:
  - 불결함
- source_word: πορνείᾳ
  english_pob_choice: sexual immorality
  chosen_korean: 음행
  lexicon: BDAG
  rationale: 신약 정형. 약화하지 않고 「음행」 그대로.
- source_word: ἀσελγείᾳ
  english_pob_choice: sensuality
  chosen_korean: 방탕
  lexicon: BDAG
  rationale: 통제 없는 욕망. 「방탕」 표준.
  alternatives_korean:
  - 방종
  - 음란
