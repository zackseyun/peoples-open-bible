translation:
  language: es
  text: y las cortinas del atrio, y la cortina para la entrada de la puerta del atrio, que está alrededor del tabernáculo y alrededor del altar, y sus cuerdas, y todos los utensilios de su servicio, y todo lo que se hará con ellos[a]; y servirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo lo que se hará para ellos». El hebreo puede referirse tanto a las tareas hechas con estos objetos como a las tareas hechas para ellos en el curso del servicio.
    reason: alternative_reading
lexical_decisions:
- source_word: קַלְעֵי
  english_pob_choice: hangings
  chosen_spanish: cortinas
  alternatives_spanish:
  - hangings
  - velos
  lexicon: HALOT
  rationale: En este contexto de la corte exterior del tabernáculo, ‘cortinas’ comunica con naturalidad el elemento textil sin depender de un calco inglés. ‘Hangings’ no es idiomático en español bíblico actual, y ‘velos’ puede sugerir otro tipo de pieza litúrgica.
- source_word: הֶחָצֵר
  english_pob_choice: court
  chosen_spanish: atrio
  alternatives_spanish:
  - patio
  - corte
  lexicon: HALOT
  rationale: ‘Atrio’ es el término español más estable en contexto de santuario para el recinto exterior. ‘Patio’ suena demasiado doméstico; ‘corte’ resulta menos natural en este pasaje.
- source_word: מָסַךְ
  english_pob_choice: screen
  chosen_spanish: pantalla
  alternatives_spanish:
  - cortina
  - cobertura
  lexicon: HALOT
  rationale: La pieza es un textil de cierre/entrada. ‘Pantalla’ conserva la función de separación sin confundirla con las ‘cortinas’ ya mencionadas; evita duplicar el mismo término para dos objetos distintos.
- source_word: פֶּתַח שַׁעַר
  english_pob_choice: the entrance of the gate
  chosen_spanish: la entrada de la puerta
  alternatives_spanish:
  - el acceso de la puerta
  - la entrada de la puerta del atrio
  lexicon: HALOT
  rationale: La cadena hebrea es algo redundante, y el español puede preservarla de forma comprensible con ‘entrada de la puerta’. Mantiene la referencia al punto de acceso del atrio sin sobreexplicar.
- source_word: אֲשֶׁר עַל הַמִּשְׁכָּן וְעַל הַמִּזְבֵּחַ סָבִיב
  english_pob_choice: that is around the tabernacle and around the altar
  chosen_spanish: que está alrededor del tabernáculo y alrededor del altar
  alternatives_spanish:
  - que rodea el tabernáculo y el altar
  - que está en torno al tabernáculo y al altar
  lexicon: HALOT
  rationale: Se conserva la repetición de ‘alrededor’ para reflejar סָבִיב y el paralelismo hebreo. ‘Está alrededor’ mantiene la relación espacial sin volverla más interpretativa de lo necesario.
- source_word: מֵיתְרֵיהֶם
  english_pob_choice: their ropes
  chosen_spanish: sus cuerdas
  alternatives_spanish:
  - sus sogas
  - sus cordeles
  lexicon: HALOT
  rationale: La alternativa inglesa admitía ‘cords’; en español ‘cuerdas’ es natural y suficientemente general para este conjunto de sujeción. Evita un término demasiado pesado como ‘sogas’.
- source_word: כְּלֵי עֲבֹדָתָם
  english_pob_choice: all the equipment for their service
  chosen_spanish: todos los utensilios de su servicio
  alternatives_spanish:
  - todo el equipo para su servicio
  - todos los instrumentos de su servicio
  lexicon: HALOT
  rationale: ‘Utensilios’ reproduce bien el rango amplio de כְּלִים sin reducirlo a herramientas domésticas. ‘Servicio’ conserva la carga cultual de עֲבֹדָה, y la forma plural concuerda con ‘todos’.
- source_word: כָּל אֲשֶׁר יֵעָשֶׂה לָהֶם
  english_pob_choice: all that is to be done with them
  chosen_spanish: todo lo que se hará para ellos
  alternatives_spanish:
  - todo lo que se hará con ellos
  - todo cuanto se haga por ellos
  lexicon: HALOT
  rationale: El hebreo permite una ambigüedad entre tareas hechas ‘con’ estos objetos y tareas hechas ‘para’ su uso. Se eligió ‘para ellos’ para mantener abierta la posibilidad que el POB documenta sin fijar una sola lectura.
- source_word: וְעָבָדוּ
  english_pob_choice: And they shall serve
  chosen_spanish: y servirán
  alternatives_spanish:
  - y desempeñarán su servicio
  - y trabajarán
  lexicon: HALOT
  rationale: ‘Servirán’ preserva el valor cultual de עבד en un final conciso y natural en español. ‘Desempeñarán su servicio’ explicita más, pero es menos directo.
theological_decisions:
- issue: Naturaleza del trabajo asignado a los meraritas en el contexto del tabernáculo
  english_pob_reading: and they shall serve
  chosen_spanish_reading: y servirán
  alternative_spanish_readings:
  - y desempeñarán su servicio
  - y trabajarán
  rationale: No hay una tesis doctrinal adicional en el versículo; el punto es la asignación de labores sagradas. Se mantiene un verbo cultual sobrio que no rebaja la dimensión de servicio al santuario.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La puntuación final sigue la revisión auditada del inglés POB: el cierre se une con punto y coma antes de la cláusula final, reflejando mejor la secuencia hebrea sin alterar el contenido.'
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ por norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se distinguió ‘atrio’ para חָצֵר y ‘tabernáculo’ para מִשְׁכָּן, manteniendo la terminología cultual del contexto.
  - Se evitó ‘siervo’ porque עָבַד aquí describe servicio asignado en el santuario, no un matiz de esclavitud personal.
  - Se conservó la repetición de ‘alrededor’ para reflejar el hebreo y no suavizar la estructura espacial.
  - Las notas al pie están ancladas exactamente en el texto principal y no se reutiliza ningún marcador.
