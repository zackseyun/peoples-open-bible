id: LAM.4.6
reference: Lamentations 4:6
source:
  edition: WLC
  text: וַ/יִּגְדַּל֙ עֲוֺ֣ן בַּת עַמִּ֔/י מֵֽ/חַטַּ֖את סְדֹ֑ם הַֽ/הֲפוּכָ֣ה כְמוֹ רָ֔גַע וְ/לֹא חָ֥לוּ בָ֖/הּ יָדָֽיִם־־־׃ס
translation:
  text: For the iniquity of the daughter of my people has grown greater than the sin of Sodom[a], which was overthrown in a moment[b], though no hands labored against her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the guilt of the daughter of my people is greater than the guilt of Sodom'; the Hebrew word for 'iniquity' can also imply guilt or its punishment.
    reason: lexical_alternative
  - marker: b
    text: The final clause is difficult Hebrew; alternatively, 'and no hands were wrung over her' or 'no hands came upon her.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּגְדַּל
  chosen: has grown greater
  alternatives:
  - is greater
  - became greater
  lexicon: HALOT
  rationale: The verb from גדל literally means 'became/grew great.' In context it compares Judah's guilt with Sodom's, so 'has grown greater' preserves the verbal sense while yielding natural English.
- source_word: עֲוֺן
  chosen: iniquity
  alternatives:
  - guilt
  - punishment of iniquity
  lexicon: HALOT
  rationale: עָוֹן can denote both guilt/iniquity and its punishment. Here the comparison with 'the sin of Sodom' favors the moral sense rather than the penalty itself, so 'iniquity' is chosen. 'Guilt' is possible and is preserved as an alternative.
- source_word: בַּת עַמִּי
  chosen: the daughter of my people
  alternatives:
  - my dear people
  - the daughter of my people Zion
  lexicon: HALOT
  rationale: This is a conventional personification for Jerusalem/Judah. A relatively formal rendering preserves the metaphor and lament idiom better than flattening it into a paraphrase.
- source_word: מֵחַטַּאת סְדֹם
  chosen: than the sin of Sodom
  alternatives:
  - than the guilt of Sodom
  - than the punishment for the sin of Sodom
  lexicon: HALOT
  rationale: 'The preposition מִן marks comparison: Judah''s iniquity is greater than Sodom''s sin. Because חַטָּאת can mean sin or sin-offering and sometimes punishment, context here clearly points to ''sin'' as the basis of comparison.'
- source_word: הַהֲפוּכָה
  chosen: which was overthrown
  alternatives:
  - that was overturned
  - that was destroyed
  lexicon: HALOT
  rationale: The passive participial form recalls the overthrow of Sodom in Genesis. 'Overthrown' preserves the intertextual echo better than the more generic 'destroyed.'
- source_word: כְמוֹ רָגַע
  chosen: in a moment
  alternatives:
  - like a moment
  - instantly
  lexicon: HALOT
  rationale: The phrase expresses suddenness. 'In a moment' is idiomatic English and captures the temporal force without over-paraphrasing.
- source_word: וְלֹא חָלוּ בָהּ יָדָיִם
  chosen: though no hands labored against her
  alternatives:
  - and no hands were wrung over her
  - and no hands fell upon her
  - without hands being turned against her
  lexicon: HALOT
  rationale: The clause is difficult. The verb חלו can mean 'be weak/sick,' but in some contexts with hands it can suggest toil, exertion, or writhing. In this comparison with Sodom's sudden overthrow, the sense is likely that no prolonged human action or siege was brought against Sodom, unlike Jerusalem. 'No hands labored against her' best fits the contrast, while preserving the obscurity in a restrained way.
