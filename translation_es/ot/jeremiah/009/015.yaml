revisions:
- from: Y los dispersaré entre las naciones que ni ellos ni sus padres conocieron[a], y enviaré tras ellos la espada[b] hasta acabar con ellos[c].
  to: Y los dispersaré entre las naciones que ni ellos ni sus padres conocieron[a], y enviaré tras ellos la espada[b] hasta consumirlos[c].
  rationale: Se ajusta únicamente la cláusula final para alinearla con la decisión léxica principal del inglés POB y con el valor de כלה en contexto de juicio. «Consumirlos» preserva mejor la fuerza de ‘bring to an end/consume’ que el audit trail priorizó, mientras que «acabar con ellos» y «destruirlos» quedan como alternativas válidas en nota.
  reviewer_model: gpt-5.4
