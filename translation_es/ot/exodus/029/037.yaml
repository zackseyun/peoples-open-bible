translation:
  language: es
  text: Por siete días harás expiación por el altar y lo consagrarás[a]; y el altar será santísimo. Todo lo que toque el altar quedará santo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Todo el que toque el altar quedará santo». El hebreo puede entenderse ya sea como una santidad comunicada por contacto, o como una exigencia de que sólo lo santo toque el altar.'
    reason: alternative_reading
lexical_decisions:
- source_word: תְּכַפֵּר
  english_pob_choice: make atonement
  chosen_spanish: harás expiación
  alternatives_spanish:
  - harás atonamiento
  - purificarás ritualmente
  lexicon: HALOT
  rationale: En contexto ritual sacerdotal, כפר señala la realización de un rito de expiación/purificación. «Harás expiación» conserva la fuerza cultual del término sin reducirlo a una paráfrasis moralista.
- source_word: עַל הַמִּזְבֵּחַ
  english_pob_choice: for the altar
  chosen_spanish: por el altar
  alternatives_spanish:
  - sobre el altar
  - para el altar
  lexicon: HALOT
  rationale: Con כפר, עַל puede marcar el objeto en favor del cual se realiza la expiación. «Por el altar» refleja bien ese valor idiomático en español y evita sugerir solamente localización física.
- source_word: וְקִדַּשְׁתָּ אֹתוֹ
  english_pob_choice: and consecrate it
  chosen_spanish: y lo consagrarás
  alternatives_spanish:
  - y lo santificarás
  - y lo harás santo
  lexicon: HALOT
  rationale: «Consagrar» comunica de manera natural la dedicación cultual del altar. «Santificar» es posible, pero en español suena más eclesiástico; «hacerlo santo» es exacto pero menos idiomático.
- source_word: קֹדֶשׁ קָדָשִׁים
  english_pob_choice: most holy
  chosen_spanish: santísimo
  alternatives_spanish:
  - santo de los santos
  - sumamente santo
  lexicon: HALOT
  rationale: La construcción hebrea es superlativa. «Santísimo» es una forma breve, digna y fiel en español bíblico para el grado máximo de santidad de un objeto culto.
- source_word: כָּל הַנֹּגֵעַ
  english_pob_choice: Whatever touches
  chosen_spanish: Todo lo que toque
  alternatives_spanish:
  - Todo el que toque
  - Cualquiera que toque
  lexicon: HALOT
  rationale: El participio con כָּל es amplio y puede incluir persona o cosa. «Todo lo que toque» mantiene esa amplitud mejor que restringirlo desde el inicio sólo a personas.
- source_word: יִקְדָּשׁ
  english_pob_choice: shall become holy
  chosen_spanish: será santo
  alternatives_spanish:
  - se hará santo
  - será consagrado
  lexicon: HALOT
  rationale: El verbo comunica un estado resultante por contacto. «Será santo» conserva esa inmediatez en español y evita forzar una explicación interpretativa en el cuerpo del versículo.
theological_decisions:
- issue: Holiness imparted by contact with the altar
  english_pob_reading: Contact with the consecrated altar communicates holiness to what touches it.
  chosen_spanish_reading: El contacto con el altar consagrado comunica santidad a lo que lo toca.
  alternative_spanish_readings:
  - Sólo lo santo puede tocarlo sin riesgo.
  - Quien lo toque debe ser ya santo.
  rationale: El hebreo permite entender que la santidad se transmite por contacto, no sólo que el tocante deba estar previamente santificado. La traducción principal mantiene esa tensión ritual sin resolverla de antemano.
  doctrine_reference: Preservar la tensión teológica sin armonizarla prematuramente
translation_notes:
  revision_awareness: El texto sigue de cerca la decisión inglesa revisada más reciente (gpt-5.4), sin cambios sustantivos respecto del criterio de alta concordancia. Se conserva la ambigüedad teológica sobre la santidad por contacto, y en español se mantiene el mismo alcance amplio del participio.
  spanish_consistency_notes:
  - Se usa «Yahvé» según el criterio general del proyecto sólo cuando el Tetragrámaton aparece explícitamente; aquí no aparece.
  - Se mantiene «santísimo» para קֹדֶשׁ קָדָשִׁים, coherente con el uso cultual del superlativo en español bíblico.
  - Se evita «señor» o «santificar» por defecto para no desplazar el valor ritual específico del pasaje.
