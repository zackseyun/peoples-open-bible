translation:
  text: Dragging him by the tendons with their iron hands[a], the leopard-like beasts stripped away all his flesh, even to his beard, and the skin of his head; but as he endured this grievous pain steadfastly, he said[d][c][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'from the sinews.' The Greek term refers to tendons or sinews, emphasizing that the tearing began deep in the body's connective tissue.
    reason: lexical_alternative
  - marker: b
    text: Literally 'with iron hands.' The phrase may describe metal implements or intensify the image of the beasts' tearing power, but the Greek wording itself is retained in the translation.
    reason: lexical_alternative
  - marker: c
    text: Or 'the leopards' if the adjective is taken more concretely. The Greek more literally says 'the leopard-like beasts.'
    reason: lexical_alternative
  - marker: d
    text: Or 'the scalp.' The Greek says more literally 'the skin of his head.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ τῶν τενόντων
  lemma: ἀπό
  chosen: from the tendons
  alternatives:
  - from the sinews
  - starting at the sinews
  lexicon: LSJ
  rationale: τένων denotes a tendon or sinew. The preposition ἀπό marks the point from which the tearing begins. 'Tendons' is clear modern English while preserving the gruesome anatomical detail.
- source_word: ταῖς σιδηραῖς χερσὶν
  chosen: with their iron hands
  alternatives:
  - with iron claws
  - with iron grips
  lexicon: LSJ
  rationale: χείρ literally means 'hand.' Although the phrase may evoke metal instruments or beastly paws, the Greek says 'iron hands.' Retaining the literal image preserves the vividness and avoids over-interpreting the metaphor.
- source_word: ἐπισπασάμενοι
  chosen: pulling at him
  alternatives:
  - dragging away
  - tearing by pulling
  lexicon: LSJ
  rationale: The participle conveys drawing or pulling upon something. 'Pulling at him' fits the syntax with the following description of flesh being stripped away.
- source_word: μέχρι γε τῶν γενείων
  chosen: even to his beard
  alternatives:
  - as far as the beard
  - down to the beard
  lexicon: LSJ
  rationale: γενεῖον refers to the chin/beard area. 'Even to his beard' communicates extent in idiomatic English and preserves the emphatic γε.
- source_word: τὴν σάρκα πᾶσαν
  chosen: all his flesh
  alternatives:
  - his whole flesh
  - all the flesh
  lexicon: LSJ
  rationale: σάρξ here is literal, not metaphorical. 'All his flesh' is the most natural rendering and keeps the brutality of the scene.
- source_word: τὴν τῆς κεφαλῆς δορὰν
  chosen: the skin of his head
  alternatives:
  - the hide of his head
  - the scalp
  lexicon: LSJ
  rationale: δορά is literally skin or hide. 'Scalp' is possible, but 'the skin of his head' stays closer to the Greek and avoids sounding too clinical or interpretively narrowed.
- source_word: οἱ παρδάλιοι θῆρες
  chosen: the leopard-like beasts
  alternatives:
  - the leopards
  - the panther-like beasts
  lexicon: LSJ
  rationale: παρδάλιος is adjectival, 'leopard-like' or 'spotted like a leopard,' modifying θῆρες. Rendering it adjectivally respects the Greek form better than simply 'leopards,' while still conveying the animals involved.
- source_word: ἀπέσυραν
  chosen: stripped away
  alternatives:
  - dragged off
  - tore away
  lexicon: LSJ
  rationale: The verb means to draw off or drag away. In context of flesh and skin being removed, 'stripped away' communicates the result vividly and idiomatically.
- source_word: βαρέως
  chosen: bravely
  alternatives:
  - with difficulty
  - heavily
  - painfully
  lexicon: LSJ
  rationale: The adverb can suggest grievously or heavily, but in this context modifying καρτερῶν ('enduring steadfastly'), the sense is that he bore a severe pain with fortitude. 'Bravely' brings out the manner of endurance in readable English, though the severity is also retained by 'this pain.'
- source_word: τὴν ἀλγηδόνα
  chosen: this pain
  alternatives:
  - this agony
  - this suffering
  lexicon: LSJ
  rationale: ἀλγηδών denotes pain or anguish. 'Pain' is the broad, direct choice; 'this' reflects ταύτην.
- source_word: καρτερῶν
  chosen: as he endured
  alternatives:
  - enduring steadfastly
  - bearing firmly
  lexicon: LSJ
  rationale: καρτερέω conveys steadfast endurance. 'As he endured' is natural English and preserves the durative force before his speech.
