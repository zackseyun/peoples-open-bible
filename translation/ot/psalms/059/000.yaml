  from: when Saul sent men and they watched the house
  to: when Saul sent men, and they watched the house
  rationale: The Hebrew structure consists of a temporal clause (בִּשְׁלֹחַ שָׁאוּל, 'when Saul sent') followed by a consecutive main clause (וַיִּשְׁמְרוּ, 'and they watched'). The current English rendering, without a comma, can be read as a single 'when' clause with a compound predicate. This is slightly awkward because the object of the first verb ('men') is the subject of the second ('they'). Adding a comma after 'men' clarifies that 'and they watched the house' is the main clause, following the introductory temporal phrase. This small change improves readability and more accurately reflects the grammatical relationship between the clauses in the source text.
