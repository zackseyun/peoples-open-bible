- from: 'Midió el lado sur: quinientas cañas, según la caña de medir[a].'
  to: 'Midió el lado sur: quinientas cañas con la caña de medir[a].'
  rationale: 'Se ajusta el complemento final para reflejar mejor el uso instrumental de ב en בִּקְנֵה הַמִּדָּה y para lograr un español más natural: «con la caña de medir» comunica con claridad que esa fue la vara usada para medir, sin alterar el sentido base ni la nota textual.'
