  revision_rationale: Se conserva la fidelidad al hebreo y al audit trail inglés, pero se reemplaza «liberación» por «salvación» para una formulación más idiomática y digna en español bíblico. La nota se normaliza y mantiene las alternativas semánticas importantes.
