translation:
  language: es
  text: Y cuando llegó a ser rey[a], derribó a toda la casa de Jeroboam. No dejó a Jeroboam un solo ser viviente[b], hasta destruirlo, conforme a la palabra de Yahvé, que había hablado por medio de su siervo Ahías, el silonita.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «al comenzar a reinar». La expresión hebrea introduce el inicio del reinado.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «ningún aliento»; es decir, no dejó a nadie con vida.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כְמָלְכוֹ
  english_pob_choice: And when he became king
  chosen_spanish: Y cuando llegó a ser rey
  alternatives_spanish:
  - Y cuando comenzó a reinar
  - Y cuando fue rey
  lexicon: HALOT
  rationale: La fórmula narrativa temporal se vierte de modo natural en español como una subordinada temporal. 'Llegó a ser rey' conserva el inicio del reinado sin forzar un calco demasiado duro.
- source_word: הִכָּה
  english_pob_choice: he struck down
  chosen_spanish: golpeó
  alternatives_spanish:
  - hirió
  - derribó
  - mató
  lexicon: HALOT
  rationale: En este contexto de eliminación dinástica, el verbo hebreo expresa violencia letal. 'Golpeó' mantiene la imagen básica del golpe/smite sin añadir más especificación de la que el hebreo exige por sí solo; el contexto da la implicación de muerte.
- source_word: אֶת כָּל בֵּית יָרָבְעָם
  english_pob_choice: all the house of Jeroboam
  chosen_spanish: a toda la casa de Jeroboam
  alternatives_spanish:
  - a toda la casa de Jeroboam
  - a toda la dinastía de Jeroboam
  - a todo el linaje de Jeroboam
  lexicon: HALOT
  rationale: '''Casa'' conserva el valor político-dinástico del hebreo en contexto real. ''Dinastía'' o ''linaje'' explicitan el sentido, pero ''casa'' es más fiel al giro bíblico y sigue siendo claro en español.'
- source_word: לֹא הִשְׁאִיר כָּל נְשָׁמָה
  english_pob_choice: He did not leave ... a single living thing
  chosen_spanish: No dejó ... un solo ser viviente
  alternatives_spanish:
  - No dejó ... una sola aliento
  - No dejó ... ninguna vida
  - No dejó ... un solo aliento
  lexicon: HALOT
  rationale: נְשָׁמָה remite literalmente a 'aliento/respiración', pero el uso idiomático indica que no quedó sobreviviente. Siguiendo la revisión inglesa que optó por una forma más natural, 'ser viviente' comunica el resultado sin perder la fuerza de exterminio.
- source_word: לְיָרָבְעָם
  english_pob_choice: to Jeroboam
  chosen_spanish: a Jeroboam
  alternatives_spanish:
  - para Jeroboam
  - de Jeroboam
  - perteneciente a Jeroboam
  lexicon: HALOT
  rationale: La preposición expresa relación o pertenencia del remanente respecto de Jeroboam; en español, 'a Jeroboam' conserva la construcción sin sobrecargarla.
- source_word: עַד הִשְׁמִידוֹ
  english_pob_choice: until he had destroyed him
  chosen_spanish: hasta destruirlo
  alternatives_spanish:
  - hasta que lo destruyó
  - hasta haberlo destruido
  - hasta exterminarlo
  lexicon: HALOT
  rationale: La forma verbal encaja bien en español con un infinitivo final-temporal. El objeto singular mantiene la correspondencia formal con el hebreo, aunque el referente colectivo sea la casa de Jeroboam.
- source_word: כִּדְבַר יְהוָה
  english_pob_choice: according to the word of Yahweh
  chosen_spanish: conforme a la palabra de Yahvé
  alternatives_spanish:
  - según la palabra de Yahvé
  - de acuerdo con la palabra de Yahvé
  lexicon: HALOT
  rationale: '''Conforme a'' reproduce bien el valor de cumplimiento del giro profético. Se usa ''Yahvé'' conforme al estándar del proyecto para יהוה.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - YHWH
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino en forma transliterada estándar del proyecto, evitando la sustitución tradicional por un título.
- source_word: בְּיַד עַבְדּוֹ
  english_pob_choice: by the hand of his servant
  chosen_spanish: por medio de su siervo
  alternatives_spanish:
  - por la mano de su siervo
  - mediante su siervo
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula de mediación profética. En español, 'por medio de' comunica esa mediación de modo claro y digno; 'por la mano de' sería más literal pero menos natural.
- source_word: אֲחִיָּה הַשִּׁילֹנִי
  english_pob_choice: Ahijah the Shilonite
  chosen_spanish: Ahías, el silonita
  alternatives_spanish:
  - Ahías de Siló
  - Ahías el shilonita
  lexicon: HALOT
  rationale: Los nombres propios se adaptan a la forma española habitual ('Ahías'). 'Silonita' conserva el gentilicio tradicional del lugar, equivalente al inglés 'Shilonite'.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - YHWH
  rationale: El texto hebreo contiene el Tetragrama. Se mantiene el nombre propio divino en transliteración, en línea con la directriz del proyecto y con el audit trail inglés que evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de la cláusula negativa con נְשָׁמָה
  english_pob_reading: a single living thing
  chosen_spanish_reading: un solo ser viviente
  alternative_spanish_readings:
  - un solo aliento
  - ningún sobreviviente
  - un solo viviente
  rationale: El hebreo literalmente alude al aliento/respiración, pero el sentido en contexto es que no quedó nadie vivo. Se elige una formulación idiomática que preserva el resultado sin perder la severidad del juicio.
  doctrine_reference: Lexical sense in context; supported by English audit note on no living survivor
- issue: Referencia colectiva o singular de 'lo destruyó'
  english_pob_reading: until he had destroyed him
  chosen_spanish_reading: hasta destruirlo
  alternative_spanish_readings:
  - hasta destruirla
  - hasta destruir a la casa
  rationale: Se conserva el singular pronominal del hebreo y del audit trail inglés, aun cuando el referente sea colectivo. Esto evita borrar la tensión entre la forma gramatical y el sentido de la dinastía como conjunto.
  doctrine_reference: Lexical/grammatical tension in the source text
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que prefirió una formulación más natural para נְשָׁמָה ('a single living thing') sin perder el sentido de ausencia total de sobrevivientes. La versión española sigue esa decisión de naturalidad controlada, manteniendo además la referencia colectiva/singular en 'lo destruyó' y la mediación profética 'por medio de su siervo'.
  spanish_consistency_notes:
  - Se usó 'Yahvé' para יהוה, de acuerdo con el estándar del proyecto.
  - Se conservó 'casa' para el ámbito dinástico de Jeroboam.
  - '''Silonita'' funciona como equivalente español de ''the Shilonite'' y evita la transliteración innecesaria.'
  - La nota del pie b recupera la imagen literal de 'aliento' para no borrar la tensión léxica de נְשָׁמָה.
