translation:
  language: es
  text: Fuiste llamado por el nombre honrado[a], el nombre llamado sobre Israel; acumulaste oro como hierro, y multiplicaste la plata como plomo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el nombre llamado sobre Israel». El hebreo puede expresar un nombre invocado sobre, perteneciente a, o reposando sobre alguien; el paralelo griego también apoya este sentido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נקראת בשם הנכבד
  english_pob_choice: You were called by the honored name
  chosen_spanish: Con el nombre honrado
  alternatives_spanish:
  - Con el nombre glorioso
  - Con el nombre noble
  lexicon: HALOT
  rationale: El hebreo combina la pasiva de נקראת con בשם, un giro que en español puede expresarse de modo natural como ‘con el nombre’. הנכבד apunta a una cualidad de honor/peso/dignidad; ‘honrado’ conserva esa resonancia sin sobrerreligiosizarlo.
- source_word: הנקרא על ישראל
  english_pob_choice: the one called over Israel
  chosen_spanish: el que fue llamado sobre Israel
  alternatives_spanish:
  - el que es llamado sobre Israel
  - el nombre puesto sobre Israel
  lexicon: HALOT
  rationale: Se conserva el valor del verbo repetido ‘llamar’ y la imagen idiomática de un nombre que recae ‘sobre’ alguien. ‘Fue llamado sobre Israel’ mantiene la tensión del hebreo y del paralelo griego sin convertirlo en una paráfrasis explicativa.
- source_word: ותצבר
  english_pob_choice: and you amassed
  chosen_spanish: y amontonaste
  alternatives_spanish:
  - y acumulaste
  - y juntaste
  lexicon: HALOT
  rationale: El verbo expresa reunir/ amasar bienes. ‘Amontonaste’ reproduce mejor la imagen poética de acumulación masiva que ‘acumulaste’, y mantiene el paralelismo con los metales del verso.
- source_word: כברזל זהב
  english_pob_choice: gold like iron
  chosen_spanish: oro como hierro
  alternatives_spanish:
  - oro como si fuera hierro
  - oro como el hierro
  lexicon: HALOT
  rationale: 'La comparación subraya abundancia: el oro llegó a ser tan común como el hierro. En español, ‘oro como hierro’ conserva la concisión del símil y su fuerza poética.'
- source_word: וכעפרת הרבית כסף
  english_pob_choice: and multiplied silver like lead
  chosen_spanish: y multiplicaste la plata como plomo
  alternatives_spanish:
  - y aumentaste la plata como plomo
  - y hiciste abundante la plata como plomo
  lexicon: HALOT
  rationale: עפרת se entiende aquí como ‘plomo’, confirmado por el paralelo griego μόλιβος. ‘Multiplicaste’ mantiene el verbo de aumento y el paralelismo con la primera mitad del verso.
theological_decisions:
- issue: Sentido del 'nombre honrado' y del nombre 'sobre Israel'
  english_pob_reading: The phrase refers to the divine name associated with Israel and called over Solomon/Israel, without specifying more than the text states.
  chosen_spanish_reading: La traducción conserva la referencia al nombre divino asociado con Israel, sin precisar más allá de lo que el verso afirma.
  alternative_spanish_readings:
  - Referencia directa al nombre de Yahvé puesto sobre Salomón
  - Afirmación más amplia de la identidad pactal de Israel
  rationale: El hebreo y el griego sostienen la alusión a un nombre divino vinculado con Israel, pero no explicitan el mecanismo teológico. En español conviene preservar esa ambigüedad reverente en vez de resolverla con una explicación doctrinal que el texto no da.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: se prefirió mantener el verbo ‘called over Israel’ como correspondencia más cercana del hebreo repetido, y en español se conservó la misma relación literal (‘llamado sobre Israel’) sin introducir interpretaciones adicionales.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto lo exija expresamente; en este versículo el foco está en el ‘nombre’ asociado con Israel, por lo que no se reemplaza el giro por una glosa teológica más explícita.
  - Se eligió ‘plomo’ para עפרת en conformidad con el paralelo griego μόλιβος y la decisión inglesa auditada.
  - El paralelismo poético de oro/hierro y plata/plomo se mantiene con sintaxis breve y simétrica.
