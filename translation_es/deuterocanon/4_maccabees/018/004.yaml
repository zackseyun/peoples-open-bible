translation:
  language: es
  text: Y por causa de ellos la nación estaba en paz[a], y, habiendo renovado el buen orden en la patria, ha sitiado por completo a los enemigos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por medio de ellos»; el griego puede expresar causalidad o mediación.
    reason: alternative_reading
  - marker: b
    text: El verbo griego detrás de «ha sitiado por completo» es intensivo y está formado sobre la idea de «asediar»; también puede entenderse más literalmente como «ha sitiado por completo a los enemigos».
    reason: lexical_alternative
lexical_decisions:
- source_word: διʼ αὐτοὺς
  english_pob_choice: because of them
  chosen_spanish: por causa de ellos
  alternatives_spanish:
  - por medio de ellos
  - a causa de ellos
  lexicon: LSJ
  rationale: διά con acusativo expresa causalidad o mediación. «Por causa de ellos» conserva la fuerza causal del griego sin forzar una lectura exclusivamente instrumental.
- source_word: εἰρήνευσεν
  english_pob_choice: was at peace
  chosen_spanish: estaba en paz
  alternatives_spanish:
  - hizo la paz
  - gozaba de paz
  lexicon: LSJ
  rationale: Con τὸ ἔθνος como sujeto, el español natural es «estaba en paz»; refleja un estado de paz sin añadir la idea más específica de un tratado o acuerdo diplomático.
- source_word: τὸ ἔθνος
  english_pob_choice: the nation
  chosen_spanish: la nación
  alternatives_spanish:
  - el pueblo
  - el pueblo de Israel
  lexicon: LSJ
  rationale: «Nación» preserva el sentido colectivo-político del griego en este contexto, como en la solución inglesa.
- source_word: εὐνομίαν
  english_pob_choice: the good order
  chosen_spanish: el buen orden
  alternatives_spanish:
  - la buena ley
  - la legalidad
  lexicon: LSJ
  rationale: εὐνομία implica buen orden bajo una ley recta. «Buen orden» es natural en español y conserva la amplitud del término sin reducirlo solo a legalidad abstracta.
- source_word: τὴν ἐπὶ τῆς πατρίδος
  english_pob_choice: in the homeland
  chosen_spanish: en la patria
  alternatives_spanish:
  - en la tierra հայրial
  - sobre la patria
  lexicon: LSJ
  rationale: πατρίς tiene carga de patria ancestral o tierra propia. «Patria» comunica bien ese matiz en español bíblico actual; «en la patria» mantiene el valor locativo del sintagma.
- source_word: ἀνανεωσάμενος
  english_pob_choice: having renewed
  chosen_spanish: habiendo renovado
  alternatives_spanish:
  - renovando
  - restaurando
  lexicon: LSJ
  rationale: 'El participio aoristo se vierte mejor con una construcción de anterioridad: «habiendo renovado». Mantiene la relación entre la renovación del orden y la acción militar siguiente.'
- source_word: ἐκπεπολιόρκηκε
  english_pob_choice: has besieged completely
  chosen_spanish: ha cercado por completo
  alternatives_spanish:
  - ha sitiado por completo
  - ha sitiado hasta el extremo
  lexicon: LSJ
  rationale: El verbo intensivo derivado de πολιορκέω conserva la imagen de cerco/sitio. En español, «ha cercado por completo» comunica esa intensidad con naturalidad y evita introducir la idea de expulsión que el griego no exige literalmente.
- source_word: τοὺς πολεμίους
  english_pob_choice: the enemies
  chosen_spanish: a los enemigos
  alternatives_spanish:
  - a los adversarios
  - a los hostiles
  lexicon: LSJ
  rationale: «Enemigos» es el equivalente directo y más claro en contexto bélico.
theological_decisions:
- issue: Relación causal de los mártires con la paz nacional
  english_pob_reading: The verse states that peace and restored order came because of them, without specifying a full doctrine of atonement in this verse itself.
  chosen_spanish_reading: El verso afirma que la nación estuvo en paz por causa de ellos, sin desarrollar aquí una doctrina completa de expiación o mérito sacrificial.
  alternative_spanish_readings:
  - La paz vino mediante ellos
  - La paz vino por sus méritos
  rationale: El griego afirma una causalidad real. La traducción debe conservar esa afirmación sin importar una teología más amplia desde el contexto cercano en esta sola línea.
  doctrine_reference: Preservar la tensión teológica sin resolverla
- issue: Matiz de ἐκπεπολιόρκηκε en el resultado militar
  english_pob_reading: The final clause preserves siege imagery and resultative force.
  chosen_spanish_reading: La clausula final conserva la imagen de sitio/cerco y su fuerza resultativa.
  alternative_spanish_readings:
  - ha derrotado del todo a los enemigos
  - ha expulsado del todo a los enemigos
  rationale: El verbo griego no dice simplemente «expulsar»; mantiene la imagen de asedio. «Cercar por completo» preserva mejor esa imagen en español.
  doctrine_reference: Fidelidad al valor aspectual y metafórico del verbo
translation_notes:
  revision_awareness: El audit trail inglés revisó la cláusula final desde una formulación más interpretativa hacia otra más cercana a «has besieged the enemies completely». Por eso el español evita tanto «expulsó» como una paráfrasis demasiado fuerte, y conserva la imagen de cerco con valor resultativo.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general, pero este versículo no lo contiene.
  - Se prefiere «nación» para τὸ ἔθνος y «patria» para πατρίς, en coherencia con el registro histórico-político del pasaje.
  - Se mantiene «buen orden» para εὐνομία, evitando términos eclesiásticos que oscurecerían el matiz cívico.
  - La puntuación reproduce dos miembros coordinados con participio circunstancial, de manera natural en español bíblico moderno.
