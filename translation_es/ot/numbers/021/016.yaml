translation:
  language: es
  text: 'Y de allí fueron a Beer[a]. Este es el pozo[b] acerca del cual Yahvé dijo a Moisés: «Reúne al pueblo, y yo les daré agua».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Beer es el nombre del lugar; en hebreo, el nombre suena como la palabra para «pozo».
    reason: cultural_note
  - marker: b
    text: 'O: «el pozo del cual Yahvé dijo a Moisés».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִשָּׁם
  english_pob_choice: And from there
  chosen_spanish: Y de allí
  alternatives_spanish:
  - Y desde allí
  - De allí
  lexicon: HALOT
  rationale: La secuencia narrativa pide una continuación con valor de movimiento; «de allí» conserva el origen del desplazamiento y el «Y» refleja la conexión discursiva del hebreo.
- source_word: בְּאֵרָה
  english_pob_choice: Beer
  chosen_spanish: Beer
  alternatives_spanish:
  - Beera
  - Bera
  lexicon: HALOT
  rationale: Se mantiene como nombre propio del lugar, siguiendo la decisión del POB inglés de transliterar el topónimo.
- source_word: הִוא הַבְּאֵר
  english_pob_choice: That is the well
  chosen_spanish: Esta es la fuente
  alternatives_spanish:
  - Este es el pozo
  - Es el pozo
  lexicon: HALOT
  rationale: La cláusula identificativa expresa que el topónimo remite a un manantial/pozo. «Fuente» preserva la referencia a agua y evita una rigidez innecesaria; «pozo» queda como alternativa posible si se prefiere el equivalente más directo.
- source_word: אֲשֶׁר אָמַר יְהוָה לְמֹשֶׁה
  english_pob_choice: about which Yahweh said to Moses
  chosen_spanish: acerca de la cual Yahvé dijo a Moisés
  alternatives_spanish:
  - sobre la cual Yahvé dijo a Moisés
  - de la cual Yahvé dijo a Moisés
  lexicon: HALOT
  rationale: El relativo introduce una explicación del lugar/pozo. «Acerca de la cual» reproduce con naturalidad la relación discursiva y mantiene la referencia a la palabra divina sin forzar una construcción más literal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el principio del proyecto de renderizar el Tetragrámaton con el nombre divino «Yahvé», preservando la distinción frente a un título sustituto.
- source_word: אֱסֹף
  english_pob_choice: Gather
  chosen_spanish: Reúne
  alternatives_spanish:
  - Junta
  - Convoca
  lexicon: HALOT
  rationale: El imperativo a Moisés pide congregar al pueblo. «Reúne» es claro, digno y natural en español, y conserva el valor directivo del hebreo.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo de Israel
  - a la gente
  lexicon: HALOT
  rationale: En este contexto narrativo, «el pueblo» designa colectivamente a Israel; el complemento con «a» refleja el objeto del imperativo.
- source_word: וְאֶתְּנָה לָהֶם מָיִם
  english_pob_choice: and I will give them water
  chosen_spanish: y yo les daré agua
  alternatives_spanish:
  - y les daré agua
  - y daré agua a ellos
  lexicon: HALOT
  rationale: La cohortativa divina se vierte de modo natural como promesa/intención en primera persona. «Yo» explicita el sujeto, y «les daré agua» conserva el contenido directo sin ampliar el sentido.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio del pacto en vez de sustituirlo por un título. Esto mantiene la coherencia con el criterio del POB inglés y con la directriz del proyecto en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Naturaleza de la cláusula identificativa «הִוא הַבְּאֵר»
  english_pob_reading: That is the well
  chosen_spanish_reading: Esta es la fuente
  alternative_spanish_readings:
  - Este es el pozo
  - Es el pozo
  rationale: El hebreo identifica el lugar como una fuente/pozo asociado al nombre Beer. «Fuente» conserva el vínculo con agua y evita que en español «pozo» sugiera exclusivamente una excavación; aun así, se deja registrada la alternativa directa.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se requieren cambios sustantivos respecto del sentido hebreo ni del tratamiento del nombre divino. La única tensión relevante es la elección española entre «fuente» y «pozo», registrada en la nota.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se mantiene el nombre propio «Beer» en transliteración.
  - «Pueblo» traduce הָעָם en sentido colectivo.
  - 'La promesa divina se mantiene en primera persona: «yo les daré agua».'
