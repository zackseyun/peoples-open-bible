translation:
  language: es
  text: Mi pie se ha aferrado a sus pasos[a]; he guardado su camino y no me he desviado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mi pie ha asido su paso». La imagen hebrea es la de una adhesión estrecha a las huellas de Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּאֲשֻׁרוֹ
  english_pob_choice: to his steps
  chosen_spanish: en sus pasos
  alternatives_spanish:
  - a sus pasos
  - sobre sus huellas
  - en su senda
  lexicon: HALOT
  rationale: El sustantivo אֲשׁוּר se refiere a un paso o pisada. En español, «en sus pasos» conserva la imagen de seguimiento cercano sin sonar forzado. Mantuve el plural, como en la decisión inglesa, porque expresa mejor la continuidad de la metáfora.
- source_word: אָחֲזָה
  english_pob_choice: has held fast
  chosen_spanish: ha quedado firme
  alternatives_spanish:
  - se ha aferrado
  - ha asido con firmeza
  - ha sujetado
  lexicon: HALOT
  rationale: אָחַז significa «asir, agarrar, sostener». En el contexto del pie y los pasos, la idea es de adherencia estable, no de captura violenta. «Ha quedado firme» transmite la permanencia del apoyo y la fidelidad de la imagen con naturalidad en español.
- source_word: רַגְלִי
  english_pob_choice: My foot
  chosen_spanish: Mi pie
  alternatives_spanish:
  - Mis pies
  lexicon: HALOT
  rationale: El hebreo está en singular; se conserva el singular para mantener la imagen concreta de un pie que pisa tras la huella.
- source_word: דַּרְכּוֹ
  english_pob_choice: his way
  chosen_spanish: su camino
  alternatives_spanish:
  - su senda
  - su ruta
  - su andar
  lexicon: HALOT
  rationale: דֶּרֶךְ suele significar «camino» o «senda», también en sentido moral. «Su camino» es natural en español y preserva tanto el sentido literal como el ético.
- source_word: שָׁמַרְתִּי
  english_pob_choice: I have kept
  chosen_spanish: he guardado
  alternatives_spanish:
  - he observado
  - he vigilado
  - he conservado
  lexicon: HALOT
  rationale: שָׁמַר abarca «guardar, observar, vigilar». Con «su camino», «he guardado» comunica fidelidad continua y cuidado atento, sin perder el matiz de observancia.
- source_word: וְלֹא
  english_pob_choice: and have not
  chosen_spanish: y no me he
  alternatives_spanish:
  - y no he
  - y no me aparté
  lexicon: HALOT
  rationale: La conjunción une estrechamente la cláusula final con los perfectos anteriores. En español, «y no me he desviado» mantiene la secuencia verbal y la relación lógica del hebreo.
- source_word: אָט
  english_pob_choice: turned aside
  chosen_spanish: me he desviado
  alternatives_spanish:
  - me he apartado
  - me he torcido
  - me he desviado de
  lexicon: HALOT
  rationale: El verbo נטה en hifil expresa apartarse o desviarse de un camino. «Desviado» refleja bien la metáfora de camino y conserva el contraste con «guardar su camino».
theological_decisions:
- issue: Referente del sufijo de tercera persona masculina singular en «sus pasos» y «su camino»
  english_pob_reading: God is the referent.
  chosen_spanish_reading: Dios es el referente.
  alternative_spanish_readings:
  - un camino justo impersonal
  - la senda de una vida recta
  rationale: En el contexto inmediato (Job 23:10-12), Job habla de su relación con Dios y de su integridad ante él. Traducir con posesivos de tercera persona sin aclaración preserva esa referencia personal sin añadir interpretación extra.
  doctrine_reference: Job 23:10-12; la fidelidad/integridad de Job ante Dios
translation_notes:
  revision_awareness: El texto inglés auditado no requirió revisiones posteriores; la versión española sigue de cerca la decisión confirmada de mantener la imagen de proximidad a las huellas de Dios, con una formulación natural en español.
  spanish_consistency_notes:
  - Se mantuvo el singular «mi pie» para respetar el hebreo.
  - Se tradujo el verbo final con un reflexivo natural en español («me he desviado») para expresar el sentido de apartarse del camino.
  - Se conservó la referencia pronominal a Dios mediante los posesivos «sus»/«su», en continuidad con el análisis auditado en inglés.
