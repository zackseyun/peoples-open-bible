translation:
  language: es
  text: ¡Cómo se ha oscurecido el oro, cómo ha cambiado el oro fino! Las piedras santas[a] son derramadas en la cabeza[b] de cada calle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «las piedras sagradas» o «las piedras del santuario». El hebreo puede referirse a piedras del templo consagradas o a piedras preciosas en imagen poética.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «en la cabeza de cada calle»; esto puede referirse a las esquinas o a las entradas de las calles.
    reason: cultural_note
lexical_decisions:
- source_word: אֵיכָה
  english_pob_choice: How
  chosen_spanish: ¡Cómo!
  alternatives_spanish:
  - ¡Ay, cómo!
  - ¿Cómo?
  lexicon: HALOT
  rationale: La partícula introduce una exclamación de lamento. En español, «¡Cómo!» conserva el tono elegíaco sin volver la línea explicativa.
- source_word: יוּעַם
  english_pob_choice: has grown dim
  chosen_spanish: se ha oscurecido
  alternatives_spanish:
  - se ha apagado
  - se ha ennegrecido
  lexicon: HALOT
  rationale: El hebreo expresa que el oro pierde su brillo. «Se ha oscurecido» comunica bien la pérdida de resplandor en español y mantiene la imagen poética.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: el oro
  alternatives_spanish:
  - oro
  - el dorado
  lexicon: HALOT
  rationale: Equivale de manera directa a זָהָב y preserva la referencia material de la imagen.
- source_word: יִשְׁנֶא
  english_pob_choice: has changed
  chosen_spanish: se ha cambiado
  alternatives_spanish:
  - ha cambiado
  - se ha alterado
  lexicon: HALOT
  rationale: La forma verbal expresa cambio de estado o apariencia. «Se ha cambiado» mantiene la idea de alteración visible y suena natural en paralelo con «se ha oscurecido».
- source_word: הַכֶּתֶם הַטּוֹב
  english_pob_choice: the fine gold
  chosen_spanish: el oro puro
  alternatives_spanish:
  - el oro fino
  - el mejor oro
  lexicon: HALOT
  rationale: כֶּתֶם הַטּוֹב intensifica la calidad del oro. «Oro puro» conserva la elevación poética y la noción de metal refinado, sin perder claridad en español.
- source_word: תִּשְׁתַּפֵּכְנָה
  english_pob_choice: are poured out
  chosen_spanish: se derraman
  alternatives_spanish:
  - son derramadas
  - se esparcen
  lexicon: HALOT
  rationale: El hebreo presenta una imagen de derramamiento/vertimiento. «Se derraman» reproduce la pasiva de sentido y la fuerza visual del verbo.
- source_word: אַבְנֵי קֹדֶשׁ
  english_pob_choice: the holy stones
  chosen_spanish: las piedras santas
  alternatives_spanish:
  - las piedras sagradas
  - las piedras del santuario
  lexicon: HALOT
  rationale: La expresión es deliberadamente ambigua en el hebreo. «Piedras santas» conserva la literalidad y la tensión interpretativa, sin decidir si se trata de piedras del templo o de imágenes preciosas consagradas.
- source_word: בְּרֹאשׁ כָּל חוּצוֹת
  english_pob_choice: at the head of every street
  chosen_spanish: al comienzo de todas las calles
  alternatives_spanish:
  - en la esquina de todas las calles
  - a la entrada de todas las calles
  lexicon: HALOT
  rationale: «בְּרֹאשׁ» es literalmente «en/at the head of». En español, «al comienzo de» comunica la ubicación inicial de la calle sin perder la imagen espacial; las otras opciones siguen siendo posibles según el contexto urbano.
theological_decisions:
- issue: Referente de «las piedras santas»
  english_pob_reading: Rendered literally without resolving whether the phrase refers to actual temple stones, consecrated precious stones, or metaphorically to Jerusalem's people.
  chosen_spanish_reading: 'Se mantiene la literalidad ambigua: «las piedras santas».'
  alternative_spanish_readings:
  - las piedras del santuario
  - las piedras sagradas
  - las piedras preciosas consagradas
  rationale: El hebreo permite más de una lectura y el POB inglés preserva esa tensión. La versión española no debe cerrarla prematuramente; por eso se conserva una expresión literal que deja abiertas las opciones históricas y poéticas.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El control de revisión indicado no introdujo cambios; la redacción española sigue de cerca el texto hebreo y conserva la ambigüedad interpretativa documentada en el POB inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este verso no contiene el tetragrámaton.
  - Se eligió un registro poético claro, con exclamación inicial y paralelismo visible entre los dos miembros sobre el oro.
  - Se preserva la ambigüedad de אַבְנֵי קֹדֶשׁ en una nota, en lugar de resolverla en el cuerpo del texto.
  - «Al comienzo de todas las calles» conserva la imagen espacial de בְּרֹאשׁ sin imponer «esquina» o «entrada».
