translation:
  language: es
  text: Pero él fue traspasado[a] por nuestras rebeliones; fue aplastado por nuestras iniquidades; el castigo de nuestra paz[b] estuvo sobre él, y por su herida[c] somos sanados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede significar «herido». El término hebreo puede denotar tanto ser herido como traspasado; se eligió «traspasado» para preservar la violencia concreta de la imagen.
    reason: lexical_alternative
  - marker: b
    text: «Nuestra paz» también puede entenderse como «nuestro bienestar» o «nuestra plenitud».
    reason: lexical_alternative
  - marker: c
    text: O «azote» o «moretón». El sustantivo hebreo es singular.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְחֹלָל
  english_pob_choice: pierced
  chosen_spanish: traspasado
  alternatives_spanish:
  - herido
  - atravesado
  - lacerado
  lexicon: HALOT
  rationale: El hebreo permite la idea de ser herido o perforado; en español, «traspasado» conserva la violencia concreta de la imagen y funciona bien en el paralelismo con «aplastado». Evita debilitar el verbo con un término más general como «herido».
- source_word: מִפְּשָׁעֵינוּ
  english_pob_choice: because of our transgressions
  chosen_spanish: por nuestras rebeliones
  alternatives_spanish:
  - a causa de nuestras rebeliones
  - por nuestros pecados
  - a causa de nuestras transgresiones
  lexicon: HALOT
  rationale: La preposición expresa base causal. «Rebeliones» comunica con claridad el carácter de ruptura voluntaria que implica פשע y evita una repetición demasiado técnica de «transgresiones» en español.
- source_word: מְדֻכָּא
  english_pob_choice: crushed
  chosen_spanish: aplastado
  alternatives_spanish:
  - quebrantado
  - molido
  - triturado
  lexicon: HALOT
  rationale: «Aplastado» reproduce la intensidad de דכא con un verbo natural y fuerte en español moderno. «Quebrantado» sería más tenue y menos físico.
- source_word: מֵעֲוֺנֹתֵינוּ
  english_pob_choice: because of our iniquities
  chosen_spanish: por nuestras iniquidades
  alternatives_spanish:
  - a causa de nuestras iniquidades
  - por nuestras culpas
  - a causa de nuestra culpa
  lexicon: HALOT
  rationale: Se conserva la segunda palabra de culpa distinta de la anterior, manteniendo la diferenciación del hebreo entre פשעים e עוונות. «Iniquidades» refleja el peso moral del término.
- source_word: מוּסַר
  english_pob_choice: chastisement
  chosen_spanish: castigo
  alternatives_spanish:
  - disciplina
  - corrección
  - chastigo
  lexicon: HALOT
  rationale: En este contexto de sufrimiento vicario, «castigo» transmite la fuerza punitiva del sustantivo sin imponer una formulación doctrinal más específica de la que el verso exige. «Disciplina» sonaría demasiado pedagógico o débil.
- source_word: שְׁלוֹמֵנוּ
  english_pob_choice: our peace
  chosen_spanish: nuestra paz
  alternatives_spanish:
  - nuestro bienestar
  - nuestra wholeness
  - nuestra plenitud
  lexicon: HALOT
  rationale: «Paz» es la equivalencia directa y la más natural en español, manteniendo a la vez la amplitud semántica de שָׁלוֹם. El sentido más amplio queda disponible para nota.
- source_word: עָלָיו
  english_pob_choice: was upon him
  chosen_spanish: estuvo sobre él
  alternatives_spanish:
  - recayó sobre él
  - pesó sobre él
  - estaba sobre él
  lexicon: HALOT
  rationale: La expresión conserva el valor idiomático de carga o pena que recae sobre el servidor. «Estuvo sobre él» sigue de cerca el hebreo y su imagen de imposición o gravamen.
- source_word: וּבַחֲבֻרָתוֹ
  english_pob_choice: by his wound
  chosen_spanish: por su herida
  alternatives_spanish:
  - por su llaga
  - por su azote
  - por su golpe
  lexicon: HALOT
  rationale: El sustantivo hebreo es singular y colectivo; «herida» es una forma natural en español que mantiene esa singularidad sin recurrir a un arcaísmo. «Llaga» puede sonar más tradicional pero menos precisa aquí.
- source_word: נִרְפָּא לָנוּ
  english_pob_choice: we are healed
  chosen_spanish: somos sanados
  alternatives_spanish:
  - hemos sido sanados
  - recibimos sanidad
  - quedamos sanados
  lexicon: HALOT
  rationale: 'Aunque el verbo hebreo está en 3ms, el complemento nos incluye claramente: «somos sanados» comunica el resultado de manera idiomática y mantiene el valor pasivo. «Sanados» conserva la amplitud restaurativa sin limitarse a curación física.'
- source_word: וְהוּא
  english_pob_choice: But he
  chosen_spanish: Pero él
  alternatives_spanish:
  - Y él
  - Mas él
  - Sin embargo, él
  lexicon: HALOT
  rationale: El conector adversativo contrasta con la valoración errada del contexto previo; «Pero él» expresa bien ese giro. Se mantiene la fuerza de contraste sin forzar un tono excesivamente literario.
theological_decisions:
- issue: Relación del sufrimiento del servidor con los pecados del pueblo
  english_pob_reading: The verse is rendered with substitutionary/on-account-of language ('because of our transgressions ... because of our iniquities') without importing a more detailed atonement theory.
  chosen_spanish_reading: 'El verso queda con lenguaje causal y vicario: «por nuestras rebeliones... por nuestras iniquidades», sin desarrollar una teoría de expiación más explícita de la que el texto presenta.'
  alternative_spanish_readings:
  - una lectura meramente ejemplar que debilite el vínculo con el pecado
  - una formulación penal explícita que vaya más allá del verso
  rationale: El hebreo muestra de manera clara que el sufrimiento del siervo se relaciona con los pecados del pueblo y con su paz y sanidad. La traducción conserva ese vínculo vicario sin añadir precisión doctrinal no explícita en el versículo.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Alcance de 'paz' y 'sanados'
  english_pob_reading: Retain 'peace' and 'healed' as broad covenantal-restorative terms rather than narrowing them to only physical healing or only spiritual forgiveness.
  chosen_spanish_reading: «Paz» y «sanados» se conservan como términos amplios de restauración, no restringidos a curación física ni a perdón espiritual solamente.
  alternative_spanish_readings:
  - solo curación física
  - solo perdón espiritual
  - prosperidad o bienestar material
  rationale: שָׁלוֹם y רפא abarcan más que una sola dimensión. Mantener su amplitud evita reducir el sentido del verso y conserva la tensión teológica del texto.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y no introdujo cambios. Esta versión mantiene la decisión previa de traducir el pasivo intensivo con verbos fuertes en español, conservar el contraste adversativo inicial y preservar la amplitud semántica de «paz» y «sanados».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no ocurre.
  - Se evita «Cristo» porque el texto fuente no lo usa aquí como título.
  - 'Se conserva la distinción entre dos términos de culpa: «rebeliones» y «iniquidades».'
  - Se usa una construcción pasiva natural en español para reflejar el hebreo sin ocultar el agente implícito del sufrimiento.
