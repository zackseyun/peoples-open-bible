translation:
  language: es
  text: 'La voz de Yahvé hace que las ciervas den a luz[a] y desnuda los bosques, y en su templo[b] todos dicen: «¡Gloria!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hace retorcerse a las ciervas»; o «hace que las ciervas se retuerzan en el parto».
    reason: lexical_alternative
  - marker: b
    text: Hebreo הֵיכָל puede significar «templo» o «palacio».
    reason: alternative_reading
lexical_decisions:
- source_word: ק֤וֹל יְהוָ֨ה
  english_pob_choice: The voice of Yahweh / The voice of the LORD
  chosen_spanish: La voz de Yahvé
  alternatives_spanish:
  - La voz del Señor
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino según la política española del proyecto: יהוה se traduce por «Yahvé» y no se enmascara con un título. «Voz de» reproduce con naturalidad la construcción hebrea de estado constructo.'
- source_word: יְחוֹלֵ֣ל אַיָּלוֹת֮
  english_pob_choice: makes the deer give birth
  chosen_spanish: hace que las ciervas den a luz
  alternatives_spanish:
  - hace retorcerse a las ciervas
  - hace que las ciervas se retuerzan en el parto
  lexicon: HALOT
  rationale: El POB inglés opta por el sentido contextual de parto, preservando la fuerza del verbo חול sin borrar la tensión léxica. En español, «dar a luz» comunica bien el efecto de parto y, con «ciervas», mantiene el rasgo femenino explícito del hebreo.
- source_word: אַיָּלוֹת֮
  english_pob_choice: the deer
  chosen_spanish: las ciervas
  alternatives_spanish:
  - los ciervos
  - las hembras de ciervo
  lexicon: HALOT
  rationale: El hebreo apunta específicamente a hembras de venado/ciervo. «Ciervas» preserva el rasgo femenino y suena natural en español bíblico contemporáneo.
- source_word: וַֽיֶּחֱשֹׂ֪ף יְעָ֫ר֥וֹת
  english_pob_choice: and strips the forests bare
  chosen_spanish: y desnuda los bosques
  alternatives_spanish:
  - y deja al descubierto los bosques
  - y arranca la cubierta de los bosques
  lexicon: HALOT
  rationale: חשׂף expresa la idea de despojar o dejar al descubierto. «Desnuda» es una equivalencia vívida y natural en español, y mantiene la imagen de despojo sin añadir elementos ajenos.
- source_word: וּ/בְ/הֵיכָל֑/וֹ
  english_pob_choice: and in his temple
  chosen_spanish: y en su templo
  alternatives_spanish:
  - y en su palacio
  lexicon: HALOT
  rationale: En contexto salmódico y con la aclamación final, «templo» es la lectura más probable y reverente. Se conserva la posibilidad alternativa en la documentación porque הֵיכָל también puede significar «palacio».
- source_word: כֻּ֝לּ֗/וֹ
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos los que están allí
  - todos en él
  lexicon: HALOT
  rationale: El singular con sufijo tiene valor colectivo. En español, «todos» expresa de forma natural a los presentes en el templo sin forzar una perífrasis.
- source_word: אֹמֵ֥ר
  english_pob_choice: say
  chosen_spanish: dicen
  alternatives_spanish:
  - dicen en voz alta
  - proclaman
  lexicon: HALOT
  rationale: Aunque formalmente el verbo es singular, funciona distributivamente con el sujeto colectivo. «Dicen» refleja mejor esa lectura colectiva que una traducción singular literal.
- source_word: כָּבֽוֹד
  english_pob_choice: Glory!
  chosen_spanish: «¡Gloria!»
  alternatives_spanish:
  - «¡Honor!»
  - «Gloria»
  lexicon: HALOT
  rationale: La exclamación litúrgica se conserva como una sola palabra de alabanza. «Gloria» es la equivalencia estable en español para כבוד en este contexto de culto.
theological_decisions:
- issue: Uso de Yahvé en lugar de un título velado
  english_pob_reading: The voice of the LORD
  chosen_spanish_reading: La voz de Yahvé
  alternative_spanish_readings:
  - La voz del Señor
  rationale: El proyecto español exige transparentar el nombre divino cuando el hebreo lo usa. Esto preserva la relación con el texto fuente y evita la convención de sustitución por título.
  doctrine_reference: 'Política terminológica del proyecto: יְהוָה → Yahvé'
- issue: הֵיכָל como 'templo' o 'palacio'
  english_pob_reading: temple
  chosen_spanish_reading: templo
  alternative_spanish_readings:
  - palacio
  rationale: La escena es de alabanza en un marco sagrado, por lo que «templo» comunica mejor el contexto. Aun así, se mantiene la tensión semántica porque el hebreo también puede apuntar a un recinto real.
  doctrine_reference: Translation philosophy §3 (preservar tensiones teológicas/lexicales cuando el original las mantiene)
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió «say» sobre «cry» para reflejar con más precisión אֹמֵר sin perder el tono formal. En español se ha reflejado con «dicen», manteniendo el valor colectivo. También se preservó la tensión de הֵיכָל mediante nota, como en el audit trail inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה según el estándar del proyecto.
  - Se evita «Señor» como sustitución automática para no ocultar el nombre divino hebreo.
  - «Ciervas» mantiene el rasgo femenino de אַיָּלוֹת y suena natural en español.
  - «Templo» se usa en el texto principal y «palacio» queda documentado como alternativa semántica.
  - La exclamación final se conserva como «¡Gloria!» para reflejar el uso cultual de כָּבוֹד.
