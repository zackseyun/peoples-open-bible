revisions:
- from: 'Entonces mandó al que estaba sobre su casa[a], diciendo: «Llena de comida los costales de estos hombres, cuanto puedan llevar, y pon el dinero de cada uno en la boca de su costal».'
  to: 'Entonces mandó al que estaba a cargo de su casa, diciendo: «Llena de comida los costales de los hombres, cuanto puedan llevar, y pon el dinero de cada uno en la boca de su costal[a]».'
  rationale: Se corrige la adición no apoyada «estos», se reubica correctamente la nota al pie para que explique la expresión que comenta, y se mejora la naturalidad de «el que estaba sobre su casa» a «el que estaba a cargo de su casa» sin perder el sentido del hebreo. Se mantiene «costales» y «dinero» como opciones aceptables en español, y se conserva el hebraísmo «boca de su costal» con nota aclaratoria, en línea con la auditoría inglesa.
  reviewer_model: gpt-5.4
