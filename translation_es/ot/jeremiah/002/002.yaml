revisions:
- from: 'Anda y proclama en los oídos de Jerusalén[a], diciendo: «Así dice Yahvé: Yo me acuerdo de ti del amor fiel[b] de tu juventud, del amor de tu desposorio, cuando andabas en pos de mí en el desierto[c], en tierra no sembrada».'
  to: 'Ve y proclama a oídos de Jerusalén[a], diciendo: «Así dice Yahvé: Recuerdo para ti[b] el amor fiel[c] de tu juventud, el amor de tu desposorio, cuando ibas tras mí en el desierto, en una tierra no sembrada»'
  rationale: La revisión corrige la sintaxis principal para reflejar con claridad que Yahvé recuerda el amor pasado de Israel/Jerusalén, no simplemente a Jerusalén. También mejora la naturalidad del mandato inicial y elimina una nota innecesaria sobre «desierto», manteniendo la metáfora nupcial, el nombre divino «Yahvé» y el matiz de חֶסֶד.
