review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del hebreo: mandato de huir, salvar la vida, no perecer por la iniquidad de Babilonia, y anuncio de la retribución de Yahvé. Sin embargo, «porque es tiempo de venganza para Yahvé» no preserva bien la relación posesiva/atributiva que el audit trail inglés ya fijó como «the time of Yahweh''s vengeance». En español, «para Yahvé» suena como beneficio o destinatario de la venganza, no como venganza perteneciente a Yahvé.'
  spanish_quality_summary: El español es mayormente claro y natural. «Huyan de en medio de Babilonia» y «que cada uno salve su vida» funcionan bien. La nota al pie es útil, aunque conviene pulir comillas y estilo. El principal problema de legibilidad y fidelidad es «tiempo de venganza para Yahvé», que resulta menos idiomático y más ambiguo que «el tiempo de la venganza de Yahvé».
  glossary_alignment: Se respeta correctamente «Yahvé» para יהוה. «iniquidad» preserva bien עָוֹן en el texto principal con nota alternativa. No hay conflictos graves con la terminología del proyecto, salvo que la construcción con Yahvé debe ajustarse para expresar posesión/atribución, no dativo.
  issues:
  - severity: medium
    issue: «para Yahvé» en la cláusula de venganza
    rationale: לַיהוָה aquí, en contexto y según el audit trail inglés revisado, debe expresarse como la venganza que pertenece a Yahvé («la venganza de Yahvé»), no como algo «para Yahvé», que en español altera el sentido.
  - severity: low
    issue: Falta el artículo en «es tiempo de venganza»
    rationale: Aunque no es imposible en español, «es el tiempo de la venganza de Yahvé» refleja mejor la definitud contextual de עֵת נְקָמָה y coincide con la decisión inglesa final.
  - severity: low
    issue: Estilo de la nota al pie
    rationale: La nota comienza con una comilla innecesaria tras el apóstrofo y puede redactarse con puntuación más limpia en español, sin cambiar el contenido.
  revised_spanish_text: Huyan de en medio de Babilonia, y que cada uno salve su vida. No perezcan[a] en su iniquidad, porque este es el tiempo de la venganza de Yahvé; él le paga su merecido.
  revised_footnotes:
  - marker: a
    text: 'O: «No sean destruidos en su culpa» o «No perezcan a causa de su iniquidad». El hebreo puede apuntar tanto a quedar envueltos en el pecado de Babilonia como a sufrir el juicio que viene por él.'
    reason: alternative_reading
