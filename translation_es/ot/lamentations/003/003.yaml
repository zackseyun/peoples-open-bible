translation:
  language: es
  text: Ciertamente, una y otra vez vuelve su mano contra mí todo el día[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ciertamente, contra mí vuelve; vuelve su mano todo el día». El hebreo usa dos verbos consecutivos («volver/retornar» y «volver/voltear»), que pueden traducirse de forma más formal o con un sentido iterativo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Sin duda
  - Seguro
  - Ciertamente, sí
  lexicon: HALOT
  rationale: Aquí אַךְ introduce una afirmación enfática de queja. «Ciertamente» conserva ese valor aseverativo sin volverlo restrictivo como «solo».
- source_word: בִּי
  english_pob_choice: against me
  chosen_spanish: contra mí
  alternatives_spanish:
  - sobre mí
  - a mí
  - en mi contra
  lexicon: HALOT
  rationale: La preposición con la primera persona expresa una orientación hostil; «contra mí» hace explícita la fuerza adversativa que el contexto exige.
- source_word: יָשֻׁב
  english_pob_choice: turns ... again and again
  chosen_spanish: vuelve a volver
  alternatives_spanish:
  - vuelve
  - regresa
  - se vuelve otra vez
  lexicon: HALOT
  rationale: El verbo שׁוּב aparece en secuencia con el siguiente verbo, creando un efecto de repetición o reiteración. «Vuelve a volver» intenta conservar esa insistencia verbal en español, aunque suene marcada.
- source_word: יַהֲפֹךְ
  english_pob_choice: turns his hand
  chosen_spanish: tuerce su mano
  alternatives_spanish:
  - vuelve su mano
  - revuelve su mano
  - invierte su mano
  lexicon: HALOT
  rationale: הפך puede significar «girar/voltear/torcer». En combinación con «su mano» mantiene la imagen corporal del hebreo sin interpretar demasiado pronto la acción como una simple metáfora de poder.
- source_word: יָדוֹ
  english_pob_choice: his hand
  chosen_spanish: su mano
  alternatives_spanish:
  - su poder
  - su brazo
  - su golpe
  lexicon: HALOT
  rationale: Se conserva el sustantivo concreto «mano» en lugar de sustituirlo por una explicación como «poder», para respetar la imaginería del texto.
- source_word: כָּל הַיּוֹם
  english_pob_choice: all day long
  chosen_spanish: todo el día
  alternatives_spanish:
  - todo el día entero
  - durante todo el día
  - a lo largo de todo el día
  lexicon: HALOT
  rationale: La frase temporal se vierte con una expresión idiomática natural en español que comunica duración continua e incesante.
translation_notes:
  revision_awareness: El texto base en inglés ya fue revisado y quedó sin cambios; la presente redacción española sigue de cerca la lectura hebrea y preserva la doble secuencia verbal y la imagen de la mano, con una nota para la alternativa más literal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto hebreo lo exige; este versículo no contiene el nombre divino.
  - Se conserva el orden enfático del hebreo en la medida en que el español lo permite, usando una cadencia breve y repetitiva.
  - La nota a pie de página recoge la alternativa más literal y el matiz iterativo documentado en el audit trail inglés.
