review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la mayor parte del hebreo: «pon tu rostro hacia los montes de Israel» conserva el idiomatismo de שִׂים פָּנֶיךָ אֶל y «profetiza» representa adecuadamente וְהִנָּבֵא. Sin embargo, «para ellos» no es una buena representación de אֲלֵיהֶם en español bíblico natural; la dirección del discurso debe expresarse como «a ellos» o, mejor aún aquí, con dativo duplicado: «profetízales».'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero tiene dos tropiezos de naturalidad: «Hijo de hombre» suena menos establecido y menos idiomático que «Hijo del hombre» para el vocativo profético fijo en español, y «profetiza para ellos» resulta poco natural y puede sugerir beneficio en vez de dirección del discurso. «Pon tu rostro» y «los montes de Israel» funcionan bien.'
  glossary_alignment: 'No hay conflicto con la terminología troncal del proyecto. La principal cuestión es idiomática/lexical: para בֶּן אָדָם, la propia nota reconoce «Hijo del hombre» como alternativa tradicional, y en español esa forma preserva mejor el giro fijo documentado por el POB inglés. Para אֲלֵיהֶם, la revisión inglesa a «to them» debe reflejarse en español como «a ellos»/«les», no «para ellos».'
  issues:
  - severity: medium
    issue: «profetiza para ellos» traduce de forma poco natural y potencialmente equívoca אֲלֵיהֶם
    rationale: En español, «para ellos» suele indicar beneficio o finalidad, no el destinatario del discurso. El hebreo aquí expresa dirección hacia los montes; «profetízales» o «profetiza a ellos» conserva esa fuerza sin añadir adversatividad.
  - severity: medium
    issue: «Hijo de hombre» es menos idiomático que «Hijo del hombre» para בֶּן אָדָם en este vocativo profético fijo
    rationale: Aunque literal, «Hijo de hombre» suena marcado y poco establecido en español eclesial general. «Hijo del hombre» conserva el giro tradicional, sigue siendo fiel al hebreo idiomático y mejora la legibilidad sin paraprasear.
  revised_spanish_text: Hijo del hombre[a], pon tu rostro hacia los montes de Israel y profetízales.
