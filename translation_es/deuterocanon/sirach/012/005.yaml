  source_alignment_summary: 'El borrador capta bien el sentido global del hebreo difícil con apoyo del paralelo griego: una prohibición de dar alimento al impío para evitar que obtenga ventaja hostil. Sin embargo, omite el matiz posesivo documentado por el POB inglés (''your bread'') y usa ''te domine'', que se inclina demasiado hacia el griego principal en vez de preservar mejor el valor adversativo del hebreo con la alternativa de dominio en nota.'
  spanish_quality_summary: El español es claro y natural, pero 'No des pan al impío' suena algo genérico frente al audit trail que justificó 'tu pan'. Además, 'para que no te domine por medio de él' es comprensible pero menos idiomático que 'no sea que por él se ponga contra ti' o equivalente. Conviene ajustar para reflejar mejor la relación entre texto principal y nota alternativa.
  glossary_alignment: No hay conflicto con la terminología teológica principal del proyecto. 'Impío' es adecuado para ἀσεβεῖ en el paralelo. La decisión léxica principal debería alinearse mejor con el audit trail usando 'tu pan'; y la nota alternativa puede conservar el matiz griego de 'domine'.
  issues:
  - severity: medium
    issue: Falta el posesivo en 'pan'
    rationale: El POB inglés eligió deliberadamente 'your bread' para representar כְּלֵי לָחֶם de forma clara pero cercana. En español, 'tu pan' preserva mejor esa decisión sin perder naturalidad.
  - severity: medium
    issue: El texto principal adopta demasiado la fuerza griega de 'domine'
    rationale: 'La decisión inglesa puso en el texto principal ''set himself against you'' y relegó ''dominate you'' a nota. En español conviene mantener esa jerarquía: texto principal más adversativo, nota con la lectura más fuerte griega.'
  - severity: low
    issue: La sintaxis final puede sonar más natural
    rationale: '''por medio de él'' es aceptable, pero con un texto principal adversativo suena más idiomático ''por él'' o ''mediante él''.'
