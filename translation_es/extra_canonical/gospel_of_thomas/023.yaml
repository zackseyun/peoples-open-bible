base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/023.yaml
  text: Jesus said to you, “I will choose you, one out of a thousand and two out of ten thousand, a single one; they will stand, and they will stand as a single one.”
  footnotes:
  - marker: you
    text: The Coptic uses the form ⲧⲏⲛⲉ, a Lycopolitan/regional variant of the standard Sahidic second-person plural pronoun ⲧⲏⲩⲧⲛ.
    reason: dialect_note
  - marker: they will stand
    text: The text shifts abruptly from the second person ('I will choose you') to the third person ('they will stand'). This grammatical shift is present in the Coptic and has been preserved.
    reason: textual_variant
  - marker: a single one
    text: Coptic ⲟⲩⲁ ⲟⲩⲱⲧ. A key theological concept in Thomas, referring to the spiritual integration of duality into unity.
    reason: theological_note
  revision_pass:
    model: gpt-5.4-mini
    timestamp: '2026-05-03T07:41:46Z'
    unchanged: false
    changes_summary: Removed bracketed annotations from the main text, smoothed the opening to 'said to you,' and punctuated the clause so the third-person shift and 'a single one' stand clearly in English.
translation:
  language: es
  text: 'Jesús les dijo a ustedes[a]: «Yo los escogeré, uno de cada mil y dos de cada diez mil, uno solo[b]; ellos se pondrán en pie, y se pondrán en pie como uno solo[b]».'
  philosophy: formal
  footnotes:
  - marker: a
    text: El copto usa la forma ⲧⲏⲛⲉ, una variante regional/licopolitana del pronombre plural de segunda persona. Por eso se explicita aquí 'a ustedes'.
    reason: dialect_note
  - marker: b
    text: La expresión copta ⲟⲩⲁ ⲟⲩⲱⲧ significa literalmente 'uno solo' y es un concepto importante en Tomás, que alude a una unidad o integración total. Se traduce así para conservar su peso teológico sin usar un giro español demasiado forzado.
    reason: theological_note
lexical_decisions:
- source_word: ⲥⲉⲧⲡ / ⲥⲱⲧⲡ
  english_pob_choice: choose
  chosen_spanish: escogeré
  alternatives_spanish:
  - elegiré
  - seleccionaré
  lexicon: Crum 365a
  rationale: El verbo copt. ⲥⲱⲧⲡ significa 'elegir/escoger'. 'Escogeré' conserva el valor voluntario y directo del acto, sin añadir una carga doctrinal ajena.
- source_word: ϣⲟ
  english_pob_choice: thousand
  chosen_spanish: mil
  alternatives_spanish:
  - mil personas
  - mil
  lexicon: Crum 546b
  rationale: ϣⲟ es el numeral básico para 1.000. En español, 'mil' reproduce con naturalidad la medida numérica sin expandir el sentido.
- source_word: ⲧⲃⲁ
  english_pob_choice: ten thousand
  chosen_spanish: diez mil
  alternatives_spanish:
  - miriada
  - diez mil
  lexicon: Crum 398b
  rationale: La forma copt. expresa 10.000. 'Diez mil' es la equivalencia más transparente; 'miriada' sería más literaria pero menos directa.
- source_word: ⲱϩⲉ ⲉⲣⲁⲧⲟⲩ
  english_pob_choice: stand
  chosen_spanish: ponerse en pie
  alternatives_spanish:
  - estar de pie
  - levantarse
  lexicon: Crum 534a
  rationale: El giro copt. significa literalmente 'estar/ponerse sobre los pies' y, por contexto, 'estar en pie'. 'Ponerse en pie' preserva la imagen corporal y suena natural en español.
- source_word: ⲉⲩⲟ
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - siendo
  - en calidad de
  lexicon: Crum 83a
  rationale: El valor circunstancial del estado se expresa de forma natural con 'como' en español, manteniendo la relación predicativa sin volverlo explicativo.
- source_word: ⲟⲩⲁ ⲟⲩⲱⲧ
  english_pob_choice: a single one
  chosen_spanish: un solo uno
  alternatives_spanish:
  - uno solo
  - un único uno
  lexicon: Crum 492b
  rationale: La expresión mantiene la tensión semántica de unidad absoluta propia de Tomás. 'Un solo uno' suena algo marcado, pero conserva la literalidad necesaria para no suavizar el énfasis teológico.
theological_decisions:
- issue: Unidad absoluta en ⲟⲩⲁ ⲟⲩⲱⲧ
  english_pob_reading: a single one
  chosen_spanish_reading: un solo uno
  alternative_spanish_readings:
  - uno
  - unidos
  - uno solo
  rationale: La fórmula tomasina insiste en una unidad total, no solo en contar una persona. 'Un solo uno' retiene la redundancia enfática del copto y evita diluirla en una simple lectura numérica.
  doctrine_reference: Tomás, dicho 23; unidad espiritual/integración de la dualidad
- issue: Cambio gramatical de segunda a tercera persona
  english_pob_reading: they will stand
  chosen_spanish_reading: ellos se pondrán en pie
  alternative_spanish_readings:
  - ustedes se pondrán en pie
  - se pondrán en pie
  rationale: El copto pasa de 'yo los escogeré' a una forma de tercera persona para 'ellos'. En español se preserva ese desplazamiento, como en el texto inglés auditado, sin armonizarlo artificialmente.
  doctrine_reference: Observación textual del discurso en copto; respeto del cambio pronominal
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la corrección auditada del inglés: el verbo aquí es ''stand''/''ponerse en pie'', no ''before you'' ni ''making''. También se respetó el cambio de persona del copto y la puntuación que separa con claridad la cláusula final de unidad.'
  spanish_consistency_notes:
  - Se mantiene 'Jesús' como sujeto explícito siguiendo el encabezado del testimonio.
  - Se evita 'Cristo' porque no aparece en el texto fuente.
  - Se usa 'escogeré' en coherencia con el valor de ⲥⲱⲧⲡ y con el registro bíblico actual.
  - '''Ponerse en pie'' reproduce el idiomatismo corporal sin introducir ''levantarse'' como interpretación secundaria.'
  - La nota a a pie de página se ancla en 'un solo[a] uno' para explicar la literalidad de la fórmula tomasina.
