translation:
  language: es
  text: Si un hombre toma esposa y se casa con ella, y sucede que ella no halla favor en sus ojos porque ha hallado en ella alguna indecencia[a], y le escribe un certificado de divorcio, lo pone en su mano y la envía fuera de su casa,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un asunto de indecencia» o «algo vergonzoso». La frase hebrea es deliberadamente ambigua y se ha interpretado de más de una manera.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: If
  chosen_spanish: Cuando
  alternatives_spanish:
  - Si
  - Si acaso
  lexicon: HALOT
  rationale: En hebreo introduce un caso legal. En español, 'Cuando' funciona bien para abrir la situación casuística sin volverla una afirmación causal ni una orden.
- source_word: יִקַּח אִישׁ אִשָּׁה
  english_pob_choice: a man takes a wife
  chosen_spanish: un hombre toma esposa
  alternatives_spanish:
  - un hombre toma una mujer
  - un hombre se casa
  lexicon: HALOT
  rationale: Conserva la idiomática hebrea de 'tomar esposa' sin perder claridad en español; evita 'una mujer' por sonar más genérico que el sustantivo del texto y evita reemplazar por una mera paráfrasis.
- source_word: וּבְעָלָהּ
  english_pob_choice: and marries her
  chosen_spanish: y se casa con ella
  alternatives_spanish:
  - y la toma por esposa
  - y llega a ser su marido
  lexicon: HALOT
  rationale: El verbo expresa la relación marital establecida; 'se casa con ella' comunica esa función con naturalidad en español moderno y evita la connotación de posesión.
- source_word: וְהָיָה
  english_pob_choice: and it happens
  chosen_spanish: y sucede que
  alternatives_spanish:
  - y acontece que
  - y ocurre que
  lexicon: HALOT
  rationale: Mantiene la función discursiva de avance del caso legal, no una simple narración temporal.
- source_word: לֹא תִמְצָא חֵן בְּעֵינָיו
  english_pob_choice: she does not find favor in his eyes
  chosen_spanish: no halla favor en sus ojos
  alternatives_spanish:
  - no le agrada
  - no le parece bien
  lexicon: HALOT
  rationale: Sigue de cerca el modismo hebreo 'hallar favor en los ojos de alguien', preservando el matiz relacional y evaluativo del original.
- source_word: כִּי מָצָא בָהּ עֶרְוַת דָּבָר
  english_pob_choice: because he has found in her some indecency
  chosen_spanish: porque ha hallado en ella alguna indecencia
  alternatives_spanish:
  - porque ha hallado en ella algo indecente
  - porque ha hallado en ella una cosa vergonzosa
  - porque ha hallado en ella alguna vergüenza
  lexicon: HALOT
  rationale: '''Alguna indecencia'' preserva la ambigüedad deliberada de la frase hebrea, evitando precisar más de lo que el texto permite.'
- source_word: וְכָתַב לָהּ סֵפֶר כְּרִיתֻת
  english_pob_choice: and he writes her a certificate of divorce
  chosen_spanish: y le escribe un certificado de divorcio
  alternatives_spanish:
  - y le escribe una carta de divorcio
  - y le redacta un acta de divorcio
  - y le escribe un documento de separación
  lexicon: HALOT
  rationale: La expresión designa un documento jurídico que disuelve el matrimonio; 'certificado de divorcio' es claro, formal y fiel a la función legal del sintagma.
- source_word: וְנָתַן בְּיָדָהּ
  english_pob_choice: puts it into her hand
  chosen_spanish: lo pone en su mano
  alternatives_spanish:
  - lo entrega en su mano
  - lo da en su mano
  lexicon: HALOT
  rationale: Conserva la concreción ritual/procedimental del hebreo y el paralelismo con la entrega física del documento.
- source_word: וְשִׁלְּחָהּ מִבֵּיתוֹ
  english_pob_choice: and sends her out of his house
  chosen_spanish: la despide de su casa
  alternatives_spanish:
  - la envía fuera de su casa
  - la manda fuera de su casa
  - la echa de su casa
  lexicon: HALOT
  rationale: '''Despedir'' transmite el sentido de enviar fuera/dar salida formal, con menos dureza que ''echar'' y más cercanía al acto legal descrito.'
theological_decisions:
- issue: 'Naturaleza del pasaje: caso legal o mandato sobre el divorcio'
  english_pob_reading: Rendered as a conditional legal scenario, not as an imperative approving divorce
  chosen_spanish_reading: Redactado como un supuesto legal, no como un mandato que aprueba el divorcio
  alternative_spanish_readings:
  - Redactado como una norma que autoriza el divorcio
  - Redactado como una instrucción para divorciarse
  rationale: La sintaxis hebrea abre una casuística legal. La traducción española debe conservar ese marco hipotético y no convertirlo en una prescripción moral positiva sobre el divorcio.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Se verificó el último pase de revisión: sin cambios necesarios; la redacción española sigue de cerca la ambigüedad léxica y el encuadre casuístico confirmados por el auditor inglés.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usó 'esposa' para אִשָּׁה y 'se casa con ella' para וּבְעָלָהּ, evitando 'posee' por su carga indebida.
  - Se preservó la ambigüedad de עֶרְוַת דָּבָר con una nota de pie de página, conforme al tratamiento del POB inglés.
  - La puntuación final con coma refleja que el hebreo continúa la secuencia legal hacia el verso siguiente.
