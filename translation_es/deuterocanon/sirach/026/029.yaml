translation:
  language: es
  text: Un mercader apenas escapará[a] de la mala conducta, y un tendero[b] no será declarado justo de pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "apenas será librado de la mala conducta". El verbo griego puede significar "escapar" o "ser sacado fuera de" algo.'
    reason: lexical_alternative
  - marker: b
    text: '"Tendero" vierte un término griego para un detallista o pequeño vendedor, a veces con connotación social negativa.'
    reason: cultural_note
lexical_decisions:
- source_word: Μόλις
  english_pob_choice: scarcely
  chosen_spanish: apenas
  alternatives_spanish:
  - difícilmente
  - con dificultad
  lexicon: LSJ
  rationale: Apocó en español la idea de una acción que ocurre solo con gran dificultad o casi no ocurre. 'Apenas' es natural y conserva el tono proverbial de probabilidad mínima.
- source_word: ἐξελεῖται
  english_pob_choice: will be kept from
  chosen_spanish: se le podrá evitar
  alternatives_spanish:
  - se librará
  - saldrá de
  - será rescatado de
  lexicon: LSJ
  rationale: El griego sugiere la idea de apartar o extraer a alguien de algo; el audit trail inglés entiende un matiz pasivo. En español, 'se le podrá evitar' comunica esa pasividad sin forzar una construcción extraña.
- source_word: ἔμπορος
  english_pob_choice: merchant
  chosen_spanish: mercader
  alternatives_spanish:
  - comerciante
  - mercante
  lexicon: LSJ
  rationale: '''Mercader'' es un equivalente directo, sobrio y plenamente comprensible en español bíblico moderno. Mantiene el referente general al comerciante sin añadir matices modernos innecesarios.'
- source_word: πλημμελείας
  english_pob_choice: wrongdoing
  chosen_spanish: el mal hacer
  alternatives_spanish:
  - la culpa
  - la falta
  - el delito
  lexicon: LSJ
  rationale: 'El sustantivo es amplio: falta, yerro, falta moral o transgresión. ''El mal hacer'' preserva la amplitud moral del término sin estrecharlo solo a fraude comercial, aunque el contexto lo sugiera.'
- source_word: δικαιωθήσεται
  english_pob_choice: will be declared righteous
  chosen_spanish: será declarado justo
  alternatives_spanish:
  - será justificado
  - será tenido por justo
  - será absuelto
  lexicon: LSJ
  rationale: Se conserva el valor forense/declarativo del pasivo de δικαιόω. 'Declarado justo' es claro en español y evita cargar el verso con terminología doctrinal posterior que el texto no explicita.
- source_word: κάπηλος
  english_pob_choice: shopkeeper
  chosen_spanish: tendero
  alternatives_spanish:
  - vendedor al menudeo
  - comerciante menor
  - regatón
  lexicon: LSJ
  rationale: El término griego puede referirse a un pequeño detallista con connotación desfavorable. 'Tendero' transmite la idea de un vendedor de menor escala en un registro natural y respetuoso, mientras la posible desconfianza moral queda en el conjunto del proverbio.
- source_word: ἁμαρτίας
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - culpa
  - ofensa
  lexicon: LSJ
  rationale: Término moral-religioso estándar. 'Pecado' es la equivalencia española más estable y conserva la fuerza ética del contraste final.
theological_decisions:
- issue: Valor forense de δικαιωθήσεται en un dicho sapiencial
  english_pob_reading: will be declared righteous
  chosen_spanish_reading: será declarado justo
  alternative_spanish_readings:
  - será justificado
  - será absuelto
  rationale: Aunque el contexto no es paulino, el verbo mantiene un sentido declarativo/judicial. 'Declarado justo' conserva esa fuerza sin importar sistemas doctrinales ajenos al dicho.
  doctrine_reference: 'DOCTRINE.md: conservar el sentido del original sin importar afirmaciones doctrinales no expresadas por el texto.'
translation_notes:
  revision_awareness: Esta versión sigue el texto griego de Swete (1909) y toma en cuenta el ajuste del audit trail inglés de 'keep himself from' a 'be kept from' para reflejar mejor la voz pasiva de ἐξελεῖται. En español se decidió una formulación impersonal pasiva ('se le podrá evitar') que conserva esa relación sin rigidizar la sintaxis.
  spanish_consistency_notes:
  - Se mantuvo 'justo' para δικαιόω en sentido forense, coherente con el criterio POB de no trivializar el verbo con un simple 'perdonado'.
  - Se usó 'pecado' para ἁμαρτία, reservando 'mal hacer' para πλημμελεία a fin de preservar la diferencia entre falta general y culpa moral explícita.
  - '''Mercader''/''tendero'' evita imponer vocabulario eclesiástico tradicional donde el texto habla de oficios comerciales concretos.'
