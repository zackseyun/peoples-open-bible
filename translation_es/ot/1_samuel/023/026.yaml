revisions:
- from: Saúl iba por un lado del monte, y David y sus hombres por el otro lado del monte. David se apresuraba[a] a alejarse de Saúl[b], mientras Saúl y sus hombres lo rodeaban[c] a David y a sus hombres para capturarlos.
  to: Saúl iba por un lado del monte[a], y David y sus hombres por el otro lado del monte. David se apresuraba a alejarse de Saúl, mientras Saúl y sus hombres iban cercando[b] a David y a sus hombres para capturarlos[c].
  rationale: 'Se corrigió la construcción incorrecta ''lo rodeaban a David y a sus hombres'' y se optó por ''iban cercando'' para reflejar mejor el progreso táctico de עֹטְרִים. También se realinearon las notas con el audit trail inglés: la alternativa de ''rodeaban'' quedó en la frase de cerco, y la alternativa de ''apresarlos'' quedó en ''capturarlos''. Se añadió la nota sobre ''un lado/el otro lado'' porque el POB inglés preserva esa explicación del contraste espacial hebreo.'
  reviewer_model: gpt-5.4
