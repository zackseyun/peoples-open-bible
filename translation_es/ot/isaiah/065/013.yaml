translation:
  language: es
  text: 'Por tanto, esto es lo que dice el Señor Yahvé: Miren[a], mis siervos comerán, pero ustedes tendrán hambre; miren, mis siervos beberán, pero ustedes tendrán sed; miren, mis siervos se alegrarán, pero ustedes serán avergonzados[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''mis siervos''. El término también puede traducirse ''mis esclavos'', pero aquí ''siervos'' encaja mejor con el contexto de quienes pertenecen a Dios y le sirven.'
    reason: lexical_alternative
  - marker: b
    text: O 'quedarán avergonzados'. El hebreo puede denotar tanto sentir vergüenza como ser avergonzados públicamente; se eligió 'serán avergonzados' por el contexto de juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Marca una conclusión inferida a partir del contexto anterior. 'Por tanto' conserva el valor consecutivo formal y suena natural en español bíblico moderno.
- source_word: כֹּה אָמַר
  english_pob_choice: this is what ... says
  chosen_spanish: esto es lo que dice
  alternatives_spanish:
  - así dice
  - esto dice
  lexicon: HALOT
  rationale: Reproduce la fórmula profética con un español claro y reverente, sin forzar un calco arcaizante.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: Yahvé, el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor Dios
  lexicon: HALOT
  rationale: Se preserva Yahvé para יְהוָה según el criterio del proyecto, y 'el Señor' para אֲדֹנָי. En español, 'Yahvé, el Señor' evita la redundancia de 'Señor Yahvé' y mantiene ambos títulos distintivos.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Miren bien
  - Vean
  lexicon: HALOT
  rationale: La partícula deíctica llama la atención sobre cada contraste. 'Miren' transmite la fuerza exhortativa en español contemporáneo.
- source_word: עֲבָדַי
  english_pob_choice: my servants
  chosen_spanish: mis esclavos
  alternatives_spanish:
  - mis siervos
  lexicon: HALOT
  rationale: Se mantiene la fuerza léxica de עבד como 'esclavo', siguiendo la preferencia del proyecto cuando el término tiene peso semántico directo. En este contexto, la posesión por Yahvé y la oposición al grupo rebelde conservan bien ese contraste.
- source_word: יֹאכֵלוּ
  english_pob_choice: will eat
  chosen_spanish: comerán
  alternatives_spanish:
  - van a comer
  lexicon: HALOT
  rationale: Futuro simple directo para la acción resultante prometida a los siervos/esclavos de Yahvé.
- source_word: תִּרְעָבוּ
  english_pob_choice: will be hungry
  chosen_spanish: tendrán hambre
  alternatives_spanish:
  - pasarán hambre
  - estarán hambrientos
  lexicon: HALOT
  rationale: Expresa el estado de hambre de manera idiomática y clara, conservando el contraste concreto con 'comerán'.
- source_word: יִשְׁתּוּ
  english_pob_choice: will drink
  chosen_spanish: beberán
  alternatives_spanish:
  - van a beber
  lexicon: HALOT
  rationale: Futuro simple paralelo a 'comerán'.
- source_word: תִּצְמָאוּ
  english_pob_choice: will be thirsty
  chosen_spanish: tendrán sed
  alternatives_spanish:
  - pasarán sed
  - estarán sedientos
  lexicon: HALOT
  rationale: En español, 'tener sed' es la forma más natural y mantiene el contraste físico con 'beberán'.
- source_word: יִשְׂמָחוּ
  english_pob_choice: will rejoice
  chosen_spanish: se alegrarán
  alternatives_spanish:
  - gozarán
  - se regocijarán
  lexicon: HALOT
  rationale: '''Alegrarse'' comunica bien la alegría resultante sin sonar demasiado rígido; conserva la fuerza positiva del verbo hebreo.'
- source_word: תֵּבֹשׁוּ
  english_pob_choice: will be put to shame
  chosen_spanish: serán avergonzados
  alternatives_spanish:
  - quedarán avergonzados
  - serán humillados
  lexicon: HALOT
  rationale: '''Serán avergonzados'' refleja mejor la voz pasiva/resultativa del hebreo en este contexto de juicio que un simple ''se avergonzarán''.'
- source_word: וְאַתֶּם
  english_pob_choice: but you
  chosen_spanish: pero ustedes
  alternatives_spanish:
  - y ustedes
  lexicon: HALOT
  rationale: Aunque la conjunción es formalmente 'y', el contraste es claramente adversativo; 'pero' lo expresa con precisión y naturalidad.
theological_decisions:
- issue: Renderización del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Yahvé, el Señor
  alternative_spanish_readings:
  - el Señor Yahvé
  - el Señor Dios
  rationale: El texto hebreo combina el título אֲדֹנָי con el nombre de pacto יְהוִה. Conforme al criterio del proyecto, יְהוִה se traduce 'Yahvé'. En español, ubicarlo primero y luego 'el Señor' preserva ambos elementos sin crear una repetición extraña.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh/Yahvé'
- issue: Sentido de עֲבָדַי en contraste judicial
  english_pob_reading: my servants
  chosen_spanish_reading: mis esclavos
  alternative_spanish_readings:
  - mis siervos
  rationale: Aunque 'siervos' es una posibilidad contextual, el hebreo עבד mantiene una fuerza de pertenencia y subordinación que el proyecto suele preservar con 'esclavos' cuando no hay razón para atenuarla. Aquí el contraste entre los verdaderos pertenecientes a Yahvé y los rebeldes favorece esa elección.
  doctrine_reference: 'DOCTRINE.md: Lexical force — δοῦλος/עבד → esclavo cuando la fuerza lexical lo requiere'
translation_notes:
  revision_awareness: 'El español se ajusta al estado revisado del registro inglés: no hubo cambios recientes en el contenido base, y se conservan las decisiones estables sobre la fórmula profética, el nombre divino y el valor resultativo de בוש. Se mantiene la tensión léxica documentada en עבד/δοῦλος sin suavizarla.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוִה, conforme al estándar del proyecto, y 'el Señor' para אֲדֹנָי.
  - Se prefirió 'mis esclavos' para עֲבָדַי porque el contexto de contraste y pertenencia sostiene la fuerza del término.
  - '''Pero ustedes'' refleja el contraste adversativo implícito en וְאַתֶּם.'
  - '''Serán avergonzados'' preserva el matiz pasivo/resultativo de תֵּבֹשׁוּ.'
