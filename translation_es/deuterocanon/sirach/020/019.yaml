translation:
  language: es
  text: Una persona desagradable es un dicho inoportuno[a]; en la boca de los indisciplinados se repetirá continuamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Una persona sin gracia es un relato fuera de tiempo»; ambas mitades son breves y algo elípticas en griego, por lo que son posibles varias traducciones muy cercanas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄνθρωπος
  english_pob_choice: person
  chosen_spanish: persona
  alternatives_spanish:
  - hombre
  - ser humano
  lexicon: LSJ
  rationale: El griego usa ἄνθρωπος en sentido genérico. «Persona» conserva la referencia universal sin introducir un sesgo masculino, y sigue la revisión del inglés POB de 'man' a 'person'.
- source_word: ἄχαρις
  english_pob_choice: ungracious
  chosen_spanish: sin gracia
  alternatives_spanish:
  - desagradable
  - ingrato
  - falto de gracia
  lexicon: LSJ
  rationale: El adjetivo puede expresar carencia de gracia, agrado o gratitud. «Sin gracia» mantiene el campo semántico de la palabra griega y deja abierta la ambigüedad entre falta de encanto y falta de gratitud.
- source_word: μῦθος
  english_pob_choice: saying
  chosen_spanish: dicho
  alternatives_spanish:
  - refrán
  - cuento
  - relato
  - palabra
  lexicon: LSJ
  rationale: Aquí μῦθος funciona como una breve emisión proverbial, no como narración extensa. «Dicho» es conciso y natural en español, y preserva el carácter sentencioso.
- source_word: ἄκαιρος
  english_pob_choice: untimely
  chosen_spanish: inoportuno
  alternatives_spanish:
  - fuera de tiempo
  - mal a tiempo
  - impropio
  lexicon: LSJ
  rationale: El sentido es algo dicho en el momento equivocado. «Inoportuno» comunica bien la impropiedad temporal en español moderno, con tono proverbial.
- source_word: ἀπαιδεύτων
  english_pob_choice: undisciplined
  chosen_spanish: indisciplinados
  alternatives_spanish:
  - sin instrucción
  - mal formados
  - no instruidos
  lexicon: LSJ
  rationale: El término implica falta de formación y disciplina, no solo falta de educación intelectual. «Indisciplinados» conserva la fuerza moral-social del griego y el matiz elegido por el inglés POB.
- source_word: ἐνδελεχισθήσεται
  english_pob_choice: will be repeated continually
  chosen_spanish: se repetirá continuamente
  alternatives_spanish:
  - se mantendrá
  - permanecerá
  - se dirá sin cesar
  lexicon: LSJ
  rationale: El futuro pasivo expresa continuidad o reiteración. «Se repetirá continuamente» da en español la idea de algo que sigue reapareciendo en la խոսা de los indisciplinados, sin forzar una explicación interpretativa.
- source_word: ἐν στόματι
  english_pob_choice: in the mouth of
  chosen_spanish: en la boca de
  alternatives_spanish:
  - en labios de
  - por boca de
  lexicon: LSJ
  rationale: La expresión es idiomática para lo que alguien dice. «En la boca de» conserva la imagen corporal del griego y suena aceptable en español proverbial.
translation_notes:
  revision_awareness: La versión española sigue el texto griego de Swete y toma en cuenta la revisión inglesa que corrigió ἄνθρωπος de 'man' a 'person'. También conserva la tersedad y cierta ambigüedad del paralelismo proverbial, especialmente en ἄχαρις y μῦθος, donde el griego admite más de una equivalencia cercana.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se usa «persona» para el genérico ἄνθρωπος, evitando un masculino no marcado.
  - Se conserva el tono proverbial y condensado del original, sin expandirlo con explicaciones.
  - «Sin gracia» y «dicho» dejan abierta la alternativa semántica que el POB inglés registró en la nota.
  - «Indisciplinados» reproduce el matiz formativo-moral de ἀπαιδεύτων mejor que un simple «sin educación».
