source:
  edition: WLC
  text: וְ/עַתָּ֣ה שְׁמַ֣ע אֱלֹהֵ֗י/נוּ אֶל תְּפִלַּ֤ת עַבְדְּ/ךָ֙ וְ/אֶל תַּ֣חֲנוּנָ֔י/ו וְ/הָאֵ֣ר פָּנֶ֔י/ךָ עַל מִקְדָּשְׁ/ךָ֖ הַ/שָּׁמֵ֑ם לְמַ֖עַן אֲדֹנָֽ/י׀־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/daniel/009/017.yaml
  text: And now[a], our God, hear the prayer of your servant and his pleas for mercy, and cause your face to shine upon your desolate sanctuary, for the Lord’s sake.
  footnotes:
  - marker: a
    text: Or, “for your own sake, O Lord.” The Hebrew reads “for the sake of the Lord,” using a divine title in the third person within direct address.
    reason: alternative_reading
