id: 2CO.9.6
reference: '2 Corinthians 9:6'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Τοῦτο δέ, ὁ σπείρων φειδομένως φειδομένως καὶ θερίσει, καὶ ὁ σπείρων ἐπ’ εὐλογίαις ἐπ’ εὐλογίαις καὶ θερίσει.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/009/006.yaml
  text: 'Now this: the one who sows sparingly will also reap sparingly[a], and the one who sows with blessings will also reap with blessings.'
translation:
  language: ko
  text: 이것은 곧, 적게 뿌리는 자는 적게 거두고, 복 가운데 뿌리는 자는 복 가운데 거둘 것이라는 것입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: σπείρων
  english_pob_choice: the one who sows
  chosen_korean: 뿌리는 자
  lexicon: BDAG
  rationale: 바울이 헌금을 농경 비유로 옮긴다. 「뿌리다」가 핵심 비유어로 정착.
- source_word: θερίσει
  english_pob_choice: will reap
  chosen_korean: 거둘 것
  lexicon: BDAG
  rationale: 「거두다」가 표준 등가어. 비유의 짝을 분명히 유지.
- source_word: φειδομένως
  english_pob_choice: sparingly
  chosen_korean: 적게
  lexicon: BDAG
  rationale: 부사 「아끼며, 인색하게」. 한국어에서 「적게」가 자연스러우며 다음 「복 가운데」와 대조를 만든다.
  alternatives_korean:
  - 아껴서
- source_word: ἐπ’ εὐλογίαις
  english_pob_choice: with blessings
  chosen_korean: 복 가운데
  lexicon: BDAG
  rationale: 전치사 ἐπί + 「복」 복수. 양면적으로 「복을 동반하여」와 「복을 향하여」를 함의한다. 「복 가운데」가 그 양면을 보존한다.
  alternatives_korean:
  - 복을 위하여
  - 후하게
