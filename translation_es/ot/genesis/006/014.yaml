  language: en
  yaml_path: translation/ot/genesis/006/014.yaml
  text: Make yourself an ark of gopher wood[a]; make rooms in the ark[c][b], and cover it inside and outside with pitch.
  footnotes:
  - marker: a
    text: Or 'cypress wood'; the Hebrew term 'gopher' occurs only here, so the exact kind of wood is uncertain.
    reason: lexical_alternative
  - marker: b
    text: Or 'compartments'; literally 'nests.'
    reason: lexical_alternative
  - marker: c
    text: Or 'coat it' or 'seal it' ... 'with bitumen/tar.' The Hebrew uses related words for the act of covering and the coating material.
    reason: lexical_alternative
