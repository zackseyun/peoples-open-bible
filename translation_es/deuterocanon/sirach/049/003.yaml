review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo base y conserva la variante griega en nota: «Dirigió su corazón a Dios» refleja adecuadamente ויתם אל אל לבו, y «en días de violencia» representa bien ובימי חמס. La cláusula final «mostró lealtad» también preserva razonablemente עשה חסד según la revisión inglesa y la decisión teológica documentada. La única desviación importante está en la nota b, que introduce el inglés «godliness» sin traducir, lo que no corresponde a una edición española pulida.'
  spanish_quality_summary: 'El texto principal es natural, claro y digno en español eclesial moderno. «Mostró lealtad» suena idiomático y suficientemente amplio para la tensión entre lealtad pactal y piedad. La calidad baja solo en la nota b por el anglicismo no traducido; además, conviene mantener una formulación plenamente española: «piedad» o «devoción» en vez de «godliness».'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios» para אל es correcto aquí, con nota para la lectura griega «Señor». No aparecen términos sensibles como Yahvé/Mesías/esclavo. La elección «lealtad» para חסד concuerda con el expediente léxico-teológico auditado.
  issues:
  - severity: medium
    issue: La nota b contiene el término inglés «godliness».
    rationale: Una nota en la edición española no debe mezclar idiomas sin necesidad. Además, el expediente inglés ya ofrece el sentido como «piety/godliness», que en español debe resolverse como «piedad» o similar.
  revised_spanish_text: Dirigió su corazón a Dios[a], y en días de violencia mostró lealtad[b].
  revised_footnotes:
  - marker: a
    text: El griego dice «hacia el Señor» en lugar del hebreo «a Dios».
    reason: alternative_reading
  - marker: b
    text: O «mostró bondad»; el griego interpreta la frase con más claridad como «fortaleció la piedad».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel al hebreo y al expediente POB. Solo se corrige la nota b para eliminar el anglicismo «godliness» y dejar una formulación plenamente natural en español.
