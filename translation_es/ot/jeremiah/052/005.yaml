    issue: La expresión principal 'estuvo sitiada' desplaza el sustantivo hebreo 'sitio/asedio' a un participio pasivo.
    rationale: Aunque comunica bien el sentido, el hebreo dice literalmente que la ciudad estaba 'en/bajo asedio'. En español, 'estuvo bajo asedio' conserva mejor la imagen léxica y sigue siendo natural.
  - severity: low
    issue: La nota usa 'bloqueo militar', que es interpretativo y algo más técnico que el campo léxico principal.
    rationale: Dado que el inglés POB habla de 'under blockade' como explicación del modismo, en español conviene mantener una explicación clara pero más cercana a 'asedio' para no alejarse innecesariamente del término base.
  revised_spanish_text: Así, la ciudad estuvo bajo asedio[a] hasta el año undécimo del rey Sedequías.
