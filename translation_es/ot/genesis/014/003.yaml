lexical_decisions:
- source_word: כָּל אֵלֶּה
  english_pob_choice: All these
  chosen_spanish: Todos estos
  alternatives_spanish:
  - Todos ellos
  - Todos estos reyes
  lexicon: HALOT
  rationale: El hebreo reúne כָּל + el demostrativo אֵלֶּה en una expresión colectiva. En español, «Todos estos» reproduce bien esa referencia conjunta sin añadir «reyes», que no está en el texto hebreo del versículo.
- source_word: חָֽבְר֔וּ
  english_pob_choice: joined together
  chosen_spanish: se unieron
  alternatives_spanish:
  - se juntaron
  - se aliaron
  - se reunieron
  lexicon: HALOT
  rationale: חבר en qal comunica la idea de unirse o asociarse. «Se unieron» conserva ese sentido básico con naturalidad en español y sirve para el contexto militar-político.
- source_word: אֶל
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - a
  - hacia
  - junto a
  lexicon: HALOT
  rationale: Aunque אֶל suele significar «a», aquí con un verbo de reunión y un lugar la función es locativa. «En» expresa de manera natural el sitio donde se unieron.
- source_word: עֵמֶק
  english_pob_choice: Valley
  chosen_spanish: valle
  alternatives_spanish:
  - valle
  - llanura
  lexicon: HALOT
  rationale: עֵמֶק designa normalmente un valle. «Valle» es la equivalencia directa y más precisa.
- source_word: הַשִּׂדִּים
  english_pob_choice: Siddim
  chosen_spanish: Sidim
  alternatives_spanish:
  - Siddim
  - el valle de Sidim
  lexicon: HALOT
  rationale: Es un topónimo; en español se translitera como «Sidim». No se explica en el cuerpo del texto porque el valor identificador se resuelve en la apposición final.
- source_word: הוּא
  english_pob_choice: that is
  chosen_spanish: es decir
  alternatives_spanish:
  - esto es
  - o sea
  lexicon: HALOT
  rationale: 'El pronombre introduce una aclaración identificativa: el valle de Sidim se equipara con otro nombre conocido. «Es decir» comunica claramente esa función explicativa en español.'
- source_word: יָם הַמֶּלַח
  english_pob_choice: the Salt Sea
  chosen_spanish: el Mar de la Sal
  alternatives_spanish:
  - el Mar Salado
  - el mar salado
  - el Mar Muerto
  lexicon: HALOT
  rationale: Se mantiene la literalidad básica de «the Salt Sea» con una construcción natural en español. «Mar Muerto» se reserva para la nota porque es el nombre posterior y tradicional, no el hebreo literal.
theological_decisions:
- issue: Identificación geográfica del lugar
  english_pob_reading: that is, the Salt Sea
  chosen_spanish_reading: es decir, el Mar de la Sal
  alternative_spanish_readings:
  - es decir, el Mar Muerto
  - es decir, el mar salado
  rationale: No hay una cuestión doctrinal, sino una decisión de identificación histórica y geográfica. El texto hebreo usa la designación literal «Mar de la Sal», mientras que la nota puede señalar el nombre posterior «Mar Muerto» sin sustituir el original en el cuerpo del versículo.
  doctrine_reference: Ninguna; decisión de topografía bíblica y fidelidad al nombre hebreo.
translation_notes:
  revision_awareness: 'El pasaje coincide con el audit trail inglés: se mantiene la lectura literal «Mar de la Sal» en el texto principal y se conserva en nota la identificación posterior «Mar Muerto». No se introdujeron revisiones adicionales.'
  spanish_consistency_notes:
  - Se prefirió «Sidim» como transliteración consistente de un topónimo hebreo.
  - «Es decir» conserva la función explicativa de הוּא sin forzar una glosa más interpretativa.
  - Se mantuvo «Mar de la Sal» para respetar el nombre hebreo literal; la alternativa tradicional queda únicamente en nota.
  - La sintaxis española fluye con orden natural sin añadir sujetos o sustantivos no presentes en el hebreo.
