  text: וְ/עֶפְר֥וֹן יֹשֵׁ֖ב בְּ/ת֣וֹךְ בְּנֵי חֵ֑ת וַ/יַּעַן֩ עֶפְר֨וֹן הַ/חִתִּ֤י אֶת אַבְרָהָם֙ בְּ/אָזְנֵ֣י בְנֵי חֵ֔ת לְ/כֹ֛ל בָּאֵ֥י שַֽׁעַר עִיר֖/וֹ לֵ/אמֹֽר־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/genesis/023/010.yaml
  text: Now Ephron was sitting among the sons of Heth[a], and Ephron the Hittite answered Abraham in the hearing of the sons of Heth, before all who entered the gate of his city, saying[b],
  footnotes:
