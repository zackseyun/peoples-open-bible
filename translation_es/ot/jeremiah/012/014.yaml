translation:
  language: es
  text: 'Así dice Yahvé acerca de todos mis vecinos perversos, los que tocan[a] la herencia que hice heredar a mi pueblo, a Israel: he aquí, estoy por arrancarlos[b] de su tierra, y arrancaré la casa de Judá de en medio de ellos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «invaden la herencia»; el hebreo dice literalmente «tocan la herencia», con la idea de interferencia hostil sugerida por el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «los desarraigaré». El hebreo emplea un verbo recurrente en Jeremías para arrancar en juicio, con imagen agrícola.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así dice el SEÑOR
  - Esto dice Yahvé
  lexicon: HALOT
  rationale: La fórmula profética estándar se conserva en español con un giro natural y solemne. Se mantiene Yahvé conforme al criterio del proyecto para יְהוָה, en vez de usar una máscara litúrgica como «SEÑOR».
- source_word: שְׁכֵנַי הָרָעִים
  english_pob_choice: my wicked neighbors
  chosen_spanish: mis vecinos perversos
  alternatives_spanish:
  - mis vecinos malvados
  - mis vecinos impíos
  lexicon: HALOT
  rationale: 'שְׁכֵנַי exige un posesivo de primera persona: «mis vecinos». רָעִים aquí tiene fuerza moral y hostil; «perversos» comunica mejor esa carga en español formal que «malos».'
- source_word: הַנֹּגְעִים
  english_pob_choice: who touch
  chosen_spanish: los que tocan
  alternatives_spanish:
  - los que invaden
  - los que se entrometen en
  lexicon: HALOT
  rationale: Se preserva el verbo literal «tocar» porque el texto hebreo usa נגע de manera concreta. La agresión queda sugerida por el contexto, como en el audit trail inglés.
- source_word: בַּנַּחֲלָה
  english_pob_choice: the inheritance
  chosen_spanish: la herencia
  alternatives_spanish:
  - la posesión heredada
  - la heredad
  lexicon: HALOT
  rationale: En español, «herencia» comunica bien el valor patrimonial y de heredad pactada. «Heredad» también sería posible, pero «herencia» suena más claro y natural para lectores amplios.
- source_word: אֲשֶׁר הִנְחַלְתִּי אֶת עַמִּי אֶת יִשְׂרָאֵל
  english_pob_choice: that I caused my people Israel to inherit
  chosen_spanish: que hice heredar a mi pueblo, a Israel
  alternatives_spanish:
  - que di en herencia a mi pueblo Israel
  - que asigné como heredad a mi pueblo Israel
  lexicon: HALOT
  rationale: 'Se conserva la relación causativa del hifil de נחל con un español natural: «hice heredar». El añadido «a Israel» mantiene el objeto directo y el vínculo con «mi pueblo».'
- source_word: הִנְנִי
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - ciertamente
  lexicon: HALOT
  rationale: «He aquí» conserva el valor discursivo de énfasis profético y suena más natural en registro bíblico que «mira» o una simple muletilla moderna.
- source_word: נֹתְשָׁם
  english_pob_choice: I am about to uproot them
  chosen_spanish: yo los arrancaré
  alternatives_spanish:
  - yo los desarraigaré
  - estoy por arrancarlos
  lexicon: HALOT
  rationale: El verbo נתש mantiene la imagen agrícola de arrancar de raíz. «Arrancar» es idiomático en español y suficientemente cercano al valor de «uproot»; el matiz de inminencia ya queda reforzado por «he aquí».
- source_word: מֵעַל אַדְמָתָם
  english_pob_choice: from upon their land
  chosen_spanish: de sobre su tierra
  alternatives_spanish:
  - de su tierra
  - de encima de su tierra
  lexicon: HALOT
  rationale: Se refleja la preposición compuesta מֵעַל con «de sobre», que conserva el movimiento de separación sin sonar demasiado rígido.
- source_word: בֵּית יְהוּדָה
  english_pob_choice: the house of Judah
  chosen_spanish: la casa de Judá
  alternatives_spanish:
  - Judá
  - el reino de Judá
  lexicon: HALOT
  rationale: «Casa de Judá» preserva el giro nacional-colectivo del hebreo sin reducirlo a un simple nombre propio.
- source_word: אֶתּוֹשׁ מִתּוֹכָם
  english_pob_choice: I will uproot ... from among them
  chosen_spanish: arrancaré ... de en medio de ellos
  alternatives_spanish:
  - los arrancaré de entre ellos
  - los desarraigaré de en medio de ellos
  lexicon: HALOT
  rationale: Se mantiene la misma imagen de arrancar/arrancar de raíz para el segundo verbo, y «de en medio de ellos» reproduce bien מִתּוֹכָם en español claro y formal.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo la convención del proyecto, se traduce como «Yahvé» en el texto principal, no como una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Aspectual force of הִנְנִי + participio/verb sequence
  english_pob_reading: behold, I am about to uproot them
  chosen_spanish_reading: he aquí, yo los arrancaré
  alternative_spanish_readings:
  - he aquí, estoy por arrancarlos
  - he aquí, yo los estoy arrancando
  rationale: La combinación hebrea expresa acción inminente. En español, «he aquí» ya aporta esa inminencia profética, por lo que un futuro simple mantiene fluidez sin perder el valor de amenaza cercana.
  doctrine_reference: Jer. 12:14; aspecto verbal profético en hifil/participio
- issue: Metaphorical force of uprooting imagery
  english_pob_reading: uproot them
  chosen_spanish_reading: arrancaré
  alternative_spanish_readings:
  - desarraigaré
  - arrancaré de raíz
  rationale: Jeremías usa con frecuencia la imagen de arrancar plantas o árboles para el juicio. «Arrancaré» conserva la metáfora sin sobreexplicarla; «desarraigaré» es posible, pero menos directo en registro bíblico.
  doctrine_reference: Jer. 1:10; Jer. 12:14
translation_notes:
  revision_awareness: El audit trail inglés mantuvo «wicked neighbors», preservó el verbo literal «touch» con nota de agresión contextual, y dio preferencia a «uproot» como imagen judicial recurrente. La versión española sigue esas decisiones, ajustando el registro a un español bíblico natural y conservando la metáfora de arrancar/desarraigar.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה conforme al estándar del proyecto.
  - Se preserva la imagen verbal de arrancar/arrancar de en medio para נתש.
  - «Casa de Judá» conserva el valor colectivo nacional del hebreo.
  - La puntuación con dos puntos tras la primera cláusula refleja bien la transición profética a la amenaza divina.
  - Las notas a y b se anclan en palabras o frases realmente presentes en el texto.
