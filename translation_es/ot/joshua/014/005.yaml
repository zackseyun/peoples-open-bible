translation:
  language: es
  text: Tal como Yahvé mandó a Moisés, así hicieron los hijos de Israel[a], y repartieron la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El hebreo dice «los hijos de Israel», una expresión corporativa estándar para el pueblo de Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  english_pob_choice: Just as
  chosen_spanish: Tal como
  alternatives_spanish:
  - Así como
  - Justamente como
  lexicon: HALOT
  rationale: La frase introduce una correspondencia exacta entre el mandato de Yahvé y la acción de Israel. «Tal como» conserva esa correlación de manera natural en español.
- source_word: צִוָּה
  english_pob_choice: had commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - había mandado
  - ordenó
  - había ordenado
  lexicon: HALOT
  rationale: El verbo expresa dar una orden. En español, «mandó» es claro y sobrio; el valor anterior al acto de Israel queda suficientemente indicado por el contexto sin forzar el pluscuamperfecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se preserva el nombre propio divino como exige la política del proyecto. «Yahvé» es la forma española establecida para el Tetragrama, en lugar de sustituirlo por un título.
- source_word: אֶת מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: Con צִוָּה, el marcador de objeto directo presenta a Moisés como destinatario del mandato. En español, la construcción natural es «mandó a Moisés».
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de esa manera
  - de igual modo
  lexicon: HALOT
  rationale: Marca correspondencia directa con la acción precedente. «Así» reproduce de forma breve y idiomática esa relación.
- source_word: עָשׂוּ
  english_pob_choice: did
  chosen_spanish: hicieron
  alternatives_spanish:
  - actuaron
  - cumplieron
  lexicon: HALOT
  rationale: El verbo hebreo es amplio; aquí el español requiere explicitar el sujeto verbal. «Hicieron» conserva la sencillez del original.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se mantiene la expresión hebrea corporativa con un equivalente transparente en español. Esto preserva la forma del original sin borrarla en una etnónima más interpretativa.
- source_word: וַיַּחְלְקוּ
  english_pob_choice: they divided
  chosen_spanish: repartieron
  alternatives_spanish:
  - dividieron
  - apportionaron
  lexicon: HALOT
  rationale: En este contexto, el verbo se refiere a la distribución de la tierra heredada. «Repartieron» comunica con claridad el acto de asignar porciones.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el territorio
  - la tierra prometida
  lexicon: HALOT
  rationale: En Josué, אָרֶץ se refiere al territorio de herencia. «La tierra» es la traducción más directa y natural; «territorio» sería más explicativo de lo que el hebreo dice.
theological_decisions:
- issue: Nombre divino en YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio del pacto sin sustituirlo por un título. La elección sigue la directriz del proyecto para יְהוָה y evita perder la referencia personal del texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Expresión corporativa בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Jacob
  rationale: Se mantiene la forma masculina plural del hebreo como expresión corporativa. En español sigue siendo inteligible y preserva la huella formal del original, acorde con la preferencia del proyecto por precisión de género cuando el texto lo presenta así.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
- issue: Acción de repartir la tierra
  english_pob_reading: they divided the land
  chosen_spanish_reading: repartieron la tierra
  alternative_spanish_readings:
  - dividieron la tierra
  - la distribuyeron
  rationale: 'No hay una carga doctrinal especial, pero sí una decisión de lectura contextual: el verbo final describe la asignación de la herencia, no una división abstracta. «Repartieron» comunica esa función en español bíblico contemporáneo.'
  doctrine_reference: Joshua 14 context of inheritance distribution
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto hebreo base y con la auditoría inglesa; no se detectaron variantes textuales ni revisiones pendientes que requirieran ajuste. La versión española sigue el mismo contenido semántico con un estilo natural y reverente.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrama, conforme al estándar del proyecto.
  - Se mantiene «los hijos de Israel» para reflejar la forma corporativa hebrea.
  - «La tierra» conserva el valor contextual de אָרֶץ en Josué como herencia territorial.
