translation:
  language: es
  text: En lugar de tus padres serán tus hijos varones[a]; tú los pondrás como príncipes en toda la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «En lugar de tus padres, tus hijos varones serán».
    reason: previous_rendering
  - marker: b
    text: O «en toda la tierra» o «por todo el país». El hebreo אָרֶץ puede significar «tierra» o «país», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחַת
  english_pob_choice: in place of
  chosen_spanish: en lugar de
  alternatives_spanish:
  - en vez de
  - en sustitución de
  lexicon: HALOT
  rationale: En este contexto genealógico y dinástico, תַּחַת expresa sustitución/sucesión, no ubicación física. «En lugar de» conserva esa idea de reemplazo con español natural y digno.
- source_word: אֲבֹתֶיךָ
  english_pob_choice: your fathers
  chosen_spanish: tus padres
  alternatives_spanish:
  - tus antepasados
  - tus padres/fathers
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «tus padres», en español «padres» comunica con claridad la línea ancestral y la sucesión dinástica. «Antepasados» es posible, pero suaviza demasiado el eco literal del hebreo.
- source_word: יִהְיוּ
  english_pob_choice: will be
  chosen_spanish: estarán
  alternatives_spanish:
  - serán
  lexicon: HALOT
  rationale: El hebreo usa un futuro simple de existencia. En español, «estarán» suena más natural con la inversión de orden de la cláusula y mantiene el sentido de continuidad/sucesión.
- source_word: בָנֶיךָ
  english_pob_choice: your sons
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus hijos varones
  - tus hijos / tus hijos varones
  lexicon: HALOT
  rationale: El hebreo es masculino plural y puede leerse como hijos varones en el marco real; sin embargo, en español «hijos» conserva la posible referencia hereditaria sin forzar una expresión marcadamente arcaica. La ambigüedad masculina se deja implícita por el contexto.
- source_word: תְּשִׁיתֵמוֹ
  english_pob_choice: you will appoint them
  chosen_spanish: los pondrás
  alternatives_spanish:
  - los nombrarás
  - los establecerás
  lexicon: HALOT
  rationale: El verbo שׁית significa «poner/colocar/establecer». En un contexto de instalación de gobernantes, «los pondrás» refleja la acción básica sin añadir demasiado. «Nombrarás» interpreta más de lo que el verbo por sí solo exige.
- source_word: לְשָׂרִים
  english_pob_choice: as princes
  chosen_spanish: como príncipes
  alternatives_spanish:
  - como gobernantes
  - como jefes
  lexicon: HALOT
  rationale: שָׂרִים denota príncipes, jefes o gobernantes. «Príncipes» preserva el tono regio y cortesano del salmo, en sintonía con la lectura inglesa.
- source_word: בְּכָל הָאָרֶץ
  english_pob_choice: in all the earth
  chosen_spanish: en toda la tierra
  alternatives_spanish:
  - en toda la tierra/país
  - por toda la tierra
  lexicon: HALOT
  rationale: אָרֶץ puede significar «tierra» o «país/land». Dado el alcance elevado del salmo y el paralelismo con la versión inglesa, «toda la tierra» mantiene la amplitud del texto sin imponer una lectura territorial estrecha.
theological_decisions:
- issue: Alcance de הָאָרֶץ en un contexto real y potencialmente mesiánico
  english_pob_reading: earth
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - país
  - tierra/país
  rationale: Se conserva la amplitud semántica de אָרֶץ sin reducirla a un territorio local. «Tierra» permite la misma tensión entre lectura universal y local que el texto hebreo y la nota inglesa, sin resolverla doctrinalmente en la traducción.
  doctrine_reference: Mantener la tensión interpretativa del texto original; no imponer una lectura doctrinal posterior en la traducción.
translation_notes:
  revision_awareness: Se siguió el orden hebreo con una inversión natural en español para evitar una cláusula final pesada. La nota inglesa sobre אָרֶץ se preserva como alternativa lexical; no se añadió una segunda nota sobre el orden de la cláusula porque el español resultante es claro y idiomático.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» implícito fuera del versículo porque este texto no contiene el nombre divino.
  - Se prefirió «tierra» para אָרֶץ, siguiendo la amplitud de la lectura inglesa, pero en la nota se conservó la alternativa «país».
  - «Príncipes» se conservó por su registro regio; no se sustituyó por «gobernantes» en el texto principal.
  - La construcción «en lugar de tus padres estarán tus hijos» busca reflejar la sucesión dinástica del hebreo sin sonar forzada en español.
