lexical_decisions:
- source_word: יִזְרְעֶאל
  english_pob_choice: Jezreel
  chosen_spanish: Jezreel
  alternatives_spanish:
  - Yizreel
  lexicon: HALOT
  rationale: Es un nombre propio de lugar en una lista toponímica; conviene transliterarlo y no traducirlo. Se conserva la forma convencional en español bíblico, equivalente al uso estándar inglés 'Jezreel'.
- source_word: יָקְדְעָם
  english_pob_choice: Jokdeam
  chosen_spanish: Jocdeam
  alternatives_spanish:
  - Yocdeam
  - Jokdeam
  - Jokdeamá
  lexicon: HALOT
  rationale: Nombre propio de ciudad; se conserva como topónimo transliterado. En español, 'Jocdeam' refleja mejor la adaptación ortográfica natural al alfabeto español sin añadir un sentido no presente en el hebreo.
- source_word: זָנוֹחַ
  english_pob_choice: Zanoah
  chosen_spanish: Zanóa
  alternatives_spanish:
  - Zanoa
  - Zanoh
  lexicon: HALOT
  rationale: Nombre propio de lugar; se translitera. La forma 'Zanóa' mantiene la pronunciación aproximada y resulta más natural para lectores en español que una grafía inglesa calcada.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: gramática española
  rationale: La conjunción hebrea une una lista simple de nombres; en español se expresa de manera natural con 'y'.
