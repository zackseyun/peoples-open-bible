revisions:
- from: 'Y aconteció que todos los que lo habían conocido de antes lo vieron[a]; y he aquí, estaba profetizando con los profetas. Entonces el pueblo se dijo, cada uno a su prójimo[b]: «¿Qué le ha pasado al hijo de Cis? ¿También Saúl entre los profetas?»'
  to: 'Y aconteció que todos los que lo habían conocido de antes lo vieron[a]; y he aquí, estaba profetizando con los profetas. Entonces el pueblo decía, cada uno a su prójimo: «¿Qué le ha pasado al hijo de Cis? ¿Está también Saúl entre los profetas?»[b]'
  rationale: Se corrige «el pueblo se dijo» a una formulación distributiva y natural en español que sí refleja «cada hombre a su compañero». Se explicita el verbo en la pregunta final para mayor claridad y se ajusta la nota b para conservar la alternativa léxica real entre «también» e «incluso/even», conforme al rastro de auditoría inglés.
