translation:
  language: es
  text: Y cuando lo persiguió con carros y una multitud de personas[a], lo anegaste en las profundidades del mar; pero a los que pusieron su confianza en ti, tú, que gobiernas sobre toda la creación[b], los hiciste pasar a salvo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alusión al Éxodo: el perseguidor egipcio fue anegado en el mar, mientras el pueblo de Dios fue hecho pasar a salvo a través de él.'
    reason: cross_reference
  - marker: b
    text: 'O: «tú, el soberano sobre toda la creación».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιδιώξαντα
  english_pob_choice: pursued
  chosen_spanish: lo persiguió
  alternatives_spanish:
  - lo siguió persiguiendo
  - lo acosó
  lexicon: LSJ
  rationale: El participio expresa persecución activa en contexto hostil. "Lo persiguió" es natural en español y conserva la referencia al relato del Éxodo sin añadir elementos ajenos.
- source_word: σὺν ἅρμασιν καὶ ὄχλων πλήθει
  english_pob_choice: with chariots and a multitude of people
  chosen_spanish: con carros y una multitud de gente
  alternatives_spanish:
  - con carros y una gran muchedumbre
  - con carros y una multitud
  lexicon: LSJ
  rationale: ἅρμασιν corresponde directamente a "carros". ὄχλων πλήθει sugiere una masa numerosa; "una multitud de gente" mantiene la idea de multitud sin endurecer el español con un calco excesivo.
- source_word: ἐπέκλυσας
  english_pob_choice: overwhelmed
  chosen_spanish: lo anegaste
  alternatives_spanish:
  - lo cubriste con agua
  - lo sumergiste
  lexicon: LSJ
  rationale: El verbo comunica inundar/anegar con agua como acto de juicio. "Anegaste" conserva la fuerza acuática y la acción divina de destrucción.
- source_word: βάθει θαλάσσης
  english_pob_choice: in the depths of the sea
  chosen_spanish: en las profundidades del mar
  alternatives_spanish:
  - en lo profundo del mar
  - en la hondura del mar
  lexicon: LSJ
  rationale: La dativa se entiende bien como locativa/instrumental en contexto. "En las profundidades del mar" reproduce la imagen con claridad y buena naturalidad en español.
- source_word: ἐμπιστεύσαντας ἐπὶ σοὶ
  english_pob_choice: had put their trust in you
  chosen_spanish: pusieron su confianza en ti
  alternatives_spanish:
  - habían confiado en ti
  - se habían encomendado a ti
  lexicon: LSJ
  rationale: La construcción expresa depositar confianza en alguien. "Pusieron su confianza en ti" conserva el sentido relacional y la resonancia de pacto sin forzar el tiempo verbal.
- source_word: τῷ τῆς ἁπάσης κτίσεως δυναστεύοντι
  english_pob_choice: who rule over all creation
  chosen_spanish: el que ejerce dominio sobre toda la creación
  alternatives_spanish:
  - el soberano sobre toda la creación
  - el que gobierna sobre toda la creación
  lexicon: LSJ
  rationale: δυναστεύω implica ejercer dominio o soberanía. "El que ejerce dominio sobre toda la creación" conserva la afirmación teológica de gobierno universal con precisión y dignidad.
- source_word: σώους διεκόμισας
  english_pob_choice: you brought safely through
  chosen_spanish: los llevaste a salvo
  alternatives_spanish:
  - los pasaste a salvo
  - los condujiste a salvo
  lexicon: LSJ
  rationale: La expresión combina preservación y traslado seguro. "Los llevaste a salvo" es idiomática en español y mantiene la idea de rescate y paso seguro.
theological_decisions:
- issue: Identificación implícita del perseguidor y del pueblo rescatado
  english_pob_reading: 'The verse alludes to the Exodus: the Egyptian pursuer was overwhelmed in the sea, while God''s people were brought safely through.'
  chosen_spanish_reading: La traducción conserva la alusión al Éxodo sin nombrar a Faraón ni a Israel en el texto principal.
  alternative_spanish_readings:
  - Nombrar explícitamente a Faraón e Israel en el texto principal
  - Añadir una aclaración interpretativa dentro del versículo
  rationale: El griego usa pronombres y participios sin nombrar a las figuras. Para respetar la primacía del texto fuente, la versión española deja la alusión implícita y la hace auditable en la nota.
  doctrine_reference: Principio de fidelidad al texto original; no importar nombres o explicaciones no expresadas explícitamente.
- issue: Soberanía divina universal
  english_pob_reading: the one who rules over all creation
  chosen_spanish_reading: el que ejerce dominio sobre toda la creación
  alternative_spanish_readings:
  - el soberano sobre toda la creación
  - el que gobierna sobre toda la creación
  rationale: La frase es una descripción doxológica de Dios. "Ejerce dominio" conserva el peso de δυναστεύω y evita suavizar la afirmación de soberanía universal.
  doctrine_reference: Soberanía de Dios; lenguaje doxológico de dominio universal.
translation_notes:
  revision_awareness: El contexto inglés revisó "a multitude of crowds" a "a multitude of people" por mayor naturalidad y ajustó la frase de soberanía para concordar más directamente con la cláusula siguiente. La versión española sigue esa línea con una formulación natural y mantiene la alternativa de soberanía en nota.
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" no porque aparezca aquí un tetragrámaton explícito, sino porque el pasaje se refiere al Dios de la liberación del Éxodo mediante pronombres y descripción soberana.
  - '"Carros" se usa para ἅρμασιν, evitando "carrozas" por exceso de especificidad.'
  - '"Mar" se prefirió a "mar rojo" porque el griego no lo nombra en esta cláusula; la alusión queda en la nota.'
  - '"Confianza" se emplea para ἐμπιστεύσαντας por su valor relacional y bíblico, sin convertirlo en una fórmula litúrgica.'
