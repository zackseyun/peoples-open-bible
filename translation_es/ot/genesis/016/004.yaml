translation:
  language: es
  text: Se llegó a Agar[a], y ella concibió. Cuando vio que había concebido, su señora fue menospreciada a sus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su señora fue despreciada a sus ojos». El hebreo puede entenderse como que Sarai quedó rebajada en la evaluación de Agar o como que fue despreciada por Agar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא אֶל
  english_pob_choice: went in to
  chosen_spanish: entró a
  alternatives_spanish:
  - se llegó a
  - tuvo relaciones con
  lexicon: HALOT
  rationale: El hebreo usa un eufemismo narrativo para la unión sexual. En español, «entró a» conserva esa discreción y el movimiento idiomático sin volver el texto mecánico ni demasiado explícito. «Tuvo relaciones con» aclara, pero pierde el color semítico del giro.
- source_word: הָגָר
  english_pob_choice: Hagar
  chosen_spanish: Agar
  alternatives_spanish:
  - Hagar
  lexicon: Convención bíblica española
  rationale: Se usa la forma habitual en español bíblico «Agar», que es reconocible y natural para lectores en español. Mantiene la referencia propia del nombre sin depender de la grafía inglesa.
- source_word: וַתַּהַר / הָרָתָה
  english_pob_choice: conceived / had conceived
  chosen_spanish: concibió / había concebido
  alternatives_spanish:
  - quedó encinta / estaba encinta
  - quedó embarazada / estaba embarazada
  lexicon: HALOT
  rationale: «Concebir» conserva la repetición léxica del hebreo entre ambas formas verbales. «Quedó embarazada» sería más idiomático en algunos registros, pero suaviza la correspondencia directa y desplaza el matiz de concepción a embarazo.
- source_word: וַתֵּרֶא כִּי
  english_pob_choice: When she saw that
  chosen_spanish: Cuando vio que
  alternatives_spanish:
  - y vio que
  - cuando se dio cuenta de que
  lexicon: HALOT
  rationale: La forma temporal «Cuando vio que» reproduce el avance narrativo del hebreo y expresa percepción sin añadir interpretación psicológica. «Se dio cuenta» sería posible, pero introduce una explicitación no exigida por el texto.
- source_word: וַתֵּקַל
  english_pob_choice: was despised
  chosen_spanish: fue menospreciada
  alternatives_spanish:
  - fue despreciada
  - quedó en poco estima
  lexicon: HALOT
  rationale: El verbo קלל en este contexto apunta a ser tratado como de poco valor o desprecio en la estimación de otro. «Fue menospreciada» comunica la relación devaluativa con naturalidad en español y evita convertir el sentido en una acción física o en un cambio objetivo de la persona.
- source_word: גְּבִרְתָּהּ
  english_pob_choice: her mistress
  chosen_spanish: su señora
  alternatives_spanish:
  - su ama
  - su patrona
  lexicon: HALOT
  rationale: «Señora» es la opción más clara y sobria en español para una superiora femenina en este contexto doméstico. «Ama» suena más duro o servil; «patrona» no encaja bien con la relación de servidumbre del pasaje.
- source_word: בְּעֵינֶיהָ
  english_pob_choice: in her eyes
  chosen_spanish: en sus ojos
  alternatives_spanish:
  - a su juicio
  - a sus ojos
  lexicon: HALOT
  rationale: La expresión hebrea conserva la imagen de evaluación personal. En español, «en sus ojos» retiene el giro idiomático y su fuerza literal. «A su juicio» explicita el sentido, pero atenúa la imagen original.
theological_decisions:
- issue: Si el final describe un cambio en Sarai o la estimación de Hagar sobre ella
  english_pob_reading: her mistress was despised in her eyes
  chosen_spanish_reading: su señora fue menospreciada en sus ojos
  alternative_spanish_readings:
  - su señora se volvió despreciable en sus ojos
  - su señora fue despreciada a sus ojos
  rationale: Se conserva la lectura que atribuye el menosprecio a la percepción de Hagar, no a una transformación objetiva de Sarai. La voz pasiva en español ayuda a reflejar que el foco está en la valoración de Hagar, en línea con la revisión del POB inglés.
  doctrine_reference: Narrativa del texto; semántica verbal de קלל y expresión idiomática בְּעֵינֶיהָ
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB en la última cláusula, que prefirió una formulación pasiva («was despised») para reflejar de manera más directa el hebreo y evitar sugerir que el texto habla de un cambio real en la persona de Sarai. La versión española refleja ese ajuste con «fue menospreciada» y mantiene la ambigüedad semántica documentada en la nota.
  spanish_consistency_notes:
  - 'Se mantuvo la misma estrategia léxica para la repetición de הרה: «concibió / había concebido».'
  - Se conservó el eufemismo narrativo del hebreo en la primera cláusula.
  - «Agar» se usó como forma española estándar del nombre propio, consistente con el registro bíblico en español.
  - La frase idiomática «en sus ojos» se mantuvo para preservar la imagen evaluativa del hebreo, con explicación en nota.
