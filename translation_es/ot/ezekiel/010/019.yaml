revisions:
- from: Entonces los querubines alzaron[a] sus alas y se elevaron de la tierra ante mis ojos, al salir[b], con las ruedas junto a ellos; y se detuvieron a la entrada de la puerta oriental[c] de la casa de Yahvé, y la gloria del Dios de Israel estaba sobre ellos, desde arriba.
  to: Entonces los querubines alzaron sus alas y se elevaron de la tierra ante mis ojos al salir, con las ruedas junto a ellos[a]; y se pararon[b] a la entrada de la puerta oriental de la casa de Yahvé, y la gloria del Dios de Israel estaba sobre ellos.
  rationale: Se conserva el sentido del borrador, pero se ajusta para reflejar mejor el expediente fuente y la auditabilidad del POB. 'Se pararon' representa mejor וַיַּעֲמֹד que 'se detuvieron', y la nota [b] preserva la observación importante de que el hebreo está en singular. Se añade una nota [a] para la alternativa espacial de לְעֻמָּתָם, presente en el inglés auditado. Se elimina 'desde arriba' por redundante e innecesariamente pesado en español. Las notas se reducen a las decisiones verdaderamente significativas.
  reviewer_model: gpt-5.4
