translation:
  language: es
  text: 'Y respondiendo, les dijo: «Vayan y cuéntenle a Juan lo que han visto y oído: los ciegos recobran la vista[a], los cojos andan, los leprosos son purificados, los sordos oyen, los muertos son levantados, a los pobres se les anuncian buenas nuevas[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «los ciegos vuelven a ver». El verbo griego puede significar recuperar la vista o mirar hacia arriba; aquí denota recobrar la vista.
    reason: lexical_alternative
  - marker: b
    text: 'O, «a los pobres se les predican buenas nuevas». El griego está en pasiva: «los pobres son evangelizados / reciben buenas nuevas anunciadas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answering
  chosen_spanish: respondiendo
  alternatives_spanish:
  - en respuesta
  - y respondiendo
  lexicon: BDAG
  rationale: El participio introduce la réplica de Jesús. «Respondiendo» preserva la fuerza de contestación sin volver la frase torpe en español.
- source_word: Πορευθέντες
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Vayan ustedes
  - Yendo
  lexicon: BDAG
  rationale: El participio attendant funciona idiomáticamente con el mandato principal. En español, un imperativo simple transmite mejor la acción ordenada.
- source_word: ἀπαγγείλατε
  english_pob_choice: report
  chosen_spanish: cuéntenle
  alternatives_spanish:
  - infórmenle
  - repórtenle
  - anúncienle
  lexicon: BDAG
  rationale: Aquí el sentido es comunicar de vuelta a Juan lo observado. «Cuéntenle» mantiene el carácter de relato/testimonio; «reportar» sonaría demasiado técnico en español.
- source_word: ἃ εἴδετε καὶ ἠκούσατε
  english_pob_choice: what you have seen and heard
  chosen_spanish: lo que han visto y oído
  alternatives_spanish:
  - las cosas que vieron y oyeron
  - lo que ustedes han visto y oído
  lexicon: BDAG
  rationale: La relativa se vierte de manera natural y fiel con el valor de experiencia completada y aún vigente para el testimonio que deben dar.
- source_word: τυφλοὶ ἀναβλέπουσιν
  english_pob_choice: the blind receive sight
  chosen_spanish: los ciegos recobran la vista
  alternatives_spanish:
  - los ciegos ven otra vez
  - los ciegos reciben vista
  lexicon: BDAG
  rationale: ἀναβλέπω puede implicar recuperar la vista. «Recobran la vista» mantiene esa idea de restauración y suena natural en español.
- source_word: χωλοὶ περιπατοῦσιν
  english_pob_choice: the lame walk
  chosen_spanish: los cojos andan
  alternatives_spanish:
  - los lisiados caminan
  - los cojos caminan
  lexicon: BDAG
  rationale: «Andan» es una forma breve y clara que conserva el paralelismo de la lista. «Cojos» corresponde al valor léxico de χωλοί en este contexto.
- source_word: λεπροὶ καθαρίζονται
  english_pob_choice: lepers are cleansed
  chosen_spanish: los leprosos son limpiados
  alternatives_spanish:
  - los leprosos son purificados
  - los leprosos quedan limpios
  lexicon: BDAG
  rationale: καθαρίζονται incluye limpieza ritual/restauradora, no solo curación médica. «Son limpiados» preserva la pasiva y la amplitud del término.
- source_word: κωφοὶ ἀκούουσιν
  english_pob_choice: the deaf hear
  chosen_spanish: los sordos oyen
  alternatives_spanish:
  - los sordos escuchan
  - los mudos oyen
  lexicon: BDAG
  rationale: Aunque κωφός puede significar sordo o mudo según el contexto, aquí ἀκούουσιν fija claramente el sentido de audición. «Sordos» es el equivalente natural.
- source_word: νεκροὶ ἐγείρονται
  english_pob_choice: the dead are raised
  chosen_spanish: los muertos son levantados
  alternatives_spanish:
  - los muertos resucitan
  - los muertos son resucitados
  lexicon: BDAG
  rationale: La pasiva se conserva sin añadir explícitamente el agente. «Son levantados» refleja de modo cercano el verbo ἐγείρω, aunque en español «resucitar» también sería posible.
- source_word: πτωχοὶ εὐαγγελίζονται
  english_pob_choice: the poor have good news proclaimed to them
  chosen_spanish: a los pobres se les anuncia buenas nuevas
  alternatives_spanish:
  - los pobres reciben buenas nuevas
  - a los pobres se les predica buenas nuevas
  - los pobres son evangelizados
  lexicon: BDAG
  rationale: La pasiva de εὐαγγελίζω indica que reciben el anuncio. «Se les anuncia buenas nuevas» preserva el pasivo y evita el tecnicismo eclesiástico «evangelizados».
theological_decisions:
- issue: Relación de la lista de milagros con la identidad y misión de Jesús
  english_pob_reading: Present the acts of restoration plainly, without adding an explicit messianic interpretation in the main text.
  chosen_spanish_reading: Presentar las acciones de restauración de manera directa, sin explicitar en el texto principal una interpretación mesiánica que el versículo no formula de manera abierta.
  alternative_spanish_readings:
  - Traducir con un lenguaje más abiertamente de cumplimiento profético
  - Añadir una glosa interpretativa sobre Jesús como el Mesías
  rationale: El versículo funciona como informe para Juan. La traducción conserva las resonancias proféticas, pero no añade una conclusión interpretativa que el griego de este versículo no enuncia explícitamente.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Fuerza de los pasivos finales
  english_pob_reading: Use English passives without making God the explicit subject.
  chosen_spanish_reading: Conservar pasivas en español sin convertirlas en formas activas con sujeto explícito.
  alternative_spanish_readings:
  - Dios levanta a los muertos
  - Yo anuncio buenas nuevas a los pobres
  rationale: El griego usa pasivas y el español puede preservarlas. Esto mantiene la sobriedad del texto y deja sin desarrollar la agencia divina, tal como hace el original.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: 'El español sigue de cerca el último estado revisado del texto inglés POB: mantiene «answering» como participio inicial, conserva la serie de acciones de restauración con pasivas donde el griego las usa, y refleja la nota léxica sobre εὐαγγελίζομαι sin caer en un tecnicismo eclesiástico. También evita una traducción mecánica del inglés al optar por expresiones naturales en español que preservan el valor evidencial y testimonial del mandato a los enviados de Juan.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - «Buenas nuevas» conserva el campo semántico de εὐαγγελίζομαι sin reemplazarlo por «evangelio» en el cuerpo del versículo.
  - «Limpiados» mantiene la dimensión ritual/restauradora de καθαρίζω, coherente con la auditoría inglesa.
  - La lista paralela conserva el ritmo breve del griego y del POB inglés, con sujetos plurales definidos y verbos en presente gnómico.
  - Se eligió «respondiendo» para ἀποκριθεὶς por fidelidad participial y naturalidad estilística.
