translation:
  language: es
  text: «Pero aun ahora», declara Yahvé[a], «vuélvanse a mí con todo su corazón, y con ayuno, y con llanto, y con duelo».
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «arrepiéntanse»; el verbo también puede llevar el sentido de «volver» o «volverse» a Dios en contextos de pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם / וְגַם עַתָּה
  english_pob_choice: Yet even now
  chosen_spanish: Y aun ahora
  alternatives_spanish:
  - Y también ahora
  - Pero aun ahora
  - Aun ahora
  lexicon: HALOT
  rationale: La combinación hebrea intensifica la apelación y marca contraste con el contexto de juicio. «Y aun ahora» conserva ese énfasis y suena natural en español, sin perder la carga concesiva.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: La fórmula profética pide un verbo solemne y público. «Declara» conserva el tono oracular, y «Yahvé» mantiene el nombre divino según la convención del proyecto.
- source_word: שֻׁבוּ
  english_pob_choice: return
  chosen_spanish: vuélvanse
  alternatives_spanish:
  - regresen
  - conviértanse
  - retornen
  lexicon: HALOT
  rationale: El hebreo שוב expresa el movimiento de volver. En español, «vuélvanse» comunica mejor el retorno relacional y puede sostener el matiz penitencial sin reemplazarlo por una paráfrasis doctrinal.
- source_word: עָדַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - hacia mí
  - a mi presencia
  lexicon: HALOT
  rationale: El pronombre directo preserva la dirección personal del llamado. «A mí» es la forma más natural y clara en español.
- source_word: בְּכָל לְבַבְכֶם
  english_pob_choice: with all your heart
  chosen_spanish: con todo su corazón
  alternatives_spanish:
  - con todo el corazón de ustedes
  - con todo su ser
  - de todo corazón
  lexicon: HALOT
  rationale: לֵבָב refiere al centro interior, voluntad y afectos. «Corazón» es el equivalente español más fiel y reconocido, y «con todo» conserva el alcance total del hebreo.
- source_word: וּבְצוֹם
  english_pob_choice: and with fasting
  chosen_spanish: y con ayuno
  alternatives_spanish:
  - y ayunando
  - y mediante ayuno
  lexicon: HALOT
  rationale: El sustantivo se traduce de manera directa y cultual. «Ayuno» mantiene el valor penitencial y la repetición retórica del hebreo.
- source_word: וּבְבְכִי
  english_pob_choice: and with weeping
  chosen_spanish: y con llanto
  alternatives_spanish:
  - y con lágrimas
  - y con llorar
  lexicon: HALOT
  rationale: בכי denota llanto/llorar. «Llanto» es natural en español bíblico contemporáneo y preserva el tono de duelo y arrepentimiento.
- source_word: וּבְמִסְפֵּד
  english_pob_choice: and with mourning
  chosen_spanish: y con lamento
  alternatives_spanish:
  - y con duelo
  - y con lamentación
  - y con duelo fúnebre
  lexicon: HALOT
  rationale: מִסְפֵּד puede implicar duelo o lamentación ritual asociada a la pérdida. «Lamento» conserva la fuerza emotiva y evita especificar más de lo que el hebreo exige en este contexto.
theological_decisions:
- issue: Cómo traducir el llamado de שׁוּב en contexto de pacto
  english_pob_reading: return; may also carry 'repent' in covenant contexts
  chosen_spanish_reading: vuélvanse a mí
  alternative_spanish_readings:
  - arrepiéntanse y vuelvan a mí
  - conviértanse a mí
  - regresen a mí
  rationale: El hebreo presenta el movimiento de volver hacia Dios como realidad básica; el arrepentimiento está implicado por el contexto y por los gestos penitenciales que siguen, pero no se debe imponer como único equivalente. «Vuélvanse a mí» mantiene la metáfora de retorno y deja abierto el matiz de arrepentimiento.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton. Conforme a la terminología base del proyecto, se transcribe como «Yahvé» en español para preservar el nombre propio del Dios del pacto, no un título sustitutivo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El borrador sigue el estado de revisión más reciente indicado como sin cambios, con alta concordancia entre la traducción auditada en inglés y el control cruzado posterior. No se aplicaron revisiones adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conserva la fuerza relacional de שוב con una forma verbal de retorno, sin colapsarla por completo en el término doctrinal «arrepentirse».
  - La serie preposicional repetida («con ayuno, y con llanto, y con lamento») refleja la acumulación retórica del hebreo.
  - El registro es bíblico y contemporáneo, evitando tanto arcaísmos pesados como paráfrasis expansivas.
