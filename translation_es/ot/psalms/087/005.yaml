translation:
  language: es
  text: 'Y de Sion se dirá[a]: «Este y aquel nacieron en ella», y el Altísimo mismo la establecerá.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Este hombre y aquel hombre nacieron en ella». El hebreo repite «hombre y hombre» para expresar un sentido distributivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלֲצִיּוֹן
  english_pob_choice: And of Zion
  chosen_spanish: Y de Sion
  alternatives_spanish:
  - Y acerca de Sion
  - Pero de Sion
  lexicon: HALOT
  rationale: El ל con Sion introduce el tema o el referente discursivo, y en español «de Sion» comunica bien ese valor. Se conserva la conjunción inicial para mantener la continuidad poética.
- source_word: יֵאָמַר
  english_pob_choice: it will be said
  chosen_spanish: se dirá
  alternatives_spanish:
  - dirán
  - será dicho
  lexicon: HALOT
  rationale: El nifal imperfecto de אמר se traduce naturalmente con pasiva impersonal en español. «Se dirá» conserva el tono declarativo y evita una construcción forzada.
- source_word: אִישׁ וְאִישׁ
  english_pob_choice: This one and that one
  chosen_spanish: Este y aquel
  alternatives_spanish:
  - uno y otro
  - este hombre y aquel hombre
  - una persona y otra
  lexicon: HALOT
  rationale: La repetición distributiva de אישׁ se refleja mejor en español con una pareja demostrativa neutra. «Este y aquel» preserva la fuerza distributiva sin introducir una referencia masculina innecesaria.
- source_word: יֻלַּד בָּהּ
  english_pob_choice: were born in her
  chosen_spanish: nacieron en ella
  alternatives_spanish:
  - fue nacido en ella
  - nació en ella
  lexicon: HALOT
  rationale: Aunque el verbo hebreo es singular, el sentido distributivo de la frase pide en español una forma plural natural. «En ella» mantiene la imagen de Sion como ciudad-personificada.
- source_word: בָּהּ
  english_pob_choice: in her
  chosen_spanish: en ella
  alternatives_spanish:
  - dentro de ella
  - allí
  lexicon: HALOT
  rationale: El sufijo femenino remite a Sion. «En ella» conserva la personificación y no neutraliza la referencia espacial.
- source_word: וְהוּא
  english_pob_choice: and ... himself
  chosen_spanish: y el Altísimo mismo
  alternatives_spanish:
  - y él mismo
  - y el Altísimo
  lexicon: HALOT
  rationale: El pronombre es enfático. En español, la combinación del sujeto explícito con «mismo» transmite mejor ese énfasis que un simple «y él».
- source_word: יְכוֹנְנֶהָ
  english_pob_choice: will establish her
  chosen_spanish: la establecerá
  alternatives_spanish:
  - la fundará
  - la afirmará
  - la hará firme
  lexicon: HALOT
  rationale: כּוֹן en este contexto poético expresa establecer/fijar con firmeza. «La establecerá» equilibra literalidad y claridad teológica-poética.
- source_word: עֶלְיוֹן
  english_pob_choice: the Most High
  chosen_spanish: el Altísimo
  alternatives_spanish:
  - el Altísimo Dios
  - el Exaltado
  lexicon: HALOT
  rationale: Es un título divino. «El Altísimo» es la forma natural y reverente en español, plenamente transparente para lectores bíblicos.
theological_decisions:
- issue: Referente del pronombre enfático con עֶלְיוֹן
  english_pob_reading: The pronoun refers to God, expressed as 'the Most High himself.'
  chosen_spanish_reading: 'El texto deja el énfasis en Dios mismo: «el Altísimo mismo».'
  alternative_spanish_readings:
  - y él mismo, el Altísimo
  - y el Altísimo lo establecerá
  rationale: La lectura mantiene el peso del pronombre enfático sin añadir desarrollo doctrinal. La frase final atribuye la acción fundadora a Dios, como en el hebreo.
  doctrine_reference: Preservar el énfasis teológico del hebreo sin resolver la tensión retórica con una paráfrasis explicativa.
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió «This one and that one» para reflejar con más naturalidad y neutralidad el hebreo distributivo אִישׁ וְאִישׁ. La versión española sigue esa misma línea con «Este y aquel», evitando una lectura demasiado literal de «hombre y hombre» y manteniendo el valor distributivo. También se conserva el énfasis final en «el Altísimo mismo».
  spanish_consistency_notes:
  - Se usa «Sion» sin tilde, conforme al nombre bíblico habitual en español.
  - Se mantiene «el Altísimo» como título divino, coherente con el registro bíblico del texto.
  - La forma «se dirá» conserva el pasivo impersonal del hebreo sin forzar el sujeto.
  - El demostrativo neutro distributivo «Este y aquel» evita marcar género donde el hebreo funciona de modo genérico.
