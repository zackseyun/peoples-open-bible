- from: Moisés contó a Aarón todas las palabras de Yahvé que lo había enviado, y todas las señales que le había mandado.
  to: Moisés le contó a Aarón todas las palabras de Yahvé, quien lo había enviado[a], y todas las señales que le había mandado hacer.
