translation:
  language: es
  text: Harás sus cuernos en sus cuatro esquinas; sus cuernos serán de una sola pieza con él[a], y lo revestirás de bronce[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “sus cuernos serán de él”, es decir, formados como una sola pieza con el altar y no añadidos aparte.'
    reason: lexical_alternative
  - marker: b
    text: Hebreo nechoshet puede referirse a bronce o cobre; aquí se traduce “bronce” por ser el sentido más probable en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  english_pob_choice: And you shall make
  chosen_spanish: Harás
  alternatives_spanish:
  - Y harás
  - Harás, pues
  lexicon: HALOT
  rationale: El hebreo en contexto instructivo expresa una orden futura. En español, el futuro simple transmite bien la fuerza mandativa sin añadir lenguaje innecesario.
- source_word: קַרְנֹתָיו
  english_pob_choice: its horns
  chosen_spanish: sus cuernos
  alternatives_spanish:
  - los cuernos de él
  - sus protuberancias
  lexicon: HALOT
  rationale: ‘Cuernos’ conserva el sentido concreto y cultual del término. ‘Sus’ mantiene la referencia al altar sin sonar forzado en español.
- source_word: עַל אַרְבַּע פִּנֹּתָיו
  english_pob_choice: on its four corners
  chosen_spanish: en sus cuatro esquinas
  alternatives_spanish:
  - sobre sus cuatro esquinas
  - en las cuatro esquinas
  lexicon: HALOT
  rationale: ‘Pinnôt’ designa las esquinas del altar. ‘En’ funciona de manera natural en español para ubicar los cuernos en cada esquina, sin perder el valor local del hebreo.
- source_word: מִמֶּנּוּ תִּהְיֶיןָ קַרְנֹתָיו
  english_pob_choice: its horns shall be of one piece with it
  chosen_spanish: sus cuernos serán de una sola pieza con él
  alternatives_spanish:
  - sus cuernos serán de él
  - sus cuernos saldrán de él
  lexicon: HALOT
  rationale: La construcción hebrea indica que los cuernos no se agregan aparte, sino que forman una sola unidad con el altar. ‘De una sola pieza con él’ expresa esa relación integral sin borrar la tensión léxica del ‘de/desde él’ original.
- source_word: וְצִפִּיתָ אֹתוֹ
  english_pob_choice: and you shall overlay it
  chosen_spanish: y lo revestirás
  alternatives_spanish:
  - y lo recubrirás
  - y lo cubrirás
  lexicon: HALOT
  rationale: ‘Revestir’ comunica bien la idea técnica de cubrir con metal en español bíblico y actual, más natural que ‘sobrecubrir’ y más preciso que ‘cubrir’ a secas.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: HALOT
  rationale: Se mantiene ‘bronce’ porque es la opción contextual preferida en este tipo de mobiliario del tabernáculo, siguiendo la decisión auditada del POB inglés. ‘Cobre’ queda como alternativa léxica posible según el material antiguo.
translation_notes:
  revision_awareness: Se siguió de cerca el trazado auditado en inglés, sin cambios de sentido respecto del texto fuente. La única decisión principal fue expresar en español natural la relación integral de los cuernos con el altar y conservar la ambigüedad material de נְחֹשֶׁת en nota.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ como norma del proyecto solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se evitó ‘SEÑOR’ y ‘Cristo’, ya que no corresponden a este pasaje.
  - ‘Cuernos’ se mantuvo en sentido arquitectónico/cultual, no zoológico literal.
  - ‘Bronce’ se conservó como término principal, con ‘cobre’ indicado en nota como alternativa léxica.
