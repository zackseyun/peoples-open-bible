translation:
  language: es
  text: Porque los montes serán sacudidos desde sus cimientos junto con las aguas, y las peñas se derretirán como cera delante de tu rostro[a]; pero a los que te temen, les muestras gracia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más idiomática, «en tu presencia». El griego dice literalmente «delante de tu rostro».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὄρη
  english_pob_choice: mountains
  chosen_spanish: montes
  alternatives_spanish:
  - montañas
  lexicon: LSJ
  rationale: El griego se refiere a masas montañosas físicas; en español bíblico y poético, «montes» conserva mejor el registro elevado y la imagen cósmica sin perder el referente.
- source_word: ἐκ θεμελίων
  english_pob_choice: from their foundations
  chosen_spanish: desde sus cimientos
  alternatives_spanish:
  - desde los cimientos
  - de sus cimientos
  lexicon: LSJ
  rationale: La idea es de conmoción desde la base misma. «Desde sus cimientos» expresa con naturalidad ese origen del sacudimiento en español y mantiene la relación de pertenencia implícita.
- source_word: σὺν ὕδασιν
  english_pob_choice: with the waters
  chosen_spanish: junto con las aguas
  alternatives_spanish:
  - con las aguas
  - junto a las aguas
  lexicon: LSJ
  rationale: σύν marca acompañamiento. «Junto con» refleja ese valor de compañía y preserva el tono poético; «las aguas» mantiene el plural elemental del griego.
- source_word: σαλευθήσεται
  english_pob_choice: will be shaken
  chosen_spanish: serán sacudidos
  alternatives_spanish:
  - serán movidos
  - temblarán
  lexicon: LSJ
  rationale: El futuro pasivo de σαλεύω expresa ser sacudido o puesto en movimiento. «Serán sacudidos» reproduce bien la fuerza pasiva y la violencia de la imagen.
- source_word: πέτραι
  english_pob_choice: rocks
  chosen_spanish: las peñas
  alternatives_spanish:
  - las rocas
  - los peñascos
  lexicon: LSJ
  rationale: En paralelo con «montes», el término apunta a grandes masas rocosas. «Peñas» suena más solemne y literario que «piedras», y conserva el contraste con el derretimiento.
- source_word: ἀπὸ προσώπου σου
  english_pob_choice: before your face
  chosen_spanish: delante de tu rostro
  alternatives_spanish:
  - ante tu rostro
  - en tu presencia
  lexicon: LSJ
  rationale: La expresión es literalmente «de delante de tu rostro». «Delante de tu rostro» conserva la concreción antropomórfica del griego, mientras que «en tu presencia» sería más idiomático pero menos transparente.
- source_word: ὡς κηρὸς
  english_pob_choice: like wax
  chosen_spanish: como cera
  alternatives_spanish:
  - como la cera
  lexicon: LSJ
  rationale: El símil es directo y tradicional. «Como cera» es la equivalencia natural en español y preserva el recurso figurado sin sobreexplicarlo.
- source_word: τακήσονται
  english_pob_choice: will melt
  chosen_spanish: se derretirán
  alternatives_spanish:
  - se fundirán
  - se desharán
  lexicon: LSJ
  rationale: El verbo expresa derretirse o licuarse. «Se derretirán» comunica de forma clara la imagen de pérdida de forma bajo calor, que es la fuerza del griego.
- source_word: τοῖς φοβουμένοις σε
  english_pob_choice: those who fear you
  chosen_spanish: a los que te temen
  alternatives_spanish:
  - a los que te reverencian
  - a los que te temen con reverencia
  lexicon: LSJ
  rationale: Se conserva el lenguaje bíblico de temor reverente en vez de suavizarlo a «reverenciar». La construcción con artículo y participio se vuelve naturalmente «a los que te temen».
- source_word: εὐιλατεύεις
  english_pob_choice: you are gracious
  chosen_spanish: eres misericordioso
  alternatives_spanish:
  - eres grato
  - eres benigno
  - tienes misericordia
  lexicon: LSJ
  rationale: El verbo raro indica una disposición favorable y misericordiosa. «Eres misericordioso» comunica bien ese favor divino en español, aunque «eres gracioso» o «benigno» serían alternativas menos naturales o más estrechas.
theological_decisions:
- issue: τοῖς φοβουμένοις σε como temor reverente
  english_pob_reading: those who fear you
  chosen_spanish_reading: a los que te temen
  alternative_spanish_readings:
  - a los que te reverencian
  rationale: La POB inglesa retiene «fear» para conservar la carga bíblica de asombro, reverencia y obediencia ante Dios. El español mantiene el mismo campo semántico sin diluirlo en mera deferencia social.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
- issue: ἀπὸ προσώπου σου como lenguaje antropomórfico de presencia divina
  english_pob_reading: before your face
  chosen_spanish_reading: delante de tu rostro
  alternative_spanish_readings:
  - en tu presencia
  - ante tu rostro
  rationale: La metáfora corporal se conserva en español para no neutralizar el antropomorfismo del original. La alternativa más idiomática se deja fuera del texto principal para preservar la transparencia fuente-texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior asegurando que el marcador [a] aparezca exactamente en el texto principal junto a la frase correspondiente. También se mantuvo una traducción coherente con el griego: σὺν se rindió con «junto con», se preservó el antropomorfismo de προσώπου, y se evitó duplicar el dativo final como hizo una versión previa en inglés.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma por defecto solo cuando el texto lo exigiera; aquí el versículo habla en segunda persona directa y no requiere el nombre divino en el texto.
  - «A los que te temen» conserva el giro bíblico y evita reemplazarlo por «reverencian», que sería menos fiel al peso teológico del temor reverente.
  - Se prefirió «montes» y «peñas» por su tono poético y por el paralelismo con la imaginería cósmica del pasaje.
  - No se introdujeron términos eclesiásticos ajenos al griego; la frase final mantiene una equivalencia semántica sobria y pública.
