  - severity: medium
    issue: «quietos y confiados» para שֹׁקֵט וּבֹטֵחַ
    rationale: «Confiados» en español puede introducir la idea de despreocupación o ingenuidad, mientras que el hebreo y el audit trail enfatizan seguridad/ausencia de amenaza. «Tranquilos y seguros» preserva mejor el sentido.
  - severity: low
    issue: «habitando seguro» suena poco natural
    rationale: Aunque comprensible, en español más idiomático conviene «viviendo seguros» o «habitaban seguros», manteniendo la idea de residencia estable.
