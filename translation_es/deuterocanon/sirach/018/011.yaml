translation:
  language: es
  text: Por eso, Yahvé tuvo paciencia con ellos y derramó sobre ellos su misericordia.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Por esta razón
  lexicon: LSJ
  rationale: La construcción expresa consecuencia lógica respecto del contexto anterior. «Por eso» conserva esa relación inferencial en un español natural y sobrio, sin endurecer el registro.
- source_word: ἐμακροθύμησεν
  english_pob_choice: was patient
  chosen_spanish: tuvo paciencia
  alternatives_spanish:
  - fue paciente
  - mostró paciencia
  - fue longánimo
  lexicon: BDAG/LSJ
  rationale: El verbo indica paciencia prolongada, forbearancia o longanimidad. «Tuvo paciencia» comunica bien esa idea en español contemporáneo sin perder el matiz relacional del verbo con ἐπʼ αὐτοῖς.
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: LSJ
  rationale: Aunque el inglés auditado usa «the Lord», en este proyecto el nombre divino se vierte como «Yahvé» cuando el contexto griego usa Κύριος para el título divino. Aquí la referencia es a Dios, no a un señor humano, por lo que se sigue el estándar del proyecto.
- source_word: ἐπʼ αὐτοῖς
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - hacia ellos
  - sobre ellos
  lexicon: LSJ
  rationale: Con μακροθυμέω, la relación idiomática en español es «tener paciencia con». «Con ellos» preserva ese valor relacional mejor que una traducción más literal de la preposición.
- source_word: ἐξέχεεν
  english_pob_choice: poured out
  chosen_spanish: derramó
  alternatives_spanish:
  - vertió
  - desbordó
  lexicon: LSJ
  rationale: El verbo mantiene una metáfora concreta de derramamiento. «Derramó» es la opción más natural y fiel para conservar la imagen sin suavizarla en exceso.
- source_word: τὸ ἔλεος αὐτοῦ
  english_pob_choice: his mercy
  chosen_spanish: su misericordia
  alternatives_spanish:
  - su compasión
  - su clemencia
  lexicon: BDAG/LSJ
  rationale: ἔλεος suele denotar misericordia, compasión o piedad. «Misericordia» es la forma más estable y reconocible en español bíblico, y conserva el peso teológico del sustantivo.
- source_word: ἐπʼ αὐτοὺς
  english_pob_choice: upon them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - encima de ellos
  - a ellos
  lexicon: LSJ
  rationale: Con el verbo de derramamiento, «sobre ellos» preserva la imagen espacial y mantiene un español fluido y reverente.
theological_decisions:
- issue: Traducción de Κύριος como nombre/título divino
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: 'El POB en español debe seguir la convención del proyecto: no enmascarar el nombre divino con «SEÑOR». En este contexto sapiencial, Κύριος designa a Dios; por eso se traduce como «Yahvé» para hacer auditable la decisión y conservar la referencia al nombre divino.'
  doctrine_reference: 'DOCTRINE.md: יהוה / YHWH → Yahvé; κύριος en referencia divina se rinde según el contexto del nombre divino'
- issue: Intensidad de ἐμακροθύμησεν
  english_pob_reading: was patient
  chosen_spanish_reading: tuvo paciencia
  alternative_spanish_readings:
  - fue paciente
  - fue longánimo
  rationale: 'No se fuerza una lectura doctrinal distinta: el verbo expresa paciencia divina ante ellos. «Tuvo paciencia» conserva la longanimidad sin introducir un término eclesiástico menos transparente.'
  doctrine_reference: BDAG/LSJ sobre μακροθυμέω; principio POB de equivalencia óptima sin borrar matiz
translation_notes:
  revision_awareness: 'La versión inglesa auditada ya fue considerada estable (latest_revision_pass: unchanged=true) y el control cruzado indicó high_agreement. La propuesta española sigue esa lectura sin introducir variantes textuales ni cambios de sentido.'
  spanish_consistency_notes:
  - Se mantiene el nombre divino como «Yahvé» según la convención del proyecto.
  - Se conserva la metáfora de derramamiento con «derramó».
  - Se evita el calco rígido de «longánimo» porque en este versículo la claridad comunicativa favorece «tuvo paciencia».
  - 'La preposición con el verbo de paciencia se ajusta a la idiomaticidad española: «con ellos».'
