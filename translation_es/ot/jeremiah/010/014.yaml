translation:
  language: es
  text: Todo hombre es necio[a], sin conocimiento; todo artesano del metal queda avergonzado por su ídolo, porque su imagen fundida es mentira[c][b], y no hay aliento en ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Todo hombre es embrutecido por falta de conocimiento». El hebreo también puede expresarse con un término más formal como «embrutecido», y la preposición puede entenderse causalmente: «por falta de conocimiento».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «su imagen fundida es falsedad».'
    reason: lexical_alternative
  - marker: c
    text: «Aliento» también puede traducirse «espíritu»; el punto es que los ídolos no tienen vida en ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִבְעַר
  english_pob_choice: is stupid
  chosen_spanish: es estúpido
  alternatives_spanish:
  - es bruto
  - es insensato
  - es necio
  lexicon: HALOT
  rationale: El verbo en nifal comunica torpeza/brutalidad moral e intelectual, no solo falta de datos. «Es estúpido» conserva la fuerza directa y moderna del juicio profético; «bruto» o «insensato» son posibles, pero menos precisos o más cargados de matiz.
- source_word: כָּל אָדָם
  english_pob_choice: Every man
  chosen_spanish: Todo hombre
  alternatives_spanish:
  - Toda persona
  - Todos los seres humanos
  - Cada hombre
  lexicon: HALOT
  rationale: אָדָם aquí funciona de manera genérica y representativa; «Todo hombre» conserva la forma masculina distributiva del hebreo y sigue la decisión auditada del POB inglés, sin borrar el alcance humano general.
- source_word: מִדַּעַת
  english_pob_choice: without knowledge
  chosen_spanish: sin conocimiento
  alternatives_spanish:
  - por falta de conocimiento
  - desde el conocimiento
  - carente de conocimiento
  lexicon: HALOT
  rationale: La preposición מִן con sustantivo abstracto es privativa/causal. «Sin conocimiento» suena natural en español y mantiene la relación de carencia que el hebreo expresa.
- source_word: הֹבִישׁ
  english_pob_choice: is put to shame
  chosen_spanish: es avergonzado
  alternatives_spanish:
  - es humillado
  - queda en vergüenza
  - es disgraciado
  lexicon: HALOT
  rationale: El hifil de בוש implica causar vergüenza. En español, «es avergonzado» preserva la pasiva y la exposición pública del artesano ante su propio ídolo; «humillado» sería posible, pero algo más interpretativo.
- source_word: צוֹרֵף
  english_pob_choice: metalworker
  chosen_spanish: metalúrgico
  alternatives_spanish:
  - orfebre
  - fundidor
  - artesano del metal
  lexicon: HALOT
  rationale: El participio designa al que trabaja y da forma al metal para fabricar imágenes. «Metalúrgico» es amplio y claro en español; «orfebre» sería demasiado específico y «fundidor» demasiado estrecho.
- source_word: מִפָּסֶל
  english_pob_choice: by his idol
  chosen_spanish: por su ídolo
  alternatives_spanish:
  - por su imagen esculpida
  - a causa de su ídolo
  - por la imagen tallada
  lexicon: HALOT
  rationale: פֶּסֶל puede referirse a una imagen idolátrica esculpida. «Por su ídolo» transmite bien la causa/instrumento del oprobio y la relación posesiva del artesano con su obra, sin añadir una forma específica no exigida por el contexto.
- source_word: שֶׁקֶר
  english_pob_choice: a lie
  chosen_spanish: mentira
  alternatives_spanish:
  - falsead
  - falsedad
  - engaño
  lexicon: HALOT
  rationale: El sustantivo expresa falsedad. «Mentira» es el equivalente más natural y contundente en español para la denuncia profética contra el objeto idolátrico.
- source_word: נִסְכּוֹ
  english_pob_choice: his cast image
  chosen_spanish: su imagen fundida
  alternatives_spanish:
  - su imagen vaciada
  - su ídolo fundido
  - su imagen de metal
  lexicon: HALOT
  rationale: El término apunta a una imagen vertida/fundida en metal. «Imagen fundida» mantiene la idea de fabricación por colado sin imponer una precisión técnica innecesaria; además armoniza con el campo semántico del metalworker.
- source_word: וְלֹא רוּחַ בָּם
  english_pob_choice: and there is no breath in them
  chosen_spanish: y no hay aliento en ellos
  alternatives_spanish:
  - y no hay espíritu en ellos
  - y no hay viento en ellos
  - y no tienen vida
  lexicon: HALOT
  rationale: רוּחַ puede ser aliento, espíritu o viento. En este polemismo contra ídolos, «aliento» comunica con claridad la ausencia de vida; se conserva la nota de que el texto afirma que las imágenes son inanimadas, sin borrar la posibilidad semántica de «espíritu».
theological_decisions:
- issue: Alcance de la acusación contra la humanidad y los artesanos
  english_pob_reading: The verse condemns idols as lifeless fabrications and their makers as exposed in ignorance, without importing a broader metaphysical claim beyond the text.
  chosen_spanish_reading: El versículo denuncia la necedad humana frente a la idolatría y la vergüenza del artesano, dentro de la polémica inmediata contra los ídolos inertes.
  alternative_spanish_readings:
  - El versículo enseña que toda la humanidad es absolutamente inútil en sentido general.
  - El versículo debe leerse como una afirmación doctrinal universal sobre la inteligencia humana.
  rationale: La escena inmediata es la burla profética contra la fabricación de ídolos. Mantener esa delimitación evita convertir el proverbio/denuncia en una tesis abstracta separada de su contexto.
  doctrine_reference: Primacía del contexto inmediato; mantener la tensión exegética sin ampliarla indebidamente.
translation_notes:
  revision_awareness: 'La redacción sigue el tramo auditado del POB inglés, sin cambios reportados en la última revisión, y conserva las tres decisiones léxicas principales: brutalidad/insensatez de אָדָם, vergüenza del artesano, y ausencia de vida en los ídolos.'
  spanish_consistency_notes:
  - Se usó «ídolo» para פֶּסֶל en coherencia con el contexto de polémica contra imágenes cultuales.
  - Se evitó «SEÑOR» o equivalentes de máscara porque este versículo no contiene el Nombre divino.
  - Se mantuvo un registro sobrio y bíblico en español moderno, sin introducir arcaísmos innecesarios.
  - La nota de «aliento/espíritu» preserva la ambigüedad semántica de רוּחַ sin resolverla artificialmente.
