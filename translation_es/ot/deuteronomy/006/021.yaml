translation:
  language: es
  text: 'entonces dirás a tu hijo[a]: «Éramos esclavos de Faraón en Egipto, y Yahvé nos sacó de Egipto con mano fuerte[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y dirás». La conjunción hebrea puede traducirse simplemente «y»; «entonces» resalta la secuencia instructiva del versículo anterior.
    reason: lexical_alternative
  - marker: b
    text: O «con una mano poderosa». El hebreo usa un modismo que señala la acción poderosa de liberación de Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ
  english_pob_choice: then you shall say
  chosen_spanish: entonces dirás
  alternatives_spanish:
  - y dirás
  lexicon: HALOT
  rationale: El hebreo une la acción al mandato previo con valor secuencial. «Entonces» comunica esa progresión instruccional en español sin perder el tono de mandato directo.
- source_word: לְבִנְךָ
  english_pob_choice: to your son
  chosen_spanish: a tu hijo
  alternatives_spanish:
  - a tu hijo varón
  - a tu muchacho
  lexicon: HALOT
  rationale: El hebreo dice literalmente «a tu hijo» en masculino singular. «Hijo» conserva la forma explícita del original y es natural en español.
- source_word: עֲבָדִים
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - siervos en esclavitud
  lexicon: HALOT
  rationale: En este contexto de Éxodo, el término expresa condición de servidumbre forzada. «Esclavos» preserva mejor el peso histórico y teológico que «siervos».
- source_word: לְפַרְעֹה
  english_pob_choice: to Pharaoh
  chosen_spanish: de Faraón
  alternatives_spanish:
  - para Faraón
  - bajo Faraón
  lexicon: HALOT
  rationale: En español, con «esclavos» la relación de pertenencia/subyugación se expresa de forma natural con «de Faraón». Mantiene la idea de sujeción del hebreo sin forzar una construcción poco idiomática.
- source_word: בְּמִצְרָיִם
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  alternatives_spanish:
  - dentro de Egipto
  lexicon: HALOT
  rationale: La preposición locativa se vierte de manera directa y natural como «en Egipto».
- source_word: וַיּוֹצִיאֵנוּ
  english_pob_choice: brought us out
  chosen_spanish: nos sacó
  alternatives_spanish:
  - nos hizo salir
  - nos sacó fuera
  lexicon: HALOT
  rationale: El hiphil de יצא expresa sacar/hacer salir. «Nos sacó» es claro, bíblico y fiel al movimiento de liberación.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la forma española estable del proyecto, en lugar de sustituirlo por un título. Esto mantiene visible el Tetragrama y su valor covenantal.
- source_word: מִמִּצְרַיִם
  english_pob_choice: from Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - fuera de Egipto
  lexicon: HALOT
  rationale: Después de «nos sacó», «de Egipto» comunica con naturalidad el punto de origen. Es fiel al valor de la preposición sin redundancia innecesaria.
- source_word: בְּיָד חֲזָקָה
  english_pob_choice: with a strong hand
  chosen_spanish: con mano fuerte
  alternatives_spanish:
  - con mano poderosa
  - con mano vigorosa
  - con mano fuerte y poderosa
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática. «Mano fuerte» reproduce literalmente el adjetivo חֲזָקָה y es inteligible en español; «fuerte» mantiene la tensión del texto sin suavizarlo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el Señor
  rationale: El texto usa el Tetragrama de forma directa. En la norma española del proyecto, la forma principal es «Yahvé», para evitar la sustitución titulativa y conservar el nombre propio del Dios del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Degree of bondage in עֲבָדִים
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - criados
  rationale: El contexto del éxodo describe opresión real, no servicio voluntario. «Esclavos» conserva la fuerza histórica y redentora del pasaje.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms analogy for bonded-status language
translation_notes:
  revision_awareness: 'El borrador sigue el texto hebreo masorético (WLC) y coincide con el recorrido auditado en inglés: se mantiene la secuencia exhortativa de וְאָמַרְתָּ, el léxico de esclavitud de עֲבָדִים, el nombre divino יְהוָה como Yahvé, y el modismo בְּיָד חֲזָקָה como «mano fuerte». No hay revisiones aplicadas respecto del pasaje base auditado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar español del proyecto para יְהוָה.
  - «Esclavos» conserva la fuerza de bondage del contexto del Éxodo y evita suavizar el término.
  - «Faraón» sigue la forma española convencional y clara para el personaje histórico.
  - La puntuación con comillas angulares mantiene un registro bíblico claro y publicable.
  - Las notas a pie preservan las alternativas documentadas sin introducir ambigüedades nuevas.
