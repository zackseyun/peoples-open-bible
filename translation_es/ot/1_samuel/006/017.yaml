translation:
  language: es
  text: 'Y estas son los tumores de oro que los filisteos devolvieron como ofrenda por la culpa a Yahvé: uno por Asdod[a], uno por Gaza, uno por Ascalón, uno por Gat, uno por Ecrón.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hinchazones de oro»; el término hebreo se refiere a la afección corporal representada por estas ofrendas votivas, y tradicionalmente se ha traducido de manera más específica como «hemorroides».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: And these are
  chosen_spanish: Y estas son
  alternatives_spanish:
  - Ahora estas son
  - Estas son
  lexicon: HALOT
  rationale: La fórmula introductoria enlaza con el contexto previo y presenta una enumeración explicativa; «Y estas son» conserva esa conexión sin sonar forzado en español.
- source_word: טְחֹרֵי הַזָּהָב
  english_pob_choice: the golden tumors
  chosen_spanish: las tumoraciones de oro
  alternatives_spanish:
  - los tumores de oro
  - las hinchazones de oro
  - las hemorroides de oro
  lexicon: HALOT
  rationale: El término hebreo designa la aflicción representada por las ofrendas votivas. «Tumoraciones» mantiene el sentido físico general sin ir más allá de lo que el contexto garantiza, y evita fijar demasiado pronto una identificación médica específica.
- source_word: הֵשִׁיבוּ
  english_pob_choice: returned
  chosen_spanish: devolvieron
  alternatives_spanish:
  - retornaron
  - volvieron a entregar
  - enviaron de vuelta
  lexicon: HALOT
  rationale: El verbo en hifil de שוב expresa la acción de devolver o hacer volver. «Devolvieron» suena natural en español y mantiene el sentido de restitución implícito en el contexto de la ofrenda expiatoria.
- source_word: פְלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los filisteos
  lexicon: HALOT
  rationale: Se conserva el etnónimo estándar en español bíblico.
- source_word: אָשָׁם
  english_pob_choice: a guilt offering
  chosen_spanish: como ofrenda por la culpa
  alternatives_spanish:
  - como ofrenda de culpa
  - como ofrenda de reparación
  - como expiación
  lexicon: HALOT
  rationale: אָשָׁם tiene sentido sacrificial y también de reparación. «Ofrenda por la culpa» conserva la relación con culpa/restauración sin encerrar el término en una sola etiqueta litúrgica más tradicional de la necesaria.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se mantiene el nombre divino en forma transliterada según la directriz del proyecto, en vez de ocultarlo tras «Señor».
- source_word: לְאַשְׁדּוֹד אֶחָד ... לְעֶקְרוֹן אֶחָד
  english_pob_choice: one for Ashdod ... one for Ekron
  chosen_spanish: una por Asdod, una por Gaza, una por Ascalón, una por Gat y una por Ecrón
  alternatives_spanish:
  - una para Asdod ...
  - una destinada a Asdod ...
  lexicon: HALOT
  rationale: La repetición de לְ + nombre + אֶחָד señala una pieza correspondiente a cada ciudad. «Una por» reproduce bien la distribución y resulta idiomática en español.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahweh
  rationale: El texto hebreo usa directamente el Tetragrámaton. La política terminológica del proyecto pide «Yahvé» en el texto principal para preservar el nombre del pacto y evitar el ocultamiento convencional.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Naturaleza de טְחֹרִים en este contexto
  english_pob_reading: golden tumors
  chosen_spanish_reading: tumoraciones de oro
  alternative_spanish_readings:
  - hemorroides de oro
  - hinchazones de oro
  - tumores de oro
  rationale: El hebreo alude a la afección corporal representada por las ofrendas, pero el contexto no obliga a precisar una sola identificación médica. «Tumoraciones» mantiene la referencia corporal y el carácter votivo sin borrar la tensión lexical documentada por la nota inglesa.
  doctrine_reference: Lexical note in English POB footnote a
translation_notes:
  revision_awareness: La versión inglesa auditada quedó sin cambios en la última pasada y con acuerdo alto entre revisores. El español aquí sigue esa lectura estable, pero ajusta el nombre divino según la política terminológica vigente del proyecto y conserva la alternativa lexical documentada para טְחֹרִים mediante nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה, coherente con la directriz del proyecto.
  - «Ofrenda por la culpa» conserva el valor sacrificial de אָשָׁם sin imponer una terminología litúrgica más estrecha.
  - La distribución por ciudades se expresa con «una por» para mantener la repetición del hebreo y la claridad en español.
  - Se evita traducir mecánicamente «tumores» sin la nota alternativa, porque el hebreo y el audit trail reconocen una ambigüedad lexical real.
