translation:
  language: es
  text: Hesbón con sus tierras de pastoreo[a], y Jazer con sus tierras de pastoreo—cuatro ciudades en total.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘tierras comunes’ o ‘terreno alrededor de la ciudad’ para cada ciudad; el término hebreo denota el espacio abierto perteneciente a una ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֶשְׁבּוֹן
  english_pob_choice: Heshbon
  chosen_spanish: Hesbón
  alternatives_spanish:
  - Heshbón
  - Hesbon
  lexicon: HALOT
  rationale: Es un nombre propio de lugar; se translitera en español como nombre geográfico, con adaptación gráfica y acento para la lectura natural en español.
- source_word: מִגְרָשֶׁהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus pastizales
  alternatives_spanish:
  - su tierra común
  - su terreno alrededor
  - su pasto común
  - sus pastizales
  lexicon: HALOT
  rationale: מִגְרָשׁ designa el terreno abierto perteneciente a la ciudad, frecuentemente usado para pastoreo. ‘Pastizales’ comunica bien esa función en español y mantiene el matiz de tierras abiertas anexas a la ciudad.
- source_word: יַעְזֵר
  english_pob_choice: Jazer
  chosen_spanish: Jazer
  alternatives_spanish:
  - Yazer
  - Jaazer
  lexicon: HALOT
  rationale: Nombre propio de lugar; se conserva la transliteración estándar sin traducir.
- source_word: כָּל עָרִים אַרְבַּע
  english_pob_choice: four cities in all
  chosen_spanish: cuatro ciudades en total
  alternatives_spanish:
  - todas las ciudades, cuatro
  - un total de cuatro ciudades
  - cuatro ciudades en conjunto
  lexicon: HALOT
  rationale: La construcción hebrea es idiomática (‘todas las ciudades, cuatro’). En español, ‘en total’ expresa de forma natural la suma final sin forzar el orden hebreo.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente inglés; el pasaje presenta alta concordancia entre texto fuente y auditoría inglesa. La traducción española conserva esa estabilidad, ajustando solo la naturalidad idiomática del español.
  spanish_consistency_notes:
  - Se mantiene el principio del proyecto de transliterar nombres propios geográficos.
  - Se preserva la distinción lexical de מִגְרָשׁ con una nota que recoge las alternativas semánticas documentadas.
  - La cifra final se expresa con un giro idiomático español equivalente al resumen hebreo.
