translation:
  language: es
  text: 'Ella dijo a Elías[a]: «¿Qué tengo yo que ver contigo, hombre de Dios? ¿Has venido a verme para traer a memoria mi iniquidad y para hacer morir a mi hijo?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi pecado» o «mi culpa». El término hebreo puede referirse a la mala acción, la culpa o la carga/consecuencia de la culpa.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַה לִּי וָלָךְ
  english_pob_choice: What do I have to do with you
  chosen_spanish: ¿Qué tengo yo contigo?
  alternatives_spanish:
  - ¿Qué tengo yo que ver contigo?
  - ¿Qué hay entre tú y yo?
  lexicon: HALOT
  rationale: Expresa en español la protesta idiomática y la distancia confrontativa del hebreo sin volverla demasiado literal o extraña.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: man of God
  chosen_spanish: hombre de Dios
  alternatives_spanish:
  - varón de Dios
  - siervo de Dios
  lexicon: HALOT
  rationale: Mantiene el título formal y bíblico. 'Hombre de Dios' es la forma más natural y reconocible en español sin perder el carácter de título.
- source_word: בָּאתָ אֵלַי
  english_pob_choice: Have you come to me
  chosen_spanish: ¿Has venido a mí?
  alternatives_spanish:
  - ¿Viniste a mí?
  - ¿Has llegado hasta mí?
  lexicon: HALOT
  rationale: El perfecto en discurso directo conserva bien el tono acusatorio y retórico del hebreo.
- source_word: לְהַזְכִּיר
  english_pob_choice: to bring ... to remembrance
  chosen_spanish: traer a memoria
  alternatives_spanish:
  - hacer recordar
  - poner en memoria
  lexicon: HALOT
  rationale: 'Reproduce el matiz causativo de זכר en hifil: no solo ''recordar'', sino provocar que algo salga a la memoria o quede expuesto ante la conciencia.'
- source_word: עֲוֺנִי
  english_pob_choice: my iniquity
  chosen_spanish: mi iniquidad
  alternatives_spanish:
  - mi pecado
  - mi culpa
  lexicon: HALOT
  rationale: '''Iniquidad'' preserva el peso moral del término y deja abierta la tensión entre acto, culpa y consecuencia, como en el inglés auditado.'
- source_word: וּלְהָמִית
  english_pob_choice: and to cause ... to die
  chosen_spanish: y para hacer morir
  alternatives_spanish:
  - y para matar
  - y para dar muerte
  lexicon: HALOT
  rationale: Conserva la fuerza causativa del hifil de מות con una construcción natural en español.
- source_word: בְּנִי
  english_pob_choice: my son
  chosen_spanish: mi hijo
  alternatives_spanish:
  - mi hijo varón
  - mi niño
  lexicon: HALOT
  rationale: '''Hijo'' es la equivalencia directa y adecuada al contexto; evita suavizar la referencia específica del hebreo.'
theological_decisions:
- issue: El alcance de עֲוֺנִי en la acusación de la viuda
  english_pob_reading: my iniquity
  chosen_spanish_reading: mi iniquidad
  alternative_spanish_readings:
  - mi pecado
  - mi culpa
  rationale: 'La traducción conserva la tensión teológica: la palabra puede abarcar acción pecaminosa, culpa o responsabilidad por la culpa. ''Iniquidad'' permite esa amplitud sin resolverla prematuramente.'
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior agregando el anclaje [a] junto a 'Elías' en el texto español, de modo que la nota quede correctamente vinculada.
  spanish_consistency_notes:
  - Se preserva el trato directo y acusatorio del hebreo con pregunta retórica.
  - Se mantiene la distinción causal de los verbos en infinitivo con 'traer a memoria' y 'hacer morir'.
  - Se usa 'iniquidad' por coherencia con el audit trail en inglés y para conservar la tensión semántica del hebreo.
  - La puntuación con comillas y signos de apertura sigue la norma española.
  - '''hombre de Dios'' se mantiene como título, no como descripción genérica.'
