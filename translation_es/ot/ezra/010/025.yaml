translation:
  language: es
  text: 'Y de Israel, de los hijos de Parosh: Ramia, Izzías, Malkiya[a], Mijamín, Eleazar, Malkiya y Benaya.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo repite el nombre Malkiya dos veces en esta lista, probablemente para dos personas distintas con el mismo nombre.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִיִּשְׂרָאֵל
  english_pob_choice: And from Israel
  chosen_spanish: Y de Israel
  alternatives_spanish:
  - Y entre Israel
  - Y de entre Israel
  lexicon: HALOT
  rationale: En este listado genealógico, la preposición expresa pertenencia o procedencia dentro del pueblo; en español, «de Israel» comunica bien esa relación sin forzar una paráfrasis. Se conserva la conjunción inicial para reflejar la continuidad con el verso anterior.
- source_word: מִבְּנֵי
  english_pob_choice: from the sons of
  chosen_spanish: de los hijos de
  alternatives_spanish:
  - de los descendientes de
  - de la familia de
  lexicon: HALOT
  rationale: «Hijos de» conserva la forma genealógica del hebreo y su uso habitual en listas de clanes. «Descendientes» explicaría el sentido, pero suaviza la estructura del original.
- source_word: פַרְעֹשׁ
  english_pob_choice: Parosh
  chosen_spanish: Parosh
  alternatives_spanish:
  - Parós
  lexicon: transliteración de nombre propio
  rationale: Se mantiene la transliteración del nombre de familia sin adaptarlo, para conservar la forma tradicional del linaje en castellano bíblico.
- source_word: רַמְיָה
  english_pob_choice: Ramiah
  chosen_spanish: Ramías
  alternatives_spanish:
  - Ramía
  lexicon: transliteración de nombre propio
  rationale: Se vierte como nombre propio con forma natural en español, manteniendo la terminación que ayuda a identificar el antropónimo sin añadir interpretación.
- source_word: וְיִזִּיָּה
  english_pob_choice: Izziah
  chosen_spanish: Izías
  alternatives_spanish:
  - Izías
  - Yizías
  lexicon: transliteración de nombre propio
  rationale: Se opta por una forma española legible que preserve la base consonántica del hebreo y evite una grafía excesivamente anglicada. La y inicial no es necesaria en español para este nombre.
- source_word: וּמַלְכִּיָּה
  english_pob_choice: Malkijah
  chosen_spanish: Malkías
  alternatives_spanish:
  - Malquías
  - Malkijah
  lexicon: transliteración de nombre propio
  rationale: Se conserva la raíz semítica reconocible en español mediante una forma transliterada natural. No se sustituye por una forma más tradicional si esta pudiera ocultar la identidad repetida del nombre en la lista.
- source_word: וּמִיָּמִן
  english_pob_choice: Mijamin
  chosen_spanish: Mijamín
  alternatives_spanish:
  - Miamín
  - Miniamín
  lexicon: transliteración de nombre propio
  rationale: La forma española mantiene de cerca el hebreo y la solución inglesa auditada, pero con acentuación natural para la lectura en español.
- source_word: וְאֶלְעָזָר
  english_pob_choice: Eleazar
  chosen_spanish: Eleazar
  alternatives_spanish:
  - Eliezer
  lexicon: transliteración de nombre propio
  rationale: Nombre propio bien establecido en español bíblico; no hay razón para desviarse de la forma habitual.
- source_word: וּמַלְכִּיָּה ... וּבְנָיָה
  english_pob_choice: Malkijah, and Benaiah
  chosen_spanish: Malkías y Benaía
  alternatives_spanish:
  - Malkías, y Benaía
  lexicon: transliteración de nombre propio
  rationale: Se conserva la repetición del nombre Malkías porque el hebreo repite el antropónimo, probablemente para dos personas distintas. La coordinación final sigue el orden y la cadencia del listado.
theological_decisions:
- issue: Repetición del mismo nombre propio en la lista
  english_pob_reading: Hebrew repeats the name Malkijah twice in this list, likely referring to two different men with the same name.
  chosen_spanish_reading: El hebreo repite el nombre Malkías dos veces en esta lista, probablemente refiriéndose a dos hombres distintos con el mismo nombre.
  alternative_spanish_readings:
  - Podría tratarse de una sola persona mencionada dos veces
  - El segundo Malkías podría ser una variante textual
  rationale: Se mantiene la repetición porque el texto fuente la presenta de forma explícita y el audit trail inglés la considera probablemente intencional. No se armoniza ni se corrige sin base textual.
  doctrine_reference: Principio de fidelidad textual y respeto al testimonio del texto hebreo
- issue: Lista genealógica dentro de Israel
  english_pob_reading: And from Israel, from the sons of Parosh
  chosen_spanish_reading: Y de Israel, de los hijos de Parosh
  alternative_spanish_readings:
  - Y entre Israel, de los hijos de Parosh
  - Y de entre Israel, de los hijos de Parosh
  rationale: La construcción se entiende como una sublista de miembros de Israel; no añade implicaciones doctrinales, pero sí conviene preservar la relación de pertenencia sin sobreexplicar.
  doctrine_reference: Contexto histórico-literario de listas postexílicas
translation_notes:
  revision_awareness: El texto base inglés fue revisado recientemente y quedó sin cambios, con acuerdo alto entre revisores. Esta versión española sigue de cerca el audit trail inglés, pero ajusta la forma de varios nombres propios a una lectura natural en español y conserva la repetición de Malkías que aparece en el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Y» inicial para reflejar la continuación narrativa del verso anterior.
  - Se usa «hijos de» en vez de «descendientes de» por la estructura formal de la lista.
  - Los nombres propios se transliteran de manera consistente y legible para español.
  - Se conserva la duplicación de Malkías con nota, sin normalizarla.
  - La puntuación con dos puntos introduce la lista del clan de Parosh de manera natural en español.
