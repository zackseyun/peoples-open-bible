revisions:
- from: 'Entonces los hombres de Efraín le dijeron[a]: «¿Qué es esta cosa que has hecho con nosotros[b], al no llamarnos cuando fuiste a pelear contra Madián?» Y contendieron con él con gran fuerza.'
  to: 'Entonces los hombres de Efraín le dijeron[a]: «¿Qué es esta cosa que nos has hecho, al no llamarnos cuando fuiste a pelear contra Madián?». Y contendieron con él con fuerza[b].'
