base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/015/002.yaml
  text: Then David said[a], “No one is to carry the ark of God except the Levites[b], for Yahweh has chosen them to carry the ark of Yahweh and to minister to him forever.”
  footnotes:
  - marker: a
    text: Or, 'The ark of God is not to be carried by anyone except the Levites.' The Hebrew is elliptical and leaves the implied subject unstated.
    reason: lexical_alternative
  - marker: b
    text: '''Minister to him'' may also be rendered ''serve him.'' The Hebrew verb often refers to sacred or liturgical service.'
    reason: lexical_alternative
