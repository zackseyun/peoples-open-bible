  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego y sigue de cerca el audit trail inglés: πάρεστίν σοι como disponibilidad/capacidad constante, μεγάλως ἰσχύειν como despliegue de gran fuerza, y la metáfora de ''tu brazo'' se conserva correctamente. Sin embargo, en la segunda cláusula ἀντιστήσεται con el interrogativo retórico pide mejor una formulación española de resistencia eficaz, y la puntuación actual con ''¿y quién...?'' resulta menos natural después de una oración afirmativa causal.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse ligeramente para mayor naturalidad bíblica y precisión retórica. 'Porque siempre está en tu poder mostrar gran fuerza' funciona bien. En cambio, '¿y quién resistirá al poder de tu brazo?' suena algo menos idiomático que '¿quién podrá resistir la fuerza de tu brazo?'; además, conviene omitir la conjunción interrogativa inicial en español.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, espíritu, carne, gracia, etc. La conservación de 'brazo' respeta la decisión teológica documentada de mantener la antropomorfía. La nota léxica alternativa también es adecuada y puede mantenerse con un ajuste menor para sonar más natural en español.
  issues:
  - severity: medium
    issue: La formulación '¿y quién resistirá al poder de tu brazo?' es menos natural y menos precisa retóricamente en español.
    rationale: τίς ἀντιστήσεται expresa resistencia eficaz imposible frente al poder divino. En español, '¿quién podrá resistir...?' comunica mejor la imposibilidad implícita que el futuro simple desnudo, y 'la fuerza de tu brazo' enlaza mejor con κράτει sin sonar redundante con 'poder de tu brazo'.
  - severity: low
    issue: La conjunción 'y' al inicio de la pregunta no es necesaria en español.
    rationale: Aunque καὶ coordina las cláusulas en griego, en español una pausa con coma seguida de la interrogación retórica suena más fluida y conserva plenamente la relación discursiva.
  - severity: low
    issue: La nota alternativa puede afinarse estilísticamente.
    rationale: '''está siempre a tu disposición ejercer gran poder'' es entendible, pero ''siempre está a tu disposición ejercer gran poder'' suena más natural.'
  revised_spanish_text: Porque siempre está en tu poder mostrar gran fuerza[a], ¿quién podrá resistir la fuerza de tu brazo?
