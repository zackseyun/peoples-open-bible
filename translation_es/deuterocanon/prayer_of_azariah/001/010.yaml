translation:
  language: es
  text: Y ahora no podemos abrir la boca[a]; sobre tus esclavos[b] y sobre los que te reverencian ha venido la vergüenza y el oprobio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'no podemos hablar'. El griego conserva la imagen de 'abrir la boca', con matiz idiomático de poder o libertad para hablar.
    reason: lexical_alternative
  - marker: b
    text: O 'tus siervos'. El griego dice δοῦλοι, 'esclavos', subrayando pertenencia y subordinación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνοῖξαι τὸ στόμα
  english_pob_choice: opening our mouth
  chosen_spanish: abrir la boca
  alternatives_spanish:
  - abrir nuestra boca
  - hablar
  lexicon: BDAG
  rationale: La expresión griega es un modismo para la capacidad o libertad de hablar. En español, 'abrir la boca' conserva la imagen idiomática sin sonar forzado; 'hablar' sería más directo pero perdería esa transparencia semántica.
- source_word: αἰσχύνη
  english_pob_choice: shame
  chosen_spanish: vergüenza
  alternatives_spanish:
  - deshonra
  - afrenta
  lexicon: LSJ
  rationale: '''Vergüenza'' reproduce el valor básico de αἰσχύνη y funciona bien en paralelo con ''oprobio''. ''Deshonra'' o ''afrenta'' son posibles, pero aquí ''vergüenza'' mantiene un tono natural y fiel.'
- source_word: ὄνειδος
  english_pob_choice: reproach
  chosen_spanish: oprobio
  alternatives_spanish:
  - reproche
  - afrenta
  lexicon: LSJ
  rationale: ὄνειδος designa burla, censura o insulto público. 'Oprobio' conserva mejor el peso de vergüenza pública y desdoro que 'reproche', que en español puede sonar demasiado débil o puramente verbal.
- source_word: ἐγενήθη
  english_pob_choice: have come upon
  chosen_spanish: ha venido sobre
  alternatives_spanish:
  - ha llegado sobre
  - se ha abatido sobre
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente 'llegó a ser', en español la construcción con abstractos como 'vergüenza y oprobio' se expresa de modo natural como algo que 'ha venido sobre' alguien. Esto conserva el sentido resultativo sin rigidizar la sintaxis.
- source_word: δούλων σου
  english_pob_choice: your slaves
  chosen_spanish: tus esclavos
  alternatives_spanish:
  - tus siervos
  lexicon: BDAG
  rationale: Se mantiene 'esclavos' porque el griego δοῦλοι enfatiza pertenencia y subordinación. La opción tradicional 'siervos' suaviza la fuerza léxica y borra una tensión documentada en el texto.
- source_word: τῶν σεβομένων σε
  english_pob_choice: those who revere you
  chosen_spanish: los que te reverencian
  alternatives_spanish:
  - los que te veneran
  - los que te temen
  lexicon: BDAG
  rationale: σεβομένων expresa reverencia devota. 'Reverenciar' es una forma clara y sobria en español para conservar el matiz de respeto religioso sin reducirlo a temor ni cargarlo demasiado hacia 'adorar'.
theological_decisions:
- issue: δοῦλοι en una oración dirigida a Dios
  english_pob_reading: your slaves
  chosen_spanish_reading: tus esclavos
  alternative_spanish_readings:
  - tus siervos
  rationale: El texto presenta a los fieles como pertenecientes a Dios en una relación de dependencia y sujeción. Seguir 'esclavos' preserva esa fuerza teológica y lexical; 'siervos' se conserva solo como alternativa registrada por sensibilidad de registro.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, δοῦλος; Translation philosophy §1'
- issue: Expresión idiomática de incapacidad para hablar
  english_pob_reading: we cannot open our mouth
  chosen_spanish_reading: no podemos abrir la boca
  alternative_spanish_readings:
  - no podemos hablar
  rationale: La imagen del 'abrir la boca' mantiene visible el modismo griego y comunica mejor la vergüenza que impide hablar. 'Hablar' sería comprensible, pero desdibujaría la metáfora corporal presente en el original.
  doctrine_reference: Greek idiom reflected in BDAG; source-text syntax
- issue: Pareja semántica αἰσχύνη / ὄνειδος
  english_pob_reading: shame and reproach
  chosen_spanish_reading: vergüenza y oprobio
  alternative_spanish_readings:
  - vergüenza y reproche
  - deshonra y afrenta
  rationale: La combinación 'vergüenza y oprobio' conserva la doble carga de deshonra interna y pública. 'Reproche' puede sonar más discursivo que ὄνειδος; 'oprobio' mantiene mejor el carácter de vergüenza social.
  doctrine_reference: Lexical pairing from LSJ; public shame nuance
translation_notes:
  revision_awareness: La versión inglesa fue revisada desde una formulación más literal ('there is no opening our mouth') a 'we cannot open our mouth' por naturalidad sintáctica; también hubo una corrección doctrinal importante para restaurar 'slaves' frente a 'servants'. La presente versión española sigue la lectura final auditable, mantiene la fuerza de δοῦλοι y evita suavizar la imagen del habla impedida.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparezca el nombre divino; en este verso no ocurre.
  - '''Esclavos'' se usa de forma consistente para δοῦλοι cuando la subordinación perteneciente es saliente; no se sustituye por ''siervos'' salvo nota alternativa.'
  - '''Reverencian'' se eligió por claridad devocional y por evitar tanto un mero temor psicológico como una adoración excesivamente interpretativa.'
  - La puntuación usa punto y coma para reflejar la coordinación fuerte del griego entre incapacidad de hablar y vergüenza/oprobio.
