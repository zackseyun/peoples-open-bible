translation:
  language: es
  text: que puso señales y prodigios en la tierra de Egipto, y en Israel y entre la humanidad[a] hasta este día, y te hiciste un nombre, como sucede hasta hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘entre el género humano’ o ‘entre los seres humanos’. El hebreo אָדָם es un término colectivo para la humanidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׂמְתָּ
  english_pob_choice: set
  chosen_spanish: puso
  alternatives_spanish:
  - colocó
  - estableció
  - hizo
  lexicon: HALOT
  rationale: El hebreo שׂוּם significa literalmente ‘poner/colocar/establecer’. En esta construcción con ‘señales y prodigios’, ‘puso’ conserva la imagen verbal sin sonar forzado en español; ‘hizo’ quedaría más interpretativo.
- source_word: אֹתוֹת
  english_pob_choice: signs
  chosen_spanish: señales
  alternatives_spanish:
  - signos
  - señales milagrosas
  lexicon: HALOT
  rationale: ‘Señales’ es el equivalente más natural y bíblico en español para אוֹת en contextos de actos extraordinarios de Dios. ‘Signos’ es posible, pero menos natural en registro bíblico general.
- source_word: מֹפְתִים
  english_pob_choice: wonders
  chosen_spanish: prodigios
  alternatives_spanish:
  - maravillas
  - milagros
  - portentos
  lexicon: HALOT
  rationale: ‘Prodigios’ transmite bien el carácter extraordinario de מוֹפְתִים y mantiene la pareja tradicional con ‘señales’ sin reducirla a un término demasiado técnico como ‘milagros’.
- source_word: בְּאֶרֶץ מִצְרַיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  - en el país de Egipto
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de אֶרֶץ como ‘tierra’, tal como el inglés POB preserva ‘land’. Esto mantiene la concreción geográfica y el paralelismo del verso.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - hasta el día de hoy
  - hasta hoy
  lexicon: HALOT
  rationale: ‘Hasta este día’ refleja bien la deixis hebrea y conserva el tono bíblico, sin perder claridad en español.
- source_word: וּבְיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: y en Israel
  alternatives_spanish:
  - e Israel
  - entre Israel
  lexicon: HALOT
  rationale: Se mantiene la preposición local/relacional más directa. El español ‘en Israel’ reproduce la continuidad del obrar divino dentro de Israel sin forzar el matiz.
- source_word: וּבָאָדָם
  english_pob_choice: among mankind
  chosen_spanish: y entre la humanidad
  alternatives_spanish:
  - y entre los hombres
  - y entre la gente
  - y entre la raza humana
  lexicon: HALOT
  rationale: אָדָם es colectivo y genérico. ‘Humanidad’ comunica bien el alcance universal y evita un masculino genérico innecesario; se conserva ‘entre’ para reflejar la lectura relacional del hebreo y del inglés POB.
- source_word: וַתַּעֲשֶׂה לְּךָ שֵׁם
  english_pob_choice: made a name for yourself
  chosen_spanish: te hiciste un nombre
  alternatives_spanish:
  - te ganaste renombre
  - te hiciste famoso
  - te adquiriste un nombre
  lexicon: HALOT
  rationale: El hebreo es un modismo de reputación/renombre. ‘Te hiciste un nombre’ preserva la imagen idiomática y la fuerza reflexiva de לְךָ, igual que el inglés POB.
- source_word: כַּיּוֹם הַזֶּה
  english_pob_choice: as it is this day
  chosen_spanish: como en este día
  alternatives_spanish:
  - como hasta este día
  - tal como hoy
  lexicon: HALOT
  rationale: 'La frase final queda mejor en español como comparación temporal: ‘como en este día’. Mantiene el eco del hebreo y evita una repetición demasiado plana de ‘este día’.'
theological_decisions:
- issue: Áדָם como colectivo humano sin borrar su valor lexical
  english_pob_reading: among mankind
  chosen_spanish_reading: entre la humanidad
  alternative_spanish_readings:
  - entre los hombres
  - entre la gente
  rationale: El texto hebreo usa אָדָם de manera colectiva para referirse a la humanidad en general. ‘Entre la humanidad’ expresa ese alcance universal y evita restringirlo a varones; además, preserva el contraste con Israel dentro del versículo.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4; contested terms for אָדָם'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que reubicó temporalmente ‘to this day’ para que abarque con mayor naturalidad la serie de acciones mencionadas. En español se reflejó esa misma lógica con ‘hasta este día’ colocado después de ‘entre la humanidad’, antes de la cláusula final de renombre.
  spanish_consistency_notes:
  - Se mantuvo el patrón bíblico de pares semánticos ‘señales y prodigios’ para reflejar אֹתוֹת וּמֹפְתִים.
  - Se conservó ‘tierra de Egipto’ para respetar la imaginería de אֶרֶץ.
  - Se evitó ‘SEÑOR’ u otra sustitución para el Nombre divino, porque este versículo no lo contiene.
  - Se eligió ‘humanidad’ para אָדָם por claridad inclusiva y porque el contexto habla de alcance general, no de un individuo.
  - La clausula final ‘como en este día’ conserva el comparativo hebreo sin convertirlo en una simple fórmula idiomática opaca.
