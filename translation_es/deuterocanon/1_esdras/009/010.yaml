    issue: ἐφώνησαν está vertido como «respondió»
    rationale: El verbo griego denota alzar la voz públicamente; la auditoría inglesa eligió «cried out». «Respondió» reduce ese matiz y además queda en singular con un sujeto de sentido plural.
  - severity: low
    issue: «con voz fuerte» suena algo rígido en español
    rationale: Aunque entendible, «a gran voz» es una formulación más natural y digna para μεγάλῃ τῇ φωνῇ en este registro.
  - severity: low
    issue: La nota a refleja una alternativa no apoyada por la auditoría inglesa
    rationale: El inglés conserva «all the multitude» y «the whole crowd». «Todo el pueblo» introduce una alternativa distinta; conviene ceñirse a «toda la multitud» o «toda la muchedumbre».
