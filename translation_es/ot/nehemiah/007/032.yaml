translation:
  language: es
  text: los hombres de Betel y Hai[a], ciento veintitrés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la gente de Betel y Hai». El hebreo dice literalmente «los hombres de Betel y Hai».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי
  english_pob_choice: the men of
  chosen_spanish: los hombres de
  alternatives_spanish:
  - la gente de
  - los habitantes de
  lexicon: HALOT
  rationale: אַנְשֵׁי es el constructo plural de אִישׁ, aquí introduciendo un grupo identificado por un lugar. «Los hombres de» conserva la referencia masculina explícita del hebreo y sigue de cerca la fuerza léxica observada en el audit trail inglés. «La gente de» o «los habitantes de» suavizan el rasgo de género pero pierden esa precisión.
- source_word: בֵית אֵל
  english_pob_choice: Bethel
  chosen_spanish: Betel
  alternatives_spanish:
  - Beth-el
  lexicon: HALOT
  rationale: Es un nombre propio de lugar. En español bíblico y geográfico, «Betel» es la transliteración más natural y reconocible; no conviene traducirlo como «casa de Dios» en este contexto censal.
- source_word: וְהָעָי
  english_pob_choice: and Ai
  chosen_spanish: y de Hai
  alternatives_spanish:
  - y Hai
  - y la ciudad de Hai
  lexicon: HALOT
  rationale: El hebreo nombra el lugar con artículo, pero en español el nombre propio suele ir sin artículo; aun así, la preposición «de» ayuda a reflejar la coordinación de dos grupos vinculados a localidades. «Hai» reproduce el nombre tradicional español de Ai.
- source_word: מֵאָה עֶשְׂרִים וּשְׁלֹשָׁה
  english_pob_choice: one hundred twenty-three
  chosen_spanish: ciento veintitrés
  alternatives_spanish:
  - ciento veintitrés personas
  - ciento veintitrés en total
  lexicon: HALOT
  rationale: Es un numeral cardinal que da el total del censo. «Ciento veintitrés» preserva con exactitud la cantidad y suena natural en español moderno; añadir «personas» o «en total» sería explicativo pero no necesario para el hebreo.
translation_notes:
  revision_awareness: El audit trail inglés muestra acuerdo alto y sin revisiones aplicadas. La decisión principal en español fue conservar el valor masculino explícito de אַנְשֵׁי con «los hombres de», manteniendo además el nombre propio de lugar en transliteración estándar española («Betel», «Hai»).
  spanish_consistency_notes:
  - Se mantuvo el estilo censal breve y directo del hebreo.
  - «Hai» se usa como forma española tradicional de Ai para consistencia bíblica en español.
  - La nota al pie preserva la alternativa semántica documentada por la POB inglesa sin introducir ampliaciones ajenas al texto.
