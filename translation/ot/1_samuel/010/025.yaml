id: 1SA.10.25
reference: 1 Samuel 10:25
source:
  edition: WLC
  text: וַ/יְדַבֵּ֨ר שְׁמוּאֵ֜ל אֶל הָ/עָ֗ם אֵ֚ת מִשְׁפַּ֣ט הַ/מְּלֻכָ֔ה וַ/יִּכְתֹּ֣ב בַּ/סֵּ֔פֶר וַ/יַּנַּ֖ח לִ/פְנֵ֣י יְהוָ֑ה וַ/יְשַׁלַּ֧ח שְׁמוּאֵ֛ל אֶת כָּל הָ/עָ֖ם אִ֥ישׁ לְ/בֵיתֽ/וֹ־־־׃
translation:
  text: Then Samuel told the people the rights and duties of the kingship[a], and he wrote them in the book and laid it before Yahweh. Then Samuel sent all the people away[b], each man to his house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “the procedure/custom of the kingship.” The Hebrew phrase can refer to the legal ordinances or established practice of royal rule.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “each man to his house,” a distributive expression meaning the people departed individually to their own households.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  chosen: told
  alternatives:
  - spoke
  - declared
  lexicon: HALOT
  rationale: The verb דבר with אֶל plus a direct object of content naturally means speaking to someone about something. 'Told' is idiomatic English here and fits the explanatory content that follows better than the more wooden 'spoke.'
- source_word: מִשְׁפַּט הַמְּלֻכָה
  chosen: the rights and duties of the kingship
  alternatives:
  - the custom of the kingdom
  - the legal judgment of the monarchy
  - the procedure of kingship
  lexicon: HALOT
  rationale: מִשְׁפַּט can denote ordinance, legal right, due, or prescribed practice. In this context Samuel is setting out the constitutional norms or regulations pertaining to kingship. 'Rights and duties' captures the reciprocal legal framework better than the traditional but potentially opaque 'manner of the kingdom/kingdom.' 'Kingship' better reflects מְלֻכָה as the institution or office rather than a territorial realm.
- source_word: וַיִּכְתֹּב בַּסֵּפֶר
  chosen: he wrote them in the book
  alternatives:
  - he wrote it in the scroll
  - he wrote it in a book
  lexicon: HALOT
  rationale: The singular suffix is not explicit in Hebrew after the previous clause, but English benefits from supplying 'them' to refer to the stipulations just mentioned. סֵפֶר can mean scroll, document, or book; 'book' is acceptable modern English and does not over-specify material form in the main text.
- source_word: וַיַּנַּח לִפְנֵי יְהוָה
  chosen: laid it before the LORD
  alternatives:
  - deposited it before the LORD
  - set it before the LORD
  lexicon: HALOT
  rationale: The verb conveys placing or setting down. 'Laid it before the LORD' is natural English and preserves the likely cultic sense of depositing the written record in Yahweh's presence.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וַיְשַׁלַּח
  chosen: sent all the people away
  alternatives:
  - dismissed all the people
  - sent all the people
  lexicon: HALOT
  rationale: In context the sense is dismissal to depart, not merely dispatching on a mission. 'Sent ... away' makes that clear in readable English.
- source_word: אִישׁ לְבֵיתוֹ
  chosen: each man to his house
  alternatives:
  - each one to his home
  - every man to his house
  lexicon: HALOT
  rationale: The Hebrew is singular distributive and grammatically masculine. Following the gender-accurate guideline, 'each man' preserves the form and representative force better than a gender-neutral recasting. 'House' is retained rather than 'home' for closer correspondence to בַּיִת.
