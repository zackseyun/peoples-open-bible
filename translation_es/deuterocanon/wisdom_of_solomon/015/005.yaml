translation:
  language: es
  text: Verlos trae oprobio[a] a los insensatos, y anhelan la forma de una imagen sin vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su apariencia llega a ser un oprobio para los insensatos, y [ellos] desean la forma de una imagen muerta, sin aliento». El griego de la segunda cláusula es condensado y admite una versión más literal, aunque menos clara.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὄψις
  english_pob_choice: sight
  chosen_spanish: vista
  alternatives_spanish:
  - apariencia
  - mirada
  lexicon: LSJ
  rationale: ὄψις puede significar vista, apariencia o aspecto visible. «Vista de ellos» conserva el valor perceptivo del griego y suena natural en español.
- source_word: ἄφροσιν
  english_pob_choice: fools
  chosen_spanish: insensatos
  alternatives_spanish:
  - necios
  - fools
  lexicon: LSJ
  rationale: ἄφρων expresa falta de sensatez o entendimiento. «Insensatos» mantiene el matiz moral e intelectual sin sonar excesivamente coloquial.
- source_word: εἰς ὄνειδος
  english_pob_choice: as a reproach
  chosen_spanish: como oprobio
  alternatives_spanish:
  - para vergüenza
  - como deshonra
  lexicon: LSJ
  rationale: 'La expresión señala resultado o carácter: la vista de los ídolos les resulta vergonzosa o reprochable. «Oprobio» conserva la fuerza nominal del término griego.'
- source_word: ἔρχεται
  english_pob_choice: comes
  chosen_spanish: llega
  alternatives_spanish:
  - viene
  - se vuelve
  lexicon: LSJ
  rationale: «Llega» reproduce el movimiento verbal de ἔρχεται y encaja bien con la construcción española sin perder la imagen original.
- source_word: ποθεῖ
  english_pob_choice: they long for
  chosen_spanish: anhelan
  alternatives_spanish:
  - desean
  - suspiran por
  lexicon: LSJ
  rationale: En el contexto, el griego apunta a la atracción de los insensatos hacia la imagen. «Anhelan» comunica ese deseo intenso de forma idiomática.
- source_word: νεκρᾶς εἰκόνος
  english_pob_choice: a lifeless image
  chosen_spanish: una imagen sin vida
  alternatives_spanish:
  - una imagen muerta
  - una imagen carente de vida
  lexicon: LSJ
  rationale: νεκρός es literalmente «muerto», pero junto con ἄπνουν describe un objeto inanimado. «Sin vida» expresa bien la idea en español.
- source_word: εἶδος
  english_pob_choice: form
  chosen_spanish: forma
  alternatives_spanish:
  - aspecto
  - figura
  lexicon: LSJ
  rationale: εἶδος designa la forma visible o apariencia. «Forma» es el equivalente más directo y evita redundancia con «vista».
- source_word: ἄπνουν
  english_pob_choice: lifeless
  chosen_spanish: sin vida
  alternatives_spanish:
  - sin aliento
  - sin respiración
  lexicon: LSJ
  rationale: ἄπνους significa literalmente «sin aliento». «Sin vida» comunica la oposición entre un ídolo fabricado y un ser vivo con claridad natural en español.
theological_decisions:
- issue: Sintaxis comprimida del segundo hemistiquio
  english_pob_reading: The second clause is rendered with an implied plural subject ('they long for') referring to the foolish, rather than attributing desire to 'the sight.'
  chosen_spanish_reading: Se entiende que los insensatos son el sujeto implícito de «anhelan», no la «vista».
  alternative_spanish_readings:
  - «La vista de ellos ... desea la forma...» (más literal pero confuso)
  - «La vista de ellos ... es deseada...» (desplaza el sentido)
  rationale: El griego es compacto y puede leerse de manera muy literal, pero el contexto acusa la fascinación idolátrica de los insensatos. La solución española conserva el sentido sin ocultar la tensión sintáctica.
  doctrine_reference: Poética y semántica del texto sapiencial; traducción de equivalencia óptima.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español y que la nota corresponda a una alternativa real del griego comprimido.
  spanish_consistency_notes:
  - Se mantuvo un registro digno y moderno, apto para lectura eclesial.
  - «Insensatos» y «oprobio» preservan el tono sapiencial sin recurrir a fórmulas arcaizantes.
  - «Sin vida» se usa de manera consistente para ἄπνους en lugar de una calca forzada como «sin aliento» en el texto principal.
