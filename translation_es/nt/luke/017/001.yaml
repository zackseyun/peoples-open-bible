translation:
  language: es
  text: 'Entonces les dijo a sus discípulos: «Es imposible que no vengan los tropiezos[a], pero ¡ay de aquel por quien vienen!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «escándalos», «obstáculos», «causas de pecado» o «tentaciones para pecar». El griego σκάνδαλα alude a cosas que hacen tropezar a las personas moral o espiritualmente.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἶπεν δὲ
  english_pob_choice: Then he said
  chosen_spanish: Entonces les dijo
  alternatives_spanish:
  - Y les dijo
  - Luego les dijo
  lexicon: BDAG
  rationale: δέ funciona como enlace narrativo leve; «Entonces» expresa con naturalidad la progresión del relato en español sin sobrerrepresentar contraste.
- source_word: πρὸς τοὺς μαθητὰς αὐτοῦ
  english_pob_choice: to his disciples
  chosen_spanish: a sus discípulos
  alternatives_spanish:
  - a los discípulos
  - a sus seguidores
  lexicon: BDAG
  rationale: μαθηταί se traduce de forma estable como «discípulos». El posesivo αὐτοῦ queda reflejado con «sus».
- source_word: Ἀνένδεκτόν ἐστιν
  english_pob_choice: It is impossible
  chosen_spanish: Es imposible
  alternatives_spanish:
  - No es posible
  - Es inadmisible
  lexicon: BDAG
  rationale: ἀνένδεκτος expresa imposibilidad o inadmisibilidad; en este contexto, «es imposible» comunica bien la inevitabilidad que Jesús afirma.
- source_word: τοῦ τὰ σκάνδαλα μὴ ἐλθεῖν
  english_pob_choice: for stumbling blocks not to come
  chosen_spanish: que no vengan los escándalos
  alternatives_spanish:
  - que no vengan los tropiezos
  - que no aparezcan los obstáculos
  lexicon: BDAG
  rationale: Se conserva el sustantivo «escándalos» por su uso bíblico y porque puede abarcar aquello que induce a caer moral o espiritualmente. Se evita reducirlo de entrada a una sola interpretación explicativa.
- source_word: σκάνδαλα
  english_pob_choice: stumbling blocks
  chosen_spanish: escándalos
  alternatives_spanish:
  - tropiezos
  - obstáculos
  - causas de pecado
  lexicon: BDAG
  rationale: Aunque «bloques de tropiezo» sería más literal, en español natural «escándalos» puede conservar el valor de algo que hace caer o lleva al pecado, manteniendo una resonancia bíblica clara. La nota conserva las alternativas relevantes.
- source_word: πλὴν οὐαὶ
  english_pob_choice: but woe
  chosen_spanish: pero ¡ay!
  alternatives_spanish:
  - sin embargo, ¡ay!
  - no obstante, ¡ay!
  lexicon: BDAG
  rationale: πλήν introduce una corrección o contraste; «pero» es el equivalente idiomático más claro en español. «¡Ay!» reproduce el tono de denuncia y lamento profético.
- source_word: δι’ οὗ
  english_pob_choice: to the one through whom
  chosen_spanish: de aquel por quien
  alternatives_spanish:
  - de la persona por quien
  - de aquel mediante quien
  lexicon: BDAG
  rationale: La construcción expresa agente o mediación personal. En español, «por quien» preserva la relación causal/personal del griego con naturalidad.
- source_word: ἔρχεται
  english_pob_choice: they come
  chosen_spanish: vienen
  alternatives_spanish:
  - llegan
  - aparecen
  lexicon: BDAG
  rationale: El verbo español en plural concuerda con el sujeto conceptual plural «los escándalos», siguiendo el mismo ajuste documentado en la audit trail inglesa para fluidez sin perder el sentido.
theological_decisions:
- issue: Alcance de σκάνδαλα en enseñanza ética
  english_pob_reading: Rendered as 'stumbling blocks' in the main text
  chosen_spanish_reading: Rendered as «escándalos» in the main text
  alternative_spanish_readings:
  - «tropiezos»
  - «causas de pecado»
  - «tentaciones para pecar»
  rationale: El griego puede abarcar situaciones, personas o hechos que llevan a otros a caer moral o espiritualmente. «Escándalos» mantiene una equivalencia bíblica comprensible en español y deja abierta la amplitud semántica documentada por la nota.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Referencia personal en δι’ οὗ
  english_pob_reading: Rendered as 'the one through whom'
  chosen_spanish_reading: Rendered as «aquel por quien»
  alternative_spanish_readings:
  - «la persona por quien»
  - «él por quien»
  rationale: La forma singular masculina del relativo se conserva sin necesidad de enfatizar género de manera innecesaria en español. «Aquel» mantiene el valor representativo y personal del original.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El texto base inglés ya fue revisado y quedó sin cambios en el último pase; esta versión española sigue ese estado estable y refleja la misma decisión principal sobre σκάνδαλα, pero adaptada a un español natural y auditable.
  spanish_consistency_notes:
  - Se conserva el tono narrativo sobrio con «Entonces».
  - «Escándalos» se usa de manera consistente con la amplitud semántica del griego, sin cerrarlo a una sola lectura.
  - «Por quien» mantiene la relación de agencia/mediación del relativo griego.
  - Se evita un calco pesado como «bloques de tropiezo» en el cuerpo principal, pero la nota preserva las alternativas equivalentes.
