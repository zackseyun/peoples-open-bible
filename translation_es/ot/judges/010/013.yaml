translation:
  language: es
  text: Pero ustedes me han abandonado y han servido a otros dioses[a]; por tanto, ya no los salvaré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los libraré» o «los rescataré». El verbo hebreo puede indicar liberación de enemigos, además de salvar en sentido más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אַתֶּם
  english_pob_choice: But you
  chosen_spanish: Pero ustedes
  alternatives_spanish:
  - Y ustedes
  - Sin embargo, ustedes
  lexicon: HALOT
  rationale: El hebreo introduce contraste y énfasis con el pronombre explícito. «Pero ustedes» conserva la oposición de manera natural en español.
- source_word: עֲזַבְתֶּם
  english_pob_choice: have forsaken
  chosen_spanish: me han abandonado
  alternatives_spanish:
  - me han dejado
  - me han desamparado
  lexicon: HALOT
  rationale: עָזַב expresa abandono/abandono relacional y de pacto. «Han abandonado» comunica bien esa carga sin sonar demasiado arcaico.
- source_word: וַ/תַּעַבְדוּ
  english_pob_choice: and served
  chosen_spanish: y han servido
  alternatives_spanish:
  - y han adorado
  - y se han puesto al servicio de
  lexicon: HALOT
  rationale: עָבַד con dioses puede implicar servicio religioso o rendirles lealtad. «Han servido» es la opción más directa y mantiene la amplitud del verbo.
- source_word: אֱלֹהִים אֲחֵרִים
  english_pob_choice: other gods
  chosen_spanish: otros dioses
  alternatives_spanish:
  - dioses ajenos
  - dioses extraños
  lexicon: HALOT
  rationale: La expresión contrasta de forma simple con Yahvé. «Otros dioses» es la equivalencia más inmediata y transparente.
- source_word: לָ/כֵ֥ן
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - así que
  - por eso
  lexicon: HALOT
  rationale: Marca consecuencia judicial. «Por tanto» conserva el enlace lógico formal del hebreo.
- source_word: לֹֽא אוֹסִ֖יף
  english_pob_choice: I will no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no volveré a
  - no seguiré
  lexicon: HALOT
  rationale: La negación con יסף en hifil expresa cese de acción. «Ya no» reproduce naturalmente la idea de no continuar.
- source_word: לְ/הוֹשִׁ֥יעַ
  english_pob_choice: save
  chosen_spanish: los libraré
  alternatives_spanish:
  - los salvaré
  - los rescataré
  lexicon: HALOT
  rationale: En el contexto de Jueces, ישע apunta a librar del opresor. «Libraré» comunica la liberación histórica sin perder la resonancia teológica; en español, «salvar» podría sonar más amplio y menos concreto en este contexto narrativo.
theological_decisions:
- issue: Alcance de ישע en un contexto de opresión y juicio
  english_pob_reading: save
  chosen_spanish_reading: libraré
  alternative_spanish_readings:
  - salvaré
  - rescataré
  rationale: Aunque el verbo hebreo puede significar salvar, rescatar o librar, aquí el punto inmediato es la negativa de Yahvé a seguir concediendo liberación frente a los enemigos. «Libraré» deja visible ese sentido narrativo y judicial.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo: contraste inicial, doble acusación («abandonar» y «servir»), consecuencia con לָכֵן y cese de acción con לֹא אוֹסִיף. Se mantiene la decisión auditable de traducir ישע con un verbo de liberación contextual, mientras la nota preserva las alternativas semánticas del audit trail inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en la traducción española estándar del proyecto, pero este versículo no contiene el tetragrámaton; por eso no aparece aquí.
  - «Otros dioses» conserva la fórmula bíblica común sin introducir matices de «ajenos» que no son necesarios en este contexto.
  - El sujeto implícito de la primera persona se expresa en español con claridad en «los libraré» para mantener naturalidad y referencia directa a los destinatarios.
