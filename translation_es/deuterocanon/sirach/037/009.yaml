translation:
  language: es
  text: Guárdate de un consejero[a], y sabe de antemano qué necesita.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuál es su interés». El hebreo puede referirse no solo a una necesidad estricta, sino también a aquello que lo preocupa o lo motiva. El paralelo griego amplía la idea de otro modo: «y se pondrá enfrente para ver lo que te sucederá».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מיועץ
  english_pob_choice: from a counselor
  chosen_spanish: de un consejero
  alternatives_spanish:
  - de un asesor
  - contra un consejero
  lexicon: HALOT
  rationale: El hebreo con מן + יועץ expresa apartarse o guardarse respecto de esa persona. «De un consejero» mantiene la relación preposicional y el rol de consejero sin suavizar la advertencia. «Contra un consejero» suena más confrontativo de lo que el hebreo exige.
- source_word: שמור נפשך
  english_pob_choice: Guard yourself
  chosen_spanish: Guárdate
  alternatives_spanish:
  - Cuídate
  - Protégente
  lexicon: HALOT
  rationale: נפש aquí apunta a la persona entera, no solo a la vida física. «Guárdate» transmite de forma natural la advertencia reflexiva y conserva la fuerza de cautela del original.
- source_word: ודע לפנים
  english_pob_choice: and know beforehand
  chosen_spanish: y conoce de antemano
  alternatives_spanish:
  - y sabe antes
  - y conoce por adelantado
  lexicon: HALOT
  rationale: לפנים funciona adverbialmente como «antes» o «de antemano». «Conoce de antemano» suena idiomático en español y mantiene el matiz de discernimiento previo.
- source_word: מה צרכו
  english_pob_choice: what his need is
  chosen_spanish: cuál es su necesidad
  alternatives_spanish:
  - qué necesita
  - cuál es su interés
  lexicon: HALOT
  rationale: צורך puede significar necesidad, requerimiento o interés. «Su necesidad» sigue de cerca el hebreo y deja abierta la posible tensión de motivación/interés que la nota inglesa también preserva.
translation_notes:
  revision_awareness: El texto español sigue la lectura hebrea base de Kahana, con apoyo del paralelo griego para documentar la expansión interpretativa sin incorporarla al cuerpo principal. La revisión más reciente indicó que no hacía falta cambio sustantivo; por eso se conserva una formulación sobria y directa.
  spanish_consistency_notes:
  - Se mantiene «consejero» por coherencia con la función consultiva del sustantivo hebreo.
  - Se usa «de antemano» para reflejar el valor temporal de לפנים sin introducir paráfrasis.
  - «Necesidad» conserva la tensión semántica documentada por la nota inglesa entre necesidad e interés.
  - La puntuación y el tono buscan un registro bíblico moderno, claro y publicable en español.
