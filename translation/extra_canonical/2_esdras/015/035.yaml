  text: et conlident se invicem et effundent sidus copiosum super terram et sidus illorum, et erit sanguis a gladio usque ad ventrem equi
  language: Latin
translation:
  text: And they will strike one another and pour out an abundant storm upon the earth[a], their storm[b]; and there will be blood from the sword up to the horse's belly.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Latin sidus is singular here and throughout this section. It can mean 'star,' but in apocalyptic context it may also function as a celestial portent. The translation keeps 'star' to preserve the imagery.
    reason: lexical_alternative
    anchor_ref: '15:35'
  - marker: b
    text: Or 'pour out a heavy star upon the earth, even their star'.
    reason: previous_rendering
