review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo: imperativos a Sion personificada, oración nocturna, derramar el corazón, alzar las manos, e intercesión por los niños desfallecidos. Sin embargo, mueve al texto principal una alternativa que en la auditoría inglesa quedó en nota: בְּ/רֹאשׁ כָּל חוּצֽוֹת se tradujo como «en la esquina de cada calle», mientras que el texto base conserva la imagen más literal «a la cabeza/comienzo de cada calle» y reserva «street corner» para nota. También la nota [a] está mal anclada: aparece al inicio del versículo, pero corresponde al sintagma final.'
  spanish_quality_summary: El español es mayormente claro y digno. «Levántate», «derrama tu corazón», «desfallecen de hambre» funcionan bien. «Da voces» es comprensible pero algo menos natural que «clama» o «grita» en español bíblico contemporáneo; aun así puede mantenerse. La mayor corrección necesaria es devolver al texto principal la imagen hebrea del final y colocar la nota en el lugar correcto.
  glossary_alignment: No hay conflicto serio con la terminología doctrinal. אֲדֹנָי como «el Señor» está bien. No aparecen términos del glosario mayor como Yahvé/Mesías/esclavo. La decisión sobre «vida» para נֶפֶשׁ es adecuada. Conviene conservar en el texto principal la imaginería fuente «cabeza/comienzo de cada calle» y dejar «esquina» como alternativa idiomática en nota, en línea con la auditoría POB.
  issues:
  - severity: high
    issue: El texto principal usa «en la esquina de cada calle» para בְּ/רֹאשׁ כָּל חוּצֽוֹת
    rationale: La auditoría inglesa retiene la imagen hebrea «at the head of every street» en el texto y solo da «at every street corner» como alternativa en nota. El español debe preservar ese mismo reparto de significado y nota.
  - severity: high
    issue: La nota [a] está colocada al inicio del versículo en vez de anclarse al sintagma final pertinente
    rationale: El marcador debe aparecer exactamente donde corresponde la alternativa léxica. Tal como está, induce a pensar que la nota comenta «Levántate».
  - severity: medium
    issue: «por la vida de tus hijitos» singulariza un referente que en inglés auditado quedó plural («the lives»)
    rationale: נֶפֶשׁ puede funcionar colectivamente, pero en español aquí suena más fiel y natural «por la vida de tus pequeños hijos» o «por las vidas de tus pequeños hijos», dado que el referente es plural.
  - severity: low
    issue: «Da voces» suena algo menos natural en registro bíblico actual que «clama»
    rationale: No es una infidelidad, pero «clama» refleja mejor el tono de lamento solemne y mejora la fluidez.
  revised_spanish_text: Levántate, clama en la noche, al comenzar las vigilias; derrama tu corazón como agua delante del rostro del Señor. Alza hacia él tus manos por la vida de tus pequeños hijos, que desfallecen de hambre al comienzo de cada calle[a].
  revised_footnotes:
  - marker: a
    text: O, más idiomáticamente, «en la esquina de cada calle».
    reason: lexical_alternative
  revision_rationale: 'Se corrige el principal desajuste con la auditoría POB: el texto principal vuelve a una forma cercana al hebreo («al comienzo de cada calle») y la alternativa idiomática «en la esquina de cada calle» queda en nota, anclada en el lugar correcto. También se suaviza «da voces» a «clama» para mejor naturalidad y se ajusta «hijitos» a «pequeños hijos», que evita exceso de diminutivo y mantiene el pathos sin infantilizar demasiado. No se requiere adjudicación adicional.'
