revisions:
- from: Y será para mí un nombre de gozo, de alabanza y de gloria delante[a] de todas las naciones de la tierra, que oirán de todo el bien que yo hago por ellas. Y temerán y se estremecerán por todo el bien y por toda la paz que yo estoy dando a ella.
  to: Y será para mí un nombre de gozo, de alabanza y de gloria delante de todas las naciones de la tierra, que oirán de todo el bien que yo hago. Y temerán y se estremecerán por todo el bien y por toda la paz[a] que yo le doy.
  rationale: Se corrigió la referencia pronominal para evitar la lectura errónea de que Dios hace ese bien a las naciones. Se simplificó la cláusula a 'todo el bien que yo hago', que en el contexto de Jeremías 33 apunta a la ciudad restaurada sin introducir un antecedente español engañoso. También se reemplazó 'estoy dando a ella' por 'le doy' para un español más natural, manteniendo el femenino singular implícito. Se eliminó la nota innecesaria sobre 'delante de' y se añadió la nota necesaria sobre el alcance semántico de shalom, en línea con el POB inglés.
