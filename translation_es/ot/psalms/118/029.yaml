  glossary_alignment: 'Alineado con la terminología del proyecto en puntos clave: יְהוָה -> ''Yahvé''; חֶסֶד -> ''amor fiel'' es una opción defendible y natural en español; no hay conflictos con otras políticas léxicas. La revisión no requiere cambiar el texto principal, solo ajustar la nota para reflejar correctamente la decisión lexical documentada.'
  issues:
  - severity: medium
    issue: La nota al pie no ofrece una alternativa real
    rationale: 'Dice ''O: «su amor fiel permanece para siempre»'', pero esa frase ya es sustancialmente la del texto principal. Según el audit trail inglés, la nota debe preservar la lectura más literal del hebreo (''porque para siempre es su amor fiel'') frente a la formulación idiomática principal.'
  revised_spanish_text: Den gracias a Yahvé[a], porque él es bueno, porque su amor fiel permanece para siempre.
  revised_footnotes:
  - marker: a
    text: 'O más literalmente: «porque para siempre es su amor fiel».'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel, natural y terminológicamente correcto. Solo se corrige la nota al pie para que registre una alternativa genuina y coherente con la evidencia hebrea y el audit trail inglés.
