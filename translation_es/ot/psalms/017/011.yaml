translation:
  language: es
  text: Ahora[a] han rodeado nuestros pasos; fijan sus ojos para derribarnos[b] a tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Han rodeado nuestros pasos ahora».
    reason: alternative_reading
  - marker: b
    text: O «para derribarme a tierra». El hebreo presenta una oscilación de persona en este versículo; la versión española sigue la lectura colectiva del contexto, como en la tradición auditada en inglés.
    reason: textual_variant
lexical_decisions:
- source_word: אַשֻּׁרֵינוּ
  english_pob_choice: our steps
  chosen_spanish: nuestros pasos
  alternatives_spanish:
  - nuestras huellas
  - nuestros caminos
  lexicon: HALOT
  rationale: El sustantivo refiere a pasos/huellas; en español «nuestros pasos» conserva la imagen concreta y suena natural sin perder el sentido poético.
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  - hoy
  lexicon: HALOT
  rationale: Adverbio temporal que marca la inmediatez de la amenaza; «ahora» es breve, fiel e idiomático.
- source_word: סבבו/ני
  english_pob_choice: have surrounded
  chosen_spanish: han rodeado
  alternatives_spanish:
  - me han rodeado
  - han cercado
  lexicon: HALOT
  rationale: El verbo significa rodear/ceñir. Dado el sufijo explícito de primera singular en hebreo, se conserva la cercanía literal del pronombre implícito en la formulación española mediante la construcción verbal sin añadir un objeto directo que altere la sintaxis poética.
- source_word: עֵינֵיהֶם
  english_pob_choice: their eyes
  chosen_spanish: sus ojos
  alternatives_spanish:
  - sus miradas
  - los ojos de ellos
  lexicon: HALOT
  rationale: Se mantiene la imagen corporal literal de la hostilidad; «sus ojos» preserva el paralelismo y la fuerza visual.
- source_word: יָשִׁיתוּ
  english_pob_choice: they set
  chosen_spanish: fijan
  alternatives_spanish:
  - ponen
  - dirigen
  - colocan
  lexicon: HALOT
  rationale: שׁית puede significar poner, colocar o fijar. En este contexto, «fijan sus ojos» comunica bien la intención hostil y mantiene una colocación natural en español.
- source_word: לִנְטוֹת
  english_pob_choice: to cast us down
  chosen_spanish: para derribarnos
  alternatives_spanish:
  - para abatirnos
  - para echarnos por tierra
  - para hundirnos
  lexicon: HALOT
  rationale: Aunque נטה suele significar inclinar, extender o desviar, aquí el contexto con «a tierra» pide una caída hacia abajo. «Derribarnos» expresa esa intención adversativa sin suavizar el golpe del texto.
- source_word: בָּאָרֶץ
  english_pob_choice: to the ground
  chosen_spanish: a tierra
  alternatives_spanish:
  - al suelo
  - a la tierra
  - al polvo
  lexicon: HALOT
  rationale: Aquí אֶרֶץ se entiende concretamente como tierra/suelo. «A tierra» es breve, bíblico en buen español y mantiene la imagen física de ser abatidos.
translation_notes:
  revision_awareness: Se tuvo en cuenta el ajuste de auditoría que señaló la tensión entre el plural «nuestros pasos» y el sufijo singular de primera persona en סבבוני. En lugar de aplanar la tensión, la redacción española mantiene el plural poético del contexto con una nota sobre la posible oscilación de persona.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «tierra» se usa en sentido concreto y físico, no como referencia a país o territorio.
  - Se evita «SEÑOR» y se mantiene un registro bíblico sobrio, pero no arcaizante.
