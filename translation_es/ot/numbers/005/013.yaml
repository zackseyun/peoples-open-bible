    issue: Falta 'un hombre' al inicio de la cláusula.
    rationale: El hebreo contiene אִישׁ explícitamente. La frase española actual 'y se acuesta con ella...' carece de sujeto expreso y pierde un elemento del contenido fuente.
  - severity: medium
    issue: '''Se ha contaminado'' debilita el registro técnico de pureza ritual.'
    rationale: נִטְמָאָה en este contexto legal se refiere a quedar ritualmente impura/unclean. 'Contaminado' es posible, pero en español bíblico-eclesial 'ha quedado impura' preserva mejor la categoría sin moralizar de más.
  - severity: low
    issue: 'La nota a usa una literalidad poco natural: ''la acostada de semen''.'
    rationale: Aunque busca reflejar el hebreo, esa frase suena extraña en español. 'el yacer de semen' o una explicación literal equivalente comunica mejor la forma fuente.
