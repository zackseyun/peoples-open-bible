base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/035/018.yaml
  text: No Passover like it had been kept in Israel since the days of Samuel the prophet[a], and none of the kings of Israel had kept a Passover like the one that Josiah kept, with the priests, the Levites, all Judah, Israel that was present[b], and the inhabitants of Jerusalem.
  footnotes:
  - marker: a
    text: Or 'No Passover like this had been observed in Israel since the days of Samuel the prophet.'
    reason: lexical_alternative
  - marker: b
    text: '''Israel that was present'' refers to members of Israel who were there for the celebration; alternatively, ''the Israelites who were present.'''
    reason: lexical_alternative
