translation:
  language: es
  text: Y ahora[a], mira, los hijos de Amón, Moab y el monte Seír[b], contra quienes no permitiste que Israel entrara[c] cuando salieron de la tierra de Egipto, porque se apartaron de ellos y no los destruyeron—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Ahora». El hebreo une una conjunción discursiva con un adverbio temporal; en español ambas opciones son naturales.
    reason: lexical_alternative
  - marker: b
    text: O «los amonitas, moabitas y los del monte Seír». El hebreo literalmente nombra «los hijos de Amón y Moab y el monte Seír».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «no permitiste a Israel entrar en/contra ellos»; en contexto, la idea es que Dios no les permitió ir contra ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Conserva la fuerza discursiva del hebreo con la conjunción y el adverbio temporal, en una forma natural en español.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - he aquí
  - mira
  lexicon: HALOT
  rationale: En español, 'mira' reproduce mejor la deixis y la urgencia retórica del hebreo que un calco solemne como 'he aquí', aunque se mantiene un tono elevado.
- source_word: בְנֵי עַמּוֹן
  english_pob_choice: the people of Ammon
  chosen_spanish: los hijos de Amón
  alternatives_spanish:
  - los amonitas
  - el pueblo de Amón
  lexicon: HALOT
  rationale: Se conserva la forma literal 'hijos de' que está en el hebreo y que la POB inglesa documenta; 'Amón' mantiene el nombre propio bíblico con claridad en español.
- source_word: מוֹאָב
  english_pob_choice: Moab
  chosen_spanish: Moab
  alternatives_spanish:
  - los moabitas
  lexicon: HALOT
  rationale: Como nombre colectivo/territorial coordinado con Amón y Seír, el nombre propio simple es natural y fiel.
- source_word: וְהַר שֵׂעִיר
  english_pob_choice: Mount Seir
  chosen_spanish: el monte Seír
  alternatives_spanish:
  - la región montañosa de Seír
  - el monte de Seír
  lexicon: HALOT
  rationale: Sigue la designación geográfica tradicional sin convertirla en etnónimo; 'monte Seír' es transparente y fiel.
- source_word: אֲשֶׁר לֹא נָתַתָּה לְיִשְׂרָאֵל לָבוֹא בָהֶם
  english_pob_choice: whom you did not allow Israel to enter against
  chosen_spanish: a quienes no permitiste que Israel entrara contra ellos
  alternatives_spanish:
  - a quienes no permitiste que Israel entrara contra
  - a quienes no diste a Israel permiso para entrar contra ellos
  lexicon: HALOT
  rationale: '''Entrara contra ellos'' conserva el valor idiomático de לָב֣וֹא בָהֶם, que en contexto militar implica acercarse/ir contra, sin exagerar hacia ''invadir''.'
- source_word: בְּבֹאָם מֵאֶרֶץ מִצְרָיִם
  english_pob_choice: when they came from the land of Egypt
  chosen_spanish: cuando salieron de la tierra de Egipto
  alternatives_spanish:
  - cuando vinieron de la tierra de Egipto
  - al salir de la tierra de Egipto
  lexicon: HALOT
  rationale: '''Salieron de'' comunica de manera natural el movimiento de Israel desde Egipto y conserva la referencia temporal del infinitivo constructo.'
- source_word: כִּי סָרוּ מֵעֲלֵיהֶם
  english_pob_choice: for they turned away from them
  chosen_spanish: porque se apartaron de ellos
  alternatives_spanish:
  - porque se desviaron de ellos
  - porque se retiraron de ellos
  lexicon: HALOT
  rationale: '''Apartarse de'' refleja bien el sentido de abandonar el enfrentamiento o desviarse del camino, sin introducir una interpretación más específica de la necesaria.'
- source_word: וְלֹא הִשְׁמִידוּם
  english_pob_choice: and did not destroy them
  chosen_spanish: y no los destruyeron
  alternatives_spanish:
  - y no los aniquilaron
  - y no los exterminaron
  lexicon: HALOT
  rationale: '''Destruir'' es el equivalente español más sobrio y fiel para el verbo de guerra; ''destruyeron'' mantiene la fuerza del hebreo sin añadir matiz técnico no explicitado aquí.'
theological_decisions:
- issue: Dirección de la súplica en segunda persona sin sustituir el pronombre por un título divino
  english_pob_reading: you did not allow Israel to enter against
  chosen_spanish_reading: no permitiste que Israel entrara contra ellos
  alternative_spanish_readings:
  - el Señor no permitió que Israel entrara contra ellos
  - no permitiste a Israel invadirlos
  rationale: La oración va dirigida directamente a Dios; por eso se conserva la segunda persona. Además, 'entrara contra ellos' sigue de cerca el hebreo sin endurecer el sentido hacia 'invadir', tal como la revisión inglesa prefirió 'enter against'.
  doctrine_reference: Translation philosophy §1, §6
- issue: Identidad colectiva de Amón, Moab y Seír
  english_pob_reading: the people of Ammon and Moab and Mount Seir
  chosen_spanish_reading: los hijos de Amón, Moab y el monte Seír
  alternative_spanish_readings:
  - los amonitas y moabitas y los de Seír
  - los pueblos de Amón, Moab y Seír
  rationale: Se conserva el paralelismo del hebreo, que nombra literalmente a los 'hijos de Amón'. En español esto mantiene la tensión entre etnónimo y topónimo que la nota inglesa también preserva.
  doctrine_reference: Translation philosophy §2, §5
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente que cambió 'invade' por 'enter against' para reflejar con más precisión el hebreo לָבוֹא בָהֶם. Por eso se evita 'invadir' y se usa una fórmula española igualmente cercana al texto y al contexto militar sin sobrerinterpretación. También se conserva la estructura enumerativa del hebreo y la referencia temporal 'cuando salieron de la tierra de Egipto'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este verso es una súplica directa a Dios en segunda persona sin יהוה explícito; por eso no se introduce ningún reemplazo nominal.
  - '''Hijos de Amón'' y ''el monte Seír'' conservan la tensión entre etnónimos y topónimo que el hebreo y la POB inglesa documentan.'
  - '''Destruyeron'' corresponde a un verbo de destrucción bélica fuerte; no se suaviza a ''vencieron'' o ''derrotaron''.'
