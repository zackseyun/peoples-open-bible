  to: 'Y Elías el tisbita[a], de entre los habitantes de Galaad, dijo a Acab: «Vive Yahvé, Dios de Israel, delante de quien estoy, que en estos años[b] no habrá rocío ni lluvia, excepto[c] por mi palabra».'
  rationale: Se corrige «Ahab» a «Acab» en español, se reemplaza «sino por mi palabra» por «excepto por mi palabra» para expresar con más naturalidad la excepción de כִּי אִם, y se afinan las notas para reflejar mejor las alternativas léxicas auditadas.
