id: HERM.V.3.vi
reference: Shepherd of Hermas — Vision 3, section vi
unit: section
book: Shepherd of Hermas
source:
  edition: Lightfoot & Harmer 1891 (normalized OCR)
  text: Τοὺς δὲ κατακοπτομένους καὶ μακρὰν ῥιπτομένους ἀπὸ τοῦ πύργου θέλεις γνῶναι; οὗτοί εἰσιν οἱ υἱοὶ τῆς ἀνομίας· ἐπίστευσαν δὲ ἐν ὑποκρίσει, καὶ πᾶσα πονηρία οὐκ ἀπέστη ἀπʼ αὐτῶν· διὰ τοῦτο οὐκ ἔχουσιν σωτηρίαν, ὅτι οὐκ εἰσὶν εὔχρηστοι εἰς οἰκοδομὴν διὰ τὰς πονηρίας αὐτῶν. διὰ 20—2 τοῦτο συνεκόπησαν καὶ πόρρω ἀπερίφησαν διὰ τὴν ὀργὴν τοῦ Κυρίου, ὅτι παρώργισαν αὐτόν. 2. τοὺς δὲ ἑτέρους οὓς ἑώρακας πολλοὺς κειμένους, μὴ ὑπάγοντας εἰς τὴν οἰκοδομήν, οὗτοι οἱ μὲν ἐψωριακότες εἰσίν, οἱ ἐγνωκότες τὴν ἀλήθειαν, μὴ ἐπιμείναντες δὲ ἐν αὐτῇ μηδὲ κολλώμενοι τοῖς ἁγίοις· διὰ τοῦτο ἄχρηστοί εἰσιν. 3. Οἱ δὲ τὰς σχισμὰς ἔχοντες τίνες εἰσίν; Οὗτοί εἰσιν οἱ κατ᾿ ἀλλήλων ἐν ταῖς καρδίαις ἔχοντες καὶ μὴ εἰρηνεύοντες ἐν ἑαυτοῖς, ἀλλὰ πρόσωπον εἰρήνης ἔχοντες, ὅταν δὲ ἀπ᾿ ἀλλήλων ἀποχωρήσωσιν, αἱ πονηρίαι αὐτῶν ἐν ταῖς καρδίαις ἐμμένουσιν. αὗται οὖν αἱ σχισμαί εἰσιν ἃς ἔχουσιν οἱ λίθοι. 4. οἱ δὲ κεκολοβωμένοι, οὗτοί εἰσιν πεπιστευκότες μὲν καὶ τὸ πλεῖον μέρος ἔχοντες ἐν τῇ δικαιοσύνῃ, τινὰ δὲ μέρη ἔχουσιν τῆς ἀνομίας· διὰ τοῦτο κολοβοὶ καὶ οὐχ ὁλοτελεῖς εἰσίν. 5. Οἱ δὲ λευκοὶ καὶ στρογγύλοι καὶ μὴ ἁρμόζοντες εἰς τὴν οἰκοδομὴν τίνες εἰσίν, κυρία; ἀποκριθεῖσά μοι λέγει· Ἕως πότε μωρὸς εἶ καὶ ἀσύνετος, καὶ πάντα ἐπερωτᾷς καὶ οὐδὲν νοεῖς; οὗτοί εἰσιν ἔχοντες μὲν πίστιν, ἔχοντες δὲ καὶ πλοῦτον τοῦ αἰῶνος τούτου. ὅταν γένηται θλῖψις, διὰ τὸν πλοῦτον αὐτῶν καὶ διὰ τὰς πραγματείας ἀπαρνοῦνται τὸν Κύριον αὐτῶν. 6. καὶ ἀποκριθεὶς αὐτῇ λέγω· Κυρία, πότε οὖν εὔχρηστοι ἔσονται εἰς τὴν οἰκοδομήν; Ὅταν, φησίν, περικοπῇ αὐτῶν ὁ πλοῦτος ὁ ψυχαγωγῶν αὐτούς, τότε εὔχρηστοι ἔσονται τῷ Θεῷ. ὥσπερ γὰρ ὁ λίθος ὁ στρογγύλος ἐὰν μὴ περικοπῇ καὶ ἀποβάλῃ ἐξ αὐτοῦ τι, οὐ δύναται τετράγωνος γενέσθαι, οὕτω καὶ οἱ πλουτοῦντες ἐν τούτῳ τῷ αἰῶνι, ἐὰν μὴ περικοπῇ αὐτῶν ὁ πλοῦτος, οὐ δύνανται τῷ Κυρίῳ εὔχρηστοι γενέσθαι. 7. ἀπὸ [δὲ] σεαυτοῦ πρῶτον γνῶθι· ὅτε ἐπλούτεις, ἄχρηστος ἦς· νῦν δὲ εὔχρηστος εἶ καὶ ὠφέλιμος τῇ ζωῇ. εὔχρηστοι γίνεσθε τῷ Θεῷ· καὶ γὰρ σὺ αὐτὸς χρᾶσαι ἐκ τῶν αὐτῶν λίθων.
