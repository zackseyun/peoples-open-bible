translation:
  language: es
  text: Me he vuelto un hermano de los chacales, y compañero de las avestruces[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hijas del avestruz», una expresión hebrea que significa avestruces.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָח
  english_pob_choice: brother
  chosen_spanish: hermano
  alternatives_spanish:
  - pariente
  - amigo
  lexicon: HALOT
  rationale: «אָח» significa literalmente «hermano». En este lamento poético conserva mejor la metáfora de cercanía o identificación con criaturas desoladas que un término más interpretativo como «amigo».
- source_word: הָיִיתִי
  english_pob_choice: have become
  chosen_spanish: me he vuelto
  alternatives_spanish:
  - he llegado a ser
  - me he convertido
  lexicon: HALOT
  rationale: El perfecto qal de היה expresa un estado resultante. En español, «me he vuelto» comunica de forma natural ese cambio de condición presente, sin perder el matiz de resultado.
- source_word: לְתַנִּים
  english_pob_choice: to jackals
  chosen_spanish: de los chacales
  alternatives_spanish:
  - a los chacales
  - de los perros del desierto
  lexicon: HALOT
  rationale: En contextos poéticos, תַנִּים suele referirse a chacales, especialmente en imágenes de desolación. En español, «chacales» es la opción más clara y fiel; la preposición se adapta a la sintaxis natural de «me he vuelto un hermano de...».},{
theological_decisions:
- issue: Imagen poética de desolación y asociación con animales del desierto
  english_pob_reading: Job habla figuradamente de haber llegado a ser como criaturas desoladas, no de una afirmación doctrinal.
  chosen_spanish_reading: 'Se mantiene la metáfora sin suavizarla: «hermano de los chacales» y «compañero de las crías de avestruz».'
  alternative_spanish_readings:
  - amigo de los chacales
  - similar a los chacales
  rationale: No hay una cuestión doctrinal, sino una imagen lamentatoria. La traducción conserva la fuerza poética y el paralelismo semántico del hebreo.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión inglesa reciente no introdujo cambios; el texto inglés auditado permanece estable y de alta concordancia, por lo que la propuesta española sigue de cerca sus decisiones léxicas sin añadir interpretaciones nuevas.
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el texto base lo requiere; este versículo no contiene el tetragrámaton ni el divino κύριος.
  - Se mantiene «chacales» para תַנּים, en línea con la decisión inglesa de evitar «dragones» por ser una tradición anticuada.
  - «Crías de avestruz» es una solución natural en español para preservar el sentido del hebreo literal sin forzar el giro idiomático.
