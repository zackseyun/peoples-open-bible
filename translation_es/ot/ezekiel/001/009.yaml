    text: 'Hebreo, literalmente: «una mujer a su hermana», un modismo que describe partes correspondientes unidas entre sí.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cada una iba en la dirección de su rostro».'
    reason: alternative_reading
  revision_rationale: Se hizo un ajuste menor para acercar la redacción española a la decisión léxica auditada del hebreo idiomático, preservando mejor la imagen de correspondencia entre las alas mediante «cada una con su hermana», ya aclarada por la nota. También se mejoró la naturalidad de la cláusula final con «iba recto hacia adelante».
