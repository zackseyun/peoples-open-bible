revisions:
- from: Habiendo sido humillado por aquellos que él había considerado los menos importantes entre los suyos, y con la ayuda del Señor, habiendo dejado su vestidura espléndida, se hizo un fugitivo solitario por el interior del país[a] y llegó a Antioquía[b], habiendo salido muy favorecido[c] en la destrucción de su ejército.
  to: Habiendo sido humillado por aquellos que él había considerado los menos importantes entre los suyos, y con la ayuda del Señor, habiendo dejado su vestidura espléndida, se hizo un fugitivo solitario por el interior del país[a] y llegó a Antioquía, habiendo prosperado sobremanera[b] en la destrucción de su ejército.
  rationale: Se elimina la nota innecesaria en «Antioquía» y se sustituye «habiendo salido muy favorecido» por «habiendo prosperado sobremanera» para reflejar mejor εὐημερηκὼς y conservar la ironía del griego con español más natural y fiel.
  reviewer_model: gpt-5.4
