    text: O «en días postreros». La expresión hebrea es un modismo profético para el futuro desenlace de los acontecimientos.
    reason: alternative_reading
  - marker: b
    text: O «para muchos días» o «para días futuros». La frase indica que la visión se refiere a un tiempo todavía por venir.
    reason: lexical_alternative
  revision_rationale: Se ajusta el modismo escatológico a un español más natural y ampliamente reconocible («en los últimos días») sin cerrar la tensión teológica, y se hace explícita la referencia definida a «la visión» para reflejar mejor el contexto y la decisión del POB inglés. Se conservan las alternativas relevantes en notas, con marcadores correctamente anclados en el texto.
