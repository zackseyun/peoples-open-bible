translation:
  language: es
  text: Ahora Madián y Amalec y toda la gente de oriente[a] estaban tendidos[b] en el valle, tan numerosos como langostas, y sus camellos eran innumerables[c], como la arena que está a la orilla del mar, en abundancia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: "hijos de oriente".'
    reason: lexical_alternative
  - marker: b
    text: 'O: "yacían" / "estaban caídos". El participio hebreo literalmente significa "caer/estar caído" y aquí describe tropas desplegadas o acampadas en el valle.'
    reason: lexical_alternative
  - marker: c
    text: 'Lit.: "no hay número". Expresa una multitud incontable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֹפְלִים
  english_pob_choice: were lying
  chosen_spanish: estaban tendidos
  alternatives_spanish:
  - estaban caídos
  - yacían
  - estaban acostados
  lexicon: HALOT
  rationale: El participio de נפל conserva la idea de 'caer/estar caído', pero en contexto militar puede describir tropas extendidas o acampadas en un valle. 'Estaban tendidos' mantiene la imagen sin volverla demasiado literal ni sugerir necesariamente derrota.
- source_word: בָּעֵמֶק
  english_pob_choice: in the valley
  chosen_spanish: en el valle
  alternatives_spanish:
  - en el otero
  - en la llanura
  lexicon: HALOT
  rationale: עֵמֶק denota normalmente un valle. 'En el valle' es la equivalencia más directa y natural en español.
- source_word: בְּנֵי קֶדֶם
  english_pob_choice: the people of the East
  chosen_spanish: los hijos de oriente
  alternatives_spanish:
  - la gente de oriente
  - los pueblos del oriente
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'hijos de oriente'. Se conserva esa forma porque el texto fuente la emplea como designación colectiva; 'hijos' evita perder la concreción del hebreo, aunque en español pueda sonar más semítico.
- source_word: כָּאַרְבֶּה לָרֹב
  english_pob_choice: as numerous as locusts
  chosen_spanish: como langostas en multitud
  alternatives_spanish:
  - como langostas en número inmenso
  - como langostas por su multitud
  lexicon: HALOT
  rationale: El símil compara la cantidad del ejército con langostas. 'En multitud' preserva la fuerza cuantitativa del hebreo y encaja con español natural sin perder el paralelismo con la repetición final de abundancia.
- source_word: לִגְמַלֵּיהֶם
  english_pob_choice: their camels
  chosen_spanish: sus camellos
  alternatives_spanish:
  - los camellos de ellos
  lexicon: HALOT
  rationale: Traducción directa del sustantivo con sufijo de tercera plural. 'Sus camellos' es claro y fiel.
- source_word: אֵין מִסְפָּר
  english_pob_choice: were without number
  chosen_spanish: eran innumerables
  alternatives_spanish:
  - no tenían número
  - eran sin número
  lexicon: HALOT
  rationale: La frase hebrea significa literalmente 'no hay número'. 'Eran innumerables' expresa la hipérbole de manera idiomática en español y conserva el valor de multitud incontable.
- source_word: כַּחוֹל שֶׁעַל שְׂפַת הַיָּם
  english_pob_choice: as the sand on the seashore
  chosen_spanish: como la arena que está a la orilla del mar
  alternatives_spanish:
  - como la arena de la orilla del mar
  - como la arena sobre la orilla del mar
  lexicon: HALOT
  rationale: La imagen estándar de innumerabilidad se mantiene con una formulación natural para español. 'A la orilla del mar' comunica bien שְׂפַת הַיָּם sin calco forzado.
- source_word: לָרֹב
  english_pob_choice: in abundance
  chosen_spanish: en abundancia
  alternatives_spanish:
  - en gran número
  - con gran multitud
  lexicon: HALOT
  rationale: Se conserva la repetición enfática del hebreo al final del versículo. 'En abundancia' reproduce la intensificación sin redundancia pesada.
- source_word: וּמִדְיָן וַעֲמָלֵק וְכָל בְּנֵי קֶדֶם
  english_pob_choice: Now Midian and Amalek and all the people of the East
  chosen_spanish: Ahora Madián y Amalec y todos los hijos de oriente
  alternatives_spanish:
  - Y Madián y Amalec y todos los hijos de oriente
  lexicon: HALOT
  rationale: Se conserva el encadenamiento narrativo inicial con 'Ahora', siguiendo el valor discursivo del hebreo en este contexto. 'Madián' y 'Amalec' se transliteran según el uso bíblico habitual en español.
theological_decisions:
- issue: La expresión colectiva בְּנֵי קֶדֶם puede leerse literalmente como 'hijos de oriente' o idiomáticamente como un pueblo/etnia oriental.
  english_pob_reading: the people of the East
  chosen_spanish_reading: los hijos de oriente
  alternative_spanish_readings:
  - la gente de oriente
  - los pueblos del oriente
  rationale: 'No hay una carga doctrinal directa, pero sí una decisión de transparencia: se mantiene la metáfora filial del hebreo en vez de sustituirla por una paráfrasis más explicativa. Así se preserva el color del original y el lector puede percibir la designación tradicional del grupo.'
  doctrine_reference: N/A
- issue: El participio נֹפְלִים admite la idea de 'caer/estar caído', pero aquí describe disposición militar en el valle.
  english_pob_reading: were lying
  chosen_spanish_reading: estaban tendidos
  alternative_spanish_readings:
  - yacían
  - estaban caídos
  rationale: La elección evita sugerir indebidamente una derrota ya consumada, pero tampoco diluye la imagen de tropas extendidas en el terreno. Se conserva la tensión entre el sentido literal del verbo y su uso contextual.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto inglés auditado está en estado de alta concordancia y no muestra cambios aplicados en la última revisión; por eso el español sigue de cerca sus decisiones léxicas clave (especialmente 'were lying', 'people of the East', 'without number' e 'in abundance') sin introducir nuevas interpretaciones.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto cuando no aparece el Tetragrámaton en este versículo; no aplica aquí, por lo que no se usa.
  - Se transliteraron los nombres propios como 'Madián' y 'Amalec' por consistencia bíblica en español.
  - Se preservó la repetición enfática de cantidad ('innumerables' / 'en abundancia') para reflejar el paralelismo hebreo.
  - '''Hijos de oriente'' se conservó deliberadamente como calco transparente del hebreo, con nota para orientar al lector.'
