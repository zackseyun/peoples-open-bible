translation:
  language: es
  text: Los inscritos[a] de ellos, según el número de todo varón de un mes de edad en adelante, eran siete mil quinientos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los que fueron contados entre ellos'; el hebreo usa dos veces el mismo término censal en el versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: פְּקֻדֵיהֶם
  english_pob_choice: their numbered ones
  chosen_spanish: los contados de ellos
  alternatives_spanish:
  - los numerados de ellos
  - los contados entre ellos
  - los inscritos de ellos
  lexicon: HALOT
  rationale: El término hebreo repite la idea censal de personas contadas/registradas. En español, 'los contados de ellos' conserva la referencia al grupo censado sin introducir un término eclesiástico o administrativo más fuerte que el hebreo no exige.
- source_word: בְּמִסְפַּר
  english_pob_choice: according to the number of
  chosen_spanish: según el número de
  alternatives_spanish:
  - de acuerdo con el número de
  - por el número de
  - conforme al número de
  lexicon: HALOT
  rationale: La construcción introduce la base del cómputo. 'Según el número de' es natural en español y mantiene el valor relacional de la expresión hebrea.
- source_word: כָּל זָכָר
  english_pob_choice: every male
  chosen_spanish: todo varón
  alternatives_spanish:
  - cada varón
  - todos los varones
  - todo macho
  lexicon: HALOT
  rationale: El hebreo es explícitamente masculino en un contexto de censo. 'Todo varón' es claro, digno y fiel al matiz censal; 'macho' sería impropio en español bíblico aquí.
- source_word: מִבֶּן חֹדֶשׁ וָמָעְלָה
  english_pob_choice: from a month old and upward
  chosen_spanish: de un mes o más
  alternatives_spanish:
  - desde un mes de edad y arriba
  - de un mes de edad en adelante
  - desde un mes o más
  lexicon: HALOT
  rationale: La fórmula hebrea fija un umbral de edad. 'De un mes o más' es idiomático en español y conserva la extensión inclusiva del original.
- source_word: שִׁבְעַת אֲלָפִים וַחֲמֵשׁ מֵאוֹת
  english_pob_choice: seven thousand five hundred
  chosen_spanish: siete mil quinientos
  alternatives_spanish:
  - '7.500'
  - siete mil y quinientos
  lexicon: HALOT
  rationale: El número cardinal se expresa en palabras para mantener el registro bíblico continuo y la fluidez de lectura.
translation_notes:
  revision_awareness: Se corrigió el problema de validación asegurando que el marcador de nota [a] aparezca exactamente en el texto español y quede anclado a la expresión censal correspondiente. Se mantiene la repetición conceptual del término hebreo sin duplicar innecesariamente la frase en español.
  spanish_consistency_notes:
  - Se prefirió 'varón' para reflejar con precisión el rasgo masculino del hebreo en un contexto de censo.
  - '''De un mes o más'' mantiene la fórmula de umbral de edad sin añadir explicaciones no presentes en el texto.'
  - La nota [a] preserva la alternativa censal documentada por el audit trail inglés.
