translation:
  language: es
  text: Él lleva a los consejeros despojados[a], y vuelve insensatos a los jueces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'saqueados' o 'desposeídos'; el hebreo puede enfatizar que los consejeros son llevados en humillación y desposesión.
    reason: lexical_alternative
lexical_decisions:
- source_word: מוֹלִיךְ
  english_pob_choice: leads away
  chosen_spanish: aleja
  alternatives_spanish:
  - conduce lejos
  - lleva lejos
  - expulsa
  lexicon: HALOT
  rationale: El verbo causativo de הלך aquí expresa mover a alguien de su lugar. En español, 'aleja' comunica bien el desplazamiento forzado sin añadir matices que el hebreo no exige.
- source_word: יוֹעֲצִים
  english_pob_choice: counselors
  chosen_spanish: consejeros
  alternatives_spanish:
  - asesores
  - consejeros políticos
  - consultores
  lexicon: HALOT
  rationale: '''Consejeros'' reproduce el campo semántico de quienes dan consejo y funciona de manera natural en español. ''Asesores'' sería posible, pero menos directo en este contexto sapiencial y de liderazgo.'
- source_word: שׁוֹלָל
  english_pob_choice: stripped
  chosen_spanish: despojados
  alternatives_spanish:
  - desnudos
  - saqueados
  - desposeídos
  lexicon: HALOT
  rationale: La forma alude a despojo y humillación. 'Despojados' preserva esa tensión entre pérdida de bienes y vergüenza, y evita concretar indebidamente el modo exacto del despojo.
- source_word: שֹׁפְטִים
  english_pob_choice: judges
  chosen_spanish: jueces
  alternatives_spanish:
  - gobernantes
  - magistrados
  lexicon: HALOT
  rationale: '''Jueces'' es la correspondencia más directa y mantiene el paralelismo con ''consejeros'' como figuras de autoridad y discernimiento.'
- source_word: יְהוֹלֵל
  english_pob_choice: makes foolish
  chosen_spanish: enloquece
  alternatives_spanish:
  - hace necios
  - vuelve insensatos
  - los hace obrar con locura
  lexicon: HALOT
  rationale: El piel de הלל (II) expresa volver insensato o irracional. 'Enloquece' conserva la fuerza verbal y la idea de desorden mental/criterio, aunque en español también deja oír una intensidad mayor que 'hace necios'.
theological_decisions:
- issue: Sujeto implícito de la acción
  english_pob_reading: He, referring to God, is retained as the subject.
  chosen_spanish_reading: Él se mantiene como sujeto implícito y remite a Dios por el contexto inmediato.
  alternative_spanish_readings:
  - Dios aleja despojados a los consejeros...
  - Yahvé aleja despojados a los consejeros...
  rationale: En Job 12, el discurso atribuye estas acciones a Dios. En español, dejar 'Él' respeta el paralelismo poético y la referencia contextual sin introducir el nombre divino donde el hebreo no lo explicita en este verso.
  doctrine_reference: Job 12:9-17; teología de la soberanía divina en el libro de Job
translation_notes:
  revision_awareness: 'El texto inglés auditado no requirió revisión en la última pasada: se mantuvo la lectura de que Dios es el sujeto implícito, con ''stripped'' como elección principal y la nota alternativa ''plundered/despoiled''. La versión española conserva esa misma tensión semántica mediante ''despojados''.'
  spanish_consistency_notes:
  - Se preservó la causalidad verbal del hebreo con un verbo breve y dinámico ('aleja' / 'enloquece').
  - '''Consejeros'' y ''jueces'' mantienen el paralelismo de líderes sociales sin forzar equivalencias institucionales modernas.'
  - No se usó 'SEÑOR' ni 'Cristo'; el verso no contiene el Tetragrámaton explícito ni lenguaje mesiánico.
  - La nota [a] se ancla en 'despojados' para reflejar la ambigüedad entre desnudez, saqueo y despojo.
