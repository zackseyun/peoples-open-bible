  lexicon: BDAG
  rationale: σοφία와 γνῶσις의 구분을 「지혜와 지식」으로 보존한다.
- source_word: ἀπόκρυφοι
  english_pob_choice: hidden
  chosen_korean: 감추어져 있습니다
  alternatives_korean:
  - 숨겨져 있습니다
  - 저장되어 있습니다
  lexicon: BDAG
  rationale: ἀπόκρυφος의 「감추어짐」을 그대로 옮기되, 「감춤」의 보존·기밀 함의를 모두 보존한다.
