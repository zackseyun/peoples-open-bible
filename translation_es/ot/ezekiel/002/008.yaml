translation:
  language: es
  text: Pero tú[a], hijo de hombre, oye lo que te estoy hablando. No seas rebelde como la casa rebelde. Abre tu boca y come lo que te estoy dando.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mortal» o «ser humano» para «hijo de hombre».
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - ser humano
  - mortal
  lexicon: HALOT
  rationale: Conserva el vocativo fijo y repetido de Ezequiel, sin neutralizarlo con una paráfrasis más genérica. 'Hijo de hombre' es la forma española tradicional y directa del mismo giro idiomático.
- source_word: שְׁמַע
  english_pob_choice: hear
  chosen_spanish: oye
  alternatives_spanish:
  - escucha
  - oye y atiende
  lexicon: HALOT
  rationale: El imperativo pide recepción atenta de la palabra. 'Oye' mantiene la forma breve e imperativa del hebreo y suena natural en español bíblico contemporáneo.
- source_word: מְדַבֵּר אֵלֶיךָ
  english_pob_choice: I am speaking to you
  chosen_spanish: yo te hablo
  alternatives_spanish:
  - yo estoy hablando contigo
  - yo te estoy hablando
  lexicon: HALOT
  rationale: El participio expresa habla en curso o inmediata. 'Yo te hablo' transmite esa inmediatez sin sobrecargar la frase en español.
- source_word: אַל תְּהִי מֶרִי
  english_pob_choice: Do not be rebellious
  chosen_spanish: No seas rebelde
  alternatives_spanish:
  - No te rebeles
  - No llegues a ser rebelde
  lexicon: HALOT
  rationale: 'מֶרִי nombra rebeldía/rebeldioso. En español, el valor natural y preciso es adjetival: ''seas rebelde'', que conserva la fuerza del mandato.'
- source_word: כְּבֵית הַמֶּרִי
  english_pob_choice: like the rebellious house
  chosen_spanish: como la casa rebelde
  alternatives_spanish:
  - como la casa de rebeldía
  - como la familia rebelde
  lexicon: HALOT
  rationale: '''Casa'' preserva el valor colectivo corporativo de Israel y ''rebelde'' mantiene el eco de la repetición interna del término en el versículo.'
- source_word: פְּצֵה פִיךָ
  english_pob_choice: Open your mouth
  chosen_spanish: Abre tu boca
  alternatives_spanish:
  - Ábrete la boca
  - Abre bien tu boca
  lexicon: HALOT
  rationale: La imagen concreta se comunica de forma idiomática en español con 'Abre tu boca', sin perder el mandato simbólico.
- source_word: וֶאֱכֹל
  english_pob_choice: and eat
  chosen_spanish: y come
  alternatives_spanish:
  - entonces come
  - y devora
  lexicon: HALOT
  rationale: Mantiene la secuencia imperativa concreta del acto simbólico sin añadir intensidad no sustentada por el hebreo.
- source_word: אֵת אֲשֶׁר אֲנִי נֹתֵן אֵלֶיךָ
  english_pob_choice: what I am giving you
  chosen_spanish: lo que yo te doy
  alternatives_spanish:
  - lo que yo estoy dándote
  - lo que te estoy dando
  lexicon: HALOT
  rationale: 'La forma española más natural para el participio en este contexto es el presente simple de acción inmediata: ''yo te doy'', que conserva la inmediatez sin artificio.'
theological_decisions:
- issue: Vocativo אָדָם en dirección profética
  english_pob_reading: son of man
  chosen_spanish_reading: hijo de hombre
  alternative_spanish_readings:
  - ser humano
  - mortal
  rationale: Se mantiene el vocativo literario y repetido de Ezequiel. No se sustituye por una paráfrasis general, porque el texto funciona como fórmula profética de llamamiento, no como afirmación doctrinal sobre la humanidad en abstracto.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy, point 4; Contested terms: אָדָם'
translation_notes:
  revision_awareness: Se corrigió la validación anterior añadiendo el ancla [a] en el texto español junto a «tú», de modo que la nota alternativa queda debidamente vinculada al vocativo.
  spanish_consistency_notes:
  - Se mantiene el tratamiento directo de segunda persona singular en todo el versículo.
  - Se conserva la repetición de la raíz de rebeldía con 'rebelde' / 'casa rebelde'.
  - Se evita traducir mecánicamente 'I am speaking' con una perífrasis innecesaria cuando el presente español expresa bien la inmediatez.
  - El texto final es breve y apto para lectura litúrgica o estudio, sin perder la concreción del acto simbólico de comer lo dado por Dios.
