revisions:
- from: Pone término a la oscuridad[a], y rastrea hasta el último límite las piedras de la oscuridad profunda y de la sombra de muerte.
  to: Pone fin a las tinieblas, y explora todo límite, las piedras de la penumbra y de la profunda oscuridad[a].
  rationale: 'Se corrige el texto para ajustarlo a la decisión fuente/POB: צַלְמָוֶת se traduce en el cuerpo como ''profunda oscuridad'', mientras la lectura tradicional ''sombra de muerte'' pasa a nota. Se mueve el marcador al sintagma pertinente. También se simplifica ''rastrea hasta el último límite'' a ''explora todo límite'' para reflejar mejor חוֹקֵר ... וּלְכָל תַּכְלִית y mejorar la naturalidad. ''Tinieblas'' y ''penumbra'' ayudan a distinguir los términos hebreos sin forzar el español.'
