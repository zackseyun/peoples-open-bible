translation:
  language: es
  text: ¿Cómo podríamos entonar el canto de Yahvé[a] en tierra extranjera[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el canto de YHWH»; tradicionalmente, «el canto del SEÑOR».'
    reason: alternative_reading
  - marker: b
    text: 'O: «en una tierra extranjera». El hebreo dice literalmente «sobre suelo extranjero».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיךְ
  english_pob_choice: How can
  chosen_spanish: ¿Cómo podemos
  alternatives_spanish:
  - ¿Cómo podríamos
  - ¿Cómo vamos a poder
  lexicon: HALOT
  rationale: La pregunta hebrea expresa imposibilidad o impropiedad retórica; en español, «¿Cómo podemos…?» comunica con naturalidad la queja lamentosa sin volverla demasiado abstracta. El valor no es solo interrogativo, sino de incapacidad práctica/moral en el contexto.
- source_word: נָשִׁיר
  english_pob_choice: we sing
  chosen_spanish: cantar
  alternatives_spanish:
  - cantemos
  - podamos cantar
  lexicon: HALOT
  rationale: El verbo hebreo está en primera común plural imperfecta en una pregunta retórica. En español, el infinitivo después de «podemos» mantiene la idea de acción contemplada sin forzar un modo verbal artificial.
- source_word: שִׁיר
  english_pob_choice: the song
  chosen_spanish: el canto
  alternatives_spanish:
  - la canción
  - el cántico
  lexicon: HALOT
  rationale: El sustantivo puede referirse a un canto/canción concreta. «Canto» suena digno y natural en español bíblico contemporáneo, y evita la posible ligereza de «canción». «Cántico» sería más tradicional, pero puede sonar más litúrgico de lo que exige el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración en español, conforme a la política del proyecto. «Yahvé» es la forma preferida en el estilo objetivo; mantiene la referencia al Tetragrámaton sin sustituirlo por un título.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: en
  alternatives_spanish:
  - sobre
  - sobre el
  lexicon: HALOT
  rationale: Aunque el hebreo usa literalmente una idea de «sobre», en español «en suelo extranjero» expresa la localización con mayor naturalidad y reproduce el sentido de estar asentados sobre una tierra ajena. La alternativa «sobre suelo extranjero» sería más literal pero menos idiomática.
- source_word: אַדְמַת
  english_pob_choice: soil
  chosen_spanish: suelo
  alternatives_spanish:
  - tierra
  - terreno
  lexicon: HALOT
  rationale: «Suelo» conserva la concreción material del hebreo y se alinea con la imagen de terreno físico. «Tierra» también sería posible, pero en español puede sonar más amplia/territorial que la metáfora original.
- source_word: נֵכָר
  english_pob_choice: foreign
  chosen_spanish: extranjero
  alternatives_spanish:
  - ajeno
  - foráneo
  lexicon: HALOT
  rationale: El adjetivo apunta a algo perteneciente a otro pueblo o país. «Extranjero» transmite con claridad esa extranjería; «ajeno» podría sugerir distanciamiento más que procedencia foránea, y «foráneo» resulta menos natural en esta construcción.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se mantiene su transliteración en español para no ocultar el nombre propio de Dios ni reemplazarlo por un título. «Yahvé» sigue la convención adoptada por el proyecto y es plenamente legible en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Coincide con la lectura de alta concordancia del audit trail inglés; no se registraron revisiones posteriores que alteren el sentido. La traducción conserva la fuerza retórica de la pregunta y la referencia explícita al nombre divino.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma estándar del nombre divino en este proyecto.
  - «Suelo extranjero» reproduce la concreción espacial del hebreo; la nota ofrece la alternativa «en tierra extranjera» por si se prefiere una formulación más idiomática.
  - La pregunta retórica en español usa «¿Cómo podemos…?» para reflejar la imposibilidad implícita del original.
