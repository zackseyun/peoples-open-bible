translation:
  language: es
  text: Porque su cargo era asistir[a] a los hijos de Aarón en el servicio de la casa de Yahvé, sobre los atrios y las cámaras, y la purificación de todo lo santo[c], y la obra del servicio de la casa de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «a la mano de los hijos de Aarón»; es decir, sirviendo junto a ellos o asistiendo a los sacerdotes. También puede entenderse «junto a» o «al servicio de», porque לְיַד funciona aquí idiomáticamente como expresión de apoyo en la tarea.
    reason: lexical_alternative
  - marker: c
    text: O «la purificación de cada cosa santa».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduzco la cláusula explicativa con «Porque», que conserva la fuerza causal/explanatoria del hebreo y suena natural en español bíblico contemporáneo.
- source_word: מַעֲמָדָם
  english_pob_choice: their duty
  chosen_spanish: su cargo
  alternatives_spanish:
  - su deber
  - su puesto
  - su oficio
  lexicon: HALOT
  rationale: El término hebreo puede denotar una posición asignada o una función establecida. «Su cargo» mantiene la idea de responsabilidad oficial y evita reducirlo solo a obligación moral.
- source_word: לְיַד
  english_pob_choice: to assist
  chosen_spanish: asistir
  alternatives_spanish:
  - al lado de
  - junto a
  - bajo la dirección de
  lexicon: HALOT
  rationale: La expresión idiomática indica servicio de apoyo junto a los sacerdotes. «Asistir» comunica esa función sin forzar una imagen espacial literal poco natural en español.
- source_word: בְּנֵי אַהֲרֹן
  english_pob_choice: the sons of Aaron
  chosen_spanish: los hijos de Aarón
  alternatives_spanish:
  - los hijos de Aarón
  lexicon: HALOT
  rationale: Mantengo la designación sacerdotal tradicional y transparente. «Hijos» conserva el patrón hebreo y la referencia al linaje aarónico.
- source_word: לַעֲבֹדַת בֵּית יְהוָה
  english_pob_choice: in the service of the house of Yahweh
  chosen_spanish: en el servicio de la casa de Yahvé
  alternatives_spanish:
  - para el servicio de la casa de Yahvé
  - en la obra de la casa de Yahvé
  lexicon: HALOT
  rationale: «Servicio» refleja עֲבֹדָה en contexto cultual. «Casa de Yahvé» sigue el principio del nombre divino sin sustituirlo por una convención de máscara.
- source_word: עַל הַחֲצֵרוֹת
  english_pob_choice: over the courts
  chosen_spanish: sobre los atrios
  alternatives_spanish:
  - encargados de los atrios
  - respecto de los atrios
  lexicon: HALOT
  rationale: La preposición עַל aquí expresa ámbito de responsabilidad. «Sobre los atrios» conserva la relación de supervisión/encargo que la revisión inglesa corrigió en favor de una lectura administrativa.
- source_word: הַחֲצֵרוֹת
  english_pob_choice: the courts
  chosen_spanish: los atrios
  alternatives_spanish:
  - los patios
  lexicon: HALOT
  rationale: En lenguaje bíblico español, «atrios» es el término arquitectónico más claro para los espacios del templo, y transmite mejor la función cultual que «patios».
- source_word: הַלְּשָׁכוֹת
  english_pob_choice: the chambers
  chosen_spanish: las cámaras
  alternatives_spanish:
  - las salas
  - los aposentos
  lexicon: HALOT
  rationale: «Cámaras» conserva el registro formal y arquitectónico de los espacios del templo, mejor que un término más doméstico como «aposentos».
- source_word: טָהֳרַת לְכָל קֹדֶשׁ
  english_pob_choice: the purification of all that is holy
  chosen_spanish: la purificación de todo lo santo
  alternatives_spanish:
  - la purificación de todas las cosas santas
  - la limpieza de todo lo santo
  lexicon: HALOT
  rationale: El hebreo puede referirse al mantenimiento ritual de lo santo en conjunto. «Todo lo santo» reproduce esa colectividad sin especificar más de lo que el texto dice.
- source_word: קֹדֶשׁ
  english_pob_choice: all that is holy
  chosen_spanish: todo lo santo
  alternatives_spanish:
  - las cosas santas
  - lo santo
  lexicon: HALOT
  rationale: Mantengo el valor colectivo del singular hebreo. «Todo lo santo» es una forma natural en español para abarcar los objetos o ámbitos sagrados sin restringirlos.
- source_word: וּמַעֲשֵׂה עֲבֹדַת בֵּית הָאֱלֹהִים
  english_pob_choice: and the work of the service of the house of God
  chosen_spanish: y la obra del servicio de la casa de Dios
  alternatives_spanish:
  - y el trabajo del servicio de la casa de Dios
  - y la labor de la obra de la casa de Dios
  lexicon: HALOT
  rationale: Conservo la acumulación nominal hebrea («obra» + «servicio») sin aplanarla. «Casa de Dios» sigue fielmente la variación del texto frente a «casa de Yahvé».
- source_word: בֵּית הָאֱלֹהִים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - la casa de Dios
  lexicon: HALOT
  rationale: Mantengo la alternancia deliberada del hebreo entre el nombre divino y «Dios», tal como la observó la traducción inglesa.
theological_decisions:
- issue: Renderización del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo usa directamente el nombre del pacto. Siguiendo el criterio del proyecto, lo translitero como «Yahvé» y no lo sustituyo por una máscara como «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación funcional de los levitas con los hijos de Aarón en לְיַד
  english_pob_reading: to assist the sons of Aaron
  chosen_spanish_reading: asistir a los hijos de Aarón
  alternative_spanish_readings:
  - al lado de los hijos de Aarón
  - bajo la autoridad de los hijos de Aarón
  rationale: La frase describe un servicio de apoyo, no solo proximidad física. «Asistir» conserva la relación ministerial sin añadir una jerarquía más fuerte de la que el hebreo exige.
  doctrine_reference: 'DOCTRINE.md: Lexical and syntactic fidelity in cultic service roles'
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del audit trail en la que עַל fue ajustado de una idea meramente relacional a una de responsabilidad/encargo («over the courts and the chambers»). Por eso se eligió «sobre los atrios y las cámaras» en vez de una formulación con solo «respecto de». También se preservó la distinción del hebreo entre «casa de Yahvé» y «casa de Dios», tal como se mantiene en el texto inglés auditado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה y «Dios» para הָאֱלֹהִים, sin armonizarlos.
  - Se usa «atrios» y «cámaras» para el vocabulario arquitectónico del templo.
  - «Todo lo santo» conserva la amplitud colectiva de קֹדֶשׁ sin añadir explicaciones al texto principal.
  - La acumulación nominal «obra del servicio» refleja la duplicación del hebreo y la decisión inglesa de no aplanarla.
