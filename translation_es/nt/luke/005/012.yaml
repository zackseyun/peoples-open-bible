translation:
  language: es
  text: 'Y aconteció que, estando él en una de las ciudades, he aquí un hombre lleno de lepra[a]. Y al ver a Jesús, cayó rostro en tierra y le rogó, diciendo: «Señor, si quieres[b], puedes limpiarme».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cubierto de lepra». El griego dice «lleno de lepra», lo que enfatiza la gravedad de la condición.
    reason: lexical_alternative
  - marker: b
    text: O «hacerme limpio». El verbo puede referirse a limpieza en sentidos físico y ritual/social, no solo a una sanidad médica.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  english_pob_choice: it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y pasó
  lexicon: BDAG
  rationale: Conserva la fórmula narrativa de transición con un castellano natural y digno, sin volverla mecánica.
- source_word: ἐν τῷ εἶναι αὐτὸν
  english_pob_choice: while he was
  chosen_spanish: estando él
  alternatives_spanish:
  - mientras él estaba
  - cuando él estaba
  lexicon: BDAG
  rationale: La construcción temporal se vierte de modo idiomático en español, manteniendo la simultaneidad de la escena.
- source_word: μιᾷ τῶν πόλεων
  english_pob_choice: one of the towns
  chosen_spanish: en una de las ciudades
  alternatives_spanish:
  - en una de las poblaciones
  - en uno de los pueblos
  lexicon: BDAG
  rationale: πόλις puede ser 'ciudad' o 'población'; aquí 'ciudad' es perfectamente válido y no exige minimizar el término a 'pueblo'.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mirad
  - mira
  lexicon: BDAG
  rationale: Reproduce el marcador discursivo de sorpresa y vividez con una fórmula española tradicional pero todavía clara.
- source_word: ἀνὴρ πλήρης λέπρας
  english_pob_choice: a man full of leprosy
  chosen_spanish: un hombre lleno de lepra
  alternatives_spanish:
  - un hombre cubierto de lepra
  - un hombre totalmente leproso
  lexicon: BDAG
  rationale: Se conserva la intensidad de πλήρης y la expresión léxica de lepra sin reducirla a una mera descripción médica.
- source_word: ἰδὼν
  english_pob_choice: when he saw
  chosen_spanish: al ver
  alternatives_spanish:
  - cuando vio
  - viendo
  lexicon: BDAG
  rationale: La partícula participial se expresa con una cláusula temporal breve y natural en español.
- source_word: πεσὼν ἐπὶ πρόσωπον
  english_pob_choice: he fell on his face
  chosen_spanish: se postró sobre su rostro
  alternatives_spanish:
  - cayó sobre su rostro
  - se echó rostro en tierra
  lexicon: BDAG
  rationale: Se mantiene la postura de humillación y súplica. 'Se postró' comunica bien el gesto; 'sobre su rostro' conserva la imagen literal del griego mejor que un simple 'facedown'.
- source_word: ἐδεήθη αὐτοῦ
  english_pob_choice: begged him
  chosen_spanish: le rogó
  alternatives_spanish:
  - le suplicó
  - le imploró
  lexicon: BDAG
  rationale: '''Rogó'' conserva la intensidad respetuosa de la petición sin sonar excesivamente coloquial.'
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  - Señor mío
  lexicon: BDAG
  rationale: Sigue la convención doctrinal del proyecto para κύριος aplicado a Jesús en este contexto de dirección respetuosa.
- source_word: ἐὰν θέλῃς
  english_pob_choice: if you are willing
  chosen_spanish: si quieres
  alternatives_spanish:
  - si estás dispuesto
  - si quieres hacerlo
  lexicon: BDAG
  rationale: En español 'si quieres' expresa con naturalidad la voluntad requerida por el contexto; no estrecha el sentido a una mera preferencia casual.
- source_word: δύνασαί
  english_pob_choice: you can
  chosen_spanish: puedes
  alternatives_spanish:
  - tienes poder para
  - eres capaz de
  lexicon: BDAG
  rationale: La capacidad/poder se expresa de manera directa y comprensible sin añadir matices innecesarios.
- source_word: καθαρίσαι
  english_pob_choice: cleanse me
  chosen_spanish: limpiarme
  alternatives_spanish:
  - hacerme limpio
  - purificarme
  lexicon: BDAG
  rationale: '''Limpiarme'' conserva el campo semántico de καθαρίζω en contexto de lepra, incluyendo la posible dimensión ritual/social, y suena natural en español. ''Limpio'' y ''purificar'' serían más marcados o menos idiomáticos aquí.'
theological_decisions:
- issue: 'λέπρα y καθαρίζω: enfermedad y limpieza ritual/social'
  english_pob_reading: Use 'leprosy' and 'cleanse me' rather than reducing the request to mere physical healing.
  chosen_spanish_reading: Usar 'lepra' y 'limpiarme' para no reducir la petición a una curación médica.
  alternative_spanish_readings:
  - '''enfermedad de la piel'' y ''sanarme'''
  - '''lepra'' y ''hacerme limpio'''
  rationale: El griego conserva la condición de lepra y el verbo de limpieza, que en este contexto puede abarcar restauración física, ritual y social. 'Limpiarme' comunica ese campo semántico en español sin perder naturalidad.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: κύριος dirigido a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  - Señor, si gustas
  rationale: '''Señor'' mantiene la convención del proyecto para κύριος y puede sostener la resonancia cristológica sin exagerarla. ''Maestro'' o ''Sir'' rebajarían el tono del saludo en este contexto.'
  doctrine_reference: 'Contested terms table: κύριος → Lord'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el audit trail inglés, sin cambios de revisión relevantes respecto al pass más reciente; se conserva la intensidad de πλήρης λέπρας y el valor semántico amplio de καθαρίζω.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como convención general del proyecto, pero este versículo no contiene el Tetragrámaton ni una cita directa que requiera ajuste.
  - Se usó 'Señor' para κύριος en dirección a Jesús, coherente con el default doctrinal del proyecto.
  - Se prefirió un español público y eclesialmente legible, evitando calcos innecesarios pero conservando la imagen física de la súplica.
