translation:
  language: es
  text: Y llegó entre el campamento de Egipto y el campamento de Israel[a]; y estaban la nube y la oscuridad, y alumbró la noche; y el uno no se acercó al otro toda la noche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y estaban la nube y la oscuridad, pero dio luz en la noche». El hebreo es breve, y las versiones antiguas y las traducciones difieren en cómo se relacionan la oscuridad y la luz con los dos campamentos.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: it came
  chosen_spanish: y llegó
  alternatives_spanish:
  - y vino
  - y se presentó
  lexicon: HALOT
  rationale: El hebreo expresa movimiento narrativo hacia una nueva posición. «Llegó» comunica ese desplazamiento de forma natural en español sin añadir sujeto explícito que resuelva la referencia interpretativa.
- source_word: בֵּין ... וּבֵין
  english_pob_choice: between ... and ...
  chosen_spanish: entre ... y ...
  alternatives_spanish:
  - en medio de ... y ...
  lexicon: HALOT
  rationale: Es el equivalente espacial directo y mantiene la relación entre ambos campamentos.
- source_word: מַחֲנֵה
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento militar
  - campamento
  lexicon: HALOT
  rationale: «Campamento» suena natural en español y conserva el sentido colectivo y logístico del hebreo en este contexto de marcha y combate.
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - los egipcios
  lexicon: HALOT
  rationale: El constructo hebreo dice literalmente «campamento de Egipto». Mantener «Egipto» sigue de cerca la forma fuente y conserva la parquedad del hebreo.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - los israelitas
  lexicon: HALOT
  rationale: Se conserva el nombre propio del texto hebreo; el sentido colectivo está implícito en «campamento de Israel».
- source_word: וַיְהִי
  english_pob_choice: there was
  chosen_spanish: y hubo
  alternatives_spanish:
  - y estaba
  - y ocurrió
  lexicon: HALOT
  rationale: La forma existencial de «hubo» reproduce bien la construcción narrativa y la presencia resultante de la nube y la oscuridad.
- source_word: הֶעָנָן
  english_pob_choice: the cloud
  chosen_spanish: la nube
  alternatives_spanish:
  - la nube de nube
  - el nubarrón
  lexicon: HALOT
  rationale: Correspondencia directa y clara para el sustantivo definido, en continuidad con el contexto del pilar de nube.
- source_word: וְהַחֹשֶׁךְ
  english_pob_choice: and the darkness
  chosen_spanish: y la oscuridad
  alternatives_spanish:
  - y tinieblas
  lexicon: HALOT
  rationale: «Oscuridad» conserva la definitud del hebreo y resulta idiomático en español moderno; «tinieblas» sería más solemne pero más marcado.
- source_word: וַיָּאֶר
  english_pob_choice: yet it lit up
  chosen_spanish: y alumbró
  alternatives_spanish:
  - y dio luz
  - y resplandeció
  lexicon: HALOT
  rationale: «Alumbró» transmite el valor de dar luz con naturalidad en español. Se evita fijar el sujeto con un pronombre personal para preservar la ambigüedad del referente en el texto fuente.
- source_word: אֶת הַ/לָּיְלָה
  english_pob_choice: the night
  chosen_spanish: la noche
  alternatives_spanish:
  - durante la noche
  lexicon: HALOT
  rationale: El objeto directo explícito se rinde con «la noche», manteniendo la estructura del hebreo.
- source_word: וְלֹא קָרַב
  english_pob_choice: did not come near
  chosen_spanish: no se acercó
  alternatives_spanish:
  - no llegó cerca
  - no se aproximó
  lexicon: HALOT
  rationale: «Acercarse» expresa bien la negación de proximidad espacial y suena natural en español.
- source_word: זֶה אֶל זֶה
  english_pob_choice: the one ... the other
  chosen_spanish: el uno ... al otro
  alternatives_spanish:
  - uno ... al otro
  - este ... aquel
  lexicon: HALOT
  rationale: La fórmula española reproduce el paralelismo recíproco del hebreo y evita ambigüedad sobre cuáles son los dos referentes.
- source_word: כָּל הַלָּיְלָה
  english_pob_choice: all night
  chosen_spanish: en toda la noche
  alternatives_spanish:
  - toda la noche
  - durante toda la noche
  lexicon: HALOT
  rationale: «En toda la noche» comunica la duración total del período sin forzar una reestructuración más libre.
theological_decisions:
- issue: Referencia implícita del movimiento e iluminación
  english_pob_reading: Use impersonal/neuter 'it' for the moving and illuminating presence
  chosen_spanish_reading: 'Mantener una formulación impersonal: «llegó» / «alumbró», sin explicitar «él», «la columna» ni «la nube» como sujeto interpretativo único'
  alternative_spanish_readings:
  - «él llegó» refiriendo al ángel de Dios
  - «la nube llegó... y alumbró» explicitando la columna de nube
  rationale: El contexto inmediato permite más de un referente posible para los verbos singulares. La redacción española conserva esa tensión sin resolverla dogmáticamente.
  doctrine_reference: Translation philosophy §3
- issue: Relación entre nube, oscuridad e iluminación
  english_pob_reading: there was the cloud and the darkness, yet it lit up the night
  chosen_spanish_reading: «hubo la nube y la oscuridad, y alumbró la noche»
  alternative_spanish_readings:
  - «hubo la nube y la oscuridad, pero dio luz de noche»
  - «hubo nube y oscuridad, y fue luz en la noche»
  rationale: El hebreo es breve y deja la relación exacta algo tersa. La versión española mantiene esa tersura sin añadir una explicación que no está exigida por el texto.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Coincide con la lectura revisada más reciente del expediente inglés; no se identifican cambios necesarios respecto del sentido auditado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general en el proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «campamento» para מַחֲנֶה siguiendo el contexto militar y narrativo.
  - Se preserva la ambigüedad del referente de los verbos singulares con formulación impersonal en español.
  - Se evita «SEÑOR» o una explicitación de sujeto que borre la tensión textual documentada.
