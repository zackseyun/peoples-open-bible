review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: prohibición de entregar, referencia al esclavo, y separación de su amo. Sin embargo, introduce un matiz no explícito en el texto fuente al traducir אֵלֶיךָ como «contigo» dentro de «se haya refugiado contigo». El hebreo dice simplemente que ha escapado «a ti»/«hacia ti», no que haya buscado refugio, aunque ese sentido pueda inferirse del contexto legal. Conviene conservar el movimiento direccional sin añadir esa inferencia.'
  spanish_quality_summary: El español es claro y natural, pero «y se haya refugiado contigo» resulta interpretativo y además duplica la acción del escape con una segunda idea. «No entregarás a su amo a un esclavo que haya escapado de su amo hacia ti» o «a ti» es más fiel y sigue siendo legible. La nota al pie está bien formulada.
  glossary_alignment: Buen alineamiento con la terminología del proyecto en «esclavo». «Amo» también encaja bien para אֲדֹנָיו en este contexto sociolegal. El principal desajuste está en אֵלֶיךָ, donde el borrador abandona la decisión auditada «to you» y la reemplaza por una paráfrasis más interpretativa.
  issues:
  - severity: medium
    issue: «se haya refugiado contigo» añade una idea no explícita en אֵלֶיךָ
    rationale: El hebreo solo expresa movimiento/dirección hacia el destinatario («a ti»). «Refugiarse» interpreta el propósito o resultado del escape, pero no está dicho en el texto.
  - severity: low
    issue: La construcción española puede simplificarse para reflejar mejor la relativa hebrea
    rationale: «que haya escapado de su amo hacia ti» reproduce de manera más directa אֲשֶׁר יִנָּצֵל אֵלֶיךָ מֵעִם אֲדֹנָיו sin coordinación añadida.
  revised_spanish_text: No entregarás a su amo[a] a un esclavo que haya escapado de su amo hacia ti.
  revised_footnotes:
