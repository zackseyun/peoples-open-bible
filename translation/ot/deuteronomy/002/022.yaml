id: DEU.2.22
reference: Deuteronomy 2:22
source:
  edition: WLC
  text: כַּ/אֲשֶׁ֤ר עָשָׂה֙ לִ/בְנֵ֣י עֵשָׂ֔ו הַ/יֹּשְׁבִ֖ים בְּ/שֵׂעִ֑יר אֲשֶׁ֨ר הִשְׁמִ֤יד אֶת הַ/חֹרִי֙ מִ/פְּנֵי/הֶ֔ם וַ/יִּֽירָשֻׁ/ם֙ וַ/יֵּשְׁב֣וּ תַחְתָּ֔/ם עַ֖ד הַ/יּ֥וֹם הַ/זֶּֽה־׃
translation:
  text: just as he did for the sons of Esau who live in Seir[a], when he destroyed the Horites from before them[c][b], and they dispossessed them and settled in their place to this day.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'who dwell in Seir.'
    reason: lexical_alternative
  - marker: b
    text: Or 'from before them,' a Hebrew idiom meaning he removed the Horites from their presence/territory.
    reason: lexical_alternative
  - marker: c
    text: Or 'they took possession of them'; the sense is that the descendants of Esau dispossessed the Horites and occupied their land.
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּאֲשֶׁר
  chosen: just as
  alternatives:
  - as
  - in the same way that
  lexicon: HALOT
  rationale: Introduces comparison with the preceding statement; 'just as' gives clear comparative force in natural English.
- source_word: עָשָׂה
  chosen: did
  alternatives:
  - acted
  - worked
  lexicon: HALOT
  rationale: The verb is broad and refers back to God's action in the prior context; English 'did' best preserves the elliptical reference without over-specifying.
- source_word: לִבְנֵי עֵשָׂו
  chosen: for the sons of Esau
  alternatives:
  - for Esau's sons
  - for the descendants of Esau
  lexicon: HALOT
  rationale: Formal enough to reflect the Hebrew construct while remaining readable. 'Sons of Esau' preserves the familial/ethnic expression.
- source_word: הַיֹּשְׁבִים בְּשֵׂעִיר
  chosen: who live in Seir
  alternatives:
  - who dwell in Seir
  - living in Seir
  lexicon: HALOT
  rationale: Participial phrase describing the sons of Esau. 'Live' is modern and clear; 'dwell' is more traditional but less natural.
- source_word: אֲשֶׁר הִשְׁמִיד
  chosen: when he destroyed
  alternatives:
  - whom he destroyed
  - that he destroyed
  lexicon: HALOT
  rationale: The relative clause resumes God's action. Rendering with 'when' smooths the syntax in English while preserving the temporal-circumstantial sense in context.
- source_word: הִשְׁמִיד
  chosen: destroyed
  alternatives:
  - annihilated
  - wiped out
  lexicon: HALOT
  rationale: A strong causative verb of destruction. 'Destroyed' is accurate and idiomatic without adding rhetorical intensity beyond the Hebrew.
- source_word: הַחֹרִי
  chosen: the Horites
  alternatives:
  - the Horite people
  lexicon: HALOT
  rationale: Standard transliteration of the people group name.
- source_word: מִפְּנֵיהֶם
  chosen: from before them
  alternatives:
  - from before their face
  - from before them/presence
  - before them
  lexicon: HALOT
  rationale: Keeps the Hebrew idiom with minimal smoothing. It conveys removal from their presence/land. Slightly formal, but transparent and common in biblical style.
- source_word: וַיִּירָשֻׁם
  chosen: they dispossessed them
  alternatives:
  - they took possession of them
  - they drove them out and took their land
  - they inherited them
  lexicon: HALOT
  rationale: From ירשׁ in conquest/possession contexts, the sense is to take possession by dispossessing prior inhabitants. 'Inherited them' would be misleading in English.
- source_word: וַיֵּשְׁבוּ תַחְתָּם
  chosen: and settled in their place
  alternatives:
  - and lived in their place
  - and dwelt instead of them
  lexicon: HALOT
  rationale: The phrase indicates occupying the former inhabitants' place. 'Settled' communicates established residence after dispossession.
- source_word: עַד הַיּוֹם הַזֶּה
  chosen: to this day
  alternatives:
  - until this day
  lexicon: HALOT
  rationale: Standard idiomatic rendering of the Hebrew temporal expression.
