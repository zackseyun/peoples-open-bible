  yaml_path: translation/deuterocanon/judith/002/024.yaml
  text: And he crossed the Euphrates and passed through Mesopotamia[a], and he tore down all the high cities along the torrent Abrona[b], until he came to the sea.
  footnotes:
  - marker: a
    text: Or 'broke through all the high cities'; the Greek verb literally means 'dug through' and may describe breaching or destroying cities in a military campaign.
    reason: lexical_alternative
  - marker: b
    text: The 'torrent Abrona' is a transliterated place-name in the Greek; its exact geographical identification is uncertain.
    reason: cultural_note
