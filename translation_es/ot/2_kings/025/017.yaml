  revision_rationale: 'La revisión corrige el aparato de notas para que coincida con el expediente inglés y con las palabras fuente relevantes: la nota lexical va con ''enrejado'', y la nota sobre la elipsis final va con ''lo mismo''. También se hace una leve mejora de cercanía al hebreo al explicitar ''sobre el capitel, todo alrededor''.'
