translation:
  language: es
  text: Y Judas oyó el nombre de los romanos[a], que son poderosos en fuerza, y que están bien dispuestos hacia todos los que se adhieren a ellos, y que cuantos se acercan a ellos obtienen amistad con ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘la reputación de los romanos’. El griego dice literalmente ‘el nombre de los romanos’, y ‘nombre’ puede tener el sentido de fama o informe.
    reason: lexical_alternative
  - marker: b
    text: ‘Amistad’ aquí probablemente incluye una amistad política formal o alianza, no solo afecto personal.
    reason: cultural_note
lexical_decisions:
- source_word: ἤκουσεν
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - supo
  lexicon: BDAG
  rationale: ‘Oyó’ conserva el valor básico de recepción de información del aoristo y encaja bien con el objeto inmediato ‘el nombre de los romanos’. ‘Supo’ sería más interpretativo.
- source_word: τὸ ὄνομα τῶν Ῥωμαίων
  english_pob_choice: the name of the Romans
  chosen_spanish: el nombre de los romanos
  alternatives_spanish:
  - la reputación de los romanos
  - el renombre de los romanos
  lexicon: LSJ
  rationale: Se mantiene la forma literal ‘nombre’ para conservar la expresión griega y dejar que el contexto amplíe el sentido de fama o renombre, como hace la POB en inglés.
- source_word: δυνατοὶ ἐν ἰσχύϊ
  english_pob_choice: mighty in strength
  chosen_spanish: poderosos en fuerza
  alternatives_spanish:
  - fuertes en poder
  - poderosos en poder
  lexicon: LSJ
  rationale: ‘Poderosos en fuerza’ reproduce la intensificación semítica/griega sin sonar demasiado extraña en español. ‘Mighty’ aquí no exige otra matización doctrinal.
- source_word: εὐδοκοῦσιν
  english_pob_choice: are well disposed toward
  chosen_spanish: se muestran bien dispuestos para con
  alternatives_spanish:
  - favorecen a
  - se complacen en
  lexicon: BDAG
  rationale: La expresión apunta a una actitud favorable en un marco relacional y político; ‘se muestran bien dispuestos para con’ conserva ese matiz mejor que un simple ‘favorecen’.
- source_word: τοῖς προστεθειμένοις αὐτοῖς
  english_pob_choice: all who attach themselves to them
  chosen_spanish: todos los que se les unen
  alternatives_spanish:
  - todos los que se adhieren a ellos
  - todos los que se alían con ellos
  lexicon: LSJ
  rationale: El participio indica personas que se unen o se asocian con ellos; ‘se les unen’ fluye naturalmente en español y mantiene la idea de adhesión sin añadir todavía la interpretación política de alianza.
- source_word: ὅσοι ἐὰν προσέλθωσιν αὐτοῖς
  english_pob_choice: as many as come to them
  chosen_spanish: cuantos se acercan a ellos
  alternatives_spanish:
  - todos los que vengan a ellos
  - quienesquiera que se acerquen a ellos
  lexicon: BDAG
  rationale: La construcción indefinida se traduce bien con ‘cuantos’, que conserva el alcance general del griego y evita una paráfrasis excesiva.
- source_word: ἐσπῶντο αὐτοῖς φιλίαν
  english_pob_choice: obtain friendship with them
  chosen_spanish: obtienen amistad con ellos
  alternatives_spanish:
  - ganan amistad con ellos
  - obtienen alianza con ellos
  lexicon: LSJ
  rationale: ‘Amistad’ conserva φιλία de forma directa. ‘Obtienen’ reproduce el resultado, mientras que ‘alianza’ queda como posible matiz político, pero no se impone en el texto principal.
theological_decisions:
- issue: φιλία en contexto político
  english_pob_reading: '''Friendship'' here likely includes formal political friendship or alliance, not merely personal affection.'
  chosen_spanish_reading: ‘Amistad’ en el texto principal, con posibilidad de entenderse también como relación política formal.
  alternative_spanish_readings:
  - ‘alianza’
  - ‘amistad diplomática’
  rationale: La fuente griega usa φιλία, y la POB inglesa retiene ‘friendship’ sin borrar la posible carga diplomática. En español conviene mantener ‘amistad’ en el texto para no sobrerinterpretar, pero la nota puede preservar el matiz político.
  doctrine_reference: Cultural-historical context; no doctrinal issue.
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura revisada de la POB inglesa sin cambios sustanciales; se conserva la tensión léxica de ὄνομα y φιλία en notas, y no se introduce una interpretación doctrinal nueva.
  spanish_consistency_notes:
  - Se usa ‘Y Judas’ para reflejar el arranque narrativo del griego.
  - Se mantiene ‘los romanos’ en minúscula por tratarse de un etnónimo en español.
  - Se evita ‘SEÑOR’ u otra equivalencia no pertinente porque el versículo no contiene lenguaje divino.
  - La sintaxis conserva la estructura acumulativa de cláusulas coordinadas del griego, pero adaptada a español natural.
