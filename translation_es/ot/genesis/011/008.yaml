translation:
  language: es
  text: Entonces Yahvé los dispersó desde allí sobre la faz de toda la tierra[a], y cesaron de construir la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a través de toda la tierra» o «por toda la tierra»; hebreo literalmente, «sobre la faz de toda la tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּפֶץ
  english_pob_choice: scattered
  chosen_spanish: dispersó
  alternatives_spanish:
  - esparció
  - esparció por todas partes
  lexicon: HALOT
  rationale: El verbo פוץ en este contexto expresa la acción de hacer que el grupo se desparrame y quede distribuido en distintos lugares. En español, «dispersó» comunica bien esa acción de juicio sin sonar tan fuerte como «esparció» ni perder la idea de desunión.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», de acuerdo con la norma del proyecto. Esto evita sustituir el nombre por un título y mantiene la referencia directa al nombre propio de Dios.
- source_word: מִשָּׁם
  english_pob_choice: from there
  chosen_spanish: desde allí
  alternatives_spanish:
  - de allí
  - desde ese lugar
  lexicon: HALOT
  rationale: La locución locativa remite al lugar de Babel. «Desde allí» es natural en español y reproduce con claridad el valor direccional del hebreo.
- source_word: עַל־פְּנֵי כָל־הָאָרֶץ
  english_pob_choice: over the face of all the earth
  chosen_spanish: sobre la faz de toda la tierra
  alternatives_spanish:
  - por toda la tierra
  - a través de toda la tierra
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de «faz» para reflejar el giro idiomático עַל פְּנֵי. «Tierra» comunica el alcance global del texto mejor que «país» o «territorio» en este contexto.
- source_word: וַיַּחְדְּלוּ
  english_pob_choice: they stopped
  chosen_spanish: cesaron
  alternatives_spanish:
  - se detuvieron
  - dejaron
  lexicon: HALOT
  rationale: חדל significa cesar o parar. «Cesaron» mantiene el valor verbal preciso y encaja bien con la construcción siguiente en infinitivo.
- source_word: לִבְנֹת
  english_pob_choice: building
  chosen_spanish: de construir
  alternatives_spanish:
  - construir
  - edificar
  lexicon: HALOT
  rationale: El infinitivo constructo hebreo se expresa naturalmente en español con «de construir» después de «cesaron». Así se conserva la relación verbal sin forzar un gerundio.
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  lexicon: HALOT
  rationale: El sustantivo definido se refiere a la ciudad en construcción en el contexto inmediato. «La ciudad» es la forma más directa y clara en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El versículo usa directamente el nombre del pacto. Mantener «Yahvé» preserva la lectura documental del nombre divino y evita la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El contexto auditado coincide en alto grado con la revisión más reciente: no hubo cambios necesarios y el veredicto de revisión fue de acuerdo total. La redacción española sigue esa línea sin introducir variaciones doctrinales ni textuales.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conserva la imagen hebrea de «faz» en la nota para no borrar el matiz idiomático de עַל־פְּנֵי.
  - «Cesaron de construir» refleja con fidelidad la secuencia verbal hebrea y suena natural en español.
  - No se añade puntuación o expansión interpretativa ajena al texto fuente.
