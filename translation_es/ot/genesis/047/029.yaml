revisions:
- from: 'Cuando los días de Israel se acercaron para morir, llamó a su hijo José y le dijo: «Si ahora he hallado favor[a] ante tus ojos, por favor pon tu mano bajo mi muslo, y muéstrame misericordia y fidelidad[b]. Por favor, no me entierres en Egipto».'
  to: 'Cuando los días de Israel se acercaban a su muerte, llamó a su hijo José y le dijo: «Si ahora he hallado favor ante tus ojos, pon, por favor, tu mano bajo mi muslo[a], y trata conmigo con amor leal y fidelidad[b]. Por favor, no me entierres en Egipto».'
  rationale: Se corrigen los anclajes de notas para que coincidan con el contenido documentado; se ajusta la sintaxis de וְעָשִׂיתָ עִמָּדִי a «trata conmigo con…»; y se reemplaza «misericordia» por «amor leal» para reflejar mejor חֶסֶד וֶאֱמֶת en un contexto de obligación solemne y fidelidad confiable. También se suaviza «para morir» a «a su muerte», más natural en español sin perder el sentido.
