- from: Pero la hostilidad avanzaba[a] tanto, que incluso uno de los aprobados por Simón[b] cometía asesinatos.
  to: Pero la hostilidad avanzaba[a] tanto, que incluso se cometían asesinatos por medio de uno de los aprobados por Simón[b].
  rationale: Se ajustó la cláusula para reflejar mejor el pasivo de συντελεῖσθαι («se cometían asesinatos») y el matiz de διὰ τινος al mantener al individuo como agente indefinido mediado («por medio de uno...»), sin perder naturalidad en español ni la observación del audit trail inglés sobre el círculo aprobado por Simón.
