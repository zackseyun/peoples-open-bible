  to: Entonces sacarán a la joven[a] a la entrada de la casa de su padre, y los hombres de su ciudad la apedrearán con piedras, y morirá, porque ha cometido una vileza[b] en Israel al prostituirse[c] mientras estaba en la casa de su padre. Así extirparás el mal de en medio de ti.
  rationale: Se corrige la última cláusula para reflejar mejor el valor de לִזְנוֹת בֵּית אָבִיהָ sin imponer una localización física demasiado específica; «mientras estaba en la casa de su padre» conserva el marco legal-social del hebreo. También se pule la nota c para español más natural y preciso.
