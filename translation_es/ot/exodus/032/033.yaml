translation:
  language: es
  text: 'Yahvé dijo a Moisés: «Quien haya pecado contra mí, lo borraré[a] de mi libro[b].»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Lo borraré de mi libro».'
    reason: lexical_alternative
  - marker: b
    text: La expresión «mi libro» puede referirse al registro de Dios de aquellos que están bajo su cuidado; algunos la entienden más específicamente como «el libro de la vida».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: dijo
  alternatives_spanish:
  - entonces dijo
  - y dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; en español, la coordinación puede quedar implícita sin forzar un «y» inicial. «Dijo» conserva la secuencia narrativa de forma natural y digna.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino personal en español como «Yahvé», conforme al criterio del proyecto para el Tetragrámaton, en vez de sustituirlo por un título.
- source_word: אֶל מֹשֶׁה
  english_pob_choice: to Moses
  chosen_spanish: a Moisés
  alternatives_spanish:
  - para Moisés
  lexicon: HALOT
  rationale: La preposición אֶל expresa dirección al destinatario del discurso; en español se vierte naturalmente con «a».
- source_word: מִי אֲשֶׁר
  english_pob_choice: Whoever
  chosen_spanish: Cualquiera que
  alternatives_spanish:
  - El que
  - Quien
  lexicon: HALOT
  rationale: La construcción introduce una cláusula indefinida generalizante. «Cualquiera que» preserva ese valor sin perder fluidez en español.
- source_word: חָטָא לִי
  english_pob_choice: has sinned against me
  chosen_spanish: haya pecado contra mí
  alternatives_spanish:
  - ha pecado contra mí
  - pecare contra mí
  lexicon: HALOT
  rationale: חטא con ל marca pecado dirigido contra una persona. «Pecado contra mí» expresa bien la relación ofendida, y el subjuntivo perfecto en la relativa generalizante suena natural en español y mantiene el valor de anterioridad del acto.
- source_word: אֶמְחֶנּוּ
  english_pob_choice: I will blot him out
  chosen_spanish: lo borraré
  alternatives_spanish:
  - lo borraré de la lista
  - lo borraré del registro
  lexicon: HALOT
  rationale: מחה puede significar borrar, borrar por completo o borrar del registro. En español, «lo borraré» comunica la imagen de eliminación textual/registral sin añadir un objeto no explícito en el hebreo.
- source_word: מִסִּפְרִי
  english_pob_choice: of my book
  chosen_spanish: de mi libro
  alternatives_spanish:
  - de mi registro
  - de mi libro de registro
  lexicon: HALOT
  rationale: סֵפֶר se vierte aquí como «libro», siguiendo el valor convencional del término en un registro divino. Se conserva la metáfora sin especificarla más allá del texto.
- source_word: -נּוּ (3ms suffix in אֶמְחֶנּוּ)
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - ese hombre
  lexicon: HALOT
  rationale: El sufijo es masculino singular. En español, el clítico de objeto directo «lo» conserva la referencia gramatical sin introducir una reformulación innecesaria.
theological_decisions:
- issue: Naturaleza de «mi libro»
  english_pob_reading: Retain the metaphor 'my book' without specifying whether it is a register of the living, covenant membership, or eternal salvation.
  chosen_spanish_reading: Conservar «mi libro» como metáfora abierta, sin precisar si se trata de un registro de los que viven, de membresía del pacto o del libro de vida.
  alternative_spanish_readings:
  - libro de la vida
  - registro de los vivos
  - registro del pacto
  rationale: El hebreo dice solo «mi libro». Mantener la metáfora evita resolver una tensión interpretativa que el texto no resuelve. La nota permite al lector español ver la posible identificación sin imponerla en el cuerpo principal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con el apunte de revisión más reciente: no se requieren cambios respecto del análisis auditado, y la solución conserva el nombre divino, la generalización de «quienquiera», y la metáfora de «mi libro» sin especificarla en el texto principal.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en concordancia con el estándar del proyecto para יְהוָה.
  - Se usa «Moisés» con acento y puntuación española en la cita directa.
  - «Pecado contra mí» preserva la dirección relacional del hebreo חטא לִי.
  - Se evita «libro de la vida» en el texto principal para no cerrar la ambigüedad teológica documentada.
