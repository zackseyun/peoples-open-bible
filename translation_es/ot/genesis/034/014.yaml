- from: 'Y les dijeron[a]: «No podemos hacer esta cosa: dar a nuestra hermana a un hombre que tiene prepucio, porque eso es una vergüenza para nosotros».'
  to: 'Y les dijeron[a]: «No podemos hacer esto, dar a nuestra hermana a un hombre que tiene prepucio, porque eso es una vergüenza para nosotros».'
  rationale: Se ajusta una expresión calcada («hacer esta cosa») a un español más natural («hacer esto») sin pérdida del sentido fuente, y se mejora la puntuación interna de la cita. Se conserva la literalidad importante de «que tiene prepucio» y su alternativa interpretativa en nota, tal como documenta el POB inglés.
