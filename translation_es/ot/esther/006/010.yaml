  language: en
  yaml_path: translation/ot/esther/006/010.yaml
  text: Then the king said to Haman[a], “Hurry, take the robe and the horse, just as you have said, and do so for Mordecai the Jew, who sits at the king’s gate[b]. Leave out nothing from all that you have said.”
  footnotes:
  - marker: a
    text: Or, more literally, “Do not let a thing fall from all that you have said,” an idiom meaning to omit nothing.
    reason: lexical_alternative
  - marker: b
    text: “The Jew” could also be rendered “the Judean,” but here it most likely marks Mordecai’s ethnic-religious identity within the story.
    reason: lexical_alternative
