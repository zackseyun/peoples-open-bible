    reason: lexical_alternative
  revision_rationale: Se cambia «aplastará» por «pisoteará» para conservar la imagen concreta de יָבוּס, en línea con la evidencia hebrea y el expediente inglés. Se conserva «haremos proezas» como una formulación española natural para עשה חיל. La nota b se ajusta para que la alternativa refleje una variante española válida sin desplazar la opción principal más fiel.
