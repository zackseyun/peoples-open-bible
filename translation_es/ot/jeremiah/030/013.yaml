translation:
  language: es
  text: No hay quien defienda tu caso por tu llaga[a]; no hay curación para ti[b], ni remedio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No hay quien juzgue tu caso con respecto a tu herida». El hebreo permite tanto la idea de defensa forense como la de adjudicación judicial.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no hay vendaje para ti» o «no hay piel nueva para ti». El término hebreo raro puede referirse a un remedio concreto de curación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין
  english_pob_choice: There is no / there is no one
  chosen_spanish: No hay / no hay quien
  alternatives_spanish:
  - no existe
  - no hay nadie
  lexicon: HALOT
  rationale: 'El hebreo usa la negación existencial dos veces. En la primera cláusula, el participio con sentido judicial pide en español una construcción impersonal natural: «No hay quien». En la segunda, «No hay» conserva la negación simple ante el sustantivo abstracto/medicinal.'
- source_word: דָּן
  english_pob_choice: to plead
  chosen_spanish: defienda
  alternatives_spanish:
  - alegue
  - juzgue
  - defienda tu causa
  lexicon: HALOT
  rationale: En combinación con דִּינֵךְ, el verbo se mueve en el campo forense. «Defienda tu caso» comunica la función de abogado/intercesor que la POB inglesa quiso captar con «plead», sin perder el trasfondo jurídico de דין.
- source_word: דִּינֵךְ
  english_pob_choice: your case
  chosen_spanish: tu caso
  alternatives_spanish:
  - tu causa
  - tu demanda
  - tu pleito
  lexicon: HALOT
  rationale: דין aquí designa un asunto o causa legal. «Tu caso» es claro, actual y mantiene el sentido forense sin volverlo técnico.
- source_word: לְמָזוֹר
  english_pob_choice: for your wound
  chosen_spanish: por tu herida
  alternatives_spanish:
  - con respecto a tu herida
  - para tu herida
  - por tu llaga
  lexicon: HALOT
  rationale: 'מָזוֹר puede referirse a herida, llaga o lesión. El ל se entiende mejor aquí como relación causal o de referencia en el lenguaje legal/curativo: «por tu herida» conserva esa conexión y suena natural en español.'
- source_word: רְפֻאוֹת
  english_pob_choice: healing
  chosen_spanish: sanidad
  alternatives_spanish:
  - curación
  - sanación
  - healing
  lexicon: HALOT
  rationale: Aunque el sustantivo es plural formalmente, funciona colectivamente. «Sanidad» expresa de forma natural la ausencia de una posibilidad curativa total, y evita una repetición pesada de «curación» en la primera mitad del versículo.
- source_word: תְּעָלָה
  english_pob_choice: remedy
  chosen_spanish: remedio
  alternatives_spanish:
  - vendaje
  - curación
  - piel nueva
  lexicon: HALOT
  rationale: El término es raro y admite varias posibilidades concretas. «Remedio» es suficientemente amplio y fiel al valor práctico del vocabulario médico del verso; la alternativa concreta se conserva en nota.
- source_word: אֵין לָךְ
  english_pob_choice: for you
  chosen_spanish: para ti
  alternatives_spanish:
  - tú no tienes
  - de tu parte no hay
  lexicon: HALOT
  rationale: La expresión niega la existencia de algo en relación contigo. «Para ti» reproduce bien el valor relacional del hebreo y permite un español fluido en paralelo con la cláusula anterior.
translation_notes:
  revision_awareness: El borrador sigue la lectura estable del texto hebreo masorético, sin cambios textuales respecto al pasaje. Se ha resuelto la ambigüedad forense del primer hemistiquio en español con un verbo de defensa, y la rareza médica del segundo con un sustantivo general («remedio») más nota alternativa, en línea con la auditoría inglesa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» no aplicable en este versículo.
  - Se conserva el paralelismo negativo de dos miembros, con puntuación semicolon para reflejar la estructura hebrea.
  - «Caso» se usa de manera forense, no coloquial.
  - «Sanidad» y «remedio» distinguen la generalidad de la curación frente al objeto concreto de remedio.
