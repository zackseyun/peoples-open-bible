translation:
  language: es
  text: 'Así es el camino de una mujer adúltera: come y se limpia la boca[a], y dice[b]: «No he hecho nada malo».[c]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La imagen de comer y limpiarse la boca sugiere un ocultamiento casual: como si la acción no hubiera dejado rastro moral.'
    reason: cultural_note
  - marker: b
    text: 'O también, con el mismo valor proverbial: «y dice» introduce su negación despreocupada de culpa después de borrar las huellas, como si nada moral hubiera ocurrido.'
    reason: cultural_note
  - marker: c
    text: Más literalmente, «No he hecho iniquidad» o «No he cometido maldad».
    reason: lexical_alternative
lexical_decisions:
- source_word: כֵּן
  english_pob_choice: So
  chosen_spanish: Así es
  alternatives_spanish:
  - De esta manera
  - Así
  lexicon: HALOT
  rationale: Captura la fuerza comparativa/conclusiva de כֵּן en español natural, sin perder el enlace con el proverbio anterior.
- source_word: דֶּרֶךְ
  english_pob_choice: way
  chosen_spanish: camino
  alternatives_spanish:
  - modo
  - conducta
  lexicon: HALOT
  rationale: En proverbios, דֶּרֶךְ puede expresar modo de vivir o conducta; «camino» conserva la metáfora bíblica y suena natural en español.
- source_word: אִשָּׁה מְנָאָפֶת
  english_pob_choice: an adulterous woman
  chosen_spanish: una mujer adúltera
  alternatives_spanish:
  - una adúltera
  - una mujer que comete adulterio
  lexicon: HALOT
  rationale: La combinación del sustantivo con el participio describe a una mujer caracterizada por adulterio; «mujer adúltera» mantiene el valor descriptivo sin volverlo demasiado técnico.
- source_word: אָכְלָה
  english_pob_choice: she eats
  chosen_spanish: come
  alternatives_spanish:
  - ha comido
  - está comiendo
  lexicon: HALOT
  rationale: En el género sapiencial, el perfecto hebreo puede tener valor proverbial/habitual; el presente español transmite mejor esa generalidad que un pasado simple.
- source_word: וּמָחֲתָה פִיהָ
  english_pob_choice: and wipes her mouth
  chosen_spanish: y se limpia la boca
  alternatives_spanish:
  - y se enjuga la boca
  - y se limpia los labios
  lexicon: HALOT
  rationale: «Se limpia la boca» comunica de forma natural la imagen de borrar restos tras comer; mantiene el gesto físico y la insinuación de ocultamiento.
- source_word: וְאָמְרָה
  english_pob_choice: and says
  chosen_spanish: y dice
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: El presente español funciona bien para el discurso proverbial y conserva la viveza del hebreo narrativo en un dicho sapiencial.
- source_word: לֹא פָעַלְתִּי אָוֶן
  english_pob_choice: I have done no wrong
  chosen_spanish: No he hecho mal
  alternatives_spanish:
  - No he cometido iniquidad
  - No he hecho nada malo
  - No he obrado perversamente
  lexicon: HALOT
  rationale: אָוֶן puede abarcar maldad, iniquidad o agravio. «Mal» es más breve y natural en español, pero mantiene la negación de culpa; no elimina la tensión entre «mal» e «iniquidad» del hebreo.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando las notas [a] y [b] directamente en el texto español, colocadas en la cláusula final a la que corresponden.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en otros pasajes según norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se preservó el paralelismo proverbial con presente gnómico en español.
  - Se evitó «adúltera» como mero insulto y se usó como descripción de conducta, en línea con el participio hebreo.
