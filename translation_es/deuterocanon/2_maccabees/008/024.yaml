translation:
  language: es
  text: Pero, con el Todopoderoso como su aliado, masacraron a más de nueve mil enemigos, y dejaron herida y lisiada a la mayor parte del ejército de Nicanor, y obligaron a todos a huir.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τοῦ παντοκράτορος
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - el Omnipotente
  - el que tiene todo poder
  lexicon: LSJ
  rationale: παντοκράτωρ es un título divino de soberanía y poder total. En español, «Todopoderoso» es la equivalencia natural y reverente que mejor corresponde al valor estable del título, sin explicar de más ni debilitarlo con una paráfrasis.
- source_word: συμμάχου
  english_pob_choice: ally
  chosen_spanish: aliado
  alternatives_spanish:
  - ayudante
  - apoyo
  - campeón
  lexicon: LSJ
  rationale: El término conserva el matiz militar de uno que pelea junto a otro. «Aliado» transmite bien esa cercanía combativa en español actual.
- source_word: κατέσφαξαν
  english_pob_choice: they slaughtered
  chosen_spanish: mataron
  alternatives_spanish:
  - degollaron
  - dieron muerte a
  - sacrificaron
  lexicon: LSJ
  rationale: El verbo griego es fuerte y violento. En español, «mataron» evita una crueldad expresiva innecesaria en el registro bíblico, pero conserva el resultado bélico; «degollaron» sería demasiado específico y «sacrificaron» sería incorrecto.
- source_word: ὑπὲρ τοὺς ἐννακισχιλίους
  english_pob_choice: more than nine thousand
  chosen_spanish: a más de nueve mil
  alternatives_spanish:
  - más de nueve mil
  - por encima de nueve mil
  lexicon: LSJ
  rationale: La construcción expresa exceso sobre la cifra. «A más de nueve mil» es natural en español y mantiene la cuantificación aproximada sin añadir precisión no presente.
- source_word: τραυματίας
  english_pob_choice: wounded
  chosen_spanish: heridos
  alternatives_spanish:
  - lastimados
  - lesionados
  lexicon: LSJ
  rationale: El sustantivo/adjetivo sustantivado alude a los que quedaron heridos en combate. «Heridos» es el término militar normal en español.
- source_word: τοῖς μέλεσιν ἀπηρεῖς
  english_pob_choice: maimed
  chosen_spanish: lisiados
  alternatives_spanish:
  - mutilados
  - incapacitados en sus miembros
  lexicon: LSJ
  rationale: La frase describe daño en los miembros o extremidades. «Lisiados» reproduce esa incapacidad corporal de manera concisa y digna; «mutilados» sería más fuerte y posiblemente más gráfico de lo que exige el griego.
- source_word: τὸ πλεῖον μέρος τῆς τοῦ Νικάνορος στρατειᾶς
  english_pob_choice: most of Nicanor’s army
  chosen_spanish: la mayor parte del ejército de Nicanor
  alternatives_spanish:
  - la mayor parte de la expedición de Nicanor
  - la mayor parte de la fuerza de Nicanor
  lexicon: LSJ
  rationale: La frase griega se refiere a la mayoría del contingente bajo Nicanor. «Ejército» mantiene la idea militar y es más fluido que una transliteración o una perífrasis excesiva.
- source_word: πάντας δὲ φεύγειν ἠνάγκασαν
  english_pob_choice: and forced them all to flee
  chosen_spanish: y obligaron a todos a huir
  alternatives_spanish:
  - y los hicieron huir a כולם
  - y los forzaron a huir
  lexicon: LSJ
  rationale: La construcción expresa coerción que termina en fuga. «Obligaron a todos a huir» conserva la fuerza causativa en español claro y directo.
theological_decisions:
- issue: Título divino παντοκράτωρ en un contexto de victoria militar
  english_pob_reading: the Almighty
  chosen_spanish_reading: el Todopoderoso
  alternative_spanish_readings:
  - el Omnipotente
  - el que tiene todo poder
  rationale: El texto presenta la victoria como lograda con la ayuda del poder divino. «Todopoderoso» es el equivalente reverente y comprensible que mejor conserva la función teológica del título sin convertirlo en una explicación doctrinal ajena al pasaje.
  doctrine_reference: 'DOCTRINE.md: translate titles; avoid masking the divine name except where warranted'
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de Swete y concuerda con el audit trail inglés de la POB. No se añadieron notas porque no hay una variante textual o ambigüedad lexical que el español deba marcar aquí, y la elección de «Todopoderoso»/«aliado»/«heridos y lisiados» ya refleja las decisiones auditadas.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y moderno, sin calcos innecesarios.
  - «Todopoderoso» se usa como equivalente estable de παντοκράτωρ, en línea con el contexto del título divino.
  - Se preserva el tono bélico del pasaje con verbos directos y sin intensificar más allá del griego.
  - «Nicanor» se conserva como nombre propio sin adaptación.
  - 'La coordinación final sigue la estructura del griego: victoria, daño infligido y huida forzada.'
