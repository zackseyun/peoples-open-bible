revisions:
- from: Y Aram huyó delante de Israel[a], y David mató a siete mil guerreros de carro[a] y a cuarenta mil hombres de a pie, y dio muerte a Shofac, el comandante del ejército[b].
  to: Y Aram huyó delante de Israel[a], y David mató de Aram a siete mil combatientes de carro y a cuarenta mil hombres de a pie, y dio muerte a Shofac[b], el comandante del ejército.
  rationale: 'Se corrigió la colocación y unicidad de los marcadores de nota para cumplir la disciplina editorial: [a] queda como nota de variante textual anclada al segmento pertinente, y [b] se mueve al nombre Shofac, que es lo que la nota explica. También se suavizó «guerreros de carro» a «combatientes de carro» para una lectura más natural en español sin perder la decisión léxica del POB.'
