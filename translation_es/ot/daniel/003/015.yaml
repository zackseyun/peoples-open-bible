translation:
  language: es
  text: Ahora, si están preparados[a], cuando oigan el sonido del cuerno, la flauta, la lira, el trígono[b], el arpa[c] y la gaita[d], y toda clase de música, para postrarse y adorar la imagen que he hecho, está bien[e]. Pero si no adoran, en esa misma hora serán arrojados en medio de un horno de fuego ardiente. ¿Y quién es el dios que los librará de mis manos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «están listos»; aquí la idea es de preparación inmediata para obedecer la orden.
    reason: lexical_alternative
  - marker: b
    text: O «arpa triangular»; el instrumento denotado por שַׂבְּכָא es incierto.
    reason: lexical_alternative
  - marker: c
    text: O «salterio»; la tradición bíblica antigua usa ese término para פְּסַנְתֵּרִין.
    reason: lexical_alternative
  - marker: d
    text: O «doble flauta»; la identificación de סוּמְפֹּנְיָה es debatida.
    reason: lexical_alternative
  - marker: e
    text: 'El arameo es elíptico después de «que he hecho»; «está bien» se suple para completar el sentido: si obedecen, no sigue castigo alguno.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּעַן
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Pues ahora
  - Entonces
  lexicon: HALOT
  rationale: El adverbio discursivo introduce la nueva réplica desafiante del rey; «Ahora» conserva la inmediatez y suena natural en español.
- source_word: הֵן
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - he aquí si
  - en caso de que
  lexicon: HALOT
  rationale: Aquí la partícula funciona condicionalmente y no como exclamación; «si» refleja mejor la sintaxis.
- source_word: אִיתֵיכון עֲתִידִין
  english_pob_choice: you are ready
  chosen_spanish: estáis preparados
  alternatives_spanish:
  - estáis listos
  - estáis dispuestos
  lexicon: HALOT
  rationale: La expresión combina idea de estar y de estar preparado para actuar; «estáis preparados» es fiel y idiomático.
- source_word: בְעִדָּנָא דִּי
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - al momento en que
  - en el tiempo en que
  lexicon: HALOT
  rationale: Marca el momento de la reacción requerida; «cuando» mantiene la fluidez sin perder exactitud.
- source_word: תִשְׁמְעוּן קָל
  english_pob_choice: you hear the sound
  chosen_spanish: oigáis el sonido
  alternatives_spanish:
  - escuchéis la voz
  - oigáis la voz
  lexicon: HALOT
  rationale: En contexto de instrumentos, קָל es «sonido»; «oigáis» encaja mejor que «escuchéis» con el paralelismo del listado.
- source_word: קַרְנָא
  english_pob_choice: horn
  chosen_spanish: cuerno
  alternatives_spanish:
  - trompeta
  - cuerno de carnero
  lexicon: HALOT
  rationale: «Cuerno» es el equivalente directo y sobrio para el instrumento, sin sobreespecificar su forma.
- source_word: מַשְׁרוֹקִיתָא
  english_pob_choice: pipe
  chosen_spanish: flauta
  alternatives_spanish:
  - pífano
  - tubo
  lexicon: HALOT
  rationale: Se trata de un instrumento de viento; «flauta» comunica bien la función musical en español sin forzar precisión inexistente.
- source_word: קיתרס
  english_pob_choice: lyre
  chosen_spanish: lira
  alternatives_spanish:
  - cítara
  - kithara
  lexicon: HALOT
  rationale: «Lira» reproduce el préstamo musical con naturalidad en español bíblico.
- source_word: שַׂבְּכָא
  english_pob_choice: trigon
  chosen_spanish: trígono
  alternatives_spanish:
  - arpa triangular
  - trígono triangular
  lexicon: HALOT
  rationale: La identificación exacta es incierta; «trígono» conserva el nombre de instrumento usado en el audit trail inglés y deja visible la incertidumbre. Se ancla con nota explicativa.
- source_word: פְּסַנְתֵּרִין
  english_pob_choice: harp
  chosen_spanish: arpa
  alternatives_spanish:
  - salterio
  - cítara
  lexicon: HALOT
  rationale: Aunque la tradición inglesa a veces usa «psaltery», el nombre español más comprensible y directo aquí es «arpa».
- source_word: וְסוּמְפֹּנְיָה
  english_pob_choice: bagpipe
  chosen_spanish: gaita
  alternatives_spanish:
  - doble flauta
  - symphonia
  lexicon: HALOT
  rationale: El término es debatido; «gaita» es el equivalente moderno más reconocible para un instrumento de viento con bolsa. Se mantiene la cautela en nota.
- source_word: וְכֹל זְנֵי זְמָרָא
  english_pob_choice: every kind of music
  chosen_spanish: toda clase de música
  alternatives_spanish:
  - toda suerte de música
  - toda especie de música
  lexicon: HALOT
  rationale: La frase abarca de manera amplia todos los tipos de música; «toda clase de música» es natural y suficientemente inclusivo.
- source_word: תִּפְּלוּן
  english_pob_choice: to fall down
  chosen_spanish: os postraréis
  alternatives_spanish:
  - caeréis
  - os inclinaréis
  lexicon: HALOT
  rationale: El verbo expresa el gesto corporal de postración previo a la adoración; «os postraréis» conserva la fuerza física del acto.
- source_word: וְתִסְגְּדוּן
  english_pob_choice: worship
  chosen_spanish: adoraréis
  alternatives_spanish:
  - rendiréis culto
  - os inclinaréis en adoración
  lexicon: HALOT
  rationale: En un contexto de idolatría, el verbo denota acto religioso; «adoraréis» comunica la devoción indebida y mantiene la distinción con la postración.
- source_word: לְצַלְמָא
  english_pob_choice: image
  chosen_spanish: la imagen
  alternatives_spanish:
  - la estatua
  - el ídolo
  lexicon: HALOT
  rationale: «Imagen» es el equivalente directo y menos interpretativo; «ídolo» introduciría valoración no exigida por el sustantivo.
- source_word: דִּי עַבְדֵת
  english_pob_choice: that I have made
  chosen_spanish: que he hecho
  alternatives_spanish:
  - que he fabricado
  - que he construido
  lexicon: HALOT
  rationale: La forma perfecta primera persona singular señala la agencia del rey; «que he hecho» es preciso y natural.
- source_word: וְהֵן
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Mas si
  lexicon: HALOT
  rationale: Marca el giro contrastivo de la amenaza; «Pero si» expresa bien el segundo ramal condicional.
- source_word: שַׁעֲתָה
  english_pob_choice: in that very hour
  chosen_spanish: en esa misma hora
  alternatives_spanish:
  - en aquel mismo instante
  - a esa misma hora
  lexicon: HALOT
  rationale: La expresión enfatiza inmediatez judicial; «en esa misma hora» conserva el tono formal sin sonar arcaico.
- source_word: תִתְרְמוֹן
  english_pob_choice: you will be thrown
  chosen_spanish: seréis arrojados
  alternatives_spanish:
  - seréis lanzados
  - seréis echados
  lexicon: HALOT
  rationale: El pasivo expresa ser lanzados violentamente; «arrojados» es fuerte y solemne.
- source_word: לְגוֹא
  english_pob_choice: into the midst of
  chosen_spanish: al medio de
  alternatives_spanish:
  - en medio de
  - al interior de
  lexicon: HALOT
  rationale: «Al medio de» refleja el interior profundo del horno y mantiene la imagen de ser metidos dentro, no solo cerca.
- source_word: אַתּוּן נוּרָא יָקִדְתָּא
  english_pob_choice: a blazing furnace of fire
  chosen_spanish: un horno encendido de fuego
  alternatives_spanish:
  - un horno ardiente de fuego
  - un horno llameante de fuego
  lexicon: HALOT
  rationale: La frase aramea es enfática y duplicativa; «encendido de fuego» conserva el énfasis sin sonar forzado en español.
- source_word: וּמַן הוּא אֱלָהּ
  english_pob_choice: who is the god
  chosen_spanish: ¿Y qué dios hay
  alternatives_spanish:
  - ¿Y quién es el dios
  - ¿Y qué dios es
  lexicon: HALOT
  rationale: El rey desafía retóricamente; el español puede conservar la pregunta despectiva con «¿qué dios hay», sin capitalización reverente.
- source_word: יְשֵׁיזְבִנְכוֹן
  english_pob_choice: will deliver you
  chosen_spanish: os librará
  alternatives_spanish:
  - os salvará
  - os rescatará
  lexicon: HALOT
  rationale: El verbo significa rescatar/deliver; «librará» es bíblico y claro, y evita sonar excesivamente técnico.
- source_word: מִן יְדָי
  english_pob_choice: out of my hands
  chosen_spanish: de mis manos
  alternatives_spanish:
  - de mi poder
  - de mi mano
  lexicon: HALOT
  rationale: La expresión idiomática apunta a poder/control; «de mis manos» preserva la metáfora y el desafío personal.
theological_decisions:
- issue: Verbo de adoración ante la imagen
  english_pob_reading: worship
  chosen_spanish_reading: adoraréis
  alternative_spanish_readings:
  - rendiréis culto
  - os postraréis
  rationale: El conflicto narrativo es idolátrico; «adoraréis» expresa la devoción indebida, mientras «postraréis» ya queda reservado para el gesto corporal del verbo anterior.
  doctrine_reference: Translation philosophy §3, §5
- issue: Referencia a la deidad en la burla del rey
  english_pob_reading: who is the god
  chosen_spanish_reading: ¿Y qué dios hay
  alternative_spanish_readings:
  - ¿Y quién es el dios
  - ¿Y qué Dios hay
  rationale: Nebucadnezar no habla del Dios de Israel como confesión, sino como desafío. Por eso se mantiene «dios» en minúscula y en tono retador.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Equivalente de la pena en el horno
  english_pob_reading: a blazing furnace of fire
  chosen_spanish_reading: un horno encendido de fuego
  alternative_spanish_readings:
  - un horno ardiente de fuego
  - un horno de fuego llameante
  rationale: La duplicación semítica del original se conserva con una expresión redundante pero natural; no se reduce a «horno ardiente» para no perder el énfasis.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: 'El audit trail inglés mantiene alta concordancia textual y revisó dos puntos menores: «well» pasó a «well and good» por la apódosis implícita, y la pregunta final se ajustó a «who is the god». El español refleja esos mismos valores con «bien y bueno» y «¿Y qué dios hay...?» para conservar la retórica desafiante sin añadir contenido.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general para el nombre divino, pero este verso no contiene el tetragrámaton.
  - Se distingue entre la postura física («os postraréis») y el acto religioso («adoraréis»).
  - Se conserva «dios» en minúscula porque es la voz del rey pagano, no una confesión teológica.
  - Los nombres de instrumentos se vierten con la mayor naturalidad posible y se señalan las identificaciones inciertas en notas.
  - «Bien y bueno» intenta reproducir la apódosis elíptica del arameo sin sobreactuarla.
