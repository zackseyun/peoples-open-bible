translation:
  language: es
  text: por medio de lo cual pasaron los que estaban resguardados por tu mano, la nación entera, habiendo visto maravillas prodigiosas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión duplica el énfasis de dos términos griegos para fenómenos extraordinarios; también puede entenderse como «portentos maravillosos».
    reason: lexical_alternative
lexical_decisions:
- source_word: διʼ οὗ
  english_pob_choice: through which
  chosen_spanish: por medio de quien
  alternatives_spanish:
  - por medio de lo cual
  - a través de quien
  - por el cual
  lexicon: LSJ
  rationale: La preposición διά con genitivo expresa medio o instrumento; el relativo en español debe concordar de modo natural con el antecedente implícito/relativo. «Por medio de quien» conserva la relación instrumental sin forzar un objeto impersonal cuando el contexto de la protección divina puede leerse personal o relacionalmente.
- source_word: πανεθνεὶ
  english_pob_choice: as a whole nation
  chosen_spanish: la nación entera
  alternatives_spanish:
  - todo el pueblo
  - la nación toda
  - como nación entera
  lexicon: LSJ
  rationale: El adverbio subraya el paso corporativo, no solo la suma de individuos. «La nación entera» preserva ese valor colectivo en español claro y natural, y funciona bien como aposición con el participio principal.
- source_word: διῆλθον
  english_pob_choice: passed
  chosen_spanish: pasaron
  alternatives_spanish:
  - atravesaron
  - cruzaron
  - pasaron a través
  lexicon: LSJ
  rationale: El aoristo de διέρχομαι indica pasar a través. «Pasaron» es breve y fiel; el contexto ya lleva la idea de tránsito en la frase relativa.
- source_word: οἱ τῇ σῇ σκεπαζόμενοι χειρί
  english_pob_choice: those sheltered by your hand
  chosen_spanish: quien[a]
  alternatives_spanish:
  - los que eran cubiertos por tu mano
  - los protegidos por tu mano
  - los que estaban resguardados por tu mano
  lexicon: LSJ
  rationale: El griego presenta una imagen antropomórfica de resguardo por la mano divina. En español, mantener la imagen exige una formulación que no la aplaste en abstracción; la nota permite explicitar que el sentido literal es «cubiertos/resguardados por tu mano».
- source_word: θεωρήσαντες
  english_pob_choice: having seen
  chosen_spanish: habiendo visto
  alternatives_spanish:
  - después de ver
  - tras haber visto
  - al haber visto
  lexicon: LSJ
  rationale: El participio antecede a la acción principal y expresa anterioridad. «Habiendo visto» reproduce esa relación sin añadir una temporalidad más interpretativa.
- source_word: θαυμάσια τέρατα
  english_pob_choice: marvelous wonders
  chosen_spanish: maravillas prodigiosas
  alternatives_spanish:
  - prodigios maravillosos
  - portentos admirables
  - maravillas asombrosas
  lexicon: LSJ
  rationale: La duplicación léxica intensifica el carácter extraordinario de los hechos. «Maravillas prodigiosas» conserva el énfasis retórico y evita reducir τέρατα a «portentos» con matiz potencialmente ominoso.
theological_decisions:
- issue: Imagen antropomórfica de la mano de Dios
  english_pob_reading: Retain the anthropomorphic expression 'your hand' in the main text
  chosen_spanish_reading: Mantener la imagen de la mano divina como metáfora de protección, sin sustituirla por una abstracción como «por ti»
  alternative_spanish_readings:
  - los que tú protegiste
  - los que estaban bajo tu protección
  rationale: El griego habla explícitamente de la «mano» de Dios; conservar esa imagen mantiene la textura bíblica y no resuelve la tensión metafórica. La nota lexical aclara la alternativa semántica sin borrar el antropomorfismo.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern Spanish without flattening theological weight.'
translation_notes:
  revision_awareness: La versión española sigue el ajuste reciente del audit trail que hace de πανεθνεὶ una aposición natural («la nación entera») y de θεωρήσαντες un participio anterior («habiendo visto»). También evita introducir «atravesaron» o «cruzaron» para no sumar interpretación ajena al griego.
  spanish_consistency_notes:
  - Se mantuvo «mano» para conservar la imagen antropomórfica de protección divina.
  - Se eligió «maravillas prodigiosas» para reflejar la duplicación enfática del original.
  - La estructura sigue un orden natural en español, pero conserva la relación participial y la totalidad nacional del griego.
