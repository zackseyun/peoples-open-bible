id: SIR.27.27
reference: Sirach 27:27
source:
  edition: lxx-swete-1909
  text: ὁ ποιῶν πονηρὰ εἰς αὐτὸν κυλισθήσεται, καὶ οὐ μὴ ἐπιγνῷ πόθεν ἧκε αὐτῷ.
  language: Greek
  pages:
  - 717
  confidence: high
  validation: minor_mismatch
translation:
  text: Whoever does evil[a], onto himself it will roll, and he will certainly not know from where it came upon him.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'it will roll back on him.' The Greek uses rolling imagery for evil returning to its doer.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ποιῶν
  chosen: Whoever does
  alternatives:
  - The one who does
  - He who does
  lexicon: BDAG
  rationale: Articular present participle used generically; 'Whoever does' gives natural English while preserving the gnomic, generalizing force.
- source_word: πονηρὰ
  chosen: evil
  alternatives:
  - evil things
  - wicked things
  - harm
  lexicon: BDAG
  rationale: Neuter plural adjective functioning substantivally. 'Evil' in English can represent the plural abstractly and reads more naturally than 'evil things' while retaining moral force.
- source_word: εἰς αὐτόν
  lemma: εἰς
  chosen: onto himself
  alternatives:
  - against himself
  - upon himself
  - back on himself
  lexicon: BDAG
  rationale: The preposition εἰς with αὐτόν is somewhat unusual with κυλισθήσεται and suggests motion directed toward the doer. 'Onto himself' preserves the image of something rolling back onto the perpetrator more closely than the more interpretive 'back on himself.'
- source_word: κυλισθήσεται
  lemma: κυλίω
  chosen: it will roll
  alternatives:
  - it will be rolled
  - it will roll back
  - it will come rolling
  lexicon: BDAG
  rationale: Future passive/middle form from κυλίω/κυλίομαι. In context the sense is that the evil rebounds upon the doer. 'It will roll' keeps the vivid metaphor without overexplaining; the supplied subject 'it' is implied from the preceding neuter plural idea treated collectively.
- source_word: καὶ οὐ μὴ ἐπιγνῷ
  chosen: and he will certainly not know
  alternatives:
  - and he will by no means recognize
  - and he will never perceive
  lexicon: BDAG
  rationale: οὐ μή with aorist subjunctive gives emphatic negation. 'Will certainly not know' captures the strong denial in idiomatic English better than a wooden reproduction.
- source_word: πόθεν
  chosen: from where
  alternatives:
  - whence
  - wherefrom
  lexicon: BDAG
  rationale: Interrogative adverb of source/origin. 'From where' is clear modern English.
- source_word: ἧκε
  chosen: it came
  alternatives:
  - it has come
  - it arrived
  lexicon: LSJ
  rationale: From ἥκω, 'to have come, be here, arrive.' In this clause English simple past after 'know from where' is the most natural rendering.
- source_word: αὐτῷ
  chosen: upon him
  alternatives:
  - to him
  - against him
  lexicon: BDAG
  rationale: Dative pronoun after ἧκε can be rendered simply 'to him,' but in context of calamity arriving as retribution, 'upon him' better conveys adverse impact while remaining faithful.
