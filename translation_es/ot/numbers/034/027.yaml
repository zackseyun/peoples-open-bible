lexical_decisions:
- source_word: וּ/לְ/מַטֵּה
  english_pob_choice: And for the tribe of
  chosen_spanish: Y para la tribu de
  alternatives_spanish:
  - Y para el bastón de
  - Y para la vara de
  lexicon: HALOT
  rationale: En este contexto de distribución tribal, מַטֶּה significa idiomáticamente «tribu», no su sentido material de «bastón/vara». En español, «para la tribu de» reproduce con naturalidad el valor de pertenencia y asignación del hebreo.
- source_word: בְנֵי אָשֵׁר
  english_pob_choice: the sons of Asher
  chosen_spanish: los hijos de Aser
  alternatives_spanish:
  - los hijos de Asher
  - los descendientes de Aser
  lexicon: HALOT
  rationale: בְנֵי expresa literalmente «hijos de» y funciona como designación tribal. «Hijos de Aser» conserva la forma del original y mantiene el matiz genealógico, sin perder claridad en español.
- source_word: נָשִׂיא
  english_pob_choice: a leader
  chosen_spanish: un líder
  alternatives_spanish:
  - un jefe
  - un príncipe
  - un representante
  lexicon: HALOT
  rationale: En Números 34, נָשִׂיא designa al representante tribal nombrado para la repartición de la tierra. «Líder» comunica bien la función sin introducir connotaciones monárquicas que «príncipe» podría sugerir en español.
- source_word: אֲחִיהוּד
  english_pob_choice: Ahihud
  chosen_spanish: Ahihud
  lexicon: transliteration
  rationale: Nombre propio transliterado para respetar la forma del texto fuente y la práctica del POB.
- source_word: בֶּן שְׁלֹמִי
  english_pob_choice: son of Shelomi
  chosen_spanish: hijo de Shelomi
  alternatives_spanish:
  - el hijo de Shelomi
  lexicon: HALOT
  rationale: La construcción patronímica hebrea se refleja de manera directa y formal con «hijo de Shelomi», que es natural en español genealógico y conserva la relación familiar explícita.
