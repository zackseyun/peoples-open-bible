revisions:
- from: Tu tierra es una desolación[a]; tus ciudades están quemadas con fuego. Tu suelo—delante de tus mismos ojos—extraños[b] lo devoran, y es una desolación[c], como un derribo por extraños.
  to: Tu tierra es una desolación; tus ciudades están quemadas con fuego. Tu suelo—delante de tus mismos ojos—extranjeros[a] lo devoran, y es una desolación, como un derribo por extranjeros[b].
  rationale: Se corrigen los anclajes de las notas para que correspondan a los términos hebreos pertinentes, se elimina una nota innecesaria, y se mejora 'extraños' a 'extranjeros' en el texto principal por claridad y naturalidad en español, manteniendo la alternativa en nota. La cláusula final conserva la ambigüedad documentada por el POB inglés sin sobreinterpretarla.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:12:42Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: tierra desolada, ciudades quemadas, suelo devorado por forasteros a la vista del pueblo, y la cláusula final mantenida con su ambigüedad. También conserva la distinción entre אֶרֶץ (''tierra'') y אֲדָמָה (''suelo''). Sin embargo, hay errores de anclaje y contenido en las notas: la nota sobre ''extraños/extranjeros'' está colocada en ''desolación'' en vez de en זָרִים, la nota de lectura alternativa para כְּמַהְפֵּכַת זָרִים está anclada en ''extraños'' en vez de en la cláusula final, y la nota c introduce una alternativa no preservada por el POB inglés y además innecesaria.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero ''extraños'' suena menos natural que ''extranjeros'' o ''forasteros'' para invasores foráneos, y ''como un derribo por extraños'' resulta algo tosco. ''Como una catástrofe causada por extranjeros'' mejora la inteligibilidad, pero como el POB inglés quiso preservar de cerca ''overthrow'', conviene una formulación más literal y natural: ''como un derribo causado por extranjeros'' o ''como un asolamiento por extranjeros''. Para una reparación mínima, basta mantener la línea principal y corregir notas/anclajes; además, ''quemadas con fuego'' suena aceptable aunque algo calcado.'
  glossary_alignment: 'No hay términos del glosario mayor aplicables como Yahvé/Mesías/etc. La principal cuestión léxica es זָרִים: en español bíblico neutral, ''extranjeros'' comunica mejor el sentido de intrusos foráneos que ''extraños'', aunque la ambigüedad outsider/foreigner puede preservarse en nota. La revisión propuesta adopta ''extranjeros'' en texto principal por claridad, con nota alternativa ''extraños/forasteros''.'
  issues:
  - severity: high
    issue: Las notas están mal ancladas respecto al texto.
    rationale: La nota a sobre 'extraños/extranjeros' no corresponde a 'desolación'; debe anclarse en זָרִים. La nota b sobre la cláusula final debe anclarse en la frase 'como ... extranjeros', no en la primera aparición de זָרִים.
  - severity: medium
    issue: La nota c añade una alternativa no sustentada por el POB inglés ni necesaria en español.
    rationale: El inglés explica que 'and it is a desolation' mantiene el sustantivo nominal; introducir 'queda desolada' como nota distrae y rompe la disciplina de notas.
  - severity: medium
    issue: '''Extraños'' en el texto principal suena poco idiomático para invasores extranjeros.'
    rationale: En español contemporáneo, 'extraños' suele significar desconocidos o raros. 'Extranjeros' transmite mejor el valor de זָרִים en este contexto de agresión nacional.
  - severity: low
    issue: La redacción final 'como un derribo por extraños' es rígida.
    rationale: Aunque defendible, resulta menos natural en español. Una ligera mejora sintáctica ayuda sin resolver la ambigüedad textual.
  revised_spanish_text: Tu tierra es una desolación; tus ciudades están quemadas con fuego. Tu suelo—delante de tus mismos ojos—extranjeros[a] lo devoran, y es una desolación, como un derribo por extranjeros[b].
  revised_footnotes:
  - marker: a
    text: O 'extraños' o 'forasteros'; el término hebreo repetido puede traducirse de varias maneras para referirse a intrusos de fuera.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'como un derribo por extranjeros'; la frase también puede entenderse como 'como el derribo de extranjeros' o, según algunos, como una alusión al derribo de Sodoma.
    reason: alternative_reading
  revision_rationale: Se corrigen los anclajes de las notas para que correspondan a los términos hebreos pertinentes, se elimina una nota innecesaria, y se mejora 'extraños' a 'extranjeros' en el texto principal por claridad y naturalidad en español, manteniendo la alternativa en nota. La cláusula final conserva la ambigüedad documentada por el POB inglés sin sobreinterpretarla.
