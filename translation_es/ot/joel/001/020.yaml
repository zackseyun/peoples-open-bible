translation:
  language: es
  text: Hasta las bestias del campo jadean por ti[a], porque se han secado los cauces de agua[b], y el fuego ha consumido los pastizales[c] del desierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «hacia ti». La expresión hebrea tiene fuerza direccional; «por ti» se elige porque suena natural con «jadear» en español.
    reason: lexical_alternative
  - marker: b
    text: O «canales» o «corrientes» de agua.
    reason: lexical_alternative
  - marker: c
    text: O «lugares de pastoreo» o «praderas».
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּם
  english_pob_choice: Even
  chosen_spanish: Hasta
  alternatives_spanish:
  - También
  - Incluso
  lexicon: HALOT
  rationale: 'La partícula inicial añade énfasis: no solo los seres humanos, sino aun los animales. «Hasta» comunica bien ese énfasis inclusivo en español natural.'
- source_word: בַּהֲמוֹת שָׂדֶה
  english_pob_choice: the beasts of the field
  chosen_spanish: las bestias del campo
  alternatives_spanish:
  - los animales del campo
  - el ganado del campo
  lexicon: HALOT
  rationale: El hebreo es amplio y no se limita al ganado doméstico. «Bestias del campo» conserva la imagen bíblica y la amplitud semántica sin restringir indebidamente el referente.
- source_word: תַּעֲרֹג
  english_pob_choice: pant
  chosen_spanish: jadean
  alternatives_spanish:
  - suspiran
  - anhelan
  - braman
  lexicon: HALOT
  rationale: En contexto de sequía, el verbo expresa una demanda física y desesperada asociada con la sed. «Jadear» mantiene la fuerza corporal de la imagen; otras opciones enfatizan más el deseo que la respiración agitada.
- source_word: אֵלֶיךָ
  english_pob_choice: for you
  chosen_spanish: por ti
  alternatives_spanish:
  - hacia ti
  - para ti
  lexicon: HALOT
  rationale: Aunque la preposición hebrea tiene fuerza direccional («hacia ti»), en español la construcción con «jader por» resulta natural y conserva la orientación del clamor hacia Dios sin forzar el idioma.
- source_word: יָבְשׁוּ אֲפִיקֵי מָיִם
  english_pob_choice: the channels of water have dried up
  chosen_spanish: se han secado los cauces de agua
  alternatives_spanish:
  - se han secado los canales de agua
  - los cauces de agua están secos
  - se han secado los arroyos
  lexicon: HALOT
  rationale: אֲפִיקִים son cauces, lechos o canales por donde corre el agua. «Cauces de agua» es fiel y comprensible; el perfecto hebreo se vierte con resultado presente en español.
- source_word: וְאֵשׁ אָכְלָה
  english_pob_choice: and fire has consumed
  chosen_spanish: y el fuego ha devorado
  alternatives_spanish:
  - y el fuego ha consumido
  - y el fuego ha destruido
  lexicon: HALOT
  rationale: אָכַל con fuego es un giro idiomático de destrucción total. «Ha devorado» transmite mejor la imagen vívida de un fuego que arrasa por completo.
- source_word: נְאוֹת
  english_pob_choice: the pastures
  chosen_spanish: los pastizales
  alternatives_spanish:
  - los pastos
  - las dehesas
  - los lugares de pastoreo
  lexicon: HALOT
  rationale: En este contexto agrícola y de sequía, נְאוֹת designa lugares de pastoreo. «Pastizales» conserva la referencia al terreno vegetal aprovechable por el ganado y suena natural en español.
- source_word: הַמִּדְבָּר
  english_pob_choice: of the wilderness
  chosen_spanish: del desierto
  alternatives_spanish:
  - del desierto árido
  - de la estepa
  - del yermo
  lexicon: HALOT
  rationale: El término puede abarcar desierto, estepa o tierra despoblada. Aquí el contraste con la sequía y el fuego favorece «desierto», claro y sobrio para lectores hispanohablantes.
theological_decisions:
- issue: Referente del pronombre de segunda persona en אֵלֶיךָ
  english_pob_reading: Addressed to God ('for you')
  chosen_spanish_reading: Dirigido a Dios («por ti»).
  alternative_spanish_readings:
  - Dirigido de manera general («hacia ti»).
  - Lenguaje de orientación sin referencia explícita a Dios.
  rationale: El contexto inmediato es una lamentación-oración y el verso anterior dirige la súplica a Yahvé. Por eso, el pronombre se entiende como referencia directa a Dios, sin suavizar la dirección personal del hebreo.
  doctrine_reference: Mantener la continuidad del lamento dirigido a Yahvé en el contexto profético.
translation_notes:
  revision_awareness: El texto base y la evaluación cruzada muestran alto acuerdo y sin revisiones aplicadas; se conservan las decisiones léxicas clave del audit trail inglés, adaptándolas al español con naturalidad y sin perder el tono de lamentación profética.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como referente implícito del segundo destinatario del verso en continuidad con el contexto de Joel.
  - Se evitó traducir mecánicamente «for you» como «para ti» porque en español la construcción idiomática con «jadean por ti» preserva mejor la imagen.
  - «Desierto» se usó para הַמִּדְבָּר por claridad; no se introdujo una lectura doctrinal adicional.
  - 'La sintaxis mantiene la progresión causal: criaturas afectadas -> secado del agua -> fuego devastador.'
