    reason: lexical_alternative
  revision_rationale: Se reemplaza 'sean cubiertos de saco' por 'se cubran con saco' para lograr un español más natural y fiel al valor medio/reflexivo del hebreo, manteniendo el tono solemne. Se conserva el resto de las elecciones léxicas, y la nota alternativa se mantiene con un anclaje más adecuado a la expresión revisada.
