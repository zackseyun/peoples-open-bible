revisions:
- from: 'Tomen de entre ustedes una ofrenda para Yahvé[a]. Todo el que tenga el corazón dispuesto la traerá: la ofrenda de Yahvé: oro, plata[b] y bronce.'
  to: 'Tomen de entre ustedes una ofrenda para Yahvé. Todo el que tenga el corazón dispuesto[a] la traerá: la ofrenda de Yahvé[b]—oro, plata y bronce.'
  rationale: 'Se conserva el contenido principal del borrador, pero se corrige un problema importante de anclaje y sentido en la nota b: la alternativa léxica corresponde a «la ofrenda de Yahvé», no a «plata». También se ajusta levemente la puntuación para que la aposición y la lista suenen más naturales en español sin alejarse del hebreo ni del rastro POB.'
  reviewer_model: gpt-5.4
