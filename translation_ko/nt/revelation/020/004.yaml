source:
  edition: SBLGNT
  text: Καὶ εἶδον θρόνους, καὶ ἐκάθισαν ἐπ’ αὐτούς, καὶ κρίμα ἐδόθη αὐτοῖς, καὶ τὰς ψυχὰς τῶν πεπελεκισμένων διὰ τὴν μαρτυρίαν Ἰησοῦ καὶ διὰ τὸν λόγον τοῦ θεοῦ, καὶ οἵτινες οὐ προσεκύνησαν τὸ θηρίον οὐδὲ τὴν εἰκόνα αὐτοῦ καὶ οὐκ ἔλαβον τὸ χάραγμα ἐπὶ τὸ μέτωπον καὶ ἐπὶ τὴν χεῖρα αὐτῶν· καὶ ἔζησαν καὶ ἐβασίλευσαν μετὰ τοῦ χριστοῦ ⸀χίλια ἔτη.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/020/004.yaml
  text: And I saw thrones[a], and they sat on them, and judgment was given to them, and the souls of those who had been beheaded because of the testimony of Jesus and because of the word of God, and those who had not worshiped the beast or its image and had not received the mark on their forehead and on their hand[b]; and they came to life and reigned with the Messiah for a thousand years.
  footnotes:
  - marker: a
    text: Or, 'because of their testimony about Jesus.' The Greek phrase 'the testimony of Jesus' may mean testimony borne by Jesus or testimony about Jesus.
    reason: alternative_reading
  - marker: b
    text: Or, 'with Christ.' The Greek title Χριστός is rendered 'Messiah' here because it functions as a title.
    reason: lexical_alternative
translation:
  language: ko
  text: 그리고 나는 보좌들을 보았습니다. 그것들 위에 앉은 자들이 있었고, 그들에게 심판하는 권한이 주어졌습니다. 또 나는 예수의 증언과 하나님의 말씀 때문에 목 베임을 당한 자들의 영혼들과, 짐승이나 그 형상에게 경배하지 아니하고 자기 이마와 손에 그 표를 받지 아니한 자들을 보았습니다. 그들이 살아나서 메시아와 함께 천 년 동안 다스렸습니다.
  philosophy: optimal-equivalence
