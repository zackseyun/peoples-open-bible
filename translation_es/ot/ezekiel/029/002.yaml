  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido del hebreo: mandato a Ezequiel, orientación hostil contra Faraón y alcance total contra Egipto. También preserva bien la fuerza adversativa de עַל como «contra» y la amplitud de מִצְרַיִם כֻּלָּהּ como «todo Egipto».'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero «Hijo de hombre» suena menos natural en español bíblico actual que «Hijo de Adán» o una alternativa explicativa; además, «pon tu rostro» resulta algo tieso en español y puede mejorarse a «dirige tu rostro» sin perder la imagen. También conviene evitar la minúscula en «Faraón» si se trata como título real tradicionalmente capitalizado en español bíblico.
  glossary_alignment: No hay términos del glosario de proyecto especialmente comprometidos aquí. La principal decisión léxica es בן אדם. Dado el expediente inglés, puede mantenerse una forma cercana al original, pero en español «Hijo de hombre» es una calca menos idiomática; «Hijo de Adán» preserva mejor el giro tradicional en español bíblico y mantiene la nota alternativa «Mortal».
  issues:
  - severity: medium
    issue: «Hijo de hombre» suena calcado y poco idiomático en español bíblico actual.
    rationale: Aunque reproduce formalmente el inglés auditado, el hebreo בן אדם en Ezequiel tiene un uso vocativo recurrente que en español suele sonar más natural como «Hijo de Adán» o, en opción interpretativa, «Mortal». La forma actual puede percibirse como traducción forzada.
  - severity: low
    issue: «pon tu rostro» es comprensible pero algo rígido en español.
    rationale: La imagen hebrea se preserva mejor estilísticamente con «dirige tu rostro» o «fija tu rostro», que suenan más naturales en español sin perder el sentido profético de oposición deliberada.
  - severity: low
    issue: «el faraón» en minúscula puede rebajarse en consistencia estilística.
    rationale: En traducciones bíblicas en español es común tratar «Faraón» como título/nombre convencional con mayúscula. «contra Faraón, rey de Egipto» también evita una pesadez innecesaria.
  revised_spanish_text: Hijo de Adán[a], dirige tu rostro contra Faraón, rey de Egipto, y profetiza contra él y contra todo Egipto.
  revised_footnotes:
