review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente el sentido básico del hebreo: los agentes llevan al destinatario sobre sus manos para evitar que su pie golpee una piedra. Sin embargo, «te llevarán» en español sugiere con facilidad transporte general más que la imagen concreta de cargar/sostener en las manos presente en יִשָּׂאוּנְךָ y reforzada por עַל כַּפַּיִם. Una formulación más precisa preserva mejor la escena protectora.'
  spanish_quality_summary: El texto es claro y legible, pero «Sobre sus manos te llevarán» suena algo menos idiomático y más ambiguo en español que una opción como «En sus manos te cargarán». Además, esa revisión armoniza mejor con la imagen física del versículo sin volverlo arcaico. La cláusula «para que no golpees tu pie contra una piedra» es natural y fiel.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones léxicas relevantes son adecuadas, salvo que para נָשָׂא conviene preferir aquí «cargarán» sobre «llevarán» por la fuerza concreta del contexto. La nota sobre «palmas/manos» debe mantenerse, anclada a «manos».
  issues:
  - severity: medium
    issue: «te llevarán» debilita la imagen concreta de ser cargado en las manos
    rationale: El hebreo combina «sobre manos/palmas» con נָשָׂא, lo que en este contexto describe sostener/cargar físicamente. «Llevar» puede entenderse simplemente como conducir o transportar, menos específico que la escena del original.
  - severity: low
    issue: «Sobre sus manos» es comprensible pero menos natural que «En sus manos» en español bíblico contemporáneo
    rationale: Ambas opciones pueden funcionar, pero «en sus manos» suena más idiomático en la expresión completa y mantiene bien la idea de soporte protector.
  revised_spanish_text: En sus manos[a] te cargarán[b], para que no golpees tu pie contra una piedra.
