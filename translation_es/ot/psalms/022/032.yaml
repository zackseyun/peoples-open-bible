revisions:
- from: Vendrán y declararán su justicia[a] a un pueblo que aún no ha nacido[b], porque él lo ha hecho[c].
  to: Vendrán y declararán su rectitud[a] a un pueblo que aún no ha nacido[b], que lo ha hecho[c].
  rationale: 'Se ajusta el texto para seguir más de cerca la evidencia fuente y el audit trail inglés: (1) se cambia a ''su rectitud'' para reflejar la elección principal correspondiente a ''his righteousness'', conservando ''su justicia'' como alternativa; (2) se cambia ''porque'' por ''que'' para mantener como lectura principal la cláusula de contenido de כִּי; (3) se reparan notas con español natural y sin anglicismos; (4) se mantiene la concisión de עָשָׂה con ''lo ha hecho''.'
