theological_decisions:
- issue: Referent of 'the Baals'
  chosen_reading: The phrase refers to pagan deities/idols associated with covenant unfaithfulness, not merely to human 'lords' or 'masters.'
  alternative_readings:
  - The term could be heard more generically as 'lords/masters' because בעל has that lexical sense.
  rationale: In Hosea's marriage metaphor and anti-idolatry polemic, the plural points to the named Baal deities whose invocation will cease. Rendering as 'the Baals' preserves the theological contrast between the LORD and false gods without importing extra interpretation beyond the context.
