revisions:
- from: Si el objeto robado es hallado vivo en su posesión[a] —sea buey, asno o oveja—, pagará el doble.
  to: Si el animal robado es realmente hallado en su posesión[a] con vida —sea buey, asno u oveja—, pagará el doble.
  rationale: Se reemplaza ‘objeto robado’ por ‘animal robado’ para armonizar con ‘con vida’ y con la lista explícita de ganado del hebreo. Se añade ‘realmente’ para reflejar de manera natural la fuerza enfática de הִמָּצֵא תִמָּצֵא, ya que en español no conviene dejarla completamente implícita. La nota se ajusta para explicar mejor tanto la intensidad verbal como el modismo ‘en su mano’.
