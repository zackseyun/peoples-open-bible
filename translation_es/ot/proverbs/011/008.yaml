translation:
  language: es
  text: El justo es librado de la dificultad[a], y el impío ocupa su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en vez de él»; la expresión hebrea puede indicar sustitución, sugiriendo que el impío cae en la dificultad en lugar del justo.
    reason: lexical_alternative
lexical_decisions:
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el justo hombre
  - el recto
  lexicon: HALOT
  rationale: El hebreo usa un adjetivo sustantivado para una persona representativa; en español, "el justo" conserva esa forma breve y proverbial. "El justo hombre" sería más explícito pero menos natural; "el recto" no es tan idiomático en este contexto.
- source_word: מִצָּרָה
  english_pob_choice: from trouble
  chosen_spanish: de la angustia
  alternatives_spanish:
  - de la dificultad
  - de la aflicción
  - del peligro
  lexicon: HALOT
  rationale: La preposición de separación expresa ser sacado de una situación adversa. "Angustia" recoge bien el campo semántico de צָרָה como aflicción/opresión/trouble sin sonar mecánica. Se evita reducirlo a un peligro meramente físico.
- source_word: נֶחֱלָץ
  english_pob_choice: is rescued
  chosen_spanish: es rescatado
  alternatives_spanish:
  - es librado
  - es liberado
  - escapa
  lexicon: HALOT
  rationale: El nifal de חלץ comunica ser sacado o librado por intervención externa. "Es rescatado" mantiene esa pasividad de salvación y es claro en español moderno. "Escapa" sugeriría demasiada iniciativa propia; "librado" es válido pero algo más arcaizante.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: el impío
  alternatives_spanish:
  - el malvado
  - el malo
  - el injusto
  lexicon: HALOT
  rationale: '"Impío" corresponde bien al valor moral y relacional del término en sabiduría bíblica, y es una opción tradicional pero aún inteligible. "Malvado" puede sonar más psicológico o narrativo; "el injusto" desplaza demasiado el matiz religioso/ético.'
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - en lugar de él
  - en su sitio
  lexicon: HALOT
  rationale: La expresión hebrea puede comunicar sustitución. "En su lugar" es la forma más natural y fiel en español para mantener la idea de reversión/substitución sin volverla demasiado explicativa.
theological_decisions:
- issue: Alcance de la reversión entre el justo y el impío
  english_pob_reading: 'The proverb states a general wisdom principle of reversal: the righteous is delivered from trouble, and the wicked experiences what would otherwise have befallen him.'
  chosen_spanish_reading: 'El proverbio enuncia un principio sapiencial general de reversión: el justo es librado de la angustia, y el impío ocupa su lugar.'
  alternative_spanish_readings:
  - El impío cae exactamente en la misma angustia de la que fue librado el justo.
  - El impío simplemente queda en lugar del justo, sin implicar que padezca la misma aflicción.
  rationale: 'El hebreo admite la idea de sustitución por תַּחְתָּיו, pero no obliga a concretar el mecanismo. La traducción conserva la tensión: hay rescate del justo y reemplazo del impío, sin añadir una escena más específica que el texto no exige.'
  doctrine_reference: Preservar la tensión hermenéutica del proverbio sin sobreespecificar el mecanismo
- issue: Uso de lenguaje moral tradicional para רָשָׁע
  english_pob_reading: the wicked
  chosen_spanish_reading: el impío
  alternative_spanish_readings:
  - el malvado
  - el perverso
  rationale: En literatura sapiencial, la oposición justo/impío tiene valor moral y teológico. "Impío" mantiene esa carga relacional ante Dios mejor que un término puramente psicológico o descriptivo.
  doctrine_reference: 'Sabiduría bíblica: contraste ético ante Dios'
translation_notes:
  revision_awareness: Se siguió el cierre de revisión que eliminó el equivalente explícito de "hombre" para צַדִּיק y mantuvo una formulación breve y proverbial. También se respetó el análisis auditado de תַּחְתָּיו como expresión de sustitución/reversión, sin forzar una escena narrativa más precisa que la del hebreo.
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" como norma del proyecto cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - Se prefirió "el justo" y "el impío" para conservar el paralelismo sapiencial representativo.
  - '"Rescatado" se usó para reflejar una acción recibida, no autoefectuada.'
  - La nota a pie preserva la alternativa semántica importante de תַּחְתָּיו sin convertirla en paráfrasis del texto principal.
