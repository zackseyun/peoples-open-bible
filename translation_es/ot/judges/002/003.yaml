translation:
  language: es
  text: 'Así también dije[a]: «No los expulsaré de delante de ustedes; serán sus adversarios, y sus dioses serán una trampa para ustedes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «costados». Algunas versiones antiguas y pasajes paralelos leen o interpretan esto como «espinas en sus costados».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: So I also
  chosen_spanish: Así también
  alternatives_spanish:
  - Y también
  - Por eso también
  - Así pues, también
  lexicon: HALOT
  rationale: La partícula enlaza con la declaración anterior y añade énfasis. «Así también» conserva la conexión discursiva sin sonar forzado en español.
- source_word: אָמַרְתִּי
  english_pob_choice: said
  chosen_spanish: dije
  alternatives_spanish:
  - dije yo
  - he dicho
  - declaré
  lexicon: HALOT
  rationale: El pretérito simple encaja con el marco narrativo. «Dije» es natural y fiel al verbo básico de decir sin intensificar indebidamente.
- source_word: לֹא אֲגָרֵשׁ
  english_pob_choice: I will not drive them out
  chosen_spanish: No los expulsaré
  alternatives_spanish:
  - No los echaré
  - No los desalojaré
  - No los desterraré
  lexicon: HALOT
  rationale: גָּרַשׁ significa sacar/expulsar. «Expulsaré» transmite bien la fuerza de expulsión en un contexto de conquista y suena claro en español.
- source_word: מִפְּנֵיכֶם
  english_pob_choice: from before you
  chosen_spanish: de delante de ustedes
  alternatives_spanish:
  - de su presencia
  - de enfrente de ustedes
  - de ante ustedes
  lexicon: HALOT
  rationale: La expresión hebrea es espacial e idiomática. «De delante de ustedes» conserva la imagen sin volverla demasiado abstracta.
- source_word: לְצִדִּים
  english_pob_choice: adversaries to you
  chosen_spanish: adversarios para ustedes
  alternatives_spanish:
  - enemigos para ustedes
  - espinas en sus costados
  - lados para ustedes
  lexicon: HALOT
  rationale: El POB inglés resolvió el sentido difícil como «adversaries». En español, «adversarios» comunica la hostilidad resultante con dignidad y claridad, sin ocultar que el hebreo literal dice «sides».
- source_word: וֵאלֹהֵיהֶם
  english_pob_choice: and their gods
  chosen_spanish: y sus dioses
  alternatives_spanish:
  - y sus ídolos
  - y los dioses de ellos
  lexicon: HALOT
  rationale: En este contexto de idolatría, el término estándar «dioses» reproduce el plural del hebreo sin necesidad de suavizarlo.
- source_word: לְמוֹקֵשׁ
  english_pob_choice: a snare
  chosen_spanish: una trampa
  alternatives_spanish:
  - un lazo
  - un cebo
  - una red
  lexicon: HALOT
  rationale: מוקש denota una trampa o lazo. «Trampa» es transparente en español y conserva la metáfora de peligro y captura.
theological_decisions:
- issue: Cómo reflejar el difícil לְצִדִּים
  english_pob_reading: adversaries to you
  chosen_spanish_reading: adversarios para ustedes
  alternative_spanish_readings:
  - espinas en sus costados
  - lados para ustedes
  - enemigos para ustedes
  rationale: El hebreo masorético dice literalmente «sides», pero el POB inglés siguió el sentido contextual como «adversaries». En español, «adversarios» mantiene esa lectura natural y evita una literalidad opaca, mientras que la nota conserva la tensión textual del hebreo.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Relación entre la expulsión no realizada y el juicio resultante
  english_pob_reading: they will become a snare to you
  chosen_spanish_reading: serán una trampa para ustedes
  alternative_spanish_readings:
  - serán un lazo para ustedes
  - les serán una trampa
  - serán un tropiezo para ustedes
  rationale: 'El hebreo presenta el resultado de no expulsarlos: los dioses de las naciones llegarán a ser un medio de caída. «Trampa» preserva el valor metafórico del término y su dimensión de peligro espiritual.'
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: El borrador inglés más reciente sustituyó la literalidad «sides against you» por «adversaries to you» para mayor claridad. La versión española sigue esa decisión interpretativa, pero mantiene una nota que recuerda el valor literal y la lectura alternativa tradicional.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera de este versículo porque no aparece el nombre divino en el texto hebreo.
  - «Ustedes» se usa de forma consistente para el plural del original.
  - No se introduce «Cristo» ni terminología eclesiástica no presente en el pasaje.
  - Se conserva el contraste entre la acción de expulsar y el resultado de trampa para reflejar la lógica del hebreo.
