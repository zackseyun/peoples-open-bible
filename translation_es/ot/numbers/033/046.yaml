  text: Partieron de Dibón-gad y acamparon en Almón-diblataim.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Partieron
  alternatives_spanish:
  - Se pusieron en marcha
  - Salieron
  lexicon: HALOT
  rationale: En la fórmula itineraria del desierto, נסע indica levantar el campamento y avanzar al siguiente punto. «Partieron» comunica ese movimiento de forma natural y digna en español, sin perder el valor de desplazamiento del verbo.
- source_word: מִדִּיבֹן גָּד
  english_pob_choice: from Dibon-gad
  chosen_spanish: de Dibón-gad
  alternatives_spanish:
  - de Dibón de Gad
  - desde Dibón-gad
  lexicon: HALOT
  rationale: Se trata de un topónimo, no de una frase descriptiva. Mantener el nombre compuesto respeta la presentación del lugar en la lista itineraria; «de» reproduce la preposición hebrea מִ de manera directa y natural en español.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - y acamparon
  - y levantaron el campamento
  lexicon: HALOT
  rationale: חנה en este contexto significa detenerse para establecer campamento. «Acamparon» es claro y fiel al sentido itinerante del pasaje, sin añadir matices ajenos.
- source_word: בְּעַלְמֹן דִּבְלָתָיְמָה
  english_pob_choice: at Almon-diblathaim
  chosen_spanish: en Almón-diblataim
  alternatives_spanish:
  - en Almon-diblataim
  - a Almón-diblataim
  lexicon: HALOT
  rationale: Otro topónimo se translitera en español. La preposición ב se expresa naturalmente con «en» para ubicación; el guion conserva la percepción de un nombre compuesto, y la acentuación sigue la adaptación española de la forma transliterada.
translation_notes:
