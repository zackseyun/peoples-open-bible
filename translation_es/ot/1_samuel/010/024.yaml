translation:
  language: es
  text: 'Entonces Samuel dijo a todo el pueblo: «¿Ven[a] al que Yahvé ha elegido? Porque no hay nadie como él entre todo el pueblo». Y todo el pueblo gritó y dijo[b]: «¡Viva el rey!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Han visto al que Yahvé ha elegido?»'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «¡Que viva el rey!»'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva introduce avance narrativo; «Entonces» conserva la secuencia sin sonar forzada en español.
- source_word: הָרְּאִיתֶם
  english_pob_choice: Do you see
  chosen_spanish: ¿Ven
  alternatives_spanish:
  - ¿Han visto?
  - ¿Vieron?
  lexicon: HALOT
  rationale: En el contexto de presentación pública, la forma interrogativa directa en presente comunica la apelación inmediata del hebreo sin cargar innecesariamente el aspecto verbal.
- source_word: אֲשֶׁר בָּחַר בּוֹ יְהוָה
  english_pob_choice: him whom Yahweh has chosen
  chosen_spanish: al que Yahvé ha elegido
  alternatives_spanish:
  - al que Yahvé escogió
  - al que Yahvé ha seleccionado
  lexicon: HALOT
  rationale: Se mantiene el referente directo a Saúl con una relativa natural en español. «Elegido» refleja el resultado vigente de la acción; «escogido» sería también posible, pero «elegido» suena más natural en esta presentación solemne.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé» en lugar de sustituirlo por un título.'
- source_word: כִּי אֵין כָּמֹהוּ
  english_pob_choice: For there is no one like him
  chosen_spanish: Porque no hay nadie como él
  alternatives_spanish:
  - Pues no hay nadie como él
  - Porque no existe otro como él
  lexicon: HALOT
  rationale: «Porque» expresa la relación explicativa de כִּי. «No hay nadie como él» reproduce la comparación absoluta con español idiomático sin perder el forcejeo semántico del hebreo.
- source_word: בְּכָל הָעָם
  english_pob_choice: among all the people
  chosen_spanish: entre todo el pueblo
  alternatives_spanish:
  - entre toda la gente
  - en todo el pueblo
  lexicon: HALOT
  rationale: «Entre» comunica mejor la idea comparativa dentro del grupo reunido. «Pueblo» conserva el tono colectivo del hebreo y la publicación base en inglés.
- source_word: וַיָּרִעוּ
  english_pob_choice: shouted
  chosen_spanish: gritó
  alternatives_spanish:
  - alzaron un grito
  - aclamó
  lexicon: HALOT
  rationale: El verbo describe una exclamación fuerte; en singular colectivo español, «gritó» resume el clamor del conjunto con naturalidad. «Aclamó» podría sonar más interpretativo y celebratorio.
- source_word: יְחִי הַמֶּלֶךְ
  english_pob_choice: Long live the king!
  chosen_spanish: ¡Viva el rey!
  alternatives_spanish:
  - ¡Que viva el rey!
  - ¡Larga vida al rey!
  lexicon: HALOT
  rationale: El jussivo se expresa de forma natural y solemne en español con «¡Viva el rey!». Mantiene el sentido de aclamación viva/política sin alejarse del hebreo.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se preserva el nombre personal del pacto según la política del proyecto, evitando la sustitución por un título genérico. La forma española tradicional equivalente al transliterado del inglés POB es «Yahvé».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Yahvé'
- issue: The force of כִּי introducing Samuel’s explanation
  english_pob_reading: For there is no one like him among all the people.
  chosen_spanish_reading: Porque no hay nadie como él entre todo el pueblo.
  alternative_spanish_readings:
  - Pues no hay nadie como él entre todo el pueblo.
  - Ya que no hay nadie como él entre todo el pueblo.
  rationale: Se mantiene la relación explicativa sin exagerar causalidad teológica. «Porque» conserva la lógica del discurso de presentación de Saúl.
  doctrine_reference: Spanish discourse coherence; no special doctrinal issue beyond source syntax
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB en inglés, que ajustó el referente a «him» y explicitó «For» para כִּי. La versión española refleja ambos puntos con una relativa directa («al que») y un conector explicativo («Porque»).
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva «rey» sin artículos innecesarios para reflejar la aclamación breve del hebreo.
  - La estructura directa de la pregunta y la cita final busca sonar natural en español sin debilitar la literalidad del texto fuente.
