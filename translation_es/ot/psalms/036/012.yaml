translation:
  language: es
  text: No permitas que el pie de la soberbia venga contra mí[a], ni que la mano de los malvados me ahuyente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «venga sobre mí». El hebreo dice literalmente: «que no venga a mí el pie de la soberbia».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «me haga vagar» o «me haga huir». El verbo puede expresar ser expulsado o forzado a salir de su lugar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  english_pob_choice: Let not
  chosen_spanish: No permitas que
  alternatives_spanish:
  - No dejes que
  - Que no
  lexicon: HALOT
  rationale: La partícula negativa con formas yusivas expresa una súplica o prohibición en oración. «No permitas que» conserva ese valor rogativo y suena natural en español bíblico actual.
- source_word: תְּבוֹאֵנִי
  english_pob_choice: come against me
  chosen_spanish: me alcance
  alternatives_spanish:
  - venga contra mí
  - venga sobre mí
  - me llegue
  lexicon: HALOT
  rationale: El hebreo usa בוא con «pie de soberbia» en una imagen idiomática. En español, «me alcance» comunica bien la llegada hostil sin perder la fuerza poética; «venga contra mí» explicita más la hostilidad, pero suena algo más interpretativo.
- source_word: רֶגֶל גַּאֲוָה
  english_pob_choice: the foot of pride
  chosen_spanish: el pie de la soberbia
  alternatives_spanish:
  - el pie del orgullo
  - el pie de la arrogancia
  - el pie del soberbio
  lexicon: HALOT
  rationale: Se conserva la imagen literal de «pie» y el sustantivo abstracto del hebreo. «Soberbia» mantiene el matiz de orgullo altivo con registro bíblico claro; «del soberbio» pasa de abstracción a persona y altera más la forma del original.
- source_word: יַד רְשָׁעִים
  english_pob_choice: the hand of the wicked
  chosen_spanish: la mano de los malvados
  alternatives_spanish:
  - la mano de los impíos
  - la mano de los malhechores
  - el poder de los malvados
  lexicon: HALOT
  rationale: «Mano» conserva el hebraísmo de poder/acción. «Malvados» es una forma natural y suficientemente amplia para el plural adjetival/substantivo, sin añadir «hombres»; «impíos» sería posible, pero aquí «malvados» suena más directo en español.
- source_word: תְּנִדֵנִי
  english_pob_choice: drive me away
  chosen_spanish: me desplace
  alternatives_spanish:
  - me ahuyente
  - me haga vagar
  - me expulse
  lexicon: HALOT
  rationale: El Hifil de נדד/נוד puede implicar ser movido de lugar, expulsado o hecho errar. «Me desplace» refleja el desplazamiento forzado de manera concisa; «me ahuyente» y «me expulse» son alternativas válidas, pero enfatizan más el acto de expulsión que la idea amplia de ser movido de su lugar.
theological_decisions:
- issue: Valor de la imagen corporal «pie/mano» como metáfora de agencia hostil
  english_pob_reading: The foot of pride and the hand of the wicked are images of hostile advance and coercive power.
  chosen_spanish_reading: El pie de la soberbia y la mano de los malvados se mantienen como metáforas de avance hostil y poder coercitivo.
  alternative_spanish_readings:
  - el avance del soberbio y el poder de los malvados
  - la amenaza del orgulloso y la violencia de los malvados
  rationale: Conviene conservar la metáfora para no perder el paralelismo poético del verso. La traducción no debe convertirlo todo en explicación, aunque la nota de apoyo puede aclarar el sentido figurado.
  doctrine_reference: Poética hebrea; metáfora bíblica de agencia y poder
- issue: 'Matiz de תְּנִידֵנִי: expulsión, movimiento o vagar'
  english_pob_reading: drive me away; footnote allows 'make me wander' or 'cause me to flee'
  chosen_spanish_reading: me desplace
  alternative_spanish_readings:
  - me haga vagar
  - me expulse
  - me haga huir
  rationale: El inglés POB preserva la tensión entre expulsión y vagar. En español, «me desplace» mantiene esa amplitud sin cerrar demasiado el sentido; la nota deja abiertas las alternativas tradicionales de interpretación.
  doctrine_reference: Poética hebrea; léxico de נדד/נוד
translation_notes:
  revision_awareness: El texto inglés auditado se mantuvo en sustancia sin cambios en la última revisión; se conserva la misma lectura de la imagen hostil («foot/hand») y la amplitud semántica del verbo final, con una adaptación española que preserva el paralelismo y la nota de alternativa.
  spanish_consistency_notes:
  - Se conserva el tratamiento de YHWH/דו̈; este versículo no contiene el nombre divino.
  - Se mantuvo la metáfora hebrea de «pie» y «mano» para respetar el paralelismo poético.
  - «Soberbia» fue preferida sobre «orgullo» para mantener un tono bíblico y el matiz de altivez.
  - «Malvados» traduce el plural sustantivado sin añadir explicación innecesaria.
  - La forma verbal final se eligió para reflejar tanto desplazamiento como expulsión, en armonía con la nota textual del POB inglés.
