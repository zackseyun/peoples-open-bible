review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura del hebreo y conserva el sentido retórico de incapacidad de Moisés para llevar solo las cargas del pueblo. «soportar», «carga» y «pleitos» son opciones defendibles para נָשָׂא, מַשָּׂא y רִיב. Sin embargo, «afán» para טָרְחֲכֶם no preserva con suficiente claridad el sentido de molestia/carga penosa impuesta a Moisés y en español puede sugerir más bien empeño o diligencia del pueblo. Además, la nota [a] no corresponde a una alternativa significativa preservada en el inglés, sino a una explicación innecesaria de «yo solo».
  spanish_quality_summary: La frase es natural y legible, pero puede mejorarse para mayor claridad semántica y alineación con el audit trail. «su afán» suena algo literario y ambiguo en español contemporáneo; «sus dificultades» o «sus problemas» comunica mejor el sentido sin colisionar con «carga». También conviene eliminar la nota de «yo solo», ya que recarga el texto sin necesidad y no preserva la nota léxica relevante del inglés, que pertenece a «pleitos/disputas».
  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal del proyecto. La decisión clave es léxica: conviene alinear רִיב con una opción que mantenga dimensión contenciosa/judicial y conservar en nota las alternativas «contiendas» o «casos legales», como hace el inglés.'
