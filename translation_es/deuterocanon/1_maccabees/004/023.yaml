translation:
  language: es
  text: Y Judas volvió al botín del campamento, y tomó mucho oro y plata, y tela azul y tela púrpura y bienes del mar[a], y gran riqueza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «tela azul del mar» o «púrpura marina»; el término griego significa literalmente «del mar», y su referente exacto en esta lista de objetos valiosos es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέστρεψεν
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - retornó
  lexicon: BDAG
  rationale: El verbo expresa volver o regresar; en este contexto narrativo militar, «volvió» es natural y conserva el movimiento de retorno al botín del campamento.
- source_word: σκυλίαν
  english_pob_choice: plunder
  chosen_spanish: botín
  alternatives_spanish:
  - plunder
  - despojos
  - saqueo
  lexicon: LSJ
  rationale: «Botín» comunica de modo claro y actual los bienes capturados en guerra. Mantiene el valor militar del término sin sonar arcaico.
- source_word: παρεμβολῆς
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento militar
  - real
  lexicon: LSJ
  rationale: El término designa el campamento militar. «Campamento» es transparente en español y suficiente en el contexto.
- source_word: ἔλαβε
  english_pob_choice: he took
  chosen_spanish: tomó
  alternatives_spanish:
  - lo tomó
  - recibió
  lexicon: BDAG
  rationale: Conserva el singular del griego, donde Judas actúa como sujeto representativo. «Tomó» reproduce la acción sin introducir un plural no presente en el texto.
- source_word: χρυσίον
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro fino
  - oro en objetos
  lexicon: LSJ
  rationale: El sustantivo designa oro como metal o riqueza en oro; «oro» es la equivalencia directa y natural.
- source_word: ἀργύριον
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - plata labrada
  - dinero de plata
  lexicon: LSJ
  rationale: «Plata» es la correspondencia directa y suficientemente clara en este inventario de riquezas.
- source_word: ὑάκινθον
  english_pob_choice: blue cloth
  chosen_spanish: tela azul
  alternatives_spanish:
  - tela azul violácea
  - tela jacinto
  lexicon: LSJ
  rationale: El término puede denotar una tela teñida de azul o azul púrpura. «Tela azul» mantiene la idea de material valioso y evita una transliteración poco clara para el lector.
- source_word: πορφύραν
  english_pob_choice: purple cloth
  chosen_spanish: tela púrpura
  alternatives_spanish:
  - tela morada
  - púrpura
  lexicon: LSJ
  rationale: En este contexto, el término apunta a un tejido teñido de púrpura, un artículo de lujo. «Tela púrpura» preserva ese matiz material.
- source_word: θαλασσίαν
  english_pob_choice: sea goods
  chosen_spanish: bienes del mar
  alternatives_spanish:
  - productos del mar
  - mercancías marinas
  lexicon: LSJ
  rationale: La forma literalmente significa «de la mar / del mar» y su referente exacto es incierto. «Bienes del mar» conserva la ambigüedad del griego y deja abierta la identificación precisa del artículo.
- source_word: πλοῦτον μέγαν
  english_pob_choice: great wealth
  chosen_spanish: gran riqueza
  alternatives_spanish:
  - grandes riquezas
  - mucha riqueza
  lexicon: BDAG
  rationale: La expresión resume la abundancia de los bienes capturados. «Gran riqueza» es idiomática y cercana al valor global del cierre.
theological_decisions:
- issue: Lectura singular de ἔλαβε con sujeto colectivo implícito
  english_pob_reading: Greek 'he took'; the singular may refer to Judas as representative leader, though the sense can be collective in context.
  chosen_spanish_reading: 'Se mantiene el singular: «tomó».'
  alternative_spanish_readings:
  - tomaron
  - tomó Judas y los suyos
  rationale: El griego presenta sujeto singular y la auditoría inglesa opta por respetarlo. En español, conservar el singular evita suavizar la sintaxis histórica y mantiene a Judas como representante de la acción colectiva.
  doctrine_reference: Narrative representation in historical texts; no doctrinal issue
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa al conservar el sujeto singular de ἔλαβε («tomó») y al tratar θαλασσίαν de forma breve y cautelosa. También se ha evitado introducir un plural implícito donde el griego no lo expresa, y se ha mantenido la enumeración de bienes como lista de botín.
  spanish_consistency_notes:
  - Se usa «Yahvé» como término por defecto cuando el texto lo requiera; este versículo no lo contiene.
  - Se mantiene «botín» para σκυλίαν en continuidad con el valor militar del término.
  - «Tela azul» y «tela púrpura» preservan el carácter de artículos textiles de lujo.
  - «Bienes del mar» conserva la ambigüedad de θαλασσίαν sin forzar una identificación precisa.
