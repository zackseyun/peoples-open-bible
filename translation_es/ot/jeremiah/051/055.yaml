translation:
  language: es
  text: Porque Yahvé está devastando Babilonia y quitando de ella el gran estruendo; sus olas rugen como muchas aguas[a]; se alza el estruendo de su voz[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus olas se encrespan como aguas caudalosas»; la imagen hebrea puede describir el tumulto de los atacantes de Babilonia como olas del mar.
    reason: lexical_alternative
  - marker: b
    text: O «el estruendo de su voz es dado». El hebreo dice literalmente «es dado», un modismo para indicar que se produce o se alza un sonido fuerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁדֵד
  english_pob_choice: is devastating
  chosen_spanish: está devastando
  alternatives_spanish:
  - está destruyendo
  - devasta
  - está desolando
  lexicon: HALOT
  rationale: El participio expresa acción en curso o inminente. «Está devastando» conserva ese matiz dinámico y la fuerza de juicio contra Babilonia.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El nombre divino del tetragrámaton se representa con «Yahvé», conforme a la terminología base del proyecto y sin sustituirlo por un título.
- source_word: וְאִבַּד
  english_pob_choice: and destroying
  chosen_spanish: y destruyendo
  alternatives_spanish:
  - y ha destruido
  - y destruirá
  - y poniendo fin a
  lexicon: HALOT
  rationale: Se coordina con el participio anterior para mantener el cuadro de juicio continuo sobre Babilonia.
- source_word: מִמֶּנָּה
  english_pob_choice: from her
  chosen_spanish: de ella
  alternatives_spanish:
  - de ella misma
  - de Babilonia
  - de ella hacia fuera
  lexicon: HALOT
  rationale: Babilonia es femenina en hebreo; en español «de ella» conserva la personificación sin sonar forzado.
- source_word: קוֹל גָּדוֹל
  english_pob_choice: the great sound
  chosen_spanish: el gran estruendo
  alternatives_spanish:
  - el gran sonido
  - la gran voz
  - el poderoso ruido
  lexicon: HALOT
  rationale: «קול» puede ser sonido, ruido o voz. Aquí el contexto es de tumulto urbano y bélico, por lo que «estruendo» expresa mejor la fuerza auditiva sin reducirlo a habla.
- source_word: וְהָמוּ
  english_pob_choice: roar
  chosen_spanish: rugen
  alternatives_spanish:
  - braman
  - se agitan
  - hacen estruendo
  lexicon: HALOT
  rationale: Con «olas» como sujeto, «rugen» es idiomático en español y conserva el matiz sonoro y tumultuoso del verbo.
- source_word: גַלֵּיהֶם
  english_pob_choice: their waves
  chosen_spanish: sus olas
  alternatives_spanish:
  - sus mareas
  - las olas de ellos
  - sus ondas
  lexicon: HALOT
  rationale: El hebreo tiene sufijo plural de 3ª persona masculina; en español «sus olas» mantiene la referencia plural sin sobrecargar la frase con un pronombre masculino explícito.
- source_word: כְּמַיִם רַבִּים
  english_pob_choice: like many waters
  chosen_spanish: como muchas aguas
  alternatives_spanish:
  - como aguas muchas
  - como grandes aguas
  - como aguas abundantes
  lexicon: HALOT
  rationale: Es una comparación hebrea conocida para fuerza abrumadora; «muchas aguas» preserva la fórmula tradicional y transparente.
- source_word: נִתַּן
  english_pob_choice: is given
  chosen_spanish: es dado
  alternatives_spanish:
  - es levantado
  - es puesto
  - se produce
  lexicon: HALOT
  rationale: La pasiva de נתן es idiomática. «Es dado» sigue de cerca la forma hebrea y conserva la tensión literal que el POB inglés también preserva.
- source_word: שְׁאוֹן קוֹלָם
  english_pob_choice: the noise of their voice
  chosen_spanish: el ruido de su voz
  alternatives_spanish:
  - el estruendo de su voz
  - el tumulto de su voz
  - el ruido de su sonido
  lexicon: HALOT
  rationale: La construcción une «tumulto/ruido» con «voz». «Ruido de su voz» preserva el enlace semántico y la sonoridad, aunque resulte algo tautológico, como en el original.
theological_decisions:
- issue: Rendición del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el nombre propio divino directamente; la traducción española del POB debe mantenerlo como «Yahvé» para conservar la referencia al nombre del pacto y no ocultarlo tras un sustituto litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el contexto auditado en inglés: la equivalencia óptima mantiene la imagen de juicio en curso, la ambigüedad lexical de קוֹל, y la lectura literal de la pasiva de נתן sin suavizarla innecesariamente. No hubo revisiones aplicadas en el último pase, y la propuesta española conserva esas decisiones centrales.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - 'Se conserva el paralelismo auditivo del versículo: devastar/destruir, estruendo/olas/ruido.'
  - «Babilonia» se trata como entidad personificada, por eso aparece «de ella» y «sus olas».
  - La formulación «el ruido de su voz es dado» mantiene la rareza intencional del hebreo y su nota de literalidad, en línea con el audit trail inglés.
