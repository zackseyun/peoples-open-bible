translation:
  language: es
  text: Bendigan al Señor[a], todos los espíritus; canten alabanzas y ensálcenlo grandemente para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos los vientos», si πνεύματα se toma en el sentido de aires en movimiento más que de seres espirituales.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  english_pob_choice: Bless
  chosen_spanish: Bendigan
  alternatives_spanish:
  - Bendigan alabanza
  - Alaben
  lexicon: BDAG
  rationale: En contexto doxológico, εὐλογεῖτε expresa una exhortación litúrgica. «Bendigan» conserva el valor reverente de la fórmula sin reducirla a un simple «alaben», y mantiene el tono de llamado comunitario plural.
- source_word: πάντα τὰ πνεύματα
  english_pob_choice: all spirits
  chosen_spanish: todos los espíritus
  alternatives_spanish:
  - todos los vientos
  - cada espíritu
  lexicon: BDAG
  rationale: πνεύματα puede ser «espíritus», «vientos» o, por extensión, «alientos». Aquí la lectura directa como seres espirituales es la más natural, y se conserva la ambigüedad posible mediante nota, tal como hace la POB en inglés.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Maestro
  lexicon: BDAG
  rationale: En este contexto hímnico y septuagintal, κύριος funciona como título reverencial de Dios. «Señor» es el equivalente español más natural y fiel al uso litúrgico del pasaje.
- source_word: ὑμνεῖτε
  english_pob_choice: sing praise
  chosen_spanish: canten alabanza
  alternatives_spanish:
  - entonen un himno
  - alaben cantando
  lexicon: BDAG
  rationale: ὑμνεῖτε implica cantar un himno o alabanza. «Canten alabanza» transmite el matiz musical de modo idiomático en español sin volverlo arcaico.
- source_word: ὑπερυψοῦτε
  english_pob_choice: highly exalt
  chosen_spanish: ensálcenlo grandemente
  alternatives_spanish:
  - exáltenlo sobremanera
  - levántenlo en alto
  lexicon: BDAG
  rationale: El compuesto intensifica la idea de exaltar. «Ensálcenlo grandemente» conserva esa intensificación con un español digno y fluido; el pronombre enclítico retoma al objeto directo ya mencionado en la línea.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por los siglos
  alternatives_spanish:
  - para siempre
  - por los siglos de los siglos
  lexicon: BDAG
  rationale: La frase expresa duración perpetua. «Por los siglos» mantiene el eco bíblico y la solemnidad del griego; en español puede funcionar como equivalente natural de la idea de perpetuidad.
theological_decisions:
- issue: Uso de κύριος como título divino en doxología
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Maestro
  rationale: La lectura doctrinal sigue la convención del proyecto para κύριος en contexto de adoración a Dios. «Señor» comunica la referencia divina sin introducir una alternativa menos establecida.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Posible sentido de πνεύματα como 'vientos' frente a 'espíritus'
  english_pob_reading: all spirits
  chosen_spanish_reading: todos los espíritus
  alternative_spanish_readings:
  - todos los vientos
  rationale: Se preserva la lectura principal de la POB, que entiende el vocativo como dirigido a seres espirituales. La alternativa 'vientos' permanece como posibilidad lexical, no como lectura principal, porque el contexto favorece la serie de seres de la alabanza.
  doctrine_reference: BDAG; nota lexical del auditor inglés
translation_notes:
  revision_awareness: 'La versión inglesa revisada eliminó el innecesario «to him» tras «sing praise», pero mantuvo «highly exalt» y «forever». La línea española sigue ese mismo equilibrio: evita un objeto redundante después de «canten alabanza», conserva la intensificación de ὑπερυψοῦτε con «ensálcenlo grandemente» y mantiene la idea de perpetuidad con «por los siglos».'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος, coherente con la terminología base del proyecto en contextos de adoración.
  - Se prefirió «espíritus» sobre «vientos» en el cuerpo principal, dejando la alternativa en nota para no borrar la tensión lexical documentada.
  - «Por los siglos» conserva el registro bíblico sin forzar una formulación más expansiva que el griego requiere.
  - El imperativo plural español se expresa de forma natural con «Bendigan» y «canten», acorde con el vocativo plural del griego.
