  text: אַ֤ךְ אֶת זֶה֙ תֹּֽאכְל֔וּ מִ/כֹּל֙ שֶׁ֣רֶץ הָ/ע֔וֹף הַ/הֹלֵ֖ךְ עַל אַרְבַּ֑ע אֲשֶׁר לא כְרָעַ֨יִם֙ מִ/מַּ֣עַל לְ/רַגְלָ֔י/ו לְ/נַתֵּ֥ר בָּ/הֵ֖ן עַל הָ/אָֽרֶץ־־־־׃
base_translation:
