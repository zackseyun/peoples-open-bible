  chosen_reading: The verse addresses Babylon directly as a feminine singular city figure.
  alternative_readings:
  - A generic female inhabitant
  - the population collectively
  rationale: The feminine singular forms fit the prophetic convention of addressing a city/kingdom as a woman. This affects English style ('You who dwell... your end has come') but does not add doctrine beyond the grammar and context.
