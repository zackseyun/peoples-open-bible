revisions:
- from: Como tu nombre, oh Dios, así tu alabanza llega hasta los confines de la tierra; tu diestra está llena de justicia[a].
  to: Como es tu nombre, oh Dios, así tu alabanza llega hasta los confines de la tierra[a]; tu diestra está llena de rectitud[b].
  rationale: Se ajusta «Como tu nombre» a «Como es tu nombre» para un español más natural manteniendo la comparación hebrea. Se conserva la nota sobre עַל, corrigiendo su redacción. Se restituye la decisión auditada para צֶדֶק mediante «rectitud» en el texto principal y «justicia» en nota, preservando así la distinción documentada en el expediente inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:15:19Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura comparativa del hebreo («Como… así…»), el vocativo «Dios», el alcance universal de «los confines de la tierra» y la imagen literal de «tu diestra». Sin embargo, no preserva fielmente el rastro auditado del POB en dos puntos importantes: trasladó la alternativa de עַל a una nota correctamente, pero omitió la nota auditada sobre צֶדֶק («righteousness / justice») y además cambió la elección principal documentada de «righteousness» a «justicia» sin necesidad suficiente. También hay una pequeña mejora estilística posible en español para hacer más natural la apertura comparativa.'
  spanish_quality_summary: El español es claro, digno y legible. «Tu diestra» funciona bien en registro bíblico. No obstante, «Como tu nombre, oh Dios, así tu alabanza…» suena algo calcado; «Como es tu nombre, oh Dios…» fluye mejor en español sin apartarse del hebreo. Además, la nota actual contiene «el cola», que debe corregirse a una formulación natural en español como «el verso» o «el miembro».
  glossary_alignment: 'La terminología general está bien alineada: אֱלֹהִים → «Dios», תְּהִלָּתְךָ → «tu alabanza», יְמִינֶךָ → «tu diestra». El problema principal es צֶדֶק: según el expediente inglés y la lógica terminológica del proyecto, la opción principal debe conservar el polo de «rectitud/justicia» correspondiente a «righteousness», dejando «justice/justicia» como alternativa en nota. «Justicia» en el texto principal borra esa decisión auditada.'
  issues:
  - severity: high
    issue: La traducción principal de צֶדֶק como «justicia» no sigue la decisión principal auditada del POB.
    rationale: El expediente inglés eligió «righteousness» como lectura principal y preservó «justice» en nota. En español, la equivalencia más cercana y natural para mantener esa distinción es «rectitud» en el texto principal con «justicia» como alternativa en nota.
  - severity: high
    issue: Falta la nota correspondiente a la alternativa léxica de צֶדֶק.
    rationale: El POB inglés conserva explícitamente la alternativa «justice». El borrador solo incluyó la nota sobre עַל y omitió la nota paralela sobre צֶדֶק, perdiendo información léxica relevante.
  - severity: medium
    issue: La nota existente dice «el cola», formulación no natural en español.
    rationale: En español bíblico/filológico general conviene usar «el verso», «el miembro» o «la cláusula». «Cola» como tecnicismo no está bien integrado aquí, y además aparece con artículo singular incorrecto.
  - severity: low
    issue: La apertura «Como tu nombre» suena algo forzada en español.
    rationale: Añadir «es» produce una frase más idiomática («Como es tu nombre») y sigue representando fielmente la comparación hebrea sin expandir el sentido.
  revised_spanish_text: Como es tu nombre, oh Dios, así tu alabanza llega hasta los confines de la tierra[a]; tu diestra está llena de rectitud[b].
  revised_footnotes:
  - marker: a
    text: O «tu alabanza está sobre los confines de la tierra». La preposición hebrea es literalmente «sobre/encima de», y el verso puede traducirse de manera más formal.
    reason: lexical_alternative
  - marker: b
    text: O «justicia». El hebreo צֶדֶק puede denotar rectitud o justicia.
    reason: alternative_reading
  revision_rationale: Se ajusta «Como tu nombre» a «Como es tu nombre» para un español más natural manteniendo la comparación hebrea. Se conserva la nota sobre עַל, corrigiendo su redacción. Se restituye la decisión auditada para צֶדֶק mediante «rectitud» en el texto principal y «justicia» en nota, preservando así la distinción documentada en el expediente inglés.
