lexical_decisions:
- source_word: πάλιν
  english_pob_choice: Yet again
  chosen_spanish: Todavía más
  alternatives_spanish:
  - De nuevo
  - Otra vez
  - Y todavía más
  lexicon: LSJ
  rationale: πάλιν retoma la argumentación y añade un nuevo paso; en español, «Todavía más» conserva el valor de continuación con ligera intensificación sin sonar demasiado mecánico.
- source_word: δʼ
  english_pob_choice: Yet
  chosen_spanish: (integrado en «Todavía más»)
  alternatives_spanish:
  - pero
  - y
  - sin embargo
  lexicon: LSJ
  rationale: La partícula postpositiva aquí aporta una transición suave; en español queda mejor absorbida en la frase inicial que separada como conector autónomo.
- source_word: οὐδʼ
  english_pob_choice: not even
  chosen_spanish: ni siquiera
  alternatives_spanish:
  - ni aun
  - ni aun así
  - ni
  lexicon: LSJ
  rationale: La negación intensiva exige una forma explícita en español; «ni siquiera» reproduce bien el énfasis de exclusión total.
- source_word: αὐτοὶ
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - ellos mismos
  - éstos mismos
  - las mismas personas
  lexicon: LSJ
  rationale: El pronombre intensivo vuelve al grupo ya mencionado; «ellos» es suficiente en español porque el énfasis está ya reforzado por «ni siquiera».
- source_word: συγγνωστοί
  english_pob_choice: excusable
  chosen_spanish: excusables
  alternatives_spanish:
  - perdonables
  - dignos de perdón
  - merecedores de indulgencia
  lexicon: LSJ
  rationale: El adjetivo expresa que no son dignos de excusa o perdón. «Excusables» mantiene el juicio de culpabilidad evaluativa sin desplazar el sentido hacia un registro doctrinal más cargado que el del griego.
theological_decisions:
- issue: Grado de culpabilidad expresado por συγγνωστοί
  english_pob_reading: The verse states that those described are not excusable.
  chosen_spanish_reading: El versículo afirma que ni siquiera ellos son excusables.
  alternative_spanish_readings:
  - ni siquiera ellos son perdonables
  - ni siquiera ellos merecen perdón
  rationale: En el contexto de Sabiduría 13, la idea central es responsabilidad moral ante la evidencia de la creación. «Excusables» conserva esa valoración sin introducir innecesariamente una formulación más teológica de perdón.
  doctrine_reference: 'DOCTRINE.md: Preservar la tensión teológica; claridad moderna sin arcaísmo innecesario.'
