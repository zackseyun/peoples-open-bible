lexical_decisions:
- source_word: Ἐλιοὺδ
  english_pob_choice: Eliud
  chosen_spanish: Eliud
  alternatives_spanish:
  - Eliud
  lexicon: nombre propio
  rationale: Nombre propio transliterado de manera estándar. Se conserva la forma reconocible en español sin intentar verter el nombre.
- source_word: δὲ
  english_pob_choice: and
  chosen_spanish: y / ;
  alternatives_spanish:
  - y
  - entonces
  - —
  lexicon: BDAG
  rationale: En una genealogía, δέ funciona como enlace secuencial leve. En español, la puntuación con punto y coma reproduce mejor la progresión de la lista que repetir 'y' mecánicamente en cada miembro.
- source_word: ἐγέννησεν
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue el padre de
  - engendró
  lexicon: BDAG
  rationale: En genealogías, γεννάω expresa paternidad biológica/ancestral. 'Engendró' conserva la fuerza genealógica de forma breve y más natural en español bíblico que una perífrasis larga.
- source_word: τὸν
  english_pob_choice: (not separately translated)
  chosen_spanish: (no se traduce de forma independiente)
  alternatives_spanish:
  - al
  - a
  lexicon: BDAG
  rationale: El artículo griego marca el objeto directo antes del nombre propio. En español se absorbe en la construcción 'engendró a + nombre'.
- source_word: Ἐλεάζαρ
  english_pob_choice: Eleazar
  chosen_spanish: Eleazar
  alternatives_spanish:
  - Eleazar
  lexicon: nombre propio
  rationale: Nombre propio transliterado conforme al uso bíblico establecido.
- source_word: Ματθάν
  english_pob_choice: Matthan
  chosen_spanish: Matán
  alternatives_spanish:
  - Matán
  - Matthan
  lexicon: nombre propio
  rationale: Se adapta a la ortografía española con acento agudo para reflejar la prosodia natural del nombre, manteniendo la transliteración bíblica identificable.
- source_word: Ἰακώβ
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Jacob
  - Jacobo
  lexicon: nombre propio
  rationale: Se conserva la forma bíblica ampliamente reconocible en español. 'Jacobo' es una variante tradicional, pero 'Jacob' sigue más de cerca la forma del nombre en las genealogías.
theological_decisions:
- issue: Fórmula genealógica de paternidad
  english_pob_reading: fathered
  chosen_spanish_reading: engendró
  alternative_spanish_readings:
  - fue el padre de
  - engendró
  rationale: 'No hay una tensión doctrinal especial en este versículo, pero sí una decisión léxica importante: la genealogía presenta sucesión de descendencia masculina. ''Engendró'' preserva esa relación con precisión y sin suavizarla.'
  doctrine_reference: Genealogía mesiánica de Mateo 1
translation_notes:
  revision_awareness: El texto inglés POB sigue una equivalencia óptima y no añade notas. La presente versión mantiene la secuencia genealógica sin expandirla, ajustando solo la puntuación y la forma de los nombres para la norma del español.
  spanish_consistency_notes:
  - Se mantiene 'engendró' de forma uniforme para los tres verbos genealógicos.
  - Los nombres propios se transliteran y se adaptan mínimamente a la ortografía española cuando corresponde.
  - La puntuación con punto y coma ayuda a marcar la lista genealógica sin introducir conectores innecesarios.
