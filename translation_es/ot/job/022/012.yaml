translation:
  language: es
  text: ¿No está Dios en la altura de los cielos?[a] Y mira las estrellas más altas[b], cuán encumbradas están.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la altura del cielo». La frase hebrea es literalmente «la altura de cielo/los cielos».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «la cabeza» o «la cima de las estrellas»; el sentido es «las estrellas más altas».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Is not
  chosen_spanish: ¿No está... ?
  alternatives_spanish:
  - ¿Acaso no está... ?
  - ¿No es... ?
  lexicon: HALOT
  rationale: La pregunta retórica en español suena más natural con la inversión verbal «¿No está Dios...?», manteniendo el valor interrogativo que espera afirmación sin agregar una glosa interpretativa.
- source_word: אֱלוֹהַּ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios Altísimo
  - el Dios
  lexicon: HALOT
  rationale: El término hebreo designa a Dios de manera directa; «Dios» conserva la equivalencia léxica simple sin introducir un matiz no explícito en el hebreo.
- source_word: גֹּבַהּ שָׁמַיִם
  english_pob_choice: in the height of heaven
  chosen_spanish: en la altura de los cielos
  alternatives_spanish:
  - en la altura del cielo
  - en las alturas de los cielos
  - tan alto como los cielos
  lexicon: HALOT
  rationale: La construcción hebrea expresa altura/elevación de los cielos. «En la altura de los cielos» preserva la imagen espacial y el tono poético; «cielos» refleja mejor el plural hebreo que una sola referencia al cielo.
- source_word: וּרְאֵה
  english_pob_choice: And see
  chosen_spanish: Y mira
  alternatives_spanish:
  - Y ve
  - Mira
  lexicon: HALOT
  rationale: El imperativo de ראה permite «mira» en español, más natural en una exhortación poética. Se conserva la conjunción inicial para mantener el impulso retórico.
- source_word: רֹאשׁ כּוֹכָבִים
  english_pob_choice: the highest stars
  chosen_spanish: la cima de las estrellas[a]
  alternatives_spanish:
  - la cabeza de las estrellas
  - las estrellas más altas
  - la parte alta de las estrellas
  lexicon: HALOT
  rationale: Rֹאשׁ significa literalmente «cabeza/topo/cima». En español, «cima de las estrellas» conserva la metáfora espacial sin sonar tan duro como «cabeza de las estrellas». Se marca la nota porque el hebreo es más literal que la forma idiomática española.
- source_word: כִּי רָמּוּ
  english_pob_choice: how lofty they are
  chosen_spanish: cuán encumbradas están
  alternatives_spanish:
  - qué altas están
  - cuán elevadas están
  - cómo se alzan
  lexicon: HALOT
  rationale: כִּי introduce aquí una observación exclamativa; «cuán» refleja ese matiz. «Encumbradas» conserva el registro poético y la idea de elevación física, sin convertirla en honor abstracto.
theological_decisions:
- issue: Si el texto debe suavizar la afirmación espacial de la exaltación divina
  english_pob_reading: Render the rhetorical question straightforwardly without adding interpretive commentary beyond the spatial imagery.
  chosen_spanish_reading: Mantener la pregunta retórica y la imaginería de altura sin añadir una explicación sobre lejanía divina o juicio teológico adicional.
  alternative_spanish_readings:
  - Parafrasear para subrayar la trascendencia divina
  - Expandir para sugerir una crítica implícita a Job
  rationale: En el hebreo, el verso presenta una observación retórica sobre la altura de Dios y de las estrellas. La traducción debe preservar esa imagen y dejar la carga discursiva propia del discurso de Elifaz sin resolverla ni ampliarla.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con el control más reciente: no se registraron cambios necesarios y la concordancia externa fue alta.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלוֹהַּ, conforme al valor léxico directo.
  - Se conserva el plural «cielos» para reflejar שָׁמַיִם.
  - Se traduce רֹאשׁ con una metáfora espacial natural en español, sin borrar que el hebreo es más literal.
  - «Cuán» reproduce el matiz exclamativo de כִּי en este contexto poético.
