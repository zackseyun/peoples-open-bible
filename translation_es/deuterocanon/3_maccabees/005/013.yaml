translation:
  language: es
  text: Y los judíos[a], habiendo escapado de la hora señalada, otra vez imploraban a su Dios santo que mostrara a las naciones soberbias[b], con magnífica generosidad[c], el poder de su mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su Dios, es decir, el Santo». El griego incluye una partícula explicativa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «a los gentiles soberbios». El término griego puede significar «naciones» o, en uso judío, «gentiles».'
    reason: lexical_alternative
  - marker: c
    text: La expresión combina εὐκατάλλακτον y μεγαλοφθενῶς, uniendo disposición favorable y grandeza; alternativas más literales incluyen «graciosamente» o «con noble grandeza».
    reason: lexical_alternative
lexical_decisions:
- source_word: οἵ τε Ἰουδαῖοι
  english_pob_choice: And the Jews
  chosen_spanish: Y los judíos
  alternatives_spanish:
  - Y los judíos entonces
  - Y los judíos mismos
  lexicon: LSJ
  rationale: El griego introduce al sujeto de manera directa; en español, «Y los judíos» conserva el flujo narrativo sin añadir énfasis no presente en el original.
- source_word: τὴν προσημανθεῖσαν ὥραν
  english_pob_choice: the appointed hour
  chosen_spanish: la hora señalada
  alternatives_spanish:
  - la hora designada
  - la hora previamente indicada
  lexicon: LSJ
  rationale: προσημανθεῖσαν apunta a una hora marcada de antemano. «Señalada» reproduce esa idea de tiempo fijado sin sonar forzado en español.
- source_word: διαφυγόντες
  english_pob_choice: having escaped
  chosen_spanish: habiendo escapado
  alternatives_spanish:
  - habiendo pasado a través de
  - habiendo sobrevivido
  lexicon: LSJ
  rationale: El participio expresa haber quedado fuera de un peligro o límite ya fijado. «Habiendo escapado» mantiene el sentido de liberación efectiva.
- source_word: τὸν ἅγιον ἤγουν θεὸν αὐτῶν
  english_pob_choice: their holy God
  chosen_spanish: su Dios santo
  alternatives_spanish:
  - su Dios, es decir, el Santo
  - su Dios, es decir, el Santo de ellos
  lexicon: LSJ
  rationale: ἤγουν tiene valor explicativo («es decir»), pero en español la frase fluye mejor como «su Dios santo», que conserva la posesión y la santidad sin sobrecargar la sintaxis.
- source_word: ἤξιουν
  english_pob_choice: were imploring
  chosen_spanish: rogaban
  alternatives_spanish:
  - suplicaban
  - imploraban
  lexicon: LSJ
  rationale: El imperfecto indica acción continuada. «Rogaban» comunica bien la petición insistente en un registro natural y reverente; «suplicaban» o «imploraban» también serían posibles, pero «rogaban» evita excesiva dureza.
- source_word: εὐκατάλλακτον
  english_pob_choice: in magnificent generosity
  chosen_spanish: en generosa grandeza
  alternatives_spanish:
  - con benigna prontitud
  - con grande benignidad
  - con gracia magnánima
  lexicon: LSJ
  rationale: El adjetivo sugiere disposición favorable o fácilmente aplacable; en este contexto de oración, se busca una expresión reverente que no sugiera arbitrariedad divina. «Generosa grandeza» conserva la amplitud semántica y el tono elevado.
- source_word: μεγαλοφθενῶς
  english_pob_choice: in magnificent generosity
  chosen_spanish: en generosa grandeza
  alternatives_spanish:
  - magníficamente
  - con noble grandeza
  - con magnanimidad
  lexicon: LSJ
  rationale: El adverbio intensifica la nobleza o grandeza de la acción. En español conviene integrarlo con εὐκατάλλακτον, como hace el POB inglés, en una sola frase natural.
- source_word: χειρὸς κράτος
  english_pob_choice: the might of his hand
  chosen_spanish: el poder de su mano
  alternatives_spanish:
  - la fuerza de su mano
  - la majestad de su mano poderosa
  lexicon: LSJ
  rationale: La expresión conserva la imagen concreta de la mano como símbolo del actuar divino. «Poder» mantiene el valor bíblico sin perder claridad.
- source_word: ἔθνεσιν
  english_pob_choice: to the proud nations
  chosen_spanish: a las naciones soberbias
  alternatives_spanish:
  - a los pueblos soberbios
  - a los gentiles soberbios
  lexicon: LSJ
  rationale: ἔθνη puede significar «naciones» o, en contexto judío, «gentiles». Se elige «naciones» como opción más amplia y menos interpretativa, siguiendo la cautela del POB inglés.
- source_word: ὑπερηφάνοις
  english_pob_choice: the proud nations
  chosen_spanish: soberbias
  alternatives_spanish:
  - arrogantes
  - altivas
  lexicon: LSJ
  rationale: El adjetivo expresa orgullo o arrogancia. «Soberbias» comunica bien ese matiz con registro bíblico adecuado.
theological_decisions:
- issue: Valor de εὐκατάλλακτον en una petición dirigida a Dios
  english_pob_reading: Rendered as part of a reverent appeal to God's gracious readiness
  chosen_spanish_reading: «en generosa grandeza» como forma reverente de expresar la disposición favorable de Dios
  alternative_spanish_readings:
  - «fácilmente propicio»
  - «pronto para reconciliarse»
  - «benigno»
  rationale: Una traducción demasiado literal como «fácilmente propicio» o «pronto para reconciliarse» puede sonar a capricho divino o a placación pagana. La frase elegida mantiene la tensión entre favor y grandeza, sin resolverla de manera doctrinalmente estrecha.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica y evitar suavizar indebidamente el lenguaje del original.'
- issue: τὸν ἅγιον ἤγουν θεὸν αὐτῶν y la explicación implícita del título divino
  english_pob_reading: their holy God / their God, that is, the Holy One
  chosen_spanish_reading: «su Dios santo» con nota explicativa sobre el valor de ἤγουν
  alternative_spanish_readings:
  - «su Dios, es decir, el Santo»
  - «su Dios, es decir, el Santo de ellos»
  rationale: El griego incluye un matiz explicativo. En el texto principal, el español puede sonar más natural con «su Dios santo», pero conviene documentar que el giro también puede entenderse como «su Dios, es decir, el Santo».
  doctrine_reference: 'DOCTRINE.md: conservar las alternativas semánticas significativas cuando el original las deja abiertas.'
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el movimiento sintáctico del griego y el ajuste final del POB inglés, manteniendo visibles los elementos principales: el escape de la hora señalada, la petición repetida a Dios, la cualidad explicativa de «su Dios santo» y la frase adverbial compuesta que describe la manifestación del poder divino ante las naciones soberbias. Se evitó una literalidad rígida en εὐκατάλλακτον/μεγαλοφθενῶς para no producir una expresión poco natural en español.'
  spanish_consistency_notes:
  - Se usa «Dios» para θεός, conforme al criterio general.
  - Se usa «santo» en minúscula como adjetivo, no como título litúrgico autónomo.
  - Se conserva «naciones» en lugar de «gentiles» en el cuerpo principal, dejando la alternativa en nota.
  - La estructura con participio se resuelve en español con gerundio compuesto para conservar el valor aspectual del griego.
