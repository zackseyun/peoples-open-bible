    text: 'O: «se levantaron en un solo montón». La imagen hebrea enfatiza que las aguas se amontonaron como una sola barrera.'
    reason: lexical_alternative
  - marker: b
    text: «El mar de la Sal» es el cuerpo de agua que después se llamó comúnmente mar Muerto.
    reason: cultural_note
  revision_rationale: La revisión conserva el sentido del hebreo y las decisiones léxicas del POB, pero añade la nota cultural exigida por el audit trail inglés y mejora la naturalidad de la expresión sobre el cese total de las aguas aguas abajo.
