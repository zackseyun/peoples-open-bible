    rationale: El POB inglés da como alternativas 'enemy' y 'adversary'. El borrador pone 'adversario' y 'opresor'. 'Opresor' es posible para צָר, pero conviene reflejar primero las alternativas auditadas y no crear una desviación innecesaria.
