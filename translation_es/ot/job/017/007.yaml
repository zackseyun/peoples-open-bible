review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: singular poético «ojo», estado resultante de debilitamiento/oscurecimiento, causa emocional, y la imagen final «como una sombra» aplicada al conjunto corporal. Sin embargo, hay pequeños problemas de fidelidad y de acabado editorial en las notas y en una opción léxica secundaria.'
  spanish_quality_summary: 'El texto principal es natural y legible en español eclesial moderno. «Se me ha oscurecido el ojo» suena idiomático, aunque «mi ojo se ha oscurecido» sería más pegado al hebreo; no es necesario cambiarlo. Sí conviene corregir las notas: «vexación» debe ser «vejación» o mejor «aflicción/vexación», evitar comillas y comilla inicial sobrante, y no repetir «mis miembros» como alternativa de «mis miembros».'
  glossary_alignment: No hay términos del glosario principal especialmente implicados aquí. La decisión «miembros» está alineada con la revisión inglesa auditada. «Pena» es aceptable para מִכַּעַשׂ en contexto de lamento, con alternativas léxicas preservadas en nota.
  issues:
  - severity: medium
    issue: Nota [a] usa «vexación», forma poco natural en español bíblico actual.
    rationale: Aunque existe «vexación» por influencia culta, en español general y eclesial amplio suena menos claro; «aflicción» o «vejación» evitarían tropiezo. Dado que la nota explica alternativas, debe ser clara y correcta.
  - severity: medium
    issue: Nota [b] está mal puntuada y repite el término principal como alternativa.
    rationale: 'Empieza con una comilla simple sobrante y ofrece «mis miembros» como alternativa de «mis miembros», lo cual no aporta información. Debe conservar las alternativas documentadas: «mi forma», «mi cuerpo»/«mi estructura» o «mi constitución», idealmente más cerca del inglés auditado «my form / my frame / my members».'
  - severity: low
    issue: La alternativa inglesa «my frame» quedó sin traducir en las decisiones léxicas.
    rationale: En el campo interno aparece «mi frame», que es un anglicismo residual. Aunque no afecta directamente el texto principal, muestra una revisión incompleta y conviene normalizarlo en la nota final.
  revised_spanish_text: Se me ha oscurecido el ojo por la pena[a], y todos mis miembros[b] son como una sombra.
  revised_footnotes:
  - marker: a
    text: También puede entenderse «por la ira», «por la aflicción» o «por el dolor». El hebreo admite varios matices de agitación emocional; aquí se eligió «pena» por el contexto de lamento y sufrimiento.
    reason: lexical_alternative
  - marker: b
    text: 'También: «mi forma», «mi cuerpo» o «mi constitución». El hebreo probablemente se refiere al conjunto de las partes del cuerpo de Job.'
    reason: lexical_alternative
  revision_rationale: 'El texto principal puede mantenerse, pero las notas requieren corrección para reflejar mejor el expediente inglés y ofrecer un español más claro y cuidado: se reemplaza «vexación» por «aflicción», se corrige la puntuación de la nota [b], se eliminan repeticiones inútiles y se normalizan las alternativas corporales.'
