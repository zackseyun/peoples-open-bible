translation:
  language: es
  text: Neftalí no expulsó a los habitantes de Bet-semes ni a los habitantes de Bet-anat, así que vivió entre los cananeos, los habitantes de la tierra. Y los habitantes de Bet-semes y de Bet-anat llegaron a ser trabajo forzado[a] para ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “llegaron a quedar sujetos a corvée para ellos”. El hebreo מַס se refiere a trabajo obligatorio, no solo al pago de tributo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹרִישׁ
  english_pob_choice: drive out
  chosen_spanish: expulsó
  alternatives_spanish:
  - echó fuera
  - desposeyó
  lexicon: HALOT
  rationale: En este contexto de conquista y asentamiento, el Hiphil de ירש expresa sacar a los habitantes previos del territorio. 'Expulsó' comunica bien el sentido de removerlos del lugar sin sonar tan abstracto como 'desposeyó'.
- source_word: יֹשְׁבֵי
  english_pob_choice: inhabitants
  chosen_spanish: los habitantes
  alternatives_spanish:
  - los que habitaban
  - los residentes
  lexicon: HALOT
  rationale: El participio plural designa a quienes vivían en esos lugares. 'Los habitantes' mantiene la repetición formulaica del hebreo y del inglés POB.
- source_word: בֵית שֶׁמֶשׁ
  english_pob_choice: Beth-shemesh
  chosen_spanish: Bet-semes
  alternatives_spanish:
  - Bet Semes
  lexicon: convención toponímica
  rationale: Se translitera el nombre propio en forma breve y reconocible para el español bíblico, sin traducir el topónimo.
- source_word: בֵית עֲנָת
  english_pob_choice: Beth-anath
  chosen_spanish: Bet-anat
  alternatives_spanish:
  - Bet Anat
  lexicon: convención toponímica
  rationale: Se conserva el nombre propio transliterado. La forma con guion ayuda a la legibilidad en español y refleja la compacidad del nombre hebreo.
- source_word: וַיֵּשֶׁב בְּקֶרֶב
  english_pob_choice: so he lived among
  chosen_spanish: sino que habitó entre
  alternatives_spanish:
  - y habitó en medio de
  - y vivió entre
  lexicon: HALOT
  rationale: El giro narrativo expresa consecuencia de no haber expulsado a los habitantes. 'Habitó entre' preserva el valor de בְּקֶרֶב; 'sino que' recoge el contraste implícito en la secuencia.
- source_word: הַכְּנַעֲנִי
  english_pob_choice: the Canaanites
  chosen_spanish: los cananeos
  alternatives_spanish:
  - el cananeo
  lexicon: HALOT
  rationale: Aunque el hebreo tiene forma singular colectiva, en español el plural etnónimo es natural y fiel al sentido colectivo.
- source_word: יֹשְׁבֵי הָאָרֶץ
  english_pob_choice: the inhabitants of the land
  chosen_spanish: los habitantes de la tierra
  alternatives_spanish:
  - los que habitaban la tierra
  lexicon: HALOT
  rationale: Se conserva la apposición explicativa del hebreo. 'De la tierra' suena directo en español y reproduce la identificación del grupo.
- source_word: הָיוּ לָהֶם לָמַס
  english_pob_choice: became forced labor for them
  chosen_spanish: les quedaron como trabajo forzado
  alternatives_spanish:
  - quedaron sujetos a trabajo forzado para ellos
  - pasaron a ser trabajo forzado para ellos
  lexicon: HALOT
  rationale: מַס refiere a corvée o trabajo compulsorio, no meramente a tributo. 'Trabajo forzado' preserva la fuerza lexical; 'les quedaron como' intenta reflejar la construcción hebrea היה + ל sin volverla demasiado rígida.
- source_word: לָהֶם
  english_pob_choice: for them
  chosen_spanish: les
  alternatives_spanish:
  - para ellos
  lexicon: HALOT
  rationale: El pronombre retoma al sujeto colectivo de Neftalí en sentido plural distributivo. En español, el dativo 'les' resulta más natural con 'quedaron como'.
theological_decisions:
- issue: Sentido de לָמַס como corvée / trabajo compulsorio
  english_pob_reading: became forced labor for them
  chosen_spanish_reading: les quedaron como trabajo forzado
  alternative_spanish_readings:
  - quedaron sujetos a trabajo forzado para ellos
  - se volvieron tributarios de trabajo para ellos
  rationale: No se suaviza מַס como simple tributo monetario, porque el audit trail del inglés subraya que el hebreo apunta a servicio laboral obligatorio. 'Trabajo forzado' mantiene esa tensión histórica y social.
  doctrine_reference: N/A (lexical-historical issue)
- issue: Colectivo étnico singular en hebreo
  english_pob_reading: the Canaanites
  chosen_spanish_reading: los cananeos
  alternative_spanish_readings:
  - el cananeo
  rationale: El hebreo usa una forma singular colectiva, pero el sentido es grupal. El plural español evita confusión y coincide con el uso idiomático natural sin perder la referencia étnica.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se revisó el pasaje conforme al último pase del inglés POB, que no introdujo cambios adicionales. La versión española sigue el mismo sentido y conserva la observación lexical sobre מַס.
  spanish_consistency_notes:
  - Se mantiene 'Bet-' en topónimos para uniformidad y legibilidad en español.
  - Se conserva la repetición de 'los habitantes' para reflejar la estructura del hebreo.
  - Se evita 'SEÑOR' u otros sustitutos teológicos porque el versículo no contiene el nombre divino.
