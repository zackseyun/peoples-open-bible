  language: en
  yaml_path: translation/deuterocanon/1_esdras/007/009.yaml
  text: And the priests and the Levites stood arrayed by divisions for the works of the Lord God of Israel[a], in accordance with the book of Moses[b], and the gatekeepers at each gate.
  footnotes:
  - marker: a
    text: Or 'according to tribes.' The Greek reads literally 'by tribes,' likely referring to the ordered divisions of priestly and Levitical service.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew parallel emphasizes strengthening their hands in the work of the house of God; the Greek here focuses on the priests' and Levites' ordered placement for the Lord God's works.
