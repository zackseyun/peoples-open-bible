translation:
  language: es
  text: Entonces lo llevarás a tu padre, y él comerá, para que te bendiga antes de su muerte.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְהֵבֵאתָ
  english_pob_choice: Then you shall bring
  chosen_spanish: Entonces lo llevarás
  alternatives_spanish:
  - Y lo llevarás
  - Así lo llevarás
  lexicon: HALOT
  rationale: El verbo con conjunción expresa secuencia instructiva; «Entonces» conserva el avance lógico que el audit trail inglés rinde con «Then», y «lo llevarás» mantiene el valor futuro/mandato implícito en español natural.
- source_word: לְאָבִיךָ
  english_pob_choice: to your father
  chosen_spanish: a tu padre
  alternatives_spanish:
  - a tu papá
  lexicon: HALOT
  rationale: «Padre» reproduce el registro narrativo solemne de אָב; «tu padre» conserva la referencia relacional sin coloquializar el texto.
- source_word: וְאָכָל
  english_pob_choice: and he will eat
  chosen_spanish: y él comerá
  alternatives_spanish:
  - y comerá
  - y que él coma
  lexicon: HALOT
  rationale: La forma verbal secuencial se vierte de manera futura para reflejar el resultado esperado del plan. Se explicita «él» para claridad referencial en español.
- source_word: בַּעֲבוּר אֲשֶׁר
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el propósito de que
  lexicon: HALOT
  rationale: La construcción conjuntiva introduce finalidad; «para que» expresa de forma natural y fiel el sentido purposivo que el inglés POB condensó en «so that».
- source_word: יְבָרֶכְךָ
  english_pob_choice: bless you
  chosen_spanish: te bendiga
  alternatives_spanish:
  - pronuncie una bendición sobre ti
  - te dé su bendición
  lexicon: HALOT
  rationale: «Bendecir» es la equivalencia directa de ברך en el contexto patriarcal. El subjuntivo tras «para que» conserva la subordinación final del hebreo.
- source_word: לִפְנֵי מוֹתוֹ
  english_pob_choice: before his death
  chosen_spanish: antes de su muerte
  alternatives_spanish:
  - antes de que muera
  - antes de que llegue su muerte
  lexicon: HALOT
  rationale: La expresión nominal se mantiene con solemnidad y cercanía al original; «su muerte» reproduce la estructura sustantiva de forma fluida en español.
theological_decisions:
- issue: La bendición patriarcal como acto intencional previo a la muerte
  english_pob_reading: so that he may bless you before his death
  chosen_spanish_reading: para que te bendiga antes de su muerte
  alternative_spanish_readings:
  - para que te bendiga antes de que muera
  - para que él te bendiga antes de morir
  rationale: El verso presenta la bendición como objetivo deliberado del plan narrado, no como mera consecuencia accidental. «Para que» y el subjuntivo preservan esa finalidad sin suavizar el peso teológico y narrativo del acto de bendecir antes de la muerte del patriarca.
  doctrine_reference: Génesis 27; bendición patriarcal y transmisión del linaje de la promesa
translation_notes:
  revision_awareness: El contexto auditado en inglés muestra alta concordancia y no requiere notas textuales ni variantes adicionales; la presente versión sigue la lectura estable sin introducir matices no sustentados.
  spanish_consistency_notes:
  - Se mantiene «bendiga/bendecir» como traducción de ברך en contexto patriarcal.
  - Se evita «SEÑOR» u otra sustitución teológica porque no aparece el nombre divino en el versículo.
  - El registro es reverente y narrativo, con sintaxis española natural y sin expansión interpretativa.
