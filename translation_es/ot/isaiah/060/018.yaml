  text: לֹא יִשָּׁמַ֨ע ע֤וֹד חָמָס֙ בְּ/אַרְצֵ֔/ךְ שֹׁ֥ד וָ/שֶׁ֖בֶר בִּ/גְבוּלָ֑יִ/ךְ וְ/קָרָ֤את יְשׁוּעָה֙ חוֹמֹתַ֔יִ/ךְ וּ/שְׁעָרַ֖יִ/ךְ תְּהִלָּֽה־׃
