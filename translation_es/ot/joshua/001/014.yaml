translation:
  language: es
  text: Sus esposas, sus pequeños y su ganado se quedarán en la tierra que Moisés les dio al otro lado del Jordán. Pero ustedes pasarán armados[a] delante de sus hermanos[b], todos los valientes guerreros, y los ayudarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en orden de batalla' o 'preparados para la guerra' para 'armados'.
    reason: alternative_reading
  - marker: b
    text: O 'sus compañeros israelitas' para 'sus hermanos'; el hebreo usa el término masculino de parentesco de manera representativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: נְשֵׁיכֶם
  english_pob_choice: your wives
  chosen_spanish: vuestras mujeres
  alternatives_spanish:
  - vuestras esposas
  lexicon: HALOT
  rationale: En este contexto familiar y militar, el plural con sufijo de 2mp se refiere específicamente a las esposas de los hombres. 'Mujeres' conserva la referencia sin sonar demasiado formal o eclesiástica; 'esposas' sería más explícito pero menos acorde con el tono conciso del hebreo.
- source_word: טַפְּכֶם
  english_pob_choice: your little ones
  chosen_spanish: vuestros pequeños
  alternatives_spanish:
  - vuestros hijos
  - vuestros dependientes
  lexicon: HALOT
  rationale: '''טַף'' suele referirse a niños pequeños o dependientes. ''Pequeños'' mantiene el matiz concreto y afectivo sin precisar más de lo que el hebreo exige.'
- source_word: וּמִקְנֵיכֶם
  english_pob_choice: and your livestock
  chosen_spanish: y vuestro ganado
  alternatives_spanish:
  - y vuestros animales
  - y vuestras reses
  lexicon: HALOT
  rationale: מִקְנֶה designa ganado o animales domesticados. 'Ganado' es natural en español bíblico moderno y suficientemente preciso.
- source_word: יֵשְׁבוּ
  english_pob_choice: shall remain
  chosen_spanish: habitarán
  alternatives_spanish:
  - permanecerán
  - se quedarán
  - morarán
  lexicon: HALOT
  rationale: El verbo ישב puede significar sentarse, habitar o permanecer. En este contexto de residencia en la tierra asignada, 'habitarán' conserva la idea de morar allí de manera estable.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la región
  lexicon: HALOT
  rationale: '''Tierra'' es la equivalencia estándar para אֶרֶץ en contexto de asentamiento territorial.'
- source_word: אֲשֶׁר נָתַן לָכֶם מֹשֶׁה
  english_pob_choice: that Moses gave you
  chosen_spanish: que Moisés os dio
  alternatives_spanish:
  - que Moisés os había dado
  - que Moisés les dio
  lexicon: HALOT
  rationale: El qatal expresa acción completada desde la perspectiva narrativa. 'Os dio' es la forma natural en español y mantiene el pasado simple del hebreo.
- source_word: בְּעֵבֶר הַיַּרְדֵּן
  english_pob_choice: beyond the Jordan
  chosen_spanish: al otro lado del Jordán
  alternatives_spanish:
  - más allá del Jordán
  - del otro lado del Jordán
  lexicon: HALOT
  rationale: '''Al otro lado del Jordán'' comunica la relación espacial del hebreo sin imponer una perspectiva direccional adicional. ''Más allá'' también sería posible, pero suena un poco más interpretativo.'
- source_word: וְאַתֶּם תַּעַבְרוּ
  english_pob_choice: But you shall cross over
  chosen_spanish: Pero vosotros pasaréis
  alternatives_spanish:
  - Pero vosotros cruzaréis
  - Y vosotros pasaréis
  lexicon: HALOT
  rationale: El contraste con los que se quedan está bien marcado por 'Pero'. 'Pasaréis' conserva el valor de atravesar/pasar al otro lado sin forzar un giro demasiado moderno.
- source_word: חֲמֻשִׁים
  english_pob_choice: armed
  chosen_spanish: armados
  alternatives_spanish:
  - en orden de batalla
  - preparados para la guerra
  - dispuestos para la batalla
  lexicon: HALOT
  rationale: En este contexto militar, el término se entiende como equipados para la guerra. 'Armados' es el equivalente más claro y breve en español.
- source_word: לִפְנֵי אֲחֵיכֶם
  english_pob_choice: before your brothers
  chosen_spanish: delante de vuestros hermanos
  alternatives_spanish:
  - ante vuestros hermanos
  - frente a vuestros hermanos
  lexicon: HALOT
  rationale: '''Delante de'' conserva el valor idiomático de ir al frente. ''Hermanos'' mantiene el término de parentesco masculino usado representativamente para el pueblo del pacto.'
- source_word: אֲחֵיכֶם
  english_pob_choice: your brothers
  chosen_spanish: vuestros hermanos
  alternatives_spanish:
  - vuestros compatriotas
  - vuestros hermanos y hermanas
  lexicon: HALOT
  rationale: Se conserva el término masculino del hebreo, que funciona de manera representativa. No se neutraliza en el texto principal, pero el sentido colectivo queda implícito por el contexto.
- source_word: כֹּל גִּבּוֹרֵי הַחַיִל
  english_pob_choice: all the mighty men of valor
  chosen_spanish: todos los valientes guerreros
  alternatives_spanish:
  - todos los hombres valientes
  - todos los guerreros de valor
  - todos los hombres poderosos
  lexicon: HALOT
  rationale: La expresión denota hombres de guerra capaces y probados. 'Valientes guerreros' comunica esa fuerza sin depender de un giro demasiado arcaico como 'hombres de valor'.
- source_word: וַעֲזַרְתֶּם אוֹתָם
  english_pob_choice: and you shall help them
  chosen_spanish: y los ayudaréis
  alternatives_spanish:
  - y les ayudaréis
  - y vendréis en su ayuda
  lexicon: HALOT
  rationale: עזר significa ayudar o asistir. 'Los ayudaréis' es claro y fluido en español, manteniendo el sentido de apoyo activo a sus hermanos.
theological_decisions:
- issue: Lenguaje de parentesco masculino en אֲחֵיכֶם
  english_pob_reading: your brothers
  chosen_spanish_reading: vuestros hermanos
  alternative_spanish_readings:
  - vuestros compatriotas
  - vuestros hermanos y hermanas
  rationale: El hebreo usa un término masculino plural con valor representativo para la comunidad del pacto. Se preserva en el texto principal para no borrar la forma del original, y el contexto deja claro el referente colectivo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Matiz militar de חֲמֻשִׁים
  english_pob_reading: armed
  chosen_spanish_reading: armados
  alternative_spanish_readings:
  - en orden de batalla
  - preparados para la guerra
  - dispuestos para la batalla
  rationale: El sentido más probable en este contexto es estar equipados para la guerra. 'Armados' mantiene la ambigüedad razonable entre equipamiento y disposición bélica, sin sobreinterpretar.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para añadir la conjunción antes de 'your livestock' y mantener la puntuación final. La redacción española ya incluye la conjunción coordinante equivalente ('y'), y sigue el mismo sentido revisado con una estructura natural en español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma preferente para el nombre divino en este proyecto, pero en este versículo no aparece el tetragrámaton.
  - Se conserva el tono narrativo simple y militar del hebreo, evitando ampliar el contenido con glosas interpretativas.
  - Se ha preferido 'vuestros' para coherencia con el plural de segunda persona usado en toda la cláusula.
