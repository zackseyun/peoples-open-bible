translation:
  language: es
  text: Mientras los hijos de Israel estaban en el desierto[a], hallaron a un hombre recogiendo leña en el día de sábado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'recogiendo palos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: were
  chosen_spanish: estaban
  alternatives_spanish:
  - eran
  - se hallaban
  lexicon: HALOT
  rationale: El wayyiqtol de היה aquí funciona como marco circunstancial; en español, 'estaban' comunica bien el estado situacional sin forzar un matiz de cambio.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: '''Hijos de Israel'' conserva la forma hebrea de manera transparente y natural en español bíblico, manteniendo la referencia colectiva sin neutralizarla demasiado.'
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto inculto
  - en la estepa
  lexicon: HALOT
  rationale: El contexto narrativo del éxodo permite 'desierto' como equivalente funcional claro en español; 'wilderness' en inglés abarca esta zona y no exige una transliteración conceptual.
- source_word: וַיִּמְצְאוּ
  english_pob_choice: they found
  chosen_spanish: hallaron
  alternatives_spanish:
  - encontraron
  - dieron con
  lexicon: HALOT
  rationale: '''Hallaron'' es una opción sobria y fiel al verbo מצא en narrativa; evita un tono demasiado coloquial.'
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: a un hombre
  alternatives_spanish:
  - a alguien
  - a un varón
  lexicon: HALOT
  rationale: El sustantivo singular señala a un individuo masculino concreto; 'un hombre' reproduce ese valor de manera directa y clara.
- source_word: מְקֹשֵׁשׁ עֵצִים
  english_pob_choice: gathering wood
  chosen_spanish: recogiendo leña
  alternatives_spanish:
  - recogiendo madera
  - juntando leña
  - recogiendo palos
  lexicon: HALOT
  rationale: La construcción denota recoger piezas de madera; 'leña' es natural en español y mantiene la idea de material combustible. 'Madera' puede sonar demasiado general; 'palos' preserva la alternativa lexical 'sticks' pero es menos natural en el contexto.
- source_word: בְּיוֹם הַשַּׁבָּת
  english_pob_choice: on the Sabbath day
  chosen_spanish: en día de sábado
  alternatives_spanish:
  - en el día de sábado
  - en sábado
  lexicon: HALOT
  rationale: '''Día de sábado'' preserva la estructura explícita del hebreo (''en el día del sábado'') sin añadir interpretación. Se evita sustituirlo por una fórmula eclesiástica más fija si no responde mejor al hebreo.'
theological_decisions:
- issue: 'Designación del pueblo del pacto: בְנֵי יִשְׂרָאֵל'
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Jacob
  rationale: No hay tensión doctrinal especial; la decisión sigue la forma hebrea concreta que la POB inglesa quiso conservar. 'Los hijos de Israel' mantiene la transparencia textual y evita sustituir el nombre colectivo por un equivalente más interpretativo.
  doctrine_reference: DOCTRINE.md §Translation philosophy, punto 4
- issue: Referencia al sábado
  english_pob_reading: the Sabbath day
  chosen_spanish_reading: día de sábado
  alternative_spanish_readings:
  - el sábado
  - el día de reposo
  rationale: La frase se mantiene descriptiva y temporal, sin agregar comentario legal o teológico. 'Día de sábado' conserva el paralelismo con el hebreo y no reemplaza el término por una fórmula tradicional menos directa.
  doctrine_reference: DOCTRINE.md §Translation philosophy, puntos 1 y 3
translation_notes:
  revision_awareness: El texto inglés revisado no mostró cambios pendientes; se siguió el estado de alta concordancia y se mantuvo la decisión lexical de manera coherente con el audit trail existente.
  spanish_consistency_notes:
  - Se preservó el paralelismo narrativo breve del hebreo en una sola oración.
  - Se evitó 'SEÑOR' o 'reposo' porque el versículo no contiene el nombre divino ni una glosa interpretativa del sábado.
  - '''Leña'' se usó como equivalente natural de ''wood'' en este contexto narrativo, con nota alternativa para ''palos'' por la posibilidad lexical de ''sticks''.'
