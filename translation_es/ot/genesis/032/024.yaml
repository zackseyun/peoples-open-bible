  to: Tomó a los suyos y los hizo pasar el arroyo[a], e hizo pasar lo que le pertenecía[b].
  rationale: Se corrige la correspondencia entre los marcadores y sus notas para que cada nota quede anclada a la palabra o frase pertinente. Además, se omite el pronombre 'Él' para una narración más natural en español y se ajusta 'los tomó' a 'Tomó a los suyos', que hace más explícito en español el referente humano implícito por el contexto inmediato sin alterar el sentido fuente.
