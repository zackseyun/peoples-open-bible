  text: And a man or a woman[a], if there is in them a medium or a spiritist, shall surely be put to death; they shall stone them with stones[c][b]. Their blood is on them.
  footnotes:
  - marker: a
    text: Or 'a familiar spirit' for אוֹב; the term can denote the spirit associated with necromancy or, by extension, the medium who consults it.
    reason: lexical_alternative
  - marker: b
    text: Or 'a wizard' for יִדְּעֹנִי; here 'spiritist' is used to avoid misleading modern fantasy associations.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'Their blood is on them,' a legal formula indicating responsibility for their own death.
    reason: cultural_note
