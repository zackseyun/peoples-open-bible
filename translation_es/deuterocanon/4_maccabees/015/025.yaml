review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el griego y la auditoría inglesa: preserva la comparación explicativa de καθάπερ γὰρ, la metáfora deliberativa de ἐν βουλευτηρίῳ τῇ ἑαυτῆς ψυχῇ, la fuerza de δεινοὺς συμβούλους y la serie de presiones internas. También mantiene correctamente φιλοτεκνίαν como amor por los hijos y στρέβλαν en sentido metonímico como tortura, no el instrumento literal.'
  spanish_quality_summary: El español es claro y digno, pero la puntuación y una elección léxica pueden mejorarse. La doble coma tras «Porque así como» interrumpe innecesariamente el arranque, y «nacimiento» para γένεσιν suena algo abstracto en esta lista de apelaciones maternales. «Darles vida» o «haberlos dado a luz» sería más idiomático, pero como la revisión debe ser pequeña, conviene al menos ajustar a «el haberlos dado a luz» o «el parto». Además, el guion largo debe ir pegado según convención tipográfica española.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías, Cristo, Espíritu, etc. Las decisiones «alma», «amor por sus hijos» y «tortura» concuerdan con la justificación léxica documentada. La nota al pie actual está permitida, aunque la alternativa principal que la auditoría inglesa preservó fue la literalidad de στρέβλα («potro»), no δεινοί; por eso conviene trasladar la nota a «tortura».
  issues:
  - severity: medium
    issue: La nota al pie está anclada en «consejeros temibles» en vez de reflejar la alternativa literal documentada para τέκνων στρέβλαν.
    rationale: La auditoría inglesa conserva explícitamente como alternativa «the rack of her children». En español, si se mantiene una nota, debe seguir esa misma decisión léxica prioritaria para no desalinear el rastro de auditoría.
  - severity: medium
    issue: «El nacimiento» para γένεσιν resulta menos natural y menos preciso en contexto materno.
    rationale: Aunque no es falso, en una enumeración de presiones internas de una madre suena más idiomático y exacto «el haberlos dado a luz», que expresa el vínculo derivado de haberlos engendrado/traído al mundo.
  - severity: low
    issue: La puntuación y el espaciado de rayas pueden pulirse.
    rationale: «Porque así como, en su propia alma como en una sala de consejo, ...—...—» fluye mejor en español y respeta mejor la puntuación tipográfica estándar.
  revised_spanish_text: Porque así como, en su propia alma como en una sala de consejo, veía consejeros temibles—la naturaleza, el haberlos dado a luz, el amor por sus hijos y la tortura[a] de sus hijos—
  revised_footnotes:
  - marker: a
    text: Más literalmente, «el potro de sus hijos», donde «potro» representa por metonimia la tortura que ellos sufrían.
    reason: lexical_alternative
