translation:
  language: es
  text: Y toda hija que herede una heredad[a] de entre las tribus de los hijos de Israel será esposa de uno de la clan[c] de la tribu de su padre, para que los hijos de Israel hereden cada uno[d] la heredad de sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘que hereda una heredad’ / ‘que está heredando una propiedad’; el participio hebreo puede enfatizar el estado de la hija como heredera.
    reason: lexical_alternative
  - marker: c
    text: O ‘familia de la tribu de su padre’; hebreo מִשְׁפָּחָה designa un grupo de parentesco de nivel clan dentro de la tribu.
    reason: lexical_alternative
  - marker: d
    text: O ‘cada uno herede la heredad de sus padres’.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹרֶשֶׁת
  english_pob_choice: inherits an inheritance
  chosen_spanish: herede una heredad
  alternatives_spanish:
  - esté heredando una heredad
  - reciba una heredad
  lexicon: HALOT
  rationale: El participio expresa el estado de una hija en condición de heredera. En español, ‘herede’ conserva ese valor jurídico de posesión heredada sin sonar tan pesado como una perífrasis continua. ‘Heredad’ mantiene el campo semántico de la posesión territorial heredada.
- source_word: נַחֲלָה
  english_pob_choice: inheritance
  chosen_spanish: heredad
  alternatives_spanish:
  - herencia
  - posesión heredada
  - lote
  lexicon: HALOT
  rationale: En este contexto de tenencia tribal de la tierra, ‘heredad’ comunica mejor la porción heredada y asignada que ‘herencia’ en sentido general. Conserva el trasfondo legal y territorial del hebreo.
- source_word: מִמַּטּוֹת בְּנֵי יִשְׂרָאֵל
  english_pob_choice: from the tribes of the sons of Israel
  chosen_spanish: de entre las tribus de los hijos de Israel
  alternatives_spanish:
  - de las tribus de Israel
  - de entre las tribus de los hijos de Israel
  lexicon: HALOT
  rationale: ‘De entre’ refleja bien el origen dentro del conjunto tribal. Se mantiene ‘los hijos de Israel’ porque el hebreo lo formula así y el audit trail inglés conserva esa forma por fidelidad al texto legal.
- source_word: לְאֶחָד
  english_pob_choice: of one
  chosen_spanish: de uno
  alternatives_spanish:
  - de un hombre
  - de un solo
  lexicon: HALOT
  rationale: La frase introduce al esposo requerido. ‘De uno’ conserva la brevedad y la referencia singular del hebreo; se evita explicitar ‘hombre’ porque el sustantivo no está en el texto base.
- source_word: מִמִּשְׁפַּחַת מַטֵּה אָבִיהָ
  english_pob_choice: from the clan of her father's tribe
  chosen_spanish: de la familia de la tribu de su padre
  alternatives_spanish:
  - de la familia de la tribu paterna
  - de un clan de la tribu de su padre
  lexicon: HALOT
  rationale: ‘Familia’ reproduce la red de parentesco de מִשְׁפָּחָה de manera natural en español, aunque ‘clan’ sería más técnico. Se conserva ‘tribu de su padre’ para respetar la estructura patrilineal del hebreo.
- source_word: תִּהְיֶה לְאִשָּׁה
  english_pob_choice: shall become the wife
  chosen_spanish: será esposa
  alternatives_spanish:
  - será la mujer
  - llegará a ser esposa
  lexicon: HALOT
  rationale: El idiomatismo hebreo ‘ser para mujer/esposa’ se vierte en español con una fórmula breve y jurídica. ‘Será esposa’ mantiene el valor de estado matrimonial sin forzar una paraphrasis demasiado libre.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: HALOT
  rationale: Expresa claramente el propósito legal de la norma en español contemporáneo, con registro formal y natural.
- source_word: יִירְשׁוּ
  english_pob_choice: may each inherit
  chosen_spanish: hereden
  alternatives_spanish:
  - posean
  - reciban en herencia
  lexicon: HALOT
  rationale: Se mantiene la raíz de herencia en español y el sentido distributivo implícito. El valor de ‘cada uno’ en la cláusula cubre la distribución que el inglés POB expresó con ‘each’.
- source_word: אִישׁ
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - cada persona
  lexicon: HALOT
  rationale: En este contexto distributivo, ‘cada uno’ es la forma más natural en español y evita una masculinización innecesaria que el hebreo aquí funciona de modo genérico dentro de la norma legal.
- source_word: נַחֲלַת אֲבֹתָיו
  english_pob_choice: the inheritance of his fathers
  chosen_spanish: la heredad de sus padres
  alternatives_spanish:
  - la herencia de sus padres
  - la heredad ancestral
  lexicon: HALOT
  rationale: ‘Padres’ reproduce el plural patrimonial y patrilineal del hebreo. ‘Heredad’ mantiene la cohesión terminológica con la primera mitad del versículo.
theological_decisions:
- issue: Lenguaje legal patrilineal y distribución de la herencia
  english_pob_reading: Retain the legal structure of the inheritance law without neutralizing the masculine covenantal frame.
  chosen_spanish_reading: Conservar la estructura legal de la ley de herencia sin neutralizar el marco patrilineal del hebreo.
  alternative_spanish_readings:
  - los israelitas hereden cada uno su heredad
  - para que cada uno conserve la herencia de sus antepasados
  rationale: El pasaje regula la transmisión de la heredad dentro de las tribus y familias paternas. Por eso se conserva ‘hijos de Israel’, ‘tribu de su padre’ y ‘sus padres’, en vez de suavizar el patrón hacia formulaciones más abstractas.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Tensión entre ‘familia’ y ‘clan’ para מִשְׁפָּחָה
  english_pob_reading: Or 'family of her father's tribe'; Hebrew mishpachah denotes a clan-level kinship group within the tribe.
  chosen_spanish_reading: ‘Familia’ en el texto principal, con la nota de que puede entenderse como ‘clan’.
  alternative_spanish_readings:
  - clan
  - linaje
  - familia extensa
  rationale: En español ‘clan’ suena técnico pero menos natural para lectura eclesial amplia. ‘Familia’ es más legible; la nota conserva la precisión social de la palabra hebrea.
  doctrine_reference: HALOT; uso contextual de מִשְׁפָּחָה en legislación tribal
translation_notes:
  revision_awareness: El inglés POB fue revisado de ‘possesses an inheritance’ a ‘inherits an inheritance’ y de ‘may each possess’ a ‘may each inherit’. En español se siguió ese ajuste semántico con ‘herede una heredad’ / ‘hereden cada uno la heredad’, manteniendo la consistencia léxica de la herencia territorial. También se evitó traducir mecánicamente desde el inglés cuando el hebreo permitía una formulación más idiomática en español.
  spanish_consistency_notes:
  - Se mantuvo ‘hijos de Israel’ para conservar la forma fuente y la estructura legal del pasaje.
  - Se eligió ‘heredad’ de manera consistente para נַחֲלָה y נַחֲלַת, evitando alternar con ‘herencia’ en el mismo versículo.
  - ‘Familia’ traduce מִשְׁפָּחָה en el texto principal, pero la nota aclara la posibilidad de ‘clan’.
  - El distributivo ‘cada uno’ reproduce el valor de אִישׁ sin añadir masculinidad explícita en la parte final.
  - La redacción intenta sonar natural en español sin perder el registro jurídico del hebreo.
