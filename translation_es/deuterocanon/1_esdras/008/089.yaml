translation:
  language: es
  text: 'Y mientras Esdras oraba y hacía confesión[a], llorando, postrado en tierra delante del templo, se congregó hacia él desde Jerusalén una multitud muy grande: hombres y mujeres y hombres jóvenes[b]; porque había gran llanto entre la multitud.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «daba gracias»; el verbo griego puede llevar ambos sentidos, pero aquí el contexto penitencial favorece «hacía confesión».
    reason: lexical_alternative
  - marker: b
    text: Griego «jóvenes varones»; el término es masculino, no una palabra neutra para jóvenes en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσευχόμενος
  english_pob_choice: was praying
  chosen_spanish: oraba
  alternatives_spanish:
  - estaba orando
  - estaba en oración
  lexicon: BDAG
  rationale: El participio expresa acción simultánea y continua en el relato. «Oraba» es natural en español y conserva el carácter progresivo sin volver la frase pesada.
- source_word: ἀνθωμολογεῖτο
  english_pob_choice: was making confession
  chosen_spanish: hacía confesión
  alternatives_spanish:
  - confesaba
  - daba gracias
  lexicon: LSJ
  rationale: En este contexto penitencial, la acción se entiende mejor como confesión pública, no como acción de gracias. «Hacía confesión» conserva la formalidad y la tensión lexical documentada.
- source_word: κλαίων
  english_pob_choice: weeping
  chosen_spanish: llorando
  alternatives_spanish:
  - sollozando
  - llorando amargamente
  lexicon: BDAG
  rationale: «Llorando» reproduce el lamento solemne del contexto sin añadir intensidad no garantizada por el griego.
- source_word: χαμαιπετής
  english_pob_choice: as he lay prostrate
  chosen_spanish: yacía postrado
  alternatives_spanish:
  - postrado en tierra
  - tendido en el suelo
  lexicon: LSJ
  rationale: El adjetivo señala una postura de humillación corporal sobre el suelo. «Yacía postrado» comunica bien esa idea en español digno y claro.
- source_word: ἔμπροσθεν τοῦ ἱεροῦ
  english_pob_choice: before the temple
  chosen_spanish: delante del templo
  alternatives_spanish:
  - ante el templo
  - frente al templo
  lexicon: BDAG
  rationale: «Templo» es la equivalencia más natural para ἱερόν en este contexto del complejo sagrado. «Delante de» preserva la ubicación frontal sin forzar tecnicismos.
- source_word: ἐπισυνήχθησαν πρὸς αὐτόν
  english_pob_choice: gathered to him
  chosen_spanish: se reunió con él
  alternatives_spanish:
  - se congregó junto a él
  - se juntó con él
  lexicon: BDAG
  rationale: La forma pasiva con dirección προς puede expresarse con un movimiento colectivo hacia Esdras. En español, la construcción impersonal/pasiva refleja bien la idea de converger hacia él.
- source_word: ὄχλος πολὺς σφόδρα
  english_pob_choice: a very great crowd
  chosen_spanish: una multitud muy grande
  alternatives_spanish:
  - una multitud enorme
  - un gentío muy grande
  lexicon: BDAG
  rationale: La doble intensificación se conserva con una expresión idiomática y sobria en español. «Multitud» mantiene el registro elevado del relato.
- source_word: νεανίαι
  english_pob_choice: young men
  chosen_spanish: jóvenes varones
  alternatives_spanish:
  - jóvenes hombres
  - muchachos
  lexicon: LSJ
  rationale: El griego es masculino; no conviene neutralizarlo. «Jóvenes varones» preserva la precisión de género y la referencia etaria.
- source_word: κλαυθμὸς
  english_pob_choice: weeping
  chosen_spanish: gran llanto
  alternatives_spanish:
  - gran lamento
  - mucho llanto
  lexicon: BDAG
  rationale: El sustantivo denota duelo audible. «Gran llanto» mantiene la repetición semántica con «llorando» y suena natural en español.
- source_word: ἐν τῷ πλήθει
  english_pob_choice: among the multitude
  chosen_spanish: entre la multitud
  alternatives_spanish:
  - en medio de la multitud
  - dentro de la multitud
  lexicon: BDAG
  rationale: «Entre la multitud» conserva el sentido colectivo sin perder fluidez narrativa.
theological_decisions:
- issue: Sentido de ἀνθωμολογεῖτο en un contexto penitencial
  english_pob_reading: confessional language ('making confession')
  chosen_spanish_reading: 'lenguaje confesional («hacía confesión»)

    '
  alternative_spanish_readings:
  - lenguaje de alabanza o acción de gracias («daba gracias»)
  rationale: Aunque el verbo puede significar dar gracias o alabar en otros contextos, aquí la oración, las lágrimas y la postura postrada favorecen la confesión de culpa. La traducción debe conservar esa tensión y no resolverla hacia un sentido litúrgico de gratitud.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
- issue: Valor de νεανίαι como grupo masculino
  english_pob_reading: ‘young men’
  chosen_spanish_reading: «jóvenes varones»
  alternative_spanish_readings:
  - «jóvenes»
  - «muchachos»
  rationale: El griego es masculino y el contexto enumera grupos demográficos distintos. No se debe neutralizar el género donde el texto lo marca con claridad.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Terminología del templo para ἱερόν
  english_pob_reading: ‘temple’
  chosen_spanish_reading: «templo»
  alternative_spanish_readings:
  - «santuario»
  - «recinto del templo»
  rationale: ἱερόν suele designar el complejo del templo más que solo el interior sagrado. «Templo» es amplio, fiel y comprensible para el lector en español.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
translation_notes:
  revision_awareness: El borrador sigue el anclaje griego como fuente primaria y se ajusta al audit trail inglés sin depender mecánicamente de él. No se identificaron revisiones aplicadas en el historial; el pasaje quedó estable en la última pasada, con acuerdo alto y solo observaciones menores. Se mantuvo la tensión lexical de ἀνθωμολογεῖτο y la precisión de género en νεανίαι.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se conserva un registro bíblico sobrio y legible, evitando calcos innecesarios.
  - «Templo» se usa como término amplio para ἱερόν, no como ‘santuario’ interior.
  - «Jóvenes varones» evita neutralización del masculino griego.
  - La duplicación de llanto/confesión se mantiene para reflejar la acumulación expresiva del griego.
