translation:
  language: es
  text: Todo hombre[a] prudente ha reconocido la sabiduría, y elogiará al que la halló.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Todo hombre prudente ha reconocido la sabiduría, y elogiará al que la halló». El griego usa un término masculino singular para la persona discerniente y un pronombre femenino para la sabiduría.'
    reason: alternative_reading
lexical_decisions:
- source_word: πᾶς
  english_pob_choice: Every
  chosen_spanish: Todo
  alternatives_spanish:
  - Cada
  - Todo hombre
  lexicon: LSJ
  rationale: El valor distributivo del griego se expresa con naturalidad en español con «Todo», sin forzar una pluralización que no está en el texto.
- source_word: συνετὸς
  english_pob_choice: prudent man
  chosen_spanish: hombre prudente
  alternatives_spanish:
  - persona prudente
  - hombre entendido
  - hombre sensato
  lexicon: LSJ
  rationale: συνετός denota discernimiento o sensatez práctica; «prudente» conserva ese matiz. Se mantiene el masculino singular representativo porque el griego lo usa así.
- source_word: ἔγνω
  english_pob_choice: has recognized
  chosen_spanish: ha reconocido
  alternatives_spanish:
  - conoció
  - ha conocido
  - llegó a conocer
  lexicon: LSJ
  rationale: El aoristo de γινώσκω aquí comunica un reconocimiento ya realizado; «ha reconocido» refleja bien esa acción completada.
- source_word: σοφίαν
  english_pob_choice: wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - sabiduría
  lexicon: LSJ
  rationale: Correspondencia directa y natural; el artículo definido ayuda a la fluidez en español sin añadir contenido.
- source_word: τῷ εὑρόντι
  english_pob_choice: the one who found
  chosen_spanish: al que la halló
  alternatives_spanish:
  - al que la encontró
  - a quien la halló
  - al que la encontró
  lexicon: LSJ
  rationale: La construcción con participio sustantivado se vierte de forma natural como una relativa. «Halló» mantiene un registro digno y bíblico; el pronombre retoma a «sabiduría».
- source_word: αὐτὴν
  english_pob_choice: her
  chosen_spanish: la
  alternatives_spanish:
  - a ella
  - la
  lexicon: LSJ
  rationale: En español, para evitar una personificación excesivamente explícita donde no es necesaria, el referente femenino queda claro con el pronombre átono «la»; conserva la referencia a σοφία, femenina en griego.
- source_word: δώσει
  english_pob_choice: he will give
  chosen_spanish: le dará
  alternatives_spanish:
  - dará
  - le dará
  lexicon: LSJ
  rationale: El futuro se expresa de modo directo. El dativo permite «le dará», que suena natural y mantiene el orden relacional del griego.
- source_word: ἐξομολόγησιν
  english_pob_choice: praise
  chosen_spanish: alabanza
  alternatives_spanish:
  - praise pública
  - acción de gracias
  - reconocimiento
  lexicon: LSJ
  rationale: En este contexto el término apunta más a elogio/elogio agradecido que a confesión. «Alabanza» es el equivalente español más idiomático y fiel en una frase con «dar».
theological_decisions:
- issue: Representación masculina del sujeto humano
  english_pob_reading: Retain 'man' for συνετὸς and 'her' for wisdom
  chosen_spanish_reading: 'Conservar el masculino singular representativo: «hombre prudente»'
  alternative_spanish_readings:
  - Toda persona prudente
  - Quien es prudente
  rationale: El griego usa un adjetivo masculino singular de manera sustantiva; traducirlo como masculino representativo preserva la forma del texto y su economía expresiva. No se neutraliza sin necesidad.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #4'
- issue: Referencia femenina de la sabiduría
  english_pob_reading: wisdom is rendered with feminine pronoun 'her'
  chosen_spanish_reading: Mantener el femenino implícito en «la sabiduría» y retomar con «la»
  alternative_spanish_readings:
  - retener 'ella' explícitamente
  - usar 'her' would be 'ella'
  rationale: El griego personifica σοφία con pronombre femenino. En español, «la sabiduría» ya es femenina; el pronombre átono «la» conserva la referencia sin recargar el verso con una repetición enfática que el griego no exige.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #4'
- issue: ἐξομολόγησιν como respuesta al hallazgo de la sabiduría
  english_pob_reading: praise
  chosen_spanish_reading: alabanza
  alternative_spanish_readings:
  - acción de gracias
  - reconocimiento
  - confesión
  rationale: Aquí el contexto favorece elogio o reconocimiento agradecido, no confesión de pecados. «Alabanza» es el término español más natural y fiel a esa valoración pública.
  doctrine_reference: LSJ; contexto sapiencial de Sirácides
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego de Swete: πᾶς συνετός se vierte con valor distributivo y masculino singular representativo; ἔγνω se entiende como reconocimiento ya realizado; la segunda cláusula conserva el orden relacional del original, de modo que la alabanza recae sobre el que halló la sabiduría. Se evita una traducción mecánica del inglés, pero se aprovecha su auditoría para mantener la decisión sobre ἐξομολόγησιν como ''alabanza'' y la tensión de género en σοφία.'
  spanish_consistency_notes:
  - Se usa «sabiduría» para σοφία de manera consistente con el registro sapiencial.
  - Se mantiene «hombre prudente» como masculino representativo, coherente con la política de traducir el sujeto gramatical del griego cuando este es explícitamente masculino.
  - El pronombre «la» para la sabiduría preserva su referencia femenina sin introducir una personificación más fuerte de la requerida por el texto.
  - «Alabanza» refleja el sentido contextual de ἐξομολόγησιν en una estructura natural de español con «dar».
