    text: O «tres brazos del candelabro del otro lado».
    reason: lexical_alternative
  revision_rationale: Se mantiene el sentido y la estructura del hebreo, así como las decisiones léxicas principales («brazos», «candelabro»), pero se corrige la sintaxis de «su un lado» a «uno de sus lados» para lograr un español natural, claro y digno. También se ajusta la nota alternativa para que coincida con la redacción revisada y no repita una construcción impropia.
