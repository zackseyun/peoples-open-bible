translation:
  language: es
  text: ¿No sois vosotros para mí como los cusitas[a], oh hijos de Israel? —declara Yahvé—. ¿No hice subir a Israel de la tierra de Egipto, y a los filisteos de Caftor[b], y a Aram[c] de Quir?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como los etíopes»; «cusitas» traduce el hebreo «Cushitas», nombre del pueblo de Cus.
    reason: lexical_alternative
  - marker: b
    text: Caftor es un nombre de lugar asociado tradicionalmente por muchos con Creta, aunque su identificación exacta es debatida.
    reason: cultural_note
  - marker: c
    text: O «los arameos de Quir».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלוֹא
  english_pob_choice: Are ... not / Did ... not
  chosen_spanish: ¿No sois ...? / ¿No hice ...?
  alternatives_spanish:
  - ¿Acaso no sois ...? / ¿Acaso no hice ...?
  - ¿No son ...? / ¿No saqué ...?
  lexicon: HALOT
  rationale: La partícula retórica pide una respuesta afirmativa y se expresa naturalmente en español con preguntas introducidas por «¿No...?»; en la segunda cláusula, «¿No hice subir...?» conserva el valor interrogativo y el paralelo verbal.
- source_word: כִּבְנֵי כֻשִׁיִּים
  english_pob_choice: like the Cushites
  chosen_spanish: como los cusitas
  alternatives_spanish:
  - como los etíopes
  - como hijos de cusitas
  lexicon: HALOT
  rationale: «Cusitas» translitera el etnónimo hebreo con mayor fidelidad que «etíopes», que desplaza el referente a una designación posterior o más geográfica. El contexto compara a Israel con ese pueblo sin resolver la identificación histórica más allá del término hebreo.
- source_word: אַתֶּם לִי
  english_pob_choice: are you ... to me
  chosen_spanish: sois vosotros para mí
  alternatives_spanish:
  - estáis vosotros para mí
  - sois ustedes para mí
  lexicon: HALOT
  rationale: La preposición לִי expresa relación desde la perspectiva de Yahvé; «para mí» preserva esa orientación directa. «Sois vosotros» mantiene la segunda persona plural del hebreo y la fuerza retórica del reproche.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: O sons of Israel
  chosen_spanish: oh hijos de Israel
  alternatives_spanish:
  - oh hijos de Israel
  - oh pueblo de Israel
  - oh hijos de Israel
  lexicon: HALOT
  rationale: Se conserva el vocativo y el valor nacional del hebreo. «Hijos» reproduce el sustantivo masculino plural del original, mientras «oh» da una apertura profética natural en español.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - —dice Yahvé—
  - —oráculo de Yahvé—
  lexicon: HALOT
  rationale: Se mantiene la fórmula profética con el nombre divino en la forma editorial del proyecto, «Yahvé», en vez de sustituirla por «SEÑOR». «Declara» conserva el tono solemne del hebreo נְאֻם.
- source_word: הֶעֱלֵיתִי
  english_pob_choice: bring up
  chosen_spanish: hice subir
  alternatives_spanish:
  - saqué
  - levanté
  lexicon: HALOT
  rationale: El causativo de עלה se vierte de manera directa con «hice subir», que sirve para Egipto y también para los otros paralelos sin cambiar de verbo en la serie.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de la tierra de Egipto
  - de Egipto
  lexicon: HALOT
  rationale: Se conserva el sustantivo «tierra», porque el hebreo lo explicita y forma parte del paralelismo formal de la línea.
- source_word: פְלִשְׁתִּיִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los filisteos
  lexicon: HALOT
  rationale: Ethnónimo estándar y transparente en español.
- source_word: כַּפְתּוֹר
  english_pob_choice: Caphtor
  chosen_spanish: Caftor
  alternatives_spanish:
  - Caphtor
  lexicon: HALOT
  rationale: Se translitera el nombre propio con una forma castellana habitual («Caftor») para una lectura más fluida, sin resolver la identificación geográfica debatida.
- source_word: אֲרָם
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - Siria
  - los arameos
  lexicon: HALOT
  rationale: Se preserva el nombre propio hebreo «Aram», evitando imponer «Siria» como equivalencia geopolítica posterior. En este contexto el nombre funciona como designación histórica o étnica.
- source_word: קִיר
  english_pob_choice: Kir
  chosen_spanish: Quir
  alternatives_spanish:
  - Kir
  lexicon: HALOT
  rationale: Se traduce el topónimo con adaptación gráfica española («Quir») para facilitar la pronunciación sin alterar el nombre propio.
theological_decisions:
- issue: Comparación de Israel con los cusitas
  english_pob_reading: The verse states that Israel enjoys no automatic privileged status before the LORD merely by ethnicity or exodus tradition.
  chosen_spanish_reading: El verso relativiza cualquier pretensión de privilegio automático de Israel delante de Yahvé por su etnicidad o por la tradición del éxodo.
  alternative_spanish_readings:
  - La comparación solo trata del desplazamiento geográfico, no del estatus delante de Dios.
  rationale: La pregunta retórica «¿No sois vosotros para mí como los cusitas?» y la mención de otros pueblos llevados desde distintos lugares sostienen una comparación que no debe suavizarse. La redacción española conserva esa tensión sin explicitar más de lo que el texto dice.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: Fórmula profética con el nombre divino
  english_pob_reading: declares Yahweh
  chosen_spanish_reading: declara Yahvé
  alternative_spanish_readings:
  - dice Yahvé
  - oráculo de Yahvé
  rationale: El texto hebreo cierra con una fórmula de declaración profética; el español mantiene el peso formal de la proclamación y el nombre divino conforme a la convención del proyecto.
  doctrine_reference: Project terminology default for יהוה
- issue: Valor de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: O sons of Israel
  chosen_spanish_reading: oh hijos de Israel
  alternative_spanish_readings:
  - oh pueblo de Israel
  - oh hijos de Israel
  rationale: Se conserva el masculino plural del hebreo en la designación nacional, sin neutralizarlo en la forma principal, de acuerdo con la política del proyecto.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: 'Se incorporó la corrección solicitada: el marcador [a] aparece ahora anclado en el texto español. La redacción mantiene la estructura retórica, el paralelismo verbal y la toponimia transliterada conforme al expediente inglés y al hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה según el estándar del proyecto.
  - Se conserva «cusitas» en lugar de «etíopes» para no desplazar el etnónimo hebreo.
  - Se mantiene la serie verbal uniforme «hice subir» para el paralelismo de Egipto, Filistea y Aram.
  - 'Los topónimos se presentan con grafía española legible: «Caftor» y «Quir».'
  - La puntuación con rayas refuerza la fórmula profética sin añadir contenido interpretativo.
