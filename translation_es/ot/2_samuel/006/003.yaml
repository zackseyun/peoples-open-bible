translation:
  language: es
  text: Pusieron el arca de Dios sobre un carro nuevo y la trajeron de la casa de Abinadab[a], que estaba en la colina; y Uza y Ahío, hijos de Abinadab, conducían el carro nuevo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que estaba en Guibeá», tomando la frase como un nombre de lugar en vez de una descripción topográfica.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּרְכִּבוּ
  english_pob_choice: They set ... on
  chosen_spanish: Pusieron ... sobre
  alternatives_spanish:
  - montaron ... sobre
  - cargaron ... sobre
  lexicon: HALOT
  rationale: El causativo de רכב expresa hacer subir o colocar sobre algo. En español, «pusieron ... sobre» comunica la acción concreta sin sugerir que el arca iba montada como un jinete ni que fue cargada a mano.
- source_word: אֲרוֹן הָאֱלֹהִים
  english_pob_choice: the ark of God
  chosen_spanish: el arca de Dios
  alternatives_spanish:
  - el cofre de Dios
  lexicon: HALOT
  rationale: «Arca» es el equivalente estable para el objeto sagrado en este contexto y preserva el referente bíblico tradicional sin perder precisión.
- source_word: אֶל עֲגָלָה חֲדָשָׁה
  english_pob_choice: on a new cart
  chosen_spanish: sobre un carro nuevo
  alternatives_spanish:
  - en un carro nuevo
  - sobre un carro recién hecho
  lexicon: HALOT
  rationale: Aunque אֶל puede ser literalmente «a/ hacia/ sobre», en esta construcción de colocación el español natural es «sobre». «Carro» transmite bien עֲגָלָה en un registro bíblico claro y moderno.
- source_word: וַיִּשָּׂאֻהוּ
  english_pob_choice: brought it
  chosen_spanish: la trajeron
  alternatives_spanish:
  - la llevaron
  - la transportaron
  lexicon: HALOT
  rationale: El verbo נשא puede significar llevar, cargar o traer según el contexto. Como el arca iba en el carro, «la trajeron» evita la idea de llevarla manualmente y sigue de cerca la revisión inglesa más reciente.
- source_word: מִבֵּית אֲבִינָדָב
  english_pob_choice: from the house of Abinadab
  chosen_spanish: de la casa de Abinadab
  alternatives_spanish:
  - de la casa de Abinadab
  lexicon: HALOT
  rationale: Se mantiene la estructura posesiva sencilla del hebreo; en español, «de la casa de» es la forma más transparente y natural.
- source_word: אֲשֶׁר בַּגִּבְעָה
  english_pob_choice: which was on the hill
  chosen_spanish: que estaba en el cerro[a]
  alternatives_spanish:
  - que estaba en la colina[a]
  - que estaba en Gueba[a]
  lexicon: HALOT
  rationale: 'La lectura principal sigue el valor topográfico: la casa estaba ubicada en una elevación. «Cerro» es una opción natural en español y evita una transliteración innecesaria en el texto principal.'
- source_word: וְעֻזָּא וְאַחְיוֹ
  english_pob_choice: and Uzzah and Ahio
  chosen_spanish: y Uza y Ahío
  alternatives_spanish:
  - y Uzzá y Ahío
  lexicon: HALOT
  rationale: Se transliteran los nombres propios de forma simple y readable para el español. «Uza» sigue el uso corriente de este nombre en traducciones castellanas modernas, sin forzar una forma litúrgica.
- source_word: בְּנֵי אֲבִינָדָב
  english_pob_choice: the sons of Abinadab
  chosen_spanish: hijos de Abinadab
  alternatives_spanish:
  - descendientes de Abinadab
  lexicon: HALOT
  rationale: El plural constructo indica literalmente hijos; no hay presión contextual para ampliar a «descendientes», así que se conserva la relación familiar directa.
- source_word: נֹהֲגִים
  english_pob_choice: were driving
  chosen_spanish: guiaban
  alternatives_spanish:
  - conducían
  - dirigían
  lexicon: HALOT
  rationale: El participio de נהג puede referirse a conducir o guiar un vehículo/animales. En español, «guiaban» expresa la función de dirigir el carro de manera natural y sin sonoridad demasiado técnica.
- source_word: הָעֲגָלָה חֲדָשָׁה
  english_pob_choice: the new cart
  chosen_spanish: el carro nuevo
  alternatives_spanish:
  - el carro recién hecho
  - la carreta nueva
  lexicon: HALOT
  rationale: Se conserva la repetición de «nuevo» para reflejar el énfasis narrativo del hebreo y mantener consistencia con la primera mención del vehículo.
theological_decisions:
- issue: 'אֲשֶׁר בַּגִּבְעָה: lectura topográfica o nombre de lugar'
  english_pob_reading: which was on the hill, with a footnote allowing 'which was at Gibeah'
  chosen_spanish_reading: que estaba en el cerro, con nota que permite 'que estaba en Gueba'
  alternative_spanish_readings:
  - que estaba en Gueba
  - que estaba en la colina
  rationale: El hebreo admite una lectura descriptiva del lugar o una identificación toponímica. Se deja la lectura topográfica en el texto principal, como hace el POB inglés, y se preserva la alternativa como nota para no borrar la ambigüedad del original.
  doctrine_reference: Principio de transparencia textual y preservación de variantes de lectura
- issue: 'וַיִּשָּׂאֻהוּ: ''carry'' versus ''bring'' en relación con el arca sobre un carro'
  english_pob_reading: brought it
  chosen_spanish_reading: la trajeron
  alternative_spanish_readings:
  - la llevaron
  - la transportaron
  rationale: Dado que el arca iba colocada sobre un carro, traducir con un verbo de porte manual podría inducir una imagen incorrecta. «La trajeron» comunica el desplazamiento total sin imponer una forma específica de carga.
  doctrine_reference: Precisión semántica y coherencia narrativa
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que sustituyó 'carried it' por 'brought it' para evitar la impresión de carga manual. La versión española adopta una solución equivalente con «la trajeron». También se preserva la nota alternativa sobre בַּגִּבְעָה, siguiendo la línea auditada del POB inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo contiene «Dios» y no el tetragrama.
  - Se usa «arca» como término técnico bíblico estable.
  - 'Los nombres propios se transliteran de forma consistente y sobria: Uza, Ahío, Abinadab.'
  - Se conserva la repetición de «nuevo» para reflejar el énfasis del hebreo.
  - La nota al pie se ancla en «cerro[a]» para señalar la alternativa de lectura sin sobrecargar el texto principal.
