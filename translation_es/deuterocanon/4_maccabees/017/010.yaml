translation:
  language: es
  text: Estos también reivindicaron a la nación[a], mirando a Dios y soportando tormentos incluso hasta la muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'vengaron a la nación' o 'hicieron justicia a la nación'. El verbo griego puede tener fuerza judicial o retributiva; aquí el contexto del martirio favorece el sentido de vindicación ante Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἳ καὶ
  english_pob_choice: These also
  chosen_spanish: Estos también
  alternatives_spanish:
  - ellos también
  - quienes también
  lexicon: LSJ
  rationale: Conserva el valor aditivo de καί y sigue el hilo discursivo de manera natural en español con un demostrativo plural.
- source_word: ἐξεδίκησαν
  english_pob_choice: vindicated
  chosen_spanish: vindicaron
  alternatives_spanish:
  - vengaron
  - hicieron justicia a
  - defendieron
  lexicon: LSJ
  rationale: En este contexto martirial, el verbo no debe empujar a una idea de represalia violenta; 'vindicaron' conserva la fuerza judicial/de reivindicación reconocida por el audit trail inglés.
- source_word: τὸ ἔθνος
  english_pob_choice: the nation
  chosen_spanish: la nación
  alternatives_spanish:
  - el pueblo
  - la raza
  lexicon: LSJ
  rationale: Mantiene el sentido colectivo y nacional del sustantivo griego para el pueblo judío, sin diluirlo en un genérico menos preciso.
- source_word: εἰς θεὸν ἀφορῶντες
  english_pob_choice: looking to God
  chosen_spanish: mirando a Dios
  alternatives_spanish:
  - fijando la mirada en Dios
  - mirando hacia Dios
  lexicon: LSJ
  rationale: ἀφοράω con εἰς expresa dirigir la atención hacia; 'mirando a Dios' es idiomático en español y preserva la orientación de confianza sin añadir matices no explicitados.
- source_word: τὰς βασάνους
  english_pob_choice: torments
  chosen_spanish: tormentos
  alternatives_spanish:
  - torturas
  - sufrimientos
  lexicon: LSJ
  rationale: En este marco de martirio, βασάνους señala padecimientos infligidos con severidad; 'tormentos' conserva la intensidad con un registro formal natural en español.
- source_word: ὑπομείναντες
  english_pob_choice: enduring
  chosen_spanish: soportando
  alternatives_spanish:
  - habiendo soportado
  - perseverando bajo
  lexicon: LSJ
  rationale: El participio expresa resistencia sostenida; 'soportando' comunica la perseverancia continua unida a la frase anterior en un español fluido.
theological_decisions:
- issue: Sentido de ἐξεδίκησαν en un contexto de martirio
  english_pob_reading: Their deaths 'vindicated' the nation before God.
  chosen_spanish_reading: Su padecimiento 'vindicó' a la nación ante Dios.
  alternative_spanish_readings:
  - Su padecimiento 'vengó' a la nación.
  - Su padecimiento 'hizo justicia a' la nación.
  rationale: La secuencia inmediata habla de fidelidad y sufrimiento hasta la muerte, no de violencia retributiva; por eso se conserva la idea de vindicación/reivindicación ante Dios y se evita una lectura de venganza que el contexto no exige.
  doctrine_reference: 'Translation philosophy: preserve source sense over traditional inertia; avoid importing retaliatory connotations unsupported by the martyrdom context.'
translation_notes:
  revision_awareness: El texto sigue el acuerdo alto del audit trail inglés y conserva la decisión revisada de unir 'mirando a Dios y soportando tormentos hasta la muerte' sin coma intermedia, para reflejar con mayor fluidez la coordinación griega. También refleja la última preferencia por 'tormentos' como equivalente formal natural de βασάνους.
  spanish_consistency_notes:
  - Se usa 'Dios' en lugar de una forma velada del nombre divino, porque el griego aquí dice θεὸν sin citar el Tetragrámaton.
  - '''Vindicaron'' se mantiene para no perder la tensión lexical entre vindicación judicial y posible retribución señalada por el aparato inglés.'
  - '''Tormentos'' conserva el registro martirial y evita suavizar βάσανοι en ''sufrimientos''.'
