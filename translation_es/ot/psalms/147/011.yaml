review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: רוֹצֶה = agrado favorable, יְהוָה = Yahvé, יְרֵאָיו = los que le temen, y הַמְיַחֲלִים לְחַסְדּוֹ = los que esperan/ponen su esperanza en su חסד. Sin embargo, el aparato de notas está desanclado y parcialmente invertido respecto a los términos fuente: la nota [a] se coloca sobre «le temen» pero habla de «esperan en él», y la nota [b] se coloca sobre «esperan» pero explica hesed, que corresponde a «amor leal».'
  spanish_quality_summary: 'El español principal es claro, natural y digno. «Yahvé se complace en los que le temen, en los que esperan su amor leal» suena bien en español eclesial general. La reparación necesaria es técnica y de legibilidad editorial: reubicar las notas para que cada marcador explique la palabra o frase correcta, y ajustar la nota alternativa para que no introduzca un objeto distinto de forma confusa.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé»; temor preservado como «temen»; חסד representado como «amor leal», una opción válida para el valor pactual. No hay conflicto doctrinal. La única corrección requerida es la correspondencia exacta entre marcadores y términos comentados.'
  issues:
  - severity: medium
    issue: Los marcadores de las notas al pie están anclados a frases incorrectas.
    rationale: La nota [a] está colocada en «le temen» pero su contenido trata del verbo הַמְיַחֲלִים («esperan/esperan con esperanza»). La nota [b] está colocada en «esperan» pero su contenido define חסד («amor leal»). Esto dificulta la lectura y no cumple la disciplina de anclar cada nota a la palabra o frase pertinente.
  - severity: low
    issue: La nota alternativa de [a] propone «los que esperan en él», que no refleja con precisión el objeto explícito del hebreo en esta cláusula.
    rationale: El hebreo dice לְחַסְדּוֹ, es decir, el objeto de la esperanza/espera es «su amor leal». La alternativa correcta debe conservar ese objeto, por ejemplo «los que esperan en su amor leal» o una formulación equivalente.
  revised_spanish_text: Yahvé se complace en los que le temen, en los que esperan[a] su amor leal[b].
