translation:
  language: es
  text: En aquel tiempo, el rey Acaz envió a pedir ayuda a los reyes de Asiria[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los reyes de Asiria»; algunas traducciones leen «el rey de Asiria» para armonizar con la situación histórica.'
    reason: alternative_reading
lexical_decisions:
- source_word: בָּעֵת הַהִיא
  english_pob_choice: At that time
  chosen_spanish: En aquel tiempo
  alternatives_spanish:
  - En ese tiempo
  - Entonces
  lexicon: HALOT
  rationale: La expresión temporal hebrea es una fórmula narrativa estándar. 'En aquel tiempo' conserva el valor situacional sin sonar forzado en español.
- source_word: שָׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - mandó a decir
  lexicon: HALOT
  rationale: El verbo simplemente indica que Acaz envió; 'envió' es transparente y no añade explícitamente mensajeros, como tampoco lo hace el hebreo.
- source_word: הַמֶּלֶךְ אָחָז
  english_pob_choice: King Ahaz
  chosen_spanish: el rey Acaz
  alternatives_spanish:
  - el rey Ahaz
  - Acaz, el rey
  lexicon: HALOT
  rationale: El título y el nombre propio se reproducen de forma natural en español como 'el rey Acaz', manteniendo la apposición del hebreo.
- source_word: עַל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - contra
  lexicon: HALOT
  rationale: Con שׁלח, עַל puede marcar dirección o destinatario de la acción. En español, 'a' comunica el destinatario de la petición sin introducir la idea de oposición.
- source_word: מַלְכֵי אַשּׁוּר
  english_pob_choice: the kings of Assyria
  chosen_spanish: los reyes de Asiria
  alternatives_spanish:
  - el rey de Asiria
  - los reyes asirios
  lexicon: HALOT
  rationale: Se conserva el plural del texto hebreo en la traducción principal. Aunque otras versiones armonizan al singular, el POB inglés retuvo el plural por fidelidad al hebreo; en español se mantiene esa tensión textual.
- source_word: לַעְזֹר לוֹ
  english_pob_choice: for help
  chosen_spanish: para que lo ayudaran
  alternatives_spanish:
  - para ayudarlo
  - en busca de ayuda
  lexicon: HALOT
  rationale: El infinitivo con sufijo expresa finalidad. 'Para que lo ayudaran' refleja bien el propósito implícito y evita una construcción menos natural como 'para ayuda'.
theological_decisions:
- issue: Pluralidad de 'los reyes de Asiria' frente a la forma históricamente esperable en singular
  english_pob_reading: Retain the Masoretic plural in the main text
  chosen_spanish_reading: Conservar el plural en el texto principal
  alternative_spanish_readings:
  - el rey de Asiria
  rationale: No es una diferencia doctrinal, pero sí una decisión textual relevante. La versión española sigue el hebreo masorético y deja constancia de la posible armonización al singular en la nota.
  doctrine_reference: Filosofía de traducción §1, §5
translation_notes:
  revision_awareness: 'La redacción española sigue el ajuste final del POB en inglés: se prefiere una expresión natural de finalidad (''para que lo ayudaran'') en vez de una formulación más pesada, sin perder la referencia al objeto plural del hebreo.'
  spanish_consistency_notes:
  - Se conservó Asiria como topónimo estándar en español.
  - Se mantuvo el plural 'los reyes' por transparencia textual.
  - El registro es bíblico-formal, pero con sintaxis natural para lectura pública.
