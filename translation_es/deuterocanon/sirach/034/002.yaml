- from: Como el que se apodera de una sombra y persigue el viento[a], así es el que se aferra a los sueños.
  to: Como el que agarra una sombra y persigue el viento[a], así es el que se aferra a los sueños.
  rationale: Se reemplaza «se apodera de» por «agarra» para reflejar mejor δρασσόμενος como acto de asir/agarrar, sin implicar posesión conseguida. Se mantiene el resto, que es fiel, claro y coherente con el POB inglés y la nota léxica.
