review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: ὥστε καὶ = «de modo que incluso»; χορηγεῖν = provisión financiera habitual; ἐκ τῶν ἰδίων προσόδων = «de sus propias rentas»; y mantiene el título «rey de Asia» con nota cultural adecuada. Sin embargo, «los gastos que incumbían a los ministerios de los sacrificios» suena poco natural en español y desplaza la relación semántica: los gastos no «incumben a los ministerios», sino que corresponden o se requieren para ellos. El griego πάντα τὰ ... ἐπιβάλλοντα δαπανήματα apunta a todos los gastos implicados/requeridos para esos servicios sacrificiales.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero la combinación «incumbían a los ministerios» resulta dura y poco idiomática. «Proveer» es aceptable, aunque «costear» o «cubrir» podría sonar más financiero; no obstante, no es necesario cambiarlo. Conviene suavizar la construcción central para que la frase sea natural y fiel: «todos los gastos requeridos para los ministerios de los sacrificios».'
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. «Ministerios» sigue la decisión auditada del POB inglés para λειτουργίαι en registro formal, aunque «servicios» también sería posible. «Asia» y «Seleuco» están bien manejados con nota cultural y variante onomástica.
  issues:
  - severity: medium
    issue: Construcción española poco natural en «los gastos que incumbían a los ministerios»
    rationale: En español, «incumbir» normalmente toma como sujeto la responsabilidad u obligación de una persona o entidad, no de unos gastos respecto de unos ministerios. La frase suena forzada y puede confundir la relación entre δαπανήματα y λειτουργίαι.
  - severity: low
    issue: La nota a sobre «Séleuco» es opcional y no exigida por el griego ni por el inglés
    rationale: No es incorrecta, pero la variante acentual no parece necesaria como nota léxica si el texto principal ya usa una forma normal en español. Puede mantenerse sin problema si se desea preservar la alternativa.
  revised_spanish_text: de modo que incluso Seleuco[a], rey de Asia[b], solía proveer, de sus propias rentas, todos los gastos requeridos para los ministerios de los sacrificios.
