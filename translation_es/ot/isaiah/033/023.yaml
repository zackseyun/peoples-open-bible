    issue: נֵס fue traducido como 'la enseña' en el texto principal.
    rationale: La auditoría inglesa documenta que, aunque el término suele significar 'bandera/estandarte', aquí se eligió 'sail' precisamente porque encaja con la imagen del barco. El español debe preservar esa misma decisión fuente-sensible en el texto principal y relegar la alternativa más literal a nota.
  - severity: medium
    issue: La nota [b] no refleja exactamente la relación principal/alternativa del POB inglés.
    rationale: 'La nota actual deja ''bandera/enseña'' como alternativa, pero el texto principal ya usa ''enseña''. Debe invertirse: texto principal ''vela'', nota con la alternativa ''bandera/enseña''.'
  - severity: low
    issue: '''saquearán el despojo'' suena algo pesado en español.'
    rationale: El hebreo בָּזְזוּ בַז intensifica la idea de tomar botín, pero en español una formulación más idiomática como 'se llevarán el botín' comunica mejor el sentido sin perder fuerza.
