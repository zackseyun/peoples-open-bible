translation:
  language: es
  text: Y Ozías envió mensajeros a Betomesthaim, a Choba y a Chola[a], y a todo el territorio de Israel, para anunciar lo que había sucedido, y para que todos salieran en masa contra los enemigos para destruirlos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, el griego dice «para que todos fueran derramados contra los enemigos», una imagen idiomática de salir o lanzarse en masa al ataque.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: BDAG
  rationale: «Envió» reproduce con naturalidad el verbo narrativo de envío sin añadir matiz de autoridad o urgencia que el contexto no exige explícitamente.
- source_word: Ὀζίας
  english_pob_choice: Uzziah
  chosen_spanish: Ozías
  alternatives_spanish:
  - Uzijas
  - Uzías
  lexicon: transliteración tradicional hispana
  rationale: En español bíblico, la forma «Ozías» es clara y reconocible; mantiene la identidad del nombre propio sin adoptar una forma litúrgica distinta.
- source_word: Βαιτομασθαΐμ
  english_pob_choice: Bethomesthaim
  chosen_spanish: Betomesthaim
  alternatives_spanish:
  - Baitomastém
  - Bethomasthaim
  lexicon: transliteración directa del griego
  rationale: Se conserva una transliteración cercana al griego de Swete, ya que la forma exacta tradicional es incierta y el objetivo es reflejar el texto fuente de manera auditable.
- source_word: Χωβὰι
  english_pob_choice: Choba
  chosen_spanish: Choba
  alternatives_spanish:
  - Chobai
  - Hobai
  lexicon: transliteración directa del griego
  rationale: La forma española sigue de cerca la transliteración inglesa/auditada y el griego, preservando la incertidumbre tradicional del topónimo.
- source_word: Χωλὰ
  english_pob_choice: Chola
  chosen_spanish: Chola
  alternatives_spanish:
  - Hola
  - Cholai
  lexicon: transliteración directa del griego
  rationale: Se mantiene la forma breve y transparente del topónimo griego, conforme al criterio de transliteración del pasaje.
- source_word: πᾶν ὅριον Ἰσραήλ
  english_pob_choice: all the territory of Israel
  chosen_spanish: todo el territorio de Israel
  alternatives_spanish:
  - toda la región de Israel
  - todos los confines de Israel
  lexicon: BDAG
  rationale: «Territorio» expresa el sentido espacial amplio de ὅριον aquí, mejor que una mera idea de «frontera» o «confines».
- source_word: τοὺς ἀπαγγέλλοντας
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - los que anunciaban
  - los que informaban
  lexicon: BDAG
  rationale: El participio sustantivado funciona como designación de personas enviadas para comunicar un mensaje; «mensajeros» lo expresa de forma natural y precisa.
- source_word: ὑπὲρ τῶν συντετελεσμένων
  english_pob_choice: what had happened
  chosen_spanish: lo que había sucedido
  alternatives_spanish:
  - las cosas que se habían cumplido
  - lo que se había realizado
  lexicon: BDAG
  rationale: La referencia al perfecto apunta a hechos ya cumplidos; «había sucedido» es idiomático en español y conserva el valor narrativo sin sobreexplicarlo.
- source_word: ἵνα πάντες ἐκχυθῶσιν
  english_pob_choice: that all should rush out
  chosen_spanish: para que todos salieran
  alternatives_spanish:
  - para que todos se derramaran
  - para que todos salieran en masa
  lexicon: LSJ
  rationale: En contexto militar, la imagen literal de «ser derramados» comunica una salida en masa. En español, «salieran» preserva la idea de movimiento colectivo; el sentido de acometer queda reforzado por el complemento siguiente.
- source_word: τοῖς πολεμίοις
  english_pob_choice: against the enemies
  chosen_spanish: contra los enemigos
  alternatives_spanish:
  - sobre los enemigos
  - contra sus enemigos
  lexicon: BDAG
  rationale: La preposición española «contra» reproduce bien el valor hostil del dativo con movimiento dirigido al ataque.
- source_word: εἰς τὴν ἀναίρεσιν αὐτῶν
  english_pob_choice: to destroy them
  chosen_spanish: para destruirlos
  alternatives_spanish:
  - para su destrucción
  - para abatirlos
  lexicon: BDAG
  rationale: «Para destruirlos» expresa con claridad el propósito violento del texto. Se evita suavizar el pasaje, pero también se evita una perífrasis demasiado pesada en español.
theological_decisions:
- issue: Lenguaje de violencia militar
  english_pob_reading: that all should rush out against the enemies to destroy them
  chosen_spanish_reading: para que todos salieran contra los enemigos para destruirlos
  alternative_spanish_readings:
  - para su destrucción
  - para abatirlos
  rationale: El griego expresa una finalidad de aniquilación enemiga en un contexto militar. La traducción conserva esa dureza sin intensificarla artificialmente ni atenuarla.
  doctrine_reference: Principio de primacía del texto original; mantener la fuerza semántica sin paraphrasear más allá de lo que autoriza el fuente.
translation_notes:
  revision_awareness: Se siguió el último ajuste del POB inglés, que prefirió «messengers» frente a «men» y «to destroy them» frente a una formulación más abstracta. En español se reflejó esa precisión con «mensajeros» y «para destruirlos», manteniendo la transparencia hacia el griego de Swete.
  spanish_consistency_notes:
  - Se usó «Ozías» para el nombre propio, manteniendo coherencia con una transliteración bíblica hispana reconocible.
  - Se preservaron los topónimos con transliteración cercana al griego porque no hay una forma hispana única y segura en este pasaje.
  - «Territorio» se eligió para ὅριον por consistencia con el valor espacial amplio del contexto.
  - La nota al pie marca la imagen idiomática de ἐκχυθῶσιν sin borrar el matiz militar.
  - Se mantuvo «Dios»/«Yahvé» fuera del verso porque no aparecen en el texto base; no se introdujo terminología ajena.
