translation:
  language: es
  text: Entonces toda la humanidad[a] temerá, y declarará la obra de Dios; entenderá lo que él ha hecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo ser humano» o «todos los hombres». El hebreo dice «todo adam», un término colectivo para los seres humanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּירְאוּ
  english_pob_choice: will fear
  chosen_spanish: temerá
  alternatives_spanish:
  - tendrá temor
  - sentirá temor
  - se asustará
  lexicon: HALOT
  rationale: La raíz ירא puede expresar temor y también reverencia. En este contexto poético de juicio divino, «temerá» conserva la amplitud entre miedo y reverencia, igual que el inglés POB, y suena natural en español.
- source_word: כָּל אָדָם
  english_pob_choice: all mankind
  chosen_spanish: todo ser humano
  alternatives_spanish:
  - toda la humanidad
  - todo hombre
  - cada hombre
  lexicon: HALOT
  rationale: אָדָם aquí es colectivo y no masculino-individual. «Todo ser humano» comunica el valor colectivo sin restringirlo a varones, preservando la fuerza genérica del hebreo. Se evita mecanizar «todo hombre» porque en español puede sonar más individual o masculino.
- source_word: וַיַּגִּידוּ
  english_pob_choice: they will declare
  chosen_spanish: declararán
  alternatives_spanish:
  - dirán
  - proclamarán
  - anunciarán
  lexicon: HALOT
  rationale: נגד en hifil significa hacer saber, declarar. «Declararán» mantiene el tono público y testimonial del verbo, coherente con la construcción del verso.
- source_word: פֹּעַל אֱלֹהִים
  english_pob_choice: the work of God
  chosen_spanish: la obra de Dios
  alternatives_spanish:
  - el trabajo de Dios
  - el hecho de Dios
  - la acción de Dios
  lexicon: HALOT
  rationale: פֹּעַל abarca obra, acto o trabajo. «Obra de Dios» es la equivalencia más natural y reverente en español, y conserva suficiente amplitud para el acto decisivo de Dios en el contexto.
- source_word: וּמַעֲשֵׂהוּ
  english_pob_choice: what he has done
  chosen_spanish: lo que él ha hecho
  alternatives_spanish:
  - su obra
  - su hecho
  - su acción
  lexicon: HALOT
  rationale: El hebreo dice literalmente «y su obra/hecho». «Lo que él ha hecho» evita una repetición rígida de «obra» y expresa fielmente el resultado concreto de su acción, como en el inglés POB.
- source_word: הִשְׂכִּילוּ
  english_pob_choice: they will understand
  chosen_spanish: entenderán
  alternatives_spanish:
  - comprenderán
  - reconocerán
  - discernirán
  lexicon: HALOT
  rationale: הִשְׂכִּילוּ en hifil puede significar entender, actuar con discernimiento o prosperar. Aquí el objeto es la obra de Dios, por lo que el sentido principal es comprensión perceptiva; «entenderán» es claro y fiel.
theological_decisions:
- issue: Sentido colectivo de אָדָם
  english_pob_reading: all mankind
  chosen_spanish_reading: todo ser humano
  alternative_spanish_readings:
  - toda la humanidad
  - todos los hombres
  rationale: El hebreo usa אָדָם en sentido genérico/colectivo. La traducción española debe evitar una lectura exclusivamente masculina y, a la vez, no perder el peso universal del término.
  doctrine_reference: 'DOCTRINE.md: gender-accurate over gender-neutral; contested terms for אָדָם'
- issue: Tono de ירא en contexto de juicio
  english_pob_reading: will fear
  chosen_spanish_reading: temerá
  alternative_spanish_readings:
  - sentirá temor
  - reverenciará
  rationale: El versículo sigue a la acción judicial de Dios; por eso «temerá» conserva tanto el temor como la reverencia implícita, sin reducirlo a mera emoción ni forzar un tecnicismo litúrgico.
  doctrine_reference: HALOT; lexical/theological tension preserved between dread and reverence
translation_notes:
  revision_awareness: Se siguió el audit trail inglés sin dependencia mecánica; no hubo revisiones aplicadas en el expediente, y la decisión española mantiene la secuencia poética, la referencia colectiva de אָדָם y la doble amplitud de ירא (temor/reverencia).
  spanish_consistency_notes:
  - Se usó «Dios» de forma consistente para אֱלֹהִים.
  - Se mantuvo el paralelismo verbal futuro («temerá / declararán / entenderán») para reflejar la secuencia poética del hebreo y del POB inglés.
  - Se evitó «SEÑOR» porque el versículo no contiene el tetragrámaton ni una sustitución directa por Yahvé.
