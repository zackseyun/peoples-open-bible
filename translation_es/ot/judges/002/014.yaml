    text: O «la ira de Yahvé ardió contra Israel».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en mano de», un modismo que significa «bajo el poder de».'
    reason: cultural_note
  - marker: c
    text: O «sus enemigos en derredor».
    reason: lexical_alternative
  revision_rationale: 'La revisión hace ajustes menores pero importantes: 1) conserva mejor el modismo hebreo con «en mano de»; 2) reemplaza «resistir delante de» por «mantenerse firmes ante», que refleja mejor לַעֲמֹד לִפְנֵי y suena natural en español; 3) cambia «que los saqueaban» por «y los saquearon» para una secuencia narrativa más fluida; 4) corrige la nota c para que sea una alternativa real y útil.'
