translation:
  language: es
  text: Entonces Eliseo murió[a], y lo sepultaron. Y las bandas invasoras de Moab solían entrar en la tierra al comenzar el año.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la primavera del año»; el hebreo dice literalmente «al llegar el año», un modismo para el cambio de año, a menudo asociado con la temporada de campañas militares.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: Then ... died
  chosen_spanish: Entonces ... murió
  alternatives_spanish:
  - Y ... murió
  - Así que ... murió
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; «Entonces» conserva esa secuencia narrativa en español sin cargar el sentido más allá de la muerte simple.
- source_word: אֱלִישָׁע
  english_pob_choice: Elisha
  chosen_spanish: Eliseo
  alternatives_spanish:
  - Elisha
  lexicon: Nombre propio tradicional en español bíblico
  rationale: En español bíblico, el nombre se recibe tradicionalmente como «Eliseo», forma clara y reconocible, sin perder la referencia al personaje.
- source_word: וַֽ/יִּקְבְּרֻ֑/הוּ
  english_pob_choice: and they buried him
  chosen_spanish: y lo sepultaron
  alternatives_spanish:
  - y lo enterraron
  - y fue sepultado
  lexicon: HALOT
  rationale: El hebreo es activo plural con objeto de tercera persona masculina singular. «Lo sepultaron» mantiene la voz activa y la referencia directa al objeto, igual que el inglés POB.
- source_word: גְדוּדֵי מוֹאָב
  english_pob_choice: raiding bands of Moab
  chosen_spanish: las bandas de Moab
  alternatives_spanish:
  - las bandas de asalto de Moab
  - los raiders de Moab
  - los guerrilleros de Moab
  lexicon: HALOT
  rationale: גְדוּד suele designar una banda incursora o de saqueo. «Bandas» conserva el matiz de grupo armado sin introducir una etiqueta militar más técnica que el hebreo no exige en este verso.
- source_word: יָבֹ֥אוּ
  english_pob_choice: would come
  chosen_spanish: solían entrar
  alternatives_spanish:
  - vendrían
  - venían
  lexicon: HALOT
  rationale: El imperfecto aquí expresa acción habitual. «Solían entrar» comunica ese valor repetitivo en español moderno con naturalidad; «entrar» conserva el movimiento de ingreso presente en el contexto.
- source_word: בָ/אָ֖רֶץ
  english_pob_choice: into the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - a la tierra
  - en el país
  lexicon: HALOT
  rationale: Con בוא, el sentido es de ingreso. En español, «en la tierra» puede sonar estático; por eso se prefiere «entrar en la tierra» en la frase completa para reflejar el movimiento sin forzar «país».
- source_word: בָּ֥א שָׁנָֽה
  english_pob_choice: at the coming of the year
  chosen_spanish: al llegar el año
  alternatives_spanish:
  - al comienzo del año
  - en la primavera del año
  - cuando llegaba el año
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «al venir/llegar el año», un modismo para el cambio de año y, a menudo, la temporada de campaña militar. «Al llegar el año» conserva la literalidad idiomática del texto base.
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo directo y toma como referencia el audit trail inglés: se mantiene la narración simple de muerte y sepultura, el matiz activo de «lo sepultaron», el carácter habitual del imperfecto en «solían entrar» y la literalidad idiomática de «al llegar el año», dejando en nota la alternativa estacional.'
  spanish_consistency_notes:
  - Se conserva el nombre bíblico tradicional «Eliseo» para claridad de lectura en español.
  - «Bandas» mantiene la fuerza de grupo incursivo sin sobretraducir como ejército formal.
  - La nota [a] reproduce la tensión entre traducción literal e interpretación estacional del modismo hebreo.
