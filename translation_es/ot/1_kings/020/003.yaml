translation:
  language: es
  text: 'Y le dijo: «Así dice Ben-adad: Tu plata y tu oro son míos; tus esposas y tus hijos, los mejores[a], son míos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “tus hijos, los escogidos”. El adjetivo hebreo puede significar “buenos”, “mejores” o “escogidos” en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר לּוֹ
  english_pob_choice: And he said to him
  chosen_spanish: Y le dijo
  alternatives_spanish:
  - Y le habló
  - Y le manifestó
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol de אמר con לֹו se expresa de manera natural en español como 'le dijo'; conserva la relación directa entre el hablante y el destinatario sin añadir matiz innecesario.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: La fórmula de mensajero/proclamación se traduce mejor con presente solemne en español. 'Así dice' mantiene el tono formal y el valor de proclamación del hebreo.
- source_word: בֶּן הֲדַד
  english_pob_choice: Ben-hadad
  chosen_spanish: Ben-adad
  alternatives_spanish:
  - Ben-hadad
  - Ben Hadad
  lexicon: transliteración convencional
  rationale: Se conserva el nombre propio por transliteración. En español la secuencia 'Ben-adad' es clara y mantiene la pronunciación del nombre sin forzar una adaptación semántica.
- source_word: כַּסְפְּךָ וּזְהָבְךָ
  english_pob_choice: Your silver and your gold
  chosen_spanish: Tu plata y tu oro
  alternatives_spanish:
  - Tu plata y tu oro
  - Tu dinero y tu oro
  lexicon: HALOT
  rationale: El hebreo nombra metales preciosos concretos. 'Plata y oro' preserva la referencia material y evita generalizar a 'dinero', que reduciría la imagen concreta del botín reclamado.
- source_word: לִי הוּא
  english_pob_choice: are mine
  chosen_spanish: son míos
  alternatives_spanish:
  - me pertenecen
  - son para mí
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular, el sentido abarca ambos objetos mencionados. En español el plural 'son míos' comunica de forma natural la reivindicación posesiva sobre plata y oro.
- source_word: וְנָשֶׁיךָ
  english_pob_choice: your wives
  chosen_spanish: tus mujeres
  alternatives_spanish:
  - tus esposas
  - tus mujeres
  lexicon: HALOT
  rationale: Aquí נָשִׁים puede designar a las esposas o a las mujeres del harén/corte. 'Tus mujeres' preserva esa amplitud y evita cerrar el sentido solo a 'esposas' si el contexto apunta a posesión doméstica/política más amplia.
- source_word: וּבָנֶיךָ
  english_pob_choice: your sons
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus hijos
  - tus varones
  lexicon: HALOT
  rationale: Aunque בָּנִים puede ser específicamente 'hijos varones', en español 'hijos' es la forma más natural y puede abarcar los descendientes varones implicados por el contexto.
- source_word: הַטּוֹבִים
  english_pob_choice: the best
  chosen_spanish: los mejores
  alternatives_spanish:
  - los mejores
  - los más valiosos
  - los escogidos
  lexicon: HALOT
  rationale: Se conserva el valor superlativo/escogido del adjetivo. La posición apposicional del hebreo se refleja con 'los mejores' unido a 'tus hijos', sin convertirlo en una simple etiqueta moral.
- source_word: לִי הֵם
  english_pob_choice: are mine
  chosen_spanish: son míos
  alternatives_spanish:
  - me pertenecen
  - son míos
  lexicon: HALOT
  rationale: La cláusula posesiva final repite la reclamación para énfasis. 'Son míos' reproduce la fuerza de apropiación y el paralelismo con la frase anterior.
theological_decisions:
- issue: Alcance de הַטּוֹבִים aplicado a los hijos
  english_pob_reading: The Hebrew adjective can mean “good,” “best,” or “choicest” in this context.
  chosen_spanish_reading: los mejores
  alternative_spanish_readings:
  - los escogidos
  - los más valiosos
  - los buenos
  rationale: La nota inglesa entiende que el adjetivo expresa selección o excelencia, no simple bondad moral. En español 'los mejores' conserva esa tensión y evita restringir el sentido a una evaluación ética.
  doctrine_reference: No doctrinal issue; lexical/contextual emphasis on seizure and selection
- issue: Fidelidad al orden hebreo en la frase final
  english_pob_reading: your wives and your sons, the best, are mine
  chosen_spanish_reading: tus hijos, los mejores, son míos
  alternative_spanish_readings:
  - tus mejores hijos son míos
  - tus hijos, los escogidos, son míos
  rationale: La revisión inglesa corrigió la redacción para reflejar mejor la aposición hebrea. En español se mantiene la aposición con comas, evitando que parezca que solo algunos hijos están en vista cuando el hebreo describe a los hijos como 'los mejores'.
  doctrine_reference: No doctrinal issue; syntactic/semantic precision
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó 'your best sons' a 'your sons, the best' para respetar el orden y la aposición del hebreo. El español sigue esa corrección con 'tus hijos, los mejores', manteniendo la estructura descriptiva sin convertirla en un cuantificador restrictivo.
  spanish_consistency_notes:
  - Se mantiene 'Ben-adad' como transliteración estable del nombre propio.
  - Se evita 'SEÑOR' porque no aparece el tetragrámaton ni una cita directa de יהוה en este versículo.
  - Se conserva un registro solemne y conciso, adecuado para narrativa histórica bíblica.
  - '''Tu plata y tu oro'' sigue la concreción material del hebreo, sin paráfrasis a ''dinero''.'
