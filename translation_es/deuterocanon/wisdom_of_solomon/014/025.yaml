translation:
  language: es
  text: 'y todo está mezclado: sangre y homicidio[a], robo y engaño, corrupción, deslealtad, tumulto, perjurio y confusión acerca de lo bueno[b],'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sangre derramada y homicidio»; el griego dice literalmente «sangre y homicidio».
    reason: lexical_alternative
  - marker: b
    text: La expresión traducida «confusión acerca de lo bueno» es difícil; también podría entenderse como «disturbio de los bienes» o «alboroto respecto de las bendiciones».
    reason: alternative_reading
lexical_decisions:
- source_word: πάντα
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todas las cosas
  - todo ello
  lexicon: LSJ
  rationale: El neutro plural griego expresa alcance total; «todo» transmite esa amplitud en español con naturalidad y sin añadir matiz ajeno.
- source_word: ἐπιμὶξ ἔχει
  english_pob_choice: is mixed together
  chosen_spanish: está mezclado
  alternatives_spanish:
  - está todo mezclado
  - está en confusión
  - contiene una mezcla
  lexicon: LSJ
  rationale: La imagen es de mezcla indiscriminada. «Está mezclado» conserva el estado resultante en una formulación idiomática en español.
- source_word: αἷμα
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - derramamiento de sangre
  - sangre derramada
  lexicon: LSJ
  rationale: Se mantiene el valor literal del sustantivo, dejando que el contexto de la lista de vicios intensifique la idea de violencia o derramamiento de sangre sin explicitarla de más.
- source_word: φόνος
  english_pob_choice: murder
  chosen_spanish: homicidio
  alternatives_spanish:
  - asesinato
  - matanza
  lexicon: LSJ
  rationale: «Homicidio» expresa el acto de matar de forma general y solemne. En español evita restringir innecesariamente el término a una sola categoría legal moderna, aunque sigue siendo moralmente fuerte.
- source_word: κλοπὴ
  english_pob_choice: theft
  chosen_spanish: robo
  alternatives_spanish:
  - hurto
  - saqueo
  lexicon: LSJ
  rationale: En una lista de vicios, «robo» es el equivalente natural y claro para el latín/greco-cristiano de apropiación ilícita.
- source_word: δόλος
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - astucia
  - fraude
  - ardid
  lexicon: LSJ
  rationale: «Engaño» comunica la idea de dolo, fraude o treta de manera amplia y comprensible, sin cargar el término con un matiz demasiado técnico.
- source_word: φθορά
  english_pob_choice: corruption
  chosen_spanish: corrupción
  alternatives_spanish:
  - ruina
  - destrucción
  - depravación
  lexicon: LSJ
  rationale: En el catálogo ético, «corrupción» conserva bien la degradación moral y social implicada por el término griego.
- source_word: ἀπιστία
  english_pob_choice: faithlessness
  chosen_spanish: infidelidad
  alternatives_spanish:
  - falta de fe
  - deslealtad
  - incredulidad
  lexicon: LSJ
  rationale: Aquí el contexto apunta a una quiebra relacional y moral más que a la negación intelectual de una doctrina; «infidelidad» preserva esa amplitud de sentido.
- source_word: τάραχος
  english_pob_choice: turmoil
  chosen_spanish: tumulto
  alternatives_spanish:
  - alboroto
  - desorden
  - confusión
  lexicon: LSJ
  rationale: «Tumulto» comunica perturbación, agitación y desorden social, encajando con la progresión de males enumerados.
- source_word: ἐπιορκία
  english_pob_choice: perjury
  chosen_spanish: perjurio
  alternatives_spanish:
  - falso juramento
  - quebrantamiento del juramento
  lexicon: LSJ
  rationale: El término griego se refiere específicamente al quebrantamiento de un juramento; «perjurio» es la equivalencia precisa y convencional.
- source_word: θόρυβος ἀγαθῶν
  english_pob_choice: confusion about what is good
  chosen_spanish: confusión acerca de lo bueno
  alternatives_spanish:
  - confusión sobre lo bueno
  - alboroto acerca de lo bueno
  - trastorno de los bienes
  lexicon: LSJ
  rationale: La expresión es difícil. «Acerca de lo bueno» mantiene la ambigüedad entre bienes, cosas buenas y el bien moral, sin resolverla demasiado en una sola dirección. «Lo bueno» evita forzar un sustantivo concreto que el griego no especifica.
theological_decisions:
- issue: Sentido de ἀπιστία en una lista de vicios
  english_pob_reading: faithlessness
  chosen_spanish_reading: infidelidad
  alternative_spanish_readings:
  - incredulidad
  - falta de fe
  - deslealtad
  rationale: El contexto inmediato es una enumeración de males sociales y morales; por eso conviene una lectura relacional/ética. «Infidelidad» preserva la amplitud semántica de la POB inglesa sin reducir el término a incredulidad doctrinal.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; contested terms around faith/faithfulness'
- issue: Tratamiento de θόρυβος ἀγαθῶν
  english_pob_reading: confusion about what is good
  chosen_spanish_reading: confusión acerca de lo bueno
  alternative_spanish_readings:
  - disturbio de los bienes
  - alboroto de las cosas buenas
  - desorden respecto del bien
  rationale: La frase es semánticamente difícil y la traducción debe mantener la tensión. «Lo bueno» permite abarcar tanto bienes concretos como el bien moral, sin cerrar la lectura a una sola opción interpretativa.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; difficult lexical constructions'
translation_notes:
  revision_awareness: El inglés auditado pasó de «confusion over what is good» a «confusion about what is good» para naturalidad; en español se optó por «confusión acerca de lo bueno» para conservar esa naturalidad sin perder la ambigüedad del sintagma griego θόρυβος ἀγαθῶν. También se preservó la estructura enumerativa y el paralelismo de la lista de vicios.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque este verso no contiene el tetragrámaton ni una cita directa del nombre divino.
  - Se prefirió «infidelidad» para ἀπιστία por el contexto ético-relacional del pasaje, no por una negación doctrinal específica.
  - Se mantuvo la literalidad básica de «sangre» junto con «homicidio» para reflejar la fuerza acumulativa del griego.
