    text: O «dan testimonio contra nosotros»; más literalmente, «responden contra nosotros».
    reason: lexical_alternative
  revision_rationale: 'Se conserva el texto principal porque es fiel y legible, pero se corrige la nota al pie para alinear el referente pronominal con el hebreo y el POB inglés: los pecados testifican contra «nosotros», no contra «ti».'
