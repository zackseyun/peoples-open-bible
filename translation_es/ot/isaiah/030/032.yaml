  text: וְ/הָיָ֗ה כֹּ֤ל מַֽעֲבַר֙ מַטֵּ֣ה מֽוּסָדָ֔ה אֲשֶׁ֨ר יָנִ֤יחַ יְהוָה֙ עָלָ֔י/ו בְּ/תֻפִּ֖ים וּ/בְ/כִנֹּר֑וֹת וּ/בְ/מִלְחֲמ֥וֹת תְּנוּפָ֖ה נִלְחַם ב/ה־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/030/032.yaml
  text: And every stroke of the appointed rod that Yahweh lays on him will be with tambourines and lyres[b][a]; and with battles of brandishing he will fight against them.
  footnotes:
  - marker: a
    text: Or 'every passing of the appointed rod'; the Hebrew phrase is difficult, and 'stroke' interprets the image as each blow or sweep of the rod.
    reason: lexical_alternative
  - marker: b
    text: Or 'he will fight against it/him'; the Hebrew has a feminine singular suffix ('against her/it'), but the referent is uncertain in context.
    reason: alternative_reading
