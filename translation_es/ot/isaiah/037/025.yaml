translation:
  language: es
  text: Cavé y bebí agua, y con la planta de mis pies sequé todos los canales[a] de Egipto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos los canales/brazos del Nilo de Egipto». La expresión hebrea es idiomática y puede preservar una referencia más específica a las vías fluviales de Egipto.
    reason: lexical_alternative
  - marker: b
    text: Hebreo Mazor; aquí probablemente un nombre poético o alterno de Egipto, no «sitio» ni «fortaleza».
    reason: alternative_reading
lexical_decisions:
- source_word: קַרְתִּי
  english_pob_choice: dug
  chosen_spanish: cavé
  alternatives_spanish:
  - abrí un pozo
  - excavé
  lexicon: HALOT
  rationale: El contexto de obtener agua favorece el sentido concreto de cavar; en español, «cavé» es natural y mantiene la imagen breve y enfática del original.
- source_word: וְשָׁתִיתִי מָיִם
  english_pob_choice: and drank water
  chosen_spanish: y bebí agua
  alternatives_spanish:
  - y bebí aguas
  - y bebí del agua
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo plural formal, pero en español la masa singular «agua» suena más natural y fiel al sentido.
- source_word: וְאַחְרִב
  english_pob_choice: I dried up
  chosen_spanish: sequé
  alternatives_spanish:
  - devasté
  - dejé seco
  lexicon: HALOT
  rationale: El verbo en este contexto se aplica a corrientes de agua; «sequé» transmite la imagen concreta mejor que «devasté», que sería demasiado general.
- source_word: בְּכַף פְּעָמַי
  english_pob_choice: with the sole of my feet
  chosen_spanish: con la planta de mis pies
  alternatives_spanish:
  - con la suela de mis pies
  - con el piso de mis pies
  lexicon: HALOT
  rationale: «כַּף» con pies equivale a la planta/sola. «Planta de mis pies» es idiomático en español y conserva la hipérbole del texto.
- source_word: יְאֹרֵי
  english_pob_choice: the streams
  chosen_spanish: los canales
  alternatives_spanish:
  - los arroyos
  - los brazos del Nilo
  - los ríos
  lexicon: HALOT
  rationale: En contexto egipcio, יְאֹר suele referirse a canales o brazos del Nilo. «Canales» refleja mejor esa especificidad que «ríos» o «arroyos».
- source_word: מָצוֹר
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - Mazor
  - la tierra de Mazor
  lexicon: HALOT
  rationale: Siguiendo el audit trail inglés, aquí la expresión se entiende como una referencia poética a Egipto; por eso se traduce directamente «Egipto» y se preserva la alternativa en nota.
theological_decisions:
- issue: מָצוֹר como nombre poético/alterno de Egipto frente a la lectura literal "sitio/fortaleza"
  english_pob_reading: Hebrew Mazor; here likely a poetic or alternate name for Egypt, not 'siege' or 'fortification.'
  chosen_spanish_reading: Egipto como referencia poética/alternativa
  alternative_spanish_readings:
  - Mazor
  - sitio
  - fortaleza
  rationale: El contexto y el auditable inglés POB favorecen entender מָצוֹר como un nombre alusivo a Egipto, no como un término militar común. Mantener «Egipto» comunica la referencia histórica sin perder la nota sobre la ambigüedad del hebreo.
  doctrine_reference: Isaías 37:25 / 2 Reyes 19:24
translation_notes:
  revision_awareness: He seguido el texto hebreo masorético y el audit trail inglés, especialmente la revisión que eliminó el pronombre enfático no explícito en hebreo. También he conservado la tensión lexical de יְאֹרֵי מָצוֹר como referencia egipcia específica, reflejándola en la traducción principal y en nota.
  spanish_consistency_notes:
  - He mantenido «Egipto» en el texto principal para la referencia geográfica, pero he preservado la alternativa «Mazor» en nota para no borrar la ambigüedad documentada.
  - 'He preferido vocabulario natural pero preciso: «cavé», «bebí agua», «sequé», «planta de mis pies».'
  - No añadí énfasis pronominal tipo «yo mismo» porque el hebreo no lo exige explícitamente en esta forma del verso.
