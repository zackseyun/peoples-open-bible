translation:
  language: es
  text: Pero no había alimentos en el lugar santo, porque era el séptimo año[a], y los que habían escapado a Judea de entre las naciones[b] habían consumido el resto de los suministros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, el séptimo año sabático, cuando la producción agrícola quedaba restringida; eso explica la escasez de alimentos.
    reason: cultural_note
  - marker: b
    text: O 'de los gentiles'. El griego dice 'de las naciones'.
    reason: lexical_alternative
lexical_decisions:
- source_word: βρώματα
  english_pob_choice: food
  chosen_spanish: alimentos
  alternatives_spanish:
  - comida
  - provisiones
  lexicon: LSJ
  rationale: El término griego es amplio y puede referirse a comida o a abastecimientos alimentarios. En el contexto militar y de escasez, 'alimentos' comunica bien la ausencia de sustento sin sobreespecificar.
- source_word: ἐν τοῖς ἁγίοις
  english_pob_choice: in the holy place
  chosen_spanish: en el lugar santo
  alternatives_spanish:
  - en el santuario
  - en los lugares santos
  - en el recinto sagrado
  lexicon: LSJ
  rationale: El plural neutro con artículo apunta literalmente a 'lo santo' o 'los lugares santos'. En español, 'lugar santo' conserva la referencia al ámbito sagrado y sigue de cerca la forma griega, sin forzar una precisión técnica mayor que la del texto fuente.
- source_word: διὰ τὸ ἕβδομον ἔτος εἶναι
  english_pob_choice: because it was the seventh year
  chosen_spanish: porque era el séptimo año
  alternatives_spanish:
  - porque había llegado el séptimo año
  - porque era el año sabático
  lexicon: LSJ
  rationale: La fuente dice simplemente 'el séptimo año'. Se mantiene esa formulación sin introducir de forma explícita 'año sabático' en el cuerpo del texto, aunque esa sea la trasfondo histórico probable.
- source_word: οἱ ἀνασωζόμενοι
  english_pob_choice: those who had escaped
  chosen_spanish: los que habían escapado
  alternatives_spanish:
  - los sobrevivientes
  - los que se habían salvado
  - los rescatados
  lexicon: LSJ
  rationale: El participio describe a personas que llegaron a Judea habiendo salido con vida de la situación previa. 'Habían escapado' expresa bien ese valor sin agregar matices ajenos.
- source_word: εἰς τὴν Ἰουδαίαν
  english_pob_choice: into Judea
  chosen_spanish: a Judea
  alternatives_spanish:
  - hacia Judea
  - en Judea
  lexicon: LSJ
  rationale: En español, el movimiento hacia una región suele expresarse naturalmente con 'a'. 'A Judea' mantiene la dirección del griego εἰς y fluye mejor que una calca como 'en Judea'.
- source_word: ἀπὸ τῶν ἐθνῶν
  english_pob_choice: from the nations
  chosen_spanish: desde las naciones
  alternatives_spanish:
  - de entre las naciones
  - de los gentiles
  - de los pueblos extranjeros
  lexicon: LSJ
  rationale: Se conserva el idiomatismo del griego con 'las naciones'. 'Desde' resalta el movimiento de salida; se evita reemplazarlo por 'gentiles' en el texto principal para no importar una equivalencia teológica que el griego no exige aquí.
- source_word: κατέφαγον
  english_pob_choice: had eaten up
  chosen_spanish: habían consumido
  alternatives_spanish:
  - habían devorado
  - se habían comido
  - habían acabado con
  lexicon: LSJ
  rationale: El verbo compuesto es intensivo. 'Habían consumido' transmite la idea de agotar por completo lo que quedaba, en un español sobrio y natural.
- source_word: τὸ ὑπόλιμμα
  english_pob_choice: the remnant
  chosen_spanish: el resto
  alternatives_spanish:
  - el remanente
  - lo que quedaba
  - la parte restante
  lexicon: LSJ
  rationale: Aquí se trata de suministros, no de un uso teológico de 'remanente'. 'El resto' es claro y evita una carga doctrinal innecesaria.
- source_word: τῆς παραθέσεως
  english_pob_choice: of the supplies
  chosen_spanish: de los suministros
  alternatives_spanish:
  - de las provisiones
  - de lo almacenado
  - de los víveres guardados
  lexicon: LSJ
  rationale: El sustantivo alude a lo puesto aparte o dispuesto para uso posterior. En contexto, la referencia es a abastecimientos almacenados; 'suministros' sigue la lectura auditada en inglés y resulta idiomático en español.
theological_decisions:
- issue: Si explicitar el trasfondo del séptimo año como año sabático
  english_pob_reading: Left as 'the seventh year' in the main text
  chosen_spanish_reading: Dejar 'el séptimo año' en el texto principal
  alternative_spanish_readings:
  - el año sabático
  rationale: El griego expresa el dato temporal sin glosa. La nota puede aclarar el trasfondo histórico, pero el texto base no debe sustituir el enunciado fuente por una interpretación explicativa.
  doctrine_reference: Translation philosophy §1, §3
- issue: Cómo rendir ἐν τοῖς ἁγίοις
  english_pob_reading: in the holy place
  chosen_spanish_reading: en el lugar santo
  alternative_spanish_readings:
  - en el santuario
  - en los lugares santos
  rationale: La frase griega puede señalar el espacio sagrado del templo. 'Lugar santo' conserva la referencia cultual sin imponer una terminología más técnica que la del texto.
  doctrine_reference: Translation philosophy §1, §5
- issue: Cómo entender ἀπὸ τῶν ἐθνῶν
  english_pob_reading: from the nations
  chosen_spanish_reading: desde las naciones
  alternative_spanish_readings:
  - de los gentiles
  - de los pueblos extranjeros
  rationale: Se preserva el lenguaje judío-griego de 'las naciones'. Evitar 'gentiles' en el cuerpo del texto mantiene la correspondencia con el griego y deja abierta la nota explicativa si se desea.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'He tenido en cuenta el pasaje de revisión más reciente del audit trail inglés: la versión final prefirió ''holy place'' para acercarse a τοῖς ἁγίοις y simplificó la expresión de τῆς παραθέσεως a ''supplies''. En español, se siguió esa misma dirección, manteniendo una redacción natural (''lugar santo'', ''suministros'') sin introducir una paráfrasis mayor que la apoyada por la fuente griega y el control auditado en inglés.'
  spanish_consistency_notes:
  - Se conserva 'Dios'/'Yahvé' según corresponda en este proyecto, pero este versículo no los contiene.
  - Se evita 'Cristo' porque no aparece el título χριστός en el texto.
  - '''Lugar santo'' mantiene la referencia sacra sin sustituirla por una expresión más interpretativa.'
  - '''Las naciones'' se conserva para reflejar el idiomatismo del griego, con nota alternativa sobre ''gentiles''.'
  - La puntuación y el orden siguen un español formal y publicable, con ajuste mínimo para fluidez natural.
