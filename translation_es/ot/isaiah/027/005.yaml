translation:
  language: es
  text: O que se aferre a mi fuerza[a]; que haga paz conmigo; que haga paz conmigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi refugio» o «mi protección».
    reason: lexical_alternative
lexical_decisions:
- source_word: א֚וֹ
  english_pob_choice: Or
  chosen_spanish: O
  alternatives_spanish:
  - O bien
  - Sino
  lexicon: HALOT
  rationale: Introduce una alternativa directa y breve; «O» conserva la función disyuntiva sin añadir matices ajenos al hebreo.
- source_word: יַחֲזֵ֣ק
  english_pob_choice: let him take hold of
  chosen_spanish: que se aferre a
  alternatives_spanish:
  - que tome de
  - que sujete
  - que se agarre de
  lexicon: HALOT
  rationale: El verbo expresa una acción intencional de agarrarse a algo para buscar amparo. «Aferre» comunica bien la fuerza concreta del verbo sin sonar demasiado coloquial.
- source_word: בְּמָעוּזִּי
  english_pob_choice: my stronghold
  chosen_spanish: mi fortaleza
  alternatives_spanish:
  - mi refugio
  - mi protección
  - mi refugio-fortaleza
  lexicon: HALOT
  rationale: מָעוּז designa un lugar o realidad de refugio y fuerza. «Fortaleza» conserva la imagen de amparo defensivo. Se evita «SEÑOR» y también «mi fuerza» como traducción principal, porque el sustantivo apunta más al lugar/condición de resguardo que a una mera cualidad abstracta.
- source_word: יַעֲשֶׂה שָׁלוֹם
  english_pob_choice: let him make peace
  chosen_spanish: que haga paz
  alternatives_spanish:
  - que establezca paz
  - que procure paz
  - que haga reconciliación
  lexicon: HALOT
  rationale: La combinación verbal con שָׁלוֹם es idiomática. «Haga paz» preserva la formulación breve y relacional del hebreo mejor que una paráfrasis explicativa.
- source_word: לִי
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - para mí
  - a mí
  lexicon: HALOT
  rationale: Aunque literalmente es «para/ a mí», en este contexto el sentido relacional es «conmigo». El español natural requiere esa explicitación para no perder el valor de reconciliación.
- source_word: שָׁלוֹם יַעֲשֶׂה לִּי
  english_pob_choice: let him make peace with me
  chosen_spanish: sí, que haga paz conmigo
  alternatives_spanish:
  - que haga paz conmigo
  - paz haga conmigo
  lexicon: HALOT
  rationale: La repetición del hebreo se conserva con un refuerzo enfático. «Sí» ayuda a reproducir la insistencia del original sin suavizarla en una sola frase.
theological_decisions:
- issue: Referente del hablante en primera persona
  english_pob_reading: The speaker is God, and the verse offers an alternative of refuge and reconciliation with him.
  chosen_spanish_reading: El hablante es Yahvé, y el verso ofrece la alternativa de buscar amparo en él y hacer paz con él.
  alternative_spanish_readings:
  - Una lectura más impersonal que atenúe la auto-referencia divina.
  - Una traducción que deje el referente sin explicitar en la línea principal.
  rationale: En el contexto inmediato de Isaías 27, la primera persona corresponde a la voz divina. Mantener esa referencia en español preserva la fuerza del llamado y la tensión teológica del pasaje sin resolverla por tradición litúrgica.
  doctrine_reference: Primacía del texto original sobre la convención traductora; preservar la tensión teológica documentada.
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo y el cierre auditado más reciente de la POB en inglés. Se conserva la estructura alternativa inicial y la repetición enfática final. Donde el inglés revisado favorece «my strength», se opta en español por «mi fortaleza» para reflejar mejor מָעוּזִּי con la imagen de refugio defensivo, sin perder el sentido de amparo.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma normal para la referencia divina cuando el hablante es Dios.
  - Se mantiene «paz» como equivalente de שָׁלוֹם en su sentido relacional inmediato.
  - La repetición final no se simplifica, para conservar el énfasis del hebreo.
  - La nota al pie marca una alternativa léxica real sin desplazar la traducción principal.
