translation:
  language: es
  text: 'Pero si el hombre no quiere tomar a la viuda de su hermano, entonces la viuda de su hermano subirá a la puerta, a los ancianos y dirá: «Mi cuñado rehúsa levantar nombre para su hermano en Israel[a]; no quiere cumplir conmigo el deber de cuñado[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «establecer un nombre para su hermano en Israel». El modismo se refiere a preservar la línea familiar y la posición del hermano difunto.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hacer de cuñado conmigo», una expresión técnica para cumplir la obligación del levirato al casarse con la viuda de un hermano fallecido.'
    reason: cultural_note
lexical_decisions:
- source_word: יַחְפֹּץ
  english_pob_choice: does not want
  chosen_spanish: no quiere
  alternatives_spanish:
  - no desea
  - no está dispuesto
  lexicon: HALOT
  rationale: חפץ expresa querer, desear o estar dispuesto. En un contexto legal, ‘no quiere’ comunica bien la negativa voluntaria en español moderno sin perder el matiz de voluntad.
- source_word: לָקַחַת
  english_pob_choice: to take
  chosen_spanish: tomar
  alternatives_spanish:
  - recibir
  - casarse con
  lexicon: HALOT
  rationale: ‘Tomar’ conserva la cercanía al hebreo y, junto con ‘la viuda de su hermano’, deja claro el sentido matrimonial-jurídico sin imponer una paráfrasis más amplia.
- source_word: יְבִמְתּוֹ
  english_pob_choice: his brother’s widow
  chosen_spanish: la viuda de su hermano
  alternatives_spanish:
  - su cuñada
  - la viuda de su hermano
  lexicon: HALOT
  rationale: El término apunta de forma específica a la viuda dentro del marco del levirato. ‘La viuda de su hermano’ es más explícito que ‘su cuñada’ y evita perder el sentido legal.
- source_word: וְעָלְתָה ... הַשַּׁעְרָה
  english_pob_choice: shall go up to the gate
  chosen_spanish: subirá a la puerta
  alternatives_spanish:
  - irá a la puerta
  - subirá a la puerta
  lexicon: HALOT
  rationale: El hebreo usa ‘subir’ hacia la puerta como lugar de juicio. Mantener ‘subirá’ conserva la imagen espacial del original; ‘la puerta’ funciona naturalmente en español bíblico y jurídico.
- source_word: הַזְּקֵנִים
  english_pob_choice: the elders
  chosen_spanish: a los ancianos
  alternatives_spanish:
  - a los ancianos de la ciudad
  - a los ancianos
  lexicon: HALOT
  rationale: ‘Ancianos’ es la forma más directa y natural. El contexto de la puerta ya sugiere la función local/judicial sin necesidad de añadir ‘de la ciudad’.
- source_word: מֵאֵין
  english_pob_choice: refuses
  chosen_spanish: rehúsa
  alternatives_spanish:
  - se niega
  - no consiente
  lexicon: HALOT
  rationale: La forma expresa negación o rechazo formal. ‘Rehúsa’ preserva un tono jurídico y, en español, combina bien con el verbo siguiente ‘levantar’.
- source_word: לְהָקִים ... שֵׁם
  english_pob_choice: to raise up a name
  chosen_spanish: levantar nombre
  alternatives_spanish:
  - establecer nombre
  - perpetuar el nombre
  lexicon: HALOT
  rationale: La expresión es idiomática. ‘Levantar nombre’ conserva la metáfora hebrea y la tensión lexical que la POB inglesa decidió mantener; en español sigue siendo comprensible dentro del contexto.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - dentro de Israel
  - en medio de Israel
  lexicon: HALOT
  rationale: Traducción directa y natural del marcador locativo-covenantal.
- source_word: לֹא אָבָה
  english_pob_choice: he is not willing
  chosen_spanish: no quiere
  alternatives_spanish:
  - no está dispuesto
  - no consiente
  lexicon: HALOT
  rationale: אבה señala voluntad o consentimiento. Repetir ‘no quiere’ mantiene el paralelismo con el inicio del versículo y distingue esta negativa de la rehusación formal anterior.
- source_word: יַבְּמִי
  english_pob_choice: to perform the duty of a brother-in-law to me
  chosen_spanish: cumplir conmigo el deber de cuñado
  alternatives_spanish:
  - hacer conmigo el deber de cuñado
  - cumplir el deber del cuñado conmigo
  lexicon: HALOT
  rationale: יבם es un término técnico del levirato. ‘Cumplir conmigo el deber de cuñado’ comunica la obligación relacional sin usar un tecnicismo opaco ni perder el carácter jurídico.
theological_decisions:
- issue: Terminología del levirato en lenguaje público español
  english_pob_reading: Use explicit legal-relational language ('his brother’s widow,' 'brother-in-law,' 'perform the duty of a brother-in-law') rather than opaque traditional jargon.
  chosen_spanish_reading: Usar lenguaje jurídico-relacional explícito (‘la viuda de su hermano’, ‘cuñado’, ‘cumplir conmigo el deber de cuñado’) en vez de tecnicismo oscuro o fórmulas eclesiásticas tradicionales.
  alternative_spanish_readings:
  - ‘levirato’ en el texto principal
  - ‘su cuñada’ sin explicación
  - ‘deber del levirato’
  rationale: El versículo regula una obligación familiar y legal, no una doctrina controvertida. La traducción española preserva la claridad del acto exigido y la relación entre los personajes, sin sustituir el sentido por un tecnicismo que muchos lectores no conocen.
  doctrine_reference: 'Translation philosophy: optimal equivalence; claridad legal y relacional en español contemporáneo.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el auditorio inglés revisado: mantiene la tensión entre ‘rehúsa’ y ‘no quiere’, preserva la metáfora de ‘levantar nombre’, y evita suavizar el lenguaje técnico del levirato. No hubo revisiones aplicadas en el material inglés; por eso la versión española refleja la lectura final estable.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - ‘Cuñado’ se usa como equivalente funcional de la relación técnica del levirato, mientras que ‘la viuda de su hermano’ evita ambigüedad.
  - Se conserva la repetición de la negativa (‘no quiere’ / ‘rehúsa’) porque el hebreo distingue dos formas de rechazo.
  - La puntuación y el registro buscan ser publicables en español bíblico moderno sin caer en arcaísmos innecesarios.
