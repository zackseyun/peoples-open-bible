base_translation:
  language: en
  yaml_path: translation/ot/numbers/011/012.yaml
  text: Did I conceive all this people? Did I give birth to them[a], that you should say to me, ‘Carry them in your bosom[b], as a guardian carries a nursing child,’ to the land that you swore to their fathers?
  footnotes:
