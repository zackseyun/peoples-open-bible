  to: Y rugirá sobre él en aquel día como el rugido del mar[a]; y si uno mira a la tierra[b], he aquí, oscuridad y angustia[c], y la luz se oscurece en sus nubes[d].
  rationale: Se ajusta עָלָיו en el texto principal de «contra él» a «sobre él» para no estrechar indebidamente la referencia ni la fuerza de la preposición respecto de la decisión documentada del POB. También se cambia «como ruge el mar» a «como el rugido del mar» para reflejar mejor el sintagma hebreo. Se corrige la nota a para que ofrezca alternativas reales y una explicación más completa del referente posible.
