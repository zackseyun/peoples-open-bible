translation:
  language: es
  text: Entonces le entregaron a Jacob todos los dioses extranjeros que estaban en sus manos, y los anillos[a] que estaban en sus orejas; y Jacob los escondió debajo del terebinto[b] que estaba cerca de Siquem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pendientes»; el hebreo puede referirse a aros usados en distintas partes del cuerpo, pero aquí la frase siguiente especifica que estaban en sus orejas.
    reason: lexical_alternative
  - marker: b
    text: O «encina» o «roble»; la palabra hebrea probablemente se refiere más específicamente a un terebinto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנוּ
  english_pob_choice: So they gave
  chosen_spanish: Entonces le entregaron
  alternatives_spanish:
  - Y le dieron
  - Entonces le dieron
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración; «entregaron» conserva el acto deliberado de ceder estos objetos y suena natural en español. «Entonces» refleja el valor secuencial sin forzar un calco.
- source_word: אֶל יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: a Jacob
  alternatives_spanish:
  - para Jacob
  - a él
  lexicon: HALOT
  rationale: La preposición marca destinatario indirecto. En español, «le entregaron a Jacob» comunica esa relación de forma idiomática.
- source_word: כָּל אֱלֹהֵי הַנֵּכָר
  english_pob_choice: all the foreign gods
  chosen_spanish: todos los dioses extranjeros
  alternatives_spanish:
  - todos los dioses extraños
  - todos los ídolos extranjeros
  - todas las deidades extranjeras
  lexicon: HALOT
  rationale: «Dioses extranjeros» reproduce bien el hebreo y mantiene el contraste con el culto del pacto. «Ídolos» interpretaría más de lo que el sustantivo dice por sí solo.
- source_word: אֲשֶׁר בְּיָדָם
  english_pob_choice: that were in their hands
  chosen_spanish: que tenían en su poder
  alternatives_spanish:
  - que estaban en sus manos
  - que poseían
  - que tenían
  lexicon: HALOT
  rationale: El hebreo dice literalmente «en su mano». «En su poder» es una equivalencia natural en español para posesión/tenencia, sin perder la idea concreta de algo que estaba bajo su control.
- source_word: וְאֶת הַנְּזָמִים
  english_pob_choice: and the rings
  chosen_spanish: y los anillos
  alternatives_spanish:
  - y los pendientes
  - y los aretes
  - y los aros
  lexicon: HALOT
  rationale: נזמים puede designar adornos en distintas partes del cuerpo. Como el complemento siguiente aclara «en sus orejas», «anillos» mantiene la amplitud semántica y evita decidir prematuramente por «pendientes».
- source_word: אֲשֶׁר בְּאָזְנֵיהֶם
  english_pob_choice: that were in their ears
  chosen_spanish: que estaban en sus orejas
  alternatives_spanish:
  - que llevaban en las orejas
  - que tenían en sus orejas
  lexicon: HALOT
  rationale: La frase es locativa. «En sus orejas» conserva la precisión del texto y permite que la referencia de los adornos se determine por el contexto inmediato.
- source_word: וַיִּטְמֹן אֹתָם
  english_pob_choice: and Jacob hid them
  chosen_spanish: y Jacob los escondió
  alternatives_spanish:
  - y Jacob los ocultó
  - y Jacob los enterró
  lexicon: HALOT
  rationale: טמן puede significar esconder o enterrar; aquí el gesto de ponerlos bajo el árbol favorece «escondió». Así se preserva la amplitud del verbo sin añadir una precisión no obligatoria.
- source_word: תַּחַת הָאֵלָה
  english_pob_choice: under the terebinth
  chosen_spanish: debajo de la encina
  alternatives_spanish:
  - debajo del terebinto
  - debajo del gran árbol
  - debajo de la encina/terebinto
  lexicon: HALOT
  rationale: Aunque el hebreo suele apuntar a un terebinto, en español «encina» conserva una designación arbórea natural y tradicional. No se usa «oak» ni se impone un tecnicismo que suene más duro al lector general.
- source_word: אֲשֶׁר עִם שְׁכֶם
  english_pob_choice: that was near Shechem
  chosen_spanish: que estaba cerca de Siquem
  alternatives_spanish:
  - que estaba junto a Siquem
  - que estaba cerca de Siquem
  lexicon: HALOT
  rationale: עִם con un topónimo expresa proximidad/ubicación asociada. «Cerca de Siquem» comunica bien esa relación espacial sin añadir elementos ajenos al texto.
theological_decisions:
- issue: Naturaleza de los objetos entregados y escondidos
  english_pob_reading: The verse refers to illicit cultic objects ('foreign gods') and associated jewelry without specifying more than the Hebrew states.
  chosen_spanish_reading: La frase distingue entre los «dioses extranjeros» y los «anillos»; el texto no aclara si estos adornos eran simples joyas o si tenían un valor cultual adicional.
  alternative_spanish_readings:
  - Los anillos eran solo ornamentos valiosos
  - Los anillos tenían función amuletaria o idolátrica
  rationale: 'La traducción mantiene la distinción del hebreo y no resuelve una ambigüedad que el texto deja abierta. Así se preserva la tensión documentada: los objetos son descartados junto con las imágenes paganas, pero su relación exacta con el culto no se explicita.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión en inglés fue revisada y quedó sin cambios; se siguió esa lectura estable sin introducir decisiones divergentes. Se mantuvo la distinción entre los objetos de culto extranjero y los adornos, y se reflejó la localización espacial con un equivalente español natural.
  spanish_consistency_notes:
  - Se mantuvo «Jacob» y «Siquem» de forma consistente con la tradición bíblica de nombres propios.
  - Se prefirió «dioses extranjeros» para conservar la fuerza léxica de אֱלֹהֵי הַנֵּכָר.
  - Se evitó convertir automáticamente los anillos en «pendientes» para no cerrar una ambigüedad que el hebreo deja abierta.
  - Se usó «encina» como equivalente natural y lector-amigable para el árbol, aunque el trasfondo léxico apunta a terebinto.
