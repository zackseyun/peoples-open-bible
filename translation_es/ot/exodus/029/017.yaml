translation:
  language: es
  text: Entonces corta el carnero en sus piezas[a], lava sus entrañas y sus patas, y ponlas sobre sus piezas y sobre su cabeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sus partes’. El hebreo se refiere a las porciones cortadas del animal; ‘piezas’ expresa con más precisión ese sentido en este contexto sacrificial.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאַיִל
  english_pob_choice: the ram
  chosen_spanish: el carnero
  alternatives_spanish:
  - el macho de oveja
  - el macho
  lexicon: HALOT
  rationale: En contexto sacrificial, אַיִל designa al carnero. ‘Carnero’ es natural en español y conserva el referente cultual con claridad.
- source_word: תְּנַתֵּחַ
  english_pob_choice: cut ... into its pieces
  chosen_spanish: corta ... en sus partes
  alternatives_spanish:
  - descuartiza
  - divide ... en sus partes
  lexicon: HALOT
  rationale: El piel de נתח expresa cortar/dividir el animal en piezas para el sacrificio. ‘Corta ... en sus partes’ mantiene la acción sin sonar excesivamente crudo o técnico.
- source_word: לִנְתָחָיו / נְתָחָיו
  english_pob_choice: its pieces
  chosen_spanish: sus partes
  alternatives_spanish:
  - sus piezas
  - sus secciones
  lexicon: HALOT
  rationale: ‘Partes’ comunica bien las porciones resultantes del corte y evita un calco demasiado mecánico de ‘piezas’ en español, aunque esa opción sigue siendo posible.
- source_word: קִרְבּוֹ
  english_pob_choice: its entrails
  chosen_spanish: sus entrañas
  alternatives_spanish:
  - sus entrañas internas
  - sus partes internas
  lexicon: HALOT
  rationale: En lenguaje sacrificial, קֶרֶב puede referirse de manera concreta a los órganos internos. ‘Entrañas’ es un equivalente español natural y suficientemente específico; también conserva la posibilidad de una referencia más amplia al interior del animal.
- source_word: כְרָעָיו
  english_pob_choice: its legs
  chosen_spanish: sus piernas
  alternatives_spanish:
  - sus patas
  - sus extremidades
  lexicon: HALOT
  rationale: כְרָעַיִם alude a las patas/partes inferiores del animal. ‘Piernas’ es comprensible y digno en español; ‘patas’ sería más zoológico, pero menos adecuado al registro ritual.
- source_word: וְנָתַתָּ עַל
  english_pob_choice: put them on
  chosen_spanish: ponlas sobre
  alternatives_spanish:
  - colócalas sobre
  - ponlas encima de
  lexicon: HALOT
  rationale: עַל indica colocación sobre algo. ‘Sobre’ reproduce con precisión la relación espacial y sigue la revisión inglesa que descartó ‘with’ para reflejar mejor עַל.
- source_word: רֹאשׁוֹ
  english_pob_choice: its head
  chosen_spanish: su cabeza
  alternatives_spanish:
  - su cabeza
  - su testa
  lexicon: HALOT
  rationale: ‘Cabeza’ es el equivalente directo y natural en español para el término anatómico.
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió la relación de עַל de ‘with’ a ‘on’, reforzando la imagen de colocar los órganos lavados sobre las piezas y sobre la cabeza. La versión española adopta explícitamente ‘sobre’ para alinearse con esa decisión revisada.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma estándar del proyecto cuando aparezca el tetragrámaton; en este versículo no aparece.
  - Se usa un registro ritual claro y sobrio, evitando arcaísmos innecesarios.
  - ‘Entrañas’ y ‘piernas’ siguen el sentido sacrificial del hebreo sin introducir terminología eclesiástica no motivada por la fuente.
