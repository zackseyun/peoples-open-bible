review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del hebreo: envío de cinco hombres por los hijos de Dan, procedencia de Zora y Estaol, propósito doble de reconocimiento/exploración, llegada a la región montañosa de Efraín y pernocta allí. Sin embargo, hay dos desajustes significativos con la evidencia fuente y el rastro auditado: (1) falta la nota léxica correspondiente a וּלְחָקְרָהּ / חִקְרוּ (''explorar / investigar / escudriñar''), que el POB inglés preserva; (2) el nombre propio מִיכָה se ha vertido como ''Micaía'', forma que no corresponde bien a Micah/Mica y además entra en tensión con la nota que cita explícitamente ''Micah''.'
  spanish_quality_summary: El español es claro y legible, con buen registro bíblico moderno. 'Región montañosa de Efraín' y 'pasaron allí la noche' son naturales. No obstante, la nota [a] es internamente defectuosa porque ofrece como alternativa 'hombres valientes' para una expresión ya traducida exactamente así; conviene rehacerla para reflejar alternativas reales. Además, la referencia a 'Micaía' suena menos natural y menos precisa que 'Mica' en este contexto narrativo.
  glossary_alignment: 'No hay conflictos con la terminología teológica principal del proyecto. Las decisiones ''los hijos de Dan'', ''clan'', ''la tierra'' y ''región montañosa de Efraín'' son adecuadas. ''Para reconocer la tierra'' es aceptable para לְרַגֵּל, aunque algo menos cercano que ''para espiar/reconocer como espías''. El problema principal es onomástico: מִיכָה debe alinearse mejor como ''Mica'', y deben conservarse las alternativas léxicas documentadas por el POB inglés tanto para ''hombres valientes'' como para ''explorar''.'
  issues:
  - severity: high
    issue: Nombre propio מִיכָה traducido como 'Micaía'
    rationale: מִיכָה corresponde a Micah/Mica, no a Micaiah/Micaías/Micaía. 'Micaía' puede sugerir otro nombre hebreo distinto (מִיכָיָה/מִיכָיְהוּ) y debilita la fidelidad onomástica.
  - severity: medium
    issue: Falta la nota léxica para וּלְחָקְרָהּ / חִקְרוּ
    rationale: El POB inglés conserva alternativas significativas ('search it out' / 'investigate it'). El español debe preservar esa información, especialmente porque 'explorar' puede leerse más geográficamente que investigativamente.
  - severity: medium
    issue: La nota [a] está mal formulada
    rationale: 'Dice: ''O «hombres valientes» o «hombres de valor» para «hombres valientes»'', repitiendo la misma opción como si fuera alternativa. Debe reflejar alternativas reales como ''hombres capaces'' o ''hombres de valor''.'
  revised_spanish_text: 'Así que los hijos de Dan enviaron cinco hombres de su clan[a], de entre todo su número, hombres valientes de Zora y de Estaol, para reconocer la tierra y explorarla[b]. Y les dijeron: «Vayan, exploren la tierra». Entonces llegaron a la región montañosa de Efraín, hasta la casa de Mica[c], y pasaron allí la noche.'
  revised_footnotes:
