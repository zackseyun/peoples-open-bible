translation:
  language: es
  text: ¡Alábenlo[a], todos sus ángeles; alábenlo, todas sus huestes!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todas sus huestes celestiales» o «todos sus ejércitos».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַלְלוּהוּ
  english_pob_choice: Praise him
  chosen_spanish: ¡Alábenlo!
  alternatives_spanish:
  - ¡Denle alabanza!
  - ¡Alábenlo ustedes!
  lexicon: HALOT
  rationale: El hebreo es un imperativo plural con sufijo de 3ª persona masculina singular; en español, «alabenlo» conserva la orden dirigida a múltiples seres. Se usa el verbo «alabar» en lugar de una paráfrasis para mantener la fuerza poética y el valor imperativo.
- source_word: כָל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todo
  - la totalidad de
  lexicon: HALOT
  rationale: El sentido colectivo/distributivo del hebreo queda bien expresado con «todos», que es natural en español y mantiene la idea de la suma completa de los seres convocados.
- source_word: מַלְאָכָיו
  english_pob_choice: his angels
  chosen_spanish: sus ángeles
  alternatives_spanish:
  - sus mensajeros
  lexicon: HALOT
  rationale: En este contexto de alabanza celestial, מַלְאָכִים se refiere a seres celestiales; «ángeles» es el equivalente más preciso y transparente en español. Se conserva el posesivo «sus» para reflejar el sufijo pronominal.
- source_word: צְבָאוֹ
  english_pob_choice: his hosts
  chosen_spanish: sus ejércitos
  alternatives_spanish:
  - sus huestes
  - su ejército celestial
  - sus hosts
  lexicon: HALOT
  rationale: צבא puede significar «ejército», «hueste» o «host». Aunque el POB inglés usa «hosts» para preservar amplitud poética, en español «ejércitos» comunica el campo semántico básico con claridad. Dado el paralelismo con «sus ángeles», la referencia cósmica sigue siendo entendible sin añadir una explicación en el texto principal.
theological_decisions:
- issue: Referente de los pronombres de 3ª persona ('lo', 'sus')
  english_pob_reading: The pronouns refer to God, the LORD addressed throughout the psalm.
  chosen_spanish_reading: Los pronombres se refieren a Yahvé, el destinatario del salmo.
  alternative_spanish_readings:
  - Los pronombres podrían traducirse sin antecedente explícito, pero quedarían opacos en español.
  - «lo» podría entenderse como referencia al Señor, según el contexto del salmo.
  rationale: El versículo continúa la alabanza dirigida a Yahvé en el contexto inmediato del salmo. En español se conserva el objeto pronominal de 3ª persona para no perder la relación anafórica; el nombre divino subyacente del salmo no se sustituye por una fórmula de ocultación.
  doctrine_reference: YHWH → Yahvé (terminología principal del proyecto)
- issue: Valor de צְבָאוֹ en el paralelismo poético
  english_pob_reading: '''his hosts'' / ''his heavenly host'' / ''his armies'''
  chosen_spanish_reading: «sus ejércitos» mantiene el paralelismo y deja abierta la amplitud semántica.
  alternative_spanish_readings:
  - «sus huestes»
  - «su hueste celestial»
  - «su ejército celestial»
  rationale: El hebreo admite un rango entre ejército, host y hueste. El POB inglés documenta esa tensión léxica; en español, «ejércitos» conserva la imagen fuerte sin cerrar indebidamente la referencia, mientras que las alternativas se mantienen como posibilidades legítimas de lectura.
  doctrine_reference: Lexical range of צבא (HALOT)
translation_notes:
  revision_awareness: 'Coincide con la lectura inglesa auditada y no requiere revisión adicional: se mantiene el paralelismo, el imperativo plural y la referencia celestial de los dos miembros del verso. La decisión principal en español es la elección de «ejércitos» para צְבָאוֹ, registrando la amplitud semántica documentada por el POB inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como referente divino del salmo, conforme al estándar del proyecto.
  - «Alábenlo» mantiene el imperativo plural y evita el arcaísmo.
  - «sus ángeles» y «sus ejércitos» conservan el paralelismo hebreo sin explicitar más de lo que el verso dice.
  - La nota al pie preserva la alternativa léxica documentada por el POB inglés y añade una formulación española natural.
