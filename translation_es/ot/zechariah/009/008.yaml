translation:
  language: es
  text: Y acamparé en mi casa como guardia[a], para que nadie pase de un lado a otro[b], y ningún opresor[c] vuelva a pasar sobre ellos; porque ahora he visto con mis propios ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como una guarnición». El término hebreo puede referirse a un puesto de guardia establecido o a una defensa militar estacionada.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «del que pasa y del que regresa»; probablemente alude a movimiento hostil en cualquiera de las dos direcciones.'
    reason: lexical_alternative
  - marker: c
    text: O «exactor» o «capataz» para «opresor».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחָנִיתִי
  english_pob_choice: And I will encamp
  chosen_spanish: Y acamparé
  alternatives_spanish:
  - Y estableceré mi campamento
  - Y pernoctaré
  lexicon: HALOT
  rationale: חנה expresa acampar o establecer campamento. En español, «acamparé» mantiene la imagen militar/protectora sin volverse arcaico ni perder la acción concreta.
- source_word: לְבֵיתִי
  english_pob_choice: at my house
  chosen_spanish: junto a mi casa
  alternatives_spanish:
  - en mi casa
  - para mi casa
  lexicon: HALOT
  rationale: La expresión literal es «para/ hacia mi casa», pero en el contexto de protección armada el español «junto a mi casa» comunica mejor la ubicación defensiva sin forzar una identificación exclusiva con el templo.
- source_word: מִצָּבָה
  english_pob_choice: as a guard
  chosen_spanish: como una guardia
  alternatives_spanish:
  - como una guarnición
  - como un puesto de guardia
  lexicon: HALOT
  rationale: El término puede designar un puesto establecido o guarnición. «Guardia» conserva la idea de vigilancia y defensa de manera natural en español; la alternativa «guarnición» es válida pero más técnica.
- source_word: מֵעֹבֵר וּמִשָּׁב
  english_pob_choice: so that none may pass to and fro
  chosen_spanish: para que nadie pase de un lado a otro
  alternatives_spanish:
  - para que nadie pase y regrese
  - para que nadie vaya y venga
  lexicon: HALOT
  rationale: La pareja verbal describe movimiento en ambas direcciones. «De un lado a otro» reproduce ese vaivén idiomático sin volverlo torpemente literal ni perder la idea de tránsito hostil.
- source_word: נֹגֵשׂ
  english_pob_choice: oppressor
  chosen_spanish: opresor
  alternatives_spanish:
  - exactor
  - capataz
  lexicon: HALOT
  rationale: נגשׂ puede referirse a quien exige, oprime o domina. «Opresor» es el equivalente más amplio y claro en este contexto profético; «exactor» es posible, pero estrecha el sentido a lo económico o fiscal.
- source_word: כִּי עַתָּה
  english_pob_choice: for now
  chosen_spanish: porque ahora
  alternatives_spanish:
  - pues ahora
  - ya que ahora
  lexicon: HALOT
  rationale: כִּי introduce la razón de la protección prometida. «Porque ahora» es natural en español y preserva el peso decisivo de עַתָּה como momento presente culminante.
- source_word: רָאִיתִי בְעֵינָי
  english_pob_choice: I have seen with my own eyes
  chosen_spanish: he visto con mis propios ojos
  alternatives_spanish:
  - he visto con estos ojos
  - lo he visto personalmente
  lexicon: HALOT
  rationale: El hebreo es un modismo de observación directa e inmediata. «Con mis propios ojos» conserva la fuerza enfática del sufijo posesivo y su sentido de testimonio personal.
theological_decisions:
- issue: Alcance de «mi casa»
  english_pob_reading: YHWH speaks of his own house/people under his protection, without narrowing it to temple alone in the main text.
  chosen_spanish_reading: «mi casa» se deja implícita como ámbito propio de Yahvé bajo protección, sin restringirla al templo en la línea principal.
  alternative_spanish_readings:
  - el templo
  - mi pueblo
  - mi casa como templo
  rationale: El hebreo permite una referencia amplia al ámbito de pertenencia de Yahvé, con eco del templo pero sin obligar a limitarlo a esa sola institución. La versión mantiene la expresión concreta y deja abierta la extensión referencial, como en el audit trail inglés.
  doctrine_reference: Zacarías 9:8; uso profético del lenguaje de casa/templo y protección divina
- issue: Valor de נֹגֵשׂ
  english_pob_reading: oppressor / exactor / taskmaster
  chosen_spanish_reading: «opresor»
  alternative_spanish_readings:
  - exactor
  - maestro de trabajos forzados
  rationale: El contexto es de dominación e invasión, no solo de cobro o administración. «Opresor» conserva la amplitud semántica y evita estrechar el referente.
  doctrine_reference: Éxodo 3:7; Isaías 14:4; Zacarías 9:8
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés POB: evita una traducción mecánica de los participios medios y refleja el sentido idiomático de movimiento «de un lado a otro». También conserva la tensión interpretativa sobre «mi casa» sin sobreespecificarla.'
  spanish_consistency_notes:
  - Se usa «Yahvé» cuando el texto fuente apunta al nombre divino, pero en este versículo la referencia directa es «mi casa», por lo que no se introduce el nombre en la línea principal.
  - «Opresor» se mantiene como término consistente para נגשׂ cuando el contexto es de dominación o violencia.
  - La imagen militar se expresa con vocabulario natural («acamparé», «guardia») sin perder la fuerza defensiva del hebreo.
