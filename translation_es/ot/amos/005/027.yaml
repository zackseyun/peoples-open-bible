    text: 'O: «los llevaré al exilio». El hebreo expresa literalmente una acción causativa de llevar al exilio.'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «los haré ir al exilio» por «los exiliaré» para lograr un español más natural sin perder la fuerza causativa del hebreo; la alternativa se conserva en nota. También se cambia «el Dios de los ejércitos» por «el Dios de las huestes» para reflejar mejor la decisión auditada sobre צבאות como título amplio, no restringido a ejércitos. Se mantiene «Yahvé» según la política del proyecto y la cláusula final según la revisión inglesa auditada.
