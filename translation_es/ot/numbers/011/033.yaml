translation:
  language: es
  text: Mientras la carne aún estaba entre sus dientes, antes de que fuera consumida[a], la ira de Yahvé se encendió contra el pueblo, y Yahvé hirió al pueblo con una plaga muy severa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «antes de ser cortada»; es decir, antes de que la carne se terminara o se consumiera.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבָּשָׂר
  english_pob_choice: the meat
  chosen_spanish: la carne
  alternatives_spanish:
  - la carne
  - la comida
  lexicon: HALOT
  rationale: En este contexto de codornices comidas, בָּשָׂר se refiere a la carne del animal como alimento. En español, 'la carne' conserva la referencia material y es natural; 'la comida' suaviza demasiado el término.
- source_word: עוֹדֶנּוּ
  english_pob_choice: was still
  chosen_spanish: aún estaba
  alternatives_spanish:
  - todavía estaba
  - seguía estando
  lexicon: HALOT
  rationale: El hebreo expresa continuidad. 'Aún estaba' integra esa idea de forma fluida en español sin perder el sentido de persistencia temporal.
- source_word: בֵּין שִׁנֵּיהֶם
  english_pob_choice: between their teeth
  chosen_spanish: entre sus dientes
  alternatives_spanish:
  - entre los dientes de ellos
  - entre sus mandíbulas
  lexicon: HALOT
  rationale: La imagen hebrea es directa e idiomática. 'Entre sus dientes' la conserva con naturalidad en español.
- source_word: טֶרֶם
  english_pob_choice: before
  chosen_spanish: antes de que
  alternatives_spanish:
  - antes de
  - todavía no
  lexicon: HALOT
  rationale: Tֶרֶם introduce un evento no realizado. 'Antes de que' reproduce bien la relación temporal en español y permite mantener el subjuntivo.
- source_word: יִכָּרֵת
  english_pob_choice: it was consumed
  chosen_spanish: fuera consumida
  alternatives_spanish:
  - fuera cortada
  - se acabara
  lexicon: HALOT
  rationale: El niphal de כרת significa literalmente 'ser cortado', pero en este contexto alimentario el sentido es que la carne aún no había sido terminada/consumida. 'Fuera consumida' comunica el sentido natural sin perder la tensión léxica detrás de la imagen.
- source_word: וְאַף יְהוָה חָרָה
  english_pob_choice: the LORD’s anger burned
  chosen_spanish: el furor de Yahvé se encendió
  alternatives_spanish:
  - la ira de Yahvé se encendió
  - Yahvé se airó
  lexicon: HALOT
  rationale: חרה אף es un modismo de ira ardiente. 'Furor... se encendió' conserva la metáfora del fuego y su fuerza retórica; 'ira' es posible, pero 'furor' comunica mejor la intensidad del hebreo en este contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio del pacto conforme al criterio POB para el Tetragrámaton. 'Yahvé' preserva la referencia personal que el hebreo usa aquí, en vez de ocultarla bajo un título.
- source_word: וַיַּךְ
  english_pob_choice: struck
  chosen_spanish: hirió
  alternatives_spanish:
  - golpeó
  - hirió de golpe
  - castigó
  lexicon: HALOT
  rationale: En contextos judiciales, נכה puede expresar golpear o herir con acción punitiva. 'Hirió' funciona bien en español bíblico moderno y mantiene la idea de juicio divino sin volverse demasiado coloquial.
- source_word: מַכָּה
  english_pob_choice: plague
  chosen_spanish: una plaga
  alternatives_spanish:
  - un golpe
  - una herida
  - un azote
  lexicon: HALOT
  rationale: Aunque literalmente significa 'golpe' o 'herida', en este tipo de juicio colectivo el término designa una plaga o aflicción devastadora. 'Plaga' es la correspondencia más clara en español.
- source_word: רַבָּה מְאֹד
  english_pob_choice: very severe
  chosen_spanish: muy severa
  alternatives_spanish:
  - muy grande
  - sumamente grave
  lexicon: HALOT
  rationale: El adjetivo con intensificador indica magnitud excepcional. 'Muy severa' sigue de cerca la revisión inglesa y suena natural en español para la gravedad del castigo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio divino en lugar de sustituirlo por un título. Esto mantiene la visibilidad del Tetragrámaton en la traducción española, en línea con el criterio doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Antropopatismo de la ira divina
  english_pob_reading: the LORD’s anger burned against the people
  chosen_spanish_reading: el furor de Yahvé se encendió contra el pueblo
  alternative_spanish_readings:
  - la ira de Yahvé se encendió contra el pueblo
  - Yahvé se enojó contra el pueblo
  rationale: Se conserva la metáfora de la ira 'ardiendo' para reflejar el hebreo חרה sin rebajarlo a una simple mención abstracta de enojo. 'Furor' enfatiza la intensidad del juicio, coherente con el contexto narrativo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión inglesa: se optó por una formulación natural en español para la severidad del castigo (''muy severa'') y se mantuvo la imagen hebrea del fuego para la ira divina, evitando suavizar el juicio narrado.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se preserva 'carne' para בָּשָׂר en contexto alimentario, sin imponer 'flesh' calco en español.
  - La nota al pie conserva la alternativa literal de כרת sin desplazar la lectura principal de 'consumida'.
  - '''Plaga'' se mantiene como término técnico de juicio colectivo, en lugar de ''golpe'' o ''azote'', por claridad bíblica en español.'
