translation:
  language: es
  text: 'Entonces dije[a]: «Que pongan un turbante limpio sobre su cabeza». Así pusieron el turbante limpio sobre su cabeza y lo vistieron con vestiduras[b], mientras el ángel de Yahvé estaba junto a ellos[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y dije». El hebreo con la conjunción puede verterse simplemente «y»; «entonces» refleja mejor el avance narrativo.'
    reason: lexical_alternative
  - marker: b
    text: «Limpio» también puede traducirse «puro», destacando la pureza ritual.
    reason: lexical_alternative
  - marker: c
    text: La expresión «el ángel de Yahvé» se traduce de manera transparente sin decidir si se trata de un mensajero creado o de una manifestación de Yahvé.
    reason: theological_note
lexical_decisions:
- source_word: וָאֹמַר
  english_pob_choice: Then I said
  chosen_spanish: Entonces dije
  alternatives_spanish:
  - Y dije
  - Y entonces dije
  lexicon: HALOT
  rationale: La forma con waw consecutiva avanza la narración; «Entonces dije» preserva el flujo narrativo con naturalidad en español sin perder la secuencia marcada por el hebreo.
- source_word: יָשִׂימוּ
  english_pob_choice: Let them put
  chosen_spanish: Que pongan
  alternatives_spanish:
  - Pongan
  - Que colocaran
  lexicon: HALOT
  rationale: El jussivo de tercera plural expresa petición o deseo; en español, «Que pongan» reproduce mejor ese matiz que un imperativo simple.
- source_word: צָנִיף
  english_pob_choice: turban
  chosen_spanish: turbante
  alternatives_spanish:
  - tocado
  - headdress
  lexicon: HALOT
  rationale: El término designa una prenda enrollada para la cabeza, adecuada al contexto sacerdotal. «Turbante» es el equivalente más claro y digno en español contemporáneo.
- source_word: טָהוֹר
  english_pob_choice: clean
  chosen_spanish: limpio
  alternatives_spanish:
  - puro
  lexicon: HALOT
  rationale: En este contexto ritual, «limpio» comunica la pureza ceremonial con buena naturalidad en español; «puro» también es posible, pero puede sonar más abstracto.
- source_word: עַל רֹאשׁוֹ
  english_pob_choice: on his head
  chosen_spanish: sobre su cabeza
  alternatives_spanish:
  - en su cabeza
  lexicon: HALOT
  rationale: La preposición עַל se expresa con mayor fidelidad y naturalidad aquí como «sobre».
- source_word: הַצָּנִיף הַטָּהוֹר
  english_pob_choice: the clean turban
  chosen_spanish: el turbante limpio
  alternatives_spanish:
  - el turbante puro
  lexicon: HALOT
  rationale: Se mantiene la repetición enfática del artículo y del adjetivo, reflejando la concreción narrativa del hebreo.
- source_word: וַיַּלְבִּשֻׁהוּ בְּגָדִים
  english_pob_choice: clothed him with garments
  chosen_spanish: lo vistieron con vestidos
  alternatives_spanish:
  - lo vistieron con prendas
  - lo cubrieron con ropas
  lexicon: HALOT
  rationale: El verbo causativo significa vestir a alguien. «Lo vistieron con vestidos» conserva el paralelismo formal con el hebreo; «vestidos» funciona aquí como término general para ropa/atuendo, sin forzar una especificación más técnica de la que el sustantivo ofrece.
- source_word: בְּגָדִים
  english_pob_choice: garments
  chosen_spanish: vestidos
  alternatives_spanish:
  - prendas
  - ropas
  - vestiduras
  lexicon: HALOT
  rationale: «Vestidos» es suficientemente amplio y solemne en español, y evita sobreespecificar el tipo de atuendo; «vestiduras» podría sonar más eclesiástico y menos directo.
- source_word: וּמַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el ángel de Yahveh
  - el mensajero de Yahvé
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para יְהוָה como «Yahvé». «Ángel» mantiene la transparencia del sintagma sin resolver la tensión interpretativa del texto.
- source_word: עֹמֵד
  english_pob_choice: was standing by
  chosen_spanish: estaba de pie
  alternatives_spanish:
  - estaba allí de pie
  - permanecía de pie
  lexicon: HALOT
  rationale: El participio expresa postura continua; «estaba de pie» preserva esa duratividad de forma clara y sobria en español.
theological_decisions:
- issue: Identidad y significado de מַלְאַךְ יְהוָה
  english_pob_reading: Render the phrase transparently as 'the angel of Yahweh' without specifying whether this is a created angel or a theophanic manifestation.
  chosen_spanish_reading: Traducir de forma transparente como «el ángel de Yahvé», sin decidir aquí si se trata de un mensajero creado o de una manifestación divina.
  alternative_spanish_readings:
  - el ángel de Yahvé como mensajero creado
  - el ángel de Yahvé como manifestación de Yahvé
  rationale: El hebreo no obliga a resolver la cuestión en este versículo; la traducción debe conservar la tensión interpretativa en vez de cerrarla prematuramente.
  doctrine_reference: Preservar la tensión teológica sin resolverla
- issue: Valor ritual de טָהוֹר aplicado al turbante
  english_pob_reading: '''Clean'' may also be rendered ''pure,'' highlighting ritual purity.'
  chosen_spanish_reading: «Limpio» connota aquí pureza ritual; «puro» queda como alternativa válida.
  alternative_spanish_readings:
  - puro
  - ritualmente limpio
  rationale: La escena es sacerdotal y ceremonial, por lo que conviene conservar el sentido de pureza ritual sin perder claridad idiomática en español.
  doctrine_reference: Pureza ritual en contexto sacerdotal
translation_notes:
  revision_awareness: La versión inglesa auditada ya fue revisada sin cambios sustanciales; el acuerdo de revisión fue alto (0.98), por lo que esta propuesta sigue de cerca las decisiones léxicas y teológicas documentadas, adaptándolas al español con equivalente naturalidad.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - 'Se conserva el paralelismo narrativo: petición de colocar el turbante, ejecución de la acción y cierre con la presencia del ángel.'
  - «Turbante» y «ángel» evitan tecnicismos no respaldados por el texto fuente.
  - No se introduce lenguaje eclesiástico adicional como «vestiduras sacerdotales», ya que el sustantivo hebreo solo dice «vestidos/garments».
