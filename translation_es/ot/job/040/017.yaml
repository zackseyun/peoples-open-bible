translation:
  language: es
  text: Endurece su cola como un cedro[a]; los tendones de sus muslos están entrelazados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los tendones de sus lomos»; o, más específicamente, «los músculos o tendones de sus genitales». El término hebreo es incierto y discutido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַחְפֹּץ
  english_pob_choice: makes ... stiff
  chosen_spanish: hace que ... se ponga rígida
  alternatives_spanish:
  - endurece
  - hace firme
  - tensa
  lexicon: HALOT
  rationale: 'El contexto no expresa ''deleitarse'' sino una imagen física: la cola del animal se compara con un cedro por su firmeza. ''Hace que ... se ponga rígida'' reproduce esa acción causativa sin sonar forzado en español.'
- source_word: זְנָבוֹ
  english_pob_choice: his tail
  chosen_spanish: su cola
  alternatives_spanish:
  - su rabo
  lexicon: HALOT
  rationale: '''Cola'' es el equivalente más neutro y digno en español para un poema descriptivo de animal. Conserva el referente directo del hebreo.'
- source_word: כְמוֹ אָרֶז
  english_pob_choice: like a cedar
  chosen_spanish: como un cedro
  alternatives_spanish:
  - como el cedro
  lexicon: HALOT
  rationale: El hebreo presenta la comparación de manera indefinida; 'como un cedro' mantiene esa forma y comunica la imagen de firmeza y tamaño.
- source_word: גִּידֵי
  english_pob_choice: the sinews of
  chosen_spanish: los tendones de
  alternatives_spanish:
  - los músculos de
  - los ligamentos de
  lexicon: HALOT
  rationale: '''גִּיד'' puede referirse a tendón/sinew. En español, ''tendones'' es preciso y comprensible; ''sinews'' no es natural como término técnico general.'
- source_word: פחד/ו
  english_pob_choice: his thighs
  chosen_spanish: sus muslos
  alternatives_spanish:
  - sus lomos
  - sus ingles
  - sus genitales
  lexicon: HALOT
  rationale: Sigo la lectura adoptada por la POB inglesa para la claridad del verso principal. 'Muslos' mantiene el tono sobrio y deja visible que el término hebreo es debatido.
- source_word: יְשֹׂרָגוּ
  english_pob_choice: are knit together
  chosen_spanish: quedan entrelazados
  alternatives_spanish:
  - están entretejidos
  - se entrelazan
  - quedan trenzados
  lexicon: HALOT
  rationale: El verbo expresa entrecruzamiento o entretejido. 'Quedan entrelazados' transmite el resultado de esa unión compacta en una forma natural en español.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto inglés quedó igual, con acuerdo alto entre revisores. Se conservó la decisión inglesa sobre la imagen física de la cola y la nota sobre la ambigüedad de פַחֲדוֹ.
  spanish_consistency_notes:
  - Se mantiene 'cola' para זְנָב con registro digno y literal.
  - Se evita 'SEÑOR' u otras fórmulas teológicas porque este verso no contiene lenguaje divino.
  - La nota al pie preserva la tensión léxica documentada sin imponer una solución única sobre פַחֲדוֹ.
