translation:
  language: es
  text: 'Y cuando terminó de ofrecer el holocausto, Jehú dijo a los corredores y a los oficiales: «Entren; derríbenlos. Que nadie salga». Los hirieron con el filo de la espada, y los corredores y los oficiales los arrojaron fuera y avanzaron hasta el santuario interior[a] de la casa de Baal.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hasta la ciudad/ciudadela de la casa de Baal»; la expresión puede referirse a un área interna fortificada o a un recinto sagrado interior del complejo del templo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּכַלֹּתוֹ
  english_pob_choice: when he had finished
  chosen_spanish: cuando terminó
  alternatives_spanish:
  - cuando había terminado
  - al terminar
  lexicon: HALOT
  rationale: El infinitivo constructo con כ + sufijo expresa secuencia temporal. En español, «cuando terminó» reproduce bien la relación narrativa sin añadir una perífrasis más pesada que el hebreo no exige.
- source_word: לַעֲשׂוֹת הָעֹלָה
  english_pob_choice: offering the burnt offering
  chosen_spanish: de ofrecer el holocausto
  alternatives_spanish:
  - de presentar el holocausto
  - de hacer el holocausto
  lexicon: HALOT
  rationale: עָשָׂה con עֹלָה es un giro sacrificial; en español «ofrecer el holocausto» es natural y preserva el valor cultual. Se usa «holocausto» para reflejar el sacrificio completo de la עֹלָה, como en la tradición bíblica española, sin perder la referencia técnica.
- source_word: הָעֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - el sacrificio quemado
  - la ofrenda totalmente quemada
  lexicon: HALOT
  rationale: El término cultual estándar en español para עֹלָה es «holocausto». Aunque «burnt offering» puede expresarse como «ofrenda quemada», la forma tradicional y precisa aquí es más fiel al género sacrificial.
- source_word: לָרָצִים
  english_pob_choice: to the runners
  chosen_spanish: a los corredores
  alternatives_spanish:
  - a los mensajeros
  - a los guardias
  lexicon: HALOT
  rationale: Rָצִים significa literalmente «corredores» o «los que corren». Se conserva esa transparencia léxica en español; el contexto militar/cortesano ya aclara su función.
- source_word: לַשָּׁלִשִׁים
  english_pob_choice: to the officers
  chosen_spanish: y a los oficiales
  alternatives_spanish:
  - y a los capitanes
  - y a los ayudantes militares
  lexicon: HALOT
  rationale: שָׁלִישׁ puede referirse a un oficial militar de rango. «Oficiales» es suficientemente amplio en español para no forzar una reconstrucción más específica que el texto no exige.
- source_word: בֹּאוּ
  english_pob_choice: Go in
  chosen_spanish: Entren
  alternatives_spanish:
  - Pasen
  - Vayan adentro
  lexicon: HALOT
  rationale: El mandato es direccional desde la perspectiva de Jehú respecto del recinto. «Entren» transmite de forma natural y clara la acción de ingresar al lugar.
- source_word: הַכּוּם
  english_pob_choice: strike them down
  chosen_spanish: mátenlos
  alternatives_spanish:
  - derríbenlos
  - hiérenlos mortalmente
  lexicon: HALOT
  rationale: נכה abarca golpear y, en este contexto bélico/judicial, matar. Aunque «golpéenlos» sería más literal, en español sonaría atenuado; «mátenlos» comunica el resultado previsto por la orden, mientras «los hirieron con el filo de la espada» mantiene el verbo de la narración.
- source_word: אִישׁ אַל יֵצֵא
  english_pob_choice: Let no man come out
  chosen_spanish: Que nadie salga
  alternatives_spanish:
  - Que ningún hombre salga
  - No salga nadie
  lexicon: HALOT
  rationale: El hebreo usa un singular distributivo con valor negativo. «Que nadie salga» es idiomático en español y preserva la prohibición absoluta sin introducir una marca masculina innecesaria.
- source_word: לְפִי חָרֶב
  english_pob_choice: with the edge of the sword
  chosen_spanish: con el filo de la espada
  alternatives_spanish:
  - a filo de espada
  - con la boca de la espada
  lexicon: HALOT
  rationale: La expresión literal es «por la boca de la espada», pero el equivalente idiomático en español es «con el filo de la espada» o «a filo de espada». Se elige «con el filo de la espada» por claridad y porque conserva la imagen del borde cortante.
- source_word: וַיַּשְׁלִכוּ
  english_pob_choice: threw them out
  chosen_spanish: los arrojaron
  alternatives_spanish:
  - los echaron
  - los lanzaron
  lexicon: HALOT
  rationale: El verbo significa arrojar/castar. En este contexto, la acción sobre los cadáveres o cuerpos resulta mejor con «los arrojaron», que mantiene la dureza del gesto sin especificar más de lo que dice el hebreo.
- source_word: עַד עִיר בֵּית הַבָּעַל
  english_pob_choice: as far as the inner shrine of the house of Baal
  chosen_spanish: hasta la ciudad de la casa de Baal
  alternatives_spanish:
  - hasta la ciudadela de la casa de Baal
  - hasta el santuario interior de la casa de Baal
  lexicon: HALOT
  rationale: עִיר puede significar «ciudad», pero el contexto arquitectónico/templeario permite otra lectura. En el texto principal se mantiene la forma más transparente, «ciudad», y se deja constancia de la posible referencia a un área interna o fortificada en la nota.
theological_decisions:
- issue: Traducción de עֹלָה y posible carga cultual del término
  english_pob_reading: burnt offering
  chosen_spanish_reading: holocausto
  alternative_spanish_readings:
  - ofrenda quemada
  - sacrificio totalmente quemado
  rationale: No hay tensión doctrinal especial aquí, pero sí una decisión terminológica. «Holocausto» es el equivalente cultual tradicional para עֹלָה en español bíblico y preserva la referencia al sacrificio entero quemado.
  doctrine_reference: Culto sacrificial del Antiguo Testamento
- issue: 'Valor de la orden de Jehú: golpe o ejecución'
  english_pob_reading: strike them down
  chosen_spanish_reading: mátenlos
  alternative_spanish_readings:
  - hiérenlos
  - derríbenlos
  rationale: El hebreo נכה es amplio, pero en este contexto el resultado es claramente letal. «Mátenlos» explicita la fuerza de la orden; la narración inmediata con «los hirieron con el filo de la espada» conserva el verbo de acción física del original.
  doctrine_reference: Narrativa histórica y violencia judicial en el texto bíblico
translation_notes:
  revision_awareness: El borrador sigue la lectura revisada del contexto inglés POB con acuerdo alto y sin cambios aplicados en la última pasada; no hay revisiones textuales pendientes que afecten la traducción española. Se conservó la tensión léxica de עִיר mediante una nota, en lugar de resolverla definitivamente en el texto principal.
  spanish_consistency_notes:
  - Se mantiene «Jehú» para יֵהוּא y «Baal» para el nombre del dios, conforme al uso bíblico establecido.
  - Se traduce רָצִים de forma literal como «corredores» para conservar la transparencia léxica del hebreo.
  - Se usa puntuación española con comillas angulares y dos puntos introductorios para el discurso directo.
  - La combinación de verbo narrativo y orden militar se ajusta al español actual sin suavizar la violencia del pasaje.
  - La nota sobre עִיר preserva la ambigüedad arquitectónica documentada por la POB inglesa.
