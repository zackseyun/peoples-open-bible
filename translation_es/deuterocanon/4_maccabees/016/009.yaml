translation:
  language: es
  text: '¡Oh, hijos míos: unos solteros y otros casados, pero sin hijos[a]! No veré a los hijos de ustedes, ni seré considerada dichosa cuando me llamen abuela.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ἄνοιντοι probablemente significa «sin hijos» o «sin descendencia»; el sentido es que incluso los hijos casados no dejarían a la hablante nietos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὦ τῶν ἐμῶν παίδων
  english_pob_choice: O my children
  chosen_spanish: ¡Oh, hijos míos!
  alternatives_spanish:
  - ¡Oh, mis hijos!
  - ¡Oh, hijos de mi corazón!
  lexicon: LSJ
  rationale: παῖδες puede abarcar hijos/descendencia en un lamento materno. En español, «hijos míos» conserva la relación directa y el tono afectivo con naturalidad y sin perder el sentido colectivo.
- source_word: ἄγαμοι
  english_pob_choice: unmarried
  chosen_spanish: solteros
  alternatives_spanish:
  - no casados
  - sin casar
  lexicon: LSJ
  rationale: El griego expresa la condición de no estar casados. «Solteros» es una equivalencia moderna y clara en español; se mantiene el matiz de estado civil sin sobrecargar la frase.
- source_word: γαμήσαντες
  english_pob_choice: married
  chosen_spanish: casados
  alternatives_spanish:
  - habiéndose casado
  - los que se casaron
  lexicon: LSJ
  rationale: El participio señala a los que habían entrado en matrimonio. «Casados» comunica el estado resultante de forma idiomática y concordante con el paralelismo de la oración.
- source_word: ἄνοιντοι
  english_pob_choice: childless
  chosen_spanish: sin hijos
  alternatives_spanish:
  - sin descendencia
  - sin prole
  lexicon: LSJ
  rationale: Sigo la decisión inglesa de entender el término como ausencia de descendencia. «Sin hijos» es la forma más natural en español y mantiene visible la tensión con la cláusula siguiente sobre los hijos de ellos.
- source_word: οὐκ ὄψομαι ὑμῶν τέκνα
  english_pob_choice: I will not see your children
  chosen_spanish: No veré a los hijos de ustedes
  alternatives_spanish:
  - No veré sus hijos
  - No veré a sus hijos
  lexicon: LSJ
  rationale: τέκνα se refiere a la siguiente generación. «Los hijos de ustedes» es una expresión clara y familiar en español, apta para el lamento, y preserva el sentido relacional de la frase.
- source_word: μάμμη
  english_pob_choice: grandmother
  chosen_spanish: abuela
  alternatives_spanish:
  - nona
  - yaya
  lexicon: LSJ
  rationale: μάμμη es un término afectivo para «abuela». «Abuela» es el equivalente natural y estándar en español, sin introducir regionalismos.
- source_word: κληθεῖσα μακαρισθήσομαι
  english_pob_choice: will be counted blessed when I am called
  chosen_spanish: seré llamada abuela cuando se me llame así
  alternatives_spanish:
  - seré considerada dichosa cuando me llamen abuela
  - seré tenida por bienaventurada cuando me llamen abuela
  lexicon: LSJ
  rationale: El griego combina el ser llamada con el ser considerada feliz/bienaventurada. En español, la primera parte queda explícita en «seré llamada abuela»; la pérdida de la valoración social se conserva por el contexto lamentoso, aunque la formulación resulte más natural que una calca de «contada/blessed».
translation_notes:
  revision_awareness: El texto inglés fue revisado de «be blessed» a «be counted blessed» para reflejar mejor μακαρισθήσομαι; la versión española evita una calca opaca y mantiene la fuerza del lamento mediante la llamada final a ser abuela, con la pérdida de nietos implícita en el contexto inmediato.
  spanish_consistency_notes:
  - Se conservó un registro solemne pero idiomático, adecuado para una lectura pública.
  - Se eligió «sin hijos» para reflejar la lectura contextual de ἄνοιντοι y evitar una terminología biológica más dura.
  - No se usó «Cristo», «Yahvé» ni otros términos teológicos porque el versículo no los contiene.
