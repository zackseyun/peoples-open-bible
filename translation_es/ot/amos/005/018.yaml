translation:
  language: es
  text: ¡Ay de los que anhelan el día de Yahvé! ¿Para qué quieren ustedes el día de Yahvé? Es tiniebla[a], y no luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Por qué quieren ustedes el día de Yahvé?». El hebreo es idiomático y retórico.'
    reason: alternative_reading
lexical_decisions:
- source_word: הוֹי
  english_pob_choice: Woe
  chosen_spanish: ¡Ay de!
  alternatives_spanish:
  - ¡Ay!
  - ¡Ay de aquellos que!
  lexicon: HALOT
  rationale: En español, «¡Ay de!» conserva bien el tono profético de lamento y denuncia de «Woe» sin sonar forzado. Mantiene la fuerza oracular dirigida contra los destinatarios.
- source_word: הַמִּתְאַוִּים
  english_pob_choice: those who long for
  chosen_spanish: los que anhelan
  alternatives_spanish:
  - los que desean
  - los que codician
  lexicon: HALOT
  rationale: El participio hitpael expresa deseo persistente y vehemente. «Anhelan» comunica esa aspiración sostenida con naturalidad en español, y conserva el matiz irónico del reproche.
- source_word: אֶת יּוֹם יְהוָה
  english_pob_choice: for the day of Yahweh
  chosen_spanish: el día de Yahvé
  alternatives_spanish:
  - para el día de Yahvé
  - del día de Yahvé
  lexicon: HALOT
  rationale: En español, el verbo «anhelar» ya rige de manera natural el objeto directo, por lo que no hace falta repetir una preposición equivalente a la de la versión inglesa. Se conserva la expresión profética fija «día de Yahvé» según el criterio del proyecto para el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: «Yahvé», manteniendo el nombre del pacto en vez de ocultarlo tras «SEÑOR».'
- source_word: לָמָּה זֶּה לָכֶם
  english_pob_choice: Why would you have
  chosen_spanish: ¿Para qué quieren ustedes
  alternatives_spanish:
  - ¿Por qué lo quieren ustedes?
  - ¿Por qué desean ustedes esto?
  lexicon: HALOT
  rationale: La construcción hebrea es idiomática y retórica. «¿Para qué quieren ustedes?» transmite la pregunta de desafío sobre la utilidad o provecho imaginado, sin forzar un calco literal que sonaría ajeno al español.
- source_word: יּוֹם יְהוָה הוּא חֹשֶׁךְ וְלֹא אֽוֹר
  english_pob_choice: It is darkness, and not light
  chosen_spanish: Es tiniebla, y no luz
  alternatives_spanish:
  - Es oscuridad, y no luz
  - Ese día es tiniebla, y no luz
  lexicon: HALOT
  rationale: «Tiniebla» reproduce con fuerza la metáfora absoluta del hebreo y mantiene el contraste tajante con «luz». La forma breve «Es tiniebla» preserva el carácter sentencioso del original.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. La política del proyecto en español exige «Yahvé» para no enmascarar el nombre divino y para conservar la referencia del pacto con claridad.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Idiomatic rhetorical question in לָמָּה זֶּה לָכֶם
  english_pob_reading: Why would you have the day of Yahweh?
  chosen_spanish_reading: ¿Para qué quieren ustedes el día de Yahvé?
  alternative_spanish_readings:
  - ¿Por qué desean ustedes el día de Yahvé?
  - ¿Qué ventaja esperan del día de Yahvé?
  rationale: La pregunta hebrea es retórica y desafiante, no una mera solicitud de información. «¿Para qué quieren ustedes...?» conserva esa ironía y la idea de expectativa de beneficio implícita en la frase.
  doctrine_reference: Amos 5:18 rhetorical rebuke and day-of-Yahweh judgment motif
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y la auditoría inglesa sin depender mecánicamente de ella. Mantiene la tensión del hebreo en la pregunta retórica, conserva el nombre divino como Yahvé y refleja el contraste absoluto entre tiniebla y luz con un español natural y publicable.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme al criterio del proyecto.
  - «Anhelan» conserva el matiz de deseo persistente del participio hebreo.
  - La pregunta se formula con «¿Para qué...?» para reflejar el desafío retórico del original; la nota al pie preserva la alternativa literal posible.
  - «Tiniebla» se eligió por su fuerza poética y su contraste directo con «luz».
