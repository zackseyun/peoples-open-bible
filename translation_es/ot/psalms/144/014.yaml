    issue: «Nuestros ganados» es poco idiomático en español general.
    rationale: Aunque comprensible, el plural «ganados» aquí suena forzado. «Nuestro ganado» expresa mejor el colectivo de cattle y es más natural y legible.
  - severity: medium
    issue: «Están preñados» reduce la imaginería de «loaded/heavy with young» y suena algo tosco.
    rationale: La decisión contextual de fecundidad es correcta, pero «cargado de crías» representa mejor la metáfora de estar cargado/pesado con crías, preservando la justificación léxica documentada.
  - severity: low
    issue: Falta la nota breve paralela a la nota inglesa previa sobre «and no going out».
    rationale: 'El POB inglés conserva dos notas sobre יוֹצֵאת: una de alternativa interpretativa y otra de formulación literal previa. En español conviene reflejar ambas para mantener el rastro auditado y la ambigüedad.'
