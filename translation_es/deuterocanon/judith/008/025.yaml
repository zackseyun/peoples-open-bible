translation:
  language: es
  text: Además de todo esto[a], demos gracias al Señor nuestro Dios, que nos pone a prueba[b] como también probó a nuestros padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «A pesar de todo esto».
    reason: lexical_alternative
  - marker: b
    text: El verbo griego también puede significar «tentar»; aquí el sentido se entiende mejor como prueba divina.
    reason: theological_note
lexical_decisions:
- source_word: παρὰ ταῦτα πάντα
  english_pob_choice: Besides all this
  chosen_spanish: Además de todo esto
  alternatives_spanish:
  - A pesar de todo esto
  - Junto con todo esto
  - Más allá de todo esto
  lexicon: LSJ
  rationale: La frase griega introduce una exhortación que se suma a las circunstancias previas. «Además de todo esto» conserva bien el valor aditivo y resulta natural en español. Se evitó «a pesar de» porque enfatiza más la oposición que la adición, y «junto con» suena menos idiomático en este inicio exhortativo.
- source_word: εὐχαριστήσωμεν
  english_pob_choice: let us give thanks
  chosen_spanish: demos gracias
  alternatives_spanish:
  - démosle gracias
  - seamos agradecidos
  - agradezcamos
  lexicon: BDAG
  rationale: El subjuntivo exhortativo de primera persona plural se expresa de forma natural con «demos gracias». Mantiene el tono litúrgico y la acción verbal explícita mejor que una simple idea adjetival de gratitud.
- source_word: Κυρίῳ
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: Se conserva el título reverencial «Señor», que es el equivalente normal en español para κύριος en este contexto judío-scriptural. «Maestro» no transmite adecuadamente el registro teológico.
- source_word: τῷ θεῷ ἡμῶν
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - Dios nuestro
  lexicon: BDAG
  rationale: Se mantiene el posesivo comunitario y de alianza con «nuestro Dios». El orden elegido es el más fluido y natural en español contemporáneo.
- source_word: πειράζει
  english_pob_choice: tests
  chosen_spanish: nos prueba
  alternatives_spanish:
  - nos examina
  - nos tienta
  - nos pone a prueba
  lexicon: BDAG
  rationale: El verbo puede significar probar, tentar o someter a prueba. Aquí, como en el contexto auditado de la POB inglesa, la mejor lectura es «probar» en el sentido de afinar o verificar la fidelidad del pueblo. «Nos prueba» conserva la tensión teológica sin cargar el texto con la connotación moral más fuerte de «tienta».
- source_word: καθὰ καὶ
  english_pob_choice: just as he also
  chosen_spanish: como también
  alternatives_spanish:
  - así como también
  - tal como también
  lexicon: LSJ
  rationale: La construcción comparativa y aditiva se expresa de forma breve y natural con «como también». En español comunica la equivalencia con el trato previo a los antepasados sin forzar una repetición pesada.
- source_word: τοὺς πατέρας ἡμῶν
  english_pob_choice: our fathers
  chosen_spanish: nuestros padres
  alternatives_spanish:
  - nuestros antepasados
  - nuestros padres [ancestros]
  lexicon: BDAG
  rationale: Se mantiene el valor literal del masculino plural griego con «nuestros padres». En español bíblico puede designar a los antepasados de Israel; se evita neutralizarlo en el texto principal para no borrar la forma de la fuente.
theological_decisions:
- issue: πειράζει aplicado a Dios
  english_pob_reading: tests us
  chosen_spanish_reading: nos prueba
  alternative_spanish_readings:
  - nos tienta
  - nos examina
  - nos pone a prueba
  rationale: La frase habla de la acción divina sobre el pueblo en continuidad con la historia de Israel. «Nos prueba» conserva la ambivalencia bíblica de la prueba divina sin adoptar «tienta», que en español sugiere una intención moralmente corruptora.
  doctrine_reference: Preservar la tensión bíblica entre prueba y tentación sin resolverla artificialmente
- issue: τοὺς πατέρας ἡμῶν como referencia a generaciones previas
  english_pob_reading: our fathers
  chosen_spanish_reading: nuestros padres
  alternative_spanish_readings:
  - nuestros antepasados
  - nuestros mayores
  rationale: La fuente es masculinidad explícita y la tradición bíblica usa esta expresión para los progenitores/antepasados de Israel. Se conserva la forma literal para respetar la dicción de la fuente y la política de precisión de género del proyecto.
  doctrine_reference: Precisión formal y continuidad bíblica de la memoria de Israel
translation_notes:
  revision_awareness: La versión inglesa final revisó el arranque desde una formulación más libre a «Besides all this» y prefirió el presente simple «tests». La línea española sigue esa revisión con «Además de todo esto» y «nos prueba», evitando una progresividad innecesaria y manteniendo una equivalencia natural con el griego.
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κύριος conforme al uso bíblico reverencial del proyecto.
  - Se conservó «Dios» para θεός sin pluralizar ni suavizar el término.
  - Se eligió «nuestros padres» para reflejar el masculino plural del griego y la referencia histórica a los antepasados de Israel.
  - El verbo «prueba» preserva la tensión semántica de πειράζει sin convertirla en «tienta» en el texto principal.
  - La sintaxis española mantiene una sola oración compuesta, como en el griego, con cadencia litúrgica y claridad contemporánea.
