translation:
  language: es
  text: En la llanura del Jordán el rey los hizo de fundición en tierra arcillosa, entre Sucot y Zeredá.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo en 1 Reyes 7:46 nombra el lugar como «Zaretán». Aquí Crónicas lee «Zeredá», probablemente una variante del mismo nombre de lugar.
    reason: textual_variant
lexical_decisions:
- source_word: בְּכִכַּר הַיַּרְדֵּן
  english_pob_choice: in the plain of the Jordan
  chosen_spanish: en la llanura del Jordán
  alternatives_spanish:
  - en la comarca circular del Jordán
  - en el valle del Jordán
  lexicon: HALOT
  rationale: כִּכָּר puede designar una región redonda, llanura o valle. En este contexto geográfico, «llanura» comunica de forma natural el sentido topográfico sin perder la referencia regional del Jordán.
- source_word: יְצָקָם
  english_pob_choice: cast them
  chosen_spanish: los fundió
  alternatives_spanish:
  - los vació
  - los echó
  - los fundió en moldes
  lexicon: HALOT
  rationale: El verbo יצק se usa para verter o fundir metal. Como el contexto trata de objetos de bronce, «los fundió» expresa mejor en español la fabricación metalúrgica, manteniendo el plural del objeto.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: La referencia definida apunta al rey conocido por el contexto; «el rey» es la traducción directa y natural.
- source_word: בַּעֲבִי הָאֲדָמָה
  english_pob_choice: in the clay ground
  chosen_spanish: en tierra arcillosa
  alternatives_spanish:
  - en suelo arcilloso
  - en la arcilla
  - en tierra espesa
  lexicon: HALOT
  rationale: עֲבִי denota grosor o densidad; con אֲדָמָה describe un suelo compacto, apto para moldes de fundición. «Tierra arcillosa» transmite ese valor práctico con claridad en español.
- source_word: בֵּין סֻכּוֹת וּבֵין צְרֵדָתָה
  english_pob_choice: between Sukkoth and Zeredah
  chosen_spanish: entre Sucot y Zeredá
  alternatives_spanish:
  - entre Sucot y Zereda
  - entre Sucot y Zaretán
  lexicon: HALOT
  rationale: Los nombres propios se transliteran según el uso coherente del proyecto. Se conserva la forma crónica צְרֵדָתָה como «Zeredá»; la forma paralela de Reyes se registra en la nota textual.
theological_decisions:
- issue: Variación toponímica entre Crónicas y 1 Reyes
  english_pob_reading: The parallel in 1 Kings 7:46 names the location as 'Zarethan.' Chronicles here reads 'Zeredah,' likely a variant form of the same place-name.
  chosen_spanish_reading: Crónicas lee «Zeredá»; el paralelo de 1 Reyes usa «Zaretán», probable variante del mismo topónimo.
  alternative_spanish_readings:
  - Crónicas y Reyes nombran lugares distintos
  - Zeredá es una forma distinta sin relación con Zaretán
  rationale: La nota debe preservar la tensión documental entre ambos pasajes sin resolverla artificialmente. Se mantiene la explicación de variante probable del mismo nombre propio.
  doctrine_reference: Crítica textual bíblica; armonización de paralelos
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios sustantivos: topografía en «llanura», sentido metalúrgico de יצק en «fundió», y conservación de la variación toponímica con nota textual.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; aquí no aparece.
  - «Sucot» y «Zeredá» se mantienen como topónimos transliterados, no traducidos.
  - «Tierra arcillosa» evita un calco opaco de «espesor de la tierra» y conserva la función de fundición indicada por el contexto.
