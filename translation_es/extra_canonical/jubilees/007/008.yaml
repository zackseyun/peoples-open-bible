  yaml_path: translation/extra_canonical/jubilees/007/008.yaml
  text: And Ham saw Noah his father naked[7:8], and he went out and told his two brothers outside. And Shem took a garment, and he and Japheth laid the garment on their shoulders.
  footnotes:
  - marker: '7:8'
    text: 'The source rows are segmented unusually here: the action of Shem and Japheth begins in the row labeled verse 8, while the backward covering continues in the row labeled 18. The translation regularizes this into consecutive narrative verses.'
    reason: segmentation_note
  - marker: a
    text: Or 'And Shem took a garment, and he and Japheth laid the garment on their shoulders, and going backward they covered the shame of their father, and their faces were turned backward.'.
    reason: previous_rendering
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:45Z'
    unchanged: false
    changes_summary: 'Restored omitted material at the beginning of the verse: Ham seeing Noah his father naked and going out to tell his two brothers outside. Kept the rest largely intact, with a slight adjustment for flow.'
translation:
  language: es
  text: Y Cam vio a Noé su padre desnudo, y salió y se lo contó a sus dos hermanos fuera. Y Sem tomó una prenda, y él y Jafet la pusieron sobre sus hombros.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: አቡሁ
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - su progenitor
  - su papá
  lexicon: poseedor familiar
  rationale: Conserva la relación filial directa y natural del pasaje; «su padre» es la forma más neutra y bíblicamente clara en español.
- source_word: ዕራቆ
  english_pob_choice: naked
  chosen_spanish: desnudo
  alternatives_spanish:
  - en desnudez
  - sin ropa
  lexicon: estado corporal
  rationale: «Desnudo» es la equivalencia directa y más sobria para la condición física descrita por el ge'ez.
- source_word: በአፍአ
  english_pob_choice: outside
  chosen_spanish: afuera
  alternatives_spanish:
  - fuera
  - al exterior
  lexicon: adverbio locativo
  rationale: «Afuera» comunica con naturalidad el valor locativo de «outside» y mantiene el flujo narrativo.
- source_word: ልብሰ
  english_pob_choice: a garment
  chosen_spanish: una prenda
  alternatives_spanish:
  - un manto
  - una vestidura
  - un vestido
  lexicon: ropa
  rationale: La fuente sólo especifica una pieza de ropa, sin precisar tipo. «Prenda» preserva la indeterminación del original sin cargarlo con una prenda litúrgica o más específica.
- source_word: መታክፍቲሆሙ
  english_pob_choice: their shoulders
  chosen_spanish: sus hombros
  alternatives_spanish:
  - sobre sus hombros
  - encima de sus hombros
  lexicon: parte del cuerpo
  rationale: Mantiene el sentido corporal literal y la imagen de cargar la prenda conjuntamente.
theological_decisions:
- issue: La escena de la desnudez de Noé y la vergüenza familiar
  english_pob_reading: Ham saw Noah his father naked; Shem and Japheth later cover the shame of their father.
  chosen_spanish_reading: Cam vio a Noé, su padre, desnudo; Sem y Jafet luego cargan la prenda sobre sus hombros.
  alternative_spanish_readings:
  - Cam vio a Noé desnudo
  - Cam vio la desnudez de Noé
  rationale: El texto ge'ez preserva el hecho de la desnudez sin explicitar aquí la cobertura vergonzosa posterior, que la revisión inglesa reservó para el versículo siguiente. La redacción española mantiene esa tensión y no anticipa material ausente del segmento fuente.
  doctrine_reference: Jubilees 7:8–9 (segmentación narrativa); comparación con la continuidad textual indicada por el audit trail inglés
translation_notes:
  revision_awareness: 'La versión inglesa del POB pasó por una corrección importante: se restauró al inicio del versículo que Cam vio a Noé desnudo y salió a decírselo a sus hermanos, y luego se retiró del versículo 8 el material de cobertura que pertenecía al versículo 9. Esta traducción sigue esa segmentación revisada y evita incluir aquí la acción de ir de espaldas o cubrir la vergüenza.'
  spanish_consistency_notes:
  - Se usa «Cam» y no «Jam» para seguir el nombre tradicionalizado en el contexto POB inglés.
  - Se usa «Jafet» para la forma española estándar del nombre.
  - Se mantiene «Noé» y «Sem» con acentuación española habitual.
  - No se introduce «Señor» ni terminología teológica no presente en el segmento.
