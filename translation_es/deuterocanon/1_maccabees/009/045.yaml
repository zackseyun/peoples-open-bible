translation:
  language: es
  text: Pues[a] he aquí, la batalla está delante de nosotros y detrás de nosotros, mientras las aguas del Jordán están de este lado y de aquel, con pantano y bosque, y no hay lugar para desviarse[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «miren» o «fíjense». El griego introduce un llamado de atención a la situación.
    reason: lexical_alternative
  - marker: b
    text: O «no hay lugar para retirarse» o «para escapar». El griego dice literalmente «para desviarse», que en este contexto se refiere a no tener ruta de salida.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ γὰρ
  english_pob_choice: For behold
  chosen_spanish: Pues he aquí
  alternatives_spanish:
  - Porque he aquí
  - Mira, pues
  lexicon: LSJ
  rationale: Conserva la fuerza discursiva de ἰδού y el valor explicativo de γάρ con un español natural y solemne. 'Pues' refleja la conexión causal/expositiva; 'he aquí' mantiene el llamado a prestar atención.
- source_word: ὁ πόλεμος
  english_pob_choice: battle
  chosen_spanish: la batalla
  alternatives_spanish:
  - la guerra
  - el combate
  lexicon: LSJ
  rationale: En el contexto táctico inmediato, el término apunta a la situación bélica concreta y no a la guerra en sentido amplio. 'Batalla' es más preciso y natural que 'guerra' aquí.
- source_word: ἐξ ἐναντίας ἡμῶν
  english_pob_choice: before us
  chosen_spanish: delante de nosotros
  alternatives_spanish:
  - ante nosotros
  - frente a nosotros
  lexicon: LSJ
  rationale: La relación espacial es la de una amenaza situada enfrente, en contraste con 'detrás de nosotros'. 'Delante de nosotros' es claro y conserva el sentido topográfico.
- source_word: ἐξόπισθεν ἡμῶν
  english_pob_choice: behind us
  chosen_spanish: detrás de nosotros
  alternatives_spanish:
  - a nuestra retaguardia
  - tras nosotros
  lexicon: LSJ
  rationale: Traducción espacial directa y natural, correspondiente al encierro militar descrito por el griego.
- source_word: τὸ δὲ ὕδωρ τοῦ Ἰορδάνου
  english_pob_choice: the water of the Jordan
  chosen_spanish: las aguas del Jordán
  alternatives_spanish:
  - el agua del Jordán
  - las aguas del río Jordán
  lexicon: LSJ
  rationale: El plural castellano 'las aguas' suena más idiomático cuando el agua funciona como obstáculo geográfico, sin perder el énfasis del griego en el medio acuático como barrera.
- source_word: ἔνθεν καὶ ἔνθεν
  english_pob_choice: on this side and on that
  chosen_spanish: de este lado y de aquel
  alternatives_spanish:
  - de un lado y de otro
  - a ambos lados
  lexicon: LSJ
  rationale: Preserva más de cerca la distribución espacial del griego y evita nivelarla demasiado con una formulación más resumida.
- source_word: ἕλος
  english_pob_choice: marsh
  chosen_spanish: pantano
  alternatives_spanish:
  - marjal
  - ciénaga
  lexicon: LSJ
  rationale: '''Pantano'' es el equivalente más claro y ampliamente entendido en español. Mantiene la idea de terreno anegado y dificultoso.'
- source_word: δρυμός
  english_pob_choice: forest
  chosen_spanish: bosque
  alternatives_spanish:
  - selva
  - arboleda
  - matorral
  lexicon: LSJ
  rationale: '''Bosque'' transmite un área arbolada que funciona como obstáculo del terreno. ''Selva'' sería demasiado fuerte; ''bosque'' equilibra claridad y fidelidad.'
- source_word: οὐκ ἔστι τόπος τοῦ ἐκκλῖναι
  english_pob_choice: there is no place to turn aside
  chosen_spanish: no hay lugar para desviarse
  alternatives_spanish:
  - no hay lugar para apartarse
  - no hay salida
  - no hay lugar para retirarse
  lexicon: LSJ
  rationale: '''Desviarse'' mantiene la idea literal de ἐκκλῖναι (''apartarse de la trayectoria''), pero en español el resultado natural es la imposibilidad de abrirse camino. Evita sobretraducir como ''escapar'' o ''retirarse'' sin que el griego lo diga explícitamente.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión del inglés POB que prefirió un registro más formal (''behold'' en lugar de ''look'') y conservó la imagen espacial de ''before us''; por eso el español adopta ''he aquí'' y ''delante de nosotros'', con un tono igualmente elevado pero natural. También se respetó la tensión lexical de ἐκκλῖναι: el griego dice literalmente ''desviarse'', aunque en contexto implica no tener ruta de escape.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando corresponda al Tetragrámaton; aquí no aparece.
  - Se mantiene un registro bíblico solemne sin caer en calcos arcaizantes innecesarios.
  - '''Batalla'' y no ''guerra'' sigue la decisión inglesa contextual para la situación táctica inmediata.'
  - '''Las aguas del Jordán'' adapta naturalmente el singular griego al español sin perder el obstáculo físico.'
  - No se introduce lenguaje doctrinal ajeno al versículo.
