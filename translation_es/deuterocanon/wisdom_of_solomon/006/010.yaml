review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura general del griego y conserva correctamente el matiz forense de ἀπολογία como «defensa». También mantiene de forma apreciable el juego léxico de santidad. Sin embargo, «han sido enseñados en ellas» no corresponde bien a αὐτά («ellas/las cosas» como objeto directo de enseñanza), sino que introduce una relación preposicional no presente en el original y menos natural en español para «ser enseñado algo».
  spanish_quality_summary: La redacción es clara y eclesialmente legible. «Porque los que han guardado santamente las cosas santas ... serán santificados» suena digna y comprensible. La principal aspereza está en «han sido enseñados en ellas», que resulta menos idiomático que «han sido instruidos en ellas» o, más fiel al griego, «han sido enseñados acerca de ellas» / «han recibido enseñanza sobre ellas». Conviene además alinear la nota [a] con el texto principal revisado si se opta por «serán hechos santos» para reproducir mejor «will be made holy».
  glossary_alignment: No hay conflicto con la terminología base del proyecto. La decisión «defensa» para ἀπολογία está bien. En el campo léxico de ὁσίως / τὰ ὅσια / ὁσιωθήσονται, el borrador usa «santamente / cosas santas / santificados», lo cual es aceptable; no obstante, «serán hechos santos» reproduce más de cerca el pasivo resultativo de ὁσιωθήσονται y mantiene visible el juego con «santo» sin pasar por el término eclesiástico «santificados».
  issues:
  - severity: medium
    issue: «han sido enseñados en ellas» no representa bien αὐτά
    rationale: El pronombre αὐτά es objeto directo de «have been taught them / these things». La versión con «en ellas» cambia la relación semántica a una esfera o ámbito, no al contenido enseñado. En español natural y fiel conviene «han sido enseñados acerca de ellas» o similar.
  - severity: low
    issue: «serán santificados» es aceptable, pero menos cercano que «serán hechos santos»
    rationale: El audit trail inglés prefirió «will be made holy» sobre «will be sanctified» para no cargar la expresión con dicción eclesiástica innecesaria. En español, «serán santificados» no es erróneo, pero «serán hechos santos» refleja mejor esa preferencia documentada y deja más transparente el juego de cognados.
  - severity: low
    issue: La nota [a] debe ajustarse al texto revisado
    rationale: Si el cuerpo del texto cambia a «serán hechos santos», la alternativa de la nota debe seguir presentando la opción «serán santificados» como variante, no repetir la misma forma del texto principal.
  revised_spanish_text: Porque los que han guardado santamente las cosas santas[a] serán hechos santos, y los que han sido enseñados acerca de ellas encontrarán una defensa[b].
