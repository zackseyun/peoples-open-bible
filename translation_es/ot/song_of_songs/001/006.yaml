    reason: lexical_alternative
  - marker: c
    text: Literally, 'My mother’s sons.'
    reason: lexical_alternative
  - marker: d
    text: '''My own vineyard'' is likely metaphorical, but the exact referent is left unstated in the Hebrew.'
    reason: cultural_note
