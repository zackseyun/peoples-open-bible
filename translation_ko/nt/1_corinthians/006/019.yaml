  text: 여러분의 몸은 여러분 안에 계신 성령의 성전이며, 여러분은 그 성령을 하나님께로부터 받았다는 것, 그리고 여러분은 여러분 자신의 것이 아니라는 것을 알지 못합니까?
  philosophy: optimal-equivalence
