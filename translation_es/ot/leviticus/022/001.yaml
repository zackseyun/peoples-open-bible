lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El verbo hebreo introduce una nueva unidad narrativa y una fórmula formal de discurso. En español, «habló» conserva mejor que «dijo» la cadencia de introducción solemne de la palabra divina, sin perder naturalidad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto en su forma española «Yahvé», conforme al criterio del POB de no sustituirlo por un título. «Yahvé» es la transliteración usual y reconocible en español bíblico.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición marca destinatario indirecto del habla divina. En español, «a» es la equivalencia natural y precisa para introducir el complemento de persona.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: El infinitivo constructo introduce el contenido del discurso. «Diciendo» reproduce de manera fiel la fórmula hebrea y su función sintáctica en español.
theological_decisions:
- issue: Renderización del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La lectura auditada del POB preserva el nombre divino como nombre propio. En español, «Yahvé» mantiene esa decisión teológica y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registran cambios necesarios y el pasaje mantiene la fórmula narrativa y la decisión lexical sobre el nombre divino.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y moderno.
  - «Yahvé» se usa consistentemente para el Tetragrámaton, sin sustitución por mayúsculas litúrgicas.
  - La fórmula «habló... diciendo» conserva la estructura del hebreo sin sonar forzada en español.
