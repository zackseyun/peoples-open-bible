- from: Todos estos habían tomado mujeres extranjeras[a], y algunos de ellos tenían mujeres[b] que habían tenido hijos.
  to: Todos estos se habían casado con mujeres extranjeras, y algunos de ellos tenían esposas[a] que habían tenido hijos[b].
  rationale: 'Se revisa la primera cláusula para seguir la decisión léxica auditada del POB: נשא con objeto femenino se expresa mejor como matrimonio, no como «tomar». También se mejora la naturalidad de la segunda cláusula con «esposas». Las notas se reubican para reflejar las dos alternativas documentadas por el POB inglés: la formulación más literal y difícil de la cláusula final, y el valor de בנים como «hijos» en sentido potencialmente amplio.'
