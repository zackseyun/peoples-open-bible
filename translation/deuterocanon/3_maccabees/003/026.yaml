id: 3MA.3.26
reference: 3 Maccabees 3:26
source:
  edition: lxx-swete-1909
  text: τούτων γὰρ ὁμοῦ κολαθέντων, λείψαμεν εἰς τὸν ἐπίλοιπον χρόνον τελείως ἡμῖν τὰ πράγματα ἐν εὐσταθείᾳ καὶ τῇ βελτίστῃ διαθέσει κατασταθήσεσθαι.
