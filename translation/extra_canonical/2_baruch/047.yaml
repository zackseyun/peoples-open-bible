  text: '# Source page p0202 (printed 140)

    ܐܬܬܟܢܫܘ ܠܥܡܐ܆ ܡܛܠ

    ܕܕܠܡܐ ܗܢܐ ܓܝܪ ܐܒܕܐ

    ܠܐܡܐ. ܐܢ ܓܝܪ

    ܬܥܒܕܘܢ ܐܢܬܘܢ ܡܕܡ

    46 ܐܢܬܘܢ ܠܗܘܢ܀܀ ܘܝܘܡܗ

    ܒܪܝܟ ܘܣܒ̈ܘܗܝ ܕܥܡܐ

    ܘܐܡܪܘ ܠܝ. ܒܕܡܐ

    ܠܗܘܒܢܐ ܡܟܟܢ ܚܝܠܬܢܐ.

    ܕܢܣܒܟ ܫܠܝ ܟܠܓܠܠ.

    ܘܫܪܝܪܐܝܬ ܐܘܗܝ ܒܚܫܘܟܐ.

    ܘܢܘܗܪܐ ܠܐ ܐܘܗܝ

    ܠܥܡܐ ܕܐܫܬܚܪܘ. ܐܢܫܐ

    ܓܝܪ ܗܘܘ ܢܒܝܐ ܢܡܘܣܐ.

    ܐܘ ܡܢܘ ܡܕܪܟܢ ܠܢ

    ܒܝܬ ܡܘܬܐ ܠܚܝ̈ܐ.

    ܘܐܡܪܢܐ ܠܗܘܢ ܕܠܘܩܒܠܐ

    ܐܬܘܗܝ ܕܚܝܠܬܢܐ ܠܐ

    ܡܫܟܚ ܐܢܐ ܕܐܩܘܡ.

    ܒܪܡ ܕܝܢ ܠܐ ܚܣܪ

    ܠܐܝܣܪܝܠ ܚܟܝܡܐ܆ ܘܠܐ

    ܒܪ ܢܡܘܣܐ ܠܓܢܣܗ

    ܕܝܥܩܘܒ. ܒܠܚܘܕ ܕܝܢ

    ܐܢܬܘܢ ܨܒܘ ܠܒܩ̈ܝܟܘܢ

    ܕܬܫܡܥܘܢ ܠܢܡܘ

    ܡܪܚܡܢܘܬܗܘܢ ܐܢ

    ܓܝܪ ܬܥܒܪܘܢ ܗܠܝܢ. ܢܬܬܢܝܚ

    ܠܟܘܢ ܣܒܪܐ܆ ܗܠܝܢ

    ܕܩܕܡܘ ܐܡ̇ܪܘ ܠܟܘܢ.

    ܘܠܐ ܢܦܠܚ ܐܢܬܘܢ

    ܒܬܘܝܒܘܬܐ ܕܩܕܡܘ

    ܐܡ̇ܪܘܗ̇ ܠܟܘܢ. ܡܠܐ

    ܡܠܬܐ ܕܝܢ ܕܡܬܬܣܝܡ

    ܐܢܐ ܠܐ ܐ̇ܒܕܬ ܐܢܘܢ

    47.. ܐܦ ܠܐ ܠܒܢܝ̈ܗܘܢ. ܗ̇ܘ ܕܝܢ

    ܢܦܩ̇ܘ ܘܫ̇ܪܝܘ ܐܢܘܢ.

    ܐ̇ܙܠܬ ܠܝ ܡܢ ܬܡܢ.

    ܘܐܡ̇ܪܝܬ ܠܗܘܢ. ܗܐ

    ܐܢܐ ܐ̇ܙܠ ܐܢܐ ܠܕܝܪܝ

    ܠܚܒܪܘܢ. ܒܬܪܟܢ ܕܝܢ

    ܫܒܩܢܝ ܚܒܪܐ. ܘܐ̇ܬܝܬ

    ܠܘܬ ܐܪܙܐ ܕܐܬܡܠܠ

    ܥܡܝ ܬܡܢ. ܘܝ̇ܬܒܬ ܬܡܢ.

    ܘܨܡ̇ܬ ܫܒܥܐ ܝܘܡ̈ܝܢ.

    48 ܘܗܘܐ ܒܬܪ ܫܒܥܐ ܝܘܡ̈ܝܢ

    ܘܗܘܐ ܡܢ ܒܬܪ ܝܘܡܐ

    ܫܒܝܥܝܐ܆ ܨ̇ܠܝܬ ܩܕܡ

    ܚܝܠܬܢܐ ܘܐܡ̇ܪܬ. ܐܘ

    ܡܪܝܐ ܩܪܐ ܐܢܐ

    ܡܬܬܢܚܘܬܝ ܕܒܟܝ

    ܘܡܣܟܝ ܩܕܡܝܟ. ܡܠܟܝ

    ܐܢܬ ܘܚܙܝܬܝ ܕܒܟܝ.


    # Source page p0201 (printed 141)

    ܐܢܬ ܕܡܢܗܘܢ ܕܥ̈ܒܕܐ

    ܘܡܫܬܡܥܝܢ ܠܟ. ܐܢܬ

    ܟܠܚܘܕܝܟ ܝ̇ܕܥ ܐܢܬ

    ܡܘܠܕܗܘܢ ܕܕ̈ܪܐ. ܘܠܐ

    ܓ̇ܠܐ ܐܢܬ ܕ̈ܐܙܝܟ

    ܠܣܓܝ̈ܐܐ. ܡܘܕܥ ܐܢܬ

    ܣܘܓܐܐ ܕܢܘܪܐ

    ܘܡܥܝܪܘܬܐ ܕܪܘܚܐ ܬܩܝܦܬܐ.

    ܒܕ̇ܩ ܐܢܬ ܣܘܦܗܘܢ

    ܕܙ̈ܒܢܐ. ܘܒܩ̈ܝܡܐ

    ܕܚܫܘܟܐ ܒ̇ܨܐ ܐܢܬ.

    ܦܩ̇ܕ ܐܢܬ ܠܡܢܝܢܐ

    ܕܥܒ̇ܪ ܘܡܬܛܪ̈ܢ. ܘܡܒܕܩ ܐܢܬ

    ܒܝܬ ܡܫܪܝܐ ܠܐܝܠܝܢ

    ܕܥܬܝܕܝܢ ܕܢܗܘܘܢ. ܐܢܬ

    ܟܣܝ ܐܢܬ ܪܢܝܬܐ

    ܕܒܥܝܪܐ ܘܐܒܝܕܐ ܕܥܠܡܝ̈ܢ

    ܠܐ ܛܥܐ ܐܢܬ. ܦܩ̇ܕ

    ܐܢܬ ܒܪܘܚܐ ܕܕܚܠܬܐ

    ܘܕܐܒܝܩܘܬܐ ܠܫܠܗܒ̈ܝܬܐ

    ܘܡܬܚ̈ܠܦܢ ܠܪ̈ܘܚܐ.

    ܘܒܡܠܬܐ ܡܩܝܡ ܐܢܬ

    ܡܕܡ ܕܠܝܬ ܗܘܐ. ܘܐܚܝܕ

    ܐܢܬ ܒܚܝܠܐ ܕ

    ܒܣܘܟܠܬܢܘܬܐ. ܘܡܚܟܡ

    ܬܐ ܡܪ̈ܝܪܬܐ ܕܢܡܘܣܟܘܢ

    ܒܣܝܡܘܬܗ. ܘܡܫܪܪܬܐ

    ܠܐ ܡܢܝܢ ܡܢܗܘܢ

    ܫܒܩܘ ܘܡܫܡܫܝܢ

    ܒܣܘܓܐܗܘܢ ܢܚܬܘ

    ܠܥܘܒܗ. ܝܬܝܪܐ ܠܥܒܕܘ

    ܘܕܘ ܠܒܥܠܕܒܒܝ. ܡܛܠ

    ܕܫܒܩܘ ܠܡ ܐܢܬܘܢ ܠܝ.

    ܘܒܥܝܬܘܢ ܡܥܠ ܬܘܒܝ.

    ܠܘܬܝ ܕܝܢ ܝܬܝܪ ܐܝܟ

    ܙܒܢ. ܘܝܬܝܪ ܐܝܟ

    ܕܐܦ ܠܐ ܗܘܝܬ ܐܢܐ

    ܥܡ ܟܠܗܘܢ ܡܛܠ ܕܠܐ

    ܗܘܘ ܝܕܥܝܢ ܗܘܘ ܘܠܐ

    ܐܫܟܚܘ ܠܐ ܟܕܝܝܢ.

    ܡܢܐ ܓܝܪ ܐܝܬܝܗ ܚܝܝ.

    ܗܘ ܓܝܪ ܒܡܘܠܕܗܘܢ

    ܐܢܘܢ ܥܒܕܘܗܝ. ܘܐܢܚܢܢ

    ܕܠܐ ܟܕܝܝܢ. ܠܐ ܓܝܪ

    ܫܒܩܢ ܠܐܒܗܝܢ ܕܐܒܕܝܢ.

    ܐܦܠܐ ܚܕܪܢ ܠܡܘܬܐ

    ܘܐܡܝܢ ܕܟܠܝܢ. ܡܢܐ

    ܗܘܘ ܡܛܠ ܚܠܦ ܕܠܡܘܢ

    ܘܐܢܬܘܢ ܗܐ ܡܢܐ ܚܠܦ

    ܕܢܣܒܘܢ ܕܠܘܬ ܐܠܗܐ'
