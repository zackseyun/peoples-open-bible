    issue: Inconsistencia en la traducción de יָדַע / יָדְעוּ
    rationale: El hebreo usa el mismo verbo «conocer/saber» dos veces para crear contraste. El borrador usa «no supo» frente a «sabían», lo cual es idiomático, pero pierde parte de la correspondencia formal que el POB inglés conservó deliberadamente.
  - severity: low
    issue: Acentuación de «sólo»
    rationale: La forma con tilde sigue viéndose, pero la norma actual prefiere «solo» salvo ambigüedad real. Aquí no hay ambigüedad.
