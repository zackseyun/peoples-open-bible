translation:
  language: es
  text: Pero las parteras temieron a Dios[a], y no hicieron como les había dicho el rey de Egipto; más bien, dejaron vivir a los niños.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mantuvieron con vida a los niños».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּירֶאןָ
  english_pob_choice: feared
  chosen_spanish: temieron
  alternatives_spanish:
  - reverenciaron
  - tuvieron temor de
  lexicon: HALOT
  rationale: El hebreo ירא expresa temor reverente ante Dios. «Temieron» conserva el giro bíblico natural en español sin debilitarlo a una mera idea de respeto.
- source_word: הַמְיַלְּדֹת
  english_pob_choice: the midwives
  chosen_spanish: las parteras
  alternatives_spanish:
  - las comadronas
  - las mujeres que asistían en el parto
  lexicon: HALOT
  rationale: El sustantivo participial designa a mujeres que ejercen como parteras. «Parteras» es preciso, claro y natural en español.
- source_word: אֶת־הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a el Dios
  - a Dios, el verdadero
  lexicon: HALOT
  rationale: Después de «temieron», el hebreo marca el objeto directo. En español, la preposición personal con «Dios» da una frase idiomática y fiel al sentido, sin añadir el artículo que no requiere el giro.
- source_word: וְלֹא עָשׂוּ
  english_pob_choice: did not do
  chosen_spanish: no hicieron
  alternatives_spanish:
  - no actuaron
  - no obedecieron
  lexicon: HALOT
  rationale: עָשׂוּ aquí se mantiene con un negativo simple. «No hicieron» preserva la sobriedad del hebreo y deja que la cláusula siguiente precise la desobediencia.
- source_word: כַּאֲשֶׁר דִּבֶּר אֲלֵיהֶן
  english_pob_choice: as ... had told them
  chosen_spanish: como les había dicho
  alternatives_spanish:
  - como les había hablado
  - según les había dicho
  lexicon: HALOT
  rationale: En este contexto de mandato, דִּבֶּר puede expresarse naturalmente como «había dicho». Es una equivalencia idiomática sin perder el contenido de orden transmitido por el rey.
- source_word: מֶלֶךְ מִצְרַיִם
  english_pob_choice: the king of Egypt
  chosen_spanish: el rey de Egipto
  alternatives_spanish:
  - el rey egipcio
  lexicon: HALOT
  rationale: La construcción de estado constructo se traduce de forma directa y transparente como «el rey de Egipto».
- source_word: וַתְּחַיֶּיןָ
  english_pob_choice: they let ... live
  chosen_spanish: dejaron vivir
  alternatives_spanish:
  - mantuvieron con vida
  - preservaron con vida
  lexicon: HALOT
  rationale: 'El piel de חיה tiene sentido causativo: hacer vivir o mantener con vida. «Dejaron vivir» reproduce bien la fuerza narrativa y la oposición implícita con la orden de matar.'
- source_word: הַיְלָדִים
  english_pob_choice: the children
  chosen_spanish: los niños
  alternatives_spanish:
  - los pequeños
  - los hijos
  lexicon: HALOT
  rationale: יְלָדִים es más amplio que «varones» o «niños varones» en sí mismo, aunque el contexto previo apunta a recién nacidos. «Los niños» conserva la referencia lexical sin forzar una restricción que el sustantivo aquí no contiene.
theological_decisions:
- issue: El referente de אֱלֹהִים en la expresión de temor
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - el Dios
  rationale: La narración presenta a las parteras como temerosas del verdadero Dios de Israel. «Dios» es la forma española idiomática; no se introduce contenido doctrinal adicional, solo se identifica correctamente al referente narrativo.
  doctrine_reference: Principio de primacía del texto original y de equivalencia óptima; claridad idiomática en español.
- issue: La fuerza de וַתְּחַיֶּיןָ frente a la orden de Faraón
  english_pob_reading: they let the children live
  chosen_spanish_reading: dejaron vivir a los niños
  alternative_spanish_readings:
  - los mantuvieron con vida
  - los preservaron con vida
  rationale: El verbo causativo puede sonar en español como una acción activa de preservar la vida. «Dejaron vivir» conserva el contraste moral y narrativo con la orden real de matar sin atenuar el acto de obediencia a Dios.
  doctrine_reference: La lectura narrativa resalta obediencia a Dios por encima del mandato humano, sin expandir más allá del texto.
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó «instead» por «rather» para un registro más formal. La redacción española sigue ese mismo matiz con «más bien», manteniendo la relación adversativa y el tono sobrio del pasaje.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים en contexto narrativo, conforme al criterio del proyecto.
  - Se prefirió «parteras» por ser el equivalente más natural y preciso de הַמְיַלְּדֹת.
  - «Más bien» reproduce la corrección revisada de la POB inglesa y su matiz formal.
  - «Dejaron vivir» conserva el valor causativo de חיה y el contraste con la orden del rey.
