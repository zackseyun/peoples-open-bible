review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: Samuel habla al encargado de la comida, pide que traiga la porción previamente dada, y retoma la instrucción anterior sobre reservarla. Sin embargo, la frase «Ponla contigo» suena poco natural en español y no comunica con claridad la idea contextual de mantenerla apartada/reservada que el inglés auditado preserva con ''Set it aside with you''.'
  spanish_quality_summary: El español es mayormente claro y digno, y «cocinero» y «porción» son buenas elecciones. La principal debilidad es la naturalidad de «Ponla contigo», que parece un calco del hebreo y puede resultar confuso para lectores hispanohablantes. También la nota al pie dice «carne» como alternativa para טבח, lo cual no corresponde al término; las alternativas correctas serían «carnicero» o quizá «chef», no «carne».
  glossary_alignment: 'No hay conflictos con la terminología teológica del proyecto. Las decisiones léxicas principales están alineadas: לַטַּבָּח → «cocinero», הַמָּנָה → «porción». Conviene ajustar שִׂים אֹתָהּ עִמָּךְ a un español más idiomático como «resérvala contigo» o «tenla apartada contigo»; de esas opciones, «resérvala contigo» preserva mejor tanto la imagen de conservarla consigo como la función contextual de apartarla.'
  issues:
  - severity: medium
    issue: «Ponla contigo» es una formulación poco idiomática y potencialmente ambigua en español.
    rationale: Aunque reproduce literalmente la preposición hebrea, en español moderno no comunica bien la idea de guardar/apartar la porción para después. La traducción debe seguir siendo cercana al hebreo, pero también inteligible y natural.
  - severity: low
    issue: La nota al pie ofrece «carne» como alternativa léxica para «cocinero».
    rationale: «Carne» no es una alternativa semántica válida para טבח en este contexto. Esto puede confundir al lector sobre el rango léxico documentado en el expediente inglés.
  revised_spanish_text: 'Entonces Samuel dijo al cocinero[a]: «Trae la porción que te di, de la cual te dije: “Resérvala contigo”».'
  revised_footnotes:
  - marker: a
    text: O «carnicero» o «chef». El hebreo designa al encargado de preparar la comida; en este contexto, «cocinero» expresa mejor la función inmediata.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «Ponla contigo» por «Resérvala contigo» para expresar en español natural la instrucción de mantener la porción apartada, sin perder el matiz de conservarla consigo que está presente en el hebreo y en la nota inglesa. También se corrige la nota léxica para eliminar la alternativa inválida «carne».
