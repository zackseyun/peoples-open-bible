translation:
  language: es
  text: 'Y no es más allá del mar[a], para que digas: «¿Quién cruzará para nosotros al otro lado del mar y la conseguirá para nosotros[b] y nos la hará oír[c], para que la hagamos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al otro lado del mar».
    reason: lexical_alternative
  - marker: b
    text: Lit. «la tomará»; el sentido en contexto es obtenerla y ponerla a nuestro alcance.
    reason: lexical_alternative
  - marker: c
    text: Lit. «hacernos oírla» o «hacernos oír eso»; es un causativo que significa hacer que alguien oiga, es decir, decírselo o explicárselo.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵעֵבֶר לַיָּם
  english_pob_choice: beyond the sea
  chosen_spanish: más allá del mar
  alternatives_spanish:
  - al otro lado del mar
  - a través del mar
  lexicon: HALOT
  rationale: El hebreo expresa una ubicación al otro lado de la masa de agua; «más allá del mar» conserva la imagen espacial de forma natural en español y corresponde al valor idiomático elegido en inglés.
- source_word: הִוא
  english_pob_choice: it is
  chosen_spanish: está
  alternatives_spanish:
  - es
  lexicon: HALOT
  rationale: En español conviene una construcción copulativa natural para referirse implícitamente al mandamiento/palabra del contexto; «está» evita una formulación pesada y mantiene la referencia implícita del pronombre femenino.
- source_word: לֵאמֹר
  english_pob_choice: that you should say
  chosen_spanish: para que digas
  alternatives_spanish:
  - diciendo
  - como para decir
  lexicon: HALOT
  rationale: La partícula introduce el contenido de la objeción hipotética; «para que digas» expresa con claridad el encuadre discursivo y preserva el matiz de la frase parentética.
- source_word: יַעֲבָר לָנוּ
  english_pob_choice: will cross over ... for us
  chosen_spanish: cruzará para nosotros
  alternatives_spanish:
  - pasará para nosotros
  - cruzaría para nosotros
  lexicon: HALOT
  rationale: «Cruzar» mantiene el vínculo verbal con עֵבֶר y reproduce el movimiento hacia el otro lado; el futuro español comunica adecuadamente la pregunta retórica.
- source_word: אֶל עֵבֶר הַיָּם
  english_pob_choice: to the other side of the sea
  chosen_spanish: al otro lado del mar
  alternatives_spanish:
  - hacia el otro lado del mar
  - al otro lado del mar, al mar
  lexicon: HALOT
  rationale: El complemento direccional se integra de modo idiomático en español con «al otro lado del mar», sin perder la imagen espacial explicada en el audit trail inglés.
- source_word: וְיִקָּחֶהָ לָּנוּ
  english_pob_choice: and get it for us
  chosen_spanish: y la tomará para nosotros
  alternatives_spanish:
  - y la traerá para nosotros
  - y la conseguirá para nosotros
  lexicon: HALOT
  rationale: El verbo hebreo literalmente significa «tomar»; se conserva esa fuerza léxica con «tomará», dejando explícita la función benefactiva «para nosotros». Se evita suavizarlo demasiado hacia «conseguir» o «traer» sin necesidad textual.
- source_word: וְיַשְׁמִעֵנוּ אֹתָהּ
  english_pob_choice: and make us hear it
  chosen_spanish: y nos la hará oír
  alternatives_spanish:
  - y nos la declarará
  - y nos la hará escuchar
  lexicon: HALOT
  rationale: El causativo de שׁמע se refleja con «hará oír», que conserva la idea de causar la audición. Se mantiene también el pronombre femenino con «la» para la referencia al mandamiento/palabra.
- source_word: וְנַעֲשֶׂנָּה
  english_pob_choice: so that we may do it
  chosen_spanish: para que la hagamos
  alternatives_spanish:
  - y la hagamos
  - a fin de que la hagamos
  lexicon: HALOT
  rationale: La relación de propósito/resulta se expresa de forma natural con «para que»; el pronombre femenino se conserva para mantener la cohesión con el referente implícito del contexto.
theological_decisions:
- issue: Referencia implícita al mandamiento/palabra y uso de pronombres femeninos
  english_pob_reading: The feminine pronoun refers back to the commandment/word in the surrounding context.
  chosen_spanish_reading: Se conserva el referente implícito con pronombres femeninos («la», «nos la»), sin explicitarlo en el cuerpo del versículo.
  alternative_spanish_readings:
  - explicitar «el mandamiento»
  - reemplazar por un neutro impersonal
  rationale: El hebreo usa pronombres femeninos que remiten a una entidad ya mencionada en el contexto; mantenerlos preserva la cohesión y evita interpretar de más dentro del versículo mismo. El lector puede identificar el referente por el contexto inmediato.
  doctrine_reference: Deuteronomio 30:11-14; cohesión contextual del discurso de la Torá
- issue: Valor de la pregunta retórica y finalidad de la obediencia
  english_pob_reading: so that we may do it
  chosen_spanish_reading: para que la hagamos
  alternative_spanish_readings:
  - para obedecerla
  - para ponerla por obra
  rationale: Se evita introducir «obedecer» porque el hebreo concluye con «hacerla», y el texto conserva el vínculo entre oír y hacer. La formulación mantiene la fuerza de la obediencia sin desplazar el léxico del original.
  doctrine_reference: Deuteronomio 30:13-14; relación entre oír y hacer en la Torá
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa, que añadió «to the other side of» para reflejar mejor אֶל עֵבֶר הַיָּם. En español, esa precisión se recoge con «al otro lado del mar», manteniendo el registro formal y la imagen espacial completa.
  spanish_consistency_notes:
  - Se mantiene «mar» para evitar ambigüedad con «agua» o «océano», ya que el hebreo dice literalmente «el mar».
  - Se preserva la secuencia verbal y pronominal del hebreo, incluyendo el referente femenino implícito.
  - «Más allá del mar» y «al otro lado del mar» quedan documentados como alternativas legítimas, con la primera en el texto principal por naturalidad y la segunda como nota.
  - La traducción evita el calco rígido de «tomar» solo cuando oscurecería el sentido; aquí se conserva porque el hebreo exige esa fuerza lexical y el contexto la aclara.
