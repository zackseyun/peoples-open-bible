translation:
  language: es
  text: Y Absalón no habló con Amnón, ni mal ni bien[a], porque Absalón odiaba a Amnón porque había violado[b] a Tamar su hermana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ni bueno ni malo», un modismo que significa que Absalón no le dijo absolutamente nada a Amnón.
    reason: lexical_alternative
  - marker: b
    text: O «había humillado a Tamar». En este contexto, el verbo hebreo se refiere a la violación sexual de ella.
    reason: lexical_alternative
lexical_decisions:
- source_word: דִבֶּר ... עִם
  english_pob_choice: did not speak with
  chosen_spanish: no habló con
  alternatives_spanish:
  - no habló a
  - no conversó con
  - no le dijo nada a
  lexicon: HALOT
  rationale: El verbo דבר con עִם expresa hablar con/alguien. «No habló con» conserva la relación interpersonal sin forzar una construcción más interpretativa que el hebreo.
- source_word: לְמֵרָע וְעַד טוֹב
  english_pob_choice: either bad or good
  chosen_spanish: ni mal ni bien
  alternatives_spanish:
  - ni de mal ni de bien
  - de mal a bien
  - ni bueno ni malo
  lexicon: HALOT
  rationale: La expresión es un merismo idiomático para decir que no dijo nada en absoluto. «Ni mal ni bien» es natural en español y mantiene la polaridad del hebreo sin explicitar de más.
- source_word: שָׂנֵא
  english_pob_choice: hated
  chosen_spanish: odiaba
  alternatives_spanish:
  - aborrecía
  - detestaba
  - odiaba intensamente
  lexicon: HALOT
  rationale: El verbo indica odio real y fuerte. «Odiaba» transmite el valor directo y narrativo del hebreo sin suavizarlo.
- source_word: עַל דְּבַר אֲשֶׁר
  english_pob_choice: because he had violated
  chosen_spanish: porque había violado
  alternatives_spanish:
  - a causa de que había violado
  - por el asunto de que había violado
  - porque había humillado
  lexicon: HALOT
  rationale: Aunque la construcción hebrea es nominal, el contexto causal es claro. En español, la forma más natural y fiel es una subordinada causal con «porque había».
- source_word: עִנָּה
  english_pob_choice: had violated
  chosen_spanish: había violado
  alternatives_spanish:
  - había humillado
  - había afligido
  - había ultrajado
  lexicon: HALOT
  rationale: En este contexto el verbo se refiere a la agresión sexual contra Tamar. «Había violado» comunica el acto con la fuerza necesaria y corresponde al sentido contextual reconocido en el POB inglés.
- source_word: תָּמָר אֲחֹתוֹ
  english_pob_choice: Tamar his sister
  chosen_spanish: Tamar, su hermana
  alternatives_spanish:
  - Tamar, hermana de él
  - Tamar, la hermana de él
  lexicon: HALOT
  rationale: El sufijo posesivo se refiere a Amnón en la cláusula relativa, y en español «su hermana» es claro y fluido. Se mantiene la relación familiar central para el motivo narrativo.
translation_notes:
  revision_awareness: 'El texto inglés revisado reemplazó una redacción más literal de עַל דְּבַר אֲשֶׁר por una causal más directa («because he had»). La versión española sigue esa decisión de equivalencia óptima: conserva el valor causal y el matiz de agresión sexual de עִנָּה, sin volver a una paráfrasis más amplia que el hebreo no exige.'
  spanish_consistency_notes:
  - Se mantuvo «Y Absalón» para reflejar el inicio narrativo coordinado del hebreo.
  - Se evitó «SEÑOR» u այլ vocabulario no pertinente; no hay términos divinos en el versículo.
  - «Odiaba» traduce la fuerza de שָׂנֵא sin atenuación.
  - La puntuación con coma antes de «su hermana» ayuda a evitar ambigüedad en español.
