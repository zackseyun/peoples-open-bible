  to: 'Por mano de tus mensajeros has insultado[a] al Señor, y has dicho: «Con mis muchos carros yo mismo he subido a las alturas de los montes, a los rincones más remotos del Líbano; y cortaré sus altos cedros, sus escogidos cipreses[b], y entraré en su posada más lejana, en su bosque-jardín».'
