translation:
  language: es
  text: Una generación cuyos dientes son espadas, y cuyas fauces son cuchillos, para devorar a los pobres de la tierra[a] y a los necesitados de entre la humanidad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la tierra» puede entenderse también como «de la tierra» en el sentido de «del país/territorio», ya que אֶרֶץ puede significar «tierra» o «país».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «de אדם/’adam»; aquí se usa de manera genérica para la humanidad, no para un varón en particular.
    reason: lexical_alternative
lexical_decisions:
- source_word: דּוֹר
  english_pob_choice: a generation
  chosen_spanish: una generación
  alternatives_spanish:
  - hay una generación
  - una clase de gente
  lexicon: HALOT
  rationale: En este proverbio, דּוֹר nombra un tipo humano caracterizado por la metáfora siguiente. «Una generación» conserva la concisión y el tono identificador del hebreo sin añadir explicaciones.
- source_word: חֲרָבוֹת
  english_pob_choice: swords
  chosen_spanish: espadas
  alternatives_spanish:
  - sables
  - hojas
  lexicon: HALOT
  rationale: El plural de חֶרֶב se traduce normalmente con un arma blanca fuerte. «Espadas» mantiene la imagen violenta y es natural en español bíblico actual.
- source_word: שִׁנָּיו
  english_pob_choice: whose teeth
  chosen_spanish: cuyos dientes
  alternatives_spanish:
  - sus dientes
  - de él, dientes
  lexicon: HALOT
  rationale: El sufijo masculino singular se refiere colectivamente a דּוֹר. En español, «cuyos dientes» preserva la relación posesiva y evita una traducción demasiado literal y torpe.
- source_word: וּמַאֲכָלוֹת
  english_pob_choice: knives
  chosen_spanish: cuchillos
  alternatives_spanish:
  - navajas
  - instrumentos cortantes
  lexicon: HALOT
  rationale: Aunque la forma está relacionada con comer, el contexto de dientes, fauces y devorar indica un instrumento cortante. «Cuchillos» es la equivalencia más natural y conserva el paralelo con «espadas».
- source_word: מְתַלְּעֹתָיו
  english_pob_choice: whose fangs
  chosen_spanish: cuyas fauces
  alternatives_spanish:
  - cuyos colmillos
  - cuyas mandíbulas
  lexicon: HALOT
  rationale: El término alude a la zona de la boca asociada con morder y desgarrar. «Fauces» transmite mejor en español la imagen depredadora que «colmillos» o «mandíbulas» en este paralelismo.
- source_word: לֶאֱכֹל
  english_pob_choice: to devour
  chosen_spanish: para devorar
  alternatives_spanish:
  - para comer
  - para consumir
  lexicon: HALOT
  rationale: Aunque literalmente significa «comer», el contexto es de opresión depredadora. «Devorar» expresa bien esa fuerza sin alejarse del sentido figurado.
- source_word: עֲנִיִּים
  english_pob_choice: the poor
  chosen_spanish: a los pobres
  alternatives_spanish:
  - a los afligidos
  - a los oprimidos
  lexicon: HALOT
  rationale: עָנִי suele designar a los pobres o desamparados. «Pobres» es claro y conserva el contraste social del proverbio.
- source_word: מֵאֶרֶץ
  english_pob_choice: from the earth
  chosen_spanish: desde la tierra
  alternatives_spanish:
  - de la tierra
  - de la tierra/land
  lexicon: HALOT
  rationale: La preposición con אֶרֶץ puede ser «desde» o «de». Aquí «desde la tierra» sigue la lectura amplia de la POB inglesa y mantiene el movimiento de expulsión/consumo sin fijarlo como territorio específico.
- source_word: אֶבְיוֹנִים
  english_pob_choice: the needy
  chosen_spanish: a los necesitados
  alternatives_spanish:
  - a los menesterosos
  - a los pobres
  lexicon: HALOT
  rationale: Para distinguirlo de עֲנִיִּים, «necesitados» refleja bien אֶבְיוֹן y mantiene el paralelismo con una leve variación semántica.
- source_word: מֵאָדָם
  english_pob_choice: from among mankind
  chosen_spanish: de entre los hombres
  alternatives_spanish:
  - de entre la humanidad
  - de entre la gente
  lexicon: HALOT
  rationale: אָדָם aquí es genérico y refiere a la humanidad. «De entre los hombres» conserva el hebreo singular genérico, mientras que «humanidad» suavizaría un poco la forma de la fuente.
theological_decisions:
- issue: Sentido genérico de אָדָם
  english_pob_reading: from among mankind
  chosen_spanish_reading: de entre los hombres
  alternative_spanish_readings:
  - de entre la humanidad
  - de entre la gente
  rationale: El hebreo usa אָדָם en sentido colectivo y no como varón individual. «Los hombres» funciona en español como genérico humano en este contexto, sin perder el paralelismo con «la tierra».
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4; contested terms table for אָדָם
- issue: Imagen depredadora de la metáfora
  english_pob_reading: swords / knives / fangs / devour
  chosen_spanish_reading: espadas / cuchillos / fauces / devorar
  alternative_spanish_readings:
  - espadas / navajas / colmillos / comer
  rationale: La serie de imágenes debe seguir sonando violenta y coherente en español. «Fauces» ayuda a mantener la metáfora de bestia depredadora que el hebreo construye con dientes, cuchillos y devorar.
  doctrine_reference: HALOT; principio de equivalencia óptima para metáforas
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente WLC y coincide con la auditoría inglesa en la imagen general y en las dos notas léxicas principales. La única adaptación relevante es la elección de formas españolas naturales para mantener el paralelismo poético sin introducir interpretaciones ajenas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando el texto no usa el tetragrámaton de forma explícita.
  - Se preserva la distinción entre «pobres» y «necesitados» para reflejar עֲנִיִּים / אֶבְיוֹנִים.
  - Se evita «SEÑOR» porque este verso no contiene el nombre divino; no aplica ninguna sustitución reverencial.
  - La puntuación sigue una sola línea poética con coma entre los dos miembros principales y antes del propósito final.
