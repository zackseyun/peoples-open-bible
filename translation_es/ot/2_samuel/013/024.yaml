    text: O «esquiladores de ovejas». El hebreo dice simplemente «esquiladores», pero el contexto más amplio trata de la esquila de ovejas.
    reason: lexical_alternative
  revision_rationale: 'Se hicieron dos ajustes menores para mayor fidelidad y naturalidad: «vino al rey» representa mejor וַיָּבֹא que «fue al rey», y «vayan» concuerda naturalmente con el sujeto compuesto «el rey y sus siervos». Se conserva el resto del borrador, incluida la nota léxica, porque refleja bien el hebreo y el rastro de auditoría del POB inglés.'
