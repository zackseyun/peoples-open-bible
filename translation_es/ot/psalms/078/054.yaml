base_translation:
  language: en
  yaml_path: translation/ot/psalms/078/054.yaml
  text: So he brought them to his holy border[d][c][b][a], this mountain that his right hand acquired.
  footnotes:
  - marker: a
    text: Or 'border of his holiness' or 'holy border.' The Hebrew גְּבוּל can mean 'border,' 'boundary,' or 'territory.'
    reason: lexical_alternative
  - marker: b
    text: Or 'this hill.' The phrase likely refers to the mountain region God gave Israel, and may also evoke Zion in the broader context.
    reason: alternative_reading
  - marker: c
    text: Or 'won,' 'possessed,' or 'purchased.' The verb can carry several related senses; here it describes what God's right hand secured.
    reason: lexical_alternative
  - marker: d
    text: Or 'So he brought them to his holy territory, to this mountain that his right hand acquired.'.
    reason: previous_rendering
