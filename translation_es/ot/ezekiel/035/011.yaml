    reason: lexical_alternative
  - marker: c
    text: 'O: «entre ellos». El hebreo también puede entenderse en sentido más locativo, pero aquí se prefiere «por medio de ellos» para reflejar el matiz instrumental documentado en la auditoría.'
    reason: alternative_reading
