review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del hebreo: miedo en Sion, temblor que se apodera de los impíos, y la doble pregunta sobre quién puede habitar ante el fuego consumidor. Sin embargo, la colocación de las notas [a][b][c][d] en «miedo» no corresponde a sus referentes léxicos reales, y una nota conserva glosas en inglés («sojourn», «dwell/remain»). Además, «brasas eternas» es posible pero menos fiel que una opción que preserve mejor la imagen de ‘ardores/quemazones’ o ‘llamas perpetuas’.'
  spanish_quality_summary: El español es claro y digno, pero necesita reparaciones menores para legibilidad y exactitud editorial. «Tienen miedo» es natural, aunque «están aterrados» o «tienen miedo» ambas sirven; no exige cambio. Sí conviene corregir «ecoa» por «evoca» o «hace eco de», y reanclar las notas a las palabras/frases pertinentes. También conviene pulir la nota b para que esté plenamente en español.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Sion», «Dios», y la referencia teológica a Yahvé en la rationale están bien. «Impíos» representa adecuadamente חֲנֵפִים según la decisión auditada. La única tensión léxica relevante es que «brasas eternas» no refleja tan bien מוֹקְדֵי עוֹלָם como «ardores eternos» o «llamas perpetuas»; la segunda ya aparece como alternativa documentada.
  issues:
  - severity: high
    issue: Los marcadores de notas están anclados en «miedo» en lugar de en los términos a los que corresponden.
    rationale: Las notas a, b, c y d explican respectivamente «impíos/hipócritas», «habitar/sojornar», «fuego consumidor» y «brasas/llamas perpetuas». Deben aparecer junto a esos elementos en el texto, no acumuladas tras «miedo».
  - severity: medium
    issue: La nota b mezcla español con glosas inglesas.
    rationale: La nota dice «sojourn» y «dwell/remain», lo que no cumple el objetivo de un aparato completamente en español. Debe decir algo como «peregrinar como forastero» o «residir/permanecer».
  - severity: medium
    issue: «ecoa» suena incorrecto o poco natural en español estándar.
    rationale: En español bíblico legible, es mejor «evoca» o «hace eco del lenguaje bíblico».
  - severity: medium
    issue: «Brasas eternas» es menos fiel al valor de מוֹקְדֵי עוֹלָם que una formulación como «ardores eternos» o «llamas perpetuas».
    rationale: El hebreo apunta a fuegos ardientes/quemazones en plural más que a simples brasas. «Llamas perpetuas» es una alternativa ya documentada y más natural en español.
  revised_spanish_text: 'Los pecadores en Sion tienen miedo; el temblor se ha apoderado de los impíos[a]: «¿Quién de nosotros podrá habitar[b] con fuego consumidor[c]? ¿Quién de nosotros podrá habitar con llamas perpetuas[d]?».'
  revised_footnotes:
