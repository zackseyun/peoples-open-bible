revisions:
- from: Así Josué derrotó[a] toda la tierra —la región montañosa, el Negev, la Sefela y las laderas—, y a todos sus reyes. No dejó superviviente alguno, sino que dedicó a la destrucción[b] toda criatura aliento, tal como Yahvé, el Dios de Israel, había mandado.
  to: 'Así Josué derrotó toda la tierra: la región montañosa[a], el Negev, la llanura baja y las laderas, junto con todos sus reyes. No dejó superviviente alguno, sino que dedicó a la destrucción[b] todo ser que respira, tal como Yahvé, el Dios de Israel, había mandado.'
  rationale: La revisión corrige el anclaje de la nota topográfica, reemplaza la construcción defectuosa 'toda criatura aliento' por el español natural 'todo ser que respira' preservando el idiomatismo hebreo mediante nota, y sustituye 'Sefela' por 'la llanura baja' para alinearse con la filosofía de claridad del POB inglés. Se mantiene 'Yahvé' y 'dedicó a la destrucción' por fidelidad terminológica y teológica.
  reviewer_model: gpt-5.4
