translation:
  language: es
  text: 'Y a ti se te ha ordenado[a]: «Hagan esto: tomen para ustedes carretas[b] de la tierra de Egipto para sus pequeños[c] y para sus esposas, y carguen a su padre y vengan[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te han ordenado». La pasiva hebrea puede expresarse en español con una construcción impersonal o con una pasiva más explícita.
    reason: alternative_reading
  - marker: b
    text: O «carros», es decir, vehículos de transporte enviados desde Egipto.
    reason: lexical_alternative
  - marker: c
    text: «Pequeños» se refiere específicamente a niños pequeños.
    reason: lexical_alternative
  - marker: d
    text: O «vengan de vuelta», ya que el contexto implica regresar a Egipto, aunque el hebreo simplemente dice «vengan».
    reason: alternative_reading
lexical_decisions:
- source_word: צֻוֵּיתָה
  english_pob_choice: you are commanded
  chosen_spanish: has sido mandado
  alternatives_spanish:
  - te han mandado
  - has recibido la orden
  lexicon: HALOT
  rationale: La pasiva de צוה indica que José está bajo una orden; en español, «has sido mandado» conserva la fuerza pasiva y el sentido de mandato directo sin volverlo forzado.
- source_word: זֹאת עֲשׂוּ
  english_pob_choice: Do this
  chosen_spanish: Haz esto
  alternatives_spanish:
  - Hagan esto
  - Esto hagan
  lexicon: HALOT
  rationale: La fórmula hebrea es una orden breve y directa; en singular resulta natural en el discurso dirigido a José en este contexto.
- source_word: קְחוּ לָכֶם
  english_pob_choice: take for yourselves
  chosen_spanish: toma para ustedes
  alternatives_spanish:
  - tomen para ustedes
  - toma
  lexicon: HALOT
  rationale: El dativo reflexivo añade beneficio para los destinatarios; «para ustedes» preserva esa matización mejor que un simple «toma».
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: desde la tierra de Egipto
  alternatives_spanish:
  - de la tierra de Egipto
  - de Egipto
  lexicon: HALOT
  rationale: Se mantiene explícito אֶרֶץ con «tierra», ya que el hebreo lo expresa de forma plena y la frase suena natural en español bíblico contemporáneo.
- source_word: עֲגָלוֹת
  english_pob_choice: wagons
  chosen_spanish: carros
  alternatives_spanish:
  - carretas
  - carros de transporte
  lexicon: HALOT
  rationale: El término designa vehículos de transporte; «carros» es claro y más natural en español general que una traducción demasiado específica o arcaizante.
- source_word: לְטַפְּכֶם
  english_pob_choice: for your little ones
  chosen_spanish: para sus pequeños
  alternatives_spanish:
  - para sus niños pequeños
  - para sus hijos pequeños
  lexicon: HALOT
  rationale: טַף se refiere específicamente a los pequeños de la familia; «pequeños» conserva esa especificidad sin rigidizar el texto.
- source_word: וְלִנְשֵׁיכֶם
  english_pob_choice: and for your wives
  chosen_spanish: y para sus esposas
  alternatives_spanish:
  - y para sus mujeres
  lexicon: HALOT
  rationale: En este contexto familiar, el sentido relacional es claro; «esposas» evita ambigüedad y refleja el vínculo doméstico.
- source_word: וּנְשָׂאתֶם אֶת אֲבִיכֶם
  english_pob_choice: and carry your father
  chosen_spanish: y lleven a su padre
  alternatives_spanish:
  - y carguen a su padre
  - y transporten a su padre
  lexicon: HALOT
  rationale: נשא puede significar cargar o llevar. En español, «lleven» comunica el traslado natural y evita una imagen demasiado literal que podría sonar extraña.
- source_word: וּבָאתֶם
  english_pob_choice: and come
  chosen_spanish: y vengan
  alternatives_spanish:
  - y vayan
  - y regresen
  lexicon: HALOT
  rationale: El hebreo dice simplemente «vengan»; se conserva esa sencillez sin añadir «regresen», que la forma verbal no expresa de manera explícita.
translation_notes:
  revision_awareness: Se siguió el sentido revisado del audit trail, pero se evitó reproducir mecánicamente el inglés. La elección final conserva la pasiva de צוה, el matiz reflexivo de לָכֶם y la simpleza de וּבָאתֶם sin añadir explícitamente «regresen».
  spanish_consistency_notes:
  - Se usa «Yahvé» como término estándar cuando aparezca el nombre divino; en este versículo no aparece.
  - Se prefirió «carros» para עֲגָלוֹת por claridad y naturalidad, equivalente contextual de «wagons».
  - «Lleven a su padre» mantiene el verbo de traslado sin sobrecargarlo con una literalidad incómoda.
  - No se añadió nota sobre venir de vuelta porque el hebreo no lo dice explícitamente, aunque el contexto lo sugiera.
