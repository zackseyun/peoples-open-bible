lexical_decisions:
- source_word: אֶלְקָנָה
  english_pob_choice: Elkanah
  chosen_spanish: Elcaná
  alternatives_spanish:
  - Elcana
  - Elcanan
  lexicon: Nombre propio (WLC/HALOT)
  rationale: Se translitera el nombre propio según la forma hebrea; en español se adapta la vocal final a una acentuación natural sin alterar la identidad del nombre.
- source_word: בְנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - su descendiente
  - su hijo varón
  lexicon: HALOT
  rationale: El hebreo בן con sufijo 3ms expresa de manera directa filiación singular. En una genealogía, 'su hijo' comunica con claridad la relación inmediata sin ampliar innecesariamente a 'descendiente'.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: Conjunción hebrea
  rationale: La conjunción coordinante se vierte con la forma española normal 'y'; 'e' no es necesaria aquí porque los nombres empiezan por consonante y la cadencia genealógica queda natural con 'y'.
- source_word: אֶבְיָסָף
  english_pob_choice: Ebiasaph
  chosen_spanish: Ebiasaf
  alternatives_spanish:
  - Abiasaf
  - Ebiasaph
  lexicon: Nombre propio (WLC/HALOT)
  rationale: La forma hebrea אֶבְיָסָף se translitera de manera directa como 'Ebiasaf'. Se conserva la relación con la variante tradicional 'Abiasaf/Abiasaph' mediante nota, pero el texto principal refleja más de cerca la vocalización hebrea del pasaje.
- source_word: אַסִּיר
  english_pob_choice: Assir
  chosen_spanish: Assir
  alternatives_spanish:
  - Asir
  lexicon: Nombre propio (WLC/HALOT)
  rationale: Nombre propio transliterado. Se mantiene la doble s solo si se busca reflejar la grafía tradicional; aquí se prioriza una forma española sobria y reconocible.
translation_notes:
  revision_awareness: La fuente hebrea y la auditoría inglesa están en alto acuerdo; no se detectan revisiones aplicadas. El nombre אֶבְיָסָף se conserva con una transliteración cercana al hebreo, mientras que la nota recoge la variante tradicional más extendida en algunas biblias.
  spanish_consistency_notes:
  - 'Se mantuvo el patrón genealógico breve y repetitivo del original: nombre + ''su hijo''.'
  - Se evitó 'descendiente' para no debilitar la filiación directa que expresa el hebreo.
  - La puntuación con comas reproduce la enumeración lineal del verso.
  - Se usó 'y' de manera uniforme para las tres uniones coordinantes.
