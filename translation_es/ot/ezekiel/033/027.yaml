revisions:
- from: 'Así dirás a ellos: «Así ha dicho Adonay Yahvé: Vivo yo: ciertamente los que están en las ruinas caerán a espada, y el que esté sobre la faz del campo[a] lo he dado a las bestias para que lo devoren[b], y los que estén en las fortalezas y en las cuevas morirán de peste[c]».'
  to: 'Así dirás a ellos[a]: «Así dice el Señor Yahvé: Vivo yo; ciertamente los que están en las ruinas caerán a espada, y al que esté sobre la faz del campo[b] lo he entregado a los animales salvajes para que lo devoren[c], y los que estén en las fortalezas y en las cuevas morirán de peste[d]».'
  rationale: Se corrige la fórmula profética a un español bíblico más natural («Así dice»), se reemplaza «Adonay Yahvé» por «el Señor Yahvé» para mantener legibilidad sin perder el nombre divino, y se clarifica חַיָּה como «animales salvajes». También se ordenan y ajustan las notas para reflejar mejor las alternativas documentadas por el audit trail inglés y las necesidades del español.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:43:03Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del hebreo: fórmula profética, juramento, triple sentencia de juicio (espada, animales, peste) y el valor distributivo del singular en נְתַתִּיו לְאָכְלוֹ. Sin embargo, hay dos ajustes importantes para mayor fidelidad y naturalidad: (1) כֹּה אָמַר se vierte mejor en estilo profético español como «Así dice» en vez de «Así ha dicho»; (2) אֲדֹנָי יְהוִה no debería quedar como «Adonay Yahvé», porque el proyecto exige español legible y el equivalente natural de אֲדֹנָי es «Señor», preservando a la vez el nombre divino como «Yahvé».'
  spanish_quality_summary: El texto es generalmente claro y digno, pero «Así ha dicho» suena menos idiomático en fórmula profética que «Así dice», y «Adonay Yahvé» resulta innecesariamente hebraizante para una Biblia española de lectura eclesial amplia. También «las bestias» puede entenderse, pero «los animales salvajes» comunica mejor el referente de חַיָּה en español actual sin pérdida de fuerza. El resto del verso lee bien; «sobre la faz del campo» es formal pero aceptable si se mantiene con nota.
  glossary_alignment: Se preserva correctamente «Yahvé» para יְהוָה. El compuesto אֲדֹנָי יְהוִה debe alinearse mejor con el objetivo del proyecto como «el Señor Yahvé», no «Adonay Yahvé». «Peste» es aceptable para דֶּבֶר, con nota de alternativa «plaga». «Fortalezas», «cuevas» y «caerán a espada» están bien alineados.
  issues:
  - severity: medium
    issue: «Adonay Yahvé» es demasiado transliterado para el texto principal.
    rationale: Aunque preserva ambos elementos del hebreo, el objetivo es español natural y eclesialmente legible. «El Señor Yahvé» conserva אֲדֹנָי + יְהוִה sin introducir un hebraísmo poco idiomático.
  - severity: medium
    issue: «Así ha dicho» no reproduce bien la fórmula profética española habitual.
    rationale: כֹּה אָמַר en contexto profético se expresa mejor como «Así dice», que es más natural, solemne y reconocible en español bíblico actual.
  - severity: low
    issue: «las bestias» puede sonar ambiguo o arcaizante.
    rationale: חַיָּה aquí se refiere a animales salvajes como agentes de juicio. «Los animales salvajes» es más claro para lectores modernos; «bestias» no es incorrecto, pero es menos preciso en español contemporáneo.
  revised_spanish_text: 'Así dirás a ellos[a]: «Así dice el Señor Yahvé: Vivo yo; ciertamente los que están en las ruinas caerán a espada, y al que esté sobre la faz del campo[b] lo he entregado a los animales salvajes para que lo devoren[c], y los que estén en las fortalezas y en las cuevas morirán de peste[d]».'
