review_pass:
  verdict: revise
  source_alignment_summary: 'La mayor parte del borrador sigue bien el griego: «Daniel dijo al rey», «sacerdotes de Bel», «setenta» y la exclusión de «mujeres y niños» son fieles. Sin embargo, hay dos problemas de alineación: (1) el ancla [a] está puesta en «rey», pero la nota explica «según tu palabra», así que la ubicación de la nota no corresponde al término comentado; (2) el texto mezcla tratamiento de respeto con tuteo («al rey... tu palabra»), mientras el griego usa singular de segunda persona sin marcar formalidad española, y en contexto cortesano conviene uniformar con «su».'
  spanish_quality_summary: El español es claro y digno, pero «Hágase conforme a tu palabra» suena algo calcado y además choca con «al rey» por el cambio de registro. «Que sea conforme a su palabra» o «Que se haga conforme a su palabra» resuelve mejor la naturalidad y la coherencia de tratamiento. Las notas son útiles, pero la nota [c] afirma que «el contexto inmediato exige» suplir el destino; eso es más fuerte que la evidencia inglesa, que solo dice que el destino se suple por el contexto siguiente. Conviene suavizar esa formulación.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Bel» y «sacerdotes» están bien. No se introducen términos teológicos ajenos. La decisión para ἦλθεν como «entró» es aceptable por el rastro auditado inglés, siempre que la nota reconozca que el griego literal es «vino» y que el destino no se especifica en este versículo.
  issues:
  - severity: medium
    issue: Marcador de nota [a] anclado en el lugar equivocado
    rationale: La nota [a] comenta «según tu palabra», pero el marcador aparece tras «rey». Esto rompe la correspondencia requerida entre texto y nota.
  - severity: medium
    issue: 'Inconsistencia de tratamiento: «al rey» + «tu palabra»'
    rationale: En español bíblico legible, dirigirse al rey con tuteo después de nombrarlo con registro formal suena extraño. «Su palabra» mantiene la dignidad y evita una mezcla estilística innecesaria.
  - severity: low
    issue: La nota [c] sobrestiene la inferencia contextual
    rationale: El inglés auditado dice que el destino debe suplirse por el contexto siguiente, no que el contexto inmediato lo «exige». Debe expresarse con mayor precisión.
  revised_spanish_text: 'Daniel dijo al rey: «Que sea conforme a su palabra[a]». Y había setenta sacerdotes de Bel, además de mujeres y niños[b]; y entró[c].'
