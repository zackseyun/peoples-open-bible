  text: And he gained control of his cities[a], and he came as far as Ecbatana, and he seized its towers and plundered its streets[b], and he turned its splendor into disgrace.
  footnotes:
  - marker: a
    text: Greek πλατείας can more specifically mean the city's broad streets or public squares, not merely any streets.
    reason: lexical_alternative
  - marker: b
    text: Greek κόσμος here means the city's adornment or splendor, not 'world.'
    reason: lexical_alternative
