lexical_decisions:
- source_word: כֹה אָמַר
  english_pob_choice: Thus said
  chosen_spanish: Así dijo
  alternatives_spanish:
  - De esta manera dijo
  - Así ha dicho
  lexicon: HALOT
  rationale: La fórmula profética se expresa con un adverbio deíctico y un verbo de habla en pasado narrativo. «Así dijo» conserva el registro solemne sin forzar un calco menos natural en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יהוה YHWH'
  rationale: Se mantiene el nombre divino en forma abierta y no enmascarada, conforme a la convención del proyecto. «Yahvé» es la forma española principal preferida para יְהוָה.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - con respecto a mí
  lexicon: HALOT
  rationale: 'La preposición אֶל con sufijo de 1cs en contexto de discurso se traduce naturalmente como dirección de habla: «a mí».'
- source_word: עֲשֵׂה לְךָ
  english_pob_choice: Make for yourself
  chosen_spanish: Hazte
  alternatives_spanish:
  - Haz para ti
  - Prepárate
  lexicon: HALOT
  rationale: En español, el imperativo reflexivo «hazte» conserva el matiz de beneficio/reflexividad de לְךָ sin sonar tan pesado como «haz para ti».
- source_word: מוֹסֵרוֹת
  english_pob_choice: bonds
  chosen_spanish: ligaduras
  alternatives_spanish:
  - bonds
  - ataduras
  - cuerdas
  lexicon: HALOT
  rationale: El término apunta a elementos de sujeción o restricción; «ligaduras» es español bíblico claro y mantiene la fuerza material del objeto sin restringirlo a «correas».
- source_word: מֹטוֹת
  english_pob_choice: yoke-bars
  chosen_spanish: yugo-barras
  alternatives_spanish:
  - barras de yugo
  - yugos
  - barras
  lexicon: HALOT
  rationale: El hebreo se refiere a las barras/piezas del yugo, no solo al yugo en general. Se preserva la precisión con un compuesto transparente en español, aun si resulta algo técnico.
- source_word: וּנְתַתָּם
  english_pob_choice: and put them
  chosen_spanish: y ponlas
  alternatives_spanish:
  - y ponlos
  - y colócalas
  - y ponlos sobre
  lexicon: HALOT
  rationale: La forma verbal continúa la secuencia imperativa; en español, «y ponlas» es la orden natural. El objeto plural se refleja con femenino plural para concordar con las dos piezas mencionadas.
- source_word: עַל צַוָּארֶךָ
  english_pob_choice: on your neck
  chosen_spanish: sobre tu cuello
  alternatives_spanish:
  - en tu cuello
  - al cuello
  lexicon: HALOT
  rationale: «Sobre tu cuello» conserva la imagen física de colocar algo encima del cuello, con un registro claro y natural en español.
theological_decisions:
- issue: Divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el Señor
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. La política del proyecto pide transliterarlo como «Yahvé» en el cuerpo principal, evitando el sustituto litúrgico «SEÑOR» y manteniendo la transparencia con la fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH'
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con el audit trail inglés y no requiere revisión textual adicional; se ha preservado la fórmula profética, el nombre divino abierto y la distinción entre los dos objetos del símbolo.
  spanish_consistency_notes:
  - Se mantuvo el trato de segunda persona singular con imperativo directo, coherente con el hebreo.
  - Se eligió un español bíblico moderno que conserve la imaginería concreta sin caer en calco rígido.
  - Los dos sustantivos del objeto se distinguen en español mediante nota y compuesto explicativo para evitar perder la diferencia léxica del hebreo.
