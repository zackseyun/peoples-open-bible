translation:
  language: es
  text: La plenitud de la sabiduría es temer a Yahvé, y los embriaga de sus frutos.[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo conservado en esta ubicación difiere marcadamente: «Con gente de verdad, desde antiguo fue establecida, y con su descendencia su lealtad es fiel». La edición citada lo pone entre corchetes y lo marca como una divergencia mayor; por eso aquí se sigue el griego.'
    reason: textual_variant
  - marker: b
    text: 'O: «de los frutos de ella». La sabiduría es femenina en griego y suele personificarse en Sirácida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πλησμονὴ
  english_pob_choice: fullness
  chosen_spanish: plenitud
  alternatives_spanish:
  - abundancia
  - llenura
  - pleno contenido
  lexicon: LSJ
  rationale: En el dicho sapiencial, πλησμονὴ expresa la idea de abundancia o plenitud; «plenitud» conserva el sustantivo abstracto y suena natural en español bíblico sin diluir la imagen.
- source_word: σοφίας
  english_pob_choice: of wisdom
  chosen_spanish: de la sabiduría
  alternatives_spanish:
  - de sabiduría
  - sabia
  lexicon: LSJ
  rationale: El genitivo queda bien en español con «de la sabiduría»; mantiene el sentido sapiential y evita una paráfrasis.
- source_word: φοβεῖσθαι τὸν κύριον
  english_pob_choice: to fear the Lord
  chosen_spanish: temer a Yahvé
  alternatives_spanish:
  - temer al Señor
  - reverenciar a Yahvé
  lexicon: LSJ
  rationale: El infinitivo explica en qué consiste la plenitud de la sabiduría. Se usa «Yahvé» por la norma del proyecto para יהוה; «temer» conserva el valor lexical fuerte de φοβεῖσθαι sin suavizarlo a mera reverencia.
- source_word: μεθύσκει
  english_pob_choice: makes them drunk
  chosen_spanish: los embriaga
  alternatives_spanish:
  - los hace beber en exceso
  - los intoxica
  - los satisface profundamente
  lexicon: LSJ
  rationale: El verbo es literalmente «embriagar/intoxicar». Se conserva la imagen viva en español con «los embriaga», evitando una nivelación interpretativa a «satisface».
- source_word: αὐτοὺς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - esas personas
  lexicon: LSJ
  rationale: El pronombre griego no explicita antecedente en la frase aislada; «los» reproduce la referencia directa y mantiene la tersura del original.
- source_word: ἀπὸ τῶν καρπῶν αὐτῆς
  english_pob_choice: from its fruits
  chosen_spanish: con sus frutos
  alternatives_spanish:
  - de sus frutos
  - por sus frutos
  - desde sus frutos
  lexicon: LSJ
  rationale: Aunque ἀπό puede ser «de/desde», en español «los embriaga con sus frutos» comunica con naturalidad la fuente del efecto. Se evita un calco duro como «desde sus frutos», sin perder la imagen del fruto de la sabiduría. El pronombre femenino se refiere a la sabiduría.
theological_decisions:
- issue: Divergencia textual entre el hebreo conservado y el paralelo griego
  english_pob_reading: The English POB follows the Greek line and preserves the Hebrew divergence in a footnote.
  chosen_spanish_reading: La línea principal sigue el sentido griego y la nota registra que el hebreo de Kahana difiere marcadamente en este lugar.
  alternative_spanish_readings:
  - Con gente fiel desde antiguo fue establecida, y con su descendencia su lealtad es fiel.
  - Con personas de verdad fue preparada desde la eternidad, y con su descendencia su fidelidad es firme.
  rationale: El paquete de fuente marca el hebreo como bracketed y de «major mismatch», mientras el paralelo griego ofrece un dicho completamente distinto. Para no borrar la tensión documental, la traducción principal sigue el griego y la nota señala la divergencia hebrea.
  doctrine_reference: 'PHILOSOPHY.md: en Sirácida, traducir del hebreo donde la evidencia es firme y del griego donde el hebreo no corresponde o es incierto; preservar honestamente la incertidumbre textual.'
translation_notes:
  revision_awareness: 'La revisión más reciente sustituyó un borrador que seguía el hebreo por una traducción basada en el griego. Esta propuesta mantiene ese criterio: traduce el dicho griego de Sir 1:15 y conserva en nota la fuerte discrepancia del hebreo paralelo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - «Sabiduría» se mantiene como sustantivo femenino, acorde con la personificación griega.
  - La imagen de «embriaga» preserva la fuerza del verbo griego sin suavizarla.
  - La nota textual distingue claramente el griego principal del hebreo divergente.
  - La alternativa «de sus frutos» queda disponible porque el español puede expresar la relación de ἀπό de forma un poco más literal.
