review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: finalidad/result ado (ὅπως γνωστὸν ἦν), necesidad impersonal (δεῖ), prioridad temporal antes del sol (φθάνειν τὸν ἥλιον), acción de gracias dirigida a Dios (ἐπʼ εὐχαριστίαν σου), y súplica al amanecer (πρὸς ἀνατολὴν φωτός ... ἐντυγχάνειν σοι). Sin embargo, dos decisiones requieren ajuste: (1) el anclaje de notas está invertido respecto del contenido de las notas; y (2) «presentarte petición» suena forzado en español y no es la mejor forma de preservar la naturalidad sin perder el matiz de súplica formal.'
  spanish_quality_summary: La frase es mayormente clara y digna, pero «anticipar al sol» y especialmente «presentarte petición» resultan algo rígidas. «Anticiparse al sol» sería más idiomático, pero el borrador aún es comprensible. El problema principal de legibilidad está en «presentarte petición», que en español eclesial general suena poco natural; «hacerte petición» o «presentarte una petición» funcionan mejor. También conviene corregir la colocación de los marcadores de nota para que el lector no atribuya la nota equivocada a «darte gracias».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé/Mesías/Esclavo, etc. Las elecciones «gracias» y «petición» respetan las decisiones léxicas auditadas. La revisión propuesta mantiene el matiz de ἐντυγχάνειν como petición/súplica, evitando una paráfrasis demasiado amplia como «orar».
  issues:
  - severity: medium
    issue: Los marcadores de notas [a][b] están colocados sobre «darte gracias», pero la nota b explica el verbo final de súplica.
    rationale: Cada nota debe anclarse en la palabra o frase pertinente. Aquí la nota a corresponde a «anticiparse al sol...» y la nota b a «hacerte petición»/«presentarte una petición». La disposición actual induce a error exegético y editorial.
  - severity: medium
    issue: «presentarte petición» es poco natural en español.
    rationale: Aunque intenta reflejar el matiz formal de ἐντυγχάνειν, la expresión carece de artículo y suena calcada. «hacerte petición» conserva el valor léxico documentado y además coincide con la alternativa ya explicada en la nota inglesa/española.
  - severity: low
    issue: «anticipar al sol» es menos idiomático que «anticiparse al sol».
    rationale: La forma pronominal es más natural en español para expresar adelantarse temporalmente. No obstante, el sentido del borrador es recuperable; por eso no lo marco como error alto.
  revised_spanish_text: de modo que se supiera que se debe anticiparse al sol[a] para darte gracias, y, al despuntar la luz, hacerte petición[b].
