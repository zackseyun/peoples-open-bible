translation:
  language: es
  text: Entonces Nabucodonosor, con ira y furor, mandó que trajeran a Sadrac, Mesac y Abed-nego. Entonces estos hombres fueron llevados ante el rey.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בֵּאדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Marca secuencia narrativa inmediata. «Entonces» conserva la progresión del relato con naturalidad en español y sin añadir matiz interpretativo.
- source_word: בִּרְגַז וַחֲמָה
  english_pob_choice: in rage and fury
  chosen_spanish: con ira y furor
  alternatives_spanish:
  - en ira y furor
  - con enojo y furor
  lexicon: HALOT
  rationale: La doble expresión intensifica el estado emotivo del rey. «Ira y furor» preserva la duplicación semántica y evita suavizarla; «con» representa bien el valor circunstancial del arameo en español.
- source_word: אֲמַר לְהַיְתָיָה
  english_pob_choice: commanded that ... be brought in
  chosen_spanish: mandó que trajeran
  alternatives_spanish:
  - ordenó que trajeran
  - dijo que trajeran
  lexicon: HALOT
  rationale: Aunque el verbo base es «decir», el contexto cortesano lo convierte en una orden efectiva. «Mandó» expresa ese valor imperativo sin perder la base verbal implícita en el arameo.
- source_word: לְשַׁדְרַךְ מֵישַׁךְ וַעֲבֵד נְגוֹ
  english_pob_choice: Shadrach, Meshach, and Abed-nego
  chosen_spanish: Sadrac, Mesac y Abed-nego
  alternatives_spanish:
  - Shadrach, Meshach y Abed-nego
  lexicon: Transliteration传统/estándar
  rationale: Se siguen las formas castellanas ampliamente reconocibles de los nombres, manteniendo la identificación propia de la tradición bíblica en español sin traducirlos.
- source_word: גֻּבְרַיָּא אִלֵּךְ
  english_pob_choice: these men
  chosen_spanish: esos hombres
  alternatives_spanish:
  - aquellos hombres
  - estos hombres
  lexicon: HALOT
  rationale: El deíctico arameo retoma a los tres ya nombrados. «Esos hombres» es natural en español y conserva la referencia discursiva sin forzar proximidad física.
- source_word: הֵיתָיוּ קֳדָם מַלְכָּא
  english_pob_choice: were brought before the king
  chosen_spanish: fueron traídos ante el rey
  alternatives_spanish:
  - fueron llevados ante el rey
  - fueron presentados ante el rey
  lexicon: HALOT
  rationale: «Traídos» reproduce la pasividad/cautivación del arameo mejor que una simple llegada voluntaria. «Ante el rey» comunica correctamente la fórmula de audiencia cortesana.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios y el control cruzado reporta alta concordancia; por ello no se incorporan variantes textuales ni notas de revisión.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - Se conservan nombres propios en formas castellanas estandarizadas y no se sustituye «rey» por fórmulas litúrgicas más arcaicas.
  - El tono procura ser formal y bíblicamente digno, sin calcos innecesarios del inglés.
