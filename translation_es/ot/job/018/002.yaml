  source_alignment_summary: 'El borrador español refleja bien el hebreo y el rastro de auditoría del POB inglés: «¿Hasta cuándo?» traduce idiomáticamente עַד אָ֤נָה; «pondrán» preserva el valor básico de תְּשִׂימוּן sin añadir iteración; «trampas para las palabras» mantiene la opción principal del inglés («snares for words») y deja abierta la dificultad de קִנְצֵי לְמִלִּין; «Entiendan» transmite adecuadamente תָּבִינוּ; y «después hablaremos» conserva la secuencia y el futuro de נְדַבֵּר, con nota para la alternativa exhortativa.'
