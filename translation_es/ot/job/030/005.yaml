    rationale: Aunque refleja la revisión inglesa «from the midst», en español suena torpe. «de en medio» o «desde en medio» preserva mejor el sentido sin calco duro.
  - severity: medium
    issue: La nota b llama «impersonal» a «gritan»
    rationale: El hebreo omite el sujeto explícito, pero el verbo no es impersonal en español; sigue siendo tercera persona plural con sujeto tácito o indeterminado.
  - severity: low
    issue: «como tras un ladrón» suena forzado
    rationale: Es entendible, pero menos natural que una formulación que exprese el clamor dirigido como en una persecución de ladrón.
