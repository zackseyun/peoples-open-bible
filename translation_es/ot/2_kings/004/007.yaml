review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia narrativa y la mayor parte del sentido hebreo: «hombre de Dios», «vende el aceite», «paga tus deudas» y «lo que quede» están bien encaminados. Sin embargo, no preserva plenamente dos decisiones clave del rastro POB: בָּנַיִךְ especifica «tus hijos/sus hijos varones», no un término potencialmente inclusivo; y תִּחְיִי fue entendido en la auditoría inglesa como capacidad/provisión («puedes/podrán vivir»), no meramente futuro simple. Además, la nota [b] está anclada en «hombre de Dios» pero su contenido trata de «deudas/acreedor», y falta una nota para la alternativa documentada sobre «lo que queda / el remanente».'
  spanish_quality_summary: El español es claro y natural, pero requiere pequeños ajustes para fidelidad y mejor correspondencia nota-texto. «Le contó» y «hombre de Dios» funcionan bien. Conviene cambiar «tú y tus hijos» por «tú y tus hijos varones» o una forma equivalente que preserve la especificación masculina, y «vivirán» por «podrán vivir» para reflejar la fuerza de provisión/capacidad. También debe corregirse la colocación y el contenido de las notas al pie.
  glossary_alignment: No hay choques con la terminología troncal del proyecto. «Hombre de Dios» respeta la transparencia del hebreo. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La revisión propuesta se limita a alinear mejor género específico («hijos varones») y valor modal de «pueden vivir».
  issues:
  - severity: medium
    issue: «tú y tus hijos» no preserva la especificación masculina de בָּנַיִךְ
    rationale: La auditoría inglesa insistió en «sons» por precisión de género. En español, «hijos» puede leerse genéricamente; aquí conviene explicitar «hijos varones» para conservar el dato semántico.
  - severity: medium
    issue: «vivirán» debilita la fuerza de capacidad/provisión en תִּחְיִי
    rationale: El rastro POB eligió «can live», no solo futuro simple. «Podrán vivir» comunica mejor que el remanente les servirá de sustento.
  - severity: high
    issue: La nota [b] está mal anclada y falta la nota sobre «lo que quede / el remanente»
    rationale: La nota [b] aparece junto a «deudas» pero en el texto está colocada tras «hombre de Dios[a]» y su contenido mezcla la alternativa de «acreedor» con «saldar». Además, el POB inglés conserva una nota literal sobre «vivir por el remanente», que aquí debería reflejarse con un marcador distinto en la frase final.
  - severity: low
    issue: La nota sobre «saldar tus deudas» no refleja con precisión la alternativa inglesa principal
    rationale: La alternativa documentada relevante es «a tu acreedor» frente a «tus deudas», no primariamente «saldar tus deudas», que es más estilística que léxica.
  revised_spanish_text: 'Entonces ella vino y le contó al hombre de Dios[a], y él dijo: «Ve, vende el aceite, y paga tus deudas[b]; y tú y tus hijos varones podrán vivir de lo que quede[c]».'
  revised_footnotes:
