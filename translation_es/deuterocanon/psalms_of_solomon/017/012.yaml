translation:
  language: es
  text: Yahvé es fiel en todos sus juicios que ejecuta sobre la tierra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en todos sus juicios que ejecuta»; el griego puede leerse también como «en todos los juicios que ejecuta».
    reason: alternative_reading
lexical_decisions:
- source_word: πιστός
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - confiable
  - verdadero
  lexicon: BDAG
  rationale: πιστός describe la confiabilidad y constancia de Yahvé; «fiel» expresa de manera natural esa cualidad en español y mantiene el peso teológico del término.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - el Señor
  lexicon: Proyecto POB default para יהוה / κύριος en contexto septuagintal
  rationale: Aunque el griego dice ὁ κύριος, el contexto salmódico y la política del proyecto favorecen explicitar el nombre divino como «Yahvé» en lugar de enmascararlo con «Señor».
- source_word: κρίμασιν
  english_pob_choice: judgments
  chosen_spanish: juicios
  alternatives_spanish:
  - decisiones judiciales
  - actos de juicio
  lexicon: BDAG
  rationale: κρίματα refiere aquí a actos o dictámenes judiciales concretos; «juicios» conserva la fuerza legal sin sobreexplicar.
- source_word: ποιεῖ
  english_pob_choice: carries out
  chosen_spanish: ejecuta
  alternatives_spanish:
  - hace
  - realiza
  - lleva a cabo
  lexicon: BDAG
  rationale: Con «juicios», el verbo español más directo y sobrio es «ejecuta», que conserva la idea de acción judicial efectiva.
- source_word: ἐπὶ τὴν γῆν
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre la faz de la tierra
  lexicon: BDAG
  rationale: La frase señala el ámbito de la acción divina; «sobre la tierra» es claro, amplio y fiel al griego sin restringir el alcance.
theological_decisions:
- issue: Cómo reflejar la tensión entre el carácter de Yahvé y sus actos de juicio
  english_pob_reading: The translation preserves both by rendering πιστός as a predicate of the Lord and keeping 'judgments' concrete.
  chosen_spanish_reading: 'La traducción conserva ambas dimensiones: Yahvé es presentado como «fiel», y sus «juicios» permanecen concretos y no abstraídos.'
  alternative_spanish_readings:
  - Yahvé es justo en todos sus juicios
  - Yahvé es digno de confianza en todas sus decisiones
  rationale: «Fiel» corresponde mejor a πιστός que «justo», y «juicios» mantiene el campo judicial del sustantivo κρίματα. Se preserva así la tensión entre el carácter divino y la concreción de sus actos.
  doctrine_reference: Preservar la tensión teológica sin resolverla por paráfrasis; consistencia terminológica del proyecto.
translation_notes:
  revision_awareness: La versión revisada en inglés corrigió la omisión del posesivo αὐτοῦ (‘sus’). La frase española incorpora explícitamente «sus juicios» para reflejar con precisión el texto griego y mantener la revisión aprobada por el auditor.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del proyecto para el nombre divino en este contexto.
  - «Juicios» conserva el matiz judicial de κρίματα; no se sustituye por «decisiones» para no perder la fuerza legal del pasaje.
  - «Sobre la tierra» reproduce el alcance universal de ἐπὶ τὴν γῆν sin restringirlo a «en el país» o «en la tierra prometida».
