translation:
  language: es
  text: ¿No es nada para ustedes[a], todos los que pasan por el camino? Miren y vean si hay algún dolor[b] como mi dolor, que me fue infligido, con el que Yahvé me afligió en el día de su ardiente ira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿No les importa a ustedes?» o «¿No les concierne?» La apertura hebrea es elíptica, literalmente «no a ustedes», y puede entenderse como una apelación a la atención o a la compasión.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «aflicción» o «pena» en lugar de «dolor» para la palabra hebrea repetida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ל֣וֹא אֲלֵיכֶם
  english_pob_choice: Is it nothing to you
  chosen_spanish: ¿No les importa a ustedes[a]
  alternatives_spanish:
  - ¿No es nada para ustedes?
  - ¿No les concierne?
  lexicon: HALOT
  rationale: La apertura hebrea es elíptica, literalmente ‘no a ustedes’. En español, ‘¿No les importa a ustedes?’ conserva el valor apelativo y la súplica por atención/simpatía sin volverla rígidamente literal.
- source_word: כָּל עֹ֣בְרֵי דֶרֶךְ
  english_pob_choice: all you who pass by on the road
  chosen_spanish: todos los que pasan por el camino
  alternatives_spanish:
  - todos ustedes que pasan por el camino
  - todos los transeúntes del camino
  lexicon: HALOT
  rationale: ‘עֹבְרֵי דֶרֶךְ’ es ‘los que pasan por el camino’. ‘Todos los que pasan por el camino’ mantiene la imagen concreta y la fuerza participial sin sonar forzado en español.
- source_word: הַבִּיטוּ וּרְא֗וּ
  english_pob_choice: Look and see
  chosen_spanish: Miren y vean
  alternatives_spanish:
  - Miren y consideren
  - Atiendan y vean
  lexicon: HALOT
  rationale: Los dos imperativos intensifican la apelación. ‘Miren y vean’ es natural en español moderno y conserva el énfasis retórico.
- source_word: אִם יֵ֤שׁ מַכְאוֹב֙ כְּמַכְאֹבִ֔י
  english_pob_choice: whether there is any sorrow like my sorrow
  chosen_spanish: si hay algún dolor como mi dolor
  alternatives_spanish:
  - si existe algún sufrimiento como mi sufrimiento
  - si hay algún pesar como mi pesar
  lexicon: HALOT
  rationale: מַכְאוֹב puede significar dolor, pena o aflicción. Aquí ‘dolor’ funciona bien por la repetición comparativa y mantiene la amplitud emocional del término hebreo.
- source_word: אֲשֶׁ֥ר עוֹלַ֖ל לִ֑י
  english_pob_choice: which was dealt to me
  chosen_spanish: que me fue hecho[b]
  alternatives_spanish:
  - que me fue causado
  - que se me hizo
  lexicon: HALOT
  rationale: עוֹלַל comunica un trato duro, algo ‘hecho’ a la persona afectada. ‘Me fue hecho’ preserva el resultado sin adelantar demasiado la especificación del agente, que aparece después.
- source_word: אֲשֶׁר֙ הוֹגָ֣ה
  english_pob_choice: with which ... afflicted me
  chosen_spanish: con el que Yahvé me afligió
  alternatives_spanish:
  - con el que Yahvé me causó dolor
  - con el que Yahvé me entristeció
  lexicon: HALOT
  rationale: El hifil de יגה expresa causar dolor/aflicción. ‘Afligió’ es la equivalencia más directa y digna en español; ‘con el que’ refleja la construcción relativa instrumental.
- source_word: יְהוָ֔ה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como ‘Yahvé’, siguiendo la pauta del proyecto para יְהוָה y evitando la sustitución por un título.
- source_word: בְּ/י֖וֹם חֲר֥וֹן אַפּֽוֹ
  english_pob_choice: in the day of his fierce anger
  chosen_spanish: en el día de su ardiente ira
  alternatives_spanish:
  - en el día de su ardiente enojo
  - en el día de su ira encendida
  lexicon: HALOT
  rationale: חֲרוֹן אַף es una expresión idiomática para ira ardiente o intensa. ‘Ardiente ira’ comunica bien la intensidad y mantiene el tono profético/lamentativo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente; conforme a la doctrina del proyecto, se translitera como ‘Yahvé’ para preservar el nombre pactal de Dios y no reemplazarlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto inglés muestra alta concordancia y no registra revisiones aplicadas; por ello la redacción española sigue de cerca la lectura auditada, manteniendo la abertura elíptica, la comparación repetida de ‘dolor’, el agente divino explícito y la traducción de יְהוָה como ‘Yahvé’.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para יְהוָה conforme al estándar del proyecto.
  - Se usa ‘dolor’ para מַכְאוֹב en armonía con la repetición del versículo y con el tono de lamento.
  - La construcción ‘Miren y vean’ conserva el paralelismo imperativo sin arcaísmo innecesario.
  - Las notas a y b se anclan en el texto donde corresponde y distinguen abertura elíptica y alternativa léxica.
