lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Ahora los hijos de
  - Los hijos de
  lexicon: HALOT
  rationale: La construcción genealógica hebrea introduce otra línea con valor continuativo. «Y los hijos de» conserva el enlace y resulta natural en español.
- source_word: מוּשִׁי
  english_pob_choice: Mushi
  chosen_spanish: Mushi
  lexicon: HALOT
  rationale: Nombre propio; se translitera sin adaptación.
- source_word: מַחְלִי
  english_pob_choice: Mahli
  chosen_spanish: Mahli
  lexicon: HALOT
  rationale: Nombre propio; se translitera de forma estándar.
- source_word: וְעֵדֶר
  english_pob_choice: Eder
  chosen_spanish: Eder
  lexicon: HALOT
  rationale: Nombre propio; se mantiene la forma breve y reconocible en español.
- source_word: וִירִימוֹת
  english_pob_choice: Jeremoth
  chosen_spanish: Jeremot
  alternatives_spanish:
  - Jeremoth
  - Jerimot
  lexicon: HALOT
  rationale: El POB inglés documenta la variante ortográfica «Jerimoth/Jeremoth». En español se opta por «Jeremot» para mantener una transliteración más consistente con la terminación hebrea y la grafía española, sin perder la identificación del nombre.
- source_word: אֵלֶּה
  english_pob_choice: These were
  chosen_spanish: Estos eran
  alternatives_spanish:
  - Estos son
  lexicon: HALOT
  rationale: El demostrativo resume la lista anterior. «Estos eran» reproduce bien el valor recapitulativo y el registro narrativo-genealógico.
- source_word: בְּנֵי הַלְוִיִּם
  english_pob_choice: the sons of the Levites
  chosen_spanish: los hijos de los levitas
  alternatives_spanish:
  - los descendientes de los levitas
  lexicon: HALOT
  rationale: Se conserva la fórmula genealógica literal. «Hijos» mantiene el paralelismo del hebreo; «levitas» comunica el referente tribal en español.
- source_word: לְבֵית אֲבֹתֵיהֶם
  english_pob_choice: according to their fathers' houses
  chosen_spanish: según las casas de sus padres
  alternatives_spanish:
  - por sus casas paternas
  - según sus casas ancestrales
  lexicon: HALOT
  rationale: La expresión administrativa/genealógica se vierte de manera natural en español sin perder el sentido de agrupación por clanes o casas paternas.
translation_notes:
  revision_awareness: El texto hebreo coincide con el testimonio base y la auditoría inglesa no introduce cambios textuales. Se mantiene la estructura genealógica y la única variación relevante es la transliteración del nombre final, donde el POB inglés ya documenta una alternativa ortográfica.
  spanish_consistency_notes:
  - Se preserva el tono genealógico conciso del original.
  - «Hijos de los levitas» sigue la fórmula formal del hebreo sin sustituirla por una paráfrasis interpretativa.
  - La nota del nombre final refleja la variación ortográfica documentada en el POB inglés, adaptada a una ortografía española legible.
