translation:
  language: es
  text: ¿No saben lo que yo y mis padres[a] hemos hecho con todos los pueblos de las tierras? ¿Acaso fueron capaces siquiera los dioses de las naciones de las tierras de librar su tierra de mi mano?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘mis antepasados’ para ‘mis padres’. El hebreo usa lenguaje dinástico/familiar.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Do you not
  chosen_spanish: ¿No saben... ?
  alternatives_spanish:
  - ¿Acaso no saben... ?
  - ¿No saben ustedes... ?
  lexicon: HALOT
  rationale: La pregunta retórica exige una forma natural en español que conserve el tono de reproche y expectativa de asentimiento. ‘¿No saben...?’ reproduce bien la fuerza de la partícula interrogativa hebrea sin volverla rígida.
- source_word: תֵדְעוּ
  english_pob_choice: know
  chosen_spanish: saben
  alternatives_spanish:
  - conocen
  - entienden
  lexicon: HALOT
  rationale: ידע aquí expresa conocimiento cognitivo y reconocimiento de hechos; ‘saben’ es la opción más directa y natural en español.
- source_word: מֶה עָשִׂיתִי
  english_pob_choice: what I ... have done
  chosen_spanish: lo que yo y mis padres hemos hecho
  alternatives_spanish:
  - lo que he hecho yo
  - lo que yo y mis antepasados han hecho
  lexicon: HALOT
  rationale: El hebreo pone en primer plano la acción consumada con relevancia presente. En español, ‘hemos hecho’ mantiene ese efecto retórico. Se añade ‘lo’ para evitar un giro incómodo y fiel a la pregunta ‘qué’.},{
theological_decisions:
- issue: Referencia de ‘dioses’ en la boca de un rey pagano
  english_pob_reading: Render אֱלֹהֵי straightforwardly as 'gods' without qualification.
  chosen_spanish_reading: ‘dioses’ sin calificación interpretativa.
  alternative_spanish_readings:
  - ‘supuestos dioses’
  - ‘ídolos’
  rationale: La voz del hablante es Senaquerib, y el texto presenta su desafío tal como lo formula. Traducir simplemente ‘dioses’ conserva el contraste retórico sin introducir comentario teológico ajeno al pasaje.
  doctrine_reference: Affirmations; Translation philosophy §1 y §3
translation_notes:
  revision_awareness: 'Coincide con el testimonio fuente hebreo y con la lectura auditada del POB en inglés: se mantiene el paralelismo retórico, la metáfora de ‘mi mano’ y la referencia genitiva a los dioses de las naciones sin suavizar el desafío del hablante.'
  spanish_consistency_notes:
  - Se usa ‘tierras’ para reflejar el plural concreto de הָאֲרָצוֹת.
  - Se conserva ‘mi mano’ como idiomatismo de poder/control, en vez de ‘poder’ o ‘autoridad’.
  - ‘Padres’ se mantiene con nota porque el hebreo expresa lenguaje dinástico; ‘antepasados’ es una alternativa interpretativa.
  - No se introduce ‘Yahvé’ porque el versículo no lo nombra; el contraste es implícito en el discurso de Senaquerib.
