base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/003/004.yaml
  text: The portico that was in front of the house was twenty cubits long[a], corresponding to the width of the house, and its height was one hundred and twenty cubits; and he overlaid its interior with pure gold.
  footnotes:
  - marker: a
    text: The Hebrew text states that the portico's height was 'one hundred and twenty.' A parallel description in 1 Kings 6:3 gives the portico's length and width but not this height, and some interpreters suspect a textual difficulty here; the translation follows the Masoretic Text as preserved.
    reason: textual_variant
