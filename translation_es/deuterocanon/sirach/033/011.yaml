review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego suministrado y respeta el carácter imprecatorio del texto desalineado. Conserva bien ἐν ὀργῇ πυρὸς, καταβρωθήτω, οἱ ἀδικοῦντες τὸν λαόν σου y εὕροισαν ἀπώλειαν. La principal dificultad está en ὁ σωζόμενος: «el que es salvado» es demasiado rígido y poco idiomático en español para un participio que, según la propia auditoría inglesa, puede sugerir «el sobreviviente» o alguien que escapó solo para enfrentar juicio.'
  spanish_quality_summary: El español es mayormente claro, pero «el que es salvado» suena forzado y poco natural en registro bíblico moderno. «Hacen mal a» comunica la idea, pero «agravian» o «hacen injusticia contra» serían más precisos; sin embargo, no obliga corrección. La frase completa mejora notablemente con «el sobreviviente» o «el que se salva».
  glossary_alignment: No hay conflicto con la terminología base del proyecto. Se mantiene «pueblo» para λαός y no aparecen términos sensibles como Yahvé/Mesías. La revisión propuesta busca fidelidad léxica y mejor español sin alterar la racionalidad teológica documentada.
  issues:
  - severity: medium
    issue: «el que es salvado» es poco natural y demasiado calco
    rationale: Aunque refleja formalmente ὁ σωζόμενος, en español suena mecánico. Dado el contexto de juicio y la propia nota inglesa, «el sobreviviente» comunica mejor la ironía contextual de alguien que escapó pero aún enfrenta destrucción.
  - severity: low
    issue: La nota [b] no refleja la revisión inglesa sobre el desajuste textual
    rationale: La auditoría inglesa usa una nota textual para el desajuste de fuente, mientras que el español mantiene solo una nota léxica sobre ὁ σωζόμενος. No es obligatorio trasladar toda la estructura inglesa, pero conviene al menos preservar la alternativa léxica de forma más clara y natural.
