translation:
  language: es
  text: E hizo lo malo[a] a los ojos de Yahvé, y anduvo en el camino de su padre, y en el camino de su madre, y en el camino de Jeroboam hijo de Nabat, que hizo pecar a Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Lo malo» refleja la expresión hebrea idiomática «hacer lo malo», una fórmula de evaluación moral que puede verse también como «hacer lo que es malo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - actuó
  - hizo lo que era
  lexicon: HALOT
  rationale: La construcción hebrea עשה + adjetivo se vierte de forma natural con «hizo» en español, manteniendo el giro idiomático sin volverlo rígido.
- source_word: הָרַע
  english_pob_choice: what was evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - el mal
  - lo que era malo
  lexicon: HALOT
  rationale: Con עשה, la frase expresa una evaluación moral idiomática. «Lo malo» conserva esa valoración sin forzar una abstracción excesiva.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: a los ojos de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - a la vista de Yahvé
  lexicon: HALOT
  rationale: Se conserva la imagen evaluativa hebrea de manera transparente. «A los ojos de Yahvé» reproduce bien el valor idiomático y mantiene el nombre divino tal como exige la guía.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el término preferido en español para el Tetragrámaton según la guía del proyecto, preservando el nombre personal divino en lugar de sustituirlo por un título.
- source_word: וַיֵּלֶךְ
  english_pob_choice: walked
  chosen_spanish: anduvo
  alternatives_spanish:
  - caminó
  - fue
  lexicon: HALOT
  rationale: En la expresión hebrea «andar en el camino de», «anduvo» conserva la metáfora de conducta y suena natural en español bíblico contemporáneo.
- source_word: בְּדֶרֶךְ
  english_pob_choice: in the way of
  chosen_spanish: en el camino de
  alternatives_spanish:
  - en la senda de
  - según el camino de
  lexicon: HALOT
  rationale: «Camino» reproduce el campo semántico de דרך como modo de vida o conducta. Se mantiene la repetición del hebreo sin paraphrasear.
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - de su padre
  lexicon: HALOT
  rationale: Correspondencia directa y clara del posesivo relacional; no requiere expansión.
- source_word: אִמּוֹ
  english_pob_choice: his mother
  chosen_spanish: su madre
  alternatives_spanish:
  - de su madre
  lexicon: HALOT
  rationale: Correspondencia directa y clara del posesivo relacional; se preserva la mención explícita de ambos progenitores.
- source_word: יָרָבְעָם בֶּן נְבָט
  english_pob_choice: Jeroboam son of Nebat
  chosen_spanish: Jeroboam hijo de Nabat
  alternatives_spanish:
  - Jeroboam, hijo de Nabat
  - Jeroboam el hijo de Nabat
  lexicon: HALOT
  rationale: Los nombres propios se transliteran. «Hijo de» es la forma natural en español para el patronímico hebreo, y «Nabat» conserva la adaptación habitual del nombre propio.
- source_word: הֶחֱטִיא
  english_pob_choice: caused Israel to sin
  chosen_spanish: hizo pecar a Israel
  alternatives_spanish:
  - causó que Israel pecara
  - indujo a Israel a pecar
  lexicon: HALOT
  rationale: El causativo de חטא se expresa con «hizo pecar», que conserva la fuerza causativa y es idiomático en español sin suavizar el acto.
- source_word: אֶת יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - al pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene el nombre colectivo tal como aparece en el hebreo, con objeto directo explícito.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: La lectura elegida preserva el nombre propio divino en español, conforme a la norma del proyecto. Se evita la sustitución por un título que borra la forma del Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fórmula de evaluación moral
  english_pob_reading: did what was evil in the eyes of Yahweh
  chosen_spanish_reading: hizo lo malo a los ojos de Yahvé
  alternative_spanish_readings:
  - hizo lo que era malo a los ojos de Yahvé
  - hizo el mal a los ojos de Yahvé
  rationale: Se conserva la evaluación moral directa y la perspectiva divina del hebreo. «Lo malo» mantiene la idiomaticidad de עשה + adjetivo sin introducir una interpretación más amplia.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source-text plain sense'
translation_notes:
  revision_awareness: El texto inglés auditado no muestra revisiones aplicadas y mantiene alta concordancia con la fuente hebrea; por eso la versión española sigue de cerca la estructura y el léxico del original sin introducir variantes textuales.
  spanish_consistency_notes:
  - Se mantiene Yahvé de forma consistente para יְהוָה.
  - Se conserva la metáfora de conducta con «andar en el camino de».
  - Se evita alternar entre «mal» y «malo» para no diluir la fórmula idiomática hebrea.
  - Los nombres propios siguen una transliteración española estable y legible.
