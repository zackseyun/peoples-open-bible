base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/012/021.yaml
  text: 'As he went to Ziklag[a], some from Manasseh defected to him: Adnah, Jozabad, Jediael, Michael, another Jozabad, Elihu, and Zillethai[c][b], chiefs of the thousands that belonged to Manasseh.'
  footnotes:
  - marker: a
    text: Hebrew literally, 'fell to him,' an idiom meaning they went over to David's side.
    reason: lexical_alternative
  - marker: b
    text: The name Jozabad appears twice in the Hebrew list, indicating two different men with the same name.
    reason: cultural_note
  - marker: c
    text: '''Chiefs of the thousands'' may refer to commanders of military units or leaders of clan divisions within Manasseh.'
    reason: lexical_alternative
