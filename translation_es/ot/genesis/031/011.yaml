revisions:
- from: 'Entonces el ángel de Dios me habló en el sueño[a]: «¡Jacob!». Y yo dije: «Aquí estoy».'
  to: 'Entonces el ángel de Dios me dijo en el sueño[a]: «Jacob». Y yo dije: «Aquí estoy».'
  rationale: Se reemplaza «me habló» por «me dijo» para reflejar con mayor fidelidad el verbo hebreo אמר y la decisión léxica auditada en inglés. Se elimina la exclamación en «Jacob» para no añadir un matiz enfático ausente en la fuente. Se conserva «en el sueño» con nota por el artículo definido del hebreo, y «Aquí estoy» como equivalente idiomático adecuado de הִנֵּנִי.
