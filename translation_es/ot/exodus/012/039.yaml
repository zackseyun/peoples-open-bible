translation:
  language: es
  text: Y hornearon la masa que habían sacado de Egipto en tortas sin levadura[a], porque no había fermentado[b]; pues habían sido expulsados de Egipto y no podían demorarse[c], y tampoco habían preparado provisiones para ellos mismos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'como tortas de pan sin levadura'. La expresión hebrea se refiere a tortas o panes hechos sin fermento.
    reason: lexical_alternative
  - marker: b
    text: O 'porque no se había leudado' o 'porque no había subido'. El verbo hebreo describe que la masa no llegó a fermentarse antes de hornearse.
    reason: lexical_alternative
  - marker: c
    text: O 'no podían quedarse'. El sentido es que no tenían tiempo para permanecer o esperar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאפ֨וּ
  english_pob_choice: they baked
  chosen_spanish: cocieron
  alternatives_spanish:
  - hornearon
  - cocieron al horno
  lexicon: HALOT
  rationale: El hebreo de אפה se refiere a preparar pan o tortas por cocción al calor; en español, 'cocieron' puede abarcar el proceso de cocer al horno sin forzar una imagen moderna y sigue siendo natural en un contexto antiguo.
- source_word: הַבָּצֵק
  english_pob_choice: the dough
  chosen_spanish: la masa
  alternatives_spanish:
  - la masa amasada
  - el dough
  lexicon: HALOT
  rationale: בצק denota masa para pan. 'Masa' es el equivalente natural en español y mantiene claridad narrativa.
- source_word: אֲשֶׁר הוֹצִיאוּ מִמִּצְרַיִם
  english_pob_choice: that they had brought out from Egypt
  chosen_spanish: que habían sacado de Egipto
  alternatives_spanish:
  - que habían traído de Egipto
  - que habían llevado fuera de Egipto
  lexicon: HALOT
  rationale: El verbo hebreo expresa sacar/llevar fuera. 'Habían sacado de Egipto' conserva el movimiento y la agencia del éxodo sin depender de un calco rígido.
- source_word: עֻגֹת מַצּוֹת
  english_pob_choice: into unleavened cakes
  chosen_spanish: en tortas sin levadura
  alternatives_spanish:
  - en tortas ázimas
  - en tortas sin fermento
  lexicon: HALOT
  rationale: עֻגֹת son tortas o panes redondos; מַצּוֹת especifica que no llevan fermento. 'Tortas sin levadura' es claro, bíblicamente comprensible y evita una forma demasiado técnica.
- source_word: כִּי לֹא חָמֵץ
  english_pob_choice: because it had not leavened
  chosen_spanish: porque no había fermentado
  alternatives_spanish:
  - porque no se había leudado
  - porque no había leudado
  lexicon: HALOT
  rationale: חמץ describe que la masa no llegó a fermentarse/leudarse. 'No había fermentado' transmite bien el proceso incompleto en español moderno, sin perder la tensión temporal del texto.
- source_word: כִּי גֹרְשׁוּ מִמִּצְרַיִם
  english_pob_choice: for they had been driven out from Egypt
  chosen_spanish: pues habían sido expulsados de Egipto
  alternatives_spanish:
  - porque habían sido echados de Egipto
  - pues los habían echado de Egipto
  lexicon: HALOT
  rationale: גרשׁ tiene fuerza de expulsión. 'Expulsados' conserva el matiz de desalojo forzado y encaja con el contexto de urgencia.
- source_word: וְלֹא יָכְלוּ לְהִתְמַהְמֵהַּ
  english_pob_choice: and could not delay
  chosen_spanish: y no podían demorarse
  alternatives_spanish:
  - y no podían tardarse
  - y no podían linger
  lexicon: HALOT
  rationale: התמהמה significa demorarse, tardar o entretenerse. 'Demorarse' es la opción española más natural y fiel al sentido de falta de tiempo.
- source_word: צֵדָה
  english_pob_choice: provisions
  chosen_spanish: provisiones
  alternatives_spanish:
  - víveres
  - abastecimiento
  lexicon: HALOT
  rationale: צדה se refiere a los pertrechos o provisiones para el camino. 'Provisiones' conserva amplitud y es comprensible en español bíblico contemporáneo.
- source_word: לָהֶם
  english_pob_choice: for themselves
  chosen_spanish: para sí
  alternatives_spanish:
  - para ellos mismos
  - para su propio uso
  lexicon: HALOT
  rationale: El pronombre enclítico apunta al uso propio de las provisiones. 'Para sí' mantiene concisión y estilo bíblico sin ambigüedad.
translation_notes:
  revision_awareness: 'La traducción sigue de cerca la lectura auditada en inglés (optimal-equivalence) y conserva las tres alternativas semánticas principales del verso: el proceso de cocción de la masa, su falta de fermentación y la imposibilidad de demorarse por la expulsión de Egipto. No se observaron revisiones aplicadas en el expediente inglés más reciente.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el Tetragrámaton cuando aparezca en el pasaje, pero este versículo no lo contiene.
  - Se mantiene la distinción entre 'masa' (בצק), 'tortas' (עֻגֹת) y 'sin levadura' (מַצּוֹת) para no fusionar términos distintos del hebreo.
  - '''Expulsados'' y ''demorarse'' reflejan la urgencia narrativa del éxodo sin introducir vocabulario eclesiástico ajeno al texto.'
