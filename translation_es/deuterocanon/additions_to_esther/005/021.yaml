translation:
  language: es
  text: Porque Dios, que gobierna sobre todo, ha hecho esto motivo de alegría para ellos, en lugar de la destrucción del pueblo escogido[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘del linaje escogido’ para ‘del pueblo escogido’ (τοῦ ἐκλεκτοῦ γένους).
    reason: lexical_alternative
lexical_decisions:
- source_word: ταύτην
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - este asunto
  - este evento
  lexicon: LSJ
  rationale: El demostrativo femenino griego se refiere a la situación inmediatamente anterior. En español, 'esto' conserva la referencia amplia y suena natural sin precisar indebidamente el referente.
- source_word: ὁ πάντα δυναστεύων θεὸς
  english_pob_choice: the God who rules over all
  chosen_spanish: Dios, que gobierna sobre todo
  alternatives_spanish:
  - el Dios que gobierna sobre todo
  - el Dios todopoderoso que gobierna sobre todo
  - el Dios que ejerce dominio sobre todo
  lexicon: LSJ
  rationale: δυναστεύων expresa ejercer poder o señorío. 'Gobierna sobre todo' preserva la soberanía activa de Dios con un español natural y digno. Se evita 'domina' por su matiz más duro en español.
- source_word: ἀντʼ ὀλεθρίας
  english_pob_choice: instead of the destruction
  chosen_spanish: en lugar de la destrucción
  alternatives_spanish:
  - en vez de la destrucción
  - en lugar de ruina
  - a cambio de la destrucción
  lexicon: LSJ
  rationale: ἀντί indica sustitución o intercambio. 'En lugar de' reproduce bien esa relación contrastiva y mantiene el sustantivo definido del original.
- source_word: τοῦ ἐκλεκτοῦ γένους
  english_pob_choice: the chosen race
  chosen_spanish: el linaje escogido
  alternatives_spanish:
  - el pueblo escogido
  - la raza escogida
  - la nación escogida
  lexicon: LSJ
  rationale: γένος puede ser linaje, estirpe, raza o pueblo. 'Linaje escogido' conserva el sentido de ascendencia/corporación y evita 'raza' en español actual, donde puede sonar más restringido o cargado. 'Escogido' mantiene la idea de elección divina.
- source_word: ἐποίησεν αὐτοῖς εὐφροσύνην
  english_pob_choice: has made this a joy for them
  chosen_spanish: ha hecho de esto una alegría para ellos
  alternatives_spanish:
  - ha hecho esto motivo de alegría para ellos
  - ha convertido esto en alegría para ellos
  - ha hecho que esto les sea alegría
  lexicon: LSJ
  rationale: ποιέω con acusativo predicativo puede expresar 'hacer' o 'convertir en'. 'Ha hecho de esto una alegría' conserva la relación directa con 'esto' y el valor de εὐφροσύνη como alegría/gozo, en un español fluido.
theological_decisions:
- issue: Soberanía divina en ὁ πάντα δυναστεύων θεὸς
  english_pob_reading: the God who rules over all
  chosen_spanish_reading: Dios, que gobierna sobre todo
  alternative_spanish_readings:
  - el Dios que gobierna sobre todo
  - el Dios soberano sobre todo
  - el Dios que tiene poder sobre todo
  rationale: La frase resalta la soberanía activa de Dios al revertir la destrucción amenazada. 'Gobierna sobre todo' comunica ese alcance universal sin añadir un título fijo no explicitado por el griego.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; readable modern Spanish'
- issue: έκλεκτοῦ γένους y el pueblo de Dios
  english_pob_reading: the chosen race
  chosen_spanish_reading: el linaje escogido
  alternative_spanish_readings:
  - el pueblo escogido
  - la estirpe escogida
  - la nación escogida
  rationale: El griego subraya la condición corporativa e histórica del pueblo elegido. 'Linaje' es una buena equivalencia de γένος y evita una lectura moderna de 'raza' que en español puede sonar más biológica de lo que el contexto exige.
  doctrine_reference: 'DOCTRINE.md: consistency of key terms, or documented exception'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que solo ajustó la puntuación de la cláusula relativa; el sentido base permaneció estable. La traducción española sigue de cerca el griego y el dictamen auditado, pero ajusta γένος a 'linaje' por claridad y por evitar posibles connotaciones problemáticas de 'raza' en español actual.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεός, conforme al contexto.
  - '''Gobierna sobre todo'' conserva la soberanía activa de δυναστεύων sin sobretraducir.'
  - '''Alegría'' traduce εὐφροσύνη con un registro claro y natural.'
  - Se usa 'linaje escogido' como opción principal para γένος, con nota alternativa anclada en el texto.
