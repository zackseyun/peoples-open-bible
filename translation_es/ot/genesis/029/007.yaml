translation:
  language: es
  text: 'Entonces él dijo[a]: «Miren, aún queda mucho día; no es tiempo de reunir el ganado. Den de beber al rebaño[b], y luego vayan a llevarlo a pastar».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aún es pleno día». El hebreo usa un modismo que literalmente dice «el día todavía es grande», es decir, que queda mucho del día.
    reason: lexical_alternative
  - marker: b
    text: «Ganado» traduce un término colectivo amplio para animales domesticados; «rebaño» traduce el término más específico para animales pequeños de pastoreo, como ovejas o cabras.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Miren
  - Vean
  - He aquí
  lexicon: HALOT
  rationale: Es una interjección deíctica que llama la atención. «Mira» conserva la fuerza discursiva con español natural y evita el tono arcaico de «He aquí».
- source_word: עוֹד הַיּוֹם גָּדוֹל
  english_pob_choice: the day is still long
  chosen_spanish: aún queda mucho día
  alternatives_spanish:
  - todavía queda mucha luz del día
  - el día todavía es largo
  - aún es de día y queda mucho
  lexicon: HALOT
  rationale: La expresión hebrea indica que queda gran parte del día; «aún queda mucho día» transmite bien la idea temporal sin forzar un calco literal de «grande».
- source_word: לֹא עֵת הֵאָסֵף הַמִּקְנֶה
  english_pob_choice: it is not time for the livestock to be gathered
  chosen_spanish: no es tiempo de reunir el ganado
  alternatives_spanish:
  - no es tiempo de juntar el ganado
  - no es tiempo de recoger el ganado
  - no es la hora de reunir el ganado
  lexicon: HALOT
  rationale: מִקְנֶה es un sustantivo colectivo para animales domésticos de pastoreo o crianza; «ganado» es el equivalente natural en español. «Reunir» comunica la idea pasiva/infinitiva de ser juntado sin añadir una dirección interpretativa indebida.
- source_word: הַשְׁקוּ
  english_pob_choice: Water
  chosen_spanish: Den de beber
  alternatives_spanish:
  - abrevien
  - den agua
  - hagan beber
  lexicon: HALOT
  rationale: El imperativo hitpael/hiphil de שׁקה significa dar de beber o hacer beber. «Den de beber» expresa la acción de forma clara y directa en español, preservando el mandato.
- source_word: הַצֹּאן
  english_pob_choice: the flock
  chosen_spanish: al rebaño
  alternatives_spanish:
  - al ganado menor
  - a las ovejas
  - al hato
  lexicon: HALOT
  rationale: צֹאן suele referirse al conjunto de animales menores de pastoreo, especialmente ovejas y cabras. «Rebaño» mantiene el sentido colectivo y es natural en esta escena junto al pozo.
- source_word: וּלְכ֥וּ
  english_pob_choice: then go
  chosen_spanish: y luego vayan
  alternatives_spanish:
  - y vayan
  - después vayan
  - entonces vayan
  lexicon: HALOT
  rationale: La conjunción más el imperativo expresa secuencia. «Y luego» hace explícito el orden de acciones sugerido por el contexto sin añadir contenido ajeno.
- source_word: רְעוּ
  english_pob_choice: pasture them
  chosen_spanish: pastorearlo
  alternatives_spanish:
  - apástenlo
  - pacínganlo
  - háganlo pastar
  lexicon: HALOT
  rationale: רעה aquí significa llevar a pastar, cuidar mediante pastoreo. «Pastorearlo» conserva ese sentido pastoral con un verbo natural en español; el objeto singular colectivo concuerda con «rebaño».
