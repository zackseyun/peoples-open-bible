  language: en
  yaml_path: translation/ot/joshua/006/008.yaml
  text: And it happened[a], when Joshua spoke to the people, that the seven priests carrying the seven ram's-horn trumpets before Yahweh passed on and blew the trumpets[b], and the ark of the covenant of Yahweh went behind them.
  footnotes:
