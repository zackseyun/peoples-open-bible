translation:
  language: es
  text: Y hizo la cortina[a] de azul, púrpura, carmesí[b] y lino fino torcido; la hizo con querubines, obra de un hábil diseñador[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «el velo».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo «carmesí» es literalmente una expresión para material o hilo teñido de escarlata; «escarlata» es una alternativa posible.
    reason: lexical_alternative
  - marker: c
    text: 'También: «obra de un hábil artesano» o «bordado». El hebreo se refiere a un trabajo artístico y con diseño.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַפָּרֹכֶת
  english_pob_choice: the curtain
  chosen_spanish: el velo
  alternatives_spanish:
  - la cortina
  - el cortinaje
  lexicon: HALOT
  rationale: פָּרֹכֶת designa la pieza divisoria interna del tabernáculo. En español, «velo» conserva la opción tradicional y también el sentido de barrera/separación; además, la nota permite mantener abierta la alternativa lexical equivalente al inglés POB («the curtain») sin imponer una sola tradición terminológica.
- source_word: תְּכֵלֶת
  english_pob_choice: blue
  chosen_spanish: azul
  alternatives_spanish:
  - azul teído
  - azul-púrpura
  lexicon: HALOT
  rationale: El término indica material o color teñido de azul en textiles del santuario. «Azul» es la forma más natural en español y evita forzar una especificación de hilo que el hebreo no repite en cada color.
- source_word: אַרְגָּמָן
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - púrpura teñida
  - morado
  lexicon: HALOT
  rationale: La referencia es al tinte/textil púrpura de prestigio. «Púrpura» corresponde bien al valor léxico y mantiene el registro cultual del pasaje.
- source_word: תוֹלַעַת שָׁנִי
  english_pob_choice: scarlet yarn
  chosen_spanish: carmesí
  alternatives_spanish:
  - escarlata
  - hilo carmesí
  lexicon: HALOT
  rationale: El hebreo denota material teñido de escarlata/carmesí; en español, «carmesí» resume naturalmente la expresión cromática. No se añadió «hilo» en el cuerpo porque el contexto de textiles ya lo presupone; así se evita una repetición algo pesada y se conserva la fluidez.
- source_word: שֵׁשׁ מָשְׁזָר
  english_pob_choice: fine twisted linen
  chosen_spanish: lino fino torcido
  alternatives_spanish:
  - lino fino retorcido
  - lino finamente torcido
  lexicon: HALOT
  rationale: שֵׁשׁ es lino fino, y מָשְׁזָר añade la idea de torcido/trenzado. «Lino fino torcido» expresa ambos componentes con naturalidad en español, preservando la textura material sin sobreexplicar.
- source_word: מַעֲשֵׂה חֹשֵׁב
  english_pob_choice: the work of a skillful designer
  chosen_spanish: obra de un hábil diseñador
  alternatives_spanish:
  - obra de un hábil artesano
  - trabajo de un experto en diseños
  - obra de un tejedor experto
  lexicon: HALOT
  rationale: La expresión apunta a trabajo artístico y planificado, no solo labor manual. «Hábil diseñador» mantiene la idea de diseño intencional y patrón elaborado, en paralelo al valor interpretativo documentado por el POB inglés.
- source_word: כְּרֻבִים
  english_pob_choice: cherubim
  chosen_spanish: querubines
  alternatives_spanish:
  - querubines alados
  - querubes
  lexicon: HALOT
  rationale: «Querubines» es el plural establecido en español bíblico y conserva el registro sacro mejor que una paráfrasis moderna. Mantiene la referencia a las figuras celestiales incorporadas en el tejido.
- source_word: עָשָׂה אֹתָהּ כְּרֻבִים
  english_pob_choice: he made it with cherubim
  chosen_spanish: lo hizo con querubines
  alternatives_spanish:
  - lo hizo con querubines tejidos
  - lo hizo con querubines bordados
  lexicon: HALOT
  rationale: La sintaxis hebrea indica que los querubines formaban parte del diseño del velo. «Lo hizo con querubines» es breve y fiel; el contexto y la nota cubren la posibilidad de bordado o trabajo ornamental sin fijar indebidamente el medio.
theological_decisions:
- issue: 'Terminología de la pieza del tabernáculo: ''veil'' vs ''curtain'''
  english_pob_reading: 'The POB keeps a lexical alternative: ''the curtain'' with note ''Or the veil.'''
  chosen_spanish_reading: «el velo» con nota que mantiene la alternativa «la cortina»
  alternative_spanish_readings:
  - la cortina
  - el cortinaje
  rationale: En español, «velo» es la forma bíblica tradicional y comunica bien la función de separación litúrgica. Sin embargo, como el POB preserva la alternativa léxica, la nota mantiene la equivalencia posible con «la cortina» para no borrar la tensión terminológica del hebreo.
  doctrine_reference: Éxodo 26; Hebreos 10:20
- issue: Naturaleza del trabajo decorativo en los querubines
  english_pob_reading: '''the work of a skillful designer'' with note allowing ''skillful craftsman'' or ''embroidered work'''
  chosen_spanish_reading: «obra de un hábil diseñador»
  alternative_spanish_readings:
  - obra de un hábil artesano
  - bordado
  - obra bordada
  rationale: El hebreo permite entender un trabajo artístico de diseño, posiblemente bordado o tejido ornamental. En vez de fijar un solo procedimiento, la redacción española conserva la amplitud del POB inglés y mantiene la posibilidad de distintas realizaciones técnicas.
  doctrine_reference: Éxodo 26:31; 1 Reyes 6:29
translation_notes:
  revision_awareness: 'El borrador sigue el estado revisado del POB inglés sin cambios sustantivos: conserva la lectura de ''curtain/veil'', la gama cromática, la traducción de ''fine twisted linen'', y la ambigüedad técnica de מַעֲשֵׂה חֹשֵׁב como trabajo artístico especializado. No se documentaron revisiones textuales que alteren la base de traducción.'
  spanish_consistency_notes:
  - Se usó 'Y' al inicio por el estilo narrativo castellano fluido, equivalente a la coordinación hebrea.
  - Se evitó 'SEÑOR' para el tetragrámaton porque este versículo no lo contiene.
  - Se mantuvo 'querubines' como plural técnico bíblico establecido en español.
  - No se repitió 'hilo' en la lista cromática para no sobrecargar una enumeración de materiales ya entendida como textil.
