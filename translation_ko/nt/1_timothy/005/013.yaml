id: 1TI.5.13
reference: 1 Timothy 5:13
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἅμα δὲ καὶ ἀργαὶ μανθάνουσιν, περιερχόμεναι τὰς οἰκίας, οὐ μόνον δὲ ἀργαὶ ἀλλὰ καὶ φλύαροι καὶ περίεργοι, λαλοῦσαι τὰ μὴ δέοντα.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/005/013.yaml
  text: At the same time[a], they also learn to be idle, going around from house to house; and not only idle, but also gossips and busybodies[b], saying what they ought not to say.
  footnotes:
  - marker: a
    text: Or 'talkative women' for 'gossips'; the Greek term can denote foolish or empty talk more broadly, though in this context it likely includes gossip.
    reason: lexical_alternative
  - marker: b
    text: Or 'meddlers' for 'busybodies.'
    reason: lexical_alternative
translation:
  language: ko
  text: 동시에 그들은 게으름을 배워 이 집 저 집 돌아다닙니다. 게으를 뿐 아니라 험담[a]하고 남의 일에 참견하는 자[b]가 되어 해서는 안 될 말을 합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「수다스러운 여자들」. 헬라어 φλύαρος는 어리석거나 공허한 말을 폭넓게 가리킬 수 있으나, 본 문맥에서는 험담을 포함하는 것으로 보인다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「참견꾼」.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀργαὶ μανθάνουσιν
  english_pob_choice: learn to be idle
  chosen_korean: 게으름을 배워
  alternatives_korean:
  - 게으른 자가 되는 법을 배워
  - 무위(無爲)에 익숙해져
  lexicon: BDAG
  rationale: ἀργός의 「게으른」.
- source_word: περιερχόμεναι τὰς οἰκίας
  english_pob_choice: going around from house to house
  chosen_korean: 이 집 저 집 돌아다닙니다
  alternatives_korean:
  - 집집마다 돌아다니며
  lexicon: BDAG
  rationale: 「이 집 저 집」이 자연스럽다.
- source_word: φλύαροι
  english_pob_choice: gossips
  chosen_korean: 험담하고
  alternatives_korean:
  - 헛소리하고
  - 수다스럽고
  lexicon: BDAG
  rationale: 본 문맥의 부정 평가를 「험담」으로.
- source_word: περίεργοι
  english_pob_choice: busybodies
  chosen_korean: 남의 일에 참견하는 자
  alternatives_korean:
  - 참견꾼
  - 호기심 가득한 자
  lexicon: BDAG
  rationale: περίεργος의 「쓸데없이 참견함」을 풀어서.
- source_word: λαλοῦσαι τὰ μὴ δέοντα
  english_pob_choice: saying what they ought not to say
  chosen_korean: 해서는 안 될 말을 합니다
  alternatives_korean:
  - 마땅치 않은 말을 합니다
  lexicon: BDAG
  rationale: 자연스러운 한국어.
