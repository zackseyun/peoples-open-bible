translation:
  language: es
  text: 'El rey respondió y dijo a Daniel, cuyo nombre era Belsasar: «¿Eres capaz de darme a conocer el sueño que vi y su interpretación?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: עָנֵה
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: HALOT
  rationale: En español, «respondió» reproduce bien la fórmula narrativa de réplica directa. Como el hebreo/arameo también incluye después «y dijo», la construcción completa se conserva en el texto para reflejar la dupla formular.
- source_word: מַלְכָּא
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - rey
  lexicon: HALOT
  rationale: La forma determinada pide artículo en español. «El rey» es la correspondencia natural y mantiene el valor referencial concreto del relato.
- source_word: וְאָמַר
  english_pob_choice: and said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y habló
  - y contestó
  lexicon: HALOT
  rationale: «Y dijo» conserva la fórmula narrativa estable del pasaje y no añade matices que el original no exige.
- source_word: לְדָנִיֵּאל
  english_pob_choice: to Daniel
  chosen_spanish: a Daniel
  alternatives_spanish:
  - para Daniel
  lexicon: HALOT
  rationale: El dativo personal se expresa de modo natural con «a» en español.
- source_word: דִּי שְׁמֵהּ בֵּלְטְשַׁאצַּר
  english_pob_choice: whose name was Belteshazzar
  chosen_spanish: cuyo nombre era Belsasar
  alternatives_spanish:
  - que se llamaba Belsasar
  - de nombre Belsasar
  lexicon: HALOT
  rationale: El relativo arameo con «su nombre» se vierte de forma idiomática como «cuyo nombre era». Se usa «Belsasar» como forma española estable del nombre, manteniendo la identificación histórica del personaje.
- source_word: הֲאִיתָךְ
  english_pob_choice: Are you
  chosen_spanish: ¿Eres capaz de
  alternatives_spanish:
  - ¿Puedes
  - ¿Estás en condiciones de
  lexicon: HALOT
  rationale: La pregunta no solo indaga existencia o estado, sino capacidad. Por eso «¿Eres capaz de» refleja mejor el valor interrogativo con כָּהֵל que un simple «¿puedes?».
- source_word: כָּהֵל
  english_pob_choice: able
  chosen_spanish: capaz
  alternatives_spanish:
  - apto
  - en condiciones
  lexicon: HALOT
  rationale: «Capaz» comunica aptitud o habilidad de manera clara y digna, equivalente al valor de capacidad/poder del término arameo.
- source_word: לְהוֹדָעֻתַנִי
  english_pob_choice: to make known to me
  chosen_spanish: darme a conocer
  alternatives_spanish:
  - hacerme saber
  - informarme
  lexicon: HALOT
  rationale: Se conserva el sentido causativo de «hacer conocer» con una expresión natural en español. «Darme a conocer» evita la sequedad de un calco y mantiene el movimiento semántico del verbo.
- source_word: חֶלְמָא
  english_pob_choice: the dream
  chosen_spanish: el sueño
  alternatives_spanish:
  - el sueño aquel
  lexicon: HALOT
  rationale: En español bíblico y contemporáneo, «sueño» es la forma natural para el contenido onírico de Nabucodonosor; el contexto aclara que no se trata de un sueño cualquiera sino del ya mencionado.
- source_word: דִּי חֲזֵית
  english_pob_choice: that I saw
  chosen_spanish: que vi
  alternatives_spanish:
  - que había visto
  - que yo vi
  lexicon: HALOT
  rationale: El relativo mantiene la relación estrecha con «el sueño». «Que vi» conserva el pasado narrativo simple y resulta natural en español.
- source_word: וּפִשְׁרֵהּ
  english_pob_choice: and its interpretation
  chosen_spanish: y su interpretación
  alternatives_spanish:
  - y su significado
  - y su explicación
  lexicon: HALOT
  rationale: «Interpretación» preserva el valor técnico de פשר en Daniel para la explicación de sueños y misterios, como en la decisión inglesa auditada.
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el texto fuente y con la auditoría inglesa: no se registran revisiones aplicadas ni variantes textuales relevantes en el paquete proporcionado.'
  spanish_consistency_notes:
  - Se mantiene la fórmula narrativa completa «respondió y dijo» para reflejar el paralelismo del original.
  - Se usa «Belsasar» como forma española estable del nombre Belteshazzar, sin alterar la identificación del personaje.
  - «Interpretación» se conserva por su valor técnico en Daniel, no como simple «significado».
  - El registro es sobrio y bíblico, pero con sintaxis natural para el español actual.
