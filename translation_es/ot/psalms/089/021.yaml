    issue: עַבְדִּי fue traducido como 'mi esclavo' en vez de 'mi siervo'.
    rationale: La evidencia fuente permite 'servant/slave', pero el English POB ya justificó 'my servant' porque aquí es una designación honorífica y pactal de David en teología real. En español, 'mi esclavo' introduce una dureza semántica que el contexto no exige y contradice la decisión auditada.
  - severity: medium
    issue: '''Óleo'' suena menos natural que ''aceite'' en este contexto.'
    rationale: Aunque 'óleo' puede usarse en contextos litúrgicos, 'aceite' es la opción más amplia y clara en español general y comunica bien el hebreo שׁמן en una unción real. No afecta doctrina, pero mejora fidelidad idiomática.
  - severity: low
    issue: La nota al pie actual defiende una alternativa contraria a la decisión contextual principal.
    rationale: Si se conserva nota, debe reflejar que 'siervo' es la lectura principal y que 'esclavo' es solo una posibilidad léxica no adoptada aquí. También puede simplificarse siguiendo la nota inglesa sobre el valor de los perfectos.
  revised_spanish_text: He hallado a David, mi siervo[a]; con mi aceite santo lo he ungido.
