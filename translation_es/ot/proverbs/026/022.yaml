    text: Or 'like dainty bits' / 'like things greedily swallowed.' The Hebrew term is rare and debated; older tradition rendered it 'like wounds.'
    reason: lexical_alternative
  - marker: b
    text: '''The inner chambers of the belly'' is a Hebrew image for the deepest inward parts of a person.'
    reason: cultural_note
