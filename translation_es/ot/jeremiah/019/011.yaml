translation:
  language: es
  text: 'Y les dirás: «Así dice Yahvé de los ejércitos: Así quebraré a este pueblo y a esta ciudad, como se quiebra una vasija de alfarero, que no puede volver a repararse[a]; y en Tófet enterrarán, porque no hay otro lugar para enterrar».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «que no puede ser sanada otra vez»; aquí el sentido es que la vasija quebrada no puede volver a repararse.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio divino, no un título. En español, el equivalente de la política del POB es «Yahvé», que preserva el nombre del pacto y evita la sustitución por «SEÑOR».
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: El complemento expresa el título divino. «De los ejércitos» conserva la amplitud del hebreo sin sonar arcaizante en exceso; «huestes» sería más tradicional, pero menos claro para lector moderno.
- source_word: כָּכָה
  english_pob_choice: So
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - De esa manera
  lexicon: HALOT
  rationale: Aquí el adverbio remite al acto simbólico de quebrar el vaso. «Así» reproduce bien la relación demostrativa y mantiene el contraste con el introducido por כֹּה en la fórmula de discurso.
- source_word: אֶשְׁבֹּר
  english_pob_choice: I will break
  chosen_spanish: quebraré
  alternatives_spanish:
  - romperé
  - haré pedazos
  lexicon: HALOT
  rationale: «Quebrar» mantiene el vínculo verbal con el siguiente יִשְׁבֹּר y transmite la violencia del signo profético. «Romper» sería posible, pero un poco más general.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - esta gente
  - esta nación
  lexicon: HALOT
  rationale: «Pueblo» refleja mejor el lenguaje pactual de Jeremías que «nación» y corresponde al sustantivo colectivo hebreo.
- source_word: הָעִיר הַזֹּאת
  english_pob_choice: this city
  chosen_spanish: esta ciudad
  lexicon: HALOT
  rationale: Traducción directa y transparente del sintagma, con referencia contextual a Jerusalén.
- source_word: כְּלִי הַיּוֹצֵר
  english_pob_choice: a potter’s vessel
  chosen_spanish: un vaso del alfarero
  alternatives_spanish:
  - un recipiente del alfarero
  - un vaso de alfarero
  lexicon: HALOT
  rationale: כְּלִי es un término amplio para objeto/recipiente; en español, «vaso» funciona como equivalente general sin estrechar demasiado el sentido a «jarra». «Vaso del alfarero» conserva la amplitud mejor que «jarra del alfarero», que sería más específica que el hebreo.
- source_word: לֹא יוּכַל לְהֵרָפֵה עוֹד
  english_pob_choice: which cannot be repaired again
  chosen_spanish: que no puede repararse más
  alternatives_spanish:
  - que ya no puede sanarse
  - que no puede ser restaurado de nuevo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «no puede ser sanado/curado otra vez»; en el contexto de cerámica, la idea es la imposibilidad de reparación. «Repararse» expresa bien esa tensión sin perder la metáfora; «sanarse» conservaría la literalidad, pero sonaría demasiado extraño en español.
- source_word: וּבְתֹפֶת
  english_pob_choice: and in Topheth
  chosen_spanish: y en Tófet
  alternatives_spanish:
  - y en Tofet
  - y en Tophet
  lexicon: HALOT
  rationale: Topheth es nombre propio de lugar y se translitera. «Tófet» sigue la grafía española naturalizada y preserva el referente histórico.
- source_word: יִקְבְּרוּ
  english_pob_choice: they will bury
  chosen_spanish: enterrarán
  alternatives_spanish:
  - sepultarán
  - ellos enterrarán
  lexicon: HALOT
  rationale: El verbo es activo plural; en español, la forma impersonal/plural «enterrarán» comunica bien la acción sin añadir un sujeto no expresado. «Sepultarán» sería igualmente posible, pero «enterrar» es más inmediato.
- source_word: מֵאֵין מָקוֹם לִקְבּוֹר
  english_pob_choice: because there is no place else to bury
  chosen_spanish: porque no hay lugar para enterrar
  alternatives_spanish:
  - porque no hay sitio para sepultar
  - pues no hay lugar donde enterrar
  lexicon: HALOT
  rationale: La construcción expresa carencia de lugar para entierro. En español, «no hay lugar para enterrar» es natural y fiel; no se añade «else» porque el valor causal ya queda claro en el contexto del verso.
theological_decisions:
- issue: Traducción del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue la política del POB de no ocultar el Tetragrámaton detrás de un título. «Yahvé» preserva el nombre propio divino y es la forma establecida en el proyecto para el español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH → Yahvé'
- issue: Imagen profética de la vasija del alfarero
  english_pob_reading: a potter’s vessel ... cannot be repaired again
  chosen_spanish_reading: un vaso del alfarero ... que no puede repararse más
  alternative_spanish_readings:
  - una vasija del alfarero ... que no puede repararse más
  - un recipiente del alfarero ... que no puede repararse más
  rationale: La metáfora conserva la violencia del signo profético y la imposibilidad de restauración. «Vaso» se eligió por su amplitud semántica en español y porque evita restringir indebidamente el hebreo כְּלִי a una forma particular como «jarra».
  doctrine_reference: Jeremías 19:11, signo profético del vaso irremediablemente quebrado
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: el cambio de ''In this way'' a ''So'' y la aclaración causal de מֵאֵין. En español se optó por ''Así'' para mantener la referencia al gesto simbólico, y por ''porque no hay lugar para enterrar'' como causal natural y explícita, sin añadir una nota equivalente a ''else'' porque el español ya lo expresa adecuadamente en contexto.'
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma del Tetragrámaton, conforme al estándar del proyecto.
  - Se conserva el paralelismo verbal entre quebraré / se quiebra para reflejar el hebreo.
  - Tophet se translitera como Tófet, con acento ortográfico español.
  - Se evita 'SEÑOR' como sustituto del nombre divino.
  - La metáfora de reparación se vierte con 'repararse' para no perder la tensión entre 'sanar' y 'arreglar'.
