review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: Elías niega haber causado el problema en Israel, traslada la culpa a Acab y a su casa, da la causa con «porque habéis abandonado los mandamientos de Yahvé», y conserva correctamente el plural «los baales». También mantiene «Yahvé» conforme al proyecto. Sin embargo, hay desajustes menores: «perturbado» suena menos natural y menos preciso que «traído desgracia/problemas» o «causado trastorno» en este contexto; además, la nota [b] no corresponde al lugar anclado ni al sentido del inglés auditado, pues propone «te has acarreado problemas a ti mismo», que no refleja el objeto «Israel».'
  spanish_quality_summary: 'La frase es mayormente clara, pero mezcla registro y persona verbal de modo menos natural para español neutral: «sino tú y la casa de tu padre» queda elíptico; conviene explicitar el verbo para mejor legibilidad. «Habéis» es aceptable si se mantiene coherencia, pero en español latinoamericano ampliamente legible suena más natural «han». También «los baales» debe ir con mayúscula inicial como nombre cultual: «los Baales».'
  glossary_alignment: 'Alineación buena en términos clave: יְהוָה → «Yahvé», מִצְוֺת → «mandamientos», הַבְּעָלִים → «los Baales» preservando el plural. La principal corrección léxica es עָכַרְתִּי: «he causado problemas a Israel» o similar comunica mejor la fuerza contextual que «he perturbado a Israel».'
  issues:
  - severity: medium
    issue: «No he perturbado a Israel» es poco natural y algo débil para עָכַרְתִּי en este contexto.
    rationale: El verbo aquí apunta a causar calamidad/trastorno sobre la comunidad, en eco de la acusación previa. En español bíblico natural, «he causado problemas a Israel» o «he traído desgracia sobre Israel» transmite mejor el sentido.
  - severity: high
    issue: 'La nota [b] da una alternativa equivocada: «te has acarreado problemas a ti mismo».'
    rationale: El hebreo y el inglés auditado refieren a traer problemas sobre Israel, no sobre uno mismo. La nota actual cambia el objeto y por eso no es fiel al expediente fuente.
  - severity: medium
    issue: «sino tú y la casa de tu padre» deja el verbo implícito de manera algo brusca.
    rationale: Aunque comprensible, en español resulta más claro repetir «lo han hecho» o reformular con verbo expreso.
  - severity: low
    issue: «los baales» debería normalizarse como «los Baales».
    rationale: Como designación cultual derivada del nombre propio Baal, la mayúscula mejora la presentación y la legibilidad.
  - severity: medium
    issue: Uso de «habéis» en una edición orientada a español latinoamericano amplio.
    rationale: No es incorrecto, pero «han»/«has» suele ser más neutral y ampliamente natural en el registro pedido. Dado que se dirige a Acab singular y a su casa plural/colectivo, conviene una reformulación que evite la fricción.
  revised_spanish_text: 'Y él dijo: «Yo no he causado problemas a Israel,[a] sino tú y la casa de tu padre, porque han abandonado los mandamientos de Yahvé y has ido tras los Baales».[b]'
  revised_footnotes:
