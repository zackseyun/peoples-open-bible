  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen términos como Yahvé/Mesías que requieran intervención. La elección de «bienaventurado», «atrios», «casa» y «templo» concuerda con el registro esperado. Se mantiene adecuadamente el lenguaje concreto del culto.
