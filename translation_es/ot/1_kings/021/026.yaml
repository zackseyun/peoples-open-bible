translation:
  language: es
  text: Y actuó de manera muy abominable, al ir tras los ídolos[a], conforme a todo lo que habían hecho los amorreos, a quienes Yahvé expulsó de delante de los hijos de Israel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo גִּלֻּלִים es un término muy despectivo para «ídolos»; también puede entenderse como «ídolos detestables» o, de modo más literal, «ídolos de estiércol».
    reason: lexical_alternative
  - marker: b
    text: «Los hijos de Israel» puede expresarse también de manera más idiomática como «los israelitas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּתְעֵב
  english_pob_choice: acted very abominably
  chosen_spanish: actuó con gran abominación
  alternatives_spanish:
  - actuó muy abominablemente
  - hizo abominaciones
  - se volvió abominable
  lexicon: HALOT
  rationale: El verbo expresa conducta moralmente detestable; en español, «actuó con gran abominación» conserva el juicio verbal sin sonar tan artificial como un adjetivo estático. «Con gran» transmite מְאֹד de modo natural.
- source_word: מְאֹד
  english_pob_choice: very
  chosen_spanish: con gran
  alternatives_spanish:
  - muy
  - en gran manera
  - sumamente
  lexicon: HALOT
  rationale: Es un intensificador; en esta estructura, «con gran» fluye mejor con «abominación» que una repetición adverbial directa.
- source_word: לָלֶכֶת אַחֲרֵי
  english_pob_choice: by going after
  chosen_spanish: al ir tras
  alternatives_spanish:
  - al seguir
  - al ir después de
  - al perseguir
  lexicon: HALOT
  rationale: La expresión hebrea comunica seguir una lealtad o práctica; «ir tras» preserva la metáfora bíblica de perseguir algo como objeto de devoción.
- source_word: הַגִּלֻּלִים
  english_pob_choice: idols
  chosen_spanish: los ídolos
  alternatives_spanish:
  - los ídolos detestables
  - los ídolos de estiércol
  - los detestables ídolos
  lexicon: HALOT
  rationale: El término hebreo es despectivo, pero en el cuerpo principal «ídolos» es la opción más clara y publicable; la connotación fuerte queda reflejada en la nota.
- source_word: כְּכֹל אֲשֶׁר עָשׂוּ
  english_pob_choice: according to all that the Amorites had done
  chosen_spanish: conforme a todo lo que habían hecho
  alternatives_spanish:
  - según todo lo que habían hecho
  - de acuerdo con todo lo que habían hecho
  - tal como habían hecho
  lexicon: HALOT
  rationale: La relación comparativa se rinde con una fórmula natural en español que mantiene la correspondencia con el modelo amorreo sin sobrerinterpretarlo.
- source_word: הָאֱמֹרִי
  english_pob_choice: the Amorites
  chosen_spanish: los amorreos
  alternatives_spanish:
  - los amoritas
  - el amorreo
  lexicon: HALOT
  rationale: Aunque el hebreo es singular morfológico, funciona colectivamente; el plural español es la forma idiomática y clara.
- source_word: הוֹרִישׁ
  english_pob_choice: drove out
  chosen_spanish: expulsó
  alternatives_spanish:
  - echó fuera
  - despojó
  - arrojó
  lexicon: HALOT
  rationale: El Hifil de ירשׁ indica hacer perder posesión de la tierra; «expulsó» comunica bien la acción de sacar a esos pueblos de delante de Israel.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: «Yahvé» en el texto principal, conservando el nombre divino propio en lugar de sustituirlo por un título.'
- source_word: מִפְּנֵי
  english_pob_choice: before
  chosen_spanish: de delante de
  alternatives_spanish:
  - de la presencia de
  - ante
  - de frente a
  lexicon: HALOT
  rationale: En este contexto expresa remoción desde la presencia de Israel; «de delante de» es la formulación bíblica natural en español y evita ambigüedad.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  - los descendientes de Israel
  lexicon: HALOT
  rationale: Se mantiene la forma literal y masculinizada del hebreo, conforme al principio de fidelidad de género del proyecto; «los israelitas» puede anotarse como equivalente idiomático.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto fuente usa el nombre propio de Dios, no un título. En español del proyecto, «Yahvé» preserva esa referencia directa y evita la sustitución devocional por «Señor».
  doctrine_reference: 'DOCTRINE.md: YHWH → Yahvé'
- issue: Tratamiento de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  - los hijos/descendientes de Israel
  rationale: Se conserva la forma masculina del hebreo, que en este contexto designa al pueblo del pacto. La alternativa más idiomática («los israelitas») se deja registrada como posibilidad, pero no sustituye la forma de base.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Fuerza despectiva de גִּלֻּלִים
  english_pob_reading: idols
  chosen_spanish_reading: ídolos
  alternative_spanish_readings:
  - ídolos detestables
  - ídolos de estiércol
  rationale: El hebreo tiene una carga peyorativa fuerte. En el texto principal se mantiene la claridad con «ídolos» y se preserva la dureza semántica en nota, para no enturbiar la lectura con una expresión demasiado técnica o chocante.
  doctrine_reference: HALOT / lexical note in source packet
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa más reciente, que prefirió «according to all that the Amorites had done» frente a «just as all the Amorites had done», y reflejé esa comparación con «conforme a todo lo que habían hecho». También preservé el nombre divino como Yahvé, siguiendo el criterio doctrinal actualizado del proyecto, y mantuve la forma masculina del hebreo en «los hijos de Israel».
  spanish_consistency_notes:
  - Usé «Yahvé» para יְהוָה, coherente con el estándar del proyecto.
  - Mantuve «los hijos de Israel» en lugar de neutralizar a «israelitas» en el cuerpo principal, dejando la alternativa en nota.
  - Opté por «ídolos» en el texto principal, con nota que preserva la fuerza peyorativa del hebreo.
  - La comparación hebrea כְּכֹל אֲשֶׁר se reflejó con «conforme a todo lo que», evitando sobretraducción interpretativa.
