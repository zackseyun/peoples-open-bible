  text: שֶׁ֤בֶר עַל שֶׁ֨בֶר֙ נִקְרָ֔א כִּ֥י שֻׁדְּדָ֖ה כָּל הָ/אָ֑רֶץ פִּתְאֹם֙ שֻׁדְּד֣וּ אֹהָלַ֔/י רֶ֖גַע יְרִיעֹתָֽ/י־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/004/020.yaml
  text: Disaster upon disaster is proclaimed[a], for the whole land is devastated. Suddenly my tents are devastated[b], my curtains in a moment.
  footnotes:
  - marker: a
    text: Or 'the whole earth.' The Hebrew אֶרֶץ can mean either 'land' or 'earth'; here the context favors the land under judgment.
    reason: alternative_reading
  - marker: b
    text: '''My curtains'' refers to tent-curtains; the line uses the imagery of a dwelling suddenly destroyed.'
    reason: cultural_note
