base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/015/006.yaml
  text: You have forsaken me[a], declares Yahweh; you keep going backward. So I have stretched out my hand against you and destroyed you[b]; I am weary of relenting.
  footnotes:
  - marker: a
    text: Or 'you keep turning back' / 'you go backward.' The Hebrew is literally 'backward you go,' using movement imagery for apostasy.
    reason: lexical_alternative
  - marker: b
    text: Or 'I am weary of changing my mind.' The Hebrew verb can denote relenting from judgment; 'relenting' is used here to avoid suggesting moral repentance in God.
    reason: alternative_reading
