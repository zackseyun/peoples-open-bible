review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo y sigue de cerca la trayectoria auditada en inglés: declaración solemne, vigilancia activa de Yahvé para juicio, contraste «para mal y no para bien», fórmula distributiva «todo hombre de Judá», y destrucción por espada y hambre hasta consumación. Sin embargo, la nota [c] no funciona como verdadera alternativa, porque repite exactamente la redacción del texto principal en vez de preservar una variante significativa como en el audit trail inglés.'
  spanish_quality_summary: El español es claro, digno y ampliamente legible. «He aquí», «velando sobre ellos», «para mal y no para bien», y «tierra de Egipto» son naturales dentro del registro bíblico buscado. «Perecerá» es aceptable para וְתַמּוּ aunque algo más interpretativo que «llegará a su fin»; no exige cambio. La única reparación necesaria es la nota final, para evitar redundancia y dar una alternativa útil.
  glossary_alignment: No hay términos del glosario principal en conflicto salvo que el nombre divino no aparece en este versículo. La decisión de mantener «todo hombre de Judá» concuerda con la política de género distributivo. «Para mal» sigue adecuadamente la rationale de רָעָה como daño/calidad de juicio y no mal moral.
  issues:
  - severity: medium
    issue: La nota [c] repite la traducción principal en lugar de ofrecer una alternativa real o aclaración necesaria.
    rationale: El texto principal ya dice «hasta que sean consumidos[c]», y la nota dice «El hebreo puede expresarse como “hasta que sean consumidos”». Esto no aporta información y no preserva la alternativa documentada en inglés («until they are consumed» / alternativa «until they are finished») de manera útil para el lector español.
  revised_spanish_text: He aquí[a], yo estoy velando sobre ellos para mal y no para bien; y todo hombre de Judá que está en la tierra de Egipto[b] perecerá por la espada y por el hambre, hasta que sean consumidos[c].
  revised_footnotes:
  - marker: a
    text: «He aquí» reproduce la fórmula profética de atención; también podría traducirse «Mira» o «Miren», pero el registro solemne del hebreo favorece esta opción.
    reason: lexical_alternative
  - marker: b
    text: 'La frase hebrea usa singular masculino distributivo: «todo hombre de Judá»; el sentido abarca al conjunto representado por esa forma.'
    reason: lexical_alternative
  - marker: c
    text: O «hasta que se acaben»; el hebreo expresa consumación total o fin completo bajo juicio.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural, pero se corrige la nota [c] para que sea una verdadera alternativa léxica y no una repetición inútil de la misma frase del cuerpo del texto.
