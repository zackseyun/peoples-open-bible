id: JOS.6.9
reference: Joshua 6:9
source:
  edition: WLC
  text: וְ/הֶ/חָל֣וּץ הֹלֵ֔ךְ לִ/פְנֵי֙ הַ/כֹּ֣הֲנִ֔ים תקעו הַ/שּֽׁוֹפָר֑וֹת וְ/הַֽ/מְאַסֵּ֗ף הֹלֵךְ֙ אַחֲרֵ֣י הָ/אָר֔וֹן הָל֖וֹךְ וְ/תָק֥וֹעַ בַּ/שּׁוֹפָרֽוֹת׃
translation:
  text: And the armed men were going before the priests who were blowing the trumpets[a], and the rear guard was going behind the ark, while they kept blowing the trumpets.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew shofarot, specifically horns, often rendered 'ram's horns.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶחָלוּץ
  chosen: the armed men
  alternatives:
  - the vanguard
  - the armed force
  - the men armed for battle
  lexicon: HALOT
  rationale: In Joshua this term refers to the armed contingent going ahead in battle order. 'The armed men' is clear modern English and fits the military procession context better than the more abstract 'vanguard,' while still reflecting the substantive participial form.
- source_word: הֹלֵךְ
  chosen: were going
  alternatives:
  - went
  - was going
  lexicon: HALOT
  rationale: The participle conveys ongoing action within the procession. English past progressive best captures the durative sense in narrative context.
- source_word: לִפְנֵי
  chosen: before
  alternatives:
  - in front of
  lexicon: HALOT
  rationale: '''Before'' is the natural spatial rendering here and preserves the formal relation in the procession order.'
- source_word: הַכֹּהֲנִים
  chosen: the priests
  lexicon: HALOT
  rationale: Standard rendering of the noun in cultic and narrative contexts.
- source_word: תקעו הַשּׁוֹפָרוֹת
  chosen: who were blowing the trumpets
  alternatives:
  - blowing the ram's horns
  - sounded the trumpets
  lexicon: HALOT
  rationale: The clause modifies 'the priests' and describes their ongoing action. 'Blowing' matches the verbal idea better than the idiomatic 'sounded.' Although שׁוֹפָר can be specified as a ram's horn, 'trumpets' is idiomatic and understandable in English; the more specific alternative is preserved in a footnote.
- source_word: הַמְאַסֵּף
  chosen: the rear guard
  alternatives:
  - the rear
  - the rearguard
  lexicon: HALOT
  rationale: This term denotes the gathering force at the rear of a marching formation. 'The rear guard' communicates the military function clearly.
- source_word: אַחֲרֵי
  chosen: behind
  alternatives:
  - after
  lexicon: HALOT
  rationale: Spatial sense is primary here in the description of procession order.
- source_word: הָאָרוֹן
  chosen: the ark
  alternatives:
  - the ark of the covenant
  lexicon: HALOT
  rationale: The immediate context already identifies the ark; the shorter form is sufficient here without adding words not present in this verse.
- source_word: הָלוֹךְ וְתָקוֹעַ
  chosen: continually blowing
  alternatives:
  - going on and blowing
  - walking along and blowing
  - kept blowing
  lexicon: HALOT
  rationale: This infinitive absolute plus finite/implied verbal sequence expresses continued or repeated action during movement. 'Continually blowing' captures the iterative/durative force concisely in English.
- source_word: בַּשּׁוֹפָרוֹת
  chosen: the trumpets
  alternatives:
  - the ram's horns
  lexicon: HALOT
  rationale: Repeated object of the blowing action. 'Trumpets' maintains readability and consistency within the verse, while the more concrete instrument identification is preserved in a footnote.
