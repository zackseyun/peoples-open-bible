translation:
  language: es
  text: Otra vez se prepara para la batalla[a], y se despierta, y no hay terror; entonces encuentra reposo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Otra vez dispone la batalla, y se despierta, y no hay terror; entonces encuentra reposo». El paralelo griego difiere notablemente, con una redacción más cercana a «en el tiempo de su liberación fue despertado, maravillándose de que no había temor». El texto principal sigue el testimonio hebreo conservado como fuente primaria de Sirácida donde existe.'
    reason: alternative_reading
lexical_decisions:
- source_word: עוד
  english_pob_choice: Again
  chosen_spanish: Otra vez
  alternatives_spanish:
  - De nuevo
  - Otra vez más
  - Todavía
  lexicon: HALOT
  rationale: עוד expresa repetición dentro de la secuencia; «Otra vez» comunica naturalmente esa reiteración sin cargar el verso con un matiz temporal innecesario.
- source_word: עורך מלחמה / prepara for battle
  english_pob_choice: prepares for battle
  chosen_spanish: se prepara para la batalla
  alternatives_spanish:
  - prepara la batalla
  - se alista para la batalla
  - ordena la batalla
  lexicon: HALOT
  rationale: El hebreo usa ערך con מלחמה en un contexto de preparación militar. «Se prepara para la batalla» conserva la idea de disposición para el combate y suena idiomático en español; evita imponer una imagen táctica más específica que la del hebreo.
- source_word: והקיץ
  english_pob_choice: and he wakes up
  chosen_spanish: y se despierta
  alternatives_spanish:
  - y despierta
  - y se levanta
  - y despierta del sueño
  lexicon: HALOT
  rationale: קיץ significa despertar del sueño. «Se despierta» es la forma natural y clara en español, coherente con el movimiento del verso desde la acción soñada al despertar real.
- source_word: ואימה אין
  english_pob_choice: and there is no terror
  chosen_spanish: y no hay terror
  alternatives_spanish:
  - y no hay temor
  - y no hay pavor
  - y no existe terror
  lexicon: HALOT
  rationale: La construcción hebrea es breve y sin verbo explícito; «no hay terror» reproduce esa sobriedad. «Terror» mantiene la intensidad del sustantivo hebreo sin suavizarlo demasiado.
- source_word: ומצא מנוח
  english_pob_choice: then he finds rest
  chosen_spanish: entonces encuentra reposo
  alternatives_spanish:
  - y encuentra reposo
  - entonces halla descanso
  - y halla descanso
  lexicon: HALOT
  rationale: מנוח es reposo o descanso. «Encuentra reposo» conserva la culminación del alivio al final del verso; «entonces» marca la secuencia implícita de manera leve y natural.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando cualquier nota al pie no anclada en el texto. La redacción española sigue el testimonio hebreo como fuente primaria, en línea con la auditoría inglesa, y mantiene la posibilidad de que el paralelo griego exprese el pasaje con un matiz diferente sin incorporarlo al texto principal.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y bíblico, con español moderno y claro.
  - Se evitó «SEÑOR» y otras sustituciones no presentes en el texto fuente.
  - No se introdujeron notas al pie porque no hay marcador textual anclado en la traducción final.
  - 'El orden de las cláusulas sigue el flujo del hebreo y del inglés auditado: repetición, preparación, despertar, ausencia de terror, reposo.'
