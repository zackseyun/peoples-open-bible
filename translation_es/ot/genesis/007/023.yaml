translation:
  language: es
  text: Borró[a] todo ser viviente que estaba sobre la faz de la tierra, desde el hombre[b] hasta el ganado, hasta los animales que se arrastran y hasta las aves del cielo[c]. Fueron borrados de la tierra, y solo Noé quedó, y los que estaban con él en el arca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «arrastró»/«raió»; el verbo hebreo conserva la imagen de borrar, raer o quitar como al limpiar una superficie.
    reason: lexical_alternative
  - marker: b
    text: «Desde el hombre» traduce aquí adam en sentido representativo para la humanidad; también es posible «desde la humanidad».
    reason: lexical_alternative
  - marker: c
    text: O «las aves de los cielos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמַח / וַיִּמָּחוּ
  english_pob_choice: blotted out / were blotted out
  chosen_spanish: borró / fueron borrados
  alternatives_spanish:
  - borró / fueron eliminados
  - borró / fueron extirpados
  - borró / fueron borrados de la faz
  lexicon: HALOT
  rationale: מחה conserva la imagen de quitar por frotamiento, borrar o borrar del registro. En español, «borrar» mantiene esa imagen con naturalidad y evita suavizar la fuerza del verbo con «destruir». La forma pasiva «fueron borrados» refleja bien el segundo verbo.
- source_word: כָּל הַיְקוּם
  english_pob_choice: every living thing
  chosen_spanish: todo ser viviente
  alternatives_spanish:
  - toda criatura viva
  - todo lo viviente
  - todo ser que existía
  lexicon: HALOT
  rationale: היקום aquí designa aquello que vive o existe en el contexto del diluvio. «Ser viviente» conserva el alcance total del hebreo y suena natural en español bíblico contemporáneo.
- source_word: עַל פְּנֵי הָאֲדָמָה
  english_pob_choice: on the face of the ground
  chosen_spanish: sobre la faz de la tierra
  alternatives_spanish:
  - sobre la superficie del suelo
  - sobre la faz del suelo
  - en la superficie de la tierra
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática. «Sobre la faz de la tierra» mantiene la imagen tradicional de «faz» sin sonar demasiado extraña en español, y comunica bien el ámbito del juicio.
- source_word: מֵאָדָם
  english_pob_choice: from man
  chosen_spanish: desde el hombre
  alternatives_spanish:
  - desde la humanidad
  - desde el ser humano
  - desde la gente
  lexicon: HALOT
  rationale: Aquí אָדָם funciona en sentido representativo dentro de una lista/merismo. «Desde el hombre» conserva la forma singular del hebreo y la escala descendente del texto mejor que una abstracción pluralizada.
- source_word: בְּהֵמָה
  english_pob_choice: livestock
  chosen_spanish: ganado
  alternatives_spanish:
  - animales domésticos
  - bestias
  - animales de cría
  lexicon: HALOT
  rationale: בְּהֵמָה apunta aquí a animales terrestres domesticados o de corral. «Ganado» es breve, bíblico y suficientemente amplio en español, sin reducir innecesariamente el sentido a bovinos.
- source_word: רֶמֶשׂ
  english_pob_choice: creeping things
  chosen_spanish: los reptiles
  alternatives_spanish:
  - las cosas que se arrastran
  - los animales que se arrastran
  - los pequeños animales que reptan
  lexicon: HALOT
  rationale: En el marco del diluvio, רמשׂ designa criaturas que se mueven pegadas al suelo. «Reptiles» es una aproximación natural en español para la lista de categorías, aunque no agota todo el campo semántico; por eso se conserva dentro de la secuencia taxonómica del versículo.
- source_word: עוֹף הַשָּׁמַיִם
  english_pob_choice: the birds of the heavens
  chosen_spanish: las aves del cielo
  alternatives_spanish:
  - las aves de los cielos
  - los pájaros del cielo
  - las aves del firmamento
  lexicon: HALOT
  rationale: «Aves del cielo» transmite el genitivo hebreo con claridad y dignidad. «Cielo» es más natural en español que «heavens» literal, pero conserva el registro bíblico.
- source_word: מִן הָאָרֶץ
  english_pob_choice: from the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra
  - de la faz de la tierra
  - de la superficie de la tierra
  lexicon: HALOT
  rationale: אֶרֶץ puede ser «tierra» o «país/land». En el marco del diluvio, «tierra» refleja bien la amplitud narrativa. «De la tierra» también mantiene la correspondencia con el hebreo de la segunda cláusula.
- source_word: וַיִּשָּׁאֶר אַךְ נֹחַ
  english_pob_choice: only Noah was left
  chosen_spanish: solo Noé quedó
  alternatives_spanish:
  - solo Noé permaneció
  - Noé quedó solo
  - solo quedó Noé
  lexicon: HALOT
  rationale: אַךְ restringe la frase a Noé únicamente. «Solo Noé quedó» reproduce esa restricción y el verbo שׁאר con un español claro y sobrio.
- source_word: וַאֲשֶׁר אִתּוֹ בַּתֵּבָה
  english_pob_choice: and those who were with him in the ark
  chosen_spanish: y los que estaban con él en el arca
  alternatives_spanish:
  - y los que con él estaban en el arca
  - y quienes estaban con él en el arca
  - y los que iban con él en el arca
  lexicon: HALOT
  rationale: El relativo hebreo es amplio, pero en el contexto del arca se refiere a sus acompañantes. «Los que estaban con él» es natural en español y conserva la referencia personal y narrativa.
theological_decisions:
- issue: Alcance de la destrucción del diluvio
  english_pob_reading: Render the verse straightforwardly as describing the blotting out of all land-dwelling living things named in the text, without softening or expanding the claim beyond the verse's wording.
  chosen_spanish_reading: Traducir el versículo de manera directa como la desaparición de todos los seres vivientes nombrados en el texto, sin atenuar ni ampliar su alcance.
  alternative_spanish_readings:
  - Interpretarlo como lenguaje regional hiperbólico
  - Interpretarlo como una afirmación científica explícitamente global
  rationale: La traducción debe conservar la fuerza narrativa del hebreo sin imponer una solución a los debates sobre la extensión del diluvio. La redacción española sigue el texto de forma directa y deja la conclusión interpretativa al lector.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'Revisión auditada: el pasaje se mantiene en línea con la decisión inglesa de conservar la imagen de מחה como «blot out». No hubo cambios posteriores en la revisión más reciente, y la concordancia de revisión indicó alta coincidencia.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino en el proyecto; este versículo no lo contiene.
  - Se usa «Noé» según la forma española estándar del nombre propio.
  - «Arca» se conserva para תֵּבָה en continuidad con el relato de Noé.
  - Se evita neutralizar «hombre» a un plural abstracto para respetar el valor representativo de אָדָם en la lista.
