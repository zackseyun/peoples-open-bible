translation:
  language: es
  text: Ustedes mismos, vayan y consigan paja para ustedes mismos dondequiera que la encuentren[a], pues nada de su trabajo se reducirá[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «desde donde la encuentren».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «porque nada de su trabajo es reducido» o «pues nada de su trabajo es reducido». La conjunción puede traducirse como «pues/porque», y aquí introduce la razón de la orden.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַתֶּם
  english_pob_choice: You yourselves
  chosen_spanish: Ustedes mismos
  alternatives_spanish:
  - Ustedes
  - En cuanto a ustedes
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis antes de los imperativos. «Ustedes mismos» conserva ese valor enfático sin sonar artificial en español.
- source_word: לְכוּ
  english_pob_choice: go
  chosen_spanish: vayan
  alternatives_spanish:
  - vayan ya
  - partan
  lexicon: HALOT
  rationale: Es un imperativo plural natural en español y reproduce la secuencia de mandatos.
- source_word: קְחוּ
  english_pob_choice: get
  chosen_spanish: consigan
  alternatives_spanish:
  - tomen
  - obtengan
  lexicon: HALOT
  rationale: Aunque literalmente puede ser «tomar», aquí el contexto de procurarse material favorece «consigan», que expresa mejor la acción de obtener paja.
- source_word: לָכֶם
  english_pob_choice: for yourselves
  chosen_spanish: para ustedes
  alternatives_spanish:
  - para ustedes mismos
  - para sí
  lexicon: HALOT
  rationale: Mantiene el matiz reflexivo/dativo de que deben procurarla por su propia cuenta.
- source_word: תֶּבֶן
  english_pob_choice: straw
  chosen_spanish: paja
  alternatives_spanish:
  - rastrojo
  - paja de trigo
  lexicon: HALOT
  rationale: En el contexto de fabricación de ladrillos, el término designa material vegetal para la mezcla; «paja» es el equivalente natural y claro en español.
- source_word: מֵאֲשֶׁר תִּמְצָאוּ
  english_pob_choice: wherever you can find it
  chosen_spanish: dondequiera que la encuentren
  alternatives_spanish:
  - donde la encuentren
  - de donde la encuentren
  lexicon: HALOT
  rationale: Expresa la amplitud de la búsqueda sin añadir información. El español requiere un relativo más fluido que el hebreo literal.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: pues
  alternatives_spanish:
  - porque
  - ya que
  lexicon: HALOT
  rationale: 'En este contexto introduce la razón que sustenta la orden: deben salir a buscar paja porque no se disminuirá la cuota. «Pues» refleja bien el valor causal sin forzar un contraste.'
- source_word: אֵין נִגְרָע
  english_pob_choice: will be reduced
  chosen_spanish: será reducido
  alternatives_spanish:
  - se rebajará
  - se disminuirá
  lexicon: HALOT
  rationale: El pasivo con negación expresa que no habrá reducción de la exigencia. El futuro mantiene el sentido directivo del contexto.
- source_word: מֵעֲבֹדַתְכֶם
  english_pob_choice: of your work
  chosen_spanish: de su trabajo
  alternatives_spanish:
  - de su labor
  - de sus tareas
  lexicon: HALOT
  rationale: «Trabajo» es claro y suficientemente amplio para la carga impuesta. El posesivo en español se ajusta al tratamiento de «ustedes».
- source_word: דָּבָר
  english_pob_choice: nothing
  chosen_spanish: nada
  alternatives_spanish:
  - ni una cosa
  - ninguna cosa
  lexicon: HALOT
  rationale: Con la negación, el idiomatismo hebreo equivale a «nada». Es la forma más natural y fiel en español.
translation_notes:
  revision_awareness: Se siguió el ajuste del audit trail que favorece una relación causal para כִּי. La redacción española evita calcar el inglés y conserva la dureza administrativa del mandato hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se eligió «paja» para תבן por el contexto de ladrillería; «rastrojo» sería más técnico pero menos natural aquí.
  - «Ustedes» se mantuvo como plural de tratamiento neutral latinoamericano, acorde con la referencia colectiva al pueblo.
  - No se introdujo lenguaje tradicional eclesiástico ajeno al hebreo; la frase conserva tono directo y administrativo.
