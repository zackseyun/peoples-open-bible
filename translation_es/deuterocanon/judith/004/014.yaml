translation:
  language: es
  text: Y Yahvé oyó su voz[a] y miró su aflicción, y el pueblo estaba ayunando por muchos días en toda Judea y Jerusalén, ante las cosas santas[b] de Yahvé Todopoderoso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su clamor». El griego dice literalmente «su voz», pero en contexto de oración y angustia puede llevar el sentido de una súplica.
    reason: lexical_alternative
  - marker: b
    text: O «ante el santuario» / «ante los lugares santos». El griego usa «las cosas santas» en plural, lo que puede aludir de manera amplia a los objetos o ámbitos sagrados asociados con Yahvé Todopoderoso.
    reason: alternative_reading
lexical_decisions:
- source_word: Κύριος
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Dueño
  lexicon: proyecto POB / correspondencia del tetragrámaton
  rationale: En este contexto de la LXX, Κύριος funciona como título divino que refleja el nombre de Dios; la pauta del proyecto para יהוה es «Yahvé». Mantiene la referencia personal al nombre divino sin sustituirlo por una máscara litúrgica.
- source_word: τῆς φωνῆς αὐτῶν
  english_pob_choice: their voice
  chosen_spanish: su voz
  alternatives_spanish:
  - su clamor
  - su grito
  lexicon: BDAG
  rationale: «Voz» conserva la literalidad del griego y permite la posible fuerza de una súplica sin resolverla de antemano como «clamor».
- source_word: ἐπεῖδεν
  english_pob_choice: looked upon
  chosen_spanish: miró
  alternatives_spanish:
  - miró atentamente
  - tomó en cuenta
  lexicon: BDAG
  rationale: El compuesto sugiere atención favorable o compasiva; «miró» en español es breve y natural, y en este contexto ya lleva la idea de consideración divina.
- source_word: θλίψιν
  english_pob_choice: affliction
  chosen_spanish: aflicción
  alternatives_spanish:
  - aflicción
  - angustia
  - tribulación
  lexicon: BDAG
  rationale: «Aflicción» reproduce bien el peso de θλῖψις en un marco de oración y liberación. Es más cercano al registro bíblico que «angustia», aunque ambas son posibles.
- source_word: ἦν ὁ λαὸς νηστεύων
  english_pob_choice: the people were fasting
  chosen_spanish: el pueblo estaba ayunando
  alternatives_spanish:
  - el pueblo ayunaba
  - el pueblo seguía ayunando
  lexicon: BDAG
  rationale: La perífrasis expresa acción continua; «estaba ayunando» conserva ese valor durativo con claridad natural en español.
- source_word: ἡμέρας πλείους
  english_pob_choice: for many days
  chosen_spanish: por muchos días
  alternatives_spanish:
  - durante muchos días
  - por varios días
  lexicon: BDAG
  rationale: «Por muchos días» refleja de modo idiomático la duración extendida del ayuno sin añadir precisión no contenida en el griego.
- source_word: ἐν πάσῃ τῇ Ἰουδαίᾳ καὶ Ἰερουσαλήμ
  english_pob_choice: throughout all Judea and Jerusalem
  chosen_spanish: en toda Judea y Jerusalén
  alternatives_spanish:
  - por toda Judea y Jerusalén
  - en toda la Judea y Jerusalén
  lexicon: BDAG
  rationale: «En toda» conserva la amplitud distributiva de πάσῃ y suena natural en español, sin perder la idea de extensión geográfica completa.
- source_word: κατὰ πρόσωπον
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: BDAG
  rationale: «Delante de» mantiene la relación espacial/cultual del idiomático griego y permite una lectura reverente y concreta en español.
- source_word: τῶν ἁγίων
  english_pob_choice: the holy things
  chosen_spanish: las cosas santas
  alternatives_spanish:
  - las cosas sagradas
  - los santos lugares
  - el santuario
  lexicon: BDAG
  rationale: El plural sustantivado se conserva de forma transparente con «las cosas santas». Evita reducir el plural a un singular interpretativo como «santuario», aunque en contexto pueda aludir al ámbito sagrado.
- source_word: Κυρίου Παντοκράτορος
  english_pob_choice: the Lord Almighty
  chosen_spanish: del Señor Todopoderoso
  alternatives_spanish:
  - del Señor Omnipotente
  - de Yahvé Todopoderoso
  lexicon: BDAG
  rationale: Se mantiene el título divino tradicional «Todopoderoso» para παντοκράτωρ, y «Señor» refleja κύριος en la fórmula fija del final del versículo. Aquí no se repite «Yahvé» para evitar una duplicación poco natural dentro del sintagma genitivo final.
theological_decisions:
- issue: Cómo representar Κύριος en un versículo que probablemente alude al nombre divino
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé al inicio; Señor en el título final
  alternative_spanish_readings:
  - Señor en ambos lugares
  - Yahvé en ambos lugares
  rationale: La pauta del proyecto distingue el nombre divino de un simple título. El primer Κύριος, por el contexto de la LXX y la oración del pueblo, se vierte como Yahvé. En la fórmula «Κυρίου Παντοκράτορος», el sintagma funciona como título reverente y se puede mantener «Señor Todopoderoso» para evitar una construcción forzada en español.
  doctrine_reference: 'DOCTRINE.md: יהוה / YHWH → Yahvé; Contested terms: κύριος → Lord'
- issue: Preservación del plural τῶν ἁγίων
  english_pob_reading: the holy things
  chosen_spanish_reading: las cosas santas
  alternative_spanish_readings:
  - el santuario
  - los santos lugares
  rationale: El griego plural no se colapsa en un singular institucional. «Las cosas santas» preserva la forma plural y la tensión entre objeto sagrado, espacio sagrado y referencia cultual sin cerrar el sentido más de lo que hace el texto.
  doctrine_reference: Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete de auditoría; la última pasada indicó que no eran necesarios cambios. El borrador español sigue esa lectura estable, ajustando solo la elección de equivalencias para que sea pública, natural y auditable en español.
  spanish_consistency_notes:
  - Se mantiene el nombre divino «Yahvé» según el estándar del proyecto cuando Κύριος refleja el tetragrámaton, pero se conserva «Señor» en la fórmula final del título divino para no forzar la sintaxis.
  - «Aflicción» y «ayunando» preservan el tono bíblico sin recurrir a arcaísmos innecesarios.
  - La nota sobre τῶν ἁγίων conserva la ambigüedad cultual del plural sin resolverla en «santuario».
