translation:
  language: es
  text: Por medio de ti hacemos retroceder a nuestros enemigos[a]; por medio de tu nombre[b] pisoteamos a los que se levantan contra nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «corneamos / embestimos» a nuestros enemigos. El verbo alude literalmente a usar los cuernos para arremeter; aquí es una metáfora de repeler con fuerza al enemigo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en tu nombre». «Nombre» aquí se refiere a la identidad revelada, la autoridad y el poder de Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּךָ
  english_pob_choice: Through you
  chosen_spanish: Por medio de ti
  alternatives_spanish:
  - En ti
  - Por ti
  lexicon: HALOT
  rationale: El ב con sufijo personal expresa medio o agencia en un contexto de victoria militar. «Por medio de ti» conserva esa relación instrumental en un español natural, sin sonar espacial como «en ti».
- source_word: צָרֵינוּ
  english_pob_choice: our foes
  chosen_spanish: nuestros enemigos
  alternatives_spanish:
  - nuestros adversarios
  - nuestros foes
  lexicon: HALOT
  rationale: El término hebreo designa a opositores hostiles. «Enemigos» comunica bien la hostilidad activa en español bíblico contemporáneo; «adversarios» sería posible pero algo más abstracto.
- source_word: נְנַגֵּחַ
  english_pob_choice: we push back
  chosen_spanish: rechazamos
  alternatives_spanish:
  - empujamos de vuelta
  - hacemos retroceder
  - acorneamos
  lexicon: HALOT
  rationale: El verbo literalmente evoca embestir o cornear, pero aquí funciona metafóricamente para derrotar o hacer retroceder al enemigo. «Rechazamos» mantiene la fuerza de repulsión en español y evita una imagen zoológica que distraería en el texto principal. La nota conserva la tensión lexical.
- source_word: בְּשִׁמְךָ
  english_pob_choice: through your name
  chosen_spanish: por medio de tu nombre
  alternatives_spanish:
  - en tu nombre
  - por tu nombre
  lexicon: HALOT
  rationale: «Nombre» en hebreo remite a la identidad revelada, autoridad y poder de Dios. «Por medio de tu nombre» mantiene el paralelismo con la primera cola y expresa que la victoria procede de la autoridad/poder invocados de Yahvé.
- source_word: נָבוּס
  english_pob_choice: we trample
  chosen_spanish: pisoteamos
  alternatives_spanish:
  - pisamos
  - trillamos
  - hollamos
  lexicon: HALOT
  rationale: El verbo significa pisar o aplastar con los pies. «Pisoteamos» es claro, vívido y adecuado al paralelo bélico del versículo.
- source_word: קָמֵינוּ
  english_pob_choice: those who rise against us
  chosen_spanish: a los que se levantan contra nosotros
  alternatives_spanish:
  - a nuestros atacantes
  - a los que se alzan contra nosotros
  lexicon: HALOT
  rationale: El participio de קום conserva mejor el matiz verbal de «levantarse/alzarse contra» que una traducción más general como «atacantes». La forma relativa respeta la estructura hebrea.
theological_decisions:
- issue: Agencia de la victoria en combate
  english_pob_reading: The verse attributes victory instrumentally to God ('Through you ... through your name') while still describing Israel's action in battle.
  chosen_spanish_reading: El versículo atribuye la victoria instrumentalmente a Dios («Por medio de ti... por medio de tu nombre») y, al mismo tiempo, describe la acción del pueblo en combate.
  alternative_spanish_readings:
  - Una lectura más centrada en la acción humana del pueblo
  - Una lectura que trate «tu nombre» como mera fórmula verbal
  rationale: 'La traducción conserva ambas dimensiones sin resolver la tensión: Dios es la fuente decisiva de la victoria, pero el pueblo también actúa en la batalla. «Por medio de» refuerza esa mediación divina sin perder la participación humana.'
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica en lugar de resolverla)
- issue: Valor de «nombre» como identidad/poder de Yahvé
  english_pob_reading: Or 'in your name.' 'Name' here refers to God's revealed identity, authority, and power.
  chosen_spanish_reading: «Nombre» se entiende como la identidad revelada, autoridad y poder de Yahvé.
  alternative_spanish_readings:
  - «en tu nombre» como fórmula de invocación
  - «por tu nombre» como mero marcador litúrgico
  rationale: La referencia no es solo a pronunciar un nombre, sino a apelar a la persona y autoridad divina. En español, «por medio de tu nombre» conserva esa fuerza sin reducirla a una fórmula religiosa.
  doctrine_reference: Doctrina bíblica del nombre divino y su autoridad revelada
translation_notes:
  revision_awareness: 'Coincide con el pasaje de referencia y con el audit trail en inglés: se mantiene la equivalencia óptima del texto base, conservando la imagen bélica y la mediación divina. No se registran revisiones aplicadas en el paquete fuente; el borrador sigue el último estado estable.'
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé» según el contexto teológico; aquí la referencia al «nombre» justifica mencionar Yahvé en la nota, mientras el texto principal conserva el pronombre de segunda persona.
  - Se evita «Señor» como máscara en el texto principal, de acuerdo con la política del proyecto para YHWH.
  - Se mantiene el paralelismo verbal con dos cláusulas introducidas por «por medio de».
  - Se conserva la tensión entre imagen literal y sentido metafórico mediante nota, sin sobreexplicar el cuerpo del versículo.
