translation:
  language: es
  text: Entonces partieron de Betel[a], y cuando aún faltaba cierta distancia antes de llegar a Efrata, Raquel dio a luz, y tuvo dificultad en el parto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Efratah».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: they journeyed
  chosen_spanish: partieron
  alternatives_spanish:
  - viajaron
  - siguieron su camino
  lexicon: HALOT
  rationale: נסע en secuencia narrativa describe salir y continuar el viaje. «Partieron» comunica ese avance con naturalidad en español y conserva el sentido de desplazamiento sin añadir matices ajenos.
- source_word: מִבֵּית אֵל
  english_pob_choice: from Bethel
  chosen_spanish: de Betel
  alternatives_spanish:
  - de Bet-el
  lexicon: HALOT
  rationale: Se mantiene el topónimo en su forma breve y reconocible en español bíblico. «Betel» es claro y estándar; la forma segmentada no aporta ventaja en español.
- source_word: וַיְהִי עוֹד כִּבְרַת הָאָרֶץ
  english_pob_choice: when there was still some distance
  chosen_spanish: cuando aún faltaba una pequeña distancia
  alternatives_spanish:
  - cuando todavía quedaba trecho
  - cuando aún quedaba algo de camino
  lexicon: HALOT
  rationale: La expresión idiomática hebrea indica que todavía no habían llegado y que quedaba una distancia por recorrer. «Una pequeña distancia» conserva el valor aproximado sin fingir una medida exacta no recuperable del hebreo.
- source_word: כִּבְרַת הָאָרֶץ
  english_pob_choice: some distance
  chosen_spanish: una pequeña distancia
  alternatives_spanish:
  - un trecho
  - una medida de terreno
  lexicon: HALOT
  rationale: La frase es rara y su extensión precisa es incierta. En español conviene preservar la idea de distancia restante sin convertirla en un término técnico ni precisar un valor que el texto no da.
- source_word: לָבוֹא אֶפְרָתָה
  english_pob_choice: to go before reaching Ephrath
  chosen_spanish: para llegar a Efrata
  alternatives_spanish:
  - antes de llegar a Efrata
  - al llegar a Efrata
  lexicon: HALOT
  rationale: El infinitivo con ל marca destino o llegada inminente. «Para llegar a Efrata» integra bien la construcción anterior y mantiene que estaban todavía en camino.
- source_word: אֶפְרָתָה
  english_pob_choice: Ephrath
  chosen_spanish: Efrata
  alternatives_spanish:
  - Efratah
  lexicon: HALOT
  rationale: Se adopta la transliteración breve y natural para español. La forma más larga queda como alternativa posible, pero no es necesaria en el texto principal.
- source_word: וַתֵּלֶד רָחֵל
  english_pob_choice: Rachel gave birth
  chosen_spanish: Raquel dio a luz
  alternatives_spanish:
  - Raquel parió
  - Raquel alumbró
  lexicon: HALOT
  rationale: יַלד con sujeto femenino significa dar a luz. «Dar a luz» es una equivalencia directa, digna y clara en español contemporáneo.
- source_word: וַתְּקַשׁ בְּלִדְתָּהּ
  english_pob_choice: she had difficulty in childbirth
  chosen_spanish: tuvo dificultad en el parto
  alternatives_spanish:
  - tuvo dificultades al dar a luz
  - sufrió en el parto
  lexicon: HALOT
  rationale: קשה expresa dureza o dificultad en el proceso de alumbramiento. «En el parto» refleja el evento de manera formal y directa, manteniendo la sobriedad del hebreo sin añadir detalles clínicos.
theological_decisions:
- issue: Efrata / Efrat(a) como toponimia bíblica
  english_pob_reading: The English draft prints 'Ephrath' and notes 'Ephrathah' as an alternative.
  chosen_spanish_reading: Efrata en el texto principal, con reconocimiento de la variante Efratah en nota.
  alternative_spanish_readings:
  - Efratah
  - Éfrata
  rationale: El hebreo presenta אֶפְרָתָה. En español, «Efrata» es breve y legible; la variante más larga se preserva como alternativa textual, sin ocultar la forma del original ni forzar una estandarización ajena.
  doctrine_reference: N/A
- issue: Descripción de la dificultad en el nacimiento
  english_pob_reading: she had difficulty in childbirth
  chosen_spanish_reading: tuvo dificultad en el parto
  alternative_spanish_readings:
  - tuvo dificultades al dar a luz
  - sufrió un parto difícil
  rationale: El hebreo dice simplemente que el parto fue קשה, es decir, difícil o duro. La traducción debe conservar esa tensión sin convertirla en una explicación médica o emocional más amplia de la que el texto ofrece.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió una formulación más formal de la dificultad del parto. En español se refleja esa preferencia con «tuvo dificultad en el parto», evitando una expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el Tetragrámaton en este proyecto cuando aparezca; aquí el versículo no lo contiene.
  - Se usa «Raquel» y no una transliteración inglesa, conforme a la norma española bíblica.
  - «Dar a luz» preserva el valor verbal de וַתֵּלֶד de forma natural en español.
  - La nota de alternativa para Efrata evita perder la variante documentada por el POB en inglés.
