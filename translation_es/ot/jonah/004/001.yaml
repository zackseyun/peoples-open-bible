translation:
  language: es
  text: Pero a Jonás esto le pareció muy mal[a], y se enojó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «fue malo para Jonás, un gran mal». El hebreo hace un juego de palabras con «malo/mal» para describir la reacción de Jonás.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרַע
  english_pob_choice: was displeasing
  chosen_spanish: fue muy desagradable
  alternatives_spanish:
  - fue malo
  - fue un gran mal
  - le resultó muy desagradable
  lexicon: HALOT
  rationale: El verbo רעע expresa aquí que algo resultó malo o ofensivo para Jonás. En español, «fue muy desagradable» transmite el valor idiomático sin afirmar que el narrador juzgue objetivamente la acción de Dios como mala.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: para
  alternatives_spanish:
  - a
  - a Jonás
  - ante
  lexicon: HALOT
  rationale: La preposición marca relación respecto de Jonás. En español, «para Jonás» absorbe de forma natural la relación de afectación que el hebreo expresa con אֶל + persona.
- source_word: רָעָה גְדוֹלָה
  english_pob_choice: greatly displeasing
  chosen_spanish: muy desagradable
  alternatives_spanish:
  - un gran mal
  - muy malo
  - sumamente ofensivo
  lexicon: HALOT
  rationale: La combinación intensifica la reacción de Jonás. «Muy desagradable» comunica la intensificación de modo natural en español y evita convertir la expresión en una afirmación moral objetiva del narrador.
- source_word: וַיִּחַר לוֹ
  english_pob_choice: he became angry
  chosen_spanish: se enojó
  alternatives_spanish:
  - se encendió de ira
  - ardió en ira
  - se indignó
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de ira, literalmente relacionado con «arder». En español, «se enojó» es claro y directo; conserva el sentido sin introducir una imagen demasiado interpretativa en el texto principal.
theological_decisions:
- issue: Cómo traducir רָעָה sin borrar la tensión entre la evaluación de Jonás y la evaluación narrativa
  english_pob_reading: 'Subjective displeasure: ''this was greatly displeasing to Jonah'''
  chosen_spanish_reading: 'Subjetiva molestia/desagrado: «fue muy desagradable para Jonás»'
  alternative_spanish_readings:
  - «fue un gran mal para Jonás»
  - «le pareció muy mal a Jonás»
  rationale: El hebreo usa un juego de palabras con רעע / רָעָה. La traducción debe preservar que se trata de la reacción de Jonás, no de un juicio moral del narrador sobre la misericordia de Dios. «Muy desagradable» mantiene la tensión sin resolverla ni endurecerla artificialmente.
  doctrine_reference: Preservar la tensión teológica del texto; primacía del idioma original sobre la tradición interpretativa
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que prefirió «it was» frente a «this was» por ser más directo y natural. En español se reflejó esa misma inmediatez con «Fue».
  spanish_consistency_notes:
  - Se mantiene «Jonás» como forma transliterada estándar.
  - Se evita «SEÑOR» o cualquier sustitución teológica no presente en el verso.
  - «Se enojó» conserva el valor idiomático de חרה לו sin sobreexplicar la metáfora del fuego.
  - La nota al pie preserva el juego verbal hebreo y la tensión semántica relevante para la lectura.
