review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: los asociados de Nehemías dieron un nombre, se ofrece su explicación como «Purificación», y luego se indica el nombre de uso más extendido. Sin embargo, «entre la mayoría» no representa con suficiente naturalidad ni precisión παρὰ τοῖς πολλοῖς; en español bíblico claro conviene «por la mayoría» o «por la mayoría de la gente». Además, la nota al pie contradice el texto principal: el ancla está en «Neftar[a]», pero la nota explica la variante del segundo nombre Νεφθί, por lo que debe anclarse al segundo nombre, no al primero.'
  spanish_quality_summary: 'El español es generalmente legible y digno, pero tiene dos ajustes necesarios: 1) mejorar la naturalidad de «entre la mayoría» a una formulación idiomática; 2) corregir la colocación de la nota para que el lector entienda que la alternativa transliterada corresponde a «Neftí», no a «Neftar».'
  glossary_alignment: No hay términos teológicos de glosario mayor en juego. Las transliteraciones «Neftar» y «Neftí» son aceptables en español. «Purificación» corresponde bien a Καθαρισμός. La nota debe conservar la alternativa transliterada más literal para Νεφθί.
  issues:
  - severity: medium
    issue: La frase «entre la mayoría» es poco idiomática para παρὰ τοῖς πολλοῖς.
    rationale: El griego expresa uso común ‘por la mayoría / entre la gente’. «Entre la mayoría» suena forzado en español y puede sugerir un subconjunto abstracto más que un uso generalizado.
  - severity: high
    issue: La nota al pie está anclada al nombre equivocado.
    rationale: El marcador [a] aparece en «Neftar», pero el contenido de la nota trata de Νεφθί («Neftí»/«Nefti»). Esto desinforma al lector sobre qué forma textual tiene la variante transliterada.
  revised_spanish_text: Y los hombres que estaban con Nehemías llamaron a esto Neftar, que se traduce «Purificación»; pero la mayoría lo llama Neftí[a].
  revised_footnotes:
  - marker: a
    text: 'Griego: «Neftí» (Νεφθί); una transliteración más letra por letra sería «Nefti».'
    reason: lexical_alternative
  revision_rationale: Se corrige la expresión de uso común a un español más natural y fiel («la mayoría lo llama») y se mueve la nota al segundo nombre, que es donde pertenece la alternativa transliterada documentada en el rastro inglés.
