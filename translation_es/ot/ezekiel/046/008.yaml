translation:
  language: es
  text: Cuando el príncipe entre, entrará por el pórtico de la puerta, y saldrá por el mismo camino[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «por su camino», es decir, sale por la misma ruta por la que entró.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/ב֖וֹא
  english_pob_choice: When ... enters
  chosen_spanish: Cuando ... entre
  alternatives_spanish:
  - Y cuando ... entre
  - Al entrar
  lexicon: HALOT
  rationale: La construcción con infinitivo introduce una acción temporal. «Cuando ... entre» conserva la relación temporal del hebreo y suena natural en español, sin volverla demasiado literal ni perder la forma de instrucción.
- source_word: הַ/נָּשִׂ֑יא
  english_pob_choice: the prince
  chosen_spanish: el príncipe
  alternatives_spanish:
  - el líder
  - el gobernante
  lexicon: HALOT
  rationale: En Ezequiel, נָשִׂיא designa al príncipe/gobernante de la visión del templo. «Príncipe» preserva el término establecido por la POB inglesa y evita cargar el pasaje con una identificación más específica de la que el verso afirma.
- source_word: דֶּ֣רֶךְ
  english_pob_choice: by way of
  chosen_spanish: por el mismo camino
  alternatives_spanish:
  - por la vía de
  - por el camino de
  lexicon: HALOT
  rationale: דֶּרֶךְ es «camino/ruta». En este contexto procesal, la frase española necesita expresar la ruta de acceso/salida con naturalidad. «Camino» es claro y mantiene la idea direccional.
- source_word: אוּלָ֤ם
  english_pob_choice: the porch
  chosen_spanish: el vestíbulo
  alternatives_spanish:
  - el pórtico
  - el portal
  lexicon: HALOT
  rationale: אוּלָם en arquitectura del templo puede referirse al vestíbulo/porche. «Vestíbulo» comunica bien la zona de entrada en español moderno y evita una palabra demasiado doméstica si se tradujera por «porche».
- source_word: הַ/שַּׁ֨עַר
  english_pob_choice: of the gate
  chosen_spanish: de la puerta
  alternatives_spanish:
  - de la entrada
  - del portón
  lexicon: HALOT
  rationale: En el contexto del templo, שער es «puerta» o «entrada»; la relación constructa con אוּלָם queda natural en «el vestíbulo de la puerta». «Puerta» mantiene la imagen arquitectónica sin añadir especificidad no exigida.
- source_word: יָב֔וֹא
  english_pob_choice: he shall enter
  chosen_spanish: entrará
  alternatives_spanish:
  - debe entrar
  - ha de entrar
  lexicon: HALOT
  rationale: El imperfecto aquí funciona como instrucción procedimental dentro de la visión. El futuro español expresa adecuadamente ese valor normativo/descriptivo sin imponerse como mandato explícito más fuerte que el texto.
- source_word: וּ/בְ/דַרְכּ֖/וֹ
  english_pob_choice: by the same way
  chosen_spanish: por el mismo camino
  alternatives_spanish:
  - por su camino
  - por el mismo trayecto
  lexicon: HALOT
  rationale: Literalmente, «y por su camino». En contexto, el posesivo remite a la ruta ya mencionada; «el mismo camino» comunica la simetría prevista por el hebreo y resuelve la referencia de forma idiomática.
- source_word: יֵצֵֽא
  english_pob_choice: he shall go out
  chosen_spanish: saldrá
  alternatives_spanish:
  - saldrá fuera
  - se irá
  lexicon: HALOT
  rationale: יצא se traduce de manera directa como «salir». «Saldrá» conserva la fuerza verbal y la instrucción de movimiento sin redundancia.
theological_decisions:
- issue: Identidad y estatus de הַנָּשִׂיא en la visión del templo
  english_pob_reading: Rendered neutrally as 'the prince' without importing a messianic or specifically royal interpretation.
  chosen_spanish_reading: Se vierte de manera neutral como «el príncipe», sin importar una identificación mesiánica ni una lectura realista más definida.
  alternative_spanish_readings:
  - el gobernante
  - el líder
  - el príncipe mesiánico
  rationale: El verso da una instrucción de acceso al templo y no obliga a resolver el debate mayor sobre la identidad del נָשִׂיא. Mantener «príncipe» preserva la tensión interpretativa documentada por la POB inglesa y evita sobreinterpretar el pasaje.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla
- issue: Valor procedimental del verbo de entrada/salida
  english_pob_reading: He shall enter / he shall go out
  chosen_spanish_reading: «entrará» / «saldrá» como formulación normativa-descriptiva.
  alternative_spanish_readings:
  - debe entrar / debe salir
  - ha de entrar / ha de salir
  rationale: El hebreo imperfecto en este tipo de instrucciones puede sonar futurista o regulativo. El futuro español mantiene esa ambivalencia sin endurecerla en un imperativo doctrinal; así se respeta la instrucción de la visión.
  doctrine_reference: No resolver indebidamente el matiz aspectual/pragmático
translation_notes:
  revision_awareness: 'La traducción sigue de cerca el consenso del audit trail inglés y no requiere revisiones sustantivas respecto de la lectura base: se mantiene la instrucción procesal del texto, la referencia neutral al príncipe y la simetría de entrada/salida por la misma ruta.'
  spanish_consistency_notes:
  - Se mantiene «príncipe» para נָשִׂיא conforme al uso establecido en Ezequiel y al criterio de neutralidad del POB.
  - «Vestíbulo» traduce el espacio arquitectónico de אוּלָם sin recurrir a un calco rígido.
  - La nota sobre «mismo camino» preserva la relación entre camino de entrada y salida, tal como en el texto hebreo y la nota inglesa.
  - Se usa puntuación española y un registro bíblico moderno, sobrio y publicable.
