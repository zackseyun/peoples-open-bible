translation:
  language: es
  text: Mientras estas cosas se estaban arreglando, se extendía un rumor hostil contra la nación entre personas de parecer afín para maltratarla, y se daba un pretexto para su propósito[c][b], como si se les impidiera seguir sus leyes tradicionales.
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: «Pretexto» también podría entenderse como «ocasión» u «oportunidad», según la gama semántica de ἀφορμή en este contexto.
    reason: lexical_alternative
  - marker: c
    text: «Sus leyes tradicionales» puede entenderse también como «sus leyes ancestrales» o «sus costumbres establecidas».
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκονομουμένων
  english_pob_choice: were being arranged
  chosen_spanish: se estaban administrando
  alternatives_spanish:
  - se estaban arreglando
  - se estaban gestionando
  - se estaban llevando a cabo
  lexicon: LSJ
  rationale: El participio comunica que los asuntos estaban siendo puestos en orden o manejados. «Administrando» conserva el sentido administrativo sin sonar demasiado rígido en español.
- source_word: φήμη δυσμενὴς
  english_pob_choice: a hostile rumor
  chosen_spanish: un rumor hostil
  alternatives_spanish:
  - un reporte hostil
  - un rumor desfavorable
  - un informe maligno
  lexicon: LSJ
  rationale: «Rumor» capta mejor la difusión social e informal que sugiere φήμη en este contexto, y «hostil» reproduce δυσμενής con fuerza negativa clara.
- source_word: ἐξέκειτο
  english_pob_choice: was spread
  chosen_spanish: se extendía
  alternatives_spanish:
  - se difundía
  - era esparcido
  - se publicaba
  lexicon: LSJ
  rationale: En español, con «rumor», «se extendía» resulta natural e idiomático y conserva la idea de circulación pública del rumor.
- source_word: κατὰ τοῦ γένους
  english_pob_choice: against the nation
  chosen_spanish: contra la nación
  alternatives_spanish:
  - contra el pueblo
  - contra la raza
  - contra el pueblo judío
  lexicon: LSJ
  rationale: «Nación» mantiene el valor colectivo étnico-político de γένος sin introducir la carga biológica de «raza». Mantiene además la fuerza hostil de la construcción con κατά.
- source_word: ἀνθρώποις συμφρονοῦσιν
  english_pob_choice: among people of like mind
  chosen_spanish: entre personas de parecer afín
  alternatives_spanish:
  - entre personas de mente afín
  - entre personas simpatizantes
  - entre personas de la misma opinión
  lexicon: LSJ
  rationale: La expresión señala personas que comparten una disposición u orientación. «De parecer afín» conserva el matiz de alineación de pensamiento sin volverla demasiado coloquial.
- source_word: εἰς κακοποίησιν
  english_pob_choice: for mistreatment
  chosen_spanish: para maltratarla
  alternatives_spanish:
  - para hacerle daño
  - para abusar de ella
  - para su maltrato
  lexicon: LSJ
  rationale: El contexto es contra la nación, por eso el pronombre la hace explícita en español. «Maltratarla» recoge la finalidad dañina de forma breve y natural.
- source_word: ἀφόρμης
  english_pob_choice: a pretext
  chosen_spanish: dándose un pretexto
  alternatives_spanish:
  - dándose una ocasión
  - dándose una oportunidad
  - dándose un motivo
  lexicon: LSJ
  rationale: La revisión inglesa favorece «pretext». En español, «dándose un pretexto» comunica bien la idea de base u oportunidad alegada para actuar hostilmente.
- source_word: διάθεσιν
  english_pob_choice: their purpose
  chosen_spanish: su propósito
  alternatives_spanish:
  - su intención
  - su disposición
  - su plan
  lexicon: LSJ
  rationale: Aunque διάθεσις puede ser «disposición», el contexto de la revisión inglesa destaca el objetivo/intención hostil. «Propósito» recoge mejor ese sentido en español.
- source_word: νομίμων
  english_pob_choice: their customary laws
  chosen_spanish: sus leyes acostumbradas
  alternatives_spanish:
  - sus leyes ancestrales
  - sus leyes establecidas
  - sus costumbres tradicionales
  lexicon: LSJ
  rationale: «Νόμιμα» puede referirse a usos establecidos o leyes tradicionales. «Leyes acostumbradas» preserva la mezcla de norma y costumbre del griego.
- source_word: κωλύωνται
  english_pob_choice: were being hindered
  chosen_spanish: se les impidiera
  alternatives_spanish:
  - se les obstaculizara
  - se les estorbara
  - se les impidiera
  lexicon: LSJ
  rationale: La forma final expresa la percepción o alegato de impedimento. «Se les impidiera» encaja con la subordinada y conserva la pasividad del original.
theological_decisions:
- issue: Referencia colectiva de γένος en un contexto de hostilidad política
  english_pob_reading: the nation
  chosen_spanish_reading: la nación
  alternative_spanish_readings:
  - el pueblo
  - la raza
  rationale: El texto trata de una campaña de rumor contra un colectivo judío. «La nación» comunica identidad colectiva e histórica sin el riesgo de malentendido racial que tendría «la raza».
  doctrine_reference: Translation philosophy §1, §6
- issue: Sentido de ἀφόρμης διδομένης εἰς διάθεσιν
  english_pob_reading: a pretext being given for their purpose
  chosen_spanish_reading: dándose un pretexto para su propósito
  alternative_spanish_readings:
  - dándose una ocasión para su propósito
  - dándose una oportunidad para su propósito
  rationale: La revisión inglesa privilegia «pretext» y «purpose». En español, la construcción refleja esa lectura y conserva la ambigüedad controlada del griego, que puede sugerir base alegada para actuar.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail en inglés, que sustituyó «an occasion being given for their disposition» por «a pretext being given for their purpose». Por eso el español adopta «dándose un pretexto para su propósito» y evita una traducción demasiado literal de διάθεσις como «disposición» en el cuerpo principal.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Nación» se usó para γένος conforme al criterio del proyecto de evitar «raza» en sentido moderno.
  - Se evitó «SEÑOR» o equivalentes de ocultamiento porque el verso no contiene κύριος ni una alusión directa al nombre divino.
