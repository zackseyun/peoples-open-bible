  - severity: low
    issue: '"al que se va perdiendo" suena algo torpe en español bíblico contemporáneo.'
    rationale: No es infiel, pero es menos fluido que otras opciones. Aun así puede mantenerse porque conserva bien la amplitud semántica y está apoyado por la nota alternativa.
