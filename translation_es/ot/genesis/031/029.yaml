revisions:
- from: 'Yo tengo en mi mano poder para hacerles daño[a], pero el Dios de su padre me habló anoche, diciendo: ‘Cuídate de hablar a Jacob ni bien ni mal’.'
  to: 'Está en mi poder hacerles daño[a], pero el Dios de su padre me habló anoche, diciendo: «Ten cuidado de no hablar con Jacob ni bien ni mal».'
  rationale: Se corrige el calco ‘en mi mano poder’ por el español idiomático ‘Está en mi poder’, se ajusta la prohibición a una construcción natural y fiel (‘de no hablar con Jacob’), y se mantiene la nota del modismo hebreo ya documentado en el POB. No hace falta adjudicación adicional.
