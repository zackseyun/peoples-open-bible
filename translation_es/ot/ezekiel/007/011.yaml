  text: הֶ/חָמָ֥ס קָ֖ם לְ/מַטֵּה רֶ֑שַׁע לֹא מֵ/הֶ֞ם וְ/לֹ֧א מֵ/הֲמוֹנָ֛/ם וְ/לֹ֥א מֶ/הֱמֵ/הֶ֖ם וְ/לֹא נֹ֥הַּ בָּ/הֶֽם׀־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/007/011.yaml
  text: Violence has arisen into a rod of wickedness[a]; none of them remains, none of their multitude, none of their wealth[b], and there is no eminence among them.
  footnotes:
  - marker: a
    text: Or, more literally but less clearly, 'not from them, and not from their multitude, and not from their abundance/tumult.' The Hebrew of these clauses is elliptical and difficult.
    reason: alternative_reading
  - marker: b
    text: The Hebrew terms in the last two clauses are uncertain; 'wealth' may also be understood as 'abundance' or 'tumult,' and 'eminence' may also be rendered 'preeminence,' with some taking the phrase differently altogether.
    reason: lexical_alternative
