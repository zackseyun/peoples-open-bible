revisions:
- from: Porque mi alma está harta de males[a], y mi vida se acerca a Sheol.
  to: Porque mi alma está llena de calamidades, y mi vida se acerca al Seol[a].
  rationale: Se corrige la correspondencia entre texto y nota, se mejora la fidelidad semántica de שָׂבְעָה con «está llena», se aclara el sentido contextual de רָעוֹת con «calamidades», y se usa «Seol» como forma española más natural del término hebreo preservado.
