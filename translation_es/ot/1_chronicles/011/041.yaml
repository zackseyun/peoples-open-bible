lexical_decisions:
- source_word: אֽוּרִיָּה
  english_pob_choice: Uriah
  chosen_spanish: Uría
  alternatives_spanish:
  - Urias
  lexicon: HALOT
  rationale: Nombre propio; se translitera al español con la forma breve y reconocible «Uría», manteniendo el referente personal sin añadir interpretación.
- source_word: הַ/חִתִּי
  english_pob_choice: the Hittite
  chosen_spanish: el hitita
  alternatives_spanish:
  - el heteo
  lexicon: HALOT
  rationale: El gentilicio con artículo identifica el origen étnico de Uría. «Hitita» es la forma clara y usual en español contemporáneo; «heteo» es posible, pero menos natural aquí.
- source_word: זָבָד
  english_pob_choice: Zabad
  chosen_spanish: Zabad
  alternatives_spanish:
  - Zabad
  lexicon: HALOT
  rationale: Nombre propio transliterado; se conserva la forma breve estándar en español sin traducir.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - el hijo de
  lexicon: HALOT
  rationale: Relación de filiación en construcción nominal. «Hijo de» es la expresión natural y fiel en español para marcar el vínculo genealógico.
- source_word: אַחְלָי
  english_pob_choice: Ahlai
  chosen_spanish: Ahlai
  alternatives_spanish:
  - Ajlai
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se mantiene «Ahlai» por coherencia con la tradición de transliteración usada en el registro base y por claridad en español.
translation_notes:
  revision_awareness: El inglés POB presenta el versículo como una lista nominal breve y sin variantes textuales relevantes; el draft español conserva esa misma economía sintáctica y la nota cruzada sobre Uría, sin expandir el contenido más allá del dato genealógico del hebreo.
  spanish_consistency_notes:
  - Se evita «SEÑOR» u otra terminología de sustitución porque el versículo no contiene el nombre divino.
  - 'Se conserva el orden nominal breve del hebreo: nombre + gentilicio + nombre + relación genealógica + nombre.'
  - «Hitita» se usa por ser la forma más idiomática en español; no altera la identificación étnica del מקור hebreo.
