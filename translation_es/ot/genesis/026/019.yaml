translation:
  language: es
  text: Entonces los servidores de Isaac cavaron en el cauce[a] y allí hallaron un pozo de agua viva[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «valle»; el término hebreo suele referirse a un wadi, es decir, un cauce de agua estacional.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «agua viva», es decir, agua corriente o de manantial, no estancada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחְפְּרוּ
  english_pob_choice: dug
  chosen_spanish: cavaron
  alternatives_spanish:
  - excavaron
  - huyeron
  lexicon: HALOT
  rationale: El verbo de acción narrativa expresa cavar literalmente; en español, «cavar» es el equivalente natural y directo para el verbo común de excavar en tierra. «Excavaron» es posible, pero suena más técnico.
- source_word: עַבְדֵי יִצְחָק
  english_pob_choice: Isaac’s servants
  chosen_spanish: los siervos de Isaac
  alternatives_spanish:
  - los esclavos de Isaac
  - los servidores de Isaac
  lexicon: HALOT
  rationale: POB en inglés eligió «servants» por el contexto narrativo y no por una afirmación sobre esclavitud. En español, «siervos» conserva esa relación de pertenencia/servicio sin imponer la dureza de «esclavos». «Servidores» es posible, pero menos tradicional y menos cercano al campo semántico bíblico.
- source_word: בַּנָּחַל
  english_pob_choice: in the wadi
  chosen_spanish: en el wadi
  alternatives_spanish:
  - en el valle
  - en el cauce
  - en el lecho del arroyo
  lexicon: HALOT
  rationale: Se conserva «wadi» porque el POB inglés lo adopta como término geográfico más preciso para נחל, que suele referir un cauce estacional. Otras opciones en español explican el concepto, pero pierden la designación técnica y la correspondencia auditada.
- source_word: וַיִּמְצְאוּ שָׁם
  english_pob_choice: found there
  chosen_spanish: allí hallaron
  alternatives_spanish:
  - hallaron allí
  - encontraron allí
  lexicon: HALOT
  rationale: «Allí hallaron» mantiene el orden narrativo fluido del hebreo y preserva el matiz de ubicación sin sobrecargar la frase. «Hallaron» encaja bien con el registro bíblico; «encontraron» sería igualmente posible, pero menos sobrio.
- source_word: בְּאֵר
  english_pob_choice: a well
  chosen_spanish: un pozo
  alternatives_spanish:
  - un pozo de agua
  - un aljibe
  lexicon: HALOT
  rationale: Aunque el término hebreo corresponde a un pozo, en español «pozo» comunica el referente con claridad. «Aljibe» sería incorrecto aquí. Se evita duplicar «pozo» con una construcción más pesada sin necesidad.
- source_word: מַיִם חַיִּים
  english_pob_choice: living water
  chosen_spanish: agua viva
  alternatives_spanish:
  - agua corriente
  - agua fresca
  - agua de manantial
  lexicon: HALOT
  rationale: La expresión hebrea idiomática se preserva como «agua viva», siguiendo la decisión del POB inglés de retener el sentido literal cargado de resonancias bíblicas. «Agua fresca» o «de manantial» explicitan la idea, pero atenúan la formulación tradicional y la tensión lexical entre literalidad e idiomatismo.
translation_notes:
  revision_awareness: 'El texto sigue de cerca la última pasada del audit trail inglés, que no registra cambios aplicados y fue ratificada con alto acuerdo. Se conserva el sentido narrativo simple: cavar, hallar un pozo y precisar el tipo de agua mediante una expresión idiomática mantenida en forma literal.'
  spanish_consistency_notes:
  - Se usa «siervos» en vez de «esclavos» porque el contexto narrativo no exige el matiz de propiedad servil que sí sería relevante en otros pasajes.
  - Se conserva «wadi» como préstamo técnico, tal como el inglés POB lo hizo, para no diluir el valor geográfico de נחל.
  - «Agua viva» se mantiene como calco idiomático transparente, con nota explicativa para evitar lectura exclusivamente espiritual en un contexto literal.
  - Se prefiere «hallaron» por registro bíblico sobrio y por su buena correspondencia con el verbo de descubrimiento del hebreo.
