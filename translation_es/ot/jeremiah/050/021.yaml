translation:
  language: es
  text: Sube contra la tierra de Merataim[a], contra ella, y contra los habitantes de Pécod[b]. Pásalos a espada y conságralos a la destrucción[c] tras ellos, declara Yahvé, y haz todo lo que te he mandado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Merataim probablemente es un nombre simbólico de Babilonia, con un posible juego de palabras que sugiere 'doble rebelión' o quizá 'doble amargura'.
    reason: lexical_alternative
  - marker: b
    text: Pécod puede ser un nombre de lugar o de pueblo; también puede aludir a la raíz hebrea que significa 'castigo' o 'visita'.
    reason: lexical_alternative
  - marker: c
    text: O 'ponlos bajo el anatema'; el hebreo se refiere a consagrar algo a la destrucción.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְרָתַיִם
  english_pob_choice: Merathaim
  chosen_spanish: Merataim
  alternatives_spanish:
  - Doble rebelión
  - doble amargura
  lexicon: HALOT
  rationale: Se conserva como nombre propio transliterado, porque en el texto funciona sintácticamente como designación de lugar o pueblo. La posible alusión irónica o de juego de palabras con 'doble rebelión' / 'doble amargura' se preserva en nota, sin resolverla en el cuerpo principal.
- source_word: עֲלֵה
  english_pob_choice: Go up
  chosen_spanish: Sube
  alternatives_spanish:
  - Avanza
  - ve
  lexicon: HALOT
  rationale: En el contexto militar, עלה expresa avanzar o subir contra un objetivo. 'Sube' reproduce bien el ímpetu idiomático hebreo y suena natural en español bíblico contemporáneo.
- source_word: יוֹשְׁבֵי
  english_pob_choice: inhabitants of
  chosen_spanish: habitantes de
  alternatives_spanish:
  - los que habitan en
  - residentes de
  lexicon: HALOT
  rationale: El participio indica los que viven en un lugar. 'Habitantes de' es conciso, idiomático y conserva el sentido colectivo sin añadir matices.
- source_word: פְּקֹד
  english_pob_choice: Pekod
  chosen_spanish: Pécod
  alternatives_spanish:
  - Pekod
  - Pecod
  - castigo
  lexicon: HALOT
  rationale: Se mantiene como nombre propio transliterado y adaptado a la ortografía española con acento para marcar la sílaba tónica. La posible resonancia con la raíz פקד ('visitar', 'castigar', 'designar') queda preservada en nota.
- source_word: חֲרֹב
  english_pob_choice: Put them to the sword
  chosen_spanish: Hiérrelos con la espada
  alternatives_spanish:
  - Mátalos a espada
  - destrúyelos con la espada
  lexicon: HALOT
  rationale: El imperativo es cortante y militar. 'Hiérrelos con la espada' transmite la acción bélica de manera directa y mantiene la fuerza del mandato sin suavizarlo; se eligió esta formulación por naturalidad en español bíblico y por cercanía al sentido de ejecución violenta.
- source_word: וְהַחֲרֵם
  english_pob_choice: devote them to destruction
  chosen_spanish: conságralos a la destrucción
  alternatives_spanish:
  - devuélvelos al anatema
  - arrágalos por completo
  - destrúyelos por completo
  lexicon: HALOT
  rationale: חרם en forma hifil expresa poner bajo ban o dedicar a destrucción. 'Conságralos a la destrucción' procura conservar la tensión teológica del término técnico sin reducirlo a un mero 'destruir'.
- source_word: אַחֲרֵיהֶם
  english_pob_choice: after them
  chosen_spanish: después de ellos
  alternatives_spanish:
  - tras ellos
  - siguiéndolos
  lexicon: HALOT
  rationale: La secuencia es difícil; 'después de ellos' mantiene la forma sencilla del hebreo y puede reflejar tanto persecución como continuación del juicio, sin forzar una reconstrucción más precisa de la sintaxis.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - oráculo de Yahvé
  - dice Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética estándar con el nombre divino en la forma exigida por el proyecto. 'Declara Yahvé' es sobria y solemne en español contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el Tetragrámaton, evitando la sustitución tradicional por un título y preservando el nombre propio revelado.
- source_word: וַעֲשֵׂה כְּכֹל אֲשֶׁר צִוִּיתִיךָ
  english_pob_choice: do all that I have commanded you
  chosen_spanish: haz todo lo que te he mandado
  alternatives_spanish:
  - actúa conforme a todo lo que te mandé
  - haz según todo lo que te he ordenado
  lexicon: HALOT
  rationale: La cláusula final cierra la comisión con lenguaje de obediencia integral. 'Haz todo lo que te he mandado' es natural en español y conserva la totalidad expresada por כְּכֹל.
theological_decisions:
- issue: Intensidad del lenguaje de juicio y guerra santa
  english_pob_reading: Retain the full force of holy-war/judgment terminology with 'put them to the sword' and 'devote them to destruction.'
  chosen_spanish_reading: Mantener la fuerza plena del mandato bélico y del término técnico de destrucción consagrada.
  alternative_spanish_readings:
  - suavizar con 'destrúyelos'
  - generalizar con 'véncelos'
  rationale: El hebreo usa fórmulas fuertes de juicio. Atenuar la expresión borraría la tensión teológica del oráculo. La traducción española conserva esa severidad sin añadir justificación extra al texto.
  doctrine_reference: Translation philosophy §3, §6
- issue: Tratamiento de los nombres simbólicos Merathaim y Pekod
  english_pob_reading: Keep Merathaim and Pekod as transliterated names in the main text, with explanatory alternatives in footnotes.
  chosen_spanish_reading: Conservar Merataim y Pécod como nombres propios transliterados, con nota explicativa sobre su posible juego de palabras.
  alternative_spanish_readings:
  - traducirlos como 'Doble rebelión' y 'Castigo'
  - naturalizarlos sin nota
  rationale: En el versículo operan como designaciones de lugar o pueblo. La transliteración respeta esa función y evita decidir de antemano si Jeremías pretende geografía literal, nombre simbólico o ambas cosas.
  doctrine_reference: Translation philosophy §2, §3
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el flujo más reciente; la presente redacción sigue el pase final sin cambios y conserva la tensión léxica y teológica observada en la auditoría inglesa.
  spanish_consistency_notes:
  - Se mantuvo Yahvé para יְהוָה según el estándar del proyecto.
  - Se preservó la diferenciación entre nombre propio transliterado y posible juego de palabras en nota para Merataim y Pécod.
  - Se evitó sustituir el lenguaje de חרם por un verbo más genérico, para no perder la fuerza técnica del texto.
  - La puntuación y el orden de miembros siguen de cerca la estructura del hebreo y de la versión inglesa auditada, sin calco mecánico donde el español requería ajuste de naturalidad.
