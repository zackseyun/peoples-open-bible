translation:
  language: es
  text: 'Entonces Natán dijo a David: «Haz todo lo que hay en tu corazón, pues Dios está contigo.»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Así que ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; en español, «Y ... dijo» conserva la continuidad narrativa sin forzar una reformulación interpretativa.
- source_word: נָתָן
  english_pob_choice: Nathan
  chosen_spanish: Natán
  alternatives_spanish:
  - Natan
  lexicon: Convención onomástica bíblica
  rationale: Nombre propio transliterado según el uso español bíblico estándar, con acentuación gráfica para lectura natural.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - hacia
  lexicon: HALOT
  rationale: La preposición de dirección se expresa naturalmente en español con «a» en este contexto de habla dirigida a David.
- source_word: דָּוִיד
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - Davíd
  lexicon: Convención onomástica bíblica
  rationale: Nombre propio mantenido en la forma usual del español bíblico.
- source_word: כֹּל אֲשֶׁר
  english_pob_choice: all that
  chosen_spanish: todo lo que
  alternatives_spanish:
  - todo aquello que
  - cuanto
  lexicon: HALOT
  rationale: La combinación expresa totalidad de lo que sigue; «todo lo que» es la forma más natural y fiel en español.
- source_word: בִּלְבָבְךָ
  english_pob_choice: is in your heart
  chosen_spanish: hay en tu corazón
  alternatives_spanish:
  - está en tu corazón
  - está en tu mente
  - está en tu interior
  lexicon: HALOT
  rationale: «Corazón» conserva el antropologismo hebreo para intención/deseo. En español, «hay en tu corazón» comunica con naturalidad el contenido interior al que se refiere el hebreo, sin reducirlo solo a emoción o solo a pensamiento.
- source_word: עֲשֵׂה
  english_pob_choice: Do
  chosen_spanish: Haz
  alternatives_spanish:
  - עשה
  - Realiza
  - Lleva a cabo
  lexicon: HALOT
  rationale: Imperativo directo y breve; «Haz» reproduce la fuerza exhortativa de manera idiomática y fiel.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del imperativo; «porque» es la equivalencia directa y clara en español.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: Aunque el hebreo lleva artículo, aquí אֱלֹהִים funciona como referencia definida a Dios; en español, «Dios» es la forma idiomática y no requiere artículo.
- source_word: עִמָּךְ
  english_pob_choice: is with you
  chosen_spanish: está contigo
  alternatives_spanish:
  - está con usted
  - permanece contigo
  lexicon: HALOT
  rationale: La expresión de presencia divina se vierte naturalmente con «está contigo», que conserva tanto cercanía como apoyo/presencia.
theological_decisions:
- issue: Referencia divina en הָאֱלֹהִים
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - el Dios
  - el Señor
  rationale: El texto hebreo usa אֱלֹהִים, no YHWH. Por eso se mantiene «Dios» y no «Yahvé» o «el Señor». La presencia del artículo hebreo no obliga al artículo español; aquí la forma desnuda es la más natural e idiomática.
  doctrine_reference: 'DOCTRINE.md: primacía del texto original; distinción entre YHWH y אֱלֹהִים.'
- issue: Sentido antropológico de לֵבָב / «heart»
  english_pob_reading: is in your heart
  chosen_spanish_reading: hay en tu corazón
  alternative_spanish_readings:
  - está en tu corazón
  - está en tu mente
  - está en tu interior
  rationale: Se preserva el término «corazón» para no deshacer la antropología bíblica del texto. A la vez, «hay en tu corazón» evita que el español suene demasiado rígido y mantiene la amplitud de intención, deseo y pensamiento implícita en לֵבָב.
  doctrine_reference: 'DOCTRINE.md: términos antropológicos del AT no deben reducirse sin necesidad.'
translation_notes:
  revision_awareness: El audit trail inglés no presenta notas ni revisiones aplicadas; la versión española sigue la lectura estable de alta concordancia, preservando la estructura imperativa y la referencia a Dios sin añadir matices no presentes en el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים en lugar de «Yahvé», ya que no aparece el tetragrámaton en este versículo.
  - Se usa «corazón» como equivalente de לֵבָב, evitando sustituirlo por «mente» y preservando la semántica bíblica.
  - La puntuación con comillas angulares y dos puntos refleja el discurso directo en español bíblico moderno.
  - Se elige un registro claro y digno, sin arcaísmos innecesarios.
