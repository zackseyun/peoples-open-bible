  glossary_alignment: κύριος como 'Señor' está bien en este contexto; no hay razón para forzar 'Yahvé' aquí porque la fuente inmediata es κύριος y el expediente inglés no documenta alusión específica al nombre divino. La distinción 'escarcha y frío' está bien. La preservación de 'bendecir' en lugar de 'alabar' coincide con el razonamiento del POB.
  issues:
  - severity: medium
    issue: Registro verbal no alineado con el español meta del proyecto
    rationale: El borrador usa imperativos de segunda persona plural peninsular ('bendecid', 'cantad', 'exaltadlo'), mientras el proyecto pide español neutral latinoamericano y ampliamente legible en iglesia. En este tipo de invocación a la creación, la tercera persona plural exhortativa ('Bendigan... canten... exáltenlo') suena más natural y panhispánica.
  - severity: medium
    issue: '''Exaltadlo altamente'' es un calco poco idiomático'
    rationale: Aunque intenta reflejar el intensificador de ὑπερυψοῦτε, 'altamente' con 'exaltar' resulta forzado en español bíblico moderno. 'Exáltenlo en gran manera' o 'exáltenlo grandemente' conserva la intensidad con mejor naturalidad.
  - severity: low
    issue: '''Por siempre'' es aceptable, pero ''para siempre'' fluye mejor aquí'
    rationale: Ambas opciones son válidas para εἰς τοὺς αἰῶνας; sin embargo, 'para siempre' suele sonar más natural tras una cadena verbal exhortativa en español eclesial contemporáneo.
  revised_spanish_text: Bendigan al Señor[a], escarcha y frío; canten himnos y exáltenlo en gran manera para siempre.
