review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien el sentido general del hebreo: la adición de גַּם, el doble objeto ''toda enfermedad y toda aflicción'', la referencia al ''libro de esta ley'', el uso de ''Yahvé'' para יהוה, y el resultado final ''hasta que seas destruido''. Sin embargo, la cláusula relativa singular אֲשֶׁר לֹא כָתוּב se aplica a ambos sustantivos coordinados, y en español ''que no está escrita'' suena gramaticalmente desajustada al abarcar también ''enfermedad''. Conviene reformular para que la relativización cubra naturalmente toda la serie.'
  spanish_quality_summary: El español es claro y digno, pero hay dos problemas menores de calidad. Primero, 'que no está escrita' después de 'toda enfermedad y toda aflicción' genera una concordancia incómoda. Segundo, la nota sobre 'libro' introduce una alternativa ('rollo') que el inglés auditado no prioriza aquí; la alternativa documentada relevante en el POB está en מַכָּה ('aflicción' / 'plaga'). La frase revisada puede sonar más natural con 'que no estén escritas'.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יהוה -> ''Yahvé'' correctamente; תּוֹרָה -> ''ley'' es apropiado en este contexto documental; חֳלִי -> ''enfermedad'' y מַכָּה -> ''aflicción'' siguen el criterio auditado, aunque debe preservarse en nota la alternativa ''plaga'' para מַכָּה, no para סֵפֶר.'
  issues:
  - severity: medium
    issue: 'Concordancia de la cláusula relativa: ''que no está escrita'''
    rationale: El hebreo usa un singular pasivo que modifica la serie 'toda enfermedad y toda aflicción'. En español, el singular femenino después de dos sustantivos coordinados suena como si modificara solo 'aflicción' o crea una concordancia defectuosa. 'Que no estén escritas' resuelve el problema sin perder sentido.
  - severity: medium
    issue: La nota al pie está anclada en 'libro' en vez de reflejar la alternativa léxica auditada para מַכָּה
    rationale: El POB inglés conserva la alternativa 'every plague' para מַכָּה. La nota española actual sobre 'libro'/'rollo' no corresponde al principal matiz preservado en el expediente auditado y desplaza la atención de la decisión léxica significativa.
  revised_spanish_text: Además, toda enfermedad y toda aflicción[a] que no estén escritas en el libro de esta ley, Yahvé las traerá sobre ti hasta que seas destruido.
  revised_footnotes:
  - marker: a
    text: O «toda plaga» por «toda aflicción»; el término hebreo puede denotar un golpe, una plaga o una calamidad que hiere.
    reason: lexical_alternative
  revision_rationale: Se ajusta la concordancia para que la cláusula relativa abarque naturalmente ambos sustantivos coordinados en español, y se reemplaza la nota sobre 'libro' por la alternativa léxica significativa documentada para מַכָּה en el expediente inglés. No se requiere adjudicación adicional.
