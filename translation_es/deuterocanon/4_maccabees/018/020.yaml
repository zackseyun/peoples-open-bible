    rationale: Después de «después de encender fuego... y, en furor hirviente,» la forma «llevando» encadena mejor las acciones del participio griego ἀγαγών en español fluido.
  - severity: low
    issue: La nota [b] usa «paradoxo», grafía no normativa en español actual.
    rationale: La forma estándar es «paradoja».
