translation:
  language: es
  text: De un muerto[a], como de uno que ya no existe, perece la alabanza; pero el que está vivo y sano alabará a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acción de gracias»; el sustantivo griego también puede significar «confesión», pero aquí el paralelismo con «alabará a Yahvé» favorece el sentido de alabanza o gratitud.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ νεκροῦ
  english_pob_choice: From the dead
  chosen_spanish: Del muerto
  alternatives_spanish:
  - De un muerto
  - Del difunto
  lexicon: BDAG
  rationale: El singular con ἀπό funciona de modo genérico, como en el inglés POB. «Del muerto» conserva la referencia a una persona muerta sin añadir perífrasis innecesaria. «Difunto» suena más eufemístico y menos cercano al contraste retórico del griego.
- source_word: ὡς μηδὲ ὄντος
  english_pob_choice: as from one who no longer exists
  chosen_spanish: como de uno que ya no existe
  alternatives_spanish:
  - como de uno que no es
  - como de uno que es como si no existiera
  lexicon: BDAG
  rationale: La frase intensifica la condición del muerto comparándolo con alguien que no existe. «Ya no existe» comunica esa fuerza en español natural sin convertirla en una afirmación metafísica más fuerte que la del verso.
- source_word: ἀπόλλυται
  english_pob_choice: perishes
  chosen_spanish: perece
  alternatives_spanish:
  - se pierde
  - desaparece
  - se acaba
  lexicon: BDAG
  rationale: «Perece» conserva el peso de destrucción o desaparición del verbo griego y encaja mejor con el paralelismo que opciones más débiles como «se pierde».
- source_word: ἐξομολόγησις
  english_pob_choice: praise
  chosen_spanish: alabanza
  alternatives_spanish:
  - confesión
  - acción de gracias
  - agradecimiento
  lexicon: LEH
  rationale: Aunque el término puede significar «confesión», aquí el paralelismo con αἰνέσει τὸν κύριον favorece un sentido de alabanza o gratitud dirigida a Dios. «Alabanza» evita imponer un matiz penitencial que el contexto no exige.
- source_word: ζῶν καὶ ὑγιὴς
  english_pob_choice: one who is alive and well
  chosen_spanish: el que está vivo y sano
  alternatives_spanish:
  - el vivo y sano
  - uno que vive y está sano
  - la persona viva y sana
  lexicon: BDAG
  rationale: La expresión contrasta con el muerto y describe a alguien en plena condición vital. «El que está vivo y sano» es idiomático en español y mantiene ambos elementos del griego.
- source_word: αἰνέσει
  english_pob_choice: will praise
  chosen_spanish: alabará
  alternatives_spanish:
  - dará alabanza
  - loará
  lexicon: BDAG
  rationale: El futuro concuerda con la forma verbal griega y con el contraste proverbial. «Alabará» es la correspondencia más directa y natural en español.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Dueño
  - el Maestro
  lexicon: BDAG
  rationale: En este contexto sapiencial judío, κύριος se refiere a Dios. Se conserva «el Señor» como forma establecida y reverente en español cuando el griego apunta a Yahvé de manera indirecta.
theological_decisions:
- issue: 'Sentido de ἐξομολόγησις: ¿confesión o alabanza/acción de gracias?'
  english_pob_reading: Rendered as 'praise' because the parallel with 'will praise the Lord' favors praise or thanksgiving.
  chosen_spanish_reading: alabanza
  alternative_spanish_readings:
  - confesión
  - acción de gracias
  rationale: 'La segunda mitad del versículo interpreta el primer miembro: el vivo y sano «alabará al Señor». Por eso «alabanza» transmite mejor el paralelismo y evita introducir una lectura penitencial que no está respaldada por el contexto inmediato.'
  doctrine_reference: Principio de primacía del texto original y del paralelismo poético-sapiencial.
translation_notes:
  revision_awareness: El expediente inglés indica alta concordancia y ningún cambio en la última revisión; esta versión española sigue la lectura ya establecida, manteniendo el paralelismo entre ἐξομολόγησις y αἰνέσει τὸν κύριον sin añadir matices ajenos al griego.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος, coherente con la convención del proyecto cuando el referente es Dios.
  - Se usa «alabanza» en lugar de «confesión» para preservar el sentido que impone el paralelismo del verso.
  - «Del muerto» conserva el singular genérico del griego y evita una paráfrasis excesiva.
  - 'La puntuación reproduce la antítesis del texto: primer miembro negativo, segundo miembro afirmativo.'
