  yaml_path: translation/ot/joshua/007/012.yaml
  text: Therefore the sons of Israel cannot stand before their enemies; they turn their backs before their enemies[a], because they have become devoted to destruction. I will no longer be with you unless you destroy the devoted thing from your midst.
  footnotes:
  - marker: a
    text: Hebrew חֵרֶם (cherem) refers to something devoted to God for destruction under a ban. Traditional English versions often render it 'accursed thing.'
