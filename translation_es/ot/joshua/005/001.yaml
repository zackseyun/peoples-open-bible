  to: Y sucedió que, cuando todos los reyes de los amorreos que estaban al otro lado del Jordán, al occidente, y todos los reyes de los cananeos que estaban junto al mar[a] oyeron que Yahvé había secado las aguas del Jordán delante de los hijos de Israel hasta que cruzamos[b], se derritieron sus corazones, y ya no hubo en ellos espíritu[c] por causa de los hijos de Israel.
