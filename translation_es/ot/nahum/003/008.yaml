translation:
  language: es
  text: ¿Eres mejor que No-amón[a], la que habitaba entre los canales del Nilo, con aguas alrededor de ella, cuyo baluarte era el mar[c][b], y cuya muralla era del mar?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: No-amón es la ciudad egipcia más conocida como Tebas.
    reason: alternative_reading
  - marker: b
    text: 'O: «cuya fuerza era el mar»; el hebreo puede denotar fuerza o defensa.'
    reason: lexical_alternative
  - marker: c
    text: Es decir, las aguas circundantes funcionaban como su muralla.
    reason: cultural_note
lexical_decisions:
- source_word: הֲתֵיטְבִי
  english_pob_choice: Are you better than
  chosen_spanish: ¿Eres tú mejor que
  alternatives_spanish:
  - ¿Eres más favorecida que
  - ¿Eres más próspera que
  lexicon: HALOT
  rationale: El comparativo interrogativo en contexto de burla se expresa con naturalidad en español como «¿Eres tú mejor que...», manteniendo el sentido de superioridad o ventaja sin forzar una paráfrasis.
- source_word: נֹּא אָמוֹן
  english_pob_choice: No-amon
  chosen_spanish: No-amón
  alternatives_spanish:
  - Tebas
  - No de Amón
  lexicon: HALOT
  rationale: Se conserva el nombre hebreo transliterado, como hace la POB en inglés. La identificación histórica con Tebas se deja para nota, no en el texto principal.
- source_word: הַיֹּשְׁבָה
  english_pob_choice: who dwelt
  chosen_spanish: la que habitaba
  alternatives_spanish:
  - la que moraba
  - la que vivía
  lexicon: HALOT
  rationale: El participio describe la ubicación estable de la ciudad; «habitaba» comunica bien la permanencia y es natural en español bíblico contemporáneo.
- source_word: בַּיְאֹרִים
  english_pob_choice: among the Nile channels
  chosen_spanish: entre los canales del Nilo
  alternatives_spanish:
  - entre los brazos del Nilo
  - entre los canales nilóticos
  lexicon: HALOT
  rationale: En contexto egipcio, יְאֹרִים alude a canales o brazos del Nilo. «Canales del Nilo» conserva la referencia local y evita una generalización a «ríos».
- source_word: מַיִם סָבִיב לָהּ
  english_pob_choice: with waters all around her
  chosen_spanish: con aguas alrededor de ella
  alternatives_spanish:
  - rodeada de aguas
  - con aguas por todas partes
  lexicon: HALOT
  rationale: Se mantiene la imagen circundante del texto hebreo sin sobreexplicar; «alrededor de ella» conserva la personificación femenina de la ciudad.
- source_word: אֲשֶׁר חֵיל יָם
  english_pob_choice: whose rampart was the sea
  chosen_spanish: cuya muralla era el mar
  alternatives_spanish:
  - cuya fortaleza era el mar
  - cuya defensa era el mar
  - cuya fuerza era el mar
  lexicon: HALOT
  rationale: חֵיל puede llevar la idea de fuerza defensiva o fortificación. Dado el paralelismo con «muralla», «muralla» mantiene la imagen de defensa natural; la alternativa «fortaleza» se conserva en la lista y en nota para la tensión léxica.
- source_word: מִיָּם חוֹמָתָהּ
  english_pob_choice: whose wall was from the sea
  chosen_spanish: y cuya fortaleza era del mar
  alternatives_spanish:
  - cuya muralla era del mar
  - y cuya muralla provenía del mar
  - cuya muralla venía del mar
  lexicon: HALOT
  rationale: Se conserva la preposición de origen con «del mar» para reflejar el hebreo מִן. «Fortaleza» hace visible la posible resonancia de חוֹמָה como elemento defensivo, mientras que la nota mantiene la alternativa literal de «muralla».
theological_decisions:
- issue: Imagen de defensa natural atribuida a una ciudad por medio de personificación femenina
  english_pob_reading: whose rampart was the sea, whose wall was from the sea
  chosen_spanish_reading: cuya muralla era el mar, y cuya fortaleza era del mar
  alternative_spanish_readings:
  - cuya muralla era el mar, y cuya muralla provenía del mar
  - cuya defensa era el mar, y cuya muralla era del mar
  rationale: El versículo usa imágenes poéticas de fortificación natural para humillar a Nínive mediante el ejemplo de No-amón. Mantener dos expresiones de defensa evita borrar la imaginería doble del hebreo y preserva la ironía profética.
  doctrine_reference: Poética profética / imaginería de juicio en Nahúm
translation_notes:
  revision_awareness: El texto base inglés fue revisado de «sat» a «dwelt» para reflejar mejor el participio de ubicación; esta draft española sigue esa misma orientación con «habitaba», y conserva la estructura comparativa y las imágenes defensivas sin simplificarlas.
  spanish_consistency_notes:
  - Se usa «No-amón» como transliteración principal, en paralelo con la política POB de conservar el nombre hebreo.
  - Se evita «SEÑOR» u otra sustitución teológica no presente; el verso no contiene el nombre divino.
  - «Muralla/fortaleza» busca mantener la tensión del hebreo entre defensa física y fuerza defensiva; la nota explica la alternativa.
  - La puntuación refleja una pregunta retórica continua, propia del tono de amenaza profética.
