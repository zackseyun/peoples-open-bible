translation:
  language: es
  text: Puesto que estoy a punto de demostrar un argumento muy filosófico —si la razón piadosa es dueña absoluta[a] de las pasiones—, con razón les aconsejaría que presten esmerada atención a la filosofía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si la razón piadosa tiene dominio absoluto sobre las pasiones».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ΦΙΛΟΣΟΦΩΤΑΤΟΝ λόγον
  english_pob_choice: a most philosophical argument
  chosen_spanish: un argumento muy filosófico
  alternatives_spanish:
  - un discurso sumamente filosófico
  - un asunto muy filosófico
  lexicon: LSJ
  rationale: λόγος aquí introduce el discurso/argumento que el autor va a exponer; por eso conviene un sustantivo que naturalice el valor discursivo sin perder el matiz retórico de φιλοσοφώτατον.
- source_word: ἐπιδείκνυσθαι μέλλων
  english_pob_choice: I am about to demonstrate
  chosen_spanish: estoy a punto de presentar
  alternatives_spanish:
  - estoy a punto de demostrar
  - me dispongo a exponer
  lexicon: LSJ
  rationale: El participio con μέλλων expresa inminencia, y ἐπιδείκνυσθαι puede ser presentar o demostrar públicamente. 'Presentar' suena más natural en español y conserva la intención de introducir el argumento.
- source_word: αὐτόδεσποτός
  english_pob_choice: master
  chosen_spanish: dueña absoluta
  alternatives_spanish:
  - dueña de sí misma
  - soberana
  - maestra absoluta
  lexicon: LSJ
  rationale: El compuesto sugiere autosoberanía o dominio pleno. En español, 'dueña absoluta' transmite la idea de dominio sin forzar una terminología demasiado filosófica o extraña.
- source_word: τῶν παθῶν
  english_pob_choice: of the passions
  chosen_spanish: de las pasiones
  alternatives_spanish:
  - de las emociones
  - de los impulsos
  - de los padecimientos
  lexicon: LSJ
  rationale: En el contexto filosófico helenístico, πάθη se refiere a las pasiones o afectos desordenados. 'Pasiones' preserva ese campo semántico mejor que 'emociones'.
- source_word: ὁ εὐσεβὴς λογισμός
  english_pob_choice: devout reason
  chosen_spanish: la razón piadosa
  alternatives_spanish:
  - la razón devota
  - el razonamiento piadoso
  - la reflexión piadosa
  lexicon: LSJ
  rationale: λογισμός denota razón o facultad racional; εὐσεβής añade una cualidad religiosa. 'Razón piadosa' conserva ambas dimensiones de manera clara y sobria en español.
- source_word: συμβουλεύσαιμʼ ἂν ὑμῖν
  english_pob_choice: I would ... advise you
  chosen_spanish: les aconsejaría
  alternatives_spanish:
  - les exhortaría
  - les aconsejaría a ustedes
  - les recomendaría
  lexicon: LSJ
  rationale: El optativo con ἄν expresa consejo cortés. 'Les aconsejaría' reproduce bien el tono deferente y exhortativo del griego.
- source_word: ὀρθῶς
  english_pob_choice: rightly
  chosen_spanish: con justicia
  alternatives_spanish:
  - correctamente
  - con razón
  - de manera acertada
  lexicon: LSJ
  rationale: Aquí el adverbio califica la legitimidad del consejo. 'Con justicia' comunica esa valoración normativa en un español solemne y natural.
- source_word: ὅπως προθύμως προσέχητε
  english_pob_choice: to give earnest attention
  chosen_spanish: que presten atención fervorosa
  alternatives_spanish:
  - que atiendan con diligencia
  - que presten atención con celo
  - que atiendan con fervor
  lexicon: LSJ
  rationale: προθύμως añade prontitud y empeño, y προσέχω es prestar atención. 'Atención fervorosa' mantiene el sentido de atención diligente y enérgica, con un registro digno.
- source_word: τῇ φιλοσοφίᾳ
  english_pob_choice: to philosophy
  chosen_spanish: a la filosofía
  alternatives_spanish:
  - a esta filosofía
  - al estudio filosófico
  lexicon: LSJ
  rationale: El dativo es directo; 'filosofía' funciona de modo natural en español y conserva la auto-presentación del tratado sin añadir especificación ajena al griego.
theological_decisions:
- issue: Cómo renderizar εὐσεβὴς λογισμός sin perder la tensión entre piedad y razón
  english_pob_reading: devout reason
  chosen_spanish_reading: la razón piadosa
  alternative_spanish_readings:
  - la razón devota
  - el razonamiento piadoso
  - la reflexión piadosa
  rationale: La obra sostiene una razón orientada por la reverencia a Dios; no es razón secular autónoma. 'Razón piadosa' preserva la unión de racionalidad y piedad sin resolverla en un término exclusivamente religioso ni puramente filosófico.
  doctrine_reference: 'DOCTRINE.md: Preservar la tensión teológica y filosófica; español claro, no arcaizante.'
- issue: Cómo expresar αὐτόδεσποτός en relación con el dominio de las pasiones
  english_pob_reading: absolute master over the passions
  chosen_spanish_reading: dueña absoluta de las pasiones
  alternative_spanish_readings:
  - soberana de las pasiones
  - dueña de sí misma respecto de las pasiones
  - maestra absoluta de las pasiones
  rationale: El griego afirma dominio pleno sobre las pasiones. 'Dueña absoluta' mantiene esa fuerza sin introducir una formulación doctrinal más pesada que el texto no exige.
  doctrine_reference: 'DOCTRINE.md: No suavizar tensiones léxicas ni sustituir fuerza semántica por eufemismo.'
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del inglés auditado: mantiene la idea de dominio ''absoluto'' sobre las pasiones y un tono más formal en la exhortación. Se evitó traducir mecánicamente desde el inglés: se trabajó directamente desde el griego, usando la lectura inglesa como control auditado. El marcador de nota [a] aparece en el texto principal para anclar la alternativa léxica.'
  spanish_consistency_notes:
  - Se usa 'razón' para λογισμός, no 'razonamiento', porque el tratado personifica una facultad racional estable.
  - Se usa 'pasiones' para τῶν παθῶν en sentido filosófico helenístico, no 'emociones', para conservar el marco conceptual del pasaje.
  - '''Filosofía'' se mantiene como término técnico del prólogo del libro, coherente con la auto-descripción retórica del autor.'
  - Se evita 'SEÑOR' u otro reemplazo teológico no pertinente, ya que el verso no contiene el nombre divino ni κύριος.
