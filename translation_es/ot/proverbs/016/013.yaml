translation:
  language: es
  text: Los labios rectos son el deleite de los reyes[a], y aman al que habla lo recto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«deleite» sigue la lectura del hebreo רְצוֹן como placer o agrado. También puede entenderse como «favor»: «Los labios rectos son el favor de los reyes».'
    reason: lexical_alternative
  - marker: b
    text: «lo recto» refleja el plural sustantivado hebreo יְשָׁרִים, literalmente «las cosas rectas» o «lo que es recto».
    reason: lexical_alternative
lexical_decisions:
- source_word: רְצוֹן
  english_pob_choice: delight
  chosen_spanish: deleite
  alternatives_spanish:
  - favor
  - agrado
  - placer
  lexicon: HALOT
  rationale: El sustantivo puede expresar favor, placer o lo que es aceptable. Aquí funciona de modo predicativo con 'los reyes', por lo que 'deleite' comunica naturalmente la idea de lo que les agrada, sin perder la fuerza valorativa del hebreo.
- source_word: מְלָכִים
  english_pob_choice: kings
  chosen_spanish: los reyes
  alternatives_spanish:
  - los reyes gobernantes
  - los monarcas
  lexicon: HALOT
  rationale: El plural es directo y concreto; 'reyes' conserva el marco sapiencial de autoridad real.
- source_word: שִׂפְתֵי צֶדֶק
  english_pob_choice: Righteous lips
  chosen_spanish: los labios justos
  alternatives_spanish:
  - labios de justicia
  - labios rectos
  - labios honestos
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'labios de justicia/rectitud'. En español, 'labios justos' mantiene la metáfora y el paralelismo, y evita una paráfrasis más amplia como 'habla honesta'.
- source_word: צֶדֶק
  english_pob_choice: righteous
  chosen_spanish: justos
  alternatives_spanish:
  - rectos
  - de justicia
  - correctos
  lexicon: HALOT
  rationale: En este proverbio el término describe la cualidad moral del habla. 'Justos' preserva bien el campo semántico de justicia/rectitud en español.
- source_word: וְדֹבֵר
  english_pob_choice: and he loves one who speaks
  chosen_spanish: y aman al que habla
  alternatives_spanish:
  - y aman a quien habla
  - y aman al hablante
  - y aman al que dice
  lexicon: HALOT
  rationale: 'El participio funciona sustantivamente. La versión española mantiene el valor genérico: los reyes aman a la persona que habla de esa manera.'
- source_word: יְשָׁרִים
  english_pob_choice: what is upright
  chosen_spanish: lo recto
  alternatives_spanish:
  - lo justo
  - lo correcto
  - lo que es recto
  lexicon: HALOT
  rationale: El plural adjetival se usa sustantivamente. 'Lo recto' conserva la abstracción y la brevedad del hebreo, sin forzar un objeto singular concreto.
- source_word: יֶאֱהָב
  english_pob_choice: he loves
  chosen_spanish: aman
  alternatives_spanish:
  - ama
  - amará
  - tienen amor por
  lexicon: HALOT
  rationale: El imperfecto expresa valor gnómico o habitual. La revisión inglesa corrigió el sujeto al plural 'kings'; por eso el español usa 'aman' para concordar con 'los reyes'.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada de «he loves» a «they love» para concordar con el plural «kings». La traducción española adopta esa concordancia plural con «aman». También se conservó la tensión léxica de רְצוֹן como favor/delicia mediante una nota alternativa.
  spanish_consistency_notes:
  - Se prefirió 'reyes' y no una generalización como 'gobernantes' para mantener el tono sapiencial concreto.
  - '''Justos'' en ''labios justos'' conserva la metáfora hebrea; no se expandió a ''habla justa'' para no perder el paralelismo nominal.'
  - El segundo colon mantiene sujeto plural implícito en español por la concordancia verbal con 'aman'.
