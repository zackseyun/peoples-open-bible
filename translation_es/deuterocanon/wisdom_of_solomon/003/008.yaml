  glossary_alignment: 'Buena alineación general con la auditoría inglesa, excepto por dos detalles: 1) el proyecto prefiere distinguir ἔθνη / λαοί, y el borrador lo hace correctamente con «naciones» / «pueblos»; 2) para κύριος, aunque el proyecto usa «Yahvé» para יהוה, aquí la fuente griega tiene Κύριος sin evidencia inmediata de cita del nombre divino, así que «el Señor» es aceptable. Se requiere reparación de notas y mejora menor de la elección «dominarán sobre».'
