  to: y una carta para Asaf[a], el guardián del bosque del rey, para que me diera madera para hacer vigas para las puertas de la fortaleza[b] que pertenece a la casa[c], y para el muro de la ciudad, y para la casa en la que entraré. Y el rey me dio, conforme a la buena mano de mi Dios sobre mí[d].
