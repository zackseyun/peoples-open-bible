translation:
  language: es
  text: Mi ojo ha mirado a mis enemigos[a]; mis oídos oyen[b] acerca de los malhechores que se levantan contra mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a quienes me vigilan»; el término hebreo puede referirse más literalmente a observadores o vigilantes hostiles.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «han oído» o «oirán»; la forma verbal hebrea admite un matiz aspectual algo más amplio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּבֵּט
  english_pob_choice: has looked
  chosen_spanish: ha visto
  alternatives_spanish:
  - ha mirado
  - ha contemplado
  - ha observado
  lexicon: HALOT
  rationale: נבט expresa mirar o fijar la vista. En español, "ha visto" comunica con naturalidad la acción completada con relevancia presente, conservando el paralelismo poético del verso sin añadir matiz de triunfo o desprecio.
- source_word: עֵינִי
  english_pob_choice: My eye
  chosen_spanish: Mi ojo
  alternatives_spanish:
  - Mis ojos
  lexicon: HALOT
  rationale: El hebreo está en singular con sufijo de primera persona. Se conserva el singular para respetar la imagen poética y la forma del original, aun cuando en español también podría sonar natural el plural.
- source_word: בְּשׁוּרָי
  english_pob_choice: on my foes
  chosen_spanish: a mis enemigos
  alternatives_spanish:
  - a quienes me vigilan
  - a mis vigilantes
  - a mis adversarios
  lexicon: HALOT
  rationale: El sustantivo relacionado con שׁוּר puede aludir a quienes observan o vigilan, pero en contexto son hostiles. "Enemigos" comunica la fuerza adversarial con claridad en español, sin perder el trasfondo de observación hostil.
- source_word: בַּקָּמִים עָלַי
  english_pob_choice: who rise against me
  chosen_spanish: que se levantan contra mí
  alternatives_spanish:
  - que se alzan contra mí
  - que se ponen en contra de mí
  - que se rebelan contra mí
  lexicon: HALOT
  rationale: La construcción con קום + עלי funciona como un modismo de oposición hostil. "Se levantan contra mí" conserva bien la imagen verbal y sugiere resistencia activa sin exagerar hacia el sentido político de "rebelarse".
- source_word: מְרֵעִים
  english_pob_choice: evildoers
  chosen_spanish: malhechores
  alternatives_spanish:
  - hacedores de mal
  - malos
  - los que hacen el mal
  lexicon: HALOT
  rationale: El participio transmite a quienes actúan con maldad o hacen daño. "Malhechores" es un término bíblico y claro en español, manteniendo el juicio moral del hebreo.
- source_word: תִּשְׁמַעְנָה אָזְנָי
  english_pob_choice: my ears hear
  chosen_spanish: mis oídos oyen
  alternatives_spanish:
  - mis oídos han oído
  - mis oídos oirán
  lexicon: HALOT
  rationale: El verbo con "oídos" personificados admite un presente vívido en español. "Oyen" preserva la imagen poética y evita forzar un matiz temporal que el hebreo puede dejar abierto.
translation_notes:
  revision_awareness: 'Se siguió el testimonio del texto hebreo (WLC) y el hilo de revisión inglés: la línea mantiene el paralelismo entre la vista y el oído, y conserva la ambigüedad lexical de בְּשׁוּרָי y la flexibilidad aspectual de תִּשְׁמַעְנָה sin resolverlas de manera excesiva.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - Se preservó el singular poético "Mi ojo" en correspondencia con el hebreo.
  - '"Malhechores" mantiene el valor moral del participio sin introducir una paráfrasis extensa.'
