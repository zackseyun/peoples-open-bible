translation:
  text: 'Jesus said[a], "What did you go out into the wilderness to see? A reed shaken
    by the wind? And a person in soft clothing, with garments put on him? Look: those
    in soft clothing are in the house of your king and your magnate[f][e][d][c][b],
    and they are not able to know the truth."'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ⲡⲥⲱϣⲉ is the “desert/wilderness.” “Wilderness” is chosen; “desert” is possible.
    reason: lexical_alternative
  - marker: b
    text: ⲛϣⲧⲏⲛ describes the softness of clothing; “soft (clothing)” could also be
      rendered “fine” or “delicate.”
    reason: lexical_alternative
  - marker: c
    text: '“In the house of your king and your magnate”: the manuscript at NHAM02.46
      lb 32 is damaged here; Dilley’s normalized text reads ⲛ ⲡⲏⲉ ⲛⲡⲉⲧⲛⲣⲣⲟ ⲙⲛ ⲡⲉⲧⲛⲙⲉⲅⲓⲥⲧⲁⲛⲟⲥ.
      The translation follows this, keeping the singulars.'
    reason: lacuna_or_restoration
  - marker: d
    text: “Magnate” renders Greek loanword ⲙⲉⲅⲓⲥⲧⲁⲛⲟⲥ (μεγιστανός), also translatable
      “grandee” or “great man.”
    reason: lexical_alternative
  - marker: e
    text: The Coptic uses singular “your king … your magnate,” which is preserved
      here; some readers may expect plurals by analogy with canonical phrasing.
    reason: cultural_note
  - marker: f
    text: “Know the truth” could be rendered “recognize the truth”; the verb ϣⲥⲟⲟⲩⲛ
      has a broad semantic range (“know, understand, perceive”).
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲉⲧⲃⲉⲟⲩ
  chosen: what
  alternatives:
  - why
  lexicon: Layton, Coptic Grammar (interrogative ⲉⲧⲃⲉⲟⲩ + clause)
  rationale: 'With ⲉⲛⲁⲩ (“to see”), the construction asks about the object of going
    out: “What did you go out … to see?” rather than purpose/causation (“why”).'
- source_word: ⲁⲛⲧⲱⲧⲛⲉⲓ ⲉⲃⲟⲗ
  chosen: did you go out
  alternatives:
  - do you go out
  - go out
  lexicon: Layton, Coptic Grammar (second plural with motion verb ⲉⲓ + ⲉⲃⲟⲗ)
  rationale: 'Rhetorical aoristic question best rendered with English past tense:
    “did you go out.”'
- source_word: ⲡⲥⲱϣⲉ
  chosen: wilderness
  alternatives:
  - desert
  - open country
  lexicon: Crum, s.v. ⲥⲱϣⲉ
  rationale: Standard sense is “desert/wilderness.” “Wilderness” keeps biblical-register
    resonance without specifying sand-desert.
- source_word: ⲉⲛⲁⲩ
  chosen: to see
  alternatives:
  - to look at
  lexicon: Crum, s.v. ⲛⲁⲩ
  rationale: Basic verb of perception; “see” preserves Thomas’s terse style.
- source_word: ⲟⲩⲕⲁϣ
  chosen: a reed
  alternatives:
  - a cane
  - a stalk
  lexicon: Crum, s.v. ⲕⲁϣ
  rationale: Contextually the proverbial “reed”; “reed” is the idiomatic choice.
- source_word: ⲕⲓⲙ
  chosen: shaken
  alternatives:
  - moved
  - swayed
  lexicon: Crum, s.v. ⲕⲓⲙ
  rationale: With wind as agent, “shaken” conveys the passive effect on the reed.
- source_word: ϩⲓⲧⲛⲡⲧⲏⲩ
  chosen: by the wind
  alternatives:
  - by wind
  lexicon: Crum, s.v. ⲧⲏⲩ
  rationale: Instrumental ϩⲓⲧⲛ + ⲡⲧⲏⲩ indicates agency of the wind.
- source_word: ⲟⲩⲣⲱⲙⲉ
  chosen: a person
  alternatives:
  - a man
  lexicon: Crum, s.v. ⲣⲱⲙⲉ
  rationale: While grammatically masculine, the sense is generic; “person” avoids
    implying male-only reference.
- source_word: ⲛϣⲧⲏⲛ
  chosen: soft (clothing)
  alternatives:
  - fine
  - delicate
  - luxurious
  lexicon: Crum, s.v. ϣⲧⲏⲛ
  rationale: Adjective for the softness of garments (cf. Matt 11:8 Coptic malakois).
    “Soft clothing” keeps the strangeness of the phrase.
- source_word: ⲛⲧⲟⲟⲩ / ϭⲛⲟⲛ ϩⲓⲛⲧⲟϥ
  chosen: with garments put on him
  alternatives:
  - clothed on him
  - wearing garments
  lexicon: Crum, s.v. ϭⲛⲟⲛ; Crum, s.v. ⲧⲟⲟⲩ
  rationale: Periphrastic expression for being dressed; rendering retains the concrete
    Coptic phrasing.
- source_word: ⲛ ⲡⲏⲉ
  chosen: in the house
  alternatives:
  - in the houses
  - in the household
  lexicon: Crum, s.v. ⲏⲉ
  rationale: Locative ⲛ + ⲡⲏⲉ; singular is preserved per the manuscript/normalization.
- source_word: ⲡⲉⲧⲛⲣⲣⲟ
  chosen: your king
  alternatives:
  - your ruler
  lexicon: Crum, s.v. ⲣⲣⲟ
  rationale: ⲣⲣⲟ is the usual word for “king.” Possessive ⲡⲉⲧⲛ- indicates second plural
    “your.”
- source_word: ⲡⲉⲧⲛⲙⲉⲅⲓⲥⲧⲁⲛⲟⲥ
  chosen: your magnate
  alternatives:
  - your grandee
  - your great man
  lexicon: Crum, s.v. ⲙⲉⲅⲓⲥⲧⲁⲛⲟⲥ (from Gk μεγιστανός)
  rationale: Greek loanword for a high-ranking noble/courtier; “magnate” is concise
    and accurate.
- source_word: ⲛⲁⲓ
  chosen: those
  alternatives:
  - these
  lexicon: Crum, s.v. ⲛⲁⲓ
  rationale: Demonstrative plural referring back to the ones in soft clothing.
- source_word: ⲉⲡϣⲧⲏⲛ
  chosen: in soft clothing
  alternatives:
  - in soft things
  lexicon: Crum, s.v. ϣⲧⲏⲛ
  rationale: Repeats the soft-clothing idea; retain the explicit prepositional phrase.
- source_word: ⲛⲧⲟⲟⲩ ⲛⲁ-
  chosen: they are not able to
  alternatives:
  - they cannot
  - they will not be able to
  lexicon: Layton, Coptic Grammar (ⲛⲁ as future/ modal of ability)
  rationale: ⲛⲁ with finite verb commonly expresses potentiality/ability.
- source_word: ϣⲥⲟⲟⲩⲛ
  chosen: know
  alternatives:
  - recognize
  - understand
  lexicon: Crum, s.v. ϣⲥⲟⲟⲩⲛ
  rationale: Default sense “know”; no need to over-interpret as “discern.”
- source_word: ⲙⲉ
  chosen: the truth
  alternatives:
  - truth
  lexicon: Crum, s.v. ⲙⲉ
  rationale: Common noun for “truth”; definite article is implied in English by context.
textual_note: 'Lacunae and restorations: (1) NHAM02.46 lb 30 preserves ⲉϥⲕⲓⲙ ⲉ[ⲃⲟⲗ],
  with ⲉⲃⲟⲗ supplied; (2) NHAM02.46 lb 31 has letter uncertainty in ⲉⲩⲣ[ⲱ]ⲙ[ⲉ ⲉ]ⲩⲛ̄ϣⲧⲏⲛ,
  normalized to ⲉⲟⲩⲣⲱⲙⲉ ⲉⲟⲩⲛϣⲧⲏⲛ; (3) NHAM02.46 lb 32 shows a damaged sequence transcribed
  as ⲛ̄[ⲑⲉ ⲛ̄ⲛⲉⲧ]ⲛ̣ⲣ̄ⲣⲱⲟⲩ ⲙⲛ̄ⲛⲉⲧⲙ̄ⲙⲉⲅⲓ…, which Dilley normalizes to ⲛ ⲡⲏⲉ ⲛⲡⲉⲧⲛⲣⲣⲟ
  ⲙⲛ ⲡⲉⲧⲛⲙⲉⲅⲓⲥⲧⲁⲛⲟⲥ (“in the house of your king and your magnate”). Orthography: the
  normalized line reads ⲛⲡϩⲉ, which is best understood as ⲛ ⲡⲏⲉ (preposition ⲛ “in”
  + ⲡⲏⲉ “house”), a common scribal agglutination. Number: both ⲣⲣⲟ and ⲙⲉⲅⲓⲥⲧⲁⲛⲟⲥ
  are singular with second plural possessive ⲡⲉⲧⲛ-, and this singularity is retained
  in the translation. No Oxyrhynchus Greek fragment overlaps Saying 78.'
