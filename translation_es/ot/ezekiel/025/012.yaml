revisions:
- from: 'Así dice el Señor Yahvé: Porque Edom actuó con venganza[a] contra la casa de Judá, e incurrió en gran culpa[b], y se vengó de ellos.'
  to: 'Así dice el Señor Dios Yahvé: Porque Edom actuó vengativamente[a] contra la casa de Judá, e incurrió en gran culpa[b], y se vengó de ellos.'
  rationale: Se mejoró la naturalidad del español en la cláusula de venganza, se corrigió la nota [b] para que aporte alternativas reales y se ajustó el título divino para reflejar de forma más natural y completa אֲדֹנָי יְהוִה dentro de la política del proyecto de mantener «Yahvé».
