translation:
  language: es
  text: 'Por mano de tus mensajeros has insultado[a] al Señor, y has dicho: «Con mis muchos carros yo mismo he subido a las alturas de los montes, a los rincones más remotos del Líbano; y cortaré sus altos cedros, sus escogidos cipreses[b], y entraré en su posada más lejana, en su bosque-jardín».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo has desafiado»; el verbo hebreo puede expresar afrenta, burla o desprecio.
    reason: alternative_reading
  - marker: b
    text: O «sus mejores abetos»; la identificación exacta de esta especie de árbol en hebreo no es del todo segura.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיַד מַלְאָכֶיךָ
  english_pob_choice: By the hand of your messengers
  chosen_spanish: Por mano de tus mensajeros
  alternatives_spanish:
  - Por medio de tus mensajeros
  - Con tus mensajeros
  lexicon: HALOT
  rationale: La construcción hebrea בְּיַד expresa medio o agencia; en español, «por mano de» conserva la imagen idiomática de instrumento/agencia sin volverse torpe. «Mensajeros» mantiene מַלְאָךְ en su sentido político-militar aquí, no como ángeles.
- source_word: חֵרַפְתָּ
  english_pob_choice: have mocked
  chosen_spanish: has insultado
  alternatives_spanish:
  - has burlado
  - has reprochado
  - has desafiado
  lexicon: HALOT
  rationale: El verbo חרף implica burla, afrenta o trato despectivo. «Has insultado» comunica bien la afrenta directa y evita sonar demasiado suave. Se preserva el tono de desafío ofensivo del texto.
- source_word: אֲדֹנָי
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: HALOT
  rationale: Aunque el hebreo aquí tiene אֲדֹנָי y no el tetragrámaton, el contexto de la mención al Dios de Israel identifica al referente divino. En esta serie se prefiere Yahvé para YHWH cuando el contexto lo sustenta; se evita el ocultamiento por «SEÑOR». La ambigüedad entre título y nombre queda reconocida en las decisiones teológicas.
- source_word: בְּרֹב רִכְבִּי
  english_pob_choice: With my many chariots
  chosen_spanish: Con mis muchos carros
  alternatives_spanish:
  - Con la multitud de mis carros
  - Con mi carrocería
  lexicon: HALOT
  rationale: רֶכֶב aquí alude a carros de guerra. «Carros» es natural en español bíblico contemporáneo y conserva la ostentación militar de la frase. «Muchos» refleja בְּרֹב como abundancia/multitud.
- source_word: אֲנִי עָלִיתִי
  english_pob_choice: I myself have gone up
  chosen_spanish: yo mismo he subido
  alternatives_spanish:
  - yo he subido
  - yo mismo he ascendido
  lexicon: HALOT
  rationale: El pronombre independiente intensifica la afirmación. «Yo mismo» reproduce esa fuerza enfática. «He subido» conserva el movimiento ascendente en un registro natural en español.
- source_word: מְרוֹם הָרִים
  english_pob_choice: the heights of the mountains
  chosen_spanish: a las alturas de los montes
  alternatives_spanish:
  - a la altura de los montes
  - a las cumbres de los montes
  lexicon: HALOT
  rationale: La expresión denota altura elevada; «alturas de los montes» sigue de cerca la estructura hebrea y su imagen concreta.
- source_word: יַרְכְּתֵי לְבָנוֹן
  english_pob_choice: the remotest parts of Lebanon
  chosen_spanish: a los rincones más remotos del Líbano
  alternatives_spanish:
  - a los confines del Líbano
  - a las partes más lejanas del Líbano
  lexicon: HALOT
  rationale: יַרְכְּתֵי apunta a los extremos/fondos/remotos confines. «Rincones más remotos» comunica la lejanía extrema con un matiz espacial natural en español.
- source_word: וְאֶכְרֹת
  english_pob_choice: and I will cut down
  chosen_spanish: y cortaré
  alternatives_spanish:
  - y derribaré
  - y talaré
  lexicon: HALOT
  rationale: כרת, aplicado a árboles, es «cortar» o «talar». «Cortaré» es claro y directo; el futuro mantiene el valor de intención/amenaza en la jactancia.
- source_word: קוֹמַת אֲרָזָיו
  english_pob_choice: its tall cedars
  chosen_spanish: sus altos cedros
  alternatives_spanish:
  - sus cedros altos
  - los cedros altos de ella
  lexicon: HALOT
  rationale: קוֹמָה es altura o estatura; «altos cedros» transmite la idea sin perder fluidez. Se mantiene el possessivo «sus» para referir a Líbano.
- source_word: מִבְחוֹר בְּרֹשָׁיו
  english_pob_choice: its choicest cypresses
  chosen_spanish: sus escogidos cipreses
  alternatives_spanish:
  - sus mejores cipreses
  - sus escogidos abetos
  lexicon: HALOT
  rationale: מִבְחוֹר significa lo escogido, lo selecto. בְּרוֹשׁ se refiere a una conífera de identificación discutida; «cipreses» es una opción moderna común, y se preserva la posibilidad de alternativa botánica en nota.
- source_word: וְאָבוֹאָה
  english_pob_choice: and I will enter
  chosen_spanish: y entraré
  alternatives_spanish:
  - y vendré
  - y me introduciré
  lexicon: HALOT
  rationale: La forma expresa intención jactanciosa. «Entraré» suena natural en español y mantiene el avance del hablante hacia el interior.
- source_word: מְלוֹן קִצֹּה
  english_pob_choice: its farthest lodging place
  chosen_spanish: en su posada más lejana
  alternatives_spanish:
  - en su lugar de descanso más lejano
  - en su alojamiento más remoto
  lexicon: HALOT
  rationale: מָלוֹן es un lugar de alojamiento o estancia. «Posada» conserva el sentido de hospedaje; «más lejana» refleja קִצּוֹ como extremidad o término. La frase mantiene el tono espacial del hebreo.
- source_word: יַעַר כַּרְמִלּוֹ
  english_pob_choice: its forest garden
  chosen_spanish: en su bosque-jardín
  alternatives_spanish:
  - en su bosque fértil
  - en su jardín de bosque
  lexicon: HALOT
  rationale: כַּרְמִל puede sugerir fertilidad, tierra de huerto o región de abundancia. «Bosque-jardín» intenta preservar la doble imagen de bosque y fertilidad sin decidir en exceso por una sola metáfora.
theological_decisions:
- issue: Distinción entre el referente divino y el tratamiento del nombre en hebreo
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  rationale: El texto hebreo cita a אֲדֹנָי en una acusación de blasfemia contra el Dios de Israel. En la política terminológica del proyecto, YHWH se vierte como Yahvé. Aunque el sustantivo usado en este versículo es אֲדֹנָי, la mención sigue refiriéndose al Dios nombrado en el contexto narrativo; por eso se mantiene Yahvé y no se enmascara con «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #1; Contested terms table for יְהוָה'
- issue: Posible tensión entre el título אֲדֹנָי y el nombre YHWH en el contexto
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - el Dueño
  rationale: La base hebrea presenta un tratamiento reverencial que en inglés POB se resolvió como «the Lord». En español, la convención del proyecto exige distinguir el nombre divino sin ocultarlo. La decisión conserva la referencia teológica principal sin borrar la tensión entre título y nombre en el texto fuente.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #1'
translation_notes:
  revision_awareness: Se siguió el contexto auditado del inglés POB y no se introdujeron cambios de sentido respecto del eje de jactancia militar, la serie de árboles y la referencia al dios de Israel. Se ajustó el tratamiento de אֲדֹנָי conforme a la política española de nombrar a Yahvé cuando el contexto lo identifica, manteniendo una nota de tensión teológica en las decisiones.
  spanish_consistency_notes:
  - Se prefirió «carros» para רכב por ser el equivalente bíblico natural en español.
  - «Bosque-jardín» intenta reflejar la imagen composita de יַעַר כַּרְמִלּוֹ sin convertirla en paráfrasis excesiva.
  - Se mantuvo un registro bíblico moderno y digno, evitando el arcaismo de «mofado» o «escarnio» como base principal.
  - La nota [a] marca una alternativa válida para חֵרַפְתָּ sin multiplicar notas innecesarias.
