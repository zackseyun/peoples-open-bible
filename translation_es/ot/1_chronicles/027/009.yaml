  text: 'El sexto, para el sexto mes: Ira hijo de Iquesh, el tecoíta; y sobre su división estaban veinticuatro mil.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: הַשִּׁשִּׁי
  english_pob_choice: The sixth
  chosen_spanish: El sexto
  alternatives_spanish:
  - El sexto comandante
  - La sexta división
  lexicon: HALOT
  rationale: El ordinal aparece de forma elíptica en esta lista administrativa/militar. En español, «El sexto» conserva esa elipsis sin añadir un título que el hebreo no expresa explícitamente.
- source_word: לַחֹדֶשׁ הַשִּׁשִּׁי
  english_pob_choice: for the sixth month
  chosen_spanish: para el sexto mes
  alternatives_spanish:
  - del sexto mes
  - en el sexto mes
  lexicon: HALOT
  rationale: La construcción ל con חֹדֶשׁ en este contexto indica asignación por mes de servicio. «Para el sexto mes» transmite bien la función programática y suena natural en español.
- source_word: עִירָא
  english_pob_choice: Ira
  chosen_spanish: Ira
  lexicon: transliteración estándar
  rationale: Nombre propio; se mantiene la transliteración habitual en español.
- source_word: בֶן עִקֵּשׁ
  english_pob_choice: son of Ikkesh
  chosen_spanish: hijo de Iques
  alternatives_spanish:
  - hijo de Ikkes
  lexicon: HALOT
  rationale: La filiación se traduce de manera directa. Se opta por «Iques» para una adaptación gráfica española legible, manteniendo la referencia al nombre propio sin exagerar la forma inglesa.
- source_word: הַתְּקוֹעִי
  english_pob_choice: the Tekoite
  chosen_spanish: el de Tecoa
  alternatives_spanish:
  - el tecoíta
  lexicon: HALOT
  rationale: El gentilicio indica procedencia de Tecoa. «El de Tecoa» es claro y natural en español; «tecoíta» sería más adjetival, pero aquí la forma con preposición evita un término menos familiar sin perder precisión.
- source_word: וְעַל מַחֲלֻקְתּוֹ
  english_pob_choice: and over his division were
  chosen_spanish: y sobre su división había
  alternatives_spanish:
  - y sobre su división estaban
  - y estaba a cargo de su división
  lexicon: HALOT
  rationale: מַחֲלֻקָה designa una división/turno de servicio militar. Se conserva la relación de supervisión expresada por עַל sin forzar una equivalencia más interpretativa que el hebreo no exige.
- source_word: עֶשְׂרִים וְאַרְבָּעָה אָלֶף
  english_pob_choice: twenty-four thousand
  chosen_spanish: veinticuatro mil
  alternatives_spanish:
  - veinte y cuatro mil
  lexicon: HALOT
  rationale: Número cardinal directo; se expresa en español contemporáneo estándar.
theological_decisions:
- issue: Término de función militar/administrativa en la enumeración
  english_pob_reading: The sixth, for the sixth month ... and over his division were twenty-four thousand.
  chosen_spanish_reading: El sexto, para el sexto mes ... y sobre su división había veinticuatro mil.
  alternative_spanish_readings:
  - El sexto, para el sexto mes ... y sobre su compañía había veinticuatro mil.
  - El sexto, para el sexto mes ... y sobre su turno había veinticuatro mil.
  rationale: 'No hay una cuestión doctrinal fuerte, pero sí una decisión de registro: «división» conserva el valor organizativo/militar de מַחֲלֻקָה en el contexto de los turnos de servicio de 1 Crónicas 27. Evita suavizar el carácter estructurado del texto.'
  doctrine_reference: 1 Crónicas 27:1-15
translation_notes:
