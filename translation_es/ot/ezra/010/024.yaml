lexical_decisions:
- source_word: וּמִן
  english_pob_choice: And from
  chosen_spanish: Y de
  alternatives_spanish:
  - De
  - Y entre
  lexicon: HALOT
  rationale: La lista hebrea añade cada subgrupo con una conjunción más preposición. «Y de» conserva ese encadenamiento aditivo de manera natural en español sin perder la relación partitiva.
- source_word: הַמְשֹׁרְרִים
  english_pob_choice: the singers
  chosen_spanish: los cantores
  alternatives_spanish:
  - los cantantes
  - los músicos
  lexicon: HALOT
  rationale: El participio indica a quienes ejercían el oficio de cantar en el ámbito del culto; «cantores» mantiene el valor funcional y suena más eclesial y bíblico en español que «cantantes», sin ampliar a «músicos».
- source_word: אֶלְיָשִׁיב
  english_pob_choice: Eliashib
  chosen_spanish: Eliasib
  alternatives_spanish:
  - Eliashib
  lexicon: convención onomástica
  rationale: Se translitera el nombre propio con la forma española más asentada y fácil de leer en castellano, sin alterar la identidad del referente.
- source_word: הַשֹּׁעֲרִים
  english_pob_choice: the gatekeepers
  chosen_spanish: los porteros
  alternatives_spanish:
  - los guardianes de las puertas
  - los guardianes
  lexicon: HALOT
  rationale: En contexto del templo, el término designa a quienes custodiaban las entradas. «Porteros» es una equivalencia tradicional y clara en español, sin necesidad de explicitar más.
- source_word: שַׁלֻּם
  english_pob_choice: Shallum
  chosen_spanish: Salum
  alternatives_spanish:
  - Shallum
  lexicon: convención onomástica
  rationale: Nombre propio transliterado a una forma española breve y reconocible; se conserva el referente nominal sin desarrollar significado etimológico.
- source_word: טֶלֶם
  english_pob_choice: Telem
  chosen_spanish: Telem
  alternatives_spanish:
  - Telem
  lexicon: convención onomástica
  rationale: Nombre propio conservado por transliteración estándar.
- source_word: אוּרִי
  english_pob_choice: Uri
  chosen_spanish: Uri
  alternatives_spanish:
  - Uri
  lexicon: convención onomástica
  rationale: Nombre propio conservado por transliteración estándar.
translation_notes:
  revision_awareness: El texto base en inglés y la revisión más reciente muestran pleno acuerdo y no requieren correcciones textuales; la decisión principal en español es idiomática y onomástica, con atención a la terminología cultual.
  spanish_consistency_notes:
  - Se mantiene el paralelismo de la lista hebrea con dos grupos introducidos por «Y de».
  - Se elige «cantores» y «porteros» como equivalentes funcionales y naturales en español bíblico.
  - Los nombres propios se uniforman con formas españolas breves y habituales, sin añadir marcadores explicativos.
