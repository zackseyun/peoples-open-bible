translation:
  language: es
  text: Y provocaron a Dios, y lo incitaron a quitarlos de la tierra[a], porque con engaño pretendían ser personas inocentes[c][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el país» en vez de «la tierra».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «almas de inocentes»; también puede entenderse «vidas inocentes» o «personas inocentes».
    reason: lexical_alternative
  - marker: c
    text: O «se fingían personas inocentes» o «hacían el papel de personas inocentes».
    reason: alternative_reading
lexical_decisions:
- source_word: παρώργυσαν
  english_pob_choice: provoked
  chosen_spanish: provocaron a Dios
  alternatives_spanish:
  - enojaron a Dios
  - irritaron a Dios
  lexicon: BDAG
  rationale: El verbo expresa provocar a ira. «Provocaron» conserva la fuerza moral y es natural en español bíblico sin diluir el objeto divino.
- source_word: παρώξυναν
  english_pob_choice: stirred him up
  chosen_spanish: incitaron su acción
  alternatives_spanish:
  - lo incitaron
  - lo instigaron
  - lo movieron a actuar
  lexicon: LSJ
  rationale: La idea es de un impulso a actuar judicialmente. «Incitaron su acción» mantiene la intensificación del verbo y su relación con el infinitivo siguiente, sin perder claridad.
- source_word: ἐξᾶραι αὐτοὺς ἀπὸ τῆς γῆς
  english_pob_choice: to remove them from the land
  chosen_spanish: para que los removiera de la tierra
  alternatives_spanish:
  - para arrancarlos de la tierra
  - para quitarlos de la tierra
  - para expulsarlos de la tierra
  lexicon: BDAG
  rationale: ἐξαίρω puede significar quitar o remover con matiz de juicio. «Removiera» preserva la amplitud del verbo y «de la tierra» deja abierta la alternativa textual/semántica entre tierra y país.
- source_word: ψυχὰς
  english_pob_choice: people
  chosen_spanish: inocentes
  alternatives_spanish:
  - personas
  - vidas
  - almas
  lexicon: BDAG
  rationale: En este giro, ψυχάς funciona como referencia a personas; en español conviene integrar el sentido dentro de «inocentes» para no endurecer la frase con un literalismo poco natural. La nota conserva las alternativas más literales.
- source_word: ἀκάκων
  english_pob_choice: innocent
  chosen_spanish: inocentes
  alternatives_spanish:
  - sin culpa
  - irreprensibles
  - sin malicia
  lexicon: BDAG
  rationale: El adjetivo indica ausencia de malicia o engaño. «Inocentes» es el equivalente más claro y directo en español contemporáneo.
- source_word: παραλογισμῷ
  english_pob_choice: by deceit
  chosen_spanish: con engaño
  alternatives_spanish:
  - por engaño
  - con astucia engañosa
  - mediante artimañas
  lexicon: LSJ
  rationale: El sustantivo apunta a una maniobra engañosa. «Con engaño» mantiene la concisión del original y su valor instrumental.
- source_word: ὑπεκρίνοντο
  english_pob_choice: pretended to be innocent people
  chosen_spanish: se fingían inocentes
  alternatives_spanish:
  - pretendían ser inocentes
  - hacían el papel de inocentes
  - se hacían pasar por inocentes
  lexicon: LSJ
  rationale: El verbo expresa simulación hipócrita. «Se fingían inocentes» es idiomático y reproduce el sentido de pretensión engañosa que el audit trail conservó en inglés.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de Swete y toma como contexto la decisión inglesa de distinguir entre el acto de provocar a Dios, la intensificación mediante παρώξυναν y la simulación hipócrita de ὑπεκρίνοντο. Se mantuvo el valor de juicio de ἐξᾶραι sin sobreinterpretarlo como destrucción explícita. La nota sobre γῆ conserva la ambigüedad entre «tierra» y «país», y la de ψυχὰς preserva la tensión entre el literal «almas» y el sentido referencial de personas/vidas.
  spanish_consistency_notes:
  - Se emplea «Dios» conforme al estándar del proyecto para θεός.
  - Se prefirió «inocentes» para ἀκάκων y se evitó introducir vocabulario eclesiástico no requerido.
  - «De la tierra» conserva la ambigüedad semántica del griego, con nota para la alternativa «el país».
  - La construcción «se fingían inocentes» mantiene el matiz de simulación hipócrita sin añadir un sujeto distinto del griego.
