translation:
  language: es
  text: Yahvé habló a Moisés y a Aarón[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; también puede transliterarse «Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El verbo hebreo introduce una acción narrativa de habla. En español, "habló" conserva el valor de comunicación verbal directa con un tono natural y digno; "dijo" es posible, pero aquí resulta menos marcado como fórmula de revelación divina.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se mantiene el nombre propio divino del Tetragrama con la forma española establecida en el proyecto: "Yahvé". Así no se sustituye por un título y se preserva la referencia al nombre pactal revelado a Israel.'
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición marca el destinatario del habla. En español, "a" es la forma natural y precisa para introducir complemento indirecto.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: וְאֶל
  english_pob_choice: and to
  chosen_spanish: y a
  alternatives_spanish:
  - y
  lexicon: HALOT
  rationale: La coordinación con la preposición repetida indica un segundo destinatario junto a Moisés. "Y a" conserva esa estructura y evita borrar la duplicación del hebreo.
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: La forma infinitiva introduce la fórmula que enlaza con el contenido del discurso en el versículo siguiente. "Diciendo" es la equivalencia idiomática más natural y conserva la dependencia formal del hebreo.
theological_decisions:
- issue: Nombre divino del Tetragrama יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el nombre propio divino, no un título. En la serie española del POB se vierte como "Yahvé", manteniendo la transparencia textual y la distinción entre nombre y título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Doble destinatario del discurso
  english_pob_reading: to Moses and to Aaron
  chosen_spanish_reading: a Moisés y a Aarón
  alternative_spanish_readings:
  - a Moisés, y a Aarón
  - a Moisés y Aarón
  rationale: La repetición de la preposición hebrea לפני el segundo nombre enfatiza que Aarón queda incluido como destinatario junto con Moisés. El español "a Moisés y a Aarón" conserva ambos nombres y la coordinación sin sobrerrepresentar la repetición.
  doctrine_reference: Sintaxis hebrea de complementos indirectos en fórmulas de revelación
- issue: Fórmula de introducción del discurso
  english_pob_reading: saying
  chosen_spanish_reading: diciendo
  alternative_spanish_readings:
  - para decir
  rationale: La fórmula no agrega contenido; enlaza con la cita que sigue. "Diciendo" mantiene la función sintáctica sin convertirla en una paráfrasis explicativa.
  doctrine_reference: Uso narrativo de לֵאמֹר en fórmulas proféticas y legales
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios sustantivos: el evento verbal se mantiene como habla directa, el Tetragrama se conserva como nombre propio divino y la coordinación con Aarón refleja la repetición hebrea de la preposición. No se añadieron notas textuales porque el hebreo base y la traducción inglesa coinciden de forma alta.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה de manera consistente con el estándar del proyecto.
  - 'Se emplean nombres bíblicos usuales en español: «Moisés» y «Aarón».'
  - La fórmula «diciendo» se reserva para לֵאמֹר como enlace al discurso siguiente, evitando expandir el sentido.
