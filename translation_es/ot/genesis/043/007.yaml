translation:
  language: es
  text: 'Ellos dijeron: “El hombre nos preguntó con insistencia acerca de nosotros mismos y de nuestra familia, diciendo: ‘¿Sigue vivo su padre? ¿Tienen ustedes otro hermano?’ Así le dijimos conforme a estas palabras[a]. ¿Acaso podíamos saber que él diría: ‘Hagan bajar a su hermano’?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “según/conforme a estas palabras”, es decir, en línea con lo que él había preguntado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁא֣וֹל שָֽׁאַל
  english_pob_choice: questioned us closely
  chosen_spanish: nos preguntó con insistencia
  alternatives_spanish:
  - nos interrogó
  - nos preguntó detenidamente
  lexicon: HALOT
  rationale: La combinación de infinitivo absoluto y verbo finito intensifica la acción. En español, “preguntó con insistencia” conserva esa fuerza sin sonar mecánico, y mantiene el matiz de indagación repetida o insistente.
- source_word: הָ֠/אִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - aquel hombre
  - ese hombre
  lexicon: HALOT
  rationale: Se refiere a José desde la perspectiva de los hermanos, todavía no reconocido. “El hombre” preserva esa perspectiva narrativa y sigue de cerca el hebreo.
- source_word: וּ/לְ/מֽוֹלַדְתֵּ֜/נוּ
  english_pob_choice: about our family
  chosen_spanish: acerca de nuestra familia
  alternatives_spanish:
  - acerca de nuestros parientes
  - sobre nuestro linaje
  lexicon: HALOT
  rationale: מוֹלֶדֶת puede referirse al grupo familiar o al origen familiar. En este contexto, donde la conversación trata del padre y del hermano, “familia” es natural y suficientemente precisa.
- source_word: הַ/ע֨וֹד אֲבִי/כֶ֥ם חַי֙
  english_pob_choice: Is your father still alive?
  chosen_spanish: ¿Sigue vivo su padre?
  alternatives_spanish:
  - ¿Todavía vive su padre?
  - ¿Está aún vivo su padre?
  lexicon: HALOT
  rationale: הַעוֹד con חַי pregunta si el padre continúa vivo. “Sigue vivo” expresa bien la continuidad temporal en español y evita un calco rígido.
- source_word: הֲ/יֵ֣שׁ לָ/כֶ֣ם אָ֔ח
  english_pob_choice: Do you have another brother?
  chosen_spanish: ¿Tienen ustedes otro hermano?
  alternatives_spanish:
  - ¿Tienen un hermano más?
  - ¿Tienen otro hermano?
  lexicon: HALOT
  rationale: Aunque el hebreo no añade una palabra equivalente a “otro”, el contexto narrativo muestra que se trata de un hermano adicional además de los presentes. “Otro hermano” hace explícito ese sentido implícito sin exceder el texto.
- source_word: וַ/נַ֨גֶּד ל֔/וֹ
  english_pob_choice: So we told him
  chosen_spanish: Así le contamos
  alternatives_spanish:
  - Y le dijimos
  - Entonces le informamos
  lexicon: HALOT
  rationale: נגד en hifil significa contar, declarar o informar. “Le contamos” encaja con el flujo narrativo y con el tono explicativo de la defensa de los hermanos.
- source_word: עַל פִּ֖י הַ/דְּבָרִ֣ים הָ/אֵ֑לֶּה
  english_pob_choice: according to these words
  chosen_spanish: conforme a estas palabras
  alternatives_spanish:
  - de acuerdo con estas palabras
  - según estas palabras
  lexicon: HALOT
  rationale: La expresión idiomática hebrea literalmente alude a “la boca de estas palabras”, es decir, a la correspondencia con lo dicho. “Conforme a estas palabras” conserva el sentido idiomático y suena natural en español.
- source_word: הֲ/יָד֣וֹעַ נֵדַ֔ע
  english_pob_choice: Could we possibly know
  chosen_spanish: ¿Cómo podríamos saber
  alternatives_spanish:
  - ¿Acaso podíamos saber?
  - ¿Podríamos haber sabido?
  lexicon: HALOT
  rationale: La construcción intensiva expresa una negación retórica de conocimiento previo. “¿Cómo podríamos saber?” reproduce esa fuerza en español de manera idiomática.
- source_word: הוֹרִ֖ידוּ
  english_pob_choice: Bring ... down
  chosen_spanish: Hagan bajar
  alternatives_spanish:
  - Traigan abajo
  - Bajen
  lexicon: HALOT
  rationale: ירד en hifil significa hacer descender. Como el movimiento es hacia Egipto, “hacer bajar” o “hagan bajar” conserva el modismo geográfico sin perder naturalidad.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés POB: mantiene “about ourselves” como “acerca de nosotros mismos” en el trasfondo semántico, pero en español se optó por una formulación natural y fluida (“acerca de nuestra familia”, “conforme a estas palabras”), preservando la pregunta retórica final sin añadir elementos ajenos al hebreo.'
  spanish_consistency_notes:
  - Se conserva “Yahvé” como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se traduce אָח como “hermano” sin añadir explícitamente “otro” en el hebreo, aunque el contexto lo justifica; se mantiene la misma decisión que en el audit trail inglés.
  - La fórmula de preguntas directas en discurso citado usa puntuación española estándar sin alterar el tono interrogativo del original.
