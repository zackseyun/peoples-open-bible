translation:
  language: es
  text: Si intentara contarlos[a], serían más que la arena. Cuando despierto[b], todavía estoy contigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si los contara, serían más que la arena». El hebreo es conciso y admite una sintaxis española ligeramente distinta.'
    reason: alternative_reading
  - marker: b
    text: 'La última línea también puede verterse: «Desperté, y todavía estoy contigo». El hebreo no especifica de manera explícita si el despertar es habitual, inmediato o figurativo.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֶסְפְּרֵם
  english_pob_choice: If I were to count them
  chosen_spanish: Si intentara contarlos
  alternatives_spanish:
  - Si los contara
  - Si yo contara con ellos
  lexicon: HALOT
  rationale: El verbo ספר en imperfecto con sufijo de 3.ª persona plural expresa aquí el intento de contar. En español, «si intentara contarlos» mantiene el valor hipotético y la acción incompleta sin forzar un futuro o un simple presente indicativo.
- source_word: מֵחוֹל
  english_pob_choice: than the sand
  chosen_spanish: más que la arena
  alternatives_spanish:
  - más numerosos que la arena
  - más que la arena del mar
  lexicon: HALOT
  rationale: חול significa «arena». El prefijo מ introduce comparación de cantidad; por eso «más que la arena» conserva la fuerza comparativa sin una glosa innecesaria.
- source_word: יִרְבּוּן
  english_pob_choice: they would be more than
  chosen_spanish: serían más que
  alternatives_spanish:
  - serían más numerosos que
  - se multiplicarían más que
  lexicon: HALOT
  rationale: De רבה, con sentido de ser numerosos. En español, «serían más que» refleja la comparación cuantitativa y encaja con la prótasis hipotética del primer miembro.
- source_word: הֱקִיצֹתִי
  english_pob_choice: When I awake
  chosen_spanish: Cuando despierto
  alternatives_spanish:
  - Cuando despierto de sueño
  - Cuando me despierto
  - Cuando desperté
  lexicon: HALOT
  rationale: El hebreo permite más de una lectura temporal. «Cuando despierto» conserva la indeterminación entre hábito, instante inmediato o formulación poética, sin fijar indebidamente un pasado cerrado.
- source_word: וְעוֹדִי
  english_pob_choice: I am still
  chosen_spanish: todavía estoy
  alternatives_spanish:
  - todavía sigo
  - aún estoy
  lexicon: HALOT
  rationale: עוד con sufijo de 1.ª persona expresa continuidad de estado. En español, «todavía estoy» reproduce de manera natural esa permanencia.
- source_word: עִמָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con usted
  - en tu presencia
  lexicon: HALOT
  rationale: עם con sufijo de 2.ª persona significa «con ti/contigo». «Contigo» suena natural en español y no añade matices que el hebreo no exige.
theological_decisions:
- issue: Referente de «them» / los elementos contados
  english_pob_reading: The pronoun refers back to God's thoughts in the previous verse.
  chosen_spanish_reading: El referente implícito se entiende por el contexto como los pensamientos de Dios del versículo anterior.
  alternative_spanish_readings:
  - Puede resumir también las obras maravillosas o propósitos de Dios mencionados en el contexto amplio.
  rationale: La versión española evita introducir explícitamente «tus pensamientos» en el texto principal, preservando la economía del hebreo y dejando que el contexto inmediato determine el referente.
  doctrine_reference: Preservar la tensión contextual sin resolverla artificialmente.
- issue: Sentido de la cláusula final
  english_pob_reading: The psalmist declares continued communion with God upon waking.
  chosen_spanish_reading: El salmista afirma que, al despertar, sigue estando con Dios.
  alternative_spanish_readings:
  - Puede aludir al despertar tras la meditación sobre los pensamientos innumerables de Dios.
  - Algunos intérpretes oyen una resonancia de despertar más allá de la muerte, aunque no es explícita aquí.
  rationale: El hebreo afirma de forma directa una continuidad de presencia con Dios al despertar. La traducción mantiene esa idea sin importar lenguaje doctrinal que el verso no exige de manera inequívoca.
  doctrine_reference: No introducir afirmaciones doctrinales que el texto no haga explícitas.
translation_notes:
  revision_awareness: La redacción sigue de cerca el audit trail inglés y no requiere revisión adicional; se mantuvo la ambigüedad temporal del último hemistiquio y la lectura comparativa del primer verso sin añadir glosas no sustentadas.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito por el contexto y no se introduce un sujeto explícito que el hebreo no da.
  - Se usa «arena» como equivalente directo de חול, sin ampliar a «arena del mar» porque el texto no lo dice.
  - El tono es poético y sobrio, apto para lectura eclesial en español neutral.
  - Se preserva la ambigüedad del verbo final con una nota, como en el audit trail inglés.
