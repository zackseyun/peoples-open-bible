  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸀Τί οὖν ἐστιν ⸂Ἀπολλῶς; τί δέ ἐστιν Παῦλος⸃; ⸀διάκονοι δι’ ὧν ἐπιστεύσατε, καὶ ἑκάστῳ ὡς ὁ κύριος ἔδωκεν.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/003/005.yaml
  text: What then is Apollos? And what is Paul? Servants through whom you believed[c][b][a], as the Lord gave to each one.
  footnotes:
  - marker: a
    text: 'Or ''Who then is Apollos? And who is Paul?'' The Greek uses ''what,'' focusing on their role rather than their identity.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''ministers.'' The Greek word denotes servants or agents of service, not necessarily the church office of deacon.'
    reason: lexical_alternative
  - marker: c
    text: 'The clause ''and each one as the Lord gave'' is elliptical in Greek; some render ''as the Lord assigned to each.'''
    reason: alternative_reading
translation:
  language: ko
  text: 그러면 아볼로는 무엇이고 바울은 무엇입니까? 주께서 각자에게 주신 대로, 여러분이 그들을 통하여 믿게 된 일꾼들입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διάκονοι
  english_pob_choice: servants
  chosen_korean: 일꾼
  alternatives_korean:
  - 섬기는 자
  - 사역자
  lexicon: BDAG
  rationale: '여기 διάκονος는 직제 명칭이 아니라 일반적 「섬기는 자」 의미이므로 「일꾼」으로 옮긴다. 빌 1:1의 「집사」와 구분.'
- source_word: ἐπιστεύσατε
  english_pob_choice: you believed
  chosen_korean: 믿게 된
  alternatives_korean:
