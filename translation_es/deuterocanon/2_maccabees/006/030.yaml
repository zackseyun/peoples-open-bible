  text: But as he was about to die under the blows[a], he groaned and said, “To the Lord, who has the holy knowledge, it is clear that, though I could have been released from death, I am enduring cruel pains in my body while being scourged[b]; but in my soul I gladly suffer these things because of fear of him.”
