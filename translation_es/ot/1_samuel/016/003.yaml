translation:
  language: es
  text: Invita a Isaí al sacrificio[a], y yo te haré saber lo que has de hacer[b]; y ungirás para mí al que yo te diga[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llama a Isaí para el sacrificio».
    reason: lexical_alternative
  - marker: b
    text: O «te mostraré lo que has de hacer».
    reason: lexical_alternative
  - marker: c
    text: O «al que yo te nombre».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקָרָאתָ
  english_pob_choice: Invite
  chosen_spanish: Invita
  alternatives_spanish:
  - Llama
  - Convoca
  - Cita
  lexicon: HALOT
  rationale: קרא en este contexto significa llamar o invitar a alguien para que asista a un evento sacrifical. «Invita» comunica bien la fuerza directiva y suena natural en español, sin perder el sentido de convocatoria al rito.
- source_word: לְיִשַׁי
  english_pob_choice: Jesse
  chosen_spanish: Isaí
  alternatives_spanish:
  - Jesse
  lexicon: Uso bíblico castellano estándar
  rationale: El nombre propio en español bíblico es «Isaí», forma tradicional y clara para lectores hispanos.
- source_word: בַּזָּבַח
  english_pob_choice: to the sacrifice
  chosen_spanish: al sacrificio
  alternatives_spanish:
  - para el sacrificio
  - al acto sacrificial
  - al banquete sacrificial
  lexicon: HALOT
  rationale: זבח refiere al sacrificio o a la ocasión sacrificial. Con קרא, la construcción indica que Isaí debe ser llamado para asistir al sacrificio; «al sacrificio» preserva la referencia sin añadir más de lo que el hebreo dice.
- source_word: אוֹדִיעֲךָ
  english_pob_choice: will make known to you
  chosen_spanish: te haré saber
  alternatives_spanish:
  - te daré a conocer
  - te informaré
  - te mostraré
  lexicon: HALOT
  rationale: El hiphil de ידע expresa causar a saber, informar, dar a conocer. «Te haré saber» conserva esa causatividad de manera natural en español.
- source_word: אֵת אֲשֶׁר תַּעֲשֶׂה
  english_pob_choice: what you shall do
  chosen_spanish: lo que has de hacer
  alternatives_spanish:
  - lo que harás
  - lo que debes hacer
  - lo que debes hacer tú
  lexicon: HALOT
  rationale: La frase especifica la acción indicada a Samuel. «Lo que has de hacer» mantiene el valor instructivo/deóntico sin endurecerlo con una obligación más fuerte de la que el hebreo exige.
- source_word: וּמָשַׁחְתָּ
  english_pob_choice: and you shall anoint
  chosen_spanish: ungirás
  alternatives_spanish:
  - y ungirás
  - y consagrarás con aceite
  lexicon: HALOT
  rationale: מָשַׁח es el verbo técnico de ungir, importante en el contexto narrativo y teológico. «Ungirás» es la forma más fiel y reconocible en español bíblico.
- source_word: לִי
  english_pob_choice: for me
  chosen_spanish: para mí
  alternatives_spanish:
  - por mí
  - en mi nombre
  lexicon: HALOT
  rationale: El dativo indica que la unción se realiza en beneficio o representación de Yahvé. «Para mí» mantiene esa orientación sin añadir una glosa interpretativa.
- source_word: אֵת אֲשֶׁר אֹמַר אֵלֶיךָ
  english_pob_choice: the one whom I tell you
  chosen_spanish: al que yo te diga
  alternatives_spanish:
  - al que yo te nombre
  - a quien yo te diga
  - al que yo te indique
  lexicon: HALOT
  rationale: El hebreo deja implícito el objeto hasta la cláusula relativa que identifica a la persona. «Al que yo te diga» conserva la referencia personal y la dependencia de la indicación divina, con un español natural.
theological_decisions:
- issue: Referencia implícita a la persona ungida
  english_pob_reading: Retain 'anoint' without explicitly specifying kingship in the verse itself.
  chosen_spanish_reading: Conservar «ungirás» sin añadir «rey» en el texto del versículo.
  alternative_spanish_readings:
  - ungirás al rey
  - lo ungirás como rey
  rationale: El contexto narrativo sugiere una unción real, pero este versículo no lo declara explícitamente. Mantener la ambigüedad respeta la restricción del texto y deja que el contexto inmediato aporte la identificación.
  doctrine_reference: 'Principio de fidelidad textual: no importar al versículo una identificación que el hebreo no expresa de forma explícita.'
translation_notes:
  revision_awareness: El pasaje presenta alto acuerdo en el audit trail inglés y no requiere corrección sustantiva. Se mantiene la estructura de tres miembros del hebreo y la relación causal/deóntica entre la orden, la instrucción divina y la unción.
  spanish_consistency_notes:
  - Se conserva «Isaí» como forma bíblica estándar en español.
  - Se evita «SEÑOR» para יהוה porque aquí el nombre divino no aparece en el hebreo de este versículo.
  - Se mantiene «ungir» por su valor técnico y teológico, sin explicitar «rey» en ausencia de una afirmación directa en el versículo.
