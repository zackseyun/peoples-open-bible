translation:
  language: es
  text: 'El rey respondió y dijo a los caldeos: «Mi palabra[a] es firme: si no me dan a conocer el sueño y su interpretación, serán despedazados[b], y sus casas serán convertidas en un montón de desechos.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La palabra ha salido de mí».'
    reason: alternative_reading
  - marker: b
    text: Tradicionalmente, «serán hechos pedazos». El término arameo es más literalmente corporal, algo como «miembros», e implica desmembramiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַלְכָּא
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Título real estándar y natural en español; conserva el registro narrativo sin añadir interpretación.
- source_word: לכשדיא
  english_pob_choice: to the Chaldeans
  chosen_spanish: a los caldeos
  alternatives_spanish:
  - a los astrólogos
  - a los sabios caldeos
  lexicon: HALOT
  rationale: Se preserva la designación del texto original, como en la traducción inglesa de POB, en vez de reemplazarla por una función interpretativa.
- source_word: מִלְּתָא
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el asunto
  - el decreto
  - la orden
  lexicon: HALOT
  rationale: En este contexto introduce la declaración real fija; 'palabra' mantiene la correspondencia formal y el valor de pronunciamiento.
- source_word: מִנִּי אַזְדָּא
  english_pob_choice: from me is firm
  chosen_spanish: de mí es firme
  alternatives_spanish:
  - de mí ha salido
  - de mí es definitiva
  - permanece firme de mí
  lexicon: HALOT
  rationale: La frase aramea es discutida; la POB inglesa opta por la idea de firmeza/estabilidad. En español, 'de mí es firme' conserva esa lectura y la estructura breve del original sin forzar una paráfrasis.
- source_word: תְהוֹדְעוּנַּנִי
  english_pob_choice: make known to me
  chosen_spanish: me den a conocer
  alternatives_spanish:
  - me hagan saber
  - me informen
  - me digan
  lexicon: HALOT
  rationale: El causativo de ידע se expresa bien con una forma formal de 'hacer conocer'. 'Me den a conocer' mantiene el matiz causativo y suena natural en español.
- source_word: חֶלְמָא
  english_pob_choice: the dream
  chosen_spanish: el sueño
  alternatives_spanish:
  - el sueño profético
  lexicon: HALOT
  rationale: Equivalente directo y claro en el relato de Daniel.
- source_word: פִשְׁרֵהּ
  english_pob_choice: its interpretation
  chosen_spanish: su interpretación
  alternatives_spanish:
  - su sentido
  - su explicación
  lexicon: HALOT
  rationale: En Daniel este término es técnico para la interpretación de sueños; 'interpretación' preserva ese uso especializado.
- source_word: הַדָּמִין
  english_pob_choice: torn limb from limb
  chosen_spanish: hechos pedazos[b]
  alternatives_spanish:
  - despedazados
  - hechos trizas
  - arrancados miembro por miembro
  lexicon: HALOT
  rationale: La POB inglesa retiene la imagen corporal fuerte, pero el giro idiomático inglés no se reproduce bien de forma natural en español. 'Hechos pedazos' comunica con claridad la violencia extrema sin perder el carácter de desmembramiento; la nota preserva la alternativa más literal.
- source_word: תִּתְעַבְד֔וּן
  english_pob_choice: you will be made
  chosen_spanish: serán hechos
  alternatives_spanish:
  - serán convertidos
  - serán puestos
  lexicon: HALOT
  rationale: 'Se mantiene la pasiva de acción recibida: la amenaza recaerá sobre ellos como objeto de la acción del rey.'
- source_word: נְוָלִ֥י
  english_pob_choice: a refuse heap
  chosen_spanish: un montón de ruinas
  alternatives_spanish:
  - un basurero
  - un montón de estiércol
  - un montón de desechos
  lexicon: HALOT
  rationale: El término denota algo vergonzoso y devastado; en español, 'montón de ruinas' comunica desolación y rechazo con dignidad literaria. La alternativa más cruda queda implícita en la nota textual/lexical del registro.
- source_word: יִתְּשָׂמֽוּן
  english_pob_choice: will be made
  chosen_spanish: serán convertidas
  alternatives_spanish:
  - serán hechas
  - serán puestas
  lexicon: HALOT
  rationale: El verbo indica ser puestos/hechos en un estado. Con 'serán convertidas' se expresa idiomáticamente el resultado final en español.
theological_decisions:
- issue: Interpretación de מִנִּי אַזְדָּא
  english_pob_reading: The king's word is firm or fixed.
  chosen_spanish_reading: La palabra del rey es firme.
  alternative_spanish_readings:
  - La palabra ha salido de mí.
  - La orden ya ha sido emitida por mí.
  rationale: La tradición de POB preserva la lectura de firmeza, que encaja con la amenaza inmediata y la exigencia irrevocable del rey. Se evita diluir la fuerza del pronunciamiento en una paráfrasis menos precisa.
  doctrine_reference: Translation philosophy §1, §3
- issue: Intensidad del castigo corporal en הַדָּמִין
  english_pob_reading: A literal bodily image is retained in the main text.
  chosen_spanish_reading: Serán hechos pedazos.
  alternative_spanish_readings:
  - Serán despedazados.
  - Serán hechos trizas.
  rationale: El hebreo/arameo conserva una imagen física severa; en español se prioriza una forma natural que siga transmitiendo violencia y desmembramiento sin sonar artificial.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La redacción inglesa revisada pasó de una fórmula demasiado literal para הַדָּמִין a «torn limb from limb». Esta versión española busca el mismo equilibrio: conserva la severidad corporal del original, pero usa una expresión idiomática natural en español. También mantiene la lectura de ‘firm’ para מִנִּי אַזְדָּא, siguiendo la decisión auditada de POB.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; aquí no aplica.
  - Se conserva «caldeos» como designación del grupo, conforme al audit trail.
  - Se evita «SEÑOR» y otras sustituciones teológicas no presentes en el verso.
  - La puntuación y las comillas siguen el uso normal del español para cita directa.
