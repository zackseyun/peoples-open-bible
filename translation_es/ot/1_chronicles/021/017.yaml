    rationale: הֲלֹא אֲנִי אָמַרְתִּי expresa de forma directa «¿No dije yo...?»; la perífrasis con «fui yo quien dijo» es entendible, pero se aparta del giro más inmediato del original y suena algo más rebuscada en español.
