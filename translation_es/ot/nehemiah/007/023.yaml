lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - la casa de
  lexicon: HALOT
  rationale: En listas genealógicas o censales, el constructo plural de בֵּן suele señalar pertenencia a un linaje o clan. En español, «los hijos de» conserva la estructura breve y registral del hebreo y corresponde bien al valor adoptado por el POB en inglés.
- source_word: בֵצָי
  english_pob_choice: Bezai
  chosen_spanish: Bezai
  alternatives_spanish:
  - Bezay
  lexicon: transliteración convencional
  rationale: Nombre propio transliterado sin traducir. «Bezai» sigue la forma inglesa del POB y es reconocible en español bíblico sin introducir una forma no atestiguada en el paquete fuente.
- source_word: שְׁלֹשׁ מֵאֹות עֶשְׂרִים וְאַרְבָּעָה
  english_pob_choice: three hundred twenty-four
  chosen_spanish: trescientos veinticuatro
  alternatives_spanish:
  - trescientos y veinticuatro
  lexicon: HALOT
  rationale: La secuencia numérica hebrea se expresa de manera natural y exacta en español como «trescientos veinticuatro». Se omite la conjunción equivalente a «and/y» porque en español moderno no es necesaria y el POB inglés también la omitió.
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés muestran alta concordancia; no hubo revisiones aplicadas ni variantes textuales relevantes en este versículo. Por eso no se añaden notas de variante ni de resolución de tensiones léxicas.
  spanish_consistency_notes:
  - Se mantiene el registro de lista/censo con sintaxis breve.
  - 'Se conserva el orden hebreo natural en español: sujeto colectivo + cifra.'
  - No se introduce mayúscula innecesaria en el nombre propio dentro de una enumeración.
