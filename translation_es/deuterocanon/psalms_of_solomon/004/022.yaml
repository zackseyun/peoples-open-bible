translation:
  language: es
  text: Que los cuervos[a] arranquen los ojos de los hipócritas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Cuervos» sigue el griego κόρακες y conserva la imagen del ave carroñera; no se suaviza a un término más general.
    reason: lexical_alternative
  - marker: b
    text: O «pretensores» o «los que disimulan»; «hipócritas» resume el sentido moral habitual del participio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀφθαλμοὺς
  english_pob_choice: eyes
  chosen_spanish: ojos
  alternatives_spanish:
  - globos oculares
  - pupilas
  lexicon: BDAG
  rationale: ὀφθαλμοὺς designa de forma normal los 'ojos'; en español 'ojos' conserva la imagen sin sobretraducir.
- source_word: ἐκκόψαισαν
  english_pob_choice: may ... pluck out
  chosen_spanish: saquen
  alternatives_spanish:
  - arranquen
  - saquen fuera
  - sacaran
  lexicon: BDAG
  rationale: El optativo aoristo expresa aquí un deseo o imprecación; en español, 'Que ... saquen' comunica naturalmente ese valor desiderativo. 'Arranquen' sería más gráfico, pero 'saquen' mantiene la violencia del acto con menos sobrecarga interpretativa.
- source_word: κόρακες
  english_pob_choice: ravens
  chosen_spanish: cuervos
  alternatives_spanish:
  - cornejas
  - ravenes
  lexicon: LSJ
  rationale: κόραξ nombra normalmente al cuervo; 'cuervos' es el equivalente más directo y natural en español. Aunque el inglés POB prefirió 'ravens' frente a 'crows', en español la distinción común no obliga a un término más técnico.
- source_word: ὑποκρινομένων
  english_pob_choice: hypocrites
  chosen_spanish: los hipócritas
  alternatives_spanish:
  - los pretensores
  - los que disimulan
  - los que actúan hipócritamente
  lexicon: LSJ
  rationale: El participio describe a quienes fingen o disimulan. 'Hipócritas' es el equivalente más conciso y comprensible en español, y preserva bien la carga moral del término; 'pretensores' o perífrasis serían menos naturales.
theological_decisions:
- issue: Naturaleza imprecatoria de la frase
  english_pob_reading: May ravens pluck out the eyes of hypocrites.
  chosen_spanish_reading: Que los cuervos saquen los ojos de los hipócritas.
  alternative_spanish_readings:
  - Que los cuervos arranquen los ojos de los hipócritas.
  - Ojalá los cuervos saquen los ojos de los hipócritas.
  rationale: La oración funciona como maldición o deseo de juicio; el subjuntivo exhortativo ('Que ...') reproduce esa fuerza sin introducir un tono devocional añadido.
  doctrine_reference: Salmos imprecatorios / lenguaje de juicio poético
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no registran revisiones aplicadas; la versión española sigue esa lectura estable sin introducir variantes textuales.
  spanish_consistency_notes:
  - Se preserva el tono imprecatorio con subjuntivo exhortativo, acorde con la fuerza optativa del aoristo griego.
  - Se evita sustituir el término moral 'hipócritas' por una paráfrasis más larga, porque el contexto exige concisión y fuerza retórica.
  - No se usa 'SEÑOR' ni terminología eclesiástica ajena; el verso no contiene el nombre divino ni vocabulario cristológico.
