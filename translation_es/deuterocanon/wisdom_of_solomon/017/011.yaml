translation:
  language: es
  text: Porque la maldad es especialmente cobarde[a], al ser condenada por sí misma; y, oprimida por la conciencia, siempre se imagina lo peor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque la maldad, al ser condenada, es peculiarmente temerosa y, oprimida por la conciencia, siempre espera cosas terribles».'
    reason: lexical_alternative
lexical_decisions:
- source_word: δειλὸν
  english_pob_choice: cowardly
  chosen_spanish: cobarde
  alternatives_spanish:
  - temerosa
  - pusilánime
  lexicon: LSJ
  rationale: El adjetivo expresa cobardía o falta de ánimo moral. «Cobarde» conserva mejor la valoración ética aplicada a la maldad que opciones más suaves como «temerosa».
- source_word: ἰδίως
  english_pob_choice: especially
  chosen_spanish: especialmente
  alternatives_spanish:
  - peculiarmente
  - de manera especial
  - por su propia naturaleza
  lexicon: LSJ
  rationale: La partícula intensifica la afirmación. «Especialmente» es natural en español y transmite esa fuerza sin sobrecargar la frase.
- source_word: πονηρία
  english_pob_choice: wickedness
  chosen_spanish: maldad
  alternatives_spanish:
  - mal
  - perversidad
  - vicio
  lexicon: LSJ
  rationale: Aquí se trata de una cualidad moral abstracta. «Maldad» comunica bien ese valor general; «perversidad» puede sonar más fuerte o más técnico, y «vicio» es demasiado estrecho.
- source_word: καταδικαζομένη
  english_pob_choice: self-condemned
  chosen_spanish: condenada por sí misma
  alternatives_spanish:
  - autocondenada
  - siendo condenada
  - convicta
  lexicon: LSJ
  rationale: El participio tiene un valor pasivo con matiz reflexivo en el contexto. «Condenada por sí misma» mantiene la relación con la maldad y evita borrar la estructura participial del griego.
- source_word: προσειληφεν
  english_pob_choice: assumes
  chosen_spanish: se imagina
  alternatives_spanish:
  - espera
  - anticipa
  - toma para sí
  lexicon: LSJ
  rationale: En este contexto mental y afectivo, el verbo apunta a adoptar o esperar mentalmente consecuencias. «Se imagina» funciona bien con «lo peor» y conserva el matiz de expectativa interna.
- source_word: τὰ χαλεπὰ
  english_pob_choice: the worst
  chosen_spanish: lo peor
  alternatives_spanish:
  - cosas terribles
  - cosas duras
  - lo más grave
  lexicon: LSJ
  rationale: La expresión apunta a males o desenlaces graves anticipados por una conciencia culpable. «Lo peor» es idiomático en español y recoge bien la fuerza de la frase.
- source_word: συνεχομένη τῇ συνειδήσει
  english_pob_choice: being pressed by conscience
  chosen_spanish: apretada por la conciencia
  alternatives_spanish:
  - oprimida por la conciencia
  - presionada por la conciencia
  - constreñida por la conciencia
  lexicon: LSJ
  rationale: συνέχω puede significar apretar, oprimir o constreñir. «Apretada por la conciencia» mantiene la imagen de presión interior y suena natural en español, sin diluir la fuerza psicológica del texto.
- source_word: συνειδήσει
  english_pob_choice: conscience
  chosen_spanish: la conciencia
  alternatives_spanish:
  - la conciencia moral
  - el conocimiento interior
  lexicon: LSJ
  rationale: El contexto es claramente moral y no meramente cognitivo. «La conciencia» es la equivalencia directa y más clara en español.
theological_decisions:
- issue: Psicología moral de la maldad y la conciencia
  english_pob_reading: The verse describes wickedness as inwardly cowardly because conscience condemns it and drives it to expect disaster.
  chosen_spanish_reading: 'El verso presenta la maldad como cobarde por dentro: se condena a sí misma y, oprimida por la conciencia, espera o imagina males peores.'
  alternative_spanish_readings:
  - 'El verso podría entenderse de modo más impersonal: la maldad simplemente da testimonio de cosas temibles cuando es condenada.'
  - La frase podría leerse como una escena judicial externa sin tanto énfasis interior.
  rationale: La proximidad entre «condenada por sí misma» y «apretada por la conciencia» favorece una lectura de presión interior y autoincriminación. La traducción conserva ese eje psicológico sin añadir doctrinas ajenas al pasaje.
  doctrine_reference: Mantener la tensión moral del texto; no resolverla hacia una interpretación más abstracta o puramente forense.
translation_notes:
  revision_awareness: La redacción española sigue de cerca la estructura revisada del texto griego y la decisión editorial inglesa de reflejar καταδικαζομένη con una forma participial pasiva que preserve el matiz de autocondena. Se evita una paráfrasis más libre para no perder la tensión entre condena interior y expectativa de males futuros.
  spanish_consistency_notes:
  - Se usa «maldad» para πονηρία en sentido abstracto y moral, coherente con el valor del pasaje.
  - Se conserva «conciencia» para συνείδησις, evitando «conocimiento» o «conciencia de sí» porque el contexto es ético.
  - «Lo peor» reproduce la fuerza idiomática de τὰ χαλεπὰ sin volver la frase más larga o interpretativa.
  - El orden de las dos cláusulas sigue el griego y la solución inglesa auditada para mantener el paralelismo causal y psicológico.
