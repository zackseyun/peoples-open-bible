base_translation:
  language: en
  yaml_path: translation/ot/zechariah/014/004.yaml
  text: On that day his feet will stand on the Mount of Olives[a], which is before Jerusalem on the east; and the Mount of Olives will be split in two from east to west into a very great valley[b], with half of the mountain moving northward and half of it southward.
  footnotes:
  - marker: a
    text: Or 'which is opposite Jerusalem to the east.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'will be split' or 'will be cleft'; the Hebrew describes the mountain dividing so that its halves move apart.
    reason: lexical_alternative
