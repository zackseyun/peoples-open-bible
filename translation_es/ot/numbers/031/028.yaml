base_translation:
  language: en
  yaml_path: translation/ot/numbers/031/028.yaml
  text: 'And you shall levy a tribute for Yahweh from the men of war who went out to battle: one out of five hundred[b][a], from the people and from the cattle and from the donkeys and from the flock.'
  footnotes:
  - marker: a
    text: Or 'one soul out of five hundred.' The Hebrew uses nephesh as a counting term for an individual living being, whether human or animal.
    reason: lexical_alternative
  - marker: b
    text: Hebrew adam here refers to the human portion of the spoil, in contrast to the animals listed afterward.
    reason: cultural_note
