translation:
  language: es
  text: Él también quemó incienso en el Valle de Ben-hinom[a], y quemó a sus hijos varones en el fuego, conforme a las abominaciones de las naciones que Yahvé había expulsado de delante de los hijos de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «hizo pasar a sus hijos varones por el fuego». El hebreo aquí dice más directamente: «quemó a sus hijos varones en el fuego».'
    reason: alternative_reading
lexical_decisions:
- source_word: הִקְטִיר
  english_pob_choice: burned incense
  chosen_spanish: quemó incienso
  alternatives_spanish:
  - hizo humo de sacrificio
  - ofreció incienso quemándolo
  lexicon: HALOT
  rationale: El verbo en hifil aquí se refiere a hacer humo cultual; en español, «quemó incienso» comunica de forma natural y fiel esa acción ritual sin cargar el texto con una paráfrasis más larga.
- source_word: בְּגֵיא בֶן־הִנֹּם
  english_pob_choice: in the Valley of Ben-hinnom
  chosen_spanish: en el Valle de Ben-hinom
  alternatives_spanish:
  - en el valle del hijo de Hinom
  - en Gehenna
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado para mantener el referente histórico-geográfico. «Gehenna» introduciría asociaciones posteriores que el contexto inmediato no exige.
- source_word: וַיַּבְעֵר אֶת־בָּנָיו בָּאֵשׁ
  english_pob_choice: he burned his sons in the fire
  chosen_spanish: quemó a sus hijos en el fuego
  alternatives_spanish:
  - hizo pasar a sus hijos por el fuego
  - quemó a sus hijos con fuego
  lexicon: HALOT
  rationale: בער en esta construcción expresa una acción más fuerte que la fórmula habitual «hacer pasar por el fuego». Por eso se mantiene el sentido directo de quemar, conservando la severidad del hebreo.
- source_word: כְּתוֹעֲבוֹת
  english_pob_choice: according to the abominations of
  chosen_spanish: conforme a las abominaciones de
  alternatives_spanish:
  - como las abominaciones de
  - siguiendo las prácticas detestables de
  lexicon: HALOT
  rationale: «Conforme a» reproduce bien el valor comparativo/normativo de כ aquí, y «abominaciones» conserva la fuerza moral del sustantivo hebreo.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: En este contexto histórico, «las naciones» es la equivalencia más natural y menos cargada teológicamente.
- source_word: הֹרִישׁ
  english_pob_choice: had driven out
  chosen_spanish: había expulsado
  alternatives_spanish:
  - había desposeído
  - había echado fuera
  lexicon: HALOT
  rationale: El hifil de ירש apunta a sacar a otros de la posesión del territorio; en español, «había expulsado» comunica bien esa idea de remoción, con fluidez natural.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé», en lugar de sustituirlo por un título.'
- source_word: מִפְּנֵי בְּנֵי יִשְׂרָאֵל
  english_pob_choice: before the sons of Israel
  chosen_spanish: de delante de los hijos de Israel
  alternatives_spanish:
  - ante los hijos de Israel
  - de la presencia de los hijos de Israel
  lexicon: HALOT
  rationale: La locución hebrea expresa remoción «de delante de»; esta solución es transparente en español y conserva la imagen espacial del original.
theological_decisions:
- issue: Cómo reflejar la intensidad del sacrificio infantil sin suavizarla
  english_pob_reading: The main text states 'he burned his sons in the fire.' The English footnote preserves the weaker alternative 'he made his sons pass through the fire.'
  chosen_spanish_reading: El texto principal dice que «quemó a sus hijos en el fuego», y la nota preserva la alternativa «hizo pasar a sus hijos por el fuego».
  alternative_spanish_readings:
  - hizo pasar a sus hijos por el fuego
  - los ofreció pasando por el fuego
  rationale: El hebreo usa aquí un verbo más directo que la fórmula estándar de ‘hacer pasar por el fuego’. Para no rebajar la gravedad del acto, se mantiene la lectura fuerte en el texto principal y se registra la alternativa tradicional en nota.
  doctrine_reference: Translation philosophy §§1, 3, 4
- issue: Cómo tratar el nombre divino en una cita histórica del período monárquico
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Nombre propio. La traducción sigue la política del proyecto de no enmascararlo con un sustituto titular.
  doctrine_reference: Project-level Spanish terminology defaults
translation_notes:
  revision_awareness: El pasaje muestra pleno acuerdo entre el control de revisiones y la auditoría en inglés; no se detectaron cambios recientes que obliguen a ajustar la decisión española. Se mantuvo la distinción entre la fórmula más débil («hacer pasar por el fuego») y la expresión hebrea más fuerte («quemó»), como exige la evidencia textual.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se conservó «hijos» para reflejar בָּנָיו con precisión léxica y de concordancia gramatical.
  - «Valle de Ben-hinom» preserva el topónimo histórico sin introducir la carga posterior de «Gehenna».
  - La secuencia verbal en español procura reproducir el orden y la contundencia del hebreo sin sonar artificiosa.
