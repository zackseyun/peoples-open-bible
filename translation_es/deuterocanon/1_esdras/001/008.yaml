translation:
  language: es
  text: Estas cosas fueron dadas de los bienes reales, conforme a la promesa[a], al pueblo y a los sacerdotes y a los levitas. Y Helcías, Zacarías y Esyelos[b], los encargados del santuario, dieron a los sacerdotes para la Pascua dos mil seiscientas ovejas[c], y trescientos becerros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «según la promesa». La frase griega dice literalmente «conforme a la promesa».
    reason: lexical_alternative
  - marker: b
    text: El paralelo hebreo de 2 Crónicas 35:8 tiene nombres afines en forma hebrea, comúnmente «Hilkías ... Jehiel». Aquí el griego de 1 Esdras lee «Helcías ... Esyelos».
    reason: alternative_reading
  - marker: c
    text: El paralelo hebreo especifica «ovejas, corderos y cabritos» procedentes de la propiedad del rey; el griego aquí usa el término más amplio «ovejas».
    reason: lexical_alternative
lexical_decisions:
- source_word: ταῦτα
  english_pob_choice: These things
  chosen_spanish: Estas cosas
  alternatives_spanish:
  - Estas
  - Estas ofrendas
  lexicon: LSJ
  rationale: El demostrativo retoma lo mencionado antes sin añadir contenido que el griego no explicita. «Estas cosas» conserva el carácter resumptivo con español natural.
- source_word: ἐκ τῶν βασιλικῶν
  english_pob_choice: from the royal possessions
  chosen_spanish: de los bienes reales
  alternatives_spanish:
  - de las posesiones reales
  - de la propiedad del rey
  - de los almacenes reales
  lexicon: LSJ
  rationale: La expresión alude a lo perteneciente a la realeza o al rey. «Bienes reales» suena natural en español y mantiene la referencia patrimonial sin forzar una equivalencia jurídica demasiado estrecha.
- source_word: ἐδόθη
  english_pob_choice: were given
  chosen_spanish: fueron dadas
  alternatives_spanish:
  - fue dado
  lexicon: LSJ
  rationale: Con sujeto neutro plural («estas cosas»), el pasivo se vierte naturalmente en plural femenino en español por concordancia con «cosas».
- source_word: κατʼ ἐπαγγελίαν
  english_pob_choice: according to the promise
  chosen_spanish: conforme a la promesa
  alternatives_spanish:
  - según la promesa
  - como se había prometido
  lexicon: LSJ
  rationale: «Conforme a la promesa» conserva el sustantivo y la fuerza de cumplimiento prometido. Evita decidir en español quién hizo la promesa, como también deja abierto el inglés POB.
- source_word: τῷ λαῷ
  english_pob_choice: to the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - para el pueblo
  lexicon: LSJ
  rationale: El dativo de destinatario/beneficiario se expresa de modo directo como «al pueblo».
- source_word: τοῖς ἱερεῦσιν καὶ Λευίταις
  english_pob_choice: to the priests and Levites
  chosen_spanish: a los sacerdotes y a los levitas
  alternatives_spanish:
  - para los sacerdotes y levitas
  lexicon: LSJ
  rationale: Se conserva la pareja cultual tradicional. «Sacerdotes» y «levitas» es claro en español bíblico y fiel al griego.
- source_word: οἱ ἐπιστάται τοῦ ἱεροῦ
  english_pob_choice: the overseers of the sanctuary
  chosen_spanish: los encargados del santuario
  alternatives_spanish:
  - los supervisores del templo
  - los oficiales del santuario
  lexicon: LSJ
  rationale: «Encargados» comunica bien la idea de personas puestas al frente o responsables de una función. «Santuario» mantiene el matiz sagrado del griego ἱερόν sin reducirlo solo al edificio.
- source_word: εἰς πάσχα
  english_pob_choice: for the Passover
  chosen_spanish: para la Pascua
  alternatives_spanish:
  - para el Passover
  - para la fiesta de Pascua
  lexicon: LSJ
  rationale: En español bíblico, «Pascua» es la forma natural y fiel para el festival de πάσχα.
- source_word: πρόβατα
  english_pob_choice: sheep
  chosen_spanish: ovejas
  alternatives_spanish:
  - ganado menor
  - ovejas y cabras
  lexicon: LSJ
  rationale: El griego usa πρόβατα, término amplio para ovejas/animales de rebaño. «Ovejas» sigue de cerca el sentido básico y respeta la elección lexical del texto griego; se evita importar la especificación del paralelo hebreo.
- source_word: δισχίλια ἐξακόσια
  english_pob_choice: two thousand six hundred
  chosen_spanish: dos mil seiscientas
  alternatives_spanish:
  - '2.600'
  lexicon: LSJ
  rationale: Traducción directa del numeral, concordando con «ovejas».
- source_word: μόσχους
  english_pob_choice: calves
  chosen_spanish: becerros
  alternatives_spanish:
  - terneros
  - novillos
  lexicon: LSJ
  rationale: «Becerros» es una equivalencia natural en español bíblico para μόσχους, sin volverlo más técnico de lo necesario.
- source_word: τριακοσίους
  english_pob_choice: three hundred
  chosen_spanish: trescientos
  alternatives_spanish:
  - '300'
  lexicon: LSJ
  rationale: Traducción directa del numeral.
- source_word: Χελκείας καὶ Ζαχαρίας καὶ Ἡσυηλος
  english_pob_choice: Helkias, Zechariah, and Esyelos
  chosen_spanish: Helcías, Zacarías y Esyelos
  alternatives_spanish:
  - Hilkías, Zacarías y Jehiel
  lexicon: LSJ
  rationale: Se sigue la forma griega transmitida en 1 Esdras. «Helcías» refleja Χελκείας; «Esyelos» conserva la transliteración del manuscrito griego, mientras el paralelo hebreo ofrece otras formas relacionadas, pero no gobierna la línea principal.
translation_notes:
  revision_awareness: 'La redacción sigue el texto griego de Swete 1909 como ancla principal, en acuerdo general con la auditoría inglesa. Se han mantenido las opciones léxicas clave del POB en español: sentido patrimonial de ἐκ τῶν βασιλικῶν, dativos de destinatario, y el léxico amplio de πρόβατα frente al paralelo hebreo más específico. No se detectan revisiones recientes que alteren el contenido del versículo.'
  spanish_consistency_notes:
  - Se usa «Pascua» para πάσχα, coherente con el registro bíblico en español.
  - Se usa «santuario» para ἱερόν, preservando el matiz sagrado sin imponer «templo» como única lectura.
  - Los nombres propios se transliteran desde el griego principal del 1 Esdras, aunque el paralelo hebreo ofrezca formas distintas.
  - Se evita introducir «Mesías», «Señor» u otras sustituciones no presentes en el versículo.
