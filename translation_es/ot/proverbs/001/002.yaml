translation:
  language: es
  text: para conocer sabiduría e instrucción[a], para comprender palabras de discernimiento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «disciplina» para מוּסָר, subrayando el entrenamiento correctivo además de la enseñanza.
    reason: lexical_alternative
  - marker: b
    text: O «dichos de entendimiento» o «dichos de discernimiento».
