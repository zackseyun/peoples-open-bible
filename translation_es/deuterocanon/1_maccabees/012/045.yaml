review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del griego y del POB inglés: enviar a los hombres a sus hogares, escoger unos pocos para acompañar, ir a Ptolemaida, entregar la ciudad junto con fortalezas, fuerzas y administradores, y luego marcharse tras regresar. Sin embargo, hay dos desajustes menores: la nota [a] está anclada en «casas» aunque su contenido habla de una alternativa aplicable mejor a «encargados de los asuntos», y «las numerosas fuerzas» suena menos idiomático que una forma militar más natural.'
  spanish_quality_summary: La redacción es clara y digna, pero puede pulirse para mayor naturalidad militar y administrativa en español. «Sus casas» funciona, aunque «sus hogares» habría sido posible; «las numerosas tropas» o «las fuerzas numerosas» suena mejor que «las numerosas fuerzas». «Todos los encargados de los asuntos» es comprensible, pero «todos los encargados de la administración» o mantenerlo con nota aclaratoria mejora la legibilidad. También conviene corregir la distribución de notas para que el marcador [a] corresponda al lugar pertinente.
  glossary_alignment: No hay términos teológicos clave en juego. Las decisiones léxicas generales están bien alineadas con el proyecto. Se preserva «Ptolemaida», y no hay conflictos con Yahvé/Mesías/Espíritu ni otros términos sensibles.
  issues:
  - severity: medium
    issue: La nota [a] está mal ubicada y no corresponde al segmento anotado.
    rationale: El texto ancla [a] en «casas», pero la nota dice «O 'todos los oficiales'...» y explica πάντας τοὺς ἐπὶ τῶν χρειῶν, no οἴκους. Esto rompe la trazabilidad entre nota y fuente.
  - severity: low
    issue: «Las numerosas fuerzas» es poco idiomático en español militar.
    rationale: Aunque fiel a τὰς δυνάμεις τὰς πολλὰς, en español suena más natural «las numerosas tropas», que conserva el sentido militar y cuantitativo.
  - severity: low
    issue: La nota [b] contiene comillas innecesarias/inconsistentes.
    rationale: Empieza con una comilla simple sin necesidad. Conviene normalizar la puntuación editorial.
  revised_spanish_text: Y ahora envíalos a sus casas, pero escoge para ti unos pocos hombres que estarán contigo; ven conmigo a Ptolemaida, y yo te la entregaré, junto con las demás fortalezas y las numerosas tropas y a todos los encargados de los asuntos[a], y después me iré tras haber regresado[b]; porque para esto he venido.
  revised_footnotes:
