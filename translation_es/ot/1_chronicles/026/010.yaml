  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: Hosá pertenece a los hijos de Merari, tuvo hijos, Shimri ocupa el puesto principal, y la cláusula con כִּי se maneja correctamente como concesiva con alternativa explicativa en nota. También mantiene bien la repetición de רֹאשׁ con «jefe».'
  spanish_quality_summary: 'El español es claro y natural, pero necesita dos ajustes menores para mayor fidelidad y legibilidad eclesial: usar una forma española más reconocible del nombre «Simri» en vez de «Shimri», y evitar el anclaje de nota en «Hosá», ya que la nota corresponde a «aunque no era el primogénito».'
  glossary_alignment: No hay términos teológicos sensibles aquí. La transliteración de nombres propios debe sonar natural en español bíblico; «Hosá» está bien, pero «Shimri» conviene normalizarlo a «Simri» para coherencia ortográfica española. El resto del léxico («primogénito», «jefe») está alineado con la auditoría y es idiomático.
  issues:
  - severity: medium
    issue: El nombre «Shimri» queda en transliteración inglesa en vez de adaptación ortográfica española más natural.
    rationale: Aunque no afecta gravemente el sentido, en una Biblia en español «Simri» es una forma más natural y ampliamente legible que «Shimri», sin pérdida de fidelidad al nombre hebreo שִׁמְרִי.
  - severity: medium
    issue: La nota [a] está anclada en «Hosá» pero su contenido explica la cláusula «aunque no era el primogénito».
    rationale: Los marcadores deben aparecer en la palabra o frase pertinente. Tal como está, el lector puede pensar erróneamente que la nota trata sobre el nombre Hosá, no sobre el valor de la conjunción hebrea כִּי.
  revised_spanish_text: 'Y Hosá, de entre los hijos de Merari, tuvo hijos: Simri, el jefe; aunque[a] no era el primogénito, su padre lo hizo jefe.'
  revised_footnotes:
