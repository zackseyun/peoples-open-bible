    issue: «revestidas» no expresa con suficiente precisión el valor de סְפוּנִים
    rationale: La evidencia léxica y la nota inglesa apuntan a ‘paneled/ceiled’, es decir, casas acabadas o forradas con paneles. «Revestidas» es demasiado general y debilita el matiz de lujo y acabado que sostiene la reprensión profética.
  - severity: low
    issue: La nota al pie actual compensa parcialmente, pero deja la mejor opción fuera del texto principal
    rationale: Dado que la opción más específica es perfectamente natural en español, conviene llevarla al cuerpo del versículo y dejar la nota para la alternativa tradicional o explicación breve.
