translation:
  language: es
  text: Y mira[a], así como tu vida fue preciosa a mis ojos este día, así sea preciosa mi vida a los ojos de Yahvé, y que él me libre de toda angustia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu vida fue grande a mis ojos ... así sea grande mi vida a los ojos de Yahvé». El hebreo usa «grande» como modismo para expresar alto valor o estima preciosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And look
  chosen_spanish: Y mira
  alternatives_spanish:
  - Y he aquí
  - Y mira bien
  - Y observa
  lexicon: HALOT
  rationale: La partícula introduce atención enfática a lo que sigue. «Y mira» conserva ese énfasis en un español natural y sobrio, sin el tono más arcaico de «he aquí».
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - como
  - tal como
  - así como exactamente
  lexicon: HALOT
  rationale: Marca la comparación entre la cláusula inicial y el deseo/petición posterior. «Así como» expresa con claridad la correspondencia.
- source_word: גָּדְלָה ... נַפְשְׁךָ ... בְּעֵינַי
  english_pob_choice: your life was precious in my eyes
  chosen_spanish: tu vida fue preciosa a mis ojos
  alternatives_spanish:
  - tu vida fue grande a mis ojos
  - tu vida fue muy valiosa para mí
  - fuiste muy estimado en mis ojos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «fue grande», pero en este modismo con נֶפֶשׁ y «a mis ojos» expresa valor estimado. «Preciosa» recoge mejor el sentido idiomático que «grande» en español.
- source_word: נֶפֶשׁ
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - alma
  - ser
  - persona
  lexicon: HALOT
  rationale: En este contexto de preservación y rescate, נֶפֶשׁ se refiere a la vida, no al alma inmortal. «Vida» mantiene el sentido concreto y contextual.
- source_word: הַיּוֹם הַזֶּה
  english_pob_choice: this day
  chosen_spanish: este día
  alternatives_spanish:
  - hoy
  - en este día
  - en el día de hoy
  lexicon: HALOT
  rationale: «Este día» refleja bien la referencia temporal inmediata con un registro formal y claro.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de la misma manera
  - entonces
  - de igual modo
  lexicon: HALOT
  rationale: Introduce la apódosis de la comparación. «Así» es breve, natural y fiel al paralelo.
- source_word: תִּגְדַּל ... נַפְשִׁי ... בְּעֵינֵי יְהוָה
  english_pob_choice: may my life be precious in the eyes of Yahweh
  chosen_spanish: sea preciosa mi vida ante los ojos de Yahvé
  alternatives_spanish:
  - sea grande mi vida ante los ojos de Yahvé
  - que mi vida sea preciosa a los ojos de Yahvé
  - que yo sea muy estimado ante Yahvé
  lexicon: HALOT
  rationale: Se conserva la metáfora idiomática de «ser grande» mediante «ser preciosa», que en español expresa valor y estima. «Ante los ojos de Yahvé» mantiene el marco relacional del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el nombre divino: «Yahvé», preservando el Tetragrámaton en vez de ocultarlo tras un título.'
- source_word: וְיַצִּלֵנִי
  english_pob_choice: and may he deliver me
  chosen_spanish: y que él me libre
  alternatives_spanish:
  - y que me rescate
  - y que él me salve
  - y me libre
  lexicon: HALOT
  rationale: El verbo puede significar librar, rescatar o salvar. «Librar» funciona bien en español para la idea de sacar de peligro y mantiene el tono de súplica.
- source_word: מִכָּל צָרָה
  english_pob_choice: from all distress
  chosen_spanish: de toda angustia
  alternatives_spanish:
  - de toda aflicción
  - de todo peligro
  - de toda tribulación
  lexicon: HALOT
  rationale: צָרָה abarca aflicción, angustia, adversidad y peligro. «Angustia» comunica la amplitud y gravedad sin estrechar el término a una sola clase de problema.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. El proyecto manda rendirlo como «Yahvé», preservando el nombre del pacto y evitando una sustitución litúrgica que borre el dato original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Modismo hebreo גָּדַל נֶפֶשׁ / ser grande en los ojos de alguien
  english_pob_reading: your life was precious in my eyes ... may my life be precious in the eyes of Yahweh
  chosen_spanish_reading: tu vida fue preciosa a mis ojos ... sea preciosa mi vida ante los ojos de Yahvé
  alternative_spanish_readings:
  - tu vida fue grande a mis ojos ... sea grande mi vida ante los ojos de Yahvé
  - tu vida fue muy valiosa para mí ... que mi vida sea muy valiosa para Yahvé
  rationale: La traducción evita perder la tensión entre la literalidad «grande» y el sentido idiomático de valor/precio. «Preciosa» expresa que se trata de estima y alta valoración, no de tamaño.
  doctrine_reference: HALOT; contexto narrativo de 1 Samuel 26:24
translation_notes:
  revision_awareness: El inglés auditado mantiene «precious» como decisión idiomática y añade nota sobre la alternativa literal «great». La versión española sigue esa misma resolución semántica con «preciosa», conservando la correspondencia entre ambas cláusulas y el nombre divino sin ocultarlo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de manera uniforme para יְהוָה.
  - «Vida» se usó en ambas ocurrencias de נֶפֶשׁ por el contexto de preservación y rescate.
  - Se preservó la estructura comparativa con «así como ... así ...».
  - «Preciosa» se repitió en ambas cláusulas para reflejar la misma valoración idiomática.
  - Se usó «angustia» para abarcar el campo semántico amplio de צָרָה sin reducirlo a un solo matiz.
