revisions:
- from: Terrores son puestos sobre mí[a]; me persiguen como el viento mi nobleza, y mi salvación pasa como una nube[b].
  to: Los terrores se vuelven contra mí; persiguen mi nobleza[a] como el viento, y mi salvación pasa como una nube[b].
  rationale: 'Se corrige la sintaxis española para que sea natural y fiel: «se vuelven contra mí» expresa bien el pasivo/resultativo del hebreo; se reordena el segundo hemistiquio para que «mi nobleza» sea claramente el objeto de «persiguen»; y se mueve la nota [a] al término correcto. También se elimina de la nota [a] la alternativa «mi nobleza», ya que ya aparece en el texto principal y la nota debe preservar solo alternativas reales al término escogido.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:00:31Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja en general el sentido del hebreo y la línea del English POB: terrores vueltos contra Job, persecución de su condición honorable como el viento, y desaparición de su salvación como una nube. Sin embargo, la sintaxis española altera la relación de los elementos en el segundo hemistiquio y la nota [a] está anclada en un lugar incorrecto, pues las alternativas de «mi nobleza» corresponden a נְדִבָתִי, no al primer colon.'
  spanish_quality_summary: 'La redacción actual suena poco natural en español: «Terrores son puestos sobre mí» es torpe, y «me persiguen como el viento mi nobleza» desordena el complemento directo. Una revisión menor mejora mucho la legibilidad sin apartarse del original: «Los terrores se vuelven contra mí; persiguen mi nobleza como el viento, y mi salvación pasa como una nube».'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Mi salvación» conserva correctamente יְשֻׁעָתִי con nota alternativa. «Mi nobleza» sigue la revisión inglesa documentada para נְדִבָתִי. «Viento» para רוּחַ es correcto por contexto poético.
  issues:
  - severity: high
    issue: La nota [a] está colocada sobre «mí» en vez de sobre «mi nobleza».
    rationale: La nota explica alternativas de נְדִבָתִי («mi nobleza», «mi prosperidad», «mi honor»), no de עָלַי («sobre mí»). Debe anclarse en la frase correspondiente para preservar trazabilidad léxica.
  - severity: medium
    issue: «Terrores son puestos sobre mí» es una construcción poco natural en español.
    rationale: Aunque intenta reflejar la pasividad de הָהְפַּךְ, en español bíblico-natural suena mejor «Los terrores se vuelven contra mí» o equivalente, que conserva el giro resultativo sin calco rígido.
  - severity: medium
    issue: El orden «me persiguen como el viento mi nobleza» es sintácticamente defectuoso o confuso.
    rationale: 'En español, el objeto «mi nobleza» debe ir junto al verbo o antes del complemento comparativo: «persiguen mi nobleza como el viento».'
  revised_spanish_text: Los terrores se vuelven contra mí; persiguen mi nobleza[a] como el viento, y mi salvación pasa como una nube[b].
  revised_footnotes:
  - marker: a
    text: O «mi prosperidad» o «mi honor». El hebreo puede referirse a una condición elevada u honorable.
    reason: lexical_alternative
  - marker: b
    text: O «mi liberación» o «mi bienestar». El hebreo puede denotar rescate o bienestar, además de «salvación».
    reason: lexical_alternative
  revision_rationale: 'Se corrige la sintaxis española para que sea natural y fiel: «se vuelven contra mí» expresa bien el pasivo/resultativo del hebreo; se reordena el segundo hemistiquio para que «mi nobleza» sea claramente el objeto de «persiguen»; y se mueve la nota [a] al término correcto. También se elimina de la nota [a] la alternativa «mi nobleza», ya que ya aparece en el texto principal y la nota debe preservar solo alternativas reales al término escogido.'
