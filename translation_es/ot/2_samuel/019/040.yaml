translation:
  language: es
  text: Todo el pueblo cruzó el Jordán[a], y el rey cruzó. Entonces el rey besó a Barzilái y lo bendijo, y volvió a su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y volvió a su lugar». El sujeto de «volvió» se entiende más naturalmente como Barzilái, aunque el contexto debe aclarar el antecedente.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעֲבֹר / עָבָר
  english_pob_choice: crossed / crossed over
  chosen_spanish: cruzó
  alternatives_spanish:
  - pasó
  - cruzó al otro lado
  lexicon: HALOT
  rationale: En este contexto de atravesar el Jordán, «cruzó» comunica el movimiento concreto con naturalidad en español. «Pasó» es posible, pero es menos explícito; «cruzó al otro lado» añade una expansión que el hebreo no exige.
- source_word: כָּל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la gente
  - todo el pueblo reunido
  lexicon: HALOT
  rationale: «עָם» puede referirse al conjunto del pueblo presente, no solo a tropas. «Todo el pueblo» conserva esa amplitud y suena natural en español bíblico moderno.
- source_word: אֶת הַיַּרְדֵּן
  english_pob_choice: the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - el río Jordán
  lexicon: HALOT
  rationale: En español, como en el inglés auditado, el nombre del río puede funcionar sin «río». «El Jordán» es claro y fiel, sin añadir material innecesario.
- source_word: וְהַמֶּלֶךְ עָבָר
  english_pob_choice: and the king crossed over
  chosen_spanish: y el rey también cruzó
  alternatives_spanish:
  - y el rey cruzó al otro lado
  - y el rey cruzó
  lexicon: HALOT
  rationale: La repetición del verbo hebreo se conserva con «también cruzó», que refleja la coordinación y evita perder el énfasis narrativo de que el rey atravesó el río junto con el pueblo.
- source_word: וַיִּשַּׁק
  english_pob_choice: kissed
  chosen_spanish: besó
  alternatives_spanish:
  - dio un beso a
  lexicon: HALOT
  rationale: El verbo expresa un beso real de despedida/afecto. «Besó» es la forma más directa y sobria en español.
- source_word: לְבַרְזִלַּי
  english_pob_choice: Barzillai
  chosen_spanish: Barzilái
  alternatives_spanish:
  - Barzilai
  lexicon: Transcripción tradicional del nombre propio
  rationale: 'Se mantiene el nombre propio con adaptación gráfica española habitual: «Barzilái». Evita la anglización y conserva la pronunciación aproximada para lectores hispanos.'
- source_word: וַיְבָרֲכֵהוּ
  english_pob_choice: blessed him
  chosen_spanish: lo bendijo
  alternatives_spanish:
  - le bendijo
  - lo despidió con una bendición
  lexicon: HALOT
  rationale: El hebreo usa explícitamente ברך, por lo que se mantiene «bendijo». «Lo» respeta el complemento directo en español estándar; «le» también sería posible por leísmo regional, pero no se adopta como forma general.
- source_word: וַיָּשָׁב לִמְקֹמוֹ
  english_pob_choice: and he returned to his own place
  chosen_spanish: y él regresó a su propio lugar
  alternatives_spanish:
  - y regresó a su lugar
  - y volvió a su lugar
  lexicon: HALOT
  rationale: La referencia del sujeto es más naturalmente Barzilái, como en el auditorio inglés. «Su propio lugar» preserva מקום sin imponer «casa» o «hogar», que sería más interpretativo.
theological_decisions:
- issue: Identidad del sujeto de «regresó a su propio lugar»
  english_pob_reading: The subject of 'returned' is most naturally Barzillai, though English readers may need the antecedent clarified from context.
  chosen_spanish_reading: El sujeto de «regresó» se entiende naturalmente como Barzilái, aunque el español también depende del contexto cercano para esa referencia.
  alternative_spanish_readings:
  - y Barzilái regresó a su propio lugar
  - y volvió a su lugar
  rationale: El hebreo permite que el último verbo se refiera a Barzilái por cercanía contextual. La redacción española mantiene esa ambigüedad funcional sin forzar una expansión innecesaria; la nota aclara la referencia para lectura pública.
  doctrine_reference: Ninguna; decisión de cohesión y referencia contextual.
translation_notes:
  revision_awareness: El control de revisión más reciente indicó alta concordancia y ningún cambio necesario; esta propuesta mantiene la lectura auditada sin introducir ajustes de sentido.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el Tetragrámaton; aquí no aparece.
  - Se conserva «Barzilái» como forma española del nombre propio, consistente con una transliteración adaptada y legible.
  - 'No se traduce mecánicamente desde el inglés: se prioriza el valor verbal de עבר como movimiento concreto y la referencia contextual del último sujeto.'
  - Se mantiene el estilo bíblico moderno y digno, evitando arcaísmos innecesarios.
