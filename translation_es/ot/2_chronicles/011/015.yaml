translation:
  language: es
  text: Y nombró para sí sacerdotes para los lugares altos[a], para los demonios cabríos, y para los becerros que había hecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sátiros» o «cabras» para el término traducido aquí como «demonios cabríos». El hebreo puede referirse a seres caprinos asociados con culto ilícito.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמֶד
  english_pob_choice: appointed
  chosen_spanish: nombró
  alternatives_spanish:
  - designó
  - estableció
  lexicon: HALOT
  rationale: El verbo causativo en este contexto de instalación cultual comunica mejor la acción de poner a alguien en un cargo. «Nombró» conserva la idea de asignación/oficio en un español natural y digno; «designó» y «estableció» son posibles, pero «nombró» fluye mejor con «sacerdotes».
- source_word: לּוֹ
  english_pob_choice: for himself
  chosen_spanish: para sí
  alternatives_spanish:
  - para él
  lexicon: HALOT
  rationale: La dativa reflexiva indica que Jeroboam actuó en su propio interés. «Para sí» expresa esa referencia reflexiva de manera natural en español.
- source_word: כֹּהֲנִים
  english_pob_choice: priests
  chosen_spanish: sacerdotes
  alternatives_spanish:
  - curas
  lexicon: HALOT
  rationale: Es el término normal para el oficio cultual. «Sacerdotes» preserva el sentido técnico bíblico.
- source_word: לַבָּמוֹת
  english_pob_choice: for the high places
  chosen_spanish: para los lugares altos
  alternatives_spanish:
  - para los altos lugares
  - para los santuarios altos
  lexicon: HALOT
  rationale: «Bamot» es el término bíblico para sitios de culto elevados. «Lugares altos» mantiene el término establecido sin volverlo más eclesiástico de lo que exige el hebreo.
- source_word: לַשְּׂעִירִים
  english_pob_choice: for the goat-demons
  chosen_spanish: para los demonios-cabra
  alternatives_spanish:
  - para los satiros
  - para los machos cabríos
  lexicon: HALOT
  rationale: En contexto de culto ilícito, שְׂעִירִים puede referirse a seres demoníacos o figuras idolátricas de aspecto caprino. «Demonios-cabra» conserva esa tensión y evita reducir el término a animales literales.
- source_word: וְלָעֲגָלִים
  english_pob_choice: and for the calves
  chosen_spanish: y para los becerros
  alternatives_spanish:
  - y para los terneros
  - y para los ídolos-becerros
  lexicon: HALOT
  rationale: El sustantivo significa literalmente «becerros». En español, ese término conserva el referente concreto de las imágenes cultuales sin introducir una glosa interpretativa en el texto principal.
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: that he had made
  chosen_spanish: que había hecho
  alternatives_spanish:
  - que hizo
  - que él hizo
  lexicon: HALOT
  rationale: El pluscuamperfecto expresa con claridad que los objetos de culto ya habían sido fabricados antes de esta acción. Mantiene la referencia temporal implícita del hebreo en un español fluido.
theological_decisions:
- issue: Sentido de שְׂעִירִים en contexto de culto ilícito
  english_pob_reading: goat-demons
  chosen_spanish_reading: demonios-cabra
  alternative_spanish_readings:
  - sátiros
  - machos cabríos
  rationale: El pasaje enumera elementos de adoración no autorizada instituidos por Jeroboam. En ese marco, la referencia probablemente no es a cabras literales, sino a figuras demoníacas o idolátricas de aspecto caprino. «Demonios-cabra» traslada esa interpretación sin ocultar la base imagística del hebreo.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve theological tension rather than resolve it beyond the text'
translation_notes:
  revision_awareness: Coincide con la lectura auditada en inglés en lo esencial; no se aplicaron revisiones posteriores según el registro, y se mantuvo la tensión léxica de שְׂעִירִים sin suavizarla hacia un equivalente más tradicional.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto lo requiera; en este versículo no aparece el nombre divino.
  - «Lugares altos» conserva el término bíblico técnico y evita sustituirlo por una glosa eclesiástica.
  - «Sacerdotes» y no «siervos» refleja el oficio cultual explícito del hebreo.
  - Se evitó «SEÑOR» o una paráfrasis devocional porque el versículo no contiene el tetragrámaton ni una cita directa de κύριος.
