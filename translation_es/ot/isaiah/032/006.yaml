base_translation:
  language: en
  yaml_path: translation/ot/isaiah/032/006.yaml
  text: 'For a fool speaks folly[a], and his heart devises iniquity: to practice godlessness and to speak error against Yahweh[c][b], to leave the hungry person empty and to withhold drink from the thirsty.'
  footnotes:
  - marker: a
    text: Or 'hypocrisy' for 'godlessness' (חֹנֶף); the Hebrew term can denote impiety expressed as irreligion or as hypocritical wickedness.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the hungry נפשׁ'; that is, the hungry person/life, not necessarily 'soul' in a narrow English sense.
    reason: lexical_alternative
  - marker: c
    text: Or 'to speak falsehood concerning the LORD' for 'to speak error against the LORD.'
    reason: alternative_reading
