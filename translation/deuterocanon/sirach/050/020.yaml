    text: τότε καταβὰς ἐπῆρεν χεῖρας αὐτοῦ ἐπὶ πᾶσαν ἐκκλησίαν υἱῶν Ἰσραήλ, δοῦναι εὐλογίαν Κυρίῳ ἐκ χειλέων αὐτοῦ καὶ ἐν ὀνόματι αὐτοῦ καυχᾶσθαι.
