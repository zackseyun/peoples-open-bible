translation:
  language: es
  text: Entonces el rey Sedequías dio órdenes de que pusieran a Jeremías bajo custodia en el patio de la guardia y le dieran una hogaza de pan al día[a], de la calle de los panaderos, hasta que se acabó todo el pan de la ciudad. Y Jeremías permaneció en el patio de la guardia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo literalmente dice «desde afuera/la calle de los panaderos»; probablemente se refiere a una calle o sector donde trabajaban y vendían pan los panaderos.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְצַוֶּה
  english_pob_choice: gave orders
  chosen_spanish: dio órdenes
  alternatives_spanish:
  - mandó
  - dio la orden
  lexicon: HALOT
  rationale: צוה expresa emitir una orden. En español, «dio órdenes» conserva el tono real y suena natural, sin cargar el texto con una fórmula demasiado rígida.
- source_word: וַיַּפְקִדוּ
  english_pob_choice: they committed
  chosen_spanish: pusieron
  alternatives_spanish:
  - lo entregaron
  - lo confiaron
  - lo asignaron
  lexicon: HALOT
  rationale: En este contexto, פקד describe colocar/entregar a Jeremías bajo custodia en un lugar determinado. «Pusieron» es más neutral y claro en español, aunque mantiene la idea de traslado oficial a custodia.
- source_word: חֲצַר הַמַּטָּרָה
  english_pob_choice: the court of the guard
  chosen_spanish: el patio de la guardia
  alternatives_spanish:
  - el atrio de la guardia
  - el patio de la cárcel
  - el patio del guardia
  lexicon: HALOT
  rationale: La expresión en Jeremías designa un recinto vigilado asociado a detención. «Patio de la guardia» conserva el valor institucional sin convertirlo innecesariamente en una prisión más específica de lo que el hebreo exige.
- source_word: כִכַּר לֶחֶם
  english_pob_choice: a loaf of bread
  chosen_spanish: un pan
  alternatives_spanish:
  - un pan redondo
  - un pan grande
  - una hogaza
  lexicon: HALOT
  rationale: ככר alude a una unidad redonda de pan. «Un pan» funciona en español como equivalente natural y breve; en este contexto cotidiano, la precisión formal de «hogaza» sería posible pero menos directa.
- source_word: לַיּוֹם
  english_pob_choice: daily
  chosen_spanish: al día
  alternatives_spanish:
  - cada día
  - diariamente
  lexicon: HALOT
  rationale: La construcción indica ración diaria. «Al día» encaja bien con la frase y evita una adverbialización excesivamente abstracta.
- source_word: מִחוּץ הָאֹפִים
  english_pob_choice: from the bakers’ street
  chosen_spanish: desde la calle de los panaderos
  alternatives_spanish:
  - desde el barrio de los panaderos
  - desde la calle de los horneros
  - desde la zona de los panaderos
  lexicon: HALOT
  rationale: La forma hebrea apunta literalmente a un lugar exterior asociado con los panaderos. En español, «calle de los panaderos» conserva la referencia urbana y deja abierta la naturaleza exacta del sitio, como hace el auditable del inglés.
- source_word: עַד תֹּם כָּל הַלֶּחֶם מִן הָעִיר
  english_pob_choice: until all the bread from the city was gone
  chosen_spanish: hasta que se acabó todo el pan de la ciudad
  alternatives_spanish:
  - hasta que se agotó todo el pan de la ciudad
  - hasta que no quedó pan en la ciudad
  - hasta el fin de todo el pan de la ciudad
  lexicon: HALOT
  rationale: La cláusula expresa agotamiento de la provisión urbana. «Se acabó» reproduce bien la idea de consumirse/exhaustarse con español natural.
- source_word: וַיֵּשֶׁב
  english_pob_choice: remained
  chosen_spanish: permaneció
  alternatives_spanish:
  - se quedó
  - habitó
  - estuvo
  lexicon: HALOT
  rationale: ישב aquí no es «sentarse», sino continuar residiendo o quedándose en el lugar. «Permaneció» refleja continuidad de permanencia bajo custodia.
- source_word: יִרְמְיָהוּ
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  alternatives_spanish:
  - —
  lexicon: N/A
  rationale: Nombre propio transliterado según el equivalente español estándar.
- source_word: צִדְקִיָּהוּ
  english_pob_choice: Zedekiah
  chosen_spanish: Sedequías
  alternatives_spanish:
  - —
  lexicon: N/A
  rationale: Nombre propio transliterado según el equivalente español estándar.
translation_notes:
  revision_awareness: 'El texto inglés auditado muestra una revisión menor: «Bakers’ Street» se rebajó a minúscula por ser un nombre común de lugar, y no hubo otros cambios sustantivos. La versión española conserva esa lectura como una designación local, no como nombre propio formal.'
  spanish_consistency_notes:
  - Se mantiene «patio de la guardia» para חֲצַר הַמַּטָּרָה, consistente con la terminología POB y con el valor de recinto custodiado.
  - Se usa «Sedequías» y «Jeremías» con las formas españolas estándar de los nombres propios bíblicos.
  - Se preserva la idea de provisión cotidiana con «al día»/«permaneció», sin añadir detalles no presentes en el hebreo.
