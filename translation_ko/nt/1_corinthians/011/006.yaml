  yaml_path: translation/nt/1_corinthians/011/006.yaml
  text: For if a woman does not cover her head[a], she should also have her hair cut off; but if it is disgraceful for a woman to have her hair cut off or to be shaved[b], she should cover her head.
  footnotes:
  - marker: a
    text: Or 'wife' throughout the verse; Greek gynē can mean either 'woman' or 'wife' depending on context.
    reason: alternative_reading
  - marker: b
    text: The verb can also be rendered 'be veiled'; the Greek speaks of being covered, with the head covering implied by the context.
    reason: lexical_alternative
