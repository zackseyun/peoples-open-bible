    reason: lexical_alternative
  - marker: c
    text: Literalmente, «tu raíz de la tierra de los vivientes»; el sentido es «te desarraigará de la tierra de los vivientes».
    reason: lexical_alternative
  revision_rationale: Se reubicó [a] sobre «te arrebatará» para alinearlo con יַחְתְּךָ y con la nota del POB inglés; se corrigieron las alternativas mal conjugadas en las notas; y se mejoró la fluidez del texto principal con «te desarraigará», reservando para la nota la explicación del hebreo literal «tu raíz». Así se preservan mejor el sentido fuente, la documentación léxica y la legibilidad en español.
