translation:
  language: es
  text: Porque desobedecieron tus mandamientos[a], y nos entregaste al saqueo, al cautiverio, a la muerte y para ser un proverbio de oprobio[b] entre todas las naciones, entre las cuales hemos sido esparcidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mandatos».
    reason: lexical_alternative
  - marker: b
    text: O «objeto de reproche» o «dicho de vergüenza». El griego combina literalmente la idea de «proverbio/dicho» con la de «reproche».
    reason: lexical_alternative
lexical_decisions:
- source_word: παρήκουσαν
  english_pob_choice: they disobeyed
  chosen_spanish: desobedecieron
  alternatives_spanish:
  - no escucharon
  - rehusaron escuchar
  lexicon: BDAG
  rationale: El verbo expresa no prestar oído con el sentido de desobedecer; en español, «desobedecieron» comunica de forma natural la falta de obediencia a mandamientos sin perder la fuerza del reproche.
- source_word: ἐντολῶν
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - mandatos
  - órdenes
  lexicon: BDAG
  rationale: «Mandamientos» conserva el peso religioso y pactal del término en la oración, y en español suena más adecuado que «órdenes» en este contexto litúrgico.
- source_word: ἔδωκας ἡμᾶς εἰς
  english_pob_choice: you gave us over to
  chosen_spanish: nos entregaste a
  alternatives_spanish:
  - nos diste a
  - nos entregaste en manos de
  lexicon: BDAG
  rationale: La construcción griega indica una entrega judicial a consecuencias adversas. «Nos entregaste a» mantiene esa fuerza de rendición/divino juicio y suena natural en español.
- source_word: διαρπαγὴν
  english_pob_choice: plunder
  chosen_spanish: saqueo
  alternatives_spanish:
  - pillaje
  - botín
  lexicon: BDAG
  rationale: «Saqueo» expresa bien la idea de quedar expuestos al despojo y encaja con la secuencia de calamidades.
- source_word: αἰχμαλωσίαν
  english_pob_choice: captivity
  chosen_spanish: cautiverio
  alternatives_spanish:
  - captividad
  - prisión
  lexicon: BDAG
  rationale: «Cautiverio» es un equivalente natural y digno en español bíblico; conserva la idea de ser llevados y retenidos como cautivos.
- source_word: θάνατον
  english_pob_choice: death
  chosen_spanish: muerte
  alternatives_spanish:
  - destrucción
  lexicon: BDAG
  rationale: El sentido directo es «muerte»; no hace falta ampliar ni suavizar el término.
- source_word: παραβολὴν ὀνειδισμοῦ
  english_pob_choice: a proverb of reproach
  chosen_spanish: proverbio de oprobio
  alternatives_spanish:
  - objeto de reproche
  - dicho de vergüenza
  - copla de escarnio
  lexicon: BDAG
  rationale: La frase combina la noción de dicho proverbial con la de vergüenza pública. «Proverbio de oprobio» reproduce la estructura del griego y mantiene la tensión semántica; «oprobio» evita reducirlo solo a insulto ocasional.
- source_word: πᾶσιν τοῖς ἔθνεσιν
  english_pob_choice: among all the nations
  chosen_spanish: entre todas las naciones
  alternatives_spanish:
  - entre todos los pueblos
  - ante todas las naciones
  lexicon: BDAG
  rationale: «Naciones» sigue el valor contextual de ἔθνη y «entre» refleja la situación pública dentro del ámbito de esas naciones.
- source_word: ἐν οἷς ἐσκορπίσμεθα
  english_pob_choice: among which we have been scattered
  chosen_spanish: entre las cuales hemos sido esparcidos
  alternatives_spanish:
  - entre las que hemos sido dispersados
  - donde hemos sido dispersados
  lexicon: BDAG
  rationale: «Hemos sido esparcidos» preserva el pasivo y la condición resultante de dispersión. «Entre las cuales» refleja mejor la relación con las naciones que un simple «donde».
theological_decisions:
- issue: Tensión entre desobediencia humana y acción judicial de Dios
  english_pob_reading: Retain both Israel's disobedience ('they disobeyed') and God's judicial action ('you gave us over') without softening either.
  chosen_spanish_reading: Conservar tanto la desobediencia del pueblo («desobedecieron») como la acción judicial de Dios («nos entregaste»), sin atenuar ninguna de las dos.
  alternative_spanish_readings:
  - 'suavizar la agencia divina: «fuimos entregados»'
  - 'generalizar la culpa: «desobedecimos»'
  rationale: El griego distingue a quienes desobedecieron de quienes ahora sufren el resultado, y atribuye la entrega a Dios. La versión española mantiene esa tensión teológica en lugar de armonizarla.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Lenguaje de vergüenza pública entre las naciones
  english_pob_reading: Render παραβολὴν ὀνειδισμοῦ closely as 'a proverb of reproach' in the main text, with a more idiomatic alternative preserved in a footnote.
  chosen_spanish_reading: Traducir la expresión de manera cercana como «proverbio de oprobio» y conservar una nota con la alternativa idiomática.
  alternative_spanish_readings:
  - objeto de reproche
  - dicho vergonzoso
  - byword of disgrace
  rationale: La frase expresa una humillación pública reconocible entre las naciones. La traducción cercana preserva la imagen del griego, y la nota documenta el sentido idiomático para el lector.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
translation_notes:
  revision_awareness: Se siguió la última revisión del inglés POB al preferir una formulación directa equivalente a «to be a proverb of reproach» y al reflejar con mayor precisión la relación «among which» mediante «entre las cuales». También se mantuvo la distinción entre el acto humano de desobedecer y la entrega judicial divina.
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma por defecto solo cuando corresponda a un texto con el nombre divino explícito; aquí el pasaje dirige la oración a Dios con pronombre de segunda persona, por lo que no se introduce el nombre.
  - Se prefirió «cautiverio» para αἰχμαλωσίαν por claridad bíblica en español, manteniendo el tono solemne del texto.
  - «Naciones» conserva el valor de ἔθνη sin cargar el término con matices eclesiales posteriores.
  - 'La estructura paralela de calamidades se mantuvo en español con enumeración directa: saqueo, cautiverio, muerte y proverbio de oprobio.'
