translation:
  language: es
  text: 'Y dijo: «Por favor, toma a tu hijo, a tu único ser[a], a quien amas, a Isaac; ve a la tierra de Moriah, y ofrécelo allí como holocausto, sobre uno de los montes que yo te diré».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «tu único hijo». El hebreo יְחִידְךָ puede subrayar un hijo único o una singularidad especial; aquí destaca el lugar singular de Isaac en la orden.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָא
  english_pob_choice: Please
  chosen_spanish: Por favor
  alternatives_spanish:
  - te ruego
  - ahora
  lexicon: HALOT
  rationale: La partícula de ruego suaviza la orden y expresa cortesía. «Por favor» comunica mejor ese valor en español moderno que un calco como «te ruego» o un «ahora» temporalmente engañoso.
- source_word: בִּנְךָ
  english_pob_choice: your son
  chosen_spanish: tu hijo
  alternatives_spanish:
  - tu vástago
  - tu hijo varón
  lexicon: HALOT
  rationale: Hijo es la equivalencia directa y natural para בן con sufijo de segunda persona masculina singular.
- source_word: יְחִידְךָ
  english_pob_choice: your only one
  chosen_spanish: tu único
  alternatives_spanish:
  - tu único hijo
  - tu hijo único
  - tu único ser querido
  lexicon: HALOT
  rationale: יחיד comunica singularidad/único. En español, «tu único» mantiene la tensión del hebreo y deja abierta la fuerza relacional o de exclusividad que el contexto carga sobre Isaac. La nota preserva la alternativa tradicional «tu único hijo».
- source_word: אֲשֶׁר אָהַבְתָּ
  english_pob_choice: whom you love
  chosen_spanish: a quien amas
  alternatives_spanish:
  - a quien has amado
  lexicon: HALOT
  rationale: El perfecto hebreo aquí describe un amor ya conocido y vigente; en español, el presente «amas» expresa mejor ese valor estativo en el contexto que un pretérito perfecto más pesado.
- source_word: וְלֶךְ לְךָ
  english_pob_choice: go
  chosen_spanish: ve
  alternatives_spanish:
  - vete
  - anda
  lexicon: HALOT
  rationale: El verbo simple comunica claramente el mandato. No se añade una expansión idiomática que no esté exigida por el hebreo.
- source_word: אֶרֶץ הַמֹּרִיָּה
  english_pob_choice: the land of Moriah
  chosen_spanish: la tierra de Moriah
  alternatives_spanish:
  - la región de Moriah
  lexicon: HALOT
  rationale: אֶרֶץ puede ser tierra o región. «Tierra de Moriah» es la correspondencia más directa y clara, y mantiene la formulación tradicional sin forzarla.
- source_word: וְהַעֲלֵהוּ
  english_pob_choice: offer him
  chosen_spanish: ofrécelo
  alternatives_spanish:
  - súbelo
  - hazlo subir
  lexicon: HALOT
  rationale: En contexto sacrificial, el hifil de עלה se entiende como ofrenda/ascenso al altar. «Ofrécelo» comunica de forma idiomática la acción sacrificial sin perder la referencia al verbo original.
- source_word: לְעֹלָה
  english_pob_choice: as a burnt offering
  chosen_spanish: en holocausto
  alternatives_spanish:
  - como holocausto
  - como ofrenda quemada
  lexicon: HALOT
  rationale: עֹלָה es el sacrificio de ascensión/quemado. «Holocausto» es el término bíblico tradicional en español y mantiene la categoría sacrificial con dignidad y precisión.
- source_word: עַל אַחַד הֶהָרִים
  english_pob_choice: on one of the mountains
  chosen_spanish: sobre uno de los montes
  alternatives_spanish:
  - en uno de los montes
  - sobre una de las montañas
  lexicon: HALOT
  rationale: הַר suele ser monte/montaña. «Monte» resulta natural en español bíblico y conserva el sentido de elevación topográfica; «sobre» refleja la preposición עַל con fluidez.
- source_word: אֲשֶׁר אֹמַר אֵלֶיךָ
  english_pob_choice: that I will tell you
  chosen_spanish: que yo te diré
  alternatives_spanish:
  - que te diré
  lexicon: HALOT
  rationale: אמר con destinatario directo equivale naturalmente a «decirle/decirte». Se mantiene el futuro para reflejar la promesa pendiente del hebreo.
theological_decisions:
- issue: Sentido de יְחִידְךָ respecto de Isaac pese a la existencia de Ismael
  english_pob_reading: your only one
  chosen_spanish_reading: tu único
  alternative_spanish_readings:
  - tu único hijo
  - tu hijo único
  rationale: El hebreo enfatiza la singularidad de Isaac dentro del marco de la promesa y de la relación de Abraham con él. «Tu único» preserva esa tensión sin resolverla en una afirmación biológica que podría sonar absolutizada; la nota ofrece la lectura tradicional más explícita.
  doctrine_reference: Preservar la tensión teológica y lexical; no sobre-interpretar el énfasis del texto.
translation_notes:
  revision_awareness: Se siguió de cerca el pasaje hebreo y el audit trail inglés; no hubo revisiones aplicadas en el último pase, y la versión española conserva la tensión lexical principal en יְחִידְךָ mediante una forma breve con nota alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo aporta el nombre divino; en este versículo no aparece.
  - Se mantiene «holocausto» para עֹלָה por consistencia terminológica sacrificial.
  - Se evita añadir glosas interpretativas al mandato de prueba; la redacción sigue el hebreo sin resolver la tensión de la entrega de Isaac.
