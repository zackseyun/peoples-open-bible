revisions:
- from: 'Alza tus ojos alrededor y mira: todos ellos se han reunido; vinieron a ti. Vivo yo[a], dice Yahvé, que a todos ellos ciertamente te los pondrás como un adorno y los atarás como una novia.'
  to: 'Alza tus ojos alrededor y mira: todos ellos se reúnen; vienen a ti. Vivo yo, declara Yahvé, que todos ellos te los pondrás como un adorno[a] y te los atarás como una esposa.'
  rationale: Se corrigieron los tiempos verbales para reflejar mejor la escena profética vívida del hebreo, se reubicó la nota al término que realmente comenta (עֲדִי), se pulió la fluidez del objeto repetido y se ajustó כַּכַּלָּה a 'como una esposa' para un registro más fiel y digno en español. Se mantuvo Yahvé conforme a la política del proyecto.
  reviewer_model: gpt-5.4
